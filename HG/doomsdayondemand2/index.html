to the forest, you're exhausted. You begin to climb the hill. Halfway through, you begin to feel dizzy, and you lose your balance.\n\n\"Hang in there, bud…\" ${Assassin} pulls you up to your feet and wraps an arm around you. You make your way through the darkness. Your head is dizzy, and your vision is filled with dark spots. You don't remember how you reached the gate, but you peek over your shoulder to see the guards closing it behind you. \n\n${assassin} walks into the laboratory with you. You walk through the white hallway, which feels unusually bright and hurts your eyes. The doctors and patients talking in the rooms feel very loud, and it hurts your ears. ${assassin} helps you into the last empty and open room on the right. It's a dark room filled with equipment, and he helps you sit down on the white medical bed. You lay back, and he takes your gas mask off. He sits down on the chair next to the counter with a sink in it. Several pieces of equipment are hanging on the wall.\n\nThe ceiling spins in front of your eyes. You close them, but the darkness keeps spinning as well. Your nausea gets worse and worse. The inside of your mouth feels like sandpaper. A man with a face mask steps in and takes off his bloody rubber gloves. Blood is splattered all over his grey lab coat. You can barely keep your eyes open, and you're sweating heavily.\n*if (gavefilter)\n\n \"Mr. ${firstname}. Pleasure to see you again, utterly bitter to see you in, yet again, such a dire condition. What is it this time?\" he says as he washes his gloves in the sink.\n \n \"Doc…it's heavy radiation…\" ${assassin} mumbles. The doctor opens the cupboard next to the counter and rolls a couple of pills towards him. He drops them into his mouth and swallows. The doctor steps next to you with wet rubber gloves. The urge to cough overtakes you, and you cough heavily into your hand. Dark, black blood appears on your palm.\n \n \"Ah, it's due time for a check-up on your lungs. I see you ignored my instructions. The radiation sure won't help your condition. Or does it? Arms up!\" He leans closer to your face, and you raise your arms. He takes the shirt off you and rubs his chin. \"I'd rather not get too in-depth about it. The state your internal organs and bone marrow might be in right now, et cetera, et cetera. I'll give you a cocktail filled with all kinds of yumminess.\" He rushes to the cupboard and takes out a couple of small vials, along with a syringe. \n \n \"A bit of potassium iodide, radiogardase, and just a pinch of diethylenetriamine pentaacetic acid. Yum, yum!\" He turns back to you and taps the vein in your arm. With a swift move, he injects it and pulls the syringe out. He drops the syringe in the sink. \"Now that that's been addressed, you'll either be fine in a couple of days, or you'll die in a couple of days,\" he says as he applies pressure on your vein.\n\n \"Now, let's address a slightly interesting topic. What do you say about that? Hmm?\" He pinches your cheeks. His voice echoes in your ears, and the urge to throw up only becomes greater.\n *page_break\n \"Due to extremely hard work and overtime on my part, I've gotten through the samples I took. Your blood is pretty exciting. It turns black after a while. Also, I cannot place the blood cell. It's spiky, and just keeps wiggling. Those…'dancing' cells are pretty common for the ones you kill out there. The mutated ones, not the humans. Your tissue, it began to spread like a nasty disease in my vial. Yet again, pretty common for the unhealthies. So, the question keeps appearing in my head over and over again, Mr. ${name}. Where did you get that scar? But most importantly, are you still a human being?\" He places one hand on your chest and pushes his finger down on the middle of the black sun with his other hand. Unbearable burning pain fills your whole body. You scream, then turn to the side to throw up.\n \n \"All right, thank you for the treatment. That's enough.\" ${Assassin} pulls him away and pushes him towards the door. The doctor rubs the burnt rubber on his finger and looks at ${assassin}.\n *label docexam\n \n \n \"It moved…the sun moved. How long until he turns? Ask yourself, ${assassin}. The process is only being delayed. It will happen eventually. You, above all else, should know that. Let me have my way with him. I'll get to the bottom of it,\" the doctor says, crossing his arms behind his back.\n \n \"Touch him and I'll bury you. Alive. Try it when he's able to defend himself.\" ${Assassin} takes a step towards him. \n   \n \"Your threats don't scare me, hitman. Ex-hitman. Whichever you prefer. We all have something to lose. Remember that. I'll find a way to his heart. No…that's not right. To his sun.\" The doctor laughs and leaves the room. His voice echoes in the hallway.\n *page_break\n ${assassin} helps you put your shirt and gas mask on, then helps you up. He takes a couple of pills out of the cupboard and puts them in his pocket. You step into the decontamination chamber, leaning against ${assassin} with all of your weight. He holds you firmly. The decontamination process begins, and you feel your throat and mouth getting full. You throw up on the wall. Black blood drips down the wall. You step out of the chamber, and the brightness blinds you for a second. You blink and find yourself being dragged through the headquarters. \n \n Everyone turns their heads after you. ${assassin} gently kicks the door to his room open and drags you inside. He pushes you onto his bed and locks the door. You land on your back, but your limbs feel too heavy to move. You tilt your head towards him. He reaches under the bed and takes out a rope. He cuts it into four pieces, then ties your arms and legs.  \n \n \"Just in case.\" He checks if they're tight enough, then looks into your eyes. He sits down on the table and rests his hands upon his knees.\n \n \"So…I'll do what I can to save you. But I need your strength and willpower, as well. Don't give up. Push through. ${general} owes me, I'll get as much medicine as you need. I'll take care of you…\" ${Assassin} continues to speak, but the only thing you see is his lips moving. Your eyes get out of focus, and you close them.\n *goto doccont\n \n \n \n\n\n*if (gavefilter = false)\n\n \"Mr…${firstname}. ${name}. What a silly name. I understand the situation must be dire if you just decided to occupy one of the best equipped rooms, yes?\" He looks from you to ${assassin} as he washes his rubber gloves.\n \n \"He's been through heavy radiation…Doc…\" ${assassin} mumbles. \n \n \"And you accompanied him. What a great idea. How many soldiers does it take to make a stupid decision?\" The doctor chuckles and opens the cupboard next to the counter. He rolls a couple of pills towards him. He drops them into his mouth and swallows. The doctor steps next to you with soaking rubber gloves. The urge to cough overtakes you, and you cough heavily into your hand. Fresh, red blood appears on your palm.\n \n \"Well, that's fresh. I suspect it's needless to say what might have caused the severe damage to your internal organs. Not to mention your bone marrow…et cetera, et cetera. Be so kind as to raise your arm. Put them in the air, like you didn't care about the radiation.\" He leans closer as you put your hands up. He takes the shirt off you. It falls from his hand when he takes a look at your body. \n \n \"By the look of your body, someone likes you up there. Or hates you below. Knife, bullet, glass…I can place most of your scars just by looking at them. I can also see that whoever patched you up did a bad job. However…that wound…that's utterly interesting. Most, most interesting.\" He frowns at the sight of the black sun surrounding your wound. He turns around and rushes to the counter to take out a couple of vials, along with a syringe. \n \n \"Anyway! Let's get through this quickly. I'll just make a cocktail that I'm sure you'll love. Filled with yummies. I'll add some potassium iodide, radiogardase, and just a pinch of diethylenetriamine pentaacetic acid. Just to give it a little spice!\"  He turns back to you and taps the vein in your arm. With a swift move, he injects it and pulls the syringe out.\n \n \"Now that that's addressed, you'll either be fine in a couple of days, or you'll die in a couple of days,\" he says as he applies pressure to your vein with one hand and holds the syringe with the other.\n \n \"Now…about a slightly more interesting topic, eh?\" He releases your vein and runs his finger over the wound. It tickles and burns at the same time. You pull your knees up and close your eyes. The urge to throw up becomes greater.\n *page_break\n \n \"I've never seen a wound like this before…so fascinating…it would be best to take a sample of it. In fact, I'll just do that now.\" He raises the syringe and stabs it into the middle of your wound. Your wound burns, and the pain spreads to every inch of your body. You scream, then turn your head to the side to throw up. ${assassin} jumps up from the chair and pulls the doctor away. He rips the syringe out of your wound, and blood squirts from it.\n\n \"All right, thank you for your services…\" He pushes the doctor towards the door. The doctor puts the syringe in front of his eyes. The blood in the syringe slowly turns black. The needle is burnt and slightly bent. The glass has cracked, and blood is slowly leaking from the syringe. \n *goto docexam\n \n \n \n \n*label doccont\n*set Age 14\n*set Clothing 55\n*set Nrep false\n*set Nrep2 false\n*set Roommates false\n*set Glasswound false\n*set Trapwound false\n*set Markedwound false\n*temp saved false\n*page_break\n\nYou walk between rusty hangars in the huge industrial area on the other side of the district. This and the suburbs are left for you. You know you have to avoid setting foot in the city center. You walk on the left side of the wide road. It's paved with huge holes and cracks. Most of the road is covered with black tar and powder from the factories. In between the factories, yellow and red trees twist around. You check every car and bus, not only for loot, but you hope there's at least one working vehicle somewhere.\n\nYou walk through rotting corpses on a yellow bus. One of the decomposing bodies is lying on a big green travel bag. The body's blood and guts cover the bag. You look at the bag for a second, then turn around to leave. Your stomach grumbles. It's been days since you've eaten. You roll the bag off your back and take a small bottle out. You open it and pour the last drops of water into your mouth. The water purifiers have made life a lot easier. You throw the bottle out of the bus to soothe your anger a little bit. \n\nYou put the backpack on and turn to leave. After one step, you turn back and glance at the bag again. You close your eyes for a second, then kneel down by the body.\n*page_break\n\nYou push the gooey body off the bag. Its rotten, dark meat and insides stretch as you push it against the seat. You grimace and grip the zipper. With a swift move, you pull it open, hoping to find some consumables inside. The bag is filled with cash, most of it already soaked in dark red blood. You stand up and kick the bag against the back of the bus, then jump off. No wonder this side of the district is empty. In the distance, Aviatrixes are circling above a group of bodies. You take a right turn at a collapsed factory. Its huge chimney is broken into several huge pieces and lies across the road. \n\nA tall building stands at the end of the road. It used to be a glass building, but apart from a couple of cracked panes, only the frame is left from the outside of it. You climb over the broken chunks of huge concrete blocks, then walk through the doorframe. Glass crackles under your feet. The building is slowly falling apart, hence the chunks of concrete and wooden blocks in the lobby, where turnstiles still stand. You jump them and head up the stairs. Everywhere you go, glass crackles and pops under your feet. \n\nApart from broken computer parts, you can't find anything in the offices. You head upstairs and hear noises above you. You walk up the stairs as quietly as you can with the glass shards under your feet. On top of the building, a meeting room with open doors comes into view. Three of its four windows are intact, but the table in the middle is broken in half. A balding man with a middle-aged woman and a small child in fancy suits stand with their backs to the window. In front of them stands a man in a bulletproof vest, who's aiming a pistol at them.\n\n\"Last warning, give me the bag, or I'll kill you one by one. I'm fed up! This isn't the district anymore, you can't control me any longer!\" the man shouts. You take your pistol in your hand and step closer. The glass crackles under your feet, and he swiftly turns around. \"Take a step closer, and they'll all die! Just walk away…this is not your fight…\" He keeps switching from you to them with his weapon. The woman sobs quietly, along with the child. The man stands there with his arms up and looks at you. You grip your weapon firmly.\n*fake_choice\n\n #Save them.\n  *set saved true\n  You raise your pistol, and he turns towards you. \"Why are you risking your life for someone you don't even know?\" He breathes hard, and his finger shakes on the trigger. You slowly lower your weapon and take a step back. The man keeps looking at you, then glances back at the family. You swiftly raise your weapon and fire a couple of bullets at him. They sink into his chest, and he stumbles back. He waves the pistol around and keeps pulling the trigger until the weapon empties. \n  \n  He trips and falls towards the window. The woman tries to pull the little girl away, but she fails. The windows breaks, and the little girl's scream fades away, until it stops.\n\n \n #Walk away.\n  You holster your weapon and head down the stairs. The woman and the child sob, and the man shakes his head. The guy in the bulletproof vest walks closer to them as you walk down the stairs. You vault over the turnstiles, and as you set foot outside, the man in the vest jogs down the stairs past you. \n  \n  \"Thanks, kid.\" He hurls a bottled water at you from the bag and keeps jogging away. You take a few sips of the water and glance up at the building. The family is standing at the window, looking at you.\n \n\n\n*page_break\n*set Clothing 0\n*set Age 16\n*set Nrep true\n*set Nrep2 true\n*set Roommates true\n*set Glasswound true\n*set Trapwound true\n*set Markedwound true\n*set Radiation 90\n*set rads true\n\"It's my fault…I shouldn't have let you go in after I knew about the radiation…\" ${assassin} taps your veins. You swallow the big lump in your throat and try to wipe your heavily sweaty face. The rope tightens on your wrist as you try to move your hand. \n\n\"Sorry…\" ${assassin} injects something into your veins. Your pupils widen, and you can only see patches of gloomy figures. Cold shakes run through your body. You shiver as every joint in your body hurts. You squeeze your eyelids shut in pain and pass out once again.\n*page_break\n*set Clothing 55\n*set Age 14\n*set Nrep false\n*set Nrep2 false\n*set Roommates false\n*set Glasswound false\n*set Trapwound false\n*set Markedwound false\n\n\"And what about your family? Parents, siblings, anyone?\" the balding man asks.\n\n\"Dead.\" You kneel down next to the small campfire you made on the back of an army truck, tending to it. The truck is missing all of its wheels, but the canvas is more or less intact.\n\n\"Which district are you from?\" he asks as he stands up from the small, built-in bench on the side and sits down in front of you.\n\n\"Ignobilis.\" You take a small branch from the pile you've collected and throw it on the fire.\n\n\"Thank god you're not a Pauper. They're pretty filthy…we're Dives.\" The man chuckles softly.\n\n\"You were.\" You sit down and pull your knees up, then rest your hands on them.\n\n\"Were what?\" The man leans back and tilts his head.\n\n\"You were Dives. Not are. And it doesn't matter anymore.\" You keep staring at the fire. You both remain silent.\n\n*if (saved)\n \"I…I still can't believe it's been weeks since my daughter is gone. You have no idea what it's like see your child die sooner than you…but I guess the world we live in now is anything but rewarding. That man was our bodyguard in the district. But after the district got attacked, we fled. Then he turned on us for the food. I just wish my wife could process it, as much as the situation allows us.\" He looks towards the back of the truck. The woman is sleeping with her knees pulled up. Your jacket and the man's coat are serving as her sheet.\n \n \"She hates me.\" You mess with the fire with a stick, then look out the back of the truck, onto the open street.\n \n \"She…doesn't hate you. You tried to help, and you didn't kill us for our edibles. If you hadn't helped, who knows what would have happened? I think we'd all be dead. She just hates the situation, and herself for not being able to help.\" He looks at the bag. \"That reserve will run out rather soon now. What then?\" He stands up.\n\n \"We'll have to find more if we're going to survive.\" You look at him. The man remains silent for a while. \"I'll get some rest. You should do the same.\" He sits, then lies down on the bench.\n \n You lie down on your stomach next to the campfire, watching the dark, industrial streets until your eyes close.\n \n\n*if (saved = false)\n Your stomach grumbles, and it hurts so much that you have to give it a firm rub.\n \n \"I…still don't know why you didn't kill that man. He was our bodyguard back in the district. When the district got attacked, we fled, and we thought he would still protect us. He lured us up there, then took our only consumables. My wife says I should be happy, because at least we're alive…but it'd be better if we weren't starving.\" The man looks at the back of the truck. The woman is sleeping with her arms around the curled-up little girl. Your jacket lies on her, and the man's coat lies on the woman, serving as their covers.\n \n \"We can barely find any food. And what we do is usually disgusting. What happens if we can't even find that anymore?\" The man turns his head to you.\n \n \"We'll find food. One way or another.\" You mess with the fire with a stick, then put it down next to the campfire. The man remains silent, then stands up.\n \n \"I'll get some rest. You should do the same.\" He sits back on the bench and lies down. You keep sitting at the campfire, looking out of the back of the truck at the dark, industrial streets.\n\n \n \n*set Clothing 0\n*set Age 16\n*set Nrep true\n*set Nrep2 true\n*set Roommates true\n*set Glasswound true\n*set Trapwound true\n*set Markedwound true\n*set Radiation 80\n*page_break\n\"This? This is why you've been taking medicine from the lab for almost a week now?!\" The General points at you.\n\n\"Yes,\" ${Assassin} replies as he pulls the needle out of your vein and puts the syringe on the table.\n\n\"That was the last one.\" General ${general} shakes his head. \"They're already pointing fingers at each other. Also, you've used a dose big enough for several people on him already.\"\n\n\"No. You owe me. And now you owe him, as well. Neither of us risked our lives for dumb reasons, because we had nothing else to do. We trusted you and your decisions. We had to, anyway.\" ${Assassin} stands up and looks at you. \n\n\"I will not risk my remaining reputation for this! And besides, how are you even alive? And I want to know the truth this time, I know you didn't wear a bulletproof vest. You never did, and how come you don't wear a gas mask? Answer my questions, while we're talking about trust! Give me a reason to trust you!\" The General slams on the door with his palms.\n\n\"Why? Does it bother you to see me alive? I will continue to do what I feel is right. One way or another.\" ${Assassin} crosses his arms. ${general} storms out of the room, slamming the door behind him. The bed and your clothes are soaked in sweat. Your mouth feels dry, as if you've been eating sand. You try to say something, but all you can do is moan. The General leaves, and ${assassin} grabs a plate. He sits down at the table to feed you. Halfway through, your stomach rumbles. You shake your head, then you close your eyes.\n*page_break\n*set Clothing 55\n*set Age 14\n*set Nrep false\n*set Nrep2 false\n*set Roommates false\n*set Glasswound false\n*set Trapwound false\n*set Markedwound false\n\n\n\"So…you're saying we shouldn't go deeper into the district? Why?\" the woman asks. You're walking through the blocks of houses behind the factories. It could be around dusk. You walk into a house and begin to search for anything edible.\n\n\"More creatures. And there's a new group killing everyone,\" you reply as you open the fridge and find a severed head inside. You close it back and look around to see if anyone noticed it apart from you. The ground floor seems to be empty, so you head up the wooden stairs. They creak loudly, and the woman follows you. You reach a hallway. The floor is wrecked, and the room in front of you seems to be the only one intact. Its grey door is closed. \n\nYou open it, and a skinless creature is sitting on the floor. It looks very thin, and it's pinching the meat off of another dead skinless creature's face. It stuffs the dark red meat into its mouth, then turns to you. It jumps up from the ground and launches itself towards you with blood splattering from its growling mouth. You can barely step away. You rip the knife out of its sheath and jump up to stab it in the top of its head. Its skull shatters under the knife. Its eyes snap back, and the creature falls back like a log. You take the knife out and put it away.\n\nThe woman freezes for a second, then steps back and begins to head down the stairs. \"Where have you learned this?\"\n\n\"Don't know. Grew up like this.\" You shrug and follow her downstairs.\n\n\"If you can do such things, why don't we head where we can find something to eat. Deeper into the district. And why didn't you save my daughter…\" She turns towards you at the bottom of the stairs.\n\n\"It's not only the creatures you have to be afraid of anymore. People are the real threat,\" you say, not even hearing the last part of the sentence. A fresh memory of the recent events appears in your head. The reason you're here now, on your own. You frown slightly with a disgusted look on your face. \"We should stay here for the night, it's getting dark.\" You walk into the kitchen and hop onto the counter.\n*page_break\n*set Clothing 0\n*set Age 16\n*set Nrep true\n*set Nrep2 true\n*set Roommates true\n*set Glasswound true\n*set Trapwound true\n*set Markedwound true\n*set Radiation 70\n\n*if (loverstatus)\n \"${firstname}….\" You open your eyes to find ${lover} sitting next to you on the bed. \"You didn't come back for days…I feared the worst…I had to search for ${assassin} to tell me something!\" $!{heshe2} rests ${hisher2} head on your chest. $!{heshe2} wraps you in a hug. Every joint in your body aches as ${heshe2} hugs you. It feels like needles in your bones. You hiss in pain, then frown. \n \n \"Sorry…you'll be fine. I know it!\" $!{heshe2} kisses your lips, then stands up. \"I'll visit as much as I can.\" $!{hisher2} eyes get wet. $!{heshe2} wipes them and leaves the room. You find yourself alone. A large lump has formed in your throat, which you can't swallow. You turn your head to the side and throw up, then you put your head down again.\n \n\n \n*if not (loverstatus)\n\n \"Kiddo…what's up? Do you really think you'll survive this? There's a level of radiation that your body can't handle. Your dose is lethal. Let's face it, you'll die in that bed. Furthermore, you've been tied up by your 'friend.' Your new friend would do you best if he just shot you in the head. That would be the best thing to do. But also disgusting and horrible. Because that's death. A horrible and disgusting experience. Wanna know what's worse than that? Suffering. Lookie, you're already doing that. Tell me when you're about to make the right choice, and give up. I'll surely be here.\" ${capturer1} leans against the wall and keeps watching you. \n \n You try to move your limbs, but it feels as if a thousand hot needles were poking your joints. A large lump has formed in your throat, which you can't swallow. You turn your head to the side and throw up, then you put your head down again.\n \n \n*page_break\n*set Clothing 55\n*set Age 14\n*set Nrep false\n*set Nrep2 false\n*set Roommates false\n*set Glasswound false\n*set Trapwound false\n*set Markedwound false\n\n*if saved\n\n \"Well…that was our last piece of food,\" the bald man says as he throws away a beef jerky wrapper. The wind grabs the wrapper and carries it off the roof. You're sitting on the roof of an apartment building at the edge of the city center. Trees and plants surround you. In the distance, you can slightly see the center of the district. Rabid and mutated creatures run around. Sometimes you hear a gunshot, or a scream.\n \n \"Are you going to make a campfire? I'm cold,\" the woman mumbles, staring towards the city center.\n \n \"No, we don't want to be seen,\" you reply and lie back on the roof. You watch the harmony of the stars and the moon shining down on you.\n \n \"Well…I guess that makes sense. We should go back inside and find a suitable room,\" the man says and opens the door leading into the flat. \"Honey, get some rest.\" He looks back at the woman.\n \n \"Yes. I'm planning to do that,\" she says and stands up. You stand up as well and head towards the door being held by the man. The woman spreads her arms and lets herself fall off the building. You freeze, then look at the man. He screams and runs down the stairs. You run after him, trying to tell him to keep his voice down. You rush out of the building. The woman lies there, impaled on a broken iron fence. The man screams and sobs next to her. You try to tell him to keep his voice down, but he doesn't even hear you. Footsteps and growling comes from all around you. You take your weapon out and cock it.\n *page_break \n \n \n \n \n \n*if not (saved) \n\n You're sitting on the roof of an apartment building at the edge of the city center. Trees and plants surround you. In the distance, you can slightly see the center of the district. Rabid and mutated creatures run around. Sometimes you hear a gunshot, or a scream.\n \n \"I'm cold…can we go inside, or build a campfire?\" The little girl curls up in her mother's arms. They look at you.\n \n \"No…it wouldn't be good to draw attention to ourselves.\" You lean back on the roof and watch the beautiful harmony of the stars and the moon shining down on you.\n \n \"I'm very hungry.\" The little girl rubs her tummy. Immediately, your stomach grumbles.\n \n \"We all are, honey…\" The woman rubs her head. \"But your dad should eat as well.\" He hasn't really been eating in the past weeks.\n \n \"Well…we have one more beef jerky left. There you go.\" The man opens it and throws the wrapper away, then hands it to her with slightly trembling hands. \"I'll be fine.\" The man smiles. She eats it in complete silence. The only thing you hear is her humming.\n \n \"I think we should get some rest. I can't keep my eyes open.\" The man stands up and opens the door leading into the building. \"Let's find a room suitable for us.\" \n \n The woman walks inside with the little girl in her arms. You follow them and go into separate rooms without a word. Your bed doesn't have a mattress on it. You lay your jacket on the metal frame and put your backpack under your head. The cold metal pushing into your bones is a very unpleasant feeling, but you've had worse.\n *page_break The next day…\n \n You jump up to a horrible scream coming from the other room. Your heart beats in your throat as you rip the door open and rush inside. The man is lying on the bed with closed eyes. The woman sobs and screams next to him. She shakes him furiously, but the man doesn't move. The little girl cries next to them. You try to calm them down and tell them to keep quiet, but they can't stop and ignore you completely. You close the door behind them. You walk back into your room to put on your jacket and backpack. You close the room and head out to search for consumables in the neighborhood.\n \n The day goes by slowly, and you're only able to find a small, leaking can of beans. You knock on their door, then open it. The little girl is asleep on the ground, and the woman just keeps looking at the man's body. You walk inside and offer her the can, but she doesn't take her eyes off the body. You put the can next to him and head into your room. You lie down again, with an empty stomach.\n \n You wake up the next morning and knock on their door. You open the door to find an empty room. You look around, but the only thing that's left in the room is the man's corpse. You take one last look at him, then close the door behind you. You wait for a while, to see if they come back. After an hour of waiting, you suspect that's not their plan, so you leave the building.\n *page_break\n \n*set Clothing 0\n*set Age 16\n*set Nrep true\n*set Nrep2 true\n*set Roommates true\n*set Glasswound true\n*set Trapwound true\n*set Markedwound true\n*set Radiation 60\n\n*if (loverstatus)\n You open your eyes and feel ${lover} sleeping next to you. $!{hisher2} arms are wrapped around you. Your muscles and bones hurt, and you're soaked in sweat. ${assassin} is leaning against the wall. When he realizes you're awake, he looks at you.\n\n \"I don't know if what I'm doing is helping or not. We'll see.\" He steps closer and sits down on the table. \"I've been wondering, though. How easier it could have been for you to just be on your own. Being your own boss, doing what you feel like. But…I also know why you're here. Why both of us are here.\" He looks at ${lover}. \n \n \"Apart from ${himher2}. You can safely put your head down to sleep. You don't have to hunt for food or water. But I guess there comes a time when those things don't compensate for what you have to endure day by day. But…don't bail. You'd break ${hisher2} heart. Also, with every day, the chance to find the Oracle draws closer. You might not even remember anything we've talked about just now. But I want you to know, I don't plan to rot here forever. Especially since they screwed up the past few weeks. Just wait, and we'll bail when the time is right.\" He clears his scratchy throat. \"Anyway…sleep, rest. Take as much time as you need.\"\n \n\n\n*if not (loverstatus)\n You open your eyes and immediately, your bones and flesh burn with pain. ${Assassin} is leaning against the wall. When he notices that you're awake, he steps closer. \"I'm going to be honest…I have no idea if what I'm doing here is helping or not. But I'll keep trying.\" He sits down on the table. \n \n \"For a while, I wondered why you don't bail on us. After all, you know how to survive on your own. But I always come back to the same conclusion. The free food, water, and safe place you can put your head to rest every day compensates for the things you have to go through daily. That's why you're still here. In fact, that's why most of us are still here. The last time someone laid in that bed…\" He stands up and walks back to where he was. \"Anyway…just sleep. Take as much time as you need, ${firstname}.\"\n\n\n*page_break\n*set Clothing 55\n*set Age 14\n*set Nrep false\n*set Nrep2 false\n*set Roommates false\n*set Glasswound false\n*set Trapwound false\n*set Markedwound false\n\nYou walk down the suburb's cracked streets. The pavement is covered in dried blood and rotting corpses. The houses are barely standing, some of them already collapsed. You check the houses for loot, but you can't find anything. Recent times have been hard and depressing. You sigh and kick the door on your way out. You walk towards the next house, and hear an argument coming out of it. \n\nYou rest your hand on your weapon and peek inside the house. You find two young boys shouting at each other. One of them is wearing a striped T-shirt, and the other one is wearing a pink hoodie. Judging by their appearance and their voices, they're at least two years younger than you. You walk to the door and peek inside through a small hole in it.\n\n\"You can go out if you want, but I'm not! We have plenty of food in the basement…we've been safe until now!\" The smaller boy in the pink hoodie points towards the uncovered trap door under the stairs.\n\n\"Our grandma is lying dead down there!\" the other, taller boy in the striped shirt shouts, holding his tears back. Every time he takes a breath, the gas mask whistles quietly.\n\n\"We'll drag her out or something, I don't want to leave everything there for others to take. We are safe there and no one ever finds us down there!\" The smaller boy takes a few steps towards the stairs, then looks back at the other boy.\n\n\"I won't go back there. I'm tired of hiding! We'll find others, get food and everything.\" The taller boy limps towards the door. He turns back, and they keep looking at each other. They quickly turn away from each other and head their separate ways. You take a few steps back, and the door swings open. Your hand is still on your weapon. The taller boy looks at you with wide eyes, then limps back into the middle of the room. \n\n\"Erm…hi…\" He glances at your hand tapping the weapon. \"Are you going to hurt us?\" he asks and takes small steps towards the other boy.\n*fake_choice\n\n #Rob them.\n  *set Evil %+10\n  \"Not if you step aside and obey.\" You walk inside as you flip your pistol into your hand. You aim it at them and order them to climb down the ladder under the trapdoor. They climb down, into the smallest decontamination chamber you've ever been in. The chamber is loud and clicks several times. Your shoulders touch through the process. When it's done, the door only opens halfway. You push them out of the chamber, then step out after them.\n  *label basementdesc\n  \n  \n  You find yourself in a huge, light-brown basement. Hundreds of melted candles lie around. A couple of board games are lying on the ground and on a table in the middle of the room. The only sofa in the room has several springs pushing the sponge out. In the room to your left is a double bed.\n\n  The boys walk into the room and sit down on their bed. In the moldy room in front of you, there are shelves packed with food and filters for the gas masks. You stuff most of the food into your backpack, along with the filters. In the other room, on a single bed, an old woman lies peacefully. Under her bed, there are several handguns, a broken knife, and ammunition. You pocket the ammo for your weapon, then walk out of the room. The boys in the other room are looking down. \n  \n  \"Thanks, kids. You should learn to use one of those 'instruments' under her bed. You won't last long otherwise,\" you say, spinning your silver pistol.\n  \n  The younger boy jumps up and rushes towards you. He pulls up the sleeves of his pink hoodie. \"You can't take everything! It's ours!\" He reaches you and grabs your jacket. You push the barrel of your pistol against his forehead and extend your arms roughly, pushing him away from you.\n  \n  \"That's where you're completely wrong. I can do whatever I want, whenever I want. Because the world works like that, and allows me to. I could shoot both of you right here. And no one would care,\" you say as the younger boy walks back into the room and sits down on the bed next to his brother. You holster the weapon and leave the building. You glance back from the doorway before you head further into the suburb.\n  \n #Leave them.\n \n  \"No, I don't plan to,\" you say and walk down the stairs.\n  \n  \"Wait! Maybe you could help us…what should we do, stay inside or head out?\" The older boy limps towards the front door.\n  \n  \"I don't know,\" you reply, already walking down the road.\n  \n  \"Okay…could you tell us how to defend ourselves, what awaits us outside and stuff? We'll give you food or something for it.\" He walks down the stairs after you.\n  \n  \"No, and I don't care. Good luck.\" You glance back, then quicken your pace. They get further away from you, but the boy keeps standing on the stairs for a while.\n \n \n #Help them.\n  *set Evil %-10\n  \n  \"No, why would I do that?\" You walk further inside.\n  \n  \"Okay, then tell us, what do you think we should do? Would we be fine outside, or should we stay down there?\" the boy in the pink hoodie asks, stepping closer to you. Before you have a chance to answer, they begin to argue with each other. \n  \n  \"Okay, calm down, and lower your voices. Let's head downstairs.\" They lead you down the trap door, then close it. You walk into a small decontamination chamber. It's so small that your shoulders touch through the process.\n  \n  You find yourself in a huge, light-brown basement. Hundreds of melted candles lie around. A couple of board games are lying on the ground and on a table in the middle of the room. The only sofa in the room has several springs pushing the sponge out. In the room to your left is a double bed. In front of you is a moldy room with shelves packed with food, drinks, and filters. To your right, on a single bed, an old woman lies peacefully. Under her bed are several handguns, a broken knife, and ammo. The boy in the pink hoodie walks to the room and closes the door. \n  \n  \"So…what should we do?\" They walk into the room with the double bed and sit down on it. They keep looking at you, and the taller boy's gas mask still whistles quietly.\n  \n  *page_break\n  You walk into the storeroom in front of you and take a filter out. \"Breathe out and hold it before I screw the new one in,\" you say and begin to unscrew the taller boy's filter. When you screw the new one in, he breathes in. \"When your filter whistles like that, it's either not screwed in correctly, or it's damaged. When you get a funny taste in your mouth, or you find it hard to breathe, the bonding is beginning to get filled. That's a good time to change your filter.\" You lean against the doorframe and put your hands in your pockets. They keep looking at you, then the younger boy takes off his gas mask. He brushes away his long, blond hair.\n\n  \"What do you think we should do?\" He messes with his fingers.\n\n  \"Well…outside, creatures want to kill you, and most of the living people also want to at least just rob you. While no one knows that you're here, you'll be fine.\" You shrug slightly. The taller boy looks past you at the closed door, then looks down as he takes off his gas mask. His messy dark-brown hair is sweaty.  \n  \n  \"I can understand why you'd want to leave. Tell you what…I'll show you the basics and tell you what I know. If you decide to head out after that, good luck. If not…well, I can take her away. No problem. So?\" You push yourself away from the doorframe and step inside. They smile slightly, and you take your gas mask off.\n  \n  *page_break\n  In the following days, you tell them everything you know about the creatures and the situation outside. You take the pistol out from under the bed and have a couple of practice rounds with them. You have canned food with them for dinner, and you sleep with them on the double bed. It's very uncomfortable, but better than the floor. A couple of days later, you feel like you've taught them everything you can. You pick up your backpack and get ready to leave.\n  \n  \"Well, thanks for everything. We decided that we'll go out, like, daily, but spend the night here.\" The younger boy stretches his limbs on the bed. You look behind yourself, towards the closed door.\n  \n  \"It's fine…we'll take care of it. We have to,\" the older boy says as he puts on his dirty striped shirt. You smile and put on your gas mask. \n  \n  \"Do you wanna, like, team up with us? I think it would be cool. We have food for you as well.\" The boy in the pink hoodie stands up and walks in front of you.\n  \n  \"No thanks. I'm not teaming up. Not again,\" you say and turn around to leave. \"Good luck…and remember, don't trust anyone.\" You walk towards the decontamination chamber.\n  \n  \"We wouldn't have known you if we hadn't.\" The older boy crosses his arms in the doorway, and they smile. You chuckle slightly as the decontamination chamber's doors close in front of you. When it's done, you climb out. You close the trap door and cover it back up with the carpet. You walk out of the front door and head deeper into the suburb.\n  \n  \n  \n  \n*page_break\tMonths later…\n\n\nYou're sitting on the rotten front seat of a light-blue minivan. On the rear seat lies a headless corpse. It feels very uncomfortable. Outside, a sandstorm blows heavily. The hood of the minivan is barely visible through the heavily cracked windshield. The minivan wiggles left and right, then creaks under you. Sometimes, mutated animals smack against your minivan. You jump a little every time, and grip your weapon with sweaty hands.\n\nYou sit through the day, but the sandstorm still doesn't seem to be stopping. Your eyelids get heavier with every blink. You climb onto the rear seat and kick the corpse down. You put your legs up on the seats, avoiding the corpse. You rest your head against the door. The swishing sound surrounds the minivan. Eventually, your eyelids close.\n*page_break\n\nVoices are coming from all around the minivan when you wake up. You swiftly sit up and look around. The minivan's windows are covered in a thick layer of sand. \n\n\"And then, she just left…she took all our ammo and most of our food, and just bounced overnight. Would you believe that?\" a man says.\n\n\"Well, you've never been known for your incredible brain,\" another one answers, and a couple of others begin to laugh. Judging by the voices, there are at least three others. You lean back with your pistol in your hand, keeping as quiet as you can while you listen to their conversation.\n\n\"Man…am I glad the sandstorm is gone.\"\n\n\"Yeah mate, but a fog is coming. We should move.\"\n\n\"Sure.\"\n\n\"Hey, do you never check cars? Maybe this one is working…\"\n\n\"None of them work. The ones that could have a slight chance of working have all been taken by the military.\"\n\n\"Maybe there's a pot of gold inside. Come on, wait for us!\"\n\nOne of the man's shadows appears by the driver's door. Another one appears at the rear right door, the one you're aiming your gun at. He seems to be standing with his back to the car, waving at his friends. In the split second you have to think, you holster your weapon and whip out your knife. You slide down the carseat and carefully open the door. It pops out as you pull the door handle. He freezes and begins to turn his head back. You push the door open and wrap an arm around his neck. \n\nYou drag him inside and push the knife against his throat with your other hand. He screams, and his friend rips the front door open. \n\n*page_break\n\"Let him go! Right now, or I'll kill you!\" the small man screams from the front, holding a machete. Two others run back and stop at the open door in front of you. They shout, aiming their brown pistols at you. You move slightly from left to right and tell them to back off.\n\n\"Mate! Get him from the other side!\" the tall man tightens his grip on the pistol in front of you, and his friend in a tracksuit runs to the other side. You press the knife harder against your hostage's bearded neck. Blood slowly runs down the blade. The tall man calls his friend back, and they keep aiming at you. All three of them are shouting at you. \n\nAs you keep holding the knife against his throat, and they keep shouting at you, the fog reaches the minivan and covers the whole area. The man with the machete suddenly goes silent. He screams, and the front door of the minivan slams closed. The two men in front of you turn in every direction, aiming their weapons. \n\nThe taller man screams and slams against the van with his back. He kicks in the air, then slides down the side of the van. The other man makes a run for it. Quick footsteps follow him, as if an animal's nails were touching the ground, only sharper. You slide closer to the end and kick your hostage out. He panics and tries to get back inside. You pull your pistol out and close the door on him. \n\n*page_break\nThe sand that was covering the windows has mostly fallen off. You slide down between the front seat and the back seat, gripping your weapon tightly. The man stands in the fog and picks up the weapon from his fallen friends. He aims it at you with a swift move, then something pushes him down to the ground. He screams for a second, then everything goes quiet.\n\nYou sit there with your chest pounding. Eventually, a creature emerges from the ground. Its body is bent, and the spine is clearly visible. It's pushed out from his back. It has long, thin, rotten grey limbs ending in long, sharp nails. Its several black eyes are all around its deformed head, and they move around fast. \n\nIt doesn't seem to have a mouth. It keeps scratching its dark back furiously. Its whole body slowly shakes, and it twitches its head around. It glances at the van a couple of times, then begins to walk deeper into the fog. It drags its long nails on the ground. The sound sends shivers down your spine, but tells you how far away it is. You keep gripping your weapon and wait until the fog has passed, fear filling your whole body.\n\n\n\n*page_break\n*achieve memories\n*set Clothing 0\n*set Age 16\n*set Nrep true\n*set Nrep2 true\n*set Roommates true\n*set Glasswound true\n*set Trapwound true\n*set Markedwound true\n*set Radiation 40\n\nYou open your eyes and just wait for a while for the dizziness to pass. The nauseous feeling hasn't passed yet, but it has softened slightly. Your muscles and joints hurt, but the pain is bearable. You try to sit up, but the ropes pull you back. You're soaked in sweat, and you can't feel your shirt on yourself under the cover. After you're awake for a while and have neither passed out nor thrown up, you begin to get your hopes up. \n\nThe only thing you can't really bear is your own smell. Several syringes and vaccines lie on the table. All you can hear is your own breathing in the room. You're lying alone in the room when the door creaks open.\n\n*if (loverstatus)\n\n\n ${lover} pokes ${hisher2} head in. When ${heshe2} notices that you're awake, ${heshe2} steps inside and closes the door. \"Hey…do you feel any better?\" $!{heshe2} walks closer and looks at the table.\n \n \"A little…\" you mumble in a scratchy voice. Your mouth feels just as dry as before.\n \n \"I'm glad. You know…I was worried to death.\" $!{heshe2} sits down on the bed next to you and caresses your cheek. $!{heshe2} smiles slightly, then ${hisher2} smile fades. \"We…have to talk…\" $!{heshe2} looks down. \"I don't want to worry for your life every time you leave. I've…fallen in love with you. I've gotten used to your little things. When I was thinking about the future a while ago, I got sad. Everything seemed so…hopeless. When I think about the future now, I'm smiling. I imagine life with you, I dream about the rest of my life with you. You are my future…and I don't want my future to end one day. You have to quit this kind of 'work,' or whatever it is. Promise me that you'll quit when you have the chance, and that you'll look for that chance.\" $!{heshe2} looks at you with a fake smile on ${hisher2} face. \n \n Tears gleam in ${hisher2} eyes. Silence falls upon the room. You keep looking in ${hisher2} eyes, and words don't come out of your mouth. You can't promise something you might not be able to, or not want to keep. After a couple of long moments, ${assassin} walks in. \n \n \"${lover}, I need you to leave us alone. Thank you.\" He closes the door.\n *if (deadcount >=3)\n  *set Turning true\n  \n  \n  \"Okay…\" ${lover} leans in to give you a small kiss. \"Ouch!\" $!{heshe2} says as ${assassin} gently pulls ${himher2} away and escorts ${himher2} out the door. He closes the door and turns to you.\n  *goto radconts2\n \n *else\n \n \n  \"Okay…\" ${lover} leans in to give you a small kiss. \"I love you!\" $!{heshe2} says before ${assassin} pulls ${himher2} away gently and escorts ${himher2} out the door. He closes the door and turns to you.\n  *goto radconts2\n \n \n*else\n\n\n ${capturer1} slides in and slams the door behind him. \n \n \"Kiddo! Am I just so happy to see you bursting in healthiness! I can barely control my legs, they want to do the twist. But I'll control my endless joy.\" He swipes the syringes and vaccines off the table and jumps on it. His shirt is halfway unbuttoned, revealing his scarred chest. \"Do you know what I miss? Music. Good music. Music helps with feelings. When I was torturing or killing my enemies, I always had some good music banging around inside my head.\" He leans closer to you and grabs your face in his sometimes cold, sometimes hot hands. He laughs at you for a while, then he lowers his head and his face turns into an evil grin.\n *if (deadcount >=2)\n \n  \"Ah…you've come a long way, kiddo. But you'll never be the same as before. Do you realize that? No amount of medicine will ever cure what you're becoming. You can delay the inevitable, but you can't avoid it.\" He releases your face, and your head falls back onto the pillow. But don't worry for a second, kiddo! When your time comes, I promise…I'll bring my fallen enemies to you.\" He laughs and dances out of the room. \n  \n  He keeps the door open while he does a spin. He reaches in to grab the handle of the door. He begins to shuffle backwards, then closes the door. You lie on the bed for a while in passing heat waves, when eventually, ${general} walks into the room.\n  *goto radconts2\n  \n *else\n \n  \"Ah…you must feel pretty satisfied with yourself. You destroyed the only thing that mattered to me. The only thing I cared for. All that work…for what, in the end? To have some…miserable, weak boy and his friends destroy everything?\" He leans closer to your face. \n  \n  \"I take it your only explanation is that you wanted to surprise me. With ${base2}. I really hope that was your plan. For your own sake. If not, the radiation won't be the first thing to kill you.\" He winks and slams your head onto the pillow. He walks out of the room, then leans inside to close the door behind him. You lie on the bed for a while in passing heat waves, when eventually, ${general} walks into the room.\n  *goto radconts2\n \n\n\n \n\n\n*label radconts2\n*page_break\n*set Radiation 30\n\nHe sits down on the table and taps a fresh syringe. Without saying anything, he grabs your arm and injects its contents into your vein.\n\n\"You've been passed out for quite some time now…but I'm glad you're feeling better. My efforts weren't worthless, after all. I took care of you, like you were my own son.\" He puts the syringe down. \"Anyway…now that you can pay attention instead of throwing up, or passing out, I want to talk with you about something else.\n\n\"You must have noticed that I stripped you of your shirt. I wanted to take a closer look at your wound. That's the reason behind that. I couldn't get rid of the thought. I've seen that wound somewhere…\" ${assassin} looks away. \n\n\"I would pick up a drink or smoke something right now. But I'm doing neither. In fact, I don't do any of the things that would humanly be required.\" His red eyes fixate upon yours. He stands up and takes off his hoodie and shirt. He stands in front of you with his grey body, covered in bullet, scratches, and deep cut wounds. A grey shadow is burned into his shoulders. You glance at them, and he turns around. Your heart throbs at the sight of a huge, grey sun burned into his back. He turns around again. He thinks for a second, then lowers his hand. \n \n\"Judging by your wound, one of them struck you. But you survived. Sounds familiar.\" He sighs and continues as he puts his clothes back on. \"When this all started, I was hiding with my wife and ${Roommate}. Killing others was not new to me, you learn how to take care of yourself when you grow up as a Pauper. Guess that's why it was so easy destroying the Dives, and conquering so much. But I'm not going to get into the details about my district, it was rough, and I learned to kill. We were hiding in the hospital basement. I went out every day to get food and whatnot. That was the perfect plan.\" He rubs his face.\n*page_break\n\n\"One day, I was coming back empty-handed when I saw a couple of these guys in striped and checked shirts. They were just forcing the way down open. I shot one of them and hid behind the wall. The funny thing is…if my wife hadn't come out to try and save me…${Roommate} and I wouldn't be standing here. Anyway…I told ${Roommate} to lock herself in. I didn't want her to see her mother lying dead, nor getting her killed. But I was so angry, I wanted to get justice. The last guy ran away, and I ran after him. I chased him into the sewers. After taking turns in the darkness, I heard this growling sound from behind me.\" He shakes his head slowly.\n\n\"I turned around, and that skinless creature was right in my face. I was turning back around to run when I heard a gunshot. I stopped and saw the thing turning around and running towards the man, leaving a trail of blood behind it. I tried to do the same, but I just fell. My endless anger just became a mixture of horrible pain and desperation. My legs went almost totally numb. I could barely move them. I was rotting away in the sewers for days. Days later, I could stand up and limp back to the only person who matters to me…${Roommate}.\" He stops when you try to scratch your face, but the ropes stop you.\n \nHe stands up and unties your limbs. \"Long story short…one night when I took off my shirt, I saw the edges of the sun over my shoulder. I found a mirror and immediately inspected it. At first, it scared me to death. I was afraid I would die and leave her alone. Or worse. But I didn't turn. Then I heard about the Oracle. I could've endured radiation levels, no matter how high. That's why I was surprised I can't handle it anymore…\" He looks into your eyes again, then throws the ropes into the corner. \n\n\"I was the first one to visit the Oracle. The radiation around it is extremely high. My memory is cloudy about that. But I made a wish. I wanted to be there for my little girl…so I wished for immortality. And immortality I've gotten. I don't need to eat, drink, sleep, anything. But in return, whenever I take a fatal injury…someone I like dies. That's why I don't want to know others. That's why I don't want to like anyone.\" He shakes his head.\n*if (Keith >= 39)\n\n\n \"But…I've gotten to like you. I tried hard not to, but you're hard not to like.\" He remains silent for a while, then helps you sit up.\n *goto Ktalk\n*if (Keith \u003c= 38) \n\n\n \"I'm going to be honest with you, I don't really like you.\" He remains silent for a while, then watches as you struggle a little to sit up. \n \n \"I don't like your personality. I've had a good amount of time to think about you. I've come to the conclusion that you're just using people for your own advantage. That you'll bounce whenever you feel like the ship is sinking. Anyway…I might be wrong, or just simply paranoid. I wanted to discuss something else with you.\" He clears his throat.\n \n \n *label Ktalk\n \"I hate to mention this while you're still not quite yourself…but…when the time comes…I want you to be the one to get to the Oracle. It will put you in the same situation you're in right now, but I'll take care of you. That time is closer than you think. General ${general} says our chances grow with every day.\" He looks away from you as you fix the covers on your cold, sweaty body. \n \n \"I'm scared of death more than when I was vulnerable. I don't want to lose ${Roommate} one day when I get killed. I don't want to outlive her, either.\" He buries his face in his hands.\n *page_break\n\n *if (Turning)\n  *set Turnwound true\n\n  \"You should know what it feels like, even just slightly. Since you're not quite yourself anymore, either,\" he says, and a confused look appears on your face. He chuckles and rips the cover off you. At first, you don't know what to think, but then, you look at your wound. The black sun has grown and is slowly twisting. Its edges are way over your shoulder and side. The skin around it is grey, and hundreds of tiny spikes cover the wound.\n\t\n  \"Do you know what's going to happen if it keeps growing?\" ${assassin} crosses his arms. You run your fingertips over the surface of the hardened, spiky skin. The spikes are quite sharp. \n\t\n  \"You have no idea, do you?\" He crouches down, and you shake your head. \"Well, I wish I could tell you for sure. All I can do is guess. But I imagine my guesses are just like yours.\" He throws your shirt in your lap. \"Your secret is safe with me. Now please, go…I need some time to be alone. I need to think things through.\" He helps you up and guides you to the door. You leave, and he closes the door behind you.\n  *goto radcontend\n\t\n *else\n  \"But how would you know what it feels like, huh? You've gone through much? Well, you don't know the half of what I've been through. What ${general} has been through. What most of the people you meet have been through, and will have to go through.\" He sighs. \n  \n  \"Sorry…I just had…too much time to think I'm unlike myself. This is not me. I'm not paranoid, and I always know the answer or the right choice.\" He throws your shirt into your lap and begins to pace around the room. \"Please, go…I need some time to be alone. I need to think things through.\" You struggle to get up, and he pushes you towards the door. You leave, and he closes the door behind you.\n  *goto radcontend\n\n   \n\t\n*label radcontend\n*page_break\n\nThe dark corridor moves around as you try to place one weak leg after the other. The wall next to you provides support until you reach the front of the citadel. Your gas mask is hanging on the wall of the decontamination chamber. As the process goes on, you put it on. You step outside and cover your face. The brightness blinds you for a second and makes your stomach rumble. You carefully make your way to the chambers. The air feels hot and uncomfortable to breathe, even in your gas mask.\n\n*if (lungscar)\n You take a deep breath and rip the gas mask off. You stumble next to the nearest building, a taller apartment, and cough heavily. Dark, gooey blood sticks to your hand. When you're about to put the gas mask back on, you sneeze unexpectedly, filling your palm with more of the dark goo. You put your gas mask back on and drag yourself between the citizens and guards looking at you, heading for the chambers.\n *goto chamberscont\n \n*if (deadcount = 4)\n The colors of your surroundings begin to mix before your eyes. You blink hard and shove your gas mask onto the top of your head. Warm, fresh air fills your lungs. You take a deep breath and open your eyes. The colors have brightened. You can smell food from the apartment to your right, the gunpowder from the training fields, and the smell of those who haven't been able to take a shower for a while, including yourself. Anger fills you as you look at the citizens walking by, and your stomach begins to ache.\n \n \"Hey! Put that back on!\" A guard shakes you and pushes the gas mask in front of you. You blink heavily, then take the gas mask off as a coughing attack strikes you. You fall on your knees and cough heavily. Dark, almost black, gooey blood splatters onto the ground in front of you. You're about to get up when you unexpectedly throw up. Your vomit paints the ground in front of you in a mixture of orange and dark red. You wipe your mouth before you put your gas mask back on, then get up. You stumble through the small crowd of citizens and guards gathered around you and head towards the chambers.\n *goto chamberscont\n  \n*else \n You walk through the streets filled with citizens and guards. You stumble into some of them with a still-dizzy head. Some of them push you away and mumble something at you. You stop to pant for a moment, and a guard places his hand on your shoulder.\n \n \"What's up, where are you going? Want some help?\" He crosses his arms.\n \n \"The living chambers…I'll be fine, thanks.\" You make a thumbs up and stumble towards the living chambers.\n *goto chamberscont\n \n \n \n*label chamberscont\nYou climb up the stairs and walk into the decontamination chamber. Shivers run down your body as you walk through the corridor. Others walk around and chatter. You glance into the dining room and see them eating. You open the door to your room and fall through the table onto the bed. You lie on your bed and watch the spinning ceiling. \n\nYou turn your head towards the overturned table. A small paper with smeared blood on it is taped underneath the table, with a small chunk of hair next to it. You pick up the paper with shaking hands. As you lean back again, you begin to read it.\n\n[i]\"Good morning/afternoon/evening.\"[/i]\n\n[i]\"Pick whichever suits you best. Since you have not so generously declined my offer, I've decided to motivate you a little to find your way into my hiding place. No one has ever treated me like you two have before. I will not tolerate that. But whom I have taken, you must wonder. I shall not ruin the surprise, for the night is long and full of terrors, with your refusal you've made an error. The person I will brutally kill, is the one you secretly both hold dear. Find your way to my place around midnight, or I will be forced to pop a head just right. Come too early, and you'll be the one to get buried. Come alone, or it's a bullet you'll swallow. Where am I, the question is legit. Where both the almighty and the madness finds his way into your heart. I had time to prepare, let's hope you find your way here. You have no time to spare. Tick tock, tick tock, tick tock.\"[/i]\n*page_break\n\nAt the bottom of the note is a sad face with a clock drawn next to it in blood. You crumple the paper and throw it away. Despite your condition, anger, sadness, and fear take control of you. You sit up on the bed and kick the table several times, then pick it up and smash it against the wall. It breaks in half, and its legs fall off. One of the residents of the chamber opens the door to peek inside, and many other heads appear behind hers. \n\nYou stand in the middle of the room and pant. You look at them from the corner of your eye. They look at the broken table, then their eyes meet yours. They slowly close the door behind themselves. Your tantrum is the result of recent events and the never-ending agony you have to go through day by day. A couple of names you consider important pop into your head. You bury your face in your hands.\n\nYou have to find out where he's hiding. Without hesitation, you step over the table and head out of the chamber. You jog through the streets you just left. You push yourself through the group of guards in front of the citadel and head towards the laboratory. You step into the decontamination chamber, and the door begins to close behind you, then the light begins to flicker and the decontamination process begins. The whole process takes longer than you remembered. Silence falls upon the chamber, and the metal doors start to open in front of you, very slowly. When you see that you can fit, you squeeze through and head down the white corridor.\n*page_break\n\nA couple of doctors and patients are walking around, and they give you weird looks as you jog to the end with your gas mask still on your face. When you reach the grey door, you kick it in. Immediately, the tied-up body on the hospital bed catches your eye. Its eyes stare at the ceiling, with an incision running through the body. You step closer. Arrows run on each side on the ribs, pointing towards the incision on the grey body. Thoughts run through your head. You open the drawers, searching for rubber gloves, but they're all empty.\n\nNotes with [i]\"No\"[/i] written on them and sets of smiley faces are what you find. Back at the body, you roll your sleeves up. You shake your head and turn it away, then make way with your fingertips into the incision. You dig around the cold mixture of blood, organs, and meat. Your stomach tightens, and you close your eyes to take your mind off the process. You gulp and take a couple of deep breaths, then you feel something tough with your fingers. \n\nYou grip it and rip it out. It's a small vial, covered in blood. You run to the sink and open it, but nothing comes out. You slam the vial on the floor. It shatters, and a folded note rolls into the corner. You pick it up, carefully, not to smear too much blood on it, as it would mix with the blood on the note.\n\n[i]\"Where everything began. I suggest you ask around, to make it in time. But be careful. Spill the beans, and I spill some blood,\"[/i] the note says in blood.\n\nYou take some time to think about what this could mean. The only place you can think about is your school. That's where your journey began. The clue is nearly not enough. You storm out of the room and rush down the corridor. Where the corridor splits right, you bump into General ${General}, who was just making his way up from the depths of the forbidden area, the laboratory.\n\n\"What are you doing in here, rookie? How's your health, now that an insane dose has been given to you?\" he asks, crossing his arms. You only have a spare moment to think your answer through.\n\n\"I'm…okay.\" You look away for a second. \"I was searching for you,\" you reply, hoping he won't enter the doctor's room.\n\n\"Me? For what reason? After you and ${assassin} stabbed me in the back yet again?\" He frowns and rubs his chin.\n\n\"I have a riddle for you. Where does both God and Evil reside?\" you ask, giving your twitching wound a small rub. The General runs his hands over his bald head.\n\n\"Well, maybe the abandoned military base covering the route to the Dives. I heard they've gone crazy and shot each other. God, Evil, you decide in what's name. Why do you ask?\" He rubs his small moustache.\n\n\"Just asking. Gotta run now.\" You fix your gas mask before he has a chance to reply, then go through the horribly slow decontamination process. You leave the laboratory and head towards the citadel, bumping into citizens every now and then. You push through the guards talking in front of the building. You march down the citadel's hallway and burst into ${assassin}'s room.\n*page_break\n\nHe's sitting on the edge of his bed, holding a small thick paper that looks like an old photo. What you can see from his cheeks below his eyes, they're wet, and the scarf looks slightly moist. You step into the middle of the room, and he notices you and puts the picture away.\n\n\"You didn't knock. How long have you been standing there?\" he asks, clearly frowning.\n\n\"Not long…I just wanted to ask you a quick riddle. Where does both God and Evil reside?\" You lean against the counter.\n\n\"Why? Also, do you feel okay? You should be lying in bed.\" He hides the photo under his fresh pillow.\n\n\"Yeah…I'm okay. Could you answer, please?\" you say, your gas mask still on your head.\n\n\"The madness, I'd say the mad village. As for God, I don't know what would anything related to God be doing there. That place has been long abandoned by anyone sane.\" He rubs his shoulder.\n\n\"All right, thank you. Take care!\" You turn towards the door. He stands up and grabs your arm.\n\n\"Are you hiding anything from me?\" His eyes turn angry, and his grip tightens on your arm.\n\n\"No…I was just asking.\" You clench your teeth as your weakened bones hurt in his grip. He releases you, but keeps watching you as you leave his room. You step out of the decontamination chamber and walk down the stairs. You would take a right turn, then left towards the city center, but a small group of guards block your way. You squeeze through them, but one of them grabs the back of your shirt and chokes you with your own clothing, to your surprise.\n\n\"You pushed us away like dirt for the third time now. Who do you think you are? You've been the one marching around with General Loser. You two will disappear if you keep your act up, so be careful who you mess with.\" The guard behind you tightens his grip, and the clothing tightens around your neck. \"Understood?\" he says, and the rest of the guards chuckle quietly.\n\n*fake_choice\n #\"Understood.\"\n  \"Understood. Won't happen again,\" you reply, not even looking back.\n  \n  \"Good. Your kind should know their place.\" He releases you and continues chatting with the crowd as you sink your hands into your pockets and head towards the city center. You don't have time to waste.\n \n \n \n #Teach him a lesson.\n  *set hurtem true\n  You remain silent for a second, then sigh.\n  \n  *if (knife)\n   You rip your knife out of its holster. When you turn around, you grip his hand with your other arm and hold it tight. For a split second, you both look at each other, then you jam the knife into his upper arm. He screams, and you hold the blade against his throat.\n   \n   \"If any of you mess with me again, you will all be eliminated. Brutally.\" You wipe the knife on his clothes, then sheathe it. You release him and walk down the stairs, towards the city center. You glance back to see a crowd gathering behind you.\n\n  \n  *if (pistol)\n   *set bullets -1\n   You rip your pistol out of its holster. You cock it and turn around, trapping one of his hands. You smack the barrel of the pistol against his forehead. For a moment, you both look at each other in silence. After that, you lower your weapon and send a bullet into his thigh. He screams in pain, then falls on the ground. You aim the weapon at the rest of them.\n   \n   \"If any of you mess with me again, I'll end you. All of you.\" You walk backwards, then holster the pistol. You walk down the stairs, towards the city center. You glance back to see a crowd gathering behind you.\n\n  \n  \nThe city center is filled with more and more people, listening to the preaching priest. [i]\"We were created to be free. What are we now, if not slaves of a broken system? We have no freedom, how are we supposed to serve our leaders? I have no church, how am I supposed to serve the lord? The last true church is left, rotting away in Ignobilis! We should march there. March there, and pray to the almighty for better days!\"[/i] He speaks furiously. Guards approach in the distance, making their way towards the priest. You try to walk through the crowd as quickly as you can.\n*page_break\n\n\"${firstname}.\" ${Roommate2} pushes through the crowd and walks with you towards the gate, as you don't stop for him. \"Have you seen ${Roommate}?\" He escorts you to the entrance.\n\n\"No, I haven't. Where does both God and Evil reside?\" you reply as you nod at the guards.\n\n\"Weird…she hasn't been home or at work for days now. That's very unlike her. I hope she's okay. Also…I don't know. Maybe the old graveyard and crematory complex behind us? I don't know. But that part of the district has always been pretty scary. Why do you ask? Where are you going, anyway? I just wanted to ask something…\" He steps back when the guards shake their heads at him and step in between the two of you. You stop for a second to give him an answer, but decide to turn around and head out. \n\nYou stop in front of the gate as it closes behind you. There are several locations in your head, but it's already getting dark. You're running out of time, and you have to decide where you'd like to go. Your best guess would be having somewhere between three and four hours left.\n*temp Time 300\n*label tiktok\n*fake_choice\n\n *disable_reuse #Go with my instincts. The school.\n  *set Time -100\n  As fast as you can, you make your way through the thick forest. The cold air sends shivers down your spine. The main road is paved with the same old cars. The only thing that's new are the corpses. Howling and growling comes from the distance, so you stick to the shadows and walk as quietly as you can while still maintaining speed. You peek through the hole in the store's wall. Rabid animals run past the school, followed by a couple of wacks. \n  \n  The broken, bent doors crackle loudly underneath their feet. You step out from the cover of the store and head towards the school. You stop at the entrance for a moment, just staring into the dead lobby, through the rusty, empty doorframes. You can still see yourself greeting ${bf1} and ${bf2} with such a smile one day, then such disappointment on another. Such a long time has passed, and the journey you've been on is only expanding. But what have you achieved, and when does it end? You ask the question often. \n  *page_break\n  You walk through the doorframes and into the lobby. A thick layer of dust covers everything. Having no time to waste, you head down the stairs, towards the bunker's entrance. You walk through the blown-up door and head down the stairs. In the middle of the room lie the remains of your classmates. Their bones are scattered around, and several tiny footsteps lead through the dust, down the hallway to the dining room. \n  \n  You walk around the destroyed bunker. Wires hang from the ceiling. The furniture is ripped apart. Quiet struggling noises are coming out of one of the rooms. You flip your ${weapon} into your hand and head down the hall. You slowly open the door on your right. The bunk beds are lying on the ground, and a person covered in a black bag is tied to them. You kneel down next to the person and take the bag off.\n  \n  Immediately, deep red eyes meet yours. You close your eyes and sit down, suicidal images flashing before your eyes. You blink a few times at the tied-up young girl on the ground. Her mouth is stuffed with a rag and a small note. You take the small note out, avoiding eye contact.\n  \n  [i]\"The thought is good, the effort is poor. It had begun here, for you. Where did it all start for the rest of the population? The living nightmare they can't get rid of.\"[/i] The rest of the note is unreadable, as saliva has soaked through it. You stand up and put the bag back on her head, then run upstairs. At the entrance to the school, you think about where to go next.\n  *goto tiktok\n \n *disable_reuse #Go with General ${General}'s guess. The military base.  \n  *set Time -100\n  You head down the path through the thick forest. Creatures howl and scream deep in the forest, and a huge pack of Aviatrixes flies above you. You try to remember the route to the Dives, but it gets and harder to navigate in the darkness. The dirt road leads to a huge, green camouflaged building surrounded by a bent fence, with several huge tears in it and razor wire on top. You slide through one of the tears in the fence. \n  \n  Hangars, broken trucks, and various smaller tents and buildings stand around the area. Moss hangs from the walls. The plants reach high up into the air at some parts. You walk forward on the broken concrete road. Corpses of soldiers lie around. Their blood is dried on the ground. From one of the closed tents, you hear people talking inside. You walk closer and peek inside through the small hole in the tent's door.\n  \n  ${roommate} and a couple of others dressed in military uniform are talking. They look at you and rush towards the door. You take a few steps back, and they come out of the tent. The inside of it is designed neatly. A bed lies inside, with a dining table next to it. On the table, there are several pieces of freshly cooked meat and vegetables.\n\n  \"${firstname}! Finally, someone I can trust…guys, this is ${firstname},\" she says, and the other couple of soldiers shake your hand, looking at each other. \"Sorry I disappeared, I just couldn't tell anyone else about…well…we were just about to eat. Come, I'll tell you in the meantime.\" You follows them inside. You sit down in the chair, and she shoves a plate in front of you. It's packed with roasted meat and a salad. You look at the plate and glance at the others.\n  *page_break  \n  \n  \"Well…we didn't think this through.\" One of the soldiers shrugs and lifts her gas mask up to take a bite of the meat. She puts her gas mask back on and chews. They all begin to eat like that. \"Anyway, are you sure we can trust this guy?\" Another soldier looks at ${roommate}.\n  \n  \"Yeah, he's cool.\" ${roommate} nods and looks at you. \"Come on, eat.\" You hold your breath until you push the gas mask up on your head. You rip a chunk of meat off and stuff it into your mouth. As you begin to chew on it, you push the gas mask back on your head. The first couple of bites taste like fresh, spicy chicken, then a horrible taste fills your mouth. You push the gas mask up and spit it out. The others look at each other.\n  \n  \"Well…I guess it's not for everyone's taste.\" ${roommate} stands up and walks out of the tent. She waves for you to join her. You stand up and walk after her. Outside, she keeps looking into the distance.\n  \n  \"So…the plan is, we'll blow up this whole district. We have a nuclear bomb hidden underground. So, the plan in detail…\" she says, wrapping her arm around your waist. As she keeps talking, her fingertips slowly grip the handle of your knife. You push her away and stand back. She stops talking, and a grin appears on her face. Her hands slowly extend into huge claws. You take the knife out and stab it into her neck. She screams, and the couple of soldiers run out. \n  \n  They look at the struggling ${roommate} and rush towards you. You pull your knife out and send a couple of bullets into them. They fall on the ground, twitching. Their arms are slowly changing into thin, grey arms that end in claws. Their eyes grow and turn red. Sharp fangs slowly grow out of their mouths. You holster your weapon and look into the tent. Rotten, sticky corpses are piled up. Chunks of their gooey meat are lying on the table. You push your gas mask aside and throw up. A chunk of black, deformed heart is beating inside, in one of the corners. A small note is stuck into the head of a corpse with a nail. You walk inside and take it off. \n  \n  [i]\"Madness takes over the personnel who were supposed to stay sane and protect humanity. In a single night, they were overrun by those amazing creatures. They looked into the eyes of their friends and only saw their own enemies there. Yes, it all started here. For them, the military. Every success starts with a failure, if the saying goes right,\"[/i] the note reads in blood. You throw it away and walk towards the fence, feeling disgusted.\n  *goto tiktok\n  \n  \n  \n  \n  \n \n *disable_reuse #Go with ${Roommate2}'s guess. The graveyard complex.\n  *set Time -100\n  *set Bullets -1\n  You pass by the muddy area, with a clear view of ${base2} in the distance. Whenever you feel like something is about to take hold of your leg, you slam your knife deep down. Blood squirts up, and the grip on your leg falters. You've been going for a while when you arrive at the rest of the Pauper district. Tall blocks of buildings stand as far as you can see, with narrow, dirty streets. \n  \n  Navigating in the dark gets especially hard. The windows of the buildings have exploded onto the street, and the thick layer of glass crackles under your feet. Some of the buildings have fallen apart, and some have trees and moss growing out of them. Apart from a couple of rusty police cars, there are only bikes lying around on the street. As you get deeper into the concrete jungle, the sound of crowds chattering and children laughing com
