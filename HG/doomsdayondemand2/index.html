set Lastname \"Lyfeld\"\n   *set Name (Firstname&\" \")&Lastname\n   Your body shakes as you exhale and recall your name, which is ${name}.\n   *goto randnext\n  *if roll = 5\n   *set Firstname \"Alan\"\n   *set Lastname \"Lyfeld\"\n   *set Name (Firstname&\" \")&Lastname\n   Your body shakes as you exhale and recall your name, which is ${name}.\n   *goto randnext\n   \n   *label randnext\n   *comment Have to null/set the variables accordingly from this point forward, due to the randomisation bug. (If you go to the stats screen while the randomisation \"page\" is in progress, it'll randomise those variables again.\n   *page_break\n   *rand roll 1 2\n   *if roll = 1\n    *set leftsurvivor \"Ryan\"\n    *set deadsurvivor \"Malcolm\"\n    *set malcolmdead true\n    *set wackwound true\n    *set ryandead false\n    *set slimerwound false\n    You press your fingertips against your forehead as you think about the tough decision you had to face: whom to save. You chose ${leftsurvivor} over ${deadsurvivor}, and you've borne the Infected, sun-shaped, deep, black wound on your belly ever since.\n    *goto randnext2\n\t\n   *if roll = 2\n    *set leftsurvivor \"Malcolm\"\n    *set deadsurvivor \"Ryan\"\n    *set malcolmdead false\n    *set wackwound false\n    *set ryandead true\n    *set slimerwound true\n    You press your fingertips against your forehead as you think about the tough decision you had to face: whom to save. You chose ${leftsurvivor} over ${deadsurvivor}, and you've borne the heavy corrosion on your right arm, shaped like a black sun, ever since.\n    *goto randnext2\n\t\n    *label randnext2\n    *page_break\n    *rand roll 1 2\n    *if roll = 1\n     *set currentbf \"Bradley\"\n     *set leftalonebf \"Abbie\"\n     *set heshe \"he\"\n     *set hisher \"his\"\n     *set himher \"him\"\n     ${currentbf} was your best friend. Over your school years, it slowly became obvious, but your decision finalized that. $!{heshe} tried to stay with you until the end, despite everything that happened.\n     *goto randnext3\n\t \n    *if roll = 2\n     *set currentbf \"Abbie\"\n     *set leftalonebf \"Bradley\"\n     *set heshe \"she\"\n     *set hisher \"her\"\n     *set himher \"her\"\n     ${currentbf} was your best friend. Over your school years, it slowly became obvious, but your decision finalized that. $!{heshe} tried to stay with you until the end, despite everything that happened.\n     *goto randnext3\n       \n     *label randnext3\n     *page_break\n\t \n\t \n \n     *set deadend false\n     *set died false\n     *set capturer1dead false\n     *set aloneend false\n     *set lizziedead false\n     *set capturer1dead false\n     *set ryanend false\n     *set malcolmend false\n     *set capturer1dead false\n     *set Ivandead false\t\n     *set Ivanend false\n     *set bradleydead false\n     *set abbiedead false\n     *set capturer1dead false\n     *set Lizzieend false \n\t \n     *rand roll 1 5\n     *if roll = 1\n      *set deadend true\n      *set died true\n      When everything fell apart, you made a fatal decision and ended up dying. You remember dying, felt the life leaving your body. You clench your teeth at the thought.\n      *goto randend\n\t  \n     *if roll = 2\n      *set capturer1dead true\n      *set aloneend true\n      *set lizziedead true\n      *set ryandead true\n      *set malcolmdead true\n      When everything fell apart, you were the last one to pull the trigger. You longed to be alone, and that you achieved.\n      *goto randend  \n      \n     *if (roll = 3) and (leftsurvivor = \"Ryan\")\n      *set leftsurvivor \"Ryan\"\n      *set deadsurvivor \"Malcolm\"\n      *set wackwound true\n      *set slimerwound false\n      *set capturer1dead true\n      *set ryanend true\n      *set ryandead false\n      *set Lizziedead true\n      *set malcolmdead true\n      *set malcolmend false\n      It was obvious that you would save ${leftsurvivor} again. No wonder you ended up ruling with him.\n      *goto randend\n\t  \n     *if (roll = 3) and (leftsurvivor = \"Malcolm\")\n      *set capturer1dead true\n      *set leftsurvivor \"Malcolm\"\n      *set malcolmend true\n      *set lizziedead true\n      *set ryandead true\n      *set Ivandead true\n      *set malcolmdead false\n      *set ryanend false\n      *set deadsurvivor \"Ryan\"\n      *set wackwound false\n      *set slimerwound true\n      It was obvious that you would save ${leftsurvivor} again. No wonder you ended up ruling with him.\n      *goto randend \n\t  \n     *if roll = 4\n      *set Ivanend true\n      *set ryandead true\n      *set malcolmdead true\n      *set bradleydead true\n      *set abbiedead true\n      In the end, ${capturer1} appeared to be right about you. You weren't so different after all. You shared his views and ways. He remained the leader, with you by his side.\n      *goto randend\n\t  \n     *if roll = 5\n      *set capturer1dead true\n      *set Lizzieend true\n      *set ryandead true\n      *set malcolmdead true\n      *set Ivandead true\n      *set Lizziedead false\n      Who could blame you for longing for a peaceful life? You saved Lizzie and escaped to the mountains. It was a peaceful life, but a tough and challenging one nevertheless.\n      *label randend\n      *page_break\n      [i]\"It's time,\"[/i] a deep voice echoes.\n      *finish Earlier…\n  \n \n #I remember my own background…\n  Your body shakes as you exhale and recall your name.\n  *label name\n  *choice\n   #\"David.\"\n    *set Firstname \"David\"\n    *set Lastname \"Lyfeld\"\n    *set Name (Firstname&\" \")&Lastname\n    *goto next\n   #\"Adam.\"\n    *set Firstname \"Adam\"\n    *set Lastname \"Lyfeld\"\n    *set Name (Firstname&\" \")&Lastname\n    *goto next\n   #\"Jack.\"\n    *set Firstname \"Jack\"\n    *set Lastname \"Lyfeld\"\n    *set Name (Firstname&\" \")&Lastname\n    *goto next\n   #\"Carl.\"\n    *set Firstname \"Carl\"\n    *set Lastname \"Lyfeld\"\n    *set Name (Firstname&\" \")&Lastname\n    *goto next\n   #\"Alan.\"\n    *set Firstname \"Alan\"\n    *set Lastname \"Lyfeld\"\n    *set Name (Firstname&\" \")&Lastname\n    *goto next\t\n   #\"My name is…\"\n    *input_text Firstname\n    *if Firstname = \"Norbert\"\n     \"I'm honored.\"\n     *set Name (Firstname&\" \")&Lastname\n     *goto Next\n   \n    *if Firstname = \"Ivan\"\n     \"Nah, not until I'm alive, kiddo.\"\n     *goto name\n   \n    *if Firstname = \"Ryan\"\n     \"Erm…I wouldn't like that.\"\n     *goto name\n   \n    *if Firstname = \"Malcolm\"\n     \"I suppose…but I was first. I hope it's cool, son.\"\n     *goto name\n   \n    *if Firstname = \"Bradley\"\n     \"Come on! I've never known anyone with the same name as me. It's not gonna start now!\"\n     *goto name\n   \n    *if Firstname = \"Abbie\"\n     \"What?! We aren't even the same gender! Don't be silly!\"\n     *goto name\n   \n    *if Firstname = \"Lizzie\"\n     \"As much as I like you, I still can't let you run around with my name. A girl's name. You silly boy.\"\n     *goto name\n   \n    *if Firstname = \"Carl\"\n     \"Heh, in your dreams, maybe.\"\n     *goto name\n   \n    *if Firstname = \"Gannon\"\n     \"Rookie…\"\n     *goto name\n   \n    *if Firstname = \"Keith\"\n     \"……\"\n     *goto name\n   \n    *if Firstname = \"Matt\"\n     \"You should just remain unnamed.\"\n     *goto name\n   \n    *if Firstname = \"Lily\"\n     \"Haha! You are one funny guy!\"\n     *goto name\n   \n    *if Firstname = \"Kye\"\n     \"Well…I'll gladly let my name go. But let me die first…\"\n     *goto name\n       \n    *if Firstname = \"Oracle\"\n     \"A simple no will do.\"\n     *goto name\n   \n   \n    *else\n     *set Lastname \"Lyfeld\"\n     *set Name (Firstname&\" \")&Lastname\n     *goto Next\n\n\n\n*label Next\n*comment If replaying the game doesn't reset the variables to their original state, please uncomment this. Otherwise, please delete:\n*comment     *set deadend false\n*comment     *set died false\n*comment     *set capturer1dead false\n*comment     *set aloneend false\n*comment     *set lizziedead false\n*comment     *set capturer1dead false\n*comment     *set ryanend false\n*comment     *set malcolmend false\n*comment     *set capturer1dead false\n*comment     *set Ivandead false\t\n*comment     *set Ivanend false\n*comment     *set bradleydead false\n*comment     *set abbiedead false\n*comment     *set capturer1dead false\n*comment     *set Lizzieend false \n\n\n${name}. You repeat it a couple of times.\n\nYou press your fingertips against your forehead as you think about the tough decision you had to face: whom to save. In the end, you chose…\n*fake_choice\n #Ryan.\n  *set leftsurvivor \"Ryan\"\n  *set deadsurvivor \"Malcolm\"\n  *set malcolmdead true\n  *set wackwound true\n  You chose ${leftsurvivor} over ${deadsurvivor}, and you've borne the Infected, sun-shaped, deep, black wound on your belly ever since.  \n  *goto next2\n  \n #Malcolm.\n  *set leftsurvivor \"Malcolm\"\n  *set deadsurvivor \"Ryan\"\n  *set ryandead true\n  *set slimerwound true\n  You chose ${leftsurvivor} over ${deadsurvivor}, and you've borne the heavy corrosion on your right arm, shaped like a black sun, ever since.\n  *goto next2\n  \n*label next2  \n\n\nA choice that seemed like no big deal shaped your friendship. You had to decide which of your friends would go down to the same basement as you. You chose…\n*fake_choice\n #Bradley.\n  *set currentbf \"Bradley\"\n  *set leftalonebf \"Abbie\"\n  *set heshe \"he\"\n  *set hisher \"his\"\n  *set himher \"him\"\n  Over your school years, it slowly became obvious, but your decision confirmed that ${currentbf} was your best friend. $!{heshe} tried to stay with you until the end, despite everything that happened.\n  *goto next3\n\n \n #Abbie.\n  *set currentbf \"Abbie\"\n  *set leftalonebf \"Bradley\"\n  *set heshe \"she\"\n  *set hisher \"her\"\n  *set himher \"her\"\n  Over your school years, it slowly became obvious, but your decision confirmed that ${currentbf} was your best friend. $!{heshe} tried to stay with you until the end, despite everything that happened.\n  *goto next3\n\n \n  \n*label next3\n\n\nYou can clearly recall the day everything around you collapsed…that day, you…\n\n*fake_choice\n #Died.\n  *set deadend true\n  *set died true\n  You made a fatal decision and ended up dying. You remember dying, felt the life leaving your body. You clench your teeth at the thought.\n  *goto varend\n  \n #Ended up alone. \n  *set capturer1dead true\n  *set aloneend true\n  *set lizziedead true\n  *set ryandead true\n  *set malcolmdead true\n  You were the last to pull the trigger. You longed to be alone, and that you achieved.\n  *goto varend\n  \n *selectable_if (leftsurvivor = \"Ryan\") #Sided with Ryan.\n  *set capturer1dead true\n  *set ryanend true\n  *set lizziedead true\n  *set malcolmdead true\n  *set Ivandead true\n  *set slimerwound false\n  *set capturer1dead true\n  *set ryandead false\n  *set Lizziedead true\n  *set malcolmend false\n  It was obvious that you would save ${leftsurvivor} again. No wonder you ended up ruling with him.\n  *goto varend\n  \n *selectable_if (leftsurvivor = \"Malcolm\") #Sided with Malcolm.\n  *set capturer1dead true\n  *set malcolmend true\n  *set lizziedead true\n  *set ryandead true\n  *set Ivandead true\n  *set malcolmdead false\n  *set ryanend false\n  *set wackwound false\n  *set slimerwound true\n  It was obvious that you would save ${leftsurvivor} again. No wonder you ended up ruling with him.\n  *goto varend\n  \n #Ended up with Ivan.\n  *set Ivanend true\n  *set ryandead true\n  *set malcolmdead true\n  *set bradleydead true\n  *set abbiedead true\n  In the end, ${capturer1} appeared to be right about you. You weren't so different after all. You shared his views and ways. He remained the leader, with you by his side.\n  *goto varend\n  \n #Ended up with Lizzie.\n  *set capturer1dead true\n  *set Lizzieend true\n  *set ryandead true\n  *set malcolmdead true\n  *set Ivandead true\n  *set Lizziedead false\n  Who could blame you for longing for a peaceful life? You saved Lizzie and escaped to the mountains. It was a peaceful life, but a tough and challenging one nevertheless.\n  *goto varend\n\n*label varend\n*page_break\n[i]\"I hear footsteps. Are they coming for you already?\"[/i]\n\n[i]\"It's time.\"[/i]\n*finish Earlier…\n", "reunend": "*page_break Years later…\n*set age +8\n[b]Chapter 8 - Getting Used To Getting Used[/b]\n\n*achieve reunend\nAfter the military took control of ${base2} and successfully rebuilt it, they began to clear the area of the creatures as much as possible. Destroying nests and conquering smaller and bigger bases, groups of survivors have become the top priority. Thanks to their aggressive expansion, ${base2} slowly becomes the largest functioning town in the district, with passages and safe routes to various other bases.\n\n${currentbf} still thinks of you as a friend, and you often spend your free time together, chatting about the years you spent with and without each other. ${leftsurvivor} becomes more like a military personnel with each passing year, and pushes you into the military rank and life.\n\n${general} has been accepted into the military, but only as a regular soldier. On a mission to eliminate a nest, he disappeared on the way back, and you haven't heard from him since.\n\n*if (rmdead)\n When it's your turn to guard the prisoners, you often see ${assassin}. He's tied up in the cold cellar in the worst conditions. They found out his ability to come back from the dead. The scientists mine him for information and organs alike. He doesn't speak anymore and has accepted his fate.\n \n*if (rmdead = false)\n ${assassin} becomes one of the most valuable members of the military, along with you. He seems to enjoy being part of something serious, not just formal.\n \n \nFor the first time in the district, you seem to be able to bear life, and even enjoy it sometimes. The threat from the districts doesn't go away, but you still feel safer knowing there are teammates who've got your back.\n\n*if (loverstatus)\n ${lover} is always by your side. Through the years, your love for each other only become stronger. $!{heshe2} has decided to be part of the military and protect the base. $!{heshe2} fulfills the role of a guard. $!{heshe2} patrols the passages with the others and guards the area from a watchtower. Eventually, you both begin to feel like you need more in your lives.\n \n Soon, twins join the two of you. They both bear the black sun on their upper back. Your daughter and son become the center of your life. You will leave something behind in the world, apart from your name and fame. It proves to be challenging to fulfill your duties, both as a father and as a military personnel climbing the ladder faster and faster.\n *label fami\n \n\n*if (loverstatus = false)\n Being alone has become part of your life. You enjoy the complete freedom it gives you. You climb the military ranks fast, and you can do whatever you want to in your free time. Soon enough, you're given your own squad. You embark upon your own successful missions. People across the districts begin to fear and respect you. You will leave your mark on the world.\n \n \nWith the reduced number of creatures in the area, the sandstorms have become less frequent. Over long years, the districts are united and function under the command of the military. The whole city is slowly being rebuilt. The military manages to make some of the vehicles work. When the district becomes self-sufficient, the military feels like it's time to expand towards the rumored city. They break the walls surrounding the districts and set off in different directions. You accompany a squad going through the Dives' district. You spend long hours on the helicopter looking down on thick forests and a couple of destroyed cities. In the end, you reach a mountain. In between the mountain and the ocean on the other side, a huge city stands. Tall buildings, vehicles, citizens, and the noise of a normal, living city finds its way to you.\n\nIn the following year, the rest of the military working for them joins you. In only a couple of months, you conquer the city. Maintaining order and fighting off creatures becomes the task for the upcoming times.\n\n*if (turning)\n The black sun on your body slowly expands. Your body becomes stronger. Your senses sharpen, and the craving for human meat intensifies within you. You begin to wear gloves when your hands become dark and bony. In the nights, you hunt unaware citizens, consuming as much of them as you can. The city searches for the serial killer on loose. Fear becomes part of their daily lives.\n *goto cc\n \n*else\n *goto cc\n \n\n*label cc\nYears pass by, and living in the city only becomes greater as it slowly becomes a fully developed city. ${currentbf} barely visits you anymore, ever since ${heshe} has ${hisher} own family. ${leftsurvivor} has become the leader of the military and usually gives direct orders to you. He knows what you're capable of. A new woman joins the military and climbs the ranks fast. Soon, you find her in your squad. Her name is Alianna. She stands a couple of feet away from you during your usual training. She glances over at you with her emerald green eyes. Your eyes meet, and she brushes her ash brown hair back. Without paying her too much attention, you continue your training.\n\nWhen you're finished, you walk back towards headquarters to change your clothes. She lives up to her rumors. She was fast, agile, and didn't miss a single shot throughout the training. As you walk the crowded hallway, she looks back at you. You catch a black sun's edge creeping up onto her collarbone under her green military shirt for a split second. She gives you a wink, then enters her quarters. That day, before you go to bed, the black sun on you begins to beat faster, but you manage to fall asleep.\n*page_break\n\n[i]\"Good morning, ${firstname}. It's been a while since we've talked. Exactly since you tried to destroy me. I've been watching you ever since. Every action is followed by an equal or greater reaction. That's the basic rule of balance. You humans tried to kill me. I'll have do the same with you. It was good to talk with you once again. We'll see each other in the future, I'm sure of that.\"[/I] The man with the purple eyes says in the thick darkness. \n\nYou jump up from your bed to a huge explosion. You rush out of your apartment in the new city and look at the mountain with most of the citizens already on the streets. A huge, purple light shines from the enormous, spiky black cave on the mountainside. Hordes of creatures fly and slide down on it, rushing towards the city, thirsty for blood. You rush inside to grab your weapon, and a military truck stops in front of you. Duty calls. You hop onto the back and sit down next to your teammates. In front of you, the woman smirks. \n\nChaos quickly surrounds you. The peace you've longed for didn't last long. \"Well, I can finally see how the man I've heard so much about really fights.\" She smiles and slowly turns her head towards the mountain, which mutants ooze out from.\n*goto_scene ending", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n\n*set ivanend false\n*set Age 15\n*set Firstname \"Brett\"\n*set Name (Firstname&\" \")&Lastname\nYour eyes snap open on the layer of dirty mattress serving as your bed. They are soaked with sweat, and it takes a second to snap back into reality. Two years have passed, and the nightmares still haven't entirely stopped. They even intensified, if nothing else.\n\n\"He-e-ey there, kiddo! You seem a little…tired, don't you agree?\" ${capturer1} pulls you up on your feet by your arm. \"How's my favorite scavenger doing nowadays, huh?\" He smirks and tugs on his black, leather gloves.\n \n*fake_choice\n *selectable_if (ivanend = false) #\"You're supposed to be…dead.\"\n #\"You look a little…pale, though.\"\n #Stay quiet.\n\n*script changeBackgroundColor(\"black\")\n*label screen\n*page_break\n*set Firstname \"Luke\"\n*set Age 16\n*set Name (Firstname&\" \")&Lastname\n*set wackwound true\n*set Filters true\n*set evil \"50\"\n*set idcard true\n*set Inform true\n*set Inform2 true\n*set Clothing 0\n*set Gasmask true\n*set Pistol true\n*set Maskfilter 2\n*set bullet true\n*set bullets 8\n*set knife false\n${General} walks behind the bar and starts rummaging through the boxes and sacks. ${Assassin} keeps staring at you with his deep, dark eye, to the point where it begins to feel uncomfortable. The General slams a wooden plate on the counter, with what seems to be a mixture of old, rotten snacks, including pecans, mixed nuts, and even crisps. You turn your head away in disgust, and he laughs. \"So picky. I bet it's full of protein, though.\"\n\n${Assassin} slowly walks towards the two of you and takes a handful of the rotten mess out. He tilts his head and pulls on his scarf, then crushes the snack in his hand. The small crumbs fall under the scarf, and he begins to crunch on them. \"Nutrients.\" He cleans his hand on the wall, then leans against it.\n\n\"Well, you can only blame yourself if you die from that.\" The General sits down by the white bag and starts organizing the equipment. \"One of us will have to stay and guard overnight if we have to spend the night here.\" He gives the two of you a questioning look.\n*fake_choice\n #Volunteer.\n #Don't volunteer.\n #Look at ${Assassin}. \n  \n*script changeBackgroundColor(\"sepia\")\n*label screen2\n*set Firstname \"Liam\"\n*set wackwound false\n*set slimerwound true\n*set Filters true\n*set evil \"60\"\n*set idcard true\n*set Inform true\n*set Inform2 true\n*set Clothing 0\n*set Gasmask true\n*set Pistol true\n*set Maskfilter 2\n*set bullet true\n*set bullets 4\n*set knife false\n*set Name (Firstname&\" \")&Lastname\nThe little girl with red jeans and a yellow hoodie messes around with her hands, then points over to the fence behind you. You shake your head, and she slowly climbs out. \"I…I think I lost my mum. I don't know where she is. Help me find her…please?\" she mumbles, and you can hear the rattling sound of the dying filter in her gas mask. Your own gas mask is designed to work with two filters to be more effective and last longer, but you feel like your own filters need to be changed as well. \n\nIt can also work with only one though, but ${General} and the management might not be happy to replace a filter if you give it away, especially if your filters need to be replaced as well. In light of that, you take a moment to make your decision.\n\n*fake_choice\n #Give her a filter.\n #Don't give her a filter.\n  \n*label screen3\n*set Firstname \"Dave\"\n*set wackwound true\n*set slimerwound false\n*set Filters true\n*set evil \"34\"\n*set idcard true\n*set Inform true\n*set Inform2 true\n*set Clothing 0\n*set Gasmask true\n*set Pistol true\n*set Maskfilter 1\n*set bullet true\n*set bullets 5\n*set knife false\n*set heshe2 \"she\"\n*set hisher2 \"her\"\n*set himher2 \"her\"\n*set newfriend \"Lily\"\n*set newfriend2 \"Matt\"\n*set Name (Firstname&\" \")&Lastname\nYou slowly rise from the bed and take your shirt off. The swollen, dark-red scar running down the middle of your chest makes you frown, but ${heshe2} gently runs ${hisher2} finger down the scar as ${heshe2} scans your other scars. When ${heshe2} reaches for the scar shaped like a black sun, the warehouse with ${survivor1} and ${survivor2} flashes before your eyes. You grip ${hisher2} hands without thinking for a second.\n   \n\"I'm…sorry. I didn't wanna hurt you.\" You slowly release ${hisher2} hands as ${heshe2} apologizes. The mood becomes quiet as the candle slowly dies out, leaving the two of you in complete darkness. \"You must have gone through so much…I don't even know how can you bear all that pain.\" ${newfriend} runs ${hisher2} hands through your hair and looks into your eyes as ${heshe2} leans closer.\n*fake_choice\n  #Kiss ${himher2}.\n  #Tell ${himher2} to leave; you have feelings for ${newfriend2}.\n  #Tell ${himher2} to leave; you don't have time to develop deep feelings for anyone.\n   \n*label screen4\n*set firstname \"Kieran\"\n*set wackwound false\n*set slimerwound true\n*set Filters true\n*set evil \"43\"\n*set idcard true\n*set Inform true\n*set Inform2 true\n*set Clothing 0\n*set Gasmask true\n*set Pistol false\n*set Maskfilter 0\n*set bullet false\n*set bullets 8\n*set knife true\n*set lungscar true\n*set trapwound true\n*set Name (Firstname&\" \")&Lastname\n\"At first I was like, hey, I'm just a guard, I wanna go on exciting tasks. But now, after the birds told me how this huge improvised mission went, I'm like, I'd rather die as a guard than be led by some fool.\" One of the guards points at the General. \"I've lost a friend to your failure.\" He spits. The General stops and glances back, but keeps walking. You walk a street down behind the Citadel. This is where you would part ways, but he turns towards you.\n\n\"Hey…${firstname}…I'm sorry. I was confident this would go well. But it didn't. It really didn't. I failed, I let the whole town down. And for that, apart from the many other lives, I've lost a friend. This is not an example to follow.\" He buries his face in his palms.\n*fake_choice\n #Cheer him up.\n #Despise him.\n #Go to my chamber.\n  \n*label screen5\n*set lungscar false\n*set weapon \"knife\"\n*set Firstname \"Brandon\"\n*set wackwound false\n*set slimerwound true\n*set Filters true\n*set evil \"63\"\n*set idcard true\n*set Inform true\n*set Inform2 true\n*set Clothing 0\n*set Gasmask true\n*set Pistol false\n*set Maskfilter 1\n*set bullet false\n*set bullets 8\n*set knife true\n*set glasswound true\n*set Name (Firstname&\" \")&Lastname\nAs you reach the end of the forest, the remaining stirring sand and the fog blocks most of your vision. You walk down the hill, stepping over a body that still twitches. Despite the recent sandstorm, a muddy, grey area comes into view, with small huts and tall yellow plants as far as you can see.\n\nYou follow ${assassin} as closely as you can, your hand close to your ${weapon}. As you get further away from ${base2}, it begins to get harder and harder to walk through the now knee-deep mud. ${Assassin} moves swiftly, checking the huts and the area around them. You try to keep up with him, when something gets hold of your leg. You feel something creeping up your leg and gripping both of your legs just above your knees. The grip on your legs begins to feel stronger, so you decide to…\n*fake_choice\n #Grab my ${weapon} and attack whatever is under the mud.\n #Try to break free.\n #Freeze.\n  \n  \n*label screen6\n*set Firstname \"Russel\"\n*set Age 14\n*set Clothing 55\n*set Nrep false\n*set Nrep2 false\n*set Roommates false\n*set Glasswound false\n*set Trapwound false\n*set Markedwound false\n*set wackwound true\n*set slimerwound false\n*set Name (Firstname&\" \")&Lastname\n*set pistol false\n*set knife false\n*set bullet false\n*set maskfilter 0\n*set bullets \"12\"\nApart from broken computer parts, you can't find anything in the offices. You head upstairs and hear noises above you. You walk up the stairs as quietly as you can with the glass shards under your feet. On top of the building, a meeting room with open doors comes into view. Three of its four windows are intact, but the table in the middle is broken in half. A balding man with a middle-aged woman and a small child in fancy suits stand with their backs to the window. In front of them stands a man in a bulletproof vest, who aims a pistol at them.\n\n\"Last warning, give me the bag, or I'll kill you one by one. I'm fed up! This is not the district anymore, you can't control me any longer!\" the man shouts. You roll your pistol into your hand and take a step closer. The glass crackles under your feet, and he swiftly turns around. \"Take a step closer, and they'll all die! Just walk away…this isn't your fight…\" He keeps switching from you to them with his weapon. The woman sobs quietly, along with the child. The man stands there, his arms up, and looks at you. You grip your weapon firmly.\n*fake_choice\n #Save them.\n #Walk away.\n  \n  \n  \n*label screen7\n*set Age 16\n*set weapon \"pistol\"\n*set Firstname \"Steve\"\n*set wackwound false\n*set slimerwound true\n*set Filters true\n*set evil \"55\"\n*set idcard true\n*set Inform true\n*set Inform2 true\n*set Clothing 0\n*set Gasmask true\n*set Pistol true\n*set Maskfilter 0\n*set bullet true\n*set bullets 3\n*set knife false\n*set lungscar true\n*set trapwound false\n*set glasswound false\n*set markedwound true\n*set Name (Firstname&\" \")&Lastname\n\"${firstname}.\" ${Roommate2} pushes through the crowd and walks with you towards the gate, as you don't stop for him. \"Have you seen ${Roommate}?\" He escorts you to the entrance.\n\n\"No, I haven't. Where does both Good and Evil reside?\" you reply, nodding at the guards.\n\n\"Weird…she's not been home or at work for days now. That's very unlike her. I hope she's okay…also…I don't know. Maybe the old graveyard and crematory complex behind us? I don't know. But that part of the district has always been pretty scary. Why do you ask? Where are you going, anyway? I just wanted to ask something…\" He steps back when the guards shake their heads at him and step in between the two of you. You stop for a second to give him an answer, but decide to turn around and head out. \n\nYou stop in front of the gate as it closes behind you. There are several locations in your head, but it's already getting dark. You're running out of time, and you have to decide where you'd like to go. Your best guess would be having somewhere between three and four hours left.\n*fake_choice\n *disable_reuse #Go with my instincts: the school.\n *disable_reuse #Go with General ${General}'s guess: the military base.  \n *disable_reuse #Go with ${Roommate2}'s guess: the graveyard complex.\n *disable_reuse #Go with ${assassin}'s guess: the mad village.\n *disable_reuse #Go with the preacher's idea: the church in Ignobilis.\n  \n  \n*label screen8\n*set Firstname \"Adam\"\n*set wackwound true\n*set slimerwound false\n*set Filters true\n*set evil \"78\"\n*set idcard true\n*set Inform true\n*set Inform2 true\n*set Clothing 0\n*set Gasmask true\n*set Pistol true\n*set Maskfilter 1\n*set bullet true\n*set bullets 1\n*set knife false\n*set glasswound true\n*set Name (Firstname&\" \")&Lastname\nYou step backwards before he appears to your left. [i]\"I will let you take a sip from the fountain of my knowledge.\"[/i] He flicks his finger with the same emotionless face. A red door made out of flesh grows from the ground, with an eye at the peephole. [i]\"Behind this door lies the sacrifice of ${General}.\"[/i] He turns around and takes a step. Before his foot reaches the ground, he blinks a great distance and moves a door up from the ground with the movements of his fingers. \n\nA door made out of broken glass and fading pictures emerges. [i]\"Here lies the truth about ${assassin}.\"[/i] He points to your left, and the ground opens. He turns into darkness and flows towards the new door rising from the ground. \n\nThe door is made out of severed and stitched limbs. Blood drips from the still-moving limbs. [i]\"If you cross this door, the truth about ${capturer1}'s turning point will be revealed to you. Choose wisely; you can only pick one door. Cross one, whenever you're ready.\"[/i] He crosses his arms behind his back and blinks into the middle.\n*fake_choice\n #Choose the door to my left, General ${General}'s sacrifice.\n #Choose the door in front of me, the truth about ${Assassin}.\n #Choose the door to my right, ${capturer1}'s turning point.\n*finish", "startup": "*title Doomsday on Demand 2\n*author Norbert Mohos \n*scene_list\n  startup\n  prologue\n  chapter1\n  chapter2\n  chapter3\n  $ chapter4\n  $ chapter5 n\n    Defeat the Oracle, and take his place.\t\n\t\n*achievement portalend hidden 30 Starting over\n    hidden\n    Start your life over again as a young boy.\t\n\t\n*achievement reunend hidden 30 Peace and order\n    hidden\n    Become part of the dominating military with your old friends.\t\n\t\n*achievement turnend hidden 30 Corrupted\n    hidden\n    Let the mutation take control of you, living the cursed life.\n\t\n*achievement gameover hidden 50 Play through the game\n    hidden\n    You've finished the game!\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  Picking up where you left off, you will encounter new challenges and face tough decisions in the hope to finally escape the living nightmare in the districts that only became worse. Decide whom you will trust, and how will you achieve your goal. It's kill or be killed.\n\n  [i]Doomsday on Demand 2[/i] is a 135,000 word interactive novel by Norbert Mohos, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n  • Face deadly enemies varying from mutants to humans.[n/]\n  • Decide who you'll trust. Strengthen your friendship, or make enemies.[n/]\n  • Uncover the secrets the destroyed world has to offer while surviving in the districts.[n/]\n  • Choose your own personality and end pursue your goal to finally end the living nightmare.\n\n  *if choice_prerelease and not(choice_is_ios_app)\n    [i]You can play the first three chapters of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n    *choice\n      #Sign up to be notified when the game is available.\n        *subscribe {\"now\": true}\n        *restart\n      #Play the first three chapters now for free.\n        *goto purchased\n\n  [i]You can play the first three chapters of the game for free. Purchase the rest of the game below.[/i]\n  *if choice_is_advertising_supported\n    [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n  *purchase_discount adfree 2018-07-03 $4.99 $2.99 purchased\n  *if choice_is_advertising_supported\n    *page_break_advertisement\n  *if not(choice_is_advertising_supported)\n    *page_break Play Now for Free\n\n\n*label purchased\n", "turnend": "*page_break Years later…\n*set age +3\n[b]\"Chapter 8 - The Lonely Monster\"[/b]\n\n*achieve turnend\nYou take a deep breath and sit down on a couple of fresh, bleeding dead bodies at the edge of the forest. You look at the sun setting behind ${base2}. As soon as your body changed and you became aware of your enhanced skills, the others tried to murder you. You tried to reason with them, you tried as hard as you could to help them understand that you're not evil. That despite your appearance, it's still you on the inside. It came to you as a slight shock that they didn't even know you, nor did they care. They looked in your eyes and immediately wanted your head. An abomination, they called you. But with your looks, your skills have changed as well. They couldn't murder you on the spot, so you left. Cast on the path of the exiled.\n\nYou reach down to rip a chunk of flesh out of the body underneath you with your long, sharp claws. Ever since you left, your hunger for meat has increased. Nothing else can satisfy your hunger anymore. Nothing else can stay in your stomach. It's been three years since you walked alone. The creatures try to murder you for fun, the humans try to do the same out of fear. You glance at your own blackened body with the sun burned into it. The sharp spikes have thickened, and your horn has grown. You glance back at your bony wing, then chuckle slightly. As you fill your stomach with meat, strength fills your whole body.\n\n*if (loverstatus)\n\n\n Your eyes widen when you see a handful of soldiers returning to ${base2}, with a familiar face in sight. ${lover} walks behind them with a rifle swinging from side to side on ${hisher2} back. Without hesitation, you stand up to run towards them. Filled with meat, you put one leg after the other with immense speed. When you reach them, the whole group stops at once. They turn around, then reach for their weapons furiously. Except for ${lover}. $!{heshe2} steps aside, shaking ${hisher2} head. You tell the soldiers to stop, but they cock their weapons. You release a small sigh. \n \n The same thing happens, time after time. Before they have the chance to pull the trigger, you rush through some of them, ripping deeply into their flesh. The last couple of soldiers fire in fear, spraying the area. You avoid the bullets as swiftly as you can, to land a finishing blow on them as well. You stand in front of ${lover} once again, with the soldiers bleeding out into the mud around you. Their struggle and groaning is the only thing in the silence.\n \n \"I…wanted to see you…\" you say in your deep, fading voice. ${lover} looks around with a tear rolling down ${hisher2} cheek. \"You know I don't mean any harm…\" you continue as the soldiers' blood drips from your sharp claws.\n \n \"I see otherwise…\" ${lover} rubs ${hisher2} eyes. \"I can no longer feel like I did back then. I…I can feel the darkness. It finds its way into my heart. It fills it with fear. I'm scared of you, ${firstname}…just look at what you've done!\" $!{heshe2} raises ${hisher2} voice. \"I was just trying to forget you. Why did you turn up now? Why? I don't want to see you…never, ever again!\" $!{heshe2} clenches ${hisher2} fists. \"Leave me alone!\" $!{heshe2} tries to push you away, but you keep standing in one place. $!{heshe2} sniffles with wet eyes.\n \n $!{hisher2} voice echoes in your head. Suddenly, overwhelming anger takes control of your body. Your eyes burst into a deep red colour. You extend your arm and wrap your fingers around ${hisher2} neck firmly. You raise ${himher2} up from the ground. $!{heshe2} struggles for air, gripping your hands. $!{hisher2} saliva drops on your hands as tiny red veins fill ${hisher2} eyes, until ${heshe2} stops moving. You release ${hisher2} neck. $!{hisher2} lifeless body drops on the ground. $!{hisher2} eyes stare into the nothingness. You snap back into reality, realizing what you've done. You keep staring at ${himher2} in the cold night.\n *goto contt\n\n*else\n\n\"Those people you killed. They were valuable to someone.\" A familiar scratchy voice comes from behind you. You stand up from the corpses, glancing at the handful of soldiers making their way back to ${base2} before you turn around. ${assassin} is standing in front of you, his arms crossed.\n\n\"${firstname}. Been a while.\" He fixes his black scarf. \"There's a bounty on you. People tell tales about the red-eyed, black-winged creature.\" He takes his sniper rifle off his back and throws it by the roots of the large tree next to him.\n\n\"${assassin},\" you reply in your dark, fading voice.\n\n\"We are similar, you and I. I was thinking about this while I was tracking you. We're both outcasts. Cursed. Anyway, I'm sorry. Let's do this.\" He flips his dagger in one hand, then pulls his silenced pistol into the other. Without hesitation, he launches himself towards you, ready to cut deep into you with his curvy dagger. You step aside, then make a counter attack to rip into his side. He kicks himself off, firing his pistol as he's flying towards the tree. You avoid his bullets as well as you can, then jump into the air after him.\n\nYou fight for long hours, avoiding most of the attacks from each other. Whenever you land an attack, it's a small scratch or a bruise on one of you. The sun sets completely while you wreak havoc through the forest. The ground trembles underneath your fight. Trees fall and roll down the hill. A couple of skinless creatures find their ways towards you, but you get rid of them quickly. After long hours of exhausting fighting, ${assassin} pushes the barrel into your face. He pulls the trigger, but it clicks empty. You take advantage of the situation and sink your claws into his body. His weapons roll out of his hands. He falls on his knees, then lies back on the ground with blood oozing out of his body.\n\nHe keeps looking into your eyes as you look down at him. His scruffy black leather clothes are soaked in blood. After a couple of seconds, he stops blinking. He keep staring at your face.\n\nYou know that he'll come back in just a couple of minutes. Experimenting with ways to prevent that crosses your mind, but something stops that thought. As you stand over him, your blackened heart beating fast in your chest from excitement changes your mind. You raise his body from the ground and throw him down the hill towards ${base2} as far as you can. He put up a decent fight, which you've never experienced before. You know that he'll come back sooner or later. You know that it was just mere luck that his bullet didn't sink into your head.\n*goto contt\n\n \n \n*label contt\n*page_break\nThe people on bicycles pass by on the sidewalk as cars follow one another in a sudden traffic jam on the streets underneath you. Moments later, panic fills the streets. People run through the streets. Your legs are dangling off the edge of a tall, destroyed concrete building. You look past the rest of the buildings, towards ${base2}.\n\n\"Feelin' nostalgic, kiddo?\" ${capturer1}'s black boot appears next to you. \n\n\"May I?\" He drops down next to you, leaning back on the concrete roof. \"Man…kiddo, buddy, I haven't seen you in ages. Did you spend your one…two…three…four…well, I don't have a clue how many years.\" He sits up, then looks at the people passing by on bicycles on the sidewalk underneath you. Cars follow one another in the sudden traffic jam.\n\n\"Yes…\" you reply as the people run through the streets, screaming in panic.\n\n\"Do they ever get bored?\" ${capturer1} flips his pistol with the long barrel out, then sends a couple of rounds into the crowd. \"Anyway, that's really lame. Though I must admit, your newfound powers are pretty cool. Of course, you're still no match for ol' me.\" He winks, then stands on the edge of the building as citizens pass by on the sidewalk with their bicycles.\n\n\"Okay, we're leaving this place. I've had enough of these athletic guys.\" He turns towards you with a grin on his face. He brushes his hair back before he continues. \"Tell me something, ${firstname}. Apart from me, who's remained by your side after you turned into…your better form?\" He grins as the people slowly start to panic underneath you. His grin turns into an annoyed frown.\n\n\"You,\" you reply in the deep fading voice.\n\n\"Then what are you waiting for, kiddo? How about you listen to me just for once, and take advantage of your newfound awesome powers, huh?\" He cracks his knuckles. \"Come on, kiddo. We have a world to dominate…\" A wide grin stretches over his face, revealing his teeth. He extends his arm towards you. After a couple of seconds in silence, you grip his hand and stand up. You grin as well, showing your sharp, black fangs.\n*goto_scene ending"}};
