for a while, then you keep staring at the ceiling. It takes a while until you can fall asleep.\n  *goto morning0\n  \n*label morning0\n*achieve oldfriend\n*page_break\nThe following morning comes faster than you expected. The alarm goes off in the base, indicating that it's time to wake up. You immediately regret staying up so late. ${Fsurv} stretches ${Fhisher} limbs and yawns. \"It's time…sadly.\" ${Fsurv} pats you on the back, and you head out of the chamber. At the decontamination chamber, ${newleader} awaits you with his hands behind his back.\n\n\"Did you sleep well?\" He looks at you with a grin on his face.\n\n\"Yeah.\" You nod, rubbing your eyes, and pick up your gear.\n\n\"Good, I'm glad you enjoyed your stay. The route to your base will be established soon. As of right now, you know where to go on your own. And think about what I said. It was nice meeting you.\" ${newleader} shakes your hand and opens the decontamiantion chamber's doors.\n\n\"Don't disappear. Visit me sometime, okay?\" ${Fsurv} hugs you, and you agree with ${fhimher}. You step into the decontamination chamber and walk out once it's finished.\n*goto morning011\n\n\n*label morning01\n*achieve oldfriend\n*page_break\nThe following morning comes faster than you expected. The alarm goes off in the base, indicating that it's time to wake up. You immediately regret staying up so late. You get up and sigh as you walk out of the chamber. You lock it behind yourself and walk through the hallway. You find ${newleader} standing in front of the decontamination chamber with his arms behind his back.\n\n\"Did you sleep well?\" He looks at you with a grin on his face.\n\n\"Yeah.\" You nod, rubbing your eyes, then hand him the key. You pick up your gear and look at him.\n\n\"Good, I'm glad you enjoyed your stay. The route to your base will be established soon. As of right now, you know where to go on your own. And think about what I said. It was nice meeting you.\" ${newleader} shakes your hand and opens the decontamination chamber's doors. You nod as you walk into the decontamination chamber, then walk out with your gas mask on once it's finished.\n*label morning011\n\n\"On second thought…I want to show you something. If you have a bit more time, that is.\" ${newleader} stands outside, in front of the decontamination chamber. You've already reached the gates, but turn around after a moment of hesitation. He leads you past the side of the factory, tugging on his small backpack as you reach behind it. The power plant is filled with workers, along with the greenhouse next to it at the far side of the yard. At the back of the factory stands the back entrance. You walk past it and stop next to it. \n\n\"We're here,\" ${newleader} says at the wall. You look at him, and he chuckles. \"I did a great job, then.\" He steps in front of you and pries a metal layer off, revealing a locked metal door. He takes a key out of his pocket and unlocks the door. He swings it open, and a ladder leading downstairs comes into view.\n\n\"After you.\" He takes a match out of his trench coat. You take the ladder down, and he follows you, closing the door behind himself. The ground feels soggy underneath your feet, and the air is damp in the complete darkness. ${newleader} walks past you, and you follow him. He lights the match, which is the only light source. You're slowly reaching the source of the quiet noises. He stops in front of you and picks up a small candle. With the match, he lights it. The dim light reveals a cage in front of you. Blank, white eyes look at you and skinless arms extend towards you. You jump back, grabbing your weapon. ${newleader} puts the candle down and grabs your arm. \n\n\"Control yourself,\" he says as he slowly releases you. As your eyes adjust to the dim light, you notice several cages surrounding you, filled with several small creatures like the ones in front of you. A skinless child with blank, white eyes stares at you, its hand extended towards you. A black, misty child with pink eyes moves around next to it, only looking at you every now and then. They have small beds in their cages. You holster the weapon and step back, looking at ${newleader}. He crosses his arms and looks at you.\n*page_break\n\n\"They're harmless. They won't try to hurt you.\" He takes his scruffy backpack off and unzips it. He reaches into it and takes hold of chunks of white and red meat. He throws them into the cage. The small, skinless creature takes a few into his hands and squeezes them. The small creature jumps to the far side of the cage and begins to munch furiously with its tiny, razor-sharp teeth. The black, misty creature blinks its pink eyes and grabs a few of them. It tries to walk out of the cage carefully, but its head doesn't fit through. It sighs and kneels down to munch on the meat.\n\n\"Fascinating, isn't it?\" ${newleader} puts his arm into the cage. The creatures sniff it a couple of times, but don't mind it. \"They know this hand gives them food. Also, I keep them well fed, so why would they attack me? You know, most animals used to attack out of fear, or instinct. Right now, they don't seem like they want to hurt me in any way. I wonder how it might change in the future, as they grow older.\" He takes his arm out and leans against the cage.\n\n\"I have a feeling they never wanted to hurt us, they might have even been peaceful. Why did I shoot them from the rooftop then? Well, our time to make peace with them is long overdue. But I have a feeling it wasn't them who started this war.\" He pushes himself off the cage and walks towards the ladder. \"Anyway, it's only speculation. We'll see. I'll stay here to take care of the rest. I believe you know the way out. And think about everything you've seen and heard in the past day. It might be a lot to process, but you're smart, you'll get through it in no time. See you, ${name}.\" He waves once, then makes his way towards the rest of the cages. You climb up the stairs and close the door behind yourself.\n\n*page_break\nThe way back goes rather quietly. There are a couple of soldiers from ${base2} making their way towards ${base} already, to establish a safer route. Deeper into the forest, you see two figures walking in front of you. Just as you notice them, one of them turns around and points his long pistol at you. You reach for your weapon, and the other man turns around as well.\n\n\"Rookie…\" the General says, already holding his rifle in his hands. You walk next to them and head towards the base together. \"We've been scouting the military…and we got caught from behind. We popped some, but we almost died back there. Another set of eyes would've been handy.\" They glance at you when you arrive at the gate. The guards open it, and you walk through. They close it behind you.\n\n\"Well, we arrived faster than expected. Rest, or help out around the base. I'd prefer the latter for you, rookie. There's always something to do if you're willing to help. I'll write my report for the ${leader},\" the General says and walks off. You stand there with ${Assassin} until it begins to feel awkward. You turn your head towards him and look into his dark eyes. You scratch your arm and take a deep breath to speak, but he turns around and walks away. \n\nFor the first time in a while, you're not tired after a long day. You decide to take a look around. The small town is filled with people. You've only explored the right half of the base, so you decide to walk past the citadel. The other side of the small town is filled with various buildings and smaller facilities. Near the wall lies a greenhouse, where presumably crops grow. Near it stands a huge barn with closed doors. \n\nPeople are moving around inside, but you doubt there are living animals in there. The buildings on the other side include a school, library, and a huge community center. Behind the facilities and the buildings stands a huge fence you can't see through with a metal door. A poorly made sign stands in front, reading 'suburb.' One guard stands on each side of the fence. You read the sign, then walk away from the closed fence. As you make your way back towards the living chambers, ${Roommate} bumps into you. \n*page_break\n\n\"Oh…sorry, ${firstname}. Didn't notice you…\" She's holding two heavy-looking grey sacks. There's a lot going on in the greenhouse. I would really…appreciate some help. Maybe stop by after you put down your weapons and stuff? It's all up to you, of course. I've gotta run now, see you!\" She rushes past you as fast as she can, towards the greenhouse. You continue to walk down the road, when shouting comes from one of the factories to your left. You cut through the dry field and pull the rusty metal door open. ${Roommate2} is standing inside with a handful of disassembled weapons, and a tall man is shouting at him. When he finishes, he smashes the weapon parts on the ground and storms off. \n\n${Roommate2} looks down for a second, then looks at you. He frowns, a sad look on his face, and pulls the metal door closed. You walk through the field and make your way to the living chambers. You put your ${weapon} down and sit for a moment to rest. There's still plenty of time left in the day, so you think about what to do with it.\n\n*fake_choice\n\n #Help ${Roommate}.\n  *set Lily %+15\n  *set helped 1\n  *set Newfriend \"Lily\"\n  *set Newfriend2 \"Matt\"\n  *set hisher2 \"her\"\n  *set himher2 \"her \"\n  *set heshe2 \"she\"\n  \n  *set hisher3 \"his\"\n  *set himher3 \"him \"\n  *set heshe3 \"he\"\n\n  You stand up and head out through the decontamination chamber. You decide to help ${Roommate} and head towards the greenhouse. You can't see through its dirty and foggy glass walls. You slide its huge, heavy door aside and step inside. You close the door and find yourself in the middle of the long lines of crops. The temperature inside is steaming hot. ${Roommate} is kneeling at a plant and murmuring to herself. You approach her, and she turns around.\n  \n  \"Oh, you came!\" She smiles and stands up. \"I didn't think you would. Anyway…let's get to business. We have to fertilize the plants, and, um…I'll tell you the rest after.\" She fakes a smile and nods. You fertilize the plants for a while, ripping the weirdly sharp weeds out. The heat begins to get unbearable after a while, and you take your shirt off. ${Roommate} glances at you from the corner of her eye throughout the work. When you're done, you take a minute to catch your breath, then walk out of the tent. The cold breeze makes your eyes widen, and you put your shirt back on.\n  \n  You walk silently back to the chambers and fall into the bed. ${Roommate} does the same, trying not to wake up ${Roommate2} in the process. You close your eyelids for a second, when ${Roommate} sits up from her bed. \"Hey, thanks for the help, ${firstname}. I appreciate it. But try to keep your shirt on next time.\" She reaches down and pulls on your shirt. \"Sleep tight!\" She giggles quietly, and it draws a smile to your face. You are, for the first in a long time, filled with happy thoughts as you fall asleep.\n  \n \n \n \n #Help ${Roommate2}.\n  *set Matt %+15\n  *set helped 2\n  *set Newfriend \"Matt\"\n  *set Newfriend2 \"Lily\"\n  *set hisher2 \"his\"\n  *set himher2 \"him \"\n  *set heshe2 \"he\"\n  \n  *set hisher3 \"her\"\n  *set himher3 \"her \"\n  *set heshe3 \"she\"\n\n  \n  You stand up from the bed and head out through the decontamination chamber. You decide to help ${Roommate2} somehow and head towards the factory. You slide the metal door open and find him inside, cursing as he tries to assemble weapons and sort out ammunition. You step inside and close the door behind you. He barely looks up, then stares back at the parts.\n  \n  You carefully take the pieces and assemble a handgun. He looks at you and frowns, then rips the gun out of your hands. \"I would…appreciate some help…\" he mumbles and turns his head away. The look of him right now draws a smile to your face. In the following hours, you spend time learning to assemble various weapons and sort different types of ammunition. After a while, his mood brightens. By the time you're finished with the last small machine gun, your eyes are wet from all the laughs you've had.\n  \n  You walk out of the workshop, and he locks the doors. You sneak back into the chambers and drop into your bed quietly, so as not to wake up ${Roommate}. \"I almost forgot…thanks for the help, bud.\" ${Roommate2} throws his pillow at you. You both chuckle, and you throw it back at him. You rest your head on the pillow, filled with happy thoughts. Like this, it doesn't take long to fall asleep.\n \n \n \n\n*page_break\n  \nYou wake up the following morning and find yourself all alone in the chamber. You sit up in bed and rub your eyes.\n\nWithout any warning, ${General} marches in through the door. \"Morning. I have a very important announcement to make on behalf of our great leader.\" He crosses his arms. \"There's a good chance of a sandstorm coming, so we'll raise our glass shield. You haven't seen that, or anything like it yet, I'm sure. While that shield is up, we'll be unable to leave ${base2}. Also, everything else will have limited electricity, so expect power shortages. Especially with our laboratory functioning again, we'll split most of it between that and the shield. For those and other reasons, we have our direct orders. I'll be in charge of the laboratory, to supervise things. ${Assassin} will be in charge of the rookies, as always. And you…starting today, you'll be doing guard duty in the suburban area. When the danger has passed and we can go out, things will go back to the way they were. Understood, ${rank}?\" He looks at you. \n\n\"Sure.\" You nod and release a small yawn.\n\n\"Good. Do not dissappoint us. Tell the guy on guard duty to report back to the ${leader}.\" He turns on his heels and walks out of the chamber, then turns back. \"Oh, one more thing…the oxygen is taken care of, don't worry.\" He leaves the doors open, but he doesn't look back on his way out. You get up and put on your camouflaged trousers and black leather gloves, then put your ${weapon} away. You take the gas mask from the table and walk towards the exit. You put it on in the decontamination chamber. As the doors snap open, you turn left, towards the metal gate. As you begin to walk, the ground shakes, and you take a look around. All around the base's perimeters, a thick glass shield is emerging, until it reaches above the city, locking it in a glass bubble.\n\nThe guards on each side look at you.\n\n\"I'm the new guard,\" you mumble, still feeling tired. They nod and put the key into the keyhole. The lock's mechanism seems to take a while to unlock. When it does, they push the metal door open, and you walk inside. They close the door behind you and lock it. You take a step forward, then stop at the sight. The perfectly lined houses and smaller buildings on each side of the road remind you of your life before it turned to hell. Each house has its own front and back yard with weirdly shaped and colored plants. A guy with a leather suit walks in front of you. \"What do you want? Who let you in?\" he mumbles, gripping his pistol.\n\n\"I'm the new guard.\" You frown and put your hand on your ${weapon}.\n\n\"They get younger every time,\" he says as he walks past you. You tell him that ${leader} wants to have a word with him, but he just shrugs.\n*page_break\n\nThe suburban area seems to be nearly empty, until you begin to walk down the road and notice some people in their houses and gardens. You assume most of the residents are working. You keep walking through the neighborhood for a while, forgetting what's behind the metal fence for a second. The couple of citizens who are wandering around give you a sharp look. You walk until you reach the end of the sidewalk. A dirt road continues from there on, into a small forest. \n\nYou keep walking through the forest until you reach a tall fence barricaded from the inside. The yellow sign on the outside reads [i]'Keep out. ${base2} junkyard.[/i]' You turn around when you hear quiet sobbing coming from the other side of the fence. You examine the fence some more. It's locked by thick padlocks, and there are wires on top of it.\n*if (Agility)\n You roll your sleeves up and begin to climb the fence. When you reach the wired part at the top, you swiftly hurdle over it, landing on your feet.\n *goto otherside\n \n*elseif (Stealth)\n You take the first padlock into your hand, then pull out a small pin. You fiddle around with the lock for a couple of seconds, until it snaps open. You repeat the process on the remaining padlocks, then walk through the fence.\n *goto otherside\n \n*else\n *if (pistol)\n  *set bullets -2\n  You take your pistol out and shoot the padlocks. They snap open and drop to the ground. You pull the fence open and walk through.\n  *goto otherside\n  \n *else\n  You take your knife out and begin to cut through the fence. It takes an awfully long time, and you get tired in the process. When you're done, you climb through the hole.\n  *goto otherside\n\n*label otherside\n*page_break\n*set inform3 true\n\nYou find yourself in a huge place that looks like a junkyard. The area in front of you is filled with all kinds of scraps and clearly visible human and mutant remains. As far as you can see, they're stacked so high, you can't see what's behind them. The trees leaning on the fence from both sides darkens the place. You hear the sobbing coming from behind the mess. You dig and climb through the wreckage until you reach the outer gate of ${base2}. \n\nThe huge gate is bent by the mess, revealing a hole in the bottom of it. You walk closer as rotting meat and bone squishes under your feet. You hear the sobbing coming from the other side. Despite what's underneath you, you lay down and squeeze yourself through the hole.\n\nYou find yourself outside, in a small forest. As you glance back, you notice that this part of the glass shield is cracked as a result of the bent gate. You take a couple of steps into the forest and see a small human sobbing under the stub of a tree. You slowly walk closer, but keep your hand on your ${weapon}.\n\nShe looks up, then tries to crawl even further inside. \"Mister! You're not one of them, are you?!\" a thin voice says. \n\n\"Them?\" you ask.\n\n\"The people. The people who hurt others and hide them there!\" The little girl with red jeans and a yellow hoodie messes around with her hands, then points over to the fence behind you. You shake your head, and she slowly climbs out. \"I…I think I lost my mom. I don't know where she is. Help me find her…please?\" she mumbles, and you can hear the rattling sound of the dying filter in her gas mask. Your own gas mask is designed to work with two filters to be more effective and last longer, but you feel like your own filters need to be changed as well. \n\nIt can work with only one, but ${General} and the management might not be happy to replace a filter if you give it away, especially if your filters need to be replaced as well. In light of that, you take a moment to make your decision.\n\n*choice\n\n #Give her a filter.\n  *set Gavefilter true\n  *set Evil %-10\n  *set Deadcount +1\n  *set Maskfilter 0\n  She stands in front of you, her filter rattling slightly. You unscrew your left filter and kneel down.\n\n  \"Okay, hold your breath. I'll replace your filter so you won't get poisoned out here,\" you say and put your hand on her filter. She nods furiously and takes a deep breath. You unscrew her filter, and as fast as you can, you screw your own into it.\n \n  \"Thanks.\" She gives you a hug. You smile and stand up, then take hold of her hand. You make your way towards the gate. You quickly unscrew one of your own filters and apply a fresh one.\n  *goto rescue\n  \n\n #Don't give her a filter.\n  *set Evil %+10\n  *set Maskfilter 1\n  She stands in front of you, her filter rattling slightly. \"We should go,\" you say and take her hand. She nods, and you head towards the gate.\n  *label rescue\n \n  You climb through the hole and begin to walk through the scraps and decayed corpses. You quickly unscrew a dying filter and apply a fresh one. The little girl grips your hand with both of hers and tries to look away from the mess. As you reach halfway, the fence comes into view. You freeze, and the little girl bumps into you. The fence is closed and barricaded from the other side.\n  \n  You think about what to do for a moment, when you hear footsteps. You turn around and see someone standing behind you. The man isn't wearing a gas mask. His clothes are melted into his rotting, putrid meat. His skin is dripping, and his bones can be seen here and there. His eyes are moving from side to side, and his hands are twitching, as if someone else was controlling the dead man. You grab your ${weapon}, but he smacks it out of your hand. You push the girl onto a pile of scrap. \n  \n  The man raises his hands, getting ready to punch. You manage to block his attack and try to counter-attack, but he evades it as if it was nothing. You try to attack him for several long minutes, with no success. He avoids all of your attacks so swiftly, as if he knew what you want to do. \n  *page_break\n  \n  Eventually, you get tired and slow down. You cannot escape and cannot block his attacks any longer. You try to avoid a kick, but you fail, and his bony foot sinks into your stomach. You fall back on the scraps and remains. He kneels over you and wraps his rotten fingers around your neck. His eyes roll back, and he begins to squeeze your throat as hard as he can. Despite him being a half-rotted human being, you can't get free. Your sight begins to fade, and your strength begins to leave you. Through the darkness overtaking your vision, you see a small figure jumping on him and wrapping their arms around his eyes. He takes his hands off of you to throw the little girl off his back. \n  \n  As soon as he does, you jump at him and begin to strike his face with your fists. Bloody chunks of meat and bone fly everywhere. By the time you're done, your own fists are bleeding, and your hands are shaking. You get off of him, panting, and his hands still twitch for a couple of seconds. You pick up your ${weapon} from the ground and holster it.\n  \n  The little girl is in the corner, crying heavily. \"Thank you…\" you mumble and walk over to her, then offer your hand. She looks at your hand and shakes her head. You look away and head towards the hole in the gate. She follows you slowly, still sobbing. You climb through the hole again, then turn towards her. \"We…have to go around. Stay close to me,\" you say and begin to walk by the gate. She nods and follows you.\n  *page_break\n  \n  You begin to walk around the gate, sticking close to the glass shield as you do so. You glance up at the watchtowers, but they're empty. Around halfway through, the little girl begins to poke you in the back furiously. You look back, and she points towards the district in the distance, which is separated by a desert. You see a huge sandstorm brewing and getting closer fast.\n  \n  You begin to run, and the little girl runs after you. She's falling behind every second, so you turn around and pick her up. Wacks, Aviatrixes, and other creatures run and fly past you in huge packs. You stick close to the glass barrier. Those minutes seem like years. You breathe fast as you reach the entrance. You knock on the glass as hard as you can, but no one is around to see you. \n  *set Sis \"Lisa\"\n  \n  *if gavefilter\n   *set Keith %+10\n   *achieve sacrifice\n  \n   You put the little girl down, who immediately begins to knock on the glass as well. The storm keeps getting closer and closer. You both look back and freeze as it's just a couple miles away. The glass suddenly pulls down, and you run inside. The glass begins to roll back up, but the sandstorm manages to blow through. The guards open the gate, and you rush in as the air fills with sand behind you. \n   \n   They slam the gates behind you, and you fall on the ground. You cough heavily and glance up to find the little girl running towards the huge crowd that has gathered in the city center to watch the sandstorm through the glass shield. Your lungs burn as you try to breathe, and you can't help but curl up into a fetal position. You keep coughing, and every breath you take feels as if hundreds of hot knives are scratching and stabbing your lungs from the inside.\n  \n   The little girl runs past you into the arms of a woman with a man standing next to her in a black suit and a red tie. They wrap their arms around the little girl and bury her in a huge hug. You look at them, and they glance at you. As your pain begins to fade away, so does your vision. You see the crowd standing aside to let ${assassin} through, along with a handful of his trainees standing between you and the crowd. As he gets closer, your eyelids begin to close.\n   *page_break\n   \n   You open your eyes, but it doesn't get brighter. It's still so dark, your eyes could still be closed. You kneel, but can't find the strength to get up. You hear footsteps coming from all around you. They sound like bare feet on the floor. \n   \n   You look around to see dark figures closing in on you. Their black, naked bodies are bent. They step closer and closer and keep looking down at you with their shining white eyes. They surround you and begin to whisper in a language you can't understand. You slowly begin to lose the ability to feel your whole body as a thick black mist surrounds you.\n   \n   [i]\"One's sacrifice doesn't redeem the anguish and agony they have given. Sacrifice. Many thing can be sacrificed. Freedom, future, sanity, humanity. A humble deed is what others would say. But in the long run, what will its impact be?\"[/i] The purple eyes watch behind the black creatures with white eyes, still whispering and staring at you. Your head begins to ring, and the noise swallows you.\n   \n   *page_break\n   \"Well…time catching up with you? A wise man once said, 'you cannot escape death forever.'\" ${capturer1} walks by in the white room and stops next to you. His footsteps echo. He steps closer and smirks, then his palm sinks into your chest. You gasp for air as your chest burns with unbearable pain. \n   \n   \"Yup, that's severe…get well, and all that. I'll bring a bouquet for you.\" He laughs and leaves the room. Your lungs burn as you try to breathe, and you close your eyes once again.\n   *page_break\n   *set lungscar true\n   You open your eyes to see a balding man with a green mask looking down at you. The pain in your chest is horrible. The light above you is the only light source in the dark room. From the corner of your eye, you see ${assassin} leaning against the wall. He's staring at you.\n   \n   \"Most interesting. The wounds on your body, I would shrug if I had to tell the origin of them; in fact, I did.\" The man with the green mask slowly circles around you. \"However, that one wound, the black one. One must wonder about the source of that. Not like anything I've ever seen. I like the pattern, though. Sun. Sunny. Sunny ${firstname}?\" He leans close to your face. \"Fear not, though. I've taken some blood, a tissue sample, and other stuff I don't want to explain right now. I'll have the results in a week, so come back in a month for a routine check-up. Oh…sorry, I got carried away. Your diagnosis is…your lungs are damaged. Severely and permanently. But you should consider yourself lucky. You're alive, after all.\" He taps your leg. \n   \n   \"So, don't try to exhaust yourself too much from now on. Also, avoid the contaminated air without a gas mask. Any of those could have fatal consequences. One month, Mr. ${firstname}. ${name}…what a weird name. Now, go home and sleep. The drugs I've given you will help. I'm off to lunch now. I have more important work to do, after all. Goodbye.\" He leaves the room with swift footsteps.\n   *page_break\n   \n   You sit up but hiss in pain. You look down at your chest and notice the fresh scar running down the middle. ${Assassin} walks closer and touches the scar. It sends throbbing pain into your back as well, so you push his hand away. There's a moment of silence as he lowers his hand, and you keep looking at each other. \n   \n   \"You did the right thing.\" His deep, scratchy voice breaks the silence. He lifts his hand, then after a short moment of hesitation, he rubs your shoulder. \"Was a brave and noble move.\" After that, he turns on his heels and leaves. You slowly get off the metal bed and walk to the chair next to the medical equipment. You put your clothes on and have to sit down after you've finished. You breathe heavily for a while, then stand up and leave the room with a burning chest. You walk through a corridor which used to be white, but is grey now from all the dirt. \n   \n   Every now and then, you encounter locked, thick green doors on each side of the corridor. In the open ones, they're either doing an autopsy or other medical work on living citizens. When you reach the end of the corridor, you find your equipment on a small desk. You put it on and open the thick double metal doors. After a quick but loud decontamination, you step out into the open. You look back at the building you just left. It's a big building behind the citadel that says 'Laboratory' in a weird font on the sign at the top of it. You begin to head towards the chambers, as steadily as you can.\n   \n   The way back is challenging. You're happy to finally find yourself standing in the decontamination chamber. You close your eyes to push through the decontamination process. Even that sends a sharp pain into your chest. As the doors open, you walk into your dark, empty chamber and put the gear down. You find a note on the table and read it. \n   \n   [i]'We aren't happy you gave us unwanted expenses, nor for having to replace your filters. Take time to rest, back to work tomorrow. - ${General}'[/i] \n   \n   You frown at the note and lean back on your bed. Thoughts and emotions fill your head as you close your eyes.\n   *page_break\n   \n   ${newfriend} walks into the dim room barely lit by a candle and freezes as ${heshe2} looks at you with questions in ${hisher2} eyes. \"Are you okay?\" The door slams behind ${himher2} as ${heshe2} sits down next to you. You nod, but keep staring in front of yourself, without saying a word. \"Well, okay then. If you don't wanna talk, I'll just leave you be.\" ${newfriend} pats you on the chest and smiles as ${heshe2} gets up. You grunt in pain and grip your chest. ${newfriend} stops and frowns, then folds ${hisher2} arms. \n   \n   \"You know, you helped me big-time yesterday. I'd feel really ungrateful and useless if I couldn't help when you needed it. Tell me what's wrong, ${firstname}.\" ${newfriend} sits back down next to you and gently puts ${hisher2} hand on your chest.\n\n   You look away, taking a deep breath before you begin to tell ${himher2} what happened today. When you're finished with the story, you can see the awe on ${hisher2} face. \"So…you almost died to save a kid. That's brave…I don't know if I could have done that. Can I…see the scar?\" ${newfriend} looks at you.\n\n   You slowly rise from the bed and take your shirt off. The dark, red, swollen scar running down the middle of your chest makes you frown, but ${heshe2} gently runs ${hisher2} finger down the scar as ${heshe2} scans your other scars. When ${heshe2} reaches for your scar forming a black sun, the warehouse with ${survivor1} and ${survivor2} flashes before your eyes. You grab ${hisher2} hands without thinking for a second.\n   \n   \"I'm…sorry. I didn't wanna hurt you.\" You slowly release ${hisher2} hands as ${heshe2} apologizes. The mood becomes quiet as the candle slowly dies out, leaving the two of you in d closer. You both look back and freeze, as it's just a couple miles away. The glass suddenly pulls down, and you run inside with the sandstorm blowing behind you. The glass begins to go up, and the guards open the gate. You run in, followed by a huge cloud of sand. They slam the gates behind you. You stop and pant in front of the huge crowd that's gathered to see the sandstorm through the glass shield. You look behind yourself to see the little girl curled up, holding her neck. She struggles and looks at you. \n   \n   \"${sis}!!\" A woman runs up to the girl and kneels down. She unscrews her own filter as quickly as she can, then screws it into hers. The woman holds her breath as the girl struggles in her arms. She wraps her arms around the woman, and the woman buries her in a hug. A second later, the little girl's hands release the woman, and her head snaps back. Her arms hit the ground, and the woman just keeps staring at her.\n   *page_break\n   A tall man with a suit and a red tie walks next to them. He puts his hand on the woman's shoulder as the woman stands up. She's sobbing quietly but also breathing furiously. She clenches her fists and turns to you. \"You…you have two filters in your mask. That means you're one of them. Could you really…not spare one?\" She walks towards you as the man keeps looking at the girl's lifeless body. \"You killed her. You…they…they use people like you as guards and soldiers. You just killed my daughter.\" She keep her fists clenched, and the man looks at you. \n   \n   Whispering can be heard from the huge crowd that's surrounding you. The man turns around and begins to walk towards you. When he's close enough, he raises his fist. You're frozen, and the only thing you can see is his fist flying towards your face. \n   \n   \"Are you attacking an official member of the Sons?\" ${General} stands in between you and grabs his fist. Dozens of soldiers follow him through the crowd, surrounding you and keeping the crowd at bay.\n   \ door and steps inside. \n\t \n     \"Do you know what's wrong with ${newfriend}?\" ${newfriend2} asks, but you just shrug. \"All right…I'll, uh…try to cheer ${himher2} up. See ya.\" With that, ${heshe3} turns around and walks out of the room. You keep lying in bed for a while. Just you and your thoughts, recapping this long day. After a while, you fall asleep without seeing either ${newfriend} or ${newfriend2} return.\n     *finish\n\t ", "chapter5": "[b] Chapter 5 - Motion [/b]\n\n*if not (loverstatus)\n\n You sit up in your bed in the darkness. \"Oh…kiddo…so lonely. So sad, I'm on the edge of shedding a tear.\" He steps out of the darkness and crosses his arms in front of you. \"No, not really. You're lucky. I'm here for you…who else would you need? Your new 'friends'? Which one, kiddo? The one playing like he's the head of an army, going so far as to call himself a General? Like there are Lieutenants or Colonels anywhere. Or the other one I don't even know the name of. Yes, he's that insignificant.\" ${Capturer1} grins and puts his left foot next to you. \n \n \"You don't need anyone else but me. And I don't need anyone else.\" He looks into your eyes and laughs. \"What? Did you expect a continuation?\" He puts his hand on your head and sighs, a smirk appearing on his face. \"Oh, kiddo…the future that awaits us…\" He grins, and his dark, red eyes begin to glow.\n *page_break\n \n You jump up from the bed, your heart beating so fast that you have to put your hand on your chest to calm yourself. Your neck feels sore, so you give it a small rub. You get up and grab your gear. From the doorway, you glance back at ${newfriend} and ${newfriend2}, then close the door behind you.\n \n *goto morning\n\n*else\n You open your eyes, feeling startled for a second from having someone's arm around you. After the unusual feeling passes, you snap back into reality and look at ${lover}. A small smile appears on your face as you look at ${himher2}.\n\n \"Is everything okay?\" ${newfriend} mumbles as ${heshe2} opens ${hisher2} eyes and tightens the grip around you. \n \n \"Sure…everything's fine.\" You rub ${hisher2} back, and ${heshe2} nods. $!{heshe2} closes ${hisher2} tired eyes. You gently take ${hisher2} arms off you and get out of bed. You grab your gear and walk out of the room. Before you shut the door, you glance at ${newfriend2} sleeping on ${hisher3} bed, then look at the sleeping ${newfriend}. You smile and close the door quietly.\n *goto morning\n  \n  \n*label morning\n*set trapwound false\n\n\nIt's still earlier than it should be, but you decide to head out. You go through the usual decontamination process and leave the chambers. The sunlight is barely visible through the glass shield. You begin to walk through the dim, empty city. You reach the gate of the suburbs, and the guards open the door. They don't say a word as you walk through and just shut the door behind you. \n\nThe whole city seems to be still asleep, but you begin to slowly walk through the area, becoming deeply entangled in your thoughts. You sit down on an empty bench halfway through and focus on the things in your head even more, just staring at the houses with yards in front of you.\n*if gavefilter\n\n The wound on your chest burns, so you rub it gently in the meantime. You peep under your shirt and frown at the heavily inflamed scar. As the sun comes up, the citizens begin to fill the streets. You get up from the bench and begin to patrol the streets. Every now and then, you have to stop to catch your breath. Even the slightest help the citizens ask for turns out to be exhausting. \n \n The day goes by rather fast, with depressed thoughts and anger filling your head. You decide to walk from end to end one last time before heading back. You're about to reach the end of the road, with the dirt road in sight, when you feel something wrapping around both of your legs.\n *page_break\n \n You grab your weapon and turn your head to see the little girl hugging you from behind. \"He! He saved me!\" The little girl releases you and walks back to the woman and the man in the suit. You release your weapon and turn towards them.\n \n \"${sis}…don't freak him out,\" the tall man says as he puts his palm on top of her head.\n \n \"We just wanted to thank you for saving our daughter.\" The woman steps forward. \"Please…accept some tea and dinner, if you haven't had one yet.\" She puts her arm around her daughter.\n \n \"Sure…thank you,\" you answer and follow them down the road. You haven't walked for long when you arrive at a dark-brown house with a red roof. They open the small door in the fence and walk towards the front door. They unlock the door, and you squeeze into a small decontamination chamber. You stand side by side in the elevator-like chamber as it loudly goes through the decontamination process. They open the door, and you step out to find yourself in front of the stairs. To your right is a small kitchen, and to your left is a living room with another closed door at the end of it.\n \n \"Just one moment…I'll organize some things, and then we'll have dinner.\" The woman turns towards the girl. \"${sis}, go into your room, pack your bag for tomorrow, and get ready for dinner,\" she says as they walk towards the room at the end of the living room and close the door behind them. \n \n The little girl walks up the stairs, then you hear a door closing. You stand between the stairs and the front door, looking around the house. The furniture and the state of the house is slightly better than what you would expect after the nuclear explosions. They seem to have electricity, and they might have gas as well. You begin to wonder if all of the houses in the suburbs are in this good a state. You stop wondering when the little girl shuts the door behind her and runs down the stairs. \n \n She comes down without her gas mask. Her long, blonde hair flies behind her as she hops onto one of the chairs in the kitchen and puts her ragged purple backpack on one of the empty chairs. [i]'L.L.'[/i] followed by an address is written on the front of it. Apart from her quiet humming, you only hear quiet chatter from the room opening from the living room. She looks at you with her green eyes and smiles. Her parents come out of the room and walk into the kitchen.\n \n \"Please…take a seat in the living room. I'll bring the food in a moment,\" she says and opens the door of a very old fridge.\n *page_break\n \n You follow the man and the little girl into the living room, then sit down on the ripped couch. They sit down in front of you on another couch. The man takes his gas mask off and fixes his black, spiky hair. \"Thank you again for saving our…everything.\" A smile appears on his face. His mouth is surrounded by a goatee. You have no time to answer, as the woman walks into the room and puts what seems to be beef jerky and crackers on the table. She sits down and takes her gas mask off too, then combs her blonde hair. She looks at you with her blue eyes.\n \n \"Anyway…I don't think we've had the time to properly introduce ourselves. And considering the fact that we're both government officials, requires that even more!\" The man stands up and disappears into the kitchen with a smile on his face. A moment later, he returns with a glass full of brown liquid and three small mugs. \"I know that this isn't how you should drink whiskey, but we only have these mugs.\" He chuckles and pours the whiskey. \n \n \"It's all good…\" You smile as he finishes and hands you a mug. \"Well…you can take the gas mask off now. It'll certainly make drinking and eating a lot harder.\" He laughs, and you take the gas mask off. The woman frowns for a brief moment, then gives the little girl's head a small rub.\n \n \"That's better. Now, I'm ${newguy}.\" He shakes your hand.\n \n \"${firstname}.\" You shake his hand, then turn towards the woman. She's frowning slightly, then forces a smile.\n \n \"${mother}, ${mother} ${lastname}. And you met our daughter sooner than us, ${sis} ${lastname}.\" The woman points at the little girl as the smile slowly fades from your face.\n *page_break\n \n You drink the whiskey and put it on the table, then sit down. You keep staring at ${mother} and ${sis}. Your breath quickens.\n \n \"So…I take it you're a guard?\" ${newguy} asks and takes a slice of jerky.\n \n \"No…I'm a scavenger. I go out with the General and the rest of them.\" You take some jerky with shaking hands, but after taking a bite, you feel full. \n \n \"Ah, I see…General ${General}…he's a good guy. I work in a different area. I'm more like on the planning side…rather than the implementation side. Our ${leader}, though…he's a real clever person.\" He smiles, and you keep talking about the citadel and ${base2} for a while. \n \n \"All right boys, that's enough work talk…let's eat. ${sis} has to go to bed soon, she has school tomorrow,\" ${mother} says, and you all begin to eat in silence. You have to force yourself to push that one slice of jerky down into your stomach. When you're done, you thank them for the food and lean back. \n \n ${sis} yawns, and ${newguy} stands up. \"All right, it's time for you to go to bed, princess.\" He picks her up in his arms. \"I'll be back shortly.\" ${mother} nods, and he carries the little girl up the stairs. The door closes upstairs, and you sit in front of each other in silence for a short while. \n *page_break\n \n \"So…where were you before you moved here?\" she asks and smiles.\n \n \"That's a rather long story…been everywhere,\" you reply.\n \n \"I see. I guess your parents died when this all happened, that's why you have to fend for yourself. What were their names?\" She crosses her arms.\n \n \"I…think so.\" You frown as well. \"They were called…${mother} and ${father} ${lastname}.\" You begin to breathe faster, and it feels like little spiders scratching the inside of your wound. \"But I didn't have a sister.\" You put your palm on your chest and try to calm your throbbing heart.\n \n \"Maybe…they didn't have a chance to tell you, because the bombs fell…\" the woman says, looking into your eyes. Her eyes begin to get wet, and she covers her mouth. She closes her eyes for a second, then takes a deep breath before she looks at you. \"I…I thought I'd lost you. I've buried you in my head so…so many times.\" Tears roll down her cheeks. You keep pushing your hand on your chest and just stare at her as burning pain fills your whole chest. The knot in your stomach doesn't seem to be lightening, either. \"I'm…I'm sorry. I didn't even think that you could be alive…\" She wipes her tears away and just keeps looking at you. You lift your head and look at her. You feel…\n \n *fake_choice\n \n  #Angry and sad.\n   *set Thatone true\n   \"Yeah…you didn't think about replacing Dad and I for a second, though. You've done both quite well. Good job with that. You didn't seem too concerned about either of us. But for your daughter…you can stop the fake tears right now. Enjoy your new family…Mom,\" you say with a clenched fist as you stand up from the couch. \"I just wish you'd recognized me. But I don't wanna bother, you have a family to take care of.\" You begin to walk towards the front door.\n   \n   \"What did you expect me to do? Do you think I haven't looked for you? After your father's death, I searched for you everywhere! I never found even a trace of you! Yes…I decided to move on, let the past be past, and step forward. And be happy…\" She shakes her head with tears in her eyes.\n   \n   \"Well…I'm glad you could replace us so easily and even find happiness in that. Enjoy your new life. I don't want to interrupt. I think it's for the best if we never talk again and both act like I'm dead to you. You seem to like that.\" You step into the decontamination chamber and walk out the other side before she has a chance to speak.\n   \n   You walk through the area, towards the chambers. You're so angry that your heart is pumping very fast, and you don't remember how you arrived at your chamber. You take your gear off and sit down on the bed. ${newfriend} and ${newfriend2} are already asleep. You lean back on the bed and close your eyes. You take a couple of deep breaths and try to calm down until you can finally fall asleep.\n   *page_break\n\n   \"That's the spirit! You should have killed them right where they stood. Lisen, hey, listen!\" ${capturer1} pushes your eyelids open, and you look at him. \"So…I'd have just grabbed a knife from the kitchen and ripped your mother open right where she was sitting. I bet that clown with the suit…seriously, isn't he like a clown in that suit? A clown's lawyer!\" He laughs and crosses his arms.\n   \n   \"So, the clown would have hurried down, but you would be there already waiting for him. He would have turned the corner and swallowed the knife. Just imagine the look on his face! Then you could have moved here with your sister. You could raise her to be a loyal soldier of yours. See…that's how you should have behaved. Despite all the similarity between us, you still need guidance from an expert. Like me. Okay, you can go back to sleep now.\" He leans down and forces your eyelids shut with his fingers.\n   *if loverstatus\n    *goto morningw\n   *else\n    *goto morningwo\n  \n  #Happy.\n   *set Thatone false\n   \"It's…fine. I'm glad I found you in the end. That's all that matters.\" You smile and take a deep breath.\n   \n   \"It's been so hard…we searched for you everywhere…but after your father's death, it became harder and harder for me to just stay alive.\" She looks away. \"Then I decided to move on…it might have been a bad idea, but I found happiness in ${newguy} and your sister, ${sis}.\" She smiles.\n   \n   \"She's sleeping tight as ever.\" ${newguy} walks into the room and sits down next to your mother. She looks at him and wipes her tears away. \"Everything okay?\" ${newguy} frowns.\n   \n   \"Yeah…more than fine, in fact…\" Your mother replies. \"${newguy}…he's my son, ${name}.\" Your mother keeps smiling. ${Newguy}'s eyes widen, then you shake hands. \"Your mother talked about you a lot, but…we thought you were dead.\"\n \n   You keep talking through the night. You briefly share what you've been through, and they do the same. \"I always knew that you were smart. But…if only half of what you said is true…then I'm already very proud of you,\" your mother says in awe. You keep on talking for a while, until silence fills the room. \n   \n   \"Well…I think we should all just go to bed. We have to get up soon,\" ${newguy} says. Your mother and you agree, and you head towards the front door. \"If it's suitable for you…you can sleep on the couch. Sorry, but we don't really have anything else to offer,\" ${newguy} says as they stop at the bottom of the stairs. You take his offer and walk back towards the couch.\n   \n   \"Sleep tight, son.\" Your mother walks back to you and hugs you. She kisses the top of your head, and you hug her. She releases you and walks up the stairs. A smile appears on your face before you collapse on the couch.\n   *page_break\n \n   \"Aw…how happy this little family reunion is.\" ${capturer1} smiles, then frowns and crosses his arms. \n   \n   \"Disgusting. She left you, abandoned you. And you run right back into her arms? I bet if you asked her to abandon you again, she would. Or maybe you wouldn't even have to ask, she'd do it if she had the chance. She's done it before. If I were you, I'd focus on our plan instead. You can rule with me, or you can live as a dumb slave not knowing he's a slave, in the hands of his new family. But then I'd have to kill you. I didn't come all this way just to give up. I'm counting on you. And when I can't anymore, I'll pull the trigger.\" ${capturer1} grins and walks away from you, then up the stairs. You'd follow him, but you feel paralyzed. Your eyes slowly shut back down.\n   *page_break\n   \n   You open your eyes and jump for a moment when you see ${sis} staring at you, an inch away from your face.\n   \n   \"${sis}, don't startle your brother,\" your mother says and brings you a plate packed with pale vegetables. \"I don't know what you usually eat for breakfast, but this is kind of all we have. And we have to leave soon, so I thought you'd have to as well. But if you have nothing to do, then feel free to stay!\" She smiles and heads towards the kitchen as ${sis} sits down next to you.\n   \n   \"So, you're my brother.\" She pulls her knees up. You nod as you force the vegetables down.\n   \n   \"Awesome! You're a nice person. And you have a nice face.\" She hugs you, then jumps off the couch and heads up the stairs. You finish the breakfast quickly and begin to get ready. You put your gear on, and a couple of minutes later you're standing in the decontamination chamber with the others.\n   \n   \"Honey, have a good day at school.\" Your mother rubs your sister's head. You frown under the gas mask. Even in times like this, they have to go to school. \"And you two have a good day at work.\" She looks from you to ${newguy}. \"Also…come over whenever you feel like it, ${firstname}. I really missed you.\" She wraps you in a hug. ${sis} joins the hug as well, then they head off. ${sis} keeps waving at you for a while, then you depart towards the gate with ${newguy}. \n   \n   \"Well…you surely have changed our lives now. I hope it's for the better though, I really do. Your mother didn't sleep much last night. And who knows, we might become best friends as well. After all, we're both high-ranking personnel.\" ${newguy} chuckles and offers you a hand, and you shake it before he leaves.\n   *goto alonemorning\n   \n \n\n \n*else\n *set thatone true\n\n You can't get rid of the thought. ${Sis}…${lastname}…you keep dwelling on whether you're really related or it's just a weird coincidence. You look up to see citizens walking in smaller groups. They look and point at you from time to time, whispering to each other. \n \n When there's enough space between you and the groups, you stand up and begin to follow them. You walk through the main street of the suburb, until they reach the dirt path you went down yesterday. They take a left turn and begin to walk through the tall grass and flowers, lined with tall trees. You follow them as they walk behind the houses, and the big group forms a circle. As you get closer, you begin to hear chanting and someone talking inside the circle. You sneak closer and peek between the people. \n \n A couple of feet can be seen, along with crosses made out of sticks and bigger branches stuck into the ground. As the people open the circle, you realize it's a burial ceremony for the dead little girl. The man standing in the middle is the priest you saw preaching in the town square. In front of him is a hole, surrounded by crosses of every shape and size, marking other graves. \n \n *page_break\n As he finishes his sermon, a couple of others shovel earth into the hole until it's filled. The sobbing woman walks closer and puts the cross made out of branches down, then mumbles something. The priest in the middle looks at you and steps back. He raises his arm and points towards you. \n \n \"He…it's him…with the mark! You are doomed, son. Your soul and body, both are doomed. You're not human anymore!\" he stutters. The crowd turns towards you.\n\n The woman stands up and begins to walk towards you with clenched fists. \"Murderer!\" she shouts as she gets closer.\n\n A firm grip on your shoulder turns you around, facing the man in the suit. \"I know who you are. I asked around, your name is ${firstname}…${firstname} ${name}…\" He tightens the grip on your shoulder, and the woman stops in front of you.\n \n \"${firstname}…${lastname}…what's your mother and father's name?\" The woman stands by the side of the man as the crowd begins to walk towards you. From the initial shock, you don't say a word. \n \n \"Answer…or I swear to god, I'll end you right here!\" The man pulls out a revolver from the inside of his suit.\n \n \"${father}…and ${mother},\" you murmur in shock. You stare down the barrel of the revolver and notice the man's shaking finger.\n *page_break\n \n \"No…this can't be…I didn't raise you…raise you to be like this. A murderer!\" The woman buries her gas mask-covered face in her palms, then looks at you. \"I buried you so many times in my head to ease the pain…then found happiness. And now you've taken the happiness away from me. I don't ever want to see you again. Never…ever again. You are not my son. My dear son…the one who wouldn't be capable of doing something like this…${firstname}…is dead to me.\" She turns away from you, still sobbing, then grabs the arm of the man as she walks away. He holsters the weapon, and they leave. \n \n You keep standing there for a while, just staring ahead. The crowd begins to clear out. They whisper, mumble, and some of them curse and spit at you as they walk past. \"You will be the doom of humanity. Not human…not human!\" The priest hurries off, trying to get as far away from you as he can.\n\n When you can finally bear to move, you start to head back as well, anger and sadness filling your body. You're so full of emotion, you don't remember how you got back to your chamber. You drop your gear down on the floor and sit down on your bed. You keep rubbing your forehead, thinking so hard that you shut out the world around you.\n \n *if loverstatus\n  \n  You feel an arm wrapping around your back, then rubbing your arm. You open your eyes and look to your side to see ${lover} sitting next to you. \"What's wrong, love?\" The rubbing on your arm intensifies as ${heshe2} smiles at you. You take a deep breath and tell ${himher2} everything you can quickly remember. ${lover}'s eyes widen and ${hisher2} yaws drop. \"I'm…sorry…that's intense. I don't know what to say…but you can always count on me. Seriously, I'm here for you if you need anything. Ever.\" ${lover} smiles and gives your cheek a kiss. You can't help but smile and kiss ${himher} back. \n  \n  \"Get a room…disgusting,\" ${newfriend2} says as ${heshe3} walks in, frowning. Throughout the night, ${newfriend2} avoids the two of you. You have fun with ${lover}. You have dinner together and keep talking through the night as you cuddle.\n  \n  \"Hey, get up. I wanna show you something.\" $!{heshe2} climbs over you and pulls you up on your feet. You both get dressed as fast as you can. $!{heshe2} grips your hand tightly and pulls you out of the chambers behind ${himher2}.\n  *page_break\n  \n  You step outside, and ${heshe2} drags you to the back of the city. A couple of patrolling guards walk towards you as you reach the back of the citadel, but when they notice you, they stop and walk back to their positions. ${lover} drags you further towards the back of the small town. You climb over the small wooden fence surrounding the training area, where ${assassin} practices with the rookies. You walk past the dummies. $!{heshe2} lets go of your hand when you reach what looks like a pile of hay in the dark, and ${heshe2} drops down on it. You lay down next to ${himher2} and pull ${himher2} closer. \n  \n  \"Look at the sky.\" $!{heshe2} gently caresses your chest with ${hisher2} fingertips. The sky is pitch black, but a couple of stars are shining here and there. After looking up at the sky for a while, you notice slight, thin waves of cloud moving with the wind. This feels very calming, and you just watch it with ${lover} in your arms.\n  \n  \"I used to come out here pretty often. It helps me forget, but sometimes it has the opposite effect, and I remember things I don't want to.\" $!{heshe2} sighs.\n  *if (lover = \"Lily\")\n   \n   \"I often think about my mom out here. I don't really remember much about my life before the world became like this. I know that I was happy, though. Despite being a pauper, I was.\" She gently turns your head towards her, and you look into her eyes through the gas mask's glass. \"Were you happy before this? Do you miss your old life?\" She rests her hand on the leather of your mask.\n   \n   \"I had ups and downs, but I'd still prefer that over this,\" you reply, taking her hand in yours.\n   \n   \"I barely remember my mom…but I clearly remember her death.\" She looks down as her hand still lies in yours. \"It happened so suddenly…then my dad began to pay less attention to me, like he blamed me or hated me for it. It's all just so weird, I still can't understand why he did that. Well, that day I lost both of my parents…but…I guess you know what that feels like.\" She pulls you closer, and you wrap your arm around her.\n   \n   \"I try to stay positive, but it's hard sometimes. You definitely make it easier. Hey, do you think we could lift the gas mask off for a quick kiss?\" She giggles.\n   \n   \"Sure, just don't breathe,\" you reply, then begin to count down. When you reach zero, you both take a deep breath, then lift the gas mask up just above your lips. You meet her warm lips for a couple of seconds before you lower the gas mask again.\n   \n   \"I don't know why, but that was very exciting. Life with you will never be boring. That's why I love you more than you even know.\" She chuckles and rests her head on your arm. \"I keep thinking about us in the future. Having a normal life by then, making enough or having our own animals and crops. Having kids, two boys and two girls. Things like that. It's fun to think about that. Do you have thoughts like that, or is it just us lowborn Paupers dreaming of the good life? Tell me, mighty son of Ignobilis.\" She kneels over you, pinning your arms down. You can't help but laugh.\n   \n   Throughout the night, you keep talking about life before the bombings, being a resident in the differing districts, and your lives and future together. You express your love and affection for each other in many ways. When you can barely keep your eyes open, you agree to go to sleep. You wrap your arms around her and walk back to the chambers.\n   *goto togethermorning\n\n  *else\n   \"I found this place when I was feeling down. I used to sneak out and just walk around. I often think about my life before all this started.\" He turns his head to you and looks into your eyes through the gas mask's glass. \"I wish I could get it all back. Being born as a Pauper was considered one of the worst things. Despite that, I'd still prefer that life over this one. My parents were exceptional. They loved me and did everything they could to give me a life they never had, to make me happy. To know that I'm safe. Even when they knew it was the end for them, they just wanted to save me…I miss my parents, ${firstname}. I miss my parents so much.\" He looks down, and you pull him closer.\n   \n   \"Me too…\" You rub his back, and he places his hand on your chest.\n   \n   \"Your heartbeat calms me. Don't you ever let that heart stop beating, or I'll hurt you.\" He chuckles and kneels over you. He sits gently on your stomach and rubs your chest. \"Nowadays, I don't sneak out though, because you make me happy. I often think about us in the future. Having a nice house, a couple of kids, cars, stuff like that. Of course, we'd have to leave this place if it didn't change for the better by then. Then we'll have a normal life. At least that's what I'd like to happen.\" He smiles and leans closer. \"Hold your breath,\" he says, and before you have time to ask why, he's already lifted your gas mask up. He quickly lifts his own as well, just above the mouth, and puts his warm, soft lips on yours. When you're done, you both pull the gas masks back down.\n   \n   \"Well…that was fun. That's part of why I love you. You're interesting, fascinating, and entertaining. And pretty tough.\" He winks and lies down next to you with his head on your chest. Throughout the night, you keep cuddling and talking about life before the bombinbs, being the residents of different districts, and your lives together. You express your love and affection for each other in many ways. When you can barely keep your eyes open, you agree to go to sleep.\n   *goto togethermorning\n   \n   \n\n\n  \n\n  \n  \n \n \n *if not (loverstatus)\n \n  You open your eyes as ${newfriend} and ${newfriend2} walk inside, holding each other's hands. \"Heya, ${firstname},\" they say, but immediately continue their own conversation. They sit down on the bed and continue chatting. You get up to have dinner, but shortly after, they follow you, and you're forced to eat at the same table with them. \n  \n  When you're done, you walk back inside and lay down in your bed. They follow you and get into their own bed. They cuddle throughout the night. You pull the pillow over your head and get back on track with your thoughts, until you manage to fall asleep with their giggles filling the room.\n  *page_break\n  \n  \"Teeheee…I love you more…no, I love you more…Jesus Christ, kiddo, tell me you'll kill them. Please tell me you'll kill them slowly so their ear-torturing laughter turns into a miserable scream. I can't handle it!\" ${Capturer1} stands above them, his arms spread wide. \"Or sew their mouths shut, if you don't want to rely on an easy solution. That'd also teach them a lesson!\" He winks at you.\n  \n  \"Imagine if you had to lay here and be all disgusting and annoying like them…horrible. Seriously, do something about them, or I'll have to. On a side note, I'd enjoy that. But both versions are fine. At least they aren't weighing you down, so you can focus a hundred percent on our plan to take over the world. I think I'll throw up if I have to look at them any longer.\" He shakes his head and walks to the door. You close your eyes again.\n  *label morningwo\n  *page_break\n  \n  You open your eyes again, then sit up. After stretching your limbs, you put on your gear. ${newfriend} and ${newfriend2} are still asleep, facing each other. You walk out and have breakfast. You can't eat all of the mashed vegetables, so you head out early.\n  *goto alonemorning\n  \n\n  \n  \n*label togethermorning\n\nBack in the chambers, you collapse into bed. You continue your cuddling where you left off and fall asleep entangled in each other's arms in no time.\n*page_break\nIn the middle of the night, you wake up to footsteps in the room and sit up in bed with a quickly beating heart.\n  \n\"That's unfortunate. Just kidding. It's good that weak people like your mother or her new buddy won't weigh you down. By the way, why is he dressed like a wannabe lawyer? Please tell me you've noticed that too. He looks like a clown ready to defend an elephant!\" ${capturer1} laughs and smacks his knee. \n  \n\"Kiddo…I'm glad you've found love.\" He looks from you to ${lover}, then grins. \"Just kidding. The situation you've put yourself into with a…drag like ${himher2}…unbelievable…do you even think before you act? Or your plan is to use ${himher2} as bait when the time comes? If so, please tell me.\" ${capturer1} crosses his arms.\n  \n\"No…I love ${himher2},\" you say as he takes a few steps toward you.\n  \n\"Love?! Kiddo, there's no such thing as love! You can love a place, love a weapon, love a target, or the way someone dies. But you don't love people just like that in a place like this. In a world like this. A true warrior…a born leader would know that. Name a human being I love. Wrong! At the very best, I endure you. Fine…I'll get rid of ${himher2} when the time is right. I'll do it for you, if you're too weak. Pathetic.\" He pats you on the cheek, then walks out of the chamber. You lie back and close your eyes again.\n*label morningw\n*page_break\n  \nYou open your eyes later in the morning. The first thing you see is the sleeping face of ${lover}. You give ${hisher2} lips a small kiss, and ${heshe2} smiles in ${hisher2} sleep. As quietly as you can, you get out of bed and put your gear on. You look towards ${newfriend2}'s bed as you leave the chamber. ${newfriend2}'s eyes are open, and ${heshe3}'s just staring at you. You have a quick breakfast, which has the same quality as before. After that, you head out to the suburbs. \n*goto alonemorning\n\n \n \n \n \n*label alonemorning\n\n\nAs you walk towards the suburbs, you know your days will look the same for a while now. Patrolling, then going home. In the suburbs, nothing really happens. Whenever something does happen, it's nothing serious you couldn't handle. With that thought, you let out a frustrated sigh and enter the area.\n*page_break After weeks of patrolling…\n\n\nYou walk towards the decontamination chamber, thinking about how boring your day is going to be. How long is it going to be like this? With those thoughts in your head, you step out of the decontamination chamber. The sky above appears perfectly clear behind the glass shield.\n\n\"Morning,\" a voice says, and you jump slightly at the unexpected sight of ${General} standing before you. \"Ahem…as you can see, the sandstorm has passed just like it came. So, you're back on duty, superior's orders. And no, I didn't mean to say 'we.' You go with ${assassin}. I have to attend to our laboratory for an unspecified amount of time. Again, superior's orders. Since you're awake, go to ${Assassin} and give him this note.\" He hands you a folded piece of paper.\n\n\"Don't open it. Make me and ${base2} proud, rookie.\" He nods once, then turns around and leaves. You take the note and head towards headquarters. You go past the citadel, just as people are beginning to enter and leave the building. You walk through headquarters, towards ${assassin}'s dark room. You knock a couple of times on the door, but receive no answer. You push the handle down and step inside. ${assassin} is lying on his bed, covering his face with his left arm. You walk closer and shake him gently. \n\nAfter you shake him for a couple of seconds, he grabs your hand and jumps up from the bed. He gets hold of your neck and shoves a handgun against the side of your head. You try to calm him down, all the while gripping your own ${weapon}. He breathes heavily, then releases you.\n\n\"Never do that again.\" He sits down on the bed and ties his black boots. You nod and rub your neck, then give him the note with your other hand. He frowns and crumples up the piece of paper, then throws it on his bed. \"Go.\" He picks up his gear and a small bag with a soft, dark-purple glow coming out of it, then points to the door. You leave his room and walk out of the building. He murmurs under his breath until you reach the gate. The guards open it, and you walk through.\n\nThe damage done by the sandstorm immediately shows. There are scraps and various destroyed parts of buildings and vehicles lying around. You take a left turn and go towards a location you've never been to before. As you walk closer to the forest, dead bodies, mutant and human alike, can be seen all around. The trees are bent, and some of them have even fallen. \"Never been so harsh,\" ${Assassin} mumbles as you walk further into the forest.\n*page_break\n\nAs you reach the end of the forest, the remaining stirring sand and fog blocks most of your vision. You walk down the hill, stepping over a body that's still twitching. Despite the recent sandstorm, a muddy, grey area comes into view, with small huts and tall, yellow plants going as far as you can see.\n\nYou follow ${assassin} as closely as you can, with your hand close to your ${weapon}. As you get further away from ${base2}, it begins to get harder and harder to walk through the now knee-deep mud. ${Assassin} moves swiftly, checking the huts and the areas around them. You're trying to keep up with him when something takes hold of your leg. You feel it creeping up your leg, then gripping both of your legs just above the knees. The grip on your legs begins to feel stronger, so you decide to…\n*fake_choice\n\n #Grab my ${weapon} and attack whatever is under the mud.\n  *if weapon = pistol\n   *set bullets -2\n   You flip your ${weapon} out and begin to shoot downwards.\n   \n  *if weapon = knife\n   You spin your knife into your hand and begin to stab downwards furiously.\n   \n   \n  The more damage you try to inflict on whatever is holding you, the more it takes hold of your legs. ${assassin} comes out of a hut and freezes, then runs towards you.\n  *goto ff\n \n #Try to break free.\n \n  You try to kick whatever is holding your legs off and break free. The more you struggle, the more you begin to get dragged down. ${assassin} comes out of the hut and runs towards you. \n  *label ff\n  He takes the knife off his belt and slashes it a couple times under the mud. Black, muddy blood splatters around, and you hear a wild scream. You almost fall as it releases you.\n  \n  \"How did you survive before…\" He holsters his weapon and walks away from you. After the screaming ends, growling and shouting echoes in the distance.\n  *goto mudcont\n \n #Freeze.\n  As soon as its grip begins to tighten on your legs, you freeze in place. The grip comes higher and higher up until it reaches your waist. You glance down and see a couple of tentacles slowly wrapping themselves around you. Your heart beats so fast, your whole chest bounces. ${assassin} comes out of a hut and looks at you. The tentacles feel around you for a while, then slide back down where they came from, releasing you. ${Assassin} nods at you. \"Good,\" he says and continues walking.\n  *goto mudcont\n  \n*label mudcont\n\nYou follow him for a while and peek into the huts. There's usually nothing inside, apart from the dead bodies. You wonder who could have built them, when, and why. When you've peeked into all of the huts, you make your way towards a tall, wooden hut in the distance. The tall, yellow sunflowers and canes cut you and get stuck in your clothes every now and then. It gets warmer, and the plants get taller as you get closer to the hut. \n\nYou're sweating so much, you almost constantly have to wipe your face off. You reach the wooden hut's back and walk around it. You find it open, without any door. Inside stands a small campfire, soaked in something. You turn around, and ${Assassin} is standing with his back to you, staring into the distance. \n\nYou stand next to him, but can't see anything in the fog. You're about to take a step closer, but he puts the back of his arm against your chest. As the fog slightly clears, hundreds of mutants come into view. You're standing on the edge of a large cliff. In front of you is a huge crater, giving you a clear view of the wall of Ignobilis. It looks bigger than you it seemed on television back then, as if several bombs have fallen, or as if it has been greatly empowered. \n\nIn the crater, mutants are running around. Rapid, mutated animals, half-rotten creatures with weird mutations, wacks, and types you haven't seen before. The crater is filled with the remains of buildings, roads, wildlife, and other scraps. Around the middle are many small buildings made out of scraps and wood.\n\n\"Radiation is deadly there.\" ${Assassin} turns towards you.\n\n\"If not the radiation, then those things.\" You cross your arms and look at him. \"What now?\"\n\n\"We wait.\" He takes the small backpack off and walks into the hut. He sits down next to the campfire. You follow and sit down next to him. You still have a fair view of the crater. The fog and remaining sand make the already grey area even darker. You keep looking at the mutants chasing each other in the crater for a while in silence.\n\n\"That's their nest. The craters.\" ${Assassin} clears his throat but still speaks in the same scratchy voice. \"How did you get this far? You're too young to be able to fend for yourself. Tell me everything.\" He leans back and glances at you with his red eyes. You sigh and begin to tell him everything from the start. He sits through your long story and asks questions sometimes, but doesn't move a finger the whole time. Telling the story takes a while, and silence follows it.\n*page_break\n\n\"Been through much.\" He nods. \"I knew ${capturer1}. The guy was smart, but power changes people. That's when I decided it's best our paths go different ways. But you have to do what you have to do to survive. And sometimes, even your best intentions have the worst outcome. But I suppose you know that all too well.\" He looks right at you for the first time since you left ${base2}. \"Tell me, ${firstname}. What's your plan for the future? Do you want to have a family, kids someday?\"\n\n*fake_choice\n\n #\"Yes.\"\n  *set Wantfamily true\n  \"Yes, when things are clear and death doesn't await you at every step,\" you say and look forward for a second.\n  \n  \"I see. Well, I'm not sure things will ever change here. Although we are working on that. But going outside the district is not an option. I'm sure you've heard the rumours about the one place far away where they've managed to clear everything, and things are perfectly fine. Well…that's what's left of the military and those who had the money. And the military isn't here to protect us. They're here to protect themselves. From us. They don't want anything or anyone leaking out of here. If they killed us, or dropped the bomb on us, where would the creatures go to feast? It's simple…we keep the creatures and each other at bay for them.\" He looks back into the distance. For a couple of minutes, you both stay quiet.\n \n #\"No.\"\n  \"No. In a world like this, I don't. I have no time for things like that,\" you say, glancing down for a second.\n  \n  \"I see. Well, if living like this is the only problem, I have bad news for you. As much as we're working on changing the districts, I'm not sure it can ever happen. It's all just a struggle day by day, just to survive. A chore you have to do, or you die. And leaving the boundaries of the districts isn't an option either. The place the rumors spread about, the one where everything is cleared and fine…it's organized by what's left of the military, and those who had more than enough money. Well, they don't want anything from here over there. The military isn't here to evacuate people, they're here to keep everything that's here behind the walls. They could kill us many ways, but then where would the creatures go when they run out of food? This situation keeps the creatures and us at bay.\" He looks back into the distance. You both stay quiet for a couple of minutes.\n   \n*page_break\n\"For your age, you are truly exceptional…you're smart, and if I left you here, you'd probably come back in one piece.\" He sighs.\n\n\"That's why…I don't want to keep you in the dark. Our ${leader} was an official back then, before things started. He survived with a couple of talented fellas, and the result you see is ${base2}. But one must wonder where all his friends disappeared to, after putting in all those years of implementation to make ${base2} what it is today. We're eliminating threats, allying only with those with power and history. Everything we do on a daily basis is to make ${base2} the one and only, with infinite power. What we've been doing for a while now, and what we're here to do today, is to get to the Oracle. As much as ${General} wanted to keep this top secret for whatever reason, you aren't dumb. You've probably heard about the Oracle, if only rumors. And you probably figured out that it's our goal. There are…rumors…about the Oracle. They say he's leading them.\" He points to the crater.\n\n\"Also, he's supposed to grant you any of your wishes. The only problem is that he switches locations. And doesn't stay for long in each location. He's supposed to appear here sometime today. Our mission is to get this near the Oracle.\" He takes out a piece of the dark, shiny, black-and-red ball from his backpack. It shines brightly, and he puts it back in the backpack. \n\n\"It'll tell the guys back in the laboratory its location every time it jumps, allowing them to draw a pattern. And then…I don't know what happens after that, if it all proves to be true. I have no idea. But something's changing. There's more of them every day. And new ones. They get stronger, and bigger. It's scary. If they continue to grow like this, we'll be eliminated by them faster than we can kill each other.\" He leans forward to lay his hands on his pulled-up knees, then messes with the campfire. For a while, you both remain silent.\n*page_break\n\nAfter a while, you begin to feel tired. You struggle to keep your eyes open. You stand up and stretch your limbs. From the corner of your eyes, you a notice huge, black, twisting, sun-shaped darkness in the middle of the crater for a second. You turn your head towards it just as a loud crashing sound and purple light explodes from the middle of the crater. It blinds you for a second. ${Assassin} jumps up and runs towards the edge. He takes his sniper rifle off his back and digs into his backpack. You run next to him and stop as he loads the bullet-shaped piece into his weapon. In the middle of the crater, there now stands a huge cave opening. \n\nPurple light and pure darkness come out from the inside, and a dark-red fire surrounds it. ${Assassin} aims for a second, then pulls the trigger. The bullet flies into the opening. The air freezes around it, and just as it came, it morphs and disappears. The sound of the gunshot echoes around you. The mutants left around the dark-red fire freeze and look at you. ${assassin} keeps gripping the rifle, and you hold your ${weapon} in your hands. Suddenly, hundreds of mutants begin to run towards you as one. ${Assassin} puts the sniper rifle on his back and turns around to run. You follow him, running past the campfire. \n\nYou run through the muddy area. All kind of mutants run after you wildly as you glance back. You reach the top of the hill when a pack of half-dead humans without gas masks appear. Their hands dangle next to themselves, and they begin to walk towards you. ${assassin} take a sharp right turn and contin
