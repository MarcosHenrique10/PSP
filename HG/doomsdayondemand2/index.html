black sword into you. He disappears into the darkness once again. You gasp for air and look around to spot him. The thick darkness flows around the room. The flesh surrounding you beats quietly.\n\n  Suddenly, a quiet swirling sound comes from behind you. You turn around and lean away from his sword, then stab your knife into his arm. He drops the shadow sword, and it shatters into small, dark pieces. He pushes you away, then jumps back. He looks at the wound on his arm. Black blood drops from it through his suit onto the ground, and it turns into black mist. You swiftly raise your pistol and aim at him. [i]\"Confront your own darkness…\"[/i] he says with the same emotionless face as he raises his hand up and the black mist surrounds you. You pull the trigger and feel the pistol kicking back, but can't hear the sound of it firing. The bullet swirls in front of you in one place.\n  \n  *page_break\n  Through the black mist, your father steps out. He puts his hands into his pockets and shakes his head. \"I think it was all for the best that I died. I wouldn't want to live to see how much of a disgrace you've become. He steps closer with a grin on his face, then messes with something in his pocket. When he's close enough, he takes a black knife out. You grab his hand and push your own knife through his chest. The black blood splatters onto you as you pull it out. He falls on the ground and turns to ash. The black veins on your hands thicken, and the black sun throbs faster.\n \n  \"He's right, we're all better off without you. Why do you think I abandoned you as soon as I had the chance?\" Your mother speaks in front of you. The black sun beats faster, along with your own heart. As difficult as it is, you stab her several times. Your hands turn black, and the skin thickens on them. Your head is spinning around, and you can't get a hold of your emotions.\n \n  \"I was the only one who loved you. But guess what? No one else does. Everyone hates you. Everyone wishes for your death. The death you would deserve.\" ${newfriend} charges towards you, dragging an axe. You jump out of harm's way and cut into ${newfriend}'s neck. You close your eyes and feel the darkness flowing through your veins. Your lungs burn. You keep breathing, but it doesn't stop. You rip the gas mask off and take a deep breath. More people you have known come forward and talk to you. You kill every one of them and feel the darkness inside empowering you, sharpening your senses and thickening your skin. \n  \n  When you kill ${currentbf}, ${heshe} turns to ashes as well. You stand in the darkness for a while, only hearing quiet whispering. [i]\"Darkness is my domain…you cannot defeat me in my own home.\"[/i] Through the dark mist, the man with the purple eyes dashes towards you with his sword aimed at your throat. When the dark blade is about to reach you, you grab it. With all of your strength, you break it in half, then stick it into his stomach. His hands shake, and he looks down. [i]\"That's surprising.\"[/i] He blinks a couple of feet away from you and falls on his knees. The darkness flickers around him.\n  *page_break\n  [i]\"I only begin to understand how this could have been possible. But I have realized now it's for the same reason I have set my eyes on you.\"[/i] He stands up and covers the wound with one hand, then points at the black sun on your body. Black blood drips from his wound and turns to dark mist as it touches the ground. He clears his throat and blinks towards you once again. He wraps an arm around you and pushes his other palm on the sun. The whispering intensifies in your ears, and your limbs become paralyzed. \n  \n  [i]\"Every action is followed by a reaction. If something is taken, something of equal value has to be given as well. That's the basic rule of balance. I will die soon. I'm not a god, I can't cure myself. You have taken my life, and you'll have to pay for it with your own. My existence cannot end.\"[/i] He looks at you with his emotionless eyes once again before he turns to pure darkness and flows into the black sun on you. Darkness flows through your veins, turning your skin black. Your bones thicken and grow, and your fingers end in sharp nails. \n  \n  Thick, bony wings push out of your back, and a thin layer of skin stretches between each of them. You fall on your knees and hold your head in pain. Your dark, scratchy scream echoes as everything that has ever happened since the bombings flash before your eyes. Your eyes snap back and turn dark purple as your head fills with knowledge. Darkness surrounds the room, but you can see through it. It gives you comfort as you stand up and walk towards the black, throbbing heart in the middle of the room. You sit down on the throne, and it beats in perfect harmony with the black sun on your body. The whispering remains in your ears. You close your eyes and see ${base2} slowly getting overrun. ${General} fighting off the creatures, the fear of the guards. Barely anything stands as a secret to you anymore.\n  *goto_scene oracend\n \n\n\n \n \n*label oraccont \n \nThe black tar's coldness wakes you up on the ground. You stand up in the heavy rain. The cave in front of you slowly breaks to pieces and turns to ash. The sandstorm seems to be calming down, and the number of creatures storming towards ${base2} lessen. The military have disappeared into the distance. Some of their soldiers' ripped corpses lie around the area. You make your way back to ${base2}. In the forest, some of the mutants rush between the trees. The heavy rain soaks through your clothes, and you begin to feel cold. The dark purple sky swirling above still casts its shadow over the area. You reach the wall with the huge hole in it and climb through into the suburbs.\n\nYou walk down the empty street between the barely standing houses. The dirt road leading between is paved with the dying, struggling corpses of humans and creatures alike. Their moaning mixes with the sound of the heavy rain, which washes away their blood towards the destroyed gate separating the suburb from the rest of the area. You step over a twitching, moaning corpse. In front of the living chambers, a couple of guards rock back and forth on the stairs. Body parts and chunks of flesh lie around the dark city. Some of the guards are crying, and some of them just stare in front of themselves. The mixture of mud and flesh squishes underneath your feet. \n\nAs you get closer to the city center, men in dirty and ripped suits appear in front of the citadel. They stand in front of ${general}, holding their guns. When they notice you, they aim their weapons at you. The General looks at you and calms them down. When they lower their weapons, he waves for you to come over. Blood sticks to your already dirty shoes. You stop in front of them. Rifles scavenged and put together from various weapons rest in their hands. Despite their appearance, the dirt and blood ruins their already worn-down suits even more. \"${firstname}…? You survived the radiation?\" ${general} greets you with a surprised voice.\n\n*if (firstmission)\n\n\n \"Hey there, kid,\" the man in the white suit greets you. \"It would have been a shame to shoot him, true.\" He turns towards the General. \"You let a humble merchant live. It's only fair I let you live too, right?\" He chuckles, and General ${General} turns his head towards you. While he's speaking, more of his men in fancy suits of all colors appear. \n \n \"In fact, I would welcome someone like you into my group. I'm not really a merchant anymore. I've promoted myself. I guess ${General} thought he's the only double agent. But enough chit-chat. Let's head upstairs and sort this mess out.\" He rolls his rifle into his hands, and the other men lead you into the building. \n *goto mafcont\n\n\n\n*else\n\n\n \"So he was one of you who actually killed my colleague. Unlike you?\" The man in the white suit turns towards ${General}. \"Good thing you managed to stay loyal. Thanks to you, I was able to promote myself from being just a simple merchant.\" He chuckles, and the General turns his head away in shame. \n \n \"Kid seems to have potential, though. And I owe you a thank you. Eliminating the rest of my colleagues helped me a lot.\" While he talks, more of the men in fancy suits of all colors appear behind him. \"Let's get upstairs and see for ourselves.\" He rolls his rifle into his hands, and the rest of his men lead you into the building.\n *goto mafcont\n\n\n*label mafcont\n*page_break\nMost of the guards immediately surrender. Those putting up a fight die fast by their hands. They knock on the door of the ${leader}'s office, but he doesn't reply. One of them steps back and kicks the door in. The ${Leader} is sitting on the couch, holding a small red pistol with one bullet loaded into it. He looks from you to the ${General}, then the men separating him from you.\n\n\"You would just ruin years of work! I've sacrificed everything to get where I am now! I won't let any of you take it from me!\" He aims the red pistol at you with shaking hands. One of the men in a suit steps forward and takes his gun. He slams his face with the barrel of it. His ripped top hat flies off, and blood runs from his nose. He covers it with one hand and looks at you.\n\n\"The boy will do it.\" The man in the white suit says, his voice muffled by the gas mask. He clears his throat, and they hand you the small pistol. They stand aside, and the ${leader} in front of you shakes his head. He takes his hand off his nose. His tears mix with the fresh and dried blood on his face. \n\n\"You…you have betrayed me. Betrayed everything I've worked for. I built this place from nothing…I wanted to show an example by your death…but now, thinking about it, you would deserve to die. You can't destroy what I worked for most of my life. You can't get away from everything forever. You will die, sooner or later. You will get killed.\" The ${leader} shakes his head. Blood runs from his nose onto his black suit.\n \n\"I've heard that before.\" You grip the red pistol tighter and raise your hand, taking aim at him. Silence falls upon the room, until the sound of a gunshot rings in the air. A bullet hole appears between the ${leader}'s eyes. He lowers his head, and blood runs down his face, mixing with the blood from his nose.\n\n*page_break\n\"That's the cold-blooded killer I need on my team. Someone with skill, someone who can think rationally when needed and doesn't hesitate for a second when the trigger has to be pulled. Welcome to the family, ${firstname}. Your poor set of clothing will change in the future, along with ${general}. We'll rebuild this town and unite the districts. It will all be under our command. Then, we can lean back and drink bourbon while our army marches for the rumored city past the mountains. For now, clean my new office. Then prepare for a speech in the city center. Both of you will be speaking, you're known by most if not all of the people. By the way, you needn't know my name. Just call me Boss.\" He leaves the room, and his men follow him. They close the door behind them, and ${general} leans against it. He takes a deep breath and looks at you.\n\n\"This had to be done, ${firstname}. You might or might not agree with me, but you've seen more than what most people have. More than what even they have. You know thowit goes…no one can rule forever. Especially in a time like this. Something snaps in every one of them after a while. You above all else should know that. Even they will have to be taken over after a while. But they don't think about it, they're just filled with joy and happiness about their freshly acquired wreckage of a town. I don't plan on dying for, nor with a crazy leader. I don't want to rule, either. Since I'm stuck here, miles away from everyone else I love, if they're even alive, if that city even exists…I want to make the best out of it. I want to make it the best for me in its given state. For that, order has to be maintained. And I know how to do that. At least, that's what I'm certain about.\" He steps closer and looks at the corpse of the ${leader}, his blood soaked into the couch. \"Let's get this over with.\"\n\nYou take the corpse out and stash it outside of the wall. After cleaning up the blood as much as you can, you head towards the city center, where the man in the white suit is already holding a speech. When he's done ranting about how things will change for the better, he gives his place to ${general}. He talks about how order will be maintained, how things will be different after a rough start. When he's done, you take his place.\n\nIn front of you stands the man in the white suit, along with a group of his men. A couple of guards stand in the crowd. The statue behind you has broken in half. The same crowd stands in front of you. People behind gas masks, who were judging you just hours ago. Only the size of the crowd has gotten smaller. They aren't judging you anymore. They eagerly await your words. And you will speak, and you know that. Because you have to.\n*fake_choice\n\n #Give a sympathetic speech.\n  You stand tall and look around the crowd. \"I know what you must feel like now. So many of you have lost so many things in the past hours. Families, friends, houses. We've all lost something. Some people, even their lives. But this is the time to start rebuilding. Buildings and lives as well. It'll all be for the better. And these men, these new people who will lead us, they'll make sure of that. They were not the reason for this tragedy. The old crew, who deserved to be changed. They were. This is the point where our lives will turn for the better. Thank you,\" you say and walk towards them. The crowd murmurs and disbands.\n  *goto verye\n\n #Give a passionate, motivational speech.\n  You look around at the crowd, then spread your arms wide. \"Many of you standing here have lost something. Family, friends, houses, some people even lost everything. You might think there's no way out, your life is over. Wrong! This is when it starts. This is not the time to mourn or to feel sad. This is the time to start rebuilding. These man standing here are not responsible for what happened. The ${leader} and his ways are. Follow them, and you will have nothing to worry about in the future. This will not happen again under their rule!\" you say, pointing at them. The crowd cheers quietly, then disbands as you walk towards them.\n  *goto verye\n  \n #Give a fearful speech.\n  You look at the crowd and begin to pace with your arms behind your back. \"You're standing here with sadness and anger on your faces. You shouldn't. You should be eager to rebuild this town. Everything that led up to this point is your fault. You let this ${leader} and his fool crew doom us all. This won't happen again. Under these gentlemen's rule, this will not happen. At the first sight of betrayal or weakness, you will be shot. The first time you prove to be useless, or weigh the town down, you will be shot. This massacre today happened because our ${leader} was weak. They are not weak. Obey, and follow the orders of the better, the stronger. Or die.\" You stop, and the crowd begins to disband as you walk towards them.\n  *goto verye\n \n \n*label verye\n\"That was a…rather interesting speech,\" the man in the white suit says as a few of the others break through the crowd towards you. They hold ${assassin}, beaten and tied up.\n\n*if (rmdead)\n\n\n \"We found him in one of the buildings. He killed many of us before we had the chance to tie him up. I'll take him to the basement, and we'll give him what he deserves. Maybe he'll speak,\" the man in the black suit says and drags him away.\n \n \"Very well,\" the man in the white suit says, then turns towards ${general} and you.\n *goto oraccontend\n\n\n*else \n\n\n \"We found him in one of the buildings. He cooperated, and he said it doesn't matter who he works for,\" the man in the black suit says, then releases him. He steps next to you.\n \n \"Very well. A smart choice you've made,\" the man in the white suit says, looking at the three of you.\n *goto oraccontend\n\n \n*label oraccontend\n*page_break\n*if (turning = false)\n \"I believe we have a bright future ahead of us.\" The man chuckles. You set off and walk back with ${general} by your side. He sets off towards the headquarters, and you head towards the living chambers. The inside of it is in very poor condition. The tables are flipped and broken, and the doors have been destroyed. You sit down on the bed alone and look in front of yourself. \n *goto_scene novosend\n\n*if (turning)\n The black sun suddenly begins to throb faster. You begin to feel dizzy, and your neck becomes numb. You put your hand on it and feel the black vein pushing darkness up. Images flash before your eyes, and you begin to hallucinate.\n\n Your own shadow, identical to you, forms from the ground in front of you. He lifts his head up, and his red eyes stare into yours. He steps closer and pushes his hand back. You grip your knife when the mist creature slams its hand onto your face through the gas mask. Your eyes snap back. The darkness flows through your nose, your mouth, slowly filling your whole body. Unbearable pain strikes into your every body part. When you can't bear the pain anymore, you scream. The black sun on your body stretches, expanding over your shoulders. It swirls around, and the whispering intensifies inside your head. You fall on your knees in agony. Your body fights against the darkness for a while, then it gives up. Pure darkness fills every inch of you. \n \n Your bones crack underneath your skin. From your back, bony wings crash through your skin. Between the bones, a thin layer of blackened skin stretches between each wing. The size of your body, arms, and legs grow. Your bones tighten, and your muscles expand. Your fingernails grow slightly and sharpen, along with your fangs. The gas mask pops off your head. The overall color of your body turns dark, with darkness flowing along it in lines. When your body stops changing, you fall on the ground and stop breathing.\n \n Seconds later, your dark red eyes snap open. You stand up in your fresh, new body. Darkness flows around you slightly. The black sun stops and burns into your body. Spikes emerge around it. The warm air slowly fills your lungs.\n *goto_scene turnend \n", "choicescript_description": "Picking up where you left off, you will encounter new challenges and face tough decisions in the hope to finally escape the living nightmare in the districts that only became worse. Decide whom you will trust, and how will you achieve your goal. It's kill or be killed.\n\n[i]Doomsday on Demand 2[/i] is a 135,000 word interactive novel by Norbert Mohos, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n• Face deadly enemies varying from mutants to humans.[n/]\n• Decide who you'll trust. Strengthen your friendship, or make enemies.[n/]\n• Uncover the secrets the destroyed world has to offer while surviving in the districts.[n/]\n• Choose your own personality and end pursue your goal to finally end the living nightmare.\n", "choicescript_stats": "Personal Information\n\n*stat_chart\n\n text Name\n \n text Age\n \n*if (rads)\n [b]Radiation Status:[/b]\n *stat_chart\n  percent Radiation\n\n\n*temp Clothes \"\"\n*temp comma false\n*if (Clothing = 0)\n    *set Clothes &\"Dirty black-and-red long-sleeved shirt, ripped military dark-green camouflage trousers, and black leather gloves\"\n    *set comma true\n*if (Clothing = 11)\n    *if comma\n        *set Clothes &\", \"\n    *set Clothes &\"Black-and-red long-sleeved shirt, dark blue jeans\"\n    *set comma true\n*if (Clothing = 55)\n    *if comma\n        *set Clothes &\", \"\n    *set Clothes &\"Blue shirt, dark-brown jacket, blue jeans\"\n    *set comma true\nClothes: ${Clothes}.\n\n*if (Nrep)\n [b]Reputation:[/b]\n *stat_chart \n  percent Ivan\n  percent Gannon\n\n*if (Nrep2)\n *stat_chart\n  percent Keith\n\n  \n*if (roommates)\n *stat_chart\n  percent Lily  \n\n  percent Matt\n\n[b]Personality:[/b]\n*stat_chart\n  opposed_pair Evil\n    Good\n\n\n*temp Backpack \"\"\n*temp comma false\n*if (Gasmask)\n    *set Backpack &\"A gas mask\"\n    *set comma true\n*if (Pistol)\n    *if comma\n        *set Backpack &\", \"\n    *set Backpack &\"a pistol\"\n    *set comma true\n*if (Knife)\n    *if comma\n        *set Backpack &\", \"\n    *set Backpack &\"a military knife\"\n    *set comma true\t\n*if (Maskfilter = 2)\n    *if comma\n        *set Backpack &\", \"\n    *set Backpack &\"2 filters\"\n    *set comma true\n*if (Maskfilter = 1)\n    *if comma\n        *set Backpack &\", \"\n    *set Backpack &\"1 filter\"\n    *set comma true\t\n*if (Maskfilter = 0)\n    *if comma\n        *set Backpack &\", \"\n    *set Backpack &\"0 filters\"\n    *set comma true\t\n*if (Bullet)\n    *if comma\n        *set Backpack &\", \"\n    *set Backpack &\"${Bullets} bullets\"\n    *set comma true\t\n*if (Idcard)\n    *if comma\n        *set Backpack &\", \"\n    *set Backpack &\"an old faded Identification Card\"\n    *set comma true\t\n\t\n*if (Diary)\n    *if comma\n        *set Backpack &\", \"\n    *set Backpack &\"and a dirty diary with a few pages.\"\n    *set comma true\n\nBackpack: ${Backpack}.\n\n\n\n*temp Wounds \"\"\n*temp comma false\n*if (wackwound)\n    *set Wounds &\"Infected, sun-shaped, deep black wound on belly\"\n    *set comma true\n*if (slimerwound)\n    *if comma\n        *set Wounds &\", \"\n    *set Wounds &\"Heavy corrosion on right arm shaped like a black sun\"\n    *set comma true\n*if (trapwound)\n    *if comma\n        *set Wounds &\", \"\n    *set Wounds &\"Torn right leg\"\n    *set comma true\n*if (turnwound)\n    *if comma\n        *set Wounds &\", \"\n    *set Wounds &\"Expanding, twisting, grey and spiky black sun.\"\n    *set comma true\n*if (glasswound)\n    *if comma\n        *set Wounds &\", \"\n    *set Wounds &\"Bruises on chest and glass shard in heart\"\n    *set comma true\t\n*if (lungscar)\n    *if comma\n        *set Wounds &\", \"\n    *set Wounds &\"Weak, Infected lungs and swollen scar on chest\"\n    *set comma true\t\n\t\t\n*if (markedwound)\n    *if comma\n        *set Wounds &\", \"\n    *set Wounds &\"Small cuts on chest\"\n    *set comma true\t\t\t\nWounds: ${Wounds}.\n\n*if (inform)\n [b]Glossary:[/b]\n *stat_chart\n  text Slimer\n  \n  text Wack\n\n  text Aviatrix \n\n  text Theurgist\n\n  text Trapper\n\n  text Deceiver\n\n*if (inform3)\n *stat_chart\n  text Unknown\n  ", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n  \n  Unlock the rest of the game!\n  \n  *purchase_discount adfree 2018-07-03 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n  \n  You've paid to unlock the rest of the game.\n", "deadend": "*page_break Years later…\n[b]Chapter 8 - The Dim Killer [/b]\n*set age +2\n\n*achieve deadend\nThe creature stands in front of you in thin, ragged leather clothing. His bright purple eyes stare at you. His arms are dark, like the rest of his body, and they end in sharp claws. The gas mask on his face is ripped in half. He stretches his bony, spiky wings. He blinks a couple of times, then cracks his thick bones under his heavy muscles. You turn away from the mirror and crouch in the window of an apartment, having a clear view of ${base2} in the night.\n\n[i]\"Proceed.\"[/i] The purple-eyed man's voice echoes quietly in your ears. You nod and pull the dark, bent dagger out from the back of your belt. You glance down at the ground far below you. You close your eyes and turn towards the black smoke. Leaving the same black smoke, you appear at the bottom of the apartment. The black sun on your body beats fast, then calms down.\n\nYou walk through the muddy area towards ${base2}. The creatures you pass by look at you, then turn their heads away in fear. The forest on the right and the main entrance to your left comes into view. Through the thick forest, several white, blinking eyes open up and stare at you. You sneak closer to the main entrance. Darkness flows behind you after every step you take. When you're close enough, the man in the watchtower spots you. He's readying his weapon when your eyes meet his.\n\nHe doesn't want to be there. He wonders how the woman he loves is sleeping now. He wants to return to her, he's very afraid of death. You empower that fear in his head and motivate him to leave the watchtower. The man puts the weapon down and hurries down the watchtower. You reach the other watchtower and look at the guard. His sister has been long dead. He saw her die. He wanted to save her, but she couldn't do anything but run. He's blamed himself ever since. You take the form of his sister. You talk to him, planting the thought of taking the gas mask off, then jumping out of the watchtower. After a couple of minutes, he rips the gas mask off with crying eyes and hurls himself off the watchtower, feeling extremely guilty. \n\nYou close your eyes and blink up into the watchtower. You glance downstairs and look at the single guard patrolling the entrance on the inside. You wait for the black sun on your body to calm down, then blink behind him. With a swift move, you sink the black dagger into his neck. His muscles tighten, then he falls on the ground and turns to black mist. You blink back into the watchtower and open the main entrance. Creatures with black bodies and white eyes walk forward, through the gate. Some of them take the form of guards and put a gas mask on their heads, trying to cover their still-white eyes, while some of them sneak deeper into the building. You let the main gate close down and blink down onto the ground.\n\nAs you walk back towards the tall apartment building, the black sun calms down again. You glance up at the open window, then blink upstairs. You climb through the window and stand in the middle of the room. The door leading out is blocked by the remaining furniture. Darkness is creeping up on the walls, and it beats quietly. In the middle of the room stands the root of the darkness, a small black orb. You walk towards the bed and sit down on it. The darkness surrounding you comforts you and gives you energy.\n*page_break\n\"Hello, ${firstname}.\" The man in a trench coat leans against the doorframe. His body underneath is covered with a thick layer of grey, dirty bandages. You jump up from the bed and try to get into his head, with no success.\n\n\"It took me a while to find you. Despite your efforts, I'm alive and well. After you blew up ${base}, I thought my experiment was gone. But it's not.\" ${newleader} walks towards the window. You blink next to him, and the black sun beats faster. A great horde of skinless creatures stands outside. Next to them, misty creatures fixate their purple eyes upon you. Ray-like creatures circle above them, shrieking a couple of times.\n\n\"Now, what we talked about back then, what I suggested, was right. If you join us, we'll unite our armies and dominate everyone. No one will ever be able to stand against us. If you don't, then despite all the shame that will bring to my heart, we'll be forced to kill you. Also, to motivate you even further…after you help us, I'll promise to reunite you with your loved ones without killing you. Make your decision. I think my offer is more than fair.\" ${newleader} stands in the window frame and winks at you before he jumps down. He lands on his feet without harm, then walks in front of his own army. You know what he's thinking about. A part of him wishes for you to reject him, so he can kill you. He's confident about that, as well. After carefully thinking through the situation, you decide there's not much you can do but to join them. You blink down and join their army.\n*page_break\n \nIn the following years, you conquer and take over the vital points of the districts. The humans take the fight against you, but they seem to be losing. Chaos emerges amongst them. Anyone they've ever known could be one of the black creatures in disguise. You take the silent but deadly approach, while ${newleader} confronts the resistance head-on. What people are afraid of the most is what they call you, the Dim Killer. They're scared of your power, agility, and strength.\n\nThe city that's rumored to be safe and sound is your next target. You prepare to set off for a long journey beyond the walls. After walking through miles of forests and ruined cities, you stand on top of a mountain with a handful of creatures like you. The Oracle's best. The city in front of you stretches between the mountain you're standing on and the ocean on the other side. Tall buildings stand in the city, and give off most of the city's light at night. Cars drive by, and citizens walk around. \n\nYou look at each other with ${newleader}, then nod. The similarly dark creatures standing behind you and the mutant horde behind him grunt and growl. You swiftly roll your dagger into your hand and slide down the mountain, ready to prepare the city for its total annihilation from the inside. If anyone can, you can do it. But in the end, you're dead. The Oracle keeps you alive in order to have you do his bidding. When he no longer needs you or feels threatened, he'll probably get rid of you. You slide down with that thought, with a slight hope of him changing his mind forming in your head. Until then, you do what you're told. And do it right.\n*page_break\n\nAfter you wreak havoc from the inside, most of the city's defenses falls within mere hours. The rest of the population is quickly forced into enslavement under ${newleader}'s command. You can feel his newfound fear after witnessing your skills in action. A couple days later, ${newleader} takes you into a basement underneath an abandoned mansion on a hill. It's surrounded by a large metal fence. It turns out this is the home he has dedicated for himself. In the basement, you lie down on a small medical bed. ${newleader} walks next to you, glancing at the straps on each side. You both know that something like this could never hold you back.\n\n\"It's time to fulfill my promise.\" He puts his arms behind his back. A creature with sharp fangs and fingers ending in claws walk to your left, while a misty creature with pink eyes moves to your right. They look into your eyes while a small child with a blue backpack hops inside, humming quietly. The little girl giggles, then looks at ${newleader}. He nods once, then the girl looks into your eyes as well.\n\n\"Don't be scared, silly…\" The little girl chuckles innocently. Your eyes begin to get heavy…\n*page_break\n\n\"Son? Oh my god, it's been so long…where have you been?\" Your father stands in the doorway of your house with the wooden door wide open. You blink a few times to get used to the light from the sun. The neighbors are mowing the lawn to your right. You start to walk towards your father, but you turn your head to the left. The neighbors are laughing over the fence. They talk loudly while the sizzling sound fills the air, along with the smell of freshly cooked steak. Your father wraps you in a hug so tight, you can barely breathe.\n\nYour mother rushes to you, storming you with kisses. You only notice your size when you sit down to eat some of your favorite fresh, homemade food. You stuff it into your mouth, noticing that not only your age has changed back to where it was before everything started, but you've also regained your humanity.\n\nYou spend a few days with your family. ${bf1} and ${bf2} also turn up, being the same age as you. In the few days with them, you feel happier than ever. In the middle of a scary movie night with ${bf2} and ${bf1}, the world freezes and turns to darkness in the middle of the fun. You blink a few times, then sit up with a heavy head. ${newleader} is standing in front of you with the creatures by his side. You wipe away the tear rolling down your cheek, then look at them.\n\n\"I suppose you've had fun.\" He smiles. \"It was a long couple of days…I'll be honest with you. We've stabilized the city. I'm a god amongst them now. The people know that if they do as they're told, no one will hurt them. Of course, I couldn't have done this without you. And I'm grateful. But gods can't exist parallel to each other. Especially in the same society. So, I'm offering you this…you can permanently live with your loved ones in that perfect world. So, what do you say, ${firstname}?\" ${newleader} crosses his arms. The creatures surrounding him look at you as one. You sense a huge amount of anger and fear coming from him.\n\nYou nod, agreeing to his plan. You close your eyes and lay back on the bed. \"Good. Enjoy your new life, then.\" ${newleader} smiles. He heads out of the room. The creatures look at you. The small girl's giggle fills the room before darkness swallows you.\n*page_break\n*set age 12\n\nYou're back with your friends, watching a horror movie. It's quite scary, but the three of you manage to laugh it off. Hours turn into days, then weeks and months. Each day is better than the last one. You kind of forget what it's like to feel emotions other than happiness. Everything seems to be perfect. As you approach the one-year anniversary of your reunion, you slowly realize that somehow, the world is shaping itself to your will and desires. Sometimes, you wonder about the state of your own body. But with enough time passing, you try to forget about it all and enjoy your new life.\n*goto_scene ending", "ending": "*page_break End\n*achieve Gameover\n\nWe hope you've enjoyed playing [i]Doomsday on Demand 2.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThank you for playing [i]Doomsday on Demand 2.[/i]\n\nSpecial thanks goes to DittoQueeno for my cover art, please take a moment to check her work out on one of the following pages:\n\nhttps://dittoqueeno.tumblr.com/\n\nhttps://dittoqueen.deviantart.com/\n*ending\n\n", "gameover": "*page_break\n[b][i] ChaP[/b][/i]ter[b][i] ????? - [/b][/i]?x??[b][i]x??x? [/b][/i]\n\n*if ((ch3d) and (ch5d = false)) or ((ch3d = false) and (ch5d))\n Thousands of voices, loud and quiet, screams surround you, along with bone-chilling cold. Your body feels like you're floating in nothingness. You open your eyes, but you see the same darkness as if you had your eyes closed. \n\n \"Un[b]expected[/b]. Who would have thought that [i]you would be the one [b]to[/b] [b]die[/b][/i], let [b]alone[/b] kill yourself[b]?[/b] How could a lesser being [b]convince[/b] you to do so, after surviving [b]so much[/b]? Or it wasn't [b]them[/b] in [i]the end[/i]? [b]You[/b] had it coming? What was the thing that made you s[b]nap[/b], in [i]the end[/i]? Do you [b]think[/b] you've done more good than [i]harm by [b]kill[/b]ing[/i] yourself? Heh, selfish one. Not even [b]think[/b]ing about his [i]loved ones[/i]. Do you [b]think[/b] this [b]much[/b] resources and attention could just [i]go to [b]waste[/b][/i]? Putting yourself [i]into a grave[/i]…until you come back and maybe, just [b]maybe[/b], [i]feast on[/i] someone you once knew…but that [i]doesn't matter[/i] to you, does it? Only that [i]you're free[/i] of whatever [b]burden[/b] you couldn't [b]think[/b] you could overcome. I always had [i]plans for you.[/i] You have [i]so much to[/i] do. [i]So much to[/i] [b]prove[/b]. [i]So much to[/i] [b]change[/b]. Well, that's [b]why[/b] it's pretty awkward now. But don't [i]worry.[/i] You won't re[b]member[/b] any[b]thing[/b]. [b]Hope[/b]fully[b].[/b] [b][i]I'm[/i][/b] sorry, but I can't let [b]you[/b] [i]die[b],[/b] [b]kiddo.[/i][/b]\" \n *goto_scene chapter3 re\n\n*else\n Your bones crack underneath your skin in the endless nothingness. Cold shakes your whole body, and the desperate, ever-increasing screams surround you. You open your eyes, and the darkness sinks into them.\n \n \"Here [b]we are[/b] [i]again[/i]. What [i]caused you[/i] to fall [i]victim[/i] to the lesser [i]beings[/i]? Are they really the [b]lesser creatures[/b]? There's [i]more[/i] of them than [b]humans[/b] already. This [i]is[/i] the [b]age[/b] of [i]mutation[/i], super[b]natural[/b] things [i]you can't[/i] wrap [b]your mind[/b] around. Do you [b]think[/b] the conflict will [i]resolve[/i] itself? [i]Thing[/i]s you [i]wouldn't think[/i] of are and will be [i]happen[/i]ing. Right now, [b]you're[/b] [i]slow[/i]ly coming back as one of [b]them[/b]. [b]You[/b] stand in line and [b]hunt[/b] for sweet flesh. It [i]melts[/i] in your mouth. I didn't [b]think[/b] [b]you're[/b] capable of falling into the hands of [b]death[/b] once [i]again[/i]. That's [b]not[/b] like you. Dying [i]weak[/i]ens the mind. [i]Weak[/i]ens the soul and your [b]mortality[/b]. This is [i]the[/i] last [b]time[/b] I can [i]send[/i] you [i]back[/i]. If you [b]die[/b] [i]once[/i] again, [i]there[/i] will be [b]no one[/b] to [i]save[/i] you. [b]In the end,[/b] we'll all [i]die[/i]. [b]You[/b] owe [b]me[/b].\"\n *goto_scene chapter5 re\n\n", "ivend": "*page_break\n[b]Chapter 8 - Emperor Of The Air[/b]\n\n*achieve ivend\nIn the upcoming weeks, you get comfortable in your new, wide office on the top floor of the citadel. Its top-to-bottom glass windows provide a perfect view on the district, which has been built over to Old Pauper, expanding the already large district. It has everything you would ever need in an office. Computer, television, bookshelf, a comfortable couch, office chair, and most importantly a phone to call any of your employees to fulfill your needs. \n\n${capturer1} is by your side the first few weeks every day to teach you the art of leadership. His personality hasn't changed, and he still kills anyone he wishes, just because he feels like it. When you manage to run the district on your own, he visits you less frequently, but does so a couple of times a week anyway. In a couple of years, you entirely fulfill the position as leader of the Pauper district. The two districts soon reach new heights under both of your leaderships. Despite the slight terror you hold over the districts, they're blooming. The people are overall happier, and the quality of their lives is ever improving. Then the money begins to flow even more.\n\nApart from the walls separating the two districts from the rest of the world, they are barely separated by a small forest. You can finally move out of the apartment you've been holed up in and have the biggest mansion in the district built for you. Your own personal guards surround it, and servants do everything you ask them to. You hold great parties and feasts there, only for your closest friends. ${capturer1} attends every time, and you do the same when he holds an event. At the pool party held at ${capturer1}'s mansion, you find the love of your life. A high-ranked personnel. It's true love at first sight. Your usual birthday party has been expanded by one more person. Soon, you marry each other. For your honeymoon, ${capturer1} takes over your position. You head up into the mountains and spend the best week of your lives together.\n\nMonths later, your family expands with two babies. A boy and a girl. After long hours of work, you go home to see them smile. Your family is what makes you happy now. Since you're not going to parties anymore, ${capturer1} is a regular guest around your household. He's a bad influence. Years pass by, and your family, along with the meaning of your life, grows older.\n\nBut you don't seem to be aging.\n*page_break\n\nYour body remains in the same condition as it was when you first woke up on the mountaintop. Your love ages, and becomes old. Your kids slowly grow older, and your family doesn't seem to care, or see that you aren't aging. As if it was normal. The love of your life passes away quietly from old age. Your kids become high-ranking officials and move out of the mansion. They visit you every now and then. You hold their kids in your hands first. Then their grandkids as well. Your children grow old and pass away eventually. You look in the mirror and see the same ${age}-year-old body, the same ${age}-year-old face staring back at you. That face is filled with sadness and questions. Those eyes are red from all the crying.\n\nYou've lived almost three generations. You've lived more than you should have. Life has become dull, sad, and pointless. One day, you raise the silver pistol with that thought in your head. After taking a deep breath, you hold its long, silver barrel against the side of your head. Tears roll down your cheeks as you tighten your grip on the trigger, until you pull it.\n*page_break\n\nYou open your eyes and get up from the cold, dark ground. Darkness surrounds you and flows through the air. The man with the purple eyes and the fancy suit stands in the distance. \n\n[i]\"Hello, ${firstname}. It's been a while.\"[/i] His deep voice fills the nothingness and echoes long after he's stopped speaking. He puts his arms behind his back and paces around. His footsteps echo along with his voice. [i]\"Or, maybe not? Three generations where you are might not be as long as you think. While you're trapped in your fake reality, the world you've been walking is falling apart. Soon, you'll have no body to return to. I would say the situation has never been worse. The brave are falling fighting, and the weak just wait for their fate. But sharing this is all I can do for you. I can't rescue you. I can only wish you good luck, ruler of dreams.\"[/i] He closes his purple eyes, and darkness swallows you.\n\nYou open your eyes in your office, the same place where you put a bullet in your head. Blood is splattered on the window. You stand up without a scratch, and ${capturer1} is standing at your office door, leaning against it.\n\n\"I wondered when this time would come. You can never leave this place. No matter what you do. You've been here for so long, it's become a part of you. So! What I would recommend doing is, keep going with your…life, or whatever you want to do. But don't forget our goal, we have to lead the districts to success.\" He grins and leaves the office, but glances back one more time. \"Oh, and don't forget next week, Saturday. Six PM at my place. It's your birthday, after all.\" He winks and leaves the room with a loud laugh. Years pass by, and your life goes nowhere. Everything around you ages except for ${capturer1}. \n\nEvery now and then, you try to kill yourself in different ways. You experiment with all the ways someone could kill themselves. But the outcome is always the same. The man in the suit and the purple eyes greets you every time. He tells you he can only do as much as to talk with you. And only until you awaken once again. Years form into centuries, and you're still leading the districts with ${capturer1} and meeting up with the purple-eyed man when you die. This seems to be your life now. Not knowing when it will end, if it ever ends.\n*page_break\n\n[i]\"I believe you have reached the point of no return.\"[/i] The man in the suit sits on his black throne. You sit in front him, on a chair made out of thick black smoke. [i]\"Your body is far beyond the state of recovery. In a way, you've become quite like me. We are both immortal. Along with…\"[/i] He looks past you, towards the direction of quiet footsteps. [i]\"Well, our time has almost come to an end anyway.\"[/i] He stands up and walks past you. You look back, catching sight of a thin woman with ash brown hair as your vision falls to darkness. \"[i]Alianna…\"[/i] The man's deep voice echoes in your ears as you awaken in your fake reality once again.\n*goto_scene ending", "liend": "*page_break Years later…\n[b]Chapter 8 - The City Life [/b]\n*set Age +4\n\n*achieve liend\n\"Well, have fun with your exams. I'm still amazed you were able to catch up. You skipped quite a few years of school…but after all, I've always known that you're smart.\" ${fsurv} turns to you from the mirror in the wide, neatly designed living room. She's putting on her bright blue police uniform, and she chuckles. A punk rock song is quietly playing in your room.\n\n\"Yeah, piece of cake. University is a lot better than regular school,\" you say from your blue room as you get ready. You stand in front of the mirror and take a look at your body with your shirt in your hands. Out of all of the wounds, your eyes always get stuck on the black sun. It hasn't moved ever since you left, and it's slightly faded. You run your fingertips over the small spikes sticking out of it.\n\n*if (loverstatus)\n \"I still find your scars amusing.\" ${lover} is lying on the bed behind you in a red hoodie and skinny jeans. \"In fact, the only reason I'm still with you is your scars…\" $!{heshe2} sits up with ${hisher2} arms spread wide. You squeeze ${himher2} in a hug before your lips touch. \"I'll be outside.\" $!{heshe2} kisses your neck, then pushes you away with a cheeky grin on ${hisher2} face before ${heshe2} leaves the room. You laugh, then proceed to put your shirt and hoodie on.\n \n*if (loverstatus = false)\n \"I'm glad I could convince you to leave with me. You'll have to bear especially that all your life, you should just accept that. They don't make you any less of a human. In fact…\" ${fsurv} leans against the doorframe. You nod, then put your shirt and hoodie on.\n \n \"You know, these people here have no idea what it was like there. I certainly hope they'll never have to find out. They don't even know how lucky they are to be born here. I know that most of them are amazed and prey upon you for stories, but there are still those who stand on the other side…just ignore them, okay? You had to endure more without punching someone in the face, control yourself, and be the better person, right?\" She winks.\n \n \"All right…\" You smile. \"Oh yeah, I'll be late today. We'll celebrate a bit after the exams,\" you say as you unlock the apartment door.\n\n\"All right, have fun. And take care,\" ${fsurv} says, searching for something in the drawer. You pick up your backpack by the door and leave. You close the door behind you, then lock it. You walk down the stairs, greeting your neighbors. You barely catch the crowded bus. At the university, you meet up with your friends. After taking the exams, you head home to change your clothes, then take the bus down to the beach. Half of the university is there.\n\nMusic is throbbing from the back of a minivan, and beverages lie all around. As it gets darker, you create a bonfire and sit around it with your friends. You talk and have fun on the beach. A cold breeze runs through the crowd every now and then. The moonlight shines on the endless ocean. Once again, they ask you to talk about life in the district. You relive the events again and tell them what they want to know. Every time, they listen eagerly, as if you were just telling an imaginary story.\n*page_break\n*set Age +5\n\nEventually, you graduated from the university. Getting used to the big city life after so long hasn't been easy. Sometimes, you still feel like you don't belong, while other times, you're happier than ever in a civilized city with technology at your reach. Finding a job proved to be hard, so you ended up doing what you're good at, and became a valued undercover agent. You live in an apartment with ${fsurv} for a while. She still feels like a big sister to you. She takes care of you as much as she can. You return the favor whenever you have the chance.\n\nWhen enough time has passed and you've put aside some money, you move into your own apartment. Your decision saddens her, but she understands it. You are an always welcome guest at one another's. Sometimes, you wonder what could be the state in the district, but you shake that thought off rather quickly. The city doesn't share any information with its citizens about the outside world. On the darker, rainy days, nightmares about the district haunt you. ${fsurv} finds a nice businessman to fall in love with. After a while, their baby boy is born.\n\n*if (loverstatus)\n\n\n ${lover} is by your side throughout the years. Your love for each other is stronger than ever. $!{heshe2} lived through ${hisher2} rebellious teenage years with you, then became a judge. Putting together your salaries, you're soon able to move into your own house with a clear view of the beach from the backyard.\n *label fami\n \n Your wedding with ${lover} becomes an unforgettably great memory, along with your honeymoon. Soon enough, you feel like it's time to become a real family. The happiest feeling fills your body when your twins arrive. They bear the black sun on their upper backs. Your daughter and son become the most important thing in your life. Raising them proves to be a challenge, but you try to do your best with ${lover}. You recall some of the best memories of your parents and try to become a father they would be proud of. Soon, you realize you have something to leave behind, apart from your name.\n *goto liendf\n \n\n*if (loverstatus = false) and (wantfamily)\n\n\n Loneliness eats you on the inside, more and more often through the years. You decide to keep an open mind and an open eye out for love. When you're about to give up searching, balanced on the edge of depression and loneliness, you fall in love with someone named Alex.\n *set lover \"Alex\"\n *goto fami\n \n*if (loverstatus = false) and (wantfamily = false)\n\n\n Loneliness is what surrounds you through the years. Instead of feeling sad about it, you're relieved. Being alone and doing whatever you feel like without boundaries is what you prefer. Love and family is not your kind of thing. Going to work, then doing whatever you feel like after is more like it.\n \n Years pass by like this. People begin to recognize you on the streets from your story and your line of work. As you become older, you soon realize your name and fame is the only thing you will leave behind.\n \n One day, you're walking home from work with ${fsurv} to find a small boy and an even younger girl sitting on the stairs in front of your house. They weep quietly, but the boy is still trying to calm down the girl nevertheless. They soon tell you that they've run away from the orphanage. The stories they tell you feel like something out of a story, but if half of it is true, their fate has been inhuman. They show their bodies covered in small wounds as proof. They had to endure beatings almost every day. They remind you of your own fate. You remember how much you would have wanted someone to just save you. To just reach their arms out for you and lift you out of your nightmare.\n \n ${fsurv} looks into your eyes. She immediately knows what you're thinking about. With a small nod, she strengthens your sudden idea. As soon as you can, you adopt the young siblings. Even though they aren't children directly from your bloodline, you soon become very fond of them. They love you as their father, their savior, and you love them more than anything. You love them as your children. Raising them often feels like a challenge, but you try your best. You come to the conclusion that you're leaving behind something valuable.  \n *goto liendf\n\n  \n*label liendf\n*page_break\n*set age +32\nIn your older days, by the time your children are attending university, fear and uncertainty is slowly taking control of the city. More of the military's presence can be felt, and even you are transferred to patrol at the feet of the mountain. Skinless creatures struggle here and there with broken legs. Ray-like creatures with claws and burnt wings struggle to set off again. You're patrolling the area when your boss is showing it to a woman around your age with long, ash brown hair. When he sees you, he smiles slightly, and they both walk over to you.\n\n\"${firstname}, this is Alianna. She's new on the team. I'd like you to pass on your knowledge to her. She's very talented. You know where to find me if you need me. Good luck, and sort this mess out,\" he says, then walks away in his green military clothes.\n\n\"Well, Alianna. Nice to meet you.\" You offer a hand, and she shakes it with a smile on her face. She looks at you with her emerald green eyes. The edge of a spiky black sun reaching towards her collarbone peeks out from under the green military shirt she's wearing. \"I'll take a break, but I'll be back soon. Eager to learn everything.\" She winks and walks past you with a small grin on her face. The black sun on your body begins to beat very slowly once again. Due to recent events, ${fsurv} visits you more often. You still try to enjoy life as much as possible, but your future, once again, is filled with doubt.\n*page_break\n\nIn a couple of weeks, the city is on edge. Fear takes control of the streets. The military is increasing its defenses as much as it can. Despite that, you're having a nice, relaxing Sunday lunch with your family, which includes ${fsurv} and her family as well. You're chewing through a nice tender steak when the doorbell rings. You excuse yourself and walk to the door to open it.\n\n\"Hello, kiddo…been a while, hasn't it?\" ${capturer1} smirks at you. He's wearing the same shirt. His face looks the same, apart from a couple of wrinkles.\n\nYou stand in front of him, finding it hard to speak.\n\n\"What? The cat got your tongue?\" He peeks inside. \"Well, what a nice, lovely family.\" He smiles, which turns into a frown. \"You disgust me. Man up, arm up, and get rid of them. Our time has come again. The lovely creatures will soon break through. That's our chance to rule. I'll be waiting in the…throne room for you…\" A grin appears on his face. \"See you soon, kiddo…\" He turns around, then heads towards the road. You grip the handle of the door firmly, anger filling your body.\n\n\"Dad, everything cool?\" Your daughter walks next to you. She rubs your shoulder gently, looking at you.\n\n\"Yeah…if you see that man, avoid him at all costs, and call me…\" You keep looking at ${capturer1} walking away.\n\n\"Who?\" Your daughter looks outside.\n\n\"That man…in the shirt…\" you say as ${capturer1} turns around with a grin on his face. He winks once. The scar stretches across his face.\n\n\"But Dad…there's no one outside…are you sure you're all right?\" She rubs your back gently.\n*goto_scene ending", "novosend": "*page_break Years later…\n[b]Chapter 8 - Safely Vulnerable [/b]\n*set Age +3\n\n*achieve novosend\nIn the years that follow, the mafia and his men rebuild ${base2}. The military expands and takes control of the whole of Ignobilis. For protection, citizens have to offer their services if they wish to continue living there.\n\nMeanwhile, ${base2} becomes self-sufficient. The whole small town becomes the paradise for late-night parties and gambling. Walking through the streets at night, you encounter hospitality. Drunk people talk and smoke. Inside the freshly designated casinos, people are gambling with anything holding value, from ammunition to clothing and filters. As time goes on, the hospitality between the districts begins to grow.\n\n*if (loverstatus)\n ${lover} feels more uncomfortable in ${base2} with every day. If it wasn't for you, ${heshe2} would have left long ago. Your love, though, only gets stronger with time.\n \n*if (loverstatus = false)\n Loneliness becomes part of your life, but you enjoy having full freedom with your spare time. You can do whatever you want, and whenever you want it.\n \nRumors about the city past the walls are spreading like wildfire. The only place where everything is fine, beyond the walls. But ${base2} doesn't seem to care about it. They have their ever-growing town, with a life they could only imagine before.\n\n*if (rmdead)\n Sometimes, when you're on guard duty, you have to go down to the cold prison cells, where ${assassin} is chained against the wall. He doesn't say anything anymore, just hangs from the wall, having accepted his fate.\n \n*if (rmdead = false)\n ${assassin}'s tolerance for ${base2}'s slow downfall seems to be running out. It's clear that the only real reason he stays is for ${roommate}.\n \n\nOn your trips to Ignobilis, you're greeted with order and hard-working residents. One night, when you're patrolling the area with ${general}, he sits down on the ground with you. Moonlight shines through the area, and military guards walk along with citizens from Ignobilis. When they're gone, you're left alone with him and the noises in the distance.\n\n\"As I said before, no one can rule forever. And things are going down for ${base2}. Same scenario happening over and over again. I told you, remember? But I'm getting tired, ${firstname}. I can't fight through another rebellion. Eventually, the military will do that. They're just waiting for us to weaken ourselves on the inside, which we are doing kindly. I didn't think you would be the one to sit here with me in the end. On my very last day. I'm leaving tomorrow. For the Dives. I can't believe an entire district has gone to death. It's just not possible. I heard getting through there isn't, either.\" He stands up and takes a few steps forward. \n\n\"Come with me if you want. You would be helpful. We'll come back for people who matter once we know there's something on the other side.\" He looks over his shoulder. You listen to the shouting from ${base2} for a couple of seconds, then walk after him. Ignobilis is filled with guards, and a few citizens walk the streets. They don't say anything, but keep their eyes on you. The last couple of streets are cut off from the district by a wired fence. The passage to the Dives' district is blocked with collapsed chunks of the concrete wall, along with scraps and rotten corpses. Climbing seems to be the only possible way through.\n*page_break\n\nIt takes a long hour to reach the top. When you sit on top of it, the whole district comes into view. Many more cars and taller buildings lie in front of you. Suburbs with pools in the backyard and various buildings for pure entertainment. Everything is destroyed. No one walks the streets. Climbing down takes another long hour. By the time you get down, it's around the middle of the night. You walk down the streets for a while, but you don't encounter anything apart from the light wind and hundreds of rotting corpses.\n\nWhen you reach the middle of the city, a quiet noise comes from a tall, glass building. You walk into the lobby. The noise is coming from underneath you. You walk down the stairs as quietly as you can, to see a couple of men and women pushing the wall in front of them inside. When they're done, a long tunnel appears in front of them with a decontamination chamber at the end. They walk through and turn around to push the wall back in its place, when they see the two of you.\n\nThe Dives have slowly built an underground base over the years, to keep themselves out of sight. After a long discussion, they let you join them in exchange for your services. Whenever materials are needed from the outside, you go out to collect them. When you're inside throughout the day, they give you various jobs, from going to the power plants to cooking in the kitchen. Everyone contributes to the functionality and well-being of the community in some way. The inside of the base is very large, with several levels and secret exits. The lights are running from the generator, and the food is made artificially. \n\n*if (loverstatus)\n Eventually, you're allowed to bring ${lover} over. $!{heshe2} feels happier than ever, and gets assigned to produce food daily.\n *goto ccont2\n \n*if (loverstatus = false)\n *goto ccont2\n \n \n*label ccont2\n*if (rmdead)\n Sometimes, ${assassin} and his fate pops into your head. He would enjoy a quiet, peaceful life.\n \n*if (rmdead = false) and (loverstatus = false)\n After a while, ${assassin} joins you as well. He brings ${roommate} over. You barely talk with each other anymore, mostly because everyday life has turned out to be busy.\n \n He becomes less scared and tired of life as time goes on, though.\n\n*if (rmdead = false) and (loverstatus)\n After a while, ${assassin} joins you as well. $!{heshe2} feels happier than ever. Soon enough, you begin to feel safe and happy by ${hisher2} side.\n\n ${assassin} becomes less scared and tired of life as time goes on.\n *label rmcont\n\n\n*page_break\nThe living chambers each contain a television with access to old movies and news on tape. The bed feels comfortable, and despite the water being reused after a slight purification, it's refreshing to be able to take a shower weekly. The underground civilization of the Dives finally brings you well-deserved peace. Somewhere deep inside, you know that peace doesn't last forever. It never does.\n\nAfter one of the longest and busiest days in your life as a scavenger, the lukewarm water feels like heaven on your skin. You're starting to forget what it's like to have months-old dirt stuck to you. You watch the dirty water draining down with a frown on your face. You dry yourself and get dressed, then head down the hallway towards your chamber. A girl around your age smiles as you pass her in the corridor.\n\n\"On your way to world domination?\" Her emerald green eyes stare into yours, and an innocent smile appears on her face.\n\n\"What?\" You force a smile as well, wondering what she could mean by her joke.\n\n\"Hey. I'm Alianna. You know, I work in a mine underground.\" She brushes her ash brown hair over her shoulder.\n\n\"${firstname}, I'm a scavenger.\" You keep up your smile, still wondering how she knows you.\n\n\"Oh? Is that so? I thought your name was ${capturer1}.\" She tilts her head.\n\nYou raise your eyebrow and look at her with a confused expression on your face.\n\n\"What? That's how you introduced yourself last night. Long after curfew, you went on about how you'll dominate the world. Anyway…you might have been sleepwalking or something. Gotta rush now, I'm a bit dirty here. See you…${capturer1}, ${firstname}, whichever.\" She walks past you with a small chuckle. The edge of a black sun reaching towards her collarbone peeks out from under the dirty shirt she's wearing.\n*goto_scene ending", "oracend": "*page_break Years later…\n[b]Chapter 8 - Knowledge[/b]\n*set Age +6\n\n*achieve oracend\nIn the years you've been sitting on the heart throne, many things have changed. You've slowly forgotten who you are. Maybe you never cared. Your feelings have disappeared. The vast amount of knowledge you had was only limited to the districts and everything inside them. The districts have united and declared the military their common enemy. Their war waged on for many years, while the numbers of creatures have only increased both in size and power. You were the one to witness everything. The technology blooming in the districts, cars appearing again, and new forms of payment. Bullets, food, handmade and original filters, they all became currencies.\n\nYou saw ${general}'s desperate betrayal. You saw how he cut the throats of the guards and pulled the trigger when the barrel of his rifle was pointing between the eyes of the begging ${leader}. He was mistreated for so long. That night, he finally redeemed himself. He became the ${leader} of ${base2}, putting it on the right track to rise again.\n\n*if (rmdead)\n ${assassin}'s secret wasn't a secret to you. The hired gun has returned to his roots. He abandoned ${base2} and wandered around. He cried through many long nights before he decided to do what he's good at. And do it for a price. He's served as a mercenary ever since. Rumors are already spreading about the man without the mask. The one who has swapped sides in the war without the participants' knowledge, in exchange for the best treatment and payment.\n *goto orcont\n \n*if (rmdead = false)\n ${assassin} continued to have ${roommate} enhance her hatred towards him. He cries through some nights, then smiles immediately at the sight of the picture of his daughter. He doesn't smile, but his heartbeat quickens whenever he sees her. ${roommate}, his perfect little daughter, who has grown to be able to protect herself. He continues to serve ${base2} and ${leader} ${general}. He still counts as the most valuable soldier for them.\n *goto orcont\n \n*label orcont\n\n*if (loverstatus)\n\n ${lover} had a hard time forgetting you. For many months, ${heshe2} blamed ${himher2}self. Eventually, ${heshe2} moved on with ${hisher2} life. Thinking about you often, ${heshe2} has become a master sniper. $!{heshe2} spends long hours on rooftops, windows, in bushes, just waiting for the enemy or the target of a high bounty to come out. $!{heshe2} began to open up after long years and found love once again. They make each other happy. There are times when ${heshe2} thinks about you. Only the good, warm memories remain in ${hisher2} head.\n \n*if (loverstatus = false)\n\n Looking through past events, you find a man viciously laughing at the sight of several guns pointed at his head. When his final sentence has been passed, a bullet rips through his head. Nevertheless, he seems to be sitting up once again, laughing in the face of his own enemies. They stand in both shock and awe. However, the second bullet leaves him lying on the ground in his own blood, with his eyes staring into the distance. You find ${capturer1}'s death. Years later, a boy he used to know. A boy he used to have mixed feeling towards marches through the forest alone. He seems to be in an argument with himself as the same people surround him as well. \n \nThe military leader is clinking glasses with her best friend, ${newguy}. When they're done talking, he returns to his wife and their daughter. They're happily eating and laughing through their dinner. They love their daughter more than anyone in the world. More than anyone they've ever had. No one can hold their past, nor present hidden from you. Dark cultists who chant 'Oracle' and embrace the wicked, ever-powerful creatures. Desperate people who try everything to leave the district. Those who have turned from ordinary people into killing machines. Soldiers who snapped and long for the easy life. People who can't take the suffering anymore. All open to you, except the future. You just wait and play your cards in the background. One person even makes you raise the eyebrows on your emotionless, dark face. Curiosity, a thing for felines and humans.\n\nA little girl who was born as a Pauper's poorest. Very early, she had to learn what it's like to get beaten, what it's like to starve for days. She had to learn the art of thievery. But no thieves start their profession perfectly. Stealing from powerful people was the reason behind her parents' death. Being completely alone on the dark streets filled with hatred and disease, she had to learn the ability to perfect her lies. As she grew older, she also realized she could put on a sad face, blinking tears into her emerald green eyes if she wanted to. \n\nHer ash brown hair softly lying on her cheeks only enhanced her innocent act. Which is all she wanted. It always worked, except for one time. That's when blood spilled on her hands for the first time. Her initial shock and the feeling of guilt faded in days. That feeling was replaced by another one. She felt powerful. As she grew older, the thieves and hitmen operating underground set their sights on her. Without any doubt in their heads, they recruited her. But they could barely teach anything new to the master of deception and lies. An artist who paints with blood if required. A girl with no name. They started to call her Alianna.\n*page_break\n\nThe bombings shocked her, just like everyone else. The underground shelter of the thieves provided a perfect protection, but not forever. When the supplies began to run low, others argued about the very few gas masks in stock. Not everyone can leave the base, and who knows if those who leave would ever return. One night, she stole a gas mask. Another man just happened to do the same. For the first time, she stole something with someone else and snuck out with that man. Without a word, they just went in different directions. She's always preferred to be alone. \n\nEven when she joined a smaller group or teamed up with a few others, she had no trouble leaving them behind. Even if it cost them their loot or their lives. She knows every creature's weaknesses. Had to learn them the hard way. That strike almost cost her life. The first time she was close to death. She knows the districts like the back of her hand. She's fast and agile. Unseen like the shadow. She has been stealing from the military, ${base}, ${base2}. But as the world itself began to get worse, she had to undergo many more challenges and troubles to survive. You've watched her fighting her way through the worst of mankind and the creatures obeying your command. You've watched her walk right through the purple orb. Then you waited, calmly. But now, she stands before you. Her ash brown hair resting on her shoulder. Blood splatter over her clothes. \n\n[i]\"Hello, Alianna. I've been watching you,\"[/i] you say in your deep, dark voice, then disappear, leaving a cloud of darkness behind you. You appear in front of her, leaving the same black mist in your place.\n\n\"Oracle.\" She stands in her gas mask and dark-blue shirt. The edge of a black sun crawls up her collarbone.\n\n[i]\"I suppose you're here for the same reason everyone else is. But unlike everyone else, I can't quite get into your head, and your situation doesn't call for a miracle. However, I know you miss some people badly. Ever since the beginning, you thought it was your own fault. You miss your parents badly. You've also been in the district for so long, don't you wish to leave?\"[/i] You walk around, and the thick darkness follows you. Before you have a chance to speak again, she chuckles.\n\n\"Save your breath, abomination. I'm only here to end you. You've started to make things harder for me in the district.\" She flings two curved daggers out and readies herself.\n\n[i]\"I see. Interesting. I don't understand your motives. But I will kill you nevertheless,\"[/i] you say, forming a long, dark sword from the darkness with spikes sticking out of it. Before you blink behind her, you throw a black, twisting snake towards her from the pure darkness. [i]\"The darkness will consume you.\"[/i]\n*goto_scene ending\n", "portalend": "*page_break\n[b]Chapter 8 - Starting Over[/b]\n*set Age 10\n\n*achieve portalend\n\"Oh ${firstname}, honey, wake up. You'll be late for school.\" A woman's voice wakes you up from your sleep. You open your eyes in the light blue room. You rub your eyes and look at the woman sitting on your bed. Her long, black hair reaches down to her waist. She still smiles at you, looking at you with her brown eyes. \"Breakfast's ready,\" she says, rubbing your head. You push the blue cover with figures of purple-eyed monsters on it off of yourself and jump out of bed. You land slowly, but feel shorter. \n\nYou walk to the mirror and feel a knot in your stomach. Your ten-year-old self stares back at you. You rip the blue pajama top off your body. All of your wounds except for the black sun are gone. The wooden floor creaks. You quickly open the wardrobe to your right and put on the first shirt you see, a dark red one with a black furry monster in the middle of it.\n\n\"I'll be taking you to school today. Your mother has to arrive earlier than usual.\" A man in a nice suit looks in from the doorframe with his green eyes. He looks strong and gives you a smile before he leaves your room. You put on your black skinny jeans and grey hoodie for school before you walk down the stairs. To your left, the kitchen awaits with a nice smell. You sit down in front of a plate with a couple slices of bacon and eggs on it. Fresh bread lies by your right hand. The quality of the food is something you haven't had in many long years. Still, you're only able to stuff down a couple of bites. Your parents give each other a worried look, then escort you out of the front door. Bright green grass lines each side of the road towards the pavement, where your father's brown car stands. \n\nYou ride through the huge city next to him in silence. The huge city and all of its sights open up to you from the highway leading above most of the buildings. Mountains surround the city from one side and the ocean from the other. The military's presence is heavy around the docks and the foot of the mountain. Tall buildings, apartments, houses, stores, vehicles and citizens. They're all new to you, and the whole feeling of being in a working society seems scary when you think about it. On the other side of the city, your father stops at the brown school's entrance. A bus sets off from the nearby bus stop, and children of various ages enter the school. \n\n\"Well, I don't know what's wrong, ${firstname}. But I expect you to share it with me when you get home. Don't forget, you'll have to take the bus today. Have fun.\" Your father leans over to give the top of your head a kiss. You get out of the car and walk towards the open doors of the school. \n*page_break\n\nA boy and a girl greet you on the inside, and you walk upstairs with them to your first lesson. You sit through all of your lessons, feeling boredom and frustration. When the last lesson is over, everyone else rushes out of the classroom. You're left alone with your drawing, a city in flames, and your friends. You stand up to pack your stuff away. From the hallway, a taller boy walks past, then takes a few steps back to head inside. He pushes your friends aside and walks up to you with his friends, who are blocking the exit. He looks older and much stronger than you.\n\n\"You did well avoiding me all day. But I've found you. I hope you brought my daily, uh…protection money. My wallet hungers for it.\" He laughs and looks back at his laughing friends. \n\n\"I don't have any money.\" You shrug and get ready to zip up your pencil case. He smashes it and pushes you against the bookshelf behind you. Your back hits it hard. He keeps threatening you, then pushes you once more. You clench your fist and take a deep breath. When he tries to push you again, you dodge it and jump behind him. Twisting an arm quickly behind his back, you slam his head on your table. It pushes him off balance. You jump him and punch him in the face several times. His chubby friend runs to you and drags you off him. When you're on your feet again, he throws a punch at your face.\n\nYou grab the pencil on the table and slam it into his arm after you dodge the attack. He screams in pain and kneels down next to his friend, who rolls around on the floor with a bloody face. Your friends drag you away, and you rush out of the school. You barely catch the school bus. You sit down and just look out the window on your way home. After getting off the bus at the wrong stop, you find your way home. It's gotten dark by the time you arrive. You close the door, and your parents are standing at the entrance to the living room with a sad, angry look on their faces.\n\n\"What have you done? You could get expelled for that!\" Your father shakes his head. Tears roll down your mother's cheeks in the background.\n*page_break Two years later…\n*set age 12\n\nYour parents worked hard to not have you expelled. Your friends' statements only helped that cause. In the end, you got away with a warning. Your story, however, has spread around along with your name. In the next two years, you got used to your new way of life. Sometimes, you wonder what it's like in the districts. You recall your years there. Somehow, they feel like a distant dream rather than actual memories. You hide the black sun every time you have to take your shirt off. After a while, it doesn't seem so weird to think about this new life as your own. After you get used to the comfort and peace it provides, you slowly begin to accept being part of a fully functioning society. A loving, welcoming family. Relatives from grandparents and cousins come over, talking with you like they've known you since the day you were born. Slowly, you begin to feel safe and enjoy the peace. Months of school pass by. \n\nWithout any real challenge, you end the year with good grades. On the last day of school before the summer break, your friends run off to catch a bus, but warn you not to miss the sleepover several times as they do so. You chuckle and finish packing your backpack before you leave the classroom. You hurry out of the school. As you step out, a girl stumbles into you. You fall against the doorframe and onto the ground.\n\n\"I'm so terribly sorry!\" The girl offers a hand and helps you up on your feet. She's several years older than you. She looks at you with her emerald green eyes. \n\n\"I didn't notice you. I was in a hurry.\" She combs her ash brown hair back and fixes the small backpack on her back. At the neck of her shirt, a black sun's edge creeps up onto her collarbone. \n\n\"Well, I've gotta run now. I'll see you later. I'm sure of that…\" She notices you looking at the black sun, then slowly walks away, whistling. The black sun on your body twists for the first time since you got here. \n\nYou put your hand on it as you watch the girl walk away. She glances back and smirks a little, followed by a cheeky wink.\n*goto_scene ending", "prologue": "[b][i]Chapter 0 - Foreword[/b][/i]\n\n*comment I'm not sure brining a load into this game is necessary, I've added the old variables manually, also changed some of its values which I shouldn't have. I hope a description like this is enough, if someone played the previous one they will know the story behind the characters. \n\n*comment please tell me what you think, and let me know if you have any suggestions/improvements, etc. Thank you.\n\nWelcome to the second instalment of Doomsday on Demand. It's heavily based on the first part. To be able to understand most of the lore going on around you, it is heavily recommended to play through the first part before you jump into the action.\n\n*page_break\nTo be able to continue where you left off, you'll need to answer a selection of questions taken from the most vital points of the previous game. They'll heavily impact your further journey.\n\nChoose whether you want to tailor your own variables or have the vital variables randomized.\n\n*page_break\n*set Age \"17\"\n*set Name \"??????\"\n*set Evil 69.32367\nThe bed you are sitting on feels soggy underneath you. The concrete chunk in front of you is what's left of the room. Your face is buried in your hands. The cold wind shakes your whole body. In the darkness, everlasting screams and growling surround you. Whispers come closer in the darkness. You keep your eyes shut, waiting for them to disappear. Desperate for a bite of food and a couple hours of sleep, you recall how you ended up like this in the vain hope of reclaiming what's left of your sanity.\n\n*fake_choice\n #I don't remember my background…\n  *label randname\n  *rand roll 1 5\n  *if roll = 1\n   *set Firstname \"David\"\n   *set Lastname \"Lyfeld\"\n   *set Name (Firstname&\" \")&Lastname\n   Your body shakes as you exhale and recall your name, which is ${name}.\n   *goto randnext\n  *if roll = 2\n   *set Firstname \"Adam\"\n   *set Lastname \"Lyfeld\"\n   *set Name (Firstname&\" \")&Lastname\n   Your body shakes as you exhale and recall your name, which is ${name}.\n   *goto randnext\n  *if roll = 3\n   *set Firstname \"Jack\"\n   *set Lastname \"Lyfeld\"\n   *set Name (Firstname&\" \")&Lastname\n   Your body shakes as you exhale and recall your name, which is ${name}.\n   *goto randnext\n  *if roll = 4\n   *set Firstname \"Carl\"\n   *
