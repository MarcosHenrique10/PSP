ues to run. You turn right to follow him, but a wack jumps in front of you, holding a sharp piece of metal. It cleaves the air between the two of you. You almost fall as you stop, then turn around and run the opposite way. \n\nThe trees can barely be seen, and you can barely avoid them. The grunting and screaming noises surround you and get closer with every step you take. You look back to see the horde following you. When you turn forward again, a wack is standing in front of you, raising a blunt object. You have a split second to think the situation through, then you launch yourself towards it. It gasps for air as your shoulders sink into its hard ribcage. You didn't notice the slope behind it. You end up rolling down the slope.\n*page_break\n\nYou open your dizzy eyes and jump up from the smoldering wood you've landed on. \n*if (gavefilter)\n You take a second to pant, lowering downton your knees with clenched fists. Your lungs burn as if sharp metal pieces were rolling around in them. You cough heavily and taste blood in your mouth. You take a couple of deep breaths until it passes.\n *goto land\n\n \n*if not (gavefilter)\n You clean your back as much as you can. Not being afraid of the dirt, but the fire.\n*goto land\n\n \n*label land\n\nAs you look around, it becomes clear that you've landed on a huge pile of garbage and debris. You hear a slight struggle coming from behind you. You turn around and see the wack, a metal rod sticking out of its chest. It furiously tries to reach you. You take a couple of steps back and look into the distance. You look up and see the moon shining with a dark, slightly pink color. You can barely make out the district in the dark, foggy area. \n\nMutants grunt and scream somewhere in the distance. You suspect they're still trying to get you, so you jump down from the pile of waste and begin to walk through the dry, yellow, deserted field. You walk for a while, until the back of a familiar building comes into view. At first, you don't know why it's familiar. You walk around it, your hand ready upon your ${weapon}. You slide in through the slightly open metal doors of the warehouse.\n\nYou remember the place immediately. You walk among the shelves as a cold wind blows through the warehouse. The broken glass crackles under your feet. When you reach the end of the tall shelves, you close your eyes for a second.\n \n*if (ryandead)\n *temp deadsurv \"Ryan\"\n\n You open your eyes and look to your right. At the wall sits the remains of ${survivor2}, a large hole in his stomach. The wall behind him is visible through the hole. You walk closer and notice that his almost decayed body has also been feasted upon. Parasites of all colors and sizes cover the inside and outside of his body, as well.\n\n\n*if (malcolmdead)\n *temp deadsurv \"Malcolm\"\n You open your eyes and turn left, towards the office. You walk through the door. It cracks loudly under your feet. You walk into the office. To your left sits ${survivor1}, leaning against the wall. His face and most of his body has corroded, and his clothes are burned into his flesh. Several parasites of all shapes and sizes cover his body inside and out.\n *if (Ivanend) or (deadend)\n  You crouch down for a second, feeling…\n  *fake_choice\n \n   #Sad.\n    *set Evil %-5\n    *set Ivan %-5\n    *label sadness\n    You kneel down next to ${deadsurv}, then sit back on your knees. You keep looking at his face, which you can barely recognize now. You close your eyes, and tears begin to roll down your face. Sadness and hatred fills your whole body.\n\n    \"Ah, how I remember that day. I'll probably never forget how you passed out from a tiny scar. The only thing that still bothers me is how sensitive you can get over the death of someone like…well…anyone. People die, get used to it. I wouldn't shed a tear if you died, believe me.\" \n    *label appearance\n\t\n\t\n    ${capturer1} rolls up the sleeves of his black shirt. He crosses his arms and leans against the wall. \n\n    \"He died because he was weak and careless. That's what weak people get. Keep that wimpy attitude of yours, and I'll be the one to finish you.\" He frowns and clenches his fists. You look into his eyes and see a small smirk appearing on his uncovered face. You wipe your tears away and stand up. He pushes himself off the wall and walks towards you, taking big, cynical steps. \"Do you realize how alone you are? You have no one to care about you.\" He leans into your face. His hair touches yours as he continues. You frown and push him away, then push the end of your ${weapon} against his chest.\n    \n    \"Bold. But I'm still unconvinced. The truth hurts more than what I'm going to do to you, if you ever threaten me again.\" He twists your arms, and you drop your ${weapon}. His hands feel like ice, then as if they're burning your skin away. He steps on your ${weapon} and pushes you back.\n    \n    \"Back to my point…if anyone cared, you'd be standing beside them right now. But wait a second…I don't see anyone next to you now, do I? Notice the signs, kiddo. Realize I don't want anything bad for you. I want the worst for you…\" He straightens up. With a sudden move, he grabs your neck. \n\t\n    \"You would make a worthy ally, even with all your emotional downsides. Not only because you should have learned a lot from me by now. But because I know your every move. Before you even think about it.\" He releases you and spits on the ground. \"Sorry, emotions got into my mouth.\" He chuckles as he turns around and walks away with his hands in his pockets. You pick up and holster your weapon.\n    *goto thecont\n  \n   #Neutral.\n   \n    *label neutral\n    You crouch down next to ${deadsurv} and look at the lifeless, decomposing body. You acknowledge his condition, but you can't get any kind of feeling stirred up.\n    \n    \"Ah…the day you got that nasty scar. Kiddo…that scar is really ugly, I gotta tell you that. How can you wake up every day and look in the mirror with that…thing?\" ${capturer1} puts his hands in his pockets and walks towards you. You turn around and stare at him.\n\t\n    \"That's the spirit! Cold as ice! Keep that attitude up. People die left and right. Sometimes by your hand. You can't go around and feel sad for every one of them. Not even for one. Not even if you knew the person. Not even if you liked each other. Not even…you know, you get it.\" ${capturer1} rolls up the sleeves of his black shirt. He crosses his arms and leans against the wall. \n    \n    \"Ah…if only I knew what's with the rest of the old folks. I wouldn't care…to be honest. If only someone could tell me some juicy details, maybe then I'd be able to fake some interest in them.\" He tilts his head and looks up for a second. \"Scratch that, I wouldn't be able to. I simply wouldn't care at all. Well, that was a nice view. Brings back old memories.\" He sighs. \n\t\n    \"The people I've killed. I like the way you're so cold about it. You've had a good emotional teacher, eh?\" He pushes himself off the wall and stretches his limbs. He scratches his uncovered face and walks in front of you. \"But can you protect yourself?\" Suddenly, he wraps his hands around your neck. At one point, they feel like ice , then as if they're burning away at your skin. You put your hand on your ${weapon}, and you keep looking at each other. You stand like that for a second before he winks and releases you. \n\t\n    \"Heh…later, kiddo.\" He walks backwards and winks before he turns around to walk towards the entrance of the warehouse. \"Be good, ${firstname}. And remember to stay quiet! You don't want anyone to find out you're alone here! Later!\" he shouts as he leaves the warehouse.\n    *goto thecont\n  \n   #Happy.\n    *set Evil %+5\n    *set Ivan %-5\n    *label evil\n    You put your hands in your pockets. You smirk at the ever-decomposing body of ${deadsurv}. You bump the end of your shoes against his head, and it rolls to the other side. His neck bone cracks loudly.\n    \n    \"That's what I like to see!\" ${capturer1} walks through the shelves. He stops when he reaches you and smirks. \"I remember this very day…everyone was so sad about this little…incident. Maybe it was you, maybe you're a mastermind and you planned it all…nah…on second thought, I don't think so.\" He frowns and laughs, then rolls up the sleeves of his black shirt. He crosses his arms and leans against the wall. \n    \n    \"I hope you're even giving hell to those who are alive, and not just the poor, defenseless dead ones, though. That's how it is, you know, kill or be killed. No second thoughts, act from instinct. Care for yourself and no one else. And you gotta make sure they stay dead. That's the fun part!\" He laughs and rubs his uncovered face. \n\t\n    \"Feelings have never gotten anyone far. Think, kiddo, just think.\" He taps the side of your head with his fingertips, then wraps his arms behind his back. \"Don't sacrifice a good future for feelings. Do you know why ${base} went downhill? I began to care for your future. You had so much potential. That proves me right too. Feelings, they're bad for you. But I can foresee the same future for ${base2}. Without a change of leadership, it's not going to run for long. Now, they don't necessarily have feelings towards just one person. They just act out of feelings. They care for the people and their precious town so much. That's why we should rule. You've learned so much from me. But you've still got a long way to go.\" He firmly pats your shoulder and heads towards the entrance. \"Later!\" He waves but doesn't look back.\n    *goto thecont\n    \n   \n   \n*if (ryanend = false) or (malcolmend = false)\n\n\n You turn your head away and close your eyes. [i]\"${firstname}!\"[/i] You hear ${deadsurv}'s panicked voice filled with pain echoing in your ears. Images of his death flash before your eyes. Your wound tickles and burns as you recall the events and think about how you'd never been closer to death before. You peek under your shirt. The black sun surrounding your wound looks as if it's been twisting, but maybe it was just your imagination.\n \n \"${firstname}, no hard feelings…\" ${deadsurv}'s voice comes from behind you. You turn around and find ${deadsurv} standing about a foot away from you. He's wearing the same clothes, but he doesn't have the deadly wounds. \"You did what you had to do. You had to choose, and you've paid greatly for that choice. You could've just turned around and walked away. But no, you chose to save one of us. You chose to almost die for one of us. I'm proud of you, really.\" He rests his palm on the top of your head and gently rubs it. \n \n \"What a hero you are…if only you knew and got credit for all the people you've saved. What a brave guy you are. And wow…you've grown so much…\" He smiles, and his hand slides down onto your shoulder. You try to take a step back and reach for your ${weapon}, but he wraps his other hand around you, trapping your arm by your side. \n \n \"I wish I could know your plans for the future. I wish I could be a part of your future. Heck, maybe I'm the one who needs to be protected, and not you.\" He chuckles, and his hand slides off your shoulder and onto your wound. He begins to move his hand around on it, and your muscles tighten. It feels as if thousands of hot knives are trying to escape through the middle of the black sun. It burns, then feels ice cold. You feel something dripping from your wound. Strange noises and desperate screams fill your head.\n *page_break\n \n You push him away as much as you can, gasping for air. When the voices clear from your head, you immediately pull your shirt up. You can't see anything out of the ordinary, only the pitch-black veins have become swollen and puffy. They throb fast, with your heartbeat.\n \n \"Yes…sad result of a sad event. ${firstname}, I'm going to be honest with you…I'm not ${deadsurv}. I've just gotten into his form in order to be able to communicate with you. I mean no harm, though. In fact…\" He stops as his face and body melt in front of you, then form back up again. \n \n \"I want to help you, son.\" He morphs into your father, standing in front of you. \"You did not die, nor joined them when they hurt you. Somehow, your system resisted.\" He melts again.\n \n \"But it won't last long!\" ${currentbf} shakes ${hisher} head. \"The infection is still in your body. And it's spreading. Slowly, but it is! Eventually, it's going to reach your core. Your heart and brain. It will take control of you. You will change, and wake up to be one of them.\" His flesh twists away, then forms back up.\n \n \"You won't be able to control yourself any longer. You'll probably see what you're doing but won't be able to stop them. You'll act out of instinct.\" Your stomach twists as you see your own self staring at you, without a gas mask. \"Those instincts will no longer be instincts. Eventually, that'll be you. And you will be that.\" He takes his shirt off. His body is toned and muscular. Many large and small scars cover his body, but your eyes fixate upon the black sun. The wound looks ugly and black as tar. The black, swollen veins around the wound throb fast. The black sun is twisting and growing slightly with every heartbeat. You feel your stomach in your throat, but you resist the urge to throw up.\n \n \"We can help you. You have no reason to trust us. No, you have all the reason to hate and mistrust us. But while you think all of us are evil, and we work together, we do not. Just like you, we have our own affairs with each other. And we're losing. I can cure you, but you need to return the favor. You, you will have to destroy their…hideout. This is a one-time offer, ${firstname}. What do you say?\" He stands in front of you as a small, black, tiny vein slowly pumps up to his left eye. His eye becomes black, and images of yourself ripping away at human flesh flash before your eyes. You lean down and rest your hands on your knees. You close your eyes and cough.\n\n *if (ch5d)\n  *label re\n  *achieve seconddeath\n  *page_break\n  [i]\"I wonder how many times you'll be able to cheat your own fate again? I eagerly await the moment your luck runs out.\"[/i] The purple eyes shine in the darkness, then they close. You're left in complete darkness. Blood drips on your head. You raise your rotten, deformed hand and rub the blood on your bare skull. You look up and see your own self tied to the ceiling. Your eyes are wide open, staring at you from behind cold, blue skin. Hands extend towards you from the darkness. They grip your bony limbs and slowly begin to pull your body apart. You try to scream as loud as you can, but nothing comes out of your mouth.  \n  *goto reco\n *else \n  *goto reco\n \n \n \n *label reco\n \"${firstname}…clock's ticking. We don't have much time…what do you say?\" You open your eyes and wipe the sweat off, then straighten up. You look into his eyes, your own eyes…and take a deep breath.\n \n *fake_choice\n  \n  *hide_reuse *selectable_if (ch5d = false) #\"Cure me.\"\n   *set Deadcount + 1\n   *set ch5d true\n  \n   \"Cure me…I don't want to end up as a beast,\" you say with a dry mouth. \n   \n   \"Good choice. Follow me, then. You look…pale, though. Don't worry, it's all going to be better soon. Come now,\" he says, grabbing your hand. You walk out of the warehouse. Your stomach feels funny whenever you realize your hand is being held by something that looks like you. He leads you on the path you know well, but takes a left turn into the forest. You keep walking until you reach a familiar metal lid. It stands open, and you climb the ladder leading under the ground after him. The decontamination chamber's doors open and close. \n   \n   You walk through it to the white corridor. Its lights are flickering or not lit at all. As you follow him deeper into the scientist base, you have to step over the torn, rotting remains of the scientists. As you walk further into the darkness, you step in a puddle of blood and almost slip.\n   \n   At the end of the corridor, you turn left and begin to walk down the stairs, into the darkness. You can't see anything when you reach the bottom of the stairs. You keep following him and feel his hand changing. He turns his head around, and two glowing red eyes meet yours for a moment. At the end of the corridor, a handful of red eyes are staring at you. You take a right turn into a room where the light is flickering. The creature releases your hand. It points towards the bed in front of you with its long fingers and sharp claws. \n   \n   You get on the bed and look at the creature. The light flickers, revealing its large red eyes and sharp fangs. The others jump to your side and hold your arms and legs down. More of them pour into the room as the one leading you here steps closer. A wide grin appears on its face, and saliva drips from its fangs. It chuckles and buries its fangs into your wound. You struggle as much as you can to break free. Their sharp claws sink into your flesh as they hold you down. Your vision begins to fade as the creature feasts upon you. \n   \n   \"No…no…no! No!! What have you done, kiddo?!\" ${capturer1} shouts. With the last remaining strength in your body, before your vision fades, you see him pushing the crowd away, trying to reach you.\n   *goto_scene gameover\n   \n    \n   \n   \n  #\"Don't cure me.\"\n   \"As…you…wish…\" He turns around and heads towards the entrance, then he disappears between the shelves. You crouch down and bury your head in your hands. Then, you pull your shirt off your wound and take a peek at it. The veins around your wound are throbbing. You catch the sound of muffled footsteps coming from in front of you. You look up to see a dark, grey creature with long fingers ending in sharp claws and glowing red eyes. \n   \n   It grunts with its deformed mouth, out of which come sharp fangs. It launches itself towards you, raising a broken piece of glass. You stumble and fall back as it lands upon you. Its knees sink into your stomach as it tries to bury the glass in your body. You hold its hands back. Its skin feels like sandpaper. Its saliva drips onto your face.\n   \n   The tip of the glass shard pokes your wound. The veins begin to pump faster, and you force all the strength out of yourself in order to push the creature off of you. You jump up as it tries to get up as well, then you kick the glass out of its hands. You drop on your knees, trapping its arms. \n   \n   Your heart beats so fast, you can see your vision beating along. You punch it in the face a few times, not even feeling its fangs scratching and poking through your skin. The creature growls loudly, and you wrap your hands around its neck. You squeeze with all your strength. The creature struggles underneath you and desperately tries to gasp for air. \n   *page_break\n   \n   \"S—son…\" The creature underneath you morphs, but its arms don't change from where you're kneeling on them. \"Don't…\" Your mother looks at you with bloody eyes. Your grip weakens for a second, but you continue to choke the creature with all your strength. Her head falls back, and her eyes stare into the distance. When the life fades from her eyes, the creature's true form slowly appears again. You kneel over it, panting.\n   \n   \"That was a nice performance. You should pick up the glass though, silly. It's not even sharp. He just wanted to play! Honest! Go ahead and try it, jam the glass into your neck!\" a thin voice says behind you. You glance back and see a little boy with ripped clothes pointing at the glass shard. You clench your fists and get off the creature. You pick up the glass shard and walk towards him with big steps. You grip his head and slam the glass into his throat. He gasps for air as blood pours from his neck. He falls on the ground, twitching.\n   \n   \"Kiddo. Let the anger take control. See how easily things happen if you just act out of instinct.\" ${capturer1} stands with his arms folded at the end of the shelves. \"Kill or be killed. Hunt or be the hunted. And right now…it looks like you are the hunter. Do you have to be near death to realize this? Why? If that's what brings out the best in you, I'll gladly threaten your existence whenever I can. How easily you killed them, without doubting yourself, even for a second. I'll tell you, very easily. Now I'm starting to feel like I didn't wait around for nothing. I'll be watching, kiddo.\" He turns around and walks towards the exit as you pant. \n   \n   \"Oh, also, you have strawberry jam on your forehead.\" He laughs and continues to walk. You wipe your forehead, smearing blood over it.\n   *goto thecont\n   \n   \n  *if (ch5d) #Kill the creature.\n   \"Sure…cure me.\" You rub your eyes and walk over to him.\n    \n   \"Good. Come.\" He takes your hand. You walk between the shelves. To your right side, a rusty, bent screwdriver lies on the shelf. You reach out your right hand and grab it. As you're about to reach the exit, you grip his hand tightly and slam the screwdriver into his neck. He grasps at the screwdriver and tries to let go of your hand. You rip it out and push him against the shelf. He puts his hand on your neck, and blood squirts between his fingers. You raise your hand and jab the screwdriver between his eyes. \n   \n   His eyes snap up, and he slides down onto the ground. Blood flows from his neck, under the shelf. You look down at the body and see yourself lying on the ground, blood pouring out of you. Anger and sadness fill your whole body. You hear footsteps, and you turn around. \n    \n   \"You saved us! Thank you! Take the mask off…I wanna see the face of my hero!\" A young boy stands in front of you with a wide smile on his face. You wipe your tears away and smile. You lean down for the screwdriver and slowly pull it out of the neck. You grip it tight and stab the boy in the chest. His eyes widen, then he frowns and his eyes turn red. You push him down to the ground and keep stabbing him until he stops moving. You kneel next to the body, panting.\n    \n   \"Good job, kiddo. Do you realize now how easy things get if you just don't trust anyone? Follow your instincts. Even if they say to kill everyone in sight when the slightest doubt appears in your head. Trust me, dumbo. Let me be the only one you trust. You can achieve a great many things like that.\" ${capturer1} speaks on your right. He steps over the body, which has now turned from your reflection into its true form. Its long arms end in claws, its bright red eyes stare into the distance, and its sharp fangs are covered in blood. ${capturer1} walks past you, towards the exit. \n   \n   \"Act like I said, kiddo. And you might end up half as good as me.\" He chuckles and walks out of the warehouse. You take a minute to process everything, then get up.\n   *goto thecont\n\n*label thecont\n\n\nYou stretch your arms and head towards the exit.   \n*page_break\n\nYou walk outside and look around. Rusty, broken cars line the dirt road that leads here, cutting the forest in half. The day has been long, and it has begun to get darker. You walk up the dirt road and decide to head towards ${base}. A gentle breeze moves the branches as you walk, and howling comes from a distance. You reach the district and stick to the path you know. You sneak between the cars and trees, then take a left turn onto the road leading to ${base}. You stop for a moment when you stumble upon a body wearing a Sons of Tomorrow uniform.\n\nThe further you walk towards ${base}, the more bodies you see. Around them are construction equipment and materials. You walk on half-complete pavement, and wooden pillars stand to the left and right. You put your arms above your head as you walk closer to the gates. The bodies lead up to the gates of ${base}, where a couple dozen soldiers are lying on top of one another.\n\n\"Freeze! Identify yourself!\" the watchtower guard shouts at you as he raises his submachine gun. The soldier in the other watchtower lies dead.\n\n\"SOT…let me in. ${newleader} knows me,\" you say and slowly lower your hands.\n\n\"Oh…yeah…I'm sure he does. I have explicit orders…to kill all of you on sight!\" he shouts and aims at you. He pulls the trigger, but the SMG jams. While he's trying to fix it, you turn around and run in the opposite direction. You jump over the bodies and run for the forest. You hear a couple of gunshots behind you. When you reach the forest, you look back for a second, then continue on your way. \n\nSome of the mutants are still scattered around, but you avoid them as much as you can. By the time you arrive at ${base2}, darkness and the faint sound of growling and howling surrounds you. You sign at the gate, and it begins to roll down. You glance back towards the forest. Sets of purple eyes are coming closer. You walk through the gate, and the guards close it behind you.\n\nYou walk through the empty, dark streets, into your chamber. You're exhausted, and the day was draining mentally, as well. \n\n*if (loverstatus)\n You find ${lover} already sleeping in ${hisher2} bed. You put your gear down and snuggle next to ${himher2}. $!{hisher2} sleeping face brings a smile to your tired face, and you give ${hisher2} lips a gentle kiss. You close your eyes and immediately fall asleep.\n *page_break\n \n \"Rookie! On your feet!\" You jump up from the bed to see General ${General} frowning at you. You've had such little sleep you didn't even have time to dream. ${lover} turns around and stares at the two of you with tired, red eyes.\n \n \"Firstly, we didn't know if you're alive, and you just walk inside sometime in the middle of the night and go to sleep? By the way…${Assassin} made it back alive too. Mission was successful, they're analyzing the…results, in the lab.\" He crosses his arms, rubs his bald head, and peeks over your shoulder at ${lover}.\n \n \"Secondly…the Arkadians have betrayed us. We sent some good men over there to connect us. Sadly, we sent too few guards. They got them by surprise…it was a massacre. This is the second time in recent history that they've backstabbed us. But now we have to end it. Once and for all. We attack at midnight and wipe out their existence. Get ready, prepare all you want. Be at ${assassin}'s place an hour before we go.\" He turns around and walks out of the room.\n \n You lay back down next to ${lover}. You close your eyes, but you don't seem to be able to fall asleep again. When you finally manage to, ${heshe2} turns around.\n \n \"I've gotta go…\" $!{heshe2} runs ${hisher2} hands through your hair. \n \n \"Stay…\" you mumble, opening your eyes.\n \n \"You know I can't…but I'd love to…\" $!{heshe2} sits up. You wrap your arms around ${hisher2} waist and pull ${himher2} back. \n \n \"Come on!\" $!{heshe2} laughs, and you release ${himher2}. $!{heshe2} runs ${hisher2} hand down your cheek and kisses you on the lips. \"And…I've heard everything. Take care of yourself. Come back in one piece!\" $!{heshe2} climbs over you. You watch ${himher2} getting ready and leaving for work. You catch ${newfriend2} looking at you. When you look at ${himher3}, ${heshe3} turns onto ${hisher3} side. You do the same, and you manage to fall asleep after a while.\n *goto thecont3\n\n\n*else\n\n You find ${Roommate} and ${Roommate2} cuddling and sleeping sound. You climb into your bed and turn onto your side. You blink twice, then your eyes stay shut.\n \n \"Rookie! On your feet!\" You jump up from the bed to see General ${General} frowning at you. You've had such little sleep that you didn't even have time to dream. ${roommate} and ${Roommate2} look up and stare at you for a while, then they smile at each other and lay back.\n \n \"Firstly, we didn't know if you're alive, and you just walk inside sometime in the middle of the night and go to sleep? By the way…${Assassin} made it back alive too. Mission was successful, they're analyzing the…results, in the lab.\" He crosses his arms, rubs his bald head, and looks to his left, at the sleeping ${Roommate} and ${Roommate2}.\n *label thecont2\n \n \n \"Secondly…the Arkadians have betrayed us. We sent some good men over there to connect us. Sadly, we sent too few guards. They got them by surprise…it was a massacre. This is the second time in recent history that they've backstabbed us. But now we have to end it. Once and for all. We attack at midnight and wipe out their existence. Get ready, prepare all you want. Be at ${assassin}'s place an hour before we go.\" He turns around and walks out of the room.\n\n You lay back in your bed and try to fall asleep. For some reason, you can't. You roll around in bed, and after a long while, whispering and chuckling catches your ears. You open your eyes and turn around. ${roommate} and ${Roommate2} are snuggling in bed, kissing each other. They get up and get ready to leave. Hand in hand, they leave for work. You turn back onto your side and can finally fall back to sleep.\n *goto thecont3\n \n\n\n*label thecont3\n*page_break\nYou open your eyes and stretch your limbs. You sit up on the bed and yawn. You equip your gear and have a few bites in the kitchen. When you're ready, you leave the chamber. To your surprise, it's already dark when you step outside. You glance to your right, towards the wall separating you and the suburbs.\n\nIn the town square, the priest is preaching. You walk through the streets filled with people. You walk past the citadel, where guards are sitting on the stairs and chatting. You reach the headquarters, and the guards let you inside. After the usual decontamination process, you take off your gas mask and walk to the back of the hallway. When you reach the dark, dirty door, you knock on it. You receive no response, so you open the door.\n\n\"No. Knives don't require ammunition and reloading. They're the most effective weapon against the creatures.\" ${Assassin} is standing in front of a boy, and he turns towards you.\n\n\"I'm bad with knives and daggers. I can shoot, but I can't wield those.\" A boy with long, red hair stands in front of him with crossed arms. He's wearing blue jeans and a red hoodie. He looks only a couple years younger than you.\n\n\"Practice, Alan. You have potential.\" He picks up his leather jacket off of the bed and puts it on. \"Now, go.\" He pats his head. The boy nods and walks past you without saying anything. You walk further into the small, barely lit room and lean against the kitchen counter. ${assassin} closes the door and sits down on the bed.\n*page_break\n\n\"You did come back. I didn't leave you on purpose, believe me. It would have been suicide to try and find you. But we did well.\" He speaks while he's cleaning a pistol on the table in front of his bed. The door swings open, and ${General} steps inside. \n\n\"Good to see the two of you here. We have a couple of hours left. I suggest we spend it well and recap our tactics.\" He tugs on his black trousers and leans over the table. \n\n\"First of all, we'll get weapons and ammo handed out, so this won't go down from our rations, hence the importance of the mission. But unlike usually, this won't only be the two…or three of us.\" He looks from ${assassin} to you with a serious expression on his face. ${assassin} stands up to put his weapons back in their places, only leaving the knives and daggers on his belt. When he's done, he sits back down on the bed.\n\n\"This time, we'll bring along more soldiers. We don't know what they have planned and don't know the size of their unit. Also, we have no options. As far as we know, they have watchtowers surrounding the building. Sneaking inside is not an option. Even you sniping some of them down gives it away.\" He looks at ${assassin}. \n\n\"So we rush them. Try to gain some time and life with the element of surprise. We haven't done something this big for a while now…but as usual…I'm leading the unit. As always, my stand-in is ${assassin}. His words count as if they were mine.\" He sits down on the floor. You lift yourself up and sit on the kitchen counter. You keep talking for a couple of hours about the mission, until the radio on his shoulder buzzes and people speaking can be heard through it.\n\n\"All right…it's time.\" He turns the radio off and stands up. You hop down from the counter, and ${assassin} stands up. You leave the room. ${assassin} locks the door, and you follow ${General} out of the headquarters.\n*page_break\nOutside, you find at least two to three dozen Sons of Tomorrow soldiers, ready with pistols and SMG's holstered in the designated slots on their suits. Three of them step forward and hand each of you a weapon and five magazines. ${General} gets a machine gun, ${assassin} gets a rifle, and they hand you a heavy, silver pistol. You stuff a magazine into it and pocket the rest, then holster your weapon.\n\n\"Okay…let's move out.\" ${General} walks in front of the soldiers, followed by you and ${assassin}. You walk through the city. The few citizens that are outside keep staring at you and whispering to each other. You walk through the gate and march towards the forest. You look back on the way a few times. The sight of soldiers following you fills you with a feeling you can't quite place yet. \n\nYou march through the forest, bumping into the wacks, aviatrixes, and other creatures that roam the area. The soldiers kill them on sight, leaving corpses behind you as you walk down the hill. You arrive at the edge of the district and stick to the main road. Purple sets of eyes watch your every step from the building's windows, but they don't come closer. When the bodies of the other soldiers and workers come into view, ${General} puts up his hand. Everyone stops, and he turns around.\n\n\"The enemy is not far away. We'll try to get as close as possible. You are permitted to shoot whoever you see on sight. I want this to be as clean as it can be, minimizing our loss and maximizing theirs. When the mission is over, we regroup in the lobby. Take no prisoners. Let's do this.\" He turns around and cocks his weapon. Everyone else does the same, and you walk steadily, your weapon ready. \n\nWhen the watchtowers come into view, you stick to the pavement. As you reach ${base}'s fence, you hear gunshots and see them firing from the watchtower to the left of the entrance. The soldiers raise their weapons and spread out. They fire at the watchtowers, and they return the fire. While firing at the watchtowers, you make your way towards the entrance. ${assassin} kneels down to cut the fence in half. You step behind him and take down the couple of soldiers coming out of ${base}. When he cuts through the fence, you storm in and stop in front of ${base}.\n*page_break\n\"All right, spread out in no less than pairs of two. I want the watchtowers filled with our men. I'm sure this has more than just two entrances, so find them. If you have to make a new entrance yourself, do so,\" the General says as he reloads. The soldiers salute, then start spreading out. \"We go from here.\" He looks at you and ${assassin}. You both nod and enter the decontamination chamber with a couple of soldiers. \n\nThe decontamination process's seconds feel like long minutes. Your heart is beating fast, and your limbs are slightly shaky. The door finally opens, and someone is standing in front of you. You both freeze for a split second. He reaches for his weapon, but you fill him with bullets immediately. You rush out and fill the hallway. Gunshots, screaming, and loud fighting noises come from all around. Soldiers rush down from the stairs to the left, but you take them out easily. A couple of soldiers break off and head up the stairs. \n\nYou walk further down the hallway, sticking to the wall on your left. You look through the living chambers. You reach the kitchen, where a short woman is finishing off a soldier of yours. She sees you and slides behind the corner. You take aim and wait for her to peek out. She leans out and fires a bullet at you, but ${General} fires back. She falls to the ground, and her weapon slides under the counter. \n\nA chamber door behind you opens, and someone stabs the last remaining soldier with you in the neck. He screams. You turn around and fill the area with bullets. The man falls back, and the knife rolls under his bed. He chuckles faintly as blood pours from his several wounds. You step closer, and he laughs with a fading tone. His clenched fist relaxes when his breathing stops, and a handmade explosive rolls out of it. Without hesitation, you start to run. ${Assassin} and ${General} run further into the base, and you run back towards the lobby. \n\nThe explosion's shockwave shakes the building, and you fly into a wall. Your ears ring as you get up from the floor. The lights flicker and switch off. The result of the explosion blocks the passage, so you walk out into the dark lobby with a dizzy head. \n\nA gunshot comes from your right, and a soldier of yours rolls down the stairs. You grip your weapon and slowly make your way up the stairs in the flickering light. You peek over the wall, where two men are reloading their guns. You step out of cover and shoot them. You walk towards the door they were guarding. Memories strike you. You look down for a while, then ready your weapon and slowly open the door.\n*page_break\n\n\"Hello, ${firstname}.\" ${newleader} steps out from the cover of the door. He grabs your hand with the gun and pushes the barrel of his own against your ribs. He smashes the door shut and walks to his desk with you.\n\n\"I'm not surprised to see you here, though I am surprised to see you here the way you are here, ${firstname}. Assaulting my men, following orders blindly. We had such a good talk, and I thought my hints had found their way into your ears. I suppose I was wrong? Or maybe you just simply don't care?\" He smacks the weapon out of your hand. He grips your head with one hand, trapping your arm as well. He gives the pistol a firm push. The barrel sinks slightly between your rib cage, and you hiss in pain.\n\n\"It hurts, I know. Just like life. But come on now, you've endured so much, I don't think this will be the end of you. What comes soon, might be it. It depends on you, my friend. Remember when we spoke like gentlemen about taking sides? Well, as much as I'd love to say this would be the best time for it, it really is the worst. Those Sons. They came to build the passage, like we agreed. But what we didn't agree about was them beginning to demand things. Acting like they own the place. To prove it, they went so far as to humiliate some of my men with their barbaric ways. Well, they didn't think about the consequences. Those you saw outside aren't all of them. The most uncivilized ones did undergo a small torturing session. In the end, they cried for their mothers.\" He sighs and grabs your cheeks. He tilts your head back and looks into your eyes. \n\n\"Every action is followed by a reaction, ${firstname}. Our situation here is a reaction. I knew I shouldn't do that, especially without being prepared to defend ${base}. I knew this would happen. But I didn't care. Life is too short to let unfair behavior go unpunished. And with the world being like this, life is also very pointless. Carpe Diem, ${firstname}. Whatever may come in the next hour, I don't care. I'm just as calm as ever. Your eyes are nice, by the way. I bet your parents looked at you in awe all the time.\" He moves your head back so you can see the door, then he leans back against the desk with you. \n\nHe leans closer and whispers in your ear. \"And now…we wait.\" He releases your head to light a cigarette, then grabs it again.\n*page_break\nIt doesn't take long until movement and gunshots come from the other side of the door. They're followed by silence, but then ${General} and ${assassin} kick the door in. They freeze, then take aim at ${newleader}. He doesn't move, just smokes.\n\n\"Let him go, and no one gets hurt,\" ${General} says.\n\n\"Why would I do that? So you can freely shoot me? Don't take me for a fool, General. I know a losing situation when I see one. And what I'm in right now is exactly that. A losing situation. I didn't prepare any clever tricks or anything. I know that at the end of all this, I'll die. Unless you let me go, of course.\" He takes one last puff from the cigarette, then spits it in front of ${assassin}.\n\n\"You don't have to die. Join us, and pledge your services to the Sons. I can't let you go.\" ${General} takes a steps closer.\n\n\"I can't do that. You are everything that I despise. Your phrasing is wrong, General. You could let me go. You just don't want to. You're afraid of the consequences. You couldn't sleep tight knowing you've let an enemy go. Would you let a teenager with life ahead of him die for your views?\" He runs his hand up your face and grips your hair. You frown and try to reach your ${weapon}.\n\n\"Killing him won't make a difference. It's over. I will not let you go. I will not risk having the same situation again. You knew this would come…yet you quietly led your men, women, and children to their deaths? You are the worst, most cruel and selfish person I've ever met.\" The General aims down the sight.\n*page_break\n\n${newleader} pushes himself off the desk and moves around with you. \"As I said, General, I'm not a stupid person. In fact, I'm smarter than all of you standing here. More tired than smart by now, though. Hence the situation we're in. Selfish…everyone is selfish to some extent. Cruel? I'm not killing them. If anyone is cruel here, it's you. In fact, General…I won't kill the boy. He's just going with the flow. Doing that right, gotta give him that, but I'm not like you. He hasn't harmed me. I won't kill him for being part of your crew, to survive.\" He sighs. \n\n\"But…you know…I'd feel really useless if I didn't look like I made a point here.\" He smirks and places his hand on your back. \"It was nice to meet you, ${firstname}. Do what you do best.\" He gives your back a firm push. As you fall in front of ${General}, he raises his weapon and pulls the trigger a couple of times. The General immediately pulls his own trigger, emptying a magazine into his body. ${assassin} drops the weapon and falls back. ${General} helps you up, then kneels down next to ${assassin}. He's staring at the ceiling as a small pool of blood appears underneath him.\n\nThe General keeps kneeling next to him, without saying a word. He grabs his hand. \"You deserved a better death…old friend.\" The General closes his eyes and tightens his grip on ${assassin}'s hand. You stand there, looking at them. The door opens slowly, and a couple of soldiers walk in. When they see you, they lower their weapons and salute.\n\n\"Sir…with all due respect, we have to move. We found a bomb. A big one. And it's going off soon. Very soon. In…five minutes,\" the soldier says with obvious fear in his voice. The General nods and releases ${assassin}'s hand. \"It looks like he really knew what was coming to him.\" He stands up and leaves. The soldier immediately follows him. You glance back at ${newleader}. He's lying on his side with his back to you. You turn around and leave the room.\n\n\"The chamber in the front is no longer functional. We have to take the back exit.\" General looks at you. You follow him down the stairs, through the lobby. You arrive at the part of the hall where the handmade explosive went off. They've cleared the debris just enough to be able to fit through. You follow them as the last person in line. You walk through the dark hallway, which is filled with grunting and painful moaning.\n*page_break\n*achieve arkadios\n\n*if (deadend) or (ivanend)\n\n You step over the bodies in the darkness. Some of them are still moving their limbs or breathing quietly. You can barely see in the darkness. The only thing you can make out in the distance is a dim light, barely visible.\n *label ivcont\n \n \"$!!{firstname}! WHAT HAVE YOU DONE TO MY BASE?!\" a familiar voice shouts as loud as it can. You turn around and see ${capturer1} climbing through the exploded area. His shirt is unbuttoned, and he walks towards you fast with clenched fists. \"Do you have any idea how much I worked for this? How close I was to getting it all back?\" He punches a wall on the way towards you, and the whole building shakes. He keeps shouting after you as you quicken your pace towards the exit, not looking back. At the end of the hall, the decontamination chamber's doors are destroyed. You're about to reach it when he grips your shoulders firmly and pushes you against the wall.\n\n \"You…you've ruined years of work!\" He grabs your neck. His hands feel very hot. \"You have one chance to make this right. Only one chance. You will make them pay. You will take over ${base2} and kill them all. Do you hear me? All of them! Or you'll suffer for what you and your crew have done. And oh boy, believe me, I'll make you suffer for each and every one of you stepping foot in my base. And I'll enjoy it.\" He lets out an evil laugh, then frowns and looks deep into your eyes. \n \n \"Or maybe I've given you too many chances. Maybe I should just execute you right here.\" He reaches back and grabs his pistol. You try to push him away with one hand and reach your weapon. You manage to take hold of it when someone grabs your hand.\n *page_break\n\n You fall through the destroyed decontamination chamber. \"Get up! What are you waiting for?!\" The General drags you up and runs towards the entrance with you. You barely squeeze through the hole in the fence when ${base} explodes. The wave pushes you to the ground. You get up and dust yourself off, then stare at the burning remains of ${base}. \n *goto v2cont\n\n*if (Lizzieend)\n You step over the bodies in the darkness. Some of them are still moving their limbs or breathing quietly. You can barely see in the darkness. The only thing you can make out in the distance is a dim light, barely visible. You peek into every chamber, where bloody bodies lie on top of each other. The next chamber looks familiar. This is where you were with ${survivor3}. You carefully look inside, your heart beating fast, hoping not to see her in there. Her chamber is destroyed, and Sons of Tomorrow soldiers lie further inside. There's no sight of her inside, but that doesn't calm you down entirely.\n *goto ivcont\n\n\n*else\n *temp FL firstname#1\n \"${FL}…${firstname}…\" A familiar voice catches your ear from one of the chambers. You stop and begin to walk backwards. You peek into every chamber, where bloody bodies lie on top of each other. At the next chamber, your breath stops at the sight of ${Fsurv} lying on the ground in the middle of the room. $!{Fhisher} chamber is destroyed, and Sons of Tomorrow soldiers lie further inside. \n \n You walk closer and kneel down in a small pool of blood next to $!{Fhimher}. $!{Fheshe} looks at you with ${fhisher} left eye. His right eyelid is closed, and blood is dripping from it. $!{Fhisher} body has several bullet holes in it, and ${Fheshe}'s trying to stop the bleeding from all of them with shaking hands.\n \n \"You…you could have warned me.\" $!{Fhisher} voice shakes, and tears roll down ${Fhisher} cheeks. \"I'd like to ask something. For the last time…\" $!{Fheshe} sniffles. $!{Fheshe} grabs your hand gently and looks into your eyes. \"End it. End it…all. End my suffering…please…I'm begging you.\" $!{Fheshe} bursts out crying, and ${Fhisher} lungs rattle.\n \n \"${Firstname}, sir! We have to go! Now!\" a soldier shouts at you from the doorway, then runs off. You stand up and let ${fhisher} hand slide down next to ${fhimher}. Blood is smeared all over your hand. You look from ${Fhimher} to the door. $!{Fheshe} keeps crying quietly.\n *fake_choice\n \n  #Kill ${Fhimher}.\n   *set Evil %-10\n   You slowly raise your weapon and aim down the sight. \"Rest in peace…\" you mumble.\n\n   \"Thank you…\" $!{Fheshe} whispers, closing ${Fhisher} eyes. Your finger trembles on the trigger, but you pull it. The gunshot must have been loud, but you didn't hear it. You holster the weapon and watch ${Fhimher} for a few seconds. $!{Fhisher} lifeless body lying on the ground, with a new bullet hole in ${Fhisher} head. You close your eyes, and a single tear squeezes out. You wipe it away and head towards the exit.\n   *goto v1cont\n  \n  \n  #Leave.\n   *set Evil %+10\n   You look down, then turn around. \"I'm…sorry. I…I can't…\" you mumble. \n   \n   \"No…please…don't let me suffer here!\" $!{Fheshe} begs. You sigh and clench your fists, then leave the chamber without looking back. Quiet, pain-filled sobbing comes from behind you.\n   *goto v1cont\n   \n   \n\n\n\n\n   \n*label v1cont   \nYou walk through the hall filled with corpses. Blood sticks to your feet every now and then. At the end of the hall, the decontamination chamber's doors are destroyed. You walk through them and glance back. The General grabs your arms and drags you towards the entrance. You barely squeeze through the hole in the fence when ${base} explodes. The wave pushes you to the ground. You get up and dust yourself off, then stare at the burning remains of ${base}. \n\n*label v2cont\n\"What the hell were you doing back there? Your body parts would be flying around if I hadn't gone back for you…let's move. We've wasted enough time here.\" The General turns away from you and heads down the road. You watch the flames coming out of ${base} and how it's falling apart. Moments later, you catch up to them. You walk down the road in silence with five soldiers in front of you. One of them is injured. ${General} walks in front, leading you.\n\n\"${Firstname}.\" The General glances back. You quicken your pace, avoiding the remains of the dead soldiers, and walk next to him. You walk side by side in silence for a while, until he breaks it.\n\n\"We're walking back like we're victorious…with a handful of us left from the small army we came with. No, we are not victorious, we are defeated. How are we supposed to continue with our ambitious, huge plans if wiping them out almost resulted in the same thing for us? And on top of that, we've lost an exceptional soldier. I overestimated our capabilities and underestimated theirs. We've lost so many to ambushes and traps. You wouldn't believe how quickly a disorganized squad can fall apart. How quickly they die. One by one by one…and then it hits you, that you're closer to losing the fight than they are. And in the end, what have we gained? We gained nothing. It's not worth trying to rebuild after so much damage has been done. Let's face it, ${firstname}. We've failed,\" he says with anger and bitterness in his voice.\n\nThe rest of the way goes harder than you would like it to. Until you reach the forest, you have to kill rabid, mutated animals and a small pack of wacks. The soldiers drag themselves behind you the whole way, helping the injured soldier. By the time you're walking through the forest, fog has begun to descend. The General quickens his pace, and so do the soldiers. You don't know the cause, but you catch up with them.\n*page_break\n\nShrieking begins to close in on you from all sides. \"Not good…not good!\" ${General} says and begins to run. You run after him as the shrieking sounds come closer. The General reaches the end of the forest and slides down. You do the same, followed by the soldiers. You dust yourself off and look back. The injured soldier is stumbling towards the edge of the forest. When he reaches it, he stops. And the shrieking stops, as well. \n\nThe fog moves left and right, as if someone was running from side to side. Seconds later, he collapses and slides down the hill. His body is covered with long, deep cuts. The fog begins to descend towards you. You turn around and run towards the entrance. The General raises his hand, and the gate opens. You run inside and look back at the gate, barely closing on the fog outside. \n\n\"Squad…dismissed.\" The General barely finishes his sentence, but the soldiers are already walking past the two of you. \"I'll have to make a report about this. I'd like if…you came with me.\" He looks at you, and you head towards the citadel. The guards make way for you, and you walk inside the tall building. You take the metal stairs until you reach the top. The guards clear the way for you, and you walk over the small bridge. It shakes lightly underneath your feet. In front of the ${leader}'s office is another door.\n\nHe takes a deep breath and knocks on it a couple of times. After a couple of seconds, the ${leader} walks out with tired eyes. Without saying a word, he walks back inside, and you follow him. You close the door behind you. He turns the light on, revealing a small room. You find yourself in the living room, which seems to serve as the bedroom as well. The kitchen is just an arm's reach away. The closed door next to it is probably the bathroom. He sits down on the bed and sips something. The General sits down in the only available spot in front of him, the couch. You stand next to him, and silence falls on the room.\n*page_break\n\n\"So…do you want to start talking? I was having the best sleep of my life.\" The ${leader} takes another sip from the cup and looks at the General.\n\n\"Well…we've managed to destroy their base and wipe them out.\" He leans back in the couch.\n\n\"Our plans didn't include destroying their base. What are our casualties?\" The ${leader} raises his eyebrows.\n\n\"They were expecting us…that's how ${base} just…blew up. About our casualties…it's high. Only six of us came back.\"\n\n\"So you managed to get back with three soldiers? Obviously, training isn't paying off. We should change the trainers. Where's ${assassin}? I'll have a word with the rest later.\" He lights up a cigarette. \n\n\"Four…four soldiers.\" The General looks away. The ${leader} looks confused, then disappointment appears on his face.\n\n\"You've lost one of our greatest soldiers? To a mission that was a total failure? If we wanted to destroy them along with their base, we could have most certainly come up with something to blow them up. But our mission was to simply take it over. What's to blame, huh? The training, the weapons? The people who fought, or their leader? Tell me, General. Who should I blame for this total failure?\" The ${leader} stands up and walks around you slowly, smoking the cigarette. \n\n*page_break\n\"Don't forget why I chose you to be my right hand when it comes to order and war. And also don't forget that there are many other people who would kill you for your position. Just for the better food, I might add. And they don't even know about the rest. A dozen successful missions don't make up for one huge failure. How are we going to replace this many people? I can't place ads all around the district. I trusted you with the lives and head count of my men. You failed. How did the boy do?\" He stands behind you and looks at the General.\n\n\"Good.\" The General keeps looking in front of himself.\n\n\"Well, that makes him the only one. You are forbidden to take any men with you on any more missions. In fact, the next mission you'll take part in is when we get to the damned Oracle. At least that's going well. You'll be supervising the lab and holding training sessions. I want to see improvements.\" He sits back down and looks at you. \n\n\"And you, you'll go out alone when needed. After all, our greatest soldier died, but you came back. You must know something. Meanwhile, patrol the streets or whatever, and try to be useful. Now, get out. Both of you. And leave the weapon here. I'll sort it out.\" He shakes his head with a disgusted look on his face. You put the weapon down and leave the room. The guards clear the way in front of you, and you walk down the stairs. The General walks behind you as you exit the Citadel.\n\n\"At first I was like, hey, I'm just a guard, I wanna go on exciting missions. But now, after the birds told me how this huge improvised mission went, I'm like, I'd rather die as a guard than be led by some fool.\" One of the guards points at the General. \"I lost a friend to your failure.\" He spits. The General stops and glances back, but keeps walking. You walk down a street behind the Citadel. This is where you would normally part ways, but he turns to you.\n\n\"Hey…${firstname}…I'm sorry. I was confident this would go well. But it didn't. It really didn't. I failed, I let the whole town down. And for that, apart from the many other lives, I've lost a friend. This is not an example to follow.\" He buries his face in his hands.\n*fake_choice\n\n #Cheer him up.\n  *set Gannon %+10\n  You step closer to him and put your hand on his shoulder. \"Hey…you couldn't have known what would happen. In fact, if someone else had been leading us, maybe we'd all be dead now. The ${leader} is just mad, and you're the closest person to blame. You did well, though. Don't let it get you down. You're fit to be the General.\" He lowers his hands and looks into your eyes. You slide your hand off of his shoulder. \n  \n  \"Well…thank you. Even if they are just lies. But you're right. My weakness is just temporary. Let's sleep. Tomorrow, I'll wake up with a clear head. Good night, ${firstname}.\" He raises his hand slightly, then puts it down and nods at you once. Then he turns around and walks away.\n \n #Despise him.\n  *set Gannon %-10\n  You take a step back and put your hands in your pockets. \"You were always so over your head. Rookie this, rookie that. Like you could change the world with a couple of soldiers at your command. You know, I could have led them like that as well. Maybe they'd still be alive, if I had. You have no right to call yourself a General.\" You shrug slightly.\n  \n  He looks at you and shakes his head. \"You…you're wrong. I know I'm capable of doing better. I know what I can do…you're just angry. Right now, or have always been, I don't know. But I understand your anger now. I hate myself right now…and your kind words didn't help. Good night, rookie.\" He turns around and walks in the opposite direction.\n  \n \n #Go to my chamber.\n  Without saying a word, you put your hands in your pockets and turn around. \"Yeah…good night to you too…\" You hear his distant voice, but you don't care.\n  \n  \nYou keep walking through the cold, empty streets until the chambers finally come into view.\n\n*if (loverstatus)\n As you walk closer, a figure appears. They're sitting in the entrance, with pulled-up knees and head resting against the wall. As you get closer, it becomes clear that it's ${Lover}. You kneel down and gently shake ${himher2} awake. $!{heshe2} opens ${hisher2} eyes and freezes for a second. Then ${heshe2} jumps on you. You fall back on the ground, and ${heshe2} pins your arms down. \n \n \"Don't you ever scare me like that. Never, never, ever again! Do you have any idea how scared I was? I couldn't sleep! I had to come out and wait for you!\" $!{heshe2} frowns behind the mask. After the recent events, you don't know why, but you burst out laughing.\n \n \"You waited with closed eyes!\" You laugh and turn around, pinning ${himher2} down on the cold ground. \"You're sweet.\" You try to kiss ${himher2}, but your gas masks touch. You both let out a laugh, and you get off of ${himher2}. You walk through the decontamination chamber to your room, hand in hand. $!{heshe2} waits until you put your gear down, then pulls you into the bed. $!{heshe2} wraps you in ${hisher2} arms and kisses your cheeks and lips. \n \n You put your arms around ${himher2} and disappear under the covers. After a long, challenging day both mentally and physically, nothing else feels better than to have someone waiting for you with love.\n *finish\n \n*else\n You enter the decontamination chamber and walk through the dark hallway. You enter the chamber. Immediately, you hear whispering. You put your gear down and look at the other bed. They hide under the covers after they make sure it's you, then keep whispering. They probably got up earlier. You collapse in your bed and drag the covers over yourself.\n \n \"I'll be right back, just a second!\" ${newfriend2} leaves the room, closing the door behind ${himher3}. You turn onto your side and curl up.\n \n \"${firstname}…are you asleep?\" ${newfriend} whispers.\n \n \"Not yet…\" you answer, barely able to keep your eyes open.\n \n \"I'm sorry if we're annoying or too loud sometimes…we don't want to annoy you.\" $!{heshe3} sits up, and you turn around.\n \n \"It's cool,\" you say and put your arm under your head. $!{heshe3} remains silent long enough for you to almost fall asleep, but then ${heshe3} breaks the silence. \n \n \"You know…this could have been us. If you hadn't decided what you decided…I'm sorry.\" ${heshe3} whispers.\n \n \"${newfriend}…I had a long, rough day. It's cool. Really…just let me sleep.\" You adjust the pillow and try to fall asleep.\n \n \"Okay…sorry,\" ${newfriend} finishes, and soon after that, ${newfriend2} walks back in. They get under the covers and continue their chat. After a day like today, your last concern is how loudly they're talking as you're trying to fall asleep. You don't have to try too hard for too long, as you fall asleep easily, all things considered.\n *finish\n ", "chapter6": "[b] Chapter 6 - Home Run [/b]\n\n*if (loverstatus)\n You open your eyes and stretch your limbs. ${Lover} is sleeping soundly next to you, curled up. You look at ${hisher2} face for a while, then give ${hisher2} cheek a small kiss. $!{heshe2} opens ${hisher2} eyes, and a wide smile immediately appears on ${hisher2} face. $!{heshe2} leans closer and gently smooches your lips. You sit up in bed and stretch your limbs. $!{heshe2} sits up next to you and rests ${hisher2} head on your shoulder while ${heshe2} rubs your back. You wrap your arms around ${hisher2} waist and pull ${himher2} closer.\n \n Unexpectedly, the door in front of you opens. ${assassin} walks in and stops at the table. You freeze, not believing what you're seeing.\n *if (Lover = Lily)\n  You keep looking at each other for a couple of seconds. When your initial shock is gone, you open your mouth to speak, but he frowns. \"What are you doing with my daughter?\" He pushes the table between you away and steps in front of you. You look from him to ${lover}. $!{heshe2} pulls away and slides further back in the bed. ${assassin} clenches his fists.\n  \n  \"You never cared about me…don't act like you suddenly do now!\" $!{heshe2} crosses ${hisher2} arms.\n  \n  \"You're right. I don't,\" ${Assassin} replies with anger in his voice.\n  \n  \"I know…weeks pass without even seeing you! You dumped me here…to do safe, daily work while you're out there, murdering everything. Well, it's what you're good at…have you told anyone what you were before this all started?!\" $!{heshe2} raises ${hisher2} voice and leans closer.\n\n  \"It doesn't matter what you were before the war.\" ${Assassin} leans closer to ${lover}. You sit further away from them.\n\n  \"It does…and sure, I'm safe here…but happy? Not really. I didn't think I'd ever be happy again…\" $!{heshe2} glances over to you. A sorrowful smile appears on ${hisher2} face for a brief moment. \"Ever since Mom died, you've been extremely weird. I haven't even seen your face since then. Nor do I know the full story. I'm starting to forget what my father was like. And what he looks like.\" A single tear rolls down ${hisher2} cheek. $!{hisher2} eyes are filled with anger and sadness. \n  \n  \"I don't care. I never did.\" ${Assassin} adjusts the scarf covering his face, then looks at you. \"Come.\" He turns around and leaves the room. You get out of bed and look back at ${lover}. $!{heshe2}'s sitting on the bed, ${hisher2} head turned away from you. You put your gear on and tuck the weapon from yesterday into the back of your trousers as you leave the room. Outside, ${assassin} waits for you with arms crossed. You head towards the city center. \"I'm not mad at you, and I won't bring this up ever again. But I will be extremely angry if you disappoint ${himher}.\" He looks into your eyes, and you nod once.\n  *goto morningcont\n  \n  \n *else\n  You keep looking at each other for a couple of seconds. When your initial shock is gone, you open your mouth to say something, but he speaks up before you have the chance. \"I didn't want to bother. ${firstname}, we have things to do. Say goodbye and come.\" He steps outside and closes the door. You kiss ${himher2}, and ${heshe2} squeezes you close.\n   \n  \"Come back alive, or I'll kill you.\" $!{heshe2} bites your ear, and you both laugh. $!{heshe2} leans back in the bed and watches you as you put your gear on. $!{heshe2} stretches and smiles as you tuck the weapon from yesterday into the back of your trousers and exit the room. In the hallway, ${assassin} awaits you, and you head for the decontamination chamber.\n   \n  \"It's not a good idea to get yourself loved by someone. That someone will await your return every day. In this world, and especially in our line of work, we might never return. You should know that, more than anyone else here. ${lover} has been through a lot, ${firstname}. But ${heshe2}'s not as strong as you.\" He shakes his head as you leave the decontamination chamber and head towards the city center.\n   \n  \"I won't bring this up anymore, though. Do what you feel like. Just know what kind of extra responsibility lies in your hands now.\" He looks into your eyes, and you nod once.\n  *goto morningcont\n   \n   \n*label morningcont\n*page_break\n\nYou take a few steps away from the chambers, and a man with blood on his gloves walks in front of you through the crowd. He stops in surprise when you come into view. [i]\"Ah, ${assassin}. Just the man I was looking for.\"[/i] He chuckles and wipes some of the blood on his laboratory coat. [i]\"I'm deeply sorry to inform you, but the kid, Arnold is dead.\"[/i] He shrugs slightly as he puts his arms behind his back.\n\n\"Alan…\" ${assassin} looks down and tries to walk past him.\n\n[i]\"My bad, Arnold, Alan, same thing.\"[/i] The doctor lifts his hand up and stops ${assassin}. [i]\"It's very interesting, though. His insides just exploded. There's a clean hole on his chest, a clean hole in his lungs from the front. But the back, it exploded. Do you know what causes a wound like that?\"[/i] He looks at him as ${assassin} slowly raises his head. \n\n[i]\"I do know. Bullet wound. That's a pretty uncommon cause of death for someone who just collapsed during his training time, don't you think?\"[/i] he finishes, putting his arms back behind himself. They keep looking at each other for a brief moment.\n\n\"Yes…indeed it is,\" ${assassin} says, then just walks forward. You follow him, leaving the chuckling man behind.\n*page_break\n\nYou walk through the city center, where a fair-sized crowd has gathered around the preaching priest. He's wearing a ragged layer of dirty sheet on his trembling, thin body. [i]\"…and thus, our sacrifices are not in vain! The enemy is destroyed, and we have emerged victorious! From ashes…we always rise! Every time, more powerful! If that doesn't show that we are the chosen, the Sons, of God himself, then what does?!\"[/i] He stops and looks from the crowd to the two of you. \n\n[i]\"But…enemies in disguise always lurk around us. Wolves in sheep's clothing. Spreading like a disease. And when we fall, they'll still be here. Feasting on your rotten remains.\"[/i] He stutters and begins to sweat. He keeps looking at you. Members of the crowd begin to turn their heads toward you. You begin to feel uncomfortable, as the priest and more of the crowd begin to stare at you. ${assassin} grunts and walks further down the street, towards the gates. You follow him quickly. The guards let you through the gate. ${assassin} turns left, and you keep walking towards the muddy area.\n\n\"We'll clear a nest today. They're too close. It has grown an extreme amount. We were lucky to see that when we were waiting for the Oracle. At least that's what General ${General} said,\" ${assassin} says in his deep, scratchy voice. Walking through the mud is just as challenging as it was before. Some fresh remains have already soaked halfway or fully into the mud. Their bones crackle and pop under your feet. \n*page_break\n\nAs you get closer to the small hut by the cliff, the sky gets darker. You breathe heavily as you walk next to ${assassin} at the edge of the cliff. Deep in the crater, in the middle stands a hole leading underground. Wacks and mutated animals chase each other, while some feast upon the remains of humans and mutants alike. Aviatrixes circle near them, and the black sky swirls above. A storm seems to be gathering. ${assassin} looks at you, then sits down. His legs dangle off the edge. You sit down next to him and pull your knees up.\n\n\"In case it wasn't clear, this is our punishment. They could've found an easier way to destroy this, or avoid them eventually arriving at our gates. But we failed yesterday. And we're getting punished. They pretend to care about us, but now we're here. They only care about keeping their power. And we have to obey, or we die. And everyone we ever cared for back there dies.\" ${assassin} leans forward and looks at you from the corner of his eye. His red eyes fixate upon yours. \n\n\"I know you have questions. Especially one. How am I here? Your questions will get answered in time. Don't worry about that.\" He pats your thigh, then slams his knife into the ground. He takes a rope out and ties it around it the knife. He takes the other side of the rope and pushes himself off. You look at him as he slides down the hill, stirring up dust as he does so. You lower yourself from the edge of the hill, gripping the rope. You slide after ${assassin}. It burns your feet and arms, but you keep sliding through the dry desert filled with tiny rocks.\n*page_break\n*set knife true\n*set pistol true\n*set bullet true\nYou kneel at the edge of the crater. You dust yourself off, and ${Assassin} helps you up. He takes two homemade bombs out of his backpack and hands you one of them. The small bomb is wrapped in paper, with wires surrounding it. He pulls out a pistol with his other hand, and you do the same.\n\nThe swirling cloud cloaks the area in darkness more and more with every step you take. The wind intensifies, and the running mutants around the nest stir up sand. Some of them notice you, and they stop. They back up towards the huge hole leading underground and keep staring at you. As you walk closer, ${assassin} begins to breathe heavier. \n\nYou're halfway through the darkness and sand-filled crater, with more and more of the mutants surrounding the entrance. ${assassin} stumbles and falls on his knees. His arms shake and his legs tremble as he tries to get up.\n\n\"No…how…I…\" He keeps muttering on his knees, then looks at you. \"Do you feel…okay?\" He breathes faster, and something in his pocket beeps furiously.\n\n\"Yeah, are you all right?\" You crouch down next to him, but he gently pushes you away.\n\n\"Yeah…I'll…I'll tell you what's going to happen. You'll continue alone. I'll climb back up as much as I can and provide support from there. You have to place both in the core.\" He hands the other grenade to you and grips your arm weakly. \"Don't risk your life, though. Abandon at your own will…\" he mumbles, then hands you one of the long, silver knives from his belt. He coughs and drags himself back towards the edge. You stuff the grenade into your pocket and cock your pistol.\n*page_break\n\nYou take a few steps forward in the crater, with sand stirring around you. As you get closer, an Aviatrix takes a dive at you. When the ray-like creature is close enough, you hear a gunshot, and it falls in front of you. You glance back to see ${assassin} leaning against the wall of the crater, his sniper rifle in his hands. A tall, skinless creature jumps in front of you while he's reloading. It grabs the dead body, screams at you, and rushes into the hole. As you walk closer, the tall, skinless creatures take a few steps back. \n\nThe meat on their bones looks gooey. At some parts of their bodies, their bones are showing. Their fangs show as they growl, and most of them hold a sharp piece of metal or wood in their hands. You slowly walk towards the hole, keeping an eye out for them with slightly shaking hands. You peek over your shoulder at ${assassin} before you begin to walk down into the hole.\n\nYou walk down stairs which are roughly carved into the ground. They lead deep underground, with hallways opening in every direction, giving the impression of a labyrinth. Torches made out of wood and clothing are pushed into the wall every now and then. Growling and grunting echoes from all around you. Shadows flicker in front of you. Your heart is beating in your throat. Thoughts of dying cross your mind as you begin to walk down the hallway in front of you. \n\nThe walls are narrow at some points, then widen at others. Blood is smeared all over the walls. Something squishes under your feet. You look down for a brief moment to see a chunk of flesh you've stepped on. Ahead of you, more decomposed remains await. When you reach the end, you have to push through a narrow part. When you manage to squeeze through, you almost fall, as the ground level is lower. Inside the large cave, the walls are covered with torches and holes. You can make more out as you walk further inside and your eyes get used to the darkness. Beds made out of branches, leaves, and plants are on the left side, while on the right side, bodies of humans and mutants alike lie on top of heaps of bones. You turn your head towards the middle and freeze when you see dozens of red eyes staring at you.\n\nYou take a step forward. The skinless, deformed creatures have gathered at the other end of the cave, and they stare at you. Blood drips from their gooey bodies. They walk around and smack their sharp sticks and pieces of metal pieces against the ground. They growl and grunt. On the right, a couple of them are ripping apart a fresh human body. The blood freezes in your veins. They jump in and out of the holes in the walls. You peek past them and notice smaller creatures laying and sitting on piles of leaves.\n*page_break\n*if (wackwound)\n\n You take a step closer, and they do as well. The weapon shakes in your hand. They walk around you eagerly, granting you glimpses of the smaller creatures behind them, sitting on piles of leaves. They look like children, but their eyes are blank, and they don't have any skin on them either. They stare into the distance as they keep walking around you. A taller creature with chunks of skin dangling off its arms and back jumps in front of you. The others scatter back. The creature in front of you grunts. You stare into its red eyes, and it stares into yours. It puts its metal rod on the ground and looks at your weapon. \n \n It growls and steps closer, so you holster your pistol as well. It puts its hand on your stomach, leaving an oversized bloody palm mark on your shirt. You breathe heavily, and your scar twists upon your stomach. The creature grunts and wraps you in its arms, then lifts you up. The more you try to break free, the more you feel its arms tightening around you. It drops you on the leaves next to the children. With big steps, it walks over to the remains of the human body. It twists, then rips the corpse's arm off and drops it between you and the children. They slowly take it in front of them and start munching on it. \n \n The creatures scatter, and some of them seem to just be guarding the area. They glance at you sometimes. You begin to feel uncomfortable, so you stand up and sink your hands into your pockets. Your hands reach the bombs, and you grip them. You look around and make your decision.\n *choice\n \n  #Blow it up.\n   *set Nestexplode true\n   *set Evil %+10\n   You place an explosive on the pile of leaves, by the children next to you. You stand up and walk through the cave. At the middle, you drop the second one as well.\n   *label nestin  \n\n   \n   They don't mind you, so you climb into the hole where you came from. You walk through the hallway and up the stairs. The wind is still stirring up the sand. You can barely see ${assassin} at the edge, and making your way towards him is difficult in the heavy wind.\n   *label nestin2  \n\n   \n   When you reach him, he holsters his sniper rifle. The beeping sound is still coming from his pocket. He stands up and begins to climb the rope. You do the same once he's up, but look back every now and then.\n   *goto nestcont\n  \n  #Jut leave.\n   *set Evil %-10\n   You release the explosives in your pocket and look at the children. They keep eating the corpse's hand, as if nothing had happened. You stand up and walk through the cave.\n   *goto nestin\n \n\n\n*if (slimerwound)\n\n You take a step closer, and they ready their weapons. You aim with your own weapon, but you know you don't have enough ammunition, and you're also outnumbered. You take a few steps backwards. They keep growling and smacking their weapons on the ground like they're afraid of you. You frown and take a step closer, and they jump back. One of them keeps getting closer. You walk backwards until you reach the hole you came from, then you aim at it. It screams and raises its piece of metal. You pull the trigger, and its skinless, lifeless body falls to the ground. \n \n The others scream and take a few steps towards you, then step back. You sink your other hand into your pocket and take a few deep breaths. You realize you have the bomb in your pocket, and you grip it tight. One of them lunges at you and smacks the pistol out of your hand. You take a look at the scared creatures and make your decision.\n *choice\n \n  #Blow them up.\n   You grip both of the bombs and throw them as hard as you can. One flies over them, and one hits one of them and lands on the ground. After that, you dive into the hole where you came from and start running upstairs. They growl and scream. The cave shakes as they run after you. You step out of the cave and into the crater, where the wind is still stirring up the sand. You run towards ${assassin} as fast as you can with the wind working against you. \n   \n   A few of the creatures run after you, and ${assassin} takes them out one by one.\n   *goto nestin2\n  \n  #Leave them.\n   You release both of the bombs and keep watching them. They look scared for their lives. You take a few steps back and slowly climb into the hole where you came from. You turn around and make your way upstairs. As you set foot outside, you begin to make your way towards ${assassin} at the edge of the crater. \n   \n   The wind is still stirring up the sand, so making your way towards him is difficult.\n   *goto nestin2\n\n\n \n \n*label nestcont\n*page_break\n*set Radiation 95\nYou sit down on the edge and pant. ${assassin} does the same, then begins to untie the rope. \n\n\"Do you really feel okay? Apart from the adrenaline rush, you're okay? No nausea or anything?\" he says as he folds the rope and sheathes the knife.\n\n\"Yeah, I'm okay…\" You stand up and raise your eyebrows under the gas mask. ${assassin} stands up too and puts his hands in his pockets. He takes a Geiger counter out of his pocket, which is still beeping.\n\n\"The radiation down there was so high, it killed the Geiger counter. I couldn't continue, and I still feel funny from the radiation. But you're okay…\" He throws the Heiger counter back into the pit and rubs your shoulder. \"Let's go back and get treated.\" He takes his hand off, and you walk through the muddy area you came from.\n\nRipping your leg out of the grasp of the mud is exhausting. By the time you reach the hill leading up
