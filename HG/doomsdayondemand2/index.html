a smile and turns back to the window.\n\n*page_break\n\"You can go now. And do see if he's worthy. There's no need for useless people in the new world. Take him to your operation with ${Assassin}. And I want detailed reports no later than two days after the operation.\" The ${Leader} gives the General a firm look, and he nods once. \"Oh! And one more thing, General. Tell the guards to see to the…well-being of the Lieutenant and his family. We wouldn't want that to be the reason behind his resignation.\" He frowns. The General nods, then grips your arm firmly, and you leave the office by his side. You take the absurdly long stairs down the citadel and walk through the same dirty streets, into the headquarters. You walk through it to the back, where only one door stands with a dim light and moldy, dirty walls. He knocks once, and you step through the door into ${Assassin}'s room.\n\nHis room is dark and dusty. Weapons hang on the wall, and knives lay on the table. He rests in his long, dark bed, throwing small knives into the ceiling. He flips another knife out as he notices the two of you, then freezes. He glances from the General to you, then back at him. \"No.\" He shakes his head and stares at him.\n\n\"Specific orders, ${Assassin}. From the ${Leader} himself. He has to tag along. If he dies, he dies. Less work for us.\" The General shrugs as ${Assassin} rubs his eyebrows and gets up from his bed. He attaches knives and his two silenced pistols onto his belt, then puts his sniper rifle on his back.\n\n\"Are you sure that armory attached to you is going to be enough for this single mission?\" ${General} chuckles. ${Assassin} stands motionless, then puts his hands on his hips.\n\n\"Why am I not surprised…anyway, let's go. There's no time to waste. I'll give you the brief details on the way.\" The General leaves the room along with you, and ${Assassin} walks behind you. As you arrive at the gate, the guard chuckles at the sight of you. They open the gate and let it slam down behind you as you walk out to the foggy, destroyed world.\n*page_break\n\n\"So…our mission today. As you know, as a developing town we need resources, manpower, and territory. What we don't need are foes. Especially powerful ones. And uniting everything that's left under one command is a good idea. Even if we have to do it by force,\" the General says as you walk through the same forest. He hands you a filter, and you quickly change it.\n\n\"That's why we'll find this merchant and his little gang. He's been supplying our foes with equipment for a while now. They call themselves…Mafias. Despite their poor choice to call themselves something like that, they've taken over a military outpost, and they're holed up in there. So, that's why we'll kill him and his little merchant gang. These so-called merchants can't be trusted. Simple as that. I do believe you still have the weapon of your choice? I hope to see you put it to good use,\" the General says as you come out of the forest.\n\nYou slide down the hill to a huge, empty field. Your stomach shivers as you spot the district with ${base} standing in the distance. The broken but more or less still intact huge wall surrounding the district fills you with emotion. They begin walking left, avoiding getting closer to the wall. The empty field seems to be filled with dangerous creatures along the way, but as of yet, there's none close enough. Dry bones and scraps crackle under your feet.\n\n\"So…what about your family? Parents, siblings, anyone? Where are they now?\" the General asks, glancing over at ${Assassin}.\n*fake_choice\n\n #\"They're dead.\"\n  *set Gannon %+3\n  \"Well, that's sad. But inevitable. You should stop mourning over them and consider yourself lucky to be alive. I mean, if my parents had the chance to choose, they'd have chosen to die for me. It wasn't a matter of choice, though.\" ${General} shrugs and rolls his rifle into his hands from his back.\n  \n\n #\"They're fine.\"\n  \"Mhhm. Are they? 'Cause I'm pretty sure I caught you all alone. You weirdly avoided talking about your family when I questioned you, as well. Yeah, I think I touched upon a sensitive topic there. Well, man up and get over it. People die left and right. We kill people, they try to kill us. That's how the world is now. That is, until we unite the districts. Then, only mutants will remain to be hunted down. But that's the fun part.\" He rolls his rifle from his back into his hands.\n  \n \n \n #Remain silent.\n  *set Gannon %-3\n  \"I see. You can stop being hostile now, it won't help you. If you die by your own fault, that's tough luck. If you do something really bad, we'll kill you. Those are the rules, and you know them. But if you play along nicely and prove to be useful…big things could await you.\" He shrugs and rolls his rifle from his back into his hands.\n  \n  \n  \n\"You know, if things do work out well for you, we'll probably work together in the future. And I don't fancy working with someone I don't like, or don't know anything about. I make an exception for ${Assassin}, though. Right?\" He glances over at him. ${Assassin} grunts and fixes the sniper rifle on his back. \"So my point is…be prepared for a couple more questions like this. Unless you plan on dying. In that case, don't. It's your choice,\" he says as you get closer to a pack of dog-like creatures. The meat is hanging from their bones, and blood drips from their mouths.\n\n${Assassin} hurls his sniper rifle into his arms and takes them out in a second. \"You have a long way to go.\" The General glances at you, and you keep walking through the empty field for a good while. As the empty field begins to turn into a swamp, a huge farmhouse can be seen in the distance. ${General} stops you and points at the farmhouse. \"That's where he's supposed to be.\"\n\n*page_break\nA huge red house stands in the middle, surrounded by a tall barbed-wire fence and what seems to be a small plot with several vegetables growing under a half-open foil tent. He leads you to the fence and kneels down. \"All right. The merchant is supposedly inside. Along with his two buddies who helped him steal his way to the top. Give or take a few others guarding him, and there's the mission. The main objective is to take all three of them out. They like to dress in fancy white suits, so it shouldn't be hard to find them. But if we need to kill everything that moves inside, so be it.\" The General turns to you and stares at you for a second.\n\n*if (pistol)\n\n\n \"Maybe you'll smack them to death or something?\" He points to your gun. ${Assassin} nods a couple of times, then unscrews the silencer. He hands it to you, and you screw it on. The General flips a short dagger out. ${Assassin} pulls his other silenced pistol into one hand and one of his knives into the other. \n *goto stealth\n \n*else\n\n\n \"Put that knife to good use.\" He flips his short dagger out and spins it in his hand. ${Assassin} might have chuckled a little, but it's hard to tell if you heard it right. He pulls his silenced pistol into one hand and one of his knives into the other.\n *goto stealth\n \n*label stealth\n\n\n\"We'll have to move up and get a closer look at the situation.\" He looks at ${Assassin}.\n*page_break\n\n${Assassin} stands up and pulls his knife out. With a swift move, he cuts a small hole into the fence. He lets the General go first, then follows him, along with you. As you get closer, a couple of figures can be seen moving through the window on the second floor of the building, and some others right in front of the house. Staying strictly behind the General, you arrive at the side of the wooden house and push yourself against its wall. The brown paint seems to be in surprisingly good condition. The ${General} peeks over the edge of the wall, then turns towards you and peeks over your shoulder. You turn around, only noticing now that ${Assassin} was checking the back of the house. He comes back and kneels down.\n\n\"So?\" The General shrugs.\n\n\"Two,\" ${Assassin} mumbles in his quiet, scratchy voice.\n\n\"Okay. So we got three in front, two at the back. I've also seen a couple of them inside above through this window, so I guess there's at least three of them on that floor of the house. All right, rookie, which way would you like to flank the building? I call dibs on the back.\" The General leans against the wall and scratches his forehead with the end of his gun. You take a look down the side of the house, then up to the window. A thin, hand-crafted drain pipe leads up to the roof, which goes past the window.\n*choice\n\n #\"I'll take the front.\"\n  \"Sure you can handle it?\" the General asks. You reply confidently with a nod. \"Okay. ${Assassin}?\"\n  \n  \"Top,\" he mumbles, spinning his silenced gun around.\n  \n  \"What a surprise. Always up for a challenge, huh?\" The General chuckles quietly, then sneaks past you. He puts his hand on your shoulder as he does so, giving both himself and you a slight push. You walk to the edge of the house and peek over. Three people with black suits and black top hats sit on the porch, around a small table with bottles and cards on it. The porch is surrounded by a small white fence. They laugh and chat loudly. You flip your ${weapon} into your hand and quietly slide to the other side of the wall.\n  *if (Stealth)\n   *set Firstmission true\n   \n   \n   You make your way to the small, white, wooden fence around the porch. An involuntary smile appears on your face as you step over the broken shards of glass randomly scattered around, probably to serve as a cheap home-made alarm system. You push yourself down as low as you can by the fence, then peek out at them. Two of them are sitting with their backs towards you, seemingly blocking the view of the third person sitting across from them.\n   *goto weaponofchoice\n   \n   *label weaponofchoice\n   *if (pistol)\n    *set bullets -2\n\t\n\t\n    You slide between the wooden pillars holding up the porch, climbing underneath it. The ground under you is uncomfortably sticky. You take a position directly under them and cock your pistol. You aim down the sight, with the two males' heads lining up. A couple of seconds pass, then you pull the trigger. The bullet penetrates the dry wooden floor and flies through their heads. Blood splatters on the table as one of them falls head first onto it. The other one falls off the chair, loudly crashing to the floor. \n\t\n    The third guy freezes for a second, then jumps up so fast his hat falls off and rolls away. He pulls his pistol out, but you send a bullet into his head before he has time to cock it. He freezes when the bullet penetrates his head, then falls on the floor with a loud thud. His gas mask flies off and rolls down the porch. A large puddle of blood appears on the porch. It flows down the stairs and drips down between the wooden planks around you, onto the sticky mud.\n    \n    You climb out and jump onto the porch. You kneel down and sneak under the window. After checking what's left in your magazine, you slide up next to the set of pale wooden doors.\n    *goto stealthcont\n    \n   *else\n    You realize it'd be much louder and riskier if you climbed the porch, as the wood is probably so old that its creaking would alarm everyone in the house. You sit on the edge of the porch and align yourself between two wooden fence pieces. The wind blows heavily in waves. When the next heavy gust of wind blows, you push yourself through the fence, then kneel between them as they drink and laugh loudly. You flip your ${weapon} into your hand. As slow as possible, you sneak up on them. When you're close enough, you raise your knife. After allowing a moment to pass, you stand up and cut the throat of the person sitting on the right. He begins to choke and falls off the chair with a loud thud. \n\t\n    While your hand is still in motion, you flip the knife around and jab it into the guy on the left. The glass of his gas mask explodes, and he falls on the table. The person sitting in front of you freezes, then jumps up and pulls his pistol out. Before he has time to cock it, you grab the knife by its tip and send it flying right between his eyes. He freezes for a second, then falls back on the porch. Puddles of blood appear underneath them. You rip the knife out of his head as blood slowly flows down the porch.\n    \n    You wipe the knife on his suit, then slide up next to the set of pale wooden doors, avoiding the front window.\n    *goto stealthcont\n  \n  *else\n   *set Firstmission false\n   \n   \n   As quietly as you can, you make your way towards the porch. You're almost there when a loud cracking noise comes from under your feet. You freeze and look down at the broken glass shards underneath you, serving as a home-made cheap version of an alarm. A cold chill goes up your spine when they turn around and look at you. Everyone stands motionless for a moment, then they pull their pistols out swiftly. You turn on your heels and run towards the other side of the wall. You barely make the turn as bullets fly past you and into the wall of the house.\n   *if (pistol)\n    *set Bullets -3\n\t\n\t\n    You push your back hard against the wall. When they stop firing to reload, you turn and fire a couple rounds at them. One of the bullets hits the guy standing closest to you in the chest, and he falls back on the table, smashing it to pieces.\n    *goto failed\n    \n   *else\n    *set Firstmission false\n\t\n\t\n    You push your back hard against the wall. When they stop firing, you glance towards them from the corner. One of them is standing right there, already aiming his pistol. You push his hand away, making him fire into the air. You swiftly jab your knife into his throat. When you pull it out, he falls to the ground, choking. You get back into cover, and he falls to the ground with a puddle of blood growing underneath him.\n    *goto failed\n   \n  \n  \n  \n \n \n \n #\"I'll take the top floor.\"\n  \"Now that's a surprise. Don't bite off more than you can chew though, rookie,\" the General says as he sneaks past you, towards the back. ${Assassin} looks at you, motionless to the point where it feels uncomfortable. Without a word, he walks past you and puts his hand on your shoulder as he does so, giving both himself and you a slight push. He swings his long, sharp knife a couple of times in the air, then takes a right turn, disappearing behind the wall. You glance up at the window and grip the drain pipe firmly.\n  \n  *if (agility)\n   *set Firstmission true\n   As confident as ever, you climb up the drain pipe. It creaks a couple of times, but you manage to get up to the window in no time. You wrap your left arm around the drain pipe and try to open the window with the other. It doesn't budge. You keep trying for a while, until you notice a man's head moving slightly on the other side of the window as he sits with his back to it.\n   *label topcont\n   *if (pistol)\n    *set Bullets -1\n   \n    You quietly pull your pistol out and push the barrel to the window. He slowly turns his head to the right, then frowns. You turn your head too and look where he does. A small, heavily cracked mirror is hanging from the wall. Your eyes meets his through the mirror. He quickly turns around, his pistol already in hand, but you pull the trigger first. The window breaks around the bullet hole, and he falls head first onto the ground. You slowly holster your ${weapon} and stick your hand through the hole to open the window.\n\n    After you climb in, you realize where you caught him. Blood drips from a toilet, and the man in the black suit lies on the ground with his trousers pulled down. A dark-red puddle of blood is slowly growing underneath him.\n    *goto topcont2\n   \n   *else\n   \n   You quietly pull your knife out and jab it between the window frame and the pale wooden windowsill. It cracks loudly, and the man on the other side of the window slowly begins to turn around. You pry it open as fast as you can. The man turns around and pulls a small handgun out from the pocket of his black suit, just as the window pops open. You flip the knife around and slam it deep into his neck. His weapon falls into the toilet, where he was sitting.\n   \n   He chokes and tries to get hold of you. He grips your hand as dark-red blood splatters around the room. You swing back to the drain pipe. It creaks and bends slightly. With the weight of the man pulling you down, it takes all of your strength not to fall, but eventually he lets go of you and slams to the ground below with a loud thud.\n   \n   You take a couple of seconds to catch your breath, then climb into the small room, which seems to be the toilet.\n   *goto topcont2\n  \n \n  *else\n   *set Firstmission false\n  \n   You grip the pipe with both hands and begin to climb your way up. Your arms shake at times, making it harder and harder to climb. You get up to the window, then rest with one hand on the windowsill. You push yourself up just to be able to peek inside. Your arm trembles before it finally gives in. Your hand slips, and you lose your balance. As you begin to fall down, you try to get hold of the windowsill and the drain pipe. It creaks and bends even more as you grab it, but your hand slips off again, and you find yourself falling. The window gets farther and farther away, until your back hits the ground.\n   \n   It takes a couple of seconds to breathe through the pain and get your vision back. A man in a black suit leans out of the window, then sinks his hand into the back of his waistband and pulls out a small pistol. Your eyes widen, and you roll to your left, barely avoiding a bullet. You slide up against the wall, just below the windowsill. The man above you shouts for backup. Screaming and shouting can be heard from inside the house, along with footsteps from every direction. You pull your ${weapon} out, just as ${Assassin} slides next to you and reloads his silenced pistols. \n   \n   He frowns at you as ${General} appears from the back. He waves at you and reloads his rifle, jogging backwards as he does so. You and ${Assassin} run towards him, and keep running towards the foil tent in the distance. He slices it open with his long, sharp knife, and you run inside. The heat inside is almost unbearable. You run through the weird-looking green-and-yellow plants. He slices the other side open too, and you don't stop until you reach the top of the hill in the dusty distance. The wind intensifies as you glance back and notice some of them running after you, and others walking and firing at you.\n   *goto failed2\n \n\n\n \n*label stealthcont\n*page_break\nYou peek through the keyhole and see a man in a white suit sitting in a leather chair on the left side of the room, in front of a poorly lit fireplace. On the right side, behind the bar, stands a bartender in a black suit, currently cleaning the glass of the gas mask on his head.\n\n*if (pistol)\n *set Bullets +1\n \n \n Before you decide to burst in, you check the corpses behind you for ammo. To your disappointment, only one of them has matching ammo, and only two rounds were left in his gun. They must not have been expecting company. You peek one more time through the keyhole, then check if the door is unlocked. As you push the handle down and open the door slightly, the dusty wind slams the other door open.\n \n \"How many goddamn times do I have to tell you not to let the door slam open?\" The man in the white suit turns around, and the bartender looks at you. He reaches under the counter. The dark wooden end of a small shotgun appears in his hands, and you swiftly fire a bullet at him. He drops the shotgun and falls behind the counter, pulling his wooden chair with him. \n \n You peek over the counter and see him barely moving and moaning, with blood soaking through his black suit. Deciding not to waste more bullets than you have to, you swiftly aim at the man in the white suit. He puts his arms in the air and stands up. You grip the handle firmly, getting ready to shoot him.\n *label stealthmerchant\n \n \n \"Wait, wait! Hold on for a moment! You—you seem like a reasonable guy. I'm just an assistant, I don't know anything! I didn't hurt anyone!\" he stutters. You frown at his statement, then put your finger on the trigger.\n \n \"Okay, okay! I'm a merchant. I should have known that's why you're here. You know everything, huh? But you're not the only one…fresh Son of Tomorrow. Let's make a deal. You let me live and I…I'll give you anything. Information, even. I cross a lot of powerful people, I hear this and that. I'll change suits with one of my dead guards. Nobody knows what I look like! Come on! What do you want?! I know a lot about the Oracle! I'll gladly share that information with you. You'll just have to let me go in return!\"\n *choice\n \n  #Hear him out and let him live.\n   *set Merchant \"Alive\"\n   *set Evil %-5\n   \"Tell me about the Oracle,\" you say, keeping your aim on him.\n   \n   \"That's what I'm talking about! Have you heard anything about the Oracle?\" he says, glancing over at the still-struggling guard. You shake your head, and he freezes for a second. \"You haven't heard of the legend? The living legend, I mean? The Oracle exists! Some say he's the creator of our very world. Some say he's evil itself and controls the beasts. What I know for sure is that whoever meets the Oracle can make a wish! You just have to be smarter than the Oracle, that's the only thing you have to pay attention to! There's just one other small obstacle. Some people even say the Oracle whispers to them! There's just one tiny bit of a problem. No one knows where the Oracle is currently. I've even heard he switches locations every so often. Recent news has it that he's switching between the impact zones. And there's the problem, if you've ever gotten close to an impact zone, which I believe you have, judging by the strong look of you.\" He fakes a smile and lowers his hands a little. \n   \n   \"Unbelievable amount of beasts lurk around there. Not to mention the level of radiation. And the heat! B—but it's not impossible! I've heard tales of human beings meeting the Oracle. Why else would the beasts change and become stronger day by day? Rumors are usually backed by some amount of valid truth!\" He taps his fingers a couple of times. There's a moment of silence before he takes some steps towards the bar. \n   \n   \"So…I'll just change. Real quick, a—and take my leave,\" he says, already taking the clothes off of the bartender. As fast as he can, he changes clothes and dresses the dead body up in his own. \"It's been a pleasure. It was a pleasure doing business with you. Farewell!\" he says as he pulls the door open. The wind blows heavily. He turns on his heels and begins to run off into the distance, which is filled with sand.\n   *goto stealthcont2\n   \n  \n  #Kill him.\n   *set Evil %+5\n   *if (weapon = \"pistol\")\n    *set Bullets -1\n    *goto stealthcont3\n   *else \n    *goto stealthcont3\n    \n    *label stealthcont3\n    \"I want to see you dead.\" You grin. \n   \n    \"N—No, wai—\" he screams as you pull the trigger. He slams back against the fireplace and falls right into it. Black smoke emerges from the fireplace and into the chimney in no time. You walk over to the bartender and holster your ${weapon} when you see his dead eyes staring at the wall.\n \n    *label stealthcont2\n    *page_break\n    You take a seat on the moldy barstool. After silence falls in the living room, you hear people talking and some other noises coming from above. The talking intensifies until a body with a white suit rolls down the stairs in front of you. ${Assassin} walks down the stairs and sheathes his knife. He steps over the dead body and sits down on it, then looks at the other body in the white suit. The door behind the stairs creaks open, and ${General} walks in. He's dragging a body behind him, and he drops it next to ${Assassin}'s. He looks at all three dead bodies, then at you.\n   \n    \"Good job. To be honest, I didn't really think you could do it.\" The General crosses his arms.\n\n    \"Sneaky,\" ${Assassin} mumbles and gets up from the body. He pulls a small round device out and presses the button on its side as he points it at all three dead bodies. It emits a small snapping sound each time. \"Evidence.\" He looks at you and walks towards the door.\n    *goto succeeded\n \n \n*else\n\n\n You peek one more time through the keyhole, then check if the door is unlocked. As you push the handle down and open the door slightly, the dusty wind slams the other door open.\n \n \"How many goddamn times do I have to tell you not to let the door slam open?\" The man in the white suit turns around, and the bartender looks at you. He reaches under the counter. The dark wooden end of a small shotgun appears in his hands. Deciding in a split second, you throw your knife at him. He drops the shotgun and falls behind the counter, pulling his wooden chair with him. \n \n You peek over the counter and see him barely moving and moaning, blood soaking through his black suit from where the knife sticks out of his chest. You glance at the man in the white suit. He's about to make a run for it, so you grab the shotgun and aim it at him. It's heavier than it looks. He puts his arms in the air and stands up. You grip the handle firmly, getting ready to shoot him.\n *goto stealthmerchant\n\n\n \n \n*label failed\n\nThey keep firing at you, and more men run out of the building. You peek over and notice that they're getting closer. You think about what you should do. Your heart pounds in your chest as they come closer and closer. Suddenly, the window above you explodes, and ${Assassin} lands next to you. He frowns at you as ${General} appears from the back. He waves at you and sheathes his bloody knife. He rolls his rifle into his hands and begins to jog back to the rear of the house. You and ${Assassin} run towards him, then keep running towards the foil tent. He slices it open with his knife, and you run inside. \n\nThe heat inside is almost unbearable. You run through the weird-looking green-and-yellow plants. He slices the other side open too, and you don't stop until you reach the top of the hill in the dusty distance. The wind intensifies as you glance back and notice some of them running after you and others walking and firing at you.\n*label failed2\n*page_break\n\nWhen you arrive at the top of the hill, everyone stops to pant. At the bottom of the hill, a tall, skinless creature feasts furiously upon what seems to be an oversized boar. The General puts his hand on your back and pants. Then he puts his other hand on your back and pushes you as hard as he can. You try to grab onto something as you slide down, but there's nothing you can get a grip on. Dirt gets under your fingernails as you try to avoid sliding down. The creature stops and turns around. It growls loudly and raises the long, sharp piece of glass in its hands. \n\nYou land at its feet and immediately search for your ${weapon}. It screams and gets ready to strike. Suddenly, a long knife flies into its head. Dark, black blood splatters onto your trousers. It falls back on the ground and twitches for a couple of seconds. You keep panting and staring at the creature as ${Assassin} jumps next to you and ${General} slides down.\n\n\"You shouldn't have done that,\" the General mumbles and walks past you.\n\n*if (Keith >= 6)\n\n\n \"Noted.\" ${Assassin} rips his long, sharp knife out and sheathes it, then offers you a hand. You grab it, and he pulls you up to your feet. Without a word, he turns around and walks after ${General}. You dust yourself off and walk after them.\n *goto failed3\n \n*else\n\n\n \"Agreed.\" ${Assassin} rips his long, sharp knife out and stands in front of you for a second. He sheathes it, then turns around to walk after ${General}. You jump up to your feet and walk after them.\n *goto failed3\n \n \n \n \n*label topcont2\n*page_break\nAs quietly as you can, you walk towards the wooden door and slowly push it open to peek out. In front of you stands a long set of wooden stairs leading down. To your left is a small corridor with nothing but a set of closed doors. To your right stands two big, wooden double doors. Chatter can be heard from inside, so you decide to make your way towards that room.\n\nThe toilet door creaks open, and you freeze for a second. It doesn't seem to have alarmed anyone, so you step out and walk towards the double doors. You kneel down and look through the keyhole. On the left side, a man in a white suit sits on a dirty brown-and-yellow couch, a huge white bag stuffed with equipment in front of him. You hear someone talking on the left side. You push your hand on each side of the door in order to be able to get the other man in sight, but it results in the door sliding open. You fall on your hands and look up at the man in the black suit to your right. \n\nHe stands at a small wardrobe, its left leg broken. He looks from you to the pistol he was cleaning, then slides a small sawed-off shotgun from his back into his hands. He aims at you and pulls the trigger.\n\n*if (pistol)\n *set bullets -2\n \n \n You roll to the side, barely avoiding the shower of bullets landing beside you. Your ears still ring as the room fills with dust, but you aim your ${weapon} and pull the trigger. He grabs his throat as blood squirts from it, then falls next to the wardrobe, pulling it down with him. \n \n The man in the white suit sinks his hand into the white bag, and you send a bullet through his upper arm without hesitation. He screams in pain and puts his hand on the fresh, bleeding wound. You stand up and grab the shotgun, then aim it at him.\n *goto topcont3\n \n*else\n\n You roll to the side, barely avoiding the shower of bullets landing beside you. Your ears still ring as the room fills with dust, but you flip your weapon into your hand and jab it into his foot. He screams in pain and raises the shotgun. You rip the knife out, and with a swift move, you jump up and sink it through his chin. Blood flows out of his mouth as he drops the shotgun and falls to the ground with wide eyes. \n \n The man in the white suit sinks his hand into the white bag. You turn around and hold your ${weapon} by the blade. Without hesitation, you throw the ${weapon} at him. It sinks deep into his upper arm. He screams in pain and puts his other hand on the wound. You stand up and grab the shotgun, then aim it at him.\n *goto topcont3\n\n \n *label topcont3\n \"W—wait! Y—you seem like a reasonable guy. We can make a deal, maybe? No?\" he stutters, with shaking hands. \"You clearly know who I am, but I know who you are too, S-O-T. You guys keep getting younger and younger. But I'm not just a merchant, though! I, uh, I have information, juicy, about the Oracle. Do you know about the Oracle?\" he says as he hisses from the pain. You shake your head, and he chuckles quietly.\n  \n \"Let's make a deal! You let me go. I—I'll swap clothes with him, and it's done! I'll disappear! No one knows what I look like! And in reward, you can have everything I know about the Oracle. Deal?\" he says as his hands shake slightly.\n *choice\n  #Hear him out and let him live.\n   *set Evil %-5\n   *set Merchant \"Alive\"\n   \"Deal.\" You shrug, but keep aiming the shotgun at him.\n    \n   \"Good, good! I'm a man of my word! So, you haven't heard of the legend? The living legend, of course. Some say the Oracle is the creator of our very world. Some say he's evil itself and controls the beasts. What I know for sure is that whoever meets the Oracle can make a wish! You can ask for anything, and boy, you'll get it. You just have to be smarter than the Oracle, that's the only thing you have to pay attention to! There's just one other small obstacle. No one knows where the Oracle is currently. There are rumors he switches locations every so often. Recent news has it he's switching between the impact zones. And there's the other small obstacle, if you've ever gotten close to an impact zone, which I believe you have, judging by that heroic look of yours.\" He fakes a small laugh and lowers his hands a little. \n   \n   \"Unbelievable amount of beasts lurk around there. Not to mention the level of radiation. And the heat! B—but it's not impossible! I've heard tales of human beings meeting the Oracle. Some people even say the Oracle whispers to them! Why else would the beasts change and become stronger day by day? Rumors are usually backed by some amount of valid truth!\" He clears his throat. There's a moment of silence before he slowly stands up.\n    \n   \"So…I'll take my leave real quick. I'll just change first. Just to leave with a win-win situation.\" He laughs and swaps clothes with the dead guard as quickly as possible. \"I'm not the best at climbing, though. But it's no big deal! I'll climb out a window. Don't want to bump into one of your buddies. It was a pleasure doing business with you!\" He slowly pulls the knife out of his arm and hands it to you with a hiss. He backs away towards the door, then swiftly leaves. You sheathe your knife and check the white bag in the middle of the room.\n   *goto topcont4\n   \n  #Kill him.\n   *set Evil %+5\n    \n   \"I just want to see you dead.\" You aim the shotgun and pull the trigger. He screams before dozens of bullets fly through his chest and head. Blood flows from his severe wounds and soaks right into the couch. You step closer and rip the knife out of his arm, then wipe it on his clothes. You sheathe the knife and check the white bag.\n   *goto topcont4\n    \n    \n    \n   *label topcont4\n    \n   The bag is filled with weapons, ammo, and other useful equipment. You're about to check what else is in there when someone clears his throat. You look to your right and find the General standing in the doorway.\n    \n   \"Good job. Get this one downstairs. His buddies are waiting for him.\" He chuckles and walks down the stairs. You dust yourself off and grab the body by its legs, then drag it towards the stairs. It's heavier than you expected it to be, but you manage to get it to the top of the stairs. When he's there, you give it a slight push with your leg. The body rolls down the stairs, landing with a loud thud at the bottom. You walk down after the body and step over it to find two other bodies with similar white suits, along with a couple of other dead bodies with black suits. \n   \n   The General sits at the bar on a moldy barstool on the left side of the room, and ${Assassin} sits on one of the dead bodies in a white suit in front of the fireplace on the right. He looks at the dead body as he swirls his knife around in it.\n    \n   \"Good.\" He grunts and rips the knife out, then sheathes it. He stands up and takes a small, round item out. He walks to all three dead bodies, points it at them, and presses the button on its side. It releases a small snapping sound every time. \"Evidence.\" He turns to you and pockets the device. He keeps looking at you for a couple of seconds, then walks towards the door.\n\n \n \n*label succeeded\n*page_break\n*achieve firstmission\n*set Keith %+5\n*set Gannon %+5\n\n\nDust fills the room as he opens the door. The unexpected heavy wind almost pushes you off your feet. ${Assassin} smashes the door shut and pushes a couple of barstools under the handle. \"That's a problem.\" He leans against the door and glances out of the poorly reinforced window. You peek outside and see scraps and debris flying past the house, and hear the window whistle and even shake the house a little.\n\nThe General peeks out and shakes his head. \"Sandstorm. How exciting. Looks like we'll spend the night inside this house with our new friends. Let's hope our filters last,\" he says as he runs up the stairs. A couple seconds later, he returns with a white bag full of equipment. He puts it next to the fireplace and crosses his arms. \"Help me barricade the windows.\" He walks past you, and you follow him. \n\nUsing as much of your remaining strength as possible, you push the couch and the wardrobe against the window. When you're done, you step away and see the wind slightly moving the barricades. You sit down on the one remaining chair at the bar.\n\n*page_break\n${General} walks behind the bar and starts rummaging through the boxes and sacks. ${Assassin} keeps staring at you with his deep, dark eyes, to the point where it begins to feel uncomfortable. The General slams a wooden plate on the counter, with what seems to be a mixture of old, rotten snacks, including pecans, nuts, and even chips. You turn your head away in disgust, and he laughs. \"So picky. I bet it's full of protein, though.\"\n\n${Assassin} slowly walks towards the two of you and takes a handful of the rotten mess out. He tilts his head and pulls on his scarf, then crushes the snack in his hand. The small crumbs fall under the scarf, and he begins to crunch on them. \"Nutrients.\" He cleans his hand on the wall, then leans against it.\n\n\"Well, you can only blame yourself if you die from that.\" The General sits down by the white bag and starts organizing the equipment. \"One of us will have to stay and guard overnight if we have to spend the night here.\" He gives the two of you a questioning look.\n*choice\n\n #Volunteer.\n  *set Keith %+5\n  *set Gannon %+5\n  *set Volunteered \"You\"\n  \"I'll stay up,\" you say and shove the bowl of rotten snacks away.\n  \n  \"That was unexpected. Keep bringing pleasant surprises, rookie, and we'll get along just fine,\" the General says and keeps organizing the loot.\n  \n  ${Assassin} keeps staring at you as he leans against the wall, placing a foot against it. You get up and sit on the couch in front of the fireplace.\n  \n  Time passes very slowly with the sandstorm blowing outside. Eventually, night falls with the ongoing sandstorm.\n  *page_break\n  \n  \"Okay, I'll get some sleep,\" the General says, already making his way up the stairs. \"Oh, by the way, I've counted everything.\" He points at the loot and goes upstairs. ${Assassin} pushes himself off the wall and walks upstairs too. They chat upstairs for a couple of minutes, then silence fills the building. You keep staring at the dying fireplace. The last couple of burning logs crackle and pop. For some reason, it feels relaxing. You forget about everything for a couple of minutes, thinking back to the old times. \n  \n  A small smile appears on your face as you think about how horrible you thought the whole district was. How nothing could be worse than living in a world like that. You think about your school, your parents, Christmas, birthdays, your mother surprising you with your favorite food every now and then. Your father giving you speeches and lecturing you. Everything you once had. But your happy thoughts die out with the fireplace, when the tiny flickering fire blows out. The whole room goes pitch black in a second, leaving you on the couch in darkness.\n  \n  The night duty proves to be harder than you expected. With nothing happening around you, it begins to feel challenging to stay awake. You get up and walk around, spinning your ${weapon} around. You stop at the window and peek between the barricades. The wind blows heavily and shakes the house slightly every now and then. You're still staring outside when a couple of black figures pass by the window, breaking the little light the moon can provide through the sandstorm.\n  *page_break\n  You immediately grab your ${weapon} and walk to the other window. As much as you can peek between the barricades, you see the same black shadows passing by. As much as it's possible to hear anything between the whistling of the wind and the noise caused by the sandstorm, scratching noises can be heard from the other side of the door. You step closer, and the noise stops. You stand frozen for a couple of seconds, then take a step backwards. Suddenly, the door blows open. You fly back a couple of feet and land on your back. \n  \n  You get buried under the barstools and the wooden parts of the door, pushing down on your chest with such force it proves hard to even breathe. Dust blows into the room, and it's hard to see anything clearly. A figure walks next to you and stares down at you with a pair of glowing pink eyes. The wind seems to be blowing its dark, shadowy body away. Your ears ring louder as its hand gets closer to your face. The ringing hurts your eyes and the inside of your head. When the ringing is so unbearable that you scream in pain, its dark hand falls upon you, severed from the arm. It smokes on your chest for a couple of seconds, then turns into grey stone.\n  \n  ${Assassin} flips his long, sharp knife around and stares at the creature. They keep looking at each other as the remainder of its arm slowly gets blown away. The creature watches ${assassin} for a couple of seconds, then it turns around and disappears through the hole it came from. The General walks down and stops at the stairs. \"What the…want to tell me what happened?\"\n  *goto cont9_5\n \n  \n\n #Don't volunteer.\n  *set Keith %-5\n  *set Volunteered \"Keith\"\n  \"Fine,\" ${Assassin} mumbles as he continues leaning on the wall with one foot against it.\n  \n  \"Well, that escalated then. Though I'd expect the rookie to volunteer for good points.\" The General looks up from the loot at you.\n  \n  Time passes very slowly with the sandstorm blowing outside. Eventually, night falls with the ongoing sandstorm.\n  *page_break\n  \n  \"Let's get upstairs,\" the General says as he walks to the stairway. You glance back at ${Assassin}. He doesn't move from his spot, but looks down with closed eyes. You walk upstairs, and ${General} walks into the room in front of the stairs. He sits down on the couch with blood soaked into it, then leans back. \"You'll have to find another room. I'm not used to sharing my bedroom with anyone, and I'm not going to start tonight.\" He waves you off, and you close the door as you walk out. To your left, you find a door with a padlock sealing it shut. Having no other option, you decide to give the door a couple of hard kicks, until it breaks. You break more pieces off the door until you can climb in through the hole.\n\n  You find yourself in a small, one-bed bedroom with sky-blue wallpaper with stars and planets on it. On the bed lies a small corpse in pajamas with wide eyes, staring at the adult, lifeless body sitting at the table in front of the bed. The small corpse has his fingers wrapped around a revolver. You take a look at them and realize there's a bullet hole in both of their heads, but there doesn't seem to be any more weapons in the room, apart from the revolver. You take a deep breath at the sight, then roll the small body off the bed. \n  \n  You pull off the sheet covered in blood and chunks of brain, then lie down in the bed. You've slept in a few uncomfortable places, but this is the worst of all so far. You can't seem to fall asleep, no matter how hard you try. As you lie in bed with your hands under your head, you remember the old times. How you thought the district was the worst thing that could ever happen. Your mother surprising you with your favorite food, your father giving wise speeches and lectures. It might be because of the bodies lying next to you, but your mood quickly dies as reality hits you.\n  \n  You lie in the bed for a while with closed eyes, until you finally fall asleep.\n  *page_break\n  [i]\"You are afraid. That has happened often with you in the past. Are you afraid they're not your friends? How they will never be?\"[/i] The dark voice resonates with your insides. A creaking sound fills the darkness. The purple set of eyes moves downwards, then upwards, as if its owner stood up.\n  \n  *page_break\n  You open your eyes after only a couple of hours. \"Nice. I mean, the bodies. Just like father and son. How cute. Speaking of father and son…how are you, huh? I'll act like I care.\" ${capturer1} grins and rolls the adult body off the chair, then sits down. \"See how much easier things get when you don't give in? Had you volunteered, you wouldn't be up here sleeping. Well, wouldn't be up here listening to me. He laughs as an explosion from downstairs shakes the house. A harsh pink light lights up the hallway. \n  \n  \"Oh boy, you better check that out. It would be a shame if your new buddies happened to die gracefully, wouldn't it?\" He laughs as the pink light shines into the room through the hole in the door. You climb out of bed and step over the adult body. \"Finally!\" ${capturer1} laughs and hops into the bed. You spin your ${weapon} into your hand. Heavy wind stirs the sand and dust in the hall as you climb out of the room and make your way towards the stairs. You walk down the stairs steadily until you reach the bottom, where you stop. The entrance is blown up and wooden pieces lie everywhere, along with the barstools. \n\n  The sandstorm blows into the house, filling the air with thick sand. ${Assassin} is leaning on the wall with crossed arms and a foot against the wall. A figure stands a couple of steps away from him. The wind seems to be blowing away its shadow-like, dark body. It turns around and looks at you with its glowing, pink eyes.\n  \n  You put your hand on your ${weapon}, but stand there skeptical. You haven't seen any of these creatures die before. Your ears ring louder as it gets closer. The ringing hurts your eyes and the inside of your head. When it almost reaches you, ${Assassin} jumps between the two of you and spins his knife into his hand. He keeps staring at the creature, and it stops. The pair of pink eyes twitch from you to him. After a couple of seconds, it turns around and disappears through the hole it came from.\n  \n  The General walks down and stops next to you. \"What happened here?!\" He spreads his arms wide.\n  *goto cont9_5\n  \n  \n\n  \n #Look at ${Assassin}. \n  *set Gannon %-5\n  *set Volunteered \"Gannon\"\n  The General looks from you to ${Assassin}. \"All right, don't fight over the spot. I'll do it,\" he says and continues organizing the equipment.\n\n  Time passes very slowly with the sandstorm blowing outside. Eventually, night falls with the ongoing sandstorm.\n  *page_break\n  \n  \"You guys get some sleep. Neither of you volunteered, after all,\" the General says as he sits on the counter. ${Assassin} pushes himself off the wall and walks up the stairs. You follow him upstairs, and he leans against the wall in-between the two doors, just like downstairs. \"Sleep,\" he mumbles as he crosses his arms. \n  \n  You walk into the room with the double wooden doors and sit down on the couch. Fresh blood is soaked into it. You lie down and try to avoid the bloody spot. You can't fall asleep, no matter how hard you try. You roll around on the uncomfortable couch with closed eyes. You keep thinking about your old life. The district, and how you thought nothing could ever be worse than the school you had to attend daily. Your mother surprising you with your favorite food, your father giving you wise and lecturing speeches. \n  \n  The childish things you did with your friends. Your mind wanders, but eventually, it arrives to the point where everything you ever had collapsed. You frown with closed eyes at the thought and cross your arms. After you lie in the bed for a while, you manage to fall asleep.\n  *page_break\n  [i]\"You want to walk backwards, without opening your eyes to see the road behind. You know that the road ahead is worse. But the road ahead awaits. You are afraid. Like you have been many times in the past.\"[/i] The dark voice resonates with your insides. A creaking sound fills the darkness. The purple set of eyes move downwards, then upwards, as if its owner stood up.\n  \n  \n  *page_break\n  \n  You jump up from the bed, breathing heavily. \"Sleeping well, young prince?\" ${Capturer1} laughs and walks around the room. \"Guess who isn't sleeping? The person having to stand guard!\" He laughs. \"About time you didn't give in.\" He crosses his arms just as an explosion shakes the building and sends both of the doors flying into your room. \"Finally! Finally, something interesting! Chop chop, kiddo! You don't want to miss the sight of your buddies dying horribly now, do you?\" He laughs and folds his arms behind his back.\n  \n  You walk over the doors lying on the floor and out to the hallway. \"Finally! Some rest for old ${capturer1}!\" He laughs and drops down onto your bed. Wind stirs the sand and dust in the house. A bright, harsh, pink light is shining from downstairs. You look at ${Assassin} next to you, still leaning against the wall. He looks down the stairs, then glances at you. He grunts and pushes himself off the wall, then begins to walk down the stairs steadily. The pink light shines brighter as you walk further down the stairs behind him. \n  \n  ${Assassin} steps into the room, and you stop at the bottom of the stairs. A large, dark figure is standing above ${General}, as dust fills the house from the huge hole where the doors were blown in by the explosion. Its shadowy body seems to be constantly getting blown away by the wind. \n  \n  ${Assassin} walks towards the creature, spinning his knife in his hand as he does so. When he's close enough to the creature, he swings the long knife. The tip of it stops one inch away from the creature's eyes, and both of them stand still. After a couple of seconds, the creature turns around and disappears through the hole it came from.\n  \n  The General opens his eyes and sits up. \"I…I don't know what happened. I heard an explosion and…that's the last thing I remember. What happened?\" He gives the two of you a questioning look.\n  *goto cont9_5\n    \n\n    \n    \n*label cont9_5\n\n\n\"Nothing. Storm.\" ${Assassin} gives you a firm look from the corner of his eye. You look at the General and nod.\n\n\"Okay…well, there's no point in staying here any longer. The house is destroyed, so it fails to provide shelter anymore. Let's go. We can push through the sandstorm. Keep your wits about you, and be trigger happy. Let's move.\" He rolls his rifle into his hands, and you follow him through the hole.\n*page_break\n\nThe sandstorm blows so heavy that every step feels harder to take. No matter what, you keep up with ${General} and ${Assassin}. Creatures run and fly past you. You keep walking for a while. You don't know for how long, but it feels like hours have passed.\n*goto gate\n\n\n \n \n*label failed3\n*page_break\n*set Keith %-5\n*set Gannon %-5 \nYou walk in silence for almost an hour in the desert. With every step, the ground pulls your ankle deeper under the sand. ${General} and ${Assassin} walk ahead of you with their weapons ready. \"Mission failed. I don't know when was the last time something like this happened to us. I don't even know what he was thinking. A rookie. A kid. On a serious mission like this,\" the General mumbles.\n\n\"We have to take a detour,\" ${Assassin} says, and the General nods. \"They're probably waiting near the known roads leading to ${base2}.\" You keep walking for hours, until dusk. A small destroyed fence with a wooden gate appears in the distance. The sandstorm intensifies as you stop at the open gate. A bent sign stands in front of it with 'welcome' written over it in red.\n\n\"All right.\" ${General} turns to you. \"This is still the fastest route back to ${base2}, and we have no time to waste. There's a sandstorm brewing.\" This small village is surrounded by unknown black tar. A slimy, ray-like creature shrieks as it tries to get out of the tar, but it keeps dragging the creature back down. Afraid of getting swallowed by it, you jump over it. \"The village itself is filed with…crazy people. Keep your head down and walk slowly. Don't say a word, don't make any sudden moves, and don't look at them. Especially not in their eyes. If you fail to do this simple task, we'll bail on you. We can't let you hold us back.\" ${General} holsters his weapon and turns around. \n\nHe looks down at the ground and walks through the gates slowly. ${Assassin} does the same, and you follow them. Inside the gate, a single path seems to lead through the village. Buildings stand left and right. The small dirt road leads between them. Darkness flows through the air, and it gets darker as you walk further inside.\n\n*page_break\n[i]\"Oi, Woodcutter, dressed all black and white, please don't cut that tree!\"[/i]\n[i]\"A little birdie is singing in my garden. She's not singing just for me!\"[/i]\n[i]\"Please, oh, please don't cut her home. Gotta love 'er singing 'ere!\"[/i] \n\nA man without any clothes on sings in a disturbing tone of voice. He keeps raising and smashing an axe down on a body already cut in half. Next to him, an Aviatrix is locked in a cage, screaming. Murmurs and whispers surround you. It feels like the darkness surrounding you flows and whispers right into your ears. You keep walking until you reach the town square. A fountain stands in the middle with thick, dark-red liquid pouring from it.\n\n[i]\"Look, Mom! Gods walk among us…let's eat them!\"[/i] A small girl grins, revealing her long fangs.\n\n[i]\"Shut up! Shut up, shut up, shut up!\"[/i] a woman wearing a white robe screams as she pushes her fingers into her mouth and crunches them.\n\nYou slightly turn towards them when someone bumps into you. You stumble and glance back at the figure. He is entirely black. He holds his head between his enlarged hands and pointy fingers. His white eyes twitch from side to side. He keeps mumbling furiously as he slowly walks past. You navigate through the crowd of craziness. Another pair of gates appears in the distance. You get closer and closer. A woman is kneeling next to the gates and rocking back and forth. [i]\"Dear god, oh why did you abandon us, why did you abandon us, why did you abandon us, why did you abandon us…\"[/i] \n\nOn the gates, two bodies are crucified, and oversized ravens sit on their heads. You step through the gates and the darkness around you disappears for a brief moment. Immediately after, the sandstorm blows around you heavily. \"It's not far from here. Let's move it, and we'll get home before the sandstorm kills us,\" the General says and marches forward. \n\nYou follow him, but it gets harder and harder to do so as the sandstorms blows heavily. After a short time, you can barely see what's in the distance. Figures run around you, and creatures fly away from the direction you're walking towards. You walk for hours through the disturbing sandstorm. \n*label gate\n*if (firstmission = false)\n\n\n By the time you arrive at the gate, several sets of pink eyes have begun to close in on you. ${General} shouts as loud as he can, but the gate remains shut. He fires a couple rounds into the air, but nothing happens. You take a look around as the pink eyes come closer and closer. Your ears begin to ring, and it intensifies as they come closer. \n\n \"This is all your fault! We'll die here because of you!\" ${General} shouts and fires at them, but it doesn't stop them. Your ears ring so much that your eyes begin to hurt, and you're forced to grip your head in your hands.\n *goto gate2\n \n*else\n\n\n By the time you arrive at the gate, you begin to feel the presence of several figures surrounding you. ${General} shouts as loud as he can, but the gate remains shut. He fires a couple rounds into the air, but nothing happens. You take a look around as the pink eyes come closer and closer. Your ears begin to ring, and it intensifies as they come closer. \n \n [i]\"Play with us!\"[/i]\n [i]\"Without your gas mask, silly!\"[/i]\n [i]\"Bullets are yummy! Swallow one and see for yourself!\"[/i]\n\n Several voices and giggles echo in your ears. You begin to see little kids in the distance, cornering the two of you.\n\n \"We'll die here because the guards happen to be so damned useless!\" ${General} shouts and fires at them. Some of them fall back, and the sandstorm buries them. Your head hurts, but you grip your ${weapon}. You raise it with shaking hands and keep staring at them closing in on you.\n *goto gate2\n \n*label gate2\n*page_break\n\nThe gate smashes open. ${General} runs inside and grabs your hand with the ${weapon} in it. He pulls you after him, right through the gate. When you arrive on the other side, both of you fall on your knees and pant. \n\n\"What the hell took so long?!\" The General looks up in the sandstorm, and ${Assassin} steps in front of you.\n\n\"Climbing.\" He shrugs and offers a hand to both of you. You grip his hand, and he pulls you up to your feet. \n*if (firstmission = false)\n\n They escort you to the living quarters and push you into the decontamination chamber. \"That was a disappointment. It's been a while since I came close to dying…because of a rookie,\" the General says and rushes off in the still-ongoing sandstorm. ${Assassin} looks at you for a couple of seconds, then turns around and walks away.\n\n \n*if (firstmission)\n\n They escort you to the living quarters, then watch as you walk inside. \"Good job, overall. Looking forward to working with you again, rookie.\" The General nods.\n \n \"Same,\" ${Assassin} mumbles, then walks away.\n \n \"That was a pleasant surprise. Who taught you moves like that?\" the General asks.\n \n \"No one…learned it with time.\" You shrug as the decontamination chamber's doors slowly close. They turn around and rush away in the still-ongoing sandstorm.\n\n\nThe door closes behind you, and the decontamination process takes place. The amount of sand that was stuck to you is surprising. You walk through the long hallway, through the double doors. As quietly as you can, you take the gas mask off and put your equipment on the table.\n\n\"Hey…\" ${Roommate} whispers from the bunk bed. She rubs her eyes and yawns. \"Did everyone make it back alive?\"\n\n\"Um, yeah.\" You nod and climb into the bed, confused about her question.\n\n\"All right, thanks.\" She smiles and lies back in the bed.\n\nYou put your head on the pillow and try not to think back on what happened today. As a result, you fall asleep rather quickly.\n\n*page_break\n*if (firstmission = false)\n [i]\"You have set foot on my domain. Where the beginning and the ending both will be theirs to hold. But at least they will be holding something. What will you do, ${firstname}? When the time comes, will you pass through, or choose otherwise?\"[/i] The purple eyes blink as you stand in the middle of the thick darkness. You breathe it in and have to cough. Chain rattles in the distance, and a weeping sound comes from it.\n *page_break\n \n \"Laaaame!\" You jump up from your bed to find ${capturer1} standing next to it. \"Aren't you just good at disappointing people? I'm beginning to think you're hopeless. Have to admit though, having your own undead army has…moved the gears in my head.\" He taps his chin. \n \n \"That village…I like those people. They would make one hell of a crazy army. I'd just have to get through their thick heads to stop moaning like some damned zombies. And chanting. Okay, the chanting was funny, though. Weee, someone is in my head, weee…hilarious!\" He bursts out laughing and pats ${Roommate} on the back. She frowns and rolls onto her right side.\n *goto cont10\n \n*if (firstmission)\n [i]\"How do you plan to drive back your common enemy while you eliminate one another? Human stupidity. Craving power and wealth. The story that never ends. Or so it seems. And you're no different.\"[/i] The purple eyes blink as you stand in the middle of the thick darkness. You breathe it in and have to cough. Chains rattle in the distance. Growling and screaming sounds comes from there.\n *page_break\n \n \"Such excitement! I wish, oh I wish I was there. I crave some good action. I mean, the only thing I'm doing right now is conquering and recruiting slaves, killing useless people and yadda yadda…you know, what I'm good at. In my spare time, I tail you. It's funny, I have to admit.\" You jump up from your bed to find ${capturer1} standing next to it. \n \n \"Kudos to your pal with the scarf, though. He's someone I'd like to have in my army. A two-man—I mean, three-man army, heh. I keep forgetting about you. No offense.\" He chuckles and pats ${Roommate2} on the back. He looks up, then turns around to fall back asleep immediately.\n *goto cont10\n \n*label cont10\n\n\"Anyway, I didn't come here for some silly chit-chat. I came here for much more serious…\" he begins, but then his smile fades. Time seems to slow down, and darkness can be seen flowing through the room. The air cools down as the doors slowly open. A tall figure in a black robe and hood walks into the room. Its pure black clothes swallow every light source. Darkness follows his every footsteps in the form of a mist. It fills the corridor behind him from floor to ceiling. Thousands of quiet, suffering screams and moans can be heard from the darkness. It makes you tremble inside from the agony in their tone.\n\n\"Hey! My good friend…thanks for visiting, I really appreciate the effort, but I'm a bit busy here right now. Come back later? How about…let's see…on the fourth of never again? That would be perfect!\" ${capturer1} grins and pulls his long silver pistol out. The black figure takes another few steps towards ${capturer1}. He rolls his pistol around, then aims it at you. \"See ya, kiddo. Got something to do.\" He grins and pulls the trigger.\n*finish", "chapter3": "[b] Chapter 3 - The Killer Victim [/b]\n\n\n\"Is everything all right?\" ${Roommate2} offers a hand. You take it and get up on your feet. \"Must have been an intense nightmare. Anyway, breakfast is in the dining room. Feel free to join, I guess. After you've taken a shower. You smell like…yeah.\" He chuckles and leaves the room, leaving you alone. Your head pounds with every heartbeat. You keep standing in the middle of the room, panting. It takes a while until you're sure that everything is all right. It's been a very long time since you've had the chance to take a shower. \n\nIt feels refreshing. The amount of dirt being washed away brings a smile to your face. You take your time, and when you're done, you get dressed and walk out of the room. The shower seems to have cured most of your headache. You step into the dining room to find long tables with three chairs on each side and a small kitchen in the far-left corner. The room smells funny. The tables are dirty, and the chairs seem like they could break at any second. \n\nYou take a look at the nearby cutlery. You've had it worse, so you walk further inside. ${Roommate} and ${Roommate2} are sitting at the table closest to the kitchen, along with a couple of others you haven't spoken to yet. You grab a plate with green stew and weird-looking meat on it, then sit in the last remaining seat, in front of ${Roommate} and ${Roommate2}. They chat for a while as you eat. \n\n*page_break\n\"So, you did go outside, right? I mean, outside of ${base2}?\" ${Roommate} asks, pushing her plate away with half of the food remaining on it.\n\n\"Yeah.\" You nod and stir your food a little.\n\n\"That's cool. Wish we were allowed to. Must be exciting.\" ${Roommate2} shakes his head and takes a spoonful of ${Roommate}'s food.\n\n\"There was a guy like you here before. It was a while ago, though. But he went out with ${Assassin} and the others too. He was over his head and stuff, but yeah, guess what? One day, he didn't come back. I wish I knew what happened to him.\" ${Roommate} smiles and crosses her arms. Some of the others at the table peek at you. \n\n\"So yeah…take me outside…when Dad doesn't know about it or something…\" ${Roommate} laughs.\n\n\"Me too. I wanna try…killing stuff.\" ${Roommate2} nods.\n\nYou continue to chat for a couple of seconds, when ${General} opens the door and walks in. \"Rookie, get your gear and come with me,\" he says as he fixes his gloves. Silence falls on the dining room as you stand up. You gear up and follow him outside. You follow him silently through the city to the citadel. After taking the long stairway up, you find yourself standing in the ${Leader}'s office. He's sitting at his desk, sipping something from a grey mug. He swallows whatever he had in the mug and glances up. \"So?\"\n*page_break\n*if (Firstmission = false)\n \"We failed. He messed everything up! We took down one of them, but we almost got killed. We had to go through the crazy town in a sandstorm in order to escape. We barely escaped death. I don't know why we even had to bring him on such an important mission! Anyway…I wrote a complete report,\" ${General} says, then places a couple of dirty pieces of paper on his desk.\n \n The ${Leader} shoves the mug away and clears his throat. \"First of all, don't question my decisions. Never do that again.\" He gives ${General} a firm look, then takes a deep breath. \"This was probably our only chance to get them. This is frustrating. However…let's give him another chance. A last chance. If we still can't see positive progress on his side, then we'll have to think about what further steps to take. It'll be a stain on your names, though. Yours and ${Assassin}'s both. Unless, of course, he dies out there serving our great city.\" He glances at you and taps on the desk.\n *goto mayor\n \n*else\n \"We succeeded, of course. We approached the building from three sides and took the targets out quietly. There was a disturbance overnight from the sandstorm, forcing us to return sooner than expected. I've written a complete report, though. I'm starting to think that it was a good idea to bring him with us, after all,\" the ${General} says and places a couple of dirty pieces of paper on his desk.\n \n The ${Leader} clears his throat and crosses his arms. \"I know it was a good idea. That's why I ordered you to do so.\" He wipes his mouth with his palm. \"This was our one and only chance to take them out. They were getting powerful and didn't want to negotiate with us. Now they don't have to. Good job, as usual.\" He turns to you.\n *goto mayor\n \n\n\n\n*label mayor\n\n\n\"That'll be all for now. Our scouts have spotted a small group of people walking along the walls of Ignobilis. Day after day, with stuffed bags. They were carrying various pieces of equipment, such as a Geiger counter. I want that. They're exceedingly rare and very useful to have. That's your first priority. You'll have to find them and take anything else that you think might come in handy. What you do with them afterwards is up to you, General. Everything we do here is for a greater tomorrow for our people. ${Assassin} knows the details of today's mission. He's training rookies at the usual place. Later.\" The ${Leader} picks up the first sheet of paper and begins to read it as he continues taking small sips from his mug.\n*label mayor2\n\nYou walk down the long stairs of the citadel and go outside.\n*page_break\n\nYou take a long walk behind the citadel towards the greenhouses. Citizens are walking around and working wherever you turn. Behind the greenhouse, you find a long, grey building. Next to it stands a small field surrounded by a wooden fence. As you get closer to it, you notice the homemade target practices. ${Assassin} stands in front of the rookies. Their ages vary from teen to adult. \n\n${Assassin} is balancing his long, sharp knife on his left palm with his left leg pulled up. The rookies fight each other in pairs with wooden knives and daggers. Whenever they have the chance, they pull their weapons out from the back. Their opponent stops, and the fight resets. ${Assassin}'s eyes are closed, and they snap open as you get closer. He turns towards the rookies and nods once. \"Practice.\" The rookies continue fighting. ${Assassin} approaches you, sheathing his knife as he does so.\n\n\"Ready to serve our home?\" The General crosses his arms. ${Assassin} nods once and walks between the two of you. \n*page_break\n\nYou walk next to him through the city. In the city center, there's a statue of an angel with a bald man standing in front of it.\n\n[i]\"This, this is our Lord and saviour's punishment for sinners! You who have survived are worthy in our Lord's eyes! At the end of this long road, you'll be purified! Pray, and serve our new home! God has chosen ${base2}! Serve our Lord and those he trusts with his will!\"[/i] he says in front of a crowd of people with widely outspread arms. ${Assassin} grunts and quickens his pace. \n\n\"He's not really a fan of religion.\" ${General} turns to you. \"I don't mind, as long as he praises ${base2} and our ways as well.\" He shrugs, and you walk towards the gate. They let you through, and you give your ${weapon} a tug just to make sure it's with you. You take the walk through the woods, then over the demolished roads, avoiding the wrecked cars. Eventually, you reach the wall surrounding the district. \n\nYou've never been this close to the wall before, and now you're walking next to it. You peek into the district as much as you can. It fills you with memories. The sight of dead bodies feels natural by now. As you get further down, bodies and skeletons lie several layers deep at the foot of the wall wherever you step. Bugs and vermin buzz around the corpses. They're covered in a dark red goo. \"Most of these poor sods were killed long before these creatures walked on Earth.\" The General shakes his head, and you continue to walk by the wall. \n\n[i]\"Help us. Please help us.\"[/i] The sight of corpses forming a big pulp every now and then, combined with the hallucination of the corpses begging for help makes you feel uncomfortable on the inside. Nevertheless, you keep walking next to them. Strange moving plants are growing out of them. They bite towards you with their tiny black fangs.\n*page_break\n\nFigures appear in the distance, and they seem to be moving away from you, towards the military outpost at the foot of the wall in the distance. You stick to the wall as much as you can and walk after them. ${Assassin} takes a sharp left turn and disappears between the wreckage of two trucks. You walk closer with ${General} as quietly as you can. When they turn around, you put your hand on your ${weapon}. There's a moment of silence, and then they begin to run away, towards the dark forest, and shoot in your direction with small but loud pistols.\n\nYou begin to run after them. You chase them for a while, but then ${Assassin} drops down in front of the small group with his long, sharp knife and pistol aimed at them. You catch up to them and spin your ${weapon} into your hand. The small group begs for mercy as the General orders them to drop their weapons. They drop their small, rusty, hand-crafted weapons in front of you. Three of them hold something in their hands, covered under a grey sheet. When ${General} steps closer to them, a couple of them step in front of him.\n*page_break\n\"Please…we have nowhere to go anymore! We live from day to day…the only chance to survive is to leave this place and obey the mutants! I beg you, let us go in one piece!\" says a woman with a dirty grey lab coat.\n\n\"Give us what we need, and no one gets hurt. We know you have some valuable equipment in your possession. And also, you're looking for someone you shouldn't be. That's our task. The Sons have to get there, and only them,\" ${General} says and pushes the woman standing in front of him to the ground. She looks down and rubs her shoulder. Without a word, she reaches into her pocket and drops a small, round grenade on the ground. She looks up and smiles just before it explodes, filling the air with smoke. \n\nThe small group can barely be seen running in different directions. ${Assassin} pushes his knife through the woman, then runs after the two remaining survivors. The man runs towards the forest, and the woman runs towards the wreckage of a warehouse. The General looks at you through the thick smoke, and you know who you have to go after.\n*choice\n\n #Run into the forest after the man.\n  You push through the smoke and run after the man. You grip your ${weapon} tightly as you do so. The man runs as fast as he can. He's about to get out of sight when he suddenly screams. He falls to the ground as a homemade trap snaps onto his leg. You stop as he struggles to get his leg out of the trap. You scan the ground. If there's one trap in the forest, there might be at least a couple more left.\n  \n  Your mission is clear, and you're confident in your skills.\n    \n  *if (agility)\n   *set Secondmission true\n   \n   \n   You walk through the forest, carefully jumping over a couple of traps. As you get closer to him, you notice the traps laid around him. You disable a couple of them and step closer to him. He's holding his leg and groaning as he tries to rip it out of the trap. With every attempt, the razor cuts deeper into his flesh. Blood drips down his leg, forming a small puddle underneath him. The ground sucks it up overly fast. Something covered in a grey, bloody rag is stuck into his belt. He covers it with his shaking hand over it and looks at you.\n   \n   \"Please…I—I beg you! I'll give what you need, just let me go! We'll never try to reach the Oracle, never again, I promise!\" he says and pulls the item from his belt with trembling, bloody hands. He stretches his hand out and looks at you. The ${Leader}'s words echo in your head, and you take the item. \"I'll disappear, you won't see me again! I'll never mess with you guys again! Just…help me out here. It hurts so damn bad…\" He moans in pain and clenches his fists.\n   *choice\n   \n    #Leave him there.\n     *set Evil %+5\n     *set Equipmentperson \"Dead\"\n     You take the item and stick it in your back pocket. You give his torn leg another look, then turn around. \n    \n     \"If you leave me, I'll just die here! Please…come back! What did we ever do to you?!\" he screams and sniffles as you walk further away from him. He screams louder as you leave the forest. Once you get out, you meet up with ${General} and ${Assassin}. \n     *label Secondhimcont\n     \n     \"Well, look who's back. And with something presumably valuable. Good. Let's go back, shall we? We'll get rid of these rogues some other time,\" ${General} says and takes a few steps forward.\n     *goto Secondsuccesscont\n     \n    #Help him.\n     *set Evil %-5\n     *set Equipmentperson \"Alive\"\n     You take the item and stick it in your back pocket. You give his torn leg another look, then kneel down. You pull your ${weapon} into your hand and smash it on the hinges and screws a couple of times. It takes a while, but eventually, the trap breaks open. He tosses it away and stands up as much as he can.\n     \n     \"Thanks…truly. I'll never forget this. Though you did cause all this, you helped me in the end. Well, you have to obey your orders. We all gotta do what we gotta do to survive. I'll just go now. Thanks again for not letting me rot here.\" He turns around and limps away from you, carefully checking where he steps. You turn around and walk out of the forest. Once you get out, you meet up with ${General} and ${Assassin}.\n     *goto Secondhimcont\n     \n\n     \n  *else\n   *set Secondmission false\n   *set trapwound true\n   *set Equipmentperson \"Dead\"\n   \n   \n   You walk through the forest, carefully checking where you step. When you're close enough to him, you grip your ${weapon}. You take one more step forward, and a sharp pain strikes into your calf. A homemade trap snaps and sinks its small metallic spears deep into your flesh. You fall down, holding your leg as blood pours out of the small wounds. The tiny spears grind on your bone as you try to break free. The pain is horrible, and you grunt in agony. No matter how hard you try, you can't break free. A small puddle of blood appears underneath you in no time.\n   \n   \"Heh…the irony. You'll die here with me. None of us will reach the Oracle,\" the man says with a pale look on his face. \"I can feel the blood loss getting to me now. It won't take long until you begin to feel the same. Look where blindly following orders got you. My only problem is…you brought innocent people down with you. Shame on you…\" He sighs and lies back on the dry grass, a smile on his face.\n   \n   You try to get out of the trap for a while, until you begin to feel dizzy. You can barely move your leg, and you lie back on the grass. It feels surprisingly calming and good. \n   \n   \"Don't you die on me, kiddo. Who am I going to visit in my spare time then? What were you even thinking, huh? Still collecting scars? But you shouldn't go so far as to lose a limb just to impress ${Roommate}…or ${Roommate2}. Don't play stupid, I've seen the looks you share with one another.\" ${Capturer1} walks around, carefully stepping over some traps as he chuckles. \n   \n   \"Don't become careless. You've been doing decent on your own. Think before you act. Use your head.\" He walks next to you and smirks. \"Kiddo, kiddo…every time you're at death's door, a part of you stays there. Forever. But it's over now, kiddo. You can't avoid death forever.\" He keeps looking at you until you close your eyes.\n   *label oa\n   *page_break\n   \n   \n   [i]\"Are you alive? How do you know if you're not awake now, and dreaming when you wake up?\"[/i] the voice echoes. You sit up from the dark floor and look around. It seems like you're in the middle of an endless darkness. It flows around you in the form of a mist. The sound of rattling chains comes closer. Desperate voices beg for mercy and scream for help all around you. It makes you nervous and paranoid.\n   *goto Secondfailcont\n \n \n #Run after the woman into the warehouse.\n  You get through the smoke as fast as you can and rush down the small hill after the woman. Her black, ripped robe waves after her as she jumps over a car and dashes into the warehouse through a huge hole in its metal door. You follow her and jump through the hole. The warehouse is huge and empty. The sight of shelves and crates scattered around quickly reminds you of the past. You can only hear her footsteps for a couple of seconds, then she goes quiet. You suspect she might have hidden somewhere, preparing an ambush.\n  \n  Your mission is clear, and you're confident in your skills.\n \n \n  *if (stealth)\n   *set Secondmission true\n   \n   Carefully, you put one leg after the other, stepping over glass shards and wooden pieces. You sneak between shelves and climb under debris so quietly that it draws a small grin to your face. You hear someone quietly breathing near you, on the other side of a huge shelf. You carefully climb the shelf and look down from the top of it. The woman is sitting there holding a small pistol. Its barrel is wide open. \n   \n   She pours glass shards and debris into the tube on top of it. You climb halfway down and drop next to her. With a swift move, you pull your ${weapon} out and put the end of it to her cheek. She looks at you from the corner of her eye and drops the weird-looking pistol. Something covered in a dirty grey cloth is behind her, placed on a shelf. She carefully picks it up while keeping eye contact with you. She drops it in front of you and gulps.\n   \n   \"Please just…let me go. I know you have clear orders, but so do I! I'll disappear, you won't hear from me again. I give up on finding the Oracle. No one will find out. You have what you need, please!\" she begs, her fingers interlaced.\n   \n   \n   *choice\n   \n    #Kill her with her own weapon.\n     *set Equipmentperson \"Dead\"\n     *set Evil %+5\n     You pick up the item from the ground and stuff it into your back pocket. You pick up her pistol with a cold face and aim it at her
