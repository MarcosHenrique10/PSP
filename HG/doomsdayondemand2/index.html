. \"N—no! Please, don't! I'll do anything you ask!\" she begs and sniffles as you aim it at her head. You squeeze tighter on the trigger. The barrel of the pistol explodes, sending a nasty mixture of debris and glass shards into her face. \n\t \n     Her head snaps back, and blood splatters around. She slides down the shelf with glass shards sticking out of her head. You drop the weapon with the exploded barrel on her and make your way out of the warehouse. You find ${General} and ${Assassin} standing outside with two white blankets.\n     *goto warehousecont\n    \n    \n    #Let her live.\n     *set Equipmentperson \"Alive\"\n     *set Evil %-5\n     You pick the item up from the ground and stand up. You look at her for a second, then without a word, you make your way outside. You climb the same debris but don't care about the noise anymore. \n     \n     \"Thank you! I'll never forget this!\" she says, and you hear her footsteps getting further away from you.  After you get out, you meet up with ${General} and ${Assassin}. \n     *label warehousecont\n     \n     \n     \"Well, look who's back. And with the item. Good. Let's go back, shall we? We'll get rid of these rogues some other time,\" ${General} says and takes a few steps forward.\n     *goto Secondsuccesscont\n   \n   \n   \n  *else\n   *set Secondmission false\n   *set Equipmentperson \"Dead\"\n   *set glasswound true\n   As careful as you can, you put one leg after the other. You see her stuffing glass shards and other debris into a weird-looking pistol before she makes a turn at the far end of the warehouse. You quicken your pace, making your way between two narrow shelves. As much as you'd like to avoid stepping on glass shards and other debris, you can't seem to avoid all of it. They crackle under your feet when you reach the end of the warehouse. You grip your ${weapon} and turn left, getting ready to attack. You find no one there, but a firm grip on your shoulder turns you around. \n   \n   She's holding a hand-made rusty pistol with a long, wide barrel. Before you have time to react, she pulls the trigger. Glass shards and other scraps burst out of the barrel, exploding it. They sink into your chest, and you fall back on the ground. Your ears ring, and you struggle to breathe as blood flows from your wounds and mouth.\n\n   \"I'm sorry…I'm so sorry…you're just a kid…why did you make me do this?\" She kneels down next to you and takes the item covered in a dirty cloth from the shelf behind you. \"You shouldn't have joined the bad guys…you don't deserve this.\" She looks up and runs away.\n   *page_break \n   \n   \"And here we are again. Why are you so keen on collecting scars, huh? I mean, just to impress ${Roommate} or ${Roommate2}…yeah, I've seen the looks you share with one another.\" ${Capturer1} walks around, the glass shards and screws popping under his boots as he chuckles. \"Don't become careless. You've been doing decent on your own. Think before you act. Use your head.\" He walks next to you and smirks. \"Kiddo, kiddo…every time you're at death's door, a part of you stays there. Forever. But it's over now, kiddo. You can't avoid death forever.\" He keeps looking at you until you close your eyes.\n   *goto oa\n   \n \n\n\n*label Secondsuccesscont\n*page_break \n*achieve secondmission\n*set Keith %+5\n*set Gannon %+5\n\n\"So…what I have in my hand are useful notes regarding our ultimate goal. What you have in your hand is a Geiger counter, as mentioned back at HQ. But…no idea what ${Assassin} has,\" the General says as ${Assassin} rolls a small, shiny, black-and-red ball. \"Anyway, today's mission was easy. And well done, rookie,\" ${General} says and pats you on the back lightly a few times. \n\n${Assassin} grunts, and you walk through the district. The district is empty, and the sun shines bright. It hasn't been this bright since the days before the bombs fell. It even warms your insides and brings happy thoughts into your head. It's a good feeling. Scary to feel like accepting the whole destroyed world, but definitely a good feeling. \n*goto cont\n\n\n   \n   \n*label Secondfailcont\n*page_break\n*set Keith %-5\n*set Gannon %-5\n*set newwound true\n\nYou blink a couple of times and see the sun shining so brightly, it warms your whole back. You haven't seen the sun shine this bright for a long while now. It makes the whole destroyed world look acceptable, and almost beautiful.\n\n\"So, you're awake. You can come on your own now,\" ${General} says and drops you on your feet. You feel dizzy, and it takes a second to catch your breath. Your wound is patched up and bandaged neatly. Blood appears on the dirty bandage, but it doesn't leak through. \"We've managed to get a Geiger counter and…something else,\" ${General} says as ${Assassin} rolls a small, shiny, black-and-red ball. \n\n\"Also, thank ${Assassin} for patching you up before I got here. You know, if I want to be honest, I'd have just let you die there. Like that person you were chasing. We didn't find the equipment on the body, though,\" he mumbles, then yawns. \"The sun is really weird now. We should get home, I don't like this.\" He quickens his pace, and you have to try hard to keep up in your condition. \n*goto cont\n   \n \n\n*label cont \n\n\"So…do you think any of this will help us get closer to the…target?\" ${General} turns his head slightly, looking at you, then back at ${Assassin}. He shrugs and looks at you as well. \"Well…it doesn't matter. Our great leader is determined to find its location. Sooner or later, it'll happen. Hopefully with our help. And then we'll never have to leave the city anymore…everything will be united under our command,\" the General continues as you reach the district's borders, leading up to the forest where you first met. \n\nYou begin to walk uphill as the sun begins to shine even more. The heat becomes unbearable, and you have to stop. You fall on your knees, but the General and ${Assassin} have to stop as well. You pant heavily but still feel joy filling your whole body. You smile as you roll up the black sleeves of your shirt.\n\nYou stay on the ground for a while, and none of you want to move. After a short while, a figure appears at the top of the hill. You glance up to find ${Roommate} standing up there. She begins to walk down, her hands in her pockets. ${Assassin} looks up and crawls further up the hill. You want to follow him, but euphoria fills your body.\n\n\"Well…? What are you doing crawling on the ground?\" She scratches her cheek as she walks further down, then stops in front of ${Assassin}. \n\n\"I…go back. Not safe,\" ${Assassin} mumbles in his deep, scratchy voice.\n\n\"Duh…I'm tired of mending the plants and stuff like that. It's boring. You promised to take me away from there! You also promised to train me, take me with you on your missions!\" She begins to back away with an angry look on her face, and ${Assassin} crawls after her slowly.\n*page_break\n\n\"She's right, you know. You made a promise…${General}.\" A tall woman walks behind the two of you and crosses her arms. \"You said we would leave this damned place…as soon as possible.\" She frowns and combs her long, black hair back.\n\n\"I…I know, but…things didn't turn out that way…then you just…\" the General mumbles, looking back at her.\n\n\"Just what? You still broke a promise. I'm leaving now, ${General}. With or without you.\" She turns around and begins to walk away. You look down as they get further away from you.\n\n\"Yeah…talking about promises…you also promised to rescue me from harm's way.\" You look up to find ${currentbf} standing in front of you. \"You promised so many things…what have you done to save me? You didn't even try! Nothing else ever mattered but you!\" ${currentbf} tosses a small, rusty gun and one bullet for it. \"Do what you have to do…you don't deserve to walk the earth like this, leaving so many in pain and agony. You know that as well. And don't lie…you've been thinking about it. And besides, everything will be better for you if you do it. I'm telling you!\" ${Currentbf} crosses ${hisher} arms and looks at you. You grip the weapon with shaking hands and load the ammo into it.\n*if (ch3d)\n *label re\n *page_break\n *achieve firstdeath\n [i]\"You are like him. But the dead should stay dead. Yet you've returned. Or have you? Do you open your eyes for the truth there?\"[/i] You avoid making eye contact in the cold emptiness, but the purple eyes keep staring at you. Your body aches under your clothes. You scratch your body, but there's barely any meat left on your rotten bones. Your breath stops. You peek under your shirt. The skin is dried on your pale, dark-blue ribs. You panic and scream, but looking into the purple eyes calms you immediately.\n *goto choi\n*else\n *goto choi \n \n*label choi\n*page_break\n\n\"Fine, if you don't want to do it, I'll do it. Hand me the gun. That's the last thing I'll ever ask you.\" ${currentbf} stands in front of you, ${hisher} arm reaching out to you.\n*temp shot \"0\"\n\n*fake_choice\n\n #Shoot ${currentbf}.\n  *gosub trial_end\n  *set shot \"1\"\n  You raise the weapon and shoot through ${currentbf}'s head, and ${heshe} falls back. The lifeless body of ${currentbf} slides down until it reaches you. You keep looking in ${hisher} cold, dead eyes as blood soaks the earth.\n  \n  ${assassin} turns towards you, then keeps staring at the lifeless body of ${currentbf}. ${Roommate} steps closer and takes the long knife from his belt. With a swift move and a cold face, she thrusts it down ${assassin}'s back. His eyes widen before his head snaps down into the grass. \"That's what you get for lying to me, silly.\" ${Roommate}'s eyes snap towards you. \"${Firstname}! You killed your best friend! How could you do that?!\" ${Roommate} walks closer to you, the shiny knife still in her hand, and tears roll down her cheeks. She sniffles as she quickens her pace. \n  \n  \"I…I can't feel safe with…with a murderer!\" She raises the knife just as ${assassin} growls and sits up. He takes out both of his pistols and fires at her. ${Roommate} falls to the ground in front of you, but keeps looking into your eyes. Her breathing rattles, and blood flows out of her mouth. ${Assassin} stands up and empties the magazines into her.\n\n  He reloads them as the woman in front of the General turns towards you. She covers her mouth and kneels down to hug ${General}. \"Oh my dear…they'll kill me! Your friends aren't even your friends! They're murderers…save us…save us, and let's leave this wicked place!\" She sobs and grips the clothing on his back. ${Assassin} walks closer, limping on one leg, and kicks the woman off. \n  \n  \"No! Leave her alone, are you mad?!\" ${General} stands up and reaches for his weapon, but ${assassin} twists his arm and pushes him to the ground. He aims one weapon at him and empties the magazine of the other into her. The General lies on the ground and keeps looking at her with tears running down his cheeks. \"W—why?\" he asks, looking at ${assassin}.\n  \n  \"Tricksters.\" He points to the ground where the corpse of ${currentbf} used to lie. Instead, a monster with long claws, huge fangs, and deep, dark-red eyes lies there in a puddle of blood.\n  \n  \"They…used to transform back immediately…that's why I thought…\" the General mumbles.\n  \n  \"They're adapting.\" ${assassin} holsters his weapon. He kneels down, rips the knife out of ${Roommate}'s hands, and sheathes it. \"Good job,\" he mumbles at you, then begins to head up the hill.\n  \n  \n #Shoot ${Roommate}.\n  *gosub trial_end\n  *set shot \"2\"\n  You raise the weapon and shoot through ${roommate}'s head. Her head snaps back, and she slides down the hill, landing next to ${Assassin}, her blood soaking his clothes. ${assassin}'s eyes widen as he slowly reaches towards her. The General glances at you, then frowns.\n  \n  \"You're a murderer! See? That's why I told you to do humanity a favor!\" ${currentbf} walks closer to you with clenched fists. \n  \n  \"Don't care about them, they're just a bunch of losers! Come with me, let's leave this place like you promised!\" The woman stands in front of ${General} with crossed arms.\n  \n  \"You aren't her…she's long gone!\" He stands up and sends a bullet through her head. She screams and falls back, then twitches for a second.\n  \n  ${Assassin} stands up, but keeps looking down. He breathes furiously and looks at you. He takes the long, sharp knife off his back and dashes towards you, cutting ${currentbf} in half. As ${heshe} hits the ground, he keeps repeating your name. ${Assassin} raises it and slams it down, towards you. You barely roll away and  crawl backwards in order to be able to get up. He keeps walking towards you, but General ${General} stands between the two of you. \"Stop it! Don't be a fool, ${Assassin}!\" he says, trying to grab him, but ${assassin} swings his knife around. He jumps away, but raises his weapon.\n  \n  \"Don't make me shoot you! Just look!\" ${General} points to the ground where ${Roommate} was lying. She's been replaced with a creature with long claws, sharp fangs, and deep, dark-red eyes. ${Assassin} lowers the knife, then sheathes it.\n  \n  \"They're tricksters. And that's not how a professional acts…they never break their little act, you told me yourself.\" ${General} holsters his weapon and begins to walk up the hill. You get up from the ground and follow him quickly.\n  \n  \"But…they used to transform back instantly,\" ${assassin} mumbles as he slowly walks behind you.\n  \n\n \n #Shoot the woman.\n  *gosub trial_end\n  *set shot \"3\"\n  \n  You roll over and aim at the woman standing in front of the General. You pull the trigger, and the bullet goes through her head. She falls forward, right next to ${General}. Her blood soaks into his clothes, and he just stares at her.\n  \n  \"You're a murderer! That's why you should die! Humanity is better off without you!\" ${currentbf} clenches ${hisher} fists and walks towards you. A slightly distant voice screams, but gets closer and closer. When you look back, you see ${General} rushing towards you. He hurls himself on top of you and raises his fists, ready to hit you. You avoid or block his every attack and try to explain yourself in the process. You can't seem to shake off ${General}, no matter how hard you try.\n  \n  \"Yeah! Kill him! Get rid of the murderer!\" ${currentbf} cheers throughout the fight, especially when a punch hits your face and blood explodes from your nose. Your vision gets blurry, and you let your head stay on the ground. ${General} raises his arm again, but stops and looks into the distance. He gets off of you, then slowly walks away. You're too tired and hurt to be able to move. ${Currentbf} leans down in front of you and smirks before ${heshe} grabs your leg and begins to draw you away. Suddenly, ${heshe} falls. You turn your head to see ${Roommate} lying on the ground, with ${assassin} sitting next to her. Your vision clears as the General helps you up by your arm.\n  \n  \"I'm sorry…I got carried away…it's no fun when they play with your head.\" He pats your shoulder and heads toward ${assassin}. \"They were only tricksters, ${assassin}. We have to move,\" he says, patting him on the back as he walks past him. ${Assassin} keeps looking down and nods. When you're near him, he gets up and follows the General.\n\n \n *hide_reuse *selectable_if (ch3d = false) #Shoot myself.\n  *gosub trial_end\n  *set Deadcount + 1\n  *set ch3d true\n \n  You stare at the weapon, then close your eyes for a second to take a deep breath. You open your eyes and look at ${hisher}. A single tear rolls down your cheek as you lift the gun up and put the end of it against your forehead. Thoughts run through your head, but you realize ${heshe}'s right. You've hurt so many people, you've ruined so many lives. Intentionally, and unintentionally as well. \n  \n  Even though you know that this is the end of your life, you still smile as the tear drops from your chin to the ground. You tighten your grip on the trigger and close your eyes. The last thing you hear before the gunshot is a voice shouting your name.\n  *goto_scene gameover\n  \n\n \n*page_break\n\nAs you keep walking up the hill in complete silence towards ${base}, the weird, happy feeling the sun has provided fades away, along with the extreme brightness of the sun.\n\n*if shot = 1\n \"I'm…sorry for acting out. Won't happen again,\" General ${General} mumbles as you arrive at the gates of ${base2}.\n\n \"Hope so,\" ${assassin} nods as you walk through, and then the gates slam behind you.\n \n \n*if shot = 2\n You arrive at the gates of ${base2} and stand next to each other before they open. \"You shouldn't have done that,\" ${Assassin} mumbles, pushing you forward to walk through the gates first. He follows you, along with ${General}, as the gates close behind you.\n \n\n*if shot = 3\n You arrive at the gates of ${base2} and stand next to each other as they slowly open. \"I don't know why you did what you did, but it could easily have gotten you killed. And next time, it probably will,\" ${General} mumbles as the gates open and you walk through. The gates slam shut, and you take a deep breath.\n \n \n\n\"Well…I think we should all take the rest of the day off. This has been…rather tough. It's been a while since we encountered one of the tricksters. And I suggest we don't speak about it. Ever again,\" the General says. Everyone agrees, and the three of you head in three different directions. You walk towards the chambers, feeling a little dizzy from the recent events.\n\nYou walk through the corridor and open the door to the chambers. To your surprise, you're all alone. You lay down and process the events you've been through so far. It's been a while since you had spare time to do whatever you want. You spend those couple hours thinking about the recent events. It proves to be peaceful. Your eyelids get heavier as time goes on. You don't know whether you've slept or not when ${Roommate} and ${Roommate2} enter the chambers, chatting away. \n*page_break\nThey freeze for a moment when they see you lying in the bed. They light a small candle and put it on the table, then hop onto ${Roommate2}'s bed and keep talking. You catch sentences about dinner, so you probably fell asleep and slept through dinnertime. You can't help but smile at the thought of having a good night's sleep for once. You keep lying there with eyes closed as they chat.\n\n\"${firstname}…\" ${Roommate2} stands up, and you look at him. \"Could you teach me how to shoot? I mean, properly. Bullseyes and such. If it's not too much to ask…\" He crosses his arms.\n\n\"Maybe in the future…they count the ammo,\" you mumble, rubbing your eyes.\n\n\"You know what? Forget it…you've only been here for a couple of weeks, and you're already acting like one of them. It was a mistake to even ask.\" He turns on his heels and storms out of the room, letting the door slam behind him. Silence falls on the room before ${Roommate} clears her throat. \"Forgive him…it's just some personal things he needs to deal with. As far as I know. He didn't really share much with me, but he seems to get excited when you go out. Even more than I do. And we had a weird day anyway.\" She looks from you to the door. You sit up and rub your eyes some more.\n\n*choice\n\n #Go after him.\n  *set Matt %+8\n  You stand up from the bed and walk out of the room, out into the dark corridor. You find him in the dark, cold, stinky kitchen. He's sitting at a table with his back to you, staring into the distance. You approach him slowly and sit down next to him. You sit in silence for a couple of seconds.\n  \n  \"I'm sorry. I shouldn't have done that. You seem like a cool guy. I'm sure you don't have bad intentions. It's just…I want to be able to protect myself. I'm a guy, I should be outside fighting.\" He moves his fingers around on the table. \"When everything went south, my parents and I fled and tried to fend for ourselves. I was, like…five or something. So I was kind of a burden to them in the middle of an apocalypse. We had a decent hiding place somewhere. I have slight memories of a farm. I remember, we slept every night in the basement.\" He taps his fingers on the table. \n  \n  \"In case someone wandered inside overnight. One day, I woke up to my dad picking me up. I remember we just ran. I don't know who or what was chasing us. When we reached the gate of this place, they sent us away. My parents begged them to take me in. They did. But I still see them holding their tears back and running away. I never wanted to grab a weapon or anything like that. So I began to work at the greenhouses, power plants…things like that. But I'm past that point now. I want to learn how to shoot. Then I'll find my parents, and whoever or whatever tore us apart will be punished. I mean, you were on your own for…how long?\" He turns his head towards you.\n  \n  \"Since the beginning. I had a couple of others teaching me at the start,\" you say as you look him in the eyes.\n  \n  \"So you could teach me. Because one day, when there's a slight chance, I'll leave and find my parents. No matter the price.\" He sighs and stands up. \"So…sorry. Even if you don't teach me how to shoot, I'll leave when I find the chance.\"\n  \n  \"No problem…but it's dangerous outside. Just so you know.\" You stand up and shrug slightly. He wraps you in a hug and smiles, then he pats your shoulder and heads towards the chamber. You follow him, closing the door behind yourself.\n  \n  ${Roommate} stands with crossed arms in the middle of the room. \"Let's sleep. There's work tomorrow. As always.\" He blows the candle out and climbs into his own bed. \n  \n  \"Night-night, then,\" ${Roommate2} says and climbs into his own bed as well. You do the same and close your eyes.\n  *goto sleep\n \n #Sit next to ${Roommate}.\n  *set Lily %+8\n  You stand up from the bed and walk over to ${Roommate}. She looks at you, and you sit down next to her. \"You know, if I had a chance, I'd leave as well. Sure, this community works. But our days are, like, eat work sleep and repeat. It's pretty boring. At least what you do has some fun in it. The constant danger, the adrenaline, the wounds…\" She looks away. \"Do I sound stupid? Are you tired of risking your life daily? How long have you been on your own?\"\n  \n  \"I've been doing it since the beginning. I had a couple of others teaching me at the start. But I don't know, you do what you have to do to survive. And they won't let me go, anyway.\" You shrug slightly.\n  \n  \"Yeah, that's the only thing holding me back from bailing. I mean, the whole have-to-do part. I suspect it would be worse somewhere else. There's nothing else keeping me here. My mother died when I was little. When this whole…thing happened. And my dad…well, he doesn't really care about me. At this point, I'll either become a soldier like you, or leave when I see a slight opening. What we do here is the same as being dead. Working like robots every day.\" She looks at you. \n  \n  \"Anyway…sorry for just dumping my problems on you. You seem to be a cool guy with good intentions. I hope I'm right about you. And don't mind ${Roommate2}. He's just been through some rough stuff.\" She stands up and stretches. You stand up too, and she turns to you. She wraps you in a hug, then smiles. She steps away and lets her arm slide off your shoulder as ${Roommate2} walks in.\n  \n  \"Let's sleep, there's work to do tomorrow.\" He blows the candle out and climbs into his bed.\n  \n  \"Good night then, guys…\" ${Roommate} climbs into her own bed, and you do the same. You turn onto your side and close your eyes.\n  *goto sleep\n \n \n #Lay back in my bed and sleep.\n  *set Matt %-8\n  *set Lily %-8\n  You shrug and lay back in the bed. You put your hands under your head and close your eyes. ${Roommate} shakes her head and leaves the room as well. You've dealt with so much in the past few years, you might have become indifferent in the dog-eat-dog world out there. People come and go, so you decide not to waste time and energy on anyone else tonight. You open your eyes to blow the small candle out, then lay back in bed. After a short time, they come back in the complete darkness. They talk for a short period of time, then climb into their beds.\n  *page_break\n  \n  \"The truth is, all you have is time!\" ${capturer1} is standing by your bed when you open your eyes. \"You just don't want to waste it on them. Which is good. Your time is valuable. Instead of trying to get a useless buddy, you could do something useful, like sleeping! I'll leave you to it. I have something else to do.\" ${capturer1} chuckles and quietly leaves the room.\n  *finish\n\n\n\n\n*label sleep\n*page_break\n[i]\"It will all collapse. You will be blamed for it. You will be punished for it. But you're used to it, aren't you? Like him, you've lost so much. And you will lose so much,\"[/i] the steady, quiet voice echoes from the deepest darkness. You're sitting in a chair, the black fog surrounding you. Your hands and legs are chained to the chair. Citizens from ${base2} surround you. Their eyes are black, and their heads are twisted, deformed.\n\n\"Murderer!\"\n\n\n\"Psycho!\"\n\n\n\"Sentence him to death!\"\n\nThey shout and throw rocks at you. Throughout your unbearable pain, the purple eyes just keep watching.\n*finish\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n  *label purchased\n  *return\nRemember earlier how we told you that the first three chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n  *subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2018-07-03 $4.99 $2.99 purchased\n*abort\n", "chapter4": "[b] Chapter 4 - Déjà Vu [/b]\n\nYou jump up from your bed, and pull the table with you as you fall on the floor. ${Roommate} and ${Roommate2} jump up from their beds and stare at you. \n\n\"Do you always have nightmares?\" ${Roommate} sits down on your bed and puts her hand on her chest.\n\n\"Who wanted to sleep anyway?\" ${Roommate2} shakes his head and gets out of bed. He dresses quickly, then walks out of the room.\n\n\"Yeah, uh, just…let's eat and do the daily work…\" ${Roommate} gets up, steps over you, and heads out of the room as well.\n\nYou sit on your own for a couple of seconds, then stand up. You smack you head on the bunk bed and take a deep breath. You put the table back in its place and open the door. You freeze, but slightly bump into ${General}.\n\n\"What's the hold-up? We're going to be late. Get yourself together and meet at the gates.\" He turns around and heads for the decontamination chamber. You glance into the dining room, where everyone is busy chatting and digging into their food. You put your gear and clothes on and head towards the decontamination chamber.\n*page_break\n\nYou step outside, and the decontamination chamber closes behind you. The wind blows heavily in the misty streets. The cold gives you chills and goosebumps almost immediately. Dark grey clouds cover the sun as you make your way down the muddy sidewalk. You find ${General} and ${Assassin} at the gates. \n\n\"Finally. You ready? I'll tell you the mission briefly on the way,\" the General says, and you nod. The General has a briefcase cuffed to his wrist and a small wire leading up his sleeve. You look from the wire to him. \n\n\"Don't ask.\" The General shakes his head. ${Assassin} tugs on his black scarf and grunts quietly. The guards open the gate and shut it behind you. You head for the forest and begin to walk up the small hill.\n\n\"So…today we'll go to a factory in the middle of nowhere. People have been holed up there for a while, until we raided it. We cleared it and declared it ours, but they took it back by force. Now our orders are to approach them peacefully and request a meeting with their leader, or whatever they have. And then ask them to work for us. Or we'll destroy them for good this time. It would be a shame, they have a real good greenhouse there.\" The General clears his throat. \n\n\"I don't even like the whole friendly approach. They stood against us, we should destroy them. But orders are orders, we try the friendly approach of…whatever its name is.\" He shrugs and puts his hands in his pockets.\n\n\"${base},\" ${Assassin} says in his deep, scratchy voice.\n\n*if (Question2)\n \"Hold on for a moment…you were there for a while, weren't you?\" ${General} asks, glancing over to you.\n *goto cont\n\n*else\n \"Yeah…what a weird name for a base. Whoever came up with it must have been out of his mind.\" ${General} chuckles and quickens his pace.\n *goto cont\n\n*label cont \n\nYou focus hard on not stopping where you stand. Your breath quickens as you keep up with them. You walk for a while through the misty fields and forests, until you arrive on top of a hill. It feels as if someone is sticking knives into your chest. The part of the district you've abandoned for years, now stands in front of you. ${Base} stands in the distance. You begin to walk down the hill. A strange feeling takes hold of you the closer you get. Memories flash in front of your eyes on the streets you've walked before. As you walk closer to its gate, a clicking sound comes from the two watchtowers guarding the entrance. ${base} has gone through some small changes. It's been expanded. The greenhouse is bigger, and the factory seems to be in somewhat better shape.\n\n\"State your business.\" A guard aims his submachine gun at you.\n\n\"We come in peace. To talk with your leader,\" ${General} says as all three of you hold your hands above your heads.\n\n\"Where from? You military?\" the other guard asks, pointing his rifle at you.\n\n\"${Base2},\" the General mumbles.\n\n\"You dare to show your faces here? Give me one good reason not to shoot you where you stand.\" The guard cocks his weapon.\n\n\"In this briefcase is a small but strong chemical bomb. It's attached to my chest. Should my heartbeat quicken to an abnormal rate or drop to zero, it explodes. If the wire gets cut, it also explodes.\" The General crosses his arms. The guard holsters his weapon. He climbs down the watchtower and opens the gate, by the side of a couple guards. You walk through the gate. They close it behind you, and you walk behind the guards. They lead you into the decontamination chamber. The memory of your first time setting foot in this chamber hits you. You can see yourself standing next to ${Bf1} and ${Bf2}, scared to death. \n*page_break\n\nYou step out of the chamber into the lobby. A lot has changed inside, but still nothing. You put your equipment and weapons down on the table by the stairs. You walk up the stairs. Your organs feel like they're stirring inside, and you're lucky the briefcase isn't attached to you. You reach the door that was once ${Capturer1}'s. The guard knocks, then opens the door. The guard begins to explain why the three of you are stand there, but his voice fades. You can't hear anything. A man in a long, black, raggy trench coat and ripped black jeans sits in the chair, smoking. ${Capturer1} leans against the window behind him, grinning at you.\n\n\"Did you actually check if they have a bomb?\" He puts the stub out and crosses his arms. The guard shakes his head, and silence falls on the room. \"Cool. Why would you make such a logical move, anyway?\" He runs his palm through his short hair and takes a deep breath. \"So, what can I do for you, Sons? I'm ${newleader}, by the way. And don't ask what it stands for.\"\n\n\"You've broken the rules set up by us. You've taken what is rightfully ours. I'm talking about this base right now.\" The General steps closer.\n\n\"I know exactly what you're talking about. I'm not like my guards. But it's a little rude not to introduce yourself after I generously did.\" ${Newleader} frowns slightly and puts his feet on the table. He's wearing black leather shoes.\n\n\"I don't need to until we have a deal. So, I'm offering you to be part of the Sons. You're large and productive. We'll take 75% of everything and guarantee protection for you and your people. We'll set up a safe road from this base to ours, making the first-ever safe pathway from ${base} to ${base2}. Guards will change shifts daily from this base and ours. Citizens can walk freely, and workers can help and replace each other. It's a generous and beneficial offer for both of us.\" The General smiles slightly.\n*page_break\n\n\"You know, I was part of your barbaric clan, or whatever you want to call it. That's why it was so easy to take this place. Your problem is that you're too greedy, my friend. Let's say you came up with 50%, I'd have said okay. But no, you're too greedy, and over your head.\" ${newleader} stands up and slowly walks around.\n\n\"Ain't he a good guy. Much like me! Thought I'd have put you in chains by now.\" ${Capturer1} sighs and shakes his head.\n\n\"I could easily take you out to the fields with a couple of expendable rookies and order them to kill you. But I'm not that barbaric. Instead, I'll make a counter-offer. 25%, and we'll have trading allowed. It'll help our 'economy.' And no night shifts on that road. You're either that much over your head, or you haven't been out for the night before.\" ${newleader} chuckles.\n\n\"50% and we have a deal. Plus the protection goes both ways. If we're in dire need of help, you'll send your best men our way. And I might be old fashioned, but write this down in a contract of some sort. You know, just to have proof of our deal. If you can write, that is. Oh, and I'm General ${General}.\" The General puts his foot on the table and crosses his arms.\n\n\"You can try, but you won't get me angry, General. My intelligence is on a much higher level than yours.\" He winks.\n\n\"That's not quite right! Maybe if you…\" ${Capturer1} aims at you with his fingers. \"Boom! Pow! That's what I'd do. Then dump your bodies in the greenhouse. Such is the secret of good and healthy crops. Come to think of it, you never said our vegetables and fruits taste bad.\" ${Capturer1} laughs and looks at you. Your eyes widen, and you step back with a disgusted look on your face. \n\n\"What's up with you, weird one?\" ${newleader} points at you.\n*fake_choice\n\n #Ask him about ${capturer1}.\n  \"I didn't know ${capturer1} was here,\" you say and look at him. ${newleader} frowns and steps closer. \"You…\" He examines you for a couple of seconds, then his frown fades into a small smile. He steps back and puts his hands in his pockets. \"He's dead. But your informations is right. He was here, once. Literally here, in this room.\" He winks at you and chuckles quietly.\n \n \n #Don't ask about ${capturer1}.\n  \"Nothing.\" You shrug slightly, and he frowns for a second. \"You…you're…\" He crosses his arms and examines you for a couple of seconds. \"You're weird. And young. That's all.\" He smiles and winks at you.\n\n  \n  \n\n\"So…that's all. We'll look around. You have paperwork to do, after all.\" General turns around and walks outside.\n\n\"Sure, feel free to take a look around. In fact, one of my guards will show you around.\" ${newleader} lets ${General} and ${Assassin} walk out of the room, followed by a guard. When you want to walk through, he steps in the doorway. \"I hope you came with good intentions, ${firstname}.\" He grins and walks after them like nothing happened. You stop for a moment, then follow them down into the lobby.\n\nThe tour around ${base} goes by fast. General and ${Assassin} seem to be bored to death, but not you. The sight of a perfectly organized and functioning kitchen, the people climbing out of the same place you'd been kept in, it all stirs your feelings. When you walk back into the lobby, a guard walks down the stairs with two pieces of paper. ${newleader} signs them and hands one over to the General.\n\n\"Two copies. That's how civilized we are, right?\" ${newleader} crosses his arms as ${General} turns around with one of the papers and nods. \"You're extremely confident about yourselves. The way you're so huge and undefeatable. You'll unite every living creature in every district under your command. And long may you reign. Is that what you think will happen? You'll rule civilized but stay merciless at the same time?\" ${newleader} continues.\n\n\"That's exactly how it'll happen. Just better. Not only the districts, we'll expand. We'll tear the walls down and expand far beyond them. Even where things are rumored to be fine. And we'll conquer them as well.\" ${General} turns around and smiles as he takes your equipment from the table. He puts his gas mask on and hands your own to you.\n*page_break\n\n\"A great leader once tried to do this. He wanted to conquer everything…to see people march under his own banner. He was a nice guy at first. Nothing like you, though. If it was still him standing in my place, you'd probably have been taken as slaves by now. Do you know where he is now? He's dead.\" ${newleader} smiles. \"Take care, Sons. Don't let the same thing happen to you.\" He winks at you and begins to head up the stairs. Halfway through, he turns around. \n\n\"Hold on a second, though. I really could use a hand until tomorrow. There are some things I could use some help with. One of you could stay, just to seal the contract. Or put it to a trial. Whichever you prefer. I don't know…do you think the kid could stay?\" ${newleader} points at you and tugs on his leather belt, revealing a handgun and a knife on each side.\n\n\"Sure…just to deepen our fresh relationship. But we'd like to get him back in one piece.\" The General crosses his arms. ${Assassin} grunts, and they turn their heads towards you.\n\n\"Well, good! I take it you're not so keen to stay behind as well, so I'll let you two go. Have a pleasant trip on the way back. And don't let the cat bite your tongue.\" ${newleader} winks at ${Assassin}, then turns around to walk up the stairs. ${Assassin} grunts and steps forward, but the guards stand in between you and push them into the decontamination chamber.\n  \n\"Have a pleasant trip on the way back, I'll return your partner tomorrow in good health. Goodbye, Sons.\" ${newleader} smiles as the doors of the decontamination chamber shut tight.\n*page_break\n\n\"So, now that we're all alone, you can share how homesick you are, I won't judge.\" ${newleader} turns around with his hands in his pockets and walks towards the living chambers. You follow him, talk along the way. \"I'm not going to lie, you surprised me. At first, I couldn't place you. You were so familiar. Then I put it together. You caused many surprises. Mostly by staying alive. Then I kinda lost track of you, with all the chaos. Then those guys came, annihilated everything, took the place. But I shrugged and took the place back. That's exactly how it went. And now I'm here, and I don't plan to go anywhere soon. That's my story in a nutshell.\" He smiles and turns towards you as you stop at the far end of ${base}. \n\n\"Now, what's your story?\" he asks as you get into a smaller decontamination chamber.\n  \nYou tell him as briefly as you can what you've been through. You leave many parts out, especially the events you find hard to talk about. He nods as you finish your story and step out of the decontamination chamber. A small greenhouse, power plant, and guards can be seen all around.\n  \n\"Interesting. You're one of a kind. Now, up we go. Let's continue on the roof,\" he says and begins to climb up a rusty, creaking ladder. You follow him and arrive on the roof.\n*page_break\n  \nAs you arrive upstairs, he walks to the edge and lies down next to a blanket, next to the huge chimneys spewing black fog out. He pulls the blanket away, revealing a silenced sniper rifle with ammo next to it. \"Come.\" He pats the spot next to him and grabs the sniper rifle. You lie down and look at him.\n  \n\"I turn my mind off like this. This is one of my favorite weapons. The ammo is designed to explode half a second after impact.\" He loads the rifle, and after a moment, he pulls the trigger. You see a skinless creature wandering around in the distance. It stumbles back and reaches for its chest, then explodes. Flesh and blood splatters on the trees around it as its severed legs just drop sideways. He hands the rifle to you, and you load it. \n\n\"This hobby of mine is very environmentally friendly and takes my mind off about what just happened. I won't let your pals take me for a fool. I'd sooner take matters into my own hands,\" he says as you pull the trigger, making an Aviatrix eplode in the air.\n  \nHe chuckles as you hand the rifle to him. \"Make no mistake, though. I won't be like ${Capturer1}. It's a shame people only know him after he went mad. He was a genius though, he built and organized a factory with nothing in it. Then something snapped in him. He was still a genius, but his crazed views blinded him. Sometimes I wish he was still alive. Funnily enough, I'd ask him for advice every now and then.\" He pulls the trigger, then hands the rifle to you. \n\nYou keep talking and shooting until dusk, but you try to avoid talking about ${capturer1}. When you can barely see through the scope, he puts the rifle back under the blanket and you head down the ladder and back to the base.\n*page_break\n\n*if (Ivanend) or (deadend)\n *set Fsurv \"Ivan\"\n *set Fheshe \"he\"\n *set Fhisher \"him\"\n *set Fhimher \"him\"\n You walk into his office, and he offers you a seat at his desk. You sit down and follow him with your eyes as he walks around. He takes two glasses out, with a small bottle of whiskey. He puts one in front of you and pours it into both glasses.\n   \n \"Well, drink up. Don't be rude,\" he says and sits down on the desk. You take a small sip, then look at him. \"You know, kid…now I remember. And I feel like some brainless creature because it only just popped into my head after all this time with you.\" ${newleader} shakes his head and shrugs. \"Silly me. I've only just realized that you were ${capturer1}'s sidekick. Until the point your fresh new buddies raided the base for the first time. I do believe that's about the time ${capturer1} died.\" \n \n He swallows the last remaining drops of whiskey from his glass and puts it down on the desk gently. \"Which reminds me, I never really told you how he died, did I?\" He raises his eyebrows, and you shake your head. \n   \n \"Well, it's about time then. The Sons captured him and brought him back. He killed a big chunk of them before they caught him. They tortured and interrogated him, and even considered recruiting him since he was such a good fighter. But they found him mentally unstable. So they decided to just execute him. Now, I don't know if it was just my mind playing tricks on me, but I swear he stood up after they shot him in the head. He even spoke to them. The second bullet finished him off, though. Until this very day, I don't know how to feel about that…\" He spins the glass around slowly, then turns to you. \n \n \"Now, I know what kind of person ${capturer1} was. But…I'm not sure what kind of person you are. Are you one of those people? Who just tend to be with the right group at the right time? You know, those backstabbing creatures?\" He nods slowly.\n *fake_choice\n   \n  #\"He was the one backstabbing me.\"\n   \"Well, that would be typical ${capturer1}. As I said, you might have liked what he used to be. I did, too. But not everything. I'm a man of my word. I never straight-up lie. I advise you to do the same, and we'll get along fine. Especially if our plans align. Now, there's no real help here. Maybe when the time comes, I'll contact you. By that time, decide where you stand. With that said, let's go to bed like the proper gentlemen we are.\" He smiles and leads you out of his office. You walk down the corridor filled with chambers. \n   \n   \"You are kinda famous here, though. I mean, the people who survived remember you. They pass along your name in stories and so on. Their opinion about you though, I don't know,\" he says as he opens a chamber and hands you the keys. \"Just wanted to mention that. In case you didn't feel like locking your chamber.\" He shrugs and smiles, then slowly walks away. \"Sleep tight, ${Firstname}.\"\n   *label ivans\n    \n    \n   You close the chamber and lock it from the inside. The smell inside is weird, but at least it's big. There's a kitchen and a small bathroom in front of you, and a bedroom with a double-sized bed on your right. You kick your shoes off and jump into the bed. You shake your head as memories strike you. You chuckle when you think about the memories haunting you. You close your eyes to fall asleep, but you keep thinking about the past as you lie there with closed eyes.\n    \n   \"Kiddo! Welcome home!\"\n   *page_break\n     \n   You open your eyes to find ${capturer1} standing in the doorframe. \"Feeling homesick now, are we?\" He walks closer and puts his clean black boot on the bed, then rests his arms on his knees. \"Ah, so many memories tying us to this place. Right?\" He frowns, and you nod. \"Right! I think it was worth promoting ${newleader} to be the leader. Have you ever faked your own death, kiddo? Have you?\" He leans close, a creepy grin appearing on his face.\n    \n   \"No…bu-\" you begin, but he interrupts.\n\n   \"Well! You don't know how great it is. I'm just lying back, watching events unfold, and planning. Planning from early morning to late at night. And guess who's in my plans?\" He pokes you with his elbow. \n   \n   \"If only you knew what's going on around you. Things you have no idea of happening. Things you would never imagine. Just keep in mind, kiddo…that when the time is right, I'll be by your side. Hey, that even rhymed. Ah, the joys of being awesome. Let's do…you a favor, and don't tell anyone I've been here.\" \n   \n   He winks, then ruffles your hair before walking out of the room, shutting the door behind him. He leaves you in total darkness. You follow him immediately and open the door, but he's nowhere to be seen. You close the door again and lay down on the bed. You keep your eyes shut until you can finally fall asleep.\n   *goto morning01\n    \n\n    \n  #\"This is how the world works. Kill or be killed.\"\n   \"Well, is that so? Do you know what the main difference is between the animals, in fact, the creatures that run around outside, and us, humans? That we can control our actions. They cannot. There are many people who can't, though. They act out of instinct. They're probably scared, so they do what would benefit them greatly. They would turn their backs on their friends, family…just like animals. I believe we aren't on the same page, ${firstname}. There was no particular reason behind your invitation than to maybe find a worthy ally. Maybe with time, you'll live up to the task. Let's go to bed, it's getting quite late.\" He looks into your eyes and opens the door. \n   \n   You walk down the corridor filled with chambers. \"You're kind of famous here. The people who survived remember you. Their opinion though, I would say not too good,\" he says as he opens a chamber and hands you the keys. \"Just wanted to mention that, in case you didn't feel like locking your chamber.\" He shrugs and forces a smile. \"Have a pleasant sleep, ${firstname}.\" He turns on his heels and walks away.\n   *goto ivans\n  \n  \n*if (Lizzieend)\n *set Fsurv \"Lizzie\"\n *set Fheshe \"she\"\n *set Fhisher \"her\"\n *set Fhimher \"her\"\n  \n As you walk through the building towards his office, he continues sharing his opinions about leading ${base}. You would say you have a pleasant chat. You reach the lobby and have a laugh. You're about to walk up the stairs to his office when a voice calls your name from behind.\n   \n \"${Firstname}…? Is—is that really you?\" a familiar voice says, but you can't quite place it. You turn around, frowning. Your eyes widen and your breath stops when you see ${survivor3} standing in the doorframe. You freeze and blink as you fill up with emotion. You both stand and look at each other without a word, until ${Fheshe} begins to walk towards you in silence. Tears roll down her cheeks as ${Fheshe} gets closer, then wraps you in a hug, trapping your arms. She hugs you so tight, it begins to hurt your chest. \n \n \"I thought I'd never see you again…\" she mumbles.\n \n You wrap your arms around her and squeeze her as hard as you can. Your eyes get wet, but you wipe them on her shoulder. She puts her palm on your head and rubs it gently. You stand there in silence for a while, just hugging. When you let go of each other, she keeps gripping your shoulders. \"${firstname}…if only you knew how much I've thought about you. I couldn't get away from the guilt. It was eating me inside every single day. I doubted my decision so many times, I…I even thought my protective instinct killed you. But I should've known better.\" She smiles.\n\n \"You're a warrior. Always have been. I won't push you away…ever again. I'll keep you safe, as I always should have.\" She smiles and sniffles, then looks into your eyes with her green eyes, which are even brighter than before. Her blonde hair has grown, and it reaches down her back. She's wearing a leather jacket and a yellow shirt underneath.\n *page_break    \n \"Well, I'm deeply sorry to interrupt, but I would have liked to have a word with the fresh recruit of the Sons.\" ${newleader} steps closer. ${Fsurv}'s eyes widen in surprise. \"I only wanted to say that there's no real help needed from your part here. I only insisted you stay in order to talk with you a little. Mainly because I won't stand as a puppet of your friends forever. And when the time is right, and our plans align, I could use an insider's help.\" ${newleader} looks from you to ${Fsurv}.\n     \n \"I—I'm sure he was only joining them to survive. He's a smart boy and has a heart of gold. He's not a bad person…he'll choose right.\" ${Fsurv} runs her hand through your hair as she steps closer.\n     \n \"Well, only time will tell…however, that's all I wanted to say in a nutshell. I'll leave the two of you now, I bet you have quite a bit to talk about. Until your departure tomorrow, ${fsurv} is responsible for you.\" ${newleader} nods once, then heads up the stairs.\n   \n *page_break\n You walk back to her chamber in silence. She lets you go into her chamber and closes the door behind you. You take a look around while she locks the door. Her chamber looks nicely organized and reminds you very much of the first time you were in her room. In front of you stands a double bed, facing a television. Next to it stands a wardrobe, with a door leading through the kitchen to the bathroom.\n     \n \"Well, only privileged members can have their own television.\" ${fsurv} giggles. \"So, feel special. Hey, how about I [i]try[/i] to make some dinner for us? You can help me if you want, and we can chat in the meantime,\" she says and nervously walks into the kitchen with you. She takes vegetables and a small slice of meat out of the fridge, then places the ingredients on the counter. \"You've…grown. Obviously, years do that, but I mean…do you get what I mean?\" She places a small, dirty pan on the stove and looks at you nervously. A slight smile appears on your face, and you nod.\n *page_break\n She cooks various vegetables with a slice of meat and talks about her life from the moment she left you. She takes two cracked plates from the top shelf, and halves the food between them. Somehow, you get a bigger chunk from both the meat and the vegetables. You raise your eyebrows, but she shrugs and smiles. You walk back to the bed and drop down on it. She turns the television up, and the news starts to play. \n \n \"[i]\"And once again, we advise citizens to vote for the worst shop in the district's monthly event. It will be beneficial for those who vote on the winner…\"[/i]\n     \n \"Well…same old records. But it's good, you know. Sometimes they show a view from above…or question citizens. It's…fun. I guess,\" she says and begins to eat. You get through the food quickly. It's not much, but you've still gotten the bigger portion. She takes your plate and gets up. She walks into the kitchen quietly and puts it on the counter. She turns around and leans against the doorframe with her arms crossed. \n \n \"I know I apologized earlier, ${firstname}, but…I'm sorry. Doing what's best for someone you love or care for doesn't always make them happy.\" She looks down. \"I have a bottle of very old whiskey around here somewhere. We could celebrate our reunion. And I could use a drink, honestly. What do you say?\" She looks at you and forces a smile.\n     \n *fake_choice\n     \n  #Drink.\n   *set Lizzie %+3\n   \"Sure, why not,\" you reply and shrug slightly. She forces a smile and disappears into the kitchen. Minutes later, she returns with a dark-brown, half-empty bottle. \"I don't really have anything to drink out of, so we'll take turns.\" She brushes her long hair away from her eyes and drops down next to you. She unscrews the bottle and takes a sip, then hands it to you. You take turns drinking as you chat. The tape in the television plays everything from news to cartoons. You drink and chatter away, laughing every now and then. When you're out of topics to talk about, you decide to go to bed.\n       \n   \"Shame you have to leave tomorrow.\" She pulls the cover over herself. \"I know there's no other way, especially now…but I don't have to wait years to see you again. Sleep tight, ${survivor3bro}.\" She kisses the top of your head, then rolls onto her side. You're not sure whether it's just the effect of the drink or you heard it right, but you stop dwelling on it rather soon and fall asleep.\n   *goto morning0\n       \n      \n      \n      \n  #Don't drink.\n   \"I don't drink alcohol,\" you reply and shrug slightly.\n\n   \"That's all right.\" She forces a smile and sits down next to you. You keep watching the television for a while. It plays news and movies from leftover tapes. \n       \n   \"I wish you could stay here. I know it's impossible, especially with the current state of things. I just hope I don't have to wait another couple of years to see you again.\" She looks at you and smiles. She brushes her long hair away from her eyes and wipes a tear away. \"Anyway…maybe in the future you'll have the chance, you know. ${newleader} might count on you. I'm not telling you what to do, but…he's not like ${capturer1}, but I think you know that already. He's actually…quite a nice guy. Someone sane is actually in charge, for a change.\" She tugs her sleeves up, and you keep talking for a while. \n   \n   You talk about the past years and share a laugh every now and then. When you're all out of topics to talk about, she drops back on the bed. \"I think we should sleep. You have to leave tomorrow morning.\" She looks at you, and you nod as you lean back on the bed.\n       \n   \"Sleep tight, ${firstname}.\" She smiles and rubs your cheek carefully, then turns onto her side. It draws a smile to your face, and you pull the covers over yourself. It doesn't take long to fall asleep.\n   *goto morning0\n       \n\n\n*if (Ryanend)\n *set Fsurv \"Ryan\"\n *set Fheshe \"he\"\n *set Fhisher \"his\"\n *set Fhimher \"him\"       \n As you walk through the building towards his office, he continues sharing his opinions about leading ${base}. You would say you have a pleasant chat. You reach the lobby and have a laugh. You're about to walk up the stairs to his office when a voice calls your name from behind.\n   \n \"${Firstname}…? What are you doing here?\" a familiar voice says, " ${fsurv} comes closer and wraps his arm around your shoulder. \"Man…a couple of years ago, I couldn't do this. What are you eating, mutant meat?\" He laughs as you walk down the corridor through the kitchen, until you reach a set of chambers left and right. He walks to the door in the middle and unlocks it. You walk inside, and he locks the door behind you.\n *page_break\n   \n A small, dark living room with two couches comes into view. In front of them stands a table, and there are shelves on the wall holding board games. To your left is a bathroom, and to your right is a small kitchen, which seems to be abandoned by the condition in it.\n   \n \"Well…make yourself at home.\" He laughs as the light flickers on, only slightly illuminating the chamber. You both walk inside and sit down on the couch. From there, another room opens, next to the shelves, leading into the bedroom.\n   \n \"So…I still can't get past the fact that you're alive. I thought I'd sent you to your death…I felt horrible. Especially how I…lost it in the end. It was horrible…you can't imagine the feeling of trying to satisfy everyone's needs, but they just ask for more and more…\" He looks down for a moment, then looks back at you. \n \n \"But…you're alive and well! And you look better than ever. Man…I told ${newleader} all about us.\" He stands up and keeps talking as he walks into the kitchen. After a minute, he comes back and puts a plate and a glass in front of you on the table. The plate has a cold block of vegetables on it.\n   \n \"Well, my cooking skills are very…limited…\" He sits down next to you and puts a glass in front of himself, along with a bottle of brandy. He pours some into your glass, then into his own. \"So…tell me what happened since the last time we met. Also…drink up, buddy,\" he says and chugs the brandy down, then pours into his own glass again.\n *fake_choice\n   \n  #Drink.\n   *set Ryan %+10\n   You sip the bitter brandy as you tell him everything that happened up until this moment. It takes a good while, and you empty a couple of glasses in the process.\n   *goto Ryan2\n     \n    \n  #Don't drink.\n   \"I don't drink alcohol,\" you say, and he pulls the glass in front of himself. You lean back and begin to tell him everything. It takes a good while, and he empties a couple of glasses in the process.\n   *label Ryan2\n     \n   \"Well…wow. You're a true survivor. I think ${newleader} noticed that as well and sees potential in you. I really wish you could stay…but I also understand it's not possible yet. I don't want another ${capturer1} situation, though. But ${newleader} is different. Anyway, after you escaped, I got captured by the Sons. They kept me locked up for weeks. Just before my execution, ${newleader} and his gang broke in and overthrew them. The fact that I'm able to sit here and have a chat with you right now is all thanks to him.\" He pours the remaining brandy into his mouth and looks down for a couple of seconds.\n     \n   \"Bottom line is, I'm glad you're not dead, buddy. I have this weird feeling…you know. That I have to take care of you. Like you're my last remaining family. It's funny, in several ways…you're not my family, and the last thing you need is protection. Heck, maybe you need to protect me.\" He chuckles, then you look into his tipsy, wet eyes. \"We should get some sleep, what do you say?\" He stands up and runs his hand through his hair. You stand up and nod, then stretch your arms. He escorts you to the bedroom, and you stop by his messy bed. \n   \n   \"You can sleep here. Sorry about the mess, I wasn't expecting anyone. I'll sleep on the couch,\" he says, and before you have time to reject his offer, he wraps you in a hug. \"Sleep well, ${firstname}.\" He backs out of the room and closes the door, leaving you in complete darkness. You fall onto the bed and stare at the ceiling for a while before you shut your eyes and fall asleep.\n   *goto morning0\n     \n\n*if (Malcolmend)\n *set Fsurv \"Mal p well, ${firstname}.\" He rubs your shoulder, then turns around to sleep. You keep lying in bed, staring at the ceiling as ${fsurv}'s snoring slowly intensifies. Eventually, your eyes close and you finally fall asleep.\n   *goto morning0\n     \n     \n     \n    \n*if (aloneend)\n *if Currentbf = \"Bradley\" \n  *set Fsurv \"Bradley\"\n  *set Fheshe \"he\"\n  *set Fhisher \"his\"\n  *set Fhimher \"him\"    \n  *goto longtime    \n *elseif Currentbf = \"Abbie\"\n  *set Fsurv \"Abbie\"\n  *set Fheshe \"she\"\n  *set Fhisher \"her\"\n  *set Fhimher \"her\"      \n  *label longtime    \n    \n  As you walk through the building towards his office, he keeps sharing his opinions about leading ${base}. You would say you have a pleasant chat. You reach the lobby and have a laugh. You're about to walk up the stairs to his office when a voice calls your name from behind.\n        \n  \"${Firstname}…oh my goodness!!\" a familiar voice says, but you can't quite place it. You turn around, frowning slightly. Your eyes widen and your breath stops when you see ${Fsurv} running towards you, and without hesitation, wrapping you in the tightest hug you've ever felt. You freeze and blink as you fill up with emotion. You wrap your arms around ${fhimher}, and you keep squeezing each other for a while. When you let go of each other, ${fheshe} wipes the tears away. \"You're alive? You are alive!\" ${fsurv} shakes ${fhisher} head, looking deep into your eyes. \n  \n  \"I can't believe it! I cried so much! I thought you were gone for good!\" ${fsurv} laughs with tears in ${fhisher} eyes. You notice there's a scar running across ${fhisher} left cheek, up to ${fhisher} eye.\n     \n  \"Well, I'm deeply sorry to interrupt, but I would like to have a word with the fresh recruit of the Sons.\" ${newleader} steps closer. ${Fsurv} frowns, then crosses ${fhisher} arms. \"I only wanted to say that there's no real help needed from you here. I only insisted you stay in order to talk with you a little.
