           #\"No way!\"\n                            \"No way!\" Your reply. \"You can't just kill yourselves!\"\n                            *line_break\n                            \"I should have been already killed with my brothers when they broke in. Just leave!\"\n                            \n                            Miller bites @{male his|her} lip. \"Come with me.\" @{male he|she} finally says \"That's an order.\"\n                            *line_break\n                            The soldier removes the pin from a grenade. \"GO!\"\n                            \n                            *goto millerrun\n                        #Run outside with Miller.\n                            *label millerrun\n                            You run together with Miller under cover fire from the two soldiers. As you run outside you feel the heat and shockwave of the grenade on your back.\n                            *set teamdead 3\n                            *page_break\n                            After the dust settles you walk back into the room.\n                            *goto killed1\n            *disable_reuse #Throw a grenade anyway, if the grenade lands inside the closet we should be safe and I'm the best thrower there is.\n                \"Miller!\" you shout. \"I'm going to throw a grenade into the closet!\"\n                *line_break\n                \"Are you crazy!?\" @{male he|she} shouts back while blindly firing another burst. \"You'll get us all killed!\"\n                *line_break\n                \"I can do it! I'm the strongest soldier you have, if anyone can throw a grenade inside it's me!\"\n                *line_break\n                *if strength >=80\n                    Miller looks at the distance between the closet and your position, bites @{male his|her} lip and then nods. \"Do it.\"\n                    \n                    You pull the pin and throw the grenade into the closet.\n                    *line_break\n                    The explosion is so deafening, that the few Sarians who weren't wounded by the shrapnel drop their weapons to grab their bleeding ears and ruptured eardrums. Even from where you are crouching, only by holding your fingers in your ears, have you managed to avoid such damage.\n                    \n                    Miller stands up and points @{male his|her} gun at the Sarians, giving them a chance to surrender.\n                    *line_break\n                    Defeated, those that can, stand up and raise their hands. They are lead to the other building where they join the previous Sarian prisoner.\n                    *goto killed\n                *else\n                    Miller looks at the distance between the closet and your position, bites @{male his|her} lip and then shakes @{male his|her} head. \"Don't do it. You'll get us all killed.\"\n                    *choice\n                        #Throw the grenade.\n                            Ignoring Miller, you pull the pin and throw the grenade.\n                            *line_break\n                            The grenade flies through the air, landing in front of a desk being used as cover by the Sarians.\n                            *line_break\n                            \"You idi-\"\n                            *page_break BOOM\n                            *set ending 11\n                            *goto_scene ending\n                        #Try something else.\n                            *goto idea\n            *disable_reuse #I have an idea.\n                *if intelligence \u003c=90\n                    No, you don't. (Needed 90 intelligence)\n                    *goto idea\n                *else\n                    You realize you don't actually have to throw a live grenade, only make them think you are. (Success! Needed 90 intelligence) (Intelligence +3)\n                    *set intelligence +3\n                    *line_break\n                    \"No time to explain! When I throw a grenade, charge at them! Trust me.\" you shout to Miller.\n                    *line_break\n                    \"Are you crazy?!\" @{male He|She} shouts back.\n                    \n                    You don't answer, removing a grenade from your combat vest and throwing it into the center of the room without removing the pin.\n                    \n                    \"Now!\"\n                    \n                    The Sarians shout to each other and stop shooting while they take cover behind the furniture.\n                    *line_break\n                    You use this chance to leap at them, spraying the crouching Sarians until none are alive. (Success! Needed 90 intelligence) (Intelligence +3, Miller +3)\n                    *set intelligence +3\n                    *set pcrel +3\n                    *goto killed\n*label killed\n*page_break\nYou walk back into the room.\n*label killed1\n\nCountless bodies, both Sarian and Regovian litter the floor, the stench of blood and gunpowder and singed flesh overwhelm your nostrils.\n*choice\n    #I'm going to be sick!\n        You run to the corner and vomit. You've never felt so repulsed in your life. ([i]Luf[/i] +1)\n        *set loyal -1\n        \n        *goto tunnel1\n    #Take a deep breath. This is the smell of war.\n        You take a deep breath. The smell of war will not break a Regovian Warden! (Loyal +1)\n        *set loyal +1\n        \n        *goto tunnel1\n*label tunnel\n*page_break\nLess than a minute passes and a tunnel hidden in a false back of a closet is located.\n\nFaraz, Miller and you enter the room where the tunnel has been found.\n*line_break\n*label tunnel1\n\"So this is the tunnel.\" Faraz says, @{teamdead walking into the room |stepping over the bodies of the dead Sarians |stepping over the bodies of the dead Sarians}. \"Miller, assemble your team ASAP. We will only have one chance to make this work.\"\n*line_break\n\"Roger that. We're already ready to go.\"\n*line_break\nFaraz slaps Miller on the back. \"Good luck.\"\n*page_break Into the breach\nThe tunnel is dark and narrow, allowing only one person to lead.\n*line_break\nMiller takes point while you stand directly behind @{male him|her}, a pistol and flashlight aimed over @{male his|her} shoulder.\n*line_break\nTo your dismay, the tunnel is so dark that even assisted by the flashlight, you can only see a few meters ahead before the small light is overwhelmed by the surrounding darkness.\n*line_break\nYou move your flashlight around, searching the walls for any clue as to where the tunnel leads. Unfortunately, the only thing you find is that the walls of the tunnel are lined with wiring of unknown purpose, you can only hope they are part of a lighting or ventilation system and not connected to any cameras or traps.\n\n\nThe team advances slowly, making sure not to trip any possible traps and keeping an eye out for an ambush.\n\nMiller stops abruptly and points to @{male his|her} right. \"A ladder. I bet it leads to the Sarian controlled houses. I'll try to get a look up there, be prepared to follow me.\"\n\n*page_break\nMiller climbs the ladder quietly. When @{male he|she} reaches the top @{male he|she} contacts you by radio.\n*line_break\n[i]\"We're lucky, get up here.\"[/i]\n\nYou climb the ladder. You find a short passageway leading to a closed door.\n\n\"Listen.\" Miller whispers. \"What do you hear?\"\n*line_break\nYou lean in, you can hear voices speaking in Sarian. Even without understanding the language, it is obvious the Soldiers on the other side are preparing for an attack.\n*fake_choice\n    #\"Sarian soldiers.\"\n        \"Sarian soldiers.\" You answer, unsure where Miller is taking the conversation.\n        *line_break\n        \"Correct.\" Miller nods,\n    #\"The enemy.\"\n        \"The enemy\" (Loyal +1)\n        *set loyal +1\n        *line_break\n        \"Precisely.\" Miller nods,\n    #\"Unsuspecting people.\"\n        \"Unsuspecting people.\" ([i]Luf[/i] +1)\n        *line_break\n        \"Hah! The element of surprise is our best friend.\" Miller grins,\nhanding you a grenade. I wanted to give you the honor of avenging @{male Abe|Mara}.\"\n*label yourright\n*choice\n    *disable_reuse #\"I can't just kill unsuspecting people. We need to give them a chance to surrender!\"\n        \"I can't just kill unsuspecting people. We need to give them a chance to surrender!\" ([i]Luf[/i] +5)\n        *set loyal -5\n        *line_break\n        \"Are you crazy? We can win the war with a single grenade and you want to risk it all so you can feel like you have some sort of moral high ground?\" Miller almost shouts.\n        *choice\n            #\"You're right.\"\n                *goto yourright\n            #\"I can win without killing.\"\n                \"I can win without killing.\" You announce, swinging the door open.\n                \n                The door opens into a room similar to the one you entered the tunnel through. The only difference is, this room is full of uniformed Sarians.\n                *line_break\n                The Sarians raise their eyes at you and freeze.\n                \n                *if speech >=85\n                    \"[i]Vakf! Yadk Lma'el![/i]\" You shout in Sarian. You hope they can't detect how scared you are.\n                    *line_break\n                    The Sarians turn to each other, still not daring to move.\n                    *line_break\n                    Suddenly, one of the Sarians steps forwards and points to the grenade in your hand.\n                    \n                    \"So you would kill us all together?\"\n                    *choice\n                        #Smile and pull the pin while keeping your hand on the lever.\n                            The Sarians eyes go wide and @{male he|she} raises @{male his|her} hands as high as @{male he|she} can while shouting to @{male his|her} comrades [i]\"Regovi metorl! Yadk lma'el!\"[/i].\n                            \n                            One by one, the Sarians raise their hands.\n                            *line_break\n                            \"You're fucking amazing...\" Miller whispers. \"I would have never believed it.\"\n                            \n                            After the Sarians are all tied up you make your way to the ruins of the building you had tried to breach. (Success! Needed 85 persuasion)\n                            *set ending 13\n                            *goto building\n                        #\"Yes.\"\n                            The Sarians smiles. \"I don't think you will.\" @{male he|she} raises a pistol and shoots you in the chest.\n                            *set ending 12\n                            *goto_scene ending\n                *else\n                    \"Hands up!\" You shout in the most threatening voice you can muster, hoping the Sarians don't detect how scared you are.\n                    *line_break\n                    The Sarians freeze for a moment before opening fire. (Needed 95 persuasion)\n                    *set ending 12\n                    *goto_scene ending\n    #\"For @{male Abe|Mara}.\"\n        \"For @{male Abe|Mara}.\" You say. (Loyal +2)\n        *set loyal +2\n        \n        You pull the pin and roll the grenade in quietly before running deeper into \n        *label deeper\n        the tunnel and thrusting your fingers into your ears.\n        *label boomom\n        *page_break BOOM\n        Even with your fingers as deep as you can push them, the sounds of the explosion still ring in your ears when you leave the tunnel and enter the room where the Sarians were.\n        \n        The room is an exact copy of the room you had entered the tunnel through besides being full of at least 30 dead Sarian soldiers. \n        \n        Miller walks up to the body closest to the door and kicks its head, sending the body flying almost a meter.\n        *choice\n            #\"What are you doing?!\"\n                \"What are you doing?!\" You shout, horrified.\n                *line_break\n                \"All it takes is one living Sarian at our backs to kill us all.\" Miller explains, @{male his|her} voice betraying no emotion.\n                *choice\n                    #\"Show some respect for the dead. We could just check for a pulse.\"\n                        \"Show some respect for the dead. We could just check for a pulse.\" ([i]Luf[/i] +3)\n                        *set loyal -3\n                        \n                        By the time the entire team enters the room, you and Miller had checked all the bodies for a pulse and found none.\n                        *goto kicking\n                    #Kick a body. \"I guess that makes sense.\"\n                        You kick the closest body, causing it to roll sideways. \"I guess that makes sense.\" (Loyal +3)\n                        *set loyal +3\n                        \n                        By the time the entire team enters the room, every Sarian body has been kicked by either you or Miller. When the team sees the carnage, they join in, finally given a chance to release all of their pent-up aggression.\n                        *goto kicking\n            #\"@{male He|She} could be faking, you need to shoot to make sure.\"\n                Miller smiles. (Loyal +10)\n                *set loyal +10\n                \n                By the time the entire team enters the room, the floor is awash with blood and your face and chest are splattered in gore. Who could have known blood and bone fly when bullets hit them? Miller promises to get both of you new uniforms in the next supply drop.\n                \n                At least now you are sure no one will shoot you in the back.\n                *goto kicking\n        *label kicking\n        *set ending 13\n        *goto building\n    #\"No thanks, you do it.\"\n        \"No thanks, you do it.\" ([i]Luf[/i] +1)\n        *set loyal -1\n        *line_break\n        Miller nods, taking the grenade back from your hands @{male he|she} pulls the pin and rolls it into the room.\n        *line_break\n        \"Now run.\"\n        *goto boomom\n    #Nod.\n        You nod and pull the pin from the grenade, rolling it as quietly as you can before running deeper into\n        *goto deeper\n    *if (loyal \u003c=95) #\"I refuse to murder for a dictatorship.\" \n        \"I refuse to murder for a dictatorship.\" You say adamantly.\n        *line_break\n        \"What are you saying?\" Miller asks.\n        *choice\n            #\"I'm leaving. You can't stop me.\"\n                Miller glares at you but when @{male he|she} sees your rifle pointed at @{male his|her} chest @{male he|she} raises @{male his|her} hands, places @{male his|her} rifle on the ground and begins stepping backwards.\n                *line_break\n                \"${nick}, you have no idea what you have got yourself into.\" @{male He|She} spits. \"You will pay.\"\n                \n                After @{male he|she} is far enough away you open the doors with your hands raised.\n                *line_break\n                \"I surrender!\"\n                \n                The faces of the Sarians in the room are frozen in shock. They cannot believe an armed Regovian would emerge with@{male his|her} hands raised.\n                \n                \"Hands in the air! [i]Regovi[/i]!\" One of the Sarians shouts.\n                *line_break\n                \"Behind me are more armed Regovians!\" You declare. \"They will burst in here any minute!\"\n                *line_break\n                A Sarian with a golden star on each shoulder steps forwards and smiles. \"Really?\" \n                \n                @{male He|She} passes you nonchalantly, removes a grenade from @{male his|her} pocket and throws it into the tunnel. \"Not anymore.\"\n                *set ending 14\n                *page_break\n                The next thing you know you are laying on your stomach and stripped of anything that might serve as a weapon. Gruff hands remove your shoes and belt to deter any escape attempt. Then, you are smuggled out of the town with a dark bag over your head through another tunnel to a Sarian humvee.\n                \n                When you are next allowed to open your eyes, you find yourself in front of a table in a dark room. The guard that removed the sack from over your head walks out a door behind you. You hear the click of a door lock.\n                *page_break\n                An hour passes.\n                *page_break\n                An hour passes.\n                *line_break\n                Or maybe more.\n                *page_break\n                An hour passes.\n                *line_break\n                Or maybe more.\n                *line_break\n                There is no way to really feel the passage of time.\n                *page_break The door opens\n                The door behind you opens. \n                \n                The Soldier with the golden stars on @{male his|her} shoulders enter the room, flicking a switch and turning on the light.\n                *line_break\n                \"That's better isn't it?\" @{male He|She} smiles and says in perfect Regovian.\n                *fake_choice\n                    #\"Yes, thank you.\"\n                        You smile. \"Yes, thank you\"\n                    #Remain silent.\n                        You look into @{male his|her} eyes but do not reply.\n                    #\"What sort of treatment is this? I saved all of you!\"\n                        \"What sort of treatment is this? I saved all of you!\" You glare at the Sarian.\n               *line_break\n               \"I am sorry for your unpleasant experience up until now. Some believe that you are some sort of spy.\" The Sarian grins. \"My name is Major Khelak and I will be the one to decide what will be done with you.\"\n               *fake_choice\n                   #\"What do you mean?\"\n                       \"I am an intelligence officer and I need to submit a report on your trustworthiness. If you convince me you can be of use to Saria our King- you will have a very nice stay here.\"\n                   #\"What do you want me to do?\"\n                       \"Great question. I want you to prove to me you can be of use to Saria and the King. There are those in Saria who would have you killed, I would like to prove them wrong.\n               *choice\n                   #\"I think you have this all wrong. I want to leave Regovia, not join Saria.\"\n                       As if a switch has been flicked the Major's whole demeanor changes. @{male He|She} smacks the table. You jump involuntarily.\n                       *line_break\n                       \"I think *you* have this all wrong!\" @{male He|She} shouts. \"I hold your life now! You will either do as I say and be rewarded or I will have you hanged from the gates of Tamashek!\"\n                       *choice\n                           #Refuse to help.\n                               \"No.\"\n                               *line_break\n                               \"Wrong answer.\"\n                               *goto killedbysaria\n                           #Agree to do as @{male he|she} says.\n                               *goto whatcanido\n                   #\"What can I do to help?\" \n                       *label whatcanido\n                       \"What can I do to help?\"\n                       *line_break\n                       The Major smiles. \"I'm glad you asked.\"\n                       *page_break\n                       The next hours are a blur of questions, maps, and confession signing.\n                       \n                       At first, you try and keep track of your answers and the documents you are signing. However, before long, you lose track of the various denunciations and condemnations of every part of Regovian life.\n                       \n                       The next day is the same. Interrogations, denunciations, food, sleep, repeat.\n                       *line_break\n                       After a week you are finally taken outside and into a civilian car.\n                       *goto_scene ending\n*label killedbysaria\n*page_break\nAll night you try to find a way out of your cell, but without even a small window to let in the moonlight- it's hopeless. You cannot see anything.\n\nThe next morning your head is covered with sack again. \n*line_break\nAfter almost an hour of driving, you are taken out of the vehicle, a noose is placed on your neck and-\n*page_break\nCrack.\n*set ending 15\n*goto_scene ending\n*label building\n*page_break\nYou take a deep breath of the dry air, enjoying the feeling of success.\n\nIt's finally over. \n\nIf what command says is true, victory should be days away. \n\nSuddenly, a nagging thought begins to bother you.\n*line_break\nWhat are you forgetting?\n*page_break @{male Abe|Mara}!\n\nYou run outside to the remains of the squat building you had tried to enter at the start of the battle, searching for some clue to @{male Abe|Mara}'s fate.\n\n\"Sam! Zac!\" You shout. \"Come quick!\"\n*line_break\nWhen you reach the wreckage you begin to dig into the debris with your bare hands, discarding your weapon near your feet while you overturn concrete blocks in search of your\n*if aberel >=55\n    friend\n*if aberel \u003c55\n    teammate\n.\n\nSam and Zac finally arrive and join the search.\n*page_break\nYou feel the skin on your palms tearing from bits of sharp metal and concrete but you don't care-\n\n*if aberel >=75\n    You know only one thing- You must find your friend!\n    *goto findabe\n*else\n    You know only one thing- You must find @{male Abe|Mara}!\n    *goto findabe\n*label findabe\n*page_break\n\"Come quick!\" Zac shouts suddenly. \"I found @{male him|her}!\"\n*if sugercoated = true\n    You rush to Zac's side finding @{male Abe|Mara}'s unconscious body on the ground. You search for signs of bleeding but besides a few broken bones- @{male he|she} seems alright.\n    *line_break\n    \"@{male He|She}'ll be fine.\" Sam declares. \"Let's get @{male him|her} out of here.\"\n    *goto_scene ending\n*else\n    You rush to Zac's side, finding @{male Abe|Mara}'s lifeless body on the ground. You search for signs of life but find none.\n    *set abealive false\n    *goto_scene ending", "gettinin": "A day passes, the schedule is relaxed and doesn't include much besides resting, eating and recovering from the T.E.S.T.\n\nYou notice a certain tension in the air, a certain way the recruits look at other recruits, wondering if they are their future teammates.\n*line_break\nEveryone is thinking about the T.E.S.T. Going over every moment, analyzing every action and every choice they took. It is a terrible way to pass the time. When you and the rest of the recruits are told to go to the basketball court for the so-called \"Formation of Tears\", everyone is ready to burst with nervous energy.\n\nThe formation of tears is where every recruit that passed the T.E.S.T is told which unit @{male he|she} was accepted into. Only about one soldier out of every five is accepted into the Wardens.\n\nIt is known as the \"Formation of Tears\" due to the fact that it is not unknown for recruits who failed the T.E.S.T to cry when they aren't accepted.\n*page_break The Formation\nYou enter the Basketball court and take a look around.\n\nAll around the walls of the court are pictures of soldiers. Some show them training, shooting at a gun range. Others show them studying in a classroom or in the middle of a Hand to hand combat class. You are excited to know that one day you will be like them, the first line of defense against attack.\n*page_break\n*if (metabe = 1)\n    You take your seat on the bleachers and notice @{male Abe|Mara} from the drive. @{male He|She} motions for you to sit next to @{male him|her} and you do.\n    \n    \"Excited?\" @{male Abe|Mara} asks.\n    *goto ask\n*elseif (metzac = 1)\n    You take your seat on the bleachers and notice Zac from the drive. @{male He|She} motions for you to sit next to @{male him|her} and you do.\n    \n    \"Excited?\" Zac asks.\n    *goto ask\n*elseif (metsam = 1)\n    You take your seat on the bleachers and notice Sam from the drive. @{male He|She} motions for you to sit next to @{male him|her} and you do.\n    \n    \"Excited?\" Sam asks.\n    *goto ask\n*else \n    You take an empty seat far away from everyone else.\n    *goto skip\n*label ask\n*fake_choice\n     #\"You bet!\"\n     #\"I don't really get what all the fuss is about.\"\n      *if (metsam = 1)\n        \"What?!\" Sam looks genuinely shocked. \"You do realize what this formation means for your future right? The Unit you serve in is like the college for teens in other countries. It can literally change your life!\"\n      *if (metzac = 1)\n        \"What?!\" Zac looks genuinely shocked. \"You realize what this formation means, right? The people from the Unit you serve in will be your friends for life!\"\n      *if (metabe = 1)\n        \"What?!\" @{male Abe|Mara} looks genuinely shocked. \"You realize what this formation means for your future right? The Unit you serve in completely changes what your service will be like!\"\n     #\"I'm just nervous as hell...\"\n*label skip\nAs the last group of soldiers file in to take their places, a tall, dark-haired middle-aged @{male man|woman} enters the court. @{male He|She} is wearing an ironed uniform and a blue and white Aiguillette on @{male his|her} right shoulder.\n*line_break\nYou vaguely remember that this can only mean one thing- @{male he|she} is the Sergeant Major, Chief Warrant Officer Ramon. One of the most feared Sergeant Majors in the RDF.\n\nCWO Ramon walks briskly to a podium facing the awaiting recruits and begins speaking.\n*page_break\n\"Good morning all.\" @{male He|She} says \"I will now read out the names of the ones who have been accepted and which company has accepted you.\" @{male He|She} stops and moves @{male his|her} gaze across the bleachers. \"If I read your name please stand up and walk to the sign belonging to your new company.\" @{male He|She} motions to three signs with the names of the three companies on them.\n*line_break\n\"Some of you,\" @{male he|she} continues \"will not enter the unit you wanted. Suck it up and welcome to the army.\"\n*page_break\n\n*if ((palsar) > (palhan)) and ((palsar) > (orev))\n    *label scouty\n    \"I will begin with the Scouts.\" @{male He|She} stops for a moment and surveys the room again.\n    *line_break\n    Taking a deep breath, @{male he|she} begins speaking.\n    *line_break\n    \"$!{firstname} $!{name}, @{male David|Ruth} Silva, @{male Eric|Erica} Simons\"\n    *line_break\n    CWO Ramon continues to read names but you cannot hear them as you stand up and walk to the sign with the word \"Scout\" written on it.\n    \n    It takes a moment for @{male his|her} words to sink in. You have been accepted to the Scouts! \n    *set unit \"Scouts\"\n    *achieve scout\n    *goto feel\n*elseif ((palhan) > (palsar)) and ((palhan) > (orev))\n    *label sappery\n    \"I will begin with the Sappers.\" @{male He|She} stops for a moment and surveys the room again.\n    *line_break\n    Taking a deep breath, @{male he|she} begins speaking.\n    *line_break\n    \"$!{firstname} $!{name}, @{male David| Ruth} Silva, @{male Eric|Erica} Simons\"\n    CWO Ramon continues to read names but you cannot hear them as you stand up and walk to the sign with the word \"Sapper\" written on it.    \n    \n    It takes a moment for @{male his|her} words to sink in. You have been accepted to the Sappers! \n    *set unit \"Sappers\"\n    *achieve sapper\n    *goto feel\n*elseif ((orev) > (palsar)) and ((orev) >(palhan))\n    *label crowy\n    \"I will begin with the Crows.\" @{male He|She} stops for a moment and surveys the room again.\n    *line_break\n    Taking a deep breath, @{male he|she} begins speaking.\n    *line_break\n    \"$!{firstname} $!{name}, @{male David|Ruth} Silva, @{male Eric|Erica} Simons\"\n    *line_break\n    CWO Ramon continues to read names but you cannot hear them as you stand up and walk to the sign with the word \"Crows\" written on it. \n    \n    It takes a moment for @{male his|her} words to sink in. You have been accepted to the Crows! \n    *set unit \"Crows\"\n    *achieve crow\n    *goto feel\n*else\n    *temp roll 0\n    *rand roll 1 3\n    *if roll=1\n        *goto scouty\n    *elseif roll=2\n        *goto sappery\n    *elseif roll =3\n        *goto crowy\n    *else\n        *bug No roll\n*label feel\n\nHow do you feel?\n*fake_choice\n    #Great! This is exactly what I wanted!\n    #Terrible! This isn't what I planned at all!\nWhen you reach the sign you are joined by the other recruits whose names were read out by the Sergeant Major.\n\nMost of the recruits seem confused, many didn't expect to be accepted to the ${unit} and some weren't expecting to be accepted to the Wardens at all.\n*page_break\n*if (metzac = 0)\n \"Hey you!\" You turn towards the voice and see it belongs to a short, well-tanned @{male man|woman} with a close-cropped marine haircut.\n *line_break\n \"My name is Zac\" @{male he|she} says \"Short for @{male Zachary|Zacharee} What's yours?\"\n *set metzac 1\n *line_break\n \"${nick}\" You reply.\n *line_break\n \"$!{nick}? I like it!\" Zac smiles \"Looks like we're platoon mates! Have you met Sam? @{male He's|She's} also in the ${unit}.\"\n *fake_choice\n      *selectable_if (metsam = 1) #\"Yes, I met @{male him|her} on the way to Guardian Hill.\"\n          Sam opens @{male his|her} arms to embrace you.\n      *selectable_if (metsam = 0) #\"No. Nice to meet you Sam.\"\n          Zac points to a tall, white, well built @{male man|woman} with a @{male short beard|tight hairbun}. @{male He|She} offers @{male his|her}  hand and you shake it.\n \"I am so glad I got accepted to the ${unit}!\" @{male he|she} says, a huge smile plastered on @{male his|her} face \"If my body wasn't in so much pain from the T.E.S.T I wouldn't believe this isn't a dream.\"\n *set metsam 1\n *goto richard\n*else\n \"Hey you!\" You turn towards the voice and see it belongs to a serious-looking, dark, medium-sized @{male man|woman}, @{male his|her} hair shaved in the style popular in the Sassik desert of the south.\n *line_break\n \"My name is @{male Abe|Mara}\" @{male he|she} says \"What is yours?\"\n *set metabe 1\n*line_break\n\"${nick}.\" You reply.\n*line_break\n@{male Abe|Mara} smiles \"Looks like we are going to serve together in the same platoon! Have you met Sam? @{male He|She} is also in the ${unit}.\"\n*fake_choice\n      *selectable_if (metsam = 1) #\"Yes, I met @{male him|her} on the way to Guardian Hill.\"\n          Sam opens @{male his|her} arms to embrace you.\n      *selectable_if (metsam = 0) #\"No. Nice to meet you Sam.\"\n          @{male Abe|Mara} points to a tall, white, well built @{male man|woman} with a @{male short beard|tight hairbun}. @{male He|She} offers @{male his|her}  hand and you shake it.\n\"I am so glad I got accepted to the ${unit}!\" @{male He|She} says, a huge smile plastered on @{male his|her} face \"If my body wasn't in so much pain from the T.E.S.T I wouldn't believe this isn't a dream.\"\n*set metsam 1\n*goto richard\n*label richard\n\nYou count 28 recruits standing next to the ${unit} sign when you hear a voice from behind you.\n\n\n\"Recruits!\" You turn in the direction of the voice and see a tall, @{male blond|blonde} 20ish Sergeant.\n\n\"My name is Sgt. Richards and I will be one of two squad commanders.\" @{male His|Her} voice booms. \"Joining me will be Sgt. Jacobs who you will have the pleasure of meeting when we reach the Company Complex.\" Sgt. Richards clears @{male his|her} throat \"Now, Follow me!\"\n*finish Walk to the Company Complex", "paradeattack": "*comment fakepoliceman 0\n*comment fake policeman on roof\n*comment trashcanbomb 0\n*comment bomb placed in trashcan while you were gone\n*comment janitor 0\n*comment janitor in start of parade places bomb\n\n*comment sewer 0\n*comment Sewer explosion\n*comment checkpost 0\n*comment car bomb passed the checkpost\n*comment grenaderoof 0\n*comment crate of grenades on the roof \n\n*comment mortar 0\n*comment mortar attack by hippie from apt7\n*comment fakeborderpolice 0\n*comment fake border police with rifle- rife attack\n*comment bombincourt 0\n*comment Bomb placed in Supreme Court while you were chasing some idiot\n*gosub_scene sub\n*if ((zacrel > samrel) and (zacrel > aberel))\n    *set partner \"Zac\"\n    *goto start\n*elseif ((samrel > zacrel) and (samrel > aberel))\n    *set partner \"Sam\"\n    *goto start\n*elseif ((aberel > zacrel) and (aberel > samrel))\n    *set partner \"@{male Abe|Mara}\"\n    *goto start \n\n*label start\nThe past two months were some of the best of your life. Training was over, the platoon had graduated Babir company and you had officially joined the Wardens.\n*set rank \"Specialist\"\n*line_break\nGraduation came with many perks.\n*line_break\nNow that you were a Warden, you and your platoon had your own space in the ${unit} quarter of Lead Tower. The quarter, non-officially called \"The \n*if unit = \"Sappers\"\n    Bomb\"\n    *set quarter \"The Bomb\"\n    *goto n1\n*elseif unit = \"Scouts\"\n    Pathfinders Relief\"\n    *set quarter \"The Pathfinder Relief\"\n    *goto n1\n*else\n    Crows Nest\"\n    *set quarter \"The Crows Nest\"\n    *goto n1\n*label n1\nis a large quarter, with all the facilities a \n*if unit = \"Sappers\"\n    Sapper\n    *goto n2\n*elseif unit = \"Scouts\"\n    Scout\n    *goto n2\n*else\n    \"Crow\"\n    *goto n2\n*label n2\ncould want. \n\nIn the center of ${quarter} is a large soccer field/basketball court. To its north- a small gym, food court and helipad. The area south of the field was used as a recreation and sleep area; with rooms and a Company club, a medium-sized room with a pool table, ping pong table and huge television. To the east- the commanders' rooms and offices as well as a debriefing room. And finally, to the west- the company gun range and warehouses. Crates of uniforms, MREs, ammunition, and \n*if unit = \"Sappers\"\n    explosives.\n    *goto n3\n*elseif unit = \"Scouts\"\n    glow sticks.\n    *goto n3\n*else\n    spare parts for the \"Crow\" missile launcher.\n    *goto n3\n*label n3\n\nThe unit is made out of four teams, TM10, under command of Lt. Alexis, a refugee from Lawan; TM20, under command of Lt. Zidka, a Regovian native; TM30 under command of Lt. Bakashi, a calm and solemn commander from a small village near the Sassik Desert and TM40, the newest and least experienced team. Your team. \n*line_break\nWhen TM10 finish their mandatory service and return to civilian life a new team joins the unit and receives the TM40 callsign.\n\nAs the newest team to join the \n*if unit =\"Scouts\"\n    Scouts,\n*if unit = \"Sappers\"\n    Sappers,\n*if unit = \"Crows\"\n    Crows,\nyou are now known as TM40 and can proudly wear the unit ribbon.\n\n*if unit = \"Sappers\"\n    *image sapperribbon.jpg\n    *set sapperribbon true\n*if unit = \"Scouts\"\n    *image scoutribbon.jpg\n    *set scoutribbon true\n*if unit = \"Crows\"\n    *image crowribbon.jpg\n    *set crowribbon true\n\nYou couldn't be more proud of yourself.\n*page_break\nDuring the first week after finishing graduating to the ${unit}, the new team has lots of time to spare. What will you do with your spare time?\n*choice\n    #Go to the gun range\n        Every day of the week you woke up early in the morning and went to train in the gun range and with some help from the resident weapon expert you began to hone your skills.\n        \n        At first, the weapon instructor had you take apart and put together your rifle more times than you could count. Only after you had been able to prove to @{male him|her} that you were really a master of your weapon @{male he|she} had been willing to begin training you in earnest.\n        \n        You had finished the week feeling mentally and physically drained but with a renewed respect to your firearm. (Shooting +10\n        *set shooting +10\n        *if profession =\"Marksman\"\n            , Marksman +10)\n            *set marksman +10\n            *goto you1\n        *elseif profession =\"HMG\"\n            , HMG +10)\n            *set mag +10\n            *goto you1\n        *elseif profession =\"LMG\"\n            , LMG +10)\n            *set negev +10\n            *goto you1\n        *else\n            )\n            *goto you1\n    #Work out in the gym\n        Every day of the week you woke up early in the morning and went straight to the gym for a morning aerobic exercise. After eating a well-balanced breakfast you returned to the gym for an hour-long muscle-building exercise.\n        *line_break\n        After lunch, you returned to the gym for a core exercise and at sundown, you returned for another muscle-building session.\n        \n        All in all, you finished the week feeling much more fit. One week of exercise may not make a huge difference but it is a good start. (Strength +7)\n        *set strength +7\n        *goto you\n    #Hang out in the company club\n        You spent the week chilling out with the rest of the ${unit} and especially the rest of the team. (Persuasion +5, Everyone +5)\n        \n        It may not have been the most productive week of your service, but the time spent together was enjoyable and by the end of the week, you feel like the cohesiveness of the team is much higher than it was before.\n        *set pcrel +5\n        *set sgtrel +5\n        *set aberel+5\n        *set samrel +5\n        *set zacrel +5\n        *set speech +5\n        *goto you\n*label you1\n*if profession= \"Medic\"\n    *line_break\n    You also take the time to reread the medical manuals you had received in Training Center 10, taking the time to remind yourself of basic medical treatments. (Medic +5)\n    *set medic +5\n    *goto you\n*label you\n*page_break 0800, 13th January, 2022\nYou sit up in bed, your phone's alarm clock is ringing.\n*choice\n    #Go back to sleep\n        8 AM? Way too early. You turn off the alarm, turn over and close your eyes.\n        \n        \"${nick}! What are you doing? Get up! It's already 8:15!\"\n        *line_break\n        \"So?\"  you mumble, covering your eyes with your covers. \"What happens at 8:15?\"\n        *line_break\n        \"What happens?!\" you recognize the voice, it's Walker. \"We have a debriefing with Maj. Faraz! That's what's happening. Get up, get dressed, be there in five.\"\n        \n        Right! How could you forget?\n        *line_break\n        You get up in a panic, throwing off your covers and throwing on your Warden uniform. Since the Warden's inception, they have worn a special model of uniform. \n        *goto n4\n    #Wake up\n        *set wokeup 1\n        You slowly wake up, remembering that you have twenty minutes to be at Maj. Faraz's debriefing about Independence day celebrations. You get out of bed, put on your slippers and grab your toothbrush.\n        \n        Your room is small but clean and comfortable. It has two pairs of bunk beds, one in each corner of the room. \n        *line_break\n        This morning, sunlight streams in.\n        \n        Someone forgot to close the curtains again.\n        \n        You get up, waking the rest of the occupants of the room, they either forgot about today's briefing or maybe just didn't feel the need to get up.\n        *line_break\n        You walk slowly towards the bathroom, returning to your room just as Walker walks in.\n        \n        \"Good morning ${nick}!\" @{male He|She} remarks cheerily \"Getting ready?\"\n        *line_break\n        \"Yup.\" You reply.\n        *line_break\n        \"Great, don't be late.\"\n        \n        You take out your Warden uniform.\n        *if loyal >50\n            Smiling despite yourself. \n        Since the Wardens inception, they have worn a special model of uniform.\n        *goto n4\n*label n4\nInstead of the olive green uniform the rest of the army wears, they proudly wear the gray and black \"Warden armor\", complete with a golden ${unit} patch on your right sleeve.\n*line_break\nCustom made to fit every Warden perfectly, the uniform is a great source of pride for the Wardens, showing off their status as elite infantry.\n*if loyal \u003c=45\n    \n    You can't help but frowning when you wear the uniform. To those who support the Citizens Republic, it may be a source of pride, but to you, it is simply a constant reminder of the oppression and injustice it perpetuates. \n*page_break\nWith your uniform\n*if wokeup = 1\n    crisp and combat boots shined, \n    *goto n4.1\n*else\n    on, \n    *goto n4.1\n*label n4.1\nyou walk into the\n*if wokeup = 1\n    empty\n    *goto n5\n*label n5\nbriefing room. \n\nThe room is long, lined with maps and newspaper articles of historical operations the ${unit} have taken part in. In the front of the room, stands a podium for the unit commander to speak from and a large screen behind @{male him|her} to show operational information.\n*line_break\nThe back is the only part of the room shrouded in darkness.\n*line_break\nAt the back are the pictures and stories of every fallen soldier that has served in the ${brigade} ${unit}. Meant to be seen by the commander whenever @{male he|she} speaks to the unit, they are there to remind @{male him|her} of the true price that has been paid in previous operations, reminding @{male him|her} that orders that have been received in this room have had real consequences. \n\n*if wokeup = 1\n    You take a seat.\n    \n    One by one the rest of the ${unit} enter and take their seats. Sam sits next to you.\n    *goto n6\n*else\n    You look for an empty seat, finding one next to Sam.\n*label n6\n\nMaj. Faraz takes the stand. \n*if wokeup = 0\n    \"Glad you could join us, ${nick}, take a seat.\"\n*page_break\n\"Good morning all. As you all know, tomorrow is Independence Day. Every year, the day is celebrated with a large military march in our capital- Rusalim.\" Faraz points to a large map of Regovia on-screen behind @{male him|her}.\n*image maprusalim.png\n*page_break\n\n\"The problem?\" @{male He|She} continues \"We have been receiving intel for the past few months showing suspicious money transfers from Saria to various suspected Filo terrorists. Specifically to this @{male man|woman}.\" \n\nA picture of a 20ish @{male man|woman} appears on the screen. @{male He|She} has dark black hair, bright green eyes, @{male a heavy stubble beard|} and a small, circular scar over @{male his|her} right eyebrow.\n\n\"@{male George|Georgia} Hamtz is the suspected leader of the Filo Freedom Force, a small cell of Filo terrorists suspected of receiving direct support and training from Saria. We believe Saria wants Hamtz to attack the parade. And unfortunately, @{male he|she} has many possible targets, the most obvious one is civilians, but they may want to attack soldiers or even the Prime Minister.\n\nThe ${brigade} Wardens have been chosen to secure the parade and make sure it goes forward without a hitch. Each company has been given a separate area under their responsibility.\n\nThe Scouts will be on the ground, close and personal with the crowds. The Crows will be some distance away, searching for threats from rooftops and short-range missile attacks. And of course, last but not least, the Sappers will be kept in reserve, patrolling the area and searching for any suspicious activity.\n\nThe Republic is trusting us to protect it- we will not let it down.\"\n*gosub trial_end\n*page_break\n*if unit = \"Scouts\"\n    *goto scout\n*elseif unit = \"Sappers\"\n    *goto sapper\n*else\n    *goto crow\n*label scout\nThe rest of the day is spent preparing for the mission. Various possible enemy courses of action are calculated and various options for dealing with them are thought out. Hand to hand combat basics are practiced and personal weapons are cleaned.\n\nTM40 is ready for action.\n*page_break 0700, 14th of January, 2022\n\nThe Scouts arrive at the parade starting point 3 hours before the parade begins, giving you 3 hours to make sure no unauthorized personnel are walking around.\n*line_break\nWhile you are walking around the parade grounds you notice @{male Abe|Mara} arguing with one of the janitors.\n*choice\n    #Walk over, maybe I can help\n        *goto cleanerhelp\n    #Leave it, I'm sure @{male he|she} can handle it.\n        *set janitor 1\n        *goto cleanernohelp\n*label cleanerhelp\n\"What's going on @{male Abe|Mara}?\" you ask as you walk towards the argument.\n*line_break\n\"I asked this Filo civilian for @{male his|her} ID but @{male he|she} says it's not on @{male him|her}.\"\n*line_break\n\"It is true!\" the Janitor insists in heavily accented Regovian \"I don't have it!\"\n*choice\n    *selectable_if ((intelligence >= 30) and (loyal > 50)) #\"The law says you have to always carry ID. If you don't find it in the next 30 seconds I am going to arrest you.\"\n        \"I've never seen a Regovian arrested for not carrying ID!\" @{male he|she} protests \"You are just looking for an excuse to get rid of us!.\"\n        *line_break\n        \"Shut up!\" @{male Abe|Mara} shouts \"Either give me your ID or put your hands on the wall!\"\n        *label ID\n        \n        The @{male man|woman} reaches into @{male his|her} pocket, @{male his|her} lips press into a thin line. \"I must of forgot I had it.\" @{male he|she} mumbles, offering @{male his|her} ID to @{male Abe|Mara}.\n        *line_break\n        @{male Abe|Mara} looks at the @{male man|woman}'s ID. \"Seems legit.\"\n        *choice\n            #Arrest the @{male man|woman} for lying to a soldier.\n                \"Hands on the wall!\" you bark \"I'm arresting you for lying to a soldier.\"\n                *line_break\n                The @{male man|woman}s eyes go wide. \"No! Please! You can't do this!\"\n                *line_break\n                @{male Abe|Mara}s hands go to @{male his|her} rife. \"Are you resisting?\" @{male he|she} probes.\n                *line_break\n                The Janitors eyes dart back and forth between the exit and you for a moment before placing @{male his|her} hands on the wall.\n                *line_break\n                After placing handcuffs on @{male his|her} hands, @{male Abe|Mara} searches @{male his|her} pockets.\n                \n                \"Strange, @{male he|she} has two phones...\" @{male Abe|Mara} muses.\n                *choice\n                    #Let me see\n                        @{male Abe|Mara} hands you the two phones. One is an ordinary smartphone, the other is an old model.\n                        *line_break\n                        \"Looks like a burner phone\" @{male Abe|Mara} remarks\n                        *choice\n                            #Open it\n                                You go to the contacts screen, there is only one contact. \"G\".\n                                \n                                *goto taketoofficers\n                    #\"Let's take @{male him|her} to the officers, they'll know what to do.\"\n                        *goto taketoofficers\n            #Tell the police to take @{male him|her} off-grounds anyway.\n                \"@{male Abe|Mara}, go get one of the officers to escort this @{male man|woman} away from the parade.\"\n                *line_break\n                \"Absolutely, @{male he|she} can't be trusted and we can't take any chances.\"\n                *line_break\n                \"No! Please!\" the Janitor pleads \"I need this job!\"\n                *line_break\n                \"Sorry, you should have thought of that before you caused trouble!\" @{male Abe|Mara} jeers.\n le sir|ma'am}.\"\n                    *goto s1\n                *else\n                    .\"\n                    *goto s1\n                *label s1\n                The Janitors eyes dart towards the exit. @{male He|She} runs.\n                *choice\n                    #Chase @{male him|her}\n                        You and @{male Abe|Mara} give chase, but your combat vest weighs you down and you are unable to stop @{male him|her} before @{male he|she} reaches the exit and disappears.\n                        *line_break\n                        You and @{male Abe|Mara} bend over, breathless from the sprint.\n                        \n                        \"We should report this\" @{male Abe|Mara} says breathlessly\n                        *choice\n                            #Agree\n                                \"I think so too.\"\n                                \n                                You find Walker and explain what happened.\n                                *line_break\n                                Walker pauses for a moment, deep in thought.\n                                *line_break\n                                \"We need to be much more alert, we don't know what sort of nefarious plan @{male he|she} was planning. Keep an eye out.\"\n                                *goto parade\n                            #Disagree\n                                \"I disagree, we could get in trouble for not catching @{male him|her}\" you whisper \"Let's keep this between us.\"\n                                *set janitor 1\n                                *line_break\n                                *if speech >=50\n                                    @{male Abe|Mara} chews @{male his|her} bottom lip. \"I don't know...\"\n                                    *line_break\n                                    \"Trust me. We don't want Walker to know we lost @{male him|her}, nobody needs to know.\"\n                                    *line_break\n                                    \"OK then\" @{male Abe|Mara} sighs \"if you say so.\"\n                                    *goto parade\n                                *else\n                                    \"Are you joking?\" @{male Abe|Mara} snaps \"We have to report something like this!\"\n                                    \n                                    You find Walker and explain what happened.\n                                    *line_break\n                                    Walker pauses for a moment, deep in thought.\n                                    *line_break\n                                    \"We need to be much more alert, we don't know what sort of nefarious plan @{male he|she} was planning. Keep an eye out.\"\n                                    *goto parade\n                    #Shoot at @{male his|her} legs\n                        You take aim and fire at the running Filos legs.\n                        \n                        *if shooting >= 55\n                            You fire a single bullet, hitting the @{male man|woman} directly in the ankle.\n                            *line_break\n                            \"Nice shot!\" (Success! Needed 55 shooting) (Shooting +5)\n                            *set shooting +5\n                            \n                            You and @{male Abe|Mara} run towards the wounded Janitor, it seems the bullet tore @{male his|her} achilles tendon, neutralizing @{male him|her} but causing minimal damage to @{male his|her} blood vessels.\n                            \n                            *if profession = \"Medic\"\n                                You place a gauze pad on the entrance wound, stopping the small amount of bleeding. (Medic +3)\n                                *set medic +3\n                                *goto s2\n                            *label s2\n                            \n                            \"I surrender! I surrender!\" The Janitor cries \"My ID is in my right-hand pocket! Don't kill me!\"\n                            *line_break\n                            Searching @{male his|her} pocket, you find @{male his|her} ID and hand it to @{male Abe|Mara}. \n                            *line_break\n                            \"looks legit\" @{male Abe|Mara} remarks \"Why the hell did you run?!\"\n                            *line_break\n                            The @{male man|woman} stops talking, only grimacing in pain.\n                            *page_break\n                            Within a minute, the police and arrive. After explaining the situation the police take @{male him|her} for questioning. Walker grabs you and @{male Abe|Mara}, dragging you aside.\n                            \n                            \n                            \"What the hell was that?\" @{male he|she} shouts \"You're lucky you're such a good shot, you could have hit one of ours!\" \n                            *line_break\n                            \"@{male He|She} was acting suspiciously.\" @{male Abe|Mara} explains \"We had a good reason to shoot.\"\n                            *line_break\n                            Walker bites @{male his|her} lower lip \"You better hope the police find something. Go back to your posts.\"\n                            *set chanceofattack -2\n                            *goto parade\n                        *elseif shooting \u003c= 53\n                            The single bullet you fired hits the @{male man|woman} in the thigh,@{male he|she}falls, face down, onto the pavement. A  pool of blood begins forming next to @{male his|her} leg. (Needed 55 Shooting) (Shooting +3)\n                            *set shooting +3\n                            *if profession = \"Medic\"\n                                Thankfully, you are a medic and know exactly what to do. Acting quickly, you remove a tourniquet from your combat vest and place it 15 cm higher than the entrance wound. (Medic +5)\n                                *set medic +5\n                                *set chanceofattack -2\n                                \n                                \"I surrender! I surrender!\" The Janitor cries \"My ID is in my right-hand pocket! Don't kill me!\"\n                                *line_break\n                                You search the pocket and find @{male his|her} ID, handing it to @{male Abe|Mara} while you place the Janitor's hands in handcuffs.\n                                *line_break\n                                \"looks legit\" @{male Abe|Mara} remarks \"Why the hell did you run?!\"\n                                *line_break\n                                The @{male man|woman} stops talking, only grimacing in pain.\n                                *page_break\n                                Within a minute, the police and Walker arrive. After explaining the situation the police take the Janitor for questioning. Walker grabs you and @{male Abe|Mara}, dragging you aside.\n                                \n                                \n                                \"What the hell was that?\" @{male he|she}shouts \"You better hope the police find@{male he|she}was planning something,@{male he|she}could have been killed!\"\n                                *line_break\n                                \"But Walker-\" \n                                *line_break\n                                \"No buts! Get back to your post!\"\n                                *goto parade\n                            *else\n                                \"Oh. My. God.\" @{male Abe|Mara} runs to the fallen Janitor,@{male he|she}flips the @{male man|woman} over\n                                *line_break\n                                \"@{male He|She}'s bleeding out! MEDIC!\"\n                                *line_break\n                                A long minute passes before help arrives. By the time help arrives the @{male man|woman} has lost too much blood to remain conscious and has to be taken away in an ambulance.\n                                \n                                \"Why the hell did you shoot?!\" Walker shouts at you after the ambulance leaves \"You're lucky@{male he|she}was a Filo, otherwise you would be in deep trouble.\"\n                                *line_break\n                                \"But Walker-\" \n                                *line_break\n                                \"No buts! Get back to your post!\" (Walker -10, @{male Abe|Mara} -5)\n                                *set pcrel -10\n                                *set aberel -5\n                                *set chanceofattack -1\n                                *goto parade\n                        *elseif shooting \u003c= 50\n                            You fire a quick succession of bullets, unfortunately for you, they all miss, falling short or going long. The @{male man|woman} reaches the exit, turns a corner and disappears. (Needed 55 shooting)\n                            *line_break\n                            \"What the hell?\" @{male Abe|Mara} shouts \"Why did you shoot!? We could have caught @{male him|her}!\"\n                            \n                            \n                            Within a minute Walker and the Police arrive. \n                            *line_break\n                            \"What the hell was that?\" @{male he|she} shouts \"You're lucky you didn't hit anyone!\"\n                            *line_break\n                            \"But Walker-\" \n                            *line_break\n                            \"No buts! Get back to your post!\" (Walker -3, @{male Abe|Mara} -3)\n                            *set pcrel -3\n                            *set aberel -3\n                            *set janitor 1\n                            *goto parade\n                        \n*label cleanernohelp\nWhatever it is, you're sure @{male Abe|Mara} can handle it.\n*goto parade\n*label taketoofficers\n\"We need to take this to the police.\" You whisper to @{male Abe|Mara}.\n*line_break\n\"I agree. Let's go\"\n\nEach of you grabs one arm, walking the trembling Janitor to the waiting police van.\n*set chanceofattack -2\n*goto parade\n*label sapper\nThe rest of the day is spent preparing for the mission. Various possible enemy courses of action are calculated and various options for dealing with them are thought out. Hand to hand combat basics are practiced and personal weapons are cleaned.\n\nTM40 is ready for action.\n*page_break 0700, 14th of January, 2022\nAs a reserve force, each team commander is assigned a different area of responsibility. \n*line_break\nTM40, the youngest team, has been selected to search all the sewers for explosives and suspicious activity.\n\nYou and your team arrive at the sewer entrance three hours before the start of the parade in order to have enough time to go over the entire sewer system.\n*page_break\nThis tunnel is long, your flashlights barely pierce the darkness, allowing you to see only a few meters ahead. The smell of shit and who knows what else is so thick you can almost taste it.\n\n\"I can't believe we were assigned this assignment\" ${partner} says. \"The Sappers always get screwed while those stuck-up Scouts get all the glory! We can't even properly search without any lights!\"\n*choice\n    #Agree\n        \"Totally,\" you agree \"This is bullshit.\" \n        *set loyal -3\n        *goto sa1\n    #\"We do what we can for the Republic. We shouldn't question orders.\"\n        \"If you say so...\" ${partner} replies.\n        *set loyal +3\n        *goto sa1\n*label sa1\n\nSuddenly, you notice a light turning a corner towards you.\n\n\n\"Hey! Stop! Who goes there!\" ${partner} shouts.\n*line_break\n\"I work here.\" A voice shouts back.\n*line_break\n\"Let's go see what's up.\" ${partner} murmurs.\n\nWhen you arrive at the corner you are greeted by a work@{male man|woman} with blue overall jeans.\n\n\"How can I help you @{male sir|ma'am}s?\" the Work@{male man|woman} asks in heavily accented Regovian.\n*line_break\n\"ID would be nice for a start.\" ${partner} asks, sticking @{male his|her} hand towards the @{male workman|workwoman}.\n*line_break\n\"I am very sorry @{male sir|ma'am}. I forget mine at home.\" \n\n*choice\n    *selectable_if ((intelligence >= 30) and (loyal > 50)) #\"The law says you have to always carry ID. As a Filo, you should know that.\"\n        \"I do know that @{male sir|ma'am}.\" @{male He|She} replies \"Next time I not forget.\"\n        *label workmanID\n        \n        ${partner} takes you aside for a moment. \"We should arrest @{male him|her}. I think it's really suspicious for a Filo on a day like this to forget their ID.\"\n        *line_break\n        \"But what if it's an innocent mistake?\" You ask.\n        *line_break\n        \"Then we let @{male him|her} go. A few hours in jail might teach @{male him|her} a lesson.\"\n        *choice\n            #Arrest the @{male man|woman} for having no ID\n                *if (loyal>50)\n                    \"If you don't have ID I will arrest you. Are you sure you forgot it at home?\" You ask.\n                    *goto arrestworkman\n                *else\n                    \"I am sorry @{male sir|ma'am}, but if you don't have ID I am going to have to arrest you.\" You declare.\n                    *goto arrestworkman\n                *label arrestworkman\n                *line_break\n                \"No! No arrest me @{male sir|ma'am}!\" @{male he|she} begs, @{male his|her} accent thickening \"I only work. No trouble!\"\n                *choice\n                    #Arrest @{male him|her}\n                        *set chanceofattack -2\n                        ${partner} walks behind the @{male workman|workwoman}, removing a pair of handcuffs.\n                        *line_break\n                        The @{male workman|workwoman} turns, a knife in hand.\n                        *line_break\n                        ${partner} reacts quickly, disarming the @{male workman|workwoman} and throwing @{male him|her} on the ground in one fluid motion.\n                        *line_break\n                        \"Screw all of you!\" the @{male workman|workwoman} screams. \"Regovia is doomed!\"\n                        \n                        A search of the @{male workman|workwoman} reveals two phones. One is an ordinary smartphone, the other an older model.\n                        *line_break\n                        \"Looks like a burner phone.\" ${partner} muses \"Should we open it?\"\n                        *choice\n                            #Search the phone\n                                The phone is empty save for a single contact- \"G\".\n                                *goto arrestedworkman\n                            #Leave it to the police\n                                \"We should leave that to the cops. Let's take @{male him|her} to Miller.\"\n                                *goto arrestedworkman\n                    #Escort @{male him|her} out of the sewers but do not arrest @{male him|her}\n                        *goto escort\n                    #Let @{male him|her} go\n                        *goto lethimgo\n            #Escort @{male him|her} out of the sewers but do not arrest @{male him|her}\n                *label escort\n                \"If you don't have any ID I'm going to have to remove you from the premises.\"\n                *line_break\n                \"Please @{male sir|ma'am}, I need job. If you make me leave, I will be fired.\" the @{male workman|workwoman} begs.\n                *line_break\n                \"If I were you I would be thankful we don't arrest you.\" ${partner} interjects. \"Follow us.\"\n                *set chanceofattack -1\n                *goto parade\n            #Let @{male him|her} go\n                *label lethimgo\n                \"Stay out of trouble.\" you tell the @{male workman|workwoman} \"Have a good day.\"\n                *line_break\n                \"Thank you @{male sir|ma'am}!\" the @{male workman|workwoman} bows \"I will not forget your kindness.\"\n                *set sewer 1\n                *goto parade\n    *selectable_if ((intelligence >= 30) and (50 > loyal)) #\"The law says you have to always carry ID, are you sure you don't have it on you @{male sir|ma'am}?\"\n        \"No @{male sir|ma'am}.\"\n        *goto workmanID\n    #Detain and search the @{male workman|workwoman}\n        \"Hands on the \n        *if (loyal\u003c50)\n            wall, @{male sir|ma'am}.\"\n            *goto handsonwall\n        *else\n            wall!\" you shout.\n            *goto handsonwall\n*label handsonwall\nThe @{male workman|workwoman}'s eyes dart to the corner@{male he|she}had just turned.\n*line_break\nBefore you can react,@{male he|she} runs.\n\n${partner} and You give chase but the darkness and your heavy combat vests handicap you, allowing the @{male workman|workwoman} to escape.\n\n\"We need to report this.\" ${partner} remarks, @{male his|her} hands rubbing @{male his|her} face.\n*choice\n    #Agree\n        \"I think so too.\"\n        *label explain\n        \n        \n        You exit the sewers and radio Miller explaining what happened.\n        *line_break\n        [i]\"We need to be much more alert, we don't know what sort of nefarious plan @{male he|she} was planning. Keep an eye out.\"[/i] Miller replies [i]\"Finish your patrol in the sewers and report back to me if you see anything suspicious.\"[/i]\n        *set chanceofattack -1\n        *goto parade\n    #Disagree\n        \"I disagree, we could get in trouble for not catching @{male him|her}\" you whisper \"Let's keep this between us.\"\n        *line_break\n        *if speech >=50\n            ${partner} chews @{male his|her} bottom lip. \"I don't know...\"\n            *line_break\n            \"Trust me. We don't want Miller to know we lost @{male him|her}, nobody needs to know.\" \n            *line_break\n            \"OK then\" ${partner} sighs \"if you say so.\" (Success! Needed 50 speech)\n            *set sewer 1\n            *goto parade\n        *else\n            \"Are you joking?\" ${partner} snaps \"We have to report something like this!\" (Needed 50 speech)\n            *goto explain\n*label arrestedworkman\n*page_break\nYou and ${partner} take the @{male workman|workwoman} outside, radioing Miller to meet you.\n\n\"Excellent job ${nick} and ${partner}!\" @{male He|She} says, slapping both of you on the back \"I am sure @{male he|she} was planning something, now the interrogators will have to find out what.\"\n*goto parade\n*label crow\nThe rest of the day is spent preparing for the mission. Various possible enemy courses of action are calculated and various options for dealing with them are thought out. The various observation equipment is checked and double checked. Range cards are drawn and given to the team commanders to be remembered by heart.\n\nFinally, TM40 is ready for action.\n*page_break 0700, 14th of January, 2022\nThe official mission of the Crows is to control rooftops along the planned route as well as keep an eye out for mortars from up to 3 kilometers away.\n\nIn order to be able to concentrate most of the force on the rooftops, TM40 is tasked with searching specific buildings that may be used to set up mortar strikes on the parade.\n\n\"Mortar attacks?\" Zac whispers to you as you walk towards your designated building \"Why would there be mortar attacks?\"\n*line_break\n\"Didn't you hear?\" @{male Abe|Mara} whispers back \"Last month a Sarian commando force attacked a support convoy en route to one of our forward command posts. Three 60mm mortars were taken!\"\n*line_break\n\"Fuck! Three whole mortars!\" Zac exclaims. \"Isn't that a lot?\"\n*line_break\n\"Keep your voice down.\" @{male Abe|Mara} slaps Zac on the back of @{male his|her} head \"It is not public knowledge yet. Let us keep it that way.\"\n*page_break\n\"${nick} and ${partner}!\" Walker turns to the team \"This is your building.\" @{male he|she} points to a small, four-story apartment building. \"Search it and report to me by radio. The rest of the team will search other buildings.\"\n*line_break\nYou enter the building. To your right and left are doors presumingly leading to apartments, in front of you is a staircase leading to the higher floors.\n\n\"How do you want to do this?\" ${partner} asks.\n*choice\n    #Search apartments\n        *goto apartments\n    #Search the roof\n        *goto roof\n*label apartments\n\"Let's search the apartments.\" You reply.\n*line_break\n\"Sounds good.\"\n*label apartment#1\n\nYou turn towards the door on the left. It appears to be made of wood and has a small metal plate nailed to the door reading: \"The Pompide Family\".\n*line_break\n${partner} knocks on the door.\n\nA young girl that looks around 7 with blonde hair and brown eyes opens the door.\n*line_break\n\"Are you soldiers?\" she asks, her eyes bright with admiration.\n*line_break\n\"Yes.\" ${partner} smiles \"Are there any adults home?\"\n*line_break\n\"@{male Daddy|Mommy} went to the army for a long trip but @{male Mommy|Daddy} is home!\"\n*line_break\n\"Can you get @{male her|him} please?\"\n*line_break\n\"Yes!\" she grins as she runs off into the apartment. \n\nA dark-skinned young @{male woman|man} appears at the doorway \"Hello. Can I help you?\" @{male she|he} asks.\n*line_break\n\"We are looking for any suspicious activity in the building. Can I see your ID please?\"\n*line_break\n\"Of course.\" @{male He|He} hands you @{male her|his} ID \"My late @{male wife|husband} served in the Crows as well.\" @{male she|he} says, pointing to the golden crow patch on your sleeve.\n\nYou look at @{male she|he} ID, everything seems in order.\n\n*label darkwoman\n*choice\n    *disable_reuse #Ask about any suspicious neighbors\n        \"Did you notice anything suspicious lately?\" you inquire.\n        *line_break\n        \"Nothing suspicious, but we do a new neighbor in apartment 7. A university student. Seems nice enough, but you can never know with those Filos.\"\n        *set apartment7 1\n        *goto darkwoman\n    #Ask to search the apartment\n        \"Is it OK if we searched your apartment?\"\n        *line_break\n        \"Why do you want to search my apartment? My @{male husband|wife} was a war hero!\" @{male she|he} answers angrily.\n        *choice\n            #Insist\n                \"I'm sorry @{male ma'am|sir}, but I must insist.\" You state, placing your foot in the doorway.\n                *line_break\n                The @{male woman|man} scowls. \"I guess I have no choice then. Get on with it.\" @{male She|He} steps aside.\n                *page_break\n                You step into a small living room, it has a large carpet covering the entire floor and two couches with a coffee table between them. To the immediate right of the door is a small cupboard with a framed picture of a smiling @{male man|woman} in an RDF uniform, and a framed \"Hero of the Republic\" medal.\n                *line_break\n                In front of you is a doorway. To your left is a door which leads to a small garden. To your right is a small kitchen with a fridge, a stove, a sink, some cabinets and a tall table with three chairs.\n                *label apartment1\n                *choice\n                    *disable_reuse #Go to the garden to the left\n                        You go to the left, to the garden.\n                        \n                        It has a single fig tree and a lawn. You look for any sign of disturbed grass that could point to anything being buried there but find none.\n                        *goto apartment1\n                    *disable_reuse #Search the living room\n                        You search the living room, looking through the cupboard and even moving the carpet but find nothing of interest.\n                        *goto apartment1\n                    *disable_reuse #Search the kitchen\n                        You search the stove, fridge, and cabinets.\n                        \n                        They appear well stocked but you don't see anything suspicious.\n                        *goto apartment1\n                    *disable_reuse #Go through the doorway\n                        You go through the doorway and into a narrow corridor.\n                        \n                        There are two closed doors, one on the left and another on the right.\n                        \n                        \"That is my daughter's bedroom and my bedroom. You will find nothing of interest there.\"\n                        *label apartment1.1\n                        *choice\n                            *disable_reuse #Search the daughter's bedroom\n                                You enter the daughter's bedroom.\n                                \n                                You see a small pink bed on the far side of the room. The floor is littered with toy dolls and toy soldiers.\n                                \n                                You look through the closets and under the bed but find nothing besides clothes and dust bunnies.\n                                *goto apartment1.1\n                            *disable_reuse #Search the @{male mothers|fathers} bedroom\n                                You enter the @{male mothers|fathers} bedroom.\n                                \n                                The room has a king-sized bed on the left and a cabinet on the right, opposite the bed. A carpet covers the entire floor. \n                                \n                                You search under the bed and under the carpet as well as in the cabinets. You find nothing of interest.\n                                *goto apartment1.1\n                            #Go back\n                                *goto apartment1\n                    #Leave\n                        You walk to the door. \"Sorry for troubling you @{male ma'am|sir}. Thank you for your cooperation.\"\n                        *line_break\n                        \"Cooperation my ass. If you want to actually find something, try apartment 7.\" @{male She|He} says, slamming the door behind you.\n                        \n                        \"Do you think we shouldn't have searched the house?\" ${partner} asks \"@{male Her|His} @{male husband|wife} was a hero.\"\n                        *choice\n                            #We did the right thing\n                                *if speech >= 70\n                                    \"We did the right thing. At the end of the day, @{male her|his} small inconvenience could have saved many lives.\" (Success! Needed Persuasion 70) (Persuasion +3)\n                                    *set speech +3\n                                    *line_break\n                                    \"You have a point.\" ${partner} agrees.\n                                    *goto apartment7\n                                *else\n                                    \"We did the right thing. We need to check everyone!\"\n                                    *line_break\n                                    ${partner} doesn't seem so sure. (Needed 70 Persuasion) (${partner} -5)\n                                    *if (partner= \"@{male Abe|Mara}\")\n                                        *set aberel -5\n                                        *goto apartment7\n                                    *elseif (partner= \"Sam\")\n                                        *set samrel -5\n                                        *goto apartment7\n                                    *else\n                                        *set zacrel -5\n                                        *goto apartment7\n                            #We shouldn't
