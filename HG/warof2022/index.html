e continuing. \"I can't wait to go back to the ${unit}. I'm sure you will love it too.\"\n*finish Two months later", "finalbattle": "*comment ambush 1=won battle|2= lost, our fault| 3=won, scouts badly mauled\n*temp intel 0\n*temp success false\n*page_break One week later, 0800, 23rd January, 2022\n*if ambush = 1\n    *achieve ambush\n    The week after the ambush passed, and with it, the feelings of euphoria and pride that follow a successful mission. \n    \n    Even though the ${unit} had performed the ambush perfectly, the passing week had proved the Regovian high command miscalculated the effect wiping out the Sarian convoy would have.\n    \n    When the Sarian king had heard of the blow that had been dealt, he had suffered a heart attack. A day after regaining consciousness, he had ordered the commander of Sarian southern command purged and replaced with a much younger, more aggressive general.\n    \n    This new general, Gen. Tarlek Hem, advocated a much more aggressive buildup and response to the attack.\n    *line_break\n    During the passing week, the King had given an almost daily speech on Sarian television, promising fire and fury upon Regovia in response to the \"Unwarranted banditry and aggression\" by the Citizens Republic.\n    *goto meanwhile\n*elseif ambush = 2\n    The week after the ambush passed, and with it, the feelings of failure and shame that follow a failed mission. \n    \n    *if deadambush =1\n     Even though your team made it through the battle relatively unscathed, the loss of Kusha, one of your teammates, had left you and the rest of TM40 in a sad silence. Due to the heightened tensions, the team was not even allowed to go to Kusha's funeral. With no feeling of closure for most of the week the team had simply walked around the ${quarter} in a delirious state. Barely speaking to one another.\n     \n     During another silent lunch, Zac accidentally spilled @{male his|her} water while reaching for a slice of bread. As the water dripped down the side of the table @{male he|she} suddenly began laughing.\n     *line_break\n     \"Remember when Kusha spilled @{male his|her} water but was so thirsty @{male he|she} started to lick the water off the table?\" @{male he|she} finally managed to explain between fits of laughter. \"That lazy bastard never wanted to be the one to fill the water pitcher.\"\n     *line_break\n     \"And then when @{male he|she} gave up and asked Reggie to fill the pitcher Reggie just spilled @{male his|her} cup on @{male him|her}.\" Sam chuckled. \"You two were always looking for ways to annoy each other, Reggie.\"\n     *line_break\n     \"We were.\" Reggie said, a faint smile on @{male his|her} lips \"I sure do miss that idiot.\"\n     \n     For the first time since the ambush, the team began telling the stories of all the fights Reggie and Kusha had had, laughing for almost an hour straight. After that, the spell had broken, numbing some of the pain.\n     *goto thefailuret\n    *elseif deadambush = 0\n        Luckily, no one had died during the failed mission.\n        *goto thefailuret\n    *elseif deadambush = 2\n        The losses your team suffered in the battle, left the entire team in a spell of silence. Due to the heightened tensions, the team was not even allowed to go to the funerals of the fallen, Kusha and Reggie. With no feeling of closure for most of the week the team had simply walked around the ${quarter} in a delirious state. Barely speaking to one another.\n        \n        During another silent lunch, Zac accidentally spilled @{male his|her} water while reaching for a slice of bread. As the water dripped down the side of the table @{male he|she} suddenly began laughing.\n        *line_break\n        \"Remember when Kusha spilled @{male his|her} water but was so thirsty @{male he|she} started to lick the water off the table?\" @{male he|she} finally managed to explain between fits of laughter. \"That lazy bastard never wanted to be the one to fill the water pitcher.\"\n        *line_break\n        \"And then when @{male he|she} gave up and asked Reggie to fill the pitcher Reggie just spilled @{male his|her} cup on @{male him|her}.\" Sam chuckled. \"I remember that. Those two were always annoying each other.\"\n        \n        For the first time since the ambush, the team began telling the stories of all the fights Reggie and Kusha had had, laughing for almost an hour straight. After that, the spell had broken, numbing some of the pain.\n        *goto thefailuret\n    *elseif deadambush >=3\n        The losses your team suffered in the battle, left the entire team under a spell of silence. Due to the heightened tensions, the team was not even allowed to go to the funerals of the fallen, Kusha, Joshie and Reggie. With no feeling of closure for most of the week the team had simply walked around the ${quarter} in a delirious state. Barely speaking to one another.\n        \n        During another silent lunch, Zac accidentally spilled @{male his|her} water while reaching for a slice of bread. As the water dripped down the side of the table @{male he|she} suddenly began laughing.\n        *line_break\n        \"Remember when Joshie spilled Kushas water, but Kusha was so thirsty @{male he|she} started to lick the water off the table?\" @{male he|she} finally managed to explain between fits of laughter. \"That lazy bastard never wanted to be the one to fill the water pitcher.\"\n        *line_break\n        \"And then when @{male he|she} gave up and asked Reggie to fill the pitcher Reggie just spilled @{male his|her} cup on @{male him|her}.\" Sam chuckled. \"I remember that. Those three were always annoying each other.\"\n        \n        For the first time since the ambush, the team began telling the stories of all the fights Reggie and Kusha had had, laughing for almost an hour straight. After that, the spell had broken, numbing some of the pain.\n        *goto thefailuret\n    *label thefailuret\n    *page_break\n    The failure of the ${unit} to decisively defeat the Sarian convoy caused the entire mission to backfire. The Sarians hailed the returning soldiers as heroes. awarding them with medals for heroism and even a parade in their honor.\n    \n    Nevertheless, when the Sarian King had heard of the blow that had been dealt, he had suffered a heart attack. A day after regaining consciousness, he had ordered the commander of Sarian southern command to resign quietly and replaced with a much younger, more aggressive general.\n    \n    This new general, Gen. Tarlek Hem, advocated a much more aggressive buildup and response to the attack.\n    *line_break\n    During the passing week, the King had given an almost daily speech on Sarian television, promising fire and fury upon Regovia in response to the \"unwarranted banditry and aggression\" by the Citizens Republic\n    *goto meanwhile\n*elseif ambush = 3\n    The week after the ambush passed, numbing the pain from losing so many brothers-in-arms.\n    \n    *if unit = \"Sappers\"\n        *goto notscouts\n    *elseif unit = \"Crows\"\n        *goto notscouts\n    *else\n        *goto thescouts\n*label notscouts\n*if deadambush \u003c=1\n Even though your team made it through the battle relatively unscathed, the Scouts had been almost wiped out, losing more than half of their men.\n *goto thefailure\n*elseif deadambush = 2\n The losses your team suffered in the battle, coupled with the loss of so many Scouts, left the entire team under a spell of silence. Due to the heightened tensions, the team was not even allowed to go to the funerals of the fallen, Kusha and Reggie. With no feeling of closure for most of the week the team had simply walked around the ${quarter} in a delirious state. Barely speaking to one another.\n \n During another silent lunch, Zac accidentally spilled @{male his|her} water while reaching for a slice of bread. As the water dripped down the side of the table @{male he|she} suddenly began laughing.\n *line_break\n \"Remember when Kusha spilled @{male his|her} water but was so thirsty @{male he|she} started to lick the water off the table?\" @{male he|she} finally managed to explain between fits of laughter. \"That lazy bastard never wanted to be the one to fill the water pitcher.\"\n *line_break\n \"And then when @{male he|she} gave up and asked Reggie to fill the pitcher Reggie just spilled @{male his|her} cup on @{male him|her}.\" Sam chuckled. \"I remember that. Those two were always annoying each other.\"\n \n For the first time since the ambush, the team began telling the stories of all the fights Reggie and Kusha had had, laughing for almost an hour straight. After that, the spell had broken, numbing some of the pain.\n *goto thefailure\n*elseif deadambush >=3\n The losses your team suffered in the battle, coupled with the loss of so many Scouts, left the entire team under a spell of silence. Due to the heightened tensions, the team was not even allowed to go to the funerals of the fallen, Kusha, Joshie and Reggie. With no feeling of closure for most of the week the team had simply walked around the ${quarter} in a delirious state. Barely speaking to one another.\n \n During another silent lunch, Zac accidentally spilled @{male his|her} water while reaching for a slice of bread. As the water dripped down the side of the table @{male he|she} suddenly began laughing.\n *line_break\n \"Remember when Joshie spilled Kushas water, but Kusha was so thirsty @{male he|she} started to lick the water off the table?\" @{male he|she} finally managed to explain between fits of laughter. \"That lazy bastard never wanted to be the one to fill the water pitcher.\"\n *line_break\n \"And then when @{male he|she} gave up and asked Reggie to fill the pitcher Reggie just spilled @{male his|her} cup on @{male him|her}.\" Sam chuckled. \"I remember that. Those three were always annoying each other.\"\n \n For the first time since the ambush, the team began telling the stories of all the fights Reggie and Kusha had had, laughing for almost an hour straight. After that, the spell had broken, numbing some of the pain.\n *goto thefailure\n*label thescouts\nThe loss of so many had left the Scouts in a delirious state, walking around the ${quarter} in silence, frequently disappearing to find quiet spots to cry alone in.\n\nDuring another silent lunch, Zac accidentally spilled @{male his|her} water while reaching for a slice of bread. As the water dripped down the side of the table @{male he|she} suddenly began laughing.\n*line_break\n\"Remember when Joshie spilled Kushas water, but Kusha was so thirsty @{male he|she} started to lick the water off the table?\" @{male he|she} finally managed to explain between fits of laughter. \"That lazy bastard never wanted to be the one to fill the water pitcher.\"\n*line_break\n\"And then when @{male he|she} gave up and asked Reggie to fill the pitcher Reggie just spilled @{male his|her} cup on @{male him|her}.\" Sam chuckled. \"I remember that. Those three were always annoying each other.\"\n\nFor the first time since the ambush, the team began telling the stories of all the fights Reggie and Kusha had had, laughing for almost an hour straight. After that, the spell had broken, numbing some of the pain.\n\nIn order to replace the fallen, Maj. Faraz had managed to bring over two teams of\n*if brigade = \"28th Paratrooper\"\n    Wardens from the Svern Brigade\n    *goto twoteams\n*else\n    Wardens from the Paratrooper Brigade\n    *goto twoteams\n*label twoteams\nto bring the number of Scout teams available back to four.\n*goto thefailure\n*label thefailure\nThe failure of the ${unit} to decisively defeat the Sarian convoy caused the entire mission to backfire. The Sarians hailed the returning soldiers as heroes. awarding them with medals for heroism and even a parade in their honor during which they paraded captured Regovian hardware left behind in the confusion, further demoralizing the citizens of the Citizens Republic.\n\nNevertheless, when the Sarian King had heard of the blow that had been dealt, @{male he|she} had suffered a heart attack. A day after regaining consciousness, @{male he|she} had ordered the commander of Sarian southern command to resign quietly and replaced with a much younger, more aggressive general.\n\nThis new general, Gen. Tarlek Hem, advocated a much more aggressive buildup and response to the attack.\n*line_break\nDuring the passing week, the King had given an almost daily speech on Sarian television, promising fire and fury upon Regovia in response to the \"unwarranted banditry and aggression\" by the Citizens Republic.\n*goto meanwhile\n*label meanwhile\n\nMeanwhile, \n*if georgegotaway = 1\n    the unrest in Western Regovia had gotten much worse. Riots had become a daily occurrence and Regovian police and military could not enter a Filo town or city without being pelted with stones and molotov cocktails.\n    \n    @{male George|Georgia} Hamtz continued to be a threat. From @{male his|her} unknown hiding place, @{male he|she} smuggled videotapes to the Filo population, radicalizing them and calling for more attacks on Regovia.\n    *goto nextmission\n*else\n    the unrest in Western Regovia had quieted down a little. While the tension was still high, with the help of reinforcements from Military Police, the Regovian Police had managed to keep the order in Western Regovia. Allowing life to continue almost normally.\n    *goto nextmission\n*label nextmission\n*page_break \n\"As you all know,\" Faraz begins, addressing TM40 in the briefing room. \"the mission last week did not have the effect we have been hoping for and unfortunately, Regovia is still heading towards war with Saria. In perpetration for that war, I requested and received authorization for a small mission on the border.\"\n\nA satellite map of the Greven mountains on the Sarian-Regovian border appears on the screen behind Faraz. @{male He|She} presses a certain point and the image zooms in, revealing a small radio tower.\n*page_break\n*image mapradio.png\n*page_break\n\"This radio tower is a relay point for encrypted communications from Sarian southern command to the entire border. If we manage to place a bug on this tower, without being detected by the Sarians, we would have unfettered access to anything the Sarians say. That should give us a clear knowledge of unit placements, high value targets or any surprises the Sarians are planning for us. Miller knows the plan. Dismissed.\"\n\n*label testing\n*page_break 2300, 23rd January, 2022\n*gosub_scene sub\nThe drive north had been long and depressing. Rain had pelted the windows of the bus for the entire journey, the wet streaks running down the windows warning of the wet fate awaiting anyone outside.\n\nThe bus stops, the doors open.\n*page_break\nMiller stands up and walks to the front of the bus, turning towards the team as @{male he|she} begins to speak.\n*line_break\n\"I know how you are all feeling right now. I know how hard it is to walk in the rain and how much worse it will be when we are all ascending the mountains, covered in mud.\" @{male He|She} pauses and surveys the team, grim determination in @{male his|her} eye. \"When you are cold and rain is falling on you, the enemy is cold and rain is falling on @{male him|her}. ${unit} won't let some rain defeat them. Are you with me?\"\n*line_break\n\"Yes!\" The bus shouts.\n*line_break\n\"Forwards ${unit}!\"\n*page_break \"Forwards ${unit}!\"\nThe team begins the long ascent up the Greven mountains. Thick raindrops pelt your body, only a thin storm coat made of nylon keeping you dry. You know that if you are not careful and rip it, you will be soaking wet in minutes.\n\nAfter an hour of hard climbing you reach a metal fence marking the border between Saria and Regovia, Miller uses a bolt cutter to make a @{male man|woman} sized hole in the fence and just like that- you are in enemy territory.\n*page_break\nThe Sarian radio tower is less than a kilometer away from the border but the rain and mist make it impossible to make it out until you are only 200 meters away.\n\n*temp foundbox false\n*if profession = \"Medic\"\n    Miller calls Walker by radio and together with the Point Marksman and Point LMG they lie near a large boulder, surveying the enemy position. As medic, you also act as Walkers runner so you join @{male him|her} and the rest of the group.\n   \n    *label jimjimwhatdoyousee\n    \"@{jimjimalive JiJi|Noter}, what do you see?\" Miller asks.\n    *if jimjimalive = false\n        Noter had replaced JiJi as point Marksman since the attack on Rusalim. @{male He|She} isn't as good as JiJi was, but @{male he|she} has the best eye in the team.\n    *line_break\n    \"I can see their sentry, It doesn't look like @{male he's|she's} expecting us.\"  \"@{jimjimalive JiJi|Noter} chuckles \"I think @{male he's|she's} on @{male his|her} phone.\"\n    *line_break\n    \"Ha!\" Miller smiles \"I think I see it too, you can see the light on @{male his|her} face from the screen!\"\n    *line_break\n    \"That should make this much easier.\" Walker remarks. \"I don't see any other movement, I think everyone else in there is asleep.\"\n    *line_break\n    \"Excellent.\" Miller says \"let's get back to everyone else. I want all of you to rest a little and I'll tell you when we begin.\"\n    *if profession = \"Medic\"\n        *goto webeginmedic\n    *else\n        *goto webeginlmg\n*elseif profession = \"Marksman\"\n    Miller calls Walker by radio to survey the enemy position. They are joined by Kelly, the Point LMG and yourself, the Point Marksman.\n    \n    \"${nick}, what do you see?\" Miller asks.\n    \n    You look into your scope, at this range, the enemy sentry looks no further than 50 meters away. You notice a faint light on @{male his|her} face.\n    *line_break\n    \"I can see their sentry, It doesn't look like @{male he's|she's} expecting us. I think @{male he's|she's} on @{male his|her} phone.\"\n    *line_break\n    \"Ha!\" Miller smiles \"I think I see it too, you can see the light on @{male his|her} face from the screen!\"\n    *line_break\n    \"That should make this much easier.\" Walker remarks. \"I don't see any other movement, I think everyone else in there is asleep.\"\n    *line_break\n    You switch to thermal vision, but you cannot find any other hidden Sarians. \"I don't see anyone else either.\" You report.\n    *line_break\n    \"Excellent.\" Miller says \"let's get back to everyone else. I want all of you to rest a little and I'll tell you when we begin.\"\n    *goto webeginmarksman\n*elseif profession = \"LMG\"\n    Miller calls Walker by radio and together \n    with @{jimjimalive JiJi|Noter} the Point Marksman and yourself, the Point LMG they lie near a large boulder overlooking the Sarian position.\n    \n    *goto jimjimwhatdoyousee\n*elseif profession = \"HMG\"\n    Miller calls Walker by radio and together with @{jimjimalive JiJi | Noter} the Point Marksman and Zac the Point LMG they lie near a large boulder, surveying the enemy position. As the HMG, you are of no use so you search for a spot to sit down in that will keep most of the wind off you.\n    \n    Upon returning, Miller gathers the team to explain the final plan, it's hard to hear @{male him|her} over the sounds of the rain and wind but you understand the basic outline. There is only one sentry and @{male he|she} isn't paying much attention to what is going on outside. As HMG you are not that useful with your large, heavy weapon so you will leave it behind, and together with Miller, Walker, @{jimjimalive JiJi | Noter} the Point Marksman and Zac the Point LMG you will stealthily make your way to the Sarian position, assisting them in getting in and out.\n    *goto webeginmedic\n*elseif profession = \"Fireteam leader\"\n    Miller calls Walker by radio and together with @{jimjimalive JiJi | Noter} the Point Marksman and Zac the Point LMG they lie near a large boulder, surveying the enemy position. As fireteam leader, you stay behind, making sure the team doesn't make any unnecessary noise that might alert the Sarians to your position. You search for a spot to sit down on that will keep most of the wind off you.\n    \n    A few minutes later, the forward group returns. On the way back, you notice one of the figures is leaning on another, hobbling the entire way back.\n    \n    \"It's Walker.\" Miller explains when @{male he|she} finally reaches you. \"@{male He|She} fell and twisted @{male his|her} ankle, @{male he|she} can't walk so I'll need you to step up as acting sergeant.\"\n    *choice\n        #\"Yes, @{male Sir|Ma'am}!\"\n            *set pcrel -3\n            \"I thought I told you to stop calling me @{male Sir|Ma'am}!\" Miller mutters angrily. (Miller -3)\n            *goto anyway\n        #\"No problem.\"\n            *set pcrel +1\n            Miller smiles. (Miller +1)\n            *goto anyway\n        #\"Can't some other fireteam commander do it?\"\n            \"*set pcrel -5\n            \"Why would you want some other fireteam commander to do it?\" Miller asks angrily \"I can't spare any other fireteam commander, I need them back here.\n            *goto anyway\n*label anyway\nAnyway, this is the plan. I will sneak over there with @{jimjimalive JiJi| Noter}, Kevin, the LMG and you. We get in, get out, easy peasy.\"\n*line_break\n*choice\n    #\"Roger that\"\n        \"Roger that, let's do this.\"\n        *goto webeginleader\n    #\"Easy peasy?\"\n        \"Easy peasy?\"\n        *line_break\n        \"It shouldn't be a problem. trust me.\"\n        *goto webeginleader\n*label webeginmedic\n*page_break\nUnder the cover of darkness, Miller, Walker, @{jimjimalive JiJi | Noter}, Zac and you sneak towards the enemy position.\n\nUp close, the enemy position looks more impressive than from afar. The camp is surrounded by a two and a half meter tall concrete wall with a single guard tower in the southeastern corner. \n*line_break\nYou move around the wall, searching for the entrance to the complex.\n\n\"Found it.\" Walker whispers, pointing to a thin metal door.\n*line_break\n\"Open it.\" Miller whispers back.\n*line_break\nWalker tries to unsuccessfully push the door. \"I can't open it. There's a latch on the door.\"\n*choice\n    #Force the door open\n        \"Let's break it down!\" you offer \"I think I see a weak spot, if I can break it we can get in easily.\"\n        *line_break\n        \"That sounds like a terrible idea.\" Walker mumbles.\n        \n        \"Might as well try it.\" Miller whispers back. \"Do what you have to do.\"\n        \n        You use the butt of your gun to smash the door axis. Besides aloud bang, there is no effect.\n        \n        \"What the hell ${nick}!\" Walker almost shouts \"Have you lost your mind?\"\n        *line_break\n        \"[i]Mat ke?![/i]\" A voice from inside the complex shouts.\n        *line_break\n        \"Shit.\" Miller whispers. \"Now they know we're here.\" (Miller -5, Walker -5)\n        *set pcrel -5\n        *set sgtrel -5\n        \n        \"[i]Kumo! Regovi bo bab[/i]!\" the voice shouts again.\n        *line_break\n        An alarm begins to sound from the complex.\n        \n        *goto aflare\n    #\"Let's climb over the wall\"\n        \"Let's climb over the wall.\" You offer.\n        *line_break\n        Miller nods \"It's simple enough to cross a wall. We learned this in training. You know the technique.\"\n        \n        Zac and @{jimjimalive JiJi | Noter} nod, they lean on the wall and lower themselves to a half sitting position so that a 90 degree angle is formed between their calf and thigh. You and Walker quickly stand on their thighs, putting as much weight as possible on the wall.\n        *line_break\n        Peering inward, you see the complex more clearly. In the center, standing almost twenty meters high- is the radio tower, your target. Additionally, to your left are two squat mobile homes. You assume they contain the other soldiers manning this radio tower, everything is quiet.\n        *page_break\n        \"All clear.\" you whisper to Miller \"We can go in.\"\n        *line_break\n        \"Great, do it.\"\n        \n        You and Walker lift yourselves over the wall, laying down and helping the rest of the group to the other side.\n        *line_break\n        You approach the radio tower, searching for the control box, where the bug needs to be placed.\n        *line_break\n        *if intelligence >=75\n            You notice a cable running from the bottom of the tower toward one of the mobile homes, you follow the cable, it reaches a closed metal box screwed to the wall of the mobile home.\n            *line_break\n            \"Psst! Found it!\" (Success! Needed 75 intelligence) (Intelligence +3)\n            *set intelligence +3\n            *set foundbox true\n            *goto foundit\n        *else\n            You search the entire bottom of the radio tower but you cannot find anything resembling a control unit. (Needed 75 intelligence)\n            \n            Walker and Miller gesture wildly, the meaning of their wild hand waves is clear- \"Where the hell is the control box?!\"\n            \n            Suddenly, Zac points to a small box on the wall of one of the mobile homes.\n            *goto foundit\n*label foundit\n*page_break\nMiller opens the box and rewires a few wires, placing the bug safely inside.\n*line_break\n@{male He|She} motions with @{male his|her} head toward the wall, silently signaling the exit route.\n\nYou exit the same way you entered, crossing the wall undetected.\n*if ambush = 1\n    *goto leavesafely\n*else\n    *goto interrupted\n*label leavesafely\nand returning safely to the rest of the team.\n\n\"Great job everyone.\" Miller says \"Now, let's get home.\"\n*achieve bugged\n*goto success\n*label interrupted\n\nYour boots hit the ground on the other side. You look up. Headlights are coming towards the Sarian radio tower.\n*line_break\n\"Get down!\" Walker pushes you into the mud. \"Miller, we have company.\"\n*page_break\n\"Crawl to the shrubbery over there\" Miller orders \"and stay quiet.\"\n\nYou and the group crawl in the mud, reaching the shrubbery just as four armored cars come to a halt next to the complex door. A few armed soldiers exit the vehicles, the rain and darkness give you cover. \n\nOne of the soldiers walks towards you, trips on a stone and lands right on top of Zac.\n\n*goto shit\n            *label shit\n            \"Shit.\"\n            *page_break\n            The soldiers turn towards you just as Walker opens fire.\n            *line_break\n            The enemy soldiers who exited the vehicles fall. The few remaining in the vehicles are too surprised and disoriented to see where you are. From experience, you also know that firing from inside a closed vehicle without ear protection is an excellent way to lose your hearing.\n            *line_break\n            \"Give us cover fire!\" Miller orders into the radio \"But keep to the side opposite to us, keep the guard tower busy.\"\n            *choice\n                #Retreat.\n                    You fire a burst towards one of the vehicles.\n                    *line_break\n                    \"Let's go! We need to put as much ground between us before they realize they should fire flares and find our location.\" Miller shouts.\n                    \n                    The group quickly begins an organized retreat, leapfrogging back the way you came while continuing to fire at the vehicles and complex door to deny the Sarians maneuverability.\n                    *line_break\n                    *if shooting >= 65\n                        Even while retreating, you fire accurate shots, hitting any Sarian brave enough to peek out of cover. (Shooting +3)\n                        *set shooting +3\n                        *line_break\n                    With the help of the cover fire, you manage to reach the rest of the team.\n                    \n                    \"Fire a LAW at the wall, let's make them think they are in for a surprise.\" Miller orders with a smile. \"That should give us a chance to retreat until our artillery can start shooting.\"\n                    *goto failed\n                #Try to convince Miller to take control of the radio tower.\n                    \"Miller, if we can take the tower, maybe we can still gather some intel!\" you shout, struggling to be heard over the storm and firefight.\n                    *line_break\n                    Miller waits a few moments before answering. \"Let's do it.\"\n                    \n                    You and the group begins leapfrogging towards the wall, slipping grenades inside the enemy vehicles and taking cover.\n                    *line_break\n                    The grenades explode inside the armored vehicles, a plume of fire and smoke rises from the destroyed husks of metal, temporarily lighting the faces of your comrades.\n                    *line_break\n                    \"Fire a LAW at the wall on your side.\" Miller orders into the radio. \"Make them think we are coming from the other side.\"\n                    \n                    Another explosion rocks the complex and the shouting inside increases in volume, you can almost hear the individual voices from inside.\n                    *line_break\n                    *label aflare\n                    A flare rises into the sky from inside the complex, shining light all around you.\n                    *choice\n                        #\"If Zac can get on the wall, @{male he|she} can fire with the LMG, that should take a few out.\"\n                            @{jimjimalive JiJi | Noter} squats on the wall while Zac stands on @{male his|her} legs, shooting inside the complex. @{male He|She} manages to fire only two short bursts before @{male he|she} jumps down just as a bullet whizzes right where @{male his|her} head was.\n                            *label toohot\n                            *line_break\n                            \"Too hot. We should leave.\" Walker says.\n                            *line_break\n                            \"Agreed.\" Miller replies \"Organized retreat, go!\"\n                            \n                            The group quickly begins an organized retreat, leapfrogging back the way you came while continuing to fire at the enemy soldiers and complex door to deny the Sarians maneuverability.\n                            *line_break\n                            *if shooting >= 65\n                                Even while retreating, you fire accurate shots, hitting any Sarian brave enough to peek out of cover. (Shooting +3)\n                                *set shooting +3\n                            *line_break\n                            With the help of the cover fire, you manage to reach the rest of the team.\n                            *goto failed\n                        #\"We should split up and throw grenades inside, that way, they won't know our position.\"\n                            The group splits up into pairs and begins throwing grenades inside the complex walls, you throw all three of your remaining grenades as well as all of Walkers.\n                            *page_break\n                            The explosions are deafening but even so-in between the separate explosions you can hear the screams and shouts of the Sarians trapped within their own base.\n                            *line_break\n                            When the explosions and screams end- the complex falls deathly silent.\n                            \n                            \"I'll help you up ${nick},\" Walkers offers \"take a look inside.\n                            \n                            You stand once again on Walker's knees, allowing you to peek inside.\n                            *line_break\n                           *goto stopsearching3\n                                    *disable_reuse #Search the radio tower\n                                        *set time_left -1\n                                        *if foundbox = false\n                                            You search around the radio tower, you notice a cable running from the tower connects to a metal box nailed to one of the rooms. \n                                            *line_break\n                                            You open the box, it appears to be the control box.\n\n                                            \"Miller! I found something!\"\n                                            *line_break\n                                            Miller rushes to you.\n                                            *line_break\n                                            \"It looks like the control box, shame we couldn't bug it. Maybe we will still be able to get something off it though.\" \n                                            *line_break\n                                            Miller connects a USB stick to the box, placing it back into@{male his|her} pocket a few moments later.\n                                            *label intel3\n                                            *set intel +1\n\n                                            *if time_left > 0\n                                                \"Good job, we still have ${time_left} minutes left, let's make the most of it.\n                                                *goto searching3\n                                            *else\n                                                \"We're out of time. Let's go.\"\n                                                *goto stopsearching3\n                                        *else\n                                            \"Miller, maybe we can salvage something from the control box?\" you ask\n                                            *set intel +1\n                                            *line_break\n                                            \"It's worth a shot.\"\n                                            \n                                            Miller connects a USB to the control box. \"If there were any codes loaded onto it,\" @{male he|she} explains \"we should have them now.\"\n                                            *goto intel3\n                                    *disable_reuse #Search the bodies\n                                        Taking a deep breath, you begin searching the bodies.\n                                        *set time_left -1\n                                        \n                                        *if intelligence >= 50\n                                            You realize that if anyone has anything of note, it is probably the senior officer. You look over the bodies until you find one with ranks on@{male his|her} shoulder. (Success! Needed 50 intelligence) (Intelligence +3)\n                                            *set intelligence +3\n                                            \n                                            You search the dead officer's pockets, you find a military phone and some blood-stained documents.\n                                            *set intel +1\n                                            *goto timeleft3\n                                        *else\n                                            You search a few random bodies but besides getting your hands bloody, you find nothing of note.\n                                            *goto timeleft3\n                                    *disable_reuse #Search the guard tower\n                                        *set time_left -1\n                                        You climb the stair to the guard tower, the sentry lies on the floor, a pool of blood around@{male his|her} leg and arm.\n                                        \n                                        \"[i]Mi intak?[/i]\" @{male He|She} murmurs \"[i]Al temoot ani...[/i]\"\n                                        *choice\n                                            #Place a tourniquet on@{male his|her} leg and arm.\n                                                *achieve mercy\n                                                *if profession = \"Medic\"\n                                                    You act quickly, placing tourniquets on@{male his|her} arm and leg. You know @{male he|she} probably lost to much blood already but you can't just ignore @{male him|her}. ([i]Luf[/i] +3) (Medic +3)\n                                                    *set medic +3\n                                                    *set loyal -3\n                                                    *goto takethehandradio3\n                                                *else\n                                                    You act quickly, placing tourniquets on@{male his|her} arm and leg. You don't know if it will do any good but you can't just leave @{male him|her}. ([i]Luf[/i] +3)\n                                                    *set loyal -3\n                                                    *goto takethehandradio3\n                                            #Ignore @{male him|her}.\n                                                You ignore the wounded Sarian (Loyal +3)\n                                                *set loyal +3\n                                                *goto takethehandradio3\n                                        *label takethehandradio3\n                                        *line_break\n                                        You take the hand-held radio from@{male his|her} combat vest as well as a small file folder.\n                                        *set intel +1\n                                        \n                                        *if time_left > 0\n                                            You have ${time_left} minutes left.\n                                            *goto searching3\n                                        *else\n                                            You are out of time.\n                                            *goto stopsearching3\n                            *else\n                                *goto stopsearching3\n                        #\"Let's break the door down, go in guns blazing.\"\n                            Miller fires three successive bullets into the door hinges, weakening the door enough to cause it to fall down on its own.\n                            *line_break\n                            As the door falls, a tracer bullet flies towards Miller, missing @{male him|her} by barely a centimeter. Miller jumps sideways to cover, firing a few shots of @{male his|her} own inside.\n                            *goto toohot3\n*label timeleft3\n\n*if time_left > 0\n    You have ${time_left} minutes left.\n    *goto searching3\n*else\n    You are out of time.\n    *goto stopsearching3\n*label stopsearching3\n*page_break\n*if intel >=3\n     \"We might not have managed to bug the radio tower but the stuff we found back there should make up for it.\" Miller remarks as you rejoin the rest of the team. \"Good job everyone.\"\n     *goto success\n*elseif intel >= 1\n    \"I can't believe we came all this way and failed. At least we found some intelligence, maybe it'll be useful later on.\" Miller remarks as you rejoin the rest of the team. \n    *goto failed\n*else\n    \"I can't believe we came all this way for nothing.\" Miller mumbles as you rejoin the rest of the team. \n    *goto failed\n*label success\n*set success true\n*page_break 0500 24th January, 2022\nWet, muddy and with smiles on your faces, you enter the ${quarter} and disembark from the bus.\n\nThe team is greeted by a smiling and clapping Maj. Faraz\n\n*if intel = 3\n    \"I just got off the phone with HQ, we might not have bugged the radio tower, but the intel you brought back should be enough to make up for it.\"\n    *goto inthemorning\n*else\n    \"I just got off the phone with HQ, the bug is transferring every word on the Sarian network.\" Faraz laughs \"Go to bed, we'll talk in the morning.\"\n    *goto inthemorning\n*label failed\n*page_break 0600 24th January, 2022\nWet, muddy and silent you enter the ${quarter} and disembark from the bus.\n\nThe team is greeted by a frowning Maj. Faraz.\n\n*if intel =2\n    \"I just got off the phone with HQ, the stuff you brought back are cute but not enough to make up for failing the primary objective of this mission. If we go to war, we will be going in almost blindly.\"\n    *goto inthemorning\n*elseif intel = 1\n    \"I just got off the phone with HQ, the intel you brought back is not nearly enough to make up for failing the primary objective of this mission. If we go to war, we will be going in almost blindly.\"\n    *goto inthemorning\n*elseif intel = 3\n    *bug too much intel to fail\n*else\n    \"I just got off the phone with HQ. Miller, come to my office immediately, the rest of you, get out of my sight. I don't want to see the rest of you until tomorrow.\"\n    *goto inthemorning\n*label inthemorning\n*page_break 1300, 24th January, 2022\nYou wake up a few hours later, feeling rested @{success and content | but ashamed, the events of last night still weighing heavily on your thoughts}.\n\nYou stretch in bed, get up and grab your toothbrush. Just as you are about to leave your room, the unmistakable ascending and descending tone of an air raid siren begins to sound.\n*choice\n    #Stay inside\n        There have been no air raids on Regovia for many years but air raid procedure is still taught in school. You open the windows and close the door, taking cover under your bed.\n        \n        @{male Abe|Mara} runs inside, taking cover next to you.\n        *goto takecover\n    #Run outside\n        You run outside.\n        \n        \"To cover!\" A voice shouts. You follow the stream of soldiers to the briefing room, taking cover under the chairs.\n        \n        You find yourself right next to @{male Abe|Mara}.\n        *goto takecover\n*label takecover\n\n\"What the hell is going on!\" @{male He|She} shouts over the blaring siren.\n*line_break\n\"I don't know!\" You shout back.\n\nMoments later, a sound like the sky itself is being ripped in two is heard as jet planes roar overhead, passing Lead Tower unopposed.\n\n[i]\"${unit}! Unidentified jets have entered Regovian airspace and have passed over Lead Tower en route to Lovary. Stay in cover until further updates.\"[/i]\n\n\"I can not believe it.\" @{male Abe|Mara} mumbles. \"This means war for sure.\"\n*choice\n    #\"You sound a bit too happy.\"\n        \"You sound a bit too happy.\" ([i]Luf[/i] +3)\n        *set loyal -3\n        *line_break\n        @{male Abe|Mara} smiles. \"Of course I am happy! This is our chance for glory!\"\n        *choice\n            #\"Glory? What of the dead?\"\n                \"Glory? What of the dead?\" You protest.([i]Luf[/i] +3)\n                *set loyal -3\n                *line_break\n                @{male Abe|Mara} shakes @{male his|her} head and smirks. \"The dead? The Sun will remember them fondly.\" (@{male Abe|Mara} -3)\n                *set aberel -3\n                *goto afewmiuteslater\n            #Smile \"It's true, this war could be our chance to shine.\"\n                You smile \"It's true, this war could be our chance to shine.\" (Loyal +3)\n                *set loyal +3\n                *line_break\n                @{male Abe|Mara} smile grows even larger. \"So you understand. If I perform well in the coming days I will finally have the chance to prove my worth, avenge my @{male brothers|sisters} and become an officer!\" (@{male Abe|Mara} +3)\n                *set aberel +3\n                *goto afewmiuteslater\n    #\"Finally! A chance to knock down those Sarians a notch!\"\n        \"Finally! A chance to knock down those Sarians a notch!\" (Loyal +3)\n        *set loyal +3\n        *line_break\n        @{male Abe|Mara} smiles widely. \"Indeed. This will be our chance for glory.\"\n        *choice\n            #\"And vengeance.\"\n                \"And vengeance.\" You add. (Loyal +3)\n                *set loyal +3\n                *line_break\n                \"And vengeance.\" @{male Abe|Mara} repeats slowly. \"For Cali and Itzi.\" @{male Abe|Mara} tilts @{male his|her} head sideways. \"You may be more of a southerner than you think. (@{male Abe|Mara} +3)\n                *set aberel +3\n                *goto afewmiuteslater\n            #\"You might be able to become an officer.\"\n                \"You might be able to become an officer.\" You say.\n                *line_break\n                \"Maybe.\" @{male Abe|Mara} nods.\n                *goto afewmiuteslater\n*label afewmiuteslater\n\nSuddenly, Miller runs into the room. \"All clear. Quick! Come to the briefing room!\"\n*page_break\nBy the time you reach the briefing room, all the chairs are taken, filled with chattering ${unit} waiting for Maj. Faraz to explain the events of the past hour.\n\nMaj. Faraz wastes no time. @{male He|She} stands at the podium and turns to the crowd of confused soldiers.\n*line_break\n\"Sarian planes have bombed Lovary.\" @{male he|she} says in a monotonous voice, not betraying @{male his|her} feelings. \"As of right now, we don't know the extent of the damage and I don't know how Regovia will respond. What I [b]do know[/b], is that we need to make ourselves useful and prepare for the coming war, I promise you we will be at the front of whatever happens.\"\n*gosub_scene sub\n*page_break\n*comment check to see how well you did until now\n*if ((success = false) and (ambush != 1))\n    *achieve banished\n    @{male He|She} was wrong.\n    \n    After an entire day of waiting for orders, Maj. Faraz was forced to admit that HQ had decided that the failures of the ${brigade} ${unit} in the past have depleted any goodwill and trust in the abilities of ${brigade} ${unit} to assist the RDF in the war with Saria.\n    \n    The entire company had been sent to the southern border with Wev and tasked with replacing the 108th Armored brigade. The 108th had been ordered to move north and take part in the war and so needed someone to replace them on border duty.\n    \n    Your days had become a boring monotony of waking up, going on patrol for 8 hours, returning for guard tower duty for another 4 hours then sleep. Rinse and repeat.\n    *page_break\n    And if that wasn't enough, the war had not been going well. \n    *line_break\n    The RDF response to the air raids on Lovary had been thwarted by the Sarian defenses in the Greven mountains. \n    *line_break\n    Air raids were foiled by Anti-Aircraft missiles and the well-defended and reinforced bunkers and positions repulsed RDF attacks.\n    \n    Intelligence about Sarian movements was scarce, RDF raids into Saria failed more than they succeeded due to the lack of intelligence. \n    *line_break\n    Sarian battalions had set up positions in areas where they hadn't been before and as a result the number of dead and wounded RDF soldiers rose daily.\n    \n    *if georgegotaway = 1\n        Meanwhile, the unrest in Western Regovia grew even more. Armed Filo militias had seized control of Filo cities and were organizing raids on Regovian police and military, arming themselves and growing stronger by the day. The RDF, already tied down by the situation in Saria, could not spare the troops to quell the growing rebellion.\n        *goto arrestgeorge\n    *else\n        The only silver lining was the continued quiet in Western Regovia. With the FFF completely dismantled after the arrest of their leader @{male George|Georgia} Hamtz, the Military Police could return to assisting the war effort.\n        *page_break\n        *goto onelastchance\n*elseif ((success = false) and (ambush = 1)) \n    @{male He|She} was wrong.\n    \n    After an entire day of waiting for orders Maj. Faraz reported that HQ had decided that the failures of the ${brigade} ${unit} had made it impossible to trust the ${brigade} ${unit} with leading the war effort.\n    \n    The company had been sent north to assist the\n    *if brigade = \"28th Paratrooper\"\n        1st Svern \n        *goto brigade\n    *else\n        28th Paratrooper \n        *goto brigade\n    *label brigade\n    brigade who had been chosen to lead the spearhead into Saria.\n    \n    The tide of the war favored Regovia, but not by much.\n    *line_break\n    Intelligence about Sarian movements and plans was too scarce to be of any real use but Regovian attacks on the weakly defended Sarian camps lead to victories and Regovia managed to occupy the Sarian side of the Greven mountains within a few days.\n    \n    The ${brigade} ${unit} were tasked with defending one of the newly occupied Sarian bases while the RDF spearhead continued north, with the objective of reaching artillery range of the Sarian capital of Tamashk.\n    \n    *if georgegotaway = 1\n        Meanwhile, the unrest in Western Regovia grew even more. Armed Filo militias had seized control of Filo cities and were organizing raids on Regovian police and military, arming themselves and growing stronger by the day. The RDF, already tied down by the situation in Saria, could not spare the troops to quell the growing rebellion.\n        *goto defendbase\n    *else\n       Western Regovia continued to pose no problem. The FFF had been completely dismantled after the arrest of their leader @{male George|Georgia} Hamtz and the Military Police could return to assisting the war effort.\n       *goto defendbase\n*elseif ((success= true) and (ambush != 1))\n    *achieve assist\n    @{male He|She} was wrong.\n    \n    After an entire day of waiting for orders Maj. Faraz reported that HQ had decided that the failures of the ${brigade} ${unit} had made it impossible to trust the ${brigade} ${unit} with leading the war effort.\n    \n    The company had been sent north to assist the\n    *if brigade = \"28th Paratrooper\"\n        1st Svern \n        *goto brigade2\n    *else\n        28th Paratrooper \n        *goto brigade2\n    *label brigade2\n    brigade who had been chosen to lead the spearhead into Saria.\n    \n    The tide of the favored Regovia, but not by much.\n    *line_break\n    While intelligence about Sarian troops and movements was abundant, it painted a distressing picture- Sarian convoys were reinforcing border bases with heavy tanks and artillery while the influx of infantry allowed the Sarians to set up ambushes on the routes into Saria making a surprise attack impossible.\n    \n    In response, the \n    *if brigade = \"28th Paratrooper\"\n        1st Svern \n        *goto brigade1\n    *else\n        28th Paratrooper \n        *goto brigade1\n    *label brigade1\n    Wardens sabotaged Sarian SAM missiles allowing a small window of opportunity during which the Regovian air force paved the way for an RDF spearhead into the Sarian side of the Greven mountains.\n    *line_break\n    Thanks to high-quality intelligence, the airstrikes disabled the enemy heavy tanks allowing a push into enemy territory. Within a few days of heavy fighting, the Sarian bases were captured. \n\n    The ${brigade} ${unit} was tasked with defending one of the newly occupied Sarian bases while the RDF spearhead continued north, with the objective of reaching artillery range of the Sarian capital of Tamashk.\n\n    *if georgegotaway = 1\n        Meanwhile, the unrest in Western Regovia grew even more. Armed Filo militias had seized control of Filo cities and were organizing raids on Regovian police and military, arming themselves and growing stronger by the day. The RDF, already tied down by the situation in Saria, could not spare the troops to quell the growing rebellion.\n        *goto defendbase\n    *else\n        Western Regovia continued to pose no problem. The FFF had been completely dismantled after the arrest of their leader @{male George|Georgia} Hamtz and the Military Police could return to assisting the war effort.\n        *goto defendbase\n*else\n    @{male He|She} was right.\n    \n    Within a day the entire ${brigade} brigade moved northwards towards the Sarian side of the Greven mountains.\n    *line_break\n    The previous missions by the ${brigade} Wardens had proved without a shadow of a doubt the high worth of the ${brigade} ${unit}. In a show of trust, HQ had tasked the ${brigade} brigade to occupy the Sarian side of the Greven mountains\n    *page_break\n    Within the first 24 hours of the push, the Wardens had occupied the entire Sarian side of the Greven mountains, 48 hours ahead of schedule.\n    *line_break\n    The combination of quality intelligence and the under-supplied and undermanned Sarian bases had caused mass panic in the Sarian military. As Regovian forces advanced, panic within the Sarian southern command grew until the entire Sarian defense had crumbled in the face of the Regovian advance. \n    \n    *if georgegotaway = 1\n        The only problem continued to be Western Regovia where unrest grew daily. Armed Filo militias had seized control of the major Filo cities and began to organize raids on Regovian police and military, arming themselves and growing stronger by the day. The RDF, already tied down by the situation in Saria, could not spare the troops to quell the rebellion.\n        *goto yellowroad\n    *else\n        Western Regovia continued to pose no problem. The FFF had been completely dismantled after the arrest of their leader @{male George|Georgia} Hamtz and the Military Police could return to assisting the war effort.\n        *goto yellowroad\n*label arrestgeorge\n*label onelastchance\n*comment mission to arrest george hamtz\n*page_break 1400, 18th February, 2022\n*image mapsassik.png\n*page_break\nYou lean on the outside of your patrol vehicle, an armored car suited for cooler weather.\n\n\"Are you [b]sure[/b] the air conditioning is dead?\" Zac asks the driver, a private by the name of @{male David|Vita}.\n*line_break\n\"I've been driving this piece of shit for the past four months, I know it like my car back home.\" David replies \"This hunk of metal should have been retired about five years ago, it's a miracle the AC survived until now.\n*choice\n    #\"Let me take a look.\"\n        \"Be my guest.\" David chuckles \"You'll \n        *if intelligence >=40\n            nev...\"\n            *line_break\n            David is cut short when the air conditioning turns back on, blasting a cool stream of air at Sam, who is still sleeping inside. (Success! Needed 40 intelligence) (Intelligence +1)\n            *set intelligence +1\n            *line_break\n            \"How did you do that?\" David sputters \"I tried everything!\"\n            *line_break\n            \"All you drivers are the same...\" You point at the AC knob \"You try to turn it all the way instead of stopping a little before. I don't know why but it always works.\"\n            *goto radio\n        *else\n            never fix it.\"\n            *line_break\n            After a minute of fiddling with the various knobs and buttons on the dashboard, you admit defeat. (Needed 30 intelligence)\n            *line_break\n            \"Told ya.\" David snickers.\n            *goto radio\n    #\"Let's get back to base then, we can't drive around the desert in this sauna.\"\n        \"Great idea.\" Zac nods \"I'm sick of this useless patrol anyway.\"\n        *goto radio\n*label radio\n\nSuddenly, the radio sputters to life.\n*line_break\n\"[i]Patrol from Base, do you read me?[/i]\"\n*line_break\n\"Loud and clear base, what's this about?\" Zac replies, speaking into the radio.\n*line_break\n\"[i]Return to base ASAP. It's urgent.[/i]\"\n*line_break\n\"Received.\" Zac places the radio back in the vehicle. \"You heard them, let's go.\"\n*page_break\nDuring the drive to the base, you begin to hear a weird humming sound, you listen in, attempting to find the source of the noise.\n\n\"@{male Abe|Mara}, is that you?\" You ask.\n*line_break\n\"Yes. Was I bothering you?\" @{male He|She} asks.\n*choice\n    #\"Yes. Cut that out.\"\n        \"Sorry. I will stop now.\" (@{male Abe|Mara} -5)\n        *set aberel -5\n        *goto uponarriving\n    #\"No.\"\n        @{male Abe|Mara} continues the strange humming until you arrive.\n        *goto uponarriving\n    #No. What are you humming?\"\n        *if aberel \u003c 60\n            \"Nothing.\" @{male Abe|Mara} stops humming until you arrive.\n            *goto uponarriving\n        *else\n            *goto ihadthought\n        *label ihadthought\n        \"I had thought you would never ask.\" @{male Abe|Mara} smiles. \"Stop the car!\"\n        *line_break\n        \"What is it?\" @{male David|Vita} asks.\n        *line_break\n        \"Stop the car, please.\"\n        \n        The patrol vehicle stops on the side of the dirt road.\n        *line_break\n        \"After me.\" @{male Abe|Mara} says, jumping out the back door.\n        *choice\n            #\"Zac, Sam, you coming?\"\n                \"Nah, it's way too hot out there.\" Zac replies. \"I'll keep sleepy Sam here company.\"\n                *line_break\n                \"Close the door.\" Sam murmurs, still half asleep. \"You're letting all the heat out.\"\n                *goto thewave\n            #\"Let's stay inside, @{male Abe|Mara}. It's way too hot out there and we're going to be late.\"\n                @{male Abe|Mara} frowns but reenters the patrol vehicle. (@{male Abe|Mara} -3)\n                *set aberel -3\n                *goto uponarriving\n*label thewave\n\nThe wave of heat from the desert sun hits you like a fist. You find yourself silently thanking whoever invented the air conditioner.\n\n\"What is it @{male Abe|Mara}?\" You say, raising your hand to shield your eyes from the scorching desert sun.\n*line_break\n\"Look around. What do you see?\"\n\nYou turn your head left and right. The bright desert sand reflects sunlight into your eyes, blinding you.\n*fake_choice\n    #\"A burning hot desert.\"\n    #\"A beautiful view.\" \n\"You know what I see?\" @{male Abe|Mara} says. \"I see home.\"\n*line_break\n@{male Abe|Mara} takes in a deep breath holding it for a few moments before breathing out. \"Try to see the desert like I see.\"\n\nYou look around again, this time your eyes are already used to the sun, you think you understand what @{male Abe|Mara} is talking about.\n\nThe windswept boulders, the small sand dunes and brown bushes are each beautiful in their own way.\n\n\"When I was little, maybe 13 years old.\" @{male Abe|Mara} cuts off your thoughts. \"I was a troublemaker. I talked back to my elders, I disrespected my parents. After a while, it was decided I had forgotten the meaning of home.\"\n*line_break\n\"What does that mean?\"\n*line_break\n\"I was left in the sands alone for a day.\" Replies solemnly.\n*choice\n    #\"That's child abuse!\"\n        \"I wasn't really alone.\" @{male Abe|Mara} explains. \"My @{male father|mother} was watching me.\"\n        *goto howdidyoudoit\n    #\"How did you do it?\n        *label howdidyoudoit\n        @{male Abe|Mara} picks up a handful of sand. \"I waited and listened to the sounds of the Sassik. I learned to love the desert and the sand. When I was allowed to come back to the village at sundown I had a smile on my face. I had found my home.\" @{male Abe|Mara} smiles wistfully. \"I was humming a song I made up that day, I call it \"The Song of The Sassik\", it reminds me of that day.\" (@{male Abe|Mara} +5)\n        *set aberel +5\n        *achieve abe\n        *label areyouready\n        *choice\n            *disable_reuse #\"It's still child abuse.\"\n                \"Absolutely. My @{male father|mother} is not a kind @{male man|woman}. We don't talk much.\"\n                *goto areyouready\n            #\"Are you ready to get back to base?\"\n                @{male Abe|Mara} smiles. \"Of course.\"\n                *goto uponarriving\n*label uponarriving\n*page_break\nUpon arriving at the base you are quickly rushed to one of the rooms in the center of the camp where Faraz and Miller are talking to the rest of the ${unit}.\n\n\"What's up?\" Zac asks, wiping the sweat from @{male his|her} brow on @{male his|her} \n*if brigade =\"1st Svern\"\n    brown\n    *goto beret\n*elseif brigade =\"28th Paratrooper\"\n    maroon\n    *goto beret\n*elseif brigade = \"93rd Rivar\"\n    green\n    *goto beret\n*elseif brigade = \"84th Hulni\"\n    purple\n    *goto beret\n*else\n    *bug No brigade found\n*label beret\nberet. \n*line_break\n\"Glad you could join us.\" Miller smiles \"We have some good news.\"\n*if georgegotaway = 0\n    *goto todefendthebase\n*line_break\nFaraz gestures to an unrolled map of Regovia at@{male his|her} feet. \"Sorry I don't have any of the high-tech screens we have at ${quarter}. I know this exile hasn't been kind to us, but hopefully, this will change some things.\"\n*line_break\n\"We're going back?\" Zac asks hopefully.\n*line_break\n\"Maybe.\" Faraz answers \"We have one shot to bring in @{male George|Georgia} Hamtz, the infamous leader of the FFF. If we do, I'm optimistic about our chances of leaving this desert for good.\"\n\nEveryone smiles, the past weeks had been hard, sleep was scarce and free time non-existent. The only plentiful thing around was the desert sand. It invaded everything in camp, especially clothing.\n\n\"We have pretty reliable intel that @{male George|Georgia} wants to bring@{male his|her} FFF militia here.\" Faraz points to a point on the map \"Lyan is a mixed Filo-Regovian city, @{male he|she} believes that by capturing the city and holding the Regovian citizens' hostage @{male he|she} can force the government to surrender and guarantee @{male his|her} people independence.\"\n*line_break\n\"Fucking bastard.\" Zac whispers.\n*line_break\n\"We obviously can't let that happen.\" Faraz continues \"We have a unique opportunity to apprehend @{male him|her} in@{male his|her} hometown of Toplah.\"\n*image mapstoplah.png\n*line_break\n\"I'm assuming that no one wants to spend the remainder of the war stuck here,\" Miller interjects \"so we really need to succeed in this mission.\"\n*choice\n    *selectable_if (leadership >= 80) #\"We will not fail.\" (Leadership)\n        \"We will not fail.\" You announce \"We will do whatever it takes.\" (Leadership +1)\n        *set leadership +1\n        *goto iknowyouwill\n    #Stay quiet.\n        \"I think I speak for everyone when I say we would rather shoot ourselves in the head than go on another patrol.\" @{male Abe|Mara} says. \"We will not fail.\"\n        *goto iknowyouwill\n*label iknowyouwill\n*line_break\nMiller nods. \"I know.\"\n*page_break 2000, 18th February, 2022\nAfter being driven to a small base near Lyan, the plan is explained.\n*line_break\nSince the Filo riots have become more and more effective, gathering intelligence about Filo VIPs such as @{male George|Georgia} Hamtz has become extremely difficult. However, a window of opportunity has presented itself.\n*line_break\nA Filo child by the name of Retty Tvek had been overheard telling a friend that Hamtz has gone to receive a blessing from@{male his|her} father, a local religious leader.\n\nThe Regovian Internal Security Bureau (Filo division) believes that they have located @{male George|Georgia}s hideout.\n*page_break 0300, 19th February, 2022\nYou check your safety one last time before cocking your \n*if profession= \"HMG\"\n    FN MAG \n    *goto cocking\n*if profession= \"LMG\"\n    LMG \n    *goto cocking\n*else\n    rifle \n*label cocking\nand disembarking the undercover civilian car on the southern side of Toplah. The full moon lights up the terrain around you more than you would like, revealing the tightly clustered group of houses. \n\n*temp fireteam false\nYour earpiece cackles.\n*line_break\n[i]\"This is Faraz, I am in position.\"[/i]\n*line_break\n[i]\"Miller, in position.\"[/i]\n*line_break\n[i]\"Walker, in position.\"[/i]\n*line_break\n*if (profession= \"Fireteam leader\")\n    \"${nick}, in position\"\n    *set fireteam true\n    *goto inposition\n*else\n    You nod to @{male Abe|Mara}, your fireteam commander. \"@{male Abe|Mara}, in position\" @{male he|she} reports.\n    *goto inposition\n*label inposition\n\n[i]\"Like we practiced, move from cover to cover, expect resistance. @{male He|She} should be right at the center, in the tallest house.\"[/i] Faraz says.\n*line_break\n[i]\"Let's get @{male him|her}.\"[/i] Miller adds.\n\n*if aberel >50\n    @{male Abe|Mara} clears @{male his|her} throat nervously. \"Before we go I would like to make a blessing.\"\n    *line_break\n    Zac coughs to hide @{male his|her} laughter, @{male Abe|Mara} doesn't seem to notice.\n    *fake_choice\n        #\"Go ahead.\"\n            You smile at @{male Abe|Mara} \"Go ahead.\"\n            \n            You think you notice a smile flickers on @{male Abe|Mara}s lips before @{male he|she} closes @{male his|her} eyes while raising the palms of @{male his|her} hands in the air. After a moment of awkward silence @{male he|she} begins to hum while @{male his|her} hands start gently shaking. \n            \n            \"May the Sun guide you in this dark, may it protect and keep you.\n            *line_break\n            May its light shine upon your face.\n            *line_break\n            May you go in peace and return in peace under the Sun's eternal light.\" (@{male Abe|Mara} +2)\n            *set aberel +2\n        #\"We really don't have time for this.\"\n            \"We really don't have time for this.\" You whisper back.\n            *line_break\n            @{male Abe|Mara} doesn't answer, but even without looking at @{male his|her} face, you can feel @{male his|her} embarrassment. (@{male Abe|Mara} -5)\n end to this mission is one dead @{male George|Georgia} Hamtz, but now, with the bullets flying, you begin to have second thoughts.\n*line_break\nHow many innocents will die tonight?\n*choice\n    #It doesn't matter. Anyone irresponsible enough to provide a human shield to an arch-terrorist is a dead man walking.\n        *set loyal +5\n        *if loyal >= 90\n            A smile touches your lips. What did those traitors expect? Harboring a terrorist is a crime- and now they will pay. (Loyal +5)\n            *goto dietonight\n        *elseif loyal \u003c= 10\n            You close your eyes, blocking out the screams of the inhabitants of the house. You aren't sure if the screams are imagined or real. (Loyal +5) \n            *goto dietonight\n        *else\n            It pains you to think of the innocents who will die tonight, but you know there is no other option. Life no fairy-tale, innocents get hurt in war. (Loyal +5)\n            *goto dietonight\n    #Too many.\n        *set loyal -5\n        *if loyal \u003c= 10\n            Your blood boils. This is cold-blooded murder. ([i]Luf[/i] +5)\n            *choice\n                #I have to do something, even if it means leaving everything behind, I cannot be a part of this massacre.\n                    *goto_scene treason\n                #I may hate the Citizens Republic, but I cannot turn my back on everything I know.\n                    *goto dietonight\n        *elseif loyal >=90\n            If the Republic has chosen to take a life there must be a good reason, but in this case- you cannot find one. ([i]Luf[/i] +5)\n            *goto dietonight\n        *else\n            You take a shaky breath. You bite your lip. This is too much, but what can you do?\n            *goto dietonight\n*label dietonight\n*page_break\nSuddenly, you notice a dark figure in the corner of your eye, raising a long object.\n*if shooting >=70\n    You turn and fire, hitting the target in the chest. @{male He|She} drops like a stone,@{male his|her} rifle clattering on the asphalt road. (Success! Needed 70 shooting) (Shooting +3\n    *if profession= \"HMG\"\n        , HMG +3)\n        *set mag +3\n        *goto asphalt\n    *if profession= \"LMG\"\n        , LMG)\n        *set negev +3\n        *goto asphalt\n    *if profession = \"Marksman\"\n        *set marksman +3\n        , Marksman +3)\n        *goto asphalt\n    *else\n        )\n        *goto asphalt\n*else\n    You turn and fire, missing the target by a few centimeters. (Needed 70 shooting)\n    *line_break\n    The figure fires a burst towards you, only narrowly missing.\n    \n    Sam returns fire. The figure drops,@{male his|her} rifle clatters loudly on the asphalt road.\n    *goto turnandfire\n*label asphalt\n*set shooting +3\n*goto turnandfire\n*label turnandfire\n\"Contact!\" you shout.\n*line_break\nA figure rises from the roof next to Faraz, an RPG in @{male his|her} hand. A burst. @{male He|She} falls.\n*line_break\nAs if the burst was a signal, the entire town explodes in gunfire.\n\nAll around you, figures rise from windows and rooftops, firing bullets at you and your teammates.\n*line_break\nThe bullets whiz over your head and around your legs but do not harm you.\n*line_break\n[i]\"Enter whatever house you can! Take cover!\"[/i] Faraz's voice crackles in your earpiece. [i]\"Evac is en route.\"[/i]\n\n*temp samindanger false\nYou turn towards the door of the house you are leaning on. It seems pretty solid.\n*choice\n    #Break the door down\n        *if strength >= 80\n            You smash the butt of your rifle against the door. It falls off its hinges and crashes to the ground. (Success! Needed 80 strength)\n            *line_break\n            \"Get in!\"\n            *goto getin\n        *else\n            You smash the butt of your rifle against the door but it doesn't budge. (Needed 80 strength)\n            \n            *if (zacrel \u003c samrel)\n                *set samindanger true\n                *goto butt round@{male his|her} torso continues to grow.\n*line_break\n\"Do something!\" @{samindanger Zac| Sam} shouts at you.\n\n*if profession = \"Medic\"\n    *if medic >= 45\n        \"This is a torso wound.\" you answer automatically \"Nothing can be done.\" (Medic +5)\n        *set medic +5\n        *line_break\n        \"What do you mean nothing can be done?!\" @{samindanger Zac| Sam} pushes you onto \n        @{samindanger Sam| Zac}. \"You're a medic! You must of learned something in that course!\"\n        *line_break\n        You take a deep breath and turn towards @{samindanger Zac| Sam}, grabbing@{male his|her} hand. The last thing you need is a teammate with PTSD.\n        *line_break\n        @{samindanger \"Sam| \"Zac}, secure the house. @{male Abe|Mara}, report we have one man down, request immediate evac.\n        *goto dead\n    *else\n        *label trytohelp\n        You flip over @{samindanger Sam| Zac} and try to plug the bullet wound with your hand.\n        *line_break\n        @{samindanger Sam| Zac} whimpers and then falls silent.\n        *goto dead\n*elseif profession = \"Fireteam leader\"\n    You are the fireteam leader, what are your orders?\n    *choice\n        *if (intelligence >=75) #I remember nothing can be done to stop a bleeding chest wound. As much as I hate to admit, @{samindanger Sam| Zac} is as good as gone. My only option is to get everyone else out safely. (Intelligence)\n            *goto nothingtobedone\n        #My top priority is saving @{samindanger Sam's| Zac's} life. I order @{samindanger Zac| Sam} to stop the bleeding while I request medical assistance and evacuation.\n            *goto savehim\n        #My top priority is getting everyone to safety. I order @{samindanger Zac| Sam} to secure our position while I request medical assistance and evacuation.\n            *goto nothingtobedone\n*else\n    *goto trytohelp\n*label nothingtobedone\n\"We can't help @{male him|her}, @{male he|she} needs a doctor. @{samindanger Zac| Sam}, secure our position, I'll request medical assistance and immediate evacuation.\n*goto rogerthat\n*label savehim\n\"Zac, try to stop the bleeding. @{male Abe|Mara}, make sure nobody surprises us. I'll call for help.\"\n*label rogerthat\n*line_break\n\"Roger that.\"\n\n\"Faraz, this is ${nick}\" you say into your mouthpiece \"I have a man down, we need urgent evacuation.\"\n*line_break\n[i]\"Received. Be aware that a friendly APC will be waiting for us on the western side of town in 3 min-\"[/i]\n*line_break\nSuddenly, Miller's voice cuts @{male him|her} off. [i]\"All units all units. Target is confirmed dead. Retreating to the western side of town.\"[/i]\n*page_break\n\"${nick}!\" @{samindanger Zac| Sam} shouts \"@{male He's|She's} not breathing!\"\n*line_break\nYou check for a pulse, you feel none.\n\n*temp extramag false\n*if (samindanger = true)\n    *if samrel >=60\n        You feel like you're going to be sick, this can't be real.\n        *goto hesdead\n    *elseif samrel>= 55\n        You feel a lump in your throat.\n        *goto hesdead\n    *elseif samrel >=50\n        You find it hard to swallow.\n        *goto hesdead\n    *else\n        You blink, it seems impossible for Sam to be dead.\n        *goto hesdead\n*else\n    *if zacrel >=60\n        You feel like you're going to be sick, this can't be real.\n        *goto hesdead\n    *elseif zacrel >=55\n        You feel a lump in your throat.\n        *goto hesdead\n    *elseif zacrel >=50\n        You find it hard to swallow.\n        *goto hesdead\n    *else\n        You blink, it seems impossible for Zac to be dead.\n        *goto hesdead\n*label hesdead\n*line_break\nClearing your throat you find yourself saying \"We're moving. We need to go to the western side of town ASAP.\"\n*page_break\n*if professionalism >=30\n    You bite your lip and begin removing anything of use from the body. Magazines, grenades, radio. Anything of use is placed in your combat vest. (Success! Needed 30 professionalism) \n    *set extramag true\n    *line_break\n\"What's the situation?\" @{male Abe|Mara} shouts \"What's going on?\"\n*line_break\n*fake_choice\n    #\"@{male He's|She's} gone.\"\n    #\"I can't feel a pulse.\"\n@{male Abe|Mara} mumbles a quick prayer under@{male his|her} breath. \"What do we do?\"\n*line_break\n\"Hamtz is dead, an APC is waiting for us west of here.\" You say, wiping @{samindanger Sam's| Zac's} blood on your pants \n\"@{samindanger Zac| Sam}, grab \n@{samindanger Sam| Zac}, we're moving out.\"\n\n\"What's the plan?\" @{male Abe|Mara} asks.\n*goto whatstheplan\n*label dead\n*page_break\nYou check for a pulse, you feel none.\n*temp extramag false\n\"@{male He's|She's} dead.\" You whisper, barely even hearing your own voice.\n*page_break\n*if professionalism >=30\n    You bite your lip and begin removing anything of use from the body. Magazines, grenades, radio. Anything of use is placed in your combat vest. (Success! Needed 30 professionalism) \n    *set extramag true\n    *line_break\n\"What's the situation?\" @{male Abe|Mara} shouts \"How is @{male he|she} doing?\"\n*line_break\n*fake_choice\n    #\"@{male He's|She's} gone.\"\n    #\"I can't feel a pulse.\"\n@{male Abe|Mara} nods. \"@{male George|Georgia} Hamtz is confirmed as dead, we're leaving.\" @{male he|she} turns to @{samindanger Zac| Sam} \n\"Grab @{samindanger Sam| Zac} and let's move out.\"\n*label whatstheplan\n\n*if extramag = true\n    You raise your rifle, taking note of your replenished supply of grenades.\n\n\"We will have to leapfrog from house to house until we reach the eastern side of the town, an APC is waiting for us there.\" \n*if fireteam= true\n    You\n    *goto waitthere\n*else\n    @{male Abe|Mara}\n    *goto waitthere\n*label waitthere\n@{fireteam explain|explains}. \n\"@{fireteam I'll| ${nick},} lead the way to the house in front of us, the one with a hole instead of a door.\"\n*line_break\n\"Roger that.\" \n*if fireteam = true\n    @{male Abe|Mara} replies\n    *goto replies\n*else\n    You reply.\n    *goto replies\n*label replies\n\nYou take a deep breath, @{samindanger Sam's| Zac's} lifeless eyes flashing in front of yours.\n*page_break CHARGE!\nWith a sudden burst of speed, you run forwards\n*if extramag = true\n    , stopping for a moment to throw a grenade into the house.\n    *line_break\n    The grenade explodes, shaking a thin layer of dust from the building.\n    *line_break\n    You run inside, stepping over a dead body still clutching a rifle.\n    *line_break\n    @{male Abe|Mara} and @{samindanger Zac| Sam} enter after you.\n    *goto rushtotheexit\nnot stopping for a moment, you enter the house.\n*page_break You hear a burst of gunfire.\nThe world goes black.\n*set ending 3\n*goto_scene ending\n*label getin\nSam, Zac and @{male Abe|Mara} rush inside, taking cover behind the walls just as a hail of bullets hits the ground in front of the door and ricochets, embedding themselves in the roof of the room you find yourself in.\n*line_break\nSam leans out the door and after a slip second fires a single bullet at the roof ahead. \"Enemy down.\"\n\n\"Everyone okay?\" @{male Abe|Mara} asks. \n*line_break\n\"I'm fine.\" Sam reports.\n*line_break\n\"I will be in a moment.\" Zac smiles.\n*line_break\n\"What do you mean?\" @{male Abe|Mara} asks in a worried voice.\n*line_break\nIn response, Zac farts.\n*line_break\nAs one, the fireteam starts laughing, the situation too bizarre to comprehend.\n\nStill breathless, @{male Abe|Mara} points to the house in front of you. \"We need to go through that house, a APC is waiting on the other side.\" @{male He|She} adjusts @{male his|her} rifle \"Sam, you go first, ${nick} and Zac, you follow after. I'll go last and cover your backs.\"\n*choice\n    *if (intelligence >=50) #\"We should throw a grenade from here, that way we will know for sure the room is clear.\"\n        \"That's a really good idea, ${nick}.\" Sam nods and pulls the pin from from@{male his|her} grenade.\n        *line_break\n        Taking a moment to aim, @{male he|she} throws it directly into the open door ahead of you.\n        *line_break\n        The moment it lands, an armed figure leaps out the open door.\n        *choice\n            #Fire!\n                You fire a single bullet, hitting the figure directly in the chest, @{male he|she} falls on@{male his|her} back,@{male his|her} rifle clattering to the side. (Shooting +1)\n                *set shooting +1\n                *goto run\n            #Tell @{male him|her} to raise@{male his|her} hands and drop@{male his|her} gun.\n                *if speech >=50\n                    \"[i]Vakf! Yadk Lma'el![/i]\" you shout, thankful you still remember the Filo words for \"Freeze! Raise your hands!\" (Success! Needed 50 persuasion) (Persuasion +3)\n                    *set speech +3\n                    *set prisoner true\n                    \n                    The figure stops in its tracks, dropping@{male his|her} rifle and raising @{male his|her} hands.\n                    *line_break\n                    Zac and @{male Abe|Mara} sprint forwards, tackling the figure and pushing @{male him|her} into the house.\n                    *goto prisoner\n                *else\n                    \"Stop! Drop the gun!\" you shout.\n                    *line_break\n                    The armed figure shouts and pulls the trigger, thankfully, a weapon firing automatically is extremely inaccurate. @{male His|Her} bullets go wide and@{male his|her} gun almost flies out of@{male his|her} hands. (Needed 50 persuasion)\n                    *line_break\n                    @{male Abe|Mara} returns fire, the figure drops.\n                    *goto run\n    #\"No, I'll lead.\"\n        \"Whatever you want. Sam, switch with ${nick}.\" @{male Abe|Mara} says.\n        *line_break\n        \"Let's go!\" Sam nods.\n        *page_break\n        You rush forwards, practically leaping into the house ahead.\n        *if professionalism >= 40\n
