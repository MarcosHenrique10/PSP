vement scout visible 10 Scout\n    Get accepted into the Scouts.\n    Got accepted into the Scouts.\n*achievement sapper visible 10 Sapper\n    Get accepted into the Sappers.\n    Got accepted into the Sappers.\n*achievement crow visible 10 Crow\n    Get accepted into the Crows.\n    Got accepted into the Crows.\n*achievement beret visible 5 The Longest March\n    Successfully complete the Beret March.\n    Successfully completed the Beret March.\n*achievement kicked visible 10 Free spirited\n    Refuse to back down and conform to military standards.\n    You refused to back down and have been kicked out of the Wardens.\n*achievement marksman visible 10 Marksman\n    Become a Marksman\n    You were assigned to be a Marksman\n*achievement lmg visible 10 Light Machine Gunner\n    Become a Light Machine Gunner\n    You were assigned the Light Machine Gun\n*achievement hmg visible 10 Heavy Machine Gunner\n    Become a Heavy Machine Gunner\n    You were assigned the Heavy Machine Gun\n*achievement leader visible 10 Fireteam Leader\n    Become a Fireteam Leader\n    You were chosen to be a Fireteam Leader\n*achievement medic visible 10 Medic\n    Become a Medic\n    You successfully finished Medic training\n*achievement goldstar visible 10 Gold Star\n    Ace the medic course.\n    Aced the medic course.\n*achievement zacnav hidden 5 Good friend\n    hidden\n    Helped Zac reach the end despite the risk.\n*achievement bestnavigator visible 25 Navigator Ribbon\n    Earn the Navigator Ribbon.\n    Earned the Navigator Ribbon.\n*achievement wonfight visible 25 Hand to hand combat ribbon\n    Receive the Hand to Hand Combat Ribbon\n    Received the Hand to Hand Combat Ribbon\n*achievement smallattack hidden 25 Damage: Minimal\n    hidden\n    Minimized the damage during the parade attack.\n*achievement gothim hidden 25 Ladies and Gentlemen, we got him.\n    Hidden\n    Successfully captured the notorious leader of the FFF\n*achievement gano hidden 10 Second thoughts\n    hidden\n    Reconsidered some life choices.\n*achievement ambush visible 10 Successful Ambush\n    Successfully ambush the enemy convoy with minimal casualties\n    Successfully ambushed the enemy convoy with minimal casualties\n*achievement mercy visible 10 Merciful\n    Show mercy to your enemies\n    Showed mercy by doing what you could for the Sarian soldier\n*achievement bugged visible 25 Bugged\n    Bug the Sarian radio tower\n    Bugged the Sarian radio tower\n*achievement banished visible 10 Banished\n    Get sent to the Desert for your failures\n    After failing two missions in a row, your unit has been sent to the Sassik Desert\n*achievement assist visible 10 Assist\n    Take the back row \n    After underperforming, your unit has been sent back from the front\n*achievement forwards visible 25 On the front lines\n    Get sent to the front\n    Fight in the battle of Domeak\n*achievement friends visible 20 BFFs\n    Remain friends with everyone in your fireteam\n    Remained friends with everyone in your fireteam\n*achievement abe visible 10 Song of the desert\n    Hear the song of the Sassik\n    Heard the song of the Sassik\n*achievement betray visible 50 Traitor\n    Betray your country\n    Betray your country\n*achievement academic visible 20 Academic\n    Become a noted intellectual\n    Became a noted intellectual\n*achievement training visible 20 Trainer\n    Become a trainer for tomorrows warriors\n    Became a trainer for tomorrows warriors\n*achievement general visible 20 General\n    Rise through the ranks\n    Rise through the ranks\n*achievement speeker visible 20 Orator \n    Become a successful public speaker\n    Became a successful public speaker\n*achievement died visible 10 For your country\n    Pay the ultimate price\n    Died for your country\n*achievement hanged hidden 20 Food for the crows \n    hidden\n    Died in shame\n*achievement honor visible 50 Victory \n    Defeat Regovia's most dangerous enemy\n    Defeated Saria and brought peace to Regovia\n*comment ending 0= kicked out before you even started |1=killed team and ran away | 2= ran away, did not kill team |3= lose your hand in the battle for george |4= Killed George, safely evacuated |5= Escaped, George dead, sam or zac dead| 6=base defense failed, zac or sam dead, receive medal for valour|7=defense succeeded, zac or sam dead, receive medal for valor| 8= Died while defending the base, base lost|9= Sarians surrender during base battle.|10= Sarians killed during base battle| 11=died by a grenade blast|12= shot while trying to get Sarians to surrender|13= Sarians in final building surrender, abe dead unless sugercoating |14= Join the Sarians, they kill everyone in your team.|15= Killed by Sarians after betreying your team.|\n*if choice_is_omnibus_app\n  *comment skip description\n\n  *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n    Join the special forces and fight in dynamic battles directly influenced by your previous choices in this modern military war novel!\n\n    Go through training and serve in the most prestigious unit of the Regovian army! Will you remain loyal to your country?\n\n    [i]War of 2022[/i] is a 116,000-word interactive, military novel by YHGS, a military veteran. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\n    • Play as Male or Female\n    • Serve in one of the three units which make up the Wardens- The Scouts, Sappers or Crows.\n    • Fight as a Fireteam leader, Medic, Marksman, Light Machine Gunner or Heavy Machine Gunner.\n    • Fight in dynamic battles directly influenced by your previous choices.\n    • Devote yourself to the Republic or turn your back on its lies.\n\n    [b]Content Warning:[/b] The War of 2022 contains depictions of violence, terrorism, bombings, killing of unarmed civilians, racial profiling and xenophobia as well as descriptions of child abuse. \n    In the War of 2022, it is impossible to always act in a morally pure way. If you would prefer not to read about such topics, it is advisable that you not continue. \n\n    Are you willing to go the distance?\n\n    [b] Content Warning:[/b] The War of 2022 contains depictions of violence, terrorism, bombings, killing of unarmed civilians, racial profiling and xenophobia as well as descriptions of child abuse. \n    In the War of 2022, it is impossible to always act in a morally pure way. If you would prefer not to read about such topics, it is advisable that you not continue. \n\n\n    *if choice_prerelease and not(choice_is_ios_app)\n        [i]You can play the first six chapters of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n        *choice\n            #Sign up to be notified when the game is available.\n                *subscribe {\"now\": true}\n                *restart\n            #Play the first six chapters now for free.\n                *goto purchased\n\n    [i]You can play the first six chapters of the game for free. Purchase the rest of the game below.[/i]\n    *if choice_is_advertising_supported\n        [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n    *purchase_discount adfree 2020-04-22 $4.99 $2.99 purchased\n    *if choice_is_advertising_supported\n      *page_break_advertisement\n    *if not(choice_is_advertising_supported)\n      *page_break Play Now for Free\n\n\n*label purchased\n\n*if choice_is_omnibus_app\n  The War of 2022 contains depections of violence, terrorism, bombings, killing of unarmed civilians, racial profiling and xenophobia as well as descriptions of child abuse. \n  In the War of 2022, it is impossible to always act in a morally pure way. If the reader would prefer not to read about such topics, it is advisable that you not continue. \n\n  *page_break\n\nIt is recommended that you disable the animation between pages.\n\nA few questions before we begin.\n*page_break\nWould you like to play as Male or Female?\n*fake_choice\n    #Of course I want to play as a Female! A man going to war is simply absurd!\n        *set male false\n        *goto chosefemale\n    #Of course I want to play as a Male! A woman going to war is impossible!\n        *set male true\n        *goto chosemale\n*label chosefemale\nOf course! In Regovia the thought of a man going to war is silly! Men may be useful in non-combat military positions but on the battlefield, there can be no replacement for the cohesion and intelligence of brave women!\n*goto sugar\n*label chosemale\nOf course! In Regovia the thought of a woman going to war is silly! Women may be useful in non-combat military positions but on the battlefield, there can be no replacement for the strength of brave men!\n*label sugar\n*page_break\nAs part of some of the endings, I have written two endings. One of them is more realistic and the other is more sugarcoated, which do you prefer?\n*fake_choice\n    #Sugarcoated\n    #Realistic\n        *set sugercoated false\n*page_break\nExcellent! Let's begin!\n*page_break\nFire. The entire world a flame.\n*page_break\nHeat. A thousand burning suns.\n*page_break\nScreams. Pain and panic intertwined.\n*page_break\nGunshots. Like the crack of the whip.\n*page_break\n*fake_choice\n    #Open your eyes\n        You open your eyes.\n        *page_break\n        All you can see is fire. \n        *page_break\n        A pair of hands grab you by the shoulders and drag you backward.\n    #Try to remember\n        You try to think back at the events leading to this moment. Just as you feel you are close to something, a pair of hands grab you by the shoulders and drag you backward.\nYou feel the heat from the fire receding and your hands instinctively go to your face. Thankfully, your face, besides being covered in soot, is unharmed.\n*line_break\n*line_break\nYour memory is hazy, you remember attempting to breach the door of the compound, an explosion. Not much else.\n*page_break\nYou feel the hands that have been dragging you let go. You hear a voice: \"Can you hear me?\"\n*fake_choice\n    #Yes\n        \"Great.\"The voice answers. We are going to need you for what comes next.\"\n        *page_break\n    #No\n        \"Great to see you still have your sense of humor.\" The voice answers \"We are going to need you for what comes next.\"\n        *page_break\n\"The breach was unsuccessful, we were ambushed. It's good to see our\n*choice\n    #Heavy Machine Gunner\n        *set mag +3\n        Heavy Machine Gunner is still OK. Now, grab your MAG and return fire! (HMG +3)\n        *goto wakup\n    #Light Machine Gunner\n        *set negev +3\n        Light Machine Gunner is still OK. Now, grab your LMG and return fire! (LMG +3)\n        *goto wakup\n    #@{male Marksman|Markswoman}\n        *set marksman +3\n        @{male Marksman|Markswoman} is still OK. Now, get a hold of your weapon and search for targets! (@{male Marksman|Markswoman} +3)\n        *goto wakup\n    #Medic\n        *set medic +3\n        Medic is still OK. Now, let's finish this fight and find some wounded to take care of! (Medic +3)\n        *goto wakup\n    #Fireteam leader\n        *set teamcom+3\n        Fireteam leader is still OK. The team commander wants us to get the rest of the wounded from the breach behind cover. (Fireteam leader +3)\n        *fake_choice\n            #Let's move!\n            #Let's go!\n        *goto wakup\n\n*label wakup\n*page_break The alarm clock rings\nYou open your real eyes.\n\n*set rank \"Civilian\"\nThe date is the 10th of October, 2020, and you are filling out your conscription form. This is your chance to choose which brigade you will serve in. The conscription form used to be sent by mail, but these days, it is done by computer. \n\nAn empty text box asks you to input your ID number, First and Family name.\n*if male= true\n    *goto male\n*else\n    *goto female\n*label male\nFirst name:\n*fake_choice\n #Aarav\n  *set firstname \"Aarav\"\n #Ander\n  *set firstname \"Ander\"\n #Antonio\n  *set firstname \"Antonio\"\n #Ben\n  *set firstname \"Ben\"\n #Daniel\n  *set firstname \"Daniel\"\n #Issac\n  *set firstname \"Issac\"\n #Lev\n  *set firstname \"Lev\"\n #LI\n  *set firstname \"Li\"\n #Michael\n  *set firstname \"Michael\"\n #Nathan\n  *set firstname \"Nathan\"\n #Samuel\n  *set firstname \"Samuel\"\n #Shota\n  *set firstname \"Shota\"\n #Other\n  *input_text firstname\nYour first name is $!{firstname}\n*goto family\n*label female\n*line_break\nFirst name:\n*fake_choice\n   #Adela\n       *set firstname \"Adela\"\n   #Alasne\n       *set firstname \"Alasne\"\n   #Ava\n       *set firstname \"Ava\"\n   #Charlotte\n       *set firstname \"Charlotte\"\n   #Deja\n       *set firstname \"Deja\"\n   #Emma\n       *set firstname \"Emma\"\n   #Isabella\n       *set firstname \"Isabella\"\n   #Mia\n       *set firstname \"Mia\"\n   #Natalia\n       *set firstname \"Natalia\"\n   #Olivia\n       *set firstname \"Olivia\"\n   #Saanvi\n       *set firstname \"Saanvi\"\n   #Kim\n       *set firstname \"Kim\"\n   #Other\n       *input_text firstname\nYour first name is $!{firstname}.\n*goto family\n*label family\n*line_break\nFamily name:\n\n*fake_choice\n #Adeyeye\n  *set name \"Adeyeye\"\n #Brown\n  *set name \"Brown\"\n #Garcia\n  *set name \"Garcia\"\n #Johnson\n  *set name \"Johnson\"\n #Kahn\n  *set name \"Kahn\"\n #Miller\n  *set name \"Miller\"\n #Novik\n  *set name \"Novik\"\n #Sharma\n  *set name \"Sharma\"\n #Silver\n  *set name \"Silver\"\n #Tanaka\n  *set name \"Tanaka\"\n #Zhou\n  *set name \"Zhou\"\n #Other\n  *input_text name\nYour family name is $!{name}.\n\n*set fullname (firstname&\" \")&name\n*page_break\nIn Regovia, serving in the military is not only an obligation but a civic duty as well. Only those who have served in the military are considered full citizens with full voting rights. You have always dreamed of being a part of one of the RDF's (Regovian Defense Forces) elite units. But the road to serving in the Wardens, the special forces battalion in every Brigade, is a long one. The training alone takes more than a year, more than twice the time of a regular soldier. But before you can even begin the training, your first challenge is the T.E.S.T, a 3-day test that will take you to your physical and mental limits.\n\nYou try to think about your biggest strength, what are you the best at?\n*fake_choice\n #My physical strength is unmatched\n  *set  strength +30\n #I have yet to meet someone smarter than me\n  *set intelligence +30 \n #I am always the leader. People instinctively follow me\n  *set leadership +30 \n #My willpower is peerless\n  *set willpower +30 \n #My discipline is ironclad\n  *set discipline +30 \n #I am always the center of attention, I always know the right thing to say.\n  *set speech +30 \n\nWhat is your second best quality?\n*fake_choice\n *if (strength=40) #I'm stronger than the average person\n  *set strength +15\n *if (intelligence=40) #While never the smartest person in the room, I am pretty smart\n  *set intelligence +15\n *if (leadership=40) #I may not always be the leader of a group but I can get most people to follow me\n  *set leadership +15\n *if (willpower=40) #I have pretty good willpower\n  *set willpower +15\n *if (discipline=40) #My discipline is uncommon\n  *set discipline +15\n *if (speech=40) #I can convince people and get them to my side. Most of the time.\n  *set speech +15\n \n\nWhat is your greatest weakness?\n*fake_choice\n *if (strength=40) #I don't have a developed muscle in my body\n  *set strength -30\n *if (intelligence=40) #I can never understand anything that requires thinking.\n  *set intelligence -30\n *if (leadership=40) #I can't get a group of people to follow me.\n  *set leadership -30\n *if (willpower=40) #I can never summon up the mental strength to do things\n  *set willpower -30\n *if (discipline=40) #My discipline is nonexistent\n  *set discipline -30\n *if (speech=40) #I can never convince people of anything\n  *set speech -30\n\nYou think back on the past year, what have you been doing recently?\n\n*choice\n  #I volunteered to do a service year, I headed a Youth Movement in a city a few hours drive from my home. I really improved my leadership abilities.\n   *set leadership +10\n   You served in a city in the south, spending your days leading a Youth Movement. At the start of the year, the group barely had 5 members by the end of the year you managed to build a consolidated group of over 30 teenagers. You led your group to new heights and still keep in contact with them today. (Leadership +10)\n   *goto brigade\n  #I went to study at a \"Study house\", I studied philosophy, education, theology, history and other subjects. I feel much smarter and adult than I did at the start of the year.\n    *set intelligence +10\n    You went to a \"Study House\" in the far north of the country. During the year you learned more than you thought possible during such a short time. The learning environment allowed for debate about any subject and your worldview has become much more sophisticated and nuanced as a result. (intelligence +10)\n    *goto brigade\n  #I didn't do anything special since I finished high school, I mostly traveled and found a job at my local gym/pool. I managed to get in lots of hours working out though.\n   *set strength +10\n   You enlisted straight out of high school. You used your last vacation to go on a trek in Vitalia with some friends and work at your local Gym/Pool. The job came with the added perk of being allowed to swim and work out as much as you liked. (Strength +10)\n*label brigade \n\nIn your conscription form, you were given the chance to request which brigade you will serve in. Each brigade has different symbols and history.\n\n*page_break\n\n1st \"Svern\" Brigade. Symbol: Olive Tree. The brigade is one of the most decorated brigades in the military, serving with distinction since its creation during the War of Independence and is thus the oldest brigade still in service. Your favorite cousin served in the brigade as an officer and you remember how proud @{male he|she} was to be seen wearing the brown Beret.\n\n28th Paratrooper Brigade. Symbol: Winged Snake. The paratrooper brigade is one of the most famous brigades in the RDF. They wear maroon berets and have a long and prestigious history as the liberators of the capital of Rusalim as well as taking part in all the wars since the famous Kolzum crisis. Your @{male father|mother} served in the Paratroopers when @{male he|she} enlisted and you saw this as a chance to continue a family tradition.\n\nThe 93rd \"Rivar\" Brigade. Symbol: Burning Torch. Beret color: Light Green. The Rivar Brigade is one of the younger brigades, having been created during the 1980 Second Filo Rebellion and subsequent reforms the RDF went through. The Brigade is considered to be staffed by very high quality soldiers and has served with distinction in every war since its creation. Two of your @{male uncles|aunts} have served in the Rivar brigade and you wanted to make them proud.\n\nThe 84th \"Hulni\" brigade. Symbol: Fox. Beret color: Purple. The \"Hulni\" brigade is the second newest brigade (the other being the small Lyrea Brigade) but has roots in a disbanded unit that was created during the War of Independence. Hulni was the most decorated brigade during Regovia's 2014 Filo skirmishes. You don't have any friends or family in Hulni, this could be your chance to start a new tradition.\n\n\nWhich one did you choose?\n*choice\n #1st \"Svern\" Brigade\n      *set brigade \"1st Svern\"\n      An excellent choice! \"The No. 1 Brigade!\"\n      *goto bus\n #the 28th \"Flying Serpent\" Paratrooper Brigade\n     *set brigade \"28th Paratrooper\"\n     An excellent choice! \"After me!\"\n     *goto bus\n #93rd \"Rivar\" Brigade\n     *set brigade \"93rd Rivar\"\n     An excellent choice! \"The Human Advantage\"\n     *goto bus\n #84th \"Hulni\" Brigade\n     *set brigade \"84th Hulni\"\n     An excellent choice! \"Any Place, Any Time, Any Mission\"\n     *goto bus\n*label bus\n*page_break\n*temp scary 0\nA while has passed since you turned in your conscription form. The date is now 22 November 2020 and you are at the recruitment center nearest to your home. \n*line_break\nThe recruitment center is a small concrete building with large windows and well-groomed trees. It is obvious that whoever designed the building wanted to blunt the negative feelings many people have when they are conscripted, sometimes, against their will.\n\nYour entire family is with you to say goodbye, as you enter the doors of the center you think you see your @{male mother|father} shed a tear. \n\n\nOnce you board the bus you will begin a journey that will not truly end until you are 40 years old and finish your reserve duty.\n*line_break\nHow do you feel about this?\n*fake_choice \n    #Excited!\n        A very common feeling. An adventure! Meeting new friends, traveling to new places and experience experiences that you would otherwise never experience.\n        *set scary 0\n    #Anxious\n        A very common feeling. The army is a big unknown. What if you don't like the people you will be with? What if your officers are bad? So many things can go wrong!\n        *set scary 1\n    #Scared\n        A very common feeling. The army is scary, you can't stop yourself from thinking about the danger involved. \n        *line_break\n        You could get seriously injured or even killed!\n        *set scary 1\n    #At ease\n        Of course. The army sounds like a piece of cake. You are ${firstname} ${name}!\n        *line_break\n        Nothing can stand in your way!\n        *set scary 2\n\n*page_break\nThe bus doors close and you take a few moments to take in the bus, searching for a free seat to sit in.\n\nYou see four free spots.\n\nThe first is next to a white, tall, well-built @{male man|woman}. @{male He wears a short beard|She wears her hair in a tight bun} and is talking to the people sitting on the chairs in front of @{male him|her}.\n\nThe second is a serious-looking, dark, medium-sized @{male man|woman}, @{male his|her} hair is shaved in a peculiar fashion you recognize as popular in the south. @{male He|She} is talking to someone on the phone.\n\nThe third is a short, well-tanned @{male man|woman} with a close-cropped marine haircut. @{male He|She} is telling a loud joke and the group around @{male him|her} seem well entertained. \n\nThe fourth seat is an empty chair at the back of the Bus.\n\n*choice\n    \n #The seat next to the @{male bearded guy|lady with a tight bun}.\n  *goto sam\n #The seat next to the dark @{male guy|gal}.\n  *goto abe\n #The seat next to the close-cropped recruit.\n  *goto zac\n #The empty seat\n  *goto empty\n\n*label sam\n*set metsam 1\nYou take your seat next to the tall recruit. @{male He|She} edges closer to the window so that you can sit down. \"My name's Sam, what's yours?\" @{male He|She} asks, offering @{male his|her} hand.\n*line_break\n\"$!{fullname}, but you can call me\n*fake_choice\n #$!{name}\n  *set nick \"${name}\"\n  \"Last name? Guess it is a common way to go in the army\"\n #$!{firstname}\n  *set nick \"$!{firstname}\"\n  \"I like to go by my first name too\"\n #Other\n  *input_text nick\n  \"Cool Nickname\"\n  *set tempnick true\n*if scary=1\n \n Sam pauses, \"You look kinda worried. What's up?\"\n *line_break\n @{male He|She} seems genuinely concerned, you find yourself liking \n @{male him|her}.\n \n \"I guess the whole enlistment thing is just stressful... I hope things will work out but for now... I'm pretty worried...\" You trail off.\n *line_break\n \"Hey @{male man|girl}, no biggie. Millions have gone through before us and millions will go after.\" Sam smiles. \"I'm sure we'll be fine\"\n \n You smile back.\n \n If these are the type of people you will be serving with, how bad can it be?\n*if scary=0\n \n Sam pauses, \"You look kinda excited. What's up?\"\n *line_break\n You smile, finding yourself liking @{male him|her}.\n \n \"I'm really excited. I feel giddy just thinking about the adventure awaiting us!\" You answer.\n *line_break\n Sam laughs \"That's great to hear!\" Sam smiles back at you \"I'm pretty excited too!\"\n *line_break\n If these are the type of people you will be serving with, how bad can it be?\n*if scary=2\n \n Sam pauses, \"How are you doing? Stressed?\"\n *line_break\n \"Nah\" You reply \"I'm just really calm. What's the worst that can happen?\"\n \n Sam smiles \"I wish I was as calm as you. I'm really excited!\"\n \n You smile back. If these are the type of people you will be serving with, how bad can it be?\n*page_break\nYou spend the rest of the drive to Guardian Hill, the RDF base where you will be given your basic equipment and sent to your brigades home base talking to Sam. @{male He|She} seems to enjoy your company. (Sam +15)\n*set samrel +15\n*page_break\n*goto gibbush \n\n*label Abe\n*set metabe 1\nYou take your seat next to the black recruit. @{male He|She} straightens in \n@{male his|her} seat and says @{male his|her} goodbyes to the person on the other side of the phone. Turning towards you the recruit briskly offers @{male his|her} hand. \n\"Name's @{male Abe|Mara}. Pleased to meet you.\" You extend your hand and \n@{male he|she} gives you a firm handshake. \"What's yours?\"\n*line_break\n\"$!{fullname}, but you can call me...\n*fake_choice\n #$!{name}\n  *set nick \"${name}\"\n #$!{firstname}\n  *set nick \"$!{firstname}\"\n #Other\n     *set tempnick true\n  *input_text nick\n\"You know, I'm pretty excited about the whole enlistment and T.E.S.T. I've really wanted to be an officer since I was a kid.\"\n*fake_choice\n #An officer? Me too!\n  \"I've always wanted to be an officer too\" you reply \"I want to do my best to serve the Republic.\"\n  *line_break\n #An officer? No way!\n  \"Nah, not me.\" You reply. \"I just want to get my citizenship and leave.\"\n  *line_break\nI've always wanted to lead and be the best soldier I can be\" @{male Abe|Mara} continues, barely stopping to acknowledge your answer, I feel like it's my calling.\"\n*fake_choice\n    #Ask @{male him|her} about the hair.\n        \"Say, if you don't mind me asking, I've always been curious why you southerners shave that line over your ears.\"\n        *line_break\n        \"Not at all.\" @{male Abe|Mara} smiles. \"We believe It's a conduit for the Sun into our mind. Sort of a solar panel if you will.\" \n        @{male He|She} chuckles.\n        *line_break\n        \"The sun?\" You continue.\n        *line_break\n        \"In the desert, you want to have good relations with the Sun.\" @{male He|She} shrugs \"I don't know how much of it I really believe, but it's nice to feel like I have a connection to something above.\"\n    #Ignore it\n\nYou spend the rest of the drive to Guardian Hill, the RDF base where you will be given your basic equipment and sent to your brigades home base talking to @{male Abe|Mara}.\n\n@{male He|She} seems to be a very serious conscript, the son of a former officer, willing to do everything in order to have an impactful service. (Abe +15)\n*set aberel +15\n*page_break\n*goto gibbush \n\n*label zac\n*set metzac 1\nYou sit down next to the recruit with the close-cropped hair.\n*line_break\n\"What's up?\" @{male he|she} offers @{male his|her} fist for a fist bump \"I'm Zac,@{male  short for Zachary.| short for Zacharee.} What's your name?\"\n*line_break\n\"$!{fullname}, but you can call me\n*fake_choice\n #$!{name}\n  *set nick \"${name}\"\n #$!{firstname}\n  *set nick \"$!{firstname}\"\n #Other\n     *set tempnick true\n  *input_text nick\n\"Cool. We were all talking about what school was like. I was saying that I never liked the whole thing with authority. Always seemed like teachers were trying to train me like a dog instead of actually teaching me life skills.\"\n\n*fake_choice\n #I agree\n  \"Me too, never did do well at school, guess it wasn't the place for me.\"\n  *line_break\n  Zac smiles. \"Well, guess that makes you part of our club\" @{male he|she} chuckles. \"I think the Army is in for a surprise when they find out not all of us are going to bend over easy for them\"\n\n #I've actually never had a problem with the system\n  \"Not me. I've always gotten along with my teachers. Guess I'm just good at school.\" You reply\n  \n  \n  \"Great! I can be the troublemaker and you can be the @{male guy|gal} that helps get @{male him|her} out of trouble.\" Zac says with a smile, notices your worried face. \n  *line_break\n  \"I'm just messing with you. I'm that kid who always managed to get out of trouble by making the teachers laugh. I'm sure the military isn't too different \"\n\nYou spend the rest of the drive to Guardian Hill, the RDF base where you will be given your basic equipment and sent to your brigades home base talking to Zac.\n*line_break\n@{male He|She} seems to be a very funny person, cracking jokes at every chance and making the ride a much less stressful one. You notice that underneath the carefree mask, Zac cares very much about @{male his|her} service and wants to succeed. (Zac +15)\n*set zacrel +15\n*page_break\n\n*goto gibbush\n\n*label empty\nYou were never great at socializing, especially when under pressure. You prefer to opt for the quiet, calmer route of listening to your favorite band and mentally preparing for the coming years.\n*set nick \"${firstname}\"\n*page_break\n*goto gibbush\n\n*label gibbush\n*set rank \"Recruit\"\nHow did you prepare for the T.E.S.T? \n*choice \n #Working out at my local gym, running in the fields near my house and doing laps at the pool\n  *set strength +10\n  You have been training for months in order to build yourself up, although you were never scrawny, the months of physical training really changed your body. You don't remember your arms being this big, or running for so long without breaking a sweat. (Strength +10)\n  *goto excel\n #Talking to people who have served in the special units\n     You had many long talks with one of your @{male uncles|aunts}, a veteran from the \"Rivar\" reconnaissance battalion and your cousin, a retired soldier from the elite \"Viper\" unit. They gave you many tips that could help give you a boost during the coming tests. Their greatest advice was simply not to give in and not to give up. (Willpower +10)\n  *set willpower +10\n  *goto excel\n #Honing my leadership skills\n     Realizing that you are not only tested for physical prowess but also for future positions as an officer, you went to public speaking class and brushed up on your leadership skills. You will not be caught unprepared by any leadership test. (Leadership +10)\n  *set leadership +10\n  *goto excel\n\n*label excel\n*page_break\nAt 0400 hours you are woken up and taken outside to the freezing November air. You find yourself shivering in the pre-dawn cold wearing nothing but your new uniform and combat boots. Standing in formation waiting for the testers to arrive you can't help but itching due to the unfamiliar coarseness of the uniform and fidgeting uncomfortably in your hard leather boots. \n\n\"How the hell are we supposed to run in these?\" A soldier to your left mumbles. \"I can barely feel my feet!\"\n*line_break\n\"My @{male brother|sister} told me that the only way to soften these boots enough to be comfortable is to run them over with a car, literally.\" A voice whispers back. \"@{male He|She} still has scars from where @{male his|her} skin was shaven off by the boots.\"\n*line_break\n\"You there! Shut up!\" A middle-aged @{male man|woman} shouts. \"Follow me!\"\n\nYou follow the @{male man|woman} in silence for what feels like forever before reaching a large area with what can only be described as large sandboxes. Each sandbox is about ten by twenty meters and the @{male man|woman} leads you and 19 other recruits to the farthest one. \n*line_break\n\"Line up!\" @{male He|She} shouts. \"When I order you I want you to crawl to the end and back. Go!\"\n*page_break\nAfter what feels like an eternity of crawling from one end to the other you are given a few minutes of rest and drink before repeating the exercise. You begin to notice the others in your group wavering and leaving. But not you. You grit your teeth and push through the pain, not giving up even when your leg muscles refuse to push you forwards and you have to resort to pulling yourself forwards with your arms.\n\nThe rest of the first day is spent much the same way, running or crawling from one side of the sandbox to the other until you are ready to drop. By the second day, only half of the original members of your group are still there, the rest having dropped out during the previous day or night.\n\nDuring the second day, there were two acts in which you could really stand out in. One such act was a long march with a stretcher. The second was taking apart and putting an FN MAG machine gun together with no real idea what you are doing. Of course, the easiest way to stand out was to be the best at the sandpit, easily achieved by well...cheating.\n\nHow did you stand out?\n\n*choice \n #The long march\n     The march was by no means easy, over an hour of walking at a pace that gets as close to running as possible while carrying 80 kilos on a stretcher was one of the hardest experiences you have experienced to date but you managed to get through it with a smile on your face. At the end of the march your shoulders hurt, your feet were sore and your back ached but you held your head high knowing that examiners could see what you were worth.\n     (Strength +10)\n     *set strength +10 \n     *set Palsar +1\n     *goto interview\n #Taking apart and putting the MAG back together\n     The FG MAG machine gun (commonly known as a \"MAG\") was introduced in 1957 and is still in use in more than 80 militaries worldwide. \n     \n     During the T.E.S.T you were shown how to take apart and put the machine gun back together once. Then, after a 10-minute break, you had to repeat the process. \n     *line_break\n     When you looked at the MAG you didn't really know what to do, there were so many different parts and putting it all together perfectly seemed like an impossible task.\n     \n     Then, you took a deep breath and after a few seconds of studying the weapon, something just clicked. You instinctively took it apart and put it back together in less than a minute. You couldn't know for sure, but the examiner seemed impressed. (intelligence +10)\n     *set intelligence +10\n     *set Palhan +1\n     *goto interview\n #Cheating\n     Cheating is considered a really bad idea during a T.E.S.T, with so many eyes on you it's extremely hard to cheat without being caught and getting caught can get your thrown out of the T.E.S.T early. However, it's not impossible. \n     *line_break\n     Whenever you had the chance, you raised your legs slightly during crawling, giving your leg muscles a rest and picking up some speed now that you had less friction to deal with.\n     \n     The cheating gave you the extra edge you needed in order to get to the finish first. It wasn't easy, but somehow, you managed to talk your way out of getting caught whenever a tester was asking you what you were doing. (Persuasion +10)\n     *set speech +10\n     *set Orev +1\n     *goto interview\n*label interview\n*page_break\nThe third and final day of the test is the hardest of them all. An almost exact repeat of the first day, only this time, everyone is tired and weak. Your only rest is when the testers take the recruits aside, one at a time, to ask trivia, math and memorization questions to check who can keep @{male his|her} head while under pressure.\n\nYou can only hope you made a good impression.\n*page_break\nAnd then, just like that, it's over. You look around at the other recruits who had finished the T.E.S.T with you. There is no memory of the clean, proud recruits of the first day, only limping, dirty and exhausted survivors. \n\nYou and the remaining six recruits of your group are taken back to the base for the final part of the T.E.S.T.\n\nThe interview.\n\nMany soldiers can run without tiring, carry a stretcher without breaking and answer complicated questions while almost passing out from exhaustion, but not many can convince veterans that they are worthy of a place in the Wardens.\n\nCan you?\n*page_break\nYou walk into the office being used as an interview room. The T.E.S.T was hard, and you had a hard time hiding your limp from the three interviewers already sitting at the table. You sat down at the empty chair in front of them. \n\n\"Well, congratulations on making it this far.\" One of the interviewers said.\n*line_break\n\"Not everybody does.\" Adds another.\n*line_break\n\"But still not enough.\" Says the third.\n*line_break\n\"We want to hear what you have to say about yourself. Besides wanting to be in the special forces, what unit do you want to serve in?\"\n\nYou have 3 options:\n*page_break\n[b]The Scouts[/b] are the Reconnaissance Company for the whole brigade. They undergo special courses in anti-terror operations and tunnel warfare. \n\nDuring combat, they can be found scouting the enemy and leading the brigade to wherever they need to be.\n*line_break\nThe Scouts are known as the Gryffindors of the Wardens, almost always taking point in combat, loved by the higher-ups and with a dash of arrogance.\n\n[b]The Crow[/b] company is armed with the powerful \"Crow\" Anti-Tank missile. The missile not only allows them to destroy enemy tanks but also to attack enemy bunkers and buildings with precision from up to 2,500 meters. The \"Crow\" makes the Crows one of the most deadly enemies in urban warfare. \n\nDuring combat, they can be found either destroying enemy tanks or striking their enemies from afar.\n*line_break\nThe soldiers of the Crows company are known for going with their gut. @{male Brotherhood|Sisterhood} and cunning is the name of the game for them.\n\n[b]The Sappers.[/b] The Engineering and Sabotage Company. The Sappers are the Combat Engineering experts for the Brigade. They undergo a Combat Engineering, Sabotage and Mine course and are used extensively in urban warfare in order to allow friendly troops to go from building to building without danger from IEDs and enemy fire. \n\nDuring combat, they can be found wherever they are most needed, either leading the brigade or setting up an ambush. For the Sappers, it all depends on the situation.\n*line_break\nThe Sappers are known for the tough bonds between its members, their unwavering loyalty to the company as well as having a bit of a wild streak.\n\nWhich is the one for you?\n*choice\n    #The Reconnaissance Company- the Scouts.\n        *set Palsar +1\n        *goto interview2\n    #The Anti-Tank Company- the Crows\n        *set Orev +1\n        *goto interview2\n    #The Engineer Company- The Sappers\n        *set Palhan +1\n        *goto interview2\n*label interview2\n\"Hmmm...That is an...Interesting choice.\" The first interviewer says, writing something down.\n\n\"Okay. Second question.\" The second asks \"How do you overcome challenges?\"\n*fake_choice\n    #My skills.\n        *set Palsar +1\n    #Teamwork\n        *set Palhan +1\n    #By whatever means necessary\n        *set Orev +1\n\"Interesting.\" says the first interviewer. \"We will review your answers and how well you did during the T.E.ST.\" Adds the second. \"If you are worthy enough, we will accept you into the Wardens.\" \"If we do accept you.\" Says the third \"We will decide, based on your strengths and weaknesses, which unit is the best fit for you.\" \n*line_break\n\"Tomorrow you will know how well you did. For better or for worse.\" Finishes the First.\n*line_break\n\"Good luck\" \n*finish", "sub": "*label r\n*if loyal>100\n    *set loyal 100\n    *goto intel\n*elseif loyal\u003c0\n    *set loyal 0\n    *goto intel\n*else\n    *goto intel\n*label intel\n\n*if intelligence > 100\n *set intelligence 100\n *goto str\n*elseif intelligence \u003c 0\n *set intelligence 0\n *goto str\n*else\n    *goto str\n*label str\n*if strength > 100\n *set strength 100\n *goto lead\n*elseif strength \u003c 0\n *set strength 0\n *goto lead\n*else\n    *goto lead\n*label lead\n*if leadership > 100\n *set leadership 100\n *goto will\n*elseif leadership \u003c 0\n *set leadership 0\n *goto will\n*else\n    *goto will\n*label will\n*if willpower > 100\n    *set willpower 100\n    *goto speech\n*elseif willpower \u003c 0\n    *set willpower 0\n    *goto speech\n*else\n    *goto speech\n*label speech\n*if speech > 100\n    *set speech 100\n    *goto dis\n*elseif speech \u003c 0\n    *set speech 0\n    *goto dis\n*else\n    *goto dis\n*label dis\n*if discipline > 100\n    *set discipline 100\n    *goto shoot\n*elseif discipline \u003c 0\n    *set discipline 0\n    *goto shoot\n*else\n    *goto shoot\n*label shoot\n\n*if shooting > 100\n    *set shooting 100\n    *goto hand\n*elseif shooting \u003c 0\n    *set shooting 0\n    *goto hand\n*else\n    *goto hand\n*label hand\n*if handcombat > 100\n    *set handcombat 100\n    *goto nav\n*elseif handcombat \u003c 0\n    *set handcombat 0\n    *goto nav\n*else\n    *goto nav\n*label nav\n*if navigation > 100\n    *set navigation 100\n    *goto pro\n*elseif navigation \u003c 0\n    *set navigation 0\n    *goto pro\n*else\n    *goto pro\n*label pro\n*if professionalism > 100\n    *set professionalism 100\n    *goto sgt\n*elseif professionalism \u003c 0\n    *set professionalism 0\n    *goto sgt\n*else\n    *goto sgt\n*label sgt\n*if sgtrel > 100\n    *set sgtrel 100\n    *goto pc\n*elseif sgtrel \u003c 0\n    *set sgtrel 0\n    *goto pc\n*else\n    *goto pc\n*label pc\n*if pcrel > 100\n    *set pcrel 100\n    *goto sc\n*elseif pcrel \u003c 0\n    *set pcrel 0\n    *goto sc\n*else\n    *goto sc\n*label sc\n*if screl > 100\n    *set screl 100\n    *goto sam\n*elseif screl \u003c 0\n    *set screl 0\n    *goto sam\n*else\n    *goto sam\n*label sam\n*if samrel > 100\n    *set samrel 100\n    *goto abe\n*elseif samrel \u003c 0\n    *set samrel 0\n    *goto abe\n*else\n    *goto abe\n*label abe\n*if aberel > 100\n    *set aberel 100\n    *goto zac\n*elseif aberel \u003c 0\n    *set aberel 0\n    *goto zac\n*else\n    *goto zac\n*label zac\n*if zacrel > 100\n    *set zacrel 100\n    *goto endsub\n*elseif zacrel \u003c 0\n    *set zacrel 0\n    *goto endsub\n*else\n    *goto endsub\n*label endsub\n*return", "treason": "You look to the building.\nTo your moment of truth.\n\nYou turn towards your fireteam.\n*fake_choice\n    #I hate them and everything they stand for\n        *set sgtrel 0\n        *set pcrel 0\n        *set samrel 0\n        *set aberel 0\n        *set zacrel 0\n    #No matter how much I hate the republic, I cannot stand to hurt my teammates\n*if (((((sgtrel \u003c= 40) and (pcrel \u003c=40)) and (samrel \u003c=30)) and (aberel \u003c= 30)) and (zacrel \u003c=30))\n    You hate them so much. Mindless drones, following orders like slaves while spewing hate and barbarism at every turn.\n    *line_break\n    There is only one solution.\n    \n    You open fire.\n    *achieve betray\n    *set abealive false\n    *set zacalive false\n    *set samalive false\n    *set ending 1\n    *goto_scene ending\n*else\n    *achieve betray\n    \"I'm sorry.\"\n    \n    You run away.\n    *set ending 2\n    *goto_scene ending\n"}};
