                     #Walk away\n                            You turn and walk away.\n                            \n                            \"Hey, ${nick}!\" Sam shouts, grabbing your shoulder \"We're sorry for talking about you behind your back.\"\n                            *goto sorry\n                #Leave before they notice you\n                    *goto gotobriefing\n        *else\n            \"...should have shot live rounds when they chased us.\" Sam says loudly.\n            *line_break\n            \"Are you crazy?\" @{male Abe|Mara} replies \"We would have hit someone for sure!\"\n            *line_break\n            \"They could have hit one of us with a rock! Stones can be lethal from that close!\"\n            *choice\n                #\"Sam is right. We were in danger, we should have fired in the air.\"\n                    \"Sam is right. We were in danger, we should have fired in the air.\" (Loyal +3)\n                    *set loyal +3\n                    *line_break\n                    *if loyal >=80\n                        \"Of course you would say that, ${nick}. You probably [b]want[/b] to hit some innocent bystander.\"\n                        *choice\n                            #\"I do not!\"\n                                \"I do not! I don't hate all the Filos!\" You object. \"I just don't like the ones who try to block us from arresting murderers.\" ([i]Luf[/i] +5)\n                                *set loyal -5\n                                *label whateveryousay\n                                *line_break\n                                \"Whatever.\" @{male Abe|Mara} passes the ball to you. \"Let us play a little before the briefing.\" (Sam +5, @{male Abe|Mara} +5)\n                                *set samrel +5\n                                *set aberel +5\n                                *goto gotobriefingabesam\n                            #\"I think it was the tactical thing to do.\"\n                                *label tacticalthing\n                                \"I don't want to hit anyone who doesn't deserve it.\" You shrug \"I just think it was the tactical thing to do.\"\n                                *goto whateveryousay\n                    *elseif loyal>50\n                        \"See!\" Sam passes the ball to you \"$!{nick} agrees with me.\"\n                        *goto whateveryousay\n                    *elseif loyal \u003c=35\n                        \"See!\" Sam passes the ball to you. \"Even ${nick} the [i]Luf[/i] agrees with me!\"\n                        *line_break\n                        @{male Abe|Mara}'s eyes go wide. \"I can not deny that your word has more weight than most, ${nick}. I am surprised you would be willing to use lethal ammunition against civilians, even if it is not direct fire.\"\n                        *line_break\n                        *goto tacticalthing\n                    *else\n                        \"See!\" Sam passes the ball to you. \"Even ${nick} agrees with me!\"\n                        *line_break\n                        \"I'm surprised you would be willing to use lethal ammunition against civilians, even if it is not direct fire.\" @{male Abe|Mara} replies, obviously flustered.\n                        *line_break\n                        *goto tacticalthing\n                #\"@{male Abe|Mara} is right. We could have hit someone innocent.\"\n                    \"@{male Abe|Mara} is right. We could have hit someone innocent.\" ([i]Luf[/i] +3)\n                    *set loyal -3\n                    *line_break\n                    *if loyal \u003c=30\n                        \"Of course you would say that, ${nick}. You probably wouldn't shoot even if you knew you would be injured by a flying stone.\"\n                        *choice\n                            #\"Of course I would shoot if I was in danger!\"\n                               \"Of course I would shoot if I was in danger!\" You object (Loyal +5)\n                               *set loyal +5\n                               *label whateveryousay1\n                               *line_break\n                               \"Whatever you say.\" @{male Abe|Mara} passes the ball to you. \"Let us play a little before the briefing.\" (Sam +5, @{male Abe|Mara} +5)\n                               *set samrel +5\n                               *set aberel +5\n                               *goto gotobriefingabesam\n                            #\"I just don't think killing innocent bystanders would help our mission\"\n                                *label tacticalthing1\n                                \"I just don't think killing innocent bystanders would help our mission\" You shrug \"It's not exactly what would help return peace to Western Regovia.\"\n                                *goto whateveryousay1\n                    *elseif loyal>50\n                        \"See!\" @{male Abe|Mara} passes the ball to you \"$!{nick} agrees with me.\"\n                        *goto whateveryousay\n                    *elseif loyal \u003c=40\n                        \"See!\" Sam passes the ball to you. \"Even ${nick} the [i]Luf[/i] agrees with me!\"\n                        *line_break\n                        @{male Abe|Mara}'s eyes go wide. \"I can not deny that your word has more weight than most, ${nick}. I am surprised you would be willing to use lethal ammunition against civilians, even if it is not direct fire.\"\n                        *line_break\n                        *goto tacticalthing\n                    *else\n                        \"See!\" Sam passes the ball to you. \"Even ${nick} agrees with me!\"\n                        *line_break\n                        \"I am surprised you would be willing to use lethal ammunition against civilians, even if it is not direct fire.\" @{male Abe|Mara} replies, obviously flustered.\n                        *line_break\n                        *goto tacticalthing\n    #Join Zac\n        You join Zac under the tree.\n        \n        \n        \"I didn't know you played.\" You state.\n        *line_break\n        \"I rarely do anymore. Since we enlisted I just can't find the time.\" Zac replies, a tinge of sadness in @{male his|her} voice. \"I miss it.\"\n        *line_break\n        \"So what made you come back to it now?\" you ask.\n        *line_break\n        *if georgegotaway =1\n            \"The mission failing.\" Zac states flatly, finally meeting your eyes \"I'm just so bummed because of it, I needed an outlet.\"\n            *choice\n                #Apologize\n                    \"I'm really sorry about what happened back there. I can't believe I screwed up so badly.\"\n                    *line_break\n                    Zac begins playing again. \"I know what it feels like to be a screwup. Underneath my handsome looks and funny jokes I actually made my share of mistakes.\" Zac grins. \"The trick is not letting the commanders get to you.\"\n                    *choice\n                        #\"How can I do that?\"\n                            \"Show them what you are worth.\" Zac shrugs. \"Prove you aren't just a screwup.\"\n                            *goto thanksiwill\n                        #\"Thanks, I won't.\"\n                            *label thanksiwill\n                            \"Thanks for the tip. I will.\"\n                            *choice\n                                #\"Mind if I stay and listen to you play?\"\n                                    Zac smiles \"Not at all.\" (Zac +5)\n                                    *set zacrel +5\n                                    *goto gotobriefingroomzac\n                                #Leave\n                                    You turn and leave, walking back to your room.\n                                    *goto gotobriefing\n                #Deflect the blame\n                    \"It wasn't my fault you know.\" You say, trying to sound convincing. \"We weren't properly prepared for the mission.\"\n                    *line_break\n                    \"Sure.\" Zac begins playing again.\n                    *line_break\n                    \"Really. What could I have done?\" You object, your voice sounding a bit too high.\n                    *line_break\n                    \"Look. I don't know what you could or couldn't have done. The fact is- [b]you[/b] lost @{male him|her}. Not anyone else.\"\n                    *line_break\n                    You huff loudly. \"I did all I could.\"\n                    *line_break\n                    Zac looks at you for a long moment. \n                    *if zacrel >=60\n                        \"Maybe you did, ${nick}.\" @{male he|she} says finally \"I hope people understand that in the end.\"\n                        *goto gotobriefingroomzac\n                    *else\n                        \"Whatever you say.\" Zac says finally, not sounding convinced. \"I'd like to practice some more if you don't mind. Alone.\"\n                        *line_break\n                        \"Sure.\" \n                        *goto gotobriefing\n        *else\n            \"The attack. It brought back memories I preferred to keep lost.\"\n            *line_break\n            \"What do you mean?\" You ask.\n            *line_break\n            \"I don't remember if I told you, but my grandfather was killed in a terrorist attack three years ago. Just a random attack, no big headlines, nothing special.\" Zac stops playing \"@{male He|She} was special to me.\"\n            *line_break\n            *choice\n                #Try to comfort @{male him|her}\n                    *if speech >=70\n                        \"I'm sorry for what happened. This attack must really bring back hard memories.\"\n                        *line_break\n                        Zac chuckles darkly. \"You can say that again. My grandfather was the cornerstone of our family. It's been tough ever since @{male he|she} was murdered.\" @{male he|she} strums a few notes \"I thought that by joining the Wardens I could stop things like this happening, but here we are, the biggest attack since the Zver hotel- right under our noses. (Success! Needed 70 persuasion) (Persuasion +5, Zac +5)\n                        *set zacrel +5\n                        *line_break\n                        *label atleast\n                        \"At least we got @{male him|her} this time, @{male George|Georgia} Hamtz will face justice.\"\n                        *line_break\n                        Zac's eyes flash. \"@{male He|She} won't be the only one that'll pay.\"\n                        *line_break\n                        \"What do you mean?\" you ask\n                        *line_break\n                        \"I have a hunch we will be seeing much more combat soon.\" Zac begins playing again. \"Anything can happen.\"\n                        *goto gotobriefingroomzac\n                    *else\n                        \"I'm sure @{male he|she} would be proud to see you now.\"\n                        *line_break\n                        Zac sneers \"Yeah right. In case you haven't noticed, the biggest attack since the Zver hotel attack happened right under our noses.\" Zac's voice rises \"The only reason we were allowed to try to make things right by bringing in @{male George|Georgia} Hamtz is that the battalion commander is the brigade commanders cousin! The ${brigade} Wardens are the biggest joke in the RDF right now!\" (Zac -5) (Needed 70 persuasion)\n                        *set zacrel -5\n                        *line_break\n                        *goto atleast\n                #Sit down beside @{male him|her}, staying quiet.\n                    You sit down beside Zac. Not trusting yourself to say the right thing, you stay silent.\n                    *line_break\n                    Zac rubs @{male his|her} eyes. \"I wanted to fix it.\"\n                    *line_break\n                    \"Fix what?\" You ask.\n                    *line_break\n                    \"My grandfather didn't have to die. I thought that if I gave it my best, if I joined the Wardens, I could save someone else's grandfather. Turns out- I can't.\"\n                    *line_break\n                    *goto atleast\n    #Join Walker\n        You join Walker on the south side of the basketball court.\n        \n        \"Hey, ${nick}.\" Walker waves you closer \"So you decided to wake up in the end.\"\n        *line_break\n        \"Guess I did.\" You shrug.\n        \n        *if georgegotaway =1\n            \"Shame about what happened yesterday, huh?\" Walker says, wiping the sweat from @{male his|her} brow.\n            *choice\n                #Take responsibility\n                    \"I feel terrible. I failed and made everything worse.\"\n                    *line_break\n                    Walker shrugs \"True. But I wouldn't sweat over it.\"\n                    *line_break\n                    \"You raise an eyebrow. \"What do you mean?\"\n                    *line_break\n                    \"Exactly what it sounds like.\" Walker begins pushups again. \"Don't lose any sleep over it.\"\n                    *line_break\n                    \"How can I not? I am responsible for an arch-terrorist on the loose!\"\n                    *line_break\n                    \"Sweating over it won't make it any better. It won't capture @{male him|her} and it won't make the higher-ups happier. Channel your frustrations into something that will capture @{male him|her} next time easier. Personally, I recommend pushups.\" Walker smiles and stands up. \"Want to join me?'\n                    *choice\n                        #\"Sure.\"\n                            \"Follow my lead.\" (Strength +1, Walker +5)\n                            *set strength +1\n                            *set sgtrel +5\n                            *goto gotobreifingroomwalker\n                        #\"Maybe some other time.\"\n                            \"I mean what I say.\" Walker says, looking into your eyes \"Find something productive to do.\"\n                            *line_break\n                            \"I'll think of something.\" You reply.\n                            *goto gotobriefing\n                #Deflect the blame\n                    \"I was wondering,\" you probe \"whose idea was it to send us into such an important mission without preparing properly?\"\n                    *line_break\n                    \"You have no idea how hard for the ${brigade} Wardens to get assigned that mission. We needed something to get our good name back after our failure at the parade. The battalion commander is a good friend of the brigade commander, @{male he|she} managed to get @{male him|her} to get us the mission.\" Walker begins doing pushups again \"You should be thankful we had the opportunity.\"\n                    *line_break\n                    \"Still.\" You try again \"We weren't prepared for a messy getaway.\"\n                    *line_break\n                    \"Look, ${nick}. If you think every single mission we go on will be one hundred percent foolproof you're dead wrong. This is only the beginning and it's not gonna be any easier.\" (Walker -3)\n                    *set sgtrel -3\n                    *goto gotobriefing\n        *else\n            \"You did really great yesterday.\" Walker wipes the sweat from @{male his|her} brow.\n            *choice\n                #\"It was a team effort.\"\n                    Walker smiles \"It was. Doesn't mean you can't take some of the credit. Anyway, want to join me?\" (Walker +3)\n                    *set sgtrel +3\n                    *label exercise\n                    *choice\n                        #\"Sure.\"\n                            You join Walker, performing various exercises. After you take a shower, you feel much more refreshed and ready for the day. (Strength +1)\n                            *set strength +1\n                            *goto gotobriefing\n                        #\"No thanks.\"\n                            \"Your loss.\" Walker begins stomach crunches \"Don't be late to the Briefing, see you then.\"\n                            *choice\n                                #\"See you then\"\n                                    *goto gotobriefing\n                #\"Thank you, I appreciate the appreciation.\"\n                    \"Thank you, I appreciate the appreciation.\" (Walker +3)\n                    *set sgtrel +3\n                    *line_break\n                    Walker chuckles \"Want to join me? I promise you'll feel much readier for the day after.\"\n                    *goto exercise\n    #Go find somewhere to smoke\n        *set smoke 1\n        You search for a quiet spot to smoke, finding one underneath a large tree. You don't remember when you began smoking, but\n        *if georgegotaway = 1\n            now you find yourself smoking cigarette after cigarette, the memories of last night's failure blunted by the smoke and nicotine.\n            *goto s1t\n        *else\n            you find yourself smiling to yourself as you inhale the smoke, the nicotine rush fusing with the memories of last night's success.\n            \n            You finish your cigarettes and go to the briefing room, arriving a few minutes early.\n            *goto s1t\n*label s1t\n*goto brief\n*label gotobriefingabesam\n*page_break\n@{male Abe|Mara} looks at @{male his|her} watch. \"It's almost 1000. We should go to the briefing room.\"\n\n\"I'm curious about the so-called \"important mission\" Sam replies, throwing the ball into a nearby shed. \"Let's go. \"\n*goto brief\n*label gotobriefingroomzac\n*page_break\n\"Zac! ${nick}!\" You are startled out of your trance by Miller's voice. \"I'll kill both of you if you're late!\"\n*line_break\nZac jumps \"Shit. I totally forgot! The briefing!\"\n*line_break\n*fake_choice\n    #\"Don't worry. We can still make it.\"\n    *selectable_if (zacrel >=60) #\"Race you there!\"\n    #\"No need to run. Nothing will happen if we're late.\"\n*goto brief\n*label gotobreifingroomwalker\n*page_break\nWalker straightens and cleans the dust from @{male his|her} hands. \"It's almost time for the briefing. Let's go.\"\n*goto brief\n*label gotobriefing\n*page_break\nYou notice the time is 0950. You go to the briefing.\n*goto brief\n*label brief\n*page_break\n\"Good morning all.\" Maj. Faraz begins \"I hope you are all well rested after last night.\"\n\n\nA map of northern Regovia appears on the wall behind the podium.\n\n\"In the last 24 hours, we have noticed a large Sarian buildup on the border. Tanks are moving in, artillery is being set up and old fortifications are being repaired and cleaned out. We believe Saria wants to use the temporary chaos to their advantage. Ever since Regovia was established they have wanted our lands. However, since they lost the twin islands of Senfir and Lotab they have redoubled their efforts to destroy our Republic.\"\n\nThe slide behind the podium changes into a satellite image of a military base, with a convoy of trucks at the entrance.\n\n\"This convoy is leaving northern Saria at 1100 today, by tonight it will have transported weapons, tank parts and ammunition to the border, dispersing it between the entire Sarian front line. High command wants to send a message to Saria not to mess with us. \n*if (brigade = \"28th Paratrooper\")\n    The ${brigade} Wardens will paradrop behind enemy lines, \n    *goto s0\n*else\n    The ${brigade} Wardens will infiltrate enemy lines,\n    *goto s0\n*label s0\nambush the convoy, destroy the cargo and return home. Any questions?\"\n\nZac raises @{male his|her} hand. \"What about POWs?\"\n*line_break\n\"If you have the time, destroy any personal weapons they are carrying and leave them tied up and unharmed. We want to show our strength and abilities, not kill Sarians we don't need to. Dismissed.\"\n*page_break 2000, 15th January, 2022\n*if (brigade = \"28th Paratrooper\")\n    *goto paradrop\n*else\n    *goto infiltrate\n*label paradrop\nFive planes fly in formation above Saria, you are sitting in the second plane to left, right next to the drop door, you know that in less than five minutes, the doors will open, and you will jump nearly 300 meters to the ground. \n\nThe plane is long, with seats on both sides of the interior. Two doors are positioned on both sides of the plane, allowing one soldier to jump out at a time.\n*line_break\nMost soldiers around you are nervous about the jump and are trying not to show it, cracking jokes at giggling nervously.\n\nYou haven't paradropped since basic training. Miller sits beside you.\n\n\"Ready for this?\" @{male He|She} whispers \"It's one hell of a drop.\"\n*fake_choice\n    #\"I can't believe I wanted to be a paratrooper! I'm terrified of heights!\"\n        Miller laughs \"Guess you should have chosen a better brigade then!\"\n        *achieve gano\n    #\"Excited! Let's do this!\"\n        \"I like your spirit ${nick}!\"\n    #\"I'm surprisingly calm actually\"\n        \"Great. The last thing we need is someone to blow our cover by shooting at a wild boar thinking it's the enemy.\"\n*line_break\nThe paradop instructor stands up and raises a single finger. \"Doors open in one minute! Take. Your. Places!\" @{male He|She} roars, barely heard over the roar of the engines and wind.\n\nYou stand up, placing one hand on your reserve chute so that it won't accidentally open.\n*line_break\nThe door opens.\n*line_break\nYou take a step forward.\n*line_break\nYou wonder which city the lights you see to your north belong to.\n*line_break\n\"JUMP!\"\n*fake_choice\n    #Jump!\nYou jump out of the open door, shooting out of the plane faster than you can blink. This feeling of helplessness flying through the air must be what a piece of spit or trash thrown out of a car must feel like.\n*line_break\nThe parachute opens, slowing you down and lowering you to the ground at a speed you hope won't break your legs.\n\nAs if someone flicked a switch, you are enveloped by a profound and total silence. The effect is hypnotic and you have to force yourself to look down and make sure you are prepared for the landing.\n*page_break Impact!\nYou fall to the ground, unhurt.\n\nYou disconnect yourself from the parachute and walk quietly towards the meeting point. On the way, you join up with various team members until finally reaching Miller and the rest of the ${unit}.\n*goto if\n*label infiltrate\nYou cross the border undetected thanks to a series of underground tunnels built years ago by the engineering corp in order to facilitate an incursion like this one. All goes to plan and you find yourself exiting the tunnels a few kilometers inside enemy lines.\n\n\"${nick}, look at this!\" you hear \n*if ((zacrel > samrel) and (zacrel > aberel))\n    Zac\n    *goto n300\n*elseif ((samrel > zacrel) and (samrel > aberel))\n    Sam\n    *goto n300\n*elseif ((aberel > zacrel) and (aberel > samrel))\n    @{male Abe|Mara}\n    *goto n300\n*label n300\ncall and point to the north. You look just in time to see Maj. Faraz pass a thick envelope to an armed @{male man|woman}, flanked by two other armed @{male men|women}. The first @{male man|woman} shakes Maj. Faraz's hand and points to a nearby hill where you can barely make out the outlines of a few trucks.\n\nYour earpiece cackles. [i]\"Go to the hill on the right, every company should have 3 Sarian military trucks. Board them and wait.\"[/i]\n*page_break\nThe drive is uneventful, after half an hour you disembark the trucks and huddle together with the rest of the team. You see Faraz has chosen the perfect place for an ambush. The road the convoy will drive on is flanked by a steep incline on the west and another steep incline on the east, giving you a great view of the road and blocking any options for an escape without leaving any trucks behind.\n*goto if\n*label if\n*if unit = \"Scouts\"\n    *goto scoutt\n*elseif unit = \"Sappers\"\n    *goto sappert\n*else\n    *goto crowt\n*label sappert\n*page_break\n\"Everyone okay? Good\" Miller begins \"As Sappers, we have the most important part of the mission tonight. We will lay land mines on the road the convoy will drive on as well as claymores 300 meters back. When the convoy reaches the land mines the first vehicle will explode and block the road forward, then, we activate the claymores, blocking the route from behind. If the enemy turns down our offer of surrender- we take the convoy by force. Let's get to work!\"\n\nThe next hour is hard work, small holes for mines need to be dug and mapped, claymores are set up and the heavy anti-tank mines are placed in the holes and covered with a thin layer of dirt.\n*page_break\nWhen the job is done, Miller gathers the team for some last-minute planning. \n*line_break\n\"Does anyone have any idea how to improve our ambush?\"\n*choice\n    *selectable_if (strength >=95) #\"We could place boulders in tactical positions, giving us better cover.\" (Strength)\n        *set boulders 1\n        \"We could place boulders in tactical positions, giving us better cover.\" You say quickly \"I could set up the boulders myself, that way we would still have plenty of time before the enemy arrives.\"\n        *line_break\n        Miller nods. \"Sounds like a good idea. Do it.\"\n        *goto ambush\n    *selectable_if (speech >=70) #\"I would like to be the one to call for surrender. I think I can convince them to lay down their arms peacefully.\" (Persuasion)\n        *set talk 1\n        \"I would like to be the one to call for surrender. I think I can convince them to lay down their arms peacefully.\" You say quickly \"I'm good at that sort of thing.\"\n        *line_break\n        Miller waits a few moments before responding. \"That's actually a pretty good idea, you do have a way with words. I'll let Faraz know you will be holding the megaphone\"\n        *goto ambush\n    *selectable_if (shooting >=70) #\"The vantage points could be more effective if we moved them a bit.\" (Shooting)\n        \"The vantage points could be more effective if we moved them a bit.\" You say quickly \"I have a good idea where to move them too.\"\n        *line_break\n        Miller nods. \"You always did have good ideas for vantage points. Go with Walker and tell @{male him|her} where you think we should be set up.\"\n        *set vantage 1\n        *goto ambush\n    *selectable_if (leadership >=80) #\"Let me take four soldiers, we could lay in wait closer to the road and provide more effective fire.\" (Leadership)\n        \"Let me take four soldiers, we could lay in wait closer to the road and provide more effective fire.\" You say quickly \"I can lead a small fireteam, we could really confuse the enemy.\"\n        *line_break\n        Miller thinks for a long moment. \"Don't blow this, if you manage to make this work I might just send you straight to officers school.\"\n        *set ambush 1\n        *goto ambush\n    #Remain silent\n        \"Nothing?\" Miller surveys the team \"Excellent. You all know what to do- let's end this.\"\n        *goto ambush\n*label scoutt\n\"Everyone okay? Good\" Miller begins \"As Scouts, our job tonight is to lie in ambush, give updates about the enemy's location and attack from behind if the enemy doesn't surrender once the Sappers activate their explosives. We will build observation posts in this area and machine-gun nests closer to the road. Good luck.\"\n\nThe next hour is hard work. Small, camouflaged observation posts need to be prepared along the convoy's route. If that isn't enough, larger positions with machine guns and automatic grenade launchers are erected closer to the rest of the Wardens.\n*page_break\nWhen the job is done, Miller gathers the team for some last-minute planning. \n*line_break\n\"Does anyone have any idea how to improve our ambush?\"\n*c e Scouts rain fire at the enemy trucks, setting them on fire with accurate 40mm grenades.\n    *set enemies 75\n    *goto ambu3\n*elseif ambush = 1\n    Your small ambush proves extremely effective. From the moment the enemy begins shooting towards the Scouts you and your fireteam fire and throw grenades at the enemy from close range while remaining undetected, causing chaos and heavy damage.\n    *set enemies 75\n    *goto ambu3\n*else\n    You hear more explosions and gunshots from further away, from the areas the Sappers and Crows are responsible for. To your relief, the firefight between the Scouts and the convoy is slowly turning in your favor.\n    *set enemies -10\n    *goto ambu3\n*label ambu3\n*goto v3\n*label ambush\n*page_break\nYou lie in wait for the convoy for over an hour before the Scouts report that the Sarian convoy should reach the ambush in ten minutes. \n*if vantage = 1\n   The new vantage points you have chosen give the Sappers a much better line of fire to the places the convoy trucks should be.\n   *goto v1\n*elseif ambush = 1\n    The fireteam under your command is placed much closer to the road than the rest of the sappers, placing the middle of the convoy in grenade throwing range.\n    *goto v1\n*elseif talk = 1\n    Your weapon is slung across your back so that you can hold the megaphone. You hope you can get at least some of the Sarians to surrender. (Persuasion +5)\n    *set speech +5\n    *goto v1\n*elseif boulders = 1\n    You survey the boulders you moved around and you are glad to see they give much better cover than the small rocks and sandbags that were supposed to provide you with cover. You hope they will be enough.\n    *goto v1\n*else\n    *goto v1\n*label v1\n\nYou are shaken out of your daydreaming by Sam.\n*line_break\n\"Do you hear that?\" Sam whispers to you \"It sounds like the convoy.\"\n*line_break\nYou listen harder. It's true, you can hear the distant rumble of heavy vehicles driving on the dirt road. Not a minute passes before they arrive.\n\nThe convoy is much bigger than you expected, the lights from the long line of trucks stretch more than 300 meters back. You notice some of them are even carrying tanks as cargo.\n\nThe trucks pass your position one after the other, unsuspecting of the fate that awaits them in a few short moments.\n*line_break\nThe first truck reaches the line of the mines.\n*line_break\nNothing happens.\n*line_break\nFear rises in your throat.\n*line_break\n\"Who is the idiot that laid those...\"\n*line_break\nA huge explosion rips through the air. A pillar of fire erupts from the front of the convoy. After a moment a second explosion follows from the far side of the convoy.\n\n*if talk=1\n    This is your moment. You begin speaking into the megaphone.\n    \n    \"You have walked into an RDF ambush. You are blocked from the front and back, there is no escape. Most of you are not combat soldiers, you are truck drivers, making very little pay and receiving no respect from your superiors. In a few minutes, the mighty RDF airforce will bomb this area, destroying you and what is left of your cargo. Surrender and run we promise not to harm anyone who does not fight.\"\n    *set enemies 75\n    \n    The entire line holds its breath, waiting to see how the Sarians respond.\n    *line_break\n    One of the trucks opens its door and two figures exit with their hands raised. They turn towards the incline on the west and quickly run down it. Soon, almost a quarter of the Sarians are running away from the battle.\n    *page_break\n    A battle cry erupts from the Sarian trucks and a burst of gunfire hits the ground a few meters to your right.\n    \n    \"So much for that.\" @{male Abe|Mara} quips. \"Shame really.\"\n    *goto v2\n*else\n    Maj. Faraz's voice blares from the megaphone.\n    \n    \"Sarians! We have you surrounded! Surrender or die!\"\n    \n    The only answer @{male he|she} receives is a burst of gunfire that hits the sandbags the Major is taking t enemies who might get the wrong idea and raise their head to aim at a teammate.\n    *set enemies -10\n    *goto cover1\n*label cover1\n\nAfter leapfrogging for what seems like forever, the team finally reaches grenade range.\n*line_break\n\"I hope everyone has kept at least one spare grenade.\" Miller shouts \"On the count of three, I want everyone to throw their grenades at once, aim as far as you can! Ready!\"\n*if intelligence >=75\n    *line_break\n    \"Wait!\" you shout, before Miller begins @{male his|her} countdown. \"Try to get the grenades underneath the enemy trucks. That should get them away from cover and lower the chance a grenade will get thrown back at us.\"\n    *line_break\n    \"Fair enough. Throw the grenades under the trucks!\" Miller readies @{male his|her} own grenade.\n    *set enemies -10\n    *goto cover2\n*label cover2\n\n*line_break\n\"One!\"\n*line_break\n\"Two!\"\n*line_break\n\"Three!\"\n*page_break [b]BOOM[/b]\nYour ears ring from the explosions, deafening you. You have never been this close to so many grenades exploding at once.\n*line_break\nTo your right, Miller is shouting something and the rest of the team rises and fires together.\n*line_break\n*if enemies \u003c= 35\n    When you raise your head above the rock you are using as cover you cannot find any enemies. Only burning trucks.\n    *line_break\n    \"Search the trucks for survivors.\" Miller commands, taking a step towards the burning wrecks ahead.\n    *if unit = \"Sappers\"\n        \"The Crows and Scouts are reporting no other enemies on their end as well.\"\n        *page_break\n        You and the rest of the Sappers \n        *goto amb5\n    *elseif unit = \"Scouts\"\n         \"The Crows and Sappers are reporting no other enemies on their end as well.\"\n         *page_break\n         You and the rest of the Scouts \n         *goto amb5\n    *else\n        \"The Scouts and Sappers are reporting no other enemies on their end as well.\"\n        *page_break\n ops.\n                *goto wonbattle\n            *else\n                You aim your rifle at the target and pull the trigger.\n                *line_break\n                The gun jumps in your hand and you miss the truck entirely.\n                *line_break\n                The @{male man|woman} finishes fixing the malfunction and begins firing at the team.\n                *line_break\n                \"Medic!\" a voice to your right screams \"I'm hit!\"\n                *set deadambush +1\n                *if profession = \"Medic\"\n                    *choice\n                        #Help @{male him|her}\n                            You rush towards the fallen soldier, @{male his|her} arm was hit, the wound spurts blood on your shirt.\n                            *line_break\n                            You quickly apply a tourniquet to @{male his|her} wound, saving @{male his|her} life but causing @{male him|her} even more pain. (Medic +3)\n                            *set medic +1\n                            \n                            Meanwhile, the shooter manages to shoot another burst before being shot.\n                            *line_break\n                            Another soldier begins screaming.\n                            *line_break\n                            This time, someone else applies the tourniquet to @{male him|her}.\n                            *set deadambush +1\n                            *goto wonbattle\n                        #Shoot the shooter\n                            You remember your medic training. Safety first. (Professionalism +5)\n                            *set professionalism +5\n                            *line_break\n                            You fire at the shooter, killing @{male him|her} and allowing you to rush to the wounded without danger of being hit yourself.\n                            *line_break\n                            You take care of the wounded soldier, preparing @{male him|her} for extraction and further care back in Regovia.\n                            *goto wonbattle\n                *else\n                    You quickly shoot the shooter before @{male he|she} can hit anyone else.\n                    *goto wonbattle\n        #Charge directly at @{male him|her} before @{male he|she} has a chance to fix @{male his|her} rifle.\n            *if handcombat >=45\n                You leap out of cover and run towards the Sarian soldier. @{male His|Her} eyes go wide when @{male he|she} sees you are standing just a step away. @{male He|She} raises @{male his|her} malfunctioning weapon, preparing to use it as a club.\n                *line_break\n                You don't give @{male him|her} the chance.\n                *line_break\n                Moving quickly, you smash your own gun into @{male his|her} face. @{male He|She} falls backwards, dropping @{male his|her} rifle.\n                *line_break\n                You kick @{male his|her} rifle away, aiming your own gun at @{male his|her} face.\n                *line_break\n                Blood trickling down @{male his|her} broken nose, @{male he|she} raises @{male his|her} hands in surrender. (Success! Needed 45 hand to hand combat) (Hand to hand combat +3)\n                *set handcombat +3\n                *goto wonbattle\n            *elseif handcombat >=35\n                You leap out of cover and run towards the Sarian soldier. @{male His|Her}eyes go wide when @{male he|she} sees you are standing just a step away.\n                *line_break\n                @{male He|She} raises @{male his|her} malfunctioning weapon, preparing to hit you with it like a club.\n                *line_break\n                @{male He|She} hits you on the head with @{male his|her} rifle. Luckily, your helmet protects you from most of the damage.\n                *line_break\n                A shot rings out to your right.\n                *line_break\n                The Sarian's hands go to @{male his|her} side. @{male His|Her}mouth opens wordlessly.\n                *line_break\n                @{male He|She} falls, dead.\n                *goto wonbattle\n            *else\n                You leap out of cover and run towards the Sarian soldier. @{male His|Her}eyes go wide when @{male he|she} sees you are standing just a step away.\n                *line_break\n                @{male He|She} raises @{male his|her} malfunctioning weapon, preparing to hit you with it like a club.\n                *line_break\n                You try to kick @{male him|her} in the leg but @{male he|she} moves sideways, evading you.\n                *line_break\n                The Sarian brings down the butt of @{male his|her} gun on your helmet.\n                *line_break\n                You stumble backward, the ground swims under you and your legs feel like they are made of rubber.\n                *line_break\n                You fall.\n                *line_break\n                The Sarian goes back into cover and manages to fire a few more rounds at your teammates before being hit in the chest.\n                *set deadambush +1\n                *goto wonbattle\n        #Command someone to give you cover fire while you flank. \n            *if leadership >=70\n                \"Zac! @{male Abe|Mara}! Give me some cover fire!\" you shout, pointing towards the enemy.\n                *line_break\n                Zac and @{male Abe|Mara} nod and begin firing in short bursts, raining a steady stream of fire towards the enemy.\n                *line_break\n                While the enemy soldier is unable to look at you without being hit, you run to the left, taking cover behind a truck with a clear view of the Sarian.\n                *line_break\n                You aim and fire, easily hitting the enemy in the chest. (Success! Needed 70 leadership) (Leadership +3)\n                *set leadership +3\n                *goto wonbattle\n            *elseif leadership >=60\n                \"@{male Abe|Mara}! Sam! Give me some cover fire!\" you shout, pointing towards the enemy.\n                *line_break\n                \"Why?\" @{male Abe|Mara} asks.\n                *line_break\n                \"Just do it!\" you roar.\n                *line_break\n                Sam begins firing in short bursts while @{male Abe|Mara} looks at Miller, waiting for orders.\n                *line_break\n                You run left, towards another truck with a better view of the enemy.\n                *line_break\n                Before you can shoot at the Sarian soldier, @{male he|she} uses a small lull in the cover fire to shoot a few rounds towards the team.\n                *label medicmedic\n                *line_break\n                \"I'm hit! Medic! MEDIC!\" a voice screams.\n                *line_break\n                You aim and fire at the Sarian, hitting @{male him|her} directly in the chest.\n                *goto wonbattle\n            *else\n                \"Miller! Walker! Give me some cover fire!\" you shout, pointing towards the enemy.\n                *line_break\n                Walker raises an eyebrow. \"What?\"\n                *line_break\n                \"Fire at @{male him|her}! I want to flank @{male him|her}!\" you roar back.\n                *line_break\n                By the time you finish explaining your plan to Walker, the Sarian soldier has finished fixing @{male his|her} weapon malfunction and fires a few rounds at your team.\n                *line_break\n                Fortunately, in doing so, @{male he|she} steps out of cover and is hit by a friendly bullet. Unfortunately, the rounds @{male he|she} fired managed to hit a teammate in the arm.\n                *set deadambush +1\n                *goto wonbattle\n        #Wait for a better chance\n            You aim at the Sarian, waiting for a chance to fire and hit. While you wait, the enemy soldier finishes fixing @{male his|her} weapon malfunction, leans out of cover and fires a few rounds towards your team.\n            *goto medicmedic\n*else\n    The volley of fire is answered with sporadic bursts of fire from the incline behind the trucks. It seems the enemy has retreated from the burning vehicles and is using the incline as cover. The Sarians are efficient, blocking any attempt to leave cover and advance towards the trucks.\n    *line_break\n    [i]\"We need to flank them!\"[/i] Maj. Faraz's voice comes through your earpiece. [i]\"10 and 20, give some cover fire, 30 and 40, crawl left until you can advance safely, we don't have much time until we have to leave.\"[/i]\n    *line_break\n    Under fire, you and your team crawl from cover to cover, hoping that the cover fire from teams 10 and 20 will be enough to deter the Sarians from aiming directly at you.\n    *page_break\n    After what seems like forever, the team reaches its position without being discovered. You discover an enemy squad, commanded by a tall, blond bearded Major. The Major is efficiently commanding @{male his|her} small remaining force, alternating part of the squad so that at all times at least two of them can reload while at the same time @{male he|she} is also shouting into a radio, calling for reinforcements. \n    \n    The enemy commander turns to @{male his|her} right, @{male he|she} looks right at you.\n    *choice\n        #Shoot!\n            *if shooting >=70\n                A whole squad of Sarians is nothing to scoff at but you are confident in your abilities. You silently rehearse the order in which you will shoot the enemy soldiers before pulling the trigger until your magazine is empty.\n                \n                You eject your empty magazine, replacing it with a fresh one. The battlefield falls eerily silent. It seems you have eliminated the last of the enemies. (Success! Needed 75 shooting) (Shooting +5\n                *if profession = \"Marksman\"\n                    *set marksman +3\n                    , @{male Marksman|Markswoman} +3)\n                    *goto emptymagazine\n                *else\n                    )\n                    *goto emptymagazine\n                *label emptymagazine\n                *set shooting +5\n                *goto wonbattle\n            *elseif shooting >=65\n                A whole squad of Sarians is nothing to scoff at. You mentally prepare yourself for the task ahead before pulling the trigger.\n                *line_break\n                You empty about half of your magazine before your weapon jams. You roll sideways, evading the storm of bullets headed your way. By the time you finished fixing the jam, the Sarians and one of your teammates are dead. (Needed 75 shooting) (Shooting +3)\n                *set shooting +3\n                *set deadambush +1\n                *goto wonbattle\n            *else\n                Without stopping for breath, you open fire at the enemy squad, missing more bullets than you hit. Your gun [i]clicks[/i]. Your magazine is empty.\n                *line_break\n                You roll sideways, trying unsuccessfully to pull a new magazine from your combat vest. By the time you manage to reload, the Sarians and two of your teammates are dead. (Needed 75 shooting)\n                *set deadambush +2\n                *goto wonbattle\n        #Throw a grenade into the middle of the enemy squad\n            *if strength >=80\n                Shooting an entire squad of Sarian soldiers alone is probably not such a good idea. You throw your last grenade directly between the enemy officer's legs.\n                \n                With a kill radius of 8 meters and a wound radius of 15, after the grenade explodes, not much is left of the enemy squad. (Success! Needed 80 strength) (Strength +3)\n                *set strength +3\n                *goto wonbattle\n            *elseif strength >=70\n                Shooting an entire squad of Sarian soldiers alone is probably not such a good idea. You throw your last grenade towards the enemy. Your throw isn't as accurate as you would have liked and after it explodes a few Sarians are still unharmed.\n                *line_break\n                The Sarians quickly reorganize, returning accurate fire towards you and your team. Teams 10 and 20 use the distraction to advance upon the Sarians. When the dust clears, the Sarians are dead- but so is one of your teammates.\n                *set deadambush +1\n                *goto wonbattle\n            *else\n                Shooting an entire squad of Sarian soldiers alone is probably not such a good idea. You throw your last grenade towards the enemy. To your dismay, you misjudge the distance you have to throw the grenade and it lands between the two opposing forces, exploding and causing only minimal damage to the enemy.\n                *line_break\n                Your jump sideways into cover as a hail of enemy bullets just barely misses you, unfortunately, they find another target, hitting two of your teammates.\n                \n                The team together with TM30, manage to return fire, killing the Sarian squad after a brief firefight.\n                *set deadambush +2\n                *goto wonbattle\n        #Convince them to surrender\n            You don't have time to think of what words to say, they just come pouring out. You hope at least one of them understands Regovian.\n            \n            *if speech >=70\n                \"Stop! Don't shoot! There is no need for you to die! You are the last Sarians left from the convoy. Don't be the last to die tonight.\"\n                *line_break\n                The Sarian Major hesitates, then lowers @{male his|her} gun and signals for the rest of @{male his|her} squad to do the same. (Success! Needed 70 persuasion)\n                *goto wonbattlesariansurrender\n            *else\n                \"Stop! Don't shoot! There is no need for you to die tonight! Surrender, and we will show you mercy.\" (Needed 70 persuasion)\n                *line_break\n                The Sarian Major doesn't hesitate, immediately, @{male he|she} \n                *goto shouts\n        #Wait for orders\n            You freeze, unsure of how to act, waiting for orders from Miller.\n            *line_break\n            Unfortunately for you, the enemy Major has no problem acting independently. @{male He|She}\n            *label shouts\n            shouts a few orders, and the Sarian squad reorganizes itself, raining heavy fire upon you and the rest of TM40.\n            \n            \"Take cover!\" Miller shouts \"Don't stay out in the open!\"\n            *line_break\n            The team quickly heeds @{male his|her} command, no one wants to find @{male him|her}self with nothing but air between them and a Sarian squad.\n            \n            The stalemate continues for a long ten minutes. The Sarians are well commanded and manage to force you to stay put.\n            *line_break\n            Suddenly, you hear a body fall to your right. \"Man down! Get a medic over here!\" a voice screams.\n            *set deadambush +2\n            *line_break\n            [i]\"That's it! I've had enough of this shit!\"[/i] Maj. Faraz's voice cackles in your earpiece, @{male his|her} anger is so [i]\"Get out of there! Retreat!\"[/i]\n            \n            \"Alexi! Turner! Throw some smoke! Let's get out of here!\" Miller shouts, @{male his|her} voice sounding a bit more panicky than you are used to.\n            *page_break\n            The team retreats carefully and quickly. Under the cover of smoke and support fire, the team carries its wounded back towards the waiting\n            *if (brigade = \"28th Paratrooper\")\n                helicopters \n                *goto waitingp\n            *else\n                disguised Sarian trucks \n                *goto waitingt\n*label waitingp\nwhich take you back to Lead Tower.\n*page_break 0130, 16th January, 2022\nAn hour later, when you land in Lead Tower you are greeted by Maj. Faraz.\n*line_break\n@{male He|She} isn't happy.\n*goto waiting\n*label waitingt\nwhich take you back to Lead Tower via the same tunnels you used to enter Saria.\n*page_break 0530, 16th January, 2022\nHours later, when you arrive in Lead Tower and disembark the trucks you are greeted by Maj. Faraz. @{male He|She} isn't happy.\n*goto waiting\n*label waiting\n\n\"What the hell happened back there Miller?\" @{male he|she} thunders \"Everything was perfect! Perfect! We were this close\" @{male he|she} gestures with @{male his|her} hand \"to destroying that convoy entirely. And now? I have to explain to the Colonel how the entire\n*if unit = \"Sappers\"\n    Sappers \n    *goto h1\n*elseif unit = \"Scouts\"\n    Scouts \n    *goto h1\n*else\n    Crows \n    *goto h1\n*label h1\nwere held off by three and a half truck drivers!\"\n*line_break\n\"It was an entire squad!\" Miller objects. \"I-\"\n*line_break\nMaj. Faraz cuts @{male him|her} off \"I don't care! Do you even realize the repercussions of what just happened? In the morning, instead of a story about how we sucker-punched the Sarian military, the front page of the Sarian Times will run a story about the brave squad that saved the day! Instead of scaring the Sarians we just made them angry.\" the Major takes a deep breath. \"Get your team out of my face, round up the rest of the lieutenants, be in my office in five.\" \n*set ambush 2\n*goto attackonradiotower\n*label wonbattlesariansurrender\n*page_break\nGuns raised, the team advances towards the Sarian squad who slowly place their weapons on the ground.\n*line_break\n\"We surrender.\" The Sarian commander declares, @{male his|her} accent so thick you can barely understand @{male him|her}. \"No more death tonight.\"\n*fake_choice\n    #\"Shame, I would have like to see some more Sarians dead, it would have helped me sleep tonight.\"\n        \"Shame, I would have like to see some more Sarians dead, it would have helped me sleep tonight.\" you sneer. (Loyal +3)\n        *set loyal +3\n    #\"No. No more death tonight.\"\n        \"No. No more death tonight.\" You announce somberly. ([i]Luf +3[/i])\n        *set loyal -3\n*line_break\n\"Search them for anything hidden.\" Miller commands \"then let them sit down and rest.\"\n*page_break\nThe team finds nothing on the remaining soldiers of the Sarian squad and only a few unharmed crates of artillery shells in the back of some of the trucks.\n*line_break\nWhile you move the crates to the side, one of the surrendered Sarians tugs on your pant leg, motioning for you to take @{male him|her} to the side.\n*goto interrogategroup\n*label wonbattle\n*page_break\nAfter the last Sarian is dead, it is safe to come out and search for any survivors and unharmed weapon crates, a large pile of which begins to form to the side of the road.\n*line_break\n*goto next\n*label wonbattle1\n*page_break\n*label next\nYou had just found a crate of rifle ammunition when you feel a tug on your pant leg. Looking down, you are surprised to see an unarmed Sarian soldier.\n*line_break\nThe Sarian begins speaking excitedly in @{male his|her} raspy, quick tongue.\n*goto interrogate\n*label interrogategroup\n*temp sarian false\n*choice\n    #Take @{male him|her} to Miller\n        You pick up the Sarian and take @{male him|her} to Miller.\n        \n        \"I don't know any Sarian.\" Miller says offhandedly \"Take @{male him|her} back to @{male his|her} squad and give them some water, it's probably what @{male he|she} wants.\"\n        *goto gohome\n    *selectable_if (alexisdead = 0) #Take @{male him|her} to Alexis, leader of TM10. As a native of Lawan, @{male he|she} speaks fluent Sarian.\n        *goto gotoalexis\n*label interrogate\n*temp sarian false\n*choice\n    #Take @{male him|her} to Miller\n        You pick up the Sarian and take @{male him|her} to Miller.\n        \n        \"Tie @{male him|her} up, place @{male him|her} where we can see @{male him|her}. We'll untie @{male him|her} before we leave.\" Miller says offhandedly when you ask what to do with the captured Sarian.\n        *goto gohome\n    *selectable_if (alexisdead = 0) #Take @{male him|her} to Alexis, team leader of TM10, as a native of Lawan, @{male he|she} speaks fluent Sarian.\n        *label gotoalexis\n        *set sarian true\n        You pick up the Sarian and take @{male him|her} to Alexis.\n        \n        \"What is @{male he|she} saying?\" you ask.\n        *line_break\n        Alexis begins speaking to the Sarian, becoming more and more agitated as the conversation goes on.\n        *line_break\n        \"@{male He|She} claims another wave of enemy tanks are coming, we need to warn \n        *if unit = \"Crows\"\n            Faraz!\" \n            *goto next6\n        *else\n            the Crows!\" \n            *goto next6\n        *label next6\n        Alexis explains hurriedly.\n        *line_break\n        \"Why is @{male he|she} telling us this?\" you inquire.\n        *line_break\n        \"@{male He|She} wants to defect. @{male He|She} claims to hate Saria and has heard that contrary to Sarian propaganda, we aren't all that bad.\"\n        *fake_choice\n            #\"It's obvious @{male he|she} hasn't actually lived in the Citizen Republic if @{male he|she} thinks Regovia is a country worth living in...\"\n                \"It's obvious @{male he|she} hasn't actually lived in the citizens republic if @{male he|she} thinks Regovia is a country worth living in...\" ([i]Luf +3[/i])\n                *set loyal -3\n                *line_break\n                Alexis tilts @{male his|her} head and narrows @{male his|her} eyes \"I think you will find you were not dealt a terrible hand by being born in Regovia.\" \n            #Stay silent\n                You remain silent.\n            #\"It's good to know some Sarians see through their government's propaganda.\"\n                \"It's good to know some Sarians see through their government's propaganda.\" (Loyal +3)\n                *set loyal +3\n                *line_break\n                Alexis nods \"You would be surprised to know how many outside Regovia envy us and our Republic in their hearts.\"\n        *line_break\n        \"Anyway,\" you hold the Sarian \"I'll take @{male him|her} to Miller until a decision is made.\"\n        *line_break\n        Alexis shakes the Sarian's hand and waves you goodbye before explaining the situation to Maj. Faraz by radio.\n        *if unit = \"Crows\"\n            *goto gohome\n        *page_break\n        \"We're leaving now.\" Miller explains when you return to the team. \"We are taking the Sarian with us. Does @{male he|she} have a name?\"\n        *line_break\n        \"I didn't ask.\" You admit.\n        *line_break\n        Miller turns towards the @{male man|woman}. Mumbling a few words in Sarian.\n        *line_break\n        The Sarian smiles at Miller's broken Sarian. \"Thaz.\" He responds.\n        \n        \n        \"Since when do you speak Sarian?\" Walker asks Miller quizzically.\n        *line_break\n        \"I know a few words in Filo, it's basically a dialect of Sarian.\" Miller shrugs \"Anyway, we need to move before those tanks arrive, we should give the Crows the space to do their thing.\"\n        *page_break\n        The \n        *label ambushvictory\n        *if unit = \"Sappers\"\n            Sappers \n            *goto h2\n        *elseif unit = \"Scouts\"\n            Scouts \n            *goto h2\n        *else\n            Crows \n            *goto h2\n*label h2\nmarch quickly towards the\n*if (brigade = \"28th Paratrooper\")\n    helicopters \n    *goto leavingp\n*else\n    disguised Sarian trucks \n    *goto leavingt\n*label leavingp\nwhich take you back to Lead Tower.\n*page_break 0130, 16th January, 2022\nAn hour later, when you land in Lead Tower you are greeted warmly by Maj. Faraz. \n*goto leaving\n*label leavingt\nwhich take you back to Lead Tower via the same tunnels you used to enter Saria.\n*page_break 0530, 16th January, 2022\nHours later, when you arrive in Lead Tower and disembark the trucks you are greeted warmly by Maj. Faraz.\n*goto leaving\n*label gohome\n*if ((unit = \"Scouts\") and (sarian = false))\n    *goto tanksarrivescouts\n*elseif unit= \"Crows\"\n    *goto crowtanks\n*page_break\nEverything is quiet, the only sounds are the crackling of the fires and faint footsteps. You sit down against a rock and close your eyes.\n*page_break\n\"Get up!\" you are shaken awake by @{male Abe|Mara}.\n*line_break\n\"What is it?\" you murmur.\n*line_break\n\"Sarian tanks are coming! We need to leave [b]now[/b]!\"\n*temp tanks false\n*label tanks\n*choice\n    *disable_reuse #\"Tanks?\"\n        \"Tanks?\"\n        *line_break\n        \"Yes! Tanks! They are almost here, they came out of nowhere. They hit the Scouts pretty hard, the Crows are trying to counterattack them so that the Scouts can retreat.\"\n        *set tanks true\n        *goto tanks\n    #\"Let's go!\"\n        You get up and begin to run towards the awaiting \n        *if (brigade = \"28th Paratrooper\")\n            helicopters \n            *goto leavingp1\n        *else\n            disguised Sarian trucks \n            *goto leavingt1\n*label leavingp1\nwhich take you back to Lead Tower.\n*if (tanks = false)\n    \"They came out of nowhere.\" @{male Abe|Mara} explains while you run to the helicopters. \"They hit the Scouts pretty hard, the Crows are trying to counterattack so they prefer us out of the way.\"\n*page_break 0130, 16th January, 2022\nAn hour later, when you land in Lead Tower you are greeted by a very worried Maj. Faraz.\n*line_break\n\"The Scouts were badly mauled by the Sarian tanks before they managed to pull out.\" @{male He|She} tells Miller. \"Get all of the lieutenants into my office in ten, everyone else should go to sleep.\"\n*set ambush 3\n*goto attackonradiotower\n*label leavingt1\nwhich take you back to Lead Tower.\n*if (tanks = false)\n    \"They came out of nowhere.\" @{male Abe|Mara} explains while you run to the trucks. \"They hit the Scouts pretty hard, the Crows are trying to counterattack so they prefer us out of the way.\"\n*page_break 0130, 16th January, 2022\nAn hour later, when you land in Lead Tower you are greeted by a very worried Maj. Faraz.\n*line_break\n\"The Scouts were badly mauled by the Sarian tanks before they managed to pull out.\" @{male he|she} tells Miller. \"Get all of the lieutenants into my office in ten, everyone else should go to sleep.\"\n*set ambush 3\n*goto attackonradiotower\n*label leaving\n\n*comment this should be the end for all of the units\n\"How are my heroes doing?\" @{male he|she} says, shaking Miller's hand. \"You all performed exceptionally well back there. I am proud of all of you.\"\n*set ambush 1\n*if (sarian = true)\n    Faraz shakes turns towards Thaz and shakes @{male his|her} hand warmly \"Get our new friend set up for the night, we should have a decision about @{male him|her} by morning.\"\n    *goto attackonradiotower\n*else\n    *goto attackonradiotower\n*label tanksarrivescouts\n*page_break\nYou sit down against a rock and close your eyes.\n*page_break\nYou are jolted awake by an explosion.\n*line_break\n\"EVERYBODY TAKE COVER!\"\n*line_break\nA Scout you recognize is from TM30 falls next to you, a piece of shrapnel from a tank shell lodged in the back of @{male his|her} head. Another explosion rocks the ground beneath your feet.\n*line_break\n[i]\"What is going on!?\"[/i] Miller's voice comes through your earpiece. [i]\"I thought we took everyone out!\"[/i]\n*page_break\nYou look around you, searching for the threat.\n*line_break\nThen, you find it.\n\nA column of tanks is headed towards you, leapfrogging forward and firing almost non-stop.\n*line_break\nYour earpiece crackles with confused shouting and screams.\n*line_break\n[i]\"Enemy tanks have overrun my position!\" \"Immediate assistance needed!\" \"MEDIC!\"[/i]\n*set deadambush +1\n\n\"Everyone quiet!\" Maj. Faraz's calm voice comes through. \"I want everyone to spread out and take cover. The Crows are in position to assist us until we can retreat in an orderly fashion.\"\n*page_break\n*choice\n    #Spread out, take cover, await further orders.\n        You decide to follow Faraz's orders, taking cover far from the rest of the Scouts.\n        *line_break\n        The tank shells falling around you deafen your ears. Meanwhile,  0.5mm bullets from the tanks machine guns whistle over your head. Luckily, you find a good spot and manage to take cover. You can only hope the rest of the Scouts are as lucky as you are.\n        *goto takecover\n    #Start shooting at tank commanders\n        You aren't going to wait like a princess in a fairytale for the Crows to save you.\n        \n        You lie in wait and aim at the enemy tanks. Unworried about an infantry battalion causing damage while two machine guns per tank are firing at them, the Sarian tank commanders have no problem leaving their heads outside of the tank. You intend to take full advantage of their disrespect for the Wardens.\n        \n        *if shooting >=75\n            You aim at the first Sarian tank, take a deep breath and pull the trigger.\n            *line_break\n            Your aim is true, commander after commander falls once they get into range. To your dismay, once the Sarians realize their mistake, the tank commanders quickly enter the tanks and close the hatches. You don't even try to directly fire at the tanks, you know your 5.56 rounds are useless. (Success! Needed 75 shooting) (Shooting +3)\n            *set shooting +3\n            *line_break\n            With the surviving tank commanders having a less than optimal view, the enemy tanks slow, no longer charging ahead and mowing down your comrades.\n            *goto tanksdestroyed\n        *else\n            You try to aim at the enemy tank commanders but the suppressive fire they aim at you coupled with the regular battlefield chaos is too much. Your shots go wide, not even scraping the enemy tanks. (Needed 75 shooting)\n            *goto takecover\n*label takecover\n*page_break\nJust when all seems lost,\n*set deadambush +2\n*label tanksdestroyed1\nthe sky is suddenly painted with thin strips of fire. The Crows fire missile after missile, striking the enemy tanks directly in the turret ring, where the tanks are weakest. The tanks explode and burn, their turrets launch into the air as if weightless and crash back down moments later, shattering into pieces.\n\nAs the enemy tanks become engulfed by flames Sarian soldiers jump out and are quickly gunned down by the vengeful Scouts. Within a few minutes, the battle is over, but not without a cost.\n\n\nTens of Scouts are laying dead or wounded on the battlefield, you estimate at least half of the original company will not able to fight in any coming war.\n*page_break\n*label thenexthour\nThe next hour is the longest of your life. Body after body is carried to \n*if (brigade = \"28th Paratrooper\")\n    the waiting helicopters and taken back to Lead Tower.\n    *page_break 0130, 16th January, 2022\n    An hour later, when you land in Lead Tower you are greeted by a very worried Maj. Faraz.\n    *goto leaving123\n*else\n    the Sarian trucks which take you back to Lead Tower via the same tunnels you used to enter Saria.\n    *page_break 0530, 16th January, 2022\n    Hours later, when you arrive in Lead Tower and disembark the trucks you are greeted by a very worried Maj. Faraz.\n    *goto leaving123\n*label leaving123\n\n\"How did this happen? How did they surprise us like that?\" the Major asks Miller rhetorically. Faraz sighs. \"I want the rest of the lieutenants in my office in ten and the rest of the Company in bed by then.\"\n*set ambush 3\n*goto attackonradiotower\n*label tanksdestroyed\n*page_break\nSuddenly, \n*goto tanksdestroyed1\n*label crowtanks\n*if sarian = true\n    *goto crowkilltanks\n*else\n    *goto suprisedcrows\n*label crowkilltanks\n*page_break\nSuddenly, your earpiece cackles. [i]\"All Crows from @{male Papa Crow|Mama Crow}, all Crows from @{male Papa Crow|Mama Crow}, be aware that we have received information about a hostile tank column approaching our position. We have around 15 minutes before they arrive, that means we need to be ready to take them out in ten. I trust you. Good luck.\"[/i]\n\nYou act on reflex. Without thinking, you and @{male Abe|Mara} recalibrate the anti-tank missile launchers, preparing them for the job ahead. When the enemy will show itself, you will be ready.\n*page_break\n\"Enemy tanks on the horizon!\" someone shouts.\n*line_break\nThe enemy tanks are fearsome. Not expecting resistance from unarmored infantry, they charge forwards, firing their main gun and secondary machine guns towards your positions.\n\nYou smile to yourself, they will pay dearly for disrespecting the Wardens.\n\nOne after another, the Crows fire their anti-tank missiles, striking the Sarian tanks directly in the turret ring, where the tanks are weakest. The tanks explode and burn, their turrets launch into the air as if weightless and crash back down moments later, shattering into pieces.\n*fake_choice\n    #Smile, \"Caw Caw motherfuckers.\"\n        You smile, \"Caw Caw motherfuckers.\" (Loyal +2)\n        *set loyal +2\n    #Frown, \"Shame, I wish they would have surrendered, they died for nothing.\"\n        You frown, \"Shame, I wish they would have surrendered, they died for nothing.\" ([i]Luf[/i] +2)\n        *set loyal -2\n\nThe surviving Sarian tankers leap out of the burning tanks only to be gunned down by the Scouts. The battle is finally over.\n\nAfter making sure there are no Sarian survivors and no friendly soldiers accidentally left behind, the\n*goto ambushvictory\n*label suprisedcrows\n*page_break\nEverything is quiet. The only sounds are the crackling of the fires and faint footsteps. With nothing else to do, you sit down against a rock and close your eyes.\n*page_break\n\"Get up!\" you are suddenly shaken awake by @{male Abe|Mara}.\n*line_break\n\"What is it?\" you murmur.\n*line_break\n\"Sarian tanks are coming, the Scouts are in trouble!\"\n*line_break\nStill sleepy, you don't completely comprehend what @{male Abe|Mara} has just told you. \"Tanks?\" you ask.\n*line_break\n\"Yes! Tanks! They are almost here, they came out of nowhere. Hitting the Scouts pretty hard, we need to help them before none of them are left!\"\n*page_break\nYou act on reflex. Without thinking, you and @{male Abe|Mara} recalibrate the anti-tank missile launchers, preparing them for the job ahead.\n\nThe enemy tanks are fearsome. Not expecting resistance from unarmored infantry, they charge forwards, firing their main gun and secondary machine guns towards your positions.\n*line_break\nOne after another, the Crows fire their anti-tank missiles, striking the Sarian tanks directly in the turret ring, where the tanks are weakest. The tanks explode and burn, their turrets launch into the air as if weightless and crash back down moments later, shattering into pieces.\n\nThe surviving Sarian tankers leap out of the burning tanks only to be gunned down by the vengeful Scouts. The battle is finally over.\n*page_break\nYou scan the battlefield, the Scouts are in absolute disarray, you estimate at least half of them are dead or badly wounded.\n*page_break\n*goto thenexthour\n*label attackonradiotower\n*gosub_scene sub\n*finish\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n    *label purchased\n    *return\nRemember earlier how we told you that the first six chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n    *subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2020-04-22 $4.99 $2.99 purchased\n*abort\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n*set fullname \"Kim Xu\"\n*set rank \"Specialist\"\n*set nick \"Xu\"\n*set brigade \"1st Svern\"\n*set unit \" Crows\"\n*set male false\n*set loyal 70\n*set profession  \"Marksman\"\n*set intelligence 70\n*set strength 35\n*set leadership 40\n*set willpower 50\n*set speech 20\n*set discipline 90\n*set shooting 80\n*set handcombat 35\n*set navigation 30\n*set professionalism 10\n*set partner \"Mara\"\n*set mag 0\n*set medic 0\n*set marksman 75\n*set negev 0\n*set teamcom 0\n\"${nick} and ${partner}!\" Walker turns to the team \"This is your building.\" @{male he|she} points to a small, four story apartment building. \"Search it and report to me by radio. The rest of the team will search the others.\"\n*line_break\nYou enter the building. To your right and left are doors presumingly leading to apartments, in front of you is a staircase leading to the higher floors.\n\n\"How do you want to do this?\" ${partner} asks.\n*fake_choice\n    #Search apartments\n    #Search the roof\n\n*script changeBackgroundColor(\"black\")\n*set fullname \"James Reiner \"\n*set rank \"Specialist\"\n*set nick \"Jamie\"\n*set brigade \"28th Paratroopers\"\n*set unit \" Sappers\"\n*set male true\n*set loyal 30\n*set profession  \"Light Machine Gunner\"\n*set intelligence 80\n*set strength 70\n*set leadership 20\n*set willpower 70\n*set speech 40\n*set discipline 40\n*set shooting 50\n*set handcombat 40\n*set navigation 15\n*set professionalism 25\n*set mag 0\n*set medic 0\n*set marksman 0\n*set negev 75\n*set teamcom 0\n*script changeBackgroundColor(\"black\")\n\n[i]\"We don't have much longer before the enemy manages to bring support!\"[/i] You hear Maj. Faraz's voice through the earpiece [i]\"Pick up some speed. Let's get this over with!\"[/i]\n\n\n\"${nick}!\" @{male Abe|Mara} shouts at you, you can barely hear @{male him|her} over the crack of the guns and whistle of the bullets. \"Any bright ideas?\"\n*line_break\n\"Try to find their commander! According to Sarian military theory, the convoy commander should be in the middle of the first third of the convoy!\" you shout back.\n*line_break\n\"How the hell do you know that?\" @{male Abe|Mara} yells. \n*line_break\n\"I read it somewhere!\"\n*line_break\n\"There @{male he|she} is!\" Zac points at a tall figure inside one of the trucks. \"@{male He|She} isn't shooting, but @{male his|her} hand are moving- @{male he|she} must be giving orders!\" Zac pulls the trigger. \"Got @{male him|her}!\" (Success! Needed 75 intelligence) (Intelligence +3)\n\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n*set fullname \"Isabella Garcia\"\n*set rank \"Specialist\"\n*set nick \"Garcy\"\n*set brigade \"93rd Rivar\"\n*set unit \" Scouts\"\n*set male false\n*set loyal 90\n*set profession  \"Squad commander\"\n*set intelligence 40\n*set strength 65\n*set leadership 75\n*set willpower 60\n*set speech 70\n*set discipline 70\n*set shooting 50\n*set handcombat 15\n*set navigation 20\n*set professionalism 35\n*set mag 0\n*set medic 0\n*set marksman 0\n*set negev 0\n*set teamcom 60\n*script changeBackgroundColor(\"sepia\")\n\nUnder the cover of darkness, Miller, JiJi, Zac and you sneak towards the enemy position.\n\nUp close, the enemy position looks more impressive than from afar. The camp is surrounded by a two and a half meter tall concrete wall with a single guard tower in the south eastern corner. \n*line_break\nYou move around the wall, searching for the entrance to the complex.\n\n\"Found it.\" Zac whispers, pointing to a thin metal door.\n*line_break\n\"Open it.\" Miller whispers back.\n*line_break\nZac tries to unsuccessfully push the door. \"I can't open it. There's a latch on the door.\"\n*fake_choice\n    #Force the door open\n    #\"Let's climb over the wall\"\n\n*set fullname \"Deja Williams\"\n*set rank \"Private First Class\"\n*set nick \"Deja\"\n*set brigade \"84th Hulni\"\n*set unit \" Sappers\"\n*set male false\n*set loyal 60\n*set profession  \"Medic\"\n*set intelligence 80\n*set strength 50\n*set leadership 20\n*set willpower 70\n*set speech 35\n*set discipline 40\n*set shooting 60\n*set handcombat 20\n*set navigation 15\n*set professionalism 25\n*set mag 0\n*set medic 90\n*set marksman 0\n*set negev 0\n*set teamcom 0\nYou continue trying to force Sam to give you a moment by taking a few steps forwards and then a few back. On the third try this seems to work and @{male he|she} stops, eying you without moving. Satisfied, you begin to focus and quicken your breathing.\n\nYour breathing is abruptly stopped by a fist in your diaphragm. Gasping for breath Sam hits you again. You fall backwards on the human wall of instructors. Sam grabs you by the nape, pulling you into a clinch. \n*line_break\n@{male He|She} pulls you in a circle, causing you to fall to the ground. Sam brings @{male his|her} foot down on your chest. Hard. Already out of breath you have no choice but to tap the ground twice, signaling surrender.\n\nSam offers @{male his|her} hand to help you get up.\n*fake_choice\n    #Take @{male his|her} hand\n    #Refuse\n\n*set fullname \"Ava Novik\"\n*set rank \"Specialist\"\n*set nick \"Ava\"\n*set brigade \"84th Hulni\"\n*set unit \" Sappers\"\n*set male false\n*set loyal 60\n*set profession  \"Marksman\"\n*set intelligence 40\n*set strength 55\n*set leadership 35\n*set willpower 40\n*set speech 40\n*set discipline 50\n*set shooting 80\n*set handcombat 15\n*set navigation 40\n*set professionalism 50\n*set mag 0\n*set medic 0\n*set marksman 80\n*set negev 0\n*set teamcom 0\nYou check the safety on your FN MAG, keeping your thumb on the button.\n\nYou hear Miller's confident voice in your earpiece. [i]\"Be aware an enemy squad has exited a tunnel less than 100 meters north of our position. Fire at will.\"[/i]\n\nYou scan the valley using your thermal vision. \"I see four targets, 90 meters ahead and closing in!\" you report.\n\n*fake_choice\n        #Wait for them to close in.\n        #Fire!\n\n*set fullname \"Mia Brown\"\n*set rank \"Specialist\"\n*set nick \"Mia\"\n*set brigade \"28th Paratrooper\"\n*set unit \" Crows\"\n*set male false\n*set loyal 60\n*set profession  \"Medic\"\n*set intelligence 90\n*set strength 30\n*set leadership 35\n*set willpower 40\n*set speech 40\n*set discipline 40\n*set shooting 30\n*set handcombat 70\n*set navigation 70\n*set professionalism 40\n*set mag 0\n*set medic 60\n*set marksman 0\n*set negev 0\n*set teamcom 0\nThe Sarian radio tower is less than a kilometer away from the border but the rain and mist make it impossible to make it out until you are only 200 meters away.\n\nMiller calls Walker by radio and together with the Point Marksman and Point LMG they lie near a large boulder, surveying the enemy position. As me`dic, you also act as Walkers runner so you join @{male him|her} and the rest of the group.\n\n\n\"Noter, what do you see?\" Miller asks.\n*line_break\n\"I can see their sentry, It doesn't look like @{male he's|she's} expecting us.\"  Noter chuckles \"I think @{male he's|she's} on @{male his|her} phone.\"\n*line_break\n\"Ha!\" Miller smiles \"I think I see it too, you can see the light on @{male his|her} face from the screen!\"\n*line_break\n\"That should make this much easier.\" Walker remarks. \"I don't see any other movement, I think everyone else in there is asleep.\"\n*page_break\n", "startup": "*title The War of 2022\n*author YHGS\n*scene_list\n  startup\n  gettinin\n  commander\n  begintraining\n  endtraining\n  paradeattack\n  $ finalbattle\n  $ ending\n\n*create firstname \"? \"\n*create name \" ?\"\n*create fullname \" \"\n*create rank \"Specialist\"\n*create nick \"nick\"\n*create brigade \"?\"\n*create unit \" ?\"\n*create male true\n*create loyal 50\n*create cynic 50\n*create profession  \" \"\n*create intelligence 40\n*create strength 40\n*create leadership 40\n*create willpower 40\n*create speech 40\n*create discipline 40\n*create shooting 0\n*create handcombat 0\n*create navigation 0\n*create professionalism 0\n\n*create sugercoated false\n*create palhan 0\n*create palsar 0\n*create orev 0\n*create tempnick false\n*create richards 1\n\n*create mag 0\n*create medic 0\n*create marksman 0\n*create negev 0\n*create teamcom 0\n\n*create sgtrel 50\n*create pcrel 50\n*create screl 50\n*create samrel 50\n*create aberel 50\n*create zacrel 50\n\n*create metzac 0\n*create metabe 0\n*create metsam 0 \n*create luf 0\n*create animal 0\n\n*create medalofsacrifce false\n*create medalofbravery false\n*create medalofhonor false\n*create filohonor false\n*create sarianhonor false\n*create medicribbon false\n*create goldmedicribbon false\n*create medalfriendship false\n*create medalofsacrifice false\n*create navigatorribbon false\n*create medalhandcombat false\n*create combatcertified false\n*create sapperribbon false\n*create scoutribbon false\n*create crowribbon false\n*create medalofvalour false\n\n*create quarter \" \"\n*create zaclive 0\n*create chanceofattack 6\n*create wokeup 0\n*create partner \" \"\n*create apartment7 0\n*create checkpost 0\n*create foundsniper 0\n*create scoped 0\n*create scoutedbuilding 0\n*create wentback 0\n*create fakepoliceman 0\n*create trashcanbomb 0\n*create janitor 0\n*create sewer 0\n*create checkpostbomb 0\n*create grenaderoof 0\n*create mortar 0\n*create fakeborderpolice 0\n*create bombincourt 0\n*create supremecourtgone 0\n*create jimjimalive true\n*create alexisdead 0\n*create zacalive true\n*create zaccapture false\n*create samcapture false\n*create samalive true\n*create abealive true\n*create georgegotaway 0\n*create smoke 0\n*create boulders 0\n*create talk 0\n*create vantage 0\n*create ambush 0\n*create enemies 100\n*create deadambush 0\n*create prisoner false\n*create woundedsam false\n*create teamdead 1\n*comment 1=team 10 is fine|2=2 soldiers left alive|3=dey all ded\n*comment ambush 1=won battle|2= lost, our fault| 3=won, scouts badly mauled\n*create ending 0\n*achie
