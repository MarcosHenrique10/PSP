, after a while, the climb becomes steeper and you feel yourself losing the will to continue.\n        \n        Unfortunately, your strength doesn't hold up, and by the time you finish the climb you are exhausted. Soon, all you can think about is how tired you are. How much you need to sit down, even if it's for just a moment. You try to fight the compulsion to stop and rest, but it's pointless.\n        *line_break\n        Your thoughts overpower you and you sit down and close your eyes. (Willpower -3) (Needed 40 Strength)\n        *set willpower -3\n        *page_break\n        \"Hey! $!{nick}! Wake up!\" Surprised, you open your eyes. \n        \n        Luckily, it's @{male Abe|Mara} and not one of the commanders.\n        \n        \"Hard climb?\" @{male he|she} grins \"Let's get going, I think if we speed up we might even make it on time.\"\n        \n        You both increase your pace until you are almost running and you manage to make it to the endpoint in time.\n        *goto nav2\n*else\n    Unfortunately, your navigation skills are wanting and no matter how much you try, you cannot seem to find the correct place you planned to ascend the mountain from. After searching for what seems like an eternity you decide to simply climb the mountain and wing it.\n    \n    \n    At first, the ascent is difficult, but after a while, it becomes almost impossible. At around halfway up you feel yourself losing the will to continue.\n    *line_break\n    Soon, all you can think about is how tired you are. How much you need to sit down and rest for just a moment. What's the harm in stopping and resting for just a moment? (Willpower -5) (Needed 15 Navigation)\n    *set willpower -5\n    *page_break\n    \"Hey! $!{nick}! Wake up!\" Surprised, you open your eyes.\n    \n    Luckily for you, it's @{male Abe|Mara} and not one of the commanders. \"Hard climb?\" @{male he|she} grins. \"Let's get going, I think if we might even make it on time.\"\n    \n    You both increase your pace until you are almost running but it is not enough and you end up not reaching the endpoint in time.\n    *goto nav2\n*label zacascent\n\nAfter reaching the other side of the valley with Zac you search for the point you planned on ascending from.\n*if (navigation >= 20)\n    Using your navigation skills, you easily find the correct point and begin to ascend. (Navigation +3) (Needed 20 Navigation)\n    *set navigation +3\n    *if (strength > 39 )\n        At first, you find the ascent easy. You smile, congratulating yourself for choosing a good spot to ascend from. However, after a while, the climb becomes steeper and you feel yourself losing the will to continue.\n        \n        Thankfully, your strength holds up and you manage to complete the climb without incident, reaching the endpoint in time. (Strength +3) (Needed 40 Strength)\n        *set strength +3\n        *goto nav2\n    *else\n        At first, the ascent is easy, you read the map correctly and you chose a good spot. However, after a while, the climb becomes steeper and you feel yourself losing the will to continue.\n        \n        Unfortunately, your strength doesn't hold up. By the time you finish the climb, you are very tired. Soon, all you can think about is how exhausted you are. How much you need to sit down and rest for just a moment. How much harm can there be if you stop and rest for just a second?.\n        \n        \"Hey $!{nick}\" Zac begs \"Let's rest for a minute.\"\n        \n        It doesn't take Zac much to convince you to stop, sit down and close your eyes.\n        (Willpower -3) (Needed 40 Strength)\n        *set willpower -3\n        *page_break\n        \"Hey! $!{nick}! Wake up!\" Surprised, you jump. \n        \n        Luckily for you, it's @{male Abe|Mara} and not one of the commanders. \"Hard climb?\" @{male He|She} grins \"Let us get going, I think if we hurry might even make it on time.\"\n        \n        The three of you increase your pace until you are almost running. Taking care to not all arrive together, you manage to arrive at the endpoint on time.\n        *goto nav2\n*else\n    Unfortunately, your navigation skills are wanting and no matter how much you try, you cannot seem to find the correct place you planned to ascend the mountain from. After searching for what seems like an eternity you decide to simply climb the mountain and wing it.\n    \n    At first, the ascent is difficult, but after a while, it becomes almost impossible. At around halfway up you feel yourself losing the will to continue.\n    *line_break\n    Soon, all you can think about is how tired you are. How much you need to sit down and rest for just a moment. What's the harm in stopping and resting for just a second?\n    *line_break\n    \"Hey $!{nick}\" Zac begs \"Let's rest for a minute.\"\n    \n    It doesn't take Zac much to convince you to stop, sit down and close your eyes. (Willpower -5) (Needed 20 Navigation)\n    *set willpower -5\n    *page_break\n    \"Hey! $!{nick}! Wake up!\" Surprised, you jump.\n    \n    Luckily for you, it's @{male Abe|Mara} and not one of the commanders. \"Hard climb?\" @{male He|She} grins \"Let us get going, I think if we might even make it on time.\"\n    \n    You all increase your pace until you are almost running. Unfortunately, it is not enough and you end up not reaching the endpoint in time.\n\n*label nav2\n*page_break\nThe following weeks go by in much the same fashion. Small dilemmas and small victories. \n\n*if (navigation >= 20)\n    Due to your excellent navigation skills, you always make good time. (Success! Needed 20 navigation)\n    \n    Being a good navigator allows you to enjoy the small joys that come with walks in nature. You find that you enjoy the solitude of nature. Walking silently through a valley or the first breath of fresh air at the top of a particularly tall hill seem to energize you in a way nothing else can.\n    *goto walk\n*elseif (navigation > 14)\n   Due to your navigation skills, you almost always make good time. (Needed 20 navigation for better result)\n   \n   Being a good navigator allows you to enjoy the small joys that come with walks in nature. You find that you enjoy the solitude of nature. Walking silently through a valley or the first breath of fresh air at the top of a particularly tall hill seem to energize you in a way nothing else can.\n   *goto walk\n*else\n    You continue to have difficulties navigating. You frequently forget your route and even if you remember it- you can rarely put it into action.\n    \n    Soon, Miller begins to notice you are lagging behind and tells @{male Abe|Mara} to help you out.\n    *if (aberel > 51)\n        @{male Abe|Mara} happily sits with you while you plan your route and helps you whenever you have trouble with something. (Needed @{male Abe|Mara} 50)\n        \n        *if (willpower >=45)\n            Slowly but surely, @{male Abe|Mara}'s lessons sink in and your navigation skills catch up with the rest of the Platoon. (Navigation +15) (Needed Willpower 45)\n            *set navigation +15\n            *goto walk\n        *elseif (discipline >=50)\n            Slowly but surely, @{male Abe|Mara}'s lessons sink in and your navigation skills catch up with the rest of the Platoon. (Navigation +15) (Needed Discipline 50)\n            *set navigation +15\n            *goto walk\n        *else\n            However, your lack of will and discipline soon make themselves evident. @{male Abe|Mara} is able to pass on only very basic information. (Navigation +10) (Needed Willpower 45 or Discipline 50)\n            *set navigation +10\n            *goto walk\n    *else\n        After much convincing from Miller, @{male Abe|Mara} dejectedly sits with you while you plan your route. Helping you only when you ask. (Needed @{male Abe|Mara} 50)\n        \n        *if (willpower >=50)\n            Even though @{male Abe|Mara} doesn't make an exceptional effort to help you, you make notes of @{male his|her} lessons, reviewing them in your free time. Slowly but surely they sink in and your navigation skills catch up to those of the rest of the Platoon. (Navigation +15) (Needed Willpower 50)\n            *set navigation +15\n            *goto walk\n        *elseif (discipline >=51)\n           Even though @{male Abe|Mara} doesn't make an exceptional effort to help you, you make notes of @{male his|her} lessons, reviewing them in your free time. Slowly but surely they sink in and your navigation skills catch up to those of the rest of the Platoon. (Navigation +15) (Needed Discipline 51)\n           *set navigation +15\n           *goto walk\n        *else\n            @{male Abe|Mara}'s lack of drive to help you, coupled with your lack of will to learn, leave you not very far from where you started. (Navigation +5) (Needed Willpower 50 or Discipline 51)\n            *set navigation +5\n            *goto walk\n*label walk\n*page_break\nBy the third week of navigation training, Babir company is ready to graduate from the Sassik desert to the Greven Highlands.\n\nThe highlands, characterized by steep, rocky hills and towering mountains are an even tougher challenge for an aspiring navigator. In the highlands, climbing a hill means a constant battle with the local flora. Often, climbing one requires you to literally cut a path through a particularly bushy area or physically tear a thorny vine that somehow caught a piece of your uniform.\n\nThe only upside of this new terrain is the fact that it's populated. All across the region are small towns and villages. The lights from these populated locations can serve as anchors, giving an extra, easily identifiable layer to the terrain.\n*page_break\nYou raise your eyes from your watch. It's 0310, Tuesday and you are lost.\n*fake_choice\n    #Take a look around\n        You take a look around you, searching for clues as to your location. You are at the top of a relatively tall hill, which should make orienting yourself relatively easy. \n        \n        You look downwards, towards the bottom of the hill. In the moonlight, you can make out the tops of the thousands of trees and bushes below you. Further away, blinking white lights from the towns connect to one another by yellow glowing roads.\n        \n        \n\n    #Sit down\n        You take a moment to sit down and rest. Thankfully, the location you are currently navigating through is a semi-popular hiking destination and has park benches scattered around.\n        \n        You sit at one of the benches and remove a candy bar from your combat vest. While organizing your equipment last night you discovered the perfect spot in your magazine pouch to hide a midnight snack for a quick energy boost.\n        \n        As the sugar from the candy bar begins to spread throughout your body you can't help but be taken in by the view.\n        *line_break\n        In the moonlight, you can make out the tops of the thousands of trees and bushes below you. Further away, blinking white lights from towns connect to one another by yellow glowing roads.\n        \n        \n*page_break\nOne of the first rules of navigation is that one shouldn't trust paths. They can and do frequently change and it's hard to notice exactly where you should leave them, but this one is too good to ignore.\n\nThe path is a well-worn footpath that should take you from your current location the entire way to the first mandatory waypoint. MWs were added from the second week of navigation training. Now, in addition to walking from the start point to the endpoint, every soldier must pass through two more MW.\n\n*if (navigation >=30)\n    You relished in the extra challenge, easily going through both MWs every time you set out on a navigation session. Every successful navigation not only made you better at navigating but also increased your will to go on another. (Navigation +5, Professionalism +5, Willpower +5) (Needed Navigation 30)\n    *set navigation +5\n    *set professionalism +5\n    *set willpower +5\n    *goto go\n*elseif (navigation >=25)\n    While hard, you rose to the challenge. Always managing to go to at least half of the MWs (the minimum required for the navigation to be considered a successful one). (Navigation +5) (Needed 25 Navigation)\n    *set navigation +5\n    *goto go\n*else\n    The new challenge, coupled with your lacking navigation skills to begin with, was too much for you. You rarely completed the navigations on time even before the added MWs. You notice that the more navigations you go on, the less willpower to complete them you have. (Navigation +5, Willpower -5) (Needed 30 navigation)\n    *set navigation +5\n    *set willpower -5\n    *goto go\n*label go\n*gosub_scene sub\n*page_break\nYou begin walking on the footpath, \n*if (navigation >= 25)\n    enjoying a sudden cool breeze\n    *goto walk1\n*else\n    freezing in the cold night air\n    *goto walk1\n*label walk1\nwhen you feel a light tap on your shoulder.\n\nStartled,\n*choice\n    #Raise your weapon and turn your torso, hitting whatever tapped you\n        *set handcombat +5\n        *gosub_scene sub\n        *goto hit\n    #In one quick motion, you cock and raise your weapon towards the perceived threat\n        *set shooting +5\n        *gosub_scene sub\n        *goto shoot\n    #You quickly turn but do not act aggressively\n        *goto none\n*label hit\nJust as your weapon is about to connect with the figure behind you, @{male he|she} takes a step back and moves out of your reach. (Hand to hand combat +5)\n\n\"What the hell?!\" You hear Sam's voice \"You could have knocked me out!\"\n*choice\n    #\"Sorry, you startled me.\"\n        \"You're right, I should have said something\" (Sam +3)\n        *set aberel +3\n        *gosub_scene sub\n        *goto meetsam\n    #\"Well, don't touch me like that next time!\"\n         \"You're right, I'm sorry, I should have said something\" (Sam +3)\n        *set aberel +3\n        *gosub_scene sub\n        *goto meetsam\n*label shoot\n\nYour turn, your cocked weapon touching the figure's chest. (Shooting +5)\n\n\"What the hell?!\" You hear Sam's voice \"It's just me!\"\n*choice\n    #\"Sorry, you startled me.\"\n        \"You're right, I should have said something\" (Sam +3)\n        *set aberel +3\n        *gosub_scene sub\n        *goto meetsam\n    #\"Well, don't touch me like that next time!\"\n         \"You're right, I'm sorry, I should have said something\" (Sam +3)\n        *set aberel +3\n        *gosub_scene sub\n        *goto meetsam\n*label none\n\n\"Sup?\" You hear Sam's voice \"How is the navigation going?\n*choice\n    #\"Not bad, yours?\"\n        \"Same, nothing special\"\n        *goto meetsam\n    #\"Nothing to write home about, I'm not good at this at all.\"\n        *goto meetsam\n*label meetsam\nAfter a moment Sam continues, \"Want to go the rest of the way with me? \n*if (navigation \u003c=25)\n    I know you aren't the best navigator, maybe I could help?\"\n    *goto yesno\n*else\n    I'd like someone to pass the time with.\"\n    *goto yesno\n*label yesno\n*choice\n    #\"I'd rather not risk getting caught, maybe some other time.\"\n        *set samrel -5\n        *gosub_scene sub\n        \"Suit yourself.\" (Sam -5)\n        \n        \n        *goto goalone\n    #\"Sure, I'd love your company.\"\n        *set samrel +5\n        *gosub_scene sub\n        \"Great! I always get bored walking alone, it'll be nice to have someone to talk to.\" (Sam +5)\n        \n        \n        *goto gotogether\n*label goalone\n\nYou walk on the path in silence with Sam a few steps behind.\n*choice\n    #Ask @{male him|her} why @{male he|she} is following you.\n        \"Why are you following me?\" You ask \"I told you I don't want to get caught!\"\n        \n        \"You aren't the only one who planned to use this path. You know, you might want to make some friends sometimes. Rules can be bent, friends will stick by your side.\"(Sam -5)\n        *set samrel -5\n        *gosub_scene sub\n        \n        Sam speeds up and passes you, \"accidentally\" hitting you with @{male his|her} shoulder on the way past.\n        *goto finishnav\n    #Continue walking normally\n        You continue to walk at your regular speed. When you reach the MW, Sam goes east while you continue north towards your next MW.\n        *goto finishnav\n    #Walk next to Sam and ask for forgiveness\n        You slow down, matching your speed with Sam's.\n        \n        \"Hey, Sam?\"\n        \n        \"What do you want?\" @{male He|She} grumbles, @{male his|her} gaze not leaving the path ahead.\n        \n        \"I'm sorry for before. If your offer still stands I'd like to walk with you.\"\n        \n        Sam turns to face you.\n        \n        \"Rules can be bent, friends will stick by your side. Don't forget that.\" (Sam +2)\n        *set samrel +2\n        *gosub_scene sub\n        *goto gotogether\n*label gotogether\n\n\nYou and Sam continue down the path together, exchanging jokes and reminiscing about funny stories from basic training.\n\n\"Remember when @{male Abe|Mara} told Zac @{male he|she} would never be able to be a combat soldier?\" Sam asks, laughing.\n*line_break\n\"And Zac got so angry, @{male he|she} threw a broomstick at @{male his|her} head!\" You continue, giggling.\n*line_break\n\"@{male Abe|Mara}'s face was priceless!\"\n\nSam stops talking for a moment, @{male he|she} appears deep in thought.\n\n\"Basic training was really weird, wasn't it?\" Sam remarks \"It's crazy how one day you are a regular civilian, and the next, you have to crawl the entire shooting range because you dropped your magazine. We live in a strange country.\" Sam concludes.\n*choice\n    #\"It's for a good cause though.\"\n        \"I agree, it's a necessary sacrifice. We couldn't protect our families and our Republic otherwise.\" (Loyal +5)\n        *set loyal +5\n        *gosub_scene sub\n        *goto goodbye\n    #\"Absolutely, makes you think.\"\n        \"About what?\" Sam asks.\n        *line_break\n        \"Don't you ever think that maybe expecting EVERYONE to enlist is a bit much?\" You ask. ([i]Luf[/i] +5)\n        *set loyal -5\n        *gosub_scene sub\n        \n        \"Of course it would be better if we didn't need to fight, but it's just not possible with neighbors like ours.\"\n        \n        *if (navigation \u003c=25)\n            After a moment of awkward silence, Sam speaks again.\n            \n            \"Anyway, you wanted help navigating?\"\n            *line_break\n            \"Yes!\" You blurt out \"I need help.\"\n            *line_break\n            \"Sit down.\"\n            \n            For the next hour, Sam goes over your route with you, helping you work out the various kinks in your plan. (Sam +3) Navigation +5)\n            *set samrel +3\n            *set navigation +5\n            *gosub_scene sub\n            *goto goodbye\n        *else\n            After a moment of awkward silence, Sam speaks again.\n            \n            \"Anyway, I had a great time talking to you. This where I need to leave you. My MW is west of here. See you at the end! (Sam +3)\n            *set samrel +3\n            *gosub_scene sub\n            *goto finishnav\n*label goodbye\n*page_break\n\"Well, this is where I need to say goodbye.\" Sam remarks \"My MW is west of here. Good luck!\"\n*goto finishnav\n*label finishnav\n*page_break\nYou continue walking on the footpath until you notice a small campfire to the left of the path.\n*choice\n    #Check it out\n        You turn left and brush aside a few tree branches blocking your view of the campfire.\n        \n        You see three figures around the fire, they appear to be talking to one another in hushed tones. They don't seem to have noticed you.\n        *choice\n            #Show yourself\n                *goto show\n            #Sneak closer and try to hear what they are saying\n                You slowly sneak closer to the campfire, making sure to stay in the shadows.\n                \n                \"The new generation will never turn on the Citizen Republic, they have poisoned their minds with fear.\" A male voice declares.\n                *line_break\n                \"It's not hopeless. I refuse to believe that!\" A female voice answers \"War is inherently unsustainable, it cannot go on forever.\"\n                *line_break\n                \"Unsustainable? That's hippie bullshit. This country has been at war for the better part of the century.\" The male voice replies.\n                \n                As you inch closer to hear the conversation better, your backpack gets caught on a branch, causing dead leaves to fall on the ground.\n                \n                \"What was that?\" A third female voice asks fearfully \"Is someone there?\"\n                *line_break\n                \"Shush!\" The second female voice answers \"It can't be anything good. Let's move.\"\n                \n                The figures quickly stand up and run opposite from where you are crouching.\n                *choice\n                    #Search the campfire\n                        You tentatively walk towards the campfire. However, searching around it for clues yields nothing.\n                        \n                        With nothing else to do near the fire, you get up and return to the trail.\n                        *goto walk3\n                    #Go back to the trail\n                        Searching the campfire is redundant. You get up and return to the trail.\n                        *goto walk3\n    #Ignore it\n        You choose to ignore the campfire and continue on the trail. (Navigation +3)\n        *set navigation +3\n        *gosub_scene sub\n        *goto walk3\n*label agreedisagree\n\"Interesting.\" The woman on the left says \"But don't you think they would be safer with a peace treaty?\"\n*line_break\n\"In theory.\" You respond \"But none of our enemies have shown the will to reach some sort of real peace treaty with us.\"\n*line_break\n\"Maybe because we haven't tried enough.\"\n*choice\n    #Agree\n        \"Maybe. I haven't thought enough about the subject.\" You confess. ([i]Luf[/i] +5)\n        *set loyal -5\n        *gosub_scene sub\n        *line_break\n        \"Think of it this way, peace has no price. This war has already cost us our democracy. Before you know it- it will cost you your life as well.\" The man replies.\n        *line_break\n        \"Think about it. Keep an open mind.\" The woman on the left finishes. \"We should be going. Good luck soldier, whoever you are.\"\n        \n        The group douses the campfire with water, stands up and leaves.\n        \n        You stand up, mulling over the strange conversation, and return to the path.\n        *goto walk3\n    #Disagree\n        \"I've heard about what our enemies have done to us, the countless dead before the Citizen Act.\" You reply. (Loyal +5)\n        *set loyal +5\n        *gosub_scene sub\n        *line_break\n        The man turns to the woman on the right. \"I told you, the younger generation is lost. It's hopeless.\"\n        *line_break\n        \"Maybe you're right.\" She says \"But we still cannot give up. We have to do our part!\"\n        *line_break\n        The woman on the left turns towards you, \"We should be going. Good luck soldier, whoever you are.\"\n        \n        The group douses the campfire with water, stands up and leaves.\n        \n        You stand up, mulling over the strange conversation, and return to the path.\n        *goto walk3\n*label show\n\"Hello,\" you wave \"I'm from the RDF, is everything okay?\"\n\nThe figures, who you now recognize as two women and a man, fall silent immediately.\n*line_break\n\"We're fine, thank you.\" One of the women replies. \"Just camping.\"\n*choice\n    #Walk towards the fire\n        \"Is it okay with you if I warm up at your fire for a minute then?\" you ask.\n        *line_break\n        \"Of course\" the woman on the left replies \"We always have a place for our brave soldiers.\"\n        \n        After a moment of silence, the woman on the right turns to you.\n        \n        \"Why did you join the RDF?\" She asks.\n        *fake_choice\n            *selectable_if (loyal >= 70) #To serve my country by eliminating its enemies (Needs 70 Loyal) \n                \"Of course, we must be loyal citizens and serve the republic any way we can.\" The man says.\n                *line_break\n                \"We are very lucky to have such brave soldiers serving in the RDF.\" Adds the woman sitting on the left.\n                \n                The campers fall silent, feeling uncomfortable, you continue on your way.\n                *goto walk3\n            *selectable_if ((loyal >= 60) and (loyal \u003c= 69)) #To serve my Republic (Needs 60-70 Loyal)\n                \"Of course, we must be loyal citizens and serve the republic any way we can.\" The man says.\n                \n                \"We are very lucky to have such brave soldiers serving in the RDF.\" Adds the woman sitting on the left.\n                \n                The campers fall silent, feeling uncomfortable, you continue on your way.\n                *goto walk3\n            *selectable_if ((loyal >= 50) and (loyal \u003c= 59)) #It's the right thing to do (Needs 50-59 Loyal)\n                \"Why?\" The man asks.\n                *choice\n                    #To protect civilians\n                        *goto agreedisagree\n                    #To protect my family\n                        *goto agreedisagree\n                    #To protect my friends\n                        *goto agreedisagree\n            *selectable_if ((loyal >= 40) and (loyal \u003c= 49)) #I just wanted my a full citizenship. (Needs 51-60 [i]Luf[/i])\n                \"Fair enough.\" The man remarks \"But for what end? Do you want to see an end to the Citizen Republic?\"\n                *choice\n                    #Of course\n                        \"Of course.\" You respond \"The only way to restore democracy is in a democratic fashion\" ([i]Luf[/i] +5)\n                        *set loyal -5\n                        *gosub_scene sub\n                        *line_break\n                        \"That's where you're wrong.\" The woman on the left remarks \"The government is cheating, we should too.\"\n                        *line_break\n                        \"Shush!\" The woman on the left snaps \"Don't involve @{male him|her}.\"\n                        *line_break\n                        \"I'm sorry. You're right.\" The woman on the left falters \"I just want you to know that if you ever choose to stop supporting the Republic- you won't be alone.\"\n                        \n                        You mull her words some more before getting up and continuing your navigation.\n                        *goto walk3\n                    #No, I just wanted to be a citizen\n                        \"I told you.\" The man tells the woman on the left \"It's hopeless.\"\n                        *line_break\n                        The woman sighs \"Soldier, don't you see how the so-called \"Citizens Republic\" has perverted democracy? It has turned all of us into cogs in a war machine.\"\n                        \n                        Before you can respond, the woman on the left turns towards you. \"We should be going. Good luck soldier, whoever you are.\"\n                        \n                        The group douses the campfire with water, stands up and leaves.\n                        \n                        You stand up, mulling the strange conversation, and return to the path.\n                        *goto walk3\n            *selectable_if ((loyal >= 30) and (loyal \u003c= 36)) #I'm not sure anymore. (Needs 70-65 [i]Luf[/i])\n                \"What do you mean?\" The man inquires tentatively.\n                *line_break\n                \"I'm not sure if I support the Republic like I used to.\"\n                *line_break\n                The man smiles. \"We all had our break with the Republic and its lies at some point. It's only natural.\"\n                *line_break\n                The woman on the left turns towards you \"Hold on to that doubt, let it blossom and grow into a tree of rebellion. If you can do that, one day, we will restore our democracy.\"\n                \n                You mull her words some more before getting up and continuing your navigation.\n                *goto walk3\n            *selectable_if (loyal \u003c= 35) #It was a mistake. (Needs more than 65 [i]Luf[/i])\n                \"A mistake?\" The man inquires tentatively \"What do you mean?\"\n                *line_break\n                \"I do not support the Citizen Republic anymore, democracy must be restored and peace achieved.\"\n                *line_break\n                \"I'm with you there.\" He turns to the woman on the left \"Maybe we do still have hope for a better future.\"\n                *line_break\n                The woman turns towards you \"I hope that when war comes, people like you will be the ones who rebuild our nation\"\n                \n                You mull her words some more before getting up and continuing your navigation.\n                *goto walk3\n          #Bid the campers farewell and return to the path\n              \"Enjoy, have a good night!\" you call.\n              \n              *goto walk3\n    #Return to the path\n        \"Enjoy, have a good night!\" you call.\n        *goto walk3\n*label walk3\n*page_break\nThe rest of the walk towards the MW and end is boring and uneventful. The moon and stars remain your only companions. (Navigation +5)\n*set navigation +5\n*set willpower +5\n*gosub_scene sub\n*page_break\nThe rest of the navigation training goes by without any more strange or mysterious events. In fact, they become a routine.\n*set navigation +20\n*gosub_scene sub\n\n*if (navigation >= 55)\n    You easily breeze through the rest of the navigation training, becoming one of the best navigators in Babir company. Earning yourself the Navigator ribbon, a green, black and sand-colored ribbon signifying the green highlands, sandy desert and black night sky- all of which you successfully conquered. (Navigation +15, Professionalism +5) (Success! Needed 55 navigation)\n    *line_break\n    *image Navigatorribbon.jpg\n    *achieve bestnavigator\n    *set navigatorribbon true\n    *set navigation +15\n    *set professionalism +5\n    *gosub_scene sub\n    *goto train\n*elseif (navigation >= 45)\n    You make your way through the rest of navigation training without too much of a hassle. You can rest easy knowing there are better navigators than you (@{male Abe|Mara}) and worse (Zac). (Navigation +10) (Needed 55 navigation)\n    *set navigation +10\n    *gosub_scene sub\n    *goto train\n*else\n    You clumsily make your way through the rest of navigation training. You follow your platoonmates whenever possible in order not to get lost. The only downside is that you have to be careful to avoid Officers and Sergeants on the lookout for soldiers who do not navigate on their own.\n    *line_break\n    At least you can console yourself in the knowledge that Zac isn't much better off. (Navigation +5) (Needed 55 navigation)\n    *goto train\n*label train\n*finish", "choicescript_description": "Join the special forces and fight in dynamic battles directly influenced by your previous choices in this modern military war novel!\n\nGo through training and serve in the most prestigious unit of the Regovian army! Will you remain loyal to your country?\n\n[i]War of 2022[/i] is a 116,000-word interactive, military novel by YHGS, a military veteran. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\n• Play as Male or Female\n• Serve in one of the three units which make up the Wardens- The Scouts, Sappers or Crows.\n• Fight as a Fireteam leader, Medic, Marksman, Light Machine Gunner or Heavy Machine Gunner.\n• Fight in dynamic battles directly influenced by your previous choices.\n• Devote yourself to the Republic or turn your back on its lies.\n\n[b]Content Warning:[/b] The War of 2022 contains depictions of violence, terrorism, bombings, killing of unarmed civilians, racial profiling and xenophobia as well as descriptions of child abuse. \nIn the War of 2022, it is impossible to always act in a morally pure way. If the reader would prefer not to read about such topics, it is advisable that you not continue. \n", "choicescript_stats": "*temp stat_page 0\n*temp glossary 0\n*temp enemies 0\n\n*label main_stat_page\n*gosub_scene sub\n[i][b]Basic Information[/b][/i]\n*stat_chart\n text fullname Name\n text rank Rank\n text brigade Brigade\n text unit Unit\n text profession Profession\n\n[i][b]Ideology[/b][/i]\n*stat_chart\n opposed_pair Loyal \n  [i]Luf[/i]\n\n[i][b]Character Skills[/b][/i]\n*stat_chart\n percent Strength Strength \n percent Intelligence Intelligence \n percent leadership Leadership \n percent willpower Willpower \n percent speech Persuasion \n percent discipline Discipline\n percent Shooting Shooting\n percent handcombat Hand to hand combat\n percent navigation Navigation\n percent professionalism Professionalism\n\n[i][b]Military Profession:[/b][/i]\n*stat_chart\n percent mag Heavy Machine Gunner\n percent medic Medic\n percent marksman Marksman\n percent negev Light Machine Gunner\n percent teamcom Fireteam Leader\n\n*goto navigation_menu\n\n*label relationship_stat_page\n[i][b]Relationships:[/b][/i]\n*stat_chart\n percent sgtrel Platoon Sergeant Walker\n percent pcrel Platoon Commander Miller\n percent samrel Sam\n percent aberel @{male Abe|Mara}\n percent zacrel Zac\n*if richards =1\n    *stat_chart\n        percent screl Sgt. Richards\n*goto navigation_menu\n\n\n\n\n\n*label glossary_menu\n\n*label glossary_stat_page\n*choice\n     *if (glossary != 0) #Return to the main stat page.\n        *set glossary 0\n        *goto main_stat_page\n    *if (glossary != 1) #History\n        *set glossary 1\n        *goto history\n    *if (glossary != 1) #Geography\n        *set glossary 1\n        *goto geography\n    *if (glossary != 3) #Enemies\n        *set glossary 3\n        *goto enemies\n    *if (glossary != 4) #Go to Glossary\n        *set glossary 4\n        *goto glossary_stat_page\n    #Return to the game.\n        *finish\n\n*label navigation_menu\n*choice\n     *if (stat_page != 0) #Return to the main stat page.\n        *set stat_page 0\n        *goto main_stat_page\n    *if (stat_page != 2) #View relationship status.\n        *set stat_page 2\n        *goto relationship_stat_page\n    *if (stat_page != 3) #View Glossary\n        *set stat_page 3\n        *goto glossary_stat_page\n    *if (stat_page != 3) #Map\n        *set stat_page 4\n        *goto map\n    *if (stat_page != 3) #Medals and Ribbons\n        *set stat_page 5\n        *goto ribbons\n    #Return to the game.\n        *finish     \n\n\n*label geography\nRegovia is a small nation, bordering the Medhyo sea on the east, the Kingdom of Saria on the north, the Free Peoples Republic of Wev on the south and west. Additionally, the so called \"State of Filo\" claims area ranging from the western border eastward, almost reaching the Medhyo.\n\nRegovia is poor in natural resources but rich in human capital, a modern, democratic, eastern country in a sea of poor, autocratic underdeveloped states.\n\nThe north of Regovia is made out of the Greven highlands in the north-west and Lovar providence in the north-east.\n\nTo the east lies the Medhyo sea with the two islands of Senfir and Lotab controlling the main shipping lanes into the port city of Lovary.\n\nTo the south lies the port city of New Hill and the Sassik desert.\n\nTo the west is the contested providence of western Regovia. The providence is majority Filo but includes a large minority of Regovians. Further to the west of the providence is northern Wev.\n\n\n*goto glossary_menu\n\n*label history\nThe history of Regovia is a long one. It begins with many city states and tribes consolidating into the First Regovian Kingdom around 1300 BCE, the kingdom fell and rose periodically but the Regovian people remained as a mostly subservient people, living in vassal states of larger, more powerful empires.\n\n\nThe strongest and most stable of these empires was the Uth Empire.\n*line_break\nThe Uth empire, lead by King Vasu conquered what is today Regovia from its previous masters, the Kingdom of Wev. The Uth Empire was one of the largest the world has seen, and it governed fairly for 250 years.\n*line_break\nAfter 250 years the Empire began a long decline, culminating in its defeat in the War of Coalitions in 1934. After the Uth Empire unconditionally surrendered to the Eastern Coalition the eastern states decided to create many smaller, independent states instead of the Uthan behemoth. One of those states was Regovia.\n\nAfter a seven year transitional period, on the 14th of January, 1941, Regovia was established.\n*page_break\n\nThe young state of Regovia went through many ups and downs (see \"Enemies\") but on the whole, Regovia succeeded. It's cities and economy grew, it's population swelled and it's democracy thrived.\n\nAfter Regovias victory during the War of Double Aggression, international interest in Regovia grew. Foreign investors now believed Regovia was a viable state with a stable future and began investing in Regovian businesses.\n*line_break\nThe added territory of Western Regovia allowed the population to spread out more and for Regovia to thrive.\n\nEven the first Filo rebellion couldn't slow down Regovian success. It's future seemed secure.\n\nThen, in 1980, that all changed.\n*page_break\n\n20 armed Filo terrorists broke into the Zver hotel in the city of Lovary, taking over 1,000 civilian hostages. The Regovian military failed to react appropriately, reacting slowly and in an unorganized fashion. When the dust had cleared, 950 of the hostages and 36 soldiers and policemen were dead. 19 of the 20 terrorists had escaped.\n\nThe fallout was catastrophic, seizing the initiative, Filo terrorists committed almost daily bombing and shooting attacks, culminating in the assassination of the Prime Minister and President during Independence day celebrations.\n\nWithout leadership, parliament descended into chaos, the various parties were unable to create a new government, not to mention a response to the daily acts of terror inflicted on the population.\n*line_break\nWith no other option, General Saul Mott, the Chief of Staff, declared a state of emergency, forcing parliament to declare martial law and reform the military, reenacting conscription and doubling the military budget.\n\n\nWith martial law enacted and parliament in recess,  order was slowly restored. By the time for the next elections, General Mott was by far the most popular figure in the country. With his endorsement of the newly formed \"Citizens\" party, their landslide victory was assured. Within five months of the election, the party delivered on their main campaign promise- disenfranchisement of those who had not served in the RDF.\n\nRegovia, with a reformed, large military was able to quell the Filo rebellions, restoring order to Regovia and allowing for the martial law to be lifted.\n\nToday, the \"Citizens\" party is still the largest party in parliament but no longer by the supermajority it once had. However, the Citizen Republic it established is still widely seen as the reason for the peace Regovia has enjoyed since the second Filo rebellion.\n*goto glossary_menu\n\n\n*label enemies\n\n*label enemies1\n*choice\n     *if (glossary != 0) #Return to the main stat page.\n        *set enemies 0\n        *goto enemies\n    *if (enemies != 1) #The Kingdom of Saria\n        *set enemies 1\n        *goto saria\n    *if (enemies != 1) #Free Peoples Republic of Wev\n        *set enemies 1\n        *goto wev\n    *if (enemies != 3) #Filo\n        *set enemies 3\n        *goto filo\n    *if (enemies != 4) #Lawan Republic\n        *set enemies 4\n        *goto lawan\n    #Return to the game.\n        *finish\n\n*label saria\n[b]The Kingdom of Saria[/b]\n\nThe Kingdom of Saria was established in 1934 from the ashes of the Uth Empire and has had been aggressive to it's neighbors and especially Regovia ever since.\n\nThe first War between the two nations was the Regovian War of Independence in 1941. The Sarians were defeated but managed to occupy the militarily significant Lotab and Senfir islands.\n\nThe second war was the War of Double Aggression (1965). During this war the Sarians and Wevese attempted to once again destroy Regovia. Thanks to the bravery and superior tactics of the RDF they were repelled and the islands returned to their rightful owners- the Regovians.\n\nThe third and final war on the Sarian front was the Lawan Civil War (2002). During the war, Regovia sided with the Democratic Front of Lawan while the Sarians sided with the Free Lawanese Forces. The war was long and bloody but in the end the DFL command betrayed it's supporters and signed a peace treaty, granting the FLF total control of Lawan.\n\nThe Kingdom of Saria has recently managed to \"convince\" the Lawan Republic to merge with the kingdom as it's fifteenth providence, claiming common roots as former providences of the Uth Empire and common cultural heritage as well as a way to defend Lawan from so called \"Regovian aggression\".\n\nRegovia views this occupation as illegal and threating as it allows the Kingdom of Saria to use the northern mountains for their own nefarious purposes.\n*goto enemies1\n\n*label wev\nThe Free Peoples Republic of Wev is an ancient country, it has existed in one form or another for millennia. It's recent incarnation as the FPRW is relatively recent, only since 1966.\n\nThe Free Peoples Republic was founded by a military coup that overthrew the ruling monarchy. The coup was supported by most of the population due to bread shortages and economic downturn as a result of the war of Double Aggression, a war that was disastrous for the Wevese. \n*line_break\nAfter the humiliating and terribly planned offensive during the Regovian War of Independence, the monarchy searched for a way to return it's lost prestige and regional power status that it had lost after most of it's army deserted during the later stages of the war. In 1965, together with the Kingdom of Saria, Wev attacked Regovia but it's huge and ineffective army was easily repelled by the fast and well equipped RDF. For three months, Regovian troops struck deep into Wev territory, causing shortages which lasted for over a year before the Chief of Staff staged a coup and signed a peace treaty with Regovia.\n\nAs part of the treaty, the newly formed FPRW returned historic Western Regovia to it's rightful owners. However, by now, the majority of the population were Filo civilians. The transfer greatly expanded the area controlled by Regovia but also added a significant non-citizen Filo population to Regovia.\n*goto enemies1\n\n*label filo\nThe Filo are a group of people who mostly immigrated to the region during the rule of the Uth Empire. After the fall of the Empire and subsequent rise of Saria, the Filo identified strongly with the Sarian monarchy and fought Regovia during the Regovian war of independence for control of what is today Regovia. \n\nTo this end, they recruited the support of Lawan, Wev and Saria. The three armies and Filo militia managed to take control of Western Regovia as well as the Lotab and Senfir islands.\n\nThe Filo have been a menace to Regovia ever since, infiltrating Regovias borders to commit terrorist attacks against military and civilian targets. After the Regovian victory of the War of Double Aggression, when the western regions were liberated from Wev, many Filo came under military occupation by Regovia.\n\nThe Filo have staged two large rebellions against Regovian rule and have committed countless sporadic attacks against civilians and soldiers. The biggest attack took place during the Second large rebellion, in 1980. Triggering Regovias change into a Citizen Republic.\n\nThe latest skirmish against the Filo was during 2014. During the election a year prior, the Prime minister promised to lead a crackdown on Filo criminals and terrorists.\n*line_break\nRDF troops raided major Filo cities and town, arresting thousands of terrorists and terror enablers such as illegal weapon manufacturers.\n\nToday, thanks to the strong Regovian military, the Filo threat has been mostly contained. The leading terrorists are in jail and only small number of terrorists still manage to commit terrorist acts and murder Regovian civilians.\n*goto enemies1\n\n*label lawan\nThe Lawan Republic has always been Regovias least threatening enemy. Their small population only allowed them to send a small military force during the Regovian war of independence.\n\nLawan is has been marred by internal strife between liberals and conservatives culminating in the Lawan civil war of 2002.\n\nDuring the Civil war, the liberal faction, lead by the Democratic Front of Lawan fought with the Free Lewanese Forces for over 3 years. During the second year of fighting, Saria intervened on behalf of the FLF. Regovia saw this intervention as illegal and threatened to support the DFL unless Saria withdrew. Saria failed to comply and Regovia intervened.\n\nBy the third year of the war, no real progress had been made by either side, a stalemate had been reached. Regovian soldiers occupied most of south Lawan while Saria occupied the north. In order to bring an end to the war, Regovia decided to continue supporting the DFL with airstrikes while returning all RDF personnel to Regovia. The Regovian tactical withdrawal was successful and the DFL managed to hold off the LFL and Saria. However, unknown to Regovian intelligence, Saria and the LFL offered the DFL leaders a deal. In return for disarmament and surrender, Saria would guarantee safe passage to the DFL leaders as well as monetary rewards. The leaders of the DFL complied, betraying Regovia and their supporters. \n\nToday, a large population of Lewanese refugees and DFL veterans live in the Graven Highlands of northern Regovia. They are fervent supporters of Regovia and enlist in the Regovian military, reaching the highest ranks of command.\n*goto enemies1\n\n*label Map\n[i][b]Map:[/b][/i]\n*image fantasymap.png\n*goto navigation_menu\n\n*label ribbons\n[i][b]Awards:[/b][/i]\n\n*if medicribbon =true\n    Medic Ribbon:\n    *image medic.jpg center A thick white stripe, thick red stripe, thick white stripe\n*if goldmedicribbon =true\n    Medic Ribbon with a Gold Star:\n    *image medicstar.jpg center A thick white stripe, thick red stripe with a golden star, thick white stripe\n*if combatcertified =true\n    Combat Certified:\n    *image combatcertified.jpg center Army green with a horizontal silver gladius in the center\n*if navigatorribbon = true\n    Navigator:\n    *image Navigatorribbon.jpg center  Thick green stripe, thick sand colored stripe, thick dark blue stripe\n*if medalhandcombat = true\n    Hand to Hand Combat Specialist: \n    *image handcombat.jpg center Blood red with an upright golden sword in the center\n*if sapperribbon =true\n    Sapper:\n    *image sapperribbon.jpg center Thin red stripe, thin orange stripe, thin yellow stripe, thin orange stripe, thin red stripe (Imagine an explosion)\n*if scoutribbon =true\n    Scout:\n    *image scoutribbon.jpg center Thick green stripe, thick dark blue stripe, thick sand colored stripe\n*if crowribbon=true\n    Crow:\n    *image crowribbon.jpg center Thin Tank grey stripe, thin dark green stripe, hin Tank grey stripe, thin dark green stripe, thin tank grey stripe.\n*if medalofsacrifce =true\n    Medal of Sacrifice:\n    *image medalofsacrifice.jpg center A dark reddish brown ribbon\n*if filohonor =true\n     Filo Medal of Honor:\n     *image filohonor.jpg center Very thin green stripe, very thin light brown stripe, thin green stripe, thick yellow stripe with a green star in the middle, thin green stripe, very thin light brown stripe, very thin green stripe\n*if sarianhonor =true\n    Medal of Eternal Friendship:\n    *image sarianhonor.jpg center Thin royal purple stripe, thin yellow stripe, very thick royal purple stripe with three golden stars in the middle, thin yellow stripe, thin royal purple stripe\n*if medalofvalour = true\n    Medal of Valour:\n    *image medalofvalour.jpg center A dark red ribbon with a very thin golden stripe in the middle\n*if medalofbravery =true\n    Medal of Bravery:\n    *image medalofbravery.jpg center A dark red ribbon with two very thin golden stripes in the middle\n*if medalofhonor =true\n    Medal of Honor:\n    *image medalofhonor.jpg center A dark red ribbon with three very thin golden stripes in the middle\n*goto navigation_menu\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Chapters 6 through 8[/b]\n  \n  Unlock chapters 6 through 8, including the thrilling conclusion!\n  \n  *purchase adfree $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Chapters 6 through 8[/b]\n  \n  You've paid to unlock chapters 6 through 8.\n", "commander": "*temp shower true\n*set rank \"Recruit\"\nYou and your Platoon walk in formation towards the company complex, a square of 50 by 50 meters with two buildings and a courtyard. \n\nIn the center of the courtyard are two flagpoles, one flying the Regovian flag and the second \n*if brigade =\"1st Svern\"\n    white and brown,\n*if brigade = \"28th Paratrooper\"\n    white and maroon,\n*if brigade =\"93rd Rivar\"\n    white and green,\n*if brigade =\"84th Hulni\"\n    white and purple,\nthe brigade colors. \n\n\"Get in formation!\" The Squad Commander shouts. \"Come on! Groups of three!\"\n\nYou and the rest of the platoon attempt to fulfill the order but it takes over a minute until you succeed. \n\n\"This is your first week,\" the squad commander says calmly \"so I'll forget the last two minutes, but if in a week it takes you longer than ten seconds to form up, we will practice it till you can. Am I clear?\"\n*line_break\n\"Yes, Sgt. Richards!\" One of the recruits answers.\n*line_break\n\"Is @{male he|she} the only soldier who understood what @{male he|she} said?\" Sgt. Jacob asks.\n*line_break\n\"No!\" the platoon answers together. \n*line_break\n\"Then answer @{male his|her} question together.\" @{male He|She} continues.\n*line_break\n\"Yes Sgt. Richards!\" The platoon answers.\n*page_break\nYou find that answering together has an interesting effect. Even though you don't even know the rest of your squad, you feel closer to the whole platoon.\n\nYour thoughts are cut short by an SSG joining the two previous sergeants. @{male He|She} is short, dark-skinned and has a thin scar from the right corner of @{male his|her} mouth to @{male his|her} ear.\n\n\n\"Welcome to company D, I will be your Sergeant,\" Your new Sergeant says. \"and this will be your home until you finish advanced training in eight months.\"\n\n\"Observant soldiers will have already noticed the two buildings. The first, larger building is where you will sleep. The second is for the commanders. If you are sent to talk to the Platoon commander you will find @{male his|her} office on the first floor. The first floor also has the CSMs office and storeroom. Any questions?\"\n*label start\n*choice\n    *disable_reuse #What is a CSM?\n      *goto csm\n    *disable_reuse #Why would I need to talk to the Platoon commander?\n        *goto platoonc\n    *disable_reuse #What's on the second floor?\n        *goto second\n    #I don't have any more questions.\n        *goto no\n\n*label csm\n\"The CSM is mostly in charge of logistics, usually @{male he|she} is also in charge of discipline. However, in the Wardens, the Sergeant does that.\" @{male He|She} smiles a scheming smile. \"That's me\".\n*goto start\n*label platoonc\n\"You will have an introductory meeting with @{male him|her} in a few minutes. Later on, you should see the inside of @{male his|her} office only of you have a disciplinary issue.\"\n*goto start\n*label second\n\"The commanders' rooms.\" The Sergeant answers dryly \"And therefore irrelevant.\"\n*goto start\n*label no\n\"Good.\" the Sergeant's face softens \"I do want to stress that if you have any questions, now or ever, we want you to feel free to ask. We never want you to do something of you don't understand the reason for.\"\n*page_break\n\n\"From here you will find your bed and then line up outside of the administration building. You are going to meet our Platoon commander.\"\n\nYour platoon is divided into two squads, Squad A and Squad B. Each squad has a different room. As you enter your squad's room you find it not too different from what you imagined it looks like from the movies. The room is long, with eight bunk beds on either side. Between each bunk bed are two tall closets for storage. Altogether, not bad conditions.\n*line_break\nYou find your name on a top bunk near the end of the room, you leave your bag on the bed and head towards the line at the door of the administration building. \n*page_break\nAs you join the line at the entrance of the administration building your Sergeant gives you a quick briefing about how to act.\n*line_break\n\"When you enter the Platoon Commander's office you will wear your beret and salute\"\n*choice\n #\"Yes, @{male Sir|Ma'am}\"\n  *goto beret\n #\"Yes, @{male Sir|Ma'am}\" (lie)\n  *goto noberet\n #\"No, @{male Sir|Ma'am}. Saluting is embarrassing\"\n  *set sgtrel -10\n  \"$!{nick}, listen and listen well.\" The Sergeant says in a threatening voice. \"You do not want to mess with me. I will break you if you do. You will wear your beret if you know what's good for you. This is your last chance to change your mind, I expect you to take it.\" (Platoon Sergeant -10)\n\nDo you change your mind?\n*choice\n #Yes\n  *goto beret\n #No\n  *goto noberet\n*label noberet \nYou knock on the office door. After a moment a voice from the other side of the door tells you to enter.\n*line_break\nYou enter a small office. Behind a desk in the center of the office sits a tall, dark-haired officer with a short beard. Behind @{male him|her} is a small map of the country and a larger one of the base and surrounding areas.\n*line_break\nThe Officer's desk is neatly arranged with neat stacks of forms on @{male his|her} left side.\n\nThe Officer looks at you expectantly. After a few seconds of waiting for you to salute @{male he|she} says: \"Are you forgetting something?\"\n*choice\n #\"I don't salute.\"\n  *goto nosalute\n #\"Uh... Right!. (Quickly salute)\n  *goto backtrack \n*label nosalute\n*set pcrel -50\n\"I'm sorry.\" the Officer says quietly \"In the military we have rules. Rules, which cannot be ignored however much you or I don't like them. Action will be taken. Dismissed\" (Platoon Commander -50)\n*page_break Exit the room\n\nYou exit the room and meet your Sergeant again.\n\nYour Sergeant looks at you with a frown. \n*line_break\n\"I have never seen such a stupid reason to be kicked out of the Wardens. Tomorrow you will go to meet your new commanders at one of the regular battalions. Until then you are to report to the Chief Sergeant, @{male he|she} always needs help with weeding.\n*achieve kicked\n*set ending 0\n*goto mini_ending\n*label backtrack\n*set pcrel -5\nYour CO doesn't seem entirely convinced but @{male he|she} returns your salute and motions with @{male his|her} hand for you to take a seat in one of the two chairs placed in front of @{male his|her} desk. (Platoon Commander -5)\n*page_break Take a seat\n*goto takeaseat\n*label beret\nYou knock on the office door. After a moment a voice from the other side of the door tells you to enter.\n*line_break\nYou enter a small office. Behind a desk in the center of the office sits a tall, dark-haired officer with a @{male short, well-trimmed beard| shoulder-length hair}. Behind @{male him|her} is a small map of the country and a larger one of the base and surrounding areas.\n*line_break\nThe Officer's desk is neatly arranged with neat stacks of forms on @{male his|her} left side.\nYou salute your Platoon commander and @{male he|she} motions with @{male his|her} hand for you to take a seat in one of the two chairs placed in front of @{male his|her} desk.\n*page_break Take a seat\n*goto takeaseat\n*label takeaseat\nAs you sit down @{male he|she} takes one of the empty forms in one hand and a pen in the other.\n*line_break\n\"You are ${firstname} ${name}?\" @{male He|She} asks.\n*line_break\n\"Yes, @{male Sir|Ma'am}\" you reply\n*line_break\n*if ((speech >= 50) or (intelligence >= 50))\n    You notice the Platoon commander seems embarrassed when you say \"@{male Sir|Ma'am}\" (Success! Needed Persuasion or intelligence 50)\n\n*if tempnick = false\n *choice\n     #Actually, @{male Sir|Ma'am}, I would prefer ${name}\n         *set nick \"${name}\"\n         *goto yessir1\n     #Actually, @{male Sir|Ma'am}, I would prefer ${firstname}\n         *set nick \"${firstname}\"\n         *goto yessir1\n     #Actually, @{male Sir|Ma'am}, I would prefer you call me by my nickname:\n         *input_text nick\n         *goto yessir1\n     #Actually, I would prefer ${name}\n         *set nick \"${name}\"\n         *goto yessir2\n     #Actually, I would prefer ${firstname}\n         *set nick \"${firstname}\"\n         *goto yessir2\n     #Actually, I would prefer you call me by my nickname:\n          *input_text nick\n          *goto yessir2\n*else\n    \"I understand you prefer that I call you $!{nick}?\" @{male He|She} asks.\n    *goto yessir\n*label yessir\n*choice\n #\"Yes, @{male Sir|Ma'am}.\"\n  *label yessir1\n  *set pcrel -3\n  The Platoon Commander frowns for a second. (Platoon Commander -3)\n  *goto thisis\n #\"Yes.\"\n  *label yessir2\n  *set pcrel +3\n  You aren't sure, but you could have sworn you noticed a hint of a smile on the Platoon commander's face. (Platoon Commander +3)\n  *goto thisis\n*label thisis\n\n\"This is an introductory talk, in the coming months we will get to know each other more.\" The Platoon Commander wets @{male his|her} lips. \"I want you to know that I will always be around. If I am not next to the Platoon it is only because I am around the corner.\"\n\nYou nod, showing that you are listening.\n\n\"I expect of you to be a professional soldier, proficient in your designated job.\" @{male He|She} continues \"I also expect you to shoot well and to master Hand to hand combat. Finally, I want you to have good relations with your Platoon, the @{male men|women} in your unit should be like your family and the best friends you will ever have.\" the Platoon commander pauses.\n*line_break\n\"That's it. I hope to have a positive experience with you. As long as we are on the same page I think we can get along nicely. Dismissed.\"\n\nThe rest of the day passes relatively calmly, touring the base and meeting the various functionaries in D company. \n*line_break\nYou are surprised to find out how many people are needed to run a company in basic training.\n*page_break\nYou have a lot to learn about the military.\n*page_break\nWhen the sun sets and the day comes to an end, you are given one hour to take a shower, get ready for tomorrow and use your phone. At the end of the hour, you and your Platoon are to stand beside your beds at attention and wait for your Squad Commander.\n*line_break the showers\nYou gather your towel and change of clothes and walk towards the communal showers.\n*line_break\nIn the military, it is extremely rare to find showers that give any actual privacy and these are no exception. The showers are a simple row of 6 showerheads that give absolutely no privacy.\n\nHow do you feel about this?\n*choice\n #I really don't want to take a shower in front of all these people but I guess I don't have a choice.\n  *goto help\n #I can't do this! I need my privacy!\n  *goto gethelp\n #I don't know why people are uncomfortable about their bodies! I have nothing to be ashamed of.\n  *goto help\n\n*label gethelp\nYou feel a pit in your stomach and sweat on your hands. You freeze. You can't undress in front of all these people! You barely know them!\n*line_break\n*line_break\nYou feel a hand on your shoulder, startled, you jump.\n*page_break\n*if samrel>50\n \"Easy man, it's only me.\" You turn and see Sam, the recruit you met on the drive from the recruitment center\n *goto talk\n*else\n  \"Easy man, it's only me.\" You turn and see Sam, a recruit you vaguely recognize stood next to you after you were accepted into the ${unit}.\n  *goto talk\n *label talk\n\"You okay?\" @{male He|She} asks.\n*choice\n    #\"Just a bit nervous.\"\n        \"I understand, I'm not that keen on showering so many naked people myself\" @{male He|She} smiles for a moment \"But we really don't have the privilege not to. This is the army after all...\"\n        *choice\n            #\"I guess you're right.\"\n                You quickly get undressed and take a shower, while not the most comfortable situation, you understand that this isn't the last time you will do something you are not comfortable with within the army.\n                *goto sleep\n            #\"I'll just come back later...\"\n                *set samrel -3\n                *set shower false\n                *gosub_scene sub\n                \"OK... I hope you find the time to shower later though. Wouldn't want you to smell bad on your first day.\"\n                *line_break \n                (Sam -3)\n                *goto sleep\n    #\"I'm fine, just leave me alone.\"\n        Sam seems taken aback but seems to regain
