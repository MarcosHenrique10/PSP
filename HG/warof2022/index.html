ng to be heard over the screams of thousands of civilians from the parade.\n    *page_break\n    \"We seem to be under attack.\" Miller states calmly \"We need to regroup with the rest of the team and secure our area. Follow me.\"\n    *if chanceofattack =1\n        *goto smallattack\n    *else\n        *goto largeattack\n*elseif chanceofattack \u003c= 0\n    Suddenly, a series of small explosions are heard from a few kilometers to the east.\n    \n    \"What was that?\" ${partner} muses\n    *line_break\n    The radio crackles.\n    \n    [i]\"Everyone, the explosions we just heard sound like mortars.\"[/i] Miller's voice comes through [i]\"This is bad.\"[/i] @{male he|she} pauses [i]\"TM40! Rendezvous at the bottom of the Supreme Court!\"[/i]\n    *goto noattack\n*label largeattack\n*label smallattack\n*label noattack\n*page_break\n\"All ${unit} all ${unit}, this is Chief. Regroup at King Vasu street. Commanders, count your men, make sure you haven't lost anyone. Report to me when you reach the street. Chief out.\n\n\"Follow me!\" Miller shouts. \n*line_break\nThe team is quick to follow @{male his|her}  orders, rushing to the empty street.\n*line_break\nLooks like you are the first team there.\n\n\n\"Chief from 40, my team is in position, \n*if  jimjimalive= false\n    one soldier down.\"\n    *goto n1t\n*else\n    all men accounted for.\"\n    *goto n1t\n*label n1t\n*line_break\n\"Excellent 40, secure area, await further orders.\"\n\n\"${nick} and Sam, take position behind that truck! If anyone passes that lamp\" Walker points to a lamppost thirty meters in front of you \"without identifying themselves- shoot to kill. We don't know how many terrorists may be in the area.\"\n*page_break\nYou take cover behind the truck, your weapon aiming down the street. The sound of ambulances and the air raid siren keep you on edge, reminding you that this isn't a dream. An attack occurred. A big one. On your watch.\n\n\"Do you think there was something we could do to stop this?\" Sam asks, @{male his|her}  eyes not leaving the street ahead.\"\n*fake_choice\n    #We should have been more alert. We could have stopped this.\n    #No, there was nothing we could do\nSam closes @{male his|her}  eyes and breathes unsteadily.\n\n\"So many dead.\" @{male his|her}  voice cracks.\n*fake_choice\n    #\"We will avenge them.\"\n        \"We will avenge them.\" (Loyal +3)\n        *set loyal +3\n    #\"Let's focus on making sure more don't join them.\"\n        \"Let's focus on making sure more don't join them.\" (Loyal +3)\n        *set loyal -3\n\n\"You're right.\" Sam blinks and takes a deep breath \"We need to stay focused.\"\n*page_break\nA group of uniformed men turns the corner to King Vasu street.\n\n\"Who goes there?\" Sam shouts \"Identify yourselves!\"\n*line_break\n\"It's us!\" you hear Maj. Faraz reply \"Lower your guns!\"\n\n\"Faraz! What happened?\" Miller asks when the rest of the company arrives \"How many dead?\"\n*line_break\n\"We don't know yet.\" Maj. Faraz answers gravely \"The higher-ups are trying to make sense of the attacks. If I had to guess-the Filos couldn't have managed this alone- they needed Sarian support. For now, HQ want us to freeze the situation and make sure no further attacks happen while civilians are being evacuated.\" @{male He|She} pauses for a moment, surveying the company. \n*if jimjimalive =false\n    \"We already lost one man today. Don't make me write another letter.\"\n    *goto n2t\n*else\n    \"You might not appreciate the gravity of what just happened. This is just the first battle in a string of many. Don't let me down.\"\n    *goto n2t\n*label n2t\n*page_break\nThe ${unit} secure King Vasu street as ordered. An hour passes. Then another and another. Before you know it- night falls and you find huddled with Zac against the cold on a rooftop overlooking the street.\n\n\"This is stupid.\" Zac says suddenly \"If another attack was going to happen- it would have happened already. We're freezing our @{male balls|tits} off for nothing- let's go downstairs, where it's less windy.\"\n*choice\n    *selectable_if (willpower >=60) #\"You go, I don't mind staying.\" (Need 60 Willpower)\n        *goto stayupalone\n    *selectable_if (discipline >=60) #\"We were ordered to stay here!\" (Need 60 Discipline)\n        *set zacrel -3\n        Zac grumbles to @{male him|her}self but doesn't answer back. (Zac -3)\n        *goto stayup\n    *if (jimjimalive = false) #\"What is wrong with you? JiJi is dead and all you can think about is the fact you're cold?\"\n        Zac bites @{male his|her} lip and adjusts @{male his|her}  rifle but remains silent.\n        *goto stayup\n    #Good idea.\n        *goto godown\n*label stayup\n\n\nYou stay on the roof together, searching for threats. Suddenly, you hear a shrill whistle by your ear.\n*line_break\n\"Get down!\" Zac shouts, jumping on you, causing you to crash on the floor \"Sniper!\"\n*goto sniper\n*label stayupalone\n*set zacrel +3\n\n\"Thanks.\" Zac smiles. (Zac +3)\n*page_break\nYou wait in the cold alone, searching for threats. Suddenly, you hear a shrill whistle by your ear.\n*line_break\nInstinctively, you fall to the ground.\n*line_break\n\"Sniper!\"\n\nZac crawls to the top of the staircase. \"Sniper? Where?\" @{male he|she} asks, breathless.\n*goto sniper\n*label sniper\n*page_break\n\"Radio Miller!\" you order \"I'll try to figure out where the sniper is located.\"\n*label here\n\nYou peak over the edge of the roof but a bullet whistles just above your helmet, almost hitting it.\n*temp lockonsniper 0\n*temp chancetohit 0\n*rand chancetohit 0 2\n*label chancetohit\n\n*if (lockonsniper =2)\n    You have a good idea where the sniper is, if you fire, you are pretty sure you will hit.\n    *goto n4t\n*elseif (lockonsniper =1)\n    You have an okay idea where the sniper is, if you fire, you might hit.\n    *goto n4t\n*else\n    You can only guess as to the location of the sniper, if you fire now, you probably won't hit.\n    *goto n4t\n*label n4t\n*choice\n    *disable_reuse *selectable_if (intelligence >=60) #Try to figure out where the bullet is coming from.  (Need 60 intelligence)\n        *set lockonsniper +1\n        You raise your rifle a bit, sure enough, another bullet flies towards where you are.\n        \n        By calculating when the sniper saw your raised rifle you manage to narrow down @{male his|her} possible.\n        *set chancetohit +1\n        *goto chancetohit\n    *disable_reuse *selectable_if (shooting >=60) #Try to figure out where a sniper would position @{male him|her}self. (Need 60 shooting)\n        *set lockonsniper +1\n        You try to think where a sniper would position @{male him|her}self.\n        \n        You can think of only a few places where an aspiring sniper could see your roof as well as have good lines of fire to the street below.\n        *set chancetohit +1\n        *goto chancetohit\n    *if (lockonsniper = 1) #Fire at the sniper\n        *goto fireatthesniper\n    *if (lockonsniper =2) #Fire at the sniper\n        *goto fireatthesniper\n    *if (lockonsniper =0) #Fire without aiming towards where you think the sniper is\n        *goto fireatthesniper\n*label fireatthesniper\n\"Zac, when I tell you, cover me. I think I can hit the sniper.\"\n*line_break\n\"Gotcha, tell me when.\" Zac replies, a determined look on @{male his|her} face.\n\nYou take a few quick breaths, pumping yourself up for what you know is a wild bet at best.\n*line_break\n\"Now!\"\n\nWithout raising @{male his|her} head over the edge, Zac fires short bursts at random directions.\n*line_break\nYou hope the sniper is enough of an amateur to not take cover or wait you out.\n\nYou raise your rifle and body over the edge of the roof, aiming and firing a single bullet to where you think the sniper is.\n\n\n*if chancetohit >=2\n    Whether it's skill or dumb luck, you watch dumbfounded as your shot connects, hitting the dark outline of the shooter, causing it to fall from the roof to the street below. (Shooting +5\n    *set shooting +5\n    *if profession = \"Marksman\"\n        *set marksman +5\n        , @{male Marksman|Markswoman} +5)\n        *goto below\n    *else\n        )\n        *goto below\n    *label below\n    *goto killedsniper\n*else\n    Unsurprisingly, you fire at an empty roof, diving for cover just as another bullet hits the roof edge.\n    *goto livesniper\n*label livesniper\n*page_break\n\"Shit\" you mumble \"I missed.\"\n*line_break\n\"We need to wait for backup, trying that again is suicide.\" Zac replies, exasperated \"I can't believe you did that... Did you at least get an idea where the sniper is?\"\n*line_break\n\"No.\" you mumble dejectedly just as another bullet whistles over your heads \"Tell Miller we're pinned down and requesting assistance.\"\n\nZac nods. \"40 from Zac. Requesting immediate assistance at our location. We are under attack from an unknown location. Repeat, under attack from an unknown location.\"\n\n\n[i]\"Zac, stay put. We are on our way.\"[/i]\n*page_break\nWithin a minute you begin to hear cover fire from the street below, you spot the entire company converging on a building to your south.\n\nThe squads are advancing slowly but securely, with at least 4 soldiers firing in short bursts at all times, advancing using the best cover of all- hot lead flying at 900 meters per second.\n\nYou hear the radio crackle. You recognize the voice as that of Lt. Alexis. A Lawaneese refugee who now commands TM10- the most experienced team in the ${unit}.\n\n[i]\"I am in position at the base of the building.\"[/i] Alexis reports [i]\"Preparing to breach.\"[/i]\n*line_break\nYou hear a small explosion, followed by two short bursts of gunfire.\n*page_break\n[i]\"Man down! Man down!\"[/i] A voice shouts [i]\"Alexis is down! Fire in the hole!\"[/i]\n*line_break\n*label goinginhot\nYou hear the unmistakable sound of an exploding grenade. [i]\"Going in hot!\"[/i]\n\nYou hear more short bursts of gunfire.\n\n[i]\"Terrorist down!\"[/i] Another gunshot [i]\"Terrorist neutralized! All clear!\"[/i]\n\n[i]\"Ambulance is en route.\"[/i] A voice from the radio states. [i]\"What is the situation in regards to the wounded?\"[/i]\n*line_break\nZac turns off the radio. \"I can't listen to that right now.\" Zac grabs @{male his|her} stomach. \"I'm going to be sick.\"\n*line_break\nAs if on cue, @{male he|she} is.\n*set alexisdead 1\n*goto n6t\n*label killedsniper\nZac slaps you on your back. \"Amazing shot! I'll be right back, I need to report this to Miller.\" (Zac +2)\n*set zacrel +2\n\nLeft alone, the gravity of what just happened hits you- you just killed someone.\n*fake_choice\n    #Taking a life doesn't come without a price.\n        With Zac on the other side of the roof, you have a moment to yourself.\n        \n        You find yourself shaking and swaying unsteadily. You sit down, the weight of the past day finally registering.\n        \n        Your head sags, the weight of your helmet threatening to crush you. You remove your helmet and hold your head with both hands, feeling the overwhelming urge to do something to release the pressure in your chest.\n        \n        You swallow, unable to remove the lump in your throat suffocating you.\n        *page_break\n        *if zacrel >=55\n            \"Are you okay?\" Zac's hand rests on your shoulder.\n            *line_break\n            You try to answer but the only sound that escapes your mouth when it opens is a sob.\n            \n            Zac sits at your side, @{male his|her} hand pulls you closer to @{male him|her} until your head is resting on @{male his|her} combat vest.\n            *line_break\n            \"I'm right here with you. We're all in this together.\"\n            \n            You blink a few times, trying to stop the flood threatening to drown your eyes.\n            \"I'm fine.\" you finally manage \"What does Miller want us to do?\"\n            *line_break\n            \"@{male He|She} wants to meet us at street level. You sure you're fine?\"\n            *line_break\n            \"Let's go already. I can't stay up here.\"\n            *goto n7t\n        *elseif zacrel>=43\n            You notice Zac is coming closer. You try to stand up, using your rifle as a walking stick.\n            \n            \"You alright?\" Zac asks, continuing without waiting for an answer. \"Miller wants us at street level- come on.\"\n            *goto n7t\n        *else \n            You notice Zac is coming closer. You try to stand up, using your rifle as a walking stick.\n            \n            \"Get a grip already.\" Zac rolls @{male his|her} eyes. \"Miller wants us at street level- come on.\"\n            *goto n7t\n    #It was a killed or be killed situation- I had no choice.\n    #It was either @{male him|her} or me. That doesn't mean I'm not proud of my success.\n*label n7t\n*goto streetlevel\n*label godown\n*page_break\nZac and you huddle together in the staircase, enjoying the reprieve from the biting night cold and wind when you hear the unmistakable crack of a gunshot and the radio crackles to life.\n\n\"[i]Man down! Man down! Sniper at unknown location firing at my position! Request assistance!\"[/i]\n\n\"Shit.\" Zac shouts \"Let's get up there, see what we can do.\"\n*page_break\nYou rush to the roof, but in the dark, there isn't much you can do to help.\n\n[i]\"Ready to breach.\"[/i] A voice announces through the radio.\n*goto goinginhot\n*label n6t\n*goto streetlevel\n*label streetlevel\n*page_break\nWhen you reach the street level you are greeted by the rest of TM40.\n\n\"Now that everyone is here, I want to share what I know and explain what is going to happen.\" Miller begins.\n\n\"Regovia was attacked today. We don't know for sure by whom but we can assume it was @{male George|Georgia} Hamtz, leader of the FFF with Sarian support. We expect that after such a successful attack, @{male his|her} power and influence will grow in Filo circles. We expect at least violent riots to take place in Western Regovia and at worst a full-blown Sarian invasion.\" An audible gasp is heard from the team.\n*line_break\n\"I know this is a lot to process. Which is why we are being flown back to Lead Tower, border police are taking control of the city for now.\"\n*page_break 30 minutes later, Lead Tower\nThe helicopter lands on the helipad and the team disembarks.\n\nAs you jump off the helicopter and begin walking towards your room you notice @{male Abe|Mara}  seems in shock, a blank look on @{male his|her} face and an unfocused look in @{male his|her} eye.\n\n*choice\n    #Talk with @{male him|her} and find out what's wrong\n        \"Hey! @{male Abe|Mara}! What's the matter?\"\n        *line_break\n        @{male Abe|Mara} keeps on walking. You can't be sure if @{male he's|she's} ignoring you or if @{male he|she} is simply stuck to deep in @{male his|her} own thoughts.\n        *choice\n            #Grab @{male Abe|Mara} by the arm and figure out what's wrong\n                You rush forward and hold onto @{male Abe|Mara}'s arm, turning @{male him|her} to face you. \"What's wrong?!\" You ask.\n                *line_break\n                To you surprise, @{male Abe|Mara} crashes to the ground and covers @{male his|her} eyes. Tears stream down @{male his|her} face and @{male he|she} begins sobbing quietly.\n                *choice\n                    #\"Are you okay?\"\n                        \"Are you okay?\" You ask.\n                        *line_break\n                        \"Does it look like I'm okay?\" @{male Abe|Mara} snarls. \"Just leave me alone!\" (@{male Abe|Mara} -3)\n                        *set aberel -3\n                        *line_break\n                        With no idea how to proceed you decide the best course of action is simply to leave. \n                        \n                        Sometimes people just need to be alone.\n                        *goto 24hourslater\n                    #Crouch by @{male his|her} side and comfort @{male him|her}. \n                        Sometimes the best way to help someone is to let them know they are not alone. (Persuasion +3)\n                        *set speech +3\n                        \n                        After a long minute @{male Abe|Mara} calms down and, with your help, stands up.\n                        *line_break\n                        \"Let's go get some water.\" You say, half ordering and half offering.\n                        \n                        @{male Abe|Mara} allows @{male him|her}self to be lead to a little-used water-cooler near the company warehouses in the western section of ${quarter}.\n                        *line_break\n                        @{male Abe|Mara} washes @{male his|her} face and eyes and after taking a few deep breaths begins to speak.\n                        \n                        \"I have nothing left.\"\n                        *line_break\n                        \"What do you mean?\" You ask.\n                        *line_break\n                        \"Two of my @{male brothers|sisters} were living in Rusalim and now they won't answer the phone.\"\n                        *choice\n                            #\"You can't know they are dead for sure. They could be wounded or just can't talk right now.\"\n                                \"I know!\" @{male Abe|Mara} snaps. \"I can feel they are gone...\" \n                                *label crying\n                                \n                                \n                                @{male Abe|Mara} begins crying again. \"Izti and Cali are dead and it is my fault!\"\n                                *choice\n                                    #\"It's not your fault. There was nothing you could do.\"\n                                        \"We could have avoided their deaths if we would have been more careful! It was our job to stop attacks like this from happening!\"\n                                        *goto Izti\n                                    #\"It's not your fault. The person to blame is @{male George|Georgia} Hamtz.\"\n                                        @{male Abe|Mara}'s eyes flash. \"Oh, believe me, when I get my hands on that Filo bastard I will make @{male him|her} wish @{male he|she} would not have attacked us.\n                                        *goto Izti\n                            #\"I'm so sorry.\"\n                                \"I'm so sorry.\"\n                                *goto crying\n            #Leave @{male him|her} alone\n                *goto 24hourslater\n    #Ignore @{male him|her}. I don't have time for this\n        *goto 24hourslater\n*label Izti\n*temp cali 0\n\nYou decide to switch tactics.\n*label manydo\n*choice\n    *disable_reuse #\"Tell me about Itzi.\"\n        *set cali +1\n        \"Itzi served in the special tracker battalion, a group of soldiers from the south said to be able to track a snake from one side of the Sassik desert to the other.\" @{male Abe|Mara} says, a hint of pride in @{male his|her} voice. \"@{male He|She} was the one who convinced me to enlist and become an officer. Itzi always said southerners need to be the best soldiers in their team to prove that what people say about us is not true.\"\n        *line_break\n        \"What do people say about southerners?\" You ask.\n        *line_break\n        \"Do not pretend you do not know.\" @{male Abe|Mara} scoffs. \"I have already heard it all. People think southerners are stupid and lazy. They think our beliefs are stupid and backward.\"\n        *choice\n            #\"I don't think that.\"\n                \"I know you do not.\" @{male Abe|Mara} smiles darkly. \"But many do.\" (@{male Abe|Mara} +1)\n                *set aberel +1\n                *goto manydo\n            #\"You are the best of us.\"\n                \"Thanks.\" @{male Abe|Mara} smiles darkly. \"And still, no matter what I do, people whisper about me behind my back. Laughing at my stupid beliefs.\" (@{male Abe|Mara} +3)\n                *set aberel+3\n                *goto manydo\n    *disable_reuse #\"Tell me about Cali.\"\n        *set cali +1\n        \"Cali was more than a @{male brother|sister} to me, @{male he|she} was my best friend.\" @{male Abe|Mara} wipes a tear from @{male his|her} eye. \"When I was young and started to doubt my faith, Cali was there for me, helping me understand the Sun.\"\n        *choice\n            #\"What is it with the sun and southerners?\"\n                \"It doesn't matter.\" @{male Abe|Mara} takes a deep breath. \"I do not want to talk about it now.\"\n                *goto manydo\n            #\"@{male He|She} sounds like a great @{male guy|gal}.\"\n                \"@{male He|She} was.\" @{male Abe|Mara} smiles. \"@{male He|She} really pushed me to enlist. @{male He|She} said it would really suit me to lead a team or platoon.\" (@{male Abe|Mara} +3)\n                *set aberel +3\n                *goto manydo\n    *if (cali=2) #\"Are they the reason you enlisted?\"\n        \"Yes.\" @{male Abe|Mara} nods, @{male his|her} eyes finally dry. \"They were my everything, we three were closer to each other than we were to our parents.\"\n        *line_break\n        You remain silent, nodding.\n        *line_break\n        \"Thanks for listening.\" @{male Abe|Mara} smiles. \"I appreciate it.\"\n        *choice\n            #\"No problem.\"\n                \"No problem.\"\n                *line_break\n                @{male Abe|Mara} smiles. \"See you tomorrow.\" (@{male Abe|Mara} +5)\n                *set aberel +5\n                *goto 24hourslater\n            #Hug @{male Abe|Mara}\n                You grab @{male Abe|Mara}, pulling @{male him|her} into a hug.\n                *line_break\n                While a bit startled at first, @{male Abe|Mara} quickly returns the hug. After a minute, @{male Abe|Mara} untangles @{male him|her}self from the hug. \"I needed that, see you tomorrow.\" (@{male Abe|Mara} +7)\n                *set aberel +7\n                *goto 24hourslater\n*label 24hourslater\n*page_break 24 hours later, Lead Tower\nThe past 24 hours were surprisingly calm while the higher-ups tried to decide where would be the best place to deploy elite soldiers.\n\n*if chanceofattack \u003c=0\n    *achieve smallattack\n    Thankfully, it turned out the attacks weren't as bad as they appeared. The ${unit} were privately commended by the brigade commander for handling their AOR (Area of Responsibility) correctly. Preliminary reports showed that the worst-hit areas were the ones under the responsibility of the \n    *if (unit = \"Scouts\")\n        Crows.\n        *goto e10\n    *else\n        Scouts.\n        *goto e10\n*elseif chanceofattack =1\n     A preliminary report on the attacks found that while the attacks hit the capital hard- they weren't catastrophic. They also showed the worst-hit areas were the ones under the responsibility of the\n     *if (unit = \"Scouts\")\n         Crows.\n         *goto e10\n     *else\n         Scouts.\n         *goto e10\n*else\n    A preliminary report on the attacks found that the damage sustained was even worse than originally thought- thousands of civilians and soldiers were either missing or dead, \n    *if supremecourtgone = 1\n        the Supreme court was completely destroyed, \n        *goto e11\n    *else\n        *goto e11\n*label e11\nand the extent of the damage required reinforcing Rusalim with combat soldiers who would otherwise be able to help quell the unrest in Western Regovia.\n*goto e10\n*label  e10\n*comment jimjimalive false\n*comment alexisdead 0\n*if ((alexisdead =1) and (jimjimalive =false))\n    On top of the civilian deaths, the ${unit} had to deal with the loss of two of its own- Spc. @{male Jim|Jane} \"JiJi\" Mathews and Lt. Alexis Pavelo.\n    \n    Due to the security situation, no soldier was allowed to go to the funerals. The pictures of the almost empty gravesides haunted your dreams that night.\n    *goto e1.2\n*elseif alexisdead =1\n    On top of the civilian deaths, the ${unit} had to deal with the loss of one of its own- Lt. Alexis Pavelo.\n    \n    Due to the security situation, no soldier was allowed to go to the funeral. The pictures of the almost empty graveside haunted your dreams that night.\n    *goto e1.2\n*elseif jimjimalive =false\n    On top of the civilian deaths, the ${unit} had to deal with the loss of one of its own- Spc. @{male Jim|Jane} \"JiJi\" Mathews.\n    \n    Due to the security situation, no soldier was allowed to go to the funeral. The pictures of the almost empty graveside haunted your dreams that night.\n    *goto e1.2\n*else\n    Luckily for ${unit}, it had survived the attack with only minor cuts and bruises.\n    *goto e1.2\n*label  e1.2\n*page_break\n*gosub_scene sub\nFinally, 24 hours after the attack, the ${unit} are called to the briefing room.\n*page_break\n\"Good morning all.\" Maj. Faraz begins \"I won't lie to you. The attack we witnessed yesterday was the worst since the Zver attack. However, the Wardens were created for precisely this sort of moment, we will not sit by and do nothing.\n\nThe ${brigade} Wardens have been tasked with killing or capturing the terrorist known as @{male George|Georgia} Hamtz in order to return calm to Western Regovia.\"\n\nAn audible gasp goes through the room. Killing or capturing such a high-caliber terrorist is sure to be dangerous. It's the type of mission the will be taught in military history classes and discussed in schools and bars for years.\n\n\"If you would look behind me to this map,\" \n*image mapgaeva.png\nMaj. Faraz continues \"you will see that our intelligence indicates Hamtz has escaped Rusalim with most of the FFF terrorists who attacked us yesterday. We believe @{male he|she} is hiding in a safehouse in Gaeva, Western Regovia. This presents us with an interesting challenge. Gaeva is a nationalist Filo stronghold, and RDF troops don't usually enter the city.\" Maj. Faraz stops for a moment to lick @{male his|her}  lips and take a deep breath. \"It is imperative we succeed, if we fail- \n*if chanceofattack >=1\n     Western Regovia could rise in a full-on rebellion\n     *goto e12\n*else\n    the soldiers posted there will have a hard time keeping things contained \n    *goto e12\n*label e12\n. Your officers already know the battle plan. Good luck to us all.\"\n\n*page_break\nThe next few hours are a blur of shooting in the gun range to brush up on shooting, cleaning your weapons and packing the equipment needed for the mission. (Shooting +5\n*set shooting +5\n*if profession = \"Marksman\"\n    , Marksman +5)\n    *set marksman +5\n    *goto capturing\n*elseif profession = \"LMG\"\n    , LMG +5)\n    *set negev +5\n    *goto capturing\n*elseif profession = \"HMG\"\n    , HMG +5)\n    *set mag +5\n    *goto capturing\n*else\n    )\n    *goto capturing\n*label capturing\n*gosub_scene sub\nCapturing Hamtz needs to be done as quickly as possible, @{male his|her} location can change at any minute, leaving almost no time for any extra training or preparations.\n\nBy 0100 you find yourself on a helicopter, en route to Gaeva.\n\n*page_break 0130 15th January, 2022\nThe helicopter lands in a field 3 kilometers from the edge of Gaeva. Waiting for you at the landing site are two civilian trucks, their trunks already open.\n*line_break\nQuickly and efficiently, the entire company boards the vehicles. To your relief, you find that the trunk has had chairs installed. Small and cramped chairs, but chairs nonetheless.\n\nThe trucks make their way towards the old city, a walled-off area of Gaeva and a hotbed for Filo activity.\n\nThrough a small slit in the truck wall, you see the small, cramped houses of Gaevas old city. The green and yellow flag of the FFF flies on almost every roof. Anti-Regovian slogans and depictions glorifying the parade attack are spray-painted on walls and houses everywhere.\n\n\"${nick}, come closer\" Miller whispers.\n\n\n*if (profession = \"Fireteam leader\")\n    \"Are you ready for this?\" @{male he|she} asks \"This is the first command you will have in actual combat.\"\n    *choice\n        #\"Ready as I'll ever be.\"\n            You smile assuringly. \"I'm ready as I'll ever be.\"\n            *line_break\n            \"That's what I like to hear!\" Miller smiles \"Let's go get this bastard!\" (Miller +1)\n            *set pcrel +1\n            *goto e1.3 \n        #\"I'm mostly nervous.\"\n            \"I'm mostly nervous.\" You reply \"I hope everything goes to plan.\"\n            *line_break\n            \"I would be scared if you weren't nervous\" Miller smiles \"I trust you.\" (Miller +3)\n            *set pcrel +3\n            *goto e1.3\n        #\"Maybe it's better if I sit this one out.\"\n            \"Maybe it's better I sit this one out\" you mumble \"I don't know if I'm ready for this.\"\n            *line_break\n            \"Sit this one out? What the hell do you mean?\" Miller fumes \"This is your moment of truth! Get a grip on yourself and go back to your seat!\" (Miller -3)\n            *set pcrel -3\n            *goto e1.3\n*elseif (profession =  \"Medic\")\n    \"Do you have all your equipment?\" @{male he|she} asks \"I want to be prepared for the worst.\"\n    *line_break\n    *choice\n        #\"Don't worry, you can count on me.\"\n            \"Don't worry, you can count on me.\" You smile \"Have I ever let you down?\"\n            *line_break\n            Miller smiles back \"Let's get @{male him|her}.\" (Miller +1)\n            *set pcrel +1\n            *goto e1.3\n        #\"I might have forgotten my tourniquets.\" (Joke)\n            \"I might have forgotten my tourniquets.\" You quip \"Nothing too important.\"\n            *line_break\n            *if ((pcrel >=55) or (speech >=50))\n                Miller chuckles \"You're lucky I like you ${nick}.\" (Miller +3)\n                *set pcrel +3\n                *goto e1.3\n            *else\n                \"Are you kidding?!\" you forgot your tourniquets?\" Miller's eyes go wide.\n                *line_break\n                \"Relax, I'm just joking.\" you try to calm Miller.\n                *line_break\n                \"This really isn't the time ${nick}. Go back to your seat.\" (Miller -3)\n                *set pcrel -3\n                *goto e1.3\n*elseif (profession =  \"Marksman\")\n    \"Are you sure you're sights are zeroed in?\"\n    *choice\n        #\"Don't worry, you can count on me.\"\n            \"Don't worry, you can count on me.\" You smile \"Have I ever let you down?\"\n            *line_break\n            Miller smiles back \"Let's get @{male him|her}.\" (Miller +1)\n            *set pcrel +1\n            *goto e1.3\n        #\"Yes, but I might have forgotten my ammo.\" (Joke)\n            \"Yes, but I might have forgotten my ammo.\" You quip \"Nothing too important.\"\n            *line_break\n            *if ((pcrel >=55) or (speech >=50))\n                Miller chuckles \"You're lucky I like you ${nick}.\" (Miller +3)\n                *set pcrel +3\n                *goto e1.3\n            *else\n                \"Are you kidding?!\" you forgot your ammo?\" Miller's eyes go wide.\n                *line_break\n                \"Relax, I'm just joking.\" you try to calm Miller.\n                *line_break\n                \"This really isn't the time ${nick}. Go back to your seat.\" (Miller -3)\n                *set pcrel -3\n                *goto e1.3\n*else\n    \"Is all your equipment in order?\"\n    *choice\n        #\"Don't worry, you can count on me.\"\n            \"Don't worry, you can count on me.\" You smile \"Have I ever let you down?\"\n            *line_break\n            Miller smiles back \"Let's get @{male him|her}.\" (Miller +1)\n            *set pcrel +1\n            *goto e1.3\n        #\"Yes, but I might have forgotten my ammo.\" (Joke)\n            \"Yes, but I might have forgotten my ammo.\" You quip \"Nothing too important.\"\n            *line_break\n            *if ((pcrel >=55) or (speech >=50))\n                Miller chuckles \"You're lucky I like you ${nick}.\" (Miller +3)\n                *set pcrel +3\n                *goto e1.3\n            *else\n                \"Are you kidding?!\" you forgot your ammo?\" Miller's eyes go wide\n                *line_break\n                \"Relax, I'm just joking.\" you try to calm Miller\n                *line_break\n                \"This really isn't the time ${nick}. Go back to your seat.\" (Miller -3)\n                *set pcrel -3\n                *goto e1.3\n*label e1.3\n*page_break 0145 15th January, 2022\nOnce you enter the old city, the trunks open and the ${unit} exits quietly. You will have to make your way on foot in complete silence from now on.\n\n[i]\"TM40. On me.\"[/i] Miller's voice comes through your earpiece.\n*line_break\nYou follow Miller,\n*if (((profession = \"Marksman\") or (profession = \"Fireteam leader\")) or (profession = \"Medic\"))\n    your rifle constantly raised towards windows, searching for threats.\n    *goto e1.4\n*elseif profession = \"HMG\"\n    holding your FN MAG close to your body so that it won't give away your position by knocking into a wall or lamppost.\n    *goto e1.4\n*else\n    your light machine gun's butt underneath your armpit, ready to fire a burst at any sign of trouble.\n    *goto e1.4\n*label e1.4\n\n\"Freeze.\"\n*line_break\nYou crouch down, trying to make yourself unseen. A car passes right in front of you. You hope the driver didn't notice the team of dark figures crouched on the sides of the street.\n*temp tzemed \" \"\n\"This is the house. \n*if ((profession = \"LMG\") or (profession = \"HMG\"))\n    *goto stayoutside\n*else\n    *goto goinside\n*label stayoutside\n${nick}, we need your firepower outside if anything goes wrong, set up in that corner with someone. Open fire only if things go south.\"\n\nWho do you choose to stay with you?\n*choice\n    #@{male Abe|Mara}\n        \"@{male Abe|Mara}. Do you mind staying outside with me?\"\n        *line_break\n        *if aberel >=60\n            @{male Abe|Mara} straightens \"Not at all ${nick}. Let's take up position around that corner.\"\n            *set tzemed \"@{male Abe|Mara}\"\n            *goto e1.5\n        *else\n            @{male Abe|Mara} coughs. \"If I must.\"\n            *set tzemed \"@{male Abe|Mara}\"\n            *goto e1.5\n    #Sam\n        \"Sam. Do you mind staying outside with me?\"\n        *line_break\n        *if samrel >=60\n            Sam cracks @{male his|her} knuckles \"Sure thing. That corner looks like a good position.\"\n            *set tzemed \"Sam\"\n            *goto e1.5\n        *else\n            Sam shrugs \"Whatever.\"\n            *set tzemed \"Sam\"\n            *goto e1.5\n    #Zac\n        \"Zac. Do you mind staying outside with me?\"\n        *line_break\n        *if zacrel >=60\n            Zac smiles and shifts the weight of @{male his|her} rifle \"My pleasure. Let's take up position around that corner.\"\n            *set tzemed \"Zac\"\n            *goto e1.5\n        *else\n            You can almost hear Zac roll @{male his|her} eyes. \"If I have to.\"\n            *set tzemed \"Zac\"\n        *goto e1.5\n    *if (jimjimalive =true) #Someone else\n        \"Jimjim. Do you mind staying outside with me?\"\n        *line_break\n        \"No problem.\"\n        *set tzemed \"Jimjim\"\n        *goto e1.5\n*label e1.5\n*page_break\nYou and ${tzemed} take up positions in an alleyway near the targeted house.\n\nYou take a moment to get a closer look at the building your team is about to storm.\n*line_break\nThe easiest thing to notice is its size- it's tiny, no more than a shack set up against an existing building, you remember it isn't uncommon for poor Filo families to add small shacks to existing buildings but you have never actually seen one yourself.\n\nYour thoughts are cut off by a bang as the shack's door is kicked in and your team pours inside. You hear shouts and screams that are barely muffled by the thin metal walls of the shack.\n*line_break\n\nYou notice a figure on the roof directly in front of you, it is holding something that emits a faint glow.\n*choice\n    #Open fire\n        You don't hesitate, whoever it is probably trying to hurt you or your team, you fire a quick burst at the figure, causing it to fall backward, dropping the molotov cocktail it was holding on itself.\n        \n        The roof the figure was standing on bursts into flames.\n        *goto fireontheroof\n    #Shout at the figure\n        \"Hey you!\" you shout \"Get lost!\"\n        *line_break\n        The figure turns towards you, throwing the molotov cocktail it was holding directly at you and ${tzemed}.\n        \n        The bottle hits ${tzemed} directly in the chest, shattering and bursting in flames.\n        \n        \"Get it off! Get it off!\" ${tzemed} screams in panic dropping and rolling on the ground.\n        *choice\n            #Help @{male him|her}\n                You turn to help ${tzemed}, putting out the flames with your hands, thankful for the gloves you are wearing.\n                *goto wegothim\n            #Take out the terrorist\n                You remember Wardens uniforms are fireproof, and that it's more important to neutralize the threat.\n                *line_break\n                You quickly aim and shoot at your attacker, making sure @{male he|she} falls before turning to help ${tzemed}.\n                *goto wegothim\n    #Wait\n        You wait, looking to see what the figure will do.\n        \n        The figure waits a moment before throwing the molotov cocktail it was holding directly at the shack. The shack that has all of your teammates inside.\n        \n        As the bottle shatters on the ground, a pillar of fire rises from where it burst, hitting you with a wave of heat.\n        \n        When you turn your gaze to where the figure was, it is already gone.\n        *line_break\n        This can't be good.\n        *goto wegothim\n*label fireontheroof\n\n\"Shit.\" You murmur to yourself. No old city is known for its fireproofing, especially not one this close to being slums. If that fire isn't put out soon, the whole city could go up in flames.\n*page_break\n\"Miller!\" You report through the radio \"You need to finish up quick. Someone tried to throw a molotov cocktail at me, I shot @{male him|her}, but we have one roof one fire and I expect more trouble incoming.\"\n*line_break\n[i]\"Roger that. We got the target, moving out now.\"[/i]\n\nYou quickly scan the rooftops ahead for more threats. Everything seems quiet, but then again, you just fired a burst from a machine gun.\n*goto letsgo\n*label wegothim\n*page_break\nYour earpiece cackles. [i]\"We got the target, moving out now.\"[/i]\n\nYou quickly scan the rooftops ahead for more threats. Everything seems quiet.\n*goto letsgo\n*label letsgo\n\nThe team emerges with a @{male short bearded man|long haired woman}, @{male his|her} hands tied behind @{male his|her} back with cable ties and @{male his|her} eyes covered with gun cleaning cloth.\n\n\"Is that @{male him|her}?\" ${tzemed} asks Walker when you join the team.\n*line_break\n\"Sure is, they never look like much in real life, do they?\"\n\n\"May @{male he|she} burn for eternity.\" You hear @{male Abe|Mara} whisper, @{male his|her} eyes looking up to the sky.\n*goto walkstreet\n*label goinside\n\nWalker chooses two soldiers to stay outside with the rest of the company while the team prepares to breach the safehouse.\n\nYou take a moment to get a closer look at the building your team is about to storm.\n*line_break\nThe easiest thing to notice is its size- it's tiny, no more than a shack, you remember it isn't uncommon for poor Filo families to add small shacks to existing buildings but have never actually seen one yourself.\n\nYour thoughts are cut off by a bang as the shack's door is kicked in and your team pours inside. You hear shouts and screams that are barely muffled by the thin metal walls of the shack.\n*page_break Go inside\nThe inside of the shack is no more impressive than the outside.\n\nThe door opens into a small living room and kitchenette, with a small table and two couches doubling as beds for two children. Another two mattresses lie on the ground.\n*line_break\nThe four children you woke up, cry in fear when they see the uniformed soldiers storming their small shack.\n*line_break\nA door at the end of the room opens up to what appears to be the parents' bedroom. Blocking the door is a middle-aged @{male man|woman} shouting at Miller in heavily accented Regovian and not allowing @{male him|her} to enter the room.\n\n*choice\n    #Listen in\n        \"...sick, getting dressed slow.\" the @{male man|woman} says.\n        *line_break\n        \"I don't care if @{male she|he}'s dead!\" Miller shouts back \"Get out of my way!\"\n        *line_break\n        The @{male man|woman} spreads @{male his|her} arms, not allowing Miller to enter.\n        *choice\n            *selectable_if (strength >=10) #Force your way in (Strength)\n                You walk up to the @{male man|woman} and push @{male him|her}. Hard.\n                *line_break\n                @{male He|She} flies back, crashing to the ground and groans in pain. The children behind you scream and cry words in what you think is Sarian.\n                \n                You step over the @{male man|woman} into the room finding it empty besides a sickly @{male woman|man}, who is slowly putting on a pair of pants.\n                \n                When @{male she|he} sees you @{male she|he} covers herself up with @{male her|his} covers while shouting something in Sarian.\n                \n                You walk out of the room, \n                *if loyal\u003c50\n                    your head bowed in shame.\n                    *goto t1\n                *else\n                    *goto t1\n                *label t1\n                *goto livingroom\n            *selectable_if (speech >=70) #Convince the man to let you in. (Persuasion)\n                \"@{male Sir|Ma'am}, please, we only want to search the room for a dangerous fugitive. If @{male he|she} isn't there we can leave you and your family alone.\n                *line_break\n                \"I cannot let you in.\" @{male he|she} insists \"My @{male husband|wife} is there, getting dressed.\"\n                *line_break\n                \"I understand. perhaps you could shield @{male her|him} while we search then?\"\n                \n                The @{male man|woman} seems to think it over for a moment. \"One moment.\" @{male he|she} disappears in the room. \"Come in.\"\n                \n                You enter, finding the @{male man|woman} standing in the corner with @{male his|her} back to you, @{male his|her} hands spread to the side, holding a large blanket, behind which you assume is @{male his|her} undressed @{male wife|husband}.\n                \n                You walk out of the room.\n                *goto livingroom\n            #Search the living room\n                *goto livingroom\n    #Search the room\n        *label livingroom\n        *if (intelligence >=70)\n            You look around the room, it isn't that large, the only places you can think of that could hide a @{male man|woman} is under the...\n            *line_break\n            You rush toward one of the couches, pushing it aside and revealing a trap door. Classic.\n            \n            \"Get me a gun barrel over here!\" you shout. @{male Abe|Mara} rushes to you. \"What did you find?\"\n            *line_break\n            \"This.\" You open the trapdoor with a dramatic flourish, revealing a short, @{male bearded man| long-haired woman}, @{male his|her} hands shielding @{male his|her} face from the sudden light.\n            *goto arrested\n        *else\n            The room isn't that large. Where could someone hide?\n            \n            \"Get me a gun barrel over here!\" @{male Abe|Mara} shouts. You rush to @{male Abe|Mara}. \"What did you find?\"\n            *line_break\n            \"This.\" @{male He|She} opens the trapdoor with a dramatic flourish, revealing a short, @{male bearded man|long haired woman}, @{male his|her} hands shielding @{male his|her} face from the sudden light.\n            \n            Up close, you can't help but \n            *if loyal>51\n                smirk at the pathetic picture,\n            *if loyal \u003c50\n                feel sorry for @{male him|her},\n            Hamtz looks absolutely pathetic. @{male His|Her} unwashed and unkempt @{male beard|hair} as well as loose clothes and sweat-stained armpits make @{male him|her} look more like a refugee than the most wanted terrorist in Regovia.\n            *goto arrested\n*label arrested\n*page_break\nYou and @{male Abe|Mara} reach down into the secret underground compartment, grabbing the @{male man|woman} and dragging @{male him|her} out of @{male his|her} hiding spot.\n\n\"Hands where I can see them!\" @{male Abe|Mara} shouts, pointing @{male his|her} rifle at the @{male man|woman}s chest.\n*line_break\nThe @{male man|woman} seems to regain @{male his|her} composure. \"I am the @{male man|woman} you are searching for.\" @{male He|She} looks at your uniform for a few moments and smirks. \"Of course, the ${brigade} ${unit}. Always one step behind. You couldn't stop me before, I don't believe you will stop me now.\"\n*label confirm\n*choice\n    #Confirm @{male his|her} identity\n        You press the button on the side of your helmet, instantly sending a photograph of the @{male mans|womans} face to command.\n        *line_break\n        After waiting for a few seconds you hear the brigade commanders voice in your ear. [i]\"It's @{male him|her}. Arrest @{male him|her}.\"[/i]\n        *goto targetfound\n    *disable_reuse #Ask @{male him|her} what @{male he|she} means.\n        \"What do you mean?\" You ask.\n        *line_break\n        The @{male man|woman} smiles conspiratorially and offers you @{male his|her} hands.\n        *goto confirm\n    *disable_reuse #\"You stink.\"\n        \"You stink.\" You remark. (Loyal +1)\n        *set loyal +1\n        *line_break\n        The @{male Man|Woman} laughs for a long moment before spitting in your face. \"Now you do too.\"\n        *choice\n            #Slap @{male him|her}.\n                You feel your face redden. You slap @{male George|Georgia} across the cheek, almost sending @{male him|her} sprawling on the ground. @{male Abe|Mara} nods in approval. (Loyal +3)\n                *set loyal +3\n                *goto confirm\n            #Wipe the spit off.\n                Using your sleeve, you wipe the spit off. @{male Abe|Mara} shakes @{male his|her} head in disapproval) ([i]Luf[/i] +3)\n                *set loyal -3\n                *goto confirm\n*label targetfound\n\nYou place your pair of zipties on @{male George|Georgia}'s outstretched arms.\n\n[i]\"We have the target. Leaving now.\"[/i] Walker's voice sounds in your earpiece, temporarily giving a small reprieve from the crying children.\n\nYou and @{male Abe|Mara} hold @{male George|Georgia}'s hands, leading @{male him|her} through the remains of the door which is still hanging by the hinges. As you pass through, you push it slightly, causing it to fall on the street with a crash.\n*label walkstreet\n*page_break\nThe ${unit} walk briskly through the streets and alleyways, searching the rooftops for threats.\n\nLittle by little, you begin noticing civilians taking to the roofs shouting abuse at the ${unit}. As you advance through the twisting alleyways it slowly increases in volume until it reaches a roar as more and more civilians begin filling the rooftops around you, shouting, whistling and banging pots and pans, creating a cacophony of sound.\n\n\"Walk faster, pick up the target if @{male he|she} doesn't run fast enough.\" \n\nAll around you, the team slowly picks up pace, finally reaching a run. @{male George|Georgia} freezes, smiling at you.\n*choice\n    #Pick @{male him|her} up\n        *if strength >= 60\n            You easily pick @{male George|Georgia} up, swinging @{male him|her} on your back and breaking into a run.\n            *goto run\n        *else\n            You pick up @{male George|Georgia}, stumbling under the extra weight.\n            *goto badrun\n    #Press your gun into @{male George|Georgia}'s back.\n        \"If you don't pick up some speed I'll shoot you right here in the street.\" You shout, trying to sound threatening.\n        *line_break\n        @{male George|Georgia} bursts out laughing uncontrollably. \"I don't think you will.\" @{male He|She} shouts before ducking into an alley to your right.\n        \n        You try to run after @{male him|her}, but you are blocked by the tens of soldiers running forward.\n        *goto escaped\n*label badrun\nYou sway sideways, @{male George|Georgia} doesn't help, constantly shifting @{male his|her} weight to make your life harder. Finally, you fall.\n*line_break\n@{male George|Georgia} doesn't waste a moment, @{male he|she} stands up and runs into one of the nearby alleyways, disappearing from sight.\n\n*set georgegotaway 1\n\"After @{male him|her}!\" You vaguely hear Miller shout.\n\nYou stand up and run into the alley flanked by the rest of your team. However, the weight of your combat vests, as well as the small size of the alley slow you down. @{male George|Georgia} is nowhere to be found.\n*goto losthim\n*label escaped\n*set georgegotaway 1\n\"@{male He|She} got away!\" You shout \"Into the alley!\"\n\nEvery soldier within earshot turns and runs into the alley at once, banging into each other and falling to the ground in what could be a comical fashion if you could appreciate it.\n\nYou jump over your fallen comrades into the alley, franticly searching for the escaped terrorist.\n*goto losthim\n*label run\nThe team runs towards the rendezvous point with the truck that brought you to the old city but wherever you turn, you find yourself blocked by boulders, Filo civilians and masked Filo stone-throwers.\n\n\"Into that house! Break the door!\" \n*line_break\nYou hear a crash as someone smashes @{male his|her} rifle butt into a door handle, breaking it clean off and causing the door to swing open, revealing an old Filo couple.\n*line_break\n\"Herd them to that room!\" Miller points at the frightened couple \"Everyone inside!\"\n*line_break\nYou rush inside with the rest of TM40, taking cover from the flying stones and empty glass bottles.\n\n\"I can't believe this...\" You hear Walker whisper to Miller \"Hiding in a house from some kids with stones...\"\n*line_break\n\"I wouldn't discount stone-throwers, I've seen what they can do to a face.\" Miller replies. \"Get everyone set up defensively, we need to wait for support.\"\n*line_break\nWalker frowns. \"Why not use our concussion grenades? We have enough to make them disperse.\"\n*line_break\nMiller pauses for a moment, a thoughtful look on @{male his|her} face. \"You know what? That could work. Get everyone ready.\"\n*page_break 5 minutes later\n\"3...2...1...now!\"\n\nA resounding [b]Boom[/b] ripples and rebounds through the streets.\n*line_break\nAll at once, the team breaks through the door, running through the street full of Filo civilians holding their ears, the effect of the grenades greatly amplified by the echo from the small alleyways.\n\nYou run towards the open truck with what appears to be hundreds of Filo chasing you. You jump inside and the truck drives off.\n*goto returnfrommission\n*label losthim\n*page_break\nThe alley fills with shouting Filo civilians holding flashlights, blinding you and making it impossible to search for the @{male George|Georgia} Hamtz.\n\n\"Retreat to the truck, we lost @{male him|her}.\" Miller's voice comes through the radio. \"Keep together, I don't want to leave someone behind.\"\n\nThe team walks together towards the truck, flanked the whole way by jeering Filo.\n*goto returnfrommission\n*label returnfrommission\n*if georgegotaway = 0\n    *achieve gothim\n    The helicopter makes a stop on the way to Lead Tower to drop off @{male George|Georgia} Hamtz at Internal Security headquarters in Rusalim. When the helicopter rises from the roof of the building, Miller smiles and shakes your hand.\n    *line_break\n    \"I didn't get a chance to thank you before, you did a great job back there.\"\n    *fake_choice\n        #\"I was only doing my duty.\"\n            \"Combat soldiers don't get congratulated on a good job usually, enjoy it while it lasts.\"\n        #\"Thank you.\"\n            \"You deserve it.\" \n        #\"Anything for the Republic.\"\n            *set loyal +3\n            \"Anything for the Republic.\" (Loyal +3)\n            *line_break\n            Miller smiles even wider. \"That's what I like to hear!\"\n    *goto briefingroom\n*else\n    The helicopter is silent the entire way back to Lead Tower. The failure of the mission weighs heavily on everyone's minds.\n    *line_break\n    Only when you land Miller motions for you to stay behind.\n    \n    \"I didn't want to say this in front of everybody, but you let me down back there.\" @{male He|She} whispers. \"We were this close to ending this now. Who knows what other attacks @{male he|she} has planned.\"\n    *goto briefingroom\n*label briefingroom\n*page_break Lead tower, Briefing room\n*if georgegotaway = 0\n    Maj. Faraz greets the company warmly, shaking everyone's hands and laughing at everyone's jokes.\n    \n    \"I know everyone is tired.\" @{male He|She} begins when the entire company is seated. \"So I'll keep this short. I wanted to congratulate you on the successful mission. We captured an arch-terrorist responsible for \n    *if chanceofattack >= 1\n        thousands of deaths\n        *goto t2\n    *else\n        hundreds of deaths\n        *goto t2\n    *label t2\n    , I hope that helps sweeten your dreams tonight. As a reward for our success, tomorrow we have an even more important mission. Be here tomorrow at 1000. Good night.\"\n    *page_break\n    That night, your dreams are full of zipties and helicopters.\n    *goto goodnight\n*else\n    Maj. Faraz greets the company somberly, @{male his|her} hands crossed in front of @{male his|her} chest and @{male his|her} mouth frozen in a tight line.\n    \n    \"I know you are all tired and angry.\" @{male He|She} begins when the entire company is seated. \"Which is why I wanted to say a few words about our failed mission tonight. We were unsuccessful in capturing our target. I don't want you thinking and talking about who is to blame, trust me, it won't sweeten the taste of failure. Tomorrow we will have a chance at redeeming ourselves. Good night.\"\n    \n    *page_break\n    That night, your dreams are full of blinding lights and crying faces.\n    *goto goodnight\n*label goodnight\n*page_break Morning\nYou wake up and rub your eyes, someone is shaking you.\n*fake_choice\n    #\"Leave me alone.\"\n        \"Leave me alone.\" You mumble, still half asleep.\n    #\"What do you want?\"\n        \"What do you want?\" You mumble, still half asleep.\n    #\"Who is it?\"\n        \"Who is it?\" You mumble, still half asleep.\n\"It's me, Walker.\" The voice says \"Get up, you asked me to wake you up an hour before the briefing.\"\n*line_break\n\"Did I? I don't remember.\" You reply.\n*line_break\n\"Yup, do whatever you want with that information, I'm not sticking around.\"\n*choice\n    #Get up\n        You don't remember what it was you wanted to do, but you might as well use the time.\n        *goto usethetime\n    #Stay in bed\n        Whatever it was that made you ask to get up early can't be that important if you can't remember why you wanted to do it. You turn over and go back to sleep.\n        *page_break\ r.\" (@{male Abe|Mara} +5, Sam +5)\n                                    *set aberel +5\n                                    *set samrel +5\n                                    *goto gotobriefingabesam\n                                *else\n                                    @{male Abe|Mara} snorts \"Yeah, sure.\" (Sam +5)\n                                    *goto gotobriefingabesam\n                            *elseif (aberel >=55)\n                                \"Not everyone agrees with us, but don't worry ${nick}, I'm sure they'll come around.\" @{male Abe|Mara} smiles \"Right @{male Abe|Mara}?\"\n                                *line_break\n                                \"I would not count on it.\" @{male Abe|Mara} frowns. (Sam +5)\n                                *set samrel +5\n                                *goto gotobriefingabesam\n                            *else\n                                \"Of course, you really messed up back there. Don't know what you can do to get everybody's trust back now.\" @{male Abe|Mara} continues.\n                                *label maybetry\n                                *line_break\n                                \"Maybe try to actually be friends with your teammates.\" Sam snorts \"That oughta do it.\"\n                                *choice\n                                    #Answer back\n                                        *if speech >= 55\n                                            \"Maybe if I had teammates who were worth being friends with.\" You snap.\n                                            *line_break\n                                            Sam bites @{male his|her} lip. \"Sorry, I shouldn't have said that.\" (Success! Needed 50 persuasion!) (Persuasion +3) (Sam +3)\n                                            *set speech +3\n                                            *set samrel +3\n                                            *goto gotobriefingabesam\n
