he main route the parade will take. It is empty.\n        *goto apartment7.1\n    *disable_reuse #Search the living room\n        There is not much to search. You try to turn on the computer but it is locked.\n        *line_break\n        \"I forgot my password, I was planning on getting it cracked tomorrow.\" The @{male man|woman} apologizes with an embarrassed grin \"I can get forgetful sometimes.\"\n        *goto apartment7.1\n    *disable_reuse #Search the kitchen\n        You search the fridge. \n        \n        It is empty.\n        *goto apartment7.1\n    *disable_reuse #Go through the doorway\n        You go through the doorway and into a narrow corridor.\n        \n        There is a closed door to the left and a closed door to the right.\n        \n        \"That just my room and an extra, empty room. Nothing interesting.\"\n        *label apartment7.2\n        *choice\n            *disable_reuse #Search the empty room\n                    You enter the empty room.\n                    \n                    In the middle of the room is a single, 60 mm mortar.\n                    \n                    Suddenly, the @{male man|woman} pulls a knife from under @{male his|her} shirt.\n                    *line_break\n                    @{male He|She} moves to stab ${partner}.\n                    *choice\n                        #Raise your gun and fire\n                            You try and raise your gun, but the small size of the corridor doesn't allow you to raise and aim it properly.\n                            *line_break\n                            You can only watch as the knife descends on ${partner}.\n                            *line_break\n                            ${partner} raises @{male his|her} arm to block the knife.\n                            *line_break\n                            The knife misses ${partner}s neck but stabs @{male him|her} in the forearm.\n                            *line_break\n                            ${partner} groans in pain but manages to hit the @{male man|woman}s face with @{male his|her} other hand, causing the @{male man|woman} to stumble backwards and into you.\n                            \n                            You grab the @{male man|woman}s knife-wielding hand, twisting it and forcing the @{male man|woman} to drop the knife. You kick the knife away.\n                            *line_break\n                            The @{male man|woman} raises @{male his|her} hands. \"I surrender!\" @{male he|she} shouts.\n                            \n                            \"Not yet you don't!\" ${partner} shouts, kneeing the @{male man|woman} in the groin.\n                            *line_break\n                            The @{male man|woman} falls to the ground.\n                            *line_break\n                            ${partner} isn't done, you notice @{male he|she} is about to kick the @{male man|woman} again.\n                            *choice\n                                #\"${partner}! Stop!\"\n                                    *set loyal -5\n                                    \"${partner}! Stop!\" you shout, moving so that you stand between ${partner} and the downed @{male man|woman} \"Don't do it!\" ([i]Luf[/i] +5)\n                                    *line_break\n                                    \"Why not?\" ${partner} retorts \"No one has to know.\"\n                                    *choice\n                                        #Someone will find out\n                                            \"Someone will find out.\" You reply \"Don't get punished because of something stupid like this.\"\n                                            *line_break\n                                            ${partner} thinks for a moment. \"Fair enough. Let's get this idiot to Miller.\"\n                                            *goto c3\n                                        #It's wrong\n                                            *set loyal -5\n                                            \"It's wrong.\" You state \"@{male He|She} isn't a threat to us.\" ([i]Luf[/i] +5)\n                                            *line_break\n                                            ${partner} thinks for a moment before answering. \"Fair enough. Let's get this idiot and @{male his|her} mortar to Miller.\"\n                                            *goto c3\n                                #Don't intervene, serves the @{male man|woman} right\n                                    *set loyal +5\n                                    ${partner} kicks the @{male man|woman}.\n                                    *line_break\n                                    The @{male man|woman} shouts in pain. \"Please! Stop!\" \n                                    *line_break\n                                    ${partner} ignores the @{male man|woman}s pleas, kicking @{male him|her} until the @{male man|woman} is unconscious, a thin trickle of blood running down @{male his|her} head. (Loyal +5)\n                                    *line_break\n                                    \"That'll teach them.\" @{male Abe|Mara} smiles triumphantly. \"Let's get this idiot to Miller. Grab @{male his|her} legs.\"\n                                    *goto c3\n                        #Grab the knife\n                            You grab the @{male man|woman}s hand, not allowing @{male him|her} to use the knife.\n                            *line_break\n                            ${partner} uses the opportunity to punch the @{male man|woman} in the nose.\n                            *line_break\n                            The @{male man|woman} drops the knife, @{male his|her} hands go to @{male his|her} bleeding nose.\n                            *line_break\n                            ${partner} knees @{male him|her} in the groin, causing @{male him|her} to fall to the ground.\n                            \n eak\n                            You rush towards JiJi.\n                            *line_break\n                            \"Are you OK?\" you ask\n                            *line_break\n                            \"I've been worse.\" @{male he|she} mumbles, rubbing @{male his|her} head with one hand. \"I am bleeding quite a bit from my head.\"\n                            *goto killedguard\n            *if (speech >=60) #\"Isn't that a Sarian accent?\" (Persuasion)\n                The border guard falls silent for a moment.\n                *line_break\n                \"Sarian? I think you must be imagining things.\" @{male He|She} shrugs.\n                *line_break\n                \"I know a Sarian accent when I hear one.\" You remark, your eyes narrowing \"It might've made sense if you were from Lawan, but Cooper isn't a Lawaneese name. \"\n                *goto suspicion\n            *if (shooting >=60) #\"I didn't know border guards used outdated rifles.\" (Shooting)\n                The border guard falls silent for a moment.\n                *line_break\n                \"What do you mean?\" @{male He|She} tilts @{male his|her} head.\n                *line_break\n                \"You are holding a Greven rifle. The RDF doesn't use those anymore.\"\n                *goto suspicion\n            #Leave after all\n                *goto leavecrow\n*label leavecrow\n*page_break\n\"Thank you for taking this.\" JiJi says \"We'll be downstairs if you need anything.\"\n*line_break\nThe guard smiles \"No problem. Enjoy the free time.\"\n*set fakeborderpolice 1\n*goto lastpartcrow\n*label capturedguard\n*page_break\nYou radio Miller to meet you outside the Supreme Court. While you wait, JiJi suggests looking through the false guard's pockets.\n*line_break\nYou find a single phone with one contact- \"G\".\n\n\"A disguised border guard?\" Miller asks when @{male he|she} sees you with the restrained \"guard\" in tow. \"I would have never believed it if I wouldn't have seen it. Anyway, great job.\"\n*set chanceofattack -2\n*goto lastpartcrow\n*label killedguard\n*page_break\nYou radio Miller to meet you in the clock tower of the Supreme Court, explaining that you need more than two people to lower the body to the bottom floor. While you wait, ${partner} suggests looking through the dead \"guard\"s pockets.\n*line_break\nYou find a single phone with one contact- \"G\".\n\n\"A disguised border guard?\" Miller asks when @{male he|she} sees you. \"I would have never believed it if I wouldn't have seen it. Shame @{male he|she}'s dead, I'm sure @{male he|she} would be a treasure trove of intel.\"\n*set chanceofattack -1\n*goto lastpartcrow\n*label regular\n\"${nick} and JiJi! Get over here!\" Miller orders.\n*line_break\n\"JiJi, you are my best marks@{male man|woman}. I want you and ${nick} to go to the top of the Supreme Court clock tower. From up there you will have an excellent view of the parade. Keep an eye out for any trouble.\" Miller orders \"Good luck.\"\n*goto regular2\n*label lastpartcrow\n*page_break 1100, 14th of January, 2022\nYou return to the clock tower, the parade already in full swing, thousands of soldiers pass underneath the tower but you cannot spot anything of note.\n\n[i]\"${nick} from 40, ${nick} from 40.\"[/i] Your radio cackles [i]\"Come in ${nick}.\"[/i]\n*line_break\n\"This is ${nick}, continue 40.\" You reply.\n*line_break\n\"Some @{male Policeman|Policewomen} on Patriotism St needs help, it's right behind the Supreme Court. See what @{male he|she} needs and report back.\"\n*line_break\n\"Roger that, ${nick} out.\"\n*page_break \nYou and JiJi descend the clock tower and exit the Supreme Court towards Patriotism St.\n\nYou find the @{male Policeman|Policewomen} easily, @{male he|she} is standing at the back entrance of the Supreme Court, @{male he|she} appears uneasy, shifting @{male his|her} weight from one foot to the other.\n*line_break\n\"Hello. We understand you need some help?\" JiJi asks.\n*lin ing of note.\n*set chanceofattack -1\n*goto s8.2\n*label s8.2\nYou and ${partner} return to your previous position. You hope you weren't gone long enough for someone to get through your area of responsibility without you knowing.\n*set trashcanbomb 1\n*label s9\n*page_break 1100, 14th of January, 2022\nAccording to the plan, at 1100 you and ${partner} are supposed to climb the fire escape of the building behind you to take a look at the crowd from up high.\n\nYou roll your shoulders, readjusting the weight of your combat vest.\n*line_break\n\"Let's go\"\n\nWhen you reach the top of the fire escape you are greeted by a well-built Police Officer with short dark hair @{male and a large, thick beard|and trimmed painted nails}.\n\n\"How does everything seem from down there?\" @{male he|she} asks \"Hope it's not too boring.\"\n*line_break\n${partner} smirks. \"As boring as they come. At least we have a good show.\"\n*line_break\nThe Officer chuckles \"I agree, what about you son? Enjoying the show?\"\n*choice\n    *if (intelligence >= 50) #\"What are you doing here? I don't remember any police posted to this building.\" (intelligence > 50)\n        \"Guess they didn't update you then, the plan changed and now I get to enjoy this beautiful view of our magnificent army.\" The Officer replies with a smile.\n        *line_break\n        \"I don't think so.\" You press \"I would definitely be updated about a change like that. Can you show me your police ID?\"\n        *label ID11\n        *line_break\n        \"I outrank you, and I see no reason for me to show you anything.\"\n        *line_break\n        \"Anyone who refuses an ID search by a soldier can be detained until @{male his|her} identity can be ascertained.\" You quote \"Now, give me your ID.\"\n        *line_break\n        The Officer appears uncertain, ${partner} seizes the moment, tripping the Officer from behind, causing @{male him|her} to crash to the ground.\n        \n        \"You are resisting a lawful search!\" @{male He|She} shouts.\n        *if (loyal\u003c50)\n            , a bit too aggressively for your taste\n            *goto lawfulsearch\n        *else\n            *goto lawfulsearch\n        *label lawfulsearch\n        , holding @{male him|her} down.\n        *line_break\n        \"Where is your ID?\" ${partner} shouts again, placing handcuffs on the surprised Officer.\n        *line_break\n        \"What the hell? Who do you two think you are?\" @{male He|She} trembles.\n        \n        You flip over the Officer, searching @{male his|her} pockets but find no ID. You do find a burner phone with a single contact- \"G\".\n        \n        \"If you are an Officer\" ${partner} probes \"Where is your ID?\"\n        *line_break\n        The \"Officer\" remains silent.\n        \n        While waiting for Miller to arrive you sweep the rest of the rooftop, finding a large wooden box with neat rows of hand grenades inside.\n        *page_break\n        \"Great job ${nick}! Defiantly a disaster averted.\" Miller quips, slapping you on the back. \"All that's left now is to see what @{male he|she} gives up during interrogation, we might be able to gather some important intel.\"\n        *set chanceofattack -2\n        *goto theattackscouts\n    *if ((speech >= 50) and (loyal>=50)) #\"Is that a Filo accent? I didn't know they let you serve in the police\" (Speech > 50)\n        The Officer freezes. \"What did you just say?\" @{male He|She} says threateningly \"What are you playing at?\"\n        *line_break\n        Your hand reaches for your weapon. \"Can you show me your police ID?\"\n        *goto ID11\n    *if ((speech >= 50) and (50>loyal)) #Whisper to @{male Abe|Mara} \"Isn't that a Filo accent?\" (Speech > 50)\n        \"Good ear ${nick}, I think so too. I have an idea, keep @{male him|her} talking.\"\n        *line_break\n        \"Where did you say you were from?\" You ask\n        *line_break\n        \"Don't think I did. I'm from Lovary. Why do you ask?\"\ e Officers protests you walk towards the wooden box.\n                \n                \"${partner}, keep an eye on our friend here. No funny movements.\" You order.\n                *line_break\n                \"What the hell do you think you're doing!?\" the Officer protests \"I am an officer! Who is your commanding officer?\"\n                \n                You open the box. Inside, are two neatly arranged rows of standard-issue Regovian hand grenades.\n                *choice\n                    #Arrest the officer\n                        *label arrest\n                        *set chanceofattack -1\n                        \"Raise your hands above your head!\" You bark \"I am arresting you for terrorism.\"\n                        *line_break\n                        \"The hell you are!\" @{male he|she} roars, barreling into you.\n                        \n                        \n                        *if (strength >= 65)\n                            *set strength +3\n                            *goto thinkingquickly\n                        *elseif (handcombat >= 35)\n                            *set handcombat +5\n                            Thinking quickly, you grab @{male his|her} head and fling @{male him|her} sideways, using @{male his|her} momentum against @{male him|her}. (Success! Needed 60 strength or 20 hand to hand combat) (Hand to hand combat +5)\n                            *goto handy\n                            *label thinkingquickly\n                            Thinking quickly, you grab @{male his|her} head and fling @{male him|her} sideways, using @{male his|her} momentum against @{male him|her}. (Success! Needed 60 strength or 20 hand to hand combat) (Strength +5)\n                            *label handy\n                            *line_break\n                            @{male He|She} flies past you, head first, into the wall.\n                            *line_break\n                            @{male He|She} turns, blood streaking down @{male his|her} face.\n                            *line_break\n                            *choice\n                                #Aim your gun at @{male him|her}\n                                    You raise your gun, pointing it at @{male his|her} chest.\n                                    \n                                    \"I said. Put your hands up.\"\n                                    *line_break\n                                    \"Freedom or death!\" @{male he|she} bellows, launching @{male him|her}self at you again.\n                                    *line_break\n                                    Instinctively, you fire three shots at his chest. The shots tear through @{male him|her}, throwing @{male him|her} backwards.\n                                    *line_break\n                                    Blood spurts from his chest, pooling around @{male him|her}.\n                                    *line_break\n                                    @{male He|She} doesn't move.\n                                    *if profession = \"Medic\"\n                                        *line_break\n                                        You check @{male his|her} pulse, you don't feel anything. (Medic +1)\n                                        *set medic +1\n                                        \n                                        *goto n0\n                                    *else\n                                        *goto n0\n                                    *label n0\n                                    \"Shit\" ${partner} blurts \"I'll radio Miller.\"\n                                    *goto deadpolice\n                                #Overpower @{male him|her}\n                                    *if (strength >= 75)\n                                        *set strength +3\n                                        You throw your gun behind your back, punching the crazed \"Officer\" when @{male he|she} gets close enough. @{male He|She} falls at your feet. (Success! Needed 75 strength or 45 hand to hand combat) (Strength +3)\n                                        *goto youthrow\n                                    *elseif (handcombat >= 45)\n                                        *set handcombat +5\n                                        You throw your gun behind your back, punching the crazed \"Officer\" when @{male he|she} gets close enough. @{male He|She} falls at your feet. (Success! Needed 75 strength or 45 hand to hand combat) (Hand to hand combat +5)\n                                        *goto youthrow\n                                        *label youthrow\n                                        *line_break\n                                        \"${partner}! Radio Miller!\" you place handcuffs on the unconscious figure.\n                                        *set chanceofattack -1\n                                        *goto arrestedofficer\n                                    *else\n                                        You try to punch the crazed \"officer\" but @{male he|she} evades your punch, colliding with you and causing you both to fall.\n                                        *line_break\n                                        You grab your pistol from your holster and fire two bullets into @{male his|her} chest. @{male He|She} goes limp.\n                                        *line_break\n                                        You roll over, dumping the body to your side.\n                                        \n                                        \"${nick}! Are you OK?\" ${partner} asks\n                                        *line_break\n                                        \"Yes, I'm fine. \"you answer \"Radio Miller, tell @{male him|her} what happened\"\n                                        *goto deadpolice\n                        *else\n                            You are unable to react fast enough as @{male he|she} knocks you down. (Needed 70 strength or 40 hand to hand combat)\n                            *line_break\n                            ${partner} waits for the \"Officer\" to get up before shooting @{male him|her}.\n                            *line_break\n                            The \"Officer\" falls to the ground, a pool of blood forming around @{male his|her} unmoving body.\n                            *goto n0\n                    #Ask for an explanation\n                        \"How do you explain this?\"\n                        *line_break\n                        \"I don't need to explain myself to a kid!\"\n                        *line_break\n                        *goto arrest\n*label leave\n*set fakepoliceman 1\nYou and ${partner} take the steps down again. Reassuming your position close to the civilians.\n*page_break\n\"How's it going?\" You hear Miller say from behind you \"Hope it's not too boring for you.\"\n*line_break\n\"Nah, I'm enjo-\"\n*goto theattackscouts\n*label deadpolice\n*page_break\nMiller arrives in less than five minutes.\n\n\"Great job finding this!\" @{male He|She} says, slapping you on the back \"Shame we couldn't question @{male him|her}, see if @{male he|she} knows anything. Personally, I'm just glad we have one less Filo terrorist walking around. The police will have to explain how someone managed to get their hands on a uniform, lucky@{male he|she}couldn't get @{male his|her} hands on a pistol or we would be in much bigger trouble.\"\n\nA quick search of the body and rooftop find a burner phone with one contact- \"G\".\n*goto theattackscouts\n*label arrestedofficer\n*page_break\nMiller arrives in less than ten minutes, enough time for the \"officer\" to wake up.\n\n\"Great job ${nick}! Definitely a disaster averted.\" Miller quips, slapping you on the back. \"Let's see what @{male he|she} gives up during interrogation, we might be able to gather some important intel.\"\n\nA quick search of the rooftop and the \"officer\" find a burner phone with one contact- \"G.\"\n*goto theattackscouts\n*label sapper2\nThe smell of the sewers still sticks to you and the rest of TM40, not wanting to spoil the holiday for the citizens, TM40 is ordered to keep their distance from the main parade, setting up checkpoints for cars that want to drive on roads parallel to the Parade.\n\n\"I know this isn't the most prestigious job.\" Miller explains \"But it is important. If a terrorist passes this checkpoint and drives south on this road-@{male he|she} or @{male she|he} can easily sneak into that alleyway and pop up within spitting distance of the Supreme Court. Our orders are only to allow full citizens through, everyone else has to go around.\"\n*line_break\nMiller surveys the team. \"Because this is such an important job I am entrusting it to JiJi, Shorty, ${nick} and \n*if (profession = \"Fireteam leader\")\n    Zac. The commander of this checkpoint will be ${nick}. Good luck.\" Miller turns to leave but turns back at the last moment, slapping @{male his|her} forehead \"I almost forgot. ${nick}, come to speak with me for a moment please.\"\n    *set checkpost 1\n    \n    \"Listen ${nick}, I am trusting you with this important mission. It is critical that you only allow citizens through. No matter what sob story non-citizens will try to sell you- you can't let them through. Understood?\"\n    *fake_choice\n        #Yes, @{male Sir|Ma'am}!\n            *set pcrel -1\n            \"I thought I made it clear I don't want to be called @{male sir|ma'am}!\" Miller huffs. (Miller -1)\n        #No problem\n            \"That's the spirit!\" (Miller +1)\n            *set pcrel +1\n    *goto checkpostcommander\n*else\n    @{male Abe|Mara}. The commander of this checkpoint will be @{male Abe|Mara}. Good luck.\" Miller turns to leave.\n    *goto checkpost\n*label checkpostcommander\n*page_break\nYou survey the area you are supposed to turn into a checkpoint, your first command.\n\n\n*if (loyal >= 70)\n    What an honor! Your first real command in the RDF!\n    *goto sa2\n*elseif ((loyal>=50) and (loyal \u003c= 70))\n    A first real command! How exciting!\n    *goto sa2\n*elseif ((loyal\u003c50) and (loyal >= 30))\n    You had hoped for something a bit more...important as your first command.\n    *goto sa2\n*else\n    Controlling a checkpoint to keep non-citizens out? Classic RDF...\n    *goto sa2\n*label sa2\n*page_break\nYou set up the checkpoint, spikes are laid on the road, JiJi and Shorty take covering positions behind temporary cover on the sides of the road while you and Sam wait for cars to arrive.\n\nBefore long they do. \n*page_break\nA green car approaches, you signal for it to stop.\n\n\"Good morning, ID please.\" Sam requests\n*line_break\nA middle-aged man sits in the front seat, a woman lies in the back, she appears to be in pain.\n*line_break\n\"We need to pass quickly!\" the man cries.\n*line_break\n\"We need to see your IDs\" Sam states\n*line_break\n\"We have to pass through.\" The man explains excitedly, handing you their IDs \"My wife is about to give birth. We need to get to a hospital fast!\"\n*line_break\nSam passes the IDs to you, shaking @{male his|her} head to indicate that they are not citizens.\n*choice\n    #Don't let them pass\n        \"I'm sorry.\" You explain \"Only citizens are allowed through here for the duration of the parade.\"\n        *line_break\n        \"Please @{male sir|ma'am}\" The man begs \"Our last son died during birth. You must let us through!\"\n        *choice\n            #Relent, let them pass\n                *label letthemgo\n                *set checkpostbomb 1\n                You return their IDs. ([i]Luf[/i] +10)\n                *set loyal -10\n                \n                \"Go\n                *if loyal\u003c50\n                    , good luck!\"\n                    *goto sa3\n                *else\n                    .\"\n                    *goto sa3\n                *label sa3\n                *line_break\n                \"You- You let them through!\" Sam stammers, his face red \"What if they blow up the Supreme Court? What will you do then?\"\n                *line_break\n                *choice\n                    #It was the right thing to do\n                        \"It was the right thing to do.\" You explain \"What if she gave birth and her baby died right here? What would you have done then?\"\n                        *line_break\n                        Sam huffs \"You better hope nothing happens. It's on you if someone dies today.\" (Sam -5)\n                        *set samrel -5\n                        *goto sa4\n                    #I don't have to explain myself to you\n                        \"I don't have to explain myself to you!\" You retort \"I am the Fireteam leader, and I make the decisions here.\"\n                        *line_break\n                        Sam huffs \"You better hope nothing happens. It's on you if someone dies today.\" (Sam -5)\n                        *set samrel -5\n                        *goto sa4\n            #Remain adamant, don't let them through\n                *if loyal\u003c50\n                    \"I really am sorry, I can't let you through. You have to go the long way around\"\n                    *line_break\n                    The man takes the IDs back from you, leaving without another word.\n                    *set chanceofattack -2\n                    *goto sa4\n                *else\n                    \"Didn't you hear what I said? You can't drive here! Go around!\"\n                    *label spit\n                    \n                    \n                    The man takes the IDs back from you, spitting on the ground near your feet and leaving without another word.\n                    *set chanceofattack -2\n                    *choice\n                        #Write down his license plate to report later\n                            You write down the vehicle's license plate, a non-citizen can't be allowed to spit at a soldier without paying a price. (Loyal +7)\n                            *set loyal +7\n                            *goto sa4\n                        #Let it go\n                            An action taken in anger shouldn't destroy a life. ([i]Luf +7[/i])\n                            *set loyal -7\n                            *goto sa4\n    #Let them through\n        *goto letthemgo\n*label checkpost\n*page_break\nYou set up the checkpoint, spikes are laid on the road, JiJi and Shorty take covering positions behind temporary cover on the sides of the road while you and @{male Abe|Mara} wait for cars to arrive.\n\nBefore long they do. \n*page_break\nA green car approaches, you signal for it to stop.\n\n\"Good morning, ID please.\" You offer your open hand.\n*line_break\nA middle-aged man sits in the front seat, a woman lies in the back, she appears to be in pain.\n*line_break\n\"We need to pass quickly!\" The man cries.\n*line_break\n\"We need to see your IDs\" You state, keeping your voice clear of emotion.\n*line_break\n\"We have to pass through.\" The man explains excitedly, handing you their IDs \"My wife is about to give birth. We need to get to a hospital fast!\"\n*line_break\nYou pass the IDs to @{male Abe|Mara}, shaking your head to indicate that they are not citizens.\n\n\"I'm sorry\" @{male Abe|Mara} explains \"Only citizens are allowed through here for the duration of the parade.\"\n*line_break\n\"Please @{male sir|ma'am}\" The man begs \"Our last son died during birth. You must let us through!\"\n*choice\n    #Convince @{male Abe|Mara} to let them pass\n        *set loyal -10\n        *if speech >= 60\n            \"Come on @{male Abe|Mara}.\" you whisper \"We can't let their son die in our checkpoint. Imagine if this was someone from your family.\" ([i]Luf[/i] +10) \n            *line_break\n            @{male Abe|Mara} pauses, biting @{male his|her} lower lip. \"Alright\" @{male he|she} says, turning towards the family \"You can pass.\" (Success! Needed 60 Persuasion) (Persuasion +3)\n            *set speech +3\n            *line_break\n            \"A million million blessings upon you!\" The man shouts before passing the checkpoint.\n            *set checkpostbomb 1\n            *goto sa4\n        *else\n            \"Come on @{male Abe|Mara}.\" you whisper \"We can't let their son die in our checkpoint. Think of the consequences!\" ([i]Luf[/i] +10) \n            *line_break\n            \"The consequences? The consequences could be a bomb going off inside the Supreme court or on some innocent civilian!\" (Needed 60 speech)\n            \n            @{male Abe|Mara} turns to the driver. \"I am sorry, but you cannot pass through here. Find another way.\"\n            *goto spit\n    #Remain silent\n        *goto spit\n    #Agree with @{male Abe|Mara}\n        *set loyal +10\n        \"Didn't you hear @{male him|her}?\" You take a step towards the vehicle \"Find another way! (Loyal +10)\n        *goto spit\n*label sa4\n*page_break 1130, 14th of January, 2022\nAfter an hour of manning the checkpoint, TM40 is withdrawn.\n\n\"That is the nature of a reserve force,\" Miller explains \"Whatever comes up becomes our responsibility.\"\n\nThis time, a minor protest broke out near the President's house. TM40 is tasked with keeping the protest away from the parade and house until military police can arrive.\n*page_break\nThe protest is small, with only 20 or so people standing, shouting slogans and waving signs.\n\n\"Shame we can not just arrest them all.\" @{male Abe|Mara} whispers to you \"Would solve a lot of problems in this country.\"\n*fake_choice\n    #\"We can't do that, free speech needs to be protected. Including from those we disagree with.\"\n        \"Free speech needs to be a right reserved for those who have served. A shame the government doesn't see that.\" @{male Abe|Mara} responds ([i]Luf[/i] +5)\n        *set loyal -5\n    #\"Things would be easier if those [i]Luf[/i] idiots would keep quiet.\"\n        @{male Abe|Mara} nods (Loyal +5)\n*label sa5\n\nSuddenly, you notice one of the protesters, a short, brown-skinned, attractive @{male woman|man} place @{male her|his} sign on the ground and slowly back away. The next time you look, @{male she|he} is gone.\n*choice\n    #Go check it out with @{male Abe|Mara}\n        \"Hey @{male Abe|Mara},\" you whisper, grabbing @{male his|her} shirt \"I saw something, follow me.\"\n        \n        @{male Abe|Mara} and you slowly circle the protesters while you explain what you saw.\n        *line_break\n        \"Is that @{male her|him}?\" @{male Abe|Mara} asks, pointing to a @{male woman|man} slipping into a nearby four story building.\n        *line_break\n        \"Yes! After @{male her|him}!\"\n        \n        The building seems to be a boutique hotel, you enter the lobby, where you see the @{male woman|man} waiting for the elevator.\n        *line_break\n        \"Can we help you?\" @{male Abe|Mara} asks.\n        *line_break\n        The @{male woman|man} smiles sweetly at @{male Abe|Mara} \"I was just looking for the bathroom.\" @{male She|He} replies, @{male her|his} hand reaching into @{male her|his} pocket.  \"Here is my ID.\"\n        *line_break\n        \"It appears to be real.\" @{male Abe|Mara} says while handing the documents to you.\n        \n        You search the ID for anything suspicious but find nothing.\n        \n        \"I think @{male she|he}'s clean.\" @{male Abe|Mara} whispers to you \"But I do think we could be much more effective if we went up to the roof. We could get a much better lay of the area.\"\n        *choice\n            #Search @{male her|him}\n                *goto searchwoman\n            #Arrest @{male her|him}\n                *goto arrestwoman\n            #Let @{male her|him} go\n                *goto letwomango\n    #It's probably nothing\n        *goto donothing\n*label searchwoman\n\"Hands against the wall!\" you declare \"We want to search you.\"\n*line_break\n\"Search me? I know my rights. Unless you have an urgent reason, only a @{male woman|man} can search me.\"\n*line_break\n\"@{male She|He}'s right.\" @{male Abe|Mara} whispers again \"Let @{male her|him} go @{male man|}. We have bigger fish to fry.\"\n*choice\n    #Arrest @{male her|him} instead\n        *label arrestwoman\n        \"You are under arrest.\" You announce \"Give me your hands!\"\n        *line_break\n        The @{male woman|man} laughs. \"Under arrest? On what charges?\"\n        *line_break\n        \"Look.\" @{male she|he} looks at you, an amused smile on @{male her|his} face \"We both know we are wasting each other's time, so why don't you just move on and bother someone else?\"\n        *choice\n            #Give up\n                You know when you are beaten.\n                \n                \"Come on @{male Abe|Mara}, let's go upstairs.\" You say, loudly enough for the @{male woman|man} to hear.\n                *goto goupstairs\n            #Proceed with the arrest\n                *label proceedwiththearrest\n                *set loyal +10\n                You waste no time. You grab the @{male woman|man} by the wrists, dragging @{male her|him} close to you. (Loyal +10)\n                *line_break\n                Before @{male she|he} can resist you place handcuffs on @{male her|him}.\n                *line_break\n                \"Why do you think you are doing!?\" @{male she|he} screams \"This is an illegal arrest!\"\n                \n                In the middle of the commotion, Walker barges in.\n                *line_break\n                \"${nick}! What the hell are you doing?!\" (Walker -10)\n                *set sgtrel -10\n                *line_break\n                \"@{male She|he} was behaving suspiciously, walking away from the protest and snooping around.\" You try to explain.\n                *line_break\n                \"Snooping around? What is wrong with you? Let @{male her|him} go!\" @{male he|she} commands and turns to the @{male woman|man}, freeing @{male her|his} hands from the handcuffs. \"I am very sorry for my soldiers' behavior,\" @{male she|he} apologizes \"we will deal with @{male him|her} harshly.\"\n                *line_break\n                The @{male woman|man} leaves, stopping at the door to give you the finger.\n                *page_break\n                \"You do realize what trouble you could have put yourself in? If @{male she|he} had gotten your name or filmed you- who knows what could have happened!\" Walker pauses to catch @{male his|her} breath. \"After we go back to Lead Tower you are on kitchen duty until further notice.\"\n                *goto theattacksappers\n    #Let @{male her|him} go\n        \"You're right,\" You reply \"Let's go upstairs.\"\n        *goto goupstairs\n*label letwomango\n\"I agree\" you whisper back \"Let's go.\" (@{male Abe|Mara} +3)\n*set aberel +3\n\nYou return the @{male womans|mans} ID and begin to climb a nearby flight of stairs.\n*goto goupstairs\n*label donothing\nJust when decide it's probably nothing of note, Walker walks up to you.\n\n\"Hey ${nick}, I need you and @{male Abe|Mara} to go up that building over there- take a look around the protest, radio me if you see anything.'\n*line_break\n\"Sure thing.\"\n*goto goupstairs1\n*label goupstairs1\nYou and @{male Abe|Mara} climb a flight of stairs of a nearby building.\n*label goupstairs\n*page_break\nWhen you reach the top of the stairs you are greeted with a roof with a view of the entire protest and surrounding buildings.\n\nThe roof is filled with junk. Upturned cardboard boxes and buckets are scattered across the roof, a large garden hose snakes through the litter from one side of the roof to the other.\n*choice\n    #Search the roof\n        You turn to @{male Abe|Mara}. \"Let's search the roof before we concentrate on the protest.\"\n        *line_break\n        \"I agree, we need to secure ourselves before we can secure others.\"\n        \n        @{male Abe|Mara} and you look around the roof, searching for anything of note. \n        \n        \n        \"${nick},\" @{male Abe|Mara} calls \"I have a feeling about this roof, we should look at it some more.\"\n        *line_break\n        \"Every moment that we don't watch the protest is a moment something can happen.\" You reply.\n        *line_break\n        \"I know, but I still think we should search more. It's up to you, what do you think we should do?\"\n        *choice\n            #Continue searching\n                @{male Abe|Mara} and you continue searching the roof methodically, upturning every box and bucket and searching and nook and cranny. \n                \n                You finally find what you were looking for.\n                \n                Underneath one of the last boxes is a wooden crate.\n                *label openitsa\n                *choice\n                    *disable_reuse #Report it\n                        \"@{male Abe|Mara}, radio Miller, tell @{male him|her} we found a wooden crate hidden under some boxes.\"\n                        *line_break\n                        \"Will do.\" @{male Abe|Mara} reports before putting the radio near @{male his|her} lips. \"40 from @{male Abe|Mara}. 40 from @{male Abe|Mara}. Come in 40.\"\n                        \n                        No response.\n                        *line_break\n                        \"40 from @{male Abe|Mara}. 40 from @{male Abe|Mara}. Come in 40.\"\n                        *line_break\n                        Again, nothing.\n                        \n                        \"@{male He|She} must be busy with the protest\" @{male Abe|Mara} apologizes \"Too bad @{male he|she} 's out of earshot...\"\n                        *goto openitsa\n                    #Open it\n                        You and @{male Abe|Mara} use your commando knives to open the crate.\n                        \n                        Inside, a neat row of hand grenades rest on a hay padding.\n                        \n                        \"Holy shit.\" @{male Abe|Mara} exclaims.\n                        *line_break\n                        \"You got that right\" You reply.\n                        *line_break\n                        \"Let's take them to Miller. @{male He|She}'ll know what to do.\"\n                        *choice\n                            #Take them to Miller\n                                *set chanceofattack -1\n                                You show Miller the crate. To your surprise, @{male he|she} is angry.\n                                \n                                \"Are you kidding me? Why did you leave instead of ambushing whoever put them there! Whoever it is, probably has another stash somewhere.\" Miller rubs @{male his|her} face \"Military police should arrive in any moment anyway. We'll report this to them, maybe they can catch whoever it was.\" \n                                *set grenaderoof 1\n                                *goto theattacksappers\n                            #Wait on the roof\n                                \"No, let's wait for whoever placed these here. @{male He|She} or @{male she|he} will come get them soon, it'll be an excellent chance to catch them.\"\n                                *line_break\n                                \"Good idea!\" @{male Abe|Mara} replies excitedly. (@{male Abe|Mara} +3)\n                                *set aberel +3\n                                \n                                Together, you place some of the boxes in a way that will allow you to keep an eye on the crate while still staying hidden.\n                                \n                                *page_break 10 minutes later\n                                A figure wearing a trench coat quickly climbs the stairs and heads towards the box.\n                                \n                                *label mysteryfigure\n                                *choice\n                                    #Tackle the figure from behind\n                                        *if (strength >=70)\n                                            You move fast, jumping the figure from behind and quickly placing your knee on its head to keep it down. (Success! Needed 70 strength or 45 hand to hand combat) (Strength +3)\n                                            *set strength +3\n                                            *goto succesfulltackle\n                                        *elseif (handcombat >=45)\n                                            You move fast, jumping the figure from behind and quickly placing your knee on its head to keep it down. (Success! Needed 70 strength or 45 hand to hand combat) (Hand to hand combat +5)\n                                            *set handcombat +5\n                                            *goto succesfulltackle\n                                        *elseif ((strength >=65) or (handcombat >=40))\n                                            You move fast, tripping the figure from behind. The figure falls to the ground but reacts quickly. It stands up and tries to punch you.\n                                            *line_break\n                                            You hear the crack of a gunshot from behind you.\n                                            *line_break\n                                            The figure falls, holding its thigh.\n                                            *line_break\n                                            You turn, @{male Abe|Mara} stands with a smoking pistol in @{male his|her} hand.\n                                            *line_break\n                                            \"Thanks.\" you say shakily.\n                                            *goto semisuccesfulltackle\n                                        *else\n                                            You jump on the figure, trying to tackle @{male him|her} from behind.\n                                            *line_break\n                                            The figure turns at the last moment, kneeing you in the groin and causing you to fall to the ground.\n                                            *line_break\n                                            You hear the crack of a gunshot from behind you.\n                                            *line_break\n                                            The figure falls, a single bullet in its forehead.\n                                            *line_break\n                                            You turn, @{male Abe|Mara} stands with a smoking pistol in @{male his|her} hand.\n                                            *line_break\n                                            \"Thanks\" you groan, still clutching your crotch.\n                                            *goto unsuccesfultackle\n                                    #Shoot the figure in the leg\n                                        *if shooting >=60\n                                            You carefully take aim and fire a single bullet at the figure's ankle.\n                                            *line_break\n                                            The bullet hits exactly where you wanted it to. The figure crashes to the ground, screaming in pain and clutching its foot. (Success! Needed 60 shooting.) (Shooting +5\n                                            *if profession = \"Marksman\"\n                                                *set marksman +3\n                                                , @{male Marksman|Markswoman} +3)\n                                                *goto wantedittoo\n                                            *else\n                                                )\n                                                *goto wantedittoo\n                                            *label wantedittoo\n                                            *set shooting +5\n                                            *goto succesfulhit\n                                        *elseif shooting >=50\n                                            You aim and fire a bullet at the target's leg. \n                                            *line_break\n                                            The bullet hits the target in the thigh. A spurt of blood shoots out. The figure crashes to the ground, screaming in pain and clutching its thigh. (Needed 60 shooting) (Shooting +3\n                                            *if profession = \"Marksman\"\n                                                *set marksman +3\n                                                , @{male Marksman|Markswoman} +3)\n                                                *goto thigh\n                                            *else\n                                                )\n                                                *goto thigh\n                                            *label thigh\n                                            *set shooting +3\n                                            *goto semisuccesfulltackle\n                                        *else\n                                            You aim and fire a bullet towards the target's leg.\n                                            *line_break\n                                            The bullet misses @{male his|her} thigh, hitting @{male him|her} in the lower back. The figure crashes to the ground, screaming in pain and holding their stomach. (Needed 50 or 60 shooting)\n                                            *goto unsuccesfulhit\n            #That's enough, let's concentrate on the task at hand\n                *label stayonmission\n                \"No, we should concentrate on Miller's mission for us. The rest is just a sideshow.\"\n                *line_break\n                @{male Abe|Mara}s lip thin into a line. \"If you say so.\"\n                \n                Even from only four stories up you can see how small the protest is. TM40 outnumbers the protesters by a fair margin.\n                \n                Suddenly, you hear a wooden creak from behind you.\n                *line_break\n                Turning around, you see a figure in a trench coat hunched over a wooden crate, attempting to open it with what appears to be a crowbar.\n                *goto mysteryfigure\n    #Continue the mission, only focus on the protest\n        *goto stayonmission\n*label succesfulltackle\n*page_break\nThe figure under your knee groans.\n*label gothim\n*line_break\n@{male Abe|Mara} puts the figure's wrists in handcuffs and helps the figure sit up.\n\n\"I'm guessing you don't have ID on you?\" @{male Abe|Mara} taunts.\n*line_break\nThe figure spits on @{male Abe|Mara}s face, hitting @{male him|her} in @{male his|her} right eye.\n*line_break\n\"Why you-\" @{male Abe|Mara} rages \"I'll show you respect!\"\n\n@{male Abe|Mara} grabs the figure's head and is about to smash it into the wooden crate.\n*choice\n    #\"@{male Abe|Mara}! Stop!\"\n        *set loyal -5\n        \"@{male Abe|Mara}! Stop!\" you shout, grabbing @{male Abe|Mara}s hand \"Don't do it!\" ([i]Luf[/i] +5)\n        *line_break\n        \"Why not?\" @{male Abe|Mara} retorts \"No one has to know.\"\n        *choice\n            #Someone will find out\n                \"Someone will find out.\" You reply \"Don't get punished because of something stupid like this.\"\n                *line_break\n                @{male Abe|Mara} thinks for a moment. \"Fair enough. Let's get this idiot to Miller.\"\n                *goto capturedfigure\n            #It's wrong\n                *set loyal -5\n                \"It's wrong.\" You state \"They are not a threat to us.\" ([i]Luf[/i] +5)\n                *line_break\n                @{male Abe|Mara} thinks for a moment. \"Fair enough. Let's get this idiot to Miller.\"\n                *goto capturedfigure\n    #Don't intervene, serves them right\n        *set loyal +5\n        @{male Abe|Mara} smashes the figure's head on the wooden box so hard the crate cracks. (Loyal +5)\n        *line_break\n        The figure goes limp, a thin trickle of blood going down its forehead.\n        \n        \"That'll teach them.\" @{male Abe|Mara} smiles triumphantly. \"Let's get this idiot to Miller. Grab its legs.\"\n        *goto capturedfigure\n*label semisuccesfulltackle\n*page_break\n*if (profession = \"Medic\")\n    Thinking quickly, you grab a tourniquet from your combat vest and stop the bleeding. (Medic)\n    *goto m1\n*else\n    The blood from the figure's wound comes out in short bursts, causing a pool of blood to form near its leg.\n    *line_break\n    \"Shit!\" @{male Abe|Mara} shouts, fumbling with @{male his|her} combat vest. \"Grab a tourniquet!\" @{male He|She} shouts.\n    \n    Working together, you manage to place a tourniquet on the figure. Unfortunately, until you do the figure has lost too much blood.\n    \n    You check for a pulse, there is none.\n    *line_break\n    \"Could have been worse.\" @{male Abe|Mara} exhales \"Let's get the crate and whoever this is to Miller.\"\n    *goto stomachwound\n*label m1\n\n\"Great job\" @{male Abe|Mara} remarks \"Let us get the crate and whoever this is to Miller.\"\n*goto capturedfigure\n*label unsuccesfultackle\n*page_break\n*label stomachwound\n\"At least we have one less terrorist. Shame we can't interrogate them though.\"\n\nYou and @{male Abe|Mara} perform a quick search of the body, finding a single burner phone.\n\n\"The phone is empty, it has only one contact- \"G\".\"\n\n\"We should get the phone, crate and body to Miller.\" You state \"But I think we are going to need some help.\"\n*goto deadterrorist\n*label succesfulhit\n*page_break\nYou and @{male Abe|Mara} rush towards the figure. Besides being unable to stand, the figure appears to be unharmed. The bullet went through the ankle but you can see no blood pool.\n*goto gothim\n*label unsuccesfulhit\n*page_break\nBlood seeps out between its hands and congregates on the floor around the figure.\n*line_break\nYou and @{male Abe|Mara} rush towards the figure, but there is nothing you can do.\n*if (profession = \"Medic\")\n    \n    \n    As a medic, you know a stomach wound is impossible to take care of in the field and the nearest hospital is too far away.\n    *goto m2\n*else\n    *goto m2\n*label m2\n*page_break\nAfter a minute, the figure goes silent.\n*line_break\n*goto stomachwound\n*label capturedfigure\n*page_break\n*set chanceofattack -2\n\"You found a crate of grenades AND captured the terrorist alive?\" Miller smiles widely \"Great job. Maj. Faraz will be ecstatic!\"\n*goto theattacksappers\n*label deadterrorist\n*page_break\n\"A real shame we can't interrogate the terrorist.\" Miller muses \"At least the threat has been minimized and the grenades have been recovered.\"\n*set chanceofattack -1\n*goto theattacksappers\n*label theattackscouts\n*comment *temp fakepoliceman 0\n*comment fake policeman on roof, shoots at crowd\n*comment *temp trashcanbomb 0\n*comment bomb placed in trashcan while you were gone, causes explosion\n*comment *temp janitor 0\n*comment janitor in start of parade places bomb where parade started, causes explosion\n*page_break\n*if chanceofattack >=1\n    Suddenly, a deafening explosion rocks the entire street.\n    *line_break\n    *if (trashcanbomb = 1)\n        A series of smaller explosions follow, seemingly coming from almost everywhere at once.\n        *goto q1\n    *else\n        *goto q1\n    *label q1\n    *if (janitor = 1)\n        With horror, you notice a mushroom cloud rising from near the starting point of the parade.\n    \n    *if partner = \"@{male Abe|Mara}\"\n        \"What in the light was that?\" @{male Abe|Mara} shouts, \n        *goto onlybarely\n    *else\n        \"What the hell was that?!\" ${partner} shouts,\n        *goto onlybarely\n    *label onlybarely\n    only barely managing to be heard over the screams of thousands of civilians from the parade.\n\n    *line_break\n    *if fakepoliceman = 1\n        All at once, the screams are joined by the [i]Crack![/i] [i]Crack![/i] of automatic gunfire from the roof.\n        \n        \"Who the hell is up there!?\" Miller yells \"I thought I told you both to be there!\"\n        *line_break\n        Without waiting for an answer Miller runs up the fire escape. \"Follow me!\" @{male he|she} shouts.\n        \n        You and ${partner} quickly run up the steps after @{male him|her}.\n        *page_break\n        You stop at the top step. You notice Miller crouched behind the small cover the edge of the roof offers.\n        *line_break\n        You crouch beside @{male him|her}.\n        \n        \"I want yo-\" his words are cut off by three bullets flying over your heads, one of them hitting the wall just above Miller's head.\n        *line_break\n        \"Goddamnit! You shoot! I run! Ready?\"\n        *fake_choice\n            #\"Ready!\"\n                You and ${partner} raise your guns over the wall simultaneously. You pull the trigger, feeling your rifle jump. You know you won't hit shooting like that, but it should give you enough respite from the onslaught to raise your head above the wall.\n                \n                \n                \"Go!\" you shout as hard as you can, hoping Miller hears you.\n                *line_break\n                Miller vaults over the wall, firing his own gun towards the \"officer\".\n                *line_break\n                You raise your entire body over the wall, hoping to get a good shot.\n                \n                You spot a leg poking out from behind a solar water heater to Miller's right.\n                *choice\n                    #Shout to Miller\n                        \"Miller! Behind the water heater!\" you shout, pointing even though you know Miller isn't looking your way.\n e slabs!\" you shout.\n                    *line_break\n                    You strain with all your strength to push the marble slab blocking the exit aside. \n                    *if strength >= 60\n                        Little by little it moves until there is enough space to squeeze through and exit to the street outside. (Success! Needed 60 strength)\n                        *goto q21\n                    *else\n                        But no matter how hard you try, you can't get the slab to move.\n                        *goto moveslab\n                #Find another exit\n                    \"We need to try to find another exit!\" you shout, struggling to be heard over the screams from outside and falling marble slabs from the ceiling.\n                    *line_break\n                    \"Over there!\" JiJi points to a hole with sunlight streaming in.\n                    \n                    You rush to the hole, pushing yourself through until you are on the other side. You turn to help JiJi go through.\n                    *line_break\n                    You hear a [i]crack[/i], and watch, helpless as the ceiling caves in, closing the hole and JiJi inside.\n                    *line_break\n                    \"No! JiJi!\" your try to dig into the rubble blocking the hole but more just keeps pouring in. \"JiJi!\"\n                    *set jimjimalive false\n                    *page_break\n                    *goto q21\n    *else\n        *line_break\n        [i]\"JiJi! ${nick}!\"[/i] Miller's voice crackles from the radio [i]\"Meet me at the bottom of the clock tower ASAP!\"[/i]\n        *goto q21\n    *label q21\n    \n    *if jimjimalive =true\n        Breathless, you and JiJi\n        *goto q22\n    *else\n        You dig through the dirt with your bare hands. You don't know for how long you dig but by the time Miller appears behind you, they are covered in blood.\n        *line_break\n        *goto q2222\n    *label q22\n    run to the steps of
