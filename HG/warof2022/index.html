ne_break\n            The Sergeant glares at you. \"Don't ever talk back to me! Thanks to you the entire squad will give me 100 pushups each!\"\n            *set screl -5\n            *set aberel -2\n            *set samrel -3\n            *gosub_scene sub\n            (Platoon Sergeant -5, @{male Abe|Mara} -2, Sam -3)\n            *page_break\n            *goto goodmorning\n        #Look at you feet and stay silent\n            You lower your gaze and accept the Sergeants torrent of shouting\n            *line_break\n            After a minute @{male he|she} turns around and marches back to the front of the room.\n            *page_break\n            *goto goodmorning\n        *selectable_if (speech>50) #Answer tactfully (Needs 50 Persuasion)\n            \"I'm sorry Sergeant\" You look the Sergeant in the eye \"I promise it won't happen again.\"\n            *set screl +5\n            *gosub_scene sub\n            \n            The sergeant turns around and marches back to the door. (Platoon Sergeant +5)\n            *page_break\n            *goto goodmorning\n*label goodmorning\nYou look at the rest of the recruits standing at attention in their underwear, it is hard to imagine that only yesterday you were a civilian.\n*line_break\n\"You have 7 minutes to @{male shave|wash your face}, brush your teeth, shine your boots and stand here at attention again. 7 minutes, GO!\"\n\n*page_break One month later\n*set rank \"Private\"\nA month has passed since your conscription. The first week went by smoothly but by the second week, the stakes were upped considerably.\n*line_break\nThe time you were given to complete certain tasks was steadily decreased and by now the amount of rest you had between tasks was almost non-existent.\n\nEvery day was a blur of getting up, getting dressed, a morning run, a few hours at the shooting range, hand to hand combat as well as sprinkles of history, culture and weapon training. While you improved your skills around the board you excelled at one subject, which one was it?\n*fake_choice\n    #I was the best shot at the range.\n        *set shooting +20\n        Besides being the platoon's best shot you also improved at hand to hand combat and (with the help of your Sergeant) learned what it means to follow orders and toe the line. (Shooting +20, hand to hand combat +10, Discipline+10)\n        *set handcombat +10\n        *set discipline +10\n        *gosub_scene sub\n    #I was the best fighter in the ring.\n        *set handcombat +20\n        Besides being the platoon's best fighter you also worked on your accuracy and (with the help of your Sergeant) learned what it means to follow orders and toe the line. (Hand to hand combat +20, Shooting +10, Discipline+10)\n        *set shooting +10\n        *set discipline +10\n        *gosub_scene sub\n    #I was disciplined, learning how to follow orders and think like a soldier.\n        *set discipline +20\n        While the rest of the platoon needed the Sergeant to teach them to toe the line, you caught on very fast. With only minimal encouragement you managed to hone your discipline faster than anyone else.\n        *line_break\n        Besides improving your discipline you also made progress improving your accuracy and hand to hand combat. (Discipline +20, Shooting +10, hand to hand combat +10)\n        *set handcombat +10\n        *set shooting +10\n        *gosub_scene sub\n*page_break\n\"Our republic is surrounded by many enemies\" The Company Commander begins, stopping your daydreaming. \"They threaten our democracy, our freedom and our values.\" @{male He|She} pauses for a moment \"After the attack on the Zver Hotel, Parliament passed the Citizen Act of 1980 which added full military service for the physically fit as a requirement for citizenship. Since the passage of the act, our army has almost doubled in size and today we stand at 96% enlistment. With the added manpower, we were finally able to bring peace and security to all of Regovia. Today our might alone is enough to keep our enemies in check, without needing to resort to violence.\" The Company Commander stops to look around the room \"Any questions?\"\n*label starting\n*choice\n    *disable_reuse #What about non-citizens?\n      *goto non\n    *disable_reuse #What are our enemies' plans?\n        *goto enemies\n    *disable_reuse #What is the current terrorist situation?\n        *goto terror\n    #I don't have any more questions.\n        *goto nope\n*label non\n\"Non-citizens enjoy all the rights of citizens besides the right to elect and be elected.\" The Company Commander chuckles \"We aren't dictatorships like our neighbors.\"\n*goto starting\n*label enemies\n\"Currently, it seems our enemies are mostly content financing the Filo terrorists. Although our intelligence does seem to indicate that the Sarians are up to something.\"\n*goto starting\n*label terror\n\"The Filo? They are always planning something. We must always be on guard.\"\n*goto starting\n*label nope\n\"Excellent, dismissed\".\n*page_break A few hours later\nThe time is 2200 and you are in bed.\n*line_break\nAfter the Company Commander dismissed you and your platoon, you spent the rest of the day at the gun range. By the time you were allowed to go to sleep, the entire platoon was absolutely exhausted.\n\n\"Psst... $!{nick}!\" You hear a voice from the bed beside you, it's Zac. \"What did you think about what the Company Commander said?\"\n*line_break\n\"About what?\" You answer.\n*line_break\n\"You know... The whole thing about being surrounded by enemies, citizenship by service, fear and death around every corner...\"\n*fake_choice\n    #\"I disagree, we can't have real democracy when only people who served are allowed to vote.\"\n        \"Bullshit.\" Says a voice you recognize as @{male Abe|Mara}'s \"The Citizen Act was ratified by over 80% of parliament, it was the will of the people! (Recruits -10, [i]Luf[/i] +10)\n        *set Loyal -10\n        *set aberel -10\n        *set samrel -10\n        *set zacrel -10\n        *line_break\n        \"Shut up you three!\" Says a voice from the back of the room \"I want to go to sleep!\"\n    #\"I disagree, we can't allow our lives to be dictated by terrorists.\"\n        \"Then what should we do?\" Says a voice you recognize as Sam's \"The Zver Hotel attack killed more than 100 civilians! In the months before the attack more than 1,000 civilians were killed or wounded!\" (Recruits -10, [i]Luf[/i] +5)\n        *set Loyal -5\n        *set aberel -10\n        *set samrel -10\n        *set zacrel -10\n        *line_break\n        \"Shut up you three!\" Says a voice from the back of the room \"I want to go to sleep!\"\n    #\"I agree, without a strong military we would all be dead!\"\n        \"I think so too.\" Zac nods \"The Citizen Act was really important.\" @{male He|She} pauses \"My grandfather was killed in the Zver Hotel attack, my grandmother never got over his death.\" (Loyal +5)\n        *set Loyal +5\n        *line_break\n        \"Shut up you two!\" Says a voice from the back of the room \"I want to go to sleep!\"\n    #\"I agree, only those who have sacrificed for this Republic should be allowed to steer it.\"\n        \"I think so too.\" Says a voice from your left you recognize as @{male Abe|Mara}'s \"I see no reason not to demand proof of loyalty to the Republic in order to be a part of managing it.\" (Loyal +5)\n        *set Loyal +5\n        *line_break\n        \"Shut up you three!\" Says a voice from the back of the room \"I want to go to sleep!\"\n*gosub_scene sub\n*page_break Goodnight\nAt 0800 you and the platoon are woken up.\n*line_break\n\"ATTENTION!\" you immediately wake up and stand up. You and your platoon learned the hard way to jump up at the sound of the Sergeants voice. A task not performed optimally needed to be carried out again and again until the Sergeant was satisfied.\n\n\"Good morning Platoon!\"\n\n\n\"Good morning Sergeant!\" You all answer in unison.\n\n\n\"As you are probably aware, with basic training ending today, the Platoon Commander and I have decided what military occupation each of you will be assigned.\"\n\n\nThe Sergeant stops for a moment, surveying the room \"Those of you who are strong, will be assigned our very own Heavy Machine gun, the famed FN MAG.\n\n\nThose of you with an iron will, the ones who can continue fighting no matter what, will be given the Light Machine Gun.\" You notice Zac stands a little straighter, @{male his|her} eyes bright.\n\n\n\"The leaders, those who show an aptitude for tactical thought will be made fireteam leaders.\" This time @{male Abe|Mara} suddenly seems to shake off whatever sleep still clung to @{male him|her}. \n\n\n\"And last but not least, those of you with more than two neurons to rub together will be sent to medics course, to make sure you all make it back from the battles ahead.\"\n\n\nThe Sergeant cracks @{male his|her} knuckles and removes a piece of paper from @{male his|her} pants pocket. \n*page_break\n\"I will begin with our\n*if (shooting >= 20)\n    @{male Marksmen|Markswomen}! I want to hear a big round of applause for $!{nick}, I hope you can hit terrorists as well as you hit targets at the range. \" (@{male Marksmen|Markswomen} +10)\n    *set marksman +10\n    *set profession \"Marksman\"\n    *page_break Marksman\n    *achieve marksman\n    *gosub_scene sub\n    *goto mark\n*elseif (((Strength > intelligence) and (Strength > leadership)) and (Strength > willpower))\n    Heavy Machine Gunners. I want to hear a big round of applause for $!{nick} and Sam, the strongest soldiers in our platoon!\" (Heavy Machine Gunner +10)\n    *set mag +10\n    *set profession \"HMG\"\n    *page_break Heavy Machine Gunner\n    *achieve hmg\n    *gosub_scene sub\n    *goto hmg\n*elseif (((intelligence > Strength) and (intelligence > leadership)) and (intelligence > willpower))\n    future medic. I want to hear a big round of applause for $!{nick}, the one who is going to save your sorry asses one day!\" (Medic +10)\n    *set medic +10\n    *set profession \"Medic\"\n    *gosub_scene sub\n    *goto medic\n*elseif (((leadership > intelligence) and (leadership > Strength)) and (leadership > willpower))\n    future Fireteam leaders! I want to hear a big round of applause for $!{nick} and @{male Abe|Mara}.\" (Fireteam leader +10)\n    *set teamcom +10\n    *set profession \"Fireteam leader\"\n    *page_break Fireteam Leader\n    *achieve leader\n    *gosub_scene sub\n    *goto lead\n*elseif (((willpower > intelligence) and (willpower > leadership)) and (willpower > Strength))\n    Light Machine Gunners! I want to hear a big round of applause for $!{nick} and Zac, get ready for the hardest week of your training so far.\" (Light Machine Gunner +10)\n    *set negev +10\n    *set profession \"LMG\"\n    *page_break Light Machine Gunner\n    *achieve lmg\n    *gosub_scene sub\n    *goto lmg\n\n*label medic\n*page_break Medic\n\"Come here $!{nick}!\" The Sergeant motions you to stand next to @{male him|her}.\n*line_break\n\"Yes?\" You say when you reach the Sergeant.\n*line_break\n\"As our new medic-in-training you have a lot of responsibility, tomorrow morning you will leave for a three months long course at Training Center 10, AKA TC10. The course is long, but we trust you to keep in touch with your comrades in arms and study as hard as you can. We are counting on you.\"\n*page_break Training Center 10\nThe first thing you notice as you disembark the bus that brought you to TC10 is how high-tech everything looks. The buildings that make up the base are tall white buildings with big windows and even bigger grass lawns in front of them.\n\nTC10 was not designed to look like a military facility, but rather more like a university or high school. A campus with coffee shops and park benches is a welcome rest from the stress and physical hardship of basic training. However, the medics course is long and hard, and not without its own class of challenges. Long hours of study and memorization of various medical ailments await you. In addition, and most importantly, you must study the principles of TCCC or Tactical Combat Casualty Care. Your studies are enough to challenge even a smart soldier like yourself.\n*page_break\n*if (intelligence >= 85)\n    Fortunately, your intelligence proved enough and you managed to ace the course, coming first in your class and having the privilege of adding a golden bar to your medic ribbon. (Success! Needed 85 intelligence) (Medic +25, Professionalism +25)\n    *line_break\n    *set medic +25\n    *set professionalism +25\n    *image medicstar.jpg\n    *achieve goldstar\n    *set goldmedicribbon true\n    *gosub_scene sub\n    *goto medicend\n*elseif (intelligence >= 80)\n    Fortunately, your intelligence proved enough and you managed to pass the course successfully. (Needed 80 intelligence) (Medic +15, Professionalism +15)\n    *line_break\n    *set medic +15\n    *set professionalism +15\n    *image medic.jpg\n    *set medicribbon true\n    *gosub_scene sub\n    *goto medicend\n*else\n Unfortunately, your intelligence wasn't enough and you had to rely on your \n *choice\n    *selectable_if (willpower >= 50) #Willpower, to force yourself to study enough. (50 Willpower)\n        With sheer force of will, you forced yourself to study more than the rest of your class. When others rested, you studied. When others ate, you studied. When others slept, you studied. (Medic +15, Professionalism +15, Willpower +10)\n        *set medic +15\n        *set professionalism +15\n        *set willpower +10\n        *line_break\n        When the course ended, you received the medic ribbon.\n        *line_break\n        *image medic.jpg\n        *set medicribbon true\n        *gosub_scene sub\n        *goto medicend\n    *selectable_if (discipline >=50) #Discipline, to force yourself to study enough. (50 Discipline)\n        Using your discipline, you forced yourself to study more than the rest of your class. When others rested, you studied. When others ate, you studied. When others slept, you studied. (Medic +15, Professionalism +15, Discipline +10)\n        *set medic +15\n        *set professionalism +15\n        *set discipline +10\n        *line_break\n        When the course ended, you received the medic ribbon.\n        *line_break\n        *image medic.jpg\n        *set medicribbon true\n        *gosub_scene sub\n        *goto medicend\n    #Luck, to guess the right answers correctly.\n        With nothing but dumb luck, you managed to pass the course, unfortunately, that means you don't really know what the hell you're doing. (Medic +5)\n        *set medic +5\n        *line_break\n        When the course ended, you received the medic ribbon.\n        *line_break\n        *image medic.jpg\n        *set medicribbon true\n        *gosub_scene sub\n*label medicend\n\nAnd just like that, just as soon as you got used to TC10, the course ends and you find yourself on a bus back to your home base.\n*set profession \"Medic\"\n*page_break Welcome home\n*achieve medic\n*goto home\n*label mark\nThe next week is one of the most intense so far, you and the rest of the company @{male Marksmen|Markswomen} sleep in the gun range, training in the use of different firing techniques and tactics from 0600 to 2300 every day. You are given only the bare minimum of rest for food and weapon maintenance. By the end of the week, you have fired your weapon more times than you have in basic training altogether. (Marksman +15, Professionalism +15)\n*set marksman +15\n*set professionalism +15\n*gosub_scene sub\n*goto fastfoward\n*label hmg\nThe next week is one of the most intense so far, you and the rest of the company Heavy Machine Gunners sleep in the gun range, training in Heavy Machine Gun tactics from 0600 to 2300 every day. You are given only the bare minimum of rest for food and weapon maintenance. By the end of the week, you have fired your weapon more times than you have in basic training altogether. (HMG +15, Professionalism +15)\n*set mag +15\n*set professionalism +15\n*gosub_scene sub\n*goto fastfoward\n*label lead\nThe next week is not as intense as the rest of your platoon, the fireteam leaders are mostly taken around various points of significance in the country. In the span of one week, you visit the Parliament, the Supreme Court and the Sarian border. It seems to you the objective is more ideological training than actual military training.\n*choice\n    #Share your thoughts with the Platoon Commander\n        \"Platoon Commander, if I may have a moment?\" You ask the Platoon Commander during one of the bus drives.\n        *line_break\n        \"Yes?\" @{male He|She} replies, not raising @{male his|her} eyes from the road ahead.\n        *line_break\n        \"Seems to me like we won't be getting any actual training as Fireteam leaders.\" The Platoon Commander turns to face you \"Only history and political lessons.\" You finish.\n        *line_break\n        *if (speech > 30)\n            \"When we return to the base we were going to teach you the basics, but I guess there's nothing wrong with showing you the ropes now.\" @{male He|She} motions to the empty seat beside @{male him|her} \"Please, sit.\" (Needed 30 Persuasion)\n            *line_break\n            *set teamcom +10\n            *set speech +3\n            *set pcrel +2\n            (Fireteam leader +10, Persuasion +3, Platoon Commander +2)\n            *gosub_scene sub\n            *goto teamcom\n        *else\n            \"When we return to the base we will teach you everything you need to know.\" @{male He|She} turns @{male his|her} head back to the window \"Don't worry.\" (Needed 30 Persuasion)\n            *goto teamcom\n    #Keep quiet and enjoy the tour\n        You decide to keep quiet, remembering the Regovian saying: \"Long grass gets mowed first\".\n        *goto teamcom\n*label teamcom\n*page_break\nYou don't remember falling asleep on the bus, but when you awake, you are already at your home base.\n*line_break\nFoyourhe rest of the day, you are taught and given time to practice the basic tenets of infantry combat: Fire and maneuver.\n*line_break\n\"When in doubt,\" Your Platoon Commander begins \"have two soldiers in you squad firing and the other two moving forward, towards the enemies position. It has never failed me.\" (Fireteam leader +15, Professionalism +15)\n*set teamcom +15\n*set professionalism +15\n*gosub_scene sub\n*goto fastfoward\n\n*label lmg\nThe next week is one of the most intense so far, you and the rest of the company Light Machine Gunners sleep in the gun range, training in Light Machine Gun tactics from 0600 to 2300 every day. You are given only the bare minimum of rest for food and weapon maintenance. By the end of the week, you have fired your weapon more times than you have in basic training altogether.\n*line_break\nAfter the first day Sgt. Richards notices you aren't hitting the target as much as the other soldiers.\n*line_break\n\"The trick,\" Sgt. Richards tells you \"is to fire in bursts of between three and five bullets each time. Otherwise, you're just wasting ammo.\" (LMG +15, Professionalism +15)\n*set negev +15\n*set professionalism +15\n*gosub_scene sub\n*goto fastfoward\n*label home\nYou make your way towards D company, on the way there, without warning, a pair of arms grab you from behind!\n*fake_choice\n    #Struggle\n        \"Whoah there! Don't you recognize your old pal?\" You turn and see\n        *if ((samrel > zacrel) and (samrel > aberel))\n            Sam holding @{male his|her} hands out for a hug. (Sam +5)\n            *set samrel +5\n            *goto hug\n        *elseif ((zacrel > samrel) and (zacrel > aberel))\n            Zac holding @{male his|her} hands out for a hug. (Zac +5)\n            *set zacrel +5\n            *goto hug\n        *else\n            @{male Abe|Mara} holding @{male his|her} hands out for a hug. (@{male Abe|Mara} +5)\n ou all. I want you all to take five to catch your breath and then report to the company complex.\"\n*line_break\n\"Hey, $!{nick}! Wait up!\" You stop and turn towards the voice, you see Sam \"Great job back there. We really blew it out of the water.\"\n*fake_choice\n    #\"Thank you! You did great too!\"\n        *set samrel +2\n        \"Thank you! You did great too!\" (Sam +2)\n    #\"Thank you! We really did, didn't we?\"\n        *set samrel+2\n        \"Thank you! We really did, didn't we?\" (Sam +2)\n*label happy\n*gosub_scene sub\n\nSam gives you a friendly clap on the back. \"Let's get to the Company, I can't wait to finally be certified!\"\n*fake_choice\n    #\"Me too!\"\n        *set Loyal +5\n        *gosub_scene sub\n        \"It feels great to know we will finally be able to do our part for the Republic. I'm already looking forward to the second part of our training.\" (Loyal +5)\n        *label secondtraining\n        *fake_choice\n            *disable_reuse #\"Second part?\"\n                Sam looks at you with a confused look on @{male his|her} face \"Of course. Wardens train for eight more months after we are certified for combat before conducting any real operations.\"\n                *goto secondtraining\n            #\"I am really looking forward to it too!\"\n                \"That's what I like to hear!\" (Loyal +5)\n                *set loyal +5\n                *gosub_scene sub\n                *goto done\n            #I'm looking forward to it too, but I'm really nervous about it.\"\n                \"I thought you might say that.\" Sam says with a smile \"No biggie, I'm sure you can deal with whatever challenges arise.\"\n                *choice\n                    #Smile \"Thanks, I appreciate that.\"\n                        Sam's smile widens. \"Of course! That's what friends are for!\"\n                        *goto done\n                    #Frown \"You don't understand, I'm REALLY nervous about it.\"\n                        *goto t yesterday the Filos attacked a civilian vehicle with Molotov Cocktails, killing a father and his 3-month-old baby!\" (Sam -5, [i]Luf[/i]+10)\n                                *goto done\n                            #\"A [i]Luf[/i]? No way! Forget it, I'm only thinking aloud.\"\n                                Sam wets @{male his|her} lips \"Only just yesterday the Filos attacked a civilian vehicle with Molotov Cocktails, killing a father and his 3-month-old baby. Don't forget who we are dealing with.\" ([i]Luf[/i] +5)\n                                *set Loyal -5\n                                *gosub_scene sub\n                                *goto done\n    #\"Truth to be told, I'm not that excited about it.\"\n        *goto whatwhy\n*label whatwhy\n\"What? Why?\" Sam responds.\n*choice\n    #\"Nevermind, forget I said anything.\"\n        \"Ok then\" Sam looks at you uncertainly \"If you want to share anything, I'm always here for you.\"\n        *goto done\n    #\"I don't know if I'm up to it.\"\n        \"I thought that was the reason.\" Sam says with a smile \"Defending our Republic is a huge responsibility, I think it's great you take it seriously.\"\n        *choice\n            #\"I do take it very seriously!\"\n                *goto done\n            #\"That's not the reason.\"\n                \"So what is it?\" @{male his|her} eyes narrow  \"Don't tell me you are a [i]Luf[/i]!\n                *set luf 1\n                *label luf2\n                *choice\n                    *disable_reuse #\"What's a [i]Luf[/i]?\"\n                        \"You really weren't into politics before you enlisted.\" Sam smiles bitterly \"A [i]Luf[/i] is one of those idiots who still think the Citizen Republic should be dismantled and conscription abolished. You don't want to be grouped with those hippies, especially not here, not in the RDF.\"\n                        *goto luf2\n                    #\"And what if I am?\"\n                        *set samrel -5\n                              *set Loyal -10\n                                *gosub_scene sub\n                                Sam looks at you for a long moment before answering \"Then we are going to have a problem. Every [i]Luf[/i] makes our Republic weaker. We are at a time when we cannot tolerate weakness.\" Sam swallows and wets @{male his|her} lips \"You heard the new*s! Only just yesterday the Filos attacked a civilian vehicle with Molotov Cocktails, killing a father and his 3-month-old baby!\" (Sam -5, [i]Luf[/i]+10)\n                                *goto done\n                            #\"A [i]Luf[/i]? No way! Forget it, I'm only thinking aloud.\"\n                                Sam wets @{male his|her} lips \"Only just yesterday the Filos attacked a civilian vehicle with Molotov Cocktails, killing a father and his 3-month-old baby. Don't forget who we are dealing with.\" ([i]Luf[/i] +5)\n                                *set Loyal -5\n                                *gosub_scene sub\n                                *goto done\n*label done\n\n\"Anyway,\" Sam looks towards the Company complex. \"let's get going. We don't want to miss the Company Commander.\"\n*page_break\n*finish\n\n*label mini_ending \n*page_break End\nWe hope you've enjoyed playing [i]War of 2022.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending", "death": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nYou have died.\n\n*goto_scene ending", "ending": "*comment ending 0= kicked out before you even started |1=killed team and ran away | 2= ran away, did not kill team |3= lose your hand in the battle for george |4= Killed @{male George|Georgia}, safely evacuated |5= Escaped, @{male George|Georgia} dead, sam or zac dead| 6=base defense failed, zac or sam dead, receive medal for valour|7=defense succeeded, zac or sam dead, receive medal for valor| 8= Died while defending the base, base lost|9= Sarians surrender during base battle.|10= Sarians killed during base battle| 11=died by a grenade blast|12= shot while trying to get Sarians to surrender|13= Sarians in final building surrender, abe dead unless sugercoating |14= Join the Sarians, they kill everyone in your team.|15= Killed by Sarians after betraying your team.|\n*page_break Epilogue\n*temp died 2\n*if ending =1\n    After killing your teammates and escaping into Filo-held territory you walked until you reached the nearest Filo town.\n    \n    *label nokill\n    Upon noticing your Warden uniform, the Filo militia in control of the town was hostile and almost executed you on the spot, however, when they understood your political ideals and actions they agreed to smuggle you to a safe house in Gaeva to meet with various Filo leaders.\n    *line_break\n    Using a translator and some broken Filo, you told them how you found yourself disillusioned with the lies of the Citizens Republic and your outright treason in killing Regovian Wardens.\n    \n    Within a week, you began helping the Filo militias organize into more effective fighting forces, teaching them basic military drills you had learned as well as classic RDF tactics.\n    *line_break\n    The RDF, already stretched thin by the war in the north, crumbled in the face of an effective guerrilla warfare campaign. Within a month, a ceasefire between the Citizens Republic of Regovia and the newly established State of Filo was signed.\n    \n    As thanks for your help in bringing the end to Regovian tyranny, you were honored with serving as a bodyguard to the @{male man|woman} you once tried to capture- @{male George|Georgia} Hamtz, the newly elected president of the Filo interim government.\n    *page_break The fate of TM40\n    After your sudden betrayal, the battle swung in the FFFs favor, TM 40 was decimated. Those who were not killed were captured and the rest of the ${unit} were forced to retreat eastwards, humiliated.\n    *page_break Fate of Regovia\n    Regovia, once the most powerful nation in the region found itself in a position of weakness it had not been in for years. Weakened and on its knees, the government signed a ceasefire with Saria, returning the twin islands of Lotab and Senfir as well as moving the border south, granting Saria complete control of the Greven highlands as well as acknowledging Sarian control of Lawan.\n    *page_break 22 November, 2052, Present day.\n    After turning your back on Regovia and becoming a hero in the State of Filo- the world was your oyster.\n    \n    *if (((intelligence>=strength) and (intelligence>=leadership)) and (intelligence>=speech))\n        You decided to put your intelligence to use, becoming a noted academic and intellectual at the University of Gaeva.\n        *line_break\n        Your published articles analyzing the crimes of the terrorist regime in Regovia were well received by the Filo government, becoming required reading in Filo schools and even in Saria and Wev.\n        *achieve academic\n        *goto sometimes\n    *elseif (((strength>=intelligence) and (strength>=leadership)) and (strength>=speech))\n        You decided to put your strength to use, joining the newly established Filo military.\n        *line_break\n        At first, you helped build training regimens for the Filo army before moving on to Saria and Wev where you did the same, preparing their armies for the inevitable clashes with Regovia.\n        \n        Only yesterday, you had returned from a ceremony in the President's mansion where you had received the Filo Medal of Honor for your lifelong service to the Filo people.\n        *image filohonor.jpg\n        *set filohonor true\n        *goto sometimes\n    *elseif (((leadership>= intelligence) and (leadership>=strength)) and (leadership>=speech))\n        You decided to put your leadership skills to use, rising through the ranks of the newly established Filo military until, with some help from your patron President Hamtz, you were assigned the position of Chief of staff of the Filo military.\n        \n        When you finally enter the ruins of Rusalim, 30 years after you had left Regovia for good, a deep sense of calm descends over you.\n        *line_break\n        You had left a traitor- you now return a liberator.\n        *goto sometimes\n    *elseif (((speech>= intelligence) and (speech>=strength)) and (speech>=leadership))\n        You decided to put your way with words to use, creating anti-Regovian propaganda for the Filo ministry of defense. Your leaflet disparaging the Citizen Republic as not only undemocratic but also as ineffective has created a strong anti-government sentiment in Regovia.\n        \n        As the years went by, Regovia continued to weaken due to internal and external pressure until a Filo takeover of Regovia was inevitable.\n        *goto sometimes\n    *else\n        *bug no stat high enough\n*elseif ending=2\n    After running away from your former teammates you walked all the way to the nearest Filo town.\n    *goto nokill\n*elseif ending=3\n    When you awakened, you found yourself in a hospital with terrible pain in your right arm. When you tried to look at it to see why it was hurting so badly you saw nothing but a stump.\n    \n    The next time you awoke, your teammates were sitting by your side. You found out that you had been ambushed and that the bullets from the rifle had torn your arm clean off.\n    \n    They also explain that the operation had been a success. Without the leadership of Hamtz, the Filo resistance crumbled and was dismantled by border police units with only minimal assistance from the RDF.\n    \n    *label withthefilo\n    With the Filo insurgency defeated, the full might of the RDF could return to the war with Saria, not completely turning the tide but still managing to force a tense stalemate.\n    *label afterayear\n    *line_break\n    After a year of tit for tat operations, a ceasefire was signed and a tense peace between Regovia and Saria emerged.\n    \n    The only sign there was a war at all, were the various memorials that sprung up in every town and city, memorializing the dead who had once called those same towns and cities their home.\n    *page_break The fate of TM40\n    Besides the loss of your arm, many members of TM40 and the ${unit} were killed and wounded in the war. Their photos join the others in the back of the ${quarter} briefing room.\n    *page_break Fate of Regovia\n    As part of the ceasefire, it was agreed that the border between Saria and Regovia would remain demilitarized. Both sides routinely ignore the decision, secretly building observation posts to spy on the other observation posts built by the other side.\n    \n    A committee of inquiry that was created to find out how the situation in Western Regovia deteriorated so fast recommended a permanent martial law for non-citizens in Western Regovia. The proposal easily passes in the Regovian parliament.\n    \n    As a result, non-citizens found to be in breach of even the smallest crimes find themselves arrested by heavily armed soldiers and judged by military justices.\n    *label afteryou\n    *page_break 22 November 2052, Present day\n    After you finished the mandatory portion of your military service\n    *if ((((intelligence>=strength) and (intelligence>=leadership)) and (intelligence>=speech)) and (intelligence>=discipline))\n        you decided to put your intelligence to use, becoming a noted academic and intellectual in Regovia.\n        *achieve academic\n        *line_break\n        *if loyal >=85\n            Your published articles on the genius of the Citizen Republic system turn you into something of a celebrity in government circles. Your well-articulated and refined arguments are celebrated and have even become required reading in Public schools.\n            *goto friends\n        *elseif loyal >=50\n            Your published articles on the various positive sides of the Citizen Republic system are well received in academic circles worldwide, boosting the popularity of Regovia and allowing Regovia to act mostly free of international influence and condemnation.\n            *goto friends\n        *elseif loyal \u003c=15\n            Your published articles slamming the undemocratic Regovian system of government as morally corrupt and authoritarian are celebrated as genius in [i]luf[/i] circles. Your well-articulated arguments highlight the failures of the government, allowing the \"Fair Republic\" party to take a more central role in the Regovian opposition.\n            *goto friends\n        *else\n            Your published articles pointing out the failures of the Regovian system of government are well received, causing many members of parliament to actively fight for making the system more inclusive and democratic.\n            *goto friends\n    *elseif ((((strength>=intelligence) and (strength>=leadership)) and (strength>=speech)) and (strength>=discipline))\n        you decided to remain in service of the state, training countless youths about to enlist and helping them join elite units where they can unlock their full potential.\n        \n        After a few years, you decide to expand, opening groups specifically for teenagers from troubled backgrounds and helping them enlist in return for purging their criminal record.\n        *achieve training\n        *goto friends\n    *elseif ((((leadership>= intelligence) and (leadership>=strength)) and (leadership>=speech)) and (leadership>=discipline))\n        you decided to remain in the military, leaving your teammates for the prestigious officers course and quickly rising through the ranks of the RDF and retiring as a three-star general.\n        *achieve general\n        \n        *if loyal >50\n            You lead the soldiers under your command in many small and large engagements, becoming something of a legend in military circles.\n            *goto friends\n        *else\n            After leaving the army, you create your own party built entirely of [i]luf[/i] military veterans. Under your leadership, the \"Democratic struggle\" party fights for a more democratic and inclusive government. In time, its high standing as a party of veterans allows it to grow to become the largest opposition party.\n            *goto friends\n    *elseif ((((speech>= intelligence) and (speech>=strength)) and (speech>=leadership)) and (speech>=discipline))\n        *achieve speeker\n        you decide to become a public speaker, \n        *if (loyal>60)\n            speaking about your experiences from the war in schools and youth groups.\n            \n            As your talks became more and more popular two agents approached you, informing you that your popularity had not gone unnoticed and that they would appreciate it if your talks took a more pro-Citizen Republic stance.\n            *line_break\n            As an ardent supporter of the Citizens Republic, you happily agreed.\n            \n            A month after your decision, business exploded as government offices began inviting you to speak to their employees.\n            *goto friends\n        *elseif loyal>40\n            giving motivational speeches to schools, youth groups and businesses.\n            \n            Steadily, your popularity as a speaker grew and you began writing speeches for various political groups on both sides of the political spectrum.\n            *goto friends\n        *else\n            speaking about your experiences from the war in schools and youth groups.\n            \n            As your talks became more and more popular two agents approached you, informing you that your popularity had not gone unnoticed and that they would appreciate it if your talks took a more pro-Citizen Republic stance.\n            *line_break\n            As a firm opposer of the Citizen Republic, you refused.\n            \n            At first, your business began failing as schools began disinviting you from talks, citing various technical reasons for their cancellations.\n            \n            Luckily, you began finding employment as a speechwriter for various opposition groups and politicians.\n            *line_break\n            Your persuasive and eloquent speeches landed you a job as a well-respected and successful campaign manager of most opposition parties.\n            *goto friends\n    *elseif ((((discipline>= intelligence) and (discipline>=strength)) and (discipline>=speech)) and (discipline>=leadership))\n        *achieve general\n        you decide to remain in the military, finding the life of discipline and clean-cut rules to be fitting of your character.\n        \n        At first, you became the CSM of the ${unit}, making sure the logistics side of things ran smoothly.\n        \n        After a particularly hard inspection which you passed, CWO Ramon took you in as @{male his|her} protégé. You began taking charge of order and discipline in the entire RDF and when Ramon retired, you were there to replace @{male him|her.} \n        *goto friends\n    *else\n        *bug No stat high enough\n*elseif ending=4\n    *label theoperation\n    The operation had been a complete success. Without the leadership of Hamtz, the Filo resistance crumbled and was easily dismantled by border police with only minimal assistance from the RDF.\n    *goto withthefilo\n*elseif ending=5\n    *goto theoperation\n*elseif ending=6\n    A day later you receive news that FOB 5135 had to be abandoned in the face of the Sarian counterattack. Thankfully, Faraz managed to pull off an organized retreat and no one was lost or left behind.\n    *line_break\n    However, the Regovian momentum ground to a halt after the defeat at FOB 5135, within a month all Regovian soldiers were forced back to their positions south of the pre-war borders.\n    *label youspend\n    \n    You spend the rest of the war recuperating and helping out wherever you can, whether it means packing MREs for soldiers on the front or organizing visits for hospitalized soldiers who have no family to keep them company.\n    \n    One day, while filling out a bit of paperwork, you are visited by two Colonels who promptly announce that you had been selected to receive the Medal of Bravery, the second-highest military honor, in recognition of your actions in FOB 5135.\n    *set medalofbravery true\n    *line_break\n    *image medalofbravery.jpg\n    *label Filoflurish\n    *page_break Western Regovia\n    A committee of inquiry was created to find out how the Filo population had managed to bring to fruition an attack as sophisticated as the one carried out in Rusalim. A few months after the attack they published a report calling for greater economic opportunities for Filos in Western Regovia as a way to reduce tension.\n    \n    The plan managed to gain the approval of parliament and the next years see unprecedented growth in Western Regovia.\n    *goto afteryou\n*elseif ending=7\n    A day later you received news that the attack of FOB 5135 had been repelled. After that, slowly but surely, the RDF advanced further into Filo territory.\n    *line_break\n    When a Regovian-Sarian ceasefire was signed a year later, it was mutually agreed upon that no Sarian soldiers are allowed to enter the area south of FOB 5135. Another section of the ceasefire agreement stipulates the deployment of an international force of observers to FOB 5135 to make sure the terms of the agreement are kept.\n    *goto youspend\n*elseif ending=8\n    *label diedfromgrenade\n    You have died from a grenade blast during the defense of FOB 5135. Posthumously receiving the Medal of Sacrifice, a medal awarded to soldiers killed in action. Your parents have the small medal framed and placed over your bed.\n    *set medalofsacrifce true\n    *line_break\n    *image medalofsacrifice.jpg\n    *achieve died\n    *goto ending\n*elseif ending=9\n    After the Sarian surrender in the vicinity of FOB 5135, the RDF uses the momentum to push even deeper into Sarian territory. When a ceasefire is signed less than a month later the Sarians accept a Regovian annexation of the entire Greven mountain range, as well as an international force of observers, deployed 5 kilometers north of the mountains to implement and enforce a demilitarized zone.\n    \n    For your part in the battle, you were awarded the Medal of Valour, the third-highest Regovian military honor.\n    *set medalofvalour true\n    *image medalofvalour.jpg\n    *page_break Fate of Regovia\n    The ceasefire and Sarian weakness bring about a new period of peace for Regovia during which an influx of foreign investments flow into the country, greatly increasing the quality of life for Regovian citizens and residents.\n    *goto Filoflurish\n*elseif ending=10\n    After news of the massacre at FOB 5135 gets out in Saria, a new wave of attacks is launched at RDF cross-border positions. FOB 5135 manages to hold its ground, but not all of the RDF positions do. When a ceasefire is signed a month later, FOB 5135 remains as the most northernmost point of Regovian occupation in Saria.\n    \n    As part of the ceasefire agreement, a group of international observers are based at FOB 5135 and tasked with making sure the Sarian side of the Greven mountains remains demilitarized.\n    \n    For your part in the battle, you were awarded the Medal of Valour, the third-highest Regovian military honor.\n    *set medalofvalour true\n    *image medalofvalour.jpg\n    *page_break Fate of Regovia\n    The small victory in the war doesn't change Regovia's international reputation as an unsafe nation under constant threat. However, the citizens and residents of Regovia feel much safer in the knowledge that the RDF and Wardens are protecting them from harm.\n    *goto Filoflurish\n*elseif ending=11\n    *goto diedfromgrenade\n*elseif ending=12\n    You have been shot and killed by Sarian soldiers while attempting to convince them to surrender. Posthumously receiving the Ribbon of Sacrifice, a ribbon awarded to soldiers killed in action. Your parents have the small ribbon framed and placed over your bed.\n    *set medalofsacrifice true\n    *line_break\n    *image medalofsacrifice.jpg\n    *achieve died\n    *goto ending\n*elseif ending=13\n    With the Sarian forces in the compound out of the way the rest of the plan could unfold as planned.\n    \n    Within hours tens of tanks and artillery were parked around the town, ready to unleash destruction on the Sarian capital.\n    *line_break\n    An ultimatum of surrender was issued to the Sarian king. The ultimatum stipulated that unless the Sarian king would come to Domeak to negotiate a surrender, the Regovian artillery would begin firing at targets inside Tamashek. The Sarian king instead chose to flee, allowing General Tarlek Hem, the commander of Sarian southern command, to seize control of the capital and military in a coup d'etat.\n    *if male =false\n        The General used the King's shameful escape from the city to convince the Sarian command that in a state of emergency, the fate of the kingdom couldn't be trusted in the hands of a weak man and that Saria needed a strong woman in charge.\n    General Hem immediately offered surrender in return for a ceasefire and recognition as the sole leader of Saria.\n    \n    The dilemma was an easy one. The Regovian government quickly made it known that it would only negotiate with General Hem.\n    \n    After the Sarian king had been captured by the new Sarian government and forced to abdicate, the General made @{male his|her} way personally to Domeak to negotiate.\n    *line_break\n    After a week of negotiations, it was decided that Lawan would be granted independence, the Greven mountains would be transferred to Regovia and any Sarian territory occupied by Regovia would become demilitarized. In return, Regovia would assist Saria diplomatically, helping the state rekindle contacts with the eastern world and securing foreign aid.\n    \n    For the first time in its history, Regovia would be surrounded by nations that had signed peace treaties with it, ushering in an era of prosperity.\n    \n    For your part in the battle and war, you had been awarded the highest Regovian military honor- the Regovian Decoration of Eternal Gratitude.\n    *line_break\n    *image medalofhonor.jpg\n    *set medalofhonor true\n    *achieve honor\n    *goto Filoflurish\n*elseif ending=14\n    In Saria, you become a pawn for the Sarian king. Every day you were interviewed about the crimes committed by the Regovians against the Filos, the Weveese and Sarians.\n    *line_break\n    You were forced to lie, making up new stories of horrors you witnessed while in the service of the Citizens Republic. After a year, the war ends in a stalemate with no side making any notable gains.\n    \n    You however are given Sarian citizenship, a house in northern Saria and almost free rein as well as the Medal of Eternal Friendship in return for your help during the war.\n    *set medalfriendship true\n    *line_break\n    *image sarianhonor.jpg\n    \n    *if ((((intelligence>= strength) and (intelligence>=leadership)) and (intelligence>=speech)) and (intelligence>=discipline))\n        You decided to put your intelligence to use, becoming a teacher of Regovian culture at the Royal University. Your courses helped shape Sarian intelligence tactics for years to come.\n        *goto sometimes\n    *elseif ((((strength>=intelligence) and (strength>=leadership)) and (strength>=speech)) and (strength>=discipline))\n        You decided to put your strength to use, enlisting as a government-sanctioned mercenary. Whenever the Sarian king wanted to send military forces without implicating himself- he could count on you and your mercenary company to get the job done- if not cleanly, then at least efficiently.\n        *line_break\n        In the king's service, you traveled around the continent, serving in countless skirmishes and battles and amassing quite a fortune in the process.\n        *goto sometimes\n    *elseif ((((leadership>=intelligence) and (leadership>=strength)) and (leadership>=speech)) and (leadership>=discipline))\n        You decided to put your leadership skills to use, enlisting the Sarian military and even rising through the ranks up to the rank of Colonel.\n        *goto sometimes\n    *elseif ((((speech>=intelligence) and (speech>=strength)) and (speech>=leadership)) and (speech>=discipline))\n        Your control of the Regovian language and culture, as well as persuasion skills, landed you a cushy job as advisor to the Sarian military propaganda division.\n        *goto sometimes\n    *elseif ((((discipline>=intelligence) and (discipline>=strength)) and (discipline>=leadership)) and (discipline>=speech))\n        You decided to put your firm understanding of the Regovian military to use, serving as a well-paid advisor to the Sarian military intelligence division.\n        *goto sometimes\n    *else\n        *bug No stat high enough\n*elseif ending=15\n    You were executed by Saria for espionage. Your body hangs for an entire month from the gates of Tamashek.\n    *line_break\n    Unfortunately for you, word got out that you betrayed your country. You will be forever remembered as a traitor and a fool.\n    *achieve hanged\n    *goto ending\n*elseif ending =0\n    You have been kicked out of the Wardens for insubordination. After a month-long jail sentence in military prison, you find yourself assigned to work as a secretary for a Major in the logistics corp.\n    \n    The work is easy and unchallenging, you find yourself not doing much for most of your service.\n    *goto ending\n*bug No ending!\n*label sometimes\n*page_break\nSometimes, in between important meetings or chats, flashes of your previous life in Regovia find their way into your thoughts.\n*page_break\nSometimes, in between important meetings or chats, flashes of your previous life and teammates in Regovia find their way into your thoughts.\n*line_break\nNo matter. A small price to pay for justice.\n*goto ending\n*label friends\n*page_break Teammates\n*if pcrel >=60\n    Miller always had your back in everything. You still find yourself calling @{male his|her} for advice and a cup of coffee every now and then.\n    *goto walker\n*elseif pcrel \u003c=40\n    You and Miller had never really gotten along. Sometimes, you find yourself still thinking of all the stupid decisions @{male he|she} had made.\n    *goto walker\n*elseif pcrel \u003c60\n    You and Miller had had an amicable relationship throughout your service. You still find yourself thinking about talks you had had from time to time.\n    *goto walker\n*else\n    *bug Miller relations\n*label walker\n*page_break\n*if sgtrel >= 60\n    Walker and you had gotten pretty close during your service. When you find out that you live in the same city you are ecstatic. You soon find yourself meeting with @{male him|her} weekly to discuss your lives and reminisce about old times.\n    *goto abe\n*elseif sgtrel \u003c=40\n    Walker and you had tried to avoid each other even during your service together. Last you heard from @{male him|her}, @{male he|she} was working as a sales rep for a large oil company in the Sassik desert.\n    *goto abe\n*elseif sgtrel \u003c60\n    Walker and you got along fine during your service, however, over time, you find yourself thinking less and less about @{male him|her}.\n    *goto abe\n*else\n    *bug Walker relations \n*label abe\n*page_break\n*if abealive = true\n    @{male Abe|Mara} stayed in the military, leaving the team for officers course and climbing the ranks of the RDF.\n    *line_break\n    *if aberel >=60\n        @{male Abe|Mara} and you had become good friends during your service together. @{male He|She} remains one of your closest confidants, you can always trust @{male him|her} to give another perspective on life events. \n        *goto sam\n    *elseif aberel \u003c=40\n        Your relationship with @{male Abe|Mara} was always cold. Since the end of your service, you had only seen @{male him|her} once at a get-together for veterans. You avoided @{male him|her}, not even saying hi.\n        *goto sam\n    *elseif aberel \u003c60\n        Your relationship with @{male Abe|Mara} was never especially warm or cold. During your service, you had enjoyed a working relationship and nothing more. The last time you saw @{male him|her} was a few years ago at a get-together for veterans of the ${unit}.\n        *goto sam\n\n    *else\n        *bug abe relations \n*else\n    @{male Abe|Mara} had died while attempting to break into an enemy position. Years later you still wake up in cold sweat whenever @{male Abe|Mara} returns to haunt your dreams, blaming you for not saving @{male him|her}.\n    *goto sam\n*label sam\n*page_break\n*if samcapture = true\n    *temp died 1\n    When you had returned to the FOB and searched under the rock where you had hidden Sam @{male he|she} wasn't there.\n    *line_break\n    In a panic, you had searched together for hours for any clues but could find none. \n    \n    A month later, a Sarian defector claimed that Sam was being held in a secret location in Saria. Sarian officials would neither confirm nor deny the information.\n    *goto samdied\n*if samalive= true\n    *if samrel >=60\n        Sam and you had become great friends during your service together and your relationship was always something you treasured. After finishing your service you could always count on Sam to keep in touch and organize meetings with the rest of the team. \n        *goto zac\n    *elseif samrel \u003c=40\n        Sam and you had never had a good relationship. After your service ended you hadn't cared enough to find out what @{male he|she} was doing and so @{male he|she} slowly faded from memory.\n        *goto zac\n    *elseif samrel \u003c60\n        Sam and you had a good relationship during your service, however, after @{male he|she} left the military you hadn't really kept in touch. \n        *goto zac\n    *else\n        *bug Sam relations alive\n*else\n    Sam had died during the War. \n    *label samdied\n    \n    *if samrel >=60\n        Losing such a close friend had been a terrible blow. You still find yourself asking \"What would Sam do?\" whenever confronted with a difficult decision.\n        *goto zac\n    *elseif samrel \u003c=40\n        Sam and you had never had a good relationship and @{male his|her} @{died disappearance|death} did nothing to change that.\n        *goto zac\n    *elseif samrel \u003c60\n        Even though you hadn't been close, @{male his|her} @{died disappearance|death} is something you find yourself reflecting on frequently. Often, you find yourself thinking of different choices you could have made that could have \n        *if samcapture = true\n            brought @{male him|her} home safely.\n            *goto zac\n        *else\n            saved @{male his|her} life.\n            *goto zac\n    *else\n        *bug sam relations dead\n*label zac\n*page_break\n*if zaccapture = true\n    *temp died 1\n    When you had returned to the FOB and searched under the rock where you had hidden Zac @{male he|she} wasn't there.\n    *line_break\n    In a panic, you had searched together for hours for any clues but could find none. \n    \n    A month later, a Sarian defector claimed that Zac was being held in a secret location in Saria. Sarian officials would neither confirm nor deny the information.\n    *goto zacdied\n*if zacalive= true\n    *if zacrel >=60\n       You and Zac had become great friends during your service. @{male His|Her} easy laugh and jokes that had made your service much more enjoyable make @{male him|her} an ideal partner for any time you needed a break. \n       *goto theend\n    *elseif zacrel \u003c=40\n        You could never stand Zac during your service, when @{male he|she} was released from the military at the end of the mandatory three years you were glad you never had to see @{male him|her} again.\n        *goto theend\n    *elseif zacrel \u003c60\n        Your relationship with Zac knew its ups and downs. After @{male he|she} had left the army you and @{male he|she} mostly fell out of touch.\n        *goto theend\n    *else\n        *bug Zac relations alive\n*else\n    Zac had died during the War. \n    *label zacdied\n    \n    *if zacrel >=60\n        During \n        *if died =1\n            vigils held for Zac in following years you had always found yourself crushed. How could the world continue spinning when Zac wasn't on it?\n            *goto theend\n        *else\n            @{male his|her} funeral you felt crushed. How could the world continue spinning when Zac wasn't on it?\n        *goto theend\n    *elseif zacrel \u003c60\n        @{male His|Her} @{died disappearance|death} was a hard blow at the time, but as time passed, you found yourself thinking of @{male him|her} less and less.\n        *goto theend\n    *elseif zacrel \u003c=40\n        You loath to admit it- but Zac's @{died disappearance|death} didn't affect you at all.\n        *goto theend\n    *else\n        *bug Zac relations dead\n*label theend\n*if (((zacrel >=60) and (aberel >=60)) and (samrel >=60))\n    *achieve friends\n*page_break\nThe End.\n*goto ending\n\n*label ending \n*page_break End\nWe hope you've enjoyed playing [i]War of 2022.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "endtraining": "*temp winner\n*temp crack false\nMore than a year has passed since your conscription. You only have one month left until the end of your training. And then it comes, without warning.\n*page_break\nIt begins suddenly, while you sleep. \n\nYou suddenly feel yourself suffocating, unable to breath, your hands instinctively shoot upwards, attempting to push whatever is choking you off. You feel something hard, a chest.\n\n\"Be quiet if you want me to move my hand\" A deep voice whispers.\n*fake_choice\n    #Lower your hands and remain silent\n        You lower your hands and nod your head in affirmation. In response the hands that have been placed on your mouth recede.\n    #Continue struggling\n        You lower your hands for a moment before quickly sending them up again, this time as closed fists. They hit the chest again but you don't have enough oxygen to give you the strength to do any actual damage.\n        \n        \"Nice try\" the voice taunts \"but I'm serious, next time it WILL cost you.\"\n        *line_break\n        The hands that were on your mouth recede.\n\"Get up, stay quiet, and place your hands behind your back.\"\n\nHazy from just waking up and the lack of oxygen, you comply. You feel zipties being tied on your hands and a cloth covers your eyes.\n\n\"Get up, walk where I push you.\"\n*page_break Blindfolded\nBlindfolded, you feel yourself being pushed out of the warm room and into the cold night air.\n\nThe voice whispers in your ear.\n*line_break\n\"God can't see, the Lieutenant won't hear,\n*line_break\nwelcome to sergeants month- your greatest fear\"\n*page_break\nBefore the words settle in, you find yourself climbing a small flight of stairs and being pushed into a sitting position on a chair.\n\nYou feel the fear rise in your chest, the darkness closing in, choking you.\n*line_break\nYou take a few deep breaths and pull your hands against your restraints. Forcing yourself to return to reality.\n\n\nYou hear more soldiers being put on the bus and sat down by the @{male man|woman} with a deep voice.\n\n\"Hello, platoon!\" A voice sounds through the bus's sound system \"I'll keep this short. My name is irrelevant, but for the duration of the month I will be known as \"Instructor\". Sergeant's month is your greatest fears come true. If you finish this month- war with Saria will seem like heaven. Good luck.\"\n*page_break\nAfter an hour's drive, the bus begins stopping and then continuing, seemingly at random.\n\nAt the fifth such stop, you are unloaded from the bus.\n\nThen, nothing happens for a long minute.\n*label wait\n*choice\n    #Wait\n        *goto wait\n    #Find some way to remove the ziptie\n        How?\n        *choice\n            *selectable_if (strength >= 50) #Attempt to break the ziptie (Needs 50 Strength)\n                *goto break\n            *selectable_if (intelligence >= 50) #Feel for something on the ground to cut the ziptie with (Needs 50 intelligence) \n                *goto shim\n            *selectable_if (willpower >= 50) #Force it off (Needs 50 Willpower)\n                *goto force\n            #Start walking, maybe you will find something\n                *goto walk\n*label break\nUsing your strength you pull your hands away from each other, the ziptie strains and digs into your skin. Just as the pain becomes unbearable and you are ready to give up the ziptie snaps. (Strength +3)\n*set strength +3\n*gosub_scene sub\n*goto out\n*label shim\nYou crouch and lean backward, breaking your fall with your hands. After steading yourself, you begin searching the ground for a sharp object with which you cut the ziptie. To your relief, you almost immediately find a metal pole that you use to cut the ziptie. (Intelligence +3)\n*set intelligence +3\n*gosub_scene sub\n*goto out\n*label force\nYou strain against the ziptie but no matter what you do, you cannot break it. Not being one to give up easily, you continue to change hand positions, pulling your hands apart. The plastic digs into your wrist, breaking through your skin but even that does not deter you. With a final pull, you finally feel the ziptie give and break. (Willpower +3)\n*set willpower +3\n*gosub_scene sub\n*goto out\n*label walk\nWith no other option you begin walking forwards, hoping something will happen. After walking only a few meters you trip and fall. \n*line_break\n\"What the hell do you think you're doing?\" the Instructors voice asks.\n\nYou feel a hand and arm slip between your back and arms. Before you can understand what's happening the arm moves forward and in a circle, forcing you to stand up.\n\nAfter standing up the instructor uses a knife to cut the ziptie off.\n*goto out\n*label out\n*line_break\n\"Good\" the Instructor remarks from behind you \"Remove the blindfold.\"\n*page_break \nYou remove the blindfold and are met with the a moonless night sky.\n*choice\n    #Turn towards the Instructor\n        You turn towards the Instructor, waiting for @{male him|her} to speak.\n        \n        *goto speak\n    #Look around\n        You look to your left and right, getting a general idea of where you are.\n        \n        The first thing you notice is that you and the Instructor are alone, the second is that you are in a open field with only a small army green tent.\n        \n        *goto speak\n*label speak\n\"This month will mostly deal with shooting and hand to hand combat. I expect you not to pull any punches. Good luck\"\n*page_break Pull punches? Good luck?\nJust as you are about to open your mouth to ask what @{male he|she} means you feel a foot connecting with your back. The force of the kick sends you sprawling forward, crashing to the ground.\n\nYou turn your head, Zac stands above you, @{male his|her} fists raised in a guard position.\n*fake_choice\n    #\"What the hell?\"\n        \"What the hell Zac!?\" you blurt.\n    #Get up\n        You stand up.\n        \nThe Instructor turns to Zac. \"I can promise you a Filo terrorist will not wait for you to get up. Zac! Attack!\"\n*page_break\n*temp hit 0\n*temp hitz 0\n*temp zachere 1\nZac kicks your stomach with @{male his|her} right foot.\n*choice\n    #Brace your stomach muscles\n        *if (strength >= 50)\n            You brace your muscles, your strength allowing you to take the punishment without getting the air kicked from your lungs. (Strength +3) (Success! Needed 50 Strength)\n            *goto stand\n        *else\n            You try to brace your muscles but you just aren't strong enough. Zac's kick drives the air from your lungs and you fall, breathless face down into the dirt. (Needed 50 Strength)\n            *line_break\n            \"Get up $!{nick}!\" the Instructor screams \"You can't be dead yet!\"\n            *set hit +1\n            *goto stand\n    #Evade the kick by rolling in the other direction\n        *if (handcombat >= 10)\n            You quickly manage to roll out of the way, narrowly avoiding Zac's foot. With Zac off balance you use the chance to stand up. (Hand to hand combat +3) (Success! Needed 10 Hand to hand combat)\n            *set handcombat +3\n            \n            *goto stand\n*label stand\n*gosub_scene sub\n\nUnsteadily, you stand up, facing Zac.\n*line_break\nthe Instructor circles both of you slowly.\n\n\"There are two ways to win a fight\" the Instructor announces \"The first is strength, the second is by being good. I don't recommend any specific path. Choose your own, depending on your strengths and weaknesses.\n*line_break\nThis fight will go on until one of you surrenders or gets knocked out.\n*line_break\nI hope for your sakes it will be knocked out.\"\n\n*page_break\nYou look at Zac, @{male he|she} seems unconfident, not sure how hard @{male he|she} should hit.\n*choice\n    #Give it everything I have. I can't lose this!\n        *goto strong\n    #If neither of us hits as hard as @{male he|she} can- it will be better for both of us\n        *goto weak\n*label strong\nYou decide to hit as hard as you can. An enemy won't show mercy and neither should you. (Loyal +5)\n*set loyal +5\n*gosub_scene sub\n\nSeeing the determination in your eyes, Zac appears to gain confidence. \n*line_break\n*label weak1\n*gosub_scene sub\nSuddenly, Zac jabs towards your face with @{male his|her} left hand!\n*choice\n    #Block\n        *if (strength >= 50)\n            You raise your right hand to meet Zac's, catching @{male his|her} hand in midair. (Strength +3) (Success! Needed Strength 50)\n            \n            Pressing your advantage you counterattack. Jabbing with your left and hitting Zac's face.\n            *line_break\n            *set hitz +1\n            *set strength +3\n            *goto attack\n        *else\n            You raise your right hand to meet Zac's but @{male he|she} follows @{male his|her} jab with a hook with @{male his|her} right hand, hitting you hard across the cheek. (Needed Strength 50)\n            *set hit +1\n            *goto attack\n    #Evade\n        *if (handcombat >= 15)\n            You pull your head back, evading the jab. (Hand to hand combat +3) (Success! Needed Hand to hand combat 15)\n            *set handcombat +3\n            *set hitz +1\n            *line_break\n            With Zac off balance you counterattack. You feel your hand connect with Zac's face with a satisfying crunch.\n            *goto attack\n        *else\n            You try to pull your head back but you are too slow. The jab hits you square on the nose. You taste blood. (Needed Hand to hand combat 15)\n            *set hit +1\n            *goto attack\n*label weak\n*set loyal -5\n*if (zacrel >= 60)\n    This isn't right! Zac is your friend! You can't fight @{male him|her} like this. ([i]Luf[/i] +5)\n    \n    You wink at Zac and @{male he|she} winks back. Satisfied that you won't hurt each other you take a step forward. Tentatively jabbing towards @{male his|her} chest.\n    \n    \"What do you two think you're playing at!?\" the Instructor shouts \"Do you think a Filo will wink and joke around with you? Is this the type of fighter you want to be?\"\n    \n    Zac shakes @{male his|her} head. \"I'm sorry $!{nick}, but imma beat you up now. It's for our own good.\"\n    *goto weak1\n*elseif (zacrel >= 50)\n    This isn't right! You can't fight your platoon mate like this! ([i]Luf[/i] +5)\n    \n    You nod at Zac and @{male he|she} nods back. Satisfied that you won't hurt each other you take a step forward. Tentatively jabbing towards @{male his|her} chest.\n    *line_break\n    *goto weak1\n*else\n    You may not get along with Zac but fighting @{male him|her} like this? You won't do it. It isn't right! ([i]Luf[/i] +5)\n    \n    Zac takes a step closer.\n    \n    \"Hey $!{nick}\" @{male he|she} leers \"At first I wasn't so sure about this, but I think I might enjoy this after all.\"\n    *line_break\n    *goto weak1\n\n*label attack\n*gosub_scene sub\n\n\"What are you two waiting for!?\" the Instructor shouts \"Attack!\"\n\nYou notice Zac getting distracted by the shouting.\n*choice\n    #Hit @{male him|her} as hard as I can\n        *if (strength >= 55)\n            You swing wildly, smashing your hand into Zac's unprotected chest. (Strength +3) (Success! Needed Strength 55)\n            *line_break\n            @{male He|She} appears winded\n            *set strength +3\n            *set hitz +1\n            *goto attack1\n        *else\n            You swing wildly, hitting Zac's unprotected chest. Unfazed, Zac grabs your neck, pulling you close. (Needed Strength 55)\n            *line_break\n            Before you can react, Zac knees you hard enough to force the breath out of you.\n            *set hit +1\n            Crumpling from the pain you almost fall but manage to take a few steps back.\n            *goto attack1\n    #Go in for a clinch\n        *if (handcombat >= 20)\n            You use the distraction to get in close. Grabbing Zac and kneeing @{male him|her} in the chest. (Hand to hand combat +3) (Success! Needed Hand to hand combat 15)\n            *set handcombat +3\n            *set hitz +1\n            *goto attack1\n        *else\n            You try to use the distraction to get in close.\n            *line_break\n            While you are overextended Zac headbutts you. (Needed Hand to hand combat 20)\n            *set hit +1\n            *goto attack1\n*label attack1\n*gosub_scene sub\n\n*if (hit >= 2)\n    You pull back, breathless and wounded.\n    *line_break\n    You swoon.\n    *line_break\n    Your breath comes in short shallow bursts. Your mouth slightly ajar.\n    *line_break\n    You know can't take much more before passing out.\n    \n    Seeing your weakness, Zac stays in a defensive position, hoping you will pass out before you can try something again.\n    *choice\n        #Brute force your way through @{male his|her} guard\n            *if (strength >= 55)\n                With what's left of your strength you punch @{male his|her} face. The punch hits Zac's arms.\n                *line_break\n                The strength of your punch causes Zac to recoil and trip. (Strength +3) (Success! Needed Strength 55)\n                *line_break\n                Seizing the opportunity you jump on @{male him|her}. Your knee makes contact with @{male his|her} chest.\n                *line_break\n                You feel something crack with the raw strength of your impact.\n                *set crack true\n                *line_break\n                Zac taps the ground twice, yielding.\n                *set strength +3\n                *goto win1\n            *else\n                With what's left of your strength you punch @{male his|her} face. The punch hits Zac's arms. (Needed Strength 55)\n                *line_break\n                You think you notice Zac smiling before @{male he|she} returns a flurry of blows.\n                *goto lose\n        #Trip Zac\n            *if (handcombat >= 20)\n                You take a step towards Zac. As quick as you can you drop and kick @{male his|her} legs out underneath @{male him|her}.\n                *line_break\n                Zac crashes to the ground. (Hand to hand combat +3) (Success! Needed Hand to hand combat 20)\n                *line_break\n                Seizing the opportunity you jump on @{male him|her}. Your knee makes contact with @{male his|her} chest.\n                *line_break\n                You feel something crack with the raw strength of your impact.\n                *set crack true\n                *line_break\n                Zac taps the ground twice, yielding.\n                *set handcombat +3\n                *goto win1\n            *else\n                You take a step towards Zac. As quick as you can you drop and kick @{male his|her} legs out underneath @{male him|her}.\n                *line_break\n                Unfortunately, you misjudge the distance. (Needed hand to hand combat 20)\n                *line_break\n                You are left on the ground, looking pretty stupid\n                *line_break\n                Zac doesn't wait to enjoy the irony and quickly steps on you.\n                *line_break\n                And again\n                *line_break\n                And again\n                *line_break\n                And aga...\n                *goto lose\n*else\n    \n    Zac begins circling you, pretending to jab and stopping at the last moment before committing. The time to end this is now.\n    *choice\n        #Attack savagely\n            *if (strength >= 55)\n                With a sudden burst of speed you jump at Zac. Zac jumps back but is too slow. You pummel @{male his|her} face.\n                *line_break\n                Right...\n                *line_break\n                Left...\n                *line_break\n                Right...\n                *line_break\n                Left...\n                *line_break\n                Your last punch is too much for Zac. @{male He|She} falls backwards, unconscious. (Strength +3) (Success! Needed Strength 55)\n                *set strength +3\n                *goto win\n            *else\n                With a sudden burst of speed you jump at Zac.\n                *line_break\n                Zac extends @{male his|her} arm and you run straight into it. The force of the impact causes you to fall backwards. (Needed Strength 55)\n                *line_break\n                Zac doesn't wait to enjoy the irony and quickly steps on you.\n                *line_break\n                And again\n                *line_break\n                And again\n                *line_break\n                And aga...\n                *goto lose\n        #Trick @{male him|her} into lowering @{male his|her} guard, then attack\n            *if (handcombat >= 20)\n                You take a step towards Zac. As quick as you can you drop and kick @{male his|her} legs out underneath @{male him|her}. Zac crashes to the ground. (Hand to hand combat +3) (Success! Needed Hand to hand combat 20)\n                *line_break\n                Seizing the opportunity you jump on @{male him|her}. Your knee makes contact with @{male his|her} chest.\n                *line_break\n                You feel something crack with the raw strength of your impact.\n                *set crack true\n                *line_break\n                Zac taps the ground twice, yielding.\n                *set handcombat +3\n                *goto win1\n            *else\n                You take a step towards Zac. As quick as you can you drop and kick @{male his|her} legs out underneath him.\n
