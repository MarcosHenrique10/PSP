     \n            Time stretches out and slows down. (Success! Needed 40 professionalism.)\n            *line_break\n            You turn your head to the left.\n            *line_break\n            An armed teenager is crouching behind a couch.\n            *line_break\n            @{male He|She} is holding a rifle.\n            *line_break\n            Pointed at you.\n            *choice\n                #FIRE!\n                    You change course and turn to your left. You fire your gun at the enemy just as @{male he|she} is about to pull the trigger, hitting @{male him|her} square in the chest.\n                    *line_break\n                    \"Clear!\"\n                    \n                    The rest of the fireteam join you in the cleared room. Relief washes over you, glad to still alive, you run outside towards the waiting APC.\n                    *set ending 4\n                    *goto_scene ending\n        *else\n            You hear a burst of gunfire.\n            \n            Everything goes dark.\n            *set ending 3\n            *goto_scene ending\n    #\"Let's go!\"\n        Sam leads the way, running into the building without stopping.\n        *line_break\n        Just as you are about to join @{male him|her} inside, you hear a burst of gunfire and see Sam fly backward, hit the wall and crumple on the floor.\n        *line_break\n        You stop right at the door frame, turning slowly inside.\n        \n        A teenager, no more than 16 years old stands frozen in place, a rifle in their hands.\n        *choice\n            #Shoot the teenager\n                *goto runoutside\n            #Tell @{male him|her} to raise@{male his|her} hands and drop@{male his|her} gun.\n                *if speech >=50\n                    \"[i]Vakf! Yadk Lma'el![/i]\" You shout, thankful you still remember the Filo words for \"Freeze! Raise your hands!\" (Success! Needed 50 persuasion) (Persuasion +3)\n                    *set speech +3\n                    *set prisoner true\n                    \n                    The teen turns towards you, @{male his|her} eyes blank.\n                    *line_break\n                    \"[i]Vakf! Yadk Lma'el![/i]\" You repeat again.\n                    *line_break\n                    [i]\"An..An..\"[/i] the figure stammers.\n                    *choice\n                        #Hit @{male him|her} in the face with the butt of your rifle\n                            You run forwards, slamming the butt of your rifle into the teenager's face. @{male He|She} falls to the ground, unconscious.\n                            *line_break\n                            \"Tie @{male him|her} up!\" You shout, rushing to Sam's side to place a tourniquet on@{male his|her} bleeding leg.\n                            *set prisoner true\n                            *goto iseetheapc\n                        #Lower your weapon and slowly approach @{male him|her}.\n                            You lower your weapon, slowly approaching the teen.\n                            *line_break\n                            You open your hand and offer it, motioning towards the rifle. \"[i]Yadk Lma'el![/i]\" You repeat.\n                            \n                            The @{male boy|girl} hands you @{male his|her} rife dumbly.\n                            *page_break\n                            Zac runs forwards, kneeing the boy in the stomach and quickly putting zip-ties on @{male his|her} hands. \"You crazy idiot! Sam is bleeding out!\" (Zac -5)\n                            *set prisoner true\n                            \n                            @{male Abe|Mara} runs to Sam, quickly placing a tourniquet on @{male his|her} leg. \"Help me get @{male him|her} out of here!\"\n                            *line_break\n                            You swing the rifle sling on your back and place Sam's arm over your shoulder.\n                            *label iseetheapc\n                            \n                            \"I see the APC!\" Zac shouts \"Over there!\"\n                            *line_break\n                            The prisoner in tow, you sprint as fast as you can with Sam leaning @{male his|her} weight on you to the waiting APC.\n                            *set woundedsam true\n                            *set ending 4\n                            *goto_scene ending\n                        #Shoot @{male him|her}.\n                            *label runoutside\n                            You fire a single bullet, hitting the figure directly in the head, @{male he|she} falls on @{male his|her} back, @{male his|her} rifle clattering to the side. (Shooting +1) (Loyal +5)\n                            *set loyal +5\n                            *set shooting +1\n                            \n                            @{male Abe|Mara} leaps onto Sam, placing a tourniquet on @{male his|her} bleeding leg.\n                            *line_break\n                            You approach the dead teenager, removing @{male his|her} rifle and slinging it onto your back.\n                            *line_break\n                            \"I see the APC!\" Zac shouts, placing Sam's arm on @{male his|her} shoulder \"It's right out there!\"\n                            *set woundedsam true\n                            *set ending 4\n                            \n                            Throwing a smoke grenade to give you cover, you sprint together to the waiting APC.\n                            *goto_scene ending\n                *else\n                    \"Stop! Drop the gun!\" you shout.\n                    *line_break\n                    The armed figure shouts a battle cry and pulls the trigger, thankfully, a weapon firing automatically is extremely inaccurate. @{male His|Her} bullets go wide as@{male his|her} gun almost flies out of@{male his|her} hands. (Needed 50 persuasion)\n                    *line_break\n                    @{male Abe|Mara} returns fire, the figure drops.\n                    *goto run\n*label prisoner\n*page_break\nNow, with the figure in front of you, you notice @{male he|she} can't be more than 16 years old.\n*line_break\n\"What do we do with @{male him|her}?\" Zac asks.\n*line_break\n\"We'll take @{male him|her} with us.\" Sam says \"Hand me a ziptie, ${nick}.\"\n\n\"You will never win, you know.\" The teenager says in accented Regovian. \"Our people are strong. We will see you driven into the sea.\"\n*line_break\n*if loyal >=75\n    Without thinking, you smash your rifle butt into @{male his|her} unprotected stomach. \"Shut your mouth.\" You shout. \"Let's go.\"\n    *goto youlead\n*elseif loyal >=65\n    Without thinking, you slap @{male his|her} face. \"Shut up.\" You shout. \"Let's go.\"\n    *goto youlead\n*else\n    *goto youlead\n*label youlead\n*page_break\n\nYou lead the captured teenager into the APC, leaving the smoke-filled town behind.\n*set ending 4\n*goto_scene ending\n*label run\n*page_break\nYou run together towards the house ahead, jumping over the body of the \n*if loyal>50\n    terrorist you shot.\n    *goto youshot\n*else\n    person you killed.\n    *goto youshot\n*label youshot\n\nYou breathe a sigh of relief. Through the window, you can see the waiting APC pushing out smoke to hide from any enemy who might be targeting it.\n*set ending 4\n*goto_scene ending\n*label rushtotheexit\n*page_break\n\"There it is!\" @{male Abe|Mara} points \"The APC!\"\n*line_break\n@{male Abe|Mara} throws a smoke grenade outside the window, obscuring your escape route.\n\n*set ending 5\nThe three of you run together, before you know it, someone is grabbing your hands, pulling you into the warm, stuffy APC.\n*line_break\n\"That's the last of us! Go go go!\" someone shouts. Relived to be finally safe, you close your eyes.\n*goto_scene ending\n*label todefendthebase\n*line_break\nFaraz gestures to an unrolled map of the Greven highlands at @{male his|her} feet. \"Sorry I don't have any of the high-tech screens we have at ${quarter}. I know this exile hasn't been kind to us, but hopefully, this will change some things.\"\n*line_break\n\"We're going back?\" Zac asks hopefully.\n*line_break\n\"Sort of.\" Faraz answers \"On the whole, the war hasn't been going well. However, we have managed to capture a few small enemy bases.\" Faraz points to a small dot on the map. \"Meet FOB 5135, currently the most northern base under Regovian control. Our mission is to hold the base and repel the unavoidable enemy counterattack. Get your stuff ready, we leave in one hour.\"\n*image mapFOB5135.png\n*goto defendbase\n*label defendbase\n*page_break 2000, 18th February, 2022\n*temp basedefenders 100\n*temp baseattackers 100\nThe night is clear, cold and bright, the moon hangs high in the sky, shining its light on the valley to the north.\n\nFOB 5135 had formerly been an unimportant Sarian FOB on the southern Sarian border. Due to its unimportance, it had been lightly defended and occupied by Regovia in the first stages of the war.\n\nThe FOB is made exclusively of reinforced concrete with tall walls, razor wire and guard towers while the southern side is only defended by lower walls and a single guard tower on its northern side. \n\nInside the FOB, there are small concrete buildings built mostly underground. The few overground buildings are camouflaged. Their roofs painted the same orange gray as the surrounding ground.\n\nAs soon as you had reached FOB 5135 you and the rest of the ${unit} began preparing for the coming attack. \n*line_break\nThe razor wire from the southern side had been cut and placed on the north, sandbags were piled high on the roofs of the aboveground buildings to create machine gun nests and underground buildings had been repurposed as temporary hospitals by placing stretchers and medical supplies in them.\n*page_break\n*if success = true\n    Thanks to having accurate intelligence, you had received hourly reports of Sarian preparations and even had almost ten minutes of warning before being shelled by Sarian artillery. Luckily, the FOB has excellent bunkers and the inaccurate Sarian shelling hadn't caused any damage that hadn't been fixed.\n    *goto thanksto\n*else\n    The lack of intelligence had left you with little to no warning whenever the Sarians decided to shell the FOB and many ${unit} had been wounded since your arrival.\n    *set basedefenders -10\n    *goto thanksto\n*label thanksto\n*page_break 2300, 18th February, 2022\n*if ((smoke=1) and (discipline \u003c60))\n    *label smoking\n    You light a cigarette, inhaling a deep breath of smoke and calming your nerves a bit. The small red dot at the edge of the cigarette may harm your night vision a little but the brightness of the moon should allow you to see anyway, or so you tell yourself. \n    *if discipline \u003c=60\n        (Needed 60 discipline)\n    *goto didntseethatcoming\n*elseif ((smoke =1) and (discipline >=60))\n    You find yourself opening and closing your fist, the nervous energy making you fidget.\n    *choice\n        #Light a cigarette.\n            *goto smoking\n        #Don't light a cigarette.\n            *goto nosmoking\n*else\n    *temp randomluck 0\n    You find your eyelids drooping, you hadn't slept for well on the drive north and now you find yourself almost too tired to keep a lookout.\n    *choice\n        *selectable_if ((discipline >=60) or (willpower >=60)) #Shake yourself awake, you're stronger than this! (Need discipline or willpower 60)\n            You shake your head for a moment, dispelling any notion of not devoting 100% of your willpower and discipline to the task at hand. (Success! Needed 60 willpower or discipline.)\n            *goto nosmoking\n        #Leave the position for a moment to get a cup of coffee.\n            *rand randomluck 0 10\n            *set randomluck +3\n            You struggle for another minute before giving up and running down to the small kitchenette. You make a quick cup of black coffee.\n            *if randomluck >=7\n                *goto nosmokingcoffee\n            *else\n                *goto didntseethatcoming\n        #Rest your eyes for just a moment.\n            You don't want to leave your position but you just can't keep your eyes open for another moment.\n            *rand randomluck 0 10\n            *if randomluck >=7\n                *goto stayawake\n            *else\n                *goto didntseethatcoming\n*label nosmokingcoffee\n\nYou walk back to your position as fast as you can without spilling any of the precious liquid.\n*line_break\nAfter finishing your coffee, you feel much more alert.\n*goto whatisthat\n*label nosmoking\n\nYou shake your head and return to focusing on the valley ahead.\n*goto whatisthat\n*label stayawake\n\nYou open your eyes and look at your wristwatch. More than 15 minutes had passed! You focus on the valley ahead, nothing seems different. You sigh. At least you feel much more awake now.\n*goto whatisthat\n*label didntseethatcoming\n\nSuddenly, you feel the entire base shake. An alarm begins to blare and a flare appears in the air.\n*set basedefenders -10\n*page_break [b]CONTACT![/b]\n*goto boom\n*label whatisthat\n\nSuddenly, a small red light appears on a hill to your north. It seems to be moving in a lazy circle around itself.\n*line_break\n...\n*line_break\n...\n*page_break\nSuddenly it dawns on you. \n*line_break\nIt's an ATGM.\n*line_break\n\"INCOMING MISSILE! TAKE COVER!\"\n*page_break [b]BOOM[/b]\nThe entire base shakes as the missile hits one of the outer walls, blowing a hole in the concrete about ten meters to your left. The shock wave causes you to fall on your back, pushing the breath out of your lungs.\n*line_break\nAn alarm begins to blare and a flare appears in the air.\n*label boom\n*page_break\nYou check the safety on your \n*if profession= \"HMG\"\n    FN MAG, keeping your thumb on the button.\n    *goto safety\n*elseif profession =\"LMG\"\n    LMG, keeping your thumb on the switch.\n    *goto safety\n*else\n    rifle, keeping your thumb on the switch.\n    *goto safety\n*label safety\n\nYou hear Miller's confident voice in your earpiece. [i]\"Be aware an enemy squad has exited a tunnel less than 100 meters north of our position. Fire at will.\"[/i]\n\n*if profession = \"Marksman\"\n    You scan the valley using your thermal vision. \"I see four targets, 90 meters ahead and closing in!\" you report.\n    \n    *choice\n        #Wait for them to close in.\n            \"80 meters and closing.\"\n            *line_break\n            [i]\"What are you waiting for? Fire!\"[/i]\n            *choice\n                #Fire!\n                    *if shooting >=80\n                        You fire four bullets in quick succession. The targets drop one after the other.\n                        *set baseattackers -10\n                        *goto enemiesdown\n                    *elseif shooting >=65\n                        You fire four bullets in quick succession, two of the targets fall while the other two disappear behind some boulders.\n                        *set baseattackers -5\n                        *goto enemiesdown\n                    *else\n                        Your fire four bullets in quick succession, the targets split up and disappear behind some boulders.\n                        *goto enemiesstillup\n                #Wait for them to close in.\n                    \"[i]What is wrong with you?[/i] you hear the Heavy Machine Gunner shout.\n                    *line_break\n                    You hear a sound like the crack of thunder as the FN MAG begins to spit bullets, you can see in your thermal vision that only one of the enemies is hit, the rest take cover behind some boulders.\n                    *set baseattackers -1\n                    *goto enemiesstillup\n        #Fire!\n            *if shooting >=90\n                You fire four bullets in quick succession. The targets drop one after the other.\n                *set baseattackers -10\n                *goto enemiesdown\n            *elseif shooting >=75\n                You fire four bullets in quick succession, two of the targets fall while the other two disappear behind some boulders.\n                *set baseattackers -5\n                *goto enemiesdown\n            *else\n                Your fire four bullets in quick succession, the targets split up and disappear behind some boulders.\n                *goto enemiesstillup\n*else\n    [i]\"I see four targets\"[/i] @{jimjimalive JiJi|Noter} reports, [i]\"90 meters ahead and closing.\"[/i]\n    \n    *if jimjimalive =true\n        You hear a few shots. [i]\"Enemy down.\"[/i]\n        *set baseattackers -10\n        *goto report\n    *else\n        You hear a few shots. [i]\"Shit, two are still up.\"[/i]\n        *goto report\n*label enemiesdown\n*line_break\n\"Enemy down.\" you report, \n*if loyal>50\n    the satisfaction in your voice obvious.\n    *goto report\n*label enemiesstillup\n\"Enemies still up, I can't hit them.\" you report,\n*if loyal >50\n    the displeasure in your voice obvious.\n    *goto report\n*label report\n*page_break\nThick gray smoke you recognize as smoke from smoke grenades begins to fill the valley, providing cover for the approaching Sarians.\n*line_break\nYou begin to hear the sounds of bullets whistling over your head as enemy snipers begin to take shots at the FOB.\n\n*if profession = \"HMG\"\n    [i]\"${nick}.\"[/i] Faraz's voice comes through. [i]\"I'm sending Zac to your position to assist you as a spotter. We need you to find and take out those snipers!\"[/i]\n    *fake_choice\n        #\"Roger that.\"\n        #\"Received.\"\n    You crouch under the concrete wall while you wait for what feels like an eternity until Zac arrives, breathless, a pair of binoculars in @{male his|her} hand. \n    *line_break\n    *if zacrel >=60\n        \"How you doin'?\" @{male He|She} asks with a smile.\n        *goto smile\n    *else\n        \"Hey, ready to save the day?\" @{male He|She} says with a smirk.\n        *goto smile\n*else\n    *goto thehmg\n*label smile\n*line_break\n\"Let's do this.\" you smile back. \"Faraz, give us some air.\" You request.\n*line_break\n[i]\"Enjoy.\"[/i]\n\nAll at once, the soldiers of FOB 5135 begin firing towards the general location of the Sarians, giving you just the cover fire you need.\n\nYou raise your head over the concrete cover, placing the butt of the machine gun just above your armpit and your hand over the butt of the HMG.\n*line_break\nNow, with the Mag securely in place, you should have an effective range of 800 meters.\n\n\"Got @{male him|her}! To the right!\" Zac shouts while looking into the binoculars.\n*line_break\nYou fire a burst at random so that Zac will get a feel to where you are aimed.\n*line_break\n\"A bit more to the left\".\n\n*if mag >45\n    The back and forth continues for a few minutes until all the enemy snipers are dead. (Success! Needed 45 HMG) (Zac+3, HMG +3)\n    *set mag +3\n    *set zacrel +3\n    *set baseattackers -10\n    *goto aredead\n*elseif mag >40\n    The back and forth continues for a few minutes until the enemy snipers are dead or in cover. (Needed 45 HMG) (HMG +1)\n    *set mag +1\n    *set baseattackers -5\n    *goto aredead\n*else\n    The back and forth continues for a while but to your dismay, most snipers manage to take cover and return to their previous positions when you move on. (Needed 45 HMG)\n    *set baseattackers -1\n    *goto aredead\n*label thehmg\nIn response, you hear the crack of heavy machine guns returning fire. When they stop a few minutes later- there are no more Sarian snipers.\n*set baseattackers -10\n*label aredead\n*page_break\nThe firefight continues for some time with no side gaining the upper hand. The Sarians continue trying to scale the valley while the ${unit} try to dislodge the Sarian soldiers and force them back down.\n\n*if shooting >=90\n    You do your part, firing accurately and killing a growing amount of Sarian soldiers. However, no matter how many you kill, more always exit the tunnel. (Success! Needed 90 shooting.) (Shooting +3)\n    *set shooting +3\n    *set baseattackers -3\n    *goto millerwants\n*elseif shooting >=80\n    You do your part, firing as accurately as you can, you manage to kill some of the advancing Sarians. However, no matter how many fall, more Sarians exiting the tunnel are ready to take their place. (Needed 90 shooting for better result)\n    *set baseattackers -1\n    *goto millerwants\n*else\n    You try to do your part and shoot the advancing Sarians but your shots hit the boulders the Sarians are hiding behind, causing no damage. (Needed 90 shooting)\n    *goto millerwants\n*label millerwants\n\nYou feel a tap on your shoulder, it's Walker.\n*line_break\n\"${nick}, Miller wants you, it's important.\"\n*page_break\nYou go down the steps into the improvised command bunker. \n*line_break\nWhen you had arrived, the bunker had been used as a club for the Sarian soldiers. One of the first things Faraz had done was move the furniture around so that the room could be used as an HQ for the coming battle.\n*line_break\nYou take a deep breath, while @{male he|she} had been successful on that front, it still smells like a sketchy pool club in Ashel.\n\nThe dimly lit room is dominated by two heavy pool tables that have been pressed together so that the huge, detailed map of the area could be fully spread out.\n\n*temp alexis true\n*if alexisdead=1\n    *set alexis false\n\nAround the map, you see Faraz, @{alexis Alexis| Charlie, the former sergeant and now commander of TM10} and Miller. @{alexis |When Alexis had died, Charlie was the obvious replacement. As the sergeant of TM10, Charlie had the trust of the team and some experience in leading them.}\n*line_break\n\"So we are on our own.\" @{alexis Alexis| Charlie} says,@{male his|her} voice emotionless.\n*line_break\n\"Yes.\" Faraz sighs \" Every spare artillery piece is being used further to the east. Every plane is being used further to the north to make sure no Sarian plane assists them in the coming battle. We have to win with what we have.\"\n\nA tense silence falls on the room.\n*fake_choice\n    #You called for me?\n    #Cough loudly.\n\"I see you're there ${nick}, I would just prefer it would be otherwise.\" Faraz says, not raising @{male his|her} eyes from the map. \"We need a miracle.\"\n*line_break\nAs if on cue, @{male Abe|Mara} enters the room. \"You called?\"\n*line_break\n\"Yes, we need both of you.\" Miller explains \"We want to send a small force, a single fireteam, to ambush the Sarian tunnel system.\"\n*line_break\nFaraz points to a point on the map. \"We have identified this point as the exit of a tunnel system that allows the Sarians to replenish their manpower. If we can find the entrance and cut it off the entire Sarian force would either surrender or be destroyed.\"\n*line_break\n\"So you want us to do it? But we're the least experienced team in the company!\" @{male Abe|Mara} objects. \"You aren't even sending us with an officer!\"\n*line_break\nFaraz raises @{male his|her} voice \"I know!\" @{male he|she} takes a deep breath, calming @{male him|her}self. \"I have two healthy team commanders, two wounded team commanders and I can't send my XO or the healthy officers on a mission like this, I need them here. Your fireteam is the only one I can spare for this.\"\n\n\nMiller motions you to come closer to the map.\n*page_break\n*image map.jpg center a map of the surrounding area, FOB 5135 is to the south and the suspected tunnel entrance in the north.\n\n\"Go out the back, circle around the east and surprise them from behind. Try to keep radio silence until you are in control of the entrance.\" Miller explains \"I trust you. Good luck.\"\n*label abel\n*page_break\nUpon exiting the room you are greeted by a smiling Zac and frowning Sam.\n*line_break\n\"We heard everything.\" Sam explains.\n*line_break\n\"Suicide mission with the @{male guys|gals} eh?\" Zac giggles. \"I always knew it would end this way.\"\n*fake_choice\n    #Frown, \"Nobody dies tonight. We take out the tunnel and return as heroes.\"\n    #Smile, \"I wouldn't be willing to go on a suicide mission with anyone else.\"\n        You smile, \"I wouldn't be willing to go on a suicide mission with anyone else.\" (Zac +5, @{male Abe|Mara} +5, Sam +5)\n        *set zacrel +5\n        *set samrel +5\n        *set aberel +5\n        \n\"For sure, for sure.\" Zac chuckles \"But if we do die- I want a traffic circle named after us.\" Zac straightens @{male his|her} back, doing a pretty good impression of Miller \"They should call it: \"The three Sacrifices.\"\n*line_break\n\"Can't you count?\" Sam pushes Zac jokingly \"There are four of us!\"\n*line_break\n*if zacrel \u003c=30\n    Zac looks at you. \"Not all of us will be missed.\"\n    *choice\n        #Put @{male him|her} in@{male his|her} place.\n            \"What did you say?\" you approach Zac threateningly.\n            *line_break\n            *if strength >=75\n                Zac backs away. \"Nothing, I didn't mean anything by it.\"\n                *goto missed\n            *else\n                \"Can't you hear?\" Zac retorts.\n                *line_break\n                \"Break it up, both of you.\" @{male Abe|Mara} snaps. \"This isn't the time.\"\n                *goto missed\n        #Ignore it.\n            *goto missed\n*else\n    Zac pushes Sam back, a wide smile on@{male his|her} face. \"Guess not all of us will be missed.\"\n    *goto missed\n*label missed\n\n*line_break\n*if profession = \"Fireteam leader\"\n    \"We should leave.\" You say. \"Does everyone have all of their equipment?\"\n    *goto lead\n*else\n    \"We should leave.\" @{male Abe|Mara} says. \"Does everyone have all of their equipment?\"\n*line_break\n*if profession= \"Medic\"\n    You touch your tourniquets and ammo.\n    *label everything\n    \"Everything where it needs to be.\"\n    *line_break\n    Zac and Sam nod as well.\n    *line_break\n    \"Then let's go.\"\n    *goto go\n*elseif profession = \"HMG\"\n    \"I'm going to leave my machine gun behind. It's ways too heavy and unwieldy for a mission like this.\" You say.\n    *line_break\n    \"Agreed.\" @{male Abe|Mara} says \"Trade it for a rifle with one of the @{male guys|ladies} here, it'll be much more useful.\"\n    \n    *goto go\n*elseif profession= \"LMG\"\n    You check your ammo pouch and safety. \n    *goto everything\n*elseif profession =\"Marksman\"\n    You check your thermal sight still has enough battery.\n    *goto everything\n*else\n    *goto lead\n*label lead\nAll three nod.\n*line_break\n\"Then let's go.\"\n\n*if aberel >50\n    @{male Abe|Mara} clears @{male his|her} throat nervously. \"Before we go I would like to make a blessing.\"\n    *line_break\n    Zac coughs to hide @{male his|her} laughter, @{male Abe|Mara} doesn't seem to notice.\n    *fake_choice\n        #\"Go ahead.\"\n            You smile before remembering that @{male Abe|Mara} probably can't distinguish any of your facial expressions in the dark. \"Go ahead.\"\n            \n            You think you notice a smile flickers on @{male Abe|Mara}s lips before @{male he|she} closes @{male his|her} eyes while raising the palms of @{male his|her} hands in the air. After a moment of awkward silence @{male he|she} begins to hum while @{male his|her} hands start gently shaking. \n            \n            \"May the Sun guide you in this dark, may it protect and keep you.\n            *line_break\n            May its light shine upon your face.\n            *line_break\n            May you go in peace and return in peace under the Sun's eternal light.\" (@{male Abe|Mara} +2)\n            *set aberel +2\n        #\"We really don't have time for this.\"\n            \"We really don't have time for this.\" You whisper back.\n            *line_break\n            @{male Abe|Mara} doesn't answer, but even without looking at @{male his|her} face, you can feel @{male his|her} embarrassment. (@{male Abe|Mara} -5)\n            *set aberel -5\n            *line_break\n            \"Anywayyyy,\" Zac wets @{male his|her} lips \"what were you saying ${nick}?\"\n            *line_break\n            \"We should be going.\"\n*goto go\n*label go\n*page_break\nAfter leaving the FOB you begin to walk north.\n*label navigate\n*if navigation >=55\n    It's not a long walk, and thanks to your excellent navigation skills, you find yourself at the foot of the hill where you need to climb unscathed. (Success! Needed 55 navigation) (Navigation +5, Everyone +5)\n    *set navigation +5\n    *set zacrel +5\n    *set aberel +5\n    *set samrel +5\n    *goto footofhill\n*elseif navigation >=45\n    Using your navigation skills, you manage to bring the fireteam to the foot of the hill where you need to climb without being seen by any of the advancing Sarians. (Needed 55 navigation for better results)\n    *goto footofhill\n*else\n    Your navigation skills a bit wanting, @{male Abe|Mara} leads the fireteam.\n    *line_break\n    At first, the walk is easy and @{male Abe|Mara} easily manages to bring the fireteam into the valley but while walking inside the valley itself, @{male Abe|Mara} misjudges and you find yourself face to face with an armed Sarian soldier you hadn't noticed. (Needed 40 navigation)\n    *page_break\n    The Sarian's eyes go wide when @{male he|she} notices you. @{male He|She} raises a handheld radio to @{male his|her} mouth.\n    \n    *if ((strength>=85) or (handcombat>=55))\n        You react quickly, almost instinctively. \n        *line_break\n        You smash the but of your gun into @{male his|her} face.\n        *line_break\n        @{male He|She} crumples to the ground, unconscious. (Success! Needed 85 strength or 55 hand to hand combat)\n        *if loyal\u003ccynic\n            , you hope.\n        *goto footofhill\n    *elseif ((strength>=70) or (handcombat>=50))\n        You step forward and try to punch the Sarian in the face. \n        *line_break\n        The Sarian reacts quickly, sidestepping and clipping ramming the muzzle of@{male his|her} rifle into your stomach, driving the air out of your lungs.\n        *line_break\n        Luckily, before @{male he|she} sounds the alarm, @{male Abe|Mara} grabs @{male him|her} from behind, choking @{male him|her} until @{male he|she} goes still. (Needed 85 strength or 55 hand to hand combat for better results)\n        *goto footofhill\n    *else\n        You try to grab the Sarian but @{male he|she} steps back and shouts [i]\"Regovi ba lemat!\"[/i] into the radio.\n        *line_break\n        Zac fires a single bullet, killing the Sarian.\n        *line_break\n        \"We need to run.\" Sam says, panic rising in@{male his|her} voice \"They'll be here in no time.\" (Needed 85 strength or 55 hand to hand combat)\n        *goto weneedtorun\n*label weneedtorun\n\nThe fireteam begins running towards the top of the hill.\n*line_break\n[i]\"Regovi! Hatam!\"[/i] A voice booms.\n*line_break\nYou look up, a squad of Sarians is at the top of the hill, taking aim at you and your fireteam. \n*line_break\n\"Take cover!\" you shout while taking position behind a boulder.\n\n*if profession = \"LMG\"\n    After placing your LMG securely on the boulder you make easy work of the Sarians, mowing them down with a few short bursts from your weapon. (LMG +3)\n    *set negev +3\n    *goto upthehill\n*else\n    *if shooting >=80\n        You make quick work of the waiting Sarians, picking them off one by one. (Success! Needed 80 shooting) (Shooting +3)\n        *set shooting +3\n        *goto upthehill\n    *elseif shooting >=75\n        With the help of the fireteam, you make quick work of the Sarians. (Needed 80 shooting for better results)\n        *goto upthehill\n    *else\n        You try to hit the Sarians with your rifle but most of your shots go wide or hit only boulders being used for cover.\n        *line_break\n        By the time the fireteam manages to kill the Sarians you have a bigger problem on your hands. (Needed 80 shooting)\n        \n        *if zacrel > samrel\n            *set zacalive false\n            *goto alive\n        *else\n            *set samalive false\n            *goto alive\n*label alive\n@{samalive Zac| Sam} has been hit underneath @{male his|her} armpit and is bleeding profusely while being held by @{male Abe|Mara}.\n\n*if profession = \"Medic\"\n    \"Do something!\" @{male Abe|Mara} shouts. \"You're the medic!\"\n    *line_break\n    \"This is a torso wound.\" you answer automatically \"Nothing can be done.\" (Medic +5)\n    *set medic +5\n    *line_break\n    \"What do you mean nothing can be done?!\" @{samalive Sam| Zac} pushes you onto \n    @{samalive Zac| Sam}. \"You're a medic! You must of learned something in that course!\"\n    *line_break\n    You take a deep breath and turn towards @{samalive Sam| Zac}, grabbing@{male his|her} hand. The last thing you need is a teammate with PTSD.\n    \n    \"We can't do anything for @{male him|her}, @{male he|she} has a chest wound.\" you explain \"Our only chance for saving @{male him|her} is to complete the mission and evacuate @{male him|her} once we can get proper medical assistance.\"\n    *line_break\n    @{samalive Sam| Zac} nods slowly, \"I hate doing this, but if this is@{male his|her} only chance we'd better finish this quick.\"\n    *goto continuethemission\n\n*elseif profession = \"Fireteam leader\"\n    You are the fireteam leader, what are your orders?\n    *label choice\n    *choice\n        *if (intelligence >=75) #I remember nothing can be done to stop a bleeding chest wound. As much as I hate to admit, taking @{male him|her} back to the FOB now won't change anything besides failing the mission. We have to go on. (Intelligence)\n            \"We can't do anything for @{male him|her}, @{male he|she} has a chest wound.\" you explain \"Our only chance for saving @{male him|her} is to complete the mission and evacuate @{male him|her} once we can get proper medical assistance.\"\n            *line_break\n            @{samalive Sam| Zac} nods slowly, \"I hate doing this, but if this is@{male his|her} only chance we'd better finish this quick.\"\n            *goto continuethemission\n        #My top priority is saving @{samalive Zacs| Sams} life. We will carry @{male him|her} back to the FOB on our backs even if it means failing the mission.\n            \"We have to go back.\" You state. \"Two of us will carry @{male him|her} while the third provides cover.\" @{male Abe|Mara} and @{samalive Sam| Zac} nod.\n            *goto backtothefob\n        #My top priority is the mission. We have to go on.\n            *goto continuethemission\n*else\n    @{male Abe|Mara} looks at you helplessly \"What do we do?\"\n    *goto choice\n*label upthehill\n\"Run!\" you shout \"This is our chance!\"\n*goto reveled\n*label footofhill\n\nYou and the fireteam continue to slowly creep up the hill, right before you reach the top @{male Abe|Mara} grabs your arm, stopping you in your tracks.\n*line_break\n\"Shhhh. Look up.\" @{male He|She} whispers, pointing to four figures you hadn't noticed before standing at the top of the hill talking and smoking. \n*line_break\n\"What do you think we should do?\" @{male He|She} asks.\n\n*choice\n    #\"We should take them out quietly, up close.\"\n        The fireteam creeps as closer and closer to the unsuspecting Sarians. Suddenly, as one, you leap on the unsuspecting Sarians together.\n        \n        *if ((handcombat >=40) or (strength >=70))\n            The fireteam attacks as one, striking fast and overpowering the Sarians before they can raise the alarm. (Success! Needed 40 hand to hand combat or 70 strength)\n            *goto tunnelcontrolled\n        *else\n            @{male Abe|Mara}, Sam and Zac quickly subdue their targets. Just before you are about to choke yours, @{male he|she} turns and pushes you away while shouting a warning into@{male his|her} handheld radio. (Needed 40 hand to hand combat or 70 strength)\n            *line_break\n            Now outnumbered, the fireteam easily overpowers @{male him|her}.\n            *goto reveled \n    #\"A single bullet from four separate guns should strike a good balance between silence and safety.\"\n        *temp discovered 1\n        *rand discovered 1 2\n        You flip your safety to fire as quietly as you can, after exactly four seconds, you all fire together. The Sarians fall instantly.\n        *line_break\n        *if discovered =1\n            You hear shouting from a handheld radio at the Sarians feet. From the urgency and volume of the voice, you deduce someone has heard the gunfire.\n            *goto reveled\n        *else\n            The handheld radio at the Sarians feet stays silent, nobody has heard the shot.\n            *goto tunnelcontrolled\n    #\"Quick and messy, open fire and take control of the tunnel.\"\n        \"NOW\" You shout. As one, the fireteam opens fire with no regard for keeping quiet.\n        *goto reveled\n*label reveled\n*page_break\nYou approach the open hole in the ground. @{male Abe|Mara} frowns, \"We may have control of the tunnel, but the Sarians know exactly where we are.\"\n*goto orders\n*label tunnelcontrolled\n*page_break\nYou approach the open hole in the ground. @{male Abe|Mara} smiles, \"We have control of the tunnel and the Sarians don't even know it.\"\n*goto orders\n*label continuethemission\n*if sugercoated = false\n    *if samalive =false\n        *set samcapture true\n        *goto you\n    *else\n        *set zaccapture true\n        *goto you\n*label you\nYou quickly carry @{samalive Zac| Sam} to a nearby boulder that protrudes from the rest of the hill, hiding @{male him|her} underneath it and out of sight. You hope this will be enough to hide @{male him|her} from the Sarians.\n\n\"We need to finish this now.\" You announce. \"It's a matter of minutes before some Sarian gets smart and understands that there was a firefight behind them.\"\n*line_break\n@{male Abe|Mara} nods. \"We need to run to the tunnel entrance.\"\n*goto reveled\n*label backtothefob\n*page_break\nThe three of you take turns carrying @{samalive Zac| Sam} while the third provides cover.\n\nSuddenly, shouts of [i]\"Regovi!\"[/i] and bursts of gunfire erupt around you.\n*line_break\nWith no choice, you drop @{samalive Zac| Sam} and take cover. You try to raise your weapon to return fire but the air is so thick with bullets you can do nothing but remain motionless and wait.\n*page_break\nTo your left, @{male Abe|Mara} is murmuring a prayer with@{male his|her} eyes closed.\n*page_break\nTo your right, @{samalive Sam| Zac} is laying on \n@{samalive Zac| Sam}, covering @{male him|her} from the hail of bullets with@{male his|her} own body.\n*page_break\nYou think back to Zac's joking before you left. Is this how you die?\n*page_break\n*if basedefenders >=90\n    [i]\"Don't move!\"[/i] Faraz's voice sounds in your earpiece. [i]\"We're coming for you!\"[/i]\n    *line_break\n    Almost instantly you are blinded by flares fired towards you from the base. The Sarian shooting stops abruptly as all at once they are blinded by the flares.\n    *line_break\n    [i]\"Run!\"[/i]\n    *page_break\n    You grab @{samalive Zac|Sam}, throwing @{male him|her} over your shoulders as you run south, towards the FOB.\n\n    You run and run, not stopping, slipping and falling and getting up more times than you can count until you crash into Faraz.\n    *line_break\n    \"Whoa there. It's okay, you're safe.\"\n    *choice\n        #\"I brought @{samalive Zac| Sam}. @{male He|She} needs help.\"\n            \"I brough...\"\n            *goto faint\n        #\"Where are @{male Abe|Mara} and @{samalive Sam| Zac}?\"\n            \"Where ar...\"\n            *goto faint\n*else\n    You hear the dull sound of metal hitting rock to your left. You turn just in time to see a small oval shape resting a meter to your left.\n    *page_break Fire\n    *set ending 8\n    *goto_scene ending\n*label faint\n*page_break Darkness\n...\n*page_break A voice\n...\n*page_break \"${nick}?\"\n...\n*page_break You open your eyes.\nYour mouth feels dry, you open and close it a few times. \n*line_break\nYou are lying on your back.\n*choice\n    #Sit up\n        You try to sit up.\n        *line_break\n        \"Take it slow.\" a familiar voice says.\n        *line_break\n        \"@{male Abe|Mara}?\" you mumble.\n        *line_break\n        \"I'm right here.\"\n        *goto situp\n    #Close your eyes\n        \"Can you sit up?\" a familiar voice asks.\n        *line_break\n        \"@{male Abe|Mara}?\" you mumble.\n        *line_break\n        \"Try and sit up, slowly.\"\n        *goto situp\n*label situp\n\nYou sit up in what you discover is a hospital bed.\n*line_break\n\"What happened?\" You ask.\n*line_break\n@{male Abe|Mara} sighs. \"You ran with @{samalive Zac| Sam} on your back the entire way to the FOB. After you got there you fainted.\"\n*label q\n*temp questions 4\n*label questions\n*choice\n    *disable_reuse #\"How is @{samalive Zac| Sam} doing?\"\n        *set questions -1\n        @{male Abe|Mara} swallows. \"I'm sorry, you did your best.\"\n        *line_break\n        *choice\n           #\"What do you mean?\" you snap.\n               *goto snap\n           #\"What do you mean?\" your voice quivering.\n               *label snap\n               \"@{male He|She} died, ${nick}. @{male He|She} needed a hospital and we couldn't get @{male him|her} there on time. I'm so sorry.\"\n               *goto questions\n    *disable_reuse #\"Where is @{samalive Sam| Zac}?\"\n        *set questions -1\n        \"@{male He's|She's} sleeping, we've been keeping watch on you since we arrived.\"\n        *goto questions\n    *disable_reuse #\"What happed to the FOB\"?\n        *set questions -1\n        @{male Abe|Mara} bites@{male his|her} lip. \"The assault continued all night. \n        *if (baseattackers>basedefenders)\n            By the morning we had no choice but to retreat.\"\n            *goto questions\n        *else\n            We managed to hold them off.\"\n            *goto questions\n    *disable_reuse #\"What day is it?\"\n        *set questions -1\n        \"It's the 20th, you've been out for almost a day.\"\n        *goto questions\n    *if (questions = 0) #\"So what happens now?\"\n        \"For you? Nothing, you stay here and rest. For us? The war goes on. The ${unit} have lost too many to be of use at the front. Those still fit to fight are patrolling the border. There is talk of giving you a medal when all this is over.\"\n        *temp questions 2\n        *label questions2\n        *choice\n            *disable_reuse #A medal?\n                \"Yes, that took some ovaries doing what you did to try and save @{samalive Zac| Sam}. You deserve it.\"\n                *set questions -1\n                *goto questions2\n            *disable_reuse #So what will you do?\n                \"@{samalive Sam| Zac} and I have another hour or so with you before we move out. Your parents should be here soon.\"\n                *set questions -1\n                *goto questions2\n            *if (questions = 0) #\"So you're leaving?\"\n                \"Yes.\" @{male Abe|Mara} bites @{male his|her} lip again \"I'm sure we'll see you soon, when this war is over.\"\n                *if baseattackers > basedefenders\n                    *set ending 6\n                    *goto_scene ending\n                *else\n                    *set ending 7\n                    *goto_scene ending\n*label orders\n*page_break\n*if profession = \"Fireteam leader\"\n    You clear your throat and speak into your mouthpiece.\n    *goto speak\n*else\n    @{male Abe|Mara} clears @{male his|her} throat and speaks into @{male his|her} mouthpiece.\n    *goto speak\n*label speak\n\"Mission success. Tunnel is under our control.\"\n*line_break\n[i]\"Excellent.\"[/i] Faraz's replies. [i]\"We believe the entire Sarian company has already entered the tunnel, throw a few grenades in- that should finish them off.\"[/i]\n*if profession = \"Fireteam leader\"\n    *temp toldfaraz false\n    *choice\n        #Kill tens of defenseless human beings just like that? No way! \n            *set loyal -5\n            Throwing grenades into the tunnel and killing so many people without offering them surrender is akin to murder. ([i]Luf[/i] +5)\n            *choice\n                #Tell Faraz you are refusing @{male his|her} order and offering the Sarians a chance to surrender.\n                    *set toldfaraz true\n                    \"No.\" you say.\n                    *line_break\n                    [i]\"What?\"[/i]\n                    *line_break\n                    \"I'm offering them a chance to surrender.\"\n                    *line_break\n                    [i]\"And give them a chance to escape?\"[/i]\n                    *line_break\n                    \"I can't just kill them.\" \n                    \n                    You lean into the tunnel entrance and\n                    *goto freeze1\n                #Don't tell Faraz you are refusing @{male his|her} order and offering the Sarians a chance to surrender.\n                    *goto freeze\n            *label freeze1\n            *if speech >=50\n                shout the Sarian words for \"Freeze! Raise your hands!\"- \"[i]Vakf! Yadk Lma'el![/i]\" into the tunnel.\n                *goto freeze2\n            *else\n                shout \"Freeze! We have you surrounded!\" into the tunnel.\n                *goto freeze3\n            *label freeze\n            *if speech >=50\n                You shout the Sarian words for \"Freeze! Raise your hands!\"- \"[i]Vakf! Yadk Lma'el![/i]\" into the tunnel.\n                *label freeze2\n                *line_break\n                [i]\"Me zeya?\"[/i]- \"Who is it?\" a voice shouts back. \n                *line_break\n                [i]\"Regovi![/i] you answer.\n                *line_break\n                \"Regovian?\" The voice switches to heavily accented Regovian. \"How?\"\n                *line_break\n                \"Tell your @{male men|woman} to stop fighting and surrender. Otherwise, you're all dead.\"\n                *line_break\n                \"How you say? I have no choice?\" the voice chuckles darkly \"We will exit from the front. Do not shoot.\" (Success! Needed 50 persuasion.)\n                *if toldfaraz = true\n                    *set ending 9\n                    *goto_scene ending\n                *else\n                    \n                    \"Look!\" @{male Abe|Mara} points \"They're leaving the tunnel!\"\n                    *line_break\n                    You smile to yourself. You did a good thing today.\n                    *line_break\n                    [i]\"Contact! Contact! Sarians are leaving the tunnel en masse!\"[/i]\n                    \n                    Even from where you are standing you can hear the sound of hundreds of bullets being fired.\n                    \n                    You try to tell the ${unit} to stop firing, but nobody hears your transmission over the cacophony.\n                    *line_break\n                    [i]\"Great job ${nick}! They ran from your grenade right into out trap!\"[/i]\n                    *set ending 10\n                    *goto_scene ending\n            *else\n                \"Freeze! We have you surrounded!\" You shout into the tunnel.\n                *label freeze3\n                *line_break\n                A bullet streaks past your head from inside.\n                *line_break\n                *if zacalive= true\n                    \"Wrong answer.\" Zac murmurs.\n                    *goto youturn\n                *elseif samalive= true\n                    \"Wrong answer.\" Sam murmurs.\n                    *goto youturn\n                *else\n                    *bug neither sam nor zac are alive\n        #The entire company in the tunnel? A great way to end this battle with as little risk to us as possible!\n            \"Ready?\" you ask the fireteam. They nod.\n            *line_break\n            Simultaneously, you drop your grenades into the tunnel.\n            *set ending 10\n            *goto_scene ending\n*label youturn\n\nYou turn towards @{male him|her} just as @{male he|she} drops a grenade inside, throwing the pin right after.\n*set ending 10\n*goto_scene ending\n*label yellowroad\n*page_break 1400, 18th February, 2022\n*image mapdomeak.png\n*page_break\nYou open your eyes, someone is shaking you awake.\n*line_break\n\"What?\" You ask, your dry throat making your words sound more like croaks.\n*line_break\n\"You're up.\"\n*line_break\n\"Hmmm?\" You open your eyes, Miller is kneeling next to you.\n*line_break\n\"Give me a break ${nick}, it's your turn to guard.\"\n*line_break\n\"Okay... okay...\" You stand up, wiping the sleep from your eyes.\n\nYou take up position at the window, keeping an eye on the outside.\n\nYou sigh. Ever since occupying the town of Bala'a in southern Saria three days ago the Wardens hadn't done anything besides keep watch.\n*line_break\nIn your mind, you know what you are doing is important. After all, a Sarian counterattack can happen any minute, but 72 hours of doing nothing but keep watch have taken their toll.\n\n[i]\"Miller from Faraz.\"[/i]\n\nShit. Whatever it is, Miller isn't going to like it.\n*line_break\n\"This is ${nick}, what do you need Faraz?\" you reply.\n*line_break\n[i]\"I'm glad it's you ${nick}, but the person I need to talk to is Miller.\"[/i] Faraz says calmly [i]\"So if you could wake sleepy up that would be great.\"[/i]\n*line_break\n\"Roger that.\"\n*choice\n    #\"Get up Miller. Faraz is looking for you.\"\n        \"What does @{male he|she} want?\"\n        *choice\n            #Shrug. \"Beats me.\"\n                \"I hate my job.\" Miller mumbles under @{male his|her} breath as @{male he|she} stands up and stretches.\n                *goto whatisit\n            #\"@{male He|She} probably wants to give you a medal.\"\n                \"Possibly.\" Miller muses \"I did take a huge shit yesterday, probably set a record or something.\"\n                *goto whatisit\n    #\"Wakey wakey sleepy, Faraz is looking for you.\"\n        \"What?\" Miller snaps \"Can't you see I'm trying to sleep?\"\n        *choice\n            #\"Faraz wants you, @{male he|she} wouldn't speak to me.\"\n                \"I hate my job.\" Miller moans. \"I don't get paid enough for this.\"\n                *goto whatisit\n            #\"I can, but Faraz can't. @{male He|She} wants to speak with you.\"\n                \"I hate my job.\" Miller grumbles as @{male he|she} gets up and stretches.\n                *goto whatisit\n*label whatisit\n\n\"Faraz from Miller. I hope you have good news.\"\n*line_break\n[i]\"For you? The best news.\"[/i] Faraz answers, @{male his|her} tone playful.\n*line_break\n\"What is it?\"\n*line_break\n[i]\"We're going north, I have a Sarian military compound for you to capture.\"[/i]\n*line_break\nMiller's eyes go wide. \"When and where?\"\n*line_break\n[i]\"Wake Walker up, I'm coming to your house in 5.\"[/i]\n*page_break 2000, 18th February, 2022\nWhile a drive to the Sarian compound would have been faster, it was decided that in order to evade detection it was preferable for the ${unit} to divide up into teams and go on foot.\n*line_break\nBy the time you arrive at the rendezvous point the excitement of finally moving again is replaced with the familiar back pain of walking for long distances with more than half of your body weight.\n\nThe officers have all went to meet up with Faraz and discuss the last details of the plan.\n*line_break\nIt seems like this will take a while, what do you do while you wait?\n*temp attackplan false\n*choice\n    #Try to get a good look at the Sarian complex.\n        You take a look at the terrain around the Sarian complex.\n        \n        The complex is a group of small two-story concrete houses. Their primary use is to serve as sniper positions defending the outskirts of Domeak, a small suburb on the outskirts of Tamashek through which the M25 highway passes through.\n        *line_break\n        The RDF High command believes that if RDF artillery will get in range of the Sarian capital the Sarian King will either leave the city, a sign of weakness, or surrender the war. Control of Domeak and the M25 will not only bring artillery into range, but photos of the massed might of the RDF so close to Tamashek might even force a surrender without a single shell fired.\n        \n        In order to successfully capture the houses, which may or may not be occupied, the ${unit} will have to move fast as the whole area around the houses is nothing more than fields that provide no cover at all.\n        *set attackplan true\n        *goto move\n    #Grab a bit of sleep while you still can.\n        You close your eyes, allowing sleep to overtake you.\n        *goto move\n    #Talk to a teammate.\n        You look around you.\n        *line_break\n        Zac is already snoring, Walker is writing something down in a notepad, @{male Abe|Mara} is on @{male his|her} knees murmuring something to @{male him|her}self and Sam is in the process of untangling @{male him|her}self from @{male his|her} backpack.\n        *choice\n            #Wake Zac up.\n                \"Hey Zac, wake up.\" You say, shaking Zac.\n                *line_break\n                \"Are we moving?\" @{male He|She} whispers back, not opening @{male his|her} eyes.\n                *line_break\n                \"No, not yet...\"\n                *line_break\n                \"Then leave me alone.\" @{male He|She} says, pointedly turning @{male his|her} back from you. (Zac -3)\n                *set zacrel -3\n                *goto move\n            #Go see what Walker is writing\n                You crouch next to Walker, \"What are you writing?\" you ask. \n                *line_break\n                \"Letter to my family.\" @{male He|She} says, not putting down @{male his|her} pen.\n                *line_break\n                \"What do you mean?\"\n                *line_break\n                \"I have a bad feeling about this mission. I want to prepare for the worst.\" @{male He|She} raises @{male his|her} eyes \"I've never seen you talk to your family. You aren't close?\"\n                *choice\n                    #\"No, not really.\"\n                        \"Shame.\" Walker frowns, returning to writing. \"My \n                        *label myparents\n                        parents have been like a rock of stability since I was conscripted.\"\n                        *goto move\n                    #\"We are actually, I talk to them every week.\"\n                        Walker smiles. \"So do I, my\n                        *goto myparents\n                    #\"Somewhere in the middle. I talk to them sometimes.\"\n                        Walker nods, \"My \n                        *goto myparents\n            #Move close to @{male Abe|Mara} and listen to whatever @{male he|she} is murmuring.\n                You walk towards @{male Abe|Mara}, trying to listen in on whatever @{male he|she} is saying.\n                *line_break\n                @{male Abe|Mara}'s eyes are closed. @{male His|Her} brow is furrowed in concentration. @{male His|Her} hands hang in the air, palms upwards as @{male he|she} whispers in some foreign language.\n                *choice\n                    #\"I hope I'm not bothering you, but I wanted to ask you what are doing?\"\n                        @{male Abe|Mara} opens @{male his|her} eyes, @{male he|she} doesn't seem surprised to see you less than a meter away.\n                        *line_break\n                        *label praying\n                        \"I am praying.\"\n                        *temp why false\n                        *label ask\n                        *choice\n                            *disable_reuse #\"To who?\"\n                                \"To what.\" @{male Abe|Mara} corrects you. \"I am praying to the Sun.\"\n                                *goto ask\n                            *disable_reuse #\"Why?'\n                                \"Why do I pray? Because we must.\"\n                                *set why true\n                                *goto ask\n                            *disable_reuse #\"What are you praying for?\"\n                                \"I am thanking the Sun for setting this night and respectfully asking it to rise again in the morning.\"\n                                *goto ask\n                            *disable_reuse *if (why = true) #\"What do you mean \"because we must\"?\"\n                                    @{male Abe|Mara} smiles, \"If we do not ask the Sun to rise- why should it?\"\n                                    *choice\n                                        #\"I don't think the sun rising has anything to do with you asking it to.\"\n                                            \"How do you know? Maybe it rises because it wants to, maybe it rises because we ask nicely. Either way, it is good to say please and thank you to something that provides all life on earth.\" (@{male Abe|Mara} +1)\n                                            *set aberel +1\n                                            *goto move\n                                        #\"The sun doesn't rise because you ask it to. It rises because the earth revolves around it.\"\n                                            @{male Abe|Mara} snickers. \"You northerners are so strange, what does one thing have to do with the other? Of course the earth revolves around the sun. But how do you know it still will tomorrow?\"\n                                            *choice\n                                                #\"It always has.\"\n                                                    \"So you believe that because something happened yesterday it will happen today?\" @{male Abe|Mara} looks to the stars. \"I envy you, yesterday, I was alive, I've always been alive. Yet, I do not know if I will still breathe when the sun next rises.\" (@{male Abe|Mara} +1)\n                                                    *set aberel +1\n                                                    *goto move\n                                                #\"I just know.\"\n                                                    \"So you and I are not so different, we each have different beliefs that guide us and give us hope.\" (@{male Abe|Mara} +1)\n                                                    *set aberel  +1\n                                                    *goto move\n                                                #\"Last I checked gravity was still a thing.\"\n                                                    \"Maybe it was because my brothers and sisters in faith continue praying even when you northerners laugh?\" @{male Abe|Mara} raises@{male his|her} eyes to look at the stars. \"We each have our beliefs, you may call mine primitive and silly- to us, they are the truth.\"\n                                                    *goto move\n                                        #\"Okay then. I'll leave you to it.\"\n                                            You walk back to where you left your backpack.\n                                            *goto move\n                    #\"What's up?\"\n                        *goto praying\n                    #Stay beside @{male him|her} but do not speak\n                        After a minute of whispering, @{male Abe|Mara} opens @{male his|her} eyes and smiles. (@{male Abe|Mara} +1)\n                        *set aberel +1\n                        *line_break\n                        \"You have a question.\" @{male He|She} says.\n                        *line_break\n                        \"What are you doing?\"\n                        *goto praying\n                    #Don't bother @{male him|her}.\n                        You go back to your backpack without talking to @{male Abe|Mara}.\n                        *goto move\n            #Help Sam\n                You approach Sam. \"Need help?\"\n                *line_break\n                Sam grunts. \"Yes. I can't get this stupid thing off!\"\n                *line_break\n                You release a few straps, allowing Sam to slip out of @{male his|her} backpack easily.\n                *line_break\n                \"Thanks.\"\n                *line_break\n                \"Don't mention it.\" you answer.\n                *line_break\n                \"Ready to win a war?\" @{male he|she} asks.\n                *choice\n                    #\"Win? What do you mean?\"\n                        \"Well, you see those small houses over there? If we take them- we win the war.\"\n                        *line_break\n                        \"How?\"\n                        *line_break\n                        \"Well, the \"houses\" primary use is to serve as sniper positions defending the outskirts of the small suburb you can see to our north. Do you see the highway cutting through the suburb?\"\n                        *line_break\n                        \"What about it?\"\n                        *line_break\n                        \"High command believes that if RDF artillery will get in range of Tamashek, the Sarian King will either leave the city, a sign of weakness, or surrender the war. Control of Domeak and the M25 will not only bring artillery into range, but photos of the massed might of the RDF so close to Tamashek might also even force a surrender without a single shell fired.\" Sam smiles \"That's why taking those positions is so important.\"\n                        *line_break\n                        \"But how will we take them?\" You ask \"Everything around is only empty fields! We have no cover!\"\n                        *line_break\n                        Sam nods \"I guess that's up to Faraz and the officers to figure out.\"\n                        *set attackplan true\n                        *goto move\n                    #\"Sure am.\"\n                        Sam smiles.\n                        *goto move\n*label move\n*page_break\nSuddenly, the ${unit} stand up. Faraz and the officers have returned and it is time to move.\n\n*if attackplan= true\n    After marching for a few minutes Miller gathers the team and explains the importance of the enemy position ahead, divides the team into fireteams and explains the specific mission of TM40.\n    *goto specific\n*else\n     \"Our target is the group of small two-story concrete houses you see ahead\" Miller explains.\" Their primary use is to serve as sniper positions defending the outskirts of Domeak, a small suburb on the outskirts of Tamashek through which the M25 highway passes through.\" Miller points to the large highway cutting through the boxlike concrete houses to your north. \"High command believes that if RDF artillery will get in range of the Sarian capital, the Sarian King will either leave the city, a sign of weakness, or surrender completely. Control of Domeak and the M25 will not only bring artillery into range, but photos of the massed might of the RDF so close to Tamashek might even force a surrender without a single shell fired.\"\n     *goto specific\n*label specific\n*line_break\n\"Our team comes in the third wave.\" Walker explains. \"TM10 and TM20 will go in first and clear the first two houses, after them, TM30 will take the next one. After we have three houses under our control our team will attack, taking the shorter house in the center,\" @{male He|She} points to a squat house in the center of the complex \"the one over there. We think it might be some sort of command center so be on the lookout for any cameras or documents.\"\n*page_break The attack begins\n*achieve forwards\nThe first two waves go off without a hitch. The teams do their jobs perfectly, reaching and occupying the houses without being discovered. Even better- they report that there was only a single sentry in the first house and that @{male he|she} had been caught fast asleep.\n*line_break\nThe teams had tried to interrogate @{male him|her} but so far they had no success and it was decided to simply keep @{male him|her} under guard until the rest of the complex could be secured.\n\n[i]\"Showtime.\"[/i] Miller's voice sounds in your earpiece.\n\nThe team runs to the first ring of buildings and stops, giving you time to collectively catch your breath.\n*page_break\n*if profession= \"Fireteam leader\"\n    [i]\"${nick}, come here.\"[/i]\n    *line_break\n    You go up to where Miller is kneeling.\n    *line_break\n    \"What is it?\" you ask.\n    *line_break\n    If the next building really is a command post, we should enter through an entrance other than the door. I want your fireteam to prepare the explosive frame and use it to break into the building.\n    *line_break\n    \"Roger that.\"\n    *goto explosiveframe\n*else\n    [i]\"@{male Abe|Mara}, come here.\"[/i] Everyones earpiece cackles.\n    \n    When @{male Abe|Mara} returns a minute later @{male he|she} seems nervous.\n    *line_break\n    \"Miller wants us to break into the house using our explosive frame. Let's get it ready, we blast in 3 minutes.\"\n    *goto explosiveframe\n*label explosiveframe\n\nThe explosive frame (EF) is an extremely useful explosive charge. It is a 1 by 2-meter frame that can be easily and quickly put together using 6 one-meter segments. When properly used, the frame can be used to create an exact 1 by 2 meter hole in almost any wall. \n\n\nThe fireteam quickly puts together the various parts of the frame.\n*line_break\nWhen you are done, Sam carries the finished frame, @{male Abe|Mara} the detonator and Zac the initiator. The first lesson you had learned when dealing with explosives is that the different parts of the explosive chain can't be together until the time comes for them to explode.\n\n\"Ready?\" You ask.\n*line_break\n*if aberel >50\n    @{male Abe|Mara} clears @{male his|her} throat nervously. \"Before we go I would like to make a blessing.\"\n    *line_break\n    Zac coughs to hide @{male his|her} laughter, @{male Abe|Mara} doesn't seem to notice.\n    *fake_choice\n        #\"Go ahead.\"\n            You smile reassuringly. \"Go ahead.\"\n            \n            A smile flickers on @{male Abe|Mara}s lips before @{male he|she} closes @{male his|her} eyes while raising the palms of @{male his|her} hands in the air. After a moment of awkward silence @{male he|she} begins to hum while @{male his|her} hands start gently shaking. \n            \n            \"May the Sun guide you in this dark, may it protect and keep you.\n            *line_break\n            May its light shine upon your face.\n            *line_break\n            May you go in peace and return in peace under the Sun's eternal light.\" (@{male Abe|Mara} +2)\n            *set aberel +2\n        #\"We really don't have time for this.\"\n            \"We really don't have time for this.\" You whisper back.\n            *line_break\n            @{male Abe|Mara} doesn't answer, but even without looking at @{male his|her} face, you can feel @{male his|her} embarrassment. (@{male Abe|Mara} -5)\n            *set aberel -5\n            *line_break\n            \"Anywayyyy,\" Zac wets @{male his|her} lips \"what were you saying ${nick}?\"\n\n\"Go!\"\n*page_break\nYou run together, reaching the wall on the back of the house and placing the explosive frame on the wall.\n*line_break\n\"Hand me the initiator, Zac.\" @{male Abe|Mara} says, stretching @{male his|her} hand towards Zac.\n*line_break\n\"Here yo-\"\n*page_break Fire\nFire\n*page_break\nHeat\n*page_break\nScreams\n*page_break\nGunshots\n*page_break\n*fake_choice\n    #Open your eyes\n        You open your eyes.\n        *page_break\n        All you can see is fire. \n        *page_break\n        A pair of hands grab you by the shoulders and drag you backward.\n    #Try to remember\n        You try to think back at the events leading to this moment. Just as you feel you are close to something, a pair of hands grab you by the shoulders and drag you backward.\nYou feel the heat from the fire receding and your hands instinctively go to your face. You feel your face, besides being covered in soot, is unharmed.\n\nYour memory is hazy, you remember attempting to breach the door of the compound, an explosion. Not much else.\n*page_break\nYou feel the hands that have been dragging you let go. You hear a voice: \"Can you hear me?\"\n*fake_choice\n    #Yes\n        \"Great\" the voice answers. We are going to need you for what comes next.\"\n        *page_break\n    #No\n        \"Great to see you still have your sense of humor\" the voice answers \"We are going to need you for what comes next.\"\n        *page_break\n\"The breach was unsuccessful, we were ambushed. It's good to see our\n*if profession = \"Fireteam leader\"\n    Fireteam leader is still OK. Miller wants us to get the rest of the wounded from the breach behind cover.\"\n    *fake_choice\n            #Let's move!\n            #Let's go!\n    *goto returnfire\n*elseif profession = \"HMG\"\n    Heavy Machine Gunner is still OK. Now, grab your MAG and return fire!\n    *goto returnfire\n*elseif profession = \"LMG\"\n    Light Machine Gunner is still OK. Now, grab your LMG and return fire!\n    *goto returnfire\n*elseif profession = \"Marksman\"\n    Marksman is still OK. Now, get a hold of your weapon and search for targets!\n    *goto returnfire\n*elseif profession = \"Medic\"\n    Medic is still OK. Now, let's finish this fight and find some wounded to take care of!\n    *goto returnfire\n*else\n    *bug no profession\n*label returnfire\n*page_break Get on your feet\nYou stand up, finding that Walker had dragged you back to cover and that the house you had attempted to breach is nothing more than a smoldering crater.\n*line_break\nYour head swims, your ears ring and the taste of gunpowder lingers on your mouth.\n\nTo your left, you see two soldiers from TM10 dragging the unconscious bodies of Zac and Sam towards cover.\n\nAll around you, soldiers are shouting to each other while firing from cover at unseen enemies.\n*temp what 0\n*temp bandage false\n*temp fight 0\n*label what   \n*choice\n    *disable_reuse #\"What happened?\"\n        \"I'm not sure.\" Walker says, @{bandage |placing a bandage on a gash on your forearm you hadn't even noticed.} \"You were about to place the explosive frame and the whole house exploded. If I had to guess, the explosives were placed inside the walls while the building was built.\"\n        *set bandage true\n        *goto what\n    *disable_reuse #\"Where is @{male Abe|Mara}?\"\n        \"I don't know.\" @{bandage |Walker places a bandage on a gash on your forearm you hadn't even noticed.} \n        *set bandage true\n        *goto what\n    *disable_reuse #\"Are they going to be okay?\"\n        *set what+1\n        \"I think so.\" Walker bites@{male his|her} lip @{bandage .|and places a bandage on a gash on your forearm you hadn't even noticed.} \"From what I saw, I think you were all protected from the blast by @{male Abe|Mara}.\" \n        *set bandage true\n        *goto what\n    *if (fight=1) #\"Let's go.\"\n        *goto fight\n    *disable_reuse *if (what =1) #\"What do you mean?\"\n        \"The blast happened right in front of @{male Abe|Mara} while you were in a row behind @{male him|her}. I think you owe your lives to @{male him|her}.\" Walker takes a deep breath. \"So don't you dare think of throwing it away, we have a battle to win.\"\n        *choice\n            #\"I have some more questions.\"\n                *temp fight 1\n                *goto what\n            #\"Let's go.\"\n                *goto fight\n*label fight\n*page_break\nJust as you finish talking to Walker, Zac and Sam stand up weakly.\n*line_break\n\"Where's @{male Abe|Mara}?\" Zac croaks, spitting some black spit on the ground beside @{male him|her}.\n*choice\n    #\"@{male Abe|Mara}'s dead.\"\n        \"What are you talking about?\" Zac tries to shout but@{male his|her} voices cracks and @{male he|she} begins coughing instead.\n        *line_break\n        \"@{male He|She} protected us from the blast, I don't see any way @{male he|she} could survive this.\"\n        *label shitt\n        *line_break\n        \"Shit.\" Sam wipes @{male his|her} face, trying unsuccessfully to clean some of the dirt. \"What do we do now?\"\n        *goto now\n    #\"I don't know.\"\n        \"What do you mean?\"\n        *line_break\n        \"Nobody knows where @{male he|she} is.\" You answer.\n        *goto shitt\n*label now\n*line_break\n\"We still need to take those houses, are you up for it?\" You ask.\n*line_break\n\"Hell yeah.\" Sam says, checking @{male his|her} magazine is still in place. \"Let's get those Sarian bastards.\"\n*line_break\n\"For @{male Abe|Mara}.\" Zac growls.\n*fake_choice\n    #\"For @{male Abe|Mara}.\"\n    #\"Let's do this.\"\n\"Miller, this is ${nick}.\" You speak into your mouthpiece.\n*if pcrel >=65\n    'What are our orders, @{male Sir|Ma'am}?\"\n    *goto sir\n*else\n    'What are our orders?\"\n    *goto sir1\n*label sir\n*line_break\n[i]\"Screw you ${nick}.\"[/i] Miller chuckles, exiting the building and shaking your hand.\n*goto sir2\n*label sir1\n*line_break\n[i]\"Great to see you're still breathing. Had me worried back there.\"[/i] Miller grunts, exiting the building and shaking your hand.\n*goto sir2\n*label sir2\n\n\"Right now we are at a stalemate, they have the better position but we are in cover. What I need is some sort of game-changer. I don't suppose you have any ideas?\n*choice\n    *if (Intelligence >=85) #\"I think I have just the thing.\" (Intelligence)\n        \"Explain.\" Miller smirks.\n        *line_break\n        \"Well,\" You begin, \"If I had to guess, the Sarians must have some way to go to and from these houses to resupply them during an attack. Therefore, there must be some tunnel system between the houses.\" (Intelligence +5)\n        *set intelligence +5\n        *label smirk\n        *line_break\n        Miller's smirk freezes in place and turns into a frown. \"That actually makes a lot of sense. But it also means we are in danger of a counter-attack. We have to warn the others!\"\n        \n        \"Faraz from Miller, be aware of possible offensive tunnels in our vicinity.\"\n        *line_break\n        [i]\"Roger that.\"[/i]\n        *goto tunnel\n    *if (leadership >= 85) #\"Let me lead my fireteam, we can turn the tide.\" (Leadership)\n        \"What is your idea?\" Miller asks with a smirk.\n        *line_break\n        \"Well, if I was in command of this compound, I would want a way to reinforce and resupply my positions in secret.\" you explain \"I believe there is a tunnel network connecting the houses to each other. If we can find the entrance, my fireteam and I can take them by surprise.\" (Leadership +5)\n        *set leadership +5\n        *goto smirk\n    *if (speech >= 85) #\"Let me interrogate the prisoner, I'm sure I can get something out of @{male him|her}.\" (Persuasion)\n        \"In the middle of a firefight?\" Miller smirks \"What makes you think you can get something out of @{male him|her}?\"\n        *line_break\n        \"Trust me.\" You plead \"I think I figured something out.\"\n        *line_break\n        \"Screw it, might as well give it a chance. @{male He's|She's} in there- be my guest.\" Miller says, pointing inside the building you are taking cover behind. (Persuasion +5)\n        *set speech +5\n        *page_break\n        You approach the prisoner, noting @{male he|she} doesn't seem worried about @{male his|her} fate.\n        \n        \"I know who you are.\" you say, trying to sound more sure than you are. \"I know about the attack.\"\n        *line_break\n        \"What attack? I am just a guard, I told your commander we didn't know you would be here for at least a day.\" @{male he|she} says in heavily accented Regovian \"Not enough time to plan.\"\n        *line_break\n        \"You're lying. There will be an attack from a tunnel. [i]Minhar.[/i]\" You repeat, tapping the floor.\n        *line_break\n        The prisoner swallows, @{male his|her} breath quickens. \"What [i]minhar?[/i]\"\n        *line_break\n        You can't help but smile. You were right! \"Show me where the [i]minhar[/i] is and we will make sure you are safe.\"\n        *line_break\n        The prisoner begins twitching and fidgeting. @{male He|She} switches to Sarian. \"[i]Lae minhar, ant lea yedia clom![/i]\" \n        *line_break\n        \"I think you do know about a tunnel, and I think it is your best interest to tell me more.\" you grin. \"Help me help you.\"\n        *line_break\n        The prisoner looks into your eyes for a long minute before raising @{male his|her} finger and pointing to a closet. \"[i]Minhar.\"[/i].\n        \n        [i]\"Be aware of an offensive tunnel in our vicinity.\"[/i] you report.\n        *line_break\n        [i]\"Great job ${nick}!\" [/i]Faraz replies [i]\"Now let's turn the tables on those Sarians.\"[/i]\n        *goto tunnel\n    #\"Not really.\"\n        \"Shame. Not that I really expected anything.\" @{male he|she} smiles \"We're trying to find a solution ourselves.\"\n        *line_break\n        Suddenly, sounds of gunfire erupt from inside the building you are waiting outside of.\n        *line_break\n        Miller's eyes go wide. \"On me!\" @{male he|she} shouts, rushing inside.\n        *line_break\n        You run in after @{male him|her}.\n        \n        Inside, a brutal firefight is underway. A closet at the edge of the room is open and upturned furniture around it is serving as cover for the Sarian soldiers. In the center of the room, bodies of TM10 members are strewn, laying where they were killed moments ago, a puddle of blood already expanding to fill the floor.\n        *line_break\n        Out of the entire team, only two soldiers still stand, returning fire and keeping the Sarians at bay.\n        \n        You and Miller join the fight.\n        \n        In a shootout at such close range, grenades are useless, their blast zone just as likely to kill or wound the thrower as they are to harm the other side.\n        *set teamdead 2\n        *label idea\n        *choice\n            #Fire!\n                Sometimes, the only way to win is to get dirty and fight the old-fashioned way.\n                \n                You duck and rise, firing and reloading, taking cover and aiming.\n                *line_break\n                *if shooting >=90\n                    Your shooting skills don't let you down. Your relentless firing had turned the tide on the Sarian squad that had attacked you. They now lay, dead, at the entrance to the attack tunnel. (Success! Needed 90 shooting) (Shooting +3)\n                    *set shooting +3\n                    *goto killed\n                *elseif shooting >= 80\n                    Your shooting skills don't let you down. Miller, the two surviving members of TM10 and you manage to turn the tide on the attacking Sarians. After the intense battle, the Sarians lay, dead, at the entrance to the tunnel they had emerged from. (Needed 90 shooting for better result)\n                    *goto killed\n                *else\n                    You try your best but your shooting skills are simply not enough to win such a lopsided battle. \n                    *line_break\n                    \"Listen to me!\" one of the surviving members of TM10 shouts. \"Run outside. We'll throw a grenade and end this.\"\n                    *choice\n
