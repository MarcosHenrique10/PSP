<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The War of 2022 — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "warof2022", "title": "The War of 2022", "scenes": {"begintraining": "You and Sam walk to the company complex, joining the rest of your platoon. Just before you get into sight of the Complex Sgt. Richards stops the platoon.\n\n\n\"The certification is a huge milestone for you all, I hope you are proud of yourselves for getting this far\" @{male He|She} smiles \"I am sorry to say that by the end of t@{male his|her} day I will be leaving you.\" \n\nBefore he can continue speaking the platoon bursts out in a babble of confused voices. Sgt. Richards raises @{male his|her} hand. \"Let me explain. In the Wardens, when a platoon is certified, the squad commanders leave to rejoin our organic platoons. While I am sorry to be leaving you, I am happy to see how much you have improved and grown since I took you from the Company sign after the T.E.S.T.\" @{male He|She} pauses for a moment \"The end of the first part of training means a change in pace, we will work less on your discipline and more on your professionalism. That can be done much better once we do away with squads, making Sgt. Jacob and myself obsolete.\"\n\n\n\"It has been an honor to lead you. Now, follow me for the last time. The certification ceremony awaits!\"\n*page_break To the ceremony!\nThe platoon marches in formation to the Company Complex, the collective excitement of reaching the next stage evident by the grins on everyones faces.\n*set rank \"Private First Class\"\nThe first thing you notice when you enter the Complex is a giant, brown-haired Major standing underneath the Regovian flag. The Major is flanked by the Company Commander on @{male his|her} right and a First Lieutenant on @{male his|her} left.\n\n\nYou are joined by the Platoon Commander.\n*line_break\n\"Quickly! Get into formation!\" @{male he|she} whispers hurriedly \"That is the commander of the ${unit} and I want you all to make a good impression!\"\n\nThe platoon quickly and efficiently sets up in groups of three facing the Major.\n*page_break\nThe Major surveys your platoon and the rest of the company for a long minute before speaking.\n\n\"Greetings!\" @{male He|She} begins \"I'm sure you are all proud to be here today. My name is Major Faraz and I am the commander of the ${unit}. \n\nTwo important events have happened since you entered this complex. The first is you have all become PFCs, the second is you are one step closer to officially joining the ${unit}. Remember, you may carry the name but as far as I am concerned you are one of us only when you complete the entirety of your training. Until then, good luck.\"\n\nWith that, Maj. Faraz salutes your Company Commander and leaves, accompanied by the first Lieutenant you assume to be @{male his|her} XO.\n*page_break \nAfter Maj. Faraz leaves, a small ceremony takes place. Every soldier is given @{male his|her} PFC rank as well as a combat certification ribbon, a small green ribbon with a silver sword. (You can always see the awards you have received by going to the \"Medals and Ribbons\" tab under \"Show stats.\")\n\n*image combatcertified.jpg\n*set combatcertified true\n\n\"One more important thing that will change,\" your Platoon Commander adds at the end of the ceremony \"is the Sergeants and my name. From now on- please call me Miller and call Sergeant Walker. It will be strange at first, but soon you should get used to it.\n*page_break\nA day after the certification and ceremony the platoon is moved to the ${brigade} Wardens home base- Lead Tower.\n*image mapleadtower.png\n\nLead Tower is a much bigger base than any you have ever encountered. Situated on the banks of the Lovar river in the eastern [i]Bak[/i] providence, the base houses more than 10,000 soldiers from the various branches of the Regovian military. \n\nThe base, first built in 1843 as a star fortress, has since expanded to include more and more barracks. Today, the fortress section houses the Wardens exclusively, each company occupying one-quarter of the fort with the final quarter housing the Wardens company-in-training. The company-in-training is named after the first Brigade commander of the ${brigade} brigade- John Babir. \n\nBabir company will be your new home for the next eight months of training before you are allowed to ascend to the ${unit}.\n\n*page_break Do you have what it takes?\n*set richards 2\n\"Babir company is the finest company-in-training in the RDF for a good reason\" Lt. Miller explains on the drive \"We have the best facilities in the entire RDF. Believe me, I checked.\"\n\n\"Before we can officially be confirmed as Babir company we need to complete the beret march. It will be one of the hardest things you will do in the RDF. Nevertheless, 52 kilometers of marching through the hilly terrain of [i]Bak[/i] will be worth it once you receive your\n*if (brigade = \"1st Svern\")\n    brown\n    *goto beret\n*elseif brigade = (\"28th Paratrooper\")\n     maroon\n     *goto beret\n*elseif brigade = (\"93rd Rivar\")\n    green\n    *goto beret\n*else\n    purple\n    *goto beret\n*label beret\nberet and meet your parents.\"\n*fake_choice\n    #Sounds great!\n    #Parents?\n        \"Yes ${nick}, the march ends at the wall of the fallen, at the banks of the Lovar river. Your parents will be there as well to celebrate your achievement.\"\n*page_break\nDuring the first part of training, the platoon steadily built up its marching capabilities. You began with marching for 4 kilometers and the platoon performed well.  After eight months the platoon could march 32 kilometers a night while burdened with 40% of its body weight and carrying a stretcher 10% of the time. (Strength +5)\n\n\n*set strength +5\n*if strength  >= 60\n    You excelled at the marches, carrying the stretcher longer than anyone and helping whatever soldier was having difficulties. (Strength +5, Zac +3, Miller +3, Walker +3) (Success! Needed 60 Strength)\n    *set zacrel +3\n    *set pcrel +3\n    *set screl +3\n    *set strength +5\n    *goto march\n*elseif strength >= 35\n    You completed the marches uneventfully, neither excelling nor embarrassing yourself. (Strength +3) (Needed 60 Strength for better result)\n    *set strength +3\n    *goto march\n*else\n    You struggled every march, your strength inadequate for the task. You needed to be helped by your platoon mates constantly and were carried on the stretcher more often than not. (@{male Abe|Mara} -3, Miller -3, Walker -3) (Needed 35 Strength)\n    *set aberel -3\n    *set screl -3\n    *set pcrel -3\n    *goto march\n*label march\n\nEven so, you could feel this march is different. The excitement and energy in the platoon are much higher than they ever were. The want to rise to the challenge and show yourselves and your parents how you triumphed in the face of adversary is as intoxicating as any party drug. \n*page_break\nIn preparation for the march, every piece of equipment is checked and double-checked. Torn or worn combat vests are fixed, new stretchers are procured from Warden warehouses and uniforms are sewn anew.\n\nOn the day of the march, nobody could miss the celebratory atmosphere in the company. The whole morning was spent finishing up on the repairs and cleaning the new Company Complex.\n\nAt 1700 sharp the entire Company is ready to go. Three buses take the company to the starting point of the march, 52 kilometers from the wall of the fallen, on the banks of the Lovar.\n*page_break\nThe march begins almost at sundown and is scheduled to end at 0800. You are pleasantly surprised to find that the atmosphere is less military and more parade. You find yourself talking, eating snacks and joking around with your fellow soldiers. Nevertheless, the pace never falls from six kilometers per hour and even the hardiest soldier is challenged.\n\nUntil the sunsets you find yourself enjoying the view. All around you, the rolling hills of Regovia seem to be made of gold in the sunset.\n*line_break\nEven after night falls and enjoying the view becomes harder, the night sky and town lights seem like gemstones.\n\nYou smile to yourself. If there ever was a country worth protecting- it is Regovia, the land of golden hills and cities of light.\n*page_break\nDuring one of the rest breaks, while talking to Zac, Sam and @{male Abe|Mara} you reach the subject of politics and recent events.\n\n\"Have you heard of the recent foiled attack?\" Sam begins \"A Filo tried to blow himself up on a bus.\"\n\n\"Really?\" Zac replies \"Where?\"\n\n\"In Rusalim! The capital!\" Sam answers excitedly \"they say Streky was on the bus!\"\n\n\"Who?\" @{male Abe|Mara} asks.\n\n\"Sasha Streky! She's the leader of the Fair Republic party, they are the [i]Luf[/i] idiots who want to dismantle the Citizen Republic. Hopefully being so close to death will shake her stupid worldview.\"\n*label questions\n*if (luf = 0)\n *fake_choice\n    *disable_reuse #\"What's a [i]Luf[/i]?\"\n        \"You really weren't into politics before you enlisted...\" Sam shakes @{male his|her} head. \"A [i]Luf[/i] is one of those idiots who still think the Citizen Republic should be dismantled and conscription abolished. The \"Fair Republic\" party usually gets around 7 seats in parliament. They aren't even close to being the majority.\n        *goto questions\n    *disable_reuse #\"How can she be against the Citizen Republic if she served in the military?\"\n        \"She did serve, she was even an officer in the logistics corp, she claims that's where she developed her political beliefs.\"\n        *goto questions\n    #\"Her ideas actually make some sense.\"\n        *set loyal -5\n        *set zacrel -7\n        \"Make sense?\" Zac asks breathlessly \"She wants to go back to the days we were defenseless! Why not just give the whole country to the Filo!?\" (Zac -7, [i]Luf[/i] +5)\n        *goto moveout\n    #\"I agree, I hope she sees reason.\"\n        \"Sees reason? I hope she burns in hell.\" Zac snaps \"Good for nothing [i]Luf[/i]s, even though they are a tiny percent of the population they hold the RDF back from performing our duty- killing Filo terrorists.\" (Zac -3, Loyal +5)\n        *set loyal +5\n        *set zacrel -3\n        *goto moveout\n    #\"Shame the terrorist wasn't successful, we could have rid ourselves of a traitor.\"\n        \"$!{nick}! That's a bit much, don't you think?\" Sam objects \"She may be wrong, but we are a democracy. Wishing for the deaths of our own won't get us anywhere.\"\n        \n        \"I'm with $!{nick} on this\" Zac replies \"Those [i]Luf[/i] are good for nothing traitors. If they like our enemies so much, I'd like to see how they would be treated in Saria or Wev.\" (Zac +5, Sam -5, Loyal +10)\n        *set loyal +10\n        *set zacrel +5\n        *set samrel -5\n        *goto moveout\n*else\n *fake_choice\n    *disable_reuse #\"How can she be against the Citizen Republic if she served in the military?\"\n        \"She did serve, she was even an officer in the logistics corp, she claims that's where she developed her political beliefs.\"\n        *goto questions\n    #\"Her ideas actually make some sense.\"\n        *set loyal -5\n        *set zacrel -7\n        \"Make sense?\" Zac asks breathlessly \"She wants to go back to the days we were defenseless! Why not just give the whole country to the Filo!?\" (Zac -7, [i]Luf[/i] +5)\n        *goto moveout\n    #\"I agree, I hope she sees reason.\"\n        \"Sees reason? I hope she burns in hell\" Zac snaps \"Good for nothing [i]Luf[/i]s, even though they are a tiny percent of the population they hold the RDF back from performing our duty- killing Filo terrorists.\" (Zac -5, Loyal +5)\n        *set loyal +5\n        *set zacrel -5\n        *goto moveout\n    #\"Shame the terrorist wasn't successful, we could have rid ourselves of a traitor.\"\n        \"$!{nick}! That's a bit much, don't you think?\" Sam objects \"She may be wrong, but we are a democracy. Wishing for the deaths of our own won't get us anywhere.\"\n        \n        \"I'm with $!{nick} on this\" Zac replies \"Those [i]Luf[/i] are good for nothing traitors. If they like our enemies so much, I'd like to see how they would be treated in Saria or Wev.\" (Zac +5, Sam -5, Loyal +10)\n        *set loyal +10\n        *set zacrel +5\n        *set samrel -5\n        *goto moveout\n*label moveout\n*line_break\nYour conversation is cut short by a short trumpet blast and a \"Move out!\" order.\n*page_break 8 hours later\nThe march was hard, harder than any march before, but while standing in formation at the Wall of the Fallen for the beret ceremony you know it was worth it.\n*achieve beret\n\n*if (brigade = \"1st Svern\")\n    After receiving your brown beret, you walk around, searching for your parents when, to your surprise, you suddenly come face to face with your favorite cousin.\n    \n    \"I have something for you\" @{male he|she} says with a grin \"It's my old beret, It has seen some of the best moments of my life. I want you to have it. It should remind you even when faced with hardship, good times will always follow.\"\n    *goto beret1\n*elseif brigade = (\"28th Paratrooper\")\n     After receiving your maroon beret, you walk around, searching for your parents.\n     \n     When you finally find them your @{male father|mother} surprises you with a gift.\n     \n     \"It's my old beret\" @{male he|she} says with a grin \" It has seen some of the best moments of my life. I want you to have it. It should remind you even when faced with hardship, good times will always follow.\"\n     *goto beret1\n*elseif brigade = (\"93rd Rivar\")\n    After receiving your green beret, you walk around, searching for your parents when, to your surprise, you suddenly come face to face with one of your @{male uncles|aunts}.\n    \n    \"I have something for you\" @{male he|she} says with a grin \" It has seen some of the best moments of my life. I want you to have it. It should remind you even when faced with hardship, good times will always follow.\"\n    *goto beret1\n*else\n   After receiving your purple beret, you walk around, searching for your parents.\n   *goto beret1\n*label beret1\n*page_break\nAfter talking and taking photos together with your family, your @{male mother|father} motions for you to follow @{male her|him} away from the crowd.\n\n\"I am so proud of you.\" @{male she|he} beams \"My @{male son|daughter}, all grown up.\" @{male she|he} says, hugging you.\n\n\"Promise me you won't forget one thing.\" @{male She|He} requests \"No matter what happens, don't follow the Republic, or anyone for that matter, blindly. Dark times are ahead, and I fear what will happen if you stop thinking about your actions. Can you promise me that?\"\n\n*fake_choice\n    #\"Of course.\"\n        \"That's my @{male boy|girl}! I knew I raised you well.\"\n    #\"I don't want to promise anything like that.\"\n        \"I don't want to promise anything like that\" you reply\n        *if (loyal > cynic)\n            \"The Republic sometimes requires we act without thought, for our own sake\" (Loyal +3)\n            *set loyal +3\n            \n            Your @{male mother|father} sighs, defeated. \"I don't want you to do anything that you will regret later.\"\n            *line_break\n            \"I won't\" you promise \"I'll make you proud.\"\n            \n            *goto beret2\n        *else\n            \"The Republic has so many flaws, sometimes, it's overwhelming\" ([i]Luf[/i] +3)\n            \n            Your @{male mother|father} sighs, defeated. \"I don't want you to do anything that you will regret later.\"\n            *line_break\n            \"I won't\" your promise \"I'll make you proud.\"\n            \n            *set loyal -3\n            *goto beret2\n\n*label beret2\n\"$!{nick}!\" you hear Miller call \"I was looking for you! Come on! We are going back to the base. Say goodbye and get yourself on the bus!\"\n\n\"I love you.\" Your @{male mother|father} says. \"Take care.\"\n*page_break Return to base\nAfter a day of rest from the march, Babir company begins the next part of its training- Navigation.\n\nSitting in the Babir classroom, a large room filled with desks and chairs facing a whiteboard reminds you of high school. The only difference is that in high school the students don't wear uniforms and carry automatic weapons. \n\n\"Navigation truly allows us to separate the wheat from the chaff.\" Miller begins \"Navigation shows who you really are. Do you study hard? Do you follow orders? Do you have the will to carry on when you are lost at 0300 and have no idea why you are making yourself do this?\"\n\nIn the back of the class, you hear Zac chuckle. Miller allows a shadow of a grin to cross @{male his|her} face.\n\n\"Navigation requires every skill you currently have, it requires you to think, to fight your internal demons and to physically conquer the challenge.\n*line_break\nIf you think you can do all that- maybe you really are worthy of a place in the Wardens.\"\n\nShortly, Walker will teach you the basics but the most important lessons are simple- Always keep to the mountain ridges, don't trust paths, keep your route simple enough to remember but detailed enough to be useful and never give up.\n*page_break\n*if (intelligence >= 60)\n    Fortunately for you, you easily understand everything and can use your spare time to help one of your platoon mates. (Navigation +20) (Needed 60 intelligence)\n    \n    The basics are simple enough, always keep to the mountain ridges, don't trust paths, keep your route simple enough to remember but detailed enough to be useful and most importantly- how to read a map.\n    *set navigation +20\n    *choice\n        #Help Zac\n            You walk over to Zac who seems to be having trouble.\n            \n            \"Need help?\" you ask\n            *line_break\n            \"God yes! I can't seem to understand how to read this map! How do I know if the lines show me going up or down?\n            *line_break\n            \"Easy, just try to find a river, everything is up from there. Once you get a hold of it you will see the ups and downs by instinct.\"\n            *line_break\n            \"Thanks\" Zac replies giddily \"I think I get it now.\"\n            \n            You spend the rest of the class helping Zac read and understand the map. (Zac +5)\n            *set zacrel +5\n            *goto nav\n        #Help @{male Abe|Mara}\n            You walk over to @{male Abe|Mara} who seems to be in need of a hand.\n            *line_break\n            \"Need help?\" you ask\n            *line_break\n            \"Sure do. I can't find a good way to walk from this point to that one. Any ideas?\"\n            *line_break\n            \"Sure, the trick is not to go up or down when it can be avoided, always try to stick to the mountain ridges and not cut through valleys\"\n            *line_break\n            \"Great idea!\" @{male Abe|Mara} replies, relived \"So how would you plot a course here?\"\n            \n            You spend the rest of the class helping @{male Abe|Mara} plot theoretical courses through the terrain. (@{male Abe|Mara} +5)\n            *set aberel +5\n            *goto nav\n        #Help Sam\n            You walk over to Sam who seems to be having trouble.\n            *line_break\n            \"Need help?\" you ask\n            *line_break\n            \"You have no idea how much I need your help!\" @{male he|she} replies \"How am I supposed to remember my route! It's so complicated!\"\n            *line_break\n            \"Write down your route and make sure it can all fit down on a small page, if it doesn't- try to find a way to simplify it so that it does. If you forget your route mid-way it won't matter how well it's built.\"\n            *line_break\n            \"Thanks, but how then do I describe this part?\" @{male he|she} asks, pointing at @{male his|her} map.\n            *line_break\n            \"Let me take a look\" you ips you learned in class until you are confident you have the best route possible. When you are done, you finish up on your remaining physical preparations, such as filling your hydration pack and packing your backpack. \n*page_break\nFive hours later, you are standing at the starting point of the navigation. It's cold, but you cannot wear anything above or underneath your uniform for fear of heatstroke. Shivering from the cold you place your map into a sealed envelope which is then put inside your backpack. If at the end of the navigation it is found that the envelope was opened then you will have some explaining to do.\n\nThe combat vest, weapon and backpack you carry account for 40% of your body weight. Soldiers who weigh more have more water or ammunition added to their packs so that they won't have an advantage over their lighter peers.\n\nYou take a deep breath, now, you only have your memory and a compass to take you through the night. The earlier you arrive at the endpoint the more sleep you will have. The flip side is soldiers who do not make it to the endpoint on time will have not only less time to sleep but will have to pay with more chores around the base.\n*page_break Good luck\nThe first 10 kilometers are uneventful and go according to your plan. You have walked in valleys and around cattle fences when you reach a mountain ridge. Going according to plan you climb it all the way to the top. When you reach the highest point in the range you stop to take a well-deserved rest and drink from your hydration pack. You look around, taking in the night air and cooling down from the hard climb.\n\nAfter a few minutes of rest, you turn to face a new dilemma. From the top of the ridge, you see two ways you can reach the endpoint. You can either take the longer route while keeping to the mountain ridge or cut through the valley at your feet and potentially save some time and go to bed earlier.\n*fake_choice\n    #Keep to the mountain ridge, even though it's longer
