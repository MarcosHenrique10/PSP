eak with each suspect separately. \n                              Benjamin agrees, allowing you to interview each suspect privately in Serge's comfortable office, which has thick walls to prevent eavesdropping.\n                              \n                              What Benjamin doesn't know is that all you really want to do is speak to Serge. You casually speak with all the other suspects until Serge comes in and takes a seat.\n\n                              What do you wish to say?\n                              *choice\n                               #I know you're the murderer. Confess, and the charge may be lessened.\n                                *label sergio\n\n                                Serge: I thought we already discussed this. I'm not the murderer!\n\n                                It's pretty apparent that Serge isn't going to crack. You're going to have to do this the more painful way. Everyone goes back to the projection room.\n                                *goto sergecomeon\n                               #Who do you think the murderer is, Serge?\n                                Serge: I have no idea, I really couldn't see who the killer was.\n                                *choice\n                                 #Argue\n                                  $!{name}: I'll get straight to the point. You've been making all this stuff up. I know you are the murderer.\n                                  *goto sergio\n                                 #Stay calm\n                                  *goto sergiscalm\n                               #I have a hunch that you're the murderer. Tell me exactly what you have done today.\n                                *label sergiscalm\n                                $!{name}: What exactly have you done today?\n\n                                Serge: Before I went into the projection room, I was doing some paperwork. Louis and I were supposed to celebrate my newborn baby boy with a drink at the pub, so I was going to tell him to meet me there in half an hour. I left my office and opened the door to the projection room, only to find Louis dead and the murderer still in the room.\n\n                                $!{name}: While most of this may be true, I can see through the many other lies you conceal, Serge. You're the culprit in this case alright.\n                                *goto sergio\n                             #Have an intermission. You have some things to say to Benjamin in private before you accuse Serge of murder.\n                              You tell all the suspects to wait in the lobby while you and Benjamin have a quick discussion.\n\n                              Benjamin: What is it, $!{name}? Have you figured out who the culprit is?\n \n                              $!{name}: Yes, I have. It's Serge, definitely Serge.\n\n                              Benjamin: I trust your judgment. If you are completely certain, let's tell everyone else go home and have a good, long talk with Serge.\n                              *page_break\n                              Serge comes back into the projection room. \n\n                              $!{name}: I know you are the murderer, Serge.\n                              *goto sergio\n                         #Walked back to the concession stand\n                          No, that doesn't make any sense.\n                          *goto restart\n                       #Wipe away the prints\n                        The murderer wouldn't have enough time to do that. The killer already wasted enough time throwing away the chloroform towel.\n                        *goto restart\n               #Took a piece of glass from the victim's mouth, stabbed Serge in the arm, pushed him down, and ran to the men's bathroom, in that order.\n                No, then the glass that was found in the garbage would have traces of blood from the victim.\n                *goto restart\n               #Pushed Serge down, took a piece of glass, stabbed Serge in the arm, and ran to the men's bathroom, in that order.\n                That's not how Serge remembered it.\n                *goto restart\n             #Louis waking up\n              No, that doesn't make any sense.\n              *goto restart\n           #From glass stored in the trash can.\n            No, that doesn't make any sense.\n            *goto restart\n         #His own house\n          You have evidence that says otherwise.\n          *goto restart\n         #The victim\n          How did he get the glass from the victim?\n          *choice\n           #From his pockets\n            No, that doesn't make any sense.\n            *goto restart\n           #From his mouth\n            No, that doesn't make any sense.\n            *goto restart\n           #From his soda bottle next to him\n            No, that doesn't make any sense.\n            *goto restart\n       #Drowned Louis in the bathroom sink\n        No, that doesn't make any sense.\n        *goto restart\n       #Suffocated Louis with a plastic bag\n        No, that doesn't make any sense.\n        *goto restart\n     #Hit Louis over the head\n      No, that doesn't make any sense.\n      *goto restart\n   #Of the noise I heard in the theater\n    No, that doesn't make any sense.\n    *goto restart\n   #Of the bathroom incident with Serge\n    No, that doesn't make any sense.\n    *goto restart\n   #Of what Helena said\n    No, that doesn't make any sense.\n    *goto restart\n #At 2:55 PM\n  *label lllw\n  The killer must have entered the projector room then because...\n  *fake_choice\n   #Of what you saw in the theater\n   #Of the noise I heard in the theater\n   #Of the bathroom incident with Serge\n   #Of what Helena said\n\n  No, that doesn't make any sense.\n  *goto restart\n #After 2:55 PM\n  *goto lllw\n\n*label thanksforplaying\n*page_break\nWe hope you've enjoyed playing [i]Popcorn, Soda…Murder?[/i]\n\n*feedback\n\nWe release new games on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99 $0.99\n", "interrogation": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n*set james_gone false\n*temp ss_6\n*set ss_6 false\n*temp ss_7\n*set ss_7 false\n\nBenjamin: Brilliant observations, $!{name}! So, putting everything together, the murder must have gone like this...\n\nBenjamin: The murder occurred anywhere from 2:15 to 3:35. The attacker went into this projection room, most likely hiding the glass and chloroform so Louis couldn't see them. Then, without Louis expecting anything, the murderer surprised Louis by pushing a cloth presumably soaked in chloroform into Louis's face, causing Louis to lose consciousness and fall to the floor. The attacker then took out the small glass fragments and carefully killed the victim.\n\nBenjamin: The only weird points in this murder are the bleach on Serge, the single glass shard that Serge took after injuring himself, and where the chloroform-soaked item is now. Is there anything left to say?\n\n*label meow\n\nYou speak up, saying that..\n*choice\n *if james_gone = false\n  #One suspect here is already clear.\n   Benjamin: And who is that?\n   *choice\n    #Serge\n     Benjamin: You've got it backwards, I find him most suspicious of all!\n  \n     Serge: What do you mean by that?!?\n     *goto meow\n    #Helena\n     Benjamin: I still find many things suspicious about her. I don't know what you are talking about.\n     *goto meow\n    #Alan\n     Benjamin: He is still a suspect because he passed this room after exiting the film.\n     *goto meow\n    #James\n     You tell Benjamin that, since he never passed by this room and spent only about half a minute outside, he is not under suspicion and should be allowed to leave.\n\n     Benjamin: Hmm, I guess you're right. You're free to go, James.\n\n     James: Thanks a lot! I hope everything goes well from here on out.\n\n     He leaves.\n     *set james_gone true\n     *goto meow\n    #Gabrielle\n     You say that, since Gabrielle didn't pass by the bathroom, she is not under suspicion and should be free to leave.\n\n     Benjamin: The women's bathroom can't be seen from the concession stand. She may have gone all the way around the back of the theater to reach this room without Helena spotting her.\n     *goto meow\n #You would like to question someone.\n  Benjamin: I assume you wish to question Serge, right? He does have some explaining to do.\n\n  That is exactly what you wanted, and Serge agrees to it. You ask Serge to give you a complete summary of what he has done today and why, starting with discovering the body.\n  *label s1\n\n  Serge: At 3:40 PM, I went to tell Louis something.\n  *choice\n   #Allow him to continue.\n    *label s2\n\n    Serge: I wanted to tell Louis to meet me at the nearby pub in 30 minutes to celebrate my newborn baby boy.\n    *choice\n     #Allow him to continue.\n      *label s3\n\n      Serge: When I opened the door, however, I found Louis dead on the floor. I was so frightened that I fell down onto the floor myself, scraping my arm on a small piece of glass.\n      *choice\n       #Allow him to continue.\n        *label s4\n\n        Serge: I quickly ran out of the room to my office and called the police on my phone.\n        *choice\n         #Allow him to continue.\n          *label s5\n\n          Serge: I put a bandage on the wound from the shard of glass I had fallen on. Then I waited near the projection room for the police to arrive, making sure that nobody entered the projection room. While waiting, I also threw that piece of glass into the garbage can.\n          \n          *choice\n           #Review his words from the beginning.\n            You start to question whether Benjamin is really telling the truth about what really happened with the glass.\n\n            *goto s1\n           #Hold on. Can you repeat what you said before this?\n            *goto s4\n           #That doesn't seem right.         \n            You ask him a question.\n            *choice\n             #Why did you throw it in the garbage? It could be useful evidence!\n              Serge: I don't know this sort of forensic information! I thought it would be okay to throw it away.\n \n              Benjamin: You can't blame him for not knowing to preserve the scene by keeping the glass. Is there really anything wrong with what Serge is saying here, $!{name}?\n \n              You know there is, you just have to review everything over again.\n              *goto s1  \n             #Can I see your wound?\n              Serge agrees and takes off the bandage. It is a small but deep cut.\n\n              Benjamin: There isn't anything strange here. Is there really anything wrong with what Serge is saying here, $!{name}?\n \n              You know there is, you just have to review everything over again.\n              *goto s1  \n         #Hold on. Can you repeat what you said before this?\n          *goto s3\n         #That doesn't seem right.  \n          You ask him a question.\n          *choice\n           #Are you sure nobody else entered during the time between when you went to your office and when you went back to the crime scene?\n            Serge: No, I'm not. But since it looks the same from when I first saw Louis until now, I doubt anyone did. Anyway, after I called the police...\n            *goto s5\n           #Couldn't you just use the phone in the lobby?\n            Serge: I could have, but those phones cost money to use. Besides, I had to go to my office anyway because after calling the police...\n            *goto s5\n       #Hold on. Can you repeat what you said before this?\n        *goto s2\n       #That doesn't seem right.\n        You speak up.\n        *choice\n         #Was the body still in the position that it is now in?\n          Serge: Yes, it definitely was. It looked the same then and now. Anyway, after I found Louis dead...\n          *goto s4\n         #Was that the only piece of glass on the floor?\n          Serge: Yes, I looked around, and that was the only piece of glass on the floor. I just got really unlucky. Anyway, after I found Louis dead...\n          *goto s4\n         #Wait, that doesn't sound possible.\n          Serge: Are you calling me a liar!? I know I don't look like a weak man, but I got very scared when I saw my friend dead. There's nothing wrong with falling over from the scene.\n\n          Of course not, you reply. What's making this seem impossible to you?\n          *choice\n           #It would be impossible to get scraped by the glass.\n            Benjamin: And why is that, $!{name}?\n            *choice\n             #Because this glass wouldn't be that sharp.\n              Benjamin: It was sharp enough to kill a person. Don't you think it would be sharp enough to injure Serge?\n\n              Serge: Indeed, you can look at my injury if you want proof. Anyway, after I found Louis dead...\n              *goto s4\n             #Because this glass would be too small to injure.\n              Benjamin: Too small to injure? Even small fragments of glass can cut into the skin, you know.\n\n              You make another profound observation. It's extremely odd that Serge would fall on the only piece of glass that remained in the room. Due to the small size of the glass, it decreases this possibility even further. But given that a patchwork of rugs covers the floor and that the glass would have landed horizontally on the floor, it would be impossible for Serge to scrape himself.\n\n              Benjamin: Continue.\n\n              The glass would have landed horizontally, as previously mentioned. This means Serge would have hit his arm on the smooth side of the glass, not coming into contact with the sharp edges. It has to have landed this way due to the size of the glass.\n\n              Serge: Let me explain.\n\n              Benjamin: You have a lot of explaining to do, Serge. It's looking more and more like you are the culprit.\n              *goto s_testimony\n             #Because this glass wasn't at a good angle.\n              Benjamin: A good angle? What are you talking about?\n\n              You make another profound observation. If a person were to fall downward onto a piece of glass that is lying horizontally on the floor, you would hit the smooth side, not the rough side. The glass would have to be angled upward a bit to scrape an arm, and with nothing on the floor except the patchwork of rugs, this would be impossible. The small size of the glass further proves that it would have landed in this way.\n\n              Benjamin: I didn't notice that! But then... how is this possible?\n\n              Serge: Let me explain.\n\n              Benjamin: You have a lot of explaining to do, Serge. It's looking more and more like you are the culprit.\n              *goto s_testimony\n           #It would be impossible to get scared by the body.\n            Serge: How would you act if you saw a friend dead on the floor unexpectedly!? I happened to fall backwards on the floor from the shock.\n\n            Benjamin: That's right, don't make unnecessary assumptions, $!{name}.\n\n            Serge: Anyway, after I found Louis dead...\n            *goto s4\n           #It would be impossible to get hurt by the only small glass fragment in the room.\n            Serge: I told you this already! I just got unlucky in the placement of where I fell.\n\n            Benjamin: Serge is right. There isn't anything impossible about it.\n  \n            Serge: Anyway, after I found Louis dead...\n            *goto s4\n     #Hold on. Can you repeat what you said before about this?\n      *goto s1\n     #That doesn't seem right.\n      You ask him a question.\n      *choice\n       #Can we get clarification as to whether you truly had a child recently?\n        Serge: You mean you don't believe me? You can call up my wife if you want, or heck, we can all go to my house and see the baby!\n\n        Benjamin: That's okay, Serge, we believe you.\n        \n        Serge: Anyway, I went inside the room to inform Louis...\n        *goto s3\n       #Did Louis know he was going to meet you at the pub today?\n        Serge: Yes! When I called him last night, he said we could go to the pub after he finished work, which would have been right after \"The Prince and the God.\"\n\n        Serge: Anyway, I went inside the room to inform Louis...\n        *goto s3\n   #That doesn't seem right.\n    You ask Serge if he is certain that he didn't go to the projection room before 3:40 PM.\n\n    Serge: Yes, I know it couldn't have been 3:40 or earlier. I had to check the time before going to the projection room because...\n    *goto s2\n\n*label s_testimony\n*label ss1\n\nSerge: Look, I didn't want to talk about what really happened when I entered the room. .. But I guess I have to.\n*choice       \n #Allow him to continue.\n  *label ss2\n \n  Serge: When I first walked into the room, it was pitch black, and there was another person inside. I can't identify that person because of how dark it was.\n  *choice\n   #Allow him to continue.\n    *label ss3\n\n    Serge: The person came up to me and told me in a very strange voice that I had better not tell anyone of our encounter, or I'd die.\n    *choice\n     #Allow him to continue.\n      *label ss4\n    \n      Serge: The person then stabbed me in the arm with a small piece of glass and pushed me to the floor. \n      *choice\n       #Allow him to continue.\n        *label ss5\n         \n        Serge: After that, the person fled out of the room, leaving behind the piece of glass. I tried to follow, but I couldn't.\n        *choice \n         *if ss_6\n          #Allow him to continue.\n           *label ss6\n\n           Serge: Since I didn't want it to appear that I was in the room around the time for death, I said I came into the room at 3:40 PM. But I actually went in at 2:56. This was okay because Louis only really has to operate the projector at the very beginning, middle, and very end of the film. The middle switch happens at 2:55, so I came in right after that.\n           *choice\n            *if ss_7\n             #Allow him to continue.\n              *goto ss7\n             #Hold on. Can you repeat what you said before this? \n              *goto ss5\n             #That doesn't seem right..           \n              You ask him a question.\n              *choice\n               #Why are those the only times where you have to operate?\n                Serge: Our projector is a two-reel system, meaning you have to make a switch of film during the middle of the movie. You also have to operate the projector to start and end the film.\n                *if ss_7\n                 *goto ss7\n                *else\n                 *goto ss1\n               #Why didn't you want us to think you were in the room around the time of death?\n                Serge: Because then I would become the prime suspect, although I probably am now anyway.\n \n                Yeah, that makes sense. Anyway, that's the end of what Serge has to say. You should review everything to see if anything is wrong.\n                *if ss_7\n                 *goto ss7\n                *else\n                 *goto ss1\n            *if ss_7 = false\n             #Review his words from the beginning.\n              *goto ss1\n             #Hold on. Can you repeat what you said before this? \n              *goto ss5\n             #That doesn't seem right..           \n              You ask him a question.\n              *choice\n               #Why are those the only times where you have to operate?\n                Serge: Our projector is a two-reel system, meaning you have to make a switch of film during the middle of the movie. You also have to operate the projector to start and end the film.\n                *if ss_7\n                 *goto ss7\n                *else\n                 *goto ss1\n               #Why didn't you want us to think you were in the room around the time of death?\n                Serge: Because then I would have become the prime suspect, although I probably am now anyway.\n \n                Yeah, that makes sense. Anyway, that's the end of what Serge has to say. You should review everything to see if anything is wrong.\n                *if ss_7\n                 *goto ss7\n                *else\n                 *goto ss1\n          #Hold on. Can you repeat what you said before this? \n           *goto ss4\n          #That doesn't seem right.\n           You ask him a question.\n           *choice\n            #What do you mean you couldn't?\n             Serge: After I was pushed on to the ground, I looked behind me and saw the suspect go into the men's bathroom, which is on the same side of the hallway. \n\n             Serge: I entered the bathroom and at first found nobody inside, so I looked underneath the stalls. Again, there wasn't anybody to be found.\n \n             Benjamin: Again, you continue not to talk about the most important parts, Serge!\n             *choice\n              #Have him explain more.\n               Serge: Fine, I'll go more in depth.\n    \n               Serge adds a statement to his testimony.\n               *page_break\n               *set ss_7 true\n               *if ss_6\n                *goto ss6\n               *else\n                *goto ss7\n              #Review his summary more.\n               *if ss_6\n                *goto ss6\n               *elseif (ss_7)\n                *goto ss7\n               *else\n                *goto ss1\n            #So you threw the glass out?\n             Serge: Yeah, I didn't think it was important so I threw it out. You can't blame me for not knowing it could be crucial evidence.\n             *if ss_6\n              *goto ss6\n             *elseif (ss_7)\n              *goto ss7\n             *else\n              *goto ss1\n         *if (ss_7) and (ss_6 = false)\n          #Allow him to continue\n           *label ss7\n\n           Serge: After I fell to the floor, I looked out the door to see where the person went. I saw the person push open the door to the men's bathroom. I got up and tried to open the door slowly and silently. But when I entered, there was no one in sight, so I walked straight to the stalls. Then I heard a weird yet very familiar CREAAAK sound. I looked underneath all the stalls, because they were all closed even though they were not in use, but I didn't see anyone under any of them. I even opened all the stalls and checked around to make sure, but nobody was in the bathroom.\n           *choice\n            #Review his words from the beginning.\n             *goto ss1\n            #Hold on. Can you repeat what you said before this?\n             *if ss_6\n              *goto ss6\n             *else\n              *goto ss5\n            #That doesn't seem right.\n             You speak up.\n             *choice\n              #I think I need to have a look around the bathroom.\n               *label bathing\n\n               You enter the bathroom and look around. You should probably examine everything, this place is very important to the case.\n               *label exas\n\n               What do you want to examine?\n               *choice\n                #The broken mirror\n                 There are three sinks and three mirrors which are directly in front of them. The broken mirror is closest to the door and there are still some pieces of the mirror in the sink.\n                 *goto exas\n                #The air vents\n                 There is one air vent very high up on the wall where the stalls are. It would be impossible to reach even if you stood on the toilet seats and were a tall person.\n                 *goto exas                       \n                #The toilets\n                 There aren't any urinals, just 5 stalls near the back of the bathroom. Upon looking at one of them, you realize that the toilets have accessible tanks.\n                 *goto exas\n                #Actually, I want to have a word with the janitor.\n                 *goto fewm\n                #That's enough, I know everything I need.\n                 *label lalaland\n                 Benjamin: Are you sure you are done looking around the bathroom?\n                 *choice\n                  #Yes.\n                   Benjamin: Then tell me, how did the murderer escape?\n                   *choice\n                    #The killer was on top of the stalls.\n                     Benjamin: No, Serge looked in every stall and there was nobody to be seen. Maybe you need to examine here a bit more...\n                     *goto exas\n                    #The killer hid behind the door.\n                     Benjamin: Oh, I see! Since the door opens inward, the attacker could have waited behind the door against the wall for Serge to enter. The killer held the door open while Serge walked straight toward the stalls, then exited the bathroom and let the door close, which made that creaking sound. No wonder it sounded familiar to Serge.\n             \n                     You say you can also explain how bleach got on Serge's sleeves and the front of his pants.\n                     *choice\n                      #The killer poured it on Serge as he walked toward the stalls.\n                       Benjamin: $!{name}... if that were true, the bleach would be on his back. I would also think that it would be too risky for the murderer to do. Maybe you need to examine here a bit more...\n                       *goto exas\n                      #It was on the floor.\n                       Serge: Yes, of course! Dustin, the janitor, used bleach when he was here cleaning up earlier. It got on my sleeves and pants when I crouched down to see under the bathroom stalls!\n                       *page_break\n                       Benjamin: Yes, I think you know what you are doing here. Time to close this case.\n                       *finish Scene of Identification\n                    #The killer used the air vent.\n                     Benjamin: No, the air vent is way too high to be used. Maybe you need to examine here a bit more...\n                     *goto exas\n                  #No.\n                   Benjamin: That's fine, take your time.\n                   *goto exas\n              #I need to have a word with this janitor.\n               *label fewm\n\n               You wait a few minutes and a gaunt white-skinned man walks in.\n\n               His name is Dustin Samuels.\n               *choice\n                #Have him explain what he has done today.\n                 Dustin: Well, I came into the theater to start work at 8 AM. I just did my regular job, dustin' here and there, cleaning up spills from the moviegoers, stuff like that.\n                 *label dustin\n\n                 Dustin: A little after noon I went to the bathroom and saw that someone completely shattered one of the mirrors. Obviously I had to clean it up since I'm the janitor, but first I went to Serge's room and told him how he needed to install a new mirror in the men's bathroom.\n\n                 Dustin: Anyway, this is a small movie theater, and we don't have a supply closet. I store all my stuff in the projector room, which is actually very inconvenient considering that when a movie is showing the entire room is dark. \n                 *page_break\n                 Dustin: There wasn't a movie playing at this time, so I simply went in to get the bottle of bleach I put behind the fire extinguisher, a bag to store the mirror pieces, and some other cleaning stuff like my mop. I figured I should clean the whole bathroom while I was at it.\n\n                 Dustin: So I put all the glass in the bag, which was thick enough to store them without cutting through. After that I cleaned all the bathroom for about an hour or so. I took the bag of broken mirror outside to the garbage cans.\n                 *choice\n                  #I think I need to have a look around the bathroom.\n                   *goto bathing\n                  #That's enough, I know everything I need.\n                   *goto lalaland\n                #Have him tell you what he did regarding the broken mirror.\n                 *goto dustin\n          #Hold on. Can you repeat what you said before this?\n           *if ss_6\n            *goto ss6\n           *else\n            *goto ss5\n          #That doesn't seem right...\n           You ask him a question.\n           *choice\n            #What do you mean you couldn't?\n             Serge: After I was pushed to the ground, I saw the person go into men's bathroom, which is on the same side of the hallway. \n\n             Serge: I entered the bathroom and at first found nobody inside, so I looked underneath the stalls. Again, there wasn't anybody to be found.\n             \n             Benjamin: Again, you continue not to talk about the most important parts, Serge!\n             *choice\n              #Have him explain more.\n               Serge: Fine, I'll go more in depth.\n    \n               Serge adds a statement to his testimony.\n               *page_break\n               *set ss_7 true\n               *if ss_6\n                *goto ss6\n               *else\n                *goto ss7\n              #Review his summary more.\n               *if ss_6\n                *goto ss6\n               *if (ss_7) and (ss_6 = false)\n                *goto ss7\n               *else\n                *goto ss1\n            #So you threw the glass out?\n             Serge: Yeah, I didn't think it was important, so I threw it out. You can't blame me for not knowing that it could be crucial evidence.\n             *if ss_6\n              *goto ss6\n             *elseif (ss_7) and (ss_6 = false)\n              *goto ss7\n             *else\n              *goto ss1\n         *if (ss_7 = false) and (ss_6 = false)\n          #Review his words from the beginning.\n           Benjamin: Are you sure you aren't making this up, Serge?\n\n           Helena: Within a lie lies other lies. I'm sure you'll find things wrong with what he has just said if he is really lying.\n           *goto ss1\n          #Hold on. Can you repeat what you said before this? \n           *goto ss4\n          #That doesn't seem right.\n           You ask him a question.\n           *choice\n            #What do you mean you couldn't?\n             Serge: After I was pushed on to the ground, I looked behind to where he was running, and saw he went into the men's bathroom, which is on the same side of the hallway. \n\n             Serge: I entered the bathroom and at first found nobody inside, so I looked underneath the stalls. Again, there wasn't anybody to be found.\n \n             Benjamin: Again, you continue not to talk about the most important parts, Serge!\n             *choice\n              #Have him explain more.\n               Serge: Fine, I'll go more in depth.\n\n               Serge adds a statement to his testimony.\n               *page_break\n               *set ss_7 true\n               *if ss_6\n                *goto ss6\n               *else\n                *goto ss7\n              #Review his summary more.\n               *if ss_6\n                *goto ss6\n               *elseif (ss_7)\n                *goto ss7\n               *else\n                *goto ss1\n            #So you threw the glass out?\n             Serge: Yeah, I didn't think it was important so I threw it out. You can't blame me for not knowing it could be crucial evidence.\n             *if ss_6\n              *goto ss6\n             *elseif (ss_7)\n              *goto ss7\n             *else\n              *goto ss1\n       #Hold on. Can you repeat what you said before this? \n        *goto ss3\n       #That doesn't seem right.\n        You ask him a question.\n        *choice\n         #Why did he push you to the floor?\n          Serge: So he could easily make his escape, obviously. Anyways...\n          *goto ss5\n         #It was a small cut, did it really injure you that much?\n          Serge: It's a small but very deep cut, $!{name}. It did hurt quite a bit. Anyways...\n          *goto ss5\n     #Hold on. Can you repeat what you said before this? \n      *goto ss2\n     #That doesn't seem right.\n      Benjamin: So that's why you didn't tell anyone about this until now.\n      \n      You speak up.\n      *choice\n       #What do you mean a strange voice?\n        Serge: Someone probably trying to disguise his voice so I wouldn't recognize it now. After that...\n        *goto ss4\n       #You should have told the police anyway!\n        Serge: I didn't want to die! Like I'm going to risk my life for your investigation!? Anyway, after that...\n        *goto ss4\n   #Hold on. Can you repeat what you said before this? \n    *goto ss1\n   #That doesn't seem right.\n    You ask him a question.\n    *choice\n     #Why was it pitch black?\n      Serge: When a movie is showing, the projector room always has to be in complete darkness or the film won't show up well on the screen.\n\n      Benjamin: Wait, then wouldn't you be disturbing him by opening the door and letting in the light?\n\n      Serge: The hallways are dimly lit, as you must have noticed. If you don't leave the door open and close it quickly behind you, no difference will show up on the screen. Anyway, ...\n      *goto ss3\n     #What time was this?\n      Serge: Actually, since I didn't want it to look like I was in the room at the time of death, I said I came into the room at 3:40 PM. I actually went in at 2:56, however. This is okay because Louis only really has to operate the projector during the very beginning, middle, and very end of the film. The middle switch happens at 2:55, so I came in right after that.\n      \n      This seems pretty important. Let's add it to the end of his summary.\n      *set ss_6 true\n\n      Serge: Anyways...\n      *goto ss3\n #That doesn't seem right.\n  You ask Serge why he didn't want to talk about what really happened before now.\n\n  Serge: I'm getting to that! Just hold on...\n  *goto ss2\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Detective Jay Moore\"\nWhat would you like to ask?\n\n*fake_choice\n  #What's the time of death?\n  #How long do you suppose it took to kill the victim?\n  #I was watching that movie and didn't hear anything. Shouldn't I have heard his screams? \n  #Was the door to this room locked at the time?\n  #So what possible suspects have you found so far?\n\n\n*set name \"Inspector Michelle Flynn\"\n*script changeBackgroundColor(\"black\")\n\nWhat deduction are you going to make now?\n*fake_choice\n  #There are more suspects than you think.\n  #Blood has been cleaned up here.\n  #The time it took to kill Louis could be shorter than you think.\n  #The time it took to kill Louis is longer than you think.\n  #There is something suspicious about the body.\n  #There is something we are missing about how the glass weapons were used.\n  #It's a suicide.\n  #I'm done. I've deduced all I can.\n", "startup": "*title Popcorn, Soda ... Murder?\n*author Pauzle\n\n*scene_list\n  startup\n  interrogation\n  identification\n\n*create name \"a\"\n*create james_gone false\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and (not(choice_purchased_adfree) and not(choice_is_web))\n  This game is supported by advertisements, but you can buy the unlimited version\n  to turn off ads forever.\n\n  *purchase adfree $4.99 purchased\n  *page_break_advertisement\n\n*label purchased\n\nYou are a trusted detective in the Greenvale Police Department. \n\nTo start the murder mystery, please enter your name.\n*input_text name\n\nBefore going any further, you should get a detective pad and pen so you can write down and remember the many clues that will help you correctly identify the murderer. This murder mystery is very challenging and will require full use of your deductive abilities. Good luck.\n*page_break\n\nThe tale begins with you enjoying your free time by watching a movie. It's always relaxing to come to this small theater when you don't have work to do.\n\nThe movie you are watching is called \"The Prince and the God.\" Although you've read a lot of good reviews about it, it seems pretty boring so far. Maybe it will get better soon though, as the film isn't even halfway through.\n\nIt's a pretty empty theater, with only a few people watching the movie. \n*page_break Start\n\nSuddenly, the movie screen goes white but quickly changes to black.\n\nAfter a second or two, though, the movie picks up from where it left off. \n*line_break\nQuite weird, but it was probably just some technical problem.\n*temp benjamin false\n*temp stand false\n*temp victim false\n*temp really_through false\n*temp bleach false\n*temp glass_throw false\n*temp helena false\n*temp suspect_list false\n*temp deduction false\n*temp deduction2 false\n*temp suspect5 false\n*temp serge_bleach false\n*temp hands_bare false\n*temp chloroform false\n*temp time_frame false\n*temp serge_blood false\n*temp prelim false\n*if choice_randomtest\n  *ending\n\nAnyway, you continue watching, and the movie does get a lot better later on. The credits roll and you exit, but you are greeted by a mob of people in the lobby of the theater surrounding something.\n*choice\n #Push your way through the mob to see what's going on.\n  Your curiosity gets the better of you. You have to see what's up with all these people.\n  *label mob\n  By pushing through the mob, you finally make your way to what everyone's staring at.\n  \n  The door to the projector room is open, and there is a man lying on the floor. You see some familiar faces from the police department running around.\n  *choice\n   #Talk to someone from the department about what has happened.\n    *label gleh\n    *if benjamin\n     Benjamin is already here, looking around the place. You go up to him and ask what's going on.\n     *goto askingben\n    *if benjamin = false\n      You see Benjamin Elyot, Chief of the Greenvale Police Department. He probably knows what happened here.\n      *goto askingben\n    *label askingben\n \n    Benjamin: Okay $!{name}, let me tell you what we know so far. That is the body of the deceased, Louis Lawrence, who was operating the film, \"The Prince and the God,\" when he died. He suffered an extremely painful death after the murderer stuffed multiple pieces of broken glass down the victim's throat. The glass sliced many vital organs and led to his death. He was discovered during the credits of the movie by the manager of the movie theater. Right now the team is compiling a list of possible suspects. Can you help us out, $!{name}?\n\n    Seems like an offer you can't refuse, for this game's sake. So what do you want to do?\n    *set victim true\n    *choice\n     #Have a look at the body.\n      *goto body\n     #Ask a few questions of Benjamin.\n      *label questions\n      What would you like to ask?\n      *choice\n       *if deduction2 and (prelim = false)\n        #Tell Benjamin you would like to have a preliminary deduction.\n         *if bleach = false\n          You still haven't looked around the crime scene enough.\n          *goto fruity\n         *elseif (glass_throw = false) and (bleach)\n          You still haven't talked to the manager about anything.\n          *goto fruity\n         *else\n          *goto deduce\n       *if suspect_list\n        #Can you tell me about the three suspects?\n         Benjamin: Yes, your colleagues have just finished questioning and searching the suspects. This is very important information, so please remember it. All three suspects temporarily left the theater at some point during the film.\n         *page_break\n         Benjamin: The first suspect is Alan, who was the first to leave. He went to the bathroom, which means he walked past the projection room. Alan is a lean man wearing a charcoal t-shirt. He has wide-set violet-blue eyes and light-brown hair in a crew-cut. He has a gentle personality and a raspy voice.\n         *page_break Next Suspect        \n         Benjamin: The second suspect is James, who left because his cell phone vibrated and he didn't want to disturb anyone. Helena says he didn't go near the projection room. James is a muscular yet very skinny man wearing a striped jacket. He has squinty brown eyes, and his shaggy ash-blond hair is in a long ponytail. He is businesslike and very cooperative.\n         *page_break Next Suspect\n         Benjamin: The final suspect is Gabrielle, who also left because she needed to go to the bathroom. The women's bathroom is on the opposite side of the theater, however, so she didn't pass by the projection room. She is a chubby woman wearing a turquoise turtleneck. She has hazel eyes, freckles, and brown hair in pigtails. She has been rather stubborn with us.\n   \n         Benjamin: As to how long all this took, according to Helena, James only talked on the phone for about thirty seconds and then went back to watch the movie. Alan was only out of the theater for about a minute. We questioned him as to why he was in the bathroom for such a short time, and he responded that he only needed to wash his hands after getting them too buttery from popcorn. Gabrielle was out of the theater for four minutes.\n         *set deduction2 true\n         *if bleach = false\n\n          You thank Benjamin for his help and think about where to investigate next. Maybe you should look around the crime scene some more?\n          *goto fruity\n         *elseif glass_throw = false\n\n          You thank Benjamin for his help and think about where to investigate next. Maybe you should pay the manager a visit?\n          *goto fruity\n         *else\n          You thank Benjamin for his help and think about where to go next. Actually, everything already seems to have been examined. Perhaps it's time for a preliminary deduction?\n          *set deduction true\n          *choice\n           #Yes, I think I have some good ideas about this.\n            *label deduce\n            You are a very trusted detective, so Benjamin agrees to hear your thoughts and gathers Serge, Helena, Alan, James, and Gabrielle in the projection room to hear them as well.\n \n            You better not mess up here, trusted detective. Your preliminary deduction is made up of many multiple deductions. One or two of the deductions may be completely wrong, but for the ones that aren't, you need to solve them completely to move on.\n\n            *set prelim true\n            *label movequest\n\n            What deduction are you going to make now?\n            *label deduction_questions\n            *choice\n             #There are more suspects than you think.\n              Benjamin: What? You mean there are more suspects than the three people who left for a short while during the film?\n              *choice\n               #Yes, another person left during the film.\n                Benjamin: According to Helena, that's incorrect.\n\n                Let's try again. You quickly make up an excuse to leave the projection room for a little bit to think.\n                *goto leave\n               #No, the other suspects weren't watching the movie.\n                Benjamin: Oh? And who might they be?\n                *choice\n                 #You are the other suspect, Benjamin Elyot!\n                  Benjamin: You can be so cruel, $!{name}. Come back when you're ready to treat this seriously.\n                  *goto leave\n                 #Serge Goode and Helena Nerissa are the other possible suspects.\n                  Serge speaks up.\n                  \n                  Serge: You better not be accusing me of murder, $!{name}. All I did was find the victim. The rest of the time I was in my office!\n\n                  Serge seems to be getting really mad. What should you say?\n                  *choice\n                   #Explain one possible way he could have murdered Louis.\n                    *goto euaqhwue\n                   #Tell him gently that you are just considering the options.\n                    *label euaqhwue\n                    You tell Serge you are simply saying that, because nobody saw him enter the projection room, he could have killed the victim and then cleaned up and waited for ten minutes. After that he would scream, fake an injury, and call the police. This would make people believe that he had entered the projection room and found the body during the credits of the movie, when in fact this took place at least ten minutes beforehand.\n                   \n                    Serge looks down at the floor with an uneasy face. Benjamin nods his head and then looks at Helena. How could Helena be a suspect here?\n                    *choice\n                     #She was alone the whole time. Obviously, she'd had enough time to kill Louis.\n                      Helena: But then it would have been impossible for me to identify everyone who exited the theater. Let's say I had been in the projection room for at least two minutes. Someone could have left during that time without my knowing. Then all my statements about being completely certain could be held against me. Deal with the faults of others as gently as you do with your own, Detective.\n                      *label qqqs\n\n                      This brings up a good point. How do you respond?\n                      *choice\n                       #It is possible, with a certain trick.\n                        Benjamin: Really, how?\n                        *choice\n                         #She had a \"window\" of opportunity.\n                          You say that Helena quite literally had a window, the one through which the movie is projected onto the screen, and through which she could see if anyone watching the film left the theater. Since the projection room is on an incline and in the back of the theater, she could simply have held Louis down near the projector and looked down through the window while killing him. There isn't any evidence to support this theory, but it is a possibility.\n\n                          Helena: I'm a weak woman, Detective. I could never hold a man down like that. Also, if I were looking out that window, I would block the projector, and all the viewers would notice.\n \n                          Another good point. Now what do you do?\n                          *choice\n                           #It's true, she blocked the projector for a short time.\n                            You say that, when you were watching the film, there was a moment when the screen went white and then black? That's when the projection must have been obstructed.\n \n                            Helena: That brief pause wouldn't give me enough time to survey the theater for anyone who exited. I would have had to go quickly over to the projection room, hoping nobody entered the theater and saw the concession stand empty, then hold a grown man down while stuffing his face with glass, all the while looking through a small projection window to ensure that nobody left the theater. The whole idea is preposterous.                           \n                            \n                            Yeah, it does sound impossible. You'd think there would just be too much risk for her if she didn't keep a watch on the lobby. You find that you've made a mistake. You quickly make up an excuse to leave the projection room for a little while to think.\n                            *goto leave                \n                           #Admit your mistake and apologize.\n                            A good choice. You say sorry, you were just trying to lay out all the possibilities. You leave the projection room for a little while to think things over.\n                            *goto leave\n                         #Her accomplice would help her.\n                          *label accompliceno\n                          As a detective, you just can't make these kinds of assumptions, especially when the person you are accusing is right in front of you. There is absolutely nothing tying her to another suspect. In fact, this accusation is pretty embarrassing. You quickly make up an excuse to leave the projection room for a little while to think.\n                          *goto leave\n                       #Two minutes is awfully short, and people that did exit probably don't tell the police.\n                        You say that anyone leaving temporarily would most likely have been out of the theater for at least two minutes. After all, most people don't leave during a film. Anyone who did would not want to tell the police about it and thereby become a suspect as well. You say there was a very good chance that being away from the lobby for two minutes wouldn't compromise her story at all.\n                        \n                        Helena: It's still kind of risky, though. What if the manager had come into the projection room early?\n\n                        Benjamin: Then you would get caught in the act of murder, and maybe even kill Serge as well. Serge usually stays in his office, however.\n\n                        You now have two more suspects. You have completed this deduction.\n                        *set suspect5 true\n                        *goto movequest\n                     #She could be lying and creating a false alibi.\n                      Benjamin: What do you mean she could be creating a false alibi? She was at the concession stand the whole time. She even identified the three main suspects!\n                      *goto qqqs\n                     #She could be an accomplice to one of the other suspects.\n                      *goto accompliceno\n                   #Apologize.\n                    You apologize and quickly make up an excuse to leave the projection room for a little while to think.\n                    *goto leave\n             #Blood has been cleaned up here.\n              Benjamin: Blood cleaned up? There's blood all around the victim's head, especially around the mouth. From where was it cleaned up?\n              *choice\n               #There should be blood all over the floor.\n                You say something like, \"Don't you know how bloody it would be to stuff glass down a person's throat? There would be blood spattered everywhere - on the walls, in the corners of the room, all over the victim. Not to mention that the floor is carpeted, so it would be hard to clean.\"\n \n                Benjamin: I'm going to presume that the attacker used sheer strength to keep the victim down, so that only a minimal amount of blood was spattered around the room. I can see how it may look suspicious, however.\n                *goto movequest\n               #Someone cleaned up the movie projector.\n                Benjamin: What do you mean? Blood got on the movie projector? How do you know this?\n\n                You say there is only one way to tell. Benjamin asks another investigator to get some luminol and see if there are any traces of blood on the movie projector. There aren't. You quickly make up an excuse to leave the projector room for a little while to think.\n                *goto leave\n               #The murderer cleaned themselves up.\n                Benjamin: Of course, the murderer probably also wore some thick gloves to avoid cutting his or her hands.\n                *choice\n                 #Did the search reveal anyone in possession of thick gloves or an extra set of clothes?\n                  Benjamin: Actually, yes. Gabrielle and Alan both had fairly thick gloves in their pockets.\n\n                  Alan: I only have them because of the cold weather. Besides, wouldn't my gloves be blood-stained or torn?\n                  *choice\n                   #Yes, they should be. Are they?\n                    Benjamin: No, there are no signs of damage to either pairs of gloves. No extra clothes, nothing.\n                    *choice\n                     #Check for traces of blood on everyone's clothes!\n                      Benjamin: Are you sure? If we don't find anything, then I don't even want to hear any more of your deductions.\n                      *choice\n                       #I'm certain something will come up, Chief.\n                        After some minutes of embarrassment for Alan, James, Gabrielle, and even Serge and Helena, everyone returns to the projection room. Serge is glaring at you.\n \n                        Benjamin: It seems...Serge has traces of blood on his sleeves and on the front of his pants.\n                        *choice\n                         #It's the bleach.\n                          You say to Benjamin that Forensics probably used luminol to find traces of blood. Well, as you thought every detective knew, when luminol comes into contact with bleach, it turns blue, just as it does when coming into contact with blood.\n \n                          Benjamin: Yeah, of course I knew that. But the new Forensics guy wanted to test you. Hah-hah... ..\n\n                          Benjamin: Why do you have bleach all over your clothes, Serge?\n\n                          Serge simply looks at the ground. You decide to intervene. Serge has bleach all over himself because...\n                          *set serge_bleach true\n                          *choice\n                           #He tried to remove the blood from himself after killing Louis.\n                            Benjamin: C'mon, $!{name}, you don't have any proof of that. You can't just say something like that without any proof. \n                            \n                            You don't have any supporting evidence right now, so don't even try. You quickly make up an excuse to leave the projection room for a little while to think. At least you have proved that bleach has gotten on Serge for some reason. This deduction is half finished, try finding out some new facts from another deduction and then come back with a new approach.\n                            *goto leave\n                           #He tried to remove the blood that accidentally got on him after he found Louis.\n                            Benjamin: Is this true, Serge?\n                         \n                            Serge: I never got blood or bleach on me at all today! Your team must have made a mistake!\n\n                            Err, this isn't getting us anywhere. You quickly make up an excuse to leave the projection room for a little while to think. At least you have proved that bleach has gotten on Serge for some reason. This deduction is half finished, try finding out some new facts from other deductions and then come back with a new approach.\n                            *goto leave\n                           #The murderer put the bleach on Serge without him knowing, in an effort to frame Serge.\n                            Benjamin: What? How?\n                            *choice\n                             #How should I know?\n                              Well that was blunt. You quickly make up an excuse to leave the projection room for a little while to think. At least you have proved that bleach has gotten on Serge for some reason. This deduction is half finished, try finding out some new facts from other deductions and then come back with a new approach.\n                              *goto leave\n                             #The murderer poured bleach all over the floor, and it got on Serge when he tripped.\n                              Benjamin: Don't you think the team would have noticed if there were bleach all over the floor? And it's not like the murderer would know that Serge would trip.\n \n                              Oh yeah, you forgot about that. You quickly make up an excuse to leave the projection room for a little while to think. At least you have proved that bleach has gotten on Serge for some reason. This deduction is half finished, try finding out some new facts from other deductions and then come back with a new approach.\n                              *goto leave\n                         #Because Serge is the murderer.\n                          Benjamin: C'mon, $!{name}, I thought you were better than that.\n      \n                          Don't just jump to conclusions, trusted detective. You quickly make up an excuse to leave the projection room for a little while to think.\n                          *goto leave\n                       #Err, actually... maybe not.\n                        This isn't going too well. You quickly make up an excuse to leave the projection room for a little while to think.\n                        *goto leave\n                     #So no torn gloves or extra clothing? Nothing like that? Really?\n                      Benjamin: No, nothing like that. I don't understand what you mean.\n        \n                      Benjamin is right. You quickly make up an excuse to leave the projection room for a little while to think.\n                      *goto leave\n                   #No, not necessarily.\n                    *if hands_bare\n                     You make a very profound observation. If the hands were not cut or bloody, that means there was no struggle. This means that inserting the glass into the victim's throat was done very easily, without necessarily cutting the murderer's hands or gloves.\n\n                     Benjamin: I see! So if there wasn't any struggle, having gloves is irrelevant. But why wasn't there a struggle?\n                     *choice\n                      #The culprit put Louis to sleep.\n                       Benjamin: Put Louis to sleep? What do you mean?\n                       *label yeawjgepweg\n                       \n                       You say that the victim could have used...\n                       *choice\n                        #Sedatives.\n                         Benjamin: What type of sedatives are you talking about? The ones I know of don't make a person unconscious, if that's what you are thinking. At least not quickly.\n                        \n                         It's true. You quickly make up an excuse to leave the projection room for a little while to think.\n                         *goto leave\n                        #Chloroform.\n                         Benjamin: No, that can't be. Since this must have happened less than two hours ago, we would still be able to smell the chloroform. It has a very distinctive odor.\n\n                         Hmm, Forensics probably wouldn't actually look at the lungs to check for chloroform, relying instead on the lingering odor. How could the culprit get away with using chloroform?\n                         *choice\n                          #The bleach is covering up the smell of chloroform.\n                           Benjamin: No, that's not right, $!{name}. The only bleach found anywhere here is on Serge, not near the body. And I doubt it would cover the odor up anyway.\n\n                           Yep. You quickly make up an excuse to leave the projection room for a little while to think.\n                           *goto leave\n                          #The chloroform was used in such a small amount that it would be impossible to notice.\n                           Benjamin: If there was only a very small amount used, then it wouldn't have knocked out the victim.\n\n                           Benjamin is right once again! You quickly make up an excuse to leave the projection room for a little while to think.\n                           *goto leave\n                          #There's a strong smell in this room, making it hard to notice the chloroform.\n                           Benjamin: What? I don't know what you mean.\n \n                           We all probably have not noticed it due to desensitization. But I remember what it is that is keeping us from noticing the odor of chloroform.\n                           *choice\n                            #The smell of exhaust\n                             *label wrong_smell\n                             Benjamin: There is no smell like that in this room. If there was, when I first entered the room I would have smelled it and remembered it right now.\n                          \n                             Try hard to remember. What smell first came to your nose when you entered this room? You quickly make up an excuse to leave the projection room for a little while to think.\n                             *goto leave\n                            #The smell of bleach\n                             *goto wrong_smell\n                            #The smell of blood\n                             *goto wrong_smell\n                            #The smell of sawdust\n                             Benjamin: Oh! I remember that now! There was a very strong sawdusty smell when I first came in this room! I must have gotten used to it and not noticed it anymore. \n\n                             Benjamin: This still doesn't prove anything about the criminal having used chloroform, but we can test for it just in case.\n  \n                             Benjamin asks Forensics to take a look at the area around the lungs to see if chloroform was used on the victim.\n                             *page_break\n                             After a bit of a wait, the results come back positive. Chloroform was indeed used on the victim by someone.\n\n                             You've proved that chloroform has been used in some way on the victim. You've completed this deduction.\n                             *set chloroform true\n                             *goto movequest\n                            #The smell of smoke\n                             *goto wrong_smell\n                        #A lullaby.\n                         You have to be kidding, right? This is serious business here.\n                         *goto yeawjgepweg\n                      #The culprit poisons him.\n                       Benjamin: Don't you think Forensics would have noticed if the victim had been poisoned? And why poison him if you're planning to kill him with glass shards? If I were poisoning someone I intended to kill, I would let the poison do the job, not stuff glass shards down his throat as well.\n \n                       He's right. There should have been some side effects of the poison, and Forensics should have seen it by now. You quickly make up an excuse to leave the projection room for a little while to think.\n                       *goto leave\n                      #The culprit tied Louis down.\n                       Benjamin: There would be rope marks on the body if that happened! And how would Louis have gotten tied up in the first place? It's just not possible.\n                   \n                       Yeah, rope couldn't have been used. You quickly make up an excuse to leave the projection room for a little while to think.\n                       *goto leave\n                      #Who knows?\n                       Then why even bother deducing all this? Eh, we need to think about this some more. You leave the projection room for a little while to think.\n                       *goto leave\n                    *else\n                     Benjamin: Forcing glass shards into a struggling man is hard to do without cutting your hands, or in this case, gloves.\n  \n                     Yeah, that's pretty obvious.. unless you could prove that there was no struggle. Anyway, you should probably come up with a different deduction for that. You quickly make up an excuse to leave the projection room for a little while to think.\n                     *goto leave\n             #The time it took to kill Louis could be shorter than you think.\n              Benjamin: Our team has found that it would take two to five minutes at least for everything to get done. Haven't I explained this to you already? How could it take less than two minutes to get everything done?\n              *choice\n               *if chloroform\n                #You are forgetting that the victim was unconscious due to the chloroform.\n                 *goto chloro\n               #What if the culprit didn't actually clean up after the crime?\n                *if chloroform\n                 *label chloro\n                 You tell Benjamin that, since Louis became unconscious due to the chloroform, the murderer could have pushed in the shards with precision, without blood flying all over the place. This would mean there was no struggle, and it would reduce drastically the amount of time it would take to murder Louis. It could have been done within a minute.\n\n                 Benjamin: A fine deduction! We'll have to change the time frame to about one to five in that case.\n\n                 You've successfully changed the time frame of death. You've completed this deduction.\n                 *set time_frame true\n                 *goto movequest\n                *else \n                 Benjamin: Of course, the criminal cleaned up the crime! It's impossible to stuff glass into a struggling victim without blood going all over the place!\n \n                 Benjamin is correct. You may be able to prove otherwise, however, after solving a different deduction. You quickly make up an excuse to leave the projection room for a little while to think.\n                 *goto leave\n               #What if the culprit killed the victim using only one or two pieces of glass?\n                Benjamin: Same scenario, and also very unlikely. Did you see how many cuts there are in the mouth? Most likely, the attacker used many pieces of differently-shaped glass shards to complete the task. And even if one or two pieces were used, that wouldn't change the time frame.\n\n                Benjamin is right. You quickly make up an excuse to leave the projection room for a little while to think.\n                *goto leave\n             #The time it took to kill Louis is longer than you think.\n              *if time_frame\n               Benjamin: You already proved that the murder could be done in less time! Now you are trying to prove it took longer? What?\n \n               Yeah, what the heck, trusted detective. You quickly make up an excuse to leave the projection room for a little while to think.\n               *goto leave\n              *else \n               Benjamin: Forensics has found that it would take two to five minutes at least for everything to get done. We are just saying it's most likely the murderer would have wanted to finish up quickly, and that stuffing shards into the victim's throat and cleaning up would usually not take more than 5 minutes.\n               *choice\n                #I agree.\n                 Benjamin: Then what are you trying to say?\n \n                 You feel embarrassed in front of your chief. You quickly make up an excuse to leave the projection room for a little while to think.\n                 *goto leave\n                #No, it probably took at least ten minutes.\n                 Benjamin: Why is that?\n                 *choice\n                  #It would have taken a lot longer to clean up the blood.\n                   Benjamin: There was no blood to clean up. Forensics has already confirmed that using several tests.\n \n                   Think before you choose, detective. You quickly make up an excuse to leave the projection room for a little while to think.\n                   *goto leave\n                  #It would have taken a lot longer to hold down the struggling victim.\n                   Benjamin: Considering the attacker had the element of surprise and was also relatively strong, subduing the victim wouldn't have taken more than 30 seconds.\n\n                   It's true. We are assuming that the murderer knew what he or she was doing and was confident in his or her strength here. You quickly make up an excuse to leave the projection room for a little while to think.\n                   *goto leave\n             #There is something suspicious about the body.\n              Benjamin: Oh? And what might that be?\n              *choice\n               #The location of the body.\n                Benjamin: How is the location suspicious? Louis works in here and was obviously killed in here.\n        \n                Benjamin: If Louis was killed someplace else and dragged into the projection room, someone would have seen him. Also, if Louis was killed before the estimated time of death, then his limbs would have stiffened and his body heat would have lowered by the time the police arrived. And then the killer would have had to operate the projector himself as well. There just isn't any way Louis could have been killed anywhere else.\n               \n                He's right. You quickly make up an excuse to leave the projection room for a little while to think.\n                *goto leave\n               #The position of the body.\n                You say that there is something very wrong about how the body looks. But...what is wrong?\n                *choice\n                 #The hands.\n                  Benjamin: His hands are around his neck because he was probably held down or something. What's wrong with that?\n                  *choice\n                   #The hands are a bit too perfect, aren't they?\n                    You tell them exactly why the hands are suspicious. There are no cuts, there's no blood, there's nothing on the hands as a result of a struggle with the culprit. In a homicide, there should always be defensive cuts on the palms or underarms from trying to escape the attacker. Since there were multiple pieces of glass, it just makes it even more suspicious that the hands were unscathed.\n\n                    Why would the hands be around the neck? There are no signs of strangulation. There must be something we are missing.\n              \n                    Benjamin: I see your point. I'll have to tell the team to investigate this further. Hmm, it makes me wonder about the blood and purpose of glass.\n\n                    You've proved that there is something odd about the placement of the victim's hands. You've completed this deduction.\n\n                    Maybe you should try to complete your deduction about the cleaned up blood now.\n                    *set hands_bare true\n                    *goto movequest\n                   #The placement of his hands are off.\n                    Benjamin: What, do you think the culprit moved his hands to his neck? Do you think his hands should have been on his mouth? Even if either of those things happened, it isn't really important.\n \n                    Benjamin is right once again. You quickly make up an excuse to leave the projection room for a little while to think.\n                    *goto leave\n                 #The legs.\n                  Benjamin: The legs aren't cut, they are just sticking straight out. I always stick my legs out while I am lying down. There isn't anything weird about it. \n                  *fake_choice\n                   #But he wasn't lying down relaxing, he was being murdered!\n                   #But usually you would try to kick the attacker.\n                  No, that doesn't make any sense. You quickly make up an excuse to leave the projection room for a little while to think.\n                  *goto leave\n                 #The mouth.\n                  Benjamin: What's suspicious about the mouth? Sure, that's where he got cut up, but I don't see anything strange about it...\n                  *fake_choice\n                   #Those glass shards look awfully suspicious.\n                   #Well, don't dead bodies always seem kind of strange?\n                  You obviously have no idea what you are talking about. You quickly make up an excuse to leave the projection room for a little while to think.\n                  *goto leave\n             #There is something we are missing about how the glass weapons were used.\n              Benjamin: They were the weapons the murderer used to kill the victim, what other purpose are you talking about?\n              *choice\n               #The shards were cleaned up.\n                Benjamin: We are assuming that the pieces of glass were very small, enough so that you could fit them all in the throat of the victim. Do you mean that some glass shards fell out of the mouth and landed on the floor somewhere?\n                *choice\n                 #Don't you find it strange that none of the glass shards are around the victim or on the floor?\n                  Benjamin: We have already discussed this. The shards were tiny enough that all of them could fit in the throat. Obviously the attacker spent some time cleaning up, collecting any shards that fell out, and forcing them back into the dead body.\n                  *choice\n                   #But why didn't the murderer just leave the glass shards on the floor?\n                    Benjamin: Maybe he thought we wouldn't know what the murder weapon was? Either way, what does it matter?\n \n                    Perhaps you are thinking of something here, but I have no idea. You quickly make up an excuse to leave the projection room for a little while to think.\n                    *goto leave\n                   #Okay, I give up.\n                    It's okay, both options lead to this path anyway. You quickly make up an excuse to leave the projection room for a little while to think.\n                    *goto leave\n                 #Perhaps Serge never told you this but...\n                  You tell Benjamin that, when Serge found the deceased, he fell over and cut his arm on a clean piece of glass. So there was only one piece of glass left on the ground, the one piece that ended up scraping Serge and being thrown away? Seems pretty strange.\n\n                  Benjamin: I never heard about this! Why didn't you tell us, Serge?\n     \n                  Serge: It was just a piece of glass. How would I to know that it was important?\n\n                  Benjamin: Eh, I guess it's fine. I doubt it has any big impact to the case. What do you find strange about it, $!{name}?\n                  *choice\n                   #There must be a relationship between the killer and Serge.\n                    Benjamin: How so?\n \n                    You say that disposing of the only shard outside the victim's mouth is a very odd coincidence. Perhaps there was something on that glass that he didn't want seen?\n\n                    Benjamin: Like what?\n                    *choice\n                     #Blood\n                      Benjamin: Blood? Whose blood?\n                      *choice \n                       #His own blood\n                        You say that his blood would be found on the glass because he scraped his arm on the glass.\n\n                        Benjamin: Why would that matter? The police would understand.\n \n                        Not necessarily, you reply. And this is because..\n                        *choice\n                         #The color of the blood\n                          *goto bloodaw\n                         #The texture of the blood\n                          *label bloodaw\n                          You tell them what really happened. He had to dispose of the glass because his blood on it had started to dry up. The Forensics team would have noticed this immediately. If this is true, that would mean that Serge had to have been at the scene of the crime long before he said he was, ruining his alibi.\n\n                          You say that we can get the glass and have it examined make sure. Benjamin agrees.\n                          *page_break\n                          The blood has dried, but this could also be due to what it has come in contact with while in the garbage can it was found in. You can't use it as evidence.\n\n                          Benjamin: Darn, I thought we had a good lead there for a second. But it still increases suspicion about you, Serge.\n \n                          Serge: I have nothing to do with this, so you better not be accusing me of murder!\n\n                          You've successfully raised suspicions on Serge and have told the police about the strange piece of glass that scraped Serge. You've completed this deduction.\n                          *set serge_blood true\n                          *goto movequest\n                         #The shape of the blood\n                          Benjamin: The shape of the blood? Umm, it would just be on the glass where it scraped his arm, wouldn't it?\n \n                          It would be. There's one more mistake in your career. You quickly make up an excuse to leave the projection room for a little while to think.\n                          *goto leave\n                       #The victim's blood\n                        Benjamin: If the victim's blood was on it, I don't see why he would be afraid. The police wouldn't suspect him because he accidentally fell on it. Nothing wrong there.\n \n                        I kind of see what you were going for... actually, I have no idea. You quickly make up an excuse to leave the projection room for a little while to think.\n                        *goto leave\n                       #The murderer's blood\n                        Benjamin: The murderer's blood wouldn't be found on the glass. We already know this because none of the suspects have cuts on their hands or arms.\n\n                        I kind of see what you were going for... but not really. You quickly make up an excuse to leave the projection room for a little while to think.\n                        *goto leave\n                     #Fingerprints\n                      You say that he didn't want his fingerprints to be seen on the glass that he tripped over, so he threw it away.\n\n                      Benjamin glares at you.\n\n                      Benjamin: He scraped his arm on the glass, meaning no fingerprints got on it. Besides, he could simply wipe it off or something. And even if the glass with his fingerprints were found, he could tell the police and not be the object of any greater suspicion because he had found the body.\n\n                      I guess you have the wrong answer. You quickly make up an excuse to leave the projection room for a little while to think.\n                      *goto leave\n                   #I just thought it was worth knowing.\n                    Benjamin: Uh huh... okay. Well, carry on then.\n                    *goto movequest\n               #The shards were only to fool us.\n                Benjamin
