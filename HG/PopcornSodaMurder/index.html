<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Popcorn, Soda ... Murder? — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "PopcornSodaMurder", "title": "Popcorn, Soda ... Murder?", "scenes": {"choicescript_description": "Can you find all the clues at the murder scene and piece together who must have done it and how?\n\n[i]Popcorn, Soda ... Murder?[/i] is a thrilling 23,000-word interactive murder mystery novel by Pauzle. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n\n  Remove in-game advertisements and delay timers.\n\n  *purchase adfree $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n\n  Remove in-game advertisements and delay timers.\n", "examination": "*reset", "identification": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n*if choice_randomtest\n  *goto thanksforplaying\n\nYou tell everyone that you have solved the case.\n\nBenjamin: Yes, I think I have a good idea about what happened as well.\n*label restart\n*page_break\n\nListen, trusted detective. You'll have to give a spotless deduction to solve the crime here. You make one mistake and it's all over, and what I mean by that is you'll have to restart this whole scene.\n\nBenjamin: Let's start at the very beginning.\n \nThe true killer entered the projection room...\n*choice\n #Before 2:55 PM\n  The killer must have entered the projection room before 2:55 PM because...\n  *choice\n   #Of what you saw in the theater\n    You remember that sometime during the middle of the film the screen went completely white, then changed to black, and the movie continued after that.\n\n   \n    This is a sign that the projectionist failed to see the cue to make the switch in film reels during the movie. This must be the case because the projector is a two-reel system.\n\n    Louis has worked at this theater for over a year, so it would be very hard to imagine him missing the cue to switch film reels...unless something unexpected came up, like a stranger coming in. Or he may have died before the switch.\n\n    When the killer first entered the room, he or she probably walked up to Louis and spoke gently, in order not to worry Louis or start a fight or struggle. In the midst of this misleading conversation, the true killer...\n    *choice\n     #Forced glass into Louis's throat\n      No, that doesn't make any sense.\n      *goto restart\n     #Took out a cloth soaked in chloroform\n      As we already figured out, the killer must have used chloroform to temporarily knock out the victim before he or she...\n      *choice\n       #Killed Louis using glass shards\n        Yes, the murder weapon was indeed the glass shards. The body was not just spread out flat on the floor as it would have been after Louis collapsed from the chloroform, however. The killer moved the deceased's hands up to his neck to indicate a struggle. The killer most likely obtained the glass shards from...\n        *choice\n         #The bathroom\n          Where in the bathroom?\n          *choice\n           #From glass stored in the air vent.\n            No, that doesn't make any sense.\n            *goto restart\n           #From the mirror.\n            Yes, you recall Serge talking about a mirror in the bathroom having been found broken about three hours earlier. The killer must have been in the theater and broken the glass well before the murder, so that the bathroom occurrence would appear to be unrelated. The janitor probably didn't notice that after cleaning up all the mirror fragments some were still mysteriously present after the murder.\n          \n            Benjamin: I expect that $!{name} is right, but get Forensics to make sure that the shards did indeed come from the mirror.\n            *page_break\n            Results came back positive. \n\n            The murderer probably killed Louis and then realized that the projector was running out of film, so the killer quickly made the switch. But it wasn't done in time, which led you to the current scenario.\n\n            Okay, so we know when the killer entered, what the killer did, and how the killer did it... but something unexpected happened during the murder, and that was..\n            *choice\n             #Serge entering the room\n              Yes, Serge entered the room at 2:56. This is probably exactly the time when the killer was trying the leave the crime scene. The killer thought quickly and...\n              *choice\n               #Took an extra piece of glass, stabbed Serge in the arm, pushed him down, and ran into the men's bathroom, in that order.\n                Indeed, Serge went into the room and was surprised to find Louis dead and his killer right beside him. But Serge can't identify the killer because...\n                *choice\n                 #Of the sawdust\n                  No, that doesn't make any sense.\n                  *goto restart          \n                 #Of the surprise attack\n                  No, that doesn't make any sense.\n                  *goto restart         \n                 #Of the lights\n                  Yes, the projection room was pitch black in order to project the film correctly. \n\n                  Serge was attacked and fell to the floor, but he saw the killer escape into the men's bathroom.\n\n                  Because Serge walked slowly and silently, the killer had enough time to throw away the remaining piece of glass in the bathroom. The police might not immediately connect a glass shard in the bathroom garbage to the crime because of the broken mirror found in the bathroom earlier that day. Then the killer...\n                  *choice\n                   #Put bleach on the floor\n                    This is incorrect; the janitor had cleaned the bathroom with bleach after finding the broken mirror hours earlier.\n                    *goto restart\n                   #Threw away the cloth with chloroform\n                    Since the police haven't found any item containing traces of chloroform, the killer must have thrown it away in the...\n                    *choice\n                     #Garbage\n                      No, the police thoroughly searched the theater, and the garbage would be the first place to look. It obviously wasn't in there.\n                      *goto restart\n                     #Toilet\n                      Benjamin shouts for the team to check the toilet tanks, looking for anything like a cloth that could have been used to knock out Louis.\n                      *page_break\n                      The team finds a towel that does not belong to the theater. After forensic examination, that towel is found to have been in contact with chloroform.\n         \n                      After throwing away the towel and the mirror shards, the killer hid behind the inward-opening door ready to escape, when Serge walked toward the stalls.\n \n                      To avoid leaving fingerprints on the mirror fragments left behind, the killer had to...\n                      *choice\n                       #Always hold the glass on the sharp edges\n                        That would be impossible to do without getting cut, especially while inserting them into the victim's throat and holding them all while going from the bathroom to the projection room.\n                        *goto restart\n                       #Wear gloves\n                        Yes, there is no other way to commit this crime without leaving fingerprints on the mirror fragments. After leaving the bathroom, the killer...\n                        *choice\n                         #Ran into the women's bathroom\n                          No, that doesn't make any sense.\n                          *goto restart\n                         #Walked back into the theater\n                          You've got everything figured out. Here is the final choice. No restarting, if you mess up it means you have to restart the game from the very beginning. Additionally, you will now be exposing the presumed killer through dramatic statements, so be prepared to speak in the first person.\n\n                          The murderer of Louis Lawrence is...\n                          *choice \n                           #Gabrielle\n                            Okay, you have decided who the murderer is, but how do you go about exposing her?\n                            *choice\n                             #Out in the open, so she can't run away.\n                              $!{name}: Gabrielle, you killed Louis Lawrence!\n\n                              Gabrielle: Huh? But that can't be right! I never did a thing to Louis, I don't even know him!\n\n                              It's time to end this case. Continue accusing Gabrielle until she finally breaks down!\n                              *label gabbycomeon           \n                   \n                              $!{name}: Gabrielle, you are the only person who could have killed Louis. I have many facts to back up my accusation. First...\n                              *fake_choice\n                               #You went around the back hallway to get to the projection room without Helena spotting you.\n                               #You didn't actually use the women's bathroom.\n                              \n                              $!{name}: You spent your four minutes wisely, going in the direction of the women's bathroom to create a false alibi with Helena. But in actuality, you went around the back hallway to the projection room, completely bypassing the women's bathroom, in order to kill Louis!\n\n                              Gabrielle: How could you say such complete lies...\n\n                              $!{name}: I'm just trying to expose the truth. Now, as for the bathroom...\n                              *fake_choice\n                               #You entered it twice.\n                               #You purposefully went into the men's bathroom to trick us.\n\n                              $!{name}: Yes, the men's bathroom is right next to the projection room. You easily entered the men's bathroom unseen. There was only one movie running. We also assumed that, being a woman, you wouldn't enter it, which was all part of your plan. You entered it first to get the glass and then a second time due to the unexpected encounter with Serge.\n\n                              Gabrielle: No, your evidence is all circumstantial! You can't really... not when I never did anything wrong...\n\n                              $!{name}: We have a definitive list of suspects, the rest of whom are no longer under suspicion. So your guilt is clearly confirmed by process of elimination.\n                              *page_break End.\n                              Benjamin quickly accepts your deduction as fact. He considers you to be a very reliable detective. Gabrielle is sentenced to life in prison, and everyone else goes home.\n                              *page_break End?\n                              It's too bad though, since Gabrielle wasn't really the murderer...and now the true culprit will never be found guilty. Game Over.\n                              *goto thanksforplaying                                \n\n                             #Tell Benjamin that you would like to speak with each suspect separately. \n                              Benjamin agrees, allowing you to interview each suspect privately in Serge's comfortable office, which has thick walls to prevent eavesdropping.\n                              \n                              What Benjamin doesn't know is that all you really want to do is speak to Gabrielle alone. You casually speak with all the other suspects, until Gabrielle comes in and takes a seat.\n\n                              What do you wish to say?\n                              *choice\n                               #I know you're the murderer. Confess, and the charge may be lessened.\n                                *label guaca\n\n                                Gabrielle: No! I'm not the murderer! How could you think that?\n\n                                It's pretty apparent that Gabrielle isn't going to crack. You're going to have to do this the more painful way. Everyone goes back to the projection room.\n                                *goto gabbycomeon\n                               #Who do you think the murderer is, Gabrielle?\n                                Gabrielle: Serge, perhaps? He seems to be making a lot of stuff up.\n                                *choice\n                                 #Argue\n                                  $!{name}: Trying to pin other people for the crime you committed, huh? That's just sad.\n                                  *goto guaca\n                                 #Stay calm\n                                  *goto gabbyiscalm\n                               #I have a hunch that you're the murderer. Tell me exactly what you have done today.\n                                *label gabbyiscalm\n                                $!{name}: What exactly have you done today?\n\n                                Gabrielle: I bought a movie ticket and a large soda and popcorn. Then I waited for a few minutes in the theater for the movie to start. At some time during the movie, however, I really needed to go to the bathroom. So I left my seat, went to the bathroom, and came straight back.\n\n                                $!{name}: I bet you think you are pretty clever, coming up with that load of nonsense, when in fact you are the murderer.\n                                *goto guaca\n                             #Have an intermission. You have some things to say to Benjamin in private before you go accusing Gabrielle of murder.\n                              You tell all the suspects to wait in the lobby while you and Benjamin have a quick discussion.\n\n                              Benjamin: What is it, $!{name}? Have you figured out who the culprit is?\n \n                              $!{name}: Yes, I have. It's Gabrielle, definitely Gabrielle.\n\n                              Benjamin: I trust your judgment. If you are completely certain, let's tell everyone else go home and have a good, long talk with Gabrielle.\n                              *page_break\n                              Gabrielle comes back into the projection room. \n\n                              $!{name}: I know you are the murderer, Gabrielle.\n                              *goto guaca\n                           #James\n                            *if james_gone\n                             Benjamin: We already discussed this before, and James has left the theater. Try again, but this time you better be serious.\n\n                             You got lucky, you have one more chance.\n                             *goto restart\n                            *else\n                             Okay, you have decided who the murderer is, but how do you go about exposing him?\n                             *choice\n                              #Out in the open, so he can't run away.\n                               $!{name}: James, you killed Louis Lawrence!\n\n                               James: Wha-- You can't be serious!\n\n                               It's time to end this case. Continue to accuse James until he finally breaks down!\n                               *label jamescomeon\n\n                               $!{name}: James, you are the only person who could have killed Louis. I have many facts to back up my claim. First...\n                               *choice\n                                #Your thirty seconds outside was only to fool us!\n                                 $!{name}: You left the theater on purpose so Helena would see you, just in case something happened and you became a suspect after killing Louis. How did you kill Louis then, you may ask? It's simple.\n                                 *label awefwef\n                                 *fake_choice\n                                  #Climbed through the movie projector window.\n                                   $!{name}: James, you are very strong but also very skinny. Someone like you could squeeze through the movie projector window in the theater. This could have caused that strange flash of light I witnessed during the movie. I must not have noticed the other flashes you caused while executing your elaborate murder plot.\n\n                                  #Chloroform allowed you to return to the projection room later.\n\n                                 $!{name}: You first used chloroform to knock out Louis. You then left through the movie projector window and created a false alibi with Helena. After that you went back to the projection room and from there into the bathroom to get the mirror fragments. Then you returned to the projection room to carefully kill Louis.\n\n                                 James: That's absurd! All of this is circumstantial! You can't possibly... not when I have so much more to do with my life...\n\n                                 $!{name}: We have a definitive list of suspects, the rest of whom are no longer under suspicion. So your guilt is clearly confirmed by process of elimination.\n                                 *page_break End.\n                                 Benjamin quickly accepts your deduction as fact. He considers you to be a very reliable detective. James is sentenced to a life in prison and everyone else goes home.\n                                 *page_break End?\n                                 It's too bad, though, since James wasn't really the murderer...and now the true culprit will never be found guilty. Game Over.\n                                 *goto thanksforplaying\n                                #That phone call was fake!\n                                 $!{name}: You didn't leave the theater because your phone rang. You left the theater to get an alibi from Helena just in case something happened and you became a suspect after killing Louis. How did you kill Louis then, you may ask? It's simple.\n                                 *goto awefwef\n                              #Tell Benjamin that you would like to speak to each of the suspects separately. \n                               Benjamin agrees, allowing you to interview each suspect privately in Serge's comfortable office, which has thick walls to prevent eavesdropping.\n\n                               What Benjamin doesn't know is that all you really want to do is speak to James. You casually speak with all the other suspects until James comes in and takes a seat.\n\n                               What do you wish to say?\n                               *choice\n                                #I know you're the murderer. Confess, and the charge may be lessened.\n                                 *label nonononononm\n\n                                 James: Wha--? I'm not the murderer! How could you think that!\n\n                                 It's pretty apparent that James isn't going to crack. You're going to have to do this the more painful way. Everyone goes back to the projection room.\n                                 *goto jamescomeon\n                                #Who do you think the murderer is, James?\n                                 James: I don't know, maybe Serge? He seems to be making stuff up on the fly.\n                                 *choice\n                                  #Argue\n                                   $!{name}: Trying to pin other people for your crime, huh? That's just sad.\n                                   *goto nonononononm\n                                  #Stay calm\n                                   *goto jamesiscalm\n                                #I have a hunch that you're the murderer. Tell me exactly what you have done today.\n                                 *label jamesiscalm\n                                 $!{name}: What exactly have you done today?\n\n                                 James: I bought a movie ticket and waited a few minutes in the theater for the movie to start. At some time during the movie, however, my phone rang and I exited the theater to answer, not wanting to disturb anyone. It was the wrong number, so I hung up and went back inside.\n\n                                 $!{name}: I bet you think you are pretty clever, coming up with that load of nonsense, when in fact you are the murderer.\n                                 *goto nonononononm\n                              #Have an intermission. You have some things to say to Benjamin in private before you go accusing James of murder.\n                               You tell all the suspects to wait in the lobby while you and Benjamin have a quick discussion.\n\n                               Benjamin: What is it, $!{name}? Have you figured out who the culprit is?\n \n                               $!{name}: Yes, I have. It's James, definitely James.\n\n                               Benjamin: I trust your judgment. If you are completely certain, let's tell everyone else go home and have a good, long talk with James.\n                               *page_break\n                               James comes back into the projection room. \n\n                               $!{name}: I know you are the murderer, James.\n                               *goto nonononononm\n                           #Alan\n                            Okay, you have decided who the murderer is, but how do you go about exposing him?\n                            *choice\n                             #Out in the open, so he can't run away.\n                              $!{name}: Alan, you killed Louis Lawrence!\n\n                              Alan: ...What? I don't even know the guy!\n\n                              It's time to end this case. Continue accusing Alan until he finally breaks down!\n                              *label Alancomeon           \n                   \n                              $!{name}: Alan, you are the only person who could have killed Louis. I have many facts to back up my claim. One being...\n                              *fake_choice\n                               #You went to the men's bathroom, which is right next to the projection room.\n                                $!{name}: You had the perfect time frame to commit the murder, and the projection room is right next to the men's bathroom. It all adds up.\n\n                               #You had gloves to prevent fingerprints.\n                                Alan: So did Gabrielle!\n                                \n                                $!{name}: Yes, but Gabrielle would need to have gone to the men's bathroom twice today, which would have been nearly impossible. She would have needed to travel all the way around the back hallway and back in order to avoid being spotted by Helena.\n\n                              $!{name}: We have a definitive list of suspects. Serge is innocent, based upon our interrogation. James was only outside for thirty seconds, not long enough to commit the crime. Gabrielle would need to have entered the men's bathroom unseen two times, and also travel through the back hallway, commit the crime, and come back through the hallway within four minutes. Helena gave us information on all the suspects and never left the concession stand. All are innocent except you.\n                              *page_break\n                              $!{name}: In conclusion, Alan had to go into the men's bathroom before attempting the murder to make sure nobody was already inside. He had to dispose of the chloroform towel. He had thick gloves in order to prevent fingerprints. Of course, a minute is still an awfully short time for you to commit the murder, but who said Helena had a perfect sense of time? She didn't have a watch or anything, after all. What do you have to say for yourself, Alan?\n\n                              Alan: It was suicide.\n                              *page_break\n                              Alan: I didn't want to say this before, but I actually knew Louis. Louis and I were friends for a long time, until he lost his job as the production manager for \"The Prince and the God.\"\n\n                              Alan: You see, I was unit manager for the film, and since the director decided he wanted his son to take over that job, he moved me to the lower-level production manager position and simply fired Louis.\n\n                              Alan: Louis had to look for a new job, and he ended up here. I thought we were still friends, and he even offered me a free ticket to \"The Prince and the God\" today. He called me in about halfway through the film, saying that it is really a cool experience to see the movie from the projection room. I happily agreed...only to find him about to commit suicide.\n                              *page_break\n                              Alan: He said that, because of how I had caused him to lose his job, he was going to kill himself but make it look like I had murdered him! He took out a towel and wrote my name on it with a washable marker, then dropped the towel on the floor. After that he took a pile of broken glass and painfully pushed it into his mouth. I just stood there, devastated.\n\n                              Alan: Of course, the projection room was very dark at the time. I could make out that it was Louis inside, but I was only able to see my name on the towel after walking up and staring closely at it.\n\n                              Alan: After all this, I knew I was in trouble. So I picked up the remaining glass and the towel, and I was going to run to the bathroom and dispose of them before I got caught. That's all I did to tamper with the scene. After that, Serge entered the room.\n\n                              Alan: I used a piece of glass to slash his arm, ran to the bathroom, put all the shattered glass in the garbage near the broken mirror, and then hid the towel in a toilet tank. When Serge entered, I waited for him to go to the stalls and then I ran out. I had no idea that the towel had chloroform on it. That was all part of Louis's plan to frame me for his murder.\n\n                              Benjamin: How do we know you are telling the truth?\n \n                              Alan: Both Louis's and my fingerprints should be on the glass that I put in the bathroom garbage. I still have a piece that I somehow forgot to throw out. It's a bit bigger than all the other pieces, so you should be able to test it and prove that both of our fingerprints are on it. If I had killed Louis after knocking him out with chloroform then his fingerprints shouldn't be on it.\n\n                              Benjamin: Hmm, this is troubling. If what Alan says is true, you can't blame him for trying to destroy the evidence or not saying anything about how his former friend tried to commit suicide.\n                              *page_break\n                              *label gogogol\n\n                              Alan showed the forensics team the glass, and the results came back positive; both Louis's and Alan's fingerprints were on it. Also, it was confirmed that Alan and Louis had indeed worked together on the film and Louis had been fired.\n\n                              There are a few inconsistencies in Alan's statement. Alan isn't off the hook just yet! All we would need to assume is that he purposely pressed Louis's finger on the glass and was ready to use that as fake evidence if he was ever accused.\n                              \n                              You only need to find one error in Alan's statement in order to prove him wrong, and everything is downhill for Alan after that. Just remember, if you think you've found the error, then you have to be able to prove its falsehood. What is one thing Alan is lying about?\n                              *label peng\n                              *choice\n                               #The time when Louis called Alan into the projection room.\n                                $!{name}: You are lying about when Louis called you into the projection room.\n\n                                Alan: Why do you say that? I said about halfway through. That fits within the time frame, as I recall.\n\n                                $!{name}: No... what I meant was that...\n\n                                Benjamin: I'm sorry, but personally I believe Alan is telling the truth. It was a suicide.\n                                *label thend\n                                *page_break End?\n                                That's the end of the case. Alan was found innocent, and the case was closed as a suicide. Nobody ever found out the truth, that Alan was in fact the real culprit all along. Game Over.\n                                *goto thanksforplaying                                \n                               #The size of the glass.\n                                $!{name}: I find it very suspicious that the only piece of glass you forgot to throw out happens to be the biggest one.\n                                *label interr\n\n                                Benjamin: I hate to interrupt, but we need proof that Alan is lying. We cannot do anything with guesses or probabilities. I'm afraid I must conclude that this was a suicide.\n                                *goto thend\n                               #The relationship between Alan and Louis.\n                                $!{name}: After Louis was fired, the movie wasn't finished for quite some time. Also, you had nothing to do with the change of positions. It seems like you and Louis had a very strange relationship. You first said that you were friends, but now you are saying that he wanted to frame you as his murderer.\n\n                                Benjamin: I'm sorry, but this doesn't prove anything. We can't arrest Alan just because he used to be friendly with the victim. I must conclude that this was a suicide.\n                                *goto thend\n                               #Louis calling Alan to the projection room.\n                                $!{name}: Tell me, Alan, how did Louis notify you to come to the projection room halfway during the movie?\n\n                                Alan: You know that the projectionist only really needs to be in the projection room to operate the film at the beginning, the middle, and the end of the movie. You need to start the film, switch reels, and then end the movie. Well, when Louis wasn't busy operating the film, he left the projection room for a minute or two to enter the theater and tell me to go back with him to the projection room.\n\n                                Benjamin: I don't see anything wrong with this, $!{name}. Are you sure this is an error?\n                                *choice\n                                 #Yes\n                                  Benjamin: So what is wrong with it?\n                                  *choice\n                                   #It was the middle of the movie, so Louis would have had to stay in the projection room to change the reels.\n                                    Benjamin: Thinking about everything together, if Louis had good time management skills, he could have gone and talked to Alan with about a minute to spare. Sure, it would be risky for him, but it isn't impossible.\n \n                                    Benjamin: This means there are no errors, correct? I'm sorry, but I must conclude that Louis committed suicide.\n                                    *goto thend\n                                   #Helena would have seen him.\n                                    Helena: Yeah, as I said before, I watched the lobby closely the whole time. Louis never came out of the projection room.\n\n                                    $!{name}: I guess that alone is reason enough to say that Alan is lying. Wouldn't you agree, Benjamin?\n  \n                                    Benjamin: I...I don't know. What do you have to say for yourself, Alan?\n   \n                                    Alan: I'm sorry, I forgot how things went! When Louis gave me the ticket, he told me to come up to the projection room about halfway through the movie. I guess I just got a bit confused.\n \n                                    Awfully suspicious, but you still can't just arrest him. You're going to have to expose something that he can't possibly explain.\n                                    *page_break\n                                    You have to think of something, a crucial piece of evidence that everyone else has forgotten about.\n                                    *choice\n                                     #The mirror before it broke\n                                      *goto retq\n                                     #The film reels that would get changed\n                                      *label filmyes\n                                      $!{name}: Can you please repeat what you previously said, Alan? About what you did right after Louis committed suicide?\n                                      \n                                      Alan: Look, I'm not lying anymore. All I did was walk slowly up to him, see that the towel did in fact have my name on it, pick up the towel and extra glass pieces from off the floor, run into Serge, cut his arm, and run into the bathroom, in that order. That's it.\n                                      *page_break\n                                      $!{name}: Then we should both realize here that you never switched film reels during the middle of the movie. But if you didn't, then who made the switch and enabled the movie to continue?\n\n                                      Alan: Wha---\n\n                                      Alan: I... I don't know! I stand by what I said so...maybe someone else touched it?\n\n                                      $!{name}: Like who? The victim?\n\n                                      Alan: Maybe the switch happened a bit earlier this time, so Louis could fool us?\n\n                                      $!{name}: You're hiding something about the switch in film reels, Alan! Benjamin, we need to take a closer look at the reels!\n                                      *page_break\n                                      At first glance, it appears to be a normal two-reel system projector, two projectors with two film reels in a single machine. Louis would have looked for cue marks to tell when to switch the film reels during the middle of the movie.\n\n                                      Benjamin tells the crew to crack open the projector and look inside to see if anything's amiss.\n                                      *page_break\n                                      It appears that someone has been fiddling with this projector. The part that projects the first half of the movie has been modified to act just like the more modern single-reel system projectors, and the part that projects the second half of the movie has been broken and doesn't work.\n\n                                      This means that \"The Prince and the God\" was running on a modified single-reel projector. There would be no need to switch the reels. The flash that was seen was probably just a technical glitch from someone having meddled with the machine.\n\n                                      Louis must have done this, since he is experienced with movie projectors and would have had to start the movie and plan everything out. The question is why he did this.\n                                      *page_break\n                                      Another thing we've discovered is that the first reel has been lengthened to include both parts of the movie. This is so the film continues through from the first part to the second part on a single reel. The weird part is that the second reel, which was not shown, also looks like it has some scenes from \"The Prince and the God.\" \n\n                                      Benjamin decides to play the second reel on the projector.\n                                      *page_break\n                                      It looks like someone recorded the cast shooting a scene from the movie. The actors are interrupted by a person, most likely the director, who advices them about how to perform the scene. It doesn't seem very significant until three more people show up on the set, talking amongst themselves.\n\n                                      Two of those people are Louis and Alan. It seems like they are just discussing the film until...Louis speaks to the third person. It's kind of hard to hear, but it seems to be something about job availability. Alan then seems to get really mad, and the director intervenes.\n\n                                      It seems the director is really angry at Alan. Alan ends up walking slowly away from the group, looking very sad. The reel then cuts to what appears to be the director's office. According to the date at the bottom left, five months have elapsed. Louis and the director are talking, and Louis signs a paper. Louis then yells clearly, \"This is for you, Alan! I hope it makes everything better!\". He holds up the paper he just signed and it has Alan's name on it.\n\n                                      That's the end of the film reel.\n                                      *page_break\n                                      Alan: I...I confess. Don't ask me why. I just realized now that I have to tell everyone the truth. I killed Louis and regret everything that I did.\n\n                                      Benjamin: I'm surprised, Alan. Why is it that, a few minutes ago, you said you were innocent, and now it's the complete opposite?\n\n                                      Alan: I said don't ask me why, didn't I?\n\n                                      Benjamin: Yes, I suppose you did.\n                                      *page_break\n                                      Alan gets arrested and leaves with the police, heading to jail. You and Benjamin walk together outside the theater.\n\n                                      Benjamin: Great work today, $!{name}, but I can't understand why Alan did it.\n\n                                      You say that you have a pretty good idea why.\n                                      *choice\n                                       #It's the film reel that was discovered at the end that holds the answer.\n                                        Benjamin: But... what about it?\n                                    \n                                        You decide to break it down for Benjamin.\n                                        *choice\n                                         #Louis got fired.\n                                          Benjamin: But Alan wouldn't want to kill Louis because of that, I would think it would be the other way around.\n                                          *label motiveno\n\n                                          Benjamin: Hmm, I guess you know as much about Alan's motive as I do, $!{name}. \n\n                                          Benjamin: Well, I'll see you later...Oh, by the way, expect an increase in pay soon, trusted detective.\n                                          *goto thanksforplaying\n                                         #Alan lied. It was Alan who actually got fired.\n                                          Benjamin: Ah, from looking back at what we saw on the second reel, I know what you mean. But still, how is that Louis's fault?\n                                          *choice\n                                           #Louis told the third person, probably the director's son, to take Alan's spot as unit manager.\n                                            Benjamin: But the director's son would have taken the top spot. Shouldn't this have dropped Alan to the lower-level production manager spot and forced Louis out?\n                                            *choice\n                                             #Production manager is actually a higher title than unit manager. Alan was lying about that.\n                                              Benjamin: Really? I didn't know that...I guess that explains Alan's motive, but why did he confess right after that?\n                                              *choice\n                                               #Louis felt guilty, so he arranged for Alan's name to be displayed in the credits in place of his own.\n                                                Benjamin: Oh, I get it! That's what Louis meant when he yelled at the end of the second reel! Louis probably gave Alan a free ticket so that he would watch the film and see his name in the credits where Louis's name should have been.\n \n                                                Benjamin: Louis probably wanted to surprise Alan with the second half of the film reel that recorded when he switched his name for Alan's name. This also changed the files so it seemed like Louis got fired instead of Alan.\n\n                                                Benjamin: Louis most likely changed the two reel system for the single reel system simply because it is more modern and he doesn't have to always watch for the cue marks.\n\n                                                Benjamin: Alan didn't know that Louis had been sorry and had put Alan's name in the credits until we showed him the second reel. Then Alan must have been overwhelmed by remorse. That's the reason he immediately gave himself up.\n\n                                                Benjamin: Thanks, $!{name}, you continue to amaze me with your impressive deductive abilities.\n                                                *page_break The End\n                                                Benjamin: You know, $!{name}, I've been in this police department for a long time. I think it's time for me to retire, but I still have not decided who should take over for me.\n \n                                                Benjamin: How would you like to be the new Chief of the Greenvale Police Department?\n                                                *choice\n                                                 #Yes\n                                                  Benjamin: Thanks, it really means a lot to me to know that a smart detective like you will be taking care of the Department. I hope to see you again soon. Goodbye and good luck.\n                                                  *goto thanksforplaying\n                                                 #No\n                                                  Benjamin: I understand, it's a lot of work being in charge of a big police department. You will definitely have more freedom remaining in your current position. I'll be sure to increase your pay by quite a lot before I hand over my position to some other good friend. I hope to see you again sometime, $!{name}.\n                                                  *goto thanksforplaying\n                                               #Alan realized that the evidence is stacked against him and confesses, hoping to get a lighter sentence.\n                                                Benjamin: I have serious doubts about the actual motivation behind Alan's confession...It seems we may never know what Alan was really thinking.\n            \n                                                Benjamin: Well, I'll see you later...Oh, by the way, expect an increase in pay soon, trusted detective.\n                                                *goto thanksforplaying                                               \n                                             #Louis probably got a promotion before the director's son got the job.\n                                              Benjamin: Hah! You're making all this up as you go!\n                                              *goto motiveno\n                                           #In the second reel, Louis was probably signing Alan's resignation letter on Alan's behalf.\n                                            Benjamin: But Alan had been fired about five months before that, according to the date displayed in the film.\n                                            *goto motiveno\n                                     #The glass fragments\n                                      *goto retq\n                                     #The smell of sawdust\n                                      *goto retq\n                                     #The bottle of bleach\n                                      *goto retq\n                                     #Louis's scream\n                                      *goto retq\n                                     #The glass that cut Serge\n                                      *goto retq\n                                     #The bleach on the bathroom floor\n                                      *goto retq\n                                     #The washable marker\n                                      *goto retq\n                                     #The chloroform\n                                      *label retq\n                                      There's nothing special or important about that piece of evidence. Try once more, as a final chance.\n                                      *choice\n                                       #The mirror before it broke\n                                        *goto retn\n                                       #The film reels that would get changed\n                                        *goto filmyes\n                                       #The glass fragments\n                                        *goto retn\n                                       #The smell of sawdust\n                                        *goto retn\n                                       #The bottle of bleach\n                                        *goto retn\n                                       #Louis's scream\n                                        *goto retn\n                                       #The glass that cut Serge\n                                        *goto retn\n                                       #The bleach on the bathroom floor\n                                        *goto retn\n                                       #The washable marker\n                                        *goto retn\n                                       #The chloroform\n                                        *label retn\n                                        Benjamin: I don't think you know what you're saying, $!{name}. There doesn't seem to be enough evidence to convict Alan. It seems that Louis committed suicide.\n                                        *goto thend                                         \n                                 #No\n                                  Benjamin: Then there isn't anything wrong! I must conclude that Louis committed suicide.\n                                  *goto thend\n                               #The existence of the washable marker.\n                                $!{name}: Where is the washable marker now?\n \n                                Benjamin: Forensics found a washable marker in the bathroom garbage can.\n                                *page_break\n                                Benjamin told Forensics to examine the washable marker. It has the fingerprints of both Alan and Louis on it.\n\n                                You decide that this isn't proving anything. What error is there?\n                                *goto peng\n                               #Why he still has a piece of glass with the fingerprints on it.\n                                $!{name}: I find it very suspicious that you somehow kept this piece of glass, carried it around all this time, and still managed to preserve the fingerprints without wiping them off.\n                                *goto interr\n                               #Why Louis really got fired as production manager.\n                                $!{name}: I think that you are lying to us when you say that the director got his son to take over your job, resulting in Louis getting fired. \n\n                                Benjamin interrupts.\n\n                                Benjamin: No, when we got the record of Louis's and Alan's jobs, we also verified that Louis did in fact get fired in that manner.\n\n                                This isn't going anywhere. What error is there?\n                                *goto peng\n                               #How Alan knew Louis was going to frame him as his murderer.\n                                $!{name}: How exactly did you know Louis was going to frame you? I mean, did he actually show you your name on the towel? Did he actually tell spell out his plan to you?\n\n                                Alan: After he told me that he was going to kill himself, he wrote something on the towel. Then he committed suicide. At first, I just stood there in shock. But very soon after, I slowly walked over to Louis and that was when I saw that the towel had my name on it. It became very clear to me what Louis's intent was after that.\n\n                                Benjamin: There isn't any error here, $!{name}. There doesn't seem to be any problem with what Alan is saying. I must conclude that Louis committed suicide.\n                                *goto thend\n                               #His talk with Serge\n                                $!{name}: As I recall, Serge said that the killer told him that if he said anything about the encounter he would die. Did you say this?\n\n                                Alan: Yes, I did. But I wasn't really going to kill Serge, I just wanted to make sure that nobody knew I was involved in the crime.\n                                \n                                What Alan is saying makes sense. There must be another error somewhere.\n                                *goto peng\n                               #How Alan didn't know there was chloroform on the towel.\n                                $!{name}: I believe you actually did know that there was chloroform on the towel.\n\n                                Alan: Oh, and why do you believe that?\n\n                                $!{name}: Because you are the killer, of course!\n                                *goto interr\n                             #Tell Benjamin that you would like to speak with each suspect separately. \n                              Benjamin agrees, allowing you to interview each suspect privately in Serge's comfortable office, which has thick walls to prevent eavesdropping.\n\n                              What Benjamin doesn't know is that all you really want to do is speak to Alan. You casually speak with all the other suspects until Alan comes in and takes a seat.\n\n                              What do you wish to say?\n                              *choice\n                               #I know you're the murderer. Confess, and the charge may be lessened.\n                                *label Alanme\n\n                                Alan: Don't jump to conclusions. Do you have any evidence proving I'm the culprit?\n\n                                $!{name}: Before attempting the murder, you had to check the men's bathroom to make sure nobody was inside. You planned to return to the bathroom after the murder to dispose of the glass and the chloroform towel. You had thick gloves in order to prevent fingerprints. One minute doesn't sound like enough time for you to commit the murder, but who said Helena had a good sense of time? She didn't have a watch or anything, after all. If I add that we have a definitive list of suspects, the rest of whom are no longer under suspicion, which leaves you as the only possible person who could have killed Louis.\n                           \n                                Alan: It was suicide.\n                                *page_break\n                                Alan: I didn't want to say this before, but I actually knew Louis. Louis and I were friends for a long time, until he lost his job as the production manager for \"The Prince and the God.\"\n\n                                Alan: You see, I was unit manager for the film, and since the director decided he wanted his son to take over that job, he moved me to the lower-level production manager position and simply fired Louis.\n\n                                Alan: Louis had to look for a new job, and he ended up here. I thought we were still friends, and he even offered me a free ticket to \"The Prince and the God\" today. He called me in about halfway through the film, saying that it is really a cool experience to see the movie from the projection room. I happily agreed...only to find him about to commit suicide.\n                                *page_break\n                                Alan: He said that, because I had caused him to lose his job, he was going to kill himself but make it look like I had murdered him! He took out a towel, wrote my name on it with a washable marker, and dropped the towel on the floor. Then he took a pile of broken glass and painfully pushed it into his mouth. I just stood there, devastated.\n\n                                Alan: Of course, the projection room was very dark at the time. I could make out that it was Louis inside, but I was only able to see my name on the towel after walking up and staring closely at it.\n\n                                Alan: After all this, I knew I was in trouble. So I picked up the remaining glass and the towel, and I was going to run to the bathroom and dispose of them before I got caught. That's all I did to tamper with the scene. After that, Serge entered the room.\n\n                                Alan: I used a piece of glass to slash his arm, ran to the bathroom, put all the shattered glass in the garbage near the broken mirror, and then hid the towel in a toilet tank. When Serge entered, I waited for him to go to the stalls and then I ran out. I had no idea that the towel had chloroform on it. That was all part of Louis's plan to frame me for his murder. Both Louis's and my fingerprints should be on the glass that I put in the bathroom garbage. I still have a piece that I somehow forgot to throw out. It's a bit bigger than all the other pieces, so you should be able to test it and prove that both of our fingerprints are on it. If I had killed Louis after knocking him out with chloroform, then his fingerprints shouldn't be on it.\n          \n                                Hmm, Alan's story seems plausible, but who knows whether the police will buy it. You know Benjamin is already very suspicious about Alan. What are you going to do?\n                                *choice\n                                 #You're a trusted detective. You believe in Alan and convince Benjamin it was a suicide.\n                                  You tell Alan's new story to Benjamin in a more convincing manner, and Benjamin believes it completely.\n                                  *page_break End?\n                                  It's too bad though, since it wasn't really a suicide...and now Alan will never be found guilty. Game Over.\n                                  *goto thanksforplaying\n                                 #You doubt Alan and think he is lying about something. Go back to the projection room, and tell his new story to the police.\n                                  *goto gogogol\n                               #Who do you think the murderer is, Alan?\n                                Alan: Serge, maybe? He seems pretty suspicious to me.\n                                *choice\n                                 #Become agitated\n                                  $!{name}: I was going to try and help you, but now I see no need to. I know you are the murderer, Alan.\n                                  *goto Alanme\n                                 #Stay calm\n                                  *goto Alancalm\n                               #I have a hunch that you're the murderer. Tell me exactly what you have done today.\n                                *label Alancalm\n                                $!{name}: What exactly have you done today?\n\n                                Alan: I bought a movie ticket and a large popcorn. Then I waited a few minutes in the theater for the movie to start. After I finished my popcorn, however, my hands were really buttery. I waited for a boring part and went to the bathroom to wash my hands, then went straight back and watched the rest of the movie.\n\n                                $!{name}: You are lying to me, Alan. I thought that maybe, if you finally told the truth here, I could go easy on you. But I'm ready to say it right now. I know you are the murderer.\n                                *goto Alanme\n                             #Have an intermission. You have some things to say to Benjamin in private before you accuse Alan of murder.\n                              You tell all the suspects to wait in the lobby while you and Benjamin have a quick discussion.\n\n                              Benjamin: What is it, $!{name}? Have you figured out the culprit?\n \n                              $!{name}: Yes, I have. It's Alan, definitely Alan.\n\n                              Benjamin: That's what I was thinking as well. He has many things to explain.\n                              *page_break\n                              Everyone comes back into the projection room. \n\n                              $!{name}: We know you are the murderer, Alan.\n                              *goto Alanme\n                           #Helena\n                            Okay, you have decided who the murderer is. But how do you go about exposing her?\n                            *choice\n                             #Out in the open, so she can't run away.\n                              $!{name}: Helena, you killed Louis Lawrence!\n\n                              Helena: You can't be serious.\n\n                              It's time to end this case. Continue accusing Helena until she finally breaks down!\n                              *label hellcomeon           \n                   \n                              $!{name}: Helena, you are the only person who could have killed Louis. I have many facts to back up my claim. First...\n                              *fake_choice\n                               #Let's assume that you weren't at the concession stand the whole time.\n                               #Let's assume you had an accomplice.\n                              \n                              $!{name}: You probably had a friend who looks somewhat similar to you come handle the concession stand, saying you had to go to the bathroom or the manager's room. During this time, you killed Louis and afterwards came back to the concession stand and told your friend to leave.\n                              Helena: You have no proof a friend of mine ever came to this theater.\n                              *fake_choice\n                               #Yes, I do.\n                               #It's not unreasonable to assume.\n\n                              $!{name}: Look at you, a young and fairly pretty woman, working at a job like this. It's easy for you to go call a friend to come. But it's more likely that you saw someone you know come into the theater and launched your murderous plot on the spot.\n\n                              Helena: Circumstantial evidence can't really prove me guilty...can it? \n\n                              $!{name}: We have a definitive list of suspects, the rest of whom are no long under suspicion. So your guilt is clearly confirmed by process of elimination.\n                              *page_break End.\n                              Benjamin quickly accepts your deduction as fact. He knows you are a very reliable detective. Helena is sentenced to a life in prison, and everyone else goes home.\n                              *page_break End?\n                              It's too bad though, since Helena wasn't really the murderer...and now the true culprit will never be found guilty. Game Over.\n                              *goto thanksforplaying                                \n                             #Tell Benjamin that you would like to speak with each of the suspects separately. \n                              Benjamin understands and allows you to do so. It's decided that you will privately interview each suspect in Serge's room, since it has thick walls and is overall very comfortable.\n\n                              What Benjamin doesn't know is that all you really want to do is speak to Helena. You casually speak with all the other suspects until Helena comes in and takes a seat.\n\n                              What do you wish to say?\n                              *choice\n                               #I know you're the murderer. Confess, and the charge may be lessened.\n                                *label helca\n\n                                Helena: What? How dare you accuse me like that without any evidence!\n\n                                It's pretty apparent that Helena isn't going to crack. You're going to have to do this the more painful way. Everyone goes back to the projection room.\n                                *goto hellcomeon\n                               #Who do you think the murderer is, Helena?\n                                Helena: Serge, perhaps? He is obviously very suspicious.\n                                *choice\n                                 #Argue\n                                  $!{name}: Trying to pin your crime on someone else, huh? That's just sad.\n                                  *goto helca\n                                 #Stay calm\n                                  *goto helliscalm\n                               #I have a hunch that you're the murderer. Tell me exactly what you have done today.\n                                *label helliscalm\n                                $!{name}: What exactly have you done today?\n\n                                Helena: I came to work at noon. I stayed at the concession stand the whole time.\n\n                                $!{name}: I bet you think you are pretty clever, trying to make it seem like there was no way for you to kill Louis, when in fact you are the murderer.\n                                *goto helca\n                             #Have an intermission. You have some things to say to Benjamin in private before you accuse Helena of murder.\n                              You tell all the suspects to wait in the lobby while you and Benjamin have a quick discussion.\n\n                              Benjamin: What is it, $!{name}? Have you figured out who the culprit is?\n \n                              $!{name}: Yes, I have. It's Helena, definitely Helena.\n\n                              Benjamin: I trust your judgment. If you are completely certain, let's tell everyone else go home and have a good, long talk with Helena.\n                              *page_break\n                              Helena comes back into the projection room. \n\n                              $!{name}: I know you are the murderer, Helena.\n                              *goto helca\n                           #Serge\n                            Okay, you have decided who the murderer is, but how do you go about exposing him?\n                            *choice\n                             #Out in the open, so he can't run away.\n                              $!{name}: Serge, you killer Louis Lawrence!\n\n                              Serge: Huh? But I thought I had already cleared myself!\n\n                              It's time to end this case. Continue accusing Serge until he finally breaks down!\n                              *label sergecomeon           \n                   \n                              $!{name}: Serge, you are the only person who could have killed Louis. I have many facts to back up my claim. First...\n                              *fake_choice\n                               #Let's assume your whole story about meeting the killer and entering the bathroom is false.\n                               #Let's assume that you are the only person who came into contact with the victim.\n\n                              $!{name}: Think back to what you told us during the interrogation. You said you not only found the victim, but also the killer. If we conclude that this is just a huge lie, then we come to the same conclusion we had reached before the interrogation, namely that you are the killer!\n                              \n                              Serge: But I told the truth! Well, not right away, but that was just because I was afraid of appearing to be the killer.\n\n                              $!{name}: This hypothesis of mine is proven, however, when put together with...\n                              *fake_choice\n                               #The bleach.\n                               #The glass.\n\n                              $!{name}: This is a red herring you set up yourself in an effort to make yourself appear innocent. Assuming that you never met the killer, then this piece of evidence shows that you thought about feigning innocence even before the cops arrived! There is no proof to what you said, so I think you know what that means...\n                               \n                              Serge: You don't understand, everything I've said is true! You need concrete evidence to convict me!\n\n                              $!{name}: We have a definitive list of suspects, the rest of whom are no longer under suspicion. So your guilt is clearly confirmed by process of elimination. It's very apparent that you are the culprit. I'm sorry.\n                              *page_break End.\n                              Benjamin quickly accepts your deduction as fact. He knows you are a very reliable detective. Serge is sentenced to a life in prison, and everyone else goes home.\n                              *page_break End?\n                              It's too bad though, since Serge wasn't really the murderer...and now the true killer will never be found guilty. Game Over.\n                              *goto thanksforplaying                                \n                             #Tell Benjamin that you would like to sp
