her_death2\n\n\t\t\t\t\tBlood trickles onto your tongue and as you spit it out, the vampire comes at you with a wide-open mouth, suddenly looking ravenous. You duck and slam your shoulders into his stomach, grabbing his legs while he is distracted. With one powerful movement, you toss him to the earth.\n\t\t\t\t\t*goto fortress\n\t\t\t\t\t\n\t\t\t*selectable_if (poison) #You'll use the witch's vials of poison as a makeshift explosive.\n\t\t\t\t*set poison false \n\t\t\t\t*set cunning %+3\n\t\t\t\tYou move quickly, unraveling the belt of poisons from your waist. You had made a wick for one of the vials when you organized your weapons last night, and now you set it aflame with your flint. As Lord Sarrivan approaches, you toss the flaming vials, the vampire's eyes narrowing in anger. He raises his cloak just before your impromptu explosive detonates, spewing black smoke, vibrant greenish fire, and raw power.\n\t\t\t\t*goto destruction\n\t\t\n\t\t\t*selectable_if (daggers) #You ply your throwing daggers against him.\n\t\t\t\t*set resolve %+3\n\t\t\t\tDrawing several daggers from your belt, you project six of them, one after another, toward the vampire as he descends upon you.\n\t\t\t\t*if now\n\t\t\t\t\t*set salt false\n\t\t\t\t\t*set cunning %+3\n\t\t\t\t\tWith the other hand, you tear open your bag of salt. The vampire's eyes widen, fixating on the stream of white granules falling to the ground. Swiveling his head frantically, his eyes dart back and forth as he silently mouths, \"One-two-three-four-five—\" \n\n\t\t\t\t\tDesperately, he tries to turn away but only shakes violently. Your blades hit with a squelching sound, landing in his stomach, side, and thigh. Crying out in pain, he crashes to the ground and tumbles over a heap of stones. He quickly staggers to his feet while extracting your daggers from his body.\n\t\t\t\t\t*goto fortress\n\n\t\t\t\t*if ((nosalt) or (later))\n\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t*set health -4\n\t\t\t\t\tIn an impressive display of maneuverability, he somehow twists through the blades and only one connects with its target. He draws your knife out of his side as he lands, ducking beneath your staff and stabbing you with your own blade.\n\t\t\t\t\t*if (health \u003c 1)\n\t\t\t\t\t\t*goto main_death2\n\n\t\t\t\t\tStaggering backward, you gasp as blood flows down your arm from your injured shoulder. Still focused, you quickly counterattack. You slam your staff down into his ribs and he doubles over, growling. Though his teeth are clenched in pain, he lunges forward, grabbing your hair and slamming your head into his knee.\n\t\t\t\t\t*goto tumbling\n                                \n\t\t\t*selectable_if (iron > 0) #You release a cloud of iron filings.\n\t\t\t\t*set iron -1\n\t\t\t\t*set resolve %+3\n\t\t\t\tThe grains of metal shower him in a black cloud, but the vampire crouches and covers himself with his cloak. It glows a nauseating shade of purple, and as he stands the iron merely falls off, impotent. \n\t\t\t\t*label failed\n\t\t\t\tAh. The cloak must be magical. Lucky you. Sarrivan shows you his teeth, though you're not sure if it is meant for a smile or a dinner invitation.\n\n\t\t\t\tHe rises into the air with his arms outstretched, almost seeming to glide for a moment. You\n\t\t\t\t*if ((later) or (nosalt))\n\t\t\t\t\t*set cunning %-5 \n\t\t\t\t\t*set health -5\n\t\t\t\t\tattack with your staff, but he jumps suddenly and lies horizontally in the air\n\t\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t\t*label lok \n\t\t\t\t\t\t, looking like a great, dark hawk with translucent purple wings.\n\t\t\t\t\t\t*goto old \n\t\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t\t. The old man is showing his age. Only the most ancient of vampires can exert such control over their powers of flight.\n\t\t\t\t\t\t*goto old \n\t\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t\t, cleverly avoiding your blow.\n\t\t\t\t\t\t*goto old \n\t\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t\t, futilely delaying his defeat.\n\t\t\t\t\t\t*goto old \n\t\t\t\t\t*else \n\t\t\t\t\t\t*goto lok \n\t\t\t\t\t*label old \n\t\t\t\t\tTime seems to suspend, but suddenly everything snaps back into place as he slams into you, knocking you over and pinning you to the ground. \n\t\t\t\t\t\n\t\t\t\t\tHe smiles horribly, and you feel frigid breaths wash over you as he bites into your neck. You gasp as he begins to suck,\n\t\t\t\t\t*if (health \u003c 1)\n\t\t\t\t\t\tand your fatigue and injuries render you helpless. As your blood drains, all you can muster is a frail cry for ${boggart}, but no one replies. Finally, your vision diminishes into the inescapable blackness of your own death. \n\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\tbut he reels off of your body with a shout of surprise as ${boggart}\n\t\t\t\t\t*if not(viper)\n\t\t\t\t\t\tsoars overhead, \n\t\t\t\t\t\t*if (eagle)\n\t\t\t\t\t\t\traking his talons across the vampire's head.\n\t\t\t\t\t\t*if (original)\n\t\t\t\t\t\t\tslashing his scorpion tail across the vampire's head.\n\t\t\t\t\t*if viper\n\t\t\t\t\t\tdarts forward, slithering up the vampire's arm and delivering a powerful shock.\n\t\t\t\t\tStanding woozily, you strike out wildly but the vampire easily dodges your attack, slashing his claws across your face. \n\t\t\t\t\t\n\t\t\t\t\tStaggering backward, you gasp in pain as blood flows down your face. Quickly counterattacking, you drive your blade into his shoulder. \n\t\t\t\t\t*goto fortress\n\t\t\t\t*if now\n\t\t\t\t\t*set salt false\n\t\t\t\t\ttear open the bag of salt, releasing its contents onto the ground. The vampire's eyes widen, fixating on the stream of white granules. He swivels his head frantically, eyes darting back and forth as he silently mouths, \"One-two-three-four-five—\" \n\t\t\t\t\t\n\t\t\t\t\tTrying desperately to turn away, he only manages to shake violently. You quickly swing your staff through the air, slamming it into his jaw. With a strangled cry, he tumbles to the ground. He swiftly attempts to climb to his feet, blood covering his swollen face, but you stride forward and slam your boot into his chest. Sarrivan's eyes bulge and he hits the ground, skidding backwards. \n\t\t\t\t\t\n\t\t\t\t\tHe staggers up and charges at you again, screaming,\n\t\t\t\t\t*label try\n\t\t\t\t\t\"Your pathetic, tired trick won't work again, worthless worm!\"\n\t\t\t\t\t\t\n\t\t\t\t\t*if eagle\n\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\tAs he surges forward, ${boggart} dives through the air and rakes the vampire with his talons. \n\n\t\t\t\t\t*if viper       \n\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\tAs he surges forward, claws stretched toward your throat, ${boggart} darts forward. He slithers up the vampire's arm and delivers a powerful shock, darting back into your robes almost too quickly to see.\n\n\t\t\t\t\t*if original\n\t\t\t\t\t\t*set health -2\n\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\tHe surges forward with astounding speed, slashing his claws across your face. He grins with excitement, licking his fingers as you stagger back. Before he can attempt another attack, though, you raise your staff and slash its blade across his chest. \n\t\t\t\t\t*goto fortress\n\t\t\t\t\t\n\t\t\t*selectable_if (staff) #Raising your staff, you take up a warding position.\n\t\t\t\t*set stealth %+3\n\t\t\t\t*set cunning %+3\n\t\t\t\t*if now\n\t\t\t\t\t*set salt false\n\t\t\t\t\tYou empty the bag of salt and Sarrivan's eyes widen, fixating on the little stream of white granules. He swivels his head frantically, his eyes darting back and forth as he silently mouths, \"One-two-three-four-five—\"\n\n\t\t\t\t\tDesperately, he tries to turn away but only shakes violently. You swing your staff into his forehead, daggers out, sending him tumbling backward with blood spurting from his temple. \n\t\t\t\t*if ((nosalt) or (later))\n\t\t\t\t\t*set health -3\n\t\t\t\t\t*set cunning %-5\n\t\t\t\t\tYou thrust your staff toward Sarrivan's heart but he twists mid-flight, hitting your chest. His claws tear your robe and skin, and the force of the impact knocks you down onto your side. He lands, catlike, on your chest. Baring his teeth, he swats your staff away with one hand. Leaning over, eyes dilated, he bites into your neck!\n\t\t\t\t\t*if (health \u003c 1)\n\t\t\t\t\t\t*goto main_death2\n\t\t\t\t\tYou gasp in shock and pain. \n\t\t\t\t\t\n\t\t\t\t\tCurling into a ball, head tucked, you shove his knee off your hips with one hand. Then, you lever yourself up and push into a roll. Your feet come into position and you kick him soundly in the chest, knocking him backward. You come up to one knee as he lunges at you\n\t\t\t\t\t*if original\n\t\t\t\t\t\t*set health -2\n\t\t\t\t\t\t, ripping your chest open with his glistening claws\n\t\t\t\t\t\t*if (health \u003c 1)\n\t\t\t\t\t\t\t.\n\t\t\t\t\t\t\t*goto main_death2\n\t\t\t\t\t\t. Quickly drawing your dagger, you slice deeply into his upper arm.\n\t\t\t\t\t*if ((viper) or (eagle))\n\t\t\t\t\t\t, slashing his claws toward your chest. Just before he strikes, ${boggart}\n\t\t\t\t\t\t*if viper\n\t\t\t\t\t\t\tdarts forward, slithering up the vampire's arm and delivering a powerful shock. Sarrivan reels backwards, convulsing.\n\t\t\t\t\t\t*if eagle\n\t\t\t\t\t\t\tsoars overhead, raking his talons across the vampire's head. Sarrivan wails shrilly as he lurches off you.\n\t\t\t\t\t\tHe is caught off-guard as you drive your dagger into his torso.\n\t\t\t\t\t*goto fortress\n                                        \n*label fortress\n\nHowling with pain, Lord Sarrivan staggers back, clutching at his injuries. His eyes glowing with an arcane light, he withdraws toward the castle. His hands weave in the empty air, gradually drawing strands of dark purple together into a great, glowing sphere. As he swallows the sphere, his injuries visibly begin to repair themselves. He pushes backwards through the great double doors of the keep, and the blackness beyond seems to almost pull him inside. \n\nYou race to the entrance but are stopped short by a magical ward, crackling with peculiar heat. \n*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t*label sarrr \n\tYou guess Sarrivan won't be needing a welcome mat. \n\t*goto he \n*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\tIt does look like this shield is only meant to stall you. If he were able, Sarrivan would have killed you right here.\n\t*goto he \n*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\tAh well. There are always ways of getting past a simple magical ward. \n\t*goto he \n*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\tCursing, you scowl at the ward in front of you.\n\t*goto he \n*else \n\t*goto sarrr \n*label he \nPicking up a piece of debris\n*if ((original) or (eagle))\n\tas ${boggart} lands onto the ground nearby\n, you cast it toward the doorway. It passes through, unaffected by the barrier.\n*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t*label comm \n\tYou turn and comment to ${boggart}, \"They never seem to just make it simple, do \n\t*if relationship > 54\n\t\tthey, my friend?\" \n                \n\t\tHe returns your grin,\n\t*if not(relationship \u003c 60)\n\t\tthey?\"\n                \n\t\tHe just shrugs noncommittally\n\tand you pull out a candle and light it, testing the magical barrier. Curiously, nothing happens.\n\t*goto no \n*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t*goto ward\n*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t*label ward\n\tPuzzling hard, you guess that the magical barrier only repels living beings, and might be dangerous to you. \n\t\n\tYou light your candle hastily, eager to move on and chase down the demon, but the cleansing light reveals nothing new. Curiously, there is no effect. This barrier must be either too powerful for your simple candles or not from dark magic at all.\n\t*goto no \n*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\tYou start to stride forward, but suddenly think better of it. Who knows what effect that purple glow might have on a human? You sigh, reminded of why you hate vampires so much. \n\t\t\n\tNothing is ever simple. You light your candle hastily, eager to move on and chase down the demon, but the cleansing light reveals nothing new. Very strange.\n\t*goto no\n*else \n\t*goto comm \n*label no \n\t\n*line_break \t\n\t\nYou blow out your candle and\n*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t*label shrig \n\tshrug, striding forward,\n\t*goto u \n*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\twalk forward, your mind racing,\n\t*goto u \n*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\tcautiously walk forward, senses alert,\n\t*goto u \n*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\tstride boldly forward\n\t*goto u \n*else \n\t*goto shrig \n*label u \nbut you are stopped by the barrier as though it were solid rock. You frown pensively and a fancy scrawl suddenly appears on the ward. [i]\"Ohra wen mas entril!\"[/i] Oddly enough, the message is written in a mixture of the common Lumean tongue and Infernal, but it's easy enough to read either way: \"Only one may enter!\"\n\nSighing, you say, \"Well, that solves the mystery. The barrier will only allow one of us to enter the tower.\n*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t*label lik \n\tIt looks like I must go alone. Fortunately, my pendant will tell me where Sarrivan is, so he won't be able to attack either of us without a little warning.\n\t*goto l \n*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\tAnother little trick of the castle's, I gather.\n\t*goto l \n*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\tEven alone, all it should take is a little caution to defeat Sarrivan.\n\t*goto l \n*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\tNevertheless, this villain's defeat is inevitable.\n\t*goto l \n*else \n\t*goto lik \n*label l \n*if relationship > 54\n\tSadly, you will have to stay here, little fellow, but don't worry! I will be back.\n\t*goto if\n*if relationship \u003c 50\n\tSo, basically, just stay here and don't do anything stupid.\n*if relationship > 49 \n\tBut anyway, you'll have to just stay here.\n*label if\nIf I'm not back in an hour, find the nearest demon hunter or huntress and inform them of the situation.\"\n\n${boggart} nods hesitantly, telling you, \n*if relationship \u003c50 \n\t\"Fine, whatever.\"\n*if relationship >49  \n\t\"Just be careful.\"\n\nLooking back at him standing there awkwardly, you realize that this may be the last time you see each other. \n*choice\n\t#Despite the danger, you're pleased to be left to yourself for once. That apprentice is more annoying than you could have ever imagined.\n\t\t*set relationship %-5 \n\t\t*set compassionate %-5 \n\t\tWith nothing more than a backwards glance toward the boggart, you turn to the entrance of the desolate tower. You glance back when you hear a shuffling noise behind you, and see ${boggart} standing there, speechless. A dark smile twitches on your face. You suppose this is good riddance, for now.\n\t\t*goto ointment\n\n\t#Sighing, you embrace your apprentice and friend.\n\t\t*set charisma %+3 \n\t\t*set relationship %+5 \n\t\t*set compassionate %+3\n\t\t*if relationship > 55\n\t\t\t*achieve boggart\n\t\tKneeling down toward the little boggart, you embrace him gently but firmly.  \n\t\t*if relationship \u003c 50 \n\t\t\tRecoiling, he screeches, \"You hypocrite! You think you're going to die, don't you?!\"\n                        \n\t\t\tFrowning, you say tersely, \"You never appreciate anything, do you?\"\n\t\t*if relationship > 54\n\t\t\t${boggart} wraps his little arms around you, snuggling his head against your chest. For a moment you can't bear to let him go, but you gently release him and smile warmly. He has tears swimming in his eyes, so you know that your actions have conveyed your feelings clearly. \n\t\t\t*goto stand\n\t\t*if relationship > 49\n\t\t\t${boggart} wraps his little arms around you, snuggling his head against your chest. For a moment you stay motionless, then gently release him and smile faintly, and he gives you a little smile in return.\n\t\t*label stand\n                \n\t\tStanding up, you swivel around to\n\t\t*goto then_ointment\n        \n\t#You'll send him off well with a warm goodbye.\n\t\t*set relationship %+3\n\t\t*set resolve %+3\n\t\t*set charisma %+3\n\t\t*if relationship > 55\n\t\t\t*achieve boggart\n\t\tYou have done so much for each other, after all. You tell him,\n\t\t*if relationship > 54\n\t\t\t\"Don't worry, ${boggart}; I'll return before you know it. If anything happens to me, though, remember: you have been my constant companion, and you are my closest friend. I will use that thought to strengthen my resolve in the battle ahead.\" \n\n\t\t\tA big smile splits across your little companion's face as he flies forward, embracing you. Laughing, you return his embrace for a moment. Then, setting him gently on the ground,\n\t\t\t*goto swivel\n\t\t*if relationship \u003c 50 \n\t\t\t\"Don't worry, boggart. I'll return before you know it.\" \n\t\t\t\n\t\t\tNodding slowly, he looks at you suspiciously as if he thinks you're up to something. Sighing brusquely, \n\t\t*if relationship > 49\n\t\t\t\"Don't worry, ${boggart}! I'll return before you know it.\"\n                        \n\t\t\tHe just nods, his face serious. Clearing your throat,\n\t\t*label swivel\n\t\tyou swivel around to face \n\t\t*goto then_ointment\n                \n\t#Right now, you're really just focused on the battle ahead.\n\t\t*set resolve %+3 \n\t\t*set relationship %-5 \n\t\t*set compassionate %-5 \n\t\t\"Well, ${boggart}, I suppose we will see each other if I return.\"\n\t\t\n\t\t*if relationship \u003c 50 \n\t\t\t${boggart} hisses and turns away. \n\t\t*if relationship > 49 \n\t\t\tYour apprentice nods sadly, looking at his feet.\n\t\tYou turn to face\n\t\t*goto then_ointment \n\n*label then_ointment\n*set ointment 0\nthe entrance of the desolate tower. Now that you think of it, it's probably a good idea to use the last of your healing ointment, just in case. Getting it from your satchel, you take a few moments to spread it across your body, sighing deeply. That done, you stride through the ward into the danger that awaits \n*label ointment \n*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t*label al \n\t. Somehow, you always find yourself assuming the worst, and somehow, you are almost always right when you do. This is definitely one of those times.\n\t*goto do \n*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t, gripping your staff tightly in your sweaty hands.\n\t*goto do \n*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t, gripping your staff tightly in your sweaty hands.\n\t*goto do \n*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t, almost hoping that the vampire tries another sneak attack.\n\t*goto do \n*else \n\t*goto al \n*label do \n\n*page_break\nThere is a horrible stench inside the old castle. Wrinkling your nose, you tie a cloth over your face and hold your staff in front of you, guarding against whatever lies inside. A tenor voice booms out around you, bouncing around the room in an amplified echo. \n\n\"Fool. You have entered my castle! In doing so, you have secured your doom!\"\n\n*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t*label star \n\tStartled, you flinch and start looking around for your enemy's whereabouts.\n\t*goto s \n*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\tOh, how fancy. Amateur ventriloquism.\n\t*goto s \n*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\tThe echoes conceal his whereabouts…. Very clever.\n\t*goto s \n*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\tUnimpressed, you shout back, \"Come and fight me, then!\" \n\t\n\tYour voice bounces off the walls as well, echoing almost as much as his.\n\t*goto s \n*else \n\t*goto star \n*label s \nA deep rumble shakes the castle, and the floor begins to rotate beneath you! Objects tumble across the ground, several hitting you in the legs and chest. You dig your staff's blade into the floor to steady yourself as debris goes flying. The ceiling above you is beginning to cave, and the moving floor shakes the walls and pillars around you.\n*fake_choice\n\t#You jump from one pillar to another, dodging the worst of the falling debris.\n\t\t*set cunning %+3\n\t\t*set resolve %+3\n\t\tThe floor continues to tilt, shaking the castle to its foundation. Rocks come down all around you as you skid past more rubble. Finally making your way to the room on the next floor down, you carefully regain your footing and take stock of the situation.\n\n\t#You stay perched on a pillar and deflect falling rubble with your staff.\n\t\t*set health -1 \n\t\t*set stealth %+3\n\t\t*set cunning %-3\n\t\tBalancing nimbly, you bat away the rocks with your staff. One large stone slams into your hand as you deflect it, smashing your fingers against the staff's metal bands. Even so, you manage to avoid the worst of the debris. However, the stones seem to keep coming at you out of nowhere. \n\t\t*if (health \u003c 1)\n\t\t\t*label stone_death\n\t\t\tThey pummel you until you can't stay conscious any longer. You are powerless to stop yourself from plummeting into the emptiness below, where you are buried alive by the falling debris.\n\t\t\t*goto_scene death\n\t\tYou drop to your knees,\n\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t*label daz \n\t\t\tdazed and shaking\n\t\t\t*goto z\n\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\ttrying to focus through your dizziness\n\t\t\t*goto z \n\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\tsomehow managing to stay alert\n\t\t\t*goto z \n\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\tgritting your teeth\n\t\t\t*goto z  \n\t\t*else \n\t\t\t*goto daz \n\t\t*label z \n\t\tas you slide to the bottom of the pit.\n\t\t\n\n\t#You attempt to grapple something outside of the chute with your chain and climb upward.\n\t\t*set cunning %-5\n\t\t*set health -4  \n\t\t*set resolve %+3\n\t\tAs the tipping floor forces you closer to the edge, you loop your chain together on one end and cast it toward a broken statue. The chain pulls taut, but a jagged rock suddenly slams into your elbow. Gasping, your grip loosens and you plummet into the chaos below, barely managing to catch hold of the chain's end. You hold on as tightly as you can, bumped violently against the tilting floor and wall while the rocks and rotting furniture pour down on top of you.\n\t\t\n\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t*label wal \n\t\t\tWell, you're going to have bruises in the morning. As usual.\n\t\t\t*goto this \n\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\tThis vampire has more powers than you'd anticipated! You need to act more cautiously in the future if you're to survive this.\n\t\t\t*goto this \n\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\tYou raise your hands to protect your face, curling into a ball and trying to work yourself under a ledge.\n\t\t\t*goto this \n\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\tYou roar all the louder, furious at this cowardly vampire's tricks. This is exactly why you despise vampires!\n\t\t\t*goto this \n\t\t*else \n\t\t\t*goto wal \n\t\t*label this \n\t\t*if health > 1\n\t\t\t*goto stone_death\n\t\tYou scrabble at a nearby staircase, pulling yourself away from the cascade of rubbish as you slide to the bottom of the room below.\n\nUnsurprisingly, this floor also drops away. The middle falls out and down, pulling you down into a stone funnel with astonishing swiftness. You wedge your staff, daggers out, against the sides of the pit to try to slow your descent. Sparks fly from the blades, and your knuckles sting from showers of tiny pebbles. Fighting to catch your breath, you cough out dust and mucus, \n*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t*label mute \n\tmuttering, \"A bath hasn't been this appealing since the last time I fought a slime monster.\"\n\t*goto mutt \n*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\twondering how much of it you've inhaled.\n\t*goto mutt \n*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\trubbing your face against your shoulder to clear your watering eyes. \n\t\n\tEven with your filthy clothes, it seems to help a little.\n\t*goto mutt \n*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\tmuttering again, \"I [b]hate[/b] vampires!\"\n\t*goto mutt \n*else \n\t*goto mute \n*label mutt \n\t\n*line_break \n\t\nYou carefully swing your legs onto your staff, grasping it tightly as one side after the other jerks downward, finding new chinks in the walls. Peering down into the abyss, \n*if stealth > 54 \n\tyou can just barely see water shimmering below as the sound of splashing debris rises from the pit.\n*if stealth \u003c 55 \n\tit is too dark to see, but you can hear the debris splashing at the bottom.   \nYour blades finally settle into a stable position, but before you can climb out of the hole, Lord Sarrivan lands heavily on your staff. \n\nThere is a terrible creaking noise, and you both plunge into the chasm at a terrific speed.\n*if later\n\t*set cunning %+3\n\t*set stealth %+3\n\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t*label despitt \n\t\tGrinning despite yourself, you say, \"Fancy meeting you here! Had I known you'd drop in, I'd have gotten you something nicer!\" Flinging the salt into the air with one smooth motion, you add, \"I'm afraid you'll just have to make do with this!\"\n\t\t*goto fling\n\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\tYou decide you have a wonderful opportunity, despite the awkward circumstances. With one smooth motion, you fling the contents of the salt pouch into the air.\n\t\t*goto fling \n\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\tIn a quick flurry of movement, you send the contents of your salt bag flying toward him.\n\t\t*goto fling \n\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\tYou've had enough of this monster! You tear open your bag of salt, spilling the grains into the air.\n\t\t*goto fling  \n\t*else \n\t\t*goto despitt \n\t*label fling \n\t\t\n\tAs the shining mineral scatters in the darkness, the vampire's excellent vision lets him see every grain. His gaze narrows and his head swivels frantically. He begins to mouth, \"one-two-three-four-five—\" as his eyes dart back and forth. \n\n\tLooking down, you see the water looming closer. The stench is almost overpowering. Sarrivan is totally distracted, and he hits the water with a sickening, crunchy splat. You soon follow,\n\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t*label sinc \n\t\tsince Lord Sarrivan so kindly broke the surface tension for you.\n\t\t*goto as\n\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\tcarefully aiming to follow your deceased opponent and take advantage of his last gift—the water's broken surface tension.\n\t\t*goto as \n\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\tfalling into a perfect, silent dive just where Sarrivan broke the surface tension for you.\n\t\t*goto as \n\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\troaring in triumph.\n\t\t*goto as \n\t*else \n\t\t*goto sinc \n\t*label as \n\tSinking into the boggy water, you push upwards until you reach the surface, wiping slime and a few strands of some marsh plant, or, you [b]hope[/b] it's just a simple marsh plant, from your face.\n\n\tSwimming through the liquid, you notice a narrow passageway to your left. You slowly press forward, \n\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t*label absy \n\t\tremarking absently to the walls, \"I wonder what died here to make this smell? Or maybe it's better that I don't know.\"\n\t\t*goto h \n\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\tcareful to stay afloat in the muck.\n\t\t*goto h \n\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\tswiftly wading to the far side of the disgusting liquid.\n\t\t*goto h \n\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\tcursing the vampire, his castle, and every evil monster that ever un-lived.\n\t\t*goto h \n\t*else \n\t\t*goto absy \n\t*label h \n\tMoments later, you finally pull yourself onto solid ground near the passage's entrance, your soaking clothes dragging in the mud. \n\t*finish Continue\n\n*if ((now) or (nosalt))\n\t*set health -1 \n\t\n\tAs you plummet, you hear Sarrivan flaring his ethereal wings, gliding in circles above you. You wrap yourself into a cannon ball, breaking the surface pressure and hitting the water with a tremendous splash. Your entire body stings, but nothing seems to be broken. Sinking to the bottom of the muck, you push off from the floor and kick hard, eventually surfacing in a dark, muddy pit. Wading through the noxious substance, you search for a means of escape. \n\t\n\tJust as the vampire alights and begins to swim toward you, a narrow passageway to your left looms out of the darkness. You swim hard, pulling yourself onto solid ground with Sarrivan almost upon you. Your soaking robe pulls at you with unaccustomed weight, but you don't dare waste precious time. In this near-complete darkness, you are in great danger. Sarrivan's inhuman abilities give him the advantage now—that is, unless your stealth is equal to his. \n\t\n\tRather than attacking you directly, he seems to have exited the muck somewhere along one of the walls. \n\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t*label ed \n\t\tWith a halfhearted grin and a nervous laugh, you say, \"A little game of hide and seek, then?\"\n\t\t*goto x \n\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\tExhaling slowly, you back up until you hit something solid. You would rather avoid any nasty surprises.\n\t\t*goto x \n\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\tYou stay absolutely silent, straining your ears for any sign of your adversary.\n\t\t*goto x \n\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\tYour voice rough, you mock the vampire, \"Afraid, old man? Come and face me if you dare!\"\n\t\t*goto x \n\t*else \n\t\t*goto ed \n\t*label x\n\t*choice\n\t\t*selectable_if (stealth > 55) #Your years of sneaking around in darkness and fighting dark creatures serve you very well. You counter his attacks easily.\n\t\t\t*set stealth %+3\n\t\t\tYou pick up his every motion, anticipating his blows. He tries to take you from behind but you can hear the near-silent padding of his feet, and you are ready for him. You duck suddenly, jamming your elbow up and behind his sternum. He splutters, gagging, and you immediately turn and sink your dagger deep into his foul heart. He collapses slowly to the ground, the infernal light fading from his eyes as his life finally fades away.\n\t\t\t*finish Continue\n\n\t\t*selectable_if (stealth > 51) #You unfasten your silver chain, holding the end as you whirl it around yourself in a protective pattern.\n\t\t\t*set resolve %+3\n\t\t\t*set health -1\n\t\t\tAs the vampire advances silently, your chain whistles and glints faintly, a blur in the dim light. Sarrivan is stung on the wrist, but right away you feel a sharp pull. He has grabbed hold of the chain! You brace yourself against a crumbling rock and pull back, hard. With a slithering sound, he slides forward across the muddy ground. He lets go immediately, but it's too late. You are already spearing him with your staff's dagger. \n\t\t\t\n\t\t\tYou miss his heart but slice open his stomach. A rank, viscous goo drips out but he growls, still moving toward you. With incredible strength, he brings one arm down on your staff and knocks it away, while his other hand grabs your shirt, clawing at your chest. \n\t\t\t*if (health \u003c 1)\n\t\t\t\t*goto main_death2\n\t\t\tYou pull out your dagger, and his eyes widen as you lean closer, thrusting upwards with the blade, piercing him in his vile heart. He collapses slowly to the ground, the infernal light fading from his eyes as his life finally fades away.\n\t\t\t*finish Continue\n\n\t\t#You decide to attack him with your staff.\n\t\t\t*set resolve %+3\n\t\t\t*set cunning %-5\n\t\t\t*set health -5\n\t\t\tStriking out with your staff the instant you hear a noise, you miss Sarrivan completely—and give the vampire an opening for attack! He surges forward, digging his claws into your windpipe. You crumple to the ground, barely conscious. Crawling to your knees, you barely manage to retrieve your weapon as the vampire swings his boot into your ribs.\n\t\t\t\n\t\t\tYou roll across the floor, screaming in pain and clutching at your side. Turning, you swing your staff through the air but he lunges forward, ducking, and digs his claws into your side. Blood mixes with the filthy water on your cloak,\n\t\t\t*if (health \u003c 1)\n\t\t\t\tand your fatigue and injuries take their toll. You're unable to save yourself this time as Sarrivan's wicked claws puncture your lungs.\n\t\t\t\t*goto_scene death\n\t\t\tbut you manage to fight through the fatigue, thrusting your dagger deep into his vile heart. The infernal light in his eyes dims, and he slowly falls to the ground, his life finally fading away.\n\t\t\t*finish Continue\n\n*label main_death2\n*label other_death2\n\nSuccumbing to your injuries, you collapse, weakly crying out for ${boggart}. There is nothing left for you to do…your fragile hold on life is broken, and your vision fades into the infinite blackness of death. \n*goto_scene death\n", "witch_fight": "*page_break\n*set witches true\nCHECKPOINT REACHED. If you perish later in the gamebook, you may decide to return to this point instead of restarting from the beginning.\n\n*temp burned_brute false\n*temp shimmer false\n*temp by_yourself false\n*set cp_image image\n*set cp_no_fortune no_fortune\n*set cp_compassionate compassionate\n*set cp_altruism altruism\n*set cp_mad mad\n*set cp_redeem redeem\n*set cp_farmer farmer\n*set cp_serve serve\n*set cp_jail jail\n*set cp_die die\n*set cp_g2 g2\n*set cp_g9 g9\n*set cp_g5 g5\n*set g10 false\n*set cp_info info\n*set cp_g10 false\n*set cp_g15 g15\n*set cp_t_goblin t_goblin\n*set cp_i_goblin i_goblin\n*set cp_confine confine\n*set cp_talk talk\n*set cp_new cp_new\n*set cp_cb cb\n*set cp_pet_hurt pet_hurt\n*set cp_absolve absolve\n*set cp_geysers geysers\n*set cp_potion2 potion2\n*set cp_eagle_hide eagle_hide\n*set cp_witches witches\n*set cp_traps traps\n*set cp_vampire vampire\n*set cp_room1 room1\n*set cp_room2 room2\n*set cp_treasury treasury\n*set cp_armory armory\n*set cp_lab lab\n*set cp_now now\n*set cp_later later\n*set cp_nosalt nosalt\n*set cp_out out\n*set cp_free free\n*set cp_tied tied\n*set cp_not_done not_done\n*set cp_original original\n*set cp_toad toad\n*set cp_viper viper\n*set cp_eagle eagle\n*set cp_hestia_fire hestia_fire\n*set cp_venefira_fire venefira_fire\n*set cp_all_fire all_fire\n*set cp_broken_vials broken_vials\n*set cp_illusia_1st illusia_1st\n*set cp_transformations_toad transformations_toad\n*set cp_transformations_viper transformations_viper\n*set cp_transformations_eagle transformations_eagle\n*set cp_venefira venefira\n*set cp_venefira_viper venefira_viper\n*set cp_boggart_save boggart_save\n*set cp_release_tear release_tear\n*set cp_release_concussion release_concussion\n*set cp_release_destruction release_destruction\n*set cp_warlock warlock\n*set cp_girl girl\n*set cp_name name\n*set cp_female female\n*set cp_male male\n*set cp_conceal conceal\n\n*comment NEW CP\n\n*set cp_staff staff\n*set cp_chain chain\n*set cp_iron iron \n*set cp_salt salt\n*set cp_ointment ointment\n*set cp_shield shield\n*set cp_marble marble\n*set cp_mythril mythril\n*set cp_accelerant accelerant\n*set cp_daggers daggers\n*set cp_charm charm\n*set cp_amulet amulet\n*set cp_poison poison\n*set cp_gauntlets gauntlets\n*set cp_wind wind\n*set cp_flame flame\n*set cp_vines vines\n*set cp_ice ice\n*set cp_earth earth\n*set cp_destruction destruction\n*set cp_concussion concussion\n*set cp_tear tear\n*set cp_darts darts\n*set cp_charisma charisma\n*set cp_resolve resolve\n*set cp_cunning cunning\n*set cp_relationship relationship\n*set cp_stealth stealth\n*set cp_health health\n*set cp_mana mana\n*set cp_gold gold\n\n*page_break\n\n[b]Chapter Two of Four[/b]\n\nThe demon is likely not far ahead, so you decide upon a strategy for ${boggart} and yourself.\n*choice \n\t#He will stay in your backpack in his original form. You would rather keep your ally a secret from your potential enemies.\n\t\t*set relationship %-5\n\t\t*set cunning %-5\n\t\t*set stealth %+3\n\t\tThe demon is easy to track. You stride down a path of splintered branches, dead animals, and pitted soil as you follow his trail. This sort of damage is typical of those beings' delight in destruction. It is said they revel in the deaths of the living. They feed off of souls, after all. You walk steadily along for a little while, soon arriving in a dusty clearing shaded with large, leafy trees. \n\t\t\n\t\tThree figures stand before you in the road, spaced widely apart. They're an odd bunch of people: magic wielders, by the looks of it. To your left is a heavyset woman in a black robe. She carries an assortment of nasty weapons that drip with poison. A painfully thin woman in crimson robe stands to your right, and as to the middle figure… You feel a peculiar attraction toward that third person.\n\t\t*choice\n\t\t\t#He is a rugged and chiseled man, dressed in impossibly tight clothing that highlights his physique.\n\t\t\t\t*set warlock true \n\t\t\t\t*set witch \"warlock\"\n\t\t\t\t*set Illusia \"Illucio\"\n\t\t\t\t*set curvaceous \"toned\"\n\t\t\t\t*set beautiful \"handsome\"\n\t\t\t\t*set woman \"man\"\n\t\t\t\t*goto backpack\n\n\t\t\t#She is a stunning, curvaceous woman with pursed red lips. Her low-cut dress and shimmering necklace accentuate her figure well indeed.\n\t\t\t\t*set girl true\n\t\t\t\t*set he \"she\"\n\t\t\t\t*set witch \"witch\"\n\t\t\t\t*set Illusia \"Illusia\"\n\t\t\t\t*set curvaceous \"curvaceous\"\n\t\t\t\t*set beautiful \"beautiful\"\n\t\t\t\t*set him \"her\"\n\t\t\t\t*set his \"her\"\n\t\t\t\t*set woman \"woman\"\n\t\t\t\t*label backpack\n\t\t\t\t*image Venefira.jpg\n\t\t\t\t*page_break\n\t\t\t\t*image Hestia.jpg\n\t\t\t\t*page_break\n\t\t\t\t*if girl\n\t\t\t\t\t*image Illusia.jpg\n\t\t\t\t\t*page_break\n\t\t\t\t\tYou can't help but stare in amazement at the beauty of this woman. Her brilliant red hair flows flawlessly down her back; her supple, moist lips are pursed in impatience; and her big doe-like eyes seem to swallow you. She has curves in all the right places, and her dress is made to reveal just enough cleavage. \n\t\t\t\t*if warlock\n\t\t\t\t\t*image Illucio.jpg\n\t\t\t\t\t*page_break\n\t\t\t\t\tYou find yourself staring helplessly at this handsome, powerful man. His rippling muscles, broad shoulders, and confident stance completely capture your attention. His verdant eyes are piercing, and you sense a fire within him.  \n\t\t\t\tShaking your head, you break yourself out of your reverie.\n\t\t\t\t\n\t\t\t\t$!{he}'s a ${witch} assassin, and was probably sent to dispatch you! The other two are old acquaintances of yours. Venefira and Hestia are mercenaries wanted in several provinces for their violent crimes. \n\t\t\t\t\n\t\t\t\tYou had never battled either of them personally, but briefly met them once during a long job near the village of Quader. The third person is unknown to you, although you assume ${he} is also a dark magic wielder. \n\t\t\t\t*if ((stealth > 54) or (cunning > 54))\n\t\t\t\t\tUpon further inspection, you see what seems to be a nearly unnoticeable shimmer around\n\t\t\t\t\t*if warlock \n\t\t\t\t\t\this \n\t\t\t\t\t*if girl \n\t\t\t\t\t\ther\n\t\t\t\t\tbody, although it may be a trick of the light. \n\t\t\t\t*label fight_by_yourself\n\n\t\t\t\tThey stand before you expectantly, their expressions ranging from alert to smug. You gently set your backpack on the ground and consider your plan of action, as you know your first move may well be decisive in this battle. Your attention is drawn to a conspicuous tattoo on the mercenaries' foreheads, and you suddenly realize it's written in Infernal! \n\t\t\t\t\n\t\t\t\tThis vile language is generally only known to demons, wizards, and demon hunters, so these marks must have been set in place by the very devil you pursue. You recognize the writing as an ancient ward, a type of seal that must always be set on the bearer's forehead. After a moment, you translate it: [b]\"If I die, you die!\"[/b] \n\t\t\t\t\n\t\t\t\tThis particularly powerful and nasty curse releases a bolt of energy into the heart of whomever kills its bearer, and even a wizard would find it very difficult to deflect it. It can only ever be revoked by the caster himself, which is of course impossible, or by a wizard's intricate spells. \n\t\t\t\t\n\t\t\t\tRegardless of your own preferences, it would be impossible to kill any one of these assassins and still survive this fight. You need to have an end goal in mind when dealing with your opponents, so you quickly come up with a strategy to take care of the assassins.\n\t\t\t\t*fake_choice\n\t\t\t\t\t#You plan to interrogate them by whatever means necessary. Perhaps you can gain valuable information about the demon.\n\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t*set compassionate %-5\n\t\t\t\t\t\t*set info true\n\n\t\t\t\t\t#Just incarcerating them seems practical. You're mainly focused on getting their bounties, after all. Well, that and keeping them from killing you.\n\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t*set altruism %-5\n\t\t\t\t\t\t*set confine true\n\n\t\t\t\t\t#They must be captured, but you mostly hope to dissuade them from their current paths in life.\n\t\t\t\t\t\t*set charisma %+3 \n\t\t\t\t\t\t*set compassionate %+3\n\t\t\t\t\t\t*set altruism %+3\n\t\t\t\t\t\t*set talk true\n\t\t\t\tNow, how best to go about achieving your goals? \n\t\t\t\t*choice\t\n\t\t\t\t\t#You start a dialogue with them, hoping to gain some useful information. \n\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\"Do you have business with me, assassins? Surely, you can't mean to subdue me. My reputation speaks for itself,\" you begin, eyeing each of the mercenaries in turn.\n\n\t\t\t\t\t\tVenefira laughs at you, a guttural sound. \"Very funny, ${hunter}! But no. I will crush you like an insect.\" She folds her arms, staring at you as if hungry for the battle to begin.\n\n\t\t\t\t\t\t\"And what of you, Hestia?\" you ask the fire-witch.\n\n\t\t\t\t\t\t\"Are you brave, or just a fool, speaking to me like that? You'll be little less than ashes to scatter in the winds when I've had my way with you,\" she retorts impassively. \n\n\t\t\t\t\t\tYou nod your understanding, and incline your head toward the \n\t\t\t\t\t\t*if girl\n\t\t\t\t\t\t\tgorgeous assassin, nearly fumbling over your words as you\n\t\t\t\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t\t\t\t*goto flatter\n\t\t\t\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t\t\t\t*goto trade\n\t\t\t\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t\t\t\t*label trade\n\t\t\t\t\t\t\t\tcomment, \"You hardly look like you belong in a battlefield, trading blows alongside a couple of murderers.\"\n\t\t\t\t\t\t\t\t*goto y \n\t\t\t\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t\t\t\t*label flatter\n\t\t\t\t\t\t\t\tinquire, \"And your goal? A woman as fair as yourself need not associate with these murderous villains.\"\n\t\t\t\t\t\t\t\t*goto y \n\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t*goto flatter \n\t\t\t\t\t\t*if warlock\n\t\t\t\t\t\t\tdashing assassin, nearly fumbling over your words as you \n\t\t\t\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t\t\t\t*goto gentle\n\t\t\t\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t\t\t\t*goto wryly\n\t\t\t\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t\t\t\t*label wryly\n\t\t\t\t\t\t\t\tcomment wryly, \"I find it hard to believe that such a dashing gentleman can't find any more suitable career options.\"\n\t\t\t\t\t\t\t\t*goto y \n\t\t\t\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t\t\t\t*label gentle\n\t\t\t\t\t\t\t\tinquire, \"And your goal? A gentleman as handsome as yourself need not associate with these murderous villains.\"\n\t\t\t\t\t\t\t\t*goto y \n\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t*goto flatter \n\t\t\t\t\t\t*label y \n\n\t\t\t\t\t\tThe ${beautiful} ${witch} merely turns \n\t\t\t\t\t\t*if warlock \n\t\t\t\t\t\t\this \n\t\t\t\t\t\t*if girl \n\t\t\t\t\t\t\ther\n\t\t\t\t\t\tnose up at you condescendingly. You cannot discern what ${his} abilities might be, \n\t\t\t\t\t\t*if cunning \u003c 55\n\t\t\t\t\t\t\tnor what the others' are. Unfortunately, they just didn't give you enough information. Suddenly, Venefira growls,\n\t\t\t\t\t\t*if cunning > 54\n\t\t\t\t\t\t\tbut as for the other two, theirs are more transparent. From prior knowledge and judging off of the way they hold themselves, their appearance, their voices and articulation, and the subtle hints slipped in their threats, you determine that the tall spindly witch is fire based, and it's obvious that the brutish witch uses her strength and weapons. \n \n\t\t\t\t\t\t\tIt seems unwise to let yourself get too close to Venefira's weapons. A long-range attack might be your best option in this situation. As you quickly think through your strategy, the brutish assassin bellows,\n\t\t\t\t\t\t\"Enough of this. I'll kill you myself!\" \n\n\t\t\t\t\t\tShe surges forward, daggers slick with viscous black poison. \n\t\t\t\t\t\t*goto see_what_they_do\n\n\t\t\t\t\t#You attack them at once, giving them no time to assemble.\n\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\tReadying yourself, you\n\t\t\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t\t\t*label tak \n\t\t\t\t\t\t\ttake slow, deep breaths.\n\t\t\t\t\t\t\t*goto slow \n\t\t\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t\t\tnarrow your eyes, looking for any weaknesses the mercenary might have.\n\t\t\t\t\t\t\t*goto slow \n\t\t\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t\t\tfocus all your thoughts on how to defeat this villain quickly.\n\t\t\t\t\t\t\t*goto slow \n\t\t\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t\t\ttense your muscles.\n\t\t\t\t\t\t\t*goto slow \n\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t*goto tak \n\t\t\t\t\t\t*label slow \n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Rushing forward, you release a cloud of iron down upon the nearest assassin.\n\t\t\t\t\t\t\t\t*label venefira_iron\n\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\t*set health -4\n\t\t\t\t\t\t\t\t*set iron -1\n\t\t\t\t\t\t\t\tVenefira moves to meet you, daggers in hand. She chuckles huskily, \"Ahhh…. Just how I like it!\" \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tThe cloud of glistening iron you throw catches her attention and she stares for a second, then grins viciously. Crouching, she leaps impossibly high above your head. There is a great rush of air from her ascent, and although she misses the majority of the iron cloud, a few metal shavings are drawn into her robe. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tWailing with pain, she bears down on you and feints, her knife in a reverse grip. Almost too quickly to follow, she jerks her blade back-handed toward your fighting arm. You dive beneath her thrust, barely avoiding the toxic edge. She follows your movements with a volley of throwing daggers that hit the ground, throwing up gravel and puffs of dust. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou move out of the roll and begin to circle around her, eyes burning. She darts forward, anticipating you, and grabs your arm while bringing her knee soundly into your stomach. You double over, but use your momentum and your free arm to break her grip. Diving forward, you slam into her full-on, taking her by surprise, and you use your split-second's advantage to grab her legs and lift, forcing her to the ground. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou pin her knife-hand against her body with your arm, and her poisoned knife opens a vein in her thigh. Blood sprays into the air and her head rolls back as she falls unconscious, plagued by some sort of feverish effect from the poisons.\n\t\t\t\t\t\t\t\t*if venefira\n\t\t\t\t\t\t\t\t\t*goto loot \n\t\t\t\t\t\t\t\t*goto face_hestia\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#Your silver chain could easily take out one of the assassins.\n\t\t\t\t\t\t\t\t*label venefira_chain\n\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t*set cunning %+3\n\n\t\t\t\t\t\t\t\tYou unravel your silver chain, rushing forward and casting the chain through the air toward Venefira. She steps back and raises her arm, sending her daggers flying toward you. Two of them impact the chain, showering sparks as they ricochet to the ground. Your chain flails spastically but the tip flips back around, slapping her in the face. As she topples to her knees, saliva flies from her mouth. Her face is frozen in pain and bloody. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou quickly arm your staff, activating the daggers on its butt and tip, and bring it down with both hands as she tries to move away. Your dagger lacerates her arms just as she raises them to guard herself, and you quickly thrust the weapon forward and into her shoulder. Your adversary coughs weakly, blood trickling out of her mouth, before crumpling to the ground, immobile.\n\t\t\t\t\t\t\t\t*if venefira \n\t\t\t\t\t\t\t\t\t*goto loot\n\t\t\t\t\t\t\t\t*goto face_hestia\n\n\t\t\t\t\t\t\t*selectable_if (darts > 2) #You take down an assassin with your poisonous darts.\n\t\t\t\t\t\t\t\t*goto venefira_darts\n\n\t\t\t\t\t\t\t*selectable_if (staff) #Surging forward, you raise your staff with its dagger extended.\n\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\t*set health -2\n\t\t\t\t\t\t\t\t*set staff false\n\t\t\t\t\t\t\t\tThe brutish assassin chuckles huskily and utters, \"Ahhh…just how I like it!\"\n\n\t\t\t\t\t\t\t\tShe races forward to confront you, slipping a dagger dripping with black poison into her massive hand. As you swing your staff to intercept her, she deftly ducks beneath your strike. Your momentum carries you forward and you nearly overbalance, barely able to dodge her subsequent attack. Her dagger streaks over your head, so closely you can feel the coolness of the blade at your temple.\n\n\t\t\t\t\t\t\t\tVenefira pushes forward, driving you farther back with every strike. Suddenly drawing the cruel looking mace from its bindings, she smashes it across your staff. Your weapon splinters in two and the force drives you to the ground with a thud, though you manage to graze her arm with your shattered staff. She laughs mirthlessly, \"Ha! Is that your best attempt to evade death, demon ${hunter}?\"\n\n\t\t\t\t\t\t\t\tHer gloating is replaced by shock as the chemicals coating your staff take effect. She grunts in pain, clutching her arm and dropping her last dagger in the process. You arch your back and slam your boot into the witch's face with a crunch, sending her staggering backwards with blood gushing from her nostrils. Rolling deftly to your feet, you turn to confront the assassin. With a primal roar that sends shivers up your spine, the witch surges forward, hefting her mace. \n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#You bind the assassin with your silver chain.\n\t\t\t\t\t\t\t\t\t\t*goto mace_chain\n\n\t\t\t\t\t\t\t\t\t*selectable_if (darts > 2) #Quickly, you take out your poisonous darts.\n\t\t\t\t\t\t\t\t\t\t*goto mace_darts\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*selectable_if (destruction=1) #You blast the assassin with your destruction grenade.\n\t\t\t\t\t\t\t\t\t\t*set destruction -1\n\t\t\t\t\t\t\t\t\t\t*set health -3\n\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\tCasting the grenade through the air at the assassin, you run backwards, moving a safe distance away. She growls in annoyance and springs backwards to safety behind a granite outcropping with an astounding series of handsprings. The grenade detonates in a massive cloud of pitch-black smoke and vibrant fire, and you hear a groan as debris rains down around her. She creeps out from behind the rock, gasping as the cramps in her arm reach their pinnacle.\n\n\t\t\t\t\t\t\t\t\t\tYou approach her, swinging your blade toward her chest, but she ducks and counters with a punch of her massive hand right into your stomach. Your rib cracks under her terrible strength, and you stagger backwards, gritting your teeth in pain. You straighten out and fling one of your throwing daggers. It hits her in the thigh, violently spraying blood. She loses her footing and crumples to the ground, unconscious. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tPacing over to your fallen opponent, you promptly retrieve your dagger from her body.\n\t\t\t\t\t\t\t\t\t\t*goto face_hestia\n                                                        \n\t\t\t\t\t\t\t\t\t*selectable_if (tear > 0) #You manifest your grenade from your satchel, activate it, and cast it through the air at your adversary. \n\t\t\t\t\t\t\t\t\t\t*set tear -1\n\t\t\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t\t\t*set health -2\n\t\t\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\t\t\tShe narrows her eyes and slams her mace into the grenade and it detonates in a churning cloud of tear gas. The husky cries of pain and violent coughs that ensue give away her position. You draw your dagger from your belt and rush forward to strike her down. She stumbles out of the cloud, inadvertently releasing her mace. Her beady eyes are blurry and blood drips from her nostrils.\n\n\t\t\t\t\t\t\t\t\t\tYou take her by surprise, easily ducking her wildly thrown punch and slashing your knife across her legs. Bellowing in pain, she falls to her knees. You turn to strike her down when she suddenly swivels around and swings her fist through the air. She catches you heavily in the shoulder, and the strength of her blow sends you crashing to the dirt, the air stolen from your lungs. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tAs the assassin staggers to her feet, her legs bloody and her arm held out loosely, contorted from the poison, you follow up with a knife throw. Your blade hits her shoulder, and she crumples to the ground unconscious. You pull yourself up and rush forward to retrieve your dagger from her body.\n\t\t\t\t\t\t\t\t\t\t*goto face_hestia\n\n\t\t\t\t\t\t\t\t\t*selectable_if (iron > 0) #You prepare to release a cloud of iron.\n\t\t\t\t\t\t\t\t\t\t*set iron -1\n\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\t*set health -4\n\t\t\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\t\t\tYou plunge your free hand into your pocket, your other hand holding your dagger in front of you, and wait until Venefira closes in. When she approaches, you release a glistening black cloud of iron upon her. Glaring at you, the assassin dives frantically to the side but to no avail. She isn't quite fast enough and the iron leaves burns across her body. Growling in pain, she lifts her mace and begins to advance again.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tShe swings it at your head, and you duck backwards, the weapon landing on the ground beside you and throwing up dirt and rocks. Choking on the dust, you move forward, leading with your blade, but she brings her mace around again. Diving backwards, you are not fast enough to avoid a glancing blow. The spikes tear at your robes and flesh and you are once again knocked to the ground. You gasp as the fall increases the pain in your chest. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tStiffening as Venefira moves forward with her mace raised, you are about to do something, anything, when Venefira suddenly grunts in pain. Her wounded arm locks up from the poison's effects, and the mace falls from her hands, narrowly missing your legs. You quickly push yourself into a crouch and lunge forward with your dagger. The wounds have finally caught up to the witch, and she doesn't move quickly enough to dodge your attack. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tYour blade sinks into her shoulder and she crumples to the ground, unconscious.\n\t\t\t\t\t\t\t\t\t\t*goto face_hestia\n\n\t\t\t\t\t\t\t\t\t*selectable_if (concussion > 0) #A concussion grenade should put her out of commission quickly.\n\t\t\t\t\t\t\t\t\t\t*set concussion -1\n\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\t*set cunning %+3 \n\t\t\t\t\t\t\t\t\t\tYou toss your grenade and it detonates with an ear-splitting bang. She staggers back, disoriented, as you rush forward. You prepare to take her down with your dagger but she brings her mace to bear and swings it diagonally, clearly still off-balance. You easily avoid her half-controlled blow and sink your dagger into her shoulder. She bellows in anger, blood flowing as she collapses to the dirt, pale and immobile. \n\t\t\t\t\t\t\t\t\t\t*goto face_hestia \n\n\t\t\t\t\t\t\t\t\t*selectable_if (destruction=1) #Blast her with your destruction grenade.\n\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\t\t\t*set health -4\n\t\t\t\t\t\t\t\t\t\t*set destruction -1\n\t\t\t\t\t\t\t\t\t\tVenefira smirks as the grenade hurtles toward her, and she makes an impossible throw with her dagger. It all happens so fast that you can only see a blur of motion, and then the knife somehow cleaves the grenade in half! The two parts clatter to the ground with a disappointing little explosion, disturbing the dry soil but falling far short of your opponent.\n\t\t\t\t\t\t\t\t\t\t*goto failed_grenade \n\n\t\t\t\t\t\t\t\t\t*selectable_if (concussion > 0) #Stun her with a concussion grenade.\n\t\t\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\t\t\t*set health -4\n\t\t\t\t\t\t\t\t\t\t*set concussion -1\n\t\t\t\t\t\t\t\t\t\tCasting the grenade into the air, you see Venefira let go of a dagger in an impossibly clean throw. Before you can react, the knife cleaves the grenade in half and both halves tumble to the ground. There is a sad little pop as they detonate, but nothing more. \n\t\t\t\t\t\t\t\t\t\t*goto failed_grenade\n\n\t\t\t\t\t#You decide to retreat. You are clearly outmatched and lack a defensible position.\n\t\t\t\t\t\t*set relationship %-5 \n\t\t\t\t\t\t*set pet_hurt true\n\t\t\t\t\t\t*set resolve %-5\n\t\t\t\t\t\t*set charisma %-5\n\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\tSweat beads on your forehead as panic courses throughout your veins. Your legs begin to quiver and you feel butterflies raging inside your stomach. A crooked smile crosses the brutish witch's face as she sees you hesitate. You swivel on your feet, snatching up your backpack, and run toward the forest behind you to the sound of Venefira's derisive cackling. Just as you reach the perimeter of the clearing, you hear a grunt of exertion and an ominous whistling sound pierces the air.\n\t\t\t\t\t\t\n\t\t\t\t\t\tFrom the corner of your eye you see a dagger dripping with poison coming toward you, and two more soon follow it. You weave desperately, hoping to avoid the poisoned blades, when ${boggart} suddenly shoots from your backpack, wings outstretched. He twists backwards in the air and uses his leathery wings to sweep several of the daggers to the ground, deflecting a stray blade with his scorpion tail.\n\n\t\t\t\t\t\tHe wheels in the air but misses the final dagger. It grazes his small chest and sends him spiraling into a tree before crashing to the dirt. Stirring feebly, your companion is bleeding, unconscious, and shaking with the effects of the poison. You steady yourself and shake all thoughts of retreat from your mind. ${boggart}'s life is now in imminent danger. You are the only one who can rescue him. \n\t\t\t\t\t\t\n\t\t\t\t\t\tYou swivel on your feet and prepare to aid your apprentice, but Hestia quickly steps in between you, her face impassive. Guffawing huskily, Venefira roars, \"Thought you could run from me? Hestia, show this fool what we think of cowards and their accomplices!\"\n\n\t\t\t\t\t\tHestia complies, producing a sphere of crimson fire in her hand as she steps closer to your helpless companion. You rush forward, brandishing your staff, and yell, \"NO!\" but the brutish witch intercepts you, hefting a cruel looking mace into her thick hands. \n\n\t\t\t\t\t\t\"Where do you think you're going? You get to see your little imp burn before you perish!\" \n\n\t\t\t\t\t\tYou glare at the assassin and peer around her massive shoulders to see Hestia advancing. ${boggart} does little more than stir feebly. Venefira surges forward, swinging her mace through the air.\n\t\t\t\t\t\t*goto beat_venefira \n\t\t\t\t\t\n\t\t\t\t\t#You stand your ground, allowing your enemies to commence the battle. \n\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tYou have learned many things in your time as a ${hunter} of the dark, but first and foremost is that in order to maintain the upper hand, you must always act carefully. \n\t\t\t\t\t\t*if (charisma > 52) \n\t\t\t\t\t\t\tAfter all, the best offense is a good defense! \n\t\t\t\t\t\tAfter a moment's pause, Venefira pulls out her throwing daggers and sprints toward you at an alarming rate.\n\t\t\t\t\t\t*goto see_what_they_do \n\t\t\t\t\t\n\t*selectable_if (transformations_toad) #You ask ${boggart} to transform into a poisonous toad. (Requires one mana.)\n\t\t*set stealth %+3\n\t\t*set mana -1\n\t\t*set darts +3\n\t\t*set relationship %+3 \n\t\tYou reach backward, activating the buckles on your backpack. ${boggart} leaps out, landing gently onto your shoulder, and you tell him, \"In order to prepare for what's ahead, I'll need to use your poison to enhance my darts.\" \n\n\t\tHe nods, and with a minuscule puff of pale smoke, he changes into a tiny toad. Donning your gloves, you hold out one hand. He leaps onto the center of your palm, sitting patiently as you capture drips of venom with a small vial. The venom can paralyze a victim within moments. Studying it thoughtfully, you gingerly dip three darts into the poison and put two of them in a small metal case, inserting the third into your reed blowpipe. \n\t\t\t\t\n\t\tAs your companion settles onto your shoulder, you\n\t\t*if relationship > 54 \n\t\t\tsay warmly, \"I'm lucky to have you along, ${boggart}. Thank you for the help.\"\n\t\t\t\t\t\n\t\t\tBeaming, he replies, \"Of course, ${name}! What would you do without me?\"\n\t\t*if relationship \u003c 50 \n\t\t\tadd, \"Try not to get stepped on this time, ${boggart}.\"\n\t\t\t\t\t\n\t\t\tFrowning, he counters, \"I'd say that to you, but you're too fat for people to step on you!\"\n\t\t\t\t\t\n\t\t\tFurrowing your brow, you reply incredulously, \"That doesn't even make any sense.\"\n\t\t*if relationship > 49 \n\t\t\tthank him and then head farther down the trail. \n\t\t*goto toad\n\n\t*selectable_if (transformations_viper) #${boggart}'s electric viper form can aid you in battle, whether he spies on the enemies or uses his quick speed and electrifying skin. (Requires two mana.)\n\t\t*set stealth %+3\n\t\t*set resolve %+3\n\t\t*set mana -2\n\t\t*set relationship %+3\n\t\tYou reach around, unstrapping your backpack, and ${boggart} leaps into the air with a swish of his wings. He lands on your shoulder lightly, and you tell him, \"In the event of a fight, I may need you by my side to aid me. I'd like you to transform into the viper.\" \n\n\t\t${boggart} nods and transforms with a small puff of granite-colored smoke. He slithers up your arm, gently draping himself over your shoulders and hiding beneath the folds of your cloak as you travel the road.\n\t\t*goto toad \n\t\t*label viper\n\t\t*set venefira_viper true\n\t\tBefore long, the deciduous trees thin and you approach a small clearing. ${boggart} tenses, hissing at the vile smell of dark magic wielders. \n\t\t\n\t\tYou edge forward quietly. Concealed by the foliage, you peer into the clearing. Three figures stand before you in the road, spaced widely apart, and they make an odd trio. To your left is a stocky woman in a black robe. She carries an assortment of nasty weapons that appear to be dripping with poison. A painfully thin woman in crimson robe stands to your right, and as to the middle figure… To be truthful, you feel a sudden, peculiar attraction tug at you.\n\n\t\t*goto choices \n\t\t\t*label choices \n\t\t\t*choice\n\t\t\t\t#You are looking at a stunning, curvaceous woman with pursed red lips. Her low-cut dress and shimmering necklace accentuate her figure very well indeed.\n\t\t\t\t\t*set girl true\n\t\t\t\t\t*set he \"she\"\n\t\t\t\t\t*set witch \"witch\"\n\t\t\t\t\t*set Illusia \"Illusia\"\n\t\t\t\t\t*set curvaceous \"curvaceous\"\n\t\t\t\t\t*set beautiful \"beautiful\"\n\t\t\t\t\t*set him \"her\"\n\t\t\t\t\t*set his \"her\"\n\t\t\t\t\t*set woman \"woman\"\n\t\t\t\t\t*label attraction_viper\n\t\t\t\t\t*image Venefira.jpg\n\t\t\t\t\t*page_break\n\t\t\t\t\t*image Hestia.jpg\n\t\t\t\t\t*page_break\n\t\t\t\t\t*if girl\n\n\t\t\t\t\t\t*image Illusia.jpg \n\t\t\t\t\t\tYou can't help but stare at her beauty. Her brilliant red hair flows down her back; her supple, moist lips are pursed in impatience; and her big, doe-like eyes seem to swallow you. She has curves in all the right places, and her dress is cut to reveal just enough cleavage. \n\t\t\t\t\t*if warlock\n\n\t\t\t\t\t\t*image Illucio.jpg\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tYou find yourself staring at this handsome, powerful man. His rippling muscles, broad shoulders, and confident stance capture your attention. His verdant eyes hint at a fire burning within him. \n\t\t\t\t\tShaking your head, you break yourself out of your reverie; ${he}'s a ${witch} assassin, and was probably sent here to murder you! \n\t\t\t\t\t\n\t\t\t\t\tThe other two are old acquaintances of yours. Venefira and Hestia are mercenaries wanted in several provinces for their violent crimes. You have never battled either of them personally, but you briefly met once during a long job near the village of Quader. The third person is unknown to you, although you assume ${he} is also a dark magic user.\n\t\t\t\t\t*if ((stealth > 54) or (cunning > 54))\n\t\t\t\t\t\tUpon further inspection, you're almost certain you see a slight shimmer around\n\t\t\t\t\t\t*if warlock \n\t\t\t\t\t\t\this \n\t\t\t\t\t\t*if girl \n\t\t\t\t\t\t\ther\n\t\t\t\t\t\tbody, though it could just be your eyes playing games with you.\n\n\n\t\t\t\t\tWhispering softly to your apprentice, you instruct, \"${boggart}, sneak up into the trees and sniff out those assassins. I'd like to know what their powers are.\"\n\n\t\t\t\t\tFlicking his tongue at you, he quickly exits your robe and slithers up the nearest tree. A few moments later, he returns to you and whispers in his serpentine language, \"The aura that comes off of them is disgusting. They're definitely dark magic wielders. It seems like the green one is strong, and the skinny one uses fire. But I can't tell what the last one's powers are.\"\n\t\t\t\t\t*if relationship > 54 \n\t\t\t\t\t\n\t\t\t\t\t\tCommending your apprentice, you respond, \"Good job, little one! This information should prove useful in this battle.\" \n\t\t\t\t\t*if relationship \u003c 50\n\t\t\t\t\t\n\t\t\t\t\t\tYou grunt in response, nodding.\n\t\t\t\t\t*if relationship > 49 \n\t\t\t\t\t\n\t\t\t\t\t\t\"Thank you,\" you murmur. \"That should be helpful.\" \n                                \n\t\t\t\t\tAs you peer intently at the assassins, your attention is drawn to a conspicuous tattoo on their foreheads. You suddenly realize it is written in Infernal! This vile language is generally only known to demons, wizards, and demon hunters. You recognize the writing as an ancient ward, a type of seal that must always be set on the bearer's forehead. After a moment's concentration, you translate it: [i]\"If I die, you die!\"[/i] \n\t\t\t\t\t\n\t\t\t\t\tThis powerful and nasty curse releases a bolt of energy into the heart of whomever kills its bearer. Even a wizard would find it very difficult to deflect its power. It can only be revoked by the caster himself or by a wizard's intricate spells. If you want to survive this fight, you must be careful not to kill any one of these assassins.\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#You will, however, interrogate them by any means necessary. Perhaps you can gain valuable information about the demon.\n\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t*set charisma %-5 \n\t\t\t\t\t\t\t*set compassionate %-5\n\t\t\t\t\t\t\t*set cunning %+3 \n\t\t\t\t\t\t\t*set info true\n\n\t\t\t\t\t\t#You just plan to incarcerate them. You're mainly focused on getting their bounty.\n\t\t\t\t\t\t\t*set resolve %+3 \n\t\t\t\t\t\t\t*set altruism %-5 \n\t\t\t\t\t\t\t*set confine true\n \n\t\t\t\t\t\t#Although these villains must be confined, you also hope you might dissuade them from their current paths in life.\n\t\t\t\t\t\t\t*set charisma %+3 \n\t\t\t\t\t\t\t*set compassionate %+3\n\t\t\t\t\t\t\t*set altruism %+3\n\t\t\t\t\t\t\t*set resolve %-5 \n\t\t\t\t\t\t\t*set stealth %-5 \n\t\t\t\t\t\t\t*set talk true\n\n\t\t\t\t\tNow that you have a general plan, you \n\t\t\t\t\t*goto stride\n\n\t\t\t\t\t*label electric_viper\n\t\t\t\t\tYou then \n\t\t\t\t\t*label stride\n\t\t\t\t\tstride out confidently into the clearing. The brutish assassin swivels to face you, snickering, \"Siblings, \n\t\t\t\t\t*if female\n\t\t\t\t\t\tshe's\n\t\t\t\t\t*if male\n\t\t\t\t\t\the's\n\t\t\t\t\there, and how frail \n\t\t\t\t\t*if female\n\t\t\t\t\t\tshe\n\t\t\t\t\t*if male\n\t\t\t\t\t\the\n\t\t\t\t\tlooks! I will take care of this.\" \n\t\t\t\t\t\n\t\t\t\t\tAs she surges forward, hefting a spiked mace, she lets out a roar that sends shivers up your spine.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#You bind the assassin with your silver chain.\n\t\t\t\t\t\t\t*goto mace_chain\n\n\t\t\t\t\t\t#A cloud of iron should be enough to defeat this witch.\n\t\t\t\t\t\t\t*set iron -1\n\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t*set health -4\n\t\t\t\t\t\t\t*goto venefira_viper_iron\n\n\t\t\t\t\t\t*selectable_if (tear > 0) #You attack with a tear gas grenade.\n\t\t\t\t\t\t\t*set tear -1\n\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\tYou cast the grenade through the air, and it detonates in a churning cloud of tear gas. Venefira shrieks in agony, clutching at her burning throat as she staggers out of the noxious fumes. You rush toward her and swing your staff at her chest. Squinting, she raises her mace and blocks your attack with its shaft, your arms nearly touching. Then ${boggart} suddenly darts from your robe, wrapping around her arm and giving her a violent shock.\n\n\t\t\t\t\t\t\tHer eyes wide, she wobbles, dropping her mace, but then she lunges forward and brings her fist toward your face. You adroitly move out of range, slamming your staff into her skull with an audible crack, and she falls to the ground, unconscious.\n\t\t\t\t\t\t\t*goto face_hestia\n\n\t\t\t\t\t\t*selectable_if (destruction=1) #Blast the assassin with your destruction grenade.\n\t\t\t\t\t\t\t*goto absolve \n\n\t\t\t\t\t\t*selectable_if (concussion > 0) #You pull out one of your stun grenades, hoping to slow her down.\n\t\t\t\t\t\t\t*set concussion -1\n\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\tYou toss your grenade as she runs toward you, and it detonates with an ear-ringing bang. The witch bellows huskily, staggering backwards. You rush to meet her and bring your staff down, hard, onto her skull. She cries out in pain but somehow keeps her footing, lunging forward and grabbing you by the throat before you have time to lift your staff. Suddenly, ${boggart} darts from your robe and wraps around her arm. Venefira startles and steps back. \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tHe delivers a violent jolt as soon as her hands leave your neck, then quickly slithers back onto your robes. Venefira reels away in surprise as the shock courses through her body, shaking as she drops her mace. Taking the opportunity, you slam your weapon into her throat and fell her unconscious to the ground.\n\t\t\t\t\t\t\t*goto face_hestia\n\n\t\t\t\t\t\t*selectable_if (staff) #You stand firm and raise your staff, ready to fight.\n\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t*set health -4\n\t\t\t\t\t\t\t*set staff false\n\t\t\t\t\t\t\tVenefira rushes forward, smirking derisively, and slams her gigantic mace into your staff. The force of her blow sends you plummeting to the ground, the pieces of your splintered staff falling down uselessly beside you. Rolling, you leap to your feet. The witch is already swinging her weapon, and you frantically dive to one side. Tumbling across the ground, you cough violently from the cloud of dust the mace sent up when it hit the earth. \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tSuddenly, she appears out of nowhere. You duck and move forward to grapple with her, but it's like trying to fight against a wall. A very sturdy, extremely angry wall. You tense, unsure of what to do, when ${boggart} suddenly darts from your robe and wraps himself around her neck. She reels away in surprise and you quickly step back. As soon as you're clear, he gives her a tremendous shock and then slithers quickly back to you. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe witch roars, dropping her weapon and shaking violently. You crouch and then pivot in a roundhouse kick, hitting her squarely on the jaw. She topples, but is on her feet in a moment. Frowning, she drives her fist into your chest with a thud. The wind is knocked from your lungs as you collapse to the dirt, and you clamber to your feet, gasping. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tShe retrieves her mace and advances, a murderous glint flashing in her small eyes. With a desperate burst of energy, you draw your dagger and throw it toward her. The blade pierces her shoulder neatly. Blood gushes from the wound, and she growls weakly before collapsing to the ground, unconscious.  \n\t\t\t\t\t\t\t*label face_hestia\n                                                \n\t\t\t\t\t\t\tAt this point, you're really wondering why these assassins have chosen to battle you one-on-one. It seems as though their bravado has descended into stupidity. Turning to face your remaining opponents, you are met with Hestia's stony glare. She summons a sphere of crimson fire in her hand and catapults it at you!\n\t\t\t\t\t\t\t*goto hit_hestia\n                                        \n\t\t\t\t#He is a rugged and chiseled man, dressed in impossibly tight clothing that highlights his perfect physique.\n\t\t\t\t\t*set warlock true \n\t\t\t\t\t*set witch \"warlock\"\n\t\t\t\t\t*set Illusia \"Illucio\"\n\t\t\t\t\t*set curvaceous \"toned\"\n\t\t\t\t\t*set beautiful \"handsome\"\n\t\t\t\t\t*set woman \"man\"\n\t\t\t\t\t*goto attraction_viper\n\n\t#If ${boggart} stays in his original form, he can sniff out any powered adversaries before they reach you.\n\t\t*set relationship %+3\n\t\t*set cunning %+3\n\t\t*if relationship > 49 \n\t\t\t\"Come on out, ${boggart}!\" you say lightly. \n\t\t*if relationship \u003c 50 \n\t\t\t\"All right, time to make yourself useful, boggart,\" you say brusquely. \n\n\t\tHappy to get some fresh air and stretch his tiny limbs, ${boggart} leaps from your backpack and flutters onto your shoulder.\n\t\t*if relationship > 49 \n\t\t\tYou exchange smiles before continuing on your way. \n\t\t*if relationship \u003c 50 \n\t\t\tYou continue down the path, focused on the road ahead.\n\t\t*label toad\n\t\tThe demon is easy to track. You stride down a path of splintered branches, dead animals, and pitted soil, typical of these beings' delight in destruction. \n\t\t\n\t\tIt is said all demons revel in the deaths of the living. Perhaps it's because they consume souls.\n\t\t*if (transformations_viper)\n\t\t\t*goto viper\n\t\tAfter a few minutes of walking through the forest, you approach a clearing surrounded by leafy green trees. ${boggart} suddenly sniffs wildly at the air, quickly whispering, \"${name}, I smell three dark magic users up ahead!\"\n\t\t\t\n\t\t*if relationship > 49 \n\t\t\tYou shoot ${boggart} a smile and mouth \"good job\" \n\t\t*if relationship \u003c50 \n\t\t\tYou nod in acknowledgement \n\t\tbefore kneeling down and pulling your hood over your head. You cautiously peer through the dense thicket, ${boggart} standing quietly on your shoulder. Three figures stand before you in the road, spaced widely apart, and they make an odd trio. To your left is a stocky woman in a black robe. She carries an assortment of nasty weapons that seem to be dripping with poison. \n\t\t\t\n\t\tA painfully thin woman in a crimson robe stands to your right, and as to the middle figure… To be honest, you feel a peculiar attraction pulling at you. \n\t\t*goto choices4 \n\t\t\t*label choices4 \n\t\t\t*choice\n\t\t\t\t#You are looking at a stunning, curvaceous woman with pursed red lips. Her low-cut dress and shimmering necklace accentuate her figure very well.\n\t\t\t\t\t*set girl true\n\t\t\t\t\t*set he \"she\"\n\t\t\t\t\t*set witch \"witch\"\n\t\t\t\t\t*set Illusia \"Illusia\"\n\t\t\t\t\t*set curvaceous \"curvaceous\"\n\t\t\t\t\t*set beautiful \"beautiful\"\n\t\t\t\t\t*set him \"her\"\n\t\t\t\t\t*set his \"her\"\n\t\t\t\t\t*set woman \"woman\"\n\t\t\t\t\t*label original\n\t\t\t\t\t*image Venefira.jpg\n\t\t\t\t\t*page_break\n\t\t\t\t\t*image Hestia.jpg\n\t\t\t\t\t*pag
