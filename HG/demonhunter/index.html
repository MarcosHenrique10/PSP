, then kick his dropped dagger into the woods. Darting away from your staff arm, he begins to run. Even at top speed, you're barely able to overtake him. \n\t\t\t\t\t\t\n\t\t\t\t\t\tYou swing your staff through the air, cracking his skull. He falls to the ground, and you drag him roughly back to the others. Kneeling down beside them, you begin to rifle through their belongings.\n\t\t\t\t\t\t*goto coins \n\n\t\t\t\t\t#A surprise ambush from the trees above should turn the tide in your favor.\n\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t*set cunning %-5 \n\t\t\t\t\t\tYou clear your throat, saying, \"${boggart} I'll \n\t\t\t\t\t\t*if conceal\n\t\t\t\t\t\t\tconceal myself in the trees above until the bandits pass.\n\t\t\t\t\t\t*if not(conceal)\n\t\t\t\t\t\t\thide in the foliage and leap down on these bandits. I should be able to take out one or two before they can counterattack.\n\t\t\t\t\t\tKeep an eye on the trail so that I'll have warning of their arrival. I'll need about a minute's notice, and a loud shriek should do nicely.\"\n\n\t\t\t\t\t\t${boggart} chirps, \"You got it!\" in his peculiar bird-sound code and soars into the sky. \n\t\t\t\t\t\t\n\t\t\t\t\t\tHe glides in lazy circles, vigilantly watching the bandits' progress. Meanwhile, you pick a sturdy, full yew tree for your perch\n\t\t\t\t\t\t*if conceal\n\t\t\t\t\t\t\t.\n\t\t\t\t\t\t*if not(conceal)                 \n\t\t\t\t\t\t\tthat overhangs the trail. \n\t\t\t\t\t\tYou scale the tree and are just settling into place behind its leaves when ${boggart} screeches, signaling the arrival of the little band. The silhouettes of the criminals appear over a small hill a few moments later, the sun shining at their backs. \n                                                \n\t\t\t\t\t\tThere is a thin woman carrying a crossbow; a short, slight man with no visible weapons; and a burly, red-haired swordsman. As they approach, you hear the swordsman complain, \"If you'd been a better shot, we could have sold that falcon's feathers!\"\n\n\t\t\t\t\t\tThe woman gestures with her crossbow, replying in a husky alto, \"Are you as stupid as you look? That wasn't a falcon, it was an owl!\"\n\n\t\t\t\t\t\tThe smaller man interjects, \"No, but really, do you think it would have tasted good?\" \n\t\t\t\t\t\t*label conceal \n\t\t\t\t\t\t*if conceal\n\t\t\t\t\t\t\tYou roll your eyes at these idiots and feel a strong impulse to ambush them, but you had already made up your mind to stay your attack.\n\t\t\t\t\t\t\t*if ((stealth \u003c 55)) or ((cunning \u003c50)) \n\t\t\t\t\t\t\t\t*set cunning %-5 \n\t\t\t\t\t\t\t\t*set health -5\n\t\t\t\t\t\t\t\tAs the bandits pass, you hold your breath and try your best to stay absolutely still. One toe slips, and you accidentally set a lone branch rattling. You freeze, but the shortest bandit looks up instantly and you find yourself staring right into his verdant eyes. \"Oy, above!\" he shouts, and instantly the woman raises her crossbow.  \n                                                                \n\t\t\t\t\t\t\t\t\"You sneaky little rat!\" she shouts, promptly firing a bolt at you. As you pitch to one side, the arrow narrowly whistles past your head. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou maneuver so that the trunk is between you and the bandits as you drop to the ground, landing gently on your feet. You raise your staff to a low guard, unsheathing its daggers. As you block a stiff blow from the redheaded swordsman, his eyes widen at your skill. You press forward, hooking his ankle with yours, and he loses his balance and falls backwards to the dirt. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou are about to turn and face the others when you feel a deep, sharp pain. The other bandit has quite literally stabbed you in the back! You pull away, dazed, when you suddenly notice the woman raising her crossbow again. You duck as ${boggart} dives through the air, raking at her cheek. She drops the weapon, arms coming up to protect her face. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tWhile she is distracted, you ram your staff into the rising swordsman, catching him in the gut and felling him a second time. You turn toward the shorter man, and he turns and darts out of range of your staff. You run after him, finding to your surprise that it takes all your effort to keep up with him. You push yourself all the more and soon catch him, swinging your staff into his skull with a sturdy blow.\n\n\t\t\t\t\t\t\t\tAs the small man falls to the ground, you turn cautiously toward the others. The woman is attempting to stand, but you rap her once across the temple. She moans softly and slumps over, unconscious. The burly man has gotten back to his feet, grimacing, and he charges forward with his claymore raised. You block the edge, but the force of his blow dents the metal band on your staff, your hands growing numb from the impact. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tGritting your teeth, you move forward as he lowers his sword for another swing, kneeing him hard just beneath the sternum. He moans and you follow up with a hearty blow from your staff. This time, he should stay down for a while longer.\n\t\t\t\t\t\t\t\t*label okay\n                                                                \n\t\t\t\t\t\t\t\t${boggart} flutters to the ground next to you, chirping his concern with eagle-speech. You reply, \n\t\t\t\t\t\t\t\t*label reply \n\t\t\t\t\t\t\t\t*if relationship > 49 \n\t\t\t\t\t\t\t\t\t\"Thank you for your thoughts, my little friend, but I'm just fine.\"\n\n\t\t\t\t\t\t\t\t\t${boggart} attempts a smile, and you laugh. The smile makes his eagle form look comically confused. You stroke his feathers affectionately, then\n\t\t\t\t\t\t\t\t*if relationship \u003c 50\n\t\t\t\t\t\t\t\t\t\"What do I look like to you, a child? Of course I'm fine.\"\n                                                                        \n\t\t\t\t\t\t\t\t\tGlaring at you, ${boggart} clicks his beak in distaste, dismissing you with a flair of his wings. You\n\t\t\t\t\t\t\t\t*label rifle\n\t\t\t\t\t\t\t\tturn around, kneeling down beside the three bandits lying prone in the dirt. You begin to rifle through their belongings, always an interesting part of your payment as a demon ${hunter}.\n\t\t\t\t\t\t\t\t*goto coins\n                                                                                \n\t\t\t\t\t\t\t*if (stealth > 54)\n\t\t\t\t\t\t\t\t*set compassionate %-5 \n\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\tAs the bandits pass, you hold your breath and stay absolutely still. They continue arguing as they walk beneath you, never once thinking to look up. Their voices eventually fade, and you wait a few moments before clambering back to the ground. ${boggart} flutters to the ground next to you, saying in his eagle-speech, \"That went well!\" \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if relationship > 54 \n\t\t\t\t\t\t\t\t\tNodding with a smile, you respond, \"Indeed it did.\"\n\t\t\t\t\t\t\t\t*if relationship \u003c 50 \n\t\t\t\t\t\t\t\t\t\"Wonderful observation,\" you growl.\n\t\t\t\t\t\t\t\t\t*goto not_done \n\t\t\t\t\t\t\t\t*if relationship > 50 \n\t\t\t\t\t\t\t\t\t\"But of course,\" you reply.\n\t\t\t\t\t\t\t\t*label not_done\n\t\t\t\t\t\t\t\t*if not_done\n                                                                \n\t\t\t\t\t\t\t\t\tYou then turn your attention to the three bandits lying prone in the dirt. \n\t\t\t\t\t\t\t\t\t*goto coins  \n\t\t\t\t\t\t\t\t*goto finish_route \n                                                        \n\t\t\t\t\t\t\t*set health -2 \n\t\t\t\t\t\t\tWhat idiots…. You leap from your hiding place with a rustle of leaves and drop onto the swordsman, your feet hitting his collarbone as you drive him to the ground. The woman raises her bow, but you've already brought your staff to bear and you ram the tip into her liver. She collapses, groaning and unconscious.\n\n\t\t\t\t\t\t\tYou turn to confront the short, slight man. As he darts forward with a dagger, you lunge backwards but he still manages to nick your stomach. Gritting your teeth in pain, you're now on guard. You quickly back up and parry his dagger with your staff. He presses forward, sneering, but just then ${boggart} appears and rakes his claws across the man's face. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe bandit raises his arms to ward off ${boggart} but you seize the opening and move around him, taking him in a stranglehold. After a few moments, his struggles cease and you drop his unconscious body to the ground.\n\t\t\t\t\t\t\t*label bad \n\t\t\t\t\t\t\t${boggart} flutters to the ground next to you and chirps his concern. You quickly retrieve a cloth from your satchel and begin to wrap your injury. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou clench your teeth as the cloth presses against the wound, but then respond,\n\t\t\t\t\t\t\t*goto reply\n\t\t\t\t\t\t\t\n\t\t\t\t*label heels \n\t\t\t\t*choice\n\t\t\t\t\t#Engage the bandits in direct combat with your staff.\n\t\t\t\t\t\t*set resolve %+3 \n\t\t\t\t\t\tYou charge at the swordsman, staff raised with the blades out. He heaves his claymore manically through the air. At least whatever he lacks in expertise, he makes up for in ferocity! You deftly catch his attacks on your staff's daggers, sparks snapping around you. As he lunges forward, you dodge to the right, then come around and strike him on his back and his head in quick succession. \n\t\t\t\t\t\t\n\t\t\t\t\t\tYou finish with a blow to his exposed calves before he even turns around. The chemicals on your staff take effect, and he crashes to the ground with a thunk. The shorter man approaches from behind, but you swiftly turn around, deflecting his dagger with your staff and lunging forward, swinging it through the air. He anticipates your move, quickly ducking below your weapon and stepping toward you.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if resolve > 54 \n\t\t\t\t\t\t\tDucking his attack, you slam your staff into his sternum. Spluttering, the man crashes to the dirt, his complexion ruddy. Dashing toward him, you kick the weapon from his hand, knocking him out with another strike from your staff. \n\t\t\t\t\t\t*if viper\n\t\t\t\t\t\t\tAs he strikes, ${boggart} suddenly darts forward and curls around the man's arm, delivering a powerful electric jolt through his skin. The man shudders, his hair sticking up, and he drops to the ground, immobile.\n\t\t\t\t\t\t*if original              \n\t\t\t\t\t\t\t*set health -1\n\t\t\t\t\t\t\tHis other hand comes up and he punches you in the nose. He's not especially strong, but the suddenness of it forces you backwards. You block his next punch with your staff, blood leaking from your nose. Planting your staff in the ground, you pivot and deliver a kick to his head. He howls, collapsing, and you dig your heel into his sternum. Groaning, he passes out on the ground.\n\t\t\t\t\t\t*goto bowman\n\t\t\t\t\t\t\t\n\t\t\t\t\t*selectable_if (concussion > 0) #No need to play around. You'll finish this quickly with a concussion grenade.\n\t\t\t\t\t\t*set concussion -1\n\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t*set health -2\n\t\t\t\t\t\tYou hurtle the grenade and it detonates with an ear-ringing bang. The effect is truly impressive with this lot. The criminals yell out in surprise and stagger backwards, collapsing to the dirt. Rushing forward, you crack your staff across their temples one by one, knocking them out.\n\t\t\t\t\t\t*goto bowman\n\t\t\t\t\n\t\t\t\t\t*selectable_if (poison) #You decide to try out Venefira's poison vials.\n\t\t\t\t\t\t*set poison false\n\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\tYou move quickly, unraveling the poison vials from your waist. When you had stopped for the night and sorted your belongings, you'd thoughtfully put a wick made of fabric in one of the vials. Now, you set it aflame with your flint and marcasite. The bandits are rapidly approaching, and your well-thrown vials explode right beside them in a cloud of black smoke, vibrant greenish fire, and raw power.\n\t\t\t\t\t\t*goto explosion\n\t\t\t\t\t\t\n\t\t\t\t\t#You'll defeat these bandits from a distance with your throwing daggers.\n\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\tYou pull out your throwing daggers, flinging them expertly one after another toward the bandits. The swordsman yells something derogatory and deflects one throw, but your first and third throws catch him in his calf and shoulder. The smaller man dives to one side, but in his scramble over the uneven ground he trips and dislocates his ankle. As he tries to crawl away, one of your daggers lodges in his other calf and he gives up, collapsing to lie flat on the ground. \n\t\t\t\t\t\t*goto bowman\n\t\t\t\t\t\t\n\t\t\t\t\t*selectable_if (destruction=1) #This day is just getting ridiculous! You'll feel better if you blast the bandits with your destruction grenade. \n\t\t\t\t\t\t*set destruction -1\n\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t*set compassionate %-5  \n\t\t\t\t\t\tYou pull the pin, casting your grenade toward the bandits. It detonates, showering them with black smoke, fire, and raw power. The swordsman and the scrawny, unarmed man are right atop it when it explodes.\n\t\t\t\t\t\t*label explosion\n\t\t\t\t\t\tThe destruction, even from a distance, is obvious. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\tThe two men are a gory mess. You stride toward them, raising a sleeve to protect your nose from the smoke, dust, and embers scattered in the air. The scrawny man stirs feebly, but they are both deeply unconscious.\n\t\t\t\t\t\t*goto bowman\n\t\t\t\t\t\t\n\t\t\t\t\t*selectable_if (darts > 2) #Poisonous darts are a good, subtle tactic for almost any battle.\n\t\t\t\t\t\t*set darts -3\n\t\t\t\t\t\t*set cunning %+3 \n\t\t\t\t\t\t*set stealth %+3 \n\t\t\t\t\t\tPulling out your weapons, you press the pipe to your lip and blow three breaths of concentrated air. The darts fly swiftly from your reed pipe, and the first bounces off the swordsman's metal shoulder-piece. The second, however, lodges in his neck. He freezes for a second, then topples over like a brick. The shorter man is unusually fast. The third dart narrowly misses him, and now he is almost on top of you. \n                                                \n\t\t\t\t\t\tHe has drawn a wicked looking knife from some concealed sheath, but you have your own dagger ready. You leap back, and he surprises you by following his thrust with a vicious kick.\n\t\t\t\t\t\t*if viper\n\t\t\t\t\t\t\tHis boot nearly hits your stomach, but ${boggart} lunges forward and curls around the man's leg, zapping him with an electric shock and retreating as swiftly as he came. \n                                                        \n\t\t\t\t\t\t\tThe man screams out in a nasal voice, reeling back as his body shakes and convulses. You step forward, swinging your staff into his jaw and knocking him unconscious.\n\t\t\t\t\t\t\t*goto bowman\n\t\t\t\t\t\t*set health -1\n\t\t\t\t\t\tYou stagger backward as his boot hits your stomach, nearly overbalancing. He leaps to his feet and flees the situation.\n\t\t\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\t\n\t\t\t\t\t\t\t*label oo \n\t\t\t\t\t\t\tOh, wonderful. A game of hide and seek, it would appear. \n\t\t\t\t\t\t\t*goto o \n\t\t\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t\t\tIt doesn't matter. You will capture him, regardless.\n\t\t\t\t\t\t\t*goto o\n\t\t\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t\t\tProbably a wise decision on his part, actually.\n\t\t\t\t\t\t\t*goto o\n\t\t\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t\t\tHow valiant. \n\t\t\t\t\t\t\t*goto o \n\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t*goto oo \n\t\t\t\t\t\t*label o \n\t\t\t\t\t\t\t\n\t\t\t\t\t\tRegaining your balance, you chase him down the road. He is unusually swift and it takes a huge effort to catch up with him. Swinging your staff through the air, you crack his skull and send him to the dirt, unconscious.\n\t\t\t\t\t\t*goto bowman\n\t\t\t\t\t\t\n\t\t\t\t\t*selectable_if (tear > 0) #You'll stir up a distraction with a tear gas grenade.\n\t\t\t\t\t\t*set stealth %+3                                                \n\t\t\t\t\t\t*set tear -1\n\t\t\t\t\t\t*set not_done true\n\t\t\t\t\t\tYou take out your grenade, pulling the pin and hurling it through the air. It explodes in the center of the tiny group, surrounding them in dense fog. You can hear choking and curses as they stagger toward the edge of the cloud. Sprinting forward, you bring your staff down on the swordsman's head, dropping him where he stands. The shorter man glares at you through inflamed eyes, lunging wildly with his dagger. \n\t\t\t\t\t\t\n\t\t\t\t\t\tYou quickly step aside, swinging your staff through the air and cracking his skull. He collapses beside the redhead, motionless.\n\t\t\t\t\t\t*label bowman\n\t\t\t\t\t\t*set health -3\n\t\t\t\t\t\tYou turn to confront the bandit with the crossbow, but a searing pain suddenly rips through your shoulder. \n\t\t\t\t\t\t\n\t\t\t\t\t\tAn arrow passes swiftly, ripping a chunk of flesh away as it grazes your body. You grit your teeth, blood soaking your robe as you pivot toward her. She is loading her crossbow with a new bolt. Tensing, you spring at her, weaving back and forth to evade her bolts. You use a tree to your advantage and come up beside her, raising your staff. \n\t\t\t\t\t\t\n\t\t\t\t\t\tCursing, the thin woman swings her crossbow at you, grunting, \"Go to the Netherworld!\"\n                                                \n\t\t\t\t\t\tSwiftly ducking below the weapon, you start to jab at her ribs with your staff but she moves closer, a dagger catching the afternoon light.\n\t\t\t\t\t\t*if viper\n\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\tHer blade streaks through the air, but ${boggart} darts forward and wraps himself around her arm, violently zapping her with a nasty shock. She drops her weapon, and he retreats as swiftly as he had come. She stands, trembling from the jolt, and you smoothly bring your staff round into her temple. Grunting again, she falls limply to the ground.\n\t\t\t\t\t\t*if original\n\t\t\t\t\t\t\t*set cunning %-5 \n\t\t\t\t\t\t\t*set health -2\n\t\t\t\t\t\t\tYou dodge swiftly but the blade catches your shoulder. You grit your teeth in pain, but carry on undaunted. As she straightens, you crouch down and lunge forward. Grabbing her legs, you neatly lift her into a double-leg takedown and slam her into the ground with a thud. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou then drag her back to where her defeated comrades lay. Kneeling beside them, you quickly rifle through their belongings.\n\t\t\t\t\t\t*goto coins\n\n\t\t*label 600 \n\t\t*choice\n\t\t\t*selectable_if (transformations_viper) #\"Transform into a viper,\" you request, \"in case we encounter any dangers here.\" \n\t\t\t\t*set resolve %+3\n\t\t\t\t*set relationship %+3 \n\t\t\t\t*set mana -2\n\t\t\t\t*set viper true\n\t\t\t\t\"We've both heard the stories about travelers who disappear here, lost forever, perhaps savaged by wild creatures. But the dangers here are natural, not evil. My weapons are largely useless against some of these beasts. We'll need every advantage we can get.\"\n\n\t\t\t\t${boggart} nods, transforming into the sinuous electric viper. He wraps himself gently around your shoulders, then you head into the forest.\n\t\t\t\t*goto forest_viper\n\n\t\t\t*selectable_if (transformations_eagle) #\"I need a scout. Change into an eagle, will you?\"\n\t\t\t\t*set cunning %+3\n\t\t\t\t*set stealth %+3\n\t\t\t\t*set relationship %+3 \n\t\t\t\t*set mana -3\n\t\t\t\tYou continue, \"We've both heard the stories about travelers who disappear here, lost forever, or savaged by wild creatures. But the dangers here are natural, not evil. My weapons are largely useless against some of these great beasts.\n\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t*label af \n\t\t\t\t\tAfter all, we wouldn't want to encounter anything dangerous if we can help it.\"\n\t\t\t\t\t*goto aft \n\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\tHowever, we won't be found by anyone unless we want to be!\"\n\t\t\t\t\t*goto aft \n\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\tAfter all, it wouldn't do to get into any battles right before confronting the vampire and demon.\"\n\t\t\t\t\t*goto aft \n\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\tPerhaps we'll finally find and banish the demon here!\"\n\t\t\t\t\t*goto aft \n\t\t\t\t*else \n\t\t\t\t\t*goto af \n\t\t\t\t*label aft \n                                        \n\t\t\t\t${boggart} nods, transforming into a majestic eagle with a puff of granite-colored smoke. He clacks his beak at you a couple of times, ruffles his feathers, and soars off into the air. After a moment he is beyond the pinnacle of the forest, lost from your view. Several moments pass by in relative silence, and then the sun is darkened briefly by the silhouette of a great bird. \n\t\t\t\t\n\t\t\t\tGliding downwards, ${boggart} perches on your outstretched arm, digging his claws into your wrist chaps. He lets out a series of chirps and shrieks, telling you there is a large animal just west of here smashing through the forest. Nodding, you reply,\n\t\t\t\t*if relationship > 54\n\t\t\t\t\t\"Perfect! Great job, little one.\"\n\t\t\t\t\t*goto info\n\t\t\t\t*if relationship > 49\n\t\t\t\t\t\"Thanks for finding that out.\"\n\t\t\t\t*if relationship \u003c 50\n\t\t\t\t\t\"Well. I'm glad you're finally making use of yourself, boggart.\"\n                                        \n\t\t\t\t\t${boggart} frowns at you but doesn't reply.\n\t\t\t\t*label info\n\t\t\t\t\n\t\t\t\tWith ${boggart}'s help, you easily avoid whatever beast is roaming the woods and continue on your way toward the old garrison.\n\t\t\t\t*goto castle\n\n\t\t\t*selectable_if (transformations_toad) #You pull out your darts and say, \"I need some toad poison, ${boggart}.\"\n\t\t\t\t*set stealth %+3\n\t\t\t\t*set mana -1\n\t\t\t\t*set darts +3\n\t\t\t\t*set relationship %+3 \n\t\t\t\t\"We've both heard the stories about travelers who disappear here, lost forever, or savaged by wild creatures. But the dangers here are natural, not evil. My weapons are largely useless against some of these great beasts. So,\" you continue, \"it's especially important that I have more darts with me.\"\n\t\t\t\t\n\t\t\t\t${boggart} nods, and with a minuscule puff of ashen smoke, he changes into a tiny toad. You go through the usual routine of collecting the poison, and then ${boggart} reverts back to his original form almost at once. He settles down groggily onto your shoulder as you dip three darts into the poison and insert them into one end of your blowpipe. \n\t\t\t\t\n\t\t\t\tYou take note of his tired, deep-set eyes and suggest, \"${boggart}, why don't you get some more rest? It will take us a little while to reach the fortress, and I know the last few days have been exhausting.\" \n\t\t\t\t\t\t\t\t\n\t\t\t\tYour apprentice smiles sleepily and crawls into your backpack by way of answer.\n\t\t\t\t*goto sleep_more\n\n\t\t\t#\"${boggart},\" you say, \"I just wanted to let you know our situation. You can sleep until we reach the castle.\"\n\t\t\t\t*set original true\n\t\t\t\t*set mana +1\n\t\t\t\t*set relationship %+3  \n\t\t\t\t*label sleep_more\n\t\t\t\t*if (transformations_eagle)\n\t\t\t\t\t*set cunning %-5   \n\t\t\t\tCarrying on through the steadily thickening forest, you allow ${boggart} some much-needed time to recuperate. \n\t\t\t\t*goto forest_viper \n\t\t\t\t\t\t\t\t*label forest_viper\n\t\t\t\t\t\t\t\tEventually, the foliage becomes incredibly dense. Thorns snag your robe and burly branches undermine your footing. What little sunlight you have barely trickles through the massive tree branches. You try your best to remain silent, but the lack of light and the undergrowth make \n\t\t\t\t\t\t\t\t*if stealth > 54 \n\t\t\t\t\t\t\t\t\tyour progress rather slow, despite your ability to keep quiet.\n\t\t\t\t\t\t\t\t*if stealth \u003c 55 \n\t\t\t\t\t\t\t\t\tyour progress slow and noisy. \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*line_break \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tJust as you actually start to consider lighting a candle in this overgrown forest, a ferocious roar splits the air. Behind you is a massive bear! She looks gaunt, and you realize she will either make you her next meal or die trying. Diving backward, you dodge her attack but catch your foot on a protruding root. You tumble headlong down a steep incline, rolling to a stop in front of a cave that smells like bear. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tClambering to your feet, you see the enraged beast barreling down the hill, drool spilling from her gaping mouth. You only have seconds to defend yourself.\n\t\t\t\t\t\t\t\t*if (destruction=1)\n\t\t\t\t\t\t\t\t\t*goto explosive \n\t\t\t\t\t\t\t\t*if (poison)\n\t\t\t\t\t\t\t\t\t*label explosive\n\t\t\t\t\t\t\t\t\tUnfortunately, using an explosive would be madness. The ensuing fire would endanger your own life as well as the entire forest.\n\t\t\t\t\t\t\t\t*choice \n\t\t\t\t\t\t\t\t\t*selectable_if (original) #\"${boggart},\" you cry, \"I need a distraction! Now!\"\n\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\t*if relationship \u003c 51\n\t\t\t\t\t\t\t\t\t\t\t*set relationship %-5\n\t\t\t\t\t\t\t\t\t\t*if relationship > 50\n\t\t\t\t\t\t\t\t\t\t\t*set relationship %+3 \n\t\t\t\t\t\t\t\t\t\t*set resolve %-5\n\t\t\t\t\t\t\t\t\t\tAs the beast barrels forward, ${boggart} suddenly leaps from your backpack, soaring toward the beast. She swings her massive claws through the air, but ${boggart} flips and twists in an impressive display of maneuverability. Your apprentice is barely managing to evade certain death. The bear roars in frustration and swivels around to chase your apprentice. He draws the bear away from your position, carefully keeping just out of her range.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t\t\t\t\t\t\t*label it \n\t\t\t\t\t\t\t\t\t\t\tIt looks like the use-boggart-to-escape-hungry-bear gods are smiling down upon you! \n\t\t\t\t\t\t\t\t\t\t\t*goto do \n\t\t\t\t\t\t\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t\t\t\t\t\t\tYour sneaky plan actually worked!\n\t\t\t\t\t\t\t\t\t\t\t*goto do \n\t\t\t\t\t\t\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t\t\t\t\t\t\tYou are almost surprised that ${boggart}'s distraction was effective. The she-bear must either be truly starving or she must have cubs secreted in that cave to chase a boggart at the risk of losing human prey. Suddenly, ${boggart} snaps you out of your thoughts by yelling, \"${name}! What are you waiting around for?!\"\n\t\t\t\t\t\t\t\t\t\t\t*goto do \n\t\t\t\t\t\t\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t\t\t\t\t\t\tYou let out a triumphant roar of your own, but quickly ascend the hill before the animal decides to come back. \n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tYou\n\t\t\t\t\t\t\t\t\t\t\t*goto sprint\n\t\t\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t\t\t*goto it \n\t\t\t\t\t\t\t\t\t\t*label do \n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*line_break \n\n\t\t\t\t\t\t\t\t\t\tQuickly ascending the hill, you \n\t\t\t\t\t\t\t\t\t\t*label sprint \n\t\t\t\t\t\t\t\t\t\tput some distance between the bear and yourself before sitting on a bed of moss, awaiting ${boggart}'s return. You eventually see him flying forward. You lift out your arm to him, and he lands with a toothy smile.\n\t\t\t\t\t\t\t\t\t\t*if relationship > 54\n                                                \n\t\t\t\t\t\t\t\t\t\t\tYou say happily, \"Excellent work, ${boggart}! Your diversion was much appreciated.\" \n\n\t\t\t\t\t\t\t\t\t\t\t${boggart} just nods, visibly brightening at your words. \n\t\t\t\t\t\t\t\t\t\t\t*goto sit\n\t\t\t\t\t\t\t\t\t\t*if relationship > 50\n\t\t\t\t\t\t\t\t\t\t\t\"There you are! All right, let's go.\"\n                                                        \n\t\t\t\t\t\t\t\t\t\t\tYour apprentice looks a little disappointed but he just nods his head.\n\t\t\t\t\t\t\t\t\t\t*if relationship \u003c 51\n\t\t\t\t\t\t\t\t\t\t\t\"Took you long enough,\" you grumble impatiently.\n                                                        \n\t\t\t\t\t\t\t\t\t\t\tHissing, your companion remarks, \"Yeah, it's because I was saving your butt, stupid idiot.\"\n                                                        \n\t\t\t\t\t\t\t\t\t\t\tYou bristle at his words, but decide not to argue. You have more important things to worry about. With ${boggart} perched grumpily on your shoulder,\n\t\t\t\t\t\t\t\t\t\t\t*goto page\n\t\t\t\t\t\t\t\t\t\t*label sit\n\t\t\t\t\t\t\t\t\t\tWith ${boggart} sitting comfortably on your shoulder, \n\t\t\t\t\t\t\t\t\t\t*label page\n\t\t\t\t\t\t\t\t\t\tyou continue toward the vampire's garrison. You consider your strategy as you travel. You'll be facing a very powerful vampire, and you need to figure out ${boggart}'s role.\n\t\t\t\t\t\t\t\t\t\t*choice \n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (transformations_eagle) #Fighting a vampire in his own territory is especially dangerous. As an eagle, ${boggart} can aid you in battle.\n\t\t\t\t\t\t\t\t\t\t\t\t*set eagle true\n\t\t\t\t\t\t\t\t\t\t\t\t*set mana -3\n\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\t\t\t*set relationship %+3  \n\t\t\t\t\t\t\t\t\t\t\t\t*goto chased_transform\n        \n\t\t\t\t\t\t\t\t\t\t\t#You suppose it's best for your companion to stay in his current form to preserve mana.\n\t\t\t\t\t\t\t\t\t\t\t\t*set original true\n\t\t\t\t\t\t\t\t\t\t\t\t*set relationship %+3 \n\t\t\t\t\t\t\t\t\t\t\t\t*goto chased_transform\n\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (transformations_viper) #His viper form makes a good, subtle addition to your usual tactics.\n\t\t\t\t\t\t\t\t\t\t\t\t*set viper true\n\t\t\t\t\t\t\t\t\t\t\t\t*set mana -2\n\t\t\t\t\t\t\t\t\t\t\t\t*set relationship %+3 \n\t\t\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\t\t\t*goto chased_transform\n\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (transformations_toad) #You need to refill your supply of poison from your apprentice's toad form.\n\t\t\t\t\t\t\t\t\t\t\t\t*set toad true\n\t\t\t\t\t\t\t\t\t\t\t\t*set mana -1\n\t\t\t\t\t\t\t\t\t\t\t\t*set darts +3\n\t\t\t\t\t\t\t\t\t\t\t\t*set relationship %+3 \n\t\t\t\t\t\t\t\t\t\t\t\t*goto chased_transform\n\n\t\t\t\t\t\t\t\t\t*selectable_if (concussion > 0) #You pull out your stun grenade and toss it at the bear.\n\t\t\t\t\t\t\t\t\t\t*set concussion -1\n\t\t\t\t\t\t\t\t\t\t*set health -1\n\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\tThe grenade explodes almost in the bear's mouth, and you're close enough to be glad you've covered your ears. She shakes her head, dazed and furious, and steps forward unsteadily. You quickly cover the distance between you and your opponent, slamming your staff into her jaw. She roars in pain and her muzzle distorts into a frozen grimace, your staff's chemicals seeping in through her snout. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tAs she thrashes around wildly, she glares at you, swiping her gargantuan paw into your chest, knocking you down and forcing the air from your lungs. Just as she is about to finish you off, ${boggart} \n\t\t\t\t\t\t\t\t\t\t*if original\n\t\t\t\t\t\t\t\t\t\t\treaches out of your backpack with his scorpion tail and stings the bear's sore muzzle,\n\t\t\t\t\t\t\t\t\t\t*if viper\n\t\t\t\t\t\t\t\t\t\t\tdarts out of your sleeve and curls bravely around the bear's muzzle, giving her a massive electric shock! She roars in pain and reels away,\n\t\t\t\t\t\t\t\t\t\tgiving you a chance to escape. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tBut in your haste, your foot catches on a protruding root, sending you tumbling across the dirt.\n\t\t\t\t\t\t\t\t\t\t*goto bear \n\n\t\t\t\t\t\t\t\t\t#You run toward the bear, waving your staff and hoping to frighten her off.\n\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\t\t\t*goto fight_bear \n                                                \n\t\t\t\t\t\t\t\t\t*selectable_if (darts > 2) #You might be able to stop her quickly with your poisonous darts.\n\t\t\t\t\t\t\t\t\t\t*set darts -3\n\t\t\t\t\t\t\t\t\t\t*set cunning %-5 \n\t\t\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t\t\t*set health -1\n\t\t\t\t\t\t\t\t\t\tYou snatch your blowpipe and let the darts fly, but they miss her snout and fall out of the bear's thick fur! She rushes forward, oblivious, and before you can flee, she rams you in the chest. You go flying into a dense thicket, wheezing as the air is knocked from your lungs. As you stagger to your feet, the bear's roar rings in your ears as she charges you again.\n\t\t\t\t\t\t\t\t\t\t*goto fight_bear\n\n\t\t\t\t\t\t\t\t\t*selectable_if (daggers) #Your throwing daggers should slow this colossus down.\n\t\t\t\t\t\t\t\t\t\t*set daggers false\n\t\t\t\t\t\t\t\t\t\t*set cunning %-5 \n\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\tDrawing the daggers from your belt, you cast them quickly toward her, but the blades turn out to be useless! Her thick fur deflects them, and the few that do reach flesh barely scratch her. She lets out a roar, irritated by the daggers' pricks.\n\t\t\t\t\t\t\t\t\t\t*goto fight_bear\n\n\t\t\t\t\t\t\t\t\t*selectable_if (tear > 0) #This beast won't have any idea what to do with tear gas—hopefully, at least.\n\t\t\t\t\t\t\t\t\t\t*set tear -1\n\t\t\t\t\t\t\t\t\t\t*set stealth %+3 \n\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\tYou send the live grenade sailing toward the bear, and a cloud of stinging gas follows the dull thud of the explosion. The gas envelops her, and seconds later, she barrels out of the churning cloud, roaring furiously. Her eyes inflamed, she retreats through the forest, apparently deciding she's had enough.\n\t\t\t\t\t\t\t\t\t\t*goto castle \n\t\t\t\t\t\t\t\t\t\t*label fight_bear\n\n\t\t\t\t\t\t\t\t\t\tYou try to spear the bear, staff ready with daggers out. You thrust from your shoulder, cutting into her arm.\n\t\t\t\t\t\t\t\t\t\t*label disarmed\n\t\t\t\t\t\t\t\t\t\tThe injury only angers her further and she bats at you with her massive claws.\n\t\t\t\t\t\t\t\t\t\t*if viper\n\t\t\t\t\t\t\t\t\t\t\t*set health -2\n\t\t\t\t\t\t\t\t\t\t\tSuddenly, ${boggart} darts out of your sleeve and curls bravely around the bear's muzzle, giving her a massive electric shock. She roars in pain as he slithers back under your robe, and dazed by his attack, her claws merely graze your shoulder. \n\n\t\t\t\t\t\t\t\t\t\t\tYou take the weapon with your other hand, hardly able to move your injured arm. The bear stands up on her hind legs, giving an angry roar. Clearly, you won't be able to triumph in a fistfight versus a bear. Now what?\n\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t#You raise your staff and roar, trying to intimidate the bear. \n\t\t\t\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set charisma %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\tRancid drool flies into your face but you stand your ground, flaring your robe to appear larger. Screaming at the bear, you show her it is not a good idea to trifle with you. Uncertainty flickers into the bear's dark eyes, and she seems to decide this measly amount of meat is not worth the trouble it causes.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\tWith a frustrated snort, the animal swivels on her heels and retreats back to her cave, licking her injuries. You don't wait around to see if she changes her mind.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto castle\n                                                                \n\t\t\t\t\t\t\t\t\t\t\t\t#Hitching up your robe with one hand, you run away as fast as you can. \n\t\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\tTaken by surprise as you dash away, the animal doesn't follow at first. You go crashing through the undergrowth, gaining distance between you with every step.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto castle \n\t\t\t\t\t\t\t\t\t\tknocking you against a tree as your staff goes flying out of your hand and into a nearby bush. You collapse, bleeding and dizzy.\n\t\t\t\t\t\t\t\t\t\t*set health -4\n\n\t\t\t\t\t\t\t\t\t\tShe rushes forward, teeth bared for the kill, but ${boggart} darts out of your backpack and stings her squarely on the muzzle. Roaring in pain, she rears away and you slam your boots into her stomach. You are just barely able to knock her off balance, and you roll away before she comes back down on top of you.\n\t\t\t\t\t\t\t\t\t\t*label bear\n\n\t\t\t\t\t\t\t\t\t\tYou stagger to your feet as she roars furiously. Clearly, you won't be able to triumph in a fistfight versus a bear. So, what now?\n\t\t\t\t\t\t\t\t\t\t*choice\t\n\t\t\t\t\t\t\t\t\t\t\t#You raise your staff and roar, trying to intimidate the bear. \n\t\t\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\t\t\t*set charisma %+3\n\t\t\t\t\t\t\t\t\t\t\t\tRancid drool flies into your face but you stand your ground, flaring your robe to appear larger. Screaming at the bear, you show her it is not a good idea to trifle with you. Uncertainty flickers into the bear's dark eyes, and she seems to decide this measly amount of meat is not worth the amount of trouble it causes.\n\n\t\t\t\t\t\t\t\t\t\t\t\tWith a frustrated snort, the animal swivels on her heels and retreats back to her cave, licking her injuries. You don't wait around to see if she changes her mind.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto castle\n                                                                \n\t\t\t\t\t\t\t\t\t\t\t#Hitching up your robe with one hand, you run away as fast as you can. \n\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t\t\t\t\tTaken by surprise as you dash away, the animal doesn't follow at first. You go crashing through the undergrowth, gaining distance between you with every step. When you're certain that the bear has lost interest in you, you sit down onto a bed of moss to rest. ${boggart} perches on your shoulder, looking at you \n\t\t\t\t\t\t\t\t\t\t\t\t*if relationship > 54\n\t\t\t\t\t\t\t\t\t\t\t\t\twith concern. Giving him a smile, you reassure him. \"Don't worry, little fellow. I'm fine. Now, why don't you get some more rest before we reach the castle?\"\n                                                        \n\t\t\t\t\t\t\t\t\t\t\t\t\tHe replies, \"But I'm not even tired,\" yet after a few yawns he gives up and listens to your advice, curling into a sleepy ball in your backpack.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto focus\n\t\t\t\t\t\t\t\t\t\t\t\t*if relationship > 49\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"I'm fine,\" you reassure him. \"You should get some more rest before we get to the tower.\"\n                                                        \n\t\t\t\t\t\t\t\t\t\t\t\t\tHe replies, \"But I'm not even tired,\" yet after a few yawns he gives up and listens to your advice, curling into a sleepy ball in your backpack.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto focus\n\t\t\t\t\t\t\t\t\t\t\t\t*if relationship \u003c 50\n\t\t\t\t\t\t\t\t\t\t\t\t\tRolling your eyes, you say curtly, \"I'm fine, boggart. Just get back to sleep.\"\n                                                        \n\t\t\t\t\t\t\t\t\t\t\t\t\tHissing, your apprentice dives back into your backpack, muttering something about how he'd rather sleep than look at your monster-face anyways.\n\t\t\t\t\t\t\t\t\t\t\t\t*label focus\n                                                \n\t\t\t\t\t\t\t\t\t\t\t\tFor the next hour or so, you creep quietly through the forest, thinking every tiny sound is another hungry bear. Fortunately, the journey is uneventful. Some time later, you're finally nearing Lord Sarrivan's garrison. Lifting your backpack from your shoulders, you gently set it on the ground and unbuckle the flap. \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t${boggart} rubs his eyes and blinks,\n\t\t\t\t\t\t\t\t\t\t\t\t*if relationship \u003c 50\n\t\t\t\t\t\t\t\t\t\t\t\t\tlooking at you resentfully for waking him up. You clear your throat, ignoring his stony expression.\n\t\t\t\t\t\t\t\t\t\t\t\t*if not(relationship > 49)\n\t\t\t\t\t\t\t\t\t\t\t\t\tbut hops out and onto your shoulder, watching you expectantly.\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t*selectable_if ((transformations_eagle) and (mana > 2)) #\"We'll need your eagle form for the battle ahead, ${boggart}.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set eagle true\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set relationship %+3 \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set mana -3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label chased_transform\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if original\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Therefore, it goes without saying that you must remain uninvolved unless my life is at stake,\" you continue. \n                                        \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t${boggart} nods solemnly.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto castle \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (transformations_eagle)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYour companion nods, changing into an eagle with a sound like a bag of flour being dropped.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto castle \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (transformations_viper)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"So, I'll need you to turn into a viper to aid me against our enemies.\"\n        \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYour companion nods, transforming into an electric viper and wrapping himself gently around your neck.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto castle \n        \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (transformations_toad)\n                                                                \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"So, I'll need you to transform into your toad form so I can refill my supply of venom.\" You pause, then add sternly, \"Also, it goes without saying that I'll require you to stay out of this unless my life is at stake.\" \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tHe nods while shrinking down to his tiny amphibian form. After you collect the venom for your darts, he settles onto your shoulder again.  \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto castle \n\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t*selectable_if ((transformations_viper) and (mana > 1)) #\"I need a subtle helper. Sinuous, electrifying…\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set viper true\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set relationship %+3 \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set mana -2\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto chased_transform\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t*selectable_if (transformations_toad) #\"Can you transform?\" you ask him. \"I need to refresh my darts.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set toad true\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set relationship %+3 \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set darts +3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set mana -1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto chased_transform\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t#\"Just stay as you are for the battle ahead,\" you request. \"You'll need to conserve your mana.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set original true \n\t\t\t\t\t\t\t\t\t\t\t\t\t\tgoto transform\t\t\t\t\t\n                                                \n*label castle\n*page_break\n*if (((charisma \u003c= stealth) and (charisma \u003c= cunning)) and ((charisma \u003c= resolve)))\n\t*label tryy \n\tYou try to initiate conversation a few times in hopes of breaking the grim silence but ${boggart} seems too worried about the task ahead,\n\t*if relationship \u003c 55\n\t\tand probably frustrated with you in general,\n\tto really respond much.\n\t*goto much \n*elseif (((stealth \u003c charisma) and (stealth \u003c cunning)) and ((stealth \u003c resolve)))\n\tYou find yourself stumbling over every other tree root. It seems your mind is too preoccupied with confronting the vampire and demon to focus properly. \n\t*goto much \n*elseif (((cunning \u003c stealth) and (cunning \u003c resolve)) and ((cunning \u003c charisma)))\n\tYou try again and again to form a plan that will help you defeat the vampire and demon, but you just can't seem to focus.\n\t*goto much \n*elseif (((resolve \u003c stealth) and (resolve \u003c cunning)) and ((resolve \u003c charisma)))\n\tThough you and your companion attempt to engage each other in idle conversation, the daunting endeavor ahead weighs heavily on both your minds.   \n\t*goto much \n*else \n\t*goto tryy \n*label much \nFortunately, though, the rest of your journey is uneventful. The rugged terrain evens into a stagnant body of standing water, reeking with rot.\n*label vampire\nBloated corpses line the perimeter, protruding from the swamp and creating a terrible stink.\n\n*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t*label hurl \n\tNearly hurling whatever is left in your empty stomach, you try to hurry through the bog, but every step coats your robe in thick muck and other unmentionable things, causing you to wrinkle your nose in disgust.\n\t*goto is \n*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\tTaking a deep breath, you dash quickly through the bog, deftly leaping off of roots and tree trunks, barely getting damp at all. You then pause at the edge of the graveyard to catch your breath.\n\t*goto is \n*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\tTaking note of the carcasses, you recognize the trademark of a vampire. All of the bodies have frightfully pale skin, as if they had been drained of blood. Shivering, you shake the unpleasant image from your mind.\n\t*goto is \n*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\tWith grim determination, you stride through the putrid waters, ignoring the dead animals that bob around you. \n\t*goto is \n*else \n\t*goto hurl \n*label is \nYou step out of the graveyard and continue toward the castle, outlined on the pinnacle of a hill above the swamp. There are fewer trees here, but the woods are clearly ancient. \n\nHuge trunks rise around you, culminating in tangled, knobby branches, and moss dangles from the limbs. You pull out a candle and your flint, lighting the candle's wick with a deft gesture. The familiar, cleansing smell of the incense \n*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t*label calmz \n\tcalms you greatly.\n\t*goto re \n*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\tsharpens your senses.\n\t*goto re \n*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\tfocuses your mind.\n\t*goto re \n*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\trenews your determination.\n\t*goto re \n*else \n\t*goto calmz \n*label re \n\t\nHeading up the hill toward the vampire's home, you soon find yourself in an ornate entryway, marked with intricate designs on the cobblestone floor. You cannot see any signs of either the demon or the vampire, but your pendant glows a muddy green. At least one of them must be here, somewhere, inside or on the castle grounds.\n*finish Continue\n\n*label coins\n*set gold +10 \n\nOther than their weapons, which are poorly made and not useful at all, you find little more than a coin or two on each of them. \n*if altruism \u003c 50 \n\tYou shake your head in disappointment \n*if altruism > 49 \n\tYou're almost sorry for them,\nbut drop the few coins into one of your pockets anyways. ${boggart} flutters his wings curiously beside you, asking, \"What are we going to do with them?\"\n\n\"Well, the most\n*if compassionate > 50\n\tprudent thing to do would be to just leave them here,\" you comment. \"Killing them seems unnecessary. Though, you know, it might be fitting that they experience a taste of their own medicine. We could take all of their possessions and dispose of them in one of the streams…. We could even go a step further and strip them down…it's not like they would have left anything for us. Perhaps they'll actually regret living a life of banditry.\n\t*if relationship \u003c 51\n\t\t\"\n                                                                \n\t\tWhen you pause, ${boggart} interjects, \"I think we should just tie them up and leave them. They can't harm us now!\"\n                                                                \n\t\tLooking at him, you reply tersely, \"Yes, well, sometimes there are other factors to consider, too.\" \n\t\t*goto taking \n\t*if relationship > 50\n\t\tWhat do you think, ${boggart}?\"\n                                                                \n\t\t\"I think we should just tie them up and leave them! They can't harm us now, you know?\"\n                                                                \n\t\tSmiling, you lean down and pat your apprentice on the head. \"You're so kind, little fellow.\"\n\t\t*goto taking\n*if compassionate \u003c 51 \n\tpractical option is to leave them here. Death is certainly what they'd deserve. Either way, though, they're obviously not a threat whether on their feet or out cold on the ground. Still, leaving them alive doesn't necessarily mean I [i]have[/i] to just tie them up. We could take all their belongings and toss them in a stream. We could even strip them down. It's not as if they'd have left us anything if we were laying there.\n\t*if relationship \u003c 51\n\t\t\"\n                                                                \n\t\tWhen you pause, ${boggart} interjects tentatively, \"Well, I'm really looking forward to humiliating them.\" \n\t\t\t\t\t\t\t\t\t\n\t\tYou raise your eyebrows and say cooly, \"Hm, now there we actually agree.\"\n                                                                \n\t*if relationship > 50\n\t\tWhat do you think, ${boggart}?\"\n                                                        \n\t\tNodding thoughtfully, your companion responds, \"Well, I'm really looking forward to humiliating them.\"\n\t*label taking\n\t*choice\n\t\t#You'll just tie them up and leave them. They seem like they've been down on their luck for a very long time.\n\t\t\t*set compassionate %+3\n\t\t\tDrawing a length of rope from your satchel, you methodically lay the unconscious criminals against a wide-trunked yew tree. One of them groans, stirring, so you quickly bind them to the tree. You toss their weapons in a stream that bubbles through the nearby thicket.\n\t\t\t*label finish_route\n\t\t\tStanding up with a sigh, you resume your journey, your apprentice in tow.\n\t\t\t\n\t\t\t*if (((charisma \u003c= stealth) and (charisma \u003c= cunning)) and ((charisma \u003c= resolve)))\n\t\t\t\t*label twoo \n\t\t\t\tTo break the silence, you try to initiate conversation a few times, but ${boggart} seems too worried about the task ahead\n\t\t\t\t*if relationship \u003c 55\n\t\t\t\t\t, and probably frustrated with you in general,\n\t\t\t\tto really respond very much.\n\t\t\t\t*goto and \n\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\tYou find yourself constantly stumbling over protruding roots. It seems your mind is too preoccupied with confronting the vampire and demon to focus elsewhere. \n\t\t\t\t*goto and \n\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\tAs you walk, you try to formulate a plan to defeat the vampire and demon, but you just can't seem to focus.\n\t\t\t\t*goto and \n\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\tThough you and ${boggart} try to chat, your efforts fall flat. The daunting endeavor before you weighs heavily on you both.       \n\t\t\t\t*goto and\n\t\t\t*else \n\t\t\t\t*goto twoo \n\t\t\t*label and \n\t\t\tFortunately, the rest of your expedition is uneventful. Before long, the path before you forks off in two directions. One leads toward a nearby city called Lorden, the other toward your current destination. \n\t\t\t\n\t\t\tThe neglected path is nearly hidden by creeping vegetation. As you walk between the brambles, the trees start to thin and the ground becomes marshy. You eventually find yourself in a stagnant body of standing water that reeks with rot, a swamp transformed into a graveyard.\n\t\t\t*goto vampire\n\n\t\t#These bandits need to be taken down a notch. You'll humiliate them by scattering their belongings throughout the area.\n\t\t\t*set resolve %+3 \n\t\t\t*set compassionate %-5 \n\t\t\t*label humiliate\n\t\t\tTaking your dagger, you quickly sever all of the bandits' belts and necklaces. Turning to your apprentice, you say, \"Here, take these and scatter them into the forest.\"\n                                                                \n\t\t\tA devilish grin splits across his face and he grabs the trinkets, flying off into the wood with a little giggle. When he returns, you have removed all of the criminals' weapons and armor. Giving the lighter weapons to ${boggart}, you grab the armor and heavier weapons and toss them into a fast-running stream in the nearby thicket. When you return, the swordsman is beginning to stir. \n\t\t\t\n\t\t\t*if humiliate\n\t\t\t\tHurriedly knocking him out again with a strong rap of your staff, you quickly set to work. Using your dagger, you slash the seams of their clothing and give a quick tug, leaving them completely naked. \n\t\t\tQuickly taking the length of rope from your satchel, you bind them against three of the rougher looking trees, facing each other.\n\t\t\t*goto finish_route\n                                                                \n\t\t#These outlaws need to learn their lesson. You'll scatter their belongings throughout the area, and strip them down afterwards, perhaps?\n\t\t\t*set charisma %-5 \n\t\t\t*set compassionate %-5\n\t\t\t*set resolve %+3\n\t\t\t*set humiliate true \n\t\t\t*goto humiliate\n\n\t\t*selectable_if (compassionate \u003c 50) #Actually, you're just going to execute them.\n\t\t\t*set charisma %-5\n\t\t\t*set compassionate %-5 \n\t\t\tYou use their dagger and neatly cut their throats, carefully cleaning the blade afterwards on the body of the bowman. You return the dagger to its sheath, leaving their corpses lying in the road. ${boggart} looks decidedly uncomfortable, but doesn't act against you. Perhaps he's just grown used to your methods of crime fighting.\n\t\t\t*goto finish_route\n", "save_demonhunter": "This saved game was created at the end of [i]Trial of the Demon Hunter - Volume One of Demons Among Men[/i].\nYou'll need to purchase Volume Two, [i]Captive of Fortune[/i], to continue playing.\n*ending", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Harding\"\n*set gender \"Male\"\n*set relationship 52\n*set cunning 49\n*set resolve 55\n*set stealth 54\n*set charisma 57\n*set compassionate 55 \n*set altruism 58 \n*set gold 0\n*set health 15\n*set mana 3\n*set transformations_eagle true\n*set boggart \"Valentine\"\n*set inventory \"silver chain, iron shavings 8/8, salt, knife, food and water, teleportation rune, candles, flint and metal, healing ointment 2/2, chemical instilled staff, handcuffs, Demon Book of Names\"\n\nThe goblin leaps up, drawing a rusty dagger from his belt. Looking to the sky, you see ${boggart} descending swiftly, ready to blind-side the villain. As your opponent charges forward with a scream of fury, you're glad you already decided how to handle the criminal. \n\nThe usual practice is to leave him alive, taking him with you to deliver him for a bounty; conversely, you could walk an unconventional line and trade him to a farmer, which would yield the most gilded pieces, but may entail hardship for the farmer. Finally, you could cripple him to make sure he won't cause anyone any trouble in the future.\n*fake_choice\n\t#You decide to trade the goblin to a farmer for more profit. He is unlikely to follow the farmer's orders willingly, but that's not your problem...\n\n\t#You'll incarcerate the goblin and deliver him to an outpost; whatever his crimes, he deserves a proper trial.\n\n\t#Permanently injuring the goblin to ensure he won't be able to commit further crimes seems like a good plan.\n\n*script changeBackgroundColor(\"black\")\n\n\n*set name \"Maybeline\"\n*set gender \"Female\"\n*set relationship 55\n*set compassionate 48\n*set altruism 49\n*set cunning 55\n*set resolve 61\n*set stealth 49\n*set charisma 55\n*set gold 0\n*set health 15\n*set mana 3\n*set transformations_viper true\n*set boggart \"Humphrey\"\n*set inventory \"silver chain, iron shavings 8/8, salt, knife, food and water, teleportation rune, candles, flint and metal, healing ointment 2/2, chemical instilled staff, handcuffs, Demon Book of Names\"\n\nYour battle with the dark is perpetual but well worth it.\n*fake_choice\n\t#You're allowed to take the treasures of criminals you capture, after all.\n\t\n\t#You fight because of your hatred for beings that associate themselves with the darkness.\n\t\n\t#You truly want to make the world a better place and protect the innocent.\n\t\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Allister\"\n*set gender \"Male\"\n*set relationship 55\n*set cunning 55\n*set resolve 50\n*set stealth 55\n*set charisma 54\n*set compassionate 60 \n*set altruism 59\n*set gold 0\n*set health 15\n*set mana 3\n*set transformations_viper true\n*set boggart \"Jupiter\"\n*set inventory \"silver chain, iron shavings 8/8, salt, knife, food and water, teleportation rune, candles, flint and metal, healing ointment 2/2, chemical instilled staff, handcuffs, Demon Book of Names\"\n\n\"Wait! I'm not guilty!\"\n\nYou laugh inwardly at the notion; what an absurd idea!\n*fake_choice\n\t#There's no harm in humoring the goblin and letting her attempt to explain her innocence.\n\n\t#You ignore the noisy little goblin.\n\n\t#That's ridiculous, and you tell her so.\n\n*set name \"Joseph\"\n*set gender \"Male\"\n*set relationship 63\n*set cunning 77\n*set resolve 50\n*set stealth 68\n*set charisma 69\n*set compassionate 57\n*set altruism 64\n*set gold 0\n*set health 15\n*set mana 0\n*set boggart \"Harlow\"\n*set transformations_eagle true\n*set inventory \"silver chain, iron shavings 8/8, salt, knife, food and water, teleportation rune, candles, flint and metal, healing ointment 2/2, chemical instilled staff, handcuffs, Demon Book of Names\"\n\nAfter a moment, you translate it: [i]\"If I die, you die!\"[/i] This powerful and nasty curse releases a bolt of energy into the heart of whomever kills its bearer. Even a wizard would find it very difficult to deflect the spell.\n\t\t\t\t\t\t\t\t\nIt can only ever be revoked by the caster himself or removed by intricate and very powerful spells. You will have to make sure not to use lethal force against these assassins in order to preserve your own life.\n*fake_choice\n\t#However, you will be interrogating them by any means necessary; perhaps you can gain valuable information about this demon.\n\n\t#It will be easiest to just incarcerate them, and then you can get to the interesting part - the bounty.\n\n\t#Of course these villains must be confined, but more importantly, you hope to dissuade them from their current paths in life.\n\n*set name \"Harding\"\n*set gender \"Male\"\n*set relationship 63\n*set cunning 81\n*set resolve 52\n*set stealth 68\n*set compassionate 71\n*set altruism 65\n*set charisma 72\n*set gold 0\n*set health 15\n*set mana 3\n*set transformations_toad true\n*set boggart \"Octavious\"\n*set inventory \"silver chain, iron shavings 8/8, salt, knife, food and water, teleportation rune, candles, flint and metal, healing ointment 2/2, fire accelerant, witch's daggers, vials of poison, Strange amulet, chemical instilled staff, handcuffs, Demon Book of Names\"\n\nPausing, you consider how best to appeal to her. Logic could perhaps sway her, if you were clever about it. A passionate plea might also break down some of her barriers. Finally, there are always more aggressive tactics you can use. \n*fake_choice\n\t#You have HAD IT with these assassins! How dare they think this is acceptable behavior?!\n\t\n\t#You are passionate about helping these assassins, and you know it will show in your words, your voice, your very demeanor.\n\t\n\t#You plan to handle this sensibly, as you usually do.", "startup": "*title Trial of the Demon Hunter\n*author Samwise Harry Young\n\n*scene_list\n\tstartup\n\t$ fortune_teller\n\t$ witch_fight\n\t$ prison\n\t$ goodnight_boggart\n\t$ route\n\t$ traps\n\t$ vampire\n\t$ castle\n\t$ author\n\t$ death\n\n*create boggart \"Boggart\"\n*create mendax false \n*create fought false \n*create hunter \"hunter\"\n*create mean false \n*create he \"he\" \n*create his \"his\"\n*create him \"him\"\n*create woman \"woman\"\n*create witch \"witch\"\n*create man \"man\"\n*create Illusia \"?\"\n*create curvaceous \"curvaceous\"\n*create beautiful \"beautiful\"\n*create inventory \"\"\n\n*create romance_callidus false\n*create romance_melithar false \n*create romance_vidar false\n*create romance_ceylar false \n*create romance_illusia false \n*create romance_gretchin false\n*create romance_gretta false \n*create romance_garnet false\n*create romance_falcon fa reate cp_viper false\n\n*create eagle false\n*create cp_eagle false\n\n*create hestia_fire false\n*create cp_hestia_fire false\n\n*create venefira_fire false\n*create cp_venefira_fire false\n\n*create all_fire false\n*create cp_all_fire false\n\n*create broken_vials false\n*create cp_broken_vials false\n\n*create illusia_1st false\n*create cp_illusia_1st false\n\n*create transformations_toad false\n*create cp_transformations_toad false\n\n*create transformations_viper false\n*create cp_transformations_viper false\n\n*create transformations_eagle false\n*create cp_transformations_eagle false\n\n*create venefira false\n*create cp_venefira false\n\n*create venefira_viper false\n*create cp_venefira_viper false\n\n*create boggart_save false\n*create cp_boggart_save false\n\n*create release_tear false\n*create cp_release_tear false\n\n*create release_concussion false\n*create cp_release_concussion false\n\n*create release_destruction false\n*create cp_release_destruction false\n\n*create warlock false\n*create cp_warlock false\n\n*create girl false\n*create cp_girl false\n\n*create name \"?\"\n*create cp_name \"?\"\n\n*create female false\n*create cp_female false\n\n*create male false\n*create cp_male false\n\n*create conceal false\n*create cp_conceal false\n\n*create staff true\n*create cp_staff false\n\n*create chain true\n*create cp_chain false\n\n*create iron 8\n*create cp_iron 8 \n\n*create salt true\n*create cp_salt false\n\n*create candles true\n*create key true\n*create book true\n*create knife true\n*create food true\n*create flint true\n*create handcuffs true\n*create rune true\n\n*create ointment 2\n*create cp_ointment 2\n\n*create shield false\n*create cp_shield false\n\n*create marble false\n*create cp_marble false\n\n*create mythril false\n*create cp_mythril false\n\n*create accelerant false\n*create cp_accelerant false\n\n*create daggers false\n*create cp_daggers false\n\n*create charm false\n*create cp_charm false\n\n*create no_fortune false\n*create cp_no_fortune false\n\n*create amulet false\n*create cp_amulet false\n\n*create poison false\n*create cp_poison false\n\n*create gauntlets false\n*create cp_gauntlets false\n\n*create wind false\n*create cp_wind false\n\n*create flame false\n*create cp_flame false\n\n*create vines false\n*create cp_vines false\n\n*create ice false\n*create cp_ice false\n\n*create earth false\n*create cp_earth false\n\n*create destruction 0\n*create cp_destruction 0\n\n*create concussion 0\n*create cp_concussion 0\n\n*create tear 0\n*create cp_tear 0\n\n*create darts 0\n*create cp_darts 0\n\n*create gender \"?\"\n\n*create charisma 50\n*create cp_charisma 50\n\n*create resolve 50\n*create cp_resolve 50\n\n*create cunning 50\n*create cp_cunning 50\n\n*create relationship 50\n*create cp_relationship 50\n\n*create stealth 50\n*create cp_stealth 50\n\n*create health 15\n*create cp_health 15\n\n*create mana 3\n*create cp_mana 3\n\n*create gold 0\n*create cp_gold 0\n\n*create altruism 50 \n*create cp_altruism 50\n\n*create compassionate 50\n*create cp_compassionate 50\n  \n*achievement brutal visible 10 Brutal Justice\n\tMake enemies cower in your presence.\n\tYou are the terror of the criminal underworld!\n\t\n*achievement redeem visible 15 Redemption\n\tRedeem the assassins.\n\tYou are a beacon of hope for victims and oppressors alike!\n\t\n*achievement money visible 15 Filthy Rich\n\tGet as many golden coins as possible.\n\tYour lust for money has served you well!\n\t\n*achievement boggart visible 20 Kind-hearted\n\tForm a strong relationship with your apprentice.\n\tYour apprentice respects, trusts, and loves you!\n\t\n*achievement eagle visible 5 Transformation: Eagle\n\tTrain your apprentice to transform into an eagle.\n\tYou trained your companion to transform into an eagle!\n\t\n*achievement viper visible 5 Transformation: Electric Viper\n\tTrain your apprentice to transform into an electric viper.\n\tYou trained your companion to transform into an electric viper!\n\n*achievement toad visible 5 Transformation: Poisonous Toad\n\tTrain your apprentice to transform into a poisonous toad.\n\tYou trained your companion to transform into a poisonous toad!\n\t\n*achievement caution visible 25 Extreme Caution\n\tManage to end the volume with more health than when you started.\n\tYou managed to end the volume with more health than when you started!\n\t\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tBattle the forces of evil in this thrilling interactive fantasy novel! When a powerful demon destroys your village, you embark on a perilous journey alongside your shape-shifting companion, determined to avenge your shattered home and banish this devil back to the Netherworld.\n\n\t[i]Trial of the Demon Hunter - Volume One of Demons Among Men[/i] is an interactive novel by Samwise Harry Young where your choices control the story. The game is text-based with occasional vivid illustrations, a unique soundtrack, and driven by the vast, unstoppable power of your imagination.\n\n\t[i]You can play the first chapter of the game for free. Purchase the rest of the game below.[/i]\n\t*if choice_is_advertising_supported\n\t\t[i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\t*purchase adfree $3.99 purchased\n\t*if choice_is_advertising_supported\n\t\t*page_break_advertisement\n\t*if not(choice_is_advertising_supported)\n\t\t*page_break Play Now for Free\n\n*label purchased\n*page_break\n\n[b]Chapter One of Four[/b]\n\nYou ascend the cliff, loose rocks falling into the stagnant water beneath you at each new handhold. Sweat covers your body and drips into your eyes, and the overhead sun seems hotter by the minute. At the top, you find an outcropping leading to an eerie cave. You pause to catch your breath, and your nerves. You peer over at your impish boggart,\n*fake_choice\n\t#Kidas.\n\t\t*set boggart \"Kidas\"\n\t\t\n\t#Valentine.\n\t\t*set boggart \"Valentine\"\n\n\t#Humphrey. \n\t\t*set boggart \"Humphrey\"\n\n\t#Octavious.\n\t\t*set boggart \"Octavious\"\n\n\t#Jude.\n\t\t*set boggart \"Jude\"\n\n\t#Colbious.\n\t\t*set boggart \"Colbious\"\n\n\t#Beckham.\n\t\t*set boggart \"Beckham\"\n\n\t#Jupiter.\n\t\t*set boggart \"Jupiter\"\n\n\t#Harlow.\n\t\t*set boggart \"Harlow\"\n\n\t#He is named something else.\n\t\tYour apprentice is named\n\t\t*input_text boggart\n\nYou smile reassuringly and he grins back from his perch upon your shoulder. \n*image boggart.jpg \nYou listen carefully for signs of movement, but the cave appears devoid of life. The only sound is water falling from its jagged stalactites. Retrieving a candle, flint, and slab of metal from your satchel, you strike the hard objects together and ignite the candle. \n\nYou hold it above your head to illuminate the scene before you, activating the daggers on both ends of your staff, and stride forward confidently into the dangers that lie within. As you enter the dank cave, a scimitar streaks toward your face! \n*page_break\n\nFrantically diving backward, you narrowly dodge the blade, but trip over a stalagmite. The candle flies from your hand as you tumble backward in the darkness. You fall from the outcropping, and ${boggart} leaps lithely from your shoulder with a flare of his wings. You are left to plummet into the water below with a massive splash. Your momentum carries you to the bottom, where loose mud obscures your vision. You kick off from the base of the pond and reach the surface, gasping for air. \n\nWiping the disgusting residue from your eyes, instinct causes you to dive to the side. You just barely evade an arrow as it pierces the water beside you with a splash. Several more arrows rain down upon you from the cliff above. It takes all the focus and strength you have to dodge their glistening tips. \n\nYou finally make it to the bank of the pond, the cold water pulling at your garments as you stagger onto land. Your treacherous opponent, meanwhile, is leaping from the cliff with a throaty roar. You swivel just in time to confront the scimitar flashing toward your head. A goblin!\n\n*image Goblin.jpg\nYou barely manage to raise your staff defensively across your chest when his blade strikes your weapon, sending splinters flying. The momentum of the assailant's descent knocks you down, leaving you breathless and pinned beneath him. He cackles, raising his scimitar for the final blow. \n\nThe strong odor of perspiration mixed with alcohol rolls over you, making you gag. Quickly arching your back, you trap his elbow with your arms and use your legs to flip yourself onto your stomach. Your speed takes him by surprise, and you twist away, staggering to your feet.\n\nThe goblin leaps up, drawing a rusty dagger from his belt. Looking to the sky, you see ${boggart} descending swiftly, ready to blindside the villain. As your opponent charges forward with a scream of fury, you're glad you already decided how to handle the criminal. \n\nThe usual practice is to leave him alive, taking him with you to deliver him for a bounty. Conversely, you could walk an unconventional line and trade him as an indentured servant to a farmer, which would yield the most gilded pieces, but may entail hardship for the farmer. Finally, you could cripple him to make sure he won't cause anyone any trouble in the future.\n*fake_choice\n\t#You decide to trade the goblin to a farmer for more profit. The goblin is unlikely to follow his orders willingly, but that's not your problem….\n\t\t*set cunning %+3\n\t\t*set altruism %-5 \n\t\t*set t_goblin true\n\n\t#You'll incarcerate the goblin and deliver him to an outpost. Whatever his crimes, he deserves a proper trial.\n\t\t*set charisma %+3\n\t\t*set compassionate %+3\n\t\t*set i_goblin true \n\t\t\n\t#Permanently injuring the goblin to ensure he won't be able to commit further crimes seems like a fitting punishment for this criminal.\n\t\t*set break true \n\t\t*set i_goblin true\n\t\t*set resolve %+3\n\t\t*set compassionate %-5\n\nYou take a deep breath, eyeing the villain as he circles you warily.\n*choice\n\t#You engage him in close-range combat with your staff.\n\t\t*set resolve %+3\n\t\tYou charge forward to confront the goblin in direct combat. He slashes his rusty blade through the air but you deftly disarm him before slamming your \n\t\t*if break\n\t\t\tfoot into your opponent's knee with a sickening crunch. Screaming in pain, he crashes to his knees, clutching at the bone sticking out of his mangled leg. Smiling grimly, you swing your\n\t\tstaff into his skull with an audible crack. Your adversary groans, falling unconscious to the ground. ${boggart} returns to your shoulder, grinning toothily at your victory. \n\t\t*goto ruin\n\n\t#You will defeat him from a distance, using your dagger in an aerial attack.\n\t\t*set cunning %+3\n\t\tYou manifest a throwing dagger from your belt and send it spinning through the\n\t\t*if break\n\t\t\tair. Your opponent dodges frantically to the side but the dagger grazes his shoulder. You quickly close in and grab his scaly head, slamming your foot into his knee with a sickening crunch. Screaming in pain, he crashes to his knees, clutching at the bone sticking out of his mangled leg. You raise your weapon, but he suddenly collapses, apparently fainting due to his injuries.\n\t\t\t*goto ruin\n\t\tair. It embeds itself into his leg. Screaming in pain, your opponent crashes to the ground before you, clutching at his leg. As he attempts to climb to his feet, you swing your staff into his throat and he drops instantly. ${boggart} returns to your shoulder, grinning toothily at your victory. \n\t\t*goto ruin\n\n\t#Knowing how much he'll appreciate it, you allow ${boggart} to proceed with his ambush.\n\t\t*set relationship %+3\n\t\t*set charisma %+3\n\t\tYou stand casually, discreetly signaling ${boggart} to continue his attack. The goblin surges forward, laughing in delight, but ${boggart} abruptly descends onto his head. As your opponent lurches sideways with a strangled cry, you step forward, \n\t\t*if break\n\t\t\tkicking his knee with a sickening crunch. Screaming in pain, he crashes to his knees, clutching at the bone sticking out of his mangled leg. \n\t\t\t\n\t\t\tSmiling grimly, you swing your staff into the villain's \n\t\t\t*goto throat\n\t\tswinging your staff into his \n\t\t*label throat\n\t\tthroat. Groaning, the goblin collapses to the dirt. ${boggart} alights lithely onto your shoulder, giving you a toothy grin at the victory. You return the smile and tell him, \"Great teamwork, ${boggart}.\"\n\n*label ruin \n*page_break\nYou nudge the goblin with your heel, rolling his body over to face upward. With a start, you realize that \"he\" is actually a female, judging by the larger ears and paler complexion. In retrospect, this doesn't surprise you in the slightest. Goblins of either gender are known to be bloodthirsty at heart and equally attracted to chaos. Pulling the handcuffs from your satchel, you prop the goblin against a rock and shackle her hands. After she is secure, you sit down in order to regain your breath. Though this may seem a peculiar start to the day, it's fairly normal in your vocation. After all, you are a demon\n*choice\n\t#Huntress.\n\t\t*set gender \"Female\"\n\t\t*set hunter \"huntress\"\n\t\t*set female true\n\t\t*image female.jpg\n\t\t*set man \"woman\"\n\t\t*set dhis \"her\"\n\t\t*set dhim \"her\" \n\t\t*set dhe \"she\"\n\t\t*goto gender\n\n\t#Hunter.\n\t\t*set gender \"Male\"\n\t\t*set hunter \"hunter\"\n\t\t*set man \"man\"\n\t\t*set male true\n\t\t*image male.jpg\n\t\t*label gender\n\t\t*page_break\n\t\tA demon ${hunter} collects bounties on evil beings. Contrary to popular speculation, you yourself lack magical abilities. Instead, you use your cleverness, levelheadedness, charm, subtlety, and physical prowess along with various weapons to defeat your enemies and otherwise achieve your ends. \n\t\t*choice\n\t\t\t#You devote a moment to a thorough inventory. (HIGHLY recommended for first-time readers!)\n\t\t\t\t*goto inventory\n\t\t\t#You are knowledgeable of your items and their uses. \n\t\t\t\t*goto staff\n\n\t\t*label inventory\n\t\tYour arsenal, concealed by a dark cloak, is extensive. Tied to your belt is a bag of salt which distracts vampires. They are compelled to count each grain, and less powerful individuals are temporarily mesmerized. In deep pockets resting on each thigh, sealed by a drawstring, you have a pound of shaved iron. It burns the flesh of agents of the dark, such as vampires, witches and warlocks, and sorcerers. Attached to your belt are a dozen blue candles infused with incense, which calm your nerves, aid your vision, and distress weaker monsters. \n\t\t\n\t\tThe necklace you wear carries a master key, specially crafted to unlock any non-magical portal. The magical rune on your second necklace allows you to teleport to Dosgodar, a high-security prison, and bring up to five others along. To use the rune, you must separate its two sections and leave one in your current location for the return journey. Twenty minutes of painstaking scratching in the dirt is usually enough to finish the hieroglyphs around the rune. Then, turning the stone three times in your left hand, you will find yourself at the prison gates. \n\t\t\n\t\tThe hieroglyphs take time and concentration, but the spell allows you to quickly deliver the most dangerous criminals (i.e. Vermin and higher) directly to the prison. Afterwards, turning the rune three times in your right hand will then return you to your previous location. In an inner pocket of your robe, securely fastened, is the most important tool of your trade. The book is a bestiary of demons containing a constantly updated list of every demon known to Lumeans, illustrations of their primary forms, and a diagram including abilities and ranks. \n\t\t\n\t\tUsing a demon's name, you are able to exert some level of control and banish a weakened demon back to the Netherworld. The book is written in archaic Lumean and Infernal. Learning these languages, among many others, was covered in your extensive training as a demon ${hunter}. At your side, strapped across your chest, hangs a satchel. Inside its compartments are portions of dried fruit and bread, a pouch of water, and a case of healing ointment. Though not quite fast acting, the ointment can almost double your natural healing rate.\n\n\t\tThe silver chain looped around your wrist is useful for binding witches and warlocks. It paralyzes them on contact. Your final and most prized weapon is your staff. You carved it yourself from the wood of an ancient oak tree, and it is sturdy and well-balanced. You also imbued it with chemicals of your own creation. Exposure will contort muscles on contact, though you've built up your own immunity to the potion over many months. A small button hides among the elaborate carving of your staff. Pressing it releases razor-sharp daggers on its ends.\n\n\t\t*label staff\n\t\tYour battle with the dark is perpetual and taxing but well worth it.\n\t\t*fake_choice\n\t\t\t#You're allowed to take the treasures of criminals you capture, after all.\n\t\t\t\t*set altruism %-5 \n\t\t\t\t*set cunning %+3\n\t\t\t\tYou have amassed a sizable fortune from numerous exploits, everything from capturing petty thieves to ousting angry trolls. Helping others and smiting evil are additional bonuses, but gaining money is the primary objective.\n\n\t\t\t#You fight because of your hatred for beings that associate themselves with the darkness.\n\t\t\t\t*set resolve %+3\n\t\t\t\t*set stealth %+3\n\t\t\t\t*set compassionate %-5\n\t\t\t\tYou have a merciless personal vendetta against every evil being that plagues this world. Helping others and collecting money are additional bonuses, but smiting evil is your primary objective.\n\n\t\t\t#You truly want to make the wor
