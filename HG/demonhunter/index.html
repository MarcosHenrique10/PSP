ff but relax as you see that it's just Hildred, Rhys Falls's soothsayer. \n\nMany regard her as wise and talented, but most people think she is crazy. Although her powers have given useful insight in the past, scrying is also known to be rather unreliable. Either way, you have known this woman for years, and you believe her intentions are good enough. \n\nGripping your arm tightly, the fortune teller practically yells, \"${name}! It's terrible! It's horrendous! It's alarming! It's unusual! It's unheard of! It's insane! It's crazy! It's unlikely! It's peculiar! It's scary! It's demonic! I just saw a demon!\"\n\nYou blink hard, working to stammer out your reply.\n*fake_choice\n\t#All you can think is, thank goodness she survived!\n\t\t*set compassionate %+3\n\t\t*set charisma %+3\n\t\tLeaning in, you exclaim, \"I'm so glad you're safe! So many have died already, and I don't know if I could handle any more of my villagers' deaths.\"\n\t\t\n\t\tThe woman seems to relax, and she says, \"That means very much to me, ${name}. But what about the demon?\"\n\t\t\n\t\t\"I will be thankful for anything you can tell me,\" you reply.\n\t\t\n\t\t\"Even better, I can show you!\" she chirps, suddenly brightening up. \"I have enough strength to perform one bit of magic for you, so choose wisely.\"\n\t\t*goto magic\n\t\t\n\t#Perhaps she can give you some helpful information.\n\t\t*set cunning %+3\n\t\tPutting your hand on Hildred's, you tell her in a level voice, \"I need you to calm down, Hildred. My apprentice and I are tracking this demon right now, and I believe you can help us. Is there anything you can tell me?\"\n\t\t\n\t\tLooking a little more focused, the woman responds, \"Even better, I can show you! I have enough strength to perform one bit of magic for you, so choose wisely.\"\n\t\t*goto magic\n\n\t#You don't have time for this. In fact, you never have time for hysterical old coots.\n\t\t*set charisma %-5\n\t\t*set compassionate %-5\n\t\t*set resolve %+3\n\t\tShaking yourself out of Hildred's grip, you push past her, saying, \"I don't have time for your craziness and voodoo magic, old woman. I've got a demon to chase.\" Continuing your way down the path, you're surprised to see ${boggart} launching off your shoulders, back to the woman. Turning around, frowning a little, you say, \"${boggart}, what are you doing?\"\n\t\t\n\t\tHe ignores you, tugging at Hildred's dress and saying, \"Fortune teller lady, can you tell us about him?\"\n\t\t\n\t\tLooking less frightened now, the woman responds, \"Even better, I can show you! I have enough strength to perform one bit of magic for you, so choose wisely.\"\n\t\t\n\t\tShrugging his shoulders, your apprentice looks to you questioningly. Scowling, you hiss, \"We really don't have time for this, ${boggart}. Every moment we waste here makes our chances of catching the demon slimmer.\"\n\t\t\n\t\tFlying back to you, your boggart responds urgently, \"But she's the only one who saw the demon and actually survived! She can help us! And I think it would make her feel better. I mean, look at her, ${name}. She's distraught, and so am I! If you won't do it for her, or even for yourself, do it for me.\"\n\t\t\n\t\tPausing, you look at your companion, and back at Hildred. \n\t\t*choice\n\t\t\t#You're leaving. Nothing can be gained here.\n\t\t\t\t*set no_fortune true\n\t\t\t\t*set cunning %-5\n\t\t\t\t*set relationship %-5 \n\t\t\t\t*set compassionate %-5 \n\t\t\t\tShaking your head, you respond, \"My decision hasn't changed. Let's go.\"\n\t\t\t\t\n\t\t\t\tYour apprentice looks disappointed, but it's nothing to how the fortune teller reacts. As you turn around and walk away, she wails loudly and falls on her knees, tears pouring from her face. You shake your head and sigh audibly, continuing on your way.\n\t\t\t\t*goto way\n\t\t\t\t\n\t\t\t#You'll stay for their sake, and to see what there is to see.\n\t\t\t\t*set relationship %+3\n\t\t\t\t*set compassionate %+3\n\t\t\t\tSighing, you mutter, \"Fine. Let's get it over with.\"\n\t\t\t\t\n\t\t\t\t${boggart} smiles a little, fluttering back over to the soothsayer.\n\t\t\t\t*goto magic\n*label magic\t\t\n\nYou have seen the fortune teller work her magic before, so you know she is able to project illusions, discover secrets, and see portions of what the future might hold. A demon's power level can sometimes be inferred through his appearance, whether it's the beady eyes and withered limbs of a Peon or the arrogant glare of a Sovereign. This would give you something more accurate to analyze, rather than just a verbal description. \n\nStill, power level and actual abilities aren't the same thing. Or perhaps it would be best to know exactly what kind of adventure lies ahead, even if the results of future-scries are notoriously ambiguous. Your companion suddenly speaks up from beside you: \"It might be best to find out what the creepy's powers are, ${name}. Then we would know how to defeat him better.\"\n\n*if relationship > 51\n\tSmiling down at him, you reply, \"That isn't a bad idea, little fellow.\"\n*if relationship \u003c 50\n\tBarely glancing at him, you mutter coldly, \"I will decide.\"\n*choice\n\t#\"Can you show me what he looked like?\" you ask.\n\t\t*set image true \n\t\t*set stealth %+3\n\t\tNodding emphatically, she says in a quivering voice, \"I will never forget!\"\n\t\t*goto divine\n\t\n\t#\"Hildred, is there any way you can discover this devil's powers?\"\n\t\t*set resolve %+3\n\t\t*set relationship %+3\n\t\t*set powers true\n\t\t${boggart} bobs his head emphatically. Nodding slowly, she replies, \"I can try, but it will be difficult because I've had little contact with him.\"\n\t\t*goto divine\n\t\n\t#\"Can you tell me what will become of this journey? Will I banish the demon?\"\n\t\t*set cunning %+3\n\t\tNodding slowly, Hildred replies, \"I can try, but the future is never certain. I can only predict the most likely outcome.\"\n\t\t*label divine\n\t\t\n\t\tMotioning for you and your companion to step back, Hildred pushes up her sleeves, rubbing her hands together. Smiling wryly at you, she says, \"Specifically, I practice pyromancy, the art of fortune telling through flames!\"\n\t\t\n\t\tWith that, she stretches out her hands and a blue and white fire suddenly erupts on the ground, crackling loudly. The soothsayer grinds her teeth so hard you can hear it, and steps forward, peering into the flames. For a moment, all is silent except for the roaring flames. Then suddenly, \n\t\t*if image\n\t\t\ta figure begins to rise out of the flames, a huge demon with smoke wafting through his mouth and eyes. Even the image of your enemy is imposing, indeed. His hair blends in with the fire, flickering an acidic green as it billows from his head.\n\t\t\t\n\t\t\tBeneath the flames, his bones protrude from taut skin, but his muscles reveal a sinewy sort of strength. His arms are long and gangly, ending in spidery, sharp fingers that glow within the fire. His teeth are bared in a cruel, confident sneer, and his eyes betray a terrible, cunning malice. \n\t\t\t\n\t\t\tWorst of all, embers swirl around his frame like a powerful aura, hinting at his immense power. Looking past his terrifying appearance, you try to find any signs of abuse or neglect, but see little. Though he is unnaturally thin, and marred with a few tiny scars, he is otherwise in good condition. \n\t\t\t\n\t\t\tIf the destruction of your village wasn't proof of his power, this leaves little doubt. He can only be a Master or Sovereign: a horrible thought. A moment later, the figure suddenly disappears in a flurry of embers, leaving nothing behind.\n\t\t\t*goto climax\n\t\t*if powers \n\t\t\tHildred steps away, and the fire disappears in a flurry of embers and smoke. Working her jaw, the fortune teller turns to you, a curious look on her face. Lifting her hands in the air, her voice rises with every word. \n\t\t\t\n\t\t\t\"The demon possesses great power. He can communicate in ways very few can, and steal secrets untold! He creates spells to protect his allies, and dampen pain. He can escape harm, and travel in ways others cannot. He consumes all, and takes minds for his own!\"\n\t\t\t*goto climax\n\t\tshe says, \"A vision is coming to me! I see…\" Gulping loudly, Hildred's arms begin to quiver, but she continues: \"I see you inside a cave, fallen to your knees. You are within a ward of your own candles, but they have been destroyed!\"\n\t\t\n\t\tHer eyes growing wider, she finishes, \"Your staff lies beside you, shattered in pieces, and everything you own withers away. Your clothes are tattered and torn, and you are alone….\"\n\t\t\n\t\tA lump forming in your throat, you ask warily, \"Is that the only outcome? Must I fail?\"\n\t\t\n\t\tShaking her head sadly, the woman replies, \"There is nothing more I can say. The vision has gone away.\"\n\t\t*label climax \n\t\t\n\t\tAfter this climactic finish, the seer suddenly looks exhausted. Her arms hanging at her sides, she gasps for breath, sweat beading on her forehead. The fortune teller whispers wearily, \"I hope I have done my part to avenge Rhys Falls, ${name}.\"\n\t\t*fake_choice\n\t\t\t#Clearing your throat, you answer, \"Well, your divination was rather vague….\"\n\t\t\t\t*set compassionate %-5\n\t\t\t\tTears welling up in her eyes, the old fortune teller says, \"I'm sorry you can't appreciate my powers. We've all done our part to stop this demon, but Avery and the rest of the guards died, and now I've failed you. How I wish I could have foreseen this, but I couldn't. I've done everything that I can, just as I'm sure you will, and that's all anyone can ever ask of any of us.\"\n\t\t\t\t\n\t\t\t\tShe turns away, an exhausted look in her jaded eyes.\n\t\t\t\n\t\t\t#\"You have done well, Hildred! I will keep everything you've told me in mind,\" you tell her gratefully.\n\t\t\t\t*set resolve %+3\n\t\t\t\t*set compassionate %+3\n\t\t\t\tGiving you the first real smile you've seen all day, Hildred says confidently, \"I'm glad I could make a difference. I believe in you! I hope you will make that demon regret ever attacking our village!\"\n\t\t\t\n\t\t\t#Reassuringly, you tell her, \"You don't have to worry about any of that. I will take care of everything. I'm just glad you're okay.\"\n\t\t\t\t*set compassionate %+3\n\t\t\t\t*set charisma %+3\n\t\t\t\tGiving you the first real smile you've seen all day, Hildred says kindly, \"Thank you, ${name}. I only hope I have done enough to make a difference. Just be careful, okay?!\"\n\t\t \nWith that, she turns toward the woods, muttering, \"I must be going. That…took a lot of energy out of me. I need to go and sniff my essence of rooibos root.\"\n\t\t \nFinished here, Hildred quickly vanishes into the forest, leaving you at the roadside. \n*label way\nStanding beside you, your companion says quietly, \"But I like that lady. Do you think we'll see her again?\"\n\nLooking down at him, you reply,\n*if relationship > 50\n\t\"Everything depends on this journey, my friend.\"\n*if relationship \u003c 51\n\t\"[b]Everything[/b] depends on this journey.\"\n\nGripping your staff tightly, you continue down the road with danger on your mind.\n*finish Continue\n", "goodnight_boggart": "*page_break \n\n[b]Chapter Three of Four[/b]\n\n*set ointment -1\nYou send ${boggart} to gather tinder and kindling while you scrape out a small fire pit, and by the time he returns you've also found a few bigger logs in the woods that look fairly dry. You bend over and fiddle until the tinder ignites, and in a few minutes you have a roaring fire. While you're working, ${boggart} has snuggled up inside your backpack and is drifting into a boggart dream. \n*fake_choice\n\t#Sitting down beside your apprentice, you take a moment to congratulate him on his performance in battle.\n\t\t*set charisma %+3\n\t\t*set cunning %+3 \n\t\t*set relationship %+3\n\t\t*set compassionate %+3\n\t\t\"${boggart},\" you say softly, \"your influence certainly turned the tides in our favor today.\" \n\t\t\n\t\tAs he drifts off to sleep, a grin twitches briefly across his face. You hope he will sleep well enough tonight.\n        \n\t#You busy yourself with your own preparations, ready for a much-needed rest.\n\t\t*set relationship %-5\n\t\t*set compassionate %-5\n\t\t*set resolve %+3\n\t\tAs you work, ${boggart} drifts into unconsciousness with a tiny frown on his face. \n\n\t#You stretch out beside ${boggart}, feeling especially appreciative of his help today.\n\t\t*set charisma %+3\n\t\t*set compassionate %+3\n\t\t*set relationship %+3\n\t\t\"I know you've heard this before,\" you begin, \"but I can't thank you enough for your companionship. You've been my closest friend in all of our journeys together.\" You grin wryly, adding, \"You've saved my hide more than once, too.\" \n\n\t\t${boggart} drifts off to sleep, wearing a large smile as he settles deeper into your backpack. \n\n\t#Looking down at your apprentice, you remark coldly, \"I don't have time for your pointless drivel, so don't bother me during the night unless the demon himself appears.\"\n\t\tScowling, he opens one eye, muttering, \"You're too stupid to wake up anyway.\"\n\t\t\n\t\tNarrowing your eyes, you respond, \"Watch your mouth, boggart,\" and turn away.\n\t\t\n*if pet_hurt\n\tThough ${boggart} possesses naturally swift regenerative abilities, his body will need to use some mana for an extra healing boost tonight, unfortunately. \n\t*set mana -1\nWith your apprentice now asleep, you direct your attention toward other matters. You are fatigued from the events of your journey,\n*if (health \u003c 14)\n\tbut instead of going to sleep as well, you had better attend to your injuries. Drawing the case of unguent from your satchel, you unscrew the lid and dab your fingers into the ointment, gently spreading it on your injuries.\n\t*if staff\n\t\tYou sigh deeply,\n\t\t*goto new \n*if (health=15)\n\tthough your cunning and prowess in battle have gotten you through unscathed. You stretch your aching limbs and decide a little healing ointment would be appropriate. Drawing the case of unguent from your satchel, you unscrew the lid and dab two of your fingers across the ointment, spreading it across your body. \n\t*if staff\n\t\tYou sigh deeply,\n\t\t*goto new \n    \nYou let out a breath of relief, \n*label healing\nfeeling better immediately. The ointment also has a relaxing effect. Slumber is inevitable now, and you \n*label sleep\ngather a heap of soft leaves for a bed, positioning yourself by the warm glow of the dancing fire. The haphazard flickering lulls you to sleep, and one final waking thought flits through your mind.\n*label you_feel\n*choice\n\t#Tense in spite of your victory, you only feel saddened and worried.\n\t\t*set resolve %-5\n\t\t*set cunning %+3 \n\t\tYou are not happy about your performance in battle. What sort of demon could have recruited such powerful warriors so easily? You are also bothered by the prospect of having to face three assassins in battle mere hours into your journey. You wonder how many more dangers are between you and the demon you pursue. \n\t\t\n\t\tWorst of all, the terrible loss of your village still tugs at your chest. Unfortunately, you haven't even had time to process things since it happened, and you suspect you won't get an opportunity until everything is over.\n\t\t*goto snuggle\n\n\t*selectable_if (((stealth > 54) or (resolve >59)) or ((cunning > 54))) #You defeated those assassins, and you'll do the same to the demon.\n\t\tAfter all,\n\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t*goto think \n\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\tthe task is nothing more than a game of who manages to get the upper hand first.\n\t\t\t*goto snuggle\n\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t*label think \n\t\t\tyou believe you'll figure out a way to win this battle, regardless of the chances against you.\n\t\t\t*goto snuggle\n\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\tyou are the hunter, and he has a good reason to be running.\n\t\t\t*goto snuggle\n\t\t*else \n\t\t\t*goto think\n\n\t#You're mostly pleased that you've prevented the assassins from causing any further trouble.\n\t\t*set altruism %+3 \n\t\t*set compassionate %+3\n\t\tIt's a shame your journey was delayed, but you and ${boggart} are alive and well \n\t\t*if altruism \u003c 50 \n\t\t\t. Fortunately, you've managed to gain some money along the way, too.\n\t\t\t*goto snuggle \n\t\t*if redeem \n\t\t\t. And perhaps the assassins will make something better of themselves, too. \n\t\t*if not((altruism \u003c 50) and not(redeem))\n\t\t\tand you can move on in the morning.\n\t\t*goto snuggle\n\n*label new\n*set new true\nrelaxed by the ointment's soothing effect. Slumber calls you urgently, so you \n*label sleepy\ngather a heap of soft leaves for a bed, positioning yourself near the warm glow of the flames. There's just one thing. You no longer possess a staff that you can realistically use in battle. \n*set health -1 \nYou decide that your staff is much more crucial than a few extra hours of sleep, especially considering the events of the day. \n\nYou get to work right away, \n*if relationship \u003c 50 \n\tnot really bothering to be quiet about it.\n*if relationship > 54\n\tthough you remember to remain quiet as to not wake your companion.\nYou search through the branches, looking for a long, sturdy limb without too many protrusions. You finally find one that you think would be suitable. You draw your dagger and begin to saw the branch from its tree. For the next few hours, you perform the meticulous task of hollowing out the inside of the staff, and reinforcing its interior with metal circles that you had prepared. \n\nAfterwards, you begin infusing the inside of your staff with chemicals from a syringe. Finally, you insert the blades, engineering it so that a button extends them. Having done that, you proudly inspect your handiwork and test it out, making certain that its blades are functional and that its frame is resolute. By now, you're utterly exhausted. You sigh, and begin to gather a heap of soft leaves for your bed. \n\nYou make a nest near the warm glow of the fire, watching as the flames dance haphazardly, lulling you to sleep. As you drift off, one final conscious thought flits through your mind.\n*goto you_feel\n                                \n*label snuggle\n*page_break\n*set health + 5\n*set mana +3\nYou wake up, feeling as if you've just gone to sleep. Your stomach gnaws away at your body with hunger. The battle has left you famished. Rummaging through your satchel, you take out food, plenty of it, and warm it by the fire. When you finally finish your meal, you feel much better. You consider waking ${boggart}, but he still looks exhausted and you decide you had better not. \n\nInstead, you carefully place his portion of the meal by his side for when he wakes. \n*if not(no_fortune)\n\tAs you lie back down, your mind wanders to your encounter with Hildred. Her magic was certainly interesting, but you wonder if it's accurate enough to help you much. After all, even without her help, it was obvious that this demon is incredibly powerful. Your chances of success look alarmingly slim.\n\t*choice\n\t\t#Of all the pictures you could have seen, this one was incredibly unpleasant.\n\t\t\t*set cunning %+3\n\t\t\t*set stealth %+3\n\t\t\tHer estimations of the demon's powers do fit the horrendous amount of destruction in Rhys Falls, as much as you could wish to believe otherwise.\n\t\t\t*goto even\n                        \n\t\t#Actually, you don't put much value on her words. Fortune telling? It's nothing but unreliable voodoo!\n\t\t\t*set cunning %-5 \n\t\t\t*set resolve %+3\n\t\t\tFor all her showy performance, Hildred's powers are just simple parlor tricks. \n\t\t\t*if image\n\t\t\t\tBesides, even if the images were genuine, they would probably be just as reliable as the other forms of divination. Which is to say, not very.\n\t\t\t\t*goto so\n\t\t\tThe only magics you have seen actually doing something useful are the practical kinds: healing, nature bending, and the like.\n\t\t\t*label so\n\t\t\tSo, no matter what outcomes she foretold, you'll take it all with a grain of salt because you will defeat that demon, no matter what.\n\t\t\t*goto even\n                        \n\t\t#Although the task ahead seems daunting, the future is never set.\n\t\t\t*set charisma %+3\n\t\t\t*set resolve %+3\n\t\t\tHildred's visions were dire and\n\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t*label frit \n\t\t\t\tfrightening,\n\t\t\t\t*goto fit \n\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\tdifficult to imagine,\n\t\t\t\t*goto fit \n\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\tterrible,\n\t\t\t\t*goto fit \n\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\tsuffocating,\n\t\t\t\t*goto fit \n\t\t\t*else \n\t\t\t\t*goto frit \n\t\t\t*label fit \n\t\t\tbut your only option is to continue, and hope for the best.\n\t\t\t*label even              \n\t\t\tEven with your mind whirling, you are so weary that you soon fall asleep. \n\n*page_break\nLater in the night, you're woken abruptly. Staring groggily into the darkness, \n*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t*label uu \n\tyou're about to roll over and go back to your beauty sleep.\n\t*goto u \n*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\tyou wonder what is happening.\n\t*goto u \n*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\tyour senses are alert for any danger.\n\t*goto u \n*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\tyou grumble to yourself.\n\t*goto u \n*else \n\t*goto uu \n*label u\nThen, as your eyes finally adjust, you see ${boggart} standing right in front of your nose, one finger outstretched. Eyes wide, he pokes at you again and then suddenly realizes you're awake. \n\nClearing his throat, his hands fidgeting nervously, he whispers, \"${name}, I'm really cold and I keep having nightmares about what happened in Rhys Falls…. Can we cuddle?\"\n\nYou blink up at him for a moment, your thoughts still foggy from exhaustion.\n*fake_choice\n\t#It's the middle of the night. He really can't be serious.\n\t\t*set health +1\n\t\t*set charisma %-5\n\t\t*set relationship %-5\n\t\t*set altruism %-5 \n\t\tGrumbling, you mutter something incoherent and wave ${boggart} away, rolling over and pulling your hood tight over your head. You close your eyes and are nearly asleep again when he kicks your leg, complaining, \"Fine, I don't wanna sleep with you anyways, you deranged monkey!\"\n                \n\t\tYou growl and swipe at him with one arm, trying to brush him away. He skitters off into the dark, and before long, you're able to fall back to sleep. \n        \n\t#You sigh and sit up, looking around for a stick to stoke the fire.\n\t\t*set charisma %+3\n\t\t*set resolve %+3\n\t\t*set relationship %+3 \n\t\t*set altruism %+3\n\t\tYour head swims a bit as you rub the sleep out of your eyes, but you gently pat ${boggart} on the head, standing up. \"You just need to sleep a little closer to the fire,\" you tell him. \"Here, I'll stoke it for you.\"\n                \n\t\tYou rustle the logs, tossing a few more dry branches into the flames, and soon the fire burns merrily again. Pitching your stick into the flames, you reassure ${boggart}, \"Now you won't be cold, and the extra light will help keep your nightmares away.\"\n                \n\t\tYour apprentice gives you a half-hearted smile but replies, \"Thanks, ${name}.\"\n                \n\t\tSmiling back, you say sleepily, \"Of course. Now, I've got to get back to sleep. Who knows, maybe we'll banish that demon tomorrow?\"\n                \n\t\tGiving a little nod, ${boggart} moves his backpack nearer the fire and crawls inside, purring a little from the warmth. You lie back down, falling asleep almost before you close your eyes.\n        \n\t#Though you're still exhausted, you smile and open your arms, inviting him to curl up beside you.\n\t\t*set health -1\n\t\t*set relationship %+5\n\t\t*set charisma %+3\n\t\t*set altruism %+3\n\t\t*set compassionate %+3\n\t\tHis face lighting up, your little companion snuggles up against you looking very pleased. Meeting your eyes, he squeaks, \"Thanks, ${name}.\"\n                \n\t\tRubbing his head, you reply, \"You're very welcome, my friend.\"\n                \n\t\tSighing contently, he falls asleep right away. That night, you're reminded of why you insisted ${boggart} have his own room in your old home. His snoring and twitching jerks you out of your sleep several times, and occasionally he mutters something in a surprisingly loud voice. You eventually fall asleep from sheer exhaustion, though, your slumber solid and dreamless.\n*finish Continue\n", "prison": "*page_break \n\nYou rise, quickly restraining them with your silver chain. Suddenly, the abomination awakens with a heaving, ragged breath; ${he} begins coughing, ${his} face twisted in pain. A warm, golden glow appears around the mercenaries. Frowning, your hand twitches to your dagger but nothing happens. When the glow subsides, you see that all three assassins are looking much better, their wounds closing as the bruises fade to faint splotches.\n\nNow back in ${his} attractive and not monstrous form, ${he} remarks, \n*if warlock\n\t\"It appears as though we underestimated your power…how did someone like you defeat us,\n*if girl \n\t\"I…I can't believe that you defeated us. What's your secret, $!{hunter},\nand what will you do with us now?\"\n*if not(talk) \n\t*goto not_talk\n\nYou ask ${him}, \"What is your name, assassin?\"\n                \nHesitant, ${he} replies, \"${Illusia}.\"\n\nPausing, you consider how best to appeal to ${him}. Logic could perhaps sway ${him}, if you were clever about it. A passionate plea might also break down some of ${his} barriers. Finally, there are always more aggressive tactics you can use. \n*choice\n\t#You have HAD IT with these assassins! How dare they think this is acceptable behavior?!\n\t\t*set charisma %-5\n\t\t*set compassionate %-5\n\t\t*set illucio %-5\n\t\t*set mad true\n\t\tYou pace quickly, launching into a passionate tirade as you vent all your anger and frustration at the assassins. \"Magical abilities aren't the only source of power! I possess none whatsoever, but I've defeated all of you with just the help of my boggart! This alone is evidence that your powers aren't worth it. Just by being a ${witch}, you're paralyzed by silver, and burnt by iron! What's more, you're forever branded as an outcast of society. \n\t\t\n\t\t\"Murdering the innocent and sending them to the Netherworld to be slaves for demons?! That's despicable! And your sisters' abilities aren't useful for much but destruction and making others suffer. That is not true power. Power is being able to protect the ones you care about from people like you. [b]You[/b] are what's wrong with this world, and the only hope you have to not rot in that prison is to change your ways!\"\n\n\t\t*if warlock\n\t\t\t\"I tire of your petty insults!\" growls the warlock.\n\t\t*if girl \n\t\t\t\"That's just empty words, $!{hunter}!\" shouts the witch.\n\t\t\n\t\t$!{he} spits at you in disgust, and you angrily wipe the saliva from your cloak. You start to retort, but the other two, who had apparently come around in the last couple of minutes, quickly drown you out with raised voices, Venefira looking especially pleased at how your speech has failed. With people shouting threats, insults, and expletives, it's obvious that continuing is futile. \n\t\t\n\t\tNarrowing your eyes, you say sharply, \"You are all hopeless. It should have been obvious! The prison it is, then.\"\n\t\t*goto rune\n                        \n\t*selectable_if (charisma > 54) #You are passionate about helping these assassins, and you know it will show in your words, your voice, your very demeanor.\n\t\t*achieve redeem\n\t\t*set redeem true\n\t\t*set charisma %+3 \n\t\t*set compassionate %+3 \n\t\t\"How did a human defeat a ${witch} who gains ${his} power from demons? I shall tell you how. The thought of avenging my village and protecting those I love allows me to persevere. I am driven by love, which is far more powerful than greed or strength, or any other thing in this world.\"\n\n\t\t*if warlock\n\t\t\tRolling her eyes derisively, ${Illusia} spits at your feet, growling,\n\t\t*if girl\n\t\t\tSuddenly, Illusia begins to cry.\n\t\t\"Love didn't save my mother from being tortured and murdered in front of our very eyes. Love didn't stop those bastards from laughing at our pleas for them to stop! Power was the only thing that could have saved her, and we were utterly powerless, so don't sit there and tell me love is so powerful!\"\n\n\t\tYou pause, silent for a moment as her words resonate with you. \"I'm very sorry about your mother…is this why you became a ${witch}?\"\n\n\t\t\"Yes. My siblings and I tracked those pieces of scum down and slaughtered them with our new abilities, but it wasn't enough. Nothing could fill the void that her death had created….\"\n\t\t*if warlock\n\t\t\tIllucio continues vehemently.\n\t\t*if girl \n\t\t\tIllusia says, tears spilling down her delicate cheeks.\n\n\t\tPatiently, you explain, \"Killing the ones who murdered your mother probably gave you temporary gratification, but your actions only continued a trail of violence. You think that power is the only thing that holds sway in this world, but that's not what I have found. Love didn't bring those men to do those horrible things, and love didn't bring you to pursue revenge.\"\n\n\t\tThe mercenary seems a little unsure now, but ${he} scowls, saying, \n\t\t*if girl \n\t\t\t\"Don't patronize me!\"\n\t\t*if warlock \n\t\t\t\"Ah, and of course you're an expert on the human mind.\"\n\n\t\tShaking your head gently, you respond, \"I'm not trying to patronize you. I'm trying to help you! If you have agonized over the loss of a loved one, you should want to spare anyone else that pain. Instead of letting those monsters turn you into a villain, you can use that loss to make you a stronger person. Instead of using your power to hurt others, as they did, use it to help others who are powerless to fight back. \n\t\t\n\t\t\"Show the world, as I've shown you, that evil will not prevail. I'm taking the time to talk with you because I believe in redemption. I believe it's never too late to change for the better,\" you finish. \n\t\t\n\t\t\"How is that possible? I'll never be able to go back to society. I know for a fact I'll rot in that prison!\"\n\t\t*if warlock \n\t\t\tthe warlock says, his eyes burning.\n\t\t*if girl \n\t\t\tthe witch says, her voice rising in desperation.\n\t\t*goto redeem\n\n\t*selectable_if (cunning > 54) #You plan to handle this sensibly, as you usually do.\n\t\t*achieve redeem\n\t\t*set compassionate %+3\n\t\t*set redeem true\n\t\tArching an eyebrow, you begin, \"How did a mere human defeat warriors with demonic powers? It's because dealings with demons do not give true power. In fact, those bargains have weakened you and your siblings.\"\n\n\t\tSuddenly interjecting, Hestia says coldly, \"That's absurd. I bend fire to my will, and you would tell me that I'm weak?\"\n\n\t\tNodding, you reply, \"I agree, you've gained miraculous abilities, but your powers are mainly used for evil, and they come out of evil, as well. That is not true power. Destruction restricts you, fooling you into thinking that your only option is to be selfish, to seek your own desires at the cost of others' lives. I concede that there are some useful applications of your powers, like cooking, for example, but is it really worth losing your humanity?\"\n\t\t\n\t\tFolding your arms, you continue, \"Is it so important that you would forget compassion, destroy your relationships, and become an outcast of society?\"\n\t\t\n\t\t\"Ven murdered those guys. What if I get in her way?\" mutters ${Illusia}. \n\t\t\n\t\tVenefira frowns but doesn't say anything. You continue, \"Just to stay alive, you've stooped to assassination. Even if you could kill innocents without repercussions, any display of your types of power would instantly give you away as a creature of the dark. So now, to be accepted in society, you must never use your powers.\" \n\t\t\n\t\t\"That's utterly absurd!\" interrupts Venefira.\n\t\t\n\t\tNodding, you reply, \"Of course, as you've done so much to gain them. However, you've only gained the illusion of power. Now, silver, iron, and even a simple blue candle can conquer you. The real question, then, is why should someone like you be able to defeat me?\"\n                                        \n\t\tVenefira decides to interject again, growling, \"But this was the only way to gain our powers. Magicians are weak and rely on chance, and hardly anyone is clever enough to become a wizard! Certainly not this lot….\" she mutters.\n\n\t\tPursing your lips, you say, \"Truly, I cannot imagine why you would sacrifice so much to gain so little. Magical powers aren't everything. I possess not even the slightest bit of mana, but I've defeated you and both of your siblings with only the help of my boggart.\"\n\n\t\t${Illusia} and Hestia seem very unsure now, but Venefira screws up her green face angrily and retorts, \"Why should we listen to you, idiot?! You only spared our lives because otherwise you'd die, too. What a hypocrite you are.\"\n                                        \n\t\tClasping your hands together, you implore, \"I've given no insults. I only want to see the best future for all of you. There is no way to completely undo the damage you've done, but you may still turn around and try to rebuild what you've destroyed.\"\n                                        \n\t\tThe illusionist's voice \n\t\t*if warlock \n\t\t\tunwavering,\n\t\t*if girl \n\t\t\tshaky,\n\t\t${he} responds, \"How is that possible? Now, I'm only going to rot in prison!\"\n\t\t*label redeem\n\t\t*set illucio %+20 \n\n\t\tGiving ${him} a little smile, you say, \"Right now, it is impossible, but I will tell you something very few people know. Once admitted to the prison, you will be incarcerated with all the other criminals of similar records. However, if your behavior is excellent for a full year, you will have the opportunity for personal therapy with the presiding wizard. His name is Iyus the Selfless, and he can train you to channel your powers into something good, and useful, as well as help you heal mentally.\n\t\t\n\t\t\"If that process were to be completed, you would be released and allowed to serve others in the community. Eventually, you could even be found new homes, new identities in a new community. This is kept quiet to prevent inmates from causing trouble, but I want you to know so that you have a better chance of turning your life around. You truly can help the ones you've hurt.\" \n\t\t\n\t\tYou hadn't noticed until now, but Hestia actually seems to be listening intently. Venefira just looks like she's waiting for you to finally shut your big mouth, but it's better than nothing. You begin to speak again, but ${Illusia} suddenly questions, \"Hestia and Venefira are normal, though…well, sort of. But what about me? I'm a monster without my powers! How can an abomination return to a normal life?\"\n\n\t\tYou look at ${him} thoughtfully, then inquire, \"${Illusia}, I'm curious as to how you became like this. It seems to me as though your sisters are far more powerful, and yet they don't have this terrible curse.\"\n                                        \n\t\t${Illusia} looks down, refusing to meet your eyes, but ${he} eventually responds, \"When we kidnapped the child sacrifices, I couldn't imagine actually killing them. We began to trade them to the Netherworld for our powers, but after the demon had granted my request, I took one of the children and ran…. Furious, the demon cast this curse on me.\"\n                                        \n\t\t$!{he} stops for a moment, looking stricken. \"Then, he killed the child. After that, I saw no other choice but to lead the life I have now. I am a monster, and we were hunted for killing the people who murdered our mother.\n\t\t*if warlock \n\t\t\tIt seems society is never content unless someone is being persecuted.\"\n\t\t*if girl \n\t\t\tSometimes it just feels like I'm not fated to lead a very happy life.\"\n                                        \n\t\tNodding sadly, you reply, \"I'm very sorry to hear that. You know, though, I believe the therapy I mentioned earlier would be able to return you to your previous state.\" \n\t\t\n\t\tYou all continue talking, and eventually it appears as though you've persuaded the assassins to at least attempt a change. Hestia looks thoughtful, and she is very quiet. Venefira, however, still seems somewhat unconvinced. \n\t\t*if girl\n\t\t\tA tear slides down Illusia's face as she whispers, \n\t\t*if warlock\n\t\t\tIllucio looks grateful. Staring at his boots, he whispers,\n\t\t\"Thank you…. How can we ever repay you?\"\n\n\t\tYou smile. \"Prove to me that you won't allow evil to prevail. Prove that you can break free and look for a better way. That is truly one of the greatest displays of strength.\"\n\n\t\t$!{he} nods, looking relieved but still embarrassed. As ${he} stares down at the ground, ${his} stomach rumbles audibly. Inclining ${his} head at the necklace around your neck, ${Illusia} suddenly comments \n\t\t*if warlock\n\t\t\twryly, \n\t\t*if girl \n\t\t\tcoyly, \n\t\t\"I see you've taken most of our belongings…. You can pretend not to like me all you want, but it gets pretty obvious when you rummage through my clothes while I'm unconscious.\"\n                                        \n\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t*label ret \n\t\t\tYou retort, \"Oh? I see where [b]your[/b] mind is, but we can't all have what we want.\"\n\t\t\t*goto want \n\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\tBlinking hard, you stare at ${him}, unsure of what to say.\n\t\t\t*goto want \n\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\"Oh, I'm sure you were just playing dead, possum!\" you shoot back.\n\t\t\t*goto want \n\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\tFrowning, you respond sharply, \"I hope you aren't trying anything. I still don't trust you.\"\n\t\t\t*goto want \n\t\t*else \n\t\t\t*goto ret \n\t\t*label want \n                                                \n\t\t\"Still,\" ${he} continues, \"I shouldn't say I'm surprised. In any case, I'd rather you have them than the vultures at Dosgodar.\"\n                                        \n\t\tNodding your head noncommittally, you respond, \"Yes, well…what does this necklace do, anyway?\" \n                                        \n\t\tSmiling faintly, the illusionist replies, \"If you're clever enough to defeat the three of us with only the help of a boggart, I'm sure you'll discover that for yourself.\"\n                                        \n\t\tClearing your throat, you decide that you're basically done here. Now that you've steered them in a better direction, it's time to take them to the prison. The food there is definitely not the best, so you give a thought to sharing. You've about five days' worth of rations in your satchel, more than enough for you and your apprentice.\n\t\t*choice\n\t\t\t#On second thought, you're chasing a demon. You need your rations.\n\t\t\t\t*set altruism %-5\n\t\t\t\t*set cunning %+3\n\t\t\t\t*set compassionate %-5\n\t\t\t\t*set resolve %+3\n\t\t\t\tDeciding against it, you think to ask ${Illusia}, \"I know that you and the others were sent here by the demon. What did he tell you?\"\n\t\t\t\t*label ask\n\n\t\t\t\tLooking nervous, ${he} replies, \"We were doing other…business. He approached us, offering to increase our powers if we brought him your head. That's all.\"\n\n\t\t\t\tNodding, you sense that you will garner no further information. You stand and tell ${him}, \"It's time for me to deliver you to the prison, then.\"\n\t\t\t\t*goto rune\n\n\t\t\t#You give them each a piece of bread. After all, it'll be their last meal before unknown-substances stew.\n\t\t\t\t*set charisma %+3\n\t\t\t\t*set compassionate %+3 \n\t\t\t\t*set altruism %+3\n\t\t\t\t*set illucio %+5 \n\t\t\t\t*set resolve %-5 \n\t\t\t\tPulling three chunks of bread from your satchel, you tell the assassins, \"I imagine you must be hungry. I have some bread for you. I'm going to position the chain so that one of your arms is free and you can eat. I'm trusting you not to attack me. Don't break my trust, or it won't go well for any of us.\" \n                                                        \n\t\t\t\tThey quickly nod, hungrily eyeing the pieces of bread. Kneeling down beside them, you loosen the chain around ${Illusia}'s arm so ${he} can freely hold the food and eat it. For a moment, ${his} arm brushes against yours.\n\t\t\t\t*if warlock \n\t\t\t\t\tIt feels warm and tough.\n\t\t\t\t*if girl \n\t\t\t\t\tIt's surprisingly soft and delicate.\n\t\t\t\tStanding back, you wait as ${he} greedily devours the meager ration. \n\t\t\t\t\n\t\t\t\tThen, you do the same for Venefira and Hestia, and after they have all finished, you re-affix the chain. Straightening out, you comment, \"Now that you're a little less hungry, I suppose you'll be more inclined to tell me about your encounter with the demon?\"\n\t\t\t\t*goto ask\n               \n*label not_talk \nRaising your eyebrows incredulously, you reply, \"Well, ${Illusia}, there are other things that hold sway in this world besides dark magic and evil. You would do well to learn that.\"\n                \n$!{he} falls silent, a stubborn look on ${his} face. Fluttering his wings idly, your apprentice asks you, \"What do you think will happen to them at Dosgodar?\"\n*fake_choice \n\t#\"They won't be our problem anymore,\" you respond cooly.\n\t\t*set resolve %+3 \n\t\t*set altruism %-5 \n\t\tYour companion nods solemnly, muttering, \"You're probably right.\"\n\t\t\n\t\tEyeing you coldly, Venefira comments, \"Yes, and thank the Netherworld for that.\"\n\t\t\n\t\tHestia chuckles mirthlessly, but ${Illusia} just swallows, looking nervous.\n\t\t\n\t#\"Hopefully they will realize their mistakes, but maybe that's just wishful thinking.\"\n\t\t*set compassionate %+3 \n\t\tYour companion nods, giving you a little smile. Hestia and ${Illusia} just exchange doubtful glances, and Venefira rolls her eyes, glaring at you in distaste.\n\t\t\n\t#Eyeing the assassins with a mischievous smirk, you say, \"Oh, I don't know, maybe they'll be fed to the piranhas.\"\n\t\t*set charisma %+3 \n\t\t*set compassionate %-5 \n\t\t*set illucio %-5 \n\t\tHestia just rolls her eyes, and Venefira scoffs in disbelief, but the color drains from ${Illusia}'s face. ${boggart} giggles, twitching his tail excitedly.\n\t\t\n*if not(info)\n\t\"Well,\" you remark, \"I suppose it's finally time to go to the prison.\"\n\t*goto rune\n*if info \n\t*if break\n\t\t*achieve brutal  \n\t\"Regardless, my desire is to learn more about this demon,\" you say, eyeing your enemies coldly.\n                        \n\tLaughing humorlessly, Venefira spits, \"Do your worst, demon ${hunter}! If you're dumb enough to kill me, I guess I'll see you in the black abyss!\"\n                        \n\tFrowning, you step forward, promptly slamming the bottom of your staff into her nose. She roars at you furiously, spitting at your face, and looks more angry than cooperative. Grinning dangerously, you say sharply, \"Would you really like to lose your good looks over some monstrous demon?\"\n                        \n\tSeething with anger, Venefira glares at you for a moment longer, but seems to see the futility in resisting. Sighing, she says tersely, \"We were doing other…business, when the demon approached us, offering to increase our powers in exchange for your head. That is the only interaction we had. And if you don't believe me, well, you can go ask him yourself.\"\n                        \n\tNodding once, you decide there's no further useful information to be had. Or, at least, not any that would be worth using up more of your valuable time.\n\t*label rune\n\t\n\t*page_break\n\tDrawing your transportation rune from around your neck, you disconnect it into halves and place one half onto the ground before you. You take the dagger from your belt, kneeling as you meticulously carve several hieroglyphs into the dirt. Soon, an intricate pattern begins to form, stemming from where your rune lays. A while later, you finally complete the complex inscriptions that activate the rune's teleportation magic, despite Venefira trying to distract you at every chance.\n\t\n\t*if ((redeem) or (mad))\n\t\tStretching, you place the other half of the rune into your left hand, flipping it gently into the air. Upon the final revolution of the rune, you, ${boggart}, and the assassins vanish.\n\t\t*goto prison\n\tAs you prepare to toss the rune's other half, Hestia asks worriedly, \"Where are you taking us?\"\n\n\tWith a mysterious smile, you flip the rune into the air, saying cryptically, \"I think you know,\" as you, ${boggart}, and the assassins vanish.\n\t*goto prison\n\n*label prison\n*page_break\nYour bodies are momentarily suspended, and then you reappear on a massive cliff. Its jagged stone is completely surrounded by the churning, icy waters below. Peering up into the multicolored sky, you get a face full of rain for your efforts. The sudden downpour is accompanied by roaring thunder chasing lightning across the sky. Though the darkness is beginning to grow, a fork of lightning above briefly illuminates the dismal scene. \n\nSeveral hundred feet in front of you is a gargantuan castle, encircled by a piranha-infested moat and protected by ever-vigilant archers who patrol the walls. Inside are some of the most dangerous prisoners on Lume and their wardens: skilled guards, magicians, and Iyus the Selfless, the presiding wizard. Indeed, he is aptly named. \n\nFor the past few decades, he has dedicated his life to rehabilitating criminals, and most importantly, securing them in this massive fortress with intricate and powerful wards. Without him, this region would surely be a far more dangerous place. There is a long, stone bridge crafted from natural rock connecting you with this intimidating prison, the renowned Tower of Dosgodar. \n\nTwo grim-faced women appear at your side, walking out of a pair of inconspicuous recesses in the rocks. They wear the ruddy orange uniforms of the Dosgodar guards, and they are holding tall spears and silver shackles. The taller one says huskily, \"No need to take these villains all the way to the prison. We can complete the transaction here.\"\n\nYou nod and step aside as the other guard begins to shackle each assassin in turn. As she finishes, she returns your chain to you. The taller guard says\n*label address\n\"In what rank do you place these mercenaries?\"\n        \nIn all honesty, you'd place these assassins in the Vermin rank. However, it appears that this sentry isn't aware of their status. If you like, you could always fabricate their rank in hopes of a higher bounty. After all, this fortress is more professional than\n*if t_goblin\n\tany farmer, \n*if i_goblin\n\tthe soldiers at the outpost,\nso bartering is out of the question. On the other hand, you could also opt for the lowest bounty, were you so inclined.\n*choice\n\t#You decide to tell a little harmless lie about the class of these witches.\n\t\t*set gold +55\n\t\t*set charisma %-5 \n\t\t*set altruism %-5 \n\t\t\"They're Cretin,\" you say bluntly.\n\t\t\t\t\t\t\n\t\t\"Really? Because this says otherwise,\" replies the sentry, raising an eyebrow as she indicates a glowing rune held in her hand. \"Our runes can decipher a prisoner's power level easily. The question was just a preliminary formality, of course,\" she says with a crooked smile. \"Oh, and there's a five gilded piece fee for declaring the wrong ranks—paperwork charge, naturally.\"\n\n\t\tScowling, you grit your teeth but are wise enough not to object. After making a point of dramatically extracting five coins from a bag, she tosses you the bag, turning to her red-haired comrade and muttering, \"Level two.\"\n                        \n\t\tNodding, the other soldier makes her way toward the tower, escorting the mercenaries. As the first soldier pivots around to follow her companion up the bridge, you ask, \"Wait a moment. May I see your badges? It's standard procedure, you understand….\"\n                        \n\t\tRaising an eyebrow, she says, \"Ah, yes. It would be a shame to deviate from procedure, wouldn't it?\"\n                        \n\t\tStepping forward, both of the sentries reveal their \"Dosgodar personnel\" badges, which identify them as Rolda and Redoe. Satisfied, you nod your head in the affirmative. Turning back around toward the prison, Rolda says, \"Next time, bring some common sense with you, eh?\"\n\n\t\tYou dismiss her comment with a flippant hand gesture as you turn away, shivering\n\t\t*goto shiver\n\n\t#The assassins are in the Vermin rank.\n\t\t*set cunning %+3  \n\t\t*set gold +60\n\t\tNodding in confirmation, she tells you, \"Glad to meet an honest person in this corrupt world,\"\n\t\t*goto glow\n\t\t\n\t#You say, \"They are in the Vermin rank. However, it was my duty to apprehend them. I opt for the lowest bounty available for their rank.\"\n\t\t*set altruism %+3\n\t\t*set stealth %-5\n\t\t*set gold +45\n\t\tSmiling, the sentry tells you, \"It's rare that we come upon someone as noble or as honest as you,\"\n\t\t*label glow\n\t\tindicating a small rune glowing yellow in her hand. \"Our runes will decipher any prisoner's level of power, even if it has been suppressed or recently removed. The question was just a formality,\" she says with a crooked smile.\n\t\t*if ((confine) or (talk))\n\t\t\t\"Here is your bounty.\"                  \n\t\t*label bonus2\n\n\t\tTossing you a sizable bag of coins, the guard turns to her comrade, muttering, \"Level two.\"\n\n\t\tNodding, the red-haired guard makes her way toward the tower, escorting the mercenaries. As the other guard pivots around to follow her companion up the bridge, you ask, \"May I see your badges? It's standard procedure, you understand….\"\n                        \n\t\tChuckling wryly, the guard responds, \"Ah, yes, of course.\"\n                        \n\t\tStepping forward, both of the sentries reveal their \"Dosgodar personnel\" badges, which identify them as Rolda and Redoe. Satisfied, you nod an affirmative. Turning back around toward the prison, Rolda says, \"Anyway, we appreciate your service. With more people like you, evil wouldn't be so rampant.\"\n\n\t\tYou smile slightly, but find yourself shivering\n\t\t*label shiver\n\t\tuncontrollably as the incessant downpour chills your entire body. \n\t\t*label Iyus\n\t\tAs she walks away, you suddenly remember something important. Reaching out to touch her arm, you say, \"Wait, I'd like to petition Iyus. I'm after a powerful demon, and I need the wizard to help me. These villains I've just delivered to you are nothing compared to who I truly face. I would go so far as to say that this devil is a regional threat.\"\n\t\t\n\t\tShaking her head sadly, the sentry replies, \"I'm sorry. The Selfless wizard is currently channeling a great deal of magic into various wards across the entire prison. It requires an immense amount of focus, and interrupting the ritual could be disastrous. He's instructed all of us to not interrupt him under any circumstances. I will be sure to let him know, though.\"\n\t\t\n\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t*label sig \n\t\t\tSighing, you respond, \"Okay. Thank you anyways.\"\n\t\t\t*goto ha \n\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\"Hmm…well, do make it a priority.\"\n\t\t\t*goto ha \n\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\"Ah. That's disappointing. Well, try to inform him as soon as possible.\"\n\t\t\t*goto ha \n\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\tYou raise your eyebrows disappointedly, replying, \"I see.\"\n\t\t\t*goto ha \n\t\t*else \n\t\t\t*goto sig \n\t\t*label ha \n\t\t\t\n\t\tAs the clouds continue to release their contents onto you, ${boggart} voices his complaints from upon your shoulder. \"I'm frozen solid, ${name}; there's an icicle growing on my nose!\"\n\n\t\t*if relationship > 49 \n\t\t\tLaughing, you can't help but agree with his point, if not his accuracy.\n\t\t*if relationship \u003c 50 \n\t\t\t\"Oh, stop complaining. We're all cold and tired, here,\" you reply sharply.\n\t\t\t\n\t\tEager to get out of the inclement weather and back to the warmth of the forest, you take your rune and raise your hand, ready to flip it.\n\t\t*if redeem\n\t\t\tJust as you are about to flip the rune a third time, you peer out toward ${Illusia}, Hestia, and Venefira, crying out, \"Remember what I told you!\"\n\n\t\t\tFor a moment, you are worried that they haven't heard you over the thunderstorm, but ${illusia} turns ${his} head toward you, yelling, \"Of course, demon ${hunter}! What is your name?\"\n\n\t\t\t\"${name}!\" you reply with the phantom of a smile playing across your lips.\n\n\t\t\tSighing, you flip the rune in your hand. With a slight tremor of the air, you and your apprentice vanish.\n\t\t\t*goto vanish\n\n*label vanish\n*page_break\nReappearing in the woods near Rhys Falls, you wring the water from your robe. Turning toward ${boggart}, you remark, \"This sunny weather is a welcome change!\"\n\nFluttering around, he agrees, \"Much better than that wild storm!\" \n\nThen, you set to work, reattaching the separate halves of your rune. Next, you kneel down onto the ground and wipe out the glyphs until all you can see is plain, smooth dirt. The sun is setting soon enough, and you begin work on a bonfire.\n*finish Continue\n", "route": "*page_break\n\n*set amulet false\n*set charm true\n*temp scout false\n*temp humiliate false\n*page_break\nYou awake several hours later, your internal clock telling you it's time to resume the chase. Sitting up, you relish a rare moment of calm, even in the midst of the chaotic scene around you. What had been a living ground for nature is now marred with the blood of yesterday's adversaries and other unpleasantness. ${boggart} is still sleeping, but the food you left next to him is gone. He must have woken hungry and eaten it while you slept.\n\nWith a sigh, you carefully lift your satchel, boggart and all, and hoist it onto your back. You reach down and retrieve your staff, gripping it tightly and feeling very relieved to have\n*if new\n\tyour primary weapon back in your possession.\n*if not(new)\n\tslept so well, considering the strenuous events of the previous night.\nYou gather all your materials, returning to the path made by the demon's trail of destruction. After several minutes of walking, the trail disappears. For some reason, the demon has opted to cover his tracks. \n\nAs you stand still, trying to figure out your path, your newly-acquired necklace suddenly glows an earthy green and tugs vehemently toward the northeast. So that's what ${Illusia}'s mysterious charm is, then: a blood charm!\n*if cunning > 54 \n\tYou knew it!\nBlood charms are essentially magic devices. They are attracted to supernatural entities or dark magic users. In addition, they are virtually indestructible and a very valuable asset to any ${hunter}. \n\nNo wonder ${illusia} commented when you liberated it. The violent tug of the charm seems too strong for even a demon's presence. It could be something entirely different, or even that something combined with the demon. \n*if (charisma >53)\n\tThis is wonderful. Now what? \nAccording to local rumor, there is a vampire named Lord Sarrivan dwelling nearby. He owns a decrepit castle surrounded by the Damur swamp. \n\nPerhaps the demon has taken refuge in the vampire's lair, or perhaps he only means to stall you as before, with the assassins. \n*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t*label cors \n\tOf course, no adventure is complete without a vampire. And you HATE vampires.\n\t*goto hate \n*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\tIt's a pity to delay any further, but perhaps the vampire's lair might hold some hints to this demon. At the very least, it must have some useful spells or tools that you can put to a much better purpose.\n\t*goto hate \n*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\tYou've often wondered what knowledge might be stored in its famed libraries.\n\t*goto hate \n*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\tYou've long wanted to besiege it. Vampires, ugh—you HATE vampires.\n\t*goto hate \n*else \n\t*goto cors \n*label hate \nWell, at least now you have the perfect opportunity to hit two sirens with one stone, as it were. \n\nCalculating the routes to the vampire's tower, you decide that there are three viable alternatives. The forest is secluded but dense, and you aren't really equipped to fight off dangerous beasts. Following the trail, on the other hand, is straightforward, but paths in this forsaken part of the country are often watched by bandits. \n\nFinally, there is a geyser field. It's the most direct route and you won't encounter beasts or bandits there, but there are active spouts and boiling water hidden beneath thin crusts of earth. While it would allow ${boggart} some more much-needed rest, even with caution and precision you'd need a bit of luck to cross safely.\n*choice\n\t#The geyser field is the quickest path, not to mention that ${boggart} is always thankful for a little extra rest after a day of battle.\n\t\t*set relationship %+3\n\t\t*set resolve %+3\n\t\t*set mana +1\n\t\tYou move away from the demon's path and toward the steamy, cracked ground ahead. Massive clouds of heated mist rise out of the earth here, and there are no plants anywhere in sight: not even cacti. As your feet kick up clouds of dust and silt, you cough and wipe the sweat from your face. Several jets of boiling water burst from the ground but you can't discern their patterns just yet. \n\t\t\n\t\tSomehow, you'll have to decide how to cross this field unscathed. Sometimes the eruptions are preceded by a faint rumbling or intensifying steam, but you would need good hearing and close attention to detail to detect these signs in time. You could examine the ground carefully, study the geyser's patterns as best you can, and then run across during a dormant period. \n\t\t\n\t\tLonger observation might even give you the pattern of the eruptions and some indication of where you might safely step. ${boggart} remains in your backpack, asleep, since his abilities will be more valuable to you once you reach the vampire's castle.\n\t\t*choice\n\t\t\t*selectable_if (stealth > 54) #You decide to cross the field right away, using observation, caution, and quick reflexes to get you through.\n\t\t\t\t*set stealth %+3\n\t\t\t\t*set cunning %+3\n\t\t\t\t*set health -1 \n\t\t\t\tYou wait for the nearest geysers to subside, breathing deeply as you calm your mind and body. Then, you begin the walk across the geyser field. You move slowly, deliberately, your senses straining for any tell-tale sign of an impending eruption. Progress is painstakingly monotonous and sluggish. Sweat pours down your body as the heavy steam blankets you. \n\t\t\t\t\n\t\t\t\tNarrowly avoiding several geysers, you dodge between the jets of boiling water and hissing, scalding steam. Even so, you feel yourself quickly dehydrating, and the occasional droplets of boiling water splash your skin. You are finally able to creep past the final geyser after what seems like an eternity of sneaking around the field.\n\t\t\t\t\n\t\t\t\t*if resolve > 54\n\t\t\t\t\t[i]Well, that was annoying,[/i] you think to yourself.\n\t\t\t\tFinally exiting the badlands, soaked with sweat and smelling of sulphur, you \n\t\t\t\t*if relationship > 49\n\t\t\t\t\tsmile wanly \n\t\t\t\t*if relationship \u003c 50 \n\t\t\t\t\tglance tiredly \n\t\t\t\tat your apprentice, who has crawled from out of your backpack and onto your shoulders. \n\t\t\t\t\n\t\t\t\t\"That went well!\n\t\t\t\t*goto geyser_transform\n                        \n\t\t\t*selectable_if ((resolve > 54) and (cunning > 54)) #Swiftness and calculation should get you to the other side in safety.\n\t\t\t\t*set resolve %+3\n\t\t\t\t*set cunning %+3\n\t\t\t\t*set health -2\n\t\t\t\tYou take a deep breath, steadying yourself, and then head out quickly across the field. You are able to pick out a tentative pattern in the eruptions, and you weave your way through the dormant areas at top speed. The mist obscures your vision and the sulphur smell is overwhelming, but you manage to keep your footing as you press forward. \n\t\t\t\t\n\t\t\t\tJust as you near the perimeter of the badlands, a geyser that had been silent since you arrived suddenly erupts by your side! Searing pain rips through your arm as the boiling water and steam scald your skin. You grit your teeth, pushing your sleeve back to take some of the heat off your arm. Sweat pours from your body from the humidity, and your throat is dangerously dry. \n\t\t\t\t\n\t\t\t\tFinally passing the dangerous areas, you stop and bend over, your hands on your knees as you gasp for breath. You \n\t\t\t\t*if relationship > 49\n\t\t\t\t\tsmile wanly \n\t\t\t\t*if relationship \u003c 50 \n\t\t\t\t\tglance tiredly \n\t\t\t\tat your apprentice, who has crawled out of your backpack and now sits on your shoulders. You remark, \"Maybe the next time around, I'll rule out geyser fields when trying to get somewhere.\"\n\t\t\t\t*goto geyser_transform\n\n\t\t\t#This field is beyond you. Scarily enough, you'll have to brave the geysers and leave the outcome purely to chance.\n\t\t\t\t*set resolve %+3 \n\t\t\t\t*set cunning %-5 \n\t\t\t\t*set stealth %-5 \n\t\t\t\t*set health -6\n\t\t\t\tYou would consider just taking another route entirely, but unfortunately, you wouldn't have time to reach the castle before dark. Inhaling deeply, you attempt to \n\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t*label surp \n\t\t\t\t\tsuppress the urge to turn back\n\t\t\t\t\t*goto focus2 \n\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\tfocus \n\t\t\t\t\t*goto focus2\n\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\tget your thoughts together\n\t\t\t\t\t*goto focus2 \n\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\tcalm your jittery nerves \n\t\t\t\t\t*goto focus2 \n\t\t\t\t*else \n\t\t\t\t\t*goto surp \n\t\t\t\t*label focus2 \n\t\t\t\tbefore crossing the lethal geyser field. After the nearest geysers subside, you charge into the dangerous terrain. \n\t\t\t\t\n\t\t\t\tYou do your best to watch for eruptions, but the signs are difficult to see, and the mist obscures your vision. You have only crossed partway when a geyser erupts by your side, sending searing pain ripping through your arm. You push back your steaming sleeve and stubbornly press forward, sweat pouring down your body. \n\t\t\t\t\n\t\t\t\tYou narrowly evade several more hot spots, circling around massive jets of liquid. Surging through the clouds of steam, you have nearly made it to the end of the field when a geyser jets behind you. As it sprays onto your back, you dive forward onto the rugged ground, crouching almost into a ball as you scurry away. \n\t\t\t\t\n\t\t\t\tThe water is still spraying around you and your apprentice. You hurriedly bring your arms up, desperately trying to protect your body. Coughing violently, you stumble as fast as you can toward the end of the field. You can see it through the steam, but just as you make the last few steps, one foot sinks through the crust and falls into boiling water below. \n\t\t\t\t\n\t\t\t\tCrying out, you \n\t\t\t\t*if health \u003c1  \n\t\t\t\t\tquickly succumb to the multitude of injuries afflicted upon you. You struggle to maintain your fragile grip on life, but your vision swiftly fades into the infinite blackness that is your death, and ${boggart}'s futile, heartbreaking laments for you to remain awake fade into nothing.\n\t\t\t\t\t*goto_scene death\n\t\t\t\tstagger the last few feet to solid ground, collapsing near the end of the field. You almost slip into unconsciousness, but ${boggart} darts forward, shaking you awake. Groaning, you force yourself into a sitting position, biting through the terrible pain. \n\t\t\t\t\n\t\t\t\tWith a sigh, you admit, \"That could have gone much better, but at least we made it out alive. \n\t\t\t\t*label geyser_transform\n\t\t\t\tNow that we've crossed the geyser field, we're very close to the vampire's castle.\" \n\t\t\t\t\n\t\t\t\tYou pause, ready to give ${boggart} his instructions.\n\t\t\t\t*set geysers true\n\t\t\t\t*choice\n\t\t\t\t\t#\"I need you to stay in your original form by my side to conserve your mana.\"\n\t\t\t\t\t\t*set original true\n\t\t\t\t\t\t*goto chased_transform\n\n\t\t\t\t\t*selectable_if (transformations_eagle) #\"Transform into an eagle to aid me in battle if the vampire proves too powerful.\"\n\t\t\t\t\t\t*set eagle true\n\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t*set relationship %+3\n\t\t\t\t\t\t*set mana -3\n\t\t\t\t\t\t*goto chased_transform\n\n\t\t\t\t\t*selectable_if (transformations_viper) #\"Use your viper form,\" you order, \"and aid me in battle with subtle and swift attacks.\"\n\t\t\t\t\t\t*set viper true\n\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t*set relationship %+3\n\t\t\t\t\t\t*set mana -2 \n\t\t\t\t\t\t*goto chased_transform\n                \n\t\t\t\t\t*selectable_if (transformations_toad) #\"Turn into your amphibian form. I'll need some more poisonous darts.\"\n\t\t\t\t\t\t*set toad true\n\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t*set relationship %+3\n\t\t\t\t\t\t*set darts +3\n\t\t\t\t\t\t*set mana -1\n\t\t\t\t\t\t*goto chased_transform\n          \n\t#The forest will give you the most cover, especially if the demon or any more assassins are lurking nearby.\n\t\tYou leave your current path and head directly into the forest, careful to be as quiet as possible. Everyone has heard the stories of travelers being savaged by mysterious wild beasts. ${boggart} could possibly be of some help here, so you unfasten your pack. He flutters out, hovering in midair, looking at you intently.\n\t\t*goto 600 \n\t\t  \n\t#You choose to head down the trail. It's the best balance of haste and caution.\n\t\tYou diverge from the demon's trampled pathway, heading west toward the footpath near the forest's edge.\n\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t*goto reports \n\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t*goto careful \n\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t*label careful \n\t\t\tYou watch carefully for bandits as you travel, of course.\n\t\t\t*goto car \n\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t*label reports \n\t\t\tThere have been reports of bandits here. If you weren't in a hurry, it might be worth taking a few of them out of circulation.\n\t\t\t*goto car \n\t\t*else \n\t\t\t*goto reports \n\t\t*label car \n\t\tYour apprentice, meanwhile, has perched himself on your shoulder and he looks at you, clearly waiting for instructions.\n\t\t*choice \n\t\t\t#\"You know,\" you tell the boggart, \"why don't you rest for now in the backpack? Yesterday was quite the ordeal.\"\n\t\t\t\t*set original true\n\t\t\t\t*set mana +1\n\t\t\t\t*set cunning %-5 \n\t\t\t\t*set compassionate %+3\n\t\t\t\t*set relationship %+3\n\t\t\t\tSince ${boggart}'s species is actually nocturnal, he curls up gratefully and falls asleep at once. You hear him snoring peacefully as you trudge down the trail. \n\t\t\t\t*label sleeping\n\t\t\t\tBefore long, your wandering thoughts are broken by the sound of an argument.\n\t\t\t\t*if original\n\t\t\t\t\tYears as a demon ${hunter} have taught you caution. You remove your backpack and set it gently behind a nearby tree as\n\t\t\t\t\t*goto men\n\t\t\t\tYou consider concealing yourself to check this out, but \n\t\t\t\t*label men\n\t\t\t\tthe quarrelers ascend a small hill and spot you at once. \n\t\t\t\t\n\t\t\t\tYou see a red-haired swordsman, a woman with a crossbow, and a short, scruffy man who whips out a wicked looking knife. \n\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t*label yer \n\t\t\t\t\tAh, your favorite people: \n\t\t\t\t\t*goto so \n\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t*goto somehow \n\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t*label somehow \n\t\t\t\t\tSomehow, you aren't surprised:\n\t\t\t\t\t*goto so \n\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\tOf course:\n\t\t\t\t\t*goto so \n\t\t\t\t*else \n\t\t\t\t\t*goto yer \n\t\t\t\t*label so \n\t\t\t\tbandits.\n\n\t\t\t\t\"Look what we've got here, friends!\" hollers the swordsman. He turns to you, sword raised, and threatens, \"This is your unlucky day, ${hunter}!\"\n\n\t\t\t\tYou sigh deeply. He's spotted your badge, so things are going to go the way these things always do. He waves the claymore, yelling, \"I suppose you thought you'd bounty us, eh? Well, we've got another idea!\"\n\n\t\t\t\tWith that, he charges forward, the thief at his heels, with the woman leveling her crossbow.\n\t\t\t\t*goto heels \n\t\t\t\t\n\t\t\t*selectable_if (transformations_viper) #\"Turn into a serpent,\" you tell him, \"and give me an edge in the battle that lays ahead.\"\n\t\t\t\t*set mana -2\n\t\t\t\t*set resolve %+3\n\t\t\t\t*set relationship %+3\n\t\t\t\tYou continue, \"This forsaken area is infamous for bandits and other troublemakers who attack unwary travelers. However, we're a different story, and I think they'll find us a little more prepared.\" \n\n\t\t\t\t${boggart} nods and, with a small puff of granite-colored smoke, transforms into the electric viper. Slithering up your sleeve, he lightly drapes himself around your shoulders and hides beneath your cloak as you continue on your way. \n\t\t\t\t*goto sleeping\n\n\t\t\t*selectable_if (transformations_toad) #\"I want to collect some venom. Would you turn into your toad form?\" you ask your apprentice.\n\t\t\t\t*set stealth %+3\n\t\t\t\t*set mana -1\n\t\t\t\t*set darts +3\n\t\t\t\t*set relationship %+3\n\t\t\t\t\"There are a lot of bandits near that dismal swamp,\" you explain. \"I think they'll find us a little more prepared than the usual fare, though,\" you add, and ${boggart} nods his agreement.\n\t\t\t\t\n\t\t\t\tIn a minuscule puff of ashen smoke, he changes into a tiny, opalescent toad. Carefully pulling on your gloves, you reach out to ${boggart} and he leaps onto your palm. Your small beaker lays snugly just beneath ${boggart}'s stomach, catching the drips as he secretes the black-colored venom. Reverting back to his original form, he settles groggily onto your shoulder as you gently coat your darts with the poison, putting one into the blowpipe and the others into a small, tin box. \n\t\t\t\t\n\t\t\t\tNoticing ${boggart}'s tired, deep-set eyes, you suggest, \"Why don't you get some more rest now? It will take us a little while to reach the fortress, and I know you must be exhausted after all the chaos of the last few days.\" \n\t\t\t\t\n\t\t\t\tHe just smiles sleepily, crawling into your backpack by way of answer.\n\t\t\t\t*goto sleeping\n\t\t\t\t\n\t\t\t*selectable_if (transformations_eagle) #\"${boggart},\" you request, \"transform into an eagle and scout the area. I want to know more about what might be lurking near these woods.\"\n\t\t\t\t*set cunning %+3\n\t\t\t\t*set relationship %+3\n\t\t\t\t*set mana -3\n\t\t\t\t*set scout true\n\t\t\t\tYou explain, \"Many travelers have been relieved of their goods or lives here. However, we are no mere travelers, are we?\"\n\n\t\t\t\tHe nods, transforming into a majestic eagle with a puff of granite-colored smoke. Stretching his wings, he goes soaring into the air and beyond the pinnacle of the forest, soon lost from view. Several moments pass by in relative silence, and then the silhouette of an eagle briefly darkens the sun. Gliding down, he perches on your outstretched arm, digging his claws into your wrist chaps. \n\t\t\t\t\n\t\t\t\tHe chirps at you, informing you with his bird-code that three bandits are heading toward you but are not aware you are in the forest, and they will be upon you shortly. You respond promptly, \"We have three options. Hide in the trees and ambush them, stand in the open and set a trap, or conceal ourselves and let them pass by us.\n\n\t\t\t\t\"If an ambush worked, it would be quick, but we would also be at close range and therefore at risk.\" ${boggart} nods intently, and you continue, \"If we set a tree branch to fall on them and then stood and waited as they approach, we'd be safer but we would need a little luck for that. \n\t\t\t\t\n\t\t\t\t\"Or we could just hide if any outlaws come. After all, they aren't who we're chasing,\" he interjects.\n\t\t\t\t\n\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t*goto shaking \n\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t\"That sounds viable,\" you say, stroking your chin.\n\t\t\t\t\t*goto shack \n\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t\"Yes, I suppose that's an option,\" you reply.\n\t\t\t\t\t*goto shack \n\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t*label shaking \n\t\t\t\t\t\"I see your point, but I don't fancy cowering away from a few petty criminals,\" you respond, shaking your head.\n\t\t\t\t\t*goto shack \n\t\t\t\t*else \n\t\t\t\t\t*goto shaking \n\t\t\t\t*label shack \n\t\t\t\t\"Anyways, what's your opinion on these options?\"\n\t\t\t\t\n\t\t\t\t\"I like them all!\" he responds energetically.\n\n\t\t\t\t*if relationship > 54\n\t\t\t\t\tYou shake your head and grin. \"Thanks for the feedback, ${boggart}.\" \n\t\t\t\t\t*goto moment\n\t\t\t\t*if relationship > 50\n\t\t\t\t\tYou shake your head. \"Well…okay then.\"\n\t\t\t\t\t*goto moment\n\t\t\t\t*if relationship \u003c 51\n\t\t\t\t\tYou shake your head. \"I should have known better than to ask you for advice.\" \n                                        \n\t\t\t\t\tScrunching up his face, he remarks, \"Well, maybe you can't choose because you're so fat!\" \n                                        \n\t\t\t\t\t\"What?! That makes no sense, boggart,\" you say scornfully. When he doesn't respond, you simply wave a hand dismissively.\n\t\t\t\t*label moment\n\t\t\t\t*choice\n\t\t\t\t\t#You decide to climb up into the trees and allow the bandits to pass.\n\t\t\t\t\t\t*set conceal true\n\t\t\t\t\t\t*goto conceal\n\n\t\t\t\t\t#You're feeling sneaky today. You'll set a trap for the bandits.\n\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\"${boggart}, keep an eye on the trail for me, will you? I'm going to go into the forest and set a trap for our shady friends over there. When they're about a minute away from me, shriek loudly.\"\n\n\t\t\t\t\t\t${boggart} chirps, \"You got it!\" and soars into the sky. \n\t\t\t\t\t\t\n\t\t\t\t\t\tHe glides in lazy circles, vigilantly watching the bandits' progress. Meanwhile, you quickly clamber up a sturdy live oak and draw your dagger, sawing away at a massive branch. The branch eventually comes free and you set to work. As the branch dangles, creaking slightly in the light breeze, you use your rope to steady it and brace yourself against the trunk. \n\t\t\t\t\t\t\n\t\t\t\t\t\tYou balance the branch delicately, then tie a cloverleaf in one place, and a slip knot in another. Pushing gently, you ease the branch to hang suspended in mid-air, right in the bandits' path. Just as you finish, ${boggart} screeches above you. It looks like your company has arrived. \n\t\t\t\t\t\t\n\t\t\t\t\t\tHastily climbing back down, you take your position in the middle of the road, palming your dagger and letting your robe cover your wrist. Soon the silhouettes of the criminals appear over a small hill, the sun radiating at their backs. \n\t\t\t\t\t\t\n\t\t\t\t\t\tThere is a thin woman carrying a crossbow; a short, slight man with no visible weapons; and a burly, red-haired swordsman. As they draw close, you hear the swordsman complain, \"If you'd been a better shot, we could have sold that falcon's feathers!\"\n\n\t\t\t\t\t\tThe woman gestures with her crossbow, replying in a husky alto, \"Are you as stupid as you look? That wasn't a falcon, it was an owl!\"\n\n\t\t\t\t\t\tThe smaller man interjects, \"No, but really, do you think it would have tasted good?\" \n\n\t\t\t\t\t\tThe swordsman turns to respond to his comrades when he finally notices you standing there, right in the middle of the road. You lean sideways, relaxed, with one hand resting against a nearby tree. His eyes widening at the sight of your hunter's badge, he yells, \"Look what we've got here, gang!\" \n\n\t\t\t\t\t\tHe sneers at you, \"You're an unlucky ${hunter}, you know that? I suppose you thought you were going to take us in for a profit! Well, we have a better idea!\"\n\n\t\t\t\t\t\tDrawing his weapon, he charges forward as the smaller man pulls out a dagger and starts to circle around to one side. You calmly move your outstretched hand, pulling at the rope concealed behind the tree trunk. Your branch plummets downwards, its timing perfect, and it dangles by the rope and goes swinging neatly through the air. \n                                                \n\t\t\t\t\t\tBoth the redhead and the shorter man are right in its path, and the branch smashes the swordsman in the face as he tries to duck. The other man is hit in the ribs, and they both collapse, the thief knocked against another tree by the force of the blow. Narrowing her eyes, the bowman quickly raises her crossbow, but ${boggart} dives through the air and rakes her across the back, leaving angry red tears in her tunic. \n\t\t\t\t\t\t\n\t\t\t\t\t\tShe screams, dropping her weapon. You dart forward, ramming your elbow into her throat. She splutters violently and goes down, her face purple. Suddenly, a twig snaps and you whirl around, your eyes meeting the green stare of the smaller man. He is crouching, one hand at his bruised ribs, the other moving a dagger slowly from side to side.\n\t\t\t\t\t\t*label thief\n\n\t\t\t\t\t\tHe darts forward, stooped down to catch you in the stomach, but you bring your staff to bear instantly and block his thrust. He curses as you deliver a smart rap to his knuckles
