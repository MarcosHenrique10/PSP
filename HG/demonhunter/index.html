e_break\n\t\t\t\t\t*if girl\n\t\t\t\t\t\t*image Illusia.jpg\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tYou stare, amazed by her beauty. Her brilliant red hair flows flawlessly down her back; her supple, moist lips are pursed in impatience; and her big, doe-like eyes seem to swallow you. She has curves in all the right places, and her dress is cut to reveal just enough cleavage. \n\t\t\t\t\t*if warlock\n\t\t\t\t\t\t*image Illucio.jpg\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tYou stare, motionless, at this handsome and powerful man. His rippling muscles, broad shoulders, and confident stance hold your rapt attention. His verdant eyes are piercing and you sense fires burning within him. \n\t\t\t\t\tShaking your head, you break yourself out of your reverie; ${he}'s a ${witch} assassin, and was probably sent to murder you! \n\t\t\t\t\t\n\t\t\t\t\tThe other two are old acquaintances of yours. Venefira and Hestia are mercenaries wanted in several provinces for their violent crimes. You have never battled either of them personally, but you met them once during a long job near the village of Quader. The third person is unknown to you, although you assume ${he} is also a dark magic wielder. \n\t\t\t\t\t*if ((stealth > 54) or (cunning > 54))\n\t\t\t\t\t\t*set shimmer true\n\t\t\t\t\t\tOn closer examination, you see what seems to be a nearly unnoticeable shimmer around\n\t\t\t\t\t\t*if warlock \n\t\t\t\t\t\t\this \n\t\t\t\t\t\t*if girl \n\t\t\t\t\t\t\ther\n\t\t\t\t\t\tbody, although it could just be a trick of the light. \n\t\t\t\t\t\n\t\t\t\t\tThey stand before you expectantly, their expressions ranging from alert to smug. You gently set your backpack on the ground, all the while considering your plan of action. As you watch, your attention is drawn to a conspicuous tattoo on the mercenaries' foreheads. You suddenly realize it's written in Infernal! That vile language is generally only known to demons, wizards, and demon hunters. \n\t\t\t\t\t\n\t\t\t\t\tYou recognize the writing as an ancient ward, a type of seal that must always be set on the bearer's forehead. After a moment, you translate it: [i]\"If I die, you die!\"[/i] This is a particularly powerful and nasty curse, releasing a bolt of energy into the heart of whomever kills its bearer. Even a wizard would find it very difficult to deflect. It can only ever be revoked by the caster himself or by intricate and very powerful spells.\n\t\t\t\t\t\n\t\t\t\t\tIn order to survive this battle, you must be sure not to kill any one of these assassins.\n\t\t\t\t\t*goto choices2 \n\t\t\t\t\t\t*label choices2 \n\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t#However, you do plan to interrogate them by any means necessary. Perhaps you can gain some information about this demon.\n\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t*set compassionate %-5\n\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t*set info true\n\n\t\t\t\t\t\t\t#It will be simplest to just incarcerate them. You are mostly thinking about their goods and bounty, after all.\n\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t*set altruism %-5\n\t\t\t\t\t\t\t\t*set confine true\n\n\t\t\t\t\t\t\t#Even if you must fight them, you also hope to dissuade them from their current path in life.\n\t\t\t\t\t\t\t\t*set charisma %+3\n\t\t\t\t\t\t\t\t*set compassionate %+3\n\t\t\t\t\t\t\t\t*set talk true\n\t\t\t\t\t\tNow that you have a basic strategy, you can plan for the battle. \n\t\t\t\t\t\t*if destruction = 1 \n\t\t\t\t\t\t\t${boggart} suddenly comments, \"${name}, I don't think it's a good idea to use your grenade here. It's too risky.\" \n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*selectable_if ((concussion > 0) and (transformations_eagle)) #If ${boggart} transforms into an eagle, he can surprise the assassins with your concussion grenade.\n\t\t\t\t\t\t\t\t*set cunning %+5 \n\t\t\t\t\t\t\t\t*set stealth %+5 \n\t\t\t\t\t\t\t\t*set mana -3\n\t\t\t\t\t\t\t\t*set concussion -2\n\t\t\t\t\t\t\t\tYou turn to your companion, whispering your instructions. A toothy grin spreads across ${boggart}'s face. \"Very clever, ${name}!\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tWith a puff of ashen smoke, he transforms into his eagle form.\n\t\t\t\t\t\t\t\t*goto concussion_eagle\n        \n\t\t\t\t\t\t\t*selectable_if ((tear > 0) and (transformations_eagle)) #Tear gas grenades from above, with a little help from ${boggart}'s eagle form, should slow these assassins down.\n\t\t\t\t\t\t\t\t*set cunning %+5 \n\t\t\t\t\t\t\t\t*set stealth %+5 \n\t\t\t\t\t\t\t\t*set mana -3\n\t\t\t\t\t\t\t\t*set tear -3\n\t\t\t\t\t\t\t\tYou softly explain your plans, and ${boggart} turns to you, a toothy grin spreading across his face. \"Very clever, ${name}!\" \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tWith a puff of ashen smoke, he transforms into a handsome eagle.\n\t\t\t\t\t\t\t\t*goto tear_eagle\n\n\t\t\t\t\t\t\t*selectable_if ((iron=8) and (transformations_eagle)) #You'll ask ${boggart} to transform into an eagle and empty your bags of iron onto these dark magic users.\n\t\t\t\t\t\t\t\t*set cunning %+5 \n\t\t\t\t\t\t\t\t*set stealth %+5 \n\t\t\t\t\t\t\t\t*set mana -3\n\t\t\t\t\t\t\t\t*set iron -8 \n\t\t\t\t\t\t\t\tYou whisper your plan to ${boggart}, who turns to you with a toothy grin, saying, \"Very clever, ${name}!\" \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tIn a moment, he has changed into an eagle with a lingering puff of ashen smoke.\n\t\t\t\t\t\t\t\t*goto iron_eagle \n\n\t\t\t\t\t\t\t#You tell ${boggart} to stay concealed in the foliage while you attack the assassins.\n\t\t\t\t\t\t\t\t*label boggart_hides\n\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\t*set relationship %-5\n\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t*set charisma %-5\n\t\t\t\t\t\t\t\t*set eagle_hide true\n\t\t\t\t\t\t\t\t\"${boggart},\" you tell him, \"you stay here while I deal with these assassins.\n\t\t\t\t\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t\t\t\t\t*label prob \n\t\t\t\t\t\t\t\t\tIt's probably better for you this way.\"\n\t\t\t\t\t\t\t\t\t*goto bog \n\t\t\t\t\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t\t\t\t\tYou might be able to sneak attack them that way.\"\n\t\t\t\t\t\t\t\t\t*goto bog \n\t\t\t\t\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t\t\t\t\tI might need you as a last resort.\"\n\t\t\t\t\t\t\t\t\t*goto bog \n\t\t\t\t\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t\t\t\t\tYour powers aren't suited for this sort of thing, and I believe my prowess is a match for theirs.\"\n\t\t\t\t\t\t\t\t\t*goto bog \n\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t*goto prob \n\t\t\t\t\t\t\t\t*label bog \n\n\t\t\t\t\t\t\t\tHe eyes you quizzically, a grumpy frown on his face, but he nods anyway. You set off for the clearing, staff raised. \n\t\t\t\t\t\t\t\t*set by_yourself true\n\t\t\t\t\t\t\t\t*goto fight_by_yourself \n\n\t\t\t\t\t\t\t*selectable_if (transformations_viper) #${boggart}'s viper form will be useful for the battle.\n\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t*set mana -2\n\t\t\t\t\t\t\t\tYou say softly, \"${boggart}, I plan to launch a head-on attack. Hide in my robe and bide your time, all right?\" \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYour apprentice complies with a toothy smile, transforming into an electric viper with a puff of ashen smoke. Slithering up your sleeve, he drapes himself loosely around your shoulders. \n\t\t\t\t\t\t\t\t*goto electric_viper\n                                                \n\t\t\t\t\t\t\t*selectable_if (darts > 2) #Poison darts are always a good bet. You plan to snipe the assassins from your hiding place.\n\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t*set darts -3\n\t\t\t\t\t\t\t\tThree darts should do for at least two of them—you just need to choose your targets.\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#The ${beautiful} ${witch} and Hestia seem the most vulnerable.\n\t\t\t\t\t\t\t\t\t\t*set venefira true \n\t\t\t\t\t\t\t\t\t\tYou fire the trio of darts in quick succession. One hits the unknown ${witch}'s chest, and ${he} falls limply to the ground. Suddenly, her appearance distorts and then shifts completely. Even from your vantage point, you can see that ${he} has changed far more than a mere poisonous dart could warrant. Ratty, filthy hair stems in patches from\n\t\t\t\t\t\t\t\t\t\t*if warlock \n\t\t\t\t\t\t\t\t\t\t\this \n\t\t\t\t\t\t\t\t\t\t*if girl \n\t\t\t\t\t\t\t\t\t\t\ther\n\t\t\t\t\t\t\t\t\t\tgrotesque head,\n\t\t\t\t\t\t\t\t\t\t*if warlock \n\t\t\t\t\t\t\t\t\t\t\this \n\t\t\t\t\t\t\t\t\t\t*if girl \n\t\t\t\t\t\t\t\t\t\t\ther\n\t\t\t\t\t\t\t\t\t\tskin is grey and leathery, and a rancid odor permeates the air around \n\t\t\t\t\t\t\t\t\t\t*if shimmer\n\t\t\t\t\t\t\t\t\t\t\t${him}. In fact, ${he} is an abomination. The shimmer you saw earlier really was the sign of an illusion! \n\t\t\t\t\t\t\t\t\t\t*if not(shimmer)\n\t\t\t\t\t\t\t\t\t\t\t${him}. In fact, ${he} is an abomination.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tMeanwhile, the fire-witch burned one dart but missed the second, and it buried itself in her neck. She emits a low shriek and collapses, lying motionless beside the other assassin. Venefira rotates around to confront you, hunching her shoulders as she charges with an angry roar. She raises two daggers covered in a sticky black venom, and you tense, ready for battle.\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (staff) #You raise your staff, preparing to engage her head-on.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto venefira_staff\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (iron > 0) #A cloud of iron should slow down this witch.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto venefira_iron\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t#The paralyzing effects of your silver chain are exactly what you need.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto venefira_chain \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (tear > 0) #A tear gas grenade should provide a useful distraction.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto venefira_tear\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (concussion > 0) #You reach into your pack and pull out a concussion grenade.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto venefira_concussion\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (destruction=1) #Your destruction grenade will blast through just about any defense.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto absolve\n                                                                \n\t\t\t\t\t\t\t\t\t#You attack the ${beautiful} ${witch} and the burly Venefira.\n\t\t\t\t\t\t\t\t\t\tEmploying three concentrated bursts of breath in a quick succession, you fire the trio of poisonous darts at the assassins. The first dart hits the ${witch}'s chest, felling ${him} unconscious to the ground. As ${his} body hits the dirt, ${his} appearance suddenly distorts, before changing completely. Even from your vantage point, you can see that the ${witch} has changed far more than mere poisonous darts warrant. \n\n\t\t\t\t\t\t\t\t\t\tThe assassin has been exposed for what ${he} really is: an abomination. Ratty, filthy hair stems in patches from ${his} grotesque head, ${his} skin is grey and leathery, and a rancid odor permeates the air around \n\t\t\t\t\t\t\t\t\t\t*if shimmer\n\t\t\t\t\t\t\t\t\t\t\t${him}. The shimmer you saw earlier actually was the sign of an illusion! \n\t\t\t\t\t\t\t\t\t\t*if not(shimmer)\n\t\t\t\t\t\t\t\t\t\t\t${him}. \n\t\t\t\t\t\t\t\t\t\tMeanwhile, Venefira swivels around and deflects one dart with her dagger's blade. The third dart buries itself in her neck. She grunts, surprised, and yells, \"Oh…! You runt, I'll cut off your—\" \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tToppling over mid-sentence, she collapses and lies immobile on the dirt. Hestia shoots you a furious glare. Igniting her jagged nails, she surges toward you and you feel a wave of hot air emanating from her.\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (destruction=1) #You blast her with the destruction grenade.\n\t\t\t\t\t\t\t\t\t\t\t\t*set hestia_fire true\n\t\t\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\t\t\t*set health -1\n\t\t\t\t\t\t\t\t\t\t\t\t*set destruction -1 \n\t\t\t\t\t\t\t\t\t\t\t\tAs the assassin surges forward, you manifest your grenade from your satchel, activate it, and cast it through the air. It detonates in a massive cloud of pitch-black smoke, vibrant fire, and raw power. The aggressor is completely engulfed as something within the cloud ignites, erupting in a massive gout of flame. You dive backwards as chunks of burning debris hail down upon you. \n\t\t\t\t\t\t\t\t\t\t\t\t*if (health \u003c 1) \n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto main_death\n                                                                                \n\t\t\t\t\t\t\t\t\t\t\t\tYour heart dropping into your stomach, you're afraid that the demon's curse will rebound on you, but nothing happens. You shield your eyes as embers swirl around you, relieved but confused as to why the ward hasn't killed you. After a moment, you are surprised to see Hestia lunging through the billowing smoke, battered but clearly unhurt by the fire itself.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tShe traverses the distance between you, her jagged nails igniting, but you swiftly retrieve your dagger from your belt. Throwing it through the air, you impale her shoulder with a spray of blood. The assailant shrieks in agony and collapses to the ground, unconscious.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto loot\n                                                                                \n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (concussion > 0) #Your concussion grenade should put her out of commission.\n\t\t\t\t\t\t\t\t\t\t\t\t*set concussion -1\n\t\t\t\t\t\t\t\t\t\t\t\t*set resolve  %+3\n\t\t\t\t\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\t\t\t*set health -1\n\t\t\t\t\t\t\t\t\t\t\t\tActivating the grenade, you hurtle it through the air. She is right in front of your grenade as it detonates with an ear-ringing bang. Staggering backward, she barely seems able to stand. You run forward and bring your staff to bear, but she angles her hand toward you, casually emitting a powerful wave of heated air. The blast throws you backwards, your hair singed and your skin burned, and you crash to the dirt with a thud. \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tYou clamber to your feet as Hestia hurries forward, still weaving dizzily from the effects of the grenade. You duck as she tries to claw you, then turn to slam your staff into her jaw. She falls to the ground, stirring feebly but obviously unconscious. \n\t\t\t\t\t\t\t\t\t\t\t\t*goto loot\n\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (tear > 0) #A tear gas grenade should give you the perfect distraction.\n\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t\t\t\t\t*set tear -1\n\t\t\t\t\t\t\t\t\t\t\t\t*set health -2\n\t\t\t\t\t\t\t\t\t\t\t\tYou toss the grenade through the air, and it detonates in a churning cloud of tear gas. Suddenly, there is a flash and the entire cloud ignites. As the flames clear, you see her standing calmly, one hand raised in an arcane gesture. She is completely unharmed! You raise your staff and dart forward, but she ducks and her white-hot nails graze your shoulder. \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tYou swiftly counterattack, ignoring the pain as you bring your staff crashing into her temple. She staggers and falls, and before she can rise, you bring the weapon down a second time. Your staff hits her jaw with a crack, and she falls motionless to the ground, defeated. \n\t\t\t\t\t\t\t\t\t\t\t\t*goto loot\n\n\t\t\t\t\t\t\t\t\t\t\t#You loose your silver chain and prepare to bind the witch.\n\t\t\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\t\t\tYou cast your silver chain through the air as she approaches. She shrieks, frantically switching spells and sending a powerful blast of heated air at the chain. The chain is blasted backward, but her angle was off and the end lashes around from the momentum. The tip whips Hestia in the throat, and she chokes and collapses to her knees, clutching at her neck. \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tHer face turns purple as she struggles to breathe, and you hurry forward and bring your staff down in a sweeping strike. She raises a trembling hand and shoots a gout of fire, but you anticipate her and dive to one side, evading the flames. You bring the staff around into her temple, and her shrieks trail off as she collapses to the ground. You look at her warily, but she seems to be unconscious.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto loot\n\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (iron > 0) #You release a handful of your iron filings.\n\t\t\t\t\t\t\t\t\t\t\t\t*set iron -1\n\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\t\t\t\t\t*set health -5\n\t\t\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\t\t\tHestia looks at you, nonplussed, as you toss the filings. She raises one hand casually and emits a powerful blast of heated air. \n\t\t\t\t\t\t\t\t\t\t\t\t*if (charisma > 52)\n\t\t\t\t\t\t\t\t\t\t\t\t\tYou daren't say it aloud, but she really is full of hot air.\n\t\t\t\t\t\t\t\t\t\t\t\tThe iron is blown away, useless, and the hot air leaves you badly singed but still standing. She sends a bright ball of flame at you, and when you duck, you're suddenly met with a heeled boot to the face. \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tYou collapse, rolling to one side, as she comes after you with her sharp, fiery nails. As she darts forward, you pull yourself up to one knee and slam your staff into her jaw. She staggers backwards and you quickly rise. Glowering, she clenches her fists and her entire body lights up in flames.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tYou can barely stand the heat, but you slam your boot into her chest, sending her tumbling across the dirt. She hits her head hard on a large stone and groans, then lies still. \n\t\t\t\t\t\t\t\t\t\t\t\t*goto loot\n\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (staff) #Dashing forward, you swing your staff with both hands.\n\t\t\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\t\t\t\t\t*set health -4\n\t\t\t\t\t\t\t\t\t\t\t\tShe swiftly ducks your first blow, her face fierce. Leaning backwards, she shoots a huge blast of hot air at you with both hands. Gasping for breath, your throat burning, you are too dazed to avoid her hands, her burning nails gashing your cheek. Thinking quickly, you fall to your knees and bring your staff into her spindly legs, sending her crashing to the dirt. \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tYou are on her before she can throw her latest fireball, and you slam your staff into her temple. Groaning as her head lolls to one side, her fires dim and she slumps to the ground, defeated.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto loot\n        \n\t\t\t\t\t\t\t\t\t#You have an idea of Venefira and Hestia's powers, so it may be wisest to take them out first.\n\t\t\t\t\t\t\t\t\t\t*set cunning %+3 \n\t\t\t\t\t\t\t\t\t\tYou quickly fire your poisonous darts, and the first one hits Hestia on her cheek. She lets out a low shriek and collapses to the dirt, unconscious. Meanwhile, the other witch swivels around quickly, deflecting a dart with her dagger's blade. The last dart, however, lands squarely on her thick neck. She grunts, surprised, and yells, \"Oh…! You runt, I'll cut off your—\" \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tShe stops mid-sentence, wobbles, and topples motionless to the dirt. \n\t\t\t\t\t\t\t\t\t\t*goto hit_illusia\n\t\t\t\t\t\t\t\t\t\t*label illusia\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\"Wait!\" ${he} protests, urgently.\n\t\t\t\t\t\t\t\t\t\t*if girl \n\t\t\t\t\t\t\t\t\t\t\t\"I'm not your enemy! You've saved me. Those disgusting villains were holding me captive! I don't know what I would have done if you hadn't come along. They were threatening to sacrifice me to the demons! But now I'm safe, because of you….\"\n\t\t\t\t\t\t\t\t\t\t*if warlock \n\t\t\t\t\t\t\t\t\t\t\t\"All is not what it seems! The witches were holding me captive, threatening to hurt my family if I fought back.\" He looks searchingly into your eyes, his face haunted. \"They said I was to be a sacrifice…a dinner for a demon, in exchange for more of their powers.\"\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t\t\t\t\t\t\t*label som \n\t\t\t\t\t\t\t\t\t\t\t\"Somehow, I don't find this surprising,\" you comment.\n\t\t\t\t\t\t\t\t\t\t\t*goto sun \n\t\t\t\t\t\t\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t\t\t\t\t\t\t*goto pertinent \n\t\t\t\t\t\t\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t\t\t\t\t\t\t*label pertinent \n\t\t\t\t\t\t\t\t\t\t\t\"Is there any way you can actually prove this to me?\"\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t$!{he} seems to pretend like ${he} didn't hear you.\n\t\t\t\t\t\t\t\t\t\t\t*goto sun \n\t\t\t\t\t\t\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t\t\t\t\t\t\tYou frown, shaking your head. Somehow, ${his} story doesn't make sense to you.\n\t\t\t\t\t\t\t\t\t\t\t*goto sun \n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t*goto som \n\t\t\t\t\t\t\t\t\t\t*label sun \n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*if girl  \n\t\t\t\t\t\t\t\t\t\t\t$!{he} pauses, looking at you with a sort of longing. \"You've helped me, now let me help you. Demon ${hunter}, my kiss has…magic to it.\" \n\t\t\t\t\t\t\t\t\t\t*if warlock \n\t\t\t\t\t\t\t\t\t\t\t\"Thanks to you, my life was saved.\" He pauses, then says gently, \"Let me help you now, ${hunter}. My kiss has…healing properties.\"\n\t\t\t\t\t\t\t\t\t\t*label kiss\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t$!{he} stretches out ${his} hand, body turned provocatively toward you.\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#This ${woman} is not an assassin, but a victim. You gently take ${his} offered hand.\n\t\t\t\t\t\t\t\t\t\t\t\t*label fool\n\t\t\t\t\t\t\t\t\t\t\t\t*set illucio %+5 \n\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\t\t\t\t\t*set health -1 \n\n\t\t\t\t\t\t\t\t\t\t\t\tYou grasp ${his} warm hand in yours and tentatively draw ${him} toward you, ${his} warm, ${curvaceous} body pressing against yours. Leaning into you, ${he} touches your lips with ${his} own. For a moment, you are overcome with  warmth and pleasure. Then, suddenly, ${his} hand travels to your throat. Horrified, you discover that your lips are locked into place. \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tYou open your eyes and meet a pair of bloodshot ones glaring at you, one bulging and the other minuscule. $!{his} ratty, filthy hair hangs in dully-colored patches. It looks as though the locks were taken from ten different beings and patched together by a drunkard! Noxious odors permeate the air around ${him}, and you can only imagine how horrible the rest of ${his} body must appear. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t$!{his} lips are the most grotesque of all. They are abnormally wide, and swollen as if infected. The monstrous ${witch} suddenly pushes you hard, knocking you to the ground. You raise your arms to fend ${him} off, for you are certain your strength outmatches the ${witch}'s, but the assassin begins to suck on your lips and you feel the energy draining from your body. \n\t\t\t\t\t\t\t\t\t\t\t\t*if (health \u003c 1) \n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto death\n\n\t\t\t\t\t\t\t\t\t\t\t\tYour arms fall limply to your sides and you feel very dizzy, but suddenly the abominable ${witch} cries out and lurches off you. You choke, gagging with disgust as ${his} spell wears off. ${boggart} had come to your rescue! The ${witch} pitches to one side, blood flowing from a great gash on ${his} back made by the boggart's scorpion tail. You stand to your feet, smiling weakly at your companion.\n\t\t\t\t\t\t\t\t\t\t\t\t*if illusia_1st\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t*if relationship > 54 \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"You've saved my life yet again, ${boggart}. You don't know how grateful I am for that. But quick: our lives are still in danger!\" \n\t\t\t\t\t\t\t\t\t\t\t\t\t*if relationship \u003c 50 \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"My thanks,\" you say hurriedly.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\n\n\t\t\t\t\t\t\t\t\t\t\t\t\tYou swiftly turn to confront the other assassins. Venefira has regained some of her tremendous strength, and she trudges toward you with a malicious glare, holding her gigantic mace. Hestia appears too weakened to stand, but she is glimmering with fire once again. \n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto fight_venefira_and_hestia\n\n\t\t\t\t\t\t\t\t\t\t\t\t*if relationship > 54 \n\t\t\t\t\t\t\t\t\t\t\t\t\t\"You've saved my life yet again, ${boggart}; you don't know how grateful I am for that,\" you say warmly. \n\t\t\t\t\t\t\t\t\t\t\t\t*if relationship \u003c 50 \n\t\t\t\t\t\t\t\t\t\t\t\t\t\"My thanks,\" you say hurriedly. \n\t\t\t\t\t\t\t\t\t\t\t\t*if altruism \u003c 50 \n\t\t\t\t\t\t\t\t\t\t\t\t\t\"Now, for the best part.\" \n\t\t\t\t\t\t\t\t\t\t\t\t*if altruism > 49 \n\t\t\t\t\t\t\t\t\t\t\t\t\t\"Well, I suppose we should see what they may have for us.\" \n\t\t\t\t\t\t\t\t\t\t\t\t*goto loot\n\n\t\t\t\t\t\t\t\t\t\t\t#Attack ${him}; ${his} story is clearly fabricated.\n\t\t\t\t\t\t\t\t\t\t\t\t*set compassionate %-5\n\t\t\t\t\t\t\t\t\t\t\t\t*set stealth %-5\n\t\t\t\t\t\t\t\t\t\t\t\t*set health -2 \n\t\t\t\t\t\t\t\t\t\t\t\tAs ${he} closes in for a kiss, you slip your hand toward your dagger and ease it out of the belt. Suddenly, ${his} \n\t\t\t\t\t\t\t\t\t\t\t\t*if girl\n\t\t\t\t\t\t\t\t\t\t\t\t\tgorgeous, doe-like  \n\t\t\t\t\t\t\t\t\t\t\t\t*if warlock\n\t\t\t\t\t\t\t\t\t\t\t\t\tpiercing verdant\n\t\t\t\t\t\t\t\t\t\t\t\teyes catch your movement and flit down to the blade. The ${witch} looks back up at you with a twisted, angry expression, and your head is suddenly racked with a piercing pain. You grit your teeth and open your eyes to multicolored dots dancing across your vision.\n\n\t\t\t\t\t\t\t\t\t\t\t\tEven now, it's clear that the ${witch} no longer resembles the ${beautiful} ${woman} ${he} had been only moments before. The illusion is shattered, showing ${his} true nature: an abomination. $!{his} ratty, filthy hair hangs in separate, mismatching clumps. It almost looks as though the locks were taken from ten different beings and patched together by a drunkard. \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t$!{his} eyes, one minuscule and one bulging, are bloodshot. Worst of all, even more than the terrible smell, are ${his} swollen lips, abnormally wide and red with infection. You reel back in horror as ${he} slaps the knife from your hand and leaps forward, knocking you to the ground. You raise your arms to fend ${him} off, but ${he} mashes ${his} lips to yours and begins to suck at you. \n\t\t\t\t\t\t\t\t\t\t\t\t*if (health \u003c 1)\n\n\t\t\t\t\t\t\t\t\t\t\t\t\tYou feel horribly dizzy as ${he} drains your energy, and your arms drop uselessly to your sides. \n\t\t\t\t\t\t\t\t\t\t\t\t\t*label death\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\tYou can't muster enough strength to stop ${him}, and your vision begins to dim into the inescapable, infinite blackness of death. A split second of consciousness remains. Strangely, you see the ${witch} slumping back to the earth, blood covering ${his} back. ${boggart}'s laments suddenly fade away, and there is nothing left.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene death\n\n\t\t\t\t\t\t\t\t\t\t\t\tYou feel suddenly dizzy as ${he} drains the energy from your body. Your arms drop uselessly to your sides, but suddenly the pressure is relieved as the abominable ${witch} lurches off you. Choking, you gag in disgust as the spell wears off. $!{he} pitches sideways, and as you sit up, you see a huge laceration across ${his} back from your apprentice's scorpion tail. \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t${boggart} came to your rescue! You stand to your feet, smiling weakly at your companion.\n\t\t\t\t\t\t\t\t\t\t\t\t*if illusia_1st\n\t\t\t\t\t\t\t\t\t\t\t\t\t*if relationship > 54 \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"You've saved my life yet again, ${boggart}. You don't know how grateful I am for that. But quick: our lives are still in danger!\" \n\t\t\t\t\t\t\t\t\t\t\t\t\t*if relationship \u003c 50 \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"My thanks,\" you say hurriedly.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\n\n\t\t\t\t\t\t\t\t\t\t\t\t\tYou swiftly turn to confront the other assassins. Venefira has regained some of her tremendous strength, and she trudges toward you with a malicious glare, holding her gigantic mace. Hestia appears too weakened to stand, but she is glimmering with fire once again. \n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto fight_venefira_and_hestia\n\n\t\t\t\t\t\t\t\t\t\t\t\t*if relationship > 54 \n\t\t\t\t\t\t\t\t\t\t\t\t\t\"You've saved my life yet again, ${boggart}; you don't know how grateful I am for that,\" you say warmly. \n\t\t\t\t\t\t\t\t\t\t\t\t*if relationship \u003c 50 \n\t\t\t\t\t\t\t\t\t\t\t\t\t\"My thanks,\" you say hurriedly. \n\t\t\t\t\t\t\t\t\t\t\t\t*if altruism \u003c 50 \n\t\t\t\t\t\t\t\t\t\t\t\t\t\"Now, for the best part.\" \n\t\t\t\t\t\t\t\t\t\t\t\t*if altruism > 49 \n\t\t\t\t\t\t\t\t\t\t\t\t\t\"Well, I suppose we should see what they may have for us.\" \n\t\t\t\t\t\t\t\t\t\t\t\t*goto loot\n\n\t\t\t\t\t\t\t\t\t\t\t#You quickly light a blue candle, as you suspect this ${woman} is an illusion wielder.\n\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t\t\t\t\t*if shimmer \n\t\t\t\t\t\t\t\t\t\t\t\t\tYou have not forgotten about the slight shimmer around ${his} body, and now your suspicions are as good as confirmed. \n\t\t\t\t\t\t\t\t\t\t\t\tYou cautiously slip your hands into your satchel, retrieving a candle and your flint and marcasite. The ${witch} tracks your hands with ${his} eyes but makes no move to attack you. \n\t\t\t\t\t\t\t\t\t\t\t\t*if girl \n\t\t\t\t\t\t\t\t\t\t\t\t\tNervous, ${he} says, \"Don't you trust me?\"\n\t\t\t\t\t\t\t\t\t\t\t\t*if warlock \n\t\t\t\t\t\t\t\t\t\t\t\t\tHe looks at you, obviously uncomfortable, and says gently, \"Was it something I said?\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t*line_break \n\n\t\t\t\t\t\t\t\t\t\t\t\t\"Actually, I just wanted to give you something,\" you reply. \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t$!{his} eyes narrow in growing suspicion but you act swiftly, striking your flint and igniting your candle. Its magic instantly takes effect, and the blue light shatters the ${witch}'s mirage. $!{his} true form is obvious now: ${he} is an abomination. Ratty, filthy hair hangs in dull-colored clumps that look as though they were taken from ten different beings and patched together by a drunkard.\n                                                                                \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t*if warlock \n\t\t\t\t\t\t\t\t\t\t\t\t\tHis \n\t\t\t\t\t\t\t\t\t\t\t\t*if girl \n\t\t\t\t\t\t\t\t\t\t\t\t\tHer\n\t\t\t\t\t\t\t\t\t\t\t\teyes, one minuscule and one bulging, are bloodshot. You cannot see the rest of \n\t\t\t\t\t\t\t\t\t\t\t\t*if warlock \n\t\t\t\t\t\t\t\t\t\t\t\t\this \n\t\t\t\t\t\t\t\t\t\t\t\t*if girl \n\t\t\t\t\t\t\t\t\t\t\t\t\ther \n\t\t\t\t\t\t\t\t\t\t\t\tbody, but the smell is terrible. Worst of all are \n\t\t\t\t\t\t\t\t\t\t\t\t*if warlock \n\t\t\t\t\t\t\t\t\t\t\t\t\this \n\t\t\t\t\t\t\t\t\t\t\t\t*if girl \n\t\t\t\t\t\t\t\t\t\t\t\t\ther \n\t\t\t\t\t\t\t\t\t\t\t\tswollen lips, abnormally wide and red with infection. You step back quickly as the hideous monster lurches forward, arms stretched toward your neck. Raising your staff, you slam it into \n\t\t\t\t\t\t\t\t\t\t\t\t*if warlock \n\t\t\t\t\t\t\t\t\t\t\t\t\this \n\t\t\t\t\t\t\t\t\t\t\t\t*if girl \n\t\t\t\t\t\t\t\t\t\t\t\t\ther \n\t\t\t\t\t\t\t\t\t\t\t\thead before ${he} can react, and it connects with a crack. Moaning, ${he} falls to the ground and lies still, unconscious. \n                                                                        \n\t\t\t\t\t\t\t\t\t\t\t\t${boggart} flutters onto your shoulder, commenting, \"Ugh. I knew most people were rotten on the inside, but ${he} took it way too far.\"\n\t\t\t\t\t\t\t\t\t\t\t\t*label then_loot\n                                                 \n\t\t\t\t\t\t\t\t\t\t\t\t\"Well, at least that's sorted.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t${boggart} simply shrugs in reply, so you continue,\n\t\t\t\t\t\t\t\t\t\t\t\t*if altruism \u003c 50 \n\t\t\t\t\t\t\t\t\t\t\t\t\t\"Now, for the best part.\" \n\t\t\t\t\t\t\t\t\t\t\t\t*if altruism > 49 \n\t\t\t\t\t\t\t\t\t\t\t\t\t\"Well, I suppose we should see what they may have for us.\" \n\t\t\t\t\t\t\t\t\t\t\t\t*goto loot\n\n\t\t\t\t#Before you stands a rugged and chiseled man. He is dressed in impossibly tight clothing that highlights his perfect physique.  \n\t\t\t\t\t*set warlock true \n\t\t\t\t\t*set witch \"warlock\"\n\t\t\t\t\t*set Illusia \"Illucio\"\n\t\t\t\t\t*set curvaceous \"toned\"\n\t\t\t\t\t*set beautiful \"handsome\"\n\t\t\t\t\t*set woman \"man\"\n\t\t\t\t\t*goto original\n\n\t*selectable_if (transformations_eagle) #${boggart} should scout ahead of you in his eagle form. (Requires 3 mana.)\n\t\t*set cunning %+3\n\t\t*set stealth %+3\n\t\t*set mana -3 \n\t\t*set relationship %+3\n\t\tYou unstrap the buckles on your backpack. ${boggart} leaps into the air and flutters onto your shoulder. \n\t\t*if relationship > 49 \n\t\t\tYou rub his chin for a moment \n\t\t*if relationship \u003c 50 \n\t\t\tYou clear your throat \n\t\tbefore addressing the situation. \"${boggart}, please transform into your eagle form and search the surrounding area for anything dangerous.\"\n\n\t\tNodding, he transforms into a majestic eagle with a puff of granite-colored smoke. He clicks his beak at you before soaring into the air, quickly rising beyond the pinnacle of the forest. You wait silently until the sun is blotted out briefly by his silhouette. \n\t\t\n\t\tHe returns, gliding down and landing on your arm. His talons grip the thick chap that protects your flesh, and he informs you in various shrieks, clicks, and whistles that a group of dark magic wielders are awaiting ahead to ambush you.\n\t\t*goto choices5 \n\t\t\t*label choices5\n\t\t\t*choice \n\t\t\t\t#You ask ${boggart} to stay concealed in the foliage while you dispatch the assassins. \n\t\t\t\t\t*goto boggart_hides\n\n\t\t\t\t*selectable_if (concussion > 0) #A concussion grenade from above, with a little help from your apprentice, should slow them down.\n\t\t\t\t\t*set release_concussion true\n\t\t\t\t\t*goto other_releases\n\n\t\t\t\t*selectable_if (tear > 0) #Tear gas is the simplest solution. That always gives you a good opening to attack. You have him drop it onto the mercenaries.\n\t\t\t\t\t*set release_tear true\n\t\t\t\t\t*goto other_releases\n\n\t\t\t\t*selectable_if (iron=8) #You ask ${boggart} to drop your bags of iron on these dark magic users.\n\t\t\t\t\t*set stealth %+3 \n\t\t\t\t\t*set cunning %+5 \n\t\t\t\t\t*set iron 0\n\t\t\t\t\tYou empty the iron into two pouches and stride forward, the boggart gliding peacefully above your head. As you walk beneath the leaves, you explain, \"${boggart}, we're going to sneak up to that clearing, where I'll conceal myself in the foliage, and I need you to take these bags of iron,\" you say, patting the bags in question. \"Fly overhead, and release them onto the assassins. I'll do the rest.\" \n\t\t\t\t\t\n\t\t\t\t\t*label other_releases\n\t\t\t\t\t*if release_concussion\n\t\t\t\t\t\t*set concussion -2 \n\t\t\t\t\t\t*set cunning %+5\n\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t*goto fill_bags\n\n\t\t\t\t\t*if release_tear\n\t\t\t\t\t\t*set tear -3\n\t\t\t\t\t\t*set cunning %+5\n\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t*label fill_bags\n\t\t\t\t\t\tYou draw the grenades from your satchel, placing them into a spare bag. You stride beneath the leaves, your companion gliding peacefully above you, and you explain, \"${boggart}, we are going to sneak into the clearing, and I will hide beneath the foliage while you take these grenades and fly over the assassins. Once you release them, I will take care of the rest.\"\n\n\t\t\t\t\t${boggart} nods, clicking his beak. The forest is littered with splintered branches, dead animals, and pitted soil: typical demonic destructiveness. It is even said they revel in the deaths of the living. Perhaps it's because they consume souls…. A few minutes later, the trees thin out and a handful of large deciduous trees outline a small clearing. You kneel down, pulling your hood over your head, and peer through a dense thicket. ${boggart} alights quietly beside you. \n        \n\t\t\t\t\tThree figures stand before you in the road, spaced well apart, and they make an odd trio. To your left is a heavyset woman in a black robe. She carries an assortment of nasty weapons that drip with something that looks poisonous. A painfully thin woman in a crimson robe stands to your right, and as to the middle figure… To be truthful, you feel a sudden, peculiar tug of attraction.\n\t\t\t\t\t*goto choices_choices2\n\t\t\t\t\t\t*label choices_choices2\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Before you is a rugged and chiseled man, dressed in impossibly tight clothing that highlights his perfect physique. \n\t\t\t\t\t\t\t\t*set warlock true \n\t\t\t\t\t\t\t\t*set witch \"warlock\"\n\t\t\t\t\t\t\t\t*set Illusia \"Illucio\"\n\t\t\t\t\t\t\t\t*set curvaceous \"toned\"\n\t\t\t\t\t\t\t\t*set beautiful \"handsome\"\n\t\t\t\t\t\t\t\t*set woman \"man\"\n\t\t\t\t\t\t\t\t*goto eagle \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#You are gazing at a stunning, curvaceous woman with pursed red lips. Her low-cut dress and shimmering necklace accentuate her figure perfectly.\n\t\t\t\t\t\t\t\t*set girl true\n\t\t\t\t\t\t\t\t*set he \"she\"\n\t\t\t\t\t\t\t\t*set witch \"witch\"\n\t\t\t\t\t\t\t\t*set Illusia \"Illusia\"\n\t\t\t\t\t\t\t\t*set curvaceous \"curvaceous\"\n\t\t\t\t\t\t\t\t*set beautiful \"beautiful\"\n\t\t\t\t\t\t\t\t*set him \"her\"\n\t\t\t\t\t\t\t\t*set his \"her\"\n\t\t\t\t\t\t\t\t*set woman \"woman\"\n\t\t\t\t\t\t\t\t*label eagle\n\t\t\t\t\t\t\t\t*image Venefira.jpg\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*image Hestia.jpg\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*if girl \n\t\t\t\t\t\t\t\t\t*image Illusia.jpg\n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\tYou stare helplessly at this amazing beauty. Her brilliant red hair flows down her back; her supple, moist lips are pursed in impatience; and her big doe-like eyes seem to swallow you. She has curves in all the right places, and her dress is cut to reveal just enough cleavage. \n\t\t\t\t\t\t\t\t*if warlock\n\t\t\t\t\t\t\t\t\t*image Illucio.jpg\n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\tYou stare helplessly at this handsome, powerful man. His rippling muscles, broad shoulders, and confident stance belie the care he must take with his impossibly tight, colorful clothing. His verdant eyes are piercing, and you sense a fire burning within him. \n\t\t\t\t\t\t\t\tShaking your head, you break yourself out of your reverie. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t$!{he}'s a ${witch} assassin, after all, and was probably sent to murder you! The other two are old acquaintances of yours. Venefira and Hestia are mercenaries wanted in several provinces for their violent crimes. You have never fought either of them personally, but you briefly met once during a long job near the village of Quader. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tThis third person is totally unknown to you, although you assume ${he} is also a dark magic wielder. \n\t\t\t\t\t\t\t\t*if ((stealth > 51) or (cunning > 51))\n\t\t\t\t\t\t\t\t\tUpon further inspection, you can see what seems to be a nearly unnoticeable shimmer around \n\t\t\t\t\t\t\t\t\t*if warlock \n\t\t\t\t\t\t\t\t\t\this \n\t\t\t\t\t\t\t\t\t*if girl \n\t\t\t\t\t\t\t\t\t\ther \n\t\t\t\t\t\t\t\t\tbody, though it may only be a trick of the dappled forest light. \n\t\t\t\t\t\t\t\tThey stand before you expectantly, their expressions ranging from alert to smug. You gently set your backpack on the ground, gazing at the three figures and thinking through your strategy, when your attention is drawn to a conspicuous tattoo on the mercenaries' foreheads. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou suddenly realize it's written in Infernal! This vile language is generally only known to demons, wizards, and demon hunters, and you recognize the writing as an ancient ward, a type of seal that is always set on the bearer's forehead. After a moment, you translate it: [i]\"If I die, you die!\"[/i] This powerful and nasty curse releases a bolt of energy into the heart of whomever kills its bearer. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tEven a wizard would find it very difficult to deflect the spell and it can only ever be revoked by the caster himself or removed by intricate and very powerful spells. You will have to make sure not to use lethal force against these assassins in order to preserve your own life.\n\t\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t\t#However, you will be interrogating them by any means necessary. Perhaps you can gain valuable information about this demon.\n\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\t*set compassionate %-5\n\t\t\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t\t\t*set info true\n\n\t\t\t\t\t\t\t\t\t#It will be easiest to just incarcerate them, and then you can get to the interesting part—the bounty.\n\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\t*set altruism%-5\n\t\t\t\t\t\t\t\t\t\t*set confine true\n\n\t\t\t\t\t\t\t\t\t#Of course these villains must be confined, but more importantly, you hope to dissuade them from their current paths in life.\n\t\t\t\t\t\t\t\t\t\t*set charisma %+3\n\t\t\t\t\t\t\t\t\t\t*set compassionate %+3\n\t\t\t\t\t\t\t\t\t\t*set resolve %-5\n\t\t\t\t\t\t\t\t\t\t*set stealth %-5\n\t\t\t\t\t\t\t\t\t\t*set talk true\n\n\t\t\t\t\t\t\t\tYou crook a finger at ${boggart} and he hops toward you, expectant.\n\t\t\t\t\t\t\t\t*if release_tear\n\t\t\t\t\t\t\t\t\tDetaching the grenades from your belt, you quickly explain, \"I'm going to pull the secondary pin, which will delay the explosion, but once I do you must make haste.\" \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tHe clacks his beak impatiently, and you add, \"Now, you'll have about sixty seconds. You should be able to hear the device ticking. Once the assassins are incapacitated, I can easily finish them off.\"\n\n\t\t\t\t\t\t\t\t\tHe bobs his head in a bird's nod, and you quickly loop the string through his beak, reach into the bag, and pull the pins.\n\t\t\t\t\t\t\t\t\t*label tear_eagle\n\t\t\t\t\t\t\t\t\t${boggart} soars lithely into the air with a flap of his wings. You watch him disappear above the twining branches,\n\t\t\t\t\t\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t\t\t\t\t\t*label abo \n\t\t\t\t\t\t\t\t\t\tworried about how things will play out.\n\t\t\t\t\t\t\t\t\t\t*goto wo \n\t\t\t\t\t\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t\t\t\t\t\twaiting for the perfect chance to ambush the would-be ambushers!\n\t\t\t\t\t\t\t\t\t\t*goto wo \n\t\t\t\t\t\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t\t\t\t\t\tcounting the seconds until the grenades are supposed to detonate.\n\t\t\t\t\t\t\t\t\t\t*goto wo \n\t\t\t\t\t\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t\t\t\t\t\timpatiently awaiting his signal.\n\t\t\t\t\t\t\t\t\t\t*goto wo \n\t\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t\t*goto abo \n\t\t\t\t\t\t\t\t\t*label wo \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tSuddenly, the parcel drops through the air. The assassins have only just noticed your surprise, when they are engulfed in a massive cloud of churning tear gas as the grenades detonate. Shrieks of agony pierce the air, soon interrupted by fierce coughing. The brutish witch is the first to finally breach the noxious cloud, staggering and bent almost double. Her face is swollen and red, blood dripping from her nostrils.\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t#You sneak into the clearing, preparing your silver chain.\n\t\t\t\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\t\tYou cast the chain through the air, undulant like a serpent. With the witch in a crouch, your chain doesn't have very much to latch onto. However, it does land neatly on her back, draping over her body but leaving her arms free. Venefira thrashes her arms wildly through the air, squeaking in fury as the chain paralyzes her chest and torso. \n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tYou swing your staff through the air while she is distracted, and it slams into her head. She topples immediately, knocked unconscious. Retrieving your chain, you turn your attention toward the other assassins.\n\t\t\t\t\t\t\t\t\t\t\t*goto other_bodies\n\n\t\t\t\t\t\t\t\t\t\t*selectable_if (staff) #You run toward her, staff raised for battle.\n\t\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\t\t*set broken_vials true\n\t\t\t\t\t\t\t\t\t\t\tYou hurry forward to strike this witch down, but she suddenly unravels her belt, whipping it toward your body with shocking speed. You twist quickly to the side, slashing the belt with your blade. The vials hurtle past you, shattering on the dirt. You recover quickly, striding forward, and swing your staff into her skull with an audible crack. She finally collapses, unconscious, to the ground.\n\t\t\t\t\t\t\t\t\t\t\t*goto other_bodies\n\n\t\t\t\t\t\t\t\t\t\t#Reaching into your pocket, you pull out a handful of iron.\n\t\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\t\t*set iron -1\n\t\t\t\t\t\t\t\t\t\t\tYou hurry forward. Venefira straightens up at your footsteps and bellows, \"I'LL GUT YOU ALIVE, INSECT!\"\n\n\t\t\t\t\t\t\t\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t\t\t\t\t\t\t\t*label ru \n\t\t\t\t\t\t\t\t\t\t\t\t\"What? And ruin our lovely time together?\" you counter.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto wat \n\t\t\t\t\t\t\t\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t\t\t\t\t\t\t\tA smile plays around your lips as you silently edge around her.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto wat \n\t\t\t\t\t\t\t\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t\t\t\t\t\t\t\t\"I don't think that's likely,\" you say coolly.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto wat \n\t\t\t\t\t\t\t\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t\t\t\t\t\t\t\t\"You can try, but you'll regret it, witch,\" you say fiercely.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto wat \n\t\t\t\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t\t\t\t*goto ru \n\t\t\t\t\t\t\t\t\t\t\t*label wat \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tThe assassin lurches forward, but you throw the shavings at her, engulfing her. She hollers in agony as the metal burns her flesh. You watch for a moment, amazed, as she takes another step toward you, her face swollen and bloody. Raising your staff, you quickly bring it down on her temple and she finally falls motionless to the ground.                    \n\t\t\t\t\t\t\t\t\t\t\t*label other_bodies\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tAs the tear gas dissipates, it reveals the other two assassins lying where they had stood, completely unconscious. Hestia's lips are cracked, and her nostrils are completely covered with coagulated blood. The mysterious ${witch} lays face-first on the ground. Even from here, you can see that \n\t\t\t\t\t\t\t\t\t\t\t*if warlock \n\t\t\t\t\t\t\t\t\t\t\t\this \n\t\t\t\t\t\t\t\t\t\t\t*if girl \n\t\t\t\t\t\t\t\t\t\t\t\ther \n\t\t\t\t\t\t\t\t\t\t\tbody changed much more than tear gas could have caused. Moving closer, you nudge \n\t\t\t\t\t\t\t\t\t\t\t*if warlock \n\t\t\t\t\t\t\t\t\t\t\t\this \n\t\t\t\t\t\t\t\t\t\t\t*if girl \n\t\t\t\t\t\t\t\t\t\t\t\ther \n\t\t\t\t\t\t\t\t\t\t\tbody over with your boot. \n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t*if shimmer\n\t\t\t\t\t\t\t\t\t\t\t\tIt appears as if the slight shimmer you saw earlier was indeed a side effect of the illusion that had masked this ${witch}'s true form.                \n\t\t\t\t\t\t\t\t\t\t\t$!{he} is an abomination. Ratty, filthy hair hangs in dull clumps. The locks look as though they were taken from ten different beings and patched together by a drunkard. \n\t\t\t\t\t\t\t\t\t\t\t*if warlock \n\t\t\t\t\t\t\t\t\t\t\t\tHis \n\t\t\t\t\t\t\t\t\t\t\t*if girl \n\t\t\t\t\t\t\t\t\t\t\t\tHer \n\t\t\t\t\t\t\t\t\t\t\teyes are bloodshot. One is minuscule, and the other is bulging.\n\n\t\t\t\t\t\t\t\t\t\t\t$!{his} lips are abnormally wide and malformed, and a hideous smell floats up from her body, drowning out even the residual odor of the tear gas. \n\t\t\t\t\t\t\t\t\t\t\t*if compassionate \u003c 50 \n\t\t\t\t\t\t\t\t\t\t\t\tHow hideous. No wonder this freak used illusions.\n\t\t\t\t\t\t\t\t\t\t\t*if compassionate > 49 \n\t\t\t\t\t\t\t\t\t\t\t\tSuch are the wages of darkness, you suppose.\n\t\t\t\t\t\t\t\t\t\t\tTurning away from your fallen opponent, you look up to see ${boggart} fluttering toward your shoulder.\n\t\t\t\t\t\t\t\t\t\t\t*goto then_loot\n                                                                        \n\t\t\t\t\t*if release_concussion \n\t\t\t\t\t\tDetaching the grenades from your belt, you quickly explain, \"I'm going to pull the secondary pin, which will delay the explosion, but once I do you must make haste.\" \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\tHe clacks his beak impatiently, and you add, \"Now, you'll have about sixty seconds. You should be able to hear the device ticking. Once the assassins are incapacitated, I can easily finish them off.\"\n\t\t\t\t\t\t*label concussion_eagle\n\t\t\t\t\t\t*set health -1\n\n\t\t\t\t\t\t${boggart} nods and soars lithely into the air with a flap of his wings. You watch him disappear above the twining branches,\n\t\t\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t\t\t*label thingz \n\t\t\t\t\t\t\tworried about how things will play out.\n\t\t\t\t\t\t\t*goto play \n\t\t\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t\t\twaiting for the perfect chance to ambush the would-be ambushers!\n\t\t\t\t\t\t\t*goto play \n\t\t\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t\t\tcounting the seconds until the grenades are supposed to detonate.\n\t\t\t\t\t\t\t*goto play \n\t\t\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t\t\timpatiently awaiting his signal.\n\t\t\t\t\t\t\t*goto play \n\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t*goto thingz \n\t\t\t\t\t\t*label play \n\t\t\t\t\t\tSuddenly, the parcel drops through the air. The assassins have only just noticed your surprise, when the grenades detonate, splitting the air with a deafening bang. Crying out in surprise, the trio collapses, dizzy and disoriented. \n\t\t\t\t\t\t\n\t\t\t\t\t\tYou quietly enter the clearing and approach them. The bulky witch moans weakly but is too dazed to fight. You bring your staff crashing down on her head and she slumps forward, unconscious. You turn just as Hestia is angling one hand toward you, emitting a powerful blast of heated air! You are pushed backwards, hitting the dirt with a thud, but you use the momentum to roll deftly to your feet. \n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\tAs Hestia struggles to her knees, raising hands covered with dancing crimson fire, you rush forward and dodge a fireball, bringing your staff around to meet her temple. She utters a strangled shriek and falls to the ground, defeated. \n\t\t\t\t\t\t*goto then_illusia\n\n\t\t\t\t\tDetaching the bag of iron from your belt, you hold it out and ${boggart} seizes the strap in his beak. You instruct, \"Now, when you are within range, bite through the strap, and you'll release the iron onto the assassins. You can leave the rest to me.\" \n\t\t\t\t\t*label iron_eagle\n\n\t\t\t\t\t${boggart} dips his head, soaring lithely into the air. He soon disappears above the twining branches. Moments later, the assassins find themselves caught unaware in a massive cloud of burning iron. Scatter as they might, the metal leaves deep burn marks into any flesh it touches. Screaming in agony, they scramble frantically to escape the tiny filings. This is an excellent opportunity to defeat one of them quickly while the others are distracted. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tThe brutish witch stumbles toward the cover of the overhanging trees, the skeletal assassin is crawling across the starved soil, and the ${beautiful} ${witch} lays immobile on the ground, panting heavily.\n\t\t\t\t\t*if destruction = 1\n\t\t\t\t\t\tObviously, using your destruction grenade wouldn't be a good idea. In their weakened states, the assassins wouldn't survive, which would be deadly for you. \n\t\t\t\t\t*goto choices3 \n\t\t\t\t\t\t\t\t\t\t*label choices3 \n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#The mysterious ${witch} is the easiest target.\n\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\t\t\t\t\t*set charisma %+3 \n\t\t\t\t\t\t\t\t\t\t\t\t*set illusia_1st true\n\t\t\t\t\t\t\t\t\t\t\t\t*goto illusia_1st\n\t\t\t\t\t\t\t\t\t\t\t\t*label fight_venefira_and_hestia\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t*selectable_if (staff) #You attack her head-on with your staff.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto illusia_1st_staff\n                                                                                \n\t\t\t\t\t\t\t\t\t\t\t\t\t#Moving quickly, you unwind the silver chain from your waist.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto illusia_1st_chain\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t*selectable_if (tear > 0) #You create a very toxic distraction with your tear gas grenade.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto illusia_1st_tear\n                                                                                \n\t\t\t\t\t\t\t\t\t\t\t\t\t*selectable_if (concussion > 0) #Your concussion grenade should knock her out completely.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto illusia_1st_concussion\n\n\t\t\t\t\t\t\t\t\t\t\t#The brutish witch is the most resilient, and you don't want her at your back while you attack someone else.\n\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\t\t\tBy now, Venefira has noticed you. A furious sort of panic flashing across her dark eyes, she quickens her pace, heading toward the forest for cover.\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t*selectable_if (tear > 0) #A tear gas grenade will help you put a stop to her.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %+3 \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set tear -1               \n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou run across the clearing, cutting off the hulking witch before she can reach the trees. She roars at you in wordless anger. You toss the tear gas grenade before she can react, and her stumbling dodge only sends her right into the cloud of churning tear gas. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tSeconds later, howling, she breaches the cloud, her eyes inflamed and her nostrils bloody. You step forward quickly and swing your staff into her temple, knocking her unconscious.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto burned_hestia\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t*selectable_if (concussion > 0) #You pull out one of your special concussion grenades. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set concussion -1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou run across the clearing at an angle, and the witch looks at you, brows furrowed, just before she sees the grenade heading her way. Her roar of fury is silenced as the grenade explodes with an ear-ringing bang. As she staggers, barely able to stand, you hurry forward and swing your staff into her temple. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tShe collapses to the ground, finally lying motionless.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto burned_hestia\n                                                                                \n\t\t\t\t\t\t\t\t\t\t\t\t\t#You'll do this the old-fashioned way and bind the witch with your silver chain. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou run across the clearing, cutting off the hulking witch before she can reach the trees. Whirling the chain through the air, you cast it at her, undulant like a serpent. She roars at you in wordless fury, swinging her mace through the air to intercept the chain. It loops back around and catches her arms. The stubborn woman just growls at you and charges forward, hoping to barrel you down.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tHowever, her injuries make her sluggish and clumsy. You are able to sidestep her broad shoulder as she lunges for your stomach, and you bring your staff down onto the back of her head with a crack. She falls to the ground and lies motionless, down for the count.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto burned_hestia\n                                                                                \n\t\t\t\t\t\t\t\t\t\t\t\t\t*selectable_if (destruction = 1) #The destruction grenade will blast that colossus into the next kingdom.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto absolve  \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t*selectable_if (staff) #You race forward, raising your staff to take her down.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set health -2\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tShe roars in fury, suddenly changing direction and running to meet your attack. You bring your staff swinging down toward her chest, but she deflects your blow with the haft of her mace. With incredible speed, she turns the massive weapon and brings the spiked head toward your skull. You leap backwards but the protrusions tear at your forehead, spilling blood onto your face. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou quickly wipe the blood from your eyes, the cuts burning fiercely, and bring your staff crashing down onto Venefira's head with a backhanded swing. She blocks, but too late, and your weapon connects with a terrible crack. She falls to the ground, unconscious.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label burned_hestia \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou turn to face the others. Hestia appears too weakened to stand, and the ${beautiful} ${witch} seems to be out of commission, still splayed out on the ground. Suddenly rolling over, Hestia raises her hand and summons a sphere of fire. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#You throw your dagger, interrupting her spell.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tAs the flames grow, your dagger flies through the air and hits her in the arm. She gasps, her fireball immediately going dim. A second later her eyes roll back in her head and she slumps to the ground, unconscious. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto then_illusia\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*selectable_if (staff) #Dashing forward, you strike Hestia down with your staff.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set health -2\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set resolve %+3 \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tShe lifts the glowing ball and flicks her wrist, spewing you with a blast of fire. Unfortunately, your dodge is too late. The fire catches on your robe and your legs immediately start blistering. Dropping, you roll in the dust until the fire is extinguished, but the pain in your legs is still excruciating.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tAs she raises another sphere of fire, you dive forward and bring your staff down on her skull, the fire whistling past one ear. She finally slumps over, immobile. Moving gingerly, you turn toward the final assassin.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto then_illusia\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*selectable_if (tear > 0) #You'll defeat her with a tear gas grenade.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set tear -1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tPulling the pin, you roll the grenade across the ground with perfect timing and it detonates right in the witch's face. She coughs and splutters violently as the churning cloud of tear gas envelopes her. After a moment, the noises stop and the gas clears. Hestia is lying on the ground, unconscious.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto then_illusia\n        \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*selectable_if (destruction=1) #Your destruction grenade will put an end to this. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label hestia_fire \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set destruction -1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %- 20\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set health -1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set hestia_fire true\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tRetrieving your destruction grenade from your satchel, you activate it and cast it out into the open above the witch. You dive backwards as chunks of burning debris hail down upon you. Suddenly, it becomes obvious that this was too powerful of an attack! \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto bolt \n                                                                                                \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Loosing your silver chain, you begin spinning it in one hand.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set health -2\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tShe raises her arm, but you release the chain quickly. Tensing, her eyes widen. She drops flat to the ground and the chain falls loosely over her torso. She's pinned, but her arms are still free. Straining, she uses one hand to flick a gout of fire in your direction. You dodge, but not fast enough. Your robe bursts into flame and your flesh sizzles horribly. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou drop swiftly to the ground and roll in the dust, extinguishing the fire. Ignoring the terrible pain, you leap up as she summons another ball of fire, racing forward and bringing your staff down on her skull. A fireball whizzes past your ear, but your blow connects solidly and she slumps to the ground, finally defeated.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto then_illusia\n\n\t\t\t\t\t\t\t\t\t\t\t#You believe Hestia is the bigger threat.\n\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\t\t\tEven now, Hestia still hasn't noticed you. She crawls steadily closer, gasping in pain.        \n\t\t\t\t\t\t\t\t\t\t\t\t*choice \n\t\t\t\t\t\t\t\t\t\t\t\t\t#Using a throwing dagger, you attempt to defeat her from a safe distance.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tAs soon as the witch crawls into range, you hurtle the dagger and it hits her arm, sending a trickle of strange, smoking blood down the fabric of her dress. She gasps and begins to rise, but a moment later she swoons and falls to the ground, defeated. You hurry forward and retrieve your knife, then turn to confront the brutish witch. You're just in time, as she seems to be recovering quickly.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label burned_brute\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tShe stands shakily, mace in hands, while the ${beautiful} ${witch} lies still on the earth several meters away. Venefira gives you a malicious glare, growling, \"You think you're clever, do you? Let's see how pretty you look in one of my cauldrons!\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label idd \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tSmirking, you reply, \"I imagine I'd make quite the quality potion, but that's beside the point.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto smirk \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou narrow your eyes, taking the chance to close even more distance between you.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto smirk \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tSmiling despite yourself, you respond, \"I do, actually, and that's unlikely, but soon we'll both see how well you look in chains!\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto smirk \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tScowling, you rebut, \"Don't make me enjoy this.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto smirk\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto idd \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label smirk \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto choices7\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label choices7 \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*selectable_if (concussion > 0) #It seems like she needs some extra encouragement to stay put, so you pull out your concussion grenade.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label illusia_1st_concussion \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set concussion -1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tAs you cast the grenade through the air, she bellows angrily and tries to backpedal. The grenade detonates with an ear-ringing bang right at her feet, and she staggers to the side. Rushing forward to deliver the final blow, you raise your staff and sweep it in a circle. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tShe manages to block your attack with her mace, but you swiftly swing the opposite end of your weapon into her jaw, disorienting her. Growling in pain, she staggers to one side and you bring your staff down onto her head with both hands. Her eyes go white and she drops to the ground, motionless.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto then_hestia \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*selectable_if (destruction=1) #Your destruction grenade will blast this stubborn witch into the next kingdom.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto absolve \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*selectable_if (tear > 0) #A tear gas grenade would compliment your iron's burns nicely. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label illusia_1st_tear\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set tear -1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set charisma %+3\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou swiftly cast the grenade through the air as she advances. It detonates in a churning cloud of tear gas, and the brutish witch bellows in pain and fury. Astonishingly, she staggers out of the cloud a moment later, clutching her burning throat. Her eyes are irritated and blood drips from her nostrils. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tRunning forward, you swing your weapon toward her neck. She stares at you through swollen eyes and ducks, bending forward and grabbing at your throat. Quickly moving back out of reach, you slam your weapon into her jaw and her head snaps back violently. A moment later, she topples to the ground and lies still. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto then_hestia\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#You attempt to bind her with your silver chain.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label illusia_1st_chain\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tAs she advances, you send the chain whipping through the air. She dives to one side, but your chain catches her ankle and one end whirls around, binding her legs. She crashes to the ground, her mace falling heavily beside her as the silver paralyzes her. Bellowing furiously, she twists onto her side and draws a handful of throwing daggers. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou narrowly deflect the blades as she throws them, raising your staff defensively and darting toward her. You reach her and bring your staff down at her head. She raises her arms in an X-shape, attempting to block you, but the chemicals in your weapon cause her limbs to cramp violently. She roars helplessly as you crack her on the jaw, sending her crashing to the dirt, defeated.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto then_hestia\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*selectable_if (staff) #Raising your staff, you charge forward to meet the assassin.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label illusia_1st_staff\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set health -2\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label venefira_1st_staff\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tShe races toward you, hefting her mace. You attempt to drive your staff into her skull, but she swiftly blocks with the shaft of her weapon. As she hefts her mace in both hands and swings, you leap backwards. The huge weapon still grazes your forehead. With blood marring your vision, you press forward, thrusting the blunt end of the staff into her ribs. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tShe doubles over with a cry of pain. Lunging forward, you bring your weapon down squarely on her head. There is a loud crack, and the witch falls senseless to the ground.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label then_hestia \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if illusia_1st\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set health -4\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou quickly swivel around to confront Hestia but her fire spell suddenly collides with your chest. You drop to the ground immediately as flames engulf you, putting out the fire. Burned and bruised, you stagger to your feet, your robe smoking, only to face another fireball from the witch, who has begun to procure it in her hand.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou quickly retrieve the dagger from your belt and project it through the air, hitting her squarely in the shoulder. With a strangled cry, she twists away and collapses to the ground, defeated. A fluttering sound attracts your attention, and you turn to see ${boggart} approaching. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tHe lands gently on your shoulder, commenting, \"I'm glad that's finally over with.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto then_loot   \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label then_illusia\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe third assassin stands still as you approach, warily raising your staff. Before you reach ${him}, ${he} suddenly begs,\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label illusia_1st\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto illusia \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t#You charge forward, raising your staff.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set health -3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tShe turns slightly, moaning, but raises a quivering hand covered in flames. She flicks her wrist, spewing a blast of fire that ignites your robes. Dropping to the ground, you roll furiously in the dirt and extinguish the fire, but your legs are left blistered and raw. She raises her hand, looking almost nonchalant now, but you race forward and drop to your knees, bringing your staff around sideways into her jaw. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tA fireball whizzes past your head, but your blow solidly connects and she slumps to the ground, defeated.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto burned_brute \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t*selectable_if (tear > 0) #Pulling out a tear gas grenade, you heave it toward the witch. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set tear -1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYour grenade rolls neatly to a halt in front of the prone witch's face. She shrieks as it erupts into a churning cloud of tear gas, but her screams soon turn to violent coughing. Holding your breath, you dart into the cloud, eyes burning, and bring your staff down on the source of the sputtering before she can summon another fireball. She slumps over and you hurry away, holding a cloth to your burning eyes. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tAs the cloud dissipates, you see her lying motionless in the dirt, defeated.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto burned_brute \n                                                \n\t\t\t\t\t\t\t\t\t\t\t\t\t#You unclasp your silver chain and heft it between your hands, preparing to bind the fallen witch.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set health -1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tHestia crawls across the ground, letting out a high-pitched keening sound. Dashing into the clearing, you send the chain whipping in her direction but it fails to wrap around her body, instead descending limply over her back. She shrieks as the silver paralyzes most of her body, then she raises one quivering hand covered in fire. You drop to the ground instantly and her blast barely misses you, badly singeing your side and neck. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tShe raises her hand again but you are already dashing in her direction, bringing your staff down in a wide sweep toward her skull. Your blow connects soundly and she falls silent at last, defeated. You quickly retrieve your chain and step back, raising your staff defensively.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto burned_brute\n                                        \n\t\t\t\t\t\t\t\t\t\t\t\t\t*selectable_if (destruction=1) #You'll fight fire with fire, using your destruction grenade.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto hestia_fire \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t*selectable_if (concussion > 0) #Pulling out a grenade, you prepare to stun the assassin.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set concussion -1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tSomehow, it seems a little redundant to use a concussion grenade on a half-conscious witch, but whatever works, you suppose. You pull the pin and roll the grenade swiftly across the ground. It wobbles to a stop just in front of Hestia's face and she lets out a piercing shriek. Before she can stop it, the grenade detonates with an ear-ringing bang.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tShe slumps forward onto the ground, finally defeated. You step out into the clearing, raising your staff defensively, and observe the scene before you. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto burned_brute\n\n*label fight_hestia \n*choice\n\t*selectable_if (concussion > 0) #You retrieve a concussion grenade, planning to end this quickly.\n\t\t*set concussion -1\n\t\t*set resolve %+3\n\t\t*set cunning %+3 \n\t\tYou activate your weapon and hurl it through the air. The grenade arcs neatly and falls at the witch's feet, exploding with an ear-ringing bang. Stunned, she staggers backwards and falls to the ground. Trembling, she raises one hand and summons a sphere of fire. You reach for your dagger, dropping to the ground as you send your blade flying through the air. It hits her squarely in the shoulder, and her fireball sails neatly over your head a split second later.\n\n\t\tShe shrieks piercingly and clutches the wound, then falls to the ground, defeated. You dash forward and retrieve your dagger, wiping it clean and quickly tucking it back into its holster. Straightening, you observe the scene before you. \n\t\t*goto hit_illusia\n\n\t*selectable_if (tear > 0) #Your tear gas grenade will provide a useful distraction. \n\t\t*set tear -1\n\t\t*set stealth %+3\n\t\t*set cunning %-5\n\t\tYou toss the grenade toward Hestia, and it detonates in a churning cloud of tear gas, enveloping her. She shrieks in pain, but suddenly the clouds begin to shape into a whirlwind, lifting up into the sky. Standing in the center with her arms raised, the witch looks furious. Her eyes are irritated, her nostrils bleeding, and she coughs violently even as she blows away the burning fumes. You quickly back away, drawing the dagger from your belt, but she raises her hands jerkily and blasts you with heated air. \n\t\t\n\t\tYou are sent rocketing backwards, your skin badly singed, and your sore body hits the dirt with a thud. Leaping to your feet, you are met with Hestia, lit up like a candle, already almost upon you.\n\t\t*if venefira_viper\n\t\t\tAs she reaches out with flaming hands, ${boggart} darts out from your robe, wrapping himself around her ankle and delivering a violent electrical shock. The witch shrieks wildly as the shock courses through her body, sending her to her knees. \n\t\t\t\n\t\t\tYou slam your boot into her temple and her head snaps back, and she crumples to the ground, defeated.\n\t\t\t*goto hit_illusia\n\t\t*set health -2\n\t\tYou try to twist away, but she grabs you with flaming fingers, your arms suddenly sizzling from the heat. \n\t\t*if (health \u003c 1)\n\t\t\t*goto main_death \n\t\t\t\n\t\tPressing forward, you use all your weight and strength to knock her to the ground. Desperately trying to avoid the flames springing up around her, you bring your fists heavily into her jaw. After a few hard hits, her eyes roll back in her head and she falls silent, out cold at last.\n\t\t\n\t\t*if (charisma > 52)\n\t\t\t\"I think I'll request that she be sent to the mountaintop prison—and as I say goodbye, I'll wish her a year full of Januaries,\" you mutter to yourself.\n\t\t*label hit_illusia\n\n\t\tYou quickly swivel around to confront your final opponent, racing forward with your arms up defensively. The unknown ${witch} narrowly dodges, but you swiftly ram your knee into \n\t\t*if warlock \n\t\t\this \n\t\t*if girl \n\t\t\ther \n\t\tnose and ${he} collapses. Before you can move in, ${he} yells desperately,\n\t\t*goto illusia \n\n\t*selectable_if (destruction=1) #Your destruction grenade will put an end to this.\n\t\t*goto hestia_fire\n
