<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trial of the Demon Hunter — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "demonhunter", "title": "Trial of the Demon Hunter", "scenes": {"author": "*page_break\n[b]Author's note:[/b]\nThank you for your support, and congratulations on finishing \"Trial of the Demon Hunter - Volume One of Demons Among Men\"! I invite you to play again, and to try to choose options that you've never selected before. There are multiple routes that can give you a different and possibly more desirable version of the story.  \n\nMake sure to save your game below! You'll need your saved game to continue where you left off in the next episode, [i]Captive of Fortune[/i].\n\n*save_game save_demonhunter\n\nWe hope you've enjoyed playing [i]Trial of the Demon Hunter.[/i]\n\n*feedback\n\nIf you enjoyed reading and playing this as much as I enjoyed creating it, please consider leaving a review in the application store and sharing it with friends. The more downloads I get, especially in the first week after the release, the better equipped I'll be to write the sequels and improve the current installment. \n\nIf you didn't care for Trial of the Demon Hunter, or if you've found any bugs, typos, or continuity errors -—or if you simply have a suggestion—- I'd love to hear from you. I'm open to all sorts of feedback. You can contact me at my Facebook page or email me using the links provided below.\n*label check\n*choice\n\t#Check out Mabelin and the Demon Trials, the conventional novel version of Trial of the Demon Hunter and its sequel, Captive of Fortune.\n\t\n\t\tMabelin and the Demon Trials is an e-book that is available on over a dozen platforms, including Apple and Barnes & Noble. To get your copy, simply search for the title on your favorite digital book distributor, or follow this  \n\t\t*link https://www.smashwords.com/books/view/539102 link.\n\t\t\n\t\tMabelin is a demon huntress, a fighter of evil, and a natural enemy of demons. In a twisted display of irony, a demon appears and destroys her village. Determined to avenge her shattered home, the huntress embarks on a perilous journey alongside her boggart apprentice, Beckham. \n\t\t\n\t\tAlong the way, she faces many enemies, including a vampire, a goblin, witches, bandits, a necromancer, an ogre, and a troll. During her journey, she finds herself in the city of Lorden, where she is able to regain her strength, forge new alliances, and even consider the prospect of romance. However, her Netherworldian foe is always looming. \n\t\t*goto check \n\t\t\n\t#Check out my Facebook page.\n\t\tFor news, exclusive content, and sneak peeks of the sequels and more, \"like\" my Facebook page,\n\t\t*link https://www.facebook.com/samuelharrisonyoung Samuel Harrison Young.\n\t\t*goto check\n\n\t#Finish the gamebook.\n\t\t*ending", "castle": "*temp room 0\n*temp treasury false \n*temp lab false \n*temp armory false \n*temp potions 0 \n\n*page_break\n\nYou might have chosen to spare Lord Sarrivan, but leaving him alive to control his cursed castle would have been suicide. You have fallen so far down into the castle, you guess this must be the very bottom, which is generally the place with the weakest source of magic, fortunately for you. The darkness is complete. It takes a few tries because your candles are sodden, but you eventually light one of them, illuminating the tunnel in a dim, azure light.\n\nA few steps later, you notice a change in the feel of the stone. Curiously, you press the wall. It suddenly moves backward and to the side, revealing a staircase winding upwards. A faint light glows from the walls, reflected from some hidden source. Peering into the ominous tunnel, you are confronted with two choices. \n\nKeeping your candle lighted would protect you from magical barriers and enchantments while also illuminating the path. The other possibility with your candle, though, is that the light would just be a beacon for any dark creatures still lurking in this ramshackle fortress. \n*choice\n\t#You blow out your candle and proceed in the darkness, trusting your keen vision and hoping the staircase isn't lined with curses.\n\t\t*set cunning %-5\n\t\t*set health -1 \n\t\t*set room1 true\n\t\tAs you proceed cautiously through the doorway, you immediately come to regret your decision. Desperately fumbling for your candles, you find yourself falling as exhaustion rushes through your body and you crumple to the ground. The last thing you remember is cracking your head on the edge of a step.\n\t\t*if (health \u003c 1)\n\n\t\t\tThe darkness seems to shift. You're faintly aware of an urge to struggle against your demise, but you no longer have the strength to fight. Soon, your thoughts fade into the inescapable, infinite blackness of death. \n\t\t\t*goto_scene death\n\n\t\t*page_break \n\t\tYou have no way of knowing how much time has passed when you finally wake, stirred by the dull throbbing in your head and a deep rumbling from the floor below you. Cringing, you instinctively shield your neck. Showers of loose particles rain down from above, as Sarrivan's death sends tremors through the castle's foundation.\n\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t*label munk \n\t\t\t\"Well,\" you remark wryly, \"so much for a shopping trip in the treasury…. I'd better hurry.\"\n\t\t\t*goto money7 \n\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\tYou have thoroughly studied the effects of vampires' innate connections to their homes. As Sarrivan was rumored to be at least a couple hundred years old, you know you must get moving quickly before the whole tower collapses.\n\t\t\t*goto money7 \n\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\tYou look upwards, noticing fine cracks in the mortar above. You must get moving quickly before the whole tower collapses.\n\t\t\t*goto money7 \n\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\tYou may only have minutes left, and you are determined to rescue something useful from this ruin. Deciding\n\t\t\t*goto deciding\n\t\t*else \n\t\t\t*goto munk \n\t\t*label money7 \n\t\t*comment endif \n\n\t\tTenderly feeling your temple, you finger the massive knot that is causing the awful pounding in your head. You climb gingerly to your feet, deciding\n\t\t*label deciding\n\t\tthat it's a good idea to light your candle after all. \n\t\t\n\t\tTaking one from your satchel, you quickly light it with the flint and marcasite. Holding the lit candle in front of you,\n\t\t*goto staircase\n\n\t#A lit candle seems like a better plan, gauging from your earlier experiences in the castle.\n\t\t*set cunning %+3\n\t\tYou hold the little light up to the doorway. It smells sweetly of incense in this rank place. A magical ward shimmers in the blue light, but it disperses with a little \"pop\" as the candle takes effect.\n\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t*label app \n\t\t\tNodding appreciatively at your foresight,\n\t\t\t*goto staircase \n\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\tMoving forward hesitantly,\n\t\t\t*goto staircase\n\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\tSlipping quietly over the threshold, \n\t\t\t*goto staircase \n\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\tStriding forward impatiently, \n\t\t\t*goto staircase\n\t\t*else \n\t\t\t*goto app \n\t\t*label staircase\n\t\tyou ascend the winding staircase. \n\t\t\n\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t*label ech \n\t\t\tYour step echoes oddly in this stifling stairwell, but you find yourself comforted by the oval of illumination and familiar smell of your candle. \n\t\t\t*goto line\n\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\tThere might be all kinds of fascinating relics stashed away by the late Lord Sarrivan, waiting for you to find them somewhere on the upper floors.\n\t\t\t*goto line\n\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\tPeering ahead into the shadows beyond the candle's reach, you are alert to every sound, even noticing every spider that scuttles away from the unfamiliar light. Your footsteps echo hollowly as you rise.\n\t\t\t*goto line\n\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\tMoving quickly, you don't even bother to raise a hand to brush away the spiderwebs after a while.\n\t\t\t*goto line \n\t\t*else \n\t\t\t*goto ech \n\t\t*label line\n\t\tYou must have descended hundreds of feet during your fall. \n\t\t\n\t\tYour journey seems never-ending, but you finally reach level ground. Walking carefully into a dark, silent room, you scan the walls but see no windows. Likely, you are in the exact center of the castle. One wall has a row of torches and you take a moment to light them. The entire room brightens, so you extinguish your own candle and put it away. \n\t\t\n\t\tThere are three prominent staircases here. One, a winding marble staircase, ascends to a sturdy set of ornate iron doors inlaid with gold and silver, secured with a huge bolt and keyhole. In the center of the room, there is a rickety metal staircase that leads to a smaller door. Both the staircase and door are covered with a variety of strange runes and wards. \n\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t*label gen \n\t\t\tIt doesn't take a genius to know these runes are not friendly….\n\t\t\t*goto dot \n\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\tFortunately, they look quite familiar even from this distance.\n\t\t\t*goto dot \n\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\tYou can slip past the curses, you wager.\n\t\t\t*goto dot \n\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\tVampire curses! You hate vampire curses. They won't stop you, though.\n\t\t\t*goto dot \n\t\t*else \n\t\t\t*goto gen \n\t\t*label dot \n\t\t*line_break \n\t\t\t\n\t\tOn the right, a slightly eroded, grey stone staircase connects to the balcony. The room above, behind the banisters, is framed in stained glass\n\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t*label cov \n\t\t\tcovered in strange, geometric calligraphy. It looks like a good storage room for all of the exciting supplies!\n\t\t\t*goto c \n\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t, set with signs that you recognize as alchemical symbols. The first three seem to be iron, water, and creation.\n\t\t\t*goto c \n\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\twith arcane symbols that look incredibly inviting to you. There must be some useful artifacts behind that much fancy glasswork.\n\t\t\t*goto c \n\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\tthat looks easy to smash, fortunately for you.\n\t\t\t*goto c \n\t\t*else \n\t\t\t*goto cov \n\t\t*label c \n\t\tYou \n\t\t*goto explore\n*label explore\nquickly decide to explore the most appealing looking room.\n*label rooms \n*hide_reuse\n*choice\n\t#You want to know what is behind that warded chamber in the center.\n\t\t*goto armory\n                \n\t#The fancy room with the marble steps looks expensive even from the outside. No doubt there are valuables in its chambers.\n\t\t*goto treasury\n                \n\t#That stained-glass room is the most intriguing, in a mysterious way.\n\t\t*goto lab\n                \n*label armory\n*set room +1 \n\nYou climb the staircase, the strange runes humming mysteriously. The runes are wavy and shimmering upon the portal, which almost looks like a mirror of plasma. You've seen something like this once before, in a warlock's private chambers. It's neither a riddle nor a barrier, but a very dark curse. Sarrivan's powers were even more remarkable than you knew.\n\nIt's said that moondust from one of Lume's seven moons is required to activate the spell. How the vampire got ahold of this, you can only imagine. Then, the one who wishes to enter must injure \n*if male\n\thimself and drain his \n*if female \n\therself and drain her \nblood into a little monster that emerges from the portal. As this thought crosses your mind, a little bulbous monstrosity swims forward inside the barrier, staring at you with hungry eyes, a creepy grin marring its blood-red face.\n*choice\n\t#You are not feeding your blood to that THING! \n\t\t*set charisma %+3 \n\t\t*set altruism %+5 \n\t\tAs you begin to walk away from the chamber's entrance, the devilish being sneers at you, blood dribbling down its jagged teeth. You shiver, walking a little faster.\n\t\t*if room = 3 \n\t\t\t*goto ruin \n\t\t*goto rooms\n\n\t#Grimacing, you decide that this is way too dangerous.\n\t\t*set stealth %+3 \n\t\t*set resolve %+3 \n\t\tAs you begin to walk away from the chamber's entrance, the devilish being frowns at you, giving a gurgling growl as it recedes back into the murky depths.\n\t\t*if room = 3 \n\t\t\t*goto ruin \n\t\t*goto rooms\n                                        \n\t#How will you smite evil without more weapons? Of course you're going!\n\t\t*set resolve %+3\n\t\t*set charisma %+3 \n\t\t*goto danger \n\t\t\n\t#Whatever is inside is surely worth it.\n\t\t*set cunning %+3 \n\t\t*set stealth %+3 \n\t\t*goto danger\n\t\t\n*label danger\n*set altruism %+3    \n*set armory true\n*set health -2\nYou feel strong enough to withstand whatever this little monster does to you. Drawing your dagger, you cut steadily into your palm and press your injured hand against the portal. The runes glow a crimson red as your blood drains slowly into the portal's mouth, the beast sucking voraciously at your cut. \n*if (health \u003c 1)\n\n\tYou suddenly feel dizzy. You must have been too weak to lose any more blood. Quickly trying to escape from the rune, you begin to pull away but find that your hand won't move! You gasp as your vision begins to fade, and you fall to your knees. Your head swimming, you slump against the wall, your life ebbing away.\n\t*goto_scene death\nYour hand is a pale grey color and you feel light-headed before the demon is finally satisfied. \n\nThe portal and then the entire door vanish completely and your hand drops of its own accord. You use a small cloth to stop the bleeding and bind the wound, then wait for the black orbs dancing around your vision to disappear. You step across the threshold into a room filled with a glorious surplus of weapons and armor. \n*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t*goto fascinate \n*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t*goto nervous \n*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t*label nervous \n\tWith a nervous glance overhead,\n\t*goto aa \n*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t*label fascinate \n\tCompletely fascinated,\n\t*goto aa \n*else \n\t*goto fascinate \n*label aa \nyou take an extended tour of the room, testing the best of the plunder as you go. \n\nFour particular items catch your eye as you pass through the armory. In the defense section, you find mythril cunningly crafted into a full-body set of enchanted armor, covering everything but your neck and head. It is both light as a gryphon's feather and stronger than anything you've ever owned before. You move on to a display of weapons, a particularly brutal pair of studded gauntlets catching your interest. \n\nA small bowl holds three small spheres, a weapon common to many demon hunters' arsenals. They explode into a torrent of small, fast-moving marbles when activated. Finally, there's a peculiar disk hanging on the wall, which expands into a shield. Sadly, you need to keep your supplies down to a reasonable weight. You can choose to take the shield, the gauntlets, or the armor and marble grenades.\n*choice\n\t#You prefer the extra security of the armor and trip-grenades.\n\t\t*set marble true\n\t\t*set mythril true\n\t\t*set stealth %+3\n\t\tYou quickly slip on the armor, donning it beneath your cloak, and then gently put the marble grenades into a little padded sack and slip them into your satchel.\n\t\t*goto after\n\n\t#The offensive possibilities of the studded gauntlets appeal to you.\n\t\t*set gauntlets true\n\t\t*set resolve %+3\n\t\tYou try the gauntlets on your hands and flex your fingers, the studs catching the faint light and shimmering slightly. Pleasantly enough, they fit perfectly, and don't weigh very much.\n\t\t*goto after \n\n\t#The shield is a good match for your staff, and will help the next time you must fight against a group of enemies.\n\t\t*set shield true\n\t\t*set cunning %+3\n\t\tYou raise the shield, slipping it over your arm as its perfect balance and well-built grip help you settle it onto your arm. This shield would probably make a good discus to throw in a tight spot, as well. Strapping the shield onto your back, you stand straight, barely aware of its weight. \n\t\t*goto after\n                                                \n*label treasury\n*set room +1 \n*set treasury true\n\nYou climb the marble staircase. At the top, you examine the keyhole and decide to try your master key. A few moments of twisting and jiggling later, you are rewarded with a satisfying [i]click[/i]. The lock opens easily, and you push the doors gently open. The vast treasury is filled with an awesome display of riches. Orderly piles and columns of bulging chests contain jewelery, gilded pieces, diamonds, and extravagant goblets filled with various trinkets.\n\n*if altruism \u003c 50  \n\tThe sheer amount of valuables before you is enough to make you drool.\n\t*goto spotting     \n*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t*label cod \n\tYou could definitely use this to replace some of the money you lost when Rhys Falls was destroyed.\n\t*goto spotting \n*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t*goto valuable \n*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\tYou quickly decide what will bring the most profit.\n\t*goto spotting\n*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t*label valuable \n\tThere is a lot of wealth, but none of it looks especially intriguing: just valuable.\n\t*goto spotting\n*else \n\t*goto cod \n*label spotting\nYou take an empty pouch from a gilded dresser, looking thoughtfully around the room.\n*choice\n\t#You'll take as much as you can carry, of course.\n\t\t*set cunning %+3\n\t\t*set altruism %-5\n\t\t*set gold +30\n\t\t*if gold > 109\n\t\t\t*achieve money\n\t\tYou smile, hefting a full pouch of gilded pieces, and securing it to your belt.\n\t\t*goto after\n\n\t#You'll just take a handful of gold.\n\t\t*set cunning %+3\n\t\t*set charisma %+3\n\t\t*set gold +15\n\t\t*if gold > 109\n\t\t\t*achieve money\n\t\tYou tie a small pouch to your belt, readying yourself to move on.\n\t\t*goto after\n\n\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t#You want none of this! Who knows how Lord Sarrivan obtained all his wealth?\n\t\t\t*goto money\n\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t#You set the pouch back down. What use will you have for gold when tracking a demon in the swamp?\n\t\t\t*goto money\n\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t#You set the pouch back down, taking nothing. Gold would only weigh you down at this point.\n\t\t\t*goto money\n\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t#You set the pouch back down, suddenly ready to move on. These things wouldn't help much in the journey ahead of you, anyway.\n\t\t\t*goto money\n\t*else \n\t\t#You set the pouch back down, taking nothing. Gold would only weigh you down at this point.\n\t\t\t*goto money\n\t\n*label money\n*set altruism %+3\n*set cunning %-5\n*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t*label wa \n\tWhy are you wasting your time in here, anyway? \n\t*goto coin \n*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\tYou spend a moment pondering the transitory nature of wealth, then move on.\n\t*goto coin \n*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\tYou glide back through the room, silent on your feet as always.\n\t*goto coin \n*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\tYou're more than ready to move on. This treasury reeks of vampire, anyways.\n\t*goto coin\n*else \n\t*goto wa \n*label coin \n*if altruism \u003c 50\n\tStill…as you make your way through the chamber, you can't stop yourself from snagging a small bag of golden coins.\n\t*set gold +5\n                \n*label after\n*if ((room1) and (room = 2))\n\t*goto ruin\n*if room = 3 \n\t*goto ruin \nAs you exit, \n*label stand\nyou are startled by a massive rumble that shakes the castle's foundations. You instinctively shield your neck and head but are only showered by loose particles of dust. Still, you need to move quickly. Sarrivan's domain is decaying as quickly as its dead master.\n*goto rooms  \n\n*label lab\n*set room +1 \n*set lab true\n\nYou walk up the stone stairs to flickering colors, as the lights behind the stained glass seem to shift and change without patterns. Curiously, there appears to be no barrier here. Stepping through the doorway, you're startled to see a ward suddenly appear behind you. It crackles with malevolent energy, pulsing and writhing like bloodied insects. Swiveling around, you see that the exit is completely blocked. \n\nYou can already tell that your candles are too weak to dispel this intensity of magic. You'll have to find another way out of this laboratory, or a way to destroy the ward. Meanwhile, you're stuck here. \n*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t*label thin \n\tIt's a good thing this castle is so charming and pleasant.\n\t*goto a \n*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t*goto well \n*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t*label well \n\tPerhaps you can make it worthwhile.\n\t*goto a \n*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\tWell, you may as well do something productive, then.\n\t*goto a \n*else \n\t*goto thin \n*label a \nTaking a look around, you see so many unidentifiable objects, and so much dust, that you can hardly make out one item from another. \n\nMost of them are probably only useful for the darkest of spells. To your right, there is a row of oddly colored beakers, undoubtedly magical. They even seem to be labeled. You guess it's fortunate for you that Sarrivan apparently had a bad memory. You walk toward the table, carefully avoiding the piles of miscellany on both sides, and thoroughly inspect the beakers and their tags.\n\nOne beaker, which says \"Serpent Vines,\" is glowing a bright green and seems to contain writhing flora. The next is a luminescent, vivid blue clouded with snow and ice crystals, labeled \"Gnawing Frost.\" To its right is a radiant, spherical bottle. Its twisting red contents have warmed the outside of the glass, and you nearly burn yourself as you look at the label: \"Flame Devil.\" \n\nThe other two potions at the far end of the table look much plainer. One is a vial of dirt that reads \"Earth Abyss\" and the other holds a swirling white substance but it has no label. You examine the white one more closely and find it very cold to the touch. \n\nSpotting a manuscript positioned on a table nearby, you pick it up and notice that it seems to have information about the potions, written in several different languages, you gather from skimming briefly. You aren't familiar with most of them, but there are some pages in Infernal.\n*fake_choice\n\t#You ignore the scroll. You have more important things to do right now.\n\t\t*set resolve %+3\n\t\t*set cunning %-5\n\t\tDiscarding the book, you turn back to the potions and decide which ones would be most useful to you. \n\n\t#Perhaps you could quickly read it over.\n\t\t*set stealth %+3 \n\t\tThe scroll tells you what you already expected—the results are related to the element of the potion.\n\t\t\t\t\n\t#Holding the scroll gently to a light, you read it thoroughly.\n\t\t*set cunning %+3 \n\t\tThis portion of the ancient scroll is written in an older dialect of Infernal, but it's still understandable. It reads:\n\n\t\t[i]The potion of Serpent Vines sendeth many living, moving tendrils, engulfing your enemy as a spider might a fly. The Earth Abyss openeth a great chasm, which, collapsing upon itself, driveth your enemy to a stony burial. The potion of Wind Scythe sendeth blades of air spinning through the battlefield, harming all but the caster. The potion of Gnawing Frost misteth mightily with a north wind, freezing your enemy as it falls. The potion of Whirlwind Flame surroundeth your enemies in a spiral of fire.\n\t\t\n\t\t[i]~ Created by Dan of Danbury, this year 1285 in the kingdom of Githrad. [/i]\n\nUnfortunately, your satchel will likely hold only two potions, at most.\n*label pick \n*hide_reuse\n*choice\n\t#The Gnawing Frost will be useful for stalling enemies, especially the powerful foes that may lie ahead of you.\n\t\t*set ice true\n\t\t*set potions +1 \n\t\tThe container is actually very cold, and it gives off a mist like breath coming from someone's mouth in the dead of winter. \n\t\t*if potions = 2\n\t\t\t*goto second_potion\n\t\t*goto potions\n                                \n\t#The Wind Scythe potion will be especially useful for defeating hordes of enemies, or more powerful ones.\n\t\t*set wind true\n\t\t*set potions +1 \n\t\tThe potion is actually very light, and almost seems to hover very slightly if you watch it carefully.\n\t\t*if potions = 2     \n\t\t\t*goto second_potion\n\t\t*goto potions\n\n\t#The Flame Devil potion would be invaluable for defeating your enemies quickly.\n\t\t*set flame true\n\t\t*set potions +1 \n\t\tThe container is slightly hot—not enough to burn you, but enough to give off a pleasant warmth on your hands.\n\t\t*if potions = 2     \n\t\t\t*goto second_potion\n\t\t*goto potions\n\n\t#The Serpent Vines potion would be perfect for incapacitating anyone you might be facing. \n\t\t*set vines  true\n\t\t*set potions +1 \n\t\tThe potion pulses with a strange light and seems to move very slightly. \n\t\t*if potions = 2     \n\t\t\t*goto second_potion\n\t\t*goto potions\n        \n\t#The Earth Abyss potion would be especially useful for decisively ending battles.\n\t\t*set earth true\n\t\t*set potions +1 \n\t\tThe potion feels surprisingly heavy.\n\t\t*if potions = 2     \n\t\t\t*goto second_potion\n\t\t*goto potions\n\n*label potions\n\nPutting the potion gently into your pack, padded with a strip of cloth, you turn back to the table. To your surprise, the manuscript disintegrates and a pale barrier appears in front of the remaining potions, buzzing menacingly. It seems to be the same type of ward that appeared in the chamber's doorway earlier. \n\nYou are about to exit the premises when the same fancy scrawl from the ward outside the castle appears on the magical barrier. It reads, [b][i]\"Retrieve the key from the depths in order to take what you desire!\"[/b][/i] \n\nInitially, you suspect that this is some cryptic riddle, but a creak from behind you reveals otherwise. Turning, you see a new doorway beckoning. Proceeding \n*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t*label bod \n\tboldly\n\t*goto j\n*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\tcautiously \n\t*goto j \n*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\tcautiously\n\t*goto j\n*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\tboldly\n\t*goto j \n*else \n\t*goto bod \n*label j \ntoward the doorway, you raise your staff and watch carefully for any traps. You are immediately overwhelmed with the rank, stale stench of scummy water. There is a pool in the middle of the room but otherwise the space is empty, except for a few faded curtains covering parts of the walls. \n\nThe surface of the pool ripples slightly, reflecting light onto the ceiling, but nothing seems to be disturbing the water. The bottom is tiled with small stones, and in the very middle there is an odd, irregular object: a small, brass bone key. If you want a second potion, then, it seems \n*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t*goto dive\n*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t*goto swim\n*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t*label swim\n\tyou'll have to go swimming in swamp water yet again. \n\t*goto swims \n*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t*label dive\n\tyou must dive to the bottom of the pool. \n\t*goto swims \n*else \n\t*goto dive \n*label swims \nSomething about the pool is vaguely disturbing, however. \n\nTaking out a candle, you ignite it and hold it out toward the water. Your candle makes no effect on the pool. As within this entire castle, it appears like dark magic is at work. On the other hand, though, the bottom isn't very far away and the key is valuable, considering it could unlock the wards keeping you from one of the other potions and from exiting this chamber at all.\n*choice\n\t#You'll take your chances with the magical barrier, and give up on getting a second potion.\n\t\t*set health -3\n\t\t*set cunning %-5\n\t\t*set resolve %-5\n\t\tIt would be unfortunate if you were to trip yet another trap in this castle, and even now another tremor is shaking the foundations beneath your feet. Taking a deep breath, you steel yourself as you walk over to the exit, standing before the ward. It still crackles with energy as if snickering at you. You dash forward into the barrier at top speed, but as soon as you reach the threshold you feel a terrible burning sensation. \n\t\t\t\t\n\t\tCrying out as the pain wracks your entire body, you struggle to remain conscious as you topple through the doorway and onto the far side of the barrier. Crumpling to the ground, you pause for a moment to regain your strength. Looking back warily, you see that the ward has disappeared in a flurry of crimson electricity. After a few moments, you stand slowly and walk away from the doorway and its vicious ward.\n\t\t*goto after\n\n\t#You'll attempt to retrieve the key in hopes of breaking these barriers.\n\t\tShedding your cloak and setting your equipment aside, you plunge into the pool. Its waters are warm and strangely thick, and the key is tossing and turning gently at the bottom. You kick steadily toward the key, keeping your eyes trained on it, ready for any tricks this pool may have waiting for you. Although it only seems to be a few feet away, you can't get any closer to it no matter how forcefully you stroke.\n\n\t\tHowever, a backward glance confirms that the surface of the liquid is farther away now. There must be a wicked enchantment on this pool: distance forward becomes relative to the spell's whims. \n\t\t*if stealth \u003c 54\n\t\t\t*goto even\n\t\t*if cunning > 54 \n\t\t\t*label even\n\t\t\tEven so, you surmise that it cannot last forever. \n\t\tYou continue to swim downward, but you make no progress. \n\t\t\n\t\tYour lungs begin to burn from lack of oxygen, and spots dance in your vision. At this point, it might be best to consider turning back. You have no idea how long this curse will continue, and every second brings you closer to death.\n\t\t*choice\n\t\t\t#You have a feeling you should turn back before something terrible happens.\n\t\t\t\t*set resolve %-5\n\t\t\t\t*set charisma %+3\n\t\t\t\t*set health -1\n\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t*goto brief\n\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t*label brief\n\t\t\t\t\tYou are tempted to keep after the key, but against your better judgment, you give up. You swim hard until you breach the \n\t\t\t\t\t*goto ab \n\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t*goto abandon\n\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t*label abandon\n\t\t\t\t\tAbandoning the endeavor, you turn back until you breach the \n\t\t\t\t\t*goto ab \n\t\t\t\t*else \n\t\t\t\t\t*goto brief \n\t\t\t\t*label ab \n\t\t\t\t*if (health \u003c 1)\n\t\t\t\t\tbut the fatigue and your injuries have taken their toll. As you struggle to reach the surface of the liquid, you are seized by vicious cramps. You open your mouth to scream in pain, but the strange water floods into your lungs and you choke, slowly drowning in the enchanted pool.\n\t\t\t\t\t*goto_scene death\n\t\t\t\tsurface, gasping for air. Raking in a deep breath, you climb out onto solid ground.\n\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t*goto you're \n\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t*goto frankly \n\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t*label you're \n\t\t\t\t\tYou're just happy to still be alive.\n\t\t\t\t\t*goto y \n\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t*label frankly \n\t\t\t\t\tFrankly, you're a little embarrassed, and more than ready to leave this place.\n\t\t\t\t\t*goto y \n\t\t\t\t*else \n\t\t\t\t\t*goto you're \n\t\t\t\t*label y \n\t\t\t\tYou head out, weaving through the jumbled tables and piles of equipment.\n\t\t\t\t*goto after\n                \n\t\t\t#You are determined to continue despite the danger.\n\t\t\t\t*set resolve %+3                                \n\t\t\t\t*set health -2\n\t\t\t\tYou ignore the burning sensation in your lungs, swimming stubbornly downwards. Your muscles are aching and you can barely keep holding your breath.\n\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t*label wonder\n\t\t\t\t\tYou are starting to wonder what you've gotten yourself into\n\t\t\t\t\t*goto x \n\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t*goto wonder\n\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t*goto push\n\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t*label push\n\t\t\t\t\tYou push on all the harder, \n\t\t\t\t\t*goto x \n\t\t\t\t*else \n\t\t\t\t\t*goto wonder \n\t\t\t\t*label x \n\t\t\t\twhen the enchantment finally breaks. \n\t\t\t\t\n\t\t\t\tSnatching up the key, you turn, pushing your feet off the bottom and rocketing upwards. Just when you can no longer stand to hold your breath, your face is out of the water. You gasp, sucking in deep gulps of air. \n\t\t\t\t\n\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t*label pand \n\t\t\t\t\tPanting,\n\t\t\t\t\t*goto pa \n\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\tPanting,\n\t\t\t\t\t*goto pa \n\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\tWith firm strokes,\n\t\t\t\t\t*goto pa \n\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\tWith firm strokes, \n\t\t\t\t\t*goto pa\n\t\t\t\t*else \n\t\t\t\t\t*goto pand \n\t\t\t\t*label pa \n\t\t\t\tyou swim to the edge and pull yourself out of the water. \n\t\t\t\t\n\t\t\t\tPausing for several minutes to regain your strength as fatigue washes over you, you lay on the ground, clutching the key happily. Fighting exhaustion, you finally stand to your feet, dress, and gather your things. You head over to the remaining potions and lift the bone key, touching it to the magical barrier. \n\t\t\t\t\n\t\t\t\tThe ward draws it inwards, and the barrier, the ward on the doorway, and the key disappear in a shower of blood droplets…how pleasant. At least now you can choose a second potion.\n\t\t\t\t*goto pick\n                \n*label second_potion \nYou put the second potion gently into your pack near the first, then wrap them together so they won't rattle against each other and chip or break. Your mind already whirling with the dual attacks possible thanks to these potions, you turn to leave the alchemy laboratory.\n*goto after\n\n*label ruin\n\nAs you exit, you notice that the castle is really starting to shake itself apart. The floor rattles, and as if on cue, a large chunk of stonework drops from the ceiling and lands right next to your feet. You leap down the stairs, taking two at a time, barely keeping your balance as debris crashes all around you. Sprinting toward the front of the castle, your throat and eyes start to fill up with dust. \n\nGreat fissures are forming in the floor beneath you, and the double doors at the entrance are blocked by a massive pillar that's toppled over. As you look for another way out, the roar of falling stones gets louder. It's as if the castle itself were intent on swallowing you, a monument to Sarrivan's eternal desire for revenge. \n\nThe building seems to be collapsing from the foundations upward. Very likely, the only escape now is by the balcony in Sarrivan's chambers. As you rush forward, a massive chandelier adorned with orbs of glass suddenly disconnects from the ceiling above and plummets toward you. \n*choice\n\t#You run toward the foyer and try to escape through the double doors.\n\t\t*set cunning %-15\n\t\t*set health 0\n\t\tYou dash to one side and duck behind a pillar. The stone pillar shields you from the explosion of glass as the ancient fixture hits the ground. Racing toward the double doors, you keep to the edges to avoid the worst of the crumbling floors beneath you. Just as you reach the exit, the floor splits beneath you. \n\t\t\n\t\tWith a strangled cry, you plummet through the air. You catch yourself on a stone outcropping jutting from the wall and desperately call out for ${boggart}, but it's futile. He is too far away, and your cries are met with an empty silence. You struggle to pull yourself up, and you almost make it.\n\t\t\n\t\tSuddenly, though, the stone crumbles beneath your weight and you plummet into the abyss below. Your frantic screams are inaudible as the tower collapses on top of you.\n\t\t*goto_scene death\n\n\t#You slide beneath the massive chandelier.\n\t\t*set cunning %+3\n\t\t*set stealth %+3\n\t\tIt falls around you, hitting the floor with a tremendous clatter. You use your cloak to shield your face as the glass shatters, flying in every direction. Carefully standing, you complete\n\t\t*goto escape\n\n\t#Tensing, you quickly leap backwards.\n\t\t*set cunning %-5\n\t\t*set health -2\n\t\tYou manage to avoid being crushed by the massive fixture, but the shattered glass shoots toward you and your body suddenly stings from numerous cuts.\n\t\t*if (health \u003c 1)\n\t\t\t*goto other_death\n\t\tStaggering to your feet, you fight through the pain and quickly dodge the chandelier, completing \n\t\t*label escape\n\t\tyour journey to the ladder's feet. You climb swiftly and reach the balcony. \n\t\t\n\t\tFor a brief, bizarre moment, you notice a magnificent chess set pulsating with energy and a placard above it reading [i]Distinguished Master of the Chess[/i] but quickly turn your attention to more important matters, such as surviving! Grabbing the balustrade, you prepare to lower yourself down and drop to the ground. \n\t\t\n\t\tBefore you can move, however, a gigantic crack rings through the air. You turn in horror to see the steeple crumbling off the castle's pinnacle, heading straight toward you! You leap unceremoniously into the surrounding swamp and the steeple obliterates the little balcony as if it had been glass. As you fall, you try to flare your robe out to slow yourself, but meet with little success.\n\n\t\tYou plunge into the rancid swamp with a gigantic splash, your momentum carrying you into its depths. Bubbles break the surface as you battle to escape the marsh. You finally make it back out and haul yourself away from the bog and onto slightly more level ground. Barely conscious after the fall, you roll over onto your back. Your chest rising with ragged breaths, your vision is replaced with a pounding darkness. \n\t\t\n\t\tThe last things you see are ${boggart}'s frantic eyes. His screams for you to remain awake go unheard as the deafening silence of unconsciousness overtakes you.\n\t\t*if health > 15 \n\t\t\t*achieve caution\n                \n\t\t*page_break \n\t\t[b]TO BE CONTINUED IN [i]CAPTIVE OF FORTUNE - VOLUME TWO OF DEMONS AMONG MEN[/i].[/b]\n\t\t*finish Continue\n\n*label other_death\n\nSuccumbing to your injuries, you collapse, calling out weakly for ${boggart}. There is nothing left for you to do…. You strain to keep hold of life, but your vision soon fades into the infinite blackness of your death. \n*goto_scene death\n", "choicescript_description": "Battle the forces of evil in this thrilling interactive fantasy novel! When a powerful demon destroys your village, you embark on a perilous journey alongside your shape-shifting companion, determined to avenge your shattered home and banish this devil back to the Netherworld.\n\n[i]Trial of the Demon Hunter - Volume One of Demons Among Men[/i] is an interactive novel by Samwise Harry Young where your choices control the story. The game is text-based with occasional vivid illustrations, a unique soundtrack, and driven by the vast, unstoppable power of your imagination.\n", "choicescript_stats": "BASIC INFORMATION:\n*stat_chart\n\ttext name Name\n\ttext gender Gender\n*line_break \nATTRIBUTES:\n*stat_chart\n\topposed_pair Compassionate\n\t\tScornful\n\topposed_pair Altruism\n\t\tAvarice\n\tpercent cunning Cunning\n\tpercent charisma Charisma\n\tpercent stealth Stealthiness \n\tpercent resolve Resolve\n*line_break \nRELATIONSHIPS:\n*stat_chart \n\tpercent relationship Relationship With ${boggart}\n\tpercent illucio Relationship With ${Illusia}\n\tpercent falcon Relationship With Falcon\n\tpercent callidus Relationship With Callidus \n\tpercent gertrude Relationship With Gertrude\n\tpercent garnet Relationship With Garnet \n\tpercent gretta Relationship With Gretta \n\tpercent gretchin Relationship With Gretchin \n\tpercent lorelle Relationship With Lorelle\n\tpercent vidar Relationship With Vidar\n\tpercent ceylar Relationship With Ceylar\n\tpercent melithar Relationship With Melithar\n*line_break \nHEALTH, INVENTORY, AND OTHER INFORMATION:\n*stat_chart \n\ttext health Vitality\n\t\n\n\ttext mana Apprentice's Mana\n\t\n\n\ttext gold Gilded Pieces\n\t\nApprentice's Transformation:\n*if transformations_toad\n\tPoisonous Toad - requires 1 mana.\n\t*goto inventory \n*if transformations_viper\n\tElectric Viper - requires 2 mana.\n\t*goto inventory \n*if transformations_eagle\n\tEagle - requires 3 mana.\n\t*goto inventory \n?\n\t\n*line_break \n*label inventory\nInventory: \n*if darts=6 \n\t6 poisonous darts,\n*if darts=5\n\t5 poisonous darts,\n*if darts=4\n\t4 poisonous darts,\n*if darts=3\n\t3 poisonous darts,\n*if darts=2\n\t2 poisonous darts,\n*if darts=1\n\t1 poisonous dart,\n*if chain \n\tsilver chain,\n*if iron=8\n\tiron shavings 8/8,\n*if iron=7\n\tiron shavings 7/8,\n*if iron=6\n\tiron shavings 6/8,\n*if iron=5\n\tiron shavings 5/8,\n*if iron=4\n\tiron shavings 4/8,\n*if iron=3\n\tiron shavings 3/8,\n*if iron=2\n\tiron shavings 2/8,\n*if iron=1\n\tiron shavings 1/8,\n*if salt\n\tsalt,\n*if knife\n\tknife,\n*if food\n\tfood and water,\n*if rune\n\tteleportation rune,\n*if candles\n\tcandles,\n*if flint\n\tflint and metal,\n*if shield \n\trazor shield,\n*if marble \n\tmarble grenades,\n*if mythril \n\tmythril armor,\n*if ointment=2\n\ta full jar of healing ointment,\n*if ointment=1\n\thalf a jar of healing ointment,\n*if daggers \n\tVenefira's daggers,\n*if charm \n\t${Illusia}'s blood charm,\n*if poison\n\tVenefira's vials of poison,\n*if gauntlets \n\tstudded steel gauntlets,\n*if wind \n\tWind Scythe potion,\n*if flame \n\tFlame Devil potion,\n*if vines \n\tConstricting Vines potion,\n*if ice\n\tGnawing Frost potion,\n*if earth \n\tEarth Abyss potion,\n*if destruction=1\n\tdestruction grenade,\n*if concussion=2\n\t2 concussion grenades,\n*if concussion=1\n\t1 concussion grenade, \n*if tear=3\n\t3 tear gas grenades,\n*if tear=2\n\t2 tear gas grenades,\n*if tear=1\n\t1 tear gas grenade, \n*if amulet\n\ta peculiar amulet,\n*if staff\n\tchemically infused staff,\n*if handcuffs\n\thandcuffs,\n*if smart\n\tthe Ring of Owls,\n*if lions\n\tthe Ring of Lions,\n*if persuasion\n\tthe Ring of Dragonflies,\n*if shadows\n\tthe Ring of Spiders,\n*if fancy_pack\n\ta fancy backpack,\n*if book\n\tDemon Book of Names.\n\nGLOSSARY AND CHARACTER BIOS: \n*label glossary\n*choice\n\t#Demons\n\t\tDemons are the primary inhabitants of the Netherworld, an alternate world directly connected to yours. They vary greatly in appearance, but are generally humanoid and range from the size of a human baby to that of a massive grizzly bear. Demonic society is based around individuals' power levels. The weakest demons are essentially slaves, whereas the most powerful are militant tyrants. The hierarchy of demons is as follows:\n\n\t\tPeon - capable of killing one average human.\n\n\t\tVermin - capable of killing five average humans.\n\n\t\tCretin - capable of killing ten average humans. \n\n\t\tMaster - capable of killing twenty average humans.\n\n\t\tSovereign - capable of killing fifty average humans. \n\n\t\tThere are approximately one million demons, with each increasing rank exponentially less populated. Sovereigns live in a demonic paradise, extorting, torturing, and enslaving whomever they desire. There is, however, a possible reprieve for lesser demons. All the inhabitants of the Netherworld are able to escape through a portal and into your world, Lume. This is how magical creatures originated. Every portal is guarded by celestial beings whose powers vary in direct accordance to the strength of the demon(s) attempting to escape. \n\n\t\tPeons' guards are relatively easy to overcome, whereas Sovereigns' guards are nearly impossible to defeat. A Sovereign has never been able to enter Lume, though they hardly mind, having their own perfect dystopia in the Netherworld. Like magical creatures, all magical and powered abilities are derived from powerful demons. Non-demonic beings are often ranked in the same hierarchy of power. \n\t\t*goto glossary\n\n\t#Supernatural Abilities\n\t\tMagic - Magic is the ability to harness supernatural discharge from the Netherworld. Wizards are the only individuals who can directly wield this power.\n\n\t\tPowers - Powers are supernatural abilities purchased from high-ranking demons. Alternately, they can be obtained through absorption of supernatural discharge from the Netherworld. Individuals with powered abilities fall into one of four categories: sorcerer/sorceress, witch/warlock, vampire, or magician. Finally, every demon possesses powered abilities.\n\t\t*goto glossary\n\n\t#Notable Magic and Power Wielders\n\t\tSorcerers - A sorcerer performs demonic rituals in order to siphon abilities from high-ranking demons. These rituals can involve any manner of horrendous acts. Sorcerers have been known to supply demons with valuable information, summon them into Lume, and even offer their own bodies for the demon's sexual pleasure.\n\n\t\tWitches and Warlocks - Witches and warlocks sacrifice the innocent to high-ranking demons in exchange for power. This is especially heinous because it is believed that the victims are used as slaves or food in the Netherworld. Witches and warlocks are paralyzed by the touch of silver.\n\n\t\tVampires - A vampire has sacrificed his soul—and thus his ability to feel compassion, empathy, or love—to a high-ranking demon. In exchange, he receives biological immortality, heightened senses, and a unique magical ability. He must, however, sustain this pseudo-life by consuming the blood of the living. Vampires also have ethereal wings, which allow them to glide. They are particularly susceptible to salt, compelled to count each grain before pursuing other endeavors. \n\n\t\tThese undead creatures also posses extreme agility, climbing like spiders, as well as increased intellect, strength, and speed. They have numerous healing abilities, including immunity to poisons. Though already extremely powerful themselves, their magic has also been known to affect their homes, instilling them with magical traits that increase over time.  \n\n\t\tWizards - Wizards use their vast intelligence to unlock the restrictive barriers that keep magic from humanity. They harness the Netherworld's discharge, then use the dynamic forces to accomplish almost anything imaginable.\n\n\t\tMagicians - Aside from directly obtaining magical abilities, there is one other way to acquire them. Magical discharge from the Netherworld can be naturally absorbed into people's inner workings—during their infancy, when they are most susceptible to evolution—granting those persons access to magic. However, estimates suggest these powers are limited to about one in 100 people and are rather weak and cannot grow, unless guided by a particularly powerful wizard. \n\n\t\tBoggarts - Boggarts originated from the Netherworld. Long ago, when the first boggarts escaped from the demonic dimension, they assimilated easily into Lume. Their mana levels correspond with their sizes, which range from a small kitten to a large dog.\n\t\t\n\t\tBoggarts can transform into another creature of similar or lesser size for a short period of time. Additionally, they are able to scent out dark magic wielders, and they possess swift regenerative abilities. It should also be mentioned that boggarts are generally sociable, if not verbose, and feel best when they are included. \n\t\t*goto glossary\n\n\t#Special Weapons\n\t\tIron - Iron burns like an acid when used against universally evil creatures: demons, witches/warlocks, sorcerers/sorceresses, and vampires. When used against other criminals or magical creatures, the effects are often minimal and unpredictable.\n\n\t\tSalt - Salt mesmerizes vampires, who are compelled to count each grain. A lesser vampire is entranced for a few moments. This weapon can only be used once per encounter, as the creatures soon shake off the salt's influence.\n\n\t\tSilver - Silver instantly paralyzes witches and warlocks wherever it touches.\n\n\t\tDemon Book of Names - A Demon Book of Names is impervious to all but the strongest forms of destruction, due to runic magical protections. It contains the necessary information to banish a demon. With the knowledge of a demonic entity's true name, you can order them to return to the Netherworld after a physical defeat. Demons can be banished indirectly if they are deprived of a vessel for an extended period. However, banishing them through named incantations ensures a swift and definitive success. \n\t\t\n\t\tThese magical bestiaries were created by various wizards who wove their powerful magic over the tomes, keeping them updated on all information known about each demon. \n\t\t*goto glossary\n\t\t\n\t#${boggart} the boggart \n\t\t${boggart} is the apprentice of Demons Among Men's main character (the reader). He is a fun-loving little creature who absolutely adores any kind of pastries—especially fruit pies. He is quite clever and loyal, although he can be equally insulting and scathing toward those who treat him poorly.\n\n\t\tHe is sixteen years old, although due to his animalistic nature, he can prove considerably less mature than a human his age depending on the situation. At the beginning of the series, he can transform into either an eagle, a poisonous toad, or an electric viper, depending on the choices of the reader. He is a Peon.\n\t\t*goto glossary \n\n\t#Emira the goblin \n\t\tEmira is a sneaky little goblin who always manages to get herself into trouble—usually at the expense of others' well-being. Although she isn't the smartest of creatures, she can be crafty when she needs to be. When she isn't plotting her next robbery or over-sleeping in her cave upon a cliff, she enjoys gambling and feasting on alcohol and hearty foods.\n\t\n\t\tShe is thirty six years old, but is actually at the peak of her physical prowess. Although she possesses no magical powers or daunting natural weapons, she is adequate in hand-to-hand combat, melee, and long-range.\n\t\t*goto glossary \n\n\t#Hildred the fortune teller   \n\t\tHildred is the soothsayer of Rhys Falls. She is a well-meaning individual, although she can often get flustered and overly excited when things get out of hand. She is quirky and very fast-paced, and often fuels this energy-draining attitude with various concoctions she makes in her home. As well as experimenting with the consumption of exotic plants, she also likes a friendly bet every now and then.\n\n\t\tOne of the oldest people in the area, the fortune teller is sixty one years of age. She is a magician, which is how she possesses her fortune-telling abilities. Her powers include producing images out of thin air, predicting the most likely outcome of an event, and divining secrets about others, although her divinations can be fairly vague. Her strength has waned over the years, but she still practices her craft almost daily.\n\t\t*goto glossary \n\t\n\t#Venefira the witch assassin \n\t\tVenefira is a witch who, along with her siblings, keeps herself fed by killing others for money, usually at the employ of crime lords, and even sometimes demons. She's an acerbic and arrogant individual, and also notoriously stubborn. She enjoys arm wrestling, creating various poisons to use with her weapons, and having feasts to reward herself after a victory.\n\t\n\t\tShe is thirty seven years old, though still full of abrasive energy. The powers granted to her through her sinister pacts with demons are super-human strength and the ability to augment potions and poisons with her own saliva. She is a Vermin.\n\t\t*goto glossary \n\n\t#Hestia the witch assassin \n\t\tHestia is a witch who, along with her siblings, keeps herself fed by killing others for money, usually at the employ of crime lords, and even sometimes demons. She is arrogant and calculating, and rarely ever speaks unless to voice her cynicism. She enjoys playing with fire, and crafting various accelerants that will help her conserve the mana used to create flame.\n\t\n\t\tShe is thirty eight years old, though her constant proximity to flame keeps her skin tough and tanned. Thanks to her sinister dealings with demons, she can breathe noxious fumes as well as shoot blasts of heated air and bolts of fire from her hands. She is a Vermin.\n\t\t*goto glossary \n\n\t*selectable_if (fought) #Illucio\n\t\tIllucio is a warlock who, along with his siblings, keeps himself fed by killing others for money, usually at the employ of crime lords, and even sometimes demons. He is selfish and tends to get bitter if things don't go his way—although thanks to his good looks, they usually do. He takes great pleasure in flirting with women.\n\t\n\t\tHe is twenty nine years old, though his powers give him an eternally youthful appearance. His sinister dealings with demons have given him a seduction magic that allows him to lure people in and then suck the energy from their bodies through their mouths. \n\t\n\t\tHe also has the ability to heal himself and others. His natural form, cursed to be grotesque and monstrous, is kept hidden by a potent illusion-like magic. He is a Vermin.\n\t\t*goto glossary \n\n\t*selectable_if (fought) #Illusia\n\t\tIllusia is a warlock who, along with her siblings, keeps herself fed by killing others for money, usually at the employ of crime lords, and even sometimes demons. She is arrogant, and often uses her stunning appearance and natural charisma to manipulate others. She enjoys getting men to dote on her and treat her with presents in an attempt to gain her favor, though it never actually works for them.\n\t\n\t\tShe is twenty one years old and the picture of vibrance. Her sinister dealings with demons have given her a seduction magic that allows her to lure people in and then suck the energy from their bodies through their mouths. \n\t\n\t\tShe also has the ability to heal herself and others. Her natural form, cursed to be grotesque and monstrous, is kept hidden by a potent illusion-like magic. She is a Vermin.\n\t\t*goto glossary \n\n\t#Lord Sarrivan the vampire\n\t\tLord Sarrivan is a vampire who presides over an ancient tower that his family owned when he was a distinguished noble in life. Since losing his soul he has been cruel and uncaring of others, though distinctly cunning, an expert in both technical combat and strategy. He enjoys experimenting in his laboratory and was also a respected Master of chess.\n\n\t\tHe is an astounding 247 years old, an age only rivaled by other vampires—although they are exceptionally rare—and the demons themselves. Like all others who have sold their souls to the inhabitants of the Netherworld, he possesses immunity to poison, abnormal strength and speed, ethereal wings, and perfect vision in all situations but complete darkness.\n\t\n\t\tAs a side effect of his powers, his home gains magical properties of its own that strengthen over the passage of time. He also has the unique ability to animate stone statues or gargoyles into ferocious, deadly beasts. He is a Cretin.\n\t\t*goto glossary \n\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n\n  Unlock the rest of the game.\n\n  *purchase adfree $3.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.\n\n", "death": "*page_break\nIt appears your journey has ended prematurely. Do you wish to restart completely, or return to the previous checkpoint?\n*choice\n\t#I would like to restart from the very beginning.\n\t\t*restart\n\t#Please take me back to the last checkpoint.\n\t\t*set image cp_image\n\t\t*set no_fortune cp_no_fortune \n\t\t*set compassionate cp_compassionate\n\t\t*set mask cp_mask\n\t\t*set artifact cp_artifact\n\t\t*set altruism cp_altruism\n\t\t*set mad cp_mad \n\t\t*set redeem cp_redeem \n\t\t*set farmer cp_farmer \n\t\t*set serve cp_serve \n\t\t*set jail cp_jail \n\t\t*set die cp_die \n\t\t*set g2 cp_g2 \n\t\t*set g9 cp_g9 \n\t\t*set g5 cp_g5 \n\t\t*set cp_g10 g10\n\t\t*set g15 cp_g15 \n\t\t*set t_goblin cp_t_goblin \n\t\t*set i_goblin cp_i_goblin \n\t\t*set info cp_info\n\t\t*set confine cp_confine \n\t\t*set talk cp_talk \n\t\t*set cp_new cp_new \n\t\t*set cb cp_cb \n\t\t*set pet_hurt cp_pet_hurt \n\t\t*set absolve cp_absolve \n\t\t*set geysers cp_geysers \n\t\t*set potion2 cp_potion2 \n\t\t*set eagle_hide cp_eagle_hide \n\t\t*set witches cp_witches \n\t\t*set traps cp_traps \n\t\t*set vampire cp_vampire \n\t\t*set room1 cp_room1 \n\t\t*set room2 cp_room2 \n\t\t*set treasury cp_treasury \n\t\t*set armory cp_armory \n\t\t*set lab cp_lab \n\t\t*set now cp_now \n\t\t*set later cp_later \n\t\t*set nosalt cp_nosalt \n\t\t*set out cp_out \n\t\t*set free cp_free \n\t\t*set tied cp_tied \n\t\t*set not_done cp_not_done \n\t\t*set original cp_original \n\t\t*set toad cp_toad \n\t\t*set viper cp_viper \n\t\t*set eagle cp_eagle \n\t\t*set hestia_fire cp_hestia_fire \n\t\t*set venefira_fire cp_venefira_fire \n\t\t*set all_fire cp_all_fire \n\t\t*set broken_vials cp_broken_vials \n\t\t*set illusia_1st cp_illusia_1st \n\t\t*set transformations_toad cp_transformations_toad \n\t\t*set transformations_toad cp_transformations_viper \n\t\t*set transformations_eagle cp_transformations_eagle \n\t\t*set venefira cp_venefira \n\t\t*set venefira_viper cp_venefira_viper \n\t\t*set boggart_save cp_boggart_save \n\t\t*set release_tear cp_release_tear \n\t\t*set release_concussion cp_release_concussion \n\t\t*set release_destruction cp_release_destruction \n\t\t*set warlock cp_warlock \n\t\t*set girl cp_girl \n\t\t*set name cp_name \n\t\t*set female cp_female \n\t\t*set male cp_male \n\t\t*set conceal cp_conceal \n\n\t\t*set staff cp_staff \n\t\t*set chain cp_chain\n\t\t*set iron cp_iron \n\t\t*set salt cp_salt\n\t\t*set ointment cp_ointment\n\t\t*set shield cp_shield\n\t\t*set marble cp_marble \n\t\t*set mythril cp_mythril\n\t\t*set accelerant cp_accelerant\n\t\t*set daggers cp_daggers\n\t\t*set charm cp_charm \n\t\t*set amulet cp_amulet \n\t\t*set poison cp_poison \n\t\t*set gauntlets cp_gauntlets \n\t\t*set wind cp_wind \n\t\t*set flame cp_flame \n\t\t*set vines cp_vines \n\t\t*set ice cp_ice \n\t\t*set earth cp_earth \n\t\t*set destruction cp_destruction \n\t\t*set concussion cp_concussion \n\t\t*set tear cp_tear \n\t\t*set darts cp_darts \n\t\t*set charisma cp_charisma \n\t\t*set resolve cp_resolve \n\t\t*set cunning cp_cunning \n\t\t*set relationship cp_relationship \n\t\t*set stealth cp_stealth \n\t\t*set health cp_health \n\t\t*set mana cp_mana \n\t\t*set gold cp_gold \n\t\t*if witches\n\t\t\t*goto_scene witch_fight\n\t\t*if traps\n\t\t\t*goto_scene traps\n\t\t*if vampire\n\t\t\t*goto_scene vampire\n\t\t*bug", "fortune_teller": "*page_break\n\nYou follow the wreckage left by the demon, \n*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t*goto anger\n*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t*goto thought\n*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t*label thought\n\tthoughtful and silent.\n\t*goto si \n*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t*label anger\n\tyour anger growing. \n\t*goto si \n*else \n\t*goto anger \n*label si \nIf only you had been there when he appeared! And why did he choose your village? \n*if relationship > 50\n\tThe only comfort you can find is in ${boggart}. At least your lifelong companion is safe and by your side. A slight smile spreads across your face at the thought of your impish companion as you remember how you initially met your little friend. \n*if relationship \u003c 51 \n\tEven ${boggart}'s familiar presence only reminds you of what you've lost. You sigh. It's been so long since he first came into your life.\nYou recall your first meeting vividly. You had just begun your career as a demon ${hunter} when you caught the little creature stealing from your pantry. \n\nYou were settling down after a long day of moving into your new quarters when you suddenly heard a shuffling noise. It came from the kitchen area, and this struck you as particularly odd since you knew for a fact you were supposed to be alone. Grabbing your staff, you sneaked over to the pantry and swung the door wide. You were immediately confronted by a tiny boggart, hands and mouth stuffed full of your favorite pastries. \n\nPreparing to chase him from the premises, you raised your staff but something about this little thief stopped you. He stared up toward you pleadingly, eyes hollow in an emaciated face. He was starving. \n*fake_choice\n\t#You made a deal with him. As reparation for stealing your food, he would care for your quarters.\n\t\t*set charisma %-5 \n\t\t*set altruism %-5  \n\t\t*set compassionate %-5 \n\t\t*set resolve %+3\n\t\tHe gladly accepted the offer. After all, he'd be getting a new home, as well as acquittal for his minor crimes. At first your relationship was that of a master and servant, but you eventually realized how useful ${boggart} could be and decided to take him on as an apprentice. \n\t\t\n\t\tOnce on a particularly dangerous mission, not unlike the one with the goblin, ${boggart} had even saved your life. Perhaps it wasn't a bad thing at all that this little boggart had been stealing from your pantries.\n\t\t\t\t\t\t\t\t\t\n\t#You had been considering getting someone to train under you, and this seemed like the ideal opportunity.\n\t\t*set resolve %+3\n\t\t*set relationship %+3 \n\t\tAs ${boggart} clearly needed a home, it would work out well for both of you. Soon, you were off together on missions. He was a \n\t\t*if relationship > 50\n\t\t\tfriend,\n\t\t*if relationship \u003c 51\n\t\t\ttrustworthy companion,\n\t\tand once on a particularly dangerous mission, not unlike the one with the goblin, he had even saved your life. \n\t\t\n\t\tYou often think how extremely fortunate you were to have caught this little boggart stuffing his face with pies in your pantry. Your relationship grew over the years, and now you are one another's closest friends.\n\n\t#He was clearly unwell, so you decided you would provide him with a proper home.\n\t\t*set relationship %+3 \n\t\t*set charisma %+3 \n\t\t*set compassionate %+3\n\t\tYou soon became great friends, and later you even took ${boggart} on as your apprentice. On a particularly dangerous mission, not unlike the one with the goblin, he actually saved your life. You often think how extremely fortunate you were to have caught this little boggart stuffing his face with pies in your pantry. Your relationship grew over the years, and now you are all but inseparable.\n\n\n*page_break\n${boggart} is an imp, but he's a shape-shifter as well. When he has enough mana he can change his form. However, he is still relatively small and not very powerful. Boggarts are also capable of detecting dark magic through scent, and they have naturally swift regenerative properties. You've taught ${boggart} to transform into a specific animal useful in your hunting.\n*fake_choice\n\t#He becomes a small toad, secreting poison into a vial that you can use as you see fit. (Requires one mana.)\n\t\t*set transformations_toad true\n\t\t*achieve toad\n\n\t#${boggart} can shift into an electric viper possessed of amazing speed. He can give a powerful jolt through special cells in his skin, and he is sneaky and hard to detect. (Requires two mana.)\n\t\t*set transformations_viper true\n\t\t*achieve viper\n\n\t#His hard work resulted in an eagle. A strong tracker, he will scout ahead and even aid you in battle. (Requires three mana.)\n\t\t*set transformations_eagle true\n\t\t*achieve eagle\n\t\t\nAfter weeks of training, ${boggart} could consistently transform into \n*if transformations_toad\n\ta tiny amphibian.\n*if transformations_viper \n\ta tan serpent.\n*if transformations_eagle\n\ta mighty raptor.\nHis other form is a great asset. However, ${boggart} generally remains as an imp to conserve mana. Plus, he complained that shape-shifting itches…. You're so caught up in your thinking that you hardly notice the woman who steps out in front of you. She abruptly reaches forward and grabs your arm before you can react. Startled, you clutch at your sta
