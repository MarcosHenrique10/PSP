        \n\t*selectable_if (staff) #Sprinting forward, you attack the witch with your staff.\n\t\t*set resolve %+3\n\t\t*set cunning %-5\n\t\tYou reach her in seconds, \n\t\t*if venefira_viper \n\t\t\t*set health -2 \n\t\t\tbut she ducks your first blow and strikes back with surprising speed, her nails covered in bright flames. Just before she reaches you, ${boggart} darts out from your robe, wrapping himself around her ankle and delivering a violent shock. She shrieks in pain and surprise, hardly noticing the snake slithering back up your leg. She reels away as the shock courses through her body. Reaching out as she falls, she manages to grab onto your side with her white-hot nails. \n\t\t\t\n\t\t\t*if (health \u003c 1)\n\t\t\t\t*goto main_death \n\t\t\tYou gasp in pain but pull away sharply, slamming your staff into her temple with an audible crack. She finally falls to the ground, defeated.\n\t\t\t*goto hit_illusia\n\t\t*set health -3\n\t\tbut she deftly ducks, scratching at you with burning nails.\n\t\t*if (health \u003c 1)\n\t\t\t*goto main_death\n\t\tThe pain is intense, but you counterattack quickly and slam your staff into her spindly legs. She falls to the ground, wailing shrilly, and you deliver a sharp kick to her jaw. Her eyes roll back in her head and she slumps over, finally defeated.\n\t\t*goto hit_illusia\n\n\t*selectable_if (darts > 2) #Quickly drawing out your blowpipe, you take aim and fire your poisonous darts.\n\t\t*set darts -3\n\t\t*set stealth %+3\n\t\tThe witch seems unimpressed. She lazily lifts her fingers and spews out a sheet of fire, engulfing the darts. \n\t\t*label savage\n\t\tYou blink in astonishment but swiftly draw your dagger, darting backwards in an attempt to stay out of range of her spells. She merely raises her other hand with a thin-lipped smile, blasting you off your feet with a powerful wave of heated air. \n\t\t\n\t\tYou careen backwards, badly singed, and land heavily on the ground. You have lost your dagger in the fall, and you quickly struggle to your feet \n\t\t*if venefira_viper\n\t\t\t*set health -3\n\t\t\t*set cunning %-5\n\t\t\tas she surges forward with a hand full of flames. Before she can attack, ${boggart} darts out and wraps himself around her arm, delivering a violent electric shock before he vanishes again. The witch shrieks in panic, trembling as the shock courses through her. \n\t\t\t\t\t\t\n\t\t\tYou stoop to retrieve your fallen dagger, turning just as she leaps forward and claws you with her white-hot nails. \n\t\t\t*if (health \u003c 1)\n\t\t\t\t*goto main_death\n\t\t\tThe pain is excruciating but you dodge to one side, slamming the hilt of your dagger into her jaw. Her head snaps back and she collapses to the ground, defeated.\n\t\t\t*goto hit_illusia\n\t\t*set health -4\n\t\t*set cunning %-5\n\t\tbut she leaps onto your chest, savagely tearing at you with her fiery nails. You cry out in pain as your skin sizzles under her flames.\n\t\t*if (health \u003c 1)      \n\t\t\t*goto main_death\n\t\tShe raises her arm to claw you again, but you catch both her wrists and squeeze as hard as you can. Shrieking, she opens a mouth filled with serrated teeth.\n\t\t\n\t\tYou lean backwards, but noxious, orange fumes suddenly spill out of her mouth. You close your mouth and eyes, feeling a strange warmth on your skin, and you struggle to force her to the ground. Without warning, Hestia screams in pain and falls limp into your arms. You shove her off roughly and back away, waiting a few moments before you finally breathe in a welcome gust of fresh air. \n\t\t\n\t\tThe assassin is lying on the ground, unconscious, and ${boggart} stands a few feet away with a triumphant smile on his face. \n\t\t*if relationship > 54 \n\t\t\t\"You've saved my life yet again, ${boggart}; you don't know how grateful I am for that,\" you say warmly. \n\t\t*if relationship \u003c 50 \n\t\t\t\"My thanks,\" you say hurriedly. \n\t\t\t\n\t\t\"Now, we still have one last assassin to deal with!\"\n\t\t*goto hit_illusia  \n\n\t*selectable_if (iron > 0) #A cloud of iron should be able to disable this witch.\n\t\t*set resolve %+3\n\t\t*set iron -1\n\t\tHestia seems unimpressed. She lazily lifts her fingers and blasts away the filings with a wave of heated air.\n\t\t*goto savage\n\n\t#You unravel your silver chain and attempt to bind her.\n\t\t*set resolve %+3\n\t\t*set cunning %+3\n\t\tYou cast the chain through the air, undulant like a serpent, but she almost shrugs, raising both hands and sending out a powerful blast of hot air that makes your robe rustle even at this distance. Your weapon is sent off course, but just as she relaxes the chain whips around and catches her wrists, binding them together. She stares at the silver in disbelief, struggling uselessly. \n\t\t\n\t\tAs you dash forward, she curses, spewing out a cloud of noxious fumes. You hold your breath, running toward her, and quickly bring your foot up in a roundhouse kick aimed at her jaw. She looks almost astonished, and then your blow connects. Her head snaps back and she falls to the ground, finally defeated. As soon as the nasty orange fumes waft away, you bend over her and retrieve your silver chain. \n\t\t*goto hit_illusia\n\n*label hit_hestia\n*choice\n\t*selectable_if (staff) #You attempt to vault over her flames, using just your strength and staff.\n\t\t*set resolve %+3\n\t\t*set cunning %-5\n\t\t*set staff false\n\t\tAs the fiery sphere approaches, you rush forward and plant the tip of your staff into the ground, vaulting high into the air. You completely evade the fire, landing lithely on your feet, but your staff suffers the brunt of the attack. Blackened and weak, it's completely useless now, and you let it fall to the earth.\n\n\t\tYou glance regretfully at your damaged staff, but straighten out to the indignant gaze of the assassin. She comments, \"Bold, but stupid,\" beckoning with a bony finger.\n\t\t*goto fight_hestia\n\n\t#You dive to the side, hoping to avoid the path of her flames.\n\t\t*set stealth %+3 \n\t\tThe fireball flies past you, missing you narrowly and singeing your robe. You roll across the ground before leaping to your feet, eyeing the assassin. She gazes at you indignantly, but comments, \"Not bad….\" as she beckons with a bony finger. \n\t\t*goto fight_hestia\n\n*label loot \n*page_break\n*set amulet true\nHestia, Venefira, and the other one are strewn about the clearing, unmoving and silent. This would be a sensible time to remove their belongings. You crouch down beside the abominable ${witch} and begin searching through \n*if warlock \n\this \n*if girl \n\ther \nrobe, trying to breathe lightly as ${his} fetid odor is almost overwhelming. $!{he} mostly carries useless trinkets, but you also find a peculiar earthy green necklace hanging around \n*if warlock \n\this \n*if girl \n\ther\nneck.\n\nCautiously retrieving it, you examine it carefully but learn nothing of interest. With a shrug, you deposit it around your neck and begin to search the others.\n*set amulet true                                                        \n*if hestia_fire\n\tRummaging through Hestia's robe, you only find useless oddments. Everything else seems to have been destroyed in the fire.\n*if not(hestia_fire)\n\tRummaging through Hestia's robe, you only find useless oddments. \nWith a sigh, you\n*if altruism \u003c 50 \n\thope that Venefira actually has something worthwhile.\n*if altruism > 49\n\tacknowledge that this was to be expected, of course.\n*label search_brute\n*set daggers true\n*set poison true\nQuickly examining Venefira's belongings, you take her sharp daggers and belt, strapping them around your chest. \n*if not(broken_vials)\n\n\tNext, you relieve her of several vials of poison in a case attached to her waist. Hooking them onto your belt, you consider using them with your own knives. However, this may be unwise, as you're unfamiliar with the venom, and don't have any sort of antidote or immunity toward it. Instead, you decide that it's better to use the vials for something else: perhaps as makeshift explosives, as they're surely flammable.\n\t\nHer mace, on the other hand, is enormous. You doubt that you could sell it even if you chose to carry it with you. It's much too large for a normal human to wield in battle, so you decide against it, as it would prove far too cumbersome.\n*finish Continue\n\n*label main_death \nSuccumbing to your injuries, you collapse, weakly crying out for ${boggart}. There is nothing left for you to do…you strain to keep hold of your life, but your vision soon fades into the inescapable, infinite blackness that is your death.\n*finish Continue \n\n\t\t\t\t\t*label beat_venefira\n\t\t\t\t\t*hide_reuse \n\t\t\t\t\t*choice\n\t\t\t\t\t\t*selectable_if (concussion > 0) #You pull out a concussion grenade and remove the pin.\n\t\t\t\t\t\t\t*set resolve %-5\n\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t*set concussion -1\n\t\t\t\t\t\t\tAs the assassin surges forward, you hurtle the grenade. Venefira emits a primal roar, hefting her mace and slamming it into the projectile. It detonates with an ear-ringing bang, and she bellows huskily, staggering backwards drunkenly. You dash toward her, swinging your staff at her skull, and it connects with an audible crack. She groans in pain, toppling to the dirt, unconscious. Tensing, you rush to your companion's aid but it is too late.\n\t\t\t\t\t\t\t*goto 2late\n\n\t\t\t\t\t\t*selectable_if (tear > 0) #You cast a tear gas grenade at the assassin.\n\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t*set tear -1\n\t\t\t\t\t\t\t*set broken_vials true\n\t\t\t\t\t\t\tShe surges forward as you take your grenade from your satchel, activate it, and cast it through the air. Venefira's eyes narrow in concentration as she swings her mace at the projectile, impaling it, only to be engulfed in a churning cloud of tear gas. She releases her weapon and screams in pain, stumbling from the cloud and clutching at her throat, her eyes flooding with tears as blood gushes from her nostrils. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tActivating the daggers on the ends of your staff, you swing your blade across the assassin's legs. She screams again as blood trickles from her injuries. Stumbling forward, she plummets to the ground. You swivel around on your feet to confront her as she crawls to her knees, growling with pain. With the way she's bleeding,  \n\t\t\t\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t\t\t\t*goto curse \n\t\t\t\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t\t\t\t*goto think \n\t\t\t\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t\t\t\t*label think \n\t\t\t\t\t\t\t\tyou're very worried that the demon's curse is going to kill you….\n\t\t\t\t\t\t\t\t*goto thot \n\t\t\t\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t\t\t\t*label curse \n\t\t\t\t\t\t\t\tyou think you sense a problem in the making, in the form of that demon's curse.\n\t\t\t\t\t\t\t\t*goto thot \n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*goto curse \n\t\t\t\t\t\t\t*label thot \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou bring your staff whistling toward her head, preparing to knock her unconscious, but suddenly she detaches a belt from her chest that's holstering several vials of venom, and whips it down at your waist. You twist quickly to the side, slashing the belt with your blade. The vials hurtle past you, shattering in the dirt. You recover quickly, striding forward, and swing your staff into her skull with an audible crack. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tShe finally collapses, unconscious, to the ground. You turn, rushing to your companion's aid, but it's nearly too late! \n\t\t\t\t\t\t\t*goto 2late\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t*selectable_if (staff) #Rushing forward, you engage her in direct combat with your staff.\n\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t*set staff false\n\t\t\t\t\t\t\t*set health -2\n\t\t\t\t\t\t\tShe surges to meet you as you activate the daggers on both ends of your staff. Venefira's eyes light up malevolently as she swings her mace to block your coming attack.\n\t\t\t\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t\t\t\t*goto roll\n\t\t\t\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t\t\t\t*goto roll \n\t\t\t\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t\t\t\t*label shudder \n\t\t\t\t\t\t\t\tYou watch in shock as your staff shatters, destroyed by the heavy mace, and her blow forces you to the ground with splinters raining down on all sides. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tShielding your eyes uselessly, you barely dodge her mace's spikes as she aims for your chest. The ground shudders as the weapon strikes, and you quickly clamber to your feet.\n\t\t\t\t\t\t\t\t*goto rolls \n\t\t\t\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t\t\t\t*label roll \n\t\t\t\t\t\t\t\tYou drop into a roll, cursing, as your staff cracks and splits into useless pieces. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tHer mace hits the ground beside you, the tremendous thud echoing. You manage to breach the cloud of debris as it rains down around you and stand to your feet, drawing the dagger from your belt. \n\t\t\t\t\t\t\t\t*goto rolls \n\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t*goto roll \n\t\t\t\t\t\t\t*label rolls \n\t\t\t\t\t\t\tWhen the dirt finally dissipates, you quickly toss a throwing knife but the brutish witch merely cackles mirthlessly. \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tShe leisurely deflects your blade in a shower of sparks. You sigh in exasperation as the assailant guffaws at your failed attempt. She charges forward, calling out, \"Bite off more than you can chew, bounty ${hunter}? You're pathetic. I don't even need my siblings' help. I can destroy you myself!\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"You'll pay for that, witch!\" you shout, suddenly frustrated.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tShe just guffaws, \"Ah, the pretty little demon ${hunter} is mad, is ${he}? Well, try this on for size!\"\n\t\t\t\t\t\t\t*goto beat_venefira\n\n\t\t\t\t\t\t#You run forward, reaching for your silver chain to bind the witch.\n\t\t\t\t\t\t\t*label mace_chain\n\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t*set cunning %+3\n\n\t\t\t\t\t\t\tCasting your chain through the air, undulant like a serpent, you see panic flickering in the witch's beady eyes. She surges forward with an astounding burst of energy, swinging her mace into the chain. \n\n\t\t\t\t\t\t\tSparks leap into the air as the metals collide, and the loops of the chain travel up the mace and onto Venefira's arms, effectively paralyzing them. She bellows in anger and struggles against the chain, though her attempts to free herself are futile.\n                                                                \n\t\t\t\t\t\t\tYou stride forward to confront her head-on as she barrels toward you, hoping to trample you down. You quickly sidestep and draw your dagger from your belt, clubbing the handle across her head and sending her crumpling unconscious to the ground.\n\t\t\t\t\t\t\t*if venefira_viper\n\t\t\t\t\t\t\t\tTurning away, you quickly retrieve your chain. \n\t\t\t\t\t\t\t\t*goto face_hestia\n\t\t\t\t\t\t\t*if eagle_hide\n\t\t\t\t\t\t\t\t*goto face_hestia\n\t\t\t\t\t\t\t*if cb\n\t\t\t\t\t\t\t\tRushing over to her unconscious body, you quickly retrieve your silver chain.\n\t\t\t\t\t\t\t\t*goto see_boggart\n\n\t\t\t\t\t\t\tYou quickly retrieve your silver chain before rushing to ${boggart}'s aid. Just as Hestia prepares to ignite your fallen boggart, face tense in concentration, you swing your staff toward her, but she seems to sense something and ducks.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe blow grazes her temple, and she shrieks and collapses. You grip your staff tightly as she crawls weakly to her feet, glaring malevolently.\n\t\t\t\t\t\t\t*goto beat_hestia2 \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t*selectable_if (darts > 2) #Shoot her with your poisonous darts.\n\t\t\t\t\t\t\t*label mace_darts \n\t\t\t\t\t\t\t*set darts -3\n\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t*set resolve %+3 \n\t\t\t\t\t\t\t*set health -3\n\t\t\t\t\t\t\tAs she comes within range, you retrieve your reed blowpipe and press it to your mouth, firing three darts in quick succession. She barrels forward undaunted and slams her mace into the ground, sending a cloud of debris into the air and obscuring your vision.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tWithout being able to see, you miss with all three of your darts. You tense yourself for her counterattack, and the witch dashes forward, hefting her mace high above her head.\n\n\t\t\t\t\t\t\tAs she swings her mace toward your skull, you duck swiftly and slash your staff's blade across her chest. She gasps in agony and stumbles forward. Biting through the pain, she darts forward, arm outstretched, catching your neck and dropping you to the ground in a classic clothesline maneuver. \n\n\t\t\t\t\t\t\tYour head snaps back violently, and you feel your teeth tear into your cheek as you slam into the cracked earth. Struggling to regain your breath, you taste the distinctive iron flavor of blood as you stagger to your feet. \n                                                                \n\t\t\t\t\t\t\tYou grip your staff tightly in your hands as she whips back around to face you, blood soaking her bulky torso and her face contorted with an expression of defiance and anger. \"I won't perish by the hands of some puny maggot like you!\" she screams as she surges forward, clearly slowed by her injuries.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Temper, temper, Venefira!\" you say, sidestepping deftly.\n\n\t\t\t\t\t\t\tShe swings her mace toward your face once again and you twist backwards as it whizzes past your face. The spikes catch your forehead, tearing at your skin and sending blood into your eyes. You gasp and rub at the sticky substance with one arm as you step forward, stabbing your blade into her fighting arm. The witch emits a husky growl of pain and releases her weapon, staggering back as blood dampens her robe. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tGathering herself together, she roars furiously and charges forward. You dive to the side, bringing your staff around and toward her neck. The blow connects but she charges forward undeterred and sends you skidding across the dirt. You leap to your feet to see her clutching her throat. She utters a strangled shriek as the chemicals instilled inside your staff seize her neck muscles. \n\n\t\t\t\t\t\t\tShe descends to her knees, weakened by her injuries, and gazes up at you with a pleading look as you approach. Suddenly, she lunges forward, baring her greenish teeth. You adroitly step out of reach, slamming your staff into her skull with an audible crack, and she crumples to the ground, unconscious. You rush toward your fallen boggart, gripping your staff tightly, but to no avail….\n\t\t\t\t\t\t\t*goto 2late\n\n\t\t\t\t\t\t*selectable_if (iron > 0) #Your iron should slow this witch down.\n\t\t\t\t\t\t\t*set iron -1\n\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t*set health -6\n\t\t\t\t\t\t\tThe witch's eyes widen as you toss a handful of iron, but before it reaches her, she leaps an astounding distance into the air, almost completely avoiding your attack. A few filings catch at her ankles and she bellows huskily, descending toward you with a vengeful expression. She raises her mace and swings it through the air. You duck swiftly but feel a searing pain.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe spikes have grazed your head, and you fall to your knees, dazed and bloody. Steadying yourself on your staff, you look up as she towers above you, her silhouette casting an impossibly long shadow. She smiles humorlessly and hefts her mace high above her head, but she suddenly staggers, gasping in pain from her injuries. You take your opportunity and plunge your staff forward, activating the daggers on the ends of your weapon. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tVenefira regains her composure and blocks your attack with the shaft of her mace, diverting the weapon from her chest but causing the blade itself to graze her ribs, the shaft gliding across her exposed skin. She shrieks in pain, clutching her side as the muscles seize. She drops her mace and crumples to her knees, lurching sideways. You quickly leap to your feet and swing your staff at her head. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tShe growls and raises her arms, intercepting your staff, but she only receives another dose of your poison for her trouble. Seething, she leans backwards and slams her steel-rimmed boots into your stomach. Your eyes bulge and you fall backwards, skidding painfully across the soil. You shudder to a stop, barely holding onto your staff, and climb gingerly to your feet. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tGasping, you look up to see Venefira convulsing sporadically on the ground, clearly out of commission. You rush forward to ${boggart}'s side, but to no avail….\n\t\t\t\t\t\t\t*label 2late\n\n\t\t\t\t\t\t\tHestia has released the sphere of fire toward your apprentice, covering the ground where he had just lain in smoldering debris. \n\t\t\t\t\t\t\t*if relationship \u003c 50 \n\t\t\t\t\t\t\t\tYou almost feel guilty,\n\t\t\t\t\t\t\t*if relationship > 49 \n\t\t\t\t\t\t\t\tYour stomach jumps into your throat and you feel tears beginning to flood your stinging eyes, \n\t\t\t\t\t\t\twhen ${boggart} suddenly shoots from the cloud of smoke, careens through the air and rolls across the dirt. He is badly wounded, but alive! \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou feel a rush of adrenaline and charge forward, swinging your staff at the unwary assassin as she cackles gleefully at your fallen companion. Slamming your staff into Hestia's frail jaw with a grunt of exertion, you gash her cheek against her teeth. She screams in agony and topples to the ground, hands covering her bloody, swollen mouth.\n\t\t\t\t\t\t\t*label beat_hestia2\n\t\t\t\t\t\t\t*choice \n\t\t\t\t\t\t\t\t*selectable_if (darts > 2) #Aiming carefully, you shoot your poisonous darts at the witch.\n\t\t\t\t\t\t\t\t\t*set darts -3\n\t\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\t\t*set health -5\n\t\t\t\t\t\t\t\t\tHestia merely shakes her head and lifts her fingers, spewing out a sheet of fire that devours all three of your darts. You blink, startled, but swiftly draw your dagger, sprinting forward to engage her. Impassive as ever, Hestia raises her other hand lazily and blasts you off your feet with a powerful wave of heated air. \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou're forced backwards, skin burned and hair badly singed, and you land heavily onto the ground. \n\t\t\t\t\t\t\t\t\t*label failed_hestia\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou struggle to your feet, gasping, only to have her leap onto your chest, knocking you back to the dirt. She claws at you savagely with her elongated, jagged nails dancing with crimson fire. \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou grit your teeth at the white-hot pain, but as she goes for another round you catch her wrists in your hands, squeezing hard. She screams as her frail, thin wrists bruise under the pressure, but even so, she leans down into your face and opens her mouth to expose long, serrated teeth. You attempt to escape, but you are pinned underneath and vulnerable. \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tPutrid orange fumes begin to spill out of her maw and you close your eyes and mouth in order to keep the detrimental effects at bay. You know it's only a matter of time before you are forced to breathe the noxious gases. You pull the assassin forward and ram your skull into hers with a thud. She screams in pain and you kick her from your body, sending her tumbling across the dirt behind you. \n\n\t\t\t\t\t\t\t\t\tYou rise, slightly dizzy, and retrieve your staff. She moans weakly on the ground and attempts to crawl to her feet, but you quickly slam your staff into her jaw, knocking her unconscious. Wasting no time, you rush to your apprentice's side. \n\t\t\t\t\t\t\t\t\t*if relationship \u003c 50 \n\t\t\t\t\t\t\t\t\t\tIt looks like he's still alive.\n\t\t\t\t\t\t\t\t\t*if relationship > 49 \n\t\t\t\t\t\t\t\t\t\tBreathing a sigh of relief, you feel a weight lift from your shoulders as you see that he is still alive. You consider tending to his wounds, but you still have one last enemy left.\n\t\t\t\t\t\t\t\t\t*goto hit_illusia\n\n\t\t\t\t\t\t\t\t*selectable_if (staff) #You engage her in direct combat with your staff.\n\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t*set health -3\n\t\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\t\tYou activate the daggers on both ends of your staff and plunge your blade forward, but Hestia quickly ignites her jagged nails, slashing at your staff and pushing it to one side. Narrowing her eyes, she swiftly advances, raised hands glimmering with flames. As she rakes her hands toward your face, you dodge and block her attacks but she is equally careful to avoid your blows.\n\n\t\t\t\t\t\t\t\t\tShe keeps you on your toes as you dance around in circles, parrying and blocking each other's attacks \n\t\t\t\t\t\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t\t\t\t\t\t*goto comment \n\t\t\t\t\t\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t\t\t\t\t\t*goto frustrate \n\t\t\t\t\t\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t\t\t\t\t\t*label comment \n\t\t\t\t\t\t\t\t\t\t. You say, \"You're a surprisingly good fighter. Where did you learn this?\" trying to distract her.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tThe assassin gives you a cold grin, but doesn't take the bait.\n\t\t\t\t\t\t\t\t\t\t*goto cot \n\t\t\t\t\t\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t\t\t\t\t\t*label frustrate \n\t\t\t\t\t\t\t\t\t\t, much to your frustration. \n\t\t\t\t\t\t\t\t\t\t*goto cot \n\t\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t\t*goto comment \n\t\t\t\t\t\t\t\t\t*label cot \n\n\t\t\t\t\t\t\t\t\tYou realize she is beginning to tire. She steps back just as you bring your staff crashing down toward her skull. She raises her arms to block, and your staff falls on them with a thud. Crying out in pain, she clutches her frail arm, then screams as the poisons take effect. You stride forward, preparing to strike her down, when her opposite hand suddenly darts upward.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tHer nails rake painfully across your face, warm blood trickling down your cheek. Swinging your weapon through the air, you slam your staff into her skull, sending her crumpling to the ground unconscious. Wasting no time, you rush to your apprentice's side. \n\t\t\t\t\t\t\t\t\t*if relationship \u003c 50 \n\t\t\t\t\t\t\t\t\t\tIt looks like he's still alive.\n\t\t\t\t\t\t\t\t\t*if relationship > 49 \n\t\t\t\t\t\t\t\t\t\tBreathing a sigh of relief, you feel a weight lift from your shoulders as you see that he is still alive. You consider tending to his wounds, but you still have one last enemy left.\n\t\t\t\t\t\t\t\t\t*goto hit_illusia\n\n\t\t\t\t\t\t\t\t*selectable_if (iron > 0) #Reaching into your pocket, you release a billowing cloud of iron.\n\t\t\t\t\t\t\t\t\t*set iron -1\n\t\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t*set health -5 \n\t\t\t\t\t\t\t\t\tShe tenses at the sight of the lethal metal, but then she narrows her eyes and emits a powerful wave of heated air from her raised hands. It buffets the shavings back into your face, and the pressure of the air sends you flying backwards, burning your skin and hair. You skid painfully across the ground before shuddering to a halt, your dagger flying from your grasp.\n\t\t\t\t\t\t\t\t\t*goto failed_hestia\n                                                                \n\t\t\t\t\t\t\t\t#Releasing your silver chain, you prepare to bind the witch.\n\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t*set health -1  \n\t\t\t\t\t\t\t\t\tShe starts to raise a sphere of fire but you flick your wrist, casting the chain through the air. It wraps around her wrists, and the spell in her hand vanishes with a puff as the chain tightens. She emits a shrill scream but quiets when you yank the chain's end firmly.\n\n\t\t\t\t\t\t\t\t\tYou grip your staff tightly in your hands and stride forward, but putrid orange gases suddenly begin to escape from the gaps between the witch's serrated teeth, threatening to envelope ${boggart}'s prone body. You swiftly draw the dagger from your belt and hurl it at her, burying the blade into her shoulder. She crumples over to one side and collapses, defeated.\n\n\t\t\t\t\t\t\t\t\tThe gases quickly dissipate in the wind, though the tendrils leave a stinging sensation in your eyes and throat. Wheezing slightly, you turn to your apprentice's side.\n\t\t\t\t\t\t\t\t\t*if relationship \u003c 50 \n\t\t\t\t\t\t\t\t\t\tIt looks like he's still alive.\n\t\t\t\t\t\t\t\t\t*if relationship > 49 \n\t\t\t\t\t\t\t\t\t\tBreathing a sigh of relief, you feel a weight lift from your shoulders as you see that he is still alive.\n\t\t\t\t\t\t\t\t\t*if relationship > 54 \n\t\t\t\t\t\t\t\t\t\tYou consider tending to his wounds, but you still have one last enemy left.\n\t\t\t\t\t\t\t\t\t*goto hit_illusia\n\n\t\t\t\t\t\t\t\t*selectable_if (destruction=1) #You'll take her down with your destruction grenade.\n\t\t\t\t\t\t\t\t\t*set stealth %-5\n\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t*set destruction -1\n\t\t\t\t\t\t\t\t\tAs she raises her hands, encased in red fire, you draw your grenade from your satchel and activate it, casting it through the air as you race backwards and dive behind an ancient tree. Hestia's eyes narrow, panicked, and she pivots on her feet to dash away, but to no avail. \n                                                                                \n\t\t\t\t\t\t\t\t\tThe grenade detonates in a cloud of smoke tinged with orange and yellow fire, and from within the cloud bursts a wave of flame, illuminating the scene in a brilliant light as something within the explosion ignites. The force splinters nearby trees and sends branches and chunks of rock into the air.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou crouch behind your tree, arms raised and covering your head. Creeping out from behind your tree, you shield your eyes as embers swirl around you. As the smoke clears, you see Hestia lying in the dirt, unconscious and bleeding from the force of the explosion. \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tHowever, she is still breathing and seems to have suffered no ill effects from the fire. Turning away from her, you rush to your apprentice's side.\n\t\t\t\t\t\t\t\t\t*if relationship \u003c 50 \n\t\t\t\t\t\t\t\t\t\tIt looks like he's still alive.\n\t\t\t\t\t\t\t\t\t*if relationship > 49 \n\t\t\t\t\t\t\t\t\t\tBreathing a sigh of relief, you feel a weight lift from your shoulders as you see that he is still alive.\n\t\t\t\t\t\t\t\t\t*if relationship > 54 \n\t\t\t\t\t\t\t\t\t\tYou consider tending to his wounds, but you still have one last enemy left.\n\t\t\t\t\t\t\t\t\t*goto hit_illusia\n\n\t\t\t\t\t\t\t\t*selectable_if (concussion > 0) #A concussion grenade will stop her in her tracks.\n\t\t\t\t\t\t\t\t\t*set concussion -1\n\t\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t*set health -3\n\t\t\t\t\t\t\t\t\tAs she ignites her jagged nails, you cast the grenade through the air. It detonates with an ear-ringing bang and she staggers backward, shrieking and unsteady. You rush forward, brandishing your staff, but she raises her arms and emits a powerful blast of heated air.\n\n\t\t\t\t\t\t\t\t\tYou are forced backwards, skin blistering, and for a moment you both stand, tottering. She conjures a sheet of fire around herself with a sweeping motion of one arm, and you back away from the flames and use the tip of your staff to attack, dagger extended. \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYour skin blisters slightly, but you drive your blade into her shoulder and her hands drop, extinguishing the flame. The assailant screams in horror and staggers away, blood staining her dress. \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou slam your staff into her temple and she crumples, falling unconscious to the ground. Turning away, you rush to your apprentice's side.\n\t\t\t\t\t\t\t\t\t*if relationship \u003c 50 \n\t\t\t\t\t\t\t\t\t\tIt looks like he's still alive.\n\t\t\t\t\t\t\t\t\t*if relationship > 49 \n\t\t\t\t\t\t\t\t\t\tBreathing a sigh of relief, you feel a weight lift from your shoulders as you see that he is still alive.\n\t\t\t\t\t\t\t\t\t*if relationship > 54 \n\t\t\t\t\t\t\t\t\t\tYou consider tending to his wounds, but you still have one last enemy left.\n\t\t\t\t\t\t\t\t\t*goto hit_illusia\n\n\t\t\t\t\t\t\t\t*selectable_if (tear > 0) #You cast a tear gas grenade at the assassin.\n\t\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\t\t*set health -6\n\t\t\t\t\t\t\t\t\t*set tear -1\n\t\t\t\t\t\t\t\t\tAs she summons a spinning tower of flame, you hurtle your grenade toward her head. She casually waves one hand, emitting a powerful blast of heated air that projects your grenade right back at you! It detonates, engulfing you in vibrant red tear gas. You gasp in surprise and hold your breath as waves of scorching fumes pound at your eyes. Your throat is burning, and your nostrils drip blood.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou stagger forward to escape the cloud but collide heavily with Hestia's oncoming kick. You topple to the ground, your eyes flooding with tears. Hestia stands above you, almost perfectly still except for the sphere of crimson fire manifesting in her slender hand. You barely managed to hang onto your staff, and swing it into her leg, sending her toppling to the side. \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou twist away as the spell collides with a patch of starved soil beside you, sending embers flying. The corner of your robe ignites and you roll across the dirt, quickly extinguishing the fire but leaving a few minor burns on your leg. Rising, you see Hestia thrashing on the ground, the vicious cramps in her legs crippling her. Crying out in pain, she raises a glowing hand but you crack her skull with your staff. \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tShe collapses to the ground, and lies motionless. Wasting no time, you rush to your apprentice's side. \n\t\t\t\t\t\t\t\t\t*if relationship \u003c 50 \n\t\t\t\t\t\t\t\t\t\tIt looks like he's still alive.\n\t\t\t\t\t\t\t\t\t*if relationship > 49 \n\t\t\t\t\t\t\t\t\t\tBreathing a sigh of relief, you feel a weight lift from your shoulders as you see that he is still alive. You consider tending to his wounds, but you still have one last enemy left.\n\t\t\t\t\t\t\t\t\t*goto hit_illusia\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t*label see_what_they_do\n\t\t\t\t\t*hide_reuse\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#You reach toward your waist, loosing your silver chain to bind the assassin.\n\t\t\t\t\t\t\t*goto venefira_chain \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t*selectable_if (darts > 2) #You try to shoot her with your poisonous darts.\n\t\t\t\t\t\t\t*goto venefira_darts\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t*selectable_if (iron > 0) #You draw a handful of iron out of your pocket, preparing to release it on the assassin.\n\t\t\t\t\t\t\t*label failed_iron\n\t\t\t\t\t\t\t*set iron -1\n\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t*label venefira_viper_iron\n\n\t\t\t\t\t\t\tAs the witch hurtles forward, you fling the iron in a grey cloud, but she merely gives you a knowing smile. Leaping an astounding distance into the air, she completely evades your attack, the filings fluttering harmlessly to the ground. Now the witch is plummeting toward you, brandishing her daggers menacingly. You raise your staff in defense. She strikes down with tremendous force, bowing your staff and sending splinters flying as the blades cut deep grooves into the wood. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tHer weight and strength force you into the ground and you squint, vainly trying to protect your eyes from the splinters of your staff. You try with all your might to resist but she is terribly strong. She pushes you down and cackles mockingly. She lifts one arm, holding a blade, \n\t\t\t\t\t\t\t*if venefira_viper \n\t\t\t\t\t\t\t\t*set health -2\n\t\t\t\t\t\t\t\tbut ${boggart} suddenly darts from your robe, a blur of motion, and wraps himself around her, an electric shock pulsing through his body. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tVenefira reels away in surprise as she is electrocuted, her slackened hands dropping the weapons as she grunts in pain. Taking the opportunity, you leap onto your feet as the assassin staggers to hers, ramming your staff into her jaw. She bellows as her cheek tears against her teeth and she loses her balance, toppling to the ground yet again. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tRushing forward, you prepare to strike her down when she leaps deftly to her feet, slamming her fist into your chest with a thud. The wind is pummeled from your lungs as you fly through the air, skidding painfully across the ground. You crawl to your feet, having somehow kept ahold of your staff, and rush forward with your blade extended. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tThe blade perforates Venefira's shoulder. She yells, clutching the injury, before collapsing to the ground, unconscious. \n\t\t\t\t\t\t\t\t*goto face_hestia\n\t\t\t\t\t\t\t*set health -3\n\t\t\t\t\t\t\tand pins you down with her knee, unaware of the chemicals on your staff. As she swings her blade toward your neck, her leg suddenly convulses and the muscles go rigid.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tShe cries out, stumbling to one side. You shove with all your might, pushing her off your body. Darting to one side, you swivel to confront her. The cramps drive her to one knee and you take your opening and attack.\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t*selectable_if (staff) #Quickly, you strike her down with your staff. \n\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t*set broken_vials true\n\t\t\t\t\t\t\t\t\tYou swing your staff down to collide with the witch's vulnerable neck. She forces herself to stand and brings her mace to bear, parrying your blow. She then moves back for a second swing and you dodge, narrowly evading the full blow. The spikes still lacerate your shoulder and blood drips down your leading hand. She chuckles maliciously as she hefts her mace for the finishing blow. \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou tense, bringing your staff whistling down onto her arm. Stumbling backwards, she trips over the rough terrain and drops her mace, dizzy from her injuries. You stride forward, gripping your staff tightly, when the witch suddenly unravels a belt equipped with several vials of poison and whips it down toward your body. \n\n\t\t\t\t\t\t\t\t\tYou twist quickly to the side, slashing the belt with your blade. The vials hurtle past you, shattering on the dirt. You recover quickly, striding forward, and swing your staff into her skull with an audible crack. She finally collapses, unconscious, to the ground.\n\t\t\t\t\t\t\t\t\t*if venefira\n\t\t\t\t\t\t\t\t\t\t*label only1witch \n\t\t\t\t\t\t\t\t\t*goto face_hestia \n\n\t\t\t\t\t\t\t\t*selectable_if (darts > 1) #You draw out your blowpipe and prepare to shoot the assassin with your darts.\n\t\t\t\t\t\t\t\t\t*label venefira_darts \n\t\t\t\t\t\t\t\t\t*set darts -2\n\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\tPressing the pipe to your mouth, you quickly send two darts flying toward the assassin. Her eyes narrow in concentration and she hefts her mace, swinging it through the air to deflect the initial dart. The second, however, passes her defenses and buries itself lightly into her broad forehead. She emits a surprised, \"Oh…! You runt, I'll cut off your—\" and crumples face first onto the dirt, unconscious.\n\n\t\t\t\t\t\t\t\t\t*if venefira\n\t\t\t\t\t\t\t\t\t\t*goto loot\n\t\t\t\t\t\t\t\t\t*goto face_hestia \n\n\t\t\t\t\t\t\t\t*selectable_if (destruction=1) #Moving quickly, you cast a destruction grenade at the assassin. \n\t\t\t\t\t\t\t\t\t*label absolve\n\t\t\t\t\t\t\t\t\t*set cunning %- 20\n\t\t\t\t\t\t\t\t\t*set health 0\n\n\t\t\t\t\t\t\t\t\tAs she surges forward, you toss the grenade. Venefira's eyes narrow in concentration and she dives to the side, but the grenade detonates, engulfing her in a cloud of vibrant flame, black smoke, and raw power. Suddenly, something within the fire ignites, only adding to the blaze.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*label bolt \n\t\t\t\t\t\t\t\t\tYour stomach jumps into your throat as a bolt of black energy soars out from the smoldering debris, shooting into your chest. You feel a ripping pain like never before as the curse destroys you from the inside. Your ribs buckle and your organs seem to implode on themselves.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou open your mouth, blinded by the excruciating pain, but nothing but blood comes out. Collapsing to the dirt, you struggle futilely as the strength ebbs from your body. You're dimly aware of your apprentice fluttering over, tears spilling down his cheeks as he screams your name, but the only thing you can hope for now is the end.\n\t\t\t\t\t\t\t\t\t*goto_scene death \n\n\t\t\t\t\t\t\t\t*selectable_if (concussion > 0) #A concussion grenade should do just enough damage to take this witch out of the battle.\n\t\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t\t*set health -2\n\t\t\t\t\t\t\t\t\t*set concussion -1\n\t\t\t\t\t\t\t\t\tYou cast the armed grenade through the air. Venefira lets out a wordless roar that sends shivers up your spine. She hefts her mace, batting at the grenade, which detonates with an ear-ringing bang. She staggers backward, dazed, as you quickly cover the distance between you. Swinging your staff, you strike her skull with an audible crack. \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tThanks to the grenade, she's off balance and unable to avoid your blow. She collapses to her knees, blood flowing from her temple. As you raise your staff, she suddenly swings her mace toward your chest. You leap backward, but the mace grazes your shoulder, spilling blood down your arm. \n\t\t\t\t\t\t\t\t\t*if (charisma > 52)\n\t\t\t\t\t\t\t\t\t\t[i]Sigh.[/i] You can't even remember how many robes you've had to replace.\n\t\t\t\t\t\t\t\t\tYou gasp in pain but quickly counterattack, slamming your weapon into her neck and sending her unconscious to the ground. \n\t\t\t\t\t\t\t\t\t*if venefira\n\t\t\t\t\t\t\t\t\t\t*goto loot\n\t\t\t\t\t\t\t\t\t*goto face_hestia\n\n\t\t\t\t\t\t\t\t*selectable_if (tear > 0) #A tear gas grenade would make a good distraction!\n\t\t\t\t\t\t\t\t\t*set tear -1\n\t\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t\t*set broken_vials true\n\t\t\t\t\t\t\t\t\tYou activate your weapon and then hurtle it through the air. The assassin emits a spine-tingling roar as your tear gas grenade flies toward her. She hefts her mace and slams it into the grenade, only to be engulfed in a churning cloud of tear gas. Shrieking in pain, you hear a clunk as she inadvertently drops her weapon. \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou stand with your staff raised, daggers extended, until she staggers out of the cloud, bleeding from her nostrils and clutching her burning throat. You are on her before she can move, your blade cutting deeply into her thigh. She grits her teeth and growls at you, staggering as she tries to approach you. Bringing your staff to bear, you are taken by surprise as she moves like lightning, detaching a belt of poison vials from around her waist and whipping it toward you. \n\n\t\t\t\t\t\t\t\t\tYou twist quickly to the side, slashing the belt with your blade. The vials hurtle past you, shattering on the dirt. You recover quickly, striding forward, and swing your staff into her skull with an audible crack. She finally collapses, unconscious, to the ground.\n\t\t\t\t\t\t\t\t\t*if venefira\n\t\t\t\t\t\t\t\t\t\t*goto loot\n\t\t\t\t\t\t\t\t\t*goto face_hestia \n                                                                                \n\t\t\t\t\t\t\t\t#Moving quickly, you try to bind her with your silver chain.\n\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\tAs she attempts to stand, you unravel the chain from around your waist and project it toward the assassin, undulating like a serpent. Her eyes contract in panic and she dives frantically to the side, but to no avail. The chain wraps around her body, binding her tightly, and she plummets to the ground, immobile and ensnared. You stride forward, activating the daggers on the ends of your staff. \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tThe witch's eyes dart back and forward, and veins bulge on her face as she fights the paralytic effects of your chain. Swinging your staff down toward her skull, you connect with a crack and knock her unconscious. Kneeling down beside your fallen opponent, you quickly retrieve your chain.\n\t\t\t\t\t\t\t\t\t*if venefira\n\t\t\t\t\t\t\t\t\t\t*goto loot\n\t\t\t\t\t\t\t\t\t*goto face_hestia \n\n\t\t\t\t\t\t\t\t*selectable_if (iron > 0) #A cloud of iron should defeat this assassin.\n\t\t\t\t\t\t\t\t\t*set iron -1\n\t\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t*set health -2\n\t\t\t\t\t\t\t\t\tAs Venefira thrashes on the ground, her legs cramping painfully, you swiftly reach into your pocket for your iron. You flick your wrist and engulf her in a cloud of shavings. The witch roars in agony as the iron burns her, exposing the flesh beneath. You activate the daggers on both ends of your staff and stride forward. She climbs weakly to her feet, gasping in agony, but you swing your staff toward her skull to finish her off. \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tWith surprising strength, she brings her arm up and knocks your staff to the side. Lurching forward, she slams a huge fist into your mouth. Your jaw snaps backwards and you taste blood, stumbling back from the force of her blow. Her muscles begin to cramp from the chemicals in your staff, and you stride forward and bring your weapon down onto her temple, dropping her unconscious to the ground. \n\t\t\t\t\t\t\t\t\t*if venefira\n\t\t\t\t\t\t\t\t\t\t*goto loot\n\t\t\t\t\t\t\t\t\t*goto face_hestia \n                \n\t\t\t\t\t\t*selectable_if (staff) #You stand your ground, planning to engage the assassin in direct combat with your staff.\n\t\t\t\t\t\t\t*label venefira_staff\n\t\t\t\t\t\t\t*set health -4\n\t\t\t\t\t\t\t*set cunning %-5 \n\t\t\t\t\t\t\t*set resolve %+3\n\n\t\t\t\t\t\t\tAs she approaches, you release the daggers in your staff and slam it down onto the witch's shoulder. She parries your staff with a swipe of her blade, leaning forward into the blow. You struggle to free yourself as she continues to force your staff downward, but her physical strength is far too powerful to overcome. Her other hand streaks forward with a knife, the blade moving in a jagged blur toward your exposed neck. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou duck without a second to spare. You can feel the wind from her blow pulling at you as severed hair scatters through the air above you. A split second later, she knees you in the face. You reel backwards, blood pouring from your nose. Staggering, you dodge to one side as she presses forward, knives flashing.\n\t\t\t\t\t\t\t*goto choices_choices \n\t\t\t\t\t\t\t\t\t*label choices_choices \n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t*selectable_if (concussion > 0) #You pull out your stun grenade.\n\t\t\t\t\t\t\t\t\t\t\t*set concussion -1\n\t\t\t\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\t\tIt seems like this witch can stop anything—well, anything she can reach. Retrieving your grenade, you pull the pin and toss the weapon. The mercenary's eyes narrow in concentration as she runs toward you, raising her knife to deflect your grenade. But before it reaches her, it detonates with an ear-ringing bang. She staggers backward, grunting huskily as she hits the dirt. \n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tYou rush forward and activate your staff's daggers. As she struggles to her feet, you have already reached her and you slam your staff into her exposed calves. She shrieks in agony as the chemicals set to work and collapses to the dirt yet again, her muscles contorted and stiff. As she thrashes on the ground, you silence her with a quick blow from your staff, striking her jaw and knocking her unconscious. \n\t\t\t\t\t\t\t\t\t\t\t*if venefira\n\t\t\t\t\t\t\t\t\t\t\t\t*goto loot\n\t\t\t\t\t\t\t\t\t\t\t*goto face_hestia \n\n\t\t\t\t\t\t\t\t\t\t*selectable_if (tear > 0) #You'll smoke out this assassin with a tear gas grenade.\n\t\t\t\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t\t\t\t*set tear -1\n\t\t\t\t\t\t\t\t\t\t\t*set health -3\n\t\t\t\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t\t\t\tIt seems like this witch can stop anything—well, anything she can reach. You retrieve your grenade from your satchel, activate it and cast it through the air toward the assailant. She narrows her eyes in concentration. Running toward you, she raises her knife to deflect your grenade. It suddenly detonates, engulfing her in a churning cloud of tear gas. \n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tAs she shrieks in anger, dropping her weapon to hold her burning throat, you take her off-guard and bring your staff down toward her skull. She ducks but you still land a glancing blow. Twisting, she springs forward and lands a double roundhouse kick to your back. You catch yourself with your staff, barely managing to avoid a fall, and you both turn, battered and bleeding, to face each other again.\n\n\t\t\t\t\t\t\t\t\t\t\tShe tosses a volley of daggers in your direction but you deflect them and rush toward her. She throws a wayward punch but you duck, circling around and chopping her in the throat. Spluttering, she collapses, motionless.\n\t\t\t\t\t\t\t\t\t\t\t*if venefira\n\t\t\t\t\t\t\t\t\t\t\t\t*goto loot\n\t\t\t\t\t\t\t\t\t\t\t*goto face_hestia \n                                                                                \n\t\t\t\t\t\t\t\t\t\t*selectable_if (destruction > 0) #You blast the assassin with your destruction grenade. \t\n\t\t\t\t\t\t\t\t\t\t\t*goto absolve\n                                                                                \n\t\t\t\t\t\t\t\t\t\t*selectable_if (staff) #You stand your ground, opting to engage her in some creative combat. \n\t\t\t\t\t\t\t\t\t\t\t*set health -4\n\t\t\t\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\t\tWith such a strong and quick opponent, you decide to approach this battle from a slightly different angle. As Venefira steps forward deliberately, whipping daggers at you, you dodge the poisoned blades and they land in the earth, sending dust flying. When she runs out of daggers, the witch brings her mace to bear and charges toward you menacingly. \n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tYou feign fatigue, but just as she brings her mace down in a frontal blow, you leap to one side, bringing your staff around and cutting deeply into her upper arm. The witch falls to her knees, her arm and hand bloody. You turn to confront her when she suddenly swivels around, swinging her mace through the air and catching you in the shoulder. The powerful blow tears your flesh and sends you careening through the air, your staff flying from your hands. \n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tYou hit the dirt with a thud, robe sticky with blood. Looking up, you see the witch charging you. You draw your dagger and project it through the air, and it lands in her shoulder. She groans, pulling at the dagger, then staggers forward and finally collapses to the ground, defeated. Pausing momentarily to catch your breath, you retrieve your dagger and staff.\n\t\t\t\t\t\t\t\t\t\t\t*if venefira\n\t\t\t\t\t\t\t\t\t\t\t\t*goto loot\n\t\t\t\t\t\t\t\t\t\t\t*goto face_hestia\n\n\t\t\t\t\t\t\t\t\t\t*selectable_if (darts > 2) #You ready your poisonous darts. They will be much more efficient.\n\t\t\t\t\t\t\t\t\t\t\t*goto mace_darts\n\n\t\t\t\t\t\t\t\t\t\t*selectable_if (iron > 0) #A cloud of iron should finally end this battle.\n\t\t\t\t\t\t\t\t\t\t\t*goto failed_iron\n\n\t\t\t\t\t\t\t\t\t\t#You plan to bind the assassin with your silver chain.\n\t\t\t\t\t\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\t\t\tUnraveling the chain from around your waist, you cast it through the air, undulant like a serpent, as the witch charges at you. Panic flickers in the witch's beady eyes and she surges forward with an astounding burst of energy, swinging her mace into the chain. Sparks leap into the air as the metals collide, but the loops of the chain travel up the mace and onto Venefira's arms. \n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tThe witch bellows in anger as her arms go numb and she struggles uselessly against the chain. Undaunted, she begins barreling toward you, apparently planning to knock you down. You stride forward, quickly sidestepping her oncoming shoulder, and she loses her balance and skids across the ground in front of you.  \n\t\t\t\t\t\t\t\t\t\t\t*if compassionate \u003c 50 \n\t\t\t\t\t\t\t\t\t\t\t\tYou smirk, laughing cruelly at her furious expression.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tIt only takes a moment and a quick strike to her temple and she slumps over, knocked unconscious by your staff's blow. Kneeling over your fallen opponent, you promptly retrieve your chain. \n\t\t\t\t\t\t\t\t\t\t\t*if venefira\n\t\t\t\t\t\t\t\t\t\t\t\t*goto loot\n\t\t\t\t\t\t\t\t\t\t\t*goto face_hestia\n\n\t\t\t\t\t\t*selectable_if (concussion > 0) #You quickly cast a concussion grenade at the assassin.\n\t\t\t\t\t\t\t*label venefira_concussion\n\t\t\t\t\t\t\t*set concussion -1\n\t\t\t\t\t\t\t*set health -4\n\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou retrieve the grenade from your satchel and cast it toward her. She dashes forward and furrows her brow in concentration, slicing her knives through the air. Her blade cleaves the grenade neatly in twine, and the separate halves sail lamely behind her, detonating moments later with a pitiful bang.\n\t\t\t\t\t\t\t*label failed_grenade\n\n\t\t\t\t\t\t\tShe sneers at you and completes the distance between you in a miraculous burst of speed. You plant your feet firmly on the ground and reposition your staff defensively across your chest. Her daggers rake your staff, showering your face with splinters. A split second later, she grunts and quickly steps forward, her blades pressing against your staff. You are sent skidding across the terrain, feet scraping against rocks and roots. \n                                                                \n\t\t\t\t\t\t\tYou lean against your damaged staff and eventually shudder to a halt, eyeing your opponent warily. She rushes forward as you swing your staff at her skull. She rears back suddenly, dodging your attack, and slams her blocky boot hard into lf. She lets out an uncharacteristic squeak of surprise as her body goes rigid.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tThe pressure on your chest immediately lets up, and you shove with both hands, watching in satisfaction as she wobbles and then pitches forward onto her face, immobilized. You stagger stiffly to your feet, \n\t\t\t\t\t\t\t\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t\t\t\t\t\t\t\t*goto groan \n\t\t\t\t\t\t\t\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t\t\t\t\t\t\t\t*goto grunt \n\t\t\t\t\t\t\t\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t\t\t\t\t\t\t\t*label groan \n\t\t\t\t\t\t\t\t\t\t\t\tgroaning miserably at the pain in your chest. \n\t\t\t\t\t\t\t\t\t\t\t\t*goto face_hestia\n\t\t\t\t\t\t\t\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t\t\t\t\t\t\t\t*label grunt \n\t\t\t\t\t\t\t\t\t\t\t\tgrunting with exertion as you heave her unconscious body aside and clamber to your feet. \n\t\t\t\t\t\t\t\t\t\t\t\t*goto face_hestia\n\t\t\t\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t\t\t\t*goto groan \n\n\t\t\t\t\t\t\t\t\t\t*selectable_if (iron > 0) #With such a short distance, your iron filings would be devastatingly effective.\n\t\t\t\t\t\t\t\t\t\t\t*set iron -1\n\t\t\t\t\t\t\t\t\t\t\t*set health -3\n\t\t\t\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\t\t\t\t*set stealth %+3\n\t\t\t\t\t\t\t\t\t\t\tYou release her leg, reaching for your iron, but the pressure on your chest is immediately doubled. Grunting, you pull out a handful of filings but Venefira's eyes flicker to your hand. She quickly intercepts you and stomps down on your arm with her other leg. You cry out but dart over with your free hand, grabbing the iron and tossing it in the witch's face. She shrieks in agony and raises her hands, skin burning. \n\t\t\t\t\t\t\t\t\t
