ld a better place and protect the innocent.\n\t\t\t\t*set compassionate %+3\n\t\t\t\tMaking the world a brighter place is a reward in and of itself. Collecting money and smiting evil are additional bonuses, but aiding people in need is your primary objective.\n\t\tRegardless of your goal, violence is often necessary when facing deadly enemies like this goblin. Therefore, it is always best to be familiar with your equipment. Each of your weapons has a distinct advantage and a downside. Your staff often deals the most damage, but it also leaves you open to counterattack.\n\t\t\n\t\tYour chain is swift and has great range, but it's best used against witches and warlocks. Iron burns away the flesh of evil beings, but it is a slow process and sometimes the filings scatter in a wind. Salt mesmerizes vampires, but it can only be used once per encounter. Your candles can negate curses but are almost always useless in the heat of battle. You also carry the badge of a demon ${hunter}, giving you the same privileges as a town guard or a military officer. \n\t\t\n\t\tAt the bottom of your satchel are other less mentionable tools. In addition, your perception and strength are beyond that of typical humans, due to your extensive training in combat and magical lore.\n\t\t*page_break\n\n\t\tYou rise and stretch your legs, feeling somewhat refreshed after resting for those few minutes, then pick up the goblin from the ground. You easily throw her over your shoulder and start down the path. The sun relaxes you, drying your soaked robe and warming you. Coming to a fork in the road, you\n\t\t*if t_goblin\n\t\t\thead left toward a nearby farmer's home. A short while later, arms aching from carrying your captive, you approach the farm. Suddenly, the goblin jerks awake,\n\t\t\t*if break\n\t\t\t\tscreaming from the pain in her leg. \n\t\t\t\t\n\t\t\t\tOnce she recovers, she manages to tell you through gritted teeth,\n\t\t\t\t*goto wait\n\t\t\tsqueaking, \n\t\t\t*label wait\n\t\t\t\"Wait! I'm not guilty!\"\n\t\t\t*set farmer true\n\t\t\t*goto laugh \n\t\t\t*label talk\n\n\t\t\t\"Well, maybe I'm a little guilty…but where are you taking me?!\" she growls impatiently.\n\n\t\t\t\"What is your name, goblin?\" you ask.\n\n\t\t\t\"Emira…but why do you care?\" she replies, eyeing you suspiciously.\n\n\t\t\t\"Emira, I'm taking you to a farmer. You're going to be bound to his service. And don't even think about trying to escape or attack him: next time, I won't be so easy on you,\" you respond, arching your eyebrow.\n\n\t\t\t\"I don't want to serve some disgusting farmer!\" she hisses, her face contorting in annoyance.\n\n\t\t\t\"Would you rather be executed or imprisoned? Consider this getting off easy,\" you finish, sighing.\n\n\t\t\tGrumbling loudly, your captive glares at you but falls silent. You pass the farm's gate and carefully set Emira down before the resident farmer sees you. \n\t\t\t*if break \n\t\t\t\tEmira winces and cries out softly. You just hope the farmer won't notice her broken leg until you've left.\n\t\t\tStriding out to meet you, pitchfork in hand, he exclaims loudly, \"What can I help you with?\" \n\t\t\t\n\t\t\tHe warily eyes the goblin standing beside you, then glances up, staring at the badge upon your chest. \n\t\t\t*if female \n\t\t\t\t…Or, at least, you [b]think[/b] that's what he's staring at. \n\t\t\tStraightening out, you reply, \"I'm here to make an offer, Farmer Villy. This goblin, Emira, is in my debt. My vocation gives me enough trouble as it is, but you look as though you could use some extra assistance. If she were to stay, pests would not trouble you, and she is well able to guard your property.\"\n\t\t\t\n\t\t\tThe farmer looks dubious, so you add, \"You needn't worry about her. If she causes you trouble, I will return. You owe her no money, and I would only require a small up-front fee.\"\n\n\t\t\tThe man doesn't seem entirely open to the idea until you inform him discreetly that she is particularly susceptible to iron. Although, you aren't actually one hundred percent sure this is actually the case, as Emira is likely not completely given over to evil. Convinced, Farmer Villy inquires about the price. On consideration, you decide that fifteen gilded pieces would be the standard price. However, the farmer appears gullible, so you are confident you'd be able to ask for more. \n\t\t\t*choice\n\t\t\t\t#\"Fifteen gilded pieces would suffice, I believe.\"\n\t\t\t\t\t*set gold +15\n\t\t\t\t\t\"Hmm, that sounds about right to me.\" \n\t\t\t\t\t*label farmer\n\n\t\t\t\t\tTossing you a small bag of coins which you deftly catch, the farmer beckons to Emira, saying, \"Come on. I'll show you where you'll be working.\"\n\n\t\t\t\t\tYou retrieve your handcuffs, allowing Emira to follow the farmer\n\t\t\t\t\t*if break\n\t\t\t\t\t\t, who hands her a walking stick to brace herself on\n\t\t\t\t\t. She approaches him, making no move to disobey or attack, but she shoots you a nasty sneer. Frowning at her in warning, you tell yourself that everything will be okay. After all, you made quite a nice profit, all things considered. \n\t\t\t\t\t*goto relish\n\n\t\t\t\t#Seventeen gilded pieces sounds reasonable.\n\t\t\t\t\t*set gold +17\n\t\t\t\t\t*set charisma %+3\n\t\t\t\t\t*set altruism %-5 \n\t\t\t\t\t*label sucks\n\n\t\t\t\t\t\"That seems a little high…\" the man complains.\n\n\t\t\t\t\t\"Your losses would be much higher if an intruder were to disturb your farm, and Emira would be in your service, protecting you, for some time. Or, you could just stick with your scarecrow…\" you say ominously.\n\n\t\t\t\t\t\"Fine, I see your point,\" grumbles the farmer. \n\t\t\t\t\t*goto farmer\n\n\t\t\t\t#Twenty gilded pieces seems just low enough that he would be unlikely to decline, while still allowing you to maximize your profits.\n\t\t\t\t\t*set gold +20\n\t\t\t\t\t*set altruism %-5 \n\t\t\t\t\t\"I believe twenty gilded pieces would suffice.\"\n\t\t\t\t\t*goto sucks\n\n\t\t*if (i_goblin) \n\t\t\thead right, toward the soldiers' outpost. After several minutes,\n\t\t\t*if i_goblin\n\t\t\t\tyour arms sore from carrying your captive, you near your destination. Suddenly, the goblin awakens,\n\t\t\t\t*if break\n\t\t\t\t\tscreaming from the pain in her leg. Once she recovers, she manages to tell you through gritted teeth,\n\t\t\t\t\t*goto wait2\n\t\t\t\tsqueaking, \n\t\t\t\t*label wait2\n\t\t\t\t\"Wait! I'm not guilty!\"\n\t\t\t\t*label laugh\n\n\t\t\t\tYou laugh inwardly at the notion. What an absurd idea!\n\t\t\t\t*choice\n\t\t\t\t\t#There's no harm in humoring the goblin and letting her attempt to explain her innocence.\n\t\t\t\t\t\t*set charisma %+3\n\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t*set altruism %+3\n\t\t\t\t\t\t\"Really? Please, enlighten me,\" you say, smirking despite yourself.\n\n\t\t\t\t\t\t\"I was possessed by a demon. He made me do those things against my will!\" she cries dramatically.\n\n\t\t\t\t\t\t\"You're telling this to a demon ${hunter}; I know all the signs of possession, and you exhibited none of them,\" you reply, unable to contain a chuckle.\n\n\t\t\t\t\t\t\"Oh, well…actually, it wasn't me whatsoever. It was my evil twin! And I only attacked you because you scared me,\" she continues hurriedly.\n\n\t\t\t\t\t\t\"You were directly tracked by the farmers and their hounds, so no, it wasn't your twin, and I highly doubt you even have one. And do you usually attempt to decapitate anyone who frightens you?\" you reply, arching your eyebrows.\n\n\t\t\t\t\t\t\"Fine! I'll tell you what actually happened…. The farmers and I were planning to trick and kill you,\" she responds, her voice high and desperate.\n\n\t\t\t\t\t\t\"You [b]really[/b] aren't helping yourself, you know,\" you say, rolling your eyes.\n\t\t\t\t\t\t*if farmer\n\t\t\t\t\t\t\t*goto talk\n\t\t\t\t\t\t*goto guilty \n\n\t\t\t\t\t#You ignore the noisy little goblin.\n\t\t\t\t\t\t*set charisma %-5\n\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\tRolling your eyes, you keep walking. After a few moments of silence, she finally admits,\n\t\t\t\t\t\t*if farmer\n\t\t\t\t\t\t\t*goto talk\n\t\t\t\t\t\t*goto guilty\n\n\t\t\t\t\t#That's ridiculous, and you tell her so.\n\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t\"Several farmers witnessed you breaking into their barn, and tracked you with hounds to your cave, but were unable to reach you after you climbed the cliff. They informed me of your whereabouts and when I pursued, you ambushed and attempted to kill me in several different ways. And now you're trying to tell me you aren't guilty?\" you say incredulously. \n\t\t\t\t\t\t*if farmer\n\t\t\t\t\t\t\t*goto talk\n\t\t\t\t\t\t*goto guilty\n\t\t\t\t*label guilty\n\n\t\t\t\t\n\t\t\t\t\"Well, maybe I'm a little guilty…but I don't deserve to be executed!\" she practically yells.\n\n\t\t\t\tYou know her assumption about her punishment could well prove justified. Robbery and attempting to murder a demon ${hunter} are serious offenses. However, as a demon ${hunter}, you can always offer your input as to what the criminal's punishment should be. Turning your head toward her, you ask, \"Goblin, what is your name?\"\n\n\t\t\t\t\"Emira…but why do you care?!\" she says suspiciously.\n\n\t\t\t\t\"Well, Emira, I've decided to tell the soldiers that I suggest your penalty should be…\"\n\t\t\t\t*choice\n\t\t\t\t\t#\"Indentured servitude for a year.\"\n\t\t\t\t\t\t*set charisma %+3 \n\t\t\t\t\t\t*set compassionate %+3\n\t\t\t\t\t\t*set resolve %-5\n\t\t\t\t\t\t*set serve true \n\t\t\t\t\t\t\"That would be appropriate restitution for the property you damaged,\" you add.\n\n\t\t\t\t\t\tScrunching up her face in disgust, Emira grumbles but seems to realize that she's gotten off easy. It is then that\n\t\t\t\t\t\t*goto outpost\n\n\t\t\t\t\t#\"Capitol prison for five years.\"\n\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t*set jail true\n\t\t\t\t\t\t\"A little incarceration should do you good,\" you add.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"What are you blathering on about?!\" she says confusedly.\n\n\t\t\t\t\t\tWith a sigh, you tell her in simpler terms: \"You're going to jail.\"\n\n\t\t\t\t\t\tHearing this, she screams in anger and spits onto your robe, straining against the shackles. Wiping the viscous goo from your robe, you respond, \"You should feel lucky, goblin. There are harsher alternatives than being imprisoned.\"\n\n\t\t\t\t\t\tHowever, she is too busy hurling verbal threats and curses at you to listen. Sighing in annoyance, you are relieved when \n\t\t\t\t\t\t*goto outpost\n\n\t\t\t\t\t#\"Execution.\"\n\t\t\t\t\t\t*set compassionate %-5\n\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t*set die true\n\t\t\t\t\t\t\"Your crimes are indeed punishable by death,\" you finish.\n\n\t\t\t\t\t\tHearing this, Emira roars in fury, ferociously struggling against the handcuffs and kicking wildly. However, her injuries and your superior strength ensure that nothing becomes of her outbursts. Rolling your eyes, you are relieved when\n\t\t\t\t\t\t*goto outpost\n\t\t\t*label outpost\n\t\t\tyou finally reach the old outpost. Striding out to meet you, a soldier in uniform recognizes you, saying loudly, \"Ah, what brings you here? It's been too long!\"\n\n\t\t\t\"Business, as usual,\" you reply, nodding to him. \n\t\t\t*goto eye\n\t\t\t\t*label eye\n\t\t\t\t\n\t\t\t\tEyeing the goblin on your shoulder, the soldier offers, \"We'll take her from here, and then you and I can negotiate a price. By the way, what are the goblin's crimes, and what would you suggest her penalty be?\"\n\t\t\t\t*if serve\n\n\t\t\t\t\t\"She broke into a farmer's property. I'd suggest a year of indentured servitude,\" you reply. \n\t\t\t\t*if jail\n\n\t\t\t\t\t\"She broke into a farmer's property, stole his belongings, and resisted arrest. I'd suggest five years of incarceration in the capitol penitentiary,\" you respond.\n\t\t\t\t*if die\n\n\t\t\t\t\t\"She broke into a farmer's property, stole his belongings, and attempted to kill me when I apprehended her. I'd suggest execution,\" you reply curtly.\n\t\n\t\t\t\tNodding, the soldier barks a command to his junior officers: \n\t\t\t\t*if serve \n\t\t\t\t\t\"Make sure she is free of any contraband and keep an eye on her.\n\t\t\t\t*if jail\n\t\t\t\t\t\"Search her thoroughly and lock her in the jail.\n\t\t\t\t*if die\n\t\t\t\t\t\"Throw that menace into the dungeon, and keep her light on the rations.\n\t\t\t\t*if break\t\n\t\t\t\t\tOh, and make sure you do something about her leg.\n\t\t\t\t\"\n\n\t\t\t\tExiting the small guardhouse nearby, a couple of soldiers lift the goblin from your shoulder. She growls menacingly but either out of wisdom or exhaustion, she does not struggle. After you've retrieved your handcuffs, they take her into custody. Turning to you, the military officer says, \"Now, my standard offer for a dangerous goblin delivered alive is about ten gilded pieces.\"\n\t\t\t\t*choice\n\t\t\t\t\t#\"Five gilded pieces will do. I'm only doing what anyone should,\" you say, giving him a little smile. \n\t\t\t\t\t\t*set charisma %+3 \n\t\t\t\t\t\t*set altruism %+3 \n\t\t\t\t\t\t*set gold + 5\n\t\t\t\t\t\t*set stealth %-5\n\t\t\t\t\t\tEven though you mostly do your work from a sense of morality, you do realize at least a minor amount of compensation is essential. Smiling, the soldier replies, \"That's just like you, demon ${hunter}. It's pretty unusual, you know, but it's good to see someone so generous.\"\n\t\t\t\t\t\t*label small_bag\n\t\t\t\t\t\t\n\t\t\t\t\t\tCatching the small bag of gilded pieces that the man tosses to you, you wave warmly as he starts heading back to the outpost.\n\t\t\t\t\t\t*goto relish\n\n\t\t\t\t\t#That's a fair price, and you tell him so.\n\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t*set gold +10\n\t\t\t\t\t\t\"Excellent!\" responds the soldier.\n\t\t\t\t\t\t*goto small_bag\n\t\t\t\t\t\t\n\t\t\t\t\t#\"What? That price is ridiculous. It's far too low!\" you say, waving your hands. \n\t\t\t\t\t\t*set gold +15\n\t\t\t\t\t\t*set charisma %+3 \n\t\t\t\t\t\t*set altruism %-5 \n\t\t\t\t\t\tRaising your voice, you continue ranting, \"I had to follow this goblin up a precarious cliff. Then, I was nearly murdered in several different ways. Then, I had to carry her for hours! And now you're only offering me ten golden pieces? I'll accept no less than fifteen! If you think I'll stand for this—\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Fine, fine,\" grumbles the soldier dejectedly.\n\t\t\t\t\t\t\n\t\t\t\t\t\tTossing you a small bag of coins, the man curtly waves goodbye before heading back to the outpost.\n\t\t\t\t\t\t*goto relish\n\t\t*label relish\n\t\t*page_break\n\t\tHaving finished here, you head down the path toward your village. You close your eyes for a moment, reveling in your victory: defeating a goblin who had been terrorizing local farmers! The serenity of the area is interrupted, though, by a noxious smell. Your eyes fly open in surprise and ${boggart} cries out, \"THE VILLAGE!\" \n\n\t\tClearly alert now, you rush forward, ascending the hill that will allow an overview of your beloved home, Rhys Falls. You lay your eyes on the scene below, and what you see sends terror flooding into your body. The buildings below wither in raging flames, and the village itself seems to be caving in. Your stomach jumps into your throat at this sight, and you race down to aid your village. You reach the entrance of the ruins and opaque black smoke blinds you, burning your throat. You swivel around frantically, looking for any sign of life, when you hear someone screaming your name. \n\t\t*if female\n\t\t\t*fake_choice\n\t\t\t\t# \"ROSE!\"\n\t\t\t\t\t*set name \"Rose\"\n\n\t\t\t\t# \"MABELINE!\"\n\t\t\t\t\t*set name \"Mabeline\"\n\n\t\t\t\t# \"LUNA!\"\n\t\t\t\t\t*set name \"Luna\"\n\t\t\t\t\t\n\t\t\t\t#\"MARIAH!\"\n\t\t\t\t\t*set name \"Mariah\"\n\n\t\t\t\t#You are named something else.\n\t\t\t\t\tWhat is your name?\n\t\t\t\t\t*input_text name\n\t\t*if male\n\t\t\t*fake_choice\n\t\t\t\t# \"SAMUEL!\"\n\t\t\t\t\t*set name \"Samuel\"\n\n\t\t\t\t# \"DENZEL!\"\n\t\t\t\t\t*set name \"Denzel\"\n\n\t\t\t\t# \"ALLISTER!\"\n\t\t\t\t\t*set name \"Allister\"\n\n\t\t\t\t# You are named something else.\n\t\t\t\t\tWhat is your name?\n\t\t\t\t\t*input_text name\n\n*label guard\nYou hear it again, but more quietly this time: \"${name}…!\"\n\nYou find the source of the voice amidst a pile of burning wreckage. It is one of your friends from Rhys Falls: the captain of the guard. You dash toward him, freeing him from the wreckage despite the blistering heat and carefully carrying him a safe distance away. You set him down and retrieve your canteen from your satchel, telling your apprentice, \"${boggart}, search for survivors!\"\n\nHe gives you a curt nod as he launches into the air, scanning the area. You turn to Captain Avery, gently pressing the canteen to his mouth. He attempts to drink some of the water, but merely chokes, spitting it out. Shoving it aside, he gasps in a ragged voice, \"${name}! Don't go after him!\"\n\n\"What happened?\" you question worriedly.\n\n\"A demon. He…appeared out of a portal from the Netherworld.\" \n\nHe pauses, coughing violently, blood appearing on his lips. It's obvious that he is dying.\n*fake_choice \n\t#You give him comfort in his last moments, and try to figure out what happened.\n\t\t*set charisma %+3 \n\t\t*set compassionate %+3 \n\t\tYou hand him a moistened cloth and he presses it to his face, then continues, \"A scout spotted him and I ordered the elders and children to evacuate, but the foul devil somehow shattered all of the lamps, setting the structures afire!\"\n\n\t\t\"Where are the rest of the guards?\" you say, taking his hand in yours and squeezing gently.\n\n\t\t\"I sent two of them to escort the villagers to safety, and the rest of us mounted a full assault on the demon. Before we could even get close, he caved in the entire area! The other guards were swallowed into the earth. I would've died, too, but he caught me by the neck before I was sucked into the ground. Then, he pulled me close and told me that the only reason he wasn't flaying me alive was because he wanted to spare me as an example to you.\" \n\t\t\n\t\tAvery looks at you, tears in his eyes. \"I was helpless, ${name}. He threw me like a rag doll into the burning wreckage. Please, ${name}, I beg you: don't go after him! He's much too powerful. He destroyed the entire village and killed all our guards like it was child's play! I…\"\n\n\t\tThe captain struggles to breathe and you tell him, \"Hush, Avery. Try to rest.\"\n\n\t\tMoments later, he finally succumbs to his injuries, cradled in your arms. Horrified, you whisper, \"I will avenge you, and all the other lives this demon has so maliciously destroyed…. I will banish this fiend back to the Netherworld, Avery!\"\n\n\t#Try to gain as much information as possible.\n\t\t*set altruism %-5 \n\t\t*set cunning %+3 \n\t\tLeaning forward, you say urgently, \"Tell me exactly what happened.\"\n\t\t\n\t\tWiping the droplets of blood from his cracked lips, he continues, \"A scout spotted him and I ordered the elders and children to evacuate, but the foul devil somehow shattered all of the lamps, setting the structures afire!\"\n\n\t\t\"Where are the rest of the guards?\" you say, giving him a searching look.\n\n\t\t\"I sent two of them to escort the villagers to safety, and the rest of us mounted a full assault on the demon. Before we could even get close, he caved in the entire area! The other guards were swallowed into the earth. I would've died, too, but he caught me by the neck before I was sucked into the ground. Then, he pulled me close and told me that the only reason he wasn't flaying me alive was because he wanted to spare me as an example to you.\" \n\t\t\n\t\tAvery looks at you, tears in his eyes. \"I was helpless, ${name}. He threw me like a rag doll into the burning wreckage. Please, ${name}, I beg you: don't go after him! He's much too powerful. He destroyed the entire village and killed all our guards like it was child's play! I…\"\n\n\t\tThe captain struggles to breathe, so you say gently, \"Avery, stay with me. Is there anything else you can tell me?\"\n\n\t\tMoments later, he finally succumbs to his injuries, cradled in your arms. Shaking your head, you whisper, \"I am sorry, Captain. I will do the best with what information you've given me.\"\n\t\n\t#You don't bother being gentle with him. It was his duty to protect the village, and he failed miserably!\n\t\t*set compassionate %-5 \n\t\tLeaning forward, you say bitterly, \"None of this would have happened if you'd been better prepared. You've become soft and lazy, old man.\"\n\t\t\n\t\tWiping the droplets of blood from his cracked lips as tears spring into the corners of his eyes, he continues thickly, \"I ordered the elders and children to evacuate, but the foul devil somehow shattered all of the lamps, setting the structures afire. There was nothing I could do!\"\n\n\t\t\"Where are the rest of the guards?\" you say cuttingly. \"Surely, they must have done something.\"\n\n\t\t\"I sent two of them to escort the villagers to safety, and the rest of us mounted a full assault on the demon. Before we could even get close, he caved in the entire area! The other guards were swallowed into the earth. I would've died too, but he caught me by the neck before I was sucked into the ground. Then, he pulled me close and told me that the only reason he wasn't flaying me alive was because he wanted to spare me as an example to you.\" \n\t\t\n\t\tAvery looks at you, tears spilling down his sooty cheeks. \"I was helpless. He threw me like a rag doll into the burning wreckage. Please, ${name}, I beg you: don't go after him! He's much too powerful. He destroyed the entire village and killed all our guards like it was child's play! I…\"\n\n\t\tThe captain struggles to breathe and you say, \"Don't worry. I will do the job right.\"\n\n\t\tMoments later, he finally succumbs to his injuries, cradled in your arms. Shaking your head, you murmur, \"What a dying shame.\"\n\n*page_break\nNow you are faced with a dilemma. The demon clearly needs to be banished, and to accomplish that you must pursue and defeat him. However, Avery and more than twenty sentries have died, with no one present but you to honor them for their courage and sacrifice. Finally, the village would likely have something of value that you could salvage. \n\nNo one else is present, and there would be no repercussions for, [i]ahem,[/i] happening to find someone else's belongings. Besides, everything is going to burn, anyway….\n*fake_choice\n\t#Your time is best spent paying your respects to the deceased.\n\t\t*set resolve %-5 \n\t\t*set compassionate %+3\n\t\t*set altruism %+3 \n\t\tAfter everything that's happened here, you wouldn't feel right unless you honored the men and women who gave their lives defending your village. After folding the captain's arms across his chest and shutting his eyes, you seek a suitable grave stone. Salvaging an oddly soft rock from a smoldering building, you draw your dagger from your belt and carve, [i]\"Here lie over twenty courageous men and woman who perished fighting to protect our village from a monster. May they be remembered.\"[/i] into the stone.\n\n\t\tNot knowing what else to do, you shakily stand to your feet, wiping tears from your face. Turning away from the dismal scene, you\n\t#You plan to quickly scavenge for anything valuable.\n\t\t*set altruism %-5 \n\t\t*set gold +20\n\t\t*set health -1\n\t\tStanding up, you look around for a building that seems reasonably stable. One home only looks badly singed. Grinning, you cover your mouth as you enter to avoid the billowing smoke. Ducking beneath the creaking pillars, you see that everything of value is either gone or destroyed. Immense heat has somehow melted what once might have been weapons or tools. The sweltering heat and acrid smoke beginning to become unbearable, you turn to exit the burning building, but a small strongbox suddenly catches your eye. \n\t\t\n\t\tYour master key easily opens the simple lock, and you grab the contents: twenty gilded pieces! Depositing the currency into your satchel, you make your way back through the wreckage. You are nearly to the door when the roof suddenly collapses! Yelping in fright, you hurtle through the door, closely followed by a vibrant jet of flame. You hit the ground hard and roll, extinguishing the embers clinging to your garments. Rising to your knees, you catch your breath, futilely brushing at the ash on your robe. \n\t\t\n\t\tHaving scavenged what you can, you\n\t#You must leave immediately to pursue the demon.\n\t\t*set resolve %+3\n\t\t*set cunning %+3\n\t\t*set compassionate %-5\n\t\tLet the dead bury the dead. You have a demon to hunt. You\nrun to your rooms on the far side of the village, hoping to salvage a few crucial items from your own home. By now, your house is in complete disarray, ravaged by fire and missing large parts of the side walls. \n\nYou burst through a collapsed wall, coughing violently. You're well aware of the danger, but you need every weapon you possess to successfully battle this demon. You reach a certain drawer and retrieve your\n*fake_choice\n\t#Three tear gas grenades. You prefer to create a disturbance and make a quick escape.\n\t\t*set tear +3\n\t\t*set stealth %+3\n\n\t#Two concussion grenades. They incapacitate without wreaking total chaos.\n\t\t*set concussion +2\n\t\t*set cunning %+3\n\n\t#Destruction grenade. It's usually not enough to kill someone, but it's certainly effective and powerful.\n\t\t*set destruction +1\n\t\t*set resolve %+3  \n\nYou retrieve your \n*if tear=3\n\tgrenades\n*if concussion=2\n\tgrenades\n*if destruction=1\n\tgrenade\nfrom your drawer and carefully place\n*if destruction=1 \n\tit\n*if ((concussion=2) or (tear=3))\n\tthem\ninto your satchel. Fleeing the unstable building, you escape just as a support pillar caves in behind you. You watch, motionless, as several other buildings collapse onto their foundations. Quickly, as if the fire is eager to devour Rhys Falls, the sky fills with the embers of your community. You gather the courage to leave your ravaged home behind, running through the ignited village until your chest aches and your breaths come in ragged bursts. \n\nAs you finally stop at the gate of your village, ${boggart} returns and lands tentatively onto your shoulder, professing sadly, \"There were no survivors….\"\n\n*if compassionate \u003c 50\n\tYou stare into space, your eyes dark.\n\t*goto stride\nTears suddenly spill down your cheeks, streaking the ashes on your face.\n*label stride\nYou stride forward, forcing yourself not to look backwards, and utter quietly to your apprentice, \"Let's find this devil,\" as the remainder of your home is devoured by the roaring fire behind you.\n\nThe sound of crackling wood and flames seems to follow you for miles.\n*page_break\n\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*finish Continue\n\t\n[b]Remember earlier how we told you that the first chapter is available for free? This is the end of the free content.[/b]\n\n[b]To find out what happens next, please purchase the remaining chapters.[/b]\n*purchase adfree $3.99 purchased_end\n*abort\n*label purchased_end\n*finish Continue\n", "transformations": "*page_break\nAs you solemnly follow the wreckage of the demon's wake, your growing hatred of the beast begins to fester; if only you could have been there when it appeared. And why did it do this in the first place?! The only comforting thought that you can muster is that at least your lifelong companion is safe and by your side….\n\nA slight smile spreads across your face at the thought of your impish companion. You think of how you first met your little friend. You remember it vividly because you had just begun your career as a demon ${hunter} when you caught him stealing from your pantry.\n\nYou were settling down after a laborious day's work of moving into your new office, when you suddenly heard a peculiar shuffling noise coming from your pantry. This was particularly unsettling, since you knew for a fact that you were supposed to be alone. Grabbing your staff, you quietly sneaked over to the edibles storage, swinging the door open to see a little boggart stuffing his mouth with your pies.\n\nPrepared to chase him from the premises, you raised your staff, but something about this little thief stopped you. He stared up at you with pleading eyes, and a second glance revealed his emaciated features; he was starving. At that moment you decided to keep him, mainly because\n*choice\n\t#He needed to work off the debt for thievery.\n\t\t*set charisma %- 10\n\t\tYou made a deal with him: as repayment for stealing your food, he would work for you, doing chores around your home. He gladly accepted the offer; after all, he would be acquitted of his minor crimes while simultaneously receiving a new home. For an extended period of time, your relationship was nothing more than that of master and servant, but soon afterwards you realized his potential and decided to take him on as an apprentice. \n\n\t\tAfter a particularly dangerous mission—not unlike the one with the goblin—in which ${boggart} saved your life, you realized his importance, and thought yourself extremely fortunate to have caught this little boggart stealing from your pantry.  \n\t\t*goto name\n\t\t\t\t\t\t\t\t\t\n\t#You needed an apprentice.\n\t\t*set bravery %+ 5\n\t\t*set relationship %+ 10\n\t\tYou saw this as an opportunity to introduce an apprentice into your life. ${boggart} clearly needed a home, and you were in need of an assistant; it worked out well. You took him under your wing, and together you went on missions fighting the dark. You soon began to view him as a friend, but it wasn't until a particularly dangerous mission—not unlike the one with the goblin—in which ${boggart} saved your life that you realized his importance, and thought yourself extremely fortunate to have caught this little boggart stealing from your pantry.  \n\t\t*goto name\n\n\t#He needed a proper home.\t\n\t\t*set relationship %+ 20—\n\t\t*set charisma %+ 10\n\t\tHe was clearly neglected and needed a proper home, as evidenced by his thievery. You absolved him of all guilt and instead allowed him to live with you. You soon became great friends, and ${boggart} even offered to become your apprentice. You happily obliged, and together fought the dark on many occasions. \n\n\t\tOn a particularly dangerous mission—not unlike the one with the goblin—he actually saved your life. Of course, you thought yourself extremely fortunate to have caught this little boggart stealing from your pantry.  \n\t\t*goto name                 \n\n*label name\n\nOver the years, you found yourself becoming ever closer, until you were all but inseparable. \n*page_break\n${boggart}'s primary form is that of a devilish imp, but with the requisite mana he can change that at any time, as he is a shape-shifter, though relatively small, and not very powerful. \n\nAlong with this supernatural ability, boggarts are also capable of detecting dark power wielders through scent, and they have naturally swift regenerative properties. Ever since he was old enough to do so, you taught him to transform into a specified animal that you've found particularly useful in your endeavors:\n*choice\n\t#A small toad that secretes poison into a vial, which you can use as an additional weapon in your arsenal. Requires one mana.\n\t\t*set transformations_toad true\n\t\t*finish\n\n\t#A swift electric viper with fangs that deliver an electric shock on contact. In this form he is also hard to detect, allowing him to spy on and ambush your enemies. Requires two mana.\n\t\t*set transformations_viper true\n\t\t*finish\n\n\t#An eagle: with a wingspan of eight feet, keen senses, and razor-sharp talons and beak, ${boggart} the eagle is an adept tracker and scout, and a fair companion in short-term combat against weaker enemies. Requires three mana.\n\t\t*set transformations_eagle true\n\t\t*finish", "traps": "*page_break\n*set witches false\n*set traps true\nCHECKPOINT REACHED. If you perish later in the gamebook, you may decide to return to this point instead of restarting from the beginning.\n\n*set cp_image image\n*set cp_compassionate compassionate\n*set cp_no_fortune no_fortune\n*set cp_altruism altruism\n*set cp_mad mad\n*set cp_redeem redeem\n*set cp_farmer farmer\n*set cp_serve serve\n*set cp_jail jail\n*set cp_die die\n*set cp_g2 g2\n*set cp_g9 g9\n*set cp_g5 g5\n*set cp_g10 false\n*set cp_g15 g15\n*set cp_t_goblin t_goblin\n*set cp_i_goblin i_goblin\n*set cp_info info\n*set cp_confine confine\n*set cp_talk talk\n*set cp_new cp_new\n*set cp_cb cb\n*set cp_pet_hurt pet_hurt\n*set cp_absolve absolve\n*set cp_geysers geysers\n*set cp_potion2 potion2\n*set cp_eagle_hide eagle_hide\n*set cp_witches witches\n*set cp_traps traps\n*set cp_vampire vampire\n*set cp_room1 room1\n*set cp_room2 room2\n*set cp_treasury treasury\n*set cp_armory armory\n*set cp_lab lab\n*set cp_now now\n*set cp_later later\n*set cp_nosalt nosalt\n*set cp_out out\n*set cp_free free\n*set cp_tied tied\n*set cp_not_done not_done\n*set cp_original original\n*set cp_toad toad\n*set cp_viper viper\n*set cp_eagle eagle\n*set cp_hestia_fire hestia_fire\n*set cp_venefira_fire venefira_fire\n*set cp_all_fire all_fire\n*set cp_broken_vials broken_vials\n*set cp_illusia_1st illusia_1st\n*set cp_transformations_toad transformations_toad\n*set cp_transformations_viper transformations_viper\n*set cp_transformations_eagle transformations_eagle\n*set cp_venefira venefira\n*set cp_venefira_viper venefira_viper\n*set cp_boggart_save boggart_save\n*set cp_release_tear release_tear\n*set cp_release_concussion release_concussion\n*set cp_release_destruction release_destruction\n*set cp_warlock warlock\n*set cp_girl girl\n*set cp_name name\n*set cp_female female\n*set cp_male male\n*set cp_conceal conceal\n\n*set cp_staff staff\n*set cp_chain chain\n*set cp_iron iron \n*set cp_salt salt\n*set cp_ointment ointment\n*set cp_shield shield\n*set cp_marble marble\n*set cp_mythril mythril\n*set cp_accelerant accelerant\n*set cp_daggers daggers\n*set cp_charm charm\n*set cp_amulet amulet\n*set cp_poison poison\n*set cp_gauntlets gauntlets\n*set cp_wind wind\n*set cp_flame flame\n*set cp_vines vines\n*set cp_ice ice\n*set cp_earth earth\n*set cp_destruction destruction\n*set cp_concussion concussion\n*set cp_tear tear\n*set cp_darts darts\n*set cp_charisma charisma\n*set cp_resolve resolve\n*set cp_cunning cunning\n*set cp_relationship relationship\n*set cp_stealth stealth\n*set cp_health health\n*set cp_mana mana\n*set cp_gold gold\n\n*page_break\n\n[b]Chapter Four of Four[/b]\n\n*if ((eagle) or (original))\n\t*if relationship \u003c 55\n\t\tMotioning with your hands for your apprentice to get back, you grunt, \"Just stay out of my way.\"\n                \n\t\tFrowning, ${boggart} replies, \"I will, but only because you're so fat and stupid!\"\n                \n\t\tYou turn to him with a scowl, but he alights onto a pillar several feet away.\n\t*if relationship > 54\n\t\t\"${boggart},\" you whisper, \"stay behind, but watch my back.\" Smiling faintly, you add, \"I'm glad you're there for me.\"\n        \n\t\tHe complies with a little grin, alighting on an eroded pillar some distance behind you. \nYou grip your staff tightly and raise your candle, cautiously approaching the center of the courtyard. Totally alert, you suddenly notice the brick wall around you is grooved, filled with a red-colored fire accelerant. Suddenly, a dot of flame appears on the accelerant and fire travels across the grooves, illuminating the scene in a haphazard, orange glow. \n\nFlinching, you move away from the wall and look suspiciously for any sign of the vampire. If the castle is active, that means its owner is nearby. Extinguishing your candle, you begin to search the courtyard but a whistling sound suddenly pierces the air. Startled, you look up to see several extremely long metal needles trailing with wire streaking toward you, gleaming in the dim light.\n*choice\n\t#This situation is far too dangerous. Dropping to the ground, you quickly roll away.\n\t\t*set cunning %+3 \n\t\t*set free true\n\t\tThe needles collide with the floor right where you stood moments ago, clattering ominously. \n\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t*label huh \n\t\t\tFlying needles, huh? How original.\n\t\t\t*goto stand\n\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\tBooby traps: you should have seen that coming!\n\t\t\t*goto bob \n\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\tJudging from the wires on those needles, you suspect the next trap will be connected to this one, somehow.\n\t\t\t*goto bob \n\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t*label stand\n\t\t\tBooby traps? How cowardly!\n\t\t\t*goto bob \n\t\t*else \n\t\t\t*goto huh \n\t\t*label bob \n\t\tYou stand up and look around warily, when the floor begins to open up beneath you.\n\t\t*goto pit\n\n\t#You stand still, trying to ascertain the source of the attack.\n\t\t*set tied true\n\t\t*set health -6\n\t\t*set cunning %-5 \n\t\tAs you swivel, looking for an attacker, several of the needles pierce you. The wounds feel like fire, sending pain shooting up your spine. Instead of a person, you see a device mounted on the wall, a small hole filled with gears that had released the needles. \n\t\t*if (health \u003c 1)\n\t\t\t*goto main_death2\n\t\tYou grit your teeth and prepare to yank out the strange needles, but the wires rise of their own accord and cinch you tightly.\n\t\t\n\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t*label cha \n\t\t\tGoodness. You're really in a bind!\n\t\t\t*goto given\n\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\tWith your body immobilized, you're certain the next trap will spell your defeat. Looking around, you notice the outline of a trap door beneath you!\n\t\t\t*goto given\n\t\t*elseif (((cunning > stealth) and (cunning > charisma)) and ((cunning > resolve)))\n\t\t\tYou should have realized that the traps would be activated by the castle itself!\n\t\t\t*goto given\n\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\tYour mind threatens to panic, but you quickly calm yourself and try to find a way out of this.\n\t\t\t*goto given \n\t\t*else \n\t\t\t*goto cha \n\t\t*label given\n\t\tSuddenly, the floor opens up below you, revealing a gaping pit. \n\t\t*goto pit\n                                \n\t#Raising your staff defensively, you try to deflect the needles.\n\t\t*set resolve %+3\n\t\t*set cunning %-5  \n\t\t*set health -3\n\t\t*set tied true\n\t\tYou spin the beam between your fingers, catching the first few needle-and-wire darts on your staff. Some of them make it past, though, and pierce your shoulder and hip.\n\t\t*if (health \u003c 1)\n\t\t\t*goto main_death2\n\t\tYou gasp for breath as the injuries sting, bleeding into your robe. Before you can move, the wire connected to the end of the needles suddenly rotates and in moments you are completely immobilized. \n\t\t\n\t\tYou attempt to free yourself but quickly change tactics as the floor creaks, then opens beneath your feet.\n\t\t*label pit\n\t\t*choice\n\t\t\t*selectable_if (free) #You quickly wedge your staff on the edges of the pit, halting your descent.\n\t\t\t\t*set cunning %+3 \n\t\t\t\tYou swing your staff upward and out, locking it horizontally against the pit's sides. It slows your fall, but your shoulders ache from the pull. With a grunt of exertion, you swing yourself upwards, onto solid ground. Looking into the pit, you see sinister spikes that were awaiting you at the bottom. \n\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t*label wel \n\t\t\t\t\tWell, when you took this job as a demon ${hunter} you did know your life would be at [i]stake[/]. Ha! \n\t\t\t\t\t\n\t\t\t\t\tNever mind…. Please don't repeat that. Actually, it would be best if you just forgot it altogether.\n\t\t\t\t\t*goto straighten\n\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\tFigures.\n\t\t\t\t\t*goto straighten\n\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\tThis vampire seems more spineless by the minute.\n\t\t\t\t\t*goto straighten\n\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\tEdging away from the pit, you breathe a sigh of relief. \n\t\t\t\t\t*goto straighten \n\t\t\t\t*else \n\t\t\t\t\t*goto straighten \n\t\t\t\t\t\n\t\t\t\t*label straighten       \n\t\t\t\tStraightening out, you \n\t\t\t\t*label brace_free\n\t\t\t\thave just regained your bearings, but three small dams lined around the castle abruptly collapse, spilling nasty looking water. If that water reaches you, it will throw you onto the spikes below!\n\t\t\t\t*choice\n\t\t\t\t\t#Grappling a nearby pillar with your chain, you quickly scale the ruins and try to gain some height.\n\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t*set cunning %+3  \n\t\t\t\t\t\t*set out true\n\t\t\t\t\t\tYou unravel your chain and clip it in a loop, tossing it around a broken pillar just as the horrible water hits you. Swept up in the current, you are tossed backwards and forced under the water, but you manage to \n\t\t\t\t\t\t*if ((stealth > 54) and (cunning > 54))\n\t\t\t\t\t\t\tfasten the chain around your wrist, clipping it shut.\n\t\t\t\t\t\t\t*goto daring\n\t\t\t\t\t\tmaintain hold of your chain, which remains securely tied around the pillar, though your hand slips several times, bruising your wrist.\n\t\t\t\t\t\t*set health -1 \n\t\t\t\t\t\t*label daring\n                                                \n\t\t\t\t\t\tYou close your eyes to protect them from the putrefying water, taking gasping breaths whenever your head emerges above the current. The water feels like a million frigid, slimy hands slapping and grabbing at you, trying to pull you under. Eventually it begins to subside, draining down into the pit. \n\n\t\t\t\t\t\tAfter taking a moment to steady yourself, you go to retrieve your chain and\n\t\t\t\t\t\t*label breaths\n\t\t\t\t\t\t${boggart}\n\t\t\t\t\t\t*if ((toad) or (original))\n\t\t\t\t\t\t\tlands by your side, saying acidly, \"And this is why I hate vampires!\"\n\t\t\t\t\t\t*if (viper)\n\t\t\t\t\t\t\tslithers weakly out of your drenched garments, peering up at you with his serpent eyes.\n\t\t\t\t\t\t*goto coward\n\n\t\t\t\t\t#You thrust your staff into the ground and brace yourself against the current.\n\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t\t*set health -1\n\t\t\t\t\t\tThe sharp blade of your staff's dagger sinks easily into the ground, and you brace yourself as the torrent of filthy water engulfs you. Although you fight against the current, the suction pulls you toward a depression in the stones. You close your eyes to protect them from the putrefying water that yanks at you as it forms a maelstrom around you, pouring downwards into the pit below. \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\tGasping, you grab a breath whenever your head emerges above the current. Your lungs begin to burn inside your chest. The torrent threatens to lift you from your feet and into the pit where the spikes await you.\n\t\t\t\t\t\t*if (health \u003c 1)\n\t\t\t\t\t\t\tYou struggle to maintain your hold on your staff, but fatigue and injury overwhelm you. The current sucks you down into the pit and you are powerless to escape the stakes below.\n\t\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t\tFinally, the fetid liquid begins to subside, lapping gently at your ankles. \n\t\t\t\t\t\t*goto breaths\n        \n\t\t\t\t\t#You dash away from the flood and run toward the stone wall near the entryway. \n\t\t\t\t\t\t*set cunning %-5 \n\t\t\t\t\t\t*set resolve %-5  \n\t\t\t\t\t\t*set health -2\n\t\t\t\t\t\tYour feet pounding against the uneven ground, you reach for the wall but the water smashes into you before you even touch the stones. It tears you from the floor and you are tossed violently. The current pushes you under and then slams you against the floor, making you accidentally swallow a mouthful of the putrid liquid.\n\t\t\t\t\t\t*if (health \u003c 1)\n\n\t\t\t\t\t\t\tSpluttering frantically, you desperately attempt to escape but you are unsuccessful. You are powerless to save yourself, and soon you are dragged into the sinister spikes below.\n\t\t\t\t\t\t\t*goto_scene death\n\n\t\t\t\t\t\tBreaching the surface, you gasp for breath and swim desperately toward the wall. The water starts draining away, sucked into the pit, dragging you along with it. Struggling to breathe and to stay afloat, you draw your dagger just as the current pulls you under the surface. Shutting your eyes to protect them from the filthy water, you blindly strike downwards with your knife. \n\t\t\t\t\t\t\n\t\t\t\t\t\tFortunately, it sinks into the ground and you hold it tightly. It barely holds, shifting in the mud as the waters pull you closer to the pit. Eventually, the last of the water drains away and you find yourself dangling on the edge of the pit. Somehow, miraculously, you are still on solid ground. The stone supporting you shifts ominously, dislodged by the water, and before you can move it suddenly gives way and you plunge into the opening beneath you\n\t\t\t\t\t\t*if ((original) or (eagle))\n\t\t\t\t\t\t\t. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tBefore you can descend, ${boggart} dives toward you,\n\t\t\t\t\t\t*if eagle\n\t\t\t\t\t\t\tlatching onto your robe with his talons and flapping his massive wings. \n\t\t\t\t\t\t\t*goto saved\n\t\t\t\t\t\t*if original\n\t\t\t\t\t\t\tlatching onto your robe with all four hands and legs, flapping his bat-like wings as hard as he can.\n\t\t\t\t\t\t\t*label saved\n\t\t\t\t\t\t\tWith his assistance, you are able to clamber out of the pit and onto level ground. Panting heavily and throwing up filthy water, you crouch on the ground, completely soaked. \n\t\t\t\t\t\t\t*if ((charisma > 64) and (relationship > 54))\n\t\t\t\t\t\t\t\tWhispering a \"thank you\"\n\t\t\t\t\t\t\t\t*goto thank\n\t\t\t\t\t\t\tWordlessly thanking your companion \n\t\t\t\t\t\t\t*label thank\n\t\t\t\t\t\t\tfor saving your life,\n\t\t\t\t\t\t\t*goto gargoyle\n\t\t\t\t\t\t*set health -4\n\t\t\t\t\t\t, ${boggart} powerless to help you in his viper form. \n\n\t\t\t\t\t\tYou fall several feet and though you try your best to avoid impaling yourself, several of the spikes lacerate your legs and arms.\n\t\t\t\t\t\t*if (health \u003c 1)\n\t\t\t\t\t\t\t*goto other_death\n\t\t\t\t\t\tThe injuries from the filthy stakes are incredibly painful, but you manage to stand, trying not to force yourself further onto the spikes. ${boggart} slithers weakly out of your soaking robe and onto your shoulders, looking at you with desperation in his eyes.\n\t\t\t\t\t\t*label coward\n\n\t\t\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t\t\t*label don \n\t\t\t\t\t\t\tSmiling weakly, you say, \"Don't worry, it's just a little water.\" \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe words ring false though, even to you.\n\t\t\t\t\t\t\t*goto mak \n\t\t\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t\t\t\"Don't worry. There is always an opening, always a way to defeat evil. I'll anticipate his tricks this time, and we will succeed!\" you say with as much confidence as you can muster.\n\t\t\t\t\t\t\t*goto mak \n\t\t\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t\t\t\"There is always an opening, always a back door. I'll anticipate his tricks and succeed, wait and see,\" you say, strangely confident.\n\t\t\t\t\t\t\t*goto mak \n\t\t\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t\t\t\"Don't worry, ${boggart}; this vampire is clearly afraid to battle us on level ground, and must instead use dirty tricks. When given the opportunity, I will strike him down permanently,\" you say, strangely confident.\n\t\t\t\t\t\t\t*goto mak \n\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t*goto don \n\t\t\t\t\t\t*label mak \n\t\t\t\t\t\t*if out\n\t\t\t\t\t\t\t*goto out\n\n\t\t\t\t\t\tMaking a loop with your silver chain, you cast it out into the open, hoping to catch something and climb out of the pit. It takes you several attempts, but your chain finally hooks onto a shattered pillar. After testing your weight a couple of times, you're certain it will support you.\n\n\t\t\t\t\t\tGingerly climbing up the chain, you are able to claw your way out of the hole and onto level ground once again. Panting heavily and throwing up filthy water, you crouch on the ground, dripping blood and sewage, soaked to the bone. \n\t\t\t\t\t\t*label out\n\t\t\t\t\t\tShooting your apprentice what you hope is a reassuring look, \n\t\t\t\t\t\t*goto gargoyle\n\t\t\t\t\t\t\n\t\t\t#You curl into a ball, bracing for impact.\n\t\t\t\t*goto plummet \n\n\t\t\t*selectable_if (free) #Swiftly drawing out your chain, you attempt to catch something that will anchor you.\n\t\t\t\t*set cunning %-5 \n\t\t\t\t*set health -5\n\t\t\t\tYou cast the chain through the air at a nearby pillar, but it only holds momentarily, barely even slowing your fall. As you tumble forward, you notice the sinister spikes waiting at the bottom of the pit. \n\t\t\t\t*label free_pit \n\t\t\t\tYou fall several feet and though you try your best to avoid impaling yourself, several of the spikes lacerate your legs and arms.\n\t\t\t\t*if (health \u003c 1)\n\t\t\t\t\t*goto other_death\n\n\t\t\t\tThe injuries from the filthy stakes are incredibly painful. You stand gingerly, trying not to force yourself further onto the spikes.\n\t\t\t\t*if (viper) \n\t\t\t\t\tSlithering weakly out of your soaking robe and onto your shoulders, your apprentice peers up at you with his serpent eyes.\n\t\t\t\t*if ((original) or (eagle))\n\t\t\t\t\t${boggart} alights at the top of the pit, urging, \"Hurry!\"\n\n\t\t\t\tYou hurriedly hook your chain into a loop and cast it through the air, back toward the pillar. It takes several attempts, but the chain finally catches. You give a sharp tug and nothing moves. You begin to climb the chain when you suddenly hear three loud banging noises followed by the sound of rushing water. \n\t\t\t\t*if ((original) or (eagle))\n\t\t\t\t\tThe boggart's head swivels around, panicked, and then he takes frantically to the air. He barely manages to avoid the sewage that cascades down upon you, nearly choking you as it presses you against the wall.\n\n\t\t\t\tYou try to climb the chain but are forced downwards. The putrefying water presses at you, draining into the pit below. You manage to remain above the spikes but you can neither descend nor ascend. Your lungs begin to burn as you wait desperately, holding your breath. You've nearly lost consciousness when the noxious fluids finally begin to subside. Gasping frantically for air, you cling to the chain until the last of the water vanishes. \n\t\t\t\t\n\t\t\t\tOnce the sound of trickling stops, you allow yourself to slide down to the bottom in order to rest. Your robe catches on one of the stakes set up in the pit, but you manage to avoid further injury—for now. \n\t\t\t\t*if (viper)\n\t\t\t\t\t${boggart} slithers slowly out of your robe to slump down onto your shoulders, too weak to hang onto your body any longer. His hiss sounds raspy and strange as he gasps for air, peering up at you with his serpent eyes.\n\t\t\t\t*if ((eagle) or (original))\n\t\t\t\t\tYour companion lands on the pit's rim, peering down at you, desperation in his eyes.\n\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t*label smil \n\t\t\t\t\tSmiling weakly, you say, \"Don't worry, it's just a little water.\" \n\t\t\t\t\t\n\t\t\t\t\tThe words ring false though, even to you.\n\t\t\t\t\t*goto strang \n\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t\"Don't worry. There is always an opening, always a way to defeat evil. I'll anticipate his tricks this time, and we will succeed!\" you say with as much confidence as you can muster.\n\t\t\t\t\t*goto strang \n\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t\"There is always an opening, always a back door. I'll anticipate his tricks and succeed, wait and see,\" you say, strangely confident.\n\t\t\t\t\t*goto strang \n\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t\"Don't worry, ${boggart}; this vampire is clearly afraid to battle us on level ground, and must instead use dirty tricks. When given the opportunity, I will strike him down permanently,\" you say, strangely confident.\n\t\t\t\t\t*goto strang \n\t\t\t\t*else \n\t\t\t\t\t*goto smil \n\t\t\t\t*label strang \n                        \n\t\t\t\tScaling the chain, you finally escape the pit and crawl out onto level ground. After freeing your chain from the pillar, \n\t\t\t\t*goto gargoyle\n\t\t\t\t\t\n\t\t\t\t\t\t*label plummet \n\t\t\t\t\t\t*if free\n\t\t\t\t\t\t\t*goto free_plummet \n\t\t\t\t\t\t\t\t*label free_plummet \n\t\t\t\t\t\t\t\t*set cunning %-5\n\t\t\t\t\t\t\t\tYou plummet downwards, \n\t\t\t\t\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t\t\t\t\t*label com \n\t\t\t\t\t\t\t\t\tcompletely failing to keep calm yourself\n\t\t\t\t\t\t\t\t\t*goto stel \n\t\t\t\t\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t\t\t\t\tyour mind reeling\n\t\t\t\t\t\t\t\t\t*goto stel \n\t\t\t\t\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t\t\t\t\tpanic coursing through your veins \n\t\t\t\t\t\t\t\t\t*goto stel \n\t\t\t\t\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t\t\t\t\tsteeling your mind\n\t\t\t\t\t\t\t\t\t*goto stel \n\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t*goto com\n\t\t\t\t\t\t\t\t*label stel \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tas you notice the sinister spikes waiting at the bottom of the pit.  \n\t\t\t\t\t\t\t\t*if ((original) or (eagle))\n\t\t\t\t\t\t\t\t\tBefore you completely lose contact with the ground, ${boggart} soars toward you,\n\t\t\t\t\t\t\t\t\t*if eagle\n\t\t\t\t\t\t\t\t\t\tlatching onto your robe with his talons and flapping his massive wings. \n\t\t\t\t\t\t\t\t\t\t*goto saved3\n\t\t\t\t\t\t\t\t\t*if original\n\t\t\t\t\t\t\t\t\t\tlatching onto your robe with all four hands and legs, flapping his bat-like wings as hard as he can.\n\t\t\t\t\t\t\t\t\tHe struggles hard, but your weight is almost too much. He nearly loses his grip and you smack your knee into the side of the pit. \n\t\t\t\t\t\t\t\t\t*set health -1 \n\t\t\t\t\t\t\t\t\t*label saved3\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tWith ${boggart}'s assistance, you are able to claw your way out of the decline and onto level ground once again. Staggering to your feet, you quickly thank ${boggart} with a \n\t\t\t\t\t\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t\t\t\t\t\t*label wa \n\t\t\t\t\t\t\t\t\t\twarm\n\t\t\t\t\t\t\t\t\t\t*goto aa \n\t\t\t\t\t\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t\t\t\t\t\tdistracted\n\t\t\t\t\t\t\t\t\t\t*goto aa \n\t\t\t\t\t\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t\t\t\t\t\tnervous \n\t\t\t\t\t\t\t\t\t\t*goto aa \n\t\t\t\t\t\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t\t\t\t\t\tgrim\n\t\t\t\t\t\t\t\t\t\t*goto aa \n\t\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t\t*goto wa \n\t\t\t\t\t\t\t\t\t*label aa \n\t\t\t\t\t\t\t\t\tsmile. You\n\t\t\t\t\t\t\t\t\t*goto brace_free\n\t\t\t\t\t\t\t\t*set health -5\n\n\t\t\t\t\t\t\t\tYou fall down the rocky pit and although you try your best to avoid impaling yourself, several of the spikes lacerate your legs and arms.\n\t\t\t\t\t\t\t\t*if (health \u003c 1)\n\t\t\t\t\t\t\t\t\t*label other_death\n\n\t\t\t\t\t\t\t\t\tSuccumbing to your injuries, you collapse, weakly crying out for ${boggart}. There is nothing left to do…. You strain to keep hold of your life, but your vision soon fades into the inescapable, infinite blackness that is the end.\n\t\t\t\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t\t\t\t*goto free_pit\n\n\t\t\t\t\t\t*if tied\n\t\t\t\t\t\t\t*set cunning %-15\n\t\t\t\t\t\t\t*set health -8\n\t\t\t\t\t\t\tYou plummet downwards, \n\t\t\t\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t\t\t\t*label fail \n\t\t\t\t\t\t\t\tutterly failing to keep calm\n\t\t\t\t\t\t\t\t*goto fat \n\t\t\t\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t\t\t\tyour mind reeling\n\t\t\t\t\t\t\t\t*goto fat \n\t\t\t\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t\t\t\tpanic coursing through your veins \n\t\t\t\t\t\t\t\t*goto fat \n\t\t\t\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t\t\t\tsteeling your mind\n\t\t\t\t\t\t\t\t*goto fat \n\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t*goto fail \n\t\t\t\t\t\t\t*label fat \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tas the spikes grow nearer.\n\t\t\t\t\t\t\t*if (viper)\n\t\t\t\t\t\t\t\tYou fall down the rocky pit. Although you try your best to avoid impaling yourself, several of the spikes lacerate your legs and arms.\n\t\t\t\t\t\t\t\t*if (health \u003c 1)\n\t\t\t\t\t\t\t\t\t*goto other_death\n\t\t\t\t\t\t\t\tThe injuries from the filthy stakes are incredibly painful but you manage to stand, trying not to force yourself further onto the spikes. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t${boggart} slithers out of your robe, plunging his fangs into the wires over and over in an attempt to free you. He finally manages to sever one of the wires but you suddenly hear three loud bangs, followed by a loud rushing sound.\n\t\t\t\t\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t\t\t\t\t*label il \n\t\t\t\t\t\t\t\t\tAll you can think is, [i]not again![/i],\n\t\t\t\t\t\t\t\t\t*goto wav \n\t\t\t\t\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t\t\t\t\tYou vainly attempt to figure a way out of this situation\n\t\t\t\t\t\t\t\t\t*goto wav \n\t\t\t\t\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t\t\t\t\tDread floods your body\n\t\t\t\t\t\t\t\t\t*goto wav \n\t\t\t\t\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t\t\t\t\tGritting your teeth in determination, you brace yourself \n\t\t\t\t\t\t\t\t\t*goto wav\n\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t*goto il \n\t\t\t\t\t\t\t\t*label wav \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tas a wave of liquid sewage cascades down upon you. \n\n\t\t\t\t\t\t\t\t${boggart} darts back into your robe and you suck in a single breath before you are submerged. The water slams against you and forces you to the ground as it drains into the pit, submerging you in the chunky fluid. \n\t\t\t\t\t\t\t\t*goto viper_pit\n                                                \n\t\t\t\t\t\t\tJust before you vanish into the pit, ${boggart} soars toward you, \n\t\t\t\t\t\t\t*if eagle\n\t\t\t\t\t\t\t\tlatching onto your robe with his talons as he flaps his huge wings.\n\t\t\t\t\t\t\t\t*goto saved2\n\t\t\t\t\t\t\t*if original\n\t\t\t\t\t\t\t\tlatching onto your robe with all four hands and legs and flapping his bat-like wings as fast as he can. \n\t\t\t\t\t\t\tHe struggles hard, but your weight is almost too much. He nearly loses his grip and you smack your knee into the side of the pit. \n\t\t\t\t\t\t\t*set health -1 \n\t\t\t\t\t\t\t*label saved2\n\t\t\t\t\t\t\tYou are slammed roughly against the pit's mouth as ${boggart} flaps as hard as he can, barely keeping you from falling. He finally pulls you out, although your legs still dangle in the hole. Panting heavily, he immediately begins severing your bonds with his\n\t\t\t\t\t\t\t*if (original)\n\t\t\t\t\t\t\t\tteeth and claws.\n\t\t\t\t\t\t\t*if (eagle) \n\t\t\t\t\t\t\t\tbeak and talons. \n\t\t\t\t\t\t\t*if (viper)\n\t\t\t\t\t\t\t\tfangs.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou are nearly free, but three small dams set against the sides of the castle abruptly collapse, spilling disgusting water across the ruins and toward where you are lying! ${boggart}, \n\t\t\t\t\t\t\t*if ((original) or (eagle))\n\t\t\t\t\t\t\t\tforced to take off quickly, shoots into the air and barely avoids the wave of swamp water. \n\t\t\t\t\t\t\t*if (viper)\t\n\t\t\t\t\t\t\t\tstill in his viper form, hisses and dives further into your robes.\n\t\t\t\t\t\t\tYou gasp, taking a single breath before the water catches you and forces you downwards. In the tumult, you are thrown from one side of the pit to another, finally being tossed onto the spikes at the bottom.\n\t\t\t\t\t\t\t*label viper_pit\n\t\t\t\t\t\t\t*if (health \u003c 1)\n\t\t\t\t\t\t\t\t*goto_scene death\n                                                                \n\t\t\t\t\t\t\tImmobile and in agony, you are stuck beneath the rushing water with stakes piercing your arms and legs. Your lungs threaten to explode but you close your eyes tightly against the rancid water, forcing yourself to keep holding your breath. Things you can't begin to recognize slap your face and arms, and you begin to truly believe that this is the end. A moment later, the water finally starts to subside, lapping gently by your sides. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou gingerly pull away from the spikes, gasping and throwing up horrible tasting, putrid water. Shaking, you stand up awkwardly between protruding spikes. As blood and sewage drip down your body, \n\t\t\t\t\t\t\t*if ((original) or (eagle))\n\t\t\t\t\t\t\t\t${boggart} stammers his apologies, saying, \"I'm sorry, ${name}! I tried, but the water was too fast.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if relationship > 54\n\t\t\t\t\t\t\t\t\tReassuring your apprentice that there is nothing he could have done to prevent this, \n\t\t\t\t\t\t\t\t*if relationship \u003c 55\n\t\t\t\t\t\t\t\t\tShaking your head impatiently,\n\t\t\t\t\t\t\t\t*goto gargoyle \n\t\t\t\t\t\t\t*if viper\n\t\t\t\t\t\t\t\t${boggart} slithers weakly out of your robe, hissing inquisitively.\n\t\t\t\t\t\t\t\t*if relationship > 54\n\t\t\t\t\t\t\t\t\tYou smile softly, saying, \"I'm fine, ${boggart}. Would you untie me, please?\"\n\t\t\t\t\t\t\t\t*if relationship \u003c 55\n\t\t\t\t\t\t\t\t\tShaking your head impatiently, you say, \"Hurry. Untie me before the vampire attacks again!\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t${boggart} quickly complies, and you stretch your sore limbs as the wires fall to the floor. Unraveling your chain from around your waist, you loop the end and cast it upwards. You are still shaking, but several tries later you manage to wrap your chain around a jagged, broken pillar just outside of the pit. \n\n\t\t\t\t\t\t\tYou give a sharp tug, and nothing seems to come loose. Slowly making your way up the chain, you navigate the slimy sides of the pit and finally roll to a halt on solid ground, ${boggart} appearing by your side. Coughing,\n\t\t\t\t\t\t\t*goto gargoyle\n\n*label gargoyle\nyou clamber to your feet. Meanwhile, a tall figure is emerging from the shadows atop the highest balcony.\n*page_break\n\n*image Sarrivan.jpg     \n*page_break               \nApplauding your actions with a slow, sarcastic clap, the figure utters\n*if tied\n\tmockingly, \"Commendable performance, \n*if free\n\tgravely, \"Truly impressive performance, \ndemon ${hunter}; you have passed my trial, and therefore you are worthy to face me directly in battle.\" \n\nStriding forward into view, the vampire flashes his fangs menacingly.\n*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t*label shin \n\tFlashing your teeth back at him, you respond, \"You've got a pretty smile, but you know, I still think I'll win Lorden's next beauty contest.\"\n\t*goto nor\n*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\tGlancing at his shiny teeth, you shiver unintentionally. \n\t*goto nor \n*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\tYou barely notice his little gesture, as your mind races through all the possible ways he could be defeated.\n\t*goto nor \n*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\tCracking a mocking smile, you say loudly, \"Nice dentures, old man. Were they worth your soul?\" \n\t*goto nor  \n*else \n\t*goto shin \n*label nor \n\t\nLord Sarrivan takes the initiative. Waving his hand in a complex, arcane motion, he procures a purplish-black orb of energy. You tense, but instead of directly attacking you, he thrusts the sphere into a stone gargoyle beside him. The statue is a menacing thing. Spiky wings sit atop its back, and its face is almost like a mixture between a hawk and a lion. \n\nThe gargoyle gives a grating growl, leaping into the courtyard and staring at you intently with its bulbous, violet eyes. As if on cue, the stormy clouds above you suddenly open and you are soaked by a frigid downpour. \n*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t*label sig \n\tSighing inwardly, you mutter to yourself, \"What's next, cats and dogs?\"\n\t*goto grat \n*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\tHmm…maybe it's possible to use this downpour to your advantage.\n\t*goto grat \n*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\tHmm…this rain may actually mask your footsteps and give you an edge.\n\t*goto grat \n*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\tGreat, just great. [i]But then, this is how it always goes with vampires[/i], you think. Ugh, vampires.\n\t*goto grat \n*else \n\t*goto sig \n*label grat \n\n\nAs the sky continues to weep, a bolt of lightning illuminates the scene for just a second before fading away, replaced by a heavy rumble of thunder. In the brief glow, you see the gargoyle hefting a huge stone from a pile of debris. A moment later, he heaves the boulder in your direction with astonishing strength. \n*choice\n\t#Raising your staff, you attempt to block the boulder.\n\t\t*set cunning %-15\n\t\t*set health -5\n\t\tPlanting your feet firmly, you force your staff into the ground right in the path of the rock. It hits your weapon with a mighty crack, sending splinters flying. The force slams you to the ground, your staff flying from your numbed hands.  \n\t\t*if (health \u003c 1)\n\t\t\t*goto other_death\n\t\tYou stagger to your feet in great pain, breathing shallowly. Your torso is swelling where you have cracked at least a couple of ribs.\n\t\t*goto immune \n\n\t#Using your hood as a slingshot, you take advantage of the rock's momentum.\n\t\t*set resolve %+3\n\t\t*set cunning %+3 \n\t\tA quick movement releases the fabric, and you neatly catch the rock in your improvised slingshot. Struggling to maintain your balance, you use the stone's momentum to swing it in an arc, sending it soaring back toward the unsuspecting monster. It smashes straight into his face, cracking it like ice and throwing him to the ground.\n\n\t\tYou rush forward with your staff, bringing it down on his shattered nose. Fragments of stone go flying with each blow. Roaring in anger, he rears onto his hind legs. Though he lashes out with his claws, you force\n\t\t*label impale\n\t\tyour staff's blade between the gargoyle's bulbous eyes, cracking his face in half. The stone animation crumples motionless to the ground, the light in his eyes fading away.\n\t\t*finish Continue\n\n\t#You attempt to dodge the flying boulder.\n\t\t*if stealth \u003c 55  \n\t\t\t*set cunning %-5\n\t\t\t*set health -2\n\t\t\tThe rock flies through the air, and you frantically dive to the side. You are not quite fast enough, and it catches your shoulder with a slapping sound. Shooting pain radiates all the way to your fingers, your arm going numb.\n\t\t\t*if (health \u003c 1)\n\t\t\t\t*goto main_death2\n\t\t\tStaggering to the side, you nearly overbalance but manage to remain standing. Bringing your fingers tenderly to your arm, you \n\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t*label leg \n\t\t\t\tsmile through the pain, saying to yourself, \"Talk about underpaid. This battle is costing me an arm and a leg!\"\n\t\t\t\t*goto git \n\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\trealize the sturdy rocks may actually give you an advantage in fighting this construct.\n\t\t\t\t*goto git \n\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\twince in pain, cursing at yourself for not being able to evade the rock in time.\n\t\t\t\t*goto git \n\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\tgrit your teeth, cursing under your breath.\n\t\t\t\t*goto git \n\t\t\t*else \n\t\t\t\t*goto leg \n\t\t\t*label git \n\t\t\t\t\n\t\t\tYour arm is visibly swollen and covered with blood, but you seem to be able to move it freely enough. Perhaps nothing is broken, after all.\n\t\t*if stealth > 54\n\t\t\t*set cunning %+3\n\t\t\t*set stealth %+3 \n\t\t\tThe rock flies through the air but you dive to one side and it misses you completely, exploding against the ground behind you. You breathe a sigh of relief, quickly standing and settling into a defensive crouch. \n\t\tClearly, you will need something powerful to defeat this stone monster.\n\t\t*goto immune \n\t\t\t*label immune \n\t\t\t*if ((darts> 0) and (concussion > 0))\n\t\t\t\tDarts and concussion grenades are useless against an animated rock, and the\n\t\t\t\t*goto staff_knives\n\t\t\t*if ((darts > 0) and (tear > 0))\n\t\t\t\tDarts and tear gas grenades are useless against an animated rock, and the\n\t\t\t\t*goto staff_knives\n\t\t\t*if (darts > 0) \n\t\t\t\tDarts are useless against an animated rock, and the\n\t\t\t\t*goto staff_knives\n\t\t\t*if ((tear > 0) or (concussion > 0))\n\t\t\t\tYour grenades would be useless against an animated rock, and the\n\t\t\t\t*goto staff_knives\n\t\t\tThe \n\t\t\t*label staff_knives\n\t\t\tchemicals instilled inside your staff will have little to no effect. Your iron shavings will have absolutely no effect. \n\t\t\t*if ((destruction = 1) or (poison))\n\t\t\t\tHeavy explosives are the most sensible solution, then. \n\t\t\t*label fight_gargoyle\n\t\t\tThe gargoyle suddenly lunges forward, baring his teeth. So it begins.\n\t\t\t*choice\n\t\t\t\t*selectable_if (poison) #Venefira's poison vials should make a nice explosive!\n\t\t\t\t\t*set cunning %+3\n\t\t\t\t\t*set poison false\n\t\t\t\t\tYou move quickly, unraveling the poison vials from your waist, then use your flint to light the wick you tucked into one of the vials last night when you sorted through your weapons. As the gargoyle approaches, you cast the vials through the air. The contents abruptly ignite and detonate in an impressive cloud of pitch-black smoke, vibrant greenish fire, and raw power.\n\t\t\t\t\t*label blast_gargoyle \n                                \n\t\t\t\t\tRunning forward, you thrust the tip of your staff into his face. He has been greatly weakened, cracked by the blast. The blow connects, impaling\n\t\t\t\t\t*goto impale\n\n\t\t\t\t*selectable_if (destruction=1) #The destruction grenade will utterly destroy this creature.\n\t\t\t\t\t*set cunning %+3 \n\t\t\t\t\t*set resolve %+3 \n\t\t\t\t\t*set destruction -1\n\t\t\t\t\tPlucking the weapon from your satchel, you activate it and cast it through the air at the oncoming beast. The grenade detonates in a cloud of pitch-black smoke, vibrant fire, and raw power, \n\t\t\t\t\t*goto blast_gargoyle\n\n\t\t\t\t#Raising your weapon, you prepare for a melee battle.\n\t\t\t\t\t*set cunning %-5  \n\t\t\t\t\t*set health -3\n\t\t\t\t\tThe pounding rain soaks everything, making you even colder than before. The golem charges forward, unaffected, but you can barely see through the freezing downpour. Attacking with your staff, you find the blades only bounce off his rocky skin with a sputter of sparks. He swerves back toward you. His temple is just at the height of your waist, and you swing your staff, two-handed, into his head. \n\t\t\t\t\t\n\t\t\t\t\tThe blow cracks an outer layer of stone, and the gargoyle sticks out his tongue, saying something incomprehensible in a gravelly voice as he charges. You try to run but slip on the wet ground, and he lands on your chest with a horrible cracking sound. Climbing off, he bats at you with muddy paws. Your mad scramble to escape sends you into a muddy slide down the hill. \n\t\t\t\t\t*if (health \u003c 1)\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou struggle to rise but you are overtaken by fatigue and injury. Powerless to evade or counter the gargoyle's attack, you kneel, helpless, as he engulfs your head in his cavernous mouth. There is a sickening crunching noise as he decapitates you with a spray of blood and gore.\n\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t\t\t\n\t\t\t\t\tStumbling to your feet, completely covered in mud and soaked to the bone, you see the gargoyle hurtling down the hill to finish you. Direct methods are not working. You need to come up with a plan that suits you better than this. The stone animation is slipping on the wet ground, slowed by the downpour. You wheeze, catching your breath, and quickly formulate a plan.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t*selectable_if (charisma > 54) #\"Hey, Mister Gargoyle, look! A fish!\" you cry, pointing toward the swamp.\n\t\t\t\t\t\t\t*set health -1  \n\t\t\t\t\t\t\t*set cunning %-3  \n\t\t\t\t\t\t\t*set charisma %+3 \n\t\t\t\t\t\t\tYou're pleasantly surprised when the statue jerks his head to the side, flying past you and toward the swampy waters. He begins to bat at the surface of the swamp with his massive paws, his eyes searching frantically for the fabled prey. Lucky you! Dashing forward, you ram your staff into the beast using both hands, pushing with all your might. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe golem lets out a roar of what could only be surprise as he pitches forward into the murky water with a gigantic splash. He lurches around, raking his eroding claws across your chest. Gasping in pain, you stagger back, out of reach.\n\t\t\t\t\t\t\t*if health \u003c 1 \n\t\t\t\t\t\t\t\t*goto other_death \n\t\t\t\t\t\t\t*goto hill \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t*selectable_if ((cunning > 54) and (stealth > 54)) #The gargoyle might sink in this rain-swollen bog like the rock that he is, if you time things correctly.\n\t\t\t\t\t\t\t*set cunning %+3 \n\t\t\t\t\t\t\t*set stealth %+3 \n\t\t\t\t\t\t\tYou stand your ground as he approaches. As he lunges at you, jaws wide, you dive to the side at the last possible second. The beast's glowing eyes follow you with an expression that could almost be surprise as he plunges helplessly into the swamp with a gigantic splash. \n\t\t\t\t\t\t\t*label hill \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tMoments later, he is lost from sight, plunging farther into the depths of the swollen swamp. Exhaling deeply, you carefully make your way back up the marshy incline, barely able to keep your footing in the downpour.\n\t\t\t\t\t\t\t*finish Continue\n\n\t\t\t\t\t\t*selectable_if (resolve > 54) #You lure the gargoyle into the spike-filled pit.\n\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t*set health -1 \n\t\t\t\t\t\t\tAs the stone animation regains his footing, he surges toward you and bares his blunt, eroded teeth. Lunging through the air, he opens his cavernous mouth, aiming at your head, but you swiftly dodge backward. He collides with a nearby tree, giving you time to sprint up the hill. Every other step sends you skidding down again as the downpour intensifies.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tPerfect. This is exactly what you needed. Not daring to look behind you, lungs burning, you press toward the top of the hill. A ferocious roar adds some extra incentive, and you finally reach the ruined courtyard. Without warning, stone teeth grasp your ankle. Just before you sprung your trap, you find yourself sprawled on the ground and at the beast's mercy. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tHe is about to crush your leg, when ${boggart}\n\t\t\t\t\t\t\t*if ((eagle) or (original))\n\t\t\t\t\t\t\t\tsoars above you, screeching desperately at the aggressor. The gargoyle looks upward curiously, \n\t\t\t\t\t\t\t*if (viper)\n\t\t\t\t\t\t\t\tdarts out of your robe, hissing vehemently. The gargoyle glares at him with a puzzled expression, \n\t\t\t\t\t\t\tgiving you just enough time to free yourself. Twisting your foot violently to the side, you manage to pull it free of your boot\n\t\t\t\t\t\t\t*if (health \u003c 1)\n\t\t\t\t\t\t\t\t, but your fatigue and injuries send you to the ground, hunched over in pain. You have no chance of evading the gargoyle. It leaps onto your torso, pinning you down. Your last feeling is the bursting of your heart as your chest caves, spraying blood and gore.\n\t\t\t\t\t\t\t\t*goto_scene death\n\t\t\t\t\t\t\t. As he hurtles forward, you run swiftly to the pit and turn to face him, standing boldly on its edge. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tAs he lunges, you dive to one side. His glowing eyes follow you with an expression that could almost be surprise, and he plunges helplessly into the watery pit with a massive splash. He is impaled on the spikes below, and the rushing water pulls him to pieces. As you watch, the violet glow from his eyes fades gradually and the pit darkens again.\n\t\t\t\t\t\t\t*finish Continue\n\n\t\t\t\t\t\t#You continue to fight stubbornly with your staff.\n\t\t\t\t\t\t\t*set resolve %+3\n\t\t\t\t\t\t\t*set cunning %-15\n\t\t\t\t\t\t\t*set health 0\n\t\t\t\t\t\t\tAs the stone animation regains his footing, he surges forward with mouth opened and blunt, stony teeth bared. Lunging through the air, he aims his jaws for your head but you duck, plunging your blade into his stomach. The beast merely growls at you, looking almost annoyed. He slams you down and sits on top of you. Crushed, you can barely breathe.\n                                                \n\t\t\t\t\t\t\tHe leans forward for a bite, when ${boggart}\n\t\t\t\t\t\t\t*if ((eagle) or (original))\n\t\t\t\t\t\t\t\tsoars above you, screeching desperately. The gargoyle looks upward curiously, \n\t\t\t\t\t\t\t*if (viper)\n\t\t\t\t\t\t\t\tdarts out of your robe, hissing vehemently. The gargoyle glares curiously at this new creature,\n\t\t\t\t\t\t\tgiving you just enough time to free yourself. You twist frantically and crawl away. He follows, but you swing your staff at him, which remarkably has remained in your hand. Your blow splinters his face, dislodging one of his glowing eyes and opening a small crack in the stone. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe gargoyle appears momentarily stunned. You take your chance and draw your dagger, plunging it roughly into the fissure and twisting hard. He roars in what could possibly be agony. Gritting your teeth, you draw back for another attack, but the beast suddenly slams its paws onto your sides before
