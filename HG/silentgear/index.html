ning. She's like an older sister to me.\"\n\t\t\n\t\tYou notice a look of contentment from her as she dropped the topic. \n\t\t\n\t\t\"Shall we go again?\"\n\t\t\n\t\t\"I'd rather you play with Felix. He's a more satisfying match for you.\"\n\t\t\n\t\t\"I think you're a perfect match for me.\"\n\t\t\n\t\t\"...\"\n\t\t\n\t\t\"Calm down. I'm just trying to have some fun by messing with you.\"\n\t\tSnorts ensue.\n\t\t\n\t\tThere was plenty of wit in her responses. You weren't sure if it was the tough chess game that was making you think hard or her reactions.\n\t\t\n\t#I've been trying to hide how I feel about her\n\t\t\"Oh, I see.\" A hint of disappointment could be heard from her response. \n\t\t\n\t\t\"I'm kidding. Catherine is a very dependable comrade. She helped me out a lot during our first mission. She's really good at sneaking around and covering a lot of ground. I was surprised they gave me the assignment of sneaking you out instead of her.\"\n\t\n\t\t\"You didn't want to rescue me??\" A large frown was now about to form in between her cheek bones.\n\t\t\n\t\t\"No no no, that's not what I meant.\"\n\t\t\n\t\t\"I'm just kidding too. Now we're even.\" Her reaction is followed by a few more snorts.\n\t\t\n\t\tYou can tell that she's always on her toes. This is a woman with a brain who isn't afraid to use it. You begin to think the snorting was nature's way of evening out her positive qualities with a few undesirable ones. \n\n\t#I'd rather go out with you\n\t\t\"Oh, really?\" You can see a faint blush from her cheeks.\n\t\t\n\t\t\"Yeah, I could use a proper lunch partner. Catherine has this really insane appetite that grosses me out. I've never seen a woman eat so much. I'm guessing you're a better sight to behold while eating.\"\n\t\t\n\t\t\"Oh, just as a lunch partner?\"\n\t\t\n\t\t\"Yeah. Is there any other 'date' we could do in a place like this?\"\n\n\t\t\"Touche.\"\n\n*page_break\n\t\t\n\"I'm only comfortable talking to you like this. I never give out more than a sentence to other people in this place. I feel as if they don't trust me at all. Even Catherine gives me a strange look sometimes.\" Selene continues\n\n\"We haven't had a defector among our ranks before. People just need more time to get used to you. It didn't take me that long to get used to you.\"\n\n\"Yeah but that's because you don't look at me the way other people look at me.\"\n\n\"How do they look at you?\" \n\n\"Like the guards at the research facility.\"\n\n\"That's why you've got your cycling shorts, right?\"\n\nAfter a few more harmless jokes, Selene bids you good night. \n\n\"I wish I could stay longer.\" She says as she opens the door to your quarters.\n\nYou begin to wonder what it would feel like to spend just a little more time around her. You wonder if you should ask her to stay... ...\n\nDo you ask her to stay for the night?\n*choice\n\t#Yes\n\t\t\"If you like, you can stay for the night Selene.\"\n\t\t\n\t\t\"Do you ... want me to stay?\" Her eyes wide and big. You're not sure if she's shocked or surpirsed or excited to hear the request.\n\t\t\n\t\t\"Yes, stay with me Selene.\" You reply confidently looking into her big blue eyes.\n\t\t\n\t\tBoth of you enjoys a wonderful night together.\n\t\t*set playerhold 1\n\t\t*set selrel +13\n\t\t*goto ep2pg14\n\t\n\t#No\n\t\tYou decided to best not push for it and walks her out with a hug.\n\t\t*set playerhold 0\n\t\t*goto ep2pg14\n\n*label ep2pg14\n*page_break\n\n*set saveload21 true\n\nPROGRESS SAVED . . .\n\nShould you die in the following section, you will be able to replay from this point on.\n\n*goto savegame21\n*label endsaveload21\n\n*page_break\n\nYou went on a few more missions in the following month, your mind was always on coming back to enjoy the company of Selene. She visits you as often as she can, only skipping out when she had to pull all nighters in the research labs. Both of you seemed to turn to eachother for all your joys and troubles. Once in a while, you noticed something strange on your computer. It'll say \"Sorry, you've entered an invalid password.\" before you login. You didnt put much thought into it, maybe you bumped into the keyboard and it typed something.\n\n*page_break\n\nA few days later, you suddenly woke up to the sound of an explosion from above. \n\nCatherine calls you \"${name}, we're under attack by the HILO, they've already breached the docking bay where the XT-90 prototype gunship is located.\" \n\n\"What? how did this happen? I thought our academy is off the radar.\"\n\n\"I don't know but get your gear from the Armory and head for the docking bay, we need support there the most.\"\n\n*if (playerhold =1)\n\tYou rush to get dressed and notice Selene is gone already, She probobly left early to work in the labs, you worry if she's ok.\n\t*goto ep2pg15\n*else\n\tYou rush to get dressed and worry if Selene is ok.\n\t*goto ep2pg15\n\n*label ep2pg15\n\nThe sound of gunfire and explosions immediately shakes your senses wide awake. Your training in sudden emergencies reminds you to gear up right away. \n\nYour equipment is in the armory - two floors down your dorm. You aren't exactly sure how many of the enemy are there or where they've already infiltrated. \n\nYou rub your head and decide on a plan of action before heading out into the chaos that was happening within the academy.\n\n*sound singleexplosion.mp3\n*choice\n\t#Head for the Armory\n\t\tYou storm through your door and make a mad run towards the armory. As you expected, a brutal mix of AROC uniforms and HILO uniforms greet your exit. Your co-ensigns are outnumbered and outgunned. The HILO soldiers came equipped with shields and a strange type of weapon. It looked like a trident that fires glowing projectiles that pierce through armor. You see several of your comrades fall after a single shot that ricochets when hitting flesh.\n\n\t\tTerror and adrenaline fills your gut.\n\t\t\n\t\t\"What is that??\" You exclaim. You make a mental note to ask Felix about it when you spot him.  \n\t\t\n\t\t\"Selene.\" You tell yourself. The urgency to prepare for battle to rescue Selene was your top priority. Being equipped would make you better prepared to protect Dr. Askler.\n\t\t\n\t\tYou reach the staircase going down to the armory but things aren't going to be that easy for you. As you head down the stairs, you hear \n\n\t\tmultiple footsteps coming from the bottom of the staircase. You aren't sure if the people going up are AROC or HILO. You take a peek and notice that they're AROC.\n\t\t\n\t\t\"Ensign ${Name} here!\" You shout.\n\t\t\n\t\t\"Come down, quick! Grab a gun!\" One of the group members respond. You meet halfway down the staircase. Your comrades are armed to the teeth as you observe them.\n\n\t\t\"Watch out for those trident weapons! They bounce off flesh onto other targets!\"\n\t\t\n\t\t\"We're screwed!\"\n\n\t\tYou ignore the call of despair and arm yourself. Because of the urgency of the situation, you immediately grab a Grimlock Pulse Rifle and a few Frag and EMP grenades.\n\t\t\n\t\t*sound hilotrident.mp3\n\t\t*goto ep2pg15B\n\t\n\t#Immediately look for Selene\n\t\tYour concern for Dr. Askler's safety overrides your desire to arm yourself. You recall all your hand-to-hand combat training.\n\t\t\n\t\t\"I hope Catherine is nearby.\" You thought to yourself. She would be the perfect companion at a time such as this. \n\t\t\n\t\tYou immediately kick down the door to your quarters and are greeted by a HILO soldier. He doesn't have a shield, though, but is holding a strange trident-looking weapon. Your confidence grows. \n\t\t\n\t\t\"Lucky. I've been trained to handle people with polearms!\"\n\t\t\n\t\tYou make a dash for the soldier. He is a few meters away. You suddenly notice him point the trident at you. It is then you realized the foolishness of your choice. The trident wasn't used as a polearm. It is a projectile-launching device. It seems as if this invasion was also a field test of a new weapon they had developed. A white beam shot right through your shoulder. He aimed for your heart. \n\t\t\n\t\tGAME OVER\n\t\t*sound hilotrident.mp3\n\t\t*goto dead21\n\n*label ep2pg15B\n*page_break\n\nYou and the group fought your way to the docking bay, after you ran out of EMP grenades for the BDS, your team overwhlems the rest of the robots with sheer fire power. It was a long hard fight, eight of the AROC members were lost during the battle but the BDS were eventually destroyed.\n\nUpon reaching the docking bay, you spot Selene, behind one of the crates for cover. She has a laser pistol, but seems quite scared and isn't able to provide much support. Seeing she needs your help, you rush to her side.\n\n\"Are you ok Selene?\"\n\n\"I'm scared ${name}.\" Her hands shaking holding the laser pistol.\n\n\"Don't worry, I'm here now, stick with me.\"\n\n\"Here, take this letter.\" Selene hands you a small folded paper.\n\n\"What's this?\"\n\n\"Just read it later ok?\"\n\n\"Alright.\" A bit confused, you stuff the letter in your pants pocket.\n\n*page_break\n\nYou took down a few more HILO soldiers and assess the situation. It's not a good one, most of the AROC members are downed, and HILO has already taken control of the prototype gunship, using its firepower to desecrate the area. \n\nYou suddenly hear a broadcast coming from the gunship \"AROC members, surrender now, we have you all surrounded, you may be spared if you comply, if not, enjoy your last moments of being alive.\"\n\nThere were only about 6 of you left spread out in the area now, one by one, they came out of cover and surrendered. With no choice, you do the same with Selene.\n\nA gentle familiar whisper reaches your ear \n\n\"I'm sorry ${name}.\" \n\nA sharp pain pierced through in the back of your abdominal area. You look down and see a punctured laser wound on the right side of your stomach. Holding your wound, unwillingly, you kneel down from the pain. Selene walk pass you, dropping her laser pistol and joins the commander at the gunship. You drop to the floor and hears \n\n\"Good work Selene.\"\n\n\"Thank you father.\"\n\n\"Kill the rest of them.\"\n\nYou drift into unconciousness.\n\n*sound laser.mp3\n*page_break\n\nYou awake in the medic center, with Catherine beside you\n\n\"How long was I out Catherine?\" You struggle with a headache.\n\n\"About two days, how are you feeling now?\" \n\n\"Headache, abdominal pain, so what happened?\"\n\n\"Selene was a HILO spy, sent to infiltrate our academy. She shot you in the back, and her father gave the order to kill the rest of our members, even though they surrendered...\" Catherine clutching her teeth through her cheeks. \"Not long after they left, our reinforcements came from another AROC academy and finished the clean up.\"\n*if (ep1dead = 2)\n\t\"Todd was also killed during the assault. One of the BDS got him.\" Catherine said. She seems to be better at holding back her emotions now.\n\t*goto ep2pg16\n*elseif (ep1dead = 1)\n\t\"Robby was also killed during the assault. One of the BDS got him.\" Catherine said. She seems to be better at holding back her emotions now.\n\t*goto ep2pg16\n*else\n\t*goto ep2pg16\n\t\n*label ep2pg16\n\nAt this moment, Felix came in. \"Hey ${name}, I'm glad you've made it.\"\n\n\"Thanks Felix, how bad is the damage?\"\n\n\"Well, Selene took most of the data on the prototype gunship and wiped our database clean. Fortunately, I made a personal backup, so we should be back on track within the week. She also sabotaged our mech suit development project, setting us back a few months time, but it's still recoverable.\"\n\nFelix shaking his head \"Who would have thought, Selene must be very capable spy for her father to send her in here like that.\" Felix continues \"Anyway ${name}, I also have some personal bad news for you as well, the AROC council has reasons to believe you plotted with Selene on this sabotage, so when you recover, they're going to put you on court trial. I'm sorry ${name}.\"\n\nFelix goes on to tell you that since Selene's return, HILO has fully developed the mech suit robotic technology and began production now, soon they will have fully researched the prototype NUCP gunship as well, then HILO will dominate the battle field. Currently, NUCP seemed to be occupied with attacking HILO with their fully operational XT-90C Gunship. But the mech suits seems to have balanced the power for HILO.\n\n*page_break\n\nA couple days later, you suddenly remember the letter Selene gave you before she parted. Your original clothing is still neatly folded by the closet. You Search in your pants pocket, it's still there!\n\nYou unfold the letter while no one else is in the room:\n\n\"${name}, if you're reading this letter, then I've succeeded in saving you. My father wanted to execute as many AROC members as he could, I'm not sure how I've saved you, and I'm sorry if it was extreme. I know it's too late to say this now, but ${name}, I really did enjoy our time together, even though fate has us as sworn enemies, I can't deny that my feelings for you are real. Take care of yourself ${name}, whatever happens, stay strong. - Selene\"\n\nYou're not sure what to feel, betrayal? Love?\n\n*page_break\n\nA faint knock came to your dorm room quarters as you were reading Selene's letter for the tenth time.\n\n\"May I come in?\" Catherine's familiar voice penetrates through the door.\n\nShe was in her uniform. You remember your remark about Catherine while playing chess with Selene. Catherine's small frame looked very alluring in the size-S fatigue. Her legs aren't big and muscular. One would easily make the mistake of under-estimating Catherine in a running match.\n\n\"Are you ready?\" She asked, taking a seat by your side on the bed. You're too preoccupied with the letter to get up.\n\n\"I'm not worried about the trial.\"\n\n\"That's what worries me.\" She responds. You feel her eyes upon you as you turn around to face the wall. \"Do you still want her?\"\n\n\"I can't really answer that question right now.\"\n\nYour thoughts revolve around the possibility of never being loved by Selene. If there weren't any emotions from her at all, that would have made you the most naive soldier in AROC. The possibility was fairly large concerning the ease at which you feel for her.\n\n\"I think she was just using you the whole time.\" Catherine let out, as if reading your mind.\n\n\"What makes you so sure about that?\" You replied. Catherine's comment got your attention and forced you to get off the bed.\n\n\"She's a defector. Plain and simple. You can't trust a defector. They have no sense of loyalty.\"\n\nHer point was valid and it stung you like a snake bite. \n\n\"She was different!\"\n\n\"She was trained to be different!\"\n\n\"She spared me!\"\n\n\"Yes, like a pet!\"\n\n*page_break\n\nYour fist found the wall. You know well that Catherine was right but you didn't want to deal with the possibility that your romance was just a ruse. You wanted it to be real.\n\n\"I'm not here to anger you, ${Name}, I'm here to make sure you get acquitted during your trial.\"\n\n\"What does it matter if I get acquitted.\"\n\n\"It matters to me!\" She let out, pushing you in the process. \n\n\"We made a promise to each other to make it big here. Do you still remember that?\"\n\nYour thoughts go back to training with Catherine. After initiation, the two of you agreed that you would make careers for yourselves within AROC. You had each other's back.\n\n\"I still have your back.\" She says, placing her hand on your shoulder. \"Focus on getting acquitted. After that, we can deal with the bitch that backstabbed you as a team.\"\n\n\"Thank you, Catherine.\"\n\n\"No one has the right to run you around in circles. That's my job!\" A smile could now be seen on her face. You try to force one out as well to reciprocate her earnest intentions.\n\n\"You don't have to tell them every detail of your relationship with Selene. Don't give them a reason to think you contributed to her intel gathering.\"\n\n\"Why do you think I should ?\"\n\n\"Just trust me on this. I read the court agenda. Felix hacked the databases and read the background on your inspector. They're aiming to kick you out on grounds of conspiring with the enemy.\"\n\n\"You want me to lie?\"\n\n\"I want you to tell them that she used you. Nothing more. I know you don't believe she had no feelings for you. That's fine. But at least shed some of that pride before the court.\"\n\nHer arguments made plenty of sense. For the first time in days, someone had finally talked some sense into you.\n\nYou look back on your relationship with Catherine. She was mostly the voice of reason among you two. You were the emotional one. She was always about getting results done in the most efficient manner. \n\n\"Thank you, Cat.\"\n\n\"Don't ever call me that in front of other people ok?\" She jokes, closing the door to your quarters.\n\nWith a firm direction in mind, you set aside your bruised ego and prepared for your trial.\n\n*page_break\n\nYou been escorted to the court. Placed in the middle of a raised platform in a circular room, you are surrounded by the council and judges on all sides.\n\n\"Initiate ${name}, you are on trial today for the suspected treason in associated with the recent attack commenced by Dr Selene Askler.\" \n\nYour heart beats a bit faster from the pressure.\n\n\"During the period when Dr. Askler was here, were you involved in a relationship with her?\"\n\nYou thought about what you're going to say. \n\nSelene did visited you often after work, whether you were in a relationship with her or not, it would appear to be so in the public eye.\n\nOn the other hand, admitting to a relationship may be used against you.\n\n\n*fake_choice\n\t#Yes, I was in a relationship with her\n\t\t\"Yes, I was in a relationship with Selene, but I did not participate in the plotting of the attack.\"\n\t\n\t#No, I was not in a relationship with her\n\t\t\"No, even though we were close friends, we were not in a relationship.\"\n\t\t\nSome of the council and judges noted down your response.\n\n\"During your encounter with Selene Askler, did you notice any clue or suspicion leading up to the attack?\"\n\nYou suddenly recall your computer having \"invalid password\" entries, could that possibly have been Selene trying to access your emails? \n\nWould mentioning this hurt you? That you knew something was wrong but didn't bother to bring it up?\n\nYour mind races to decide what to say next:\n\n*fake_choice\n\t#Mention the invalid password entry attempts\n\t\t\"There were some attempted entry to my computer login, which I didn't notice at first, but now come to think of it, it must be Selene trying to gain access.\"\n\t\t\n\t#Don't mention the failed entries to your computer \n\t\t\"None, she didn't do anything out of the ordinary and I was fully convinced she was on our side.\"\n\t\t\n\"Are there anything in your possession that would be evidence to prove your innocents?\"\n\nYou recall the letter she wrote you, but this is a private letter, would this be helpful for your innocence or be used against you? You're not sure, but and you don't have much time to decide, the judges are waiting for your response:\n\n*fake_choice\n\t#I show them Selene's departing letter\n\t\t\"Here is a letter Selene gave me just before she rejoined HILO.\"\n\t\t\n\t\tA guard took the letter from you and presented to the judge, whom slot it into the folder.\n\t\n\t#I Decline\n\t\t\"None, I don't have anything to help prove my innocence\"\n\t\t\n\"This court is adjourned, we will review all the evidence and issue the verdict tomorrow.\"\n\nThe following day, you return to the court and anxiously wait for your fate...\n\n\"The court has decided that initiate ${name}, is deemed... ... not guilty of suspected treason.\"\n\nYou hear loud relieves from your friends in the back, as if Felix and Catherine were holding their breaths the whole time.\n\n*page_break Episode 3\n\nSeveral days have passed since your trial. With Catherine's help, you focused on regaining your composure and confidence as a soldier. \n\n\"Are you guys excited about your next assignment?\" An eager Felix paid a visit to you two while working out at the gym.\n\n\"Never thought I'd see a geek in the gym.\" Catherine stated. She took the utmost joy in making fun of Felix.\n\n\"Never thought I'd see a woman eat four burritos in one sitting.\" Felix was the kind to never back down from trash talking.\n\n\"Anyway, we're going to send you guys into the NUCP territory to claim those alien remains. Looks like Dr.Askler brought the intel on the alient artifact back to HILO.\" Felix continued \"Now everyone wants their piece of the pie... including us.\"\n\n\"I wish those aliens had left their remains somewhere closer. They're making things hard for us.\" Catherine added. \n\n\"I've also got good news for you, ${Name}. We're giving you control over a platoon. We're short on manpower here after that HILO raid, so they had to give out some emergency promotions. You're now a squad leader you slick bastard.\"\n\n\"Not too shabby after getting court-marshalled huh?\" Catherine added.\n\n\"Will you be working with us on this one, Felix?\" You asked.\n\n\"Someone has to act as your guardian angel. You guys are my favorite team. I also want to get even with an enemy researcher spy. Maybe you can help me out there, ${Name}.\"\n\nYou remain silent, Felix picks up on your discomfort of talking about Dr.Askler, so he changes topic.\n\n*page_break\n\n\"After we cleaned up the academy, we were able to salvage some of those trident thingys the enemy was using. It looks like we got ourselves a next gen weapon now.\" Felix said while re-adjusting his glasses for a more serious look. \"We got a little insight on how the tridents worked and reverse-engineered some of that technology into our existing weapons. Check the mission log. It should have been sent to you already. You're gonna love it.\"\n\n\"You're getting a hard-on just thinking about it.\" Catherine added, pointing to Felix's crotch.\n\nFelix left the gym after a few more desperate insults for Catherine. \n\n\"I don't think she's going to be on this mission.\" Catherine knew what you were thinking about.\n\n\"Usually, research experts will have to wait at HQ at the ready in case their boys bring home the bacon.\"\n\n\"I know. I don't think she'll be there either.\"\n\n\"Have you already thought about what you're going to do when you see her again?\"\n\nYou stay silent again.\n\n\"Looks like you still have a lot to process. For your sake, I hope she doesn't show up. It might cost you more the next time you let your guard down.\"\n\n\"Don't worry. I'll be ready when that happens.\" You reassure Catherine. She likes the look of determination on your face and drops the topic.\n\nYou finish your work out and head back to your quarters to check the mission details. \n\n*label archive3\n\nYou read through the list of choices on your computer screen:\n\n*choice\n\t\n\t#Mission Briefing\n\t\t\n\t\tAgent ${name}:\n\t\t\n\t\tReconnaissance reports have pointed out the location of the remains of an alien visitation site said to have been responsible for the technology behind the XT-90 Gunship.\n\t\t\n\t\tThe site is located on an island within the South China Sea. This area is under the jurisdiction of the NUCP. The coordinates have been uploaded to your wrist-locators for your reference.\n\n\t\tYour task is to neutralize all guard personnel within the area and retrieve as many alien artifacts as possible. \n\t\t\n\t\tUtilize the Inanimate Object Particle Displacement Manipulation Unit to send the artifacts to HQ as soon as you neutralized enemy forces. Be on the look-out for high-ranking NUCP commanders as this target is a high priority area. They will have their best people on guard duty. As squad leader, you will be given control and command over a unit of 5 personnel. Their individual files are found in a separate file included in this briefing report. Each member specializes and a particular aspect of NUCP warfare and weapons. They will assist in neutralizing enemy guards.\n\t\t\n\t\tYour mission begins in 0800 hours on November 3, 2058 at docking bay 6C.\n\t\t\n\t\t*page_break Back\n\t\t\n\t\t*goto archive3\n\t\n\t#Squad Members Profile\n\t\t\n\t\tCatherine Gibbons: Forward scout, infiltration and stealth expert. Equipped with Cloaking Field, Hawlar Burst Laser SMG, Zorva Plasma Blade and Legs Augmentation.\n\t\t\n\t\tCharlie Penrose: Heavy Support Infantry. Newly graduated from the Academy. Equipped with a HE Scrumk Shotgun, Frag Grenades and Zorva Plasma Blade.\n\t\t\n\t\tIsaiah Reeves: Heavy Support Infantry. Survivor of recent HILO Raid. Equipped with a HE Scrumk Shotgun, Frag Grenades and Arms Augmentations.\n\t\t\n\t\tClaire Frost: EMP Specialist. Newly graduated from the Academy. Equipped with EMP Plasma Rifle, Laser Pistol and EMP grenades.\n\t\t\n\t\tJulie Sanders: EMP Specialist. Newly graduated from the Academy. Equipped with EMP Plasma Rifle, Laser Pistol, EMP grenades and Head Augmentation.\n\t\t\n\t\t*page_break Back\n\t\t\n\t\t*goto archive3\n\t\t\n\t\t\n\t#History of current conflicts\n\t\t\n\t\tWith the constant economic downturn and conflicts, the United States had officially lost its super power title in the year 2032.\n\t\t\n\t\tRussia and China has risen together and created the New Unified Communist Party (NUCP), they have dominated most of Asia and parts of Europe in terms of economy and political influence, they are the undisputed new super power.\n\t\t\n\t\tWithout the support from the United States, the ISIS terrorist seized almost all of the middle east continent. The oil production in Saudi Arabia and other natural resources in the region are now all under ISIS control. Their massive increase of wealth has a devastating effect on all democratic nations. They renamed themselves as Holy Islamic Liberation Organization (HILO).\n\t\t\n\t\tIn a desperate effort to maintain balance, NATO has created the Augmented Reconnaissance and Operations Corp (AROC) to counter the new threats.\n\t\t\n\t\t*page_break Back\n\t\t\n\t\t*goto archive3\n\t\n\t#NUCP Commanders Intel\n\t\tOur intel has gathered the following information on the enemy commanders:\n\t\t\n\t\tKhan Commander Xin Ling Lu: Having one of the highest ranks of Khan within the NUCP, Xin has been designated as the \"loud sniper\". She utilizes a special plasma sniper rifle with searing rounds. Her shots are distinct in the fact that they make a high-pitched noise before hitting targets. she always aims for the head and has a record of 90% head shot accuracy.\n\t\t\n\t\tLenin Commander Voyeda Amarkova: Having the same rank as Khan, a Lenin commander is a soldier that is highly-prized for their hand-to-hand combat skills. He has been given the title of \"ghost lancer\" because of his uncanny ability to dodge plasma shots. His trademark plasma gloves turn his hands into metal-melting weapons that he also use on humans.\n\t\t\n\t\t*page_break Back\n\t\t\n\t\t*goto archive3\n\t\n\t#NUCP Military and Operation Details\n\t\tThe NUCP military utilizes a technologically crude, but highly effective assault weapons, a consistent ideology traced back to the roots of AK-47 rifles of World War II Soviet Communist. \n\t\t\n\t\tDuring battle, the NUCP deploys heavy armor coupled with ambush tactics. They prefer to spread out and overwhelm their enemies rather than clustering up in close proximity. While they are fairly weak individually, they are a potent threat in groups, able to lay down withering streams of fire at all ranges and angles from behind cover. Specialty troops use more advanced weapons, and many are issued advanced reactive alloy armor plating to give them a tank role as a bullet spunge.\n\t\t\n\t\t*page_break Back\n\t\t\n\t\t*goto archive3\n\t\t\t\n\t\t\n\t#HILO Military and Operation Details\n\t\tThe HILO was first headed by a powerful and ambitious leader from the ISIS, capable of keeping the rebels and terrorists under his control. His identity remains unknown to us and even the majority of low ranking HILO troops. All we know is, the terrorist faction has never been stronger since the mysterious leader came to power. \n\t\t\n\t\tThe HILO has now become more of a trader merchant of a vast amount of natrual resources, commodities and technologies in the middle east. Expanding their wealth is their priority, and domination power comes as second. They are the new world pirates.\n\t\t\n\t\tMore technologically advanced than the NUCP, the HILO soldiers and snipers employ many of the ambush tactics of the NUCP; however, they supplement field combat with automated robotic security known as Bipedal Defensive Sentinel (BDS).\n\t\t\n\t\tThe Bipedal Defensive Sentinels (BDS) are highly advanced bipedal robotic turrets carrying either a rapidly firing auto-laser or a high-power, low-caliber Ion Cannon. Rather than taking cover, which would be impractical given the in-line mounting of their weapons, these robotic killers will simply close the distance within firing range, relying on their regenerating shields to soak up damage. Their personnel shield generator is relatively powerful, so an EMP grenade is strongly recommended. Their physical frame however, is weak and poorly armored. The BDS also has a special detachment ability where if they are critically damaged in the lower half of their frame, they can dismount the CPU with the turret into an Aerial Turret Sentry (ATS). Where the ATS lose on shield and armor, it gains back with high aerial maneuverability. They can dodge gunfire with incredible speeds and will take cover behind pillars and hills. Never underestimate a BDS or a ATS.\n\t\t\t\n\t\t*page_break Back\n\t\t\n\t\t*goto archive3\n\t\t\n\t#Equipments and Gears (HILO Trident Technology Updated)\n\t\t\n\t\tAdvanced Grimloc Pulse Rifle: The standard issue Pulse Rifle has been retro-fitted with flesh seeking modifier technology from HILO, it allow shots to change trajectory mid-flight to hit multiple biological signatures. This weapon can now guarantee zero misses as long as there are organic targets.\n\t\t\n\t\tHE Scrumk Shotgun: The standard Shotgun rounds have been upgraded to contain small amounts of Liquid Nitrogen. Each piece of shrapnel contains a LN round that explodes after a one second delay when penatrating the target armor, hence the HE appendage to its name which stands for high-explosive.\n\t\t\n\t\tHawklar burst laser SMG: The small compact design of the Hawklar enables the weapon to fire like a rifle with the size of a large pistol, it still needs to be held with both hands for stability. It is the lightest gun in the AROC arsenal. \n\t\t\n\t\tEMP Plasma Sniper Rifle: The standard MS Plasma Sniper Rifle has been upgraded to utilize EMP generating shells that disable heavy machinery on top of its armor-piercing capacities. Users can switch between plasma shots and EMP shots. The EMP shocks are small, the first hit usually will only cause disruption to the robotic circuitry, and additional hits will be required to completely disable a large mechanical unit.\n\n\t\tPlasma Zorva Dagger: The new Zorva blade no longer uses titanium blades with an electric current. It has been replaced with a composition-altering material known as Plasma 32. This turns the blade into a shape-shifting weapon. Users can change the blade's shape and length. The longest it can extend to is 2 meters without compromising the weight of the blade.\n\t\t\n\t\tM22B Frag Grenade: Standard issued grenade that scans your finger print before triggering, this prevents none AROC members from using it. The scan time is too quick to be noticed. It also has an advance fail safe mechanism to prevent false trigger.\n\t\t\n\t\tM22E EMP Grenade: This grenade is especially useful in dealing with HILO combatants as all of them have personnel shield generators. This effectively renders all shields within the proximity offline, also disrupting robotic command signals, freezing them in place for a good minute.\n\t\t\n\t\tM20A Flash Bang: This stun grenade not only renders all targets in the room blind and deaf for 3 minutes, it also discharges a small electrical shock, able to \"taser\" all targets to the ground.\n\t\t\n\t\tMkI Getrak Laser Pistol: The MkI is a small side arm typically used by the sniper for close range combat, there is no need to reload, but like the Pulse rifle, prolong fire will cause over heatdamage. This pistol is not able to penetrate thick armor.\n\t\t\n\t\t\n\t\t*page_break Back\n\t\n\t\t*goto archive3\n\t\n\t#Augmentation Documentation\n\t\t\n\t\tBasic Head, Arm, Leg Augmentations: These augmentations enhances the part of the body it is applied on, improving performance. The limb augmentations (Arms and Legs) has a special over drive boost feature where it temporarily grants 3 times the power, but permanently damages the augmentation and cause injury to the limbs in the process. This is advised only to be used in critical life threatening situations.\n\t\t\n\t\tCloaking Field: This augmentation allows the user to bend light around them, making them partially invisible. The distorted light is quite visible while the user is moving, as well at close range, it can be easily detected.\n\t\t\n\t\tVisual Targeting: This enhancement provides the user with a great increase in perception and target identifying, it can also be used to detect finger print on keypads.\n\t\t\n\t\tImpact Servo: This augmentation is used in halo jumps, allowing the user to land from terminal velocity on the ground without injury. It can support up to a maximum of 350lbs of weight and is only capable of one time use.\n\t\t\n\t\tShield Sphere: The Shield Sphere generates an orb of energy around the user, providing protection from all puncture and impact damage, similiarly to the HILO Personnel Shield Generator. At close range melee, the shield is not as effective and the user can still be injured. \t\n\t\t\n\t\t*page_break Back\n\t\t\n\t\t*goto archive3\n\t\n\t#Log off the computer\n\t\t\n\t\tYou shut down your computer and hit the sheets. \n\t\t\n\t\t*goto ep2lastm\n\t\n*label ep2lastm\n\nJust like many other nights, you dream about Selene. It was always the same place, amidst the ruins of the academy after the HILO invasion.\n\nYou point your gun at Selene.\n\n\"Are you ready for this ${name}?\"\n\n\"Why didn't you just kill me when you had the chance?\"\n\n\"You know nothing ${name}.\"\n\n\"Are you just playing around with me? I want answers!\"\n\n\"Shoot me and get your answers, do it! DO IT!.\"\n\nYour trigger finger is now shaking. You don't know what to do. A severe conflict of emotion wakes you up in the middle of the night. \n\nYou decide to take a short walk around the academy to take your mind off things. It was there that you found Felix toying around with his laptop. He was designing a program that helps detect shrapnel in injured soldiers.\n\n\"Pretty interesting work.\" You take a seat next to him.\n\n\"Pre-mission panics?\"\n\n\"Bad dream.\"\n\nFelix nods at you, he knew what you meant\n\n\"Will you kill her if you see her again?\"\n\nYou stay silent.\n\n*page_break\n\n\"Protocol dictates that I should. But I don't know. There's still a lot to talk about.\"\n\n\"You think you'll have the time to talk in the middle of this bloody mess?\" He asks, opening a chocolate bar and taking a large bit off it.\n\n\"I don't really know. All I know is that there are a lot of things I need to ask her.\"\n\n\"Like what?\"\n\n\"Did she really just use me?\"\n\nFelix lets out a big sigh and re-adjusts his glasses.\n\n\"Is this about your ego?\"\n\n\"I drained my ego down the toilet when the academy was invaded. I still blame myself for that.\"\n\n\"What if she says she just used you?\"\n\n\"Then I guess that's enough reason to pull the trigger.\"\n\n\"You're being optimistic and naive, ${Name}. You think she'll hand herself over to you without a fight? She's a spy. I wouldn't be surprised if she gets the jump on you. You think she'll do you in?\"\n\n\"You know, the reason I went out for a walk was to clear my mind. I don't think you're really helping me out here.\"\n\n\"Sorry. It's just that I find your situation quite amusing. You're like my own personal novel.\"\n\n\"Glad I could be of some use to you, asshole.\"\n\n\"Chocolate Bar?\" Felix hands you one of his treats as an apology. You take it and observe the packaging. It was a Hersheys' bar.\n\n\"Didn't know they still made these. Didn't the HILO blow up all the manufacturing plants in 2022?\"\n\n\"They did. You're chewing on the last chocolate bar from Hersheys in the entire planet.\"\n\n\"Don't these things expire?\"\n\n\"You're welcome.\"\n\nFelix picks up his laptop and walks away. The chocolate helped you clear your thoughts a bit and you are able to go back to sleep.\n\n*page_break\n\nNext morning, Catherine arrives by your dorm room to pick you up.\n\n\"Ready squad leader?\"\n\n\"Don't call me that.\"\n\n\"It's standard protocol team leader.\"\n\n\"I don't like the sound of that either.\"\n\n\"Roger that captain.\"\n\n\"Quit it.\"\n\n\"Haha, alright... commander.\" \n\nCatherine's teasing did wonders for your composure. You felt a little more comfortable about the mission.\n\n\"They said the island is going to be filled with bugs. Did you bring some spray for that?\" Catherine asks.\n\n\"Did you?\"\n\n\"Yep.\"\n\n\"Then I'll just mooch off yours.\"\n\nCatherine rolls her eyes. \"Some squad leader you turned out to be.\"\n\n\"Have you met the team already?\" \n\n\"I've read the files. But I haven't met any of the new guys in person.\"\n\n\"They're mostly fresh and green.\"\n\n\"You make that sound like a bad thing. We were green at some point as well.\"\n\n\"Yeah but that was just us. Now we have to take care of these kids. I don't like babysitting.\" Catherine tightening the locks on her equipment bag.\n\n\"I'm sure they'll be fine.\"\n\n\"atleast some of them got augmentations for passing the final exam.\"\n\n\"that's a good thing right?\" You reply. \n\n\"Well, augmentations or not we all have to start somewhere.\" You finished. You and Catherine both kept quiet as you geared up in the armory, fancying the new advanced grimlock rifle, you took it without hisitation, along with a Zorva Dagger and grenades. Then both of you board the freight elevator which leads to the docking bay.\n\n*set inventory &\"Advanced Grimlock Rifle, Plasma Zorva Blade\"\n*set frag 2\n*set emp 1\n*set flash 1\n\n*page_break\n\nYour team was eager enough to work with you on this mission. They were already suited up and ready to go when you and Catherine arrives at the docking bay.\n\n\"It's an honor to work with you, ${Name}.\" One of the girls mentioned, shaking your hand and giving you a sincere smile.\n\n\"Claire Frost. I'll be half of your EMP specialist unit.\" She was a red-head. Quite a small one to add. \n\n\"How tall are you?\"\n\n\"5'1 sir.\"\n\n\"Interesting...\" You finish. You start thinking of tight places you can jam her into when dire situations arise.\n\n\"I'll be the other half of you EMP unit.\" Another girl mentions. \"I'm Julie.\"\n\nShe was blonde. But that was the only thing she had in common with Selene. You breath in deeply and smile at her. She was taller than Claire. You would put her around 5'5.\n\n\"So you girls will take care of any mech units and other machines right?\"\n\n\"Roger that\"\n\n\"We'll be taking care of your armored units.\" An unknown voice followed your conversation.\nYou turn around to find two very large guys standing behind you.\n\n\"Im Charles. This is Isaiah. We finished academy together. We'll be your armored unit support.\"\n\nBoth Charles and Isaiah were bald. It was their eyes that made the largest distinctions. Isiaiah wore glasses.\n\n\"You're not brothers, are you?\" You ask.\n\n\"No sir. We've been friends for quite some time, since we joined the academy together.\" Isaiah answered. \n\nYou exchange a look with Catherine. These guys reminded you of your relationship with Catherine when the two of you began your careers at AROC.\n\nAfter your civilities with your team, you put on your earpiece.\n\n\"Is anyone going to be sending us off, Felix?\"\n\n\"No one. It's just us. I'm in the control tower. You'll be getting intel support from me. Just like old times.\"\n\n\"Wouldn't have it any other way.\" You smile.\n\n\"Did you bring bug spray?\" Felix asks.\n\n\"No, but Catherine did.\"\n\n\"You better hope she brought a lot. I did a background check on the flaura and fauna of the area. Turns out there's a special breed of mosquitoes that have been altered by nuclear wastes that have grown really large where you're going.\"\n\n\"Are they lethal?\"\n\n\"Well, they're bigger than a basketball. So you let me know if they're lethal when you get stung by one.\"\n\n\"Great.\"\n\n\"Don't worry sir, we've got a few spare vials of bug spray if you forgot yours.\" Claire mentions.\n\n\"Good work, soldier, already making a good impression, but don't call me sir, we're all soldiers on the battle field.\"\n\n\"Alright.\"\n\n\"If you're quite done flirting with your team, you can board the boat. We're moving out now.\" Felix rarely miss his chance of trash talk now, must have learn that from all the practice with Catherine.\n\n\"We're not taking the dropship?\" Catherine asks.\n\n\"And get shot down by that Khan commander?? You're going via boat. It's the stealthiest approach.\" Felix responded.\n\n\"Fair enough.\"\n\nYou usher your team into the boat and head towards the South China Sea.\n*page_break\n\n*set saveload3 true\n\nPROGRESS SAVED . . .\n\nShould you die in the following episode, you will be able to replay from this point on.\n\n*goto savegame3\n\n*label endsaveload3\n\n*page_break\n\n23 Miles away from your target, Felix startles the whole team.\n\n\"You're not going to like this.\" He says. \"We aren't the only people who decided to claim those alien remains for ourselves.\" Take a look outside the boat.\n\nYou got up and step outside to take a look at the island. You couldn't see the island yet.\nBut there was smoke.\n\n\"It looks like HILO also had big plans today. We're walking right into a big confrontation between these two forces.\" You narrow your eyes into the scope.\n\n\"This makes the battle a lot more difficult.\" Said Charles. \"We now have two adversaries to watch out for.\"\n\n\"Not really.\" Isaiah retorts. \"We can just wait for them to exhaust their own resources. When they're tired, we go in as the clean up crew.\"\n\n\"I'd rather we join the messy stuff and show them what we're made of.\" Claire says with excitment.\n\n\"It's your call.\" Felix reminds you. \"Your boat has stealth capacities, but with the fight that's going on right now, you'll be heading into the thick of it, there's not telling what will happen.\"\n\nWhat is your plan of action?\n\n*choice\n\t#Join the naval battle\n\t\t\"We'll give both sides hell.\" You say. \n\t\t\n\t\tCatherine gives you an intense stare.\n\t\t\n\t\tYour stealth boat pushes forward into the smoke, and you find yourself right in the middle of the NUCP and HILO forces. Heavy gun fire exchanges between the two sides with you caught in between. \n\t\t\n\t\tOne of their cannons explodes on your starboard side, disabling your stealth mode and engines. Like an injured duck surrounded by crocodiles, you and your team are bombarded with warship rockets and turrets from both sides.\n\t\t\n\t\tFor a few seconds, a black smoke rises in the place where you were. Then like your life, the smoke melted into the wind, and was gone.\n\t\t\n\t\tGAME OVER\n\t\t*sound doubleexplosion.mp3\n\t\t*goto dead3\n\t\n\t#Wait until the battle dies down\n\t\tYou park the boat far enough to stay hidden, but able to observe the warship battles.\n\t\t\n\t\tIn front of the out numbered NUCP fleet stood the assembled forces of HILO, a seemingly vast navy with pillage and plunder on its mind.\n\t\t\n\t\tThe NUCP, knowing the time for battle has come, begin to move forward. Ostensibly, they advance with focus and purpose, but beneath this firm veneer, as they look on a vastly larger enemy - at least twice their number even with the aid of their XT-90C Gunships - many must have been fearful of what is to come.\n\t\t\n\t\tBoth sides take heavy losses, but it is inevitable HILO would eventually overwhelm the NUCP. \n\t\t\n\t\tAs you watch the last HILO ship lands on the beach, you prepare to dock as well, out of their sight.\n\t\t\n\t\t*goto ep2lastland\n\n*label ep2lastland\n\nYou observe the area where you landed, all seems quiet after the noises made by your stealth boat. You take a deep breath, After a few seconds of silence in the docked boat, you give the hand signal to disembark.\n\n\"I'm reading two groups of enemy signatures closing in on your position ${name}, one group is coming from the northern alien artifacts, the other is from the HILO ships recently landed nearby.\" Felix says.\n\n\"This is bad, it's too risky for us to face both groups at once.\" you think out loud.\n\n\"The northern group must be NUCP since they are coming from the artifacts, they probably think we're HILO. The other group is no doubt the newly landed HILO operatives, sent to investigate who we are, why don't we hide and ambush them when they finish killing each other?\" Catherine suggests.\n\n\"We could take the inititive and attack one group to push through to safety.\" Charlie shows his eagerness for battle.\n\nWould it be better to push through one group and get out of the area ? or hide and wait for a chance to ambush?\n\nWhat is your plan of action?\n\n*sound cargoelevator.mp3\n*choice\n\t#Hide and wait for a chance to ambush\n\t\t\"Clear the boat, spread out and hide in the water.\" You order.\n\t\t\n\t\tYour team speads out and dives into the water away from the boat.\n\t\t\n\t\t\"60 seconds to visual on the first group. It's a HILO infantry unit. 2 minutes to the other group.\" Felix updates.\n\t\t\n\t\tThe HILO group arrives at the island clearing where your boat is docked. There are no BDS with them, it's a light scout group of about 6 men. They quickly approach the boat.\n\t\t\n\t\t\"The second group is here as well. It's an NUCP heavy armor unit.\"\n\n\t\tThe two groups spot each other and start shooting.\n\n\t\t\"These HILO guys are crack shots. They're aiming for vital organs!\" Felix shouts, watching from the boat camera like a live action sports commentator.\n\n\t\t\"Catherine. I need you to setup an ambush.\" You say.\n\n\t\tCatherine obliges and quietly sneaks back behind the boat.\n\n\t\t\"6 units on the HILO group and 4 for NUCP.\"  \n\n\t\t*page_break\n\t\t\n\t\tThen a high-pitched noise etched within the beach.\n\n\t\t\"One, no two! Two HILO down with one shot! That plasma shot ran right through two heads! Incredible!\"\n\n\t\t\"Commander Xin Ling Lu.\" You mention, thinking back to your mission briefing. Her skills were not just for show. Now you're aware that she can take you out on that beach. You struggle for a plan.\n\n\t\t\"Let Ling clean out the HILO unit, and we'll let them take the boat. Get out of there, Catherine.\"\n\n\t\tCatherine retreats back to the water while observing the battle situation closely.\n\n\t\t\"The NUCP unit has taken out the HILO unit. You wanna pursue them?\" Felix asks\n\n\t\tYou thought for a while.\n\t\t\n\t\t\"With Ling on the look out? We'll wait for them to leave and go back to patrol. The only reason they went out here was because of the boat. They'll leave it alone once they realize the area is clear.\"\n\n\t\tCatherine nods in agreement.\n\n\t\t\"I'm checking the trajectory of those plasma shots. They came from the alien base. I'm sure this sniper commander is waiting there. You'll eventually have to meet and greet that princess.\"\n\n\t\t\"Can't wait.\" Catherine answers.\n\n\t\t\"I've also checked her marking system. she's using the infantry as an area marker. I'll let you know if she ever has her sights on any one of you from this point.\"\n\n\t\t\"Never a better guardian angel.\" You say in confidence. \n\n\t\t\"The NUCP unit has left already. You're clear to move forward now. Head north. The base is 4 miles from your position.\" \n\t\t\n\t\t*sound lingssniperrifle.mp3\n\t\t*page_break\n\t\t*goto ep2moveinland\n\t\n\t#Attack the NUCP group\n\t\tYou and your team rush towards the jungle, Charlie and Isaiah take the front line of the assault.\n\t\t\n\t\t\"4 heavy armor NUCP signatures headed right towards you. Contact in 5 seconds. Stay put and they'll be in your sights, guns ready.\"\n\t\t\n\t\tEveryone cock and lock their weapons.\n\t\t\n\t\t\"3 seconds.\"\n\n\t\tCharlie and Isaiah rushes forward.\n\n\t\t\"Wait!\"\n\n\t\tCharlie lets out an array of HE shotgun fire. He gets his mark.\n\n\t\t\"3 targets left. They've retreated to regroup. Move back as well!\"\n\n\t\tCharlie and Isaiah return to your group.\n\t\t\n\t\t*page_break\n\n\t\t\"Gung Ho morons! Don't ever do that again! You won't be so lucky next time.\" You yell at the two.\n\n\t\t\"We got this.\" Isaiah says. \"We spotted one of the fatigues and went after them. Now that's one down.\"\n\n\t\t\"They're right. Looks like they got good instinct.\" Catherine says.\n\n\t\t\"They've regrouped, and now are heading straight for you! 5 seconds!\"\n\n\t\tCharlie and Isaiah are at the ready once again. \n\t\t\n\t\t*page_break\n\n\t\t\"I've got this.\" Catherine says, taking out a frag grenade.\n\n\t\t\"Direction, Felix?\"\n\n\t\t\"46 degrees to the west!\"\n\n\t\tShe tosses the grenade.\n\t\t\n\t\t\"BOLATYAW!\" A loud cry is heard, followed by the sound of the exploding grenade.\n\n\t\t\"Zero readings. Looks like you got them. Nice work, Catherine.\" Felix says over the radio.\n\n\t\tYour team walks over to the corpses of the unit you just took out. The smell of charred flesh clashed with the humid climate of the jungle. It was unbearable.\n\n\t\t\"How close are we to the alien site?\" You ask.\n\n\t\t\"5 miles. Looks like you took out a patrol unit.\"\n\t\t\n\t\t*page_break\n\n\t\tIt was then that one of the soldiers you took out suddenly got up.\n\n\t\t\"Watch out!\"\n\n\t\tCatherine threw her Plasma Zorva Blade at the soldier. In mid air, it changed shape into a shuriken for a more balanced accurate flight. This made sure the soldier died for real this time.  \n\n\t\tHe was holding a laser pointer aimed at Charlie.\n\n\t\tYou picked up the pointer. \n\n\t\t\"It looks like it's just a marker. Not an actual laser.\"\n\n\t\tYou thought back to the mission briefing. \n\t\t\n\t\t*sound zorvatoshuriken.mp3\n\t\t*page_break\n\t\t\n\t\tA tingling high pitch noise was now audible in your area.\n\n\t\t\"CHARLIE GET DOWN.\" You command.\n\n\t\tIt was too late. Charlie had been marked by the patrol guard for their resident commander sniper; Ling Lu. His head was blown clean off in one shot.\n\n\t\t\"CHARLIE!!\" Isaiah shouted, engaging an uncalled bloodlust. He started firing his rifle in random directions while shouting.\n\n\t\t\"GET DOWN ISAIAH!\" Claire shouted. \"You're giving our position away.\"\n\n\t\tThe warning was too late as well. Another high-pitched noise pierced the air and Isaiah fell headless unto the ground.\n\n\t\t\"SHIT.\" Felix shouted. \"They were using their green infantry not to engage but to act as markers for their sniper commander. It's an old trick in their tactical book.\"\n\n\t\tYou order the whole team to crouch behind an enclave of rocks and tree trunks nearby. You were now breathing heavy. Claire and Julie were now shaking. \n\n\t\t\"This is worse than our first mission.\" Felix said.\n\n\t\t\"That's not a really helpful thing to say.\" Replied Catherine.\n\n\t\t\"Since he took out Charlie, he's got no vision on you guys anymore. You can proceed. I have the signature print of the laser they used to mark Charlie with. I'll alert you if anyone has their sniper sights on from this point onward.\" Felix assures you.  \n\n\t\t\"We'll take it one step at a time from this point. What's the direction to the alien base?\" You ask.\n\n\t\t\"Just keep heading north. Im reading more hostiles in that direction so be ready for trouble.\"\n\t\t\n\t\t*sound lingssniperrifle.mp3\n\t\t*set hvydead 1\n\t\t*goto ep2moveinland\n\t\n\t#Attack the HILO group\n\t\t\n\t\tYou order your team to attack the HILO squad when they arrive. With the new advance weaponary, your team initially gains the upper hand. Unfortunately, the NUCP storms your flank position shortly after. Caught in between two forces, the tide of battle quickly turns disadvantageous for your team. One after another, your men falls with each high pitched noise. The NUCP marines were marking your team one by one for their sniper commander Xin Ling Lu to finish off.\n\t\t\n\t\tYou fought to the bitter brave end, it seemed you weren't quite ready to lead a squad yet.\n\t\t\n\t\tGAME OVER\n\t\t*sound lingssniperrifle.mp3\n\t\t*goto dead3\n\t\n*label ep2moveinland\n*page_break\nYour team pushes forward into the jungle. \n\n\"You sure the aliens liked this place? It's filthy.\"\n\n\"Actually, this place is perfect. It's a remote island that's completely surrounded with water. They could spot any incoming disturbances from miles away.\" Felix replies\n\n\"Good point.\" You finish. \n\nIt was then that you spotted one of those mosquitoes Felix was talking about.\n\n\"You gotta see this.\" You mention over the radio. \"The mosquito was big, but not as big as a basketball like what Felix said. It was as big as a closed fist.\"\n\n\"That still makes it pretty damn big.\" Catherine says.\n\n\"You wanted that bug spray now?\" Claire asks. You nod your head and she tosses you a vial. \n\"What do you think we'll find there?\" Catherine asks.\n\n\"Intel reports say that the alien base is structured like a room full of alien technology.\" Felix answers.\n\n\"Like a museum?\"\n\n\"More or less. The NUCP had their hands on this piece of land for the longest time. Who knows what they've done to the place over the years.\" says Felix.\n\n\"We'll tell you when we see it then,\" says Catherine.\n\n\"HOLD THAT THOUGHT.\" A sense of urgency could be heard from Felix. \"One group approaching your way. 5 signatures. One seems to be...\"\n\n\"Seems to be what??\"\n\n\"Hovering.\" He's not touching the ground. His mechanical signal isn't strong enough to be called a robot. It must be another kind of device he's using. Be on the lookout.\"\n\n\"Scout ahead Catherine and tell me what it looks like.\"\n\nCatherine nods, activates her cloaking field, then disappears among the plants. You usher your team to stand down for a while. \n\nCatherine comes back gasping.\n\n\"Are you alright?\" You ask.\n\n\"Hover turret mounted platform, piloted by NUCP armor personnel.\" Catherine says with concern.\n\n\"Approach in 20 seconds.\" Says Felix. Your team looks at you for direction.\n\nWhat do you intend to do?\n\n*choice\n\t*selectable_if (hvydead = 0) #Order your heavy support to spearhead the NUCP armor units\n\t\t\"This is your time to shine, boys.\" You say, looking at Charlie and Isaiah.\n\n\t\t\"If it's a hovering unit, I'll have to bait it. Isaiah can take him out.\" Says Charlie.\n\n\t\t\"Do it.\" You jest.\n\n\t\tCharlie and Isaiah bump their fists. You and the rest of the team move back to a safer area to provide cover. \n\n\t\tCharlie lets out a few random shots from his shotgun to catch their attention. A whirring sound could be heard as the hovering unit went into full speed towards Charlie.\n\n\t\t\"You certainly got its attention now.\" Felix says over the radio. \n\n\t\tCharlie makes a run for it. The hovering unit was simply a platform with gun turrets on it.\n\n\t\t\"Those turrets are no joke.\" Said Felix. \"From what I can see from here, it's using the same hover technology as the TX-90 Gunship and those are advanced Vulcan rounds. They're a trademark of the NUCP turret program. No one has figured out how they've made their turrets avoid the overheating issue. They could fire all day long without jamming or overheating. Be careful Charlie.\"\n\n\t\t\"It's over now.\" Charlie says.\n\n\t\tAfter running a short distance, he ducks and disappears into the ground. Isaiah takes his shot. The hovering unit is still afloat while the pilot is standing dead in the cockpit. Soon enough, the hovering unit loses control and crashes into the trees, making a large fire.\n\t\t\n\t\t*sound shotgun.mp3\n\t\t*page_break\n\n\t\t\"You two make a pretty good team together.\" Says Catherine. \n\n\t\t\"Don't congratulate them yet. There are still 4 more soldiers out there. \n\n\t\t\"Three, actually.\" Says Julie, taking a shot with her Plasma Sniper Rifle. Another foot soldier hits the ground.\n\n\t\t\"It looks like they're confused now. They're scattering.\" Says Felix.\n\n\t\t\"One for me, two for you.\" You tell Catherine.\n\n\t\tShe charges. \"Where are they, Felix?\"\n\n\t\t\"One is three meters ahead. He's running home. Take him out.\"\n\n\t\tCatherin obliges. She catches up with her prey and comes up from behind him. With ease, she takes out her blade and slits his throat without wasting a bullet.\n\n\t\tYou spot another soldier running towards the alien base. You take aim with your weapon. But Catherine aims faster than you. She throws her blade, transforming into a shuriken mid flight again towards your target and takes him out. \n\n\t\t\"Just one more.\"\n\n\t\t\"He must be the smartest of the bunch. He used the confusion to find a hiding spot.\" \n\n\t\t\"Felix!\"\n\n\t\t\"4 degrees North!\" \n\n\t\tYou aim your weapon and find your mark. The soldier falls. You see saw that he was holding a laser pointer.\n\n\t\t\"GET DOWN QUICK. SOMEONE HAS A LOCK ON YOU CHARLIE!\" Felix shouts over the radio.\n\t\t\n\t\t*page_break\n\n\t\tA high-pitched noise is heard through the jungle again.\n\n\t\tBut Isaiah pushes Charlie down. The plasma shot misses both heads; but takes an arm.\n\n\t\t\"AHHH!\" Isaiah shouts. His right arm had been clearly taken off by one shot.\n\n\t\t\"That's a really powerful plasma rifle.\"\n\n\t\t\"I heard she customizes it herself. Some stories say the shots are so powerful that her rifle handle gets so hot, it burns her. \n\n\t\tIsaiah is breathing heavy with Charlie next to him. Your team gathers around the wounded.\n\t\t\n\t\t*sound lingssniperrifle.mp3\n\t\t*page_break\n\n\t\t\"He's lucky he didn't have his head blown off.\" Felix says over the radio.\n\n\t\tYou take out your first aid kit and disinfect the wound. It was a very clean shot. The plasma shot seared through bone and cartilage and left a clean shave.\n\n\t\t\"Perfectionist sniper.\" You mutter. Finally cleaning the wound.\n\n\t\t\"What are we going to do now?\" Julie asks.\n\n\t\t\"We can't take him along at this point.\"\n\n\t\t\"Someone has to bring him back to the boat.\"\n\n\t\t\"I'll take care of it.\" Says Charlie.\n\n\t\t\"You'd better hurry back quick. The sun is at the highest point now. You're going to be sticking out like sore thumbs if you stay there any longer.\"\n\n\t\tAs soon as the two try to get up, another noise is heard. The same high-pitched noise was heard again.\n\n\t\t\"GET DOWN.\"\n\n\t\tIt was another close call.\n\n\t\t\"It looks like she still wants to get her target. Since Charlie is still alive, the marker still stands.\" Says Felix.\n\n\t\t\"We'll have to leave the both of you there to keep Ling Lu focused on you. The rest of us wil move forward.\"\n\n\t\t\"Got it.\" Charlie and Isaiah nod and brace themselves for a long stand-out with the sniper. \n\n\t\t\"Just be sure not to make any sudden movements. When I give my mark, we'll make a run for it.\"\n\n\t\tYou planned your escape well and leave Charlie and Isaiah pinned down. You feel sorry for having to do so but they would further impede your objectives in their current condition.\n\t\t\n\t\t*page_break\n\t\t*goto ep2jungle\n\t\n\t*selectable_if (hvydead = 1) #Engage the enemy without heavy support\n\t\t\"We still have to take them on without the heavy artillery.\" You say. Catherine agrees.\n\n\t\t\"I'll take care of the hovering unit. I'll stalk it from a tree and take out the pilot. You guys need to provide cover fire.\" Catherine implies.\n\n\t\t\"Alright. Claire, Julie, stay with me.\" You gesture your EMP squad towards a bunch of fallen tree trunks on the side as you wait for Catherine to get up her tree. \n\n\t\tMoments later, you see the hover unit. It's a small-levitating platform with one person standing on top. It had a few gun turrets on it. They failed to notice Catherine up in one of the trees. She counts down.\n\n\t\t\"Two, one, engage.\"\n\n\t\tCatherine drops from the tree unto the unsuspecting hover pilot. His companions take notice and are about to open fire. You and your EMP squad cover Catherine by taking out the rest of the squad. \n\n\t\tAfter a few more struggles, Catherine manages to strangle the pilot. She jumps off the hover platform as it spiraled out of control into the trees.\n\n\t\tYou rush toward the wreckage to check on Catherine.\n\n\t\t\"I'm fine\" She says, dusting off a few leaves.\n\n\t\t\"Pretty good hold you got on our guy back there.\"\n\n\t\t\"I practice while imagining it was Felix.\" She said.\n\n\t\t\"I heard that. OH SHIT\" You could make out over the radio.\n\n\t\tYou hear two screams coming from behind.\n\n\t\tYou and Catherin rush toward Claire and Julie whom you left behind.\n\t\t\n\t\t*sound hilotrident.mp3\n\t\t*page_break\n\n\t\tIt was too late. Their corpses lay on the ground. Their weapons were melted. Two gaping holes were found on them. Each at the heart.\n\n\t\t\"This is too brutal.\" Catherine said in shock.\n\n\t\tYou want to panic but you have to be the voice of reason at this point. You think back to your briefing to see what could have caused this.\n\n\t\t\"The ghost lancer.\" Felix says.\n\n\t\tCatherin begins to sob after seeing what happened to the EMP squad. It was now just you and Catherine on the ground. \n\n\t\t\"Now both generals know you're there. I don't think they know where you are, though.\" Says Felix.\n\n\t\t\"Let's go. The mission still stands.\"\n\n\t\tCatherine nods and composes herself.\n\n\t\tYou struggle to find a way to move on with only two people and two generals who want the both of you dead.\n\t\t\n\t\t*set empdead 1\n\t\t*goto ep2jungle\n\t\n*label ep2jungle\n\n*page_break\n\"2 more miles to the base.\" Felix reports.\n\n\"Do you think we can finish this?\" Catherine asks.\n\nYou took a deep breath. \"We have to.\"\n\nYour party continues to push forward into the jungle.\n\n\"I've got good news for you guys.\" Says Felix. \"The mess between the HILO and NUCP has thinned out. Looks like both parties suffered the loss of their main infantry forces. You'll have less problems moving forward.\"\n\n*if (empdead = 1)\n\tYou and Catherine let out a sign or relief.\n\t*goto ep2jungle2\n*else\n\tClaire and Julie let out a sign or relief. \n\t\n\t\"It's about time we get a break\" Julie says.\n\t*goto ep2jungle2\n\n*label ep2jungle2\n\n\"There's just those two generals and some BDS units in the way. Keep your guard up. There may be less of them out there but they are no push overs.\"\n\n\"I'm also detecting an infiltration HILO unit entering the alien base, NUCP did not notice, her heat signature outlines Selene...\"\n\nYour heart began to race.\n\nCatherine looks sternly at you and held your arm.\n\n\"We will deal with Selene together, if its even her at all.\" She tells you. You nod in agreement.\n\nThe sun was high up in the area. The heat of the jungle was making you feel quite uncomfortable. You hastened your steps in eager anticipation to get this mission done. You have seen enough blood shed for today.\n\n\"It's been a long day.\" Catherine says.\n\n\"It's only been a few hours since you arrived. The worst is yet to come.\" Felix mentions, grounding the two of you back into reality.\n\n\"Real nice, Felix.\" Says Catherine.\n\n\"No, I mean the worst is going to come. 4 BDS AND 2 MECH SUIT UNITS ARE APPROACHING YOUR POSITION.\"\n\n*sound mechwalk.mp3\n*choice \n\t*selectable_if (empdead = 0) #Order the EMP specialists to spearhead the HILO units\n\t\t\"We're ready.\" Julie says, cocking her Plasma Sniper Rifle.\n\n\t\tYou have your EMP squad up front while you and Catherin find a place to provide cover for the two of them. \n\n\t\t\"Plasma line trap.\" Claire says. Julie nods. The two of them sprint a few steps ahead at opposite points. They both lay down an interesting-looking contraption.\n\n\t\t\"What are they doing?\"\n\n\t\t\"Standard issue plasma lines. They give them to EMP-specializing squads. You're in for a treat.\" Says Felix.\n\n\t\tClaire signaled Julie to fall back with her to your group. You now wait for the BDS units to arrive.\n\n\t\t\"bait them, Claire.\" Julie mentioned. Claire took out a small beeping device that looked like a mobile phone.\n\n\t\t\"I didn't know they still made those.\" You said, noticing the device.\n\n\t\t\"They don't, this one is custom-made from an old phone I had, iphone 89S.\"\n\n\t\t\"A really old phone.\" Said Julie.\n\n\t\tClaire activated the unit.\n\n\t\t\"Clever girl.\" Said Felix. \"She sent out a faint detection marker to call the attention of the BDS units. They'll be coming for you guys faster than you can think.\"\n\n\t\tYou hear the thumping noise of a bipedalled units as they increased walking speed towards you location. You finally spot the three BDS coming out from the clearing.\n\n\t\t\"Wait for it.\" Said Claire.\n\n\t\tAs soon as all three BDS units were in between their two devices, Julie flipped a switch.\n\n\t\tThe two points were suddenly connected by a high-energy plasma beam. It seared right through the bipedal legs on all three BDS units.\n\n\t\t\"Nice.\" you nod in approval.\n\n\t\tAll of the BDS explodes. Following the explosion, Julie and Claire set their Rifles to EMP shots and starting opening fire on the remaining two Mech Suit units that are coming out of the clearing now, they seem confused by the situation. \n\n\t\tYou notice they took their time with each shot. They want to make sure that every time they pull the trigger, they would hit the mech suits.\n\n\t\t\"Those EMP shots they're firing aren't enough in small doses.\" Says Felix. \"You have to really hit them a few times to disable a full mech unit. These girls paid attention in class.\"\n\n\t\tThey got the two mech suit units to shut down. This forces the pilots to leave their suits to engage on foot.\n\n\t\tCatherine looks at you.\n\n\t\t\"I'll handle them.\" She says, aiming her Laser SMG, she took out each pilot as they came out of their mech suits.\n\n\t\t\"Nicely done, ladies.\" You reply.\n\t\t\n\t\t*sound emp.mp3\n\t\t*page_break\n\n\t\t\"We can still use those units.\" Claire says.\n\n\t\t\"After the EMP shots wear out, the suits become operational again.\" Julie follows.\n\n\t\t\"Do you two know how to operate those things?\"\n\n\t\t\"We had prototype mech suit training before graduation, these HILO ones are based on the same technology, we can figure it out.\" Said Claire.\n\n\t\t\"I like you girls already.\" Says Felix.\n\n\t\tJulie and Claire started to approach the BDS units. They feel excited to give their skills a test on an actual mech suit. \n\n\t\t\"WAIT! STOP!\" Felix yells. \"THERE'S A FAST-APPROACHING BIOLOGICAL SIGNAL COMING YOUR WAY!\"\n\n\t\tThe girls were too busy pulling out the pilots from the BDS units to notice a ghost lancer coming right for them.\n\n\t\tYou rush towards them to engage the commander but it was too late. You saw it with your own eyes.\n\t\t\n\t\t*sound hilotrident.mp3\n\t\t*page_break\n\n\t\tThe Lenin commander appeared right in front of them and he thrust his plasma gloves into their uniforms.\n\n\t\tBut Catherine was one step ahead. She had already thrown frag grenade at the mech units the moment that she saw Voyeda coming for the girls.\n\n\t\tThe ensuing explosion took out the commander and the mech units; along with Claire and Julie. \n\n\t\tYou approached the site and confirmed that the Lenin commander was taken out.\n\n\t\t\"Rookie excitement.\" Felix sighs. \"It's really fatal.\"\n\n\t\tYou felt sorry for your team thus far. The sad state of your group got you reconsidering your role as a leader.\n\n\t\t\"Don't blame yourself. They were already gone when Lenin pierced their backs.\" Said Felix. \"Now a days, most other green rookies die even sooner during their first mission. This isn't your fault.\"\n\n\t\t\"There's nothing else we could have done ${name}.\" Catherine adds. \"We still have the mission to finish.\"\n\n\t\tYou nod and close your eyes for a moment to honor Julie and Claire.\n\n\t\t\"Good job taking out that Lenin commander. This is going on your report, Catherine.\"\n\t\t\n\t\tA minute later, Felix comes back on the radio: \"Guys, the explosion attracted attention, you have multiple NUCP turret platforms closing in, four of them this time!\"\n\t\t\n\t\t\"We don't have enough man power to take them head on...\" You grin your teeth.\n\t\t\n\t\t\"keep going ${name}, I'll draw them away. With my leg augmentation boost, I should have enough speed to stay ahead, then I'll use the cloaking field to escape after the boost ends, it's the only way.\"\n\t\t\n\t\tBefore you can say anything, Felix interrupts you \"Catherine's right ${name}, this is the only way.\"\n\t\t\n\t\tYou sigh \"Ok Catherine, be careful.\"\n\t\t\n\t\t\"Always was ${name}.\"\n\t\t\n\t\t\"I'll see you at the base.\" You compose yourself and decide to move forward. You wonder how you're going to handle the remaining enemies in your path without being killed.\n\t\t\n\t\t*sound singleexplosion.mp3\n\t\t*page_break\n\t\t*goto ep2squadend\n\t\n\t*selectable_if (empdead = 1) #Engage the enemy without EMP support\n\t\t\"We have no choice but to take them on.\" You said.\n\n\t\tCatherine understood. There was no other way out of this.\n\n\t\t\"We have three more EMP grenades. If we plan this right, we can take all of them out with one grenade. We just have to get them in one place.\"\n\n\t\t\"I'll be the bait this time.\" You say. \n\n\t\t\"You're not as fast as I am. I have the leg augmentation and I was trained for this. We have a higher chance of succeeding with me being bait. Don't be a hero.\" Catherine retorts.\n\n\t\t\"She's right.\" Adds Felix. \"She can outrun what these things have to offer. You're better off providing her cover fire from some point.\"\n\n\t\tYou sigh out of frustration and find a place to hide.\n\n\t\t\"Contact in 30 seconds.\"\n\n\t\tCatherine bends down like a runner before a race.\n\n\t\t\"They're here!\"\n\n\t\tCatherine dashes forward and starts firing her laser SMG at the BDS. They immediately notice and begins to give chase. \n\t\t\n\t\t*page_break\n\n\t\t\"Catherine! You used your augmentation boost too early! You only have 5 minutes of enhanced speed! You'll need to take them out by that time!\" Felix yells.\n\n\t\tYou grasp an EMP grenade and wait for an opening to toss it into the chase.\n\n\t\tAfter 30 seconds of running, Catherin looks at your position.\n\n\t\tYou toss the grenade to where she was standing. It goes off nicely. All 4 units come crashing down.\n\n\t\t\"1 minute and ten seconds into the boost.\" You hear Felix.\n\t\t\n\t\tCatherine drops a couple more EMP grenades as the two mech suits chase her from behind. \n\t\t\n\t\tThe EMP grenades went off at a perfect timing, disabling both mech suits.\n\n\t\tYou immediately take out your plasma blade and stab the pilots as they come out of their suits. \n\n\t\t\"Good work.\" Felix says \"But you used the boost too early Catherine! Now your leg will be injured until you get medical treatment back at base!\"\n\n\t\t\"It was worth it Felix, better than dying wouldn't you agree?\" Says Catherine, her legs are still shaking from the constant leg augmentation boost. \n\t\t\n\t\t*sound armaugmentation.mp3\n\t\t*page_break\n\n\t\t\"You still might need that boost. I'm seeing one biological unit looking right at the two of you.\"\n\n\t\tYou stare into the jungle and find a Russian man standing in the distance. His hands were glowing.\n\n\t\t\"Voyeda.\"\n\n\t\t\"Don't bother shooting him, he'll just dodge them. Can you take one of the mech suits and engage in them?\"\n\n\t\t\"There's no time! he's coming right for us!\"\n\n\t\tIt was then you noticed that Catherine was no longer by your side. She rushs towards the Lenin Commander.\n\n\t\t\"I'll keep him busy! Move forward towards the base ${name}!\" She said over the comms.\n\n\t\tYou tried to talk her out of it but she had already thrown away her comms device. \n\n\t\t\"Run for it!\" Felix shouts.\n\n\t\tYou panick for a moment. \n\n\t\tYou then heard Catherine starting to engage the commander in combat with her Plasma Zorva Blade. Her leg augmentation still had a couple minutes left. The fire in her eyes put you to shame.\n\n\t\t\"Stop worrying about her and keep going!\" You hear Felix over the comm.\n\n\t\tYou gathered yourself and started running towards the base.\n\n\t\t\"Things aren't looking good for her. She has about a minute left!\"\n\n\t\tFelix counted down with you until Catherine's leg augmentation wore off.\n\n\t\t\"Three, two, one.\" \n\t\t\n\t\tYou closed your eyes as you run. You know very well she couldn't fight with an injured leg.\n\t\t\n\t\t*page_break\n\n\t\tThen you heard an explosion. It came from where you left Catherine and the commander.\n\n\t\t\"NOO.\" Felix shouts. \"She blew herself up with the commander!\"\n\n\t\tYour thoughts flashed back to the day you first met Catherine. She was so full of herself and had such an aggressive personality during your first day of training. She was the top runner in the class. No one wanted to be her friend.\n\n\t\tIt was then that you decided to talk to her to ask her about her leg work out.\n\n\t\t\"It's top secret.\" She said. From that point the two of you started spending time together as friends. You helped her with the studying, she helped you with the work outs.\n\n\t\tAll your experiences with Catherine flashed back. You could feel the tears running down your cheeks as you keep moving forward. Felix could not bring himself to remind you of one terrifying fact at this point.\n\n\t\tYou are all alone now.\n\t\t\n\t\t*sound singleexplosion.mp3\n\t\t*set catdead 1\n\t\t*page_break\n\t\t*goto ep2squadend\n\t\n\n*label ep2squadend\n\n*set AIhull 100\n*set AIshield 100\n*set AIarmor 100\n*set AIchaff 100\n*set playerhull 100\n*set playershield 100\n*set playerarmor 100\n*set playerchaff 100\n\nAfter a several minutes of running, you suddenly felt the burn in your body and decided to take a knee. \n\n\"Your vitals are all over the place. Catch your breath. No one is chasing after you now. The base is now just one mile away.\" You hear Felix.\n\n\"We're so close now. We have to keep moving.\"\n\n\"Stay put for now, you don't want to be part of the big bloody mess that's going on at the entrance of the base. The NUCP are down to that one sniper and a few more armored infantry. The HILO forces still have enough BDS and Mech Suit units that are laying waste to this area. It's a miracle they haven't shot down this sniper. She's been taking out BDS after BDS out.\"\n\n\"So you're rooting for the enemy now??\"\n\n\"You'll have to see it for yourself. Move 15 paces north and hide behind the big rock you find there.\"\n\nYou follow the advice and take a look at the gates of hell.\n\nThe base was in the middle of an open field. It was a large alien structure with balconies on the sides. The sides look like they were man-made so that Ling could position herself from there. You couldn't see her from your position. \n\nThe structure was surrounded by Plasma points that were similar to the ones Claire and Julie had used. The BDS units could not close the 10 meter gap between their unit and the entrance. Whenever they would get an engineer to disable the fields, Ling would shoot them down. The pile of dead engineers has been growing steadily. \n\n\"This is insane.\" You say.\n\n\"This is glorious!\"\n\nYou start to think about Felix. Since he doesn't participate on the ground, he's become desensitized to the violence and gore of real warfare. \n\n\"We need to talk after this, Felix.\"\n\n\"Try getting past the bloody mess and we'll talk for as long as you like!\"\n\nYou focus on your objectives to find an opening to sneak into. The wide, open space provides very little cover for you.\n\n\"No blind spots at all. With that master sniper up on the pyramid, you won't be able to simply walk past all of this carnage.\"\n\n*page_break\n\nThe BDS units were trying to shoot down the top floors of the pyramid with missiles and bullets, but Ling had automatic sentries that were programmed to shoot down any incoming missiles meant to harm the structure. The whole area looked like a bitter stalemate between NUCP and HILO. You could barely sneak out to take a peak with all the shots and explosions going about above your head. \n\nIt was then that you saw Ling. She had long black hair, tied up into a ball behind her. She also had a distinct Chinese tattoo on her right cheek. You could not make out what it was. Her red fatigue caught your attention as she was aiming to take a shot at another Mech Suit. \nYou tried to see who she wanted to take out this time. You spotted a mech suit on the left flank of the structure. It was the one farthest from the group. From the perspective of a sniper, this would be the easiest target to take out first. \n\nWhat made this unit even more unique was that the pilot had opened his hatchet out of frustration and he was shouting as he was trying to shoot down Ling.\n\n\"What an idiot.\" You said to yourself.\n\nYou had not doubt Ling would take this guy out first. You weren't wrong. A high pitched noise filled the air and someone lost his head.\n\n\"You gotta love this gal. She only wants the head.\" Felix says, starting to admire the enemy.\n\n\"They're down to 7 HILO units. I managed to hack into their communications and they say that reinforcements won't be arriving for another 15 hours! This is your chance!\"\n\nYou knew what Felix meant by that.\n\n\"I'm downloading the mech suit pilot guide into your Cerebral data and capacities transfer module. I think there's a bit of Chinese grammar lessons in there too.\"\n\n*sound flight.mp3\n*page_break\n\nA few seconds later, you felt the surge of information overwhelm your senses.\n\nYou snuck around the gunfire and explosions and found your way to the unmanned mech suit.\n\"Excuse me.\" You said while throwing out the headless corpse of the fallen pilot. The inside of the unit was undamaged, except for the pilot seat. There was a large hole on the headrest.\nThe panels and controls now seemed familiar to you. You took hold of the controls and closed your eyes.\n\n\"For everyone...\"\n\n*page_break\n\n\"Make a mess ${name}.\" Felix says over the radio.\n\nYou focused your sights on the first BDS to your right.\n\n\"Let's test the tensile strength of BDS alloy metals.\" You said. You lunged the unit forward into the next one. The raptor claws dug into the frame of the enemy BDS.\n\n\"Rip open.\" You whispered.\n\nYour mech suit followed command and pulled the enemy BDS unit apart. Limbs and circuits fell out from your claws.\n\n\"That's it!\" You hear Felix.\n\nYou start to get a healthy adrenaline rush. Six more units left.\n\nThe other units have started to focus on you as well, noticing that you just ripped their comrade apart. \n\n\"The armor on that unit should make you impervious to most of their turrets. You just have to watch out for them ripping you apart.\n\n\"Got it.\" You said. You fling the machine forward into a bloodlust, grabbing the next mech suit\n. \n\"EAT PLASMA!\" You shout. You grab the pilot cockpit with one arm and use the other to rain plasma on the insides of the enemy.\n\n\"Flank right.\" You command. The machine
