slides to the right to avoid incoming missiles.\n\"Let's try that. Missiles.\" You command.\n\nThe machine planted its feet into the ground and opened up the missile chamber from the back of the mech suit. \n\nThree missies, one BDS each missile.\n\n\"Targets locked.\" The machine advised.\n\nYou let them fly and all of them hit their marks.\n\n\"Just two more.\" You remind yourself.\n\n*sound mechwalk.mp3\n*page_break\n\nIt is then you find an unexpected ally.\n\nA high-pitched noise echoed through your comms system. Two bright red shots came from the building and took out the remaining two BDS units.\n\nThe carnage and destruction had left the two of you alone on the battle field. You had each other's respect at this point. You face your unit towards the alien structure and raise your claw towards Ling.\n\nShe stood up and smiles. You watch her drop her rifle and takes off her beret as she slide down the sides of the building.\n\nShe had accepted your challenge. Slowly, she approached an unmanned mech unit as well.\n\n\"You sure you wanna do it that way?\" You heard Felix on the radio.\n\n\"I wouldn't want it any other way.\"\n\nYou take a deep breath as Ling boarded her mech unit. You exhale and clench your teeth as metal and heart were about to meet on the field of battle.\n\n*sound lingssniperrifle.mp3\n*page_break\n\n*set saveload31 true\n\nPROGRESS SAVED . . .\n\nShould you die in the following episode, you will be able to replay from this point on.\n\n*goto savegame31\n\n*label endsaveload31\n\n*page_break\n\nAt every encounter, you will choose your mech's attack and defense, your choice will then be played out against the opponent ship.\n\t\t\nMechs have three types of weapons:\n\t\t\nClaw Arm\n*line_break\n*line_break\nPlasma Cannon\n*line_break\n*line_break\nShoulder Missiles\n\t\t\nFirst choose the weapon you will attack the enemy with.\n\nNext you will choose which defense module to send your reserve power into:\n\nArmor Block \t(counters Claw Arm)\n*line_break\n*line_break\nShield\t\t\t(counters Plasma Cannon)\n*line_break\n*line_break\nSensor Jammer\t(counters Shoulder Missiles)\n*line_break\n*line_break\nThe reserve power enhances the defense module, negating 100% of the attack if you counter the correct attack type.\n\nThe reserve power will be reset on every encounter, allowing you to choose another module before the next encounter.\n\t\t\nAre you ready?\n\n*page_break\n\n\t\n*label firstphaselast\n*rand AIweapon 1 3\n*rand AIdefense 1 3\n\n*if (playerhull \u003c= 0)\n\t*page_break\n\t\n\tYour mech explodes limb by limb as Ling tears you to pieces.\n\t\n\tLing launches her mech at you, crashing and pinning you on the ground.\n\t\n\tShe charges her plasma cannon pointing towards your mech cockpit.\n\t\n\t\"Nothing personal AROC, good bye.\"\n\t\n\tWith that, your cockpit is blown to bits, along with you in it.\n\t\n\tGAME OVER\n\t\n\tHINT: This AI script has been upgraded from the gunship boss, it knows to boost it's lowest percentage defense module.\n\t\n\t*sound doubleexplosion.mp3\n\t*goto dead31\n\n*elseif (AIhull \u003c= 0)\n\t*page_break\n\t\"I can't believe you're still alive after all that.\" You heard Felix, still trying to get the badly damaged mech suit to move. The controls have all been fried and the outer armor had been heavily compromised.\n\t*line_break\n\t*goto lastending\n\n*else\n\t\n\t*gosub AIchartlast\n\t*line_break\n\t*line_break\n\t*gosub playerchartlast\n\t*line_break\n\tSelect your weapon:\n\t\n\t*choice\n\t\t#Arm Claw\n\t\t\t*set playerweapon 1\n\t\t\t*set playerweaponname \"Arm Claw\"\n\t\t\t*goto secondphaselast\n\t\t#Plasma Cannon \n\t\t\t*set playerweapon 2\n\t\t\t*set playerweaponname \"Plasma Cannon\"\n\t\t\t*goto secondphaselast\n\t\t#Shoulder Missiles\n\t\t\t*set playerweapon 3\n\t\t\t*set playerweaponname \"Shoulder Missiles\"\n\t\t\t*goto secondphaselast\n\t\n\n\n*label secondphaselast\n*gosub AIchartlast\n*line_break\n*line_break\n*gosub playerchartlast\n*line_break\nSelect the defense module for power boost:\n\n*choice\n\t*selectable_if (playershield > 0) #Armor Block\n\t\t*set playerdefense 1\n\t\t*set playerdefensename \"Armor Block\"\n\t\t*goto encounterlast\n\t*selectable_if (playerarmor > 0) #Shield\n\t\t*set playerdefense 2\n\t\t*set playerdefensename \"Shield\"\n\t\t*goto encounterlast\n\t*selectable_if (playerchaff > 0) #Sensor Jammer\n\t\t*set playerdefense 3\n\t\t*set playerdefensename \"Sensor Jammer\"\n\t\t*goto encounterlast\n\n*label encounterlast\n*rand AIweapon 1 3\n*rand AIdefense 1 3\n\n*if (AIshield \u003c AIarmor) and (AIshield \u003c AIchaff)\n\t*set AIdefense 1\n\t*goto encounterailast\n\n*if (AIarmor \u003c AIshield) and (AIarmor \u003c AIchaff)\n\t*set AIdefense 2\n\t*goto encounterailast\n\n*if (AIchaff \u003c AIshield) and (AIchaff \u003c AIarmor)\n\t*set AIdefense 3\n\t*goto encounterailast\n\n*label encounterailast\n*if (AIweapon = 1)\n\t*set AIweaponname \"Arm Claw\"\n\t*goto encounterAlast\n*elseif (AIweapon = 2)\n\t*set AIweaponname \"Plasma Cannon\"\n\t*goto encounterAlast\n*else\n\t*set AIweaponname \"Shoulder Missiles\"\n\t*goto encounterAlast\n\n*label encounterAlast\n*if (AIdefense = 1)\n\t*set AIdefensename \"Armor Block\"\n\t*goto encounter2blast\n*elseif (AIdefense = 2)\n\t*set AIdefensename \"Shield\"\n\t*goto encounter2blast\n*else\n\t*set AIdefensename \"Sensor Jammer\"\n\t*goto encounter2blast\n\n\n*label encounter2blast\n*if (playerweapon = AIdefense)\n\tYou attack with ${playerweaponname} and Ling successfully countered with boosting ${AIdefensename}. No damage was done.\n\t*line_break\n\t*line_break\n\t*goto encounter3last\n\n*else\n\tYou attack with ${playerweaponname} and Ling boosted ${AIdefensename}, she takes damage.\n\t*if (playerweapon = 1)\n\t\t*if (AIshield \u003c= 0)\n\t\t\t*set AIshield 0\n\t\t\t*set AIhull -25\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\t*goto checkweaponlast\n\t\t*else\n\t\t\t*set AIshield -25\n\t\t\t*set AIhull -10\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\t*goto checkweaponlast\n\t*else\n\t\t*goto checkweaponlast\n\n*label checkweaponlast\n*if (playerweapon = 2)\n\t\t*if (AIarmor \u003c= 0)\n\t\t\t*set AIarmor 0\n\t\t\t*set AIhull -25\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\t*goto checkweapon1last\n\t\t*else\n\t\t\t*set AIarmor -25\n\t\t\t*set AIhull -10\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t*goto checkweapon1last\n*else\n\t*goto checkweapon1last\n\n*label checkweapon1last\n*if (playerweapon = 3)\n\t\t*if (AIchaff \u003c= 0)\n\t\t\t*set AIchaff 0\n\t\t\t*set AIhull -25\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\t*goto encounter3last\n\t\t*else\n\t\t\t*set AIchaff -25\n\t\t\t*set AIhull -10\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\t*goto encounter3last\n*else \n\t*goto encounter3last\n\n*label encounter3last\n*gosub AIchartlast\n*line_break\n*line_break\n*gosub playerchartlast\n\n*label checkdeflast\n*page_break Defense Phase\n\n*if (playerdefense = AIweapon)\n\tLing attacks with ${AIweaponname} and you successfully countered with boosting ${playerdefensename}. No damage was done.\n\t*line_break\n\t*line_break\n\t*goto encounter4last\n\n*else\n\tLing attacks with ${AIweaponname} but you boosted ${playerdefensename}, taking damage.\n\t*if (AIweapon = 1)\n\t\t*if (playershield \u003c= 0)\n\t\t\t*set playershield 0\n\t\t\t*set playerhull -25\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\t*goto AIweaponchecklast\n\t\t*else\t\t\n\t\t\t*set playershield -25\n\t\t\t*set playerhull -10\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\t*goto AIweaponchecklast\n\t*else\n\t\t*goto AIweaponchecklast\n\t\n*label AIweaponchecklast\n*if (AIweapon = 2)\n\t*if (playerarmor \u003c= 0)\n\t\t*set playerarmor 0\n\t\t*set playerhull -25\n\t\t*line_break\n\t\t*line_break\n\t\t*goto AIweaponcheck1last\n\t*else\n\t\t*set playerarmor -25\n\t\t*set playerhull -10\n\t\t*line_break\n\t\t*line_break\n\t\t*goto AIweaponcheck1last\n*else\n\t*goto AIweaponcheck1last\n\n*label AIweaponcheck1last\n*if (AIweapon = 3)\n\t*if (playerchaff \u003c= 0)\n\t\t*set playerchaff 0\n\t\t*set playerhull -25\n\t\t*line_break\n\t\t*line_break\n\t\t*goto encounter4last\n\t*else\t\t\n\t*set playerchaff -25\n\t*set playerhull -10\n\t*line_break\n\t*line_break\n\t*goto encounter4last\n\n*label encounter4last\n*gosub AIchartlast\n*line_break\n*line_break\n*gosub playerchartlast\n*page_break Planning Phase\n*goto firstphaselast\n\t\t\n\n*label playerchartlast\n${name}'s Mech Suit:\n*stat_chart\n\t\n\tpercent playerhull Hull\n\t\n\tpercent playershield Armor\n\t\n\tpercent playerarmor Shield\n\t\n\tpercent playerchaff Missile Jammer\n\t\n*return\n\t\n\n*label AIchartlast\nLing's Mech Suit:\n*stat_chart\n\t\n\tpercent AIhull Hull\n\t\n\tpercent AIshield Armor\n\t\n\tpercent AIarmor Shield\n\t\n\tpercent AIchaff Missile Jammer\n\t\n\t\n\t\n*return\n\n*label lastending\n\n\"Well, at least you've finished one part of your mission. The commanders have been neutralized.\"\n\n\"ya...\"\n\nYou climb your way out of the suit, the metal frame of the mech suit was hot to the touch.\n\nYou head towards the alien base.\n\n\"Is there anyone inside I should be aware of?\"\n\n\"One faint, biological signal coming from inside the base. Take care of that lone wolf and we hit the jackpot, AROC reinforcements are already on the way.\" Felix reassures you.\n\nYou take your weapon at the ready and slowly approach the entrance of the alien structure.\n\nThe outside of the structure was made of titanium plating alloys and metal make-shift parts set up by the NUCP. What was inside looked completely alien. The entrance gave way to a long tunnel that headed downward. The walls of the tunnel were pure white; illuminated by a light blue tube that ran all the way along the tunnel. There were no sensors nor sentries.\n\n\"How long is this tunnel?\" You ask Felix.\n\n\"I can't help you there ${name}. That building is emitting jamming frequencies and I can't see the blueprint of the area.\" He responds. Felix's replies were becoming hard to understand and filled with statics as well.\n\nAs you enter, the static over the comms becomes unbareable.\n\n\"Screw this.\" You took out your ear piece threw it to the ground. The sound it made echos throughout the hall.\n\nThe color of the area highlighted the bloody mess that you were.\n\n30 paces more and you reached a control panel and a door at the end of the tunnel. You turn around to look back at the distance you covered. \n\n\"There's no turning back now.\"\n\nThere was only one button on the terminal. You pushed it and the door opened up to large room. The vastness of the area opened up to countless display cases; all arranged like a large supermarket. Each case contained a piece of alien technology that was preserved by the NUCP. \n\nStrange objects floating in mid air were contained within these display cases. None of them were to your understanding. But you had no time to be amazed. You found the lone wolf within the facility.\n\nIt was Selene.\n\n*page_break\n\nShe was wearing her spy suit, she must have sneaked in with all the chaos outside. Everything came back to you at that instant. She had her back turned on you, examining a piece of technology in a specific display case.\n\n\"How long have you been doing this?\" You ask, with your gun pointing at her head. She froze and drops her tools. She is unarmed, her trident weapon is out of reach. Slowly, she stood up to meet your gaze and your barrel. \n\n\"How're your side wounds?\" She asks, bringing back your first conversation to light.\n\n\"I'm fine. Ask me about my feelings. I dare you.\" You can feel the anger swelling in your wrists. The sting of betrayal found its way to you once more with inches away from completing your mission. \n\n\"I never meant to hurt you.\"\n\n\"Just use me, right?\" You could see that she is affect by the way you thought about your relationship.\n\n\"I didn't lie about everything I said.\" Tears start flowing down her cheeks.\n\n\"How am I supposed to believe in anything you say at this point?\"\n\n\"I don't expect you to believe in anything I say. I've been trained to handle mistrust.\"\n\n\"Answer one question.\" You start, taking a step closer to her to make sure she was within your range.\n\n\"Did you really love me?\"\n\nShe stayed silent for a few moments.\n\n\"Would you believe me if I said yes? I begged my father to spare you after we took over the academy. My plan was simply to infiltrate and get intel from your academy. Nothing more. You complicated my whole objective set. I never had to make a compromise like that. It was never part of my plan to become attached to you.\"\n\n\"Is that why you wrote this letter? To make me feel lost and clueless to what worth I had to you?\" You pull out a crumpled up sheet of paper with her writing on it.\n\n\"There was never a night that I did not think about you and what you did to me. You should have just killed me so I wouldn't have to deal with all of this conflicting emotion.\" Your eyes were glaring at her. You were ready to pull the trigger.\n\n\"No one made me feel safe the way you did.\" She says. \"Us spies have no real friends! No real comrades. It's just the lies we put up to complete our objectives. Those are the only things we have.\" She wipes her tears.\n\n\"You gave me something else than another reason to lie. For once, I was truly comfortable being myself to someone. My insecurities may have seemed skin deep when we bonded; but my insecurities were entrenched deep into my head. You gave me peace of mind in the fact that you did not hate me.\"\n\nHer sobs were audible throughout the whole room. You didn't care. \n\n*sound hoveringturret.mp3\n*page_break\n\n\"Then why did you betray me? Why couldn't you have just stayed with me?\" You let out. You said you were prepared for when you would see her again. Perhaps you weren't.\n\n\"Because the only two things I knew how to do was spy and science. That was my life. That was my upbringing. I never knew anything else.\"\n\nA few silent moments had passed before she spoke again.\n\n\"Be with me.\" She says softly.\n\n\"I know you want a reason to keep me alive. Here it is! Come with me to HILO and I will make sure no one ever hurts you again.\" She tries to approach you but you step back.\n\n\"STAY WHERE YOU ARE!\" You shout, keeping your weapon aimed at her. \n\n\"I couldn't protect you at the academy because we were behind enemy lines. Back at HILO, it can be just the two of us. You won't have to protect me from anything.\n\n\"Who's going to protect me from you?\" You ask, breathing heavily, you await her answer.\n\n\"I will never hurt you again. I promise...\"\n\nYou have your answers. Now you have a decision to make.\n\n*choice\n\t#Kill Selene\n\t\t\"No, no more lies...\" You close your eyes and pull the trigger.\n\t\t\n\t\tShe collapses. the bullet went straight into her heart. She was gone. You rush to her body and hold her close to you. She doesn't speak, but another letter found on her said a lot more than you could ever imagine:\n\t\t\n\t\t${Name},\n\t\t\n\t\tIf you're reading this, that must mean I'm dead at this moment. Please take this letter as proof that I do care about you, even after death. My feelings were real.\n\t\t\n\t\tOur mission within this base is to retrieve a piece of technology known as the mass displacement unit. \n\t\t\n\t\tThe device contained within this room is a much more powerful mechanism that can shift time and dimensions of human beings to any part of the past, any part of the world through the person's memory. That is the technology I was assigned to claim with my visit here. With it, HILO was planning to initiate the completion of their Holy War by teleporting their main military back in time to all NUCP and AROC known bases to put an end to all of this. \n\t\t\n\t\tAROC knows this as well and they're probably planning to use the device for the same purpose as well. \n\t\t\n\t\tThe teleportation device is in front of you in the display case, the glowing cube.\n\t\t\n\t\tI don't expect you to believe everything in this letter. I just pray that this letter finds you in good hands. Don't forget me ${name}.\n\t\t\n\t\tSelene.\n\t\t\n\t\t*sound shotgun.mp3\n\t\t*page_break\n\t\t*goto reallastending\n\t\n\t#Disable Selene\n\t\t\"No, enough lies!\" You aim for her legs and bring her to the ground. You rush quickly to her side to knock her out with a blow to the head.\n\t\t\n\t\tYou notice a small piece of paper fall out from her pocket. You pick it up and reads:\n\t\t\n\t\t${name},\n\t\t\n\t\tIf you're reading this, that must mean I'm dead at this moment. Please take this letter as proof that I do care about you, even after death. My feelings were real.\n\t\t\n\t\tOur mission within this base is to retrieve a piece of technology known as the mass displacement unit. \n\t\t\n\t\tThe device contained within this room is a much more powerful mechanism that can shift time and dimensions of human beings to any part of the past, any part of the world through the person's memory. That is the technology I was assigned to claim with my visit here. With it, HILO was planning to initiate the completion of their Holy War by teleporting their main military back in time to all NUCP and AROC known bases to put an end to all of this. \n\n\t\tAROC knows this as well and they're probably planning to use the device for the same purpose as well. \n\t\t\n\t\tThe teleportation device is in front of you, the glowing cube.\n\t\t\n\t\tI don't expect you to believe everything in this letter. I just pray that this letter finds you in good hands. Don't forget me ${name}.\n\t\t\n\t\tSelene.\n\t\t\n\t\t*sound shotgun.mp3\n\t\t*page_break\n\t\t*goto reallastending\n\t\n\t#Join Selene\n\t\t\"I'll come with you.\"\n\n\t\t\"I hoped for nothing else ${name}.\" Selene respond. She runs towards you to hold you close. You drop your weapon and open your arms to her as well.\n\t\t\n\t\t*if (catdead = 0)\n\t\t\t\n\t\t\tYou hear a familiar voice from the rear\n\t\t\n\t\t\t\"I'm sorry ${name}, I can't let you do this...\"\n\t\t\n\t\t\tA plasma round was fired. It was Catherine. She had seen your betrayal; but her shot was not meant for you.\n\n\t\t\tSelene hit the ground. She was shot in the heart. Reaching out to you with her final breath.\n\n\t\t\tYou rush to her body and hold her close to you. She doesn't speak.\n\t\t\n\t\t\t\"You betrayed us all ${name}, how could you, after all these times we been through together? After all the friends we've lost... was she worth all that?\" Catherine was truly disppointed.\n\t\t\n\t\t\t\"I'll hold off the AROC reinforcements so you can escape, this will be the last favor of our friendship. Leave, and never show your face again.\"\n\t\t\n\t\t\tCatherine heads back up to the entrance.\n\t\t\t\n\t\t\t*sound snipershot.mp3\n\t\t\t*page_break\n\t\t\n\t\t\tAt this moment, a letter fell out of Selene's pocket:\n\t\t\n\t\t\t${name},\n\t\t\n\t\t\tIf you're reading this, that must mean I'm dead at this moment. Please take this letter as proof that I do care about you, even after death. My feelings were real.\n\t\t\n\t\t\tOur mission within this base is to retrieve a piece of technology known as the mass displacement unit. \n\t\t\n\t\t\tThe device contained within this room is a much more powerful mechanism that can shift time and dimensions of human beings to any part of the past, any part of the world through the person's memory. That was the technology I was assigned to claim with my visit here. With it, HILO was planning to initiate the completion of their Holy War by teleporting their main military back in time to all NUCP and AROC known bases to put an end to all of this. \n\t\t\n\t\t\tAROC knows this as well and they're probably planning to use the device for the same purpose as well.\n\t\t\t\n\t\t\tThe teleportation device is in front of you in the display case, the glowing cube.\n\t\t\t\n\t\t\tI don't expect you to believe everything in this letter. I just pray that this letter finds you in good hands. Don't forget me ${name}.\n\t\t\n\t\t\tSelene.\n\t\t\n\t\t\t*page_break\n\t\t\t*goto reallastending\n\t\n\t\t*else\n\t\t\t\n\t\t\tYou hold each other close for a few seconds.\n\t\t\n\t\t\t\"I don't want to see anyone die anymore.\"\n\t\t\t\n\t\t\t\"With this, we won't have to.\" Selene replies, giving you a deep kiss.\n\n\t\t\t\"What do you mean?\" You lick your lips and taste her cherry lip gloss.\t\t\n\t\t\t\n\t\t\t\"Let me show you something\" Selene pulls you to the display case with a strange glowing cube in it.\n\t\t\t\n\t\t\t\"This alien cube is able to shift time and dimensions of human beings to any part of the past, any part of the world through the person's memory. That was the technology I was assigned to claim with my visit here. With it, HILO was planning to initiate the completion of their Holy War by teleporting their main military back in time to all NUCP and AROC known bases to put an end to all of this.\"\n\t\t\t\n\t\t\tYou narrow your eyes on the glowing cube.\n\t\t\t\n\t\t\t\"An extraction team is waiting for us on the other side of the tunnel, let's head back.\" Selene takes the cube with one hand, and grabs you with the other.\n\t\t\t\n\t\t\tAs you exit the dark tunnel, sunlight blinds you briefly. \n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tYou and Selene rejoins a group of HILO team, it feels strange to stand beside mech suits and BDS who arn't shooting at you.\n\t\t\t\n\t\t\t\"Commander Selene\" one of the HILO soldiers calls out.\n\t\t\t\n\t\t\t\"Is the boat ready for departure?\"\n\t\t\t\n\t\t\t\"Yes my lady, but who is this?\"\n\t\t\t\n\t\t\t\"He's with me.\" She pulls your arm closer to her.\n\t\t\t\n\t\t\t\"My lady, your father specifically demanded that you are to be retrieved with the cube and no one else.\"\n\t\t\t\n\t\t\t\"I'm not leaving without him!\" Selene yells.\n\t\t\t\n\t\t\t\"I'm sorry, my lady, but we must comply with your father's orders. Guards, take her and kill the AROC.\"\n\t\t\t\n\t\t\t\"NOOO!\" Selene looks at you with despair.\n\t\t\t\n\t\t\tBefore the two mech suits restrains Selene, she throws you the cube.\n\t\t\t\n\t\t\t\"Use the cube ${name}! Live on!\" Selene says as she's being pulled away from you.\n\t\t\t\n\t\t\tThe Cube glows stronger in your hands, it sense your thoughts. \n\t\t\t\n\t\t\tIn an instant, time slows to a crawl. You watch as the squad of HILO marines, BDS and mech suits raise their weapons towards you.\n\t\t\t\n\t\t\tYou take your chance on this cube and twist it. A strange tingling fills your fingers. With no knowledge of how to operate it, you can only hope you come out alive. A bright light envelopes you. You are force to close your eyes from the brightness.\n\t\t\t\n\t\t\t*sound mechwalk.mp3\n\t\t\t*page_break \n\t\t\t*goto reallastending2\n\t\t\t\n\t\t\t\n*label reallastending\n\t\t\nWith the letter in hand, you slowly approach the display case that Selene was working on. There is a strange looking cube floating inside the glass display.\n\t\t\nSlowly, you removed the lid and held the small glowing cube block in your hand. A strange tingle runs through your fingers.\n\t\n\"Can it really do all that?\" You ask yourself, examining the block. You notice the block has been broken down into twistable sections that you can rearrange. \n\t\t\n\"Teleportation back in time...\" You whisper to yourself.\n\nYou look back at everything that had happened. Everything pales in comparison to the power you now hold in your hands. You suddenly expected Felix to radio in to stop you from doing what you are thinking.\n\n\"Oh yeah...\" You tell yourself, remembering that you had already thrown away your ear piece.\n\nWith everything that has happened. You decide that you no longer want any part of this. You take your chance on this cube and twist it.\n\nWith no knowledge of how to operate it, you can only hope you'll come out alive.\n\nA bright light envelopes you. You are force to close your eyes from the brightness.\n\t\t\n*page_break\n\n*label reallastending2\n\nAll you see is white, then your sights slowly regains focus. Your head pounds with headache, but you find back in the medical center in the AROC Academy.\n\n\"${name}! You're awake!\" Catherine jumps up on from the chair beside your bed.\n\n*if (catdead = 1)\n\t\"Catherine? I thought you're dead! How ???\"\n\t*goto reallastending3\n\n*else\n\t\"Catherine? How did I end up back here? I thought you left me.\"\n\t*goto reallastending3\n\n*label reallastending3\n\n\"What are you talking about?\" Catherine raises one eye brow \"Did Todd gave you a concussion so bad that you have memory loss?\"\n\n\"Todd? Todd is alive?\" Your eyes couldn't open any more wider.\n\n\"Err, ya he's alive, and he beat you up good in the final exam. You been in a coma for 3 days now after he knocked you out cold. You really don't remember any of it? I'm going to have to kick his ass for pounding you this hard!\"\n\nFelix comes in the room \"Dude, you're finally awake! We thought you died!\"\n\n\"It did feel like I died...\" Only you knew that it wasn't from Todd's beating.\n\nA nurse peaks her head into the room \"Alright guys, let him rest up, you can visit tomorrow.\"\n\n\"Catch you later ${name}.\" Catherine waves as she leaves.\n\n\"Get well soon man.\" Felix follows after her.\n\nAfter peace and quiet is restored in your room, you sense a tingle in your fingers...\n\nYou look at your palms, and see a distictive shape ... in the form of a cube.\n\n*sound hoveringturret.mp3\n*page_break End\nWe hope you've enjoyed playing [i]Silent Gear.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThank you for playing [i]Silent Gear[/i]. If you liked the game, please rated it and look foward to my future work.\n\nI am currently working on my second title \"The Chronomancers\". This story involves a fictional character named John, who has an evil boss that abuse him at work and a cheating wife who spends his money with other men. One day, John finds a pocket watch that allows him to stop time. Will he use this ability to take revenge on his boss and wife? Or will he use this to do good deeds in helping those around him? Eventually, a group known as the chronomancers, the time keepers of the world, finds John and attempts to kill him to restore balance. How will he survive? The choices are yours to find out...\n\n\"The Chronomancers\" is expected to finish before June 2015. Please be on the lookout.\n\nThanks again.\n\n*delay_ending 1200 $4.99 $0.99\n\n*comment check point saving sub routines\n\n*label death\n*page_break\nYour game will now be restored to the last saved check point\n*allow_reuse\n*set saveload false\n*page_break Load Saved Game\n*goto savegame\n\n*label savegame\n*if (saveload)\n\t*set sstrength strength\n\t*set sagility agility\n\t*set sintelligence intelligence\n\t*set sperception perception\n\t*set sstealth stealth\n\t*set sinventory inventory\n\t*goto endsaveload\n\n*else\n\t*set strength sstrength\n\t*set agility sagility\n\t*set intelligence sintelligence\n\t*set perception sperception\n\t*set stealth sstealth\n\t*set inventory sinventory\n\t*goto endsaveload\n\n*label death11\n*page_break\nYour game will now be restored to the last saved check point\n*allow_reuse\n*set saveload11 false\n*page_break Load Saved Game\n*goto savegame11\n\n*label savegame11\n*if (saveload11)\n\t*set sstrength strength\n\t*set sagility agility\n\t*set sintelligence intelligence\n\t*set sperception perception\n\t*set sstealth stealth\n\t*set sinventory inventory\n\t*set sep1dead ep1dead\n\t*goto endsaveload11\n\n*else\n\t*set strength sstrength\n\t*set agility sagility\n\t*set intelligence sintelligence\n\t*set perception sperception\n\t*set stealth sstealth\n\t*set inventory sinventory\n\t*set ep1dead sep1dead\n\t*goto endsaveload11\n\n\n\n*label dead12\n*page_break\nYour game will now be restored to the last saved check point\n*allow_reuse\n*set AIhull 100\n*set AIshield 100\n*set AIarmor 100\n*
