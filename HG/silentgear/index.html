<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Silent Gear — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "silentgear", "title": "Silent Gear", "scenes": {"choicescript_description": "Become an elite trained soldier in a grim military future world. You decide your friendship, love, war, betrayal, and above all, survival.\n\n\"Silent Gear\" is an interactive sci-fi thriller by Lee Yuan, where your choices control the story. It’s entirely text-based–without graphics or sound effects–and fueled by the vast, unstoppable power of your imagination.\n\nWith the constant economic downturn and conflicts, the United States had officially lost its superpower title in the year 2032.\n\nRussia and China have risen together and created the New Unified Communist Party (NUCP); they have dominated most of Asia and parts of Europe in terms of economy and political influence. They are the undisputed new super power.\n\nWithout the support from the United States, the ISIS terrorists seized almost all of the middle east. The oil production in Saudi Arabia and other natural resources in the region are now all under ISIS control. They renamed themselves as Holy Islamic Liberation Organization (HILO). Their massive increase of wealth has a devastating effect on all democratic nations. \n\nIn a desperate effort to maintain balance, NATO has created the Augmented Reconnaissance and Operations Corp (AROC) to counter the new threats.\n\nThe story begins on your AROC academy graduation day. This is an interactive story with elements of romance, betrayal and survival, complete with a prologue, three Episodes and multiple endings. Your choices will determine the fate of your squad as well as your own.\n\nThe game also contains 4 mini games: Greedy Banker Dice, Cho Han Bakuchi, Gunship boss battle and Mech Suit boss battle.\n\n• Immerse in a sci-fi military world based on real life political groups\n• Different mini games throughout each Episodes\n• Key items randomized in different locations upon each play through for replayability\n• Two Boss battles that require some thinking and planning\n• Survival of squad members dependent on a combination of the decisions you previously made\n• Multiple endings\n", "choicescript_stats": "*if episode = 1\n\tName: ${name}\n\t*line_break\n\tGender: ${gender}\n\t*line_break\n\tInventory: ${inventory}\n\t*line_break\n\tAugmentations: ${augmentation}\n\t*line_break\n\n\t*stat_chart\n\t\tpercent Strength\n\t\tpercent Agility\n\t\tpercent Perception\n\t\tpercent Intelligence\n\t\tpercent Stealth\n\t\n\t*goto exit\n\n\n*elseif episode = 2\n\tName: ${name}\n\t*line_break\n\tGender: ${gender}\n\t*line_break\n\tPrimary Weapon: ${weapon}\n\t*line_break\n\tSecondary Weapon: ${pistol}\n\t*line_break\n\tFrag: ${frag}\n\t*line_break\n\tEMP: ${emp}\n\t*line_break\n\tFlash ${flash}\n\t*line_break\n\t*line_break\n\tAugmentations: ${augmentation}\n\t\n\t*stat_chart\n\t\tpercent Strength\n\t\tpercent Agility\n\t\tpercent Perception\n\t\tpercent Intelligence\n\t\tpercent Stealth\n\t\n\t*goto exit\n\t\t\n*label exit\n\n*finish\n\t", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Advertising[/b]\n  \n  Remove advertisements.\n  \n  *purchase adfree $4.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n  *goto purchased_list\n\n*label purchased_list\n\n*if choice_purchased_adfree\n  [b]Advertising[/b]\n  \n  You've paid to remove advertisements.\n", "savegame": "*if (saveload)\n\t*set sstrength strength\n\t*set sagility agility\n\t*set sintelligence intelligence\n\t*set sperception perception\n\t*set sstealth stealth\n\t*set sinventory inventory\n\t*goto_scene startup endsaveload\n\n*else\n\t*set strength sstrength\n\t*set agility sagility\n\t*set intelligence sintelligence\n\t*set perception sperception\n\t*set stealth sstealth\n\t*set inventory sinventory\n\t*goto_scene startup endsaveload\n", "screenshots": "*comment please use the cover protrait for the first photo, thanks\ntest\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n*set name \"Ken\"\n*set gender \"Male\"\n*set inventory \"Grimlock Rifle, Frag Grenade x2, Zorva Dagger\"\n*set augmentation \"Legs\"\n*set strength 42\n*set agility 78\n*set intelligence 36\n*set perception 57  \n*set stealth 69\n\n\"I don't think she's going to be on this mission.\" Catherine knew what you were thinking about.\n\n\"Usually, research experts will have to wait at HQ at the ready in case their boys bring home the bacon.\"\n\n\"I know. I don't think she'll be there either.\"\n\n\"Have you already thought about what you're going to do when you see her again?\"\n\nYou stay silent.\n\n\"Looks like you still have a lot to process. For your sake, I hope she doesn't show up. It might cost you more the next time you let your guard down.\"\n\n\"Don't worry. I'll be ready when that happens.\" You reassure Catherine. She likes the look of determination on your face and drops the topic.\n\nYou finish your work out and head back to your quarters to check the mission details. \n\nYou read through the list of choices on your computer screen:\n\n*fake_choice\n\t#Mission Briefing\n\t#Squad Members Profile\n\t#History of Current Conflicts\n\t#NUCP Commanders Intel\n\t#NUCP Military Operation Details\n\t#HILO Military Operation DEtails\n\t#Equipments and Gears\n\t#Augmentation Documentation\n\t#Log off\n\n*script changeBackgroundColor(\"black\")\n*set name \"Karen\"\n*set gender \"Female\"\n*set inventory \"Hawklar Laser SMG, Frag Grenade, EMP Grenade, Zorva Dagger\"\n*set augmentation \"Head\"\n*set strength 39\n*set agility 54\n*set intelligence 82\n*set perception 76  \n*set stealth 48\n\nYou observe the area where you landed, all seems quiet at the moment. You take a deep breath, After a few seconds of silence in the docked boat, you give the hand signal to disembark.\n\n\"I'm reading two groups of enemy signatures closing in on your position Karen, one group is coming from the northern alien artifacts, the other is from the HILO ships recently landed nearby.\" Felix says.\n\n\"This is bad, it's too risky for us to face both groups at once.\" you think out loud.\n\n\"The northern group must be NUCP since they are coming from the artifacts, they probably think we're HILO. The other group is no doubt the newly landed HILO operatives, sent to investigate who we are, why don't we hide and ambush them when they finish killing each other?\" Catherine suggests.\n\n\"We could take the inititive and attack one group to push through to safety.\" Charlie shows his eagerness for battle.\n\nWould it be better to push through one group and get out of the area ? or hide and wait for a chance to ambush?\n\nWhat is your plan of action?\n\n*fake_choice\n\t#Hide and wait for a chance to ambush\n\t#Attack the NUCP Group\n\t#Attack the HILO Group\n\n*script changeBackgroundColor(\"sepia\")\n*set name \"Leo\"\n*set gender \"Male\"\n*set inventory \"Skrumk Shotgun, Frag Grenade, EMP Grenade, Zorva Dagger\"\n*set augmentation \"Arms\"\n*set strength 82\n*set agility 46\n*set intelligence 64\n*set perception 51   \n*set stealth 37\n\nAs you arrive in the hangar, a gentle breeze rushes through your face, a breath of fresh air was an exhilarating rejuvenation at this point. Unfortunately, this peace was almost instantly interrupted by the sound of weapons discharging and the screaming voices from the marines; some with excitement, some with fear, and some in pain.\n\n\"Catherine, I'm in the hangar.\" You say\n\n\"Leo, Robby needs help and I'm tide up at the moment, can you assist?\"\n\nYou hunker down to assess the situation:\n\nTo your right, at the end of the runway appears to be a control tower pressed against the rocky cave wall. Robby is there just outside the tower, taking cover behind a crane. His heavy breathing maintained a constant mist of steam in front of his face as he scrambles to reload his weapon. Watching the waves of gun fire towards his direction, there is no doubt in your mind he is badly pinned down. \n\nCatherine is on a higher platform above raining bullets down at another entrance, her determination is second to none, but for every marine she takes down, two more appears as replacement.\n\nswivel your head to the left, you find the source of the fresh air, the hangar gate about a hundred meters away, wide open now with a beautiful mountain view from the cliffs, Robby must have open this gate. Rows of fighter jets are neatly parked on both sides of the runway, you notice four very distinctive planes floating in mid air like stingrays swimming in the ocean. These organic crafts stick out like a sore thumb amidst the traditional NUCP fighters fixed and stationary on the ground. Todd is nearby one of the stingrays, concentrated on providing sniper support for Robby and Catherine. Unknown to Todd, a door slides open from behind, NUCP marines begins to pour in.\n\n*fake_choice\n\t#Help Todd\n\t#Help Robby\n\n*set name \"Jasmine\"\n*set gender \"Female\"\n*set inventory \"Grimlock Rifle, Frag Grenade x2, EMP Grenade x2, Zorva Dagger\"\n*set augmentation \"Arms\"\n*set strength 82\n*set agility 46\n*set intelligence 64\n*set perception 51   \n*set stealth 37\n\nThe elevator descends into the base.\n\nYou enter an area to what seem like a BDS manufacturing plant. the conveyer belt above hangs the bipedal frame, ready to be assembled. The wall panels are covered in silver and white plating, giving it a high tech feel compare to NUCP. There are some none-combatant operators here working on the machinery as well as several BDS patrolling the area. \n\nAs you search for the Terminal that takes the disk you needed to plant, you observe the general ambience of the area. Questions of national capacity infiltrate your thoughts.\n\"Could an Arab leader have enough technical know-how to create all of this?\"\n\nYou then start to look at the non-military personnel in the base. You take note that the people in lab gowns aren't Middle-Eastern in orientation. There were Japanese, American and even Russian people operating the complicated machinery in the area. You begin to think of the nature of your extraction target; Dr. Askler. \n\nIt was while you were pondering that a strange voice caught you off-guard.\n\n\"W-Who are you?\"\nYour spine froze yet your instinct spun you around and had your weapon point towards your inquisitor. \n\nIt was an Asian looking girl in a lab coat. She had freckles hiding underneath thick glasses. Her black, unkempt hair stuck out of make shift buns tied together with what seems to be rubber bands. She's got the smell of sparks and chemicals, reminding you of a female version of Felix.\n\nHow do you respond?\n*fake_choice\n\t#Kill the girl\n\t#Threaten the girl\n\n\n\n\n\n\n\n\t", "startup": "\n*title Silent Gear\n*author Lee Yuan\n*scene_list\n\tstartup\n\n*create alphatest false\n*create saveload false\n*create saveload2 false\n*create saveload11 false\n*create saveload12 false\n*create saveload21 false\n*create saveload3 false\n*create saveload31 false\n*create name \"\"\n*create gender \"\"\n*create rank \"initiate\"\n*create inventory \"\"\n*create weapon \"\"\n*create pistol \"\"\n*create comma false\n*create augmentation \"\"\n*create strength 50\n*create agility 50\n*create intelligence 50\n*create perception 50\n*create stealth 50\n*create sstrength 0\n*create sagility 0\n*create sintelligence 0\n*create sperception 0\n*create sstealth 0\n*create sinventory \"\"\n*create diceroll 1\n*create counter 0\n*create keypad 0\n*create entercode 0\n*create drink 0\n*create minute 7\n*create seconds 0\n*create grenade 1\n*create guards 0\n*create minigameAI 17\n*create robbydice 1\n*create playerdice 1\n*create dicechance 1\n*create robbybank 0\n*create playerbank 0\n*create robbyhold 0\n*create playerhold 0\n*create AIweapon 1\n*create playerweapon 1\n*create AIdefense 1\n*create playerdefense 1\n*create AIhull 100\n*create AIshield 100\n*create AIarmor 100\n*create AIchaff 100\n*create playerhull 100\n*create playershield 100\n*create playerarmor 100\n*create playerchaff 100\n*create AIweaponname \"\"\n*create playerweaponname \"\"\n*create AIdefensename \"\"\n*create playerdefensename \"\"\n*create ep1dead 0\n*create sep1dead 0\n*create episode 1\n*create catrel 0\n*create selrel 0\n*comment *create revpak 0\n*create frag 0\n*create emp 0\n*create flash 0\n*create chdie1 1\n*create chdie2 1\n*create chdie3 1\n*create chdie4 1\n*create chdie5 1\n*create playchip 1000\n*create AIchip 1000\n*create playwager 50\n*create AIwager 50\n*create potpile 0\n*create chiprand 0\n*create betodd 0\n*create hvydead 0\n*create empdead 0\n*create catdead 0\n\n*if choice_randomtest\n\t*ending\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and (not(choice_purchased_adfree) and choice_is_advertising_supported)\n\t\t[i]Silent Gear[/i] is supported by advertisements, but you can buy the unlimited version\n\t\tto turn off ads forever.\n\n\t\t*purchase adfree $4.99 purchased\n\t\t*page_break_advertisement\n\n\n*label purchased\n\n*if alphatest = true\n\t*goto testsection\n\n*else\n*label testsection\nToday is your final exam at the AROC academy, a hand to hand combat trial is about to commence. Many eyes are upon you, mostly veteran AROC members and judges. Your opponent is Todd, he was always bigger than you, and never liked you much during the years in the academy. With eyes of fury, he reminds you the time he's beaten you once before, but things are different now, you have grown into a formidable fighter yourself. \n\n\"Don't worry, I'll make this quick and painful, just like the old times.\" Todd grins at you with a hint of pleasure. \n\nYou remain silent.\n\nWith the ring of the bell, the trial battle begins, Todd launches himself at you like a catapult. For a split moment, you are surprised by how such a large mass is able to move at such speed. The years of concentrated physical training has really paid off for Todd. Quickly you snap back to reality and react, what will you do?\n\n*choice\n\t#Wait until the last moment to see what sort of attack Todd will throw at me to decide on my next move\n\t\t\n\t\tUnfortunately, you waited too long, there is no time to act now, you brace for impact.\n\t\t*goto toddhit\n\t\t\n\t#Attempt to jump out of the way, dodging whatever trick he's about to pull\n\t\n\t\t*goto sidestep\n\t\n\t#Stand my ground firmly, ready to defend myself with the oncoming assault.\n\t\tYou brace for impact.\n\t\t*goto toddhit\n\t\n\t#Evade Todd's charge and launch a counter attack myself.\n\t\t\n\t\t*label sidestep\n\t\tYou sidestep as fast as you could, but due to how early you move, Todd had enough time to redirect himself to your new position.\n\t\t*goto toddhit\n\n\n\n*label toddhit\n\nTodd swings his fist hard to your face, the blow meant for your jaw whizz by in a blur of knuckles. From the corner of your eyes, you see Todd's other arm begins an upward swing, you duck this time, and feel your hair ruffle with force. you spot an opening at Todd's abdominal area. You have a split moment to react:\n\n*fake_choice\n\t#Left jab his stomach\n\t\t\n\t#Knee him in the stomach\n\t\t\n\t#Kick him in the stomach\n\n\n*page_break\n\nTodd takes it hard in the stomach, his face display signs of pain, but disconnects with his movements as he continues to lunge punches at you.\n\nYou block and back away. Minutes pass with no real contact and you begin to feel the pressure of the judges watching.\n\nAvoidance is fine, but you knew it would not win you this fight.\n\nYou decide to go on the offensive, putting the pressure on Todd, for you are not as weak as you once were.\n\nYou lashed out, aiming for every opportunity of taking down your opponent.\n\nTodd avoids one flying fist only to collide with the other.\n\nnot letting Todd recover, you land several combos of punches and kicks to his face. He drops to the ground like a log.\n\n\n*page_break Prologue\n\nIt's the year 2058, you never really found out what happened to your parents, but you were an orphan for as long as you can remember. At the age of 3, the government selected you for a small group of secret forces code named \"AROC\" (Augmented Reconnaissance and Operations Corp). All AROC members were Recruited before the age of 5 and begins a regimental disciplinary training at the age of 6. \n\n*page_break\n\n*label inputgender\nAre you male or female ?\n\n*choice\n\t#Male\n\t\t*set gender \"Male\"\n\t\t*goto input_name\n\t#Female\n\t\t*set gender \"Female\"\n\n*page_break\n\n*label input_name\nWhat is your name?\n*input_text name\n*set name \"$!{name}\"\n\n\n\n*page_break\n\nYou will be known as Initiate ${name}. The AROC academy allows you to choose one augmentation upon passing the graduation combat trial, which augmentation do you prefer?\n\n*choice\n\t#Arm augmentation: increases strength [i](Default)[/i]\n\t\t*set strength +20\n\t\t*set augmentation \"Arms\"\n\t\t*goto seestat\n\t\t\n\t#Leg augmentation: allows you to move quicker and stealthier\n\t\t*set agility +10\n\t\t*set stealth +10\n\t\t*set augmentation \"Legs\"\n\t\t*goto seestat\n\t\t\n\t#Head augmentation: increases brain processing speed and memory, also improving situational awareness.\n\t\t*set intelligence +10\n\t\t*set perception +10\n\t\t*set augmentation \"Head\"\n\n*label seestat\n\n*page_break\n\nAs you line up for lunch at the canteen, you can already taste the uninspired pasta in the air. A scent teases your nose, not the pasta, a fresh smell, like skin just out from a shower.\n\n\"That was some nice moves you pulled on Todd today ${name}.\" said Catherine as she gracefully stalks up behind you.\n\nCatherine Flynn, normally, a person would be startled by her, but you have gotten used to Catherine's sneaky ways, her tiny yet beautiful thin stature allows her to accel in stealth. Despite her tiny size, she is a very capable fighter. You were there for her battle trial. She doesn't rely on sheer strength, instead uses an agile and artistic style of combat, performing leaps and jumps around her opponents, distracting them then defeating them. Suddenly you're reminded how lucky you were to not having picked to face her in the final exam, it would have been impossible to take her down. Needless to say, she also won her combat trial. \n\n\"I'm just glad I didn't have to fight you, and honestly, I wasn't sure I was able to beat Todd either, he's gotten even stronger.\"\n\n\"Well, he sure isn't happy with you now that he doesn't get an augmentation for graduation.\" Catherine glimpse over to the table where Todd is sitting. You look up too, and connects with Todd's eyes, he turns away, face burning red in resentment. \n\n\"Ya, he was just delighted to see me before all this.\" You reply sarcastically\n\nThose that lost the graduation battle do not receive an augmentation as reward. You think back and feel pretty good about your accomplishment.\n\n*page_break\n\n\"Which augmentation did you pick Catherine?\" You ask as both of you sit down with food.\n\n\"I picked the leg enhancement, focusing on what I'm already good at.\" As graceful and pleasant to look at, Catherine can still eat like a pig, that's something you could never get used to.\n\n\"Remind me to get out of your way if we end up doing missions together.\" You reply\n\n\"Don't worry, I'll be gone before you sneeze.\"\n\n\"What's up guys?\" Felix and Robby joins our table. \n\nWith a big pen stuck on his ear, and glasses the size of oranges, anybody would categorize Felix as a nerd on first sight.  His intelligence is unquestionable, but there's not much else going for him. \n\nRobby on the other hand, is a bit older than the rest of us, he's been on a several missions already, but you wouldn't call him a veteran yet. \n\n\"Hey Catherine.\" Robby said with a big smile showing his teeth like a goofy cartoon character.\n\nIt's obvious he has a crush on Catherine, but she doesn't think much of it.\n\nYou spend majority of the day talking and enjoying the company of the group.\n\n\n*page_break\n\nOn your way back to your dorm, you bump into Captain Maxwell. He is a honorable man, his battle years are long behind him, now more of a role model for the youth.\n\n\"Congratulations on your trial victory ${name}.\" Maxwell says as he walks past you.\n\n\"Thank you sir.\"\n\n\"I expect nothing less on your field performance initiate.\" He says as he walks away.\n\n\"Yes sir.\"\n \nThis reminds you that you should probably go over the archives regarding the current conflicts and gears to prepare yourself for your first real mission in 2 days time.\n\n*page_break\n\n\nBack in your room, you fire up the computer, \n\n*label archive\n\nwhat would you like to go over?\n\n*choice\n\t#Mission Briefing\n\t\t\n\t\tAgent ${name}:\n\t\t\n\t\tOur Intel has recently learned that NUCP is preparing to launch a new type of prototype gunship against HILO. It's set to operate in the next few weeks. While we are happy to see HILO suffer, we cannot permit such an increase of power in the NUCP. We will be inserting your group to obtain intel on the gunship design, capture one for our research and destroy the remainder prototypes. Details will be given by Captain Maxwell prior to mission commence. \t\t\n\t\t\n\t\t*page_break Back\n\t\t\n\t\t*goto archive\n\t\n\t#History of Current Conflict\n\t\t\n\t\tWith the constant economic downturn and conflicts, the United States had officially lost its super power title in the year 2032.\n\t\t\n\t\tRussia and China has risen together and created the New Unified Communist Party (NUCP), they have dominated most of Asia and parts of Europe in terms of economy and political influence, they are the undisputed new super power.\n\t\t\n\t\tWithout the support from the United States, the ISIS terrorist seized almost all of the middle east continent. The oil production in Saudi Arabia and other natural resources in the region are now all under ISIS control. Their massive increase of wealth has a devastating effect on all democratic nations. They renamed themselves as Holy Islamic Liberation Organization (HILO).\n\t\t\n\t\tIn a desperate effort to maintain balance, NATO has created the Augmented Reconnaissance and Operations Corp (AROC) to counter the new threats.\n\t\t\n\t\t*page_break Back\n\t\t\n\t\t*goto archive\n\t\t\n\t#Equipments and Gears\n\t\t\n\t\tGrimloc Pulse Rifle: The Grimloc is the standard issue AROC rifle, with both fully automatic and semi automatic modes. One short coming of this rifle is that it's prone to overheat if used excessively in full automatic. \n\t\t\n\t\tScrumk Shotgun: The Scrumk is considered a small \"Flak Cannon\" capable of clearing large crowds in a small confined area. It uses traditional explosive ammo to spray in a cone shape blast. One advantage of the Scrumk is it's fast reloading ability to quickly pull off the next shot making it a great weapon for \"spray n pray\" techniques.\n\t\t\n\t\tHawklar burst laser SMG: The small compact design of the Hawklar enables the weapon to fire like a rifle with the size of a large pistol, it still needs to be held with both hands for stability. It is the lightest gun in the AROC arsenal. \n\n\t\tZorva Dagger: Zorva's blade is made out of reinforced titanium, the blade has electrical current running on the edges, allowing it to stun enemies prior to slicing them. \t\n\t\t\n\t\tM22B Frag Grenade: Standard issued grenade that scans your finger print before triggering, this prevents none AROC members from using it. The scan time is too quick to be noticed. It also has an advance fail safe mechanism to prevent false trigger.\n\t\t\n\t\tMkI Getrak Laser Pistol: The MkI is a small side arm typically used by the sniper for close range combat, there is no need to reload, but like the Pulse rifle, prolong fire will cause over heatdamage. This pistol is not able to penetrate thick armor.\n\t\t\n\t\t\n\t\t*page_break Back\n\t\n\t\t*goto archive\n\t\n\t#Augmentation Documentation\n\t\t\n\t\tBasic Head, Arm, Leg Augmentations: These augmentations enhances the part of the body it is applied on, improving performance. The limb augmentations (Arms and Legs) has a special over drive boost feature where it temporarily grants 3 times the power, but permanently damages the augmentation and cause injury to the limbs in the process. This is advised only to be used in critical life threatening situations.\n\t\t\n\t\tCloaking Field: This augmentation allows the user to bend light around them, making them partially invisible. The distorted light is quite visible while the user is moving, as well at close range, it can be easily detected.\n\t\t\n\t\tVisual Targeting: This enhancement provides the user with a great increase in perception and target identifying, it can also be used to detect finger print on keypads.\n\t\t\n\t\tImpact Servo: This augmentation is used in halo jumps, allowing the user to land from terminal velocity on the ground without injury. It can support up to a maximum of 350lbs of weight and is only capable of one time use.\n\t\t\n\t\tShield Sphere: The Shield Sphere generates an orb of energy around the user, providing protection from all puncture and impact damage. At close range melee, the shield is not as effective and the user can still be injured. \t\n\t\t\n\t\t*page_break Back\n\t\t\n\t\t*goto archive\n\t\n\t#Log off the computer\n\t\t\n\t\tYou turn off the computer, and go to bed.\n\t\t\nYou wake up to a new day, not feeling terribly refreshed, today is the last day before your mission, what do you plan to do ?\n\n*choice\n\t\n\t#Head for the gym\n\t\tA proper workout always puts you in a better mood. You consider what you want to do today:\n\t\t*choice\n\t\t\t#Lift weights\n\t\t\t\tYou work hard today with upper body strength, and as a result, your strength improves. You also see Todd working out as well, but you avoid each other for obvious reasons.\n\t\t\t\t*set strength +5\n\t\t\t\t*page_break\n\t\t\t\t*goto exit\n\t\t\t\n\t\t\t#Jog on the treadmill \n\t\t\t\tYou work hard on the treadmill today doing cardio, and as a result, your agility improves. You also see Catherine there too, she's making final adjustments to her leg augmentations and testing it out on the treadmill.\n\t\t\t\t*set agility +5\n\t\t\t\t*page_break\n\t\t\t\t*goto exit\n\t\n\t#Read \"How to be smart for dummies\"\n\t\tEven though \"How to be smart for dummies\" is more comical than useful, you still pick up on a couple points which you can apply into your combat tactics. Your intelligence improves.\n\t\t*set intelligence +5\n\t\t*page_break\n\t\t*goto exit\n\t\n\t#Play a first person shooter video game\n\t\tYou play a first person shooter game with Felix, he quickly dominates you. The experience helps you improve eye coordination and reaction time. Your perception increases.\n\t\t*set perception +5\n\t\t*page_break\n\n*label exit\n\nFor the remainder of the day, you decide to:\n\n*choice\n\t#Go eat at the canteen\n\t\t\n\t\tYou feel hungry, so you head for the canteen. Fried chicken and potatoes, one of the best options on the rotation... it certainly is not.  You eat just enough to feel full and returns to your room for the night.\n\t\n\t\t*page_break\n\t\t*goto missionday\n\t\n\t#Go to bed early and call in for the night\n\t\t\n\t\tYou realize you should try to sleep early as you'll need to be well rested for the mission tomorrow.\n\t\t*page_break\n\t\t*goto missionday\n\t\n\t#[b]MINI GAME[/b]: Play Greedy Banker with Robby\n\t\tRobby challenges you to a game of Greedy Banker\n\t\t*line_break\n\t\t*line_break\n\t\t*goto minigame\n\t\n*label minigame\nDo you know how to play this game?\n*choice\n\t#Yes\n\t\t*goto playerturn\n\t\n\t#No\n\t\tGame Rules: \n\t\t\n\t\tEach turn, a player rolls a dice until either a 1 is rolled, or the player choose to \"Bank\".\n\t\t\n\t\t- If the player rolls any number other than 1, then that number is added into their holding total, and the player continues to roll.\n\t\t\n\t\t- If the player rolls a 1, then the player loose all holding total and it becomes the other player's turn.\n\t\t\n\t\t- If the player choose to \"Bank\", then their holding total is added into their bank and they finish their turn.\n\t\t\n\t\tThe first player to reach 100 bank points win.\n\t\t\n\t\tFor example: If ${name} begins a turn and rolls 5, ${name} can bank 5 points, but choose to hold and roll again, this time, ${name} rolls a 3, and could bank 8 points but choose to roll again, ${name} rolls a 1 and the holding total of 8 is lost. The other player Robby rolls a sequence of 5-4-6, after which he choose to bank the total holding points of 15. The score will then be ${name} = 0, Robby = 15.\n\t\t\n\t\t\n\t\t*page_break Start Game\n\t\t*goto playerturn\n\n*label robbyturn\n*rand minigameAI 12 20\n*rand robbydice 1 6\n*rand dicechance 1 6\n\n*if (playerbank >= 100)\n\tYou win the game.\n\t\n\t\"Guess luck was on your side today ${name}, good game.\" Robby says \"Do you want to have another round?\n\t\n\t*choice\n\t\t#Yes\n\t\t\t*set playerbank 0\n\t\t\t*set robbybank 0\n\t\t\t*goto playerturn\n\t\t#No\n\t\t\tHappily, you return to your room and calls it a day.\n\t\t\t\n\t\t\t*goto missionday\n\n*if (robbydice = 1)\n\t*if (dicechance = 3) or (dicechance = 6)\n\t\t*rand robbydice 2 6\n\t\tRobby\n\t\t*line_break\n\t\t*line_break\n\t\tHolding: ${robbyhold}\n\t\t*line_break\n\t\t*line_break\n\t\tBank: ${robbybank}\n\t\t*line_break\n\t\t*line_break\n\t\t*line_break\n\t\tRobby rolls a ${robbydice}, and he choose to Bank\n\t\t*line_break\n\t\t*line_break\n\t\t*line_break\n\t\tBank: ${playerbank}\n\t\t*line_break\n\t\t*line_break\n\t\tHolding: ${playerhold}\n\t\t*line_break\n\t\t*line_break\n\t\t${name}\n\t\n\t\t*set robbyhold +robbydice\n\t\t*set robbybank +robbyhold\n\t\t*set robbyhold 0\n\t\t*page_break Your turn\n\t\t*goto playerturn\n\t\n\t*else\n\t\tRobby\n\t\t*line_break\n\t\t*line_break\n\t\tHolding: ${robbyhold}\n\t\t*line_break\n\t\t*line_break\n\t\tBank: ${robbybank}\n\t\t*line_break\n\t\t*line_break\n\t\t*line_break\n\t\tRobby rolls a ${robbydice}, he lost his holding and turn\n\t\t*line_break\n\t\t*line_break\n\t\t*line_break\n\t\tBank: ${playerbank}\n\t\t*line_break\n\t\t*line_break\n\t\tHolding: ${playerhold}\n\t\t*line_break\n\t\t*line_break\n\t\t${name}\n\t\t\n\t\t*set robbyhold 0\n\t\t*page_break Your Turn\n\t\t*goto playerturn\n\n*if (minigameAI \u003c= robbyhold) or (robbybank > 94)\n\tRobby\n\t*line_break\n\t*line_break\n\tHolding: ${robbyhold}\n\t*line_break\n\t*line_break\n\tBank: ${robbybank}\n\t*line_break\n\t*line_break\n\t*line_break\n\tRobby rolls a ${robbydice}, and choose to Bank\n\t*line_break\n\t*line_break\n\t*line_break\n\tBank: ${playerbank}\n\t*line_break\n\t*line_break\n\tHolding: ${playerhold}\n\t*line_break\n\t*line_break\n\t${name}\n\t\n\t*set robbyhold +robbydice\n\t*set robbybank +robbyhold\n\t*set robbyhold 0\n\t*page_break Your turn\n\t*goto playerturn\n\n*else\n\tRobby\n\t*line_break\n\t*line_break\n\tHolding: ${robbyhold}\n\t*line_break\n\t*line_break\n\tBank: ${robbybank}\n\t*line_break\n\t*line_break\n\t*line_break\n\tRobby rolls a ${robbydice}, and choose to Hold\n\t*line_break\n\t*line_break\n\t*line_break\n\tBank: ${playerbank}\n\t*line_break\n\t*line_break\n\tHolding: ${playerhold}\n\t*line_break\n\t*line_break\n\t${name}\n\t\n\t*set robbyhold +robbydice\n\t*page_break\n\t*goto robbyturn\n\n\n*label playerturn\n*rand playerdice 1 6\n\n*if (playerdice = 1)\n\t*if (dicechance = 1)\n\t\t*rand playerdice 2 6\n\t\t*goto playerturnscan\n\t*else\n\t\t*goto playerturnscan\n\n*label playerturnscan\n\t\n*if (robbybank >= 100)\n\t*page_break\n\tYou lost the game.\n\t\n\t\"Hah, nice try buddy.\" Robby said smugly \"Do you want to have another round?\"\n\t\n\t*choice\n\t\t#Yes\n\t\t\t*set playerbank 0\n\t\t\t*set robbybank 0\n\t\t\t*goto playerturn\n\t\t#No\n\t\t\tFeeling a bit depressed, you return to your room and calls it a day.\n\t\t\t\n\t\t\t*goto missionday\n\t\n*if (playerdice = 1)\n\t\n\tRobby\n\t*line_break\n\t*line_break\n\tHolding: ${robbyhold}\n\t*line_break\n\t*line_break\n\tBank: ${robbybank}\n\t*line_break\n\t*line_break\n\t*line_break\n\tYou rolled ${playerdice}, you lost your holding and turn.\n\t*line_break\n\t*line_break\n\t*line_break\n\tBank: ${playerbank}\n\t*line_break\n\t*line_break\n\tHolding: ${playerhold}\n\t*line_break\n\t*line_break\n\t${name}\n\t*set playerhold 0\n\t*page_break\n\t*goto robbyturn\n\n*else\t\n\tRobby\n\t*line_break\n\t*line_break\n\tHolding: ${robbyhold}\n\t*line_break\n\t*line_break\n\tBank: ${robbybank}\n\t*line_break\n\t*line_break\n\t*line_break\n\tYou rolled ${playerdice}, what would you like to do ?\n\t*line_break\n\t*line_break\n\t*line_break\n\tBank: ${playerbank}\n\t*line_break\n\t*line_break\n\tHolding: ${playerhold}\n\t*line_break\n\t*line_break\n\t${name}\n*choice\n\t#Hold\n\t\t*set playerhold +playerdice\n\t\t*goto playerturn\n\t#Bank\n\t\t*set playerhold +playerdice\n\t\t*set playerbank +playerhold\n\t\t*set playerhold 0\n\t\t*goto robbyturn\n\t#Quit\n\t\tYou decided to call it quits and return to your room for an early rest.\n\t\t*goto missionday\n\n*page_break Exit Mini Game\n\n\n*goto missionday\n\n*label missionday\n\nThe alarm wakes you in the morning at 4am, you didn't sleep much during the night, can't stop thinking about the mission today, you run through different scenarios of what might happen. Finally you force yourself out of bed, wash up and eat a quick breakfast at the canteen. \n\nThe scrambled eggs and sausage tastes bland not because you are in a rush, but because it was always bland.\n\nYou arrive at your locker and decide which weapon you will take:\n\n*choice\n\t#Take the Grimloc Pulse Rifle\n\t\tThe Standard Grimloc Pulse Rifle will be more than sufficient for the job. You thought to yourself.\n\t\t*set inventory &\"Grimloc Rifle\"\n\t\t*set weapon \"Grimloc rifle\"\n\t\t*goto briefing\n\t#Take the Scrumk Shotgun\n\t\tYou get a sense there might be a need for close range room clearing and grab the Scrmk Shotgun.\n\t\t*set inventory &\"Scrmk Shotgun\"\n\t\t*set weapon \"Scrmk shotgun\"\n\t\t*goto briefing\n\t\t\n\t#Take the Hawklar Laser SMG\n\t\tThe Hawklar Laser SMG has the lightness and flexibility to adapt to a variety of situations. You can't go wrong with this weapon.\n\t\t*set inventory &\"Hawklar SMG\"\n\t\t*set weapon \"Hawklar SMG\"\n\t\t*goto briefing\n\n*label briefing\n\nYou also grab a M22B Frag Grenade and belt the Zorva Dagger.\n\n*set inventory &\", Zorva Dagger, M22B Frag Grenade\"\n\n*page_break\n\nWhen you arrive at the briefing room, you put your gear on the shelf.\n\nYou notice Catherine, Robby, and Todd have already sat down. Pouring yourself a hot cup of coffee, you join them at the meeting table.\n\nAs usual, Robby is flirting with Catherine. \n\n\"Why did I bother to come early?\" She murmurs while rubbing her face in regret.\n\nThe coffee is bitter, but you force yourself to drink some to be more awake.\n\n5 minutes later, Felix rushes in and sat down just before Captain Maxwell arrives and turns on the projector.\n\n*page_break\n\n\"Alright, everybody is here, let's get started. I'm sure all of you have read the mission briefing prior to this meeting. Our objectives are as follows:\n\n1. Locate and infiltrate the NUCP research center database room\n\n2. Connect and hack into the terminal to gain access to the prototype schematics \n\n3. Upload the database to our disk\n\n4. Locate and infiltrate the hangar where the prototypes are being kept\n\n5. Plant bombs in the hangar, \n\n6. Capture a prototype gunship and return to base.\n\nCatherine, you are assigned as the forward scout, you will recon the area, clear the path of enemies, determine the locations of interest and update the squad on any situational changes.\n\nRobby, once landed, you will head for the hangar and wait for Catherine to scout the area, once clear, you will plant the bombs and prep one of the prototype gunships for takeoff.\n\n${name}, you will head to the research center, locate the document room and plug in there. Felix will patch through and download the database on the disk. Take the disk and rendezvous with Robby at the gunship. \n\nTodd, once landed, you will provide sniper coverage to assist both Robby and ${name}.\n\nFelix will be the main operator for this mission, he will be staying in base to provide intel and tech support.\n\nAny questions?\"\n\nEvery one remains silent.\n\n\"That will be all then, meet at docking bay 03B in 10 minutes for takeoff.\"\n\n*page_break\n\n*set saveload true\n\nPROGRESS SAVED . . .\n\nShould you die in the following episode, you will be able to replay from this point on.\n\n*goto savegame\n\n*label endsaveload\n\n*page_break Episode One\n\nThe docking bay feels like a small metropolis, with many bodies busying themselves like an ant colony. You try not to bump into the carts and machinery as you push your way to docking bay 3B.\n\n\"Radio check ${name}.\" Felix calls you on the headpiece.\n\n\"This is ${name}, loud and clear.\"\n\nOne after another, each member reports in to Felix.\n\nYou move about trying to get comfortable as you strap yourself into a seat in the dropship. Why couldn't they make these seats more comfortable? You thought to yourself. But you know the answer, it's because the designer will never have to sit in one.\n\n\"Ladies and gentlemen, welcome aboard the Q25 dropship, please fasten your seatbelts. We will not be serving refreshments for this trip. Thank you for fly with AROC, not that you had a choice.\" The voice comes out from the speakers.\n\nYou feel like you're in a bad commercial flight, and wonder if the pilot should have been a comedian instead.\n\nYou see Robby takes out a flask and takes a good chug. He obviously provided his own refreshments.\n\n\"what is that?\" you ask.\n\n\"it's my special mixture recipe, a must before the mission, you want to try it?\"\n\n*sound cargoelevator.mp3\n\n*choice\n\t#Take the flask and sip a bit of it\n\t\t\n\t\tIt actually tastes quite good, like alcohol mixed with something else, so you have a bit more. \n\t\t\n\t\t\"Careful now, you don't want to over douse on that, it got an adrenaline boost that might over load your heart.\"\n\t\t\n\t\tYou give the flask back, suddenly feel an increase in heart rate, you feel like you can react quicker, but a bit dazed at the same time. (Agility increased, Perception greatly decreased)\n\t\t\n\t\t*set agility +6\n\t\t*set perception -12\n\t\t*set drink 1\n\t\t*page_break\n\t\t*goto flight\n\t\n\t#Take the flask and take a good swig at it\n\t\t\n\t\t\"Careful now, you don't want to over douse on that, it got an adrenaline boost that will over load your heart.\"\n\t\t\n\t\tYou give the flask back, suddenly feel an increase in heart rate, you feel like you can react quicker, but a bit dazed at the same time. (Agility increased, Perception greatly decreased)\n\t\t\n\t\t*set agility +6\n\t\t*set perception -12\n\t\t*set drink 1\n\t\t*page_break\n\t\t*goto flight\n\t\n\t#Refuse the offer\n\t\t\n\t\t\"Alright, suite yourself\" Robby takes another swig at the flask and puts it back in his pouch.\n\n*label flight\n\nThe dropship arrives 200 miles east of Dudinka when the comedian comes on the speakers again: \n\n\"Attention passengers, we have arrived at our destination. The local time? Doesn't matter, since you'll all be dead soon anyway.\"\n\nYou hear a few chuckles here and there, if the pilot's aim was to ease the mood of the team, then she really have succeeded.\n\nThe desolate dark snow field is the only thing that welcomed your disembarkment.\n\nyou suddenly sense the freezing cold of northern Russia, the temperature regulator augmentation automatically turns on from your wrist and you feel better instantly.\n\n\"The NUCP base is located 3 miles south of you.\" Felix's excited voice comes through your headpiece. You hope he doesn't thinks this is a video game played from the comfort of his operator desk. \n\nYou begin the climb in to the snow forest fields toward your objective with your team.\n\n*page_break\n\t\t\nWith snow up to your knees and rocky uneven ground, it took longer than you thought to reach the forest edge. \n\nLooking through your night vision binoculars, you see a large compound beneath the hills. Only one main road leads in and out of the compound, the tall trees surrounding the place makes it very well hidden in the vast frozen wasteland.\n\nTo the south of the compound, you see an apartment building, that must be where all the security marines and scientists live.\n\nTo the east, you see a control tower, hangars and a couple NUCP helicopters parked outside. The blinking lights from the satellites and antennas on top of the control tower brightens up the dim lit sky like a small patch of fireworks.\n\n\"That's where I'll be headed\" Robby says while checking the bombs in his backpack.\n\nTo the west, you see a large metallic building. Structurally, this building has 4 floors, it's as wide as it is tall. It has a menacing nature to it with red and brown steel plating as it's skin, like a big armored robot guarding the area. There are automatic turrets mounted on all sides of the building, the turrets doesn't seem to be activated though.\n\nThat must be the research center where the data files are kept for the prototype gunship.\n\n\"Alright guys, let's do this. I'll scout ahead and clear a path, get in position and wait for my signal.\" Catherine said as she checks her leg augmentations one last time.\n\nTodd begins to setup his sniper position on the hill.\n\nRobby heads down to the east.\n\nAs you move towards the research center, a snow storm begins.\n\n*page_break\n*label ep1app\n\nAs you approach the research center, you notice 2 marines patrolling the parameter, they are heading towards you, there are containers here which you can take cover to avoid a fight or take the risk of exposing yourself and attack them head on.\n\nwhat will you do ?\n\n*choice\n\t#Hide behind some containers nearby and wait for them to pass\n\t\t\n\t\tYou quietly take cover behind a large container, the snow storm is helping your concealment. \n\t\t\n\t\tAs they are about to pass you, you accidently bang your ${weapon} against the container, making enough noise for them to investigate. \n\t\t\n\t\tYou face palm, thinking how could you have been so careless. \n\t\t\n\t\tyou decide on your next move:\n\t\t\n\t\t*choice\n\t\t\t#Shoot my ${weapon} at them as they turn the corner\n\t\t\n\t\t\t\tYou fire your ${weapon} and manage to kill the first marine that turns the corner, the other marine immediately ducks to cover. Before he can radio for back up, you hear a shot puncturing the his chest. \n\t\t\t\n\t\t\t\t*sound snipershot.mp3\n\t\t\t\t*goto toddkill\n\t\t\t\n\t\t\t#Take out my Zorva Dagger and attempt to stab them as they turn the corner\n\t\t\t\t\n\t\t\t\tAs the first marine turns the corner, you stab him in the throat. The second marine realizing what was happening, grabs your dagger arm, forcing you to the ground. While you wrestle with his strangling, you hear a shot puncturing the marine's chest.\n\t\t\t\t\n\t\t\t\t*sound snipershot.mp3\n\t\t\t\t*goto toddkill\n\n\t#Ready my ${weapon} and shoot them as they approach\n\t\t\n\t\tYou fire your trusty ${weapon} and manage to kill one of the marines, the other marine ducks to cover and radios in for backup, within 10 seconds, sirens and alarms have gone off and the automatic turret turns to point at you:\n\t\t\t\n\t\t*fake_choice\n\t\t\t#Run towards the research center\n\t\t\n\t\t\t\tAs you start your dash towards the research center, the turret fires at you with a large explosive round, you have been blown to bits.\n\t\t\t\t\n\t\t\t\tFor a few seconds, a black smoke rises in the place where you were. Then like your life, the smoke melted into the wind, and was gone.\n\t\t\t\t\n\t\t\t\tGAME OVER\n\t\t\t\t\n\t\t\t\t*sound doubleexplosion.mp3\n\t\t\t\t*goto death\n\t\t\t\t\n\t\t\t#Call for back up\n\t\t\n\t\t\t\tYou radio Catherine for help, before you heard a response, the turret fires at you with a large explosive round, you are blown to bits.\n\t\t\t\n\t\t\t\tFor a few seconds, a black smoke rises in the place where you were. Then like your life, the smoke melted into the wind, and was gone.\n\n\t\t\t\tGAME OVER\n\t\t\t\t\n\t\t\t\t*sound doubleexplosion.mp3\n\t\t\t\t*goto death\n\t\t\t\t\n\t\t\t#Fire at the other marine behind my cover\n\t\t\t\t\n\t\t\t\tYou try to fire your ${weapon} again, but the turret fires at you first with a large explosive round, you have been blown to bits. \n\t\t\t\t\n\t\t\t\tFor a few seconds, a black smoke rises in the place where you were. Then like your life, the smoke melted into the wind, and was gone.\n\n\t\t\t\tGAME OVER\n\t\t\t\t\n\t\t\t\t*sound doubleexplosion.mp3\n\t\t\t\t*goto death\n\n\t\t\n\t*selectable_if (stealth > 90) #STEALTH: Attempt to silently dispatch the enemies\n\t\t\n\t\t*bug This option is not possible, unless you've cheated, so stop cheating, no game for you.\n\n\n*label toddkill\n\nYou look at the body and see a hole evidently made by a plasma impact, this must be the work of Todd with his plasma sniper rifle.\n\nYou turn towards the hill where Todd would be. He is too far to be seen, but you can sense him watching.\n\n*label outside\n\nWhat do you want to do next?\n\n*choice\n\t*hide_reuse #Radio Todd and thank him for saving me\n\t\t\n\t\t\"Thanks for save Todd, that was close.\" \n\t\t\n\t\t\"You can't die yet ${name}, I still have to kick your ass at sparring remember?\" He replies\n\t\t\n\t\tFor the first time, you're glad Todd is around.\n\t\t\n\t\t*page_break\n\t\t*goto outside\n\t\t\n\t*hide_reuse #Hide the two dead marine bodies\n\t\t\n\t\tYou drag one body at a time out of sight, stacking them behind the container. The snow storm should cover them soon enough.\n\t\t\n\t\t*page_break\n\t\t*goto outside\n\n\t#Continue my way towards the research center\n\t\t\n\t\tAs you carefully advance towards the research center, Catherine calls you on the radio\n\t\t\n\t\t\"${name}, stop, don't approach , take cover now!\"\n\t\t\n\t\t*goto outside2\n\t\t\n\n\n*label outside2\n*allow_reuse\nWhat will you do?\n*choice\n\t#Quickly take cover behind a nearby boulder\n\t\t*gosub end_trial\n\t\t\n\t\tYou take Catherine's advice and immediately hid behind the large boulder. After about a minute, she calls you again \"You're clear to proceed now ${name}.\"\n\t\t\n\t\tYou wonder what Catherine had to do to clear the path. It doesn't matter now...\n\t\t\n\t\t*goto entrance\n\t\t\n\t*selectable_if (perception > 54) #PERCEPTION: Something is moving on the 3rd floor balcony of the research center\n\t\t*gosub end_trial\n\t\t\n\t\tYou notice movement on the 3rd floor balcony, there's a marine on watch guard duty there. Quickly you take cover behind some nearby boulders. \n\t\t\n\t\tObserving from behind cover, you watch Catherine descending onto the marine like an eagle diving for her prey. She swiftly dispatch the watch guard.\n\t\t\n\t\t\"You're clear to proceed now ${name}.\" As she disappears into the snow mist.\n\t\t\n\t\t*goto entrance\n\t\n\t#Ignore Catherine's advice and run towards the research center\n\t\t*gosub end_trial\n\t\t\n\t\tThe research center seems so close, you ignore Catherine's call and dash towards the entrance of the building.\n\t\t\n\t\t\"${name}, what are you doing!\" Catherine panics on the radio.\n\t\t\n\t\tAbout a minute later, sirens and alarms goes off in the whole compound. You were spotted. Having no place to hide, and the building in lockdown, you are quickly surrounded by the NUCP...\n\t\t\n\t\tThe marines showers your body with bullets. Your first feeling was stupefied surprise. You never thought it would end like this, though you knew the risk of every choice you've made. With your death sentence moments before you, you thought about the future, all the things you wanted to accomplish, now at last, you involuntarily relax your body, for there's nothing more to do, after all, you tried your best and now it's time for you to die.\n\t\t\n\t\tGAME OVER\n\t\t\n\t\t*sound basealarm2.mp3\n\t\t*goto death\n\t\t\n*label entrance\n*page_break\n*set counter 0\n*rand diceroll 1 3\n*rand keypad 1000 9999\n\nYou arrive at the entrance of the research building.\n\n\"Catherine, Todd, we need both of you to support Robby in the hangars, I'll guide ${name} on navigating the interior.\" Felix said as he turns on the satellite infra red scanner. \"Ok ${name}, I see all hostile enemy units, follow my directions. Go around the back and enter from there.\"\n\nYou pay close attention to Felix as he guides you through the maze of the interior. The corridors in the research building follows a similar theme as the exterior. Exposed metal, wires, circuit boards along the concave side walls with uncovered pipes and ductwork hanging from the ceiling. It truly feels like walking inside the bowels of a robot.\n\n*page_break\n\nYou arrive in the security room without incident.\n\n\"${name}, the database room is located behind the security room you are in, you'll need a password for the keypad to gain access. Intel suggest the guards have hidden the pass code somewhere in this room in case they forget the combination. Search the area ${name}, lucky for us, the security team went out for a smoke, but you must hurry, they will return soon.\"\n\nBeside those lockers is a keypad and a reinforced door, obviously that's the database room where you need to gain access.\n\nYou enable your optical translator as everything is written in Russian.\n\n*label main_examine\n\nOpposite the doorway, pushed up against the wall was a desk with many monitors, this must be where they observe all the security cameras in the building. \n\nIn the middle of the room, there are a couple round tables with chairs, seems like a resting area for the guards.\n\nOn the opposite wall, you see a row of storage lockers, some are unlocked. \n\nWhat will you examine?\n\n*sound hoveringturret.mp3\n*choice\n\t#Examine the monitor desk area\n\t\t\n\t\t*label monitor_examine\n\t\t\n\t\tYou approach the security monitors and observe a few things of interest.\n\t\t\n\t\tA sticky note is attached to the monitor.\n\t\t\n\t\tA notebook is beside the keyboard.\n\t\t\n\t\tFolders are stacked on the shelves above.\n\t\t\n\t\tWhich item will you look at next?\n\t\t\n\t\t*choice\n\t\t\t#Examine the sticky note\n\t\t\t\t\n\t\t\t\tYou read the sticky note, it takes a second for your optical translator to re word it in English, \n\t\t\t\t\n\t\t\t\tit reads \"Do not put coffee or drinks near the monitor and keyboard!\"\n\t\t\t\t\n\t\t\t\tYou decide to look at something else.\n\t\t\t\t\n\t\t\t\t*set counter +1\n\t\t\t\t*gosub counter\n\t\t\t\t*page_break Back\n\t\t\t\t*goto monitor_examine\n\t\t\t\n\t\t\t#Examine the notebook\n\t\t\t\t\n\t\t\t\tYou flip through the pages in the notebook, it's a log of activities by various security personnel. \n\t\t\t\t\n\t\t\t\tYou put it back.\n\t\t\t\t\n\t\t\t\t*set counter +1\n\t\t\t\t*gosub counter\n\t\t\t\t*page_break Back\n\t\t\t\t*goto monitor_examine\n\t\t\t\n\t\t\t*if diceroll = 1\n\t\t\t\t\n\t\t\t\t#Examine the folders on the shelves\n\t\t\t\t\tYou open the folder, it contains the operational manual for the security system software.\n\t\t\t\t\n\t\t\t\t\tA\t piece of paper falls out, you picked it up and reads\n\t\t\t\t\n\t\t\t\t\tkeypad code: ${keypad}\n\t\t\t\t\n\t\t\t\t\tYou have found the access code!\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto controlroom\n\t\t\t\n\t\t\t*else\n\t\t\t\t\n\t\t\t\t#Examine the folders on the shelves\n\t\t\t\t\n\t\t\t\t\tYou open the folder, it contains the operational manual for the security system software. \n\t\t\t\t\t\n\t\t\t\t\tYou put it back.\n\t\t\t\t\n\t\t\t\t\t*set counter +1\n\t\t\t\t\t*gosub counter\n\t\t\t\t\t*page_break Back\n\t\t\t\t\t*goto monitor_examine\n\t\t\t\n\t\t\t#Leave and examine another area\n\t\t\t\t\n\t\t\t\tYou decide there's nothing else of interest here, and return to examine other parts of the room\n\t\t\t\t\n\t\t\t\t*set counter +1\n\t\t\t\t*gosub counter\n\t\t\t\t*page_break Return\n\t\t\t\t*goto main_examine\n\t\n\t#Examine the resting area\n\t\t*label rest_examine\n\t\t\n\t\tOn top of the table is a cup filled with pens and yesterday's newspaper.\n\t\t\n\t\tBy the floor, a garbage can with some crumbed paper in it.\n\t\t\n\t\tYou also thought about looking underneath the table and chairs.\n\t\t\n\t\tYou decide to:\n\t\t\n\t\t*choice\n\t\t\t#Check the pen cup on the table\n\t\t\t\n\t\t\t\tYou pour out the pens and look inside the cup, there's nothing else there.\n\t\t\t\n\t\t\t\tYou place the pens back in the cup and put it on its original spot.\n\t\t\t\n\t\t\t\t*set counter +1\n\t\t\t\t*gosub counter\n\t\t\t\t*page_break Back\n\t\t\t\t*goto rest_examine\n\t\t\t\n\t\t\t#Check the crumbed papers in the garbage bin\n\t\t\t\n\t\t\t\tYou fumble through the papers, some are tic tac toe drawings, some are pay rate calculations. So that's what the security guards do on their break.\n\t\t\t\n\t\t\t\t*set counter +1\n\t\t\t\t*gosub counter\n\t\t\t\t*page_break Back\n\t\t\t\t*goto rest_examine\n\t\t\t\n\t\t\t*if diceroll = 2\n\t\t\t\t\n\t\t\t\t#Check under the desk and chairs\n\t\t\t\t\tYou find a knife attached to the bottom of the table. Your Zorva dagger is better, so you decide to leave it.\n\t\t\t\t\n\t\t\t\t\tYou also find disgusting gums everywhere, but a piece of paper falls out of the bottom of a chair.\n\t\t\t\t\t\n\t\t\t\t\tYou pick it up and reads\n\t\t\t\t\n\t\t\t\t\tkeypad code: ${keypad}\n\t\t\t\t\n\t\t\t\t\tYou have found the access code!\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto controlroom\n\t\t\t\n\t\t\t*else\n\t\t\t\n\t\t\t\t#Check under the desk and chairs\n\t\t\t\n\t\t\t\t\tYou find a knife attached to the bottom of the table. Your Zorva dagger is better, so you decide to leave it.\n\t\t\t\n\t\t\t\t\tOther than that, you find disgusting gums, which quickly made you look elsewhere.\n\t\t\t\n\t\t\t\t\t*set counter +1\n\t\t\t\t\t*gosub counter\n\t\t\t\t\t*page_break Back\n\t\t\t\t\t*goto rest_examine\n\t\t\n\t\t\t#Leave and examine another area\n\t\t\t\n\t\t\t\tYou decide there's nothing else of interest here, and return to investigate other areas.\n\t\t\t\t\n\t\t\t\t*set counter +1\n\t\t\t\t*gosub counter\n\t\t\t\t*page_break Return\n\t\t\t\t*goto main_examine\n\t\t\t\n\t#Examine the lockers\n\t\t*label locker_examine\n\t\tThere is a row of lockers here, 8 in total, but only 3 are unlocked.\n\t\t\n\t\tYou decide to:\n\t\t\n\t\t*choice\n\t\t\t#Check the 1st locker\n\t\t\t\n\t\t\t\tYou find a pair of abandoned boots and some dirty clothes. The foul smell repels you to look elsewhere.\n\t\t\t\n\t\t\t\t*set counter +1\n\t\t\t\t*gosub counter\n\t\t\t\t*page_break Back\n\t\t\t\t*goto locker_examine\n\t\t\t\n\t\t\t#Check the 2nd locker\n\t\t\t\n\t\t\t\tYou find a stack of Russian magazines on cars and augmentations, there's nothing of use here.\n\t\t\t\t\n\t\t\t\n\t\t\t\t*set counter +1\n\t\t\t\t*gosub counter\n\t\t\t\t*page_break Back\n\t\t\t\t*goto locker_examine\n\t\t\t\n\t\t\t*if diceroll = 3\n\t\t\t\t\n\t\t\t\t#Check the 3rd locker\n\t\t\t\t\n\t\t\t\t\tThis locker appears empty, except there's a piece of paper stuck between the corners\n\t\t\t\t\t\n\t\t\t\t\tyou pick it up and reads\n\t\t\t\t\n\t\t\t\t\tkeypad code: ${keypad}\n\t\t\t\t\n\t\t\t\t\tYou have found the access code!\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto controlroom\n\t\t\t\n\t\t\t*else\n\t\t\t\n\t\t\t\t#Check the 3rd locker\n\t\t\t\t\n\t\t\t\t\tThis locker seems to be empty and unused.\n\t\t\t\n\t\t\t\t\t*set counter +1\n\t\t\t\t\t*gosub counter\n\t\t\t\t\t*page_break Back\n\t\t\t\t\t*goto locker_examine\n\t\t\n\t\t\t#Leave and examine another area\n\t\t\t\n\t\t\t\tYou decide there's nothing else of interest here, and return to the center of the room.\n\t\t\t\t\n\t\t\t\t*set counter +1\n\t\t\t\t*gosub counter\n\t\t\t\t*page_break Return\n\t\t\t\t*goto main_examine\n\t\t\t\n\t\t\t\n\t\t\t\n*label counter\n*if counter = 3\n\t\n\t\"${name}, the security patrols have began to head back, you don't have much time.\" Felix said.\n\t*return\n\t\n*elseif counter =4\n\t\n\t\"${name}, they've reached the end of the corridor, you have no more than a few minutes before they arrive!\" You can sense Felix's anxiousness over the headpiece.\n\t*return\n\t\n*elseif counter = 6\n\t\n\tYou hear the distant chatting and footsteps of the guards coming towards you.\n\t*return\n\n*elseif counter = 7\n\t\n\tThe footsteps are getting louder, you can distinguish 4 voices talking, there are at least 4 of them outside. Your heart begins to race.\n\t*return\n\t\n*elseif counter = 8 \n\t\n\tThe patrols are only steps away from the door! You're about to be discovered!\n\t*return\n\t\n*elseif counter = 9\n\t\n\tThe security force enters the room, shocked to find you here. One of them rushes to trigger the alarm while the rest of them open fires at you.\n\t\n\tHaving no place to hide, your body was showered with bullets. Your first feeling was stupefied surprise. You never thought it would end like this, though you knew the risk of every choice you've made. With imminent death before you, you thought about the future, all the things you wanted to accomplish, now at last, you involuntarily relax your body, for there's nothing more to do, after all, you tried your best and now it's time for you to die.\n\t\n\tGAME OVER\n\t\n\tHINT: The password is randomized into a different location on every play through, do not disregard places you've check previously.\n\t\n\t*sound pulseweapon.mp3\n\t*goto death\n\n*else \n\t*return\n\t\n\t\n*label controlroom\n\n*allow_reuse\n\nYou race to the keypad to enter the code:\n\n*input_text entercode\n\n*page_break Enter\n\n*if (entercode = keypad)\n\t\n\tYou hear a click in the reinforced door, and quickly enter the database room then gently close the door behind you.\n\t\n\t*goto insidecontrol\n\n*else\n\t\n\tYou have enter the wrong code, you read the paper again: ${keypad}\n\t*set counter +1\n\t*gosub counter\n\t*goto controlroom\n\n\n*label insidecontrol\n\nYou plop down behind the door. Sweat stung you eyes as you wipe them off your brow.\n\n\"That was close ${name}.\" Felix more calm now than before as well \"I need you to find the terminal in the back and plug in.\"\n\nYou insert the disk into the drive, and Felix begins to do his magic. As the data is being downloaded, you have a moment to rest.\n\n*label waiting\nWhile you're waiting, you decide to:\n\n*choice \n\t#Drink some water\n\t\tYou pull out your water canteen and pour a mouth full. The water tastes sweet as it goes down your throat, refreshing you. You must have been quite thirsty but not realizing from all the intensity. \n\t\t\n\t\t*if (drink = 1) \n\t\t\tThe water also helps you to feel better from Robby's liquor. (Agility decreased, Perception greatly increased)\n\t\t\t*set agility -6\n\t\t\t*set perception +12\n\t\t\t*sound hoveringturret.mp3\n\t\t\t*page_break\n\t\t\t*goto waiting\n\t\t*else\n\t\t\t*sound hoveringturret.mp3\n\t\t\t*page_break\n\t\t\t*goto waiting\n\t\t\n\t#Look around the room and see if I can find something useful\n\t\tYou look around the snug database room. There are rows of neatly stacked IT modules, the soft beeps of the CPUs and the humming of cooling fans fills your ears. you can't help but wonder what would happen if you [i]\"accidently\"[/i] unplug a few cables.\n\t\t\n\t\tUnfortunately, there's nothing useful for you to take.\n\t\t\n\t\t*sound hoveringturret.mp3\n\t\t*page_break\n\t\t*goto waiting\n\t\n\t\n\t#Ask Felix regarding exit\n\t\t\"Felix, how am I getting out of this room exactly?\"\n\t\t\n\t\t\"Erm... well, you could climb through the vents?\"\n\t\t\n\t\t\"You haven't thought this through have you...\"\n\t\t\n\t\t\"Well, what am I suppose to do? Tell the guards to go for another break? Don't worry, we won't leave you in there, we'll figure something out\" This reassurance coming from Felix is as weak as a bullet made out of tissue. \"Alright, download completed, ${name}, I need you to plug in your neuro link so I can send you the gunship operation instructions. You'll need to know how to fly that thing out of there when you meet up with Robby and the rest of the team.\"\n\t\t\n\t\tYou plug into the terminal, and suddenly a wealth of information overloads your senses. It feels like a dream where time stood still and as you open your eyes, you learn how to operate the prototype gunship. \n\t\t\n\t\t*page_break\n\t\t*goto roadtohangar\n\t\n*label roadtohangar\n\n\"This is incredible! This gunship design is far more advanced than anything we've ever seen!\" Felix obviously distracted by the new data he's receiving \"How is this possible? How does the NUCP possess such...\" \n\t\t\nBefore he can finish, sirens goes off in the whole compound.\n\n\"I've been compromised!\" You hear gun fire as Robby yells into the radio \"I'm activating the bomb count down now before they can disable it! ${name}, you have about 8 minutes to get your ass down here.\"\n\n\"${name}, the guards in the security room have headed to the hangars, you're clear to move out.\" Felix snaps back to reality \n\n\"Once you're out of the security room, turn right then head all the way down, take the last left before the end of the corridor, this will take you... *static* ... underground tunnel...*static* ... hangars... I can't ... ... *static* ... jamming... ...\" Felix's voice is now completely replaced by static.\n\nYou set your watch timer for 8 minutes\n\nOnce more, you head into the fray. \n\n*sound basealarm2.mp3\n*page_break\n\n*set grenade 1\n\n*set saveload11 true\n\nPROGRESS SAVED . . .\n\nShould you die in the following section, you will be able to replay from this point on.\n*page_break\n*goto savegame11\n\n*label endsaveload11\n*page_break\n*goto fray\n\n*comment detonation timer subroutine\n*label bombtime\n\n*if (seconds = 0)\n\t*set seconds 30\n\t*set minute -1\n\tT - ${minute} Minute ${seconds} Seconds to Detonation\n\t*return\n\n*else\n\t*set seconds 0\n\t\n\t*if ((minute = 0) and (seconds = 0))\n\t\t*page_break\n\t\tUnfortunately, you ran out of time, the bomb goes off, destroying everything and everyone in the hangar. You were too late.\n\t\t\n\t\t*sound doubleexplosion.mp3\n\t\t*goto death11\n\t\n\tT - ${minute} Minute ${seconds} Seconds to Detonation\n\t*return\n*comment end of detonation timer subroutine\n\n*label fray\n*set minute 8\n*set seconds 0\n\nYou exit the security room, the alarm light strobe above bathes the metallic corridors in bright red every few seconds. You hear several footsteps banging against the steel floor, louder and louder. A group of marines are approaching from your left.\n\nT - 8 Minute 0 Seconds to detonation\n\nYou Consider your options:\n\n*choice\n\t#Run towards the end of the corridor while firing at the marines behind me\n\t\tYou decided to break for the other end of the corridor. As you run, you open fire backwards to the enemy. Two marines go down, but the rest of them took cover and took aim. You were an easy target in the long straight corridor. \n\t\t\n\t\tThe marines showers your body with bullets. Your first feeling was stupefied surprise. You never thought it would end like this, though you knew the risk of every choice you've made. With imminent death before you, you thought about the future, all the things you want to accomplish, now at last, you involuntarily relax your body, for there's nothing more to do, after all, you tried your best and now it's time for you to die.\n\t\t\n\t\tGAME OVER\n\t\t\n\t\t*sound pulseweapon.mp3\n\t\t*goto death11\n\t\n\t#Hid myself back in the security room and wait for them to pass\n\t\tYou return to the security room and peak through the gap in the door. Five NUCP marines rush pass you and continues down the corridor. One of them, noticeably, has skull emblems on his shoulder armor. He must be the squad leader. \n\t\t\n\t\t*gosub bombtime\n\t\t\n\t\tYou Decided to:\n\t\t*choice\n\t\t\t#Get back into the corridor and open fire from behind them\n\t\t\t\tYou return to the corridor. All the marines have their backs turned to you when you open fire, three of them are killed instantly, injuring the forth. Only one marine, the one with the skull emblem, is able to dive into the corner for cover. \n\t\t\t\t\n\t\t\t\tThe injured marine screams in pain as he attempts to crawl further away from you:\n\t\t\t\t\n\t\t\t\t*gosub bombtime\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t\n\t\t\t\t\t#Finish both of them with my frag grenade\n\t\t\t\t\t\t*sound fraggrenade.mp3\n\t\t\t\t\t\t*goto frag1\n\t\t\t\t\t\n\t\t\t\t\t#End the injured marine's misery and deal with the other one\n\t\t\t\t\t\tThe agonizing scream ends suddenly when you spray another set of rapid fire into his back. The other marine fires at you and barely misses as you duck for cover.\n\n\t\t\t\t\t\t*gosub bombtime\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\n\t\t\t\t\t\tBullets impacting against the metal wall splash sparks in to your face. You try to remember your training, but nothing can prepare you for a real gun fight. \n\t\t\t\t\t\t\n\t\t\t\t\t\tThe squad lead eventually halts firing and you hear a distinctive sounds of a weapon clip hitting the ground. He's reloading ! You realize this is your chance, dashing towards him, you jump in to mid air as you approach the corner where he's hiding. \n\t\t\t\t\t\t\n\t\t\t\t\t\tTime seems to slow down as you watch him finish reloading and begins raising his weapon towards you. But you fire first, the head shot knocks his helmet off as he collapses to the floor.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*sound laser.mp3\n\t\t\t\t\t\t*gosub bombtime\n\t\t\t\t\t\t*goto labs\n\t\t\t\t\t\t\n\t\t\t\t\t#Use the injured marine as bait to lure out the other marine from cover\n\t\t\t\t\t\tYou wait for the opportunity, finally the squad leader reaches out to pull the injured into cover, exposing his arms. You fire your ${weapon} again at his arms, the impact forces him to fall out of cover and you end both of their misery.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*gosub bombtime\n\t\t\t\t\t\t*goto labs\n\t\t\t\n\t\t\t#Finish them all with my frag grenade\n\t\t\t\tAfter they ran passed you a good distance, you let out a battle cry \"EAT THIS!\"\n\t\t\t\t*sound fraggrenade.mp3\n\t\t\t\t*goto frag1\n\t\t\t\n\t\t\t#I let them pass through\n\t\t\t\tYou decide to let them pass through, you are after all, tight for time. Yet you can't help but wonder if they might become a bigger problem later.\n\t\t\t\t\n\t\t\t\t*gosub bombtime\n\t\t\t\t*set guards 1\n\t\t\t\t*goto labs\n\t\t\t\n\t\n*label frag1\n\nYou throw your M22B Frag Grenade down the hall and brace for impact. The explosion shook the whole complex. The grinding, gruesome noise of tearing metal fills the area. You realize the pipes and ductwork have all crashed down from above. \n\nThe marines on the other hand, are definitely not an issue anymore.\n\n*set inventory &\", Zorva Dagger\" \n*set grenade 0\n\n*gosub bombtime\n*page_break\n\nThe destruction you've caused left a field of metal debris in the way, you spend extra time navigating through the scrap obstacles to reach the other side.\n\n*gosub bombtime\n*goto labs\n\n\n*label labs\n\n*page_break\n\nAs you head towards the end of the corridor, you hear an unexpected voice on the radio\n\n\"${name}, are you there?\" It's Catherine!\n\n\"I'm glad to hear your voice! I thought all comms were cut off.\"\n\n\"I think they jammed our long range transmission, so we can't raise Felix, but we can talk locally if we're nearby. Listen ${name}, this complex is not what it seems, the real hangar is in a massive underground cave, the hangar gate is a cliff opening about a quarter mile from here. Robby is trying to open the gate from a control room way on the other side, I'm doing my best to cover him and Todd is almost at the gunship but there's too man
