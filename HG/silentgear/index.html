y of them, we can't hold out much longer. Our chance of survival is crumbing with very minute.\"\n\n\"I'll be there as quickly as I can Catherine!\"\n\nUpon reaching the end of the corridor, you recall to take a left as Felix instructed you.\n*gosub bombtime\n*page_break\n\nThere's an elevator here that only goes down. You take it. Your heart jumps up to your throat for a moment as the elevator accelerates at what feels like free fall. You estimate that was about a hundred feet drop straight down. Catherine wasn't kidding when she mentioned massive cave.\n\n*sound cargoelevator.mp3\n*gosub bombtime\n*page_break\n\nYou've reach an area where the sidewalls and ceiling are replaced by underground rocks. Looking over the guard railings, you see no end to the bottomless black pit below. Shiver fills your body at the thought of falling down there. \n\nIn front of you is a set of stairs descending down to a large platform, you see six reactors, each about the size of a large bus, all of them spinning their bright purple cores connected by a long cylinder leading into the rock sidewalls. This must be the power reactor room feeding the hangar. You don't spot anyone in this area, it appears to be clear.\n\n*gosub bombtime\n*page_break\n\nWith your ${weapon} drawn and ready, you cautiously move down to the platform. As you move pass one of the reactors, suddenly you feel a forceful punch contacting your right cheek, your weapon flew out of your hands. This marine had spotted you all along, successfully ambushing you. You tumble to the floor so violently your Zorva dagger slides out of your belt just out of reach.\n\n*sound zorvadagger.mp3\n*gosub bombtime\n*page_break\n\nYou turn to look at the person who took you down so quickly, this marine appears to be well built, the battle scar across his soulless eyes gives him the appearance of having only one purpose. \n\nTo kill you.\n\nWhile you're still dazed, he leaps on top of you with his knife coming down. Before he stabs your head open like a watermelon, you grab his wrist and push with all the strength you can muster.\n\n*label knifepoint\n\nYour sights begin to lose focus on the knife blade as it violently convulse towards your eyes, closer and closer. You are slowly loosing this involuntary arm wrestle:\n\n*gosub bombtime\n\n*choice\n\t*selectable_if (strength > 69) #ARM AUGMENTATION: Activate the arm over drive boost\n\t\t\n\t\tFacing imminent death, you trigger the arm over drive boost with your neuro link. Smoke blasts out of your arm augmentation and a high pitch winding noise fills the air. The sense of invincibility overwhelms you. Time stood still. For this moment, you possess the arms of a Titan.\n\t\t\n\t\tNo longer feeling a force pushing down upon you, you turn his wrist and points the knife towards his throat, the knife peels through his skin like puncturing a water bag, the blood being the water pours out on you. \n\t\t\n\t\tYou push his lifeless body aside and notice the veins in your arm begins to bleed out of your skin. The adrenaline covers your senses of pain. It's pointless to think about that now. You focus your thoughts back on your team, they need you. For as long as you're still able to move your arms, you can fight and fly that gunship.\n\t\t\n\t\tGathering your gear, you head towards the hangar.\n\t\t\n\t\t*sound armaugmentation.mp3\n\t\t*set augmentation \"Arms (Destroyed)\"\n\t\t*set strength 33\n\t\t*gosub bombtime\n\t\t*page_break\n\t\t*goto hangar\n\t\n\t*disable_reuse #Knee him in the back to get him off me\n\t\t\n\t\tYou struggle and attempts to knee kick him in the back to free yourself, but like kicking a statue, he doesn't even budge. Unfortunately, there's just not enough room for you to execute this move.\n\t\t\n\t\t*gosub bombtime\n\t\t*page_break\n\t\t*goto knifepoint\n\n\n\t\n\t#Evade the stab and try to reach for my Zorva dagger\n\t\t\n\t\tYou twitch your head left just before allowing the knife to come down. As the blade clash with the steel floor, you feel the sudden rush of air across your cheeks, the loud screeching noise of metal scraping metal emits a pain in your ears, but you much prefer this than being stabbed in the head.\n\t\t\n\t\tWith your arms free, you punch him as hard as you could in the throat. While he gags for air, you free yourself from his hold and reach for your dagger.\n\t\t\n\t\tAs both of you takes a battle stance, he pulls out a pistol and points at you, to your surprise, he unloads the clip. \"No need\" he grins and throws the pistol aside.\n\t\t\n\t\tHe waits for your next move, he's got time, but you don't:\n\t\t\n\t\t*gosub bombtime\n\t\t\n\t\t*choice\n\t\t\t#Run to grab the ${weapon} then shoot him\n\t\t\t\tYou turn to go for your ${weapon} instead, but he sees your shameful display and flings his knife into your back. The knife punctures your chest between the rib cages.\n\t\t\t\t\n\t\t\t\tYour first feeling was not pain, but surprise. You never thought it would end like this, though you knew the risk of every choice you've made. With imminent death before you, you thought about the future, all the things you wanted to accomplish, now at last, you involuntarily relax your body, for there's nothing more to do, after all, you tried your best and now it's time for you to die.\n\t\t\t\t\n\t\t\t\tGAME OVER\n\t\t\t\t\n\t\t\t\t*sound zorvadagger.mp3\n\t\t\t\t*goto death11\n\t\t\t\n\t\t\t#Throw the dagger at him for distraction, then follow up with a jump kick\n\t\t\t\tYou hurl your dagger at him, he deflects it. Quickly, before he could respond with a follow up, you round house kick him, connecting your shin to his face. \n\t\t\t\t\n\t\t\t\tTaking advantage of his disorientation, you grab his knife and inserts it into his throat.\n\t\t\t\t\n\t\t\t\tHaving wasted much time here, you grab all your gear and move on to the hangar.\n\t\t\t\t\n\t\t\t\t*sound zorvadagger.mp3\n\t\t\t\t*gosub bombtime\n\t\t\t\t*page_break\n\t\t\t\t*goto hangar\n\t\t\t\n\t\t\t#Attack him head on\n\t\t\t\tYou swing the dagger horizontally at the marine, he parries it with his own knife. The clashing of the blades sends sparks flying in the air. Pushing each other back, both of you retakes your stance.\n\t\t\t\t\n\t\t\t\tYou try again, you launch your swing, the blow feel too sluggish, you knew the moment you launched it. The marine deflects your attack again, with greater force this time and throws you off your footing.\n\t\t\t\t\n\t\t\t\tHe spots the opening, with a roar he drives his knife into your side.\n\t\t\t\t\n\t\t\t\tYour first feeling was not pain, but surprise. You never thought it would end like this, though you knew the risk of every choice you've made. With imminent death before you, you thought about the future, all the things you want to accomplish, now at last, you involuntarily relax your body, for there's nothing more to do, after all, you tried your best and now it's time for you to die.\n\t\t\t\t\n\t\t\t\tGAME OVER\n\t\t\t\t\n\t\t\t\t*sound zorvadagger.mp3\n\t\t\t\t*goto death11\n\t\t\n\t\t\t\t\n*label hangar\n\nAs you arrive in the hangar, a gentle breeze rushes through your face, a breath of fresh air was an exhilarating rejuvenation at this point. Unfortunately, this peace was almost instantly interrupted by the sound of weapons discharging and the screaming voices from the marines; some with excitement, some with fear, and some in pain.\n\n\"Catherine, I'm in the hangar.\" You say\n\n\"${name}, Robby needs help and I'm tide up at the moment, can you assist?\"\n\nYou hunker down to assess the situation:\n\nTo your right, at the end of the runway appears to be a control tower pressed against the rocky cave wall. Robby is there just outside the tower, taking cover behind a crane. His heavy breathing maintained a constant mist of steam in front of his face as he scrambles to reload his weapon. Watching the waves of gun fire towards his direction, there is no doubt in your mind he is badly pinned down. \n\nCatherine is on a higher platform above raining bullets down at another entrance, her determination is second to none, but for every marine she takes down, two more appears as replacement.\n\nswivel your head to the left, you find the source of the fresh air, the hangar gate about a hundred meters away, wide open now with a beautiful mountain view from the cliffs, Robby must have open this gate. Rows of fighter jets are neatly parked on both sides of the runway, you notice four very distinctive planes floating in mid air like stingrays swimming in the ocean. These organic crafts stick out like a sore thumb amidst the traditional NUCP fighters fixed and stationary on the ground. Todd is nearby one of the stingrays, concentrated on providing sniper support for Robby and Catherine. Unknown to Todd, a door slides open from behind, NUCP marines begins to pour in.\n\n\n*gosub bombtime\n\n*choice\n\t#Help Todd\n\t\t*if guards = 1\n\t\t\t\n\t\t\t\"Todd, look out behind you!\" You shout into the head piece as you ran on your side of the runway.\n\t\t\t\n\t\t\tTodd is taking cover behind a container mover, now realizing his cover has been blown, he switch and duck under to the opposite side of the vehicle . He knows clearly his sniper rifle is too cumbersome and slow at close range, so he pulls out the laser pistol.\n\t\t\t\n\t\t\tGun fire exchanges, Todd's pistol sounds weak compare to the assault rifles of the marines. But fortunately, the marines have not noticed you as you flank their position from the side. Through a combined teamwork, you and Todd clears out the marines.\n\t\t\t\n\t\t\t\"Thanks ${name}, I guess we're even now.\" Todd says as he slings his sniper rifle forward to resume supporting Catherine and Robby.\n\t\t\t\n\t\t\t*sound laser.mp3\n\t\t\t*gosub bombtime\n\t\t\t*page_break \n\t\t\t\n\t\t\tYou notice movement above Todd, on the platform, it's the squad leader with the skull emblem!\n\t\t\t\n\t\t\t\"Wait, Todd, above you...\" Before you could finish your sentence, the squad leader open fires on Todd, hitting him. The impact sends Todd spinning to the floor.\n\t\t\t\n\t\t\t\"NO!!!\" you aim and fire as best as you could at the platform. Figuring he's at a disadvantage in the open area, the squad leader retreats back into the room behind the platform.\n\t\t\t\n\t\t\t*sound laser.mp3\n\t\t\t*gosub bombtime\n\t\t\t*page_break\n\t\t\t\n\t\t\tYou rush across the runway to Todd.\n\t\t\t\n\t\t\tHe was gone.\n\t\t\t\n\t\t\tThe shot punctured his lungs on the spot. Clutching your fist, guilt and anger fills you. The chance of killing the squad leader back at the corridor, if only you took it.\n\t\t\t\n\t\t\t\"It's all my fault.\" You close your eyes as you closed Todd's.\n\t\t\t\n\t\t\t*gosub bombtime\n\t\t\t*page_break\n\t\t\t\n\t\t\tLooking up, you see marines overwhelm Robby in the distance.\n\t\t\t\n\t\t\t\"Well, this is the end of the line for me too guys, I'll try to hold them off as long as I can. ${name}, Catherine, get to the gunship. It's the last one closest to the hangar gate.\" Robby says as he crawls into another cover.\n\t\t\t\n\t\t\tyou see a fusillade of pulse rifles erupting all around Robby, he's been shot in the leg. Marines now have spread out on the platform above and are returning fire to Catherine and Robby. Catherine still have a chance to retreat, and she takes it.\n\t\t\t\n\t\t\tYou feel like a spectator than an actual participant in this battle.\n\t\t\t\n\t\t\t\"my only regret Catherine, was I never had the chance to date you.\" Robby says bitterly.\n\t\t\t\n\t\t\t\"I'm so sorry Robby.\" You spot a shed of tear as Catherine runs pass you.\n\t\t\t\n\t\t\t*sound pulseweapon.mp3\n\t\t\t*gosub bombtime\n\t\t\t*page_break\n\t\t\t*goto bothdead\n\t\t\n\t\t*else\n\t\t\t\n\t\t\t\"Todd, look out behind you!\" You shout into the head piece as you ran on your side of the runway.\n\t\t\t\n\t\t\tTodd is taking cover behind a container mover, now realizing his cover has been blown, he switch and duck under to the opposite side of the vehicle . He know clearly his sniper rifle is too cumbersome and slow at close range, so he pulls out the laser pistol.\n\t\t\t\n\t\t\tGun fire exchanges, Todd's pistol sounds weak compare to the assault rifles of the marines. But fortunately, the marines have not notice you as you flank their position from the side. Through a combined teamwork, you and Todd clears out the marines.\n\t\t\t\n\t\t\t\"Thanks ${name}, I guess we're even now.\" Todd says as he slings his sniper rifle forward to resume supporting Catherine and Robby.\n\t\t\t\n\t\t\t*sound laser.mp3\n\t\t\t*gosub bombtime\n\t\t\t*page_break\n\t\t\t\n\t\t\tLooking up, you see marines overwhelm Robby in the distance.\n\t\t\t\n\t\t\t\"Well, this is the end of the line for me guys, I'll try to hold them off as long as I can. ${name}, Catherine, get to the gunship. It's the last one closest to the hangar gate.\" Robby says as he crawls into another cover.\n\t\t\t\n\t\t\tyou see a fusillade of pulse rifles erupting all around Robby, he's been shot in the leg. Marines now have spread out on the platform above and are returning fire to Catherine and Robby. Catherine still have a chance to retreat, and she takes it.\n\t\t\t\n\t\t\t\"my only regret Catherine, was I never had the chance to date you.\" Robby says bitterly.\n\t\t\t\n\t\t\t\"I'm so sorry Robby.\" You spot a shed of tear as Catherine runs pass you.\n\t\t\t\n\t\t\t*sound pulseweapon.mp3\n\t\t\t*gosub bombtime\n\t\t\t*page_break\n\t\t\t\n\t\t\tTodd covers Catherine as she runs towards him while you're powering up the gunship for takeoff. as soon as everyone's inside, you blast off. The gunship armor seems to hold up well against the assault rifles, there wasn't much the marines could do to take you down at this point.\n\t\t\t\n\t\t\t\n\t\t\t*goto robbydead\n\t\n\t#Help Robby\n\t\t\n\t\t\"Todd, look out behind you!\" You shout into the radio as you dash towards Robby. Hoping Todd will be able to hold them off while you grab Robby first.\n\t\t\n\t\tTaking cover as much as possible, you head towards Robby, the marines have not spotted you. Once you got in position, you decide on your next action:\n\t\t*gosub bombtime\n\t\t*choice\n\t\t\t\n\t\t\t*selectable_if (grenade = 1) # Throw your grenade at the converging marines\n\t\t\t\n\t\t\t\tWith a big explosion, the entrance is sealed off with large amount of scrap metal and debris, as well as taking down all the marines.\n\t\t\t\n\t\t\t\tRobby wastes no time and begins his retreat, and so does Catherine.\n\t\t\t\n\t\t\t\t\"Hurry, towards the last gunship in the back.\" Robby says.\n\t\t\t\t\n\t\t\t\t*sound fraggrenade.mp3\n\t\t\t\t*gosub bombtime\n\t\t\t\t*page_break\n\t\t\t\n\t\t\t\tAs you turn back, you saw Todd's sniper rifle laying on the ground, behind the marines. \n\t\t\t\n\t\t\t\t\"Todd, are you there? Todd!\" You knew it was too late, but until you've seen it with your own eyes, you refuse to believe it.\n\t\t\t\n\t\t\t\tThe three of you quickly dispatch the marines blocking your way to the gunship.\n\t\t\t\n\t\t\t\tYou rush to Todd.\n\t\t\t\n\t\t\t\tHe was gone.\n\t\t\t\n\t\t\t\tA shot punctured his lungs on the spot. Clutching your fist, guilt and anger fills you. Todd didn't stand much of a chance with the pistol barely able to penetrate the heavy armor of some of the marines. You wish you could have been in two place at once and wondered if you could have saved Todd if you quickly went to help him first.\n\t\t\t\n\t\t\t\t\"It's all my fault.\" You close your eyes as you closed Todd's.\n\t\t\t\n\t\t\t\t*gosub bombtime\n\t\t\t\t*page_break\n\t\t\t\n\t\t\n\t\t\t\tCatherine covers you and Robby as both of you carry Todd's lifeless body into the ship. At least he deserves a proper burial.\n\t\t\t\n\t\t\t\tAs soon as everyone is on board, you blast off. The gunship armor seems to hold up well against the assault rifles, there wasn't much the marines could do to take you down at this point.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t*goto todddead\n\t\t\t\n\t\t\n\t\t\t# Open fire with your ${weapon}\n\t\t\t\n\t\t\t\tYou cover the other side for Robby, rapidly firing towards the marines. After taking down three marines, they split half of their forces to face you. \n\t\t\t\n\t\t\t\tIt was difficult to provide support now. As soon as you try to shoot back, the marines rain a barrage of gun fire upon you, as if they're waiting for you to expose yourself.\n\t\t\t\n\t\t\t\t\"Arg!\" A sound of pain coming from Robby.\n\t\t\t\n\t\t\t\t\"Well, this is the end of the line for me too guys, I'll try to hold them off as long as I can. ${name}, Catherine, get to the gunship. It's the last one closest to the hangar gate.\" Robby says as he crawls into another cover.\n\t\t\t\n\t\t\t\tyou see a fusillade of pulse rifles erupting all around Robby, he's been shot in the leg. Marines now have spread out on the platform above and are returning fire to Catherine and Robby. Catherine still have a chance to retreat, and she takes it.\n\t\t\t\n\t\t\t\t\"my only regret Catherine, was I never had the chance to date you.\" Robby says bitterly.\n\t\t\t\n\t\t\t\t\"I'm so sorry Robby.\" You spot a shed of tear as Catherine runs pass you.\n\t\t\t\t\n\t\t\t\t*sound pulseweapon.mp3\n\t\t\t\t*gosub bombtime\n\t\t\t\t*page_break\n\t\t\t\n\t\t\t\tAs you ran back with Catherine, you saw Todd's sniper rifle laying on the ground, behind the marines. \n\t\t\t\n\t\t\t\t\"Todd, are you there? Todd!\" You knew it was too late, but until you've seen it with your own eyes, you refuse to believe it.\n\t\t\t\n\t\t\t\tThe two of you quickly dispatch the marines blocking your way to the gunship.\n\t\t\t\n\t\t\t\tYou rush to Todd.\n\t\t\t\n\t\t\t\tHe was gone.\n\t\t\t\n\t\t\t\tA shot punctured his lungs on the spot. Clutching your fist, guilt and anger fills you. Todd didn't stand much of a chance with the pistol, barely able to penetrate the heavy armor of some of the marines. You wish you could have been in two place at once and wondered if you could have saved Todd if you quickly went to help him first.\n\t\t\t\n\t\t\t\t\"It's all my fault.\" You close your eyes as you closed Todd's.\n\t\t\t\n\t\t\t\tCatherine, still in shock of losing Robby, is stunned without words. \n\t\t\t\n\t\t\t\t\"Come on, we got to go!\" You grab Catherine's hands and pulls her into the ship.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t*gosub bombtime\n\t\t\t\t*page_break\n\t\t\t\t*goto bothdead\n\t\n*label robbydead\n\n*set ep1dead 2\n\nMassive explosions chased you as you fly out of the hangar. Not long after, an avalanche consumes the exit.\n\n\"We tried our best for Robby Catherine.\" Todd says with a big sigh. \"We did all we could.\" \n\n\"I'm so sorry for your lost guys, but we got a bigger problem!\" Felix comes back on the radio.\n\n\"Felix, you're back!\" Todd says with surprise\n\n\"There's one gunship we've missed, they kept it hidden on another level of the hangar and it was deployed as soon as they realize we rigged with the hangar with bombs. It's in pursuit behind you and catching up quickly. Be advised, This is the first fully operational XT-90C Gunship, where as yours is only a XT-90A Prototype. That gunship is more superior than yours in many ways, including speed, armor, shield and firepower. There's no avoiding to this fight ${Name}. You must beat the odds and survive!\"\n\nAs soon as Felix finish speaking, the pursuing gunship comes within range and locks onto you. With a 180 degrees turn, you now face eachother locked in a dog fight.\n\n*sound flight.mp3\n*page_break\n*goto dogfight\n\n*label todddead\n\n*set ep1dead 1\nMassive explosions chased you as you fly out of the hangar. Not long after, an avalanche soon consumes the exit gate.\n\nYou hear Catherine sobbing in the back mourning for Todd.\n\n\"Rest in peace old buddy.\" Robby folds Todd's hands across his chest.\n\n\"I'm so sorry for your lost guys, but we got a bigger problem!\" Felix comes back on the radio.\n\n\"Felix, you're back!\" You say with surprise\n\n\"There's one gunship we've missed, they kept it hidden on another level of the hangar and it was deployed as soon as they realize we rigged the hangar with bombs. It's in pursuit behind you and catching up quickly. Be advised, This is the first fully operational XT-90C Gunship, where as yours is only a XT-90A Prototype. That gunship is more superior than yours in many ways, including speed, armor, shield and firepower. There's no avoiding to this fight ${Name}. You must beat the olds and survive!\"\n\nAs soon as Felix finish speaking, the pursuing gunship comes within range and locks onto you. With a 180 degrees turn, you now face each other locked in a dog fight.\n\n*sound flight.mp3\n*page_break\n*goto dogfight\n\n*label bothdead\n\nYou had just enough time to make it to the prototype gunship with Catherine for take off. \n\nMassive explosions chased you as you flew out of the hangar. Not long after, an avalanche consumes the exit.\n\nYou hear Catherine sobbing in the back from such a great loss, but you're not able to comfort her as you're piloting the plane. It was a good excuse too, because you really don't know what to say at this point having lost both Robby and Todd.\n\n\"I'm so sorry for your lost guys, but we got a bigger problem!\" Felix comes back on the radio.\n\n\"Felix, you're back!\" You say with surprise\n\n\"There's one gunship we've missed, they kept it hidden on another level of the hangar and it was deployed as soon as they realize we rigged the hangar with bombs. It's in pursuit behind you and catching up quickly. Be advised, This is the first fully operational XT-90C Gunship, where as yours is only a XT-90A Prototype. That gunship is more superior than yours in many ways, including speed, armor, shield and firepower. There's no avoiding to this fight ${Name}. You must beat the odds and survive!\"\n\nAs soon as Felix finish speaking, the pursuing gunship comes within range and locks onto you. With a 180 degrees turn, you now face each other locked in a dog fight.\n\n*sound flight.mp3\n*page_break\n\n*label dogfight\n\n*set saveload12 true\n\nPROGRESS SAVED . . .\n\nShould you die in the following episode, you will be able to replay from this point on.\n\n*goto savegame12\n\n*label endsaveload12\n\n*page_break\n\nDo you need a tutorial for this boss battle?\n\n*choice\n\t#Yes\n\t\tAt every encounter, you will choose your ship's attack and defense, your choice will then be played out against the opponent ship.\n\t\t\n\t\tShips have three types of weapons:\n\t\t\n\t\tLaser\n\t\t*line_break\n\t\t*line_break\n\t\tAuto Cannon\n\t\t*line_break\n\t\t*line_break\n\t\tMissiles\n\t\t\n\t\tFirst choose the weapon you will attack the enemy with.\n\t\t\n\t\tNext you will choose which defense module to send your reserve power into:\n\t\t\n\t\tShield \t\t(counters Laser)\n\t\t*line_break\n\t\t*line_break\n\t\tArmor\t\t\t\t(counters Auto Cannon)\n\t\t*line_break\n\t\t*line_break\n\t\tChaff\t\t\t\t(counters Missiles)\n\t\t*line_break\n\t\t*line_break\n\t\tThe reserve power enhances the defense module, negating 100% of the attack if you counter the correct weapon type.\n\t\t\n\t\tThe reserve power will be reset on every encounter, allowing you to choose another module before the next encounter.\n\t\t\n\t\tExample: If the enemy fires Laser at you, and you choose to send reserve power into Shield, then your shield will take no damage. If you send the reserve power into Armor or Chaff however, your shield will drop by 25% and Hull drop by 5%. \n\t\t\n\t\tIf you lost all defense module points for that weapon and gets hit, then your Hull will take massive damage. The encounter repeats until one ship is destroyed.\n\t\t\n\t\tAlso keep in mind, the enemy gunship is more advanced than your own, the details are unknown.\n\t\t\n\t\tAre you ready?\n\t\t\n\t\t*page_break Begin Battle\n\t\t*goto firstphase\n\t\t\n\t#No\n\t\t*goto firstphase\n\t\n*label firstphase\n*rand AIweapon 1 3\n*rand AIdefense 1 3\n\n*if (playerhull \u003c= 0)\n\t*page_break\n\tTo your left, you see a large chunk of your gunship being blown away, followed by the sound of engines shutting down... Your begin to spiral downwards, the controls are jolting violently with sounds of tearing metal and sparks splashing your face.\n\t\n\tThe White snow fields turned round and round before your eyes, framed in fire.\n\t\n\tThat was the last thing you remembered.\n\t\n\tGAME OVER\n\t\n\tHINT: Try to focus on attacking 1 module of the enemy and always boost your module with the lowest percentage.\n\t\n\t*sound doubleexplosion.mp3\n\t*goto dead12\n\n*elseif (AIhull \u003c= 0)\n\t*page_break\n\tThe enemy gunship explodes in a blazing fireworks, celebrating your victory.\n\t*line_break\n\t*line_break\n\t*goto ending\n\n*else\n\t\n\t*gosub AIchart\n\t*line_break\n\t*line_break\n\t*gosub playerchart\n\t*line_break\n\tSelect your weapon:\n\t\n\t*choice\n\t\t#Laser\n\t\t\t*set playerweapon 1\n\t\t\t*set playerweaponname \"Laser\"\n\t\t\t*goto secondphase\n\t\t#Auto Cannon \n\t\t\t*set playerweapon 2\n\t\t\t*set playerweaponname \"Auto Cannon\"\n\t\t\t*goto secondphase\n\t\t#Missiles\n\t\t\t*set playerweapon 3\n\t\t\t*set playerweaponname \"Missiles\"\n\t\t\t*goto secondphase\n\t\n\n\n*label secondphase\n*gosub AIchart\n*line_break\n*line_break\n*gosub playerchart\n*line_break\nSelect the defense module for power boost:\n\n*choice\n\t*selectable_if (playershield > 0) #Shield\n\t\t*set playerdefense 1\n\t\t*set playerdefensename \"Shield\"\n\t\t*goto encounter\n\t*selectable_if (playerarmor > 0) #Armor \n\t\t*set playerdefense 2\n\t\t*set playerdefensename \"Armor\"\n\t\t*goto encounter\n\t*selectable_if (playerchaff > 0) #Chaff\n\t\t*set playerdefense 3\n\t\t*set playerdefensename \"Chaff\"\n\t\t*goto encounter\n\n*label encounter\n*rand AIweapon 1 3\n*rand AIdefense 1 3\n\n*if (AIweapon = 1)\n\t*set AIweaponname \"Laser\"\n\t*goto encounterA\n*elseif (AIweapon = 2)\n\t*set AIweaponname \"Auto Cannon\"\n\t*goto encounterA\n*else\n\t*set AIweaponname \"Missiles\"\n\t*goto encounterA\n\n*label encounterA\n*if (AIdefense = 1)\n\t*set AIdefensename \"Shield\"\n\t*goto encounter2\n*elseif (AIdefense = 2)\n\t*set AIdefensename \"Armor\"\n\t*goto encounter2\n*else\n\t*set AIdefensename \"Chaff\"\n\t*goto encounter2\n\n*label encounter2\n*if (playerweapon = AIdefense)\n\tYou fired ${playerweaponname} and the enemy successfully countered with boosting ${AIdefensename}. No damage was done.\n\t*line_break\n\t*line_break\n\t*goto encounter3\n\n*else\n\tYou fired ${playerweaponname} and the enemy boosted ${AIdefensename}, he takes damage.\n\t*if (playerweapon = 1)\n\t\t*if (AIshield \u003c= 0)\n\t\t\t*set AIshield 0\n\t\t\t*set AIhull -25\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\t*goto checkweapon\n\t\t*else\n\t\t\t*set AIshield -20\n\t\t\t*set AIhull -10\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\t*goto checkweapon\n\t*else\n\t\t*goto checkweapon\n\n*label checkweapon\n*if (playerweapon = 2)\n\t\t*if (AIarmor \u003c= 0)\n\t\t\t*set AIarmor 0\n\t\t\t*set AIhull -20\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\t*goto checkweapon1\n\t\t*else\n\t\t\t*set AIarmor -20\n\t\t\t*set AIhull -10\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t*goto checkweapon1\n*else\n\t*goto checkweapon1\n\n*label checkweapon1\n*if (playerweapon = 3)\n\t\t*if (AIchaff \u003c= 0)\n\t\t\t*set AIchaff 0\n\t\t\t*set AIhull -20\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\t*goto encounter3\n\t\t*else\n\t\t\t*set AIchaff -20\n\t\t\t*set AIhull -10\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\t*goto encounter3\n*else \n\t*goto encounter3\n\n*label encounter3\n*gosub AIchart\n*line_break\n*line_break\n*gosub playerchart\n\n*label checkdef\n*page_break Defense Phase\n\n*if (playerdefense = AIweapon)\n\tThe enemy fired ${AIweaponname} and you successfully countered with boosting ${playerdefensename}. No damage was done.\n\t*line_break\n\t*line_break\n\t*goto encounter4\n\n*else\n\tThe enemy fired ${AIweaponname} but you boosted ${playerdefensename}, taking damage.\n\t*if (AIweapon = 1)\n\t\t*if (playershield \u003c= 0)\n\t\t\t*set playershield 0\n\t\t\t*set playerhull -30\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\t*goto AIweaponcheck\n\t\t*else\t\t\n\t\t\t*set playershield -25\n\t\t\t*set playerhull -10\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\t*goto AIweaponcheck\n\t*else\n\t\t*goto AIweaponcheck\n\t\n*label AIweaponcheck\n*if (AIweapon = 2)\n\t*if (playerarmor \u003c= 0)\n\t\t*set playerarmor 0\n\t\t*set playerhull -30\n\t\t*line_break\n\t\t*line_break\n\t\t*goto AIweaponcheck1\n\t*else\n\t\t*set playerarmor -25\n\t\t*set playerhull -10\n\t\t*line_break\n\t\t*line_break\n\t\t*goto AIweaponcheck1\n*else\n\t*goto AIweaponcheck1\n\n*label AIweaponcheck1\n*if (AIweapon = 3)\n\t*if (playerchaff \u003c= 0)\n\t\t*set playerchaff 0\n\t\t*set playerhull -30\n\t\t*line_break\n\t\t*line_break\n\t\t*goto encounter4\n\t*else\t\t\n\t*set playerchaff -25\n\t*set playerhull -10\n\t*line_break\n\t*line_break\n\t*goto encounter4\n\n*label encounter4\n*gosub AIchart\n*line_break\n*line_break\n*gosub playerchart\n*page_break Planning Phase\n*goto firstphase\n\t\t\n\n*label playerchart\n${name}'s XT-90A Gunship (prototype):\n*stat_chart\n\t\n\tpercent playerhull Hull:\n\t\n\tpercent playershield Shield:\n\t\n\tpercent playerarmor Armor:\n\t\n\tpercent playerchaff Chaff:\n\t\n*return\n\t\n\n*label AIchart\nNUCP XT-90C Gunship:\n*stat_chart\n\t\n\tpercent AIhull Hull:\n\t\n\tpercent AIshield Shield:\n\t\n\tpercent AIarmor Armor:\n\t\n\tpercent AIchaff Chaff:\n\t\n\t\n\t\n*return\n\t\n\n*label ending\n*sound doubleexplosion.mp3\n\"You did it ${name}!\" Felix cheered \"The sacrifices were not in vain!\" \n\nAs you fly into the sunset, you type in the auto pilot coordinates. The gentle humming of the engine now replaces the roar of conflict just moments ago. With your helmet removed, you breath with ease for the first time in a long while.  You want to put behind all that's happened. To think that was only your first mission, the beginning of your career in AROC. You're too tired to think what's in store for you next, so you close your eyes and relax into a peaceful nap you well deserve.\n\n*label Episode2\n\n*page_break Episode Two\n\n*set episode 2\n\n*if (strength \u003c 34)\n\tThe medical center patch up your arms as soon as you got back, also removing the destroyed augmentation.\n\t*set strength 50\n\t*set augmentation \"\"\n\t*goto ep2pg1\n*else\n\t*goto ep2pg1\n\n*label ep2pg1\n\nA week has passed since the retrieval of the gunship. You were given some time off to rest and recover from the unexpected intensity of the first mission. Felix has been diligently studying the recovered database and gunship. Catherine has been exercising vigorously, probably her way of coping the losses...\n\n*if ep1dead = 1\n\tCatherine, Robby and yourself all spoke at Todd's funeral. You told the story of how Todd saved you during the mission, and heroically fought off the NUCP marines for as long as he could. A short film showed his young photos and films of him growing up in the academy. Catherine wasn't able to hold back her tears this time.\n\t\n\t*goto ep2pg2\n\n*elseif ep1dead = 2\n\tCatherine, Todd and yourself all spoke at Robby's funeral. You mention the times you used to play dice games with Robby during free time, then the heroic story of how he opened the hangar gate and gave his life so you all could escape. Catherine was perticularly sad about his passing, and regreted not treating him better when he was alive.\n\t\n\t*goto ep2pg2\n\t\n*else \n\tBoth you and Catherine participated in Todd's and Robby's combined funeral. You gave speechs about each member.\n\t\n\tFor Todd, you told the story of how he saved you during the mission, and held off the marines at the hangar the best he could. \n\t\n\tFor Robby, you mentioned the times you played dice with him and the heroic story of how he opened the hangar gate and gave his life so you all could escape.\n\t\n\tCatherine wasn't able to hold back her tears this time.\n\t\n\t*goto ep2pg2\n\t\n*label ep2pg2\n\nSeeing how Catherine is, what do you decide to do?\n\n*choice\n\t#Support her emotionally\n\t\t\n\t\t\n\t\t*if ep1dead = 0\n\t\t\t\"Hey Catherine, how are you holding up.\"\n\t\t\n\t\t\tShe quickly wipe the tears from her red eyes, and tries her best to put up a smile for you. \"I'm alright, it's just difficult and unexpected and the both of them...\"\n\t\t\n\t\t\t\"I know, we did all we could, we can't change what's been done, now we have to focus on the future, to make their sacrifices count. You must be strong Catherine.\" You say as you gave her a hug.\n\t\t\t\n\t\t\t\"Thanks for making me feel better ${name}, I'm glad you're here\" Catherine smiles again, more genuine this time.\n\t\t\t\n\t\t\t*set catrel 67\n\t\t\t*goto ep2pg3\n\t\t\t\n\t\t*else\n\t\t\t\"Hey Catherine, how are you holding up.\"\n\t\t\n\t\t\tShe quickly wipe the tears from her red eyes, and tries her best to put up a smile for you. \"I'm alright, it's just difficult to accept he's gone...\"\n\t\t\n\t\t\t\"I know, we did all we could, we can't change what's been done, now we have to focus on the future, to make his sacrifice count. You must be strong Catherine.\" You said as you gave her a hug.\n\t\t\t\n\t\t\t\"You're right ${name}, I will be strong. Thanks.\" Catherine replies.\n\t\t\t\n\t\t\t*set catrel 67\n\t\t\t*goto ep2pg3\n\t\t\n\t#Support her logically\n\t\t\n\t\t\"Hey Catherine, how are you holding up.\"\n\t\t\n\t\tShe quickly wipe the tears from her red eyes, and tries her best to put up a smile for you. \"I'm alright, it's just all too sudden, and difficult and unexpected...\"\t\t\n\t\t\n\t\t\"I understand the pain, but this is what we do Catherine, as members of AROC, we're not only trained to fight, But we're trained to handle emotional losses. Our career has just began, we have a long road ahead of us. You must be strong.\" \n\t\t\t\n\t\t\"You're right ${name}, I'll do my best.\"\n\t\t\n\t\t*set catrel 62\n\t\t*goto ep2pg3\n\t\n\t\t\n\t#Rebuke her for being weak\n\t\t\n\t\t\"Hey Catherine, how are you holding up.\"\n\t\t\n\t\tShe quickly wipe the tears from her red eyes, and tries her best to put up a smile for you. \"I'm alright, it's just difficult and unexpected and the both of them...\"\t\t\n\t\t\n\t\t\"Stop crying, we're members of AROC, you've been trained for this Catherine, people die in war, it's normal, and it will continue, get over it and get used to it. This won't be the last time we lose companions either. This is our way of life.\"\n\t\t\n\t\t\"Sorry to disappoint you ${name}.\" She turns and leaves in a hurry.\n\t\t\n\t\t*set catrel 58\n\t\t*goto ep2pg3\n\n*label  ep2pg3\n\nYou spent the next day to improve your:\n\n*choice\n\t#Strength\n\t\tYou hit the gym for some heavy weights, you focus on improving your upper body strength for the rest of the week.\n\t\t\n\t\t*set strength +5\n\t\t*goto ep2pg4\n\t#Agility\n\t\tYou join Catherine at the tread mill and enjoy a friendly competition of who can run further, she wins by a good margin.\n\t\t\n\t\t*set agility +5\n\t\t*goto ep2pg4\n\t#Perception\n\t\tYou practice your weapons at the gun range with popup targets, as a result, your perception improves.\n\t\t\n\t\t*set perception +5\n\t\t*goto ep2pg4\n\t#Intelligence\n\t\tYou read Sun Tzu Battle Tatics and Strategies during the free time, and your intelligence improves.\n\t\t\n\t\t*set intelligence +5\n\t\t*goto ep2pg4\n\t\n*label ep2pg4\nFor the rest of the day, you:\n\n*choice\n\t#[b]MINIGAME:[/b] Play Cho Han Bakuchi in the entertainment room\n\t\tA Japanese AROC member invites you to play a game of Cho Han Bakuchi in the entertainment room. You sit with him at the game table.\n\t\t\n\t\tDo you know how to play Cho Han Bakuchi ?\n\t\t*choice\n\t\t\t#Yes\n\t\t\t\t*goto chohan\n\t\t\t#No\n\t\t\t\tThe game uses five standard dice, which are shaken in a bamboo cup by a dealer. The cup is then overturned onto the table. Players then place their wagers on whether the sum total of numbers showing on the two dice will be \"Cho\" (even) or \"Han\" (odd). The dealer then removes the cup, displaying the dice. The winners collect the chips.\n\t\t\t\t\n\t\t\t\t*page_break Start Game\n\t\t\t\t*goto chohan\n\t#Relax in your dorm\n\t\tYou decide to call it for the night and returns to your room.\n\t\t*goto dorm2\n\n*label chohan\n*if aichip \u003c= 0\n\tYou won all the chips, do you want to play again?\n\t*goto ep2pg41\n*elseif playchip \u003c= 0\n\tYou lost the game, do you want to play again ?\n\t*goto ep2pg41\n*else\n\n\t*rand chdie1 1 6\n\t*rand chdie2 4 6\n\t*rand chdie3 1 6\n\t*rand chdie4 1 3\n\t*rand chdie5 1 6\n\n\tOpponent Chips: ${aichip}\n\n\tYour chips: ${playchip}\n\n\tHow many chips do you wager ?\n\t\n\t*temp playerbet 0\n\t\n\t*input_number playerbet 1 1000 \n    \n\t*set playwager playerbet\n\t\n\t*if (playwager > playchip)\n\t\tYou don't have that many chips, enter an amount you have.\n\t\t*goto chohan\n\n\t*elseif (playwager > aichip)\n\t\tYour opponent doesn't have that many chips, enter an amount he has.\n\t\t*goto chohan\n\n\t*else\n\t\t*set aichip - playwager\n\t\t*set playchip - playwager\n\t\t*set potpile playwager*2\n\t\n\t\tWager Pot: ${potpile}\n\t\n\t\tOpponent Chips: ${aichip}\n\n\t\tYour chips: ${playchip}\n\t\n\t\tDo you bet on Odd or Even results?\n\t\t\n\t\t*choice\n\t\t\t#Odd\n\t\t\t\t*set betodd 1\n\t\t\t\t*goto betresult\n\t\t\t#Even\n\t\t\t\t*set betodd 0\n\t\t\t\t*goto betresult\n\t\t\t#Quit Mini Game\n\t\t\t\tYou decide to call it for the night and returns to your room.\n\t\t\t\t*line_break\n\t\t\t\t*goto dorm2\n\n*label betresult\n\nThe dealer shakes the bamboo cup in mid air, and plants it on the table.\n\nThe cup reveals ${chdie1}, ${chdie2}, ${chdie3}, ${chdie4}, ${chdie5}\n\n*if (((((chdie1+chdie2) +chdie3) +chdie4) +chdie5) modulo 2) = 0\n\tThe sum of the dice are even.\n\t*if betodd = 0\n\t\t*line_break\n\t\tYou bid Even. You won!\n\t\t*set playchip +potpile\n\t\t*set potpile 0\n\t\t*page_break\n\t\t*goto chohan\n\t*else\n\t\t*line_break\n\t\tYou Bid Odd. You lost...\n\t\t*set aichip +potpile\n\t\t*set potpile 0\n\t\t*page_break\n\t\t*goto chohan\n*else\n\tThe sum of the dice are odd.\n\t*if betodd = 1\n\t\t*line_break\n\t\tYou bid Odd. You won!\n\t\t*set playchip +potpile\n\t\t*set potpile 0\n\t\t*page_break\n\t\t*goto chohan\n\t*else\n\t\t*line_break\n\t\tYou Bid Even. You lost...\n\t\t*set aichip +potpile\n\t\t*set potpile 0\n\t\t*page_break\n\t\t*goto chohan\n\n*page_break\n\n*label ep2pg41\n*choice\n\t#yes\n\t\t*set playchip 1000\n\t\t*set aichip 1000\n\t\t*set potpile 0\n\t\t*goto chohan\n\t#No\n\t\tYou return to your room and ends the day.\n\t\t*goto dorm2\n\n*label dorm2\n\n*set saveload2 true\n\nPROGRESS SAVED . . .\n\nShould you die in the following episode, you will be able to replay from this point on.\n\n*goto savegame2\n\n*label endsaveload2\n\n*page_break\n\n*rand keypad 1000 9999\n\nA few days later, while having coffee with Felix, he tells you some interesting news.\n\n\"${name}, I heard your next mission will be a solo operation, a rescue mission of some HILO defector research scientist. You should be receiving the briefing today. As for the XT-90 Gunship data you've gathered, we discovered the superior technology behind it originates from an alien derelict found by the NUCP some where in the South China Sea.\" Felix said while having another sip of coffee. \"We haven't located where exactly the location of the derelict is, but according to the data, it seems to provide a blue print of some kind of time shift teleportation device. The NUCP hasn't been able to fully understand the technology yet, but they have applied what they learned from the alien hover technology in the design of the XT-90 Gunship.\"\n\n*label archive2\n\nIn your dorm, you fire up the computer:\n*choice\n\t\n\t#Mission Briefing\n\t\t\n\t\tAgent ${name}:\n\t\t\n\t\tDoctor Selene Askler is a HILO research scientist who recently chose to defect to us. She is the head research of the Arab Robotics Development Institute. Her knowledge of HILO robotics technology will be a great asset to us.\n\t\t\n\t\tYour objective is to infiltrate the HILO base, locate and hack into the computer terminal with the disk key provided by Dr. Askler.\n\t\t\n\t\tThe surface elevator password is ${keypad}, use that to gain entry to the base.\n\t\t\n\t\tThe base is patrolled by multiple BDS and regular soldiers. Alerting a soldier will cause him to activate an alarm sequence via a terminal, that will call in significant numbers of enemy reinforcements. The best apprach will be stealth. Once you've located the doctor, you must escort her to the extraction point where our drop ship will be waiting.\n\t\t\n\t\tYour mission commences at 0900 Hours, Oct 23, 2058 from Docking Bay 05A.\n\t\t\n\t\tA photo of Dr.Askler is attached, to your surprise, she's a Caucasian, not an Iraqi. Long Blonde hair, big blue eyes, sharp chin, very well featured and quite nice looking.\n\t\t\n\t\t*page_break Back\n\t\t\n\t\t*goto archive2\n\t\n\t#History of current conflicts\n\t\t\n\t\tWith the constant economic downturn and conflicts, the United States had officially lost its super power title in the year 2032.\n\t\t\n\t\tRussia and China has risen together and created the New Unified Communist Party (NUCP), they have dominated most of Asia and parts of Europe in terms of economy and political influence, they are the undisputed new super power.\n\t\t\n\t\tWithout the support from the United States, the ISIS terrorist seized almost all of the middle east continent. The oil production in Saudi Arabia and other natural resources in the region are now all under ISIS control. Their massive increase of wealth has a devastating effect on all democratic nations. They renamed themselves as Holy Islamic Liberation Organization (HILO).\n\t\t\n\t\tIn a desperate effort to maintain balance, NATO has created the Augmented Reconnaissance and Operations Corp (AROC) to counter the new threats.\n\t\t\n\t\t*page_break Back\n\t\t\n\t\t*goto archive2\n\t\n\t#NUCP Military and Operation Details\n\t\tThe NUCP military utilizes a technologically crude, but highly effective assault weapons, a consistent ideology traced back to the roots of AK-47 rifles of World War II Soviet Communist. \n\t\t\n\t\tDuring battle, the NUCP deploys heavy armor coupled with ambush tactics. They prefer to spread out and overwhelm their enemies rather than clustering up in close proximity. While they are fairly weak individually, they are a potent threat in groups, able to lay down withering streams of fire at all ranges and angles from behind cover. Specialty troops use more advanced weapons, and many are issued advanced reactive alloy armor plating to give them a tank role as a bullet spunge. \n\t\t\n\t\tTheir recent discovery of the alien hover technology has lead to the development of the XT-90 Gunship, we do not have intel on other developments utilizing this technology but we suspect there will be.\n\t\t\n\t\t*page_break Back\n\t\t\n\t\t*goto archive2\n\t\t\t\n\t\t\n\t#HILO Military and Operation Details\n\t\tThe HILO was first headed by a powerful and ambitious leader, capable of keeping the rebels and terrorists under his control. His identity remains unknown to us and even the majority of low ranking HILO troops. All we know is, the terrorist faction has never been stronger since the mysterious leader came to power. \n\t\t\n\t\tThe HILO has now become more of a trader merchant of a vast amount of natrual resources, commodities and technologies in the middle east. Expanding their wealth is their priority, and domination power comes as second. They are the new world pirates.\n\t\t\n\t\tMore technologically advanced than the NUCP, the HILO soldiers and snipers employ many of the ambush tactics of the NUCP; however, they supplement field combat with automated robotic security known as Bipedal Defensive Sentinel (BDS).\n\t\t\n\t\tThe Bipedal Defensive Sentinels (BDS) are highly advanced bipedal robotic turrets carrying a variety of turrets ranging from pulse laser, to heavy laser, to plasma cannon. Rather than taking cover, which would be impractical given the in-line mounting of their weapons, these robotic killers will simply close the distance within firing range, relying on their regenerating shields to soak up damage. Their personnel shield generator is relatively powerful, so an EMP grenade is strongly recommended. Their physical frame however, is weak and poorly armored. The BDS also has a special detachment ability where if they are critically damaged in the lower half of their frame, they can dismount the CPU with the turret into an Aerial Turret Sentry (ATS). Where the ATS lose on shield and armor, it gains back with high aerial maneuverability. They can dodge gunfire with incredible speeds and will take cover behind pillars and hills. Never underestimate a BDS or a ATS.\n\t\t\t\n\t\t*page_break Back\n\t\t\n\t\t*goto archive2\n\t\t\n\t#Equipments and Gears (updated)\n\t\t\n\t\tGrimloc Pulse Rifle: The Grimloc is the standard issue AROC rifle, with both fully automatic and semi automatic modes. One short coming of this rifle is that it's prone to overheat if used excessively in full automatic. \n\t\t\n\t\tScrumk Shotgun: The Scrumk is considered a small \"Flak Cannon\" capable of clearing large crowds in a small confined area. It uses traditional explosive ammo to spray in a cone shape blast. One advantage of the Scrumk is it's fast reloading ability to quickly pull off the next shot making it a great weapon for \"spray n pray\" techniques.\n\t\t\n\t\tHawklar burst laser SMG: The small compact design of the Hawklar enables the weapon to fire like a rifle with the size of a large pistol, it still needs to be held with both hands for stability. It is the lightest gun in the AROC arsenal. \n\t\t\n\t\tMS Plasma Sniper Rifle: This is a high quality sniper rifle with immense zoom capability.  It is extremely useful in long range support capable to accurately take out targets 3000 meters away, Penetrating the thickest armor. It's also completely silent. The plasma is not affected by air and wind resistance, so no adjustment is required.\n\n\t\tZorva Dagger: Zorva's blade is made out of reinforced titanium, the blade has electrical current running on the edges, allowing it to stun enemies prior to slicing them. \t\n\t\t\n\t\tM22B Frag Grenade: Standard issued grenade that scans your finger print before triggering, this prevents none AROC members from using it. The scan time is too quick to be noticed. It also has an advance fail safe mechanism to prevent false trigger.\n\t\t\n\t\tM22E EMP Grenade: This grenade is especially useful in dealing with HILO combatants as all of them have personnel shield generators. This effectively renders all shields within the proximity offline, also disrupting robotic command signals, freezing them in place for a good minute.\n\t\t\n\t\tM20A Flash Bang: This stun grenade not only renders all targets in the room blind and deaf for 3 minutes, it also discharges a small electrical shock, able to \"taser\" all targets to the ground.\n\t\t\n\t\tMkI Getrak Laser Pistol: The MkI is a small side arm typically used by the sniper for close range combat, there is no need to reload, but like the Pulse rifle, prolong fire will cause over heatdamage. This pistol is not able to penetrate thick armor.\n\t\t\n\t\t\n\t\t*page_break Back\n\t\n\t\t*goto archive2\n\t\n\t#Augmentation Documentation\n\t\t\n\t\tBasic Head, Arm, Leg Augmentations: These augmentations enhances the part of the body it is applied on, improving performance. The limb augmentations (Arms and Legs) has a special over drive boost feature where it temporarily grants 3 times the power, but permanently damages the augmentation and cause injury to the limbs in the process. This is advised only to be used in critical life threatening situations.\n\t\t\n\t\tCloaking Field: This augmentation allows the user to bend light around them, making them partially invisible. The distorted light is quite visible while the user is moving, as well at close range, it can be easily detected.\n\t\t\n\t\tVisual Targeting: This enhancement provides the user with a great increase in perception and target identifying, it can also be used to detect finger print on keypads.\n\t\t\n\t\tImpact Servo: This augmentation is used in halo jumps, allowing the user to land from terminal velocity on the ground without injury. It can support up to a maximum of 350lbs of weight and is only capable of one time use.\n\t\t\n\t\tShield Sphere: The Shield Sphere generates an orb of energy around the user, providing protection from all puncture and impact damage, similiarly to the HILO Personnel Shield Generator. At close range melee, the shield is not as effective and the user can still be injured. \t\n\t\t\n\t\t*page_break Back\n\t\t\n\t\t*goto archive2\n\t\n\t#Log off the computer\n\t\t\n\t\tYou turn off the computer, and go to bed.\n\t\t\n\t\t*goto ep2pg5\n\n\t\t\n*label ep2pg5\n\nIt's mission day, you begin your usual preperations at the locker to set up your gear.\n\nYou have a choice of a main weapon, four slots for grenades and health packs.\nYou realize this is a HILO mission, their military consists of soldiers and robotic BDS.\n\n*choice\n\t#Take the Grimloc Pulse Rifle\n\t\t*set inventory &\"Grimloc Rifle\"\n\t\t*set weapon \"Grimloc rifle\"\n\t\t*goto ep2pg6\n\t#Take the Scrumk Shotgun\n\t\t\n\t\t*set inventory &\"Scrmk Shotgun\"\n\t\t*set weapon \"Scrmk shotgun\"\n\t\t*goto ep2pg6\n\t\t\n\t#Take the Hawklar Laser SMG\n\t\t\n\t\t*set inventory &\"Hawklar SMG\"\n\t\t*set weapon \"Hawklar SMG\"\n\t\t*goto ep2pg6\n\n*label ep2pg6\n\nFor the first slot, what do you choose to take:\n\n*choice\n\t*comment #RevPak\n\t\t*comment You slot the RevPak\n\t\t*comment *set revpak +1\n\t\t*comment *goto ep2pg7\n\t\n\t#M22B Frag Grenade\n\t\tYou slot the Frag Grenade\n\t\t*set frag +1\n\t\t*goto ep2pg7\n\t\n\t#M22E EMP Grenade\n\t\tYou slot the EMP Grenade\n\t\t*set emp +1\n\t\t*goto ep2pg7\n\t\n\t#M20A Flash Grenade\n\t\tYou slot the flash grenade\n\t\t*set flash +1\n\t\t*goto ep2pg7\n\n*label ep2pg7\n\nFor the second slot, what do you choose to take:\n\n*choice\n\t*comment #RevPak\n\t\t*comment\tYou slot the RevPak\n\t\t*comment\t*set revpak +1\n\t\t*comment\t*goto ep2pg8\n\t\n\t#M22B Frag Grenade\n\t\tYou slot the Frag Grenade\n\t\t*set frag +1\n\t\t*goto ep2pg8\n\t\n\t#M22E EMP Grenade\n\t\tYou slot the EMP Grenade\n\t\t*set emp +1\n\t\t*goto ep2pg8\n\t\n\t#M20A Flash Grenade\n\t\tYou slot the flash grenade\n\t\t*set flash +1\n\t\t*goto ep2pg8\n\n*label ep2pg8\n\nFor the third slot, what do you choose to take:\n\n*choice\n\t*comment #RevPak\n\t\t*comment You slot the RevPak\n\t\t*comment *set revpak +1\n\t\t*comment *goto ep2pg9\n\t\n\t#M22B Frag Grenade\n\t\tYou slot the Frag Grenade\n\t\t*set frag +1\n\t\t\n\t\t*goto ep2pg9\n\t\n\t#M22E EMP Grenade\n\t\tYou slot the EMP Grenade\n\t\t*set emp +1\n\t\t\n\t\t*goto ep2pg9\n\t\n\t#M20A Flash Grenade\n\t\tYou slot the flash grenade\n\t\t*set flash +1\n\t\t\n\t\t*goto ep2pg9\n\n*label ep2pg9\n\nFor the last slot, what do you choose to take:\n\n*choice\n\t*comment #RevPak\n\t\t*comment You slot the RevPak\n\t\t*comment *set revpak +1\n\t\t*comment *goto ep2pg9A\n\t\n\t#M22B Frag Grenade\n\t\tYou slot the Frag Grenade\n\t\t*set frag +1\n\t\t\n\t\t*goto ep2pg9A\n\t\n\t#M22E EMP Grenade\n\t\tYou slot the EMP Grenade\n\t\t*set emp +1\n\t\t\n\t\t*goto ep2pg9A\n\t\n\t#M20A Flash Grenade\n\t\tYou slot the flash grenade\n\t\t*set flash +1\n\t\t\n\t\t*goto ep2pg9A\n\t\n*label ep2pg9A\n\nYou also grab the Laser Pistol and belt the Zorva Dagger.\n*set pistol \"Laser Pistol, Zorva Dagger\"\n\n*comment following section has been disabled but kept for future update consideration\n\n*comment *if (revpak > 0)\n\t*comment *set inventory &\", RevPak x ${revpak}\"\n\t*comment *goto checkfrag\n*comment *else\n\t*comment *goto checkfrag\n\n*comment *label checkfrag\n*comment *if (frag > 0)\n\t*comment *set inventory &\", Frag x ${frag}\"\n\t*comment *goto checkemp\n*comment *else\n\t*comment *goto checkemp\n\n*comment *label checkemp\n*comment *if (emp > 0)\n\t*comment *set inventory &\", EMP x ${emp}\"\n\t*comment *goto checkflash\n*comment *else\n\t*comment *goto checkflash\n\n*comment *label checkflash\n*comment *if (flash > 0)\n\t*comment *set inventory &\", Flash x ${emp}\"\n\t*comment *goto ep2pg10\n*comment *else\n\t*comment *goto ep2pg10\n\n*label ep2pg10\n\nAs you're about to board the drop ship, Felix calls you\n\n\"${name}, did you check the mission briefing for the surface elevator password from the defector and bring the disk key she provided?\"\n\nYou answer:\n*sound cargoelevator.mp3\n*choice\n\t#Yes\n\t\t\"Ya I've check and memorized it already, and I have the disk key.\"\n\t\t\n\t\t\"Good, don't forget it or else you won't be able to get in. Good luck out there, Felix out.\"\n\t\t\n\t\t*goto ep2pg11\n\t\n\t#No\n\t\t\"No I forgot to check the code, but I did bring the disk key package.\"\n\t\t\n\t\t\"Alright ${name}, the code is ${keypad}, don't forget it, or you'll be in big trouble once you're deployed. Good luck out there, Felix out.\"\n\t\t\n\t\t*goto ep2pg11\n\t\n*label ep2pg11\n*page_break\n\nThe drop ship lands in a desert canyon area in Oman. You're surprised how warm it is even in this time of season here. The desert storm quickly fills your teeth with sand, it's not too pleasant and you regret not bringing a mask. Checking your wrist watches GPS, the base is 2 miles west of you.\n\nThe vast quiet of the desert canyon unnerves you. Scared thoughts race through your head as you go over the possibility of failing.\n\nYou are on a solo sneaking mission without back up now. There will be no one to cover for you when you make a mistake. \n\nAfter a deep breath, you pace through sand dune while checking your wrist locator for directions. \n\n*page_break\n\nIt was after a few paces away from your starting point that you start to take notice of a snake that had been following you. It had a distinct yellow diamond pattern laced along its black scales. Its got glowning green eyes and is about 4 meters in length by your estimate.\n\nYou thought back to your desert training at the academy.\n\nDo snakes stalk their prey?\n\nThe memory of the lesson you had in the training room was vague because Catherine was complaining about a leg cramp that time. Her incessant complaining had always been a constant bother to you.\n\n\"Damn it Catherine.\" You whisper.\n\nWhenever you stop, the snake would try to hide amongst the dunes. You could hear the slithering continue when you resumed walking.\n\nWhat an odd way for a snake to behave. What do you intend to do?\n\n*sound rattlesnake.mp3\n*choice\n\t#Ignore the snake and move on\n\t\tAfter finishing a mile of walking, your decision to ignore the snake began to manifest your consequence. It was a patrol droid for HILO that had been monitoring your movements since you arrived. \n\t\t\n\t\tBDS Bipedalled Units burst out of the sand and rains bullets upon your dumbfounded frame. You didn't even have time to raise your arms to retaliate. As the life fades from your eyes, you soak in the shame of being put down by your lack of curiosity. \n\t\t\n\t\tGAME OVER\n\t\t*sound laser.mp3\n\t\t*goto dead2\n\t\n\t#Stay Put and wait for the snake to come closer\n\t\tYou decide to take an interest in the snake on account of its strange behavior. This soon turns out to be a grave mistake as the snake is a robotic sentry for HILO. Three minutes after staying put, the snake opens out its jaw and let out an alarm that quickly calls in a herd of BDS units that made swift work of you.\n\t\t\n\t\tAs you wait for you end, you look back at the snake that was now slithering on top of your corpse. Your last action is to squint in shame for being brought down by a HILO drone. \n\t\t\n\t\tGAME OVER\n\t\t*sound laser.mp3\n\t\t*goto dead2\n\t\n\t#Kill the snake\n\t\tYou do not hesitate for a moment to fling your knife at the snake while you are walking to catch it off guard. The knife finds its mark but it doesn't bleed.\n\n\t\tYou see sparks fly out of the serpent's head as it lay motionless on the ground. Upon closer inspection of the creature, you find an intricate array of wires, micro hydraulics and cameras within the small frame of the snake. It's an observation drone snake. You take in a sigh of relief and curse Catherine once again for making you miss out on the desert warfare lecture during training.\n\t\t\n\t\t*sound emp.mp3\n\t\t*goto ep2snake\n\t\t\n*label ep2snake\n\n*page_break\n\t\t\nYou go into the prone position about a quarter mile away from the base, beyond the sand dune, you spot a bunker. It's 15 feet high and 20 feet long and is fenced off on all sides. There are two BDS with rail guns standing guard at the entrance. You wonder for a moment if that is the right place. Your wrist GPS confirms it is. The base must be underground, and you remember the password is for a surface elevator, which must mean it's inside that bunker.\n\nHow do you plan to deal with the two BDS standing guard ?\n\n*sound mechwalk.mp3\n*choice\n\t#Charge head in and attack the two BDS\n\t\tYou drew your weapon and dash towards the bunker, firing your ${weapon}. As your shots are absorbed by the blue shield, the BDS turns to you and charges up their laser turrets. The last thing you saw was a stream of golden light.\n\t\t\n\t\tYou were vapourized.\n\t\t\n\t\tGAME OVER\n\t\t*sound snipershot.mp3\n\t\t*goto dead2\n\t\n\t#Go around to a hill closer to the buncker\n\t\tYou take the long way around the sand dune. Staying hidden, taking your time. You take cove behind a hill much closer to the bunker. The BDS are patrolling the area. More options have opened up to you now that you're closer:\n\t\t\n\t\t*choice\n\t\t\t#Fire your ${weapon} at close range\n\t\t\t\tYou drew your weapon and dash towards the bunker, firing your ${weapon}. As your shots are absorbed by the blue shield, the BDS turns to you and charges up their plasma turret. The last thing you saw was a stream of golden light. \n\t\t\t\t\n\t\t\t\tYou were vapourized.\n\t\t\n\t\t\t\tGAME OVER\n\t\t\t\t\n\t\t\t\t*sound snipershot.mp3\n\t\t\t\t*goto dead2\n\t\t\t\n\t\t\t*selectable_if (frag > 0) #Throw your Frag Grenade\n\t\t\t\tYou put a frag grenade right between one of the BDS' legs. The close proximity explosion completely destroys one of the BDS, but the other was only lightly damage and is able to stay operational as the shield absorbed most of the impact. \n\t\t\t\t\n\t\t\t\tThe remaining BDS returns fire at you, vaporizing you with its plasma turret.\n\t\t\t\t\n\t\t\t\tGAME OVER\n\t\t\t\t*sound fraggrenade.mp3\n\t\t\t\t*goto dead2\n\t\t\t\n\t\t\t*selectable_if (emp > 0) #Throw your EMP Grenade\n\t\t\t\tYou manage to put an EMP Grenade between the two BDS, the blast disables both BDS as well as the security cameras on top of the bunker. This is your chance, you enter the bunker and find the keypad.\n\t\t\t\t\n\t\t\t\tYou check your email quickly to make sure you have the right code: ${keypad}\n\t\t\t\t\n\t\t\t\tYou enter the code:\n\t\t\t\t\n\t\t\t\t*sound empgrenade.mp3\n\n\t\t\t\t*input_text entercode\n\n\t\t\t\t*goto elevatorcode\n\t\t\t\n\t\t\t*selectable_if (flash > 0) #Throw your Flash Grenade \n\t\t\t\t\n\t\t\t\tThe Flash Grenade did nothing but alerting the mechanical BDS robots. They vaporize you with their plasma turrets in response to your stupidity.\n\t\t\t\t\n\t\t\t\tGAME OVER\n\t\t\t\t*sound flashbang.mp3\n\t\t\t\t*goto dead2\n\t\t\t\t\t\t\t\t\t\t\n*label elevatorcode\n\n*if (entercode = keypad)\n\t\n\t*set EMP -1\n\t*set sinventory inventory\n\t\n\tA green light displays on the access pad and a computerized voice comes on the speaker \"Access granted, please wait.\"\n\t\n\tA low rumbling sound begins from the elevator. It's raising up to get you.\n\t*goto ep2elevator\n\n*else\n\t\n\tA computerized voice comes on the speaker \"Incorrect code entered, scanning sequence initiated.\"\n\t\n\tA rectangular shape scanner drops from the ceiling behind you and scans your body.\n\t\n\t\"Non-HILO personnel detected, activating execution sequence.\"\n\t\n\tFour turrets pops up, two from above the ceiling, two from the ground and open fires at you.\n\t\n\tYou didn't even have time to think about the mistake you've made, and you're already dead...\n\t\n\tGAME OVER\n\t*sound pulseweapon.mp3\n\t*goto dead2\n\t\t\n*label ep2elevator\n\nThe elevator descends into the base.\n\nYou enter an area to what seem like a BDS manufacturing plant. the conveyer belt above hangs the bipedal frame, ready to be assembled. The wall panels are covered in silver and white plating, giving it a high tech feel compare to NUCP. There are some none-combatant operators here working on the machinery as well as several BDS patrolling the area. \n\nAs you search for the Terminal that takes the disk you needed to plant, you observe the general ambience of the area. You can't help but admire how impressive HILO has become over the years, starting all from a rebellion resistance group battling in the middle east. \n\nYou then start to look at the non-military personnel in the base. You take note that the people in lab gowns aren't Middle-Eastern in orientation. There were Japanese, American and even Russian people operating the complicated machinery in the area. You begin to think of the nature of your extraction target; Dr. Askler. \n\nIt was while you were pondering that a strange voice caught you off-guard.\n\n\"W-Who are you?\"\nYour spine froze yet your instinct spun you around and had your weapon point towards your inquisitor. \n\nIt was an Asian looking girl in a lab coat. She had freckles hiding underneath thick glasses. Her black, unkempt hair stuck out of make shift buns tied together with what seems to be rubber bands. She's got the smell of sparks and chemicals, reminding you of a female version of Felix.\n\nHow do you respond?\n*sound cargoelevator.mp3\n*choice\n\t#Kill the Girl\n\t\tNoticing the urgency of the situation, you have no time to discuss your differences. You pull her in and twist her neck. A faint crack was heard and the life left her eyes. You issue a silent apology as you slowly lay down her corpse behind a stack of storage containers, out of sight.\n\t\t\n\t\tAs you placed her body, you notice something fall out of one of the pockets on her lab coat. It was a sheet of paper with something scribbled on it.\n\t\tYou immediately pick it up and check what was written on it. To your surprise, it was a map of the whole facility. All the terminals and desks and laboratories were listed on the map. There were even some personal notes scribbled about each area. \n\t\t\n\t\tIt looked like the girl you just killed was new to the facility. That was her own way of getting around.\n\t\t\n\t\t*goto ep2asiangirl\n\t\n\t#Threaten the Girl\n\t\tSeizing the opportunity to grab intelligence, you quickly pull the girl into a dark corner and cover her mouth with the palm of your hand.\n\t\t\n\t\t\"Shhh... I'm from the AROC. Nod if you understand me.\"\n\t\t\n\t\tHer head quickly nods up and down like a bobble head toy on the dash of a car.\n\t\t\n\t\t\"I won't hurt you unless you force me to. You need to tell me where to use this disk key.\" You explain as you pull your key out of your pocket. Her eyes widens to see something such as that disk key in your possession. It looks like a pretty big deal.\n\t\t\n\t\tShe raise a pointed finger at a lone terminal located on the far end of the main area of the facility. It is not guarded at all compared to the other areas. \n\t\t\"There's only one disk key that goes into that terminal.\" She says, putting your hand down from her mouth. \"We've been looking for that key for five days straight. Did you get this key from Dr. Askler?\"\n\t\t\n\t\t\"Where is she?\" You interjects. Noticing she was beginning to sound animated to your discussion, you covered her mouth once again to keep her from making too much noise. \n\t\t\n\t\tShe points again to the upper floors of the facility. Her focus was on one of the windowed observation halls.\n\t\t\n\t\tYou could not see the room for your position but took note of the location. \n\t\t\n\t\t\"Thank you.\" \n\t\t\n\t\tStill a bit shocked from having almost died, she takes a few breaths to calm herself down before she went back to work.\n\t\t\n\t\t\"They probably don't get out often.\" You tell yourself.\n\t\t\n\t\tScanning the area again, you quickly move towards the lone terminal.\n\t\t\n\t\tYou check your surroundings for safety before inserts the disk.\n\t\t\n\t\t*goto ep2asiangirl\n\n*label ep2asiangirl\n*page_break\n\nAnalyzing disk...\n\nWelcome Dr.Askler\n\nAccessing robotics mainframe options:\n\n1.) Disable all BDS\n\n2.) Execute organic annihilation program\n\nYou consider your options. \n\nIf you disable all the BDS, it would be much easier to fight off the remaining guards, but they will definitely realize something is wrong and call in reinforcements.\n\nIf you execute the organic annihilation program, the BDS will target all living organisms, that includes all HILOs personnel, Dr.Askler, and yourself. It will most likely cause a massacre as there are more BDS in here than HILO guards, but you may have to fight off more BDS.\n\nYou count your grenades before you decide to:\n\n*choice\n\t#Disable all BDS\n\t\tAll the BDS shuts down with their head turret slumped looking towards the ground. One of the HILO operators quickly went to trigger the alarm. And HILO soldiers begin to scramble into the scene.\n\t\t\n\t\tYou spot Dr.Askler on her 3rd floor office window, she's looking down with both of her palms on the window, she seems to be anticipating your appearance.\n\t\t\n\t\tYou silently sneak closer, using the heavy manufacturing machinery as cover. There's a group of HILO soldiers guarding the entrance to the stairs, 4 in total. \n\t\t\n\t\t*label groupstairs\n\t\t\n\t\tYou decide to:\n\t\t*sound emp.mp3\n\t\t*choice\n\t\t\t#Shoot them\n\t\t\t\tYou open fire, exposing your location. All attention is soon directed towards you from across the plant. You manage to take down 3 soldiers before you were hit by a grenade.\n\t\t\t\t\n\t\t\t\tGAME OVER\n\t\t\t\t*sound singleexplosion.mp3\n\t\t\t\t*goto dead2\n\t\t\t\n\t\t\t*selectable_if (frag > 0) #Throw Frag Grenade\n\t\t\t\tYou pulled the pin and roll the frag grenade towards the group. The explosion sends limbs flying in all directions. As you dash for the stairs, you were shot in the back. The noise had send all soldiers to converge on the entrance and one of them spot you as you dash to the stairs.\n\t\t\t\t*sound fraggrenade.mp3\n\t\t\t\t*set frag -1\n\t\t\t\tGAME OVER\n\t\t\t\t*goto dead2\n\t\t\t\n\t\t\t*selectable_if (emp > 0) #Throw EMP Grenade\n\t\t\t\tThe EMP grenade went off in the mist of the group of soldiers, the blast disorientated them and disabled all of their personnel shield. One of them quickly yells for backup and six more soldiers join them. None of them spotted you, but the entrance is now heavily guarded.\n\t\t\t\t*sound empgrenade.mp3\n\t\t\t\t*set emp -1\n\t\t\t\t*goto groupstairs\n\t\t\t\n\t\t\t*selectable_if (flash > 0) #Throw Flash Grenade\n\t\t\t\tThe Flash grenade stuns the group of soldiers without alerting anyone else in the vicinity. You have a few minutes before the soldiers regains sight and sound. \n\t\t\t\t*sound flashbang.mp3\n\t\t\t\t*set flash -1\n\t\t\t\t*goto ep2pg12\n\t\t\n\t#Activate Organic Annihilation Program\n\t\tWithin minutes, the base is filled with gunfire and explosions. All of the BDS has turned to attack HILO personnel. The unprepared assault devestated the base quickly. \n\t\t\n\t\tYou spot Dr.Askler on her 3rd floor office window, she's looking down with both of her palms on the window, she seems to be anticipating your appearance.\n\t\t\n\t\tYou silently sneak closer, using the heavy manufacturing machinery as cover. There's a BDS guarding the entrance to the stairs leading up to Dr.Askler.\n\t\t\n\t\t*label groupstairs2\n\t\tYou decide to:\n\t\t*sound mechwalk.mp3\n\t\t*choice\n\t\t\t#Shoot them\n\t\t\t\tYou open fire, exposing your location. All attention is soon directed towards you from across the plant. You manage to take down 3 soldiers before you were hit by a heavy laser BDS.\n\t\t\t\t\n\t\t\t\tGAME OVER\n\t\t\t\t*sound snipershot.mp3\n\t\t\t\t*goto dead2\n\t\t\t\n\t\t\t*selectable_if (frag > 0) #Throw Frag Grenade\n\t\t\t\tYou pulled the pin and rolled the frag grenade towards the BDS. The explosion sends BDS parts flying in all directions. As you dash for the stairs, you were shot in the back. The noise had send all all other BDS to converge on the entrance and one of them spot you as you dash to the stairs.\n\t\t\t\t\n\t\t\t\tGAME OVER\n\t\t\t\t*sound fraggrenade.mp3\n\t\t\t\t*goto dead2\n\t\t\t\n\t\t\t*selectable_if (emp > 0) #Throw EMP Grenade\n\t\t\t\tThe EMP grenade went off right below the BDS, the blast puts it out of commission. You're clear to move upstairs.\n\t\t\t\t*sound empgrenade.mp3\n\t\t\t\t*set emp -1\n\t\t\t\t*goto ep2pg12\n\t\t\t\n\t\t\t*selectable_if (flash > 0) #Throw Flash Grenade\n\t\t\t\tThe only thing the flash grenade did was piss off the BDS, it's in high alert mode now scanning the area, fortunately, it hasn't noticed you yet.\n\t\t\t\t*sound flashbang.mp3\n\t\t\t\t*set flash\t -1\t\t\t\n\t\t\t\t*goto groupstairs2\n\n\t\t\t\n*label ep2pg12\n\n*page_break\n\n*set selrel 50\n\nYou went up stairs and met Dr.Askler. \n\n\"Dr.Askler? My name is ${name}, from AROC. I've come to escort you.\"\n\n\"Quickly ${name}, put this on.\" She hands you a HILO soldier body armor. \"We'll be able to leave the compound with the evacuation for our escape much easier with this disguise.\"\n\nYou take the enemy guard uniform from Dr. Askler and eye her from head to toe. Given the time restraint you had, you had no time to ask her any questions. But apparently, she had some time to ask a few.\n\n\"How long have you been doing this?\" She asks, looking away as you change into the uniform.\n\n\"Long enough.\" You say, trying to put on a tough-guy persona for the doctor.\n\n\"Well you need to do it longer. You're putting on the uniform backwards.\" pointing at the awkward look of the uniform on your frame.\n\n\"You look like you work out a lot. 130 pounds?\"\n\n\"Good eye\" You answer, zipping the uniform into place. \n\n\"I'm scared. I tend to talk a lot when I feel nervous\" She says, suddenly clasping your arm. For a doctor, she most certainly had a strong grip. \n\n\"You'll be safe at HQ. You wanted out, right? I'm your ticket out of here. Just follow my lead and we'll be fine.\"\n\nReassured, she asks you another question.\n\n\"What if they reject me? I'm from enemy lines.\"\n\n*sound basealarm1.mp3\n*choice\n\t#It's the price you pay for defecting\n\t\tUpon your quick response, she takes a deep breath and walks away from you, getting into a state of deep thinking.\n\t\t\n\t\t\"How could you be so cold? Didn't I provide the key to disarm the BDS?\"\n\t\t\n\t\t\"Nothing personal. It's just war. Now please come with me.\"\n\t\t\n\t\t\"I don't know if I should go.\"\n\t\t\n\t\t\"Forget what I said. They'll give you a chance to prove yourself when we get there.\"\n\t\t\n\t\tYour words fell on deaf ears.\n\t\t\n\t\tIt was then that a handful of enemy guards enters the room and surrounds you. How did they know you are here ?\n\t\t\n\t\tIt only took a few moments for the guards to take you down. Before you pass out, you see the sad look on Dr. Askler with her palm covering a red alarm button, she was the one who turned on you...\n\t\t\n\t\tYou did not think it would end this way. Maybe you should have been more nice to an uncertain scientist. \n\t\t\n\t\tGAME OVER...\n\t\t\n\t\t*sound shotgun.mp3\n\t\t*page_break\n\t\t*goto dead2\n\t\n\t#Everyone deserves a second chance\n\t\t\"Yeah you're right. Maybe I'm just scared of what's been going on.\"\n\t\t\n\t\t\"It's a natural reaction towards war. You'll have plenty of time to think about that when we reach HQ.\"\n\t\t\n\t\tShe nods her head and follows your lead.\n\t\t\n\t\tSurprisingly, she has no problems following your command. She climbed up the crates you needed her to climb. She crawled through the tables as you instructed. It seemed as if she had military training before becoming a researcher.\n\t\t\n\t\t\"Yoga.\" She says, noticing your intent look at her frame as she finishing climbing up a 4 foot blockade. \n\t\t\n\t\tYou could not help but admire her lithe figure. It is well hidden underneath her lab coat. She is wearing a purple turtle neck sweater underneath the coat. A black mini skirt covered a scant portion of her legs.\n\t\t\n\t\t\"How do you move in those?\" You ask, pointing to the skirt.\n\t\t\n\t\t\"Believe it or not, this is the uniform. I have to wear cycling shorts underneath just to protect myself from the guards and their creepy stares.\"\n\t\t\n\t\t\"I see...\"\n\t\t\n\t\t\"It looks like it's also protecting me from you as well.\" She jests, chuckling a bit at her remark.\n\t\t\n\t\t*page_break\n\t\t\n\t\t\"Hey, I'm the one doing the protecting here\"\n\t\t\t\t\n\t\tShe stops chuckling and gives you a sincere stare.\n\t\t\n\t\t\"I can see that. You're earnest. I like that in a solder.\" You could feel her eyes upon you as you turned around and moved forward.\n\t\t\t\t\n\t\tThere was something about the way she looked at you that made you feel uncomfortable and determined at the same time. How could she be so coy in such a position?\n\n\t\tAnd yet, her seemingly naive perspective heightened your sense of responsibility. She is your priority. It was your mission to get her through safely.\n\t\t\t\t\n\t\t\"Let's save the chit chat for when we get out of here. This is no place for first base.\" You playing the tough guy routine again.\n\t\n\t\t\"I thought you liked the excitement.\" She answers\n\t\n\t\tThis doctor sure had a mouth on her. \n\n\t\tBut then again, you remember how Felix can constantly find something to talk about. He always had a way with words and conversations that betrayed a higher form of intellect and humor about him. \n\t\t\t\t\n\t\t\"I guess nerds are more gifted with glib and charm.\" You thought to yourself.\n\t\t*set selrel +7\n\t\t*goto selequest\n\t\t\t\n\t\t\t\n*label selequest\n\t\t\t\nFor the dull 2 mile hike back to the dropship, you decide to talk to Dr. Askler and find out more about her.\n\n*allow_reuse\nYou ask her about:\n*choice\n\t#Her family and background\n\t\t\"Tell me about your family Dr.Askler\" You asked.\n\t\t\n\t\t\"My mother passed away while giving birth to me, so I never met her. My father was a devoted HILO member even though he was an American. Since the day I was born, he's been training me towards accomplishing goals for HILO. I never fully agreed with him with the ideas, but just doing it out of obedience. But after I finished my Ph.D from Harvard in Robotics, my father forced me to join the HILO robotic research team, at the time he had already become a commander for HILO.\"\n\t\t\n\t\t*page_break \n\t\t*goto selequest\n\t\n\t#Her reason to defect\n\t\t\"So what made you decide to leave HILO?\" You asked.\n\t\t\n\t\t\"I been working as a head scientist here for a few years, but deep down, I never agreed with HILO's philosophy. I've been obedient to my father for too long, it's time I decide what I want to do, and HILO is not the way of life for me. It took me a long time to figure out how to contact AROC, but it was the only way out and my persistence seems to have paid off.\" Dr.Askler smiles at you. \"I'm glad you came.\"\n\t\t\n\t\t*page_break \n\t\t*goto selequest\n\t\n\t#The developments of HILO robotics research\n\t\t\"So what's the HILO research team been up to these days?\" You asked.\n\t\t\n\t\t\"Well, HILO is getting really close to developing a full body mech suit for their veteran soldiers. The operator will sit in the cockpit within the chest of the robot, the arms can be fitted with a wide range of weapons, from plasma launcher to mini guns to EMP shells, as well as shoulder mounted weapons on both sides, typically long range missile launchers or artillery cannons. The final component of the mech suit development is the disk I'm carrying. Without this, it will delay HILO another few months in completing the research. I plan to share what I can with AROC's research team to develop our own mech suit.\"\n\t\t\n\t\t*page_break \n\t\t*goto selequest\n\t\n\t#Finish the conversation and continue the journey\n\t\t*goto ep2pg13\n\n*label ep2pg13\n\n*set selrel +12\n\nYou've reached the drop ship and returns home without incident.\n\nAs you prepare to rest in your dorm later that night, a knock comes from the door. You open the door and sees Dr.Askler\n\n\"Dr.Askler, what can I do for you?\"\n\n\"Please ${name}, call me Selene.\" Selene was dressed in a casual tight tank top with shorts. Her long blonde hair washed and still damp. \"I was feeling a bit down, I wasn't as well received here as I've hoped.\" Looking towards the ground.\n\n\"Well, I guess it will take time for people to get used to you, it is the first time we had a HILO member joined us.\" You realized you're still holding her at the door. \"Please, come in Selene.\"\n\nAfter a nice chat, you helped to make her feel better.\n\n\"Thanks ${name}, it was nice talking to you, I feel much better now.\" She smiles genuinely at you. \"Well, I better head back, have a good night ${name}.\" She turns for the door.\n\nHer nightly visits became more frequent as both of you enjoyed eachother's company. \n\nOn her third visit to your room, she brought a chess set with her. It was a beautiful glass board with porcelain pieces. The pieces were made in a very creative manner. The pawns were foot soldiers, the knights were riding wolves, the rooks were large and heavily-armored lancers and the queens were wearing bikinis.\n\nSelene was also quite the vision at that time. She had silk pajamas with missiles printed on them.\n\n\"The guys from R&D gave it to me. I helped them tackle their issues with a few terrain-adjustment algorithms for one of their projects. It was a tough one. Do you play?\" \nIt seemed as if she wasn't waiting for an answer as she was already setting up the pieces while talking to you.\n\nThe last time you played chess was with Felix. He got you in 8 moves. He kept trashtalking you for a whole week. The sting of defeat caught up with you once again as you let out a sigh of disappointment.\n\n*page_break\n\nYou oblige Selene and take a seat. She places the board on your bed. You take opposite sides on both ends and starts another conversation as she made the first move on the board.\n\n\"Looks like you've got a fan club now.\"\n\n\"I'm accepting new members. I can print out an application for you if you want.\"\nSelene had this awful habit of snorting when she giggles. It was a bit of a turn off.\n\n\"I see you and this Catherine person are good friends. Are you dating?\"\n\nYou can sense her focus her eyes on you as you play coy and affix your gaze to the chess board. It is obvious that she didn't want to hear what you had to say, but rather see how you would react to her inquiry.\n\n\"We had our first mission together. We lost two friends.\"\n\n\"I'm sorry to hear that... But are you dating?\"\n\n\"You're one-track minded, aren't you?\"\n\n\"If I was, I wouldn't have beaten you just now. Check-mate.\"\n\nA face-palm found its way to you as you knocked down your king. \n\n\"Chess isn't one of my stronger points.\"\n\n\"Catherine seems to find a lot of other strong points in you. So are you two going out?\"\n\nThere's no avoiding her persistence.\n\n*fake_choice\n\t#She's a good comrade\n\t\t\"You make it sound like you're relatives.\" She retorts, letting out a few more snorts in between her giggles. You desperately want to poke fun at the snorting but you're afraid of what she might come back at you with.\n\t\t\n\t\t\"We had classes together during trai
