g breaths. \"Do I smell okay?\"\n                \n                [i]\"Where are you? I've been ready to shoot for fifteen minutes.\"[/i] \n                \n                \"Hey Brenda,\" you answer. \"I'm with a fan that really wants to meet you.\"\n                \n                [i]\"What the hell is going on? Does this have something to do with that vaudeville act that happened earlier?\"[/i]\n                \n                The sheriff rolls up his sleeve and reveals a tattoo of a hula girl. The face is Brenda's. \n\n                \"A really big fan,\" you say. \n                *page_break\n                [i]\"Tell him I'll send an email photo. You and Lincoln get back over here so we can finish up and leave.\"[/i]\n                \n                The sheriff flexes his arm and Brenda the hulu girl sways spastically.\n                \n                \"He has a tattoo. Of you,\" you say. \n                \n                [i]\"Forearm or calf?\"[/i]\n                \n                \"What?\"\n                \n                [i]\"Is the tattoo on his arm or his leg?\"[/i]\n                \n                \"How many of your fans have ... um, his arm,\" you say. \n\n                [i]\"Eww, him. No thanks.\"[/i]\n                \n                *page_break\n                \"I have dreams of Brenda assessing my wares,\" says the sheriff. \n                \n                \"Brenda, you owe me,\" you say.\n                \n                *fake_choice\n                    # \"Who did the video of your niece's recital? I'm just getting hearing back in my left ear.\" \n                        *set gStatAmbition + 1\n                    # \"Who always saves you a seat at our staff meetings so you don't have to sit next to stinky Pete?\"\n                        *set gStatEmpathy + 1\n                    # \"Who showed you how to cheat Ivan, the oligarch reincarnated as our vending machine?\" \n                    \n                [i]\"If we do this we're clean. Across the board. Agreed?\"[/i]\n                \n                \"Absolutely,\" you say. \"Even steven.\"\n                \n                Brenda walks into the old west booth. \n                \n                \"How long were you waiting out there?\" you ask.\n\n                Brenda takes in the ball and chain, arches an eyebrow your way and approaches the sheriff. He sits stupefied with reverence. \n                \n                \"Key,\" says Brenda. \n                \n                \"To my heart?\" asks the sheriff, believing all his dreams are coming true. \n                \n                Brenda slowly exhales and you think you hear her rumble a low growl. Her eyes lock on the sheriff like a loan shark staring down a late paying mark. You almost feel sympathy for the big lug because you know what that look is like, although the growl is new. \n                \n                \"Oh, right,\" says the sheriff. He reaches into the top of his long john's, fishes around a bit and then pulls out a key attached to a cord around his neck. He dawdles between trying to pull the cord over his head or removing his stetson first.\n                *page_break\n                Brenda grabs the key and gives it a yank, snapping the string. She conducts a quick inspection. \n                \n                \"Hmmm, mid-nineteenth century, poor condition, rusty with a distasteful sheen of sweat,\" says Brenda. \"I value this as ... worthless.\" \n                \n                She tosses you the key, turns on her heel and departs.\n                *set lRescuedByBrenda 1\n                \n                You quickly open the manacles. \n                \n                \"Wow,\" says the sheriff. \"She's like a tornado. A dreamy, dreamy tornado.\"\n                \n                \"One star review coming your way,\" says Lincoln to the sheriff. The faux-lawman doesn't hear the jib, intoxicated with love fumes. Lincoln gives a dismissive shake of the head as he picks up the camera and tripod. \n                \n                You and your cameraman depart the old west booth.  \n                *goto BallAndChainOffLabel\n            *if (lTriedReasoningSheriff = 0) # \"You know, we're pursuing some shady characters,\" you say. \"As a lawman you need to let us go so we can expose these criminals.\"\n                *goto StartReasonWithSheriffLabel\n        \n        \n    # \"We're pursuing some shady characters,\" you say. \"As a lawman you need to let us go so we can expose these criminals.\"\n        *label StartReasonWithSheriffLabel\n        *set lTriedReasoningSheriff 1\n        \"Now this will come as a shock, but I'm not really a peace officer,\" says the sheriff.  \n        \n        \"Well, then as a concerned citizen,\" you say. \n        \n        \"I'm not that concerned,\" says the sheriff. \"Although I am concerned you might be telling me tall tales.\"\n        \n        \"Uh huh,\" you reply.\n        \n        *if(lTriedPayingSheriff = 1) and (lTriedBrendaWithSheriff = 1)\n            *set lTriedPayingSheriff 0\n            *set lTriedBrendaWithSheriff 0\n        *choice\n            *if(lTriedPayingSheriff = 0) # \"How much did you say this ball and chain is again?\" you ask.\n                *goto StartBuyFreedomFromSherriffLabel\n        \n            *if (lTriedBrendaWithSheriff = 0) # \"We broadcast the antique show, maybe we can work out a deal?\" you ask the sheriff.\n                *goto StartBrendaBribeToSheriffLabel\n\n        *goto BallAndChainOffLabel\n        \n*comment === Post Sheriff ==================================================================================================================        \n*label  BallAndChainOffLabel \n*page_break\n*if(lRescuedByBrenda = 1)\n    *achieve brenda_rescue_01\n    \"Where'd Brenda go?\" asks Lincoln.\n    \n    \"Probably back to the appraising table,\" you say. \"If she wasn't abducted by her adoring fan boys.\" \n    \n    \"Her fans look a little older than boys.\"\n    \n    \"Fan-pa?\"\n    \n    \"Maybe gran-fan?\"\n    \n    \"Okay, enough of that.\" \n    \n    *goto WhereToGoPostSheriffLabel\n*else\n    *achieve sheriff_payoff_01\n    *goto WhereToGoPostSheriffLabel\n\n*label WhereToGoPostSheriffLabel\n*choice\n    # \"Let's look around, see if we can find the Bates siblings,\" you say.\n        *set lSearchingAroundPostSheriff 1\n        A quick prowl up one aisle and down the next produces no Bates or witch sightings, although you did see a nice deal for some vintage martini glasses.\n        \n        \"Yo boss, this camera ain't getting any lighter,\" says Lincoln. \n        \n        \"Yeah, we're getting nowhere,\" you reply. \"Back to the ... zombie? Mummy?\"\n\n        *goto PostSheriffAtTheMummyLabel\n    # \"Let's head back to the ... shriveled mummy thing. I'm guessing this weirdness will find its way back there soon enough, if it hasn't already.\" you say. \n        *goto PostSheriffAtTheMummyLabel\n\n*label PostSheriffAtTheMummyLabel \nYou and Lincoln thread through the show goers without incident and arrive back at the mummy's location. Instead of a shriveled body, you find a hastily constructed wall of drapes, rugs and plastic tarp. \n\n*if(lSearchingAroundPostSheriff = 0) \n    Before you can investigate what's behind the curtain, Brenda walks up to you, packed for the road. \n    *page_break\n    \"What's up?\" you ask. \n    \n    \"Bernie called and said it's a rap. Our guests have wandered off and who knows how long it will take to corral them again. He doesn't want to pay the overtime.\" \n    \n    \"Far out,\" says Lincoln. \"Let's go to a bar and have a rap party.\" \n    \n    \"Oh, not you two,\" Brenda responds. \"The show's short so you get to schlep around and get a bunch of B-roll. And with the proper bribes, I might even do the VO for it. Bye.\" \n    \n    Brenda flashes you her bright, on-camera smile and walks away. Roger the sound guy follows in close formation behind her, rotating the boom mic in a mock salute as he passes. \n    \n    \"So I get overtime?\" asks Lincoln after the departing show host.\n    \n    \"Bernie said he won't demote you back to gopher,\" Brenda replies over her shoulder. \"If you bring back something interesting. Good luck.\" She turns the corner and disappears from the bustling antiques show. \n\n    *goto PostBrendaLeavesLabel\n*else\n    Before you can investigate what's behind the curtain, Roger the sound guy walks up to you, packed for the road. \n    *page_break\n    \"What's up? Where's Brenda?\" you ask. \n    \n    \"She split. Bernie called and said it's a rap. That old dude's heart attack screwed up the schedule. He doesn't want to pay the overtime.\"\n    \n    \"Far out,\" says Lincoln. \"Let's go have a rap party. Rog will get the first round.\"\n    \n    \"Oh, no happy hour for you two,\" says Roger. \"The show's short so Bernie said you need to schlep around and get a bunch of B-roll. Gotta go. Say hi to the antiquers for me.\" \n    \n    Roger rotates his boom mic in a mock salute and walks away. \n    \n    \"So I get overtime?\" Lincoln asks after the departing sound guy. \n    \n    \"You're a funny guy, Lincoln,\" Roger replies without turning. He goes around the corner and disappears from the antiques show. \n    \n    *goto PostBrendaLeavesLabel\n\n*label PostBrendaLeavesLabel\n*page_break\n\"Well this sucks,\" says Lincoln. \n\n\"No, this is perfect,\" you reply. \"Now we can uncover the real story. Follow me.\" \n\nYou move to the barrier and widen a gap between the tarp and carpet. Slipping inside, you see an odd ceremony underway. Father McCloskey remains all in black, but has donned a purple stole and large, pointy bishop's mitre. Several decorative crucifixes surround the mummy's body. The priest drapes an ancient shroud over the creature's face. \n\n\"I've seen this on ghost hunting shows,\" whispers Lincoln. \"He's doing an exorcism.\"\n\n\"Not an exorcism, but a ritual of cleansing,\" says the priest, rising from his knees, his back to you. \"Have you recovered the scroll?\" \n\n\"Um, still working on it,\" you reply. \n\n\"I see. Well, I anticipated as much,\" says Father McCloskey, turning to face you. \"No matter, the ritual will serve the same purpose. And you may yet prove to be more than completely useless. I require your assistance.\" \n\n\"Well, since you asked so nice,\" you reply. \n*page_break\nThe priest tosses a thin gold chain across the mummy's body. \"Secure the sacred restraint,\" the priest says. \"Make sure the abomination cannot fight free.\"\n\nYou approach the preserved corpse, still as bony, dusty and inanimate as the last time you saw it. You pick up the thin links tossed over the body by Father McCloskey. You think cooperating is the best path to get the priest talking. \n\n\"You sure this necklace is up to the job?\" you ask. \"I mean, supposing a mummified body could come back to life.\"\n\n\"This is the consecrated binding of Saint Davos of La Cebolla. It is pervaded with holy power,\" says the priest.\n\n\"Well then, say no more,\" you say, shrug, and loop the slim chain around a table leg. The slight gold line pulls tight across the mummy's chest and arms. Meanwhile, Lincoln has the camera powered up and starts filming.\n\n\"Record if you must, but I'll sign no release,\" says Father McCloskey. \"Be warned the church employs as many lawyers as clergy.\"          \n\n*choice\n    # You motion for Lincoln to stop filming.\n        *set gFilmedTheRitual 0\n        *set gStatAmbition - 3\n        *set gStatEmpathy + 2\n        \n        *goto PostRitualFilmingLabel\n    # You motion for Lincoln to keep filming.\n        *set gFilmedTheRitual 1\n        *set gStatAmbition + 5\n        *set gStatEmpathy - 3\n        *set gFilmScore + 5\n        \n        *goto PostRitualFilmingLabel\n\n*label  PostRitualFilmingLabel\nThe priest sprinkles holy water onto the mummy. \n\n\"So what's going on?\" you ask. \"This isn't some simple prank.\" You give the body a nudge with your foot but that fails to goad the mummy to life. \"We'll find out one way or another.\"\n\n*if(gFilmedTheRitual = 1)\n    The priest gives the camera some cold side-eye. \"Have faith in what you witness,\" he says.\n\n    \"Really? So you're confirming this shriveled corpse can come back to life,\" you reply.\n    \n    The priest performs the sign of the cross over the mummy. \"I'll not be a participant in your documentary,\" he says.\n\n    Loud crashes and screaming emanate from somewhere on the show floor, followed by a triumphant yell from what sounds like Lester Bates.\n\n    \"I think those twins got their bark thing back,\" says Lincoln. \n    \n    \"Siblings, not twins,\" says Father McCloskey, \"The power captured within the scroll is vengeful. All who command it come to ill fortune. If indeed the demonic parchment is whole and unsigned, we have little time.\" \n    *page_break\n    He opens a small case and pulls out a slightly shriveled but otherwise well preserved human tongue.\n\n    \"Whoa! What the hell is that?\" you ask.\n    \n    The priest ignores you and instead begins his ritual.\n\n    *goto RitualFilmingOneLabel\n*else\n    \"The pagans have harnessed a demonic power and imprisoned a soul.\" says the priest. \"This man, a Professor Thadeus Frost, when he was still human, slighted the leader of their coven. I believe a love potion was involved\"\n    \n    \"Looks like there were some side effects,\" you say, looking down at the dessicated face of the mummy.\n    \n    The priest performs the sign of the cross over the mummy. \"You see the witch's revenge. The potion took years for her to overcome,\" he says.\n    \n    \"Oh. Did this happen in the seventies? Sounds like a Stevie Nicks song.\"\n    \n    \"Eightteen ninety three.\"\n    \n    \"Oh you had me going there for a min-\"\n    \n    Loud crashes and screaming emanate from somewhere on the show floor, followed by a triumphant yell from what sounds like Lester Bates.\n\n    \"I think those twins got their bark thing back,\" says Lincoln. \n    *page_break\n    \"Siblings, not twins,\" says the priest. \"The scroll is vengeful. All who command it come to ill fortune.\" \n    \n    \"Well it got some of its own ill fortune,\" you say. \"That baby got ripped in half. Now, getting back to this resurrect-\"\n    \n    Father McCloskey interrupts with a snorting, derisive laugh. \"Others have done violence to the parchment, only to see it become whole again. Rumors exist that reciting a passage written upon the scroll will undo it. Or that hellfire can consume it.\"\n    *set gEnableSpellRemovalEnding + 1\n\n    \"So which are you doing here? Passage reciting or hellfire?\"\n    \n    \"Neither! The holy power of heaven is a raging volcano to this teardrop of evil. My sacred ritual will extinguish it.\"\n    \n    As you digest that imagery Father McCloskey opens a small case and pulls out a slightly shriveled but otherwise well preserved human tongue.\n    \n    \"Whoa! What the hell is that?\" you ask.\n    *page_break\n    The priest ignores you and instead begins his sacrament.\n\n    *goto RitualFilmingOneLabel\n\n*label RitualFilmingOneLabel\n\"By the ancient writings of the Rituale Romanum and the holy touch of the Tongue of the Redeemer, I grant thee eternal rest,\" the priest says to the ceiling. The holy man drops his gaze and pulls off the shroud covering the mummy's face. Kneeling beside the body, he dips the tongue into a bowl of holy water and then runs it up the side of the creature's face.\n\n\"Lord that is disgusting,\" says the mummy. \n\n\"Holy crap, it's alive!\" you say. \"You brought it to life! That is a magic tongue.\"\n\n\"Sir, refrain from any future tongue lappings upon my person,\" says the mummy with his rich, Kentucky lilt. The creature still lies on the floor but undeniably moves, the dessicated head turned to focus on Father McCloskey.\n*page_break\n\"Hmm, um, okay, not supposed to do that,\" responds a perplexed Father McCloskey, remaining on his knees beside the mummy. \"Um, okay. Demon! I demand your name!\"\n\n\"Thadeus,\" says the mummy, flexing first one bony hand and then the other, its claw-like fingernails reflecting the light. \"But you can call me Professor Frost.\"\n\nThe loud woosh of the tarp curtain getting ripped open pauses the ceremony, revealing the security guard reading from a thick pamphlet. \"This booth is in violation of antique show guideline four baker seven, no space shall be enclosed to the aisle ... what's going on?\" says the guard, finally looking up.   \n\n\"Speak demon,\" says the priest. \"Give thy name and not that of this withered husk.\"\n\n\"Withered? How many of your tongues will disparage me, sir? I am distinguishly wrinkled, at worst,\" says Frost. \n\n\"Fight Thadeus,\" says the priest, starting another redeeming swipe with the tongue. \"Resist the demon. Speak his name and be free!\" \n\n\"I am free!\" says Frost.\n\nThe mummy's arm moves with blinding speed, easily breaking the chain of Saint Davos and grabbing the priest's throat. The creature squeezes with inhuman strength, producing a series of wet, crunchy pops. The priest garbles through his ruined windpipe. Frost flicks his wrist and the holy man's neck snaps. The job done, the creature flings the dying body against the back wall, all the while remaining prone on the ground. \n\n\"Tongue of the Redeemer? What a pile of supernatural clap trap,\" says the mummy. \n*finish\n", "act2_2_batesandfrost": "*comment\n*comment    Act2_2_BatesAndFrost.txt\n*comment\n\n*comment === Temp Variables ===\n*temp lLincolnWoozy 0\n*temp lStaringAtFrost 0\n*temp lNeckBraceQuestion1 0\n*temp lNeckBraceQuestion2 0\n*temp lNeckBraceQuestionsAsked 0\n*temp lNeckBraceReturnLabelVar 0\n*temp lPassiveSibling 0\n*temp lPassiveHeOrShe 0\n*temp lAggressiveSibling 0\n*temp lAggressiveHeOrShe 0\n*temp lAggressiveHisOrHer 0\n*temp lDraggedResponse \"say\"\n*temp lFellDownDuringKeepFilming 0\n*temp lTangledInDeadBates 0\n*temp lBrotherOrSister \"brothers\"\n\n[b]Chapter Four[/b]\n\n\"I'm getting the cops!\" says the security guard, bolting through the curtains. \n\nAn excellent idea, departing in great haste if not blind, panicked flight. Your first step out of the blocks goes well but then a bear trap snaps on your back leg, stopping you cold. \n\n\"Wisely and slow. They stumble that run fast,\" says Frost, still lying on the ground. The creature's hand encircles your ankle, its strength incredible. Your foot might as well be encased in hardened cement.\n\n\"Let ${gHim} go!\" says Lincoln, rushing to your aid. \n\n\"Stay back!\" you yell. Too late. Frost's free hand snake-strikes outward and snags Lincoln's leg. Your cameraman fights for balance, rights himself, tries to pull free but fails to even nudge the creature's grip. You and Lincoln are anchored to the mummy.\n\nWith escape impossible, you exhale slowly, trying to calm yourself. The lull allows you to look down at the monstrosity holding your leg. Your captor is no man in a mask but a reason-defying reanimated corpse. You can't help but to involuntarily jerk at the restraint, but with no more success than previously.\n\n\"Let us all just take a moment to recover our serenity,\" says Frost.\n*page_break\nLincoln's serenity has left the building. He kicks the creature's hand with gusto but the impact does nothing to loosen its grip. The mummy gives a quick squeeze with both hands. You yelp a duet with Lincoln, as it feels like your ankle will shatter. The pressure lessens but the locked grip stays in place. The creature can easily cripple you both.\n\n\"Let us try again,\" says the mummy, looking at you. \"Delighted to make your acquaintance and if you do me a small favor, no harm will befall either of you.\"\n\n\"What kind of favor?\" you ask before panic overcomes your cameraman again. \n\n\"May I presume a stationary repose if I release my hold?\" asks Frost. \n\n\"What?\" asks Lincoln.\n\n\"He wants us to stay put,\" you say. Lincoln looks at you with a 'like-hell' expression. \"How do we know you won't hurt us after doing this favor?\" you ask the creature. \n\n\"I am hardly an unhinged killer. In appreciation for a job well done, you will be freed to go live your life. Agreed?\"\n*page_break\nYou look to Lincoln. \"I don't think we have a choice,\" you say. Lincoln doesn't look happy but nods assent. \n\n\"A decision well reasoned,\" says the mummy, releasing your legs. \n\nAh, relief, but there will be some discoloration and swelling, no low-rise socks for awhile. If you live that long.\n*set gBruisedAnkle 1\n\nRising to his feet, the mummy's head droops to an unnatural angle onto his chest. The impact from the earlier wrestling match has broken his neck. Frost sighs and then jerks his body, sending his head properly upright. \n\n\"Oops, too much,\" says the creature, as his head slowly tilts then falls backward. The mummy's skull stops perpendicular to his back, pointing skyward but still attached to his body. \n\n\"I require a neck abutment,\" says Frost, using a hand to pull his skeletal noggin into a more natural position. \"So get right on that.\" \n\nYou and Lincoln look to each other then back at Frost, who waits patiently. \n*page_break\n\"Or else you'll kill us?\" asks Lincoln. \n\n\"Um, well, yes, now that you mention it. If you act up, I'll kill ${gHim} and if you act up, I'll kill him,\" says Frost, using his free hand to point between yourself and Lincoln. \"And I'll lay ruin this, um, box device.\" Frost eyes the camera closely. \"I declare, are you with the news reels?\" he asks.\n\n\"Real what?\" asks Lincoln.\n\n*choice\n    # \"Yes. Yes we are. With the news reels,\" you say. \"We interview all the big names.\"\n        *set gStatAmbition + 2\n        \"In my prime the name Professor Thadeus Frost diminished all other sobriquets. And so shall it once again,\" says the mummy. \n        *goto PostNewsReelLabel\n    # \"That's right, we are in the news business,\" you say. \"And we in the business would say you have more of a radio face.\"\n        \"The name of Professor Thadeus Frost has won over the harshest audiences. And will once again,\" says Frost. \n        *goto PostNewsReelLabel\n    # \"Why not let us go,\" you say. \"We're obviously in your way here.\" \n        *set gStatEmpathy + 1\n        \"Nonsense, you are now of even greater use,\" says Frost.  \n        *goto PostNewsReelLabel\n*label PostNewsReelLabel\n\"Decide who shall operate the news box and who shall fashion my cranial brace.\" The creature gives you a sharp finger poke as encouragement.\n\n\"Ow,\" you say. \"Give us a second.\" You and Lincoln turn from the mummy and huddle.\n\n\"We can outrun that thing,\" Lincoln whispers. \n\n\"I'm not so sure. Filming the murder machine isn't the worst idea. Buy us some time.\"\n\n\"What's the delay?\" Frost asks. \"Do you require a more physical enticement?\"\n\n\"No, no, we're good. Just debating your best side,\" you respond as Lincoln moves to the camera.\n\n\"A moot argument, my sides are equally excellent,\" Frost says.\n\n\"Um, yeah, that was our conclusion too,\" you say.   \n\n\"As if it could be anything but,\" says Frost. \"Now construct my neck abutment. I do not possess infinite patience.\" \n\nYou look around at the piles of junk/antiques. A neck brace is not among the wares. \n*page_break\n\"Amidst the mists and fiercest frosts, with barest wrists and stoutest boasts,\" says Frost, doing knee bends while pumping his diaphragm with one hand. His other hand holds his head in place. He notices you and Lincoln staring at him. \"I must warm my voice prior to addressing an audience. Your ignorance of stagecraft does not inspire my confidence. Now, back to your labors.\"\n\nLincoln pans the camera to keep Frost well framed while you conduct an inventory of the random pile of antique junk strewn about.\n\n\"Okay, I think I have something that might work,\" you say.\n\n*choice\n    # You grab a large metal C clamp and two short sections of wood.\n        *set gNeckBrace \"C Clamp\"\n        *goto PostNeckBraceChoiceLabel\n    # You grab a wooden yard stick and powerful staple gun.\n        *set gNeckBrace \"Yard Stick\"\n        *goto PostNeckBraceChoiceLabel\n    # You grab a bag of old golf clubs and a coil of thick copper wire.\n        *set gNeckBrace \"Golf Club\"\n        *goto PostNeckBraceChoiceLabel\n\n*label PostNeckBraceChoiceLabel\nFrost lowers himself into a chair with his back to you, as if awaiting a hair cut, his hand holding his jaw, keeping his head in place. Lincoln follows the action through the lens, the camera's red recording indicator lit. You contemplate fleeing or attacking, but with the speed and strength the mummy has shown, you conclude neither option will succeed. So neck bracing it is. \n\n*if (gNeckBrace = \"C Clamp\")\n    You place the thin wooden blocks onto an adjacent table and unwind the C clamp to match the thickness of the creature's neck. \n    \n    \"Um, you may feel a small pinch,\" you say.  \n\n    \"I don't feel pain,\" says Frost. \"Or much of anything, really. Except rage. Rage becomes my unreasonable governor, at times.\"\n\n    \"That's, um, good to know,\" you say, hesitating to place the C clamp around the creature's throat. \"Any ideas what causes the rage? Like feelings of getting choked, strangulation, hatred of heavy neck accessorizing?\" \n    \n    \"Not getting what I want,\" says Frost. \"So make haste, before one of those would-be tyrants return with the scroll.\"\n    \n    \"Um, okay,\" you respond, sliding the ends of the clamp into position. \"What happens if it does come back? The scroll?\"\n    *page_break\n    \"Worry not of that. May I remove my hand?\"\n    \n    \"Not quite yet.\" \n    \n    You slip the first piece of wood vertically between Frost's throat and the clamp pad. You do likewise with the second at the back. \n    \n    \"Hold the front piece of wood in place while I tighten the clamp,\" you tell Frost. The mummy does as you ask.\n\n    *set lNeckBraceReturnLabelVar \"PostStepOneNeckBraceLabel\"\n    *goto NeckBraceQuestionSequenceLabel\n*elseif (gNeckBrace = \"Yard Stick\")\n    You snap a roughly twenty-five centimeter section from the wooden yard stick. Noticing some super-glue on the table, you grab the tube and liberally apply the miracle goo to one side of the ruler. \n    \n    \"Okay, we'll let that cure for a second,\" you say. \n    \n    *set lNeckBraceReturnLabelVar \"PostStepOneNeckBraceLabel\"\n    *goto NeckBraceQuestionSequenceLabel\n*else\n    You ponder the different clubs in the bag. \n    \n    \"Save the big one for hitting him,\" Lincoln whispers. \n    \n    \"Get on with it,\" says the mummy. \n    *page_break\n    \"Right-o,\" you say, pulling the driver from the bag. You place the club head at the base of the creature's skull. The metal shaft extends along the spine. \"Okay, Thad. Can I call you Thad?\"\n\n    The creature emits a threatening growl.\n    \n    \"Professor Frost it is,\" you say. \"Hold that in place while I unwind some of this wire.\" \n    \n    The mummy does as you ask.\n    *set lNeckBraceReturnLabelVar \"PostStepOneNeckBraceLabel\"\n    *goto NeckBraceQuestionSequenceLabel\n\n*label PostStepOneNeckBraceLabel\n*page_break   \n*if (gNeckBrace = \"C Clamp\")\n    You center the clamp pads on the front and rear blocks of wood.\n\n    *set lNeckBraceReturnLabelVar \"PostStepTwoNeckBraceLabel\"\n    *goto NeckBraceQuestionSequenceLabel\n*elseif (gNeckBrace = \"Yard Stick\")\n    \"Okay, this may feel a little funky,\" you say. You push the glue-side of the stick across the damaged vertebrae of the mummy's neck.\n\n    \"I don't feel flunky, whatever that is,\" says Frost. \"Or feel much of anything, really. Except rage. Rage becomes my unreasonable governor, at times.\"\n    \n    \"Is that a fact?\" you respond, picking up the large staple gun. \"How's the rage right now? Pretty much on top of it?\"\n    \n    \"Increasing with your every delayed second,\" says the creature. \"Finish before those would-be tyrants return with the scroll.\" \n    \n    \"Glue's almost dry, just hold that piece of wood in place,\" you say. The mummy does as you ask, pressing his free hand against the yardstick glued to the back of his neck. \"What happens if the scroll does come back?\"\n    \n    \"Worry not of that. May I remove my hands?\"\n    *page_break\n    \"Um, not quite yet.\" \n    \n    *set lNeckBraceReturnLabelVar \"PostStepTwoNeckBraceLabel\"\n    *goto NeckBraceQuestionSequenceLabel\n*else\n    You deploy an experimental loop of wire around the mummy's neck.  \n    \n    \"For this to work I'll need to tug the wire pretty snug,\" you say. \"Let me know if it feels too tight.\"\n    \n    \"It will not feel too tight,\" says Frost. \"I don't feel much of anything. Except rage. Rage becomes my unreasonable governor, at times.\"\n    \n    \"Okay, good safety point,\" you say. \"We'll go nice and easy then.\" \n    \n    You tighten the wire a bit, waiting for a response from the mummy. Frost continues to sit unnaturally still. You pull harder, achieving a proper garroting tension. \n    *page_break\n    \"How's that?\" you ask. \n    \n    \"Get on with it,\" Frost replies, despite the wire cutting deeply into his neck. No blood seeps from the wound. \"Finish before those would-be tyrants return with the scroll.\"\n\n    \"Um, so far so good,\" you say. \"I just need to coil the rest of this wire around your neck.\" You twirl more loops around the creature. \"What happens if the scroll does come back?\"\n\n    \"Worry not of that. May I remove my hands?\"\n\n    \"Um, not quite yet.\" \n    \n    *set lNeckBraceReturnLabelVar \"PostStepTwoNeckBraceLabel\"\n    *goto NeckBraceQuestionSequenceLabel\n\n*label PostStepTwoNeckBraceLabel\n*page_break\n*if (gNeckBrace = \"C Clamp\")\n    You tighten the clamp on the wooden brackets. Several sharp pops emerge from within the creature's neck. You continue compressing the blocks, not feeling any resistance. A normal person would be choking to death by now. \n    \n    \"Any discomfort?\" you ask. \n    \n    \"You best succeed, for your sake,\" says the mummy in an unchanged voice, despite the clamp crushing his larynx.  \n    \n    Finally the handle resists tightening. The wooden blocks are only centimeters apart, embedded deep in the mummy's neck, compressed against the creature's remaining vertebrae. This should hold his head upright, in theory.  \n    \n    You back away from the creature, ready to flee in case your D.I.Y. orthopedics fails. The mummy drops his support hand. His skeletal noggin stays firm, not drooping an iota. \n    \n    \"I say, not bad,\" says Frost, turning left and right from the waist and then giving a little shoulder shimmy. Your repair stands firm. \"The present eye praises the present object. How does it look? Is it noticeable?\"\n    *page_break\n    \"I can barely see it,\" you respond, lying blatantly while staring at the large clamp crushed into the creature's throat. \"Now, to get back to our interview.\" \n\n    *goto NeckBraceQuestionSequenceLabel    \n*elseif (gNeckBrace = \"Yard Stick\")\n    The glued yard stick looks solid for the moment but could use some additional bonding.\n    \n    \"Okay, this may pinch a little,\" you say, placing the staple gun against the glued wood. \n    \n    Lincoln looks up from the camera eyepiece. He's shaking his head negatively.\n\n    You squeeze the staple gun trigger. The fastener pierces through the wood and embeds into the creature's neck. Frost doesn't flinch. \n    \n    \"Huh,\" you say. \"Well let's finish this up.\" You rapid fire a half-dozen more staples to stabilize the brace. \n    \n    \"Enough,\" says Frost. You back away from the mummy, ready to flee in case your D.I.Y. orthopedics fail. \n    \n    \"I say, not bad,\" says the mummy, turning left and right from the waist and then giving a little shoulder shimmy. Your repair stands firm. \"The present eye praises the present object. How does it look? Is it noticeable?\"\n    *page_break\n    \"Only from the back, and even then it's quite fashionable,\" you say, lying blatantly. \"Now, getting back to our interview.\"\n    *goto NeckBraceQuestionSequenceLabel \n*else\n    You pull tight the last wire loop and tie it off. Frost now has a nice turtleneck of strangulating copper. \n\n    \"Okay, just let me get out of your way before you let go of your head,\" you say, sidestepping toward the exit. \n    \n    The mummy releases his hand. The D.I.Y. neck brace holds.  \n    \n    \"I say, not bad,\" says the mummy, turning left and right from the waist and then giving a little shoulder shimmy. Your repair stands firm. \"The present eye praises the present object. How does it look? Is it noticeable?\"\n\n    \"Blends right in,\" you respond, lying blatantly while staring at the bright copper wire wound tight around the creatures throat. \"Now, to get back to our interview.\" \n    *goto NeckBraceQuestionSequenceLabel \n  \n*comment === Neck Brace Questions ==========================================================================================\n*label NeckBraceQuestionSequenceLabel\n*set lNeckBraceQuestionsAsked +1\n*choice\n    *if(lNeckBraceQuestion1 != 1 ) and ((lNeckBraceQuestion2 != 1) and (lNeckBraceQuestion1 != 2))\n        # \"Since you passed through the veil and all, is there an afterlife?\" you ask.\n            *if(lNeckBraceQuestionsAsked = 3)\n                *goto PostNeckBraceQuestionSequenceLabel\n                \n            *if(lNeckBraceQuestionsAsked = 1)\n                *set lNeckBraceQuestion1 1\n            *if(lNeckBraceQuestionsAsked = 2)\n                *set lNeckBraceQuestion2 1\n            \n            \"Well, of course,\" Frost replies. You wait for more but the mummy remains silent.\n            \n            \"Could you describe it?\" you ask.\n            \n            \"Describe what?\"\n            \n            \"The afterlife.\"\n            \n            \"Oh, what's to describe? I stand before you, living after death. Ta da.\"\n            \n            \"No, not that. More heaven and hell, heading toward the light, something like that.\"\n            \n            \"Oh, that. You'd have to convert first.\" \n            \n            \"Convert? To what?\"\n            \n            \"Frostism. My religion. Breaks over, back to work.\"\n                \n            \"Um, yeah, right,\" you say.\n\n            *gotoref lNeckBraceReturnLabelVar\n    *if(lNeckBraceQuestion1 != 2) and ((lNeckBraceQuestion2 != 2) and (lNeckBraceQuestion1 != 1 ))\n        # \"Why did you kill Father McCloskey?\" you ask. \n            *if(lNeckBraceQuestionsAsked = 3)\n                *goto PostNeckBraceQuestionSequenceLabel\n\n            *if(lNeckBraceQuestionsAsked = 1)\n                *set lNeckBraceQuestion1 2\n            *if(lNeckBraceQuestionsAsked = 2)\n                *set lNeckBraceQuestion2 2\n            \"You saw that tongue,\" Frost replies. \"That thing is disgusting. He deserved some killing.\" \n            \n            \"Seems a little harsh,\" you say. \n            \n            \"Plus the Catholics. They have a strong disapproval of my religion. Always popping up exorcising and spraying holy water.\" \n\n            \"You're religious? What religion?\"\n\n            \"Frostism, of course,\" says the creature. \"Resurrection really swells the flock. Are you finished?\"\n\n            \"Um, almost,\" you say, reluctantly continuing with the brace construction.\n            *gotoref lNeckBraceReturnLabelVar\n    *if(lNeckBraceQuestion1 != 3 ) and (lNeckBraceQuestion2 != 3)\n        # \"If you really died, how did you come back?\" you ask.\n            *if(lNeckBraceQuestionsAsked = 3)\n                *goto PostNeckBraceQuestionSequenceLabel\n\n            *if(lNeckBraceQuestionsAsked = 1)\n                *set lNeckBraceQuestion1 3\n            *if(lNeckBraceQuestionsAsked = 2)\n                *set lNeckBraceQuestion2 3\n            \n            \"Double, double toil and trouble,\" says Frost. \n            \n            \"Witches? Those witches resurrected you?\"\n            \n            \"Well, not those witches. Their long dead and much more accomplished predecessor.\" \n\n            \"They can defeat death?\"\n\n            \"Well that one could, wouldn't you say.\" Frost flashes what he thinks is a winning smile to the camera but looks more like a death rictus.\n\n            \"Why are we just learning about this now?\" you ask. \n            \n            \"I guess they've become shy over the years, what with the stake burnings and what not,\" Frost replies. \"Back to work.\"\n            \n            \"Um, yeah, on it,\" you say. \n\n            *gotoref lNeckBraceReturnLabelVar\n    *if(lNeckBraceQuestionsAsked = 2 ) or ((lNeckBraceQuestionsAsked = 3) and (lNeckBraceQuestion2 != 4 ))\n        # \"Once the neck brace is done, Lincoln and I will need to go back to the studio and put together the news reel,\" you say. \n            *if(lNeckBraceQuestionsAsked = 3)\n                *goto PostNeckBraceQuestionSequenceLabel\n\n            *if(lNeckBraceQuestionsAsked = 1)\n                *set lNeckBraceQuestion1 4\n            *if(lNeckBraceQuestionsAsked = 2)\n                *set lNeckBraceQuestion2 4\n                \n            *set gStatEmpathy + 1\n            \"I think ... not,\" Frost replies.\n            \n            \"But then no one will see you. Think of your audience.\" \n            \n            \"Oh, I always do. I have much more to convey before we finish. As long as you maintain my amiable jocularity, all shall live. To that end, back to work.\"\n            \n            \"Yeah, sure,\" you say, resuming the neck brace construction.\n            \n            \"Nice try,\" whispers Lincoln.\n            \n            *gotoref lNeckBraceReturnLabelVar\n    *if((((lNeckBraceQuestion1 = 1) or (lNeckBraceQuestion1 = 2)) or ((lNeckBraceQuestion2 = 1) or (lNeckBraceQuestion2 = 2))) and (lNeckBraceQuestion2 != 6 ))\n        # \"So what exactly is Frostism?\" you ask. \n            *if(lNeckBraceQuestionsAsked = 3)\n                *goto PostNeckBraceQuestionSequenceLabel\n\n            *if(lNeckBraceQuestionsAsked = 1)\n                *set lNeckBraceQuestion1 6\n            *if(lNeckBraceQuestionsAsked = 2)\n                *set lNeckBraceQuestion2 6\n                \n            \"I told you, my religion. The masses yearn for a messiah. And who better than I?\"\n            \n            \"People actually sign up for that?\"\n            \n            \"By the wagon full. But then I am quite the miracle, you'd have to agree.\"\n            \n            \"Yeah, you're something, all right.\" \n            \n            \"Tsk. Luckily we have doctrine concerning heathens. But enough chatting of my scriptures, back to task.\"\n\n            *gotoref lNeckBraceReturnLabelVar\n\n*comment === Bates Siblings return ===========================================================================\n*label PostNeckBraceQuestionSequenceLabel\nLester and Emma Bates rush through the curtains, interrupting your interview. They hold an untorn scroll. It could be a duplicate or their restoration skills are at an art museum level.\n\n\"There you -\"\n\nFrost attacks, leaping five meters over a table. As he lands, Lester slaps a sticky note to the bottom of the scroll. \n\nThe mummy freezes, arm cocked to deliver a lethal strike.\n\n\"Hey, your neck brace held,\" says Lincoln, still operating the camera. Indeed, Frost's head is well supported. \n\n\"Hey, it worked just like you said,\" says Lester.\n\n\"He'd be dancing on our corpses if you'd taken any longer with that signature,\" says Emma. \"Told you I should have done it.\" \n\n\"Got the job done, though. Signed right in front of his nose. Didn't I, Professor?\"\n\nLester waves the scroll in front of the mummy's face. The siblings' signature is scrawled on the attached sticky note. Frost doesn't twitch, behaving exactly as one would expect from a preserved corpse. \n*page_break\n\"We should give it some orders,\" says Emma. \"Make sure the creature obeys us.\"\n\n\"Good idea. Hey, looks like someone had a disagreement with Father McCloskey,\" says Lester. \"I wonder who?\"\n\nYou and Lincoln point to Frost.\n\n*if (gStayPut_SiblingsPursuit = \"true\")\n    *set lPassiveSibling \"Emma\"\n    *set lPassiveHeOrShe \"She\"\n    *set lAggressiveSibling \"Lester\"\n    *set lAggressiveHeOrShe \"He\"\n    *set lAggressiveHisOrHer \"his\"\n    *goto PostAssignSiblingAttitudeLabel\n*else\n    *set lPassiveSibling \"Lester\"\n    *set lPassiveHeOrShe \"He\"\n    *set lAggressiveSibling \"Emma\"\n    *set lAggressiveHeOrShe \"She\"\n    *set lAggressiveHisOrHer \"her\"\n    *goto PostAssignSiblingAttitudeLabel\n\n*label PostAssignSiblingAttitudeLabel\n    \n\"Creature, attention,\" says ${lAggressiveSibling}. \n\nThe mummy straightens in a series of jerks and twitches, as if overcoming an internal resistance. He quickly stands tall, evidently ready for orders.\n\n\"Tell it to folow us out of here,\" says ${lPassiveSibling}. \n\n\"What about them?\" asks ${lAggressiveSibling}, nodding to you and Lincoln.\n\n\"Who cares, what can they do?\" responds ${lPassiveSibling}.\n*page_break\n\"They recorded us,\" says ${lAggressiveSibling}, pointing to the red light on the camera. \"Should we have the mummy kill them?\"\n\n*fake_choice\n    # \"Whoa, whoa. Don't do that. You'll disappoint thousands ... millions of T.V. auction fans,\" you say.\n        *set gStatAmbition + 1\n    # \"Hold on now, the professor here has developed a nice rapport with us. You'll really upset him if we get killed,\" you say.\n    # \"You should leave while you can, that security guard ran for help a while ago,\" you say. \n        *set gStatEmpathy + 1\n\n\"It will be noisy,\" says ${lPassiveSibling}, ignoring you. \"We'll have a lot harder time leaving unnoticed.\"\n\n\"Really noisy,\" you say, \"Lincoln screams like a little girl.\"\n\n\"What?\" says Lincoln. \n\n\"But a lot less fun,\" says ${lAggressiveSibling}. \"This is the perfect test drive. Besides, there's already one dead body.\"\n\n\"Exactly,\" says ${lPassiveSibling}, \"two more will draw a lot more attention.\"\n\n\"Nonsense, everyone will think it's a murder-suicide lover's triangle thing,\" says ${lAggressiveSibling}. \"Creature, kill those two and destroy that camera.\"\n*page_break\nThe mummy lurches toward you and Lincoln. His former fluidity of movement replaced by a herky-jerky stumble.\n\n*choice\n    # \"Split up!\" you tell Lincoln.\n        You sidestep to the right. Lincoln wrestles with the camera, trying to free it from the tripod. \n        \n        Frost staggers toward your crewman. \n        \n        \"Lincoln!\" you yell. He looks up from the stubborn camera mount. \"Run,\" you say, nodding your head to the approaching nightmare, now only meters away.\n        \n        Desperate to distract the creature, you pick up the nearest object at hand, a throw pillow. Apropos to the name, you fling the comfy projectile at the mummy. \n        \n        Frost deflects the cushion with a vicious backhand swing. You've won his attention. He veers toward you.\n\n        The throw pillow lands on the table in front of the Bates siblings. \"Ooh, I really like that pattern,\" says ${lAggressiveSibling}.\n        \n        You easily dodge a clumsy lunge from the creature. You fake left and go right. The mummy's grab misses badly. \"Man, I could do this all day,\" you think.\n        *page_break\n        Frost extends his leg, catching your shin. Your balance ruined, you fall onto the discarded rug that originally contained the mummy. You begin to crawl but a familiar pain arrests your progress. Frost holds you by the ankle. \n\n        You slide and bounce backward along the ground as the mummy drags you toward Lincoln, now carrying the freed camera. \n        \n        \"See, this isn't taking any time at all,\" says ${lAggressiveSibling}.\n        \n        *label GettingDraggedSibsAttackLabel\n        *choice\n            *hide_reuse # You grab a scaled casting of Michealangelo's statue of David.\n                The replica masterpiece fails as an anchor. Frost effortlessly drags both you and the stone figure forward. \n                \n                You release David's plaster leg.\n                \n                Frost continues dragging you toward the cornered Lincoln.\n                *goto GettingDraggedSibsAttackLabel\n            # You snag a loose bottle of Birley's Orange Soda.\n                You Hurl the bottle at Frost's head but the shot goes wide, exploding against a support pole. The vintage soft drink douses the mummy.\n\n                *goto PostThrownBirleysBottleLabel\n            *hide_reuse # \"Let us go! We'll let everyone know how you've been cheated,\" you ${lDraggedResponse} to the Bates siblings.\n                \"What do you think?\" ${lPassiveSibling} asks ${lAggressiveSibling}.\n                \n                \"Thanks but no thanks,\" ${lAggressiveSibling} yells to you. \n                \n                Frost continues dragging you toward the cornered Lincoln. \n                *goto GettingDraggedSibsAttackLabel\n            *hide_reuse # \"Help! Murder!\" you yell.\n                \"Creature, silence that racket,\" says ${lAggressiveSibling}.\n                \n                The mummy snaps his arm like cracking a whip. Your body lifts rapidly from the floor and then crashes back violently. That really hurts.\n                \n                You try another cry for rescue but only a weak wheeze emerges.\n                *set lDraggedResponse \"gasp\"\n\n                \"Did you say something?\" says a giggling ${lAggressiveSibling}.\n                \n                Frost continues dragging you toward the cornered Lincoln. \n                *goto GettingDraggedSibsAttackLabel\n                \n        *label PostThrownBirleysBottleLabel\n        \"Grofurgh blofert!\" cries the creature, releasing your ankle. Frost holds his arms wide, soda dripping into a puddle at his feet. \n        \n        Taking advantage of the distraction, you scramble to your feet. \n        \n        The mummy lifts the wooden crate containing the remaining twenty-two bottles of Birley's soda overhead, sneers, and then throws the soda at you with decapitating velocity.\n\n        You duck. The crate whizzes past centimeters above your head and crashes on the the throw pillow in front of the Bates, exploding into a mushroom cloud of goose down. \n        *page_break\n        \"Oh no,\" says ${lAggressiveSibling}, sneezing violently. \n        \n        \"Ew, cover your mouth,\" says ${lPassiveSibling}.\n        \n        Frost stands over you, mulling the different ways to kill you. \n        \n        ${lAggressiveSibling} sneezes with even more force. The blast of saliva, mucus and air dislodges the signed sticky note from the scroll.\n        \n        \"Free,\" says Frost. He vaults your crouched body and lands between the Bates siblings. Before ${lPassiveSibling} can reach the ejected signature note, the mummy gets a throat full of Bates in each hand . \n        \n        \"Gesundheit,\" says Frost, lifting the pair off the ground. \n        \n        The scroll drops from Lester's hand, landing near the front curtain. \n\n        *goto PostFrostAttackFromSibsLabel\n        \n    # \"Keep filming,\" you tell Lincoln, positioning yourself between the mummy and the camera.\n        *set gStatAmbition + 3\n        *set gStatEmpathy - 2\n        *set gFilmScore + 3\n        The creature staggers to a stop in front of you. You tense, ready to dodge the imminent attack. Nothing happens. \n        \n        \"I don't think this is a good idea,\" says Lincoln. \n        \n        \"Keep shooting,\" you say, throwing an experimental jab at the mummy's face. The punch lands. Frost makes a defensive swat several seconds late. \n        \n        \"Well now,\" you think. You dance in and out, clouting Frost about the face and torso with your fists. Every blow lands but doesn't disturb the mummy at all. \n\n        You glance back at the camera. \n        *fake_choice\n            # \"I'm standing here in front of the miraculous monstrosity,\" you say to the camera while trying to keep an eye on Frost.\n                *set gFilmScore - 1\n                \"What are you doing?\" asks Lincoln. \n                \n                The mummy throws a well-telegraphed death slash. You easily duck the attack. \n                \n                \"Reporting the story,\" you say. \"Miraculous monstrosity? What am I thinking? Give me a second here.\"\n                \n            # \"Are you getting both of us in the shot?\" you ask Lincoln. \"Should I try not jumping over to the side as much?\"\n                \"What are you doing?\" asks Lincoln.\n                \n                The mummy launches a slow double-grab for your neck. You easily sidestep the murder attempt.\n                \n                \"Directing. Duh.\" you say. \"Pay attention.\"\n            \n        \"Creature, I told you to destroy the camera,\" says ${lAggressiveSibling}.\n        \n        \"No, you told him to kill those two AND destroy the camera,\" says ${lPassiveSibling}. \"By saying kill them first in your list, that implies what the first action should be. So it's doing what you asked.\" \n        \n        \"That's not how that works,\" ${lAggressiveSibling} responds. \n        \n        You hop aside, avoiding another wild swing from the mummy.  \n        \n        ${lAggressiveSibling} rolls ${lAggressiveHisOrHer} eyes. \"Ugh, Fine. Creature, wreck that camera and then kill those two.\" ${lAggressiveHeOrShe} flashes ${lPassiveSibling} a smarmy grin. \n        *page_break\n        Frost stiffens and turns. You punch the back of the mummy's head, hurting your hand. Unaffected, Frost takes a clumsy step toward Lincoln and the camera.\n        \n        \"Keep rolling,\" you say to Lincoln, \"I got this.\" \n        \n        *label PreFrostAttackFromSibsBranchTwoLabel\n        *choice\n            *hide_reuse # You jump onto the mummy's back.\n                *if(gNeckBrace = \"C Clamp\")\n                    As you get a hand on the C Clamp neck brace, Frost grabs you by the shirt. He peels you off his back and dumps you to the floor.\n                    \n                    *goto SibOrderedFrostAttackNeckBraceLabel\n                *if(gNeckBrace = \"Yard Stick\")\n                    Before you can get your fingers under the yard stick neck brace, Frost grabs you by the shirt. He peels you off his back and dumps you on the floor. \n                    *goto SibOrderedFrostAttackNeckBraceLabel\n                *if(gNeckBrace = \"Golf Club\")\n                    As you get a handful of wire securing the golf-club neck brace, Frost grabs you by the shirt. He peels you off his back and dumps you on the floor. \n                    *goto SibOrderedFrostAttackNeckBraceLabel\n\n                *label SibOrderedFrostAttackNeckBraceLabel\n                *set lFellDownDuringKeepFilming 1\n                *goto PreFrostAttackFromSibsBranchTwoLabel\n            # You pick up a bottle of Birley's Orange soda.\n                *if (lFellDownDuringKeepFilming = 1)\n                    You scramble to your feet and use the bottle like a club, swinging hard and hitting the back of Frost's head. \n                    \n                    *goto BottleSwingLabel\n                *else\n                    Using the bottle like a club, you swing hard and hit the back of Frost's head.  \n                \n                    *goto BottleSwingLabel\n                \n                *label BottleSwingLabel\n                Doink.\n                \n                \"Grrrg agg berk,\" growls Frost, taking another step toward the camera. \n                \n                You try again. Doink. The mummy grabs your arm. \n                \n                Lincoln hits Frost like a linebacker. Well, more of a pee wee linebacker, since the cameraman only weighs around seventy kilos. The mummy stands tall while the cameraman collapses to the ground. The creature plants his foot on Lincoln's chest, pinning him atop a vintage area rug.\n                \n                \"Creature! I said destroy the camera FIRST!\" yells ${lAggressiveSibling}, then turns to ${lPassiveSibling}. \"It's supposed to obey us if we signed that bark thing in front of it.\"\n                \n                \"It is. Look.\" says ${lPassiveSibling}.\n                \n                Frost releases your arm and grabs the camera. \n                *page_break\n                Doink. Your latest bottle-braining has no more effect than the previous two. \n                \n                The mummy raises the camera and tripod overhead. He turns to you. A weird scowl stretches his lips, showing his weirdly perfect dentition. Looks like you're ground zero for the upcoming camera crash.\n                \n                You backhand Frost across the face with the soda bottle, wishing you had stuck with the tennis lessons awhile longer. The mummy barely winces but the agitation proves too much for the Birley's orange soda. The bottle cap explodes free in a fizzing, orange spray.\n                \n                The soft-drink froth douses Frost's face while the bottle cap ricochets off of a support pole. \n                \n                \"Berk grrrg agg,\" says the creature, dropping the camera. The rig lands upright on the tripod legs, tips precariously but doesn't topple.\n                \n                The bottle cap rebounds from the side of a solid oak armoire. \n                \n                The mummy wipes the sticky liquid from his face. \"AGG BERK GRRRG,\" yells Frost. \n                \n                The bottle-top flies into the power switch of a large floor fan, flicking it on. The wind-maker rumbles to life.\n                \n                Frost grabs your throat with one hand and effortlessly takes the empty soda bottle from you with the other. He smashes the bottle against his head, sending glass fragments flying. \n                \n                \"Huh, I must of cracked it for him,\" you think for some reason.\n                \n                The fan blows an intensifying breeze at the Bates siblings. \"That's refreshing,\" says ${lPassiveSibling}, \"it is stuffy in here.\"\n                *page_break\n                The mummy still holds the neck of the broken bottle, the other end a frightening array of jagged glass. Frost pulls back to stab you in the face.\n                \n                On the scroll, the signed sticky note flaps rapidly in the air flow, peels halfway off and then flutters free. \n                \n                Frost drops both you and the bottle. \"Released,\" he says, vaulting your body and landing between the Bates siblings. Before ${lPassiveSibling} can reach the floating signature note, the mummy gets a throat full of Bates in each hand.\n                \n                \"Ah, a pleasant zephyr. Shall I compare thee to a summer's day,\" says Frost, lifting the pair off the ground. \n                \n                The scroll drops from Lester's hand, landing near the front curtain.\n                \n                *goto PostFrostAttackFromSibsBranchTwoLabel\n            *hide_reuse # You kick at Frost's leg.\n                *if (lFellDownDuringKeepFilming = 0)\n                    You make violent shin-to-shin contact. \n                    *goto PostShinKickLabel\n                *else\n              \"Guessing you didn't make the varsity,\" says Lincoln. \n                *goto PreFrostAttackFromSiblingBranchThree\n            *hide_reuse # You pick up the Holy Tongue of the Redeemer.\n                \"Back off or face the wrathful lick of heaven,\" you tell the mummy. \n                \n                Frost backhands the holy relic from your grasp. \n                *goto PreFrostAttackFromSiblingBranchThree\n            # You pick up the pail of holy water.\n                You throw the water into the mummy's face. The baptism doesn't slow Frost down.\n                \n                \"He ain't the wicked witch,\" says Lincoln.\n                \n                A stray blob of water arcs across the room and splashes onto the signed sticky note at the bottom of the bark scroll, unseen by the Bates. \n                \n                Frost grabs your throat. Lincoln tries to pry the mummy's hand free but the creature quickly grabs the cameraman by the back of his neck with his other bony hand. You can barely breathe.\n                \n                \"I think the priest would go for the cameraman,\" says ${lAggressiveSibling}.\n                \n                The water soaks into the note, dispersing the ink in the signature.\n                \n                Frost drops you and Lincoln. You both collapse to the ground. The mummy strains in the direction of the Bates siblings then staggers back. He tries again. \n                \n                \"Now what's it doing?\" asks ${lPassiveSibling}.\n                \n                \"Creature! Kill those two NOW!\" yells ${lAggressiveSibling}.\n                *page_break\n                As you finally get some air in your lungs, the mummy starts strangling you again.\n                \n                The water and ink continue to mix on the note, dissolving the signature into borderline illegibility.\n                \n                The mummy abandons you once more. Frost takes a struggling step toward the Bates siblings. \n                \n                \"Creature. Stop!\" ${lAggressiveSibling} asks. \n                \n                The mummy rears up as if hitting an invisible wall. \n                \n                ${lPassiveSibling} checks the bottom of the scroll to make sure the note remains attached. \"Crap! Our signatures are disappearing,\" says ${lPassiveSibling}, holding the scroll out for ${lAggressiveSibling} to see.\n                \n                Frost moves forward, the restraining force seemingly lessened.\n                \n                \"Where'd you put that pen?\" asks ${lAggressiveSibling}. \"Creature! STOP!\"\n                \n                Frost hesitates mid-lurch but then continues forward.\n                \n                \"I gave it to you. Why'd you use a felt tip?\" says ${lPassiveSibling}.\n                *page_break\n                The saturated note unsticks from the scroll, fluttering into the air. \n                \n                The mummy makes an agile leap and lands between the Bates siblings. Before ${lPassiveSibling} can reach the escaping signature note, the mummy gets a throat full of Bates in each hand.\n                \n                \"A pencil, a pencil. My kingdom for a pencil,\" says Frost, lifting the pair off the ground. \n                \n                The scroll drops from Lester's hand, landing near the front curtain.\n\n                *goto PostFrostAttackFromSibsLabel\n\n*label PostFrostAttackFromSibsLabel\n*page_break\n\"Get it!\" \n\nAstrid the elder witch points to the scroll. The four sorceresses have snuck in unseen during the fracas.\n\nFrost brings the asphyxiating Emma and Lester close to his dessicated face. \"Plans gone awry?\" asks the mummy. He hasn't noticed the newcomers.\n\n*choice\n    # You run for the scroll.\n        A witch grabs the scroll. You dive with an outreached hand, winning a pinch-grip of bark between index finger and thumb.\n        \n        \"Let go,\" says a second witch, smacking you in the back of the head with a vintage broom. You think this one is Fortuna.\n        \n        \"Ow,\" you say. \n        \n        A third witch gets a fistful of the scroll. You feel the parchment slide between your pinched fingers. You squeeze harder.\n        \n        \"No!\" yells Frost, dropping the dead Emma to one side and the dead Lester to the other. \n        \n        RIP.\n        *page_break\n        You fall backward holding a small chunk of scroll. The witches tumble the other way, clutching the rest.\n        \n        *set gWhoHasScrollSignatureScrap \"you\"\n        *goto SibsOrScrollLabel\n    # You try to save the Bates siblings.\n        *set gStatEmpathy + 3\n        The mummy backhands you with Lester. You clatter over a table and onto the floor. \n        \n        \"Too late, newsreeler,\" says Frost, tossing the dead Emma and then the equally dead Lester in front of you. Emma's body comes to rest atop of you, her lifeless lips pressed against your cheek. \n        *set lTangledInDeadBates 1\n        \n        Meanwhile a tug-of-war rages over the scroll. Two witches have a grip on one end and Lincoln has a pinch hold on a corner. The third witch smacks the cameraman's head with a vintage broom. \n        \n        Swat. \n        \n        \"Ow,\" says Lincoln.\n        \n        \"No!\" cries Frost.\n        \n        RIP.\n        *page_break\n        Lincoln falls backward holding a small chunk of scroll. The witches tumble the other way, clutching the rest.\n        \n        *set gWhoHasScrollSignatureScrap \"Lincoln\"\n        *goto SibsOrScrollLabel\n*label SibsOrScrollLabel\nFrost goes stiff, totters a moment then topples to the ground. He rocks to a stop, once again an ossified, lifeless corpse. \n\n\"Retreat!\" says Astrid. The quartet disappear through the tarp and into the antique show, carrying away the majority of the scroll.\n \n*if(lTangledInDeadBates = 1)\n    You disembroil yourself from the corpses of the Bates siblings. Lincoln rushes over to you, quickly pocketing the scrap of parchment.\n    \n*if(lTangledInDeadBates = 0)\n    You pick yourself off the floor, taking a closer look at the scrap of parchment in your hand. The fragment feels like a strip of bark from a tree. Lincoln rushes to your side.\n\n\"Now there's three dead people,\" he says. \"I didn't sign up for this.\"\n\n\"Yeah, well, they wanted us to be two thirds of the body count.\"\n\n\"Maybe we should get the hell out of here.\" \n\n\"What? No way. We're onto a huge story,\" you say, and then add;\n\n*fake_choice\n    # \"Grab the camera, we have to find the witches. It'll all be worth it, you'll see.\"\n        *set gStatAmbition + 2\n        *gosub_scene AchievementSubroutines achieveCheckAmbitionLabel\n    # \"Okay, all right, you're right. No reason to put yourself at risk. Just leave me the camera.\"\n        \"You're staying?\" asks Lincoln. \"Well crap, I don't want to leave you-\"\n        \n        *set gStatEmpathy + 1\n        *gosub_scene AchievementSubroutines achieveCheckEmpathyLabel\n\n\"Nobody move.\" \n\nA large man in a black suit and tie points an automatic pistol between you and Lincoln. \n*finish\n", "act3witches": "*comment\n*comment    Act3Witches.txt\n*comment\n\n*comment === Temp Variables \n*temp lGiveDeadEyeStare 1\n\n*comment === Chapter Start ===        \n[b]Chapter Five[/b]\n\nAs ordered, nobody moves. Peering around the shoulder of the pistol weilder is the help-seeking security guard. Th newcomer scans the room while holding the weapon steady. His gaze pauses only briefly on the dead bodies. \n\n\"I don't see Frost,\" he says.\n\nNo one responds. The pistol aim rotates toward you.  \n\n\"Oh, he's down here,\" you say, nodding to the mummy at your feet.\n\nThe man steps to the side to get a view of the stiff corpse on the floor. The guy with the gun looks vaguely familiar, like you've seen him somewhere previously. \n\n\"Dammit, you said it was alive. Jumping around and killing people,\" says the man, lowering the pistol to his side. \n\n\"It was, I swear,\" says the guard, his voice cracking a bit. \"I saw it kill the priest.\" You finally notice the name tag pinned to his chest, reading Steve Clark, Security trainee.\n*page_break\n\"And you are?\" you ask the newcomer. \n\n\"Agent Jockety. F.B.I.,\" says the man, flashing a badge before quickly pocketing it. \"We've been searching for Mr. Frost for some time.\"\n\n\"You guys know about Frost?\" you ask. \n\n\"He's been an open file for a long time,\" responds agent Jockety. \"A long, long time.\"\n\n\"But you know he's come back from the dead? And murders people?\"\n\nJockety doesn't respond, instead bends down, pulls an illustrated portrait from his jacket and holds it next to the corpse's dessicated face. The drawing features a handsome dandy with a full mustache, the banner at the bottom reading 'Professor Thadeus Frost, Love Potions and Other Wonderous Concoctions'.\n\n\"FBI? That's the help you went for?\" Lincoln asks Clark. \n\n\"I was going for the local cops but ran into him,\" says the security guard. \"He stopped me and made me come back with him.\"\n*page_break\nJockety pokes a finger into Frost's stomach. A small cloud of dust poofs from the mummy's mouth. The agent emits a surprisingly effeminate cough while standing back up. He jabs Frost with his worn Florsheim shoe. The mummy rolls a bit but doesn't reanimate. \n\n\"Okay Trent, what's the smart move here?\" Jockety mumbles to himself. \n\n*fake_choice\n    # \"I suggest an interview with the press,\" you say.\n        *set gStatAmbition + 2\n        *gosub_scene AchievementSubroutines achieveCheckAmbitionLabel\n    # \"I find it helpful to talk these things out,\" you say. \n        *set gStatEmpathy + 1\n        *gosub_scene AchievementSubroutines achieveCheckEmpathyLabel\n    # You say nothing, letting Jockety mull it over.\n        *set lGiveDeadEyeStare 0\n\n*if (lGiveDeadEyeStare = 1)\n    Jockety gives you a dead-eyed stare. \"Without evidence that this corpse committed a crime,\" he says, \"I'm holding you two for the murder of Father McCroskey and Emma and Lester Bates.\"\n    \n    *goto EndJocketyDeadEyeStareLabel\n*else\n    \"Without evidence that this corpse committed a crime,\" says Jockety, \"I'm holding you two for the murder of Father McCroskey and Emma and Lester Bates.\" \n    \n    *goto EndJocketyDeadEyeStareLabel\n\n*label EndJocketyDeadEyeStareLabel\n\"What?\" says Lincoln. \n\n\"We didn't - hey, how do you know their names?\" you ask. \n\n\"That's need to know,\" says the FBI man, pulling out a pair of handcuffs. \"Extend your arm.\"  \n\n*choice\n    # You decide to show Jockety the camera footage of Frost killing the priest, even though he'll probably confiscate it as evidence.\n        *set gStatAmbition - 3\n        \"We can prove Frost did it,\" you say, pointing to the camera, \"in stunning four-K resolution.\" \n        \n        Jockety arches an eyebrow. He must practice, as the brow angle is a crisp ninety degrees. \n\n        Lincoln fiddles with the camera, eager for exoneration. \"Take a look, supercop,\" he says. \n\n        The FBI man eyes you both suspiciously, raising his pistol vertically to a ready position. With his other hand he reattaches the handcuffs to his belt. \n        \n        \"Don't try anything funny,\" he says leaning into the camera viewscreen. A well-framed replay begins of Frost confronting Father McCroskey. \n        \n        \"I knew it. I knew it could come to life,\" says an excited Jockety as Father McCroskey dies on-screen. \n\n        \"Told you,\" says Clark.\n        \n        Lincoln stops the video. \n        *page_break\n        \"Too bad you had to kill it,\" says Jockety.\n        \n        \"It was trying to kill us,\" says Lincoln. \"And doing a good job.\"\n        \n        \"Uh huh,\" responds Jockety. \n        \n        \"Ah, I wouldn't say we killed it. I think it's more like Frost's unplugged,\" you say. \"See, there are these witches that took off with this scroll. Frost was busy killing the two Bates-\"\n        \n        \"The Clifty parchment? You've seen it? It's real?\" says Jockety.\n        \n        \"The what?\"\n        \n        \"It looks like a piece of old bark. Or maybe human skin. There are conflicting stories,\" says Jockety. \"Odd symbols are carved on it. They may only be visible during a full moon. Or if smeared with fresh heart's blood. Or some combination. I'm not sure.\"\n        \n        \"Yeah, uh, that kinda sounds like what they took,\" you say.\n        *page_break\n        \"Did these witches, actually forest shamans, use the parchment to bring Frost back from the dead? Some kind of ceremony. Or maybe incantations?\" asks Jockety.\n        \n        \"Not exactly, but the, um, Clifty parchment?\" you say. Jockety quickly nods. \"I'm pretty sure it definitely has something to do with Frost coming to life.\" \n        \n        \"This changes everything,\" says Jockety. \"The shamans are still around, they're not leaving without Frost. We're oscar mike.\" Jockety points to Lincoln. \"You, grab the camera. I'll confiscate it later. I'm getting that parchment.\"\n        \n        \"Who's Oscar and Mike?\" asks Lincoln. \n        \n        \"On the move! Oscar Mike!\" says Jockety, now pointing at you, \"Carry Frost. He's not that heavy. Clark, you know the terrain. You're our guide. Where would a bunch of shamans hide out?\"\n        \n        \"Um, so we're just going to leave the dead bodies?\" asks Clark. \"My review is coming up and my supervisor's not going to-\" \n        \n        \"Move out!\" shouts Jockety. \"They'll keep. We got higher priorities.\"\n        *page_break\n        \"So we're not under arrest anymore?\" you ask.\n        \n        \"Not if you carry that body,\" says Jockety. \"Let's go.\"\n        \n        Lincoln looks to you for direction. You shrug and nod an uncertain affirmation. Lincoln returns a skeptical look but begins breaking down the camera for transport. \n        \n        Meanwhile you consider the best technique to carry the mummy. \"Are you sure we should take Frost?\" you ask Jockety. \"People might, I don't know, freak out?\"\n        \n        \"I'm sure they see weirder things at these shows,\" says Jockety. \n        \n        \"You don't do a lot of antiquing, do you?\"\n        \n        \"Pick up that corpse,\" says Jockety, performing a lifting motion with his pistol.\n        *page_break\n        *goto PostJocketyProofLabel\n    *if (gWhoHasScrollSignatureScrap = \"you\") # You decide to show Jockety the scroll fragment and explain the witches, even though he'll probably impound it and think you're a homicidal nut job. \n        \"Okay, just bear with me for a minute, okay?\" you tell Jockety. You pull the scroll piece from your pocket. \"See this? It's a piece of this weird bark thing. I think these, um, witches-\"\n        \n        *label JumpToJocketyScrollBranch\n        Jockety snatches the fragment from your hands and examines it closely. \"This could be from the Clifty parchment. Where did you get this?\"\n        *set gWhoHasScrollSignatureScrap \"Jockety\"\n        \n        \"Well, like I was saying, there are these elderly ladies, that have some witchiness about them. When Frost attacked-\"\n        \n        \"Forest shamans,\" says Jockety. \n        \n        \"What?\"\n        \n        \"They're not witches. The old ladies. They're forest shamans.\"\n        \n        \"One of them wasn't that old,\" says Clark, rubbing his bruised nose.\n        \n        \"So the witches-\"\n        \n        \"Shamans.\"\n        *page_break\n        \"Are you going to keep interrupting?\" you ask. Jockety glares back. \"Thank you. The Bates got the scroll from the witches. Shamans!\" you say before Jockety can correct you again. \"That piece tore off when Frost killed them.\"\n        \n        \"Wait, the whole parchment is here? In one piece?\" \n        \n        \"Well, it was, until, you know,\" you say, looking at the torn scrap.\n        \n        \"It is real. The parchment, did it bring Frost to life?\"\n        \n        \"So now you admit Frost is alive?\" you ask. \n        \n        Jockety gets uncomfortably face-to-face. \"Did the parchment bring Frost to life?\"\n        \n        \"I'm pretty sure it definitely has something to do with it,\" you say.\n        \n        \"Outstanding,\" says Jockety, stepping back from you. \"We're moving out.\" Jockety points to you and Lincoln. \"You two, carry Frost. Clark, you know the terrain. You're our guide. Where would a bunch of shamans hide out?\"\n        \n        \"Um, so we're just going to leave the dead bodies?\" asks Clark. \"My review is coming up and my supervisor's not going to-\"\n\n        \"Move out!\" shouts Jockety. \"They'll keep. We got higher priorities.\"\n        *page_break\n        Jockety moves to the curtains, opens them a crack and reconnoiters the hallway.\n        \n        \"You want the head or feet?\" Lincoln asks. \n        \n        You nod to the camera. \n        \n        \"What?\" asks Lincoln. \n        \n        \"Camera,\" you whisper.\n        \n        \"Ah,\" nods Lincoln. He steps to his rig, dismounting it from the tripod. \n        \n        \"What are you doing? I told you two to carry Frost,\" says Jockety.\n        \n        \"We can't leave that camera, it's worth ten grand,\" you say. \n        \n        \"Yeah, and I signed it out so I got to pay for it if it disappears,\" says Lincoln. \"Then I get fired. Then I get arrested because I can't pay for it because I lost my job.\"\n        \n        \"Shut up,\" says Jockety, giving you the suspicious cop stare.\n        *page_break\n        \"Frost's not that heavy, just some skin and bones,\" you say. \"I can carry him by myself. Easy.\"\n        \n        \"Did you record Frost on that camera?\" asks Jockety. \n        \n        \"I wish,\" you say. \"Unfortunately it's all pricing of vases and vintage bed pans. You're welcome to take a look.\" \n        \n        \"I will. Later. If you can't keep up carrying Frost by yourself, we're dumping the camera so he can help you.\"\n        \n        \"No problem, I bench, like, dozens of barbells.\" \n        \n        \"Get moving,\" says Jockety.\n        *page_break\n        *goto PostJocketyProofLabel\n    \n    *if (gWhoHasScrollSignatureScrap = \"Lincoln\") # You decide to tell Jockety that Lincoln has a fragment of the scroll that brings Frost to life and a bunch of witches have the rest of it. He'll probably impound it and think you're a homicidal nut job. \n\n        \"Okay, just bear with me for a minute, okay?\" you tell Jockety. \"Lincoln, give me that piece of the scroll.\" \n        \n        \"Scroll?\" asks a bewildered Lincoln. \n        \n        You hold your hand out, waiting for Lincoln. He reluctantly pulls the scrap from his pocket and hands it to you. \n        \n        \"See this?\" you tell Jockety. \"It's a piece of this weird bark thing. I think these, um, witches-\"\n\n        *goto JumpToJocketyScrollBranch\n\n*label PostJocketyProofLabel\n        \n*choice\n    # You bend down and grab Frost from behind, your arms around his waist.\n        *gosub trial_end\n        Using your legs, you bring the mummy upright. Jockety was right, Frost isn't that heavy. You carry the creature as you would a large potted plant, held in front and obscuring your view. Peeking around the creature's torso, you join the group by the opening in the blankets.\n        \n        *set gMummyCarryTechnique \"plant\"\n        \n        *goto ExitBatesDeathLocationLabel\n    # You bend down and pull Frost upright. You turn the creature to face you. With a grunt, you lift the mummy onto your shoulder.\n        *gosub trial_end\n        Jockety was right, the creature isn't that heavy. Unfortunately Frost doesn't bend at the waist, staying stiffly straight like a long board. Careful not to swing into anything, you join the group by the opening in the blankets. \n\n        *set gMummyCarryTechnique \"shoulder\"\n        \n        *goto ExitBatesDeathLocationLabel\n    # You bend down and pull Frost upright. You turn your back to the creature and bend slightly, getting your hands behind its thighs. Exhaling quickly, you piggyback the mummy onto your back. \n        *gosub trial_end\n        Jockety was right, the mummy isn't that heavy. Hunching forward to keep the creature from sliding off your back, you join the group by the opening in the blankets. Frost's face bobs into the back of your head as you move. \"I'm definitely washing my hair when I get home,\" you think. \n        \n        *set gMummyCarryTechnique \"piggyback\"\n        \n        *goto ExitBatesDeathLocationLabel\n        \n*label ExitBatesDeathLocationLabel \n\n*goto_scene Act4Witches\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n  *label purchased\n  *return\nRemember earlier how we told you that the first NUMBER chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n  *subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2018-06-08 $3.99 $2.99 purchased\n*abort\n", "act4witches": "*comment\n*comment    Act4Witches.txt\n*comment\n\n*comment === Temp Variables \n*temp lShamanSearchLocation \"maintenance\"\n*temp lKitchenDoorPartner \"Lincoln\"\n\n*comment === CHAPTER START\n\"Well Clark, where are the forest shamans?\" Jockety asks. \"And if you say the forest I'll taser your ass.\"\n\n\"Um, I'm not super familiar with shamans,\" Clark replies. \"They haven't hosted an expo event since I started working here.\"\n\n\"They're nearby. They're not leaving without the mummy. They'll need somewhere private for their ritual,\" says Jockety. \"Think.\"\n\nYour mummified burden feels hollowed out. You wonder where all its strength comes from, when it's alive. \n*if (gMummyCarryTechnique = \"plant\")\n    You shift the load so you're looking over his left shoulder instead of his right, but that doesn't improve his aroma; swampy with a wafting of decayed raccoon. \n    \n    *goto WitchSearchDepartLabel\n*elseif (gMummyCarryTechnique = \"shoulder\")\n    You rotate your load to face Clark, unknowingly swinging Frost's feet into Lincoln.\n\n    Lincoln pushes the shoes out of his face. The creature threatens to roll off your shoulder but a few quick sidesteps regains your balance. \n    \n    *goto WitchSearchDepartLabel\n*elseif (gMummyCarryTechnique = \"piggyback\")\n    Frost slips down your back. You do a little hop to reposition him higher. It feels like the creature just licked the back of your head. \n    *goto WitchSearchDepartLabel\n\n*label WitchSearchDepartLabel\n\n\"Um,\" Clark stammers. Jockety fumes frustration, clearly fogging the security guard's thinking.\n\n*choice \n    # \"Is there a maintenance area nearby?\" you ask.\n        *set lShamanSearchLocation \"maintenance\"\n        \"Yeah, there is,\" says Clark. \"I guess it's pretty private. It's down that way.\" \n        \n        *goto PostShamanSearchOneLabel\n    # \"Are there any open or unused antique booths around?\" you ask.\n        *set lShamanSearchLocation \"bathroom\"\n        \"Yeah, there are,\" says Clark. \"There's a couple by the bathrooms. No one ever wants those spots.\" \n        \n        *goto PostShamanSearchOneLabel\n\n*label PostShamanSearchOneLabel\n\"It's a start. If we see the shamans, don't do anything. I'll handle it,\" says Jockety. \"Let's go.\" He jerks the blanket aside. \"Stay tight on my six.\" \n\n\"Six?\" asks Lincoln.\n\n\"Just be ready to record anything weird,\" you say, struggling into the aisle with your mummified cargo. Jockety makes sure yo
