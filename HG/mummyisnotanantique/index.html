n uncertain nod. \n                *goto AmbushTwoCameraLabel\n            *label AmbushTwoCameraLabel    \n            You return a lucky arm punch and then duck between two of the fishing boats. With the stern-drive cruiser blocking sight to the door, you cut sideways and make it to the wall adjacent to the door.  \n            \n            Clark drives half a dozen staples into a pole, securing the line. \n\n            \"Good job Clark,\" you say. \"Now run a line to that pole. Then we'll have a grid.\"\n            \n            *goto AmbushSetupTwoReadyLabel\n        \n        *label AmbushSetupTwoReadyLabel\n        *page_break\n        A solid shoulder rattles the door.\n        \n        \"Guess they gave up on the keys,\" says Clark, reaching the new pole. \n        \n        \"Yeah, looks like it,\" you reply. \"Hold that line slack. When they come running, pull it tight. If Frost avoids the first one, this one will get him.\" \n        \n        *goto DoneSettingUpTheAmbushLabel\n\n*label DoneSettingUpTheAmbushLabel\n\"Tis given with welcome!\"\n\nFrost is inside the loading dock. \n\nThe mummy stands on the second floor landing of a stairwell off to your side. The door to an office stands open behind him. He twirls the supervisor's ring of keys on his finger. His other hand clutches the scroll. Viscous green mucus runs freely from his nose-holes but otherwise the mummy appears fully functional.\n\nThe creature drops the keys, high-steps a foot onto the railing and then launches himself into the air. He intends to land on your head. \n\n*if (lLincolnPositionForAmbush = \"ambusher\")\n    Scrambling sideways, you bang into and topple a garbage can. You plop onto your backside as empty coffee cups and discarded lunch remnants scatter at your feet.\n    \n    *goto AvoidFrostLandingLabel\n*else\n    You scramble sideways, losing your grip on the ${gWeaponChoice}. The weapon clatters inside the forklift and dislodges a lunch pail from behind the seat. The detritus of yesterday's meal scatters at your feet as you plop onto your backside.\n    \n    *goto AvoidFrostLandingLabel\n*label AvoidFrostLandingLabel\nFrost impacts where you stood with killing force, his left foot landing squarely on a spilled banana peel. His leg shoots out and the mummy flips into a spectacular, somersaulting prat fall. \n\nHe lands violently onto his upper back, jolting the scroll from his hands. The mummy snorts a small eruption of mucus as the magic document floats onto your lap.\n*page_break\nYou grab the scroll and ...\n*choice\n    # say, \"Back off Frosty or I tear this into tiny bark pieces.\"\n        *set lFrostGrabLine \"You were saying?\"\n        *label FrostTakesScrollNeckGrabLabel\n        Frost lunges with supernatural quickness despite lying on his back. He snatches the scroll away with one hand and squeezes your neck with the other before you can blink, let alone defend yourself.\n        \n        \"${lFrostGrabLine}\" Frost remarks, smiling with triumph. Drops of bright green mucus drip from his upper lip and run down his chin. \n        \n        He rises and brings you along, his clawed hand clutching your neck under your jawbone. Your toes just touch the ground, preventing strangulation for the moment.\n        \n        *goto FrostTakesScrollLabel\n    # scramble clear of Frost on hands and knees.  \n        An undead hand painfully clamps your ankle and drags you backward, thwarting your escape. Frost rises and brings you along, holding you upside down by the foot. \n        \n        \"I'll take that,\" he says, plucking the scroll away from you. Bright green mucus drips from his smiling upper lip, falls uncomfortably close past your face and splats onto the floor. \n        \n        *goto FrostTakesScrollLabel\n    # quickly pat your pockets looking for a writing instrument. \n        *set lFrostGrabLine \"I'll call for pen and ink and write my mind.\"\n        *goto FrostTakesScrollNeckGrabLabel\n\n*label FrostTakesScrollLabel \n\"We have an unfinished concern,\" Frost says, poking a sharp fingernail between your third and fourth ribs. \"Oblige me by surrendering the scroll fragment and we can both avoid the embarrassment of having me probe your lifeless body.\"\n\n\"That's a tempting offer,\" you respond. \"How about instead-\"\n\nThe door crashes open, finally succumbing to the pounding. Jockety rushes through, followed closely by Astrid and Fortuna. All three scroll-zombies hoot excitedly. \n*page_break\n*if (gWeaponChoice = \"crow bar\")\n    Jockety hits the oil slick and immediately loses traction, belly-flopping into a forward slide. Behind him Astrid also glides but keeps her balance. She shakily gains on the FBI agent until tangling with his legs, losing equilibrium and tumbling onto his back. The crashed pair hit a dry spot and beach to a stop.\n    \n    Fortuna rotates slowly by her fellow toppled zombies, her arms and legs spread wide to keep perpendicularity.\n\n    The fishing net floats down and settles over Jockety and Astrid. \n    \n    \"Owned,\" says Clark.\n    \n    Jockety thrashes for freedom, launching the net-entrapped Astrid into Fortuna's spinning backside. The impact accelerates the gyrating witch directly at you and Frost.\n    \n    The mummy drops you and hops clear of the oncoming collision. \n    \n    You hit the ground as Fortuna hits you. She trips on your body and goes headlong over the top, splatting onto the concrete floor face first.\n    \n    *goto ZombieCrashLabel\n*else\n    The first fishing line snags Jockety's feet. He belly flops onto the floor with a hard thunk. Astrid plunks to ground beside him, also ensnared.\n    \n    Fortuna scampers over the backs of the downed scroll-zombies, her head snapping toward the scroll in Frost's hand. She alters course and runs right at you. \n    \n    Clark pulls the second fishing line taut. The cord catches Fortuna's lead foot, sending her airborne. \n    \n    Frost drops you and hops clear of the inbound witch. You land in a heap as Fortuna flies overtop. She splats onto the concrete floor face first.\n    \n    \"Owned,\" says Clark. \n\n    *goto ZombieCrashLabel\n\n*label ZombieCrashLabel\n*page_break\n\"These imbeciles can be a cross to bear,\" says Frost. \"Now, you were about to present me the scroll frag-\"\n\nThe mummy stumbles forward, smacks into a pole and falls to the ground, dazed. A cloud of plaster dust billows from where he just stood. Melody steps through the dissipating particulate, holding the fractured bottom half of a peeing cherub statue. \n\nFrost rolls onto his back, groaning. Melody drops the broken lawn ornament onto the mummy's groin. The creature chirps a high-pitched squeak and constricts into a fetal position.\n\n\"Guess not everything got mummified,\" says Melody.\n \n*if(gOpalAwakened = \"no\")\n    *set lMelodyOrOpal \"Melody\"\n    She yanks the scroll from Frost's weakened grip. \n    \n    *goto OpalInA2Label\n*else\n    *set lMelodyOrOpal \"Opal\"\n    \n    Opal pops from behind Melody and yanks the scroll from Frost's weakened grip.\n    \n    *goto OpalInA2Label\n\n*label OpalInA2Label\n*if(gWeaponChoice = \"crow bar\")\n    The change in ownership energizes Jockety and Astrid. They rise, quickly find oil-free patches of ground and lurch toward ${lMelodyOrOpal} and the parchment.\n    \n    The scroll-zombies stumble past you. \n    *choice\n        # Kick out Jockety's feet.\n            *set lTrippedZombie \"Oiled Jockety\"\n            There must still be oil on the tread of the FBI agent's shoes, as your kick easily flips his legs out. He lands hard on the floor, stunned.\n            \n            *goto TookOutAnOiledZombieLabel\n        # Kick out Astrid's feet. \n            *set lTrippedZombie \"Oiled Astrid\"\n            There must still be oil on the bottom of the witch's shoes, as your kick easily flips her legs out. She lands hard on the floor, stunned.\n            \n            *goto TookOutAnOiledZombieLabel\n        \n    *label TookOutAnOiledZombieLabel\n    *if(lTrippedZombie = \"Oiled Jockety\")\n        *if(gOpalAwakened = \"yes\")\n            Meanwhile, Astrid slips toward Opal. \n            \n            Melody skips in front of her friend and cuts off the scroll-zombie. The young witch fires a stiff left jab into Astrid's nose, snapping her head and sliding her backward an arms-length.\n\n            *goto MelodyJustHitAstridLabel\n            \n            *label OpalOffersAstridTheScrollLabel\n            \"Oh, Astrid,\" says Opal from behind Melody, \"Would holding the scroll make you feel better?\"\n\n            You yell ...\n            *choice\n                # \"Melody! Punch her again!\"\n                    *goto YellAtOpalAndMelody_OiledLabel\n                # \"Run! Don't... Run!\"\n                    *set gStatEmpathy + 1\n                    *gosub_scene AchievementSubroutines achieveCheckEmpathyLabel\n                    *goto YellAtOpalAndMelody_OiledLabel\n\n            *label YellAtOpalAndMelody_OiledLabel\n            They ignore you. Opal offers the scroll.\n\n            Astrid snatches the parchment, followed by a rude stiff-arm to Opal's forehead. The elder witch stumbles backward past Melody.\n            \n            \"Hey!\" says Melody, \"That's no way-\".\n            \n            Astrid kicks the young witch in the shin. \n            \n            \"Ahh!\" cries Melody, raising her injured leg to massage the bruise. \n            \n            Astrid stomps on her adversary's planted foot, throwing Melody off-balance. The young witch gives a desperate hop but loses equilibrium, toppling to the ground.  \n            \n            *if(lTrippedZombie = \"Oiled Jockety\")\n                *goto ZombiesHaveScrollLabel\n            *else\n                *goto TangledAstridHasScrollLabel\n        *else\n            Meanwhile, Astrid slips to a halt in front of Melody. \n            \n            The young witch fires a stiff left jab into scroll-zombie's nose, snapping her head and sliding her backward an arms-length.\n            \n            *label MelodyJustHitAstridLabel\n            Instead of attacking, Astrid stands unmoving, gingerly pampering her stung schnoz. A tear rolls down her cheek. \n            \n            \"Oh my god, I'm so sorry,\" says Melody.\n            \n            The elder witch tentatively reaches out a hand, palm up. She looks like the sad clown at the circus.\n            \n            *if(gOpalAwakened = \"yes\")\n                *goto OpalOffersAstridTheScrollLabel\n            \n            \"Would holding the scroll make you feel better?\" asks Melody.\n            \n            You yell ...\n            *choice\n                # \"Punch her again!\"\n                    *goto YellAtMelody_OiledLabel\n                # \"Run!\"\n                    *set gStatEmpathy + 1\n                    *gosub_scene AchievementSubroutines achieveCheckEmpathyLabel\n                    *goto YellAtMelody_OiledLabel\n            \n            *label YellAtMelody_OiledLabel\n            Melody ignores you, offering the scroll.\n\n            Astrid snatches the parchment from Melody's hand, followed by a driving kick to the young witch's midriff. \n            \n            Melody flies off-balance and smacks the floor, rolls through a full reverse somersault and stops face-down and discombobulated, an oil-stained bootprint stamped into her shirt. \n            \n            *goto ZombiesHaveScrollLabel\n            \n    *else\n        *if(gOpalAwakened = \"yes\")\n            Meanwhile, Jockety staggers towards Opal. Melody skips in front of her fellow witch and cuts off the scroll-zombie.\n            *goto MelodyAndJocketyFightLabel\n        *else\n            Meanwhile, Jockety staggers in front of Melody.\n            \n            *label MelodyAndJocketyFightLabel\n            She fires a trio of left-handed jabs into his nose, snapping his head back with each impact. Jockety growls and counters with a violent swing.\n            \n            Melody easily ducks as oil droplets spray over her head. She side-steps and throws a left hook into Jockety's exposed ribs. He grunts and responds with a backhand.\n            \n            The young witch hops back as Jockety's fist breezes past her nose. Globules of oil hit splatter her forehead and into her eyes. \n            \n            \"Gah, can't see!\" says Melody, blinking rapidly.\n            \n            *if(gOpalAwakened = \"yes\")\n                Jockety stiff-arms his addled foe into the wall. Melody hits with a sharp exhalation of breath and slides to the floor.\n                *page_break\n                Behind the dropped witch stands Opal in a quivering paralysis, the parchment clutched to her chest. \n                \n                \"Ba-guk!\" barks Jockety.  \n                \n                Opal screams and throws the scroll. \n                \n                *goto OiledJocketyHasScrollLabel\n            *else\n                Jockety stiff-arms her into the wall. The collision ejects the scroll along with a sharp exhalation of breath. Melody slides to the floor.\n        \n                *goto OiledJocketyHasScrollLabel\n\n    *label OiledJocketyHasScrollLabel\n    The parchment hits and sticks to Jockety's oil-drenched chest. He gazes at it a few seconds, tries to smile but ends up grimacing and then peels off his prize.    \n\n    *goto ZombiesHaveScrollLabel\n*else\n    The change in ownership energize Jockety and Astrid. They rise from the floor despite the hooks embedded in their lower legs and lurch toward ${lMelodyOrOpal}. The fishing line trails behind them. \n    \n    Clark tries to stomp on the end of the monofilament but a hook from the other line pins his pants leg. His foot comes down a half meter short.\n    \n    The scroll-zombies stumble past you. \n\n    *choice\n        # Knock out Jockety's feet.\n            *set lTrippedZombie \"Tangled Jockety\"\n            You make a sweeping horizontal kick into Jockety's left shin. His leg shoots back a short distance until stopped by the entangled fishing line. His balance disrupted, Jockety falls face-first onto the cement floor. \n            \n            *goto TookOutAHookedZombieLabel\n        # Knock out Astrid's feet. \n            *set lTrippedZombie \"Tangled Astrid\"\n            You make a sweeping horizontal kick into Astrid's left shin. Her leg shoots back a short distance until stopped by the entangled fishing line. Her balance disrupted, Astrid falls face-first onto the cement floor. \n            \n            *goto TookOutAHookedZombieLabel\n        \n    *label TookOutAHookedZombieLabel\n    *if(lTrippedZombie = \"Tangled Jockety\")\n        *if(gOpalAwakened = \"yes\")\n            Meanwhile, Astrid shuffles toward Opal. \n        \n            Melody skips in front of her friend and cuts off the scroll-zombie.\n            *goto MelodyHitsTangledAstridLabel\n        \n        *else\n            Meanwhile, Astrid shuffles in front of Melody. \n            \n            *label MelodyHitsTangledAstridLabel\n            The young witch fires a stiff left jab into scroll-zombie's nose, snapping her head and forcing her to scuffle back a few steps. The fishing hooks embedded in her right leg pop free. \n            \n            Instead of attacking, Astrid stands unmoving, gingerly pampering her stung schnoz. A tear rolls down her cheek. \n            \n            *if(gOpalAwakened = \"yes\")\n                *goto OpalOffersAstridTheScrollLabel\n            \"Oh my god, I'm so sorry,\" says Melody.\n            \n            The elder witch tentatively reaches out a hand, palm up. She looks like the sad clown at the circus.\n            \n            \"Would holding the scroll make you feel better?\" asks Melody.\n            \n            You yell ...\n            *choice\n                # \"Punch her again!\"\n                    *goto YellAtMelody_TangledLabel\n                # \"Run!\"\n                    *set gStatEmpathy + 1\n                    *gosub_scene AchievementSubroutines achieveCheckEmpathyLabel\n                    *goto YellAtMelody_TangledLabel\n            \n            *label YellAtMelody_TangledLabel\n            Melody ignores you, offering the scroll. Astrid snatches the parchment from Melody's hand, followed by a driving kick to the young witch's midriff. Melody flies off-balance and smacks the floor, rolls through a full reverse somersault and stops face-down and discombobulated. \n            \n            *goto TangledAstridHasScrollLabel\n        \n    *else\n        *if(gOpalAwakened = \"yes\")\n            Meanwhile, Jockety lurches toward Opal.\n            \n            Melody skips in front of her fellow witch and cuts off the scroll-zombie.\n            *goto MelodyAndEntangledJocketyFight\n        *else\n            Meanwhile, Jockety lurches in front of Melody.\n            \n            *label MelodyAndEntangledJocketyFight\n            She fires a trio of left-handed jabs into his nose, snapping his head back with each impact. Jockety growls and counters with a violent swing.\n            \n            Melody easily ducks the attack. \n            \n            The FBI agent's follow through whips the free end of the fishing line, causing it to wrap around her left leg. A trio of hook barbs pierce and embed in the young witch's calf muscle.\n            \n            She scowls and channels the pain into a strong left punch into Jockety's exposed ribs. The shot staggers the scroll-zombie into a stumble, pulling his legs free of his attached hooks. \n            \n            Clark, his pants cuff finally ripped free of ensnarement, reclaims the other end of the fishing line and gives it a jerk.\n            *page_break\n            \"Gah!\" Melody cries, the hooks biting into her leg. \"Let go you idiot!\" She hops forward to alleviate the agony.\n            \n            Jockety throws a forearm into Melody's chest. The impact drives her upper body backward while the line pulls her leg forward. She lays out horizontally a meter in the air before crashing back to earth.\n            \n            *if(gOpalAwakened = \"yes\")\n                Behind the dropped witch stands Opal in a quivering paralysis, the parchment clutched to her chest. \n                \n                \"Ba-guk!\" barks Jockety.  \n                \n                Opal screams, throws the parchment into the air and flees. \n                \n                The scroll floats through a lazy barrel-roll and then softly lands on Jockety's head, coming to rest draped over his face. \n                *goto EntangledJocketyHasScrollLabel\n            *else\n                The scroll billows into the air, floats through a lazy barrel-roll and then softly lands on Jockety's head, coming to rest draped over his face. \n                *goto EntangledJocketyHasScrollLabel\n\n    *label EntangledJocketyHasScrollLabel\n    He stands unmoving for a moment and then pulls down his prize, revealing a victory grimace. \n    *page_break\n    *label TangledAstridHasScrollLabel\n    \n    *goto ZombiesHaveScrollLabel\n\n*label ZombiesHaveScrollLabel\n*if(lTrippedZombie = \"Oiled Jockety\" ) or (lTrippedZombie = \"Tangled Jockety\")\n    *comment === Astrid has the scroll\n    Astrid stares at the scroll, motionless for a moment, and then begins slowly rolling her head in increasing circles. After a couple of circuits she shudders, blinks rapidly, looks around and then at her hands. \n    \n    \"Oh no,\" says Astrid. She feels her face with her hand. \"The elixir must have touched ... did anyone else? Oh Fortuna. And, ... whoever you are,\" she says, noticing her now-aged friend and Jockety. \n    \n    You yell ...\n    *choice\n        # \"Throw me the scroll!\"\n            *set gScrollFever + 1\n            *goto AstridWithScroll_YelledAtReactionLabel\n        # \"Tear up the scroll!\"\n            *set gStatEmpathy + 1\n            *gosub_scene AchievementSubroutines achieveCheckEmpathyLabel\n            *label AstridWithScroll_YelledAtReactionLabel\n            \"Did anyone sign it?\" says Astrid, squinting with age-weakened vision at the bottom of the document. \"It must be signed.\" \n\n            *goto YellAtAstridWithScrollLabel\n        *selectable_if (lLincolnPositionForAmbush = \"cameraman\") # \"Face the camera and tear up the scroll!\"\n            *set gStatAmbition + 1\n            *gosub_scene AchievementSubroutines achieveCheckAmbitionLabel\n            *goto AstridWithScroll_YelledAtReactionLabel\n\n    *label YellAtAstridWithScrollLabel\n    *if (gNeckBrace = \"Golf Club\")\n        *set lNeckBraceName \"golf club\"\n    *if (gNeckBrace = \"C Clamp\")\n        *set lNeckBraceName \"C-clamp\"\n    *if (gNeckBrace = \"Yard Stick\")\n        *set lNeckBraceName \"stapled yard stick\"\n    \"Allow me to oblige,\" says Frost from the ground. Your ${lNeckBraceName} neck brace still keeps the creature's head in place, despite all the trauma. The mummy sniffs back an elongating drop of dark green mucus, pulls his legs under himself and leaps with inhuman quickness. \n    \n    He lands in front of a flinching Astrid. \n    \n    \"Use mine,\" he says, offering Astrid an antique stylus. She eyeballs the pen suspiciously but makes no move to take it.\n\n    \"Time's up,\" says the mummy, dropping the writing instrument while simultaneously plucking the scroll from her.\n    *page_break\n    Astrid gasps and swipes at the parchment but Frost easily pulls it out of reach. \n    \n    \"Almost. Another foray?\" says Frost, dangling the scroll before Astrid. \"No?\"\n    \n    Astrid stands stupefied, having relapsed into zombification. \n    \n    *goto FrostHasScrollAgainLabel\n*else\n    *comment === Jockety has the script\n    *page_break\n    Jockety's eyes widen to near cartoon proportions and then he blinks rapidly. After a quick shudder, he slowly looks around. \n    \n    \"Where ... where am I?\" Jockety asks, then notices what he holds. \"How'd I get the scroll? And what happened to my hands, they're wrinkly. And spotty.\"\n    \n    \"Jockety? You back with us?\" you ask.\n    \n    The FBI agent turns to you, wincing against an unexpected pang. \"Uhh, why am I so achy?\" He flinches again. \"And gassy?\"\n    \n    You yell ...\n    *choice\n        # \"Throw me the scroll!\"\n            *set gScrollFever + 1\n            *goto JocketyWithScroll_YelledAtReactionLabel\n        # \"Tear up the scroll!\"\n            *set gStatEmpathy + 1\n            *gosub_scene AchievementSubroutines achieveCheckEmpathyLabel\n            *label JocketyWithScroll_YelledAtReactionLabel\n            \"What? Speak up,\" says Jockety. \n            *if (lTrippedZombie = \"Oiled Astrid\")\n                \"And how'd this motor oil get all over me? Did the car break down again?\"\n                \n                *goto YellAtJocketyWithScrollLabel\n            *else\n                \"And what's on my legs? Hey, did we go fishing? Did I catch something?\"\n\n                *goto YellAtJocketyWithScrollLabel\n        *selectable_if (lLincolnPositionForAmbush = \"cameraman\") # \"Face the camera and tear up the scroll!\"\n            *set gStatAmbition + 1\n            *gosub_scene AchievementSubroutines achieveCheckAmbitionLabel\n            \"I didn't say Lincoln could film anything,\" says Jockety. \"Turn that damn thing off.\"\n        \n            *goto YellAtJocketyWithScrollLabel\n\n    *label YellAtJocketyWithScrollLabel\n    Astrid and Fortuna, freed from their encumbrances and back on their feet, lurch toward the scroll.\n    \n    \"Whoa, what's up with these freaky old ladies?\" asks Jockety. \n    \n    *if (gNeckBrace = \"Golf Club\")\n        *set lNeckBraceName \"golf club\"\n    *if (gNeckBrace = \"C Clamp\")\n        *set lNeckBraceName \"C-clamp\"\n    *if (gNeckBrace = \"Yard Stick\")\n        *set lNeckBraceName \"stapled yard stick\"\n    \"Agent Jockety,\" Frost says from the ground. Your ${lNeckBraceName} neck brace still keeps the creature's head in place, despite all the trauma. The mummy sniffs back an elongating drop of dark green mucus, pulls his legs under himself and leaps with inhuman quickness. \n    \n    Jockety goes for his shoulder holster but comes up empty, the gun having been dropped when the waffle iron exploded. \n    \n    Frost lands in front of Jockety, who now pats his pockets searching for his missing weapon. The creature plucks the scroll from the FBI agent's hand. \n    \n    \"I am obliged at your retrieval,\" says Frost. \n    *page_break\n    Jockety takes a swipe to reclaim the scroll, but Frost easily pulls the parchment out of reach. \n    \n    \"Try again?\" says Frost, dangling the scroll in front of Jockety's nose.\n    \n    The agent takes another swing, noticeably slower. The mummy easily retracts the scroll. \n    \n    \"Almost,\" says Frost, \"One more? No?\"\n    \n    Jockety stands stupefied, having relapsed into zombification. \n\n    *goto FrostHasScrollAgainLabel\n\n*label FrostHasScrollAgainLabel\n*if (lLincolnPositionForAmbush = \"ambusher\")\n    You punch at the back of Frost's head. Without looking, the mummy catches your fist with his free hand, centimeters from the wispy hair of his skull. \n    \n    \"A bushwhacking?\" Frost says, turning to you. \"I am hardly aghast, considering the perpetrator.\" The creature twists your captured fist, leveraging you sideways into Astrid and Jockety.\n    \n    *goto FailedAttackOnFrostLabel\n*else\n    You punch at the back of Frost's head. Without looking, the mummy catches your fist with his free hand, centimeters from the wispy hair of his skull. \n    \n    \"An ambuscade?\" Frost says, turning to you, \"Excuse my lack of flabergastation, considering the perpetrator.\" The creature twists your captured fist, leveraging you sideways into Astrid and Jockety.\n    \n    *goto FailedAttackOnFrostLabel\n        \n*label FailedAttackOnFrostLabel\nThe scroll-zombies corral you with over-exuberance, their firm embrace allowing only shallow breathing and a little toe wiggling.  \n*page_break\n\"Find my scroll fragment,\" Frost tells his zombies, \"And I'll tolerate the removal of no more than two limbs.\" \n\n\"I don't have any scroll-\"\n\nFortuna burrows her hand deep into your left front pants pocket.\n\n\"Hello! Careful in there,\" you say.\n\nShe rips free her fist, tearing open the fabric. Your house keys, four pennies and a peanut M&M clatter to the floor.\n\n\"Hey, I just got these from Old Navy.\"\n\nThe witch drills into your other pocket and pulls, ripping the cloth. The parchment remnant and a small flurry of lint drifts free. \n\n\"That's just a parking receipt. I'm going to need that.\"  \n\nFrost bounds over and snatches the scroll fragment out of the air. \n*page_break\n\"Finally,\" the mummy proclaims, flaunting the scrap at the heavens. \"After decades of service to imbeciles, freedom! Now the world will deliver its pound of flesh.\" \n\nFrost turns the scroll so the back faces upward. Tear lines at the bottom clearly delineate the witches' repair. The mummy holds the fragment between forefinger and thumb, rotates it a couple of ways to get the precise alignment and then sticks it onto the parchment. The piece adheres to the surface and then begins to mend itself. The tear quickly fades to nothing, leaving a fully armed and operational scroll. \n\nFrost snorts a glob of snot free and inhales deeply. Air whistles in and out of his unclogged nose holes. \"Ah, the fiddle is fit once again,\" says Frost. \"Now a quick but painful death as reparation for your annoyances and, um, hold for a moment ...\"\n\nThe mummy notices the black smudge of the witches' fix sullying the bottom of his scroll. He rubs his finger over the blob, attempting to peel it free. The splotch snaps and encircles Frost's probing digit. \n\n\"Winchester goose!\" Frost says, flicking his hand to fling free the offending material. He whips his hand with increasing violence. The third wrist snap launches the globule across the room. \n\n\"Much better,\" says Frost to you. \"Now, are you a big bleeder? Because if you are, we're going with strangulation. I can't have you spurting all over my regalia.\"\n*page_break\nThe dollop of witchcraft plops onto the discarded shark jaws and spreads into a wide stain. The teeth chomp closed with ferocity, breaking free of the mounting. The jaws grind back and forth experimentally for a moment then begin snapping rapidly. The clacking vibrates the bones toward Clark's foot. \n\nThe security guard squawks and kicks in panic. His Timberland connects with the lower jaw as the mouth closes, punting it into the air. \n\n\"Keep it down back there,\" says Frost. \n\nThe jaws land on the mummy's forearm. The serrated teeth slice through the undead skin and hit bone. The scroll remains clutched in the mummy's hand despite the assault.\n\n\"Oh, I am fortune's fool,\" says Frost, watching the jaws gnaw into his ulna.\n\n\"And it's torn your regalia,\" you say, nodding to his ripped sleeve.\n\nThe mummy swings his shark-infested arm at your head but the extra weight throws off his aim. The creature's fist smashes into Jockety's temple. The zombie collapses, pulling you to the ground with him. You land harshly in a sitting position. \n*page_break\nThe parchment floats into your lap, followed a second later by Frost's bite-severed hand. Despite the amputation, the fingers spread wide and then crunch the scroll into its fist. \n\nUp above, the jaws munch toward the mummy's elbow. Frost punches the teeth with his remaining hand, ejecting the shark bones downward. They bounce off the floor and onto his shin, where they find a tasty new bone to crunch. \n\nThe mummy hops about, unsuccessfully trying to kick free the teeth sunk into his leg. \n\n\"Yeah, the undead really suck,\" you say, scrambling away with the trophy of the scroll but the booby prize of Frost's cleaved hand. You slide behind a large cartoon marlin statue, squeeze between some crates and roll onto the deck of the middle boat, staying out of sight below the gunwale. From the sounds of it, resurrected shark-jaws versus undead-mummy remains stalemated.    \n\nYou pry at the index finger of the disembodied hand but it remains clamped tight around the scroll. Thinking the pinkie might offer less resistance, you move to the smaller digit. Something doinks off of your head and then a ball-point pen rolls past your nose. \n\n\"Sign the scroll,\" Melody whispers, her head peaking over the far side of the fishing vessel. She pulls herself onto the deck and crawls toward you. \n*page_break\n\"What?\" you whisper. \n\n\"Sign at the bottom. You can end this.\"\n\nDespite the mummy's clenched hand, you spread open the lower end of the scroll, revealing the previous ownership signatures. Cursive names fill the space, most with extensive flourishes that cover a lot of parchment real estate.  \n\n\"You know, signing this thing hasn't worked out too well for people,\" you quietly tell Melody upon her arrival.\n\n\"It's Astrid's plan.\" \n\n\"See what I mean? Maybe you should sign it, being more of a specialist and all.\" \n\n\"Noooo. I'm, like, an intern.\" \n\n\"There's no room on here anyway. Does it count signing the back?\"\n\n\"Use this and then stick it on the bottom,\" Melody replies, sliding over a small post-it pad.  A cartoon of smiling, broom-riding witch illustrates the corner. \n*page_break\nYou scribble your signature and peel off the post-it note but stop from sticking it onto the scroll. \n*if ((gEnableSpellRemovalEnding > 0)and (gStatEmpathy > gEmpathyThreshold))\n    \"What about reciting the spell removal passage?\" you ask.\n    \n    \"How do you know about that?\"\n    \n    \"Sound investigative skills.\" You scan the scroll around Frost's fist, seeing only scribbles, flattened flowers and a couple squashed insects along with all the signatures. \"Where is it?\"\n    \n    \"On the back.\" \n    \n    You flip it over but find it blank. Except for some faint scrawls that look like animal tracks. \n    \n    \"There's nothing here,\" you say. \"Just weird scratches.\" \n    \n    \"That's it.\" \n    \n    \"What?\"\n    \n    *goto SpellOrDestroyLabel\n*else\n    \"Maybe we should just tear this thing up instead,\" you say. \n\n    \"It doesn't like that,\" Melody responds.\n\n    \"What?\"\n    *goto SpellOrDestroyLabel\n*label SpellOrDestroyLabel\n\nSomeone screams in pain, freezing you. \n\n\"${name}!\" Frost shouts, \"Give me the scroll immediately or you'll lose something precious. Oh, and also bring my hand.\" \n\nAnother scream follows. \n\n\"That's Lincoln!\" you say, popping your head above the ship's railing. \n\n\"No, sign it!\" Melody says. \n\n\"There you are,\" says Frost, noticing your movement. His stumpy arm wraps around Lincoln's throat. Two cuts bleed from your cameraman's cheek. Frost's free hand coils like a cobra ready to strike.\n\nDespite the injury, Lincoln holds the camera at his side. \n*page_break\n\"Deliberate your movements,\" says Frost, \"I can cut his throat before you can blink.\" Frost's clawed hand blurs forward. A new cut appears on Lincoln's face, narrowly missing his eye. He yells in pain again. \n\n\"See,\" says Frost.\n\n\"Leave him alone,\" you say getting to your feet. You hold the scroll and the signed post-it note apart. \n\nThe zombies sway with the movement of the parchment, Astrid on one side of the creature and Jockety on the other. The witch brushes up against Frost. The mummy elbows Astrid's forehead, knocking her a step backward. \n\n*if(gStatAmbition > gAmbitionThreshold)\n    \"Ah, but your employee isn't your first love,\" says Frost. The creature's hand lashes with blinding speed again, but not to draw blood. He yanks the camera free of Lincoln and then stump-clubs his human hostage. Lincoln back-pedals and topples over. \n    \n    \"Now I have something you really care about,\" the mummy says. He pretends to drop the camera but quickly catches it. \"Just funnin' ya, as they say back on the farm. Anyway, to return to the scene at hand. \n    *goto PostFrostFinalThreatLabel\n*else\n    \"A poor excuse for a retinue,\" says Frost. \"Anyway, to return to the scene at hand. \n    *goto PostFrostFinalThreatLabel\n\n*label PostFrostFinalThreatLabel\nCede me the scroll and life goes forward for all, or I kill everyone, clean the bloodstains off the scroll and go on my way. I shall count to two for you decide. To myself. So you won't hear me.\" \n\nYou quickly consider your options.\n\n\"Although!\" Frost continues, \"Two doesn't really provide a proper showmanship. Instead I shall count to ten. ... Twelve? No, ten. ... I've started.\"\n*page_break\n*if(gStatAmbition > gAmbitionThreshold)\n    You could surrender the scroll to Frost IF he agrees to an exclusive interview. The response would be off the charts. You'd own the news cycle for days. Your career would take off. You'd win every award. The mummy would probably go for it, the dude loves being the center of attention. Plus this could save everybody. \n    \n    On the other hand, you'd be letting a murderer and sociopath go free. At least for awhile. Someone is sure to nab him sooner or later. Sure, there'd be some unintended consequences. And Jockety and the two witches would still be scroll-zombies, commanded by Frost. But they may be beyond help anyway. \n    *page_break\n    Or you \n    *goto PostConsiderFameLabel\n*else\n    You could surrender the scroll if Frost agrees to an exclusive interview. But that's crazy, how career-crazed would you have to be to go through with something like that?\n\n    Instead you\n    *goto PostConsiderFameLabel\n\n*label PostConsiderFameLabel\ncould slap the signature-bearing post-it note onto the scroll. But given Frost's deadly quickness, even a fraction of a second is too long. You need a distraction. If you could get Jockety to bump into the mummy, that might be all the time you need. Just lead him into Frost by moving the scroll in the right direction. \n\nIf it works Frost would be incapacitated and under your control, totally harmless. Well, mostly harmless. Everyone would know who's guilty of all this murder and mayhem. Then you could show the world. The story will go global and you'd be at the center of it. \n\nOn the downside, this signature thing might not even work. Even if it does, mummy ownership apparently carries serious health side effects. Maybe someone else will take Frost proprietorship after things settle down. If you last that long. Plus the whole thing is risky.\n*if(gStatAmbition > gAmbitionThreshold)\n    The creature could destroy the camera and everything it has recorded. Not a deal-breaker if you get control of Frost, but you'd lose some excellent lead-in footage. That video will make excellent teaser previews. And serve as evidence of Frost killing people. \n    \n    *goto PostConsiderSigningLabel\n*else\n    If the timing isn't perfect, Frost could easily kill Lincoln before coming under control. Maybe even a few others. \n\n    *goto PostConsiderSigningLabel\n\n*label PostConsiderSigningLabel\n*page_break\nOr you could destroy the scroll. You know it rips easily enough. Although tearing the parchment will take more time than slapping on your signature. Plus you'll still need to coax Jockety to bump into Frost and distract him. That's some risky puppeteering.  \n\nThe good news is the torn scroll will drop the mummy instantly. At least it has ever time before this. Then you can burn the parchment on your own schedule.   \n \n*if(gStatAmbition > gAmbitionThreshold)\n    The bad news is convincing the cops Frost committed all these murders will prove trickier when he's a mummified corpse. Especially if the creature damages or destroys the camera before you can drop him. And there goes the story of the century. But at least you'll have stopped a murderer and saved everyone, for what that's worth. \n    \n    *goto PostConsiderDestroyScroll\n*else\n    The bad news has the same lead as slapping your signature onto the scroll, Lincoln could be killed or seriously messed up. Plus not having a walking, talking undead mummy weakens your story. \n\n    *goto PostConsiderDestroyScroll\n\n*label PostConsiderDestroyScroll\nOr you could just give Frost the scroll. There's a chance the egomaniac might just leave. And having the scroll seems like nothing but bad luck, maybe Frost will suffer the curse, turn into a newt or grow a conscience or something.\n\nMore likely, Frost will double cross you, attempt to murder everyone as soon as he has the scroll. Maybe if you drag out the handover, you can buy some time, hope another chance to escape arises. \n\n*if((gEnableSpellRemovalEnding > 0) and (gStatEmpathy > gEmpathyThreshold))\n    *page_break\n    Or you could recite the spell-dispersing passage. If only you spoke animal track. Maybe just speaking the animal names will do it. Even if it doesn't work, Frost will probably think you've panicked and are speaking in tongues. Maybe it will distract him enough to try something else. \n    \n    And if it does work, problem solved, a decommissioned mummy murder machine. You'll have saved everyone. Probably Jockety and the witches too. \n    \n    Except maybe yourself. The witches weren't too eager to try the spell. Not sure what that means, but it sounds unpleasant and long term.\n\n    *goto PostConsiderSpellRemovalLabel\n*else\n    Or you could recite the spell-dispersing passage, if only you knew more about it. Plus that seems like a sure way to get yourself killed. Forget that option.\n\n    *goto PostConsiderSpellRemovalLabel\n\n*label PostConsiderSpellRemovalLabel\n*page_break\n*choice\n    *selectable_if(gStatAmbition > gAmbitionThreshold) # Offer to give Frost the scroll if he agrees to a recorded interview. \n        *set gEndingSelected \"Interview\"\n        *goto_scene InterviewEnding\n    # Decide to slap your signature onto the scroll.\n        *set gEndingSelected \"Signature\"\n        *goto_scene SignatureEnding\n    # Decide to destroy the scroll.\n        *set gEndingSelected \"ScrollDestroy\"\n        *goto_scene ScrollDestroyEnding\n    # Decide to give the scroll to Frost. \n        *set gEndingSelected \"GiveScrollAway\"\n        *goto_scene GiveScrollAwayEnding\n    *selectable_if((gEnableSpellRemovalEnding > 0) and (gStatEmpathy > gEmpathyThreshold)) # Recite the spell dispersal passage. \n        *set gEndingSelected \"CurseLiftEnding\"\n        *goto_scene CurseLiftingEnding\n", "curseliftingending": "*comment\n*comment    CurseLiftingEnding.txt\n*comment\n\n*comment === Temp Variables\n\nYou try to decipher the faint animal tracks on the back of the scroll, especially the middle one obscured by the clenched fist of the severed hand. \n\n\"Dog! Bird! Um, raccoon?\"\n\nNothing happens, but you do have the room's attention. Everyone waits, either for an explanation or to see how your nervous breakdown will play out. \n\n\"Not sure I'm following you,\" says Frost. \n\nOkay, maybe a little more specificity. \"Wolf! Ah, let's say ... Hawk! Raccoon!\"\n\nAnd ... nothing happens. \n\n\"Still counting,\" says Frost, touching his nail to Lincoln's cheek. Your cameraman flinches away. \n\n*if(gOpalAwakened = \"no\")\n    \"Try making the animal noises,\" says Melody. \n    \n    *goto MakeAnimalNoisesLabel\n*else\n    \"Not words,\" yells Opal from behind a stack of fishing rods. \"Make the animal noises.\"\n    \n    *goto MakeAnimalNoisesLabel\n*label  MakeAnimalNoisesLabel\n*choice \n    # This was a bad idea. You slap the post-it note signature and the scroll together. \n        *goto_scene SignatureEnding\n    # [i] Hoooooowwwwwl! Screeeeeeetch! Hissssssssss? [/i]\n        *goto ChooseTheNoisesLabel\n\n*label ChooseTheNoisesLabel\n\"Time's up!\" says Frost. \n\nLincoln squeezes his eyes shut. \n\nFrost stands statue still. \n\n\"Blessed fig's end! Now what?\" says the mummy, unmoving except for his mouth and an odd twitching of his left ear. \n\nLincoln opens one eye and, seeing no inbound mutilation, opens his other eye. Frost subjects the cameraman to a menacing clacking of his teeth but otherwise remains frozen. \n\nJockety, Astrid and Fortuna stand with heads bowed, eyes closed, unmoving. \n\nA flash catches your eye. Arcs of electricity outline the animal tracks. \n\n\"Hey, something's happening,\" you say. The wolf print crackles with the highest density of sparks, while the raccoon only occasionally flickers. The hawk claw flares somewhere in between. The electricity occasionally zaps into Frost's severed hand, producing tiny wisps of overcooked barbecue smoke. \n\nLincoln pries at the arm around his neck, winning a small gap. He squeezes his head through the opening and scrambles to freedom, leaving the mummy wobbling but upright. \n*page_break\n*if(gOpalAwakened = \"no\")\n    \"The sparks are going away,\" says Clark, as he and Melody join you. \n    *goto PostLookingAtScrollSparksLabel\n*else\n    \"The sparks are going away,\" says Clark, as he, Opal and Melody join you. \n    *goto PostLookingAtScrollSparksLabel\n*label PostLookingAtScrollSparksLabel\nThe security guard has observed correctly, the light show indeed diminishes.\n\nWith a groan, Frost snaps his arms to his side. He takes a struggling step, like pulling his foot out of ankle-deep mud. \n\n\"It's wearing off,\" says Melody, \"Make the animal sounds again.\"\n\n\"[i]Hoooooowwwwwl.[/i]\n*line_break\n[i]Screeeeeeetch.[/i]\n*line_break\n[i]Hissssssssss.[/i]\"\n\nThe electricity bursts to its former intensity. \n\nFrost stands suspended mid-step. \"Grrrr. Stop that,\" he says. \n\n\"Now what?\" you ask. \"I can't be doing the call of the wild all day.\" \n*page_break\n\"I think you're doing the raccoon wrong,\" says Clark. \"I'm always chasing them away from the dumpsters. The hiss sounds different, more like [i]ha-hissSSSSS[/i].\"\n\n\"Nah, it's more in the front of the mouth,\" says Lincoln, joining the ensemble on the boat deck. \"[i]heeessssSSS[/i].\"\n\n\"How are you a raccoon expert?\" you ask.\n\n\"They sneak into my kitchen once in awhile. And then it's on.\" \n\n\"Uh huh.\" \n\n\"Try it, you'll see.\" \n\n*label TryRaccoonHissAgainLabel\n*choice\n    *disable_reuse # [i]Hoooooowwwwwl. Screeeeeeetch. ha-hissSSSSS.[/i]\n        The flashes around the raccoon track remain unchanged. \n        \n        \"Told you,\" says Lincoln. \"Now do it the right way, [i]heeessssSSS[/i]\"  \n        *goto TryRaccoonHissAgainLabel\n    # [i]Hoooooowwwwwl. Screeeeeeetch. heeessssSSS.[/i]\n        *goto PostRaccoonCorrectionLabel\n*label PostRaccoonCorrectionLabel    \nElectricity sizzles much brighter around the raccoon imprint. \n\n\"Ha,\" says Lincoln.\n\n\"I had my ear buds in while fighting those things. Must of distorted the sound,\" says Clark, not yet conceding his mastery of raccoon mimicry to the cameraman.\n\n\"Look, it's doing something different,\" says Melody. \n\nArcs from the two mammal prints grow out from the scroll, dancing violently. Without warning, the two stalks of electricity zap the fist clutching the scroll, vibrating it a second and then launching it in a high arc over the gunwale. \n\nThe hand slaps the floor and flops onto the mummy's boot. \n\n\"Now we're getting somewhere,\" says Lincoln.\n\n\"Grrrrrrrr! Farkle!\" Frost growls through clenched teeth. He vibrates fighting the paralysis and looks in high discomfort. \n\nThe trio of scroll-zombies sink into a sitting position, heads bowed slightly askew, as if trying to hear instructions from afar.\n*page_break\nWith Frost's hand ejected from the scroll you get a clear look at the hawk print. The lightning fires less frequently than on the other two tracks. \n\n\"I don't think I'm doing the bird yell right,\" you say. \n\n\"Why's that?\" asks Melody.\n\n\"It's not as sparky as the other two.\" \n\n\"Maybe it's a pigeon,\" says Clark. \"Try the noises with a [i]coo-coo-coooo[/i] sound.\" \n\n\"Shut up,\" says Lincoln, \"There wouldn't be any sparks if it were a pigeon.\"\n\n\"Any chance you've sparred with a hawk in your boudoir?\" you ask Lincoln. \n\n\"No, not a hawk.\" \n\n\"Maybe screechier,\" says Melody, \"Like, higher pitched and with a rise in the middle.\" \n\n\"Yeah, like you're about to swoop onto a mouse and eat it,\" says Clark. \n\n\"That's helpful,\" you say. \n*page_break\n\"Maybe hit the 'eetch harder?\" offers Lincoln.\n\n\"You will suffer,\" Frost says through clenched teeth. \n\n\"You just keep auditioning for Ripley's Belive it or Not,\" you respond.  \"All right, here goes.\" \n\n*label HawkYellNotQuiteThereLabel\n*choice \n    # [i]Hoooooowwwwwl. ScreEEEEEetch. heeessssSSS.[/i]\n        *goto SuccessfulHawkYellLabel\n    *disable_reuse # [i]Hoooooowwwwwl. ScreeeeeEETCH. heeessssSSS.[/i]\n        If anything, the sparks around the hawk track lessen. \n        \n        \"Try my way,\" says Melody. \"Make sure to warble the eeeEEEEeee's.\"\n        \n        \"Okay, here goes.\"  \n        *goto HawkYellNotQuiteThereLabel\n*label SuccessfulHawkYellLabel\nAll three animal tracks erupt with blue electricity. Fringe arcs sting your hand, forcing you to release the scroll. The parchment doesn't fall, instead hovering in front of you. \n\nFrost whimpers forlornly. \n\n\"Looks like you nailed it,\" says Lincoln. \n\nThe sparking grows into an angry, flickering ball of energy, encompassing the scroll and growing in intensity. You, along with everyone else, take several steps backward. \n\nCRACK!\n\nA lightning bolt jumps from the electrical storm and hits Frost in the forehead. The arc thickens as the mummy vibrates violently.\n\nProfessor Thadeus Frost, love potion salesman, con man and extremely unpleasant mummy, explodes.\n\nAn expanding cloud of mummy dust fills half of the loading dock. The creature's empty suit crumples into a haphazard pile amidst the floating particulate of its recent inhabitant.\n*page_break\n*achieve scrollundoing_01\n\"Oh yeah! Total badassery,\" says Melody. \n\n\"Okay, nobody breath in any of Professor Frost,\" says Clark, surprisingly taking charge. \"I'm going to look for a big vacuum cleaner.\" \n\n\"Great idea. Hey, that thing's still floating,\" says Lincoln. \n\nThe scroll hovers at head height, an occasional spark running around the animal tracks. \n\n*if(gOpalAwakened = \"no\")\n    \"Do you see Astrid and Fortuna out there?\" Melody asks, scanning into the falling dust for her fellow witches. \n   \n    *goto LookingForAstridAndFortunaLabel\n*else\n    \"Where are Astrid and Fortuna?\" asks Opal, looking for her friends inside the dust cloud. \n    \n    *goto LookingForAstridAndFortunaLabel\n*label LookingForAstridAndFortunaLabel\n\"What's it doing now?\" asks Clark as the scroll slowly rotates back and forth. \n\n\"No idea,\" you say, \"but it at least deserves a fist bump. Hey-\"\n\nAt the sound of your voice, the floating parchment snaps to face you. \n\n\"Um, thanks Mister, or, ah, Miz Scroll, for all you've done,\" you say. \"We all app-\"\n\nThe parchment springs forward, enveloping your head before you can flinch. The fabric tightens, squeezing hard against your skin. You feel dozens of cuts across your face. The pain flares intensely but then your consciousness clouds and then succumbs, your last sensation of agony and a particularly strong scent of a woodsy pot pourri.\n*page_break\n[b]An Unknown Time Later ...[/b]\n\nAn unpleasant darkness. Anxiety fills you, along with numerous aches, like all of your joints are misaligned. Your face hurts most of all. You can still feel the cuts. \n\nA refreshing breeze splashes across your face, first from the left and then the right. The relief feels invigorating, if a bit scratchy. \n\nScratchy?\n\nYou open your eyes. \n\nA tree branch attacks you. \n\n\"Gah!\" you cry as the twigs and leaves quiver about your face. Surprisingly, your discomfort lessons. \n\nThe tree stalk retreats, revealing Melody on the other end.\n\n\"About time,\" she says. \"Get up, we have to get out of here.\" \n\n\"What? Where ... what's-\" \n*page_break\nYou look around. You lie in a hospital bed. A couple of IV tubes snake down and pierce your arm, along with numerous sensors stuck to your upper chest and head. A rack of machines boop and beep, merrily monitoring your insides. The room is windowless. A partially open door leads to a bathroom. A number of uprooted plants and small bushes have been tossed about the space, clods of dirt scattered around the floor and the lower half of your bed. \n\n\"What happened?\" you ask, sitting upright. Wooziness overcomes you. \"Whoa.\"\n\n\"Stay with me,\" says Melody, shoving the branch back in your face. \n\n\"Stop it.\" The annoyance revives you. Or something does. \n\n\"Then move it. Get up,\" says Melody, lowering the tree limb. \n\n\"Not until you tell me what's going on.\" \n\n\"No time. Do you really want to stick around here?\"\n\nHer intensity gives you pause. The ensuing stare-down makes you aware of a growing sense of foreboding, like you're breathing poison air.  \n*page_break\n\"Okay, let's get- Ouch!\"\n\nMelody holds the freshly yanked-from-your-arm IV tubes in one hand. Her other fist closes around the cords leading to the sensors taped to what you think of as your baby-soft and sensitive skin. \n\n\"Wait! I can- Ahhhhhhhh!\"\n\n\"Keep it down, ya big baby,\" says Melody, dropping the plucked sensors onto the floor.  \n\nYou exhale slowly through your teeth, waiting for the stings to recede.\n\nRip!\n\n\"Missed one.\" \n\n\"Grrrrrr.\" \n\n\"Okay, let's go. Left out the door, then up the back stairs. Let me check the hallway.\" \n*page_break\nYou hop down from the bed, landing on a spilled plant. The leaves pleasantly tickle your bare feet. A draft wafts up your backside, billowing your hospital gown. The garment doesn't quite close the deal in the back, resulting in a full moonish situation. \n\n\"Hey, where's my clothes?\" you ask. \n\n\"I have some in the car,\" Melody responds, cracking the door to the hallway. \"Ssssshhh.\" \n\nYou step around the bed and stumble over a woman passed out on the floor. A hypodermic needle sticks from her neck. Her conservative red dress rides up to mid-thigh and a thrown plant rests in the middle of her back. She snores softly. \n\n\"Do I even want to know?\" you ask, nodding to the sleeping figure.\n\n\"She's not a friend. I'll explain everything when we get out of here. Let's go.\"  \n\nMelody slips into the hallway. Standing alone for even a few seconds fills you with anxiety. You follow the young witch out the door.  \n*page_break\nYou both hurry unseen into the stairwell and climb several flights. Your face feels odd, like something has been implanted under the skin. \n\n\"Are we heading to the roof?\" you ask, running your fingertips across your face and feeling odd ridge lines and divots where you expected smooth skin. \n\n\"They had you in a sub-basement. Almost there.\" \n\nYou ascend another set of stairs and arrive at a door crowned with a red exit sign. An adjacent narrow window reveals a short walkway to a nighttime parking lot. \n\n\"How long have I been out?\"\n\n\"Three weeks, give or take a day.\"\n\n\"What? Three-\" Your reflection chokes off your response. Thin scars crisscross your face. Odd shapes blemish your skin. Leaning forward, the discolorations look like tree leaves. Faint scribbles tattoo the center of your forehead. Continuing to stare, you see the doodles are cursive letters, mirrored in the window. Backward signatures. Your face has absorbed the scroll. \n\n\"What the hell happened to me?\"\n*page_break\n\"After you cast that spell to blow up Frost, the scroll sucked into your head,\" Melody says. \"More to tell but let's get away from here first.\" She opens the door to the outside and then quickly closes it. \"Wait.\"\n\nA trio of black SUV's and a military hummer converted into an ambulance drive past and stop at the hospital's entrance. A dozen women, all in red dresses, exit the vehicles and walk purposely into the building. \n\n\"That's who would have you if it weren't for me,\" says Melody. \n\n\"Who are they?\" \n\n\"Good question. But no time now. See that shiny black car there?\"\n\n\"The BMW M5? That's our getaway car?\"\n\n\"No, we're in the rusted out Corolla behind it. Let's go.\"\n\nMelody opens the exit door, pauses to make sure no one comes out of the main entrance and then runs for the parking lot. You fend off a shiver and chase after her. \n*page_break\nYou both reach the crap Toyota and hasten inside. Melody turns the key, producing some terminal sounding car hacks and wheezes but eventually the engine turns over on the fourth attempt. She drops it in gear and you escape the parking lot, free of pursuit. \n\nYou crawl into the back seat and struggle into the clothes provided; a bunch of hiking gear that more or less fits. At least the shoes feel comfortable. You toss the hospital gown out the window and notice your surroundings. The car winds through a narrow road overhung with forest trees. You haven't felt this good since waking up. Maybe it's the fresh air. \n\n\"So what the hell is going on?\" you ask from the back seat. \n\n\"Roll the window up so I don't have to shout.\" \n\nYou hesitate to turn the manual crank. A part of you prefers keeping the outside winds on your face over whatever happened in your recent past. Snapping out of it, you raise the glass. \n\n\"All right, so about five minutes after you passed out about a million cops and ambulances and fire trucks showed up. The medics couldn't wake you, so they rushed you off to the hospital. You've been in a coma since then. Oh, and remember that Russian satellite that was falling? It crashed in the parking lot just as all the cops arrived, right on top of your production van. Lincoln was not happy about that. That kinda overshadowed the whole Frost thing in the news. \n*page_break\n\"Anyway, the cops didn't really embrace our story right away, but they eventually let us go. Lincoln said some lady from your station, Betty or Brenda or something, pulled some strings and got us released. Over the next few days it seemed like the cops were starting to believe us, at least a little. They acted nicer and started asking more specific questions about Frost. Must of taken a closer look at the footage you and Lincoln shot.\"\n\n\"Crap. I hope he made copies before it got confiscated.\"  \n\n\"Don't know. But then the FBI showed up and took over. And they were being bossed around by these weird women in red. I'm still not sure who they are but I got serious bad mojo vibes from them. I was coming back home and saw about ten of them at my place along with three or four goony FBI looking dudes. I split. I'm lucky they didn't see me. And I took Jockety, Astrid and Fortuna with me.\"\n\n\"Those three were still together?\"\n\n\"Yeah. They were all staying at Astrid's place, and not doing that great. Kinda in a daze, barely eating, bumping into the furniture. They perked up once I got them out in the woods. We just started hiking out into the back country, way out in the national forest. We found this abandoned hunting cabin or hermit retreat or something. All of us have been living out there the last few weeks. They taught me a bunch of spells, conjurings, lots of other stuff. A real info dump. I kick ass now, witch-wise.\"\n*page_break\n\"Then why did you come back?\" \n\n\"A few days ago all three of them said I had to go save you. Like, really insisted. Told me to trust nature, whatever the hell that means. I humped it back to civilisation in forty eight hours, walking day and night. Stole a car and went straight to your room, where you were still sawing logs. \n\n\"I knew waking you up had something to do with nature, so I threw a bunch of plants around your room and slapped you with a tree branch. Ta-da! Here your are. Oh, and I had to knock out the devil in the red dress and her big hypodermic needle when she walked into the middle of, um, my procedure. Like I said, certified ass-kicker. Okay, this is as far as wheels will take us. Up for some hiking?\" \n\nMelody has stopped the car behind some large bushes and killed the lights. The night creatures of the forest serenade you. \n\n\"Hike where?\"\n\n\"Out to Astrid and the gang. They said you'd want to. Do you?\"\n\n\"Um, I don't know.\" \n*page_break\nYou consider your options. Being out in the woods feels great. Even your face doesn't hurt anymore. The more you think about trekking into the wilds, the more comfort the idea brings. \n\n\"Don't make me enchant you,\" says Melody, doing something witchy with her hands. \"Although I'm not sure it will work, what with the scroll all stuck inside your face.\"\n\nThe compulsion to head into the forest overwhelms you. Any other option feels ominous, like going down a waterslide into a shark tank.   \n\n\"Put it back in the holster,\" you respond. \"Lead on.\" \n\nYou hike for several days. Melody tries conversing but you drift off. Her voice always seems distant, barely audible over a serene hum produced by the forest. Or from somewhere, maybe the scroll clogs your ears. The young witch says she doesn't hear anything except the occasional bird. \n\nYou arrive at the cabin, the structure more collapsed than standing. Jockety, Astrid and Fortuna sit line abreast in three rocking chairs across the front porch, individual blankets wrapped around their lower halves. The former FBI agent presides in the middle, holding hands with the witch on either side. They appear more aged than previously, but look at peace, small smiles locked on their faces. All three are dead. \n*page_break\nMelody cries and eventually helps you bury the trio in a meadow not far from the cabin. After that, the young witch doesn't want to remain. You can't imagine leaving. She promises to lay low until the government departs and that she'll check in on you in a few weeks. \n\nThe days drift by in a haze. You find food easily, as if you've signed the forest to a catering contract. You casually repair the cabin, making it more habitable. Melody returns in what feels like a couple of days but she tells you it's been four weeks. \n\nShe tells you the case has been closed, the official version concluding that a steroided former gymnast with an unhealthy obsession with the local Bod-ey man legend and a strong dislike of antiquers went berserk and murdered three people, then got disintegrated by a falling Russian satellite. You barely grunt a response and then request Melody bring you a camera and some small solar panels for charging the batteries. You're not going back. \n\nSomehow, Melody fulfills your wish list over the following months. You capture amazing nature photos and videos. You have an uncanny sense of where to go and when to arrive. The young witch ferries the footage to Lincoln, who acts as your agent. You win many awards, but never leave the wild. \n\nAnd so you live out your days. Reclusive and alone, but never lonely. The cabin remains spartan but livable. Human contact forever feels distasteful if not slightly toxic. The natural world keeps you peacefully mesmerized and trouble never arises from any reanimated mummified corpses. \n*page_break\n*goto_scene ending\n", "epilogue": "*comment\n*comment    Epilogue.txt\n*comment\n\n*comment === Temp Variables\n*temp       lNetflixStars\n\n*set gEnableHealthAchievements 1\n[b]Myron, once-proud owner of many crates of Birley's Orange Soda[/b]\n*line_break\nMyron never did sell his stockpiles of orange soda, despite shilling at dozens of antique shows, listings on E-Bay and a poorly planned afternoon spent twirling a sign during rush hour. The vintage soft drink eventually went into a storage locker, leaked after a year and became a superfund clean-up site. \n\n[b]Colonel Bedford Davis[/b]\n*line_break\nThe Colonel never fully recovered his health after the mummy's attack. Angry and vengeful after losing his prized possession without compensation, he filed law suits against your public television station, the antique show, the display hall, the city, Hillary Clinton, and Clark the security guard. They all failed. He did succeed in settling out of court with Myron and won a case of Birley's soda as compensation, but the Colonel died of a severe acid-reflex reaction after drinking the vintage fizzy orange refresher. \n\n[b]Mike, um, I mean Roger the Sound Guy[/b]\n*line_break\nEnjoyed a long career holding boom poles and attaching lapel microphones. Owns a dozen cats, but calls them all 'Mike'.\n*page_break\n[b]Brenda Tilwilliger[/b]\n*line_break\nContinued her reign as the antique show's presenter for several years. She was researching a run for United States senator when she received a marriage proposal from the newly crowned king of Brunei, a huge fan of antiques in general and Brenda in particular. She accepted and now yachts from one coastal antique hot spot to the next.\n\n[b]The Sheriff of the Old West booth[/b]\n*line_break\nSold his entire inventory for an exorbitant price to the famous country and western band \"Don't Toast the Inbred\". He became a roadie for said band and still schleps equipment for them today. \n\n[b]The Display Hall Food Concession where the dark magic went down[/b] \n*line_break\nThe employees and customers frequently reported the meat products move of their own volition, even after cooking. The phenomenon added a unique aftertaste to the offerings, garnering a loyal following of patrons. The food stand eventually received a Michelin star.  \n\n*page_break\n[b]Clark the Security Guard[/b]\n*line_break\nAsked Melody out on a date to the sport fishing convention held later that week. After an awkwardly long pause, she politely declined. Failed his guardianship probation after being bested by a nine-year old skateboarder causing a disturbance during an Adidas outlet sale. Clark went on to host a popular podcast critiquing TV ghost hunting shows. \n\n[b]Opal the (part-time) Forest Shaman[/b]\n*line_break\nRegretted her dalliance with forest sorcery and abandoned it for quilting. She lost touch with her fellow witches but still gets an occasional e-card from Melody. Opal avoids the woods, parks and overly-leafy florists. She replaced her front and back yards with concrete but did paint them green. \n*page_break\n[b]Melody the Young Witch[/b]\n*line_break\nAfter turning down Clark, Melody took a solo camping trip into the wilderness. Finding peace and solace in the forest, she continued taking longer and longer sojourns into the wilds, eventually dropping out of her final semester at the local junior college. She did return for her final project in Earth Sciences, the only class she enjoyed. \n\nOnce she convinced the teacher she was still enrolled, Melody explained to her fellow students that science could not explain everything, at least not yet. To prove it, she would make a small potted branch of ivy flower and grow. In seconds. And she did. Unfortunately the plant didn't stop, instead spreading with great rapidity. The vines quickly entwined everyone in the room. A combined four lawn services took over six hours to free everyone. Of the young witch, there was no sign. And she flunked the class. \n\nThe next day, stoic women in red appeared, asking questions, flashing vague government identification, probing bodies and plants with odd instruments, and in general, taking over with extreme impoliteness. Despite a robust search, Melody was not found. And she hasn't been seen since.  \n\n*page_break\n[b]The Scroll Zombies [${\"\"}retired] [/b]\n*line_break\nThe three fell into a deep sadness and mourning for their lost years, especially Jockety. The two elder witches tried to comfort him, with all three moving into Astrid's small house. The trio shunned contact from outsiders, including former friends and family. They soon grew isolated. \n\nThe surrounding forests provided a sense of peace. They spent ever increasing time in the wilds, eventually abandoning civilization for the uninhabited backwoods. After many days of a long, slow hike, they found a derelict cabin. The three passed many peaceful years there, restoring the building, tending a flourishing garden and gathering food from the abundant wild growth. Melody visited occasionally, bringing what supplies she could afford or scavenge. \n\nJockety, Astrid and Fortuna died quietly during the same cold winter's night, whispering unheard epitaphs and then fading to stillness.\n*page_break\n[b]Lincoln[/b]\n*if(gStatAmbition > gAmbitionThreshold ) or (gEndingSelected = \"GiveScrollAway\")\n    *line_break\n    *goto LincolnEpilogueIntroLabel\n*else\n    *line_break\n    Your former cameraman earned a hefty worker's comp settlement and rolled it into a down payment on a condo in the hip part of town.\n    \n    *goto LincolnEpilogueIntroLabel\n*label LincolnEpilogueIntroLabel\nEndorsed by you and Brenda, Lincoln took over as the producer of the antiques show. Brenda continued to mentor him and eventually brought him on as co-host, where he proved quite popular. After Brenda's royal nuptials, Lincoln became the sole host of the show, where he continues to thrive. \n*if(gStatAmbition \u003c gAmbitionThreshold ) and (gEndingSelected != \"GiveScrollAway\")\n    His public especially love his decorative and varied eye patches. \n\nAs to his participation in the Frost affair, Lincoln refuses to comment.   \n*page_break\n[b]${name}[/b]\n*line_break\n*if(gStatAmbition \u003c gAmbitionThreshold ) or (gEndingSelected = \"GiveScrollAway\")\n    Worried of confiscation, you kept silent about your Frost-in-action footage until copied and safely hidden. With only witness accounts and no body of the supposed killer mummy, the police's eyebrows arched with increasing skepticism about the supernatural elements in your story. When you presented the video days later, the cops immediately snatched it as evidence. The delay made the authorities suspect the contents were somehow enhanced or altered to sensationalize the back-from-the-dead aspect of the story. \n    \n    After watching a hamburger flip itself a couple of times on the grill of the haunted food concession, the main investigators became more serious about your allegations. At least until the FBI took over the case. \n    \n    *label NonDivergedYouEpilogueSectionLabel\n    The government agents deferred to their consultant, Doctor Ruth Badensberger, who claimed a Ph.D. in psychiatry and always wore red. Despite never interviewing anyone, she rendered the investigations final conclusion; a steroided former gymnast with an unhealthy obsession of the local Bog-ey man legend and a strong dislike of antiquers went berserk and murdered three people. He was killed in the parking lot by a falling Russian satellite. Case closed.  \n    *page_break\n    *if(gEndingSelected = \"GiveScrollAway\")\n        After tapping your savings, credit cards and 401K, you embarked on creating a documentary exposing the real story.  \n        *goto ScarOrNoScarEpilogueLabel\n    *else\n        *if (gFilmDestroyed = 1)\n            After receiving your workers' comp award for your lost eyesight and facial scars, you embarked on creating a documentary exposing the real story. Having all of the show footage destroyed really dampened the impact, but you must tell this story. \n            *goto ScarOrNoScarEpilogueLabel\n        *else\n            After receiving your workers' comp award for your lost eyesight and facial scars, you embarked on creating a documentary exposing the real story.\n            *goto ScarOrNoScarEpilogueLabel\n    *label ScarOrNoScarEpilogueLabel \n    Unfortunately Jockety, Astrid, and Fortuna refused to see you, Melody disappeared, the FBI wouldn't comment about current and former employees, and Lincoln, worried about his growing popularity, declined to comment publicly. In private, your former cameraman urged you to leave all that dark mojo alone, else you get some on you via proximity. Like Jockety.\n    *if (gFilmDestroyed = 1)\n        *set gFilmScore 20\n    *if(gFilmScore > 30)\n        *set lNetflixStars \"five stars\"\n        *set gNetflixStars 5.0\n        *goto AfterTheNeflixStarsAssignmentLabel\n    *elseif(gFilmScore \u003c= 30) and (gFilmScore > 27)\n        *set lNetflixStars \"four and a half\"\n        *set gNetflixStars 4.5\n        *goto AfterTheNeflixStarsAssignmentLabel\n    *elseif(gFilmScore \u003c= 27) and (gFilmScore > 24)\n        *set lNetflixStars \"four\"\n        *set gNetflixStars 4.0\n        *goto AfterTheNeflixStarsAssignmentLabel\n    *elseif (gFilmScore \u003c= 24) and (gFilmScore > 21)\n        *set lNetflixStars \"three and a half\"\n        *set gNetflixStars 3.5\n        *goto AfterTheNeflixStarsAssignmentLabel\n    *else \n        *set lNetflixStars \"three\"\n        *set gNetflixStars 3.0\n        *goto AfterTheNeflixStarsAssignmentLabel\n    \n    *label AfterTheNeflixStarsAssignmentLabel\n    *set gShowNetflixScore 1\n    \n    Despite the set backs, you finished the film. After being picked up by several smaller festivals, Neflix made an offer. The film garnered ${lNetflixStars} stars and lead to some additional opportunities. You ponder what path to take next.\n    \n    *choice\n        *selectable_if (gFilmScore > 24) # Netflix offers a position as an investigator on the second season of their ghost hunting show 'Spook Kooks' (Rated four out of five by Clark's blog, despite the dorky name).\n            *goto ANewStoryLabel\n        *selectable_if (gFilmScore \u003c= 24) # A Mexican ghost hunting show offers you a position as its [i]Experto Americano[/i] (Rated three out of five by Clark's blog).\n            *goto ANewStoryLabel\n        # Ignore the offers and keep researching Frost, the Bates siblings, forest shamans, Melody's whereabouts, women in red, and the FBI real life X files.\n            *goto ANewStoryLabel\n        # Return to your PBS station and take that offer to work for Frontline.\n            You do well and enjoy your new investigative life, but always regret not exposing the Frost story. \n            \n            *goto EndOfYouEpilougeLabel\n        *if(gEndingSelected != \"GiveScrollAway\") # Accept the offer to make commercials for that designer eye patch company.\n            You enjoy the cash stipend and go on to make additional commercials, culminating with a car ad shown during the Super Bowl. While financially rewarding, you regret not exposing the Frost story. \n            \n            *goto EndOfYouEpilougeLabel\n            \n    *label ANewStoryLabel\n    An excellent choice and one that produces numerous adventures, but that's a story for another time. \n    \n    *goto EndOfYouEpilougeLabel\n\n*else\n    With only witness accounts and no body of the supposed killer mummy, the police arched increasingly skeptical eyebrows about the supernatural elements in your story. But after watching a hamburger flip itself a couple of times on the grill of the haunted food concession, the main investigators became more serious about your allegations. At least until the FBI took over the case. \n\n    *goto NonDivergedYouEpilogueSectionLabel\n\n*label EndOfYouEpilougeLabel\n*page_break\n*goto_scene ending\n", "givescrollawayending": "*comment\n*comment    GiveScrollAwayEnding.txt\n*comment\n\n*comment === Temp Variables\n*temp lNeckBraceRemains\n\n*comment === CHAPTER START\n\"Okay, you win. Here you go,\" you say, jerking the scroll forward. Jockety lurches with the movement, bumping the mummy. Frost side-glances toward the contact then quickly returns his attention to you. \n\n\"Bring the deed forthwith,\" says Frost, \n*if(gStatAmbition > gAmbitionThreshold) \n    giving the camera a couple of solid stump thumps. \n    \n    *goto GiveAwayScrollPostThreatOneLabel\n*else\n    twirling his index finger and its sharpened nail in front of Lincoln's right eye. \n    \n    *goto GiveAwayScrollPostThreatOneLabel\n*label GiveAwayScrollPostThreatOneLabel\n\"What are you doing?\" asks Melody, \"He'll kill you the second he gets the scroll. And then kill the rest of us a few seconds later.\"\n\n\"Maybe,\" you respond, hopping down from the fishing boat. \"Maybe we'll get lucky.\" \n\n\"That's the plan?\" asks Clark. \"We should just start running instead.\" \n\n\"Yes, you should,\" you say. \n\n\"All stay put,\" says Frost. \n\nYou stop.\n*page_break\n\"Not you, obviously,\" says Frost, nodding his head for you to come hither. \n \n\"Oh, right.\" \n  \n\"Don't give him that scroll,\" says Lincoln. \"He's sells snake oil.\" \n\n\"What?\" says Frost. \"My potions work. Most of the time. And I'm renowned for keeping my word.\" \n\n\"Yeah, just ask that dead church guy or the twins,\" says Lincoln. \n\n\"You should ask them,\" Frost responds. \"I promised them horrible deaths and they died horribly. And the Bates weren't twins, just siblings. Ah, scroll please.\"  \n\n\"Hostage first,\" you say.\n\n\"You are a master negotiator. Very well.\"\n \n*if(gStatAmbition > gAmbitionThreshold) \n    Frost thrusts the camera into your chest, pushing you back a step. \n    \n    \"Ow.\" \n    *page_break\n    The camera dangles at the end of the mummy's extended arm. You slowly reach for the handle, being careful to avoid touching Frost's hand. \n    \n    You give an experimental tug but the creature doesn't let go. You make eye-to-gaping-eyehole contact. Frost surrenders his grip, one finger at a time. \n    \n    You lower the camera to your side. Frost rolls his hand palm up, flexes his fingers twice in a grabbing motion and comes to rest with his digits stretched flat, awaiting his part of the exchange.\n    \n    *label FrostGivenScrollLabel\n    You raise the scroll and the attached clenched fist a quarter meter above Frost's hand, hesitate a second, then drop it. \n    \n    Frost snatches his prize from the air. \n    \n    \"At last,\" says the mummy, as his severed hand releases its grip on the scroll and scampers up his arm to the shoulder, where it perches like a pirate's parrot. \n    \n    \"Well then,\" you say, \"We'll just be on our way. Nice meeting you.\"\n    *page_break\n    \"Changed my mind,\" says Frost, \"I'm going to kill all of-\"\n    \n    Jockety, Astrid and Fortuna crash into the mummy from three different directions. The tangled mass of the afflicted living and undead tumble and fall backward.  \n    \n    *goto GiveAwayScrollPostThreatTwoLabel\n*else\n    *page_break\n    Frost releases your cameraman with a spin, twirling him free like some demented tango dancer. Lincoln whirls a few rotations until bumping into a support post. He holds fast, waiting for the dizziness to lessen.\n    \n    The mummy leaves his hand extended, palm up. He flexes his fingers twice in a grabbing motion and then comes to rest with his digits stretched flat, awaiting his part of the exchange.\n    \n    *goto FrostGivenScrollLabel\n*label GiveAwayScrollPostThreatTwoLabel\n*if(gStatAmbition > gAmbitionThreshold)\n    \"Run for it!\" you yell. \n    \n    *goto PostRunForItLabel\n*else\n    \"Run for it!\" you yell, but hold off flight long enough to grab Lincoln's camera sitting on the ground.\n\n    *goto PostRunForItLabel\n*label PostRunForItLabel\n\"This way,\" yells Clark, pointing to an exit sign. \n\nAll able bodies scramble for the escape hatch. You tuck the camera under your arm, secured like a grid iron star carrying the ball. \n\n*if (gOpalAwakened = \"yes\")\n    Opal reaches the door first and holds it open. \n    *goto OpalKickOpenDoorGivaAwayBranchLabel\n*else\n    The security guard arrives first and kicks open the door. \n    *goto OpalKickOpenDoorGivaAwayBranchLabel\n*label OpalKickOpenDoorGivaAwayBranchLabel\nYou rush into the parking lot behind everyone else, the thuds of tossed scroll-zombies spurring you onward. \n\n\"Head for the van,\" you say. \"Over there.\" \n\nAbout fifty meters away, a vehicle decaled with the local PBS affiliate's logos sits parked on the sidewalk. The group tacks left, dashing between the vehicles.\n\nYou pass a huffing Clark and pull in behind Lincoln. Melody keeps pace ahead. \n*if(gOpalAwakened = \"yes\")\n    Opal waddles in front and pulls away. \n*page_break\n\"Get the keys,\" you yell to the cameraman.\n\nLincoln digs into a vest pocket, pulls free a ring of keys but fumbles them. They hit the concrete with an angry jangle. \n\nScooping low while keeping stride and a firm grip on the camera, you snag the keys. \n\n\"Which one opens the van?\" you ask.\n\n\"The one marked 'Van',\" Lincoln says. \n\nYou join the group beside the vehicle, flipping through your choices. Clark, breathing hard, pulls in behind you. \n\nA heavy thud disrupts your search.\n\n\"Alas, it appears your luck has finally withered while mine blooms afresh,\" says Frost from atop the van. The mummy flaps the scroll at you. His severed hand still roosts on his shoulder. \n*page_break\n\"Ugh,\" you say. \"Why don't you just give us a break. We can all go our separate ways.\" \n\n\"But that lacks a certain ... festivity,\" Frost replies. An unusual light brightens the parking lot, emanating from a distant spot in the sky. \"See, even the heavens approve. Any last words?\"\n\nThe illumination grows stronger.\n\n\"I hope that scroll is cursed.\" \n\n\"Not my choice of an epitaph, but so be-\"\n\nA roar deafens you as the glare becomes blinding. \n\nA fiery streak hits the van. \n\nKA-BOOM!\n*page_break\nThe explosion blows you backward. A whirring buzz screams past, followed closely by a wave of heat across your face. You slam into a car door and collapse to the ground, fragmented safety glass waterfalling over your shoulders.\n\nYour vision
