<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A Mummy Is Not An Antique — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>

  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>

    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "mummyisnotanantique", "title": "A Mummy Is Not An Antique", "scenes": {"achievementsubroutines": "*comment\n*comment    AchievementSubroutines.txt\n*comment\n\n*label achieveCheckAmbitionLabel\n*if(gStatAmbition > gAmbitionAchievementThreshold)\n    *check_achievements\n    *if not(choice_achieved_ambition_01)\n        *achieve ambition_01\n*return \n\n*label achieveCheckEmpathyLabel\n*if(gStatEmpathy> gEmpathyAchievementThreshold)\n    *check_achievements\n    *if not(choice_achieved_empathy_01)\n        *achieve empathy_01\n*return \n\n\n", "act2batessiblings": "*comment\n*comment    Act2BatesSiblings.txt\n*comment\n\n*comment === Temp Variables \n*temp lGaveAwayScroll 0\n*temp lScrollInHand 0\n*temp BroQuestionSelected 0\n*temp BroTotalQuestionsAsked 0\n*temp SisQuestionSelected 0\n*temp SisTotalQuestionsAsked 0\n*temp lLincolnUsesPistol 0\n*temp lTriedPayingSheriff 0\n*temp lTriedBrendaWithSheriff 0\n*temp lTriedReasoningSheriff 0\n*temp lRescuedByBrenda 0\n*temp lNeckBraceQuestion1 0\n*temp lNeckBraceQuestion2 0\n*temp lNeckBraceQuestionsAsked 0\n*temp lNeckBraceReturnLabelVar 0\n*temp lPassiveSibling 0\n*temp lPassiveHeOrShe 0\n*temp lAggressiveSibling 0\n*temp lAggressiveHeOrShe 0\n*temp lDraggedResponse \"say\"\n*temp lTangledInDeadBates 0\n\n[b]Chapter Two[/b]\n\nYou and Lincoln assume a casually surreptitious stroll among the antique booths, although the inadvertent prods from the carried tripod garners more than a few annoyed glances and stares. Most of the stalls fill steadily, as the browsers and proprietors spectating at the medical emergency dissipate across the show.\n\n\"Man, I lucked out with this gig,\" says Lincoln. \n\n\"Why's that?\"\n\n\"Drier, no wind and above freezing. All the crazy that just happened is a bonus.\"\n\n\"Ah, Big Boss Bernie was going to send you out to cover the satellite crash. Where'd his premonition think it would land?\" \n\n\"Up on Ice Flea Pass.\"\n\n\"Very specific. NASA has it narrowed down to the western hemisphere. Anyway, we might both wish we were hanging with the ice fleas if we keep Brenda waiting and don't come up with something. Hold it.\"\n\nSeveral stalls up ahead, an isolated witch does battle with her cell phone. She stands in an empty old west antiques booth and has her back to you, allowing an unseen approach.\n*page_break\n\"Where are you?\" she says into the phone as you close within hearing range. \"Opal? Can you hear me? Hello? Bah, I curse thee, foul mobile carrier.\" \n\nLincoln stops you and points.  \n\nThe Bates siblings close on the witch from the opposite direction. They don't see you yet.\n\n*choice\n    # Hold your ground.\n        *set gStayPut_SiblingsPursuit \"true\"\n        *goto siblingsPounce\n    # Move toward the Bates siblings and the witch.\n        *set gStayPut_SiblingsPursuit \"false\"\n        *goto siblingsPounce\n        \n \n*label siblingsPounce\nThe siblings split to either side of the distracted witch. The brother catches his sister's eye, performing a complicated series of hand gestures, possibly conveying a plan to capture their quarry or perhaps suffering a sudden and severe case of the nervous fidgets. \n\n\"Opal? Where are you? I know you're at the antiques show. Where at the -- Hello?\" says the witch into her failing phone.\n\nThe sister stares uncomprehendingly as her brother finishes gesturing. He glares back and starts to repeat his complicated genuflection. \n*if(gStayPut_SiblingsPursuit=\"true\")\n    The female Bates flips off her brother and then steps in front of the witch. \n    \n    \"Astrid, isn't it?\" she says. \n    \n    The enchanter spins to escape but brother Bates blocks her path. \"I think this one is Fortuna,\" he says as the witch pulls to a stop in front of him. \n    \n    Lincoln nods his head toward the booth. You motion to stay put.\n    \n    \"Stand back,\" says the witch, pulling something from her pocket. \"We made this scroll and we can unleash its curses.\"\n    \n    The brother, clearly intimidated, takes several steps backward.\n    \n    *page_break\n    \n    \"Idiot, she's holding a flyer for the antique show,\" says sister Bates.\n    \n    \"Leviosa!\" says the witch, elaborately flinging the paper at the brother. He flinches into a rack of feather boas. The witch flees past the brother as he counter attacks the befeathered accessories. \n    \n    Fortuna (or is it Astrid) cuts to the right exiting the booth and heads right at you. \n    \n    *fake_choice\n        # \"We can help you\", you say.\n            *set gStatEmpathy + 1\n        # \"Do you have a few moments for a quick interview?\" you say.\n            *set gStatAmbition + 1\n    \n    The witch pulls a left-right fake of NBA-quality and rushes past you. As you watch her zoom away the Bates sister slides by on your other side, in close pursuit.\n    \n    \"Hey! Stop,\" you yell as brother Bates crashes into you from behind, tumbling both of you to the floor. You flail a bit but regain your feet relatively quickly. The male Bates has also recovered. Lincoln jumps to the other side of the brother, blocking his escape routes. \n    \n    \"Oh yeah, it's happening,\" you say to your trapped prey, \"You're doing an interview.\" \n    \n    Your subject warily backs into the still-unpeopled booth featuring the old west antiques. You and Lincoln follow him into the stall. \n    \n    *if(gHasScroll=1)\n        \"Okay, I'll answer your questions,\" says the Bates brother, coming to a halt. \"Ask away.\" \n        \n        \"Really? Huh, I thought you'd be a dick about it.\" \n        \n        \"Just hand over the scroll piece first. I saw you pocket it.\"\n        \n        \"Dick.\" \n        \n        The Bates brother shrugs, puts his hands in his pockets and tries to whistle but ends up exhaling loudly instead. How should you play this to get him to talk? \n        \n        *fake_choice\n            # You pull the scrap of woody parchment from your pocket.\n                \"Don't do it, boss,\" says Lincoln. \"This dude will just take off with it.\"\n                \n                \"I would never,\" says the male Bates. \"Perhaps a introduction will establish a proper footing. I'm Lester Bates and my missing companion is Emma, my sister. The sinister Mr. Frost and my family have a long history.\"\n                *set gKnowSiblingsName 1\n                \n                \"How long?\", you say.\n                \n                \"Scroll please,\" Lester says, holding out his hand.\n\n                *choice\n                    # You give Lester the torn scroll segment.\n                        *set lGaveAwayScroll 1\n                        *set gHasScroll 0\n                        *set gStatAmbition + 2\n                        \"Lincoln, record this,\" you say.\n                        \n                        \"Tripod or handheld?\"  \n                        \n                        \"Handheld. No time to waste.\" \n                        \n                        Lincoln shoulders and aims the camera as you plug in a handheld microphone. \n                        \n                        *goto GaveScrollAwayLabel\n                    # \"I think I'm going to need a few good faith answers first,\" you say. \n                        *set lGaveAwayScroll 0\n                        *set lScrollInHand 1\n                        Lester withdraws his hand and begins a bored visual survey of the old west antiques.\n\n                        *goto DecidedToKeepScroll\n                        \n            # \"What scroll piece?\" you say.\n                \"My mind has completely blanked,\" says the brother sibling, staring vacantly into the far rafters. His jaw slackens.\n                \n                *set lGaveAwayScroll 0\n                *goto DecidedToKeepScroll\n        \n        *label GaveScrollAwayLabel\n        *if(lGaveAwayScroll=1)\n            \"Rolling,\" he says. \n            *set gFilmScore + 2\n            \n            \"Mr. Bates, let's shed some light on this situation,\" you say offscreen in your best documentary voice-over tone. You ask;\n            \n            *label BroInterviewQuestions\n            *set BroTotalQuestionsAsked + 1\n           \n            *choice\n                *if(BroQuestionSelected != 1) \n                    # \"Is this a publicity stunt? Are you promoting a video game or doing this for your Youtube channel?\"\n                        *if(BroTotalQuestionsAsked >= 2)\n                            *goto BroTrapSprung\n                        *else\n                            \"Nope,\" says Lester. \n                            \n                            You wait for him to explain what he and his sister are up to but no more information is forthcoming. \n                            \n                            \"No more questions?\" Lester asks.\n                            \n                            \"Oh I have a lot of questions,\" you say and then ask;\n                            *set BroQuestionSelected 1\n                            *goto BroInterviewQuestions\n                *if(BroQuestionSelected != 2)\n                    # \"It looks like the Colonel really got injured. Was that part of the show?\"\n                        *if(BroTotalQuestionsAsked >= 2)\n                            *goto BroTrapSprung\n                        *else\n                            \"He deserves whatever happens to him,\" says Lester. \n                            \n                            \"That's pretty harsh. Why do you feel that way?\"\n                            \n                            \"Dirty laundry in public and all that. Next question.\"\n                            *set BroQuestionSelected 2\n                            *goto BroInterviewQuestions\n                *if(BroQuestionSelected != 3)\n                    # \"Have you guys pranked Father McCloskey? Our research indicates he's legit.\"\n                        *if(BroTotalQuestionsAsked >= 2)\n                            *goto BroTrapSprung\n                        *else\n                            \"I've never seen that priest before today,\" says Lester, obviously lying. \n                            \n                            \"He knows who you are.\"\n                            \n                            \"Really? Creepy. Are we done now?\"\n                            \n                            You want to call him on the dishonesty but figure another tact will be more productive.\n                            *set BroQuestionSelected 3\n                            *goto BroInterviewQuestions\n                *if(BroQuestionSelected != 4)\n                    # \"Are you guys cos-playing?\"\n                        *if(BroTotalQuestionsAsked >= 2)\n                            *goto BroTrapSprung\n                        *else\n                            \"Cause what? What are you talking about?\" asks Lester.\n                            \n                            \"What's the gag? Why are you doing this?\"\n                            \n                            \"It's a private affair and none of your business. Are we done?\"\n                            \n                            \"Oh we're just getting started,\" you reply and then ask;\n                            *set BroQuestionSelected 4\n                            *goto BroInterviewQuestions\n        *comment - need a goto here because of syntax requirements, not for logic\n        *goto DecidedToKeepScroll\n    *else\n        *comment The !gHasScroll bro branch\n        *fake_choice\n            # \"If you're in trouble, I can help,\" you say. \n                *comment empathy +1\n            # \"Tell me what's going on, completely off the record,\" you say, nodding for Lincoln to set up the camera.\n                *comment empathy -1\n            \n        The brother sibling assumes a vacant stare and leans on the counter.\n        \n        *goto DecidedToKeepScroll\n\n    *label DecidedToKeepScroll\n    \"We always get our answers,\" says Lincoln. \"Like Scooby Doo.\"\n\n    The brother sibling eyes an old jar on the counter, opens it, and pops a chunk of beef jerky in his mouth. \n        \n    *fake_choice\n        # \"You going to pay for that?\" you ask.\n            The brother thinks for a moment, then slowly nods in the negative.\n            \n        # \"You know that meat is an antique, over a hundred years old,\" you say.\n            The brother continues to chew, but slower.\n            \n        # You stare intimidatingly.\n            The brother chews his jerky, your hard gaze having no effect. You'll need to try something else.\n        \n    *fake_choice\n        # \"It says here on the label that's not even beef jerky,\" you say. \"It's made from old cowboy chaps.\"\n        # \"Well, are you going to share?\" you ask.\n        # \"Look, you can talk to us here or the boys are going to take you down to the station,\" you say. \n            \"What boys?\" asks Lincoln.\n                \n    The Bates brother motions you and Lincoln closer. He begins to speak but stops. He holds up his finger in a wait-a-sec motion, then points to his chewing mouth. The vintage beef jerky maintains its stalemate with his digestive process. \n       \n    *set gBroSiblingEatsJerky 1\n    *goto BroTrapSprung\n        \n    *label BroTrapSprung\n    CLINK! \n\n    A iron manacle encircles your ankle. \n    \n    CLINK! \n    \n    A second manacle envelopes Lincoln's leg. Chains from each shackle run to a large iron ball. A pair of feminine arms slide back under the wall to the adjacent booth. Giggles bubble over the divider.\n\n    *if(gHasScroll = 1)\n        *if (lScrollInHand = 1)\n            With your attention diverted, the Bates brother plucks the scroll piece from your hand.\n            \n            *goto BatesBroScrollPluckLabel\n        *else\n k, but no keys.\n            \n            \"We already have a key,\" says Lincoln, holding Emma's pistol. \"Just need some ammo.\"\n\n            *goto PostGunFindLabel\n        \n        *label PostGunFindLabel\n        \"Funny,\" you say. \"Aha, found it. Them.\" A ring of at least fifty rusty skeleton keys hangs from the wall. You grab them. \n        \n        \"Ooooo, bullets,\" says Lincoln, looking into a newly opened drawer. \n        \n        \"Don't even think about it,\"  you say, unsuccessfully trying a key. A witch runs past the booth, followed closely by the male Bates brother. \n        \n        \"Story's getting away,\" says Lincoln, chambering a few rounds into the pistol.\n        \n        The next key fails to open the lock. Only forty-eight more to try. If any of them even work. \n        \n        \"How good a shot are you?\" you ask. \n        \n        \"I always get the shot.\" \n        \n        \"That's with a camera. What am I thinking? Don't do it.\"\n        \n        \"I'll do my own leg first,\" says Lincoln, taking careful aim at his ankle manacle.  \n        \n        \"No!\" you say.\n        \n        \"Stop right there, varmints.\"\n        \n        *goto EnterTheSheriffLabel\n\n*comment === Enter the Sherrif ==========================================================================================================\n*label EnterTheSheriffLabel\n*page_break\nA portly gentleman in his sixties ambles into the booth. He wears chaps over red long johns, suspenders and a large cowboy hat. His left suspender sports a sheriff's badge.\n\n\"Caught ya red handed. Or I guess red footed, in this case,\" the sheriff says, nodding to the ball and chain. \n\n\"We didn't do this to ourselves,\" you say. \n\n\"I hear that so often,\" says the sheriff.  \n\n*comment - Pistol branch resolution\n*if(lLincolnUsesPistol = 1)\n    \"Can you get these things off of us,\" Lincoln asks.\n\n    \"First lets put the shooting iron down,\" says the sherif
