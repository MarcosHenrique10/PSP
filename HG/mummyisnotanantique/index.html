 clears to reveal the van overturned and aflame, its roof caved in like King Kong punched it. The vehicle's innards lie scattered about in a blast radius. Embers of detritus float through the airspace, blushing orange and red. Dozens of car alarms squawk for attention.\n\nA larger flake settles onto your leg. Looking down at the landed debris, you see the bottom corner of the scroll, the edges curling in a slow burn. You flick it to the asphalt as the bark blackens and crumbles. In your other arm you cradle the camera, a little charred but otherwise visually undamaged. \n\nYou notice movement. Melody, Lincoln and Clark emerge from behind a singed SUV. They look stunned but otherwise free of injuries. \n\n*if(gOpalAwakened = \"yes\")\n    Opal rolls out of a boxwood shrub and plops onto her backside, confusion blanketing her expression.\n    *line_break\n*page_break\nFrost has vanished. You continue scanning for the creature as Melody, Clark and Lincoln join you. \n\n\"What the hell was that?\" asks Lincoln.\n\n\"No idea,\" you say. \"Take this. Start filming.\" \n\nLincoln accepts the offered camera. He pushes a few buttons and the status lights blink green. He swings the rig onto his shoulder and commences a slow panning shot. \n\n\"Still works,\" says Lincoln.\n*set gFilmScore + 4 \n\nYou place your hands on the ground, carefully avoiding the broken glass and push yourself onto your feet. Like the camera, your body appears relatively undamaged. \n\nMoving toward the demolished production van, you accidentally kick and flip over the expelled steering wheel. You keep shuffling toward the wreckage, where the fires have diminished to smoldering. \n\n\"Oh damn,\" says Lincoln from behind you. \"Look at this.\"\n*page_break\nYou halt and turn. Lincoln toes the destroyed steering wheel. A thin metal panel has embedded into where the horn gets pressed. A decal adorns the jagged shrapnel; a hammer and sickle followed by the letters CCCP. \n\n\"Guess where the Soviet satellite landed?\" asks Lincoln, bending over to get a close up.  \n\n\"I'm not even surprised,\" you respond, heading back to the smoking pit. \n\n\"Do you think we're insured against communist reentry accidents?\"  \n\nYou grunt noncommittally, reaching the destroyed vehicle carcass. The van's mangled axle assembly sits separated from the body. Other unidentifiable wreckage litters the surrounding area. You feel heat rising from the ground around the crash site. Stepping around the side, you notice the dislodged spare tire. Inside lies Frost's boot, wisps of smoke rising from the sole. It smells terrible.\n\nSearching further, you step on something crunchy. Rolling your foot sideways for a peek, you see the bones of the mummy's severed hand. The remains flake and disintegrate into dust. \n*page_break\n*if(gNeckBrace = \"C Clamp\")\n    *set lNeckBraceRemains \"C clamp\"\n    *goto SignatureEndingNeckClampAssignLabel\n*elseif(gNeckBrace = \"Yard Stick\")\n    *set lNeckBraceRemains \"yard stick\"\n    *goto SignatureEndingNeckClampAssignLabel\n*else\n    *set lNeckBraceRemains \"golf club and coiled wire\"\n    *goto SignatureEndingNeckClampAssignLabel\n*label SignatureEndingNeckClampAssignLabel\nCrouching, you look through the blackened hole in the overturned van's roof. Partially buried by a large pile of ash sits the ${lNeckBraceRemains} that served as the mummy's neck brace. A breeze rises. The dust stirs and then scatters upon the wind. The murderous mummy of Professor Thadeus Frost is no more. \n\n\"Astrid! Fortuna! Are you okay?\" asks Melody. \n\nThe former scroll-zombies move slowly between the parked cars. They have not regained their lost years. \n*if(gOpalAwakened = \"yes\")\n    Melody and Opal rush to their aid.\n    \n    *goto ScrollZombieRevivalSignatureLabel\n*else\n    Melody rushes to their aid. \n\n    *goto ScrollZombieRevivalSignatureLabel\n\n*label ScrollZombieRevivalSignatureLabel\n\"Our scroll?\" asks Astrid.\n\n\"I, ... um,\" Melody answers. She looks to you, followed by the rest of her group. You give a negative shake of the head and mime an explosion with your hands. \n\nAstrid legs give out but Melody catches her before she can collapse. The young witch lowers her to the ground. Fortuna sits next to her, placing a supporting arm around her colleague's shoulders. \n*if(gOpalAwakened = \"yes\")\n    Opal squats at their feet. She gives reassuring pats to Astrid's shoe.\n*page_break\nJockety appears around the side of the destroyed van, ignores you and limps like the old man he has become to Astrid and her group. \n\n\"Can you fix me?\" \n\nAstrid slowly lifts her gaze to the FBI man, blinks twice and lowers her head. Jockety sags and drops to his knees. He stares forlornly at his spotted and wrinkled hands. \n\nYou drop onto the burnt van bench, succumbing to a sudden wave of fatigue. Sirens wail in the distance, getting closer. \n\nLincoln plops down next to you, seesawing you into the air. The seat oscillates both of you up and down for a few seconds and then steadies. Lincoln lowers the camera. \n\n\"My bad. Didn't know it was going to do that bouncy thing.\"\n    \n\"What are you doing, don't stop filming.\" \n\nLincoln raises the camera to a shooting position. An ambulance stops abruptly, the front wheels crunching over broken windshield glass. A pair of medics pop out of the back.\n*page_break    \n\"So now what?\" asks Lincoln, still filming as the EMT's scan for someone to help. \n\n\"Take some time. Digest what happened. Enjoy being alive.\"\n\n\"Yeah? Leave of absence kind of thing? Like six months. Somewhere tropical?\"\n\n\"I was thinking until, oh, eight AM tomorrow morning. Then you and I will be in an editing bay putting together the story of the century. I'll bring donuts.\"\n\n*page_break Epilogue\n*goto_scene Epilogue\n", "interviewending": "*comment\n*comment    InterviewEnding.txt\n*comment\n\n*comment === Temp Variables\n\n*comment === CHAPTER START\n\"I have a counter offer,\" you say, letting the post-it note fall to the ground. \n\n\"Don't\" Melody pleads.\n\n\"Already?\" says Frost, \"I've only reached six. But please, present your terms.\"\n\n\"Agree to an interview. A recorded interview. Then I'll give you the scroll. And you'll have to let Lincoln go. He's the only one that knows how to operate the camera.\"\n\n\"You sure that's a good - *gah*\" \n\nFrost chokes off Lincoln's question. The mummy stands unmoving, considering the offer. \n\n\"Millions will see it,\" you continue. \"Maybe a billion. All the world's a stage, right? How could a showman resist?\"\n\nFrost's face slowly strains into his death rictus grin. \"And there you are, producing it all,\" says the mummy. The creature flips his stumpy arm and twirls Lincoln free. \"I agree.\" \n*page_break The Interview\nYou set up on the stern of the largest fishing boat. Jockety, Astrid and Fortuna sway in place, just out of camera range, as you've ordered them to do. You keep a firm grip on the scroll and stay at least arm's reach clear of the mummy. \n*if(gOpalAwakened = \"no\")\n    Melody and Clark have vanished, taking the chance to escape. \n    \n    *goto PostWhosLeftAtInterviewLabel\n*else\n    Melody, Opal and Clark have vanished, taking the chance to escape. \n    \n    *goto PostWhosLeftAtInterviewLabel\n    \n*label PostWhosLeftAtInterviewLabel\n\"All set,\" you say. \"Let's start with some backstory, how you, ah, got to where you are.\"\n\nFrost holds open his remaining palm. \n\n\"Okay,\" you say, slapping him five with your hand. \"You're on. Take it away.\"\n\n\"Scroll,\" says Frost, his bony fingers wiggling.\n\n\"Ah. Right. How about I give your, um, free-roaming hand back now and then the scroll after the interview?\"\n\n\"The scroll unlocks so many mysteries,\" says Frost. \"Including these lips.\" The mummy puckers and smooches two air kisses. \n*page_break\nYou shudder and then give the scroll a squeeze. The severed hand does likewise. You look at the mummy, searching for hints of deviousness or deception. Unfortunately the creature doesn't perform a villainous moustache-twirl, giggle maniacally or even cross his fingers. Frost sits as before, patiently waiting, his hand extended and open. \n\nLincoln looks up from the eye-piece and shakes his head negatively. \n\nYou slap the scroll into Frost's hand but retain a firm grasp. The mummy slowly closes his fingers around his end of the parchment. He arches an eyebrow, or the skin above his eye where non-undead people have eyebrows. You relax your fingers and release your grip. The moment of truth, either violent death or the story of the century.\n\n\"I was entombed and mummified by a demented lovesick witch,\" Frost says. \"Everything was painful until death. And then I awoke. \n\n\"And who's there to welcome me but the same dour sorceress, brandishing her scroll. One would presume a forest witch would have an interesting depth of character. One would be wrong. Oh, the tedium I endured.\"\n*page_break \n*achieve interview_01\nFrost expansively describes his annoyance with the witch that resurrected and enslaved him. He complains for a good five minutes.  \n\n\"Sorry to break in here,\" you say, \"But do you recall anything when you were dead? What happens after you die? I'm sure that is the foremost question on our viewers' minds.\"\n\n\"Am I boring you?\" Frost says and then tilts his head as if listening for something. \"My apologies. Of course I know what happens after death,\" he responds, pulling his severed hand free of the scroll. The mummy secures the parchment inside his jacket. The severed hand self-propels into an outside pocket. \"After you die, you-\"\n\nThe skylight explodes and the doors crash open. SWAT police rappel from the roof and drop onto the mummy. Two cops tackle the creature to the ground and four more pile on top. Surprisingly, Frost docilely submits to the manhandling.  \n\n\"How's that for some calvary?\" \n\nClark follows behind a phalanx of police, quite proud of himself.\n*page_break\nTwo cops sit on Frost as their companions ponder how to hand-cuff a one-armed suspect. Taking advantage of the distraction, you sneak the camera's memory chip into your pocket.\n\nResolving their puzzle, the police secure the mummy in a complicated knot of chains and handcuffs. They've done such a superlative job that Frost cannot walk. A technician takes the scroll and places it into a large plastic evidence baggie.\n\n\"Any chance I could take that?\" you ask.\n\nThe scowls of the tech and an additional two cops indicate chances are slim.\n\n\"Just asking,\" you say. \n\n\"All right, listen up. If it ain't bolted down, put it in evidence.\" A cop with a lot of gold on his uniform stands tall in the middle of the room.\n\n\"Even these boats, chief?\"\n\n\"Are they bolted down?\"\n*page_break\n\"Um, nope. They're on trailers.\" \n\n\"Evidence,\" says the police chief. \"Impound 'em.\"\n\n\"Will they be back in time for the sport fishing show?\" asks Clark. \n\n\"Shut up. You want to be arrested?\" asks the chief, then turns to the cops standing over the well-secured prisoner. \"Jesus McNulty, how are we supposed to get the perp into the wagon? Go find a dolly or some-\"\n\nA tremendous explosion rocks the loading dock. \n\nFrost gets pushed to the ground. Four cops dive on top of him. Everyone with a weapon has it out and swinging, seeking a target.\n\nThe blast echo fades. A parking lot full of car alarms wail. Everything else goes still.\n\nA junior patrolman stumbles through the door. All the guns snap aim to the movement. Eyes wide and rigid, the rookie cop slowly raises his arms. His mouth quivers.\n\n\"What?\" orders the police chief.\n\n\"I think that Russian satellite just landed on your cruiser.\"\n*page_break Nine Months Later\nYou wait inside the third floor interview room at the county jail. Outside a large crowd chants. The barred and opaque windows muffle the words but not the passion.\n\nThe door bangs open. Two guards outfitted in full riot gear back into the room. Frost shuffles in next, clad in the classic convict orange jumpsuit. A standard medical neck brace encases his throat. Handcuffs lock his intact arm to a chain about his waist. He carries his severed hand. Two more guards flank him from behind. \n\nThe mummy raises his arm to the length allowed by his restraints. The severed hand flaps a greeting wave to you.\n\n\"Here to finally accept my employment offer?\" Frost asks.\n\n\"What job? You're going to be in a cell for a thousand years.\" \n\n\"I have an excellent chance at acquittal. Or so say my rich and famous lawyers.\" \n\n\"That's what rich and famous lawyers always say. Right before they say they'll appeal the guilty verdict.\" \n*page_break\nFrost shuffles over to his chair and drops onto the seat. The clamor from outside grows louder. The mummy tilts his head, listens to the noise and shrugs.\n\n\"What can I say, resurrection really captivates the masses.\" \n\nYou stare at Frost, saying nothing.\n\n\"I'm going to give you one final opportunity,\" says Frost. \"After my exoneration, I'll control a budding media empire. Requiring a chancellor. And look how famous we've both become.\"\n\n\"Shut up. Jockety, Astrid and Fortuna have disappeared. What have you done with them?\"\n\n\"You'll one day regret this decision. And how could I do anything? Any of these heavily armed gentlemen will tell you so.\" \n\n\"Did some of your deluded followers grab them?\"\n\n\"Oh they're not deluded. Anyway, you should check outside. I hear tell those addled souls keep reappearing here. I guess they just can't stay away from the scroll. Perchance the prosecutor will allow them a glimpse.\" \n*page_break\n\"I already checked outside. Nobody's seen them for a week.\"\n\n\"Time,\" says a guard. \n\n\"I've just begun a conversation,\" says Frost.\n\nTwo of the guards yank the mummy to his feet. \n\n\"Parting is such, well, you know the rest,\" says Frost as the guards shuffle him to the exit. The mummy stops in the doorway. \"I'll see you tomorrow at the verdict.\" \n\nThe guards pull and shove the creature. Frost remains in place, effortlessly resisting their exertions. \"I'll let you know if I see the afflicted trio upon the return of my scroll. Although I may have my lawyers retain it. I beginning to suspect that document is cursed.\" \n\nFrost slides through the doorway. Two guards stumble and fall.\n\n\"Take care, gentlemen,\" says the mummy from down the hallway. \n\nThe last guard gives you a grim look and slams the door.\n*page_break One Year On\nSmoke billows from the Lincoln memorial. Red embers smolder in a crater where the presidential statue once brooded. Abe's head sits decapitated in the reflecting pool, the water lapping just below the eyes.\n\nFire fighters, police, park rangers and tourists rush amongst and into one another, further complicating your job of directing your network's coverage of the attack. A pudgy cameraman apologies to you.\n\n\"Brandon. Brandon,\" you interrupt him, \"I don't want to hear it. [i]*ring*[/i] I agree it's not fair the tall policeman made fun of your weight [i]*ring*[/i] But you're tougher than that. [i]*ring*[/i] Now go get me a nice wide shot [i]*ring*[/i] of what's left of the memorial and all the fire trucks.\"\n\nBrandon the cameraman stifles a sob and waddles off with his equipment. \n\n[i]*Ring*[/i] \n\nYou grab your braying phone and check the screen. Head of the news division. You flick the slider. \n\n\"Hey el jefe,\" you say, \"What's up?\"\n\n\"Any chance you've contacted Frost?\"\n*page_break\n\"Still radio silence. No contact since he founded Frostlahoma like what, three months ago? I think I'm not his favorite anymore.\"\n\n\"Great. Keep trying. We need to scoop this.\"\n\n\"Will do. Uh, so how bad is it?\"\n\n\"A crap-polision. It looks like a civil war. A dozen government buildings have been attacked. Rogue military and police declared allegiance to Frost and disappeared. ly there's no scarcity of lawyers and they will do anything for money.\"\n\nJockety shuffles into the light and stops on the other side of Frost. Wisps of green smoke curl from the cauldron.  \n\n\"My original plan was to pull your head off and mount it in my den,\" says Frost. \"Or maybe the foyer? But this works so much better. Whenever I feel like reminiscing, I can order you to do a little promenade or run into a wall or whatever amuses me. Proceed, agent Jockety.\" \n\n\"Wait! You don't have to do this,\" you say.\n\nJockety halts in front of you. The black elixir bubbles in the urn. \n\n\"Of course I don't,\" says Frost. \"I just really want to.\"\n\nThe dark liquid splashes against your face. You smell burning skin but feel no pain. Maybe Frost is just trying to scare you.\n*page_break\nAll of your muscles spasm and constrict. The strain overwhelms the chair, fracturing off the seatback and breaking free a leg. You clatter onto the ground along with the broken furniture pieces. Your tightening muscles force your back to arch. Someone screams. Maybe it's you. \n\nDespite your bulging eyes, darkness invades the edges of your vision. Everything quickly goes black. You lose all feeling. Time stops.\n\nAfter an unknown duration, a spot brightens in the void. You're compelled to look at it. The light becomes larger and rectangular. The scroll resolves.  \n\n\"${name}, get off the floor and join the others,\" says a voice emanating from the scroll. \n\nYou obey. You must. You want to.  \n\nAll sense of yourself vanishes. Memories, thoughts, feelings. \n\nYou are gone. \n\nA soulless husk remains, enslaved to the owner of the scroll. \n\nThe undead love potion salesman, Professor Thadeus Frost.\n*page_break\n*goto_scene ending\n", "scrolldestroyending": "*comment\n*comment    ScrollDestroyEnding.txt\n*comment\n\n*comment === Temp Variables\n*temp lOpalInTheGroup\n\n*comment === Chapter START\n\"Okay, you win. Here you go,\" you say, jerking the scroll forward as a fa it Frost!\" you say.\n\n    *choice\n        # \"Bend over, I need to tell you something.\"\n            \"Barquel,\" says Frost.\n\n            The mummy idles a moment and then bows from the waist, his hand resting on his boot tip while his stump stretches valiantly to get there.\n            \n            Channelling all the frustration, stress and trauma you've suffered since the mummy came to life, you take a small hop, rear back your leg and kick Professor Thadeus Frost as hard as you can in the ass.\n            \n            *goto ResultOfMummyAssKickLabel\n            \n        # \"Punch yourself in the face. Hard.\"\n            *goto ResultOfMummyFacePunchLabel\n   \n*else\n    The mummy reacts before your hands move a centimeter. He slashes at his captive's throat but Jockety's knock combined with Lincoln's straining send the attack off course.\n    *label PopHereFromCurseLiftEnding\n    *if(gEndingSelected = \"CurseLiftEnding\")\n        The mummy reacts before your hands move a centimeter. He slashes at his captive's throat but Lincoln flinches and sends the attack off course.\n    Frost's nails slice upward through the cameraman's cheek and across his right eye. \n    *set gLincolnSlashedCheek 1\n    \n    The sticky note whacks the bottom of the scroll. You press hard, holding it in place.\n    \n    Frost stands frozen, his hand coiled for a better sited killing strike. Lincoln presses both hands to his face, blood dripping between his fingers. The mummy's arms slacken and fall to his side. The cameraman drops to the floor. \n    \n    \"Lincoln!\" you yell, wanting to vault from the ship but wary of dislodging the post-it note. The mummy's severed hand still clutches the middle of the scroll, requiring one of your hands for support and the other to keep your signature secured to the bottom. \n    \n    *if(gOpalAwakened = \"yes\")\n        *set lOpalInTheGroup \"Clark, Melody and Opal\"\n        *goto AssignedOpalVariableLabel\n    *else\n        *   \n            \"Frost! Outside. Through the door,\" you say. \n            \n            The creature snaps his attention to the exit and then stumbles forward. Directly at you, as you bisect his path to the exit. Thinking it prudent to keep the scroll a respectable distance from the oncoming mummy, you step back a couple of steps.\n            \n            *if (gWeaponChoice = \"crow bar\")\n                Right into a puddle of oil from Clark's zombie trap. Your footing slides away spectacularly.\n                *page_break\n                *goto KickLoseScrollLabel\n            *else\n                Right through one of Clark's fishing line zombie traps. The hooks snag your pants leg and wreck your balance. \n                \n                *goto KickLoseScrollLabel\n            \n            *goto EndFrostObedienceTestLabel\n\n    *label EndFrostObedienceTestLabel\n    \n    *goto FrostDoesDamageDuringSlapLabel\n\n*label FrostDoesDamageDuringSlapLabel\n\"Head for the van,\" you say. \"Over there.\" \n\nAbout fifty meters away, a vehicle decaled with the local PBS affiliate's logos sits parked on the sidewalk. The group tacks left.\n\n*if(gStatAmbition > gAmbitionThreshold)\n    You pass a huffing Clark and pull in behind Lincoln. Melody keeps pace ahead. \n    *if(gOpalAwakened = \"yes\")\n        Opal waddles in front and pulls away. \n    \n    \"Get the keys,\" you yell to the cameraman.\n    \n    Lincoln digs into a vest pocket, pulls free a ring of keys but fumbles them. They hit the concrete with an angry jangle. \n    *page_break\n    Scooping low while keeping stride, you snag the keys. \n    \n    \"Which one opens the van?\" you ask.\n    \n    \"The one marked 'Van',\" Lincoln says. \n    \n    You join the group beside the vehicle, flipping through your choices. \n    *goto GettingToTheVanLabel\n*else\n    You catch up to Lincoln and his supporters. Melody sets a strong pace while Clark huffs to keep up. \n    *if(gOpalAwakened = \"yes\")\n        Opal waddles out front and pulls away. \n   \n    \"Need help?\" you ask. \n    \n    \"We got this,\" Melody responds, \"Just get the damn doors open.\" \n    \n    \"Good idea. Lincoln, keys?\"\n    \n    \"You're not supposed to park there,\" says Clark. \n    \n    \"Shut up,\" says Lincoln. \"Coat pocket.\" \n    \n    You pull in behind Lincoln, reach around and dig into his jacket. The galloping movement keeps popping your hand free. Getting the timing down, you plunge back in and feel the keys. \n    *page_break\n    \"Ah!\" yells Lincoln. \n    \n    \"What's wrong?\" asks Melody.\n    \n    \"${gHes} tickling me,\" says Lincoln.\n    \n    \"Got 'em,\" you say, pulling the ring of keys free. Just in time, as everyone arrives at the vehicle. \n    \n    \"Which one opens the van?\" you ask, jangling through the many choices. \n    \n    \"The one marked 'Van',\" Lincoln responds. \n    \n    *goto GettingToTheVanLabel\n\n*label GettingToTheVanLabel\nA heavy thud disrupts your search.\n\n\"Alas, it appears your luck has finally withered while mine blooms afresh,\" says Frost from atop the van. \n*if (gEndingSelected = \"Signature\")\n    The mummy flaps the scroll at you, the signature post-it note long gone.\n    *goto FrostScrollTauntingLabel\n*else\n    The mummy flaps the scroll at you, now in pristine condition and not a ripple of damage.\n    *goto FrostScrollTauntingLabel\n*label FrostScrollTauntingLabel\nHis severed hand rests on his shoulder, like a pirate's parrot. \n\n\"Ugh,\" you say. \"Hey, why don't we go our separate ways. You finally have what you want.\" \n\n\"But that lacks a certain ... showmanship,\" Frost replies. An unusual light brightens the parking lot, emanating from a distant spot in the sky. \"See, even the heavens approve. Any last words?\"\n*if(gStatAmbition > gAmbitionThreshold)\n    *page_break\nThe illumination grows stronger.\n\n\"I hope that scroll is cursed.\" \n\n\"Not my choice of an epitaph, but so be-\"\n\nA roar deafens you as the glare becomes blinding. \n\nA fiery streak hits the van. \n\nKA-BOOM!\n*page_break\nThe explosion blows you backward as something both burns and slices your face. You slam into a car door and collapse to the ground, fragmented safety glass waterfalling over your shoulders.\n*set gYouLostEye 1\n\nYour vision clears to reveal the van overturned and aflame, its roof caved in like King Kong punched it. The vehicle's innards lie scattered about in a blast radius. Embers of detritus float through the airspace, blushing orange and red. Dozens of car alarms squawk for attention.\n\nA larger flake settles onto your leg. Looking down at the landed debris, you see the bottom corner of the scroll, the edges curling in a slow burn. You flick it to the asphalt as the bark blackens and crumbles.\n\nMovement draws your notice. \n*if(gStatAmbition > gAmbitionThreshold)\n    Melody, Lincoln and Clark emerge from behind a singed SUV. They look stunned but otherwise free of injuries. \n    *goto SignatureExplosionSurvivorsLabel\n*else\n    Melody and Clark emerge from behind a singed SUV, Lincoln still supported between their shoulders. They look stunned but otherwise free of further injuries. \n    *goto SignatureExplosionSurvivorsLabel\n\n*label SignatureExplosionSurvivorsLabel\n*if(gOpalAwakened = \"yes\")\n    Opal rolls out of a boxwood shrub and plops onto her backside, confusion blanketing her expression.\n\nScanning for the mummy, you notice only your left eye works. Cautiously probing with your fingers, you feel a ragged cut from your forehead, across your eye and into your cheek. The contact awakens the pain. Wincing with a last tap, you pull your hand away, surprised to see it dry and bloodless. \n*page_break\n*if(gStatAmbition > gAmbitionThreshold) or (gEndingSelected = \"GiveScrollAway\")\n    Melody, Clark and Lincoln join you. \n\n    *goto TrioJoinYouLabel\n*else\n    Melody, Clark and Lincoln join you, the cameraman now moving on his own. \n    \n    *goto TrioJoinYouLabel\n*label TrioJoinYouLabel\n\"What the hell happ-. Whoa, you feeling okay?\" asks Lincoln.\n\n\"My face hurts,\" you respond. \"A lot.\" \n\n\"You got this nasty burn cut scar thing,\" says Melody. \n\n\"Wonderful,\" you say. \"Help me over to what's left of the van.\" \n\n\"Maybe you should stay put,\" says Clark. \"Wait for an ambulance.\" \n\nIgnoring him, you place your hands on the ground, carefully avoiding the broken glass. You push yourself onto our feet. Other than your aching cut, the rest of your body appears relatively free of additional damage. \n\n\"So what was that?\" asks Lincoln. \n\n\"No idea,\" you respond, moving toward the demolished production van. You accidentally kick and flip over the expelled steering wheel but then keep shuffling toward the wreckage. \n*page_break\n\"Oh damn,\" says Lincoln from behind you. \"Look at this.\" \n\nYou halt and turn. Lincoln toes the destroyed steering wheel. A thin metal panel has embedded into where the horn gets pressed. A decal adorns the jagged shrapnel; a hammer and sickle followed by the letters CCCP. \n\n\"Guess where the Soviet satellite landed?\" asks Lincoln. \n\n\"I'm not even surprised,\" you respond, heading back to the now smoldering van, the fires having mostly subsided. \n\n\"Do you think we're insured against communist reentry accidents?\"  \n\nYou grunt noncommittally, reaching the destroyed vehicle carcass. The van's mangled axle assembly sits separated from the body. Other unidentifiable wreckage litters the surrounding area. You feel heat rising from the ground around the crash site. Stepping around the side, you notice the dislodged spare tire. Inside lies Frost's boot, wisps of smoke rising from the sole. It smells terrible.\n\nSearching further, you step on something crunchy. Rolling your foot sideways for a peek, you see the bones of the mummy's severed hand. The remains flake and disintegrate into dust. \n\n*if(gNeckBrace = \"C Clamp\")\n    *set lNeckBraceRemains \"C clamp\"\n    *goto SignatureEndingNeckClampAssignLabel\n*elseif(gNeckBrace = \"Yard Stick\")\n    *set lNeckBraceRemains \"yard stick\"\n    *goto SignatureEndingNeckClampAssignLabel\n*else\n    *set lNeckBraceRemains \"golf club and coiled wire\"\n    *goto SignatureEndingNeckClampAssignLabel\n*label SignatureEndingNeckClampAssignLabel\n*page_break\nCrouching, you look through the blackened hole in the overturned van's roof. Partially buried by a large pile of ash sits the ${lNeckBraceRemains} that served as the mummy's neck brace. A breeze rises. The dust stirs and then scatters upon the wind. The murderous mummy of Professor Thadeus Frost is no more. \n\n\"Astrid! Fortuna! Are you okay?\" asks Melody. \n\nThe former scroll-zombies move slowly between the parked cars. They have not regained their lost years. \n*if(gOpalAwakened = \"yes\")\n    Melody and Opal rush to their aid, joining them at the edge of the scattered debris.\n    \n    *goto ScrollZombieRevivalSignatureLabel\n*else\n    Melody rushes to their aid, joining them at the edge of the scattered debris. \n\n    *goto ScrollZombieRevivalSignatureLabel\n\n*label ScrollZombieRevivalSignatureLabel\n\"Our scroll?\" asks Astrid.\n\n\"I, ... um,\" Melody answers. She looks to you, followed by the rest of her group. You give a negative shake of the head and mime an explosion with your hands. \n\nAstrid legs give out but Melody catches her before she can collapse. The young witch lowers her to the ground. Fortuna sits next to her, placing a supporting arm around her colleague's shoulders. \n*if(gOpalAwakened = \"yes\")\n    Opal squats at their feet. She gives reassuring pats to Astrid's shoe.\n*page_break\nJockety appears around the side of the destroyed van, ignores you and limps like the old man he has become to Astrid and her group. \n\n\"Can you fix me?\" \n\nAstrid slowly lifts her gaze to the FBI man, blinks twice and lowers her head. Jockety sags and drops to his knees. He stares forlornly at his spotted and wrinkled hands. \n\nThe pain in your face flares. You drop onto a burnt van bench to stave off the increasing wooziness. Sirens wail in the distance, getting closer. \n\nLincoln plops down next to you, seesawing you into the air. The seat oscillates both of you up and down for a few seconds and then steadies. \n\n\"Ow,\" you say. \n*page_break\n*if(gStatAmbition > gAmbitionThreshold)\n    \"Sucks losing all that footage,\" says Lincoln.\n    \n    \"In capital letters,\" you respond. \n    \n    \"You did save all our asses though. So it's not all bad.\"\n    \n    \"I guess.\"\n    \n    An ambulance stops abruptly, the front wheels crunching over broken windshield glass. \n    \n    \"Let me help you over to the docs,\" says Lincoln, standing quickly. The bench drops but your cameraman grabs your arm before you can topple off the side. He pulls you upright.\n    \n    \"I got it,\" you say, pulling your arm free. You walk slowly toward the medics. Lincoln stays at your side, ready to lend any needed assistance. \n    *page_break\n    \"Let me ask you something,\" says Lincoln.\n    \n    \"What?\"\n    \n    \"Are all the antique shows like this?\"\n    \n    \"Thank you for saying the stupidest thing possible. I feel much better now,\" you say as an EMT arrives, grimacing at your sliced and cauterized face. \n    \n    You sit on a lowered gurney and close your functioning eye, too tired to answer any more questions. Too tired to do much of anything. Definitely too tired to think about how to salvage the story of the century. At least until the painkillers kick in. \n\n    *goto SignatureLincolnOnTheBenchLabel\n*else\n    \"My bad. Didn't know it was going to do that bouncy thing.\"\n    \n    \"Hmm.\" You both sit quietly, grateful for a moment free from the threat of a quick and violent death. \n    \n    \"Sorry about the face cut,\" you say. \"I thought Frost would kill you. Thought I had him.\"\n    \n    \"He would of killed all of us. You made the smart move. Plus now we can compare eye patches. You going to go with a classic black?\"\n    \n    An ambulance stops abruptly, the front wheels crunching over broken windshield glass. A pair of medics pop out of the back.\n    \n    \"Well, let's go let the docs have a look,\" says Lincoln, standing quickly. The bench drops but your cameraman grabs your arm before you can topple off the side. He pulls you upright.\n    *page_break\n    \"You know,\" you say, \"That camera is just sitting in the loading dock. Wouldn't want you to take the blame if it disappeared.\" \n\n    \"Uh huh. And it does have all that footage I shot.\" \n    \n    \"Yeah, that too. Be nice to record some of the satellite hit. That could be a big story too. Bernie will be raging if we don't.\" \n    \n    A medic approaches as you step away from the wreckage. She winces at your sliced and cauterized face.\n    \n    \"Hang tight,\" Lincoln tells her, \"We'll be back in a minute.\" \n    \n    You and Lincoln head away from the gathering crowd to rescue the camera and its recorded testimony of the bloody last hours of the undead mummy, Professor Thadeus Frost. \n    \n    *goto SignatureLincolnOnTheBenchLabel\n\n*label SignatureLincolnOnTheBenchLabel\n\n*page_break Epilogue\n*goto_scene Epilogue\n", "choicescript_description": "Battle the amok mummy of a disreputable love potion huckster while filming the story of the century! There is a news story here bigger than any antiques show. How will you cover it without getting killed and to what lengths will you go to bring home the story of the century?\n\n[i]A Mummy Is Not An Antique[/i] is a 52,000 word interactive novel by Randy Condon, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\nYou play as the producer of a PBS antiques appraisal show, dutifully starting another on-site episode while managing the eccentric personalities of your cast and crew. Events go pear-shaped when a guest arrives with a mummified human body, allegedly the corpse of the local legendary Bog Mummy. Quickly a menagerie of forest shamans, a priest, show-security, a southern gentleman and his supposed grandchildren squabble with increasing fervor over ownership of the body.\n\n• Play as male, female, or non-binary.[n/]\n• Enjoy a comedy-horror adventure battling (and filming) the supernatural.[n/]\n• Trade quips with the mummy of Professor Thadeus Frost, salesman extraordinaire of love potion and other dubious concoctions.[n/]\n• Discover the secrets of the mysterious scroll behind all these shenanigans.[n/]\n• Risk you and your crew's life and limb to get the story. But how far is too far? You decide.[n/]\n• Five different endings available, depending upon your choices.\n", "choicescript_stats": "*comment \n*comment    choicescript_stats.txt\n*comment \n\n*temp lNormalizedAmbition\n*temp lNormalizedEmpathy\n*temp lTotalAmbitionPossible  47\n*temp lTotalEmpathPossible 41\n*temp lTotalMedicalBill 0\n*temp lTotalHundreds 0\n*temp lTotalThousands 0\n\n*set lNormalizedAmbition round((gStatAmbition/lTotalAmbitionPossible)*50)\n*set lNormalizedAmbition + 50\n\n*set lNormalizedEmpathy round((gStatEmpathy/lTotalEmpathPossible)*50)\n*set lNormalizedEmpathy + 50\n\n*stat_chart \n    text name Stats\n    percent lNormalizedAmbition Ambition\n    percent lNormalizedEmpathy Empathy\n*line_break\n*line_break    \n*if (gShowNetflixScore = 1)\n    Film Score\n    \n    Your documentary, 'Mummy Dearest', earns ${gNetflixStars} Netflix stars.\n    *line_break\n    *line_break\nPersonal Medical Bill\n*line_break\n*if(gArmBruise = 1)\n    [b]$5.12[/b] : Frozen peas (x2) for bruise on arm from Brenda's punch.\n    *line_break\n    *set lTotalMedicalBill + round(5.12)\n*if(gAnkleBite = 1)\n    [b]$12.92[/b] : Disinfectant and a box of band-aids for a bitten ankle during the scroll scrum.\n    *line_break\n    *set lTotalMedicalBill + r athyAchievementThreshold 22\n*create gScrollFever 0\n*create gFilmScore 0\n\n*comment === Achievement Declarations\n*achievement interview_01 visible 25 Interview of the Year\n\t\tGet a filmed sit-down with a most exclusive guest.\n\t\tYou've recorded one of the most watched interviews in world history. For better or worse.\n*achievement scrollundoing_01 visible 25 Magic Defuser\n\t\tUncast the foul sorcery threatening your world. \n\t\tYou've defeated the mummy and undid the warped sorcery, but at what cost?\n*achievement ambition_01 visible 10 Executive Material\n\t\tEarn 80% or higher ambition.\n\t\tYou have your eye on success.\n*achievement empathy_01 visible 10 Care Bear\n\t\tEarn 75% or higher empathy\n\t\tNobody gets more holiday cards than you.\n*achievement low_damage_01 visible 10 In Fine Feather\n\t\tAccumulate $1,000 or less in medical costs\n\t\tMedical cost \u003c $1,0000. You certainly know how to avoid life's aches and pains.\n*achievement high_damage_01 visible 10 What's Up Doc?\n\t\tAccumulate $90,000 or more in medical costs.\n\t\tMedical costs > $90,000. You must own a black cat that breaks mirrors under ladders. \n*achievement brenda_rescue_01 hidden 5 Hostess with the Mostest\n\t\thidden\n\t\tIs there anything that Brenda can't do?\n*achievement sheriff_payoff_01 hidden 5 What Cost Freedom?\n\t\thidden\n\t\tOne hundred thirty seven dollars and thirty seven cents. \n*achievement wake_opal_01 hidden 5 Cherub Master\n\t\thidden\n\t\tRevived Opal from her slumbers with the smallest tinkle.\n*achievement ceramics_01 hidden 5 Glass Menagerie Mayhem\n\t\thidden\n\t\tYou'll never feel comfortable around ceramic pets again.\n*achievement homeopathic_01 hidden 5 Non-traditional Medicine\n\t\thidden\n\t\tTarentula and staphysgaria don't agree with you.\n*achievement bite_hand_01 hidden 5 Not Like Chicken\n\t\thidden\n\t\tMaybe a healthy dollop of sriracha will improve the taste of aged mummy hand next time. \n\n\n*comment === Temp Variables ===\n*temp in  game will be available on ${choice_release_date}.[/i]\n\n\t\t*choice\n\t\t\t#Sign up to be notified when the game is available.\n\t\t\t\t*subscribe {\"now\": true}\n\t\t\t\t*restart\n\t\t\t#Play the first five chapters now for free.\n\t\t\t\t*goto purchased\n\n\t[i]You can play the first five chapters of the game for free. Purchase the rest of the game below.[/i]\n\t*if choice_is_advertising_supported\n\t\t[i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n\t*purchase_discount adfree 2018-06-08 $3.99 $2.99 purchased\n\t*if choice_is_advertising_supported\n\t\t*page_break_advertisement\n\t*if not(choice_is_advertising_supported)\n\t\t*page_break Play Now for Free\n\n\n*label purchased\n\n\n*comment *gosub_scene AchievementSubroutines achieveCheckEmpathyLabel\n\n*comment === DEBUG JUMP ====\n*comment *goto_scene Act2BatesSiblings\n\n*comment === Story START ===\nBrenda Tilwilliger, a well dressed woman in her fifties, smiles and addresses a camera. Next to her stands a mildly disheveled man well into his sixties, fidgeting and holding a wooden crate of soda bottles. \n\nA small crowd spectates off to the side, consisting primarily of solo older gentlemen. Three sport identically colored T-shirts that spell out 'We Luv Brenda'. An antique show bustles behind and around Brenda and the TV production crew, generating a buzzing energy in the large display hall. \n\n\"Ah hem,\" Brenda says to you, \"Done with doodle time yet?\"\n\n\"Great art cannot be rushed,\" you respond, filling in a 'Hello-my-name-is' sticker with;\n*choice\n\t\t# Casey\n\t\t\t\t*set name \"Casey\"\n\t\t\t\t*goto postAssignNameLabel\n\t\t# Riley\n\t\t\t\t*set name \"Riley\"\n\t\t\t\t*goto postAssignNameLabel\n\t\t# Jaimie\n\t\t\t\t*set name \"Jaime\"\n\t\t\t\t*goto postAssignNameLabel\n\t\t# Taylor\n\t\t\t\t*set name \"Taylor\"\n\t\t\t\t*goto postAssignNameLabel\n\t\t# Pat\n\t\t\t\t*set name \"Pat\"\n\t\t\t\t*goto postAssignNameLabel\n\t\t# Quinn\n\t\t\t\t*set name \"Quinn\"\n\t\t\t\t*goto postAssignNameLabel\n\t\t# Let me spell that out\n\t\t\t\tYou write out your name:\n\t\t\t\t*input_text name\n\n*label postAssignNameLabel\nWriting out your name recalls the countless times people email back asking if you're male or female. Your response is always;\n\n*choice\n\t\t# Female\n\t\t\t\t*set ghim \"her\"\n\t\t\t\t*set gHes \"She's\"\n\t\t\t\t*set gGender \"female\"\n\t\t\t\t*goto PostGenderChoiceLabel\n\t\t# Male\n\t\t\t\t*set ghim \"him\"\n\t\t\t\t*set gHes \"He's\"\n\t\t\t\t*set gGender \"male\"\n\t\t\t\t*goto PostGenderChoiceLabel\n\t\t# Gender neutral\n\t\t\t\t*set ghim \"they\"\n\t\t\t\t*set gHes \"They's\"\n\t\t\t\t*set gGender \"neutral\"\n\t\t\t\t*goto PostGenderChoiceLabel\n*label PostGenderChoiceLabel\nYou slap the name tag onto your windbreaker, covering the logo of the local public broadcasting station, your longtime employer. As you smooth out the sticker an unpleasant prickling tingles your awareness. Looking up, you see Brenda glaring the hairiest of eyeballs your way. \n\nYou give her the standard-issue, confident television producer nod, spin your index finger vertically a few tight rotations and then snap it at her. \n\n\"We're now joined by Mister Myron Mumford,\" says Brenda, smiling into the camera. \"Welcome to the show, Mr. Mumford.\" \n\nA video monitor displays a fuzzy pile of colors vaguely resembling Brenda. \n\n*fake_choice\n\t\t# \"A little too soft there, Lincoln,\" you say.\n\t\t\t\t*set gStatEmpathy + 1\n\t\t# \"What have you been doing all this time? Focus,\" you say.\n\t\t\t\t*set gStatAmbition + 1\n\t\t\t\nLincoln, a young African-American man working the video camera, adjusts the lens.\n\nThe image sharpens but then blurs again.\n\n*fake_choice\n\t\t# \"Did you forget your contacts?\"\n\t\t\t\t*set gStatAmbition + 1\n\t\t\t\t\"Exhale boss, I'm getting there,\" Lincoln responds.\n\t\t# \"Almost there.\"\n\t\t\t\t*set gStatEmpathy + 1\n\nThe video image returns to clarity. \n\nNext to Brenda, an ex
