u're all in a tight group, nods to Clark and moves down the aisle between the show booths.\n\nYou only travel a dozen steps before a small bald man in overalls sidles up next to you. \n\n\"Hey, is that guy taxidermied?\" he says, leaning in for a closer look. \"Wow, that's quality work. I'm a collector.\"\n*page_break\n\"Kinda busy right now,\" you say.\n\n\"Well I'm just starting out, really, but this guy would be the crown jewel in my collection. How much do you want for him?\"\n\n\"Not for sale. Beat it,\" you say. Lincoln starts filming the negotiation. \n\n\"I can go as high as a hundred U.S.,\" says baldy overalls.\n\nYou quicken your pace and fall in step beside Jockety. The novice taxidermy collector stays on your shoulder.\n\n\"I'll throw in three stuffed muskrats and a Pomeranian in pristine condition. Well, the Pomeranian is missing an eye but-\"\n\nJockety's scowl freezes the offer in the collector's mouth.  He swallows, slows and peels off your path. \n*page_break\n\"Wow, that's really useful,\" you say. \"Do you practice?\"\n\n*if(gWhoHasScrollSignatureScrap = \"Jockety\")\n    \"Shut up,\" Jockety replies. He scans the crowd in his practiced FBI way for a moment but can't keep his attention away from the scrap of scroll. He brings the fragment within a few centimeters of his eyes. \"Ah huh,\" he says. \n    \n    \"Find a clue?\" you ask. \n    \n    \"See this signature here?\" Jockety replies, pointing to a section of the scroll. You see 'nry For' written in a neat cursive from one edge to the opposite side. \"Know who that is?\"\n    \n    \"Um, Nry For?\" \n    \n    \"Henry Fortmore. Father Fortmore.\" \n    \n    \"Your dad's name is on the scroll?\"\n    *page_break\n    \"What? No. Catholic priest. Lived back in the nineteen twenties. \n    \n    \"Why would I know that?\"\n    \n    Jockety ignores you. \"Supposedly spent years trying to save the soul of the cursed Professor Frost. Didn't end well.\"\n    \n    \"Okay, we're here,\" says Clark.\n    \n    *goto JocketyFordSignatureRevealLabel\n*else\n    \"Shut up,\" Jockety replies, scanning the crowd in his practised FBI way. \n    \n    *choice\n        # \"What are you going to do with Frost?\" you ask. \"Assuming you bring him in alive ... well, dead but, um, still conversational and murdery?\"\n            \"Stack all the bricks my bosses will be crapping. They'll regret sticking me with this loser assignment.\"\n            \n            \"Wait, you're not, like, the FBI X-files guy?\"\n            \n            \"Ha. They give the Frost assignment to the current biggest screw-up in the service. Usually whoever gets it quits. But I worked the case. Look what I found. Surprise, buttholes.\"\n            \n            \"I remember you now! You tackled the president's mother. On national TV. Ended up ripping her skirt off.\"\n            \n            *goto AskJocketyBackgroundQuestionLabel\n        # \"Are you the FBI X-files guy?\" you ask. \"Have you run into the reanimated dead before? Or things even weirder? We should do an interview.\" \n            *set gStatAmbition + 1\n            *gosub_scene AchievementSubroutines achieveCheckAmbitionLabel\n            \"Chillax, Bernstein. They give the Frost assignment to the current biggest screw-up in the service. Usually whoever gets it quits. But I worked the case. Look what I found. Surprise, buttholes.\"\n            \n            \"You've never seen anything like this before?\"\n            \n            \"Hell no, I was working terrorist cases before this. Until, um, never mind.\" \n            \n            \"I remember you now! You're the agent that tackled the president's mother. On national TV. Ended up ripping her skirt off.\"\n            \n            *goto AskJocketyBackgroundQuestionLabel \n\n    *label AskJocketyBackgroundQuestionLabel\n    \"You'd be surprised how much a fruit cake looks like a block of C4.\"\n    \n    \"An unfortunate choice for her to wear thong underwear that day.\" \n    \n    Jockety scowls at you like he did to the taxidermist.\n    \n    \"Water under the bridge,\" you say. \"But this story. The implications-\"\n    \n    \"We're here,\" says Clark.\n    *page_break\n    *goto JocketyFordSignatureRevealLabel\n\n*label JocketyFordSignatureRevealLabel\n*if(lShamanSearchLocation = \"maintenance\")\n    \"Can it. We got work to do. In here?\" Jockety asks, pointing to a door marked 'Authorized Personnel Only'. \n\n    Clark nods affirmation. Jockety pulls his weapon but holds it at his side, out of site from any antiquerers wandering by. You move in behind Jockety to get a good look. He cracks the door, looks inside and then quietly pulls it closed. \n\n    \"This is a broom closet,\" says Jockety. \n\n    \"Yeah,\" says Clark. \n\n    \"How would four shamans even fit in there, let alone have room for doing complicated sorcery?\"\n\n    \"I thought one could squeeze in and the other three would stand guard.\" \n\n    Jockety's jaw grinds back and forth. \n\n    \"You kept badgering me about where shamans would go. It's the only thing I could think of.\" \n    *page_break\n    *goto EndShamanSearchOneLabel\n*else\n    A showroom booth stands empty of forest shamans as well as anything else save an overturned paper coffee cup. Lincoln moves in for a close-up of the spilled liquid. \n    \n    \"Maybe the shamans dropped that coffee,\" says Clark. \n    \n    \"Shut up and think of another place,\" says Jockety, grinding his jaw back and forth. \n    \n    \"Is there a maintenance area around?\" you ask, but then notice a woman bent over and panting heavily. Two more women run out of the nearby bathroom, equally shaken. Jockety follows your gaze to the frightened antiquerers. \n    \n    \"Everyone, stay close but stay behind me,\" says Jockety to the group. He makes his way past the women, holding his finger to his lips to encourage a mute calm. You struggle with the mummy but manage to stay right behind the FBI agent. The women watch in perplexed silence as you pass .\n    *page_break\n    Jockety stops outside the bathroom door. An inhuman moan reverberates from inside. \n    \n    \"Shamans?\" asks a nervous Clark.\n    \n    \"Could be plumbing,\" says Lincoln. \"My apartment makes the same-\"\n    \n    \"Quiet,\" Jockety whispers, pulling his weapon but holding it out of sight at his side. \"Stay here.\"\n    \n    \"I should come in too,\" you say.\n\n    \"Negative.\" Jockety stares at you until you reluctantly concede. \n    \n    He raises his pistol and slips inside the bathroom. A few seconds later he comes back out, a few shades paler. \n    \n    \"Are you cursed?\" asks Clark. \n    \n    \"Overflowing toilet. Two live rounds on the ground. Shocking what the human body is capable of producing,\" says Jockety. \n    *page_break\n    You stop Lincoln as he heads into the bathroom, camera ready. \"We don't need any footage of that,\"  you say. \n    \n    *goto EndShamanSearchOneLabel\n\n*label EndShamanSearchOneLabel\n\"All right,\" says Lincoln. \"So what now?\"\n    \n\"Let's head to the other end of the show. Stay on the lookout,\" you say. \"I'm sure we'll run into the witches. Shamans. I mean shamans.\"\n\nJockety grimaces but then nods assent. \"Stay behind me,\" he says. \n\n*if (gMummyCarryTechnique = \"plant\")\n    Readjusting your grip around the mummy's waist, you quicken your duck waddle to pull in alongside the FBI agent.\n    \n    *goto WitchSearchDepart2Label\n*elseif (gMummyCarryTechnique = \"shoulder\")\n    Rebalancing the mummy on your shoulder to encourage forward momentum, you surge ahead to pull even with the FBI agent. \n    \n    *goto WitchSearchDepart2Label\n*elseif (gMummyCarryTechnique = \"piggyback\")\n    Leaning forward to the point of imbalance, you quick step forward and pull up next to the FBI agent. The mummy gently head butts you with each step. Your cargo may have shifted a little too high.\n\n    *goto WitchSearchDepart2Label\n\n*label WitchSearchDepart2Label\n\"I ordered everyone to stay behind me,\" says Jockety. \n\n*choice\n    # \"Why are you taking all this back-from-the-dead stuff so casually,\" you ask.\n        \"What do you mean?\" asks Jockety, narrowing his eyes at a pair of ladies. \"Are they carrying a cauldron?\"\n        \n        \"That's a spittoon, circa 1870's Arizona territory. But this whole Frost back from the dead. People are going to freak out. You're taking it in stride.\" \n        \n        \"Everyone will be fine. People already believe in ghosts. Check out any program on the The Learning Channel.\"\n        \n        \"You don't believe that, those shows are total B.S.\"\n        \n        \"Says the person carrying a resurrected love potion salesman. Plus look around. Besides a few odd looks, no one cares you're schlepping around a dead guy.\"\n        \n        Jockety observes correctly. Most of the show goers don't spare you a second glance, with the remainder more interested in Lincoln's camera. \n        \n        \"They probably think this is some weird prop,\" you say. \"But we have hard evidence. This is going to be different.\"\n        \n        \"I have hard evidence. And it's getting turned over to the bureau. I'm playing this one by the book.\"\n        \n        \"What? You can't do that. People need to know about this. There's no book on this.\"\n        *page_break\n        \"Sure there is, it's called chain of command. Those middle-management buttholes are the ones that will freak out. And I get to enjoy every second of it.\"\n        \n        \"C'mon Jockety, that's totally self-serving.\"\n        \n        \"No, it's doing my job. Should I screw myself so you can claim credit for the story of the month? Who's being self-serving now?\"\n        \n        \"More like story of the century. You can be an anonymous source.\"\n        \n        \"The bureau PR rep handles all of our media requests. Hold up.\"\n        \n        *goto JocketyQuestionTwoLabel\n    *if (gWhoHasScrollSignatureScrap = \"you\") # \"Let's do an interview,\" you say. \"We can clear your name.\"\n        \"Bringing Frost in gets me out of the crapper,\" says Jockety, narrowing his eyes at a pair of ladies. \"Are they carrying a cauldron?\" \n        \n        \"That's a chamber pot. But your name won't be cleared with the public.\" \n        \n        \"We're the FBI. The public doesn't know our names.\"\n        \n        \"They know yours. This will make them forget the deskirting of the presidential matriarch.\"\n        \n        \"You're then one that wants the public to know your name. Quit hustling me or I'll lock you in that crate over there and pick you up later.\"\n        \n        \"That's an armoire. C'mon Jockety, you can't bury this story.\"\n        \n        \"The bureau PR rep handles all of our media requests. Hold up.\"\n        \n        *goto JocketyQuestionTwoLabel\n    *if (gWhoHasScrollSignatureScrap = \"Jockety\") # \"What else do you know about the, um, Clifty parchment?\"\n        \"Not much, only scattered stories that I pieced together,\" say Jockety, narrowing his eyes at a pair of ladies. \"Are they carrying a cauldron?\" \n        \n        \"Nope, bed pan.\" \n        \n        While Jockety takes a hard look to confirm your observation, you give Lincoln a nod. He shrugs, unsure what you want. You quickly incline your head to the FBI agent then yourself. The light bulb goes on for Lincoln. He points the camera and starts recording.\n        *set gFilmScore + 3\n        *set gStatAmbition + 2\n        *gosub_scene AchievementSubroutines achieveCheckAmbitionLabel\n\n        \"Did a Catholic priest really own a mummy? Seems a little outside the doctrine.\"\n\n        \"According to my research, yeah. Thought Frost held the secrets of the afterlife. Had your buddy there for about a decade until his parishioners found Father Fortmore's head in one confessional and his body in the other.\"\n        \n        \"Ew. What happened to Frost?\"\n        \n        \"Disappeared, around the same time an unsolved murder spree happened in the same community. Victims were all a bunch of practitioners of some screwball religion. That same religion soon after started revival shows featuring the resurrection of a dead guy.\"\n        \n        \"Any footage of the revival? Anyone look familiar?\"\n        \n        \"A few grainy shots, hard to tell.\"\n        \n        \"So what happened next?\"\n        \n        \"The religion started growing. Must of put on a good show. Catholic church started looking into them. A year later, a big fire, lots of bodies and no more sign of Frost.\"\n        \n        \"What happened?\"\n        *page_break\n        \"Not sure. Although I suspect a certain Doctor Bates gained control of the mummy. Name sound familiar?\"\n        \n        \"Emma and Lester?\"\n        \n        \"Their grandfather. Also meet a grisly fate, eventually.\"\n        \n        \"Huh, sounds like owning Frost carries a curse.\"\n        \n        Jockety thinks it over for a moment.  \"Sure, why not. That or signing the scroll.\"\n        \n        \"Is that what gets control over the mummy, signing it?\"\n        \n        \"I think so. Explains what the fragments of signatures are on the piece you gave me. The different mummy owners over the years. Supposedly there's a passage to undo the spell, but there's a catch.\"\n        \n        \"What kind of catch?\"\n        \n        \"Saying the undoing spell kills you or turns you into a newt or gives you the runs. Probably just another spooky story. We can ask the shamans when we find them. Hold up.\"\n        *page_break\n        *set gEnableSpellRemovalEnding + 1\n        \n        *goto JocketyQuestionTwoLabel\n\n*label JocketyQuestionTwoLabel\nYour group reaches the end of the long antique show aisle, the shaman sightings still at zero. \n\n\"Okay Clark, where to next?\" asks Jockety, losing all interest in talking to you. \n\n\"Um, well, we could try the jewelry section,\" Clark replies. \"Although it's usually pretty crowded.\" \n\n\"Now give me a good idea,\" Jockety says.\n*page_break\n\"Hey ${name},\" says Lincoln as Jockety and Clark discuss the next move. \"We've been here over five hours.\"\n\n\"So we have,\" you respond. \n\n\"Meal break. I didn't eat lunch. The snack bar's right over there. No line.\"\n\n\"Jockety will shoot you.\"\n\n\"I can catch up, if those two even figure out where to go next.\"\n\nYou look over to Jockety and Clark, standing in front of a poster of the show floor. The FBI man points to an area, asks Clark a question, scowls at the security guard's response then points to a new area, starting the process over. Turning to the snack bar, you watch an antiquer step to the counter, quickly hold their nose while suffering a couple of gagging coughs and then hastily back away.\n\n\"I'm not sure you want to eat there,\" you tell Lincoln. \n\n\"I got an iron stomach, I'll be fine,\" says the cameraman.    \n*page_break\nYou take another look at the snack bar. The front service area is empty of employees. Some noxious-looking green smoke puffs from the top of the kitchen door, hovers a moment then sinks into the ground.\n\n\"Get the camera ready,\" you tell Lincoln. \"Hey, Jockety.\" The agent turns to you but keeps his finger pressed against Clark's quivering chest. \"Snack bar,\" you say.\n\n\"We don't have time to eat,\" says Jockety. \n\n\"No, look,\" you say, tilting your and Frost's head toward the food stall. A bright blue light flares from around the kitchen door then slowly fades. \n\nJockety's eyes narrow and then he nods. \"Security guardsman Clark, does the snack bar typically produce unearthly blue lights?\"\n\n\"No, mostly corn dogs and cheeseburgers,\" says Clark. \"And there's usually a big line. And, like, employees.\"\n\n\"All right, stay behind me,\" says Jockety. \"Don't do anything loud. Or stupid. Or loud. Move out.\" \n*page_break\nOnce again, you settle right behind Jockety with your undead burden. As you get within a dozen steps of the counter, the scent of decaying flesh assaults your olfactory. \n\n\"Whoa, I think the dead guy just farted,\" says Lincoln, blinking his watering eyes.\n\n\"Not Frost, that's coming from the snack bar,\" you say. \n\n\"Breathe through your mouth,\" says a nasal-sounding Jockety, holding his nose closed with his fingers. \"Over there.\" He points to a gate in the counter, allowing access to the service area. Jockety crouches and heads for the opening. You follow closely. \n\n*if (gMummyCarryTechnique = \"plant\")\n    The stench becomes more overpowering closer to the food stall. Unable to pinch your nose without dropping Frost, you bury your nostrils into the mummy's back. The odor still leaks through the fabric of the mummy's jacket. You wonder how much more murderous Frost will be after he figures out you barfed all over his back. Fighting back nausea, you follow Jockety behind the counter. And then the smell is gone.\n    \n    *goto WitchSearchDepart3Label\n*elseif (gMummyCarryTechnique = \"shoulder\")\n    The stench becomes more overpowering closer to the food stall. Following Jockety's lead, you pinch your nostrils closed with your free hand. Now breathing through your mouth, the odor coats your tongue. Undecided if the taste or smell is more disgusting, you inhale quickly through your nose followed by a breath into your mouth. It's a draw. Fighting back vomit, you trail Jockety behind the counter. And then the smell is gone. \n    \n    *goto WitchSearchDepart3Label\n*elseif (gMummyCarryTechnique = \"piggyback\")\n    The stench becomes more overpowering closer to the food stall. With your hands committed to holding up Frost's thighs, you push your nose into the fabric of the mummy's arm draped over your shoulder. The appendage offers no resistance, swinging free over your shoulder. Ceasing to inhale, you trail Jockety behind the counter. Remarkably, he removes his hand from pinching his nostrils. Encouraged, you take a quick breath. The smell is gone.\n    \n    *goto WitchSearchDepart3Label\n\n*label WitchSearchDepart3Label\n*page_break\n\"What happened to the stink?\" Jockety asks. \n\n\"It's still there. We just got past it. Look.\"\n\nLincoln and Clark head through the gate, their faces contorted by the awful funk. They join you, desperately holding their breath. \n\n\"Breathe, it's gone,\" you say.\n\n\"Quietly,\" whispers Jockety, then holds a finger in front of his lips. Clark and Lincoln take an experimental breath followed by a deeper lung-filler. Jockety, satisfied with noise level, crouches and moves to the kitchen door. Muffled voices pass through the closed entryway. The FBI agent cracks open the door and peers inside. \n*page_break \n\"The patch should be an animal base,\" you hear one of the witches say from inside the kitchen. \"We can cut a chunk from Melody's purse.\" \n\n\"It's pleather, not leather,\" comes the reply. The voice belongs to the youngest witch, evidentially named Melody. \n\n\"You're wrong, as usual Astrid,\" says another witch. \"The parchment is made from bark. We should use lettuce, or maybe a nice arugula.\" \n\nYou carefully set Frost on the snack bar floor and tap Jockety on the shoulder, which he ignores. A couple more frantic taps wins you an annoyed look. You point to yourself and then the crack in the door. Jockety pulls an 'as-if' smirk and returns his attention to the kitchen. Settling back next to Lincoln, you notice another door at the far end of the snack bar. \n\n\"Hey Jockety,\" you whisper while leaning back into the G-man. \"There's another entrance to the kitchen. We should cover it to prevent an escape.\"\n\nJockety wants to brush you off but recognizes the risk to his plans.  \n\n*choice\n    # \"Lincoln and I will cover that door,\" you say before Jockety can issue any orders.\n        *set lKitchenDoorPartner \"Lincoln\"\n        Eager to get back to his surveillance, the FBI man nods agreement. \n        \n        \"Grab the camera and follow me,\" you tell Lincoln. \"Stay low and be quiet.\" \n        \n        You crouch-walk past the order pick-up window and stop at the far door. The witches continue arguing over how to repair the parchment. Lincoln and his camera join you. \n        \n        \"I'm going to open the door wide enough for the lens to fit through,\" you whisper to Lincoln. He nods agreement, hits the record button and carefully places the camera and tripod in position. You squat below the lens to get a look.  \n        \n        *goto DoorCoverageLabel\n    # \"Lincoln and Clark can cover that door,\" you say before Jockety can issue any orders. \n        *set lKitchenDoorPartner \"Jockety\"\n        Eager to get back to his surveillance, the FBI man nods agreement.\n\n        \"Take the camera and record what's going on in there,\" you whisper to Lincoln before he leaves. \"Don't been seen.\" \n        \n        Lincoln nods agreement, grabs the camera, signals for Clark to follow and crouch-walks away. The duo stay below the order pick-up window and reach the far door. Lincoln gives you a thumbs-up and preps the camera and tripod.\n        \n        Satisfied that Lincoln has it covered, you lie on your stomach and crawl to the kitchen door. Jockety crouches above you. He doesn't want you there but can't risk removing you without alerting the witches. \n        \n        *goto DoorCoverageLabel\n\n*label DoorCoverageLabel\nAstrid and a second witch stand by the microwave, waiting for something inside to finish heating.\n\n\"Let it go, Fortuna,\" says Astrid. \"It doesn't need any virgin's blood. And it's not like we have any.\" \n\n\"Perhaps Melody,\" says Fortuna, looking over to the younger witch.\n\n\"Sorry, that ship sailed after the Enchantment-under-the-Sea dance junior year,\" says Melody. She works with the third witch assembling a large waffle iron.\n*page_break\n\"Then Opal,\" says Fortuna. \"It has to have been at least a decade since she-\"\n\n\"The nerve,\" Opal replies.\n\n\"I'm pretty sure that's not how virginity works,\" says Melody, plugging in the appliance. \"This waffle gizmo will beep when it's ready.\" \n\nThe microwave dings. Astrid pulls out a coffee mug emitting a bright green glow and carries it to the waffle iron. A petite mushroom cloud poofs from the cup. \n\n\"Maybe we should recite the spell of undoing instead,\" says Opal, eyeing the liquid with trepidation. \n\n\"You volunteering?\" asks Astrid.\n\n\"Um, maybe if we each said a section, it wouldn't be so bad.\"\n\n\"Forget it,\" says Astrid. \"I'm not losing all that magic after we've worked so long to find it. How long?\" she asks Melody.\n\n\"Should just be a minute or so,\" the younger witch replies. \n\n*if (lKitchenDoorPartner = \"Lincoln\")\n    You crawl from under the camera and look to the far door. Jockety's attention remains gripped by the witches in the kitchen. You execute a series of increasingly extravagant hand gestures and finally garner Clark's notice. You point to the FBI man. Clark delivers a solid poke to agent's ribs. Jockety jumps, apparently ticklish and prepares to punch Clark, who points emphatically at you. Jockety looks your way. \n    \n    You make a sweeping arm gesture indicating both groups should invade the kitchen. Jockety shakes his negatively, fakes a punch at the flinching Clark and goes back to the door. Disappointed, you move back under the camera.\n\n    *goto RushTheKitchenLabel\n*elseif (lKitchenDoorPartner = \"Jockety\")\n    You tap the toe of Jockety's shoe. He looks down from above. You tilt your head toward the kitchen. Jockety's eyebrows furrow in confusion. You point to yourself then Jockety, then jerk your thumb toward the kitchen. Jockety shakes his head negatively and returns his attention to the witches. Disappointed, you do likewise. \n\n    *goto RushTheKitchenLabel\n\n*label RushTheKitchenLabel\n*page_break\nAstrid tilts the coffee cup above the open waffle iron. A black liquid oozes out, inexplicably radiating with emerald light. As the concoction hits the heated surface, it bubbles and snaps violently. \n\n\"Get the parchment on there,\" Astrid says. \"Make sure the mend stays in place.\" \n\nFortuna places the scroll on the bubbling liquid. Opal then positions an arugula-wrapped hot dog over the torn section of the parchment, taking great care to not touch the black substance. Astrid quickly dumps the remaining contents of the mug onto the repair and shuts the iron, squashing the frankfurter. As the lid closes, a blinding blue light flashes from the appliance. \n\n*if (lKitchenDoorPartner = \"Lincoln\")\n    You blink rapidly to clear the spots bedazzling your vision. \"Is the camera okay?\" you ask Lincoln. \n    \n    \"Yeah. Oh shit, look.\" \n    *page_break\n    Frost stands inside the kitchen, having plowed over Clark and Jockety. The mummy crouches to attack the witches but his legs go limp. He collapses onto his face. \n    \n    You stand rapidly but doink your head on the underside of the camera. Lincoln catches the teetering equipment as you plop to the ground, dazed. \n    \n    *goto RushTheKitchen2Label\n*elseif (lKitchenDoorPartner = \"Jockety\")\n    You blink rapidly to clear the spots bedazzling your vision. A foot in your back drives you painfully to the floor. Frost bounds over you into the kitchen, backhanding Jockety on the way past.\n\n    The mummy lands in a crouch but then his legs go limp. He collapses onto his face. \n    \n    As you rise Jockety steps on your back and you once again crash to the floor. You gasp to regain your lost wind. \n    *page_break\n    *goto RushTheKitchen2Label\n\n*label RushTheKitchen2Label\n\"Sign it! Sign it!\" Astrid screams. The waffle iron bounces around the tabletop with barely contained witchcraft, the scroll still clamped in its jaws. Astrid's grabs keep missing the handle. \n\n\"Get the pen!\" Fortuna yells at Opal, who digs furiously in her large handbag. Fortuna yanks the purse from her and dumps the contents on the floor. \n\nFrost sits on his butt, alternating punches into each of his thighs. His legs remain unresponsive. Giving up, he rolls over and crawls toward Astrid and the possessed waffle iron. \n\n*if (lKitchenDoorPartner = \"Lincoln\")\n    As your senses realign, you stumble into the kitchen. \"Keep rolling,\" you shout back at Lincoln. Jockety has already busted through the other door.\n    \n    *goto RushTheKitchen3Label\n*elseif (lKitchenDoorPartner = \"Jockety\")\n    With some air back in your lungs, you stand upright. \"Keep recording,\" you shout to Lincoln at the other door. He stands transfixed by the ongoing action in the kitchen. You see the camera's red recording light active as you enter the kitchen. \n    \n    *goto RushTheKitchen3Label\n\n*label RushTheKitchen3Label\nAstrid swats desperately and finally grasps the bouncing waffle iron handle. Jockety slams into the table next to her. His meaty hand grabs her wrist, further taming the bucking appliance. Fortuna, pen in hand, arrives on the other side of her fellow witch. \n\nFrost grabs Jockety's jacket and pulls himself upward. His eyes peer over the tabletop as his hand extends for the scroll. Jockety sees the mummy reaching, releases Astrid's hand and elbows Frost forcefully in the forehead. The creature falls back, its fingers digging jagged clawmarks in the wood tabletop. \n\nFreed, Astrid flings open the waffle iron as you step directly behind Jockety. \n\nBOOM.\n\n*finish ", "act5witches": "*comment\n*comment    Act5Witches.txt\n*comment\n\n*comment === Temp Variables\n*temp lTookScrollFromJockety 0\n*temp lTauntOfFrostLegs \"TBD\"\n*temp lPostWaffleIronAction \"TBD\"\n\n*comment === CHAPTER START\n[b]Chapter Six[/b]\n\nEverything is white. Blinking your eyes reveal some blobs of color. The cloudiness quickly dissolves into a pale mist. You're looking at the ceiling of the kitchen, lying face-up on the floor. \n\nJockety lies next to you, face down and head turned away. His breath alternates between snorts and snores. \n*if(gWhoHasScrollSignatureScrap = \"Jockety\")\n    Just above his ear, the scroll fragment floats on the bristles of his crew cut. Too valuable an artifact to leave lying about, you carefully pluck the scrap from the FBI agent's head.\n    *set gWhoHasScrollSignatureScrap \"you\"\n    *set lTookScrollFromJockety 1\n    \n    *goto GetScrollPieceBackLabel\n\n*label GetScrollPieceBackLabel\nYou wobble a bit but get to your feet. The mist has dissipated. Lincoln is knocked flat, as is the camera.\n\nA clatter corrals your attention. Frost lies across the table, having staggered into it. His legs are at least partially functioning now. A large puddle pools at his feet from some overturned container. The neck brace remains in place, having survived the assault and explosion. \n\nThe mended scroll lies on the opposite end of the wooden surface, the missing chunk refurbished by the flattened arugula-wrapped hot dog. The waffle iron has mysteriously vanished. Frost pulls himself toward the parchment. \n\n*if(lTookScrollFromJockety = 1)\n    You jam the scroll fragment into your front pocket.\n\n*choice\n    # Dive for the mended scroll, there's an outside chance you might get it before Frost.\n        *set lPostWaffleIronAction \"Scroll\"\n        *set gScrollFever + 5\n        You sprint a couple of steps and lunge onto the the table, stretching for the scroll. Your hand slaps the bottom of the parchment simultaneously to Frost's hand slamming the top half. \n        \n        The mummy slashes with his other arm. You flinch backward but two of his nails cut across your cheek. You instinctively check for blood as Frost releases the scroll and punches you in the forehead. The creature has lost a lot of his previous strength but the blow still rolls you off the table.\n        *set gYouSlashedCheek 1\n        \n        \"It-th mine!\" yells the mummy, clutching the scroll. \"Wait, what happened to my voithe? Thix, theven. A lithp?\"\n        \n        You retreat from the creature on hands and knees. Your cheek feels wet. You stop where Lincoln sits upright. \n        \n        \"You're bleeding,\" says Lincoln.\n        \n        You touch the cuts and your hand comes away bloody. \n        \n        \"Here,\" says Lincoln, tossing you a dish cloth. It looks mostly clean. You press it against the wound to your face.\n\n        *goto AtLincolnOpalGrabbedLabel\n    # See if Lincoln is okay, then check on the camera.\n        *set lPostWaffleIronAction \"Lincoln\"\n        *set gStatEmpathy + 4\n        *gosub_scene AchievementSubroutines achieveCheckEmpathyLabel\n        Frost crawls across the tabletop as you move to your cameraman. Lincoln sits upright but a bit dazed as you arrive. \n        \n        \"What happened?\" Lincoln asks. \n        \n        \"A possessed waffle iron exploded,\" you respond. \"Give it a second.\"\n        \n        \"It-th mine!\" yells the mummy, clutching the scroll. \"Wait, what happened to my voithe? Thix, theven. A lithp?\"\n        \n        \"The camera?\" says Lincoln.\n        \n        \"Let's make sure you're fully operational first,\" you say, looking for any wounds on Lincoln. He appears physically unharmed. \n        \n        \"I'm fine,\" says Lincoln, getting to his feet.\n        *label AtLincolnOpalGrabbedLabel\n\n        \"Ahhhhh!\"\n        *page_break\n        Frost clutches Opal by the back of her hair. \"I can't have thith,\" says Frost. \"I'm helplith without my voithe.\" Frost releases her hair but grabs her by the throat. \"Fix that th-croll and return my voithe or I'll pull your head off.\" He tugs upward a nudge. \n        \n        Opal screams. Tears drip from her eyes. \"I don't know how,\" she says. \n        \n        Low moans rumble through the kitchen. Jockety, Astrid and Fortuna rise in unison from the floor, the source of the incoherent laments. Black sludge clings to their faces, splattered from the explosion. They stare vacantly at the scroll in Frost's non-choking hand.  \n        \n        Everyone halts and focuses on the three. \n\n        *goto AgingSequenceLabel\n    # See if the camera is okay, then check on Lincoln.\n        *set lPostWaffleIronAction \"Camera\"\n        *set gStatAmbition + 4\n        *gosub_scene AchievementSubroutines achieveCheckAmbitionLabel\n        *set gFilmScore + 3\n        Frost crawls across the tabletop as you move to the camera.\n        \n        The rig lies on its side, still attached to the tripod. The power light flashes green and there are no visible cracks. Using your sleeve, you wipe dust from the lens.\n        \n        \"Uh, what happened?\" Lincoln asks. \n        \n        \"Move your leg, you're lying on the tripod.\" You push his foot from the equipment.\n        \n        \"It-th mine!\" yells the mummy, clutching the scroll. \"Wait, what happened to my voithe? Thix, theven. A lithp?\"\n\n        You pull the camera upright, point it at Frost and hit the record button. \"The red light means this thing is working, right?\" you ask.\n        *set gFilmedTheZombieCreation 1\n\n        \"Hey, I'm fine,\" says Lincoln. \"I can get up on my own.\" \n        \n        *goto AtLincolnOpalGrabbedLabel\n    # Jockety emits a low moan. Maybe he's hurt more than you thought, better check him again.\n        *set lPostWaffleIronAction \"Jockety\"\n        *set gStatEmpathy + 4\n        *gosub_scene AchievementSubroutines achieveCheckEmpathyLabel\n        Kneeling down, you roll the FBI man onto his back. Black sludge spots his face, splattered from the waffle iron explosion. Jockety pants out a trio of quick, snorting breathes but doesn't wake up. \n        \n        You grab a discarded dish rag and dab at the largest splotch. The slime oozes away from the cloth, as if alive. You wipe faster and get your wrapped finger over some sludge. The stuff doesn't come off, really sticking to Jockety's skin.  \n        \n        \"It-th mine!\" yells Frost, clutching the scroll. \"Wait, what happened to my voithe? Thix, theven. A lithp?\"\n        \n        The smaller black blobs migrate and quickly coalesce, forming three larger areas on Jockety's face. \n        \n        \"Ahhhhh!\"\n        \n        Frost clutches Opal by the back of her hair. \"I can't have thith,\" says Frost. \"I'm helplith without my voithe.\" The mummy releases her hair but grabs her by the throat. \"Fix that th-croll and return my voithe or I'll pull your head off.\" He tugs upward a nudge. \n\n        Opal screams. Tears drip from her eyes. \"I don't know how,\" she says.\n        *page_break\n        \"Let her go,\" you say, getting back to your feet. A bump knocks you aside. \n        \n        Jockety has risen, eyes closed and swaying slightly. Astrid and Fortuna also stand, likewise afflicted with black facial sludge. All three emit a low moan.\n        \n        Frost gives the trio a quick glance and then slowly moves his hand with the scroll toward his back. Jockety's, Astrid's and Fortuna's eyelids pop open. They stare intently at the scroll. Frost stops moving his hand.\n        \n        You notice Lincoln has regained his feet. You begin a quiet sidestep away from Jockety and toward the cameraman.\n        \n        *goto AgingSequenceLabel\n\n*label AgingSequenceLabel\nJockety, Astrid and Fortuna moan louder. The attached slime broils around the edges, emitting a blood-red vapor. The victims constrict into a seizure. Their hair turns gray and then white. Their skin wrinkles. A milky white fills their pupils. The black sludge shrinks, eventually sizzling away to nothing. The trio slump but stay upright. They have aged decades. They groan again in unison.\n\n\"Now thath not thomething you thee everyday,\" says Frost. He turns back to the still-choked Opal. \"Remind me, wath it fix my voithe or head removal?\"\n        \n\"Leave her alone,\" yells Melody, punching Frost in the neck brace. \n*if(gNeckBrace = \"C Clamp\")\n    The mummy's head wobbles but the C clamp holds. The young witch massages her bruised hand.\n    \n    *goto PunchNeckBraceLabel\n*elseif (gNeckBrace = \"Yard Stick\")\n    The mummy's head vibrates back and forth a few times but quickly stabilizes. The glued yard stick survives the assault.\n    \n    *goto PunchNeckBraceLabel\n*elseif (gNeckBrace = \"Golf Club\")\n    The mummy's head jerks but stays upright. The young witch's fist leaves a dent in the wrapped wire.\n\n    *goto PunchNeckBraceLabel\n\n*label PunchNeckBraceLabel\n*page_break\nFrost releases Opal, freeing his hand for a killing slash of Melody. She freezes with terror. As the mummy holds his backswing to enjoy his prey's helplessness, the waffle iron falls from the ceiling and crashes atop his head. Frost falters backward. Melody grabs Opal and pulls her away, only to run into the immobile, aged Astrid. The scroll flutters to the table top.\n\nJockety, Astrid and Fortuna lurch toward the freed scroll but Frost recovers quickly and grabs the parchment. The trio stop. Their heads track the movement of the document in the mummy's hand. \n\n\"Interesting,\" says Frost. \"My voice. It's restored. Stupendous. Six. Seven. Ess. Ha.\" He hops to celebrate but his legs cease functioning on landing. His chin cracks the table edge on the way down. His arms splay across the wooden surface, keeping him off the floor. \n\nThe stricken trio snap their heads to follow the still-clutched scroll. \n*page_break\n*if(lPostWaffleIronAction = \"Jockety\")\n    You rejoin Lincoln and check him for any sludge.\n    \n    \"What?\" he asks.\n    \n    \"Do you have any black stuff on you?\"\n    \n    \"What are you saying?\"\n    \n    \"The stuff that was on those three.\"\n    \n    \"Oh. Nah. I don't think so.\"\n    \n    Clark, finally recovered, sidles next to the FBI man. \n    \n    \"You okay agent Jockety?\" asks Clark. \"What happened to your hair?\"\n\n    Frost props himself onto the table with his elbows. \"Grab them,\" he says. \n    *page_break\n    *goto PostWaffleIronHitLabel\n*else\n    *fake_choice\n        # \"Looks like you don't have a leg to stand on,\" you say. You and Lincoln bump fists celebrating the zinger. \n            *set lTauntOfFrostLegs \"legs\"\n        # \"My kingdom for some bionic legs, eh, Frost,\" you say. \"Shakespeare wrote that.\"\n            *set lTauntOfFrostLegs \"bionic\"\n        # \"Ha!\" you say.\n            *set lTauntOfFrostLegs \"ha\"\n    Clark, finally recovered, sidles next to the FBI man. \n    \n    \"You okay agent Jockety?\" asks Clark. \"What happened to your hair?\"\n\n    \"Grab them!\" says Frost.  \n\n    *goto PostWaffleIronHitLabel\n\n*label PostWaffleIronHitLabel\nFortuna dives at you but falls short, faceplanting at your feet. On the bounce, she stabs her arms forward and snags you and Lincoln by an ankle. Her painfully strong grip can not be broken.\n\nJockety easily captures the adjacent Clark. Astrid seizes Melody and Opal by the arms.\n\n*if(lPostWaffleIronAction != \"Jockety\")\n    *if (lTauntOfFrostLegs = \"legs\")\n        \"Looks like I have at least six legs to stand on,\" says Frost to you. \n        *goto FrostTauntComebackLabel\n    *elseif (lTauntOfFrostLegs = \"bionic\")\n        \"Hoisted with his own petard. Also Shakespeare,\" says Frost to you.  \n        *goto FrostTauntComebackLabel\n    *elseif (lTauntOfFrostLegs = \"ha\")\n        \"Ha ha,\" Frost says back to you. \n        *goto FrostTauntComebackLabel\n    \n*label FrostTauntComebackLabel\n\"I had no idea they'd listen to me. Nice having devoted followers again.\" The mummy turns to Melody and Opal. \"Last chance. Fix this scroll.\" He wiggles the parchment for emphasis. Astrid emits a low moan. \n\n\"We don't know how,\" says Melody. \"Why don't you find the missing piece instead?\"\n\n\"So you've chosen painful head removal ... you know, that is actually a good question,\" says the mummy. \"Where would you advise such a quest begin?\" \n\nYou kick Fortuna's hand with your free leg. Her fingers dig deeper into your skin.\n\n\"Ask those two,\" says Melody, nodding her head to you and Lincoln. \"That piece got torn off when we took it from them.\" \n*page_break \n\"Break free,\" you tell Lincoln, stomping on Fortuna's hand. Her grip stays locked on your ankle. Lincoln kicks her repeatedly in the forearm, with no better results. The afflicted witch pulls her legs under her and stands, pulling your legs upward as she rises. You both hop on your other leg to maintain upright balance.\n\n\"My favorite duet,\" says Frost. \"Pull them over here.\" \n\nFortuna moans what might be confirmation and walks backward toward the mummy, towing the two of you by the leg. You grab Lincoln's arm for added balance as you both bounce to stay vertical. As she reaches the table corner, you pass a counter littered with food and kitchen supplies. With your free hand, you reach for a projectile.\n\n*choice\n    # You grab a coffee mug.\n        *set gZombieEscapeOne \"mug\"\n        Badly off-balance, you throw the cup at Frost. The missile flies well over the mummy's head and toward a sink full of dishes. The mug crashes onto the over-hanging handle of a large kitchen knife, flipping it end-over-end back at Frost. \n        \n        The creature casually leans to the left and the whirling blade narrowly misses his ear. \n        \n        \"Close one,\" says Frost. \n        \n        The knife embeds into the wall, slicing through the power cord of the humidified pretzel warmer. The severed cable falls with sparking electricity. The wire hits the floor and snaps violently, landing in the spilled broth at Frost's feet. \n        \n        The mummy vibrates with the surging current for a good five seconds and then collapses to the floor. Wisps of smoke rise from the crumpled body. The scroll floats onto the table surface.\n        \n        Fortuna releases yours and Lincoln's legs. You fall onto your butt while your cameraman catches his balance. \n        \n        Jockety, Astrid and Fortuna stumble toward the freed parchment, unimpeded by any prisoners.\n        \n        *goto PostMissileGrabLabel\n    # You grab a corn dog.\n        *set gZombieEscapeOne \"dog\"\n        Badly off-balance, you fling the corn-encrusted frankfurter at Frost. The meat-product strikes squarely on the mummy's forehead, ricochets vertically and then bounces to a stop on the table. \n        \n        \"Touché,\" says Frost. \"Commendable marksmanship.\" The mummy stands upright. \"And my legs now function. You have my gratitude.\"\n        \n        Fortuna jerks to a stop in front of the mummy. You and Lincoln hop frantically to maintain balance. \n        \n        \"Surrender the scroll piece and I won't kill you,\" says Frost. \"At least temporarily.\" His hands convulse for a second and then still. \"That can't portend good fortune,\" says the mummy. \n        \n        A second arm shudder quickly follows, causing the mummy to drop the scroll onto the table. Fortuna releases her grip on yours and Lincoln's legs and reaches for the parchment. You fall onto your butt while your cameraman catches his balance.\n        \n        Frost quickly recovers the scroll. His zombie-servants relax back to a standing repose. Suddenly the mummy's arms flap uncontrollably. The parchment flies over his head and lodges atop a hanging fluorescent light. Jockety, Astrid and Fortuna lurch forward, reaching for the suspended parchment. \n        \n        *goto PostMissileGrabLabel\n    # You grab a frosty cupcake.\n        *set gZombieEscapeOne \"cupcake\"\n        Badly off-balance, you throw the dessert treat at Frost. The bombardment misfires, not passing within two meters of the mummy. Instead the cupcake hits the unblinking Jockety between the eyes. The thick frosting smooshes across his upper face, blinding him. \n        \n        The FBI zombie releases Clark and flails forward, groaning plaintively. Two steps later he slams into Frost and both fall to the floor. The scroll flutters upward and lodges atop a hanging fluorescent light. \n        \n        Fortuna releases yours and Lincoln's legs. You fall onto your butt while your cameraman catches his balance. \n        \n        Astrid and Fortuna lurch forward, reaching for the suspended parchment. Frost wrestles with Jockety on the ground. \n        \n        *goto PostMissileGrabLabel\n\n*label PostMissileGrabLabel\n\"Run for it,\" you yell, rolling to your feet. You grab the camera and head for the door, giving Lincoln a tug to get him moving. Melody pulls Opal toward the far exit. You slam the door open and hold it as Clark and Lincoln rush through the passage. \n*if(gZombieEscapeOne = \"mug\")\n    Looking back, you see Frost fiercely shoving his zombies away from the scroll.  \n    \n    *goto OutOfKitchenLabel\n*elseif (gZombieEscapeOne = \"dog\")\n    Looking back, you see Frost shoulder-charge his zombies away from the scroll, his arms still flapping wildly.  \n    \n    *goto OutOfKitchenLabel\n*elseif (gZombieEscapeOne = \"cupcake\")\n    Looking back, you see Frost fiercely shoving his zombies away from the scroll, cupcake frosting splattering the walls.  \n    \n    *goto OutOfKitchenLabel\n\n*label OutOfKitchenLabel\n*finish\n\n", "act6witches": "*comment\n*comment    Act6Witches.txt\n*comment\n\n*comment === Temp Variables\n*temp AstridSearchingForScent \"TBD\"\n\n*comment === CHAPTER START\n[b]Chapter Seven[/b]\n\nYou sprint through the service area and out the gate, forgetting about the stench spell. The stink effectively gut-punches you into a wobbling, gasping halt. \n\nLincoln, breathe held and fingers pinching his nose, pulls you clear of the snack bar funk cloud. The cleaner air relieves your lungs. You inhale deeply.\n\n\"They open?\" asks an antiquer heading for the counter. \n\n\"Dude, don't eat there, the food stinks,\" Lincoln shouts back to the hopeful customer. \n\n\"Yeah, they really pile on the garlic,\" he replies arriving at the counter, the foul odor apparently whetting his appetite. Crashing noises continue from the kitchen. \"Wow, they must be cooking up something special.\"\n\n\"I'm okay,\" you tell Lincoln, leaving the antiquer to peruse the menu. \n\nLincoln takes the camera and you both hasten down a show aisle. Up ahead, Melody speed-walks with an arm around Opal's waist, holding her upright. Clark places Opal's other arm around his neck, adding extra support. They duck inside an antiques booth. You follow after them. \n*page_break\nThe stall contains all varieties of garden statues, with an overabundance of peeing cherubs. Melody sits with the older witch on a stone bench. You and Lincoln join Clark in front of them. \n\nOpal woozily sways and then faints onto Melody. The limp weight of her companion slides the young witch off the seat and plops her onto the floor. \n\n\"Great, another dead one,\" says Clark. \n\n\"Still breathing,\" says Melody, giving the security guard the evil eye.\n\n\"Go up front and keep a lookout,\" you tell Clark. He nods and leaves, happy to fulfill a simple task.\n \n\"Ah, an excellent choice.\" \n\nA gray-haired woman smiles to your group. \"That's the Hard Contemplator,\" she says, pointing to the bench where Opal lies. \"Show special, twenty percent off.\"\n\n\"She's just trying it out,\" you say.  \n*page_break \nA clatter arises from the front. Clark rights a tipping Michealangelo's David and resumes his not-quite-surreptitious sentry duty. \n\n\"Excuse me,\" says the proprietor, sternly heading toward the security guard. \n\n\"Opal needs help,\" says Melody.\n\n*choice\n    # \"I think she just passed out,\" you say. \"She'll be safer on the Contemplator than with us.\"\n        *set gOpalAwakened \"no\"\n        *set gStatEmpathy + 1\n        *gosub_scene AchievementSubroutines achieveCheckEmpathyLabel\n        \"Leave her?\" Melody responds. \"We can't do that, the monster-\"\n        \n        \"They're out of the kitchen!\" yells Clark, standing firm against the owner's efforts to shoo him into the aisle.\n        \n        \"Sit tight but get ready to run,\" you tell Lincoln and Melody. \"I'll take a look.\" \n        \n        *goto PostWakeOpalLabel \n    # \"We'll wake her up,\" you say.\n        *set gOpalAwakened \"yes\"\n        \"How?\" asks Melody.\n        \n        \"Maybe this,\" you say, twisting a tinkling cherub so the stream targets Opal's forehead. She stirs as the water splashes off her face. \n        \n        \"Myron, the shower's a bit cool. Turn up the heat,\" Opal mummers.\n\n        \"Not working,\" says  Melody.\n\n        \"They're out of the kitchen!\" yells Clark, standing firm against the owner's efforts to shoo him into the aisle.\n        \n        \"Sit tight but get ready to run,\" you tell Lincoln and Melody as you return the urinating statue to its original position. \"I'll take a look.\" \n        *page_break\n        *achieve wake_opal_01\n        *goto PostWakeOpalLabel \n    \n*label PostWakeOpalLabel\nYou bypass the proprietor scolding Clark and take a peek around David's stony buttocks.\n\nFrost and his minions cluster outside the snack bar.\n*set AstridSearchingForScent \"Astrid and Fortuna jerk around, like dogs trying to get a scent. They snarl at each other when coming too close. The browsing antiquers give them a wide berth.\"\n*if (gZombieEscapeOne = \"dog\")\n    Jockety carries Frost in a bear hug from behind, pinning the creature's arms to its body. The mummy's arms flap wildly from the elbow. The bark scroll dangles from Frost's mouth, secured by a firm bite. ${AstridSearchingForScent} \n    \n    *goto FrostOutOfKitchenLabel\n*else\n    *if (gMummyCarryTechnique = \"piggyback\")\n        Jockety totes Frost like a groom carrying a bride over the threshold. Apparently the mummy's legs still don't function. The creature clutches the bark scroll in his hand. ${AstridSearchingForScent}\n        \n        \"Piggybacking distributes the weight much better,\" you whisper to Clark. \"That's going to kill Jockety's arms.\"\n        \n        *goto FrostOutOfKitchenLabel\n    *else\n        Frost rides piggyback on Jockety. Apparently the mummy's legs still don't function although his arms appear fine, as he clutches the bark scroll in his hand. ${AstridSearchingForScent}\n        \n        \"I knew I should of carried Frost in a piggyback,\" you whisper to Clark. \"Look how much better the weight is distributed.\"\n        \n        *goto FrostOutOfKitchenLabel\n\n*label FrostOutOfKitchenLabel\nThe white-haired witches' heads snap in unison. They stare directly at you. \n\n\"Uh oh,\" you say.\n\nAstrid and Fortuna charge, bowling through the show patrons in their path. Jockety trots behind in their wake, obediently hauling Frost. \n*page_break \n\"Split up!\" you say.\n\nClark flees down the aisle from the oncoming threat. \n\n\"Let's go,\" says Lincoln, tucking the camera under his arm like a football. You both take off in Clark's direction. \n\n\"Where's Melody?\" you ask.\n\n\"Staying with the passed out lady,\" says Lincoln.\n\nYou glance back. Astrid and Fortuna pursue about five stalls behind you, teeth bared. Jockety, slowed by his beast-of-burden role, trots by the statue boutique. \n*if (gZombieEscapeOne = \"dog\")\n    Frost swings out a leg out and taps the sculpture of David. \n    *goto FrostPastDavidStatueLabel\n*else\n    Frost swings his arm and flicks the sculpture of David. \n    *goto FrostPastDavidStatueLabel\n*label FrostPastDavidStatueLabel\nThe replica masterpiece tips, falls and shatters at its owner's feet. \"Monster!\" the proprietor yells as Jockety bears the mummy away.   \n\n\"Down there,\" you say, pivoting into a side corridor. You hear a crash from behind you.\n\n\"What's the gosh darn rush ladies?\" someone shouts. A pair of wild growls answer. \n\n\"Okay then, go right ahead.\"\n*page_break\n*choice \n    # \"In here,\" you say, ducking into a stall filled with ceramic figurines.\n        *set gStoreToHideIn \"ceramic\"\n        You emergency-stop in front of a multi-shelved exhibit of porcelain cats. Lincoln bumps into your back, chain-reacting you into a hip check of the display. The ceramic felines rattle loudly but stay upright. \n          \n        A sharp intake of breath draws your attention. A large, bearish man stands locked with fright. \"Careful,\" he squeaks. \n\n        You give a reassuring wave and pull Lincoln behind the display, hidden from the hallway.\n\n        \"Think they saw us?\" Lincoln asks. \n\n        \"No way, they hadn't cleared the corner yet,\" you say.   \n\n        Astrid and Fortuna sprint into the stall and launch themselves at you, emitting a weird monkey hooting. Fortunately their trajectory doesn't account for the display case. Frost's zombie-goons collide face-first into the shelves, capsizing it and sending porcelain cats on criss-crossing flights to the tile floor.\n        *page_break\n        You back-pedal clear of the clattering wreckage, bumping to a stop against a different glass case. The proprietor sustains a high-pitched scream. \n\n        *if (gZombieEscapeOne = \"dog\")\n            Jockety carries Frost into the store. \"Tha-rpth-ed,\" says the mummy through his teeth clenched shut on the scroll.\n            \n            \"What?\" you ask. \n            \n            Frost jerks his head forward and back. Jockety charges at you. \n        \n            *goto CermaicScrollInTeethLabel\n        *else\n            \"Trapped,\" says Frost as Jockety carries him into the store. \"Into the breach,\" he says, spurring his mount. Jockety charges at you. \n        \n            *goto CermaicScrollInTeethLabel\n        *label CermaicScrollInTeethLabel\n        Astrid also dives at you from her ruins. She clips Jockety at the knees, upending him and Frost. You sidestep as all three hit and disintegrate a second display case. Remarkably, the proprietor's scream rises an octave.  \n\n        Fortuna has Lincoln by the ankle. \n\n        \"Sorry,\" you tell the owner, shouldering a free-standing rack of porcelain schnauzers onto Fortuna. The avalanche of ceramic dogs and glass counters smashes onto the witch's back, slackening her grip. Lincoln yanks his leg clear. Astrid, Jockety and Frost wrestle in a crunchy tangle along the other wall. \n\n        Lincoln bolts from the wreckage and into the hallway, barreling a hole through the gathering onlookers. He still carries the camera under his arm. You're right behind him, the aggrieved howl of the proprietor fading as you rush away. \n        *page_break\n        *achieve ceramics_01\n        The two of you dart between show-goers at a full run, frequently diverting into connecting hallways. \n\n        \"Where we going?\" Lincoln huffs.\n\n        \"Away,\" you say.\n\n        A door opens ahead and Clark pops out.\n\n        \"In here,\" he says.\n\n        You both hurry through and collapse in a large loading dock area. Clark slams and bars the door behind you.\n        \n        *goto HideOrRunLabel\n    # \"Over there,\" you say, bumping Lincoln into a stall featuring boxed vials and weathered books.\n        *set gStoreToHideIn \"homeopathic\"\n        You and Lincoln hasten behind a free-standing shelf. The display contains various sized flasks and bottles holding pills, colored powders or crumbled leaves.\n        \n        \"Welcome, glad you made time to stop by,\" says a distinguished gentleman in a white lab coat and tie. A stethoscope hangs from his neck. \"I'm sure I can relieve whatever ails you.\"\n        \n        \"Doubt it,\" says Lincoln. \n        \n        \"I too was a skeptic of homeopathic medicine,\" says the proprietor. \"Look at me now, selling antique natural remedies.\" He points to a vial resting on the shelf. \"A little tarentula will relieve all that stress. Probably too much time spent making the twitters.\"\n        \n        \"Thanks doc, but we're just browsing,\" you say. \n        \n        \"Oh no, I'm not a doctor,\" he says. \"Maybe a double dose of staphysgaria.\" \n        \n        Astrid and Fortuna sprint into the stall and halt into a crouch, prepared to attack you through the shelf, but then hesitate. Their gaze flicks back and forth among the different open containers. Their jaws clack a few times in confusion and then they plop down on their buttocks. \n        *page_break\n        \"Those are some angry auras,\" says the homeopath. \"I have just the thing for you ladies.\" He sinks below the counter, collecting ingredients for his remedy.\n        \n        *if (gZombieEscapeOne = \"dog\")\n            \"Thr-app-ed!\"\n            \n            Jockety bear-hug carries Frost into the store, the scroll still clinched in the mummy's teeth. \"Theeze thim,\" says Frost, repeatedly jerking his head toward you. \n            \n            Jockety gets the message after the mummy's fourth head twitch. The agent takes a menacing step forward but then slows to a stop. He suffers the same confusion as his zombie kin, his focus jumping among the variety of natural ingredients.\n            \n            Frost lets loose a frustrated but muffled howl while struggling to escape his immobile porter. His feet can't reach the ground but he manages to free a flapping arm. \n            \n            \"Sir, calm yourself or I'm afraid I'll have to ask you to leave,\" says the homeopath, stepping in front of Frost and Jockety. He holds a pair of jars filled with pink and blue powder.\n            *page_break\n            \"Mmmm hmmm,\" Frost responds, ignoring the proprietor while straining against Jockety's hold. The mummy's other arm squirts free and now both limbs thrash uncontrollably. With his cargo shifted, Jockety lumbers to recover his balance, invading the personal space of the faux-doctor. \n            \n            The creature's right arm jerks violently and slaps the proprietor upside the head. He collapses to the floor, inadvertently flinging his remedy for Astrid and Fortuna into air. The cloud of powder poofs over Frost and his three scroll-zombie servants. \n            \n            Astrid and Fortuna immediately roll back and forth in the spilled dust, giggling hysterically. Jockety starts spinning in place, rotating faster and faster. He maintains a solid hold of the mummy, taking him along for the ride.\n            \n            \"Th-top, I'm thustheptible to dizziness,\" Frost says, trying to unsuccessfully kick Jockety's legs out. He keeps a firm bite on the scroll.\n        \n            \"Time to go,\" says Lincoln, breaking for the hallway.  \n            \n            \"Good idea,\" you reply, hurdling the dazed proprietor and exiting the store. \n            *page_break\n            Inhuman, gasping cries arrest your escape. Looking back, Astrid, Fortuna and Jockety stand with mouths agape but otherwise dead still, staring at you. The FBI agent still hugs the mummy, whose head lolls in disorientation from the recent gyrations. \n            \n            You take an experimental step down the hall. Frost's zombies mirror your action, taking their own step forward.\n            \n            *goto ToTheLoadingDockLabel\n        *else\n            \"Ha ha, trapped!\" Jockety piggybacks Frost into the store. \"Seize them,\" says the mummy. \n            \n            Jockety takes a menacing step forward but then slows to a stop. He suffers the same confusion as his scroll-zombie kin, his focus jumping among the variety of natural ingredients. \n            \n            Frost slaps his mount across the back of his head. \"I said grab them.\" \n            \n            Jockety instead drops onto his backside, the jolt dislodging the mummy. Frost rolls a couple of revolutions until bumping against the foot of the faux-doctor. \n           \n            \"You have stupefied my servants,\" Frost says looking up from the floor. \n           \n            \"I ... servants? What?\" the homeopath replies, holding two jars containing pink and blue powder.\n            \n            Frost punches him in the groin. The poor man instantly doubles over, ejecting the contents of the containers across the stall. The cloud of powder poofs over the three zombies. \n            *page_break\n            Jockety jumps to his feet and starts spinning in place, rotating faster and faster. Astrid and Fortuna roll back and forth in the spilled dust, giggling hysterically.\n            \n            \"Time to go,\" says Lincoln, breaking for the hallway.  \n            \n            \"Good idea,\" you reply, hurdling over the entangled Frost and the fetal-curled proprietor. \n            \n            Inhuman, gasping cries arrest your escape. Looking back, Astrid, Fortuna and Jockety stand with mouths agape but otherwise dead still, staring at you. \n            \n            You take an experimental step down the hall. Frost's zombies mirror your action, taking their own step forward.  \n            \n            \"Pick me up,\" yells Frost, breaking the detente. Jockety jerks toward the mummy as Astrid and Fortuna launch toward you. \n            \n            *label ToTheLoadingDockLabel\n            \"Run!\" you yell. \n            *page_break\n            *achieve homeopathic_01\n            You and Lincoln dart between show-goers at a full sprint, frequently cutting into connecting hallways. The squawks of antiquers getting run over by Astrid and Fortuna spurs you forward.  \n            \n            A door opens up ahead and Clark pops out. \"In here.\" \n            \n            You and Lincoln hurry through as Clark slams and bars the door. Two loud thumps rock the barrier in quick succession. Astrid and Fortuna hiss in frustration. \n            \n            You're inside a large loading dock.\n           \n            *goto HideOrRunLabel\n        \n*label HideOrRunLabel     \n*finish\n", "act7witches": "*comment\n*comment    Act7Witches.txt\n*comment\n\n*comment === Temp Variables\n*temp   lArmsOrLegs\n*temp   lArmsOrLegsNowWork\n*temp   lChoiceMotivation\n*temp   lLincolnPositionForAmbush \"ambusher\"\n*temp   lFrostGrabLine\n*temp   lMelodyOrOpal\n*comment *temp   lTrippedZombie \"Oiled Jockety\"\n*temp   lTrippedZombie \"Tangled Jockety\"\n*temp   lNeckBraceName \"TBD\"\n\n*comment === CHAPTER START\n[b]Chapter Eight[/b]\n\n*if (gStoreToHideIn = \"homeopathic\")\n    \"That door's really solid,\" says Clark. \"I've seen a forklift bounce off it.\" \n    \n    *goto AnyoneAtLoadingDockDoorLabel\n*else\n    \"That door will hold them,\" Clark says. \"At least for awhile.\" Indeed the barrier remains firm to Astrid and Fortuna's pounding.\n    \n    *goto AnyoneAtLoadingDockDoorLabel\n\n*label AnyoneAtLoadingDockDoorLabel\nYou flash the security guard a thumbs up as you regain your breath. Looking around, you see three recreational, ocean-going fishing boats parked on trailers. Sealed boxes and wrapped cords of fishing rods lie between the vessels. Large flat advertising boards lean against walls, depicting boats on the ocean, netted fish and elated tourists.\n\n\"Sports fishing show sets up tomorrow,\" says Clark. \n\n\"Save me a ticket,\" says Lincoln, setting the camera down. \"Let's get the hell out of here while we can.\"\n\n\"We can't run,\" you say. \n\n*if(gZombieEscapeOne = \"dog\")\n    *set lArmsOrLegs \"use his arms\"\n    *goto postArmOrLegsAssignLabel\n*else\n    *set lArmsOrLegs \"walk\"\n    *goto postArmOrLegsAssignLabel\n\n*label postArmOrLegsAssignLabel\n*choice\n    # \"We have to capture Frost. Otherwise they'll pin the dead bodies on us.\"\n        *set lChoiceMotivation \"blame\"\n        *set gStatEmpathy + 1\n        *gosub_scene AchievementSubroutines achieveCheckEmpathyLabel\n        \"We have proof,\" says Lincoln. \"We got a ton of footage of that thing.\"\n        \n        \"The cops will think the video's faked,\" you say. \"Especially if Frost disappears. They'll arrest us instead. We need to show them the mummy. Alive.\"\n        \n        \"That thing almost killed us,\" says Lincoln. \"Like twenty times.\"\n        \n        \"Back when he was fully functional,\" you say. \"Look at him now, he can't even ${lArmsOrLegs}. All we need is the scroll. Then Frost can't do anything. We own him. Plus we'll have Jockety. Maybe we can cure him and he'll back up our story.\"\n        \n        \"That simple, huh. Just pluck the scroll from Frost,\" says Lincoln. \n        \n        \"Yeah, how are you going to get it?\" asks Clark.\n        \n        \"We ambush him,\" you say. \"We let him charge through that door and blindside him. The scroll comes loose and one of us grabs it. Jockety and the witches obey whoever has the scroll. Game over.\" \n        *page_break\n        \"I don't know, that's like, commando shit,\" says Lincoln. \"We make shows about people selling old junk.\" \n        \n        \"Although these plans always works on Scooby Doo,\" says Clark.\n        \n        \"It never works on Scooby Doo,\" says Lincoln. \"The stoned dude always screws it up.\"\n        \n        \"Frost's attacked us when we weren't ready,\" you say. \"This time we'll surprise him.\"\n        \n        *goto WhyWeStayLabel\n    # \"We covering the story of the century. We're combat journalists now. Like Ernie Pyle and Christiane Amanpour and, um, Lois Lane.\" \n        *set lChoiceMotivation \"fame\"\n        *set gStatAmbition + 1\n        *gosub_scene AchievementSubroutines achieveCheckAmbitionLabel\n        \"Oh yeah, is Superman on the way?\" asks Lincoln. \n        \n        \"Everyone's going to want this story,\" you say. \"We're at ground zero. You'll get any gig you want after we pull this off.\"\n        \n        \"I'm more worried about getting my head pulled off,\" says Lincoln. \n        \n        \"I'm worried about that too,\" says Clark. \"Except, you know, my head, not his. Although I don't want his head, or anyone's head, um. Still attached, and all.\"\n        \n        \"Frost is barely functional,\" you say. \"He can't even ${lArmsOrLegs}. All we need is the scroll. Then he'll do whatever we say. We can show the world.\"\n        \n        \"And you're just going to pluck it away from him?\" asks Lincoln. \n        \n        \"We ambush him,\" you say. \"We let him bust through that door and Clark and I blindside him. The scroll comes loose and one of us grabs it. You get a nice wide angle shot of the whole thing. Pulitzers all around.\" \n        *page_break\n        \"What about agent Jockety?\" asks Clark.\n        \n        \"Him and the witches obey whoever has the scroll,\" you say. \"I'm pretty sure.\"\n        \n        \"Pretty sure?\" asks Lincoln. \n        \n        \"Frost's attacked us when we weren't ready,\" you say. \"This time we'll surprise him.\"\n\n        Lincoln thinks it over, enticed by the rewards but frightened by the risks. He looks over at Clark. \n        \n        \"I guess it could work,\" says Clark. \"If we had some weapons.\" \n        \n        *goto WhyWeStayLabel\n    # \"If we let Frost get away, who knows when he'll jump us. He's weakened. We can take him.\"\n        *set lChoiceMotivation \"fear\"\n        *set gStatEmpathy + 1\n        *gosub_scene AchievementSubroutines achieveCheckEmpathyLabel\n        \"Are you nuts? We almost got killed, like, twenty times already,\" says Lincoln. \n        \n        \"Frost will do whatever it takes to get us,\" you say. \"Do you want to live like that, nervous about every dark corner? I don't. We can do something about it. Right now.\"\n        \n        \"Like what, bleed on him? That thing's got the undead superpower upgrade,\" says Lincoln. \n        \n        \"Not anymore. He's barely functional. He can't even ${lArmsOrLegs}. We get the scroll and it's over. We own him. If we wait he could get his full powers back.\"\n        \n        \"That simple, huh? Just take the scroll.\" \n        \n        \"Yep.\" \n        \n        Lincoln waits for what he considers reason to descend upon you. The silence lingers.\n        \n        \"How would you get the scroll?\" asks Clark.\n        \n        \"Don't encourage ${gHim},\" says Lincoln.\n        *page_break\n        \"We set an ambush,\" you say. \"We let him bust through that door and blindside him. The scroll comes loose and one of us grabs it. We destroy the scroll and no more Frost.\"\n        \n        \"How do you know that?\" asks Lincoln. \"You read the wikipedia page on killing mummy murder machines?\" \n        \n        \"There's a wikipedia page?\" asks Clark.\n        \n        \"Every time the scroll's been ripped Frost has gone stiff,\" you say. \n        \n        \"Seems suicidal,\" says Lincoln.\n        \n        \"He's always attacked us when we weren't ready. This time we'll surprise him.\"\n        \n        Lincoln and Clark look to each other, seeing if the other one is convinced. \n        \n        \"It could work,\" says Clark. \"If we had some weapons.\" \n        \n        *goto WhyWeStayLabel\n\n*label WhyWeStayLabel\nA heavy impact rocks the door. Frost's face presses against the wire-reinforced glass window. The scroll zombies crowd behind him.  \n*page_break       \n\"I see you in there,\" Frost yells through the barricade. He head-butts the glass, radiating a spider-web of cracks from the impact point. His left eye begins twitching rapidly as his pupils cross. The mummy wobbles and you hear a thump against the door. Silence follows.\n\n\"Think he's dead?\" asks Clark. \n\n\"No,\" says Lincoln. \"Just more pissed off.\"\n\n\"I'm staying,\" you say.\n\n\"You really think we can take him?\" Lincoln asks.\n\n\"Hasn't gotten us yet,\" you respond. \"We're on a winning streak.\"\n\n\"Yeah, right,\" says Lincoln. He frowns, unhappy with the flight or fight paths before him. \"Well crap, I can't just let you get killed. What's your plan?\"\n\n\"Clark, go find some pointy things,\" you say. The security guard nods acknowlegement and scrambles into the columns of boxes. \n\n*choice\n    # \"I'll be the bait,\" you tell Lincoln.\n        *set lLincolnPositionForAmbush \"ambusher\"\n        \"Excellent idea,\" says Lincoln.\n        \n        \"Sneak over behind the forklift, don't let Frost see you,\" you say. \n        \n        \"Okay.\"\n        \n        \"When he comes running at me, hit him.\"\n        \n        \"Hit him? With what? Maybe I should be the bait.\"\n        \n        \"Frost will never see you coming. I'll keep him distracted,\" you say. \"Clark! How are we doing for ordnance?\" \n        \n        *goto PostLincolnPositioningLabel\n    # \"You be the bait,\" you tell Lincoln.\n        *set lLincolnPositionForAmbush \"bait\"\n        \"What?\" says Lincoln. \n        \n        \"Don't worry, I'll be right over there behind the forklift. I'll hit Frost before he gets to you.\" \n        \n        \"Why can't you be the bait?\"\n        \n        \"Being the bait is safer. When Frost comes through the door, take off running in the opposite direction.\"\n        \n        *goto PostLincolnPositioningLabel\n    # \"Record everything from right here,\" you tell Lincoln. \n        *set lLincolnPositionForAmbush \"cameraman\"\n        *set gStatAmbition + 5\n        *gosub_scene AchievementSubroutines achieveCheckAmbitionLabel\n        *set gFilmScore + 10\n        \"That's your plan? Frost can see me if I stand here,\" says Lincoln.\n        \n        \"Don't worry, I'll be right over there behind the forklift. Make sure to get me in the frame.\" \n        \n        \"How about me and the camera hide behind the forklift and you stand out here in the open?\"\n        \n        \"That's a terrible shot. Plus I can't ambush Frost if he sees me. Speaking of which, Clark! How are we doing for ordnance?\"\n        \n        *goto PostLincolnPositioningLabel\n\n*label PostLincolnPositioningLabel\nFrom an unseen location behind the boats, something topples over with a crash. \"Almost there,\" Clark yells from a hidden recess.\n*page_break\n*if(gZombieEscapeOne = \"dog\")\n    *set lArmsOrLegsNowWork \"arms\"\n    *goto ArmOrLegsAssignedTwoLabel\n*else\n    *set lArmsOrLegsNowWork \"legs\"\n    *goto ArmOrLegsAssignedTwoLabel\n\n*label ArmOrLegsAssignedTwoLabel\n\"My ${lArmsOrLegsNowWork} have shed their affliction,\" says Frost from behind the door. \"But why are there two of everything?\" \n\nThe mummy flattens his face against the window. His eyes are badly crossed. \"This double sight will not be abided.\" The creature head butts the window again. The cracks widen and small chunks of glass plink onto the floor. Frost staggers back. \n\nClark rejoins you, struggling with an array of potential weapons. \"I wasn't sure what would work best so I brought a bunch of stuff.\" \n\n\"What are you doing over there?\" comes a yell from beyond the door. \"That's not part of the show. Get away from there.\" \n\n\"That's Mr. Wilkerson, my supervisor,\" says Clark. \"Run away, Mr. Wilkerson!\"\n\n\"Clark?\" A jowly face fills the cracked window. \"What are you doing - did you break this glass?\" \n\n\"Pardon me warden,\" says Frost. \"Perchance would one of the many keys on your ring open this door?\" \n\n\"What? That's none of your- whoa, what happened to your face?\"\n*page_break\nA heavy thump impacts the door followed by a meaty thud onto the ground. Then all noise ceases.\n\n\"Mr. Wilkerson?\" asks Clark. \n\n\"Why doesn't this imbecile label his keys,\" says Frost. \n\n\"Clark, we don't have much time,\" you say. \"What did you find?\"\n\n\"Huh?\" says Clark, \"Oh.\" He clatters his load onto the ground. \n\nAt your feet lay a crow bar, staple gun, a length of two-by-four, mounted shark jaws from a medium sized predator, a quart of motor oil, some fish nets and a bunch of fish hooks attached along various lengths of fishing lines. \n*page_break\n*if (gNeckBrace = \"Yard Stick\")\n    \"A staple gun?\" says Lincoln. \"We already zapped him with that, like, twenty times. He didn't even flinch. And what are we supposed to do with shark jaws?\"\n\n    *goto PostStapleGunComment\n*else\n    \"A staple gun?\" says Lincoln. \"C'mon Clark, we're not decorating the junior prom. And what are we supposed to do with shark jaws?\"\n    \n    *goto PostStapleGunComment\n*label PostStapleGunComment\n\"Those teeth are really sharp,\" Clark responds.\n\n\"Didn't help the shark none, did it?\" says Lincoln. \n\n\"Chill,\" you say. \"We can work with this.\"\n\nScratching and clawing assault the barred door. Frost must have ordered his minions to try to break in while he looks for the magic key. \n \n*choice\n    # Take the crow bar, motor oil and fish nets.\n        *set gWeaponChoice \"crow bar\"\n        *if (lLincolnPositionForAmbush = \"ambusher\")\n            \"Okay, Clark, take this motor oil and spread it out in front of me,\" you say. \"Lincoln, take the crow bar and sneak over behind the fork lift. Don't let them see you from the door.\"\n            \n            Clark obliges and squirts slippery 'S' patterns onto the floor as he backs away from you. Lincoln grabs his weapon and disappears behind a boat.\n            \n            \"Spread it around,\" you tell Clark. \"We want them to wipe out.\" \n            \n            The security guard nods, finds a handy rag and disperses the oil. Meanwhile, Lincoln slides along the wall adjacent to the door. Upon reaching the forklift, he crouches behind the vehicle body, unseen from the entrance.\n            \n            *goto AmbushSetupOneReadyLabel\n        *else\n            \"Okay, Clark, take this motor oil and spread it out in front of Lincoln,\" you say. \n            \n            Clark obliges and squirts slippery 'S' patterns onto the floor as he backs away from you. \n            \n            \"Now Lincoln, nothing to worry about.\" You pick up the crow bar and smack it into your palm. You wince at the impact and rub your hand on your thigh. \"I'll hit Frost long before he gets to you. \n            *if(lLincolnPositionForAmbush = \"cameraman\")\n                Just shoot the action. Let your instincts take over.\"\n                \n                Lincoln gives you an uncertain nod and shoulders the camera.\n                *goto AmbushOneCameraLabel\n            *else\n                If he gets too close, take off. I'm going to sneak over to my spot now.\"\n\n                Lincoln gives you an uncertain nod. \n                *goto AmbushOneCameraLabel\n            *label AmbushOneCameraLabel    \n            You return a lucky arm punch and then duck between two of the fishing boats. With the stern-drive cruiser blocking sight to the door, you cut sideways and make it to the wall adjacent to the door. \n            \n            \"Clark, spread the oil around,\" you say. \"We want them to wipe out.\" \n            \n            The security guard nods, finds a handy rag and disperses the oil. You slide along the wall to the forklift, then crouch and move behind the vehicle body, unseen from the entrance.\n            \n            *goto AmbushSetupOneReadyLabel\n        *label AmbushSetupOneReadyLabel\n        A solid shoulder rattles the door.\n        \n        \"Guess they gave up on the keys,\" says Clark. \n        \n        \"Yeah, looks like it,\" you say. \"Good job with the oil. Now take the fish net and hide behind those boxes. Throw it over anyone that falls.\"   \n        *page_break\n        *goto DoneSettingUpTheAmbushLabel\n    # Take the two-by-four, staple gun and fishing lines with attached fish hooks. \n        *set gWeaponChoice \"two-by-four\"\n        \"Clark, watch what I'm doing,\" you say, taking the ends of the fishing lines and, using the staple gun, secure them to a wooden post at ankle height. \n        *if (lLincolnPositionForAmbush = \"ambusher\")\n            \"String these out in front of me and then staple the other end to the pole over there. Got it?\"\n            \n            Clark nods affirmation, picks up the lines and uncoils the the trip wires across the space. The fish hooks serve as barbs every half meter or so. \n            \n            \"Lincoln, take the two-by-four and sneak over behind the fork lift. Don't let them see you from the door.\" \n            \n            Lincoln salutes, arms himself with the board and disappears between two of the boats.\n            \n            Clark wraps the line around the far pole, keeping it taut. Satisfied, he drives a half dozen staples to lock it in place. Meanwhile, Lincoln reappears and slides along the wall adjacent to the door. Upon reaching the forklift, he crouches behind the vehicle body, unseen from the entrance.  \n            \n            \"Good job Clark,\" you say. \"Now run a line to that pole. Then we'll have a grid.\"\n\n            *goto AmbushSetupTwoReadyLabel\n        *else\n            \"String these out in front of Lincoln, stapling to the pole over there. Got it?\"\n            \n            Clark nods affirmation, picks up the lines and uncoils the the trip wires across the space. The fish hooks serve as barbs every half meter or so. \n            \n            \"Now Lincoln, nothing to worry about,\" you say, grabbing the two-by-four and swatting it into your palm. You wince at the impact and rub your hand on your thigh. \"I'll hit Frost before he gets to you.  \n            *if(lLincolnPositionForAmbush = \"cameraman\")\n                Just shoot the action. Let your instincts take over.\"\n                \n                Lincoln gives you an uncertain nod and shoulders the camera.\n                *goto AmbushTwoCameraLabel\n            *else\n                If he gets too close, take off. I'm going to sneak over to my spot now.\"\n\n                Lincoln gives you a
