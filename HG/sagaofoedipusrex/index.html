mployees do not appear to share your dedication to the work. \n\nGenerally lazy and undisciplined, they seem to have formed a rough company of sorts, albeit without a clear leader. More than once, you'd noticed them leaving swords and spears out in the rain, headless of the rust it would cause. Your old weapons master would have skinned you alive for even thinking about such carelessness. \n\n\nHonestly, you're hoping the trip passes without incident. You're not at all certain you could rely on these men to hold your back against an enemy of any skill. Right now, most of the group are engaged in some sort of game that involves flipping for coins as they walk, barely paying attention to their surroundings at all. Only Nikanor walks with a hand on the pommel of his sword, showing some degree of interest in keeping watch.  \n\n*page_break\n\nThe trees grow densely here, reaching high above to create shifting patterns of light on the trail. But something has been bothering you. It's like an itch between your shoulder blades that you can't quite reach. Suddenly it hits you, it's quiet. Too quiet. Sure the leaves still rustle in the wind, but the birdsong has gone silent. \n\nYou feel it should mean something, although your training had always been in weapons skill and tactics, not scouting and woodsmanship. \n\n*choice\n\t#Continue walking, keeping an extra sharp look out. The trees could be hiding anything, but you don't trust the abilities of the other guards to think it worth telling them. \n\t\tYou walk swinging your head from side to side and you scan the tree line. Silently you curse your employer's continued bickering. It'd be much easier to listen for trouble if they'd only give it a rest for once. \n\t\t\n\t\tAs you glance around, you see something move in the trees behind the cart. Adrenaline spikes. You knew something wasn't right!\n\t\t\n\t\t\"They're in the trees behind us! Everyone guard the wagon!\"\n\t\t\n\t\t*page_break\n\t\t\n\t\tCoins are dropped as the remaining guards, scramble to take up defensive positions along the wagon. They're spread out evenly instead of fighting back to back, easy pickings if they're mobbed. One even digs around in a hessian sack, apparently hunting for his sword. [i] Amateurs.[/i]\n\t\t\n\t\t*label coverblown\n\t\t\n\t\t\n\t\tTheir cover blown, the bandits slink from their hiding places. As they appear, you realise they outnumber you almost two to one. This is not good. \n\t\t\n\t\tThe thieves move quietly, dressed in shades of green and black, veils drawn up to hide their faces. They carry an assortment of weaponry showing signs of disrepair which have likely been pilfered from their previous victims. Still, the way they move speaks of frequent use. They're dangerous, particularly given the rather uncertain skill level of the guards at your back.\n\t\t\n\t\tYou've only got a moment to decide, but there's probably enough time to try and direct the guards into a better defensive position. Of course, this relies on them actually listening to you and will split your attention away from the bandits already rushing towards where you stand. \n\t\t\n\t\t\n\t\t*choice\n\t\t\t#Try to take charge, ordering the guards to take up better positions.\n\t\t\t\t*set directguards \"success\"\n\t\t\t\t*set helpguards \"yes\"\n\t\t\t\tYou'll do your best to keep everyone alive. Hopefully they'll listen. \n\t\t\t\t\n\t\t\t\t\"Stand together! Together I say!\" you yell at the guards as the bandits advance on your position. Surprisingly, some move to obey, forming clusters about the cart. \n\t\t\t\t\n\t\t\t\t\"Archelaos, you're too close to the trees! Sostrate get your back against the cart! Zephyros ...Argh!\"\n\t\t\t\t\n\t\t\t\tYour tirade is cut short as a stocky man holding something that looks like a sharpened pitchfork rushes you. Using the flat of your sword you bat the makeshift weapon away, managing to remain unharmed. \n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tAlthough not all the mercenaries obeyed, enough of your commands appear to have gotten through. The fighting continues centred around a group of your own people fighting back to back, preventing them from being picked off easily. \n\n\t\t\t\tSettling into a rhythm, you continue to swing your sword back and forth, clearing a path through the rabble. Something whizzes past your ear and a man about to plant a knife in your back falls at your feet, an arrow embedded in his chest. Risking a glance behind you, you see Elpis  has climbed atop the bags of grain, nocking an arrow for another shot. You hadn't even realised the merchant owned a bow, let alone knew how to use one. Never the less the help is welcome. \n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t*goto costatxt\n\t\t\t\t\n\t\t\n\n\t\t\t\t\n\t\t\t\n\t\t\t\n\t\t\t#Focus on the bandits advancing towards you. A distraction at this point could be fatal. \n\t\t\t\t*set helpguards \"no\"\n\t\t\t\n\t\t\t\t*goto focusfight\n\t\t\n\t\n\t#Continue walking. You'll keep watch as usual, but it's probably just the merchant's screaming that is upsetting the local wildlife.\n\t\tLight knows it's getting on your nerves. You consider asking them to quieten down, using the excuse that any bandits will hear you coming for miles; but dismiss it as an exercise in futility.\n\t\n\t\tBesides, you don't want to sound an alarm unnecessarily. You know from your teaching that issuing too many of false alarms will cause people to ignore you at the time you really need them to listen. \n\t\t\n\t\tAs you continue to travel down the road, you feel the tension leave your shoulders. Nothing. Surely if there was an ambush in place you would have walked into it by now.\n\t\t\n\t\t*page_break\n\t\t\n\t\tThe attack comes without warning. Looking ahead and to the sides of the trail, you'd neglected to anticipate that the ambush could in fact come from behind. \n\t\t\n\t\tBandits leap from their hiding places, launching an attack which picks off the flanking guards before they can even draw their weapons. As more appear, your heart sinks. At a rough estimate, they outnumber you almost two to one and they have the element of surprise. \n\t\t\n\t\tThe thieves strike quickly, shadows dressed in shades of green and black, veils drawn up to hide their faces. They carry an assortment of weaponry, likely pilfered from previous victims with many showing signs of disrepair. Still, the way they move speaks of the skill that comes from frequent use. They're dangerous, particularly given the rather uncertain skill level of the guards at your back.\n\t\t\n\t\t*page_break\n\t\t\n\t\tTrue to your fears, your associates scramble to take up defensive positions, spreading out in a way that actually leaves them more vulnerable than the mobs they'd originally been clustered in. One even scrabbles about in a hessian sack, presumably looking for his sword. [i]Amateurs.[/i]\n\t\t\n\t\tWith no time to regroup and plan for the attack, the best you can do is shout a few orders and hope to be heard over the din. Trying to co-ordinate the battle while in the middle of it, may be difficult and distracting however. It could leave you skewered on the end of a spear.\n\t\t\n\t\t*fake_choice\n\t\t\t#Concentrate on your own fight. \n\t\t\t\t*set helpguards \"no\"\n\t\t\t\t*label focusfight\n\t\t\t\t\n\t\t\t\tAlready bandits run towards your position. You haven't any attention to spare as their weapons clash against your own. Swinging your sword, you drive off a man who rushes you with a rusty looking pike, and another who tries to run you through with a spear. With your full attention and skill with a sword, you sustain little more than a few scratches as you cut a swathe through the rabble.\n\t\t\t\n\t\t\t\tThe scene quickly dissolves into a chaos of yells and screams as people crowd about the wagon, flailing and striking with their weapons. Your own people are holding up better than you'd initially feared, however a good many now lie motionless on the ground. \n\t\t\t\t\n\t\t\t\t*goto costatxt\n\t\t\t\n\t\t\t\n\t\t\t#Try to direct the guards to take up a better defensive strategy.\n\t\t\t\t*set helpguards \"yes\"\n\t\t\t\tYou scream to be heard over the yelling as the mercenaries engage the thieves.  \n\t\t\t\t\n\t\t\t\t\"Fools, what are you doing?! Together! Stand together!\" \n\t\t\t\t\n\t\t\t\tA stocky man holding something that looks like a sharpened pitchfork rushes you. Using the flat of your sword you bat the makeshift weapon away. \n\t\t\n\t\t\n\t\t\t\t\"Archelaos, you're too close to the trees! Sostrate get your back against the cart! Zephyros ... Argh!\"\n\t\t\t\t\n\t\t\t\tYour commands are cut short as a tall brigand wielding a spear, gets in a lucky strike. You feel a spreading warmth of blood as it drips from your right side. At least you can still breathe, it must not be too deep. \n\t\t\t\t\n\t\t\t\t*set health -1\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tFavouring your side, you still manage a series of slashes, driving your attacker back away from the cart. He breaks off looking for easier prey, but is immediately replaced by two more, driving you back towards the wagon. \n\n\t\t\t\tFighting desperately, something whizzes past your ear and the knife wielding thief falls, an arrow embedded in his chest. Risking a glance behind, you see Elpis  has climbed atop the bags of grain, nocking an arrow for another shot. You hadn't even realised the merchant owned a bow, let alone knew how to use one. Never the less the help is welcome. \n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tYour earlier attempt at directing the mercenaries appears to have made little difference. Either your call came too late, or the undisciplined guards simply weren't inclined to follow them. Although many of the bandits lie motionless on the ground, a good many of your own are no longer standing either. \n\t\t\n\t\t\t\t*label costatxt\n\t\t\t\t\n\t\t\t\tYou're forced to duck as Iason pushes his way towards you, a look of blank madness in his eyes. Wielding a solid stick like a club, he's swinging wildly at anything within reach, including you. The man is likely to do the bandit's work for them if you don't do something about him. \n\t\t\t\t\n\t\t\t\t*fake_choice\n\t\t\t\t\t#Yell at the merchant to pull himself together.\n\t\t\t\t\t\t\"Iason! Pull yourself together man! I'm on your side!\" you scream at him as he swings the makeshift club your way once more. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Oedipus?\" The man breaks off the swing, his eyes wide with terror. Your words are only just getting though. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"That way!\" You give him a slight push towards the enemy, hoping that'll be enough to keep him busy and away from his allies.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t#Hit him over the head with the pommel of your sword when his back is turned. \n\t\t\t\t\t\t*set hitcosta \"yes\"\n\t\t\t\t\t\tIt shouldn't kill him, but will take him out of the fight. He continues to flail, opening up a circle around himself as allies and enemies alike back away. With a sharp crack, the handle of your sword connects with his skull and he collapses to the ground limply. Hopefully he'll stay down. The bandits have more on their mind than to go after the wounded right at the moment. \n\t\t\t\t\t\t\n\t\t\t\t\t\t[i]You're so not going to get paid after this![/i] The thought crosses your mind as you stab at another bandit. [i]Ah well, you can deal with that later should you survive long enough for it to be a problem.[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\tYou continue to parry and slash, noticing that Nikanor has come to stand beside you. Finally, enough of the bandits fall that the remainder decide to cut their losses and flee back into the forest; allowing you to regroup and tend to the wounded. \n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t*if (directguards = \"success\")\n\t\t\t\t\n\t\t\t\t\t*goto successfight\n\t\t\t\t\n\t\t\t\tYour caravan has not fared well. Over half the guards lie motionless on the ground in amongst the bandits. Of the remainder still standing, few are fit to fight. It's as well that the battle ended when it did. \n\t\t\t\t\t\t\t\t\n\t\t\t\tElpis  climbs down from her perch atop the sacks of grain,\t\t\t\t\n\t\t\t\t*if (hitcosta != \"yes\")\n\t\t\t\t\twalking over to comfort Iason who still holds his club before him. Trembling, his expression blank with shock. \n\t\t\t\t*if (hitcosta = \"yes\")\n\t\t\t\t\trushing over to where Iason still lies blinking woozily in the sunlight. She shoots you a dirty look. It seems she saw what you did and regardless of how necessary it may have been, does not approve. \n\t\t\t\t\t\n\t\t\t\t\t[i]Yep, definitely not getting paid.[/i] you reflect tiredly, leaning back against the wagon for support.\n\t\t\t\t\n\n\t\t\t\t\n\t\t\t\t*gosub notfairedwell\t\n\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\tThe procession is sombre as it winds its way slowly into Megara. You notice there is no further talk of a longer trip to Athens. \n\t\t\t\t\t\n\t\t\t\t*if (hitcosta = \"yes\")\n\t\t\t\t\n\t\t\t\t\tWhen you reach your destination, Elpis shoves a purse roughly into your hands, informing you that your services would not be required for the return trip. Small thanks, considering their losses would likely have been far greater had you not been present. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t*if (hitcosta != \"yes\")\t\n\t\t\t\t\tWhen your reach your destination, Elpis hands you a purse with a few extra coins. It's clear she knows that their losses would likely have been heavier without you. \"Go with my thanks.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t*set coins +5\n\t\t\t\t\t\t\t\t\n\t\t\t\t*goto endfight\n\t\n\t\n\t#Tell Iason you need to scout up ahead, although it may put you at some risk if there is an ambush down the trail. \n\t\t*set battle \"scout\"\n\t\tYou indicate that you're going to take a look down the trail to Iason, who waves you off absently; still deep in an argument with Elpis  about the number of guards they should have hired. Setting off at a jog, your eyes search the trees for trouble on the twisting road finding none. \n\t\t\n\t\tWith a shrug, you turn and start walking back towards the caravan. It's actually quite peaceful out here away from the rest of the group despite the thick, still air. A shrike warbles from a thorn laden bush, answered by another flitting among the branches above. Birdsong. But if they're singing out here... Does that mean?\n\t\t\n\t\tYou hear a distant yell, followed by the clash of steel on steel. [i]Light! They must have snuck up from behind![i]\n\t\t\n\t\t*page_break\n\t\t\t\t\n\t\tSprinting back along the path with your sword drawn, the sounds of battle become louder. It seems that Iason's rag tag group of mercenaries can put up somewhat of a fight after all. \n\t\t\t\t\n\t\tRounding a bend in the road, you come face to face with a scene of chaos. The hired guards surround the cart, hacking and slicing at the dark clad men with veiled faces who circle the wagon while the oxen bellow in fear. Even Elpis  has a long-bladed knife out, slashing at anyone who comes too close to her perch atop the wagon. Iason is doing less well, swinging a stout piece of wood wildly like a club, his eyes wide with fear. A few people lie on the hard-packed ground unmoving. The red staining that seeps through their clothes into the dirt makes the reason clear.\n\t\t\t\t\n\t\tAlthough holding, the mercenaries are simply not well trained enough to last for long against the superior numbers their attackers. With a yell, you throw yourself into the fray hacking and slashing your way towards the wagon. Several of the ruffians turn, identifying you as the superior threat. \n\t\t\t\t\n\t\tAt least you've split their attention for now, giving the others a chance to fight back. On the other hand, you've now got three enemies of your own to deal with.\n\t\t\t\t\n\t\t*choice\n\t\t\t#Continue to fight your way back to the wagon and the rest of the group. You need to stay together to win this fight. \n\t\t\t\tYou launch yourself into the fray, hacking and slashing as you enter into the mob. Enemies mill in confusion as they're suddenly attacked on both sides. Arrows whizz overhead as to your surprise you spot Elpis  perched upon the bags of grain with a bow in hand, picking off the bandits as she's able to get a clear shot.  \n\t\t\t\t\n\t\t\t\t*set health -1\n\t\t\t\t\n\t\t\t\tAlthough no one lands a serious blow with their rag tag assortment of weaponry, by the time you reach the wagon you're sporting an impressive assortment of nicks and bruises. Making your way across to Nikanor, you continue to fight with him at your back, carefully steering clear of Iason who swings a piece of wood wildly; as like to do damage to his own company as to the enemy. \n\t\t\t\t\n\t\t\t\tFinally, the nerve of the remaining bandits breaks. They flee towards the undergrowth leaving you to regroup and tend the wounded. \n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t*goto fightscout\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\n\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t#Fight alone at the edge of the road. You've enough confidence in your skill that you can keep all three of them busy.\n\t\t\t\tYou take a few steps back, luring the bandits after you. Your enemy moves with the confidence of an easy kill. Clearly they think you'll fall easily if they take you on at once. \n\t\t\t\t\t\t\n\t\t\t\tTheir weapons look to be an assortment of what could be scrounged up. Nicks mar the blade of one, while traces of rust spot the points of the damaged looking spears of the others. Despite the state of disrepair, they swing the weapons with the skill of frequent use. \n\t\t\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#Dive in, striking first before they can co-ordinate an attack from all sides. \n\t\t\t\t\t\tYou lunge forward, striking out with your sword and slicing the end from the rickety looking spear. It's sure to have blunted your sword, but worth the damage caused as the ruffian hastily backs away.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t[i]One down, two to go![/i]\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\tYou don't have time to celebrate though, the second highwayman with the sword strikes at your head. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t[i]...Clang...[/i]\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\tYou only just get your weapon up in time to deflect it, pushing it away from your body. Pain lances across your ribs as the remaining brigand thrusts his spear at your side. You were lucky. If you hadn't moved to deflect the sword, that strike would have buried itself in your chest. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t*set health -1\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\tQuickly you bring your sword up once more, favouring your left side. Suddenly an arrow sprouts from the chest of the swordsman. His face has a look of shock, before collapsing limply to the ground. It seems as if Elpis  has retrieved her bow. Who knew the unassuming merchant was so handy with a weapon?\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t*set eleniarrow \"yes\"\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\tThe help is short lived however as she's forced to concentrate on the bandits closer to home. Still, at least yours is now a fair fight. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\tYour opponent circles more warily now, aware his advantage in numbers is gone. \n\t\t\t\t\t\t*label defensive\n\t\t\t\t\t\tSizing him up, you determine you will likely be quicker with your sword, but he has better reach with the longer spear.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\tUnexpectedly he jumps forward, swinging the spear like a staff and almost sweeping your legs out from under you. They didn't teach you to fight like [i]that[/i] in training. The blow causes you to stagger but you regain your feet, striking with a blow of your own which leaves a thin line of blood down the man's arm. He jumps backwards with a cry of pain. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\tHis spear arm shakes, damaged from your strike. Fear is in his eyes above the black veil drawn across his lower face. He knows his chances of surviving this fight are waning. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Finish him off. He would have killed you if given the chance. \n\t\t\t\t\t\t\t\tYour expression hardens. He would have shown you no mercy had the situation been reversed. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto kill\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#Finish him off. If you don't he'll just attack some other poor caravan once healed.\n\t\t\t\t\t\t\t\tYou know you can't let him live, not when he'll more than likely return to his ways of robbing and killing as soon as he recovers from the wound on his arm. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*label kill\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tIn a flurry of blows, you knock his spear aside plunging the sword deep. He sinks to the ground, the life leaving his eyes. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tRunning towards the wagon, you find the fight almost over. Wielding your sword, you slash and strike at anyone close until what remains of the bandit's company breaks for cover, fleeing into the undergrowth. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*label fightscout\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYour caravan has not fared well. Over half the guards lie motionless on the ground in amongst the bandits. Of the remainder still standing, few are fit to fight. It's as well that the battle ended when it did. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tElpis  climbs down from her perch atop the sacks of grain walking over to comfort Iason, who still holds his club before him. He trembles, expression blank with shock. \n\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*gosub notfairedwell\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tThe procession is sombre as it winds its way slowly into Megara. You notice there is no further talk of a longer trip to Athens. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tWhen you reach your destination, Elpis hands you a purse with a few extra coins. It's clear she knows that their losses would likely have been heavier without you. \"Go with my thanks.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*set coins +5\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto endfight\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#Incapacitate him. There's no honour in killing someone already injured. \n\t\t\t\t\t\t\t\tThe ruffian stands before you, surprisingly brave considering that he has to know his arm doesn't have the strength for a decent strike. He stabs weakly at your chest, a move you easily brush asides. The sword continues to slide down the haft to bite into your opponent's hand.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tWith a cry, he drops the weapon and flees into the trees. You let him go, turning your attention to the cluster of ruffians still fighting near the wagon. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto wagon\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#Incapacitate him. That's all you really need to do. If he can no longer fight, you can move onto someone else.\n\t\t\t\t\t\t\t\tIt's easier to incapacitate than kill. The quicker you can dispatch this enemy, the faster you can move onto the remaining ruffians clustered about the wagon. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tLeaping forward, you bat his spear away; his weakened arm providing little resistance. Pivoting on your heel, you bring the flat of your sword down on the side of his head. He drops like a stone. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tStepping over the fallen man, you advance towards the remaining combatants. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*label wagon\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tLess than half of the thieves are still standing, having fled or lying motionless on the ground. Unfortunately your own party is faring little better. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t[i]Wiiizzp[/i]\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou jump as an arrow whizzes past your ear, the fletching all but brushing your cheek as it passes. You hear a thud as another of the ruffians with a knife falls by your feet, having snuck up behind you undetected. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tElpis  sketches a quick bow from her position atop the bags of grain, turning her attention to another of the thieves. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if (eleniarrow != \"yes\")\n\t\t\t\t\t\t\t\t\tYou blink, that was unexpected, if welcome. You never even knew the merchant had a bow hidden on board the wagon, much less knew how to use one.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tHer partner is doing less well, having found a piece of wood which he waves wildly like a club, backed against the cart with fear in his eyes. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tWielding your sword, you slash and strike at anyone close, working your way through what remains of the bandit's company. Nikanor joins you as you make it to the wagons, fighting back to back although you notice he sports a deep gash on his leg which bleeds freely. Finally, the nerve of the remaining thieves break. They run for cover, disappearing into the undergrowth. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto fightscout\n\t\t\t\t\t\t\t\t\n\t\t\t\t\n\t\t\t\t\t#Fight defensively. No reason to leave yourself open to a sword through your ribs. \n\t\t\t\t\t\tYou plant your feet, taking up a defensive posture with sword raised in readiness. Let them come to you... If they dare. \n\t\t\t\t\t\t\n\t\t\t\t\t\tThe three advance, fanning out around you and making it difficult to keep your eyes on them all. Retreating, you are forced step by step back towards the trees. The swordsman's eyes sparkle, he believes they have you on the run and waves the two spearmen that flank him forward. Separated from the main group, they seem to think they can take you down at their leisure.\n\t\t\t\t\n\t\t\t\t\t\tBoth bandits wielding spears attack in unison, causing you to lunge to the side to avoid one thrust, while only just managing to deflect the point of the second with your sword. Without giving you time to react, the swordsman darts in, his weapon opening a glancing wound on your shoulder. Shallow, but enough to make you wary as warm blood soaks the clothing on your shoulder. With blood now drawn, the thieves become only more bold. \n\t\t\t\t\t\t\n\t\t\t\t\t\t*set health -1\n\t\t\t\t\t\t\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\n\t\t\t\t\t\t*set eleniarrow \"yes\"\n\t\t\t\t\t\tThe sword wielder to your left darts in again. As you throw up your own sword to parry, his legs collapse from under him; falling to the ground with a fletched arrow sticking from his back.\n\t\t\t\t\t\t\n\t\t\t\t\t\tTo your surprise, you see Elpis  perched atop the bags of grain, bow in hand loading another bolt. Before she can fire however, she's forced to draw a knife from her boot; slashing at an assailant who grabs her by the ankle, trying to pull her from the wagon.  \n\t\t\t\t\n\t\t\t\t\t\tYou can't help her from here, but you can take advantage of the confusion her arrow has caused. \n\t\t\t\t\t\t\n\t\t\t\t\t\tQuickly you lash out, hitting the weathered looking haft of spear carried by the second of your attackers. The wood splinters leaving him holding a useless stump. Without his weapon, his bravery wavers. Turning, he flees into the trees. \n\t\t\t\t\t\t\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe remaining bandit circles more cautiously now, aware his advantage in numbers is gone. \n\t\t\t\t\t\t*goto defensive\n\t\t\t\t\n\n\t\t\n\t#Talk to Nikanor. None of the other mercenaries will give you the time of day, but he seems to be reasonable. Maybe they'll listen to him. \n\t\t*set warnnestor \"yes\"\n\t\tYou slow your pace, dropping back towards where Nikanor marches beside the wagon. His green eyes regard you with interest. \n\t\t\n\t\tSoftly so as to not arouse any suspicion, you speak your concerns. \"I think we might be in for some trouble. Listen. Doesn't it seem quiet to you?\"\n\n\t\tThe mercenary tilts his head from side to side, listening intently. \n\t\t\n\t\tFinally, he nods slowly. \"Could be, I'll tell the others.\"\n\t\t\n\t\t*page_break\n\t\t\n\t\tQuietly he moves among the other guards who scowl at having their gambling interrupted, but never the less heft their weapons, regarding the forest with a greater amount of attention than before. He even has a word to the merchants: Elpis  looks about in concern, while Iason's knuckles become white as he tightens his grip on the reins.\n \n\t\tSuddenly one of the flanking guards sets up a cry. \"Bandits in the trees behind us! An ambush! It's an ambush!\"\n\t\t\n\t\t*goto coverblown\n\n\n*label notfairedwell\n\n\t\t\t\t\t\t\t\t\nYou see Nikanor tying strips of cloth torn from his own garments around a nasty looking gash on his leg. He limps badly, leaning heavily on a spear as you walk over. \n\n*if (battle = \"scout\")\t\t\t\t\t\t\t\t\n\t\"Just as well we had you with us Oedipus,\" he rumbles. \"They thought we were cornered and weren't expecting someone to show up from further down the track. Besides I've not seen better skill with the sword anywhere.\" \n*if (battle != \"scout\")\t\n\t\"I'm glad we had you with us Oedipus,\" he rumbles. \"I've not seen better skill with the sword anywhere.\" \n\n\t\t\t\t\t\t\t\n\"And Elpis,\" his eyes show new respect for the merchant, now trying to haul Iason back into the driver's seat. \"Never even knew the woman had a bow tucked away up there.\"\n\t\t\t\t\t\t\t\t\n*page_break\n\t\t\t\t\t\t\t\t\n\"What'll you do now?\" you ask him, conscious of the fallen bodies littering the ground. \n\t\t\t\t\t\t\t\t\nHe groans as he tries to put weight on his bleeding leg. \"Well looks like I'm up for some serious time out for a while. Might go back to Eleusis, haven't seen the wife in a while. Company would never be the same anyway after this. I expect they'll all go their own ways.\"\n\t\t\t\t\t\t\t\t\n*return\t\t\t\t\n\n\n*label successfight\n\n*page_break\t\t\t\t\n\t\t\t\t\nLooking around, the caravan has fared surprisingly well. Few of the guards are seriously injured, and the only ones lost were those who didn't heed your warnings. \n\nElpis  climbs down from her perch atop the sacks of grain,\t\t\t\t\n*if (hitcosta != \"yes\")\n\twalking over to comfort Iason, who still holds his club before him. He trembles, expression blank with shock. \n*if (hitcosta = \"yes\")\n\trushing over to where Iason still lies blinking woozily in the sunlight. She shoots you a thoughtful look. Although concerned about Iason, she seems to understand why it was necessary. \n\n*page_break\n\t\n*achieve successguard\n\nNikanor limps over, shallow wounds tracing his arms and legs, but nothing that appears too serious. \n\n\"What was that?\" There's new admiration in his eyes that none of the mercenaries had shown before. \"You were giving orders like a stratagos. I've never seen those men jump to obey like that before.\"\n\nYou shrug, not able to tell him the truth that you'd been born to lead legions. \n\n\"Well whatever it was, you have my thanks,\" Nikanor inclines his head. \"We could have lost most of the company\n*if (warnnestor != \"yes\")\n\tif not for your warning about the ambush.\"\n*if (warnnestor = \"yes\")\n\tif you hadn't realised that something was amiss. These men are good in a scrap, but just not observant enough for their own good.\"\n\t\n*page_break\n\nThe procession continues to wind its way towards Megara, Elpis  pushing the oxen forward at a fast clip, eager to be free of the forest and its dangers. You notice Iason no longer argues for the longer journey into Athens. \n\t\t\t\t\t\nWhen you reach your destination, Elpis hands you a heavy purse. It contains far more coins than you suspect you were owed. \"You have my thanks Oedipus. The Fates smiled on us the day we hired you.\"\n\t\t\t\n*set coins +5\n\t\t\t\t\t\t\t\t\n*goto endfight\n\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\n*label endfight\t\n\n*page_break\t\n\n*goto_scene part5blearnsphinx\t\t\n\n\t\n", "part6alternative1": "\n\n*label question1\n\n[i]\"As I was going to Agrinion,[/i]\n\n[i]I met a man with seven sons,[/i]\n    \n[i]Each son was carrying seven sacks,[/i]\n    \n[i]Within each sack were seven cats,[/i]\n    \n[i]And each of those cats had seven kits:[/i]\n    \n[i]Kits, cats, sacks, and sons,[/i]\n    \n[i]How many were there going to Agrinion?\"[/i]\n\n\n \n\n*if (q1 = 0 )\n\n\t\"Tell me your answer, [i]you[/i] don't have all day.\" She grins evilly, sure that you won't be able to answer her question.\n\n\tYou hear a soft whisper in your ear, but when you look there is nothing but air. When it sounds again, the voice is breathy like the wind. \n\t\n\t[i]:I will help you traveller should you so wish. Though it is forbidden to tell you the answer directly, perhaps I can guide you to it:[/i]\n\t\n*if (q1 = 1)\n\tThe breathy voice sounds again, apparently unheard by the Sphinx. \n\t\n\t[i]:Your chances dwindle, do you wish my assistance?:[/i]\n\t\n*if (q1 = 2)\n\tThe voice is urgent now, whistling shrilly in your ears. \n\n\t[i]:This is your final chance. Fail and your bones will bleach beside the others by the roadside:[/i]\t\n\t\n\t\n\t\n*choice\n\t\n\t#Accept the disembodied voice's aid. \n\t\t\n\t\n\t\t*if (hint1 = \"no\")\n\t\t\tThe voice sighs softly. \n\t\t\t\n\t\t\t[i]:The riddle is perhaps simpler than it first appears:[/i] \n\t\t\t\n\t\t\t*set hint1 \"yes\"\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#Try to answer the riddle. \n\t\t\t\t\t*goto entertxt1\n\t\t\t\t\t\n\t\t\t\t#Wait to see if the voice has another hint for you.\n\t\t\t\t\t*if (q1 = 0)\n\t\t\t\t\t\t[i]:My help although freely given, is not without repercussions. If it is found I assisted you, there will be trouble for me. Try to answer the riddle, you have three chances to succeed. I will help you again if needed:[/i]\n\t\t\t\n\t\t\t\t\t\t*goto entertxt1\n\t\t\t\t\t\t\n\t\t\t\t\t*if (q1 != 0)\n\t\t\t\t\t\t*label try2\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe wind rustles once more in your ears.\n\t\t\t\t\t\t\n\t\t\t\t\t\t[i]:It uses misdirection to cause the one answering to fail:[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t*set hint2 \"yes\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t#Try to answer the riddle. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto entertxt1\n\t\t\t\t\t\n\t\t\t\t\t\t\t#Wait to see if the voice has another hint for you.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if (q1 != 2)\n\t\t\t\t\t\t\t\t\t[i]:Try to answer the riddle you must, before I can help you one last time:[/i]\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*goto entertxt1\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if (q1 = 2)\n\t\t\t\t\t\t\t\t\t*label try3\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tThe wind whistles uneasily.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t[i]:Think about this riddle carefully. Although many are mentioned, how many were actually travelling somewhere?:[/i]\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*set hint3 \"yes\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*goto entertxt1\n\t\t\t\t\t\t\t\n\n\t\t*if ((hint1 != \"no\") and (hint2 = \"no\"))\t\n\t\t\t*goto try2\n\t\t\t\n\t\t\t\n\t\t*if ((hint1 != \"no\") and (hint2 != \"no\"))\n\t\t\t*goto try3\n\t\t\t\n\t\t*goto try3\t\n\t\t\n\t#Refuse, you can work this out without any assistance. \n\t\tYou think hard on the question, mulling it over in your mind. Finally, you have an answer.\n\t\t\n\t\t*goto entertxt1\n\t\t\n\t\t\t\n\n\n\n\n*label entertxt1\n\nI think it is a...\n\n(Hint: Type answers in the box below as a single word.) \n\n\t\t\t\t\n*input_text answer1\n*set answer1 \"${answer1}\"\n\n\n\n\n\n*comment remove in game, just for the random test \n*if choice_randomtest\n\t*set answer1 \"one\"\n\n\n*if (((answer1 = \"ONE\") or (answer1 = \"One\")) or (answer1 = 1))\n\t*set answer1 \"one\"\n\n\n\t\t\t\t\n*if (answer1 = \"one\") \n\t\n\t*goto correct\n\n\n*if (q1 = 0)\n\t\"The answer is ${answer1},\" you speak up.\n\t\n\t\n\t\"That is incorrect,\" the Sphinx purrs, her smile becoming wider. \"Only two guesses left. I'll tell you the riddle once more so you may try again.\"\n\t\n\t*set q1 1\n\t\n\t*goto question1\n\t\n*if (q1 = 1)\n\t\"The answer is ${answer1},\" you say.\n\t\n\t\"Two times you have guessed, and two times you have failed to give the right answer. You have one try only remaining.\" Her eagerness is palpable now as she paces back and forth on the trail.\n\t\n\t\"Once more I will give you the riddle.\"\n\t\n\t*set q1 2 \n\t\n\t*goto question1\n\n\n*if (q1 = 2)\t\n\t\"The answer must be ${answer1},\" you reply.\n\n\tThe Sphinx's eyes are like two tiny flames, mesmerising and terrible. \n\t\n\t\"I believe you are...\"\n\t\n\t*page_break [b]Incorrect[/b]\n\t\n\t\n\t*if (chance = \"no\")\n\t\n\t\tAs quick as a flash she is upon you, knocking you to the ground with ease. Your hand scrabbles for your sword, but she's simply too quick. \n\t\n\t\tRazor sharp teeth sink into your neck... \n\t\n\t\t*page_break This is the end.\n\t\n\t\t[i]Or is it?[/i]\n\t\n\t\tThe pain is gone. In fact, everything is... empty. You float bodiless in the black, as if caught somehow in between the world of the living and the dead. \n\t\n\t\t[i]:Yes Oedipus, you are dead. Well not quite, but on the brink. Yet you have a destiny to fulfil, one that was not fated to end in the jaws of the Sphinx. I can send you back and give you another chance, but there is little time before your passing is noticed. Here I have the power to tell you the answer to her riddle. Do you wish to know?:[/i]\n\t\n\t\t*achieve reborn\n\t\n\t\n\t*if (chance != \"no\")\t\n\t\n\t\tYou lunge for your sword, knowing what will come next, but even this is not enough to save you. The Sphinx is quick and deadly, knocking aside your hand with a swipe of her paw and throwing you to the ground. Pain lances down your side. Struggling, you notice her snake tail has its fangs embedded deep into your flesh. The world goes dark.\n\t\t\n\t\t*page_break ...\n\t\t\n\t\t*achieve dieagain\n\t\t\n\t\tOnce more you find yourself floating in the emptiness. The breathy voice swirls around what is left of your consciousness. \n\t\t\n\t\t[i]:Again Oedipus? Most mortals only have one chance at life, but here you hang between life and death once more:[/i]\n\t\t\n\t\tAlready you can feel yourself sinking deeper into the darkness, an irresistible current drawing you under. The voice sighs.\n\t\t\n\t\t[i]:You are being pulled downward towards the underworld, but this must not come to pass quite yet. I will help you once again:[/i]\n\t\t\n\t\tThe familiar feeling of being stretched so thin that you fear you'll shatter into a thousand pieces begins once again. \n\t\t\n\t\t[i]:I ask you once more, do you need to know the answer?\"[/i]\n\t\t\n\t\t\n\t\t\n\t\n\t*fake_choice\n\t\t#\"Tell me the answer.\"\n\t\t\t[i]:The answer is one...:[/i] \n\t\t\t\n\t\t\t\t\n\t\t#\"Just send me back.\"\n\t\t\t[i]:As you wish:[/i] \n\t\t\t\n\t\t\t\n\t\t\t\n\t*if (chance = \"no\")\n\t\tThe voice whispers as the world spins apart with the sensation of being pulled and stretched in a million ways. Suddenly everything snaps into clarity, leaving you dizzy but otherwise unharmed. Reflexively your hands go to your neck, but the skin is smooth and unmarked.\n\t\n\t*if (chance != \"no\")\t\n\t\tThe voice whispers as the world fragments once again, slowly resolving into to the mountain trail. You can't help but bring a hand to your injured side, finding it free of wounds and pain. \n\t\n\t\n\t*page_break\n\t\n\t\"Human, do not ignore me,\" the Sphinx hisses at your distraction. \"The riddle is this...\"\n\t\n\t*set chance \"yes\"\n\t*set hint1 \"no\"\n\t*set hint2 \"no\"\n\t*set hint3 \"no\"\n\t*set q1 0\n\t\n\t\n\t\n\t*goto question1\n\t\n\n\n*label correct\n\n\"The answer is only one,\" you state \n*if (q1 = 0)\n\tas confidently as you can.\n*if (q1 != 0)\t\n\tmore confidently this time. \n\n\nThe monster looks uneasy. \"But many were mentioned. Explain yourself.\"\n\n\"Well, although there was a man with sons, cats and kits. Only one traveller; that being yourself, was actually going to Agrinion.\"\n\n*page_break\t\n\n*if ((hint1 = \"no\" ) and (chance = \"no\"))\n\t*achieve riddle1\n\t\nThe monster screams in frustration at being thwarted, the sound morphing into a lioness' roar. Tail thrashing, she stands before you, blocking the path. \n\n\"One riddle you have answered correctly, but only one. The next will not be so easy.\"\n\nWithout waiting for a reply, she launches into the second question, spitting the words out in rage. \n\n*goto_scene part7alternative2\n", "part6special": "\n*label question1\n\n[i]\"At night they come without being fetched. By day they are lost without being stolen. What are they?\"[/i]\n\n\n \n\n*if (q1 = 0 )\n\n\t\"Tell me your answer, [i]you[/i] don't have all day.\" She grins evilly, sure that you won't be able to answer her question.\n\n\tYou hear a soft whisper in your ear, but when you look there is nothing but air. When it sounds again, the voice is breathy like the wind. \n\t\n\t[i]:I will help you traveller should you so wish. Though it is forbidden to tell you the answer directly, perhaps I can guide you to it:[/i]\n\t\n*if (q1 = 1)\n\tThe breathy voice sounds again, apparently unheard by the Sphinx. \n\t\n\t[i]:Your chances dwindle, do you wish my assistance?:[/i]\n\t\n*if (q1 = 2)\n\tThe voice is urgent now, whistling shrilly in your ears. \n\n\t[i]:This is your final chance. Fail and your bones will bleach beside the others by the roadside:[/i]\t\n\t\n\t\n\t\n*choice\n\t\n\t#Accept the disembodied voice's aid. \n\t\t\n\t\n\t\t*if (hint1 = \"no\")\n\t\t\tThe voice sighs softly. \n\t\t\t\n\t\t\t[i]:It is impossible to grasp them, let alone steal them away:[/i] \n\t\t\t\n\t\t\t*set hint1 \"yes\"\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#Try to answer the riddle. \n\t\ the path, you see what looks like the bleached and broken remains of a skull poking out through the grass. [i]Oh light! She's going to try and eat me![/i]\n\n\n*image sphinxriddle.png center\n\n*page_break\n\n\"I see you understand,\" she almost purrs. \"Well I say we get started. I'm going to ask you two questions and you have three chances to answer each correctly. And when you fail... [i]You're mine.\"[/i]\n\nShe laughs as if discussing a celebration to be planned. \"Cheer up Oedipus, I'm going to let you choose. Do you like the old or the new?\"\n\n\"The old or the new what?\" you reply cautiously. \n\n\"Riddles of course,\" she says with a bright smile. \"Would you like to hear one of my own devising? Or one whose origins are lost to time?\"\n\n*choice\n\t#\"I'll hear your riddles Sphinx.\"\n\t\tThe creature leans in to whisper the first riddle:\n\t\n\t\t*goto question1\n\t\n\t#\"Ask me one of the older ones.\"\n\t\t\t\t\n\t\tThe creature leans in to whisper the first riddle:\n\t\t\n\t\t*goto_scene part6alternative1\n\t\t\n\t#\"I can answer question you care to pose Sphinx. Ask me what you will.\"\n\t\tThe creature laughs in delight. \"A challenge! Very well, I have some extra special puzzles in store for [i]you.\"[/i]\n\t\t\n\t\tShe leans in to whisper the first riddle:\n\t\t\n\t\t*goto_scene part6special\n\n\n\n\n*label question1\n\n[i]A creature I am with a single voice.[/i]\n\n[i]Four feet have I in the morning,[/i]\n\n[i]Then two in the afternoon,[/i]\n\n[i]But see me in the evening and I have three.[/i]\n\n[i]What am I?[/i] \n\n\n\n*if (q1 = 0 )\n\t\"Tell me your answer, [i]you[/i] don't have all day.\" She grins evilly, sure that you won't be able to answer her question. \n\t\n\tYou hear a soft whisper in your ear, but when you look there is nothing but air. When it sounds again, the voice is breathy like the wind. \n\t\n\t[i]:I will help you traveller should you so wish. Though it is forbidden to tell you the answer directly, perhaps I can guide you to it:[/i]\n\t\n*if (q1 = 1)\n\tThe breathy voice sounds again, apparently unheard by the Sphinx. \n\t\n\t[i]:Your chances dwindle, do you wish my assistance?:[/i]\n\t\n*if (q1 = 2)\n\tThe voice is urgent now, whistling shrilly in your ears. \n\n\t[i]:This is your final chance. Fail and your bones will bleach beside the others by the roadside:[/i]\t\n\t\n\t\n\t\n*choice\n\t\n\t#Accept the disembodied voice's aid. \n\t\t\n\t\n\t\t*if (hint1 = \"no\")\n\t\t\tThe voice sighs softly. \n\t\t\t\n\t\t\t[i]:The riddle speaks of times of the day, but perhaps this should not be taken so literally:[/i] \n\t\t\t\n\t\t\t*set hint1 \"yes\"\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#Try to answer the riddle. \n\t\t\t\t\n\t\t\t\t\t*goto entertxt1\n\t\t\t\t\t\n\t\t\t\t#Wait to see if the voice has another hint for you.\n\t\t\t\t\t*if (q1 = 0)\n\t\t\t\t\t\t[i]:My help although freely given, is not without repercussions. If it is found I assisted you, there will be trouble for me. Try to answer the riddle, you have three chances to succeed. I will help you again if needed:[/i]\n\t\t\t\n\t\t\t\t\t*if (q1 != 0)\n\t\t\t\t\t\t*label try2\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe wind rustles once more in your ears.\n\t\t\t\t\t\t\n\t\t\t\t\t\t[i]:The number of limbs does not really change, it is merely how they are used:[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t*set hint2 \"yes\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t#Try to answer the riddle. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto entertxt1\n\t\t\t\t\t\n\t\t\t\t\t\t\t#Wait to see if the voice has another hint for you.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if (q1 != 2)\n\t\t\t\t\t\t\t\t\t[i]:Try to answer the riddle you must, before I can help you one last time:[/i]\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*goto entertxt1\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if (q1 = 2)\n\t\t\t\t\t\t\t\t\t*label try3\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tThe wind whistles uneasily.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t[i]:You know this creature well. Better than any other:[/i]\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*set hint3 \"yes\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*goto entertxt1\n\t\t\t\t\t\t\t\n\n\t\t*if ((hint1 != \"no\") and (hint2 = \"no\"))\t\n\t\t\t*goto try2\n\t\t\t\n\t\t\t\n\t\t*if ((hint1 != \"no\") and (hint2 != \"no\"))\n\t\t\t*goto try3\n\t\t\t\n\t\t*goto try3\t\n\t\t\n\t#Refuse, you can work this out without any assistance. \n\t\tYou think hard on the question, mulling it over in your mind. Finally, you have an answer.\n\t\t\n\t\t*goto entertxt1\n\t\t\n\t\t\t\n\n\n\n\n*label entertxt1\n\nI believe it is...\n\n(Hint: Type answers in the box below as a single word.) \n\n\t\t\t\t\n*input_text answer1\n*set answer1 \"${answer1}\"\n\n\n\n\n\n*comment remove in game, just for the random test \n*if choice_randomtest\n\t*set answer1 \"man\"\n\n\n\n\n\n\t\t\t\t\n*if (((answer1 = \"man\") or (answer1 = \"Man\")) or (answer1 = \"MAN\"))\n\t*set qhe \"he\"\n\t*set qhis \"his\"\n\t*set answer1 \"man\"\n\t\n\t*goto correct\n\n*if (((answer1 = \"woman\") or (answer1 = \"Woman\")) or (answer1 = \"WOMAN\"))\n\t*set qhe \"she\"\n\t*set qhis \"her\"\n\t*set answer1 \"woman\"\n\t\n\t*goto correct\n\n\n*if (((answer1 = \"human\") or (answer1 = \"Human\")) or (answer1 = \"HUMAN\"))\n\t*set qhe \"they\"\n\t*set qhis \"their\"\n\t*set answer1 \"human\"\n\t\n\t*goto correct\n\t\n*if (((answer1 = \"person\") or (answer1 = \"PERSON\")) or (answer1 = \"Person\"))\n\t*set qhe \"they\"\n\t*set qhis \"their\"\n\t*set answer1 \"person\"\n\t\n\t*goto correct\n\n*if (((answer1 = \"me\") or (answer1 = \"ME\")) or (answer1 = \"Me\"))\n\t*set answer1 \"me\"\n\t\n\t*goto correct\n\t\n*if (((answer1 = \"myself\") or (answer1 = \"Myself\")) or (answer1 = \"MYSELF\"))\n\t*set answer1 \"myself\"\n\t\n\t*goto correct\t\n\t\n\n*if (q1 = 0)\n\t\"The answer is ${answer1},\" you speak up.\n\t\n\t\n\t\"That is incorrect,\" the Sphinx purrs, her smile becoming wider. \"Only two guesses left. I'll tell you the riddle once more so you may try again.\"\n\t\n\t*set q1 1\n\t\n\t*goto question1\n\t\n*if (q1 = 1)\n\t\"The answer is ${answer1},\" you say.\n\n\t\"Two times you have guessed, and two times you have failed to give the right answer. You have one try only remaining.\" Her eagerness is palpable now as she paces back and forth on the trail.\n\t\n\t\"Once more I will give you the riddle.\"\n\t\n\t*set q1 2 \n\t\n\t*goto question1\n\n\n*if (q1 = 2)\t\n\t\"The answer must be ${answer1},\" you reply.\n\t\n\tThe Sphinx's eyes are like two tiny flames, mesmerising and terrible. \n\t\n\t\"I believe you are...\"\n\t\n\t*page_break [b]Incorrect[/b]\n\t\n\t*if (chance = \"no\")\n\t\n\t\tAs quick as a flash she is upon you, knocking you to the ground with ease. Your hand scrabbles for your sword, but she's simply too quick. \n\t\n\t\tRazor sharp teeth sink into your neck... \n\t\n\t\t*page_break This is the end.\n\t\n\t\t[i]Or is it?[/i]\n\t\n\t\tThe pain is gone. In fact, everything is... empty. You float bodiless in the black, as if caught somehow in between the world of the living and the dead. \n\t\n\t\t[i]:Yes Oedipus, you are dead. Well not quite, but on the brink. Yet you have a destiny to fulfil, one that was not fated to end in the jaws of the Sphinx. I can send you back and give you another chance, but there is little time before your passing is noticed. Here I have the power to tell you the answer to her riddle. Do you wish to know?:[/i]\n\t\n\t\t*achieve reborn\n\t\n\t\n\t*if (chance != \"no\")\t\n\t\n\t\tYou lunge for your sword, knowing what will come next, but even this is not enough to save you. The Sphinx is quick and deadly, knocking aside your hand with a swipe of her paw and throwing you to the ground. Pain lances down your side. Struggling, you notice her snake tail has its fangs embedded deep into your flesh. The world goes dark.\n\t\t\n\t\t*page_break ...\n\t\t\n\t\t*achieve dieagain\n\t\t\n\t\tOnce more you find yourself floating in the emptiness. The breathy voice swirls around what is le tter into a thousand pieces begins once again. \n\t\t\n\t\t[i]:I ask you once more, do you need to know the answer?\"[/i]\n\t\t\n\t\t\n\t*fake_choice\n\t\t#\"Tell me the answer.\"\n\t\t\t[i]:The answer the Sphinx seeks is that the sisters are night and day... Although a more recent interpretation of the riddle speaks of a fruit and its seeds:[/i] \n\t\t\t\n\t\t\t\t\t\n\t\t#\"Just send me back.\"\n\t\t\t[i]:As you wish:[/i] \n\t\t\t\n\t*if ((chance2 = \"no\") and (chance = \"no\"))\n\t\tThe voice whispers as the world spins apart with the sensation of being pulled and stretched in a million ways. Suddenly everything snaps into clarity, leaving you dizzy but otherwise unharmed. Reflexively your hands go to your neck, but the skin is smooth and unmarked.\n\t\n\t*if ((chance2 != \"no\") or (chance != \"no\"))\t\n\t\tThe voice whispers as the world fragments once again, slowly resolving into to the mountain trail. You can't help but bring a hand to your injured side, finding it free of wounds and pain. \n\t\n\t\n\tThe Sphinx snarls, tail lashing. \"My final riddle is this...\"\n\t\n\n\t\n\t*set chance2 \"yes\"\n\t*set hint1b \"no\"\n\t*set hint2b \"no\"\n\t*set hint3b \"no\"\n\t*set r2 0\n\t\n\t*goto revived\n\n\n\n\n\n\n*label correct\n\n\"The sisters are ${day} and ${night},\" you state. \"Surely this is the right answer. After all, dawn is born from the night with the sun rising to fill the sky with light; and then that light dies, giving rise to the night with the pale light of the moon. I've won your contest Sphinx, now let me pass.\"\n\n\n\t\n*goto_scene part8thebes\t\n\n\n\n*label correctalternative\n\n\"The sisters are the fruit and its seeds,\" you state. \"Surely this is the right answer.\" \n\nThe Sphinx's eyes flare brightly, mouth open in a smile that shows too many teeth. \n\t\n\"Your answer is incorrect little human. You're mine.\"\n\t\n\"Wait!\" you cry out, causing her to pause. \"I answered your riddle correctly Sphinx, you've no right to deny me safe passage through the pass.\"\n\n\"Do you not think I know the answer to my own questions?\" she hisses, tail lashing in irritation. \"You agreed to the contest, and your answer is wrong. Now you must face the consequences.\"\n\n\"Surely I have the right to justify my answer,\" you grasp desperately, unsure of the rules. \"You never said it had to be [i]your[/i] answer after all, only that it had to be correct.\"\n\n*page_break\n\n\"You have that right,\" she snaps, pacing the trail ahead of you angrily at the delay. Slowly she calms, her snarl replaced by a predatory grin. \"You fear death little mortal, and seek to prolong your life even if it is only for a short while. I can see it in your eyes. Very well, I have time. Amuse me and tell me why you believe you have a better answer to my riddle than I.\"\n\n\"The answer is clear to me that the sisters are the fruit and its seeds,\" you repeat. \"First the tree grows from the seeds to produce the fruit. The fruit then falls, containing the seeds with which to complete the cycle once again. One gives birth to the other, though they are from the same source. You cannot deny this is true.\"\n\n\"No...\" she whispers, a look of dismay replacing her predatory grin as your answer rings true; bound to honour the agreement she made. \n\n*page_break\n\n*goto_scene part8thebes\t\n\n\n\n\n", "part7special": "\n\n[i]\"What is so fragile that it breaks when you say its name?\"[/i]\n\n\nThe last is growled challengingly, daring you to answer correctly.\n\n*fake_choice\n\t#\"Oh, that's simple.\"\n\t\t\"You think so do you human?\" the Sphinx snarls in a show of teeth. \"Then answer and be done with it.\"\n\t\t\n\t\t*goto day\n\t\n\t#Scratch your head nervously. This one is definitely tricky.\n\t\tThe Sphinx settles somewhat, confidence returning at your show of uncertainty. \"Come now human. What is your answer?\"\n\t\n\t\t\"A moment to think,\" you reply, listening for the voice on the wind. \n\t\t\n\t\t[i]:I am here:[/i] It whispers. [i]Do you know the answer?:[/i]\n\t\t\n\t\t*choice\n\t\t\t#\"Perhaps. I think it is...\"\n\t\t\t\t\n\t\t\t\t*goto day\n\t\t\t\n\t\t\t\n\t\t\t#\"No, I'm not certain. Can you help me?\"\n\t\t\t\t\n\t\t\t\t*goto hintone\n\n*label riddle2txt\n\n*if (r2 != 0)\t\n\n\t*label revived\n\n\t[i]\"What is so fragile that it breaks when you say its name?\"[/i]\n\n\t\n\t*if (r2 = 1)\n\t\tThe whispering voice returns. You wish you could ask what it is, but with the Sphinx glaring at you hungrily, admitting the presence of another may end rather badly for you. \n\t\n\n\t*if (r2 = 1)\n\t\t[i]:Think carefully Oedipus, this one is more difficult than the last. Do you know the answer?:[/i]\n\t\n\t\n\t*if (r2 = 0)\n\t\tThe breathy voice sounds again, apparently still unheard by the Sphinx. \n\t\n\t\t[i]:Do you wish my assistance?:[/i]\n\t\n\t*if (r2 = 2)\n\t\tThe voice is urgent now, whistling shrilly in your ears. \n\n\t\t[i]:This is your final chance. Fail and your bones will bleach beside the others by the roadside:[/i]\t\n\t\n\t\n\t\n\t\n\t\n\t*choice\n\t\n\t\t#No, I need some help. \n\t\t\n\t\t\t*label hintone\n\t\t\t*if (hint1b = \"no\")\n\t\t\t\t\t\n\t\t\t\t[i]:Of course:[/i] The voice sighs in resignation. [i]:Some say it is a lack of something that creates it:[/i]\n\t\t\t\n\t\t\t\t*set hint1b \"yes\"\n\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#Try to answer the riddle. \n\t\t\t\t\t\t*goto day\n\t\t\t\t\t\n\t\t\t\t\t#Wait to see if the voice has another hint for you.\n\t\t\t\t\t\t*if (r2 = 0)\n\t\t\t\t\t\t\t[i]:As always, my help although freely given, is not without repercussions to myself. Try to answer the riddle, you have three chances to succeed. I will help you again if needed:[/i]\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto day\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t*if (r2 != 0)\n\t\t\t\t\t\t\t*label try2\n\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe wind rustles once more in your ears, it has an anxious edge.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t[i]:You are more likely to have it when all alone:[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t*set hint2b \"yes\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t#Try to answer the riddle. \n\t\t\t\t\t\t\t\t\t*goto day\n\t\t\t\t\t\n\t\t\t\t\t\t\t\t#Wait to see if the voice has another hint for you.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*if (r2 != 2)\n\t\t\t\t\t\t\t\t\t\t[i]:Try to answer the riddle you must, before I can help you one last time:[/i]\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*goto day\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*if (r2 = 2)\n\t\t\t\t\t\t\t\t\t\t*label try3\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tThe wind whistles so loudly, you expect the Sphinx to pounce.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t[i]:When a glass is dropped upon the tiles in a quiet room, two things are broken. The glass is obvious, the other often not noticed until it is gone:[/i]\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*set hint3b \"yes\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*goto day\n\t\t\t\t\t\t\t\n\n\t\t\t*if ((hint1b != \"no\") and (hint2b = \"no\"))\t\n\t\t\t\t*goto try2\n\t\t\t\n\t\t\t\n\t\t\t*if ((hint1b != \"no\") and (hint2b != \"no\"))\n\t\t\t\t*goto try3\n\t\t\t\n\t\t\t*goto day\n\t\t\n\t\t#Refuse, you can work this out without any assistance. \n\t\t\tYou think hard on the question, mulling it over in your mind. Finally, you have an answer.\n\t\t\n\t\t\t\n\t\t\t*goto day\n\t\n\t\n\t\n\t\n\t\n*label day\t\n\nI believe it is...\n\t\n(Remember: Type your answer in the box below. The answer is single word.) \t\n\n\n\n\t\t\t\t\n*input_text day\n*set day \"${day}\"\n\n\n\n\n*comment remove for game. Just for randomtest. \n*if choice_randomtest\n\t*goto correct\n\n*if ((day = \"Silence\") or (day = \"SILENCE\"))\n\t*set day \"silence\"\n\n\n*if (day = \"silence\") \n\n\n\t*goto correct\n\t\n\t\n\n\"The answer is ${day},\" you finish waiting for her verdict. \n\t\n*if (r2 = 0)\t\n\t\"Your answer is incorrect,\" the Sphinx purrs, the rage in her voice rapidly being replaced by hunger. \"As with the first, you have two guesses remaining. Use them wisely. I will speak the riddle again.\"\n\n\t\n\t*set r2 1\n\t\n\t*goto riddle2txt\n\n\n*if (r2 = 1)\n\t\"Again, you are incorrect.\" There's no mistaking the eagerness in her voice now. \"You have one guess remaining. I'll tell you the riddle one final time.\"\n\n\t*set r2 2\n\n\t*goto riddle2txt\n\n*if (r2 = 2)\n\n\tThe Sphinx's eyes flare brightly, mouth open in a smile that shows too many teeth. \n\t\n\t\"Your answer is...\"\n\t\n\t*page_break [b]Incorrect[/b]\n\t\n\t\n\t*if ((chance2 = \"no\") and (chance = \"no\"))\n\t\t*set chance2 \"yes\"\n\t\tAs quick as a flash she is upon you, knocking you to the ground with ease. Your hand scrabbles for your sword, but she's simply too quick. \n\t\n\t\tRazor sharp teeth sink into your neck... \n\t\n\t\t*page_break This is the end.\n\t\n\t\t[i]Or is it?[/i]\n\t\n\t\tThe pain is gone. In fact, everything is... empty. You float bodiless in the black, as if caught somehow in between the world of the living and the dead. \n\t\n\t\t[i]:Yes Oedipus, you are dead. Well not quite, but on the brink. Yet you have a destiny to fulfil, one that was not fated to end in the jaws of the Sphinx. I can send you back and give you another chance, but there is little time before your passing is noticed. Here I have the power to tell you the answer to her riddle. Do you wish to know?:[/i]\n\t\n\t\t*achieve reborn\n\t\t\n\t*if ((chance2 != \"no\") or (chance != \"no\"))\t\n\t\t*set chance2 \"yes\"\n\t\n\t\tYou lunge for your sword, knowing what will come next, but even this is not enough to save you. The Sphinx is quick and deadly, knocking aside your hand with a swipe of her paw and throwing you to the ground. Pain lances down your side. Struggling, you notice her snake tail has its fangs embedded deep into your flesh. The world goes dark.\n\t\t\n\t\t*page_break ...\n\t\t\n\t\t*achieve dieagain\n\t\t\n\t\tOnce more you find yourself floating in the emptiness. The breathy voice swirls around what is left of your consciousness. \n\t\t\n\t\t[i]:Again Oedipus? Most mortals only have one chance at life, but here you hang between life and death once more:[/i]\n\t\t\n\t\tAlready you can feel yourself sinking deeper into the darkness, an irresistible current drawing you under. The voice sighs.\n\t\t\n\t\t[i]:You are being pulled downward towards the underworld, but this must not come to pass quite yet. I will help you once again:[/i]\n\t\t\n\t\tThe familiar feeling of being stretched so thin that you fear you'll shatter into a thousand pieces begins once again. \n\t\t\n\t\t[i]:I ask you once more, do you need to know the answer?\"[/i]\n\t\t\n\t\t\n\t*fake_choice\n\t\t#\"Tell me the answer.\"\n\t\t\t[i]:The answer is silence...:[/i] \n\t\t\t\n\t\t\t\t\t\n\t\t#\"Just send me back.\"\n\t\t\t[i]:As you wish:[/i] \n\t\t\t\n\t*if ((chance2 = \"no\") and (chance = \"no\"))\n\t\tThe voice whispers as the world spins apart with the sensation of being pulled and stretched in a million ways. Suddenly everything snaps into clarity, leaving you dizzy but otherwise unharmed. Reflexively your hands go to your neck, but the skin is smooth and unmarked.\n\t\n\t*if ((chance2 != \"no\") or (chance != \"no\"))\t\n\t\tThe voice whispers as the world fragments once again, slowly resolving into to the mountain trail. You can't help but bring a hand to your injured side, finding it free of wounds and pain. \n\t\t\t\t\n\n\tThe Sphinx snarls, tail lashing. \"My final riddle is this...\"\n\t\n\t*set chance2 \"yes\"\n\t*set hint1b \"no\"\n\t*set hint2b \"no\"\n\t*set hint3b \"no\"\n\t*set r2 0\n\t\n\t*goto revived\n\n\n\n\n\n\n*label correct\n\n\"The answer is silence,\" you state. \"Surely this is the right answer, after all it is broken by noise of any kind including my own voice.\"\n\t\n*goto_scene part8thebes\n\n", "part8thebes": "*if ((hint1b = \"no\" ) and (chance2 = \"no\"))\n\t*achieve riddle2\n\nShe screams, the sound of rage rising in pitch to become one of pain. It rings through the hills with the sound of a death knell. \n\n\n*choice\n\t\n\t#Cover your ears as the sound claws at your sanity.\n\t\tYou clamp hands over your ears, trying to silence the wail; unable to look away from the scene unfolding before you.\n\t\n\t\t*goto original\n\t\t\n\t*selectable_if ( tragedy != \"yes\") #\"No! You don't have to do this.\"\n\t\t\"It is my fate human,\" she hisses, eyes flashing. \"My purpose has been served. I have you to thank for that.\"\n\t\t\n\t\t*choice\n\t\t\t#\"I don't believe in fate.\"\n\t\t\t\t*set failedsphinx \"yes\"\n\t\t\t\t\"You lie,\" she snarls. \"You cannot hide your secrets from me. I know why you ran from Corinth. You are doomed just as surely as I.\"\n\t\n\t\t\t\tWith a final screech, she\t\n\t\t\t\t*goto leap\n\t\t\t\t\n\t\t\t#\"I don't want you to die. What purpose would it serve?\"\n\t\t\t\tHer eyes narrow as she pauses by the cliff edge. \"Why do you say such things? I have killed uncounted numbers of your fellows, and you would have joined them should you have failed my test. Surely my death would only be of benefit to you and yours.\"\n\n\t\t\t\t*choice\n\t\t\t\t\t#\"We are both subject to the will of the gods. It seems unlikely you and I were brought together by mere chance.\"\n\t\t\t\t\t\tA shiver runs through her hide as she gazes once more into the valley. The previous unchecked fury drains from her voice. \"That may be, but I act as I was made and there is a certain peace to be found in that. You are a fool if you believe I enjoyed none of it.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"So, you [i]want[/i] to die?\" you persist, sensing her hesitation.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"No... Of course not, but it is what must be,\" she whispers.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Are you so sure of that? Would you die without a fight?\"\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t*label savesphinx\n\t\t\t\t\t\t\n\t\t\t\t\t\tStiffly she takes \n\t\t\t\t\t\tone step away from the precipice, then another, shaking with effort \n\t\t\t\t\t\t*label savesphinx2\n\t\t\t\t\t\tas she fights the compulsion to plunge to her death in the valley below. By the time she reaches you, her breath comes in gasps.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Ach it hurts,\" she groans, grimacing in pain. \"If I am discovered, the elder gods will not be pleased by my defiance.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tShe shakes her head as if to clear it, before fixing you with her piercing dark eyes. \"Remember Oedipus, there are few that can truly escape their fate and salvation does not always come in the form of a sword.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tIn a swift movement of her head, she plucks a golden feather free from her wing and allows it to flutter to the ground. \n\n\t\t\t\t\t\t\"I beg you tell any who ask that I am dead. I leave you with this token for proof. Do not fear for the lives of those in Thebes, I vow to harm them no longer.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tWith a sweep of her wings, she takes to the air; rising rapidly into the skies and leaving you to ponder her words in silence.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto aftersave\n\t\t\t\t\t\t\n\t\t\t\t\t#\"I don't believe you would have killed those people of your own free will.\"\n\t\t\t\t\t\t\"Then you are more of a fool than I took you for,\" she snarls. \"I may have been sent here, that much is true; but I will not lie and say I enjoyed none of it. My nature is what it is and cannot be changed. Not by you, or even by [i]them.\"[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\tHer words carry a conviction that makes it hard to doubt she speaks the truth, but there is more hiding between her defiant words. You sense a desire to be free from the designs of those who would use her for their own purposes and condemn her in a fate not of her own choosing.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*label changechoice\n\t\t\t\t\t\t\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#\"Everyone can change if they have the will to do so. It is your life to lead after all.\"\n\t\t\t\t\t\t\t\t\"How naive you are little human,\" she barks a laugh that carries no trace of humour. \"But perhaps I have a mind to follow your example after all. To fight the inevitable rather than walk meekly to my doom.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto savesphinx\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t#\"Maybe that's true, but there has been too much death on this road already. Yours does not need to be added today.\"\n\t\t\t\t\t\t\t\t\"You surprise me Oedipus,\" her voice grates with effort as she tears her eyes away from the valley below. \"Pity for a monster? Some would call that a weakness, and a fatal one at that.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tShe gives you a crooked smile. \"You may have no wish to see my demise, but I assure you there are many who would rejoice at the news. Perhaps that is reason enough to remain on this side of the river Styx for a while longer.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto savesphinx\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#\"Perhaps you give me too little credit. I don't believe you to be completely evil despite your previous deeds. I would stay with you if you should allow it. I refuse to believe you would kill me in cold blood.\"\n\t\t\t\t\t\t\t\tShe chuckles humourlessly through clenched teeth. \"It seems madness runs in your family after all.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"This is no laughing matter,\" you chide stubbornly. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"No, it is not. But even should I have a mind to tolerate one of your kind for a time, it could never be.\" The rage is draining from her voice, leaving in its place a faint tinge of wistfulness. \"You know so little about so many things Oedipus. It will be your downfall I fear.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tWith a grimace she makes up her mind, taking one hesitant step away from the precipice, then another; the strain evident in every movement\n\t\t\t\t\t\t\t\t*goto savesphinx2\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t#\"I believe you deserve a second chance.\"\n\t\t\t\t\t\tShe laughs without humour. \"You believe that do you little human? I do not need your pity, nor your second chances. I am what I am and cannot change. I make no apologies for that.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto changechoice\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t#\"You are right, I was wrong to try and stop you. Your actions are inexcusable.\"\n\n\t\t\t\t\t\t\"So full of righteousness little prince? You of all people have no right to judge me,\" she hisses. \"You will see. We shall meet again soon I expect.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tHer eyes are full of pain as she strains to remain by the edge of the path for a few moments longer; gazing once more towards the freedom of the endless blue sky before pinning her wings to her side and falling to the valley floor far below.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto sphinxvalley\n\t\t\t\t\t\t\n\n*label aftersave\n\n*achieve savesphinx\n*set sphinxalive \"yes\"\n*set sphinxfeather \"yes\"\n\n*page_break\nRetrieving the long tawny feather from the ground, you almost drop it as the blade like edges bite into your hand. No one could ever mistake it as being plucked from a mortal bird. \n*set sphinxfeather \"yes\"\n\n\n\n*choice\n\t#You hope the Sphinx can be trusted to keep her word and not return to trouble Thebes.\n\t\tClinging to the thought that she made you a vow, you hope that is enough to keep her away. Besides, it seems she has much to lose herself if the gods should find that she still lives.\n\t\t\n\t\t*goto featherpath\n\t\t\n\t\t\n\t#You're filled with relief. The Sphinx will never trouble anyone again.  \n\t\tThe creature was terrifying and deadly, having claimed the lives of untold numbers over her long life. At least now, the people of Thebes can travel in relative safety.\n\t\t\n\t\t*goto featherpath\n\t\t\n\t#Your mind continues to spin. Exactly what did she mean by her parting words?\n\t\tEnigmatic to the end, you can't help but feel there is a deeper warning there; if only you could decipher its meaning.\n\t\t\n\t\tWith no further answers to be found here, \n\t\t*goto featherpath2\n\t\t\n\t#The victory is bittersweet. If only your friends and family could know of your deeds. \n\t\tThe feeling of triumph you felt at defeating the Sphinx and freeing Thebes, is tarnished by the memory of what you've lost.\t\n\t\t\n\t\t*goto featherpath\n\t\t\n\t#You lift the feather to the sky triumphantly. Thebes has been saved. Now to claim your reward! \n\t\n\t\t*set feather \"bold\"\t\n\t\t*if (looksphinx != \"no\")\n\t\t\tWaving your prize above your head for all to see, you continue your journey through the pass. \n\t\t*if (looksphinx = \"no\")\n\t\t\tWhere the path branches, you take the turnoff back towards Thebes. Waving your prize above your head for all to see, you head towards the city.\n\t\t\n\t\t*goto chapter4\n\n\t\t\n\t\t\n*label featherpath\nWith no further reason to remain, \n*label featherpath2\nyou carefully slide the feather through your belt and set off along the deserted trail once\n*if (looksphinx != \"no\")\n\tmore, keen to reach Thebes. \n*if (looksphinx = \"no\")\n\tmore. Where the path branches, you take the turnoff back towards Thebes. With the Sphinx gone, there is nothing to prevent your travel there now. \n\t\t\n\t\n*goto chapter4\n\n\n\n*label original \n\nClosing her eyes to shutter the bright flames within, the Sphinx\n*label leap\nleaps from the path; wings folded tightly against her back as she plummets to the valley floor far below. \n\n*label sphinxvalley\n\nAs she hits the rocks, her body disintegrates into a ball of sparks, singeing the vegetation where it touches. Soon the only evidence of her existence, are the blackened rocks below and a few stray tawny feathers floating on the breeze. You grab one from the air, almost dropping the feather as it bites into your hand. The feather's edge is as sharp as a blade, and almost reaches the length of your forearm. There is no mistaking it as being plucked from any mortal bird. \n*set sphinxfeather \"yes\"\n\n\n\n*choice\n\t#You're filled with relief. The Sphinx will never trouble anyone again.  \n\t\tThe creature was terrifying and deadly, having claimed the lives of untold numbers over her long life. At least now, the people of Thebes can travel in relative safety.\n\t\n\t\tCarefully tucking the feather into your belt, you resume your journey along the pass.\t\n\t\t*goto tn\n\t*selectable_if (failedsphinx != \"yes\") #You lift the feather to the sky triumphantly. You've defeated the creature, now to claim your reward! \n\t\tWaving your prize above your head for all to see, you continue your journey through the pass. \n\t\t*set feather \"bold\"\n\t\t*goto tn\n\t#Looking at the feather sadly, you reflect that it was a shame you could not come to a peaceful resolution.\n\t\t*if (failedsphinx != \"yes\")\n\t\t\tHer taste for human flesh is surprising considering you'd always heard mountain goats were quite the delicacy, and far less trouble to hunt. You wish you hadn't had to be responsible for her death, but it seems as if there was little other choice open to you this day.\t\n\t\n\t\t*if (failedsphinx = \"yes\")\n\t\t\tWas her presence really here by choice? Her words seemed to indicate something deeper. Though you never wished her death, it seemed there was little avoiding it once you defeated the Sphinx at her own game.\n\t\t\n\t\tCarefully tucking the feather into your belt, you resume your journey along the pass.\n\t\t*goto tn\n\t#The victory is bittersweet. If only your friends and family could know what you've done. \n\t\tYou turn the feather carefully over in your hands, triumph tarnished by the memory of what you've lost. \n\t\t\n\t\tCarefully tucking the feather into your belt, you resume your journey along the pass.\n\t\t*goto tn\n\t*if (failedsphinx = \"yes\") #You're troubled by her final words. Was there any truth to them, or was it simply spite?\n\t\tWhatever the case may be, you'll not find the answer on this now lonely road. Carefully tucking the feather into your belt, you resume your journey along the pass.\t\t\n\t\t*goto tn\n*label tn\t\t\n*if (looksphinx = \"no\")\n\tFurther down the road, you take the turnoff back towards Thebes. With the Sphinx gone, there is nothing to prevent your travel there now.\n\t\n\t\n*label chapter4\t\n\t\n*page_break\n\n*text_image ch4oedipus.png center Chapter Four: The City of Thebes\n\n\nThebes has the look of a city under siege. No children run in the streets, and farmers tending their goats have the haunted look of people who know they could be scooped up and carried away at any moment. As you walk along the deserted road, farm house shutters open with people staring at you disbelievingly. You hear snatches of whispered conversation. It seems that the Sphinx has not allowed anyone to pass into Thebes for a long time. \n\nAs you near the city, the whispers become bolder.\n\n[i]\"He has to have... No one has passed that way in months...\"[/i]\n\n[i]\"Could it be true? Is she gone?\"[/i]\n\n[i]\"Is it safe? Truly?\"[/i]\n\n[i]\"Perhaps he was just lucky?... Or mayhap it's one of her tricks...\"[/i]\n\n*if (feather = \"bold\")\n\tYou hold the feather up so it catches the light, pitching your voice to be heard. \"I am Oedipus, know that the Sphinx will trouble you know more. Here is my proof!\"\n\n\tPeople creep warily from their thatched, mud brick homes; crowding around you to get a closer look at the feather in your hand. \n\t\n\n\t\n\t\n*if (feather != \"bold\")\t\n\t[i]\"Wait. What is that at his belt? I've seen one of those before, left in the field in place of one of my cows...[/i]\n\t\n\t*page_break\n\t\n\tA greying man in a rough brown tunic hobbles from his thatched mud brick home. \"You've done it haven't you? Killed the beast. Say you have?\"\n\t\n\tHis watery blue eyes are wide and full of hope. \n\t\n\t*if (sphinxalive != \"yes\")\n\t\t\"Yes,\" you say simply. \"She'll trouble you no longer.\"\n\t*if (sphinxalive = \"yes\")\n\t\t\"She'll trouble you no longer,\" you reply, allowing them to draw their own conclusions on the matter.\t\n\t\n\tHe breaks into a smile full of yellowed, uneven teeth. \"Your name good sir. What is your name?\"\n\t\n\t\"Ah, Oedipus.\"\n\t\n\t\"Come out!\" he yells to his neighbours. \"Oedipus has done it! Saved us from the Sphinx! Show them the feather! Come out everyone, come out!\"\n\t\n\t*page_break\n\t\n\tCarefully, you take the feather from your belt, holding it up to the light for the crowd forming around you to see.\n\t\n\t\n[i]\"Not from any bird seen before... I've seen the creature, definitely one of hers... I think he's really done it...\"[/i]\n\t\nThrough the murmurs a chant begins, building in intensity as the crowd continues into the city proper. \n\t\n[i]\"Oedipus... Oedipus.... OEDIPUS!\"[/i]\n\n\n\n\t\n*page_break \n\n\nAt the sight of the Sphinx's feather, the guards waste no time separating you from the chanting crowds, spiriting you away into the palace grounds. At the entrance to a columned building, a woman who is unmistakably Queen Jocasta stands waiting. \n\nThe years and recent events have taken their toll on her. Although she still stands straight and proud, grey strands thread her raven black hair and lines of worry etch her face. Her cheeks are hollow and dark circles bruise the skin beneath her brown eyes, but she smiles with genuine warmth as you approach. \n\n\"Prince Oedipus! By the light it is you! It's been so long, I almost didn't recognise your \n*if (extracloak = \"\")\n\tface. Particularly under that ratty old farmer's cloak you're wearing.\"\n*if (extracloak != \"\")\t\n\tface. Particularly under that ${colourcloak} merchant's cloak you're wearing.\"\n\n*fake_choice\n\t#\"Greetings Queen Jocasta. I bring news that the Sphinx has been felled by my hand.\"\n\t\tHer breath catches. \"Then it is true? That makes you doubly welcome in this house Oedipus. Please come in.\"\n\t\n\t#\"It has been a long time. I'm grateful you remember me.\"\n\t\t\"I could never forget such a sweet boy.\" Her smile is wistful. \"But you've certainly grown since I last saw you and... well tell me. Is what they shout true? Have you really killed the beast?\"\n\t\n\t\tYou take the feather from your belt and hand it to her. \"Be careful, the edges are sharp.\"\n\t\t\n\t\tShe turns the object over in her hands. \"It [i]is[/i] true then. You are most welcome in my house. Please, come in.\"\n\t\t\n\t#Smile and nod respectfully.\n\t\t\"You always were a well-mannered boy.\" She smiles wistfully. \"But you've certainly grown since I last saw you and... well tell me. Is what they shout true? Have you really killed the beast?\"\n\t\n\t\tYou take the feather from your belt and hand it to her. \"Be careful, the edges are sharp.\"\n\t\t\t\n\t\tShe turns the object over in her hands. \"It [i]is[/i] true then. You are most welcome in my house. Please, come in.\"\n\nA subtle shake of her head at the guards to indicate they are no longer required. \t\n\n*page_break\n\nThe queen leads you to a private room for entertaining guests, and gestures for you to take a seat on one of the reclining couches. \n\n\"We have much to discuss, but first I would be remiss if I didn't offer you refreshment after all you have done.\"\n\nShe claps her hands and a white robed servant appears. Murmuring quietly to the man, he hurries from the room. \n\n*page_break\n\n\"They'll not be long.\" Her expression takes a nervous edge. \"I hate to mar your day of triumph with such news Oedipus, but I feel I should be the one to tell you before you hear it from others.\"\n\nShe takes a deep breath, looking down at her tightly clasped hands. \"It was a few weeks ago... Your father, King Polybus. He... well, he has passed from this life.\"\n\nThe words out, she continues in a tumbling stream. \"No one knew where you were. Some even thought you were dead. Your poor mother... It has been so hard on her thinking she had lost not only her husband but also her son. I am truly sorry Oedipus. Polybus was a
