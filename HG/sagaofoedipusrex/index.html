t\t\t\t\t\t\n\t\t\t\t\t\t\t\t[i]\"Foolish, stubborn human,\"[/i] she mutters under her breath with anger born from worry. \"Fine, stay if you must. I guess you'd better hear what we're up against since you won't leave.\"\n\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto planapep\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#\"Ok, I'll leave,\" you reply reluctantly. \"But I'm not happy about it.\"\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto pleaseknow\n\t\t\t\t\t\n\t\t\t\t\t#\"Why are we arguing about this? It's unfair that the ruling gods are sending you up against something like Apep? They should be dealing with him. Not you.\"\n\t\t\t\t\t\t\"And since when has dealing with the gods ever been fair?\" she mutters bitterly. \"You of all people should know that. They demand, and it seems I must go.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tShe sidles closer, breath warm against your cheek as she continues more softly. \"If Apep gets loose, nowhere on Earth will be safe for you. For that reason alone I would stay and fight. Come now, gather your things and I will take you to the border where you will be safe until the serpent can be returned to the underworld.\" \n\t\t\t\t\t\n\t\t\t\t\t\t*goto remain\n\t\t\t\t\t\n\t\t\t\t\t*if (sphinxcare = 0) #\"Don't try that on me. It's not like you care about them.\"\n\t\t\t\t\t\tShe hesitates.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"You do?\" You blink in surprise. \"But you always said...\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"This is your fault Oedipus,\" she rumbles. \"I was quite content to hide away in my cave. You were the one that showed me not all humans needed killing. Besides, do you think Apep will stop at Egypt should he get loose? Nowhere in the world will be safe for you. I have to do this, you don't. Come now, gather your things and I'll take you to the border.\"\n\t\t\t\t\n\t\t\t\t\t\t*goto remain\n\t\t\t\t\t\t\n\t\t\t*if (failedsphinx != \"love\") #\"If you really are my friend, you'd leave with me instead of trying to send me away.\"\t\n\t\t\t\n\t\t\t\t*goto love\n\n\t\t\t*if (failedsphinx = \"love\") #\"If you really loved me, you'd leave with me instead of trying to send me away.\"\t\n\t\t\t\n\t\t\t\t*goto love\n\n\n\t#\"Very well. I'll await your return by the border.\"\n\t\t*label pleaseknow\n\t\n\t\tShe nods, shoulders slumping in relief. \"Please know I'd love to have you by my side, but this is one battle for which humans such as yourself will be ill equipped. I am glad to see you will not allow pride to be your downfall. Come, gather your possessions. We've little time if I'm to take you to the boarder.\"\n\t\t\t\n\t\t*goto gather\n\t\t\t\t\t\t\n\t\n\t#\"This is [i]not[/i] ok. You should be coming with me.\"\n\t\n\t\t*goto love\n\t\t\t\n\t\n\t\n*label gather\t\n\n*set leaveegypt \"yes\"\n\n*page_break\n\n*text_image epilogueoedipus.png center Epilogue\n\nYou stroll along the muddy banks of the Nile, the sluggish brown waters widening out to spread across the plain into something that would almost qualify as a lake or an inland sea. Locals barely look up from their chores, laughing and chattering as they mend frayed nets or wash their linen in the murky waters by the bank. Although rather rare for someone sporting a Greek accent like yourself to come to this place in Nubia, enough trade filters through these parts that one more foreigner passing through makes you little more than a passing curiosity and not enough to hold anyone's interest for long. \n\nSlowing your pace under the guise of watching a flock of waterbirds winging overhead, you surreptitiously eavesdrop on a group of fishermen hoping for news. \n\n[i]\"Crocodile took out my entire net yesterday. That's the second one this month! I haven't even finished mending the first. You've a spare I could lend don't you Ali?\"[/i]\n\n[i]\"Well I suppose. You'll be responsible for having it mended if you let it get eaten as well though...\"\n\n*page_break Moving along. \n\nYou continue until you see a pair of men launching a small wooden boat laden with nets into the river and pause pretending to look for something in your satchel.\n\n[i]\"What would Omar know! The fish are biting around the bend near Salah's house. You should throw your nets there if you want to catch more than mud and branches...[/i]\n\nSigh. More fishing talk. looping the bag over your shoulder, you listen in as a group of young women hurry past.\n\n[i]\"Did you hear? Rania's sister claims she ran off with that trader. Jamal's furious...\"[/i]\n\n*page_break\n\nNothing but fishing talk and gossip. You don't know why you expected anything more. There were some initial murmurings when the trade boats ceased arriving from Egypt where the sky blackened with roiling black clouds; however the people of the village to the north seemed to hold an almost fervent belief that if they simply ignored the strange events, it would pass them by unharmed.\nAnd why not? No ill had yet come to trouble the village and cause fishermen to trade their nets in for swords and knives. \n\nStill, tensions had dropped visibly the day the sky had cleared into a crystal blue; a reassurance that everything was sure to be at rights once more. But despite your daily pacing along the banks, no boats arrived from Egypt to carry news of what had transpired there.\n\nYou were...\n\n*fake_choice\n\t#Content to wait. It's only been a few days since the skies cleared. The Sphinx will come when she was able.\n\t\tSurely the signs point to a victory against Apep, it shouldn't be long now. You can wait a bit longer until she is able to return.  \n\t\n\t#Restless at the lack of news. If the battle had been victorious, why isn't she here?\n\t\tSurely she wouldn't have changed her mind about joining you here... Would she? You shake your head dismissing the thought. Maybe she was injured? [i]Or worse...[/i] \n\t\t\n\t\tThe last thought comes unbidden as you stomp unhappily along the soft soil. How much longer should you remain in this place before you leave yourself?\n\t\t\n\t\t\nThe mud thickens, sucking at your sandals until you've no choice except to walk from away from the river and back onto the hard-packed stones of the road. Head swirling with thoughts, you continue to trudge along following the trail into a rocky landscape; barely noticing as the people become father and fewer between as the sun continues its journey to beat mercilessly down upon your head from the midday sky. \n\nFinally admitting defeat, you take shelter in the meagre shade offered by a scraggly tree struggling to grow in the parched landscape. Intense heat causes the road to shimmer and twist, creating illusions of water upon its surface. A mirage you'd heard it called. More than one person had died in the deserts of Africa chasing pools of water in the sand that could not possibly exist. Slowly though you think you see something else through the haze, something large. A horse perhaps? Who would be riding through this heat? They'd surely kill their mount with exhaustion through such foolishness.\nSquinting you look again. No not a horse... Could it be?\n\nThe Sphinx limps into view through the shimmery haze; her skin reddened from the sun and coat scuffed and dull from travel. \n\n\"Over here!\" You leap from your place by the gnarled trunk, beckoning her into the shade. \n\nShe stumbles off the road, all but collapsing to the ground by your feet. \n\n*fake_choice\n\t#\"You came! I never doubted it.\"\n\t\tShe lifts her head, smiling weakly with cracked lips. \"You know me, nothing can stop me from keeping my promises. Not even death.\"\n\t\n\t\t\"What?\" you ask, confused by her words. \"I take it you mean you killed Apep.\"\n\t\t\n\t\t\"Killed?\" she snorts. \"You can't kill that thing, the best anyone can do is contain it. But yes, Apep should not be a problem again for some time to come.\"\n\t\t\n\t\t\"Then what did you...\"\n\t\t\n\t\t\"I died Oedipus.\" Her body shakes as she squeezes her eyes tightly shut. \"I shouldn't be here, but I begged them to allow me to return as repayment for my help. Not all the way though you understand. Even [i]they[/i] have their limits. One lifetime only. I'm not what I once was, I'm [i]mortal.\"[/i]\n\t\t\n\n\t\t\n\t#\"You look terrible. What happened to you?\"\n\t\t\"Why thank you for noticing.\" She replies with a ghost of her previous snarkiness as she lifts her torso from the ground, swaying slightly with exhaustion. \"I'm afraid I haven't quite been myself of late. Quite understandable since I died.\"\n\t\n\t\t\"You what?!\" Your eyes search her face for some sign of sarcasm or humour and finding none. \n\t\t\n\t\tHer body shakes as she squeezes her eyes tightly shut. \"I shouldn't be here, but I begged them to allow me to return as repayment for my help. Not all the way though you understand. Even [i]they[/i] have their limits. One lifetime only. I'm not what I once was, I'm [i]mortal.\"[/i]\n\t\t\n\n\t#\"Are you alright? I've never seen you like this before.\"\n\t\t\"Well I've never died before, so I'm not surprised.\" Her attempt at humour falls flat as she begins to shake uncontrollably, eyes feverously bright.\n\t\t\n\t\t\"I died Oedipus. I shouldn't be here, but I begged them to allow me to return as repayment for my help. Not all the way though you understand. Even [i]they[/i] have their limits. One lifetime only. I'm not what I once was, I'm [i]mortal.\"[/i]\n\t\t\n\t\t\n\t\t\n\t\n\t#\"What took you so long? I was expecting you days ago!\"\n\t\t\"Sorry, it took me some time to climb my way back out of the underworld,\" she tries to snap sardonically, but her voice cracks with emotion.\n\t\n\t\t\"You had to go down to the underworld to defeat Apep?\" you ask slightly confused. \n\t\t\n\t\t\"Not exactly,\" she shivers, clutching her hands across her chest tightly at the memory. \n\n\t\t\"I died Oedipus. I shouldn't be here, but I begged them to allow me to return as repayment for my help. So I'm here, but not all the way though you understand. Even [i]they[/i] have their limits. One lifetime only. I'm not what I once was, I'm [i]mortal.\"[/i]\n\t\t\nHer voice twists in despair. \"How do you stand it? To be so weak and fragile. To know each beat of your heart brings you closer to death?\"\n\t\t\n\n\"Y-You're serious about this, aren't you?\" you stammer out trying to come to terms with what she's just told you. \n\n\"More serious that I've ever been about anything.\" She covers her face with her hands. \"They warned me this would happen if I chose to come back, but I didn't think it would feel like [i]this.[/i] What am I to do?\"\n\n*fake_choice\n\t#\"It's not so bad. You'll get used to it.\"\n\t\t\"I guess I have little choice in the matter but to find out, do I?\" She rubs at her red rimmed eyes unconvinced. \"So tell me Oedipus, I always thought I'd have eternity, but with only a single lifespan left to me I'm lost. What will we do now?\"\n\t\n\t\n\t#\"A second chance is something to be embraced, even if it's not quite what you expected.\"\n\t\t\"Perhaps.\" She rubs at her red rimmed eyes not entirely convinced. \"So tell me Oedipus, I always thought I'd have eternity, but with only a single lifespan left to me I'm lost. What will we do now?\"\n\n\t\n\t#\"I'd imagine being mortal pales in comparison to what you're used to, but it's still better than the alternative.\"\n\t\tShe shivers again, clutching at your arm, hands cold and clammy despite the heat. \"Yes... yes you're right. I'm not ready for that just yet. Besides, I asked to come back for a reason.\"\n\t\n\t\tHer dark eyes find your own and hold them. \"What will we do now? I always thought I'd have eternity ahead of me, but with only a single lifespan left I'm lost.\"\n\n\t#\"Pull yourself together. Self-pity doesn't suit you.\"\n\t\tShe laughs weakly. \"All this time I've been snapping and snarling at you for mortal weaknesses and now you turn it on me. Very well Oedipus. Tell me, what should I be doing, if not wallowing in some more than deserved self-pity.\"\n \n\t\t\"Live,\" you state simply. \"You asked to come back, you must have a reason.\"\n\t\t\n\t\t\"Yes,\" she whispers. \"And I've just found it. What will we do now? I always thought I'd have eternity ahead of me, but with only a single lifespan left I'm lost.\"\n\n\t\t\n\t#\"Live your life with me. Together we can make this work.\"\n\t\t\"I hope so, you do realise you're the reason I asked to come back in the first place.\" She coughs weakly. \"So with only a single lifetime remaining to us, what should we do next?\" \n   \t\n\t\n\t#Embrace her.\n\t\tYou wrap your arms around her, pulling her close. Although the unexpected display of affection would normally draw a sharp comment from your companion, she simply closes her eyes shivering despite the heat. \n\t\t\n\t\t\"We can do this together. You'll see.\"\n\t\t\n\t\t\"I hope so, you do realise you're the reason I asked to come back in the first place.\" She sighs, relaxing into your arms and making no attempt to move away. \"So what next Oedipus? I always thought I'd have an eternity, but now with only a single lifespan ahead of me, I feel lost.\" \n\t\n*fake_choice\n\t#\"You once said you wanted to return to Egypt if Apep could be banished. Let's go home.\"\n\t\t\"Home? I think I'd like that.\" She smiles weakly, \n\t\t*if (sphinxfriend = \"love\")\n\t\t\tsnuggling closer to lay her head against your shoulder. \n\t\t*if (sphinxfriend != \"love\")\t\n\t\t\tleaning in closer to place her head companionably against your shoulder.\n\t\t\"Let's go home. But later... Much later.\" \t\n\t\t\n\t\tEyes fluttering closed, you hear her breathing settle into the rhythm of a deep dreamless slumber. \n\t\t\t\n\t\tYou can't help but smile. Despite everything that's happened, it seems you'll get a chance to pick up your life where it left off. Finally a chance for a happily ever after, a lifetime spent with\n\t\t*if (sphinxfriend = \"love\")\t\n\t\t\tyour soulmate, the one you love by your side.\n\t\t*if (sphinxfriend = \"friend\")\n\t\t\tyour best friend by your side. \n\t\t*if (sphinxfriend = \"fate\")\t\n\t\t\tone who truly understand you by your side. \n\t\tThe future looks brighter already.\t\n\t\t\t\n\t\t*image egypteye.png center Ending: Oedipus of Egypt\n\t\t\n\t\t\n\t\t*set status \"Created a home in Egypt.\"\n\t\t\t\n\t\t\t\n\t#\"Let's start anew and find a place to call home. It's a big world out there. Surely there's a place for the two of us.\"\n\t\t\"A new home for a new life,\" she muses softly,\n\t\t*if (sphinxfriend = \"love\")\n\t\t\tsnuggling closer to lay her head against your shoulder. \n\t\t*if (sphinxfriend != \"love\")\t\n\t\t\tleaning in closer to place her head companionably against your shoulder.\n\t\t\"It has a certain ring to it, does it not? I think we should go east. I've always wanted to see what lies beyond the ocean that way. But later... Much later.\"\n\t\t\t\n\t\tEyes fluttering closed, you hear her breathing settle into the rhythm of a deep dreamless slumber. \n\t\t\t\n\t\tYou can't help but smile. Despite everything that's happened, it seems you'll get that chance at what you'd once thought impossible. A happily ever after with\n\t\t*if (sphinxfriend = \"love\")\t\n\t\t\tyour soulmate, the one you love by your side. Bring on the adventures ahead.\n\t\t*if (sphinxfriend = \"friend\")\n\t\t\tyour best friend. Who better to have by your side for the adventures that lie ahead?\n\t\t*if (sphinxfriend = \"fate\")\t\n\t\t\tone who truly understand you. Who better to have by your side for the adventures that lie ahead?\n\t\t\t\n\t\t*image sphinxbeach.png center Ending: Oedipus and the Sphinx\n\n\t\t*set status \"Traveling the world with the Sphinx.\"\n\t\t\t\n\t\t\n\t#\"Then we've no time to lose. Let's see what's out there.\"\n\t\t\"Go exploring? Really Oedipus? I thought we were done with camping out in caves.\" You hear a hint of her old self in the complaint. \n\t\t\n\t\t\"Fine no caves, maybe a nice hedge or field instead,\" you tease.\n\t\t\n\t\t\"You! You're impossible!\" She bats a paw at your arm hard enough to hurt. \n\t\t\n\t\t\"Well, you asked me what I thought we should do,\" you grumble, rubbing at the rapidly forming bruise. \n\t\t\n\t\tShe pulls a pouch from around her neck that jingles with coins. \"The Pharaoh was most grateful... not to mention amazed at my reappearance. I feel we can do better than caves for quite some time to come.\"\n\t\t\n\t\t*if (sphinxfriend = \"love\")\n\t\t\tShe snuggles closer, laying her head against your shoulder. \n\t\t*if (sphinxfriend != \"love\")\t\n\t\t\tShe leans in closer, placing her head companionably against your shoulder.\t\t\n\t\t\"I think we should go east. I've always wanted to see what lies beyond the ocean that way. But later. Much later.\"\n\t\t\t\n\t\tEyes fluttering closed, you hear her breathing settle into the rhythm of a deep dreamless slumber. \n\t\t\t\n\t\tIt seems you have quite the journey ahead of you. What places you'll see, you can't even begin to imagine. And best of all, it'll be with \n\t\t*if (sphinxfriend = \"love\")\t\n\t\t\tyour soulmate, the one you love by your side. Bring on the adventures ahead.\n\t\t*if (sphinxfriend = \"friend\")\n\t\t\tyour best friend. Who better to have by your side for the adventures that lie ahead?\n\t\t*if (sphinxfriend = \"fate\")\t\n\t\t\tone who truly understand you. Who better to have by your side for the adventures that lie ahead?\n\t\t\t\n\t\t*image sphinxbeach.png center Ending: Oedipus and the Sphinx\n\n\t\t*set status \"Traveling the world with the Sphinx.\"\t\n\t\t\t\n\t\t \t\n*achieve mortal\t\n\n*goto_scene ending\n\t\t\t\n*label staydecide\n\n\t\t \n*disable_reuse\n\n*choice\n\t#\"So the only reason why you're going after Apep is because of a promise?\"\n\t\t\"Mostly.\" The Sphinx shifts uncomfortably as if unsure how much to say. Her eyes are overbright when she continues. \"This country has been good to me, much more so than in Greece where I was no more than a monster. And if I can help push Apep back into the underworld, perhaps we could stay here [i]together.[/i] I would like that very much.\"\n\t\t*set knowpromise \"yes\"\n\t\t\n\t\t*goto askapep\n\t\t\t\t\t\t\n\n\t#\"So why did you ask my opinion if you were always planning on hunting Apep anyway?\"\n\t\t\"Because I [i]do[/i] value your opinion. I wanted you to be able to make up your own mind as to what you thought was best without knowing what I must do.\" She sighs, turning away. \"If you truly wish to stay, I wouldn't dream of stopping you; but I will at least try to change your mind. It would be incredibly dangerous for a mortal to challenge the serpent. I think I would come to regret it if any should harm befall you. Please let me take you to the boarder where you can be safe.\"\n\t\t\n\t\t*choice\n\t\t\t#\"And it's not dangerous for you? There's no way I'm leaving you to fight that thing by yourself.\"\n\t\t\t\t[i]\"Less[/i] dangerous for me. Besides I won't be all alone,\" she corrects. \"I still think you should let me take you to the border until this whole thing is settled.\"\n\t\t\t\t\n\t\t\t\t\"I'm staying.\" You dig your heels in stubbornly. \"We'd best work out how we can both make it out of this alive don't you think?\"\n\t\t\t\t\n\t\t\t\tShe growls, muttering something uncomplimentary under her breath about humans. \"Fine. Let me tell you what I know.\"\n\t\t\t\t\n\t\t\t\t*goto planapep\n\t\t\t\t\t\n\t\t\t#\"You don't get to make decisions like that for me. If I decide to stay and fight, I will.\"\n\n\t\t\t\tTail swishing agitatedly she paces the room. \"Fine, I'll tell you what I know; but don't you dare get yourself killed over this.\"\n\n\t\t\t\t*goto planapep\n\t\t\t\t\t\n\t\t\t#\"So the best way for you to do your job is to have me out of the way? I'm not useless, and definitely not a coward you know.\"\n\t\t\t\t\"Oh I know Oedipus; do you really think I'd stay with a coward?\" She turns away. \"But sometimes it is wisdom to know when you should fight, and when you should not.\"\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#\"Then we'd better work on a plan. I have every intention on us both coming out of this alive.\"\n\t\t\t\t\t\t\"Easy for you to say.\" She sighs grumpily. \"Well I guess I'd better tell you what we're up against.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto planapep\n\t\t\t\t\t\t\n\t\t\t\t\t#\"I'm tougher than you give me credit for.\"\n\t\t\t\t\t\t\"Perhaps,\" she eyes you closely. \"I've underestimated you before. But this is no ordinary wyrm, he's strong enough to challenge the gods themselves. Do you understand?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou nod.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Very well.\" She lowers her head in defeat. \"If you're determined to stay I shan't stop you however much I'd prefer to know you are safe. I guess I should tell you what I know.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto planapep\n\t\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t#\"Perhaps you're right. If having me around is going to be a distraction, I should leave.\"\n\t\t\t\t\t\tThe Sphinx breathes a sigh of relief. \"Please know I'd love to have you by my side, but this is one battle for which humans will be ill equipped. I am glad to see you will not allow pride to be your downfall. Come, gather your possessions. We've little time if I'm to take you to the boarder.\"\n\t\t\t\n\t\t\t\t\t\t*goto gather\n\t\t\t\t\t\n\t\t\t#\"Ok, I'll leave. I trust you'll make short work of the monster.\"\n\t\t\t\t\"Of course I will.\" She throws you a smile, but you sense a nervousness underlying it that is completely uncharacteristic of her normal haughty nature. \"Pack what you need, we've little time.\"\n\t\t\t\t\n\t\t\t\t*goto gather\n\t\t\t\t\n\t\t\t\n\t\t\t\t\n\t\t\t#\"I don't want to see you hurt. If he's that dangerous please come with me. we'll leave together.\"\n\t\t\t\t*label love2\n\t\t\t\t\n\t\t\t\t\"I [i]can't,\"[/i] she growls in frustration. \"Can't you see what would happen if I broke the oath I made with Sekhmet? We'd all die. I'm not a goddess Oedipus, she'd kill us all out of spite.\"\n\t\t\t\t\n\t\t\t\t\"Besides.\" She rounds on you sharply. \"Don't you care about the people who will perish if Apep breaks loose?\"\n\t\t\t\t\n\t\t\t\t*fake_choice\n\t\t\t\t\t#\"Of course I do. But I care about you more.\"\n\t\t\t\t\t\tHer expression wavers between affection, exasperation and fear. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Don't worry about me, I'll be fine,\" she replies with a forced smile. \"Come, we don't have much time. Gather your belongings and I'll take you to the border.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*label remain2\n\t\t\t\t\t\t\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Shake your head, holding your place. \"I said I'm not leaving without you.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t[i]\"Foolish, stubborn human,\"[/i] she mutters under her breath with anger born from worry. \"Fine, stay if you must. I guess you'd better hear what we're up against since you won't leave.\"\n\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto planapep\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#\"Ok, I'll leave,\" you reply reluctantly. \"But I'm not happy about it.\"\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto pleaseknow2\n\t\t\t\t\t\n\t\t\t\t\t#\"Why are we arguing about this? What are the ruling gods thinking sending you up against something like Apep. This is unfair. They should be dealing with him. Not you.\"\n\t\t\t\t\t\t\"And since when has dealing with the gods ever been fair?\" she mutters bitterly. \"You of all people should know that. They demand, and I must go.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tShe sidles closer, breath warm against your cheek as she continues more softly. \"If Apep gets loose, nowhere on Earth will be safe for you. For that reason alone I would stay and fight. Come now, gather your things and I will take you to the border where you will be safe until the serpent can be returned to the underworld.\" \n\t\t\t\t\t\n\t\t\t\t\t\t*goto remain2\n\t\t\t\t\t\n\t\t\t\t\t*selectable_if (sphinxcare = 0) #\"Don't try that on me. It's not like you care about them.\"\n\t\t\t\t\t\tShe hesitates.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"You do?\" You blink in surprise. \"But you always said...\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"This is your fault Oedipus,\" she rumbles. \"I was quite content to hide away in my cave. You were the one that showed me not all humans needed killing. Besides, do you think Apep will stop at Egypt should he get loose? Nowhere in the world will be safe for you. I have to do this, you don't. Come now, gather your things and I'll take you to the border.\"\n\t\t\t\t\n\t\t\t\t\t\t*goto remain2\n\t\t\t\t\t\t\n\t\t\t*if (failedsphinx != \"love\") #\"If you really are my friend, you'd leave with me instead of trying to send me away.\"\t\n\t\t\t\n\t\t\t\t*goto love2\n\n\t\t\t*if (failedsphinx = \"love\") #\"If you really loved me, you'd leave with me instead of trying to send me away.\"\t\n\t\t\t\n\t\t\t\t*goto love2\n\n\n\t#\"Very well. I'll await your return by the border.\"\n\t\t*label pleaseknow2\n\t\n\t\tShe nods, shoulders slumping in relief. \"Please know I'd love to have you by my side, but this is one battle for which humans will be ill equipped. I am glad to see you will not allow pride to be your downfall. Come, gather your possessions. We've little time if I'm to take you to the boarder.\"\n\t\t\t\n\t\t*goto gather\n\t\t\t\t\t\t\n\t\n\t#\"This is [i]not[/i] ok. You should be coming with me.\"\n\t\n\t\t*goto love2\n\t\t\t\n\t\n\t\t\t\n\t\n\t\n*label planapep\t\t\t\t\t\n\n*page_break\n\nAs the Sphinx's account of her discussion with Sekhmet draws to a close, you rub at your temples tiredly. \n\n\"So what you're saying is they suspect Apep will try to break loose during the night when Ra is... indisposed, and once free of the valley that has contained him, it's likely that no one will be able to return him to his prison once more? Yet only Ra... or perhaps Set has a real chance to defeat him.\"\n\n\"That's about the sum of it yes.\" She paces the room, tail twitching in agitation.  \t\n\n\"And exactly why is it that Set won't help us again? I know he's not one to turn down a bit of chaos and violence, but not even he would benefit from Apep's release. He'd probably be one of the first that serpent would go after given their history.\"\n\n*page_break\n\n\"It's complicated.\" She turns to pace back to the table. \"Every day, Ra guides the sun through the skies over Egypt, while at night, that journey takes him through the underworld where he is severely weakened and unable to fight off his enemies that dwell there: Including Apep. Set safeguards him during this time. He wouldn't dare leave him for fear Apep is setting a trap and will simply kill Ra once left unprotected. The serpent is ancient and cunning; he's thought his plan through well.\"  \n\n\"So if we can't defeat Apep ourselves, what do they expect us to do about it?\" you ask confused. \n\n\"Stall for time. Damage him as much as we can while hopefully staying alive. If we can keep him busy until sunrise, Ra can take care of the rest.\"\n\n*fake_choice\n\t#\"That's it? Doesn't sound like much of a plan. Perhaps we should rethink it.\"\n\t\t\"Time is short and there is little else we can do,\" the Sphinx sighs. \"I do plan to seek the help of the priests. There are certain rites contained within the Book of Apophis which I expect will at least weaken the serpent for a time and give us a fighting chance.\"\n\t\n\t\n\t#\"Well, if the gods have demanded you do this, I guess we'll just have to do the best we can.\"\n\t\t\"We'll have help. There are certain rites contained within the Book of Apophis which will also help weaken the serpent for a time. I suspect we will have no trouble getting the priests to agree to help us in this matter.\"\n\t\n\t\n\t#\"I don't like this. Is there anyone else we could petition to help us?\"\n\t\tShe shakes her head. \"Not if you're asking about divine help, and common soldiers will be of no use to us here. There are certain rites in the Book of Apophis that will help weaken him for a time, I expect that the priests will agree to help us in this endeavour.\"\n\t\n\t#\"At least the plan's simple. We can do this!\"\n\t\tShe sighs, not looking overly cheered. \"Perhaps, I guess sometimes the most straight forward plans are the best. I also seek to enlist the help of some priests as there are certain rites contained within the Book of Apophis which could at least weaken the serpent for a time.\"\n\t\n\t\n\"Actually, there is one last thing.\" She pads from the room, returning with a long, thin bundle wrapped in white cloth within her teeth. She drops it to the table with a metallic clink. \"Sekhmet said I should give this to you, should you agree to stay.\"\n\nCarefully you untie the leather bindings to reveal the long, polished haft of a spear tipped with a tapering point of bronze. Inscriptions adorn its surface in a script you don't recognise and when you lift it from the table, it almost seems to hum with power. \n\n\"What is it?\" you ask, reverently placing the spear back on the table. \"This is no ordinary weapon.\" \t\n\n\"It belongs to Set,\" she replies, eyeing the object with a measure of trepidation. \"It won't kill Apep in your hands, but it should allow you to defend yourself at least. A regular sword wouldn't even put a scratch on his hide. Try not to lose it, I suspect Set will want it back again and he has a temper.\"\n\n*set setspear \"Set's spear.\"\n\n*achieve setweapon\n\n*fake_choice\n\t#\"So what you're saying is if Apep doesn't finish me off, Set will. [i]Fantastic,\"[/i] you deadpan. \n\t\tShe shakes her head stiffly, instead changing the subject. \"We should go. We've little time left, and I'd not linger here any longer than need be. There's a long journey ahead of us.\"\n\t\n\t\t\n\t#\"Well I for one am feeling better about this whole thing already,\" you reply, gesturing to the spear. \n\t\tShe nods slowly. \"You still must take care Oedipus, this may give us less of an advantage than you think. We've little time left, can you be ready to leave within the hour? I'd not linger here any longer than need be, we've a long journey ahead of us.\"\n\t\n\t\n\t#\"I'm still not happy about all this. Are you sure there's no other way?\" You frown unhappily, thinking about the options available to you.\n\t\t\"Asides from me taking you across the border to safety until this blows over?\" she replies with the tone that she knows arguing over it will be pointless. \"Not that I know of and time is short. We should leave within the hour; our destination is far and I'd not linger here any longer than need be.\"\n\n\n*page_break\n\n*set health 4\n\nThe ground trembles beneath your feet, the baked earth cracking into a spiderweb of fissures no wider than your little finger while you put your arms out for balance. In the sky above, pitch black clouds billow, swirling overhead and shrouding the top of the mountain range that dominates the desolate landscape. Voices raise shrilly as the priests redouble their efforts, plunging a knife once more into straw filled figure painted to resemble a giant water snake. With a shiver you look away from the spectacle and back to the fire. \n\nDespite the Sphinx pushing you and your horse to their limits to arrive on the far western reaches of Egypt, after a week all you have to show for it are cracked lips from the merciless sun overhead, and stiff muscles from sleeping restlessly on the rocky and frequently unsteady ground. \n\n*fake_choice\n\t#Perhaps the priests' rites will be enough to prevent Apep from breaking free after all.\n\t\tYou've seen no sign that Apep's struggles have become stronger over the past week, although there's no real evidence that they're weakening either. Still, it is seeming ever more likely that neither yourself or the Sphinx may have to get involved at all.\n\t\t\n\t#You are starting to wish the serpent will just break free or go back to haunting the deeper reaches of the underworld. \n\t\tSurely nothing is worse than the uncertainty of waiting in this place.\n\t\n\t#The delay is concerning. With every day that passes, not only you but the priests weaken from lack of sleep and exposure to the elements. \n\t\tPerhaps this is Apep's plan after all. The Sphinx maintains he is more devious than most give him credit for. \n\t\n\t#You've almost considered asking the priests to stop their rites so you can fight the monster and be done with it. You've got Set's spear, what more could you need?\n\t\tYou'd even suggested as much to the Sphinx who'd batted you with her paw telling you not to be so foolish. It seems she doesn't share your faith that defeating Apep is a foregone conclusion. \n\t\t\n\t\t\nGeneral Iahmesu stalks out of the night, the shadows dark under his red rimmed eyes. It seems he has been sleeping even less well than yourself. He shivers in the cold night air, bringing his hands closer to the fire for warmth. \n\n*if generalmood != \"dislike\"\t\n\t\"Greetings Oedipus, it seems as if we will have one more night's grace.\" He gestures to the fading stars above. \n\t\n\tHe's right, surely it's not far off dawn.\n\t\n\t\"I must see to my men. They're brave, but none should have to endure this...\" He staggers slightly as the ground shakes again. He lingers in the circle of light for a few moments longer, before reluctantly walking away into the darkness once more.\n\t\n*if generalmood = \"dislike\"\n\tHis tired expression darkens to a scowl as he catches a glimpse of your face lit by the flickering flames. \n\t\n\t\"Make yourself useful and tell your mistress that the priests expect to hold Apep at bay for one night longer. Dawn is not far away,\" he snaps. \n\t\n\tWith that he turns and stalks away into the darkness once more, unwilling to remain in your company even if it means abandoning the warmth of the fire.\n\n*page_break\t\n\t\n\"Oedipus.\"\n\nYou jump having not heard the Sphinx's soft footfalls. Try as you might, having her soundlessly sneak up on you is something you've never managed to get used to. She joins you by the fire, eyes almost glowing in the dim light. Unlike everyone else, she alone seemed untouched by tiredness, although her mood had been progressively more volatile as time drags on. \n\n\"The General seems to think we'll have another night of peace... if you can call this peace.\" You wave your hand towards the stormy clouds above and the fresh fissures in the ground. \n\n\"Yes, I think he may be...\" Her voice trails off as the temperature drops sharply. \n\nTightening your grip on the spear, you glance around wildly as everything falls silent but for the strained voices of the priests echoing across the plain. \n\n*fake_choice\n\t#\"It's suddenly so quiet. Do you think that means he's finally decided to give up?\"\n\t\tShe looks around, tail twitching in agitation. \"I don't think so. Can you feel that?\"\n\t\n\t#\"$!{sphinxname}... What's going on?\"\n\t\t\"I'm not sure.\" Her whisper is loud in the silence. \"Not anything good.\" \n\t\t\n\t\tShe freezes, head tilted towards the ground. \"Wait. Can you feel that?\"\n\t\t\t\t\n\t#\"I don't have a good feeling about this at all.\"\n\t\t\"Neither do I.\" She looks around tail twitching in agitation. \"It may have gone quiet but there's something unnatural in the air. It crackles as if laced with magic.\"\n\t\t\n\t\tShe freezes, head tilted towards the ground. \"Wait. Can you feel that?\"\n\t\t\n\nYou crouch down, placing a hand against the ground and detecting a barely perceptible tremor. The buzz travels up your arm as if the very sand is alive with power. \n\n\"Get up Oedipus!\" she hisses. \"We're about to have company.\"\n\n*page_break\n\nThe tremors grow stronger and ever louder, until the very air sings with the sound. You notice the soldiers gathering up their weapons to surround the group of priests. You wonder if they know how little protection their spears and daggers will offer them should Apep break loose from his prison. \n\nWith a sharp crack, the side of the mountain explodes, showering your company with rocks to the sound of yelling and screams. And from that newly made crevasse comes something from beyond your darkest nightmares. \n\nA sleek head as long as you are tall slithers into view, his body encased in obsidian dark scales that draw and extinguish in any light that falls upon them. Blinking eyes that glow with the colour of dying embers, he coils with neck arched to survey the kingdom laid out before him. \n\nThe Sphinx still stands unmoving beside you. \"Oh no...\"\n\n*choice\n\t#\"Quick! We have to attack before he can get his bearings.\"\n\t\t\n\t\tGiving a sharp nod, the Sphinx takes to the air, winging towards the towering wyrm and leaving you to run along the ground behind. You watch as the reptile's eyes focus on the desperately chanting priests, hissing in rage as he recognises those that had sought to prevent his return. Unnoticed, the Sphinx dives in from behind, claws scraping against armoured scales and only drawing a thin line of blood in their wake. \n\t\t\n\t\tWith a hiss revealing rows of dagger sharp teeth, Apep turns striking with lightning speed, his jaws closing about the tip of her wing. With a scream she hastily backs away, the serpent following with eyes filled with hate straight towards your position. \n\t\t\n\t\tRisking a glance over your shoulder, you see the soldiers hastily herding the priests from the area, trying to get them to safer ground. Worryingly you hear their chant become jumbled in the process, something that can't bode well for you or the Sphinx left to face the monster alone.  \n\t\t\n\t\t*set sphinxinjury \"wing\"\n\t\t\n\t\t*goto attention\n\t\n\t#\"Steady. He has the high ground at the moment. We should wait for him to come to us.\"\n\t\t*set ritual \"no\"\n\t\t\n\t\tYou might as well have saved your breath. Within moments, the god's eyes narrow as they focus on the desperately chanting priests and he dives swiftly down the mountain obviously intending to put an end to those that had dared delay his return for so long.\n\t\n\t\tThe Sphinx takes to the air, trying to intercept the snake before he can reach the camp, but the god moves with lightning speed, ploughing through the ritual site. Spell broken, he strikes this way and that, snatching up the fleeing priests and swallowing them whole. There's no recovering the ritual now. The Sphinx and yourself remain as the last and only defence against the serpent leaving the valley and being loosed upon the world at large once more. \n\t\n\t\tTaking advantage of his distraction, the Sphinx \n\t\t*goto sphinxattack1\n\t\t\n\t#Yell to the soldiers to get the priests to a safer location. \n\t\tThe authority in your voice is enough to break through to the soldiers, most of which had been standing transfixed with horror at the sight of the malevolent god emerging from the underworld. Quickly they gather up the ritual items, beckoning the still chanting priests to flee to a safer distance. Though perhaps necessary to clear the people from the immediate area, the disruption weakens the already tenuous hold the ritual has on the serpent further. With a hiss that reveals rows of dagger sharp teeth, Apep dives swiftly down the mountain in pursuit of those that had delayed his return for so long. \n\t\t\n\t\tLeaping into the air, the Sphinx wings towards the serpent taking advantage of his distraction. She \n\t\t*label sphinxattack1\n\t\tdives towards the back of his head, claws scrabbling against armoured scales to finally find purchase and dig deeply into the flesh underneath. \n\n\t\tWith a scream of pain, Apep spins to strike at his attacker with lightning speed, his jaws just missing the tip of her wing. Beating wings rapidly she retreats, the serpent following with eyes filled with fury straight towards your position. \n\t\t\n\t\t*goto attention\n\t\t\n\n*label attention\n\t\t\nAttention fixated on the Sphinx, either he hasn't noticed you yet, or simply doesn't perceive you as any kind of threat. You've just moments to decide how to act. \t\n\n*choice\n\t#Run at the monster yelling and brandishing your spear to distract him from attacking the Sphinx. \n\t\tYelling a battle cry, you run towards the monster, spear held high. Apep barely gives you a glance, instead snaking his head towards the Sphinx who has returned to strike at his head once more. Although agile in the air, you know she'll not be able to keep ahead of the monster for long.\n\t\t\n\t\tSick of being ignored, you strike at the snake's armoured side in an attempt to bring at least some of his attention towards yourself. You don't really expect the spear to do much damage against the heavy armour plates of his side, so it catches you off guard when the tip slices through the scales as easily as a knife through butter. \n\n\t\tApep screams in pain, tail flicking around to send you tumbling to land breathless in a heap. The snake eyes the spear, a look of recognition showing in his eyes. Yanking the point from his flesh he tosses it carelessly to the side before slowly advancing, a look of hate in his eyes. \n\t\t\n\t\t*label speartail\n\t\t\n\t\tPulling yourself to your feet, you look around in despair. Apep towers before you, neck arched in menace; while your spear lies out of reach, discarded on the ground behind him. \n\t\t\n\t\t*set health 3\n\t\t\n\t\t\"Nooo!\" \n\t\t\n\t\tThe scream comes from sky as the Sphinx flaps tiredly towards you, silhouetted against the first rays of dawn. She swoops towards the ground, rising with something clutched in her paws. \n\t\t\n\t\t*if (ritual = \"no\")\n\t\t\tWith a hiss, the snake spins, moving faster than ever as the last effects of the binding ritual fade away. She Sphinx dodges awkwardly, the object in her paws falling to the ground. [i]Your spear![/i]\n\t\t\t\n\t\t\tAs you run towards it, Apep strikes at the air once again to the sound of a shrill scream. Looking up, you see the Sphinx being tossed to one side, fangs dripping venom onto the parched ground. She lands heavily, with no movement but her feathers rustling in the breeze.\n\n\t\t\t*set sphinxinjury \"dead\"\n\t\t\t\n\t\t*if (ritual != \"no\")\n\t\t\tWith a hiss, the snake spins, seeming slightly more sluggish than a moment ago as you hear a chant carried on the breeze. He strikes, jaws snapping shut on air as the Sphinx swoops past to drop an item at your feet- your spear.\n\t\t\n\n\t\tScooping the weapon up, you...\n\t\t\n\t\t*gosub spearchoice\t\t\n\t\t\t\t\n\t\t\n\t\t*gosub fightapep\n\t\t\n\t\t*page_break\n\t\t\n\t\t*achieve apep\t\t\n\n\t\t*label afterbattle\n\t\t\n\t\t*if (sphinxinjury = \"dead\")\n\t\t\tPicking yourself up, you stagger towards the fallen Sphinx, her breath coming in laboured gasps. You shudder at the deep puncture into her abdomen which ooze blood sluggishly to pool around her prone form. \n\t\t\t\n\t\t\t\"I'm sorry Oedipus,\" she whispers, voice sharp with pain. \"It looks like it was I that should have been more careful rather than yourself.\"\n\t\t\t\n\t\t\t*fake_choice\n\t\t\t\t#\"It's going to be alright. Just lie still and I'll get you help.\"\n\t\t\t\t\t\"Always the optimist.\" She tries to chuckle, but it dissolves into a round of painful coughs. \"No one can help me Oedipus. Apep wanted to make sure this was one fight I didn't walk away from. Not even I can recover from his venomous bite.\"\n\t\t\t\t\n\t\t\t\t#\"You shouldn't have put yourself at such risk.\"\n\t\t\t\t\t\"Perhaps not, but it's too late to regret it now.\" She tries to smile but doubles over to cough painfully instead. When she lifts her head again, blood smears the tawney skin of her cheek. \n\t\t\t\t\t\n\t\t\t\t#\"This is not fair. It shouldn't have to end this way.\"\n\t\t\t\t\tShe tries to laugh but instead coughs weakly. \"Since when has life ever been fair my Oedipus? We should be more than used to it by now.\"\n\t\t\t\t\t\n\t\t\t\"I'm sorry I never said it often enough. Before I go, I need you to know that\n\t\t\t*if (sphinxfriend = \"love\")\n\t\t\t\tI love you. I always will. I...\"\n\t\t\t*if (sphinxfriend != \"love\")\t\n\t\t\t\tyou're the best friend I've ever had. All that matters is that you're safe. I...\"\n\t\t\tHer voice trails away as her eyes become glassy and lifeless. At your touch, her body dissipates into a shimmering dust, dispersing in the breeze until it was as if she'd never been.\t\n\t\t\t\n\t\t\t*goto sphinxdead\n\t\t\t\n\t\t\t\n\t\t*if (sphinxinjury != \"dead\")\t\n\t\t\t\n\t\t\tPicking yourself up, you stagger towards the Sphinx who stand nearby. One of her wings droops, blood etching patterns through the tawney feathers. \n\t\t\t\n\t\t\tNoticing your gaze, she gives you a shaky smile. \"Nothing that a bit of time won't heal. Are you alright?\"\n\t\t\t\n\t\t\t*fake_choice\n\t\t\t\t#\"I'm fine...\"\n\t\t\t\t\tShe looks you up and down dubiously.\n\t\t\t\t\t*if (health \u003c 4)\n\t\t\t\t\t\t\"You know better than to lie to me Oedipus, particularly when I can see the blood dripping from your hands.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou wince, tearing a strip from your clothes to bind the wound. \n\t\t\t\t\t\t\n\t\t\t\t\t*if (health > 3)\n\t\t\t\t\t\t\"Actually you do seem to have come out of this in one piece despite my misgivings after all.\"\n\t\t\t\t\t\t\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t#Better than you it seems.\n\t\t\t\t\tShe groans, taking a limping step towards you. \"Yes it appears I should have taken some of the advice I gave you about being more careful.\"\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t*selectable_if (health \u003c 4) #Not great, but at least I'm alive.\n\t\t\t\t\t\"Something for which we should both be eternally grateful. I really didn't think we were going to make it at one point. Just as well dawn broke when it did.\" She groans, taking a limping step towards you.\n\t\t\t\t\t\n\t\t\t\n\t\t\n\t\t\t*goto sphinxalive\n\t\t\t\n\t\t*goto sphinxalive\n\t\t\t\n\t\t\t\n\t#Use the creature's focus on the Sphinx to your own advantage, circling around to attack from behind. \n\t\tCrouching lower to the ground, you can only hope the darkness will hide your movements as you circle around behind the giant reptile. The god continues to ignore your presence as it looks to the sky, hissing in anger at the Sphinx who continues to dart and swoop about his head, remaining just out of reach. Although agile in the air, you know she'll not be able to keep ahead of the monster for long. You'll have to make your move soon if she's to survive the night.\n\t\t\n\t\tGrasping the spear with clammy palms, you rise from the ground, covering the distance with long strides and driving the spear deep into his tail. \n\t\t\n\t\tApep screams in pain, tail flicking around to send you tumbling through the air, landing breathless in a heap. Blood flows freely from the gaping wound, burning your skin where droplets of the ichor have splattered. The snake eyes the spear with a look of recognition. Yanking the point from his flesh he tosses it carelessly to the side before slowly advancing, hate burning brightly in his eyes.\n\n\t\t*page_break\n\t\t\n\t\n\t\tPulling yourself painfully to your feet, you look around in despair. Apep towers before you, neck arched in menace; while your spear lies out of reach, discarded on the ground behind him. \n\t\t\n\t\t*set health 3\n\t\t\n\t\t\"Nooo!\" \n\t\t\n\t\tThe cry comes from above as the Sphinx plummets from the sky. Her voice causes the serpent to hesitate for a second, attention split briefly between the enemy on the ground and the one in the air. Without hesitating, you use the distraction to race for your weapon, wincing as you hear the sound claws squealing against scales, followed by the God's growl of fury. Caustic blood stings where it touches your skin, but you've no time to stop. Set's spear lies just ahead, almost within reach. Glancing over your shoulder, you see that you've not been forgotten. With one last snap at the Sphinx harrying him from the air, he lunges forward as you dive from the weapon, hands closing about the carved wooden shaft. \n\t\t\n\t\tA fanged maw closes about you, teeth sinking into your leg as if a knife through butter. With a scream, you feel the toxin coursing through your system, a wide gash oozing blood where the fangs have left their mark. \n\n\t\tVaguely you can hear someone screaming your name, but everything has gone hazy and red. With the last of your strength, you push the spear through the roof of the creature's mouth... [i]and then you're falling.[/i]\n\t\t\n\t\t*page_break\n\t\t\n\t\t*set setspear \"\"\n\t\t\n\t\t*goto oedipusdied\n\t\n\t\n\t#Hope that Apep will continue to ignore you, waiting until he's close enough to throw the spear at his throat.\n\t\tYou crouch, sinking into the shadowed ground as best you're able, gripping the spear tightly with clammy palms. With no cover to be found it's the best you can do. Barely daring to breathe, you watch the giant wyrm slither closer; hissing in anger at the Sphinx darting and swooping about his head, remaining just out of reach. Although agile in the air, you know she'll not be able to keep ahead of the monster for long. You'll have to make your move soon if she's to survive the night.\n\t\t\n\t\t*choice\n\t\t\t#You can't afford to wait any longer. Attack now. \n\t\t\t\tSilently you spring from the ground, running towards the monster with your spear held high. The god hesitates for a moment as you race into view, torn between the enemy in the air and the new one on the ground. Pupils narrowing to slits, he turns his gaze from you to strike at the Sphinx once more, who flaps frantically out of his reach back into the sky. \n\t\t\t\t\n\t\t\t\tWithout bothering to glance your way, his tail cracks like a whip, catching you across the chest and knocking the air from your body. Curling armoured bands of muscle around your chest, Apep lifts you from the ground and begins to squeeze.  \n\n\t\t\t\tWith every breath you take, the monster's vice like grip tightens until your ribs creak painfully. Head spinning, your vision darkens as despite your best efforts, your gasps for air become ever shallower. Arms bound to your sides, your legs kick futilely against nothing by air.\n\t\t\t\t\n\t\t\t\t*set health 3\n\t\t\n\t\t\t\tBarely conscious you hear a familiar scream of rage and the constricting bands loosen a fraction allowing you to inhale life giving air into your lungs once again. With what little strength remains, you wrench an arm free from the coils and use it to stab at the tail that continues to bind the rest of your body.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tThe strike was made in desperation rather than the expectation that any real damage would be done to the monster. In your weakened state, you doubt you'd be able to pierce the armour of a soldier, much less the thick, glassy scales of the creature before you. But with a push, the spear slices through the god's hide as if made of butter, sinking deeply into the flesh beneath. With a scream of pain, Apep flicks you away. You tumble across the sand, still grasping the spear that is slick with blood. \n\t\t\t\t\n\t\t\t\tApep turns to face you once more. His head towers high above, neck arched in menace. Eyes the colour of blood fix on the spear with a look of recognition and hate. Barely noticeable in the darkness, a twisted pile of golden feathers and fur lies on the sand behind the serpent, seemingly devoid of life.\n\t\t\t\t\n\t\t\t\t*set sphinxinjury \"dead\"\n\t\t\t\t\n\t\t\t\tLifting the weapon, you...\n\t\t\t\t\n\t\t\t\t*gosub spearchoice\n\t\t\t\t\n\t\t\t\t*gosub fightapep\n\t\t\t\t\n\t\t\t\t*achieve apep\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t*goto afterbattle\n\t\t\t\t\n\t\t\t\n\t\t\t\n\t\t\t#Stay your hand for a bit and let the serpent pass you by. The opportunity for a surprise attack too good to pass up.\n\t\t\t\tYou sink lower into the ground as the god approaches, shivering at the waves of cold that emanate from the creature, chilling not just your flesh, but your very soul. Apep's blood red eyes spot you through the darkness, his stare rooting you to the ground mesmerised and helpless. Venom drips from long ivory fangs, and he smiles...\n\t\t\t\t\n\t\t\t\t\"Nooo!\"\n\t\t\t\t\n\t\t\t\tThe scream comes from sky as the Sphinx dives, raking razor sharp claws across the back of the serpent's head. Blood hisses as it strikes the ground, caustic in its touch. Tiredly she flaps once more into the sky, barely avoiding teeth that snap shut on the air beneath her feet. \n\t\t\t\t\n\t\t\t\tFree from the hypnotic gaze you shake the last of the haziness away. Scooping up the weapon from where it had been dropped from numb fingers moments before, you...\n\t\t\t\t\n\t\t\t\t*gosub spearchoice\n\t\t\t\t\n\t\t\t\t*gosub fightapep\n\t\t\t\t\n\t\t\t\t*achieve apep\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t*goto afterbattle\n\t\t\n\t\t\t\n\t\n\t\n\t\n*label sphinxdead\n\n*achieve sphinxdeathapep\n\n*choice\n\t#Break down and cry in despair.\n\t\t*set reaction \"cry\"\n\t\tThe tears come unbidden as you kneel on the empty sand, crying for your loss. On the periphery you register people coming and going, but none dare to disturb you in your grief. \n\t\n\t\tFinally when you can cry no more, you dust yourself off, returning to the camp to saddle and bridle your horse. You'll leave for home immediately, there's no rest for you in this place tonight.\n\t\n\t\t*goto nocity\n\t\n\t#Scream at the sky in anger. She shouldn't have been asked to fight a god. This is all [i]their[/i] fault.\n\t\t*set reaction \"blame\"\n\t\tYou scream at the sun as it passes overhead. Demanding a response and getting none. The remaining priests and soldiers keep their distance, fearful of the retribution that could come from your disrespect. \n\t\t\n\t\tThough deep down you know it to be unwise to challenge the gods, all you can think of right now is how others always seem to end up hurt when you have dealt with them. You want her back, or at least a good answer explaining why her sacrifice was necessary. Anything but the silence that greets you from the sun shining steadily overhead. \n\n\t\tWhen night falls you finally admit defeat. Dusting yourself off, you return to the camp to saddle and bridle your horse. You'll ride out tonight since there'll be no rest for you here. Though you must look exhausted, none try to stop you. \n\n\t\t*goto nocity\n\t\t\n\t#Rage at the remaining soldiers and priests. They should have done more. \n\t\t*set reaction \"rage\"\n\t\tStorming back to the camp you rage at any who cross your path. It was their fault the ritual wasn't strong enough to hold Apep at bay, their fault none of the soldiers came to help. Furious, you saddle your horse and set off towards home. Eager to put as much distance between yourself and the people who betrayed you as possible.\n\t\n\t\t*goto nocity\n\t\n\t#She saved everyone with her actions, including you. You will morn for her loss, but not let it consume your thoughts and actions. \n\t\t*set reaction \"honour\"\n\t\tSwallowing your grief, you pick yourself up from the ground. There's little more to be done here, but once home, you'll make sure she will never be forgotten. \n\t\t\n\t\tThe Pharaoh showers you with gifts on your return, promising to build a monument to honour the Sphinx in her passing. Remembering the caustic conversations you'd had with her about the foolish people who chose to sacrifice their lives for glory, you find yourself wondering what she'd think of the whole thing. Probably shake her head and respond with a sarcastic remark or two about the foolishness of mortals. \n\n\t\t*page_break\n\t\t\n\t\t*text_image epilogueoedipus.png center Epilogue\n\t\t\n\t\tUnsure of what else to do, you'd returned home, although the silence was starting to grate at your nerves. More than once you'd turned to speak to the Sphinx, only to have the memories come flooding back. So it was of no surprise you found yourself to be hallucinating the soft footfalls of the Sphinx creeping up behind you.\n\t\t\n\t\t*goto revivesphinx\n\t\n\t\n*label nocity\t\n\n*page_break\t\n\n*text_image epilogueoedipus.png center Epilogue\n\nUnsure of what else to do, you'd returned home, although the silence grates at your nerves. More than once you'd turned to speak to the Sphinx, only to have the memories come flooding back. \n\nThe Pharaoh had sent gifts, as well as a promise of a monument to be erected in the Sphinx's honour; but otherwise people left you alone to wallow in your grief. Given your deteriorating mental state, it came as no surprise to you when found yourself hallucinating the soft footfalls of the Sphinx creeping up behind you.\t\t\n\t\t\n*label revivesphinx\t\t\n\n\"Go way,\" you mutter to the air, placing your head against the cool polished surface of the table. \"You're not real.\"\n\n\"I beg to differ.\"\n\nYour breath catches in your throat as the sound of a voice so familiar that it could belong to only one person on this Earth. \n\n\"You... How?\" you stammer in disbelief as the Sphinx pads into view. \n\n\"Well I did just help defeat a god and save the entire human race. I figured they owed me something.\" She smiles tiredly and for the first time you notice the dark circles under her eyes and scuffed condition of her previously gleaming coat.\n*if (reaction = \"blame\") \n\t\"Besides, I don't think they were enjoying the way you were ranting at them. You were supposed to be their champion after all. It's not setting a good precedent.\"\n*if ((reaction = \"cry\") or (reaction = \"rage\"))\n\t\"And with the state you were in...\"\n*if (reaction = \"honour\")\n\t\"Besides, they're probably worried that you'll send the country into ruin. Just [i]how big[/i] was the monument you demanded the Pharaoh build for me going to be anyway?\"\n\t\n\tShe shakes her head with a chuckle. \"Well at least it was nice to know you were thinking of me.\"\n\t\n*page_break\n\t\nShe stumbles slightly, as you leap from your chair to catch her and lower her body gently to the floor. Her skin is clammy, and she shakes despite the heat of the day. \n\n\"I didn't want you to see me like this.\" She squeezes her eyes tightly shut as she clings to your arm. \"They told me it would be like this, but I insisted anyway. How do you stand it Oedipus? To be so fragile? To know that every beat of your heart brings you closer to death?\"\n\n\"What are you talking about? What's wrong with you?\"\n\n\"I [i]died[/i] Oedipus. You don't return from that unscathed. Even [i]they[/i] have their limits when it comes to raising people from the dead. They could grant me one lifetime only. I'm [i]mortal.\"[/i]\n\t\t\nYour eyes widen, grasping at the right words to say. \n\t\t\n\n*fake_choice\n\t#\"Being mortal isn't so bad, it makes you cherish every day all the more. You'll get used to it.\"\n\t\t\"I guess I have little choice in the matter but to find out, do I?\" She rubs at her red rimmed eyes unconvinced. \"So tell me Oedipus, I always thought I'd have eternity, but with only a single lifespan left to me I'm lost. What will we do now?\"\n\t\n\t\n\t#\"A second chance is something to be embraced, even if it's not quite what you wanted.\"\n\t\t\"Perhaps.\" She rubs at her red rimmed eyes not entirely convinced. \"So tell me Oedipus, I always thought I'd have eternity, but with only a single lifespan left to me I'm lost. What will we do now?\"\n\n\t\n\t#\"I realise being mortal probably pales in comparison to what you're used to, but it's still better than the alternative.\"\n\t\tShe shivers again, clutching at your arm, hands cold and clammy despite the heat. \"Yes... yes you're right. I'm not ready for that just yet. I had a reason to come return after all.\"\n\t\n\t\tHer dark eyes find your own and hold them. \"What will we do now? I always thought I'd have eternity ahead of me, but with only a single lifespan left I'm lost.\"\n\n\t#\"Pull yourself together. Self-pity doesn't suit you.\"\n\t\tShe laughs weakly. \"All this time I've been snapping and snarling at you for mortal weaknesses and now you turn it on me. Very well Oedipus. Tell me, what should I be doing, if not wallowing in some more than deserved self-pity.\"\n \n\t\t\"Live,\" you state simply. \"You told them you wanted to return, you must have had a reason.\"\n\t\t\n\t\t\"Yes,\" she whispers. \"And I've just found it. What will we do now? I always thought I'd have eternity ahead of me, but with only a single lifespan left I'm lost.\"\n\n\t\t\n\t#\"Live your life with me. Together we can make this work.\"\n\t\t\"I hope so, you do realise you're the reason I asked to come back in the first place.\" She coughs weakly, choking back tears. \"So with only a single lifetime remaining to us, what should we do next?\" \n   \t\n\t\n\t#Embrace her.\n\t\tYou wrap your arms around her, pulling her close. Although the unexpected display of affection would normally draw a sharp comment from your companion, she simply closes her eyes leaning closer. \n\t\t\n\t\t\"We can do this together. You'll see.\"\n\t\t\n\t\t\"I hope so, you do realise you're the reason I asked to come back in the first place.\" She sighs, relaxing into your arms and making no attempt to move away. \"So what next Oedipus? I always thought I'd have an eternity, but now with only a single lifespan ahead of me, I feel lost.\" \n\t\n*choice\n\t#\"You said once that you'd never felt more welcome than here in Egypt. Let's stay here together.\"\n\t\t\"Stay here? I think I'd like that.\" She smiles softly, \n\t\t*if (sphinxfriend = \"love\")\n\t\t\tSnuggling closer to lay her head against your shoulder. \n\t\t*if (sphinxfriend != \"love\")\t\n\t\t\tleaning in closer to place her head companionably against your shoulder.\n\t\t\"Funny how some things just seem to be fated, hmm?\" \t\n\t\t\n\t\tEyes fluttering closed, you hear her breathing settle into the rhythm of a deep dreamless slumber. \n\t\t\t\n\t\tYou can't help but smile. Despite everything that's happened, it seems you'll get a chance to pick up your life where it left off. Finally a chance for a happily ever after, a lifetime spent with\n\t\t*if (sphinxfriend = \"love\")\t\n\t\t\tyour soulmate, the one you love by your side.\n\t\t*if (sphinxfriend = \"friend\")\n\t\t\tyour best friend by your side. \n\t\t*if (sphinxfriend = \"fate\")\t\n\t\t\tone who truly understand you by your side. \n\t\tThe future looks brighter already.\t\n\t\t\t\n\t\t*page_break\n\t\t\n\t\t*gosub homeending\n\n\t\t\n\t\t*set status \"Created a home in Egypt.\"\n\t\t\n\t\t*image egypteye.png center Ending: Oedipus of Egypt\n\t\t\n\t\t*achieve mortalheroes\t\t\t\t\t\t\t\t\n\t\t\t\t\t\n\t\t*goto_scene ending\n\t\t\n\t\t\n\t\t\t\n\n\t#\"Let's start anew and find a place to call home. It's a big world out there. Surely there's a place for the two of us.\"\n\t\t\"A new home for a new life,\" she muses softly,\n\t\t*if (sphinxfriend = \"love\")\n\t\t\tSnuggling closer to lay her head against your shoulder. \n\t\t*if (sphinxfriend != \"love\")\t\n\t\t\tleaning in closer to place her head companionably against your shoulder.\n\t\t\"It has a certain ring to it, does it not? I think we should go east. I've always wanted to see what lies beyond the ocean that way. But later... Much later.\"\n\t\t\t\n\t\tEyes fluttering closed, you hear her breathing settle into the rhythm of a deep dreamless slumber. \n\t\t\t\n\t\tYou can't help but smile. Despite everything that's happened, it seems you'll get that chance at what you'd once thought impossible. A happily ever after with\n\t\t*if (sphinxfriend = \"love\")\t\n\t\t\tyour soulmate, the one you love by your side. Bring on the adventures ahead.\n\t\t*if (sphinxfriend = \"friend\")\n\t\t\tyour best friend. Who better to have by your side for the adventures that lie ahead?\n\t\t*if (sphinxfriend = \"fate\")\t\n\t\t\tone who truly understand you. Who better to have by your side for the adventures that lie ahead?\n\t\t\t\n\t\t*image sphinxbeach.png center Ending: Oedipus and the Sphinx\n\n\t\t*set status \"Traveling the world with the Sphinx.\"\t\n\t\t\n\t\t*achieve mortalheroes\t\t\t\t\t\t\t\t\n\t\t\t\t\t\n\t\t*goto_scene ending\t\t\n\t\t\t\n\t\t\n\t#\"Then we've no time to lose. Let's see what's out there.\"\n\t\t\"Go exploring? Really Oedipus? I thought we were done with camping out in caves.\" You hear a hint of her old self in the complaint. \n\t\t\n\t\t\"Fine no caves. Maybe a nice hedge or field instead?\" you tease.\n\t\t\n\t\t\"You! You're impossible!\" She bats a paw at your arm with just enough force to hurt. \n\t\t\n\t\t\"Well, you asked me what I thought we should do,\" you grumble, rubbing at the rapidly forming bruise. \"Ok, ok. Enough messing around. The truth is the Pharaoh was most grateful for our part in defeating Apep. With those kind of funds at our disposal, I feel we can do better than caves for quite some time to come.\"\n\t\t\n\t\t*if (sphinxfriend = \"love\")\n\t\t\tShe snuggles closer, laying her head against your shoulder. \n\t\t*if (sphinxfriend != \"love\")\t\n\t\t\tShe leans in closer, placing her head companionably against your shoulder.\t\t\n\t\t\"Well in that case I think we should go east. I've always wanted to see what lies beyond the ocean that way. But later. Much later.\"\n\t\t\t\n\t\tEyes fluttering closed, you hear her breathing settle into the rhythm of a deep dreamless slumber. \n\t\t\t\n\t\tIt seems you have quite the journey ahead of you. What places you'll see, you can't even begin to imagine. And best of all, it'll be with \n\t\t*if (sphinxfriend = \"love\")\t\n\t\t\tyour soulmate, the one you love by your side. Bring on the adventures ahead.\n\t\t*if (sphinxfriend = \"friend\")\n\t\t\tyour best friend. Who better to have by your side for the adventures that lie ahead?\n\t\t*if (sphinxfriend = \"fate\")\t\n\t\t\tone who truly understand you. Who better to have by your side for the adventures that lie ahead?\n\t\t\t\n\t\t*image sphinxbeach.png center Ending: Oedipus and the Sphinx\n\n\t\t*set status \"Traveling the world with the Sphinx.\"\t\n\n\t\t*achieve mortalheroes\t\t\t\t\t\t\t\t\n\t\t\t\t\t\n\t\t*goto_scene ending\n\n\n\n\n\t\t\n\t\t\n*label sphinxalive\n\n*achieve bothlive\n\n\"He's not gone for good; Apep I mean,\" The Sphinx sighs looking at the blood splattered ground. \"But I doubt he'll cause any of us trouble for some time to come.\"\n\nIn the distance, you hear cheering as the remaining soldiers and priests celebrate the rising sun as the Sphinx considers her next words carefully. \"You'll be a hero if you remain here, but we could go anywhere we want. This time it's your choice, I mean it. What do you want to do?\" \n\n\n*choice\n\t#\"Are you kidding? Let's be celebrated as heroes. We've earned it after all.\"\n\t\tShe rolls her eyes, muttering about humans who crave the adoration of others, but you can see her heart isn't in it. \n\t\t\n\t\t\"Very well,\" she says more loudly. \"Let's introduce you to the royal family.\"\n\t\t\n\t\tThe small crowd of remaining soldiers and priests call out your name, flooding out to surround you both as you limp back towards camp. Despite being weary and any many injured, no one wants to stay on this cursed plane any longer than necessary. Already the camp is being packed up and horses readied. \n\t\t\n\t\t\n\t\tThe Sphinx grumbles at the preparations to leave, reclining the steadily rising sun, but not even she suggested remaining behind to rest longer. Soon your party in underway, making the slow trek back to the capital.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*text_image epilogueoedipus.png center Epilogue\n\t\t\n\t\tNews travels fast, and by the time you arrive in Memphis, your name is being chanted in the streets, while merchants sell pieces of stone carved into the Sphinx's likeness on every corner.\n\t\t\n\t\t\"They don't look anything like me,\" she grumbles in disgust, pulling you away when as you consider buying one to keep with you. \n\t\t\n\t\t*page_break\n\t\t\n\t\tThe Pharaoh greeted you with open arms, bidding you to stay as long as you wished, even insisting that you be made one of his official advisors, \n\t\t*if (generalmood != \"dislike\")\n\t\t\tan idea you suspect was suggested by General Iahmesu though he claimed ignorance on the matter. \n\t\t*if (generalmood != \"dislike\")\n\t\t\tmuch to the disgruntlement of General Iahmesu, who despite your deeds seemed keen for you to move on as quickly as possible. \n\t\t\n\t\tThe Sphinx on her part seemed content as her position of honoured guest, and although she shied away from the mention of monuments being built in her honour, you noticed she didn't refuse the jewellery frequently left at her door as gifts. \n\t\t\n\t\tGradually life settled back into a more even rhythm, allowing you to both return home. Though you frequently visited the city on behest of the Pharaoh as your position as a trusted advisor, the Sphinx declined, preferring the relative solitude of your home above the valley.\n\t\t\n\t\tFinding purpose and contentment in your new life, you can't help but reflect perhaps it was fate after all which brought you to this place. The ills of the past left far behind, now you can look forward to a lifetime spent with\n\t\t*if (sphinxfriend = \"love\")\t\n\t\t\tyour soulmate, the one you love by your side.\n\t\t*if (sphinxfriend = \"friend\")\n\t\t\tyour best friend by your side. \n\t\t*if (sphinxfriend = \"fate\")\t\n\t\t\tone who truly understand you by your side.\n\t\t\n\t\t*set status \"Hero of Egypt.\"\n\t\t\n\t\t\n\t\t\n\t\t*image Eye.png center Ending: Oedipus and the Sphinx- Heroes of Egypt\n\t\t\n\t\t*goto heroegyptend\n\t\n\t\n\t#\"You said once that you'd never felt more welcome than here in Egypt. Let's go home.\"\n\t\t\"I was hoping you'd say that.\" She smiles softly. \"What about the Pharaoh? Shouldn't we return to Memphis first?\"\n\t\t\n\t\t*fake_choice\n\t\t\t#\"I doubt he'll take any offence. After all, we did just help prevent the god of chaos from raging across Egypt.\"\n\t\t\t\t\"Whatever you say,\" she replies obviously too tired to argue. \"He knows where we are should he wish to find us anyway.\"\t\t\t\n\t\t\t\n\t\t\t#\"Fine, we'll make an appearance there, and then head for home.\"\n\t\t\t\t\"It might be best,\" she replies tiredly. \"Besides, the city is closer and I could use a few days rest in a comfortable bed, with good food, maybe even a goat or two...\"\n\t\t\t\t\n\t\t\t\tHer voice falls to a barely audible murmur as she continues to describe all the things she expects once you reach the city. \n\t\t\n\t\tAs the remaining priests and soldiers run towards the two of you calling your names, you can't help but reflect that it was surely fate after all which brought you to this place. Free from your prior life, you've finally got the chance to live happily ever after, a lifetime spent with\n\t\t*if (sphinxfriend = \"love\")\t\n\t\t\tyour soulmate, the one you love by your side.\n\t\t*if (sphinxfriend = \"friend\")\n\t\t\tyour best friend by your side. \n\t\t*if (sphinxfriend = \"fate\")\t\n\t\t\tone who truly understand you by your side.\n\t\tYou allow the small crowd to sweep you back towards the camp. \n\t\t\n\t\t*page_break\n\t\t\n\t\t*text_image epilogueoedipus.png center Epilogue\n\t\t\n\t\t*gosub homeending\n\t\t\n\t\t\n\t\t\n\t\t*set status \"Created a home in Egypt.\"\n\t\t\n\t\t*image egypteye.png center Ending: Oedipus of Egypt\n\t\t\t\t\n\t\t*goto heroegyptend\n\t\t\n\t#\"You're right, we could go anywhere we want to. Let's see the world.\"\n\t\t\"No caves,\" she growls sternly. \"Or sleeping under hedges, or in the middle of fields.\"\n\t\t\n\t\t\"Hey, I thought you said I get to choose,\" you tease. \"I thought that was all part of the adventure.\"\n\t\t\n\t\tShe bats at your arm, wincing as if the gesture hurt her more than it hurt you. \n\t\t\n\t\t\"I'm sure we will be well compensated for our part in this affair. I'm sure we will be able to afford better accommodation than caves for some time to come.\" Her tone is only half joking. She always did hate caves.\n\t\t\n\t\t\"Fine,\" you relent playfully. \"Which way shall we go?\"\n\t\t\n\t\t\"East,\" She replies with certainty. \"I've always wanted to see what lies beyond the ocean that way.\" \n\t\t\n\t\t\"But later... much later,\" she adds limping towards the camp. \"First let's take advantage of the Pharaoh's good graces and rest up, ok?\"\n\t\t\n\t\tExhaustion creeping in, it's hard to disagree.\t\t\n\t\t\t\t\n\t\tAs you follow her back towards the camp, you can't help but smile. Despite everything that's happened, it seems you'll get that chance at what you'd once thought impossible. A happily ever after with\n\t\t*if (sphinxfriend = \"love\")\t\n\t\t\tyour soulmate, the one you love by your side. Bring on the adventures ahead.\n\t\t*if (sphinxfriend = \"friend\")\n\t\t\tyour best friend. Who better to have by your side for the adventures that lie ahead?\n\t\t*if (sphinxfriend = \"fate\")\t\n\t\t\tone who truly understand you. Who better to have by your side for the adventures that lie ahead?\n\t\t\t\n\t\t*image sphinxbeach.png center Ending: Oedipus and the Sphinx\n\t\t\n\t\t*set status \"Traveling the world with the Sphinx.\"\n\t\t\n\t\t*goto heroegyptend\n\n*label heroegyptend\t\t\n\t\t\n*achieve heroegypt\n\t\t\n*goto_scene ending\t\t\n\t\t\n\t\t\n\t\t\n*label homeending\n\t\t\nThe time had marched by with a speed that made it hard to believe it'd been five years to the day since\n*if (leaveegypt = \"no\")\n\tyour part in burying Apep beneath the ground once more. Both of you had been heralded as heroes, even having statues made in your honour. Though she grumbled at times about the fuss, you suspect deep down she was silently pleased by the attention. Still, after a time, life had settled into its previous rhythm more or less. \n*if (leaveegypt != \"no\")\t\n\tthe Sphinx's return from the dead following Apep's defeat.\t\n\t\t\n\"You seem pensive.\" Silent as always, the Sphinx had crept up unheard from where you sit overlooking the valley; the setting sun throwing deep shadows over the red hued plain. \n\n\"Just thinking,\" you reply, content as she comes to sit beside you.\n\nShe tilts her head, regarding you with wide dark eyes. \"I know what day it is, and here I find you sitting here brooding all alone. Any regrets?\"\n\n*fake_choice\n\t#\"You know there's not, I've got everything I need right here.\"\n\t\t\"I've been happy, far happier than I ever thought possible... And I am [i]not[/i] brooding.\"\n\t\n\t\t\"Whatever you say,\" she grins mischievously. \"Come on, let's go home. You wouldn't want dinner to burn, would you?\"\n\n\t#\"Sometimes I miss my family.\"\n\t\t\"My family and I were never close.\" She tilts her head. \"Do you want to go home? Try to see them again?\"\n\t\n\t\t\"I'm not sure that I could even if I wanted to,\" you sigh. \n\t\t\n\t\t\"Well I've got a surprise that might cheer you up at least a little bit,\" she grins mischievously. \"Come on, let's go home. You wouldn't want dinner to burn, would you?\"\n\t\t\n\t\n\t#\"There are times when I miss Greece and my old life.\"\n\t\tShe tilts her head. \"I can't say I miss it much myself. Besides I could certainly never set foot in Greece again if I want to keep my hide in one piece. Do you want to return?\"\n\t\t\n\t\t\"I'm not sure that I could even if I wanted to,\" you sigh. \n\t\t\n\t\t\"Well I've got a surprise that might cheer you up at least a little bit,\" she grins mischievously. \"Come on, let's go home. You wouldn't want dinner to burn, would you?\"\n\t\t\n\n\t\t\n\"You? Cooking?\" You narrow your eyes dubiously. \n\t\t\n\"What? You're always complaining about the raw meat about the place and that turnips and beans don't taste any good unless their cooked either; not that I can understand why you try to eat the horrible things anyway.\" She rises, arching her back in a catlike stretch. \"Besides, I never said I couldn't cook, just that I've never seen the need to. I might just be persuaded to make a compromise in your case however.\"\n\t\t\n*page_break\n\t\t\n\"Well that's very thoughtful of you,\" you reply dubiously. \"What's the catch?\"\n\t\t\n\"No catch.\" She smiles with too many teeth which from experience tells you she's definitely hiding something. \n\n\"You've invited Sekhmet around again, haven't you?\" Her widening grin tells you, you've guessed correctly. \n\t\t\n*if (sphinxinjury != \"dead\")\n\tAlthough    \n*if (sphinxinjury = \"dead\")\n\tSurprisingly given everything that transpired, \nthere seems to have been no hard feelings between the Sphinx and the goddess, the two appearing to be fast friends. Still, you can't shake the feeling of being judged whenever she comes to visit. A lioness watching and waiting for any hint of weakness to be shown.\n\t\t\n\"Don't give me that expression, she likes you,\" the Sphinx replies sweetly.\n\t\t\nYou raise an eyebrow in disbelief.\n\t\t\n\"I'm serious, do you know what would happen if she didn't like you?\"\n\t\t\n\"I've got a pretty good idea,\" you reply tightly, now fully aware of her past deeds. Still your belly rumbles hungrily at the smell drifting from the house.\n\t\t\nShe laughs lightly before turning to walk back to the house, intent of getting her own way. \"Come on, if you don't hurry, there'll be nothing left.\"\n\t\t\nSome things never change, you know better than to argue. Besides, the smell of cooking food does sound good. Relenting you follow.\n\t\t\n\t\t\n*return\n\n\n*label spearchoice\n\n*fake_choice\n\t#Throw it with all your strength at the softer underside of Apep's throat.\n\t\tHefting the spear, you're aware you'll only have one shot at this. Lining it up as the monster turns his malevolent gaze back towards your way, bring back your arm and throw...\n\t\t\n\t\tThe weapon arcs through the air, bronze point winking in the pre-light of dawn. Too late Apep realises the danger as the spear lodges deeply in the underside of his jaw. \n\t\t\t\t\n\t\tScreaming, the creature thrashes his head from side to side, trying to shake the weapon loose. Dark ichor runs from the wound to fizzle where it hits the sand as you hastily back away. \n\t\t\t\t\n\t\tFinally shaking the spear free, Apep rushes towards you, jaws open wide enough to swallow you whole; skin still of the blackest night despite the bright rays of the sun lighting the sky as it crests the horizon.\n\t\t\t\t\n\t\t*page_break\n\t\t\t\t\n\n\t#Stab the spear deep into his belly. \n\t\tUsing all your strength, you stab the weapon deep into the monster's side, hanging on for dear life as Apep screams and thrashes, opening a wide gash which bleeds freely.  \n\t\t\t\t\n\t\t*set health -1\n\t\t\t\t\n\t\tThrown loose, you clamber to your feet grasping the blood slick haft of the spear tightly, the monster's caustic blood causing your hands to burn with pain. Apep slides back out of reach, warier now that you've shown yourself to be a real threat. \n\t\t\t\t\n\t\tHe faints in with strikes and sweeps of his tail, probing for a weak point as you dodge and bat away his jaws away with the tip of the\n\t\t*if (sphinxinjury = \"dead\")\n\t\t\tspear.\n\t\t*if (sphinxinjury != \"dead\")\n\t\t\tspear, while the Sphinx continues to harry him from above. \n\t\tHow long you can keep this up though, you're uncertain. With every hit, your arms become more leaden and the haft harder to hold as your hands blister from contact with the god's blood.\n\t\t\t\n\t\tFinally you see it. A glimmer of light as the sun crests the horizon.\n\t\t\t\n\t\t*page_break\n\n*return\n\t\t\n\t\t\t\t\n\t\t\t\t\n*label fightapep\n\nSomething flies past you with a whoosh, knocking you out of the way. Where you stood a moment prior is now a massive serval cat, his spotted fur gleaming with golden light. One paw grasps the hilt of a long and wickedly sharp flint knife. \n\t\t\t\t\nSeeing the exchange Apep tries to break off his strike, arching away, but it's far too late. The serval leaps, burying claws into the wyrm's flesh and thrusting the dagger home into his neck. With a cry of terror, the wyrm thrashes against the serva
