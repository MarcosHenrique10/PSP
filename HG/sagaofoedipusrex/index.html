 just in time; pulling up at the edge of the lapping water which seems to eagerly reach for your flesh. Looking around you see nothing that could be used as a weapon and no obvious means of escape. \n\nA mournful howl cuts through the air as a creature easily three times taller than yourself stalks into view. With shaggy midnight dark fur and glowing yellow eyes, the beast turns three heads your way, teeth bared in menace. \n\n[i]With a sinking heart you realise it's none other than Cerberus, guardian of the gateway of Hades' kingdom.[/i]\n\n*fake_choice\n\t#Look for a way to escape. \n\t\tYou freeze, eyes searching for a way out, or at least around the monster that advances with heavy steps through the mud. Already you can smell the fetid stench of rotting meat on his breath as he closes. \n\t\t\n\t\t[i]\"Stop that!\"[/i] a familiar feminine voice snaps. \"You'll scare him into the river and then he'll truly be lost forever.\"\n\t\n\t#Step carefully forward. Surely he'll let you pass... you think.\n\t\tOpening your hands to show you carry no weapons, you take one step forward, then another. Cerberus' heads dip low as he sniffs you from head to toe with a wet nose, almost causing you to gag at the overwhelming stench of rotting meat on his breath. \n\t\t\n\t\t[i]\"Stop that!\"[/i] a familiar feminine voice snaps. \"You've looked him over and know full well who he is. Now stop trying to scare him the rest of the way into death and leave him be.\"\n\t\n\t#Though you have no weapon, you'll not go down without a fight. \n\t\t*achieve respect\n\t\tBringing your fists up, you carefully shuffle sideways to put some distance between yourself and the deadly waters of the river. At least this will give you somewhat of a chance... however slim that may be... against the guardian of the underworld. \n\t\t\n\t\tOne of the heads yips in amusement, as another turns to rumble something towards the cave beyond. \n\t\t\n\t\t\"He says he understands why I like you now,\" a familiar feminine voice laughs. \"Says you have far more spirit than most mortals who pass this way.\"\n\n\"${sphinxname}?\" you whisper, unsure if you can believe your own ears, or if you have started to become as delusional as some of the shades that had made it back from the horrors lurking in the darkness. \"Is that really you?\"\n\nYour friend steps into the flickering torchlight, a nervous smile on her lips. \"Of course. Do you really think I'd leave you to [i]their[/i] mercies? The gods of this place will not be kind to you Oedipus. Do you remember the Furies? I can assure you that [i]they[/i] remember you. I believe they would very much like to finish what they once started on the road above Thebes.\"\n\n\"But how...?\" you trail off, mind still racing to catch up. \n\n\"Oh, of course! Silly me I forgot the introductions. Oedipus, meet my uncle Cerberus.\" She gestures towards the giant hound who dips a head in acknowledgement. \n\n\n*fake_choice\n\t#[i]\"Uncle???[/i]\n\t\t\"Why of course. Didn't you know? I guess we're not so alike really, I can guess why you may not have immediately seen the family resemblance.\" Her eyes glimmer with mirth. \n\t\t\n\t\tThe hound turns and rumbles something towards the Sphinx and she grimaces.\n\t#\"Nice to ah... meet you Cerberus.\"\n\t\tHis eyes shine golden and impassive, before turning to rumble something towards the Sphinx. \n\t\t\n\t\tShe grimaces.\n\t#Nod back in greeting. \n\t\tHis tilts a head slightly, eyes shining golden and impassive before turning to rumble something to the Sphinx. \n\t\t\n\t\tShe grimaces in response.\n\"You're right of course uncle. Oedipus, we've really no time to waste. Cerberus will help us, but we must not be caught here. We need to leave, and quickly, if we've any chance to leave the underworld in one piece.\"\n\n\n*fake_choice\n\t#\"Lead the way!\"\n\t\tShe races down the muddy beach, your spectral feet easily keeping pace with her flight. \n\t\t\n\t\t\"In here,\" she whispers, gesturing towards the wall of the cavern. \n\t\t\n\t\tYou move closer to the rockface, realising that what you'd taken for nothing more than a shadow is in fact a slender crevice leading deep into the earth. \n\t\t\n\t\tTurning sideways to squeeze inside the narrow tunnel, your companion follows a bit more awkwardly, cursing as wings and claws catch on the on the jagged edges of the rocks. \n\n\t\t\"Thank you uncle. I owe you a debt,\" she calls back towards the entrance. \n\t\t\n\t\tCerberus growls something unintelligible in response, then with a swipe of his paw the tunnel entrance rumbles closed with the sound of grating stone.\n\n\t#\"But I think I'm... well dead aren't I? Even if you can get me free of here, what will become of me?\"\n\t\t\"Your death can be... remedied, but we need to hurry,\" she replies, eyes searching the darkness for any sign of movement. \n\t\t\n\t\t\"You can fix [i]death?!\"[/i] you exclaim incredulously.\n\t\t\n\t\t\"Well you're not dead... well you are. But not dead-dead. Not [i]finally[/i] dead as it were. Not until you go through that gate anyway.\" She looks towards the arched entrance of the cavern from which Cerberus had emerged. \"Look, it's complicated and I don't pretend to completely understand it all. Not my department you see. I'm better at ending people's lives. I don't generally worry myself with what happens beyond that. If we're found here though, it'll not bode well for any of us. Come [i]on!\"[/i]\n\t\t\n\t\tShe drags you down the beach to a slender crevice in the rocks that from a distance appeared to be nothing more than a shadow. Pushing you inside the narrow opening, she turns once more to the hound standing guard. \"Thank you uncle. I owe you a debt.\"\n\n\t\tCerberus growls something unintelligible, then with the sound of grating rocks the tunnel entrance snaps shut. \n\t\t\n\t\t\n\t\n\t#\"Shouldn't I stay here? I mean I did die, this is where I am supposed to end up isn't it?\"\n\t\tHer look turns strained. \"Don't be a fool Oedipus. You have no idea what they have planned for you. Anything you've seen in the underworld to date will be a picnic by comparison. Besides, I can't help you once you pass though that gate, it'll be all over for both of us. We have to go [i]now.\"[/i]\n\n\t\tHer voice is sincere and full of desperation. She's telling you the truth as she knows it. You shiver remembering the time you spent on the banks of the River Styx. At the time you'd not been able to think of any fate worse than that soul destroying wait for oblivion. What could be more horrible than that? Your mind flicks back to terrifying goddesses emerging from behind Athena's throne and you shiver involuntarily. Yes, perhaps you've been mistaken. Things could definitely become far, far more unpleasant if that's what awaits you in the lands beyond. \n\t\t\n\t\t*page_break\n\t\t\n\t\t\"Come on!\" The Sphinx tugs at your shirt, while Cerberus snarls darkly at the delay. \n\t\t\n\t\tIn one smooth movement the hound snatches you up in his jaws, galloping along the bank before spitting you onto the sand in a pool of foul smelling saliva. He growls low in the back of his throat, hackles raised in menace while the Sphinx races down the beach to catch up. \n\t\t\n\t\t\"There. The decision's made. He'll not let you pass. There's only one way forward now,\" she pants, sliding to a stop beside you. [i]\"Move!\"[/i]\n\n\t\tFor effect, Cerberus snatches at your wrist pressing down firmly, before flinging you towards the cavern wall. Numb for so long, the sudden pain is shocking.\n\t\t\n\t\tWith a sigh, the Sphinx drags you into a hidden crevice, and you hear the harsh grating of stone as the entrance seals shut behind you.  \n\t\t\n\t\n\n*page_break\n\nNow in total darkness, your hands reach out to touch the unevenly hewn walls, blind to whatever is ahead. Though no longer breathing yourself, the sound of your companion's breath echoes loudly in the otherwise claustrophobic silence.\n\n\"Sphinx...\"\tyou quaver, feeling like you've just been entombed.\n\n\"Wait. Just be still a moment.\" Her voice is surprisingly calm and the warmth of her body comforting as she edges closer to press against your side.  \n\nSlowly points of light flicker to life, glowing softly in shades of blue and green. The illumination is faint, but any light is welcome after the total darkness of before... Queasily you notice the lights are not still, moving of their own accord as the slither within the walls. \n\n*page_break\n\n\"Sphinx? What is giving off that light. Is it... alive?\"\n\n\"Hmm? Well I don't rightly know much about them, save they appear to illuminate the dark places in the underworld when needed.\" She pauses for a moment. \"I've never heard of them causing anyone harm, but then again I've never travelled these ways with a shade before either. I'd advise against letting them touch your skin... just in case.\"\n\nQuickly you snatch your hand from the stone where a glowing strand of blue is creeping through the earth as if attracted to your touch. Ahead, the tunnel widens enough that you can stand without hunching over, and the Sphinx moves forward to walk at your side rather than trailing behind.  \n\n\"The tunnel should begin to ascend soon,\" she volunteers in a strained voice. \"It's hard to say when, these side paths are not set and they tend to move about a bit of their own accord.\"\n\n*fake_choice\n\t#\"Are you sure you know where you're going?\"\n\t\t\"As sure as anyone can be in this place.\" She gives you a smile, but there's a tentative edge to it that has you more than a little concerned. Still, with the way behind shut, your only option is to continue onward.\n\t\t\n\t#\"I hope we can leave the tunnels soon. Being enclosed like this makes me nervous.\"\n\t\t\"I don't like it either,\" your companion replies in agreement, shivering slightly. \"But it's the safest way to pass through Hades' kingdom. We'd not get two steps though my uncle's gate without being noticed otherwise.\"\n\t\t\n\t#\"Whatever happens, thank you for coming to get me.\"\n\t\tYou catch a ghost of a smile in the darkness. \"You can thank me when we're out of here safely.\"\n\t\t\n\nYou trudge forward a bit further in silence, before she turns to face you, eyes glowing softly in the dim light. \"Our path's end is just up ahead, I can sense it.\"  \n\nYour eyes search the darkness in vain, seeing nothing but solid rock.\n\n\"Before we go out there, I want you to know whatever happens I regret nothing.\" Gone is any hint of the sarcasm or snarkiness that often colours her words. \"Do you realise you're one of the few people to ever treat me with kindness? To see me as more as just a monster? I would have gone into the depths of Tartarus itself to get you back... though if I'm honest, I'm hoping it doesn't come to that.\"\n\n*page_break\n\nShe blinks away tears, forestalling your reply. \"We need move fast once we leave the hidden pathways. If your disappearance hasn't been noticed yet, it will be soon and they will begin to hunt for us. Past this wall, you must seek the mountain path ending in an arch that shines with silver. Then [i]Run.[/i] Run as if your life depends on it as I can assure you it does. Don't stop for anything, regardless of what you see. I'll be right by your side even if it seems I am not, I promise you that. Now [i]go!\"[/i]\n\nShe pushes you forward roughly, knocking you off balance. As you reach for the wall of the tunnel to stop your fall, your hands pass through it as if made of smoke, causing you to stumble into a desolate field where nothing but sickly yellow grasses struggle to grow in the dust. Above, the sky spins in a myriad of colours, causing you to clutch at your stomach queasily. Forcing your eyes away from the dizzying spectacle, you focus instead on a castle far in the distance. It rises menacingly above the plain with jagged spires tipped with silver. Above circles several large [i]somethings,[/i] that shift in shape like flickering shadows as they fly filling you with unease. Turning away from the scene in a slow circle, you can find no sign of the tunnel entrance, nor of the Sphinx. It seems you are alone. \n\n*page_break\n\n[i]The mountain path Oedipus. Run![/i]\n\nThe words echo in your mind, whether a memory or truly a whisper from the Sphinx you have no way of knowing, but being caught out in the open in this place seems like a bad idea regardless. Feeling like you're wading through water rather than air, you step into motion, gasping with the effort of each step as you make your way towards the rocky path leading into the hills. As you forge onward, you look for the Sphinx, but she does not appear. Could she have left without you? Or is she trapped somewhere below?\n\nResolutely you continue on, placing one foot after another while an unearthly wind picks up, whispering what you fear most in your ears… \n\n*choice\n\t#You've been abandoned. \n\t\t*set wind \"alone\"\n\t\t[i]That's right.[/i] The wind hisses. [i]Everyone always leaves you. No one loves you. No one wants you. Even as a baby you were cast out. Why should now be any different? Bringing you to this place was nothing but a trick. One to buoy up your hopes, only to dash them. It is to be your punishment in the afterlife. You will be made to suffer, your spirit broken down until nothing is left but the emptiness you held in life. This is what happens to those who die with no one to mourn for them...[/i]\n\t\t\n\t\tYour steps slow as the wind screams its sinister message, stripping the will to continue from your soul. \n\t\t\n\t\tDesperately you clamp your hands over your ears, trying to shut out the sound. \"No. That's not true. My parents may have cast me out... but Amyntas? He cared enough to save me. And my adoptive parents always loved me as if I was their own child.\" \n\t\t\n\t\t[i]Yet you left them. They took you in and loved you, yet you left without a word of goodbye,[/i] the wind hisses in return. [i]Why would they love one that betrayed them so? Your father, he died when you were away. Why do you suppose that happened? Maybe you caused his heart to break when he thought you were dead? What would he say if you were to see him again?[/i]\n\t\t\n\t\t\"I had no choice...\" you grit your teeth, blinking away tears. \"They would understand why I had to go. I thought I was saving him. He would understand...\"\n\t\t\n\t\tThe wind shimmers with laughter. [i]Poor Oedipus, so deluded. Even now you think that your Sphinx is waiting for you beyond the gate. You're so certain that she isn't still working for the gods. So convinced that she didn't bring you here on their behest to be punished for your transgressions.[/i]\n\t\t\n\t\tThe words hit like a punch to your stomach. It couldn't be true... could it?\n\t\t\n\t\t*fake_choice\n\t\t\t#You trust the Sphinx. She'd never do such a thing. \n\t\t\t\t\"No,\" you repeat firmly. \"You twist everything into lies. I'll listen no more.\"\n\t\t\t\t\n\t\t\t\tBlocking out the screams of the wind as best you can, you forge onwards towards the arch that gleams silver beneath the swirling night sky. Without looking back, you step through into the nothingness beyond. \n\t\t\t\t\n\t\t\t#Hesitate.\n\t\t\t\t*set hesitatearch \"yes\"\n\t\t\t\t[i]That's right,[/i] the wind hisses as you sink to the ground, strength fading. [i]Give up now. Why continue to put yourself through unnecessary pain? There's no hope for you. The sooner you accept your fate, the easier it will be.[/i]\n\t\t\t\t\n\t\t\t\tThe wind strips what's left of the warmth remaining in your soul, leaving a numbness that is almost welcome. Head touching the frozen ground, a voice yells desperately to be heard as if screamed from far away. \n\t\t\t\t\n\t\t\t\t\"Get up Oedipus. You can't let it end like this!\"\n\t\t\t\t\n\t\t\t\t\"Sphinx?\" you murmur desolately. \"They said you were gone. That you'd left me here to be punished.\"\n\t\t\t\t\n\t\t\t\t\"Fool mortal. I said I'd not leave you, but this is something you must do on your own. I cannot drag you through the archway, you must walk there yourself. Now get up!\"\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tThe wind has stolen the strength from your body, and you wobble and sway as it buffets you from all sides. Climbing unsteadily to your feet, you manage to stagger the last few steps, before collapsing forward into the shimmering haze beneath the gleaming archway.\n\t\t\n\t\t\n\t\t*goto arch\n\t\t\n\t\t\n\t\t\t\t\n\t\n\t#You're leaving behind a true friend in the underworld. \n\t\t*set wind \"friend\"\n\t\tThe wind hisses and curls around your body with fingers of ice. [i]Where is your loyalty Oedipus? Would you abandon the one who is risking her life to free you from this place? How cowardly... How faithless... How will you ever live with yourself knowing what you've done?[/i]\n\t\t\n\t\tYou shiver as the words hit home, slowing your steps as you glance around uncertainly. Her last words were that she'd never leave you, but was that really the truth? Could she have lied on purpose to convince you to leave willingly without her, or perhaps something went awry with her plans? The trail is empty but for yourself and the wind that whistles its sinister message, filling you with doubt. \n\t\t\n\t\t[i]Ah, now he gets it,[/i] the wind chuckles. [i]So slow to figure these things out Oedipus! But then again she was always so very clever, so good at deception. I still don't understand what she saw in you mortal. I guess there must have seen something for her to willingly exchange her life for yours. What do you think? Is your life worth more than hers?[/i]\n\t\t\n\t\t\"W-What?!\" you stammer in alarm.\n\t\t\n\t\t[i]A life for a life. A death for a death. All must be in balance, that is the way of the world,[/i] the wind sings in its whispering tones. \n\t\t\n\t\t\n\t\t*fake_choice\n\t\t\t#Trust that the Sphinx told you the truth and continue on. \n\t\t\t\t\"No,\" you repeat firmly. \"You're lying.\"\n\t\t\t\t\n\t\t\t\t[i]You think that telling yourself that will make the truth any easier to bear once you reach the surface and find yourself alone once more? It is too late once you step through the gate, none may walk through it twice. I am trying to help you Oedipus. Turn back while you still can, turn back or live with the consequences.[/i] \n\t\t\t\t\n\t\t\t\tYou step forward, blocking out the sound of the wind as best you can as it continues to howl in your ears, and tries to topple you into the unseen depths that fall away from the side of the trail. \n\t\t\t\t\n\t\t\t\t\"It's lying... It's lying... It's lying...\" you repeat the mantra over and over, struggling towards the arch that gleams silver beneath the swirling night sky. Reaching the threshold, you pause for a moment, then step through without looking back. \n\t\t\t\t\n\t\t\t#Hesitate. Would she really have sacrificed herself like that?\n\t\t\t\t*set hesitatearch \"yes\"\n\t\t\t\t[i]That's right,[/i] the wind hisses as you sink to the ground, strength fading. [i]Both of you are doomed now... And it's all your fault.[/i]\n\t\t\t\t\n\t\t\t\tYou start to struggle back down the trail, while the wind strips what warmth is left in your soul leaving a numbness that is almost welcome. Falling, your head sinks to the frozen ground where a voice echoes faintly; screaming as if desperate to be heard from somewhere far away. \n\t\t\t\t\n\t\t\t\t\"Get up Oedipus. You can't let it end like this!\"\n\t\t\t\t\n\t\t\t\t\"Sphinx?\" you murmur desolately. \"I'm so sorry. I tried to find you, but I failed.\"\n\t\t\t\t\n\t\t\t\t\"Fool mortal. I told you to leave through the gate. No hesitations, no second thoughts. Why are you still here?\"\n\t\t\t\t\n\t\t\t\t\"But I can't leave you here,\" you murmur. \"I... I have to find you... save you...\"\n\t\t\t\t\n\t\t\t\t\"Oedipus,\" the voice is gentler now. \"You must trust me now. The only way we'll see each other again is if you get up and walk. Now go!\"\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tThe wind has stolen the strength from your body, and you wobble and sway as it buffets you from all sides. Climbing unsteadily to your feet, you manage to stagger the back up the mountainside, before collapsing forward into the shimmering haze beneath the gleaming archway.\n\t\t\t\t\n\t\t*goto arch\n\t\t\n\t\t\n\t\t\n\t\n\t#You'll never achieve anything of worth in your life. \n\t\t*set wind \"worthy\"\n\t\t[i]That's right,[/i] The wind hisses. [i]You've been cursed since before your birth. You'll never do anything right. Never do anything of worth. You might as well give up now and stop fighting the inevitable.[/i]\n\t\t\n\t\tYou shiver as the words hit home, slowing your steps.\n\t\t\n\t\t[i]Why continue to struggle? It'll only cause you more pain.[/i] The wind whispers. [i]No one escapes the will of the gods. For once in your life, accept your fate and remain here. Perhaps by accepting your punishment you may actually do something right. Achieve something, however small and insignificant that may be.[/i]\n\t\t\n\t\t\"B-But Athena, she absolved me. She gave me another chance to make things right. She believed in me,\" you stammer as the wind numbs you to your core. \n\t\t\n\t\t[i]Hah! And look what happened. Dead by a snake bite. No heroic deeds for Oedipus. How disappointed she must be to have put her faith in you. How disappointed all the gods are.[/i]\n\t\t\n\t\t*fake_choice\n\t\t\t#\"No! That's not true.\"\n\t\t\t\t\"I've lived my life as well as I could, better than most under the circumstances. There is nothing for me to be ashamed about,\" you growl, gritting your teeth against the cold. \"You are a test, nothing more. I will not allow you to prevent me from leaving!\"\n\t\t\t\t\n\t\t\t\tBlocking out the screams of the wind as best you can, you forge onwards towards the arch that gleams silver beneath the swirling night sky. Without looking back, you plunge through into nothingness. \t\t\n\t\t\t\n\t\t\t#Hesitate.\n\t\t\t\t*set hesitatearch \"yes\"\n\t\t\t\t[i]That's right,[/i] the wind hisses as you sink to the ground, strength fading. [i]You might as well give up now. You are useless, worthless. Why continue to fight against the inevitable? There will never be any redemption for you.[/i]\n\t\t\t\t\n\t\t\t\tThe wind strips what warmth was left in your soul, leaving a numbness that is almost welcome. Head touching the frozen ground a voice echoes faintly as if screaming from somewhere far away, desperate to be heard.\n\t\t\t\t\n\t\t\t\t\"Get up Oedipus. You can't let it end like this!\"\n\t\t\t\t\n\t\t\t\t\"Sphinx?\" you murmur desolately. \"Leave me here.\"\n\t\t\t\t\n\t\t\t\t\"Fool mortal. I said I'd never leave you and I will not now, but this is something you must do on your own. I cannot drag you through the archway, you must walk there yourself. You're stronger than the wind's lies. I know you are if you can only believe in yourself. Now get up!\"\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tThe wind has stolen the strength from your body, and you wobble and sway as it buffets you from all sides. Climbing unsteadily to your feet, you manage to stagger the last few steps, before collapsing forward into the shimmering haze beneath the gleaming archway\n\t\t\n\t\t*goto arch\n\n\n\t\n\t\n\n \n\n*label arch\n*page_break\n\n*text_image epilogueoedipus.png center Epilogue\n\n*set oedipusdead \"no\"\n*set health 3\n*set status \"Living beyond the known world with the Sphinx.\"\n\nYou awaken with a pounding head, limbs feeling strangely heavy as if filled with lead as you crawl into a sitting position. Shading your eyes from the bright yellow light of the sun you'd never thought to see again, you blink blearily with eyes that feel gritty and dry. Though every breath hurts and your body feels as if it has been twisted and battered; somehow, you've never felt so alive. Closing your eyes, you breathe in the sweet fresh air that carries the scent of flowers and rain, feeling the sun bringing warmth into your too pale skin. \n\n\"Oedipus?\" ${sphinxname}'s voice quavers as she pads into the clearing, her golden coat dappled with shade from the leaves above. \"You're really here. I was so worried when it caught you, I swear I would have helped if I could... But as one of the dead, only you could pass through the archway and bring life back to your body once more. If I had walked beside you, it surely would have ended us both.\"\n\n*choice\n\t#\"I know you did everything you could. It's all going to be alright now... Isn't it?\"\n\t\tShe hesitates, then nods once slowly. \"Yes. We are far beyond their reach now.\"\n\t\t\n\t\t*goto forest\n\t\n\t#\"I am capable of taking care of myself you know. You aren't responsible for everything that happens to me.\"\n\t\tShe turns her glance to the ground. \"I know you can. But I was the one leading you out. I should have anticipated they would set a guardian, even though they couldn't have known you'd be able to make it that far undetected.\n\t\t\n\t\t*goto forest\n\t\n\t*if (hesitatearch = \"yes\") #\"You helped. I heard you. It's what got me though.\"\n\t\tShe gives you a faint smile, that twists into a frown. \"I swear I didn't know the guardian would be there. The alarm must have been raised sooner than I expected. I still don't fully understand why it was placed there though. Surely no one could have anticipated you making it so far undetected without help.\"\n\t\t\n\t\t*goto forest\n\t\n\t*if (hesitatearch != \"yes\") #\"You warned me what to expect. It's all you could have done. It was enough.\"\n\t\tShe gives you a faint smile that twists into a frown. \"I swear I didn't know the guardian would be there. Someone must have realised something was amiss with your arrival and alerted it. I still don't fully understand why it was there though. Surely no one could have anticipated you making it so far undetected without help.\"\n\t\t\n\t\t*goto forest\n\t\n\t#\"I wish you had warned me that thing was out there. I almost didn't make it.\"\n\t\t\"I didn't know it would be there,\" she replies miserably. \"I was hoping we'd sneak you out of the underworld well before anyone realised you were gone.\"\n\n\t\t*goto forest\n\n*label forest\n\t\t\n\"What was that thing?\" You shiver remembering the wind that seemed to know the terrors of your soul. \n\n\"It said  \n*if (wind = \"alone\")\t\n\tthat no one would ever... And that I...\" Your voice catches in your throat, as you recall the harsh words that mirrored your worst fears. \n\t\n\tThe Sphinx pads over, laying a comforting paw on your shoulder. \n\t\n\t\"You must not heed its words and put those thoughts from your mind. It is a guardian whose task is to prevent any from leaving the lands of the dead. It preys on loss and pain and is not beyond twisting the truth until unrecognisable if it serves that purpose. Remember that Oedipus, it lies. I am here as promised am I not? It lied to you.\"\n*if (wind = \"friend\")\t\n\tthat your death would pay for my life... That I was to blame...\" Your voice catches in your throat, as you recall the harsh words uttered that seemed to confirm your worst fears.\n\t\n\tThe Sphinx pads over, laying a comforting paw on your shoulder. \n\t\n\t\"You must not heed its words and put those thoughts from your mind. It is a guardian whose task is to prevent any from leaving the lands of the dead. It preys on loss and pain and is not beyond twisting the truth until unrecognisable if it serves that purpose. Do I look dead to you? It was I who told you to run for the arch, to do otherwise would have doomed us both. You have nothing to regret, nothing I would condemn you for. It lied to you Oedipus, that's what it does. Remember that.\"\n*if (wind = \"worthy\")\n\tthat I had no purpose, no hope of redemption.\" The words come out in a rush. \"That the gods would never find me fit to do anything but die worthless and unremembered.\"\n\t\n\tThe Sphinx pads over, laying a comforting paw on your shoulder. \n\t\n\t\"That is not true and you know it Oedipus. There are few who have walked this earth that could convince Athena of their worth. You're more special than you know.\" She sighs. \"Besides, you're important to me. Why else do you think I just risked my life to get you out of the underworld? So don't let me hear you say again that you are giving up on living any time soon. Alright? \n\n\t\nYou take a deep breath trying to settle your nerves.\n*fake_choice\n\t#Though she may be right, you won't find it so easy to dismiss the wounds the creature opened in your soul so easily.\n\t\n\t#You wish you could believe that everything it told you were lies, but some of the wind's words held a grain of truth that weighs heavily in your heart. \n\t\n\t#You nod, she is wise in her council. It's best to dismiss everything it said.\n\t\n\t#Here in the sunlight, the horrors of the underworld are slipping away. It's hard to believe you ever even considered the wind's words to be true.\n\t\n\t\n\t\n\"Come on.\" She gives you a nudge with her head. \"Are you strong enough to walk? There's something I'd like you to see.\"\n\nWeakly you get to your feet, resting a hand on the Sphinx's tawny shoulder for balance. \n\n\"You'll survive,\" she decides, after looking you up and down critically. \"Not every day someone manages to claw their way out of the underworld. I'd imagine it'll take you time to adjust.\"\n\n*page_break\n\nLeading you out from under the canopy, you stand on a pebbled beach. A calm aquamarine ocean laps at your bare feet stretching away into a horizon dotted with jagged peaked islands. Strange birds call from the trees, while iridescent dragonflies buzz lazily in the heat. It is all at once beautiful, and utterly unfamiliar. \n\n\"Where are we?\" you breathe. \n\n\"Safe,\" she replies with a satisfied smile. \"You deserve the life of peace you wished for and we can have that here. I've taken us somewhere that few from Greece have ever ventured, and certainly far beyond the reach of those in Olympus. Let them guess at what happened and weave whatever stories about us they wish to tell, it no longer matters. There's a whole new world out here just waiting for us Oedipus. Here we can have a future that is truly our own.  \t\n\n\t\n*achieve sphinxending\t\t\n\n*image sphinxbeach.png center Ending: Oedipus and the Sphinx\t\n\n*goto_scene ending\t\n\t\n\n\t\n\t\t\n\n\t\t\n\n\n\n\n\n  \n\n\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n*script changeBackgroundColor(\"sepia\")\n\n*comment variables\n*set status \"A baby rejected by his own parents.\"\n*set health 5\n*set healthstat \"Excellent\"\n*set sword \"None.\"\n*set temprementtxt \"\"\n*set temperament \"\"\n*set coins 0\n*set extracloak \"\"\n*set colourcloak \"\"\n*set travel \"\"\n*set letter \"\"\n\n\n\n*comment page 1\n\n*image sphinx.png center\n\n\t\t\n*text_image sagatitle.png center The Saga Of Oedipus Rex\t\n\n\n\n[b]Foreword[/b]\n\nThe Saga of Oedipus Rex is based in part on the ancient Greek tragedy written by Sophocles in about 429 BC. Do you wish to experience the story following the path originally written? Or have the opportunity to escape the fate laid out by the Gods?\n\n\n*fake_choice\n\t#[b]The Tragedy of Oedipus Rex:[/b] I would like to play the story as defined by the original Greek tragedy. \n\t\t\n\t\n\t#[b]The Fate of Oedipus:[/b] I want greater freedom of choice in my decisions.\n\n\n*script changeBackgroundColor(\"black\")\n\n\n*comment page 2\n\n*set travel \"yes\"\n*set sword \"Sword.\"\n*set coins 5\n*set status \"Heir to the throne of Corinth.\" \n*set health 4\n*set healthstat \"Good\"\n\n\n\"Greetings Prince Oedipus. Please come forward and ask your question of me. Should the omens be favourable, perhaps an answer will be forthcoming.\"\n\t\nAdvancing a few steps, you enter the darkened room to stand before the Oracle. With quiet footsteps your guide follows, closing the heavy doors behind you with a heavy clunk. \n\t\n\"Now then young man, what will you ask? Nothing you say will leave this room unless you choose make it so.\" \n\t\nShe removes her veil, revealing the age worn features of one who has spent many years in the sun. Despite her lined face, her blue eyes are bright and clear; carrying a focus that seems to see straight to your soul.\n\t\n*fake_choice\n\t#\"I need to know who my real parents are. There have been... rumours that I am not really Polybus and Merope's son.\"\n\t\t\n\t\n\t#\"I wish to know how I can quell the rumours that speak as if I am not heir to Corinth's throne.\"\n\t\t\n\t\t\n\t#\"I ask your wisdom. Surely you know what troubles my soul?\"\n\t\n\t\n*script changeBackgroundColor(\"sepia\")\n\t\n\n\t\n*comment page 3\n\n*set coins 12\n*set health 3\n*set healthstat \"Weakened\"\t\n*set extracloak \"yes\"\n*set colourcloak \"black\"\n*set letter \"\"\n*set temprementtxt \"Temperament:\"\n*set temperament \"Unknown.\"\n*set status \"A self-exiled prince in search of answers.\"\n*set travel \"yes\"\n*set sword \"Sword.\"\n\n\n\n\t\nThe fallen chariot driver ignores your response, launching himself at you with a roar. As he flies towards you with his spear swinging, you lift your own weapon to meet it. The impact of your blade on the wooden haft jars your arm, but the spear holds, remaining unbroken. \n\t\t\nYour attacker backs away, red faced with anger. He wipes at the blood that drips down his face into his eyes and thick brown beard. With a yell, he attacks again. This time he means to finish you off.\n\t\n*fake_choice\n\t#Defend yourself, trying only to make him back off. \n\n\t\t\t\n\t#Attack straight back. If he wants a fight, I'll give him one. \n\t\n\t\n\t\n*comment page 4\n\n*set coins 3\n*set health 2\n*set healthstat \"Poor\"\t\n*set extracloak \"yes\"\n*set colourcloak \"green\"\n*set letter \"A letter of recommendation from Aristaeus.\"\n*set status \"A self-exiled prince in search of answers.\"\n*set travel \"yes\"\n*set sword \"Sword.\"\n\n\n\nA healer dressed in white robes meets you at the doorway carved with snake curling around a staff. He raises an eyebrow at the snake curled around your neck and chuckles softly. \"Most people do not find our scaly residents so appealing, though we only keep harmless ones in the centre. Be welcome in the temple of Asclepius. My name is Galen, do you seek healing?\"\n\nAt your nod, he motions you inside. \n\n\"The first step is to determine your temperament in order to tailor our medicine. Each person's balance of humors is unique, with a predominance of one over the other four as I'm sure you well know. May I ask you some questions?\"\n\n\n*fake_choice\n\t#Answer Galen's questions. \n\t\t\n\t\n\t#Tell him you already know your temperament. \n\t\n\t\t\n\t\n\t\n\t\n*comment page 5\n\n*set extracloak \"\"\n*set colourcloak \"\"\n*set coins 6\n*set status \"A self-exiled prince in search of answers.\"\n*set health 4\n*set healthstat \"Good\"\n*set temprementtxt \"Temperament:\"\n*set temperament \"Sanguine (Air).\"\n*set map \"map\"\n*set travel \"yes\"\n*set sword \"Sword.\"\n\n\n\"I see you understand,\" she almost purrs. \"Well I say we get started. I'm going to ask you two questions and you have three chances to answer each correctly. And when you fail... [i]You're mine.\"[/i]\n\nThe Sphinx laughs as if discussing a celebration to be planned. \"Cheer up Oedipus, I'm going to let you choose. Do you like the old or the new?\"\n\n\"The old or the new what?\" you reply cautiously. \n\n\"Riddles of course,\" she says with a bright smile. \"Would you like to hear one of my own devising? Or one whose origins are lost to time?\"\n\n*fake_choice\n\t#\"I'll hear your riddles Sphinx.\"\n\n\t\n\t#\"Ask me one of the older ones.\"\n\t\t\t\t\n\t\t\n\t#\"I can answer question you care to pose Sphinx. Ask me what you will.\"\n\n\n\n\n\t\t\n\t\t\t", "startup": "\n*title The Saga Of Oedipus Rex\n*author Jacic\n*scene_list\n\tstartup\n\tpart2sphinx\n\tpart3road\n\tpart4chariot\n\t$ part5guard\n\t$ part5blearnsphinx\n\t$ part6sphinxattack\n\t$ part6alternative1\n\t$ part6special\n\t$ part7riddle2\n\t$ part7alternative2\n\t$ part7special\n\t$ part8thebes\n\t$ part9king\n\t$ apollosphinx\n\t$ peaceending\n\t$ ending\n\t\n\n*comment variables\n*create status \"A baby rejected by his own parents.\"\n\n*create tragedy \"no\"\n*comment yes= free choice. no= as the story was originally told.\n*create escape \"no\"\n*comment if yes- will avoid second part of prophecy\n\n*create coins 9\n*create travel \"no\"\n*create templetrip \"\"\n*comment cart or walk\n*create begdriver \"no\"\n*comment if take cart for no money = yes.\n*create knowgift \"no\"\n*create audience \"\"\n*comment proud, humble\n*create ask \"\"\n*comment specific general\n*create health 5\n*create healthstat \"\"\n*create hedge \"no\"\n*create tutortype \"\"\n\n*create answer1 \"\"\n*comment man, woman, human, me\n*create answer2 \"\"\n*create q1 0\n*create hint1 \"no\"\n*create hint2 \"no\"\n*create hint3 \"no\"\n*create chance \"no\"\n*create qhe \"he\"\n*create qhis \"his\"\n*create r2 0\n*create hint1b \"no\"\n*create hint2b \"no\"\n*create hint3b \"no\"\n*create chance2 \"no\"\n*create day \"\"\n*create night \"\"\n*create hitcosta \"no\"\n*create directguards \"\"\n*create warnnestor \"no\"\n*create looksphinx \"yes\"\n*create sword \"none.\"\n*create letter \"\"\n*create extracloak \"\"\n*comment \"spare cloak\"\n*create colourcloak \"\"\n*comment black, purple, green (with gold thread)\n*create herbal \"no\"\n*create map \"\"\n*create lovesnakes \"\"\n*create returntemple \"no\"\n*create temprementtxt \"\"\n*create temperament \"\"\n*create water 0\n*create earth 0\n*create fire 0\n*create air 0\n*create element \"\"\n*create temprementonly \"\"\n*create eleniarrow \"\"\n*create battle \"\"\n*create roadblock \"\"\n*create refusesword \"\"\n*create feather \"belt\"\n*comment belt or bold\n*create prophecy \"\"\n*comment Do you believe the prophecy fulfilled after sphinx is killed. Yes, no, partially. Father (if you feel indirectly responsible for his death).\n*create fate \"\"\n*create flip \"no\"\n*comment king, advisor, guest\n*create sphinxfeather \"\"\n*create childrentxt \"no\"\n*create tprophet \"agree\"\n*comment agree if want prophet to come to court. Disagree if don't want him to come.\n\n*create stealcloak \"\"\n*comment yes if steal from the merchant at the agora.\n*create splitwood \"\"\n*comment if you cut wood if you stay in the shed. (No if leave. \"\" if do not stay)\n*create oraclegift \"\"\n*comment good, average, poor.\n*create chariotdriver \"defend\"\n*comment defend or kill. \"Kill\" is deliberate  \"defend\" is accidental (fall).\n*create helpguards \"\"\n*comment yes if yell commands, no if concentrate on your own fight, \"\" if this was not an option.\n*create threatendriver \"\"\n*comment yes if threaten him with a sword when he refuses to take you for free. No if you pay him. \"\" if you get a free ride or walk.\n*create commonercart \"\"\n*comment yes if won't speak to him as beneath you\n*create chariotburial \"valley\"\n*comment if kill driver and do not send him over the edge, will be \"path\". (Always valley for defend).\n*create creontreason \"no\"\n*comment yes if blame him for Tiresias\n*create jury 50\n*create judgement \"not guilty\"\n*create job \"\"\n*create sphinxalive \"no\"\n*create failedsphinx \"\"\n*comment \"yes\" if try to convince her with not believing in fate.\n*create sphinxfriend \"\"\n*comment love, friend, fate.\n*create chooseagain \"no\"\n*create beads \"\"\n*create sphinxname \"Sphinx\"\n*create generalmood \"neutral\"\n*comment neutral, dislike, like.\n*create setspear \"\"\n*create ritual \"yes\"\n*create sphinxinjury \"\"\n*comment wing\n*create reaction \"\"\n*comment cry, rage, blame, honour\n*create leaveegypt \"no\"\n\n\n*create oedipusdead \"no\"\n*create jocastadead \"no\"\n\n*comment characters for statpage\n*create creon \"no\"\n*create jocasta \"no\"\n*create laius \"no\"\n*create tiresius \"no\"\n*create iahmesu \"no\"\n\n\n*comment achievements\t\n\t\n*achievement riddle1 visible 10 A riddle to remember\n\tRiddle me this.\n\tAnswer the first of the sphinx's riddles without help.\t\t\n\t\n*achievement sphinxdeathapep visible 10 At what cost?\n\tChaos.\n\tLose the Sphinx in Battle.\t\n\n*achievement dieagain visible 10 Die and die again\n\tMost mortals only have one chance at life.\n\tMeet your fate at the teeth of the Sphinx more than once.\t\n\t\n*achievement successgift visible 10 Divine help\n\tHelp from above.\n\tConvince Apollo to speak on your behalf.\t\n\t\n*achievement setweapon visible 10 Divine Weaponry\n\tA spear that can injure the gods themselves.\n\tWield Set's spear.\t\n\t\n\t\n*achievement healingdream visible 10 Dreamer\n\tDreams and meanings.\n\tStay the night at the Asclepeion.\t\n\t\n*achievement apep visible 10 God of Chaos\n\tDefeat the God of Chaos.\n\tDefeated Apep.\n\t\n*achievement honesty visible 10 Honesty \n\tOne good turn deserves another.\n\tBe rewarded at the inn.\t\n\n*achievement riddle2 visible 10 Knowledge is power\n\tRiddle me that.\n\tAnswer the second of the sphinx's riddles without help.\t\t \n\t\n*achievement sphinxname visible 10 Names and designations\n\tA Sphinx by any other name.\n\tLearn the Sphinx's real name.\n\t\n*achievement reborn visible 10 Reborn\n\tDeath is not always the end.\n\tDie at the teeth of the Sphinx and be reborn.\n\n*achievement recommended visible 10 Recommended\n\tA job well done, or so they think anyway.\n\tGet a letter of recommendation from Aristaeus.\t\n\t\n*achievement refusethebes visible 10 Refusal\n\tTurn down an offer of kingship. \n\tDecline to marry Queen Jocasta of Thebes.\n\t\n*achievement failgift visible 10 Regrets\n\tA decision returns to haunt you.\n\tFail to convince Apollo to speak on your behalf.\n\t\n*achievement respect visible 10 Respect\n\tImpress the guardian of the underworld.\n\tGain the approval of Cerberus.\t\n\t\n*achievement rested visible 10 Rested \n\tA good night's rest.\n\tStay a night at the inn.\t\t\n\t\n*achievement scalespass visible 10 Scales \n\tAs light as a feather.\n\tSurvive the weighing of your heart.\t\n\t\n*achievement successguard visible 10 Strategos\n\tMinimise your losses.\n\tSuccessfully direct the guards against bandits in the forest.\t\t\n\n*achievement savesphinx visible 10 Teeth and feathers\n\tGifted rather than taken.\n\tThe sphinx gave you one of her feathers.\n\n*achievement kingthebes visible 10 The King\n\tRule as King. \n\tBecome King of Thebes.\t\n\t\n*achievement bothlive visible 10 To battle a God.\n\tSurvival.\n\tBoth the Sphinx and yourself survive the battle with Apep.\t\t\n\t\n\t\n*achievement blindending visible 20 Ending 1\n\tHidden ending 1. \n\tThe blind prophet.\n\t\n*achievement furyend visible 20\tEnding 2\n\tHidden ending 2.\n\tCaught by the Furies.\n\t\n*achievement notguiltyend visible 20 Ending 3a\n\tHidden ending 3a.\n\tA second chance at life.\n\t\n*achievement notguiltyend2 visible 20 Ending 3b\n\tHidden ending 3b.\n\tNameless but not forgotten.\n\t\n*achievement sphinxending visible 20 Ending 4\n\tHidden ending 4.\n\tOedipus and the Sphinx.\t\n\t\n*achievement mortal visible 20 Ending 5\n\tHidden ending 5.\n\tA lifetime together.\n\t\n*achievement mortalheroes visible 20 Ending 6\n\tHidden ending 6.\n\tMortal Heroes.\t\n\t\n*achievement heroegypt visible 20 Ending 7\n\tHidden ending 7.\n\tHeroes of Egypt.\t\n\n*achievement afterlife visible 20 Ending 8\n\tHidden ending 8. (Longest story.)\n\tEgyptian afterlife.\t\n\t\n*if not(choice_is_web or choice_is_steam) and not(choice_randomtest)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tYour name is Oedipus, Prince of Corinth: And you've just discovered your future has been cursed by the gods themselves. Travel back to a time of magic and monsters in ancient Greece. Can you successfully fight to free yourself? Or will you succumb to the fate that was prophesied?\n\n\t[i]The Saga of Oedipus Rex[/i] is an epic 100,000 word interactive fantasy novel by Jacic where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n\t• Play as Prince Oedipus, heir to the rulership of Corinth.[n/]\n\t• Test your wits against the Sphinx. [n/]\n\t• Immerse yourself in ancient Greek life.[n/]\n\t• Remain in the country of your birth, or travel afar to Egypt.[n/]\n\t• Will you appeal to the gods, challenge their decisions, or let fate run its course?[n/]\n\t• With 8 distinct endings: Will you follow the future that has been prophesied or find your own way?\n\n\t*if choice_prerelease and not(choice_is_ios_app)\n\t\t[i]You can play the first three chapters of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n\t\t*choice\n\t\t\t#Sign up to be notified when the game is available.\n\t\t\t\t*subscribe {\"now\": true}\n\t\t\t\t*restart\n\t\t\t#Play the first three chapters now for free.\n\t\t\t\t*goto purchased\n\n\t[i]You can play the first three chapters of the game for free. Purchase the rest of the game below.[/i]\n\t*if choice_is_advertising_supported\n\t\t[i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n\t*purchase_discount adfree 2022-02-23 $4.99 $2.99 purchased\n\t*if choice_is_advertising_supported\n\t\t*page_break_advertisement\n\t*if not(choice_is_advertising_supported)\n\t\t*page_break Play Now for Free\n\n\n*label purchased\n\n\n*label top    \n\n*comment command for testing screenshot file. *goto_scene screenshots\n\n\n*label startstory\n\t\n*comment story starts here\n\n\n*image sphinx.png center\n\n\t\t\n*text_image sagatitle.png center The Saga Of Oedipus Rex\n\n*line_break\n\n[b]Foreword[/b]\n\nThe Saga of Oedipus Rex is based in part on the ancient Greek tragedy by the same name written by Sophocles in about 429 BC. As such it does contain some mature themes which may not be suitable for young readers and parental guidance is recommended.\n\nDo you wish to experience the story following the path originally written? Or have the opportunity to escape the fate laid out by the Gods?\n\n(To experience the full force of Oedipus' tragedy on your first play through, selecting option one is recommended.)\n\n*label storytype\n\n\n*choice\n\t#[b]The Tragedy of Oedipus Rex:[/b] I would like to play the story as defined by the original Greek tragedy. \n\t\t*label original\n\t\tThis option will restrict your options at specific points in the story to ensure the prophecy is fulfilled as dictated by the original story of Oedipus Rex. \n\t\t\n\t\tWould you like to proceed?\n\t\t\n\t\t*choice\n\t\t\t#Yes.\n\t\t\t\t*set tragedy \"yes\"\n\t\t\t\t\n\t\t\t\t*goto storystart\n\t\t\t\t\n\t\t\t#No, I've changed my mind and want greater freedom of choice.\t\n\t\t\t\t\n\t\t\t\t*goto storytype\n\t\t\n\t\n\t#[b]The Fate of Oedipus:[/b] I want greater freedom of choice in my decisions.\n\t\t*label freechoice\n\t\tThis path will allow you to make decisions which [i]might[/i] allow you to deviate from Oedipus' original fate. \n\t\t\n\t\tWould you like to continue?\n\t\t\n\t\t*choice\n\t\t\t#Yes\n\t\t\t\t*set tragedy \"no\"\n\t\t\t\t\n\t\t\t\t*goto storystart\n\t\t\t\t\n\t\t\t#No, I've changed my mind and would prefer to play the story as defined by the original tragedy.\n\t\t\t\t\n\t\t\t\t*goto storytype\n\t\t\t\t\n\n\t#[b]The Escape of Oedipus:[/b] I wish to ensure Oedipus evades his original fate and avoids the more controversial elements of Sophocles' play.\n\t\tThis option will restrict your options at specific points in the story. Select this path if you would like to avoid the more controversial elements of the prophecy that occurred in the original story of Oedipus Rex from being fulfilled. \n\n\t\tWould you like to continue?\n\t\t\t\n\t\t*choice\n\t\t\t#Yes.\n\t\t\t\t*set tragedy \"no\"\n\t\t\t\t*set escape \"yes\"\n\t\t\t\t\n\t\t\t\t*goto storystart\n\t\t\t\t\n\t\t\t#No, I've changed my mind and want greater freedom of choice.\t\n\t\t\t\t\n\t\t\t\t*goto storytype\n\t\t\t\t\n\n*label storystart\n\n*text_image prologueoedipus.png center Prologue\n\n\nThe woman weeps softly, clutching the baby to her breast. The babe is cursed. He was born male. \n\nHer husband looks on desolately. For long years he'd both wished for and dreaded that she would conceive. Now his worst fears have materialised.\n\n\"You know what has to be done. Would you put the life of this child ahead of my own?\" His voice is rough with emotion, but hard as steel. \n\nThe Oracle at Delphi, priestess of Apollo god of truth and prophecy, had told him his transgressions had cursed his family. He had been given no reason to doubt her. But why else would he have been warned, if not to have some chance of escaping his fate? The cost however would be high, ever so high.\n\n*page_break\n\nShe shakes her head, long black hair shrouding the babe protectively. \"But what if the prophecy is wrong? Or misinterpreted? You know that Oracles' words are as like to be tied up in riddles as anything else.\"\n\n\"Do not make this more difficult than it needs to be,\" he growls, struggling to keep his emotions under control. \"You heard her words as well as I. There is no mistake.\" \n\nHe takes a step back, looking through the window where the first glimmer of dawn lights the horizon with an orange hue. \n\n\"What of the Furies?\" his wife implores desperately. \"Will they not seek justice if we were to murder one of our own?\"\n\n\"It has been arranged. We will not end his life; the sun and rain on the mountain top will take care of that should the gods will it.\" He sighs, hating to see his wife in such pain but there is no help for it. \n\nMore gently he continues. \"The longer you hold him, the worse it will be. You have until the sun crests the horizon, then I will send Amyntas for the boy. He knows what to do.\"\n\nWith quick steps he exits the room, shutting the door behind him and muffling the sound of his wife's wails. When the time comes she will do what is best for both of them. Of this he has no doubt.\n\n*page_break\n\nAmyntas sneaks fugitively through the streets, rapping in rapid succession on the wooden door. A stout woman swings it open with the squeak of rusty hinges. \n\nShe scowls darkly seeing who has disturbed her sleep. \"Amyntas, you know better than to be so impatient. I was up all night with Hellen's girl. The poor child's fever only broke with the rooster's crow this morning. Now what is it?\"\n\n\"Please Nysa, not here in the street. Just let me in.\" The servant looks around worriedly. The road is still quiet at this hour, but if the wrong set of eyes should spot him here in the street, it would bode ill for all of them.\n\nSeeing his fear, the healer steps aside allowing Amyntas to shoulder past into the rough stone room hung with drying herbs. \n\n*page_break\n\n\"Now, what is this all about? You'd better have a good reason for waking me or I'll...\" she trails off as Amyntas lifts his cloak aside to reveal the bundle he was hiding. \n\n\"But... That's a baby!\" She bustles over to take the sleeping child from his arms. \"What are you doing with a baby? I know full well he's not yours. Or is he? What have you been up to? I doubt me he's even a week old at most. Is he ill? He seems peaceful enough...\"\n\n\"No, not ill,\" he cuts her off. There is so little time. If he's discovered here... well best not to think about that. \"He needs a home Nysa. A family far, far from here. Can you do that?\"\n\n\"Well... I suppose there's always couples looking for a child that cannot conceive one of their own. I could travel to Corinth if the babe cannot stay in city. I know the healer there; she could find him a home.\"\n\nAmyntas lets out the breath he hadn't known he was holding, the tension dropping from his shoulders. \"Do it today. Take him far from here. Tell no one.\"\n\n*page_break\n\n\"Whose is it?\" She eyes him suspiciously, wondering what he's getting her into.\n\n\"It does not matter. Not anymore. If you value his life, you'll ask no questions. [i]Please[/i] Nysa, just take the child and go.\"\n\nShe gives him a hard look, before dropping her gaze back to the baby. Poor mite, to be so hated by his own kin that they'd cast him out as a newborn. Someone owed the child a debt and it wasn't her, but she'd keep it anyway. \n\n\"Alright Amyntas. Today it is.\"\n\n\n\n*page_break \n\n[b]~Twenty Years Later~[/b]\n\n*set status \"Heir to the throne of Corinth.\"\n*set travel \"yes\"\n*set sword \"sword.\"\n\n[i]\"I tell you, that boy is no son of the King's.\"[/i]\n\nYou swing your sword savagely at the practice dummy. \n\n[b]Thwack! Smack![/b]\n\n[i]\"Rumour was that Merope was barren you know. Then one day, poof! A baby boy appears. Do you not think that strange?\"[/i]\n\nKeep training. Focus... \n\n[b]Snick! Whack![/b]\n\n[i]\"His hair as dark as a raven's, yet hers is the golden of the sun. Even Polybus who is greying now once had hair of bright copper...\"[/i]  \n\n\n[b]\"Arrrah!\"[/b] \n\nA scream parts your lips as you bury the sword deep into the straw stuffed man. \n\n\n*page_break\n\nIt seems as if whispers speak of nothing else in the court these days. Your father King Polybus, is getting no younger and the ravens are circling. \n\nYou'd already approached your mother to ask if there was any truth to the matter, who responded by denying the rumours vehemently. \"You're our son. How could you doubt it? Have we not loved you as such all your years?\"\n\n\n*fake_choice\n\n\t#But still the doubt remains, a niggling thought, eating away at your calm. \"I must have proof. With the Oracle to support my claim, none could doubt me.\"\n\n\t\tPulling the sword from the straw man, you sheath it at your belt. Yes, that's what you must do. But no one must know. There can be no inkling that you are even considering what they whisper may carry weight. When you return triumphant will be soon enough. \n\t\t\n\t#There is unlikely to be any truth to the rumours, but your learning has taught you that words can have as much power as the sword in some cases. You must find a way to put the rumours to rest, and soon. \t\n\t\t\n\t\tPulling the sword from the straw man, you sheath it at your belt. The best course of action would be to seek out the Oracle. With her words to support your claim, none could doubt you are the rightful heir. But until then, no one must know what you're planning. There can be no inkling that you might even be considering that what they whisper may carry weight. When you return triumphant, it will be soon enough. \n\t\t\t\n\t\nSecretively you gather a few essentials for the journey and sneak through the gates. With an undyed, rough spun tunic and cloak to hide your features, no one challenges your passing. \n\n*page_break\n\n*text_image ch1oedipus.png center Chapter one: The Oracle At Delphi\n\n\n*if (((coins > 9) or (sphinxalive != \"no\")) or (health > 5))\n\t*set flip \"yes\"\nFeet aching, you approach the town at the base of a mountain whose peak reaches above the clouds.  \n\nMount Parnassus: Home of the Sanctuary of Apollo and your final destination. \n\nThe journey had been hard. Although fit, you'd not been used to the long miles on foot and your sandals had long since rubbed blisters that burned with every step. What you'd give for your chariot right about now!\n\nIt seems as if you'll have to settle for a cart however. A bent backed old man is loading the last of the supplicants into the rickety looking contraption, which appears to be pulled by a large brown bullock grazing contentedly by the side of the road. \n\n*page_break\n\n\"Are you travelling to the Sanctuary?\" you enquire tiredly.\n\nThe driver grunts an affirmation. \"Four drachmas.\" \n\nYou jingle the coins in your purse cursing silently. You'd packed in such a hurry, that you'd neglected to pack extra money for the journey. The pouch is already significantly lighter than when you left, and you still need money to return home. It is worth spending most of your remaining coins on a ride up the mountain?\n\nYour painful feet echo a resounding \"yes\" when you think about the slow walk up the steep winding trail. You'd surely be exhausted and not looking an inch a prince by the time you arrive. On the other hand, you'd always been taught to consider your finances carefully. Spending the money now, may mean sleeping under a hedge later. In your current clothing you'll have trouble convincing anyone to give you free lodgings as a member of the royal family.\n\n*choice\n\t#Pay the man. You don't care what it costs at this point. \n\t\t*set coins -4\n\t\t*set threatendriver \"no\"\n\t\tReaching into your purse, you reluctantly count out four drachmas and hand them to the driver. Only five coins now clink in the pouch at your waist. You hope it's enough. \n\t\n\t\tThe man takes the coins without comment, spiriting them away to a pocket hidden somewhere on his person with a brief gap-toothed smile. With a gesture, he invites you to join him up front. With a glance at the wagon you see why. It's already full to the brim. \n\t\t\n\t\tFarmers rub shoulders with scribes and bards; all showing a mixture of equal parts eagerness and apprehension as they glance upwards at the cloud shrouded temple. Anyone, from any walk of life may petition the Oracle for advice or prophecy once per year. Not all will still wish they had, after hearing what Apollo's representative has to say however. \n\t\t\n\t\tGratefully you pull yourself up as the driver clucks the bullock forward, throwing its weight into the harness to get the loaded cart moving slowly forward. Your seat is hard and full of splinters, and you feel every hole and rock along the road, but it surely beats the alternative of having to trudge up that hill. \n\t\t\n\t\t*goto cart \n\t\n\t#Walk. Sure, you may regret the decision later, but it pays to be frugal. \n\t\tYou eye the steep path mournfully, regretting your decision already. Still, sore feet are a small price to pay if it means food in your belly and a bed to sleep on... or so you keep telling yourself anyway.\n\t\n\t\t*goto walk\n\t\n\t#Tell the driver who you are and demand free passage. You're already here, what harm can come of any tales he tells? \n\t\n\t\tYou draw yourself up, conscious of the rough spun clothing that has kept your secret until now. \"I am Oedipus, son of Polybus. Heir to the throne of Corinth. I command you to take me to the Pythia.\"\n\t\n\t\tThe driver snorts, pulling himself up into the wagon. \"Ye dinna look much like royalty to me. Besides, what prince would quibble over giving a poor man a handful of coins? Now begone or pay the fare.\"\n\t\t\n\t\t*choice\n\t\t\t#Draw your sword. Such insolence! You'll teach him a lesson he'll not soon forget. \n\t\t\t\t*set threatendriver \"yes\"\n\t\t\t\t\"I don't think you understood me [i]peasant,\"[/i] you snarl, hand reaching for the pommel of your sword strapped your waist. \n\t\t\t\t\n\t\t\t\tA throat is cleared loudly and deliberately behind you. \"Is there a problem?\"\n\t\t\t\t\n\t\t\t\tSpinning you come face to face with an officer, his soldiers standing close by watching the situation with interest. The way their hands twitch on their weapons said they'd welcome the action. \n\t\t\t\t\n\t\t\t\tStill the officer remains outwardly calm. He leans on a long spear, armour glistening in the morning light. \"Well? I asked you a question. [i]Is[/i] there a problem? Because if I really thought you were going to draw that sword and break the peace, well... there would be consequences.\"\n\t\t\t\t\n\t\t\t\tYou notice the driver has climbed into his wagon, busying himself with the reins and avoiding the soldier's gaze. This is definitely a man that holds authority within the town. \n\t\t\t\t\n\t\t\t\t\n\t\t\t\t*fake_choice\n\t\t\t\t\t#You would prefer to have your answers from Apollo from this side of the river Styx. Back down. \n\t\t\t\t\t\tYou take your hand from the pommel and hold it up as a peace gesture. \"No problem officer. Just here to see the Oracle.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Glad to hear it.\" His stern expression never wavers. \"Petros, your cart is full enough. I suggest you get going.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe driver nods his head gratefully, growling at the ox to get moving. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"And you...\" He turns his attention back your way. \"May you find the answers you seek.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tUnspoken is the understanding that you'll be watched while you remain within the bounds of his town. \n\t\t\t\t\t\t\n\t\t\t\t\t\tWith a sigh you nod acceptance, moving back into the crowds thronging the streets. After a short search, it becomes plain that there is no other transport available to carry you up the mountain. You'll have to walk. \n\t\t\t\t\t\t\t \n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t#\"I am Oedipus, son of Polybus. I demand an escort.\"\n\t\t\t\t\t\tThe officer rolls his eyes to the sky and you catch a mutter about Delphi attracting the crazy ones. He waves at the driver to move on, who quickly scrambles to comply.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Well [i]Prince Oedipus,[/i] I'd be happy to [i]escort[/i] you back to the barracks. I'm afraid I simply don't have any chariots available this morning to await on your pleasure. So, either you can proceed by yourself, or await your own people. Surely the crown prince doesn't travel alone?\" His tone is condescending.  \n\t\t\t\t\t\t\n\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t#\"You have no idea who you're insulting lochagos. I'll remember this.\" \n\t\t\t\t\t\t\t\tThe soldier tenses creating a ripple of action through the men assembled behind him. Suddenly dozens of spear points are lifted your way. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"This is a place of peace citizen. I suggest you remember that, or you can spend time reflecting on it from within the confines of a cell.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tThe threat in his voice is evident, further action will only cause the scene you'd been hoping to avoid during your travels. Fixing the lochagos' face in your memory, you vow to remember him. Contenting yourself with the thought that his reckoning will come.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#Give up and leave. You never thought you'd regret that your disguise was too good. \n\t\t\t\t\t\t\t\tYou mutter that an escort is not necessary, and you'll find your own way. The soldier smiles too widely, clearly pleased to have dealt with what he sees as just another trouble maker. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\tStalking away through the crowds, it becomes plain that there is no other transport available to carry you up the mountain. You'll have to walk. \n\t\t\t\t\t\t\n\n\t\t\t\t\t\t*page_break\n\t\t\t\t*goto walk\n\t\t\t\t\t\t\t\n\t\t\t\n\t\t\t#Inwardly you groan. Ironically your disguise is too good and you'll not be believed. You don't have time to waste arguing, just pay the fare. \n\t\t\t\t*set threatendriver \"no\"\n\t\t\t\tGrumbling, you reach into your purse and slap the coins into the driver's outstretched hand. He makes a show of counting them, before stuffing the money into a pocket sewn inside the edge of his clock. \n\t\t\t\t\n\t\t\t\tSatisfied, he pulls himself up into the front seat of the wagon and gestures for you to join him. With a cluck, the bullock reluctantly abandons its grazing to throw its weight into the harness of the laden vehicle. Slowly the cart starts to move, groaning and creaking with every bump in the road. You're not about to complain. It may be less than comfortable, but it still beats walking. \n\t\t\t\t\n\t\t\t\tYou pass other petitioners trudging up the slope. Farmers rub shoulders with scribes and bards; all showing a mixture of equal parts eagerness and apprehension as they glance upwards at the cloud shrouded temple. Anyone, from any walk of life may petition the Oracle for advice or prophecy once per year. Not all will still wish they had, after hearing what Apollo's representative has to say however. \n\t\t\n\t\t\t\t*goto cart\n\n\t\t\t\t\n\t\t\t#It's a bad idea to cause a scene. Walk away. \n\t\t\t\tTurning on your heel, you stalk away through the crowds milling about the town. As the driver clucks his bullock forward, you hear him sniggering with his customers. About you no doubt. Your hackles rise, but you focus. All you need to do is get your audience with the Oracle. Afterwards you don't care if the entire world knows you're here.\n\t\t\n\t\t\t\tWandering about the town, it quickly becomes plain that there is no other transport available to carry you up the mountain. You'll have to walk. \n\t\t\t\t\t\t\n\t\t\t\t\n\t\t\t\t*goto walk\n\t\n\t\n\t#Beg the man for a ride up the mountain telling him you have little few coins left to your name.\n\t\t*set begdriver \"yes\"\n\t\tYou pull the man aside, out of hearing of the other passengers. \"Please good man. I've come to petition the Oracle, but I have little coin to spare. Would you consider letting me ride with you without pay?\"\n\t\t\n\t\tThe driver grumbles, scuffing a boot in the dust. \"I 'spose, you'll just keep hassling me the whole way up if I don't. Yer kind have that look. I'm full anyway but for the seat up front. Get in.\"\n\n\t\t*fake_choice\n\t\t\t#Thank him gratefully for his kindness. \n\t\t\t\tThe man grunts again, but you sense he's somewhat appeased by your politeness. Pulling yourself up beside him, he clucks the bullock into motion, the beast straining against its harness as it starts the long journey up the hill.\n\t\t\t\n\t\t\t#Accept it as no more than your due. \n\t\t\t\tYou pull yourself up without a word. The grumbling still rankles. If you could just tell the driver who you really were, he'd be bowing to his better. Your companion clucks the bullock into motion, the beast straining against its harness as it starts the long journey up the hill.\n\t\t\t\n\t\n\t\tThe cart rumbles noisily along, jarring your back with every rock and hole along the road. Still it beats walking. You pass other petitioners trudging up the slope. Farmers rub shoulders with scribes and bards; all showing a mixture of equal parts eagerness and apprehension as they glance upwards towards the cloud shrouded temple. Anyone, from any walk of life may petition the Oracle for advice or prophecy once per year. Not all will still wish they had, after hearing what Apollo's representative has to say however. \n\t\t\n\t\t*goto cart\n\t\t\n\t\t\n\n\n\n*label walk\n\n*set templetrip \"walk\"\n*set health -1\n\nSettling into a rhythm, you place one foot after another as you ascend the trail. Others crowd the path with you, separating only to allow the occasional chariot or rider through the throng. Farmers rub shoulders with scribes and bards; all looking upwards towards the cloud shrouded temple with a mixture of equal parts eagerness and apprehension. Anyone, from any walk of life may petition the Oracle for advice or prophecy once per year. Not all will still wish they had, after hearing what Apollo's representative has to say however. \n\nThe sun rises higher, burning away the morning's fog and causing beads of sweat to slick your hair and drip into your eyes. It's almost a relief when your journey takes you into the higher reaches where the wind blows fitfully through stunted trees and brush. Exhausted, you finally reach the sanctuary, stumbling with blistered feet towards the buildings. \n\n*page_break\n\n*goto temple\n\n\n*label cart\n*set templetrip \"cart\"\n\n*page_break\t\t\n\nWhile the other supplicants talk quietly among themselves, the grey-haired driver remains silent apart from the occasional encouraging cluck or yip to keep the bullock moving. \n\n*choice\n\t#Try to talk to the man. Perhaps he knows something of the temple. \n\t\tThe man continues to stare fixedly ahead, watching the trail go by. Perhaps you should start with something simple to break the ice. \n\t\t\n\t\t*fake_choice\n\t\t\t#\"So, that's a nice... ox you've got there.\"\n\t\t\t\tYour companion grunts in agreement, nodding his head in time with the bullock's steps. \n\n\t\t\t#\"Make this trip often?\"\n\t\t\t\tYour companion makes a sound that you take to be an affirmative before lapsing into silence once more. \n\t\t\t\n\t\t\t#\"The hills are rather pretty, aren't they?\"\n\t\t\t\t\"Pretty,\" he agrees, gazing off into the distance. \n\t\t\t\t\t\n\t\t\t#\"There seem to be a lot of people heading to the temple today.\"\n\t\t\t\t\"Always,\" he mutters, before lapsing into silence once more. \n\t\t\t\n\t\tWell so much for small talk to get things going. Finally, he looks your way once more. \n\t\t\n\t\t\"I'm Petros,\" he mumbles quietly above the clip clop of the oxen's hooves. \n\n\t\t*fake_choice\n\t\t\t#\"Oedipus.\" No need for a false name. \n\t\t\t\n\t\t\t#\"Leontios,\" you reply. Can't be too careful. \n\t\t\t\n\t\t\n\t\tHe grunts again in acknowledgement with a single nod of his head.\n\t\t\n\t\tIf you want to ask him something else, you'd better do so quickly before his attention wanders elsewhere once more. \n\n\t\t*label petros\n\t\t*disable_reuse\n\t\t\n\t\t*choice\n\t\t\t#\"So, you seem like you've been here before. What should I do when I get there?\n\t\t\t\t\"Yes.\" \n\t\t\t\t\n\t\t\t\tWith monosyllable answers like this, it may be like drawing blood from a stone. \n\n\t\t\t\t\"And...\" you prompt again. \n\t\t\t\t\n\t\t\t\t\"The Oracle is a busy woman; you'll likely have to draw lots to be seen.\"\n\t\t\t\t\n\t\t\t\tWell that was interesting and more than a little concerning. Will she even be able to see you today after all? The thought sits coldly in the pit of your stomach. You must get an audience, surely as an Oracle she will know your question is important. \n\t\t\t\t\n\t\t\t\tPetros continues, either unaware or uncaring of your worried look. \"Remember to give her a donation, they [i]know[/i] what you can give.\"\n\t\t\t\t\n\t\t\t\tCursing silently at the new information, you wonder what you carry that might be suitable for this purpose. \n\t\t\t\t\n\t\t\t\t*set knowgift \"yes\"\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t*goto petros\n\t\t\t\t\n\t\t\t\t\n\t\t\t#\"Can you tell me anything about the Oracle? Have you seen her yourself?\"\n\t\t\t\t\"Once, when I was a boy.\" He gives you a gap-toothed smile. \"That one time was enough. Oracles talk in riddles. Sometimes even the clearest of answers are difficult to be sure of. You must take care.\"\n\t\t\t\t\n\t\t\t\tYou blink at the sudden outpouring of useful information. Alas, Petros falls silent once again.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t*goto petros\n\t\t\t\t\n\t\t\t\t\n\t\t\t#Continue in silence.\n\t\t\t\tQuestions answered, you join Petros in a companionable silence as the cart continues to rattle and shake its way to the summit.\n\t\t\t\n\t\t\t\t*goto templeroad\n\t\t\t\t\n\t\t\t\t\n\t\t\t\n\t\t\t\n\t\t\t\n\t\n\t\n\t#Remain quiet, there's too many thoughts going through your mind already to pay him any mind. \n\t\tThoughts whirl through your head making it difficult to think straight, much less carry on a conversation with a perfect stranger. Anxiously, you watch the scenery pass you by as the cart rattles its way towards the peak. \n\t\t\n\t\t*goto templeroad\n\t\n\t#Hold your silence, you've no wish to talk to a commoner like him. \n\t\tThe man is beneath one of your station, serving only to deliver you to your destination. You leave him to his thoughts and let the scenery pass you by. \n\t\t*set commonercart \"yes\"\n\t\t*goto templeroad\n\n\t\t\n\t\t\n*label templeroad\t\n\n*goto temple\n\t\n\n*label temple\n\nA circular temple rises from the plateau, glistening white in the \n*if (templetrip = \"cart\")\n\tmorning sunshine. Tall pillars climb towards the sky, supporting a dome painted in red and gold. Despite the early hour, many people already mill about, being attended to by acolytes who walk the lines dressed cowled tunics of soft white wool. \n\t\n\tYou whistle softly. So many people! Just as well you decided against walking. Who knows how many more supplicants would have arrived by then. Climbing down from the cart, you find what appears to be the end of a line, and settle down to wait.\n*if (templetrip  != \"cart\")\t\n\tearly afternoon sun. Tall pillars climb towards the sky, supporting a dome painted in red and gold. You groan inwardly seeing the number of people who have already arrived before you. Who knows how long it will take to be seen! As you watch the lines of supplicants being attended to by acolytes dressed in cowled tunics of soft white wool, a cold feeling develops in the pit of your stomach. \n\t\n\t[i]What if you're too late? Will they turn you away?[/i]\n\t\n\tAsides from your heart sinking at having to make the arduous walk up the mountain once again, you'd been pinning your hopes on an answer as soon as possible. With a sigh, you join the end of a line.\n\t\n\t\n\t\n*page_break\n\nFinally, an attendant reaches your position. Her voice is soft, and you catch a momentary flash of pale skin and dark eyes as she briefly lifts her head before bowing it once more. \n\n\"Who comes to the sanctuary to seek the knowledge of the Pythia?\"\n\nThere's no point lying here, not before the temple of Apollo. But will you announce your titles proudly, or come before the Oracle as a humble supplicant?\n\n*fake_choice\n\t#\"I am Oedipus, Prince of Corinth. I seek an audience with the Oracle. Tell her I am here.\"\n\t\t*set audience \"proud\"\n\t\t\n\t\tIf your titles impress the girl, she shows no sign of it, merely writing your name below a list of others on a piece of yellowed parchment. Perhaps royal visitors are not so uncommon here.\n\t\t\n\t\t\"Well [i]Prince Oedipus,[/i] the Pythia will see you soon. She is already aware of your presence.\" Her curt tone is disapproving of your demands.\n\n\t\tYou sputter slightly at being made to wait with the general public, but quickly still your tongue. It's always unwise to tempt the anger of the gods, and the Pythia speaks for one of them. It is only after the robed acolyte has moved on, that you think to wonder how she knew you were coming.\n\t\t\n\t\tYour neighbours open a circle around where you stand, glancing curiously your way. They at least know that Princes should be treated with the respect you're due. Sitting back on your haunches you wait, watching the busy scene unfold. \t\n\n\t\t\n\t\t\n\t#\"I am Oedipus, I seek answers only the Oracle can provide and humbly request an audience.\" \n\t\t*set audience \"humble\"\n\t\tThe girl nods, noting down your name on a piece of yellowed parchment with a small smile. Something about her mannerisms makes you suspicious that she somehow knew who you were all along and the question was little more than a formality.\n\t\t\n\t\t\"Greetings be to you [i]Prince[/i] Oedipus.\"\n\t\t\n\t\tYou jump at your full title being used despite not giving it to the girl. She notices, and her smile deepens beneath the cowl. \"The Pythia foretold your coming. She knows you have arrived and will see you soon. Wait here please.\"\n\t\t\n\t\tThe acolyte moves off, leaving you to face the curious glances of your neighbours who have shuffled a few steps away leaving you in an open circle. Sitting back on your haunches you wait, watching the scene unfold around you. \t\n\n*page_break\n\t\nIt seems you've been given preferential treatment after all, watching as your neighbours plead their case to seek the Pythia's wisdom. Supplicants deemed to have a worthy cause were allowed to draw lots, the favour of the gods determining when they would be seen. Those whose queries were not thought important enough to waste the Oracle's precious time, were diverted to priests stationed by the entrance of the temple. Colourful objects were cast onto marble tables, the result apparently giving a yes or no answer to their concerns. \n\t\n\"The Pythia will see you now.\"\n\t\nYou jump, not having heard the soft footfalls of the acolyte over the murmur of hundreds of voices waiting by the temple. Picking yourself up, you prepare to follow her, but she lifts her head looking at you expectantly. \n\t\n*if (knowgift = \"yes\")\n\tOf course, you'd almost forgotten. The cart driver had said you would need to provide a donation to the temple. \n\t\n*if (knowgift != \"yes\")\t\n\t\"I'm ready to go when you are,\" you add, wondering why she does not lead off.\n\t\t\n\t\"Perhaps you would like to provide a donation to the temple in exchange for the gift of knowledge you are to be favoured with?\" she says with a frown, obviously unused to explaining such things to one of your standing. \n\n\tHow could you forget the gift to the Sanctuary? You can almost see your tutor Lorgos frowning with his bushy white eyebrows furrowed at your mistake. But what do you have that could suffice? A donation is meant to be in level with what you can afford to give, but in your hurry, you've brought little with you that might be appropriate.\n\t\t\n*fake_choice\n\t#Give the girl four of your remaining coins. It's not much and it hurts to give up most of the money in your purse, but if you explain it will hopefully suffice. \n\t\tReluctantly you reach into your pouch, giving the girl the drachmas. \"I'm sorry it is not more, but I have little enough with me for this journey. I hope it will suffice.\"\n\t\t\t\n\t\tShe lifts an eyebrow but nods, placing the coins into pouch at her belt. From a bag, she retrieves a strand of laurel leaves, arranging it carefully in your hair.\n\t\t\t\n\t\t\"Please come with me.\"\n\t\t\t\n\t\t*set coins -4\n\t\t*set oraclegift \"average\"\n\t\t\t\t\n\t#Give the acolyte two of your remaining coins without explanation. You don't care if she judges you. \n\t\t*set coins -2\n\t\tHanding the coins over ill naturedly, she looks at the silver disks in her hand with a frown. It's clear she expected greater generosity from one of your station.\n\t\t\n\t\tPlacing them into a pouch at her belt, she all but snaps at you to follow. After a moment's hesitation, she pulls a rather wilted looking strand of laurel leaves from a bag over her shoulder. She shoves it rather roughly into your hands, indicating that you should arrange it in your hair by yourself.\n\t\t*set oraclegift \"poor\"\n\t\t\t\n\t#Gift the broach hidden on the inside of your cloak. It was a gift from your mother, and highly valuable besides. You hate to give it up, but nothing else you have is fitting. \n\t\t*set oraclegift \"good\"\n\t\tReluctantly you unpin the broach, placing it into her palm where it glints golden in the sunlight. \n\t\t\t\n\t\t\"This is a fitting gift indeed,\" she breaths approvingly. From a bag, she retrieves a strand of laurel leaves, arranging it carefully in your hair.\n\t\t\t\n\t\t\"Please follow me.\"\n\t\n\t\n*page_break\n\t\nAs you follow the acolyte into the temple's shadow, you sigh with relief to finally be out of the harsh sun. The entrance arches above, words carved into the white stone. \n\t\n\"[i]Gnōthi seautón. Mēdén ágan,\"[/i] you murmur reading the script overhead. \"Know thyself. Nothing in excess.\"\n\t\n*fake_choice\n\t#\"Wise words to live by.\"\n\t\tYour nameless guide nods. \"Yes. They are written there to remind all who enter this sanctuary of their importance. We must never forget.\"\n\t\t\n\t\t*if (audience = \"proud\")\n\t\t\tThe stress on the word 'all' makes it clear that she feels you need work in this area. It seems she noted your lack of humbleness in your petition earlier.\n\t\t\t\t\t\n\t\t\n\t#\"Why are they carved there?\"\n\t\tYour guide pauses for a second, looking to where you point. \n\t\t\t\n\t\t\"Ah, those they are to remind us of the principles that should guide our life. [i]All[/i] people, even kings, should meditate on their meaning and seek to incorporate them into
