good man.\"\n\nYour mouth goes dry, mind blank with shock. \"How... How did he die?\"\n\nJocasta, strides over to put a comforting hand on your shoulder. \"Peacefully in his sleep. He lived a long full life and it was simply his time. We can only wish that much for ourselves.\"\n\nThe pieces swirl in your mind. [i]But if he is gone... does that mean the curse laid upon me is broken?[/i]\n\n\n*choice\n\t#This means I can go home and see my mother again. At least this means there was no way I had anything to do with my father's death.\n\t\t*set prophecy \"yes\"\n\t\tThough your father's passing saddens you, it seems it was his appointed time to leave this life. He lived out his days, without having them taken from him by your hand as you had been cursed to do. At least now you can see your mother again and tell her why your absence was necessary.\n\t\n\t\t*goto jocasta\n\t\t\n\t#The gods have not allowed you to completely cheat your fate. Despite running from it, they've found a way to take your father from you anyway.\n\t\t*set prophecy \"yes\"\n\t\tThe thought is a melancholy one. Despite everything you did, you'll never see your father again. It is a cruel fate indeed that has befallen you.\n\t\n\t\t*goto jocasta\n\t\t\n\t#Although you were not there to commit the deed in person, you fear you were responsible anyway. Grief at your disappearance must have taken its toll on your father's health.\n\t\t*set prophecy \"father\"\n\t\tThe thought is devastating. Though you'd tried to prevent his death, perhaps the very action of running away to avoid your fate had been what was required to cause it. You've no more escaped this curse, than if you were there to slit his throat in person. \n\t\t\n\t\t*goto jocasta\n\t\t\n\t#The first part of the curse may be dealt with, but it doesn't mean that the second part will not still come true.\n\t\t*set prophecy \"partial\"\n\t\tAs much as you long to return home, you'll have to tell your mother to keep her distance. At least until the mystery of this prophecy can be unravelled. \n\t\t\n\t\t*goto jocasta\n\t\t\n\t#The gods rarely let mortals off so easily once their fate is set. Perhaps there is more to this prophecy than meets the eye. \n\t\t*set prophecy \"no\"\n\t\tConflicting emotions war within. You so want the curse to be broken, however you worry that you have not been let off so easily. You remember the whispered words that caused you to seek out the Oracle in the first place.\n\t\t\n\t\t[i]\"Oedipus is not any son of Polybus and Merope.\"[/i]\n\t\t\n\t\tPerhaps they were right? Or maybe it was merely ill-natured gossip aimed at disinheriting you from your rightful place and the gods have seen fit to spare you that fate. \n\t\t\n\t\t*fake_choice\n\t\t\t#The thought makes you uneasy.\n\t\t\t\tThe idea that you may have another set of parents that you are yet destined to kill makes you profoundly uneasy. If this is true, how can you ever hope to escape your fate if you do not even know who to avoid?\n\t\t\t\n\t\t\t#Polybus and Merope were the only parents you ever knew. Even if the whispers are right? What should you care about some nameless people who never claimed you.\n\t\t\t\tThere's a touch of righteous anger at the thought, but it's tinged with worry. If you don't know who they are, how can you avoid killing them? Would the Furies seek you out for vengeance if you murder a father you've never known?\n\t\t\n\t\t\t#You try to put the thought from your head. How could you know the truth of such things? Ongoing speculation such as this will only serve to drive you mad.\n\t\t\t\tYou try to put the thoughts aside, but they roil uneasily within your mind. \n\n\t\t*goto jocasta\n\n\t\t\n*label jocasta\n\nJocasta is watching you with a look of concern. \"What is this curse of which you speak Oedipus?\"\n\nYou hadn't realised you'd spoken your thoughts aloud. Months of keeping secrets, combined with the shock of your father's death cause the words to come spilling out. Without meaning to, you tell her everything. \n\nAs you finish, the Queen regards you with a look of heartfelt pity. \"Oh you poor, sweet boy. To have such a fate over your head is something that should not be wished upon anyone. Perhaps it would be wise to return to the Oracle once twelve months have passed and seek her advice once again. Prophecy is a tricky thing; I don't believe that you should seek out your mother until it you are sure it is safe.\"\n\n*fake_choice\n\t#\"Not likely. I'm done with seeking the advice of the Pythia. There are some instances where it is better not to know.\"\n\t\t\"Hush, do not speak that way of the Oracle,\" Jocasta chides. \"Knowledge is power... though sometimes it can be painful to hear. What if the second part of the prophecy comes to pass should you return home. Do you not think it wise to know the truth of the matter before taking such a risk?\"\n\t\t\n\t\t\"Well... yes...\"\n\t\t\n\t\t\"Then that is what you must do,\" Jocasta sighs. \"Listen to me badgering you so after so much ill news. You do not need to make a decision today and you may stay here as my guest for long as you wish.\"\n\t\n\t#\"You're right. Can you send word to my mother and let her know I'm ok though?\"\n\t\t\"Oh but of course Oedipus! I know she's been worried sick. Missives were sent out throughout Greece asking for information regarding your whereabouts. I'm surprised you escaped notice for so long.\" Tilting her head she regards you closely. \"Although maybe not. Your eyes are the same, but you've changed. The last few months have been hard for you I'd wager.\" \n\t\n\t#\"I'm not even sure they are my parents. There were... rumours.\"\n\t\t\"Rumours?\" Jocasta's frowns. \"Ah my dear boy. There will always be rumours flying about. I knew Polybus well and you have a lot of him in you. Do not trouble your head so.\"\n\t\t\n\t\tShe sighs seeing you remain unconvinced. \"I will send word to Merope myself and let her know you are well. If you wish, I will also ask her about your parentage though she's as like to bite my head off for even questioning it. How does that sound?\"\n\t\t\n\t\t\"Come now, we will get to the truth of it.\" She gives you a weak smile. \"Listen to me badgering you after so much ill news. You do not need to make a decision today and may stay here as my guest for as long as you wish.\"\n\t\n\t\t\n*page_break\n\n*set creon \"yes\"\n\n\"Jocashta!\" a slightly slurred deep voice booms from down the hallway. \"Jocashta have you heard? Where are you?!\" \n\n\"It seems you were right, that marriage proposal did the trick! Someone call Oedipus... Ah.... Hello there...\" The dark-haired man tapers off as he enters, realising that Jocasta is not alone. Tall and wiry, his resemblance to the Queen is more than passing. \n\nJocasta rises, walking over to the new arrival with a look of irritation. \"Oedipus, please let me introduce Creon. My advisor and as you probably guessed by his overly familiar manner, also my brother.\"\n\n*page_break\n\nCreon, recovered from finding you unexpectedly in the palace is all smiles again. \"Oedipus is it? So, I hear you've rid us of that cursed creature. That is truly blessed news for all of us. Do you plan to marry my sister? The people are clamouring to know. They'd happily accept you as their king should you do that I think. Heroes are always welcome aren't they...\"\n\n\"Creon!\" Jocasta snaps, fists clenched tightly. \"That is for me to discuss in [i]private.[/i] Besides, now is not the time. This is [i]Prince[/i] Oedipus. I just told him about his father.\"\n\nCreon gapes like a fish. \"Prince?... Oh... Ah... My apologies. I thought you were dead... I mean not that I wished it. It's just what everyone was saying... And well...\"\n\n\"Creon,\" Jocasta growls. \"Would you mind leaving us alone for a while? [i]Please?\"[/i]\n\n\"Ah yes, that might be best, mightn't it?\" He gives you an uncertain smile. \"You have my apologies again. The news of the Sphinx's death, well I guess it's gone to my head.\"\n\n\n*page_break\n\nHe retreats stumbling from the room leaving you alone with the Queen once more. \n\n\"I'll bet that's not all that's gone to his head,\" she grumbles, muttering something barely audible about red wine. \"You must forgive my brother. He's not generally this... forward. I suspect his behaviour will be much more congenial tomorrow. Well if his head allows him out of bed at all that is.\"\n\nTwo servants reappear carrying silver platters of food and wine. Placing them on the polished wooden table by the couches, they quickly leave without a word. \n\nJocasta twines dark hair around her fingers while looking at the floor, clearly debating whether to speak. \n\nFinally she steels herself, turning towards you. \"I know I just chided Creon for bringing this up, but I need to know. Did you come here to claim my hand for defeating the Sphinx?\"\n\n*choice\n\t*selectable_if (escape != \"yes\") #\"Who wouldn't want to be King of Thebes?\"\n\t\tShe nods as if the answer was what she expected. \"Being a ruler of Thebes is a heavy responsibility, but something tells me you would be up to such a task.\"\n\t\t\n\t\tShe hesitates uncomfortably. \"There's something I feel you must know, I still grieve for my husband terribly, taken before his time some month back. By brigands they say, though they've never been brought to justice...\" \n\t\t\n\t\t*goto brigand\n\n\t*selectable_if (escape != \"yes\") #\"I'll admit. The thought had crossed my mind.\"\n\t\tShe nods. \"I'm perfectly willing, it was what I offered after all. Besides, I believe you will make a good king for my people. I feel you should know however that I still grieve for my husband terribly. He was taken before his time some months back. By brigands they say, though they've never been brought to justice...\" \n\t\t\n\t\t*label brigand\n\t\t\n\t\tShe pauses, on the verge of tears. After a moment she continues, voice still wavering. \"I'm not certain if I could love another. If you can accept that, I'd welcome the marriage. It seems as if you were sent here for a reason. Perhaps you can pull Thebes from its misfortunes.\" \n\t\n\t\t*choice\n\t\t\t#\"I'd be honoured to marry you. We can see what time brings.\"\n\t\t\t\tShe nods with a small smile. \"Thank you. Together, I hope Thebes will prosper.\"\n\t\t\t\t\n\t\t\t\t*set fate \"king\"\n\t\t\t\t\n\t\t\t\t*goto king\n\t\t\t\n\t\t\t#\"It's not exactly what I hoped for, but I'll marry you. Perhaps with time, you may change your mind?\"\n\t\t\t\tShe shakes her head sadly. \"Perhaps but Laius was my soul mate, I would have done anything for him, and he has been taken from me. He will not be replaced so easily.\"\n\t\t\t\t\n\t\t\t\t*set fate \"king\"\n\t\t\t\t\n\t\t\t\t*goto king\n\t\t\t\t\n\t\t\t#\"Becoming King of Thebes is enough for me. If that is enough for you as well, then we can have an agreement.\"\n\t\t\t\tShe nods with a small smile. \"Of course, thank you for your understanding. Together, I hope Thebes will prosper.\"\n\t\t\t\t\n\t\t\t\t*set fate \"king\"\n\t\t\t\t\n\t\t\t\t*goto king\n\t\t\t\t\n\t\t\t*selectable_if (tragedy != \"yes\") #\"If that's the case. Perhaps I could stay as your advisor instead?\"\n\t\t\t\t\"You would give up a chance to be King?\" Jocasta purses her lips thoughtfully. \"Creon is my chief advisor at present. I'll have to see how he takes that proposal, but I suspect it will be no problem. My brother loves the royal lifestyle, the responsibility less so.\"\n\t\n\t\t\t\t*set fate \"advisor\"\n\t\t\t\t\n\t\t\t\t*goto advisor\n\t\t\t\t\n\t*selectable_if (escape != \"yes\") #\"Only if you were agreeable to it.\"\n\t\t\"I would,\" she replies; however you feel a 'but' coming. \"Before we agree to this, you should know that I still grieve for my husband terribly. He was taken before his time some months back. By brigands they say, though they've never been brought to justice...\" \n\t\t\n\t\t*goto brigand\n\t\n\t*selectable_if (tragedy != \"yes\") #\"Perhaps something else? Marriage was not my plan, I just wished to free Thebes.\"\n\t\t\"A noble cause.\" She smiles with warmth. \"Still I would be remiss if I didn't make you a gift befitting your deeds. Horses? Money? Weapons from my armoury perhaps?\"\n\t\t\n\t\tShe pauses thoughtfully. \"You know I could use an advisor with your heart and the people would rejoice to have their hero so close at hand. You could stay as long as you wished. Creon is currently my chief advisor, but I suspect I could talk him into agreeing. My brother loves the royal lifestyle, the responsibility less so.\"\n\t\n\t\t\n\t\t*choice\n\t\t\t#\"I think I'd like that.\"\n\t\t\t\tShe smiles brightly. \"That is fantastic news! I'll talk to Creon and we'll get everything organised on the morrow.\" \n\t\t\t\t\n\t\t\t\t*set fate \"advisor\"\n\t\t\t\t\n\t\t\t\t*goto advisor\t\t\t\t\n\t\t\t\t\n\t\t\t\n\t\t\t#\"If Creon agrees, I'll stay. I don't want to cause any rifts.\"\n\t\t\t\tShe smiles. \"You really do have a heart of gold. I think you will make a wonderful advisor. Leave Creon to me. I doubt he'll make much of a fuss over it.\"\n\t\t\t\n\t\t\t\t*set fate \"advisor\"\n\t\t\t\t\n\t\t\t\t*goto advisor\n\t\t\t\n\t\t\t#Decline the offer. \"I don't think I'd make a good advisor.\"\n\t\t\t\t\"You might be surprised,\" Jocasta protests. \"I think you've grown more than you know.\"\n\t\t\t\t\n\t\t\t\tAt your steadfast refusal however she relents, accepting your decision and offering you a place to stay in her home for as long as you wish it.\n\t\t\t\t\t\t\t\t\n\t\t\t\t*set fate \"visitor\"\n\t\t\t\n\t\t\t\t*goto visitor\n\t\t\t\t\n\t\t\t#\"I don't want to stay on as an advisor, there's other things I want to do with my life.\"\n\t\t\t\tJocasta frowns in disappointment, but accepts your decision graciously offering you a place to stay in her home for as long as you wish it.\n\t\t\t\t\n\t\t\t\t*set fate \"visitor\"\n\t\t\t\n\t\t\t\t*goto visitor\n\t\n\t*selectable_if (tragedy != \"yes\") #\"To be honest, I'd just like to return home someday. I can't do that if I'm King of Thebes.\"\n\t\tJocasta smiles. \"I understand, and your family will thank you for it no doubt. Until it is safe for you to return however, I offer you a place to stay in my home for as long as you may need.\"\n\t\t\t\t\n\t\t*set fate \"visitor\"\n\t\t\t\n\t\t*goto visitor\t\t\n\t\t\n\n\n*label advisor\n*achieve refusethebes\n*set status \"Hero of Thebes and advisor to Queen Jocasta.\"\n\nAlthough you half expected Creon to balk at the idea of stepping aside in his role as chief advisor, he seemed surprisingly nonplussed. He even joked about preferring to spend time with good wine and music, rather than diplomats and paperwork. Perhaps he has a point. \n\nDespite the rigors of the job, you still manage to scrape together some time to engage in other pursuits. As befitting, Queen Jocasta has been more than generous, providing you not only with lodgings, but with what anything you require. Despite the worry of a curse potentially still lingering over your head, you start to feel safe here in this city full of friendly faces which is growing to prosper once again. \n\n*goto sparetime\n\n*label visitor\t\n*achieve refusethebes\n*set status \"Hero of Thebes and guest of Queen Jocasta.\"\n\t\t\nDespite your refusal to become an official advisor to the Queen, you had underestimated the status you now enjoy since the Sphinx's defeat. As Thebes recovers, your continued presence as [i]their[/i] hero is seen as a good omen, with your opinion sought on everything from matters of state, to which would be the best field to plant. You try to put a stop to it, but it seems no isn't an answer the residents of the city are willing to accept. At least your education in Corinth has stood you in good stead for the task. \n\nStill you find yourself mostly at leisure to pursue whatever interests you. As befitting, Queen Jocasta has been more than generous, providing you not only with lodgings, but with what anything you require. Despite the worry of a curse potentially still lingering over your head, you start to feel safe here in this city full of friendly faces which is growing to prosper once again. \n\n*label sparetime\n\nA favourite pastime of yours has become...\n\n*fake_choice\n\t#Browsing the libraries for rare scrolls. \n\t\tYou spent many a pleasant afternoon browsing through scrolls carefully catalogued in the library. With the ever-present threat of the Sphinx gone, philosophers emerged once more to teach in the agora where many lively discussions could be had. Among the academics, you could question and be questioned without the sometimes stifling hero status that followed you elsewhere.\n\t\n\t\n\t#Training with the soldiers. \n\t\tYou'd not forgotten the hard life of the road, or the benefits that being skilled with a weapon can bring. Not wanting to let yourself become soft in a life filled with luxuries, you'd asked to join in the training sessions run for the Thebe's soldiers. \n\t\t\n\t\tThe lochagos had been more than willing to have one of your reputation training with his soldiers, a point he seemed to take great pride in. As the months passed by, you found yourself not only keeping up your skill with a sword, but the lochagos' was more than happy to impart his skill with the spear as part of your routine. \n\t\n\t\n\t#Just relaxing and enjoying the social life. \n\t\tFor one of your standing, Thebes certainly offered many opportunities for socialising. All within the city were anxious for your attendance at their parties and you spent many a night with good food, wine and music. \n\t\t\n*if (fate = \"visitor\")\t\t\n\tJocasta's rule with her brother at her side proved to be a happy one with Thebes flourishing. True to her words, Creon turned out to show far more sense than you'd originally given him credit for at your initial meeting. To your ears, his advice often seemed sound. He obviously possessed extensive knowledge of the city and trade routes essential to allowing Thebes to prosper once more. \n*if (fate != \"visitor\")\n\tJocasta's rule with you at her side proved to be a happy one with Thebes flourishing. True to her words, Creon turned out to show far more sense than you'd originally given him credit for at your initial meeting. Although seemingly happy to let you take over most of the time; on the occasions you requested his help, he often showed remarkable insights into the workings of the city and trade routes essential to allowing Thebes to prosper once more. \n\n\n\t\nStaying within her house, you often had the chance to talk. You find her company pleasant and her conversations learned and intelligent, soon becoming friends although sometimes the relationship seemed complicated. Due to the age difference and circumstances of your arrival, sometimes it seemed as if Jocasta couldn't quite decide whether to treat you as an advisor or a surrogate son. As the months wore on however, you started to wonder if she was considering something else with the half lidded looks she gave you when she thought you could not see, or the hand hastily snatched back with a blush if she should accidentally brush your body. Despite this, nothing ever went further with your relationship remaining platonic. \n\n*choice\n\t#As it should be. You'd no interest in being more than a friend.\n\t\tIt\n\t\t*goto happy\n\t*selectable_if (escape != \"yes\") #You'd never pressed the matter further, seeking to avoid the complications that such a discussion about the matter might bring.\n\t\tApart from this, it\t\n\t\t*goto happy\n\t*selectable_if (escape != \"yes\") #There seemed to be an undeniable connection there, one which you sometimes considered trying to take further to no avail.\n\t\tJocasta continued to seem conflicted, as if uncertain of her mind with regards to her feeling for you. But with time perhaps, that would change. Apart from this, it \n\t\t*goto happy\n\t*selectable_if (escape != \"yes\") #Sometimes you would feel the same when she walked into the room, uncertain of where those thoughts had come from. Almost as if Eros himself was whispering in your ear. \n\t\tYour thoughts drift back to something your mother said many years ago about love being a fickle thing, often arranged by the gods themselves. Feeling the way you do, you could almost believe there was some truth to her words. \n\t\t\n\t\tApart from this, it\n\t\t*goto happy\n*label happy\t\t\nwas a happy time, one where you could sometimes forget the circumstances that had originally lead you here. Though sometimes you considered that another visit to the Pythia may be wise, there never seemed to be enough time to do so. Besides, as the land prospered it seemed as if ill-fortune had truly left your side. \n\t\nBut in keeping with the threads of your life, this small respite of happiness was not to last...\n\n*page_break\n\n\nReports came in slowly, isolated events without any obvious connection: The loss of a field of wheat to locusts, a farmer whose goats no longer produced milk, a flock of sheep whose lambs were all found dead. But with time rather than resolving, the blight only appeared to worsen. \n\nWhen it seemed as if the situation could not get any worse with the city's grain stores almost empty and the fields bare; a plague swept through the land. The first to fall were the very young and the old, but before long illness was also reported in those previously healthy and in their prime. The priests of Asclepius struggled to keep up with the demand, but even they were at a loss as to how to heal the sick with any certainty. Rumour began to spread that Thebes was once more under a curse.\n\nYou pour over the scrolls that the Queen has called you in to examine with a grimace. With the ongoing losses and depleting coin supply in the treasury with which to buy in supplies to keep the nation fed, this will be a hard winter. The Queen will not like the news, particularly given her already fragile state with her brother missing for the past few weeks. It's clear she's close to breaking point.\n\n*page_break\n\nYou're deep in thought as to who you may be able to appeal to for aid to lighten the blow of your analysis, when Creon storms into the room. He has not bothered to change from his travel stained clothing and his look becomes even more sour at the sight of you. Despite his words to his sister to the contrary, you can't help but feel he resents Jocasta calling on you for advice. Perhaps he's even come to believe you may one day be even more, an issue if he has plans for one of his own children to ascend to Thebes' throne in the future.  \n\n\"Creon!\" Jocasta cries, leaping up from the couch to throw her arms around him, before taking a step back to slap him hard across the side of his face. \"How could you?! You've been missing for weeks! With everything that's been happening I worried... Just where [i]have[/i] you been?\"\n\n\"Delphi,\" he snaps, rubbing at the red mark on his cheek. \"Where you should have long since gone for advice, if you hadn't been too [i]distracted[/i] to notice.\"\n\nHe glares your way once more, naming you the root of the problem. \n\n*page_break\n\n\"What is this foolishness Creon?\" His sister's expression darkens. \"We were going through the records as you arrived. Do not accuse me of not being well aware of the seriousness of this situation.\"\n\n\"Oh, I'm [i]sure[/i] you were going through the records.\" His expression twists in disbelief. \"But that still doesn't change the fact that this is no ordinary threat we face, that much should be obvious and the Pythia has confirmed it.\"\n\nHis words settle like ice in the pit of your stomach. Does the Oracle ever give anything but bad news in these times?\n\nCreon continues, not waiting for a response. \"The Pythia had much to say. Our land is cursed as we did not seek to avenge the death of King Laius, despite having adequate time to do so.\"\n\nAgain, that dark look in your direction. What did the man [i]think[/i] you were up to? You hope the recent news hasn't unhinged his mind. \n\n\"Her words were this: If we ever hope to clear the blight from this land, we must hunt down the murderer and drive him from Thebes. If we fail, our kingdom will surely fall into ruin.\"\n\t\n*page_break\t\n\t\nThe Queen backs away, hand at her throat as she pales. \"My late husband's murderer is here? In Thebes? Then you are right, we must find them! No wonder the gods are angry with us with his killer running free in the kingdom he once ruled.\"\n\nCreon sits tiredly, although his eyes still simmer with anger. \"Although the Pythia's wisdom often comes couched in riddles, this seems as clear as the sun in the sky. I agree, the perpetrator must be found both for Laius' sake, and ours.\"\n\n*set tiresius \"yes\"\n\n\"We should send for Tiresias,\" Creon speaks up. \"I know he is in the city. Surely he will be able to help us in this matter.\"\n\t\t\n\"The blind prophet?\" Jocasta muses. \"Perhaps. His reputation as a seer is second to none and he has advised the rulers of Thebes in the past. There's no reason to believe he won't help us now.\"\n\t\n*set tiresius \"yes\"\n\n*choice\n\t#Agree. You have little else to go on at this point and it is important to catch the killer as quickly as possible.\n\t\tTheir words carry sense. As a prophet of Apollo himself, Tiresias may have more to add to the Pythia's warnings. \n\t\t\n\t\t\"We must catch the fallen king's killer at any cost. I will send for him immediately,\" you agree.\n\t\t\n\t\tThough you'd only sought to spare Creon the task of organising a search for the prophet after his long journey, the glare he gives you says it is not appreciated.\n\t\t\n\t\tWith a sigh, you exit the room to find a messenger. There will be time enough to set her jealous brother straight later.\n\t\n\t\t*goto tarrive\n\t\t\n\t#Advise caution. The riddles of seers can be difficult to interpret and may lead us in the wrong direction. It may be best to consider other options.\n\t\t*set tprophet \"disagree\"\n\t\t\"What other options?\" Jocasta cries in desperation. \"I have brought this ill down on the kingdom by not visiting vengeance on my husband's murderer. It is my fault and I mean to fix it any way possible. It has been over a year since his death, and the trail will likely have gone stone cold. Left to our own devices we may never find them. But if you have a better option, please speak now.\"\n\t\t\n\t\t*fake_choice\n\t\t\t#\"I don't have one,\" you sigh reluctantly. \"Send for him, but I think you should take care when you listen to what he has to say.\"\n\t\t\t\tShe nodes with a rueful smile. \"Yes, I have had experience with the words of prophets. It is wise advice Oedipus.\"\n\t\t\t\t\n\t\t\t\t\"I will see that the seer is fetched,\" Creon says shortly. Giving you one last glare, he strides from the room.\n\t\t\t\t\n\t\t\t#\"I think perhaps we should conduct our own search. We can always send for the seer at a later time,\" you reason.\n\t\t\t\t\"Your wise council is to suggest we wait?\" Creon sneers. \"Sit here and let our remaining stores of grain run dry?\"\n\t\t\t\t\n\t\t\t\t\"Of course not,\" you growl back. \"But we have methods at our disposal for tracking down criminals within our own realm do we not?\"\n\t\t\t\t\n\t\t\t\t\"And just how successful do you think that will be?\" Creon argues. \"The investigation at the time of his death yielded nothing concrete. Given the elapsed time it will only be more difficult to continue the search now.\"\n\t\t\t\t\n\t\t\t\t\"But now we have an advantage. We know where the killer is...\"\n\t\t\t\t\n\t\t\t\t\"Stop it. Both of you!\" The Queen places herself between the two of you. \"Look at yourselves, arguing like this! Tiresias will be sent for. That is my decision.\"\n\t\t\t\t\n\t\t\t\t\"I will have him sent for immediately sister,\" Creon nods with a triumphant smile, before striding from the room. \n\t\t\t\t\n\t\t*choice\n\t\t\t#\"I don't think your brother likes me.\"\n\t\t\t\tThe Queen waves your concerns off, still distracted by the news ill news Creon has brought. \n\t\t\t\t\n\t\t\t\t\"He's just tired and worried, as we all are. Tempers are bound to be a bit thin at this time. He'll be fine, you'll see.\"\n\t\t\t\t\n\t\t\t\tDespite her reassurances, you're not so sure.\n\t\t\t\t\t\t\t\n\t\t\t\t*goto tarrive\t\t\t\n\t\t\t\n\t\t\t*selectable_if (escape != \"yes\") #\"I think your brother might have some strange ideas about us. We should set him straight before it causes further problems.\"\n\t\t\t\t\"The wrong idea about what?\" She tries to look genuinely confused, but you notice a slight blush colouring her cheeks.\n\t\t\t\t\n\t\t\t\t\"Well he was your chief advisor, but I have been spending a lot of time with you over the past few months...\"\n\t\t\t\t*fake_choice\n\t\t\t\t\t#\"Maybe he's um... jealous?\" you reply, uncertain whether you should ask the Queen directly if she's in love with you. Particularly at this time.\n\t\t\t\t\t\tShe shakes her head, perhaps deliberately misunderstanding. \"Creon can just be a bit hot-headed at times and he's obviously tired from the journey. Don't concern yourself, he's said on many occasions he doesn't resent my seeking your advice at times. This is a trying time for all of us, but if he continues to snap and snarl I'll have words to him.\"\n\n\t\t\t\t\t\tDespite her reassurances that Creon doesn't see you as a threat, given the behaviour you just witnessed you're not so sure.\n\t\t\t\t\t\t\n\t\t\t\t\t#\"And I've been wondering... Do you love me?\" you finish in a rush. Better to ask openly. At least you hope it is.\t\n\t\t\t\t\t\t\"Love you?\" Jocasta gapes at your bold statement. \"I... well... this really isn't the time to discuss such things Oedipus.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"But do you? I've been meaning to ask you for some time. Particularly now that Creon is going to take exception to it, we really should set him straight if there's nothing there.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Oh Oedipus, I-I just don't know any more! Everything is just too much after the news today. I thought I was almost at terms with Laius' death, but now hearing what Creon has to say...\" Her face twists with guilt. \"Please leave me, I need time to think.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tShe turns her head, waving you towards the door. What a mess this is turning out to be.\n\t\t\t\t\t\t\n\t\t\t\t*goto tarrive\n\t\t\t\n\t\t\t#Keep your council for now. There will be time enough to deal with Jocasta's jealous brother later. \n\t\t\t\tThat Creon doesn't like you, your certain. But now with the ill news he's brought is not the time to broach it. The Queen looks teary and distressed, the news stirring up old feelings of loss, and new ones of guilt. \n\t\t\t\t\n\t\t\t\tInstead you comfort her as best you can, as Jocasta buries her head in your shoulder and cries.\n\t\t\t\t\n\t\t\t\tYou'll help them catch Laius' killer, then hopefully the rest will smooth over into place. \n\t\t\t\t\n\t\t\t\t*goto tarrive\n\t\t\t\t\n\t\t\t\t\n\t\t\t\n\n\n*label tarrive\n\n*page_break\t\n\n*text_image ch5oedipusqueen.png center Chapter Five: The Seer and the Queen\t\n\t\t\n\nCreon paces the room in restlessly, the Queen seated on chair nearby. \n\n\"What could be keeping the man?\" he growls. \"The messenger spoke to him hours ago.\"\n\n\"He'll be here,\" Jocasta's voice is tight with tension, barely less impatient than her brother but wiser than him not to openly show it. \"You cannot hurry one of Apollo's chosen, you know that. Now be still.\"\n\n*if (fate = \"visitor\")\n\t\"And [i]him,\"[/i] Creon rounds on you. \"Why is [i]he[/i] here. I'm your advisor Jocasta, not him.\"\n\t\n\t\"I'm getting sick of your foolishness Creon,\" Jocasta snaps. \"Tired or no, you'll respect my decision to have Oedipus here. After all, he rid the country of the Sphinx as Laius would have wanted and his learning makes him a valuable aide besides. He stays.\"\n\n\tMumbling something under his breath, her brother turns away to resume his pacing.\n\t\n*if (fate != \"visitor\")\n\t\"And [i]him,\"[/i] Creon rounds on you. \"Why is [i]he[/i] here. This is a matter for our family Jocasta, not him.\"\n\t\n\t\"I'm getting sick of your foolishness Creon,\" Jocasta snaps. \"Tired or no, you'll respect my decision to have Oedipus here. You agreed to make him my advisor after all. Now control your tongue and let him advise me or leave.\"\n\n\tCreon looks daggers at you but falls silent before resuming his pacing once again. \n\n*page_break\n\n*goto_scene part9king\n\n\n\n\t\n\t\n*label king\n*achieve kingthebes\n*set status \"King of Thebes. Married to Queen Jocasta.\" \n\nThe news of the marriage was met with cheer and great celebrations by the people; overjoyed to have the one who had freed them from the monster continue to rule as their king. \n\nA wedding arranged in short order, a celebratory affair lasting for three days. With the roads now open, food was imported from the neighbouring kingdoms to replace crops damaged by the Sphinx and a large feast was held for the people complete with music and dancing. Where ever you walked, people would throw violets and roses in your path to express their desire for a long happy marriage to come. The one thing marring the festivities was the absence of your mother, whom you'd begged not to come; fearful of the possible repercussions. \n\nYour rule began as a happy one loved by your people. Though initially with her reservations, Queen Jocasta proved to be intelligent and pleasant company. Slowly with time, she warmed to your presence becoming fast friends rather than just co-rulers of Thebes. \n\nTrue to Jocasta's words, her brother Creon turned out to be an able advisor, showing far more sense than you'd have given him credit for given your initial meeting. His advice was often valuable, having extensive knowledge of the city and trade routes essential to allowing Thebes to prosper once more. \n\n*page_break\n\nAs the months travelled by, you found yourself kept more than busy by your duties. It was a happy time, one where you could sometimes forget the circumstances that had originally lead you here. Though sometimes you considered that another visit to the Pythia may be wise, there never seemed to be enough time to do so. Besides, as the land prospered it seemed as if ill-fortune had truly left your side. \n\nOne summer evening weeping with joy, Jocasta revealed she was pregnant. Having no children, she'd long since despaired of ever having a family of her own. Her appeals to Hestia had finally been answered. Months later twin boys were born. The first to arrive was blue eyed Eteocles, named for the truly glorious miracle he was. The second with the dark eyes of his mother was given the fierce name of Polynices for the impressive volume of his cries.\n\nTime seemed to fly by, the two growing to children becoming ever more skilled at getting into all sorts of mischief before you knew it. Although not without sibling rivalry, to your relief they remained good friends, even helping each other in their escapades. It seemed despite being twins, their fate as rulers once day was one thing you didn't have to lose sleep over. \n\n\nBut in keeping with the threads of your life, this small respite of happiness was not to last...\n\n*page_break\n\nReports came in slowly, isolated events without any obvious connection: The loss of a field of wheat to locusts, a farmer whose goats no longer produced milk, a flock of sheep whose lambs were all found dead. But with time rather than resolving, the blight only appeared to worsen. \n\nWhen it seemed as if the situation could not get any worse with the city's grain stores almost empty and the fields bare; a plague swept through the land. The first to fall were the very young and the old, but before long illness was also reported in those previously healthy and in their prime. The priests of Asclepius struggled to keep up with the demand, but even they were at a loss as to how to heal the sick with any certainty. Rumour began to spread that Thebes was once more under a curse.\n\n*page_break\n\nPouring over scrolls detailing the latest losses, you grimace. This will be a hard winter. Your tally indicates precious little money left in the coffers to afford to buy food from the neighbouring cities, not nearly enough to keep your people adequately fed. \n\nYou're deep in thought as to who you may be able to appeal to for aid or favours owed, when Creon storms into the room. He has not bothered to change from his travel stained clothing and wrings his hands in distress. \n\n*page_break\n\n*set childrentxt \"yes\"\n\n\"Famine and plague stalks the land, but this is no ordinary threat we face,\" Creon's voice is exhausted. You wonder at just how far he has ridden to get here with this news without resting.\n\n\"Creon!\" Jocasta cries, handing your youngest daughter Ismene to a servant before throwing herself into his arms. \"I was so worried, where have you been?\"\n\n\"Delphi.\" \n\nThe word settles like ice in the pit of your stomach. From Creon's demeanour, it appears the Pythia has more ill news to grant you.\n\n*fake_choice\n\t#\"You should not have left without telling us you planned to consult the Pythia,\" you growl, angry he has taken it upon himself to do so without your permission. \n\t\t\"And what would you have me do instead? Stay here tallying numbers like yourself while the blight only continues to worsen?\" Creon rounds on you angrily. \"The gods are surely angry with us, that much is plain enough for anyone to see. It is my right as a citizen of Thebes to travel to Delphi to seek a way to lift the curse on this land.\"\n\t\t\n\t\t\"Well since my own advisor has seen fit to go to Delphi without consulting me, did you actually find any information of worth?\" you snap.\n\t\t\n\t\tCreon frowns at your tone but continues. \"Actually yes, the \n\t#\"And for what purpose did you go there?\" you ask, forcing the words from your throat. \n\t\n\t\t\"The blight on this land is getting worse. The gods are surely angry with us, that much is plain enough for anyone to see. I went to Delphi to seek answers as to how the curse on this land can be lifted.\"\n\n\t\t\"And?\" you prompt.\n\t\t\n\t\t\"The\n\t#Wait in silence for him to give you his news.\n\t\tNot trusting your voice, you hold your peace, waiting for Jocasta's brother to continue. \n\t\t\n\t\t\"The \nPythia had much to say. Our land is cursed as we did not seek to avenge the death of King Laius, despite having adequate time to do so. If we are ever to have a hope of clearing the blight from this land, we must hunt down the murderer and drive him from Thebes. If we do not, our kingdom will surely fall into ruin.\"\n\t\nThe Queen has picked up Ismene once more and is holding her protectively. \"You mean to say my late husband's murderer is here? In Thebes? Oedipus, we must find them! Whoever committed that heinous deed has run free all these years without punishment. No wonder the gods are angry with us.\"\n\nCreon sits tiredly, his message delivered. \"It seems likely the killer is here does it not? Although the Pythia's wisdom often comes couched in riddles, this seems as clear as the sun in the sky. I agree, the perpetrator must be found both for Laius' sake, and ours.\"\n\n*set tiresius \"yes\"\n\n*choice\n\t#\"You are right. We must catch the fallen king's killer at any cost.\"\n\t\tYour wife smiles gratefully, but Creon looks troubled. \"The problem is, it's been many years since the old king's death with no solid evidence ever found of who was responsible for his death. How will be go about a search?\"\n\t\n\t\t\"Send for Tiresias,\" Jocasta speaks up. \"He will surely be able to help us in this matter.\"\n\t\t\n\t\t\"The blind prophet?\" Creon muses. \"Yes, I think you are right sister. We should send for him right away, there's little time to lose.\"\n\t\t\n\t\tTheir words carry sense. As a prophet of Apollo himself, he may have more to add to the Pythia's warnings. \n\t\t\n\t\t\"Fine. See that he comes.\"\n\t\t\n\t\t*goto_scene part9king\n\t\t\n\t\t\n\t#\"Let's not be hasty. I say we get more information before deciding on how to act.\"\n\t\t\"How can you say that?!\" Jocasta cries, looking at you in horror. \"We have brought this ill down on the kingdom ourselves, so caught up in our blessings that we did not seek to makes matters right. We must do this Oedipus. If we cannot lift the curse soon, the people will surely revolt in desperation.\"\n\n\t\t\"Please calm down,\" you soothe. \"It will be looked into, but we must take care to get things right. You well remember how my own prophecy from the Oracle turned out. These things are not always as they first seem.\"\n\t\t\n\t\t\"So you suggest we just wait?\" she snaps. \"Sit here and let our remaining stores of grain run dry?\"\n\t\t\n\t\t\"Send for Tiresias,\" Creon speaks up. \"Perhaps he can tell us the truth of the matter.\"\n\t\t\n\t\t\"The blind prophet?\" Jocasta muses. \"Yes, I think you are right brother. And he may be able to tell us were to begin our search besides. It's been years since Laius' death. How else are we to find them?\"\n\t\t\n\t\t*page_break\n\t\t\n\t\tShe fixes you with a determined stare. \"I want my ex-husband's killer found Oedipus. You will do this, or I will have him sent for myself.\"\n\t\t\n\t\tYou've no doubt she means it. It seems you have little choice in the matter regardless of your own thoughts on the matter. \n\t\t\n\t\t*fake_choice\n\t\t\t#Agree. Their words make sense. \n\t\t\t\tIt seems as if you could use his help. As a prophet of Apollo himself, he may have more to add to the Pythia's warnings.\n\t\t\t\t\n\t\t\t\t\"Ok my wife. We'll call a messenger to summon Tiresias to Thebes.\"\n\t\t\t\t\n\t\t\t\n\t\t\t#Agree under protest. You wish you could conduct your own investigation free from seers and oracles for now. \n\t\t\t\t*set tprophet \"disagree\"\n\t\t\t\t\"Don't be foolish husband,\" Jocasta snaps. \"With the fate of Thebes in our hands, is your pride so great that you'd refuse the help of those that could give it? This is not solely your decision, it is also mine. Tiresias will be summoned to see if he can assist with lifting the curse from my city.\"\n\t\t\t\t\n\t\t\t\tWith Creon backing her decision up, and no strong points to make against fetching the seer to Thebes, in the end you ill-naturedly agree. \n\t\t\t\t\n\t\t\t\n\t\t\t#Voice your concerns about getting an unknown prophet involved, but acquiesce to your wife's wishes since she insists. \n\t\t\t\t*set tprophet \"disagree\"\n\t\t\t\t\"Tiresias is a seer or great renown and has visited Thebes many times over the years,\" Jocasta scolds. \"Just because [i]you[/i] haven't met him, doesn't mean he is an [i]unknown[/i] prophet of uncertain skill.\"\n\t\n\t\t\t\tWith her brother Creon backing her points up against any protest you could make, finally you give up the agreement as a lost cause and let her call for a messenger to summon Tiresias to Thebes. \n\n\n\t\t*goto_scene part9king\n", "part9king": "*if (chooseagain = \"yes\")\n\t*goto chooseagain\n\n*page_break\n\n\n\n*if (fate != \"king\")\n\t*goto seerarrive\n\n\t\n*text_image ch5oedipus.png center Chapter Five: The Seer and the King\t\n\t\n\nYou pace the room in impatience, your wife and her brother seated on couch nearby. [i]What could be keeping the man?[/i]\n*if (tprophet = \"agree\")\n\tWeeks you'd waited for Tiresias to arrive while your city slipped closer to disaster. Despite your initial enquiries, all attempts to find a lead on Laius' death, had so far failed. The trail that you'd hoped may lead you to the killer, appears to have long since gone cold.\n\n\t\"Stop pacing Oedipus, he's being escorted into the city as we speak. Wearing the soles off your shoes will not make him arrive any faster,\" Jocasta scolds, although you notice she twitches a foot back and forth in impatience. \n*if (tprophet != \"agree\")\n\tThe weeks had ticked by while you desperately sought Laius' murderer yourself, but to no avail. All leads you'd investigated had led to trails that were stone cold, and all the while the city slipped closer to disaster.\n\n\t*fake_choice\t\n\t\t#Despite your initial reservations, you're now willing to take the help of anyone, even Tiresias.\n\t\t\t*set tprophet \"agree\"\n\t\t\tWith your options dwindling, you're now ready to accept the seer's help... If he ever gets here! \n\t\t\t\n\t\t\t\"Stop pacing Oedipus, he's being escorted into the city as we speak. Wearing the soles off your shoes will not make him arrive any faster,\" Jocasta scolds, although you notice she twitches a foot back and forth in impatience. \n\n\t\t\t\n\t\t#You're still unhappy about having your decision over ruled by Jocasta and Creon. \n\t\t\tAll you need is more time. Time that is being wasted by waiting on the pleasure of a seer who seems to be rather tardy about attending the royal family. \n\t\nYou see a glint of bright eyes and bushy black hair peeking through a crack in the doorway. \n\n\"Eteocles!\" you growl, the wait thinning your patience. \"What did I say?\"\n\nThe boy pushes the door open a fraction further, and you see Polynices in the shadows behind him. At only five years of age, the twins seemed to be experts at seeking out mischief. You fleetingly wonder if you caused your own parents such trouble at their age.\n\n\"But Dad, we want to see!\" he whines. \"It's not fair, why do we have to stay in our rooms?\"\n\n*page_break\n\nThe quieter of the two Polynices, creeps forward emboldened by his twin. \n\n\"Erasmus says that Tiresias can understand the chirping of birds,\" he breathes, eyes wide with wonder. \"I want to ask him to talk to the wren that's nesting outside my window.\" \n\n\"Never mind that!\" Eteocles cuts him off, bouncing up and down in excitement. \"Erasmus says he's lived for hundreds of years, and part of that as a maiden because he hurt some of Hera's snakes! I think she's turned him back now though,\" he adds as an afterthought, sounding slightly disappointed. \n\nYou're really going to have to have a word to their tutor if he's filling their heads with flights of fancy instead of the learning you'd instructed. \n\n*page_break\n\nJocasta intercedes sternly. \"Boys, we have important grown up things to discuss and Tiresias is a busy man. Go to your room as you were asked, or I'll tell Erasmus you're more interested in having an extra lesson instead of going to the river later.\"\n\n\"Aww Mum...\" \n\n\"Last chance. One... Two...\" She holds up her fingers. \n\n\"C'mon Erasmus, let's go.\" Polynices tugs his brother back into the hallway by his sleeve. \n\nTheir complaints echo in the corridor until a door slams shut. You catch Creon hiding a grin behind his hand despite the seriousness of the gathering. Maybe the boys take after his side of the family after all. \n\n*page_break\n\n\n\n\n\n*label seerarrive\n*if (fate = \"king\")\n\t\"My King, my Queen. The\n*if (fate != \"king\")\n\t\"My Queen, the \nprophet Tiresias.\" The guard escorting the seer nods his head in deference, before standing to the side of the doorway to allow his charge through. \n\nYour first impression of Tiresias is that of an old man. Although partially hidden under the hood of a thick blue cloak, his hair and beard are long and snowy white, while his face is lined with age. Despite his cloudy white eyes that gaze unseeingly ahead, he holds his cane out in front of him almost as a formality; his movements sure and with none of the stiffness that age usually brings. \n*if (fate = \"king\")\n\tPerhaps there may be something to the tutor Erasmus' tales after all.\n*if (fate != \"king\")\n\tPerhaps there is some truth after all to the whispers that his life had been extended past what was natural by the gods.\n\nJocasta rises from her seat, guiding her guest to a chair by the table and bidding him to rest. \"You have my thanks Tiresias for coming to our aid so quickly.\" \n\n*if (fate != \"king\")\n\t*goto tspeak\n\nThe man does not respond to her welcome, instead turning blind eyes towards you. \n\n\"So I was summoned, and I have obeyed. Why is it you asked me here King Oedipus?\"\n\n\n*choice\n\t*selectable_if (tprophet = \"disagree\") #\"First tell me why I should trust what you tell me? Convince me you can do as you say.\"\n\t\t\"Oedipus!\" Jocasta hisses, looking at you in horror. \"Tiresias is a prophet of Apollo. You must not speak to him in this way.\"\n\t\t\n\t\t\"It is quite ok,\" the seer responds levelly. \"When your kingdom is at stake such questions are sensible to ask. Less wise is the question you have for me. For I know the answer and wish I did not.\"\n\t\t\t\t\n\t\t\"Evasion,\" you snort, turning back towards Jocasta. \"I told you this was a bad idea.\"\n\t\t\n\t\t\"You wish to find the murderer of King Laius. It is what you were instructed to do by the Oracle of Delphi after all,\" the prophet replies slowly, causing you to pause. \n\t\t\n\t\t*label knowq\n\t\t\n\t\tOutside of Jocasta, Creon and yourself; no one else knows of the Pythia's words. Your wife has blanched to the colour of milk, obviously as shocked by Tiresias' display of power as yourself. Creon on the other hand simply tilts his head thoughtfully. Did he have such faith in the seer's abilities? Or is there something he hasn't told you.\n\t\t\n\t\t\"That question is why we called you here seer. If you know the answer, tell us,\" \n\t\t*if (tprophet = \"disagree\")\t\n\t\t\tyou demand.\n\t\t*if (tprophet != \"disagree\")\t\n\t\t\tyou ask.\n\t\t\n\t\t*label insultseer\n\t\t\n\t\tYour guest sighs uncomfortably. \"I say again Oedipus, cease your search. This is one truth you are better off leaving buried.\"\n\t\t\n\t\t\n\t\t*choice\n\t\t\t#\"This is absurd. I say you will not tell us, because you do not know.\"\n\t\t\t\t\"I call you a charlatan,\" you pronounce, getting to your feet and pointing at the seated prophet. \"You evade and misdirect with your falsely given words of wisdom using Apollo's name to substantiate them. I am surprised he stands for such insolence!\"\n\t\t\n\t\t\t\tFor the first time anger breaks though the seer's calm demeanour. \"The murderer of Laius is a man who is both brother and father to his children, and son and husband to his mother.\" \n\n\t\t\t\t*label riddlespeak\n\t\t\t\t\n\t\t\t\t\"You talk in riddles old man, speak clearly,\" you growl. \n\t\t\t\t\n\t\t\t\t\"Then on your head be it,\" Tiresias snarls. \"Hear me and heed my words well King Oedipus, for I name you Laius' killer.\"\n\t\t\t\t\n\t\t\t\t*label accuse\n\t\t\t\t\n\t\t\t\t\"How dare you accuse me of such a thing!\" Fury rises to the surface at the gall of the man to respond to your accusation with one of his own. \"I never even met the late King, much less had anything to do with his death!\"\n\t\t\t\t\n\t\t\t\t*label dare\n\t\t\t\t\n\t\t\t\t\"It was bandits,\" Jocasta whispers behind you, all trace of colour gone from her features. \"Just bandits! Oedipus is a hero. A good and noble king. He would never have done such a thing.\"\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t\"Guards! Throw this man out!\" you scream in fury. \"I don't want to hear another word from his lying mouth.\" \n\t\t\t\t\n\t\t\t\tSoldiers enter the room gingerly hearing the anger in your voice. They help Tiresias up more gently than he deserves and lead him from the room. \n\t\t\t\t\n\t\t\t\tTiresias' voice floats down the hall. \"I warned you Oedipus, but you would not listen. Your pride and anger will be your downfall. Mark my words.\"\n\n\t\t\t\tThen the door bangs shut, and he is blessedly gone. \n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tJocasta sits shaking, hands clasped over her heart. \"Such evil words. But it cannot be, for you are the only child of Polybus and Merope. There is no possible way his riddle could apply to you.\"\n\t\t\n\t\t\t\t*label jocastayell\n\t\t\n\t\t\t\t\"You had a child once Jocasta,\" Creon speaks softly, but his eyes bore into your own. \"A boy. Remember?\"\n\t\t\t\t\n\t\t\t\t\"This is foolish Creon; how dare you bring that up and now at all times!\" Jocasta rounds on him in fury. \"You know full well that I chose Laius' life over the boy's though it hurts my soul to this day. He is dead. There is no more to say about it.\"\n\t\t\t\t\n\t\t\t\t\"Perhaps. Perhaps not. His death was not by your hand and what was the prophecy again? That your firstborn son would grow to kill his father and wed his mother?\"\n\t\t\t\t\n\t\t\t\t\"Shut up Creon! The boy was left on the mountain to die. He is dead. My Laius is dead. There is no such thing as fate that cannot be averted. Stop tormenting me!\" your wife is weeping now. Her brother's words stirring up old wounds. \n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#Round on Creon angrily. You knew he was planning something. Now you're sure he wants to depose you and become king.\n\t\t\t\t\t\t*set creontreason \"yes\"\n\t\t\t\t\t\tThe secretive trip to Delphi. Pushing to have Tiresias sent here as soon as possible. You knew there was something amiss, it's likely he's been in league with the seer the entire time. Her brother it seems is no longer content to be just her advisor. He wants you out the way to pave the way for his own coronation.\n\t\t\t\t\t\n\t\t\t\t\t\t\"It was [i]you![/i] You set this up, didn't you? How could you do such a thing, not only to me, but to your own sister!\" you snarl advancing on Creon. \n\t\t\t\t\t\t\n\t\t\t\t\t\tHis eyes widen. \"What? I never. Jocasta please believe me. I had no idea what Tiresias was going to say. But now that it's out, we need to be sure or the whole of Thebes will fall to the wrath of the gods.\"\n\t\t\t\t\t\n\t\t\t\t\t\t\"You snake! Still trying to sow the seeds of doubt. I'll have you tossed in a cell and tell them to throw away the key!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"No!\" Jocasta jumps from the couch, eyes still red with tears. \"What are you doing?! My husband and my brother fighting in this way! We can resolve this. I will send for the servant who took my baby boy away. He will tell you both the truth of it.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou can see how much it cost her to say those words. This is something she'd obviously never wanted to revisit.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t#You take a calming breath. \"Fine. Have the servant fetched and we will get to the bottom of the matter.\"\n\t\t\t\t\t\t\t\tJocasta sighs as the situation defuses. Even Creon backs down. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"I am sorry sister. I really do hope this is no more than idle speculation,\" he whispers.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#\"Have the servant brought here now. Afterwards, we will discuss Creon's treason,\" you snap.\n\t\t\t\t\t\t\t\t\"Oedipus, stop this!\" Jocasta pleads. \"Creon is my older brother, he's looked after me since we were children. There is no way he would think to hurt me in this way out of malicious intent.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou shake your head, refusing to hear her words. Creon should be grateful he isn't in a prison cell already.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#\"I want Creon locked in a cell. He is plotting against me Jocasta!\" you growl.\n\t\t\t\t\t\t\t\t\"No!\" She draws herself up, eyes flashing. \"I will not have my brother thrown in a cell for simply trying to help Thebes. I will not let you.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tShe continues more gently. \"I know him Oedipus. He can be lazy and dig his heels in as well as any mule when the mood suits him, but he is never malicious. Let me send for the servant. Once he confirms my story, Creon will apologise to you [i]and[/i] to me. Won't you brother?\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tCreon takes a calming breath. \"Nothing would make me happier sister. I only hope this is proved to be naught more than idle speculation.\"\n\t\t\t\t\t\t\n\n\t\t\t\t\t\t*goto servant\n\t\t\t\t\t\n\t\t\t\t\t#\"Wait a minute, why am I only just hearing about this Jocasta?\" you ask worried at what she might be hiding.\n\t\t\t\t\t\t\"And what would you have thought of me?\" she sobs, her grief evident. There's no hint of deceit in her words as she continues. \"A mother who sends her own child away to die on a riddle given to her husband by a seer. And look at yourself? Perhaps I never even needed to. After all, your own father was not felled by your hand despite the Pythia's words.\"\n\t\t\t\t\t\n\t\t\t\t\t\t \n\t\t\t\t\t\t*if (prophecy = \"father\")\n\t\t\t\t\t\t\tHer words strike a chord. How little she knew if she thought you'd escaped that fate. It is more than possible that your absence had caused his death as surely as if you'd killed him yourself.\n\t\t\t\t\t\t*if (prophecy = \"no\")\n\t\t\t\t\t\t\tHer words sit uneasily with you, unsure that you may still be destined to carry out the words of your prophecy.\n\t\t\t\t\t\t*if ((prophecy != \"father\") and (prophecy != \"no\"))\n\t\t\t\t\t\t\tThe thought calms you somewhat. She's right, perhaps the pronouncements of seers were not always correct or could at least be avoided.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tYour wife steels herself, coming to a decision. \"I will put an end to this madness by sending for the servant who took my baby boy away. He will tell you both the truth of it.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tCreon takes a calming breath. \"Nothing would make me happier than to find this is naught more than idle speculation sister.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto servant\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t#\"Everyone just calm down.\" You try to rein in your temper. \"There's an easy way to prove it wasn't me. We will fetch the man who told you the babe was dead.\"\n\t\t\t\t\t\tJocasta sobs, not wanting to relive that day again; but at your insistence gives you the name of the servant who took her child away to die on the mountain top. \n\t\t\t\t\t\t\n\t\t\t\t\t\tYou summon a guard, telling him to bring the man before you as soon as he can be found.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto servant\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t#\"Creon is right, we must have the truth of it else there will always be rumours of my guilt,\" you say shakily, still rattled by the seer's words. \"We must send for the man who can tell us what happened that morning so long ago.\"\n\t\t\t\t\t\tJocasta sobs, not wanting to relive that day again; but at your insistence gives you the name of the servant who took her child away to die on the mountain top. \n\t\t\t\t\t\t\n\t\t\t\t\t\tYou summon a guard, telling him to bring the man before you as soon as he can be found.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto servant\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\n\t\t\t#\"If you know something Tiresias say so. Otherwise I'll let the people of Thebes know you're to blame when they starve!\"\n\t\t\t\tFor the first time anger breaks though the seer's calm demeanour. \"Do not threaten me Oedipus, you will not like the outcome.\"\n\t\t\t\t\n\t\t\t\t\"And leaving my city to starve is all the better? What is wrong with you that you could think such a thing Tiresias?\" you snarl straight back. \n\t\t\t\t\n\t\t\t\t\"You want to know whom it is you seek?\" Tiresias replies in a low menacing voice, clearly furious at your tone. \"The murderer of Laius is a man who is both brother and father to his children, and son and husband to his mother.\" \n\n\t\t\t\t*goto riddlespeak\n\t\t\t\t\n\t\t\t\t\n\t\t\t#\"Please Tiresias. If you know something, you must tell us. If we cannot catch the killer in time, Thebes will be destroyed.\"\t\n\t\t\t\tThe seer hesitates. \"The knowledge you wish for cannot be undone once heard. I implore you once more to give up your search.\"\n\t\t\t\t\n\t\t\t\t\"I beg you to tell me seer. I need to know.\"\n\t\t\t\t\n\t\t\t\t\"Very well. I can tell you that you seek a man who is both brother and father to his children, and son and husband to his mother,\" the prophet replies evasively. \n\n\t\t\t\t*label nosense\n\t\t\t\t\n\t\t\t\t\"I don't understand,\" you exclaim in frustration. \"Please seer, tell me plainly what it is you mean by these words.\"\n\t\t\t\t\n\t\t\t\t\"I tried to warn you, but you will not listen. Fine. If you must have an answer, I will tell you outright and on your head be it,\" Tiresias growls. \"Heed me King Oedipus, the shade of the old king came to me and spoke of his unhappy death. I name you Laius's killer.\"\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#As the enormity of what he has just said sinks in, anger sparks brightly. How dare he accuse you of such a thing!\n\t\t\t\t\t\t*goto dare\n\t\t\t\t\t\t\n\t\t\t\t\t#Sit back in shock. \"Why would you accuse me of such a thing?\"\n\t\t\t\t\t\t\"Because it is true,\" Tiresias sighs. \"Do you think this is the news I wanted to give you? I warned you against pursuing an answer, but you wouldn't listen.\"\n\t\t\t\t\t\n\t\t\t\t\t\t\"Your riddle makes no sense seer. It cannot be me. I am an only child, son of Polybus who passed away in his sleep. You have to be mistaken,\" you reply breathlessly. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Of course he is mistaken!\" Your wife rises from her seat. \"How could you say such things Tiresias? My husband was killed by bandits! Everyone says so. My husband is a hero and has always been a good and noble king. There is no way he would have done such an evil thing. I think you should leave.\"\n\t\t\t\t\t\n\t\t\t\t\t\t*goto creontalk\n\t\t\t\t\t\t\n\t\t\t\t\t#\"You think it was me?\" You recoil, suddenly uncertain as the memory of your own prophecy surfaces. \n\t\t\t\t\t\tYou shake your head, trying to clear the evil thoughts away but remaining unsettled. Surely it could not be true? You'd tried so hard to make sure that particular fate could never come to pass. After all, your mother is far away in Corinth... Isn't she?\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Of course it is not you!\" Jocasta rises from her seat angrily. \"How dare you say such things Tiresias. King Oedipus is married to me, not to Merope of Corinth. Besides he is a good man, I could not believe he could have had anything to do with my Laius' death.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Sister, perhaps we should listen to him. Some say he is never wrong,\" Creon cautions.\n\t\t\t\t\t\n\t\t\t\t\t\tHer clenched hands tremble as she swings around to face her brother. \"You would stand against him as well? What cause has Oedipus ever given you to doubt his character?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I never said I'm sure of his guilt, only that we should consider the seer's words.\" Creon pales at her anger, holding out his hands in a calming gesture. \"Sister, please sit down and we will discuss it further with Tiresias.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"No! No more talk of this,\" Jocasta growls. \"Tiresias you will leave my house. [i]Now!\"[/i] \n\t\t\t\t\t\t\n\t\t\t\t\t\tSoldiers enter the room gingerly, unused to hearing the Queen speak in such a way. They quickly help Tiresias up from his chair with nervous movements and lead him from the room. \n\t\t\t\t\n\t\t\t\t\t\tJocasta falls back into her seat shaking, hands clasped over her heart. \"Such evil words to set my brother and husband against each other so. It cannot be Creon, for Oedipus is the only child of Polybus and Merope. There is no possible way his riddle could apply to him. I don't know how or why, but Tiresias is wrong.\"\n\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto jocastayell\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t#\"That is a heavy accusation to make Tiresias. What proof do you have I did such an evil deed?\"\n\t\t\t\t\t\t\"Proof?\" the seer barks harshly. \"Just my words, but that was what I was asked here for was it not? You know my reputation Oedipus; my words should be enough.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"It was bandits,\" Jocasta rises from her seat. \"Just bandits! Oedipus is a hero. A good and noble king. He would never have done such a thing. I think you should leave now.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*label creontalk\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Sister, perhaps we should listen to him. Some say he is never wrong,\" Creon cautions. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"You think me a murderer Creon?\" your voice drops dangerously as you face your brother in law.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"That is enough!\" Jocasta screams. \"Tiresias you will leave my house. [i]Now!\"[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\n\t\t\t\t\t\tSoldiers enter the room gingerly, unused to hearing the Queen scream in such a way. They help Tiresias up more gently than he deserves and lead him from the room. \n\t\t\t\t\n\t\t\t\t\t\tJocasta falls back into her seat shaking, hands clasped over her heart. \"Such evil words to set my brother and husband against each other so. It cannot be Creon, for Oedipus is the only child of Polybus and Merope. There is no possible way his riddle could apply to him. I don't know how or why, but Tiresias is wrong.\"\n\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto jocastayell\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\n\n\t#\"My country is cursed and will surely fall to ruin if we cannot find the one who murdered King Laius.\"\n\t\tThe seer sighs, dropping his head. \"I feared as much. Listen to me Oedipus, do not press me for an answer. It contains facts you will not wish to know.\"\n\t\t\n\t\tYou blink in confusion. \"What do you take me for Tiresias? The fate of my city is at stake, and the killer of its previous king still roams free. Of course I want to know.\"\n\t\t\n\t\t*label impossibleq\n\t\t\n\t\tThe prophet nods sadly. \"It is an impossible predicament you have been placed in, is it not? Very well, I can tell you that you seek a man who is both brother and father to his children, and son and husband to his mother.\"\n\t\t\n\t\t*goto nosense\n\n\n\t#\"We seek your wisdom for interpreting the Pythia's words.\"\n\t\tHe listens as you tell him what the Oracle had told your advisor.\n\t\t\n\t\tThe seer sighs, dropping his head. \"This I do know, but I beg you not to press me on it. This is something you do not wish to know. Give up your search.\"\n\n\t\t\"Just give up?\" you exclaim. \"Tiresias, my people are dying because the murderer of their previous king roams free. I cannot simply look the other way.\"\n\t\n\t\t*goto impossibleq\n\t\n\t#\"As a seer should you not already know the answer to that?\"\n\t\tYou ask the question \n\t\t*if (tprophet = \"disagree\")\n\t\t\twith a voice full of derision. How right you were to question the need to summon him.\n\t\t*if (tprophet != \"disagree\")\t\n\t\t\ttentatively, confidence in his abilities wavering if he must ask you such a question.\n\t\t\t\n\t\t\"Of course,\" the prophet sighs. \"I guess I wished just for once I was wrong.\"\n\n\t\tHe picks at his blue cloak stalling. \"You wish me to tell you where to find the murderer of King Laius. After all, the Oracle of Delphi has already told you this is essential to lifting the curse that afflicts your lands.\" \n\t\t\n\t\t*goto knowq\n\t\t\t\n\t\n\t*selectable_if (tprophet = \"disagree\") #\"You have my advisor and wife to thank for asking you here, not I.\"\n\t\t\"Oedipus!\" Jocasta hisses, appalled at your rudeness towards a visitor of such importance. \"Tiresias is a prophet of Apollo as well as out guest. You must not speak to him in this way.\"\n\t\n\t\tTiresias decides to take the higher road and ignore the insult. \"It is a wise ruler who knows when to listen to the advice of those close to him.\"\n\t\n\t\t\"Please Tiresias,\" your wife speaks up seeing the look of contempt on your face. \"Will you help us? We must find the one who murdered King Laius if Thebes is to survive the curse which afflicts us.\"\n\t\t\n\t\t\"Queen Jocasta, your heart is in the right place. However please do not ask me to tell you the answer to that question. For your sake, it is best to abandon the search.\"\n\t\n\t\t\"I told you this was a bad idea wife. Look at the way he dances around the question, never having to give a straight answer. I say to you seer, if you know the identity of Laius' killer, why won't you tell us?\" you mock.  \n\t\t\n\t\t*goto insultseer\n\t\n\t\n\t\n\t\n\t\n*label servant\t\n\n*page_break\n\t\nA balding man in a plain brown tunic creeps tentatively into the room flanked by two guards. His eyes are wide with terror at being brought before Thebes' \n*if (fate = \"king\")\n\trulers\n*if (fate != \"king\")\t\n\tqueen\nunder guard. \n\n\"Be at peace good man,\" Jocasta offers him a weak smile. \"You are not in any trouble, we simply have some questions to ask.\"\n\nThe servant\tnods stiffly, still on guard although his stance relaxes slightly. \n\n*page_break\n\n\"You have served my household faithfully for many years, have you not?\" Jocasta's voice is carefully neutral.\n\n\"Of course my lady,\" his voice is steady although his hands are clenched tightly in the folds of his tunic. \n\n\"Tell us Amyntas, what happened the morning King Laius summoned you to my bedchamber?\"\n\nAmyntas' brown eyes widen in shock as he backs up a few steps, colliding with the guards standing behind. \"N-Nothing my lady! Whoever says otherwise is lying!\"\n\n*page_break\n\nJocasta closes her eyes for a moment, breathing too fast. \"There is nothing to fear Amyntas. I know you were sworn to secrecy, but I release you from that oath. It is of the utmost importance that you answer me honestly.\"\n\nThe servant's eyes search the room looking for an escape and finding none. \n\nVoice shaking, he speaks. \"Your husband called me to your chamber my lady, to take the babe you'd delivered that very morning.\"\n\n\"So he was not born dead as the people were told?\"\n\n\"No my lady. He was alive.\" Amyntas speaks fearfully, obviously concerned about where the line of conversation is going. \"Your husband bade me to take him to a mountain and leave him there for the gods to take into their embrace if they so willed.\"\n\n*page_break\n\nJocasta visibly relaxes despite the hastily muffled gasps from the guards at the pronouncement. \n\nTurning to her brother she continues. \"See it is as I told you. My firstborn son is dead.\"\n\nBut Creon turns back to the shaking servant. \"You told my sister the babe was dead did you not?\"\n\n\"Yes.\" His voice is little more than a whisper.\n\nCreon forges on. \"And you saw this with your own eyes? Swear by the gods that you know for certain that the child joined his ancestors.\"\n\n\"Brother stop this,\" Jocasta rounds on him in alarm. \"We have our answer, now let sleeping dogs lie.\"\n\n\"I... well...\"\n\n\"Speak up man!\" Creon snarls. \"Tis a simple question. Swear by the gods that you saw the babe was dead.\"\n\nAmyntas' shoulders slump in defeat. \"I cannot.\"\n\n*page_break\n\n\"What?\" Jocasta's voice rises in pitch. \"You promised me Amyntas. Do not torment me with lies. Stop this now!\"\n\n\"I took the child, but I could not kill him. His feet were bound so tightly as to draw blood and the poor thing was screaming in pain. I loosed his bonds and took him to the healer Nysa. She had naught to do with this, I never told her who the child was...\" he trails off.\n\n\"Where did she take him?\" you ask voice shaking. \n\n\"Corinth,\" he sighs. \"She took him to Corinth.\"\n\n*page_break\n\nThe world spins, as you lean back into the chair heavily. It couldn't be true, could it? Pieces of your life flit through your mind. The rumours about your birth, the Oracle's pronouncement of your curse, even the scars upon your legs that your mother had always said came from a fall when you were young enough not to remember. \n\n\"This proves nothing!\" \n*if (fate = \"king\")\n\tyour wife \n*if (fate != \"king\")\n\tthe Queen\t\nsobs into her hands. \"There are hundreds of babes born every year in that city. Mine could have been any one of them. To think a nameless child would be adopted by a royal family? Well it beggars belief...\"\n\n\"Jocasta,\" you whisper, interrupting her grief-stricken rambling.\n\n*fake_choice\n\t#\"What did Laius look like?\"\n\t\tBut \n\t\t*if (fate = \"king\")\n\t\t\tyour wife\n\t\t*if (fate != \"king\")\n\t\t\tthe Queen\n\t\tlooks blankly ahead, ignoring your question. \"My poor child, all this time I thought he was dead...\"\n\t\n\t\tCreon gives his sister a worried look. \"A big man some ten years older than my sister. Bushy brown beard, fierce grey eyes. Favoured the spear he did, in fact \t\n\t\t*if (chariotburial = \"valley\")\n\t\t\this spear was found broken beside him on the valley floor near Eleusis.\"\n\t\t*if (chariotburial != \"valley\")\n\t\t\this spear was found near him on the trail from Eleusis where he died.\"\n\n\n\t#\"Where was the old king killed?\"\n\t\n\t\tBut \n\t\t*if (fate = \"king\")\n\t\t\tyour wife\n\t\t*if (fate != \"king\")\n\t\t\tthe Queen\n\t\tlooks blankly ahead, ignoring your question. \"My poor child, all this time I thought he was dead...\"\n\t\n\t\tCreon gives his sister a worried look. \"Eleusis. His body was found\n\t\t*if (chariotburial = \"valley\")\n\t\t\tbattered and bruised as if he had been in a fight on the valley floor near Eleusis.\"\n\t\t*if (chariotburial != \"valley\")\n\t\t\ton the trail from Eleusis. He had been struck down by a sword through his heart.\"\n\n\t\t\t\nMemories flash through your mind. A fight to the death with a chariot driver determined to kill you on a deserted precarious trail near Eleusis.\n\n[i]\"It was me...\"[/i]\n\n*page_break\n\n\n*if (fate =\"king\")\n\tJocasta looks at you in disbelief. \"You can't mean that! You couldn't have killed Laius... I couldn't have married...\"\n\n\tWith a heart wrenching scream she runs from the room towards your bedchamber. You hear the bolt thumping into place.\n\n\t\"Jocasta wait!\"\n\n\n*if (fate !=\"king\")\t\n\tJocasta looks at you in disbelief. \"You can't mean that! You couldn't have killed Laius... I loved... No, I couldn't have...\"\n\n\tShe screams, a high keening sound that tears at your soul. \n\t\n\n\n[i]...I didn't know.[/i]\n\n[i]......It was self-defence.[/i]\n\n[i].........Oh light! What have I done![/i]\n\n*page_break\n\n*if (fate !=\"king\")\n\t*goto findouttruth\n\nYou hammer at the door; your world having dissolved into madness. \"Jocasta, unlock this door. Please!\"\n\nThere's a sharp scream of pain that cuts off abruptly; a thud as something heavy hits the floor.\n\n*page_break [i]\"Jocasta! Please, by the Light. No!\"[/i]\n\nCreon sprints down the hall, guards close behind. \n\n\"We've got to get in there.\" You pant with exertion. \"Jocasta... I think she...\"\n\nHer brother nods to the guards who set about ramming the door until with a crack, the hinges come loose. Pushing the door inward with a strength you didn't know you possessed, you leap inside. \n\nSprawled on the ground, \n*if (fate != \"king\")\n\tthe Queen\n*if (fate = \"king\")\n\tyour wife \nlies with lifeless eyes. Through her heart is a silver engraved dagger. The same one given to her by King Laius; your father. \n\nRed blood spreads through the pale silk of her dress, pooling on the marble tiles beneath her body. Try as you might, you can't look away. The image burns your eyes. You can't see this any longer, there must be some way to make it stop!\n\nPulling the dagger from your mother's chest, you take a deep breath. Positioning the blade above your eyes...\n\n\"Oedipus, Stop!\" Creon's voice sounds distantly.\n\n*choice\n\t*selectable_if (tragedy != \"yes\") #Listen to Creon.\n\t\t*goto listencreon\n\t\n\t#There is only one way to end this.\n\t\tYou feel a hand gab at your shoulder, but it's too late. Plunging the knife into your eye you scream, the pain causing your knees to buckle. But you're not finished. With the last of your strength, the knife rams home once again. \n\t\t\n\t\tEverything goes black.\n\t\t\n\t\t*if (health > 1)\n\t\t\t*set health 2\n\t\t\n\t\t*page_break\n\t\t\n\t\t*goto blindnessending\n\t\t\n\t\t\n\t\t\n*label blindnessending\t\t\n\nYou feel something thumping on your chest. \n\n[i]\"Oedipus damn you! Wake up!\"[/i] \n\nThe voice is distant, and the black comforting. You allow yourself to sink. \n\n[b]...Thump...[/b]\n\n[i]\"You don't get off this easily. Wake up![/i]\n\nGasping for breath, you cough harshly. Bruised ribs screaming with the effort. Warmth drips down your face but you can't see it. [i]You'll never see anything again.[/i]\n\n\"Why did you bring me back?\" you rasp. \"I killed my father. And light! My mother...\" \n\nA piece of cloth is wound around your head over your eyes tightly. You welcome the pain. \n\n*fake_choice\n\t#\"At least by dying perhaps the gods will be satisfied and spare my children the shame. You cannot ask me to live, the prophecy needs to be fulfilled.\"\n\n\t\t\"The prophecy mentioned nothing of your own death Oedipus. Only that you should be driven from Thebes.\" Creon's voice sounds almost gentle at your shoulder. \"Your death will serve nothing and no one but yourself. Furthermore, by trying to circumvent the gods' will once more, you may well bring doom upon the very children you wish to save. Live Oedipus. It is the only way.\"\n\n\t\tYour fingers fumble once more for the dagger, but find only marble slicked in blood. The realisation dawns that even should your hands close around its hilt, you lack the strength to plunge it into your own heart now that you've listened to Creon's voice of reason. \"If I cannot die, then I must leave. Have someone escort me from Thebes. Carry me in a cart if need be. But I must leave today.\"\n\n\t\t\n\t#\"Besides, you know the Furies will show me no mercy though I never knew at the it was my father who died on that mountain road. They hunt down any who are responsible for a parent's death. Better for me to die here by my own hand, than suffer the torments they will have planned for me.\"\n\t\t\"Perhaps, perhaps not.\" Creon's voice sounds almost gentle at your shoulder. \"The prophecy mentioned nothing of your own death Oedipus. Only that you should be driven from Thebes. But even if death is your ultimate fate, taking a dagger to your heart at this moment will serve no one but yourself. Please think about this! By attempting to circumvent the gods' will once more, you may well bring doom upon all of us; including your own children. Live Oedipus, and leave Thebes as the Oracle prophesised. It is the only way to save us all.\"\n\n\t\tYour fingers fumble once more for the dagger, but find only marble slicked in blood. The realisation dawns that even should your hands close around its hilt, you lack the strength to plunge it into your own heart now that the initial shock has passed. \"Very well. Have someone escort me from Thebes. Carry me in a cart if need be. But I will leave today.\"\n\n\n\nCreon pats you on the shoulder. \"Only in death may some of us truly find peace, but I hope that perhaps we may find a sliver of happiness ourselves before we meet again in the underworld.\"\n\n*page_break\n\n\n*text_image epilogueoedipus.png center Epilogue\n\n\n\n*set status \"A wandering Prophet.\"\n\nAn old blind man wanders the roads near Colonus, stick tapping the ground before him. \n\n\"It's this way father.\" Antigone takes her father by the arm, guiding him to a sheltered seat under the agora. \n\n\"My daughter, you should not still be here with me,\" Oedipus chides in a shaky voice. \"It's long since time you settled down for a life of your own. Guiding your old father around the kingdom is a fate I would spare you.\"\n\nIt's an old argument, one that has been repeated over and over for years. \"Yes of course father. Perhaps soon.\"\n\n\"Soon. Soon! Always with you it is soon though I know you do not mean it.\" He smiles faintly. \"You have my stubbornness I fear.\"\n\nAntigone chuckles. \"That may well be. They say it runs in the family.\" \n\n*page_break\n\nOedipus' mood darkens. \"Yes, that they do. On that subject my daughter, and do not lie to an old man; is there news of my sons?\"\n\nAntigone hesitates, combing fingers through long black hair restlessly. \"They still fight fath
