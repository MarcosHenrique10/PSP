er. As much as I cannot abide Creon, he did have somewhat of a stabilising influence on them. But now it is whispered that they do not listen to anyone anymore, not even him. I fear it will come to war.\"\n\nOedipus slumps. \"The curse of our family still dogs us I'm afraid. I can only hope that the Fates are kinder to them than they were to me.\"\n\n\"Well at least we can stay here for a time,\" Antigone quickly moves to the subject. \"King Theseus has extended his welcome for as long as we need.\"\n\n\"Hah! Extended his welcome to Apollo's prophet you mean,\" Oedipus snorts. \"Who would have thought the gods would replace my lost sight with another?\" \n\nLeaning heavily on his daughter, Oedipus the seer limps back to the palace one final time. \n\n\n*image prophet.png center Ending: Oedipus the Prophet\n\n\n\n*set status \"The blind prophet of Apollo.\"\n\n*achieve blindending\n\n*goto_scene ending\n \n\n*label listencreon\n\n\"Oedipus you must not! The prophecy, do you wish to bring doom to your entire family?\"\n\n\"What...?\" [i]Oh Light Jocasta, I'm so sorry![/i]\n\n\"Think of your children Oedipus! Put the knife down! The prophecy talked of your exile being necessary to free Thebes, not your death. Do you wish to anger the gods by trying to take fate into your own hands once again?\"\n\nYour eyes are still fixed to your fallen wife. \"I can't... my father... my mother! How could I live after this?\"\n\nGently Creon takes hold of the dagger, and you let it slide from your numb fingers. \"You must.\"\n\n*page_break\n\n*set status \"Exiled King of Thebes.\"\n\nStill in shock, Creon leads you from the palace pushing a purse of gold into your hands and hoisting you up onto a solid brown gelding. \"Oedipus, I know this was not entirely of your doing, but you must live with the consequences. You need to leave Thebes today in order to release us from the curse that has been visited upon you. I will see to it that your children are cared for, and my sister gets the burial she deserves.\"\n\n*label nomarryend\n\nHe gives you a final sad smile. \"Only in death may some of us truly find peace, but I hope that perhaps we may find a sliver of happiness ourselves before we meet again in the underworld. Now ride!\"\n\n\nHe slaps your horse on the rump, who leaps forward into a gallop almost unseating you from the saddle. Gripping the gelding's mane, you give him his head; uncaring where he runs as long as it leads away from your previous life.\n\n*page_break\n\nThe horse has long since slowed to a plod along the mountain pass, breathing hard from his headlong gallop along the roads. You'd not dared let him slow until the city was out of sight. The rocky formations on this part of the trail seem very familiar for some reason. \n\n\"Of course, this is where the Sphinx asked me her riddles,\" you mutter. \"Her story didn't end well either.\"\n\nAlthough grief still clouds your mind, it is starting to become mixed with anxiety. Where can you go? Word will soon spread of your dishonour. Unless there is some way to atone, none will welcome you. Even life on the road as you'd lived before holds no appeal. Surely now that the truth is known, the Furies will hunt you down to enact their rough justice. You halt at the crossroads, filled with despair.\n\n\"Is this how it ends?\" you shout to the sky. \"Why force me to live, just to let me die once again?\"\n\nWithout prompting, the horse pulls the reins from your hands; taking the road to the left. \n\nTowards Delphi. \n\nWhat have you to lose? You let him have his way. \n\n*page_break\n\nThat night your dreams are troubled and full of madness. You run, hunted by women who strike at you from the darkness with whips. Their screams tear at your soul, while the light from their eyes burns your body to ash. You cry out as the pain becomes unbearable.\n\n*fake_choice\n\t#\"I didn't know!\"\n\t\n\t#\"It wasn't my fault!\"\n\t\n\t#\"I'm sorry!\"\n\t\n\t#\"Please let me atone!\"\n\t\nYou wake with a start, trembling and soaked with sweat. The shadows surrounding your campfire twist and writhe as if alive. A thin red line runs the length or your arm where one of the whips had struck. Shivering with more than cold, you huddle as close to the fire as you can without being burned.\n\nThe next day, you saddle the gelding, weary from the previous day's ride and lack of sleep. Though the mark on your arm has faded away, leaving you to wonder at whether it was no more than a nightmare, you daren't tarry. Every shadow seems alive: Watching you, waiting. Climbing stiffly into the saddle, you kick the horse into a run, fleeing from the clearing. \n\n*page_break\t\n\nThe days and nights all seemed to blur into to one as you continued your journey towards Delphi. Barely stopping to eat or sleep due to the certainty that your steps are hunted, you'd pushed doggedly\n*if (sphinxalive = \"no\")\n\tonwards towards the tall white columns that now rise before you. \n*if (sphinxalive != \"no\")\n\tonwards. Last night when the shadows had become particularly close, you'd fancied that the Sphinx had swooped in through the night and scattered them to the wind... At least that's what you thought had happened. In your delirious state it could have been no more than a vivid dream. Regardless of what the truth of the matter is, you're relieved to finally see the tall white columns come into view, reaching towards the sky. \n\t\n[i]The Sanctuary at Delphi. You've made it.[/i]\n\nYour mount, as tired as you from the incessant pace stumbles, falling to his knees. Without the strength to balance yourself, you fall into blessed darkness.\n\n*page_break\n\n\"Oedipus.\"\n\nYou hear a familiar deep cultured voice as your eyes flutter open to a darkened room. A cloying sweet smell is thick in the air.\n\n\"Ah, you're back with us I see.\"\n\nA bowl of water is pressed to your mouth, cool against your parched lips but you push it away. \n\n\"Where am I?\n\n\"In the temple of course.\" The speaker comes into view and to your shock, you recognise the Pythia herself. \"Hours have passed since you arrived, and I feel you have something of urgency to ask.\"\n\n\"Your prophecy. It came to pass.\"\n\nShe sighs, helping you sit up. \"I know. And a cruel one it was too. But that is not a question. Ask.\"\n\n*choice\n\t#\"I am accursed for what I did. It goes against every law of nature. Is there any way I can atone for my shame?\"\n\t\t\"This is a hard thing you ask Oedipus, for your line has been cursed to this fate. I fear no mortal can offer you the redemption you seek.\"\n\t\t\n\t\t*label furies\n\t\t\n\t\t\"Then there is no hope.\" The weight of her words is crushing. \"I will live out my days in torment, not that I have long to live if those goddesses have their way.\"\n\t\t\n\t\tShe shakes her head. \"I did not say there was no hope, only that it was difficult. You may end up in a worse predicament that you currently are by pursuing it.\"\n\t\t\n\t\t\"How so?\" you reply incredulously. [i]Nothing[/i] could be worse than what you've been through. \n\t\t\n\t\t\"You must petition the gods directly.\"\n\t\t\n\t\t*label pythia\n\t\t\n\t\t\"But I've prayed for redemption...\" \n\t\t\n\t\t\"No Oedipus,\" the Oracle replies sternly. [i]\"Directly.\"[/i]\n\t\t\n\t\tYou gape. \"B-But is that even possible?\"\n\t\t\n\t\t\"Perhaps. Perhaps not.\" She tilts her head. \"All will depend on the will of the gods, as always.\"\n\t\t\n\t\t\"What must I do?\" you ask tentatively.\n\t\t\n\t\t\"Take my hand.\" \n\t\t\n\t\t*goto olympus\n\t\t\n\t\t\t\t\n\t\n\t#\"I am haunted day and night by the Furies who seek to drive me into madness. How might I convince them to cease their hunt?\"\n\t\t\"Alas, once summoned, few can call off those hunters. Certainly no mortal can do this task.\"\n\t\t\n\t\t*goto furies\n\n\t#\"I am tormented for acts that that I never wished to commit. I just want to live in peace.\"\n\t\tShe raises an eyebrow. \"But still, you did commit them. It seems it is the will of the gods that you walk the path set before you, where ever it may lead.\"\n\t\t\n\t\t*if (fate != \"king\")\n\t\t\t\"But I tried! It seems that I was fated to marry Jocasta, yet that did not come to pass. How can you say that it is the will of the gods?\"\n\t\t\t\n\t\t\tShe shakes her head. \"That was not the prophecy I gave you, Jocasta's was another and for her and Laius alone. Perhaps they misunderstood, or perhaps you were granted some measure of mercy by your actions. It does not negate the fact that your father died because of your actions.\"\n\t\t\n\t\t\"But it is unfair. What have I done to deserve such a life? Answer me this Pythia?\"\n\t\t\n\t\t\"It is not for us to question the judgements passed down by the gods, nor is it my place to justify them. This I fear, is something you must ask them directly.\"\n\t\t\n\t\t*goto pythia\n\n\n\t\n\t\t\n\n\t\t\n*label olympus\n\n*page_break\n\t\t\nYou reach out to take her outstretched fingers thinking to be led to another room, but suddenly everything goes blindingly white. You squint against the glare, unable to see. \n\t\t\n\"A moment,\" a voice booms, shaking the ground beneath your feet. \"Sometimes I forget how fragile you mortals are.\"\n\nThe speaker removes a crown of light, shining as brightly as the sun and places it beside a throne of grey stone where its radiance dims to a manageable glow. Now visible, you realise the man... No not a man, he must be a god... standing before you is as tall as a giant. The hair upon his head is cropped closely, while by contrast his beard is long and curled, shining as if gilded with gold and spilling over a robe of a brilliant white. He regards you with eyes the colour of the summer sky which gleam from a face tanned to a bronzed glow. Music chimes from all around, almost as if created from the air itself. \n\n\"Apollo,\" you whisper. It must be him. None other match the appearance of the being before you. \n\nHe inclines his head, before seating himself on the throne. \"Yes Oedipus. My priestess brought your spirit here. Do not fret, your body lies safely below in my temple... for now at least. I believe you wish to try and avert your fate once more? Have you not learned the consequences from the last time you ran from it?\"\n\n*fake_choice\n\t#Speak with deference, appealing to his mercy. \n\t\tYou bow your head respectfully. \"I beg your mercy Apollo. I was mistaken to try and flee from my fate. I only did so out of love for the ones I regard as my parents, Polybus and Merope.\"\n\t\t\n\t\tThe god sighs. \"The punishment dealt out was apt Oedipus. But you don't even know why your line was cursed do you?\"\n\t\t\n\t\tKeeping your eyes carefully downcast, you shake your head. \n\t\t\n\t\t\"Well you are owed that at least,\" he rumbles. \"To understand, we must talk of your real father Laius.\"\n\t\n\t#Respond fatalistically. If you had not run, surely your fate would have been the same.\n\t\t\"Perhaps,\" Apollo nods in agreement. \"But the fact still remains that you tried to cheat the will of the gods. You should have known this was never going to result in a happy ending.\"\n\t\t\n\t\t\"But I was charged with murdering my own father!\" you cry. \"Surely you cannot expect me to accept that without question. I thought I was a son of Polybus and as far as I know he was a good man.\"\n\t\t\n\t\tThe god looks down upon you thoughtfully. \"Yes, Polybus has earned an honoured place in the afterlife, you have that at rights. It does not excuse your behaviour, but perhaps you are owed an explanation at least. To do that, we must talk of your real father, Laius.\"\n\t\n\t#Respond angrily. What have you done to deserve this fate? You never would have willingly done the things that transpired.\n\t\tThe ground trembles as if with an earthquake as Apollo's face clouds with fury. \"You seek to challenge our judgements mortal? Then you are more stupid than brave.\"\n\t\t\n\t\t\"I am what I've been made to be,\" you retort. \"I just wish to know why I have been punished so. Is there no way for me to change your mind?\"\n\t\t\n\t\tThe rumbling subsides although his mouth remains set in anger. \"You wish to know why your family was cursed Oedipus? Well I guess you are owed that much at least. Listen to the deeds committed by your father, and weep that you were ever born into that cursed line.\"\n\n\n*page_break\n\t\t\nThe air shimmers as you're transported to Pisa. People mill around you, paying no more mind than they would to a shade. \n\nApollo points to a brown-haired man, laughing as he plays at fighting a much younger boy with red curls. Their sticks click as they whip them back and forth like swords. \n\n[i]\"Laius,\"[/i] you whisper. Although many years younger than when you'd met him on the road, there's no mistaking the man for anyone else. \n\n\"Indeed,\" Apollo agrees. \"And that boy with his is Chrysippus, son of King Pelops. Do you know your father lost Thebes to Amphion and Zethus for many a year? He likely would have been killed if not for Pelops' generosity in sheltering him until his forces could be gathered to take back his city.\"\n\n*page_break\n\nThe scene shifts, sliding into a more familiar setting as you recognise the main courtyard of your previous home in Thebes. Laius has the younger Chrysippus by the back of the neck, dragging the screaming boy inside. The door slams shut with a bang and the scene dissolves. \n\n\"I won't make even you watch what happens next Oedipus. Suffice it to say, that Chrysippus never lived to see the sun set. Your father repaid Pelops' hospitality with treachery and destroyed his family. It was decreed that he should suffer a similar fate. His death at the hands of his son. Poetic is it not?\"\n\n*fake_choice\n\t#\"That is truly awful. I never knew.\"\n\t\t\"Well now you do and can see why it must be.\"\n\t\t\n\t\t\"But Jocasta had naught to do with this. Why was she made to suffer?\" you reflect sadly.\n\t\t*if (fate != \"king\")\n\t\t\t\"Surely someone else could have done the deed. It was cruel to make her give up her only child.\"\n\t\t\n\t\t\"She married the one who committed the deed. As Pelops' family was destroyed, so was Laius' in retribution.\" \n\t\t\n\t\n\t#\"But you have punished me, as well as him. I was not even born.\"\n\t\tApollo shrugs. \"The sins of the father, the sins of the son. That is the way it must be.\"\n\n\n\"Help me.\" You blink, surprised to have spoken up so boldly. \"Please. Though things can never be right, what will my death at the hands of the Furies serve? Surely I can atone in other ways.\"\n\nApollo leans back, hand on his jaw. \n*if (oraclegift = \"poor\")\t\t\n\t*achieve failgift\n\t\"I don't see why I should. You've never honoured me much in the past.\" \n\t\n\tA wreath of wilted laurel leaves appears in his hand and you recall the miserly gift you left at Delphi on your first visit. \n\t\n\t\"This is out of my hands anyway. I do not control the Furies; your only hope would be to appeal to Athena or Hades to try and intervene on your behalf. Since travelling to the underworld would be... unwise for one still living; I suggest Athena, although I warn you she will not be easy to convince.\"\n\t\n\tHe stands. \"I will take you there Oedipus, but do not expect much help from me. I will leave it to Athena to be your judge.\"\t\n*if (oraclegift != \"poor\")\n\t*achieve successgift\n\t*if (oraclegift = \"average\")\n\t\t\"Perhaps I have a mind to help you after all. You did remember to place a gift at my sanctuary at your first meeting.\" \n\n\t\tA wreath of shiny laurel leaves and a handful of coins appear briefly in his hands before dissolving. \n\t*if (oraclegift != \"average\")\n\t\t\"Perhaps I have a mind to help you after all. You did think to honour me with a generous gift at my sanctuary on your first visit.\" \n\n\t\tA wreath of shiny laurel leaves and an intricate broach appear briefly in his hands before dissolving.\t\n\t\t\n\t\n\t\"Unfortunately, I do not control the Furies. Your best hope would be to appeal to Athena or Hades to try and intervene on your behalf. Since travelling to the underworld would be... unwise for one still living; I suggest Athena, although I warn you she will not be easy to convince.\" \n\t\n\tHe stands. \"Come with me.\"\n\t\n*page_break\n\nDazzling towers and spires of white reach to the sky from streets paved with a reflective surface that reminds you of burnished copper. Looking over the edge of the road makes you dizzy, the earth laid out below like a map. \n\n\"Careful,\" Apollo warns. \"The Furies will be the least of your worries should you take one more step.\"\n\nHastily you back away towards safety. \n\nAs you walk, something tickles your memory. \"Your voice, it seems familiar somehow. When the Sphinx asked her riddles were you...\"\n\nYour guide smiles secretively. \"And do you think I would tell you yes, even if I was there? I've no interest in earning Echidna's enmity. Best that you believe it was nothing more than your imagination.\"\n\n*page_break\n\nHe leads you onward, up a flight of broad steps into a large temple inscribed with laurel leaves and owls.\n\n\"Sister, I've brought someone to see you.\"\n\nA woman in a floor length navy dress edged in gold, turns at your approach. Keen, dark eyes peer from her olive features, while her raven hair is piled in elaborate twists about her head. \n\n\"I know.\"\n\nFrom behind a column, the three women of your nightmares step into view. Clad in short hunting dresses and calf skin boots; in place of hair snakes coil restlessly. They regard you with eyes filled with pitiless fury. \n\n\"We will take it from here.\" Tisiphone takes a step towards where you stand, her voice a low hiss.\n\n*page_break\n\n\"Aht,\" Athena scolds, causing the Fury to pull up short. \"This is my house, and I wish to hear why it is that my brother thinks this mortal is worthy of my time.\"\n\n*if (oraclegift = \"poor\")\n\tApollo opens his hands wide, discharging his duty. \"You know as much about Oedipus' case as I, I'll warrant. I leave him in your hands for judgement.\"\n\t\n\t\"He has already been judged,\" Alecto growls stepping forward to stand beside her sister. \"You know the rules. He murdered his father. That means he is [i]ours.\"[/i]\n*if (oraclegift != \"poor\")\n\tApollo takes a step forward to stand beside you as Tisiphone scowls darkly. \"You know of Oedipus' case, I'll warrant Athena, his family has suffered in accordance with his father's actions. He comes here seeking your justice however, a way to take back control of his life and atone for his family's misdeeds. He cannot do that if these three have their way.\"\n\t\n\t\"You have no right to interfere,\" Alecto hisses, walking over to stand beside her sister. \"He murdered his father, of that there can be no doubt. That means he is [i]ours.\"[/i]\n\t\n\t*set jury +10\n\t\n\"And yet here he stands in my room of judgement,\" Athena muses. \"I will summon a court to hear his case. His previous deeds will determine his fate.\"\n\n\nTisiphone and Alecto return to the shadows beside their remaining sister Megaera, helpless to intervene while you stand within Athena's sphere of influence. Their eyes promise a reckoning should the trial not go your way however. The prospect is quite frankly terrifying. \n\n*page_break\n\nAthena closes her eyes, lips moving silently. From the doorway you just entered, twelve figures dressed in deep hooded cowls that prevents you seeing their faces, file into the courtroom.\n\n\"These are people from your own land Oedipus. I have convened them to help pass judgement on your case. None can say this is not fair.\" The figures take up a vigil on either side of the hall, waiting silently.\n\n*if (fate = \"king\")\n\t\"So Oedipus. You stand accused of not only killing your father, but going on to wed your own mother. Serious crimes indeed. Why should I spare you?\"\n*if (fate != \"king\")\n\t\"So Oedipus. You stand accused of killing your father, as serious a crime as could ever be committed. Why should I spare you?\"\n\n*choice\n\t#\"It wasn't my fault. I had no choice but to act out the path fated for me.\"\n\t\t*set jury -10\n\t\t\"No choice?\" She lifts an arched eyebrow in disbelieve. \"Of course you had a choice Oedipus. After all, you chose to run from your fate rather than face it. Additionally, you failed to hunt down Laius' murder immediately as you should have, which would have let you know that the circumstances of your birth were not as it first seemed. You are not as innocent as you believe I'm afraid.\"\n\t\t\n\t\t*goto next\n\t\n\t#\"There is no excuse. My family has erred greatly. I only seek forgiveness and the ability to atone.\"\n\t\t*set jury +10\n\t\tAthena nods her head in acknowledgment. \"It takes a strong will to ask for forgiveness for their part in events, even when one thinks they have been wronged themselves. I will take that under consideration with my judgement.\"\n\t\n\t\t*goto next\n\t\t\n\t#\"The punishment was unfair. I never should have been involved in it.\"\n\t\t*set jury -10\n\t\tThe Furies rumble in anger, however Athena remains calm. \"You say that you understand better than the gods what punishment was fit? You suffer from pride Oedipus, this may yet be your downfall.\"\n\t\n\t\t*goto next\n\t\t\n\t*selectable_if (fate != \"king\") #\"I tried to avoid my fate but failed. As proof, I never married my mother as was foretold. That has to count for something.\"\n\t\t\"That shows you were allowed some freedom of choice, however you still killed your father none the less. Your line has a debt that needed to be repaid. How can I be sure that justice has been served?\"\n\n\t\t\"I have suffered, so has my mother. Please, see that neither of us wanted this fate and show me mercy.\"\n\t\t\n\t\tShe nods slowly. \"I will take it into consideration.\"\n\t\t\n\t\t*goto next\n\n\n\t*selectable_if (chariotdriver != \"kill\") #\"I did not know who my father was at the time of his death. Besides, he attacked first and fell into the valley. I did not run him through with my sword.\"\n\t\tAthena shakes her head. \"You know full well that the Furies make no such distinction with regards to your guilt in this matter. Whether it was intentional or not makes little difference to them. This is how it has always been.\"\n\t\t\n\t\t\"Still.\" She holds up a hand silencing Alecto's murmured agreement. \"I will take it under consideration in your judgment.\"\n\t\t\n\t\t*set jury +10\n\t\t\n\t\t*goto next\n\t\t\n\t\t\n\t\t\n\t\t\n\t\t\n*label next\n\t\nAthena walks to the end of the room and takes a seat on a polished marble chair. Apollo joins her, standing by her side. \n\n*page_break\n\n\"I think we should go back to your first time at Delphi. \n*if (threatendriver != \"yes\")\n\t*set jury +10\n\tYou'd been used to the life of a prince. You could have threatened the driver into carrying \n\t*if (commonercart != \"yes\")\n\t\tyou, or ignored him completely as one beneath your station; yet you did not.\"\n\t\n\t\n\t\tShe pauses thoughtfully. \"I believe this shows you have the ability to empathise with others and are not so full of your own self-worth to neglect the needs of others. It is a point in your favour.\"\n\t*if (commonercart = \"yes\")\t\n\t\t*set jury -10\n\t\tyou; yet you did not.\"\n\t\t\n\t\tShe pauses thoughtfully. \"However, I must say your pride is still a failing. You felt yourself above the lowly driver who took you up the mountain to Delphi. If you were to be returned to your station, why should your subjects respect a man who does not think them worthy of his time?\"\n\t\n\t\n*if (threatendriver = \"yes\") \n\t*set jury -20\n\tYou though to threaten a man who would not have been able to defend himself against your sword. The cart driver was only trying to feed his family by doing an honest day's work.\"\n\n\tShe pauses thoughtfully. \"You showed a lack of empathy, and a selfishness that prevented you from seeing things from another's point of view. This does not reflect well on your character.\"\n\n\nYou go to speak, but she holds up her hand for silence. \t\n*if ((commonercart = \"yes\") or (threatendriver = \"yes\"))\t\n\t*if (splitwood = \"\")\n\t\t\"Not yet I think. There is more to be said.\"\n\t*if (splitwood = \"no\")\n\t\t*set jury -10\n\t\t\"You will find it hard pressed to defend your character Oedipus. After all, you repaid the innkeeper's kindness by abandoning the task she set you. One must always return the gift of hospitality, something both you and your father appear to forget.\"\n\t*if (splitwood = \"yes\")\n\t\t*set jury +10\n\t\t\"However, you have tempered that fault by remembering to repay hospitality; something your never learned to be mindful of. You could have walked away from the inn without cutting the wood, yet you did not.\"\t\n\t\n\t*if (stealcloak = \"yes\")\n\t\t\"And\n*if ((commonercart != \"yes\") and (threatendriver != \"yes\"))\t\n\t*if (splitwood = \"\")\n\t\t\"Not yet I think. There is more to be said.\"\n\t*if (splitwood = \"no\")\n\t\t*set jury -10\n\t\t\"Unfortunately, your good deeds at the temple were tempered when you failed to repay the innkeeper's gift of hospitality. A trait you share with your father to your detriment.\"\n\t*if (splitwood = \"yes\")\n\t\t*set jury +10\n\t\t\"I am also impressed that you repaid the innkeeper's hospitality, something that your father never learned to be mindful of. Perhaps there is hope for you yet despite the circumstances of your birth.\"\n\t\n\t*if (stealcloak = \"yes\")\n\t\t\"But\t\t\n*if (stealcloak = \"yes\")\n\tthen there was an incident in the agora, was there not?\" Her mouth twists into a frown. \"If I thought you had stolen more than once from those who could not afford it, I would condemn you for this alone here and now.\"\n\t*set jury -10\n\t\t\t\n*page_break\n\t\nShe pauses with eyes closed as if reviewing scenes from your life. When finally they open, a slight smile is on her lips.\n\n*set jury +10\n\n\"You performed your duties well when guarding the caravans of others. I approve of such diligence, and your skill is certainly worthy of any \n*if (helpguards = \"\") \n\tchampion.\"\n*if (helpguards = \"yes\") \n\tchampion. You also showed that you care about the lives of those who fight alongside you. That is a worthy trait in a soldier...or a general.\"\n*if (helpguards = \"no\") \n\tchampion. However you had the opportunity to assist those around you with your strategic knowledge but failed to do so, caring more about your own skin. Should you leave here, it is something you should reflect on I believe.\"\n\t*set jury -10\n\t\n*page_break\n\n\n\"And finally we come to the heart of the matter. The one which my colleagues are so intent to drag you down to the underworld for. Tell me Oedipus, and answer me truthfully. Why did you kill your father?\"\n\n\"It was self-defence,\" you answer honestly. \"He attacked me on the road.\"\n\nShe nods, making a mental note. \n\n\"And when you fought, you were capable of disarming rather than killing him. Why did you not?\"\n\n*choice\n\t*selectable_if (chariotdriver = \"defend\") #\"It was an accident. I tried to disarm him, but he fell. I couldn't prevent his death.\"\n\t\t*set jury +10\n\t\tShe does smile then. \"And this is why you feel you should not be held accountable to the fullest extent? I believe there may be some case for it after all.\"\n\n\t\tFrom the shadows, you hear an angry snarl of disagreement.\n\t\t\n\t\t*goto onemore\n\t\t\n\t*selectable_if (chariotdriver!= \"defend\") #\"How could I know for certain? All I knew was that he was going to kill me, and I had to defend myself any way I could.\"\n\t\t*set jury -10\n\t\t\"Ah, but that isn't the whole truth is it Oedipus?\" Her eyes narrow. \"He attacked you first, I'll give you that, but you let your anger take over your actions. You were going to teach him a lesson, even though that lesson would be a fatal one. How is his case different to what you are asking us to reconsider on your behalf? Why should we grant you mercy?\"\n\t\t\n\t\t*goto onemore\n\t\t\n\t*selectable_if (chariotdriver!= \"defend\") #\"He attacked me first. It was my right to deal with him as I saw fit. At the time, I didn't know he was my father.\"\n\t\t*set jury -10\n\t\t\"At least you are honest,\" she gives you a nod. \"However, it does show a lack of pity in your heart. Strange considering you are asking us to have mercy, when you yourself showed none is it not? The world always turns Oedipus, this is one thing all must learn.\"\n\t\t\n\t\t*goto onemore\n\t\t\n\t\t\n*label onemore\n\t\t\n*if ((chariotburial != \"path\") and (chariotdriver = \"kill\"))\n\tThe room falls into quiet once more as Athena considers your life's actions. \n\t\n\t\"There is one more thing I feel I should ask though Oedipus.\" From her look, you can tell it is not going to be good. \"You pushed the body into the valley. If he was not found, he may never have been given a decent burial. Something all people should have. How do you defend your actions?\"\n\t\n\t*fake_choice\n\t\t#\"Everything happened so fast. I didn't think it through.\"\n\t\t\t\"Hmm,\" she muses. \"One should always have a thought for something so important. The decision was rash.\"\n\t\t\n\t\t#\"I needed to get away and did not want to be detained over his death. As he had just tried to kill me, my consideration for his shade was not high.\"\n\t\t\t*set jury -10\n\t\t\t\"One day it may be your shade that wanders restlessly Oedipus. Would you not wish for someone to show you the consideration you did not give your father?\"\n\t\t\n\t\t#\"I regret it now, but it seemed like the right choice at the time.\"\n\t\t\t\"But do you really?\" Her dark eyes seem to peer into your soul, searching for the answer.\n\t\t\t\n\t\t\t\nShe sits tall in her throne. \"I believe we have enough to call a judgement, but I ask you one last time. Do you have anything to say for yourself?\"\n\n*fake_choice\n\t#\"Only that I hope you do not just me too harshly. I'm only human after all.\"\n\t\t*set jury +10\n\t\tAthena inclines her head, indicating that she will consider it.\n\t\t\t\t\n\t#\"I wish I'd never been cursed with this life, but I don't want to leave it yet either. Please tell me how I can have it back.\"\n\t\t*set jury +10\n\t\tAthena inclines her head, indicating that she will consider it.\n\t\t\n\t#\"Please give me a chance to atone for the sins of myself and my family. I cannot do this if given to the Furies' mercies.\"\t\n\t\t*set jury +10\n\t\tAthena inclines her head, indicating that she will consider it.\n\t\t\n\t#\"I say again, none of this is my fault.\"\n\t\t*set jury -10\n\t\tAthena shakes her head sadly. \"Still you refuse to take ownership of even the faults occurring in your life that were yours alone in nature. I will have to consider carefully if you have the potential to change.\"\n\t\t\n*if (jury > 59)\t\t\n\t*set judgement \"not guilty\"\n*if (jury \u003c 60)\t\t\n\t*set judgement \"guilty\"\t\n\t\nThe Furies creep out of the shadows, unhooking whips from their belts; cruel smiles on their lips. You take a step backwards uncertainly, but Athena holds out her hand, causing them to pause once more. \n\n\"I said Oedipus will be judged by our court and a verdict has not yet been reached. What say you?\" She turns to the silent figures. \n\nA man's baritone speaks up from under his hood. \"We've six for and six against Oedipus' guilt.\"\n\n\"A tie,\" Athena muses before turning once more to the three goddesses. \"You came to me when you heard Oedipus had escaped to this realm. I am the goddess of wisdom. Will you accept my judgement?\"\n\nThe three murmur among themselves, eager to collect you but uncertain how Athena will judge. \n\n\"We will,\" Megaera hisses.\n\n\"Then after much thought, I find Oedipus...\"\n\n*if (judgement = \"guilty\")\n\t*page_break \"...guilty of his crimes. He is yours Magaera.\"\n\t\n\t\n\tThe Furies cry in triumph, surging forward to grab you by the arms, preventing any attempt at escape. \n\t\n\tYou appeal to Apollo \n\t*if (oraclegift = \"poor\")\n\t\tdesperately, but he looks away. Athena has passed her judgement and he will not intervene.\n\t*if (oraclegift != \"poor\")\n\t\tdesperately.\n\t\t\n\t\t\"Perhaps...\" he begins, but is silenced by a look from his sister. \n\t\t\n\t\t\"You asked me to mediate and I have. This is my decision.\"\n\t\t\n\t\tGiving you a sad look he stands back, unable to intervene further.\n\t\t\n\t*page_break\n\t\t\n\tUnimpeded, the goddesses drag you away towards Tartarus, a place from which few ever escape. \n\t\n\tThey chant as they haul you down, voices clawing at your mind:  \n\t\t\n\t[i]We are the children of eternal night, we chase down murderers of men.[/i] \n\t\n\t[i]Those who stand lifting unsullied hands, no doom of ours shall you incur. Walk safely away from our wrath, completely untouched by woe.[/i]\n\t\n\t[i]But for those who hide hands slick with blood, we are a force to be feared.[/i] \n\t\n\t[i]We stand as avengers of the dead, and shall exact a fair price; until measures equal in atonement have been paid.[/i]\n\t\n\t[i]In life, in death, it matters not to us; relentless and eternal are we...[/i]\n\t\t\n\t\t\n\t*achieve furyend\n  \n\t*image orestestxt.png center Ending: Oedipus of the Underworld\n\t\t\n\t*set status \"A guest of the Furies in the underworld.\"\n  \n\t*goto_scene ending\n\t\t\n\t\t\n*if (judgement != \"guilty\")\n\t*page_break \"...does not warrant your attentions. You may go Magaera.\"\n\t\n\tThe Furies snarl in anger, but having promised to accept Athena's judgement have little choice but to leave.\n\n\t\"You are dismissed,\" Athena waves to the silent figures who disappear into the air. \"Now what to do with you?\"\n\t\n\t\"Well if the Furies will no longer dog my steps, perhaps I might be allowed to...\"\n\t\n\t*disable_reuse\n\t\n\t*label chooseagain\n\t\n\t*choice\n\t\t#\"Go home to Corinth?\"\n\t\t\t\"I cannot go back to Thebes, but perhaps I might be allowed to return to my family in Corinth once more if you are willing?\"\n\t\t\n\t\t\t\"Home?\" Athena echoes. \"Well with the Furies called off I guess you can try. Do believe your family will take you back?\"\n\t\t\t\n\t\t\t\"I can only hope,\" you whisper, suddenly uncertain. Just what will Merope think of you after all that has happened?\n\t\t\t\n\t\t\t\"Then go with my blessing, but remember the lessons of these past few years Oedipus. We will be watching.\"\n\t\t\t\n\t\t\tWith a clap of her hands, everything goes white.\n\t\t\t\n\t\t\t*goto corinthend\n\t\t\t\n\t\t#\"Retreat to a nameless life of reflection; wandering as I did before arriving in Thebes.\"\n\t\t\t\"I cannot go back to Thebes, and my shame prevents me from seeking out my family once more in Corinth. I wish only to live the life of a wandering\n\t\t\t*if (job = \"scholar\")\n\t\t\t\tscholar, \n\t\t\t*if (job != \"scholar\")\t\n\t\t\t\tmercenary,\n\t\t\tnameless and humble. Seeking answers on the long road.\"\n\t\t\t\n\t\t\t\n\t\t\tApollo blinks, clearly your answer has surprised him. \"You would give up your name? You have been cleared by the court of Athena, you could return to Corinth as prince once more.\"\n\t\t\t\t\n\t\t\tYou shake your head regretfully. Deep in your heart you know it could never be so. Even if you could be accepted back to rule the city you grew up in, you could never forget. Best to fade into obscurity and allow the world to turn without the \n\t\t\t*if (fate = \"king\")\n\t\t\t\texiled King \n\t\t\t*if (fate != \"king\")\n\t\t\t\texiled hero\t\n\t\t\tof Thebes.\n\n\t\t\t\"So be it.\" Athena inclines her head, agreeing to your final request.\n\t\t\t\n\t\t\tWith a clap of her hands, everything goes white.\n\t\t\t\n\t\t\t*goto travellerend\n\t\t\t\n\t\t\n\t\t*selectable_if (sphinxalive != \"no\") #Seek out the Sphinx. Without her I would not have made it here at all.\n\t\t\n\t\t\t*goto_scene apollosphinx\n\t\t\n\t\t\t\n\t\t\n\t\t\n\t\t\n\t\t\n\t\t\t\n\t\t\t\n*label travellerend\n\n*page_break\n\n\n*text_image epilogueoedipus.png center Epilogue\n\t\t\t\n\nThe seasons turned with no news of the disgraced \n*if (fate = \"king\")\n\tKing of Thebes \n*if (fate != \"king\")\n\tPrince Oedipus\nwho had apparently fled into exile. Rumours abounded as to his fate ranging from he was gathering forces in a foreign land on advice of the Pythia, biding his time until it was right to \n*if (fate = \"king\")\n\ttake back his city once again; \n*if (fate != \"king\")\t\n\tinvade the land that had falsely accused him;\nto perhaps he had been struck down on the road by the gods themselves for his misdeeds. Some even suggested he'd never even left Thebes, with the Queen's brother taking justice into his own hands. \n\nNever the less, as the years marched on and Thebes recovered from its curse; all were just grateful that whatever had happened to him, the gods appeared to have been appeased. None ever suspected the ${job} dressed in rough spun clothing, taking paid jobs as a\n*if (job = \"scholar\")\n\tscribe\n*if (job != \"scholar\")\t\n\tguard escorting caravans\nmay once have been \n*if (fate = \"king\")\n\tthe renowned King of Thebes;\n*if (fate != \"king\")\n\tthe now disgraced hero of Thebes;\nalthough tales of his sad story were told over and over ensuring that his name at least, would never be forgotten. \n\n*page_break\n\n*if (fate = \"king\")\n\tCreon appointed himself as regent, leading ably while his wards grew. When the came of age, the twins Eteocles and Polynices were crowned Kings and elected to share the rulership of Thebes between them. \n\n\tAlthough at first their cooperation seemed to bode well for a long and stable rule, alas it was not to be. The curses that dogged their line led to strife between them, ultimately causing both their deaths as well as that of their sister Antigone. \n\n\tAlthough many who suspected Oedipus still lived, thought he would reappear to put an end to the feuding between his sons that threatened to tear the kingdom apart, no sign of him was ever seen. It was then that all whispers of his continued existence faded. Surely if he lived, he would have come.\n\n\t*page_break\n\n\tWith only a distraught Ismene remaining, refusing to take a position that had seemingly caused the deaths of her entire family; Creon took to the throne once more, this time as King.  \t \n\n\tOedipus outlived his entire family,\t\n*if (fate != \"king\")\n\tQueen Jocasta continued to rule for a time, although reports were that she became more and more withdrawn from the world, never able to fully reconcile herself with what had happened to both her husband and son. Finally, her health deteriorated to the point that she appointed her brother Creon as the new ruler of Thebes. \n \n\tCreon's rule was rocky, the people rightly worried about the curses the gods had seemed fit to throw down upon their family. Several riots were put down in his time, with the city divided as to whether the King should be supported or deposed. Eventually the rule passed to his son, and the mood in Thebes eventually settled into peace once more.\n\t\n\tOedipus outlived both Jocasta, Merope and Creon, \nnever once breaking the pact he had made with the gods; knowing it would bring certain doom upon any involved. He never could bring himself to \n*if (fate = \"king\")\n\tremarry \n*if (fate != \"king\")\n\tmarry\nand joined his ancestors at the age of seventy-three. \n\nHe was buried with a stone carved by his request, reminiscent of Creon's final words to him on that fateful day: \n\n*text_image oedipuslegend2.png center Here lies one who is nameless. Now may I truly find peace.\n\n*achieve notguiltyend2\n\n*set status \"Nameless but not forgotten.\"\n\n*goto_scene ending\n\n\n*label corinthend\n\n*page_break\n\n*text_image epilogueoedipus.png center Epilogue\n\n\n*set status \"King of Corinth.\"\n\nIt's said that Queen Merope wept with joy at the sight of her son, finally returned home. Though much disturbed by the events of Thebes, Athena's ruling of innocence made him welcome by most once again. \n\n*if (fate = \"king\")\n\tThebes however, remained forever barred to its exiled King; with neither Creon who had assumed regency nor in fact Oedipus, wishing to risk the gods' wrath by his return.\n*if (fate != \"king\")\n\tThebes however, remained forever barred to Jocasta's exiled son; with neither Jocasta nor in fact Oedipus, wishing to risk the gods' wrath by his return.\n\nWhen Queen Merope retired as ruler of Corinth, Oedipus ascended to the throne and was henceforth known as King Oedipus the wise, his rule a prosperous one for his city. \n\nIt seemed to all that he had taken Athena's words to heart; surrounding himself with the most knowledgeable of advisors he could find to attend him and frequenting her temples regularly. He adopted the golden feather of the Sphinx as his symbol, a constant reminder so that he would never forget his time in Thebes. \n\n*page_break\n\n*if (fate = \"king\")\n\tThough he never had the heart to remarry, his daughter Antigone travelled to Corinth and made it her home after conflict with the regent of the city of her birth. She was particularly close to her father, with her intelligent and outspoken presence bringing the aging king much joy in his twilight years. \n\n\tThough his own rule was by and large peaceful, King Oedipus lived to see both his sons die by each other's hands as they squabbled for the crown; a product of the curses which plagued his family. The stress of losing two more of his family to disaster took its toll on the ailing monarch, and his health never fully recovered. \n\n*if (fate != \"king\")\n\tIn a rare display of co-operation, Oedipus agreed to care for Creon's children during some trouble where the city of Thebes was threatened. Creon's eldest daughter Henioche, decided to stay in Corinth even after the threat had passed making it her home. She became particularly close to Oedipus, with her intelligent and outspoken presence bringing the aging king who had never married himself, much joy in his twilight years. \n\t\nHe travelled onwards to the afterlife one winter's day in faint light of predawn; the sun not yet above the horizon, much like the day of his birth. He was succeeded by his \n*if (fate = \"king\")\n\tdaughter Antigone, \n*if (fate != \"king\")\n\tcousin Henioche, \nwho had attended him faithfully all these years.\n  \n\nIn the end King Oedipus was forever remembered more for the learning and prosperity he brought to Corinth, rather than the disasters that plagued his earlier life.\n\n*text_image featherending.png center Ending: King Oedipus The Wise\n\n*achieve notguiltyend\n\n*set status \"Oedipus the Wise: Ruler of Corinth.\"\n\n*goto_scene ending\n\n\n\n\n\n\n\n\n*label tspeak\n\n\nThe man responds to her welcome, while eerily turning blind eyes towards you as he speaks despite your silence. \n\n\"So I was summoned, and I have obeyed. Why is it you asked me here Queen Jocasta?\"\n\n\"We-we need to ask you...\" Jocasta's voice trails off, seeming to have failed her now that she needs to speak of her husband's death and failure to seek vengeance. \n\nWith Creon still fuming and not looking inclined to come to her aid, will you speak up? \n\n*choice\n\t*selectable_if (tprophet = \"disagree\") #\"We have a question to ask of you seer. However first, tell us why we should trust what you say?\"\n\t\t\"Oedipus!\" Jocasta hisses looking at you in horror. \"Tiresias is a prophet of Apollo. You must not speak to him in this way.\"\n\t\t\n\t\t\"It is quite ok,\" the seer responds levelly. \"When your kingdom is at stake such questions are sensible to ask. Less wise is the question you have for me. For I know the answer and wish I did not.\"\n\t\t\t\t\n\t\t\"Evasion,\" you whisper quietly to the Queen. \"This is a bad idea. How can we even know what he says is true?\"\n\t\t\n\t\t\"You wish to find the murderer of King Laius. It is what you were instructed to do by the Oracle of Delphi after all,\" the prophet replies deliberately, somehow overhearing your whisper and causing you to pause. \n\t\t\n\t\t*label knowq2\n\t\t\n\t\tTo your knowledge, outside of Jocasta, Creon and yourself; no one else knows of the Pythia's words. Jocasta has blanched to the colour of milk, obviously as shocked by Tiresias' display of power as yourself. Creon on the other hand simply tilts his head thoughtfully. Did he have such faith in the seer's abilities? Or is there something he hasn't told you?\n\t\t\n\t\t\"That question is indeed why we called you here seer. If you know the answer, tell us,\" \n\t\t*if (tprophet = \"disagree\")\t\n\t\t\tyou demand.\n\t\t*if (tprophet != \"disagree\")\t\n\t\t\tyou ask.\t\n\t\t\n\t\t*label insultseer2\n\t\t\n\t\tYour guest sighs uncomfortably, addressing Jocasta. \"I say again, do not listen to your advisor in this matter and cease your search. This is one truth you should leave buried.\"\n\t\t\n\t\t\n\t\t*choice\n\t\t\t#\"This is absurd. I say you will not tell us, because you do not know.\"\n\t\t\t\t\"I call you a charlatan,\" you pronounce, getting to your feet and pointing at the seated prophet. \"You evade and misdirect with your falsely given words of wisdom using Apollo's name to substantiate them. I am surprised he stands for such insolence!\"\n\t\t\n\t\t\t\tFor the first time anger breaks though the seer's calm demeanour. \"The murderer of Laius is a man without a living father, and who knows not the identity of his mother.\" \n\n\t\t\t\t*label riddlespeak2\n\t\t\t\t\n\t\t\t\t\"You talk in riddles old man, speak clearly,\" you growl. \n\t\t\t\t\n\t\t\t\t\"Then on your head be it,\" Tiresias snarls. \"Hear me and heed my words well Prince Oedipus, for I name you Laius' killer.\"\n\t\t\t\t\n\t\t\t\t*label accuse2\n\t\t\t\t\n\t\t\t\t\"How dare you accuse me of such a thing!\" Fury rises to the surface at the gall of the man to respond to your accusation with one of his own. \"I never even met the late King, much less had anything to do with his death!\"\n\t\t\t\t\n\t\t\t\t*label dare2\n\t\t\t\t\n\t\t\t\t\"It was bandits,\" Jocasta whispers behind you, all trace of colour gone from her features. \"Just bandits! Oedipus is a hero. He's been a good friend to both myself and Thebes. He would never have done such a thing.\"\n\t\t\t\t\n\t\t\t\t\"Besides,\" you growl. \"Though my father may be dead, I know my mother, the Queen Merope and she is very much alive.\"\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t\"Guards! Throw this man out!\" Jocasta screams, eyes wide with confusion and anger. \"It is a sad day indeed when one of such reputation is lowered to spouting such lies.\" \n\t\t\t\t\n\t\t\t\tSoldiers enter the room gingerly hearing the angry exchange of words. They help Tiresias up more gently than he deserves and lead him from the room. \n\t\t\t\t\n\t\t\t\tTiresias' voice floats down the hall. \"I warned you both, but you would not listen. Your pride and anger will be your downfall. Mark my words.\"\n\n\t\t\t\tThen the door bangs shut, and he is blessedly gone. \n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tJocasta sits shaking, hands clasped over her heart. \"Such evil words. But it cannot be, for you are the only child of Merope. There is no possible way his riddle could apply to you.\"\n\t\t\n\t\t\t\t*label jocastayell2\n\t\t\n\t\t\t\t\"You had a child once Jocasta,\" Creon speaks softly, but his eyes bore into your own. \"A boy. Remember?\"\n\t\t\t\t\n\t\t\t\t\"This is foolish Creon; how dare you bring that up and now at all times!\" Jocasta rounds on him in fury. \"You know full well that I chose Laius' life over the boy's though it hurts my soul to this day. He is dead. There is no more to say about it.\"\n\t\t\t\t\n\t\t\t\t\"Perhaps. Perhaps not. His death was not by your hand and what was the prophecy again? That your firstborn son would grow to kill his father and wed his mother?\"\n\t\t\t\t\n\t\t\t\t\"Shut up Creon! The boy was left on the mountain to die. He is dead. My Laius is dead. There is no such thing as fate that cannot be averted. Stop tormenting me!\" Jocasta is weeping now. Her brother's words stirring up old wounds. \"Besides, as you said. The child's fate was to wed his mother and I am very much a widow.\"\n\t\t\t\t\n\t\t\t\t\"You are not married [i]yet,\"[/i] Creon replies, although his voice has taken on a softer edge as if he no longer blames his sister for the actions he suspects her of.\n\t\t\t\t\n\t\t\t\t\"Stop it Creon. Leave now!\" she sobs into the sleeve of her dress. \n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#Round on Creon angrily. So, it's true. He's been planning to get you out of the way all along. How dare he try to pin Laius' death on you!\n\t\t\t\t\t\t*set creontreason \"yes\"\n\t\t\t\t\t\tThe secretive trip to Delphi. Pushing to have Tiresias sent here as soon as possible. You knew there was something amiss, it's likely he's been in league with the seer the entire time. Her brother it seems resents your influence over Jocasta more than you could ever have imagined. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"It was [i]you![/i] You set this up, didn't you? How could you do such a thing, not only to me, but to your own sister!\" you snarl advancing on Creon. \n\t\t\t\t\t\t\n\t\t\t\t\t\tHis eyes widen. \"What? I never. Jocasta please believe me. I had no idea what Tiresias was going to say. But now that it's out, we need to be sure or the whole of Thebes will fall to the wrath of the gods.\"\n\t\t\t\t\t\n\t\t\t\t\t\t\"You snake! Still trying to sow the seeds of doubt. Jocasta you should know your brother no longer has your best interests at heart. Perhaps he has plans for his own children to rule Thebes.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"No!\" Jocasta jumps from the couch, eyes still red with tears. \"What are you doing?! My best friend and my brother fighting in this way! We can resolve this. I will send for the servant who took my baby boy away. He will tell you both the truth of it.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou can see how much it cost her to say those words. This is something she'd obviously never wanted to revisit.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t#You take a calming breath. \"Fine. Have the servant fetched and we will get to the bottom of the matter.\"\n\t\t\t\t\t\t\t\tJocasta sighs as the situation defuses. Even Creon backs down. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"I am sorry sister. I really do hope this is no more than idle speculation,\" he whispers.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#\"Let us hear what the servant has to say. Afterwards, we should discuss Creon's attempt to frame me. Possibly even treason towards his queen,\" you snap.\n\t\t\t\t\t\t\t\t\"Oedipus, stop this!\" Jocasta pleads. \"Creon is my older brother, he's looked after me since we were children. There is no way he would think to hurt me in this way out of malicious intent.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou shake your head, startled that she would continue to defend him. In your opinion, Creon should be in a prison cell already.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#\"He is plotting against me Jocasta! You heard the way he tried to frame me for your husband's death. You cannot trust him any longer,\" you growl.\n\t\t\t\t\t\t\t\t\"No!\" She draws herself up, eyes flashing. \"I will not have my brother sent away for simply trying to help Thebes. I am sure he is mistaken, we will fix all of this soon enough.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tShe continues more gently. \"I know him Oedipus. He can be lazy and dig his heels in as well as any mule when the mood suits him, but he is never malicious. Let me send for the servant. Once he confirms my story, Creon will apologise to you [i]and[/i] to me. Won't you brother?\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tCreon takes a calming breath. \"Nothing would make me happier sister. I only hope this is proved to be naught more than idle speculation.\"\n\t\t\t\t\t\t\n\n\t\t\t\t\t\t*goto servant\n\t\t\t\t\t\n\t\t\t\t\t#\"Wait a minute, why haven't I heard of this before?\" you ask concerned. You'd never heard anything of a prophecy or a lost son before now.\n\t\t\t\t\t\t\"And why would you have?\" she sobs, her grief evident. \"Do you think I take any joy in what happened? What do you think others would think of me should they have found out? A mother who sends her own child away to die on a riddle given to her husband by a seer. And look at yourself? Perhaps I never even needed to. After all, your own father was not felled by your hand despite the Pythia's words.\"\n\t\t\t\t\t\n\t\t\t\t\t\t \n\t\t\t\t\t\t*if (prophecy = \"father\")\n\t\t\t\t\t\t\tHer words strike a chord. How little she knew if she thought you'd escaped that fate. It is more than possible that your absence had caused his death as surely as if you'd killed him yourself.\n\t\t\t\t\t\t*if (prophecy = \"no\")\n\t\t\t\t\t\t\tHer words sit uneasily with you, unsure that you may still be destined to carry out the words of your prophecy.\n\t\t\t\t\t\t*if ((prophecy != \"father\") and (prophecy != \"no\"))\n\t\t\t\t\t\t\tThe thought calms you somewhat. She's right, perhaps the pronouncements of seers were not always correct or could at least be averted.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\tJocasta steels herself, coming to a decision. \"I will put an end to this madness by sending for the servant who took my baby boy away. He will tell you both the truth of it.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tCreon takes a calming breath. \"Nothing would make me happier than to find this is naught more than idle speculation sister.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto servant\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t#\"Everyone just calm down.\" You try to rein in your temper. \"There's an easy way to prove it wasn't me. We will fetch the man who told you the babe was dead.\"\n\t\t\t\t\t\tJocasta sobs, not wanting to relive that day again; but at your insistence gives you the name of the servant who took her child away to die on the mountain top. \n\t\t\t\t\t\t\n\t\t\t\t\t\tYou snap a summons to a guard, telling him to bring the man before the Queen as soon as he can be found.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto servant\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t#\"Creon is right, we must have the truth of it else there will always be rumours of my guilt,\" you say shakily, still rattled by the seer's words. \"We must send for the man who can tell us what happened that morning so long ago.\"\n\t\t\t\t\t\tJocasta sobs, not wanting to relive that day again; but at your insistence gives you the name of the servant who took her child away to die on the mountain top. \n\t\t\t\t\t\t\n\t\t\t\t\t\tYou summon a guard, telling him to bring the man before you as soon as he can be found.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto servant\t\n\t\t\t\t\t\n\t\t\t\n\t\t\t#\"If you know something Tiresias say so. Otherwise I'll make sure the people of Thebes know you're to blame when they starve!\"\n\t\t\t\tFor the first time anger breaks though the seer's calm demeanour. \"Do not threaten me Oedipus, you will not like the outcome.\"\n\t\t\t\t\n\t\t\t\t\"And leaving my city to starve is all the better? What is wrong with you that you could think such a thing Tiresias?\" you snarl straight back. \n\t\t\t\t\n\t\t\t\t\"You want to know whom it is you seek?\" Tiresias replies in a low menacing voice, clearly furious at your tone. \"The murderer of Laius is a man without a living father, and who knows not the identity of his mother.\" \n\n\t\t\t\t*goto riddlespeak2\n\t\t\t\t\n\t\t\t\t\n\t\t\t#\"Please Tiresias. If you know something, you must tell us. If we cannot catch the killer in time, Thebes will be destroyed.\"\t\n\t\t\t\tThe seer hesitates. \"The knowledge you wish for cannot be undone once heard. I implore you once more to give up your search.\"\n\t\t\t\t\n\t\t\t\t*label pleadjocasta2\n\t\t\t\t\n\t\t\t\tJocasta shakes her head. \"I too beg you to tell us the answer seer. We must know.\"\n\t\t\t\t\n\t\t\t\t\"Very well. I can tell you that you seek a man has no living father, and knows not the identity of his mother,\" the prophet replies evasively. \n\n\t\t\t\t*label nosense2\n\t\t\t\t\n\t\t\t\t\"I don't understand,\" you exclaim in frustration. \"Please seer, tell us plainly what you mean by these words.\"\n\n\t\t\t\t\"I tried to warn you, but you will not listen. Very well, I will tell you the answer outright and on your head be it,\" Tiresias growls. \"Heed me Prince Oedipus, the shade of the old king came to me and spoke of his unhappy death. I name you Laius's killer.\"\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#As the enormity of what he has just said sinks in, anger sparks brightly. How dare he accuse you of such a thing!\n\t\t\t\t\t\t*goto dare2\n\t\t\t\t\t\t\n\t\t\t\t\t#Sit back in shock. \"Why would you accuse me of such a thing?\"\n\t\t\t\t\t\t\"Because it is true,\" Tiresias sighs. \"Do you think this is the news I wanted to give you? I warned you against pursuing an answer, but you wouldn't listen.\"\n\t\t\t\t\t\n\t\t\t\t\t\t\"Your riddle makes no sense seer. It cannot be me. I am an only child, son of Polybus who passed away in his sleep true, but my mother Merope is still very much alive and I know her well. You have to be mistaken,\" you reply breathlessly. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Of course he is mistaken!\" Jocasta rises from her seat. \"How could you say such things Tiresias? My husband was killed by bandits! Everyone says so. Oedipus is a hero, and has always been a good friend to both myself and Thebes. There is no way he would have done such an evil thing. I think you should leave.\"\n\t\t\t\t\t\n\t\t\t\t\t\t*goto creontalk2\n\t\t\t\t\t\t\n\t\t\t\t\t#\"You think it was me?\" You recoil, suddenly uncertain as the memory of your own prophecy surfaces. \n\t\t\t\t\t\tYou shake your head, trying to clear the evil thoughts away but remaining unsettled. Surely it could not be true? You'd tried so hard to make sure that particular fate could never come to pass. After all, your mother is far away in Corinth... Isn't she?\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Of course it is not you!\" Jocasta rises from her seat angrily. \"How dare you say such things Tiresias. Prince Oedipus is a good man, I could not believe he could have had anything to do with my Laius' death. Besides though King Polybus may have joined his ancestors, the gods rest his soul; Oedipus knows full well the identity of mother. Your prophecy is false.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Sister, perhaps we should listen to him. Some say he is never wrong,\" Creon cautions.\n\t\t\t\t\t\n\t\t\t\t\t\tHer clenched hands tremble as she swings around to face her brother. \"You would stand against him as well? What cause has Oedipus ever given you to doubt his character?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I never said I'm sure of his guilt, only that we should consider the seer's words.\" Creon pales at her anger, holding out his hands in a calming gesture. \"Sister, please sit down and we will discuss it further with Tiresias.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"No! No more talk of this,\" Jocasta growls. \"Tiresias you will leave my house. [i]Now!\"[/i] \n\t\t\t\t\t\t\n\t\t\t\t\t\tSoldiers enter the room gingerly, unused to hearing the Queen speak in such a way. They quickly help Tiresias up from his chair with nervous movements and lead him from the room. \n\t\t\t\t\t\t\n\t\t\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t\t\tJocasta falls back into her seat shaking, hands clasped over her heart. \"Such evil words to set my best friend and brother against each other so. It cannot be Creon, for Oedipus is the only child of Polybus and Merope. There is no possible way his riddle could apply to him. I don't know how or why, but Tiresias is wrong.\"\n\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto jocastayell2\t\n\t\t\t\t\t\n\t\t\t\t\t#\"That is a heavy accusation to make Tiresias. What proof do you have I did such an evil deed?\"\n\t\t\t\t\t\t\"Proof?\" the seer barks harshly. \"Just my words, but that was what I was asked here for was it not? You know my reputation Oedipus; my words should be enough.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"It was bandits,\" Jocasta rises from her seat. \"Just bandits! Oedipus is a hero and a good friend to both myself and Thebes. He would never have done such a thing. I think you should leave.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*label creontalk2\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Sister, perhaps we should listen to him. Some say he is never wrong,\" Creon cautions. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"You think me a murderer Creon?\" your voice drops dangerously as you face your rival.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"That is enough. Stop it both of you!\" Jocasta screams. \"Tiresias you will leave my house. [i]Now!\"[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\n\t\t\t\t\t\tSoldiers enter the room gingerly, unused to hearing the Queen scream in such a way. They help Tiresias up more gently than he deserves and lead him from the room. \n\t\t\t\t\n\t\t\t\t\t\tJocasta falls back into her seat shaking, hands clasped over her heart. \"Such evil words to set my brother and best friend against each other so. It cannot be Creon, for Oedipus is the only child of Polybus and Merope. There is no possible way his riddle could apply to him. I don't know how or why, but Tiresias is wrong.\"\n\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto jocastayell2\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\n\n\t#\"This country is cursed and will surely fall to ruin if we cannot find the one who murdered King Laius.\"\n\t\tThe seer sighs, turning back to Jocasta to appeal to her once more. \"I feared as much. Listen to me Queen Jocasta, do not press me for an answer. It contains facts you will not wish to know.\"\n\t\t\n\t\tThe Queen blinks in confusion. \"What do you take me for Tiresias? The fate of my city is at stake with my husband's killer roaming free. Of course I want to know, no matter the cost.\"\n\t\t\n\t\t*label impossibleq2\n\t\t\n\t\tThe prophet nods sadly. \"It is an impossible predicament you have been placed in, is it not? Very well, I can tell you that you seek a man has no living father and knows not the identity of his mother.\"\n\t\t\n\t\t*goto nosense2\n\n\n\t#\"We seek your wisdom for interpreting the Pythia's words.\"\n\t\tHe listens as you tell him what the Oracle had told your Creon.\n\t\t\n\t\tThe seer sighs, turning to appeal to Jocasta. \"This I do know, but I beg you not to press me on it. This is something you do not wish to know. Give up your search.\"\n\n\t\t\"Just give up?\" she exclaims. \"Tiresias, my people are dying because the murderer of their previous king, my husband, roams free. I cannot simply look the other way regardless of the cost.\"\n\t\n\t\t*goto impossibleq2\n\t\n\t#\"As a seer should you not already know the answer to that?\"\n\t\tYou ask the question \n\t\t*if (tprophet = \"disagree\")\n\t\t\twith a voice full of derision. How right you were to question the need to summon him.\n\t\t*if (tprophet != \"disagree\")\t\n\t\t\ttentatively, confidence in his abilities wavering if he must ask such a question.\n\t\t\t\n\t\t\"Of course,\" the prophet sighs. \"I wished just for once, I was wrong.\"\n\n\t\tHe picks at his blue cloak stalling. \"You wish me to tell you where to find the murderer of King Laius. After all, the Oracle of Delphi has already told you this is essential to lifting the curse that afflicts your lands.\" \n\t\t\n\t\t*goto knowq2\n\t\t\t\n\t\n\t#Continue to hold your silence, allowing Jocasta to speak for herself.\n\t\n\t\t\"Please Tiresias,\" Jocasta finally strangles out. \"Will you help us? We must find the one who murdered King Laius if Thebes is to survive the curse which afflicts us.\"\n\t\t\n\t\t\"Queen Jocasta, your heart is in the right place. However please do not ask me to tell you the answer to that question. For your sake, it is best to abandon the search.\"\n\t\n\t\t*if (tprophet != \"agree\")\n\t\t\t\"I was right in thinking this was a bad idea Jocasta. Just look at the way he dances around the question, never having to give a straight answer. I say to you seer, if you know the identity of Laius' killer, why won't you tell us?\" you challenge.  \n\t\t\t\n\t\t\t*goto insultseer2\n\t\t*if (tprophet = \"agree\")\n\n\t\t\t*goto pleadjocasta2\n\t\t\n\t\t\n\t\n\t\n\t\n*label findouttruth\n\n\"Jocasta... Please...\"\n\nShe round on you, eyes full of pain. \"You have condemned yourself by your own words. You admitted to the murder of King Laius, my late husband. As the Oracle foretold in order to restore prosperity to my city once more, you are now and forever banished from Thebes.\"\n\n*fake_choice\n\t#\"Please believe me I didn't know it was him. It's not my fault.\"\n\t\t\"It's the curse working its evil magic,\" you implore. \"How was I to avoid the fate that had been set before me.\"\n\t\t\n\t\t\"It changes nothing,\" At once she looks lost and alone, her eyes dead. \"The Fates will not be cheated, but still you must bear the consequences. I cannot bare to have you near me. Leave my sight Oedipus!\"\n\t\t\t\n\t\tHer brother grabs you by the shoulder and with a surprising amount of gentleness, guides you passed the stunned guards. \t\n\t\n\t#\"But you're my mother. How could you send me away once again?\"\n\t\t\"I made my choice long ago and I make the same decision I did then,\" her voice grates harshly as her eyes fill with tears. \"For my sake and the sake of everyone still alive within Thebes, I beg you to leave and never seek me out again.\"\n\t\t\t\n\t\tHer brother grabs you by the shoulder and with a surprising amount of gentleness, guides you passed the stunned guards. \t\n\t\n\t#\"Yes, I must leave. Though I killed him in self-defence, this changes nothing in the eyes of the gods.\"\n\t\t\"Then leave Oedipus, and never seek me out again,\" her voice grates harshly and her eyes are flat and dead. \"It is best for all of us.\"\n\t\t\n\t\tHer brother grabs you by the shoulder and with a surprising amount of gentleness, guides you passed the stunned guards. \n\t\n\t\n\t#\"I killed my father, for that there can be no forgiveness. You must not let me live!\"\n\t\tYou grab for the dagger of the closest guard, while Creon launches himself at you. He grabs at your hands and holding them at arm's length and preventing you from finishing the deed. \n\t\t\n\t\t\"You fool!\" he hisses. \"Both of you tried to escape the will of the gods and look what pain and suffering it has brought. Do you think the afterlife will be kind should you do this? The Pythia decreed you be banished. Are you cowardly enough to try and escape your fate once again and condemn the people of Thebes? Would you make your mother watch as her own son plunges a dagger into his heart? She would not live long after seeing such a thing I think.\"\n\t\t\n\t\tJocasta sits gripping the sides of her chair with white knuckles, her eyes pleading for you to leave.\n\t\t\n\t\tWith a rough motion, Creon wrenches the knife from your grip. \"Come with me.\"\n\t\n\t#\"It matters little where I go. Though my heart still beats, I'm already dead.\" you respond despondently. \"Even though it never knew it was my father I fought on that mountain road, there will be no leniency shown to me by the Furies.\"\n\t\tThe thought makes you shiver at the fate that awaits you at the hands of those three goddesses. The murder of a parent, whether deliberate or not, was in their eyes one of the most heinous crimes that could be committed. There will be no mercy, no hope of redemption. It is simply a matter of time before they come to collect their due.\n\t\t\n\t\t\"I cannot help you. As you say, your fate is sealed.\" Jocasta blinks rapidly, her eyes over-bright with unshed tears. \"But for my kingdom there is still hope. Please Oedipus, for the sake of everyone still living within Thebes, you must leave and never return.\"\n\n\t\tHer brother grabs you by the shoulder and with a surprising amount of gentleness, guides you passed the stunned guards.\n\t\t\n\t\t\nDazed and pale with shock, Creon leads you from the palace pushing a purse of gold into your hands and hoisting you up onto a solid brown gelding. \"Oedipus, I know this was not entirely of your doing, but you must live with the consequences. You must leave Thebes today in order to release us from the curse that has been visited upon you. I will see to it that Jocasta is cared for and do my best to keep her alive.\"\n\n\n\n*set status \"Disgraced hero in flight from Thebes.\"\t\n\t\t\n*goto nomarryend\t\t\n\t\n\n\t\n\n\n\n\n\n\n\t\t\t\t\t\n\n\t\n\t\t\n", "peaceending": "*temp hesitatearch \"no\"\n*temp wind \"\"\n\nIn the end, it was not the gods, but a simple misstep with a cobra that took you from this life. In your last moments of consciousness, there's only searing pain as fangs inject a deadly venom from which you instinctively know you cannot possibly survive. \n\n*page_break\n\n*set oedipusdead \"yes\"\n*set health 1\n*set status \"Trapped in the underworld.\"\n\nYou feel something snap deep within your chest as your eyes close, opening to the sunless skies of the underworld. Drifting listlessly on feet that barely leave imprints on the softened ground, you follow the darkened shore of the River Styx which runs swift and deep towards a pool of smoky torchlight ahead. \n\nYou're not alone in this place. Charon stands beside a rickety dock of rotting wood, his small boat bucking in the currents and held only by the fraying rope that binds it to the bank. Deep robes of grey enfold the god's face in shadows that even the flickering torchlight cannot reach, and when he looks your way, all that can be seen are pupilless eyes that burn redly with the colour of dying embers. Only those with coins for his fare are permitted to board the ferry, all others are met with contempt and cast aside with a mere flick of his long white fingers. \n\nRunning hands over the remains of your clothing, you fail to find anything of value with which you could pay the ferryman's toll. It appears that what ever happened to your body in Egypt, the last rites you were afforded did not include a coin over each eye, or even just a single one placed within your mouth for safekeeping in the afterlife. \n\n*choice\n\t#Approach Charon though you haven't any payment. \n\t\tYou approach the god cautiously, aware of the ease with which he had flicked others aside. His head lifts at your approach, burning eyes meeting the now empty sockets of your own. \n\t\t\n\t\t*choice\n\t\t\t#Appeal to his mercy. \n\t\t\t\tYou step forward with head bowed and hands outstretched in a gesture of peace. \"Please Charon, show me mercy and take me from this place. Those who should have observed my final rites have failed to do so, and I do not have any coins for my fare. I'm afraid the only payment I can give, is in gratitude and praise for your name.\"\n\t\t\t\t\n\t\t\t\t\"You are not as I was told to expect.\" The god's head tilts slightly as he considers your fate, voice whispering with the quality of dead leaves underfoot. \"Do not be so quick to present yourself for judgment. They will come for you at the appointed time. Believe me when I say you will come to wish that it was here you had been allowed to remain.\"\n\n\t\t\t\t\"Who is it that will come for me?\" you ask, the god's words filling your heart with dread. \n\t\t\t\t\n\t\t\t\t\"The only one who can command me to do my duty without the payment I demand from all souls. Who else?\" the god of the river snaps. \"Now, be gone and bother me no longer. I have work to do.\"\n\t\t\t\t\n\t\t\t\tYour feet step quickly away from the ferryman at his words, walking as if no longer under your own control. \n\t\t\t\t\n\t\t\t\t*goto riverbank\n\t\t\t\t\t\t\t\n\t\t\t \n\t\t\t#Demand passage.\n\t\t\t\tThough you no longer breathe, you find yourself taking a steadying breath out of habit and square your shoulders confronting the god. \"I am Prince Oedipus of Greece. I demand you grant me passage across the river as is my due.\"\n\t\t\t\t\n\t\t\t\t\"Arrogant,\" Charon snarls. \"And so much like your father. He was lucky that he had the coins to pay his passage. You on the other hand are not so fortunate and should know better than to make demands of my time. You may rot in the shadows for all I care.\"\n\t\t\t\t\n\t\t\t\tWith a swing of his hand, he knocks you tumbling, while the gathered shades shrink away from the ire of the god by the river. As you climb to your feet, his voice carries across the now silent landscape. \n\t\t\t\t\n\t\t\t\t\"Pray that that this is the worst fate that awaits you Oedipus. Those on the other side will treat you with less kindness than I.\"\n\t\t\t\t\n\t\t\t\tWith that he steps into the small wooden boat, pushing it into the current with his cargo of souls and disappears into the mist. Thinking over his words, you find they carried a certainty that leaves you wondering whether remaining in this place of purgatory forever, or risking the wrath of those who would judge you, will yield the worse fate. \n\t\t\t\t\n\t\t\t\t*goto riverbank\n\t\t\t\t\n\t\t\t\n\t\t\t#Blame those who have not observed your final rites for your lack of payment.\n\t\t\t\t\"I know you Oedipus, son of Laius.\" The voice has the texture of dead leaves crackling underfoot. \"Still blaming others for your misfortunes, rather than taking responsibility for your own fate. Your judgement will not go well I fear.\"\n\t\t\t\t\n\t\t\t\tYou blink a few times processing the information. Souls left to wander the banks of the Styx are not judged, rather left in a state of purgatory until forgotten in both life and death. \n\t\t\t\t\n\t\t\t\t*fake_choice\n\t\t\t\t\t#\"That's not fair. How am I to control what happens after my death?\"\n\t\t\t\t\t\tThe god rolls his shoulders in a boneless shrug. \"That was your affair to manage, not mine. As it is also not my place to award you a final judgement. There are those who have been waiting for you Oedipus. You may not like what they have to say.\" \n\t\t\t\t\t\n\t\t\t\t\t#\"I was a pawn of the gods and you know it.\"\n\t\t\t\t\t\t\"It is not my place to judge,\" the god snorts. \"There are others to fulfil that task.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tCharon turns to gaze across the mist shrouded waters. \"You will not like what they have to say I fear.\"\n\t\t\t\t\t\n\t\t\t\t\t#\"I have done nothing wrong.\"\n\t\t\t\t\t\t\"Such arrogance,\" the god sighs. \"All men have done wrong in their lives, and you more than most. There are those who have been waiting for you Oedipus. Those who will not look upon you kindly.\" \n\t\t\t\t\t\n\t\t\t\t\t#\"You have no right to judge me.\"\n\t\t\t\t\t\t\"And you lack humility,\" the god hisses in return. \"You are correct, I cannot award you final judgement; though your arrogance will not get you far with those beyond. You think I know nothing of those I ferry across the river Oedipus? You will be judged, though you may wish you had not.\"\n\t\t\t\t\t\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\"So you will take me to the other side?\" you enquire, uncertain as to whether remaining here, or facing the displeasure of those beyond will yield the worse fate.\n\n\t\t\t\t\"At the appointed time and not before. Now be gone until you are sent for.\" Charon snarls in a voice edged with ice that brooks no argument. \n\t\t\t\t\n\t\t\t\tYou find your feet taking you away from the boat as if no longer under your own control. \n\t\t\t\t\n\t\t\t\t*goto riverbank\n\t\t\t\t\n\t\t\t\n\t\t\n\t\n\t#Avoid him and look for another way out. \n\t\tYou turn away, walking deeper into the shadows where nameless things scutter and crawl in the darkness. As far as you dare to venture, you find nothing but solid walls of rock and a muddy river bank that seemingly stretches on forever. Defeated for now, you return to the dock within the dubious safety of flickering torchlight. \n\t\t\n\t\t*goto riverbank\n\t\n\t#Find a quiet place to sit and resign yourself to your fate. \n\t\tWith no money to pay for passage across the river, you're condemned to remain in this place by the pleasure of the gods; even if it means lingering for an eternity in the dark. Instinctively you know nothing you can do or say will change that. Finding a relatively smooth rock within the circle of flickering torchlight you sit, feeling the chill from the ground seeping into your soul. The world dims further, as if what little energy remains within you is draining away, bringing you closer towards oblivion.\n\t\t\n\t\t*goto riverbank\n\n\n*label riverbank\n*page_break\nShades with the consistency of smoke shamble aimlessly on the bank, many wailing in high tones pitched with madness. You wonder how long they have been trapped here on the border between the living and the dead.   \n\n*fake_choice\n\t#Avoid them. \n\t\tYou shiver inwardly, hoping the madness isn't contagious and shrink away from their clutching fingers that smell of death and decay. \n\t\t\n\t#Speak to them. \n\t\tMost shades regard you with dull empty eyes; apathetic and mute. From time to time you come across one more coherent than most and capture their attention for a time. Those who deign to speak to you are usually passing through this land, merely pausing for a while until they can build up enough courage to approach the solemn god and his ferry. Only a few are trapped just as you are. \n\t\t\n\t\tThough you'd hoped to gain some insight into your situation, or perhaps even something approaching friendship, you find none. The despair of this place infects all that it touches, making any pretence at retaining somewhat normal human relationships all but impossible. No one who speaks knows of any route of escape from this prison, but for the boat which ferries souls into the land ruled by Hades beyond. \n\n\nTime becomes meaningless without the light of the sun to mark the passage of days. Shades come, and shades go. Most leave by Charon's ferry, although some eventually wander deep into the darkness filled with the unseen scraping of claws on rock and high pitched inhuman screams. Of those souls, most are never seen again, and those few who return are wide eyed and driven to madness; raving almost incomprehensibly about demons in the dark.\n\n*page_break\n\nSeated on a rock, mind hazed with the unknown passage of time; you react sluggishly to the cold bony hand grasping your shoulder. Turning, you're only mildly surprised to find Charon's eyes burning beneath his cowl. \n\n\"It is time. Come.\"\n\nUnresisting you step into his empty boat, taking a seat on the hard wooden boards near the bow. \n\n\"Do not touch the water unless you wish to seek oblivion,\" the god warns sternly, as he pushes the boat away from the bank with a long pole and into the shifting silvery fog. \n\n*page_break\n\nThe only passenger, your fingers clutch the sides of the craft tightly as it bucks and spins through unseen rapids. Risking a glance at Charon, you see his skeletal face lit with an unearthly glow as he strains to guide the boat through the treacherous currents. Finally with a dull thud, the ferry butts against the bank of the far shore. \n\nThe landing is a mirror image of the one you just left, but for the massive cave that gapes in the rockface. Charon remains silent, only gesturing with fleshless fingers towards the wooden dock, bidding you to leave. Though the boat barely rocks under your weight, you clamber awkwardly on the platform as the ferryman pushes the craft into the currents once more. \n\n\"Remember. Do not touch the water,\" Charon's voice rasps in warning once more, fading into echoes as the figure of the god standing tall on his small boat melts into the mist and is gone. \n\n*page_break\n\nAlone on the empty shore, you approach the cave cautiously aware not all may be as it first appears in this place. The sound of heavy footfalls echo from within the cave, carrying with it the musty smell of fur laced with death. Taking an involuntary step back, you remember Charon's warning
