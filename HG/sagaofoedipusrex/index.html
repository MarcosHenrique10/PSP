<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Saga Of Oedipus Rex — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "sagaofoedipusrex", "title": "The Saga Of Oedipus Rex", "scenes": {"apollosphinx": "*temp changesubject \"no\"\n*temp sphinxcare 0\n*temp al \"no\"\n*temp knowpromise \"no\"\n\n\n\n\n*if (sphinxalive != \"no\") \n\tAthena raises an eyebrow at your request, while Apollo's look turns cagey.\n\t\n\t\"You knew she was still alive.\" The statement is directed towards Apollo who drops the pretence of innocence with a roll of his blue eyes. \n\t\n\t\"As did you.\"\n\t\n\t\"Perhaps, but it is my role to know such things. Besides, until now I was never directly involved; there was no reason for me to interfere in the matter.\" She sighs. [i]\"You[/i] on the other hand, were meant to be supervising this mess with the Sphinx. Hera was quite specific in the details. She will not be pleased.\"\n\t\n\tThe golden-haired man's face twists in to a frown. \"So, you plan to tell her? You may want to consider how uncomfortable she makes [i]everyone[/i] when angry, and her grudges are quite legendary to behold. If you should doubt that, just ask my mother.\"\n\t\n\tThe goddess of wisdom rubs her temples tiredly. \"No, she will not hear it from me. But you'd best hope no one else discovers the truth.\"\n\t\n\t*page_break\n\t\n\tShe turns her attention back your way. \"You say she gave you aid? That does not sound like the Sphinx I know at all. Tell me what you speak of?\"\n\t\n\tToo late you remember the Sphinx's plea not to let any know of her continued existence. \n\t\n\t\"I'm not even certain it was real, it almost seems like a dream...\"\n\t\n\tAthena's eyes hold your own, compelling you to speak what you know. Unable to resist the will of a god, you have no choice but to comply. \"It was last night; the Furies were upon me, but I think something drove them away. Everything was in shadows, but I heard the beat of wings, and that voice... It had to be [i]her.\"[/i]\n\n\t*page_break\n\t\n\t\"Ah,\" Athena nods in satisfaction, setting back into her chair. \"That was the missing piece.\"\n\t\n\tEven Apollo looks curious now, glancing between his sister and yourself.\n\t\n\t\"I'm afraid she is gone Oedipus. She is not a goddess herself and was lucky to have caught the Furies by surprise, distracted as they were by your presence. I wondered at her sudden flight from Greece, but it makes sense that she would leave the stronghold of the Olympians and retreat to a place where Megaera and her sisters are less likely to venture and exact their revenge. Tell me Oedipus, why do you wish to find her?\"\n\t\n\t*disable_reuse\n\t*label whychoice\n\t\n\t*choice\n\t\t#\"To thank her, nothing more. I feel as if that is the right thing to do.\"\n\t\t\tAthena shakes her head. \"She will not appreciate the gesture. It is likely she merely felt it akin to fulfilling a debt. Your words helped her to break free of her bonds, and in return she gave you a chance at retaining your own life. I will not betray her location for such a reason. Are you sure there is nothing more to your request?\"\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#\"No, that was all.\"\n\t\t\t\t\t*label refuseathena\n\t\t\t\t\t\"Then I suggest you pick something else.\" The tone of her voice brooks no arguments of the matter.\n\t\t\t\t\t\n\t\t\t\t\tYou take your time to think the matter over while the deities wait silently for your decision. \n\t\t\t\t\t\n\t\t\t\t\t\"Very well. I have decided if it is possible, that I be allowed to...\"\n\t\t\t\t\t\n\t\t\t\t\t*set chooseagain \"yes\"\n\t\t\t\t\t\n\t\t\t\t\t*goto_scene part9king\n\t\t\t\t\t\n\t\t\t\t#\"I should have known better than to try to hide the whole truth from you. There is something else.\"\n\t\t\t\t\t\n\t\t\t\t\t\"She and I are of a kind. We have both lost everything that made us what we once were. It seems that we belong together.\"\n\t\t\t\t\t\n\t\t\t\t\t*goto whychoice2\n\t\t\t\t\t\n\t\t\t\t#Surely if I have something more to say, it is for her to hear alone.\"\n\n\t\t\t\t\tAthena frowns at your impertinence. \"You ask me to betray her location, something that could very well end her life if handled wrongly. I claim right to know what your reasons are. If you refuse, you must choose something else for you will never find her without my help.\"\n\t\t\t\t\t\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Give in to the Goddess' demands and tell her what she wants to know. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"She and I are of a kind. We have both lost everything that made us what we once were. It seems that we belong together.\"\n\t\t\t\t\t\n\t\t\t\t\t\t\t*goto whychoice2\n\t\t\t\t\t\n\t\t\t\t\t\t#Refuse even though it may mean having to pick another path in life to take. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou shake your head, refusing to give in to Athena's demands. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto refuseathena\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t#\"She and I are of a kind. We have both lost everything that made us what we once were. It seems that we belong together.\"\n\t\t\t*label whychoice2\n\t\t\tAthena shakes her head. \"Lost everything? So sure are you of that? Besides, the Sphinx has always been the most mercurial of Echidna's children; unpredictable and wild. Even I could not predict with certainty how she would react to your presence. She may genuinely feel something for you, or on the other hand have seen her aid as no more than payment in kind when you help her break the compulsion that would have killed her that day on the trail.\" \n\t\t\t\n\t\t\t\n\t\t\tShe stands, regarding you with keen dark eyes. \"Are you sure it is worth the risk? You may lose the life you have just regained. Even if she welcomes you, it would mean leaving everyone you ever knew far behind. Perhaps forever.\"\n\n\t\t\t*choice\n\t\t\t\t#\"I believe so.\"\n\t\t\t\t\tSomething unreadable flickers though the goddess' eyes. \"Very well, if that is your choice so be it. The Sphinx has retreated to a land where there are great seas of shifting sand, and the heat of the sun is capable of burning your skin to ash. I have little influence to assist you there should events turn ill for you. Other gods rule these lands, ones who do not welcome us kindly and I will not chance antagonising their court over such a matter as this. I can place you at their boarder, it will be up to you from that point on.\"\n\t\t\t\t\t\n\t\t\t\t\tWith a clap of her hands, everything goes white.\n\t\t\t\t\t\n\t\t\t\t\t*goto sphinxend\n\t\t\t\t\t\n\t\t\t\t#\"It's a chance I need to take.\"\t\n\t\t\t\t\t\"Mortals. Sometimes even I find your kind hard to comprehend.\" Athena sighs. \"Very well, if that is your choice so be it. The Sphinx has retreated to a land where there are great seas of shifting sand, and the heat of the sun can burn your skin to ash. I have little influence to assist you there should events turn ill for you. Other gods rule these lands, ones who do not welcome us kindly. I will not chance antagonising their court over such a matter as this. I can place you at their boarder, it will be up to you from that point on.\"\n\t\t\t\t\t\n\t\t\t\t\tWith a clap of her hands, everything goes white.\n\t\t\t\t\t\n\t\t\t\t\t*goto sphinxend \n\t\t\t\t\n\t\t\t\t#\"You make a good point. Perhaps I should use the time I have been given wisely.\"\n\t\t\t\t\tAthena nods, indicating you to make your choice. \n\t\t\t\t\t\n\t\t\t\t\tAfter remaining in silent thought for a time, you speak up. \"If it is possible, I would like to be allowed to...\"\n\t\t\t\t\t\n\t\t\t\t\t*set chooseagain \"yes\"\n\t\t\t\t\t\n\t\t\t\t\t*goto_scene part9king\n\t\t\t\t\n\t\t\t\t\n\n\n*label sphinxend\n\n*page_break\n\n*set status \"A traveller in Egypt.\"\n\nAny thought that the goddess had been exaggerating about the climate, had long since dissipated during your time wandering the arid landscape. You'd long since discarded your heavy woollen cloak and tunic, for the flowing white linen shirts and kilts of the locals. You'd also obtained a scarf, which winds around your head to protect your skin from the worst of the sun's rays.  \t\n\nDragging your feet tiredly through the dust, you reach the base of a massive four-sided monument that resembles nothing more than a man-made mountain and lean gratefully into its shadow. In the distance you can make out the form of a gigantic stone lion topped with the head of a man. \n\nThough your ability to speak their language is rudimentary, you'd managed to find out that your Sphinx was not the only one to have walked this earth. What had shocked you more than this revelation however, was the amount of reverence that the name evoked. In this desert land they were not seen as monsters, but instead as guardians to be honoured rather than feared.  \n\t\nLittle news reaches you in this place, although occasionally you chance upon snippets from your homeland. As far as you could tell from the morsels of information that had fallen your way, \n*if (fate = \"king\")\n\tCreon had been appointed regent until his wards; your young sons Eteocles and Polynices, grew to be of age.   \n\n\tOf your daughters, Ismene and Antigone however, you hear little asides for that they still live.\n\t\n\t*page_break\t\t\n*if (fate != \"king\")\n\tQueen Jocasta still rules Thebes for now. Rumour has it however that she has been seen less and less in public as the months have drifted by, unable to fully reconcile herself with what had happened to both her husband and son. It seems likely that if he doesn't already, Creon will rule Thebes in all but name soon.   \n\t\n\t\n*page_break\n\nEventually your contact arrives: a tall wiry man with skin like ebony. In broken Greek, he tells you of a valley filled with caverns where the locals speak of a sphinx that has taken up residence there. Little is seen of her, though the goats left as offerings regularly disappear.\n\n[i]Finally a lead.[/i] Reluctantly you take a coin from your purse and pay him. He smiles, nodding his head and hurries away to the camel grumbling at being raised from his rest so soon. \n\n*set coins -1\n\nYou try not to let your hopes rise too high, too soon, lest they be dashed once again. This was not the first time you'd been offered advice on her whereabouts. Although your contact's information had been good in the past, it always seemed as if you'd always arrived too late to find her long gone. Perhaps this time with a steady food supply and shelter, you hope she will settle long enough for you to catch up.\n\n\n*page_break\n\nSo different to the land of your birth, the valley opens up before you like a gash into the hard-baked ground. No more than the occasional scraggly bush grows along the worn, sandy trail that you follow into its shadow. A makeshift pen of branches tied with sinew stands empty, it seems you've followed the directions from the local village correctly. Apart from leaving their offerings, no one stays any longer than need be in this place. Despite their fear, reports seem to indicate that no one has gone missing since her arrival... at least not yet at any rate.\n\nIt's not difficult to work out where she now resides. An untidy pile of bones is stacked by the entrance of one of the nearby caves. Cautiously you walk closer. \n\n\nA rattling hiss comes from the shadows, spitting out words in a language you don't understand. Without warning a golden shape lunges towards you in a blur, knocking you to the ground. \n\nThe Sphinx spins, grumbling under her breath. \"I thought we were past this. How many times do I have to convince these people to bring the goats, then leave me in peace.\"\n\nThe fall knocks the scarf loose from your head, unravelling as you climb to your feet. \n\nShe freezes, eyes wide. [i]\"Oedipus?\"[/i]\n\n*choice\n\t#\"That's some welcome you put out. I can see why the locals were reluctant to take me here now.\"\n\t\tYou rub at your bruised ribs, feeling for fractures and finding none.\n\t\t\n\t\t\"Well that's what you get for sneaking around my home unannounced,\" she replies coolly. \"Why are you here? Do you bring more misery to my door? Speak up and tell me why I would want to hear anything you have to say.\"\n\t\t\n\t\t*goto sphinxfate\n\t\t\n\t*Selectable_if (refusesword = \"yes\") #\"Must you knock me flying every time we meet?\"\n\t\tShe sniffs. \"Well you would go creeping around outside my home without announcing yourself. You're lucky I didn't snap your neck instead; my temper runs short these days.\"\n\t\t\n\t\tStill she holds her position, head tilted in wary curiosity rather than anger, and making no move to attack further. \"Why have sought me out in my place of exile Oedipus? Is it to gloat? The mighty Sphinx fallen into hard times by your hand. Or do you perhaps bring more misery to my door in your wake? Speak up and tell me why I would want to hear anything you have to say.\"\n\t\n\t\t*goto sphinxfate\n\t\n\t#\"Before you do anything hasty, just hear me out.\"\n\t\tShe laughs bitterly. \"Just what do you think I am planning to do with you little \n\t\t*if (fate != \"king\")\n\t\t\tprince? \n\t\t*if (fate = \"king\")\n\t\t\tking?\n\t\tIf I wanted you dead, you would be so already.\"\n\t\t\n\t\tYou let out the breath you were holding in relief. It seems she is willing to talk. \n\t\t\n\t\t\"I have been searching for you.\"\n\t\t\n\t\t*goto sphinxsearch\n\t\t\n\t\t\n\t\n\t#\"Greetings Sphinx. I've been searching everywhere for you.\"\n\t\t*label sphinxsearch\n\t\t\n\t\t\"Have you just?\" she growls coolly. \"Have you not caused me enough trouble during your time on this Earth, that you seek to inflict more?\"\n\t\t\n\t\t\"That's not the case,\" you protest. \"You don't even know why I'm here.\"\n\t\t\n\t\tHer tail switches in agitation. \"Does it matter? I live in this desolate place, banished from my homeland because of [i]you.[/i] What could you possibly have to say to me that I would want to hear?\"\n\t\t\n\t\t*label sphinxfate\n\t\t\n\t\t*choice\n\t\t\t#\"That's not fair. You know it's not. We were both the victims of prophesy and fate.\" \n\t\t\t\t\"I'm no longer a\n\t\t\t\t*if (fate != \"king\")\n\t\t\t\t\tprince. \n\t\t\t\t*if (fate = \"king\")\n\t\t\t\t\tking.\n\t\t\t\tI am nothing but a traveller. But at least I'm free... as are you it seems.\"\n\t\t\t\t\n\t\t\t\tThe hackles rise on her neck as her eyes narrow. \"Free only while I remain banished and anonymous. Condemned to a life of solitude, threatening tributes of stringy goats and cattle out of the locals who seem to want me to be some kind of benevolent protector. I am no human's servant and [i]will not ever[/i] stoop to such a role, no matter how long I live.\"\n\n\t\t\t\t\"You complain about a life of solitude and yet reject the one person who comes to visit? It seems you have forgotten the laws of hospitality Sphinx.\"\n\t\t\t\t\n\t\t\t\t\"I live in a [i]cave[/i] human. What did you expect? Wine and cushions laid out for your arrival?\" The Sphinx hesitates, tail twitching in agitation as warring emotions flit across her face. Resentment shifts to despair and back to uncertainty.\n\n\t\t\t\t*goto insidecave\n\t\t\t\t\n\n\t\t\t#\"How about a thank you for saving me from the Furies.\"\n\t\t\t\t\"A repayment of debt, nothing more,\" she snorts. \"Is that what you came all this way to say? You should have stayed in Greece.\"\n\t\t\t\t\n\t\t\t\t\"I doubt you risked banishment or even death just because I spoke to you on the road once.\"\n\n\t\t\t\t\"Debts are debts, they must be paid no matter the cost,\" she snaps back. \"Just because you don't acknowledge something as one, doesn't mean it ceases to exist.\"\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#\"Then why haven't you eaten me already?\"\n\t\t\t\t\t\t\"Change of diet,\" she grumbles. \"Can't very well scare off the species bringing me food, can I? Besides, I'm not in a place of power here. I doubt the local deities would appreciate me poaching their humans for meals. You on the other hand are not from around here, perhaps I could make an exception.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tShe advances towards menacingly you with fluid steps, before suddenly breaking off and stalking away back to the cave.\n\n\t\t\t\t\t\tHer voice echoes mournfully from the shadows. \"Go away Oedipus. Leave before I change my mind.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*label leaveoedipus\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou take a steadying breath. You haven't searched the length and breadth of Egypt to be dismissed so easily. \"The hospitable thing to do would be to offer a visitor a place to rest in your home.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tHer voice rings out with cold laughter. \"I live in a [i]cave[/i] with nothing more than scraps of raw lamb to offer you. But if you so insist, please be my guest and come inside. Watch your step on those ribs by the entrance, they're sharp.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tCarefully you pick your way through the cracked bleaching bones, clinging to the thought that the Sphinx invited you over the threshold herself. Hopefully she remembers that means it would be bad manners to eat you later.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto sphinxepilogue\n\t\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t#\"I don't believe you.\"\n\t\t\t\t\t\t\"I don't care what you believe little human and have had more than enough of your opinions today.\" She stalks back towards the cave, her voice echoing from the shadows. \"Go away Oedipus. Leave before I change my mind about silencing you for good.\"\n\t\t\t\t\t\n\t\t\t\t\t\t*goto leaveoedipus\n\t\t\t\t\t\n\t\t\t\t\t#\"If I mean so little to you, then perhaps I should just leave.\"\n\t\t\t\t\t\t\"Perhaps you should,\" she snaps, before turning and retreating the shadowed entrance of the cave. Her eyes are sad when she turns over her shoulder. “Go away Oedipus. It is best for both of us.\" \n\t\t\t\t\t\n\t\t\t\t\t\t*goto leaveoedipus\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t#\"I spent so much time searching for you, I would ask you not to send me away so soon.\"\n\t\t\t\t\t\n\t\t\t\t\t\tShe regards you steadily, looking for any trace of sarcasm or deception. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"You wish to speak to me? Very well if you insist, but I'll not stand out here talking in the heat of the sun. Mind your step on those bones by the entrance,\" she grins toothily flicking the sharpened ends of some ribs aside with a paw. \"They're sharp.\"\n\t\t\t\t\n\t\t\t\t\t\tCarefully you pick your way through the cracked bleaching bones, clinging to the thought that the Sphinx invited you over the threshold herself. Hopefully she remembers that means it would be bad manners to eat you later.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto sphinxepilogue\n\t\t\t\t\t\t\n\t\t\t#\"I've searched for you all this time, and you want me to leave already?\"\n\t\t\t\t\"Stay or go. Why should I care any longer?\" she sulks, turning her back on you. \"You think I [i]like[/i] living in this place so far from my home? At least the locals can be threatened into providing tributes of cattle and goats; no matter how stringy and tasteless they may be. Else there's precious little to hunt out here but for nasty desert snakes and scorpions, and they're barely more than morsels.\"\n\t\t\t\t\n\t\t\t\tShe turns, stalking away back to the cave; voice echoing mournfully from the shadows. \"Go away Oedipus. Just leave me be.\"\n\t\t\t\n\t\t\t\t*goto leaveoedipus\n\t\t\t\n\t\t\t#\"I've missed you.\"\n\t\t\t\tHer body goes stock still. \"What did you say?\"\n\t\t\t\t\n\t\t\t\t\"I said I've missed you. And I think you feel the same. Why else did you come to my rescue that night?\"\n\t\t\t\t\n\t\t\t\t\"No one has ever told me that before,\" she whispers almost to herself before regarding you once more, her expression hardening. \"I was repaying a debt. That was all. Nothing more, nothing less.\"\n\t\t\t\t\n\t\t\t\t\"Then you wish me to leave you to your lonely cave once more? You're not going to even ask me in?\"\n\t\t\t\t\n\t\t\t\tThe Sphinx hesitates, tail twitching in agitation as warring emotions flit across her face. \n\t\t\t\t\n\t\t\t\t*label insidecave\n\t\t\t\t\n\t\t\t\t\"Well I guess it would be only hospitable for me to invite you in.\" She finally allows. \"Follow me and watch your step.\"\n\t\t\t\t\n\t\t\t\tFlicking bleached bones casually out of the way, she strolls past you into the cave; smiling almost hesitantly before disappearing inside.\n\t\t\t\t\n\t\t\t\t*goto sphinxepilogue\n\t\t\t\t\n\t\n\t#\"It's been a while, but yes it's me.\"\n\t\tShe snorts. \"I should have known you would turn up sooner or later. What must I do to be free of you? Is it not enough that your actions have exiled me from my home? Why are you here? Speak quickly and tell me why I would want to hear anything from your mouth; my patience is not what it once was.\"\n\t\t\n\t\t*goto sphinxfate\n\t\n\t\n\t\n\t\n\n*label sphinxepilogue\n\n*page_break\n\n\n\nThe cave turned out to be none too comfortable and your companion touchy with a mercurial temper; but never again was the suggestion brought up to send you away. Gifts of food and water (doubtless obtained from the locals living closer to the fertile banks of the Nile,) were left for you by the Sphinx even when she would go missing without explanation for days at a time. \n\nSlowly the villagers started bringing the food themselves, although they always left it at the makeshift corral far from the cave's entrance. Though they may see the Sphinx as some kind of protectress, it seems as if they remained rightfully leery about stretching the familiarity too far. \n\nAttempts to communicate with the people who came with their gifts, were generally met with wide eyed looks and rapid speech of which you could understand little. Bringing the issue up with the Sphinx one night, under sufferance she agrees to attempt to teach you the local dialect. Slowly you find your skill in languages improving, and with it your relationship with your one time enemy.\n\nOne morning you see a familiar face. One of the grey-haired elders limping up the path carrying a heavy basket filled with fish, bread and sealed jars of beer. \n\n*fake_choice\n\t#Hurry over to take the burden from him.\n\t\tHe hands the basket to you with a look of uncertainty, as if unsure why you would offer to carry it for him. Ducking his head in reverence, he speaks rapidly in an odd dialect. Taking a string of glass beads from around his neck, he loops it around your own before hurrying away.\n\t#Let him continue the climb and bring the food to where you stand. \n\t\tThe old man continues to struggle under the weight of the bundle, but you sense no resentment as he places it at your feet with a duck of his head. Speaking in an odd dialect, he takes a string of glass beads from around his neck and loops it around your own before hurrying away.\n \n*set beads \"A string of glass beads.\"\n\nBlinking in confusion you watch him go, wishing your command of the language was more skilled. Still, the beads are beautiful. You hold the coloured glass up to the light, scattering rainbows of colour against the sand. It's a lovely gift regardless of the reason. \n\n*page_break\n\nLugging the basket inside, you set it upon the low table where the Sphinx lounges on a flattened rock. \n\n\"Fish again?\" she sighs dramatically. \"There's been no goats for weeks. How am I supposed to live on fish alone?\"\n\n\"You could try the bread instead.\"\n\n\"Ick.\" She makes a disgusted face. \"I don't know how you can eat that stuff. It's all dry and crumbly. I suppose you'd better hand me the big silver one.\"\n\n\"Sure you wouldn't like me to cook it?\"\n\nShe snorts in disdain. \"I don't see why you feel the need to turn things into charcoal. Besides, I'm hungry [i]now.\"[/i] \n\nGrabbing the fish between her paws, she tears a strip of flesh from its tail and chews contentedly. Settling down on a low rock, you select a hunk of bread instead, stomach still churning a bit queasily at watching your host eat.\n\n*choice\n\t#\"You know, I don't think you've ever told me your name.\"\n\t\tShe pauses, looking up from the shredded remains of the fish. \"What are you talking about human? You know who I am.\"\n\t\t\n\t\tYou hesitate uncertainly. \"I know what everyone calls you, yes. But do you have another name, one your mother gave you perhaps?\"\n\n\t\tYour companion tilts her head considering. \"What a strange question, but I guess you mortals have different rules with regards to niceties compared to the likes of my kind. I suppose she used to call me Aristomache when I was a kit, but that's not a name I've heard uttered in a long time.\"\n\n\t\t*set sphinxname \"Aristomache\"\n\t\t\n\t\t*achieve sphinxname\n\t\t\n\t\t*choice\n\t\t\t#\"That's a beautiful name. Can I call you that? It's so much more personal I think.\"\n\t\t\t\t\"It's not [i]beautiful,\"[/i] she growls. \"I was called such by my mother to encourage me to grow to be formidable in battle.\"\n\t\t\t\n\t\t\t\t*fake_choice\n\t\t\t\t\t#\"I still think it's a lovely name.\"\n\t\t\t\t\t\tA soft growl rumbles in her throat. \"Well be that as it may, I've left that name far behind. I would appreciate it if you continued to call me Sphinx please.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t#\"That didn't come out right,\" you quickly correct. \"What I mean is it suits you.\"\n\t\t\t\t\t\t\"Hmm,\" she grumbles not completely convinced by your recovery. \"Well I guess you can use that name if you like. Only when we're alone though, alright?\"\n\t\t\t\t\t\t*set sphinxname \"Aristomache\"\n\t\t\t\t\t\t\n\t\t\t\t*goto lookup\n\t\t\t\t\n\t\t\t#\"What a strong sounding name. I can see why she gave it to you.\"\n\t\t\t\tThe Sphinx preens under the praise. \"Well she thought I had potential, even when I was young. She always did want me to be a formidable warrior.\"\n\t\t\t\t\n\t\t\t\tShe falls silent for a moment, deep in thought. \"I guess I wouldn't [i]object[/i] to you using that name if you wanted to. Only when we're alone though, alright?\"\n\t\t\t\t*set sphinxname \"Aristomache\"\n\t\t\t\t\n\t\t\t\t*goto lookup\n\n\t\t\t#\"Which would you prefer me to call you?\"\n\t\t\t\tShe takes another bite and chews thoughtfully. \"Honestly, I've never even thought about that name for decades. Sphinx is who I really am now.\"\n\t\t\t\n\t\t\t\t*goto lookup\n\t\n\t#Eat in silence, not wanting to risk the Sphinx's ire.\n\t\tPerhaps Sphinx is the only name she has ever been given, or perhaps it is something private that she doesn't wish to share. Either way you think it safest to avoid the subject for now.\n\n\t\tLooking up from her meal, the Sphinx eyes your neck with interest. \"Pretty necklace. I used to have one like that.\"\n\n\t\t*goto lookup2\n\t\t\n\t\t\n\t\t\n*label lookup\n\nShe clears her throat uncomfortably, changing the subject as her eyes settle on your neck with interest. \"Pretty necklace. I used to have one like that.\"\n\n*set changesubject \"yes\"\n\n*label lookup2\n\n\"Yes, they are. The man who brought us our food today gave them to me.\"\n\n*fake_choice\n\n\t#\"Would you like them?\"\n\t\t\"For me?\" She gives you a rare smile. \"Well if you wouldn't miss them too much...\"\n\t\t\n\t\tPulling the string of glass beads over your head, you hand them over. She admires the necklace briefly before settling it about her neck.\n\t\t\n\t\t*set beads \"\"\n\t\t\n\t\t\"Any reason why you're getting such nice baubles? What have you been up to in my absences Oedipus?\" Her expression is sly rather than angry.\n\t\t\n\t\t\"I have no idea, I couldn't understand the exact meaning of his words. I think he called me [i]kar-hien.[/i]\" You voice the foreign sounds as well as you're able to remember, unsure if you've got it quite right. \n\t\t\n\t\t\"Ah, that explains it.\" She grins toothily. \"Just a gift to honour my priest.\"\n\t\t\n\t\tYou choke on a half-swallowed piece of bread until your companion pushes a stoppered jar of water your way allowing you to wash it down.\n\t\n\t\n\t#\"Actually, the conversation was a bit odd. Can you translate?\"\n\t\tYou wrack your brain, trying to think of the words he used. \"I think he said I was [i]kar-hien?\"[/i]\n\t\t\n\t\tShe winces. \"You really need to pay more attention to my teachings Oedipus; your accent is awful. As far as I can make out however, it was a gift for my priest.\"\n\t\t\n\t\tYou choke on a half-swallowed piece of bread until your companion pushes a stoppered jar of water your way with a grin, allowing you to wash it down.\n\t\t\n\t\t\n\"Where in the world would he have gotten [i]that[/i] idea from?\" you rasp out.\n\n\"Oh well, I might have told them as much when I was strolling along the river the other day,\" she replies too innocently, flicking a shiny scale from her paw. \"They were kind of curious about you, as your kind is prone to being. Since they seem to think I was sent by their goddess Sekhmet, it seemed a rational enough explanation to give don't you think?\"\t\t\n\n*fake_choice\n\t#You think I'm here to be your [i]priest?!\"[/i] you exclaim in indignation.\n\t\t\"Come now Oedipus, you're not paying attention. Of course I don't.\" Her eyes sparkle with amusement. \"But humour me for a moment and tell me why it is you still remain?\"\n\t\n\t\t\"You [i]know[/i] why.\"\n\t\t\n\t\t\"But you've never actually said it,\" she persists.\n\t\n\t#\"You know full well I'm nothing of the kind,\" you retort.\n\t\t\"Come now Oedipus, you're not paying attention. Of course I know you're not.\" Her eyes sparkle with amusement. \"But humour me for a moment and tell me why it is you still remain?\"\n\t\n\t\t\"You [i]know[/i] why.\"\n\t\t\n\t\t\"But you've never actually said it,\" she persists.\n\t\n\t#\"You can't let them go on believing that,\" you whisper, shocked at her audacity. \"It's an affront to the gods.\"\n\t\tShe sniffs. \"I'd doubt me they'd have the time to care about something so petty; but if it bothers you so, set them straight yourself.\"\n\n\t\t\"Tell me Oedipus,\" she continues quickly, changing the \n\t\t*if changesubject != \"yes\"\n\t\t\tsubject\n\t\t*if changesubject = \"yes\"\n\t\t\tsubject once more.\n\t\t\"Why is it you stay here with me?\"\n\t\t\n\t\t\"You [i]know[/i] why.\"\n\t\t\n\t\t\"Humour me,\" she persists.\n\t\t\n\t\n\t#\"Well I guess you had to tell them something.\" You incline your head slightly. \"They'd never believe the truth.\"\n\t\n\t\t\"And just what is the truth Oedipus?\" The Sphinx tilts her head, regarding you with keen eyes. \"Why [i]do[/i] you remain here with me?\"\n\t\t\t\t\n\t\t\"You [i]know[/i] why.\"\n\t\t\n\t\t\"Humour me,\" she persists.\n\t\t\n\t\t\n*fake_choice\n\n\t#\"You're a friend of course, perhaps the best one I have left in this world. Why would I wish to leave?\" \n\t\t*set sphinxfriend \"friend\"\n\t\t\"Well speak for yourself. This cave's been pretty crowded since you decided to stay,\" she jibes, but there's a fond edge to it and a smile that says she's less than serious. \n\t\n\t\t\"Ah, now that I think of it, I have some news which should make you pleased. We'll not have to live in this dreary cavern for much longer.\" She grins happily. \n\t\n\t\n\t#\"I lost my heart to you long ago. Stop pretending you never noticed.\"\n\t\t\"Falling in love with little monster me? I always did say madness ran in your family,\" she jibes, but there's a fond edge to it and a smile that says she's less than serious. \n\n\t\t*set sphinxfriend \"love\"\n\t\t\n\t\t\"Ah, now that I think of it, I have some news which should make you pleased. We'll not have to live in this dreary cave for much longer.\" She grins happily. \n\t\n\t#The Fates have not been kind to either of us. We have a lot in common you and I, we need to stick together.\"\n\t\t*set sphinxfriend \"fate\"\n\t\t\"Yes, that we do.\" She nods to herself as if expecting as much. \"On that note, I've something to share that should please you; we'll not have to live in this dreary cave for much longer.\"\n\n\t\t\n\"Where are we going?\" you ask cautiously.\n\n\"Oh, not far. The locals are going to build me... I mean [i]us[/i]... a house more befitting my station than this awful cavern. I've always [i]hated[/i] caves,\" she whines. \t\n\n\"Just like that? They're just going to build you a house?\"\n\n\"Of course. They think I'm related to, or at least acting as a messenger of the divine. Which strangely enough isn't far off the truth, although it's not by the goddess they're thinking of,\" she reflects. \"Besides, I made it fairly clear when I arrived that a happy sphinx is better than an unhappy one for everyone involved.\"\n\n\n*fake_choice\n\t#\"Sounds great. I didn't want to complain, but I'm not much for living in caves either.\"\n\t\t\"I know, you talk in your sleep,\" she laughs. \"Not to worry, we'll have you set up with all your human comforts soon enough.\"\n\t\t\n\t\tYou smile along with her as you stretch out tight muscles from sleeping on the uneven rocky ground. This is the best news you've had in a long while.\n\t\t\n\t#\"Is it ethical to make them build things for us? I mean don't they have their own lives to live?\"\n\t\tShe rolls her eyes. \"They're [i]happy[/i] to do this for me. They told me so.\"\n\t\t\n\t\t\"Of course they did,\" you retort. \"They probably thought they'd be dinner if they refused.\"\n\t\t\n\t\t\"I'll have you know I haven't eaten a single human since I arrived here,\" she huffs. \"Oh fine. If it hurts your sensibilities so much, I'll find something to reward their efforts with. I should be able to raid... Ah, I mean [i]purchase[/i] something valuable from somewhere...\"\n\t\t\n\t\tYou shake your head, letting the matter drop as a discussion for later. \n\t\t\n\t\t\n\t#\"Isn't the cave a bit more secluded? I mean we're trying to avoid notice, aren't we?\"\n\t\t\"I'm in exile and I doubt any of the Olympians will follow me all the way into this land.\" She rolls her shoulders in a feline shrug. \"Besides, I'm only talking about a house. Personally, I'm [i]sick[/i] of having to eke out an existence like this. You continue to live like a hermit if you wish, I've had enough of it.\"\n\t\t\n\t\tRemembering Athena's words you realise she's probably right, but something still bothers you. \"What about the gods that rule this land?\"\n\t\t\n\t\t\"What about them?\" She looks genuinely surprised by your question. \"They have no particular bone to pick with me. Besides they're not a bad bunch when it's all said and done. They actually like my kind.\"\n\t\t\n\t\tThere's going to be no dissuading her, by now you can recognise the stubborn set of her jaw when she will be immovable on an argument. Besides, it would be a lie if you said you never missed sleeping in a real bed. Your sore, tight muscles from sleeping on the rocky ground are a testament to that.\n\t\t\n\t\n\t\n*page_break\n\t\n\nThe progress on your new home went quickly, entire villages pitching in to speed the construction of the airy mudbrick building carved and painted with the Sphinx's image throughout. Never having been treated with the degree of reverence shown to her by the people of Egypt, and with her living conditions now improved; she appeared to be slowly softening her attitude towards mankind, although you'd learned never to mention it in her presence.\n\nThe local people became fiercely protective of her presence. She was a protective omen, a sign from the gods that all was well. It was a belief she never actively encouraged, but at the same time you noticed was never actually denied. Despite all her protests, it seemed she rather enjoyed the attention.\n\nSurprisingly she did entertain guests she deemed worthy of her attention on occasion. Sometimes she even gave advice when asked, although it often came in the form of a puzzle; the answer only clear to those astute enough to decipher her reasoning. \n\nFor yourself, you seemed to be placed in a somewhat honoured, if uncertain position, allowing you to decide exactly how you would fit into the societal hierarchy. \n\n*choice\n\t#You'd taken full advantage, working to regain what influence and power you could. \n\t\n\t\n\t\tHappily, your opinion carried significant influence with both the workers and nobles alike. After all, surely you spoke for Sphinx and her wisdom had become well known. Later many recognised your skills for what they were, often seeking out your advice on areas beyond the realm of those that would be asked of a priest. \n\t\t\t\t\n\t\tAlthough forbidden from aspiring to the heights of the sacred Egyptian royalty; never the less, your influence could be felt through much of the region. So it did not come as a complete surprise, when one day you received a rather special visitor.\n\t\t\n\t\n\t\t*goto createinfluence\n\t\n\t#The Sphinx could have all the attention she wanted. You were simply glad to have a life free from obligations. \n\t\t\n\t\tAlthough respected due to your association with the Sphinx, you went out of your way to keep a low profile; allowing your companion to wield what influence there was to be had uncontested. \n\t\t\n\t\tIt was a quiet life, but one in which all your basic needs were met. There was a certain peace to be had in that.\n\n\t\t\n\t\t*goto_scene peaceending\n\t\t\n\t\t\n\n\n\n*label createinfluence\n\n*page_break\n*set iahmesu \"yes\"\n\nThe clatter of hooves and whinnying of horses announce the arrival of a chariot outside your residence. With a shout to one of the locals to tend to the sweating horses, a tall, scarred man dressed in strips of hardened leather strides unannounced into the antechamber. Seeing you seated at the table surrounded by stacks of papyrus, he pauses before dipping his head respectfully. \n\n\"My apologies for entering unannounced, but I am here to petition your mistress on a matter of some urgency.\" His dark eyes search the room as he absently brushes the dust from his travel worn clothes. \"Is she here? I must speak with her immediately.\"\n\nAs the soldier waits for your reply, you realise you've met the man before. This is no ordinary supplicant, but one of the highest ranked military men in the country. He doesn't know it yet but he's not in luck. The Sphinx is away on one of her excursions and as per usual you've no idea when she will return.\n\n\"General Iahmesu isn't it?\"\n\nHe raises his head with a slight smile at your recognition. \"Indeed. I am sent by the Pharaoh Amenemhet himself to seek the assistance of the representative of Sekhmet, protectoress of Egypt's leaders throughout time.\"\n\n\n*fake_choice\n\t#Push the scrolls to one side and beckon him over. This definitely has your attention. \n\t\t\"Please General, take a seat. It seems we have much to discuss.\"\n\t\t\n\t\tHe selects a polished wooden chair carved to resemble the legs of a lion and sits gratefully. \n\t\n\t#Sigh tiredly. You should have known that letting the Sphinx masquerade as a messenger of their goddess was going to come back to bite you sooner or later.\n\t\tYou'll have to talk to her about the implications of this particular deception; although it seems it is far too late to do anything about it now. \n\t\t\n\t\tWith a wave, you gesture to an unoccupied wooden chair carved with the paws of a lion. \n\t\n\t\tHe strides over and takes a seat, slumping slightly with exhaustion. His skin is reddened and chapped from the ride through the heat of the midday sun to get here. \n\t\t\n\t#You don't care who he represents. It was inappropriate for him to barge in unannounced and you plan to make sure he knows it. \n\t\tYou scowl at his lack of proprietary. Even a general is beneath one such as yourself within these walls. \n\t\t\n\t\t\"That may be, but to come into my home unannounced? It is a sign of ill manners at the very least [i]General.\"[/i] \n\t\t\n\t\tThe soldier's smile tightens into an attempt to hide his exasperation at your response. It's clear that he feels now is not the time for debating his social skills. \n\t\t\n\t\tWhen he speaks, his deep voice carefully neutral. \"I beg your forgiveness, but perhaps when you hear what I have to say you will understand. Please may we talk?\"\n\t\t\n\t\tAlthough you're within your rights to send him away, being on the bad side of the Pharaoh is unlikely to be conductive to your ongoing wellbeing. With a grimace, you gesture towards a wooden chair carved to resemble the legs of a lion.\n\t\t\n\t\tThe general stalks over and takes a seat, back rod straight and ill at ease. \n\t\t\n\"Begging your pardon,\" he coughs uneasily. \"But perhaps the Sphinx would see fit to grace us with her presence? Time really is of the essence.\"\t\t\n\n\n*choice\n\t#\"My apologies, but she is unavailable at present. However if time is short as you say, perhaps I may be of assistance?\"\n\t\t\"I did not mean any insult.\" He holds his hands up in a peace-making gesture. \"My Pharaoh's message was for the Sphinx, however your reputation as a tactician precedes you Oedipus. I would be pleased to discuss matters with you while we wait.\"\n\t\t\n\t\t*set generalmood \"like\"\n\t\t\n\t\t*goto talkplan\n\t\t\n\t#\"I speak on behalf of the Sphinx. Tell me what you wish, and I will relay it to her if the request is worthy.\"\n\t\t\"I come on behalf of his majesty, divine ruler of all within Egypt: Including [i]you.[/i] You tread a dangerous path by questioning his right to seek the help your mistress.\" Iahmesu's hand tightens on the hilt of the dagger at his leather belt for a moment, before wrenching it away to hit the wooden table hard enough to make it rattle. \"I will not dishonour this place by shedding the blood of Sekhmet's priest, but I shall inform your mistress the nature of the one she has serving her. No doubt her punishment will be worse than anything I could do to you.\"\n\n\t\tRising with an abruptness that sends his chair toppling to the floor with a crash, he storms from the room muttering curses under his breath.\n\t\t\n\t\t*set generalmood \"dislike\"\n\t\t\n\t\t*goto generaldislikes\n\t\t\n\t\t\n\t#\"The Sphinx is not here at the moment, and I have no way to summon her. Would you care to wait?\"\n\t\tHis eyes widen visibly with alarm at the mention of summoning one he believes to be only a small step below the gods themselves.\n\t\t\n\t\t\"I shall wait of course. I did not mean to sound impatient, but the matter is most pressing.\" He pauses for a moment considering. \"Your reputation as a tactician precedes you Oedipus. Perhaps I could discuss the nature of the request with you until she returns?\"\n\t\t\n\t\t*choice\n\t\t\t#Nod. You're interested in what he has to say anyway.\n\t\t\t\t*set generalmood \"like\"\n\t\t\t\n\t\t\t\t*goto talkplan\n\t\t\t\n\t\t\t#\"Go ahead,\" you reply, confident in your ability to assist him.\n\t\t\t\tYour confidence seems to have a steadying effect on the soldier. \"I see we were right to seek your assistance, though it is no small task that we ask of you.\"\n\t\t\t\t*set generalmood \"like\"\n\t\t\t\n\t\t\t\t*goto talkplan\n\t\t\t\n\t\t\t\n\t\t\t#Refuse. \"Your message is for the Sphinx, not me. I shall let you know when she returns.\" \n\t\t\t\t\"Certainly. Perhaps that is for the best.\" Although he agrees, you sense a note of disappointment in his voice as he assures you he will return as soon as he is sent for.\n\t\t\t\t*set generalmood \"neutral\"\n\t\t\t\t\n\t\t\t\t*goto sphinxtalked\n\t\t\t\t\n\n\n*label generaldislikes\t\t\n\n*page_break\n\n\"Well, I believe you've been saying some rather naughty things about the Pharaoh my little human.\" The Sphinx grins toothily, as she sweeps into the room some hours later. \n\nAt your scowl she chuckles. \"Oh Oedipus, [i]do[/i] lighten up. I really couldn't care what you say about some human or another, even if it is one that seems to have a direct line to whatever passes for Olympus around here.\"\n\n\"I see you've been talking to Iahmesu,\" you grumble darkly. \n\n\"I might have. Actually, truth be known it was kind of impossible not to. The man was all but waiting to pounce on me the moment I flew in.\"\n\n\"And?\" you prompt. \n\nHer smile falters, as her expression becomes more serious. \"It seems the whole of Egypt may be about to have something of a less than minor problem with Apep.\"\n\n*label serious\n\n*fake_choice\n\t#\"Apep? Who is that?\"\n\t\t\"Oh of course, being from Greece you'd know him better as Apophis... No? You've never heard of Apophis?\"\n\t\t\n\t\tYou shake your head. \n\t\t\n\t\t\"Huh. Well I guess he's kept largely out of the affairs of the living since the local sun god kind of trapped him beneath a mountain range. You mortals do have such short memories for these sorts of things.\"\n\t\t\n\t\t\"You were telling me about Apep?\" you prompt again, by now used to the offhand insults that are still occasionally directed towards your species. \n\t\t\n\t\t\"Right Apep. Nasty piece of work that one, even by my standards. Spends most of his time slithering around the underworld in the form of a gigantic serpent. Enjoys spreading a good dose of evil and chaos around, when he's not trying to kill off Ra that is. I suspect we'll all have a rather bad day if he gets loose.\" She pauses, tilting her head in a bird-like fashion. \"I guess that's why they want my help to stop him.\"\n\t\t\n\t\t\n\t#\"The chaos serpent from the underworld? Here? How?\"\t\n\t\t\"Well not quite. It sounds like he's still contained under that mountain range Ra sealed over the top of him... but reports are he's been getting rather restless.\"\n\t\t\n\t\t\"Restless?\" you ask. \"How does one know when a giant snake from the underworld is getting [i]restless.\"[/i]\n\t\t\n\t\t\"Earthquakes, lightning... and of course those growls from deep within the Earth tend to be a bit of a giveaway. Iahmesu's pretty convinced all of Egypt is about to have a very bad day. That's why he was looking for me. He wants my help.\"\n\n\t\t\n\t\t\n\t#\"I always thought that serpent to be a myth? Surely he isn't real?\"\n\t\t\"Oh no, quite real I'm afraid,\" the Sphinx continues conversationally. \"The sun god here abouts kind of locked him under a mountain range for the last few thousand years or so, but it seems as if he's been getting rather... restless. It's likely only a matter of time before he gets loose and starts spreading chaos, eating souls, extinguishing the sun... you know, all the stuff you need for a good old-fashioned apocalypse.\"\n\t\t\n\t\t\"How can they be sure?\" you ask.\n\t\t\n\t\t\"Well it seems as if an area near the border has been suffering from some pretty nasty earthquakes accompanied by growling heard from deep underground. Not much else it really could be to be honest. That's why Iahmesu was sent here to ask for my help.\"\n\t\t\n\n\n\"They want [i]your[/i] help?\" You blink startled. \"What did you tell him?\"\n\t\t\n\"That I haven't decided yet.\" She stalks closer, eyes glittering like the polished pieces of obsidian wound into her hair. \"What do you think Oedipus? What should I do?\"\n\t\n*goto quest\n\t\n\n\n\n\n\n*label sphinxtalked\t\t\t\t\n\nThe Sphinx sweeps into the room some hours later, with an odd expression clouding her features. \n\n\"There you are!\" you exclaim. \"We've a visitor waiting for your return. General...\"\n\n\"Iahmesu,\" she finishes for you. \"Yes I know. He was in the village and just about pounced on me in an effort to stop me from leaving until he'd said his piece.\"\n\t\t\t\t\n\"And?\" you prompt. \"He seemed to believe he had something rather important to discuss, but I felt it would be better to wait for your return.\"\t\n\n\"Important? You could say that.\" She tilts her head bird-like as she decides what to say. \"It seems the whole of Egypt may be about to have something of a problem with Apep.\"\n\n*goto serious\n\n\t\n\n*label talkplan\n\n\"Well, there's no easy way to say this.\" The general takes a steadying breath before continuing. \"Apep attempts to break free of his prison and return once more to the world of light...\"\n\n*choice\n\t#\"Apep? Who is that?\"\n\t\tHis eyes narrow as he regards you closely. \"Surely you know of Apep? Great serpent of the underworld, eater of souls, bringer of chaos?\"\n\t\t\n\t\t*fake_choice\n\t\t\t#[i]\"That[/i] Apep.\" You nod as realisation dawns. \"You forget I'm from Greece. There we know him as Apophis.\"\n\t\t\t\tIahmesu shrugs uncomfortably. \"Then you know why the Pharaoh has bid me to seek help in this matter. I fear mortals alone stand little chance against his might.\"\n\t\t\t\t\n\t\t\t\t\"Where is he? I've heard no reports of such a creature?\"\n\t\t\t\t\n\t\t\t\t\"He is not free yet, but soon. It shan't be long now.\" The general's expression turns haunted. \"I have travelled to the edges of our kingdom, there I have felt the very ground tremble with serpent's restless movements and had to clasp my hands over my ears to avoid being deafened by his howls. We must have the help of the Sphinx. With such a powerful protectoress we would surely prevail.\"\n\n\t\t\t\tThe last is said with the forced certainty of one not convinced by his own words.\n\t\t\t\t\n\t\t\t#\"So not someone we really want to roam free I'm gathering?\" you reply flippantly. Surely the man is mistaken.\n\t\t\t\t\"I don't think you fully appreciate the harm that would befall this land should he be allowed to roam Egypt once more.\" Iahmesu's expression becomes haunted. \"Though I have not seen him in the flesh, I have felt the ground tremble with his restless movements and had to cover my ears to block out the sound of his terrible roars from deep within the earth. I fear we mortals have little chance against him alone. We need the help of a powerful protectoress such as the Sphinx.\"  \n\t\t\t\t\n\t\t\t\n\t\t\t#\"What can we do?\" you ask with concern.\n\t\t\t\t\"I fear mortals alone will be no match for the beast. With the help of a powerful protectoress such as the Sphinx, perhaps we could prevail.\"\n\t\t\t\n\t\t\t\t\"Where is he? I've heard no reports of such a creature?\"\n\t\t\t\t\n\t\t\t\t\"He is not free yet, but soon. It shan't be long now.\" The general's expression turns haunted. \"I have travelled to the edges of our kingdom, there I have felt the very ground tremble with Apep's restless movements and had to clasp my hands over my ears to avoid being deafened by his howls. We must have the help of the Sphinx.\"\n\n\t\t\t\n\t\t\t#\"I've faced worse,\" you reply with certainty.\n\t\t\t\tYour mind drifts back to memories of being hunted by the Furies in your former life, but Iahmesu's stony expression tries to hide his disbelief.\n\t\t\t\t\n\t\t\t\t\"Apep is terrible to behold. Though I have not seen him in the flesh, I have felt the ground tremble with his restless movements and had to cover my ears to block out the terrible sound of his howls from deep within the earth. Mortals have little chance against him, but with the help of a powerful protectoress such as the Sphinx? Perhaps we have a chance.\"\n\t\t\n\t\t*goto sphinxarrive\n\t\t\t\t\n\t#\"The chaos serpent from the underworld? Here? How?\"\t\t\n\t\t\"Not here... at least not quite yet.\" Iahmesu shifts uncomfortably. \"But soon I fear. The ground trembles with his restless movements and townsfolk have fled before his howls which sound from deep within the earth. Mortals have little chance against him, but with the help of a powerful protectoress such as the Sphinx? Perhaps we have a chance.\"\n\t\t\n\t\t*goto sphinxarrive\n\t\t\n\t\t\n\t#\"I always thought that serpent to be a myth. Surely he is not real?\"\n\t\t\"I almost didn't believe it myself. So long it has been since he last ventured to the surface.\" Iahmesu shivers involuntarily. \"I went to the far reaches of the deserts where it meets the barren mountains of the edges of our kingdom. There I felt for myself the trembling of the ground as he stirs restlessly. My ears rang for days with the sound of his howls as he strains against the bonds of his prison. If he were to escape...\"\n\t\t\n\t\tHis voice trails away as he shivers involuntarily. \n\t\t\n\t\t*goto sphinxarrive\n\t\t\n\n*label sphinxarrive\n\t\t\n\"You may leave General.\" Both of you jump as the Sphinx pads silently into the chamber. \"I have heard your request and will summon you once I have come to my decision.\"\t\n\nIahmesu ducks his head in deference, before hastily rising and backing out of the room. \n\n*fake_choice\n\t#\"What did you hear?\"\n\t\t\"Enough.\" She stalks closer, dark eyes sparkling like the pieces of obsidian tied among the strands of her braided hair. \"I know of Apep and he's not one to be trifled with. He's even thought to challenge Ra himself on numerous occasions and still lives. If he is close to breaking free as Iahmesu suspects, perhaps it is time we moved to safer ground. What do you say Oedipus?\"\n\t\n\t#\"Were you [i]spying[/i] on us?\"\n\t\t\"Hah! This is my house and you were speaking about involving me in the affairs of gods once more in my absence. Who has the moral high ground here? Hmm?\"\n\t\t\n\t\tShe stalks closer, dark eyes sparkling like the pieces obsidian tied wound among the strands of her braided hair. \"I know of Apep and he's not one to be trifled with. I believe he's even had the gall to challenge Ra himself. That's probably how he got himself locked away in the first place come to think of it.\" She shakes her head, with a mirthless chuckle. \"Perhaps it is time we moved to safer ground if he is close to breaking free once more? What do you say Oedipus?\"\t\n\t\n\t#\"Well this is troubling news.\"\n\t\t\"Indeed. A god who can challenge Ra and remain breathing afterwards is certainly not someone to trifle with. If he is indeed close to breaking free, perhaps we should plan to leave this land; and soon.\" Her dark eyes sparkle like pieces of polished obsidian wound into her braided hair. \"Tell me, what do you make of all this Oedipus?\"\n\t\t\n\n*label quest\n\t\t\n*disable_reuse\t\t\n*choice\n\t#\"You're asking me?\"\n\t\t\"Of course? Why wouldn't I? I value your council. Besides, you're no fun when you sulk. And I know you'll sulk if I make this decision without asking you first.\"\n\t\t\t\n\t\t\"I don't [i]sulk!\"[/i] you grumble indignantly. \n\n\t\t\"Ah but my \n\t\t*if (sphinxfriend = \"love\")\n\t\t\tlove,\n\t\t*if (sphinxfriend != \"love\")\n\t\t\tfriend,\t\n\t\tyou're doing it now.\" She smiles, rubbing a cheek against your shoulder companionably. \"You really are too easy to bait sometimes Oedipus. Come now, if I stop my teasing will you tell me what you make of all this?\"\n\n\t\t*goto quest\n\t\t\n\t#\"I think both of us should help them. The people have been good to us here and many will surely die if we do not.\"\n\t\t*set sphinxcare 1\n\t\tThe Sphinx frowns. \"Are you sure you want to do that? Perhaps it would be better if I went alone? You can't be of help to anyone should he eat you.\" \n\t\t\n\t\t\"You're actually considering aiding the people around here? What happened to the sentiment that you don't care and are definitely not their guardian?\" you exclaim in surprise recalling previous conversations. \n\n\t\tShe shifts uncomfortably. \n\t\t\n\t\t\"You do care?\" You blink in surprise. \"But you always said...\"\n\t\t\t\t\t\t\n\t\t\"This is your fault Oedipus,\" she rumbles. \"I was quite content to hide away in my cave. You were the one that showed me not all humans needed killing. Besides, do you think Apep will stop at Egypt should he get loose? Nowhere in the world will be safe for you. I have to do this, you don't. Come now, gather your things and I'll take you to the border.\"\n\t\t\n\t\tSomething about the way she speaks, trying to hurry you into agreeing with what she says arouses your suspicion. \n\t\t\n\t\t\"Wait a minute, I said I wanted to stay and assist. But you're saying you [i]have[/i] to. Not that I'm not glad you're willing to help them, but why do you feel you have no choice in the matter? Surely one of the local gods will take an interest in the matter should you refuse.\"\n\t\t\n\t\t*label deal\n\t\t\n\t\t*page_break\n\t\t\n\t\t\"Well... I kind of made a deal with Sekhmet to grant her a favour in return for being allowed to remain in Egypt. It was some time ago. Truth is, I'd almost forgotten about it; although from the talk I had with her this morning it seems she most definitely hasn't and has demanded my assistance in this matter,\" she mumbles reluctantly. \"If we run, Apep might be the least of our problems. You do know what happened last time Sekhmet lost her temper don't you? She makes my bad days seem like sunshine and kittens by comparison.\"\n\n\t\tYou rub at your temples, feeling the beginnings of a headache throbbing there. \"I thought you said you made up that stuff about being sent by Sekhmet?\"\n\n\t\t\"That much was true... at the time.\" She confirms with a nod. \"But unfortunately some goddesses are rather... touchy about such things. I actually didn't think either of us was going to see the dawn the day she cornered me and demanded an explanation... But then we kind of got talking. It seems we have more than a bit in common.\"\n\n\t\tA slight smile tugs at the corner of her lips. \"I told her some tales about my ah... [i]activities[/i] when I was sent to guard the pass to Thebes; and then she told me all about the time her father sent her to... well never mind that, I don't believe you'd want to know the details. Anyway, in the end we kind of bonded over past events and she agreed to allow us to stay, so long as I promised to do a teensy little favour should she ever ask it of me. It's not my fault Apep has apparently decided to try and dig his way out now. I thought the wyrm would be content to slither around the underworld for another few couple of centuries at least.\"\n\n\t\t*goto staydecide\n\t\n\t\n\t#\"This life has been too quiet. Can you imagine the glory if we could defeat Apep himself!\"\n\t\tThe Sphinx frowns. \"It'll be dangerous. I've never understood why humans delight in glory that would well cost them their lives.\"\n\t\t\n\t\t\"Hey!\" you squawk offended. “What makes you so sure I'm going to die?\"\n\t\t\n\t\t\"I'm just telling it like it is.\" She rolls her shoulders in a fluid motion. \"You don't know the chaos gods like I do. They tend to be powerful, volatile and [i]always hungry.[/i] I don't want you to end up being his welcome back snack, that's all.\"\n\t\t\n\t\tYou sense genuine concern in her eyes. This time at least, she's not trying to be deliberately insulting. \n\t\t\n\t\t\"So you think we should leave? Is that it?\"\n\t\t\n\t\t\"I'll admit, I'd feel better if you were not close when the serpent makes his move to break loose. This is no judgment on your ability Oedipus, but this is a god we're talking about. And well... you [i]are[/i] only mortal.\" The Sphinx shifts uncomfortably. \"I however, must stay and fight.\"\n\t\t\n\t\t\"You're staying even though you think we should leave? Why?\" you reply somewhat confused. \"I thought you wanted to stay clear of the gods and their doings. And well, you've always said you always said you were no guardian of the Egyptian people anyway.\"\n\t\t\n\t\t*goto deal \n\t\t\n\t\t\n\t\n\t\n\t#\"Tangle with the God of the Chaos? No thanks. We should leave as soon as possible.\"\n\t\tThe Sphinx nods in agreement. \"I feel that is wise. I wouldn't want you to end up as Apep's welcome home snack if you stayed.\"\n\t\t\n\t\t\"Hey!\" you grumble. \"What makes you so sure I'd end up eaten?\"\n\n\t\t\"I'm just telling it like it is.\" She rolls her shoulders in a fluid motion. \"You don't know the chaos gods like I do. They tend to be powerful, volatile and [i]always hungry.\"[/i]\n\t\t\n\t\t*goto leaveegypt\n\t\n\t#\"I'm not sure there's a right answer to this, but there's a good chance we could die if we go up against Apep. Perhaps we should leave.\"\n\t\tYour companion nods once in agreement. \"Don't feel bad Oedipus. Despite what the stories will have you think, dead heroes are still very dead, and I've never understood the glory in that. You'll do no good to anyone as Apep's welcome home snack.\" \n\t\t\n\t\t\"Thanks for the vote of confidence,\" you reply with a roll of your eyes at her usual lack of tack.\n\t\t\n\t\t\"What?\" She rolls her shoulders in a fluid motion. \"I'm just telling it like it is. Chaos gods are like that. Volatile, powerful and [i]always hungry.[/i] A tasty human like you would be just the thing to break a few thousand year fast.\"\n\t\t\n\t\t*goto leaveegypt\n\t\t\n\t\t\n\t\t\n\t\t\n*label leaveegypt\t\t\n\n*page_break\n\t\t\n\"So on that delightful note, where should we go?\" you enquire.\n\n\"Out of Egypt for starters,\" the Sphinx replies. \"I can put you over the boarder where it'll be safe for the time being.\"\n\n\"You'll [i]put me[/i] somewhere safe?\" you growl indignantly. \"I'm not a sack of grain to be carted around ${sphinxname}. Besides, why are you talking like you're not coming with me?\"\t\n\nHer expression becomes cagey. \"I wouldn't leave you behind to travel alone. Of course I'll return once I've taken care of one or two things\"\n\n\"You'll return? From where? You're not really going to stay and try and fight that thing are you?!\" you reply, unsure whether to be surprised, alarmed or some combination of both.\n\n\"Well... I kind of made a deal with Sekhmet to grant her a favour in return for us being able to remain in Egypt. It was some time ago. Truth is, I'd almost forgotten about it; although from the talk I had with her this morning it seems she most definitely hasn't and has demanded my assistance in this matter,\" she mumbles reluctantly. \"If I run now, Apep might be the least of our problems. You do know what happened last time Sekhmet lost her temper don't you? She makes my bad days seem like sunshine and kittens by comparison.\"\n\n*page_break\n\n\"Wait a minute,\" you rub at your temples, feeling the beginnings of a headache throbbing there. \"I thought you said you made up that stuff about being sent by Sekhmet?\"\n\n\"That much was true... at the time.\" She confirms with a nod. \"But unfortunately some goddesses are rather... touchy about such things. I actually didn't think either of us was going to see the dawn the day she cornered me and demanded an explanation... But then we kind of got talking. It seems we have more than a bit in common.\"\n\nA slight smile tugs at the corner of her lips. \"I told her some tales about my ah... [i]activities[/i] when I was sent to guard the pass to Thebes; and then she told me all about the time her father sent her to... well never mind that, you won't want to know the details. Anyway, in the end we kind of bonded over past events and she agreed to allow us to stay, so long as I promised to do a teensy little favour should she ever ask it of me. It's not my fault Apep has apparently decided to try and dig his way out now. I thought the wyrm would be content to slither around the underworld for another couple of centuries at least.\"\n\n*label askapep\n\n*disable_reuse\n\n*choice\n\t*selectable_if (knowpromise != \"yes\") #\"So the only reason why you're going after Apep is because of a promise?\"\n\t\t\"Mostly.\" The Sphinx shifts uncomfortably as if unsure how much to say. Her eyes are over-bright when she continues. \"This country has been good to me, much more so than Greece ever was where I was seen as no more than a monster to be hunted down. And if I can help push Apep back into the underworld, perhaps we could stay here [i]together.[/i] I would like that very much I think.\"\n\n\t\t*goto askapep\n\t\t\t\t\t\t\n\n\t#\"So why did you ask my opinion if you were always going to hunt down Apep anyway?\"\n\t\t\"Because I [i]do[/i] value your opinion. I wanted you to be able to make up your own mind as to what you thought was best without knowing what I must do.\" She sighs, turning away. \"Besides, I think you're right. It would be insanely dangerous for a mortal such as yourself to be anywhere near the serpent should he manage to break through. I would... regret it, should harm befall you. I'll take you to the boarder where you can be safe.\"\n\t\t\n\n\t\t*label choiceapep\n\t\t\n\t\t*choice\n\t\t\t#\"And it's not dangerous for you? There's no way I'm leaving you to fight that thing by yourself.\"\n\t\t\t\t\"It's [i]less[/i] dangerous for me. Besides I won't be alone,\" she corrects. \"I still think you should let me take you to the border until this whole thing is settled.\"\n\t\t\t\t\n\t\t\t\t\"I'm staying.\" You dig your heels in stubbornly. \"We'd best work out how we can both make it out of this alive don't you think?\"\n\t\t\t\t\n\t\t\t\tShe growls, muttering something uncomplimentary under her breath about humans. \"Fine. I'll tell you what I know.\"\n\t\t\t\t\n\t\t\t\t*goto planapep\n\t\t\t\t\t\n\t\t\t#\"You don't get to make decisions like that for me. If I want to stay and fight, I will.\"\n\t\t\t\t\"But I asked and you said...\" She trails off muttering something under her breath about the contradictory nature of humans. \n\t\t\t\t\n\t\t\t\tTail swishing agitatedly she paces the room. \"Fine, I'll tell you what I know; but don't you dare get yourself killed over this.\"\n\n\t\t\t\t*goto planapep\n\t\t\t\t\t\n\t\t\t#\"So the best way for you to do your job is to have me out of the way? I'm not useless and I'm definitely not a coward you know.\"\n\t\t\t\t\"Oh I know Oedipus; do you really think I'd stay with a coward?\" She turns away. \"But you're also wise in your own way. Apep could swat you like a fly and you know it.\"\n\n\t\t\t\t*choice\n\t\t\t\t\t#\"Then we'd better work out a spectacularly good plan so he doesn't.\"\n\t\t\t\t\t\t\"Easy for you to say.\" She sighs grumpily hearing the stubbornness in your voice. \"Well I guess I'd better tell you what we're up against.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto planapep\n\t\t\t\t\t\t\n\t\t\t\t\t#\"I'm tougher than you give me credit for.\"\n\t\t\t\t\t\t\"Perhaps,\" she eyes you closely. \"I'll admit that I've underestimated you before. But this is no ordinary wyrm, he's strong enough to challenge the sun god himself. Do you understand?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou nod.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Very well.\" She lowers her head in defeat. \"If you're determined to stay I shan't stop you however much I'd prefer to know you are safe. I guess I should tell you what I know.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto planapep\n\t\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t#\"Perhaps you're right. If having me around is going to be a distraction, I should leave.\"\n\t\t\t\t\t\tThe Sphinx breathes a sigh of relief. \"Please know I'd love to have you by my side, but this is one battle for which a human such as yourself will be ill equipped. I am glad to see you will not allow pride to be your downfall. Come, gather your possessions. We've little time if I'm to take you to the boarder.\"\n\t\t\t\n\t\t\t\t\t\t*goto gather\n\t\t\t\t\t\n\t\t\t#\"Ok, I'll leave. I trust you'll make short work of the monster.\"\n\t\t\t\t\"Of course I will.\" She throws you a smile, but you sense a nervousness underlying it that is completely uncharacteristic of her normal haughty nature. \"Pack what you need, we've little time.\"\n\t\t\t\t\n\t\t\t\t*goto gather\n\t\t\t\t\n\t\t\t\n\t\t\t\t\n\t\t\t#\"I don't want to see you hurt. Please come with me. we'll leave together.\"\n\t\t\t\t*label love\n\t\t\t\t\n\t\t\t\t\"I [i]can't,\"[/i] she growls in frustration. \"Can't you see what would happen if I broke the oath I made to Sekhmet? We'd all die. I'm not a goddess Oedipus, she'd kill us all out of spite.\"\n\t\t\t\t\n\t\t\t\t\"Besides.\" She rounds on you sharply. \"Don't you care about the people who will perish if Apep breaks loose?\"\n\t\t\t\t\n\t\t\t\t*fake_choice\n\t\t\t\t\t#\"Of course I do. But I care about you more.\"\n\t\t\t\t\t\tHer expression wavers between affection, exasperation and fear. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Don't worry about me, I'll be fine,\" she replies with a forced smile. \"Come, we don't have much time. Gather your belonging and I'll take you to the border.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*label remain\n\t\t\t\t\t\t\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Shake your head, holding your place. \"I said I'm not leaving without you.\"\n\
