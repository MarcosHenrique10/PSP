l's grip, only serving to drive the knife deeper. With a final scream, his body shatters into a cloud of ink; sinking back into the earth and leaving only the knife upon the blood-stained sand. \n\t\t\t\t\nThe feline turns golden eyes your way, dipping his head once in thanks. Then in a flash of light streaks back towards the east, the sun flaring to life in the sky once more. You blink rapidly realising that you've just seen Ra himself. \n\t\t\t\t\t\t\n*return\t\t\n\n\n\n\n*label oedipusdied\n\n*set health 1\n*set oedipusdead \"yes\"\n*set status \"The Hall of Truth\"\n\nWith a lurch you scramble up from the floor, a strange blue light momentarily blinding your eyes. Blinking rapidly, the scene swims into focus. White stone columns rise far above you, their tops shrouded in clouds; while polished marble of the deepest black stretches away into the distance as far as the eye can see. \n\nThe memory crashes into place: A midnight desert, the shrill screaming of the Sphinx as jaws closed about your torso, then darkness and pain...\n\nTaking a shaky breath, you run your hands carefully over your body expecting to find it rent and torn, but instead feeling nothing but the plain white cloth of a tunic. It seems impossible as your mind spins trying to catch up. \n\nFeeling a warm sensation against your chest, tentatively you scoop up a silver medallion hanging by a leather cord about your neck. Though metallic in appearance, it seems almost organic to the touch, the detail on the bird-like shape more intricate than the work of the finest craftsmen from home. Looking closer, the pendant morphs as if alive to wear your face. \n\n\n*fake_choice\n\t#With a gasp you let it fall. \n\t\tYou drop the pendant as if made of burning coals. It falls heavily to the end of the leather cord where it remains gleaming with an inner light.\n\t\t\n\t\t\"Welcome Oedipus, please be at ease.\" \n\t\t\n\t\tThe soft voice echoes in the air, as the figure of a woman with skin the colour of the night sky materialises before you. \n\t#Tear it from your neck and throw it as far away as you can. \n\t\tYou yank the cord hard expecting it to snap, but it holds firm bruising the back of your neck. Changing tact, you try to lift the medallion over your head, only to discover that the cord binding it to you has shrunk, preventing you from doing so. \n\t\t\n\t\t\"Please be calm Oedipus,\" A soft voice drifts from the air. \"I know this must seem confusing but your [i]Ba[/i] is part of you. You can no more separate yourself from it, than you could free yourself from your own shadow.\"\n\t\t\n\t\tThe figure of a woman with midnight dark skin materialises before you.\n\t#Examine it curiously. \n\t\tThe metal is warm and slightly pliant under your fingertips. Though it may look like finely worked silver, you suspect it is something from beyond the realms of your birth, as you've never seen its like before. \n\n\t\t\"Welcome Oedipus, please be at ease.\" \n\t\t\n\t\tThe soft voice echoes in the air as the figure of a woman with skin the colour of the night sky materialises before you. \n\t#Shake your head in confusion. None of this makes any sense. \n\t\tYou hold the shifting pendant in your hands as you look around the empty hall trying to make sense of the situation. Given your last memory, a dark thought crosses your mind. What if you're no longer...? \n\t\t\n\t\tYou hesitate for a second as you bring a hand to your chest fearing the worst, but find it comfortingly solid and warm. \n\t\t\n\t\t\"Welcome Oedipus, please be at ease.\" \n\t\t\n\t\tThe soft voice echoes in the air, as the figure of a woman with skin the colour of the night sky materialises before you. \nBrightly coloured glass beads encircle her arms and neck, while others click in the braids of her long black hair as she moves. The orange coloured cloth of her dress is stark against the pale blue light. \n\n\"You would know me as Nephthys,\" she says with a faint smile as she halts before you. \"I'm sure you have many questions. But first, you must be weary after your journey. Can I offer you refreshment? A cup of water perhaps?\"\n\n*fake_choice\n\t#Accept, you do feel rather light headed. \n\t\tAt your nod, a silver cup appears in your hand filled with cool clear fluid. You almost lose your grip on the cup before realising that it's actually one of the least strange things to happen today. Feeling steadier you take a sip, some of the fogginess clearing from your mind. \n\t\n\t\t\"You said you had answers for me?\" you enquire politely.\n\t\t\n\t\t\"Very well Oedipus.\" She inclines her head in acceptance. \"Ask what you will and if I can answer you I shall.\"\n\t\n\t#Refuse politely, you just want answers. \n\t\t\"No thank you, but I do have questions.\"\n\t\t\n\t\t\"Very well Oedipus.\" She inclines her head in acceptance. \"Ask what you will and if I can answer you I shall.\"\n\t\t\n\t#Refuse rudely, though you know her to be a goddess.\n\t\t\"Just tell me what is going on!\" you demand harshly. \n\t\t\n\t\tInstead of being angered, the goddess merely sighs sadly. \"Your journey here was a violent one, it is no wonder you are so unsettled. Are you sure I cannot give you something to eat or drink? No? Very well. There is no need to be hostile. If I can give you the answers to the questions you wish to ask, I will do so willingly.\"\n\t\t\n\t\t\n*label askafter\n*disable_reuse\n\t\t\n*choice\n\t#What are you doing here? I didn't think the gods of Egypt mingled with mortals often.\n\t\t*set al \"yes\"\n\t\t\"That much is true, however there are times when it is necessary.\" Her brown eyes are wide and full of compassion. \n\t\t\n\t\t\"What are you saying?\" A cold feeling has started to form in the pit of your stomach. You clutch your arms tightly about your chest, almost afraid to hear her response. \n\t\t\n\t\t\"This is the afterlife Oedipus.\" She waves a hand to indicate the softly lit surroundings. \"I'm afraid you did not survive the battle.\"\n\t\t\n\t\t*fake_choice\n\t\t\t#\"What?! I don't believe you. I don't feel dead.\"\n\t\t\t\t\"And how do you think the afterlife would feel? Have you died before Oedipus?\" she returns in calm measured tones. \"Acceptance is the first hurdle, you will believe sooner or later. There is no other way.\"\n\t\t\t\n\t\t\t\tAt your sceptical look she continues. \"You fought against Apep. Though brave it was incredibly foolish for one like yourself and was almost certain to end in your demise. I shall have words to my husband next time I see him about encouraging you to take up his spear.\"\n\t\t\t#\"Deep down I guess I knew there was no way I survived.\"\n\t\t\t\t\"Yes,\" she says simply. \"It was rather foolish for a mortal to go up against one such as Apep, though brave. I will have words with my husband about encouraging you to take up his spear when I next see him.\"\n\t\n\t\t*goto askafter\n\t\n\t*selectable_if (al != \"no\") #\"What is this place?\"\n\t\t\"This is a reception area. Beyond is the Hall of Truth where all must be judged. I will take you there shortly, but we've time for a question or two more should you wish.\"\n\t\t\n\t\t\"Hall of Truth? How am I to be judged?\" you enquire nervously. \n\t\t\n\t\tShe shakes her head, declining to answer your question directly. \"All will become clear soon. Ask something different of me, else we can continue your journey now.\"\n\t\n\t\t*goto askafter\n\t\t\n\t*selectable_if (al != \"no\") #\"What is this thing around my neck?\"\n\t\t\"Of course, I forget you are a stranger to our lands.\" She reaches forward, gently placing her hand over the amulet on your chest. \"It is the physical representation of your [i]Ba[/i], part of your soul so to speak. You will find out more soon... should you be found worthy.\"\n\t\n\t\t*goto askafter\n\t\n\t*selectable_if (al != \"no\") #\"What of Apep?\"\n\t\tShe hesitates as if uncertain of how much to say. \"In my judgement you deserve an answer to that at least. He has been cast back down into the underworld. Defeated, though not dead.\"\n\t\t\n\t\t\"And the Sphinx? Is she here also?\"\n\t\t\n\t\t\"She lives. Ask no more of me than that.\" Her voice carries the authority of one who would be obeyed. You find your throat tighten preventing any further words on the subject from passing your lips.\n\t\n\t\t*goto askafter\n\t\n\t*selectable_if (al != \"no\") #\"I have no more questions to ask.\"\t\n\t\t\"Very well.\" An ornately carved archway of stone shimmers into existence with a wave of her hand. \"Shall we?\"\n\t\t\n\t\t\"Unable to resist, you pass through the portal of light into the unknown. \n\t\t\n\t\t*page_break\n\t\t\n\t\t*goto judgement\n\t\t\n\t\t\n*label judgement\t\t\n\t\n\nThe light swells, searing rays forcing you to cover your eyes in pain. As it ebbs away, you blink rapidly, bright spots dancing across your vision. No longer in the vast room of cloud topped columns, you now stand at the rear of a wide stone hall. Looking around, you see no doors or passageways marring the surface of the smooth brown walls. The only way onward, is to continue to move forward. \n\nGhostly shades flicker around you, causing a shiver of ice to pass through your body when your paths cross. You can only wonder if you seem just as insubstantial to the other souls wandering this room. At the end of the hall you spy a flight of stairs leading to a dais where a tall man dressed in the garb of a pharaoh is seated. His lightless black eyes survey the shades arrayed before him, missing nothing. A set of gleaming scales dominates the scene, set atop a table of stone. It glows with a light of its own, casting a golden hue over the pallid green skin of the god seated beside it. \n\n*page_break\n\n\"Amasis, step forward,\" the god's voice booms, voice reverberating throughout the chamber as the soul of a scrawny middle-aged man shimmers into focus before the dais. \n\nHe cowers away from the god, obviously seeking some way to run, but held by an invisible force. \n\n\"Please Osiris, have mercy on me. If I could have one more chance, just a little more time to make things right...\"\n\n\"Enough,\" the god rumbles cutting through the terrified pleas of the Egyptian before him. \"You will be judged, as all who come to this place are. There will be no mercy, no second chances. Your fate will be decided today.\"\n\n*page_break\n\nTrembling the man mounts the stairs, a look of horror on his face making it clear that the motion was not of his choosing. As he comes to stand before the scales, Osiris plucks a jar containing a human heart from the air and places it opposite a large white feather. The man brings his hand to his mouth as if praying silently, while the plates swing into motion. \n\nFinally they settle, the heart weighed down to almost brush the surface of the bench. \n\nOsiris sighs. \"You have not lived your life with virtue and have been found unworthy to be gifted with eternal life.\"\n\n\"No please. Don't give me to Ammut... I'll do anything!\" the man screams, eyes wide with fear. \n\nYou find yourself unable to look away as a creature emerges from the shadows. A curious mix of animals, she stalks forward with the hindquarters of a hippopotamus and the forelimbs of a lioness; two of the deadliest animals known to the people of this land. Her head is that of a crocodile, and she snaps her jaws hungrily as her gaze settles upon the unfortunate Amasis with eyes that glow like fire.\n\nLunging forward, her teeth crunch down as she shakes the shade violently; his screams becoming thinner as his body is dissipates into the air; lost forever. With a growl of satisfaction, the demon retreats, lurking once more in the shadows. \n\n*page_break\n\nOsiris shakes his head as if regretting the display, though he made no move to intervene on the shade's behalf. Removing the heart from the scales, he consults the parchment before him. \n\n\"Oedipus of Greece. I would speak to you next.\"\n\nSimilar to his last hapless victim, you find yourself pulled towards the dais, unable to resist. With a wave, a jar that you know instinctively contains your own heart appears in his hand. It seems it is your turn to be judged. Glancing towards the shadows, Ammut's eyes bore into your own with an unquenchable hunger. \n\nYour life flickers through your mind. So much has happened, and not all of it good. Though perhaps not all the ill deeds were of your making, the Olympians never seemed to make that distinction. Would these gods be any different?\n\n*fake_choice\n\t#\"Wait! I'm not Egyptian. I shouldn't even be here.\"\n\t\tOsiris pauses, hand hovering over the scales. \"You lived in Egypt… and died here. Not only did you reject the gods of your own land with your actions, but you were buried with all the rites associated with my kind. You are ours Oedipus. There is no choice for you but to comply.\"\n\n\t\tThe words wash over you like ice as you realise you have no power in this place but what is given to you by those who rule here. \n\n\t#\"Is this the way you treat all those who help you defeat mortal threats to Egypt?\"\n\t\tOsiris raises an eyebrow at your tone. \"You have been given preferential treatment mortal. Most await my pleasure, but I will see that you are judged in a timely fashion. That is more than most can hope for.\"\n\t\n\t\tThe words wash over you like ice as you realise you have no power in this place but what is given to you by those who rule here. \n\t\t\n\t#\"I've already been judged and absolved by Athena. I shouldn't have to be tested once more.\"\n\t\tOsiris frowns at the mention of the foreign goddess. \"Athena has no power here. By living... and dying in my land, you forfeited all right to any intervention she may seek to give on your behalf. Your life will be judged by the scales. That is our way.\"\n\t\t\n\t\tThe words wash over you like ice as you realise you have no power in this place but what is given to you by those who rule here. \n\t\n\t#Hold your breath and wait. Surely they could not find you unworthy after you assisted them with Apep.\n\t\tYou still, clutching your arms across your chest tensely. You can only hope that your life imperfect though it was, will not be found wanting by the God of the Dead who holds your very existence in his hands.\nAlmost in slow motion, you watch the god's hand descend to place your heart upon the plate. \t\n\nThe scales swing into motion, oscillating up and down as if considering your life's actions. It's an unpleasant feeling, almost as if someone is rifling through your mind. Images and feelings flash before your eyes in time with the scale's motion and are then gone.\n\n[i]A charitable deed here... [i]Lift.[/i]\n\n[i]A jealous thought there... [i]Sink.[/i]\n\nIt seems to take an age... Surely the last man's fate had not taken so long to decide?\n\nFinally the presence withdraws, and the scales cease their wild motion hovering almost evenly in balance. \n\n*page_break\n\nOsiris rises slowly and approaches the stone table, examining each side of the scales closely; while Ammut takes a step forward to join him. \n\nOsiris' midnight eyes meet your own as finally he speaks. \n\n\"You may pass.\"\n\nAmmut rumbles in frustration at being denied her meal, retreating to the shadows; while all around you hear ghostly whispers of relief from the shades that stir restlessly waiting their turn in the hall beyond. \n\n*page_break\n\n*achieve scalespass\n\n*set status \"Field of Reeds, the Egyptian afterlife.\"\n\nWith a flick of his fingers the hall disappears leaving you standing on a sandy path by the river, reeds waving softly in the breeze. Carefully you take a step forward, and then another; conscious of the overwhelming feeling of familiarity. If not for the complete absence of people, you could almost believe you were back in Egypt near where you'd spent the last few years of your life. That feeling only becomes stronger as the path winds away from the river plains and into the rocky escarpments of your home. \nAnd there waiting is the Sphinx. She leaps from the clifftop to land before you in a flurry of wingbeats. \n\nHer eyes are almost feverish, while dark shadows circle the skin below. \"Finally! I've been waiting so long for you to arrive!\" \n\nShe pulls you into an unexpected embrace, her arms warm and solid. \n\n*fake_choice\n\t#\"What's going on? They told me that you weren't dead...\"\n\t\tShe shifts uncomfortably. \"Me? No, I'm very much alive thanks to you.\"\n\t\t\n\t\t\"But this is the afterlife, is it not?\" You gesture in confusion to the sun-baked landscape. \"How can you be here?\"\n\t\t\n\t\t\"I go where I will, particularly now,\" she snorts. \"They could not deny me access to this realm to visit you. Not after what both of us did for them.\"\n\t\n\t#\"This place looks like home. How could this be? Am I not dead after all?\"\n\t\tShe shifts uncomfortably. \"This place is whatever you wish it to be Oedipus. You've earned that much.\"\n\t\t\n\t\t\"So... I'm really...\" You trail off unable to finish the sentence. \n\t\t\n\t\t\"I'm afraid so.\" She coughs harshly, blinking away tears. \"But it's not all bad. You're here... and so am I. They owed us that much after what we did for them with Apep.\"\n\t\n\t#\"What is this place and how are you here?\"\n\t\tShe shifts uncomfortably. \"You don't know?\"\n\t\t\n\t\tAs you shake your head, she stalls drawing patterns in the sand with a claw. \n\t\t\n\t\tFinally she speaks. \"This is the afterlife Oedipus. I begged them for your life to be returned, but that was one line they refused to cross. Still, they owed us for what we did with Apep, so I reached a compromise. You may not be able to return to the waking world, but at least I have been allowed permission to visit you here in the twilight realm.\"\n\n\n*choice\t\t\n\t#\"You think they believe they owe me anything?! I was nearly thrown to that creature in the Judgement Hall. It's lucky I made it here at all!\" you growl.\t\n\t\t\"They did what?\" Her eyes narrow dangerously.\n\t\t\n\t\t*label scalememory\n\t\t\n\t\t\"I was tested in the... What was it called? Hall of Truth? That's what I think she... I mean Nephthys called it anyway.\" You shiver, recalling the way the scales had swung back and forth leaving you helpless to alter your fate should they settle the wrong way.\n\t\t\n\t\t\"But Sekhmet said you wouldn't...\"  \n\t\t\n\t\t\"Well, it seems as if she doesn't have the final say in such matters, does she?\" you snap, cutting her off.\n\t\t\n\t\t\"Oh Oedipus, I'm so sorry,\" her voice quavers. \"I never would have asked for them to send you here had I known. You could have been lost forever.\"\n\t\t\n\t\t\"You did [i]what?![/i]\" Suddenly it all snaps into place. No wonder you hadn't been sent to face the gods of your birthplace.\n\t\t\n\t\t\"I'm sorry.\" She repeats, taking a step back obviously distressed. \"I thought it would be for the best. There are those on Olympus who would have seen to it that you suffered in the afterlife, no matter what Athena's opinion may be. Besides, I never would have been able to see you again...\"\n\n\t\t*choice\n\t\t\t\t\n\t\t\t#\"It's fine. You're right that I'm likely to have fared far better here than with the Olympians sitting judgement on my fate.\"\n\t\t\t\tShe sighs with relief. \"I'm glad you agree. I couldn't bare it if you hated me. Not after everything that's happened.\"\n\t\t\t\t\n\t\t\t\tComposing her features into a weak smile she continues. \"Come, I'd like to show you to your new home.\"\n\t\t\t\t\n\t\t\t\t*goto newhome\n\t\t\n\t\t\t#\"Please don't be upset. You did what you thought was best. I'm here now.\"\n\t\t\t\t\n\t\t\t\tShe gives you a weak smile. \"So you can find it in your heart to forgive me?\"\n\t\t\t\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#\"There's nothing to forgive, I'm just glad we're here together.\"\n\t\t\t\t\t\tShe releases a sigh of relief. \"So am I. Come, let me take you home.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto newhome\n\t\t\t\t\t\n\t\t\t\t\t#\"Of course. I wasn't eaten so all well that ends well I guess.\"\n\t\t\t\t\t\tA shadow of anger passes over her features. \"This is not over trust me. I will be having words with my [i]good friend[/i] Sekhmet to find out why you were treated as you were. They had no right after the sacrifice you made at their request.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tTaking a few breaths to compose herself, she continues in a more even tone. \"Come, I'd like to show you to your new home.\"\n\t\t\t\t\t\n\t\t\t\t\t\t*goto newhome\n\t\t\t\t\t\n\t\t\t\t\t#\"I can't say I'm completely happy about it, but your heart was in the right place.\"\n\t\t\t\t\t\t\"Yes it was,\" she whispers. \"What's done can't be undone. This is your home now.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tShe forces a smile. \"Perhaps seeing your home will cheer you up somewhat. Please, come with me and I'll show you.\"\n\t\t\t\n\t\t\t\t\t\t*goto newhome\n\t\t\t\t\t\t\n\t\t\t#\"All that matters is that I can be here with you.\"\t\n\t\t\t\t\"If that means spending the afterlife here rather than the underworld of my birth, that's a small price to pay.\"\n\t\t\t\t\n\t\t\t\t\"You really mean that?\" Her eyes shine as she sniffs back tears. \n\t\t\t\t\n\t\t\t\t\"Would I say it if it wasn't true?\"\n\t\t\t\t\n\t\t\t\tShe takes a deep breath steadying her nerves, before favouring you with a relieved smile. \"Well then, I guess I should show you our new home.\"\n\t\t\t\t\n\t\t\t\t*goto newhome\n\t\t\t\t\n\t\t\t\n\t\t\t#\"What's done is done and can't be changed. Let's make the best of it.\"\n\t\t\t\n\t\t\t\t\"You're right, nothing can be changed now.\" A shadow passes over her features. \"Still, it won't stop me from having a discussion with me [i]good friend[/i] Sekhmet to find out why you were treated as you were. They had no right after the sacrifice you made on their behalf.\"\n\t\t\t\t\t\t\n\t\t\t\tTaking a few breaths to compose herself, she continues in a more even tone. \"Come, I'd like to show you to your new home.\"\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t*goto newhome\n\t\t\t\n\t\t\t#\"I wish you hadn't intervened. I'll never be able to see any of my friends or family from Greece again; but I understand why you did it.\"\n\t\t\t\t\"So you forgive me?\" Her voice is pleading. \"I was trying to do what I thought was best. I know the loss of the company of your ancestors in the afterlife seems a high price to pay, but spending eternity in a realm where you are welcome, is far more preferable than one where you are not. Please believe me. I've seen it what happens to those souls unfortunate to provoke the ire of a god.\"\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#\"Of course I forgive you.\"\n\t\t\t\t\t\tShe smiles with obvious relief. \"Come, I'd like to show you to your new home.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto newhome\n\t\t\t\t\t\n\t\t\t\t\t#\"Perhaps, give me time.\"\n\t\t\t\t\t\t\"That is all I can ask.\" She drops her head to study the stones. \"Please, let me show you around. You'll see it's not so bad.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto newhome \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t#\"Can anything be changed now?\"\n\t\t\t\t\t\t\"No.\" She shakes her head empathically. \"The rites have been done, there is no turning back now.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou sigh. \"Well then, I guess I'm going to have to make the best of it.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tShe forces a smile. \"Please, I'd like to show you around. You'll see it's not so bad.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto newhome\n\t\t\t\t\t\n\t\t\t\t\n\t\t\n\t\t\n\n\t#\"I'm glad you're here.\" You manage a smile. \"This place is less daunting with you by my side.\"\n\t\t\"Of course I'm here, I wouldn't leave you to face this place on your own. It's not so scary, you'll see,\" she replies lightly, gesturing to the world before you. \n\t\t\n\t\t\"So, I guess the worst is over now? No more tests to pass?\"\n\t\t\n\t\t\"Tests?\" her voice drops dangerously. \"What tests?\"\n\t\t\n\t\t*goto scalememory\n\t\t\n\t\n\n\n*label newhome\n\n*page_break\n\nTogether you walk the rocky path into the foothills without speaking, sun beating warmly down on your head. \n\nYou decide to break the silence. \"So what happened to Apep after I... well you know? No one would give me the specifics.\" \n\n\"Oh, you want to talk about that now?\" She shifts uncomfortably at the unpleasant memory. \n\nYou nod, continuing to trudge towards the escarpment. \n\n*page_break\n\n\"Very well.\" She takes a deep breath. \"Ah... I saw he had you in his mouth. I was screaming, hoping you'd break free and all of a sudden there was all this blood. I thought it was yours.\"\n\n\nShe shudders, closing her eyes against the memory. \"But then Apep started thrashing with his mouth open wide, spitting you onto the sands. I thought maybe you'd be safe after all... You did well you know, pushed that spear right up through the base of his skull. He couldn't snap his jaws shut without dislodging it, and I wasn't going to give him that chance. I was getting so tired, in the end that spear was the only thing keeping me from being snapped in half.\"\n\n\"I kept fighting, even scratched one of his eyes out,\" she states with a feral look. \"And then... well finally the sun crested the horizon, bringing Ra's boat with it. He wasted no time joining the battle, I'll give him that much. Made short work of Apep too with a knife to the throat. I don't know what I was expecting, but I see why the serpent chose to try and get loose during the night where he might have some chance of breaking free before Ra could catch up to him. And that's it really...\" \n\n\"I went to find you as soon as I could... I thought... I [i]hoped[/i]... but it was too late,\" her voice breaks.\n\n\"So Apep's dead now after all?\" you ask coldly. At least some good appears to have come of this whole situation.\n\n\"Well, not dead exactly.\" She sniffs a few times, still trying to hold back the tears that threaten to fall. \"He is a god, and a powerful one at that. They're not so easy to be rid of. He has been banished back to the recesses of the underworld though, and will be in a terribly weakened state given what happened to him. I doubt he'll cause much of a problem to anyone for a long time to come.\" \n\n\n*page_break\n\n\"Look, we're here.\" She changes the subject quickly. \n\nAs you approach the stone building, everything seems just as you remembered it down to the scraggly plants with their needle like leaves that you'd been trying to coax into growing along the outer walls.  \n\n\"This is your home now,\" the Sphinx whispers at your shoulder. \"It can be anything you wish. For example...\"\n\nWith a wave of her paw, the sun-baked rocky landscape beside your house gives way to an oasis. Cool blue water laps at your sandaled feet, while birds whistle among the waving fronds of palm trees overhead. \n\nShe smiles challengingly. \"Your turn.\"\n\n\n*fake_choice\n\t#\"I like what you've done with the place,\" you say with a smile. \"I don't want to change a thing, it's perfect.\"\n\t\t\"You think so?\" She smiles brightly. \n\t\t\n\t\t\n\t#\"To be honest, I preferred it when it looked as it did in real life.\"\n\t\tThe oasis shimmers out of existence, leaving you with the sandy landscape you'd become so accustomed to since arriving in Egypt. \n\t\t\n\t\t\"Well, it's no Olympus, but I guess it has its own charm. Particularly if the company is right,\" the Sphinx teases, although her smile says she's not displeased by your choice.\n\n\n\t#\"Let's go a step further.\" Let your imagination run wild with a scene full of tall arching trees, impossibly coloured flowers and statues of fantastical creatures. \n\t\tYou take a moment to survey your handiwork to the chimes of sapphire blue water falling from a nearby fountain, while the scent of blossoms fills the air. It's a scene that never could have existed on Earth, but here it is yours with no more than a thought to wish it. \n\t\t\n\t\t\"Beautiful.\" Your companion nods approvingly. \"Couldn't have done better myself.\"\n\t\t\n\t\t\n\t#You miss your homeland. Build a house reminiscent of the ones you left behind in Greece. \n\t\t\"I can have anything?\" \n\t\t\n\t\t\"Anything you can imagine,\" your companion replies. \n\t\t\n\t\t\"Well then...\"\n\t\t\n\t\tThe rocky sand beneath your feet becomes a paved road, as a manicured garden springs up from suddenly loamy soil on all sides. The sun-baked building before you shimmers, replaced by white painted stone columns and polished marble tiles marking the entrance.\n\t\n\t\tThe Sphinx laughs in delight. \"I could get used to living here quite easily!\"\n\t\t\n\t\tYou eye the building critically, it's far grander than anywhere you'd called home before. \n\t\t\n\t\t*fake_choice\n\t\t\t#\"You're right, it's perfect.\"\n\t\t\t\tSince you can have whatever you want now, you might as well have the best. \n\t\t\t\t\n\t\t\t#\"You don't think it's too much?\"\n\t\t\t\tShe snorts, not deigning your question with a proper answer. Then again, she never had been one for turning down luxury you reflect.\n\t\t\t\t\n\n\t\nPushing open the doors you walk inside, making sure everything is just to your liking. As you glance around at your handiwork, you finally pin down the nagging feeling that had been bothering you since you arrived. \n\n\"$!{sphinxname}?\" \n\n\"Hmm?\" She turns to regard you with luminous eyes. \n\n\"Where is everyone? I mean we can't be the only ones here... right?\"\n\n\"Oh no, there's plenty of souls in this place. Certainly any in this realm may visit you, or you them if you prefer a change of scenery,\" she replies. \n\n\"Besides, that thing around your neck.\" She pokes a claw towards the bird shaped pendant. \"That'll allow you to visit Earth if you wish. They can't see you of course, but you can watch and perhaps even influence and event or two here and there. Oh yes, I almost forgot. You can also spend some time sleeping in your body if you need the rest. I had it placed in a tomb near our house in the waking world so you're never far from home each time your spirit returns.\"\n\n*fake_choice\n\t#\"That's very... thoughtful of you.\"\n\t\t\"Least I could do,\" she replies, missing the hesitation in your voice.\n\t\n\t#\"You can see how that's... well kind of creepy can't you Sphinx?\"\n\t\t\"Creepy? How so? The dead are always able to watch the living if they have the mind to, I've just tried to make it easier for your spirit to find its way back and forth. If you're talking about resting in your body? Well, that's just the way things are done here, but I doubt anyone will force the issue. You might end up tired and cranky if you decide to be stubborn about it though. Just remember that I warned you.\"\n\t\n\t\n\t#\"I don't think I'll be sleeping in my dead body any time soon, thank you very much!\"\n\t\t\"Suit yourself,\" she shrugs nonplussed. \"That's just the way things are done around here, but I doubt anyone will force the issue. Just don't blame me if you end up tired and cranky by being stubborn about it.\"\n\t\n \n\t\nYou sigh, shaking your head. It seems this will be something that needs to be discussed further at a later time. \n\nSurprisingly, the Sphinx presses the subject instead of letting it drop.\n\n\"Tell me Oedipus, who is it that you miss enough to make the journey back to Earth?\" she asks gently.\n\n*choice\n\t#\"My mother Merope.\" \n\t\t\"She must miss me terribly. I'd like to know if she's alright.\" \n\t\t\n\t\t*goto watchchoice\n\t\t\n\t*if (fate = \"king\") #\"My children.\" \n\t\t\"I wish I could have lived to see them grow. None of this was ever their fault.\" \n\t\t\n\t\t*goto watchchoice\n\t\t\n\t*selectable_if (jocastadead = \"no\") #\"Jocasta. Despite everything she's still my real mother.\"\n\t\tThe Sphinx gives you a strange look but says nothing. \n\t\t\n\t\t*goto watchchoice\n\n\t#\"I'm not sure.\"\n\t\t\"Well there'll be time to think on it, and no reason why you have to go anywhere should you not wish to,\" the Sphinx reassures you.\n\n\t\t*goto watchchoice\n\t\n\t#\"I'll be just fine here.\"\n\t\t\"Well if you're sure? There's no reason to travel anywhere you don't wish to,\" the Sphinx reassures you.\n\t\t\n\t\t*goto watchchoice\n\t\t\n*label watchchoice\n\t\t\nLooking over at the polished wooden table, you notice a plate of fruit and a stoppered jug of wine that you're almost certain wasn't there a moment ago. Come to think of it, you don't recognise the small feline statue in the alcove or the polished wooden chairs stacked neatly against the wall.\n\t\t\n\"Sphinx, did you create those chairs?\" you ask. \"I don't recognise them at all.\"\t\t\n\t\t\nShe smiles. \"Do you really think your help would go unnoticed and unrewarded by the people you saved? No, don't answer that. They'll be time enough for revelations later. You must be tired after the events of today. Here, sit.\" \n\nYou allow her to lead you over to a low couch since you can't deny feeling somewhat weary, though strangely more at peace than you have been for a long time. \n\n\"Perhaps my heart is finally lighter than a feather,\" you mumble drowsily.\n\n[i]\"Humans,\"[/i] the Sphinx grumbles fondly. \"Always saying the strangest things. Rest now.\"\n\n*page_break\n\n*text_image epilogueoedipus.png center Epilogue\n\n\n[i]\"And so ends the Saga of Oedipus, Champion of the Gods, Hero of Egypt,\"[/i] the scholar finishes, rolling the yellowed sheet of papyrus carefully and replacing the frayed string tie. \n\n\"But... but... It can't end like that!\" A wide-eyed boy of six announces. \"Heroes don't just die! They fight like this, and this!\"\n\nHe slashes his arm through the air as if plunging a weapon into an imaginary foe. \"Surely Oedipus got up and kept fighting until Ra and arrived with the dawn. Then he went on to live happily ever after.\"\n\nThe old scholar smiles slightly, ruffling the boy's cropped black hair. \"Ineni have you not been paying attention? This is no fairy tale, there was never a guarantee of a happily ever after. Oedipus fought a God. That is not something one should do lightly. He knew the consequences, but chose to save us all from the darkness anyway.\"\n\n\"I don't think he did it for us, not exactly anyway,\" a small girl pipes up more quietly than her sibling. \"He did it for [i]her,[/i] he couldn't bear to see his friend come to harm if he could help it.\"\n\nIneni makes a face at the thought that someone would sacrifice their life for love or friendship over rewards and glory, while the scholar merely looks thoughtful. \"Well maybe, maybe not. That's something we'll never know for sure. Still it doesn't negate his sacrifice and we must honour him for it. Now off with you all. Go play for a while before lunch is ready.\"\n\nThe children squeal with delight, running down towards the river bank to splash in the muddy brown water of the shallows. \n\n*page_break\n\n\"You speak well.\" The feline form of the Sphinx slinks silently from the shadows.\n\n\"Lady!\" the scholar dips his head. \"My apologies, I did not realise you were there.\"\n\n\"Be at ease Herben, I wished to listen 'till the end. I haven't heard this tale told so well in a long time. Besides, it pleases me you teach it to your young ones. Oedipus' name must never be forgotten. Not even after the land as we know it now has passed into dust and carried away by the winds. I will make sure of it.\" \n\n*page_break\n\nShe steps closer, golden coat gleaming in the sunlight without a hint of grey despite the years that had passed. \"Tell me, Herben; the way you speak of him: Did you know my Oedipus?\"\n\nThe old man shakes his head, combing fingers through a greying beard. \"I may seem old Lady, but not even I am so old as to remember Oedipus, more's the pity. My grandfather knew him though. Many of the tales I tell come from him, while others everyone knows.\"\n\nHe gestures to the scrolls curled neatly on the table. \n\n\"Ah, but of course,\" the Sphinx replies with a thoughtful frown. \"My apologies, Herben. It's just you spoke of him with such familiarity and I find human lifespans difficult to measure sometimes, especially now.\"\n\nWith a dip of her head she turns to leave. \n\n\n*page_break\n\n\"Lady,\" Herben calls, causing her to pause. \"May I ask you a personal question?\"\n\n\"A masterful storyteller [i]and[/i] far bolder than is wise, I would not have guessed it of you. There was a time when men would have run from me rather than think to ask such a favour from me.\" \n\nTo his surprise, her stern tone turns to laughter. \"Very well scholar, ask me your question... though I may choose not to answer.\"\n\nThe scholar bites at his bottom lip, before continuing somewhat nervously. \"The girl, was she right? Did Oedipus choose to be there to fight beside you, or was there another reason? To help the people of Egypt perhaps? To gain glory? Or maybe he sought to attract the favour of the Gods themselves?\"\n\nShe snorts softly. \"Do you think I know the hearts of men Herben? Sometimes I feel as if I'd have a better chance predicting the ways of the wind, rather than to guess at what thoughts are ticking away behind a mortal's eyes.\"\n\n\"So you won't tell me?\" His expression falls in disappointment. \n\n\"I'm saying humans are complicated, even when they believe that they are not, and there's not always a single clear and correct answer.\" \nA soft breeze stirs, and she tilts her head as if listening, a small smile tugging at the corners of her mouth. \"However sometimes there is. I think you already know the answer to your question.\" \n\n*page_break\n\nShe turns once more. \"I must go, I don't want to keep him waiting. Thank you once again for the story, I wish you a pleasant afternoon.\"\n\n\"Keeping who...?\" he begins, but there's nothing but thin air where the Sphinx had stood only moments ago. \n\nThe breeze stirs again, causing golden strands of hair to eddy across the floor. Not a dream then, or a vision. She really was here. \n\n[i]\"I don't want to keep him waiting,\"[/i] he muses. [i]\"Yes, I think I have a very good idea indeed who that may be and how this tale really ends.\"[/i]\n\nWhistling, he packs the scrolls carefully into his bag and heads towards the town. There's a story to tell.\n\n\n*image ka.png center Ending: Oedipus Remembered\n\n\n*achieve afterlife\n\n\n\n*goto_scene ending \n\n\n\n\n", "choicescript_description": "Your name is Oedipus, Prince of Corinth: And you've just discovered your future has been cursed by the gods themselves. Travel back to a time of magic and monsters in ancient Greece. Can you successfully fight to free yourself? Or will you succumb to the fate that was prophesied?\n\n[i]The Saga of Oedipus Rex[/i] is an epic 100,000 word interactive fantasy novel by Jacic where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n• Play as Prince Oedipus, heir to the rulership of Corinth.[n/]\n• Test your wits against the Sphinx. [n/]\n• Immerse yourself in ancient Greek life.[n/]\n• Remain in the country of your birth, or travel afar to Egypt.[n/]\n• Will you appeal to the gods, challenge their decisions, or let fate run its course?[n/]\n• With 8 distinct endings: Will you follow the future that has been prophesied or find your own way?", "choicescript_stats": "*label stats\n\n\n*text_image statsoedipus.png center Characters and Inventory\n\n[b]Name:[/b] Oedipus.\n\n\n[b]Status:[/b] ${status}\n\n*if (childrentxt = \"yes\")\n\t[b]Children:[/b] Two sons Eteocles and Polynices, and two daughters Antigone and Ismene.\n\n*if (oedipusdead = \"yes\")\n\t*goto died\n\n*if (health > 5)\n\t*set health 5\n*if (health \u003c 1)\n\t*set health 1\n\n*if (health = 5)\n\t*set healthstat \"Excellent\"\n*if (health = 4)\n\t*set healthstat \"Good\"\n*if (health = 3)\n\t*set healthstat \"Weakened\"\n*if (health = 2)\n\t*set healthstat \"Poor\"\n*if (health = 1)\n\t*set healthstat \"Very Poor\"\t\n\t\n\n*if (oedipusdead != \"yes\")\t\n\t[b]Health:[/b] ${healthstat}.\n\n\n*label died\n*if (oedipusdead = \"yes\")\n\t[b]Health:[/b] Deceased.\n\n\n*if (temprementtxt != \"\")\n\t[b]${temprementtxt}[/b] ${temperament}\n\n*if (coins \u003c 0 )\n\t*set coins 0\n\n*if (travel = \"yes\")\n\t[b]Coins remaining in your purse:[/b] ${coins} drachmas.\n\t\n[b]Items Carried:[/b]\n$!{sword} \n${letter}\n*if (map = \"map\")\n\tA crudely drawn map.\n*if (extracloak != \"\")\n\t*if (colourcloak = \"black\")\n\t\tAn extra cloak which is warm and black in colour.\n\t*if (colourcloak = \"purple\")\t\n\t\tAn extra cloak which is dark purple in colour. \n\t*if (colourcloak = \"green\")\n\t\tAn extra cloak which is green in colour and bordered by golden stitching.\n*if (sphinxfeather != \"\")\n\tA golden-brown feather from the Sphinx.\n${beads}\t\n${setspear}\n\n*choice\n\t#Glossary\n\t\n\t\t*goto glossaryoedipus\n\t\t\n\t#Characters\n\t\t*goto characters\n\n\t#More information about Oedipus and this game. ([b]Warning Spoilers:[/b] It is recommended to play through at least once before reading this file.)\n\n\t\t*goto background\n\t\t\n\t\n\n\t\n*label background\t\n\n*text_image oedipusrexheading.png center Oedipus Rex\n\n\t\nThis story is loosely adapted from the ancient Greek tragedy written by Sophocles in about 429 BC known as Oedipus Rex (sometimes also called Oedipus Tyrannus or Oedipus the King.)\n\nThe story actually starts far before Oedipus was ever born, a curse being placed on his entire line by the Greek gods in punishment for his father's transgressions. (A rather nasty affair involving a betrayal of hospitality in the form of the abduction and assault of a young prince called Chrysippus.) \n\nIn the original story, none escape the fate prophesised by the Oracle at Delphi who was believed to speak for Apollo. (Who among other things represented truth and prophecy.) The King meets his death at the hands of his son, the Queen kills herself when the truth of her husband's death and her own marriage is discovered, and as for Oedipus? Well he atones for his family's dishonour by living out his life in exile and despair as a prophet, blinding himself by his own hand. \n\nAlthough this game is predominantly based on Sophocles' Oedipus Rex, it also carries original content, influences from Orestes (the Ancient Greek play by Euripides,) and Egyptian mythology among other things. Your choices do make a difference, with nine distinct endings possible. (Some of which are very different to the original play.) Additionally, the stories do vary in length with some being significantly longer than others. (The version closest to the original is one of the shortest paths, but still recommended as the first playthrough of this game if you want to know how the original story plays out.) It is possible for Oedipus to die in some instances, although that is not always a bad thing. The afterlife holds different fates in store depending on your life's actions.\n\nIf you have any questions about the game or how to achieve particular events, help can often be found on the Choice of Games forum: https://forum.choiceofgames.com\n  \n*choice\n\t#Return to the main stats page. \n\t\t*goto stats\n\n\t#Glossary\n\t\n\t\t*goto glossaryoedipus\n\t\t\n\t#Characters\n\t\t*goto characters\t\t\n\t\t\n\t\t\n\n\n\n\n\n\n\n*label glossaryoedipus\n\n\n*text_image oedipusglossary.png center Glossary\n\n[b]Abacus:[/b] An abacus is a tool used to assist in calculations or to teach arithmetic. A common design consists of a wooden frame, with beads that can be moved horizontally along wires or wooden spokes.\n\n[b]Agora:[/b] The gathering place of a city where artistic, sporting, spiritual and political events were often held. Markets were frequently set up in the agora.\n\n[b]Apep:[/b] Taking the form of a giant serpent, Apep was sometimes known by his Greek name Apophis. He was an enemy of Ra (the Egyptian sun god) and much feared as a deity representing evil and chaos. \n\n[b]Apollo:[/b] A son of Zeus and one of the more powerful gods in the pantheon. Apollo was recognised as the god of a variety of things including: truth and prophecy, music and healing (particularly though his son Asclepius.) He was also the god of light. \n\n[b]Ammut:[/b] A demoness of the Egyptian underworld, Ammut was a hybrid of the three most dangerous animals to inhabit that area: The lion, hippopotamus and crocodile. She was greatly feared as the \"Devourer of the Dead,\" granting a second and final death to any who had not lived a worthy life.\n\n[b]Athena:[/b] A powerful goddess, Athena was born from the head of her father Zeus. She was the patron and protectoress of Athens, and the goddess of wisdom, craft and war.\n\n[b]Asclepius:[/b] Known as the healer-god, Asclepius was believed to be the first physician. His temples were known as Asclepieia and provided medical care and advice for those who sought it. \n\n[b]Cerberus:[/b] A massive three headed hound who guards the gates to the underworld, preventing the dead from leaving. \n\n[b]Charon:[/b] The ferryman of Hades, who transports the souls of the dead in his boat across the River Styx which divides the realm of the living from the dead. Shades who were not buried with the money to pay for the passage would be left to wander the shores unable to continue their journey, sometimes remaining there for a century or more until Charon would agree to take them without the required payment.\n\n[b]Drachma:[/b] A silver coin in use as currency in ancient Greece. \n\n[b]Eros:[/b] A son of Aphrodite (the goddess of love), Eros was the god of attraction and desire. He sometimes meddled in the affairs of both gods and mortals to cause them to fall in love.(Even if this would potentially cause strife for those involved.)\n \n[b]Fates:[/b] The Fates (or Moirai as they are sometimes known,) are three sister deities who control destiny and life. They were Clotho (spinner of the thread of life), Lachesis (who measured the thread dictating how long that life would be), and Atropos (who chose how someone would die. When the time came, she would cut the thread of life with her shears.) \n\n[b]Furies:[/b] The three goddesses of vengeance: Tisiphone, Megaera and Alecto, were collectively known as the Furies or Erinyes. Legend has it that they were created when the Titan Cronus, cut off an important part of Uranus' (his father) anatomy, causing blood to drip onto the Earth (Gaia). (So perhaps there is an understandable reason behind their ill temper.) They punished crimes relentlessly and without mercy, dogging the culprit's footsteps until their justice had been meted out. (A fate that often involved a painful death, so they were rightly feared by those who may have attracted their attention.) Patricide and Matricide (killing your father or mother,) were considered some of the worst crimes possible to commit, and would often be dealt with by these goddesses. The Furies had little tolerance for excuses, and mitigating circumstances would not prevent them from hunting down those they believe warranted their attentions. \n\n[b]Hera:[/b] Queen of the Olympian gods by virtue of her marriage to Zeus. Hera was known for her jealousy, particularly with regards to her husband. (Which was not completely unwarranted given Zeus' tendency to be unfaithful.) She was the patron of marriage and childbirth.\n\n[b]Humors:[/b] The ancient Greeks believed that one cause of ill health was an imbalance in the four humors. Every patient had a unique composition of these humors which could be brought out of balance or corrupted by both mental and environmental influences such as diet, injury and mindset. The predominance of a humor would also determine your temperament: Sanguine (blood), Choleric (yellow bile), Melancholic (black bile), Phlegmatic (phlegm.)\n\n[b]Lesche:[/b] A public shelter such as the covered sidewalks of the agora in Athens. These provided a roof over the heads of travellers who could not afford to rent a room\n\n[b]Lochagos:[/b] Commander of a company of soldiers.\n\n[b]Oracle at Delphi:[/b] A priestess of Apollo who could give advice and prophesies to those who came to seek it. Anyone from a farmer to a king could seek an answer at the temple once a year. \n\n[b]Osiris:[/b] God of the Egyptian afterlife and judge of the dead.\n\n[b]Pythia:[/b] The name given to the Oracle at Delphi. \n\n[b]Ra:[/b] Ra was the sun god and one of the most important of the Egyptian deities. He was believed to have created all forms of life. \n\n[b]Sekhmet:[/b] Depicted with the head of a lioness, Sekhmet was an Egyptian warrior goddess also associated with healing and as the protector of the pharaohs. Her name can be translated as \"She who is powerful\", while her titles included \"Mistress of dread,\" \"The one before whom evil trembles\" and \"She who mauls.\" She is a daughter of Ra.\n\n[b]Sphinx:[/b] The Sphinx in Greek mythology was a daughter of Orthus (a multi-headed dog who was a brother to Cerberus.) The origins of her mother are less clear with it thought to likely be Echidna (a woman with the body of a snake); however the Chimera (the three-headed monster killed by Bellerophon) and Ceto (a primordial sea goddess) are other contenders. She had the torso of a woman, the body of a lioness, wings of an eagle and the tail of a snake. The Sphinx was known to be merciless and deadly, and had a taste for human flesh.\n\n[b]Strategos:[/b] The equivalent of a military general.\n\n[b]Tartarus:[/b] An abyss in underworld which served as a prison for those who had threatened the Olympian gods, and as a place of punishment for those judged to have committed serious crimes during their life. \n\n[b]Zeus:[/b] The god of the sky and ruler of the Olympian gods, Zeus was married to Hera. (Although their marriage was a turbulent one.)\n\n*choice\n\t#Return to the main stats page. \n\t\t*goto stats\n\t\t\n\t#Characters\n\t\t*goto characters\t\t\n\n\t#More information about Oedipus and this game. ([b]Warning Spoilers:[/b] It is recommended to play through at least once before reading this file.)\n\n\t\t*goto background\n\t\t\n\t\n\t\t\n\t\t\n\n\n\n\n\t\t\n*label characters\n\n*text_image oedipuslist.png center List of Main Characters\n\n\n[i](This list will be expanded as you meet people through the story)[/i]\n\n\n[b]Amyntas:[/b] A servant who along with the healer Nysa, saved Oedipus' life as a baby.\n\t\n*if(childrentxt = \"yes\")\n\t[b]Antigone:[/b] Third child, and first daughter of Oedipus and Jocasta.\n\n*if(creon = \"yes\")\n\t[b]Creon:[/b] Brother and advisor to Queen Jocasta. His words carry much influence with her.\n\t\n*if(childrentxt = \"yes\")\n\t[b]Eteocles:[/b] One of Oedipus and Jocasta's twin sons.\t\n\t\n*if (iahmesu = \"yes\")\n\t[i]Iahmesu:[/i] A general in the Pharaoh's service in Egypt.\n\n*if(jocasta = \"yes\")\n\t[b]Jocasta:[/b] Queen of Thebes. \n\t\n*if(laius = \"yes\")\n\t[b]Laius:[/b] King of Thebes and married to Queen Jocasta until his death. \n\t\n[b]Merope:[/b] Queen of Corinth and mother to Oedipus. \t\n\n[b]Oedipus:[/b]\tA prince of Corinth and the player's character. \n\n[b]Polybus:[/b] King of Corinth and father to Oedipus. \n\n*if(childrentxt = \"yes\")\n\t[b]Polynices:[/b] One of Oedipus and Jocasta's twin sons.\n\n*if(childrentxt = \"yes\")\n\t[b]Ismene:[/b] Fourth child, and second daughter of Oedipus and Jocasta.\n\n*if(tiresius = \"yes\")\n\t[b]Tiresius:[/b] A renowned seer and prophet to Apollo; Tiresius could receive visions, understand the speech of birds, and could sometimes converse with the dead.  \n\t\n*if (sphinxalive = \"yes\")\n\t*if (sphinxname = \"Sphinx\")\n\t\t[b]Sphinx:[/b]\n\t*if (sphinxname != \"Sphinx\")\n\t\t[b]Sphinx (Aristomache):[/b]\n\tA hybrid of human, lion, bird and reptile, the Sphinx is thought to have fled into exile after failing the task set for her by Hera.\n\n\n*choice\n\t#Return to the main stats page. \n\t\t*goto stats\n\n\t#Glossary\n\t\t*goto glossaryoedipus\n\t\t\n\t#More information about Oedipus and this game. ([b]Warning Spoilers:[/b] It is recommended to play through at least once before reading this file.)\n\n\t\t*goto background\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Chapters 4 through 12[/b]\n  \n  Unlock chapters 4 through 12, including the thrilling conclusion!\n  \n  *purchase_discount adfree 2022-02-23 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Chapters 4 through 12[/b]\n  \n  You've paid to unlock chapters 4 through 12.\n", "death": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nYou have died.\n\n*goto_scene ending", "ending": "*page_break End\nWe hope you've enjoyed playing [i]The Saga Of Oedipus Rex.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n\n\t\t\n", "part2sphinx": "*text_image ch2oedipus.png center Chapter two: The Long Road\n\n*set status \"A self-exiled prince in search of answers.\"\n\n\nThe Fates had continued to frown upon you during your journey from Delphi. The bright sunshine was soon hidden by threatening clouds that gave way to heavy rain, leaving your clothes sodden and caked with mud. \n\t\nYou could almost cry with relief when the bright lights of an inn come into view. You can only hope they will have a room available for the night out of this storm. A hawk nosed woman with greying hair answers the bell as you stand dripping on the doorstep. Taking in your rough spun and dirty clothing she looks you up and down with suspicion. \n\n\"If you're after a room, it's four drachmas per night. And that includes warm water brought to your room to wash,\" she adds pointedly, indicating that a bath will not be optional if you wish to sleep in one of her beds tonight. \n\n*set health -1\n\n\n*if (coins \u003c 4)\n\tYour heart sinks, that's more than you have left in your purse. The rain continues to beat down mercilessly making you shiver with cold. There's no way she'd believe you're a prince with the way you appear at the moment. Besides, you need to keep a low profile until this mess can be sorted out. If your parents find out where you've run away to, they may send guards out to haul you back home.\n\t\n\t\"Please good woman, that's more than I have. Perhaps...\" \n\n\t*label nomoney\n\t*disable_reuse\n\t\n\t*choice\n\t\t*selectable_if (coins > 3 ) #Pay the innkeeper. You're cold and exhausted and need a place to rest.\n\t\t\tBesides, that bath really does sound like just the thing to soothe your aching muscles. Pulling the coins from your purse you hand them over. The innkeeper looks them over carefully, before nodding and indicating for you to step inside out of the rain.  \n\t\t\t\n\t\t\tAs you stand dripping on the polished floor tiles, your stomach gives an audible grumble reminding you it's been hours since you ate the last of your trail rations. \n\t\t\t\n\t\t\t*set coins -4\n\t\t\t*set health +2\n\t\t\t\n\t\t\t\"Do you have anything to eat?\" you ask, looking hopefully towards the darkened kitchen. \n\t\t\t\n\t\t\t\"Kitchen's closed, cook's gone for the night,\" your host replies shortly. After a moment's hesitation however, she relents. \"I'll see what I can find. There might be a few left overs you can have. I'll wager you've travelled some distance to arrive so late on a night like this.\"\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tBundling you in a crisp white towel, she scolds you to dry yourself off before leading you to a room. Guest or no guest, the owner of this establishment does not mince words and clearly expects to be obeyed. Exhausted you comply, thinking of the bed that awaits you. \n\t\t\t\n\t\t\tAlthough not as grand as you're used to, the room is surprisingly pleasant and airy. A couch like bed strands in one corner with a metal bound chest for storing personal items at its foot; should you have been carrying more than the clothes on your back. A small metal tub has been pushed against the opposite wall, and a cloudy mirror of polished metal hangs nearby. \n\t\t\t\n\t\t\tThe innkeeper places a plate with some scraps of pastries and a few pieces of apple down on a slightly wobbly wooden table, along with a pitcher of water and gestures for you to eat. \n\t\t\t\n\t\t\t\"I'll have to wake the servants, but they'll be up shortly with the water. I'll not have my sheets muddied, so make sure you wait,\" she tells you shortly, before sweeping away out the door a swirl of white cloth.\n\t\t\t\n\t\t\tYou wonder at what she'd think if she knew that she'd just treated a prince like a disobedient child. \n\t\t\t\n\t\t\t\"She'd probably tell me off just the same,\" you snort, picking up a pastry and shoving a piece into your mouth. \n\t\t\t\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tThe pastries are thick with honey and raisins, and the fruit crisp and fresh. Chewing contentedly, you watch sleepy looking servants arrive with steaming jars of water, slowly filling the bath. When finished, the young man gives you a tired nod, clearly planning to return to the pallet in his own room as soon as possible. \n\t\t\t\n\t\t\tYour eyelids are leaden and the bed looks inviting, but not wishing to face the owner's wrath in the morning you quickly strip and bathe. Washing the worst of the dirt from your clothing you find a railing to hang them over, hoping they'll dry overnight. Padding back towards the bed, you notice just how warm the floor is. The house must have a hypocaust system to heat it, taking the chill from the air.\n\t\t\t\n\t\t\tThe bed is soft and warm after your long travels. Sinking into the feather filled mattress, sleep is not long in coming. \n\t\t\t\n\t\t\t*achieve rested\n\t\t\t\n\t\t\t*page_break \n\t\t\t\n\t\t\tYou're awoken with the dawn, eyes heavy and gritty as a rooster perches on a branch by your window, singing in the day. \n\t\t\t\n\t\t\t*fake_choice\n\t\t\t\n\t\t\t\t#\"I wonder if I can throw my shoe far enough to reach it,\" you grumble.\n\t\t\t\t\tYou roll stiffly out of bed, searching blearily for your discarded sandals. Now armed you stalk to the window, only to find the bird has fluttered away. To annoy someone else no doubt. \n\t\t\t\t\t\n\t\t\t\t\t\"Well at least it saved me a trip outside to fetch the shoe back,\" you grouch. \n\n\t\t\t\t\tNow fully awake, there's little point in trying to fall asleep once more. Gathering your almost dry clothing from the railing, you pull the tunic and over your head and tie a belt at your waist. \n\t\t\t\t#\"Well I guess I had to get up sooner or later,\" you groan. \n\t\t\t\t\tStiffly you climb out of bed feeling improved compared to yesterday, but your aching muscles still complain at the thought of another long day of trekking ahead.\n\t\t\t\t\n\t\t\t\t\tYou gather your almost dry clothes and pull them on. \n\t\t\t\t#Pull the pillow over your head and try to ignore it.\n\t\t\t\t\tYou pull the feather pillow over your head covering your ears, but it's no use. Tired as you are, sleep stubbornly refuses to come. Grumpily you climb out of bed, fetching your almost dry clothes and pulling them on. \n\t\t\t\t\tOutside the sky has cleared from a menacing black into dull grey clouds, the storm for the previous day having blown away. If you're lucky, the rain may hold off for now. \n\t\t\t\t\t\n\t\t\tWandering down the hall, you're greeted by the smell of breakfast cooking that sets your mouth watering. A woman with a motherly smile and an olive complexion bustles out of the kitchen carrying a platter of cheeses. She brushes strands of long black hair from her eyes that have escaped the pale ribbon tying it away from her face. \n\n\t\t\t\"Ah, I haven't seen your face before. You must be the guest who arrived late last night that Khloe told me about. Wasn't expecting you to be the first one up and about today.\" At your blank expression, she chuckles. \"Khloe owns these lodgings. I'll bet she was a little short with you last night, wasn't she? Late visitors that drag her out of bed make her cranky. Never mind, she's generally got a heart of gold... well if you don't rub her up the wrong way anyway.\"\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\t\"I'm Isidora by the way. Not that you need to remember that, you have the look of one just passing though.\" She absently wipes hands dusted with flour along the folds of her dark purple dress leaving pale smears. \"Well eat up! Khloe said you didn't get a proper meal last night with your lodgings, so this one is on the house. She's at the market this morning, so asked me to let you know if you do choose to stay longer, meals are an additional two drachmas on top of board. Just so you're aware. Anyway, I must keep going, that bread isn't going to bake itself. Enjoy!\"\n\t\t\t\n\t\t\tWith that she strides from the room, leaving you alone with platters of food to choose from. \n\t\t\t\n\t\t\t*fake_choice\n\t\t\t\t#Buttered bread and poached quail eggs sound like just the thing!\n\t\t\t\t\tYou cut slices from the thick crusty loaf still warm from the oven, slathering it with butter and eggs. The meal is warm and filling, just the thing to leave you feeling much improved.\n\t\t\t\t\n\t\t\t\t#The selection of cheeses looks delicious. \n\t\t\t\t\tThe cheeses are soft and surprisingly good, made from the milk of goats and cattle. You eat until sated feeling much improved. \n\t\t\t\t\n\t\t\t\t#Reach for the platter of fresh apples and grapes glistens with dew as if picked from the garden this morning. \n\t\t\t\t\tThe grapes are sweet and the apples crunch satisfyingly as you slice them into pieces and munch on them contentedly until sated. The food has left you feeling much better.\n\t\t\t\t\n\t\t\t\t#Have a little of everything.\n\t\t\t\t\tThere's no telling when you'll get your next meal, particularly one as fine as this. Eagerly you dig in, picking food from each of the plates and piling it high with bread, cheese and eggs until you can eat no more. \n\t\t\t\t\t\n\t\t\t\t\tWiping the crumbs from your mouth, you lean back on the stool feeling overfull but better able to face the day.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\tAlthough it'd be nice to rest a while longer, you're still far too close to Delphi. Time to move on. \n\t\t\t\n\t\t\tSlipping an apple into your pocket, you collect your belonging from the room. Calling a final farewell to Isidora, you step once more into the street. As you walk, you're conscious of the \n\t\t\t*if (coins != 0)\n\t\t\t\talmost \n\t\t\tempty purse at your belt. You'll have to find a way to earn money. And soon. \n\t\t\t\n\t\t\t*page_break\n\t\t\t\t\n\t\t\t*goto_scene part3road\t\t\n\t\t\t\n\t\n\t\t#\"Do you have a room that is cheaper?\"\n\t\t\t\"Cheaper?\" she growls, eyes flashing. \"I'll have you know my rooms are reasonably priced and I will not haggle like a farmer's wife over apples in the market square. The fee is four drachmas. If you don't like it, go elsewhere.\"\n\n\t\t\t*goto nomoney\n\t\t\t\n\t\t#\"I could do some chores for board? The weather really is foul. Please?\"\n\t\t\tShe sighs heavily, looking at the state of your clothing. \"You'll not be coming inside all muddy like that if you'll not pay.\"\n\t\t\t\n\t\t\tHer expression softens slightly as a wind gust makes you shiver. \"Look, there's a shed by the side of the house where I keep the wood to fuel the furnaces for the hypocaust. I haven't locked it yet, so you can shelter there tonight. I'd appreciate it if you could split some wood before you leave in the morning.\"\n\t\t\n\t\t\t*choice\n\t\t\t\t#Thank her and stay in the wood shed overnight. \n\t\t\t\t\tAlthough out of the wind and rain, the shed is small and cramped. You find little sleep as pieces of wood jab you with splinters every time you shift trying to get comfortable through the night. \n\t\t\t\t\t\n\t\t\t\t\tThe following morning dawns to a dull grey sky, blissfully free of rain. Your clothes are still damp and chafe where the mud has ground its way into the material. \n\t\t\t\t\t\n\t\t\t\t\tYou stretch wearily, hesitating at the threshold. Last night the owner had asked you to chop some wood as payment before you left, but she's nowhere to be seen. \n\t\t\t\t\t\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#Split the wood. Although exhausted, it's the right thing to do.\n\t\t\t\t\t\t\t*set splitwood \"yes\"\n\t\t\t\t\t\t\tA sense of moral duty compels you to stay: The innkeeper did not have to offer you a place out of the rain, you should repay her for that at least. Although not the most comfortable of accommodations, it surely beat being out in the weather all night.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t*label axe\n\t\t\t\t\t\t\tTiredly you lift the heavy bladed axe and put it to use cutting the thick branches into pieces. The blade has been kept honed to a sharp edge, but still you find yourself working up a sweat in no time. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tSatisfied by the small pile stacked by the door, you pick up your belongings, heading for the gate. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Wait!\" A motherly looking lady with an olive complexion leans from the window. She bustles out the back door, almost tripping on a long purple dress dusted with flour. \"These are for you.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\tShe beams, handing you a small bundle wrapped in linen that smells deliciously of freshly baked bread. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Chloe, that is the owner of these lodgings, asked me to prepare you some breakfast if you stayed to chop the wood as she asked.\" She looks back towards the kitchen anxiously. \"I must go, that bread is likely to start burning at any minute. Enjoy!\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tWith a final wave, she runs back towards the house. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tUnwrapping the bundle yields pieces of raisin filled bread, still warm from the oven. Your stomach growls hungrily. The day is looking brighter already. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tMarching out on the road, you stuff delicious morsels into your mouth chewing contentedly. Although you'll eat well today, you're conscious of the\n\t\t\t\t\t\t\t*if (coins > 8 )\n\t\t\t\t\t\t\t\tlimited supply\n\t\t\t\t\t\t\t*if (coins \u003c 9 )\n\t\t\t\t\t\t\t\tdepleting supply \n\t\t\t\t\t\t\tof coins at your waist. You'll have to find a way to earn money. And soon. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*set health +1\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*achieve honesty\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto_scene part3road\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t#Split the wood. You may need to stay here again someday. Best not burn any bridges.\n\t\t\t\t\t\t\t*set splitwood \"yes\"\n\t\t\t\t\t\t\tYour future is uncertain and you may pass this way again sooner or later. Although your muscles protest as you pick up the axe, you'd prefer not to add to your ill fortune.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto axe\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t#Leave. You're tired and it's not like it cost her anything to let you stay.\n\t\t\t\t\t\t\t*set splitwood \"no\"\n\t\t\t\t\t\t\tYou could have snuck in here and she'd probably never have even known. A night of sleeping upright, with your back propped against branches that stuck and poked at your every movement has not left you feeling terribly well disposed towards the innkeeper who probably had a room available, but chose not to give it. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tWell you can choose not to chop wood. You doubt she'll try to stop you leaving. Gathering your belongings, you stride out onto the street without any opposition. As you walk, you're conscious of the \n\t\t\t\t\t\t\t*if (coins > 8 )\n\t\t\t\t\t\t\t\tlimited supply\n\t\t\t\t\t\t\t*if (coins \u003c 9 )\n\t\t\t\t\t\t\t\tdepleting supply \t\t\t\t\t\t\t\n\t\t\t\t\t\t\tof coins at your waist. You'll have to find a way to earn money. And soon. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto_scene part3road\n\t\t\t\t\t\t\n\t\t\t\t\t\t#Leave. Why should you? She could have let you stay in the house, but instead left you to sleep in the shed.\n\t\t\t\t\t\t\t*set splitwood \"no\"\n\t\t\t\t\t\t\tThe thought is bitter as you massage a knot in your neck. The night had been barely better than finding a tree to sleep under; propped upright with your back against branches that stuck and poked at your every movement. The fact that she had rooms to spare but denied them to you only makes it worse. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tStiffly, you gather your belongings, striding out onto the street. You almost expect a challenge from the innkeeper as you leave, but none is forthcoming. Still grumbling, you continue on your way. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tAs you walk, you're conscious of the \n\t\t\t\t\t\t\t*if (coins > 8 )\n\t\t\t\t\t\t\t\tlimited supply\n\t\t\t\t\t\t\t*if (coins \u003c 9 )\n\t\t\t\t\t\t\t\tdepleting supply \t\t\t\t\t\t\t\n\t\t\t\t\t\t\tof coins at your waist. You'll have to find a way to earn money. And soon. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto_scene part3road\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t#Leave. The sooner you put some more miles between yourself and Corinth, the better. \n\t\t\t\t\t\t\t*set splitwood \"no\"\n\t\t\t\t\t\t\tThe Oracle's curse weight heavily on your mind. You must leave, and as quickly as possible. By now, you're sure to have been missed from the palace, with guards sent out to find you. And if they drag you back to Corinth...\" You shiver, and not just from the cold. What could possibly occur to make you kill your own kin? On second thoughts, that's an answer you don't want the answer to. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tHurriedly, you gather your belongings, and sneak fugitively out into the street, blending with the procession of people heading into town for the market. As you walk, you're conscious of the \n\t\t\t\t\t\t\t*if (coins > 8 )\n\t\t\t\t\t\t\t\tlimited supply\n\t\t\t\t\t\t\t*if (coins \u003c 9 )\n\t\t\t\t\t\t\t\tdepleting supply \t\t\t\t\t\t\t\n\t\t\t\t\t\t\tof coins at your waist. You'll have to find a way to earn money. And soon. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto_scene part3road\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\n\t\t\t\t#Refuse and go looking for somewhere better. \n\t\t\t\t\tThe innkeeper sniffs at your lack of gratitude. \"Well good luck finding somewhere tonight. I doubt very much you'll find any place better. Just don't come knocking on my door later because I shan't answer.\"\n\t\t\t\t\t\n\t\t\t\t\tThe door closes with a bang in your face. With a shiver, you pull your cloak tightly around your shoulders for what little warmth the sodden clothing still provides and head out once more into the street.\n\t\t\n\t\t\t\t\t*page_break\n\t\t\t\t\t\n\t\t\t\t\tAfter walking the darkened streets, it quickly becomes apparent that the innkeeper was right. You find no sign of a lesche, nor any other inns open for business on this miserable night. \n\t\t\t\t\t\n\t\t\t\t\t*set health -1\n\t\t\t\t\t\n\t\t\t\t\t*goto giveup\n\t\t\n\t\t#\"You should be ashamed extorting such prices on a night like this. I will give you one drachma. That is fair.\"\n\t\t\t\"You think so, do you?\" You're almost surprised the glare she gives you doesn't kill you stone dead. \"Well I work hard to keep this inn well maintained for my guests. I am not a shelter for the poor. It would be best if you were on your way.\"\n\t\t\t\n\t\t\tThe heavy wooden door slams in your face and you hear the clunk of a key turning in the lock. You'll find no rest there tonight. \n\t\t\t*label hedge\n\t\t\t\n\t\t\tDesolately you continue into town through the curtains of rain finding no sign of a lesche, nor any other inns open for business on this miserable night. \n\t\t\t\n\t\t\t*label giveup\n\t\t\t\n\t\t\t*set health 3\n\t\t\t*set hedge \"yes\"\n\t\t\tFinally giving up, you worm your way under a collection of densely leaved bushes. It turns out they shelter you from the worst of the rain; although heavy cold droplets occasionally get through to splash on your head, disturbing you from your uneasy slumber. You wake with the dawn, cold wet and hungry. At least the storm has abated to a grey skyed drizzle. \n\t\t\t\n\t\t\tClimbing stiffly from underneath the shrubs, you set off once more. Your throat is raspy and sore, while your stomach growls with hunger. You're not used to living rough, and the experience is more than unpleasant. You'll need to find a way to earn money soon or living this way will surely kill you.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\t*goto_scene part3road \n\t\t\n\t\t\n\t\t\n\t\t#\"Never mind, I'll find somewhere else to stay.\" \n\t\t\n\t\t\tThe innkeeper snorts. \"This is the only inn in the town. Take a room or you'll be sleeping under a hedge tonight. Your choice.\"\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#Reconsider your options.\n\t\t\t\t\tSleeping under a tree doesn't sound particularly pleasant given the weather. Perhaps she'll consider a deal?\n\t\t\t\t\t\n\t\t\t\t\t*goto nomoney\n\t\t\n\t\t\t\t#\"I don't care, I'll make do.\"\n\t\t\t\t\tThe innkeeper shrugs, making it obvious she cares little of what you choose to do outside of her establishment. \"Well, good night to you then.\"\n\t\t\t\t\t\n\t\t\t\t\tThe wooden door clicks shut and you hear the clunk of a key turning in a heavy lock. \n\t\t\t\t\t\n\t\t\t\t\t*goto hedge\n\t\t\t\t\t\n*if (coins > 3)\n\tYour heart sinks, that's far more than you were hoping to pay. Still, you could catch your death of cold staying out in this weather.\n\t*if ((templetrip != \"cart\") or (begdriver != \"no\"))\n\t\t*if (oraclegift != \"average\")\t\n\t\t\tYou're glad that you had the foresight to conserve your funds.\n\t\t*if (oraclegift = \"average\")\t\n\t\t\tIf you pay the innkeeper's fee however, it will leave you dangerously low on coin.\n\t*if ((templetrip = \"cart\") and (begdriver = \"no\"))\t\t\n\t\tIf you pay the innkeeper's fee however, it will leave you dangerously low on coin.\n\t\n\t*goto nomoney\n", "part3road": "*temp offendmap \"no\"\n*temp visitmap \"\"\n\n\n*page_break\n\nIt's been months since your audience with the Pythia, and still your search for a solution continues. You suspect that even if you came face to face with your parents today, they'd barely recognise you having...\n\n*fake_choice\n\t#Let your beard grow long, where you'd always been clean shaven before. \n\t\tAlthough it itches somewhat, it disguises your face nicely. At a casual glance, even people who know you well would be likely to walk straight past without a hint of recognition.\n\t\n\t\n\t#Become lean and muscled, your face tanned from long days of walking from town to town. \n\t\tYour muscles have hardened into tough sinew, while irregular meals have left your ribs bare. Still, the miles have left you fitter and stronger than you've ever been before.\n\t\t*if (health \u003c 5)\n\t\t\t*set health +1\n\t\t\n\t#Continued to wear the rough spun garments of the poorer classes. \n\t\tAlthough it chafes and sometimes you long for your finely tailored clothes, it does provide a good disguise. No one thinks to look for a prince wearing a poorly fitting brown tunic. \n\n\n\n\t\t\nMoney jingles in your belt. Not a lot, but enough that you've eaten and found shelter more often than not of late. \n*if (hedge = \"yes\")\n\tThe initial weeks were hard, your health becoming poor from the night spent out in the rain. Few people will hire someone who is coughing and feverish, worried that they may be contagious. Although you've managed to make do, the illness has left you weakened. Even now, you have a lingering cough that refuses to completely go away, and you have to take extra care not to catch another chill. \n*if (hedge != \"yes\")\n\tYou find yourself grateful once more of the shelter you found at the inn from your first night on the run. Life had been hard enough initially without having to deal with the possibility of catching a chill in the storm on top of everything else. \n\n\nYou're on the road again, in search once more of new employment. Between a mixture of tutoring, scribe work and even as a hired guard, there seems to be enough work for an honest hand good at their job. \n\nYou've found life as an academic to be more comfortable, if sedentary, with a guaranteed roof over your head each night and sometimes even books with which to continue your research into prophecy and the doings of the gods. Work as a guard however allows you to move about more, facilitating your search for answers as you talk to the people you meet along the way. It often pays well too, as long as the goods make it to their destination safely. On the other hand, you'd often have to sleep rough and the work could be dangerous.  \n\nOn the whole, when given a choice, you taken work as a...\n\n*fake_choice\n\t#Tutor. \n\t\t*set job \"scholar\"\n\t\t*set coins +7\n\t\t\n\t\tComfortable and safe, it also allows you to indulge in your learning. You'd been amazed at the collection of scrolls some houses stored, much less the libraries you'd had the chance to visit. It wasn't always pleasant though; in fact your last job wasn't wonderful at all. \n\n\t\tIt had seemed easy enough, teach the son of a textile merchant while his unusual tutor was recovering from an illness. In reality, it had been a headache inducing nightmare. \n\t\t\n\t\tPaying the stall holder for a loaf of bread, you head to the edge of the agora and find a shady spot to eat. At least you can find some peace here, you'd had little enough lately.\n\t\t\n\n\t\n\t#Mercenary. \n\t\t*set job \"mercenary\"\n\t\t*set coins +10\n\t\t*set health -1\n\t\tYou've grown used to the constant traveling, visiting places and people you never thought you'd get to see in your lifetime. The truth be known, most hires are a dull affair. Trudging alongside wagons, the mere presence of armed mercenaries seeming to be enough to discourage all but the bravest of thieves. Not always though, so you'd have to keep your wits about you. The occasional skirmish had served to keep your reflexes sharp and skills honed. \n\t\t\n\t\tAnd then there were hires that just did not go to plan. Merchants that tried to cheat you out of your rightful pay, being teamed up with guards less proficient or motivated than yourself, or just simply having to walk long miles on foot when the gods saw fit to send sleet and rain, or harsh blistering heat. \n\t\t\n\t\tStill, there were times when you missed even that. With no caravans needing additional guards in the area, you'd been forced to take a job teaching the son of a textile merchant while his usual tutor was recovering from illness. It had seemed easy enough, but the reality had been a nightmare. \n\n\t\tWell at least that's over with now. Paying the stall holder for a loaf of bread, you head to the edge of the agora and find a shady spot to eat. At least you can find some peace here, you'd had little enough lately.\n\n\nAs you eat contentedly, your mind drifts back to the stuffy earthen bricked room in which you'd spent most of the last week...\n\t\t\n*page_break\n\t\t\n*goto tutor\n\n\n\t\n\t\n\n\t\n\t\n\t\n*label tutor\nYou rub at your temples, the beginnings of a headache already forming behind your eyes. The subject
