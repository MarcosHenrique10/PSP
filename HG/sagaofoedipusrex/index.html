of your frustrations sits oblivious on a stool before you, rocking painted wooden horses in a motion to simulate them galloping a chariot race up and down the polished wooden table. \n\nAt the age of eight, Theron is the only son of Aristaeus, a moderately successful merchant specialising in fabrics. With his wife long passed from this Earth, it seems likely that he will remain an only child.\n\nYou sigh. A pity no doubt. The boy simply has no head for numbers at all. You suspect he will never have the discipline to be a successful trader; or a happy one. His father has to be aware, however you guess with a single child to available to inherit his business, he'll persist with the child's education out of little other choice. \n\nWatching the boy play with the horses, dust marring his clothes and straw caught in strands of messy brown hair, you can only hope he'll come to reconsider his son's path in life. It'd be better for both of them.\n\n*page_break\n\n\"Theron, focus please.\" You continue, trying to catch his attention once again. \"You have five apples...\"\n\nThe boy ignores you, gazing out of the window with a faraway look in his large brown eyes.\n\n[i]No, definitely not a merchant,[/i] you reflect. [i]A farmer perhaps. Yes, you could definitely see him enjoying the peaceful life, plodding alongside his favourite plough horse in the fields.[i]\n\nBut you're not paid to interfere, you've got a lesson to teach. \n\n*choice\n\t#Bring your ruler down on the table to get his attention back. It's likely little else will break through his daydreaming. \n\t\t\n\t\tThe ruler hits the wooden table with a sharp [i]Thwack![/i] Theron startles, sending the toy horses scattering. \n\t\t\n\t\t\"As I was saying. You have [i]five[/i] apples.\" Leaning across, you move the beads on the abacus into place. \n\t\t\n\t\t\"I don't even like apples,\" the boy whinges. \"They taste bad. Grapes are much better.\"\n\t\t\n\t\t*choice\n\t\t\t#\"Isn't it a good thing we're going to sell them then?\" you reply, voice strained. \n\t\t\t\t*set tutortype \"apples\"\n\t\t\t\t\n\t\t\t\tThe boy leans back on his stool with a scowl unconvinced. \n\t\t\t\t\n\t\t\t\t\"So... about those five apples.\"\n\t\t\t\t\n\t\t\t\t\"I already told you I don't want them,\" the boy snaps on the verge of another temper tantrum. \n\t\t\t\t\n\t\t\t\t\"Alright. Well that's great because since you don't want them anymore, now you're going to give all five of them to me. How many do you have left?\"\n\t\t\t\t\n\t\t\t\t\"Five.\"\n\t\t\t\t\n\t\t\t\t\"No...\" You take a composing breath, pointing to the beads on the abacus. \"Remember you [i]had[/i] five. But then, you gave [i]me[/i] five. So how many are left in your store?\"\n\t\t\t\t\n\t\t\t\t\"Fifty grapes.\"\n\t\t\t\t\n\t\t\t\tThe headache is getting worse. You can feel a throbbing at your temples now. \n\t\t\t\t\n\t\t\t\t\"Theron this is really quite simple. Forget about the grapes. There are no grapes only apples.\"\n\t\t\t\t\n\t\t\t\t\"Why not?\" he grouches. \"The shops in the square always have grapes [i]and[/i] apples.\"\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t*goto hall\n\t\t\t\t\n\t\t\t\n\t\t\t\n\t\t\t#\"Fine. You have five [i]grapes,\"[/i] you respond, frustration growing. \n\t\t\t\t*set tutortype \"grapes\"\n\t\t\t\t\"...And then, you give two of them to me.\" You slide two counters across. \n\t\t\t\t\n\t\t\t\t\"No I don't,\" Theron grouches. \n\t\t\t\t\n\t\t\t\t\"What?\" The headache is spreading towards your temples.\n\t\t\t\t\n\t\t\t\t\"I'm not going to give you any. I like grapes and you didn't ask nicely.\"\n\t\t\t\t\n\t\t\t\t\"Theron...\" you warn.\n\t\t\t\t\n\t\t\t\t\"Besides,\" he continues unabashed, flicking the beads of the abacus back and forth. \"These look nothing like grapes. Grapes are purple... or maybe green. These are orange.\"\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t*goto hall\n\t\t\t\t\n\t\n\t\n\t#Try changing the subject a little. Perhaps you can get his interest back somehow. \n\t\t\"Ok Theron, let's try something different. You have five [i]horses...\"[/i]\n\n\t\t\"We have seven,\" he corrects you absently. \n\t\t\n\t\t\"Ok [i]seven[/i] horses.\" You move two more counters across to join the five already there. \"And let's say you sell two of them to Mrs Karras down the road.\"\n\n\t\t\"Who do we sell?\"  \n\t\t\n\t\tYou search your memory for the names of the horses Theron had insisted on taking you to meet on your first day here.\n\t\t\n\t\t\"Um... How about Cyllarus and... Aithon?\"\n\t\t\n\t\t\"No! Not Aithon. He's my favourite!\" Theron sits up, clutching the table. \n\t\t\n\t\tNot the reaction you were going for, but at least you have his attention you guess. \n\t\t\n\t\t*page_break\n\t\t\n\t\t\"Alright calm down, not Aithon then. Who can we sell?\"\n\t\t\n\t\t\"No one.\" His mouth sets in a stubborn line. \"I like them all.\"\n\t\t\n\t\tThe headache is intensifying, it's thudding at your temples now. You forge on.\n\t\t\n\t\t\"Fine, fine. Let's try this then. So, you have seven horses right?\"\n\t\t\n\t\tThe boy nods in agreement. \n\t\t\n\t\t\"Now I'm going to send you over to Mrs Karras' house and get you to buy two of her horses. How many do you have now?\"\n\t\t\n\t\t*page_break\n\t\t\n\t\t\"Can I buy her stallion? Phobos is the best.\" \n\t\t\n\t\tThe conversation is rapidly derailing again. If you can just get him to answer this one question, you'll call it a day regardless of what his father says. \n\t\t\n\t\t\"Sure. Why not, you can have the stallion. So...\"\n\t\t\n\t\t\"But Dad says he's dangerous,\" the boy interrupts. \"I don't think he'll let me buy him.\" He picks up a toy and mimics the horse bucking and rearing with accompanying sound effects. \n\t\t\n\t\t*page_break\n\t\t\n\t\t\"Look Theron, this is all just pretend ok?\"\n\t\t\n\t\t\"Oh...\" He sits back, mutiny in his eyes. \"But [i]you[/i] said I could buy Mrs Karras' horses.\"\n\t\t\n\t\tThis is going to be a very long day...\n\t\t\n\t\t*page_break\n\t\t\n\t\tBefore you can try again, you hear Aristaeus' muffled baritone down the hall. \n\n\t\t[i]\"Oh no, he's in there now, it's no trouble... Don't be silly, I'm sure you want to catch up with all of my son's missed education as soon as possible... Oedipus? I'm sure he won't mind at all. He knows the job was only temporary...\"\n\n\t\tThe door swings open with a bang, as Theron's father strides through; the heavy-set man all but dragging a rake thin, sallow looking gentleman behind him. \n\t\t\n\t\tHis eyes light up at the sight of the abacus as he beams at his son. \"So Theron, what have you been learning about today?\"\n\t\t\n\t\t\"Oedipus says we should sell Cyllarus and Aithon, then buy Phobos from Mrs Karras.\"\n\t\t\n\t\tYou groan inwardly. [i]That[/i] he remembers. \n\t\t\n\t\t*choice\n\t\t\t#\"It's not what you think.\"\n\t\t\t\t\"I thought I hired a tutor, but instead is seems I've hired an expert on horseflesh.\" Aristaeus' face reddens as his face clouds with anger. \n\t\t\t\n\t\t\t\t\"It's not what you think. I was just trying to use an example Theron could relate to,\" you protest. \n\t\t\t\t\n\t\t\t\t\"I only just got the boy to stop whining about that stallion. I thought it was Mrs Karras who was putting those fool notions in Theron's head, but it was [i]you[/i] after all. How much is she paying you?\"\n\t\t\t\t\n\t\t\t\t*label phobos\n\t\t\t\t\n\t\t\t\t\"What?! No, this is the first time I've ever mentioned him...\"\n\t\t\t\t\n\t\t\t\t\"I don't want to hear it,\" he cuts you off. \"Just as well Orestes is well enough to take over Theron's education once again.\"\t\t\t\t\n\t\t\t\t\n\t\t\t\tHe pulls the taller man forward who is looking distinctly uncomfortable at being brought into the argument. \n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t\"Here.\" Aristaeus shoves a jingling purse into your hands roughly. \"That should be more than enough to cover the wages you're owed. I want you to pack up your belongings and be out by tonight. No arguments unless you want me to summon the law enforcers.\"\n\t\t\t\n\t\t\t\t*label law\n\t\t\t\n\t\t\t\tYou've little choice. Either you leave voluntarily with all your possessions, or he'll summon the police to throw you out. At least he paid you. You weigh the purse in your hand. Perhaps even overpaid? Well you'd earned every coin of it. \n\t\t\t\t\n\t\t\t\t*goto memoryend\n\t\t\t\t\n\t\t\t\n\t\t\t#\"I was only using it as an example. I told him it we were just pretending.\"\n\t\t\t\t\"An example eh?\" Aristaeus' voice is dangerous. [i]\"Someone's[/i] been putting fool notions in my boy's head about that stallion. I thought was Mrs Karras, but it turns out it was you all along. That horse is dangerous, told her myself. It's an evil thing use someone's child to try to change their mind. How much is she paying you?\"\n\t\t\t\t\n\t\t\t\t*goto phobos\n\t\t\t\n\t\t\t#\"I give up.\" If he's going to fire me, I'm fine with that right now. \n\t\t\t\t\"Too right you'll give this up!\" Aristaeus roars. \"Just as well Orestes is recovered, because I want you out of my house now. Go back to Mrs Karras and tell her I'll not buy that walking death trap. And if I ever hear of you putting fool notions in my son's head again, you'll regret it. Mark my words.\"\n\t\t\t\t\n\t\t\t\t*fake_choice\n\t\t\t\t\t#\"Mrs Karras? What-No. It's not like that. I don't even know her.\" \n\t\t\t\t\t\t\"I don't care what it's like. Here!\" He shoves a purse full of coins into your hands. \"Payment for services rendered, not that you deserve it. No out before I call on the law enforcement to remove you.\"\n\t\t\n\t\t\t\t\t#\"Fine I'm going. I don't want to teach your son anyway.\"\n\t\t\t\t\t\t\"Out. Now!\" Aristaeus is shaking with rage. \"And here, take this with you, not that you deserve it. I'll not have you set foot in my house again. Now go before I call on the law enforcers to remove you.\"\n\t\t\t\t\t\n\t\t\n\t\t\t\t*goto law\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\n*label hall\t\n\nBefore you can try again, you hear Aristaeus' muffled baritone down the hall. \n\n[i]\"Oh no, he's in there now, it's no trouble... Don't be silly, I'm sure you want to catch up with all of my son's missed education as soon as possible... Oedipus? I'm sure he won't mind at all. He knows the job was only temporary...\"\n\nThe door swings open with a bang as Theron's father strides through. The heavy-set man all but drags a rake thin, sallow looking gentleman behind him into the classroom. \n\nHis eyes light up at the sight of the abacus as he beams at his son. \"So Theron, what have you been learning about today?\"\n\t\n\"I learned about ${tutortype},\" the boy replies sullenly, looking longingly towards the fallen toys. \n\n\"$!{tutortype}?\" his father turns towards you with a confused look. \n\n[i]Sigh.[/i]\n\n\"We were learning addition and subtraction sir.\"\n\n\"Ah! Good, good. Must learn your numbers boy if you're to help me in the store,\" Aristaeus booms, good humour restored. \n\n*page_break\n\nHe turns back towards the taller man, pushing him forward. \"This is Orestes, Theron's regular tutor. Quite recovered as you can see and very eager to start teaching again right away.\"\n\nOrestes shifts from foot to foot with a look of indigestion which tells a different story. You suspect he's been drafted into the lesson today, rather than being a willing volunteer. \n\n\"So Oedipus, I'm afraid I'm going to have to let you go sooner than we planned. With a letter of recommendation of course. Oh, and I almost forgot.\" He holds out a small bag, tied at the top with a draw string. It jingles as he hands it over. \"Here's the wages you're still owed.\"\n\n*set letter \"A letter of recommendation from Aristaeus.\"\n\n*page_break\n\n\"Right!\" He claps his hands in satisfaction, seeing everything in order. \"Now Oedipus, if you'd be so kind I'd appreciate it if you could move out by tomorrow.\"\n\nWell it was probably time for you to move on anyway, you've learned just about all you can in this town. You nod to the affirmative. \n\nAs you leave, you give Orestes a long-suffering smile which he returns. At least you don't have to finish the lesson.\n\n*achieve recommended\n \n*goto memoryend\n \n \n*label memoryend\n*page_break\n\nYou shake your head to clear it, thankful to be out in the sunshine with a purse full of coins rather than trapped in that stuffy room. Still, you'll have to travel onwards once more. After asking around the agora, it seems as if there's precious little work to be had for wandering tutors or guards at the moment.\n\nLooking around, you wonder if you should pick up some supplies before you leave at the town. Or perhaps you should save your money for later?\n\n*label market\n\nYou have ${coins} drachmas available to spend.\n\n*allow_reuse\n\n*choice\n\t*if (((herbal != \"yes\") and (health > 4)) and (coins > 2)) #You woke up feeling slightly under the weather this morning. Perhaps a visit to the healer to ensure your health is ok is in order. (Cost: 3 drachmas if they are able to assist you.) \n\t\t*goto gohealer\n\n\t*if (((herbal != \"yes\") and (coins > 2)) and (health \u003c 5)) #You've been feeling rather poorly. Visit the healer to see if they can help. (Cost: 3 drachmas if they are able to assist you.) \n\t\t*label gohealer\n\t\t\n\t\tYou make your way through the streets to the Asclepeion, a temple sacred to Asclepius the healer. The arched columns of worked limestone are easily visible, rising up above the surrounding buildings. As you get closer you notice a number of snakes in shades of brown and green, coiled on stones by the entrance. Hopefully they're not venomous.\n\t\n\t\t*set herbal \"yes\"\n\t\t\n\t\t*choice\n\t\t\t#I forgot snakes were sacred to Asclepius and don't really want to tiptoe through them. Leave. \n\t\t\t\t*set lovesnakes \"no\"\n\t\t\t\tNot wanting to risk a bite by disturbing the sleepy reptiles, you back away and return to the square. \n\t\t\t\t\n\t\t\t\t*goto market\n\t\t\t\n\t\t\t#I really do need to be healed. Step carefully through the sleeping reptiles. \n\t\t\t\t*set lovesnakes \"no\"\n\t\t\t\tCarefully you tiptoe through the snakes which appear to pay you little mind. Heart ticking a little faster than before, you manage to make it safely to the entrance. \n\t\t\t\t\n\t\t\t\t*goto healer\n\t\t\t\t\n\t\t\t\t\n\t\t\t#I love snakes! Pick one up as you enter the temple. \n\t\t\t\tReaching down, you scoop one of the reptiles up from a flagstone. It sluggishly flickers a tongue in your direction, before settling happily about your shoulders. Walking carefully so as not to disturb the other reptiles, you pick your way towards the entrance. \n\t\t\t\t*set lovesnakes \"yes\"\n\t\t\t\t\n\t\t\t\t*goto healer\n\t\t\t\t\n\n\t*selectable_if (extracloak = \"\") #You noticed a stall selling clothes in the main square. You could use an extra cloak since your own is getting threadbare. (Cost: 5 drachmas.)\n\t\t\n\t\tYou wander over to a busy stall presided over by a smiling woman with long golden hair twisted into elaborate curls. She tuts over your damaged clothing and directs you towards a number of warm woollen cloaks that may fit. \n\n\t\tOne is in black, sturdy and practical. The second is a deep purple and currently in fashion. A third in dark green is braided with golden thread. Not as durable as the other two, but it looks more expensive than it actually is. \n\t\t\n\t\t\"All are just five drachmas today! By all means have a look and see if there's something you like,\" she says brightly, before hurrying off to attend to another customer. \n\t\t\n\t\t*label buycloak\n\t\t\n\t\t*choice\n\t\t\t*selectable_if (coins > 4) #Buy the black cloak.\n\t\t\t\tYou run the material through your fingers, deciding the black cloak seems warm and practical. \n\t\t\t\t*set extracloak \"spare cloak.\"\n\t\t\t\t*set colourcloak \"black\"\n\t\t\t\t*set coins -5\n\t\t\t\n\t\t\t\tWaving the merchant over, you hand over the coins and take the cloak with you. \n\t\t\t\n\t\t\t\t*goto market\n\t\t\t\t\n\t\t\t*selectable_if (coins > 4) #Buy the purple cloak.\n\t\t\t\t[i]Perhaps not quite as warm as the black cloak,[/i] you muse silently feeling the woven cloth. [i]But the rich purple colour really is lovely and will stand you in good stead where you need to pass for someone of better standing.[/i]\n\t\t\t\t*set extracloak \"spare cloak.\"\n\t\t\t\t*set colourcloak \"purple\"\n\t\t\t\t*set coins -5\n\t\t\t\t\n\t\t\t\tWaving the merchant over, you hand over the coins and take the cloak with you. \n\t\t\t\t\t\t\t\n\t\t\t\t*goto market\n\t\t\t\t\n\t\t\t*selectable_if (coins > 4) #Buy the green cloak.\n\t\t\t\tThe cloth is not quite as durable at the other two, or as practical for the road. Still it'll be warmer than what you currently have and give a much better impression if you need to be hired for scholarly jobs. \n\t\t\t\t*set extracloak \"spare cloak.\"\n\t\t\t\t*set colourcloak \"green\"\t\t\n\t\t\t\t*set coins -5\n\t\t\t\t\n\t\t\t\tWaving the merchant over, you hand over the coins and take the cloak with you. \n\t\t\t\n\t\t\t\t*goto market\n\t\t\t\n\t\t\t*selectable_if (coins > 4) #The merchant looks distracted. Try stealing the black cloak by the end of the table. \n\t\t\t\tThe merchant is busy helping the customers that mill around her table. You could try slipping the clothing into your bag or under your old cloak if you're fast and stealthy enough about it. \n\t\t\t\t\n\t\t\t\tIf you fail though, she's bound to start yelling for the authorities meaning you'd have to leave town in a hurry. Worse, if you're caught it could mean a stay in prison with wooden blocks tied around your feet. Not to mention the damage something like this could do to your reputation which you rely on to obtain work.\n\t\t\t\t\n\t\t\t\tPerhaps it would be better to just buy the cloak. You can tell from the quality it is worth the five coins she's asking. If you're intent at trying your skill at sleight of hand, you may want to do this after you've gathered everything you need in the town. Just in case.\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#On second thoughts, it sounds too risky. Buy one of the merchant's cloaks for 5 drachmas.\n\t\t\t\t\t\tWhich cloak has caught your eye?\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto buycloak\n\t\t\t\t\t\t\n\t\t\t\t\t#Actually, this clothing isn't really to my taste anyway. Give up the idea and return to the main square.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto market\n\t\t\t\t\t\t\n\t\t\t\t\t#I've still got some business in town. I'll attend to that first and come back to the stall later. \n\n\t\t\t\t\t\t*goto market\n\t\t\t\t\t\t\n\t\t\t\t\t#Surely the merchant won't miss one? Try to take the cloak without paying.\n\t\t\t\t\t\t*set stealcloak \"yes\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tCasually you wander around the stall, holding up items of clothing as if to admire them and then placing them back on the table. When you're fairly sure the woman isn't looking, you quickly sneak the clothing under your arm, pulling the old dusty brown cloak over the top to cover it.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if (health \u003c 4)\n\t\t\t\t\t\t\tAt least that's what you try to do. Months of uncertain meals and rough living have taken its toll. Your movements are slower than you anticipated, and part of the bundled cloak falls out beneath your own. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tA woman browsing the range of colourful tunics looks your way. Eyes widening, she sets up a cry. \"Lonia look! Under his cloak! Stop, thief!\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tSprung, you take off through the agora, pushing your way through the crowds. You hear the marching boots of soldiers as the vendor yells for the authorities. Fortunately for you, the market square is crowded and your non-descript clothes allow you to blend in facilitating your escape. But now you need to leave town, and quickly. There are people who will recognise your face should the search continue, and you'll not be able to travel this way again for some time after this.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tQuickly you return to the inn, gathering up your belongings. You hurry away as quickly as you can without causing undue suspicion.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t*set extracloak \"spare cloak.\"\n\t\t\t\t\t\t\t*set colourcloak \"black\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto leavehealing\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t*if (health > 3)\n\t\t\t\t\t\t\tYour movements are quick and subtle, with no one seeming the wiser as they continue to browse the colourful clothing laid out on the tables. Best not linger though. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou stroll away as casually as you can, hoping that no one will connect your face to the missing cloak later.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*set extracloak \"spare cloak.\"\n\t\t\t\t\t\t\t*set colourcloak \"black\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto market\n\n\t\t\t\t\t\t*goto market\t\n\t\t\t\t\t\t\t\n\t\t\t\t\n\t\t\t#Decide against buying anything. \n\t\t\t\tAfter looking over her wares, you decide not to purchase anything after all and head back into the crowds.\n\t\t\t\t\n\t\t\t\t*goto market\n\t\t\t\t\n\n\n\t*selectable_if (visitmap = \"\") #Purchase a crudely drawn map of the surrounding area from a man selling miscellaneous items. (Cost: 4 drachmas.)\n\t\tYou amble over to a man as tall as he is wide, manning a store of odds and ends from countries far and wide. One item that particularly attracts your attention is a faded map, sketched out on a piece of parchment. \n\t\t\n\t\tIt is reasonably detailed, but only shows the surrounding area and towns. Also, its roughly drawn nature makes it clear that the map was not made by a master cartographer. In fact there's no way to be certain if it was drawn by a map maker at all. The information it contains may not be accurate. \n\t\t*set visitmap \"yes\"\n\t\t\n\t\t*choice\n\t\t\t*selectable_if (coins > 3 ) #Buy the map for 4 drachmas. It may be useful. \n\t\t\t\t*set coins -4\n\t\t\t\t*set map \"map\"\n\t\t\t\tYou pick up the map examining it closely. Although not professionally made, it's likely the best you'll find in the limited time available to you. Who knows if it may prove to be useful, but it pays to be prepared. \n\t\t\t\t\n\t\t\t\tThe merchant waddles over seeing your interest. \"Ho there, I see you're looking at one of my maps. I've travelled this area up and down, east and west; none know it like me. At just four drachmas, it's a bargain.\"\n\t\t\t\t\n\t\t\t\tYou're not convinced that the merchant isn't just telling you what you want to hear, but never the less hand over the coins. \n\t\t\t\t\n\t\t\t\tMap in hand, you return wander back into the crowds.\n\t\t\t\t\n\t\t\t\t*goto market\n\t\t\t\t\n\t\t\t#Try to haggle with the merchant, although if someone else shows an interest you may miss out altogether.\n\t\t\t\tThe map may or may not prove to be useful. Besides it's not even professionally made, four drachmas seems too much to pay.\n\n\t\t\t\tThe merchant waddles over seeing your interest. \"Ho there, I see you're looking at one of my maps. I've travelled this area up and down, east and west; none know it like me. At just four drachmas, it's a bargain.\"\n\t\t\t\n\t\t\t\tThe merchant drew the map? Interesting if true. Still it confirms your suspicion that a professional cartographer was not involved.\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t*selectable_if (coins > 2 ) #\"Three drachmas, that's fair. You can always draw a new one.\"\n\t\t\t\t\t\t\"Ah, but it takes much time young master, and the parchment is expensive,\" the merchant exclaims. \"Besides, you're paying for my knowledge as much as the materials. It's worth more than four drachmas I say. I just wanted to help out a traveller like yourself.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Three. That's my final offer.\" \n\t\t\t\t\t\t\n\t\t\t\t\t\tHe wails and wrings his hands, but seeing you will stand firm finally accedes and gives you the map for three coins. \n\t\t\t\t\t\t\n\t\t\t\t\t\tMap in hand, you wander back into the crowds.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*set coins -3\n\t\t\t\t\t\t*set map \"map\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto market\n\t\t\t\t\t\t\n\t\t\t\t\t#\"Two drachmas. You can't think to charge a professional cartographer's prices.\"\t\n\t\t\t\t\t\t\"Professional prices?!\" The merchant holds a hand over his heart as if in distress. \"My boy, this map is worth far more than four coins. I wanted to help a fellow traveller out, but two is far too low for something of this quality. I simply couldn't sell it for that.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tHis booming voice is attracting people, curious as to what is causing the disturbance. \n\t\t\t\t\t\t\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Stand your ground. \"Two drachmas, final offer.\"\n\t\t\t\t\t\t\t\t\"Ah, but it takes much time to make a map like this young master and the paper is expensive!\" the merchant exclaims. \"Besides, you're paying for my knowledge as much as the materials. It's more than worth the four drachmas I'm asking I say.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tAs you prepare to haggle further, a woman hurries over. \"Did I hear you have a map for sale? I'm traveling through to visit my sister and have gotten turned around once already. How much?\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"For you? Only four drachmas,\" the merchant beams. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tShe nods thinking. \"That sounds fair.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tAs she hands over the coins the merchant smiles triumphantly. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*fake_choice\t\n\t\t\t\t\t\t\t\t\t#\"Hey, I was going to buy that!\"\n\t\t\t\t\t\t\t\t\t\tThe woman hesitates uncertainly as she reaches to take the map from the seller's hands. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\"Nonsense. You were only offering me half what it was worth. The lady here knows quality when she sees it.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tHe pushes the map into her hands with a smile. Quickly she hurries away before you can try to change his mind.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t#Offer five drachmas.\n\t\t\t\t\t\t\t\t\t\t\"Wait!\" you call out as the merchant starts to hand the map over. \"I'll give you five coins for it.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tThe woman hesitates uncertainly as she reaches for the map still in the seller's hands. The merchant makes a face, obviously coming to a decision he wasn't completely happy with. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\"No when I say sold, it's sold. Here you go miss.\" He releases the map and she hurries away before he can change his mind. \t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t#Let it go. The map was probably no good anyway. \n\t\t\t\t\t\t\t\t\t\tYou shrug as the merchant pushes the map into the buyer's hands with a sunny grin. You'll manage to find your own way without it. Rotten thing would probably only lead you in circles anyway.\n\n\t\t\t\t\t\t\t\t\t#It's not worth making a scene over. The map is sold now. \n\t\t\t\t\t\t\t\t\t\tYou shrug as the merchant pushes the map into the buyer's hands with a sunny grin. Though you wish you had managed to get your hands on that map, you'll just have to find your own way without it.\n\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tEmpty handed, you wander back into the crowded square.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto market\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*selectable_if (coins > 2 ) #Try to bargain him down to three coins.\n\t\t\t\t\t\t\t\t\"Alright, I'll go as high as three. That's a fair offer don't you say?\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Ah, but it takes much time young master, and the paper is expensive,\" the merchant exclaims. \"Besides, you're paying for my knowledge as much as the materials. It's more than worth the four drachmas I'm asking I say.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Three,\" you say stubbornly, sensing the man is wavering. \"That's my final offer.\" \n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tHe wails and wrings his hands, but seeing you will stand firm, he finally agrees to sell you the map for three coins. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tMap in hand, you wander back into the crowds.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*set coins -3\n\t\t\t\t\t\t\t\t*set map \"map\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto market\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t#\"One drachma. Even I can see that it's not very well made.\"\n\t\t\t\t\t\t*set offendmap \"yes\"\n\t\t\t\t\t\tThe merchant snatches the map from your hands. \"Made this myself I did. A better map of this area you'll not find. But since you think so poorly of my skill, I'll thank you to take your business elsewhere.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tOffended the merchant steadfastly ignores your presence. With a sigh, you return to the main square. \n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto market\n\t\t\t\t\t\t\n\t\t\t#Decide against purchasing the map. \n\t\t\t\tThe map could be more trouble than it is worth if it could potentially lead you in the wrong direction. You leave it on the table and wander back into the crowds. \n\t\t\t\t\n\t\t\t\t*goto market\n\t\t\t\t\n\t\t\t\t\n\t\n\n\t*if (returntemple != \"yes\") #I have what I need. Leave the Agora. \n\t\n\t\t*goto leaveagora\n\t\t\n\t*if (returntemple = \"yes\") #I have everything I need. Return to the Asclepeion.\n\t\tThe shadows are long by the time you finish browsing the stalls at the market. Deciding you have everything you need for now, you return to the Asclepeion.\n\t\n\t\t*goto dreams\n\n\t\t\n\n \n \n*label healer\n*set herbal \"yes\"\nA healer dressed in white robes meets you at the doorway carved with snake curling around a staff. \n*if (lovesnakes = \"yes\")\n\tHe raises an eyebrow at the snake curled around your neck and chuckles softly. \"Most people do not find our scaly residents so appealing, though we only keep harmless ones in the centre. Be welcome in the temple of Asclepius. My name is Galen, do you seek healing?\"\n*if (lovesnakes != \"yes\")\t\n\tHe raises his hands in a welcoming gesture. \"Please do come in. All are welcome in the temple of Asclepius. My name is Galen, do you seek healing?\"\n\nAt your nod, he motions you inside. \n\n\"The first step is to determine your temperament in order to tailor our medicine. Each person's balance of humors is unique, with a predominance of one over the other four as I'm sure you well know. May I ask you some questions?\"\n\n*set temprementtxt \"Temperament:\"\n\n*choice\n\t#Answer Galen's questions. \n\t\t*goto galentest\n\t\n\t#Tell him you already know your temperament. \n\t\t\"Ah, well that will speed things up.\" He picks up a piece of parchment, recording your name and age. \"And your temperament?\"\n\t\t*allow_reuse\n\t\t\n\t\t\"My temperament is...\n\t\t*label temperament\n\t\t*choice\t\n\t\t\t#Sanguine, (blood). \n\t\t\t\t\"Ah I see, you're of the Air. Optimistic, social and light hearted. Probably an artist after my own heart as well. A little prone to gout though.\" You notice him eyeing your joints thoughtfully. \n\n\t\t\t\t*choice\n\t\t\t\t\t#\"Why yes actually, that does sound rather like me.\"\n\t\t\t\t\t\t\"Hmm interesting,\" Galen scribbles some notes on his scroll. \"Now tell me, why are you here?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*set temperament \"Sanguine (Air).\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t*goto explainills\n\t\t\t\t\t\n\t\t\t\t\t#\"On second thoughts I could be mistaken. I think it's actually...\"\n\t\t\t\t\t\t*goto temperament\n\t\t\t\t\n\n\t\t\t#Choleric (yellow bile). \n\t\t\t\t\"Ah I see, your element is Fire. Intelligent, bold and daring, though prone to anger. I'll bet you do not suffer fools gladly. Do you get headaches often?\"\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#\"Why yes actually, that does sound rather like me.\"\n\t\t\t\t\t\n\t\t\t\t\t\t\"Hmm interesting,\" Galen scribbles some notes on his scroll. \"Now tell me, why are you here?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*set temperament \"Choleric (Fire).\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto explainills\n\t\t\t\t\t\n\t\t\t\t\t#\"On second thoughts I could be mistaken. I think it's actually...\"\n\t\t\t\t\t\t*goto temperament\n\t\t\t\t\n\t\t\t\t\n\t\t\t#Melancholic (black bile). \n\t\t\t\t\"Ah I see, you're of the Earth. Realistic, analytical and dependable. Perhaps a little highly strung and inflexible at times though I suspect. Do you ever suffer from dizziness?\"\n\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#\"Why yes actually, that does sound rather like me.\"\n\t\t\t\t\t\n\t\t\t\t\t\t\"Hmm interesting,\" Galen scribbles some notes on his scroll. \"Now tell me, why are you here?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*set temperament \"Melancholic (Earth).\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto explainills\n\t\t\t\t\t\n\t\t\t\t\t#\"On second thoughts I could be mistaken. I think it's actually...\"\n\t\t\t\t\t\t*goto temperament\n\t\t\n\t\t\n\t\t\t#Phlegmatic (phlegm).\n\t\t\t\t\"Ah I see, your element is Water. Compassionate, patient, calm and generally good natured. Perhaps a little too passive at times though? Tell me, do you get colds often?\"\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#\"Why yes actually, that does sound rather like me.\"\n\t\t\t\t\t\n\t\t\t\t\t\t\"Hmm interesting,\" Galen scribbles some notes on his scroll. \"Now tell me, why are you here?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*set temperament \"Phlegmatic (Water).\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto explainills\n\t\t\t\t\t\n\t\t\t\t\t#\"On second thoughts I could be mistaken. I think it's actually...\"\n\t\t\t\t\t\t*goto temperament\n\n\n\n*label galentest\n\n\"Wonderful, well let's get started shall we?\" He picks up a piece of parchment, recording your name and age.\n\n\"First question, which would best describe your personality?\"\n\n*fake_choice\n\t#Compassionate, patient and good natured.\n\t\t*set water +1\n\t\t\n\t#Realistic, analytical and dependable.\n\t\t*set earth +1\n\t\t\n\t#Optimistic, social and light hearted.\n\t\t*set air +1\n\t\t\n\t#Intelligent, bold and daring.\n\t\t*set fire +1\n\t\t\n\t\t\nGalen scribbles a few notes. \"I see. And what would you say is your weakness?\"\t\t\n\n*fake_choice\n\t#\"I guess I can be short tempered at times.\"\n\t\t*set fire +1\n\t\t\n\t#\"Sometimes I can be a bit pessimistic.\"\n\t\t*set earth +1\n\t\t\n\t#\"There are times when it can be hard to get motivated.\"\n\t\t*set water +1\n\t\t\n\t#\"I'm not great with intricate details.\"\t\n\t\t*set air +1\n\t\t\n\"Uh huh. Now let me take a closer look at your face. It seems you have...\"\n\n*fake_choice\n\t#\"An oval shaped face, with eyes that are rather catlike in shape.\"\n\t\t*set air +1\n\t\t\n\t\t\"Almost there.\" He scribbles a few more notes. \"How about you tell me about your favourite foods?\"\n\t\t\n\t#\"Sharp angular features and high cheekbones. And my, I have to say you have the most brilliant, penetrating eyes.\" \n\t\t*set fire +1\n\t\t\n\t\t\"Almost there.\" He scribbles a few more notes. \"How about you tell me about your favourite foods?\"\n\t\t\n\t#\"Soft rounded features, with large eyes and long eyelashes.\"\n\t\t*set water +1\n\t\n\t\t\"Almost there.\" He scribbles a few more notes. \"How about you tell me about your favourite foods?\"\n\n\t\n\t#\"A squarish face, with prominent cheekbones and hollowed cheeks.\"\n\t\t*set earth +1\n\t\t\n\t\t\"Almost there.\" He scribbles a few more notes. \"How about you tell me about your favourite foods?\"\n\t\t\n\t#\"Ah, are you trying to describe me? Because you're not doing so well.\"\n\t\tGalen gives you a look that says he feels his description was perfectly accurate but lets the matter drop. \n\t\t\n\t\tHe clears his throat roughly. \"Well no matter, how about you tell me about your favourite foods?\"\n\n*fake_choice\n\t#\"I love foods that are salty or spicy.\"\n\t\t*set fire +1\n\t\t\n\t#\"Rich gourmet foods are the best.\"\n\t\t*set air +1\n\t\t\n\t#\"I've definitely got a sweet tooth.\"\n\t\t*set water +1\n\t\t\n\t#\"Anything that doesn't upset my stomach. It's rather sensitive.\"\n\t\t*set earth +1\n\t\t\nThe healer notes down your response. \"Final question, would you say you suffer from any of these issues frequently?\"\n\n*fake_choice\n\t#\"Fevers, headaches or sore eyes?\"\n\t\t*set fire +1\n\t\t\n\t\t\"Hmm. Very interesting, perhaps we should do something about that,\" Galen reflects. \"Give me a moment while I determine your type.\"\n\t\t\n\t\t\n\t#\"Skin problems? Or do you tend to bruise easily?\"\t\n\t\t*set air +1\n\n\t\t\"Hmm. Very interesting, perhaps we should do something about that,\" Galen reflects. \"Give me a moment while I determine your type.\"\n\t\t\n\t#\"Cold hands and feet? Or perhaps a chronic cough.\" \n\t\t*set water +1\n\t\t\n\t\t\"Hmm. Very interesting, perhaps we should do something about that,\" Galen reflects. \"Give me a moment while I determine your type.\"\n\t\t\n\t\t\n\t#\"Dizziness, ringing in the ears or anxiety?\"\n\t\t*set earth +1\n\t\t\t\n\t\t\"Hmm. Very interesting, perhaps we should do something about that,\" Galen reflects. \"Give me a moment while I determine your type.\"\n\t\t\n\t#No, none of those things. \n\t\t\"Hmm. Well you're one very lucky person. Most people have at least one of those,\" Galen reflects. \"Why are you here again?... Actually, we'll come to that, first let me determine your type.\"\n\n\n*if (((earth >= water) and (earth >= air)) and (earth >= fire))\n\t*set temperament \"Melancholic (Earth).\"\n\t*set temprementonly \"Melancholic\"\n\t*set element \"earth\"\n\t\n\n*if (((water > earth) and (water >= air)) and (water >= fire))\t\n\t*set temperament \"Phlegmatic (Water).\"\n\t*set temprementonly \"Phlegmatic\"\n\t*set element \"water\"\n\t\n\t\n\t\n*if (((air > water) and (air > earth)) and (air > fire))\n\t*set temperament \"Sanguine (Air).\"\n\t*set temprementonly \"Sanguine\"\n\t*set element \"air\"\n\n\t\n\t\n*if (((fire > water) and (fire > air)) and (fire > earth))\n\t*set temperament \"Choleric (Fire).\"\n\t*set temprementonly \"Choleric\"\n\t*set element \"fire\"\n\t\n\t \n\t\nThe healer mulls over your answers, consulting a scroll with various diagrams. \"It's clear to me that you are ${temprementonly} in nature.\"\n\nHe points to an annotated sketch of a person with the symbol of ${element} drawn above their head. \"Although everyone has a unique composition of humors which can affect your nature,\n*if (element = \"water\" )\n\twater types are known for their compassion, patience and calm good natures.\"\t\n*if (element = \"fire\" )\n\tfire types tend to be intelligent, bold and daring, although with quicksilver tempers.\"\n*if (element = \"air\" )\n\tair types tend towards optimism, romance and a light-hearted outlook on life.\" \n*if (element = \"earth\" )\n\tearth types are known for being dependable, realistic and rather analytical. Perhaps a little inflexible at times, you do mirror the immovable strength of the ground on which we stand after all.\" \n\t\t\n\n*fake_choice\n\t#\"Yes, that does sound a lot like me.\"\n\t\tHe nods in satisfaction continuing.\n\t\t\n\t#\"I'm not certain that really describes me accurately.\"\n\t\n\t\t\"No? \"Well as I said, each humor will interact with the others, so no two people are [i]exactly[/i] the same,\" he replies slightly defensive.\n\t\n\t#\"That sounds nothing like me. Are you sure you worked it out correctly?\"\n\t\t\n\t\t\"Well as I said, each humor will interact with the others, so not everyone will be [i]exactly[/i] textbook,\" he replies defensively.\n\n\"As you can see here and here.\"\n*if (element = \"water\" )\n\tHe points to the face and chest on the scroll. \"You should take care as you'll likely be prone to congestion and coughing, particularly if your water humor is allowed to increase to the point that it drowns out your fire aspect. \n*if (element = \"fire\" )\n\tHe points to the eyes and the side of the head on the scroll. \"You should take care as you'll likely be prone to an excess of fire humor leading to fevers, rashes and other inflammatory conditions. Headaches and red sore eyes are another common complaint. It comes from excessive amounts of heat, when fire outweighs water in your body.  \n*if (element = \"air\" )\n\tHe indicates several joints on the scroll. \"You should take care as you'll likely be prone to conditions like gout, bruising and skin conditions, particularly if your air humor is allowed to overwhelm your earth aspect. \t\n*if (element = \"earth\" )\n\tHe points to the stomach and then taps an ankle joint on the scroll. \"You should take care as you'll likely be prone to stomach upsets and colic, as well as stiffening joints as you get older. If you allow your earth aspect to outweigh your air, you'll also risk spells of dizziness and anxiety. \t\nBut tell me, it that why you've come to see me today? Or can I help you with something else?\"\n\t\t\n*fake_choice\n\t#Try to look convinced, but you're still not completely certain about all this medical stuff. \n\t\tYou try to keep the uncertainty from your voice as Galen asks you to explain your symptoms. The healer nods sagely when you finish.\n\t\n\t#Withhold your judgement for now. Let's see how you feel later.\n\t\tIt all sounds a bit hard to believe that someone like Galen could actually predict what illnesses you might be prone to, but he is a healer of Asclepius so perhaps you should give him a chance to see his skills at work. \n\t\t\n\t\tCarefully, you explain your symptoms while he nods sagely.\n\t\n\t#The wonders of modern medicine! And to think people used to think all ills were caused by evil spirits.\n\t\tMedicine really has come a long way and Galen really seems to know what he's talking about. You explain your symptoms while he nods sagely.\n\t\n*goto explainills2\n\n\t\n\t\n*label explainills\n\t\nYou explain your symptoms while he nods sagely. \n\n*goto explainills2\n\n*label explainills2\n*if (health > 4)\n\t\"I'm afraid I do not believe we can be of much help. Your humors appear to be well balanced at present, the picture of health. Although perhaps, something has been weighing on your mind?\"\n\t\n\t*choice\n\t\t#\"Perhaps, but it is something I need to deal with myself.\"\n\t\t\tGalen offers you a cup of chamomile tea in the courtyard open to the sun, recommending rest and reflection lest your mindset start to affect the rest of your body. The tea is refreshing, however staying in the town to rest is not an option for you right at the moment. Bidding the healer farewell, you travel back to the marketplace.\n\n\t\t\t*goto market\n\t\t\t\n\t\t#\"Actually, there is. But I don't know if you can help.\"\n\t\t\tGalen looks thoughtful. \"Perhaps there would be some merit in investigating further. Follow me.\"\n\t\t\t\n\t\t\t*goto healmind\n\t\t\t\n*if (health \u003c 5)  \n\t\n\t\"I do believe your humours are out of balance my boy, and definitely recommend you should stay for healing. Left untreated the balance will only worsen, causing your health to suffer further.\" \n\t\n\t*label healmind\n\t\n\t*if (lovesnakes = \"yes\")\n\t\tAsking you to put the snake down, (now that your eyes have adjusted to the gloom, you see the room is crawling with them,) he leads you deeper into the complex. \n\t*if (lovesnakes != \"yes\")\n\t\tWarily you follow your guide deeper into the complex, watching where you place your feet. Now that your eyes have adjusted to the gloom, you realise there are snakes crawling unchecked throughout the temple.\n\t\n\tThe hall opens up into a sunny courtyard, a small spring bubbling up amid the planted garden. Offering you a cup of water drawn from the pool, he bids you to drink for its healing properties. As you gulp down the metallic tasting water, Galen explains his recommendations. \n\n\t\"I believe that it would be best for you to rest here for the night. Dreams can often tell us much about the processes which ail you. From this we can devise the best treatment.\"\n\t\n\t*choice\n\t\t#Accept his offer of healing. \n\t\t\t*set coins -3\n\t\t\tGalen leads you to a dormitory of sorts, with beds arranged against the wall. Fresh air blows through the room, which seems blessedly free of the sick at present. With other patients to attend to, the healer bids you farewell assuring you that he will hear your dreams on the morrow. \n\t\t\t\n\t\t\tThere is still some daylight left should you wish to return to the agora for supplies. Otherwise you can fill in some time at the temple and retire for an early night.\n\n\t\t\t*choice\n\t\t\t\t#I have everything I need for now. Stay at the temple. \n\t\t\t\t\tYou spend a peaceful afternoon listening to the bubbling of the spring; the tranquillity of the temple is calming to your nerves. As the sun sets, you return to the dormitory to rest. Although the bed is rather hard, consisting of leather stretched between a wooden frame; sleep comes quickly.\n\t\t\t\t\t\t\n\t\t\t\t\t*goto dreams\n\t\t\t\t\t\n\t\t\t\t#Return to the agora, there's still some items I wish to look at. \n\t\t\t\t\n\t\t\t\t\t*set returntemple \"yes\"\n\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tLeaving the temple, you head back to the agora.\n\t\t\t\t\t\n\t\t\t\t\t*goto market\n\t\t\t\n\t\t\t\n\t\t\t\n\t\t\t\n\t\t\n\t\t#Decline. You don't want to stay at the temple for that long. \n\t\t\tAs politely as you can you excuse yourself, telling the healer that you were hoping to reach the next settlement tonight. \n\t\t\t\n\t\t\t*if (health >2)\n\t\t\t\tGalen nods understanding. \"While I wish you would reconsider, you are not so sick as for it to be unsafe for you to complete your journey. I bid you to seek out a healer as soon as you are able however. Left unchecked, imbalances in the humours can result in illness that not even we can reliably cure.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\n\t\t\t\t\n\t\t\t*if (health \u003c 3)\n\t\t\t\t\"I do not think you understand the seriousness of your condition,\" Galen protests. \"But if you will not stay, I bid you to seek healing as soon as you are able.\"\n\t\n\t\t\tLeaving the temple, you head back to the agora.\n\t\t\t\n\t\t\t*goto market\n\t\t\t\n\t\t\t\n\t\t\t\n\n*label dreams\t\t\t\n\t\t\t\nThat night your dreams are dark and vivid. You run, chased by an unseen force as powerful as the mountains, yet as fast as the wind. It whispers in your mind: \n\n[i]\"One does not escape the fate laid out for them Oedipus. It is coming for you.\"[/i]\n\nYou wake with a scream, shaking and covered in sweat. Sunlight streams through the windows, the morning well underway. \n\n\"It was just a dream,\" you mutter, trying to reassure yourself. But in this place dedicated to Apollo's son, you find the words hollow. \n\n*achieve healingdream\n\n*page_break\n\nGalen raps on the open door, letting himself into the room quietly. \"Ah you're awake. I thought I should let you sleep, you appeared to need it. By your scream, it seems your dreams have not been as peaceful as I'd hoped however. Would you like to tell me of them? I will interpret them for you if I'm able.\"\n\n*fake_choice\n\t#Tell Galen what you saw. Perhaps he can help. \n\t\tThe healer comes to sit on the end of your bed as you begin to describe your nightmare. Once you start it is difficult to stop, and the details come tumbling out. As you finish, he sits in silence, head bowed. \n\t\t\n\t\t\"I think me this is a message from the gods themselves, and not something I can circumvent myself. Heavy matters weigh on your heart and mind. I do not envy you.\"\n\n\t\tAs your face falls, he continues. \"Never the less, this is the temple of Asclepius. We can appeal to his good graces. And of your physical ills I can certainly be of assistance.\"\n\t\t\n\t\t*page_break\n\t\t\n\t\tYou find yourself undergoing a cleansing ceremony in a pool that is fed from the spring you saw yesterday, the air scented with sweet fragrances. Before you leave, Galen hands you a cup of a bitter tasting herbal mixture which you struggle to keep down. Once your stomach ceases its roiling, you admit that you do actually feel significantly improved.\n\t\t\n\n\t\t*set health +2\n\t\n\t#Refuse. You can already guess what the dream means.\n\t\tThe dream seems highly personal, and you suspect that it was sent to you as a reminder of the Pythia's words and your own attempt to outrun your fate. \n\t\t\n\t\tGalen accepts your refusal with a simple nod. \"Some dreams in this place are sent by the gods themselves. If you feel they are for you alone, keep your council close.\"\n\t\t\n\t\t*page_break\n\t\t\n\t\tYou undergo a rather uncomfortable soak in a mud bath, followed by a cleanse in water so frigid that you fear you will swap one illness for another by the ceremony's end. Finally, Galen hands you a cup of a bitter tasting herbal mixture which you struggle to keep down. Once your stomach ceases its roiling, you admit that you do actually feel significantly improved.\n\t\t\n\t\t*set health +1\n\t\t\nYou pay a donation to the temple for their assistance, thanking Galen for his help. With the sun already well overhead, you pick up your satchel and start down the road once more. \n\n\n\n*goto leavehealing\n\t\n\t\n\t\n*label leaveagora\n\t\t\nWith plenty of daylight left, the directions you've been given seem to indicate that you could arrive in the next settlement before dark if you hurry. Picking up your satchel, you start down road once more. \n\n*label leavehealing\n\nAlthough relatively well maintained, after leaving the town the number of people you see on the trail drops sharply. Dark clouds gather overhead, and you worry that you'll be caught out in the rain once more if you don't hurry. \n\nThe road inclines upwards, moving into the hills. The path narrows and winds as the mountain towers high above to your left, while the valley drops steeply away to your right. Over the sound of the wind, you catch the ringing sound of hooves on stone coming fast up the trail. With this section of road as narrow as it is, they could easily run you over.\n\n*goto_scene part4chariot\t\n\n\t\n\t\t", "part4chariot": "\n\n*fake_choice\n\t#Call out a warning to let them know you're there. \n\t\t*set roadblock \"call\"\n\t\tYou call out a warning, but the wind blows your voice away.   \n\t\n\t#Try to flatten yourself against the rock face. \n\t\t*set roadblock \"flat\"\n\t\tYou remove your satchel, standing as close to the edge of the path as you can.\n\t\n\t#Draw your sword. You'll teach people to drive like that.\n\t\t*set roadblock \"sword\"\n\t\tYou move to the side of the road, unsheathing your sword. If they don't slow down, you'll give them a good scare they won't soon forget.\n\t\nThe sound of galloping hooves comes louder. What are they thinking driving that recklessly along a trail like this? It could easily mean their death... or yours.\n\nA chariot gilt in gold, rounds the bend pulled by a midnight black horse flecked in sweat. At your unexpected appearance the horse squeals, shying sideways as his feet scrabble at the precipice. Lunging back towards safety, the chariot overturns, breaking the harness and sending its occupant tumbling. The horse rolls his eyes wildly in fear, snorting and kicking out at his bonds. With a sharp snap, the last of the leather straps binding him to the chariot breaks and he bolts away towards the town.\n\n*page_break\n\nThe driver picks himself up from the ground, fine clothes rent and bloodied from the fall. He throws a dented helm to the ground in fury revealing a bruised and bleeding face twisted in fury. \"Why you stupid  [i]peasant![/i]\n*if (roadblock != \"sword\")\n\tHow dare you block the road!\"\n\n\tHe retrieves a fallen spear and lifts it high, clearly planning on beating you with the haft in retribution.\n\n\t*if (roadblock = \"flat\")\n\t\t\"Hey, I wasn't blocking the road!\" you exclaim. \"I was as far off it as I could manage. You're the one who was driving recklessly. If anyone's to blame, it's you.\"\n\t\t\n\t*if (roadblock != \"flat\")\n\t\t\"I tried to let you know I was here!\" you protest. \"It's not my fault you were driving so recklessly that you couldn't hear me. If anyone's to blame, it's you.\"\t\n*if (roadblock = \"sword\")\n\tHow dare you think to threaten me!\"\n\n\tHe retrieves a fallen spear and lifts it high, clearly planning on putting it through your ribs if he can.\n\t\n\t\"I was simply defending myself,\" you snap back. \"You would have run me clean over!\"\n\t\nThe driver ignores your response, launching himself at you with a roar. As he flies towards you with his spear swinging, you lift your own weapon to meet it. The impact of your blade on the wooden haft jars your arm, but the spear holds, remaining unbroken. \n\t\t\nYour attacker backs away, red faced with anger. He wipes at the blood that drips into his eyes and stains his thick brown beard scarlet. With a yell, he attacks again. This time he means to finish you off.\n\n*comment trial end at this choice\n\t\n*choice\n\t#Defend yourself, trying only to make him back off. \n\t\t*gosub trial_end\n\t\t*set chariotdriver \"defend\"\n\t\tYou parry the blows with your sword, your opponent clearly skilled with his weapon. You're hoping to wear him down enough to see sense. By his clothes you'd guess that he's someone influential. Trying to explain a dead noble to the authorities is not something you'd relish in your current position. \n\t\t\n\t\tWeapons move in a blur as you continue the deadly dance,\n\t\t*if (health \u003c 5)\n\t\t\tthe onslaught causing your battered muscles to scream.\n\t\t*if (health > 4)\n\t\t\tthankful that you were in good health as your muscles scream with the effort. \n\t\tThis is no ordinary ruffian such as you'd meet guarding caravans. If you make even the smallest mistake, you'll likely pay with your life. \n\t\t\t\n\t\tSeeing an opening you strike, hitting the spear from his hands. The impact knocks your opponent backwards. Off balance, he teeters from a moment at the edge of the precipice, then stumbles backwards over the trail in a shower of gravel to the valley below. \n\t\t\t\n\t\tRisking a look over the edge, the man lies broken on the rocks; his neck at an impossible angle.\n\t\t\n\t\t*label fallenopponent\n\t\t\n\t\tYou hadn't meant to send the man to his death, but rationalise that if you hadn't defended yourself, he surely would have had no scruples about ending your life instead. \n\t\t\t\t\n\t\tGathering your fallen possessions, you hurry away from the area. With any luck, no one will link his fall to your own departure from Eleusis. \n\t\t\t\t\n\t\t\n\t\t*goto trailsplit\n\t\t\t\n\t#Attack straight back. If he wants a fight, I'll give him one. \n\t\t*gosub trial_end\n\t\tYou parry the blows with your sword while searching for a weakness, your opponent clearly skilled with his spear.\n\n\t\tWeapons move in a blur as you continue the deadly dance,\n\t\t*if (health \u003c 5)\n\t\t\tthe onslaught causing your battered muscles to scream.\n\t\t*if (health > 4)\n\t\t\tthankful that you were in good health as your muscles scream with the effort. \n\t\tThis is no ordinary ruffian such as you'd meet guarding caravans. If you make even the smallest mistake, you'll likely pay with your life. You need to find an opening, and soon. \n\n\t\tYour attacker lunges in again, spear aimed at your heart. Leaping to the side, you brush it away knocking the man off balance. If you're fast enough, you might be able to end this fight before he recovers. \n\t\t\n\t\t*choice\n\t\t\t#Disarm him. \n\t\t\t\t*set chariotdriver \"defend\"\n\t\t\t\tAs quick as a snake, you kick out at his spear, sending it flying from his hands. The impact pushes him backwards where he teeters at the edge of the precipice. For a moment you think he'll regain his balance, but then the edge of the path crumbles, sending him down into the valley in a shower of rocks. \n\t\t\t\t\n\t\t\t\tRisking a look over the edge, the you find him draped motionless over the rocks far below; his neck turned at an impossible angle.\n\t\t\t\n\t\t\t\t*goto fallenopponent\n\t\t\t\t\n\t\t\t\n\t\t\t#Kill him. \n\t\t\t\t*set chariotdriver \"kill\"\n\t\t\t\tStriking with all the strength you possess, you lunge towards your attacker, slipping in under his guard. The sword slides home into his chest and he collapses to the ground with lifeless eyes. \n\t\t\t\t\n\t\t\t\tRetrieving your weapon, you carefully wipe it clean on the man's richly brocaded purple clothing. A quick search fails to reveal his identity although it's clear he's someone of importance. \n\t\t\t\t\n\t\t\t\tWith no witnesses, it seems best to leave the area as quickly as possible. You may find his death difficult to explain to the authorities if you are found with his body. \n\t\t\t\t\n\t\t\t\t*fake_choice\n\t\t\t\t\t#Leave the body on the trail. Even he deserves to be found quickly for a proper burial. \n\t\t\t\t\t\t*set chariotburial \"path\"\n\t\t\t\t\t\tLeaving the body alongside the overturned chariot, you gather up your possessions and quickly leave the area. With any luck, no one will link his death to your own departure from Eleusis.\n\t\t\t\t\t\n\t\t\t\t\t#Roll him over the edge of the precipice. The longer it takes for him to be found, the less likely anyone will link his death to you. \n\t\t\t\t\t\tCarefully so as to not get any of his blood on your own clothing, you drag him to the edge of the trail and let him fall to the rocks far below. \n\t\t\t\t\t\t\n\t\t\t\t\t\tQuickly gathering up your fallen possessions, you leave the area. With any luck, no one will link his fall to your own departure from Eleusis.\n\t\t\t\t\t\t\n\t\t\t\t*goto trailsplit\n\n\t\t\t\t\n\n\n*label trailsplit\n\n*page_break\n\n\nOn the road ahead the trail splits. You curse looking upwards at the rolling grey clouds. No one told you about this intersection and you're fairly sure you haven't taken a wrong turn, though the fight earlier has left you distracted. You search for a marker but it seems to be missing; if there ever was one at all. \n\nThe twisting trail you've been travelling has wound into a cleft in the rocks making it difficult to see far ahead. All that you can tell from where you're standing is that the trail to the left appears to continue along the spur, while the one to the right winds downwards towards the faint sound of running water. Although you know that to reach your destination you need to leave the mountain heights and travel down to the river; you'd thought you still had some way to go. On the other hand, the maze of rocks is disorientating, perhaps you're mistaken. \n\nThunder grumbles overhead and the sun is already slipping towards the horizon, the temperature dropping with its passing. There's no time to scout the paths, you need to pick one and hope for the best. \n\n\n*choice\n\t#Take the path to the left. It seems better travelled. \n\t\tYou hesitate at the intersection before turning left. Best to trust your instincts and stay on the wider path.\n\t\t\n\t\t*goto leftpath\n\t\t\n\t#Take the path to the left. You're fairly certain that you shouldn't have arrived at the turn off yet.\n\t\tYou hesitate only briefly at the intersection before turning left. Hopefully your sense of direction will not steer you wrong now.\n\t\t\n\t\t*goto leftpath\n\t\n\t#Take the path to the right. If you miss the correct turn off, you could get stuck on the frigid mountain top overnight. Not something that would be pleasant, or good for your health.\n\t\tYou hesitate at the intersection before turning right. After all, you have to leave the mountains sooner or later and know the town you're heading for is near a river.\n\t\t\n\t\t*goto rightpath\n\t\t\n\t#Take the path to the right. I always take the path less travelled. \n\t\tAfter all, what's the point of traveling, if not to find interesting things to satisfy your taste for adventure. You're far more likely to find that on the valley path compared to the better travelled road continuing through the mountains. \n\t\n\t\t*goto rightpath\n\t\t\n\t*selectable_if (map != \"\") #Consult the map you bought at the agora.\n\t\tReaching into your satchel, you carefully draw out the piece of parchment. From the crudely sketched lines that mark out roads, settlements and hills, you pinpoint your probable location on the map. \n\t\t\n\t\tTracing your finger along the lines, you see that both paths do in fact appear to meet up a few miles down the road. Perhaps this is why no one bothered to mention which road to take. The trail to the right, is drawn as a squiggle down into the valley and then through an area marked with...grass? marshland? You curse the lack of a key. If it's grass, it should be easy to transverse, but if it turns out to be marshland? After all the rain, the trail may not even be passable. You wonder if it's worth the risk.\n\n\t\tThe path to the left is marked in a straighter, broad stroke which you guess is likely to indicate a better maintained route. It's likely to be faster if this is the case even though the distance to travel seems longer. \n\n\t\tThe question is, do you trust the accuracy of the trader who drew this map?\n\t\t\n\t\t*choice\n\t\t\t#Take the left-hand path along the ridge, it looks like the better route... you hope.\n\t\t\t\tPacking the map back into your bag, you set off along the path that curves to the left hoping for the best.\n\t\t\t\t\n\t\t\t\t*goto leftpath\n\t\t\t\t\n\t\t\t#Take the right-hand path, it looks shorter. The squiggly lines and grasses are probably just for artistic effect anyway.\n\t\t\t\tIt's clear that the merchant was no cartographer. You even notice a few swirls drawn in the river which you highly doubt is large enough to have boat eating whirlpools. Who knows what else has been drawn into the map because it looks pretty? Packing the map away, you head down the path to the right and towards the valley.\n\t\t\t\n\t\t\t\t*goto rightpath\n\t\t\t\n\t\t\t#This map is almost useless. Take the right-hand path and hope for fields instead of marshland.\n\t\t\t\tYou grumble at the money wasted on buying the map. Without a key and with distances seemingly drawn in arbitrarily, the thing really is less than useless. Shoving the parchment back into your bag, you head down the path to the right and towards the valley.\n\t\t\t \n\t\t\t\t*goto rightpath\n\t\t\t\n\t\t\t\n*label leftpath\nThe path is wide and smooth, obviously kept well maintained for pedestrians and drivers though you see no one at this late hour. Making good time, the trail winds along the mountain top while the temperature continues to drop sharply as dusk approaches. Finally, it slopes to the right, heading downward towards the valley. You hurry towards the town, which is bright with lamp light spilling from the dwellings. \n\t\nFinding an inn with a spare room, you gratefully curl up by the fireplace while heavy drops of rain patter on the terracotta roof tiles outside. \n\n*goto_scene part5guard\n\n*label rightpath\nThe path is clear enough, but narrows as you follow it towards the valley floor. Barren rocks are replaced by trees and shrubs as the trail approaches the river, its murky brown waters running high and threatening to break the banks. \n\t\nHurrying along, the temperature starts to drop sharply as the sun sinks low in the horizon, throwing the valley into shadow. \n*if (extracloak != \"\") \n\tYou pull the extra cloak from your bag and wrap it tightly around your body, glad of the extra warmth. \n*if (extracloak = \"\")\t\n\tYou pull your threadbare cloak around your shoulders tightly shivering with cold. Hopefully your destination isn't too far ahead. \n\nThe road is not well kept, the trail soft and marred with ruts from wheels and erosion. You find your progress slowed as you have to watch where you walk so as not to turn an ankle on the uneven ground. \n\nThe final straw comes when the path dips down into a low hollow where your feet sink into deep squelching mud. If the river had been any higher, the road would not have been passable at all! This trail is obviously designed to be used in the driest of summer months.\n\n*if (map != \"\")\n\t\"It had to be swampland, not nice grassy fields didn't it?\" you grumble darkly as you slog through the thick, sticky mud; ever conscious of the deepening twilight. \n*if (map = \"\")\t\t\n\tYou grumble darkly about your unfortunate choice at the crossroads, while slogging through the deep, sticky mud; ever conscious of the deepening twilight.\n\n*page_break\n\t\n*if (extracloak = \"\")\t\n\tNight has fallen by the time you leave the swamp, cold wet and tired. Your shivering becomes worse as the cold seeps into your bones. Rain begins to fall in slow heavy drops at the lights of your destination come into view over the rise.\n\t*set health -1\n*if (extracloak != \"\")\n\tNight has fallen by the time you leave the swamp. Although cold, wet and tired by the time the lights of your destination come into view; the worst of the chill is held at bay by the \n\t*if (colourcloak = \"black\")\n\t\tthick, dark \n\t*if (colourcloak = \"purple\")\n\t\twarm purple \n\t*if (colourcloak = \"green\")\t\n\t\tgold brocaded\n\tcloak wrapped around your shoulders. \t\n \nWearily you stumble into an inn, glad that they have a room free in which you can stay the night. The innkeeper exclaims over your sodden, dirty clothing, shaking his head that the neighbouring town had not warned you against the valley path given the recent rain.\nHe bundles you into a room that carries a musty smell, but at least is blessedly dry.\n\n*goto_scene part5guard\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first three chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n\t*subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2022-02-23 $4.99 $2.99 purchased\n*abort\n\n", "part5blearnsphinx": "\n*page_break\n\n*text_image ch3oedipus.png center The Riddles of the Sphinx\n\n\n\nDiscreetly you wander about the agora, listening for overheard scraps of information that may give you a lead in your search, or at least suggest possible employment. Not that you're in a rush after the job you'd taken guarding the grain caravan, but you'd learned to seek work whenever the opportunity arose. \n\nThe market place seems positively abuzz with rumour and gossip today, although not with the kind you were hoping for. The talk is of something far more exotic. You sidle in closer to eavesdrop.\n\n\"Those poor people in Thebes. It seems the land really must be cursed to be afflicted with such a monster,\" a baker carrying a pail of milk exclaims, running fingers through her long brown hair. \"Most people are no longer making it in or out, with some sort of fearsome creature killing any it fancies.\" \n\n*page_break\n\n\"That can't be true,\" a roughly shaven horse trader wearing a patched tunic weighs in. \"I heard that the King of Thebes had travelled to Delphi and was told to look for a warrior to slay the monster. Surely it is dead by now.\"  \n\n\"Alas, none have returned,\" the woman sighs. \"Many people seek to claim the rewards promised, but  money does you no good if you end up in the belly of the beast instead.\"\n\n\"What creature is this?\" A perfumed spice merchant in a dark red tunic pitches his voice to be heard over the noise of the crowd. \"I heard that Thebes is desperate for food since their crops failed. I was considering trying my luck. Should be good trading.\"\n\n\"Then you're a fool,\" a soldier in scuffed armour snaps. \"The crops didn't fail, the Sphinx destroyed them. Mitros says he's seen the creature himself flying over the mountain pass while tending his goats. I for one believe him. The Sphinx is a daughter of Orthus you know. Anyone who is not favoured by the gods themselves, is unlikely to live to see the dawn should they meet her.\" \n\n*page_break\n\n*set jocasta \"yes\"\n*set laius \"yes\"\n\n\nThe group falls into an uneasy silence. \n\n\"What of the King of Thebes?\" the baker finally speaks up. \"Rumour has it that he's dead. That Queen Jocasta has even become desperate enough to offer her hand in marriage to the one that rids her country of the beast.\"\n\n\"'Tis true,\" the soldier replies sadly. \"I heard it from my cousin who was there when they brought his body into town. Murdered they said. These are ill-omened times indeed, when a king can be killed while seeking help for his people.\"\n\n\"Murdered?\" the merchant speaks up. \"I heard it was an accident.\"\n\n\"No definitely murdered,\" the baker chimes in. \"Though I heard it was the Sphinx who did the deed.\"\n\nThe conversation trails off as the four shake their heads with exclamations of worry and dismay, before the going about their afternoon business. \n\n*page_break\n\n[i]A Sphinx,[/i] you muse silently. [i]If true, it is truly an ill omen for Thebes indeed. [/i]\n\nFrom what little you know of her, she's a daughter of Orthus and... who was it? Echidna perhaps? You can't quite recall. Shaking your head, you dismiss it as ultimately being unimportant to the problem at hand. Anyway, as the child of one of the divine, it seems unlikely she has chosen to haunt this area by chance. Perhaps there really is some truth to the gossip and Thebes is under a curse. After all, it sounds as if King Laius may have met an untimely death himself. \n\n*fake_choice\n\t#Perhaps this is the chance you've been waiting for. Surely if you could free Thebes, you can gain the power to change your fate. \n\t\tIn the legends, heroes often seemed to make fate conform to their wishes by performing great deeds. Perhaps you can do so as well?\n\t\t\n\t#If people are dying like the rumours say, you feel as if you should help.\n\t\tAllowing people to suffer has never sat well with you before, and you're not going to start turning a blind eye now. You'll head up into the mountains and see what you can do about freeing the people of Thebes from the Sphinx that has been terrorizing them, regardless of the risks involved.\n\t\t\n\t#The thought of ruling Thebes as King has its appeal. Particularly since it seems unlikely you will ever be able to safely return to Corinth as the rightful heir.\n\t\tYou admit that you miss your old life, the long road having never carried the same appeal. Thebes is a powerful city that needs a ruler to match. You could take that place. \n\t\t\n\t#You're skilled with a blade, why not take on the Sphinx? You're better able to protect yourself than the peasants she's been feasting on. More than likely better than those so-called heroes sent to challenge her as well. \n\t\tThe way you see it, there is nothing to indicate that the Sphinx would not be vulnerable to a blade. In fact, you're surprised no one has managed to rid the land of this monster yet. \n\t\t\n\t\tNever mind, you plan to remedy that as soon as you can find her. \n\t\t\n\t#You have to admit you're curious enough about the Sphinx to seek her out regardless of the danger.\t\n\t\tYou've always been told you're too inquisitive for your own good, but the chance to meet a child of the divine is just too good to pass up. Hopefully your wits, or failing that: your sword, will stand you in good enough stead to get you out of this adventure in one piece.\n\t\t\n\t#You've met Queen Jocasta once as a boy, though never her husband. She was kind to you in a distant kind of way, though somewhat melancholy. If you could save her from further pain, you would.\n\t\tAlthough it was many years ago, you remember the time that Queen Jocasta came to Corinth. For what reason you cannot remember, but you do recall the slim pale woman, with large brown eyes that always seemed so sad when she looked at you. Your presence probably reminded the poor woman that she had no children of her own despite her appeals to the gods. \n\t\n\t#Fighting the Sphinx sounds risky. After all, it sounds as if any aspiring heroes have already met their doom at her hand. Try to avoid her, you have your own journey to deal with. \n\t\t*set looksphinx \"no\"\n\t\tYou've no death wish. Besides you need to concentrate on looking for a remedy to the fate you've been cursed with. Not potentially angering Echidna if you managed to slay her.\n\t\n\n\n*if (health > 4)\n\tDespite the difficult journey escorting grain from the Black Sea, you feel   \n\t*if (looksphinx = \"no\")\n\t\thealthy and well; more than ready to continue your trek. After what you've overheard however, perhaps you should ask for directions. A wrong turn could set you on a dangerous path.\n\t*if (looksphinx != \"no\")\t\n\t\tstrong and well; keen to start a search for the Sphinx in the mountains.\t\n\t\n*if (health \u003c 5)\n\tYou've been feeling somewhat battered of late, particularly since the difficult journey escorting grain from the Black Sea. No so unwell that you'll \n\t*if (looksphinx = \"no\")\n\t\tnot continue your trek however. The sooner you leave this area the better it would seem. You consider asking for directions before moving on given what you've overheard. It appears likely that a wrong turn could set you on a dangerous path.\n\t*if (looksphinx != \"no\")\t\n\t\tpostpone your search for the Sphinx in the mountains however.\t\n\t\n\n*if (looksphinx != \"no\")\t\n\tYou decide to stay a final night in the town, gathering what information on the Sphinx you can and gaining a fresh start in the morning. \n*if (looksphinx = \"no\")\t\n\tWandering about the town gives no leads on potential work for one of your talents. It seems you'll have to move on to the next and hope for better luck there. \n\t\n\tYou decide to stay a final night in the town and have a fresh start in the morning. Besides, it'll give you more time to investigate if the rumours of a Sphinx in the area are likely to be true and how you can best avoid her.\n\n\t\n*page_break\n\nThe morning dawns frosty and bright as you hoist the leather satchel over your shoulder. Though cold, the clear skies promise an easy day's walk, perfect for travelling. \n\nAlthough he'd been cagey, probably worried news of the Sphinx would affect business, you'd found out from the owner of the inn that travellers had been going missing on the mountain pass that leads into Thebes to the west. His recommendation was to stick to the more southward trail, skirting around Thebes which should allow you to continue unmolested towards Ampelochori. \n*if (looksphinx != \"no\")\n\tOf course, you mean to head straight for the western trail anyway. Not that you'd told him that.\n\t\n*if (looksphinx = \"no\")\t\n\tYou find the walk pleasant as the day warms, following the road into the mountains. Word must have gotten around and even the safer trails seem to be deserted, with the village folk not wanting to take the risk and staying close to home. \n*if (looksphinx != \"no\")\n\tYou walk quietly and on full alert as the road climbs into the mountains. The trail is completely deserted. It seems word has gotten around the village, and anyone who did not have to walk the roads is staying close to home. \n\n*page_break\n\n\"Why, hello there Oedipus. I've been searching for you.\" A silky, feminine voice sounds from somewhere above your head. \n\n\nYou draw your sword as the creature wings down from the heights to land on a rock before you. Standing almost as tall as yourself, the woman has bronzed skin and delicately tapered dark eyes. A long mane of red-gold hair spills down her back, held in place with a plaited leather tie. Wide eagle like wings in burnished gold sprout from her back, and her body is that of a sleek lioness. She could almost be considered beautiful but for her tail ending in an olive headed snake which hisses menacingly, fangs dripping venom. \n\n\n\n*fake_choice\n\t#Keep your sword up ready to strike as soon as the moment presents itself. \n\t\t\"Put that away human, it's not polite,\" she chides with a slow smile. \"I thought we could have a little talk. Just you and I.\"\n\t\n\t#Drop the point of your sword slightly. She seems to want to talk. Let's see what she has to say. \n\t\t\"Ah, very good,\" she purrs. \"I see you have some manners when dealing with a lady. Although I'd very much appreciate it if you'd put that thing back in its scabbard. I want to have a talk. Just you and I.\"\n\t\n\t#Run!\n\t\tSpinning, you turn and run back down the trail. You keep your sword up, ready for action, while your eyes search the sky for danger. \n\t\t\n\t\tA shadow passes overhead and the Sphinx drops heavily onto the path before you. You slide to a stop, while she smiles with too many teeth. \n\t\t\n\t\t\"My, my. Leaving so soon Oedipus? And after I put so much time into finding you as well. Not very polite at all. I though they taught princes better than that,\" she tuts disapprovingly. \"Now put that toy away, and we'll have a talk. Just you and I.\"\n\t\n*fake_choice\n\t#Refuse to put the sword away. \n\t\t*set refusesword \"yes\"\n\t\tYou shake your head, pointing the weapon towards the creature. \n\t\t\n\t\t\"Oh fine, have it your way,\" she breathes. \n\t\t\n\t\tLightning fast she lunges from her rock, knocking you to the ground and pinning you there. \n\t\t\n\t\t\"Ah, much better,\" she laughs, exposing long sharp canines in a wide smile. \"I never get tired of having mortals to play with.\"\n\t\t\n\t\tYou struggle to get free, but her weight holds you down, claws digging painfully into your flesh. \n\t\t\n\t\t\"But I said we were going to have a talk, and mother always did say I shouldn't play with my food,\" she sighs. \"Well I guess I can let you up... this time.\"\n\n\t\tGrabbing your blade in her teeth, she pulls it from your hand, tossing it to the side of the road out of reach. She licks a long roughened tongue along the side of your face, laughing at your reaction before backing away. \n\t\t\n\t\t\n\t\n\t#Accede for now and hear her out.\n\t\t*set refusesword \"no\"\n\t\tYou return the sword to its sheath, though your hand continues to hover nearby. \n\t\t\n\t\t\"Very good,\" she purrs. \"See how much more civilised this is?\"\n\t\t\n\t\tShe jumps lithely from her rock to pad quietly walk a circle around you. Her nails leave gouges in the dirt.  \n\t\n\t\n\"Now, I have a proposition for you.\" She strides a few paces away, turning her back to \n*if (refusesword = \"no\")\n\tyou, seemingly unconcerned that you could reach for your weapon at any moment. \n*if (refusesword != \"no\")\n\tyou. It's almost as if she wants you to reach for your weapon and give her an opportunity for another \"game\" at your expense.\t\n\t\n*page_break\t\n\t\n\t\n*goto_scene part6sphinxattack \t\n", "part5guard": "*page_break\n\n*label guard\t\n\nThe weeks have marched by since your trek through the mountains, and soon enough you found yourself needing to take new employment in the form of a caravan guard in order to keep your belly full while you continue your travels.\n\nThe air is thick and heavy as you trudge slowly alongside the cart laden with grain from the Black Sea. One of the oxen bellows mournfully in its harness. You know how he feels. You're already regretting this particular hire yourself. \t\n \n\"I told you we should have gone straight to Athens with the grain! The city's bigger with more chance of selling it quickly,\" Elpis  snaps, raising her voice in a snarl. \"If you had have listened to me, we'd not be in the mess we are right now.\"\n\n\"And I said that Megara will be fine. It's closer and we'll have less competition there than in Athens,\" Iason growls back. \"Besides, how was I supposed to know someone would poach our guards out from under us.\"\n\n\"Well if you'd just paid them better like I asked...\"\n\n*page_break\n\n[i]Arguing again.[/i] It seems to be a favourite pass time of your employers, and that's not the worst of it. Having to replace their guards in a hurry, they'd been more than happy to sign you on for the remainder of their trip. Unfortunately, their other rapidly recruited e
