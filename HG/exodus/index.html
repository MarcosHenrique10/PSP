y. \n\nYou get back into the car. Gordon leans over to you.\n'Listen, Reven have changed now, green energy is everything now.\nThey aren’t involved in oil or gas anymore. They are moving forward as\na green energy company'\n'I heard that ages ago but I still don't believe it, When do I start?' you say.\n'In a couple of days, I’ll take you if you want'.\n\nGordon drives for a couple of miles until you arrive at some\nrun down flats. The car pulls over to the left.\nGordon reaches into his dashboard compartment and pulls out a large brown envelope.\n\n'OK, here we are. The keys and all the details are inside. Its number 66 I believe.'\nYou take the envelope. \n'Thanks for all your help'\nDon’t sweat it $!{name}, its why I'm here. Listen get settled in, I’ll give\nyou a call in a week and see how you are getting on.'\nYou smile, \n'Yeah, sounds good.'\nYou get out of the car and walk toward the rundown flats.\nGordon drives away.\n\nYou open the envelope and remove a key. You walk through the halls and enter flat 66.\nThe flat is extremely bare. You throw your bag on the floor and lay on the bed.\n\nYou reach for the brown envelope and remove the booklet inside.\nYou notice the REVEN logo. It is familiar but has now changed slightly. The font has now turned green, and the logo\ncontains depictions of trees and water.\n\nREVEN GREEN ENERGY.\n\nYou read through a small booklet inside the envelope.\n\nREVEN GREEN ENERGY IS PROUD TO ASSIST WITH THE REHABILITATION PROGRAM ALSO SUPPORTED BY THE LOCAL COUNCIL. STARTING AS A\nMAINLY OIL AND GAS BASED COMPANY IN 1935, WE HAVE EVOLVED INTO A NOW COMPLETELY GREEN ENERGY COMPANY THAT FOCUSES ON\nTHE RESEARCH AND DEVELOPMENT OF ONLY SUSTAINABLE ENERGY, WITH A FOCUS ON WIND AND WATER POWER. \nWE HAVE COMPLETELY LEFT OUR HUMBLE OIL AND GAS BEGINNINGS IN THE PAST AND WE ARE NOW FOCUSING ON NEW AND EXCITING OPPORTUNITIES WHILE GIVING A HELPING HAND TO OUR PLANET.\nWE LOOK FORWARD TO WELCOMING YOU TO THE REVEN FAMILY AND GIVING YOU THE OPPORTUNITY TO GROW WITH US AS WE MOVE INTO A\nNEW 100% SUSTAINABLE WORLD.\n\n'You’ve changed huh?' You say outlound. You put the papers back inside the envelope and lay down on\nyour new bed. \nYou fall asleep.\n\nYou wake up early and get dressed. Its your first day at your new job.  \nYou head out of your flat to a nearby bus stop.\nThe bus arrives and you get on. You speak to the bus driver.\n\n'Reven energy?'\n\nThe driver gestures to the passengers on the busy bus.\n\n'You and everyone else kid'\n\nYou tap your bank card close to the drivers sectioned off driving area, the bus ride costs $6.\n\nYou walk toward the rear of the bus and sit down. The other passengers on the bus mostly appear to be ex cons. Many\nof them have shaved heads, some have nationalist right wing tattoos and scruffy torn clothes.\n\nThe bus drives for many miles heading into the countryside.\n\nThe bus stops next to a long dusty dirt track, and you and the entire bus get off.\nA soldier is waiting there as the buses occupants get off. \n\n'REVEN ENERGY --- THIS WAY'\n\nThe solider gestures toward a narrow dirt path. The group walk along a narrow dirt track.\nYou notice a sign that shows ‘Reven Green Energy’. \n\n'STAY TOGETHER PLEASE' the solider says.\n\n'changed quite a bit' you say to yourself.\n\nThe group approach the large compound. Huge barbed wire fences surround the compound.\n\nA women in a smart suit walks out onto a platform above the wondering group.\nShe addresses the group.\n\n'Welcome to Reven Green energy!' \n\nThere are uninspired mumours amongst the group.\n\n'My name is Oliva-Scott Yamamoto, welcome to our home. Our rehabilitation program is going\nto help those of you with troubled pasts find a new career at our great company. You are going to be\nsplit into groups and you’ll meet your supervisors who will slot you into your roles'.\nOlivia-Scott walks away from the raised platform and back into the office.\n\nThe group begin to wonder around and chat amongst themselves.\nA security guard emerges from the compound. He shouts over to you and the group.\n\n'OKAY, WHEN YOU HEAR YOUR NAME READ OUT GO AND JOIN YOUR GROUP.'\n\nOfficers begin to read out various surnames. As names are read out, the group begin to split off into their teams.\nYou hear your name being shouted by a tall Security Guard.\n\n$!{name}!\n\nYou walk over and the tall Security Guard approaches you.\n'You OK $!{name}?' You nod. \n'Follow me'\n\nThe guard leads you and the rest of the group through the Reven\nEnergy compound. The compound is full of large turbines and large solar\npanels. A loud buzzing can be heard throughout the premises. The site appears to be deserted. Very few workers can be seen\naround the site.\n\nThe security guard enters what appears to be the main central building of the compound.\nYou are led into a small locker room. The guard picks up some\ngrey overalls and tosses them to you. you catch them.\n\nOK $!{name},Put these on and go to building 14, you’ll be briefed there.\nThe guard leaves the room with the rest of the group following him.\n\nYou take off your backpack and put on the overalls.\nYou walk out of the small locker room and look for building 14. You walk through the desolate compound as the sun beats\ndown on you. You begin to sweat in the overalls.\n\nYou approach building 14 and knock on the door. There is no response.\nYou knock again. a voice shouts over to you.\n\n'What do you want?'\n\nyou jump back, shocked by the unprovoked bellowing out.\n\n'I’m the new guy. $!{name}'\n\nYou hear stomping feet storm over to the door, opening it\naggressively. A man in his 40's stares you up and down. He grunts.\n\n'I'm your boss, Mike. Follow me'\n\nYou follow Mike, who leads you to a corner of the compound. You struggle to keep up with Mikes relentless pace of\nwalking. You arrive at a pile of rubbish in the corner of the compound. \nMike looks over at you while pointing at the rubbish.\n'I want that lot gone by the end ofthe day. Your break is at 12:30, there are spades over there'\n\nMike walks off, leaving  you to get on with your work.\n\nYou let out a sigh and pick up the spade. .\n\n*choice\n  #proceed to sweep leaves around the compound.\n   You get straight to work clearing rubbish around the compound. You work very hard as the sun beats down you on. Mike notices working hard as he sees\n   you in a building window. He nods slightly at you. You return the nod and get on with your work.\n   *set strength +10\n   *finish\n  #Stand around prentending to work. What difference will it make?\n   You sweep a couple of leaves around but don't really push yourself. Mike notices you as he sees\n   you in a building window. He shakes his head and says something. You cannot hear but from lip reading you make it out to be \n   'Stupid lazy Gen Z criminals, expect everything for nothing'. You stick your middle finger up at him and he walks away from the window. \n   *finish", "reventwo": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nCHAPTER XI\n\nJAIL - 08:07\n\nThe tall, large jail gates slide open as you exit the jail.\nYou carry only a small backpack that contains a few of your possesions.\nGordon is waiting in a luxurious car outside. The window slides down and he shouts 'm here. Listen get settled in, I’ll give\nyou a call in a week and see how you are getting on.'\nYou smile, \n'Yeah, sounds good.'\nYou get out of the car and walk toward the rundown flats.\nGordon drives away.\n\nYou open the envelope and remove a key. You walk through the halls and enter flat 66.\nThe flat is extremely bare. You throw your bag on the floor and lay on the bed.\n\nYou reach for the brown envelope and remove the booklet inside.\nYou notice the REVEN logo. It is familiar but has now changed slightly. The font has now turned green, and the logo\ncontains depictions of trees and water.\n\nREVEN GREEN ENERGY.\n\nYou read through a small booklet inside the envelope.\n\nREVEN GREEN ENERGY IS PROUD TO ASSIST WITH THE REHABILITATION PROGRAM ALSO SUPPORTED BY THE LOCAL COUNCIL. STARTING AS A\nMAINLY OIL AND GAS BASED COMPANY IN 1935, WE HAVE EVOLVED INTO A NOW COMPLETELY GREEN ENERGY COMPANY THAT FOCUSES ON\nTHE RESEARCH AND DEVELOPMENT OF ONLY SUSTAINABLE ENERGY, WITH A FOCUS ON WIND AND WATER POWER. \nWE HAVE COMPLETELY LEFT OUR HUMBLE OIL AND GAS BEGINNINGS IN THE PAST AND WE ARE NOW FOCUSING ON NEW AND EXCITING OPPORTUNITIES WHILE GIVING A HELPING HAND TO OUR PLANET.\nWE LOOK FORWARD TO WELCOMING YOU TO THE REVEN FAMILY AND GIVING YOU THE OPPORTUNITY TO GROW WITH US AS WE MOVE INTO A\nNEW 100% SUSTAINABLE WORLD.\n\n'You’ve changed huh?' You say outlound. You put the papers back inside the envelope and lay down on\nyour new bed. \nYou fall asleep.\n\nYou wake up early and get dressed. Its your first day at your new job.  \nYou head out of your flat to a nearby bus stop.\nThe bus arrives and you get on. You speak to the bus driver.\n\n'Reven energy?'\n\nThe driver gestures to the passengers on the busy bus.\n\n'You and everyone else kid'\n\nYou tap your bank card close to the drivers sectioned off driving area, the bus ride costs $6.\n\nYou walk toward the rear of the bus and sit down. The other passengers on the bus mostly appear to be ex cons. Many\nof t .\n\nThe security guard enters what appears to be the main central building of the compound.\nYou are led into a small locker room. The guard picks up some\ngrey overalls and tosses them to you. you catch them.\n\nOK $!{name},Put these on and go to building 14, you’ll be briefed there.\nThe guard leaves the room with the rest of the group following him.\n\nYou take off your backpack and put on the overalls.\nYou walk out of the small locker room and look for building 14. You walk through the desolate compound as the sun beats\ndown on you. You begin to sweat in the overalls.\n\nYou approach building 14 and knock on the door. There is no response.\nYou knock again. a voice shouts over to you.\n\n'What do you want?'\n\nyou jump back, shocked by the unprovoked bellowing out.\n\n'I’m the new guy. $!{name}'\n\nYou hear stomping feet storm over to the door, opening it\naggressively. A man in his 40's stares you up and down. He grunts.\n\n'I'm your boss, Mike. Follow me'\n\nYou follow Mike, who leads you to a corner of the compound. You struggle to keep up with Mikes relentless pace of\nwalking. You arrive at a pile of rubbish in the corner of the compound. \nMike looks over at you while pointing at the rubbish.\n'I want that lot gone by the end ofthe day. Your break is at 12:30, there are spades over there'\n\nMike walks off, leaving  you to get on with your work.\n\nYou let out a sigh and pick up the spade. .\n\n*choice\n  #proceed to sweep leaves around the compound.\n   You get straight to work clearing rubbish around the compound. You work very hard as the sun beats down you on. Mike notices working hard as he sees\n   you in a building window. He nods slightly at you. You return the nod and get on with your work.\n   *set strength +10\n   *finish\n  #Stand around prentending to work. What difference will it make?\n   You sweep a couple of leaves around but don't really push yourself. Mike notices you as he sees\n   you in a building window. He shakes his head and says something. You cannot hear but from lip reading you make it out to be \n   'Stupid lazy Gen Z criminals, expect everything for nothing'. You stick your middle finger up at him and he walks away from the window. \n   *finish", "romance": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nCHAPTER VIII - ROMANCE\n\nREVEN GREEN ENERGY HQ - 11:14\n\nYou are dressed in a smart suit. You are being shown various buttons and processes by the retiring head of security, Kirbs.\nYou are concentrating extremely hard on what Kirbs is showing you. \n\n'OK, that's enough for now, let's take a break. I know it's a lot to learn in one sitting', Kirbs says.\n\n'It is, thanks' you say.\n\nYou see Mike watching in the background. He has a smile on his face.\nHe nods at you.\n\n'Coffee?' you say to Kirbs.\n\n'Not for me, thanks though. There's a machine out there in the corridor if you don't want to walk to the cafe'.\n\nYou leave the HQ office and walk along a corridor inside the Reven energy complex dressed in your smart suit, you look very\nconfident. You see Sybel, the nurse that helped you during the raid walking in the other direction.\n\nShe looks stunning today!\n\n*choice\n  #Walk past Sybel without engaging, you have work to do!\n    You walk along the hallway quickly without engaging with Sybel.\n    *finish\n  #Turn round and walk the other way. You don't feel like dealing with that woman today\n    You turn around in the hall and walk away. You break into a jog as you attempt to escape Sybel.\n    She begins to follow you. Why is she following me you think to yourself.\n    *finish\n  #Make eye contact with Sybel\n    You try to catch Sybel's attention as you walk past her.\n    *set relationships +10\n\n", "romanceone": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nREVEN GREEN ENERGY HQ - 11:45\n\n'Hey' Sybel says as she passes you.\n\n'Oh, hey!' you say, trying to be cool. \n\n'Wow, look at you. You scrub up well $!{name}!'\n\n'Thank you!'\n\n'How are you finding the new role? Managing OK?' Sybel says.\n\n'I’m still learning, but you know, I’ll get here. It's better than\nsweeping the yard, I guess'\n\n'For sure. Listen I was thinking about what you said about the activist group that broke into our facility.'\n\n'Oh yeah, I forgot about that. What about them? Do you know anything else about them?'\n\nSybel looks left and right. Reven employees walk up and down the halls of the complex.\n\n'Let's go somewhere else a bit more private. Do you want a coffee?'\n \n'Always, I was just on my way to get some' you respond.\n\n*page_break Coffee Time!\n\n", "romancetwo": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\nREVEN GREEN ENERGY HQ - CANTEEN - 12:34\n\nYou and Sybel sit inside the canteen, you both have fancy-looking coffees. Sybel leans into you.\n\n'So, tell me more about yourself? Mike told me you used to be a climate activist yourself?'\n\n'That’s right, I wanted to join Exodus for years. Ever since I was 14.'\n\n'Why?'\n\n'Lack of guidance, I guess. I never knew my parents'.\n\nYou both laugh.\n\n'Aww. Anything else?'\n\n'I just didn’t like the way traditional activists were being treated. Doing peaceful protests\nand then people just mocking them online. You know?\n\n'Yeah I guess' Sybel says\n\n'I think Exodus made people take climate change seriously, as they feared them. Exodus made a lot of\npeople change their attitudes.'\n\nSybel smiles. \n\n'Aww, You really care huh?'\n\n*choice\n  #Tell me about yourself\n   'Oh, what would you like to know?' Sybel says.\n\n   'Everything' you say.\n\n   'Well, I've always wanted to be a nurse, My parents were both doctors, they met on a ward actually.\n   I have two brothers, lost contact with both after a family row.'\n\n   'I'm sorry to here that'\n\n   'It's ok, what about your family?'\n\n   'Just me, My mum was a truck driver, died when I was young. Dad not in the picture.'\n\n   'Oh, that's so sad, you don't have anyone?'\n\n   'Not really'.\n\n   'I'm sure you were popular and had lots of friends at school'\n\n   You begin to look awkward.\n\n   'So anyway, you have any hobbies?'\n\n   'Yeah, I play tennis, I'm pretty good you know'\n\n   'We should play one day' you say with a smile.\n\n   Sybel smiles back at you. \n   *set relationships +10\n   *finish\n  #That's enough about me, Let's talk about some more me!\n   'What did you think about Exodus kidnapping a BP executive, that was crazy. They went into the guys home!'\n\n   'Pretty crazy, what if that guy had kids there or something' Sybel says.\n\n   'Who cares, that guy is on a six figure salary while continuing to displace wildlife and ruining the planet'\n\n   'Yeah but breaking into the guys home while he's with his wife? What did his wife do to anyone.'\n\n   'She's with him. She lives a lavish life off of oil money.' you say.\n\n   Sybel starts to look angry.\n\n   'What good is kidnapping some guy, caring about the earth is great but if you are hurting people\n   what's the point.'\n\n   'It's radical I know, but if it was just peaceful protest, nothing would change. The only way to change\n   anything is to disrupt.'\n\n   'Yeah but to become criminals and terrorists?'\n\n   'Yeah, governments use public money to invade countries and start wars, the only difference is Exodus do not'.\n\n   Sybel does not respond.\n\n   'Well you got me there' Sybel says.  \n   *finish\n\n", "romancetwopointfive": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\nREVEN GREEN ENERGY HQ - CANTEEN - 13:02\n\n'This is a 10 year contract for the drilling, they have no intention of\nstopping! You used to be one of these activists yourself, right? No wonder groups are still trying to\nbreak into this place and sabotage it'\n\n'How would these groups know about contracts like this? Surely this is\nall kept internally' you ask.\n\n'No idea, a mole perhaps? Someone internally leaking this stuff.\nThese groups seem to find out this stuff sooner than we do.'\n\n'Hmm, what do you think we should do? You ask'\n\n'That’s exactly what I was going to ask you' Sybel says.\n\n'I’ve just got out of prison. I’m still on probation. If I didn’t\nhave this job I’d be on the streets or in jail. I’ve just got this promotion now too'.\n\nYour phone rings. \n\n'Give me a second, Its Mike' you say.\n\nYou answer\n\n'$!{name}, You got a minute?'\n\n'Sure'\n\n'Come to Room A424 would you, wanna\nshow you something'\n\n'I’ll be right there' You hang up the phone.\n\n'I gotta go.'\n\n'What about this?' Sybel says. She looks anxious.\n\n'I’ll catch up with Mike about it, don’t worry too much for now.' You say.\n\n'Be careful!' Sybel says\n\n'You be careful! No more stealing contracts.'\n\nYou laugh.\n\nSybel attempts to kiss you on the lips.\n\n*choice\n  #Return the kiss\n   Woa, you say. \n\n   'You free tonight?' Sybel asks, \n\n   'I am' \n\n   'Let's meet'  \n\n   'Sure, pick you up at 8?'\n\n   'Sounds good' \n\n   Sybel hands you a card.\n\n   'My numbers on there, Ciao.'\n\n   You call Mike and ask if you can catch up with him later. He agrees.\n\n   You head home happy and excited, time to go on a date!\n\n   You put on your best clothes and head over to the address on the card Sybel gave you. \n   Sybel lives in a very posh area. Much better than yours, you are fresh out of prison remember, shouldn't\n   complain too much.\n\n   You find number 66 and knock on the door. Sybel answers almost instantly.\n\n   You head out to a swanky local steak restaurant.\n\n   You have a delicious meal and get to know Sybel more.\n\n   'So how did you end up at Reven' you ask.\n\n   'This is the only job I've ever had to be honest, I started here straight out of university, I was here\n   before the Reven Green energy days. It was just Reven energy when I started. I had to transfer after we\n   were attacked by activists, the place was almost blown up you know!'\n\n   You start to look awkward. Sybel stares at you, she stops smiling.\n\n   'Wait, that was you?'\n\n   'I was there yes, it wasn't successful, The other two were killed'.\n\n   Sybel is in shock. He gets up and attempts to leave the restaurant.\n\n   You grab her. People in the restaurant begin to look at you.\n\n   'Please, let me explain!'\n\n   Sybel sits down, she looks uncomfortable.\n\n   'I can't believe I agreed to go for dinner with a terrorist!'  \n\n   'That's not me any more, I spent time in prison and I'm a different person now'\n\n   'Prison? Oh that makes it better?'\n\n   People in the restaurant begin to stare at you. Sybel notices.\n\n   'Hey, I'm sorry, It's just all a bit much you know?'\n\n   Sybel starts to get emotional, tears run down her face. You ask the waiter for the bill and leave the \n   restaurant.\n\n   'Shall we go back to your place?' Sybel says?\n\n   Now she wants to come back to my place you think? My flat is a complete mess and I do not want to bring\n   this girl to my dodgy area. \n\n   'Maybe another time' you say.\n\n   'Sure think, thank you for tonight, I'm sorry about my freak out.'\n\n   You laugh.\n\n   'It's OK, it's deserved to be honest.'\n\n   Sybel kisses you and walks away.\n\n   What a night you think to yourself. \n   *set relationships +10\n   *finish\n  #Push Sybel away\n   'I think its best we just stay friends, you say.\n\n   Sybel begins to look embarrassed. \n   \n   'I'm so sorry, I feel so silly'\n\n   'Dont worry about it' you say. 'I'm not ready to get involved with anyone at the moment, especially with this new promotion'.\n\n   Sybel leaves the room quickly. She looks upset. \n\n   You attempt to stop her.\n\n   'Hey, I'm sorry, are you OK?'\n\n   Sybel walks away. She begins to cry.\n\n   You regret pushing Sybel away and you avoid her around the Reven complex.\n\n   Despite the complex being so huge you seem to keep seeing her around. Why is she always where you are?\n\n   Maybe she is doing it on purpose you think to yourself.\n\n   You remember Mike wanted to catch up with you, and you head over to Room A424. You cautiously head through the medical facility.\n   You know Sybel may be there and walk slowly to avoid attracting attention. You hear a voice behind you.\n\n   'Hey, are you avoiding me?' Sybel says.\n\n   Shit you think to yourself, this girl is everywhere!\n\n   'Erm, hey, how are you' you say.\n\n   'I heard something about you the other say, was that you that attacked the Reven facility, before we became fully green'\n\n   She's obsessed you think to yourself.\n\n   'That was a different time in my life OK, I got caught up in the wrong crowd'\n\n   'You're a terrorist!'\n\n   'The plan was never to hurt anyone, the place was going to be evacuated before we'\n\n   'Before you what, blew up the place?' Sybel says.\n\n   You begin to get angry.\n\n   'You better not be talking about me, I'm and changed person now and this could ruin my job here'\n\n   'I'm surprised they let you work here.'\n\n   'I'm sorry I've got to go and see Mike'\n\n   You walk away. That couldn't have gone much worse, next time I'll take the long way around and completely avoid the medical facility!'\n   *finish\n\n", "romancetwopointtwo": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\nREVEN GREEN ENERGY HQ - CANTEEN - 12:48\n\nYou continue you chat with Sybel.\n\n'So, did you have something to show me?'\n\n'Yeah, you were questioning why those guys broke in and attempted to shut down or sabotage a green company right?'\n\n'Yeah.'\n\n'I was thinking about what you said so I did some digging, we’ve had quite a few\nemployees come back with burns recently, pretty severe.'\n\n'Is that not normal here?'\n\n'it's the type of burns, other injuries too. They did slow down a\nwhile ago but now they are only intensifying. I think these are\nfracking injuries! You know what fracking is don’t you? From what I can see the whole green\ncompany thing is a front. In reality they are spending most of\nthe money on biomass, oil defense lobbying and fracking.' Sybel says.\n\n'I can’t imagine they can cut that stuff out immediately. Maybe it's just a\ntransitional period' you say.\n\n'I thought that too, until I found these.' Sybel looks around. No one is around.\nSybel removes some papers from her pocket. She spreads them out across the table.\nThey are purchase orders. \n\n'Look at these. These are purchase orders for oil and gas drilling. It's all a\nfront!'\n\n'Where did you find this stuff?' You ask.\n\n'I told you, I did some digging, if that doesn’t convince you then\nthis definitely will.'\n\n*page_break Sybel removes a contract from her pocket.\n\n", "scanner": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\nAPARTMENT - 02:24\n\nYou arrive home in the early hours to your sixth floor small studio apartment. \n\nYou sit on your recycled couch you found dumped near your apartment. It's a bit scruffy but better than sitting on the floor, you throw\na blanket over it and it covers up the damage.\n\nYou attempt to get to sleep but the adrenaline of your actions earlier is keeping you up\n\nYou look over at the small framed photo of your late mother next to your bed. She passed away when you were 8 in a car accident while working.\n\nShe worked as a truck driver and was a single mother, fleeing your abusive father.\n\nShe struggled to make ends meet alone, and left you practically nothing except an old police scanner she used for her work.\n\nYou walk over to the handheld police scanner and switch it on.\n\nSelect which band on the scanner to use.\n\n*choice\n  #AIR BAND  (mostly aircraft, pilots and air traffic controllers)\n    You scroll through on the air band of the scanner. You pick up two people talking.\n    \n    'This is flight 420, circling at 10000 feet, we'll be landing in 20 minutes'\n\n    'Flight 420, received thank you. Going to have you to stay up there a while longer'\n\n    'Roger that control, you not ready for us?'\n\n    'We've got climate activists on the runaway again, police are on their way'\n\n    'Damn it! What's wrong with these people'\n\n    'Likely protestors unhappy with the airport expansion sir.'\n\n    You smile. The voices continue over the radio.\n\n    'What do they think people are going to do for work in the coming years?' \n\n    'I know sir, very selfish for people who care so much about the planet'.\n\n    You turn off the scanner and think about what the pilot said. He makes a good point. \n\n    You get into bed and fall asleep instantly.\n    *finish\n  #POLICE BAND (see if you can hear any more activity following your sabotage attempt)\n    You scroll through on the police band of the scanner. You pick up two police officers talking to each other.\n\n    'On my way to the rail depot now'\n\n    'What we got?'\n\n    'Looks like a huge drug stash has been found in one of the freight trains. The press are there now.'\n\n    'Try to keep them away would you, we might have to get the forensic teams in there later.'\n\n    'Got it'.\n\n    'Oh wait a minute, change of plan. Control room is going crazy over here.'\n\n    'What's up?'\n\n    'We got climate activists on the runaway at the airport stopping a plane landing. There's also a warehouse robbery\n    going on.\n\n    'Damn climate activists, don't they know they are affecting peoples jobs?'\n\n    'I know, can I ask you to attend the robbery? Will send the details over to you now.'\n\n    'Studley Road Industrial estate, got it.'\n\n    That's just across the road from you! You think about what the police said about the climate activists.\n    There's no way you want to harm anyones job. You hear the police sirens approach your area.\n\n    You turn the scanner off and get into bed.\n  \n    https://www.youtube.com/watch?v=4vEdMJTJhN0\n    *achieve findthetrailer\n    *finish\n  #MARINE BAND (listen to incoming ships, since you are no where near the sea you may pick up anything at all)\n    You scroll through on the scanner to see what you can hear. You hear some muffled talking but you cannot make out \n    what is being said.\n\n    You walk out of your flat into the hallway with the scanner in your hand. The voices become slightly less muffled but\n    you still cannot make out what is being said. \n\n    You walk toward a large window overlooking some nearby warehouses. The voices become extremely loud and crystal clear.\n\n    'EVERYONE IN POSITION? LETS DO THIS'\n\n    'YES SIR, LETS GO. WE GOT 5 MINUTES, GET THE MONEY IN THE SAFE AND GET OUT'\n\n    You have tuned into a heist! You hear smashing glass coming from the warehouses across the road. Someone is breaking into\n    the warehouses across the road. You turn up the volume on the scanner. The voices continue.\n\n    'WHERE IS IT? GOD DAMN IT!'\n     \n    The smashing of glass continues.\n\n    'I FOUND IT, LETS GET THE HELL OUT OF HERE!'\n\n    You start to hear police sirens approach in the distance.\n\n    You see the headlights of a tatty white van suddenly light up below you. The engine roars into life. A different voice is\n    heard on the scanner\n\n    'LETS GO GUYS, POLICE ARE HERE, ENGINES RUNNING!'\n\n    The police sirens get louder. You see two men in balaclavas run out of one of the warehouses and get into the van. \n    \n    The van wheelspins away as the police car arrives on the scene. The police car pursues the white van into the night.\n\n    You yawn and turn off the police scanner.\n\n    That's enough excitement for one night! You go back to bed and fall asleep instantly.\n    *finish\n      \n  \n", "school": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\nSTREET - 08:53\n\n\nAfter leaving your apartment for school you walk past a small shop and notice the newspapers outside.\nyou notice an article on one of the papers:\n\n‘EVANGELION ENTERPRISES EXPOSED’\n\nYou grab the paper and pull it closer to your face.\n\nTHE EVANGELION GROUP HAVE BEEN CAUGHT RED HANDED ATTEMPTING TO\nSMUGGLE CLASS A DRUGS ACROSS THE COUNTRY IN FREIGHT\nCARRIAGES.\nA RAID ON THE EVANGELION MAIN DISTRIBUTION CENTRE HAPPENED AT 5AM\nTHIS MORNING AND TWO OF THE COMPANY DIRECTORS HAVE ALREADY\nBEEN APPREHENDED BY POLICE.\nEVANGELION HAS TAKEN A MASSIVE TUMBLE IN THE STOCK MARKET WHILE\nMANY OF THEIR MAIN SUPPLIERS HAVE CUT ALL TIES WITH THE\nPHARMACEUTICAL COMPANY.\nTHE CORPORATION WAS EXPOSED WHEN TWO SECURITY GUARDS DISCOVERED\nCARRIAGES WERE BEING USED TO TRANSPORT ILLEGAL DRUGS ACROSS\nTHE COUNTRY. THE GUARDS WHO WERE PATROLLING THE RAIL DEPOT ARE BEING HEAVILY PRAISED FOR THEIR\nDILLIGENCE.\n\nYou look angry.\n \n'Bastards took all the credit!' \n\nThe shop owner looks at you with a confused face.\n\n'Do you intend to pay for that? This isn't a library!' \n\n*choice\n  #Throw the newspaper at the shop owner\n    You throw the newspaper at the shop owner. He ducks dodging the newspaper. \n\n    'GET OUT!' he screams. A school bus approaches and you hop on the bus  \n    *finish\n  #Pay for the paper and leave \n    You pay for the paper and leave the shop. A school bus approaches and you hop on the bus. \n    *set relationships +10\n    *finish\n  #Put the newspaper back \n    You ignore the shop owner and put the newspaper back. A school bus approaches and you hop on the bus. \n    *finish\n\n\n\n", "schooltwo": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nSCHOOL - 09:14\n\nWhen you arrive at the school the place is buzzing, with kids getting their exam results and\nhugging. \n\nYou hear mentions of various colleges from them as they run around in the corridors.\n\nYou approach a board listing results and find your name. You see an ‘F’ next to your name.\n\nYou did not pass your exam and you didn't get the grades to go to the prestigious university you wanted too.\n\nIt was your plan to study climate science, but this will no longer be possible.\n\nyou begin to look upset.\n\n*page_break What now?\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Michael Corleone\"\n*set exodus 70\n*set relationships 70\n\nRAIL DEPOT - 22:46\n\nIt is a cold night, and the heavy rain pours down on you. \nYou are at the local rail depot at night. You are wearing a large backpack and carrying a torch. The depot is full of train carriages, \nboth for passenger and freight use. \n\nYou are looking for a specific train carriage, owned by notorious climate criminals \n'EVANGELION LTD'.\n\nYou find the carriage, drop your bag and remove \na rachet, torch and spray-paint. You hear two guards approaching.\n\n*fake_choice\n       #Avoid the guards and quietly escape the rail yard. You'll find another climate criminal you can target which is less risky.\n       #Remove a skateboard from your bag, place the torch on top and use it to fool the guards away from your location.\n       #Surrender to the guards, admit you were wrong and seek out help for your mental health issues.\n\n\n*script changeBackgroundColor(\"black\")\n\n*set name \"Fredo Corleone\"\n*set exodus 10\n*set relationships 10\n\nOXFORD CIRCUS - CENTRAL LONDON - 15:57\n\nYou walk through some backstreets toward Oxford Circus, another area where the protests are taking place. \nYou see thousands of climate activists, some are young teenage students like yourself, sitting in the \nmiddle of the road blocking the usually busy Oxford Circus crossing.\n\nSuddenly, a large group of police approach the protestor's and drag them away from the center of the street.\nYou start to look concerned and back away slowly. \n\nMore police burst past you and your favorite green cap is knocked off your head. \n\n*fake_choice\n        #Get down on the floor and crawl through the protestors. It's your favorite hat, there's no way you are doing to lose it.\n        #Leave the hat, it's getting old and dirty now anyway.\n        #Join in the fights between the protestors & the police.\n\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Vito Corleone\"\n*set exodus 100\n*set relationships 100\n\nHIGH SCHOOL - 09:45\n\nYou are standing around aimlessly inside the corridors of your school. \n\nYour classmates all look excited and are hugging each other.\n\nOthers are in tears of joy and signing each other's shirts.\n\nYour teacher Maggie Francis, who is in her 70's with curly hair and glasses emerges from an\noffice. \n\n'Hi Vito Corleone, You got a minute?'\n\n*fake_choice\n        #Sure Miss Francis!\n        #I'm Okay thanks.\n\n\n*set name \"Sonny Corleone\"\n*set exodus 70\n*set relationships 10\n\nREVEN GREEN ENERGY HQ - CANTEEN - 13:02\n\nYour phone rings. \n\nSonny Corleone, You got a minute?'\n\n'Sure'\n\n'Come to Room A424 would you, wanna\nshow you something'\n\n'I’ll be right there' You hang up the phone.\n\n'I gotta go.'\n\n'What about this?' Sybel says. She looks anxious.\n\n'I’ll catch up with Mike about it, don’t worry too much for now.' You say.\n\n'Be careful!' Sybel says\n\n'You be careful! No more stealing contracts.'\n\nYou laugh.\n\nSybel attempts to kiss you on the lips.\n\n*fake_choice\n        #Return the kiss\n        #Push Sybel away\n\n\n*set name \"Johnny Fontane\"\n*set exodus 10\n*set relationships 90\n\nPOLICE STATION - JAIL - 16:45\n\nYou wake up and hear the door of your cell clattering.\n\n'Listen, kid, you are in some serious trouble, you know that don't you'\n\n'Yeah' you say, with a scared expression on your face.\n\n'your lawyer will be here soon. In the meantime, what can you tell us about Simon Kirby, we believe was known in the activist community by the alias ‘Vertis’.\n\n*fake_choice\n        #Who is that?\n        #I'll tell you everything.\n", "startup": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n*title EXODUS: Climate Activist\n*author Daniel Stephenson\n*scene_list\n  startup\n  startuptwo\n  london\n  executive\n  scanner\n  flat\n  apartment\n  apartmenttwo\n  school\n  schooltwo\n  teacher\n  amy\n  locate\n  locateone\n  locatetwo\n  locatetwopointfive\n  locatethree\n  locatethreepointtwo\n  locatethreepointthree\n  locatethreepointfive\n  train\n  traintwo\n  fake\n  faketwo\n  faketwopointfive\n  faketwopointnine\n  jam\n  jampointone\n  jamone\n  jamonepointone\n  jamtwo\n  infiltrate\n  infiltrateone\n  infiltratetwo\n  infiltratethree\n  infiltratethreepointtwo\n  infiltratethreepointfive\n  infiltratefour\n  infiltratefourpointfive\n  infiltratefourpointnine\n  infiltratefive\n  infiltratefivepointfive\n  infiltratefivepointnine\n  infiltratesix\n  police\n  policeone\n  policetwo\n  executiveone\n  reven\n  revenplus\n  revenplusone\n  revenone\n  revenonepointtwo\n  revenonepointfive\n  revenonepointseven\n  revenonepointnine\n  invasion\n  invasiontwo\n  invasiontwopointfive\n  invasiontwopointnine\n  promotion\n  promotionone\n  promotiononepointfive\n  promotiontwo\n  promotiontwopointfive\n  romance\n  romanceone\n  romancetwo\n  romancetwopointtwo\n  romancetwopointfive\n  executivetwo\n  revenreveal\n  revenrevealone\n  revenrevealtwo\n  journey\n  journeyone\n  journeytwo\n  journeythree\n  journeyfour\n  journeyfive\n  exoduslocate\n  exoduslocateone\n  home\n  mission\n  missionone\n  missiontwo\n  missiontwopointtwo\n  revenjam\n  exodus\n  epilogue\n  epilogueone\n  ending\n  \n\n*create exodus 0\n*create relationships 0\n*create stealth 0\n*create name \"unknown\"\n*create age \"15\"\n\n*achievement exodus visible 100 Join EXODUS\n    Join the EXODUS activist group.\n    You are a member of the EXODUS activist group.\n\n*achievement getthegirl visible 100 Get the girl\n    End up happily ever after.\n    You are with the love of your life.\n\n*achievement findthetrailer visible 100 Find the trailer\n    Find the trailer for the game.\n    You found the trailer. https://www.youtube.com/watch?v=4vEdMJTJhN0\n\n*achievement stealthmaster visible 100 Stealth master\n    Become a master of stealth.\n    You are a stealth master.\n\n*achievement getajob visible 100 Get a job\n    Get a job.\n    You are a employed.\n\n*achievement promotion visible 100 Get a promotion\n    Get a promotion.\n    You have been promoted at work.\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  Take control of a troubled young climate activist  as you sabotage climate criminals and attempt to join the mysterious EXODUS activist group. A socially conscious coming of age action thriller where you will have the chance to express your strong beliefs on climate change.\n\n  [i]EXODUS: Climate Activist[/i] is a 36,000-word interactive novel by Daniel Stephenson. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\n  • Attend real life protests in London and influence how much trouble you will cause.\n  • Navigate the end of your high school years as you enter adulthood.\n  • Explore the wilderness as you attempt to locate the Exodus camp, and meet various activist groups on your travels.\n  • Infiltrate high security climate criminal energy companies and attempt to sabotage their operations.\n  • Enter the workplace and attempt to impress your boss.\n  • Meet the partner of your dreams.\n  • Make the right choices throughout the game in order to impress and join the EXODUS Group.\n\n  *if choice_is_advertising_supported\n    [i]${choice_title}[/i] is supported by advertisements, but you can buy the unlimited version to turn off ads forever.\n\t\t\n    *purchase_discount adfree 2024-06-13 $2.99 $1.99 purchased\n    *page_break_advertisement\n    *goto purchased\n  *else\n    [i]You can play through the game once for free, or purchase unlimited replays below.[/i]\n\n    *purchase_discount adfree 2024-06-13 $2.99 $1.99 purchased\n    *page_break Play Now for Free\n\n*label purchased\n\n\n\nLONDON - PICCADILLY CIRCUS - 14:26\n\nYou are in central London at the April 2019 London climate protests. \nYou are wearing your favorite green 'ECO' baseball cap. \nThe weather is unseasonably warm and bright. \nYou are by yourself as you could not convince any of your school friends to skip school and join you.\n\nYou walk past tents pitched up by climate activists in the middle of the usually busy\ncentral London Piccadilly Circus crossing, completely blocking the roads.\nThere is no traffic around the usually congested area.\n\nYou see activists inside the tents delivering speeches to\nlarge groups and teaching youngster's practical skills such as\nknitting and cooking. \n\n*choice\n  #Explore the protest\n    You continue to walk around in the road and take photos on your phone. You see other young people like yourself sitting in the middle of the blocked off crossing.\n    It looks like some sort of music festival instead of a protest. What a beautiful day you think.\n    *finish\n  #Get involved in the activities\n    You approach one of the stalls and watch as an elderly woman is demonstrating how to repair clothes. You decide to listen as it may come in handy\n    to fix some of your clothes. You do not have a lot of money and some of your clothes are starting to become ripped to the point where \n    it's not fashionable anymore.\n    *set exodus +10\n    *set relationships +10\n    *choice\n      #Repair your shoes\n        You grab a needle and attempt to repair your tatty shoes. You make a complete mess of it and they begin to look even worse. The elderly woman notices you\n        struggling and comes over to offer assistance. She takes a needle and expertly repairs your shoes. They look great. You are overjoyed and thank the woman.\n        She smiles warmly at you.\n        *finish\n      #Repair your green eco cap. \n        You grab a needle and attempt to fix a small hole on your favourite cap. The hole becomes worse and you start to get upset. This is your favorite cap! Other \n        members of the group see you struggling and offer assistance. They fix your cap for you and it looks even better than before. You are so happy you managed to fix \n        it.\n        *finish\n  #This is boring, time to go somewhere else\n    You walk through the protest and head over to another area of central London. Various protestors\n    attempt to stop you and spread the climate change word, you ignore them and walk past.\n    *finish\n\n\n", "startuptwo": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n*page_break\n\nLONDON - OXFORD CIRCUS - 15:57\n\nYou walk through some backstreets toward Oxford Circus, another area where the protests are taking place. \nYou see thousands of climate activists, you see more young teenage students like yourself, sitting in the
