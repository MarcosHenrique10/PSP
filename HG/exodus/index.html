n Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n \n\nREVEN ENERGY HQ - AIR VENT - 07:56  \n\nThe three of you are now in your Reven uniforms, still inside the air vent.\nThe alarms around the complex suddenly turn off.\n \nVertis climbs out of the air duct and hangs upside down.\n\nHe looks left and right. The coast appears to be clear.\n\n'Coast is clear, let's go' \n\n'Wait a second, why have the alarms gone off, I don't like this at all!' you say.\n\n'Stay the fuck in here then! Dammit' Vertis snaps at you.\n\n'Guys, cool it' Yolanda says.\n\n'This is a trap guys, this is too easy. I think we should bail, abort the mission' you say.\n\n'What? No! Let's go! Vertis says.\nyou look over at Yolanda with a concerned face.\n\n'I’m with him' Yolanda says, pointing over at Vertis.\n\nVertis slowly removes the cover of the air vent and climbs down into the deserted corridor.\n\n'It's clear guys. Let's go!' Vertis says.\n\nYolanda turns to you. \n\n'You coming?'\n\n'Don’t go down there, this is a trap. I can feel it' you say.\n\n'I'm sorry, I can’t leave him, we’re a team' Yolanda Says.\n\nYolanda climbs down from the air vent, you stay inside.\n\n'I’m getting out of here' you say.\n\n'Take care, I’d go the way we came in' Yolanda says. She kisses you on the cheek. you smile.\n\n'Got it, I’ll be fine' you reply.\n\nVertis and Yolanda creep through the deserted hallways of the complex. You watch them from the safety of the air vent.\n\n'Where is everyone? I don’t like this, maybe $!{name} was right' Yolanda says.\n\nYou turn around and begin to crawl back the way you came in.\n\nYou start to feel guilty. \n\nYou slow down.\n\n*page_break  I can't just leave these idiots here\n\n\n\n", "infiltratefivepointnine": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n \n\nREVEN ENERGY HQ - AIR VENT - 08:03  \n\nYou turn around again and crawl back toward where Vertis and Yolanda got out of the air vent.\nYou hear a loud gunshot and a huge thud. You then hear a scream from Yolanda.\n\nA further gunshot is heard. Yolanda's scream stops suddenly. Further gunshots ring out.\nYou scramble through the air vent away from the scene.\n\nGunshots ring out close to you hitting the airduct. They narrowly miss you as you move quickly back toward the docking area.\nYou arrive at the blocked-up entrance of the airduct where you entered.\n\nYou athletically spin around and kick open the air vent blockage you left.\n\nYou sprint across the docking area. \n\nThe place is now swarming with armed guards.\n\n*page_break  THERE HE IS\n\n\n\n", "infiltratefour": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\nREVEN ENERGY HQ - AIR VENT - 07:37  \n\nYou hear a guard arrive on the scene from inside the air vent.\n\nThe guard gets on his radio.\n\n'They’re inside! Stay alert'\n\n'Roger, that, we'll get them don't worry'.\n\n'Good thinking back there' Yolanda says.\n\n'Yeah. Nice work' Vertis says.\n\n*page_break These guys are amateurs!\n\n\n\n\n", "infiltratefourpointfive": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\nREVEN ENERGY HQ - AIR VENT - 07:48  \n\nYou begin to look more frustrated. \n\n'Yeah no shit. You guys done shit like this before? Damn! That could have been it for us!'\n\n'Stay focused would you!' Vertis replies. \n\nYou look Vertis in his eyes. \n \n*page_break Why don’t the blueprints match what we planned? How old are they?\n \n", "infiltratefourpointnine": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\nREVEN ENERGY HQ - AIR VENT - 07:51  \n \n'It doesn’t matter now, the plan hasn’t changed. Keep it down, would you?' Vertis whispers\n\nYou continue crawling through an air vent inside the Reven Energy HQ building.\n\nVertis begins to plant explosives as he crawls through the vent. You approach the end of the air vent. There are now alarms\ngoing off inside the Reven energy building.\n \nYou see guards running around inside the building from inside the air vent.\n\nVertis whispers over to you. 'Shit! OK, onto plan B, let's change into our uniforms here.\n\n'What? We are inside an air vent for god's sake!' you say angrily.\n\n'THIS ISN'T THE TIME, JUST DO IT' Vertis says. Yolanda sighs. \n\n'Keep your goddamn voice down would you? Come on guys, let's focus. Lets get into the uniforms, finish laying the explosives\nand get the hell out of here'. \n\nYou reach for your Reven Energy uniforms from inside\nyour backpacks and squeeze into Reven energy employee overalls.\n\nChanging inside the air vent makes loud banging noises. \n\n*choice\n  #Finish changing into your Reven uniform as quietly as possible\n   You slip into your uniform slowly\n   *set stealth +10\n   *finish\n  #Don't worry about the noise, efficiency is key, we have to get in the uniforms and blend in with the staff to escape\n   You squeeze into your overalls as quickly as possible. You make banging sounds inside the vent, and end up\n   making dents inside the vent.\n   *finish\n\n", "infiltrateone": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nREVEN ENERGY HQ COMPOUND - 07:13  \n\nYolanda finishes cutting the hole in the fence and Yolanda, you and Vertis enter the Reven Energy grounds.\n\nYou continue through the forest, and begin to see bright security spotlights, that slowly rotate to patrol the surrounding forests.\n\nYou approach the edge of the forest. \n\nThe Reven energy HQ is directly in front of you, surrounded by a large river.\n\nThe large patrolling spotlight moves across the surrounding forest slowly. \n\nYolanda & Vertis wait at the edge of the forest, just outside of the spotlight patrol zone. You wait next to them.\n\n'This place is like a prison!' you say out loud.\n\n'I know, it's horrible, that's why I left,' Yolanda says.\n\n'OK guys, this is it, you know what to do guys, keep it tight' Vertis whispers.\n\nYou and Yolanda nod together.\n\n'Let's do this' Vertis says\n\nYou put on diving equipment & snorkels.\n\n'Ok, when the spotlight moves to the furthest point east let's move' Vertis says.\n\nThe large spotlight moves over where you are sitting and pauses. \n\nIt slowly moves to the east side of the compound.\n\n*page_break OK, go!\n\n\n", "infiltratesix": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n \n\nREVEN ENERGY HQ - AIR VENT - 08:09\n\nYou duck behind various shipping containers in the docking yard until you reach the water.\n\nYou dive into the water and swim toward the exit.\n\nGunshots fly through the water as you swim.\n\nYou burst out of the water, you take a huge breath and pause on the shore for a moment.\n\nYou get up and sprint back through the forest, to where Yolanda cut the hole in the fence.\n\nYou run through the hole in the fence and sprint through the forest, away from the Reven compound.\nYou let out a tiny smile of relief.\n\nYou see a red dot flash across your body. A gunshot is heard. '\n\n'Oh SHIIIIT'\n\nYou drop to the floor --- you have been shot.\n\n*page_break Two weeks Later\n\n\n\n", "infiltratethree": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n \n\nREVEN ENERGY HQ DELIVERY ENTRANCE - 07:32  \n\n'This is bigger than we planned for, it's different to the blueprints as well' you whisper to yourself.\n\nVertis gestures with his hands for you to be quiet.\n\nYou kneel behind a large shipping container.\n\nVertis peeks around the corner.\n\nHe sees a guard standing there, the guard appears to be staring directly toward Vertis.\n\n\n*choice\n  #Throw a nearby stone close to the guard in an attempt to distract the guard\n    *choice\n      #Taunt the guard\n        You make loud sheep noises before hiding again behind the shipping container.\n        *set stealth +10\n        *finish\n      #Stay still, let the guard walk away from the area.\n        The guard is distracted for a short moment. But his attention stays fixed on the shipping container you hide behind.\n        *set stealth +10\n        *finish\n  #Attempt to rush the guard and try and knock him out.\n    *choice\n      #attempt to punch the guard\n        You attempt to rush and knock the guard out. It does not work. You run away and hide back behind the shipping container.\n        *finish\n      #hit the guard with a nearby pole\n        You attempt to hit the guard with a rusty metal pole. The guard dodges the swing and pulls the pole out of your hand.\n        \n        He is well trained. You run away and hide behind the shipping container.\n        *finish\n", "infiltratethreepointfive": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n \n\nREVEN ENERGY HQ DELIVERY ENTRANCE - 07:46  \n\nThe guard walks toward the water of the docking area and scans the docking yard.\n\n'Coast is clear down here' says the guard on his radio.\n\nYou hide next to various shipping containers as you move toward a large air duct. \n\nYolanda removes the wire cutters. She cuts around the seal of the large air duct.\n\nThe air duct breaks off easily and smashes against the floor, making a loud crashing sound.\n\nThe guard jumps and turns his head. He runs towards the sound. You all scramble inside the air duct.\n\nVertis climbs down, grabs the metal air duct cover and attempts to re attach it. You begin to get angry.\n\n'Leave it guys, what are you doing? Let's go, They know we are here now!'\n\nYolanda and Vertis get into the airduct.\n\n \n\n*choice\n  #You see a small plastic container to the side, quickly grab it and put it against the air duct, blocking it.\n    *choice\n      #Taunt the guards before escaping into the air duct\n        You make loud sheep noises before scampering into the air duct.\n        *finish\n      #Escape into the air duct quickly\n        You climb into the air duct joining Yolanda & Vertis\n        *set stealth +10   \n        *finish\n  #Do not bother to attempt to block the air duct, the guards already know you are there.\n    You climb into the air duct and attempt to escape the guard. The guard catches you and grabs onto your foot.\n    *choice\n      #shout for help\n        You shout for help. Yolanda hears. She crawls back to help you and stabs the security guard with a screw driver. You both escape.\n        *finish\n      #kick the guard away.\n        You kick at the guard and attempt to shake him off. You knock him out and catch up with Yolanda and Vertis.\n        *finish\n \n\n\n\n\n\n", "infiltratethreepointtwo": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n \n\nREVEN ENERGY HQ DELIVERY ENTRANCE - 07:42  \n\n'Shit' Vertis whispers. \n\nYolanda peeks around the corner, the guard is looking for you.\n\n'It's, OK, he's turned back around now, I don't think he knows where we are.'\n\nVertis attempts to move closer to the delivery entrance. You pull him back.\n\n'Guys, this doesn’t match our blueprints at all, you sure we’re gonna be OK doing this.?\n'Sure, we are. I know what I'm doing. Let's go.'\n\nVertis takes another peep behind the corner of shipping container.\nThe guard is still looking the other way.\n\n'Go' Vertis whispers.\n\nThe group run from behind the shipping container. The guard stays looking the other way.\nThe guard slowly begins to turn around. The group take a sharp left turn and hide behind another shipping container.\n\nThe guard turns around fully. He stares curiously at the shipping containers you are hidden behind. \n\nHis radio goes off.\n\n*page_break STAY ON THE LOOKOUT, LOOKS LIKE THERE'S INTRUDERS ON THE COMPOUND\n\n", "infiltratetwo": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\nREVEN ENERGY HQ COMPOUND - 07:24  \n\nYou run toward the river surrounding the complex and dive in. Vertis leads the way.\n\nYou swim deeper until you arrive at a large circular shaft, directly below the Reven Energy HQ building.\n\nVertis removes a mechanical drill like tool from his pocket and cuts the shaft open.\n\nYou swim through the shaft, for several minutes. You reach the end of the shaft, and immediately swim to the surface. \n\nYou are in what appears to be a docking delivery area for the compound.\n\nYou reach the surface of the docking area at the same time as Yolanda and Vertis.\n\nYou swim to the bank and get out of the water.\n\n*choice\n  #Proceed with caution and scan the docking area\n   You scan the docking area a see a guard a patrolling. You signal to Yolanda\n   and Vertis to proceed with caution.\n   *set stealth +10\n   *finish\n  #Charge through the docking area, time to Rock 'n Roll! \n   You charge through the docking area like a bull in a china shop.\n   A guard sees you and trips you up. He raises a gun to you head.\n   Vertis strangles him from behind and stares at you.\n\n   'WHAT THE HELL ARE YOU DOING?'\n\n   You continue into the Reven Compound\n   *finish\n\n\n\n\n", "invasion": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\n\nREVEN GREEN ENERGY COMPOUND - 15:34\n\nYou are at the Reven Green Energy compound getting on with your work. \nYou attempt to work quickly and efficiently, you have a determined look on your face.\n\nYou make the Reven compound spotless, removing all rubbish and polishing the large\ncircular towers that are scattered around the compound. They shine in the sun.\n\nYou look up and notice Mike watching you again through an office window. \nHe gives you a subtle nod. You return the nod and carry on with your work. \n\nMike opens the window and shouts over to you.\n\n'NICE WORK ${name}, KEEP IT UP!'\n\n*choice\n  #Thank you! I'm trying\n   'Carry on like that and you'll do OK around here' Mike says\n   *finish\n  #Ignore Mike\n   You ignore Mike and focus on the job. Hes just distracting you!\n   *finish\n\n \n", "invasiontwo": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\n\nREVEN GREEN ENERGY COMPOUND - 15:57\n\nSuddenly a loud siren rings out across the compound. The siren is so loud it hurts your ears. You cover your ears.\n\nYou stop what you are doing and look around.\n\nYou see guards running around frantically and shouting.\n\nMike runs out of the office.\n \n'What’s going on?' You ask \n\n'Don’t worry about it ${name}, carry on!'\n\n'You, sure? Can I help with anything?' \n\n'You’re fine, just carry on. I want that whole area cleared remember'\n\nMike runs away in the direction of the entrance of the Reven compound.\nThe loud siren continues to ring out across the compound.\n\nYou continue with your work. You hear screams. \n\n'What The hell is going on here?' you say out loud.\n\nYou try to continue with your work again. You hear distant gunshots ring out across the compound.\n\nYou throw your spade down and run toward the entrance of the compound.\n\nYou notice guards laying on the floor and groaning.\n\nYou run past other guards who appear dead. You check one of the guards' pulse. They are dead.\n \n'Holy shit'\n\n*choice\n  #Shout for medical assistance \n   You scream out for medical assistance. On site doctors and nurses begin to rush over and assist\n   the wounded guards.\n   *set exodus +10\n   *finish\n  #Sprint away from this area, its getting dangerous\n   You sprint away to another part of the compound.\n   *finish\n\n\n", "invasiontwopointfive": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\n\nREVEN GREEN ENERGY COMPOUND - 16:30\n\n\nYou dash into the main building of the complex. You see more injured guards as you run along.\nThe deafening sirens continue to ring out across the complex. You see office staff running \naround in different directions. The place is in complete chaos.\n\nMike comes running round the corner clutching his chest. He stumbles into you. He has blood on his shirt.\nYou catch him as he falls into you, you lay him on the floor. \n\n'What's going on? What's wrong with you?'\n\n'There's been a breach, get out of here! I've been shot' Mike says. \n\nHe is shaking.\n\n'Tell me what's happening, I can help' you say.\n\n'Its climate activists, they're inside the compound' \n\n'Why? This is a green company now, isn't it? Why would climate activists have an issue with the company now?'\n\n'No idea, go and ask them,' Mike says. \n\nYou gulp.\n\n'Tell me where they are' \n\nMike passes out as you ask him where the intruders are. \n\nYou look down at Mikes hand, it is pointing toward the hydro generator rooms.\n\n*page_break Time to earn your keep\n\n", "invasiontwopointnine": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\n\nREVEN GREEN ENERGY COMPOUND - 16:47\n\nYou sprint in the direction Mike was pointing in. You run past more injured guards laying on the corridor\nfloors. You notice a gun lying on the floor. You pick it up and continue to run through the complex. \nThe sirens going off on the compound finally turn off. \n\nThere is now complete silence.\n\nYou recognize a part of the complex during the attempted infiltration you attempted with Vertis and Yolanda earlier in the story.\nYou wonder toward the part of the complex you recognize. \nYou look up at the ceiling.\n\n'I know where I'd be' you say out loud.\n\nYou keep your eyes on the ceiling as you continue to wonder through the complex.\n\nYou hear rustling coming from the ceiling. It is coming from the same air vent where you hid.\n\nYou aim your gun and fire several shots at the ceiling. Loud thuds are heard.\nYou jump up and hit the ceiling hard with your gun.\n\nThe weak material of the air vent cracks open and crumbles, two bodies hang\nout, dangling from the roof. \n\n'Gotcha' you say. You look happy.\n\nArmed guards approach the scene.\n\n'FREEZE! ${name}!'\n\nYou raise your hands; you're still holding a weapon.\n'DROP THE WEAPON & GET ON THE FLOOR' the guard says.\n\nYou drop the weapon.\n\n'It's OK, I work here' you say. 'Don't shoot!'\n\nYou hold up your Reven Green Energy employee pass.\n\nA small needle is fired by one of the guards --- it goes into\nyour neck. It knocks you out, almost instantly.\n\nYou fall to the floor.\n\n*page_break The next day\n", "jam": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\nSAFEHOUSE - 09:00AM\n\nVertis is inside a large room standing in front of a dilapidated white board.\n\nThe whiteboard is covered in various blueprints, and photos of various industrial compounds.\n\nYou sit in front of Vertis on rusty fold up chairs, next to Yolanda. \nVertis speaks loudly, despite there only being 3 people in the room.\n\n'The train sabotage doesn't seem to have made much difference, it's time we are more direct.'\n\nVertis points to a map pinned onto the whiteboard. You notice text written in large capital letters at the top of the map.\n\n*page_break Reven Energy HQ\n\n", "jamone": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\nSAFEHOUSE - 09:34AM\n\nVertis points to the whiteboard. \n\n'We infiltrate the compound, find our way to the control room, trigger the fire alarm, we’ll rig\nthe place as we go in, we’ll then evacuate and escape with the employees as they leave the compound. We’ll blend right in'\n\n'And then what? Surely, they do fire drills anyway, especially a corporation this size' You ask.\n\nVertis takes a deep breath. \n\n*page_break I’ve got access to explosives. We liberate the compound\n\n\n", "jamonepointone": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\nSAFEHOUSE - 09:51AM\n\nThere is silence across the room.\n\n'Whoa' says Yolanda.\n\n'Sounds good, we'll have to ensure everyone is at a safe distance before you trigger any explosives, right?'\n\nVertis does not respond.\n\n'RIGHT?' you ask.\n\n'Time will be precious, the staff will have enough time to get to their evacuation meeting points'. Vertis answers.\n\nYou shake your head in disappointment.\n\n'Do we have a plan to get in? What is security like?' Yolanda asks.\n\n'It's going to be tough, but do-able. I've managed to get blueprints of the entire compound. Along with\nshift rotas for all of the guards' answers Vertis.\n\n'What happens if we are caught? Whats the plan then?' You ask.\n\nVertis looks over at you.\n\n'Don’t think about that, our plan is pretty solid. Come on, we’ve got a\nlot of preparation to do'.\n\n'Where did you get all this Intel?' You ask.\n\n'I worked there four years ago, I still have contacts there,' Yolanda says. I saw what they were like and didn't know what to do, then I met Vertis at a protest and we\njoined forces'.\n\n'Oh, cool, makes sense' \n\n'Like I mentioned earlier, most of their security are ex-military private contractors, mercenaries\nbasically' Yolanda says with a concerned face.\n\n'Got it' \n\n'Let's get to work' Vertis says.\n\nVertis marks out entrance routes to the compound on his blueprints, seeming to have\neach detail planned with precise accuracey.\n\n*page_break 6 hours later\n\n", "jampointone": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\n\nSAFEHOUSE - 09:16AM\n\n'Wait, are we are going in there? Isn’t that a bit dangerous. These guys don't play around, isn't their security a private military company or something?' says Yolanda.\n\n'It's the only way. We need to be more direct if we are going to stop these guys' Vertis says.\n\n'There's no chance we can stop them.' Says Yolanda.\n\n'Well, we can slow them down, or at least disrupt their operations. These guys are one of biggest polluters in the country. I’ve heard there are plans\nfor them to turn into a fully focused green energy company, I’m not buying it. They are just pandering to the media.'\n\n'That was that train you guys hit in the forest wasn't it' you say.\n\n'Yes, they’re called Reven Energy, soon to become Reven Green Energy,' Vertis replies.\n\n'If they are becoming a green energy company, why are you targeting them? Surely, they are heading in the right direction?'\n\n'Like I said, that's all PR and fake green advertising. They’re not only not a green company, I've got intel they’re also\ninvolved in chemical weapons development funded by Russia and North Korea too. Most of the energy they create still comes from fossil fuels.'\n\n'So, what are we going to do?' You ask.\n\nVertis points at the map. \n\n'We are going to hit them hard this time, from the inside.'\n\n'How hard? I don’t want to kill anyone' Yolanda says, with a concerned face.\n\n'Don't worry, I’ve figured out a way to avoid that too,' Vertis says.\n\nVertis looks over at you.\n\n'What's your view on this $!{name}? Are you concerned about potential collateral of this job.\n\nYou stand up.\n\n*choice\n  #For me, the juice is the action. Who cares about collateral, lets hit them hard.\n    You sit back down.\n    \n    'Wow, $!{name} is the real deal' Vertis says.\n    *finish\n  #I agree with Yolanda. I do not want anyone to get hurt. I don't want a scratch on them. This is not what I am about. \n    'OK, that's fine we'll stick with my plan' Vertis says.\n    *set exodus +10\n    *finish\n\n\n\n", "jamtwo": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nTHE NEXT DAY \n\nSAFEHOUSE - 15:53\n\nYolanda slumps into her chair. \n\n'I need to relax'\n\nShe removes a joint from her pocket and lights it.\n \nShe takes a couple of puffs on the joint and passes it to Vertis, who takes a couple of puffs.\n\nVertis passes the joint to you, \n\n'Wanna hit $!{name}?'\n\n*choice\n  #Take the joint and get high.\n   You take the joint and take a couple of puffs. The three of you continue to get high and all fall asleep in your chairs. \n   *finish\n  #I'm OK thanks. We should keep a clear head for tomorrow, we'll need it for sure.\n\n    'Suit yourself' Vertis says with a smirk on his face. He takes the joint and passes it back to Yolanda.\n\n    'I'm gonna go back to my room, I want to be fresh for tomorrow' you say. \n\n    Vertis and Yolanda stay in the room and get high.\n\n    You head back to your room and fall asleep,\n    almost instantly\n    *set exodus +10\n    *finish\n", "journey": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nFLAT - 07:03\n\nYou are woken by your alarm.\n\nYou check your phone for messages. You were hoping to have a few messages from Sybel --- nothing.\n\nIt's time to head out on your mission. You wish you had a team to work with and were not doing this all on your \nown but that's how it goes! Remember what happened last time you worked with a team, they both ended up dead!\n\nYou open the GPS app on your phone and try to cast your mind back to the days you were exploring  \nnear Alpine National Park, and the strange people you encountered.\n\nYou take your backpack but do not put much in it, best to travel light you think to yourself.\n\nTime to get a move on.\n\n*choice\n  #Text Sybel before you leave\n   You text Sybel.\n\n   HOW U DOING? X $!{name}\n\n   You wait for a response. Nothing. You wonder what she is up too. You cannot stop thinking about her.\n\n   You leave the house, you head straight to the bus stop. You ly arrive at the top floor of the Alpine Mall.\n\non the top floor there is a large supermarket and a cinema.\n\nThe approach the supermarket with caution. You are expecting to run into some sort of maniac activist group, but you are\nready.\n\nThe supermarket is fully stocked compared to the last one you where at.\n\nYou fill your bag up with canned soup and a couple of bottles of water. That will keep you going.\n\nYou notice there is not a single animal related product inside the store. \n\nYou see the 'ANIMAL REBELLION' text spray painted on the wall inside the supermarket.\n\nThey're not so tough you think to yourself as you pile as much as you can into your backpack.\n\nYou leave the supermarket and head over to the cinema. All of the posters are for films that came out\n\nyears ago. There doesn't appear to be any staff around.\n\nYou walk into Screen 1. \n\nAs you enter you see 20 people sitting in the audience, all wearing plain white masks.\n\nThey all stare at you at the same time. You weren't expecting that many!\n\nYou attempt you run out of the screen but you are knocked out by another person wearing a plain white\nmask.\n\nYou wake up and are surrounded by the people in white masks. They back away and a single member approaches you.\n\nThis must be the leader you think to yourself.\n\n'I have one question for you' the masked leader says.\n\n'Go on then' you say.\n\n'Do you use animal products?'\n\n*choice\n  #No. I am a vegan\n   'Good answer' The leader says.\n\n   'You can die quickly'\n\n   The leader removes a knife and attempts to stab you. You dodge it and grab the leaders knife from him.\n\n   He is very weak you think too yourself. Vegans eh?\n\n   You hold the knife to the Animal Rebellion leader. The Animal Rebellion members plead to you to spare him.\n\n   'You guys better leave this town, If you run into me again it will be the last time, that clear? Oh, and remove those stupid masks please'\n\n   The members nod and remove their masks.\n\n   You quickly leave the mall using the Animal rebellion leader as a hostage.\n\n   You head down the escalator and knock out the leader. You flee into a nearby forest. Time to get back on track!  \n   *finish\n  #I use some animal products, but I'm a vegetarian\n   'Not a terrible answer' The leader says.\n\n   'You can die quickly'\n\n   The leader removes a knife and attempts to stab you. You dodge it and grab the leaders knife from him.\n\n   He is very weak you think too yourself. Vegans eh?\n\n   You hold the knife to the Animal Rebellion leader. The Animal Rebellion members plead to you to spare him.\n\n   'You guys better leave this town, If you run into me again it will be the last time, that clear? Oh, and remove those stupid masks please'\n\n   The members nod and remove their masks.\n\n   You quickly leave the mall using the Animal rebellion leader as a hostage.\n\n   You head down the escalator and knock out the leader. You flee into a nearby forest. Time to get back on track!  \n   *finish\n  #I do, I use animal products and I eat meat.\n   'Wrong answer' The leader says.\n\n   'You will die slowly'\n\n   The leader removes a knife and attempts to stab you. You dodge it and grab the leaders knife from him.\n\n   He is very weak you think too yourself. Vegans eh?\n\n   You hold the knife to the Animal Rebellion leader. The Animal Rebellion members plead to you to spare him.\n\n   'You guys better leave this town, If you run into me again it will be the last time, that clear? Oh, and remove those stupid masks please'\n\n   The members nod and remove their masks.\n\n   You quickly leave the mall using the Animal rebellion leader as a hostage.\n\n   You head down the escalator and knock out the leader. You flee into a nearby forest. Time to get back on track!  \n   *finish\n", "journeyfour": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nALPINE - MALL - SECOND FLOOR - 21:47\n\nYou walk through the second floor of the mall slowly.\n\nYou walk past some clothes shops, mostly fast fashion. Not really your thing since you've got a decent job.\n\nBeing around smooth operators like Mike has taught you how to dress, especially in a senior role like yours.\n\nyou stop outside a suit shop that catches your eye. You could use a new suit for parading around \nthe Reven compound.\n\nYou enter the store and proceed to try on some of the suits.\n\nYou grab several blazers and walk over to the changing rooms.\n\nYou pull back the curtain. \n\nThere is a body there of a middle aged man.\n\n\n*choice\n  #Attempt to revive the man. You have to do something! \n   You use your first aid training you received at Reven and attempt to revive the man.\n\n   He regains consciousness and slowly gets to his feet.\n\n   'Thank you sir, you saved my life.'\n\n   'What are you doing here?' You ask the man.\n\n   'I'm the owner of this store, I was knocked out by some Animal lunatics, some sort of activist group.'\n\n   'Animal Rebellion' You ask?\n\n   'That's the one, I saw them while I was semiconscious, they headed to the top floor of the mall.'\n\n   You peek up to the top floor of the mall.\n\n   'We should get the hell out of here, it's not safe. They attacked me because I sell wool suits!'\n\n   'You get out of here, I'll deal with our animal loving friends.'\n\n   'They've taken over the whole town, this used to be a thriving town! Look at it now!'\n\n   'It's a state I know. I've just walked through it' \n\n   'You going to go up there?'\n\n   'Yeah, I need supplies, Don't worry I can handle myself'\n\n   'You're crazy!' The man runs away and scrambles down the broken escalators to escape the mall.\n\n   You leave the store and head to the top floor of the mall. Time to sort these idiots out.\n   *set exodus +10  \n   *finish\n  #Continue to try on suits, that guy looks dead anyway.\n   You continue to try on suits. You look cool but it's very uncomfortable with a body laying next to you.\n   You leave the store and head to the top floor of the mall.\n   *finish\n  #Leave the body there and get the hell out of there. The offenders could still be here.\n   You leave the store and head to the top floor of the mall. \n   *finish\n", "journeyone": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nALPINE - 20:03\n\nThe bus pulls into the small town of Alpine at around 8pm, around an hour and a half later than scheduled.\nThat's what you get for taking the bus instead of the train you think to yourself.\n\nIt is still light outside and the sun has almost set.\n\nYou wake up as soon as the bus pulls into the station. You grab your bag, thank the driver and hop off the bus.\nAlpine bus station is even worse than your local bus station. There is not a single bus around and the station \nappears abandoned. Out of curiosity you have a look around the bus station. You've spent all your time at the \nReven compound, it's good to get away and do some exploring!\n\nYou enter the bus station main building. The inside is huge. Each of the ticket offices are sealed shut with metal shutters, each\nof them with large amounts of rust on.\n\nYou see a man laying on a bench with a needle in his arm. There is graffiti all over the inside of the building as well as the outside.\nYou walk over to a nearby window and peek out. You see train tracks and abandoned train carriages outside. You see children playing \non the tracks. A middle aged woman calls them to get closer from the window of one of the carriages. It appears they are living there.\n\nYou leave the station and walk into the town. almost every shop is boarded up. It looks abandoned. You see people living in mobile homes\nthat are parked up on the edge of the street. \n\nWhat happened to this place you think to yourself.\n\nYou start to get hungry, you need some food. You continue along the deserted main street. You see a couple of fried chicken shops but they are all\nboarded up. Perfect.\n\nYou continue to walk until you approach a huge retail park with a row of superstores. One of them appears to be a supermarket.\n\nMust be something in there you think.\n\nYou walk through the carpark toward the superstores past a couple of burnt out cars. \n\nAs you get closer you notice all of the stores are abandoned. Even the supermarket.\n\n\n*choice\n  #I'm not a criminal, lets take a look around the back of the supermarket. There must be something in this town!\n   You walk to the rear of the store. You see a large semi-truck close to the rear of the store that appears to have been set on fire.\n   \n   Must have been delivering to the store you think. What happened then? You approach the truck and peek inside.\n\n   There are people living inside the trailer. They look like zombies. They stare at you with blank faces.\n\n   'Is there anywhere I can get food around here?' you say to them.\n\n   There is no response. an elderly man points east.\n\n   'Thanks' you say.\n\n   You continue into a forest at the rear of the superstore.\n   \n   *finish\n  #Break into the supermarket and search for food.\n   You smash the glass at the front of the store with a nearby rock. You then use the rock to smash out enough of a gap for you to slide through.\n\n   You enter the large store with caution. The store is huge.\n\n   There are 15 checkouts, all of them with the till screens smashed. \n\n   You slowly walk past them and explore the store. The shelves are almost empty, there are a few cans of beans left.\n\n   It's not much but it will keep you going! You throw a few cans in your bag and continue through the superstore. You do not have a tin opener but you'll have to\n   figure something out!\n\n   You continue through the store cautiously. You have a quick look around to see if there is anything else you can take to use on your travels.\n\n   You find nothing and leave the superstore through the store room.\n\n   You see a large semi-truck close to the rear of the store that appears to have been set on fire.\n   \n   Must have been delivering to the store you think. What happened then? You approach the truck and peek inside.\n\n   There are people living inside the trailer. They look like zombies. They stare at you with blank faces.\n\n   'Is there anywhere I can get more food around here?' you say to them.\n\n   There is no response. an elderly man points east.\n\n   'Thanks' you say.\n\n   You use your phone to find how to open a can without a can opener. \n\n   You scrape the can across the concrete floor until it is damaged enough to open. You break it open and heat up your beans using a plate you found and a fire.\n\n   Not the most hygienic but it will have to do.\n\n   You eat your beans and continue into a forest at the rear of the superstore.\n   *set exodus +10\n   *finish\n\n\n\n \n\n\n  \n\n", "journeythree": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nALPINE - MALL - GROUND FLOOR - 21:15\n\nYou walk through the mall slowly.\n\nEven though the automatic doors still work it appears all of the shops are abandonded.\n\nHow could any business survive in this town?\n\nThe mall is huge, with 3 floors. You see signs for a cinema on the top floor.\n\nHow you'd love to chill out and watch a movie right now. No time for that. You need to get some food and get on your way!\n\nYou walk into an arcade, which is divided into two rooms. Once containing various games for children and young people and the other room\ncontaining slot machines.\n\nYou enter the adult section and proceed to play on the slot machines. You might as well. You do have some cash on you and it doesn't appear\nthere is anywhere to use it!\n\nYou play for around 10 minutes on a game called 'FLAMING 7's.\n\nYou end up hitting the jackpot, and coins rush out from the machine.  \n\nYou cannot carry all of coins on your travels surely!\n\n\n*choice\n  #Take this to one of the many homeless around this place, they need it more than me!\n   You take the coins and find the nearest homeless person. It doesn't take long.\n   \n   You see one sleeping in a teenage girls jewelry store next door. \n\n   You approach the young man and pour the coins next to him.\n\n   He wakes up and looks at you as if you are god. There are tears in his eyes.\n\n   'THA THANK YOU SO MUCH' says the young man.\n\n   'Pleasure' you say.\n\n   You walk away and up the broken escalator to the second floor of the mall. \n   *set exodus +10\n   *finish\n  #Keep the money on me, it may come in handy, it will weight me down though!\n   You cram all the coins into your pocket and head up to the second floor of the mall. \n   *finish\n  #Leave the coins there, you have a decent job. This is chump change! \n   You leave the money there. Someone who needs it will find it soon enough!\n   You walk away and up the broken escalator to the second floor of the mall. \n   *finish\n", "journeytwo": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nALPINE - FOREST - 21:03\n\nYou walk away from the superstore and continue through a forest. You are still a couple of miles away\nfrom where the Exodus camp is supposed to be. You need to get some more food. You didn't think it would\nbe so post-apocalyptic around this place! \n\nYou walk through a forest heading east, as the elderly gentleman said too back at the superstore.\n\nIt's a slight de-tour from where you are heading but you need to stay fed and keep your strength up.\n\nYou continue walking through the forest for about an hour. The sun is now setting. You better find somewhere \nand settle down for the night.\n\nYou see some faint light in the distance and head toward it, you must be approaching some sort of civilization now!\n\nYou approach the edge of the forest. The lights you saw appear to be street lights for a huge carpark.\n\nLooks like it's a mall!\n\nYou walk through the car park and approach the mall. The car park is lit but main building looks extremely dark.\n\nDon't tell me this is abandoned as well you think too yourself. You feel like you are in a Mad Max movie!\n\nYou walk closer to the mall and notice a huge logo and text in graffiti on the front of the mall.\n\nANIMAL REBELLION\n\nThe logo is just the anarchy logo incorporated into the A of Animal. Not the most creative you think too yourself.\n\nThe mall appears to be closed or abandoned, you can't really tell at this point. It is pretty late!\n\nYou approach the main entrance of the mall and the automatic doors slide open. You almost jump back you are so surprised.\n\n*choice\n  #Walk into the mall with confidence, but caution\n   You walk into the mall calmly and with confidence.\n   *set stealth +10   \n   *finish\n  #Storm into the mall\n   You break into a sprint and storm into the mall. The inside is slippy and you fall over.\n   Not the best idea!\n   *finish\n  #Do not enter the mall for now, hang back for a moment and see what happens\n   You hang back and see if anyone reacts too your approaching.\n\n   You wait there for 10 minutes before entering cautiously.\n   *finish\n", "locate": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\nAPARTMENT - 15:45\n\nYou arrive home from school. \n\nYou enter your apartment and see a letter on your mat. You pick it up and tear it open:\n\nEVICTION NOTICE - RENT NOT PAID - FINAL LETTER BEFORE COURT ACTION\n\n'SHIT' you say out loud. \n\nYou toss the letter to the side and begin packing the few belongings you have into a backpack. \n\n*choice\n  #Leave the apartment tidy and clean, leaving the key in the front door.\n    You give the apartment a quick clean, text the landlord to let me know you are leaving. and head out.\n    Time to locate Exodus.\n    *set relationships +10\n    *finish\n  #Trash the place, the landlord is annoying and has been ripping you off with the rent.\n    You trash the apartment and spray graffiti on the walls. One of your neighbors calls the police but\n    you do not care. You flee the scene as you hear sirens approaching.\n    Time to locate Exodus.\n    *finish\n  #Set fire to the apartment.\n    You set fire to the curtains of the apartment. They go into an intense blaze instantly and you set off\n    the fire alarm. One of your neighbors bursts into the apartment with a fire extinguisher and puts out \n    the fire. Turns out it's the landlord! No wonder he cared so much. He asks how the fire started and\n    you shrug your shoulders. The landlord then accuses you of starting it and calls the police. \n    \n    You grab your things and leave. Time to locate Exodus.\n    *finish\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "locateone": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\nCHAPTER II - THE JOURNEY\n\nBUS STATION - 11:45\n\nYou walk to a nearby bus station. The place is crawling with drug addicts and homeless people.\nYou reach into your pocket and toss a coin into a metal pot next to a passed out homeless person. They don't react and stay laying down.\nYou notice a needle in the person's arm. You walk along quickly.\n\nYou notice graffiti on the bus station wall showing the Exodus logo, with the E being replaced\nas a peace symbol rotated 90 degrees anti clockwise. A symbol for their extreme views and the action they take on climate criminals.\n\nYou walk up to the ticket office and talk to the clerk. \n\n'Where you goin' honey?'\n\n*page_break One ticket to the Alpine National Park\n\n\n", "locatethree": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nFOREST - 18:56\n\nYou walk through the forest, towards the smoke you saw from the bus.\n\nYou see an old warehouse in the distance, the smoke appears to have been coming from the warehouse but has now stopped.\n\nYou approach the warehouse slowly. \n\nYou hear a voice in the distance. \n\n*page_break STOP \n\n", "locatethreepointfive": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nFOREST - 19:56\n\nYou continue to walk through the deep forests. Time passes as you walk for hours.\n\nEvening approaches, the sun sets, and you begin to feel tired. \n\nYou stop in your tracks and sit on the forest floor, dumping your large duffle bag next to you.\n\nYou think about what direction to head. You are stuck.\n\n'Where are these guys?'\n\n*page_break You fall asleep on the forest floor \n\n", "locatethreepointthree": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nFOREST - 19:58\n\n'OK, well, are you able to point me in the right direction? What are you guys doing out here?'\n\n'THAT'S NONE OF YOUR BUSINESS, KEEP IT MOVING WOULD YOU, BEFORE WE LOSE OUR PAITENCE.'\n\nYou sigh in frustration.\n \nI've got nowhere to go, are you not able to give me any pointers?'\n\nYou hear vague mutters of 'STUPID KID' in the distance. \n\nA man in his 40s walks out from behind the burnt-out warehouse. \n\nHe is dressed all in white and has long hair and a beard. \n\n'Oh, Hi! Nice to meet you!' you say enthusiastically. \n\n'Why are you looking for The Exodus camp? They will not be found unless they want to be, did you should know that?' \n\n'I’ll find them, don’t you worry about that. What are you guys doing out here then?' You say.\n\n'We are environmentalists who live off the land, we just don’t believe in the aggressive action groups like\nExodus take'\n\n'You think there's another way? What was the fire for?'\n\nThe cult member does not answer, but slowly raises his hand, pointing to the east.\n\n'There are a number of groups around these parts, if you head that way, they maybe able to help you. I'm pretty sure EXODUS are\nnot around these parts, way too obvious for them.' \n\n'OK, thanks!' You say.\n\nYou pick up your duffle bag and walk away from the warehouse.\n\nThe cult member walks back into the warehouse building.\n\nAs you are about to walk away you you notice your school friend Amy stumble out from behind the warehouse.\n\nShe looks drugged, and her eyes beam at you.\n\n'Help Me'  she whispers.\n\n*choice\n  #Leave her there. You have to focus on finding the Exodus camp.\n    You ignore Amy and walk away from the scene. Amy attempts to catch your attention but you do not\n    care. You continue looking for Exodus.\n    *finish\n  #This cult is crazy, you have to save her, there's no way you can just leave her there!\n    You charge at the camp and punch each member in the face. You do not like violence but\n    the way Amy has been treated has driven you to the brink. The group are not violent themselves and\n    instantly surrender to your aggressive charge. You take Amy away from the camp to safety.\n\n    'Are you OK?'\n\n    'I'm fine, thank you for rescuing me, those weirdos drugged me'.\n\n    'You're OK now, I think you should head home.'\n\n    'No shit, I'm outta here'\n\n    Amy hugs you and jogs away, toward the main road. You continue looking for Exodus\n    *set relationships +10\n    *finish\n\n\n\n \n\n", "locatethreepointtwo": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nFOREST - 19:46\n\nThe voice is loud and clear. \n\nYou freeze.\n\nYou drop your large duffle bag to the floor. \n\n'Hello? Anyone there?' \n\nThe voice continues. \n\n'WHAT DO YOU WANT?' \n\n*choice\n  #Tell me where the Exodus camp is, or there is going to be trouble.\n    There is no response to your aggressive tone.\n    *finish\n  #I’m looking for The Exodus group camp. Is this it?\n    No, move along please.\n    *set relationships +10\n    *finish\n  #Attempt to rush into the warehouse \n    You attempt to go full kamikaze and rush into the mysterious warehouse. You are grabbed and thrown out\n    instantly. The mysterious group are certainly strong!\n    *finish\n\n\n\n\n", "locatetwo": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\n\nBUS STATION - 12:03\n\nThe clerk stares at you.\n\n'Why in lords name would you want to go there?' All sorts of dangerous gangs are in those forests, the bus doesn't even go near there\nanymore. It's a long time since that was a tourist destination honey'\n\n'Just get me as close as possible please' you say. You look at the clerk with an irritated face.\n\n'Whatever you say sugar, the bus will pass a village nearby, i'd recommend you walk from there'.\n\nThe clerk prints off a ticket and hands it over to you.\n\nYou walk over to the drop off point and get on the coach, you show your ticket to the driver as you get on. He nods at you\nand you take a seat at the back of the coach. \n\nYou sit on the coach as it drives through a country road. \nyou read a newspaper that shows an article on the increased police presence in the alpine national park due to numerous climate activist groups hiding out there.\n\n'Must be them' you say.\n\n*page_break You nod off\n\n\n", "locatetwopointfive": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\nBUS - 15:49\n\nWhen you wake up. The coach is speeding through a country road. The coach drives past a large sign that reads\n\nALPINE NATIONAL PARK - 30 MILES\n\nYou look out the window and see smoke rising in the deep forest. \n\n'Must be someone who knows Exodus around' you whisper to yourself.\n\nYou grab your duffle bag and run to the front of the coach.\n\n'Stop here please, I’m getting off' you say to the driver.\n\n'We’re about 50 miles from the nearest town. What are you doing out here?'\n\n'I'll be fine, here please,' you say. \n\n'Suit yourself, good luck out there!'\n\nThe coach pulls over near an abandoned petrol station and you get off.\n\nYou see whats looks like a biker gang hanging around at the gas station, all wearing leather jackets\n\nbut not a single motorcycle in sight.  \n\n*choice\n  #Go and ask the gang for directions to the EXODUS camp\n    You walk over to the gang and ask for directions to the EXODUS camp. They burst into laughter.\n    Some of the members begin to roll around on the floor they are laughing so much. Idiots, you think to yourself. \n    You head into the forest.\n    *finish\n  #Go and confront the gang. They look like worthless druggies\n    You walk over to the gang and push one of the large male members. He pushes you back and you fall to the floor.\n    The gang surrounds you.\n    You get up and sprint into the forest. They chase you but you manage to shake them off. Stupid idea. \n    *finish\n  #Avoid the gas station and head into the forest\n    You stay away from the gas station and head into the forest. You notice the gang giving you aggressive looks.\n    You enter the forest and break into a jog. You don't intend to find out what those guys are up too.\n    *set stealth +10\n    *finish\n\n\n", "london": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n*set age \"18\"\n\n*page_break\n\n*label namechoice\nWhat is your name?\n*input_text name\nAre you sure?\n*fake_choice\n #Yes\n #No\n  *goto namechoice\n\nYour name is ${name}? Great. \n\nCHAPTER I - EVANGELION\n\nTHREE YEARS LATER - CITY RAIL DEPOT - 22:46  \n\nIt is a cold night, and the heavy rain pours down on you. \nYou are at the city rail depot at night. You are dressed in all black wearing a balavclava, large backpack and carrying a torch. \nThe depot is full of train carriages,  both for passenger and freight use. \n\nYou are looking for a specific train carriage, owned by notorious climate criminals \n'EVANGELION LTD', who are also suspected of being caught up in the drug trade. \n\nYou find the carriage, drop your bag and remove \na rachet, torch and spray-paint. You hear two guards approaching.\n\n*choice\n  #Avoid the guards and quietly escape the rail yard. You'll find another climate criminal you can target which is less risky.\n    *choice\n      #Taunt the guards before escaping.\n        You make loud sheep noises before escaping the rail yard over a nearby fence. You hurt your hand on the barbed wire.\n        *finish\n      #Escape the rail yard quietly.\n        You leave the rail yard promptly.\n        *set stealth +10\n        *finish\n  #Remove a skateboard from your bag, place the torch on top and use it to fool the guards away from your location.\n    You use your torch and skateboard to fool the guards away from your location. It buys time while to sabotage the carriage wheels\n    with your tools. The carriage is now going nowhere and the operations of EVANGELION LTD are impaired.\n    *set exodus +10\n    *set stealth +10\n    *choice\n      #Escape the railyard quietly.\n        You notice a small hole in the corner of the railyard fence. You escape quietly with the guards left confused on the other\n        side of the railyard. Mission complete.\n        *set stealth +10\n        *finish\n      #Taunt the guards before you make your escape.\n        You taunt the guards. They run over to your location. You scramble away over a nearby fence. You hurt yourself on the \n        barbed wire as you escape.\n        *finish\n  #Surrender to the guards, admit you were wrong and seek out help for your mental health issues.\n    You turn yourself into the guards. They pin you to the floor and you are dragged into the security office. The Police arrive and\n    You are arrested. You leave the station with a caution and are referred to a local clinic for therapy and support with mental health.\n    *finish\n", "london_-_5": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n*page_break\n\nLONDON - APRIL 2019\nEXT. LONDON - PICCADILLY CIRCUS - DAY\nWe open with a montage of the 2019 London climate protests in\nApril 2019. This was a real event in London.\nThe weather is unseasonably warm and bright.\nWe see footage of tents pitched up in the middle of the busy\ncentral London Piccadilly Circus crossing, completely\nblocking the roads.\nThere are no cars around the usually congested area.\nWe see activists inside the tents delivering speeches to\ngroups and teaching youngsters practical skills such as\nknitting and cooking\nEXT. LONDON - OXFORD CIRCUS - CONTINUOUS\nThousands of climate activists, young students included are\nblocking the usually busy Oxford Circus crossing.\nThere is a pink boat sitting on a trailer in the middle of\nthe usually congested crossing.\nProtestors are holding various boards displaying various\nclimate action messages.\nANTONY ELMES (14) wearing a green baseball cap watches on in\nawe at the protest. He notices many of the protestors signs\ndisplaying PEACE on them. The atmosphere is jubilant. Ant\nsmiles.\nSuddenly, a large group of police approach the protestors and\nbegin to drag them away from the centre of the street.\nAnt starts to look concerned and backs away slowly.\nMore police burst past Ant and his hat is knocked off. He\ncrawls along the floor amongst the chaos. He notices his hat,\ngrabs it and escapes down a nearby alley.\nEXT. LONDON - SHELL HQ - CONTINUOUS\nWe see footage of protests outside the Shell HQ, with\nprotestors campaigning outside, and being restrained and\narrested by police.\nThis protest appears more aggressive and hostile, more so\nthan the more peaceful ones taking place at Oxford Circus and\nPiccadilly Circus.\nAnt walks past a shop with a TV showing the violent protest\non a large TV. He looks confused.\n*finish\n", "mission": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n*page_break\n\nREVEN GREEN E
