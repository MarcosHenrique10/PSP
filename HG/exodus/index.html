<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EXODUS: Climate Activist — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>

    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "exodus", "title": "EXODUS: Climate Activist", "scenes": {"amy": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\nSTREET - 14:37\n\nYou walk along the street toward your apartment. You see your friend and fellow climate warrior Amy walking on the other side of the road.\n\nI thought she was going to the end of school party, you think to yourself.\n\nShe is walking quickly looking straight ahead, and does not notice you.\n\n*choice\n  #Ignore her and keep walking. She is not going to help you with your goals.\n    You continue along the street toward your apartment. Amy shouts over to you.\n\n    'Hey'\n\n    'Oh hey, I didn't see you there. Why are you not at the end of year party?'\n\n    'Oh I couldn't be bothered. Where are you going?'\n\n    'Home, you?'\n\n    'Same.'\n\n    'Okay, see you I guess'\n\n    'See you, you say.'\n\n    As you walk home you think if you should have been more open with Amy, being your closest ally at school.\n    *finish\n  #Cross the road and she what she is up too.\n    You cross the road and walk in front of Amy.\n\n    'HEY' you say.\n\n    'Oh hey, whats up?'\n\n    'I thought you were going to the end of year party!'\n\n    'I didn't want to be there if you were not going to be there, I wanted to say goodbye properly as well'.\n\n    You blush\n     \n    Amy hugs you.\n\n    'I wish you all the best, I hope our paths cross in the future!'\n\n    You part ways. You think to yourself should you have done more to strengthen your relationship.\n    *set relationships +10\n    *finish\n  #Hide from her and shoot down a nearby alleyway to avoid any further time wasting.\n    You head down an alley and avoid Amy. You notice she appears to be looking for you\n    from across the road. Perhaps she wanted you to notice her. Who cares!\n    *set stealth +10\n    *finish\n      \n  \n", "apartment": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\nAPARTMENT - 08:20\n\nYou head back into the apartment and pour yourself some cereal. \n\nYou pick up an old newspaper. \n\nThe newspaper also contains a feature on the mysterious Exodus climate activist group. \n\n*page_break Read up on the EXODUS climate activist group\n\n", "apartmenttwo": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nAPARTMENT - 08:30\n\nYou reach for the newspaper and give the article a read.\n\nThe article details how Exodus are a mysterious environmental activist group that once attempted to kidnap a member of \nsenior management who was also a pro-oil lobbyist at BP (British Petroleum). \n\nThe Exodus plot was foiled and two of the group were arrested by police, however they were later freed by other members of the group, while being transported \nto a different prison.\n\nThe article also went into detail explaining the strange method of how the Exodus group recruited members, firstly by monitoring lone wolf activists,\nand sliding strange invitations under the door of potential members' residences.\n\nYou look over at the front door longingly.\n\n'One day' you think to yourself.\n\n*page_break Time for school!\n", "choicescript_description": "Take control of a troubled young climate activist  as you sabotage climate criminals and attempt to join the mysterious EXODUS activist group. A socially conscious coming of age action thriller where you will have the chance to express your strong beliefs on climate change.\n\n[i]EXODUS: Climate Activist[/i] is a 36,000-word interactive novel by Daniel Stephenson. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\n• Attend real life protests in London and influence how much trouble you will cause.\n• Navigate the end of your high school years as you enter adulthood.\n• Explore the wilderness as you attempt to locate the Exodus camp, and meet various activist groups on your travels.\n• Infiltrate high security climate criminal energy companies and attempt to sabotage their operations.\n• Enter the workplace and attempt to impress your boss.\n• Meet the partner of your dreams.\n• Make the right choices throughout the game in order to impress and join the EXODUS Group.\n", "choicescript_stats": "\nName: $!{name}\n\n*stat_chart\n  text Age\n\n  percent Exodus\n\n  percent Relationships\n\n  percent Stealth\n\n\n  ", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n  \n  Turn off all ads and delays.\n  \n  *purchase_discount adfree 2024-06-13 $2.99 $1.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n  \n  You've paid to turn off all ads and delays.\n", "ending": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nThis is the last scene!  The game is over!\n\nThank you for playing. Did you manage to fulfil your lifelong dream of \njoining the mysterious EXODUS climate activist group?\n\nIf not, please remember there are multiple endings to this game so please try again!\n\nRemember, some choices you make in the game will determine whether you are selected to\njoin.\n\n\n*page_break End\nWe hope you've enjoyed playing [i]${choice_title}.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $2.99 $0.99", "epilogue": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n*set age \"21\"\n\n*page_break\n\n1 YEAR LATER\n\n- E P I L O G U E -\n\nINTERCONTINENTAL HOTEL - MAYFAIR - 20:46\n\nIt is pouring with rain in central London.\n\nThere is a large protest outside the hotel. Protesters are blocking the entrance to the grand hotel\nwhile oil executives from all over the world attempt to enter in their chauffeur driven cars. \n\nBentley's & Aston Martin's pull up to the hotel entrance.\n\nThey are there for an annual conference, to discuss and negotiate new oil contracts for potential new\nclients and the government. \n\nThe lavish bash is also attended by lobbyists, members of the government and even well-known celebrities. \n\nYou watch the protest out of sight from across the road, hidden deep in a small alley.\n\n\n\n*Choice\n  #Try and enter the hotel\n    *if exodus > 100\n     You remove your phone and open an encrypted message on a little-known messaging app. \n     \n     EXDS 0001\n\n     You download the attachment and open it. It shows a picture of an elderly oil executive. You read the briefing below.\n     \n     The above photo is Clement Edwards. He is a highly influential oil lobbyist. He is responsible for preventing many oil companies\n     from pursuing green energy research and investment.\n\n     He is highly charismatic and a master salesman, and he is attending the conference today to ensure as many new oil contracts are \n     signed.  \n     Despite him being in his twilight years, there is no way to move forward with Clement Edwards alive.\n     We would like to you infiltrate the party and eliminate Clement.\n     Also attached is a fake ID and invitation to the party. You will be entering the building as 'Ashley Clifford', PR for Texaco.\n     You will be searched when you enter the building, but a gun with silencer has been stashed inside the balcony of room 34C, on the 10th floor.\n     You will need to access the balcony and break open the plastered covering on the outside of the building to access the weapon.\n     Clement has the room next door booked room 33C, so you should be able to access him easily.\n     There is a lot of drinking and drugs that goes on inside this bash so you should not have to worry about looking out of \n     place. Find the best opportunity to eliminate Clement and escape from the party before he is discovered.\n     \n     You take a deep breath and walk across the road, towards the main entrance of the hotel. You flash your pass to 2 large\n     men in tuxedos standing on the door. The men look at your pass and nod at you.\n     You enter the main ballroom, and a waitress walks past you holding a tray of full champagne glasses.\n     You wave your hand to indicate you do not want one. You are here to work.\n\n     You spot Clement on the other side of the room, standing in a circle of men and women.\n     The people around him listen, engaged and captivated at him speaking.\n\n     You watch on as he continues to captivate his audience. He seems to be focusing much of his attention on a glamorous woman who is\n     part of the group watching him. The woman is at least 30 years younger than Clement, however her body language indicates she is clearly\n     interested in the charismatic oil lobbyist, despite his age. She is smiling at Clement and touching his jacket.\n\n     Clement holds the young woman's hand and leads her away from the group. He whispers something in her ear. The woman smiles and nods and Clement\n     leads the young lady to the lifts.\n\n     You watch on from a safe distance as they enter the lift. As soon as the lift door closes you storm up the stairs of the hotel to the 10th floor.\n     You peek into the hallway and notice Clement and the young women hugging as they walk through the hotel hallway.\n     They enter room 33C and close the door.\n\n     You storm into the hallway and head toward room 34C.\n     You open the door and head straight toward the balcony. You open the door and walk out onto the balcony.\n     You notice the protest going on below you.\n     You walk to the far end of the balcony and look for the weapon. You notice the brickwork slightly off. you dust away the partially filled in hole in the wall\n     and remove the small handgun sitting in there.\n     \n     You pick up the gun and accidentally fire it inside your hotel room. Luckily the silencer has been added already. Your lack of experience with firearms is showing.\n     \n     You storm out of your room and kick the door open of Room 33C.  The young woman is laying on top of Clement, they are both naked.\n\n     'WHAT THE HELL ARE YOU DOING, GET OUT!'\n\n     Clement continues to shout at you, he is shaking. \n\n     You threaten him to change his ways and start promoting more sustainable\n     energy solutions. He agrees and begs you to spare his life. \n\n     You leave the room and the hotel through the main entrance.\n\n     You hear in the news in the following weeks that more oil companies and going all in on sustainable energy and leaving oil in the past.\n\n     The Exodus group is unhappy you did not complete the mission and exclude you from the group. You do not care, you completed the mission, but\n     did it without violence. \n\n     You are extremely proud of yourself.\n     *finish\n\n    You walk across the road and attempt to enter the grand hotel. Two large security guards instantly block you\n    and push you away from the door. You walk away from the front entrance and join in with the protestors.\n    A nearby climate activist removes a megaphone from their bag and gives a speech about the meeting at the hotel of the oil giants.\n    \n    Suddenly the body of the elderly man flies out of the window and lands on the floor. There are gasps in the crowd.\n    You rush over to the man, who appears to be semi-conscious. He is shaking.\n\n    You attempt CPR on the man, the ambulance arrives and takes over. Turns out the man was Clement Edwards, notorious oil lobbyist attending\n    the hotel bash. Looks like someone wanted him dead. You are happy with yourself. You may not agree with him, but he is still a fellow human.\n\n    Clement reaches out to you when he has healed and sends you a large sum of money to help you get back on your feet. You eventually become close friends.\n    *finish\n\n", "epilogueone": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n*set age \"31\"\n\n*page_break\n\n- E P I L O G U E - II -\n\n10 YEARS LATER\n\nCENTRAL LONDON - OXFORD STREET - 13:56\n\nYou are on your bike cycling down Oxford Street. It is a Saturday afternoon and Londons most popular\nshopping destination is extremely busy.\n\nYou are on your way to work as a security guard, late shift at a logistics company. Boring job but\nsteady money and consistant hours.\n\nAs you cycle along the busy street, shoppers and tourists run out into the road in front of you. You\ndo your best to swerve and avoid them on your bike.\n\nSuddenly you see a well dressed young woman walking through the street. She looks familiar.\n\nThe woman walks past you and continues through the busy street.\n\nIT'S SYBEL! \n\nYou do a massive skid in the street in the street and turn around. \n\n*Choice\n  #Run after Sybel and attempt to get her attention\n    *if relationships > 150\n     You notice Sybel shoot down a nearby alley and pursue on your bike. You fight through the crowds\n     on your bike and shoot down the alley. The alley is very quiet compared to the bustling street.\n     Sybel is gone. \n\n     You get back on your bike and pedal furiously through the alley. \n\n     'WHERE IS SHE' you shout out loud.\n\n     You cycle along a quiet sidestreet. You notice a walk in medical centre as you ride along slowly.\n     \n     'OF COURSE SHE IS'\n\n     You park up your bike and enter the hospital. Sybel is stood next to reception.\n\n     '$!{name}'?\n\n     'Hey, it's me!'\n\n     Sybel runs over and hugs you. \n\n     'It's great to see you $!{name}, I'm sorry we lost contact, it all went a bit crazy'\n\n     'It did, no worries, dinner?'\n\n     'Sure, I'm free tomorrow?'\n\n     'Sounds good!'\n\n     Sybel hands you her card.\n\n     You end up getting married, and live happily ever after!\n     *achieve getthegirl\n     *finish\n    You pursue Sybel and follow her to a nearby hospital. You burst into reception and ask for her at reception.\n    The receptionist calls security and you are dragged out of the hospital.\n\n    You wait all day outside the hospital instead of going to your job. Your manager rings you several\n    times on your mobile and eventually he gives up.\n\n    Sybel eventually leaves the hospital at 8pm. She looks exhausted.\n    You sprint up to her.\n\n    'Hey Sybel! How are you?'\n\n    'Oh, hi $!{name}, how are you? Have you been waiting here all day? Security said they had to remove\n    someone asking for me in reception'\n\n    'Yeah, erm, sorry about that, I was a bit over excited'\n\n    You notice a wedding ring on Sybel's finger.\n\n    'Oh you got married huh?'\n\n    'Yeah!'\n\n    'Congrats I guess'\n\n    'Are you seeing anyone'\n\n    'Yes, No, erm, not really'\n\n    'Listen I'm really tired, I'll see you later $!{name}, I have to get home.'\n\n    'Sure, it was great seeing you, can I take your number'\n\n    'erm, I not sure that's a good idea'.  Sybel walks away.\n\n    You show up to your job the next day and your boss fires you, it was your second no show in 6 months.\n\n    You decide there's some work you need to do on yourself and start to look for a new job and partner.\n    *goto_scene ending\n\n \n", "epiloguetwo": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nEPILOGUE\n\nINTERCONTINENTAL HOTEL - MAYFAIR - LONDON - 20:46\n\nIt is pouring with rain in Central London.\n\nThere is a large protest outside the hotel. Protesters are blocking the entrance to the grand hotel\nwhile oil exectutives attempt to enter in their chaffeur driven cars. \n\nThey are there for an annual conference, to discuss and negotiate new oil contracts for potential new\nclients and the government. \n\nThe lavish bash is also attended by lobbyists, members of the government and even well known celebrities. \n\nYou watch the protest out of sight from across the road, hidden deep in a small alley.\n\n\n\n*Choice\n  #Try and enter the hotel\n    *if strength > 100\n     You remove your phone and open an encrypted message on a little known messaging app. The message just says\n     \n     EXDS 0001\n\n     You download the attachment and open it. It shows a picture of an elderly oil executive. You read the briefing below.\n     \n     The above photo is Clement Edwards. He is a highly influential oil lobbyist. He is responsible for preventing many oil companies\n     from pursuing green energy research and investment.\n\n     He is highly charasmatic and a master salesman, and he is attending the conferance today to ensure as many new oil contracts are \n     signed.  \n     Despite him being in his twlight years, there is no way to move forward with Clement Edwards alive.\n     We would like to you infiltrate the party and eliminate Clement.\n     Also attached is a fake ID and invitation to the party. You will be entering the building as 'Tony Clifford', PR for Texaco.\n     You will be searched when you enter the buidling, but a gun with silencer has been stashed inside the balcony of room 34C, on the 10th floor.\n     You will need to access the balcony and break open the plastered covering on the outside of the building to access the weapon.\n     Clement has the room next door booked room 33C, so you should be able to access him easily.\n     There is a lot of drinking and drugs that goes on inside this bash so you should not have to worry about looking out of \n     place. Find the best oppotunity to eliminate Clement and escape from the party before he is discovered.\n     \n     You take a deep breath and walk across the road, towards the main entrance of the hotel. You flash your pass to 2 large\n     men in tuxedos standing on the door. The men look at your pass and nod at you.\n     You enter the main ballroom and a waitress walks past you holding a tray of full champagne glasses.\n     You wave your hand to indicate you do not want one. You are here to work.\n\n     You spot Clement on the other side of the room, standing in a circle of men and women.\n     The people arround him listen, engaged and captivated at him speaking.\n\n     You watch on as he continues to capitvate his audience. He seems to be focusing much of his attention on a glamerous woman who is\n     part of the group watching him. The woman is at least 30 years younger than Clement, however her body language indicates she is clearly\n     interested in the charasmatic oil lobbyist, despite his age. She is smiling at Clement and touching his jacket.\n\n     Clement holds the young womans hand and leads her away from the group. He whispers something in her ear. The woman smiles and nods and Clement\n     leads the young lady to the lifts.\n\n     You watch on from a safe distance as they enter the lift. As soon as the lift door closes you storm up the stairs of the hotel to the 10th floor.\n     You peek into the hallway and notice Clement and the young women hugging as they walk through the hotel hallway.\n     They enter room 33C and close the door.\n\n     You storm into the hallway and head toward room 34C.\n     You open the door and head straight toward the balcony. you open the door and walk out onto the balcony.\n     You notice the protest going on below you.\n     You walk to the far end of the balcony and look for the weapon. You notice the brickwork slightly off. you dust away the partially filled in hole in the wall\n     and remove the small handgun sitting in there.\n     \n     You pick up the gun and accidently fire it inside your hotel room. Luckily the silencer has been added already. Your lack of experience with firearms is showing.\n     \n     You storm out of your room and kick the door open of Room 33C.  The young woman is laying on top of Clement, they are both naked.\n\n     'WHAT THE HELL ARE YOU DOING, GET OUT!'\n\n     *choice\n  #Shoot Clement andthe young women quickly.\n    *choice\n      #Hide the bodies before you get the hell out of there.\n        You drag the bodies inside a wardrobe and exit the party promptly. You head downstairs\n        and exit the hotel via a side fire exit. Mission complete.\n        *finish\n      #Leave the bodies there and get the hell out of there.\n        You leave the room promptly. You storm down the stairs and exit the hotel. Mission complete.\n        *finish\n  #Kill Clement, spare the young woman\n    You shoot clement twice in the body, once in the head. The young woman begins to scream loudly. You hear the doors\n    of the other rooms begin to open as guests begin to investigate the screaming.\n    *choice\n      #Kill the young women before she gets you caught.\n        You notice a small hole in the corner of the railyard fence. You escape quietly with the guards left confused on the other\n        side of the railyard. Mission complete.\n        *finish\n      #Clement is dead, get the hell out of there.\n        You walk out the hotel room and through the hallway. Guests begin to stare at you. One of them attempts to grab you but you shake them off.\n        You run downstairs and burst out a side fire exit, just as security are alerted. You flee the area, mission complete.\n        *finish\n  #Spare them both, what the hell have you become?\n    Clement begins to shout at you, even though he is shaking. You threaten him to change his ways and start promoting more sustainable\n    energy solutions. He agrees and begs you to spare his life. You leave the room and the hotel through the main entrance.\n    You hear in the news in the following weeks that more oil companies and going all in on sustainable energy, and leaving oil in the past.\n    The Exodus group is unhappy you did not complete the mission and exclude you from the group. You do not care, you completed the mission, but\n    did it without violence. You are extremely proud of yourself.\n        *finish\n\n    You walk across the road and attempt to enter the grand hotel. Two large security guards instantly block you\n    and push you away from the door. You walk away from the front entrance and join in with the protestors.\n    A nearby climate actvist removes a megaphone from their bag and gives a speech about the meeting at the hotel of the oil giants.\n    \n    Suddenly the body of the elderly man flies out of the window and lands on the floor. There are gasps in the crowd.\n    You rush over to the man, who appears to be semi concious. He is shaking.\n\n    *choice\n  #attempt CPR on the man.\n    You attempt CPR on the man, the ambulance arrives and takes over. Turns out the man was Clement Edwards, notorious oil lobbyist attending\n    the hotel bash. Looks like someone wanted him dead. You are happy with yourself. You may not agree with him but he is still a fellow human.\n    Clement reaches out to you when he has healed and sends you a large sum of money to help you back on your feet. You evetually become close friends.\n        *finish\n  #ask the crowd if anyone is a doctor.\n    You shout out for a doctor. A man in the crowd responds and attempts CPR on the man, he is saved. Someone wanted this man dead, and it is highly likely Exodus\n    are involved. No point in pursuing them to think, they are probably long gone now.\n        *finish\n    *choice\n  #Take no action, hes probably one of those greed oil executives anyway.\n    You stand around and take no action. The man dies laying there on his own. Turns out the man was Clement Edwards, notorious oil lobbyist attending\n    the hotel bash. He was guitly of lobbying for oil but his death stays on your concious. you begin to lose sleep over it.\n    Eventually you reach out to Clements family to apologise and attempt a first aid course so you know what to do if something similar happens in the future.\n        *finish\n", "executive": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n- INTERMISSION I -\n\n\nCOUNTRY MANSION - 00:03\n\nIt is a freezing cold night. We see passed out security guards posted at the entrance of a huge country estate.\n\nInside the huge house, we see framed photos of an executive shaking hands with various people on oil rigs around the world.\n\nInside a large bedroom, a middle aged couple are fast asleep inside their huge bed.\n\nAn army of over 30 people enters the house, dressed all in black with their faces completely covered.\n\nThe woman wakes up and sees the army inside her bedroom as they surround the bed. The woman screams as her face is covered with a cloth.\n\nHer husband wakes up and also begins to scream. He is knocked out.\n\nThere is a struggle as the man is dragged away from his bed.\n\nThe cloth is removed from the woman's face as only one of the soldiers is left in the room. Her husband is gone.\n\nThe woman notices a large round symbol spray painted inside her bedroom, a sideways peace sign.\n\nThe army disappears into the night.\n\nThe woman calls the police. \n\n*page_break Next\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "executiveone": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n*set age \"20\"\n\n*page_break\n\n- INTERMISSION II -\n\n\nLONDON - OLYMPIA EXHIBITION CENTRE - 15:45\n\nWe are at the annual energy conference in London. Stalls are set up everywhere for various energy\ncompanies looking to promote their latest products and services.\n\nMost stalls are for innovative new tech companies promoting exciting sustainable products such as\nthe latest electric cars and even a prototype engine for a fully electric passenger aircraft.\n\nwealthy investors patrol the various stalls looking for potential investment opportunities.\n\nThe exhibition is also an opportunity for oil companies to showcase their products and oil lobbyist's \nto convince investors their companies still have a future in a changing world.\n\nThe oil companies, always with the deepest pockets, always have the most extravagant stalls and shower \npotential investors with expensive free gifts and food.\n\nAndrew Church patrols in front of his stall. He is an oil Lobbyist employed by the biggest oil giant\nin the world, Metro.\n\nAndrew notices some smartly dressed investors walking towards him. They have just been admiring the electric\naircraft engine, and Andrew noticed them taking contact details from the representatives posted on\nthe stall.\n\nThese guys mean business.\n\nAndrew lures them in to his stall and offers them gifts and snacks. Andrew speaks to the investors \nabout the future of Metro and their commitment to going fully green, while still leaning on oil to\ncope with the ever increasing energy demand.\n\nWe see a young waitress carrying a tray of champagne through the hall.\n\nHer tray is full but she does not offer a drink to anyone inside the busy hall.\n\nThe waitress heads straight over to Andrew's Metro stall while Andrew attempts to impress\nthe potential investors.\n\nThe waitress stands close to Andrew, and Andrew quickly takes a glass full of champagne. The waitress\nwalks away quickly without offering anyone else a drink.\n\nAndrew gulps down the champagne quickly during his speech to the investors.\n\nSuddenly, Andrew begins to choke and falls to the floor. The investors are shocked and shout for a doctor.\n\nA huge flag falls from the ceiling with the Exodus logo, the sideways peace sign.\n\nAndrew continues to choke as everyone inside the hall rushes around to help him.   \n\n*page_break Next\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "executivetwo": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n- INTERMISSION III -\n\n\nNORTHERN PACIFIC OCEAN - 20:45 - Latitude 41°17.0'N; Longitude 70°26.0'W \n\n\nA huge ship sails through the ocean. It is a windy day and the waves bounce off of the large ship.\n\nThe ship is carrying workers to a nearby oil rig. \n\nThe large ship approaches the rig as the weather conditions worsen.\n\nThe ship slows down as it moves closer to drop the workers off.\n\nWe see inside as the captain notices a small speed boat rapidly approaching.\n\n'WHAT THE HELL IS GOING ON'\n\nThe large ship rocks slightly as the dot on the radar is next to the ship. \n\nArmed soldiers begin to board the large ship. They spraypaint the EXODUS logo on the side\nof the large ship.  \n\n'WE ARE BEING HELD UP' The captain shouts.\n\nThe armed soldiers burst into the rooms where the workers are.\n\nThe seasoned workers do not react, most of them over 40, with scars all over their bodies.\n\nThe soldiers attempt to move the workers into a single room.\n\nOne of the workers grabs a gun and holds it to the soldiers head, they have no fear.\n\n'GET THE HELL OUT OF HERE'\n\n'WE'RE GOING, JUST DON'T HURT HIM'\n\nThe soldiers retreat to their boat and leave. One of the workers notices the spray painted \n\nEXODUS logo on the side of the ship.\n\n'CLIMATE IDIOTS' The oil rig worker says.\n\nNews begins to circulate speculating the notorious EXODUS group was aging and starting to become sloppy.\n\nIt was suggested they may look to recruit some younger members in the near future.\n\n*page_break Next\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "exodus": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n2 MONTHS LATER\n\nEXODUS HQ - UNKNOWN LOCATION - 23:46\n\nAn Exodus member dressed completely in black walks along a dark corridor. \n\nShe is carrying a newspaper and walking very briskly. We cannot see her face, just her silhouette. The Exodus\nHQ is poorly lit, it is intentional. \n\nShe approaches an office. Two guards are posted outside.\n\n'Is he in there?' The woman says. One of the guard nods.\n\nThe woman walks along a long corridor into a large dark room with a large desk. \n\nThe mysterious leader of Exodus sits in the shadows. Guards are posted either side of him, both carrying\nautomatic weapons.\n\n'What do you want' \n\nThe woman throws the paper on the desk.\n\nThe Exodus leader scans the story, which has the headline \n\n‘REVEN ‘GREEN’ ENERGY EXPOSED’\n\nHe picks up another paper that has a different headline\n\n‘REVEN GREEN ENERGY SECRETLY PARTNER WITH PRIVATE MILITARY CONTRACTOR’ \n\nWe hear a quiet deep voiced laugh from the Exodus leader.\n\n\n*label action\n'Think $!{name} has done enough to join us? We really need to recruit new members ASAP'\n*Choice\n  #OK, let's bring them in, I like this kid.\n    *if exodus > 90\n     'Are we sure this was $!{name}?'\n\n     'I believe so, yes sir.'\n\n     The Exodus leader pauses for a moment.\n\n     'Draw up plans to hit Reven 'Green' Energy. We have our next target.'\n\n     'Won’t exposing them do enough damage sir?'\n\n     'I doubt it, they’ll just divert attention and use bribes and lobbyists. They are\n     about to be hit like they have never experienced.'\n\n     'Right away sir.'\n     \n     COUNTRYSIDE - 16:24\n\n     Sybel is running through the countryside with a backpack.\n     She has tears in her eyes. A sigh of relief appears on her face. She has escaped the\n     Reven group. She sees a nomad camp in the distance, likely one of the many\n     smaller activist groups scattered around the country.\n\n     Sybel heads toward the camp. Sybel is welcomed into the group.\n\n     APARTMENT - 21:34\n     \n     Hundreds of soldiers are walking away from your apartment.\n     Some of them are injured. They are all carrying automatic weapons.\n     They all have the circular logos on their uniforms as seen on your assassination attempt and the newspaper\n     expose.\n     An envelope slides under your apartment door.\n     The envelope has the distinct Exodus 'E' logo on it.\n     You have been invited to join Exodus.\n\n     You are lying in a puddle of blood on the floor.\n     You are semi-conscious. you see the envelope slide through the door.\n\n     You let out a small smile.\n\n     'I DID IT' you say\n\n     You fall unconscious. You have fulfilled your dream of being invited to the Exodus\n     group, but the brutal Reven Green Energy mercenaries have got to you first.\n\n     Later that night, members of the Exodus group arrive at your flat and save your life.\n\n     They take you to their secret hideout and a private doctor fixes you up.\n\n     A photo is shown of you on the news as your brutal attack is\n     announced. You are portrayed as an extremist and notorious\n     activist on the television.\n\n     Sybel is reading the news of your attack in a newspaper. She is crying. She looks\n     devastated.\n\n     Sybel reads up on the Exodus group. She notices a\n     section of her book that shows how Exodus recruits, and she sets out to join.\n\n     During your recovery, you hear in the news about police raids on the Reven energy complex. Police  \n     find evidence of their fracking plans along with their involvement with weapons.\n\n     You assist the police in bringing the company to justice. The Reven compound is destroyed and eventually\n     replaced with a huge park. Much better than a sleazy energy company.\n\n     MISSION COMPLETE\n     *achieve exodus\n     *finish\n    I don't think they've done enough yet to join us yet, but $!{name} certainly has my attention and \n    I'll be watching.\n\n    You go into the countryside looking for Sybel. She has gone missing. You spend years attempting to find her without success.\n\n    You pray she has escaped Reven and started a new life somewhere else, but your gut feeling tells you the brutal Reven Green Energy mercenaries\n    have taken her out.\n\n    You never stop looking for her.\n\n    You live out your life in frustration. You didn't manage to join Exodus, hold down a job or get the girl.\n\n    You hope things will improve, and look to learn from your previous bad choices.\n\n    *finish\n", "exoduslocate": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nTHE NEXT DAY\n\nCOUNTRYSIDE - 5 MILES FROM ALPINE - 10:32\n\nYou wake up after a night of sleeping in the forest. \n\nYou have some water from your backpack and get on your way. \n\nYou are still wearing your scruffy clothes you've been wearing for days as you walk through the countryside.\n\nCould could have got some clothes from the mall but there you go!\n\nYou walk along a muddy path.\n\nYou have your phone out and you are looking at a tracking app. The battery on your phone is getting lower.\n\nGood job William gave you 3 battery packs before you left, you are now on your last one!\n\nYou follow the red dot marked on your phone, where the alleged Exodus camp is.  \n\nYou get closer and closer to the red mark.\n\nYou feel something is off.\n\nYou stand still and listen to the gentle breeze of the wind against the trees.\n\nYou are being followed.\n\nYou sigh, Not more crazy activist groups around here you think to yourself. Times like this you feel glad to have left that\nworld.\n\nAt this point in your life you aren't even scared any more. You know you can handle yourself.\n\nYou can tell it's a team too.\n\n*choice\n  #Try to shake off the tail\n   You break into a jog and attempt to shake off the tail.\n   You are in good shape and can jog without stopping for a good few miles, even with your\n   backpack full of supplies.\n   You jog for a good couple of miles.\n   You stop and sit down at a nearby bench.\n   You listen to the gentle breeze of the wind and stare into the forest.\n   The tail appears to be gone.\n   Maybe they lost interest? You think to yourself.\n   *set stealth +10\n   *finish\n  #There's not much you can do, continue on to the Exodus camp\n   You are too tired to try to shake off the tail. You walk around in circles but the tail is still on you.\n   Haven't they got anything better to do, you think to yourself.\n   You continue on to the red dot on your mobile tracking app.\n   *finish\n", "exoduslocateone": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\nCOUNTRYSIDE - 10 MILES FROM ALPINE  - 15:16\n\nyou continue to walk cautiously. You look around. You are still being followed by more than one person.\n\nYou begin to get annoyed, you've had enough of distractions from your mission.\n\nYou walk into a nearby forest, where you can use the trees as cover.\n\nYou see multiple soldiers dressed in all black appear in the bushes behind you. \nThey are following you, but staying hidden in the surrounding bushes.\n\nYou listen to the gentle breeze of the wind. It begins to rain. \nYou stand next to a large tree to shelter.\n\nSuddenly multiple gunshots ring out.\n\nYou climb a nearby tree in an attempt to hide.\n\nThe gunshots continue, eventually stopping.\n\nYou hear the soldiers radio each other.\n\n'We got him?'\n\n'I think so. Let's go in for a closer look'\n\n'Rodger that.'\n\nThe two soldiers run toward you. You watch from the tree above and get ready to pounce.\n\nA soldier is now directly below you.\n\n'I don’t see anybody....'\n\nYou jump down from the tree, landing on top of one of the soldiers. \nYou knock him out by strangling him.\n\nYou grab the soldier's gun and shoot the other solider in the leg. He drops to the floor.\n\nYou stand over the two soldier's as they clutch their injuries.\n\nYou notice a circular logo on both of their uniforms.\n\nYou take a photo of the logo using your smartphone.\n\n'Private contractors huh?'\n\n*Choice\n  #Kill the soldiers\n   You take the other soldier's gun and shoot both in the head. You check their pulse. They are both dead.\n   You continue on your mission to locate the Exodus camp.\n\n   You go through a tablet one of the soldiers is carrying and notice emails from Reven Green Energy.\n   This was a set up.\n\n   You arrive where the alleged camp is, nothing is there but a derelict building.\n   *finish\n  #Keep them alive and get information\n   You grab one of the guards.\n \n   'WHO SENT YOU' you ask. \n\n   There is no response. You take one of the soldiers guns and hold it to both of their heads.\n \n   'OKAY OKAY, REVEN GREEN ENERGY HIRED US' The guard says.\n\n   'Thank you' you say. \n\n   You leave both of the injured guards laying in the forest.\n\n   You continue on your mission to locate the Exodus camp.\n\n   You arrive where the alleged camp is, nothing is there but a derelict building.\n   *set exodus +10\n   *finish\n  #Get the information and kill the soldiers. They just tried to kill you! \n   You grab one of the guards.\n \n   'WHO SENT YOU' you ask. \n\n   There is no response. You take one of the soldiers guns and hold it to both of their heads.\n \n   'OKAY OKAY, REVEN GREEN ENERGY HIRED US' The guard says.\n\n   'Thank you' you say. \n\n   You kill the guards. You feel awful after. What have you become?\n\n   You continue on your mission to locate the Exodus camp.\n\n   You arrive where the alleged camp is, nothing is there but a derelict building.\n   *finish\n\n\n\n", "fake": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nCHAPTER III - EXODUS?\n\nSAFEHOUSE - 21:24\n\nYou wake up. You are in an empty room that resembles a prison cell. \nThere is a single small window. You hear the gentle breeze outside.\n\nYou look out the window and see tall trees as far as the eye can see. You are in the middle of nowhere.\nYou rub your head gently, it is throbbing. \n\n'The hell is this place?' You say.\n\nA girl in her 20s enters the room.\n\n'You're awake, good, I’ll let Vertis know. You head will be fine, looks like one of those logs might have caught you' \n\nYou turn around. \n\n'Your safe now, we found you in the forest, what's a kid like you doing out here on your own?' \n\n'Where am I? Who are you people?' You ask.\n\n'My name is Yolanda' the girl says to you.\n\n'Hi, I'm $!{name} you reply. I heard a train, then I heard voices, then the train sounded like\nit crashed? Wait. What were you guys doing out there in the forest? Who are you?'\n\nYou really don't know? You should wait and talk to Vertis. He's our leader. He will explain everything. It's nice to meet you $!{name}.'\n\nYolanda walks towards the door.\n\n*choice\n  #Are you guys Exodus?\n    You ask with a keen expression. \n    \n    'I've found them!' You scream\n    *set relationships +10\n    *finish\n  #There's no way you amateurs are the Exodus group\n    What did you say?\n    *finish\n\n \n\n\n\n  \n", "faketwo": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nSAFEHOUSE - 22:37\n\nYolanda stops in her tracks. \n\n'What do you know about Exodus, kid'.\n\n'I’m looking for them. I want to join of course!'\n\nA serious expression appears on Yolandas face.\n\n'Think you have earned it $!{name}?' \n\n'I do, did you not hear about that hit on EVANGELION I did Last week? The train depot job?' \n\n'No, we don’t have phones out here, we don’t wanna go to jail you know.'\n\n'Oh. So can I join?' You say, still very excited.\n\n'Dinner will be in 15 minutes, get ready $!{name}' Yolanda says with a stern expression.\n\nYolanda leaves the room. You begin to look excited.\n\n'Holy shit! I’ve found them!' You say out loud. \n\nYolanda hears you and laughs a little. She shakes her head. \n\n'Kids'  \n\n*page_break Dinner time\n\n  \n", "faketwopointfive": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nSAFEHOUSE - 23:00\n\nYou enter the dining room and take a seat at the table. You appear very confident.\n\nYolanda notices you and points to a seat at the end of the table. \n\nYou give her a slight nod and sit down.\n\nA man with a large build, beard and ponytail enters the room and sits at the head of the table, opposite you. He\nhas a stern look on his face. He speaks in a surprisingly posh, southern English\naccent.\n\n'So $!{name}, what were you doing out there in the forest? You could have been killed last night, do you realise that?\n\n'I was looking for you guys!' \n\n*page_break Vertis Looks over at Yolanda and shakes his head\n\n\n  \n", "faketwopointnine": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nSAFEHOUSE - 23:10\n\n'Why?' Vertis asks. \n\n'I want to help you guys' you reply.\n\n'Shouldn't you be in college or something?' Asks Vertis, curiously.\n\n'I didn’t get the grades unfortunately' you reply, with a sad expression on your face.\n\n'Where are your parents?' Asks Vertis.\n\n'I’m an orphan, I never knew them'\n\nVertis shakes his head. There is a brief silence at the table.\n\n'What was that train you guys took out?' You ask. \n\nYolanda replies quickly.\n\n'It was a Reven Energy....' Vertis interrupts Yolanda mid speech. \n\n'That's enough Yolanda.' \n\n'Why did you go for them?' You ask. There is silence across the room.\n\nVertis stands up. \n\n'We don’t know who you are. We just find you in the middle of the forest and you want to help us?'\n \n'Can I help with your next job?' You ask with a keen look on your face.\n\n'Job? What do you think this is? Some type of game?'\n\nYou stand up. \n\n'No, No! I really want to help; I believe in you guys. I have been following you for the last 5 years.\nI collect every news article.'\n\n'You could be killed $!{name}, you understand that?' Vertis says.\n\n'If it helps the cause, I’m willing yes. Please, let me help you, it's\nall I’ve ever wanted to do'\n\nVertis looks over at you.\n \nVertis then looks over at Yolanda. \n\nYolanda nods.\n\n'I’ll need to have you checked out' Vertis says. \n\n'Sure, you can search me too' you respond.\n\n'We already did that $!{name}. I’ll have to check you out with my contact too. Both of you get some rest. Planning\nfor the next one starts tomorrow. are sure you willing to give your life for our cause and enter our world?'\n*choice\n  #Yes Sir!\n   Vertis smiles ever so slightly.  \n   'Get some rest. 9am tomorrow we’ll begin. Now get out of here.'\n   *set exodus +10\n   *finish\n  #My life? Not sure about that! I'm young!\n\n   Vertis looks disappointed. Yolanda chimes in,\n \n   'You're right, we should lay low for a while after that Reven job. We can train you in the meantime.'\n \n   You spend the next 3 weeks working out, preparing yourself for some radical climate activism.\n   *finish\n\n\n\n  \n", "final": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nAnt is sitting inside a small studio apartment. He has a\nlarge bandage on his hand from the injuries sustained the\nnight before.\nAnt looks over at the front door of his apartment. He appears\nto be waiting for something.\nAnt hears distant noises in the corridor outside the\napartment.\nHe gets up and bursts through the front door into the\ncorridor. No one is there.\nANT\nShit!\nAnt heads back into his flat. He pours himself some cereal.\nHe picks up an old newspaper. The newspaper contains a\nfeature on the Exodus activist group.\nIt details how Exodus are an environmental activist group\nthat once attempted to kidnap a member of senior management\nat BP (British Petroleum).\nTheir plan was foiled and two of the group where arrested by\npolice, however they where later freed by other members of\nthe group, while being transported to a different prison.\nThe article also explained the strange method of how the\ngroup recruited members by monitoring lone wolf activists,\nand sliding strange invitations under the door of selected\nmembers residence.\nAnt looks over at his front door.\n\n\n*choice\n  #Avoid the guards and quietly escape the rail yard. You'll find another climate criminal you can target which is less risky.\n    *choice\n      #remove a skateboard from your bag, place the torch on top and use it to fool the guards away from your location.\n      #Appoint charismatic knights and give them land, peasants, and resources.\n        Your majesty's people are eminently resourceful.  Your knights win the day,\n        but take care: they may soon demand a convention of parliament.\n        *finish\n      #Steal food and weapons from the enemy in the dead of night.\n        A cunning plan.  Soon your army is a match for the westerners; they choose\n        not to invade for now, but how long can your majesty postpone the inevitable?\n        *finish\n  #remove a skateboard from your bag, place the torch on top and use it to fool the guards away from your location.\n    You use your torch and skateboard to fool the guards away from your location. It buys time while to sabotage the carriage wheels\n    with your tools. The carriage is now going nowhere and the operations of EVANGELION LTD are impaired.\n    *choice\n      #Escape the railyard quietly.\n        You notice a small hole in the corner of the railyard fence. You escape quietly with the guards left confused on the other\n        side of the railyard. Mission complete.\n        *finish\n      #Taunt the guards before you make your escape.\n        You taunt the guards. They run over to your location. You scramble away over a nearby fence. You hurt yourself on the \n        barbed wire as you escape.\n        *finish\n  #Surrender to the guards, admit you were wrong and seek out help for your mental health issues.\n    You turn yourself into the guards. They pin you to the floor and you are dragged into the security office. The Police arrive and\n    you are arrested. You leave the station with a caution and are referred to a local clinic for therapy.\n    *finish\n", "flat": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nTHE NEXT DAY\n\nAPARTMENT - 08:03\n\nYou wake up early the next day. You get out of bed and hoover and clean your small studio apartment. \n\nYou have a large bandage on your hand from the injuries sustained the\nnight before. You go to the bathroom and clean up the wound.\n\nYou look over at the front door of your apartment. You hear noises in the corridor outside your\napartment. Is Someone close to your door?\n\n\n*choice\n  #Get up and storm to the door. Time to sort out these weirdos hanging around your apartment.\n   You climb out of bed and storm over to the front door. You look around in the corridor but no one \n   seems to be there. You return to your comfy seat.\n   *set exodus +10\n   *finish\n  #Stay sat down but shout at your front door. \n    You shout over at the front door like a complete lunatic. The noises quickly disappear.\n    *finish\n  #Ignore it, it's probably just some druggies, not worth risking it.\n    You stay in your comfy seat. The noises eventually go away.\n    *finish\n      \n  \n", "home": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n*page_break\n\nYou walk back through Alpine and contemplate how to deal with the situation you are in.\n\nThere is something seriously shady going on with your employer. And you are going to get \nto the bottom of it.\n\nYou walk through the deserted town of Alpine. You do not see any traces of the crazy Animal Rebellion\nactivist group. They would be in some serious trouble if they were to run into you at this moment. You are\nnot in the mood for these obsessive groups. You feel betrayed and alone. How could they do this too you.\nCould it be they think I am still involved in one of these activist groups? Or plotting against them somehow.\n\nYou have a quick think about all of the work you have done at Reven. You have been a hard worker and even\nput your life on the line taking on the recent invasion of the compound.\n\nThe recent invasion is yet another reason to have your suspicions of the company.\n\nYou take the bus back to your flat and arrive home late. You flop straight into bed\nand sleep for 15 hours. You really needed that!\n\nYou wake up around 10pm the next day. \n\n*page_break Time to confront Mike\n\n\n", "infiltrate": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nCHAPTER IV - INFILTRATE\n\nTHE NEXT DAY  \n\n2 MILES FROM REVEN ENERGY HQ COMPOUND - 06:13  \n\nYou are running through the forest with Yolanda and Vertis. You are all wearing tactical military gear.\n\nIt is a freezing cold morning, the running and adrenaline are keeping you warm.\n\nYou approach a large wired fence. Large circles of barbed wire sit on top of the fence.\nYou look left and right, the fence runs as far as the eye can see, completely surrounding the compound.\n\n'We’re here. Yolanda, the cutters.' Vertis Whispers\n\nYolanda removes some large wire cutters and begins cutting a hole through the fence.\n\nInside the compound security office. A guard is asleep in his chair. We see some panels beeping in front of him - no reaction from\nthe guard, he stays asleep.\n\n*choice\n  #Leave Yolanda to cut the hole in the fence on her own.\n   You watch Yolanda as she struggles to cut a hole in the fence big enough for the 3 of you\n   to enter the compound. Yolanda gives you an unimpressed look as you stand there without helping.\n   You enter the Reven Compound\n   *finish\n  #Help Yolanda cut the hole in the fence. It would be quicker and better chance of avoiding detection.\n   You tear the fence away with your bare hands as you assist Yolanda with the small hole she has made \n   with the cutters. Yolanda and Vertis both look at you, they are impressed. \n   The 3 of you enter the Reven compound.\n   *set stealth +10\n   *set relationships +10\n   *finish\n\n \n\n", "infiltratefive": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n \n\nREVEN ENERGY HQ - AIR VENT - 07:51  \n\n\nYou overhear Reven energy staff walking around the compound as they talk\nto each other.\n\n\n'What the hell is going on?'\n\n'I heard there may be intruders on the compound'\n\n'How the hell did they manage to get in?'\n\n'No idea'\n\n'What the hell do they want?'\n\n'I don’t know, probably climate change nuts as usual.'\n\n'What are we supposed to do? Can’t concentrate with these damn alarms going off!'\n\n'I don’t know, shall we go the security office, see if we can find out anything?'\n\n'Yeah let's do that'\n\nYou watch the two Reven Energy employees walk through the compound corridors of the complex.\nThey stop in their tracks.\n\n'You hear that?'\n\n'Yeah, where is that coming from?'\n\nThe two employees look up. They hear faint banging of Yolanda, Vertis still changing coming\nfrom above them, hiding inside the air vent. The three of you watch them through the vents.\n\n'What the hell!'\n\n'We should go tell someone'\n\nThe two employees run away through the complex toward the security office.\n\n*page_break They know our location now. Let's get outta here!\n \n\n\n\n\n", "infiltratefivepointfive": "*comment Copyright 2010 by Da
