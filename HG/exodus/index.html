NERGY HQ - 22:47\n\nYou return to the Reven Green Energy Compound and enter using your staff key card.\nYou are sweating after surviving the dramatic assassination attempt.\n\nYou storm straight to Mikes office and kick the door open.\nHe is not there. You leave Mikes office and storm around the compound looking for Mike.\n\nYou see two men in suits carrying briefcases walk across the compound and head into the central HQ building.\nYou watch them closely. They look suspiciously out of place.\n\nYou follow the two men into a building on the compound.\n\nYou see Mike walking out of an office. He looks flustered. He removes his phone. You walk closer to Mike.\n\nYou listen in as Mike talks on his phone. \n\n'We are finalizing the deal. Relax, relax, that's all taken care\nof! Yes, I’m sure he's not going to be around to see any of this'.\n\nMike looks up and notices you are standing in front of him. His mouth drops and he gulps. 'I’ll call you back' he says.\n\n*page_break Guess who's back \n\n", "missionone": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\nREVEN GREEN ENERGY HQ - 23:02\n\nMike has a shocked look on his face.\n\n'You’re OK $!{name}, thank god, they were just asking about you'.\n\n'What the hell is going on' you say.\n\n'Going on where? What do you mean? Did you find the Exodus camp?'\n\n'I didn’t. There was nothing there where you sent me. I was also attacked by soldiers, look like they where\nprivately hired. You have anything to do with that? Did you set me up?'\n\n'Soldiers? What, do you think that was me? After all I've done for you?'\n\n'This isn’t a green company is it' you say. \n\nYou begin to grit your teeth. You clench your fist.\n\nMike gulps. He knows how tough you are.\n\n'YOU BETTER TELL ME EVERTHING, OR ELSE.'\n\n'Please calm down $!{name}, you know green energy alone is not enough for demand in this\ncountry. Think about this logically. Its not even close. And\nwe are far from being able to keep up with the demand using only green. It’s\nalmost pointless using it at all, though the latte sipping lefty liberals and hippies seem to love it.'\n\n'We’re frauds!' you say.\n\n'Calm down, it's just PR. Who knows, maybe one day we could become a\nfully green company'\n\n'What was that meeting about in there?' you ask.\n\n'I cannot discuss that unfortunately,' Mike says.\n\n'Tell me or I’m going in there.' you say.\n\n'I’m sorry $!{name}, I can’t let you go in there'.\n\nYou barge Mike out of the way and burst into the room where he emerged from. The two men in suits you saw earlier are sitting at a desk,\nwith an open suitcase on the table. There is a huge map on the desk, with large red circles\nmarked across it. You notice the same circular military logo on the two soldiers that attacked you on the top corner of many of the sheets of the paperwork.\nThe circular logo is also on a small badge on both of the men's suits.\n\nA man at the table screams at you. \n\n*page_break Get out!\n\n\n", "missiontwo": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\nREVEN GREEN ENERGY HQ - 23:22\n\n'What are you guys doing eh?' you ask\n\n'None of your business, kid, get out, who is this tough guy? Get outta here would you?'\n\n'Not until you tell me what you’re doing in here' you say\n\n'Get out, now! Someone call security and get this idiot out of here!'\n\nThe other man chimes in.\n\nSecurity walk in and line up against the wall, you nod at them. They nod back. They know who you are.\n\nYou stand your ground. You are ready for anything!\n\none of the unknown men at the table shouts at your security staff again.\n\n'DON'T JUST STAND THERE, GET HIM OUT OF HERE!'\n\n*page_break That's $!{name}, He is head of security at Reven sir\n\n", "missiontwopointtwo": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nREVEN GREEN ENERGY HQ - 23:34\n\n'What are these maps?' you ask.\n\n'They wouldn't be fracking plans would they?'\n\nThe security staff in the room look shocked. \n\nSoldiers burst into the room burst into the room. They have identical uniforms to the soldiers\nthat attacked you on your Alpine trip. \n\nIt's all starting to make sense you think to yourself.\n\nThey soldiers surround you and grab you. They attempt to pull you out of the room.\n\nYour security staff overpower them and push them away from you. You have taught them well!\n\nYou push the soldier holding you away. Your security staff stand behind you. They have your back.\n\n'I'm going to ask you again. Tell me what is going on here'.\n\n'This is private business, it doesn’t concern you!'\n\n'Oh, I think I’ve seen enough, thank you though.' you say.\n\nYou walk out of the office. You listen as the arguing continues inside the office.\n\n'How much did they see? Who is that?'\n\n'I wouldn’t worry too much'\n\n'He's head of security you idiot. No one can know about our fracking investment plan, or our involvement with weapons.\nWe are a damn green energy company for gods sake. The damn hippy’s would go crazy if they found out with either. We have a shipment of essential fracking equipment moving tomorrow.\nIf it is not delivered on time, it will set us back significantly.'\n\n'We’ll take care of it sir, don't worry.'\n\nYou run away from the office and head back over to the medical department on the compound. \n\nYou burst into the medical room.\n\n'Sybel! Sybel! Sybel?'\n\nYou notice Sybel's glasses on the counter.\n\n'Shit. Where is she?'\n\nYou sprint out of the building and head straight for the\nexit of the compound.\n\nYou run home and burst into your apartment. \n \nYou sit in the corner breathing heavily. You put your head in your arms.\n\nYou reach for your mobile phone and dial Sybel's phone repeatedly, there is no answer. \n\nYou spend the next couple of hours attempting to reach Sybel.\n\n*page_break WHAT THE HELL DO I DO?\n", "police": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nCHAPTER V - ARRESTED\n\nJAIL - 07:34\n\nYou wake up on the floor inside a small jail cell. You rub your hand on your head.\n\n'Ouch' \n\nYou get up from the cell floor and look around.\n\n'Where the hell am I?'\n\nYou hear a voice from another cell.\n\n'You the kid from Exodus?'\n\n'What? Who's that? Who's there?' \n\n'I’m next door to you' the voice says. \n\n'Oh, Hi, where are we?' \n\nYou hear a subtle laugh. \n\n*page_break You're in jail! \n\n\n", "policeone": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\nJAIL - 07:50\n\n\n'No shit!' You reply.\n\n'Where you part of the group that did the Reven Job?' The voice says.\n\n'How do you know about that?' You ask.\n\n'We get to read the paper sometimes in here you know, when they aren’t treating us like terrorists' the voice says.\n'How long have I been here?' You ask.\n\n'About a week, I think they’ve been keeping you sedated'\n\n'What the hell?' You shout.\n\n'I told you, we’re treated like terrorists here' \n\n'Why are you here?' You ask.\n\n'We were the ones who hit the Shell HQ building in 2019' the voice says.\n\n'That was you?' \n \n'Yes sir' the voice says confidently.\n\n'That was some job. I remember the protests in London around that time, that was around the time I got into this stuff. Inspired me a lot those protests.\n\n'Really?' the voice says. \n\n'Yeah, Nice to meet you, what's your name?' \n\n'John Flemish'\n\nYou clutch your head again. You are in pain. \n\n'Ouch, my head, what have they given me?'\n\n'It's likely to be the sedatives they’ve been giving you; I've seen doctors in and out of\nhere every day for about a week now. Get some rest, you’ll be OK' John says.\n\nYou lay down on your bed and fall back asleep, almost instantly.\n\n*page_break Later that day\n\n", "policetwo": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nJAIL - 16:45\n\nYou wake up and hear the door of your cell clattering.\n\nA man and a woman, both dressed in smart suits enter the cell.\n\nThey both enter your cell and stare at you.\n\n'Come with us' the women says.\n\n'Where are we going?' You ask.\n\n'Don’t be scared, we’re just going to ask you some questions, I'm Detective Lesley and this is Detective Johnson' the woman says\nYou get up and follow the two detectives to a small interview room.\nYou all sit down.\n\nDetective Johnson organizes some papers on the desk.\n\n'Listen, kid, you are in some serious trouble, you know that don't you'\n\n'Yeah' you say, with a scared expression on your face.\n\nDetective Lesley chimes in. \n\n'We have called you a lawyer, we couldn’t find any relatives. You\ndon’t have anyone?'\n\n'No' you reply.\n\nDetective Johnson sighs.\n \n'OK, your lawyer will be here soon. In the meantime, what can you tell us about Simon Kirby, we believe was known in the activist community by the alias ‘Vertis’.\n\n\n*choice\n  #Who is that?\n   'I have no idea who that is sorry' you say. Both detective's sigh.\n \n   'If you do not cooperate with us, you'll be given a lengthy prison sentence.\n   You understand that right?' Johnson says. \n\n   'I don't care' you respond. 'there's not much going for me outside, I'm probably\n   better off in jail'. \n\n   Detective Johnson shakes his head.\n\n   'Suit yourself $!{name}, I'll take you back to your cell. Do you intend to plead guilty for the Reven infiltration'?\n\n   'Yes' you say. \n\n   'That will make your court appearance tomorrow a lot quicker, let's go'.\n\n   Detective Johson takes you back to your cell.\n   \n   The next day you are taken to court. You plead guilty to all charges, including one for domestic terrorism.\n\n   The judge sentenced you to 5 years in jail on terror charges. You don't even react to the verdict.\n   \n   2 YEARS LATER. \n   *finish\n  #I'll tell you everything.\n   'Listen I didn’t want to hurt anyone, I never had. I didn’t know they were going to try and blow up\n   the place'.\n\n   'You know it's going to be incredibly hard to prove that in court,' Detective Lesley says.\n\n   'I honestly had no idea Exodus were a violent group, I knew they were destructive, but I thought they were\n   against harming anyone. \n   Lesley and Johnson look over at each other.\n\n   'What? You ask.\n\n   'You didn’t think Vertis was part of the Exodus, did you?' Detective Johnson says.\n\n   'He isn’t?' you ask. 'Who the hell is he then?'\n\n   'No, we have been tracking him for a while. He works independently. Exodus is far more professional\n   than Simon Kirby' \n   The two detectives' smirk at each other.\n\n   'That explains a lot actually' you reply.\n\n   'What can you tell us about Exodus' Detective Johnson asks.\n\n   'I want to join them' you say, it's my life's goal. They are the most mysterious and powerful\n   climate activist group in the world'\n\n   'Yeah I wouldn’t say that in front of a judge if you ever want to get out of here,' Lesley says.\n\n   'Look. I went looking for them, I met these guys and just assumed they were Exodus. I guess I was a bit naive' you say.\n\n   'A bit? Exodus wouldn’t attempt a stupid job like this,' Johnson says.\n\n   A tall man confidently bursts into the room. He is carrying a coffee cup, wearing a long jacket and carrying\n   a briefcase. He plonks his briefcase and coffee in the middle of the table and takes off his long expensive-looking jacket. \n   He throws his jacket across the table in front of Johnson and Lesley.\n\n   'OK, that's enough for now detectives. Hi, I'm Gordon, I'll be your legal representative.'\n\n   Gordon walks back over to the door and holds it open. He looks over at Johnson and Lesley with a smug face.\n   Johnson and Lesley get out of their seats and walk toward the door.\n   Lesley looks over at Gordon. \n   \n   'You’ve got an hour'\n\n   'Thank you, that's plenty' Gordon says. Gordon slams the door shut after Lesley & Johnson leave.\n\n   'I’m going to be helping you out with this case,' Gordon says.\n\n   'Wait, where they hell are they going? I don’t even know what the hell happened at that place'\n\n   Gordon removes a box of cigarettes from his back pocket. He gestures the box to you.\n\n   'No thanks' you say.\n\n   'OK here’s the deal kid. You’re in some serious trouble, both your friends are dead on that little job you pulled, you know that\n   right?' \n\n   'I got it' you reply.\n\n   'From what I can see your just a good kid that's just been caught up\n   with the wrong crowd. How long did you know these guys?'\n\n   'A couple of weeks I guess'\n\n   Gordon removes some papers from his briefcase and takes notes.\n\n   'I can see you haven't had much guidance. No parents, no proper\n   friends from what I can see, just looks like these phony climate idiots manipulated and used you' \n   \n   Gordon looks over at you as if to get confirmation of all he's\n   saying. You nod slightly. \n\n   'I’m surprised you made it out of that place alive. No one else that has tried\n   what you tried has come close, and I've seen a lot of these climate activist cases in the last few years. It's become quite trendy.\n   Gordon smirks at you. You do not respond.\n \n   You have some talent $!{name}, I'll give you that.\n\n   'Thank you I guess?' you say, not sure how to respond to compliments from your legal representation.\n\n   'OK here's the deal. It's likely your gonna have to sit down in jail for a while, but if you take a plea deal I can\n   get you out in a year or so.\n\n   'A year, shit!' you say to Gordon. Gordon jumps back.\n\n   'Listen, you’re lucky we’ve even got this offer. You are lucky the judge owes me a favor, believe me people have\n   gone away for the rest of their lives with no parole for this sort of stuff'\n\n   'OK, I got it' you say. Detective Johnson bursts back into the room. \n   \n   'I said no smoking in here Gordon, are you guys done in here?'\n\n   Gordon looks over at you and nods.\n   You return the nod.\n\n   'OK, come with me $!{name}' Johnson says.\n\n   You follow Johnson back to your cell; you lay down and fall\n   asleep.\n\n   6 MONTHS LATER\n   You sit looking glum in a courtroom.\n   Gordon is next to you. Johnson and Lesley sit not far from you.\n\n   '$!{name}, take the stand please' the judge says.\n   You get up and walk over to the dock.\n   You look nervous and scared.\n\n   '$!{name}, I sentence you to 30 months in jail, after which you \n   will serve 5 years on probation on a closely monitored rehabilitation\n   program. \n\n   You barely react to the sentence. Gordon nudges and winks at you.\n   \n   He maintains a stern face, as do detectives Lesley and Johnson.\n\n   You return to your cell.\n\n   2 YEARS LATER\n   *set relationships +10\n   *finish\n\n", "promotion": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nCHAPTER VII - SYBEL\n\nREVEN GREEN ENERGY MEDICAL FACILITY - 06:47\n\nYou wake up and wipe your eyes. You look around. You are in what looks like \na hospital. \n\nA young, pretty nurse with short brown hair and Mike are standing in front of you.\n\nYou sit up in your bed.\n\n'Good morning ${name}. How you feeling?' Mike says.\n\n'I’m OK thanks, where are we? How are you, Mike?'\n\n'You’re in our medical facility, Sybel here is going to take care of\nyou'\n \nSybel smiles and waves at you, even though she is standing in front of you.\n\n'Hi' you say. \n\nYou look over at Mike with a concerned face. \n\n'You were shot.'\n\n'I’ll be okay, it was just a flesh wound, luckily we have Sybel based on site here, she sorted me out too' Mike says.\n\n'How long have I been out' you ask. Sybel answers with a smile.\n\n'52 hours, sorry about that, one of our guards was a bit over the top neutralizing you'.\n\n'I feel so tired' you say. Sybel laughs.\n\n'You’ll be fine. Give it a couple more days and it will wear off, it's just a strong sedative.'\n\n'What happened, with the intruders. Who were they?' you ask. A serious expression appears on Mikes face. \n\n'We had a breach, one of the worst in the history of the company. It seems is was another one of\nthese activist groups.' \n\n'Exodus?' you ask. Mike laughs.\n\n'No chance, these were lone wolf idiots. If it were Exodus we probably wouldn't be able to still operate.'\n\n'I don’t understand why they would try to hit a green energy company, it makes no sense.'\n\n'Like I said, extremist climate activist idiots' Mike says.\n\n'This does not make sense' you say.\n\n'How are you feeling?' Sybel says\n\n*choice\n  #I feel great! I'm ready to get back to work now!\n    'Not so fast tough guy' Sybel says as she laughs.\n    'Theres a lot more tests we need to do on you before you are going anywhere'\n    *finish\n  #I feel awful!\n    'That's Ok, it's probably the sedative. Give it some time, you'll be OK'\n    *finish\n  #Get out of your bed and start doing cartwheels around the medical facility\n    Sybel laughs at you and pulls you back into bed.\n    'Slow down there tough guy, theres a lot more tests we need to do on you'. \n    *finish\n\n\n\n", "promotionone": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n*page_break\n\nREVEN GREEN ENERGY MEDICAL FACILITY - 07:30\n\n'You’re quite the hero around here' Sybel says. She playfully touches your shoulder as she speaks.\n\n'You sure are,' Mike says. \n\n'Thanks to you we have managed to keep this little incident internal. We’ve lost a lot of guards, but this could have been the end for us.'\n\n'What were they attacking? Was it just a sabotage attempt?' you ask.\n\n'Hey, listen, we can go through everything later, get some rest and we’ll catch up later. In fact, lets have dinner tonight if you’re up to\nit. I want to go through a few things with you. A debrief and thank you for saving us'.\n\n'I don’t know, sure I guess' you say. Mike looks at his watch.\n\n'Listen, I’ve got a meeting now, you rest up, I’ll catch up with you later.'\n'Catch you later I guess' you say. You lay back down in your bed.\n\nMike leaves the room. \n\n*page_break Sybel makes eye contact with you", "promotiononepointfive": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nREVEN GREEN ENERGY MEDICAL FACILITY - 07:46\n\n'Why would they attack us? Reven is all green now, right?' You say.\n\n'You should rest, you’ve been through a lot' \n\n'I feel fine, just so tired. What did they shoot me with? you ask.\n\n'It was just some extremely strong tranquilizer, I don't even know why we keep that stuff here. Security was watching the whole\nthing on the CCTV and set the calvary on you. Can I get you anything else? I'm going to do my rounds up and down the ward. There's\nlots of others were injured in the attack as you can probably imagine.'\n\n'No, I’m fine, thank you for everything. Go and see to the others' you say.\n\nSybel smiles 'Well you can press this button if you need anything.'\n\nSybel leaves the room.\n\nLater that evening you start to get bored in your bed.\n\nYou look around to see if there is anything to do.\n\n*choice\n  #Take a walk about the medical facility and see what you can find\n    You get out of bed and take a walk around the facility to see what you can find.\n    You walk around and hear the beeping of monitors as you see other injured guards\n    laying in the other beds around you. What a brutal attack. Could it have been \n    Exodus? But why? Why would they even think about attacking a company that is now\n    fully green!\n\n    You notice Sybel helping other injured soldiers around the facility. You don't let her\n    see you as you know she'll send you straight back to bed.\n\n    You continue to walk around the facility to see what you can find. The place is huge. \n    It's almost as big as a public hospital. Why do they need all this space you think to yourself.\n\n    You peek into a cubicle right at the end of the corridor. You peek in there and notice a patient\n    covered up by a blanket. The persons feet and legs look badly burnt.\n    \n    You enter the cubicle to take a closer look. Why is this person so burnt?\n\n    A doctor storms into the cubicle and drags you away from the bed.\n\n    'Whats wrong with this person? Why are they burnt? Did this happen in the attack?'\n\n    'Yes, No, sorry I cannnot disclose that.'\n\n    'Why not, I work here too you know!' you say. The doctor pulls you back to your bed and you get it.\n\n    'Was that person injured in the attack?'\n\n    'No they weren't just a work accident, they'll be fine, don't worry about it'. The doctor leaves the room and rushes away.\n\n    This is really weird you think. You fall back to sleep very quickly.\n    *finish\n  #Chill in bed. You still feel tired and need to get some rest!\n    You lay back into bed and fall asleep. You really needed it.\n    *finish\n  #Read the newspaper next to you. It looks like there is an article on the latest EXODUS sabotage attempt!\n    You pick up the newspaper next you and read the article about the latest EXODUS sabotage attempt.\n    Their latest job was to sabotage newly built DAM on a nearby river.\n\n    The Dam was blown up in the middle of the night a few weeks after it was built.\n    The police have been told to treat them as terrorists and to shoot on site, which has been met\n    with controversy over social media, with certain users now getting behind the EXODUS group\n    after the DAM was built without local consultation, with lots of locals against it.\n\n    Two suspects where arrested for the explosion, but where later released after it was found they had \n    no involvement in the explosion, again with the mysterious Exodus group managing to evade the authorities.\n    Pressure is starting to grow on the police to catch any member or person with an affiliation to the group\n    with the public and politicians mocking the police and their lack of success.\n\n    There has been some rumours about police reaching out to MI5 and Interpol for assistance in catching\n    the group. \n\n    The investigation continues... \n    *set exodus +10\n    *finish\n", "promotiontwo": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nNOBI JAPANESE RESTAURANT - 21:45\n\nLater that evening, you and Mike are having dinner in a luxurious looking\nrestaurant. The table is full of Japanese food. \n\nMike looks excited.\n\n'Senior management are over the moon about you. This could have been an extremely difficult situation for us.' \n\n'Do we know any more about the intruders?'\n\n'Hell if I know, you know what these liberal lefty hippy climate psychos are like. They’ve always got something to moan about.'\n\n'I just don’t understand what their problem would be with a company\nthat has gone green. Is there something going on here I don’t know about?'\n\n'Of course not, look, relax, have a drink. We are here to celebrate.'\n\n'I don’t really feel like celebrating to be honest' you say.\n\n'C’mon, relax a little. Do you need something stronger to take the edge off?'\n\nMike removes a small plastic packet filled with various pills.\n\nMike reaches over to you with the packet open.   'Help yourself'\n\n*choice\n  #Put that shit away would you? Before we get thrown out of here!\n   'OKAY OKAY, relax.' Mike says.\n   Mike puts the small drug packet back into his pocket.\n\n   'Listen, on a more serious note. There was something I wanted to talk to you about'.\n\n   You stop eating your food and put your fork down.\n\n   Whats up?\n   *finish\n  #Take one of the pills from the packet.\n\n   You reach over and take one of the pills. You start to feel high almost instantly. \n\n   You feel good but you get slightly dizzy.\n\n   You get up on the table inside the posh restaurant. A well dressed elderly couple sitting \n   next to you look over in horror.\n\n   'GOODNESS ME' says the lady. Her husband shakes his head. Mike points and laughs at you.\n\n   A waiter walks over quickly to you.\n \n   'Excuse me Sir, please can you get down from the table.'\n\n   You ignore the waiter and continue to dance on the table.\n\n   'Excuse me Sir, please get down or I will have to call the police.'\n\n   You continue to dance. The waiter removes his mobile and dials. Mike notices him.\n\n   Mike pulls you down from the table and apologises to the waiter.\n\n   'I'm sorry, He's just had a bit much to drink. we'll behave I promise.'\n\n   'You better or else the police will be called!'\n\n   The waiter walks away and the whole restaurant attempts to continue with eating their dinner\n   after enjoying your unsolicited performance.\n\n   'Listen, on a more serious note. There was something I wanted to talk to you about'.\n\n   You stop eating your food and put your fork down.\n\n   Whats up?\n   *finish\n  #Grab the pill packet and throw it across the restaurant\n\n   You take the packet and throw it across the restaurant.\n\n   'What the hell is wrong with you, have you lost your mind? You know I'm still your boss!'\n\n   The waiter notices the pill packet flying across the restaurant. He walks over to the corner of\n\n   the restaurant and picks up the packet. The waiter starts to look angry and storms over to your table.\n\n   As he does a well dressed young male blocks the waiter.\n\n   'Excuse, that thing almost landed in my dinner, please can you remove those two, we are paying\n   good money to eat here!'\n\n   'Right away sir, I do apologise, I'm going to take care of them now'.\n\n   The waiter approaches your table.\n\n   'Excuse me gentlemen, I'm afraid I'm going to have to ask you to leave, we cannot tolerate that\n   sort of behavior in here, the other customers are starting to complain'\n\n   Yourself and Mike sit there like misbehaving school children.\n\n   The waiter throws the pill packet on your table.\n\n   'What the hell is that? Why are you throwing it across the restaurant?'\n\n   Mike looks at the waiter with a guilty face.\n\n   'I'll call the police if you continue to sit there!' The waiter raises his voice, attracting attention\n   from surrounding tables. Other guests at the restaurant start to stare at you.'\n\n   Mike grabs the pill packet from his table and puts it in his pocket.\n\n   'I'm sorry, my mistake. We'll behave I promise, my friend here has just had a bit too much\n   to drink.'\n\n   The waiter beings to look angry.\n\n   'This isn't some sort of strip club you know, our guests pay a lot to be here, the other guests are complaining about you.'\n\n   You lean over and see the young man who was on the receiving end of the pill packet staring at you. Mike also notices him.\n\n   'I said we're sorry, send that man over your most expensive bottle of wine, tell him i'll get his bill as well'.\n\n   Mike gives the angry young man a thumbs up. He then slips a wad on notes into the waiters pocket.\n\n   The waiter storms off and the two of your resume eating your food. \n\n   'Listen, on a more serious note. There was something I wanted to talk to you about'.\n\n   You stop eating your food and put your fork down.\n\n   Whats up?\n   *finish\n\n\n\n\n\n", "promotiontwopointfive": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nNOBI JAPANESE RESTAURANT - 22:35\n\n'Following on from this breach, we have an internal opportunity within the company I’d like you to\nconsider'\n\n'A promotion? I’ve only been here a couple of months!' you ask.\n\n'You’ve proved to us you have talents that aren’t being exploited fully within your current role with us.'\n\n'You mean cleaning shit up?' \n\nMike laughs.\n\n'Exactly.' 'What would I be doing' you ask.\n\n'We’d like you to head up security for the facility. Full time, permanent position' Mike says.\n\n'What? I’m only 20 years old, you know,' you answer.\n\n'I know you are young ${name}. We need someone with your skills and expertise of these activist groups. Our head of security is nearing\nretirement, and he would be able to train you up fully for a couple of months before he leaves us. \nI know you are still on probation for that silly stunt you pulled, I've already spoken to your attorney Gordon and the courts\nThey are both fine with this, should you choose to accept it.' \n\n'I don’t know what to say!' you say.\n\n'Listen. I know it’s a lot, just take it in for now, as you can imagine\nthere would be a significant increase to your compensation, along with bonuses.'\n\n\n*choice\n  #What can I say, I’ll take it!\n   You & Mike chink glasses and enjoy the rest of the evening. You both get extremely drunk.\n\n   You leave the restaurant and walk over to a nearby casino. The security at the door notice you and Mike are\n\n   both extremely drunk, but let you in anyway. Hard times, everyone is willing to take your money if you have any.\n\n   'Wow, this is like something in Casino Royale' Mike says.\n\n   The two of you walk over to the slot machines and begin to play on them. You both lose hundreds in about 5 minutes. You look over at each other\n\n   and suddenly you have both sobered up.\n\n   'Let's try roulette' Mike says. You both walk over to the roulette table. Mike removes a 50 from his jacket and puts it on red.\n\n   The croupier finalises the bet and spins the roulette wheel. The ball lands on zero, everyone loses.\n\n   There are sighs around the table and people walk away. Mike looks over at you.\n\n   'Blackjack?'\n\n   You walk over to the blackjack table, Mike sits down.\n\n   'Don't worry I know what I'm doing' Mike says. Mike removes a thick wad of notes from his jacket and pushes it toward the dealer.\n\n   'ALL IN' Mike says confidently. You look over at Mike.\n\n   'I got this' Mike says with a smirk on his face. \n\n   The dealer draws Mike a 10 and himself a 4. The dealer then draws Mike a 2. The worst card the dealer could possibly draw.\n\n   12 v 4, with 21 being the goal.\n\n   Mike looks over and nods at you. You look nervous.\n\n   The dealer looks over at Mike and awaits his response.\n\n   'STAND' Mike says with a smug look on his face. Stand? on 12? Madness you think to yourself.\n\n   You look over at the other players at the table. They have better hands than Mike. A lady to Mikes right has 20, and an elderly gentleman has 18.\n\n   The dealer takes another card. Its a 10. He's now at 14. Mike is already beaten. Mike is still smiling. \n\n   The dealer takes another card to improve his 14. It's a King. 24. BUST.\n\n   Mikes laughs. \n\n   The dealer pushes a large amount on chips toward Mike.\n\n   'Right, we're up, finally, let's get the hell out of here!'\n\n   'Sure thing!' you say.\n\n   The two of you leave and go to a nearby strip club, where you spend the rest of the night drinking and spending money on lapdances.\n\n   You get home at 5am, and feel awful. It was worth it.\n\n   What a night.\n   *achieve promotion  \n   *finish\n  #No! That's way too much responsibility for me, honestly I can't be bothered!\n\n   'Come on! What's wrong with you? This is a brilliant opportunity!'\n   \n   'I don't want the pressure to be honest, It just seems like too much work and responsibility.'\n   Mike laughs, 'Good one kid, like I said, give it some time, I'm sure you'll come around.\n   You think about it for a week, eventually you accept the position.\n   *finish\n  #I'd rather stick with my current position cleaning rubbish up. Thanks for the offer though\n   Mike laughs, 'Good one kid, like I said, give it some time, I'm sure you'll come around.\n   You think about it for a week, eventually you accept the position.\n   *achieve promotion \n   *finish\n  #Hell yeah, screw this restaurant though, lets trash the place!\n   You & Mike chink glasses and enjoy the rest of the evening. You both get extremely drunk and get rowdy.\n\n   The waiter attempts to quiet you down but it's way too late. You and Mike turn over your table and then start\n\n   to do the same to other guests tables as well. The waiter calls the police and attempts to calm you down. It's no use.\n\n   The police arrive and arrest you. You spend the night in a jail cell and wake up with a painful headache.\n\n   The police release you in the morning with a caution.\n\n   A crazy night out with your boss, but on the plus side. You did get a promotion!\n\n   Never again.\n   *achieve promotion \n   *finish\n\n\n\n\n\n", "reven": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nCHAPTER VI - FREEDOM?\n\nJAIL - 08:07\n\nThe tall, large jail gates slide open as you exit the jail.\nYou carry only a small backpack that contains a few of your possessions.\nGordon is waiting in a luxurious car outside. The window slides down and he shouts over to you.\n\n'How's it going $!{name}?' Gordon says. smirking at you.\n\n'I’m good thanks, you? Are you here for me?'\n\n'Can't complain! Nah I’m picking someone else up' Gordon says.\n\nYou begin to walk slowly away from the prison with your small backpack.\nThe luxurious car slowly drives beside you as you walk. \n\n'I’m joking, Jesus. Get in would you $!{name}'?\n\nYou climb into the luxury car. \n\n'Where are we going?' you ask.\n\n'I’m just going to be giving you some guidance as part of your\nrehabilitation program. We’re going to your new place'.\n\n*choice\n  #New place? \n   Yes sir!\n   *set relationships +10\n   *finish\n  #Leave me alone would you, I've just got out of prison!\n   'Come on $!{name}, You don't have anyone else and you've just got out of prison. What are you going the do?\n   You'll find yourself mixed up in these activist groups again and end up in prison!'\n   *finish\n\n\n\n\n", "revenjam": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nCHAPTER X - LONG KISS GOODNIGHT\n\nFLAT - 02:23\n\nYou lay in your bed. You struggle to fall asleep.\n\nYou toss and turn in your bed for hours but it is no use. There is no way you are falling asleep in this state.\n\nYou go for a jog around your area. That will help you think straight and hopefully fall asleep.\n\nYou arrive home. You are still full of adrenaline. You get down and do 50 push ups.\n\nYou get back into bed and attempt to fall asleep again. No chance. \n\n'I have to do something!' you shout.\n\nYou get out of his bed, grab your bag and head for the exit of your apartment.\n\n*choice\n  #Pull off a dramatic sabotage heist on Reven Green energy and sabotage their fracking shipment. \n   You remember overhearing the shipment of fracking equipment Reven Green Energy are involved in moving the next day.\n\n   You wait until dawn and head to the private Reven energy transport rail yard. You see long crates labelled with the REVEN GREEN ENERGY logo\n   being loaded onto a twelve-carriage freight train. \n   Some crates are labelled with the circular logo seen during\n   the meeting and on the soldier's uniforms who attempted to assassinate you. \n\n   'we'll see about that' you say out loud.\n\n   You steal a car and drive along the railway, following the track.\n    \n   The train leaves the loading bay. The train driver and his assistant talk to each other.\n\n   'What are we carrying? This thing can barely move.' \n\n   'Hell should I know? I just drive'. The train sluggishly chugs along.\n\n   'What the hell is that? Is that a car on the tracks?' the assistant train driver says.\n\n   There is an abandoned car in the middle of the tracks in the distance. It is the car you stole earlier.\n\n   It is parked in the middle of a bridge, blocking the trains path. The train is headed straight for it.\n\n   'Hit the brakes!' The train driver says. \n\n   The freight train hits the car. The car slides off\n   off the bridge and onto a road below, causing a huge crash. \n   The bridge is next to a police station.\n\n   Officers begin to pile out of the station. They notice the freight train in the middle of the bridge.\n   Officers run toward the train. \n\n   'What the hell is going on?' a police officer says.\n\n   'That damn car was in the middle of the tracks. We couldn’t stop in\n   time. Our cargo is so heavy the brakes where slower than usual'\n\n   'What’s in the carriages?' the police officer asks'\n\n   'I don't know. I just drive! I know the client is Reven Green Energy' The driver says. \n\n   The police officer pries open one of the containers inside the\n   carriage and finds fracking equipment and drilling tools.\n\n   'Reven Energy are involved in fracking? I thought they were a green energy company?'\n\n   The press arrives on the scene and begin to take photos of the Reven Green Energy carriages.\n\n   Reven Energy have been exposed.\n   *set exodus +10\n   *achieve stealthmaster\n   *finish\n  #Drop everything and escape this world. Live a peaceful life in the country.\n   You flee your apartment and head back into to the countryside. You forget about the job and the promotion. \n\n   For a couple of weeks your phone is bombarded by texts and calls from various managers and senior staff at Reven.\n   Mike is not one of them strangely. You ignore all of them and eventually put your phone on\n   airplane mode to stop them bothering you. Can't they take a hint?\n    \n   You eventually receive a generic corporate email informing you your employment has ended and you have been let go.\n   You are not surprised. The email informs you about the broken prison release agreement and advises you to report back to \n   prison.\n\n   There is no way you are going back to prison. You'd rather live a life on the run than go back there.\n\n   You buy a decent tent with your savings a live out in the countryside. You actually enjoy it a lot more than your flat.\n   And you don't have to put up with neighbors either side or stomping above you. Much better!\n\n   You meet other activist groups and live out your days living\n   a peaceful nomad life, away from corporate greed of Reven and the materialism of modern life.\n\n   You spend your days going to illegal raves in abandoned factories and warehouses, meeting people and converting them to your\n   free nomad way of life. \n\n   You have to live life looking over your shoulder as you are now wanted by the authorities. \n\n   You live out the rest of your life free and happy, but always wonder what could have been if you'd have attempted to expose\n   your crooked ex employer.\n\n   The police eventually catch you while you are sleeping in a forest close to Alpine. They drag you back to court and you are sentenced for\n   another 6 months in prison.\n\n   You see out your sentence and as soon as you are release you go back to the nomad way of life. You are happy and that's the main thing.\n   *finish\n", "revenone": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nFLATS - 10:45\n\nYou open the envelope Gordon gave you and remove the key. \n\nYou walk through the halls and enter flat 66.\n\nThe flat is extremely bare. You throw your bag on the floor and lay on the bed.\n\nYou reach for the brown envelope and remove the booklet inside.\n\nYou notice the REVEN logo. It is familiar but has now changed slightly. The font has now turned green, and the logo\ncontains depictions of trees and water.\n\nREVEN GREEN ENERGY.\n\n*page_break You read through a small booklet inside the envelope.\n\n\n", "revenonepointfive": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nFLAT - 07:35\n\nYou wake up early and get dressed. It's your first day at your new job. \n \nYou head out of your flat to a nearby bus stop.\n\nThe bus arrives and you get on. You speak to the bus driver.\n\n'Reven energy?'\n\nThe driver gestures to the passengers on the busy bus.\n\n'You and everyone else kid'\n\nYou tap your bank card close to the drivers sectioned off driving area, the bus ride costs $6.\n\nYou walk toward the rear of the bus and sit down. The other passengers on the bus mostly appear to be ex cons. Many\nof them have shaved heads, some have nationalist far right-wing tattoos and scruffy torn clothes.\n\nThe bus drives for many miles heading into the countryside.\n\nThe bus stops next to a long dusty dirt track, and you and the entire bus get off.\n\nA soldier is waiting there as the buses occupants get off. \n\n*page_break Reven Green Energy this way\n\n", "revenonepointnine": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nREVEN GREEN ENERGY COMPOUND - 10:00\n\nThe guard leads you and the rest of the group through the Reven\nEnergy compound. The compound is full of large turbines and large solar\npanels. A loud buzzing can be heard throughout the premises. The site appears to be deserted. Very few workers can be seen\naround the site.\n\nThe security guard enters what appears to be the main central building of the compound.\nYou are led into a small locker room. The guard picks up some\ngrey overalls and tosses them to you. you catch them.\n\n'OK $!{name},Put these on and go to building 14, you’ll be briefed there.'\n\nThe guard leaves the room with the rest of the group following him.\n\nYou take off your backpack and put on the overalls.\nYou walk out of the small locker room and look for building 14. You walk through the desolate compound as the sun beats\ndown on you. You begin to sweat in the overalls.\n\nYou approach building 14 and knock on the door. There is no response.\nYou knock again. You hear a voice shout over to you.\n\n'What do you want?'\n\nyou jump back, shocked by the unprovoked bellowing out.\n\n'I’m the new guy. $!{name}'\n\nYou hear stomping feet storm over to the door, opening it\naggressively. \n\nA man in his 40's stares you up and down. He grunts.\n\n'I'm your boss, Mike. Follow me'\n\nYou follow Mike, who leads you to a corner of the compound. You struggle to keep up with Mikes relentless pace of\nwalking. You arrive at a pile of rubbish in the corner of the compound. \nMike looks over at you while pointing at the rubbish.\n\n'I want that lot gone by the end of the day. Your break is at 12:30, there are spades over there'\n\nMike walks off, leaving  you to get on with your work.\n\nYou let out a sigh and pick up the spade.\n\n*choice\n  #proceed to sweep leaves around the compound.\n   You get straight to work clearing rubbish around the compound. You work very hard as the sun beats down you on. Mike notices working hard as he sees\n   you in a building window. He nods slightly at you. You return the nod and get on with your work.\n   *set relationships +10\n   *finish\n  #Stand around pretending to work. What difference will it make?\n   You sweep a couple of leaves around but don't really push yourself. Mike notices you as he sees\n   you in a building window. He shakes his head and says something. You cannot hear but from lip reading you make it out to be \n   'Stupid lazy Gen Z criminals, expect everything for nothing'. You stick your middle finger up at him and he walks away from the window. \n   *finish\n", "revenonepointseven": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nREVEN GREEN ENERGY COMPOUND - 09:35\n\nThe solider gestures toward a narrow dirt path. The group is led along a narrow dirt track.\nYou notice a sign that says ‘Reven Green Energy’. \n\n'STAY TOGETHER PLEASE' the soldier says.\n\n'Changed quite a bit' you say to yourself.\n\nThe group approaches the large compound. Huge, barbed wire fences surround the compound.\n\nA woman in a smart suit walks out onto a platform above the wondering group.\nShe addresses the group.\n\n'Welcome to Reven Green energy!' \n\nThere are uninspired mumbles amongst the group.\n\n'My name is Oliva-Scott Yamamoto, welcome to our home. Our rehabilitation program is going\nto help those of you with troubled pasts find a new career at our great company. You are going to be\nsplit into groups and you’ll meet your supervisors who will slot you into your roles'.\n\nOlivia-Scott walks away from the raised platform and back into the office.\n\nThe group begin to wander around and chat amongst themselves.\nA security guard emerges from the compound. He shouts over to you and the group.\n\n'OKAY, WHEN YOU HEAR YOUR NAME READ OUT GO AND JOIN YOUR GROUP.'\n\nOfficers begin to read out various surnames. As names are read out, the group begin to split off into their teams.\nYou hear your name being shouted by a tall Security Guard.\n\n$!{name}!\n\nYou walk over and the tall security guard approaches you.\n\n'You OK $!{name}?' You nod. \n\n'Stand this side please'.\n\n*choice\n  #Yes Sir\n   You quickly stand next to the guard.\n   'Follow me' The guard says.\n   *set exodus +10\n   *finish\n  #Ugh? Is this school?\n   You stay stood there ignoring the guards request. The guard grabs you and \n   drags you next to him.\n   'Follow me' The guard says.\n   *finish\n\n\n\n", "revenonepointtwo": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nFLAT - 10:54\n\nREVEN GREEN ENERGY IS PROUD TO ASSIST WITH THE REHABILITATION PROGRAM ALSO SUPPORTED BY THE LOCAL COUNCIL. STARTING AS A\nMAINLY OIL AND GAS BASED COMPANY IN 1935, WE HAVE EVOLVED INTO A NOW COMPLETELY GREEN ENERGY COMPANY THAT FOCUSES ON\nTHE RESEARCH AND DEVELOPMENT OF SUSTAINABLE ENERGY, WITH A FOCUS ON WIND AND WATERPOWER. \nWE HAVE COMPLETELY LEFT OUR HUMBLE OIL AND GAS BEGINNINGS IN THE PAST AND WE ARE NOW FOCUSING ON NEW AND EXCITING OPPORTUNITIES WHILE GIVING A HELPING HAND TO OUR PLANET.\nWE LOOK FORWARD TO WELCOMING YOU TO THE REVEN FAMILY AND GIVING YOU THE OPPORTUNITY TO GROW WITH US AS WE MOVE INTO A\nNEW 100% SUSTAINABLE WORLD.\n\n'You’ve changed huh?' You say. \n\nYou put the papers back inside the envelope and lay down on\nyour new bed. \n\nYou fall asleep.\n\n*achieve getajob \n*page_break The next day\n\n\n", "revenplus": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\nJAIL - 08:20\n\n'It's all arranged. I’ve managed to arrange a job for you\ntoo' Gordon says enthusiastically.\n\n'Where is it?' You ask.\n\n'Reven Green Energy' Gordon says with a smirk on his face.\n\n'What? I’m not working for them; you realize why I was in jail right?'\n\n'Relax' Gordon says.\n\nYou attempt to exit the car. \n\n*page_break Gordon puts his hand on your shoulder.\n\n", "revenplusone": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\nJAIL - 08:37\n\nGordon Sighs.\n\n'Look kid, if you turn this down, you know its straight back to jail right, you’re still on\nprobation for 5 years, you know that right?'\n\nYou pause. Gordon playfully punches you in the arm.\n\n'Come on, it will be fine. What else are you gonna do? You’ll only fall in with the wrong crowd again, is\nthat what you want?' \n\n'No of course not' you say. \n\nYou get back into the car. Gordon leans over to you.\n'Listen, Reven has changed now, green energy is everything now.\nThey aren’t involved in oil or gas anymore. They are moving forward as\na green energy company'\n\n'I heard that ages ago, but I still don't believe it, when do I start?' you say.\n\n'In a couple of days, I’ll take you if you want'.\n\nGordon drives for a couple of miles until you arrive at some\nrun down flats. The car pulls over to the left.\nGordon reaches into his dashboard compartment and pulls out a large brown envelope.\n\n'OK, here we are. The keys and all the details are inside. Its number 66 I believe.'\n\nYou take the envelope.\n \n'Thanks for all your help'\n\nDon’t sweat it $!{name}, its why I'm here. Listen get settled in, I’ll give\nyou a call in a week and see how you are getting on.'\nYou smile, \n\n'Yeah, sounds good.'\n\nYou get out of the car and walk toward the rundown flats.\n\nGordon shouts from the car.\n\n'Good Luck $!{name}?'\n\n*choice\n  #Ignore Gordon and head to your flat.\n   You ignore Gordon and walk away. Gordon sits in his card waiting for a response from you.\n   He begins to look sad and drives away.\n   *finish\n  #Thank you, I really appreciate your help\n   Gordon smiles warmly. Thanks $!{name}. It's been my pleasure representing you.\n   I wish you all the best! Gordon drives away.\n   *set relationships +10\n   *finish\n\n \n", "revenreveal": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nCHAPTER IX - THE MISSION\n\nREVEN GREEN ENERGY SURVEILLANCE DEPARTMENT - 17:45\n\nYou head over to room A424 and enter the room. The huge room is full of computers and high-tech equipment.\n\nThere is a team of 50 people inside the room, all working relentlessly sitting at computers. All the computer \nscreens appear to have maps with various dots on. Every member of the team is tracking someone.\nWhat the hell are they up to in here, you think to yourself. This is a green energy company, not a police department.\n\nYou walk through the room slowly, you see Mike sitting in the corner of the room. He has his eyes locked on a computer\nscreen.\n\nMike is sitting at a computer next to a young man wearing glasses. The young man looks very nerdy.\nThe young man is showing Mike something on this computer.\n\n'You think this is them William?' Mike says. \n\n'Yes sir, for sure.' William says.\n\n'We need to be 100 percent on this.'\n\n'This is where we tracked them from the protest sir. We also tracked what appears to be the team\nthat attempted to hold up the oil rig transport ship in the Atlantic.'\n\nMike continues to stare at William, he doesn't seem convinced.\n\n'It is sir, remember the poisoning at the energy conference? We tracked the waitress who supposedly \npoisoned the drink to the same hideout.'  \n\nMike turns around and notices you standing behind him. \n\n'$!{name}, finally you are here! Good. Have a seat.' You sit down at the computer. \n\n'This is William Roberts, our head of surveillance,' Mike says.\n\n'Nice you meet you $!{name}', William says, 'I've heard some great things' \n\nYou nod.\n\n'Thanks, quit a team you got here.'\n\nWilliam points to his computer screen. \n\n'You see this red mark here?'\n\n'Sure, what it is' you ask. \n\n'We think it's where the Exodus HQ is. We followed multiple protesters from the Intercontinental Hotel after\nthe meetup of oil executives a few months back. We have been doing this at various climate protests recently\nand each time one of the protestors seems to head back to this location, in the middle of nowhere'.\n\nA shocked look appears on your face. \n\nYou remember your lifelong goal.\n\nWilliam continues.\n\n'Do you know this area? It's amount 3 miles from Alpine National Park.'\n\nYou cast your mind back to your early days after school looking for the Exodus group. \n\nMike and William both look over at you, they both have eager looks on their faces.\n\n*choice\n  #Yes I know this area! After school I went looking for the Exodus group.\n   William looks over at you with a shocked face. Mike does the same.\n   'Tell us about it'\n   \n   'Well I was really young. I had just finished school and I did some travelling around looking for the exodus camp'\n\n   'You didn't find them obviously?'\n\n   'No, I found some activists living out there in an abandoned house, they were posing as Exodus.'\n \n   Mike nods.\n\n   'Was that the attempt you guys did on our old site'\n\n   'Yeah' you say.\n\n   'Those guys are dead now, they were shot on site. You're lucky to have survived that.'\n\n   You gulp.\n\n   William looks over at Mike with a confused face.\n\n   'It's OK, $!{name} is a changed person now aren't you $!{name}!'\n\n   'Sure am', you say. \n   *set relationships +10\n   *finish\n  #I don't know this area, I've never been close\n   Mike looks over at William.\n   'You sure?'\n   'Yeah, I've never been around this area.'\n\n   Mike looks curious.\n\n   'I was told you did some exploring around those parts, is that not true?'\n\n   'Erm, who told you that?'\n \n   'I think it might have been your lawyer, Gordon.'\n\n   You start to look awkward.\n\n   'Oh, yeah, I forgot, that was many years ago though.'\n\n   Shit! You think to yourself, I've just been caught lying to my own boss!\n   *finish \n  #Stay silent\n   You stay completely silent.\n\n   'Try to cast your mind back', Mike says.\n\n   You shake your head.\n   *finish \n\n\n\n", "revenrevealone": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\nREVEN GREEN ENERGY SURVIELLANCE DEPARTMENT - 18:47\n\n'How can you be sure this is the camp, you know Exodus have never been found' you say.\n\n'Like I said, we’ve been tracking them, along with other smaller activist groups for a while now.' \n\n'Why? Why do you need to track all these people?' you ask. 'There must be 60 people in here!'\n\n'Well, we are trying to prevent attacks before they happen, you've seen first hand what it can be like here'\n\nMike chimes in. 'You know how the saying goes. Keep your friends close, enemies closer. This is where you come in $!{name}'\n\n'I’m listening' \n\n'We want you to go there and make sure its them' Mike says\n\n'What, that's crazy! You know how sophisticated they are!' you say.\n\n'We do, but we also know how talented you are $!{name}, you can avoid being noticed by anyone and we've seen how strong and versatile you are'.\n\n'Why do you want me to go there' you ask.\n\n'This is part of your new position now. See what information you can get\nand bring it back to us. Just see what's going on around there and report back, make it as\nnatural as possible. You know these drifters go from group to group. Try and join if you can \nand get to know the members and their future targets. Stay as long as you feel safe to\nleave.'\n\n'You want me to go undercover?'\n\n'See if you are able to get close to any of the members, we need to somehow bring down this organization, you must have heard how the attempt on\nthe oil rig transporter went. They need to be recruiting soon, their members must be getting too old and losing sharpness.'\n\n'Can I have a think about it?' you ask\n\n'We need you to do this as soon as possible. I didn’t mention this, but there\nwill be a significant bonus for you for this job.\n\n'OK, I’ll do it' you say.\n\n'Report back to me in a week' Mike says.\n\n'Got it.' \n\nYou get up to leave the room.\n\n'Oh, and be careful out there' Mike says.\n\nYou don't respond.\n\nWilliam looks over at you.\n\n'Sure you are ready for this?'\n\n*choice\n  #I'm ready, What about weapons and equipment?\n    'Good man'! William says.\n    'follow me'.\n    \n    You follow William in a small room in the corner of the room. He hands you a kevlar bullet proof vest and boots.\n\n    'You want a gun?' William says.\n\n    'No, I'm OK. I can handle myself, my task isn't to shoot up the place.'\n\n    William laughs.\n\n    'Good point!'\n\n    William shows you a tactical knife, you take it and put it in your pocket.\n\n    You feel like James Bond! You are ready to go on your mission.\n\n    You leave the small room in the corner and sit back down next to Mike.\n    *finish\n  #This is not something I want to do to be honest. I'm head of security, not an undercover cop!\n    Mike starts to look unhappy.\n\n    'You did such a great job under pressure during the invasion. This should be a walk in the park for you!\n    Another benefit of giving someone young this job, you are able to get yourself out of trouble. \n\n    'Hmm, I'm not sure if this is what I signed up for.'\n\n    'You love to explore and meet other activist groups, this is what you did after you left school, the difference is,\n    now you are being paid for it! And paid very well if you ask me!'\n\n    'Well if you put it like that.' you say.\n    *finish\n  #Ignore William, who is this geek?\n    You do not reply to William. What the hell does this guy know about activist groups anyway!\n    *finish\n", "revenrevealtwo": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\n\nREVEN GREEN ENERGY SURVEILLANCE DEPARTMENT - 19:15\n\n'Oh, there was something I wanted to ask you about' you say.\n\nMike reaches for his pocket and writes something on a sheet\nof paper.  You look shocked. It's a huge amount of money.\n\n'What’s this? Is that the bonus?' You ask.\n\n'Sure is, what did you want to ask me?'\n\n'Oh nothing, don’t worry about it' you reply.\n\nYou leave the room and begin to prepare for your mission.\n\nYou remember the chat you had with Sybel. You try to ignore it and carry on with preparing yourself for the mission.\n\nYou continue to think about Sybel and the possibility of Reven not being a green energy company.\n\nLater that evening, Sybel sends you a text message.\n\nHEY $!{name} HOW ARE YOU DOING, DID YOU MANAGE TOO \nASK MIKE ABOUT WHAT WE TALKED ABOUT?  XXXX\n\nYou do not respond to the text message. \n\nYou struggle to sleep that night.\n\nThe next day you see Mike walking around the facility. He is carrying a coffee and looks relaxed.\n\nPerfect time to ask him!\n\n\n*choice\n  #I already know we are not a green energy company you fraud, tell me everything or I go to the press!\n\n    Employees around start to stare at your sudden outburst.\n\n    'What the hell are you talking about? Keep your god damn voice down would you?' Mike says.\n\n    'You heard me!' you say.\n\n    'Sit, down let's go to the cafe and have a chat.' Mike says. You both head over to the cafe and sit down.'\n\n    'What have you heard, and from who?' Mike asks.\n\n    There's no way you are going to say it came from Sybel, that could get her in trouble too!\n\n    'I just heard some things about Reven not being a green company at all, is this true?'\n\n    Mike laughs.\n\n    'That's rubbish, of course we are.'\n\n    'Well, my contact has shown me proof! Is it true or not? It would explain why activist groups are trying to sabotage us'.\n\n    Mike stops laughing and his tone changes.\n\n    'The whole transition can't happen over night you know, do you realize the demand? If everyone is driving electric cars we would need almost\n    double the amount of energy we use at the moment!'\n\n    'Good point, I've heard people have been coming in with fracking injuries.'\n\n    Mike looks at you with a curious face.\n\n    'So it was someone in the medical facility was it?'\n\n    Shit! you think to yourself. He's sharp.\n\n    Mike smiles again.\n\n    'There is still a small percentage of our energy that still relies on fossil fuels, however we are working on new technologies\n    to eventually move away from them. It will be a couple of years but what do you expect?'\n\n    'OK, thanks for letting me know, I feel a lot better about things now.'\n\n    'No problem, anything else before you head on your mission?'\n\n    'No, thank you.'\n\n    Later that evening, Sybel is working alone at the medical facility. She is just finishing her shift and is tidying up around the ward.\n\n    It is 11:15 in the evening and Sybel looks tired. Everyone else has finished their shift and it is Sybel's turn to tidy and lock up the ward.\n\n    Sybel hears someone lurking around in the dark. \n\n    '$!{name}, IS THAT YOU'\n\n    There is no response. Sybel see's someone escaping out the back door of the ward.\n  \n    'What the hell is going on'.\n    *finish\n  #I've heard some things that are concerning about the company, can we have a chat?\n    'Oh, Hi $!{name}, of course, what's on your mind?'\n  \n    'I just heard some things about Reven not being a green company at all, is this true?'\n\n    Mike laughs.\n\n    'That's rubbish, of course we are.'\n\n    'Well, my contact has shown me proof! Is it true or not? It would explain why activist groups are trying to sabotage us'.\n\n    Mike stops laughing and his tone changes.\n\n    'The whole transition can't happen over night you know, do you realize the demand? If everyone is driving electric cars we would need almost\n    double the amount of energy we use at the moment!'\n\n    'Good point, I've heard people have been coming in with fracking injuries.'\n\n    Mike looks at you with a curious face.\n\n    'So it was someone in the medical facility was it?'\n\n    Shit! you think to yourself. He's sharp.\n\n    Mike smiles again.\n\n    'There is still a small percentage of our energy that still relies on fossil fuels, however we are working on new technologies\n    to eventually move away from them. It will be a couple of years but what do you expect?'\n\n    'OK, thanks for letting me know, I feel a lot better about things now.'\n\n    'No problem, anything else before you head on your mission?'\n\n    'No, thank you.'\n\n    Later that evening, Sybel is working alone at the medical facility. She is just finishing her shift and is tidying up around the ward.\n\n    It is 11:15 in the evening and Sybel looks tired. Everyone else has finished their shift and it is Sybel's turn to tidy and lock up the ward.\n\n    Sybel hears someone lurking around in the dark. \n\n    '$!{name}, IS THAT YOU'\n\n    There is no response. Sybel see's someone escaping out the back door of the ward.\n  \n    'What the hell is going on'.\n    *set relationships +10\n    *finish\n  #Avoid asking Mike about Sybel's concerns, it could ruin your working relationship!\n    You have some small talk with Mike, but avoid asking him about the concerns Sybel mentioned. \n\n    Later that evening, Sybel texts you and asks if you have spoken to Mike.\n\n    You tell her that you haven't and you end up having an intense argument.\n\n    You try to apologize but Sybel blocks you.\n    *finish\n\n\n", "reventhree": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n\n\n\n*page_break\n\nCHAPTER XI\n\nJAIL - 08:07\n\nThe tall, large jail gates slide open as you exit the jail.\nYou carry only a small backpack that contains a few of your possesions.\nGordon is waiting in a luxurious car outside. The window slides down and he shouts over to you.\n\n'How's it going $!{name}?' Gordon says. smirking at you.\n'I’m good thanks, you? Are you here for me?'\n'Cant complain! Nah I’m picking someone else up' Gordon says.\n\nYou begin to walk slowly away from the prison with your small backpack.\nThe luxourious car slowly drives beside you as you walk. 'I’m joking, Jesus. Get in would\nyou $!{name}'?\n\nYou climb into the luxury car. \n'Where we going' you ask.\n'I’m just going to be giving you some guidance as part of your\nrehabilitation program. We’re going to your new place'.\n'New place?' you ask. \n'Yeah, its all arranged. I’ve managed to arrange a job for you\ntoo' Gordon says enthusiastically.\n'Where is it?' You ask.\n'Reven Green Energy' Gordon says with a smirk on his face.\n'What? I’m not working for them, you realize why I was in jail right?'\n'Relax' Gordon says.\n\nYou attempt to exit the car. Gordon puts his hand on your shoulder.\n'Look kid, If you turn this down, you know its straight back to jail right, you’re still on\nprobation for 5 years, you know that right?'\nYou pause. Gordon playfully punches you in the arm.\n\n'Come on, it will be fine. What else are you gonna do? You’ll only fall in with the wrong crowd again, is\nthat what you want?' \n'No of course not' you sa
