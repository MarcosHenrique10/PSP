<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Race — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "therace", "title": "The Race", "scenes": {"11startup": "*image race_plain.JPG\n\n*page_break\n*if name = \"Unknown\"\n  Before we start, what is your name?\n  *input_text name\n  Welcome ${name}!\n\n  Which country are you from:\n  *choice\n    #England\n      *set country \"England\"\n      Ah, British.\n      *goto introduceme\n    #Australia\n      *set country \"Australia\"\n      I see, an Australian team.\n      *goto introduceme\n    #The USA\n      *set country \"The USA\"\n      Okay, an American team.\n      *set american \"English\"\n      *set americans \"English\"\n      *goto introduceme\n    #Other...\n      *input_text country\n      *if country = \"Espana\"\n        *set country \"Spain\"\n        Ah! There is already a Spanish team in the game.  Let's just pretend that the other Spanish team come from a town far from you.  That will let us carry on with two teams from the same country.\n        *goto introduceme\n      *if country = \"Spain\"\n        Ah! There is already a Spanish team in the game.  Let's just pretend that the other Spanish team come from a town far from you.  That will let us carry on with two teams from the same country.\n        *goto introduceme\n      *if country = \"France\"\n        Ah! There is already a French team in the game.  Let's just pretend that the other French team come from a town far from you.  That will let us carry on with two teams from the same country.\n        *goto introduceme\n      *if country = \"Canada\"\n        Ah! There is already a team with a Canadian in the game.  But that's okay, while they are an amalgamation of one Canadian and one German, your team is purely from Canada.\n        *goto introduceme\n      *if country = \"Deutschland\"\n        *set country \"Germany\"\n        Ah! There is already a team with a German in the game.  But that's okay, while they are an amalgamation of one Canadian and one German, your team is purely from Germany.\n        *goto introduceme\n      *if country = \"Germany\"\n        Ah! There is already a team with a German in the game.  But that's okay, while they are an amalgamation of one Canadian and one German, your team is purely from Germany.\n        *goto introduceme\n      *if country = \"Italia\"\n        Fantastic!  An Italian player.  I love Italian food and you have two beautiful cities in Roma and Milano, the only places I have been to.  I hope to visit Florence on my next trip.  Anyway, enough about me, on with the game!\n        *goto introduceme\n      *if country = \"Italy\"\n        Fantastic!  An Italian player.  I love Italian food and you have two beautiful cities in Roma and Milano, the only places I have been to.  I hope to visit Florence on my next trip.  Anyway, enough about me, on with the game!\n        *goto introduceme\n      *if country = \"Japan\"\n        What a great country!  I have been to Tokyo and Osaka several times.  Every time I am amazed by the glamour of the city and the wondourous food.  Anyway, enough about me, on with the game!\n        *goto introduceme\n      *if country = \"Hungary\"\n        What a beautiful country you live in!  I visited Budapest in the summer of 2002 and fell in love with the city instantly!  I especially liked the small island 'Margarite', between Buda and Pest.  Anyway, enough about me, on with the game!\n        *goto introduceme\n      *if country = \"Scotland\"\n        Aye, a Scot playing the game?  Great!  I am a quarter Scottish myself after my paternal grandmother.  My favourite city in Scotland is Edinburgh, but nothing beats a holiday to the legendary Loch Ness!\n        *goto introduceme\n      *if country = \"Poland\"\n        Wow!  You live in such a beautiful country!  I visited Poland in the summer of 2002 and went to Warsaw, Krakow, and Zakopane (in the Alps).  I would love to go back again!\n        *goto introduceme\n      So you're from ${country}?  Great, let's play!      \n      *goto introduceme\n\n*label introduceme\n*choice\n  #Start the game\n    *goto go_on_introduce\n  #Other games by Andy Why\n    *choice\n      #Colonising Kepler 62e\n        *set game_reader +1\n        *if game_reader = 5\n          *achieve gamer\n        \"...People walked freely, without barriers or confinement. Animals roamed free and birds flew where they pleased. And the best thing of all. [i]The[/i] best thing. The sky was blue!\"\n        \n        You listen carefully as your great-grandfather recounts your favourite story to you and all the other children. You feel slightly special because\n        your great-grand-pappy is the last. Once he is gone, that will be it. There will not be another human alive who actually saw Earth for real.  This also saddens\n        you.  Along with every other passenger on board the intergalactic spaceship 'Swansong', you were born here, will live your life here, and you will die\n        here, without ever setting foot outside of the vessel.\n\n        *image Kepler.jpg\n\n        In the year 2090, a large asteroid is discovered on a collision course with Earth. The only hope for humanity is a project to colonise the only confirmed\n        habitable planet found: Kepler 62e. With a journey of 1200 light years to traverse, begin your journey as a new recruit on the spaceship. Explore\n        cryogenic technology and countless others. Combat emotions as you make bold decisions that will affect all life as we know it. Can you prevent the\n        death of us all?\n        *page_break Back\n        *goto introduceme\n      #Korean Haste: The Race Continues\n        *set game_reader +1\n        *if game_reader = 5\n          *achieve gamer\n        *goto_scene korean_haste\n      #Blackraven\n        *set game_reader +1\n        *if game_reader = 5\n          *achieve gamer\n        *goto_scene blackraven_demo\n  #Other Hosted Games\n    *label ohg\n    *choice\n      #Life of a Wizard\n        *set game_reader +1\n        *if game_reader = 5\n          *achieve gamer\n        [b]Life of a Wizard - by Mike Walter[/b]\n\n        Write an archmage's autobiography in this 80-year 130,000-word interactive fiction! Man or woman? Good or evil? Bring peace on earth or rule the world?\n\n        Life of a Wizard is a text based game published under the Hosted Games license. For a demo and more information about Life of a Wizard, go to the link below:\n\n        http://www.choiceofgames.com/user-contributed/life-of-a-wizard\n\n        Check out other games by Mike Walter at: www.facebook.com/LucidsGames\n\n        *page_break Back to Hosted Games\n        *goto ohg\n      #Paradox Factor\n        *set game_reader +1\n        *if game_reader = 5\n          *achieve gamer\n        [b]Paradox Factor - by Mike Walter[/b]\n\n        What would you change? Alter your past and future in this thought-provoking and edgy time travel game. Are you willing to live with the effects that your changes may cause?\n\n        Paradox Factor is a text based game published under the Hosted Games license. For a demo and more information about Paradox Factor, go to the link below:\n\n        http://www.choiceofgames.com/user-contributed/paradox-factor\n\n        Check out other games by Mike Walter at: http://www.facebook.com/LucidsGames\n        *page_break Back to Hosted Games\n        *goto ohg\n      #Sabres of Infinity\n        *set game_reader +1\n        *if game_reader = 5\n          *achieve gamer\n        [b]Sabres of Infinity - by Paul Wang[/b]\n\n        Fight for glory as an officer of the Royal Tierran Army in a rich, low-fantasy world where gunpowder and magic rule the battlefield. Choose a horse, pick a sergeant and lead a unit of Royal Dragoons through five years of brutal war. \n        *line_break\n        *line_break\n        Battle your enemies with your mind, your wits or with pistol and sword. Earn the loyalty of your subordinates and the friendship of your fellow officers, or betray them for your own gain. As armies, heroes and philosophies clash in the forests of the north, your choices could mean the difference between everlasting glory and an ignominious death.\n        *line_break\n        *line_break\n        Sabres of Infinity is a text based game published under the Hosted Games license.  For more information about Sabres of Infinity, go to the link below:\n        *line_break\n        *line_break\n        https://www.choiceofgames.com/user-contributed/sabres-of-infinity/\n        *page_break Back to Hosted Games\n        *goto ohg\n      #Zombie Exodus\n        *set game_reader +1\n        *if game_reader = 5\n          *achieve gamer\n        [b]Zombie Exodus - by Jim Dattilo[/b]\n\n        Build your character and fight your way out of a zombie-filled city to save your sister in this interactive horror fiction story. Gather supplies and weapons while avoiding the military, bandits, and living dead. Your choices alone control the story. Can you survive the zombie apocalypse?\n        *line_break\n        *line_break\n        Zombie Exodus is a text based game published under the Hosted Games license.  For more information about Zombie Exodus, go to the link below:\n        *line_break\n        *line_break\n        https://www.choiceofgames.com/user-contributed/zombie-exodus/\n        *page_break Back to Hosted Games\n        *goto ohg\n      #Unnatural\n        *set game_reader +1\n        *if game_reader = 5\n          *achieve gamer\n        [b]Unnatural - by Sam Kabell[/b]\n\n        Monsters are real.\n\n        The Supernatural Response Team (S.R.T) are a group formed to deal with them. They track down and either capture or kill any monster they can find.\n\n        You are one of their potential recruits..\n\n        Unnatural is an extensive 'choose your own' game written with help and feedback from the Choicescript community.\n\n        Unnatural is due for release under the Hosted Games label in late 2013.        \n        *page_break Back to Hosted Games\n        *goto ohg\n      #Back\n        *goto introduceme\n*label go_on_introduce\n*page_break\nIt felt like a dream.  Just three days ago you were going about your normal business when your life went around a corner into\nan old lady carrying hot coffee.  The haggered, old woman offered to pay for your wet clothes to be cleaned but the dry cleaners was closed due to the owner, Mr. Popadopalous\ngoing on vacation.  Instead, you let the grey-haired woman buy you a can of cola.  And that can... that wonderful, winning can had delivered you here to Lima, Peru.  \n\nNow you are about to go on the journey of a lifetime as you take part in the event known the world over as...\n\nTHE RACE\n\n*page_break\n\nThat winning soda can happened to be one of two hidden in your country.  As a winner, you will now take part in THE RACE alongside another stranger from your\nnation.  With a cash prize of $50,000,000 for each winning contestant and, judging from past winners, infinite fame and glory to follow, being a participant on THE RACE\nis the best opportunity you will ever get for success in life.  The first winners, from\n*if country = \"Germany\"\n  your very own country,\nGermany, are now billionaires thanks to the huge sponsorship deals they\nreceived after the show.  Last year's winners,\n*if country = \"Canada\"\n  from your very own country,\nCanadian twins from Toronto, are likely to go even further with their fame.  However, with up to 3 billion people\nwatching the show on television, any mistakes you make will be amplified to the point where you could be deemed an ultimate failure.  In last year's event, the\n${american} brothers who came in last place received a great deal of ridicule to the extent where the younger brother, Gareth, killed himself.\nThe big question that you have to ask yourself is: What qualities do you have to help you in this race?\n*rand luck 0 30\n*set luck +10\n*choice\n  #I have a very high IQ.\n    *set intelligence +30\n    That's obviously important.  Without intelligence, you wouldn't get far.\n    Is there another reason you will succeed?\n    *choice\n      #That would be my great charisma.\n        *set charisma +30\n        *goto abstract\n      #I have unbelievable stamina.\n        *set stamina +30\n        *goto abstract\n      #I can move really quickly.  Important in a race, wouldn't you say?\n        *set speed +30\n        *goto abstract\n      #I guess I am quite lucky.\n        *set luck +30\n        *goto abstract\n  #I have excellent leadership skills.\n    *set leadership +30\n    Well that makes sense.  Every team needs a leader.\n    Is there another reason you will succeed?\n    *choice\n      #That would be my great charisma.\n        *set charisma +30\n        *goto abstract\n      #I have unbelievable stamina.\n        *set stamina +30\n        *goto abstract\n      #I can move really quickly.  Important in a race, wouldn't you say?\n        *set speed +30\n        *goto abstract\n      #Well, I don't want to boast, but I am quite smart.\n        *set intelligence +30\n        *goto abstract\n  #I guess I am quite strong.\n    *set strength +30\n    That sounds important.  So often in life, the strong survive while the weak perish.\n    Is there another reason you will succeed?\n    *choice\n      #That would be my great charisma.\n        *set charisma +30\n        *goto abstract\n      #I have unbelievable stamina.\n        *set stamina +30\n        *goto abstract\n      #I can move really quickly.  Important in a race, wouldn't you say?\n        *set speed +30\n        *goto abstract\n      #I have good leadership skills.\n        *set leadership +30\n        *goto abstract\n  #I don't know.  I'm a lucky person, I guess.\n    *set luck +30\n    You are often quite lucky in life.  It was luck that brought you here, after all!\n    What would you say is your greatest asset?\n    Is there another reason you will succeed?\n    *choice\n      #That would be my great charisma.\n        *set charisma +30\n        *goto abstract\n      #I have unbelievable stamina.\n        *set stamina +30\n        *goto abstract\n      #I can move really quickly.  Important in a race, wouldn't you say?\n        *set speed +30\n        *goto abstract\n      #I am very strong.\n        *set strength +30\n        *goto abstract\n*label abstract\nNow, just a few more questions so I can understand you better.\nFirst, it's interesting to note that no women have ever won the race.  What do you think of this?\n*choice\n  #Good luck to them.  But being a man, I hope that continues for at least another year.\n    As do I.  Although, of course, you can choose a female partner later.\n    *goto questionmore\n  #No women have won yet!  I plan to be the first!\n    *set boygirl \"girl\"\n    You certainly could be!\n    *goto questionmoregirl\n*label questionmore\nSome of the places you will go to in Peru don't see many westerners.  How do you feel about this?\n*choice\n  #Having blonde hair and blue eyes, I'm sure I will intrigue the girls of Peru, if you know what I mean.\n    *set skin \"yellow\"\n    *goto two\n  #With my dark hair and olive skin I'm sure I will fit right in.  \n    *set skin \"dark\"\n    *goto two\n  #As a clean shaven black man I will stand out but I've lived with that all my life.  No problem.\n    *set skin \"black\"\n    *goto two\n  #As a pale skinned redhead, I will stand out for sure.\n    *set skin \"red\"\n    *goto two\n*label questionmoregirl\nSome of the places you will go to in Peru don't see many westerners, especially girls.  How do you feel about this?\n*choice\n  #Having long blonde hair and blue eyes, I'm sure I will be able to twist the Peruvian boys around my finger.\n    *set skin \"yellow\"\n    *goto two\n  #With my dark hair and olive skin I'm sure I will fit right in.  \n    *set skin \"dark\"\n    *goto two\n  #As an independent black woman I will stand out but I've lived with that all my life.  No problem.\n    *set skin \"black\"\n    *goto two\n  #As a pale skinned girl with auburn hair, I will stand out for sure.\n    *set skin \"red\"\n    *goto two\n*label two\nNow imagine you are 12 years old.  You are hungry as your lunch money was stolen from you at school.  You are walking home when you stop by an\nexpensive restaurant.  The smell of food cooking inside has drawn you to it.  After a moment, you are ready to leave, when you see a wallet on the floor.\nYou open the wallet and see enough money to buy a great meal at the restaurant.  There is also a photo inside the wallet of a ${boygirl}.  The same ${boygirl} who stole\nyour lunch money.  The wallet must belong to \n*if boygirl = \"boy\"\n  his\n  *goto wallet\n*else\n  her\n  *goto wallet\n*label wallet\ndad.  What do you do?\n*choice\n  #Take the money and eat at the restaurant!  I'm starving!\n    *set stamina +4\n    *set leadership -2\n    *set strength +1\n    *set charisma -1\n    *set speed +4\n    *set intelligence -4\n    *goto three\n  #Only take my lunch money back.  I won't eat at the restaurant either, as I can get food at home later.\n    *set stamina -1\n    *set leadership +3\n    *set strength -1\n    *set charisma +2\n    *set speed +1\n    *set intelligence +3\n    *goto three\n  #Take the money and the photo but leave the wallet.  I will enjoy teasing the ${boygirl} who stole my money by showing the photo later!\n    *set stamina +1\n    *set leadership -2\n    *set strength +5\n    *set charisma +3\n    *set speed +0\n    *set intelligence -3\n    *goto three\n  #Destroy the wallet, money and all.\n    *set stamina +0\n    *set leadership +0\n    *set strength +2\n    *set charisma -1\n    *set speed +2\n    *set intelligence -5\n    *goto three\n  #Take the money and then leave the wallet at a police station, anonymously.\n    *set stamina +1\n    *set leadership +3\n    *set strength +0\n    *set charisma +1\n    *set speed -1\n    *set intelligence +4\n    *goto three\n  #Take the wallet to a police station.  I won't touch the money inside.\n    *set stamina +1\n    *set leadership +1\n    *set strength +0\n    *set charisma +3\n    *set speed -1\n    *set intelligence +2\n    *goto three\n  #Do nothing.  I'll leave the wallet, money and all, right where it is.\n    *set stamina -1\n    *set leadership -2\n    *set strength +0\n    *set charisma +0\n    *set speed +5\n    *set intelligence -2\n    *goto three\n*label three\nAn interesting choice.  Now what about this one?  You are sleeping in your home alone one night when a fire breaks out.  You need to get out of the house quick.\nYou don't know how much time you have.  What do you do?\n*choice\n  #Run.  Get out.  Right now!  Nothing's more important than me!\n    *set leadership -2\n    *set strength +1\n    *set speed +5\n    *set intelligence +2\n    *goto dreamq\n  #I'll throw on some clothes, grab my wallet and leave.\n    *set charisma +3\n    *set speed +2\n    *set intelligence +1\n    *goto dreamq\n  #I'll grab a bag and throw anything valuable into it, then get out quick.  If the building looks okay still, I'll go back in and grab a few more things.\n    *set stamina -1\n    *set leadership +1\n    *set strength +3\n    *set charisma -1\n    *set speed -3\n    *set intelligence +1\n    *goto dreamq\n  #I will take all of my photo albums, my wallet, my phone... that's about it.  The rest is replaceable.\n    *set leadership +2\n    *set strength +2\n    *set charisma +3\n    *set speed +1\n    *set intelligence +2\n    *goto dreamq\n  #I'd stay calm.  Put on clothes quickly and wet a towel.  I'd feel the door handle before opening.  If it's still cool I'll go outside.  I'd make sure to stay low.  No fire is going to kill me!\n    *set stamina +1\n    *set leadership +2\n    *set strength -1\n    *set charisma +2\n    *set speed -1\n    *set intelligence +1\n    *goto dreamq\n  #Laptop, phone, external hard drive.  That's it, got all I need.  Now time to leave!\n    *set leadership +4\n    *set charisma -6\n    *set intelligence +4\n    *goto dreamq\n  #It's probably just a minor fire, or even a false alarm.  I'll go back to sleep.\n    *set stamina -4\n    *set leadership -4\n    *set strength -4\n    *set speed -4\n    *set intelligence -4\n    *goto dreamq\n*label dreamq\nGreat.  Now, one final question about you.\n*line_break\nIf you could have any super power, which one would you have?\n*choice\n  #Invisibility\n    *set power \"invisible\"\n    So you want to hide away where people can't find you.  Or perhaps you just want to be able to spy on people with ease.  Furthermore, there is a chance that you didn't even read the choices and just clicked next regardless.  Whatever your reason for choosing invisibility, pschology alone can't tell me the answer!  So let's move on:\n    *goto partner\n  #Super Strength\n    *set power \"strong\"\n    You wish to be super strong because life has been tough for you?  Or perhaps you have a violent personality and wish to inflict pain on others.  Whatever your reason for choosing super strength, I hope that desire serves you well in the game.\n    *goto partner\n  #The ability to fly\n    *set power \"fly\"\n    You wish to be able to fly so you can run away from your troubles.  Or maybe you want to experience the thrill of soaring through the sky with nothing to protect you.  Whatever your reason for choosing this skill, it would be a good one to have, wouldn't it!\n    *goto partner\n*label partner\nNow that we know a little about you, it's time to meet the person you will be racing with.\n*label partner_choice\nWhich one of these people got the other lucky soda can?\n*choice\n  #Leonie Nolan, 22, Fast! (recommended for first time players)\n    A great competitor to race with.  Leonie Nolan, 22:  Leonie has no weaknesses and she is the fastest of the three. So fast she is due to represent ${country} at the next Olympics.\n    *line_break\n    *line_break\n    Leonie is a good character to race with on your first play through.\n    *line_break\n    Are you sure you want to race with Leonie?\n    *choice\n      #Yes, I will race with Leonie.\n        *set partner \"Leonie\"\n        *set partnerdetails \"Fast!\"\n        *set his \"her\"\n        *finish Start racing with Leonie\n      #Hang on... what were the choices again?\n        *goto partner_choice\n  #April Lee, 11, Clever, Charismatic, Weak, Slow (a good choice for those who want hints during the game)\n    A wise partner to race with.  April Lee, 11:  Don't be fooled by her young age; this girl is smart! She also has a friendly smile which could come in handy to get the locals on your side.\n    *line_break\n    *line_break\n    April will give you lots of clues during the race, but it can be hard to win with her.\n    *line_break\n    Are you sure you want to race with April?\n    *choice\n      #Yes, I will race with April.\n        *set partner \"April\"\n        *set partnerdetails \"Clever, Charismatic, Weak, Slow\"\n        *set his \"her\"\n        *finish Start racing with April\n      #Hang on... what were the choices again?\n        *goto partner_choice\n  #Dan Martin, 33, Strong, High Stamina, Low IQ (a tough player to race with)\n    A good person to race with.  Dan Martin, 33:  This muscle clad, strong man once pulled a jumbo jet with his thumbs. Just don't ask him how to spell thumb. Or jet, for that matter.\n    *line_break\n    *line_break\n    Dan is considered as the hardest player to race with.\n    *line_break\n    Are you sure you want to race with Dan?\n    *choice\n      #Yes, I will race with Dan.\n        *set partner \"Dan\"\n        *set partnerdetails \"Strong,High Stamina, Low IQ\"\n        *finish Start racing with Dan\n      #Hang on... what were the choices again?\n        *goto partner_choice\n", "12lima": "*page_break\n\nYou and ${partner} arrive in Lima at one o'clock in the morning after a difficult flight.  Right now, you just want to find your hotel room and sleep.\nAfter collecting your luggage, you wander into the arrivals lounge to an unusual sight.  Instead of a quiet place, given the time of day, the lounge is \nheaving with people.  After a few moments, you realise that most of them are taxi drivers vying for your service.  How do you wish to proceed?\n*choice\n  #Take a taxi.\n    *label taxi\n    Do you want to take the first available taxi, or look around to choose the best one.\n    *choice\n      #Take the first taxi we can.\n        Before you even start to look for a taxi, a man approaches you and offers his service.  \n        He tells you in broken English that his taxi is waiting outside and he will take you where you need to go.\n        You follow him and get into the taxi.\n        *page_break\n        The taxi is old and has no seat belts.  Not long after leaving the airport, the driver pulls into a garage.  \n        He starts to fill the tank with gas.  Tired, you close your eyes for a second, but are woken again with a start.\n        The taxi driver has opened your door.\n        *line_break\n        *line_break\n        \"Pay now... for gas.\"  He says.  You share a glance with ${partner}.\n        *if partner = \"April\"\n          She looks tired and confused.  The choice is yours alone.\n        *if partner = \"Dan\"\n          He shakes his head, 'no' and has a somewhat serious look on his face.\n        *if partner = \"Leonie\"\n          She shrugs her shoulders with a half-grin on her face.\n          *line_break\n          *line_break\n          \"I have no idea what we should do.  Should we just pay him?  Is it safe?\"  She says.\n          *line_break\n          *line_break\n        How do you want to respond to the driver?\n        *choice\n          #Pay the man.  You just want to get to the hotel and sleep.\n            *goto pay\n          #Say you will pay half now, for the gas.  The rest when you reach the hotel.\n            *label pay\n            The driver fills the tank and continues your journey.  Soon after leaving the gas station, he takes a sharp right\n            and drives at speed down a coastal road.  There are no street lights here and the man is driving much faster than he should.  \n            You brace yourself in your seat as best you can and your heart skips several times as he veers from left to right\n            at speed on the deserted road.\n            *page_break\n            *label pay2\n            *if (charisma>40)\n              A short while later, you finally arrive at your hotel.  You pay the driver and walk into the lobby.  \n              It seems you and ${partner} were expected and the receptionist gives you your hotel key.\n              You say goodnight to your partner and go to your room.\n              *finish The Hotel\n            *else\n              A short while later, you stop and the driver turns to face you.  \"This is you.\" he says. \"Hotel, five minutes.\" \n              You understand him to mean that this is your stop.  You get out of the taxi on a main road and start walking.\n              *page_break\n              *goto walk1\n          #Don't pay.  Tell him you will pay when you get to the hotel.  Not before.\n            *goto angry\n          #Pretend not to understand.\n            *label angry\n            The driver finally stops trying and says something you don't understand.  Judging from the unhappy look on his face, it wasn't something nice.\n            He finally fills the tank and continues the journey.  Soon after leaving the gas station, he takes a sharp right and drives at speed\n            down a coastal road.  There are no street lights here and the man is driving much faster than he should.  \n            You brace yourself in your seat as best you can and your heart skips several times as he veers from left to right at speed on the \n            deserted road.  Do you want to say anything?\n            *choice\n              #No, I'm sure he drives like this all the time.  He just wants to get there fast.\n                *label drive\n                The driving gets worse, but soon your fears soon subside as lights appear up ahead.  You reach the outskirts of Miraflores,\n                the area where your hotel is situated.\n                *page_break\n                *goto pay2\n              #He's obviously upset that we didn't pay him.  I'll ask him to slow down.\n                *label danger\n                The driver swerves dangerously as he turns to look at you.  \"Huh?\" he shrugs.\n                *if partner = \"April\"\n                  April taps your shoulder, then leans in to talk to you.\n                  *line_break\n                  *line_break\n                  \"I don't think we should distract him... his driving is already bad.  If we speak, it makes it worse!\"  She says, almost at a whisper.\n                  *line_break\n                *if partner = \"Dan\"\n                  *line_break\n                  *line_break\n                  \"Dude, this guy is crazy.  Best if we just let him drive.\"  Says Dan, a grin on his face.\n                  *line_break\n                *if partner = \"Leonie\"\n                  *line_break\n                  *line_break\n                  \"Er, ${name}, I think we should just let him drive.\"  Says Leonie, with a slight quiver in her voice.\n                  *line_break\n                Do you want to pursue this more?\n                *choice\n                  #Yes, this is dangerous!\n                    You again speak to the driver, but as he turns to look at you, your eyes go to the road.  Right now, you should \n                    be turning left as the road veers that way.  However, the driver is heading right towards the low barriers designed \n                    to prevent cars from an unfortunate fate.  Unfortunately, those barriers aren't very strong and you hit them at an angle...\n                    *page_break\n                    ...The car flips and you go over the edge...\n                    *page_break\n                    ...You are lucky.  You don't die.  However, you do spend the next 3 weeks in hospital with a broken leg and a fractured arm.\n                    ${partner} survived too, but neither of you were able to compete in the race.\n                    Unfortunately, it's over for you before the race had even begun.\n                    *goto_scene ending\n                  #No, best to let him drive, or he'll crash for sure.\n                    *goto drive\n              #The guy is crazy!  I'll ask him to stop.\n                *goto danger\n      #Choose a driver who can speak English.\n        You find an old man who speaks good English.  After agreeing a price, you follow him to his taxi.\n        After about 30 minutes driving, you finally arrive at your hotel.  You pay the driver and walk into the lobby.  \n        It seems you and ${partner} were expected and the receptionist gives you your hotel key.  \n        You say goodnight to your partner and go to your room. \n        *finish The Hotel\n      #Choose the driver with the cheapest price.\n        You choose a bald man who seems to be much cheaper than all the other drivers.\n        You follow him to his car.  After around 30 minutes, you stop and the driver turns to face you.  \"This is you.\" he says. \"Hotel, five minutes.\" \n        You understand him to mean that this is your stop.  You get out of the taxi on a main road and start walking.\n        *page_break\n        *goto walk1\n  #Look for a bus instead.\n    *if (luck>40) and (partner = \"Leonie\")\n        *achieve luckiest\n        You're in luck!  The last bus is ready to leave now.  It will take you direct to your hotel.\n        *page_break\n        *label finish1\n        After about 30 minutes, you finally arrive at your hotel.  You pay the driver and walk into the lobby.\n        It seems you and ${partner} were expected and the receptionist gives you your hotel key.\n        You say goodnight to your partner and go to your room.\n        *finish The Hotel\n    *Elseif (luck>40)\n        You're in luck! The last bus is ready to leave now.  It will take you close to your hotel.\n        *page_break\n        After about 30 minutes, you stop and the driver turns to face you.  \"This is you.\" he says. \"Hotel, five minutes.\"\n        You understand him to mean that this is your stop.  You get off the bus on a main road and start walking.\n        *page_break\n        *label walk1\n        *if (strength>40)\n          *label finish2\n          It does indeed take you five minutes to reach the hotel.   It seems you and ${partner} were expected and the \n          receptionist gives you your hotel key.  You say goodnight to your partner and go to your room.\n          *finish The Hotel\n        *else\n          *label encounter1\n          As you walk towards the hotel, you have a nasty feeling that you are being watched.\n          You turn just in time to see two men approaching fast!  They don't look very friendly...\n          *line_break\n          *line_break\n          *if partner = \"April\"\n            \"I'm a little bit scared.\"  Says April, hiding behind your arm.\n          *if partner = \"Leonie\"\n            \"I don't like the look of this.  Let's not do anything stupid.\"  Says Leonie.\n          *if partner = \"Dan\"\n            \"Let's do this!\"  Says Dan, a slight spark in his eyes.\n          *line_break\n          How do you react?\n          *choice\n            #Fight them!\n              *label finish6\n              *if partner = \"Dan\"\n                Together, you hold off the men and they soon give up.  Having Dan on your team seems to have paid off already!  You head on to the hotel where you are greeted\n                at the entrance.  It seems you were both expected.  You wish goodnight to your partner and go to your room.\n                *finish The Hotel\n              *else\n                Neither you nor ${partner} are a match for the two men.  You fight with all your strength, and for a while,\n                seem to be holding them off.  But then, one of them pulls out a knife.  ${partner} shouts to warn you, but it's too late.\n                You are stabbed in the stomach.  \n                While the stab wasn't fatal, it did prevent you from taking any further part in the race.\n                Three weeks later, you go home wondering just what could have been.\n                *goto_scene ending\n            #Run away towards the hotel.\n              *label run\n              *if partner = \"Leonie\"\n                You out run the two men easily and soon after come to your hotel.  It seems you and ${partner} were expected \n                and the receptionist gives you your hotel key.  You say goodnight to your partner and go to your room. \n                *finish The Hotel\n              *if partner = \"Dan\"\n                *if speed > 40\n                  You out run the two men easily and soon after come to your hotel.  It seems you and ${partner} were expected \n                  and the receptionist gives you your hotel key.  You say goodnight to your partner and go to your room. \n                  *finish The Hotel\n                *else\n                  You try to outrun the two men, but you are just not fast enough and they soon catch up to you.  You have little choice but to see what they want.\n                  *goto you_dollar_me\n              *else\n                While you would have no problem outrunning the men, there is little doubt that your young partner would struggle.  You have little choice but to see what the two men want.\n                *goto you_dollar_me\n            #Stand Still and see what they want.\n              *label you_dollar_me\n              The men reach you and say in poor English \"You, dollar me.\"  The meaning is clear.  They intend to take your money.  What do you do?\n              *choice\n                #Resist the men.  Fight if you have to.\n                  *goto finish6\n                #Agree to give them your money.     \n                  Both you and ${partner} reluctantly give up your money.  The men walk away smiling and chatting in Spanish.  \n                  At least you didn't get hurt.  You walk on to your hotel.  It seems you were expected and the receptionist gives you each a hotel key.\n                  You say goodnight to ${partner} and go to your room.\n                  *finish The Hotel\n    *Else\n        It takes you a little while to find the bus stop.  You try to read the timetable to see when the next bus will come, but you are told by a kind elderly man that the last bus for the night had already left.\n        You will have to take a taxi instead.\n        *Page_Break\n        *goto taxi\n", "13lima_morning": "You are woken up by a phone call on the  morning of the first day of the event.  It is ${partner}.  \nYou have an hour before you are due to meet the other competitors for breakfast in the hotel banquet hall.  \nWhat do you want to do now?\n*choice\n  *if boygirl = \"boy\" \n    #Sleep more.\n      You fall into a deep sleep and soon begin to dream.  You are running in the dream trying to reach a woman.  \n      Her face isn't clear, but she definitely has long black hair and a voluptuous body.  Her skin is tanned and you know that she means the world to you.\n      However, in this dream, no matter how hard you try, you cannot reach her.  Sometimes you get close and think you will be able to touch her,\n      but then you blink and she's far away again.  This repeats over and over torturing your sleep.  Somehow, for a split-second, you have a moment of clarity.\n      How will you use it?\n      *choice\n        #Force myself to keep my eyes open.\n          You hold your eyes open as you run towards the woman.  However, now, it seems to be even harder to run.  Try as you might,\n          you find yourself falling further and further behind.  Letting go of your eyes, you push yourself to run faster, but it's not working.\n          The woman is moving further and further away at an alarmingly fast rate.  Your heart is beating faster and faster and you feel frustrated.\n          Further and further.  Faster and faster.  You scream!  You wake up.  The nightmare is over.  \n          Your body is drenched in sweat.  This nightmare really got to you.  (Stamina -10)\n          *set stamina -10\n          *set dream 2\n          *page_break\n          While the extra sleep could have been beneficial, it now gives you little time to get ready.  You are due at the banquet hall in 5 minutes.  \n          You quickly throw on some clothes and head straight there.\n          *goto_scene 15introduction \n        #Stop running to her.\n          *set dream 2\n          You stop and stand still.  It seems to be a good decision instantly!  The woman walks towards you and smiles at you.\n          For some reason, you still can't see her face clearly, but you know that you are in love with her.  She reaches you and you embrace.\n          She kisses you lightly on the lips then pulls you closer.  she whispers lightly into your ear.  \"Wake up\".\n          You comply, waking up with a comforting feeling of content.  (Stamina +10)\n          *set stamina +10\n          *page_break\n          While the extra sleep could have been beneficial, it now gives you little time to get ready.  You are due at the banquet hall in 5 minutes.\n          You quickly throw on some clothes and head straight there.\n          *goto_scene 15introduction\n        #Will myself to wake up.\n          *set dream 2\n          It works!  You wake with a start.  Your body is wet through with sweat.  It seems this bad dream really got to you.  (Stamina -5)\n          *set stamina -5\n          *page_break\n          While the extra sleep could have been beneficial, it now gives you little time to get ready.  You are due at the banquet hall in 5 minutes.\n          You quickly throw on some clothes and head straight there.\n          *goto_scene 15introduction\n  #Have a shower.\n    *label shower\n    You wash and get dressed.  You feel much better for it.  \n    (stamina +5, charisma +5)  \n    *set stamina +5\n    *set charisma +5\n    You leave your hotel room and step into the lobby.  You have 30 minutes before you are due in the banquet hall.  \n    What do you want to do?\n    *choice\n      #Go to ${partner}'s room.\n        *if partner=\"Dan\"\n          You go to Dan's room, which is just along the corridor from yours.  You knock on the door and wait.\n          A few moments later, he opens the door, dressed and ready to go!  You're glad to see that he's eager to get started.\n          Together, you head to the elevator and go down to the banquet hall.\n          *goto_scene 15introduction\n        *Elseif partner=\"April\"\n          You go to April's room, which is just along the corridor from yours.  You knock on the door and wait.\n          A few seconds later, you hear a tentative \"Who is it?\" from the other side.  You reply and she opens the door with a smile on her face.\n          \"Good morning.\"  She says.\n          *choice\n            #Ask her why she is smiling.\n              She tells you that she is very excited about the race.  She's never even been out of her home town before, but now she has the chance\n              to travel across Peru and see many wonderful things.  She ask you why you are doing the race.\n              *choice\n                #It's a great experience and I love to travel.\n                  *label why\n                  She smiles politely, before continuing.\n                  She asks you if it's time to go to the banquet hall.  You look at your watch and even though it's still early, you don't have\n                  too much time.  Together, you take the elevator to the basement floor and head to the aid came across as a little rude.\n        *line_break\n        *line_break\n        \"Nice to meet you.\" He says, before turning his back to you.\n        *set korea -10\n        Clearly they don't want to talk.  You take a seat next to your partner and wait for the other contestants to arrive.\n        *finish\n      #Yes, I'm looking forward to it. Which country are you from?\n        \"We're from Korea.\"  he says.  \"I'm Sean.  This Sunny.  Sister.\"  He gestures to the woman.  She smiles awkwardly.\n        *line_break\n        *line_break\n        \"Come, sit.\"  He gestures for you and your partner to join them.  Do you?\n        *choice\n          #Yes, I want to see what the competition is like.\n            *set intelligence +5\n            You and your partner join the Koreans for breakfast.  You learn that they are both partners in a successful English school in Korea.\n            They don't teach English, but they have a good understanding of the language.  They are both friendly and seem to warm to you and your partner.\n            *set korea +10\n            *achieve friendly2\n            *finish\n          #Of course, it would be rude not to.\n            *set charisma +5\n            You and your partner join the Koreans for breakfast.  You learn that they are both partners in a successful English school in Korea.\n            They don't teach English, but they have a good understanding of the language.  They are both friendly and seem to warm to you and your partner.\n            *set korea +10\n            *achieve friendly2\n            *finish\n          #No, I'll make an excuse and leave them to it.\n            He smiles politely with a nod, then returns to his breakfast.  You decide to get some breakfast of your own.\n            *goto buffet\n      #Er... No...  I'm just looking for the bathroom.\n        He looks at you oddly for a moment, then returns to his breakfast.  You decide to get some breakfast of your own.\n        *goto buff  help... um... \n      *if boygirl = \"girl\"\n        maam?\"\n        The poor girl doesn't know how to address you.  What do you say?\n        *choice\n          #\"Maam is correct.\"\n            *achieve stern\n            *set name \"Maam\"\n            *set leadership +5\n            *set charisma -10 \n            She frowns a little.  \"How can I help you, Maam?\"\n            *goto aprilchoice\n          #\"Please call me ${name}\"\n            *set charisma +5\n            She smiles broadly.  \"How can I help you, ${name}?\"\n            *goto aprilchoice\n      *else\n        Sir?\"\n        The poor girl doesn't know how to address you.  What do you say?\n        *choice\n          #\"Sir is correct.\"\n            *achieve stern\n            *set name \"Sir\"\n            *set leadership +5\n            *set charisma -10 \n            She frowns a little.  \"How can I help you, Sir?\"\n            *label aprilchoice\n            *choice\n              #Ask her to spy on the two girls.\n                \"I'll see what I can do!\"  She runs off leaving you to get some breakfast.\n                *set cg+2\n                *goto buffet\n              #Ask her to spy on the Asian couple.\n                \"I'll see what I can do.\"  She heads towards the Asians and sits near them.  She listens for a while, with a confused look on her face.\n                Then she returns to you.\n                *line_break\n                *line_break\n                \"Um... they don't speak English.  It sounds funny, not Chinese and not Japanese.\"  You thank her for trying\n                and are impressed she can tell the difference between Asian languages.  Unfortunately, it doesn't help too much here.\n                You decide to have some breakfast.\n                *goto buffet\n          #\"Please call me ${name}\"\n            *set charisma +5\n            She smiles broadly.  \"How can I help you, ${name}?\"\n            *goto aprilchoice\n  #Find a table and wait for the event to begin.\n    Together, you and your partner sit and wait for the other contestants to arrive.\n    *finish\n", "15introduction": "*temp break\n*set break 1\n*page_break\nSoon, all the contestants are gathered together in the banquet hall. It looks like there are nine teams in total. An unusual number, you think.\nYour partner is about to say something when all the lights dim. Some fanfare music plays and a spotlight covers a door at the far side of the room.\nAfter a brief pause, the door opens and a very famous man comes into the hall. He is Andre Mendez, the multi-millionaire creator of the race.\nPeople around you start clapping and you spontaneously join in. Mendez acknowledges his audience and then begins to talk into a microphone.\n\n*page_break\n\"Ladies and Gentlemen. Contestants!\" Someone in the crowd hollers at this. \"I'm so happy to see you all at the start of this very special occasion.\nWithout you, none of this would be possible.\" More applause. Mendez clearly craves the attention. \"Before we can start, I need to go over a few things.\nStarting with the rules.\" There's a groan from the audience. \"I know, I know, but it wouldn't be fair without rules.\" \n\n*page_break\n*label rules\n\"First rule: no cell phones, GPS devices, laptops, palmtops. Not even a calculator. None of these are to be used at any point in the race.\"\nHe pauses for dramatic effect, but there is no reply from the audience this time. For a second, he appears lost, but he quickly regains his composure. \n\n\"Second rule: you may not use the internet at any point for any reason.\"\n\n\"Rule three: The race will cover several stages. Each stage is timed. The last team to complete each stage will be eliminated.\"\n\n\"Rule four: You will be given a clue at the start of each stage. Solve the clue to work out where to go next.\"\n\n\"Rule five: You will also be given two letters with each clue. There are ten letters in total which form a 2 or 3 word place name.  Your first two letters are A and I.\nIf you can solve this early, there's no reason why you can't bypass all the other clues and go straight to the finish.\"\n*set fd1 \"A, I\"\n\n*page_break\n*if break >3\n  *goto contestants\n*Else  \n  These rules seem to be going on for a long time.  Do you want to take a break from reading them?\n  *choice\n    #Yes, something else would be nice for a little breather.  We can come back to the rules after.\n      *set break +5\n      Would you like a magic trick or a joke?\n      *choice\n        #A magic trick sounds great!\n          For this trick, you need a magic number.  I want you to think of any number that you think might be magic (it really can be any number!)\n          *page_break\n          Got it?  Great.  Now multiply your magic number by 2.  For example, if you picked 5, you now say 5x2 and get 10.\n          *page_break\n          Now, add 14\n          *page_break\n          Now multiply your number by 3 (that's x3)\n          *page_break\n          Now add 12.  Don't worry, we're nearly finished.\n          *page_break\n          Okay, a tough one.  Divide your number by 6.\n          *page_break\n          Right, nearly there.  You should have a whole number.  Now subtract your original magic number from your new number.  (for example, if you now have 17 and your magic number was 6, then you say 17-6 = 11.  11 is your new number.\n          *page_break\n          Okay, now it's time for the magic to happen.  I want you to think of your new number.  Think hard and when you are ready, click next.\n          *page_break\n          Your number is 9!\n        \n          Did it work?  Are you impressed?  Is this more boring than the main story?  Well... I guess it's time to go back to the game anyway.\n          Do you want to read the rules again or press on and meet the contestants?\n          *choice\n            #Rules one more time please!\n              *goto rules\n            #straight to the contestants!\n              *goto contestants\n        #Let's go with the joke.\n          *set joke 2\n          *temp fool\n          *temp friend1\n          *temp friend2\n          Okay, we need a foolish person in the joke.  Who should that be?\n          *input_text fool\n          ${fool} is a good choice.\n          Now we need two friends for ${fool}.\n          Who's first?\n          *input_text friend1\n          ${friend1} makes sense.  And one more friend?\n          *input_text friend2\n          Great, so the three people in the joke are ${fool}, ${friend1}  and ${friend2} \n          Okay, on with the joke!\n          *page_break\n          ${friend2}, ${friend1}  and ${fool}  are travelling through the desert by jeep.  It's a very hot day.  Unfortunately, the jeep is old and after a while the car breaks down.  They each take one thing from the car.  ${friend1}  takes an umbrella.  ${friend2}  takes a whisky flask and ${fool}  takes the car door.\n\n          They start walking further into the desert.\n          *page_break\n          Soon, they come across a remote tribe who welcome them with water.\n          The leader of the tribe, an old man with greying hair, greets them.  He turns to ${friend1}  and asks \"Tell me, we are in the desert and it's not going to rain.  Why did you bring an umbrella with you?\"  ${friend1} replies \"Well, it's very hot.  With the umbrella I can shade myself from the sun.\"  The old man nods in appreciation.\n          *page_break\n          He turns to ${friend2}  and looks at the whisky flask.\n          \"Tell me ${friend2} , why would you bring whisky into the desert?  You do know alcohol will dehydrate you more!\"\n          ${friend2}  replies \"Yes, alcohol is bad, but the flask is filled not filled with whisky.  It's water!\"  The old man nods in appreciation.\n          *page_break\n          He finally turns to ${fool}  and asks about the car door. \"The umbrella and whisky flask, I can understand.  But this car door is heavy and I don't see how it could help you.  Why did you take it?\"\n          ${fool}  replies with a smile \"Well, it is very hot in the desert.  I brought the car door so that if I get too hot...\"\n          *page_break\n          \"... I can open the window.\"  It seems that ${fool}  really didn't think that one through!  \n\n          Okay, whether you liked the joke or not, it's time to return to the story.\n          Do you want to read the rules again or press on and meet the contestants?\n          *choice\n            #Rules one more time please!\n              *goto rules\n            #straight to the contestants!\n              *goto contestants\n    #No, it's really interesting.  Tell me more now.\n      *label contestants\n      Okay, it's time to meet the contestants!\n      *page_break\n      \"...So they're the rules.  Don't break them.  For every rule you break, there will be an hour's penalty.\"  Mendez pauses for a moment and takes a piece of paper from his pocket.  After a quick glance, he puts it back and continues.\n      *page_break THE TEAMS\n      \"Okay, let me tell you who you are racing against.  In total there are nine teams.  In no particular order, they are:  \n\n      Claude and Monique, partners from France  \n\n      Carmen and Carmelina, from Germany and Canada respectively.\n \n      Pritesh and Kiran, father and son from India\n\n      Sunny and Sean, brother and sister from Korea\n\n      Justin and Travis, special ${american} twins\n\n      Viacheslav and Alina, married from Russia\n \n      Stacey and Lance, dating couple from  Australia\n\n      Raul and Carlos - Good friends from Spain\n\n      And ${name} and ${partner} from ${country}\n\n      *label introduceme\n      There are murmurings within the crowd as the other teams start to talk amongst themselves.  \n      \"Alright, calm down.  There's one more thing before we begin.  Money!\"  As he speaks, workers start going around the teams distributing rucksacks to each team.  \"Each team will be given $500 to run the race with.  You will find it in your backpack.  Use your money carefully.  If you spend it all, then there is no more.\n      Be aware that while some places here take dollars, it might be better to change some money into the local currency, the Nuevo Sol.  But, of course, that is down to you.\" \n      \"Now, finally, it's time to get started.  You'll also find in your backpack a 50 Nuevo Sol note.  This is your first clue for where to go.  Go.  GO!!!!\"\n      ...And just like that, the race begins!\n      *finish Leg 1: Sands of Time\n", "16limaica": "*temp ica\n*set ica 1\n*temp huacachina\n*set huacachina 1\n*temp bank\n*set bank 1\n*temp outside\n*set outside 1\n*temp train\n*set train 1\n*temp hotelroom\n*set hotelroom \"no\"\n*set time 660\n*temp dollarchange\n*set dollarchange 0\n*set money 500\n*temp teamtalk\n*set teamtalk 0\n\n*image map1.jpg\n\nOkay, this is it.  The start of the race!  Every decision from now on costs you time, so think carefully. \n*label start \nWhat will you do now?\n*choice\n  #See if the hotel has a computer hooked up to the net.\n    *set time +1\n    You go to the hotel lobby and ask at the desk if they have internet access.  They do.  \n    *label internet1\n    *achieve rule_breaker\n    How will you use the internet?\n    *choice\n      #Google for 50 Nuevo Sol.\n        *set time +3\n        *label google\n        *set rule2 \"broken\"\n        After a quick google search, and a few minutes checking, you find several references linking the note to HUACACHINA, an oasis near a town called Ica.  This sounds like a good starting place.\n        *set huacachina 7\n        *set ica 3\n        *if outside=1\n          You leave the hotel.\n          *goto leave\n        *else\n          You exit the internet cafe.\n          *goto leave\n      #Go to www.choiceofgames.com\n        *set time +1\n        *set rule2 \"broken\"\n        Which game would you like to play?\n        *choice\n          #Choice of the Dragon\n            *set time +2\n            You start playing.  You're just about to battle a dragon called Axelmeus when your partner interrupts you.  \n            \"Er... Don't we have more important things to do?\"\n            It's a good point.  You close the game. \n            *if outside=1\n              *goto start\n            *else\n              *goto leave\n          #Choice of Broadsides\n            *set time +2\n            You start playing.  You're just about to run out the gun and fire when your partner interrupts you.  \n            \"Er... Don't we have more important things to do?\"\n            It's a good point.  You close the game.\n            *if outside=1\n              *goto start\n            *else\n              *goto leave\n          #Choice of Romance\n            *set time +2\n            You're about to start playing when your partner interrupts you.  \n            \"Er... Don't we have more important things to do?\"\n            It's a good point.  You close the game.\n            *if outside = 1\n              *goto start\n            *else\n              *goto leave\n          #Choice of the Vampire\n            *set time +2\n            You're about to start playing when your partner interrupts you.  \n            \"Er... Don't we have more important things to do?\"\n            It's a good point.  You close the game. \n            *if outside = 1\n              *goto start\n            *else\n              *goto leave\n      #Check my emails.\n        *set time +3\n        *set rule2 \"broken\"\n        Spam, Spam, Spam.  You really need a better filter system.  Hey, what's this!  It seems you have won an iPad!  Oh, wait.  That's more spam.  There's nothing interesting here.\n        *goto internet1\n      #Ask my partner.\n        *set time +1\n        *If partner = \"April\"\n          You ask April her opinion.\n          \"Well ${name}, the rules said we can't use the internet at all!  Let's do something else.\"\n          She has a point.\n          *if outside = 1\n            *goto start\n          *else\n            *goto leave\n        *Elseif partner = \"Leonie\"\n          You ask Leonie what to do.\n          \"Wasn't there a rule about not using the internet?\"\n          Maybe she's right.  Maybe not.  What do you do?\n          *choice\n            #Use the internet to search for the note anyway.\n              *set time +1\n              *goto google\n            #Do something else.\n              *set time +1\n              *if outside = 1\n                *goto start\n              *else\n                *goto leave\n        *Else\n          You ask Dan what to do.\n          \"Let's check the note dude.\"\n          What do you do?\n          *choice\n            #Search for the note on the internet.\n              *goto google\n            #Do something else.\n              *set time +1\n              *if outside = 1\n                *goto start\n              *else\n                *goto leave\n  *If hotelroom = \"no\"\n    #Go back to my hotel room.\n      *set time +1\n      *set hotelroom \"yes\"\n      You go back to your hotel room to see that a housemaid is already there cleaning the room.  Now what?\n      *choice\n        #Look for my bag.\n          *set time +2\n          After a quick search you are already carrying it.\n          *goto start\n        #Do something else.\n          *set time +1\n          *goto start\n  #Inspect the 50 Nuevo Sol note.\n    *set time +1\n    *label note\n    *set ica 3\n    You look at the back and front of the note.  On one side is a man wearing glasses.  On the reverse there is a large, scenic picture of a lake.  \n    Both sides have the same writing on them.\n    *choice\n      #Inspect the writing more.\n        *set time +1\n        It says BANCO CENTRAL de RESERVA del PERU on both sides.  Could this be a clue for where to go?\n        *set bank +2\n        *label more\n uildings.\n          There is small print just below the picture which reads: LAGUNA DE HUACACHINA\n          *set huacachina 5\n          Is this where you need to go?\n          *goto more\n      #Inspect the man more.\n        *set time +2\n        The man is wearing a suit and a bow tie in the picture.  There is small print below his picture which names him as ABRAHAM VELDELOMAR PINTO\n        *set huacachina 3\n        Could he somehow be the clue?\n        *goto more    \n  *if teamtalk\u003c3 \n    #Talk to another team\n      *set teamtalk+1\n      *set time +1\n      Which team will you talk to?\n      *choice\n        #The ${american} brothers\n          *set time +4\n          *if cg >2\n            The ${american} twins seem to have the same idea as they approach your table before you even stand up.  They address both your team and Carmen and Carmelina.\n            *label thecon\n            \"Hi, my name is Travis.\"  Says the first twin with a very strong voice.  \"And I'm his bro Justin.\"  Says the second man.  You exchange pleasantries and then \n            the ${american}s move in closer and talk quieter so no one else can hear.  \"Listen, we have an idea.  But we don't want everyone to know about it.\"\n            *line_break\n            \"Go on...\"  Carmen says.\n            *line_break\n            \"Well, look at this.\"  Justin shows a piece of notepaper with two letters on it.  \"The first two letters of our final destination are A and I.  And we're looking for\n            a ten letter two word place in Peru.\"\n            *line_break\n            *if partner = \"April\"\n              \"Two or three word.\" April interrupts.\n              \"Well okay, two or three words.\"  Justin continues.\n              *goto aandi\n            *else\n              *label aandi\n              \"Can you think of any place in Peru that fits?\"  Say Travis.\n              \"Here, look.\"  Justin continues. He slowly writes on the paper.  \n              \n              M A C H U  P I C H U\n              \n              \"It's gotta be Machu Pichu!  I mean come on, you go to Peru, you gotta go to Machu Pichu.\"  Travis says, a little louder than he wanted but no one else hears.\n              \"Ten letters, two words... an A and an I.\"  Carmelina notes.\n              \"Yeah, it all fits!\"  Says Carmen.\n              \"So what do we do?\"  Asks Carmelina.\n              \"Easy.  We just get on a plane and head straight to Machu Pichu!\"\n              \"We can't all walk off together though.  The other teams would be suspicious.  Let's split up and head to the airport.  We'll see you there.\"  Says Justin.\n              \"Good point.\" says Carmen.  With that, you all go your separate ways.\n              *set usa 2\n              *page_break\n              *goto start\n          *else\n            You walk over to the ${american} twins.  You can see they are already at the table with the Canadian and German girls, Carmelina and Carmen.  \n            You and ${partner} join them.\n            *set cg 3\n            *goto thecon\n        #The Australian couple\n          *set time +3\n          You approach the Australian couple.  They are busy examining the 50 sol note.  You greet them and they invite you to sit with them.\n          \"So what do you reckon we should do first?\"  The man Lance asks.\n          *choice\n            #I think we need to examine the 50 sol note.\n              *set time +3\n              *set ica 3\n              \"Yeah, we've been looking.  I think we need to go here.  'Laguna de Huacachina'.\"  Sheila says.  The Australians seem like nice people.\n              *set huacachina 5\n              You talk a little more before going your separate ways.  Both teams agree that Laguna de Huacachina is the place to go to.\n              *set australia +10\n              *page_break\n              *goto start\n            #We should leave the hotel.  The sooner we are moving the better.\n              *set time +2\n              \"We can't leave until we know where we are going.  Good luck though!\"  Says Sheila.  You and ${partner} leave the table.\n              *set australia +1\n              *page_break\n              *goto start\n            #How about a drink in the bar to start us off?\n              *set time +2\n              The Australians look at you as if you are crazy.  Perhaps that wasn't the smartest suggestion.  You leave them to it.\n              *set australia -5\n              *page_break\n              *goto start\n            #What do you mean 'we'?\n              *set time +3\n              The Australians seem really put out by this.  \"Then why did you even come to us?  Eh?  Spying on us?  Eh?\"  Says Lance, rather aggressively.  Perhaps you should do something else.\n              *set australia -10\n              *page_break\n              *goto start\n        #The French partners\n          *set time +2\n          You approach the couple from France.  They seem to be arguing over something.  As you reach them, they stop arguing abruptly.  \"Hello.  So what do you think? Eh?\"\n          Says the male Claude with good English and an almost British accent.\n          *choice\n            #Are you from France?\n              *set time +2\n              \"Er, yes we are.  I'm Claude, and this is my lovely Monique.\"  He sharply pronounces 'lovely' as three distinct syllables.  Monique gives a polite nod but\n              clearly isn't happy talking to you.  After her courteous greeting she nudges Claude and speaks quietly in French to him.  He replies before addressing you further.\n              \"I'm sorry, we are in a race.  We should get going.  It was nice to meet you.\"\n              The French couple leave the room and leave you to it.\n              *goto start\n            #Nice to meet you, I'm ${name} and this is ${partner}.  We're from ${country}.\n              *set time +2\n              \"I'm Claude, and this is my lovely Monique.  We're from France.\"  He sharply pronounces 'lovely' as three distinct syllables.  Monique gives a polite nod but\n              clearly isn't happy talking to you.  After her courteous greeting she nudges Claude and speaks quietly in French to him.  He replies before addressing you further.\n              \"I'm sorry, we are in a race.  We should get going.  It was nice to meet you.\"\n              The French couple leave the room and leave you to it.\n              *goto start\n            #We're not sure where to start.  We were hoping you had an idea!\n              *set time +2\n              \"Well I was thinking that we should start...\"  Begins Claude before being interrupted by his partner.\n              \"Claude!\"  She says in a firm voice between her teeth.  The two exchange sharp words in French before Claude turns back to you.\n              \"I'm sorry, we are in a race.  We should get going.  It was nice to meet you.\"\n              The French couple leave the room and leave you to it.\n              *goto start\n        #The Russian married couple\n          *set time +2\n          You scan the room looking for the Russian couple and see them running from the room.  They are clearly taking the race very seriously from the start!\n          *goto start  \n        #The Spanish friends\n          *set time +1\n          You go to the Spanish friends.  As you reach them, one turns to you and says \"Sabes lo que estoy diciendo?\"\n          What do you say?\n          *temp spanish_speaker\n          *set spanish_speaker false\n          *if country = \"Spain\"\n            *set spanish_speaker true\n          *if country = \"Mexico\"\n            *set spanish_speaker true\n          *if country = \"Argentina\"\n            *set spanish_speaker true\n          *if country = \"Espana\"\n            *set spanish_speaker true\n          *if country = \"Uruguay\"\n            *set spanish_speaker true\n          *if country
