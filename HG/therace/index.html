eems your testimony wasn't enough with the police and the twins didn't implicate him.  If only you\n                  had done something different.  Perhaps there was a way to catch him too.  Oh well.  You will never know.\n                  *line_break\n                  THE END\n                  *goto_scene ending\n            #Try to get hold of the walkie talkie.  You need to link the twins to Mendez.\n              *label walkietalkie\n              How will you approach this?\n              *temp intchar\n              *temp intchar_value\n              *set intchar false\n              *set intchar_value intelligence+charisma\n              *if intchar_value>85\n                *set intchar true\n              *temp strong \n              *set strong false\n              *if strength>49\n                *set strong true \n              *choice\n                *selectable_if (intchar) #Use my wits and charm to persuade them.\n                  You walk out towards Justin and Travis.  They look startled when they see you.  \"Woah! ${name}, wow, um...  How long have you been here?\"  stutters Travis.\n                  You tell them that you saw what they did pushing the rocks.  You also know they are working with Mendez.  They both look shocked, like\n                  a child caught doing something wrong.\n                  \"But... It's just your word against ours.  You have no proof that we've done anything.\"  Says Justin.\n                  *If camera=false\n                    He's right, but you decide to bluff.\n                  You tell them that you have a camera with pictures.  To stop them searching you, you tell them that your partner has the camera with many\n                  photos of the twins here.  Very incriminating.  The twins simultaneously turn an extra shade of pale.\n                  \"What are you going to do?  What do you want?\"  Says Travis.\n                  \"We can split the winnings with you.\"  Adds Justin.  Travis nudges him in the side.  Clearly he's saying too much.  You take the time to \n                  move a step closer to the twins.\n                  What will you say?\n                  *choice\n                    #\"I want the walkie talkie.  Justin has it.\"\n                      Justin pulls out the walkie talkie.  \"Why do you want this?\"  He says.  Travis takes control, grabbing the radio from Justin.\n                      \"No chance.\"  He says.  \"If you have this, we're screwed.  Justin, run!\"  With that, Travis throws the walkie talkie over the side\n                      of the mountain.  The ${american} twins run away from you further up the mountain.  You let them go, instead concentrating on the\n                      fallen radio.\n                      *goto radiodown\n                    #\"I have enough evidence to have you both arrested.  The only question is, will you take Mendez down with you?\"\n                      Travis and Justin look at each other.  They are both cleared distressed at the situation.  You move closer still towards them.  \"You... You know about Mendez?\"  Says Travis.\n                      *choice\n                        #Yes.  I saw you talk to him on the walkie talkie.\n                          Justin pulls out the walkie talkie.  \"You saw us using this?\"  He says.  Travis takes control, grabbing the radio from Justin.\n                          \"No chance.\"  He says.  \"If you don't have this, you can't do anything.  Justin, run!\"  With that, Travis throws the walkie talkie over the side\n                          of the mountain.  The ${american} twins run away from you further up the mountain.  You let them go, instead concentrating on the\n                          fallen radio.\n                          *goto radiodown\n                        #Yes.  If you help me stop him, I'm sure the police will go easy on you.\n                          Travis sits down, thinking how to handle this situation.  Justin continues to stand looking scared.  You take another step towards the twins.\n                          Finally, after a period of silence, Travis asks how they can help.\n                          *choice\n                            #Ask them how they can trap Mendez.\n                              Travis puts his head in his hands.  Justin turns away for a second.  When he turns back, you see he is holding the walkie talkie.\n                              He stretches out his arm, offering it to you.  \"We use this to speak to Mendez.\"  He says.  Travis looks up, slow to understand\n                              what is happening.  When he sees Justin offering you the walkie talkie, he tries to stop him, but it's too late.  You take\n                              the radio and step back from the twins.  They stand together, waiting to see what you will do.  You tell them that with the walkie\n                              talkie you can trap Mendez.  Because they gave you the walkie talkie, the police should be lenient towards them.  Justin looks\n                              a little confused and Travis grabs his arm.  \"Come on.\"  He says.  We need to get out of here.  With that, the two ${american} men\n                              run on up the mountain.\n                              *goto one_or_two\n                            #Ask them for the walkie talkie.\n                              Justin pulls out the walkie talkie.  \"You saw us using this?\"  He says.  Travis takes control, grabbing the radio from Justin.\n                              \"No chance.\"  He says.  \"If you don't have this, you can't do anything.  Justin, run!\"  With that, Travis throws the walkie talkie over the side\n                              of the mountain.  The ${american} twins run away from you further up the mountain.  You let them go, instead concentrating on the\n                              fallen radio.\n                              *goto radiodown\n                    #\"If you give me the walkie talkie, I won't tell anyone what I saw.\"\n                      Justin pulls out the walkie talkie.  \"Why do you want this?\"  He says.  Travis takes control, grabbing the radio from Justin.\n                      \"No chance.\"  He says.  \"If you have this, we're screwed.  Justin, run!\"  With that, Travis throws the walkie talkie over the side\n                      of the mountain.  The ${american} twins run away from you further up the mountain.  You let them go, instead concentrating on the\n                      fallen radio.\n                      *goto radiodown\n                #Use stealth to steal it.\n                  The twins start to gather their things ready to leave.  You move towards them as quietly but quickly as you can.  Hiding behind a large\n                  boulder, you wait for your chance.  Unfortunately, it doesn't come.  From here, you can't see what the twins are doing and they don't come\n                  close enough.  When you peek up to see where they are, they are too far away from you, leaving quickly.  So much for that idea.  What will you do now?\n                  *choice\n                    #Look for evidence on the mountain to prove that the twins started the avalanche.\n                      *goto search_for_evidence\n                *selectable_if (strong) #Take it now with force.\n                  You walk confidently towards the twins as they gather their things to leave the area.  Justin notices you first and a look of horror\n                  crosses his face.\n                  \"Woah! ${name}, wow, um...  How long have you been here?\"  He stutters.  Travis looks equally shocked when he sees you.  You don't waste\n                  time and demand that they give you the walkie talkie now.  Travis stands still but Justin instinctively reaches for the radio on his belt.\n                  At the same time he realises he has made a mistake.  Meanwhile, you haven't stopped walking and are now right next to Travis, who is \n                  standing between you and Justin.\n                  \"Look, we don't want trouble, okay?  There's two of us and one of you.  It'd be messy.  Just let us go and everyone will be happy.\"  Says\n                  Travis, hoping you will back down.  You don't.  Grabbing Travis's up-facing hand, you twist his arm, causing him to turn his back to you as\n                  he cries out in pain.  Justin is still rooted to the spot, not sure what to do.  This will be easier than you thought!\n                  \"What should I do?  What should I do?\"  Cries Justin, holding the incriminating walkie talkie.  You worry for a second that he might just...\n                  and then he does.  He throws the walkie talkie through the air, down the side of the mountain.  Dejected for a second, you let go of \n                  Travis's arm and he moves away from you.  Together, the ${american} team run away.  You let them go as you look for the fallen walkie\n                  talkie.\n                  *label radiodown\n                  *if luck>39\n                    Amazingly, you are in luck!  The walkie talkie didn't fall far and has landed on a patch of snow just a few metres below you!  You make\n                    your way down to it and take it carefully, making sure not to add your fingerprints to it.  Once it's in your bag, you head back to \n                    your partner.\n                    *goto one_or_two\n                  *else\n                    You search the area, but are unable to find the walkie talkie.  Besides, even if you did find it, it would likely be broken.  \n                    *if mendezscrewed = true\n                      The photographs of the Americans here will have to be enough.  You head to the edge where the pushed the rock and look down.  One of the Spanish racers was hit by a rock in his leg.  He\n                      looks to be in a lot of pain as his partner and your partner ${partner} try to help him.  You go down to them and help the hurt Spaniard,\n                      it's Carlos, to his feet.  Together, you go back down the mountain, explaining to the Spanish and ${partner} what happened.  Once down, you contact the organisers of the race as well as the police.  Starting an avalanche is a\n                      criminal offence and regardless of Justin and Travis's intentions, they have a lot of questions to answer.\n                      *page_break\n                      *goto one_out_of_two\n                    *else\n                      You decide to search the area for evidence instead.\n                      *goto search_for_evidence\n        #Continue, sticking to the main path.  It'd be good to put distance between ourselves and the Spanish.  The race is more important than anything else.\n          You soon pass the Spanish.\n          *goto rockyattack\n    *else\n      Together, you slow down but you are still going faster than the Spanish. You soon pass them anyway.  \n      *label rockyattack\n      You haven't gone much further when you hear a loud roar up ahead.  \n      Looking up, you see an assortment of rocks coming down the mountain headed in your direction!\n      You don't have much time to act.  Quick!  What do you do?\n      *goto rockchoice\n*label luckyescape\n*set time +30\n*if truth =100\n  It quickly dawns on you that you saw another team ahead of the Spanish.  Did they start the rock fall?  Surely not.\n  *goto continuejourney\n*else\n  *goto continuejourney\n*label continuejourney\nYou continue your journey up the mountain, now being more careful to observe what's happening above you.\nDo you walk with the Spanish team?\n*temp slow\n*set slow true\n*choice\n  #Yes, as a group of four we will be safer.\n    You suggest to the Spanish team that you should walk together.  However, they have other ideas!  They start walking faster than your team.\n    *if partner=\"April\"\n      You are helpless to stop them and watch as they leave you behind.  Clearly, they were walking slowly before for a reason.\n      *goto behindspanish\n    *else\n      Do you want to race them?\n      *choice\n        #Yes, I'm sure we can take them on.\n          You step up your pace\n          *if speed > 30\n            and catch the Spaniards easily.  They are left helpless but to watch as you and ${partner} move ahead of them.\n            *goto aheadofspanish\n          *else\n            but it's no use.  You are helpless to stop them and watch as they leave you behind.  Clearly, they were walking slowly before for a reason.\n            *goto behindspanish\n        #No, let them go.  This isn't the final leg yet.\n            You watch as the Spanish pull ahead of your team.\n            *goto behindspanish          \n  *else\n    *if speed > 30\n      #No, we'll pull ahead of the Spanish team.\n        You thank the Spanish team for their concerns once more and pull ahead of them.\n        *goto aheadofspanish\n  *if ((slow) or (partner=\"April\")) #No, we'll let the Spanish team go ahead.\n    You watch as the Spanish pull ahead of your team.\n    *goto behindspanish\n\n*label behindspanish\n*set time +60\nAn hour later you finally reach the 4500 metre mark.  Here, you are relieved to find a flag displaying \"MENDEZ RACE\" in large letters.  You're also glad for the food and \nwater you are given by race workers up here.  You see the Spanish team, still here, waiting.  It seems they have been waiting for you and they are standing by a huge red\ntelephone attached to a huge paddle which has been stuck in the snow.  Teams are to leave the mountain in fours, with one helicopter, called via the red phone, being used for \ntwo teams at a time.  The Spaniards are also carrying a large block of ice from the mountain in a clear, plastic bag.  When they see you, the Spanish gesture for you to join\nthem quickly so that you can leave.  What do you do?\n*temp C11\n*set c11 true\n*temp C12\n*set c12 true\n*temp c13\n*set c13 true\n*label mountaintop\n*choice\n  #Go with the Spanish, use the phone and take the helicopter down.\n    You take the helicopter down with the Spanish.\n    *goto Arequipacity\n  *if (c11) \n    #Have a food and drink break.  The Spanish will have to wait.\n      You eat some snack bars and drink a red bull.  You feel refreshed (STAMINA + 5)\n      *set stamina +5\n      *set c11 false\n      Now what will you do?\n      *goto mountaintop\n  *if (clue) \n    *if (c12) \n      #Ask about the ice Maiden.\n        You ask the Race Helpers about the Ice Maiden.  They tell you that she is in Arequipa.  You have to find her there.\n        *set c12 false\n        *goto mountaintop\n  *if (c13)\n    #Find our own block of ice.\n      *set ice true\n      Behind the refreshments, you see many clear plastics bags and Chisels.  There is also a huge block of ice, clearly brought here from below as it doesn't look natural.\n      You reason that you need your own block of ice and chip a large chunk from the block, placing it into the plastic bag.\n      *set c13 false\n      *goto mountaintop\n\n*label aheadofspanish\n*set time +40\nForty minutes later you finally reach the 4500 metre mark.  Here, you are relieved to find a flag displaying \"MENDEZ RACE\" in large letters.  You're also glad for the food and \nwater you are given by race workers up here.  You are told that you can only depart the mountain with another team.  You will have to wait for the Spanish racers after all.\nAn unusual Ice sculpture is stationed behind the food and drink stand.  A solitary, large red telephone is attached to a large paddle, stick in the snow.  You need to use \nthis phone to call for a helicopter, however it requires 4 racers to be present before you can use it.  The view from here is amazing and you can see far down to the city of\nArequipa below.  What will you do in the meantime, while you are waiting?\n*temp C21\n*set c21 true\n*temp C22\n*set c22 true\n*temp c23\n*set c23 true\n*temp c24\n*set c24 1\n*label mountaintop2\n*choice\n  *if c24>2\n    #Call the helicopter on the red phone with the Spanish team.\n      You take the helicopter down with the Spanish.\n      *goto Arequipacity\n  *if (c21) #Have a food and drink break.\n    You eat some snack bars and drink a red bull.  You feel refreshed (STAMINA + 5)\n    *set stamina +5\n    *set c21 false\n    *set c24 +2\n    Now what will you do?\n    *goto mountaintop2\n  *if (clue) \n    *if (c22) \n      #Ask about the ice Maiden.\n        You ask the Race Helpers about the Ice Maiden.  They tell you that she is in Arequipa.  You have to find her there.\n        *set c22 false\n        *set c24 +1\n        Now what will you do?\n        *goto mountaintop2\n  *if (c23) #Have a look at the ice.\n    Behind the refreshments, you see many clear plastics bags and Chisels.  There is also a huge block of ice, clearly brought here from below as it doesn't look natural.\n    Do you want to take some of the ice?\n    *set c24+1\n    *choice\n      #Of course!\n        You reason that you need your own block of ice and chip a large chunk from the block, placing it into the plastic bag.\n        *set c23 false\n        *set ice true\n        Now what will you do?\n        *goto mountaintop2\n      #Um... no... what would we do with a block of ice?\n        You leave the ice.\n        Now what will you do?\n        *goto mountaintop2\n\n*label Arequipacity\n*page_break\n*if dream >1\n  As the helicopter descends down the mountain, you watch the city of Arequipa come into view.  From here you can see all sorts of buildings.  Roads with cars travelling along \n  them.  Churches and various stores.  You also see a very familiar looking complex to the North-West of the city.  Your attention is caught by the Spaniard Carlos who speaks \n  to his partner in Spanish.  You don't understand what he says but you catch the last words in English.  \"...A red Keeper.\"  The same words that the girl from your dream said\n  to you.  Will you ask Carlos about it?\n  *choice\n    #Yes!  It's important!\n      You ask Carlos what he meant.  A red keeper.  For a moment, he looks at you confused.  Keeper?  Then he understands.  \"Ah, A red keeper?  Haha, no.  Arequipa!  The city.\n      The name.\"  Then you understand.  The city was called Arequipa which sounds a bit like A red keeper.  Then you really understand.  The girl in your dream said Arequipa...\n      Was that before you even knew you were going to this city?  Was she here?  Was she really here?  Was that even possible?\n      You look again to the city below and the familiar building.  Could that be the enclosure from your dreams?\n      The helicopter soon lands in the east side of the city.  Departing the chopper, you find yourself in\n      an empty market square.  The ground has a yellow dust, swept up by the rotating blades of the helicopter.  This isn't a proper helicopter landing site, but actually part\n      of the city.  The Spaniards run off and your partner is ready to go.  Your mind is full with thoughts of your dream.  You have a choice here that could completely change\n      your fate.  Follow your head and focus on the race or follow your heart and head to that enclosure.  What will you do?\n      *choice\n        #On with the race.  I'm here for money, not a girl.  Besides, it was a dream.  It's not real.\n          \"Let's go!\" you shout and walk to the edge of the market square where the Spaniards are.\n          *page_break\n          *goto marketsquarechoice\n        #If there's the slightest chance that my dreams are coming true, I have to see.  \n          *goto dreamendingsequence\n    #No, I'm here to race and that's it.\n      You let the comment slide and ignore it.\n      *page_break\n      *goto temporarylabel\n*else\n  *set time +20\n  The helicopter descends from the mountain leaving the base camp far behind.  \n  *label temporarylabel\n  After a while, you land in the east side of the city.  Departing the chopper, you find yourself in\n  an empty market square.  The ground has a yellow dust, swept up by the rotating blades of the helicopter.  This isn't a proper helicopter landing site, but actually part of the\n  city.  You walk to the edge of the market square, along with the Spaniards.\n  *if (ice)\n    It's time to act and you'd better be quick!  The ice is melting!  \n  *label marketsquarechoice\n  Now what will you do?\n  *choice\n    #Ask local people where the Ice Maiden is.\n      *set time +15\n      The nearest people to you are a group of old Peruvians.  There is a slightly younger man, still in his 60's you guess, wearing a white hat and walking with his dog a \n      little further away.  Who will you ask?\n      *choice\n        #The group.\n          You speak to the old people but you get the impression that they don't want to talk to you.  Even the old women ignore you, leaving you little choice but to find \n          someone else.  The man with the dog has gone, but a middle-aged couple with a young daughter are approaching.  You ask them where you can find the Ice Maiden.  They\n          look a little lost, not understanding your English fully.  Then the little girl, their daughter speaks to her parents.  There is an exchange between father and\n          daughter, then they all look at you and ${partner} at the same time.  \"Go to the Museum of... Santuarios Andinos!\"  You thank them profusely before \n          *if partner = \"Dan\"\n            Dan touches your shoulder.\n            *goto museumtime\n          *elseif partner = \"April\"\n            April tugs your sleeve.\n            *goto museumtime\n          *else\n            Leonie nudges you in the arm.\n            *label museumtime\n            You then leave the area and find a taxi.\n            *goto route1\n        #The man with a dog.\n          The man looks at you blank for a moment.  Then he speaks.  \"Er, you go the museuo.  Go taxi.\"  Eager to help you, he takes your arm and starts walking.  You and \n          ${partner} follow.  He directs you to a taxi and tells the driver where to take you.  Thinking the man is finished, you thank him and climb in the taxi.  The old man\n          gets in too... with his dog!  The driver heads off and you just hope that this crazy old man and his dog know what they are doing.\n          *goto route2\n    #Find a taxi.\n      *set time +25\n      You look around the area and it takes a while, but eventually, you find a large enough road with traffic.  Soon, a taxi appears and you get in.  However, it's not that \n      simple.  When you ask the taxi driver to take you to the Ice Maiden, he just stares blankly.  What will you do?\n      *choice\n        #Stay in the taxi and ask strangers as you pass.\n          You tell the taxi driver to go and thankfully, you hit a very busy road.  Reaching out the window, you call to people, asking where the Ice Maiden is.  It doesn't seem\n          to be working though as people aren't listening to you.\n          *if partner = \"Dan\"\n            Dan then pulls you out of the way and looks out the window himself.  His voice is stronger than yours and half a dozen people turn to look at him.  He asks again \n            where the Ice Maiden is and one man walks over to the window.  He tells the taxi driver where to go and soon you are on your way.\n            *goto route1\n          *elseif partner = \"April\"\n            The taxi comes to a stop and you keep shouting at people.  You hear a car door open and turn in your seat.  April has just got out of the taxi!  You move over to \n            her door and open it, calling out to her.  She is standing, talking to a young woman and nodding.  Seconds later, she returns to the taxi and tells the driver where\n            to go.  She then looks at you with a smile.  You say:\n            *choice\n              #\"Thanks!\"\n                April shrugs and looks off into the distance.  She is pleased but trying to hide it as if it's nothing special.\n                *goto route1\n              #\"Great work there April!\"\n                She smiles broadly, clearly pleased that she helped.\n                *goto route1\n              #\"What were you thinking?  This is a dangerous place and you can't just go running off like that.\"\n                April looks at you and is clearly upset.  \"I was just trying to help.\"  She says, almost in a whimper.  The journey continues in silence.\n                *goto route1\n          *else\n            You turn to Leonie who is also having little luck outside her side of the taxi.  It seems people are just ignoring you.  Perhaps you should try something different?\n            *choice\n              #Stay with the taxi.  We'll find someone in the end.\n                You stay in the taxi and keep shouting out to people.  Leonie has more luck and soon she turns to you.  \"I got one.\"  She says before talking to someone.  She\n                has found a man who is willing to help.  He talks to your taxi driver and soon you are on your way.\n                *goto route1\n              #Find another taxi.\n                *goto findnewtaxi\n        #Find another taxi.\n          *set time +5\n          *label findnewtaxi\n          You find another taxi with a driver who speaks a little English.  He tries his best to help and stops to ask people.  Soon, he has an answer and you are on your way\n          to a museum.\n          *goto museumentrance\n        \n    #Follow the Spanish.\n      *set position 2\n      *set time +10\n      You watch the Spaniards walk away and follow them.  Soon, they get into a taxi and drive away.  You take a taxi too, telling your driver to follow.  After 20 minutes,\n      the taxi stops and the Spaniards get out.  You are outside the Museo de Santuarios Andinos.\n      *goto museumentrance\n    *if cg=50\n      #Go to the Museo de Santuarios Andinos.\n        *set time +5\n        *goto route1\n\n*label route1\n*page_break\n*set time +15\nThe taxi drives down several narrow pedestrian roads before turning onto a main road headed south.  You head downhill on this road for a while before turning onto a market road\nwhich is full of people going about their daily business.  Progress is slow and you could definitely walk faster, however, you don't know the way.  Your driver, while appearing\nextremely patient, as if this is common, beeps his horn incessantly.  Judging by the reaction of most pedestrians, this too is common.\n*if (ice) \n  You tell the driver to hurry as your ice is melting.\n  *goto finally\n*label finally\nFinally, the crowds part enough for you to go through and soon you arrive at the museum.\n\n*page_break\n*label museumentrance\nThe museum entrance is very small in the centre of a red brick wall.  You enter and are asked to pay for a guide at $3 each.\n*choice\n  #Pay and tell the guide you want to see the Ice Maiden.\n     The tour guide tells you that you will see the Ice Maiden at the end of the tour.  First, you must watch a short video about the discovery of the Maiden and the others.\n     The tour is interesting and if you weren't in a race, you'd love to spend some time here looking around.  However, you are racing and your thoughts the whole way through \n     are about progressing to the next stage.  Eventually, you make it to the Ice Maiden, the mummified remains of a young girl who was found at the top of a volcano where\n     she had been left as an offering to the volcano many hundreds of years ago.  \n     *if (ice)\n       There is also a large bucket with a Mendez race sign saying 'DEPOSIT ICE HERE'.  You place your\n       melting chunk of ice into the bucket and leave the room.\n       *goto arequipafinish\n     *else\n       Unfortunately, there is also a large bucket with a Mendez race sign saying 'DEPOSIT ICE HERE'.\n       It seems you have made a big mistake.  You exit the room with a lump in your throat.\n       *goto arequipafinish\n  #Tell them you are part of THE RACE.\n    Once they realise that you are racing, their attitude changes completely.\n    You are taken to the Ice Maiden, the mummified remains of a young girl who was found at the top of a volcano where\n    she had been left as an offering to the volcano many hundreds of years ago.  \n    *if (ice)\n      There is also a large bucket with a Mendez race sign saying 'DEPOSIT ICE HERE'.  You place your\n      melting chunk of ice into the bucket and leave the room.\n      *goto arequipafinish\n    *else\n      Unfortunately, there is also a large bucket with a Mendez race sign saying 'DEPOSIT ICE HERE'.\n      It seems you have made a big mistake.  You exit the room with a lump in your throat.\n      *goto arequipafinish\n  *if (ice)\n    #Show them the ice.\n      You are taken to the Ice Maiden, the mummified remains of a young girl who was found at the top of a volcano where\n      she had been left as an offering to the volcano many hundreds of years ago.  There is also a large bucket with a Mendez race sign saying 'DEPOSIT ICE HERE'.  You place your\n      melting chunk of ice into the bucket and leave the room.\n      *goto arequipafinish\n\n*label route2\n*page_break\n*set time +15\nThe taxi drives down several narrow pedestrian roads before turning onto a main road headed south.  The old man's dog is barking all the way.  You head downhill on this road for a while before turning onto a market road\nwhich is full of people going about their daily business.  Progress is slow and you could definitely walk faster, however, the old man tells you to stay calm.  Your driver, while appearing\nextremely patient, as if this is common, beeps his horn incessantly.  Judging by the reaction of most pedestrians, the beeping horn is also common.\n*if (ice) \n  You tell the driver to hurry as your ice is melting.  The old man tells you to be patient.  With his white hat and scraggly white beard, he almost looks like the Colonel from\n  KFC.\n  *goto finally2\n*label finally2\nFinally, the crowds part enough for you to go through and soon you arrive at the museum.\n\n*page_break\n*label museumentrance2\nThe museum entrance is very small in the centre of a red brick wall.  You enter and are asked to pay for a guide at $3 each.  The old man starts arguing with the gatekeeper.\nWhat will you do?\n*choice\n  #Pay and tell the guide you want to see the Ice Maiden.\n     The tour guide tells you that you will see the Ice Maiden at the end of the tour.  First, you must watch a short video about the discovery of the Maiden and the others.\n     The tour is interesting and if you weren't in a race, you'd love to spend some time here looking around.  However, you are racing and your thoughts the whole way through \n     are about progressing to the next stage.  Eventually, you make it to the Ice Maiden, the mummified remains of a young girl who was found at the top of a volcano where\n     she had been left as an offering to the volcano many hundreds of years ago.  \n     *if (ice)\n       There is also a large bucket with a Mendez race sign saying 'DEPOSIT ICE HERE'.\n       You place your melting chunk of ice into the bucket and leave the room.\n       *goto arequipafinish\n     *else\n       Unfortunately, there is also a large bucket with a Mendez race sign saying 'DEPOSIT ICE HERE'.\n       It seems you have made a big mistake.  You exit the room with a lump in your throat.\n       *goto arequipafinish\n  #Tell them you are part of THE RACE.\n    Once they realise that you are racing, their attitude changes completely.\n    You are taken to the Ice Maiden, the mummified remains of a young girl who was found at the top of a volcano where\n    she had been left as an offering to the volcano many hundreds of years ago.  There is also a large bucket with a Mendez race sign saying 'DEPOSIT ICE HERE'.\n    *if (ice)\n      You place your melting chunk of ice into the bucket and leave the room.\n      *goto arequipafinish\n    *else\n      It seems you have made a big mistake.  You exit the room with a lump in your throat.\n      *goto arequipafinish\n  *if (ice)\n    #Show them the ice.\n      You are taken to the Ice Maiden, the mummified remains of a young girl who was found at the top of a volcano where\n      she had been left as an offering to the volcano many hundreds of years ago.  There is also a large bucket with a Mendez race sign saying 'DEPOSIT ICE HERE'.  You place your\n      melting chunk of ice into the bucket and leave the room.\n      *goto arequipafinish\n\n\n*label arequipafinish\n*page_break\nMendez greets you.  \"Welcome ${partner}, ${name}.  You've finished the leg.  \n*if (ice)\n  *goto scores\n*else\n  *set time +60\n  However, you didn't bring any ice for the Ice Maiden.  For that, there will be an hour's penalty.\n*label scores\n*if cg=50\n  *if (ice)\n    *set time +60\n    However, you used the internet yesterday in Nazca.  For that, there will be an hour's penalty.\n    *page_break\n    You sit with ${partner} and wait out your time penalty.\n    *page_break\n    \"Alright, I can check you in now.\"  Says Mendez.\n    *goto realscores\n  *else\n    *set time +60\n    You also used the internet yesterday in Nazca.  That's an extra 1 hour penalty.  You will have to wait for 2 hours before you can finish.\n    *page_break\n    You sit with ${partner} and wait out your time penalty.\n    \"Alright, I can check you in now.\"  Says Mendez.\n\n*label realscores\n*gosub showtime\n*if time \u003c1000\n  *if position =2\n    You are the second team here!  That was good going!\n    *set position 2\n    *goto arequipaover\n  *else\n    \"You are also the first team to arrive!  Well done!\n    *set position 1\n    *goto arequipaover\n*elseif time \u003c1010\n  You are the second team here!  That was good going!\n  *set position 2\n  *goto arequipaover\n*Else\n  *if time \u003c1020\n    \"You are the third team here.\n    *set position 3\n    *goto arequipaover\n  *elseif time \u003c1030\n    \"You're the fourth team to arrive.\n    *set position 4\n    *goto arequipaover\n  *else\n    *if time \u003c1046\n      \"You are the fifth team.\n      *set position 5\n      *goto arequipaover\n    *elseif time \u003c1120\n      \"You took a long time to get here.\n      You are the sixth team.  Still in the race... just!\n      *set position 6\n      *goto arequipaover\n    *else\n      \"You took a long time to get here.  Those two time penalties have proved too much.\n      You are the last team here.\n      *set position 7\n      I'm sorry to tell you that your race ends here.\"  Feeling dejected, you walk with ${partner} away from the museum.  You are directed to a hotel where you spend a bad \n      night's sleep wondering how it went so wrong.  The answer is staring you in the face of course, you made two big mistakes in this leg of the race.  A thought occurs to\n      you:  Were the ${american} team punished for using the internet cafe as well?  You let it slide.  The next day, you are flown back to Lima.  From there you take another\n      flight back to ${country}.  You are welcomed back by your family, and return to your old life.  Sometimes you wonder what might have been.  Unfortunately, you will never\n      know... \n \n      THE END\n\n      *page_break GAME OVER\n      It is game over, however you have two choices here.  You can restart the whole game or you can play again from the start of Arequipa.  What will you do?\n      *choice\n        #GO BACK (carry on playing from Arequipa: Your money will not be reset)\n          *goto AREQUIPASTART\n        #RESTART (end this game)\n          *goto_scene ending\n\n*label arequipaover\nOkay, now you should go to the hotel.  It's not far from here and it's all ready for you.  Tomorrow is another long day.\n*if (clue)\n  *label arequipaepilogue\n  You have dinner with ${partner}.  While you eat, \n  *if india>40\n    Pritesh comes to your table.  \"Just so you know, the ${australian} team didn't make it.  They're out.\"  He tells you solemnly, before moving on to another table.\n    *goto sleepynow\n  *elseif korea>40\n    Sean and Sunny come to your table.  \"Did you hear?  ${australian} team out!  They came in last.\"  Sunny and Sean both show excitement in their voices.  They are\n    clearly enjoying the whole experience of the race.\n    *goto sleepynow\n  *else\n    Mendez comes over to your table.  \n    \"You did well today, no?\"  He says.  \"Better than the ${australian} team.  They're on their way home now.  Surprised, you turn to Mendez.  \"You didn't know?\"  He says, smiling.  \"Yes, they came in last place.\"  With that, he leaves you to your meal.\n    *label sleepynow\n    You turn in for the night.  It was a long day today and you are tired after climbing the mountain.\n    You sleep well.  (STAMINA +15)\n    *set stamina +15\n    *finish Leg 4: Town Challenges\n*else\n  You have dinner with ${partner}.  While you eat, \n  *if india>40\n    Pritesh comes to your table.  \"Just so you know, the ${australian} team didn't make it.  They're out.\"  He tells you solemnly, before moving on to another table.\n    *goto sleepynow2\n  *elseif korea>40\n    Sean and Sunny come to your table.  \"Did you hear?  ${australian} team out!  They came in last.\"  Sunny and Sean both show excitement in their voices.  They are\n    clearly enjoying the whole experience of the race.\n    *goto sleepynow2\n  *else\n    Mendez comes over to your table.  \n    \"You did well today, no?\"  He says.  \"Better than the ${australian} team.  They're on their way home now.  Surprised, you turn to Mendez.  \"You didn't know?\"  He says, smiling.  \"Yes, they came in last place.\"  With that, he leaves you to your meal.\n    *label sleepynow2\n    *page_break\n    That night, when taking off your walking shoes, you find a small piece of paper inside.  It must have been this that was causing you pain.  You open it up.  It reads:\n\n    AT 4500 METRES TAKE ICE FOR THE ICE MAIDEN\n\n    You feel foolish, and a little angry, that you didn't find this message earlier.  If only you'd taken your shoe off.\n    You have a bad night's sleep. (STAMINA +10)\n    *set stamina +10\n    *finish Leg 4: Town Challenges\n\n\n*label showtime \n*temp mns \n*set mns time - 540\n*temp hrs \n*set hrs 0 \n*temp diff \n*set diff 0 \n\n*label loop \n*set diff mns - 60 \n*if diff > 0 \n  *set hrs + 1 \n  *set mns - 60 \n  *goto loop \n*else \n  *if hrs > 0 \n    You took ${hrs} hours and ${mns} minutes to get here after leaving the bus this morning.\n    *return \n  *else \n    You took ${mns} minutes to get here.\n    *return \n\n\n*label dreamendingsequence\nWhat will you tell your partner?\n*choice\n  #I'll make an excuse.\n    \"I'm really sorry ${partner}, but I have to go now.  I have to... um...\"  Words fail you.  What can you say?  What possible, rational reason is there to stop racing \n    for $50,000,000?  \"I'm sorry.\"  You say again, and run away.  You hear ${partner} shouting your name but you don't turn back.  You never see them again.\n    *goto themonastery\n  #I'll tell the truth.\n    \"I'm really sorry ${partner}, but I have to go now.  I have to... um...\"  Words fail you.  What can you say?  What possible, rational reason is there to stop racing \n    for $50,000,000?  \"I'm sorry.\"  You say again, and run away.  You hear ${partner} shouting your name but you don't turn back.  You never see them again.\n    *goto themonastery\n\n*label themonastery\nYou head towards the monastery with an anxious haste.  Negotiating the narrow Peruvian streets isn't easy, but you progress quickly.  Soon, you emerge from the back streets\nand reach a main road.  On the other side of the busy, four-lane street is a large complex with red brick walls.  It is the monastery!  You quickly cross the road and enter the\nhuge complex.  You travel down many corridors, not sure whether to shout or ask for help or how to find the girl.  You find a cafeteria in the monastery and listen to \nconversations for a while.  You here tourists talking about the properties of Mata de Coca, a tea drink here, and how it can help with altitude sickness.  You also hear a tour \nguide saying how the monastery was closed for a long time to the public and only opened recently.  However, you don't hear or see anything relating to the girl you dreamed \nabout.  Feeling jaded, you wander some more.  The narrow streets of the monastery quickly disorientate you and you lose your way.  After a while, you end up in a dark alcove\nwith a small altar at one side.  Many old portraits line the walls.  You sit for a while and debate what to do next.  Then you spot her.  In one of the old photographs on the\nwall is of a group of three women.  Two nuns, older, are wearing habits and standing straight.  The third person, a young woman, is sitting looking straight at the camera.  The \nphoto is in black and white but you view it in colour.  With texture.  And feelings.  You recognise her smile.  You recognise the feelings you have for her.  You have found \nthe woman from your dreams.  Taking the picture in your hands, you look at the back trying to find a note.  Anything to give you information about her.  All you find is a date:\n\n17 SEPTIEMBRE 1870 \n\nIt seems your girl was alive over 140 years ago.  A wave of emotions overcomes you and you sink to the floor.  You cry.\n*page_break\n*label meetthegirl\nAfter a long time, you leave the alcove and wander the grounds of the Monastery.  You happen upon a water fountain in a small square.  Red walls surround the square and, aside \nfrom a stone staircase going up, the area has a very secluded feeling.  You sit by the fountain contemplating the events of your journey so far.  From spilt coffee in \n${country} to Sand dunes and mountains in Peru, then to the monastery from your dreams and the disbelief and disappointment of finding the photo.  You gave up the chance of\nwinning $50,000,000 to end up... here... sat by a fountain in a monastery.  Why are you here?  You sigh and stand to leave.  Perhaps in another life you can find that girl.\nPerhaps... hello?  A voice.  Female.  Familiar.  You turn around and see a woman walking down the stone staircase.  \"Do you know how to get out of this monastery?  I feel\nlike I'm trapped here, I've been walking for so long!\"  With short blonde hair and blue eyes, she's definitely not the girl from your dreams.  Yet in the future, perhaps.  Who\nknows right?\n*page_break  THE END\nEpilogue\n\nDue to a remarkable coincidence, the woman on the steps happened to come from your same home town.  A year after meeting, you were married.  Another year and your first of \nthree children was on the way.  56 years later, at your funeral, your grandson tells the large procession of people about how you met your wife.  He says how the story \ninspired him to follow his dreams.  How you dreamed about your wife and gave up the chance of a fortune to follow your dreams and meet her.  Okay, over the years, you may have \nembellished the story a little.  All of the people listening have heard the story before as it was your favourite tale from your life.  All of the people except one.  Standing \nat the back of the room, so as not to be observed, a vaguely familiar figure from your past wipes a tear from ${his} eyes.  Finally, after 56 years they could understand why you\nran away.  \n*page_break\nCongratulations!  You didn't win the race, but you solved the mystery of your dreams and found the future love of your life.  Once back home in ${country} you did some research\non the monastery and discovered that the nuns who lived there were once wealthy and had slaves as assistants.  However, a year after the photograph was taken, a new sister \nentered the monastery and reformed the whole convent.  The slaves were given freedom and the choice to leave or stay in the monastery.  You don't know what your dream girl \nchose to do, but you always felt like she left to pursue her own adventure elsewhere.  \n\nDon't feel too bad for your partner, ${partner}.  ${his} life \nactually turned out well in the end.  Maybe not $50,000,000 good, but on ${his} deathbed a full 20 years after you, ${partner} had no complaints.\n*line_break\nTHIS IS ENDING 3 of 4.  DREAM ENDING COMPLETE\n*goto_scene ending\n\n*label one_or_two\n*if mendezscrewed = true\n  *achieve corrupt3\n  Looking over the cliff\n  where the rock was pushed, you see what happened further down the mountain.  One of the Spanish racers was hit by a rock in his leg.  He\n  looks to be in a lot of pain as his partner and your partner ${partner} try to help him.  You go down to them and help the hurt Spaniard,\n  it's Carlos, to his feet.  You then show the photographs to ${partner} and Raul, explaining that it was the ${american} team who started the avalanche.\n  They are both shocked to hear this and both angry as well.  Together, the four of you\n  make your way back down the mountain.  Once down, you contact the organisers of the race as well as the police.  Starting an avalanche is a\n  criminal offence and regardless of Justin and Travis's intentions, they have a lot of questions to answer.  With the walkie talkie in hand, you can link\n  them to Mendez as well.  The corruption in this race will soon be known to the world.\n  *page_break\n  Soon, the police arrive and you are interviewed.  You tell them as much as you can, giving them the walkie talkie and explaining about Mendez's\n  involvement.  The police officer turns on the radio and asks to speak to Andre Mendez.  After a second, Mendez replies, implicating himself in front of the\n  police.  You can't help but smile.  Afterwards, the race organisers call you over and you\n  are interviewed again by a vaguely familiar looking woman.  You are asked many more questions by the organisers than the police and guess\n  that ${partner} must be going through the same interrogation.  Finally, you are released and driven to a hotel in Arequipa.  You are told to\n  wait there alone until further notice.  Several hours pass and you wonder what is happening.  Have the ${american} twins been taken in by\n  the police?  Did they take Mendez in too?  Where is your partner?  How is Carlos, the injured Spanish racer doing?  Finally, there is a knock at the door.\n  It's the same woman who interviewed you.  Wearing a grey suit and her black hair in a bun, she comes across as a business woman.  She tells you that thanks\n  to your work, the race is over.  Mendez is being questioned by the police and the ${american} twins have been arrested.  For a moment, you are confused.\n  Who exactly is this woman?  You were under the impression that she works for Mendez, but now you are not so sure.  Before you can ask, she opens a briefcase\n  in front of you which is filled with money.  \"This is $1million, US.\"  She says.  You should take it now and ask no more questions.  I will arrange the same\n  payment to your partner ${partner}.  Refusing wouldn't be a smart move.\n  Now you are extremely confused.  You incriminated the twins and took down the top dog, Mendez.  So who is this woman?\n  Regardless, it seems you have a choice to make.  Will you take the money?\n\n  THE END\n  \n  CONGRATULATIONS!  THIS IS ENDING 4 of 4.  CONSPIRACY ENDING COMPLETE\n  *page_break Start Again\n  *goto_scene startup\n*else\n  Looking over the cliff\n  where the rock was pushed, you see what happened further down the mountain.  One of the Spanish racers was hit by a rock in his leg.  He\n  looks to be in a lot of pain as his partner and your partner ${partner} try to help him.  You go down to them and help the hurt Spaniard,\n  it's Carlos, to his feet.  You then explain that it was the ${american} team who started the avalanche.\n  They are shocked to hear this and angry as well.  Together, the four of you\n  make your way back down the mountain.  Once down, you contact the organisers of the race as well as the police.  Starting an avalanche is a\n  criminal offence and regardless of Justin and Travis's intentions, they have a lot of questions to answer.  With the walkie talkie in hand, you can link\n  them to Mendez as well.  The corruption in this race will soon be known to the world.\n  *page_break\n  Unfortunately, things don't work out as planned.  While you managed to get the walkie talkie, and link the ${American} Twins to Mendez, you have no evidence that\n  it was the twins who started the avalanche.  You are questioned heavily by the police and for a while, they seem to suspect you of being involved!\n  Eventually, all charges are dropped and you are left free to go.  So are the ${American} brothers.\n  *page_break\n  You are driven to a hotel in Arequipa and told to\n  wait there alone until further notice.  Several hours pass and you wonder what is happening.  Where is your partner?  How is Carlos, the injured Spanish racer doing?  When will \n  the race continue?  Finally, there is a knock at the door and you find out what is happening through a letter.  It's not good news.  \n  *page_break The Bad News\n  Dear ${name},\n  *line_break\n  As you are aware, there has been a major incident during the race which has caused this halt to proceedings.\n  Due to an unforseen accident involving the Spanish team, and disrupting the team from ${country} and the ${American} team, the race has been cancelled.  The\n  race is now three teams short, ruining the order for the race making it foolhardy to proceed.  I apologise for any inconvenience caused and regretfully\n  tell you that you will not be eligible to apply to race again in the future.  I am deeply saddened to hear of this incident and will strive\n  to make sure that nothing like this ever happens again in the future.\n  *line_break\n  You will be flown back to your native country tomorrow.\n  *line_break\n  Yours sincerely,\n  *line_break\n  Andre Mendez\n  *page_break The End\n  The following day you fly home feeling dejected.  It seems your testimony wasn't enough with the police and the twins and Mendez walked free.  If only you\n  had done something different.  Perhaps there was a way to catch them all.  Oh well.  You will never know.\n  *line_break\n  THE END\n  *goto_scene ending\n", "21apuno": "*label PUNOSTART\n*set fd3 \"L, L\"\n*image map5.jpg\nAs the bus meanders in towards Puno, you catch you first glimpses of Lake Titicaca.  Aside from the name, you know little about this famous lake.  You reflect on the morning.\nMeeting the contestants for breakfast.  Listening to Mendez tell you the next two letters in the puzzle: L and L.  Not the most useful.  Speaking to \n*if india>40\n  Pritesh and Kiran about how they have been getting on so far.\n  *goto llletters\n*elseif korea>40\n  Sunny and Sean about their thoughts on the race so far.\n  *goto llletters\n*else\n  *if usa>10 \n    Travis and Justin about what they think will happen today.\n    *goto llletters\n  *else\n    ${partner} about what happened yesterday.\n    *goto llletters\n*label llletters\nAnd of course, half the journey making anagrams.  A...E...I...O...L...L... Not easy.  Soon, around 2:30pm, you\narrive at the lakeside town of Puno.  The bus pulls through the town into the bus station and you step off the bus, starting the next leg of the race.\n*comment cstart variable is initially false.  When true, the challenge has started and the players can search the areas for clues.\n*temp cstart\n*set cstart false\n*comment c1, c2 and c3 are the three challenges.  once all three have been found, you can go to Mendez and give an answer.\n*temp punotime\n*set punotime 0\n*temp clue_3_finished\n*set clue_3_finished true\n*temp c1\n*temp c2\n*temp c3\n*set c1 false\n*set c2 false\n*set c3 false\n*comment a1 and a2 are the answers guessed by the contestants.  If wrong, the contestants will have to spend more time looking again later.\n*temp a1\n*set a1 0\n*temp a2\n*set a2 0\n*temp busymarket\n*set busymarket false\n*temp windypier\n*set windypier false\n*temp oldplace\n*set oldplace false\n*temp int30\n*temp int60\n*set int30 false\n*set int60 false\n*if intelligence>30\n  *set int30 true\n*if intelligence>60\n  *set int60 true\n*comment timedelay means that once all 3 tasks are finished, if you forfeited or cheated, you have to wait before continuing.\n*temp timedelay\n*set timedelay false\n*temp c3s\n*set c3s false\n*temp students\n*set students false\n*temp marketclue\n*set marketclue true\n*temp answer\n*set answer 0\n*temp finishtime\n*temp russianhelp\n*set russianhelp false\n*comment If Koreaalive is true, the Koreans stay in the race!  Russians out this round, then Indians out next round.\n*temp koreaalive\n*set koreaalive false\n*set stamina -10\n*if stamina>60\n  *set stamina -10\n*if stamina\u003c0\n  *set stamina 0\n\n*page_break\n*label busstation\n*if (Cstart)\n  *set punotime +1\n  *page_break\n  You head back to the bus station.  It's not likely that a clue would be hidden here, but who knows right?  What will you do here?\n  *label buschoice\n  *choice\n    *if (clue_3_finished) #Search the area for a clue.\n      *if (c3s)\n        As you look around the bus station, you see an interesting poster.  It reads:  'Welcome to Puno!  The Folklore Capital of Peru!'\n        This is very helpful information!  You decide to go straight back to the pier.\n        *page_break\n        *goto answerfolklore\n      *else\n        You look around the bus station but can't see anything that looks remotely part of the race.  You will have to look elsewhere.\n        What will you do now?\n        *goto buschoice\n    #Go North, uphill, towards the large group of buildings.\n      *goto houses\n    #Go East, towards the market.\n      *goto market\n    #Go South-East, towards the pier.\n      *goto pier\n*else\n  *set punotime +1\n  *page_break\n  From the bus station, you have three paths you can take through the town.  Uphill from here, you can see many buildings, possibly dwellings.  Straight ahead, a main road leads \n  towards what you guess is the busy part of town.  Most people are walking that way.  To your right, there is another path with a strong breeze coming towards you.  \n  *line_break\n  *line_break\n  *if partner = \"Leonie\"\n    \"I think we should go north.  Just a hunch.\"  Suggests Leonie, shrugging her shoulders.\n  *if partner = \"Dan\"\n    \"Let's go towards that breeze.  there's got to be something there, right?\"  Says Dan, with a grin.\n  *if partner = \"April\"\n    \"Let's go east.  If there are lots of people it has to be a busy area.  Surely we should go that way.\"  Says April, a look of deep thought on her face.\n  Which will you choose?\n  *choice\n    #Go North, uphill, towards the large group of buildings.\n      *goto houses\n    #Go East, following the flow of people.\n      *goto market\n    #Go South-East, where the breeze is coming from.\n      *goto pier\n\n*label houses\n*if (cstart)\n  *set punotime +1\n  *page_break\n  You move into an area full of residential houses.  In neat rows going uphill, the grey-brick houses form several crossroads.  The area is quiet and not much seems to be \n  happening here.  The large and modern square where Mendez is waiting is to the East.  The bus station is to the South.  What will you do?\n  *choice\n    #Search the area for clues.\n      *set punotime +2\n      You run up one street, looking down each side street as you go.  There are few people here and aside from one or two small shops, the area has nothing but houses.\n      You haven't done a thorough search, but are quite sure that the clues are not going to be here.  Will you look in more detail?\n      *choice\n        #Yes, I'll check the shops.\n          *set punotime +2\n          A laundry room, barber shop, opticians.  Simple local stores with no connection to the race.  After a long search, ${partner} suggests that you move to another area.\n          It's a good suggestion.\n          Where will you go?\n          *choice\n            #Go East, to the square. \n              *goto square\n            #Go South, to the bus station.\n              *goto busstation\n        #No, I'll go somewhere else.\n          Where will you go?\n          *choice\n            #Go East, to the square. \n              *goto square\n            #Go South, to the bus station.\n              *goto busstation\n    #Go East, to the square. \n      *goto square\n    #Go South, to the bus station.\n      *goto busstation\n*else\n  *set punotime +1\n  *page_break\n  You move into an area full of residential houses.  In neat rows going uphill, the grey-brick houses form several crossroads.  The area is quiet and not much seems to be \n  happening here.  There is a large and modern square to the East.  The bus station is to the South.  What will you do?\n  *choice\n    #Go East \n      *goto square\n    #Go South\n      *goto busstation\n\n*label market\n*if (russianhelp)\n  *page_break\n  The Russians lead you back to the market and take you straight to the Mendez sign.\n  \"Here we go.\"  Says Alina, becoming more confident as you get to know them more.\n  You are stood in front of a man with 6 sacks.  One of the sacks has been opened already.\n  *goto chilitime\n*if (cstart)\n  *set punotime +1\n  *page_break\n  *if (busymarket)\n    You head back to the busy market.  With so many different sights, smells, and sounds, the place is intriguing.  What will you do?\n    *goto marketchoice\n  *else\n    *set punotime +1\n    *set busymarket true\n    The market area comprises of several roads connected with many market stalls dotted along them.  Various produce is available in a wide variety of exotic smells.  \n    Fresh fish dominate one area.  Spices in straw buckets spill out onto the roads.  Unusual fruits and vegetables give colour to the dusty area, and familiar green roots are\n    for sale by the bucketload.  This is also a very popular area as it's hard to move for people.  Driving here would be almost impossible, although many people are trying.\n    From the centre of the market, you have four directions to follow.  North leads to a modern square.  East goes towards some old looking buildings,  South takes you towards \n    the lake.  West will take you back to the bus station.  Where will you go?\n    *label marketchoice\n    *choice\n      *if (marketclue) #Search the market for a clue.\n        *set marketclue false\n        *set c2 true\n        Together, you and ${partner} search through the various market stalls for something related to the race.  Soon, ${partner} spots the Mendez sign and you find yourself\n        stood in front of a man with 6 huge sacks of chilis!\n        *if punotime \u003c6\n          None of the sacks have been disturbed, so it would seem you are the first team here!\n          *goto chilitime\n        *elseif punotime =6\n          The ${american}, Travis and Justin are already here, digging through one of the large burlap sacks.\n          *goto chilitime\n        *else\n          Some of the sacks have been split open and spilt onto the road.\n          *label chilitime\n          The man tells you your task.\n          \"Choose a sack and find the plastic chili.  Then, you will find your next clue.\"  The man's English is excellent and you are certain he's not one of the local people.  Many of whom\n          are staring at you and ${partner}.  You choose a burlap sack of chilis and... Well... It's a bag of chilis.  How do you want to do this?\n          *choice\n            #This isn't complicated.  We'll just dive straight in.\n              You start grabbing handfuls of chilis and looking them over.\n              *set punotime +5\n              It takes a while, but eventually, you find one red chili that is different to the others.  It's a little larger and made of plastic.\n              *if (russianhelp)\n                *set russianhelp false\n                You shout to Alina and Viacheslav, telling them how you found the chili.  They wish you luck and tell you to go.  You thank them for their help.\n                *goto chiliread\n              *else\n                *goto chiliread\n            *selectable_if (int30) #We'll come up with a system.\n              What is your system?\n              *choice\n                #I'll throw chilis from the bag to the floor slowly and ${partner} will check for the plastic one.\n                  *set punotime +6\n                  Grabbing handfuls of chilis at a time, you throw them to the floor.  ${partner} scrutinizes the chilis, looking for anything unusual.  As more and more time\n                  passes you wonder if you have made a mistake.  Maybe not every bag has a chili clue.  Maybe they just forgot to put one in your bag.  Maybe...\n                  \"Wait!\"  Shouts ${partner}.  \"I got it!\"  \n                  *if partner = \"Dan\"\n                    He holds up an odd looking chili that is made of plastic.\n                    *if (russianhelp)\n                      *set russianhelp false\n                      You shout to Alina and Viacheslav, telling them how you found the chili.  They wish you luck and tell you to go.  You thank them for their help.\n                      *goto chiliread\n                    *else\n                      *goto chiliread\n                  *else\n                    she holds up an odd looking chili that is made of plastic.\n                    *if (russianhelp)\n                      *set russianhelp false\n                      You shout to Alina and Viacheslav, telling them how you found the chili.  They wish you luck and tell you to go.  You thank them for their help.\n                      *goto chiliread\n                    *else\n                      *goto chiliread\n                #We'll empty the bag onto the floor and throw the chilis back into it, checking as we go.\n                  *set punotime +1\n                  *if luck > 40\n                    No sooner have you spilled the chilis on the ground when ${partner} shouts out in success.  One chili is a little larger, rounder, and brighter than all \n                    the others.  You have found the chili clue already!\n                    *if (russianhelp)\n                      *set russianhelp false\n                      You shout to Alina and Viacheslav, telling them how you found the chili.  They wish you luck and tell you to go.  You thank them for their help.\n                      *goto chiliread\n                    *else\n                      *label chiliread\n                      You open the chili and inside is a piece of paper with a simple instruction.       \n\n                      CLUE 2.  YOUR FIRST NUMBER IS:  THE EIGHTH PRIME NUMBER \n  \n                      *if partner = \"April\"\n                        \"Two, three, five... Seven...\"  Says April.  \"Nine?  No that's not prime.  Eleven... Thirteen?  It's getting harder...\"\n                        Can you help April?  What is the eighth prime number?\n                        *choice\n                          #8\n                            \"Don't be silly.\"  Says April.  \"Eight isn't prime.  I'll work it out on my own.\"  After a few moments of silence, she exclaims. \"Nineteen!\"\n                            *set a1 19\n                            *goto interim\n                          #17\n                            \"Is it?\"  Asks April.  How sure are you?\n                            *choice\n                              #100 percent.  It's 17.\n                                *set a1 17\n                                April looks a little disappointed, but accepts your final word.\n                                *goto interim\n                              #Maybe I'm wrong...\n n                                    April looks a little disappointed, but accepts your final word.\n                                    *goto interim\n                                  #19.  April is right.\n                                    *set a1 19\n                                    April looks pleased that she helped you work out the answer.  Actually, she did all the work, didn't she?\n                                    *goto interim\n                      *elseif partner = \"Dan\"\n                        \"This is all you dude.\"  Says Dan.  \"I have no idea about numbers and stuff.\"  You read the clue again.  \n                        THE EIGHTH PRIME NUMBER\n                        What do you think the answer is (enter your answer as a number into the box.  E.g. 99):\n                        *input_text a1\n                        *goto interim\n                      *else\n                        \"Prime numbers are those funny numbers, aren't they?  Odd numbers... But not 9 because it divides... by 3...  So what are the prime numbers then?\"\n                        Leonie seems to know what she's talking about, but she can't help you much more.  She will go with whatever number you decide upon.\n                        Enter your answer into the box below. (Put it as a number.  E.g. 99)\n                        *input_text a1\n                        *label interim\n                        You choose the number ${a1}, not 100% sure if it's right or not.  What now?\n                        *goto marketchoice  \n\n                  *else\n                    *set punotime +3\n                    You empty the sack and start sifting through the chilis, looking for one that is different somehow.\n                    It doesn't take too long before ${partner} shouts an unusual excited sound.  \"I got it!\"\n                    *if partner = \"Dan\"\n                      he says.  You drop the chilis you were looking through.\n l you to go.  You thank them for their help.\n                      *goto chiliread\n                    *else\n                      *goto chiliread\n      #North, to the square.\n        *goto square\n      #East, to the old area.\n        *goto old\n      #South, to the lake.\n        *goto pier\n      #West, to the bus station.\n        *goto busstation\n*else\n  *set punotime +1\n  *page_break\n  *set busymarket true\n  The market area comprises of several roads connected with many market stalls dotted along them.  Various produce is available in a wide variety of exotic smells.\n  Fresh fish dominate one area.  Spices in straw buckets spill out onto the roads.  Unusual fruits and vegetables give colour to the dusty area, and familiar green roots are\n  for sale by the bucketload.  This is also a very popular area as it's hard to move for people.  Driving here would be almost impossible, although many people are trying.\n  From the centre of the market, you have four directions to follow.  North leads to a modern square.  East goes towards some old looking buildings,  South takes you towards \n  the lake.  West will take you back to the bus station.  Where will you go?\n  *Choice\n    #North, to the square.\n      *goto square\n    #East, to the old area.\n      *goto old\n    #South, to the lake.\n      *goto pier\n    #West, to the bus station.\n      *goto busstation\n\n*label pier\n\n*if (c3s)\n  *if c3 = \"false\"\n    *if punotime>15\n      *goto student1\n*if (c3)\n  *set students false\n*if (cstart)\n  *set punotime +1\n  *page_break\n  *if (windypier)\n    You head back to the pier area.  A few more people are here than before. \n    *if (students) \n      A group of students are walking towards you.  They could be the people to ask!\n    What will you do?\n    *goto pierchoice\n  *else\n    *set windypier true\n    After a few minutes walking, you reach a pier overlooking Lake Titicaca.  From the pier, you can see an industrial area to the left.  To the right, the lake stretches away \n    into the distance.  There are a few benches dotted about the pier itself.  Not many people are here and there is a slight chill in the air.  From here, you can go back to \n    the bus station, or you can walk to a market area, not too far away.  What will you do?\n    *label pierchoice\n    *choice\n      *if c3s = false\n        #Search the area for a clue.\n          *set c3s true\n          *set students true\n          You look around the pier area but can't see any obvious signs.  Then ${partner} spots something at the end of the pier.  You head towards it and ${partner} was right.\n          There is a small Mendez sign at the end of the pier.  You reach the sign but can't see a clue or anyone to give it to you.  Then, ${partner} again spots what you didn't.\n          \"Look at the water!\"\n          *if partner = \"Dan\"\n            he\n            *goto pierclue\n          *else\n            she\n            *label pierclue\n            says.  Out on an odd-looking boat next to the pier is a man holding many envelopes in a fan.  You wave to him and he moves towards you.  You reach out to take one\n            of the envelopes but he holds them back.  \"Answer my question first!\"  He says.\n\n            \"HOW IS PUNO THE CAPITAL OF PERU?\"\n \n            What an odd question.  \n            *if partner = \"Dan\"\n              \"Err.. it's not?\"  Says Dan.  You're going to have to do some research.  But how?\n              *goto student1\n            *elseif partner = \"Leonie\"\n              \"We're going to have to do some research.\"  Says Leonie.  But how?\n              *goto student1\n            *else\n              \"Both have a capital P?\"  Jokes April.  This is a tough one.  You're going to have to do some research.  But how?\n              *goto student1\n      *if (students)  #Talk to the group of students.\n        You walk to the group of students on the pier.\n        *goto student2\n      #Go North-West to the bus station.\n        *goto busstation\n      #Go North to the marketplace.\n        *goto market\n  \n*else\n  *set punotime +1\n  *page_break\n  *set windypier true\n  After a few minutes walking, you reach a pier overlooking Lake Titicaca.  From the pier, you can see an industrial area to the left.  To the right, the lake stretches away \n  into the distance.  There are a few benches dotted about the pier itself.  Not many people are here and there is a slight chill in the air.  From here, you can go back to \n  the bus station, or you can walk to a market area, not too far away.  What will you do?\n  *choice\n    #Go North-West to the bus station.\n      *goto busstation\n    #Go North to the marketplace.\n      *goto market\n\n*label student1\n*If punotime>15\n  *set punotime +1\n  You see some students walking along the pier.  \n  *label student2\n  Perhaps they can help you.  As you approach, they notice you and ${partner} and smile.  They move towards you as well.  \n  \"Hi, can we talk?\"  Says a ${boygirl}, maybe 19 or 20 years old with short black hair and a round face.  It seems that the students want to interview you.  What do you do?\n  *choice\n    #Say yes, but only if they can help you too.\n      *label questions\n      *set punotime +2\n      *temp q1\n      *temp q2\n      *temp q3\n      *temp q4\n      *temp q5\n      The students seem very happy.  It seems they have a homework assignment where they have to interview a foreigner asking them questions about Puno.\n      They start.\n      \"What is your name?\"\n      You say:\n      *input_text q1\n      \"Great!  ${q1}.  Nice name.  Now, where are you from?\"  The ${boygirl} with the round face continues.\n      *input_text q2\n      \"Wow, ${q2}?  That's great!  Okay, ${q1}, Now what is your job?\"\n      You say you are a:\n      *input_text q3\n      \"Right, so you're a ${q3}.  Next question.  Why did you come to Peru?\"\n      You tell them you came to Peru...(finish the sentence).\n      *input_text q4\n      \"Wow, that's so cool!\"  Says another student, a pretty girl with her hair in a pony tail and red cheeks.\n      The main ${boygirl} continues with the questions.\n      \"Last question.  What is the best thing in Peru?\"\n      *input_text q5\n      *if q5=\"you\"\n        \"Me?  Really?  Wow, I'm so flattered!\"  Says the ${boygirl}  I like people from ${q2}.  I want to go there someday.  Now, how can we help you?\"\n        *goto helptime\n      *elseif q5=\"cuy\"\n        \"Really?  I didn't think foreign people liked cuy.  It's guinea pig in English.  Anyway, how can we help you?\"\n        *goto helptime\n      *else\n        *if q5=\"the race\"\n          \"Well, yes, it is great!  The chance to win $50 million is amazing!  Will you give us some money if you win?!  Haha!\"  The ${boygirl} smiles.  \"Anyway, how can we help you?\n          *goto helptime\n        *elseif q5=\"your friend\"\n          \"Hehe.  Do you mean Mayda?  She is very pretty.\"  Both you and the ${boygirl} look at the girl with a ponytail, Mayda.  She blushes and covers her face.\n          \"Anyway, how can we help you?\"  Asks the round faced ${boygirl}.\n          *goto helptime\n        *else\n          *if q5=\"You\"\n            \"Me?  Really?  Wow, I'm so flattered!\"  Says the ${boygirl}  I like people from ${q2}.  I want to go there someday.  Now, how can we help you?\"\n            *goto helptime\n          *elseif q5=\"Cuy\"\n            \"Really?  I didn't think foreign people liked cuy.  It's guinea pig in English.  Anyway, how can we help you?\"\n            *goto helptime\n          *else\n            *if q5=\"The race\"\n              \"Well, yes, it is great!  The chance to win $50 million is amazing!  Will you give us some money if you win?!  Haha!\"  The ${boygirl} smiles.  \"Anyway, how can we help you?\n              *goto helptime\n            *elseif q5=\"Your friend\"\n              \"Hehe.  Do you mean Mayda?  She is very pretty.\"  Both you and the ${boygirl} look at the girl with a ponytail, Mayda.  She blushes and covers her face.\n              \"Anyway, how can we help you?\"  Asks the round faced ${boygirl}.\n              *goto helptime\n            *else\n              \"Haha, I like that too.\"  Says the round-faced ${boygirl}.  \"Anyway, how can we help you?\"\n              *label helptime\n              You ask the riddle to the students.  How is Puno the capital of Peru.  They think for a moment.  Then, after a short while, the shortest of the students, a boy with \n              overly long hair, tells you he knows the answer.  \n              \"It's the capital of.. ffuk...\"\n              Stunned, you wonder if you just heard him correctly.  Thankfully, he continues, correcting himself.\n              \"The capital of folklore!\"  That makes sense and it answers the question nicely.  You thank the students profusely and head back to the end of the pier.\n              *page_break\n              *goto answerfolklore\n          *label answerfolklore\n          You approach the man on his boat again.  He smiles when he sees you.\n          \"Do you have an answer?\"  He asks.\n          \"Yes, it's the folklore capital of Peru!\" Says ${partner} in a strong, clear (and excited) voice.\n          \"Correct!\"  Says the man with a beaming smile.  He reaches forward and offers you one of the envelopes from his hand.\n          *if punotime>15\n            You notice that a few of the envelopes have already gone.\n          *set c3 true\n          *set clue_3_finished false\n          Together, you and ${partner} return to the pier to open the envelope:\n \n          CLUE 3.  IMAGINE YOU HAVE 27 SUGAR CUBES ARRANGED INTO A LARGER CUBE, EACH SIDE 3 CUBES HIGH, WIDE, OR DEEP.  WHAT IS THE MAXIMUM NUMBER OF SUGAR CUBES YOU CAN SEE\n          AT ANY ONE TIME?  NO MIRRORS ALLOWED!  YOUR ANSWER IS THE SECOND NUMBER.\n          \n          Together, you and ${partner} try to imagine this.\n          *if partner = \"Dan\"\n            \"Do we have to eat the cubes?\"  Says Dan.  Not very helpful.  You will have to answer this one without his help.\n            What is your answer?\n            *input_text a2\n            Perhaps you are right.  What will you do now?\n            *choice\n              #Go North, to the market.\n                *goto market\n              #Go North-West, back towards the bus station.\n                *goto busstation\n          *elseif partner = \"April\"\n            \"Ah, so it would look like a Rubiks cube!  A big cube where every side is made from 9 smaller cubes.  We could see a maximum of three sides, so... how many different cubes could we see?\"\n            *choice\n              #9 squares.\n                \"It's more than that.\"  Says April.  Do you let her answer instead or stick with 9?\n                *choice\n                  #Let April answer.\n                    *set a2 19\n                    \"I think it's 19.\"  She says.  You are not convinced, but go with it anyway.  She is smart, after all!\n                    *label 19choice\n                    What will you do now?\n                    *choice\n                      #Go North, to the market.\n                        *goto market\n                      #Go North-West, back towards the bus station.\n                        *goto busstation                     \n                  #Stick with 9.\n                    *set a2 9\n                    You tell April that you will go with your guess.  She reluctantly agrees.\n                    *goto 19choice\n              #18 squares.\n                \"It's more than that, I think.\"  Says April.  Do you let her answer instead or stick with 18?\n                *choice\n                  #Let April answer.\n                    *set a2 19\n                    \"I think it's 19.\"  She says.  You are not convinced, but go with it anyway.  She is smart, after all!\n                    What will you do now?\n                    *choice\n                      #Go North, to the market.\n                        *goto market\n                      #Go North-West, back towards the bus station.\n                        *goto busstation                     \n                  #Stick with 18.\n                    *set a2 18\n                    You tell April that you will go with your guess.  She reluctantly agrees.\n                    *goto 19choice\n              #27 squares.\n                \"It's less than that.\"  Says April.  Do you let her answer instead or stick with 27?\n                *choice\n                  #Let April answer.\n                    *set a2 19\n                    \"I think it's 19.\"  She says.  You are not convinced, but go with it anyway.  She is smart, after all!\n                    What will you do now?\n                    *choice\n                      #Go North, to the market.\n                        *goto market\n                      #Go North-West, back towards the bus station.\n                        *goto busstation                     \n                  #Stick with 27.\n                    *set a2 27\n                    You tell April that you will go with your guess.  She reluctantly agrees.\n                    *goto 19choice\n              #24 squares.\n                \"It's less than that.\"  Says April.  Do you let her answer instead or stick with 24?\n                *choice\n                  #Let April answer.\n                    *set a2 19\n                    \"I think it's 19.\"  She says.  You are not convinced, but go with it anyway.  She is smart, after all!\n                    What will you do now?\n                    *choice\n                      #Go North, to the market.\n                        *goto market\n                      #Go North-West, back towards the bus station.\n                        *goto busstation                     \n                  #Stick with 24.\n
