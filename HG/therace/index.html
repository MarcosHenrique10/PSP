                           *else\n                                    Leonie is stunned to silence.\n                                    *if boygirl = \"boy\"\n                                      \"You stupid bastard.\"  She says, tears welling up in her eyes.  She fights to hold them back.  \"This is my one...  In your life...\"  She\n                                      struggles for the right words to say.  You listen, frozen in the moment.  \"$50,000,000.\"  She exclaims.  \"This is the only chance and I'm\n                                      not going to have a guy you ruin it for me.\"  She wipes the tears from her eyes that found a way through.  She is more composed now.  \"Shut up\n                                      about the silly ${american} and whatever you think they did.\"  Travis looks to say something but thinks better of it.  \"If that other team were\n                                      silly enough to listen then that's their mistake.\"  Leonie continues.  \"Right now, WE are racing and you've just made us the worst team\n                                      here.  I...\"  She struggles again.  A deep sigh.  \"I will not quit.  So we are going to do this thing together.\"  She slams her hand\n                                      down on the table.  You are now expected to say something.  What do you say?\n                                      *goto talktoleonie\n                                    *else\n                                      \"You stupid bitch!\"  She says, tears welling up in her eyes.  She fights to hold them back.  \"This is my one...  In your life...\"  She\n                                      struggles for the right words to say.  You listen, frozen in the moment.  \"$50,000,000.\"  She exclaims.  \"This is the only chance and I'm\n                                      not going to have some woman like you ruin it for me.\"  She wipes the tears from her eyes that found a way through.  She is more composed now.  \"Shut up\n                                      about the silly ${american} and whatever you think they did.\"  Travis looks to say something but thinks better of it.  \"If that other team were\n                                      silly enough to listen then that's their mistake.\"  Leonie continues.  \"Right now, WE are racing and you've just made us the worst team\n                                      here.  I...\"  She struggles again.  A deep sigh.  \"I will not quit.  So we are going to do this thing together.\"  She slams her hand\n                                      down on the table.  You are now expected to say something.  What do you say?\n                                      *label talktoleonie\n                                      *choice\n                                        #Apologise profusely.\n                                          You apologise as sincerely as you can to both Leonie and the ${american} twins.  While you still feel that you are right, you know that you\n                                          have to back down now.  Besides, Leonie is right.  This is the only chance you will ever get to win an amount of money like this.  You\n                                          don't want to waste it.  Soon, the mood relaxes and everyone goes back to their meals.  (LEADERSHIP -5) (CHARISMA -5)\n                                          *goto nazcabegin\n                                        *if boygirl = \"boy\"\n                                          #Lighten the mood with a joke.\n                                            \"You stupid bastard.\"  She says, tears welling up in her eyes.  She fights to hold them back.  \"This is my one...  In your life...\"  She\n                                            struggles for the right words to say.  You listen, frozen in the moment.  \"$50,000,000.\"  She exclaims.  \"This is the only chance and I'm\n                                            not going to have a guy you ruin it for me.\"  She wipes the tears from her eyes that found a way through.  She is more composed now.  \"Shut up\n                                            about the silly ${american} and whatever you think they did.\"  Travis looks to say something but thinks better of it.  \"If that other team were\n                                            silly enough to listen then that's their mistake.\"  Leonie continues.  \"Right now, WE are racing and you've just made us the worst team\n                                            here.  I...\"  She struggles again.  A deep sigh.  \"I will not quit.  So we are going to do this thing together.\"  She slams her hand\n                                            down on the table.  You are now expected to say something.      \n\n                                            What will you say?\n                                            *choice\n                                              #\"Women from ${country}.  Never mess with them!\"\n                                                *goto charismacheck\n                                              #\"That's what she said.\"\n                                                *goto charismacheck\n                                              #\"Damn, you're hot when you get angry!\"\n                                                *goto charismacheck\n                                              *If joke =2\n                                                #\"Three people were driving through the desert when their car broke down...\"\n                                                  *label charismacheck\n                                                  *if charisma >40\n                                                    *achieve joker\n                                                    With perfect comic timing and a great delivery, every starts laughing at your wit.  The mood has changed in an instant and you take advantage, inviting everyone\n                                                    to sit and eat.  (CHARISMA +5)\n                                                    *goto nazcabegin\n                                                  *else\n                                                    The room is silent.  It seems not many people here have a sense of humour.  You slouch down into your seat leaving Leonie\n                                                    standing in a ceremonious victory over you.  Eventually she breaks the mood and tells everyone to go back to their meals.  You\n                                                    have lost a lot of confidence and your leadership skills have received heavy criticism.  (LEADERSHIP - 15) (CHARISMA - 10)\n                                                    *goto nazcabegin\n                                        #Tell her she doesn't know what she's talking about.\n                                          You start to tell Leonie that she's wrong and that the ${american} ARE corrupt, when she slaps you across the face.  For a second,\n                                          everything is still.  Then, without a pause in between, you and Leonie are at each other's throats.  She pulls at your hair with a\n                                          strong grip causing you a lot of pain.  In retaliation, you push and poke at her face, trying to hit her eyes.  The ${american} move\n                                          aside as the fight becomes more serious.  You hit at her stomach causing her to release your hair, then you kick at her but miss,\n                                          giving her the chance to react.  She grabs your leg and, using your table for leverage, she forces your leg down the wrong way,\n                                          causing you to do the only thing you can and twist your body to adjust.  You now have your back to Leonie.  A fatal mistake as she\n                                          raises a fork from the table and stabs it into your back, just a few inches below your neck.  The room gasps in one collective breath.\n                                          You turn, slowly, to face your new enemy.  You try to reach up to her but struggle.  Your left arm won't respond.  In fact, your whole\n                                          body feels wrong... spongy... tingly... You stumble, catching yourself on the table edge with your right arm.  Then you collapse to\n                                          the floor completely.\n                                          *page_break\n                                          Leonie didn't kill you, but she permanently damaged your spinal cord.  Your race ends here with medics coming to treat you as the\n                                          various contestants from the race stand over you.  \n                                          \n                                          While this path didn't work out for you there's no reason why you can't try again.  Perhaps taking a different fork, if you'll excuse\n                                          the pun, will take you through the race in a better way.\n                                          *goto_scene ending\n                                #I'll confront Mendez.\n                                  You look around the room for the indomitable creator of THE RACE but he is nowhere to be seen.  It's probably just as well as the few\n                                  minutes you spend looking for him give you enough time to think about what you would say.  And that's just it.  What would you say?  While\n                                  you are certain that Mendez and the ${american} are working together, you have no physical evidence and it would just be your word against\n                                  theirs.  You're going to need some evidence before you can act.  You decide to instead watch the ${american} brothers.  You will follow the closely and\n                                  try to catch them in the act.\n                                  *set truth 100\n                                  *goto nazcabegin\n                                #I'll watch the ${american} team.\n                                  A good idea.  If the ${americans} are cheating, then you just need to catch them at it.  You decide to follow them as closely as you can while\n                                  still running the race.\n                                  *set truth 100\n                                  *goto nazcabegin\n                            #Who knows?  Who cares?  As long as I can still play and win this race, it doesn't matter!\n                              That's right, it doesn't matter.  You're not here to uncover conspiracies, but you're here to race!\n                              *goto nazcabegin\n                        *else\n                          That doesn't sound right.  Oh well, Who knows?  Who cares?  As long as I can still play and win this race, it doesn't matter!\n                          *label nazcabegin\n                          *page_break\n                          The food soon arrives and you enjoy the meal.\n                          *label nazcabegin2\n                          The frantic day's journey has taken it's toll and you are relieved for the break.   \n                          As you finish your last mouthful, almost on cue Mendez appears to greet you all.\n                          \"Congratulations everybody!  It's been a long day but you all got through it!\"  Mendez seems even happier than usual, if that's possible.\n                          *if position =1\n                            \"A special congratulations to the team from ${country}!  Winners from the first leg of the race!\"\n                            The other players look at you and ${partner} with jealous smiles as they applaud your achievement.\n                            *goto nazcarace\n                          *else\n                            \"A special congratulations to the Spanish team!  Winners from the first leg of the race!\"\n                            You applaud the Spanish winners and feel a little overwhelmed by their superiority.  What is it they say?  Fear the unknown?  The Spanish are\n                            certainly that as you know nothing about them.\n                            *label nazcarace\n                            *page_break\n                            \"Now, for this next leg, I hope none of you are afraid of heights!\"  Mendez continues.  \"You will each take a helicopter and fly over the Nazca\n                            lines.  You've heard of them, no?\"  A pause.  \"They are the famous lines drawn around 1,500 years ago by the Nazca people.  The great mystery is\n                            how they were made and why.  They can only be seen from the air, which, 1,500 years ago was pretty hard to do!\"  Mendez smirks at his own joke.\n                            Some of the contestants join in.  \"Now, as you fly you will need to keep your eyes open.  You are looking for the clue which will tell you where\n                            to go next.  Once you see it, you will know.  You can then tell your helicopter pilot to land and carry on with your journey.\"  The Indian father,\n                            Pritesh raises his hand.\n                            *line_break\n                            \"Err... yes?\"  Says Mendez, clearly not prepared to be fielding questions.\n                            \"Do we land at the Nazca lines or go back to Nazca?\"  Asks Pritesh.\n                            \"Well that's entirely up to... well.  Okay, no.  You go back to Nazca.  Go to Nazca and carry on from there.\"\n                            *page_break\n                            More hands go up.\n                            \"Er.. Patience, patience.  I will field questions a little later.  For now, let me continue.  There's lots to discuss, eh?\"  Says Mendez in a loud\n                            voice as if calming a crowd a thousand strong.\n                            \"Now where was I... Ah, yes.  The clues for this round.  The next two letters of your final destination are: O and E.\"\n                            *page_break\n                            *set fd2 \"E, O\"\n                            You now have four of the 10 letters, but little clue as to your final destination.  All four letters are vowels: A, E, I and O.  ${partner} has a\n                            deep look of thought on \n                            *if partner = \"Dan\"\n                              his\n                              *goto heshe1\n                            *else\n                              her\n                              *label heshe1\n                              face.\n                              *line_break\n                              Mendez continues his talk.  \"So there are eight teams left now and one more will fall away after this leg.  When I next see you there will be\n                              just seven teams left!  Exciting, no?\"\n                              The crowd are silent at the thought that they could soon be out of the race.  Mendez presses on.\n                              *if position = 1\n                                \"Now as the team from ${country} won the first leg, they will get to take the first helicopter.\n                                Followed by the Spanish, then the ${american}, and so on.\"\n                                *goto nazcanightbefore\n                              *else\n                                \"Now as the team from Spain won the first leg, they will get to take the first helicopter.  Followed by the \n                                *if position = 2\n                                  team from ${country}, then the ${american}, and so on.\"\n                                  *goto nazcanightbefore\n                                *elseif position = 3\n                                  ${american}, then the team from ${country}, and so on.\"\n                                  *goto nazcanightbefore\n                                *else\n                                  ${american}, then the Indians, and so on.\"\n                                  *goto nazcanightbefore\n                  #Also stop the Russians.\n                    *goto wrong\n                  #Kill the Carmens!\n                    *goto wrong\n                  #Take the Carmens to a nice restaurant.\n                    *goto wrong\n          *else\n            You talk more to the twins and learn more about them.  They are brothers and were introduced by Mendez as special twins.  The reason why is that they are both\n            famous Nascar drivers.  Although you had heard their names before the race, you weren't familiar with them.  The taller of the fraternal twins, Travis, also comes\n            across as the smarter twin.  He is clearly the leader in their team.  The conversation you share with them is pleasant and together you enjoy a nice meal.\n            *set usa 20\n            *page_break\n            *goto nazcabegin2\n        *else\n          *if truth =4\n            You realise that you haven't yet had the chance to talk to the ${american} so you take it.  They are brothers and were introduced by Mendez as special twins.  The\n            reason why is that they are both famous Nascar drivers.  Although you had heard their names before the race, you weren't familiar with them.  The taller of the\n            fraternal twins, Travis, also comes across as the smarter twin.  He is clearly the leader in their team.  For some reason, you are sure you have talked or heard\n            Travis before.  Where?\n            *choice\n              #I think I heard him at the hotel in Lima.\n                That sounds right.  But where?\n                *choice\n                  #By the swimming pool.\n                    That doesn't sound right.  Oh well.  Can't be that important!\n                    *set usa 20\n                    *goto nazcabegin\n                  #In the Banquet Hall.\n                    That doesn't sound right.  Oh well.  Can't be that important!\n                    *set usa 20\n                    *goto nazcabegin\n                  #In the bar on an upper floor.\n                    Yes! That's it! You were standing outside a bar when you heard him talking!\n                    *goto rememberit\n                  #In the English restaurant.\n                    That doesn't sound right.  Oh well.  Can't be that important!\n                    *set usa 20\n                    *goto nazcabegin\n              #Wasn't he at the airport in Lima?  The day I arrived?\n                Perhaps.  Oh well, it can't have been that important, right?\n                *set usa 20\n                *goto nazcabegin\n              #On TV.  He's a famous star.\n                Yeah... that's probably it.\n                *set usa 20\n                *goto nazcabegin\n          *else  \n            You realise that you haven't yet had the chance to talk to the ${american} so you take it.\n            They are brothers and were introduced by Mendez as special twins.  The reason why is that they are both famous Nascar drivers.  Although you had heard their names\n            before the race, you weren't familiar with them.  The taller of the fraternal twins, Travis, also comes across as the smarter twin.  He is clearly the leader in\n            their team.  The conversation you share with them is pleasant and together you enjoy a nice meal.\n            *set usa 20\n            *page_break\n            *goto nazcabegin2\n      #The Russian couple\n        *set russia 20\n        You realise that this is the first chance you have had to speak to the Russians so you take it. You introduce yourself and speak to Viacheslav and Alina about their\n        experiences on the race so far. The conversation is slow and Alina says very little because of her poor English. Viacheslav speaks better, but his accent is strong\n        and there are many misunderstandings in what he is trying to say. After talking for a while you learn that Viacheslav is an engineer from Yekaterinburg while Alina is\n        a dance teacher. They met at the dance club where Viacheslav was called in to fix a lighting problem.\n        *line_break\n        *line_break\n        \"Electric sparks fly!\"  Says Viacheslav.  \"We many love fast.  Now... we race fast.\"  He says with a smile.\n        They finished in \n        *if position =6\n          5th\n          *goto russiacontinue\n        *else\n          6th\n          *label russiacontinue\n          place in the first leg of the race.  Despite the slow conversation, they warm to you and ${partner}.\n          *goto nazcabegin\n\n*label nazcanightbefore\nThere are only 4 helicopters, so those at the back will have to wait before they can have a go.  You see?  There is a reason to win each leg, no?\"  Mendez laughs again at his\nattempted humour.\n\"Alright everyone, I'll stop yabbering on.  You should all get a good night's rest before tomorrow's race.  It's going to be a long journey!\"\nWith that, Mendez is quickly up and out before anyone can ask him questions.  So much for Q&A.\nMost of the teams stand to leave, most likely to get as much rest as possible before tomorrow's leg begins.  Your partner, ${partner} also says goodnight.  What would you like to do now?\n*choice\n  #Go to bed.\n    *label sleeptime\n    You head to your room.  \n    *if dream >1\n      You anxiously wonder if you will dream about the girl again.  You want to and are eager to get to sleep. Besides, it's been a long day.  Sleep will be welcome!\n      *goto minidream\n    *else\n      It's been a long day and tomorrow will be the same.  A good night's sleep is certainly welcome!\n      *goto nazcaflighttime\n  #Go for a drink.\n    Who will you drink with?\n    *temp oz\n    *set oz true\n    *temp ind\n    *set ind true\n    *label drinkchoice\n    *choice\n      *if korea > 40\n        #The Koreans, Sunny and Sean\n          You ask the Koreans if they would like to join you for a drink and they agree.  You find a bar close to the hotel and \n          *if boygirl = \"girl\"\n            share a bottle of white wine.  \n            *goto koreatalk\n          *else\n            everyone orders a beer.  You like these Koreans!\n            *label koreatalk\n            The conversation is difficult as both Sean and Sunny have limited English and you speak no Korean!  As the alcohol flows, though, you all loosen up.  The Koreans\n            try to teach you some Korean.\n            \"Anyonghaseyo\"  Says Sean.\n            \"Anyanghoseo\" You reply.  It's not easy!\n            \"Junen ${name} Imnida.\"  Sean continues.\n            \"Junan ${name} Imada.\"  You say.  Sunny laughs at your bad pronunciation.\n            The evening is enjoyable despite the bad Korean, and you improve your relationship with this team.\n            Eventually, you say goodnight and head back to your room.  \n            *set Korea + 15\n            *goto nazcanightnight\n      *if (ind)\n        *if india > 40\n          #The Indians, Pritesh and Kiran\n            *if boygirl = \"girl\"\n              \"Sorry, we are tired.\"  Says Pritesh.  \"Perhaps we can all drink together after the race?\"  You agree and watch as the Indian family depart.\n              *set ind true\n              *goto drinkchoice\n            *else\n              *set india +10\n              \"Well, okay.\"  Starts Pritesh.  \"But it will have to be a soft drink.  We don't drink alcohol.\"  A non-alcoholic drink isn't quite what you had in mind, but you\n              agree anyway and the two of you, Pritesh's son Kiran decides to go to his room instead, find a bar close to the hotel.\n              *If skin = \"black\"\n                Pritesh tells you he is worried about Kiran on this race.  Peru isn't a safe country and as Indians, they have already received some racial abuse from local\n                people. Aside from the Koreans, Pritesh and Kiran are the only other non-white people on the race.  Even your partner ${partner} is white.  \n                Soon the topic becomes more light-hearted and you enjoy the time with Pritesh.  He's a very charismatic man and you can learn a lot from him.  (CHARISMA +5)\n                *set charisma +5\n                *goto nazcanightnight\n              *else\n                You talk to Pritesh about the race and your views on the opposing teams.  Pritesh expresses concerns about the Spanish team.\n                *if position = 1\n                  He also jokes that he will have to watch your team, seeing as you are doing so well.\n                  *goto dodgyamerica\n                *else\n                  *label dodgyamerica\n                  He then tells you that he has concerns about the ${american} team as well.  After last years race, where the ${american} were humiliated, he believes they will \n                  be a real threat this year.  He says it's strange how all of the contestants were chosen.  Most nations held a lottery.  Your nation had the competition\n                  through Coca-Cola.  The Australians held a mini-competition which couples could enter, with the winners going on to the main race.  Only the ${american}\n                  contestants were chosen.\n                  Finishing your drinks, you wish goodnight to Pritesh.  He is a very charismatic man and you are sure you will learn a lot from him on this race.\n                  *goto nazcanightnight\n      *if (oz) \n        *if australia > 30\n          #The Australians, Stacey and Lance\n            The Australians look at each other with a knowing smile before Stacey politely replies to you.  \"Sorry, we're going to get an early night.  We've not been dating long \n            and...\"  Lance nudges Stacey.  \"You know.\"  She says with a broad smile.  You smile understandingly.\n            *set oz false\n            *goto drinkchoice\n      *if russia > 10\n        #The Russians, Alina and Viacheslav\n          You ask your new friends if they would like to go for a drink.  They agree and together you find a bar close to the hotel.\n          The conversation is difficult again, but you have a liking for the Russian couple.  Alina is slim with short, straight blonde hair.  She has a chiselled face.  Once\n          beautiful, but ageing fast with strong wrinkles when she smiles.  Viacheslav is a short man with a strong physique.  Black hair and a stubbled, square-jaw outline his\n          face. To begin with, Alina is very quiet, listening, and uninvolved in the conversation.  You are surprised when she does start speaking that her understanding of\n          English is better than her husbands.  Both in their 40's, the Russians are the oldest team in the race.  Only the Indian father, Pritesh, is older.\n          You talk about their plans for the race.  They were the first team confirmed to take part in the race when they won a national lottery, over three months ago.  \n          They used this time to get in shape and they've done a good job of it too.  Both are in good physical shape.\n          After talking for an hour, they make their excuses and say goodnight.  You too go up to your room and sleep.  Tomorrow will be a long day.\n          *goto nazcanightnight\n      *if usa > 10\n        #The ${american} team, Travis and Justin\n          Together, you walk with the ${americans} to a bar close to the hotel.  Travis orders beers while you talk to Justin.\n          *if partner=\"Leonie\"\n            \"Where's your partner?\"  Asks Justin.  You explain that she decided to get an early night.  \"That's a shame.\"  He says, hiding something.  What do you want to \n            ask Justin?\n            *choice\n              #I'll ask him what he thinks about Leonie.\n                Justin rubs his neck.  \"Yeah, she's a..  She's alright.\"  He says.  Clearly, he likes her.  Soon, Travis returns and Justin goes quieter.\n                You quickly realise that he doesn't want his brother to know what you were talking about, so you change the subject.  Together, you talk\n                with the twins about the race, their Nascar experience, what they would do if they won the race, and then, as the beer flows faster, you\n                talk about solutions to world hunger, how to reduce pollution, and Travis's past conquests of the feline variety.  Finally, after a long\n                evening, you decide it's time to return to your room.  You need to get some sleep as it will be another busy day tomorrow!\n                *goto sleeptime\n              #I'll ask him about his Nascar races.\n                He tells you about the one race he won at the Kentucky Speedway last year.  There was a major crash there involving ten cars directly ahead of Justin.  Only\n                thanks to his quick reactions did he avoid the pile up and go on to win the race.  Travis returns with the beers.  \"He's talking about Kentucky?  Heh, he only\n                won that race because all of us cars at the front eliminated each other.\"  Justin protests as Travis starts to laugh.\n                The chat with the ${american} twins is pleasant and you enjoy the time with them.  They seem like good people who you would like to keep in\n                touch with after the race.  Finally, after several beers, you return to your room to sleep.\n                *goto sleeptime\n              #I'll ask him his strategies for the race.  \n                \"${name}.  Come on.  I can't go telling you my secrets.  If I did that, we'd never win!  So what about you and ${partner}.  What's your biggest strength?\"\n                You reply to him the same way he replied to you.  Soon, Travis arrives with the beers and you enjoy a pleasant evening with the ${american}\n                twins.  While the conversation involves a lot of jesting, both the twins come across as nice people.  They seem like the sort of person who\n                you would like to keep in touch with after the race.  Finally, after several beers, you return to your room to sleep.\n                *goto sleeptime\n          *else\n            What do you ask Justin?\n            *choice\n              #I'll ask him about his Nascar races.\n                He tells you about the one race he won at the Kentucky Speedway last year.  There was a major crash there involving ten cars directly ahead of Justin.  Only\n                thanks to his quick reactions did he avoid the pile up and go on to win the race.  Travis returns with the beers.  \"He's talking about Kentucky?  Heh, he only\n                won that race because all of us cars at the front eliminated each other.\"  Justin protests as Travis starts to laugh.\n                The chat with the ${american} twins is pleasant and you enjoy the time with them.  They seem like good people who you would like to keep in\n                touch with after the race.  Finally, after several beers, you return to your room to sleep.\n                *goto sleeptime\n              #I'll ask him his strategies for the race.  \n                \"${name}.  Come on.  I can't go telling you my secrets.  If I did that, we'd never win!  So what about you and ${partner}.  What's your biggest strength?\"\n                You reply to him the same way he replied to you.  Soon, Travis arrives with the beers and you enjoy a pleasant evening with the ${american}\n                twins.  While the conversation involves a lot of jesting, both the twins come across as nice people.  They seem like the sort of person who\n                you would like to keep in touch with after the race.  Finally, after several beers, you return to your room to sleep.\n                *goto sleeptime\n      #On second thoughts, I'll just get an early night.\n        A wise choice.\n        *goto sleeptime\n\n*label nazcanightnight\nYou are quickly asleep, dreaming, with the events of the past few days going around your head.\n*if dream >1\n  *goto minidream\n*else\n  *goto nazcaflighttime\n\n*label minidream\n*page_break\n*if power = \"invisible\"\n  You are in the enclosure from your dreams again, standing in the vast courtyard. The place is empty apart from a black crow pecking at something on the ground.  You move closer, but the bird stops and starts\n  to fly in your direction.  You raise your arm in defence and duck instinctively. The bird just misses you, flying off into the sky.  But something is awry.  Your raised arm\n  is simply... not there!  You then assess your whole body, looking down.  You cannot see it.  It is as if you are an entity with no form.  Reaching out from where your hand \n  should be, you touch your featureless nose.  Sensation.  You are here.  You are invisible again!\n  Your dream girl appears from the far end of the courtyard.  You head towards her trying to shake off this invisibleness as you go.  Somehow, you manage it and grain by grain, \n  your body returns to a natural form.  You reach the woman and stop.  She is, at first, surprised to see you, but then she smiles.  Reaching forward\n  *goto handheld\n*else\n  Falling.  You realise that you are freefalling through the sky.  Looking down you see the enclosure from your dreams.  It is a beautiful day with crisp white thin streaks\n  of cloud covering a deep blue sky.  In the distance, the peak of a huge snow-capped mountain dominates the surrounding area and the city below you.  Soon, you can see inside\n  the monastery where your dream girl is waiting for you.\n  *if power = \"fly\"  \n    You land, delicately on the ground, then\n    *goto handheld\n  *else\n    You land with a deafening thud, dust spraying up into the air.  After a moment, the dust clears and \n    *label handheld\n    you hold out your hand to the woman.  She takes your hand and you pull her towards you.  For the first time, you really see her clearly.  The long black hair and olive skin \n    look European.  Her hazel eyes, match as well, making you wonder why she is here in this clearly non-European environment.  She is wearing a thin black dress which flows\n    down to her bare feet.  The more you look, the more you notice:  She has calloused hands where before you were sure her skin was pure.  Clearly hasn't been eating well, \n    either, as her once curvaceous figure has been replaced with a frail skeleton.  Not grotesque, but pitiful.  You ask her what happened.  She smiles but her sadness is told\n    by her eyes.  \n    \"I am trapped.\"  She tells you.  \"I have been held captive here for a long time and I need help.\"  Her eyes plead deep into you.  You are completely in love with this \n    woman but you know so little about her.  You ask her:\n    *choice\n      #\"Where are you?\"\n        \"I am here, in this enclosure.  A red keeper!  Save me!\"  She says.  You wake up.\n        *goto nazcaflighttime\n      #\"Who is keeping you captive?\"  \n        \"No time for that now.  Come to me, please.  A red keeper!\"  You wake up.\n        *goto nazcaflighttime\n      #\"Why are you being held captive?\"\n        \"No time for that now.  Come to me, please.  A red keeper!\"  You wake up.\n        *goto nazcaflighttime\n      #\"What is your name?\"\n        \"No time for that now.  Come to me, please.  A red keeper!\"  You wake up.\n        *goto nazcaflighttime\n\n*label nazcaflighttime\n*page_break\n*image map3.jpg\n*set stamina +20\n*set time 660\nNazca airport is a small, open airport.  Several Cessna planes surround the area, which in themselves are fascinating, but it's the 4 black Sikorsky S76-D helicopters that grabs\nyour attention.  These newly released executive choppers must have cost Mendez a fortune, and he has 4 of them!\n*if position \u003c 5\n  As one of the first 4 teams, you head out at 11:00am to take your helicopter.  The other teams with you are the Spanish, the ${american}, and the Indians.  You take helicopter\n  ${position}, to match your finishing position from the first leg.  Anxious to get going, the instructions given to you as you enter the craft seem to go on forever!  Soon\n  though, you are airbourne and your search begins!\n  *goto fly\n*else\n  *set time + 150\n  As you finished in ${position}th place, you will have to wait for the first 4 teams to finish before you can fly.  You are with the teams from Russia, France and Australia.\n  The day is hot, a dry heat that seems to burn right through you.  The air is still and quiet, which, coupled with the open flat ground you are in, gives you the feeling of\n  being in a desert.  The first group of helicopters seems to be taking a long time.\n  *page_break\n  Finally, after a long wait, your helicopter returns and you quickly enter the craft.  You are given some instructions but hardly listen.  You are more concerned about getting\n  started so you can make up time on the other teams.  Soon, you are up in the air and your search begins!\n  *goto fly\n\n*label fly\n*temp luckybird\n*temp luckynumber\n*temp line\n*temp l1\n*temp l2\n*temp l3\n*temp l4\n*temp l5\n*temp l6\n*temp l7\n*temp l8\n*temp l9\n*set l1 true\n*set l2 true\n*set l3 true\n*set l4 true\n*set l5 true\n*set l6 true\n*set l7 true\n*set l8 true\n*set l9 true\n*set luckybird 1\n*if luck \u003c 20\n  *set luckynumber 9\n  *goto taskbegin\n*elseif luck \u003c 25\n  *set luckynumber 7\n  *goto taskbegin\n*else\n  *if luck \u003c 30\n    *set luckynumber 6\n    *goto taskbegin\n  *elseif luck \u003c 35\n    *set luckynumber 5\n    *goto taskbegin\n  *else\n    *if luck \u003c 40\n      *set luckynumber 4\n      *goto taskbegin\n    *elseif luck \u003c50\n      *set luckynumber 3\n      *goto taskbegin\n    *else\n      *set luckynumber 2\n      *goto taskbegin\n*label taskbegin\n*page_break\nYour task is to find the clue which will tell you where to go next.  You have a map showing 9 different objects which were created by the Nazca civilization over 1500 years ago.\nOne of them has been temporarily altered somehow.  You need to find the correct one.\nThe nine choices are listed below.  Which one will you instruct the pilot to fly to first?\n*label choiceoflines\n*if luckybird > 1\n  You decide to fly to one of the other lines.  Which one will you fly to now?\n  *goto linechoice\n*else\n  *label linechoice\n  *choice\n    *selectable_if (l1) #The Dog\n      *Set line \"Dog\"\n      *set time +25\n      *if luckybird\u003cluckynumber\n        You inspect the ${line}, but can't see anything unusual about it.\n        *set luckybird +1\n        *set l1 false\n        *goto choiceoflines\n      *else\n        *goto luckytime\n    *selectable_if (l2) #The Humming Bird\n      *Set line \"Humming Bird\"\n      *set time +15\n      *if luckybird\u003cluckynumber\n        You inspect the ${line}, a beautiful picture that must have been difficult to create from the ground.  However, there's no clue here.\n        *set luckybird +1\n        *set l2 false\n        *goto choiceoflines\n      *else\n        *goto luckytime\n    *selectable_if (l3) #The Heron\n      *Set line \"Heron\"\n      *set time +25\n      *if luckybird\u003cluckynumber\n        You look at the ${line}, but as you fly over, you see nothing unusual about it.\n        *set luckybird +1\n        *set l3 false\n        *goto choiceoflines\n      *else\n        *goto luckytime\n    *selectable_if (l4) #The Giant\n      *Set line \"Giant\"\n      *set time +30\n      *if luckybird\u003cluckynumber\n        You inspect the ${line}, which looks more like an astronaut to you.  However, aside from the odd name, there is nothing else unusual about it.\n        *set luckybird +1\n        *set l4 false\n        *goto choiceoflines\n      *else\n        *goto luckytime\n    *selectable_if (l5) #The Hands\n      *Set line \"Hands\"\n      *set time +35\n      *if luckybird\u003cluckynumber\n        You inspect the ${line}, which look more like a potted plant on it's side.  However, you can't see anything unusual about it.\n        *set luckybird +1\n        *set l5 false\n        *goto choiceoflines\n      *else\n        *goto luckytime\n    *selectable_if (l6) #The Pelican\n      *Set line \"Pelican\"\n      *set time +25\n      *if luckybird\u003cluckynumber\n        You fly over the ${line}, however you can see nothing unusual about it.\n        *set luckybird +1\n        *set l6 false\n        *goto choiceoflines\n      *else\n        *goto luckytime\n    *selectable_if (l7) #The Spider\n      *Set line \"Spider\"\n      *set time +20\n      *if luckybird\u003cluckynumber\n        You inspect the ${line}, and while it does indeed resemble a ${line}, you can see nothing unusual about it.\n        *set luckybird +1\n        *set l7 false\n        *goto choiceoflines\n      *else\n        *goto luckytime\n    *selectable_if (l8) #The Condor\n      *Set line \"Condor\"\n      *set time +15\n      *if luckybird\u003cluckynumber\n        You inspect the ${line}, the largest of all the Nazca lines.  Unfortunately, despite the size, you can see nothing else unusual about it.\n        *set luckybird +1\n        *set l8 false\n        *goto choiceoflines\n      *else\n        *goto luckytime\n    *selectable_if (l9) #The Monkey\n      *Set line \"Monkey\"\n      *set time +20\n      *if luckybird\u003cluckynumber\n        You inspect the ${line}, which does actually look like a ${line} with it's tail wrapped into a spiral.  However, you can't see anything else unusual about it.\n        *set luckybird +1\n        *set l9 false\n        *goto choiceoflines\n      *else\n        *goto luckytime\n\n*label luckytime\n*temp ozorfrench\n*set ozorfrench false\n*page_break\nAs you fly over the ${line} you see something odd.  \n*if luckynumber > 5\n  Finally!  You were beginning to wonder if there was no answer due to a bug in the game... whatever that means.\n  *goto misti1\n*elseif luckynumber \u003c3\n  \"Wow!  That was quick!  Says ${partner}.\n  *goto misti1\n*else\n  *goto misti1  \n*label misti1\nIn huge clear English writing is the sentence \"MENDEZ SAYS GO S TO EL MISTI\"  This is clearly the clue, but what does it mean?\n\nFortunately the pilot answers for you.\n\"There!  El Misti!  Go to Arequipa!  Go to El Misti!!\"  He is clearly excited that you have found what you came here for.\nWith the new information memorised, you now fly back to Nazca airport.\n*set time +30\n*page_break\n*if position \u003c5\n  As you depart your craft you pass the Australian team who will take your helicopter next.\n  \"Did you get it?\"  Asks Lance as you pass.\n  \"Yes!\" Shouts ${partner}.  Should you tell the Australians where to look?\n  *choice\n    #Yes, they seem like good people and I want them to stay in the race.\n      *set ozorfrench true\n      You shout to Lance to check out the ${line}.  He smiles and thanks you, before disappearing into the black chopper.  \n      *goto nazcabus\n    #No, he'll find it without my help.\n      *set australian \"French\"\n      \"Good luck!\" You shout.  Lance holds a thumbs up before getting into the black chopper.\n      *goto nazcabus\n*else\n  *goto nazcabus\n\n*label nazcabus\n*set money -12\nYou take a taxi for $12 back to Nazca.  \nOn the way you quiz the taxi driver, who speaks a little English, how to get to Arequipa.  He tells you to take a bus and drops you at the bus station.\nYou check the time:\n*gosub showtime\nThere is a bus at 22:00 and it seems to be the only bus.  \nWhat will you do?\n*choice\n  #Buy the bus tickets now, then do something else.\n    You buy tickets as close to the front of the bus as possible.  You are sure that other teams will also be doing the same.  The cost is $41 each.  You pay and take your\n    tickets.  You now have some time spare to do something else.  What will you do?\n    *set money -41\n    *goto sparetime\n  #Look around.  There might be another, faster route to Arequipa.\n    You ask Several locals how to get to Arequipa.  Most just look at you blankly, but the two who do talk to you direct you back to the bus station.  It seems that the bus \n    really is your best option.\n    *page_break\n    You go back to the bus station and buy two tickets.  The cost is $41 each.  You pay and take your tickets.  You now have some spare time to do something else.  What will\n    you do?\n    *set money -41\n    *label sparetime\n    *choice\n      #Have a nap, I'm still low on stamina.\n        *if dream >1\n          Far from a vivid dream, you still manage to see images of the beautiful woman.  The images calm you and bring you peace and tranquility.  Whoever she is, she is \n          helping you a lot!  (STAMINA +20)\n          *set stamina +20\n          *goto endofnazca\n        *else\n          You sleep peacefully.  (STAMINA +15)\n          *set stamina +15\n          *goto endofnazca\n      *if truth =100\n        #Go shopping.\n          You look around the shops in the area.  One has a particularly good deal on a digital camera at only 120 Sols or $50.  Will you buy it?\n          *choice\n            #Yes, with Sols.\n              *if sols >119\n                *set sols -120\n                *set camera true\n                You buy the camera and test it with a picture of your partner ${partner}.  It works well and gives you a nice souvenir.  \n                You wish that you had done this sooner!\n                *goto endofnazca\n              *else\n                You don't have enough Sols, so pay with dollars instead.\n                *set money -50\n                *set camera true\n                You buy the camera and test it with a picture of your partner ${partner}.  It works well and gives you a nice souvenir.  \n                You wish that you had done this sooner!\n                *goto endofnazca\n            #Yes, with Dollars.\n              *if money >49\n                *set money -50\n                *set camera true\n                You buy the camera and test it with a picture of your partner ${partner}.  It works well and gives you a nice souvenir.  \n                You wish that you had done this sooner!\n                *goto endofnazca\n              *else\n                You don't have enough Dollars, so pay with Sols instead.\n                *set sols -120\n                *set camera true\n                You buy the camera and test it with a picture of your partner ${partner}.  It works well and gives you a nice souvenir.  \n                You wish that you had done this sooner!\n                *goto endofnazca\n            #No, I'd rather not waste race money.\n              I suppose.  It would be a waste of money, after all!\n              *goto endofnazca\n      #Get some food, I need to keep my strength up.\n        You and ${partner} find a cheap pizza place close to the bus station.  Sharing a \n        *set money -18\n        *if partner = \"Dan\"\n          large cheese pizza, you kill some time chatting away.  Dan tells you about his work in ${country} as a nightclub bouncer.  He shows you various scars from fights\n          he has been involved in.  He tells you about his sick mother and his older sister.  He seems happy to spend time with you and warms to you.  \n          (LEADERSHIP + 10)  (CHARISMA +10)  (STRENGTH +5)\n          *set charisma +10\n          *set leadership +10\n          *set strength +5\n          *goto endofnazca\n        *elseif partner=\"Leonie\"\n          medium cheese pizza, you kill some time chatting away.  ${partner} tells you about her family.  An only child, she was raised by her parents on the outskirts of \n          the ${country} capital.  She had a lonely childhood, but learned to fend for herself when very young.  You learn that her mother is sick and she is convinced that\n          the chance to go on this race is a blessing from a higher being.  A chance to help her mother and pay for the operation she needs.\n          As you talk, she warms to you a little.  (LEADERSHIP +5)  (CHARISMA +5)  (STRENGTH +5)\n          *set leadership +5\n          *set charisma +5\n          *set strength +5\n          *goto endofnazca\n        *else\n          medium cheese pizza, you pass the time chatting away.  April tells you about her family.  She has two older sisters who have been her inspiration in life.  \n          Despite the age gap between them, her sisters are 5 and 7 years older than her, her family are very close.  This race is the first time she has really been apart\n          from them.  You are impressed by this young, 11 year old girl.  She speaks and acts with a wisdom way beyond her years.  She also seems to like you and she smiles \n          in your presence.  (LEADERSHIP +5)  (CHARISMA +15)\n          *set leadership +5\n          *set charisma +5\n          *goto endofnazca\n      #See if I can get on the internet without being seen.  It would be good to get some information on Arequipa and El Misti.\n        You tell your partner that you are going to go for a walk.  Heading down the street, you come across an internet cafe.  Being careful to make sure you aren't being \n        followed, you slip into the cafe and quickly take up a PC at the back.  You go onto the internet and google \"el misti arequipa\".  You are taken to a wiki page with \n        information about El Misti, a mountain overlooking the city of Arequipa.  You quickly realise that if you are going to this mountain, then you are likely going to \n        climb it!  You are about to leave when you see something that looks very useful.  Apparently some Incan mummies were found at the top of the mountain a few years ago.\n        The remains are now stored at the Museo de Santuarios Andinos in Arequipa, along with the famous Juanita, or Ice Maiden.  You remember the name.  Perhaps you will be\n        headed here tomorrow, after the mountain! Again, you are ready to leave, but suddenly see Travis and Justin, the two ${american} racers, walk into the internet cafe.\n        You realise that you have caught them cheating, but only in a minor way.  You also realise that you could equally be accused of cheating if they see you.  You hide\n        down and wait as they take a computer together.  With their backs to you, you quietly exit the building, paying $3 for using the internet as you go.\n        *set cg 50\n        *set money -3\n        *goto endofnazca\n\n*label showtime \n*temp mns \n*set mns time - 660\n*temp hrs \n*set hrs 11 \n*temp diff \n*set diff 0 \n\n*label loop \n*set diff mns - 60 \n*if diff > 0 \n  *set hrs + 1 \n  *set mns - 60 \n  *goto loop \n*else \n  *if hrs > 0 \n    It's ${hrs}:${mns}.\n    *return \n  *else \n    You took ${mns} minutes to get here.\n    *return \n\n*label endofnazca\n*page_break\n\nTen o'clock finally arrives and you embark on your journey to Arequipa.  However, not all of the teams are here. You quickly go through the teams on the bus.\n${american}, yes, at the front.\nIndians, yes.\nKoreans, yes.\nRussians, yes, over there.\nSpanish, yes, sitting at the back for some reason.\n*if position\u003c5\n  *if (ozorfrench)\n    Australians, yes.\n    And your team.  That means the French aren't here.  \"They're out.\"  Says Lance.  \"We saw it.  We just beat them, thanks to you, ${name}.  If you hadn't told us where to go,\n    we'd be out for sure!\"  You feel happy that your decision kept the Australians in, however you also realise that you are directly responsible for the French going out.\n    *goto ended\n  *else\n    French, yes.\n    And your team.  That means the Australians aren't here.  You can't help but wonder if you are in any way responsible for them going out.  What would have happened if you had\n    told them where to go?\n    *goto ended\n*else\n  The French couple.  And your team.  That means the Australians aren't here.  It seems that they are out of the race.  You never really had the chance to get to know them.  Oh well.\n  There is a little banter between some of the teams at the start of the journey, but before long most teams have settled down to sleep for the night.  You try to do the same\n  and while it does take you a while to drift away, soon you are in a deep slumber.\n  *finish Leg 3: Perils of Ice\n\n*label ended\nYou try to put it out of your mind.  There can be only one winner at the end anyway so it doesn't really matter.  There is a little banter between the other teams at the start\nof the journey, but before long most teams have settled down to sleep for the night.  You try to do the same and while it does take you a while to drift away, soon you are in\na deep slumber.\n*finish Leg 3: Perils of Ice\n", "20arequipa": "*label AREQUIPASTART\n*temp ice\n*set ice false\n*temp mendezscrewed\n*set mendezscrewed false\n*set time 540\n*image map4.jpg\nAfter an overly long journey you wake up to see the sun has risen. Looking up you see the red display of the coach clock flashing 8:46. You should soon arrive in Arequipa. Outside, you see dusty, yellow\nroads and meagre hills dwarfed by huge, distant mountains towering up into the sky.\nThe nearness to the continuation of the race creates a feeling of unease amongst the passengers. Soon, this rest period will be over and you will be running again.\nSimple buildings on the outskirts of the city give way to larger places of interest. Eventually, you reach the Arequipa bus station and depart from the bus. You now have the\nunenviable task of working out what to do next.\n*choice\n  #Find a taxi\n    *set time +10\n    There are many taxis available and you choose one with a driver who speaks a little English. You ask the driver to go to El Misti. He nods. \"Okay\" and starts driving.\n    *goto mististart\n  #Ask the local people about El Misti\n    *set time +15\n    You start asking the local people what El Misti is. The first guy, an ageing man with thin, brown-grey hair, points roughly to the North. \"Montana!\". He says.\n    The next man, speaking a little English, makes it easier for you. \"Ah! El Misti! Big mountain. Volca.. Volcano!\". He also points roughly North. From the way you entered\n    the area you are currently at the South side of the city.  You find a cab and head to El Misti.\n    *goto mististart\n  *if cg=50\n    #Take a taxi to the base of El Misti volcano.\n      *set time +2\n      *goto mististart\n\n*label mististart\n*page_break\n*set time +60\nAfter about an hour you reach the base of El Misti, a huge, imposing volcano reaching up to over 5,000 metres. The dwarfing size of the rock fills you with worries that you\nare going to have to climb it.\nYours fears are soon realised as you see a large sign: \"MENDEZ RACE\" with a guide waiting by it.  The guide greets you and asks your names.  He gives you each a bag with some\nsandwiches, energy bars and water.  He then proceeds to tell you your task.  You have to climb the El Misti mountain up to 4,500 metres.  There, you will find a base camp and\nfurther instructions. There are also many pairs of climbing boots next to the guide. One pair have your name on them. \n*if partner = \"Dan\"\n  Your partner finds his shoes as well\n  *goto climbtime\n*else\n  Your partner finds her shoes as well\n  *goto climbtime\n\n*label climbtime\nand together you put them on, moving your regular footwear to your backpack. You are about to start walking when you feel something awkward in your foot.  What will you do?\n*temp wriggle\n*set wriggle true\n*label footchoice\n*temp clue\n*set clue false\n*choice\n  #Take off the shoe and straighten my sock.\n    *set time +15\n    You take off the shoe and straighten your sock.  You then shake the shoe to get any stones out but it's not stone that falls out.  A small piece of folded paper drops to\n    the floor.  For a second you think about leaving the paper, but something makes you stop.  You pick it up and unfold it to find a written message.  It reads:\n\n    AT 4500 METRES TAKE ICE FOR THE ICE MAIDEN\n\n    You show the message to ${partner} and while it makes little sense, it at least confirms what you need to do now: Climb!\n    *set clue true\n    *goto walking\n  *if (wriggle) #Wriggle my feet to try to make it more comfortable.\n    *set time +5\n    You try to make your foot comfortable by wriggling your toes, but it's no use.  You will have to take the shoe off if you want to make it better.\n    What will you do?\n    *set wriggle false\n    *goto footchoice\n  #Ignore it.  It'd just waste time taking the shoes off again.\n    You try to ignore the problem and after a while, you get used to it.\n    *goto walking\n\n*label walking\n*page_break\n*temp whatido\nTogether, you walk with ${partner} along the well-defined mountain path.  The route is mostly dry and rocky with occasional patches of snow, but the climb is steady and you progress at a good pace.  At the start of\nthe journey, you pass other travellers, mostly Peruvian.  However, the further up the path you go, the less people you see.  You pass the time talking to ${partner}.  What do\nyou talk mainly about?\n*choice\n  #The Race, of course!\n    *goto finishtalk\n  #My history.  What I normally do.\n    What do you normally do?\n    *input_text whatido\n    You tell ${partner} about your life back home.  \"${Whatido}?\"  Says ${partner} loudly.  \"I thought you were a\n    *temp job\n    *rand job 1 3\n    *if job =1\n      doctor.\"\n      *goto finishtalk\n    *elseif job =2\n      salesperson.\"\n      *goto finishtalk\n    *else\n      student.\"\n      *goto finishtalk\n  #My partner's history.  I want to learn all about ${partner}\n    *goto finishtalk\n*label finishtalk\n*set time +240\n\"What's that?\"  Says ${partner}, distracted suddenly.  \n*if truth =100\n  You look further up the mountain and see two teams ahead.  The Spanish team, not far from where you are now and another team, possibly the ${american} team, who shortly go out of sight.\n  *goto usarockpush\n*else\n  *goto notruth\n*label notruth\nYou follow ${his} gaze and notice the Spanish team not too far ahead of you on the mountain.  \n*label usarockpush\nThis is the first time you've really\nseen another team so you must have been gaining on them for a while.  If you pushed hard now, you could over take the Spaniards and improve your position on the race.  Will you do that?\n*choice\n  #Yes, it would be good to get ahead of them.  We could be in last place.  Equally, we could go into first place by getting ahead of them.  Either way, it's a good idea!\n    *set stamina -25\n    *set time +25\n    It is a good idea.  You tell ${partner} your plan to catch the Spanish team.  With a nod, it is agreed and you both push that little bit harder.\n    You soon catch them up and they don't even react when you pass them.  They are going really slowly, strolling, rather than racing.  Perhaps they are not sure of the way\n    and will start following you!  Regardless, you have just gained a position in the race.  You turn a corner in the mountain and lose sight of the Spaniards for a few seconds.\n    You keep up your fast pace and watch as they fall further behind you.\n    *page_break\n    *if truth = 100\n      You soon come to a split in the path.  The main route continues to the left.  A second, more dangerous looking route heads of slightly to the right and\n      you can see a team just ahead of you who have taken this route.  It looks like the ${american} team, but you can't be sure.\n      *goto pathchoice\n    Together, you press on putting as much distance as you can between yourselves and the Spanish. You haven't gone far when you hear a loud roar up ahead.  Looking up, \n    you see an assortment of rocks coming down the mountain headed in your direction!\n    Quick!  What do you do?\n    *label rockchoice\n    *choice\n      #I'll quickly go back down.\n        You race back down the mountain to the corner you just passed.  The thunder of the rocks behind you grows louder by the second.\n        *If partner = \"April\"\n          You reach the corner in time and turn back to see April behind you.  Reaching out, you grab her hands and pull her away from the chasing rocks with no time to\n          spare.  You fall to the ground with the momentum but are fine.  You have both just escaped what could have been a whole lot more dangerous!\n          \n          The Spanish team join you at the corner.  They saw what happened to your team and are concerned about your safety.  For the first time, they speak to you.\n          *goto luckyescape\n        *elseif partner = \"Dan\"\n          You reach the corner with seconds to spare, but your momentum is so great that you are going to go off the cliff!  Trying to slow yourself, you turn towards the \n          corner, but it's no good!  You are going to go over.  Your race is about to end.\n          *page_break\n          Your race WAS about to end!  Luckily for you, you have a partner of immense strength!  Dan, who managed to control his run better, grabs your arm and hoists you off\n          the ground.  You do indeed go off the cliff, seeing a sheer drop below you, but Dan manages to swing you round in an arc to safety again.  Moments later, rocks \n          crash down over the ledge.  You have survived a life or death experience thanks to your wonderfully huge partner!\n           \n          The Spanish team join you at the corner.  They saw what happened to your team and are concerned about your safety.  For the first time, they speak to you.\n          *goto luckyescape\n        *else\n          *goto leonierun\n      #I'll find somewhere safe to hide.\n        You look for somewhere to shelter, but there is nowhere!  Feeling helpless\n        *if partner = \"April\"\n          you turn to the young girl partnering you on this race.  You do the only humane thing and grab hold of her, shielding her with your back from the falling rocks.\n          The debris crashes down on you and you feel pain in so many places.  You are forced to the ground but still hold onto April, shielding her from the attack.  Then,\n          unseen by you, one rock bounces off another in mid-air, sending it hurtling on a collision course with the back of your skull.  In the second before it hits, you\n          hear a shout from below.  A male voice, but you don't know who.  Then the rock sends you into a state of unconsciousness.  Black.  All around.  Sounds still \n          register, but dim and distorted.  You hear the gravelly sound of the rocks peter away.  Then a new sound: A muffled cry.  Next a scrape, scrape, scrape sound of foot\n          on rock.  Dimming faster, you hear a muffled male voice.  Then, the last clear sound you hear, the last moment of your life, is the clarity\n          of the little girl who partnered you on this journey.  Three words before eternal blackness.\n          *page_break\n          *if boygirl=\"boy\"\n            \"He saved me.\"\n            *page_break GAME OVER\n            *achieve lifesaver\n            YoU arE in etErnal dArkneSs.  NoThiNg ComEs anD nothIng goeS.  ThoUghTs pop aS soOn as theY are fORmed.  YoU doN't knoW how loNg yOu arE hEre.  Days?  YeArs?\n\n            *page_break\n            .\n\n            A DoT in tHe dArkNess.  How cAn you seE a doT?  How cAn you seE wHen you don'T have eyeS?  HanG on, thaT's a tHouGht!\n\n            *page_break\n            o .\n \n            And that doT has grown.  It has a friEnd too.  Big and small.  What doEs this mean?\n\n            *page_break\n            O o\n\n            Two big dots and coherent thought.  Something is happening.  Something... good. The dots, they aren't getting bigger.  They're getting closer!\n\n            *page_break\n            O O\n\n            And clearer.  They have writing on them.  Pure English writing.  One says 'RESTART' the other says 'GO BACK'.\n\n            You understand.\n            *choice\n              #GO BACK (carry on playing from Arequipa)\n                *goto AREQUIPASTART\n              #RESTART (end this game)\n                *goto_scene ending\n          *else\n            \"She saved me.\"\n            *page_break GAME OVER\n            *achieve lifesaver\n            YoU arE in etErnal dArkneSs.  NoThiNg ComEs anD nothIng goeS.  ThoUghTs pop aS soOn as theY are fORmed.  YoU doN't knoW how loNg yOu arE hEre.  Days?  YeArs?\n\n            *page_break\n            .\n\n            A DoT in tHe dArkNess.  How cAn you seE a doT?  How cAn you seE wHen you don'T have eyeS?  HanG on, thaT's a tHouGht!\n\n            *page_break\n            o .\n \n            And that doT has grown.  It has a friEnd too.  Big and small.  What doEs this mean?\n\n            *page_break\n            O o\n\n            Two big dots and coherent thought.  Something is happening.  Something... good. The dots, they aren't getting bigger.  They're getting closer!\n\n            *page_break\n            O O\n\n            And clearer.  They have writing on them.  Pure English writing.  One says 'RESTART' the other says 'GO BACK'.\n\n            You understand.\n            *choice\n              #GO BACK (carry on playing from Arequipa)\n                *goto AREQUIPASTART\n              #RESTART (end this game)\n                *goto_scene ending\n        *elseif partner = \"Dan\"\n          you turn to ${partner}.\n          *if boygirl = \"girl\"\n            Dan grabs you and shields you from the rocks as best he can.  But it's not enough.  Just when you think you are safe, a large rock hits Dan square in the back\n            of his head.  Together, you fall to the ground.  Miraculously, you are fine however Dan is not.  His actions probably saved your life but he now has a deep cut\n            in his skull.  The end of the rockfall brings an uneasy silence.  In the distance you can hear the scrape, scrape sounds of foot on rock.  The Spaniards arrive\n            and start talking fast and working hard.  You have no idea what they're saying... what they're doing... but you are in no position to stop them...  help them...\n            The world around you becomes dizzy and time seems to slow.  You're not sure if you blacked out or not, but you are vaguely aware of a helicopter appearing close\n            by.  Someone, one of the Spanish racers, no doubt, helps you walk towards it.  You are then airlifted away from El Misti and away from the race.  Your journey is\n            over and you have lost the chance to win $50,000,000.  However you still have your life thanks to the selfless act of your partner.\n            *page_break\n            Dan was pronounced dead two days later at the hospital in Arequipa.\n            *page_break\n            Did Dan have to die?  Could you have done things differently to save him?  Is there a better way to progress?  You can always find out by playing again!\n            *page_break GAME OVER\n            It is game over, however you have two choices here.  You can restart the whole game or you can play again from the start of Arequipa.  What will you do?\n            *choice\n              #GO BACK (carry on playing from Arequipa)\n                *goto AREQUIPASTART\n              #RESTART (end this game)\n                *goto_scene ending\n          *else\n            Dan looks at you and shouts \"good luck!\" before crouching down to make himself as small as possible.  Stunned by his self-survival instincts which feel like\n            they have left you exposed, you stand there, frozen.  A moment later, you copy Dan, dropping to the ground and lying as low as you can, shielding your head with\n            your hands.  Rocks crash all around you, battering you in a barrage of abuse.  Your hands are cut raw, but stay in position around your head.  A large rock \n            smacks into your leg, cutting a gash.  Then everything begins to calm down.  Slowly, the dust begins to settle and you cautiously raise your face to assess the\n            damage.  Somehow, you are still alive!  You push yourself towards your feet, but are struck down by a hellish pain in your leg.  Your femur has been crushed and\n            you are unable to stand up.  Dan, and soon the Spanish racers arrive and stand over you.  Their faces tell you everything.  Your race is over.\n            *page_break\n            To their credit, the Spanish racers stay with you until the helicopter arrives.  Dan rides down with you.  He was relatively unhurt from the rockfall: Just minor\n            cuts and scrapes on his arms, back and legs.  You are taken to hospital in Arequipa and eventually airlifted to Lima for treatment.  Dan is clearly troubled by\n            what happened and he blames himself.  He stays with you for 3 days before leaving to go back to ${country}.  You never speak to him again.\n            *page_break GAME OVER\n            It is game over, however you have two choices here.  You can restart the whole game or you can play again from the start of Arequipa.  What will you do?\n            *choice\n              #GO BACK (carry on playing from Arequipa)\n                *goto AREQUIPASTART\n              #RESTART (end this game)\n                *goto_scene ending\n        *else\n          *label leonierun\n          you turn to Leonie.  Your eyes meet for a second before she acts.  She pushes you hard causing you to fall backwards, AWAY from the falling rocks.  Meanwhile, she \n          turns and runs back down the mountain towards the corner you passed.  You land on a rocky ledge with a sheer 100 metre drop next to you, but sufficiently far\n          enough from the falling rocks.  Feeling safe but afraid to move, your attention is now focused solely on your partner and what happens to her.  The deafening\n          rocks are moving fast, but so is Leonie.  Perhaps too fast!  She's going to run off the side of the mountain if she doesn't slow down!\n          Rocks chasing, Leonie sprinting, dust crashing all around.  What happens next?\n          *page_break\n          Leonie reaches the edge and is indeed going too fast!  She tries to turn, but her momentum is going to carry her over.  But then, with critical timing and \n          interception, a figure appears and grabs Leonie's arm, swinging her round in an arc, AWAY from the mountain then back onto solid ground.  Not a moment too soon \n          either, as next the rocks go crashing over the edge of the mountain falling far, far below.\n          Somehow, by Leonie's quick thinking AND running, you have both just survived what likely would have been certain death!\n          Leonie and the two Spanish racers walk up to you.  You thank them for their help.\n          *goto luckyescape\n  #No, we'll slow down again and go at our previous pace.\n    *set stamina -20\n    *set time +35\n    *if truth = 100\n      Together you slow down, but you are still going faster than the Spanish.  You soon reach them anyway.  They seem to have slowed down for a reason and are both \n      looking straight ahead, further up the mountain.  Following their gaze, you again see the ${american} brothers ahead of you further up the mountain, going off the main path.  What will you do?\n      *label pathchoice\n      *choice\n        #Investigate this alternative path.  See what the team further ahead are up to.\n          You move past the Spanish and take the more dangerous, more obscure path up the mountain.  You round a few corners and soon see the ${american} team just ahead\n          of you.  ${partner} grabs your arm, saying \"Be careful\" Then steps to the side to watch as you approach the ${american} brothers.\n          *page_break Evidence!\n          You cautiously move up the mountain path towards the ${american} twins.  They appear to be resting against a large rock.  They look odd though as\n          they are leaning into the rock, facing away from you looking over a cliff edge.  You move closer to a point where you can hear them.  \"Just a\n          little closer.\"  You hear Travis say quietly.  Then. \"Now!\"  He says, in a loud whisper.  All of a sudden, the rock the twins were leaning on\n          tumbles over the cliff.  You realise they weren't leaning at all, but have just pushed the rock down.  A thunder of rocks sounds all around and\n          you watch, stunned in place, as the ${american} team start an avalanche.  Justin starts to turn and for a second, you realise how exposed you are,\n          but he doesn't turn fully.  He reaches down to his belt and takes... What is that... It's a walkie talkie!  A handheld transceiver which he can\n          use to communicate via radio waves.  But communicate with whom?  He speaks into the device. \"Rocks are rollin'.  That should be the Spanish out.  We'll work on the ${country}\n          team next. Over.\"  A crackle later and you hear a voice in reply, which although isn't totally clear or convincing, is easily identifiable to you.\n          \"Good work Justin.  Try to arrange an accident in Puno.\"  The voice belongs to Andre Mendez, you are sure of it.\n          *page_break\n          You need a plan now.  For certain you can link Mendez to the ${american} team and you can act as an eye-witness to what they have done to the\n          Spanish.  You now need to find evidence to put them here and evidence linking them to Mendez so that any accusations will stick.  You could try to get the walkie talkie now, \n          before they leave.  Or you could wait for them to go and search the area for hard evidence that they were here.  What will you do?\n          *choice\n            *selectable_if (camera) #Take a photo of the twins.\n              Using the digital camera you bought in Nazca, you take several photos of the brothers, including one of Justin holding the walkie talkie.\n              This is good evidence.  Now you need to link them to Mendez.\n              *set mendezscrewed true\n              *choice\n                #I'll try to get the walkie talkie.\n                  *goto walkietalkie\n            #Look for evidence on the mountain to prove that the twins started the avalanche.\n              To make sure you aren't seen by the brothers, you find a place to hide and wait until they leave, which thankfully isn't long.  You then\n              carefully make your way to where they were pushing the rock.\n              *label search_for_evidence\n              What sort of evidence are you looking for?\n              *temp evidence1\n              *set evidence1 true\n              *temp evidence2\n              *set evidence2 true\n              *label evidencechoice\n              *choice\n                *If (evidence1) #Fingerprints.\n                  You walk up to the area where they pushed the rock and look around.  Being a mountain, this area looks like any other and there are no \n                  signs of fingerprints.  You are not a detective and have no idea how to find fingerprints, especially up here.\n                  What else will you look for?\n                  *set evidence1 false\n                  *goto evidencechoice\n                *If (evidence2) #Clothing... food wrappers... anything that's been left behind.\n                  You scour the area but can't see any anything here that doesn't belong on a mountain.  The twins weren't here that long and it seems they\n                  haven't left anything solid to implicate them.\n                  *set evidence2 false\n                  *goto evidencechoice\n                #Tracks that would implicate the twins.\n                  You look at the ground around the area where they pushed the rock and one thing is very apparent.  Footprints!  There are three\n                  distinct sets of prints here in the light snow.  One is yours.  The other two must belong to the ${american} team.  This is good work and\n                  successfully links the ${american} team to the mountain.  However, they are now further ahead and you are unlikely to get that walkie\n                  talkie now.  As the snow here will melt as the sun gets higher in the sky, you have to act on this evidence now.  \n                  Looking over the cliff\n                  where the rock was pushed, you see what happened further down the mountain.  One of the Spanish racers was hit by a rock in his leg.  He\n                  looks to be in a lot of pain as his partner and your partner ${partner} try to help him.  You go down to them and help the hurt Spaniard,\n                  it's Carlos, to his feet.  You then show the footprints to ${partner} and Raul, explaining that they belong to the ${american} team.\n                  They are both shocked to hear this and both angry as well.  Raul uses a small camera to take photographs of the tracks and the four of you\n                  make your way back down the mountain.  Once down, you contact the organisers of the race as well as the police.  Starting an avalanche is a\n                  criminal offence and regardless of Justin and Travis's intentions, they have a lot of questions to answer.\n                  *page_break\n                  *label one_out_of_two\n                  Soon, the police arrive and you are interviewed.  You tell them as much as you can, including details about the walkie talkie and Mendez's\n                  involvement.  Afterwards, the race organisers call you over and you\n                  are interviewed again by a vaguely familiar looking woman.  You are asked many more questions by the organisers than the police and guess\n                  that ${partner} must be going through the same interrogation.  Finally, you are released and driven to a hotel in Arequipa.  You are told to\n                  wait there alone until further notice.  Several hours pass and you wonder what is happening.  Have the ${american} twins been taken in by\n                  the police?  Did they implicate Mendez on their own?  Where is your partner?  How is Carlos, the injured Spanish racer doing?  When will \n                  the race continue?  Finally, there is a knock at the door and you find out what is happening through a letter.  It's not good news.  \n                  *page_break The Bad News\n                  [i]Dear ${name},\n                  *line_break\n                  As you are aware, there has been a major incident during the race which has caused this halt to proceedings.\n                  Due to illegal activity by the ${american} team and the inability to continue from the Spanish team, the race has been cancelled.  The\n                  race is now two teams short, ruining the order for the race making it foolhardy to proceed.  Furthermore, the organisers have decided that\n                  there is no way to tell if other teams were working with the ${american} team.  I apologise for any inconvenience caused and regretfully\n                  tell you that you will not be eligible to apply to race again in the future.  I am deeply saddened to hear of this incident and will strive\n                  to make sure that nothing like this ever happens again in the future.\n                  *line_break\n                  You will be flown back to your native country tomorrow.\n                  *line_break\n                  Yours sincerely,\n                  *line_break\n                  Andre Mendez[/i]\n                  *page_break The End\n                  The following day you fly home feeling dejected.  Sure, you helped stop the ${american} team, but you didn't catch Mendez or find out why\n                  he was cheating with his own race.  It s
