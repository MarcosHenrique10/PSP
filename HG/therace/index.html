= \"Chile\"\n            *set spanish_speaker true\n          *if country = \"Peru\"\n            *set spanish_speaker true\n          *if country = \"Bolivia\"\n            *set spanish_speaker true\n          *if country = \"Paraguay\"\n            *set spanish_speaker true\n          *if country = \"Cuba\"\n            *set spanish_speaker true\n          *if country = \"Guatemala\"\n            *set spanish_speaker true\n          *choice\n            *selectable_if (spanish_speaker)  #\"Por supuesto!\"\n              The Spaniards look at you, surprised.  \"Triste, trabajamos solos.\"  Says the first man, then, after a pause, \"Buena suerte!\"  With that, the two men walk away.\n              *goto start\n            #\"Sorry, I don't speak Spanish.  Do you speak English?\"\n              *set time +1\n              *label spainsnub\n              He laughs out loud then says \"Buena suerte.\"  With that, they abruptly walk away.\n              *goto start\n            #\"Hahaha.  Good question!\"\n              *set time +1\n              *goto spainsnub\n            #\"Sabes lo que estoy diciendo?\"\n              *set time +1\n              *goto spainsnub\n            #\"Dos cervezas por favor.\"\n              *set time +1\n              *goto spainsnub\n            #\"Um. Yeah.  Look.  We want to ask you a few questions about the race.  What do you think we need to do first?\"\n              *set time +1\n              *goto spainsnub\n            #\"I was thinking.  We're in Peru, a country that speak Spanish.  How about we work together?  It could be good!\"\n              *set time +1\n              *goto spainsnub\n        #The Korean brother and sister\n          *set time +2\n          *if korea =50\n            *if partner = \"Leonie\"\n              \"Leonie!  ${name}!  Let's work together.\"  Says Sean.\n              *goto koreasolve  \n            *else\n              \"Hello again.\"  Says Sean.\n              *label koreasolve\n              \"What do we start?\"  He asks.  \"How do we solve clue?\"\n              *line_break\n              You look at the 50 sol note and see a large picture of a lake.  Under it is the writing LAGUNA DE HUACACHINA.  \"Here.\"  Says Sunny, excitedly at first,\n              but then she lowers her face slightly, embarrassed at having spoken so loudly.  \"Yes!\"  Says Sean, oblivious to his sister's shyness.  \"What does this say?\"\n              You read the writing to them and all agree that you likely have to make your way to this lake.  You wish the Koreans well and go your separate ways.  You have\n              a good feeling about the Koreans and they definitely seem to like you and ${partner}.\n              *set ica 3\n              *set huacachina 5\n              *goto start\n          *elseif korea =40\n            \"Hello!  Race exciting, no?\"  Says Sean.  His sister Sunny smiles at you anxiously.\n            *choice\n              #Ask if they want to work together.\n                *set time +2\n                \"Yes, that is good.  Do you know clue?  Where we go?  We look but name is hard.\"  He shows you the 50 sol note.\n                *if huacachina >1\n                  You see the picture of LAGUNA DE HUACACHINA.\n                  *label koreachoice\n                  *set ica 3\n                  *set huacachina 5\n                  Will you tell the Koreans where to go?\n                  *choice\n                    #Yes\n                      \"We should go here.\"  you say.  \"HUACACHINA.\"  Sean smiles and shakes your hand.\n                      *line_break\n                      \"Thank you!\"  He says, grabbing his bag.  \"Good Luck!  We will help you!\"  And with that, the two Koreans leave.\n                      *set korea +10\n                      *goto start\n                    #No\n                      You shrug your shoulders.\n                      *if partner = \"April\"\n                        You are about to say you have no idea when April interrupts.  \"We should go here.\"  She says.  \"HUACACHINA.\"  Sean smiles and you fake a smile.\n                        *line_break\n                        \"Thank you!\"  He says, grabbing his bag.  \"Good Luck!  We will help you!\"  And with that, the two Koreans leave.\n                        *set korea +10\n                        *goto start\n                      *else\n                        \"I don't know.\"  You say.  But you're really very sure that you need to go to HUACACHINA.  The Koreans sigh in defeat and you move away from them.\n                        *goto start\n                *else\n                  There is a picture of a lake and the words LAGUNA DE HUACACHINA underneath in small print.  This must be where you need to go!\n                  *goto koreachoice\n          *else\n            \"We no speak to you.\"  Says the man.  \"You rude.  We race.  Bye.\"\n            *goto start\n        #The Indian father and son\n          *set time +2\n          *if india = 20\n            The Indian father looks at you with disdain.  \"Huh.  What do you know.  It's the liar.  Look son, it's the guy from the swimming pool.  He lied directly to us.\n            Well I hope you gained something from your deceit.\"  The Indians don't want to talk to you.\n            *goto start\n          *elseif india = 30\n            You greet the Indian team, a father and son.  The father Pritesh looks at you suspiciously.  He is likely remembering that you ran away from him while he was \n            swimming.  \"What can we do for you?\"  He asks, slightly coldly.\n            *choice\n              #Apologise for running away.\n                *set time +1\n                *set india +15\n                He laughs loudly.  \"No problem!  I just put it down to nerves.  Here, this is Kiran, my son.\"  Kiran nods politely.\n                \"Now let's have a look at that clue.  What do you think son?\"\n                \"Okay, let's take a look.\"  His son steps forward and speaks to you for the first time.\n                *line_break\n                \"Yes, dad.  Here, look.  There's a picture of a lake on the note.  That must be where we have to go!\n                *line_break\n                \"Oh yes, good work son!\"  He's right, there is what appears to be a lake on one side of the note.  There is small print just below\n                the picture which reads: LAGUNA DE HUACACHINA.\n                *line_break\n                \"Okay my ${country} friends.\" Says Pritesh.  \"I wish you luck on your journey.  We are going to go to this Laguna.\n                I guess we will see you there!\"  The father and son head off.\n                *set ica 3\n                *set huacachina 5\n                *goto start\n              #Ignore the atmosphere and ask him if you can work with him.\n                *set time +1\n                \"Hmmm.  I think not.  We prefer to work alone.  Good luck.\"  Says the father.\n                *goto start\n              #Run away.\n                *set time +1\n                *set india 0\n                You tug at ${partner}'s arm and move quickly away from the Indians.  You are a very strange individual, but I suppose running away was your choice.  Of course, \n                the Indians will have a very strange impression of you as well by now.  That's twice you've fled after approaching them.\n                *goto start\n          *else\n            *if india = 40\n              You greet the Indian team, a father and son.  The father Pritesh seems to do most of the talking and introduces his 18 year old son Kiran to you who\n              merely nods, shyly.\n              *line_break\n              \"So what do you think we should be doing first?\"  Asks Pritesh.\n              *choice\n                #\"Maybe we should look at the 50 Sol note.\"\n                  *set time +1\n                  *set india +15\n                  \"Okay, let's take a look.\"  His son steps forward and speaks to you for the first time.\n                  *line_break\n                  \"Yes, dad.  Here, look.  There's a picture of a lake on the note.  That must be where we have to go!\n                  *line_break\n                  \"Oh yes, good work son!\"  He's right, there is what appears to be a lake on one side of the note.  There is small print just below\n                  the picture which reads: LAGUNA DE HUACACHINA.\n                  *line_break\n                  \"Okay my ${country} friends.\" Says Pritesh.  \"I wish you luck on your journey.  We are going to go to this Laguna.\n                  I guess we will see you there!\"  The father and son head off.\n                  *set ica 3\n                  *set huacachina 5\n                  *goto start\n                #\"I was hoping you had some ideas.\"\n                  *set time +1\n                  \"Well, I guess we need to look at that clue we got.  Well, good luck with it all.  I trust we will see you again soon!\"  \n                  It seems, for whatever reason, Pritesh and Kiran have decided not to work with you.\n                  *goto start\n            *else\n              \"Hello again!\"  Says Pritesh with a smile.  \"Are you all set to race?  This is going to be interesting!\"\n              *choice\n                #Ask him if he has any ideas where to go.\n                  *set time +1\n                  *set india +5\n                  \"I guess we should start by looking at the 50 Sol note.  Don't you agree Kiran?\"  His son steps forward and speaks to you for the first time.\n                  *line_break\n                  \"Yes, dad.  Here, look.  There's a picture of a lake on the note.  That must be where we have to go!\n                  *line_break\n                  \"Oh yes, good work son!\"  He's right, there is what appears to be a lake on one side of the note.  There is small print just below\n                  the picture which reads: LAGUNA DE HUACACHINA.\n                  *line_break\n                  \"Okay my ${country} friends.\" Says Pritesh.  \"I wish you luck on your journey.  We are going to go to this Laguna.\n                  I guess we will see you there!\"  The father and son head off.\n                  *set ica 3\n                  *set huacachina 5\n                  *goto start\n                *if Huacachina >1\n                  #Tell him what you have found so far.\n                    *set time +1\n                    *set india +15\n                    \"Wow, so we should probably go to this HUACACHINA then.  That would be my guess!  Thank you for sharing this information with us.\"\n                    Pritesh shakes your hand vigourously and smiles from ear to ear.\n                    *line_break\n                    \"Let me wish you luck on your journey.  We owe you one!\"  With that, Pritesh and his son Kiran depart.\n                    *goto start\n        #The Canadian / German girls\n          *set time +4\n          *if cg>2\n            You turn to Carmen and Carmelina.  \"What should we do first?\"  Asks Carmelina.  Before you can answer, two people approach the table and sit down with you.\n            It is the ${american} twins, Travis and Justin.\n            *goto thecon\n          *else\n            You walk over to the two girls.  You can see they are already sitting with the ${american} twins, Travis and Justin.  \n            You and ${partner} join them.\n            *goto thecon\n  #Leave the hotel quickly.\n    *set time +1\n    *set outside 3\n    *label leave\n    Where should you go?\n    *choice\n      *if bank \u003c 5\n        #The nearest shop\n          Next to the hotel is a lighting shop selling lamps and bulbs.  What do you do?\n          *choice\n            #Buy a light bulb.\n              *set time +1\n              *set money -1\n              You buy a 40 watt screw bulb for $1 and put it in your bag.  Now what?              \n              *choice\n                #Ask about the 50 Sol note.\n                  *set time +2\n                  *label 50\n                  You show the shopkeeper the 50 Sol note.\n                  *if ica >2\n                    He looks at the picture closely.  Soon, a look of recognition crosses his face.\n                    \"Ah, Huacachina!\" He says.\n                    \"Go Ica.  Go Huacachina.  Here, here!\"  He continues.  It seems you now have a destination to go to.  You leave the shop.\n                    *goto leave\n                  *else\n                    \"Ah, go Ica!\"  He says.  Simple enough instructions.\n                    *set ica 3\n                    You leave the shop.\n                    *goto leave\n                #Leave the shop.\n                  *set time +1\n                  *goto leave\n            #Ask about the 50 Sol note.\n              *set time +2\n              *goto 50\n      #An internet cafe\n        *set time +3\n        You are in luck.  Just a short walk from the hotel you find a place called Papa's PC's.  You walk into a slightly seedy place.\n        Each computer is in it's own cubicle and each cubicle has a curtain.  Not many people are here at this early hour.\n        *goto internet1\n      #Find somewhere to exchange my dollars to Nuevo Sols (Peruvian money)\n        You walk along the street until you find a bank.  Inside you ask to exchange your dollars to sols.  The exchange rate is 3 Sols to the Dollar.  This means if you \n        change $100 you will get 300 Sols.  You currently have ${money} dollars and ${sols} Sols.  \n        *label moneychange\n        How much will you change?\n        *choice\n          #$100\n            *set dollarchange 100\n            *goto dollarcheck\n          #$200\n            *set dollarchange 200\n            *goto dollarcheck\n          #$300\n            *set dollarchange 300\n            *goto dollarcheck\n          #$400\n            *set dollarchange 400\n            *goto dollarcheck\n          #$500\n            *set dollarchange 500\n            *goto dollarcheck\n          #I've changed my mind.  I wont change anything.\n            *goto leave\n        *label dollarcheck\n        *if dollarchange > money\n          You don't have that much money!\n          *goto moneychange\n        *else\n          *set money money-dollarchange\n          *set dollarchange 3*dollarchange\n          *set sols sols+dollarchange\n          You now have ${money} dollars and ${sols} Sols.\n          You leave the bank.\n          *goto leave\n      #The beach\n        *set time +10\n        With your partner you head towards the coast.  It doesn't take too long to get close.  Soon, you come to a busy road.\n        After crossing the road, you are at a group of stalls and restaurants above a cliff.  Looking down, you can see the beach far below.\n        Do you want to find a way down?\n        *choice\n          #Yes, let's go down.\n            *set time +5\n            *label beach1\n            You find some stairs which lead down to the beach.  After a few minutes you reach the ground.  The beach here is pebbled and the ocean looks calm.\n            Some children are here skimming stones.  A man is walking his dog.  \n            *label beach2\n            How should you proceed?\n            *choice\n              #Talk to the man with the dog.\n                *set time +1\n                *label dog\n                *if  huacachina > 2\n                  The man takes a look at the 50 Sol note.  After looking at the picture, he tells you that you need to go to Ica.\n                  There's an Oasis there called Huacachina.  You now know where to go!\n                  *page_break\n                  *goto beach2\n                *else\n                  The man looks at the note and shrugs his shoulders.  He says something in Spanish that you don't understand before walking away.\n                  *page_break\n                  *goto beach2\n              #Talk to the children skimming stones.\n                *set time +1\n                As you approach the children, they whisper something together then run away.  For some reason, you spooked them.\n                You decide to speak to the man with the dog instead.\n                *page_break\n                *goto dog\n              #Walk along the beach.\n                *set time +2\n                \"Where are you going?  We need directions!\" Shouts your partner.  Maybe you should do something else first.\n                *choice\n                  #Talk to the man with the dog.\n                    *set time +1\n                    *goto dog\n                  #Talk to the children skimming stones.\n                    *set time +1\n                    As you approach the children, they whisper something together then run away.  For some reason, you spooked them.\n                    You decide to speak to the man with the dog instead.\n                    *page_break\n                    *goto dog\n              #Sit and watch the ocean.\n                *set time +2\n                Deep blue water.  Crisp, white waves.  Sublime, clear, blue sky.  This would be heaven if there wasn't someone shouting in your ear.  \n                It's your partner.\n\n                \"We don't have time to sit around looking at the sea!  This is a race!  COME ON! Let's go!\"\n                *set leadership -15\n                *page_break\n                ${partner} asks a woman about the 50 Sol note.  \n                *if partner = \"Dan\"\n                  He\n                  *goto she\n                *else\n                  She\n                  *label she\n                  comes back to you and tells you that you need to take a bus to Ica and find a place called Huacachina.\n                  Reluctantly, you leave the ocean behind and follow ${partner}.\n                  You head to the bus station.\n                  *goto bus\n              #Leave the beach.\n                *set time +4\n                *goto leave\n          #No, I'll look at the stalls and restaurants.\n            *set time +2\n            There are lots of souvenir stalls selling various bits and pieces.  There are also a selection of restaurants selling predominantly\n            western looking food.  There's nothing really interesting here.\n            *choice\n              #Talk to someone.\n                *set time +3\n                There is a tourist information desk here.  It seems like the best place to ask for advice!  You show the woman working there your 50 Sol note.\n                After a quick look at the picture on the note, she tells you that you probably need to go to Huacachina, an Oasis in Ica.\n                The best way to get there is by bus.\n\n                *set ica 3\n                You hail a taxi and head to the bus station.\n                *goto bus\n              #Go down to the beach.\n                *set time +5\n                *goto beach1\n      *if cg>2\n        #The airport\n          *set time +1\n          *label air\n          Would you like to take a taxi or a bus?\n          *choice\n            #I'll take a taxi.\n              *set time +30\n              You hail a taxi and soon you are on your way.  30 minutes later you arrive at the airport.  You pay the driver and go inside.\n              *label port\n              Back at the airport, there are less people here during the day.  What would you like to do now?\n              *choice\n                *if ica >2\n                  #Fly to Ica.\n                    *set time +15\n                    You go to all of the flight desks but it's the same story at every one.  They don't fly to Ica.  In fact, you're told that there is\n                    no airport in Ica, but the nearest one is at Pisco.  They don't fly there either.  The last desk you ask at recommends that you take a\n                    bus instead.\n\n                    You're wasting a lot of time here.  What do you want to do?\n                    *choice\n                      #Find the closest flight, wherever it is.\n                        *set time +10\n                        After a lot of searching, you are finally told that the closest airport to Ica is Lima.  You're already here.\n                        What should you do now?\n                        *choice\n                          #Go to the bus station.\n                            *set time +25\n                            You take another taxi and head to the bus station.\n                            *goto bus\n                          *if cg>2\n                            #Fly to Machu Pichu instead.\n                              *set time +15\n                              *goto machu\n                      #Go to the bus station.\n                        You take another taxi and head to the bus station. You take another taxi and head to the bus station.\n                        *label bus\n                        *set time +25\n                        After 30 minutes you reach the bus station.  You quickly check the times for buses to Ica.\n                        There are only two buses, at 13:30 and 14:00.\n                        *if time \u003c710\n                          It seems you are the first team here!  That was good going.  \n                          *label bustickets\n                          *temp dollars2\n                          *set dollars2 false\n                          *if money>59\n                            *set dollars2 true\n                          *temp sols2\n                          *set sols2 false\n                          *if sols>155\n                            *set sols2 true\n                          Bus tickets cost 78 Sols each, or you can pay $30 each.\n                          *choice\n                            *selectable_if (dollars2) #Pay in dollars.\n                              *set money -60\n                              You pay and wait for the bus.\n                              *finish\n                            *selectable_if (sols2) #Pay in Sols.\n                              You pay and wait for the bus.\n                              *set sols -156\n                              *finish\n                        *elseif time \u003c810\n                          Some other teams are already here.  It seems they were faster than you!  \n                          *goto bustickets\n                        *else\n                          You are too late for the first bus but can still make the second one.\n                          *goto bustickets\n                      *if cg>2\n                        #Fly to Machu Pichu instead.\n                          *set time +15\n                          *goto machu\n                *if cg >2\n                  #Fly to Machu Pichu.\n                    *set time +15\n                    *label machu\n                    You look at the check-in desks and see one with a huge picture of Machu Pichu above it.  It looks promising.  You ask about the flight, which actually goes to Cusco, the nearest major city near Machu Pichu.  There is one leaving at 11:15 which costs $320 per person.  There is another leaving 30 minutes later which costs $179 dollars per person.  Seeing as you only have ${money} dollars and ${sols} sols for the race, you will have to take the later flight.\n                    *page_break\n                    The time waiting for your flight passes quickly.  There's no sign of the ${american} team, but it seems that the Canadian/German team did decide to take the flight as well!  They meet you at the departure gate.  Together, both your team and theirs board the plane.  It is a short 80 minute flight and you arrive at a very wet Cusco on time.\n                    *page_break\n                    At Cusco airport, you start asking how to get to Machu Pichu.  Carmen, the German, spots a tourist stand and after talking you find that you can take a train from the train station every day at 7:42am.  It's not even 3pm now, and there are definitely no other teams here, so you decide to check out the station now before flying tomorrow morning.\n                    *page_break\n                    The station is easy to get to and you all buy tickets at 147.95 Sols ($50) each.  Your money is all but gone.  You realise that you can't afford a hotel for the night, so the four of you sleep outside the station.  It's a long night, not helped by the pouring rain.  The next morning, you awake with a feeling of optimism.  The rain has stopped.  7:42 soon arrives and you board the train feeling good.\n                    *page_break\n                    The train meanders through mountain passes and the views outside are amazing.  You pass small huts and houses.  Remote villages.  You see steep, tree-covered mountains as you pass through valleys.  Not long after a lunch of tuna sandwiches, you arrive at Aguas Calientes.  From here, you are told, it's a four or five hour walk to Machu Pichu.\n                    *page_break\n                    To start with, you walk with Carmen and Carmelina.  From the beautiful, tropical village of Aguas Calientes, you walk along a riverside road that takes you to the base of Machu Pichu.   Soon, you are walking up a seemingly never ending staircase which is hidden amongst a dense forest of trees.  There is definitely a tension in the air; both excitement and anxiety.  You are all in a remarkable place, yet none of you have forgotten that you are in a race.\n                    *page_break\n                    After what must be hours, all four of you are feeling the strain.  The stairs, made of stone, have been zig-zagging up and seem to continue indefinitely.  There are occasional breaks in the stairs where you cross a road, also headed to Machu Pichu, which zig-zags further around than the staircase.  It's very hot here.  Humid.  For the umpteenth time, you stop to drink your water.  Carmen, who was walking alongside you, decides this is the time to race.  She grabs Carmelinas arm and shouts something in German.  The meaning is clear as the two girls start rushing up the stairs faster than before.  Faster and ahead of you and ${partner}.\n                    *page_break\n                    *if stamina > 40\n                      Together, you and ${partner} react.  You both move faster and faster, racing to catch the two girls.  You are in good shape and your stamina serves you well.  You are able to catch the girls.  Just in time, so it would seem!  As you overtake Carmen at the front, the trees disperse and the end of your journey appears!\n                      *page_break\n                      Well... almost.  You arrive at the entrance to Machu Pichu and have to show your passport to enter.  It doesn't take long and you are soon inside the complex, crucially, ahead of the two girls.  They will need a miracle to beat you now.\n                      *page_break\n                      The miracle doesn't come.\n                      *page_break\n                      But a disaster for you all does.\n                      *goto pichu\n                    *else\n                      Together, you and ${partner} react.  You both move faster and faster, racing to catch the two girls.  However, despite being able to beat the girls in a race, your stamina deserts you.  With  Carmen at the front, the trees soon disperse and the end of your journey appears.\n                      *page_break\n                      Well... almost.  You arrive at the entrance to Machu Pichu and have to show your passport to enter.  It doesn't take long but the girls are ahead.  You need a miracle to beat them to the finish line now.\n                      *page_break\n                      The miracle doesn't come.\n                      *page_break\n                      But a disaster does.\n                      *label pichu\n                      *achieve explorer\n                      Machu Pichu is a huge site.  The morning fog has lifted and you arrive on a beautiful day with the sun high in the sky.  Tourists, thankfully not too many, are busy taking photos while touring the site.  You and your partner are more interested in finding the end of the race.  However it seems you, and the girls, have made a dreadful mistake.  There is no flag.  No one to greet you.  No end of the race.  And, unfortunately, no going back as it took nearly all of your $500 to get here.\n                      \n                      You, along with the girls, made a huge mistake in coming to Machu Pichu.  It was the wrong place to go.\n                      \n                      Your race ends here.\n                      *page_break\n                      Epilogue\n                      \n                      After contacting the organisers of the event via telephone it is arranged for you to be flown back to Lima.  From there, you are put onto a flight back home to ${country}.  Your return is feeble and you go back to your old life.\n                      \n                      Your partner, ${partner}, spreads rumours of your poor leadership.  These soon pass and you never hear from ${partner} again.\n                      \n                      You later learn that the ${american}s went on to win the race.  You wonder what might have been if you had done things differently.  Unfortunately, you will never know.\n                      *page_break\n                      Well, maybe you will.  All you have to do is click and you can try it all again.  Perhaps take a different partner.  Change your attributes.  Choose a different route!  What are you waiting for?  It's time to start afresh and have one more go!\n                      *line_break\n                      THIS IS ENDING 2 OF 4.  MACHU PICHU ENDING COMPLETE\n                      *goto_scene ending\n            #Definitely a bus.\n              *set time +45\n              You find a bus stop and wait.  Soon enough, a bus comes by headed to the airport.  You pay and get on.  That was lucky.\n              45 minutes later, you reach the airport.  You go inside.\n              *goto port\n      *elseif ica>2\n        #The airport\n          *set time +1\n          *goto air\n      *if ica>2\n        #The train station\n          *set time +2\n          *label train1\n          *if train =3 \n            You hail another \n            *goto train2\n          *else \n            You hail a taxi \n            *goto train2\n            *label train2\n            and ask to be taken to the train station.  The driver seems confused.  \"No train.\"  He says.  What do you do?\n            *choice\n              #Insist that he goes to the station.\n                *set time +2\n                *label protest\n                The driver continues to protest.  \"No train, no train.\"  He says.  I don't think you will get much further with him.  What do you do?\n                *choice\n                  #Press him more.\n                    *set time +2\n                    *goto protest\n                  #Get another taxi.\n                    *set time +4\n                    *set train 3\n                    *goto train1\n              #Ask for the bus station instead.\n                *set time +1\n                He finally smiles and says \"OK.\"  He then takes you to the bus station.\n                *page_break\n                *goto bus\n              #Get another cab.\n                *set time +4\n                *set train 3\n                *goto train1\n      *if ica>2\n        #The bus station\n          *set time +1\n          You hail a cab and ask to go to the bus station.  The driver smiles and starts driving.\n          *page_break\n          *goto bus\n", "17ica": "*temp water\n*set water 0\n*temp drink\n*set drink \"no\"\n*temp stamcheck\n*set stamcheck false\n*temp stamcheck2\n*set stamcheck2 false\n*image map2.jpg\n\n*if cg=10\n  *set time 1110\n  You arrive at Ica at 6:30 exactly.  Who would have known that Peru buses can run on time!\n  The bus ride was pleasant enough.  The bus had large individual seats for each passenger.  The teams on your bus were the Koreans and the Indians.\n  *goto poster\n*else\n  *set time 1085\n  You arrive in Ica five minutes later than expected. It is now 6:05pm.  The bus ride was pleasant enough.  The bus had large individual seats for each\n  passenger.  The teams on your bus were the ${americans}, Australians, Russians, Spanish, and the French. Seeing as this is likely the fastest route to Ica\n  you are likely to be with the top 6 teams! The next bus, assuming it isn't delayed, is due to arrive in 25 minutes.  \n  *label poster\n  At the station, you see a poster advertising Huacachina.  The resort is to the west of the city, just 5km outside of Ica.  \n  *label Ica_arrive\n  *page_break\n  Ica is a small but busy place. Mini cars that look like they belong in India beep unusual and varied horns repeatedly. People bustle around, seemingly\n  in a hurry. The midday air is dusty, but pleasant. The heat from the sun is offset by a gentle breeze. This is a very different place to Lima. Instead of\n  modern buildings mixed with traditional houses, here all the buildings look old. There is a strong feeling of poverty.\n  What will you do now?\n  *choice\n    #Find a shop first.\n      You find a cheap newsagent and buy the one thing you need right now.  Water!  You buy 4 500ml bottles.\n      *set water 4\n      *set money -2\n      *if money\u003c0\n        *set sols sols+(money*3)\n        *set money 0\n      Now, will you take a taxi or start walking to Huacachina?\n      *choice\n        #Walk\n          *goto walker\n        #Taxi\n          *goto taxier\n    #Start walking\n      *label walker\n      Huacachina is about 5km away.  Will you walk or run?\n      *choice\n        #Walk at a reasonable pace.  Let's not be crazy here!\n          *set stamina - 10\n          *set time + 35\n          *If luck >35\n            *set time +15\n            *goto arriveH\n          *else\n            *goto sandroad\n        #Run as fast as my body will allow.\n          *set stamina - 25\n          *set time +20\n          *If luck >40\n            *set time +15\n            *goto arriveH\n          *else\n            *label sandroad\n            After going for 15 minutes, you reach the outskirts of Ica.  The houses here are very poor and the people in the streets watch you as you pass by.\n            You wouldn't want to walk here at night but feel safe enough for now.  Soon, the last houses disappear and the road opens up.  Every direction, all\n            you can see are vast dunes of sand.  With the heat of the sun bearing down on you, you hope that you don't have much further to go.\n            *if leadership\u003c45\n              A few minutes later, ${partner} stops walking.  \n              \"Hey, ${name}.  What are we doing?\"\n              *choice\n                #Suggest that we keep going.  It can't be much further.\n                  ${partner} laughs.  \"This is crazy!  I'm going back.  We must have gone the wrong way.\"\n                  *choice\n                    #Agree with ${partner} that you may have got it wrong and turn back.\n                      *label goback\n                      *set time +15\n                      You start walking back towards Ica.  \n                      *label house\n                      *page_break\n                      At the first house you see, you approach an old woman who is hanging out laundry and show her the 50 sol note while saying \"Huacachina\".  She says\n                      something in Spanish and points to the right, roughly south of the road you are on.  \n                      *page_break\n                      You start walking along the path she suggested and after a few minutes, you can see a main road in the distance.  The closer you get to the road, the\n                      better you feel.  Eventually, you can even see tourists walking along this path, clearly also going to Huacachina.  20 minutes later, you finally arrive\n                      at Huacachina.\n                      *set time +20\n                      *label arriveH\n                      *page_break\n                      You arrive at the resort of Huacachina.  All around you are sand dunes.  With the hot sun still bearing down, it feels like you are in a desert.\n                      Behind you, the dust road trails away.  The road ahead curves to the left revealing a path down to a beautiful oasis.  Tropical trees surround the water,\n                      as do many shops, stalls and restaurants.  Music is playing and the place has a festive atmosphere.  The area is big.  You will have to search for the\n                      checkpoint.  You might want to check out the shops as well.  In this heat, water would be a good idea.\n                      You are currently on the east side of the oasis.  What do you want to do?\n                      *choice\n                        #Go right, towards the shops.\n                          You go around the oasis towards the shops.\n                          ${partner} looks longingly at the refreshingly cold bottles on display in the shop window.\n                          *line_break\n                          Will you get some?\n                          *choice\n                            #Stop and buy water.\n                              *set time +3\n                              *label buywater\n                              You stop at the nearest shop and buy four bottles of water for 6 Sols.  \n                              *line_break\n                              *if sols>6\n                                *set sols-6\n                                You drink heartily to replenish your energy.  That sun is hot!\n                                Feeling refreshed, you start moving again.\n                                *goto drinkytime\n                              *else\n                                set money -5\n                                As you don't have enough Sols to pay, you reluctantly give up $5 for the water.\n                                You drink heartily to replenish your energy.  That sun is hot!\n                                Feeling refreshed, you start moving again.\n                                *label drinkytime\n                                *set stamina + 20\n                                *if drink = \"no\"\n                                  *goto farside\n                                *else\n                                  *goto theclimb\n                            #Keep going past the shops.\n                              *goto farside\n                        #Go left, past the restaurants.\n                          You move past the restaurants to the far side of the oasis.  There is still no sign of the checkpoint.\n                          *line_break\n                          And then you see it!\n                          *label farside\n                          *page_break\n                          *set time +10\n                          At the top of the nearest dune is a large flag pole stabbed into the sand.  The words \"Mendez Run\" are emblazed across the flag.  You move with a\n                          renewed vigour.\n                          *label theclimb                          \n                          *page_break\n                          Negotiating your way to the top of the sand dune will take a lot of stamina.  If you run hard, you will get there quicker, but you will lose a lot\n                          of stamina.  You could walk at a steady pace which would be less exhausting, or you could take your time and go slowly.  What will you do?\n                          *if stamina>25\n                            *set stamcheck true\n                          *if stamina>15\n                            *set stamcheck2 true\n                          *choice\n                            #Push hard! (-25 stamina)\n                              *set stamina -25\n                              *set time + 15\n                              *goto up\n                            #Go at a steady pace. (-15 stamina)\n                              *set stamina -15\n                              *set time +25\n                              *goto up\n                            #Take it easy. (-10 stamina)\n                              *set stamina -10\n                              *set time +35\n                              *label up\n                              You start the difficult climb up the side of the sand dune.  With every step up, you find yourself coming back down nearly the same amount.\n                              It is a gruelling climb, not helped by the heat of the sun.\n                              *if partner = \"April\"\n                                April is clearly struggling with the task, so you do the right thing and carry her on your back.  It's not easy, but progress is better than\n                                letting her go alone.\n                                *set time +5\n                                *goto top\n                              *else\n                                Your partner is managing a little better than you, but also finding it difficult.\n                                *label top\n                                After what seems like an eternity, you finally make it to the top. \n                                *line_break\n                                Just a few steps more.  Then.  Yes!  You've made it!\n                                It's only now that you take in your surroundings.\n                                You are at the top of a huge sand dune.  Far below and behind you is the oasis of Huacachina.  In every other direction you can see nothing but sand.  Directly in front of you is the Mendez flag and the man himself is standing next to it.  He shakes your hand.\n                                \"Congratulations.  You made it to Huacachina!\n                                *page_break\n                                *if  rule2 = \"broken\"\n                                  But you broke the rules.  You used the internet while you were in Lima.  As such, you will have to wait an hour before I can let you finish\n                                  this leg.\"  Mendez has a distinct smile on his face as he says this.  You have no choice but to sit and wait for an hour on the sand.  \n                                  *page_break\n                                  *set time +60\n                                  The 60 minutes pass slowly and you watch the sun slowly go down on your first full day in Peru.  Eventually, Mendez calls you back.\n                                  \"Okay, well done.  You can finish now.\n                                  *goto teamno\n                                *else                     \n                                  *label teamno\n                                  *if time \u003c1140\n                                    \"You are also the first team to arrive!  Well done!\n                                    *set position 1\n                                    *goto icadone\n                                  *elseif time \u003c1160\n                                    You are the second team here!\n                                    *set position 2\n                                    *goto icadone\n                                  *Else\n                                    *if time \u003c1180\n                                      You are the third team here.\n                                      *set position 3\n                                      *goto icadone\n                                    *elseif time \u003c1190\n                                      You're the fourth team to arrive.\n                                      *set position 4\n                                      *goto icadone\n                                    *else\n                                      *if time \u003c1200\n                                        You are the fifth team.\n                                        *set position 5\n                                        *goto icadone\n                                      *elseif time \u003c1210\n                                        However, you took a long time to get here.\n                                        You are the sixth team.\n                                        *set position 6\n                                        *goto icadone\n                                      *else\n                                        *if time \u003c1230\n                                          However, you took a long time to get here.\n                                          You are the seventh team here.\n                                          *set position 7\n                                          *goto icadone\n                                        *else\n                                          However you took a long time to get here.\n                                          But you're not the last team!  We're still waiting for one more.  That makes you eighth!  You'll have to work harder tomorrow!\n                                          *set position 8\n                                          *label icadone\n                                          *set alltime time\n                                          *gosub showtime\n                                          For now, it's time to rest.  There's a helicopter behind me that will fly you to Nazca.  Maybe you've heard of it!  Once there,\n                                          you will have a little free time.  The race will continue tomorrow at 11am!\n                                          *page_break\n                                          You board the helicopter and soon the rotors are spinning.  Sand kicks up all around and the noise is deafening.\n                                          Before long, you are airborn.  Huacachina shrinks away as you fly higher and further.  The noise and excitement of the helicopter give\n                                          way to monotony and tiredness.  Soon, you drift away into a deep sleep.\n                                          *if dream > 1\n                                            *page_break Dream\n                                            *goto 18dream2 \n                                          *else\n                                            This day is done.\n                                            *page_break\n                                            *finish Leg 2: Incan Lines\n                            *if drink = \"no\"\n                              #Go back to the shops and get some water.  I need to replenish some stamina.\n                                *set drink \"yes\"\n                                *set time +10\n                                *goto buywater\n                        #Head straight to the oasis edge.\n                          You head down to the water's edge and look out across the oasis.  Aside from a few boats on the water and tourists walking around, there is no sign\n                          of the checkpoint.  What will you do?\n                          *choice\n                            #Go back up and around to the other side.\n                              You head back up and go around the oasis to the far side.\n                              *set time +5\n                              *goto farside\n                            #Try to take a boat across. \n                              You wave and shout to the people on pedalos.  They point to a dock at the far side of the oasis.  It seems you will need to go around on foot to\n                              get a boat to get across the oasis.  Pointless.  You turn back and walk around the oasis the long way.\n                              *set time +10\n                              *goto farside\n                    #Time to be stubborn.  ${partner} is wrong.  We need to keep going.\n                      *set leadership -10\n                      *goto walking\n                #Suggest that we turn back.  We must have picked the wrong road.\n                  ${partner} laughs. \n                  \"Come on.  This must be right.  Just a little further, surely.\"\n                  *choice\n                    #Tell ${partner} that you are the leader in the team and you should head back now.  This is clearly the wrong way.\n                      *set leadership +10\n                      *goto goback\n                    #Agree with ${partner} that you are probably going the right way.  You were wrong to suggest going back.\n                      *set leadership -5\n                      *goto walking\n            *else\n              *label walking\n              A few minutes later and everything is still the same.  Sand dune after sand dune.  No signs of any people anywhere.  No sign of even a car on this dusty road.\n              *set time +15\n              *set stamina -5\n              You walk on but feel more and more uneasy with every step.  Is this really the right way?  ${partner} is also concerned that you are going the wrong way.  Do you want to suggest going back?\n              *choice\n                #Yes.  I guess this is the wrong way.\n                  ${partner} doesn't look happy.  Together you walk in silence back towards Ica.  After 30 minutes, you see the first houses.\n                  *set time +30\n                  *goto house\n                #No.  We've started walking this way.  We should still push on.\n                  You are now determined to find Huacachina along this road.  However, the further you go, the more wrong this route clearly is.  In your mind is the thought that for every step forward you make, you will have to go back a step further.  Finally, after another 30 minutes of walking and still no sign of life, your partner stops walking.\n                  \"I'm sorry, but this is clearly the wrong way.  Let's go back.  Hopefully we haven't gone too far off course.\"  You agree and start the long walk back to Ica.  After an hour, you see the first houses.\n                  *set stamina -10\n                  *set time +60\n                  *goto house\n    #Find a taxi\n      *label taxier\n      *set time +1\n      You stand near a busy road and lift your arm to hail a taxi. Instantly, one of the little cars pulls up to you.\n      *line_break\n      *line_break\n      \"Hello ${skin} ${boygirl} Where will you go?\"\n      You ignore his greeting as nothing more than bad English and tell him:\n      *choice\n        #\"Go to Huacachina, Peru guy.\"\n          How do you pronounce Huacachina?\n          *label speak\n          *set time +1\n          *choice\n            #Hwa Ka Chy Na\n              *label wrong\n              \"Que?\" Asks the driver.\n              *goto speak\n            #Hwa Ka Chee Na\n              The driver nods.\n              *goto drive\n            #Hwa Ka Shy Na\n              *goto wrong\n            #Hwa Ka Shee Na\n              *goto wrong\n            #Wa Ka Chy Na\n              *goto wrong\n            #Wa Ka Chee Na\n              *goto wrong\n            #Wa Ka Shy Na\n              *goto wrong\n            #Wa Ka Shee Na\n              *goto wrong\n            #Let's try something else\n              What will you try?\n              *choice\n                #We'll walk instead.\n                  You climb out of the taxi and start to walk.\n                  *goto walker\n                #The 50 sol note\n                  The driver looks at the note. \n                  *label drive\n                  \"Ah, Huacachina!\" he says with recognition. \"No problem!\" with that he starts driving. Slowly.\n                  *set time +10\n                  The traffic on this road is very busy and the hot sun is making the ride unbearable.  You have been stuck barely moving for 10 minutes now.\n                  Do you want to keep waiting?\n                  *choice\n                    #Yes, it's quicker than walking.\n                      *set time +5\n                      Another 5 minutes passes.  That's 300 seconds of listening to strange horns, sitting in an open sauna, and smelling the polluted fumes\n                      of far too many vehicles.  You have started moving, but it's still very slow.  Will you wait more?\n                      *choice\n                        #Er, yes... I guess.\n                          Finally, the traffic eases and you start moving at a good pace.  7 minutes later you arrive at Huacachina.  You pay the driver and\n                          climb out of the taxi.\n                          *set money -5\n                          *if money\u003c0\n                            *set sols sols+(money*3)\n                            *set money 0\n                          *set time +7\n                          *goto arriveH\n                        #No, this is silly.  Better to walk instead.\n                          *goto walker\n                    #No, we'll walk instead.\n                      *goto walker\n*label showtime \n*temp mns \n*set mns time - 660\n*temp hrs \n*set hrs 0 \n*temp diff \n*set diff 0 \n\n*label loop \n*set diff mns - 60 \n*if diff > 0 \n  *set hrs + 1 \n  *set mns - 60 \n  *goto loop \n*else \n  *if hrs > 0 \n    You took ${hrs} hours and ${mns} minutes to get here.\n    *return \n  *else \n    You took ${mns} minutes to get here.\n    *return \n\n*label 18dream2\nYou begin to dream.\nOnce again you dream of the mysterious, yet enchanting young woman.  This time you are in a large enclosure with many low levelled buildings, all made of\nstone and painted in strong colors.  You are outside in a maze of alleyways.  Overhead, the sun is blazing down yet the sky is a cloudless, vibrant blue.\nThe woman is holding your hand and you are walking through the pathways together.\n*choice\n  #Ask her name\n    Together you stop and you turn to face her.  As you open your mouth to speak, you are startled by a loud thud behind you.\n    *goto thud\n  #Kiss her\n    You tilt her face slowly towards you.  She tries to conceal a smile but it's too late.  She can't hide her delight.  As you bring your lips towards hers,\n    you are startled by a loud thud behind you.\n    *goto thud\n  #Squeeze her hand\n    You gently squeeze her hand.  She looks at you and smiles, her eyes dancing as she looks at you.  She is about to say something when you are both startled\n    by a loud thud behind you.\n    *label thud\n    You spin around to see three figures dressed in black holding swords.  They look like ninjas from a movie.  They move towards you at speed.\n    *if power = \"fly\"\n      You instinctively jump into the air and somehow manage to stay there.  It seems as if you have the power to fly!  You still have a problem though as you have\n      left the mysterious woman below alone.  You feel compelled to do something and swoop down to help her.  Moving quickly, you fly feet first and kick one of the\n      ninjas in the head with force.  He drops to the ground, losing his sword in the process.  The other two ninjas stop and turn to address you.  It's time to act.\n      How will you handle this?\n      *choice\n        #Use my super strength to fight them.\n          The two ninjas advance slowly towards you.  You wait until they are close before acting.  Then, when you sense the time is right, you charge the nearest ninja\n          and hit him with your fist in the jaw with all your strength.\n          *if strength >50\n            There is a deafening crack and blood spurts from the ninja's mouth in an arc over your shoulder.  You don't hesitate and hit him again, this time in the\n            stomach.  He folds down on his knees allowing you to give one final kick to his head.  A sickening crack is heard as the ninja flails back, neck twisted until\n            he lays motionless on the ground.  You turn to face the third ninja who is stood a long shadow away from you.  He is holding his sword aloft in a defensive\n            posture.  You take one step towards him and he takes one step back.  Again, you step towards him.  Again, he moves in synchronicity with you.  After a pause of no\n            more than a blink of the eyes, you charge the ninja.  This has the desired effect and the ninja drops his sword and runs away from the fight.  You stop running and\n            turn to the woman again.  You see her walking towards you, saying something you can't quite hear yet.  You walk towards her and she speaks again.  This time it's\n            clearer.\n            *line_break\n            *line_break\n            \"${name}, we're here.  Wake up.\"  Then you realise what has happened.  The voice doesn't belong to the woman, but it's ${partner}'s voice.  Your dream is\n            ending.  You wake up.\n            *goto partners_dream\n          *else\n            You feel extreme pain in your hand but are satisfied to see blood on the ninjas head mask.  However, the ninja has barely moved and doesn't seem hurt.\n            It's now the ninja's turn to attack and he doesn't use his fists.  With one swift turn of his arm he slices his sword through your neck and you find yourself\n            falling and spinning through the air.  Eventually you stop and you look in the only direction you can.  You see the knight standing over a headless body.\n            Your headless body.  You have been decapitated.  Three thoughts simultaneously shoot through your mind.  First, why didn't your super strength work?  Second,\n            who is the woman?  Third, why are you not awake yet?  With this last thought, you do exactly that.  You wake up.\n            *finish Leg 2: Incan Lines\n        #Pick up the woman and fly away.\n          You turn back to the woman and run towards her, arms outstretched.  You grab hold of her and jump up into the air, her arms around your waist.  You soar up, out of\n          enclosure and into the sky.  The ninjas throw small knives or daggers, but they are too late.  You are already clear.  The feel of this mysterious girls hair on your\n          face fills you with warmth.  You stop flying, floating, mid-air.  You stare into her hazel-brown eyes, enamoured by her beauty.  She opens her crimson lips and\n          whispers your name.  You smile, knowing that you don't have any more time.  It is time to wake up.\n          *finish Leg 2: Incan Lines\n        #Take the sword and fight, using my power of flight to help me.\n          You dive to the ground, skidding across until you reach the sword.  With weapon in hand, you rise to your feet and on, up, until you are hovering just above the \n          ground.  Together the ninjas attack with their swords raised high.  Each time you parry and find it easy to manouver through the air so your body is out of harms\n          way.  You then become more adventurous, flying higher, then swooping down.  Twisting spirals through the air causing the ninjas to spin on their heels while lunging\n          at air.  Your third dive and parry allows you to get the upper hand on both ninjas.  You have landed just behind them and they both have their backs to you.  With one\n          swift horizontal slice of your blade you chop through the necks of both assassins.  Heads roll across the dirt.  Headless bodies fall to the floor.  Your victory is \n          sealed. You turn to the woman. You see her walking towards you, saying something you can't quite hear yet.  You walk towards her and she speaks again.  This time it's\n          clearer.\n          *line_break\n          *line_break\n          \"${name}, we're here.  Wake up.\"  Then you realise what has happened.  The voice doesn't belong to the woman, but it's ${partner}'s voice.  Your dream is\n          ending.  You wake up.\n          *goto partners_dream        \n    *if power = \"strong\"\n      You move your body to a protective stance and get ready to fight the ninjas.  The first one reaches you, so you brace yourself with a vain plan to grab his sword from\n      him before he can cut you.  Your plan works, but not as expected.  You grab the sword between your armpit and take the ninja's arm in your hand.  You twist your body and\n      throw the ninja towards the wall.  He flies through the air as if you had just thrown a ball at the wall.  You must be stronger than you thought.  With little time to \n      react before the other two ninjas reach you, you grab the sword from your armpit with your left hand and juggle the sword to your right hand.  It feels lighter than you \n      imagined and moves through the air with pace as you swish the sword forwards.  The ninjas come at you together, causing you to fight them head on.  You parry the first \n      blow, but are cut by the other ninja.  You swing to defend yourself but are again caught.  The ninjas have the upper hand and it's a matter of time before they cut you \n      down.  But something isn't right.  No blood.  You have been cut twice, but don't feel any pain.  After two quick parries and a turn into space you check your body for \n      cuts.  Nothing!  You are unhurt.  The realisation that the ninja blades are failing to affect you gives you confidence.  You rise up and wait for their next attack.  With\n      speed, you stab forwards, exposing your neck but surprising the ninjas with such a bold move.  It works and you manage to penetrate the nearest ninja through his midriff.\n      His gasp aside, you pull hard on your blade to dislodge in from his body.  You now turn to face the last ninja, who is waiting behind you.  He strikes down with his sword\n      but you react fast and block him.  The clash of metal on metal grates through the air and the two swords crossed cause your fingers to touch his hand at the hilt of his \n      sword.  You then drop your sword and reach out to grab his arms.  With alarming ease, you lift him up by both arms and are able to throw the ninja a full thirty yards \n      through the air.  Your strength here has taken on astronomic proportions, allowing you to handle the ninjas with ease.  Once recovered, the last ninja gets to his feet\n      and departs the area.  You have won.\n      You turn to the woman. You see her walking towards you, saying something you can't quite hear yet.  You walk towards her and she speaks again.  This time it's\n      clearer.\n      *line_break\n      *line_break\n      \"${name}, we're here.  Wake up.\"  Then you realise what has happened.  The voice doesn't belong to the woman, but it's ${partner}'s voice.  Your dream is\n      ending.  You wake up.\n      *goto partners_dream\n    *else\n      Instinctively, you shield the woman to protect her.  Suddenly, all of the men stop running.  They look decidedly confused.  You tell them not to come \n      any closer, reaching out with your arm to point as you do so.  However, something isn't right.  You can't SEE your arm.  You look closer now and realise that\n      your whole arm is gone.  Checking both arms and feet, you find the same.  You are... invisible?  That would explain why the men stopped so suddenly.  \n      Now how will you use this to your advantage?\n      *choice\n        #Fight the men.  They won't have a chance.\n          *label invisible_fight\n          While the three men can't see you, you advance towards the first one.  Standing so close to him is still a nervous experience, but you are confident\n          he can't see you.  You reach out slowly and grab his arm.  He looks confused but you don't give him a chance to react.  You squeeze his arm hard and he\n          drops his sword.  Before he can pick it up, you kick it away and then push the ninja to the ground.  The other ninjas say something foreign, then one runs\n          to the fallen ninja and the other runs to the sword.  You follow the sword and pick it up just before the other ninja gets there.  The ninja is\n          clearly scared at the prospect of fighting a floating sword and he backs away slowly.  You, somewhat cleverly, throw the sword at the ninja and it's\n          all he can do just to parry the sword away.  In the same time, you move towards him and charge at his side.  He falls to the ground with a thud.\n          You brush his sword away and twist him onto his back.  You use loose threads from his clothing to tie his arms behind him so he can't move.  As you\n          finish, you realise the other two ninjas are advancing fast.  One with a sword, one without.  The armed ninja is swinging his sword in a wild\n          fashion, hoping to hit you.  It is all too easy for you to slowly walk around the ninja and take him down from behind.  You grab both his arms\n          so he can't move and pull his feet back, causing him to fall flat on his face.  With the sword between his body and the ground, he can't move until\n          you release him.  Which you do, just as his friend moves forwards to help him.  The trapped man lashes out with the sword stabbing his own colleague\n          in the chest.  While stunned by what he has mistakenly done, you knock his sword away and hit him square in the jaw.  As the blow was completely\n          unexpected, the ninja falls to the floor and doesn't get up.  With the three ninjas all incapacitated,\n          you turn to the woman. You see her walking towards you, saying something you can't quite hear yet.  You walk towards her and she speaks again.  This time it's\n          clearer.\n          *line_break\n          *line_break\n          \"${name}, we're here.  Wake up.\"  Then you realise what has happened.  The voice doesn't belong to the woman, but it's ${partner}'s voice.  Your dream is\n          ending.  You wake up.\n          *goto partners_dream\n        #Take the woman to safety.\n          You reach out and take the woman's arm.  Together, you move away from the three ninjas, but the ninjas regain their composure and follow you.  While\n          you have the power of invisibility, the woman does not.  You are left with no choice but to fight.\n          *goto invisible_fight\n  #Run away\n    You let go of her hand and run back the way you came.  She calls out to you to stop.  She shouts out \"Help me!\" but you don't stop running.  Faster and faster\n    you move.  Soon, the painted walls start to blur with your speed.  Faster, then up, and higher and higher you go.  The paths and alleys fall away behind you\n    as you move up into the sky.  Then.  For a moment.  You stop.  You look down to see a vast city below you.  The enclosure you were in is more or less in the centre of \n    the city.  There are several mountains around the city, but one stands out.  A large, snow-tipped mountain, further to the north-east of the city.\n    For a moment, you take in the beautiful sight.  But then reality hits.  You are several hundred metres high up in the air above this city.  With nothing to \n    keep you up here.  Suddenly you start to fall.\n    *label partners_dream\n    *line_break\n    *line_break\n    \"Woah, calm down there ${name}\".  Says ${partner}.  You have woken up.\n    *line_break\n    *line_break\n    *if partner = \"Leonie\"\n      \"Bad dream?\"  She asks.  You nod.\n      *line_break\n      *line_break\n      \"Me, too.  I've found that since this race started, every dream I've had has me desperately trying to run, but my legs don't work.  I keep seeing the faces of different racers; the Russians, the ${americans}, the Indians.  Every time, they are all running faster than me.  Why do you think I keep dreaming like this?\"\n      *fake_choice\n        #Maybe it's a sign.  Maybe you're being warned about what we have to do.\n        #I guess you're just anxious.\n        #I'm sure there's no meaning to it.  It's just a dream.\n      \"I hope you are right...\"  She replies, drifting off into thought.\n    *if partner = \"Dan\"\n      \"You must have been having a really clear dream there.  One of those where you can see everything.  Am I right?\"\n      *fake_choice\n        #\"Yeah, it was vivid.\"\n          \"Ha!  I love dreams like that.  I once dreamt that I was in a boxing ring.  I was fighting against Billy Jenson.  He was my boss at the shoe factory I used to work at.  In the dream, every time I hit him, he squeaked, like a kids toy. Haha,\"  Dan laughs at the memory.\n          *line_break\n          *line_break\n          \"Man, I would love to have another dream like that again.\"  He says.\n        #\"I can't remember.\"\n          \"Sorry to hear that.  I hate it when that happens.  Dreams are so hard to remember.  When I was a kid it was easier, but ever since I left school it's been much harder to remember my dreams.  I reckon they used to put something in the school milk to help you remember.\"  Says Dan, a despondent look on his face.\n    *if partner = \"April\"\n      \"I was scared for a second then.  You were moving in your sleep and you looked upset.  What happened?\"  Asks April, genuine worry written across her face.\n      *choice\n        #\"I'm fine.  It was just a bad dream.\"\n          \"I hate them!  Why do we have bad dreams?  Why can't all dreams be good?\"  She asks.  Then she smiles.\n          *goto april_story\n        #\"It's okay, I was having a really good dream.\"\n          \"Really?  It didn't look like a good dream.  I hope it doesn't happen again.\"  She says.  Then she smiles.\n          *label april_story\n          *line_break\n          *line_break\n          \"I once had a great dream.  I was with my sisters at school, which is funny because they both go to a different school to me.  They were in Mr Hinchliffe's maths class with me and they kept telling me the answers.  Mr Hinchliffe didn't know how I kept getting the answers right!  It was great...\"  She pauses and her smile fades away to a serious stare.\n          *line_break\n          *line_break\n          \"I miss Mr Hinchliffe.\"  She says.  \"He was the best teacher.\"\n    *line_break\n    *line_break\n    Soon, the town of Nazca appears in the distance.  You have nearly reached your next destination.\n    *finish Leg 2: Incan Lines\n", "19nazca": "*page_break\nThe helicopter lands in the town of Nazca and you are transported to a hotel. Not long after checking in you meet the other contestants in the restaurant for some much needed\ndinner. Eight teams are there. It seems the Canadian/ German team didn't make it. You find yourself seated at a table between the Russians and the ${american}. ${partner} takes\nthe menu and asks what you want to eat. You take a look as well and choose:\n*choice\n  #A Rib-Eye Steak\n    *goto eat\n  #The Sea Bass\n    *goto eat\n  #Calamari Salad\n    *goto eat\n  #A Club Sandwich\n    *label eat\n    A good choice.  While waiting for the food to arrive you take the opportunity to talk to:\n    *choice\n      #The ${american} brothers\n        You turn to the ${americans}, Travis and Justin.\n        *if usa = 2\n          You speak to Travis and Justin and quickly the conversation turns to the girls Carmen and Carmelina.\n          *line_break\n          *line_break\n          \"Yeah, that sucks.\"  Says Travis.  \"We were all set to go to Machu Pichu too, but had second thoughts on the way to the airport.\"\n          *if truth = 4\n            *line_break\n            *achieve corrupt2\n            Something about Travis' story doesn't seem right.  You think back to when you saw him by the Lima hotel bar.  \n            *label rememberit\n            What was it you heard them say?\n            *choice\n              #Befriend the German team.\n                *label wrong\n                No... that wasn't it.  Oh well.  Perhaps it wasn't important.\n                *goto nazcabegin\n              #Win the race.\n                *goto wrong\n              #Take out the two Carmens.\n                *set truth 5\n                Yes!  But there was more, wasn't there?\n                *choice\n                  #Take out the two Carmens... first.\n                    Yes!  Which of course implies the ${american} are trying to fix the race!  What's more...\n                    *choice\n                      #The Indians are in on it!\n                        *goto wrong2\n                      #The Russians are in on it!\n                        *goto wrong2\n                      #The Spanish are in on it!\n                        *goto wrong2\n                      #The Koreans are in on it!\n                        *goto wrong2\n                      #The French are in on it!\n                        *goto wrong2\n                      #The Australians are in on it!\n                        *label wrong2\n                        *set truth 6\n                        No, that doesn't make sense.  Oh well, you will definitely have to keep an eye on the ${american} from now on.  They can't be trusted.\n                        *goto nazcabegin\n                      #Someone else is helping them!\n                        *label who\n                        Who? (one or two words.  Spelling is important!)\n                        *input_text accomplice\n                        *if accomplice = \"Mendez\"\n                          *goto mendez\n                        *if accomplice = \"MENDEZ\"\n                          *goto mendez\n                        *if accomplice = \"mendez\"\n                          *goto mendez\n                        *if accomplice = \"ANDRE MENDEZ\"\n                          *goto mendez\n                        *if accomplice = \"andre mendez\"\n                          *goto mendez\n                        *if accomplice = \"Andre Mendez\"\n                          *label mendez\n                          That's right!  Andre Mendez, the founder of the race is helping the ${american} to cheat their way to the top.  But why?\n                          *set truth 100\n                          *choice\n                            #I don't know, but I plan to find out!\n                              How will you do that?\n                              *choice\n                                #I'll confront the ${american} brothers.\n                                  You stop Travis mid-sentence and exclaim. \"I know that you are working with Mendez to fix the race.\"  You are surprised at how calm you managed\n                                  to sound and are even more pleased with the look of horror on the face of Travis.  Justin manages to compose himself first.\n\n                                  \"Um... what are you talking about?\"  He asks, trying to look innocent, and doing quite a good job.  You tell them, and your partner ${partner},\n                                  how you overheard them talking about taking out the Carmens before the race began.  How they conspired and did stop the two girls from racing.\n                                  How you saw Travis with Mendez and how you know they will do the same again.\n\n                                  Travis shakes his head in pity.\n                                  \"I have no idea what you have been drinking.\"  He says with a smile.  \"But I'll definitely have a glass of it!\"\n                                  *page_break\n                                  Insulted, you press on, You know that you have them and they are just sitting here, trying to mock you?  Unacceptable.  You stand up.\n                                  \"Now look here!\"  Says Justin sharply, standing up with you.  \"Unless you have a shred of evidence or otherwise that we have done anything\n                                  wrong, you'd better just keep your trap shut.  We haven't touched the German / Canadian team and we're just trying to have an honest race.\n                                  Mark my words though, if you cross us then we will come down on you like a ton of bricks and make your life hell.\"  Travis is also now\n                                  standing and he still has a grin on his face.\n\n                                  You feel anger.  You know you are right.  And you can tell from that smile... That smug smirk of a smile tells you that you are right.  You\n                                  thump your fist on the table, forks and knives clink from the shock.\n\n                                  All conversations in the room stop as all the contestants watch this exchange between you and the ${american}.\n\n                                  You start to again accuse the ${american} but a hand grabs your shoulder.  Incensed, you lash out, brushing the hand away and slapping the\n                                  offending hand's owner across the face.\n\n                                  The other contestants in the room gasp, all eyes on you.\n                                  *line_break\n                                  ....\n                                  *line_break\n                                  You have just slapped your partner ${partner}.\n                                  *page_break\n                                  *if partner = \"April\"\n                                    After a surprisingly long second, April bursts into tears.  It is the last sound you hear as a few seconds later, the lights go out on your\n                                    world.  Someone, probably one of the ${american}, hit you in the back of the head.\n                                    *page_break\n                                    You awake some time later on a bus. A woman you've never seen before is there.  She looks at you with contempt.\n                                    \"You really are scum.\"  She says.  \"So glad we decided to remove you from the race.  I'd be surprised if April doesn't press charges!\n\n                                    And so ends your race.  You are taken back to Lima and flown back to ${country}.  The ${american} went on to win the race and you are left to\n                                    wonder what might have been.\n                                    *goto_scene ending\n                                  *elseif partner = \"Dan\"\n                                    *set leadership -20\n                                    To his credit, Dan takes it well.  He looks you in the eyes and speaks calmly to you.\n                                    \"I know I ain't the smartest, but I do know right from wrong.  This isn't right and you can't do it.\"\n                                    Many contestants have gathered around now, waiting to see what you do next.\n                                    The moment of clarity gives you time to think things through.  While you are certain that Mendez and the ${american} are working together,\n                                    you have no physical evidence and it is just your word against theirs.  You're going to need some evidence before you can prove anything.\n                                    Reluctantly, you nod to Dan, acknowledging that this exchange is over.  He grabs you in a large embrace and tells you that you did the right\n                                    thing.  Soon, dinner arrives and while you're not in the best frame of mind, the food is actually good.\n                                    *page_break\n                                    *goto nazcabegin2\n
