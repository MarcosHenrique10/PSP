\n  same route around the island.\n  Soon, you approach the first dock.  Several small boats are moored there and you can see what looks like a cafe on the beach.  \n  *if route =2\n    You head on straight past the dock but notice that the ${korean} team are stopping here.\n    The ${american} team keep going straight, level with you.  As you speed through the water ${partner} turns to you and says something you don't hear over the din of the engine.\n    You mouth the word 'What?' so ${partner} comes closer.  \"The ${americans} have slowed down!\"  You look back, and indeed, the ${american} are now 30 metres behind you.  They \n    maintain their position and you keep the boat going as fast as you can.\n    *page_break\n    Roughly an hour after the ${korean} team split from the pack, you reach the second dock.  It is a sandy beach with five small piers to dock at.  An uphill path is the \n    only route from here.  You pull into the first one and look back to see where the ${american} are.  Right behind you is the answer!  Together, ${partner} and you quickly\n    disembark and head up the path.\n    *if partner = \"April\"\n      With April as your partner, the ${americans} are the faster team.  You need to gain as much of an advantage as you can.  April, running alongside you, asks you if you are \n      faster than the ${american}.  Are you?\n      *choice\n        *selectable_if (speedster) #Yes, I think I can beat them both.  I'm fast and my stamina is good.\n          \"Great, then I want you to take them the wrong way.  Distract them.  I will keep going along the path.  You need to give me as much time as you can!  It's the only \n          way we are going to win this race.\"  \n          Your first thought is how the smart girl is only 11 years old!  Your second is how you can distract the ${american}.\n          \"Pretend I'm lost!  Get them to help you find me.\"  You wonder if that will work...  There are lots of places a person could be lost here, but would the ${american}\n          stop?  Would the ${american} care?\n          *page_break\n          Travis and Justin leave their boat and run across the small beach to the path they saw you take just moments before.  \"We'd better move fast.\"  Says Travis.\n          \"No worries, the ${korean} team took the long route and the two from ${country} have that little girl with them.  Can you outrun a little girl, Travis?\"  Replies\n          Justin in jest.\n          \"Woah, what's that?\"  Says Travis.  Ahead maybe fifty metres is ${name} from the ${country} team, walking BACK towards the ${americans}.  \"Guys, am I glad to see you!\"\n          Says ${name}. \"Did you see April back there?  She's gone!  I mean... gone!\"  Justin and Travis look at each other.  \"How long do we have?\"  Asks Justin.  \"About an\n          hour I guess.\"  Says Travis.  \"Alright, we'll help you look.  Ten minutes, if we don't find her, we're going!\"\n          *page_break\n          *if boygirl = \"boy\"\n            *if charisma>40\n              Using your charisma, you manage to persuade the ${americans} to look for 15 minutes.  Then, while Travis is looking one way and Justin is looking the other, \n              you make a run for it!  You just hope that 15 minutes is enough for April yet not too much for you to beat the Spanish!  This is going to be one tough race!\n              *goto conclusion4\n            *else\n              You manage to keep the ${american} looking for 10 minutes until they decide that enough is enough.  As soon as you see them start to go, you make a break for it\n              and get ahead of them.  You just hope you were right when you told April you could outrun them!\n              *goto conclusion4\n          *else\n            Using your female charms, you manage to persuade the ${american} to look for 15 minutes.  Then, while Travis is looking one way and Justin is looking the other, \n            you make a run for it!  You just hope that 15 minutes is enough for April yet not too much for you to beat the Spanish!  This is going to be one tough race!\n            *goto conclusion4\n        #No, I'm slow and I think they will beat me.\n          April looks sad.\n          *line_break\n          *line_break\n          \"Then we just have to do our best.\"  She says.  So brave for a kid so young.  Together, you run as fast as you think you should.  You have about\n          two hours to go.\n          *goto conclusion3\n    *else\n      Together, you run as fast as you think you should.  You have about two hours to go and the ${americans} will be behind you all the way.\n      *goto conclusion3  \n  *else\n    You turn in towards the dock and slow down to moor your boat.  The ${korean} team do the same but the ${americans} keep going straight.\n    Once on dry land, you assess your position.  You are on the dock with a large upward stone staircase ahead of you going West.  To the left is a clear path going up hill\n    West into the island.  To the right, North, is the beach, but you can't see a clear path to follow.  There are no people around Which way will you go?\n    *choice\n      #We'll go up the steps headed West.\n        You begin to ascend the steps.  You are running level with the ${korean} team, however you are faster than them.  Do you want to push ahead of them or keep your pace, \n        just ahead of them?\n        *choice\n          #Go ahead.\n            You quickly move ahead of your competitors and reach the top of the stone stairs.  However, there is nowhere to go from here!  The path is a clear dead end \n            either way, with just a few local houses here.  You will have to go back down.  Will you tell the ${korean} team?\n            *choice\n              #Yes, why not?  We're faster.\n                As you descend the stairs, you shout out to ${sunny} and ${sean}, telling them it's a dead end.  They thank you and turn back to go down again.\n                *goto deadendchoice\n              #No, let them go up themselves.\n                You pass the climbing ${korean} team who wonder why you are going back.  They soon realise though and are following you down again.  You are about 30 seconds \n                ahead of them.\n                *goto deadendchoice\n          #Keep our pace.\n            You head up the stone stairs with ${sunny} and ${sean}.  However, at the top you feel very disheartened.  There is nowhere to go from here.  The path is a clear \n            dead end.  Both teams simultaneously stop, look at each other, then turn and head back down the stairs.  You made a mistake, but at least the ${korean} team made \n            the same error.\n            *goto deadendchoice\n      #We'll take the path headed West.\n        *label path\n        You follow the path and climb higher up into the island.  It's dark, but the moon gives you enough light to see your way.  \n        *if climate = 0\n          *set racetime +10\n          After just 15 minutes, you have to stop for a break.  You are out of breath!  Unbelievably, this simple hill has beat you.  How is that possible?  Then it dawns on\n          you. Altitude.  Due to the size of Lake Titicaca, you are given the appearance that you are at sea level.  However, you are actually at close to 4000 metres above \n          sea level.  Lake Titicaca is the highest navigable lake in the world.  It seems you are suffering from altitude sickness!\n          You stop for 10 minutes, to get your breath, then you continue along the path at a slower pace.\n          *goto climateok\n        *else\n        *label climateok\n        Thankfully, the path soon levels out and you can move a little faster.  It truly is a race now.  You are on this path while the other two teams have taken a different\n        route.  You won't know if you made the right choice until you reach the end.\n        *goto conclusion\n      #We'll follow the beach North.\n        *set racetime +2\n        You look at the beach, but it's a non-starter.  The beach ends abruptly and turns into a rocky cliff, climbing vertically.  You head back.\n        Will you take the stairs or follow the path?\n        *choice\n          #We'll go up the steps headed West.\n            You look up the steps and see ${sunny} and ${sean} ahead of you near the top.  You start the climb to catch them.  But then, you see something odd - both ${sunny}\n            and ${sean} have stopped and they are running DOWN the steps towards you!  You slow down to a stop and they quickly reach you.  \"Dead end!\"  Shouts ${sean}.  \n            *label deadendchoice\n            Together, all four of you head back down to the beach.  The ${korean} team head back to their boat.  They are clearly going to try and catch up with the ${american}, \n            who have a 10 minute lead by now.  What will you do?\n            *choice\n              #Take the path to the West.\n                You follow the path to the west hoping that it will take you in the right direction.  If not, then you are likely to be the last team to finish.\n                *set racetime +10\n                *goto path\n              #Take our boat to the other dock.\n                You quickly get into your boat with ${partner} right behind you.  Once both aboard, you start the engine and are away, thankfully a little ahead of the ${korean}\n                team.\n                The next hour is difficult.  You are being constantly pursued by the ${korean} boat yet know that you are behind the ${american} team.  Only a miracle will\n                help you now!\n                *page_break\n                Finally, you reach the second dock.  You are sickened to see the sight of the ${american} team's boat docked here.  You are about a minute ahead of the ${korean} team \n                who were, for some reason, a little slower than you in their boat.  From this beach, there is one clear uphill path.  ${partner} and you begin to move quickly.\n                You have Nascar racing twins to catch!\n                *if climate = 0\n                  *set racetime +10\n                  However, after just 15 minutes, you have to stop for a break.  You are out of breath!  Unbelievably, this simple hill has beat you.  How is that possible?  Then it dawns on\n                  you; Altitude.  Due to the size of Lake Titicaca, you are given the appearance that you are at sea level.  However, you are actually at close to 4000 metres above \n                  sea level.  Lake Titicaca is the highest navigable lake in the world.  It seems you are suffering from altitude sickness!\n                  You stop for 10 minutes, to get your breath, then you continue along the path at a slightly slower pace.\n                Thankfully, the path soon levels out and you can move a little faster.  It truly is a race now.  You are on this path with the ${american} somewhere ahead.  The\n                ${korean} team are just behind.  There's about two hours of hiking to go.  \n                *goto conclusion2\n          #We'll take the path headed West.\n            *goto path\n\n*comment conc1 long path alone, conc2 short path korean behind, conc 3, short path, usa behind, conc4 short april usa\n*label conclusion\n*page_break CONCLUSION\n*set racetime+180\nLima to Ica.  From the Nazca Lines to El Misti and Arequipa.  Through the towns of Puno and Copacabana.  To here, the North side of Isla del Sol, looking for a rock said to\nbe the birth place of the Incans.  After traveling along this path for nearly three hours, you see it.\n*if spdstam\u003c60\n  *set racetime +20\n  *goto theendoftherace1\n*elseif spdstam\u003c90\n  *set racetime +12\n  *goto theendoftherace1\n*else\n  *set racetime +9\n  *label theendoftherace1\n  *if partner = \"Leonie\"\n    *set racetime +5\n    *goto justenditalready\n  *else\n    *set racetime +10\n    *goto justenditalready\n*label conclusion2\n*page_break CONCLUSION\n*set racetime+120\nLima to Ica.  From the Nazca Lines to El Misti and Arequipa.  Through the towns of Puno and Copacabana.  To here, the North side of Isla del Sol, looking for a rock said to\nbe the birth place of the Incans.  After traveling along this path for nearly three hours, you see it.\n*if spdstam\u003c60\n  *set racetime +20\n  *goto theendoftherace2\n*elseif spdstam\u003c90\n  *set racetime +12\n  *goto theendoftherace2\n*else\n  *set racetime +9\n  *label theendoftherace2\n  *if partner = \"Leonie\"\n    *set racetime +5\n    *goto laststopnow2\n  *elseif partner = \"Dan\"\n    *set racetime +10\n    *goto laststopnow2\n  *else\n    *set racetime +15\n    *label laststopnow2\n    *if racetime\u003c321\n      Amazingly, as you approach the end of the race, you see the ${americans} moving slowly not too far ahead of you.  A quick glance at ${partner} tells you all you need to know.\n      Together, you go up a gear and break into a sprint.  The ${americans}, stunned, are too slow to react.  You pass them as they try to reignite their run.  You are now in first\n      place.  Favourites to win the whole race!\n      *goto justenditalready\n    *else\n      *goto justenditalready\n*label conclusion3\n*page_break CONCLUSION\n*set racetime+120\nLima to Ica.  From the Nazca Lines to El Misti and Arequipa.  Through the towns of Puno and Copacabana.  To here, the North side of Isla del Sol, looking for a rock said to\nbe the birth place of the Incans.  After traveling along this path for nearly three hours, you see it.\n*if spdstam\u003c60\n  *set racetime +20\n  *goto theendoftherace3\n*elseif spdstam\u003c90\n  *set racetime +12\n  *goto theendoftherace3\n*else\n  *set racetime +9\n  *label theendoftherace3\n  *if partner = \"Leonie\"\n    *set racetime +5\n    *goto laststopnow3\n  *elseif partner = \"Dan\"\n    *set racetime +10\n    *goto laststopnow3\n  *else\n    *set racetime +15\n    *label laststopnow3\n    *if racetime\u003c321\n      *goto justenditalready\n    *else\n      Racing as fast as you can, you do your best to reach the finishing line.  However you have too little left in the tank and the ${american} close you down.  Watching them\n      pass you by is heart-breaking.  All you can do is look at ${partner} whose face tells you that you are both feeling the same right now.\n      *goto justenditalready\n*label conclusion4\n*page_break CONCLUSION\n*set racetime+120\nLima to Ica.  From the Nazca Lines to El Misti and Arequipa.  Through the towns of Puno and Copacabana.  To here, the North side of Isla del Sol, looking for a rock said to\nbe the birth place of the Incans.  After traveling along this path for nearly three hours, you see it.\n*if spdstam\u003c60\n  *set racetime +20\n  *goto theendoftherace4\n*elseif spdstam\u003c90\n  *set racetime +12\n  *goto theendoftherace4\n*else\n  *set racetime +9\n  *label theendoftherace4\n  *set racetime +15\n  *If racetime \u003c321\n    The ${american} team try to catch up to you but you are faster and they have no chance.  Once you are sufficiently far ahead, you slow down.  It is a two hour walk, after all!\n    You move as fast as you dare, watching behind you from time to time to see where the ${american} team are.  Finally, after well over an hour and with the ${american} team \n    out of sight, you see April, going as fast as her legs will take her.  You press hard to catch her and ask how she's doing.\n    *line_break\n    *line_break\n    \"So tired.\" she says between breaths.  \n    *line_break\n    *line_break\n    \"But...\" she continues.  \"Happy to see you.\"  She beams a smile but it quickly fades as fatigue hits again.  Together, you move on as fast as you can.  You offer to carry\n    her again, the same as Huacachina, but she refuses.\n    *line_break\n    *line_break\n    \"Not unless Travis and Justin catch us.\"  She says.  They don't.  Soon, you see the finish line appear behind the slowly reddening sky.\n    *goto justenditalready\n  *else\n    The ${american} team try to catch up to you but you are faster and they have no chance.  Once you are sufficiently far ahead, you slow down.  It is a two hour walk, after all!\n    You move as fast as you dare, watching behind you from time to time to see where the ${american} team are.  Finally, after well over an hour and with the ${american} team \n    out of sight, you see April, going as fast as her legs will take her.  You press hard to catch her and ask how she's doing.\n    *line_break\n    *line_break\n    \"So tired.\"  She says between breaths.  \n    *line_break\n    *line_break\n    \"But...\"  She continues.  \"Happy to see you.\"  She beams a smile but it quickly fades as fatigue hits again.  Together, you move on as fast as you can.  You offer to carry\n    her again, the same as Huacachina, but she refuses.\n    *line_break\n    *line_break\n    \"Not unless Travis and Justin catch us.\"  She says.  You look back again and see two shadows moving behind you.  They \n    are not far behind and you will have to press hard if you are to beat them.\n    *page_break\n    Unfortunately, they are now going faster than you.  Without saying a word, April climbs onto your shoulders and you press on as fast as you can, carrying the scared and\n    tired girl.  You know that it's not going to be enough though, and sure enough, the ${american} team catch you before you reach the finish line.  Both say something under \n    their breath that you don't want to understand.  It doesn't matter though.  Whatever happens now, you will not win the race.\n  *goto justenditalready\n*label conclusion5\n*page_break CONCLUSION\nLima to Ica.  From the Nazca Lines to El Misti and Arequipa.  Through the towns of Puno and Copacabana.  To here, the North side of Isla del Sol, looking for a rock said to\nbe the birth place of the Incans.  After traveling along this path for about 30 minutes, you see it.\n*if spdstam\u003c60\n  *set racetime +20\n  *goto theendoftherace5\n*elseif spdstam\u003c90\n  *set racetime +12\n  *goto theendoftherace5\n*else\n  *set racetime +9\n  *label theendoftherace5\n  *if partner = \"Leonie\"\n    *set racetime +5\n    *goto justenditalready\n  *else\n    *set racetime +10\n    *goto justenditalready\n\n*label justenditalready\n*page_break\n*set time racetime\n*if racetime\u003c321\n  Weary, tired... No exhausted, you reach the Titikala and, almost as if perfectly planned by the heavens, the sun begins to rise.  You wonder if you are hallucinating as the \n  sun casts long shadows towards you.  Golden in the distance with red skies around, this is the perfect start to the end of a fantastic race.  You reach the Titikala where \n  Mendez is standing proud, with an entourage of assistants and camera crews.  Behind you, the ${americans} are struggling to catch up and you cross the dotted finish line to a \n  huge round of applause.  ${partner} grabs you and you embrace in a hug of joy.\n  *line_break\n  *line_break\n  *if partner = \"Dan\"\n    \"Dude, we did it!  Can you believe it?  We won!  We won the Race!\" he beams his smile and lifts you up into the air.\n    *line_break\n    *line_break\n    \"Fifty Million Dollars!\"\n    *line_break\n    *line_break\n  *if partner = \"Leonie\"\n    \"Oh, my God.  We did it!  We won!  We WON!  YeeeHAAAAA!!\" she shouts, tears streaming down her face.\n    *line_break\n    *line_break\n    *if country = \"The USA\"\n      \"I knew it. I love you mom.  Now you can have your operation...\" she sobs, burying her face in the crevice of your neck.\n      *line_break\n      *line_break\n      *goto 50mill\n    *if country = \"Korea\"\n      \"I knew it. I love you omma.  Now you can have your operation...\" she sobs, burying her face in the crevice of your neck.\n      *line_break\n      *line_break\n      *goto 50mill\n    *else\n      \"I knew it. I love you mum.  Now you can have your operation...\" she sobs, burying her face in the crevice of your neck.\n      *line_break\n      *line_break\n      *goto 50mill\n  *if partner = \"April\"\n    \"We won! We won! We won!  Thank you, thank you so much, ${name}.  We did it!\" says the ecstatic young girl.  Her smile wider than you have ever seen it.\n    *line_break\n    *line_break\n    \"We're... we're millionaires!\" she says.\n    *line_break\n    *line_break\n  *label 50mill\n  $50,000,000.  Suddenly it dawns on \n  you that you are now a millionaire.  Emotions raise a level.  As the sun rises higher and the celebrations begin, your mind wanders back to where it all began.  If Mr.\n  Popadopolous's Dry Cleaners had been open just over a week ago then all you would have now is a clean shirt.\n\n  *page_break Epilogue\n\n  Elated, ${partner} and you return home to a heroes welcome.  In the weeks that follow, adulation and flattery follow, too.  You attend many press conferences and soon learn how\n  to speak to the masses.  Celebrity status is guaranteed.\n  *line_break\n  *line_break\n  Three weeks after your return, you are preparing for yet another press conference.  You are just settling down for an early night when you receive a phone call from an unknown number.\n  *choice\n    #Ignore it.\n      You cancel the call and turn off your phone.  Unless it's a number you recognise you have no reason to accept it.\n      *page_break The Press Conference\n      *goto press_conference\n    #Answer it.\n      You hold the phone to your ear and speak.\n      *line_break\n      *line_break\n      \"Hello?\"\n      *line_break\n      *line_break\n      \"Hi, ${name}, it's ${partner}!  We have a problem.\"\n      *choice\n        #What's wrong?\n          \"\n          *label partner_fine\n          I had a press conference today and I was asked loads of questions about cheating on the race.  The first team that were out, the Canadian and German girl, have been complaining and now the press are listening.\"  ${partner} pauses and sighs.\n          *line_break\n          *line_break\n          \"${name}, they are saying that we cheated.\"\n          *line_break\n          *line_break\n          You speak a little more with ${partner} before going to bed.  You have another press conference of your own to attend tomorrow.\n          *page_break The Press Conference\n          *goto press_conference\n        #Are you okay?\n          \"Yeah, I'm okay, but...\n          *goto partner_fine\n  *label press_conference\n  The familiar click, click, click sound of the cameras drum in your ears and the strobe flashes sparkle across your eyes.  So far you have been asked about\n  working with ${partner}, solving the puzzles, competing against the ${american} and ${korean} teams in the last leg, as well as menial questions about what you are doing with your money.\n  *line_break\n  *line_break\n  Then the tough questions begin.\n  *line_break\n  *line_break\n  \"John Ratton, Daily Star.  So is it true that you cheated to win the race?\"\n  *line_break\n  *line_break\n  Before you can reply, another question comes in:\n  *line_break\n  *line_break\n  \"Mark Wooter, The Mirror.  Were any other teams involved in your scam to cheat your way to the end?\"\n  *fake_choice\n    #\"We didn't cheat!\"\n    #\"I don't know where you are getting your information from...\"\n    #\"Really? Daily Star and The Mirror?  Your tabloid rubbish makes me sick.\"\n  Before the tabloid papers can respond, another question comes in:\n  *line_break\n  *line_break\n  \"Sarah Goodson, The Guardian.  We have reason to believe that you were working in collaboration with senior officials involved with the organisation of\n  The Race in order to boost ratings.  Is this true?\"\n  *page_break 18 Months Later\n  While there was never any compelling evidence to prove any corruption took place, the allegations alone seriously impacted on the hosting of The Race.  The following year, the\n  event was cancelled completely.  While your $50,000,000 was safe, neither you nor ${partner} made much more from commercial efforts.\n  *line_break\n  Now there are just six months until The Race resumes and you have been invited to speak with Andre Mendez in a pre-show advertisement.\n  The meeting is cordial yet throughout, you have the feeling that Mendez is holding something back.  He steers clear of the corruption claims completely and\n  when you mention the ordeal, he nervously tries to laugh it all off.\n  *line_break\n  Was there any corruption?  Did you cheat?  Did someone else cheat?  You have won the race, but the ending is bitter sweet.  There is some unfinished business here.\n  Will you ever find out what truly happened?\n  *line_break\n  *line_break\n  CONGRATULATIONS!  YOU COMPLETED THE GAME AS WINNERS OF THE RACE!  THIS IS ENDING 1 of 4.  RACE ENDING COMPLETE.  BE SURE TO PLAY AGAIN TO FIND OTHER POSSIBLE SUCCESS ROUTES INCLUDING ONE THAT WILL SHED MORE LIGHT ON THESE CHEATING ALLEGATIONS!\n  *goto_scene congratulations\n*elseif racetime\u003c331\n  Unfortunately, your ${american} competitors in this last leg of the race were just too much for you and ${partner}.  You finish the race in a disappointing, but still impressive,\n  second place.  The ${american} team, victorious, celebrate your arrival.  ${sunny} and ${sean}, finishing third shortly after you, welcome you with smiles and commiserations.  Emotionally, you\n  feel drained.  You ran a hard race but it wasn't enough in the end.  The final leg proved to be the toughest.\n  *page_break\n  EPILOGUE\n  You return to ${country} with ${partner} as heroes.  Even though you didn't win the race, you achieved fame through your exploits.  Later, you watch TV highlights of your\n  adventure and see moments captured on film you thought were hidden from the cameras!  The fame brings finance thanks to some good sponsorship deals, however you always have a \n  feeling of regret.  If only you had taken a different route, your life would be so much more fulfilled.  One day, perhaps.\n  *goto_scene ending\n*else\n  Unfortunately, your competitors in this last leg of the race were just too much for you and ${partner}.  You finish the race in a disappointing, but still impressive,\n  third place.  The ${american} team, victorious, celebrate your arrival.  ${sunny} and ${sean}, finishing second, welcome you with smiles and commiserations.  Emotionally, you\n  feel drained.  You ran a hard race but it wasn't enough in the end.  The final leg proved to be the toughest.\n  *page_break\n  EPILOGUE\n  You return to ${country} with ${partner} as heroes.  Even though you didn't win the race, you achieved fame through your exploits.  Later, you watch TV highlights of your\n  adventure and see moments captured on film you thought were hidden from the cameras!  The fame brings finance thanks to some sponsorship deals, however you always have a \n  feeling of regret.  If only you had taken a different route, your life would be so much more fulfilled.  One day, perhaps.\n\n  *goto_scene ending\n", "blackraven_demo": "*temp demo_var\n*set demo_var 1\n*temp puzzle1\n*set puzzle1 1\n[b]Blackraven: The Key To Freedom[/b]\n\n*image Blackraven_TKTF_Tiny.jpg\n\nBlackraven is a maximum securtity prison.  After commiting a heinous crime, you are imprisoned for 25 years and must come to terms with life inside the prison.\nEvery day, you will wake in the same cell.  You will take a job and learn various skills.  Will you try to escape?  Will you befriend one of the gangs?  Will you spend your time exercising?  Will you invest in the popular in-prison card game?  Will you become an expert thief?\nAll of these are achieveable and more as you live each day in the prison.\n*page_break But there's more\n[b]Blackraven: The Key To Freedom[/b]\n\nWhat about your old life outside the prison?  What was your job?  Why were you imprisoned?  How about your family?  How about your boyfriend/girlfriend/husband/wife/significant other?  Blackraven isn't just a game,\nbut also a look into how you deal with many aspects of your life.  Even from inside the prison, your choices can affect your loved ones outside.\n*page_break Meet the puzzler\n[b]Blackraven: The Key To Freedom[/b]\n\nThere are many characters in the prison who will keep you busy.  There is the Mafia gang known as the Family, a chaotic clan known as the Rockers, the older and more respected group, the Roots.\nThere is also the puzzler, a character who sets puzzles to the inmates in exchange for winning some cigarettes, one of the games currencies.  Some are easy.  Some, like this one, are very hard to solve!  Can you figure it out?\n*line_break\n*line_break\n*label puzzle_again\n*if demo_var = 1\n  \"I have a fantastic puzzle for you this week.  It's a long one to explain and could take a while for you to figure out.  It goes like this:\"  The puzzler looks particularly pleased.\n  *line_break\n  *line_break\n  \"A professional photographer is a little fussy when it comes to taking pictures of his models. He always abides by some strange rules.\"\n  *line_break\n  *line_break\n  \"Flora is one of the girls he it to photograph.  She is a little late to the photoshoot and misses the first model, Anna, completely.\"\n  *line_break\n  *line_break\n  \"She sees the last photo taken of the second model, Bonnie, who is holding a blue wand.\"\n  *line_break\n  *line_break\n  \"The third model, Connie, has 21 pictures taken. She is holding a lilac flower in each of them.\"\n  *line_break\n  *line_break\n  \"The fourth model is Diane. By the time of her 28th and last photo, the orange icecream she is holding has started to melt.\"\n  *line_break\n  *line_break\n  \"Flora didn't watch the fifth model, Ellen, as she was choosing her own accessory, but she knows she had 28 photos as well.\"\n  *line_break\n  *line_break\n  \"The photographer must take less than 40 pictures with Flora as he needs to take 52 pictures with the next girl, Grace, who is also taking one of the items listed below.\n  The question is, what accessory should Flora choose? And how many photo's will be taken?\"\n  *line_break\n  *line_break\n  You ponder the list of items and choose:\n  *choice\n    #Red Bo - A Japanese staff.\n      \"Sorry, that's not right.\" says the puzzler.  No one comes close to the answer and when the klaxon sounds, the puzzler leaves with a smirk on his face.\n\n      It is a hard puzzle.  Would you like another go?\n      *choice\n        #Yes!\n          *goto puzzle_again\n        #No, that's okay.\n          *goto ravenrules\n    #Navy Blue Waistcoat - Professionally made by a tailor in London.\n      \"Sorry, that's not right.\" says the puzzler.  No one comes close to the answer and when the klaxon sounds, the puzzler leaves with a smirk on his face.\n\n      It is a hard puzzle.  Would you like another go?\n      *choice\n        #Yes!\n          *goto puzzle_again\n        #No, that's okay.\n          *goto ravenrules  \n    #Magnolia Woollen Shawl - Made in China.\n      \"Sorry, that's not right.\" says the puzzler.  No one comes close to the answer and when the klaxon sounds, the puzzler leaves with a smirk on his face.\n\n      It is a hard puzzle.  Would you like another go?\n      *choice\n        #Yes!\n          *goto puzzle_again\n        #No, that's okay.\n          *goto ravenrules      \n    #Olive Branch - freshly plucked that morning.\n      \"Sorry, that's not right.\" says the puzzler.  No one comes close to the answer and when the klaxon sounds, the puzzler leaves with a smirk on his face.\n\n      It is a hard puzzle.  Would you like another go?\n      *choice\n        #Yes!\n          *goto puzzle_again\n        #No, that's okay.\n          *goto ravenrules      \n    #Vermilion Wood-Didgeridoo - Hand-crafted by Aborigines.\n      \"Sorry, that's not right.\" says the puzzler.  No one comes close to the answer and when the klaxon sounds, the puzzler leaves with a smirk on his face.\n\n      It is a hard puzzle.  Would you like another go?\n      *choice\n        #Yes!\n          *goto puzzle_again\n        #No, that's okay.\n          *goto ravenrules     \n    #Shocking Pink Mini-dress - so short you could call it a belt.\n      \"Sorry, that's not right.\" says the puzzler.  No one comes close to the answer and when the klaxon sounds, the puzzler leaves with a smirk on his face.\n\n      It is a hard puzzle.  Would you like another go?\n      *choice\n        #Yes!\n          *goto puzzle_again\n        #No, that's okay.\n          *goto ravenrules      \n    #Dark Blue Handkerchief - Satin\n      You tell the puzzler that she will choose the Dark Blue Handkerchief.  He looks at you, interested.\n      *line_break\n      *line_break\n      \"...And how many photos?\"  He asks.\n      *input_text puzzle1\n      *if puzzle1 = \"18\"\n        *achieve genius\n        \"Wow, you're a genius!\"  Says the puzzler.  \"I thought no one would get this right.  I'm not even going to insult you by asking you how!\"  The puzzler bows down to you in an exagerated gesture, before offering you your winning cigarettes.  You take them and pocket them quickly.\n        *line_break\n        *line_break\n        \"Everyone else, better luck tomorrow!\"\n        Soon after, the klaxon sounds and everyone files out of the yard.\n        *goto ravenrules      \n      \"Sorry, that's not right.  For a second there, I thought you were a genius!\" says the puzzler.  No one else comes close to the answer and when the klaxon sounds, the puzzler leaves with a smirk on his face.\n      *goto ravenrules      \n    #Golden Tophat - The photographers very own.\n      \"Sorry, that's not right.\" says the puzzler.  No one comes close to the answer and when the klaxon sounds, the puzzler leaves with a smirk on his face.\n\n      It is a hard puzzle.  Would you like another go?\n      *choice\n        #Yes!\n          *goto puzzle_again\n        #No, that's okay.\n          *goto ravenrules      \n    #Gray Notebook - Very old now, with tattered pages.\n      \"Sorry, that's not right.\" says the puzzler.  No one comes close to the answer and when the klaxon sounds, the puzzler leaves with a smirk on his face.\n\n      It is a hard puzzle.  Would you like another go?\n      *choice\n        #Yes!\n          *goto puzzle_again\n        #No, that's okay.\n          *goto ravenrules      \n    #Orange Liquid - Used to be icecream.\n      \"Sorry, that's not right.\" says the puzzler.  No one comes close to the answer and when the klaxon sounds, the puzzler leaves with a smirk on his face.\n\n      It is a hard puzzle.  Would you like another go?\n      *choice\n        #Yes!\n          *goto puzzle_again\n        #No, that's okay.\n          *goto ravenrules\n*label ravenrules\n*page_break Raven Rules\n[b]Blackraven: The Key To Freedom[/b]\n\nFinally, no decent prison would be complete without it's own trading card game!  In Blackraven, not only can you play Pontoon, a simple BlackJack style card game, but the inmates also collect cards for a new game where each\ncard is based upon an inmate or a guard.  Compete against other inmates and develop strategies to win various prizes.\n*image card_53.jpg\nAn example card from the game, Raven Rules.  There are 80 cards to collect of varying rarity!\n*page_break\n*goto_scene startup\n\n", "choicescript_description": "Choose your destiny in a race through Peru!\n\n[i]The Race[/i] is a 72,000-word interactive novel by Andy Why. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\nYou are about to go on the journey of a lifetime as you take part in the event known the world over as ‘The Race’. With a huge cash prize, being a participant on The Race is a great opportunity for success. You have been chosen to take part and race through Peru to an unknown, final destination. Every step of the way, the choices you make will affect your performance, as well as the other teams around you! Can you make it to the end?\n\nBonus: It’s not all about winning. Sometimes other choices are more important. Can you uncover a hidden conspiracy? Can you solve the mysteries in your dreams? Can you even go through cities not even on the race list?! There are three alternative endings to the race. Challenge your friends to find them all!\n\n• Select your race partner\n• Compete against other teams\n• Uncover corruption\n• Discover hidden secrets\n", "choicescript_stats": "${country} Team Profile\n\n*stat_chart\n  text Name\n  percent Leadership\n  percent Strength\n  percent Stamina\n  percent Speed\n  percent Intelligence\n  percent Charisma\n  percent Luck\n  text Partner\n  text partnerdetails Partner Information\n*if money = 10000\n  Money Plenty\n  *goto foreign_currency\n*else\n  *if money>0\n    You have $ ${money}.\n*label foreign_currency\n*line_break\n*if sols>0\n  You have ${sols} Sols.\n  *line_break\n*if bols >0\n  You have ${bols} Bolivianos.\n\nFinal Destination Letters Found:\n${fd1}, ${fd2}, ${fd3}, ${fd4}, ${fd5}", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n  \n  Remove in-game advertisements.\n  \n  *purchase adfree $4.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n", "congratulations": "*page_break End\nWe hope you've enjoyed playing [i]The Race.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "ending": "*page_break End\nWe hope you've enjoyed playing [i]The Race.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nSo the game is over.  However it wasn't the ending you were looking for.  I'm sure if you tried again, perhaps made a few different choices, who knows what\ncould happen!\n\n*ending\n", "korean_haste": "*temp uk\n*if country = \"The USA\"\n  *set uk true\n  *goto two_years_ago\n*else\n  *set uk false\n  *goto two_years_ago\n*label two_years_ago\n[b]Korean Haste: The Race Continues[/b]\n\n*image Korean_Haste_Small.jpg\n\nTwo years ago, two people from your country won the biggest event of the year; a race around Peru for $50,000,000.  What followed was chaos and corruption,\nallegations of deceit and lies.  The following year, the race was cancelled.\n*line_break\n*line_break\nNow, the event is back.  The image of the event has been restored.  Eighteen new people have been selected to take part.  A new location has been chosen.  A new world of possibilities are about to begin!\n*page_break Learn More\n[b]Korean Haste: The Race Continues[/b]\n\nKorean Haste: The Race Continues is the long anticipated sequel to The Race.  This time, there's more than just money to play for.\n*line_break\n*line_break\n*label learning\nLearn more\n*choice\n  #Who is my partner?\n    *label partners\n    Just like The Race, you will have a choice of three people to race with.  They are:\n    *choice\n      #Roger Drake\n        Roger Drake, 33, is a suave and sophisticated businessman.  With lots of travel experience, he would surely make a great partner to race with.\n        *page_break\n        *goto partners\n      #Lucy Singer\n        Lucy Singer, 22, is a charismatic airsteward.  Beautiful and smart, this girl will have little trouble getting what she wants.  And she wants to win!\n        *page_break\n        *goto partners\n      #David Harland\n        Just 11 years old, David Harland is way ahead of his classmates when it comes to smarts.  Exceedingly clever, this young man went to the same school as previous racer, April Lee.  There must be something in the water.\n        *page_break\n        *goto partners\n      #Learn more\n        *goto learning\n  #Who are the competitors?\n    *label competitors\n    There are nine teams involved in The Race.  They are:\n    *choice\n      #The French\n        Two sisters who won a national game show in order to compete in The Race, Monique and Nicole have already proven themselves to be strong competitors.\n        *page_break\n        *goto competitors\n      #The Germans\n        Two complete strangers before the race, Stefan and Dietmar won a national lottery.  Nicknamed little and large, Stefan is just 5ft tall while Dietmar is almost 7ft tall!\n        *page_break\n        *goto competitors\n      #The Japanese\n        Akiyo Taniyama and Choukichi Shimura, Mathematicians and friends who solved a national competition to join the race.\n        *page_break\n        *goto competitors\n      #The Italians\n        Mio won a lottery in order to compete.  He is a stylish, 30-something, designer.  His partner, Christina, was selected through an event at the Spanish Steps in Rome.  She was the fastest competitor to scale the steps without using her feet!  Mio and Christina represent Italy, but had never met each other before The Race.\n        *page_break\n        *goto competitors\n      *if (uk) #The British\n        Little is known at present about this team.  There was a rumour during the last hosted Race that the competitors from the UK were involved in the alleged corruption that took place.  All we know at present is that two competitors from this country WILL take part.\n        *page_break\n        *goto competitors\n      *if (uk = false) #The Americans\n        Little is known at present about this team.  There was a rumour during the last hosted Race that the competitors from the United States were involved in the alleged corruption that took place.  All we know at present is that two competitors from this country WILL take part.\n        *page_break\n        *goto competitors\n      #The Peruvians\n        This father and daughter team come from the nation that hosted the last race.  Piero, a fifty-one year old father of four is the oldest racer this year.  With a strong work ethic, he is not to be dismissed.  His daughter Angelica, 24, is his youngest daughter.  Her level head, together with his leadership, should take them far in this race.\n        *page_break\n        *goto competitors\n      #The Mexicans\n        Eduardo and Alejandra only met four months ago where they fell instantly in love.  Their whirlwind romance led them to a weekend break in New Mexico, where they took part in a TV show for couples.  Their longest kiss, 37 hours straight, beat all other couples and won them the chance to take part in The Race.\n        *page_break\n        *goto competitors\n      #The Kiwis\n        Lily and Brooke, 21 and 37 respectively, are two competitors from New Zealand.  They were chosen to represent their country after winning two different game shows. Lily won 'The Hero', a gruelling physical obstacle course that she was the first person to successfully navigate.  Brooke won 'I am a Genius', a quiz show unlike any other, in that the competitors have to answer questions while moving through dangerous terrain.  Brooke answered some of her questions during a bungee jump!\n        *page_break\n        *goto competitors\n      #${country}\n        ${name} and one of Roger Drake, Lucy Singer or David Harland.  Go to 'Who is my partner' to find out more about them.\n        *page_break\n        *goto competitors\n      #Go back\n        *goto learning\n  #Where will we be racing?\n    This year, The Race will be held in the Republic of Korea.  This peninsula, with a land border to only one nation, the dictator controlled DPKR, has defied all odds to become one of the fastest developing nations in the world.  The contrast with their northern cousins is immense.  The nation of South Korea will challenge the contestants in many ways.\n    With a culture that dates back thousands of years and inumerable locations to travel to, this years race will be one not to miss.\n    *page_break\n    *goto learning\n  #Back to other games\n    *goto_scene 11startup", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n*set name \"Dan\"\n*set country \"The USA\"\n\nIt felt like a dream.  Just three days ago you were going about your normal business when your life figuratively and literally went around a corner into an old lady carrying hot coffee.  Apologetically, she offered to pay for your wet clothes to be cleaned but the dry cleaners was closed due to the owner, Mr. Popadopalous going on vacation.  Instead, you let the gray haired woman buy you a can of cola.  And that can... that wonderful, winning can had delivered you here to Lima, Peru. \n\nNow you are about to go on the journey of a lifetime as you take part in the event known the world over as... \n\nTHE RACE \n\n*page_break\n*script changeBackgroundColor(\"black\")\n*set leadership 35\n*set strength 30\n*set stamina 31\n*set speed 59\n*set intelligence 36\n*set charisma 27\n*set luck 45\n\nAn interesting choice.  So now we know a little about you, it's time to meet the person you will be racing with. Which one of these people got the other lucky soda can? \n*fake_choice\n  #Dan Martin, 33, Strong, High Stamina, Low IQ\n  #Leonie Nolan, 22, Fast!\n  #April Lee, 11, Clever, Charismatic, Weak, Slow\n\n*script changeBackgroundColor(\"sepia\")\n*set partner \"Leonie\"\n*set partnerdetails \"Fast!\"\n\n*set stamina 36\n*set charisma 32\n\nSoon, all the contestants are gathered together in the banquet hall. It looks like there are nine teams in total. An unusual number, you think. Your partner is about to say something when all the lights dim. Some fanfare music plays and a spotlight covers a door at the far side of the room. After a brief pause, the door opens and a very famous man comes into the hall. He is Andre Mendez, the multi-millionaire creator of the race. People around you start clapping and you spontaneously join in. Mendez acknowledges his audience and then begins to talk into a microphone. \n\n*page_break\n\n*set stamina 11\n*set money 438\n*set fd1 \"A, I\"\n\nYou arrive at the resort of Huacachina.  All around you are sand dunes.  With the hot sun still bearing down, it feels like you are in a desert. Behind you, the dust road trails away.  The road ahead curves to the left revealing a path down to a beautiful oasis.  Tropical trees surround the water, as do many shops, stalls and restaurants.  Music is playing and the place has a festive atmosphere.  The area is big.  You will have to search for the checkpoint.  You might want to check out the shops as well.  In this heat, water would be a good idea. You are currently on the east side of the oasis.  What do you want to do? \n*fake_choice\n  #Go right, towards the shops.\n  #Go left, past the restaurants.\n  #Head straight to the oasis edge.\n\nPLEASE CLICK STATS FOR THE 5TH SCREEN SHOT.\n*comment For the fifth screenshot, please click stats and take a screengrab of the stats screen.\n\n", "startup": "*title The Race\n*author Andy Why\n*scene_list\n  startup\n  12Lima\n  13Lima_morning\n  14early\n  15introduction\n  16LimaIca\n  17Ica\n  19Nazca\n  20Arequipa\n  21aPuno\n  21bPeru-Bolivia\n  22Copacabana\n  23TheLastLeg\n  ending\n\n\n\n*create leadership 30\n*create strength 30\n*create stamina 30\n*create speed 30\n*create intelligence 30\n*create charisma 30\n*create luck 30\n*create partner \"None\"\n*create partnerdetails \"None\"\n*create his \"his\"\n*create money 10000\n*create sols 0\n*create bols 0\n*create name \"Unknown\"\n*create accomplice 0\n*create country \"Your\"\n*create time 0\n*create alltime 0\n*create hour 0\n*create min 0\n*create korea 40\n*create india 40\n*create france 30\n*create russia 10\n*create usa 0\n*create american \"American\"\n*create americans \"Americans\"\n*create australia 30\n*create spain 10\n*create korean \"Korean\"\n*create sean \"Sean\"\n*create sunny \"Sunny\"\n*create australian \"Australian\"\n*create passport \"safe\"\n*create climate 0\n*create cg 1\n*create skin \"white\"\n*create boygirl \"boy\"\n*create power 0\n*create position 3\n*create rule2 1\n*create joke 1\n*create fourth \"Spanish\"\n*create dream 0\n*create truth 0\n*create camera false\n*create fd1 \"?, ?\"\n*create fd2 \"?, ?\"\n*create fd3 \"?, ?\"\n*create fd4 \"?, ?\"\n*create fd5 \"?, ?\"\n*create game_reader 0\n\n\n*achievement corrupt1 visible 10 Nosey Parker\n  Find something you shouldn't\n  You started the corruption path!\n\n*achievement corrupt2 visible 10 Plot Thickener\n  Become suspiscious of one of the teams\n  You are suspiscious of one of the teams!\n\n*achievement corrupt3 visible 10 Amateur Detective\n  Uncover a major corruption plot\n  You solved the corruption path!\n\n*achievement explorer visible 10 Explorer\n  Go to Machu Pichu\n  You made it to Machu Pichu!\n\n*achievement rule_breaker visible 10 Rule Breaker\n  Use the internet\n  You did something you shouldn't!\n\n*achievement joker visible 10 Funny Man\n  Tell a joke successfully\n  You made everyone laugh!\n\n*achievement luckiest visible 10 Lucky Racer\n  Get the bus in Lima before it leaves\n  You managed to catch the bus in Lima!\n\n*achievement friendly visible 10 Friend Maker\n  Befriend the Indian team\n  You became friends with the Indians!\n\n*achievement friendly2 visible 10 Chingu Maker\n  Befriend the Korean team\n  You became friends with the Koreans!\n\n*achievement lifesaver visible 10 Life Saver\n  Save your partners life\n  You saved April!\n\n*achievement genius visible 10 Genius\n  Solve the Blackraven riddle\n  You solved the problem from the Blackraven riddler!\n  \n*achievement stern visible 10 Elder\n  Enforce respect for the elders\n  You expect children to respect you!\n\n*achievement embarrass visible 10 Awkward Situation\n  Break into Leonies bedroom\n  You embarrassed yourself!\n\n*achievement gamer visible 10 Curious Reader\n  Check out the other games\n  You took a look at the future games to come!\n\n*achievement penniless visible 10 Pauper\n  Lose all of your money to muggers\n  You lost all of your cash!\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and (not(choice_purchased_adfree) and not(choice_is_web))\n    [i]The Race[/i] is supported by advertisements, but you can pay\n    to turn off ads forever.\n\n    *purchase adfree $4.99 purchased\n    *page_break_advertisement\n\n\n*label purchased\n\n*image race_plain.JPG\n\n*page_break\n*if name = \"Unknown\"\n  Before we start, what is your name?\n  *input_text name\n  Welcome ${name}!\n\n  Which country are you from:\n  *choice\n    #England\n      *set country \"England\"\n      Ah, British.\n      *goto introduceme\n    #Australia\n      *set country \"Australia\"\n      I see, an Australian team.\n      *goto introduceme\n    #The USA\n      *set country \"The USA\"\n      Okay, an American team.\n      *set american \"English\"\n      *set americans \"English\"\n      *goto introduceme\n    #Other...\n      *input_text country\n      *if country = \"Espana\"\n        *set country \"Spain\"\n        Ah! There is already a Spanish team in the game.  Let's just pretend that the other Spanish team come from a town far from you.  That will let us carry on with two teams from the same country.\n        *goto introduceme\n      *if country = \"Spain\"\n        Ah! There is already a Spanish team in the game.  Let's just pretend that the other Spanish team come from a town far from you.  That will let us carry on with two teams from the same country.\n        *goto introduceme\n      *if country = \"France\"\n        Ah! There is already a French team in the game.  Let's just pretend that the other French team come from a town far from you.  That will let us carry on with two teams from the same country.\n        *goto introduceme\n      *if country = \"Canada\"\n        Ah! There is already a team with a Canadian in the game.  But that's okay, while they are an amalgamation of one Canadian and one German, your team is purely from Canada.\n        *goto introduceme\n      *if country = \"Deutschland\"\n        *set country \"Germany\"\n        Ah! There is already a team with a German in the game.  But that's okay, while they are an amalgamation of one Canadian and one German, your team is purely from Germany.\n        *goto introduceme\n      *if country = \"Germany\"\n        Ah! There is already a team with a German in the game.  But that's okay, while they are an amalgamation of one Canadian and one German, your team is purely from Germany.\n        *goto introduceme\n      *if country = \"Italia\"\n        Fantastic!  An Italian player.  I love Italian food and you have two beautiful cities in Roma and Milano, the only places I have been to.  I hope to visit Florence on my next trip.  Anyway, enough about me, on with the game!\n        *goto introduceme\n      *if country = \"Italy\"\n        Fantastic!  An Italian player.  I love Italian food and you have two beautiful cities in Roma and Milano, the only places I have been to.  I hope to visit Florence on my next trip.  Anyway, enough about me, on with the game!\n        *goto introduceme\n      *if country = \"Japan\"\n        What a great country!  I have been to Tokyo and Osaka several times.  Every time I am amazed by the glamour of the city and the wondourous food.  Anyway, enough about me, on with the game!\n        *goto introduceme\n      *if country = \"Hungary\"\n        What a beautiful country you live in!  I visited Budapest in the summer of 2002 and fell in love with the city instantly!  I especially liked the small island 'Margarite', between Buda and Pest.  Anyway, enough about me, on with the game!\n        *goto introduceme\n      *if country = \"Scotland\"\n        Aye, a Scot playing the game?  Great!  I am a quarter Scottish myself after my paternal grandmother.  My favourite city in Scotland is Edinburgh, but nothing beats a holiday to the legendary Loch Ness!\n        *goto introduceme\n      *if country = \"Poland\"\n        Wow!  You live in such a beautiful country!  I visited Poland in the summer of 2002 and went to Warsaw, Krakow, and Zakopane (in the Alps).  I would love to go back again!\n        *goto introduceme\n      So you're from ${country}?  Great, let's play!      \n      *goto introduceme\n\n*label introduceme\n*choice\n  #Start the game\n    *goto go_on_introduce\n  #Other Games from Andy Why\n    *choice\n      #The Kepler Colony: Evacuation\n        *set game_reader +1\n        *if game_reader = 5\n          *achieve gamer\n        \"...People walked freely, without barriers or confinement. Animals roamed free and birds flew where they pleased. And the best thing of all. [i]The[/i] best thing. The sky was blue!\"\n        \n        You listen carefully as your great-grandfather recounts your favourite story to you and all the other children. You feel slightly special because\n        your great-grand-pappy is the last. Once he is gone, that will be it. There will not be another human alive who actually saw Earth for real.  This also saddens\n        you.  Along with every other passenger on board the intergalactic spaceship 'Swansong', you were born here, will live your life here, and you will die\n        here, without ever setting foot outside of the vessel.\n\n        *image kclogo.jpg\n\n        In the year 2090, a large asteroid is discovered on a collision course with Earth. The only hope for humanity is a project to colonise the only confirmed\n        habitable planet found: Kepler 62e. With a journey of 1200 light years to traverse, begin your journey as a new recruit on the spaceship. Explore\n        cryogenic technology and countless others. Combat emotions as you make bold decisions that will affect all life as we know it. Can you prevent the\n        death of us all?\n\n        The Kepler Colony: Evacuation is a 170,000 word story about survival and morality.  Out Now!\n        *page_break Back\n        *goto introduceme\n      #Blackraven\n        *set game_reader +1\n        *if game_reader = 5\n          *achieve gamer\n        *goto_scene blackraven_demo\n  #Other Hosted Games\n    *label ohg\n    *choice\n      #Life of a Wizard\n        *set game_reader +1\n        *if game_reader = 5\n          *achieve gamer\n        [b]Life of a Wizard - by Mike Walter[/b]\n\n        Write an archmage's autobiography in this 80-year 130,000-word interactive fiction! Man or woman? Good or evil? Bring peace on earth or rule the world?\n\n        Life of a Wizard is a text based game published under the Hosted Games license. For a demo and more information about Life of a Wizard, go to the link below:\n\n        http://www.choiceofgames.com/user-contributed/life-of-a-wizard\n\n        Check out other games by Mike Walter at: www.facebook.com/LucidsGames\n\n        *page_break Back to Hosted Games\n        *goto ohg\n      #Paradox Factor\n        *set game_reader +1\n        *if game_reader = 5\n          *achieve gamer\n        [b]Paradox Factor - by Mike Walter[/b]\n\n        What would you change? Alter your past and future in this thought-provoking and edgy time travel game. Are you willing to live with the effects that your changes may cause?\n\n        Paradox Factor is a text based game published under the Hosted Games license. For a demo and more information about Paradox Factor, go to the link below:\n\n        http://www.choiceofgames.com/user-contributed/paradox-factor\n\n        Check out other games by Mike Walter at: http://www.facebook.com/LucidsGames\n        *page_break Back to Hosted Games\n        *goto ohg\n      #Sabres of Infinity\n        *set game_reader +1\n        *if game_reader = 5\n          *achieve gamer\n        [b]Sabres of Infinity - by Paul Wang[/b]\n\n        Fight for glory as an officer of the Royal Tierran Army in a rich, low-fantasy world where gunpowder and magic rule the battlefield. Choose a horse, pick a sergeant and lead a unit of Royal Dragoons through five years of brutal war. \n        *line_break\n        *line_break\n        Battle your enemies with your mind, your wits or with pistol and sword. Earn the loyalty of your subordinates and the friendship of your fellow officers, or betray them for your own gain. As armies, heroes and philosophies clash in the forests of the north, your choices could mean the difference between everlasting glory and an ignominious death.\n        *line_break\n        *line_break\n        Sabres of Infinity is a text based game published under the Hosted Games license.  For more information about Sabres of Infinity, go to the link below:\n        *line_break\n        *line_break\n        https://www.choiceofgames.com/user-contributed/sabres-of-infinity/\n        *page_break Back to Hosted Games\n        *goto ohg\n      #Zombie Exodus\n        *set game_reader +1\n        *if game_reader = 5\n          *achieve gamer\n        [b]Zombie Exodus - by Jim Dattilo[/b]\n\n        Build your character and fight your way out of a zombie-filled city to save your sister in this interactive horror fiction story. Gather supplies and weapons while avoiding the military, bandits, and living dead. Your choices alone control the story. Can you survive the zombie apocalypse?\n        *line_break\n        *line_break\n        Zombie Exodus is a text based game published under the Hosted Games license.  For more information about Zombie Exodus, go to the link below:\n        *line_break\n        *line_break\n        https://www.choiceofgames.com/user-contributed/zombie-exodus/\n        *page_break Back to Hosted Games\n        *goto ohg\n      #Unnatural\n        *set game_reader +1\n        *if game_reader = 5\n          *achieve gamer\n        [b]Unnatural - by Sam Kabell[/b]\n\n        Monsters are real.\n\n        The Supernatural Response Team (S.R.T) are a group formed to deal with them. They track down and either capture or kill any monster they can find.\n\n        You are one of their potential recruits..\n\n        Unnatural is an extensive 'choose your own' game written with help and feedback from the Choicescript community.\n\n        Unnatural is available now!        \n        *page_break Back to Hosted Games\n        *goto ohg\n      #Back\n        *goto introduceme\n*label go_on_introduce\n*page_break\nIt felt like a dream.  Just three days ago you were going about your normal business when your life went around a corner into\nan old lady carrying hot coffee.  The haggered, old woman offered to pay for your wet clothes to be cleaned but the dry cleaners was closed due to the owner, Mr. Popadopalous\ngoing on vacation.  Instead, you let the grey-haired woman buy you a can of cola.  And that can... that wonderful, winning can had delivered you here to Lima, Peru.  \n\nNow you are about to go on the journey of a lifetime as you take part in the event known the world over as...\n\nTHE RACE\n\n*page_break\n\nThat winning soda can happened to be one of two hidden in your country.  As a winner, you will now take part in THE RACE alongside another stranger from your\nnation.  With a cash prize of $50,000,000 for each winning contestant and, judging from past winners, infinite fame and glory to follow, being a participant on THE RACE\nis the best opportunity you will ever get for success in life.  The first winners, from\n*if country = \"Germany\"\n  your very own country,\nGermany, are now billionaires thanks to the huge sponsorship deals they\nreceived after the show.  Last year's winners,\n*if country = \"Canada\"\n  from your very own country,\nCanadian twins from Toronto, are likely to go even further with their fame.  However, with up to 3 billion people\nwatching the show on television, any mistakes you make will be amplified to the point where you could be deemed an ultimate failure.  In last year's event, the\n${american} brothers who came in last place received a great deal of ridicule to the extent where the younger brother, Gareth, killed himself.\nThe big question that you have to ask yourself is: What qualities do you have to help you in this race?\n*rand luck 0 30\n*set luck +10\n*choice\n  #I have a very high IQ.\n    *set intelligence +30\n    That's obviously important.  Without intelligence, you wouldn't get far.\n    Is there another reason you will succeed?\n    *choice\n      #That would be my great charisma.\n        *set charisma +30\n        *goto abstract\n      #I have unbelievable stamina.\n        *set stamina +30\n        *goto abstract\n      #I can move really quickly.  Important in a race, wouldn't you say?\n        *set speed +30\n        *goto abstract\n      #I guess I am quite lucky.\n        *set luck +30\n        *goto abstract\n  #I have excellent leadership skills.\n    *set leadership +30\n    Well that makes sense.  Every team needs a leader.\n    Is there another reason you will succeed?\n    *choice\n      #That would be my great charisma.\n        *set charisma +30\n        *goto abstract\n      #I have unbelievable stamina.\n        *set stamina +30\n        *goto abstract\n      #I can move really quickly.  Important in a race, wouldn't you say?\n        *set speed +30\n        *goto abstract\n      #Well, I don't want to boast, but I am quite smart.\n        *set intelligence +30\n        *goto abstract\n  #I guess I am quite strong.\n    *set strength +30\n    That sounds important.  So often in life, the strong survive while the weak perish.\n    Is there another reason you will succeed?\n    *choice\n      #That would be my great charisma.\n        *set charisma +30\n        *goto abstract\n      #I have unbelievable stamina.\n        *set stamina +30\n        *goto abstract\n      #I can move really quickly.  Important in a race, wouldn't you say?\n        *set speed +30\n        *goto abstract\n      #I have good leadership skills.\n        *set leadership +30\n        *goto abstract\n  #I don't know.  I'm a lucky person, I guess.\n    *set luck +30\n    You are often quite lucky in life.  It was luck that brought you here, after all!\n    What would you say is your greatest asset?\n    Is there another reason you will succeed?\n    *choice\n      #That would be my great charisma.\n        *set charisma +30\n        *goto abstract\n      #I have unbelievable stamina.\n        *set stamina +30\n        *goto abstract\n      #I can move really quickly.  Important in a race, wouldn't you say?\n        *set speed +30\n        *goto abstract\n      #I am very strong.\n        *set strength +30\n        *goto abstract\n*label abstract\nNow, just a few more questions so I can understand you better.\nFirst, it's interesting to note that no women have ever won the race.  What do you think of this?\n*choice\n  #Good luck to them.  But being a man, I hope that continues for at least another year.\n    As do I.  Although, of course, you can choose a female partner later.\n    *goto questionmore\n  #No women have won yet!  I plan to be the first!\n    *set boygirl \"girl\"\n    You certainly could be!\n    *goto questionmoregirl\n*label questionmore\nSome of the places you will go to in Peru don't see many westerners.  How do you feel about this?\n*choice\n  #Having blonde hair and blue eyes, I'm sure I will intrigue the girls of Peru, if you know what I mean.\n    *set skin \"yellow\"\n    *goto two\n  #With my dark hair and olive skin I'm sure I will fit right in.  \n    *set skin \"dark\"\n    *goto two\n  #As a clean shaven black man I will stand out but I've lived with that all my life.  No problem.\n    *set skin \"black\"\n    *goto two\n  #As a pale skinned redhead, I will stand out for sure.\n    *set skin \"red\"\n    *goto two\n*label questionmoregirl\nSome of the places you will go to in Peru don't see many westerners, especially girls.  How do you feel about this?\n*choice\n  #Having long blonde hair and blue eyes, I'm sure I will be able to twist the Peruvian boys around my finger.\n    *set skin \"yellow\"\n    *goto two\n  #With my dark hair and olive skin I'm sure I will fit right in.  \n    *set skin \"dark\"\n    *goto two\n  #As an independent black woman I will stand out but I've never been one to shy away from a challenge.  No problem.\n    *set skin \"black\"\n    *goto two\n  #As a pale skinned girl with auburn hair, I will stand out for sure.\n    *set skin \"red\"\n    *goto two\n*label two\nNow imagine you are 12 years old.  You are hungry as your lunch money was stolen from you at school.  You are walking home when you stop by an\nexpensive restaurant.  The smell of food cooking inside has drawn you to it.  After a moment, you are ready to leave, when you see a wallet on the floor.\nYou open the wallet and see enough money to buy a great meal at the restaurant.  There is also a photo inside the wallet of a ${boygirl}.  The same ${boygirl} who stole\nyour lunch money.  The wallet must belong to \n*if boygirl = \"boy\"\n  his\n  *goto wallet\n*else\n  her\n  *goto wallet\n*label wallet\ndad.  What do you do?\n*choice\n  #Take the money and eat at the restaurant!  I'm starving!\n    *set stamina +4\n    *set leadership -2\n    *set strength +1\n    *set charisma -1\n    *set speed +4\n    *set intelligence -4\n    *goto three\n  #Only take my lunch money back.  I won't eat at the restaurant either, as I can get food at home later.\n    *set stamina -1\n    *set leadership +3\n    *set strength -1\n    *set charisma +2\n    *set speed +1\n    *set intelligence +3\n    *goto three\n  #Take the money and the photo but leave the wallet.  I will enjoy teasing the ${boygirl} who stole my money by showing the photo later!\n    *set stamina +1\n    *set leadership -2\n    *set strength +5\n    *set charisma +3\n    *set speed +0\n    *set intelligence -3\n    *goto three\n  #Destroy the wallet, money and all.\n    *set stamina +0\n    *set leadership +0\n    *set strength +2\n    *set charisma -1\n    *set speed +
