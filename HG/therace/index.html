        *set a2 24\n                    You tell April that you will go with your guess.  She reluctantly agrees.\n                    *goto 19choice\n              #21 squares.\n                \"It's less than that.\"  Says April.  Do you let her answer instead or stick with 21?\n                *choice\n                  #Let April answer.\n                    *set a2 19\n                    \"I think it's 19.\"  She says.  You are not convinced, but go with it anyway.  She is smart, after all!\n                    What will you do now?\n                    *choice\n                      #Go North, to the market.\n                        *goto market\n                      #Go North-West, back towards the bus station.\n                        *goto busstation                     \n                  #Stick with 21.\n                    *set a2 21\n                    You tell April that you will go with your guess.  She reluctantly agrees.\n                    *goto 19choice\n              #19 squares.\n                \"Hmmm... I think you could be right.\"  Says April.  \"There's 9 on each side, but some overlap.  So 9 plus 6 plus4.  That's 19!  I agree!\"\n                *set a2 19\n                *goto 19choice\n          *else\n            \"So it's a big cube made from 27 small cubes.  If you looked at it flat, you could see 9 cubes, but if we turned it around we could see more...  How many in total?\"\n            *input_text a2\n            \"Okay, I'll go with that.\"  Says ${partner}, happy to trust your judgement. What will you do now?\n            *choice\n              #Go North, to the market.\n                *goto market\n              #Go North-West, back towards the bus station.\n                *goto busstation\n    #Say no, but ask if they can help you.\n      The ${boygirl} says they will only help you if you help them too.  Do you?\n      *choice\n        #Yes, why not?\n          *goto questions\n        #No, it's a waste of time.\n          Disappointed, the students leave you alone.  Where will you go now?\n          *choice\n            #North to the market.\n              *goto market\n            #North-West to the Bus station.\n              *goto busstation\n    #Pretend not to understand them and leave.\n      You say something incoherent and leave the pier.\n      Do you go to the market or back to the bus station?\n      *choice\n        #We'll go to the market.\n          *goto market\n        #We will go back to the bus station.\n          *goto busstation\n*else\n  There are few people here on the pier right now.  Perhaps going somewhere else would help.\n  *choice\n    #Go North to the market.\n      *goto market\n    #Go back to the square where Mendez is waiting.\n      *goto square\n\n*label square\n*temp char39\n*set char39 false\n*if charisma > 39\n  *set char39 true\n*page_break\n*if (cstart)\n  *set punotime +1\n  You head back to the square where Mendez is waiting.  \n  *label mendezsquare\n  What will you do?\n  *choice\n    *if c1 = false\n      #Search the square.\n        *label squaresearch\n        *set c1 true\n        *set punotime +2\n        You look around the square for another Mendez clue, and are surprised when ${partner} points to a restaurant.  \"Look!  There's something here.\"  Sure enough, the menu\n        outside the restaurant has been replaced with a large sign saying Mendez Race.  Together you enter the restaurant.\n        The restaurant isn't open plan like most restaurants, but instead has many booths or alcoves that customers sit in.  Together ${partner} and you sit at a booth and are\n        met by a waiter.  \n        \"Today, you eat cuy special.  Very tasty!\"\n        ${partner} looks at you.  \"What's cuy?\"\n        *if (int60) \n          Being a smart person, you tell him that cuy is a Peruvian dish made from... guinea pigs.  Usually, it's a whole guinea pig served fried with potatoes.\n          You both feel sick at the thought of it.\n          *goto cuy\n        *else\n          You say that you have no idea, but what's the worst it could be?  Right?\n          *label cuy\n          Soon, the cuy comes.  A small mammal, fried, with teeth, ears, and eyes still visible, is lying on your plate.\n          The thought of eating it makes you feel a little nauseous.  It actually looks like a fried rat.\n          *if partner = \"Dan\"\n            Dan looks at the food, then looks at you.  \"Do we really have to eat this rat?\"\n            *if (int60)\n              You tell Dan again that it's not a rat.  You tell him to think of it as chicken.  He's still not sure.\n              *goto convincedan\n            *else\n              You tell Dan that's it's not likely to be rat.  It's more like a small rabbit, which isn't such a strange thing to eat.  He's not convinced.\n              *label convincedan\n              You need to convince Dan that he can eat this food.  What will you do?\n              *choice\n                #Tell Dan that no matter what, we can't continue until he eats this.\n                  *set timedelay true\n                  Dan takes his fork, turning it in his hands. He grabs his knife and starts to cut a piece of the meat.  If the situation wasn't so important, his face would\n                  look funny, teeth showing but his lips curled downwards in a disgusted face.  Eyes narrow and high.  He pulls the meat away.  It looks like chicken on his\n                  fork.  He brings it towards his lips, eyes watching the whole way.  Into his mouth, teeth gripping the morsel.  Then he withdraws the fork and lets the flesh\n                  drop into his mouth.  For a second you think he can do it.  Then the vomiting begins.\n                  \n                  Many attempts and a bucket of sick later, Dan finally gives up.  The task is too hard for him.  Your only option now is to take a time penalty at the end of \n                  the race.  You are given your next clue and leave the restaurant.  The one upside about Dan not finishing is you didn't finish it all either.  The food wasn't\n                  good and reminded you of oily chicken wings in both taste and appearance.  \n                  *page_break\n                  *label cuyclue\n                  Together you open the next clue:\n                  \n                  CLUE 1.  CYPHER: 1=A, 2=B, 3=C, etc.\n\n                  That's it.  Very short and useless on it's own.  You quickly deduce that this needs to be used with the answers from the other two challenges.\n                  You are now in the big square again.\n                  *goto mendezsquare\n                *selectable_if (int30) #(INTELLIGENCE) Trick Dan into eating the cuy.\n                  *set punotime +1\n                  You tell Dan to go outside for fresh air.  You tell him to take a few minutes.  While he is gone, you quickly cut up his meat and remove the bones.  You then\n                  add a little salt to the meat and wait for him to return.\n                  \"There, I got them to give you chicken instead.\"  You say.  He looks at you, not convinced.  You look down at your own plate of cuy and cut into it.  The meat\n                  does actually taste like chicken, although a little oily.  Dan takes up his knife and fork, then slowly at first, takes a mouthful.  After a pause, he chews.\n                  \"Not bad!\"  He says with his mouth half full.  \"Haha, and you're eating the rat!  Good work ${name}\".\n                  You silently eat your meal while Dan happily eats his.  Afterwards, the waiter gives you an envelope.\n                  *page_break\n                  *goto cuyclue\n                *selectable_if (char39) #(CHARISMA) Convince Dan that eating the cuy is the right thing to do.\n                  You ask Dan how much $50,000,000 would change his life.  He understands straight away.  \"Alright, I'll do it.  For $50 million.  Come on.  Come on...\"  Dan \n                  grabs his fork and knife and attacks the small carrion.  You watch in awe as he eats his way through it, not stopping to chew.  You work on your own cuy and \n                  before long, you have both finished the food.  You are impressed with the way Dan handled that.  With the right motivation, it seems he can do anything!\n                  The waiter brings you an envelope with your next clue in it.  You leave the restaurant and step back into the square.\n                  *page_break\n                  *goto cuyclue\n          *else\n            ${partner} grabs her knife and fork and cuts a piece of meat from her plate.  She tries it.\n            \"Tastes like chicken.\"  She says after swallowing.  \"With an oily aftertaste.\"\n            *label eatcuy\n            Together, you both eat your way through the food.  It's not pleasant and while it reminds you of chicken wings: oily and boney, you manage to eat it all.\n            Once you finish, the waiter gives you an envelope.  \"Clue\" he says.  Together, you walk out of the restaurant back into the square.\n            *page_break\n            *goto cuyclue\n    #Go South, to the market area.\n      *goto market\n    #Go West, towards the housing complex.\n      *goto houses\n    #Speak to Mendez\n      *if (c1)\n        *if (c2)\n          *if (c3)\n            Mendez looks at you for a moment.  \"Are you ready to answer?\"\n            *label finalpunochoice\n            Currently, you have all three clues.  Your first answer is ${a1} and your second answer is ${a2}.  You now need to use both of these numbers with the first clue\n            to get two letters.\n            *choice\n              #Read the first clue again.\n                The clue says:\n\n                CLUE 1.  CYPHER: 1=A, 2=B, 3=C, etc.\n                *page_break\n                *goto finalpunochoice\n              #Change my first number.\n                The clue reads:\n\n                CLUE 2.  YOUR FIRST NUMBER IS:  THE EIGHTH PRIME NUMBER\n                \n                Your current answer is ${a1}\n                *choice\n                  #Change answer.\n                    What will you change to?\n                    *input_text a1\n                    *goto finalpunochoice\n                  #Keep this answer.\n                    *goto finalpunochoice\n              #Change my second number.\n                The clue says:\n\n                CLUE 3.  IMAGINE YOU HAVE 27 SUGAR CUBES ARRANGED INTO A LARGER CUBE, EACH SIDE 3 CUBES HIGH, WIDE, OR DEEP.  WHAT IS THE MAXIMUM NUMBER OF SUGAR CUBES YOU CAN SEE\n                AT ANY ONE TIME?  NO MIRRORS ALLOWED!  YOUR ANSWER IS THE SECOND NUMBER.\n\n                Your current answer is ${a2}\n                *choice\n                  #Change answer.\n                    What will you change to?\n                    *input_text a2\n                    *goto finalpunochoice\n                  #Keep this answer.\n                    *goto finalpunochoice\n              #Give Mendez our answer!\n                *label finalpunochoice2\n                \"So, what two letters do you have for me?\"\n                *choice\n                  #My letters are...\n                    Type both letters together, no space and uppercase.\n                    *input_text answer\n                    *if answer = \"SS\"\n                      \"Excellent!\"  Says Mendez.  \"And these two letters are the next two letters in your final destination puzzle.\"\n                      *goto punofinished\n                    *elseif answer = \"ss\"\n                      \"Excellent!\"  Says Mendez.  \"And these two letters are the next two letters in your final destination puzzle.\"\n                      *goto punofinished\n                    *else\n                      \"Hmmm... That's not right, I'm afraid.  You can try again, or take an hour time penalty.\"\n                      *choice\n                        #Try again\n                          *goto finalpunochoice2\n                        #Take the penalty.\n                          *set punotime +6\n                          \"I'm sorry to hear that.\"  Says Mendez.  \"Well, you did good to get all three clues.  The correct answers were 'S' and 'S'!  Both answers to the \n                          questions were 19!\"\n                          *goto punofinished\n                  #Hang on... letters?  I have numbers?\n                    \"You need to use the first clue to change your two numbers into letters.  Then come back to me.\n                    *goto finalpunochoice\n              #Tell Mendez we need more time.\n                \"Very well.\"  Says the large Mexican Mendez.\n                *goto mendezsquare\n          *else\n            *goto notenough            \n        *else\n          *goto notenough\n      *else\n        *label notenough\n        Mendez looks at you surprised.  \"You don't have all the clues yet.  Don't waste your time talking to me!  Get racing!!\"  You leave him alone.\n        *goto mendezsquare\n*else\n  *set punotime +1\n  *page_break\n  *set cstart true\n  You enter a large and busy square with many people and modern shops.  Rather than a perfect square, the area is elongated with a church at the far, narrow end.  Outside the \n  church, you are relieved to see Andre Mendez standing with a row of Peruvian guards (?) either side of him.  Together, you and ${partner} approach him.\n  \"Welcome.\"  He says.  \"You are the \n  *if punotime = 3\n    first team to arrive!  That was good going!\n    *goto punochallenge\n  *elseif punotime = 4\n    third team to arrive.  Well done.  Ah, and here come the Russians!  Let me talk to you all together.\"  You wait a moment for the Russian couple, Alina and Viacheslav to \n    get to you.  Anyway, let me tell you what you have to do now.  Mendez produces two envelope from his pocket and gives one to each team.  Inside are instruction to this\n    challenge.  Once you complete everything, you should be left with two letters.  Once you have both letters, return to me to complete this leg of the race.  Good luck!\n    You have the choice now to work with the Russians or go on your own.  What will you do?\n    *choice\n      #Work with the Russians.\n        *if russia > 10\n          \"Sounds good to me!\"  Says Alina.  \n          Together, you open your envelopes.  Inside is a piece of paper:\n\n          IN THE TOWN OF PUNO ARE THREE CHALLENGES.  THEY ARE IDENTIFIED BY MENDEZ SIGN POSTS.  AS YOU COMPLETE EACH CHALLENGE YOU WILL RECEIVE A CLUE.  PUT THE THREE CLUES TOGETHER\n          TO GET THE TWO LETTERS YOU NEED.  THEN RETURN TO MENDEZ WITH YOUR LETTERS TO COMPLETE THIS LEG OF THE RACE.\n\n          \"And we know where to start!\"  Says Viacheslav.  \"We saw a sign for the Mendez race in the market area.  We should go there first.\"\n          Together, you head to the market area.\n          *set russianhelp true\n          *goto market\n        *else\n          The female Russian, Alina, politely tells you that they would prefer to work on their own.  They move away from you, leaving you standing by Mendez.  Together, you\n          and ${partner} find a quiet part of the square.\n          *goto envelope\n      #Go our own separate way.\n        You wish the Russians luck and walk away from them to read your clue.\n        *goto envelope\n  *else\n    *if punotime = 5\n      fourth team to arrive.  Not bad.\n      *goto punochallenge\n    *elseif punotime = 6\n      fifth team to arrive.  Ah, and here come the Koreans!  Let me talk to you all together.\"  You wait a moment for the Koreans, Sunny and Sean to get to you.  Anyway, let\n      me tell you what you have to do now.  Mendez produces two envelope from his pocket and gives one to each team.  Inside are instruction to this challenge.  Once you\n      complete everything, you should be left with two letters.  Once you have both letters, return to me to complete this leg of the race.  Good luck!\n      You have the choice now to work with the Koreans or go on your own.  What will you do?\n      *choice\n        #Work with the Koreans.\n          *if korea > 40\n            Sunny and Sean both instantly accept your proposal.  \"Working together, we can do fast!\"  Says Sean.  He's right.  What is it they say?  Many hands make light work?\n            Together, the four of you open the envelopes.  Inside is a piece of paper:\n\n            IN THE TOWN OF PUNO ARE THREE CHALLENGES.  THEY ARE IDENTIFIED BY MENDEZ SIGN POSTS.  AS YOU COMPLETE EACH CHALLENGE YOU WILL RECEIVE A CLUE.  PUT THE THREE CLUES TOGETHER\n            TO GET THE TWO LETTERS YOU NEED.  THEN RETURN TO MENDEZ WITH YOUR LETTERS TO COMPLETE THIS LEG OF THE RACE.\n\n            \"Ah!  We see place.  We go now!  In square.  Restaurant.  We go!\"  Says Sean, clearly knowing what he's talking about.  Together, the four of you move through the\n            square following Sean.  Soon, you are outside a restaurant that does indeed have a Mendez sign.\n            *page_break\n            The restaurant isn't open plan like most restaurants, but instead has many booths or alcoves that customers sit in.  Together ${partner} and you sit at a booth and are\n            met by a waiter.  \n            \"Today, you eat cuy special.  Very tasty!\"\n            ${partner} looks at you.  \"What's cuy?\" \n            Sunny looks at ${partner} and says. \"It's guinea pig.  It's okay.  It taste chicken.\"\n            You exchange funny looks with ${partner}.  \"We're eating guinea pig?\"  You say.\n            \"In Korea.  Guinea pig no.  But Bosin-tang.  Haha.  Some people eat... dog!\"  Says Sean.  Somehow, his words don't ease your stomach.\n            Soon, the food arrives and it actually looks like a rat.  One that's been fried and served with potatoes and a small garnish.\n            You and ${partner} slowly make your way through the food.  Sunny and Sean are definitely better than you at this and they finish quickly.\n            They look like they will hang around and wait for you.  Instead, you tell them to leave.  They've helped already by getting you here!\n            about 15 minutes after the Koreans left, you eat your last bite.  Neither you or ${partner} feel great, but knowing it was guinea pig and not rat helped a lot!\n            *set punotime +2\n            *page_break\n            \"Congratulations!\"  Says the waiter.  He hands you an envelope.  You open it at the table.\n            *set c1 true\n            *set koreaalive true\n            *goto cuyclue\n          *else\n            The Korean brother, Sean, shakes his head no.  \"We go only one.\"  Says Sunny.  \"Solo.\"  Adds Sean.  Clearly not wanting to work with you, they move away from you,\n            leaving you standing by Mendez.  Together, you and ${partner} find a quiet part of the square.\n            *goto envelope\n        #Go our own separate way.\n          You wish the Koreans luck and walk away from them to read your clue.\n          *goto envelope\n    *else\n      last team to arrive.  You could do better!\n      *goto punochallenge\n\n\n*label punochallenge\nAnyway, let me tell you what you have to do now.  Mendez produces an envelope from his pocket.  Inside are instruction to this challenge.  Once you complete everything, you \nshould be left with two letters.  Once you have both letters, return to me to complete this leg of the race.  Good luck!  Now go!\"  You move to one side away from Mendez.\n*label envelope\n*page_break\nYou open the envelope.  Inside is a piece of paper:\n\nIN THE TOWN OF PUNO ARE THREE CHALLENGES.  THEY ARE IDENTIFIED BY MENDEZ SIGN POSTS.  AS YOU COMPLETE EACH CHALLENGE YOU WILL RECEIVE A CLUE.  PUT THE THREE CLUES TOGETHER\nTO GET THE TWO LETTERS YOU NEED.  THEN RETURN TO MENDEZ WITH YOUR LETTERS TO COMPLETE THIS LEG OF THE RACE.\n\nYou fold the paper and start your journey.  Where will you begin?\n*choice\n  #Search the square for a clue.\n    *goto squaresearch\n  #Go West, towards a housing complex.\n    *goto houses\n  #Go South, towards the market area.\n    *Goto market\n\n*label old\n*page_break\n*if (Cstart)\n  *set punotime +1\n  *if (oldplace)\n    You reenter the old part of town.  The dusty roads and strange looks from locals here give you an uneasy feeling.  What will you do?\n    *goto oldchooser\n  *else\n    *set oldplace true\n    You enter an older part of town.  Here, the buildings are similar to those you saw back in Ica.  Mould and damp cover one wall.  Many other buildings have cracks in the side.  \n    Few places have been renovated, or even painted recently.  Further into the area, you see buildings with corrugated iron roofs (or rooves for true Anglophiles).  It seems \n    unlikely that you are supposed to be here as part of the race.  What will you do?\n    *label oldchooser\n    *choice\n      #Go West, back to the market.\n        *goto market\n      #Search the area for a clue.\n        *set punotime +2\n        You spend a little time looking around the old town, but don't find anything related to the race.  You haven't completed a thorough search, but you are aware that the\n        local people here are watching you.  You are also very doubtful that there would be anything important here.  Will you keep looking or go somewhere else?\n        *choice\n          #Keep looking.\n            There are still plenty of streets to look down.  Perhaps one of them will have a race clue.  You walk further into this old part of town.  You become more \n            self-conscious with every step.  Are you sure you want to go this way?\n            *choice\n              #Yes.  What's the worst that could happen?\n                You turn away from the main road into a dimly lit side-street.  Something tells you this was a big mistake.  The path ahead of you becomes blocked with three \n                burly men.  Turning back, the path behind you is also blocked by two men with baseball bats.  The men begin to advance towards you.  You have walked right into\n                a trap.  You have only two choices:  Fight or surrender.\n                *choice\n                  #Fight the men behind us.\n                    Before you throw the first punch, ${partner} stops you.  \"This is futile.  Better to just do what they want.\"\n                    *goto futile\n                  #Fight the men ahead of us.\n                    Before you throw the first punch, ${partner} stops you.  \"This is foolish.  Better to just do what they want.\"\n                    *goto futile\n                  #Surrender.\n                    *label futile\n                    You relax as much as you can under the circumstances and wait for their demands.\n                    \"Money, now.\"  Says a man with an unusually large jaw and a solemn expression on his face, clearly the leader of this group.\n                    ${partner} and you both give up all of your money.  \n                    *set money 0\n                    Feeling stupid for coming here the men let you leave the area unhurt.  However you now have no money.\n                    *achieve penniless\n                    *if partner = \"Dan\"\n                      You wonder why Dan didn't want to fight.  \"I'm strong and not smart, but I'm not stupid!\"  He says.  \"Five of them with bats and just the two of us.  We\n                      had no chance.  At best, I could have taken two of them.\"  He's right.  You would have lost every time.  \"Still,..\" says Dan.  \"I kept this!\"  He shows\n                      you $50 that he managed to keep hidden.  You both smile and feel a little better.\n                      *set money 50\n                      *goto market\n                    *else\n                      \"Don't feel so bad.\"  Says ${partner} once you are clear of the area.  \"If we'd have fought them, we'd be dead now!\"\n                      ${partner} smiles.  \"Also, I made it out with this!\"\n                      *if partner = \"April\"\n                        April takes off her shoe and shows you a roll of bank notes.  She had $50 hidden away.  You feel a little better than before. \n                        *set money 50\n                        *goto market\n                      *else\n                        Leonie reaches into her bra and pulls out a roll of bank notes.  She has $50 which she kept hidden for emergencies.  You feel a little better.\n                        *set money 50\n                        *goto market\n\n\n              #On second thoughts, It's probably better to get back to the market.\n                Probably a wise choice.\n                *goto market\n          #Go back to the market area.\n            Probably a wise choice.\n            *goto market\n*else\n  *set punotime +1\n  *set oldplace true\n  You enter an older part of town.  Here, the buildings are similar to those you saw back in Ica.  Mould and damp cover one wall.  Many other buildings have cracks in the side.  \n  Few places have been renovated, or even painted recently.  Further into the area, you see buildings with corrugated iron roofs (or rooves for true Anglophiles).  It seems \n  unlikely that you are supposed to be here as part of the race.  What will you do?\n  *choice\n    #Go West, back to the market.\n      *goto market\n\n*label punofinished\n*set finishtime (punotime)*10\nMendez tells you yours statistics for this leg of the race.  \"In total, it took you ${finishtime} minutes to complete the tasks after stepping off the bus this afternoon.\nYou are the \n*if punotime\u003c15\n  first team to finish!  Well done!  That's excellent going!  Okay, you can have a rest now.  We'll carry on tomorrow.\"\n  *set position 1\n  *goto last\n*elseif punotime\u003c18\n  second team!  Good going!  Only the ${american} were faster than you!  Okay, you can have a rest now.  We'll carry on tomorrow.\"\n  *set position 2\n  *goto last\n*else\n  *if punotime\u003c20\n    *set position 3\n    third team to arrive.  Feels good, doesn't it?  Okay, you can have a rest now.  We'll carry on tomorrow.\"\n    *goto last\n  *elseif punotime\u003c25\n    fourth team to arrive.  It's not perfect but it's not bad either.  You will have to work harder in the next leg.  Okay, you can have a rest now.  We'll carry on tomorrow.\"\n    *set position 4\n    *goto last\n  *else\n    *if punotime\u003c30\n      fifth team to arrive.  You left it late and you have a lot of work to do to catch up now.  Okay, you can take a rest.  We'll carry on tomorrow.\"\n      *set position 5\n      *goto last\n    *else\n      last team to arrive...\"  It takes you a moment for these words to sink in.  \"I'm afraid to say that you have been eliminated from the race.  Peru ends for you here.\"\n      Mendez continues talking but you stop listening.  You look at ${partner} who has worked through this race with you.  You think back to the places you've been to and the\n      tasks you have overcome.  You remember the pangs of excitement you had when you thought about actually winning the race and all that fame and money.  Then you feel a \n      deep hurting inside.  A deep sorrow, which at that moment, could only be shared with ${partner}.\n      ${partner} speaks.  \"Thank you Mr Mendez.  It's been a fantastic trip.  ${name}, the race would never have been the same without you.  Thank you for an amazing experience.\n      You hug ${partner} in a strong embrace.  Then you both walk away together.  Now, you will take a plane back to Lima, then an international flight home.  In twenty-four \n      hours, you will be back in your house in ${country} and everything in Peru will fade into memory.  But that's in twenty-four hours.  For now, you still have time for a \n      mini-adventure with ${partner}.  You decide that you will savour every moment of it.\n\n      THE END\n\n      *page_break GAME OVER\n      It is game over, however you have two choices here.  You can restart the whole game or you can play again from the start of Arequipa.  What will you do?\n      *choice\n        #GO BACK (carry on playing from Puno: Your money will not be reset)\n          *goto PUNOSTART\n        #RESTART (end this game)\n          *goto_scene ending\n\n*label last\nYou are taken to a hotel near the bus station.  Very tired, you decide to take a nap.  \n*page_break\nWhen you awake, it is dark outside.  Your partner, who you are sharing a room with, is \nawake and looking out the window.  After a shower and freshening up, you go together down to the restaurant.  There, you listen to Mendez tell you what's coming up next.\n\n\"So now you all have eight of the 10 letters.  A, I, E, O, L, L, S and S.  There's only two more to go and you will be given them tomorrow.  Assuming you are still in the race.\nWe're now down to the final five.  In order of finishing today the teams are:\n*set fd4 \"S, S\"\n*if (koreaalive)\n  *if position =1\n    First, the ${country} team.\n    Second, the ${american} team.\n    Third, the Spanish.\n    Fourth, the Koreans.\n    Fifth, the Indians.\n    The Russians, Alina and Viacheslav, didn't make it.  They are on their way back to Russia.\n    *goto last2\n  *elseif position =2\n    First, the ${american} team.\n    Second, the ${country} team.\n    Third, the Indians.\n    Fourth, the Spanish.\n    Fifth, the Koreans.\n    The Russians, Alina and Viacheslav, didn't make it.  They are on their way back to Russia.  \n    *goto last2\n  *else\n    *if position =3\n      First, the ${american} team.\n      Second, the Indians.\n      Third, the ${country} team.\n      Fourth, the Spanish.\n      Fifth, the Koreans.\n      The Russians, Alina and Viacheslav, didn't make it.  They are on their way back to Russia.  \n      *goto last2\n    *elseif position =4\n      First, the ${american} team.\n      Second, the Spanish.\n      Third, the Indians.\n      Fourth, the ${country} team.\n      Fifth, the Koreans.\n      The Russians, Alina and Viacheslav, didn't make it.  They are on their way back to Russia.  \n      *goto last2\n    *else\n      First, the ${american} team.\n      Second, the Spanish.\n      Third, the Indians.\n      Fourth, the Koreans.\n      Fifth, the ${country} team.\n      The Russians, Alina and Viacheslav, didn't make it.  They are on their way back to Russia.  \n      *label last2\n      *if russia>10\n        You feel a little sad to see the Russian team leave.  On one hand, it brings you closer to winning the race.  On the other hand, they were good people and you will miss them.\n        *goto last3\n      *else\n        *label last3\n        *page_break\n        Mendez talks more about what will happen tomorrow.  In the morning, you will take a bus from Puno to a secret destination.  He promises that there WILL be surprises.\n        For now, you are free to spend the evening how you wish.\n        Still feeling tired, you go back to your room and sleep.  You just know it's going to be another long day tomorrow!\n        *finish Leg 5: Crossing the Line\n*else\n  *set korean \"Russian\"\n  *set sean \"Viacheslav\"\n  *set sunny \"Alina\"\n  *if position =1\n    First, the ${country} team.\n    Second, the ${american} team.\n    Third, the Spanish.\n    Fourth, the Indians.\n    Fifth, the Russians.\n    The Koreans, Sunny and Sean, didn't make it.  They are on their way back to Korea.\n    *goto last22\n  *elseif position =2\n    First, the ${american} team.\n    Second, the ${country} team.\n    Third, the Indians.\n    Fourth, the Spanish.\n    Fifth, the Russians.\n    The Koreans, Sunny and Sean, didn't make it.  They are on their way back to Korea.  \n    *goto last22\n  *else\n    *if position =3\n      First, the ${american} team.\n      Second, the Indians.\n      Third, the ${country} team.\n      Fourth, the Spanish.\n      Fifth, the Russians.\n      The Koreans, Sunny and Sean, didn't make it.  They are on their way back to Korea.  \n      *goto last22\n    *elseif position =4\n      First, the ${american} team.\n      Second, the Spanish.\n      Third, the Indians.\n      Fourth, the ${country} team.\n      Fifth, the Russians.\n      The Koreans, Sunny and Sean, didn't make it.  They are on their way back to Korea.  \n      *goto last22\n    *else\n      First, the ${american} team.\n      Second, the Spanish.\n      Third, the Indians.\n      Fourth, the Russians.\n      Fifth, the ${country} team.\n      The Koreans, Sunny and Sean, didn't make it.  They are on their way back to Korea.  \n      *label last22\n      *if korea>45\n        You feel a little sad to see the Korean team leave.  On one hand, it brings you closer to winning the race.  On the other hand, they were good people and you will miss them.\n        *goto last32\n      *else\n        *label last32\n        *page_break\n        Mendez talks more about what will happen tomorrow.  In the morning, you will take a bus from Puno to a secret destination.  He promises that there WILL be surprises.\n        For now, you are free to spend the evening how you wish.\n        Still feeling tired, you go back to your room and sleep.  You just know it's going to be another long day tomorrow!\n        *finish Leg 5: Crossing the Line\n     \n", "21bperu-bolivia": "*label journey\n*temp dollarchange\n*set dollarchange 1\nAfter over four hours of travel on a hot, stuffy bus, you finally reach what you are told is the Peruvian-Bolivian border.\n*if passport = \"stolen\"\n  *goto borderchoice1\n*else\n  To cross the border you need to leave the bus and physically walk over the line.  However first, you need an exit stamp in your passport on the Peruvian side of the border.\n  *page_break\n  Together, you and ${partner} join the outdoor cue of people waiting to have their passports stamped.  It is very hot out here, a dry heat akin to an oven.  Fortunately the\n  line moves quickly and soon, you enter a small building where you are given your exit stamp.\n\n  *set stamina -5\n  Now, very hot, you have a choice for what to do next.\n  *label borderchoice1\n  *choice\n    #Get back on the bus.\n      You head back to where you departed the bus, however the bus has gone!  There are several other buses in the area, but yours isn't here.  What should you do?\n      *choice\n        #Look for it.\n          You look around but can't see the bus anywhere.\n          *if partner=\"April\"\n            Then April tugs your arm.  \"There it is!\" She says, pointing across the border.  The bus has already moved forward to the Bolivian side of the border and is waiting\n            patiently for you and the other travellers to return.\n            *goto crosstheline\n          *else\n            It's not here.\n            \"Maybe we get a new bus when we cross the border?\"  Says ${partner}.  Perhaps\n            *if partner =\"Dan\"\n              he\n              *goto gender1\n            *else\n              she\n              *label gender1\n              is right.\n              *goto crosstheline\n        #Forget the bus and do something else.\n          *goto borderchoice1\n    #Cross the border into Bolivia on foot.\n      *label crosstheline\n      You head to the border line between the nations.  There are no metal detectors here, simply a chain across the road to prevent vehicles from driving across.  A solitary\n      guard stands by the chain.  In a single step, you cross over the line into Bolivia.  Very simple.  \n      *page_break\n      *set stamina -5\n      You now join another line of travellers waiting to get a Bolivian entry\n      stamp in their passports.  Again, the cue is outdoors and with the sun high in the sky, the whole process is tiring.  When your turn arrives you get your passport\n      stamped and wait for your partner.  Here, you can see same bus you arrived in waiting for you to reembark.  The bus is less than half full, so you still have a little\n      time.\n      *label borderchoice2\n      What will you do?\n      *choice\n        #Get on the bus.\n          You get back on the bus and wait.  The Spanish are already here.  You watch out the window and see the \n          *if korean = \"Korean\"\n            Korean team returning.  Then you see the ${american} run to the bus.  Once the Koreans and ${american} are on board, the engine starts up.  You start to move.\n            You realise that the Indians aren't yet here!  The bus is leaving without them.  You look out the window to see Pritesh and Kiran running to catch the bus.\n            They're too slow.  What will you do?\n            *choice\n              #Nothing.  Watch them be left behind.\n                You watch as the Indians fall further and further behind.  After a few moments, the ${american} Travis says aloud \"Where are the Indians?\"  The bus doesn't stop\n                but continues to the destination of a little town called Copacabana.\n                *finish  Leg 6: Copacabana\n              #Tell the driver to stop.\n                You move to the front of the bus and tell the driver to stop.  He ignores you, looking straight ahead at the road.  \"Leave it.\"  Says the ${american} Justin.\n                \"They didn't make it.  The race can be cruel.\"  With that, the Indian team fall out of the race.\n                *finish  Leg 6: Copacabana\n          *else\n            *set korean \"Indian\"\n            *set sean \"Pritesh\"\n            *set sunny \"Kiran\"\n            Indian team returning.  Then you see the ${american} run to the bus.  Once the Indians and ${american} are on board, the engine starts up.  You start to move.\n            You realise that the Russians aren't yet here!  The bus is leaving without them.  You look out the window to see Alina and Viacheslav running to catch the bus.\n            They're too slow.  What will you do?\n            *choice\n              #Nothing.  Watch them be left behind.\n                You watch as the Russians fall further and further behind.  After a few moments, the ${american} Travis says aloud \"Where are the Russians?\"  The bus doesn't stop\n                but continues to the destination of a little town called Copacabana.\n                *finish  Leg 6: Copacabana\n              #Tell the driver to stop.\n                You move to the front of the bus and tell the driver to stop.  He ignores you, looking straight ahead at the road.  \"Leave it.\"  Says the ${american} Justin.\n                \"They didn't make it.  The race can be cruel.\"  With that, the Russian team fall out of the race.  The bus continues on to a little town called Copacabana.\n                *finish  Leg 6: Copacabana\n        #Change some currency.\n          You find a stall changing money.  You ask to exchange your money to Bolivianos.  The exchange rate is 6.5 Bolivianos to the Dollar or 2 Bolivianos to the Sol.  This means if you \n          change $100 you will get 650 Bolivianos.  If you change 100 Sols, you will get 200 Bolivianos.  \n          *label moneychange\n          You currently have ${money} dollars, ${sols} Sols and ${bols} Bolivianos.\n          How many dollars will you change?\n          *choice\n            #$100\n              *set dollarchange 100\n              *goto change_money\n            #$200\n              *set dollarchange 200\n              *goto change_money\n            #$300\n              *set dollarchange 300\n              *goto change_money\n            #I don't want to change dollars.\n              *goto sols_change\n        #Get a drink.\n          would you like Inca Cola or Mata de Coca\n          *choice\n            #Inca Cola\n              You buy a bottle of Inca Cola.  A green liquid that tastes like bubble gum.\n              *set stamina +5\n              *goto borderchoice2\n            #Mata de Coca\n              You buy a mug of hot tea.  It doesn't help with the heat, but you do feel a little better after drinking it.\n              *set climate +1\n              *set stamina +5\n              *goto borderchoice2\n    #Get myself a drink from one of the many stalls.\n      would you like Inca Cola or Mata de Coca\n      *choice\n        #Inca Cola\n          You buy a bottle of Inca Cola.  A green liquid that tastes like bubble gum.\n          *set stamina +5\n          *goto borderchoice1\n        #Mata de Coca\n          You buy a mug of hot tea.  It doesn't help with the heat, but you do feel a little better after drinking it.\n          *set climate +1\n          *set stamina +5\n          *goto borderchoice1\n    #Exchange my money into Bolivian currency.\n      You find a stall changing money.  You ask to exchange your money to Bolivianos.  The exchange rate is 7 Bolivianos to the Dollar or 2 Bolivianos to the Sol.  This means if you \n      change $100 you will get 700 Bolivianos.  If you change 100 Sols, you will get 200 Bolivianos.  \n      *label moneychange2\n      You currently have ${money} dollars, ${sols} Sols and ${bols} Bolivianos.\n      How many dollars will you change?\n      *choice\n        #$100\n          *set dollarchange 100\n          *goto change_money2\n        #$200\n          *set dollarchange 200\n          *goto change_money2\n        #$300\n          *set dollarchange 300\n          *goto change_money2\n        #I don't want to change dollars.\n          *goto sols_change2\n\n*label change_money\n*if dollarchange>money\n  You don't have that much money!\n  *goto moneychange\n*else\n  *set money money-dollarchange\n  *set dollarchange 7*dollarchange\n  *set bols bols+dollarchange\n  *label sols_change\n  You currently have ${money} dollars, ${sols} Sols and ${bols} Bolivianos.\n  How many Sols will you change?\n  *choice\n    #100 Sols\n      *set dollarchange 100\n      *goto change_sols\n    #200 Sols\n      *set dollarchange 200\n      *goto change_sols\n    #300 Sols\n      *set dollarchange 300\n      *goto change_sols\n    #400 Sols\n      *set dollarchange 400\n      *goto change_sols\n    #500 Sols\n      *set dollarchange 500\n      *goto change_sols\n    #I don't want to change Sols\n      You leave the stall.\n      *page_break\n      *goto borderchoice2\n  *label change_sols\n  *if dollarchange>sols\n    You don't have that much money!\n    *goto moneychange\n  *else\n    *set sols sols-dollarchange\n    *set dollarchange 2*dollarchange\n    *set bols bols+dollarchange\n    You now have ${money} dollars, ${sols} Sols and ${bols} Bolivianos.\n    You leave the stall.\n    *goto borderchoice2\n\n*label change_money2\n*if dollarchange>money\n  You don't have that much money!\n  *goto moneychange2\n*else\n  *set money money-dollarchange\n  *set dollarchange 7*dollarchange\n  *set bols bols+dollarchange\n  *label sols_change2\n  You currently have ${money} dollars, ${sols} Sols and ${bols} Bolivianos.\n  How many Sols will you change?\n  *choice\n    #100 Sols\n      *set dollarchange 100\n      *goto change_sols2\n    #200 Sols\n      *set dollarchange 200\n      *goto change_sols2\n    #300 Sols\n      *set dollarchange 300\n      *goto change_sols2\n    #400 Sols\n      *set dollarchange 400\n      *goto change_sols2\n    #500 Sols\n      *set dollarchange 500\n      *goto change_sols2\n    #I don't want to change Sols\n      You leave the stall.\n      *page_break\n      *goto borderchoice1\n  *label change_sols2\n  *if dollarchange>sols\n    You don't have that much money!\n    *goto moneychange2\n  *else\n    *set sols sols-dollarchange\n    *set dollarchange 2*dollarchange\n    *set bols bols+dollarchange\n    You now have ${money} dollars, ${sols} Sols and ${bols} Bolivianos.\n    You leave the stall.\n    *goto borderchoice1", "22copacabana": "*label COPACABANASTART\n*image map6.jpg\nCompared to the cities of Lima, Arequipa, and even the small city Puno, Copacabana is very small.  Dusty and underdeveloped, but with a clear tourist industry and an unusual\ncharm, somehow this town gives you a feeling of tranquility.  \n\nMendez tells you that you have one hour of freedom, then you will begin the days activity from this same bus stop.  You will need to find your own accommodation for tonight and now might be a good \ntime to do that. You walk along what you guess is the high street and see many signs advertising hotels, although a lot of them have additional signs reading \"NO VACANTES\",\nand in English: \"FULL\". Another road heads downhill towards what looks like a bay or a dock, and there are many simple restaurants mixed in with tourist shops.  ${partner} \nsuggests that it would be a good idea to sort out a hotel first before continuing the race.  You are also aware of a deep hunger in your belly.  It is 1:30pm and you haven't\neaten lunch yet.\n*temp NOTREADY\n*set NOTREADY false\n*temp dollarchange\n*set dollarchange 0\n*temp moneyproblem\n*set moneyproblem 0\n*temp copatime\n*set copatime 0\n*temp hotel\n*set hotel true\n*temp first\n*set first \"AA\"\n*temp second\n*set second \"AA\"\n*temp third\n*set third \"AA\"\n*temp attempts\n*set attempts 0\n*temp place\n*temp perfect\n*set place 0\n*set perfect 0\n\nWhat will you do first?\n*label copafirst\n*choice\n  *selectable_if (hotel) #Find a suitable hotel.\n    From here you can see three suitable hotels that don't have \"FULL\" signs.  You head to the first one, called the Courtyard Hotel.\n    You go into the Courtyard hotel.  The place is true to it's name as the entrance opens up into a large courtyard with a three-storey building surrounding each wall.  \n    *label payhotel\n    You choose a room which costs 100 Bolivianos or $20 each.  \n    You currently have $ ${money} and ${bols} Bolivianos.  How will you pay?\n    *choice\n      #Pay with dollars.\n        *if money\u003c20\n          You don't have enough dollars.\n          *set moneyproblem +1\n          *if moneyproblem=2\n            *goto exchange\n          *else\n            *goto payhotel\n        *else\n          *set money -20\n          *goto hotelroom\n      #Pay with Bolivianos.\n        *if bols\u003c100\n          You don't have enough Bolivianos.\n          *set moneyproblem +1\n          *if moneyproblem=2\n            *goto exchange\n          *else\n            *goto payhotel\n        *else\n          *set bols -100\n          *label hotelroom\n          You pay for the room and take your bags inside.  The room is large and open, yet very simple.  Three single beds form a row along the near wall.  A wooden\n          table and single chair cover the near corner.  A large window looks out onto the street below.\n          You still have time to do something else.  What will you do?\n          *set copatime +1\n          *set hotel false\n          *goto copafirst\n  #Get something to eat.\n    *Set copatime +4\n    You wander around the restaurants until you find a respectable looking place that will serve pizza.  You take a seat with ${partner} and wait for your order.  Finally,\n    you are served and enjoy an unusual pizza with lots of salad leaves on top of cheese and anchovies.  You wonder if it's a local concoction.  \n    What will you drink with the pizza?\n    *choice\n      #Inca Cola\n        *goto drinktime\n      #Mata de Coca\n        *set climate +1\n        *goto drinktime\n      #Water\n        *goto drinktime\n    *label drinktime\n    The cost for the pizza and drink is 30 Bolivianos.\n    *if bols>29\n      *set bols -30\n      *goto copafirst\n    *elseif money>9\n      As you don't have enough Bolivianos, you have to pay in dollars.  You pay $10 for the meal.\n      *set money -10\n      *goto copafirst\n    *else\n      As you don't have enough Bolivianos, and no dollars, you pay over the odds in Sols.  You pay 30 Sols for the meal.\n      *set sols -30\n      *goto copafirst\n  #Go down to the bay and see what's there.\n    You head down to the bay where a narrow, yet long beach dominates the shore line.  To one side, rows of small fish restaurants line up with the beach.  Ahead is a dock \n    with many tourist boats to take you to the nearby islands.  To the right, there seems to be a path leading up to a cliff way above.\n    Where will you go?\n    *label baychoice\n    *if copatime>5\n      You realise that your hour is nearly up.  You head back to the bus stop where you entered the town.\n      *goto lastchallengestart\n    *else\n      *choice\n        #Go to the dock.\n          You walk down to the dock and look at the boats.  Some are tour boats offering trips to the local islands of Isla del Sol, Taquile, Uros, Isla de la Luna and\n          other places.  The lake itself looks peaceful and you can't help but think that it would be nice to relax in a boat here once the race is over.\n          You don't have time to go on a sight-seeing tour now though.  What will you do?\n          *goto baychoice\n        #Go to the fish restaurants.\n          Following your hunger, you head to the row of fish restaurants.  You choose one that looks good and take a seat.  Many local people are here and there's a lot of\n          bustling going on as staff quickly take and deliver orders of freshly grilled fish to different tables.  You are quickly served and enjoy the food, as well as the\n          location.  It's nice here, eating fish outside in the shade, at the side of a huge open lake while the sun shines strongly overhead.  You take your time over the lunch.\n          *set copatime +4\n          Finally, you decide it's time to leave.  You follow the path back to the bus stop where you entered the town.\n          *goto lastchallengestart\n        #Go to the cliff path.\n          You start to walk along the cliff path, but quickly realise it's going to take more than an hour to go up to the top.  You head back to the bay.\n          *set copatime+1\n          *goto baychoice\n\n*label lastchallengestart\n*page_break\nYou return to Mendez and the other contestants.  It's definitely getting close to the end of the race.  While once, there were 18 contestants, now there are just 8.  You stand\nwith the ${american}, the ${Korean} team, and the Spanish.\n\nMendez begins to talk.\n*page_break\n\"So here we are.  Out of Peru and into Bolivia at a town called Copacabana.  You have eight of the ten letters to your final destination and need just two more.  \nThey are 'L' and 'D'\n*set fd5 \"L, D\"\n\nTHE TEN LETTER ARE A, E, I, O, L, L, L, S, S, D\n*page_break\nYour heart races at this point.  You know that now you can work out the final destination, it's just a matter of time before one of the four remaining teams wins the race.\n*page_break\n\"Okay, everyone.  Walk with me.  We're going to the beach.\"\n\nYou walk with Mendez as he leads the way to the beach.\n\"Well done everyone for getting this far.\"  Says Mendez.  \"Now you have all ten letters, it's time for your challenge in Copacabana!  You need to find the final destination!\nHe leads you to a part of the beach split with four partitions.  The sand in each partition is littered with many white boards on the floor.  Each board has a word upon it.\n\"Each team will work in their own partition.  You need to select the correct words from the piles here and form your final destination.\"\nYou look at some of the words on the ground around you.  Each word uses some of the letters from your ten.  You need to choose the\ncorrect two or three words in the correct order to find out where to go next.  Each team tries over and over until you find the right answer.  The team who takes the most\nattempts... NOT the longest time... will be eliminated.  \n*page_break\n(NOTE TO PLAYERS:  While you could use Google to solve this puzzle, I'm sure you will find it much more satisfying if you use logic!)\n*page_break\nYour choices are:\n\nAID, DEL, LES, LOS, OLD, SAD, SAI, SOL, DEAL, DELI, DIAL, IDOL, ISLA, LAID, LOAD, OILS, SEAL, SIDE, SODA, SOIL, SOLD, LADEL, SLIDE, LADIES, SOILED\n\n*if partner = \"April\"\n  \"It's not two words!\"  Says April.  \"It can't be the two five-letter words as we only have one E.  It can't be Ladies as then we need a four-letter word made from L, L, O, and S.  \n  There isn't one.  Also, it can't be Soiled as we would then need a four-letter word with an A, L, S, and L.  Again, there isn't one.  It has to be three words!\"\n  It takes you a few moments to fully understand this, but you soon realise that she is right!  You can ignore the five and six letter words and have to choose three of the\n  smaller words to find your answer.\n  *goto choicestart\n*else\n  *goto choicestart\n*if cg=1000\n  *Label Puzzlebegin\n  You start the puzzle again.\n*set place 0\n*set perfect 0\n*label choicestart\n*page_break\nAID, DEL, LES, LOS, OLD, SAD, SAI, SOL, DEAL, DELI, DIAL, IDOL, ISLA, LAID, LOAD, OILS, SEAL, SIDE, SODA, SOIL, SOLD, LADEL, SLIDE, LADIES, SOILED\n*set attempts +1\n*line_break\nEnter your answer into the box one word at a time.\nWhat is your first word?\n*input_text first\n*if first = \"ISLA\"\n  *set perfect +1\n  *goto second2\n*if first = \"Isla\"\n  *set perfect +1\n  *goto second2\n*if first = \"isla\"\n  *set perfect +1\n  *goto second2\n*if first = \"DEL\"\n  *set place +1\n  *goto second2\n*if first = \"Del\"\n  *set place +1\n  *goto second2\n*if first = \"del\"\n  *set place +1\n  *goto second2\n*if first = \"SOL\"\n    *set place +1\n    *goto second2\n*if first = \"Sol\"\n    *set place +1\n    *goto second2\n*if first = \"sol\"\n    *set place +1\n    *goto second2\n*goto second2\n*label second2\n*page_break\nAID, DEL, LES, LOS, OLD, SAD, SAI, SOL, DEAL, DELI, DIAL, IDOL, ISLA, LAID, LOAD, OILS, SEAL, SIDE, SODA, SOIL, SOLD, LADEL, SLIDE, LADIES, SOILED\n*line_break\nWhat is your second word?\n*input_text second\n*if second = \"ISLA\"\n  *set place +1\n  *goto third3\n*if second = \"Isla\"\n  *set place +1\n  *goto third3\n*if second = \"isla\"\n  *set place +1\n  *goto third3\n*if second = \"DEL\"\n  *set perfect +1\n  *goto third3\n*if second = \"Del\"\n  *set perfect +1\n  *goto third3\n*if second = \"del\"\n  *set perfect +1\n  *goto third3\n*if second = \"SOL\"\n    *set place +1\n    *goto third3\n*if second = \"sol\"\n    *set place +1\n    *goto third3\n*if second = \"Sol\"\n    *set place +1\n    *goto third3\n*goto third3\n*label third3\n*page_break\nAID, DEL, LES, LOS, OLD, SAD, SAI, SOL, DEAL, DELI, DIAL, IDOL, ISLA, LAID, LOAD, OILS, SEAL, SIDE, SODA, SOIL, SOLD, LADEL, SLIDE, LADIES, SOILED\n*line_break\nWhat is your last word?\n*input_text third\n*if third = \"ISLA\"\n  *set place +1\n  *goto puzzlecheck\n*if third = \"Isla\"\n  *set place +1\n  *goto puzzlecheck\n*if third = \"isla\"\n  *set place +1\n  *goto puzzlecheck\n*if third = \"DEL\"\n  *set place +1\n  *goto puzzlecheck\n*if third = \"Ded\"\n  *set place +1\n  *goto puzzlecheck\n*if third = \"del\"\n  *set place +1\n  *goto puzzlecheck\n*if third = \"SOL\"\n    *set perfect +1\n    *goto puzzlecheck\n*if third = \"Sol\"\n    *set perfect +1\n    *goto puzzlecheck\n*if third = \"sol\"\n    *set perfect +1\n    *goto puzzlecheck\n*goto puzzlecheck\n*label puzzlecheck\n*if first = second\n  Mendez looks at you confused. \"You've said the same word more than once!  All three words are different.  Try again.\"\n  *goto puzzlebegin\n*elseif first = third\n  Mendez looks at you confused. \"You've said the same word more than once!  All three words are different.  Try again.\"\n  *goto puzzlebegin\n*else\n  *if second = third\n    Mendez looks at you confused. \"You've said the same word more than once!  All three words are different.  Try again.\"\n    *goto puzzlebegin\n  *else\n    *if perfect = 3\n      Mendez beams a huge smile. \"Excellent!  Congratulations!  You've found your final destination!\"  He says.\n      *if attempts=1\n        \"You got it right first time as well!  Amazing!\"\n        *goto isladelsolknown\n      *else\n        \"It took you ${attempts} try's to get the right answer.  Let's see how that compares to the other contestants.\"\n        *goto isladelsolknown\n    *elseif perfect = 2\n      Mendez smiles, but still shakes his head. \"Wow, close.  You have two words correct and in the correct place, but one word is wrong.  Try again.\"\n      *goto puzzlebegin\n    *else\n      *if perfect =1\n        *if place =2\n          Mendez looks at your selection.  \"Well... You have three words right, but two of the are in the wrong order.  Try again!\"\n          *goto puzzlebegin\n        *else\n          *if place =1\n            Mendez thinks for a second.  \"Hmmm... You have one word right, in the right place and one word right in the wrong place.  Try again!\"\n            *goto puzzlebegin\n          *else\n            Mendez shakes his head.  \"Not bad.  You have one word correct and it's in the right place as well!  But the other two words are wrong.  Try again!\"\n            *goto puzzlebegin\n      *else\n        *if place = 3\n          Mendez looks at your choice. \"Haha!  Interesting!  You have all three words right, but in the wrong order.  Try again!\"\n          *goto puzzlebegin\n        *elseif place =2\n          Mendez looks at your selection.  \"Well... You have two words right, but they're in the wrong order.  Try again!\"\n          *goto puzzlebegin\n        *else\n          *if place =1\n            Mendez thinks for a second.  \"Hmmm... You have one word right, but in the wrong place.  Try again!\"\n            *goto puzzlebegin\n          *else\n            Mendez shakes his head.  \"Sorry, all of your words are wrong.  Try again!\"\n            *goto puzzlebegin\n\n*label isladelsolknown\nYou sit and wait while the ${korean} team finish.  They were the slowest team.\n\"Okay.\"  Begins Mendez.\n*if attempts = 1\n  \"Getting it right first time, the team from ${country}!  Taking three attempts, the ${americans}.  Taking four goes, the ${korean} team.  Which means, unfortunately, the \n  Spanish team are out!  You took too many tries.\"\n  *set fourth \"Spanish\"\n  The Spanish team look shocked at this.  They say some heated words in Spanish that, thankfully, you don't understand.  It is a little odd though.  The Spanish have been\n  one of the strongest teams throughout yet they came last on this puzzle which involved Spanish words.  Then they depart from the beach and out of the race.\n  *goto onwiththerace\n*elseif attempts \u003c6\n  *if attempts=2\n    \"Getting it right in just two goes, the team from ${country}!  Taking three attempts, the ${americans}.  In four goes, the ${korean} team.  Which means, unfortunately, the\n    Spanish team are out!  You took too many tries.\"\n    *set fourth \"Spanish\"\n    The Spanish team look shocked at this.  They say some heated words in Spanish that, thankfully, you don't understand.  It is a little odd though.  The Spanish have been\n    one of the strongest teams throughout yet they came last on this puzzle which involved Spanish words.  Then they depart from the beach and out of the race.\n    *goto onwiththerace\n  *elseif attempts =3\n    \"Getting it right in three goes exactly, the teams from ${country} and the ${americans}!  In four goes, the ${korean} team.  Which means, unfortunately, the \n    Spanish team are out!  You took too many tries.\"\n    *set fourth \"Spanish\"\n    The Spanish team look shocked at this.  They say some heated words in Spanish that, thankfully, you don't understand.  It is a little odd though.  The Spanish have been\n    one of the strongest teams throughout yet they came last on this puzzle which involved Spanish words.  Then they depart from the beach and out of the race.\n    *goto onwiththerace\n  *else\n    Taking just three attempts, the ${americans}!  Taking ${attempts} attempts, the team from ${country}.  The Spanish took eight tries, which means that the ${korean} team are out.\n    Sorry to say.\"  Mendez adds the last three words as an afterthought.  ${sunny} is close to tears.  ${Sean} looks solemn, but remains dignified.\n    *if boygirl = \"boy\"\n      You shake ${sean}'s hand and he wishes you luck.  Then they depart from the beach and out of the race.\n      *set fourth korean\n      *set korean \"Spanish\"\n      *set sunny \"Raul\"\n      *set sean \"Carlos\"\n      *goto onwiththerace\n    *else\n      You give ${sean} and ${sunny} a hug and they wish you the best of luck.  Then they depart from the beach and out of the race.\n      *set fourth korean\n      *set korean \"Spanish\"\n      *set sunny \"Raul\"\n      *set sean \"Carlos\"\n      *goto onwiththerace\n*else\n  *if attempts \u003c9\n    \"Getting it right in just three tries, the ${americans}!  The Spanish took longer, five attempts.  In third place are the team from ${country}, who took ${attempts}, but \n    unfortunately, it's time to say goodbye to the ${korean} team.  You just took too many goes.\"  ${sunny} is close to tears.  ${sean} looks solemn, but remains dignified.\n    *if boygirl = \"boy\"\n      You shake ${sean}'s hand and he wishes you luck.  Then they depart from the beach and out of the race.\n      *set fourth korean\n      *set korean \"Spanish\"\n      *set sunny \"Raul\"\n      *set sean \"Carlos\"\n      *goto onwiththerace\n    *else\n      You give ${sean} and ${sunny} a hug and they wish you the best of luck.  Then they depart from the beach and out of the race.\n      *set fourth korean\n      *set korean \"Spanish\"\n      *set sunny \"Raul\"\n      *set sean \"Carlos\"\n      *goto onwiththerace\n  *else\n    \"Getting it right in just three tries, the ${americans}!  The Spanish took longer, eight attempts.  In third place are the ${korean} team which means that the team from \n    ${country} are out.  Sorry ${partner}.  Sorry ${name}.  You just took too long to finish the puzzle.\n    The ${korean} team tell you they are sorry to see you go.  \"It's been a good race.\"  Says ${sean}.  You nod, agreeing.  ${partner} looks dejected.  \n    *if partner=\"April\"\n      You give her a hug and tell her not to worry.  She smiles.  \"Thank you ${name}.  It was fun!\"\n      *goto gameoverincopa\n    *elseif partner=\"Dan\"\n      \"So that's it?\"  He asks.  \"We go home now?\"  You nod and pat him on the back.\n      *goto gameoverincopa\n    *else\n      \"Well, ${name}, I had a great time racing with you.  We didn't win, but that wasn't the real aim, was it?  The prize was the race itself.  I had a great time!\"\n      You know that she doesn't mean that, but nod anyway.\n      *label gameoverincopa\n      *page_break\n      You walk with ${partner} back into the town.  From there, you are taken back to Lima and then flown home to ${country}.  You receive a good welcome at the airport, and \n      enjoy a little fame for a while.  Soon, things return to normal and you go back to your old job.  Eventually, the race becomes your favourite story to tell.\n      *page_break Game Over\n      Well, you didn't win the race, but you can have another go.  You can continue racing from the start of Copacabana or you can restart the whole race.  What would you like\n      to do?\n      *choice\n        #GO BACK (Carry on playing from Copacabana: Your money will not be reset)\n          *goto COPACABANASTART\n        #RESTART (end this game)\n          *goto_scene ending\n\n*label onwiththerace\n*page_break\nNow there are just three teams remaining.  \n\nThe ${american} twins Travis and Justin.\n\nThe ${korean} team, ${sunny} and ${sean}.\n\nThe team from ${country}, ${partner} and you.\n\nIt is still only mid-afternoon but you are advised to rest.  The race will continue tonight at 1:00am from this beach here.  It will be the final leg.  Don't be late!\n\n*if (hotel)\n  You head back to the road of hotels but can't find one with any room.  Instead, you find a cafe run by foreigners you can rest in.  They have a large couch at the back and\n  are happy for you to stay there, as long as you have a drink on the table.\n  After a long nap, your partner wakes you.  \"It's time.\"  \n  *if partner = \"Dan\"\n    He says. \"Time to go to the beach.\"\n    *finish  Leg 7: Moonlit Marathon\n  *else\n    She says. \"Time to go to the beach.\"\n    *finish  Leg 7: Moonlit Marathon\n*else\n  You go back to your hotel room and rest as best you can.  Thoughts about the race so far swim around your head.  When ${partner} wakes you it is dark outside.  \"It's time.\"  \n  *if partner=\"Dan\"\n    he says.  \"Time to go to the beach.\"\n    *finish  Leg 7: Moonlit Marathon\n  *else\n    she says.  \"Time to go to the beach.\"\n    *finish  Leg 7: Moonlight to Sunrise\n\n\n\n*label exchange\nIt seems you need to change some money.  \n\nThe exchange rate is 7 Bolivianos to the Dollar or 2 Bolivianos to the Sol.  This means if you change $100 you will get 700 Bolivianos.  If you change 100 Sols, you will get\n200 Bolivianos. You currently have ${money} dollars, ${sols} Sols and ${bols} Bolivianos.\n*label moneychange\nHow many dollars will you change to Bolivianos?\n*choice\n  #$100\n    *set dollarchange 100\n    *goto dollarcheck\n  #$200\n    *set dollarchange 200\n    *goto dollarcheck\n  #$300\n    *set dollarchange 300\n    *goto dollarcheck\n  #$400\n    *set dollarchange 400\n    *goto dollarcheck\n  #$500\n    *set dollarchange 500\n    *goto dollarcheck\n  #None.  I want to only change Sols.\n    *goto sols_change\n  #I've changed my mind.  I wont change anything.\n    *goto leave_bank\n*label dollarcheck\n*if dollarchange>money\n  You don't have that much money!\n  *goto moneychange\n*else\n  *set money money-dollarchange\n  *set dollarchange 7*dollarchange\n  *set bols bols+dollarchange\n  *label sols_change\n  You now have ${money} dollars, ${sols} Sols and ${bols} Bolivianos.\n  How many Sols will you change into Bolivianos?\n  *choice\n    #100 Sols\n      *set dollarchange 100\n      *goto sol_check\n    #200 Sols\n      *set dollarchange 200\n      *goto sol_check\n    #300 Sols\n      *set dollarchange 300\n      *goto sol_check\n    #400 Sols\n      *set dollarchange 400\n      *goto sol_check\n    #500 Sols\n      *set dollarchange 500\n      *goto sol_check\n    #None.  I'm finished.\n      *goto leave_bank\n    #I've changed my mind.  I wont change anything.\n      *goto leave_bank\n  *label sol_check\n  *if dollarchange>sols\n    You don't have that much money!\n    *goto sols_change\n  *else\n    *set sols sols-dollarchange\n    *set dollarchange 2*dollarchange\n    *set bols bols+dollarchange\n    You now have ${money} dollars, ${sols} Sols and ${bols} Bolivianos.\n    You leave the stall.\n    *label leave_bank\n    *set moneyproblem 0\n    *goto payhotel\n", "23thelastleg": "*temp raceplace\n*temp usaplace\n*set raceplace 3\n*set usaplace 1\n*temp racetime\n*set racetime 0\n*temp slow\n*set slow true\n*temp steer\n*set steer true\n*temp route\n*set route 0\n*temp impossible\n*set impossible false\n*temp speedster\n*set speedster false\n*temp spdstam\n*set spdstam speed+stamina\n*if spdstam >70\n  *set speedster true\n\n*image map7.jpg\nThe final three teams line up in front of Mendez on the beach.  The moon is bright on this warm night and the lake is calm.  Three simple motor boats are lined up in the water \nand your task becomes clear.\n\n\"Okay, my friends.  It's been a good race so far.  I was sorry to see the ${fourth} team go yesterday.  But you three teams.  You are all winners.  All of you.  However, there \ncan be only one team of champions.  Mendez pauses for a moment as if deep in thought.\n\"The last leg begins when I stop talking.\"  He continues.  \"Each team will take a boat from here to the island, Isla del Sol.  You need to steer your own boat to the island and\nwill have no help.  All I can tell you is that the island is North-West from here and it will take you around three hours to get there.  Each boat has a map and a compass\nwhich should be more than enough.  Once you reach the island, you need to move quickly and find the Titikala.  It is a huge rock where legend says that the Incan civilization \nbegan.  The first team to get to the rock will...\"  He pauses again for dramatic effect.  The pause is long.  Too long.\n*choice\n  #Ask Mendez to finish the sentence.\n    *set racetime +1\n    \"...Will what?\"  You say.  Mendez says nothing and the ${americans} run to the nearest boat.  Mendez has stopped talking.  The leg has begun!\n    *goto running\n  #Wait.\n    *set racetime +1\n    You wait.  The ${americans} don't.  They run straight for the first boat.  Mendez has stopped talking.  The leg has begun!\n    *goto running\n  #Do something else.\n    What will you do?\n    *choice\n      #Run for a boat!\n        You run to the first boat.    Mendez has stopped talking.  The leg has begun!\n        *goto running\n\n*label running\nRunning on sand.  Slop, slop.  Hitting the water.  Splash, splash.  Reaching the boat.  Creak, swish.  Soon, you and ${partner} are in your boat.\n*if partner = \"Leonie\"\n  Leonie starts the motor and very quickly, you are away.\n  One person needs to steer while the other checks the map.  Who does what?\n  *choice\n    #I'll steer while Leonie checks the map.\n      You realise that you are moving slowly away from the beach in a Westerly direction.  You need to speed up. What do you do:\n      *set racetime +120\n      *label boatchoice1\n      *choice\n        #Twist the handle towards me.\n          You twist the handle towards you and the boat immediately speeds up.  Nicely done.\n          *goto navigate\n        *selectable_if (slow) #Twist the handle away from me.\n          You twist the handle away from you and the motor immediately gets quieter.  It's going to stop.  What do you do?\n          *set slow false\n          *set racetime+2\n          *goto boatchoice1\n        *selectable_if (steer) #Push the handle away from me.\n          You push the handle and the boat veers quickly to the right.  You just worked out how to steer, but you are still going slowly.  Now what?\n          *set steer false\n          *set racetime+1\n          *goto boatchoice1\n        *selectable_if (steer) #Pull the handle towards me.\n          You pull the handle towards you and the boat veers quickly to the left.  You just worked out how to steer, but you are still going slowly.  Now what?\n          *set steer false\n          *set racetime+1\n          *goto boatchoice1\n        #Check the motor for blockages.\n          You look at the motor but have no idea what you are doing. You also have no idea what sort of blockages there could be.  You do nothing but look for a minute.\n          You are still moving slowly.  What do you do now?\n          *goto boatchoice1\n    #I'll check the map while Leonie steers.\n      You look at the map and see several points of interest.  Reaching the South side of Isla del Sol is straight forward.  From here, you just head in a North-West direction.\n      Once you reach the south side, you need to decide where to dock.  There is one dock on the South-East side of the island.  A second dock is further North, on the East \n      side of the island, but the path from there, on this crude map, looks more difficult.  There are several bays on the West side of the island, but no paths are indicated \n      there.  You could probably dock there, but it could be hard to find your way, even though they are closer to your final destination.\n      Your final destination itself, the Titikala, is pinpointed on the map on the North side of the island.\n      You need to decide upon a plan.  \n      *line_break\n      What will you do?\n      *choice\n        #We'll go East and stop at the first dock.  It may be the furthest from the Titikala, but the walk is easier.\n          *set route 1\n          *set racetime+120\n          *goto navigate  \n        #We'll go East to the second dock.  It's closer and the path is on the map.\n          *set route 2\n          *set racetime+175\n          *goto navigate\n        #We'll go West to the dock close to the Titikala.  The less walking, the better!\n          *set route 3\n          *set racetime+190\n          *goto navigate\n*else\n  You start the motor and very quickly, you are away.\n\n*if partner = \"April\"\n  One person needs to steer while the other checks the map.  Who does what?\n  *choice\n    #I'll steer while April checks the map.\n      *label april_doesnt_steer\n      You realise that you are moving slowly away from the beach in a Westerly direction.  You need to speed up.  You:\n      *set racetime + 175\n      *label boatchoice2\n      *choice\n        #Twist the handle towards me.\n          You twist the handle towards you and the boat immediately speeds up.  Nicely done.\n          *goto navigate\n        *selectable_if (slow) #Twist the handle away from me.\n          You twist the handle away from you and the motor immediately gets quieter.  It's going to stop.  What do you do?\n          *set racetime+2\n          *set slow false\n          *goto boatchoice2\n        *selectable_if (steer) #Push the handle away from me.\n          You push the handle and the boat veers quickly to the right.  You just worked out how to steer, but you are still going slowly.  Now what?\n          *set racetime+1  \n          *set steer false\n          *goto boatchoice2\n        *selectable_if (steer) #Pull the handle towards me.\n          You pull the handle towards you and the boat veers quickly to the left.  You just worked out how to steer, but you are still going slowly.  Now what?\n          *set racetime+1\n          *set steer false\n          *goto boatchoice2\n        #Check the motor for blockages.\n          You look at the motor but have no idea what you are doing. You also have no idea what sort of blockages there could be.  You do nothing but look for a minute.\n          You are still moving slowly.  What do you do now?\n          *goto boatchoice2\n    #I'll check the map while April steers.\n      \"You want me to steer while you look at the map?\"  asks April, a look of disbelief on her face.\n      You both pause for a moment to contemplate what she said.  Both of you smile.\n      *line_break\n      *line_break\n      \"You steer, I'll set the course.\"  Says April authoritatively.  You don't argue.\n      *goto april_doesnt_steer\n*elseif partner = \"Dan\"\n  One person needs to steer while the other checks the map.  Who does what?\n  *choice\n    #I'll steer while Dan checks the map.\n      \"Dude?  You want me to look at the map while you steer?\"  Says Dan, staring at you as if you are crazy.\n      *line_break\n      *line_break\n      \"I haven't never read a map in my life.  I can steer a boat though.\"  He says.  You nod and look at the map.\n      *goto dan_doesnt_steer\n    #I'll check the map while Dan steers.\n      *label dan_doesnt_steer\n      You look at the map and see several points of interest.  Reaching the South side of Isla del Sol is straight forward.  From here, you just head in a North-West direction.\n      Once you reach the south side, you need to decide where to dock.  There is one dock on the South-East side of the island.  A second dock is further North, on the East \n      side of the island, but the path from there, on this crude map, looks more difficult.  There are several bays on the West side of the island, but no paths are indicated \n      there.  You could probably dock there, but it could be hard to find your way, even though they are closer to your final destination.\n      Your final destination itself, the Titikala, is pinpointed on the map on the North side of the island.\n      You need to decide upon a plan.  \n      *page_break\n      What will you do?\n      *choice\n        #We'll go East and stop at the first dock.  It may be the furthest from the Titikala, but the walk is easier.\n          *set route 1\n          *set racetime+120\n          *goto navigate\n        #We'll go East to the second dock.  It's closer and the path is on the map.\n          *set route 2\n          *set racetime+175\n          *goto navigate\n        #We'll go West to the dock close to the Titikala.  The less walking, the better!\n          *set route 3\n          *set racetime+190\n          *goto navigate\n\n*label navigate\n*if route = 0\n  *if partner = \"Leonie\"\n    *set route 1\n    *goto nav2\n  *elseif partner = \"April\"\n    *set route 2\n    *goto nav2\n  *else\n    *goto nav2\n*else\n  *goto nav2\n\n*label nav2\nBetween you and your partner, you have set a route and worked out how to control the boat.\nNow you should pay attention to the other teams.\n*if racetime=0\n  You are currently in the lead, but not by much.  The ${american} are right behind you and the ${korean} team are right behind them.\n  *goto southside\n*elseif racetime=1\n  You are neck and neck with the ${american} team.  The ${korean} team are right behind.  It couldn't be closer!\n  *goto southside\n*else\n  *if racetime >3\n    You are neck and neck with the ${korean} team.  The ${american} are just ahead of you in the lead.\n    *goto southside\n  *else\n    You are currently in third place, just behind the ${korean} team.  The ${american} are in the lead.\n    *goto southside\n\n*label southside\nThe three teams continue into the night.  An hour passes and there is still nothing between the three teams.  With the help of the full moon, the lake is well lit and you can \nclearly see the mainland to your right.  To your left, the large lake is so wide that you can't see a coastline.  In the distance, you can see flashes of lightning in clouds \nabove the mainland, but where you are there is no sound of thunder and the air is perfectly calm.  \n*page_break\nProgress is slow, and at times it feels like you are not moving.  After another hour, you reach the South side of Isla del Sol.\n*if route =3\n  You plan to go left around the island.  Do you want to try and hide this action from the other team by slowing down?\n  *choice\n    #Yes, we'll drop back a little, then turn left when the other boats go right.\n      You drop back leaving a large gap between your boat and the other team.  You then match their speed and wait for them to veer right.  Five minutes later, both teams \n      ahead of you turn to the right to go East around the island. You turn left.\n      *goto leftaround\n    #No, they've studied the map and will go their own way no matter what we do.\n      You maintain your position in the cluster of boats.  When the time is right, you pull the motor handle towards you, turning the boat to the left.  The other teams watch \n      as you move away from them.  They don't react though.  You were right.  They have their own plans and they stick to them.  Both the ${korean} team and the ${american} team go\n      right.\n      *label leftaround\n      After another hour, you see the small beach close to the end point.  You also see a large cliff face that you will have to climb up to get to the\n      Titikala. Once on dry land, you run along the beach looking for the easiest way up.  Soon, you find a narrow, but clear path up the cliff face.  You are\n      going to have to climb it.  ${partner} leads the way and you follow.  The climb is not difficult, but it's not direct either.  It takes you a long\n      time to get up.  Finally, you reach the top and evaluate your surroundings.  You are close to a set of ruins that look very eerie in the dim light.  They are not marked on \n      your map, but judging from how far you have travelled in the boat, you need to walk through them to get to the Titikala.  Together with ${partner},\n      you start walking.\n      *set racetime +100\n      *goto conclusion5\n*else\n  When the time is right, you push the motor handle away from you and the boat veers to the right.  The ${american} and the ${korean} team do the same.  All three teams take the
