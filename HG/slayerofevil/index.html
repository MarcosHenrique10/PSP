tle doubt about his intentions.\n\nWhat should she do?\n*choice \n\t#Take out her sword and duel him \n\t\t\"Those who take out a blade die by it,\" the Bishop utters. \n\t\t\n\t\tLazarus chuckles. \"Don't let his words distract you, he is going to bludgeon you with his mace. Or I would rather say he will try.\"\n\t\t*if physique>3\n\t\t\t${astra} dodges the attack by swinging very low and to the side, then she steps forward and up as quick as a cobra and strikes at his vulnerable side. His cassock quickly changes its color \n\t\t\t\n\t\t\t\"I must say I am impressed,\" says Lazarus.\n\t\t\t\n\t\t\tThe Bishop holds his wound, unable to believe what just happened. Then, he decides that discretion is the better part of valor and runs away, limping and cursing.\n\t\t\t\n\t\t\t\"You really are a force to be reckoned with,\" says Lazarus as he approaches ${astra}. \n\t\t\t\n\t\t\tShe hesitates for a moment, then she returns the sword to her sheath.\n\t\t\t*goto lazarus_heal \n\t\t\t\n\t\t*else \n\t\t\t${astra} tries to dodge the attack by swinging very low and to the side, but loses balance and falls. The staff misses her by mere inches, but before she manages to get up, its \n\t\t\thits her ribcage badly, taking the air out of her body.\n\t\t\t\n\t\t\t\"Hit her again and I will send you to a place where the light doesn't actually shine,\" Lazarus roars.\n\t\t\t*set energy -2\n\t\t\t\n\t\t\t(Energy--)\n\t\t\n\t\t\tMeanwhile, ${astra} lays down in agony.\n\t\t\t*goto lazarus_fight\n\t\t\t\n\t\t\t\n\t#Try to cast a spell on him \n\t\t${astra} concentrates on the image of the warlike figure approaching her, trying to manipulate the fabric of reality and stop him. She feels a whirlwind of energy \n\t\tthat assures her that something is in the works, but as soon as it reaches the Bishop, it is dissolved.\n\t\t\n\t\tA second later his staff hits her thigh. She shrieks in pain and falls to the floor.\n\t\t\n\t\t\"Poor kid, you should know better than resorting to magic in this temple built by people who fight against it. And you, Bishop, hit her again and I will send you to a place where the light doesn't actually shine.\"\n\t\t*set energy -2\n\t\t\n\t\t(Energy--)\n\t\t\n\t\tMeanwhile, ${astra} whines in agony.\n\t\t*goto lazarus_fight\n\t\n\t#Run away \n\t\t${astra} turns around and flees, but before she is able to leave the room, something heavy hits her in the back.\n\t\t\n\t\t\"Nobody can run faster than the Light. It will find you wherever you are, just as the sun illuminates everything,\" the Bishop rattles. \n\t\t\n\t\t\"Shut up that crazy nonsense you are uttering,\" says Lazarus. \"Hit her again and I will send you to a place where the light doesn't actually shine.\"\n\t\t*set energy -2\n\t\t\n\t\t(Energy--)\n\t\t\n\t\tMeanwhile, ${astra} lays down in agony.\n\t\t*goto lazarus_fight\n\t\n\t#Ask Lazarus for help\n\t\t\"Mighty angel, are you going to just stand there and watch as this man bludgeons me?\" ${astra} cries. \n\t\t\n\t\t\"Not at all, dear one, but you must understand that my intervention capabilities here are limited. I needed to be asked to do that, or to see \n\t\ta situation that is really dare. Only them would I be able to help.\"\n\t\t*goto lazarus_fight\n\t\n\t\n\n*label lazarus_fight \n*page_break\nLazarus flies onto the Bishop and delivers a flurry of punches and kicks that leave him with little chance of fighting back. Battered and bruised, the \nBishop decides that discretion is the better part of valor and runs away, limping and cursing.\n\n\"This guy really pissed me off. I must apologize for this blatant display of violence,\" he says as he offers ${astra} a hand and helps her stand up.\n*goto lazarus_heal\n\n*label lazarus_heal\n*page_break \n\"May the Light bring healing to your bodies and souls,\" Lazarus whispers and ${astra} and ${partner} feel warm soothing energy permeate the whole of their beings.\n\n\"Thank you,\" says ${astra}, her eyes shining with gratitude. \n\nLazarus blushes. \"You should be careful, dear one. Sometimes healing makes connections that are very strong... and dangerous. Just be yourself and keep your judgement \nclear.\"\n\n\"I always do,\" ${astra} assures him. \"But I feel no danger coming from your side.\"\n\nLazarus sighs. \"I don't see myself as dark or dangerous either, but all those eons of time of being judged by those considering themselves to be of the Lights... Sometimes \nI am tempted to believe they might be right.\"\n\n\"You are willing to believe that mace-swinging lunatic? Is that what you are trying to say?\"\n\nThe angel chuckles. \"It sounds crazy, doesn't it?\"\n\n\"Yes, it does indeed.\" She looks at him all over.\n\n\"Your curious eyes hint of many questions you want to ask me. You are free to do so and I will answer to the best of my ability,\" he promises her.\n*goto 3\n\n*label 3\n*page_break\nWhat would ${astra} ask Lazarus?\n*choice \n\t*hide_reuse #Who are you?\n\t\t\"As you may have heard, my name is Lazarus, and I am what many would refer to as a fallen angel. Of course, I never fell from anywhere and my link to \n\t\tthe Light that I would refer to as Source, Love, or all that is... it was never severed as those priests believe. Let's just say that up there in heaven, as\n\t\tyou would call it, there was a split of opinions regarding the subject of spreading the knowledge of the divinity of humans to them. Those in power decided \n\t\tit was dangerous to do that because of all the evil they would do once they are empowered.\n\t\t\n\t\t\"The funny thing is that they were right. You just saw this violent man who only thinks of himself as being holy and just that makes him move at incredible speed and \n\t\thit much harder than what his old body should be capable of.\n\t\t\n\t\t\"But back to my story, a renegade group that I belonged to decided that empowered of humans was their right by Creation and decided to act in that direction despite the \n\t\tofficial ruling of those in power, who only wanted to provide spiritual guidance to people. Looking back at it, this conflict caused too much drama, it is a shame that in \n\t\tthe heat of the arguments we acted no better than races we would consider to be lower. Much of that tension still resonates in others because of the strong link between ours and so many others.\n\t\t\n\t\t\"I hope that answers your question, dear.\"\n\t\t*goto 3\n\t\n\t*hide_reuse #Do you know the Bishop?\n\t\t\"I wish I didn't,\" Lazarus chuckles. \"As an angel, my lifespan is much longer than that of humans, although we die too but in a slightly different manner.\n\t\tTo answer your question, I have seen this very same soul incarnate as humans, one after another and basically cause havoc wherever he goes just because he \n\t\tassociates his divinity with purification of evil. It is not wrong as a concept, but the concrete manifestation he has chosen is terrible. First of all, he \n\t\tsees evil where there is little, and second, it is only love that can do that. Violence should be only the last resort to stop those who would harm others. It \n\t\tis not a path that is unknown to me, but one should never allow their heart to be filled with hatred or fear instead of love.\"\n\t\t*goto 3\n\t\n\t*hide_reuse #Do you know the Exarch?\n\t\tLazarus shakes his head. \"I have heard rumors he is a good man who is going to bring something very positive to the cult of the Light. Intuitively, I feel a \n\t\tlot of respect for him, but I don't think our paths ever crossed, one way or another.\"\n\t\t*goto 3 \n\t\t\n\t*hide_reuse #Why are your wings black?\n\t\t\"Many people believe that black is the color associated with evil. I wouldn't go as far as to disagree with this statement but I would like to offer another \n\t\tinterpretation. It is also the color of what is known as the Clay of Creation. This is the substance that is nothing by itself but has the potential to become \n\t\teverything a creator being can bring to existence by shedding light to it. You think that my wings are real, right? You can try to touch them if you want.\"\n\t\t\n\t\tLazarus brings his wing close to ${astra} so that she can touch it. Her fingers pass through the feathers as if through thin air, only casting shadow on them.\n\t\t\n\t\t\"Amazing,\" ${astra} says. \"But I saw your feathers fall on the ground as the Bishop hit you with his staff!\"\n\t\t\n\t\tThe angel smiles. \"And can you see them now?\"\n\t\t\n\t\t${astra} looks around. \"No. What happened to them?\"\n\t\t\n\t\t\"Let's just say that it was an illusion meant to hide the true meaning of my wings from those who would like to stand on my way. So, please, shush, don't \n\t\ttell them, right?\"\n\t\t*goto 3\n\t\t\n\t*hide_reuse #What is your mission here?\n\t\t\"This monastery was built on a place of ancient evil. Legends forgotten centuries ago speak of negative entities suddenly appearing in the dead of the night and attacking \n\t\tthe locals with barbarous cruelty.\"\n\t\t\n\t\t\"Do you mean demons?\" ${partner} asks.\n\t\t\n\t\t\"I hesitate to use this word. Just as darkness, it can mean many things. It is usually related to malevolent beings feeding on the suffering of others, \n\t\twhich is the case of the entities I am talking about. In the same time, I am aware that there is a group of beings who call themselves demons but the light \n\t\tof their hearts shines brightly and illuminates everything and everyone around them. The ancient scriptures say that the words angel and demon are synonymous. In \n\t\tthis context, they are indeed.\n\t\t\n\t\t\"But the ones I am here to stop from opening the portal that is somewhere near here have little of the divinity of love and light left in them. Traumas from what they \n\t\thave experienced and the survival aspect of the change they needed to go through in order to continue their journeys made them something that love was unable to make its way into.\n\t\t\n\t\t\"But excuse my transgression, I was going to tell you about the aim of me being here. I know that this cursed land has been chosen for the manifestation of the greatest Slayer of Evil \n\t\tthis realm has ever seen. I know nothing more but that I must find her and guide her through the challenges of her understanding of who she is, of who she is meant to be. For if she loses her way, \n\t\tthe results might be catastrophic. A vision led me to this time and place and here I am.\"\n\t\t*goto 3\n\t\t\n\t*hide_reuse #Why are you helping us?\n\t\t\"It may appear that I am, and I indeed may continue to do so, should our paths from now on remain in this direction. So far, I have no reason to believe that \n\t\twe met because of a specific reason... and yet there are no random events and meetings. What I can say to you now is that I strongly disapprove of the acts of \n\t\tinjustice done supposedly in the name of the Light. If I can do something to prevent more from occurring, I would be glad to do so.\"\n\t\t*goto 3 \n\t\t\n\t*hide_reuse #Do you sense something demonic about me or my partner in this adventure?\n\t\tLazarus laughs. \"You have recently been in the presence of a very special lady. I can still sense the remains of her spiritual signature around you. It is long ago\n\t\tthat our paths headed in different directions, but I can never really forget her or how she made me feel inside. It is something I had to bury deep inside just to \n\t\tbe able to continue on my journey.\"\n\t\t\n\t\t\"Are you talking about the Forgotten Goddess?\" ${astra} asks.\n\t\t\n\t\t\"I have heard people calling her in this way. I guess it does her justice, for she is indeed somebody glorified in the past who was pushed into oblivion \n\t\tby forces that appeared to be greater than her, although she is the avatar of warrior strength and resolute spirit. I can only speak with praise about her, and yet \n\t\tmany people call her a demon. The word itself is not fully wrong, but the conotation they have in mind is very negative. I feel pity for those folks that have been \n\t\tmisguided this way.\n\t\t*if (partner=\"Cabala\")\n\t\t\t\"\n\t\t\t*goto 3\n\t\t\t\n\t\t*else \n\t\t\tBut back to your question, your partner is a very fine example of what I would call demonic, this is what her energetic imprint says.\n\t\t\t\n\t\t\t${partner} nods in reply and blushes slightly.\n\t\t\t*goto 3\n\t\t\n\t#Finished with the questions\n\t\t*goto 4\n\t\t\n*label 4\n\"Maybe it is time for you to tell me more about yourself and why you are here?\" Lazarus suggests.\n\n\"My name is ${astra} and this is ${partner}. We have embarked on a mission in service to the Forgotten Goddess.\"\n\n\"My sweetness,\" Lazarus whispers. \"Are you devotees?\"\n\n${astra} raises her brow. \"I am not sure what you mean by that. We asked her for help and she replied that she just wouldn't have the power to do so.\" ${astra} \nhesitates on whether to give the stranger more information, but there was something about him that made her trust him. \"Unless we convince the Exarch to allow \nmembers of the lower races to serve the Light in his organization. I don't really understand the importance of it, or how it works, but the Forgotten Goddess is \nsomebody my friends seem to love and trust.\"\n\n\"It is true,\" ${partner} confirms.\n\n\"I certainly understand why.\" Lazarus smiles. \"Maybe you will find a good opportunity to tell me what your cause is. I am sure if it is a noble one. I detect only \ntruth in what you have told me so far. And who knows, maybe you will convince me to help you too, if this is the excuse fate has chosen to bring me back to the one my heart \nbelongs to. But for now, I think we should move. I will stick around for the time being, if you don't mind my company.\"\n\n\"Not at all, it will nice to have you with us, Lazarus. Or is there a title we should use when addressing you?\"\n\nThe dark-winged angel shakes his head. \"No. The name I have means much more to me than any title ever can. I prefer strangers to judge me by the direct experiences \nthey have with me. But as time passes, you may get to know more about who I am in regards to others.\"\n\n${astra} nods and everyone leaves the chamber.\n*page_break\nThe corridor passes by a room that reminds you of a cell. It has metal bars instead of solid walls, but the door is wide open. The light inside is dim and is provided by \na couple of candles burning on a table. ${astra} barely manages to see a human figure scribbling something next to them. Sensing no danger, she enters the cell.\n\n\"Good day,\" she greets the stranger, who appears to be a young man.\n\nHe picks up the candle to be better able to see the trio of adventures. \"May the Light shines on your footsteps. You don't seem to be from here.\"\n\n${astra} makes a mental note that maybe they should try to find cassocks so that they would be better able to blend in, but the massive black wings of Lazarus would \nalways let you out.\n\n\"Nope, but we are here to speak with the Exarch,\" ${astra} says.\n\n\"Then I wish you good luck,\" the man says and continues scribbling something on a piece of parchment.\n\n\"What is your name?\" ${partner} asks.\n\n\"The people here call me Brother Marcus, that is when they are not calling me indecent names. In other words, my real name is used very rarely.\"\n\n${partner} briefly introduces her party to him.\n\n\"It was nice to have you here and keep me some company, but I am busy, so I would like to continue my work.\"\n\n${astra} raises her eyebrows. She expected the man to be able and willing to give her some kind of leads. Of course, she is not going to give up easily.\n*goto 5\n\n*label 5\n*page_break\nWhat should she do?\n*choice \n\t*hide_reuse #Ask him what he is doing here.\n\t\t\"This is a room for prayers. When Novices do something wrong, they are sent here to meditate over their transgressions and pray. It is dark here and that \n\t\tstands for the abyss my soul is supposed to be into. That is some stupid stuff the clergy keeps telling me.\" He shrugs. \"I like it here. Sometimes I do need some \n\t\ttime on my own and here I get the perfect opportunity to do so.\"\n\t\t\n\t\t\"What did you do to get here this time?\" Lazarus inquires. \n\t\t\n\t\t\"I was supposed to go to the armory on the second floor. I got the key and I knew the lock was rusty, so I had to oil it, but I was too lazy. I put it in and pushed hard to unlock it, \n\t\tso it broke. I tend to cause problems wherever I go.\"\n\t\t\n\t\tWould you like ${astra} to say something nice to him?\n\t\t*choice\n\t\t\t#Yes \n\t\t\t\t\"Oh, just don't take it personally, accidents happen to everybody. And even if you are clumsy, that doesn't mean you are not valuable. I am \n\t\t\t\tsure there might be many people who love you very much, but don't show it in a way you can understand.\"\n\t\t\t\t\t\n\t\t\t\tMarcus shrugs. \"Well, then maybe they are just not the people I care about the most. But thank you for the kind words, I don't get to hear such very often.\"\n\t\t\t\t\t\n\t\t\t\tIt is hard for ${astra} to say it with certainty, but she probably sees his eyes get wet.\n\t\t\t\t*set rel_marcus +1\n\t\t\t\t*goto 51\n\t\t\t\t\t\n\t\t\t#No \n\t\t\t\t*goto 51\n\t\t\t\t\t\n\t*hide_reuse #Threaten him \n\t\t${astra} puts on her badass face and leans on the table just in front of Marcus.\n\t\t\n\t\t\"Listen, young man. Now, you are going to tell us how we can find the Exarch and we will make sure you stay out of the trouble upon you.\"\n\t\t\n\t\tMuch to her surprise, Marcus looks at her straight in the eye, with no sign of fear. \"And what exactly are you going to do to me? Kill me? Do I seem like \n\t\tsomebody who cares, whose life is full of joy and worth living? Or punish me? As if it is not something I go through every day.\"\n\t\t\n\t\t${astra} takes a step back. \"I am sorry. I didn't mean to sound rude, it is just really important that we speak with this man.\"\n\t\t\n\t\tMarcus shrugs.\n\t\t*set rel_marcus -1\n\t\t*goto 5\n\t\t\n\t*hide_reuse #Attempt to seduce him \n\t\t${astra} takes the other chair and move it next to the one Marcus is sitting on. She puts it with the back facing him and slowly slides forward, assuming a sexy \n\t\tsitting position. She casually touches his hair and lets her fingers slide down his neck.\n\t\t*if charm>3\n\t\t\n\t\t\t*set rel_marcus +1\n\t\t\tMarcus pulls away. \"Wow, I appreciate what you are trying to do, dear kind lady, and I don't usually get this kind of attention from a lovely female like \n\t\t\tyou. You are indeed the kind of woman that can make a man forget the loyalties of his heart, but this is not what I would like to do. So, please, show respect to \n\t\t\tthe queen of my heart and her humble servant.\"\n\t\t\t\n\t\t\t${astra} smiles and gets up, feeling his eyes running all over her body. She knows he feels sorry for pulling away from her embrace, but frustration is what he would get anyway.\n\t\t\t*goto 5 \n\t\t\n\t\t*else \n\t\t\t\n\t\t\t*set rel_marcus -1 \n\t\t\tMarcus grabs her hand and pushes it back. \"I appreciate what you are trying to do, and while I don't usually get this kind of attention from a female, I must \n\t\t\tsay that you are not my type. You can't make me forget the loyalties of my heart.So, please, show respect to \n\t\t\tthe queen of my heart and her humble servant.\"\n\t\t\t\n\t\t\t${astra} flushes and gets up, feeling embarrassed. She was not going to go very far with the game she decided to play, but such a blatant turn down was not expected.\n\t\t\t*goto 5 \n\t\n\t#Ask to see what he is writing\n\t\t\"Can I see what you are working on?\" ${astra} asks and before Marcus manages to respond, she takes the parchment right from his hands.\n\t\t\n\t\t\"Hey, give it back to me,\" he whines.\n\t\t\n\t\t\"Wow, it is beautiful,\" ${astra} remarks as she examines what happens to be the portrait of a very attractive woman. \"You are so talented.\"\n\t\t\n\t\t\"Thank you.\" Marcus stands up and tries to grab the parchment, but Lazarus, who so far has been patiently waiting for the scene to unfold suddenly \n\t\tshow interest and takes the portrait. He examines it briefly but with utmost care, then gives it back to Marcus. \n\n\t\t\"Who is this woman?\" ${astra} asks.\n\t\t\n\t\tMarcus sighs and returns to the table. \"Her name is Mary and she is the Queen of my heart. Well, of my broken heart, I should say. She doesn't speak to me \n\t\tany more. I would only get an occasional 'hello' as she passes by me, gorgeous as ever. I came to the monastery so that I could be close to her. She quickly \n\t\tadvanced in the hierarchy. Now she is the keeper of the keys for the upper level where the higher clergy is allowed.\"\n\t\t\n\t\t\"Like the Exarch?\" ${astra} asks.\n\t\t\n\t\t\"I am not very sure, but probably. I have never been there.\"\n\t\t\n\t\t\"I don't suppose there is a way for us to help you,\" she suggests.\n\n\t\t\"Well, I was thinking about something but I never managed to do it myself. Do you see the cell over there? It is hard to believe it when having in mind the \n\t\tepitome of serenity and Light she has grown to be, but right in the beginning she was still a rebel. The leader of a rebel group, I'd rather say. Once, she \n\t\tgot on the wrong side of another girl, who took Mary's favourite teddy bear, cut it into pieces and hid it in the cell, that was already something like \n\t\tMary's second room, so often she was sent there after her pranks were revealed. That other girl was special, she made some kind of a riddle to ensure that Mary \n\t\tnever gets to have all of the pieces of the bear. As time passed by, the two girls forgot about it and moved on. And I just hope that I can solve it and give \n\t\tMary a precious present.\"\n\t\t\n\t\t\"Would you like us to try to get all the parts of the stuffed bear?\" ${astra} offers. \n\t\t\n\t\tMarcus nods.\n\t\t\n\t\t\"And you wouldn't mind taking the keys for the monastery level above this one?\"\n\t\t\n\t\t\"Not at all.\"\n\t\t\n\t\t\"Then I guess we have a deal,\" ${astra} concludes.\n\t\t*goto 6 \n\t\t\n*label 51 \n*page_break\nDo you think ${astra} should ask Marcus to give her the broken key?\n*choice \n\t#Yes \n\t\t*if rel_marcus>0\n\t\t\t\"Sure here it is.\" He produces it out of his pocket and gives it to ${astra}. \"I have no idea what you are going to do with it, but I have no use for it, I \n\t\t\tonly took it by mistake just because I was confused after receiving so much scolding.\"\n\t\t\t*achieve nothing \n\t\t\t*goto 5 \n\t\t\n\t\t*else \n\t\t\t\"I don't have it,\" he says.\n\t\t\t\n\t\t\t${astra} can swear she could feel that he lied, but there is little she can do about it,\n\t\t\t*goto 5\n\t\t\n\t#No\n\t\t*goto 5\n\t\t\n*label 6 \n*page_break\n\"The room I told you about is the next down the corridor. I wish you good luck,\" Marcus says.\n\n\"Aren't you going to help us?\" ${partner} asks.\n\nHe shakes his head. \"That would be no use. I have been there tens of times and I could find nothing. I believe that any clue I might give you will be more of \na detriment than help. If you find the pieces of the teddy bear I will aid by making it look as good as new.\"\n\n\"So be it,\" ${astra} says. \"Let's get to work, I hope it won't take us too much time.\"\n\n\"After you,\" says Lazarus and bows gesturing the ladies to come out before him. His eyes are set upon ${astra} as she moves with predatory guile.\n*page_break \n${astra} enters the room. It is too dark to see clearly. There is a candle on the desk so takes it out to the burning torch in the corridor and lits it.\n\n\"That is much better,\" she says and examines the room. \n\nThere is a bed attached to the wall to the left. The corner of a leather-bound notebook can be seen poking from under the sheets.\n\nNext to it, there is a shelf with several potions in different colors and a book with hard covers ornamented by symbols of the Light. Below it, there is a chest made of heavy looking metal.\n\nA portrait of an old man decorates the other wall, and it is just above a chest. \n\n\"It is locked,\" says Lazarus after checking it out. \"There is some picture based code that would allow it to be open. I can see all sorts of animals here: a raven; a \ngoat;a cow. I haven't seen such a lock since I was a little boy.\"\n\n\"When was that?\" ${partner} asks.\n\n\"Several thousand years ago, the way you measure it.\"\n\nLast but not least, there is a mirror over the desk. When ${astra} look at it, her eyes see only the reflection of the beautiful woman that she is, but her soul knows there is something more.\n*goto 7\n\n*label 7\n*page_break\nWhat should ${astra} do?\n*choice \n\t#Look at the notebook \n\t\t*goto notebook \n\t\t\n\t#Examine the wall to the right \n\t\t*goto wall \n\t\t\n\t#Check out the potions on the shelf \n\t\t*goto potions \n\t\t\n\t*hide_reuse #See if the chest is locked \n\t\t*goto chest \n\t\t\n\t#Read the holy book \n\t\t*goto book \n\t\t\n\t*hide_reuse #See if there is something behind the portrait \n\t\t*goto portrait\n\n\t#Leave the room and return to Marcus \n\t\t*goto 8 \n\t\t\n*label notebook   \n*page_break\nThe notebook seems to be Magda's diary. The pages still carry an exotic scent, probably some kind of a perfume she applied to her wrists. The \nwriting is neat but most of the letters have sharp edges - as if she was more used to cutting and thrusting than writing. A thorough examination \nof that piece of literature would require too much time, but there are four bookmarks that might provide clues.\n*choice\n\t*hide_reuse #Read the first one \n\t\tThe entry is about Magda keeping her nails in good health. It includes procedures such as applying herbal creams and regularly sharpening them!\n\t\t*goto notebook\n\t\n\t*hide_reuse #Read the second one \n\t\tTh entry is about a dream of Madga's in which she had leathery bad wind with which she was fending off arrows shot at her. Interesting.\n\t\t*goto notebook \n\t\t\n\t#Read the third one \n\t\tMost of that page is missing. It has been torn with a movement that left the remains wrinkled. There is a line that reveals the name of the teddy bear. The \n\t\tfirst letter is D. The second is probably either o or a, but only the missing part of the sheet can reveal more.\n\t\t\n\t\t*if missing_page \n\t\t\t${astra} takes out the piece of paper that still has spider poison oozing down the lines and puts it where it belongs. \n\t\t\t\n\t\t\t\"Darion,\" ${partner} says. \"That is an interesting name for a bear.\"\n\t\t\t*set bear_name true \n\t\t\t\n\t\t\t${astra} shrugs.\n\t\t\t*goto notebook \n\t\t\t\n\t\t*else \n\t\t\t${astra} still hasn't found the missing part of the sheet.\n\t\t\t*goto notebook\n\t\t\t\n\t#Read the fourth one \n\t\tMuch to ${astra}'s surprise, the page is absolutely blank. She examines the page in order to determine if there are signs of quill going \n\t\tover it, and it seems so, but she can't determine even a single word.\n\t\t*if invisible_ink \n\t\t\t${astra} gently spills the liquid over the blank page. Words scribbled all over it appear like magic.\n\t\t\t\n\t\t\tIn this particular entry, Magda describes a cache that can be reached through touching the stone that comes as number 13 as counted from the \n\t\t\tfloor and 11 as counted from the door.\n\t\t\t\n\t\t\t\"It sounds as if we have made a small discovery,\" says ${partner}.\n\t\t\t\n\t\t\t\"I would like to wait until we see if there is anything useful there before I start congratulating anybody,\" says ${astra} with a grim expression on \n\t\t\ther face.\n\t\t\t\n\t\t\t${partner} shrugs. \"Okay, I can wait until that happens, but I am quite sure something good will come out of it.\"\n\t\t\t*set wall_cache true \n\t\t\t*goto notebook\n\t\t\t\n\t\t*else \n\t\t\tSadly, ${astra} has no way of finding what is written on the page, so she returns to the other bookmarks.\n\t\t\t*goto notebook \n\t\t\t\n\t#Leave the diary \n\t\t*goto 7 \n\n*label wall \n*page_break\nLazarus looks at ${astra} with surprise as she examines the wall.\n\n\"Are you looking for something?\" he asks.\n*if wall_cache\n\t\n\t\"Actually yes,\" ${astra} replies while counting the stone block. She gently presses it. The ones next to it suddenly fall, making her step \n\tback lest her feet get hurt.\n\t\n\tRight behind them lies the head of the bear. ${astra} takes it gently, gently tapping which results in clouds of dust.\n\t\n\t\"This little fellow needs a bath,\" says ${partner}.\n\t\n\t\"I agree but there is no time for that,\" ${astra} replies. \n\t*set bear_head true \n\t*goto 7 \n\t\n*else \n\n\t\"I feel as if there is something important there, but I just can't put my finger on it.\"\n\t*goto 7 \n\t\n*label portrait \n\"I wouldn't touch it if I were you,\" says ${partner}. \"That guy looks so ugly that I would like to stay away from him, even if that is just a drawing.\"\n\n${astra} looks at it and starts laughing. \"I agree.\"\n\nShould she still look behind the painting?\n*choice \n\t\t#Yes \n\t\t\t\t\t\n\t\t\tAn enormous spider comes out and runs towards the exit of the cell. Just like somebody who has to evacuate their home when a disaster comes their way, \n\t\t\tthe spider carries its most prized possession, which appears to be a piece of paper.\n\t\t\t*if (partner=\"Deathrose\")\n\t\t\n\t\t\t\tBefore ${astra} decides whether that could be a page from Magda's diary. Deathrose delivers a battle cry followed by an elk jump that ends with landing on \n\t\t\t\tthe poor creature. The sheet of paper gets sprayed by green ooze, which the demoness awkwardly wipes with the back of her hand as she passes it to ${astra}.\n\t\t\n\t\t\t\t\"Thank you,\" says ${astra} with certain doubts in her voice.\n\t\t\t\t*goto spider_page \n\t\t\n\t\t\t*else \n\t\n\t\t\t\tWhat should ${astra} do?\n\t\t\t\t*choice \n\t\t\t\t\t#Let the spider go \n\t\t\t\t\t\t${astra} just watches as the spider leaves the cell with the page. Her friends look at her questioningly, to which she responds by shrugging.\n\t\t\t\n\t\t\t\t\t\t\"What did you expect me to do, guys. It was just an itsy-bitsy spider. And you didn't do anything either.\"\n\t\t\t\n\t\t\t\t\t\t\"It was the most disgusting spider I have ever seen in my life,\" says ${partner}.\n\t\t\t\t\t\t*goto 7 \n\t\t\t\t\t\n\t\t\t\t\t*selectable_if (marksmanship>2) #Shoot the spider with her crossbow \n\t\t\t\t\t\tWithin a second, ${astra} manages to take out her crossbow. She acts on an instinct, knowing that she doesn't have the time for a proper aiming. Her \n\t\t\t\t\t\tbolt cuts the air with a squish that is followed by a thud and the last shriek of the eight-legged creature.\n\t\t\t\t\t\t*goto spider_page\n\t\t\t\t\n\t\t\t\t\t*selectable_if (physique>3) #Catch the spider and take the paper \n\t\t\t\t\t\t${astra}'s long legs carry her faster than the eight ones of the spider, but she knows that if she allows it to leave the cells, it would most likely \n\t\t\t\t\t\tquickly find another place to hide and the page would be lost. \n\t\t\t\t\n\t\t\t\t\t\tShe plunges forward and catches the end of the paper between the tips of her fingers. The spider tries to pull, then abandons the treasure and flees out.\n\t\t\t\t\n\t\t\t\t\t\t${astra} moans and rubs her hurt ribs. She suspects the whole situation is rather funny but none of her friends dares laugh. \n\t\t\t\t\n\t\t\t\t\t\t*goto spider_page\n\t\t\t\t\n\t\t\t\t\t*selectable_if (magic>2) #Stop it using magic \n\t\t\t\t\t\tAt first ${astra} considers using a fireball, but she quickly realizes it might destroy the sheet too. Air comes as a good substitute. Wind carrying freshness \n\t\t\t\t\t\ttypical for a pine forest takes the spider and slams it into the wall. It falls down with feet pointing the ceiling. A moment later it gets over the shock and \n\t\t\t\t\t\tcontinues its exodus, this time without the page. \n\t\t\t\t\t\t*goto spider_page\n\t\t\n\t\t#No \n\t\t\t*goto 7 \n\t\t\n*label spider_page\n*page_break\n${astra} unfolds the page. \"Guys, we have a winner,\" she says. \n\nIn this entry Magda uncovers why the teddy bear is important to her. It was a present from somebody whose name is scribbled beyond recognition, as if she \nwanted to make sure that even if found, it won't be decoded. \n\n\"It was the last remain of what I was promised but denied by my people, the last link to my soul tribe. I have cried a thousand tears before realizing I \nmust go on my journey until it is time for me to be reconnected to the place I belong to,\" ${astra} reads. \n\nShe shows the sheet to Lazarus. \"Can you make something of that name?\"\n\n\"Oh, yes, that guy is am old friend of mine. He is powerful, but a bit unpredictable. I was not aware of his willingness to make such presents, but it seems \nMagda somehow got to his soft side.\"\n\n${astra} looks in his eyes, wondering how much he is hiding.\n\n\"I bet the spider felt the strong energy coming from the sheet. I mean, even written in sloppy writing, that name is powerful.\"\n*set purpose true \n\n${astra} takes a look at the page again. \"I have the feeling that word here is part of the name of the bear.\"\n*set missing_page true \n*goto 7 \n\n*label book \n*page_break\n${astra} opens the book and her fingers suddenly feel electrified. She wonders how many people read the lines inside and invested their energy with the rituals described \ninside. Skimming through the pages, she actually gets surprised by what she comes across. She pays particular attention to:\n*choice \n\t*hide_reuse #The recipe for holy invisible ink\n\t\tThis is one of the last things ${astra} expects to find in a holy book of the Light, and this is what captures her interest. \n\t\t\n\t\t\"There have been many cases in which the words of the Light needed to be hidden in the shadows lest be discovered and destroyed. If a text was scribed \n\t\twith holy water, all you need to do is mix chamomile infusion with pink rose essence,\" ${astra} reads. \"I bet the mixture will taste sweet.\"\n\t\t*set recipe true \n\t\t*goto book \n\t\n\t*hide_reuse #Take a look at the holy rituals \n\t\tThe list of rituals the priests of Light are supposed to perform is very long and it takes ${astra} some time before she is able to find anything useful. \n\t\t\n\t\t\"I bet that can be useful,\" she says with an excited voice. \"This is a prayer for summoning a holy needle to sewing  cassocks. I bet it can help in bringing the \n\t\tpieces of the bear together. don't you think it is a good idea?\"\n\t\t\n\t\t\"What, do you actually suppose you will be able to summon a needle in the physical and have it stay here?\" Lazarus asks. \n\t\t\n\t\t${astra} shrugs. \"I have no idea. I am just reading things.\"\n\t\t\n\t\t\"My recommendation would be to give it a try. I don't think we have anything to lose,\" ${partner} says.\n\t\t\n\t\t\"I suppose so.\"\n\t\t\n\t\t${astra} starts saying the prayer. Her voice gets stronger and it seems as if she starts singing. Something starts to shine on the table.\n\t\t\n\t\t\"It is working!\" Lazarus exclaims but ${partner} waves for him to remain silent.\n\t\t\n\t\tWhen ${astra} finishes the prayer, she realizes there is indeed a little golden needle next to the open book. She takes it carefully. \"It is hot,\" she \n\t\texclaims and attaches it to her dress.\n\t\t*set needle true \n\t\t*goto book \n\t\n\t#Read about summoning of the lady of the mirrors\n\t\tThe book mentions a world that can be accessed through mirrors. It pays particular attention to somebody called the lady of the mirrors as a guide who \n\t\tstands outside of the Light but is still valued for the lessons she delivers. It seems Magda was quite interested in the topic because the pages describing her and the \n\t\tsummoning rituals are full of underlined sentences and words. It seems that whoever this lady is, she is somebody greatly appreciated by Magda. \n\t\t\n\t\tIt happens that there is a mirror in the room. \n\t\t\n\t\tWould you like ${astra} to try to summon the lady of the mirrors?\n\t\t*choice \n\t\t\t*disable_reuse #Yes \n\t\t\t\t*goto lady_mirrors\n\t\t\t\n\t\t\t#No - see the other book entries\n\t\t\t\t*goto book \n\t\n\t*hide_reuse #Say a clairvoyance prayer\n\t\tThe prayer shows ${astra} a vision in which you take all parts of the bear to Marcus, and even give him a needle. He removes a thread from his shirt, most likely something that \n\t\tis aimed at tying his collar close to his neck, and gives it to her.\n\t\t\n\t\t${astra} supposes it has something to do with the fact that it has been close to his heart for a long time.\n\t\t*set thread true \n\t\t*goto book \n\t\n\t#Leave the book \n\t\t*goto 7 \n\t\n*label potions \n${astra} opens the small bottles one by one. The first one smells like chamomile and she gets sweet memories of being taken care of while she was sick. The \nsecond has the fragrance of roses and ${astra} can almost imagine Magda using it to smell fresh. The third one must be vinegar or lemon juice and the last is some \nkind of an exotic oil mixed with alcohol. And the last vial is empty.\n\n*if recipe \n\t\"Alright, so we mix the chamomile infusion with the extract of rose petals,\" she says as she mixes the two liquids into the empty vial. \n\t\n\t*set invisible_ink true \n\t*goto 7 \n\t\n*else \n\t\"What do I do with all those potions?\" ${astra} asks herself. Unfortunately, she receives no answer. \n\t*goto 7 \n\t\n*label chest \t\n${astra} takes a look at the opening mechanism and finds out that it is locked. No surprises here. \n\n\"That looks like a very durable material, so I don't suppose any amount of bashing would work. Also, you might not be able to feel it, but it is even better defended \nagainst magic,\" says Lazarus. \n\nWhat should ${astra} reply? \n*choice \n\t*selectable_if (lockpicking>2) #\"I think I know how to handle it.\"\n\t\t\"Are you sure?\" Lazarus asks.\n\t\t\n\t\t${astra} just nods and takes out a couple of hairpins from her hair. She inserts them into the lock and it doesn't take long before she manages to find out what the mechanism is all about. \n\t\tGetting it to work proves to be a bit more difficult and one of the hairpins actually breaks as she unlocks the chest. \n\t\t\n\t\tNot wanting to waste time, she quickly opens it to find out the lower half of the teddy bear.\n\t\t\n\t\t\"You rock, sister!\" ${partner} says.\n\t\t\n\t\t${astra} looks at her with smiling eyes. \n\t\t*set bear_lower true \n\t\t*goto 7 \n\t\n\t#\"Well, then I can do nothing about it.\"\n\t\t*goto 7 \n\t\t\n*label lady_mirrors\n\"I have a bad feeling about it,\" says ${partner}.\n\n${astra} ignores the comment, takes the book and approaches the mirror. She starts reading the summoning spell. The image in the mirror changes as the background fills \nwith smoke. The lady has pale skin and long dark hair. Her eyes glow in bloody red.\n\n\"Who dares summon me?\" she asks, showing teeth that look rather sharp. \n\n\"My name is ${astra}, and I want to ask you about Magda.\"\n\nThe Lady frowns. \"Who taught you manners, maiden? You have to offer me something and only then I would listen to your request.\"\n\nWhat should ${astra} do?\n*choice \n\t#Threaten her \n\t\t\"I had the power to summon you. Are you not afraid of what else I can do?\" ${astra} asks squinting her eyes in a threatening grimace.\n\t\t\n\t\tThe lady extends her bony hand and it passes through the mirror and slaps ${astra}. \n\t\t*set energy -1 \n\t\t(Energy-)\n\t\t\n\t\t\"I will take that as a no,\" says the young woman. \n\t\t\n\t\tThe lady chuckles. \"I love your style, dear.\"\n\t\t*goto lady_mirrors2\n\t\t\n\t#Fall on her knees and beg her \n\t\tAs ${astra}'s knees touch the hard and cold floor, she feels her energy being drained away from her. She feels like screaming but nothing comes out of her \n\t\tmouth. \n\t\t*set energy -2\n\t\t\n\t\t(Energy--)\n\t\t\n\t\t\"I am sorry, my dear, I didn't mean to take as much, but your essence is so delicious. You have no idea what dark desires it urges withing me. But, don't worry \n\t\tabout it, I promise to practice more self-control,\" says the Lady.\n\t\t\n\t\t${astra} shakes as she gets on her feet.\n\t\t*goto lady_mirrors2\n\t\t\n\t#Apologize for bothering her \n\t\t\"I am sorry for the inconvenience. I believe I should let you go,\" says ${astra}.\n\t\t\n\t\tThe Lady raises her eyebrows. \"Wait, didn't you say you wanted to talk to me about something?\"\n\t\t\n\t\t\"Well, forget about it. It is not that important.\"\n\t\t\n\t\tThe Lady gasps. \"I have never had the experience of anybody summoning me just to send me away.\"\n\t\t\n\t\t\"Where I come from, we have a saying that variety is the spice of life.\" ${astra} smiles. \n\t\t\n\t\t\"Well, I appreciate that smart play of yours and I understand that I am getting none of your energy, so just get back to \n\t\tbusiness talk, will you?\"\n\t\t\n\t\t\"Sure, if that is your wish.\" ${astra} nods.\n\t\t*goto lady_mirrors2\n\t\t\n*label lady_mirrors2\n*page_break\n\"I am here to restore Magda's teddy bear and I have the feeling you can find me a part of it,\" ${astra} gets up to the point.\n\nThe Lady smiles is a creepy way. \"It's upper body without the head are in my realm, so there is no way you can find it where you are. Normally, I would try to \nconvince you to come here and get it, but I feel that you are somebody with an important duty so I can't have you as a casualty. Besides, I have a strong relationship \nwith Magda, she is having difficulties in the role she is trying to play in the monastery. I know repairing the bear will bring her joy. Catch!\"\n\n${astra} barely has the time to react to the peace of plush that flies out of the mirror. She instinctively catches it and feels its softness. \"Thank you.\"\n\n\"It was nice chatting with you,\" the Lady says and her image in the mirror disappears.\n*set bear_upper true \n*goto book  \n\n*label 8\n*if bear_head\n\t*set bear +1\n\t*goto 81\n\t\n*else\n\t*goto 81 \n\n*label 81 \n*if bear_lower\n\t*set bear +1\n\t*goto 82\n\t\n*else\n\t*goto 82\n\t\n*label 82\n*if bear_upper\n\t*set bear +1\n\t*goto 83\n\t\n*else\n\t*goto 83\n\n\t\n*label 83\n${astra} and he entourage return to Marcus. He looks at them expectantly.\n*if bear=0\n\t\"You are really coming back empty handed?\" he snaps in desperation. \"Nevermind, I will give her flowers or something. Thank you for trying.\"\n\t*goto 9\n\t\n*elseif (bear=1)\n\t\"Is this all you've got?\" he snaps in desperation. \"Nevermind, it is still better than nothing. Thank you for trying.\"\n\t*goto 9\n\t\n*else \n\t\"Great, we have something to work on,\" Marcus says and takes out a needle that must have been stuck below the table.\n\t\n\t\"I don't trust this guy, he is too secretive,\" ${partner} whispers in ${astra}'s ear, but she disregards the statement. \n\t\t\n\t*if needle \n\t\t\"I have something better,\" ${astra} says and gives him the holy needle. \"This one is sacred.\"\n\t\t\n\t\tMarcus takes it with a nod of appreciation.\n\t\t*set bear +1 \n\t\t*goto 85 \n\t*else \n\t\t*goto 85 \n\t\t\t\n*label 85 \n*page_break\nMarcus rips off a bit of thread from his shirt and prepares to start sewing.\n\n*if thread \n\t\"I suggest you use the lace on your neck,\" ${astra} says.\n\t\n\t\"Why?\" Marcus asks. \n\t\n\t${astra} just taps her heart area. Marcus thinks for a moment, then he removes the lace.\n\t*set bear +1 \n\t*goto 86 \n\t\n*else \n\t*goto 86 \n\t\n*label 86 \n*page_break\nMarcus takes a look at his work. \"Well, I have done what I could. I only wish I remembered the name of the bear. I am not even sure why it is important.\"\n\n*if bear_name\n\t\"It is Darion,\" ${astra} declares. \n\t\n\t\"Yeah, that's right, but how do you know?\" Marcus asks.\n\t\n\t\"I read it in her diary.\"\n\t*set bear +2 \n\t*goto 9 \n\t\n*else \n\t\"I guess you may remember it when you expect it the least,\" ${astra} says.\n\t\n\t\"That could be the case,\" Marcus replies.\n\t*goto 9 \n\t\n*label 9 \n*if bear>6 \n\t*achieve riddler \n\t*goto 91 \n\t\n*else \n\t*goto 91 \n\t\n*label 91\n*page_break\n\"I am so nervous,\" Marcus explains. \"Magda will pass through the hall at the end of the corridor in a few minutes.\"\n\n\"He has a reason to be,\" says Lazarus. The tranquility in his tone makes ${astra} believe it is nothing serious, just the low chances Marcus has of \nmaking a good impression in front of the lady.\n\n\"Just go,\" ${astra} orders.\n*page_break\nThe hall is a spacious one with huge pillars. ${astra} and her friends hide behind them so that they wouldn't spoil the romantic encounter. \n\nSoon, a dark beauty wearing a white cassock enters from the other side.\n\n\"Things are going to escalate quickly,\" says Lazarus.\n\n\"How do you know?\" ${astra} whispers. \n\n\"She is a vampire.\"\n\n\"Why the hell didn't you say that earlier?\" \n\n\"Nobody asked.\" He shrugs. \n*page_break\n*if (bear\u003c3)\n\tMagda raises her hand and it seems that she is about to pet his cheek, but then smacks his neck. The blow throws makes him fall to the ground. Motionless. \n\t\n\t\"Damn you and your pathetic attempts to bring me back to you,\" she curses. \n\t*goto 10 \n\t\n*else \n\t\"Aw, that is so sweet of you.\" Magda hugs him and kisses his cheek... then bites his neck. Marcus' body shivers in agony. \n\t\n\t\"Stop it now!\" ${astra} shouts. \n\t\n\tMagda throws the motionless body away from her. \n\t*goto 10 \n\t\n*label 10 \n*page_break\nNo longer having to pretend to be human, Magda obtains her true form. Leathery bat wings tear her cassock from behind and her facial \nfeatures get sharper, although retaining some of her previous beauty. \n\nShe starts muttering something you don't understand. It appears to be some sort of an incantation.\n\n*if purpose \n\tLazarus says something too, making Magda step back in horror.\n\t\n\t\"Now that I know who her dark mentor is, it was easy for me to block him from interfering,\" he explains. \n\t*goto 11 \n\t\n*else \n\tMadga summons a shadowy silhouette that flies directly at ${astra}. She feels etherial claws scratch her soul. Luckily for her, Lazarus interferes \n\tand banishes it. \n\t\n\t\"Are you alright?\" he asks ${astra}. \n\t\n\t\"I have been better,\" she admits. \n\t*goto 11 \n\t\n*label 11 \nMadga's eyes turn red, her legs slightly apart.\n\nWhat should ${astra} do?\n*choice \n\t*selectable_if (bear>4) #Connect her to the Light \n\t\t\"Look at the bear,\" ${astra} orders and the plush toy starts glowing. Madga reluctantly follows the order.\n\t\t\n\t\t\"It is speak of you of your innocence that you have forgotten in the ways of your twisted wiles. Remember what it feels like to have your own \n\t\tconnection to Source, so that you never need to hunt for the energies bestowed to others. Feel free from the burden of being who you are and embrace your true self, \n\t\tthe one that is yours by Creation. The only truth that stands among the lies, the fact that you are a being of light.\"\n\t\t\n\t\tMagda falls to her knees and starts crying, her form suddenly changing back to normal.\n\t\t\n\t\t\"It is alright now, my sister,\" ${partner} kneels down to her and gives her a comforting hug. \n\t\t\n\t\t\"That was impressive,\" says Lazarus. \n\t\t\n\t\tHe then goes to explain Magda that they need the key to the floor of the Exarch. It is hard to tell if she is listening, but she handles it without protesting.\n\t\t*set magda_free true \n\t\t*achieve magda \n\t\t*goto 12 \n\t\t\n\t*selectable_if (partner=\"Deathrose\") #Ask Deathrose to step up\n\t\t\"With pleasure,\" says the blood demon, responding to ${astra}'s plea.\n\t\t\n\t\t\"Come on, sister, let's see your dance moves,\" she taunts. \n\t\t\n\t\tWhat follows next happens too quickly for ${astra}'s mind to register. Blows are exchanged and dodged with the speed of a lightning. Then there is a snap and \n\t\tMagda sisintegrates into a pile of black Ash. \n\t\t\n\t\t\"I am getting out of shape,\" Deathrose declares as she massages her bruised forearm. \n\t\t*goto 12 \n\t\t\n\t*selectable_if (stealth>4) #Hide behind the pillars again\n\t\t${astra} falls back behind the pillar. Magda hisses in anger and runs behind the one where ${astra} was standing, but she is not there any more. As the vampire\n\t\tis wondering where the woman is, she receives a backstab.\n\t\t\n\t\tMadga ends as a pile of black ash. \n\t\t*achieve vampire_slayer\n\t\t*goto 12 \n\t\t\n\t#Shoot her \n\t\t${astra} prepares her crossbow. Where should she aim?\n\t\t*choice \n\t\t\t#In her chest \n\t\t\t\tMadga moves her wing with a speed that could be regarded as impossible to obtain.\n\t\t\t\t*goto 112 \n\t\t\t\t\n\t\t\t#In her legs\n\t\t\t\t*if marksmanship >4 \n\t\t\t\t\tThe bolt hits her leg exactly as intended. Tha pain nails her to the ground. ${astra} shoots two more time.\n\t\t\t\t\t\n\t\t\t\t\tThe vampiress disintegrates into a pile of black ash.\n\t\t\t\t\t*achieve vampire_slayer \n\t\t\t\t\t*goto 12\n\t\t\t\t\t\n\t\t\t\t*else \n\t\t\t\t\tThe bolt misses.\n\t\t\t\t\t*goto 112 \n\t\t\t\t\t\n\t#Attack her with the sword\n\t\t${astra} wastes no time and charges at the enemy while sliding the sword out of the sheathe on her back.\n\t\t\n\t\tWhat would she expect Magda to do?\n\t\t*choice \n\t\t\t#Try to scratch her with the nails\n\t\t\t\t*if physique>3\n\t\t\t\t\tMagda tries to deliver a cunning blow at the neck from the side opposite to her main hand, but ${astra} suspects that. The woman successfully blocks the blow, then \n\t\t\t\t\tpushes the sword just a bit further to cut the hand. \n\t\t\t\t\n\t\t\t\t\tThe vampiress disintegrates into a pile of black ash.\n\t\t\t\t\t*achieve vampire_slayer\n\t\t\t\t\t*goto 12\n\t\t\t\n\t\t\t\t*else \n\t\t\t\t\tMagda tries to deliver a cunning blow at the neck from the side opposite to her main hand, and ${astra} suspects that. The woman tries to block the blow, but is not \n\t\t\t\t\tquick enough. The razor sharp nails sink deep into ${astra}'s flesh.\n\t\t\t\t\t*set energy -1 \n\t\t\t\t\t\n\t\t\t\t\t(Energy-)\n\t\t\t\t\t*goto 112\n\t\t\t\t\t\n\t\t\t#Kick her with the high-heeled boots\n\t\t\t\tThe boots seem like formidable weapon. Unfortunately, ${astra} pays too much attention to them and realizes too late that Madga is trying to swipe at her neck with her painted claws. \n\t\t\t\tThe razor sharp nails sink deep into ${astra}'s flesh.\n\t\t\t\t*set energy -1 \n\t\t\t\t\t\n\t\t\t\t(Energy-)\n\t\t\t\t*goto 112\n\t\t\t\t\n*label 112\n*page_break\n${astra} falls under the fury of blows delivered by the enraged vampiress, only managing to block some of them.\n*set energy -2 \n\t\n(Energy--)\n\t\nAfter what seems forever, Lazarus and ${partner} reach the two ladies. ${astra};s mind fails to register what exactly happens after that, but Magda ends disintegrating into \na pile of ash.\n*goto 12 \n\t\n*label 12 \n*page_break\t\n${astra} crouches over the body of the young man and checks his pulse.\n\n\"He is alive... barely,\" she declares. \"He requires healing.\"\n*choice\n\t*selectable_if (magic>3) #${astra} can use her magic skills to heal him herself\n\t\t${astra} decides that she has what it takes to do it. She puts her hand on his forehead and allows the light to pour through. \n\t\t\n\t\t\"What happened?\" he asks as she regains consciousness. \n\t\t\n\t\t\"Things just got wrong,\" ${astra} replies but she still smiles, an expression of joy for having helped.\n\t\t*set marcus true \n\t\t*goto 13 \n\t\t\n\t*selectable_if (partner=\"Malice\") #Malice offers to help\n\t\t\"I think I can do it,\" says Malice and steps forward.\n\t\t\n\t\tShe puts her hand on his forehead and allows the light to poor through. \n\t\t\n\t\t\"What happened?\" he asks as she regains consciousness. \n\t\t\n\t\t\"Things just got wrong,\" ${astra} replies but she still smiles, an expression of joy for seeing him healed.\n\t\t\n\t\tAs for Malice, she is practically beaming. \n\t\t*set marcus true\n\t\t*goto 13 \t\t\n\t\n\t*selectable_if (magda_free) #It is Magda's responsibility to atone for  her actions\n\t\t\"I will take him to a place where he will be healed,\" says Magda and picks him up with an ease that shows that her superhuman strength has not vanished.\n\t\t\"I am sorry, my love,\" she barely whispers as she plants a kiss on his forehead and several tears follow suit. \n\t\t*goto 13 \n\t\n\t#None of the above is available \n\t\t\"Oh, I can't just let this youngster die because of his stupidity,\" says Lazarus and waves. The body disappears.\n\t\t\n\t\t\"Where did he go?\" ${astra} asks. \n\t\t\n\t\t\"I teleported him to a place where he will receive help, and then he will be brought back. No need to worry about him.\"\n\t\t\n\t\t${astra} nods.\n\t\t*goto 13 \n\t\t\n*label 13 \n*if magda_free\n\t*goto 14 \n\t\n*else \n\t\"I wonder where the key we were searching for is,\" ${astra} asks.\n\t\n\t\"I bet it is right here.\" Lazarus puts his hands in the black ashes that remain of Magda. \"Here it is.\"\n\n\t\"I will be glad if you could keep it on yourself,\" ${astra} says. \"I don't like the energy of that thing.\"\n\t\n\t\"I would expect a slayer like you not to manifest abhorrence to dark energies, but maybe this is what brings fuel to your fire. Anyway, now we have to find the route \n\tto the forbidden floor above. I am pretty sure it is just around the corner. Please follow me,\" Lazarus asks.\n\t*goto 14 \n\t\n*label 14 \n*page_break\n\"See, I told you it should be near,\" Lazarus says as he unlocks a door on top of a winding staircase and boldly passes the threshold. \"Now, I bet the Exarch is in the room \nover there.\"\n\n\"I don't know, Lazarus, I have the feeling you are walking around as if you really know this place,\" ${astra} remarks.\n\n\"Not really,\" the dark-feathered angel answers. \"It is just that I have access to senses that may not be available to you. Here we come.\" He opens the \ndoor at the end of the corridor.\n\nThere is an old man with lond white beard sitting at a big round table. There is nothing flashy about his garments, they are just plain white. \n\n\"Exarch?\" ${astra} questions. \n\n\"Yes, I am appointed by the Light to serve as the Exarch of the Church. Welcome to the place where I usually meet with the High Clergy. I don't often have strangers come here without an appointment, so \nI must say I am happy to share some of my time with you. The Zealots insist that it is because of security measures that I am kept like a prisoner here, but I don't like it. I will be \nvery happy when I tell them that you rushed in and nothing bad happened. Please, take a seat and feel as if you are at home.\"\n\n\"So you are not afraid?\" Lazarus asks.\n\n\"Not at all.\" The Exarch shakes his head. \n\n\"Fine, nobody takes me seriously these days,\" the angel complains.\n*page_break\n\"I am listening to you,\" the old man says and ${astra} feels it is her time to speak.\n\n\"Well, honestly most of our efforts were put in the task of getting to you and not into being convincing, so I will just give you a summary of what happened to me \nrecently.\"\n\n\"Honesty is the best policy, dear child,\" the Exarch remarks.\n\n\"It may sound a bit absurd when I lay it down like that, but my story is one of an accident that happened while I was exploring a foreign world. I happened to \nfall in love with it and fight against darkness of a foreign nature. Then I saw the remains of that darkness rising to power hidden under the form of false light. I \nwas approached by the leader of a resistance that claims to be of demonic nature and asked to help. They awoke their Forgotten Goddess and she told me she could \nonly help if her power was unlocked by allowing her children serve the Church of Light in your realm. Sounds like a weird story, right?\"\n\n\"I have grown to learn that often times the strangest stories have the most truth in them. Besides, I know where you come from, ${astra}. When you go back to your \nstar family, I would ask you to give my regards to your Commander. I know her from before and we had a lot of fun in another time and space. It was a total blast!\" He laughs. \n\n\"My memories are so dim, I have just a vague memory of her, but I will try to deliver the message when the time comes,\" the woman says.\n\n\"Thank you. I must say that I dreamt of your coming and I know why you are here. I trust you, as somebody who on the soul level is associated with your Commander, \nwhom I know as a trusted friend and a very important character in a reality we and many others shared.\n\n\"I was really considering allowing demons to join the Church because I don't want it to be an organization based on racial segregation. The Light is for everybody and \nnobody should be denied it. My major concern would be related to any potential friction between humans and demons, but I guess they may have to learn a lesson of peaceful coexistence. \nAnyway, I was delaying that difficult decision, hoping to receive an omen to get me started when the time was right. I guess I just got it.\"\n\n\"My only concern now is related to how much the people you are associated with can be trusted. What I get is that you barely know The Forgotten Goddess and \nthose who serve it. What would you say about it?\"\n\nWhat should ${astra} do?\n\n*choice \n\t*selectable_if (partner=\"Melissa\") #Introduce Melissa to him\n\t\t${astra} looks at Melissa and nods.\n\t\t\n\t\t\"Honorary Exarch, I am the leader of the resistance of the false light which has established itself and ruined the balance that existed before, of which I was the keeper of. If you are \n\t\tto judge our effort to bring it back, you are to judge me.\" She looks boldly into his eyes. \n\t\t\n\t\t\"That would not be needed, dear one. It is an honor to meet you. I can see a lot of goodness in your aura. You have gained my trust.\"\n\t\t\n\t\tMelissa cracks a smile.\n\t\t*achieve trust \n\t\t*goto 15 \n\t\t\n\t*selectable_if (charm>4) #Use her excellent persuasion skills \n\t\t${astra} starts explaining her interactions with Melissa and the other demonic ladies giving her best to describe them without deviating from the truth, while \n\t\taccentuating on their light. \n\t\t\n\t\t\"You have the talent of a storyteller, dear one. I sense no lie in the beautiful words you have for those so-called demons. It would be hard for me not to trust you.\"\n\t\t\n\t\t${astra} flushes.\n\t\t*achieve trust \n\t\t*goto 15 \n\t\t\n\t#She can do neither of the above\n\t\t\"I guess I can't point out convincing facts, but I have been trusting my intuition and this is what it has been telling me.\" ${astra} shrugs.\n\n\t\t\"Well, I don't ming having the benefits of doubt. This will not stop me from taking a decision.\"\n\t\t*goto 15 \n\t\t\n*label 15 \n*page_break\n\"And what about you, angel? Are you with them?\" The Exarch asks.\n\n\"${astra}'s quest was not the main reason here. I know that in this timeline a group of priests will try to awaken ancient evil and I came to warn you and to help you \nfind the culprits. I also knew I would find a female Slayer of Evil and I should help her. I did, with the whole of my sense I believe ${astra} is that slayer. What I didn't expect is \nthat she wouldn't stay here and help. I see her Akashic records, she has another very important destiny to fulfill.\"\n\n\"Oh, really?\" ${astra} mutters under her nose.\n\nThe Exarch laughs. \"Often times the greatest heroes have the hardest time believing in their importance.\"\n*page_break\n\"Before I can start the engines rolling, there is one thing I need. The fuel and all that is,\" says the Exarch.\n\n${astra} starts wondering if this is some kind of a riddle. \n\n\"Love,\" the Exarch announces. \"Show me an example of the love that you can bring to the other world, that will be its salvation.\"\n\n${astra} thinks for a moment. There are two people that come to her mind.\n*choice \n\t#Netho \n\t\t\"I am always with you, standing just outside the veil of oblivion, whispering your name in my prayers, my goddess in flesh and the most beautiful \n\t\tjewel of Creation.\" ${astra} hears a voice she hasn't forgotten.\n\t\t\n\t\tShe stands up and looks back to behold him standing on the threshold. She rushes into his arms and feels so little in his warm embrace. The brave warrior \n\t\tthat she is could allow herself to be vulnerable because she knows she is safe there. Her eyes fill with tears. \n\t\t\n\t\t\"I missed you so much,\" she whispers and kisses him before giving him a chance to reply. \n\t\t*goto_scene epilogue\n\t\t\n\t#The Forgotten Goddess\n\t\t\"That can not be real,\" Lazarus remarks.\n\t\t\n\t\t\"Why?\" ${astra} asks.\n\t\t\n\t\t\"There were mechanisms keeping us apart. I thought they would eventually dissolve but you just broke them. My recommendation is to close your eyes and cover them \n\t\twith your hands.\"\n\t\t\n\t\tBefore she does, she sees the silhouette of the Goddess entering the room. An explosion of Light follows. And then another...\n\t\t*goto_scene epilogue\n\t\t\n\t\t\n\t\n\t\n\t\n\t\n", "mercy": "Pleiadian Mercy\n\nI look through the window. One of the beautiful storms the Earth is famous for rages outside. It is both majestic and sad. But there is another reason for the negative feeling inside me. Something is wrong.\n\nMy assistant contacts me telepathically. \"Ambassador, grave news has reached us. Your home world was attacked by reptilian forces.\"\n\nI trust the ability of our warriors to fend off any assault, so I don't panic.\n\n\"There have been two confirmed deaths and over a hundred wounded,\" Laura continues.\n\nI send my most positive intentions for the casualties to be reunited with Source in the most peaceful way and to those who need healing.\n\n\"The leader of the lizzies has been captured and transported to the mothership of Commander Anica Colinion. The soul scan performed by her on the infiltrator reveals past incarnations under the names of... \" She says three names that I recognize.\n\nMy eyes fill with tears of nostalgia. It can not be!I thought that one was forever lost and out of reach.\n\n\"Laura, please send a request to Commander Colinion, I ask for permission to enter the ship.\"\n\nMy assistant sighs. I know sometimes it is not easy working with somebody who would rarely let you finish what you have to say. \"She sent you an invitation. \"\n\n\"That is very good, Laura. Please, summon my team, it seems I am going to have to delegate responsibilities because I may have to be away for a couple of weeks or so.\"\n*page_break \nAs soon as I enter the ship, the guards greet me and point me in the direction of the conference room. They don't bother to check my soul imprint, which is a breach of the protocol, but I always considered that procedure as a waste of time as there are other more obvious means of checking identity.\n\nAnica Colinion is sitting at the table next to a couple of men. She is an ageless dark-haired beauty wearing a casual dress that still displays her rank. \n\nI put my palm on my chest and then extend it to all three of them, a protocol greeting. \"Can I see her?\"\n\nAnica nods and one of the monitors behind her comes to life. Meanwhile, she explains to the men that I wouldn't be one of Asket's people if I was not impatient.\n\nI behold the image of the reptilian lady. She has an elegant body of a warrior covered by green and brown scales. The leathery wings on her back make her look anything but angelic, and the winding horns on her head remind me of a crown. Her yellow eyes glow with vicious intelligence.\n\nNext to her lies an intricate set of armor. It must have taken a skilled artisan weeks to come up with such a piece of art and functionality. However, now it lies broken at her feet. A cloak on her back is the only clothing she has. I know from experience that the fact wouldn't bother a reptilian.\n\n\"She had a big wound on her left thigh but it seems it healed successfully,\" says Anica. \"Our sensors show that she is in good health, although quite weak from the experience. Emotionally... it is hard to say. It would be better to let you check out yourself.\"\n\n\"I need to ask you why you invited me to participate, dear Commander.\"\n\n\"I spent hours trying to retreat her soul family tree and then I went to check each of the lifetimes that could potentially be crossed with one of our people's. I expected to find some of our warriors who had reptilian incarnations in order to understand the rivals better, but instead I came across you. The analysis pointed at you as the most suitable one for the task.\" There is a hint of fatigue in her calming voice.\n\nI nod. \"Thank you very much. I really needed to hear that you give me a high chance of success. It is not going to be easy and I needed a bit of a boost in my self-confidence.\"\n\nShe laughs. \"If anybody told me that our Ambassador on Gaia would need encouragement, I would take that as a joke. Would you allow me to introduce you to the other gentlemen in the room?\" she suggests.\n\n\"Sure, I apologize. But as the lady explained, patience is not exactly considered a virtue by a group of people I am often associated with.\"\n\n\"This is the head of security. He put an invisible forcefield in the middle of the room where our guest is.\"\n\nThe man has sharp features and short black hair. His genetic heritage is beyond me at this point. \"I have heard many tales of your bravery in battle.\"\n\n\"Well, often times those who get written in the books of history are the ones who deserve it the least. So, that can actually be an insult.\" I wink at him, refusing to take myself seriously.\n\n\"And the other is still an apprentice but one who will play a very important role in events to come,\" Anica says.\n\nThe man is very young, I would say still a boy. His features are Nordic, just like mine, but his hair is much shorter.\n\nHe acknowledges me with a single nod, obviously not wanting to waste my time. There is something very smart about that reaction, the kid has style.\n\nI take a deep breath. The friendly bantering was intended to make me relax before meeting the reptilian officer the soul of whom I've called a sister in several incarnations. \n*page_break\nI enter the room where the lizzie is held. \"Hello, Drakalyxen. Is that how you requested to be addressed?\"\n\nShe looks at me and hisses in my direction, her tongue lashing in the air. \"I demand death!\"\n\n\"I don't think your death is part of the agenda,\" I assure her.\n\n\"I am not looking forward to being tortured,\" she confesses, her voice getting even coarser. \"But I can take it.\"\n\nI shake my head. \"Torture is not part of the plan either.\"\n\n\"But why, soft one? You know that I led the attack, I am bound to have vital information about where our bases are and secret weapons, right? \"\n\n\"We don't want to take war to your side. The conflict lasted for far too long. We are merely defending ourselves, and as you can see, we are very capable of doing so.\" I hesitate for a second. \"What if we have the means to obliterate you if we want, but we actually don't because we have hopes that one day we can live together side by side, born next to hatched? Has that thought reached your consciousness?\"\n\n\"You are a liar and coward!\" She gets agitated. \"Drop that forcefield and you will see that I can obliterate you with my bare hands!\"\n\n\"I am sure we will have the chance to participate in combat drills, but I would leave that for the time when you are rested and recovered.\"\n\n\"But I can face you even now,\" Drakalyxen insists.\n\n\"I don't doubt your capabilities, dear warrior, and I kindly ask you not to take today's defeat as a weakness of your own, or your kind. It has produced some of the mightiest warriors in this universe. Today, you fought an uneven battle. I haven't checked the footage but I believe you displayed a lot of valor. Look me in the eye, what do you see there?\"\n\nHer yellow gaze embraces me and I understand that she recognized me. \"That is irrelevant. There are too many lives at stake in order for me to be dissuaded by what I see in you. Know that whatever we had in previous incarnations will not extend to this.\"\n\n\"It is your choice, Drakalyxen. Right now, I am not concerned with any lives or well-beings other than yours.\"\n\nShe looks at the monitor behind her that currently displays a map of the Pleiades. \n\n\"Do you wish to be reunited with your people?\" I ask.\n\n\"Yes... But I will be punished for today's failure.\"\n\n\"What is it that awaits you there? Torture? Death?\"\n\n\"I really don't know. I would be at the mercy of my superiors. So, if you are not going to torture me, what will you do?\"\n\nI smile. \"Just before I entered this room, I came across the chef of the ship. A couple of years ago he was my guest on Gaia in his search for new recipes. He prepared spaghetti. I asked him to add meatballs for you since I know you guys appreciate meat. As for me, I asked for Brussels sprouts.\"\n\nDrakalyxen hisses in disgust. \"How can you eat that?\"\n\nI shrug. \"I just love it. So, do you care to try?\"\n\n\"My body requires nourishment,\" she announces.\n\n\"So be it.\"\n\nIt doesn't take long for the kitchen crew to bring in a small table with cutlery and dishes. I wait for them to leave and ask for the forcefield to be removed. Drakalyxen makes tentative steps towards the table as I fill her plate.\n\nShe takes a bite and hums with delight. \"It is tasty. I guess the cook is delicious too.\" She chuckles.\n\nI laugh. \"I bet somebody who is as skilled at preparing meals would be a mouth-watering meal himself.\"\n\nI take her using her sense of humor as a positive sign.\n\n\"I think I need more,\" she admits, so I refill her plate and actually enjoy the sight of the reptilian eating. The Brussels sprouts taste amazing. There is some kind of a marinade applied to them that I really should ask the chef about.\n\nWhen she finshes, I see her eyes getting sleepy.\n\n\"I guess it is time for me to let you have some rest,\" I tell her. \"The replicator should finish manufacturing a bed that fits your anatomy pretty soon. The forcefield will be moved closer to the door so that you can have more space. The wall in the back will open to reveal a bathroom. I will take leave of you now and come back later. Farewell for now.\" I stand up and head for the door.\n\n\"Goodbye... brother.\" \n*page_break\nI retrace my steps to the conference room. Anica is still there, alone.\n\n\"You did a very good job, dear one,\" she says softly.\n\n\"Thank you, Commander. It went well, but it is only the beginning. Things are going to get riskier from here, but I hope for the best.\"\n\n\"You didn't seem to radiate any doubt when you were talking to Drakalyxen,\" Anica remarks.\n\n\"No, this is how it worked for me in my warrior incarnations. There would be a lot of training and deliberation, but in the heat of battle there is little room for any of that, you just have to make things happen.\"\n\n\"I understand.\" She nods.\n\n\"There is something unrelated that bothers me and I don't quite understand it. I don't feel very well here, it is almost as if I am suffocating,\" I confess.\n\n\"I bet some of it has to do with comparing it to Asket's one. Each ship carries a lot of the energy of the Commander, and there is little doubt that your soul frequency is much closer to hers. But that is not the main reason since I know you feel quite comfortable in my presence.\"\n\n\"I do.\"\n\n\"I believe that uneasiness comes from the way it was once used. Of course, not a single mechanical part remains unchanged multiple times, but much of the emotional charge remains. It is a historical monument from the times humans were running for their lives from the reptilian threat. As the distance from our home planets increased, we were making the necessary changes to ensure that the interior could ensure some personal privacy of the large number of people, so rooms got smaller and corridors narrower.\"\n\n\"All this madness... As warriors, my brethren and I fought so hard together with many others to prevent things like that from happening.\" My voice trembles with sadness. \n\n\"Be easy on yourself. You did more than your fair share of duty. Don't forget that some of that is evolutionary, and some pure insanity, as the case we are discussing now.\"\n\n\"Thank you for helping me understand my feelings. There is something else I want to ask you...\"\n\n\"...sure, bring her on board,\" Anica interrupts me.\n\nI stare at her with wide open eyes.\n\nCommander Colinion smiles widely. \"You wanted to ask me to allow your soul twin to join you in the healing process. I know how the results are always amplified by the twinning of power and intent, and it will be very useful to allow Drakalyxen to sense the energy that flows between you and your twin flame. I also know how much you want to be with her again.\"\n\n\"It is as you say, dear one.\"\n\nI look at the monitor showing the sleeping reptilian lady.\n\n\"I suggest that you take some time to rest too. I bet tomorrow is going to be a long and emotional day.\"\n\n\"I certainly expect it to be.\"\n*page_break\nI enter the room where Drakalyxen is held. She looks rested and alert.\n\n\"Did you manage to sleep well?\" I ask her.\n\n\"I would say that it was far from optimal, but I really needed that to pull myself together.\"\n\n\"That is nice. Commander Colinion gave me the permission to show you some of the ship. As long as you are with me, you will be totally unrestrained.\"\n\n\"That is a manifestation of a lot of trust. It is not what we do to our prisoners of war. Not at all.\"\n\nI sigh. \"You are not really a prisoner, dear one. We just want to show you how we do things. After that, you will be able to choose whether to stay with us or go back to your people. But, until that happens, there are certain security protocols that need to be followed and that might make it look as if you were a prisoner.\"\n\n\"Security protocols,\" she murmurs as you both leave the room. \"The way I see it, you have none,\" she chuckles.\n\nIn the corridor, we run into a couple of crew members. They stick their backs to the walls, horrified by the sight of the lizzie.\n\n\"I understand them, my bro. Maybe all they have seen from a reptilian is violence. \"\n\n\"Isn't that your story too?\" I dare ask.\n\n\"Not really. We don't express love in the pure and refined ways that you do, but it is still there. Where are we going?\"\n\n\"I want to show you the playground. It is right there.\"\n\nWe enter a kid's heaven. There are a lot of games facilities, swings, sandboxes. Anything a human mind can think of for the benefit of entertainment of a little one.\n\n\"I don't understand why you brought me here.\" She looks around in awe, examining the kids having fun. \"I have never had those experiences.\"\n\n\"This is exactly why, dear one. Do you care to try to show those children how to build a sand castle?\"\n\nI approach a sandbox where a couple of small boys are building something shapeless and ask them to let us use one of their shovels. Drakalyxen follows me nonchalantly.\n\n\"Maybe you can show us how your barracks look like,\" I suggest and give her the shovel. The kids encourage her.\n\nThe reptilian starts doing so, but at one point delivers a punch to the sandbox spraying sands everywhere and runs away. I try to follow her closely but I only catch up with her in her room.\n\n\"I am sorry, my bro, I got emotionally overwhelmed. I hope I didn't scare the children,\" she explains.\n\n\"It is okay, Draka. They are fine. You are just integrating the pain from your childhood. It is necessary for your healing.\"\n\nShe nods. \"There is something I want to ask you. I noticed a girl playing with a soft bear doll. Can I have one too?\"\n\n\"Sure, I will arrange that.\"\n\n\"And something more I wanted to experience. Can you give me a hug, my bro.\"\n\nI smile and embrace my reptilian sister.\n*achieve reader \n*goto_scene death ending  \n", "new":
