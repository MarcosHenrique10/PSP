uckles. \"There are many names suitable for them. I love telling others that they are guardian angels, but I prefer calling them stalkers.\"\n\t\t*set stalkers true\n\t\t\n\t\t\"They are invisible!\" ${astra} exclaims.\n\t\t\n\t\t\"Let's say that the light does not interact with them the way it does with mere mortals.\"\n\t\t*goto prelate2 \n\t\t\n\t#At the stained glass \n\t\tThe figures move in a way that remind ${astra} of something she can't put her finger on. However, the scene of the demons being defeated \n\t\tby the angels changes. The demons seem to be explaining what wrongdoings the angel committed, and he falls to the ground crying and holding his face in \n\t\this palms. \n\t\t*set angels_cry true \n\t\t*goto prelate2 \n\t\t\n\t#At the throne \n\t\tThe throne no longer seems to ${astra} as the heavily ornamented armchair for the prelate to rest, but of something with a far greater purpose, a nexus bringing \n\t\ttogether energies from different streams interwoven in such a way as to make her what she is. Omnipotent.\n\t\t*set throne true \n\t\t*goto prelate2 \n\t\t\n*label prelate2\n*page_break\n\"What is it that you want of me?\" ${astra} asks as her eyes squint in an intimidating manner. The atmosphere and being alone with the Prelate is starting to get on her nerves.\n\nChiera laughs. \"Haven't the others taught you manners? It is me who decides when to speak and it is then that all listen and revere what I have to say. But impatience \nis strong in you, you remind me of the times before I came here.\"\n\nShe stands from the throne and moves closer to ${astra}. Suddenly, her expression loses some of the air of dominance.\n\n\"They don't remember the form in which you came to this realm, do they?\"\n\nChiera shakes her head. \"It is not a planet on which you are meant to remember who you are. It only took a little bit of interfering with the system already built and \nlet out in the rain. Just a tiny touch at the right place to make them all forget the shadow being their eyes saw and embrace my newer self as a goddess of Light which they \nare to worship.\"\n\n\"But has anything inside you changed at all?\" ${astra} asks, her forearms retreating behind her back as if to prepare for an attack.\n\nThe Prelate sighs. \"I wish the answer was no, but my new position and the comfort it gives me allows me to be less of the evil entity I once was. But the worship \nI get is so addictive... It is a new experience for me and we will see where it goes. Anyway, by now you must be curious to why I am sharing all of that with you, right?\"\n\n\"It is some kind of a game of a cat and mouse, I presume?\" ${astra} replies.\n\n\"Actually no, although I understand why it looks like that. ${astra}, you are a very special woman and not only because you are not native of this realm. You \nare indeed an alien to it just like me, you know?\"\n*page_break\n\"I have some dreams about being dressed in a strange suit and being in some sort of a flying room.\" ${astra} admits.\n\n\"I will be absolutely honest with you, dear one. You are the only one that can stop me. The consciousness of the land does not want me as I am an outsider who messed \nwith the order that it considers to be natural. You, on the other hand, participated in a battle against one of my kind as means of protecting the land from evil \ninfluence. You are a very sweet thing, but also a slayer. And so, you are called once more to do what you do best, and that is - to slay me and rid this realm from my \npresence. The meditation I had last night revealed my final seconds.\" Tears roll down her cheeks.\n\n${astra} feels confused at the sight of the Prelate stripped of all of her glory. Suddenly, there is a human being standing in front of her. \"Now I don't understand why \nyou are saying all of that.\"\n\n\"You are a person of strong will. You can make a choice. Fight me and I will fight back with all of my strength. Let me be and I will provide for you all within \nmy abilities.\" Chiera whispers and returns to her throne.\n\nWhat should ${astra} answer?\n*choice \n\t#\"Your offer is a generous one.\"\n\t\t\"I understand that what you say does not mean that you accept my terms, right?\" the Prelate inquires.\n\t\t\n\t\t\"It just means that I will think it over.\"\n\t\t\n\t\t\"Then, thank you very much, you have been very cooperative,\" says Chiera. \"I want to reward you, to give you a glimpse of what awaits you if you decide \n\t\tnot to stand against me. Something that would not help you in your quest to destroy me, should you choose to.\"\n\t\t\n\t\tThe Prelate removes her earrings. ${astra} looks in amazement as the older woman gracefully walks towards her and puts them in her hand. \"These are not like the \n\t\tcollar, they are not meant to cloud your judgment. They just look pretty.\" \n\t\t\n\t\t${astra} looks at them and indeed finds the blue shimmering stones to be very appealing to the eyes.\n\t\t*set charm +1 \n\t\t\n\t\t(Charm+)\n\t\t\n\t\t\"Thank you!\" she says.\n\t\t*goto prelate3\n\t\t\n\t#\"I have to think about it.\"\n\t\t\"This is all I ask of you now. Thank you very much,\" says Chiera.\n\t\t*goto prelate3\n\t\t\n\t#\"Your fate is sealed!\"\n\t\t\"This is the answer I expected to hear, in all honesty. But beware, ${astra} of the League of Light, I am a warrior too. I can fight back, unlike some of the enemies you \n\t\tfaced before.\"\n\t\t\n\t\t${astra}'s eyes widen in horror as she gets the glimpse of a memory of her attacking reptilian monsters in full armor. She was moving much too quickly for them \n\t\tto have the chance to retaliate. They were indeed warriors, but the battle was more of a slaughter. \n\t\t\n\t\tWaves of pain and sorrow flood her mind.\n\t\t\n\t\t(Energy-)\n\t\t*set energy -1 \n\t\t*goto prelate3 \n\t\t\n*label prelate3 \n*page_break\n\"This is all I wanted to tell you. I hope you will consider my offer and make the right choice. But before I let you go, I want to ask you to allow me to put a necklace around your neck, just I have done with quite a few of my followers. It will \nallow me to have a much better connection with you.\"\n\nWhat should ${astra} do?\n*choice \n\t#Agree\n\t\t\"That would be an honour, Prelate.\"\n\t\t\n\t\t\"Come closer, don't be shy, dear!\" Chiera gives her a predatory smile, then stands from the throne and magically produces a beautiful necklace with \n\t\tfloral motives. \n\t\t\n\t\t[i]It is the same I wore in my dream.[/i] ${astra} thinks as the perfume of the Prelates overwhelms her senses and makes her dizzy.\n\t\t\n\t\tA sudden rush of warm energy fills her body, making her feel more powerful that before.\n\t\t*set will +1 \n\t\t*set charm +1 \n\t\t*set physique +1 \n\t\t*set necklace true \n\t\t\n\t\t(Will+, Charm+, Physique+)\n\t\t\n\t\t\"Now go with peace, dear one, and enjoy the benefits of the present that I gave you.\"\n\t\t*set rel_chiera +2 \n\t\t*goto fork  \n\t\t\n\t#Disagree \n\t\t\"I am afraid I am not ready to do that,\" ${astra} tells Chiera and looks down, not willing to meet her gaze.\n\t\t*set rel_chiera -2 \n\t\t\n\t\t\"You know you are going to regret that, don't you? I will wait for that day with the impatience of a snake waiting for its prey. Now,\n\t\tturn around and get out of my sight before I decide to hurt you!\"\n\t\t*goto fork \n\n*label room \n*set fork +1 \n${astra} gets back to her room and opens her drawer. A few trinkets attract her attention and she hesitates on which one to put on. \n*choice\n\t#Tiara of sharpshooting \n\t\t*set marksmanship +1 \n\t\t(Marksmanship+)\n\t\t\n\t\t${astra} really likes the way those earrings underscore her features. \n\t\t*goto fork \n\t\t\n\t#Brooch of celestial magic \n\t\t*set magic + 1\n\t\t(Magic+)\n\t\t\n\t\tThe brooch matches the embroidered symbols of the light on her cassock.\n\t\t*goto fork \n\t\t\n\t#Ring of the crescent moon \n\t\t*set stealth +1 \n\t\t(Stealth+)\n\t\t\n\t\tThe rings reminds ${astra} of the stories of stealthy thieves committing brave robberies.\n\t\t*goto fork \n\t\t\n*label deathrose \n*if met_deathrose\n\t*goto deathrose2\n\t\n*else\n\t*goto deathrose3 \n\t\n*label deathrose2\nThe sight of the catherdal induces mixed feelings in ${astra}. She really doesn't know what to expect. Her last visit there prove to be a dangerous \nendeavour. Despite her clear memories of destroying her, here she stands as alive as ever.\n\nShe is alone, dressed in an official clergy robes, standing next to the altar, staring at a small cauldron. ${astra}'s steps echo as she approaches the blood demoness.\t\t\n\t\t\n\"You cheated death, right?\" ${astra} asks.\n\nDeathrose smiles. \"Like a phoenix I rise from the ashes. And now I am the High Priestess serving in the main temple.\"\n\n${astra} shakes her head. \"I am not sure how we got to that point. Last time we met, I was helping the priest exorcise you. Now, you are in his shoes.\"\n\nThe blood demoness chuckles. \"Things change. New rulers, new rules.\"\n*goto deathrose4 \n\n*label deathrose3\nThe sight of the cathedral induces mixed feelings in ${astra}. She really doesn't know what to expect. Her last visit there prove to be a dangerous \nendeavour. Melissa told her she was about to meet some kind of a blood demon lady. By now she was quite comfortable with the demonic kind, but for some \nreason her intuition was screaming danger.\n\nDeathrose is alone in the Cathedral, dressed in an official clergy robes, standing next to the altar, staring at a small cauldron. ${astra}'s steps echo as she approaches the blood demoness.\t\t\n\t\t\n\"I was told I would find you here. You are Deathrose, I suspect,\" ${astra} says.\n\n\"Positive. Pleased to meet you, ${astra}. Your reputation precedes you,\" she says with an enchanting voice. \"I guess you are surprised to find me playing the role of the High Priestess serving in the main temple, right?\"\n\n${astra} shakes her head. \n*goto deathrose4\n\n*label deathrose4\n*line_break\n\"What is this cauldron for?\" \n\n\"I was thinking of introducing a new ritual to the sermon. It will be something like an inverted communion. In order to receive the blessings of the light, the\nworshipper will have to spill just a little bit of their blood. I love it when they do that. They virtually spill delicious energy that is mine to consume.\" She \nfull lips.\n\n\"Do you have the approval of Prelate Chiera for this?\" ${astra} inquires.\n\nDeathrose looks away, trying to lock out of eye contact. Still, that doesn't prevent ${astra} from seeing the signs of madness in the beautiful dark \neyes of the blood demoness.\n\n\"I don't need her approval. I am high enough in the ranks of the light to be able to do what I please,\" she hisses. \n\n${astra} feels that she must be stopped because...\n*choice \n\t#... her actions are a disgrace of the establishment of the Prelate \n\t\t*set rel_chiera +2 \n\t\t*goto deathrose5 \n\t\t\n\t#... exposing her nature so openly is a danger to Melissa's agenda \n\t\t*set rel_melissa +2 \n\t\t*goto deathrose5\n\t\t\n*label deathrose5 \n*page_break\nHow should ${astra} attack the blood demoness? Physically attacking her is the most direct approach. She looks in perfect shape and her nails look \ndangerously sharp and her home ground advantage may play against ${astra}, but the woman from the stars bravery is greater than her fear.\n\nAlternatively, she can look into her eyes and try to break her will.\n\nA less decent but potentially effective method would be to move towards the exit and then shoot at her with a crossbow. \n\nLast but not least, ${astra} can just leave her be.\n*choice \n\t#Attack Deathrose with daggers\n\t\tAs soon as ${astra} puts her hands on the daggers, Deathrose gives out a wicked smile. \n\t\t\"I knew you wanted to dance with me sister. I was looking \n\t\tforward to that.\"\n\t\t\n\t\tThe demoness dodges the attack with inhuman speed and her manicures leave bloody trails on ${astra}'s forearms.\n\t\t*set energy -1 \n\t\t\n\t\t(Energy-)\n\t\t\n\t\t*if physique>3 \n\t\t\tThe battle turn out to be a nightmare. Deathrose is never where ${astra} suspects her to be. Whenever she swipes with her daggers, the \n\t\t\tdemoness tries to move behind her back, which prevents her from launching overly aggressive attacks. \n\t\t\t\n\t\t\tHowever, Deathrose slips when stepping on a small puddle of ${astra}'s blood and loses balance. The woman's predatory reflexes get triggered \n\t\t\tand she stabs the torso of the demoness\n\t\t\t*goto deathrose_defeat\n\t\t\t\n\t\t*else \n\t\t\tOverall, the demoness appears to be much too quick and she totally controls the combat. A few wounds later, ${astra} desides that discretion \n\t\t\tis the better part of valor and fled from the Cathedral. Luckily, Deathrose does not follow her.\n\t\t\t*goto fork \n\t\t\t \n\t#Look her in the eye \n\t\t\"Look at me,\" ${astra} dares her and the blood demon catches the bait. The woman can see the horror in the eyes of the hell dweller.\n\t\t\n\t\t*if will>2\n\t\t\tThe dance of their eyes last for only a few heartbeats, but they seem like lifetimes to ${astra}. Then, Deathrose screams and descends to \n\t\t\ther knees, massaging her temples.\n\t\t\t*goto deathrose_defeat\n\t\t\t\n\t\t*else \n\t\t\tUnfortunately, it doesn't take long before Deathrose manages to pull herself together resist the force, and retaliates.\n\t\t\t\n\t\t\t\"Get out of my sight,\" she orders and ${astra} feels an overwhelming desire to obey. She slowly walks away, feeling very exhausted.\n\t\t\t*set energy -1\n\n\t\t\t(Energy-)\n\t\t\t*goto fork \n\t\t\n\t#Shoot at her \n\t\t${astra} feels Deathrose's stare as she walks towards the temple. Right before she steps out of the cathedral, she takes a look back above her \n\t\tshoulder and sees the demoness looking away. ${astra} takes the opportunity and takes her crossbow.\n\t\t\n\t\tDeathrose dodges the first bolt and runs towards ${astra}. The woman reloads and readies to fire again.\n\t\t\n\t\t*if marksmanship>3\n\t\t\tThe next bolt, however, sinks into her torso and she drops on the floor.\n\t\t\t*goto deathrose_defeat\n\t\t\t\n\t\t*else \n\t\t\tDeathrose dodges the next bolt too and reaches ${astra}. Strong hands grasp the woman, rendering her unable to move, then she feels a painful bite on her shoulder.\n\t\t\tThe demoness then pushes her through the gate of the cathedral and luckily disengages from the fight.\n\t\t\t*set energy -1 \n\t\t\t\n\t\t\t(Energy-)\n\t\t\t*goto fork \n\t\t\t\n\t#Leave her alone\n\t\t\"Melissa would like to have you back on her side,\" ${astra} says softly.\n\t\t\n\t\tDeathrose doesn't say anything, but a couple of tears roll down her cheeks. \"My former mistress has not forgotten me.\"\n\t\t\n\t\t${astra} shakes her head. \"She says she needs you.\"\n\t\t\n\t\t\"Then tell her that in her darkest hour she can rely on my help.\"\n\t\t\n\t\t${astra} nods and leaves the cathedral.\n\t\t*set deathrose_friend true \n\t\t*goto fork \n\t\t\n*label deathrose_defeat\n*page_break\nNow that Deathrose lies defeated at ${astra}'s feet, what would she do with her?\n*choice \n\t*selectable_if (magic>2) #Reconnect her to the principles of love and light\n\t\t${astra} hugs Deathrose and sings her a healing song. The demoness starts sobbing as all her emotional and physical wounds are healed.\n\t\t\n\t\t\"Melissa needs your help,\" ${astra} whispers in her ear. \"She wants you back at her side.\"\n\t\t\n\t\t\"Tell her that it is where I belong. In her darkest hour, she can count on me. And thank you for what you did to me, dear one, I've never felled \n\t\tso loved and complete.\"\n\t\t\n\t\t${astra} bids her farewell and leaves the Cathedral.\n\t\t*set deathrose_friend true \n\t\t*set rel_melissa +2\n\t\t*set rel_chiera -2 \n\t\t*goto fork \n\t\t\n\t*selectable_if (will>3) #Exorcise her\n\t\t${astra} puts her hand on Deathrose's forehead and starts chanting a cleansing prayer. The demoness starts wailing as the very foundation of her \n\t\texistence is ripped apart and reconstructed. \n\t\t\n\t\t\"I hate what I've become,\" Deathrose says after the painful procedure is over, much to the surprise of ${astra}, who thought she was doing something good.\n\t\t\"Now, please leave me alone before I try to rip you to pieces for what you did to me.\"\n\t\t\n\t\t${astra} decides to fulfil her desire, too confused to ask about what went wrong.\n\t\t*set rel_melissa -2 \n\t\t*set rel_chiera +2 \n\t\t*goto fork\n\n\t#You can't or don't want to choose either option \n\t\tWhile you are anticipating what to do next, Deathrose recovers, brushes ${astra} with the tips of her painted claws and rushes out of the building. \n\t\t\n\t\t${astra} examines the wound, stops the bleeding, then leaves the temple too.\n\t\t*goto fork\n\n*label afterfork\n*page_break \n${astra} returns to her room after the sunset of that very challenging day of hers.\n\nMuch to her surprise, she finds Melissa waiting for her there.\n\n\"Sweet god, you scared me!\" ${astra} exclaims.\n\n\"Of course I would scare you, I am a demon. Did you forget?\" Melissa chuckles. \n\n\"This is not funny. Or at least I am not enjoying it.\"\n\n\"I am sorry. Did you manage to meet Malice and Deathrose?\"\n\n${astra} nods.\n\n\"This is good, thank you for that.\n*if trouble \n\tHowever, grave news reached my ears. Malice has been charged with attacking a pair of royal knights and is going to be burned at a stake tomorrow morning.\"\n\t\n\t\"No way! It can't be true! There was nothing royal in those men. They are pure scum, they are!\"\n\t\n\t\"Do you want to tell me you know more about what happened?\" Melissa asks.\n\t\t\n\t\"Yes, I was with her, we attack them together in order to save the stables apprentice from the bullying of those tin guys. I am surprised \n\tI was not charged too.\"\n\n\t\"That is quite unexpected indeed. Are you going to help me set her free?\"\n\t\n\tWhat should ${astra} answer?\n\t*choice \n\t\t#Sure, you can count on me!\n\t\t\t*set rel_melissa +4 \n\t\t\t*set rel_malice +2\n\t\t\t\n\t\t\t\"I knew that you would be willing to help. Thank you very much for it, dear one. But what shall we do?\"\n\t\t\t\n\t\t\t${astra} sighs and thinks the options over. One of them would be to speak with Prelate Chiera and persuade her to set Malice free. \n\t\t\t\n\t\t\tA more direct approach would be to try to find where she is locked and organize her escape. Or, if your magical skills allow her, ${astra} \n\t\t\tmay just summon her. \n\t\t\t*choice \n\t\t\t\t#Speak with Prelate Chiera \n\t\t\t\t\t${astra} presumes that getting to an audience with the Prelate would be very difficult since the Prelate tends to be busy all the time but it seems \n\t\t\t\t\tshe really considers ${astra} to be very important.\n\t\t\t\t\t\n\t\t\t\t\tWhen she manages to get to be alone with Chiera, ${astra} bravely states her request.\n\t\t\t\t\t\n\t\t\t\t\tThe Prelate ponders for a moment.\n\t\t\t\t\t\n\t\t\t\t\t*if fight_together\n\t\t\t\t\t\t\"Do you realize that you could be charged together with her?\" she says in a cold voice. \"I can't allow people to mess with my knights no matter what \n\t\t\t\t\t\tsince they are the physical force that backs my rule and contributes to my divine status.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t${astra} lowers her eyes, her cheeks burning.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I spared you the humiliation and I thought that it was enough, but I should have known better. I clearly underestimated your benevolence. But so be it, \n\t\t\t\t\t\tdear one. I will set her free as you wish. But that will cost you dearly should you attempt to attack me later on. If you really want to set Malice free, turn around and \n\t\t\t\t\t\tmake the candle with the extinguished fire burn again.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t${astra} turns around and sees a candelabra with three candles, the left one emitting only smoke. Without further contemplation she picks it up \n\t\t\t\t\t\tand lets its top be ignited by the flame of the middle one, then she returns it at its place.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Very well. I will send my word. Malice will be free as she was before being arrested,\" Chiera says.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Thank you. And what are you going to do with the candle I lit?\" ${astra} asks. \n\t\t\t\t\t\t\n\t\t\t\t\t\tThe Prelate's face twists into a predatory smile. \"It is none of your business, my dear. I hope you never come to put it to the test. That would serve \n\t\t\t\t\t\tour mutual benefit best.\"\n\t\t\t\t\t\t*set candle true \n\t\t\t\t\t\t*goto malice_saved\n\t\t\t\t\t\t\n\t\t\t\t\t*else \n\t\t\t\t\t\t\"I can't allow people to mess with my knights no matter what \n\t\t\t\t\t\tsince they are the physical force that backs my rule and contributes to my divine status,\" the Prelate says in a cold voice. \n\t\t\t\t\t\t\n\t\t\t\t\t\t${astra} lowers her eyes, her cheeks burning.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I didn't expect you to come here and beg me, but I think I like it. I clearly underestimated your benevolence. But so be it, \n\t\t\t\t\t\tdear one. I will set her free as you wish. But that will cost you dearly should you attempt to attack me later on. If you really want to set Malice free, turn around and \n\t\t\t\t\t\tmake the candle with the extinguished fire burn again.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t${astra} turns around and sees a candelabra with three candles, the left one emitting only smoke. Without further contemplation she picks it up \n\t\t\t\t\t\tand lets its top be ignited by the flame of the middle one, then she returns it at its place.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Very well. I will send my word. Malice will be free as she was before being arrested,\" Chiera says.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Thank you. And what are you going to do with the candle I lit?\" ${astra} asks. \n\t\t\t\t\t\t\n\t\t\t\t\t\tThe Prelate's face twists into a predatory smile. \"It is none of your business, my dear. I hope you never come to put it to the test. That would serve \n\t\t\t\t\t\tour mutual benefit best.\"\n\t\t\t\t\t\t*set candle true \n\t\t\t\t\t\t*goto malice_saved\n\t\t\t\t\n\t\t\t\t#Summon her\n\t\t\t\t\t${astra} opens her drawer and takes out chalk and five candles.\n\t\t\t\t\t\n\t\t\t\t\t\"You aren't going to do what I think, are you?\" Melissa comments.\n\t\t\t\t\t\n\t\t\t\t\t\"I certainly am,\" ${astra} assures her.\n\t\t\t\t\t\n\t\t\t\t\tFirst, she draws a pentagram on the floor, and then she continues with a circle that encompasses the corners of the star. \n\t\t\t\t\t\n\t\t\t\t\t\"I might need a bit of help with it since you are more familiar with the energetic signatures of hers,\" ${astra} says.\n\t\t\t\t\t\n\t\t\t\t\t\"What should I do?\" Melissa asks.\n\t\t\t\t\t\n\t\t\t\t\t\"Just take my hand and think about her with love. If you can chant with me, that would make things a bit easier for me.\"\n\t\t\t\t\t\n\t\t\t\t\tThe hand of the demoness embraces ${astra}'s and the woman starts her song.\n\t\t\t\t\t\n\t\t\t\t\tIt doesn't take long for Malice to appear in the pentacle amidst a smoke that faintly smells of sulphur.\n\t\t\t\t\t*goto malice_saved \n\t\t\t\t\t\n\t\t\t\t#Offer to share a bit of your energy with Melissa so that she can summon her sister \n\t\t\t\t\t\"You know that the easiest way would be to summon her, just like the warlocks would,\" ${astra} says.\n\t\t\t\t\t\n\t\t\t\t\t\"There is wisdom in what you say, but I am not very good at ritual magic. Theoretically, I can do it, but it would require an amount of energy\n\t\t\t\t\tthat I just don't have.\" Melissa shrugs.\n\t\t\t\t\t\n\t\t\t\t\t\"You can use mine,\" ${astra} says with determination in her voice.\n\t\t\t\t\t\n\t\t\t\t\t\"Do you have the supplies needed?\" Melissa asks.\n\t\t\t\t\t\n\t\t\t\t\t${astra} nods, opens her drawer and takes out chalk and five candles. Then, she draws a pentagram on the floor, and then she continues with a circle that encompasses the corners of the star.\n\t\t\t\t\t\"Now it is your turn, just hold my hand and take as much lifeforce as necessary,\" she says bravely.\n\t\t\t\t\t\n\t\t\t\t\t\"I will try to use the bare minimum, my dear,\" Melissa says and starts the chanting. \n\t\t\t\t\t\n\t\t\t\t\t${astra} feels the insecurity in the voice of the demoness, who is clearly beyond her comfort zone, beyond what she believes she can accomplish. But as she pronounces the \n\t\t\t\t\tname of her sister, the power of the love they share seems to give her strength and confidence.\n\t\t\t\t\t\n\t\t\t\t\t${astra}'s hand starts to feel cold and numb, and a sharp pain makes her scream just before Malice appears in the summoning circle amidst a clod faintly smelling of sulphur.\n\t\t\t\t\t*set energy -2\n\t\t\t\t\t\n\t\t\t\t\t(Energy--)\n\t\t\t\t\t*goto malice_saved \n\t\t\t\t\n\t\t\t\t*selectable_if (deathrose_friend) #Ask Deathrose for assistance \n\t\t\t\t\t\"I am not sure why, but I have the feeling I befriended somebody who can help,\" ${astra} says.\n\t\t\t\t\t\n\t\t\t\t\tMelissa's eyes widen. \"Are you speaking of Deathrose? I knew she would be back by my side...\"\n\t\t\t\t\t\n\t\t\t\t\tThe demoness coughs and fails to finish the sentence as the air fills with smoke marking the entrance of the one they spoke about.\n\t\t\t\t\t\n\t\t\t\t\t\"I am happy you still say my name, my mistress,\" she says. \n\n\t\t\t\t\tMelissa gives her a warm hug. \"I missed you so much, my lovely friend. It is unfortunate that you come at a dire time when we can't have a \n\t\t\t\t\tproper celebration.\"\n\t\t\t\t\t\n\t\t\t\t\tDeathrose laughs. \"What can be a better celebration than manifesting my powers and once again showing the world what a fallen one can do?\"\n\t\t\t\t\t\n\t\t\t\t\t\"This is the spirit I thought you lost when you joined Chiera's ranks,\" Melissa remarks. \n\t\t\t\t\t\n\t\t\t\t\t\"Were you spying on us?\" ${astra} asks.\n\t\t\t\t\t\n\t\t\t\t\t\"Of course, don't be ridiculous! Now, let's go to business!\" she snaps back and disappears... through the door. \t\t\t\t\t\n\t\t\t\t\t*page_break\n\t\t\t\t\tLess than an hour later, Deathrose returns holding Malice by the hand.\n\t\t\t\t\t\n\t\t\t\t\t\"How did you do this?\" ${astra} asks.\n\t\t\t\t\t\n\t\t\t\t\t\"I simple gave the guards what they couldn't take.\" Deathrose gives her a wink.\n\t\t\t\t\t*goto malice_saved\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\n\t\t\t\t\n\t\t#No, I am sorry \n\t\t\t*set rel_melissa -4 \n\t\t\t*set rel_malice -5 \n\t\t\t\n\t\t\t\"That is an answer I didn't expect, to be honest. Anyway, Malice is my sister and I that makes it my responsibility to save her. Anyway, we will meet in the morning.\"\n\t\t\t*page_break\n\t\t\t*goto after_fork2\n\t\n*else \n\t*goto after_fork2 \n\n*label malice_saved\n*page_break\nAfter myriads of hugs, Melissa asks her sister if she is hurt.\n\n\"No, the guards were quite gentle, actually,\" Malice replies. \"I think many of them actually respect me more for what I did and treated me like a royalty.\"\n\n\"I am very glad to hear that. Now, I think we should all take some well-deserved rest so that we will be better able to face the challenges of tomorrow.\"\n*set rel_malice +4\n*set rel_melissa +2 \n*goto after_fork2\t\n\n*label after_fork2\n*page_break\n${astra}'s night is full of nightmares that makes her twist and turn. When the first rays of light touch her eyelids they bring her comfort, but it doesn't \nlast long since Melissa, Malice and Deathrose rush in without even bothering to knock. \n\n\"Didn't I lock the door?\" ${astra} mumbles as she opens her eyes and tries to fix her hair.\n\n\"Some would call me the mistress of locks,\" says Melissa. \"${astra}, you wouldn't believe what happened last night!\"\n\n\"Oh, yeah,\" ${astra} gets out of bed and covers her mouth with a hand as she yawns.\n\n\"I meditated and the Forgotten Goddess came and spoke to me. The link was not strong enough and I lost her, but she revealed how we can summon her. She said she \ncould help us in our quest for restoring the balance shuttered by the intruder Prelate.\"\n\n\"What do we need to do?\" ${astra} asks.\n\n\"We should just gather in a circle and start singing her song. Well, I guess I will be the one singing since it seems only I know it. But I believe it will work.\"\n\n\"It would be quite interesting to see a summoning spell directed by you actually work for once,\" Malice mocks her.\n\n\"Well, feel free to land a hand, dear twin sister,\" Melissa remarks.\n\n\"You don't expect me to welcome the Goddess in my night gown, don't you?\" ${astra} asks. \n\n\"Of course not. Please, change into something more appropriate and be quick about it!\" Melissa orders.\n*page_break\nThe four women gather in the center of the room and raise their hands up in the air as Melissa sings an enchanting song. Something starts to form, a silhouette, \nspirit coming into matter. \n\n\"Move back, please, give her some breathing space,\" Melissa orders and the other females follow her request. \n\nAnd here she is, the Forgotten Goddess with her milk-white skin and long auburn hair, wearing a dark robe encrusted with gold and jewels that sparkle like the \nstars in a cloudless night sky. She looks around and goes to the wall, making sure she has turned her back on nobody.\n\n\"It is an honor for me to be with you, dear ones. I greet you as sisters, as ones who stand tall among the challenges this world presents to you. Know that I am \nalways with you and watch you with a heart burdened by your pain. I was waiting for an opportunity to lend you a hand, but I had to be invited to intervene in the \nworld you inhabit in the proper way. This is what Melissa did, which the help of you. I understand that you want me to help you deal with the Stygian Prelate.\"\n\nMelissa steps up. \"Yes, Goddess, this world was turned upside down ever since she arrived. Now, she is omnipotent and growing more powerful as more and more people refer to her as the \nruler and creator of all. I am scared.\"\n\nThe Forgotten Goddess squints her eyes. \"What you say about her powers is true, but why are you so scared of her? Is she not a good ruler?\"\n\nMelissa struggles to reply, which gives ${astra} the opportunity to do so. What should she say?\n*choice \n\t#\"I have seen her true colors.\"\n\t\tThe Goddess looks at ${astra} with her hazel eyes and sees much more than a human or demon could.\n\t\t\n\t\t\"It seems that the curse of oblivion does not affect you the way it does with most others. And, you are right, your memories reveal a very dangerous \n\t\tentity who can be expected to enslave the people within her reach. You convinced me.\"\n\t\t*goto after_fork3 \n\t\n\t#\"Her rule is not legitimate\" \n\t\t\"What you say is correct, but it is still not enough to convince me. The fact that she is an off-world entity does not mean that she is not here to add something \n\t\tgood to this realm. I believe the latter is true for you, dear ${astra} of the League of Light.\"\n\t\t\n\t\t\"Is it not true that one should listen to their heart for guidance. What is it that yours say?\" Malice asks the Goddess.\n\t\t\n\t\tThe Forgotten one sighs. \"It tells me that Prelate Chiera is a bane of this world that should be removed as soon as possible. Okay, I am convinced now.\"\n\t\t*goto after_fork3\n\t\t\n\t#\"She told me that I was chosen to kill her by the will of the consciousness of this land.\"\n\t\tThe Goddess looks at ${astra} with her piercing eyes. \"The Prelate did not lie to you. Indeed, her actions earned her a very powerful enemy. Whether \n\t\ther judgment is correct or not is another question and I still have my doubts. I must say, however, that if there is any entity that can be trusted to know what is best \n\t\tfor this realm. Besides, I really need to feel in harmony with it again. Okay, I am convinced now.\"\n\t\t*goto after_fork3\n\t\t\n*label after_fork3\n*page_break\n\"How can you help us, dear Goddess?\" Melissa asks as her eyes flash.\n\nThe Forgotten one sighs. \"I wish it was that easy, but right now my powers are very limited because of the events that took place in another realm. I am afraid that I should \nrely on your help there so that I will be able to help you with Chiera.\"\n\n\"I have the feeling that might be our biggest chance to succeed,\" says Melissa. \"I have spent countless sleepless nights trying to figure out a way to defeat the enemy, but all my \nthoughts felt void, only feeding the desperation growing inside. What is it that we need to do, my Goddess?\"\n\n\"The actions I took in that realm were against a force I believed was trying to enslave the hearts and souls of all believers. The force went on to become a major cult and \nwould call itself Light. As more and more people aligned their energy with it, I was cut off from the Source that is all that is. Humanity there regards me as an evil being and \na major threat to the order that ensures peace.\" Her voice trembles and she puts her hands on her heart. \"I still feel the pain as I speak about it.\"\n\n\"That force... it reminds me very much of the Prelate,\" ${astra} remarks.\n\nThe Goddess nods. \"It is as you say. You probably have no idea what it feels to be the object of prayers, even if you get to that point by deception.\"\n\n${astra} shakes her head.\n\t\nMelissa changes the subject. \"What is it that we need to do?\"\n\n\"I need to align with the Light again to unlock my powers. There is a way to do that without causing major havoc or putting yourself in a situation \nwith no way out. It is something that may strike you as deceptively simple, and yet it will provide a challenge.\"\n*page_break\n\"I have picked a time when the Church of Light is governed by a Exarch who was more open minded that any other, with links from his heart leading to some of \nmy people. He is a man of great wisdom. All you need to do is to convince him to allow my daughters to join the Church of Light. That would be enough to consider the \ntask complete.\"\n\n\"This is where I can use my persuasion abilities,\" Melissa remarks.\n\n\"I know that the role you have been playing required you to become a skillful diplomat, but one of the challenges will be to get to him. He usually \nstays at the Monastery Palace. Needless to say that this is not a friendly place for any of my children. Prayers put in place defensive mechanisms that would not \nallow me to take a peak, let alone go there and speak with the Exarch myself. Also, Melissa, I can only provide passage to two of you. ${astra} seems to be \nthe one trusted to lead to the defeat of Chiera. I also think she should choose one of you to accompany you. I hope you don't take offense, Melissa.\"\n\nEven if she does, she hides it well. \"It is not my job to judge you, Goddess, just worship you and take your blessings.\"\t\n\n\"I appreciate your kind words, dear one,\" The Goddess replies.\n\nThere are quite a few questions that ${astra} can think about.\n*goto afterfork4\n\n*label afterfork4\n*choice\n\t*hide_reuse #\"What can you tell me about the priests of the Light?\"\n\t\t\"They are what you could expect from any kind of supposedly benevolent priests. They heal and use their charms to get the recognition of others. Some of \n\t\tthem are skilled at using weapons and bringing destruction, but that is okay, since they are holy. Unfortunately, their prayers are very good at dealing damage to \n\t\tdemons. It won't be easy for any child of mine who comes across their path,\" the Goddess explains.\n\t\t*goto afterfork4\n\t\t\n\t*hide_reuse #\"Is there any other group of spiritual people, apart from the priests, that we should consider?\" \n\t\t\"Hm, there is one, and its members are viewed with distrust by the prists of Light. Those are the witches. The energies they work with are various, they \n\t\ttend to combine the forces of nature, talking and turning into animals, Darkness and Light. Some of them even turn to me specifically and this is the main reason \n\t\tI am still able to give access to that world to you and a partner of your choice. The reason I didn't tell you more about them before you asked is that I didn't expect you to \n\t\teither confront or be able to obtain the help of any of them. And yet, you never know. Maybe your intuition just gave you a useful hint.\" The Goddess winks at ${astra}.\n\t\t*goto afterfork4\n\t\t\n\t*hide_reuse #\"I would like more information on the Exarch.\"\n\t\t\"He is a very enigmatic figure. Many say that he is not the typical zealot that usually succeeds to the title. I see him as a tool of helping those who use \n\t\tthe power of the Light to become closer to Source. There are certain rumors about his wife that I could tell you about, but my guts tell me that you will be able to \n\t\tfind out more about her during your exploits of the monastery. It would be wrong for me to influence you by presenting you my version of things because it will be you \n\t\twho will face the Exarch and hopefully find the best way to present my quest to him,\" the Goddess explains.\n\t\t*goto afterfork4\n\t\n\t*hide_reuse #\"Can you tell me more about the Monastery Palace?\"\n\t\t\"It is a huge castle, as you will soon find out for yourself. The priests have turned it into a bastion of the Light and you will most likely be able to see their influence \n\t\tevery step you take there. There is probably a dungeon below the two levels that can be seen on the ground, as well as two towers overlooking it. The location of the Exarch is unknown. I \n\t\tam sorry, dear ladies, that is all I can tell you... Oh, there are also rumors that it was built on a cursed land in order to stop its influence, but I don't know what to make of it. If it has \n\t\tdemonic influence, it has nothing to do with me.\" The Goddess smiles.\n\t\t*goto afterfork4\n\t\t\n\t#\"Why was I chosen, again?\"\n\t\tThe Goddess takes a moment to consider her answer. \"Maybe the roots lie in the fact that you have the heart with the greatest power to bring about the change \n\t\tthat is needed to make this world a better place, and this is why you are looked at with hope.\"\n\t\t\n\t\t\"That doesn't make much sense to me, Goddess. I am a mere mortal...\" ${astra} refuses to believe.\n\t\t\n\t\t\"Your soul is indeed attached to a body that is not eternal. That doesn't change the fact that the real you, your soul, is eternal. Just like any other soul. And \n\t\tit is the memories of who you were in other lives and adventures where you can find the reasoning for why you are considered special. Deep inside you, you recall, but the \n\t\ttwisted rules of this realm don't allow you to remember the glory of the deeds that you accomplished.\"\n\t\t\n\t\t\"Can you tell me more about it, please,\" ${astra} begs her.\n\t\t\n\t\t\"I wish I could, but that is beyond my level of interaction given me by the consciousness of the realm. But I have the feeling that in your exploration of the \n\t\tmonastery you might find a few triggers, and maybe when you succeed, I will be able to pass some more information to you.\"\n\t\t\n\t\t${astra} nods.\n\t\t*goto afterfork4\n\t\t\n\t*hide_reuse #\"Whom should I pick as a partner?\"\n\t\t\"I bet this is one of the most difficult questions that entertains your mind. I might have the knowledges of knowing the ladies near you better, so I \n\t\twill brief you on their finest characteristics,\" the Goddess continues, watching the respective woman in the eye as she mentions their name. \"Melissa is the \n\t\tdemonic Keeper of Balance of this realm. She can alone speak on its behalf. Her iron will is the instrument that brought me here.\n\t\t\n\t\t\"The compassion of Malice and her veiled abilities will probably make her a powerful healer on the other side, if she finds the way to be taught. The same fire she has in her heart \n\t\talso would be easy for the priests there to recognize as something they have.\n\t\t\n\t\t\"Deathrose can be quite enchanting if she decides to be. For all other occasions, she is the agile finesse warrior who could give any fighter the battle of their lives. She also \n\t\thas a set of skills that makes fun of locks, doors or even walls.\"\n\t\t*choice \n\t\t\t#\"Thank you for the explanation.\"\n\t\t\t\t*goto afterfork4\n\t\t\t\t\n\t\t\t*selectable_if (twilight_priestess_available) #\"What if I choose the Priestess of the Twilight I met in a dream?\"\n\t\t\t\tBefore the Goddess could answer, the door opens and the priestess enters the room. \"I thought you had forgotten me, ${astra}. It is nice to know you \n\t\t\t\tremember our encounter. My name is Sister Cabala of the Order of Twilight and I would be happy to assist you in your mission.\"\n\t\t\t\t\n\t\t\t\t\"Were you spying on us?\" Melissa asks with hints of aggression in her voice, most likely prompted by the negative aura of the human.\n\t\t\t\t\n\t\t\t\t\"Yes. My curiosity was sparkled by the unusual energetic presence in this room and I was able to keep in touch with the briefing the Goddess is providing. I am \n\t\t\t\talso impressed to be in the presence of a being of your rank,\" Cabala bows.\n\t\t\t\t\n\t\t\t\t\"Thank you for the respect you show me,\" the Goddess replies. \"Yet, I am not sure what to do with it. I don't like it when people put those more ancient than them on a pedestal. Anyway,\n\t\t\t\tyou say that you would like to accompany her in her quest in the Monastery of Light.\"\n\t\t\t\t\n\t\t\t\tThe priestess nods. \"Yes. I am disturbed by the Prelate as much as you do and would love to see her gone. Just like Melissa, I don't feel I can do my work as good as before.\"\n\t\t\t\t\n\t\t\t\t\"Shut up, worshipper of evil. It is the darkness of you and your kind I need to watch for all the time,\" Melissa shouts.\n\t\t\t\t\n\t\t\t\tCabala chuckles. \"And yet now I might be the one who will bring fruition to your mission. How ironic.\"\n\t\t\t\t\n\t\t\t\t\"Sister Cabala might be right,\" says the goddess. \"Apart from ${astra}, she is the only one in the room not of demon blood. That would give her some immunity to their exorcism spells. She \n\t\t\t\talso knows much more about the way priests derive their powers. I wouldn't be surprised if she makes a small breakthrough there. I think her being beyond good and evil will help in that, not to \n\t\t\t\tmention her prowess in magic. Besides, I think she may be able to make you a very nice present eventually.\"\n\t\t\t\t\n\t\t\t\t\"What?\" Melissa replies.\n\t\t\t\t\n\t\t\t\t\"I have read much about that realm and the priests there. I have the feeling I may decide to stay there and rid this place of my presence.\"\n\t\t\t\t\n\t\t\t\t\"That would be quite impressive,\" Melissa says.\n\t\t\t\t*goto afterfork4\n\t\t\n\t\t\n\t*hide_reuse #\"How will you help us if we succeed?\"\n\t\tThe Goddess coughs. \"I guess I never covered that point, for which I apologize. You see, beings of power like mine have agreed on limited interventions \n\t\tin the worlds we are revered. I really don't want to dump it all down on you, dear ${astra} of the League of Light. Once my powers are unlocked I will give you my blessing and bestow you abilities that \n\t\teven the Prelate lacks. You are the one who will have to face her in the end, and it will be your decisions who will shape the future of this realm!\"\n\t\t\n\t\t${astra} suddenly starts to feel very hot.\n\t\t*goto afterfork4\n\t\t\n\t*hide_reuse #\"Can you tell me more about where I come from?\"\n\t\tThe Goddess smiles. \"It is a place of love and understanding. Out there, you are never denied the love you give. In fact, those guys don't believe in the duality of good and evil. They see love \n\t\tas all there is. Does that make any sense to you, ${astra}?\"\n\t\t\n\t\t\"I am not sure about that,\" she replies.\n\t\t\n\t\t\"That is okay, dear one. You are stuck in a place of non-remembering, but deep inside, you know.\"\n\t\t\n\t\t${astra} sighs. \"I am not very sure I even know why I am here.\"\n\t\t\n\t\t\"I see it as a quest for your soul to have experiences and participate in adventures. It is also an answer to the internal call of your soul to extend your \n\t\tbenevolence to others. You truly are an amazing being, ${astra}, and a great example of others who may need a guide to help them connect to their divinity.\"\n\t\t\n\t\t\"You are too kind, dear Goddess.\" ${astra} blushes.\n\t\t*goto afterfork4\n\t\n\n\t#\"I am ready to make my partner choice and start the mission.\"\n\t\t\"That is very nice. Who would it be?\"\n\t\t*choice \n\t\t\t#Melissa\n\t\t\t\t*set partner \"Melissa\"\n\t\t\t\t*goto afterfork5\n\t\t\t\n\t\t\t#Malice\n\t\t\t\t*set partner \"Malice\"\n\t\t\t\t*goto afterfork5\t\n\t\t\t\n\t\t\t#Deathrose\n\t\t\t\t*set partner \"Deathrose\"\n\t\t\t\t*goto afterfork5\n\n\t\t\t*selectable_if (twilight_priestess_available) #Sister Cabala\n\t\t\t\t*set partner \"Cabala\"\n\t\t\t\t*goto afterfork5\t\t\n*label afterfork5\n*goto_scene lighttemple \t\t\t\t", "haunted": "*set not_visited_haunted false\n${astra} gets some memories pertaining to her past that she did not experience directly because she jumped into the shoes of the woman everybody believe her to be much later. But nevertheless, they seem very real to her.\n\nThe old building always amazed her. A decade ago, it was still working and she would often go there looking for her mother. No, she didn't like drinking, hating the destructive effect it had on beautiful souls. It was the company of fellow villagers she was after. It saddens ${astra} that a place so full of life would be deserted and left to slowly become a pile of rubble.\n\nA cough coming from inside suggests that the old inn might not in fact be as deserted as it seems. The door opens with a horrifying sound and a tall woman with a big scar on her face gestures ${astra} to come in.\n\n\"Quickly, the cultists are coming! You are going to spoil my ambush!\"\n\nA dozen of questions comes to ${astra}'s mind but there is hardly any time. A noisy group of people in dark clothes and hoods appears at the end of the street. You notice that they are carrying a big pack, just the size of a human being. It keeps wriggling, giving the kidnappers a hard time and a chance for ${astra} to remain unnoticed for a few more seconds.\n\nShe looks at the woman. Her eyes are full of anger. Would ${astra} do as the scarred woman wants?\n*choice\n\t#Get in\n\t\tShe decides to act now and ask questions later, not willing to face the band of cultists in the street.\n\t\t*goto hauntedtwo\n\t\n\t#Try to hide anywhere else\n\t\tShe looks around for a good hiding spot outside the house as she really doesn't want to enter with the fierce looking woman.\n\t\t\n\t\t\"I said, quickly!\" \n\t\t\n\t\tA whip entangles ${astra}'s throat and she is pulled inside. She feels her feet as soft as never before. Could she be under the effect of magic?\n\t\t*set energy -1\n\t\t(Energy-)\n\t\t\n\t\tOnce inside, the scarred woman removes the whip.\n\t\t\n\t\t\"I apologize, stranger. Believe me, they would have caused you more pain if you stayed there.\"\n\t\t\n\t\tShe seems sincere.\n\t\t*goto hauntedtwo\n\n*label hauntedtwo\n*page_break\nThe woman leads ${astra} up the dust-covered stairs and you hide behind a cupboard.\n\n\"My name is Melissa and those cultist maggots are carrying my twin sister down the basement to sacrifice her. I won't let that happen,\" she whispers. \"You almost spoiled all of the plan by just being here. Are you going to help me or not?\"\n\nShe is giving ${astra} too much information in too little time. The word twin also confuses her. She has only heard it in the context of people with two heads or three legs or any other malformations.\n\nWould you like ${astra} to ask her a question or just answer hers?\n*choice\n\t#Ask her how she knows all of that\n\t\t\"I don't have much time for explanations. Let's just say I spent a decade in the company of the cultists. So, what did you decide?\"\n\t\t\n\t\tMaybe she is one of the cult members, ${astra} guesses. She begins to wonder at what age she joined. She must have been about ten.\"\n\t\t*goto answer\n\t\n\t#Ask her why she believes she can single handedly defeat them\n\t\tMelissa smiles.\n\t\t\n\t\t\"You have no idea about the powers I possess. What they are trying to enslave, I have it burning in my veins.\" Her smile freezes, probably realizing that she told you too much.\n\t\t*goto answer\t\n\t\n\t#Ask her for a better explanation of the word twin\n\t\t\"No, both me and my sister are perfectly normal, she explains. \"I don't know which layer of hell you come from to ask me such a stupid question.\" \n\t\t*goto answer\t\n\n\t#Agree to join the battle\n\t\t*goto agree\n\t\n\t#Tell her that you will stay away\n\t\t*goto disagree\n\n*label answer\n*page_break\nWhat would ${astra} answer? Will she help her?\n*choice\n\t#Yes\n\t\t*goto agree\n\n\t#No\n\t\t*goto disagree\n\n*label disagree\n*page_break\n\"So be it. Then, get out of my sight.\"\n\nA gust of wind makes a mess of her hair. Suddenly, she feels as light as a feather and the wind carries her along down the corridor. Unable to do anything, ${astra} just stares in horror as she flies\nthrough an open window. Once outside, she regains her weight and falls down from the second floor. She is lucky to fall on an area covered by thick bushes but she sprinkles her foot.\nnevertheless.\n*set energy -1\n(Energy-)\n\nAs soon as she recovers from the shock, she leaves.\n*goto endhaunted\n\n*label agree\n*page_break\n\"Very well. When I attack, just try to pick one or two of the cultist.\" ${astra} nods still not very sure how she is going to deal with the rest.\n\nThe cultists enter, still struggling with the girl wrapped in sheets. She managed to get her head out. The resemblance to the woman next to ${astra} is striking.\n\nShe counts five cultists.\n\nMelissa jumps down. ${astra} could swear the scarred woman ceases her fall for a second to blast a couple of fire balls at two of the hooded bandits, charring them beyond recognition. The smell of burnt flesh makes you sorry you have alimentary senses.\n\nIs it the time to strike?\n*choice\n\t#Yes\n\t\tThe cultists are below ${astra}, which gives her the perfect opportunity to either shoot at them with her bow or throw a dagger. Which do you prefer?\n\t\t*choice\n\t\t\t#Use the bow\n\t\t\t\t${astra} quickly takes an arrow from the quiver and loads the bow, aiming to shoot a cultist at the back.\n\t\t\t\t*if marksmanship>1\n\t\t\t\t\tThe arrow lands in his back, allowing him to scream for the last time before dying.\n\t\t\t\t\t*goto hauntedthree\n\t\t\t\t\n\t\t\t\t*else\n\t\t\t\t\t${astra} misses by a mere span. The arrow meets the wooden floor!\n\t\t\t\t\t*goto someone\n\t\t\t\n\t\t\t#Use the dagger\n\t\t\t\t${astra} quickly takes out one of the daggers and aim at the back of a cultist.\n\t\t\t\t*set nooffhand true\n\t\t\t\t*if marksmanship>1\n\t\t\t\t\tThe arrow lands in his back, allowing him to scream for the last time before dying.\n\t\t\t\t\t*goto hauntedthree\n\n\t\t\t\t*else\n\t\t\t\t\t${astra} misses by a mere span. The arrow meets the wooden floor!\n\t\t\t\t\t*goto someone\n\t#No\n\t\t*goto someone\n\n*label someone\n\"There is someone out there!\" One of the cultists shouts and quickly ascends the stairs. ${astra} has virtually no time to react as he moves unnaturally quickly.\n\n*if nooffhand\n\tShe meets him with your remaining dagger in hand, regretting not having the other on her.\n\t*if physique>2\n\t\tHis movements are indeed very quick but ${astra} is a seasoned fighter who uses not only her body but also her spirit in the fight. A few seconds after the fight begins, she manages to mortally wound him.\t\n\t\t*goto hauntedthree\n\t*else\n\t\t*set energy -1\n\t\tHis movements are indeed very quick. ${astra} tries to use her warrior instinct in the fight but all she can see is blurred. A few seconds after the fight begins, she manages to mortally wound him. However, it is not before receiving a painful stab in her forearm.\t\n\t\t\n\t\t(Energy-)\n\t\t*goto hauntedthree\n*else\n\tShe meets him with her twin daggers in hand.  \n\t*if physique>1\n\t\tHis movements are indeed very quick but ${astra} is a seasoned fighter who uses not only her body but also her spirit in the fight. A few seconds after the fight begins, she manages to mortally wound him.\n\t\t*goto hauntedthree\n\t*else\n\t\t*set energy -1\n\t\tHis movements are indeed very quick. ${astra} tries to use her warrior instinct in the fight but all she can see is blurred. A few seconds after the fight begins, she manages to mortally wound him. However, it is not before receiving a painful stab in her forearm.\t\n\t\t\n\t\t(Energy-)\n\t\t*goto hauntedthree\n\n*label hauntedthree\n*page_break\nMeanwhile, Melissa has taken care of all the remaining cultists but one, probably their leader.\n\n\"Melissa, there has been some misunderstanding. I can explain...\" he mutters.\n\n\"There is no need to explain. Sacrificing demons has explicitly been forbidden in the black book. You tried to do this with me. When I escaped, you captured my sister. You know what, those friends of yours deserve\na far worse fate.\"\n\nIf looks could kill, the man would have already been torn to pieces and buried. Actually, you are pretty sure Melissa could do that.\n\"You need me, your infernal majesty!\" the main exclaims.\n\n\"Do I?\" Melissa raises her eyebrow.\n\n\"Yes, you know that only a human may set your friends in the basement free.\" He smiles wickedly.\n\n\"Oh, dear, Timothy,\" Melissa says with irony. \"What race do you think she belongs to?\" She points at ${astra} and the cultist gets as wight as a ghost.\n\nMeanwhile, Melissa's twin gets out of the improvised bag.\n\n\"These holy-thread stitched cloths should be forbidden really.Glad to see you, sister.\"\n\n\"Oh, you see me in the mirror all the time. ${astra}, this is my twin sister Malice. Malice - ${astra}.\"\n\n\"Nice to meet you,\" ${astra} says, still standing on top of the staircase. She actually has no memory of telling Melissa her name. But what she sees next amazes her even more. A grim reaper enters the house.\n\n\"Oh, no!\" Malice puts her hands on her face. \"Timothy, can't you just die like most men do?\"\n\n\"I am far beyond mortal men,\" the cultist chuckles. \"When I started walking the dark path, I made a pack with death to come for me when I ask it.\"\n\n\"I appreciate that,\" says Melissa.\n\nSo, the legendary grim reaper... is not just a legend. This one looks dreadfully amazing. A flaming skull shows long teeth under a jet black cloak. In one hand, the creature has a \nhourglass, in the other - a scythe. It looks menacing.\n\n\"Not yet, but soon,\" it says, then swipes at Timothy, beheading him. Then, as if nothing happened, the Grim Reaper leaves the abandoned inn.\n\n\"See you later, bony boy,\" shouts Malice without being able to attract the attention of the creature.\n\n\"Oh, my dear sister. I thought you got over that crush,\" says Melissa. Malice says nothing but her cheeks turn crimson. It seems that her sister hit a soft point.\n\n\"Hey, you,\" Melissa shouts at ${astra}. \"Are you going to just stay there all day?\"\n\n\"I'm coming\". She is trying to give her a reassuring smile but her cheeks tremble. As ${astra} starts walking down, her knees feel so soft that she is desperate to stick to the railings. She actually seems to be using her hands more than her feet.\n\n\"Are we already going down, sister?\" asks Malice.\n\n\"Of course. Be our guest, ${astra}. But before that, you may search the body of Timothy for anything valuable.\"\n\nWould she do so?\n*choice\n\t#Yes\n\t\tThe whole prospect doesn't seem enjoyable at all but at least it is productive as ${astra} finds a bracelet that sparkles with magic.\n\t\t*set magic +1\n\t\t\n\t\t(Magic+)\n\t\t*goto down\n\t#No\n\t\tThe prospect doesn't seem very attractive and ${astra} decides to spare it to herself after all the gore she just saw. Too bad it seems more may be coming.\n\t\t*goto down\n\n*label down\n*page_break\nFollowing Malice and Melissa down the cellar, ${astra} listens to their instructions.\n\n\"You will need to provide us with a glass of your blood,\" says Malice.\n\n\"No need sister. This one, unlike those dirty cultists, is quite nice. We will use the phial of rat blood instead,\" replies Melissa. \"You look like a brave woman. Some of the demons inside may appear a bit scary but they are pentagramed.\"\n\n*page_break\nThe cellar smells of wine, mould... and sulphur. Among the kegs there are three fabulous creatures.\n\n\"The fierce looking is a warbringer. For some reason, he is obsessed with fighting and bloodshed. If you free him, he may fight back. However, he is honourable and if you manage to defeat him, he will reward you,\" explains Malice.\n\n\"Wait, why would I want to set him free? I don't understand!\"\n\n\"Sister, you are always too quick,\" Melissa scolds her. \"Excuse her. I would like to ask you to free at least one of our siblings. I believe that if you agree, we will also be able to repay you somehow. I can sense something demonic on your neck.\"\n\n\"Can you really help me get rid of it?\" ${astra} removes her scarf so that the sisters could see it.\n\nMelissa gets closer to her, touches it and makes a sad face.\n\n\"I am afraid not. As you can guess, despite our demonic origin, we are not very good at the dark arts. It is you, humans, that discovered the lore about us and try to use us for your purposes. However, I can sense that the choker feeds on magic. We ourselves don't have infused trinkets because the greedy cultists took them from us, but our brethren do.\"\n\n\"I guess it would be dangerous to set them free?\"\n\n\"It may be. I would understand if you turn your back on us.\" A tear rolls down her cheek. Humans have proved to have no compassion for demons.\"\n\n\"I won't understand!\" Malice crosses her hands, the look in her eyes matching her name.\n\nWill ${astra} help the demon sisters?\n*choice\n\t#No\n\t\t\"Coward!\" Malice shouts and slaps ${astra} in the face, her long nails leaving ugly marks on her cheeks. Her sister grabs her hands to stop her from hurting ${astra} even more.\n\t\t*set energy -1\n\t\t(Energy-)\n\t\t\n\t\t\"You'd better leave. I don't think I can handle the situation much longer!\" says Melissa, struggling to keep the screaming Malice from attempting to tear you to pieces.\n\t\tWill ${astra} listen to her?\n\t\t*choice\n\t\t\t#Yes\n\t\t\t\t${astra} wastes no time but leave the abandoned inn. \n\t\t\t\t*goto endhaunted\n\t\t\t#No\n\t\t\t\t\"I don't need to run!\"\n\t\t\t\t\n\t\t\t\t\"I warned you,\" says Melissa and lets go of her sister who leaps at you like a deadly wounded tigress. ${astra} is sure she has never faced such a ferocious enemy.\n\t\t\t\t\n\t\t\t\t*if physique>2\n\t\t\t\t\n\t\t\t\t\t${astra} keep dodging Malice's blows, waiting for an opportunity to jab her with the daggers. But, this never happens. Her attacks are so quick and perfectly executed that it is a miracle that she doesn't claw ${astra} to death during the\n\t\t\t\t\tfirst seconds of the fight. Well, she manages to scratch her here and there, but that is all.\n\t\t\t\t\t*set energy -1\n\t\t\t\t\t(Energy-)\n\n\t\t\t\t\tKnowing that she has no chance of defeating Malice, she knocks her off balance and run out, hoping that she would not follow her. She really does not.\n\t\t\t\t\t*goto endhaunted \n\t\t\t\n\t\t\t\t*else\n\t\t\t\t\t${astra} tries to keep Malice at a distance and avoid the fury of blows, however, she is so fast and precise in her movements that ${astra} takes a few serious wounds from the razor sharp nails.\n\t\t\t\t\t*set energy -2\n\t\t\t\t\t\n\t\t\t\t\t(Energy--)\n\n\t\t\t\t\tKnowing that she has no chance of defeating Malice, she knocks her off balance and run out, hoping that she would not follow her. She really does not.\n\t\t\t\t\t*goto endhaunted \n\t\t\t \n\t#Yes\n\t\t\"Let's see what I can do.\" ${astra}'s words bring the smile back to Melissa's face.\n\t\t\n\t\t\"Nice. All you need to do is pour the rat blood on the five corners of the pentagram to set the demon free. This is the easy part.\" She explains.\n\t\t\n\t\t\"And what is the hard part?\" ${astra} asks.\n\t\t\n\t\t\"As Malice said about Brutus, the warbringer demon, whomever you set free is likely to attack you or put your skills to a test one way or another. It is a custom among us, it is something like your term honour, however, many times stronger.\"\n\t\t\n\t\t\"Wait, a minute!\" You struggle to understand. \"Your honour requires you to attack the one who sets you free?\"\n\t\t\n\t\tMelissa nods.\n\t\t\n\t\t\"I know it is hard for a human to understand and I don't think we should discuss it right now. Just think of all the magic items each of them has. Let's go to the demons. Who shall be the first to be introduced to you?\"\n\t\t\n\t\t${astra} looks at them. Beside the savage one, there is an attractive lady in black leather and a gray-feathered angel. Who should she approach?\n\t\t*choice\n\t\t\t#The warrior demon\n\t\t\t\t*goto brutus\n\t\t\t\n\t\t\t#The flashy demonic lady \n\t\t\t\t*goto succubus\n\t\n\t\t\t#The angel\n\t\t\t\t*goto angel\n\n*label angel\n\"You only spoke about demons,\" ${astra} tells Melissa.\n\n\"Azurus was born as an angel but wanted to become one of us so he went through a complex transformation ritual. Now, he is considered our brother...\"\n\n\"... by some of us.\" Malice interrupts her. \"I simply can't forget all of my friends who were destroyed by the likes of him.\n\n\"I have nothing to do with it. As soon as I had the opportunity, I joined you. And, I was about to prove mu allegiance when those cultists summoned me inside.\"\n\n\"Oh, really, and what about spying at the arcane library?\"\n\n\"I didn't know where I was going.\"\n\n\"Liar!\" Malice shouts.\n\nMelissa whispers.\n\n\"I don't often agree with my sister but she made a good point. Azurus seems to be a good liar. If you set him free, he will give a challenge involving separating truth from lies. Provided that you succeed, he may teach you a few ways to protect yourself from the cursed collar.\n\nWhat should ${astra} do?\n*choice\n\t#set the angel free\n\t\t*goto setangelfree\n\t\n\t#Approach the warrior\n\t\t*goto brutus\n\t\n\t#Approach the female\n\t\t*goto succubus\n\n*label setangelfree\nMelissa gives ${astra} the vial. She opens it and almost throws up as the smell that comes out is truly repulsive.\n\n\"I am sorry about that,\" Melissa apologizes. I am pretty sure, however, that you would prefer this method to the other.\n\n${astra} nods, remembering her words that the other option is using her own blood.\n\nCarefully, she pours a little on each of the five corners of the pentagram.\n\n\"I should thank you,\" says Azurus walking out. \"Now, it is time for my challenge. You, humans, say that information is the most precious good. What do you want me to tell you based my experience in the world of demons and angels?\"\n\n${astra} points at her necklace.\n\n\"This trinket, how do I get rid of it?\"\n\nThe gray angel comes to her and examines it patiently. She starts getting impatient because she guesses he may tell her something she doesn't want to hear.\n\n\"This must be the legendary Souldrinker. It is like a parasite seed, absorbing energy, waiting to pop so that whatever is inside comes out.\"\n\n\"A fortuneteller told me something similar. How do I get rid of it?\" she asks.\n\n\"I don't know. But, if you pass my challenge, I will give you a blessing that will decrease the harm every time the choker gets to feed on you.\"\n\n${astra} nods.\n\n\"So be it. The runes on it are in demonic. The demons created it and imprisoned a holy angel inside.\" The angel gives you a wicked smile. \"Which one of the three\nstatements is true?\n\n\"Can I have a mirror, please? I want to examine the runes on the choker,\" ${astra} asks Melissa. She nods, produces one out of thin air and gives it to her.\n\n\"How do you do that? ${astra} enquires.\n\n\"I taught her,\" says the imprisoned demoness. \"We succubi need to know we look good every time.\"\n\n*if will>2\n\tThe runes Azurus talked about  are hard to notice and ${astra} needs to really strain her eyes to be able to see them well enough. ${astra}'s knowledge of demonic is limited, however,\n\tyou can be certain that the text is indeed in demonic, which is the answer of the challenge. It also means that the one who created is not a demon, which is in line with what Melissa said about demons not being very good at the arts named after their kind. \n\tWhat is really disturbing, however, is the thought that the third statement must also be wrong and therefore, inside the choker there is no angel.\n\t*goto demonic\n\t\n*else\n\tThe runes Azurus talked about are hard to notice and ${astra} needs to really strain her eyes to be able to see them well enough. Unfortunately, her knowledge of demonic is limited. While some of the symbols seem vaguely familiar, there\n\tis no way to tell for sure. What is the true statement?\n\t*choice\n\t\t#The runes are in demonic\n\t\t\t*goto demonic\n\t\t\n\t\t#Demons created it\n\t\t\tYou can hear Melissa's growl as you say that. For a second, ${astra} wonders why, then she recalls what she told you, that demonology is a lore created by humans in their pursuit for demonic power.\n\t\t\t*goto wrong\n\t\t\n\t\t#There is an angel inside\n\t\t\tAzurus gives a broad smile.\n\t\t\t\n\t\t\t\"You humans amaze me with your desire to believe in the brightness of the future. Angels say it is because you wear a big piece of the Light in your souls. I personally believe that it is more\n\t\t\tof a display of stupidity.\"\n\t\t\t*goto wrong\n\n*label wrong\n\"I am sorry, ${astra}, you failed the test. People call me Azurus the liar, so don't be disappointed by what happened. Now, you'd better leave at once.\n\n\"Why?\"\n\n\"Technically, this is the part when I should attempt to take your soul, but there can be an exception if you manage to escape. Of course, I won't hinder your exit in any way, just make sure you get lost... And thank you for setting me free.\nI am really sorry that you didn't succeed.\"\n\n${astra} shrugs, waves goodbye to the demon sisters and leaves the abandoned inn.\n*goto endhaunted\n\n*label demonic\n\"You are right, ${astra}!\" Azurus cheers. \"I am actually very happy that you managed to tell me the right answer because I can now give you the reward I think you deserve for setting me free. This one is for you.\" \n\nHe removes a pendant from his neck and gives it to her.\n\n\"I am sorry that I can not give you the solution to the problem, but only a mitigation.\"\n\n${astra} bows in gratitude and puts it on her neck, next to the damned choker.\n\n\"Take care, sweetheart!\" Melissa winks as ${astra} leaves the cellar.\n*goto leavecellar\n\n*label leavecellar\n${astra} comes out of the cellar still quite thrilled about the adventure below. Knowing that this abandoned inn was the den of a band of cultists, she wonders if searching the rooms she may find something valuable.\nOf course, she suspects that it may be dangerous. What does she do?\n*choice\n\t#Leave the inn\n\t\t${astra} decides that discretion is the better part of valour and go out.\n\t\t*goto endhaunted\n\t\n\t#Search \n\t\tSince she is not sure what she is looking for, ${astra} relies on her intuition... and it works fine. In an wardrobe, she finds a scarf with a broach on it. And it sparkles with magic!\n\t\t*set magic +1\n\t\t(Magic+)\n\n\t\tHappy with her discovery, she goes out.\n\t\t*goto endhaunted\n\t\t\n*label succubus\n\"I think I will set this one free,\" ${astra} says and steps towards the succubus.\n\n\"I don't know... she can be quite dangerous,\" Melissa warns you.\n\n\"More dangerous than the warrior?\" ${astra} asks.\n\n\"Probably just as deadly as him. While he can be defeated with skill, Deathrose's trial will probably be more subtle. Well, the choice is yours. I would be happy to have any\nof my brothers and sisters free.\"\n\nWhat is your choice?\n*choice\n\t#Set the succubus free\n\t\t*goto setsuccubusfree\n\n\t#Approach the angel\n\t\t*goto angel\n\t\n\t#Approach the warrior demon\n\t\t*goto brutus \n\n*label setsuccubusfree\nLiandra  looks at you with eyes full of hope as you pour the rancid liquid on the edges of the pentagram. The succubus smells of wild flowers.\n\nShe is dressed in a skintight leather costume that leaves very little to imagination.\n\n\"Thank you very much, Madam. Melissa already told you about the trial you will have to get through. Do you want me to obtain my male form or should I stay like this?\"\n*choice\n\t#\"Stay like this, please.\"\n\t\t\"That is so nice, I prefer this form. It is so feminine, so passionate. \n\t\t*goto succubustwo \n\t\n\t#\"I like men, if that is what you mean.\"\n\t\t\"Exactly! Well, time to change.\" Dark mist surrounds the demon for a few second and when she is gone, there is a handsome man instead of the beauty. Even the sight of him makes you blush and you wonder what the \n\t\ttrial will be like.\n\t\t*goto succubustwo\n\n*label succubustwo\nNow, would you come closer... or should I make the first step?\n*choice\n\t#Step closer\n\t\t\"I like it when my victims act as if they are strong,\" Liandra  whispers in your ear.\n\t\t\n\t\t\"I am not your victim and I won't be. You should remember that.\"\n\t\t\n\t\t\"I will try. You smell delicious. Give in to me, please.\"\n\t\t\n\t\t\"No!\"\n\t\t\n\t\t\"I understand, you are not on one of those who want to be controlled. This is good when facing a succubus. What do you you feel towards me?\n\t\t*choice\n\t\t\t#Hate\n\t\t\t\t\"I hate you vile creature. You are a parasite that feeds on people. How many people have you caused suffering too. The world would be a better place without you!\"\n\t\t\t\n\t\t\t\t\"Well done, adventurer. I often make people hate me. It is a strong feeling, very demonic and I do love it when I manage to arouse it. Technically, I may push forwards, bending your anger into lust, but I won't do that. You win the challenge.\"\n\t\t\t\t\n\t\t\t\tThe succubus gives ${astra} a kiss on the cheek and she feels the place get a bit hot.\n\t\t\t\t\n\t\t\t\t*set charm +1\n\t\t\t\t(Charm+)\n\t\t\t\t\n\t\t\t\t\"This was an enchanted kiss. I know a little about that monster around your neck and I think it will go for it next time it is hungry. Good luck with it.\"\n\t\t\t\t\n\t\t\t\t${astra} thanks her and the demon twins, bid them farewell and leaves the cellar.\n\t\t\t\t*goto leavecellar\n\n\t\t\t#Love\n\t\t\t\t\"Why should you feel love for me? I am a monster?\" the succubus says confused.\n\t\t\t\t\n\t\t\t\t\"Because you are an intelligent creature that lives and breathes. You are a complex manifestation of the power of the Dark, so you deserve respect and love.\n\t\t\t\t\n\t\t\t\tLiandra  puts a hand up, trying to hide the tears.\n\t\t\t\t\n\t\t\t\t\"We succubi are embodiments of the triumph of lust over love. When we were created, we were not supposed to face victims who love us. Desire - yes, but if you really feel any love, I won't be able to cause you any harm. \n\t\t\t\t\n\t\t\t\tYou won the challenge and now is the time to get your reward. Please, give me your hand.\"\n\t\t\t\t\n\t\t\t\t${astra} does so and Liandra  draws a rune on her palm using a nail. The young woman feel the place pleasantly warm.\n\t\t\t\t*set charm +1\n\t\t\t\t*set will +1\n\t\t\t\t(Charm+, Will+)\n\t\t\t\t\n\t\t\t\t\"This was an enchanted touch. I know a little about that monster around your neck and I think it will go for it next time it is hungry. Moreover, it will provide you some protection.  Good luck with it.\"\n\t\t\t\t\n\t\t\t\t${astra} thanks her and the demon twins, bids them farewell and leaves the cellar.\n\t\t\t\t*goto leavecellar\n\t\t\t\t\n\t#Let the demon lead\n\t\tThe demon hugs ${astra} and she becomes intoxicated by the smell. She isn't very sure what happened to her and a part of her really wishes to remember every moment of it. When she comes to her senses, she feels wasted.\n\t\t\n\t\t\"What happened?\" ${astra} wonders.\n\t\t\n\t\t\"Oh, it was lovely,\" says Liandra . \"Your energies are delicious! I think we should try this some other time when you are fully rested. I don't want to kill you. Now, I think you should move out.\"\n\t\t\n\t\t\"I failed, didn't I?\" she asks, still dizzy.\n\t\t\n\t\t\"Miserably. Well, I must admit you were kind of cute. One piece of advice - succubi are control freaks. We are very good at it. Once we take the lead, there is no coming back.\"\n\t\t\n\t\t\"I will remember that.\"\n\t\t\n\t\t\"Technically, this is the part when I should attempt to take your soul, but there can be an exception if you manage to escape. Of course, I won't hinder your exit in any way, just make sure you get lost... And thank you for setting me free.\"\n\t\tI am really sorry that you didn't succeed.\"\n\t\t\n\t\t${astra} gets up and fight the nausea that threatens to bring her down. She leaves the abandoned inn.\n\t\t*goto endhaunted \n\n\t#Bail out\n\t\t\"I don't think we should do this,\" ${astra} says. Liandra  gives ${astra} a disappointed look and she has to stare at the floor to avoid being petrified by it.\n\t\t\n\t\t\"Then, you fail!\"\n\t\t\n\t\t\"But how come? I don't understand. I resisted the temptation, didn't I?\" ${astra} protests.\n\t\t\n\t\t\"No, dear, the test wasn't even started. I guess you should leave immediately.\"\n\t\t\n\t\t\"Why?\"\n\t\t\"Technically, this is the part when I should attempt to take your soul, but there can be an exception if you manage to escape. Of course, I won't hinder your exit in any way, just make sure you get lost... And thank you for setting me free.\n\t\tI am really sorry that you didn't succeed.\"\n\t\t\n\t\t${astra} shrugs, wave goodbye to the demon sisters and leave the abandoned inn.\n\t\t*goto endhaunted\n\n*label brutus\n\"I think we already said enough about that demon,\" says Melissa. \"Would you be so brave as to set him free?\"\n*choice\n\t#Yes\n\t\t${astra} pours the rat blood on the five corners of the pentagram and Brutus steps out.\n\t\t\"Prepare to face my wrath,\" he roars and charges at her.\n\t\t*if physique>2\n\t\t\t${astra} rolls to the side and Brutus stomps the floor where she stood a breath ago. The speed at which it moves is amazing. He wastes no time and attacks again. This time, ${astra} is better prepared. She jumps on a keg and spring up above the head of the demon and then lands a powerful kick in the back of his head, knocking him out.\n\t\t\t\n\t\t\t\"Well done!\" Melissa cheers. \"Brutus is currently unable to announce it, but you passed the challenge. You can take his earing, I am pretty sure you need it.\"\n\t\t\t\n\t\t\t${astra} is not so sure she wants to come anywhere closer to Brutus but Melissa is right. She will need any trinket if she is to have a chance to deal with the choker. The attachment mechanic gives her a hard time but she manages to remove it from the unconscious demon.\n\t\t\t*set magic +2\n\t\t\t\n\t\t\t(Magic++)\n\t\t\t\n\t\t\t${astra} bids the demon sisters farewell and leaves the cellar.\n\t\t\t*goto leavecellar\n\t\t\n\t\t*else\n\t\t\t${astra} tries to roll sideways but the demon is too quick. He knock her down and a couple of kicks later, she loses consciousness.\n\t\t\t*set energy -2\n\t\t\t\n\t\t\t(Energy--)\n\t\t\t\n\t\t\tA splash of wine makes her open her eyes.\n\t\t\t\n\t\t\t\"You are a brave woman. You failed the challenge, but you still deserve an award for your bravery.\" ${astra} sees Brutus breathing heavily in the corner. Melissa puts a ring on ${astra}'s little finger.\n\t\t\t*set magic +1\n\t\t\t\n\t\t\t(Magic+)\n\t\t\t\n\t\t\t${astra} thanks Melissa and bids farewell to her and her sister.\n\t\t\t*goto leavecellar\n\t\n\t#No - approach the angel\n\t\t*goto angel\n\t\n\t#No - approach the lady demon\n\t\t*goto succubus\t\n\t\t\n*label endhaunted\n*page_break\nWhat should ${astra} do now?\n*choice\n\t*selectable_if (not_visited_cathedral) #Explore the cathedral\n\t\t*goto_scene cathedral \n\t\t\n\t#Go to the market to buy apples\n\t\t*goto_scene astra 432", "lighttemple": "*page_break\nThe hands of the Forgotten Goddess dance in the air as the enchanting song she utters hypnotizes ${astra}. Her surroundings melt into colorful dust, everything but the \nsilhouette of ${partner}.\n\n${astra} starts to feel a bit dizzy as her body seems to be nudged back and forth before being spawn out in another world. The first sensation she has is the much colder air \nthat seems to absorb the heat from her body and transfer it right into the hungry walls. She realized the warm welcome she hoped for was not going to come for now.\n\n${partner} is right beside her, and judging from her shivers, she feels cold too. The ladies make an eye contact for a moment, silently telling each other that they have not been harmed during the journey.\nThen, battle noises fill the air and they decide to investigate.\n*page_break\nAs ${astra} and her friend enter the room nearby, they see an elderly man with long hair and beard swing a staff in the air and hit the chest of an angel. Black feathers \nspread all over the floor, as the heavenly being lands on his back.\n\n\"How dare you come to this sacred place, Lazarus. Your presence is a sacrilege to all that we believe in,\" says the man.\n\nThe angel chuckles and stands up, his wings waving in the air. \"Save your wrath for those who deserve it, Bishop. You speak of the Light as if you know \nanything about it. I am of the same love and the same Source.\"\n\n\"You are a liar, fallen one. You betrayed the Light by following the dark one and even your wings carry the color of taint to reflect that,\" shouts the Bishop \nand raises his staff again. \n\nLazarus flips his wings and the air current throws the Bishop into the wall behind him. \"You wear a white cassock and think it can cover the darkness of your soul. The \nhatred you feel towards those who decided to follow a different way to service Source. I pray you find your peace. But I have a task to do here and I can't allow you \nto stand in my way. The sooner I finish, the sooner I will be gone. I don't like this place.\"\n\n\"I won't let you move even a step further, by the name of the Light!\"\n\n\"Believe it or not, but I carry the Light in my heart, but it may be that mace that you call a staff that could give me some trouble. It is interesting for \nsomebody who considers himself a holder of such virtues to swing such a sadistic weapon, don't you think?\"\n\nThe Bishop looks as if he is about to go berserk on the angel, but then ${partner} sneezes. He looks back at you. \"You brought your servants with you?\"\n\nLazarus shakes his head. \"No, I don't remember ever seeing those beautiful ladies. If you don't see the holiness in them, then you are blind!\"\n\n\"Demons!\" the Bishop shouts and steps towards you, madness in his eyes. He raises his stuff and starts glowing stronger and stronger until the light engulfs \nall.\n*page_break\n*if (partner=\"Cabala\")\n\t\"Cheap illusions,\" says Cabala. \"I am not impressed at all.\"\n\t\n\tAs the flare fades away, you see your partner boldly approaching the Bishop and delivering a couple of kicks to his torso, but he retaliates with speed \n\tyou have never seen before. His staff hits her shoulder and brings her to the ground. \n\t\n\tLazarus claps. \"The Light doesn't service your dark desires. Only your mace has not abandoned you.\"\n\t*goto 2\n\t\n*else \n\t${partner} starts screaming as her skin begins to smolder.\n\t\n\t\"Enough of this!\" The voice of Lazarus roars in the chamber, breaking the Bishop's place. \"When will you stop bringing havoc to those who have \n\tnot committed any sin against benevolence?\"\n\t\n\tThe Bishop laughs maniacally as ${partner} falls to the ground in shock. \n\n\t\"She will be fine, don't worry about her,\" Lazarus tells ${astra}. \n\t*goto 2\n\t\n*label 2 \n*page_break\nThe Bishop comes closer. ${astra} has lit
