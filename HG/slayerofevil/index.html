ger and stab the monster in the belly, making it roar with pain and retreat into the tunnel.\n\n\"Are you alright?\" she asks the guard.\n\n\"Sure thing,\" Roland answers while trying to catch his breath.\n\n\"Are you sure you had to attack it?\"\n\nThe guard looks at her confused. \"It looked like it was going to attack. I hate rats, their bite it terrible and the wounds usually get infected.\"\n\n${astra} sighs. \"You may be right, I wouldn't go as far as doubt your warrior's decisions.\"\n\nRoland nods, wipes the blood off his dagger and takes ${astra}'s hand as they return to the corridor and continue their way to the cage of the shadow beings.\n\n*set wounds true\n*goto 64 \n\n*label 71\n\"I am sorry, my friend. I don't know what you are talking about and I really don't want to be involved in it.\"\n\nSnitz's jaw gapes open, unable to comprehend why the goddess would come and refuse to fulfill the prophecy. ${astra} uses the moment to go back to the corridor and her task of feeding the shadow beings.\n*goto 64\n\n*label 72\n\"It would be an honour, my friend.\"\n\n${astra} enjoys the spark in Snitz's eyes as she takes it. \n\n\"You have brought a lot of peace to me and my folk. For this, I am forever indebted to you, goddess.\"\n\nThe woman laughs as the rodent bows and disappears into the tunnel. She goes back to the corridor and her task of feeding the shadow beings.\n\n*set goddess true\n*goto 64\n\n*label 73\n\"It would be an honour, my friend.\"\n\n${astra} enjoys the spark in Snitz's eyes as she takes it. \n\n\"You have brought a lot of peace to me and my folk. For this, I am forever indebted to you, goddess.\"\n\n\"There is something else I want to add before you go, dear one. It may have been my call that you have been waiting for, but it is you who had been preparing to come back to the surface. When you manage to end the quest of yours, it would be solely because of the powers you found within you and not because of something small a woman you don't know did.\"\n\nSnitz shakes his head. \"There is wisdom in what you say, goddess. I haven't really thought about it because my focus has always been finding you, but I agree that a lot of preparation was done for this day. Thank you.\"\n\nThe woman laughs as the rodent bows and disappears into the tunnel. She goes back to the corridor and her task of feeding the shadow beings.\n\n*set source true\n*goto 64\n\n*label 74\n*page_break\n\"Let me help you, dear ${astra},\" says Roland and before she could react he takes the meal from her hands and bravely approaches the cell as if there is nothing there, then just pushes it between the bars and leaves it there. \n\nThe shadow beings pay no attention to him, but ${astra} feels as if a legion of eyes is staring at her. She knows the entities that are locked before her are very interested in her but she is not sure why.\n\n\"Let's move out,\" the guard suggests and takes her hand.\n\n${astra} realizes she is not really used to getting such an authoritative affection from him, but is very glad that he is going to take her out as soon as possible.\n\nWhen they are out, she gives him a hearty hug and a kiss on the cheek that takes his breath away, then she returns to her room. She is so tired that the veil of dream falls on her weary eyes shortly.\n*goto 76\n\n*label 75\n${astra} takes a deep breath and steps forward, knowing she can do little else if she was to accomplish what she came for. The shadow beings approach the bars too, wanting to be close to her. She pushes the food inside as quickly as she wants to be out on the surface as soon as possible. Suddenly, a tentacle belonging to the more feminine one touches her hand.\n*if slayer\n\t*goto 77\n\n*elseif compassion  \n\t*goto 78\n\n*else\n\t*goto 79\n\n*label 76\n*page_break\n${astra} is sleeping peacefully, dreaming of wondering her beautiful homeworld with its beautiful gardens and picturesque waterfalls when Netho gently touches her shoulder and whispers in her ear. \"Please, awaken, ikalajil. We will walk in the paradise that our people created again, but it is now the time to embrace the warrior within and fight a battle for the lives of those you decided to join on this quest.\"\n\nA kiss on her forehead awakens her, not remembering the dream she just had or the visitor that asked her to open her eyes, so she thought it was the clatter and the screams coming from the yard.\n\nShe quickly runs outside to see the shadow being raging, the masculine one raging, casting bolts of fire at the guards trying to stop him. ${astra} gets to the body of a conflagrated warrior and takes his crossbow while whispering a short prayer for his soul to find its peace on its way to source. She arms it, although she realizes her skills as a warrior would do little to turn the favour of the battle. The bolts she thrusts into his body do not even slow him down as he moves towards his next victim.\n\n${astra} spots Roland coming out of the palace.\n*if romance\n\t*goto 80\n\n*else\n\t*goto 82\n\n*label 77\n*page_break\n\"I can sense that you slayed a brother of ours. I will have to see that his fate is revenged,\" hisses the shadow being.\n\nAsta feels sharp pain in her hand where the tentacle touched her and it quickly transcends throughout her body. It becomes very dark and she loses consciousness.\n*goto_scene death \n\n*label 78\n*page_break\nSuddenly ${astra} feels very strange, as if frozen in time, but she could still move. And speak. \"What is happening?\"\n\nThe feminine shadow being chuckles. \"You are a special woman, ${astra}. Most people here would not be able to sense that there was something wrong. And maybe wrong is not the correct word to use. You are in the out of time, in a small pocket that we share. Everything around us is indeed frozen, including my... almost friend.\"\n\n\"But why?\" ${astra} fails to understand.\n\n\"I wanted to tell you something important that he was not to hear. See, those bars can't hold us much longer. We will soon be out and it will be ugly. There will be many victims.\"\n\n\"Are you trying to threaten me?\"\n\n\"No, it is just the opposite, I want to tell you that when we meet on the battlefield, we will be on the same side, no matter what seems at a first glance. I will betray my partner and ensure your victory.\"\n\n\"What would you want in return?\" ${astra} asks.\n\n\"Nothing. I know that if your people are defeated, I will be the next to be enslaved and killed. This is why I want to make sure that my friend dies in that combat.\"\n\n\"What he plans for you is awful.\" The woman scorns.\n\n\"I would not go as far as judge a culture that has kept our society alive and developing for eons of years. All I need is your awareness of what is to happen and your knowledge that I shall be your friend on the battlefield.\"\n\nWith these words, the bubble of frozen time pops.\n\n*set ally true\n*goto 79\n\n*label 79\n*page_break \n${astra} quickly retraces her steps back to the surface. Feeling very tired, she goes back to her room and immediately seeks the softness of the bed. The veil of dream falls on her weary eyes shortly.\n*goto 76\n\n*label 80\n*page_break\nHis eyes meet hers and start shining with the holy fire of his love for her. He grabs a halberd from the weapon rack next to him and charges at the shadow being. Much to ${astra}'s surprise, he seems intimidated and she knows that it is because of the energy the guard is radiating.\n\nRoland swipes at the shadow being, but it is not the heavy blade that causes most of the damage, but the proximity of a spirit vibrating at the highest frequencies he can. The monster wails in agony and hits him with a tentacle. The guard falls on the ground and drops the weapon, stunned for a second.\n\n*set damage +1\n*if wounds\n\t*goto 82\n\n*else\n\t*goto 81\n\n*label 81\n*page_break\nRoland finds strength within and jumps on his feet, this time attacking the shadow being without arms, making him step back every now and then, unable to keep up with the fury of the guard. Then Roland takes another hit that damages both of his hands, making him realize he can't fight any more and retreat.\n\n*set damage +1\n*if belief\n\t*goto 83\n\n*elseif oneself\n\t*goto 83\n\n*else\n\t*goto 84\n\n*label 82\n*page_break\nUnfortunately, Roland can do little to harm the shadow being. He receives a tentacle hit that damages both of his hands, making him realize he can't fight any more and retreat.\n*if belief\n\t*goto 83\n\n*elseif oneself\n\t*goto 83\n\n*else\n\t*goto 84\n\n\n*label 83\n*page_break\nThe priest comes from the opposite direction, reading one of his books with a concentration that suggests little awareness of what is going on around him. It seems the prayer is working because the shadow being is bathed in a fountain of light that strips layers of darkness off his body.\n\n*set damage +1\n*if oneself\n\t*set damage +1\n\t*goto 85\n\n*else\n\t*goto 85\n\n*label 84\n*page_break\nThe priest comes from the opposite direction, reading one of his books, mumbling something under his notes that seems to have no effect on the shadow being. \n*goto 85\n\n*label 85\n${astra} hears clutter coming from the palace and turns in the direction. The King is there, shouting something at Xavier. She decides to run to them just in case it was something important.\n\n\"I lost the key and I really need to unleash the Guardian. I need the locksmith,\" says the King.\n\n\"That would be impossible, Your Majesty, he is dead.\"\n\nThe King curses.\n\nShould ${astra} volunteer to use her lockpicking skills?\n*choice\n\t#Yes\n\t\t*goto 86\n\n\t#No - return to the battlefield\n\t\t*goto 87\n\n*label 86\n\"I can try to pick up the lock, Your Majesty,\" ${astra} says boldly.\n\nThe King looks down on her but then realizes even the smallest brink of hope can be useful right now.\n\n\"Go to bell tower of the church. Just below the bell there is a closet. Go quickly and waste no more of my time.\"\n\n${astra} nods and runs as fast as she can, realizing that her clothes are not exactly designed for such athletic displays. She doesn't stop until she finds herself in front of the closet. Her hands tremble as she takes up her master key and puts it in the key hole.\n\n*if lockpicking>1\n\t*goto 88\n\n*else\n\t*goto 89 \n\n*label 87\n*page_break\n${astra} tries to be close to Xavier as he gives orders to the other guards, trying to organize them into a meaningful defense. She knows nobody expects her to do anything heroic but she does manage to pull a questioning look full of respect here and there by the seasoned guards.\n\n*if healer\n\t*goto 90\n\n*else\n\t*goto 91\n\n*label 88\nThe master key rotates with the familiar click and the doors open. A little fairy comes out, her butterfly wings spreading sparkling dust in all directions. \n\nShe stretches and yawns. \"I wish you let me sleep a little more, beautiful human. Is my aid required?\"\n\n${astra} nods.\n\n\"I feel a lot of darkness over there. I will use my powers, but don't expect me to stay awake for much longer!\"\n\nThe fairy starts spinning, creating a little whirlwind full of shimmering dust that starts moving in the direction of the shadow being.\n\n${astra} hurries down the stairs, anxious to go back to the battlefield so the misses the moment when the magic of the fairy hits the monster, but she does hear his scream.\n\n*set damage +2\n*goto 87 \n\n*label 89\nNo matter how much she tries, she doesn't manage to unlock the closet. A bit frustrated, she goes down the stairs to rejoin the fight.\n*goto 87\n\n*label 90\n*page_break\nIt seems that Xavier is really inspired by conquering the illness induced by the scratching of the very same shadow being. She is really on fire and manages to bring his enthusiasm to the other guards and together they manage to build a couple of barricades from where they manage to hurt him quite a lot while enjoying the safety.\n\n*set damage +2\n*goto 92\n\n*label 91\n*page_break\nXavier tries to organize the other guards to make barricades to slow the shadow being down and deal damage to it but the efforts go without much success.\n*goto 92\n\n*label 92\n*page_break\n${astra} catches sight of a shadow entering into the castle gates. Her hearts skips a beat in a surge of fear.\n\n*if prison\n\t*goto 93\n\n*elseif slayer\n\t*goto 94\n\n*else\n\t*goto 95\n\n*label 93\n*page_break\nIt turns out it is her imagination, however, her intuition tells her that if she hadn't imprisoned the shadow being she met in the woods, it would be here now as a dangerous ally to the monster causing so much trouble on the battlefield.\n\n*if goddess\n\t*goto 96\n\n*elseif source\n\t*goto 96\n\n*elseif ally\n\t*goto 97\n\n*else\n\t*goto 98\n\n*label 94\n*page_break\nIt turns out it is her imagination, however, her intuition tells her that if she hadn't slaughtered the shadow being she met in the woods, it would be here now as a dangerous ally to the monster causing so much trouble on the battlefield.\n\nInspired by the memory of the enemy she bested single handedly, ${astra} continues the battle with vigorous fury.\n\n*set damage +1\n*if goddess\n\t*goto 96\n\n*elseif source\n\t*goto 96\n\n*elseif ally\n\t*goto 97\n\n*else\n\t*goto 98\n\n\n*label 95\n*page_break\n\nIt is as she thought initially, another shadow being enters the battle and it is not even the feminine one. Luckily, this one seems smaller and less powerful, but it certainly will be a force to be reckoned with.\n\n*if knowledge\n\t*set damage +1\n\t*if goddess\n\t\t*goto 96\n\n\t*elseif source\n\t\t*goto 96\n\n\t*elseif ally\n\t\t*goto 97\n\n\t*else\n\t\t*goto 98\n\n*else\n\t*if goddess\n\t\t*goto 96\n\n\t*elseif source\n\t\t*goto 96\n\n\t*elseif ally\n\t\t*goto 97\n\n\t*else\n\t\t*goto 98\n\n*label 96\n*page_break\n${astra} feels a vibration in her pocket and it happens to be the ring the rat man gave her. She put it on her ring and it is not long before the strange creatures start swarming from beneath the ground. They need no invitation to join the fight, immediately attacking the shadow being at large numbers.\n\nTheir appearance causes a bit of confusion among the lines of the royal guards but when they realize the rodents are there to help, they cheer and renew the onslaught.\n\n*set damage +2\n*if source\n\t*set damage +1\n\t*goto 96a\n\n*else\n\t*goto 96a\n\n*label 96a\n*if ally\n\t*goto 97\n\n*else\n\t*goto 98\n\n*label 97\n*page_break\nThe feminine shadow being materializes next in the battlefield, gently floating above the ground. The masculine halts the carnage and faces her.\n\n\"Where have you been, Chiera? Why did you leave me to fight this battle on my own?\"\n\nShe gives him a vicious smile. \"I waited for you to get worn out and bruised so that I can kill you.\"\n\nChiera puts her hands on her head and the tentacles dance in a deadly way. The male starts to shake violently.\n\n*set damage +2 \n*goto 98 \n\n*label 98\n*page_break\n${astra} can clearly see that the battle is approaching its end. There are bodies of dead or injured guards scattered on the ground. There is little more the resistance to the otherworldly threat can offer.\n\nBut the shadow being seems to be on the verge of collapsing, having layers of darkness removed from him, leaving him smaller and weaker.\n\nThe woman takes the sword of a fallen comrade and panting approaches the monster. \n\nHe looks at her with hatred and arrogance. \"I will devour this world and bathe in the sweetness of its taste. You shall not stand against me.\"\n\n\"I am just a visitor, but by arriving here I came into a pack to be in the loving service to the people here. My loyalty will always be with humanity in its all form. Your eyes may see a mere woman, but I am much more than that and you are going to learn the lesson the hard way. You have chosen to do so.\" ${astra} looks at the ground. \"In the name of Temmer, may these eyes see the sunshine of another day.\"\n\nAnd then the sword sinks into the shadow.\n*if (damage>4) and (energy>0)\n\t*goto 100\n\n*else\n\t*goto 99\n\n*label 99\n${astra} remembers the many swings of the sword and her fatigue getting stronger after each of them. She knows that the inescapable grip of darkness gets stronger by the second and her hope extinguishes.\n\nHer body falls on the hard ground in a pang that shatters her soul, and then the shadow engulfs her.\n*goto_scene death\n\n*label 100\n*achieve shadow_slayer\nThe last swing of the sword of the weary valkyrie disintegrates the shadow beast, turning it into filthy droplets scattering quickly on the ground of the battlefield. \n\nAnd then the spiral of time takes her back to where she came from.\n--\n\"You have done very well, my dear,\" says the beautiful middle aged woman.\n\n\"Chiera... You look different now...\" utters ${astra} as the necklace crumbles to ash.\n\n\"Yes, I wanted to change and so I did. There is very little of the shadow being that I was when I reached this planet. Now, you know my story. Is your curiosity satisfied?\"\n\n${astra} tries to smile, but it is very hard because she is on the verge of physical exhaustion.\n\n\"Now, you deserve to have a good rest, sweet human child. I will show you the most comfortable bed in the castle and make sure you are delivered the most delicious fruit.\"\n*goto_scene new \n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first part is available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n\t*subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2018-11-19 $3.99 $2.99 purchased\n*abort\n", "cathedral": "*set not_visited_cathedral false\n${astra} makes sure the scarf around her neck covers her necklace, assuming that it could get her in trouble but not sure why. She realizes that such an item of clothing may look a but queer at this time of the year, but she guesses she can pass for an extravagant type.\n\nWhen she reaches the cathedral, the mass is already over and people are leaving the building. It is magnificent, decorated by matted glass and wrought iron. Its two storeys are dominated by a tall spire with a big bell. The rainbow colors remind her of her childhood and the place above the hills where there would often be a rainbow.\n\nOn the other side, there is a small group of women engaged in a dramatic conversation. One of them hushes the others and looks nervously around, as if what they are discussing can be dangerous.\n\nNext to them, children enjoy the playground, running around and laughing.\n\nClose to the church entrance, there is a seemingly demented woman murmuring something under her nose.\n*goto infront\n\n*label infront\n*page_break\n\nWhat should ${astra} do?\n*choice\n\t*hide_reuse #Get close to the women, trying to overhear their conversation\n\t\t*goto converse\n\t\t\n\t*hide_reuse #Talk to the hag\n\t\t*goto hag \n\t\t\n\t*hide_reuse #Go to the playground \n\t\t*goto play\n\n\t#Enter the church\n\t\t*goto enter\n\t\t\n*label converse\n*set converse true \nYou move closer to the women, pretending to be examining the peach tree next to them.\n\n\"I told you, Vicaria, this is no natural death. There was no blood left in his body. And it was definitely not a heart attack as the priest told.\"\n\n\"Do you mean that he was attacked by a vampire? Here, in this holy place?\" exclaims the other woman.\n\n\"I don't know, I saw the marks on his throat clearly...\"\n\n\"But then they must have disappeared? I saw nothing...\" says another.\n\n\"I can't say for sure, the coffin was too far away, maybe the priest hid them with flowers or something.\"\n\nVicaria looks around nervously\n\n*if stealth>1\n\tHowever, at the time, ${astra} looks so sucked in examining the tree that she seems dead to the world.\n\n\t\"I am afraid, Vicaria. Please, take this garlic,\" says the other woman.\n\t\n\t\"You are paranoid,\" Vicaria shouts and throws it away, close to ${astra}.\n\t\n\tThe two ladies engage in a quarrel and ${astra} decides to move away. But should she pick up the garlic?\n\t*choice\n\t\t#Yes\n\t\t\tShe puts the garlic in her belt.\n\t\t\t*set garlic true \n\t\t\t*goto infront\n\t\t\t\n\t\t#No\n\t\t\t*goto infront\n\t\t\t\n*else \n\tThe women see ${astra} and probably find her suspicious, so they walk away.\n\tgoto infront \n\t\n*label hag\n*set hag true \n\nThe hag may have been a pretty petite when she was younger but time has put its ugly mark on her. Most of her teeth are missing, her hair is scarce, the skin yellow \nas a parchment. It is a bit hard to understand what she is gargling but she has a great desire to talk.\n\n\"I saw them, madam. It was unbelievable. People call me Mad Masha. They don't know. They don't see the gargoyles move. They don't see them talk. The one with the lion head, he wanted \nme to talk to them.\"\n\n${astra} sighs. She can't believe that there would be somebody in this world who would like to listen to her gibbering. She is about to continue on her way what the old woman grabs her hand.\n\n\"The priest, he threw some of this dust on the gargoyles to turn them back into stone. Then he asked a couple of his Novices to bring them back up.\"\n\nThe hag finally stops talking and walks away. ${astra} looks at her hand. There is some sticky power glittering in it. She tries to wipe it away but some of it remains.\n*goto infront \n\n*label play\nThe playground seems to have everything necessary for children to play. There are swings, slides, balls... The laugher of the kids makes ${astra} smile.\n\nA mother with a small boy comes near her.\n\n\"No, mommy, I don't want here,\" he cries.\n\n\"Why, Sandy? All of your friends are here,\" his mother insists.\n\n\"But the priest...he scares me.\"\n\n\"Oh, don't worry, dear.\" The woan smiles. \"The priest might burly and bearded, but has a kind heart.\"\n\n\"No, he made me listen to him. he told me not to kick the ball towards the cathedral... And I couldn't...\"\n\n\"He did the right thing, honey,\" his mom interrupts him.\n\n${astra} sighs. The mother doesn't understand it, but she does. It seems that the priest may have some skills in mind control.\n*goto infront \n\n*label enter\nInside the church, the atmosphere is relaxing. It is cool, especially compared to the heat outside (despite the early hour). The air is filled with the aroma of tamyan, which is supposed to have cleansing properties.\n${astra} finds the smell to be refreshing. She looks around. The pews are clean up to the point of glistening to the light coming from the decorative windows. There are statues near the wall to the right. In the other end of the building is the altar - nothing more than\nan oval stone. There is nobody inside the church.\nWhat does she do?\n*choice\n\t#Examine the statues\n\t\t*set statues true\n\t\t${astra} marvels at the skill of the craftsmen who made these sculptures of angels and saints. For a moment, she wonders whether those were not living creatures turned to stone by some spell.\n\t\tShe could swear one of them moves, but when she looks directly at it, it is as still as it is supposed to be. Yet, what she observes amazes her. The angel has a necklace around her neck similar to her choker. Maybe she should ask the priest about it. Then again,\n\t\tthat will mean letting him know that she carries the damned collar herself.\n\t\t*goto priest\n\t\n\t#Go to the altar\n\t\tThere are several bouquets around the altar, alongside with a few bottles of water. ${astra} remembers the superstition that just by being around the altar, they will obtain healing properties. What really catches her attention, however, is a ring in the form of a crescent. It is one of the symbols of the Light\n\t\tand as such, she guesses, will probably provide you with some protection. On the other hand, taking something from the church may have consequences.\n\t\tWhat would she do?\n\t\t*choice\n\t\t\t#Take the ring\n\t\t\t\t*set energy  +1\n\t\t\t\t(Energy+)\n\t\t\t\t\n\t\t\t\tShe takes the ring and hides it under her cloak. It may be just her imagination, but she feels the energy spreading through her fingers. It is not quite the anticipated effect, but it still a positive one.\n\t\t\t\t*goto priest\n\n\t\t\t#Leave it\n\t\t\t\tAstar has vague memories of experiences including stealing, but the process usually involved her sneaking into a property rather than walking in through a wide open door. And, she doesn't think that it is a good idea to steal from a holy place, especially when she already have the animosity of her cursed bracelet.\n\t\t\t\t*goto priest\n\n\n\n*label priest\n*page_break\n${astra} hears steps behind her back and turns around. It is the priest. Tall and slender, with a long greying beard despite his obvious age of no more that forty, his radiance is impressive.\n\n\"Welcome to the Church of Light, Sister. I believe I haven't seen you here. What can I do for you?\"\n*choice\n\t*selectable_if (converse) #Ask him about the victim\t\n\t\t\"I already told the militia everything I know,\" he whispers as if fearing that someone might hear him.\n\t\t\n\t\t\"Do you trust the militia, Brother?\"\n\t\t\n\t\tHe sighs. ${astra} has learned that the militia is just a bunch of lazy bastards whose only line of business is collecting taxes for doing nothing (at best). However, you don't suppose\n\t\ta priest would use such language.\n\t\t\n\t\t\"I don't. Would you like to help me find and catch the murderer?\" He asks her with determination in his tone. ${astra} really wonders if she wants to participate or not. \n\t\t*choice\n\t\t\t#Agree to help the priest\n\t\t\t\t\"All right, let's do this. Just know that it may be dangerous.\"\n\t\t\t\t\n\t\t\t\t${astra} doesn't doubt that, however, the expression on the face of the priest really gives her the creeps. The Brother opens a trapdoor near the altar and starts descending a narrow staircase.\n\t\t\t\t*goto basement\n\n\t\t\t#Disagree\n\t\t\t\t\"I am sorry, Brother. I have urgent business. I wish you good luck.\"\n\t\t\t\t\n\t\t\t\t\"May the Light be with you,\" says the priest. ${astra} could swear his blessing aren't sincere.\n\t\t\t\t\n\t\t\t\tShe leaves the church.\n\t\t\t\t*goto endchurch\n\n\t*selectable_if (statues) #Ask him about the statues\n\t\t\t\"Brother, I noticed that one of the angels has a choker on her neck.\" You point at the statue.\n\t\t\t\n\t\t\t\"This is Archangel Celestia. She was sent by the Light to get rid of a pack of vampires that fed on the blood of a village. It is written that her faith was so strong that she managed to\n\t\t\tsmite all of the creatures of the Dark but their leader, Vashramas. He managed to bite her, but the choker sucked in all of his dark power, leaving him helpless.\" The priest sighs. \"I wish there was someone with such an artifact here.\n\t\t\t\n\t\t\t${astra}'s fingers run around your scarf. Should she show the necklace to the priest?\n\t\t\t*choice\n\t\t\t\t#No\n\t\t\t\t\tHer intuition tells her to stay away from the worries of the priest. She bids him farewell and leaves the holy place.\n\t\t\t\t\t*goto endchurch\n\t\t\t\t\n\t\t\t\t#Yes\n\t\t\t\t\t${astra} removes the scarf, making the Brother stare at the necklace with wide open eyes.\n\t\t\t\t\t\n\t\t\t\t\t\"Incredible! So my prayers were heard. I... I really need your help.\"\n\t\t\t\t\t\n\t\t\t\t\tHe drags her by the sleeve to a trapdoor near the altar, opens it and descends down a narrow staircase. She decides to follow him instead of fighting.\n\t\t\t\t\t*goto basement\n\t\n\t#Ask him for a blessing\n\t\t${astra} thinks that her request would be the most standard one she could ask of a priest. Yet, it takes him a few seconds before he delivers his answer.\n\t\t*if (charm>2)\n\t\t\t\"Today was a long day,\" says the priest. \"I gave a lot of blessings and my Favour of the Light is probably quite low.However, I feel that you are a decent woman that needs a blessing and I am going to give you one.\"\n\t\t\t\n\t\t\tHe proceeds with something that sounds like an anthem. Apart from being hilarious, ${astra} actually feel more optimistic about what future will bring her.\n\t\t\t*achieve protection \n\t\t\t\n\t\t\tShe thanks the priest and leaves the church.\n\t\t\t*goto endchurch\n\n\t\t*else\n\t\t\t\"Today was a long day,\" says the priest. \"I gave a lot of blessings and my Favour of the Light is probably quite low. This is why I can't do it. Not today, at least, this is what I mean.\"\n\t\t\t\n\t\t\t\"You say that it won't have any effect on me, is that so?\" she asks.\n\t\t\t\n\t\t\t\"No... Do you know what happens when a priest mouths a prayer or a blessing and they are out of favour? The priests receives what they asked for, however, they pay for it with the piece of Light everyone has inside - the soul.\n\t\t\tThat is one of the greatest dangers for us. And, I wouldn't like to run the risk. I am sorry.\"\n\t\t\t\n\t\t\t${astra} shrugs at the peculiarities of priesthood, bids him goodbye and leaves the church.\n\t\t\t*goto endchurch\n\t\t\t\n\n\t*selectable_if (hag) #Ask him about the gargoyles\n\t\n\t\t\"So you talked to the hag?\" he asks.\n\t\t\n\t\t\"Well, yeah, what she told me sounds strange, yet, I've seen even stranger things. Is she crazy?\"\n\t\t\n\t\t\"It seems so. However, what she's telling you may be true. I don't know, I have an urgent matter to attend to, so I must leave you alone. If you are interested, you may check the bell tower. This way.\" He points a stairway and leaves the church.\n\t\t\n\t\tWhat should ${astra} do?\n\t\t*choice\n\t\t\t#Leave the church\n\t\t\t\t*goto endchurch\n\n\t\t\t#Climb the stairway\n\t\t\t\t*goto belltower\n\n\t#Just leave\n\t\t${astra} bids the priest farewell and leaves the church\n\t\t*goto endchurch\t\n\n*label belltower\nThe winding staircase seems endless. She can't help but imagine what a fall down would cause.\n\nWhen she reaches the top, she is amazed by the size of the bell. It seems twice as tall as her. ${astra} guesses that ringing it would require some serious muscle. A sudden wind blows dust into her eyes, blinding her for a few moments. When she has finished wiping her eyes, she sees that there is a man next to the bell. He must have been behind one of the pillars when she reached the bell tower. It seems that he is about to actually ring it. The sound will most likely be painful and she has no time to rush downstairs.\n\nWhat would she do?\n*choice\n\t#Shout at the man to stop\n\t\t${astra} does her best to give out a loud shout. She can swear that half of the town must have heard her but not the man needed. He must be deaf from all the noise...that hits her ears like a hammer, making her fall to the floor, her hands desperately trying to mute the roar of the bell.\n\t\t*set energy -2\n\t\t\n\t\t(Energy--)\n\t\t\n\t\tWhen the torment ends, ${astra} feels the need to leave as soon as possible.\n\t\t*goto endchurch\n\n\t#Shoot him \n\t\t\t*goto hit\n\n\t#Shoot a bolt just in front of him (to attract his attention)\n\t\t\t*if marksmanship\u003c2\n\t\t\t\tProbably because she is in a hurry, she aims poorly.\n\t\t\t\t*goto hit\n\n\t\t\t*else\n\t\t\t\tThe bolt sinks into the wooden floor a few steps in front of the man, just as ${astra} planned. He turns around and looks at her, fear in his eyes. She raises herr hands, hoping to show that her intentions are not hostile. He seems to understand. ${astra} judges him to be about 40 years old and quite strong. All of her efforts to communicate with him fail as he is deaf from the service he performs.\n\t\t\t\t\n\t\t\t\t${astra} hears a flap of wings behind her. Turning around, her blood runs cold when she sees one of the gargoyles stretch in front of her as if trying to recover from his petrified state. The grotesque creature raises its talons menacingly and crouches, preparing to charge at her. The man reacts quickly, positioning himself between him and the gargoyle, explaining something you don't quite understand. The effect is instantaneous - the beast returns to the edge of the bell tower where it was and turns into a stone statue.\n\t\t\t\t\n\t\t\t\tYou thank the man and wave him goodbye, not wishing to spend more time in such a haunted place. Before that, however, you take a piece of stone you believe to be from the gargoyle.\n\t\t\t\t*set magic +1\n\t\t\t\t\n\t\t\t\t(Magic+)\n\t\t\t\t*goto endchurch \t\n\n*label hit \nThe bolt sinks into the thigh of the man and he screams in agony.\n\n${astra} hears a flap of wings behind her. Turning around, her blood runs cold when she sees one of the gargoyles stretch in front of her as if trying to recover from his petrified state.\n\nThe young woman tries to run away while she can. The gargoyle delivers a mighty blow to her shoulder, which actually sends her flying to the ladder leading downstairs.\n\nLuckily for her, the monster would not try to follow her after her leaving the building.\n*set energy -2\n\n(Energy--)\n*goto endchurch \t\t\t\t\n\n*label basement\n\"Father, isn't it high time you told me where we are going and what we are going to do when we get there?\" ${astra} enquires.\n\t\n\"Excuse me,\" he clears his throat. \"It so happens that in the basement of the home of the Light... is the home of a creature of the darkness... a vampire of a sort. It probably laid down there in hibernation until I made a mistake with a prayer...\"\n\t\n\"Can you keep to the topic, please? I doubt we have time for the long version of the story.\" She reminds him.\n\t\n\"I'm sorry. The problem is that the vampire sometimes comes out to feed and so far I've been unable to stop her. Even the gargoyles on the roof that are supposed to guard the church have proved useless.\"\n\t\nShe looks him in the eyes, trying to judge if he is mad or not.\n\t\n\"And you need help?\" ${astra} asks.\n\t\nHis answer is energetic nod.\n*goto questions\n\n*label questions\n*page_break\n*comment priestpower 5\nThere are a few questions that come to ${astra}'s mind. Should she ask any?\n*choice\n\t*hide_reuse #\"Did you ask the church for help.\"\n\t\t*set priestpower -1\n\t\t\n\t\t\"No... I am still not sure I can't handle the situation,\" he mutters.\n\t\t\n\t\t\"...by yourself?\" She raises her eyebrow.\n\t\t\n\t\t\"Well, I didn't want to look bad in the eyes of the high clergy. When I think again, dishonesty is not among the virtues of the Light. Maybe that was a mistake.\"\n\t\t*goto questions\n\n\t*hide_reuse #\"Why didn't you succeed in stopping her?\"\n\t\t*set priestpower -2\n\t\t\n\t\t\"Well, the most obvious answer is that my faith is not so strong. I don't want to accept it, as it is supposed to be the main characteristic of a priest but... I just can't think of any other reason as sound as this.\" He shrugs.\n\t\t*goto questions\n\n\t*selectable_if (converse) #\"What do you know about that vampire?\"\n\t\t*set priestpower +2\n\t\t\n\t\t\"I've heard rumours about how she was sent to sleep nearly a decade ago. The priest at the time read her a complex prayer. I even have it with me.\" He produces an ancient looking parchment from his cassock. \n\t\t\n\t\t\"There are missing pieces.\" ${astra} notices.\n\t\t\n\t\t\"Unfortunately. But, I can fill in the gaps with holy words. I am really good at it, probably the top of my class in the seminary.\"\n\t\t\n\t\t${astra} doesn't quite believe him. Anyway, he seems self-righteous, which is a sign of empowerment.\n\t\t*goto questions\n\t\n\t*hide_reuse #\"Do you know other examples of vampire slaying?\"\n\t\t*set priestpower +1\n\t\t\n\t\t${astra} immediately regrets asking him that question as he burst into a stampede of words describing the deeds of half a dozen of saints. She actually admires him for believing in it. That would be a challenge for her.\n\t\t*goto  questions\n\t\n\t#\"No, I've had enough.\"\n\t\t*goto door\n\n*label door\nThe stairs come to an end. The priest ignites a torch with a single word (one of the small tricks of those priests) and takes ${astra} along a winding corridor ending with a massive metal door.\"\n\n\"Have you tried opening it?\" she asks in a low voice.\n\nThe priest shakes his head. \"No, there is evil there.\"\n\n\"Of course there is evil, this is supposed to be the layer of the vampire,\" she whispers.\n\n\"No, I mean the door. I can sense that it is infused with the power of the darkness and the prayers I tried don't seem to change anything.\n\n${astra} takes the torch from him and get closer to the door and start a careful examination.\n\n*if will>1\n\tIt is a simple trap but it still requires skills in order to detect it.\n\t\n\t\"Do you see that?\" ${astra} shows the priest a small rune just above the door. \"It is not complete. When you open the door, I am pretty sure a small piece of chalk will come out and complete the rune, which will result in a big fireball launched on whoever opens the door.\"\n\t\n\t\"What if the vampire decides to go out?\"\n\t\n\t\"Well, she will have to remove the mechanism from inside,\" ${astra} explains while wiping out the rune. The door opens with a screech.\n\t*goto lair\n\n*else\n\t${astra} fails to identify the trap. When she opens the door, a big fireball appears from above the door and engulfs her in flames. The conflagration doesn't last for long, but still she is quite scorched.\n\t*set energy -2\n\t\n\t(Energy--)\n\t*goto lair\t\n\n*label lair\n*page_break\n*set met_deathrose true \nThe room is small and surprisingly clean and well lit. It is hard to say where the light comes from. Your guess is that it has magical origin.\n\nThe only item in the stone blocks room is a bed made of glass. Or rather a coffin since beds don't tend to have lids. Inside, there is a beautiful raven haired woman wearing an exuberant pink dress. That catches ${astra} unprepared. She expected to find something hideous.\n\n\"Welcome to my room.\" A serene voice comes from the coffin. \"I am sorry that I can't offer you chairs as a good hostess should.\" The woman removes the lid and places it carefully on the ground. Strangely, there is no sound as the glass meets the stone. She gets up as gracefully as impossible. A more accurate description might be that she flies out. The woman makes a few steps in ${astra}'s direction and she finds herself wondering if her bare feet feel cold. The vampiress extends her right hand but not for a handshake but for a bow and a kiss. And, ${astra} feels compelled to do so.\n\n\"My name is Deathrose and it is a pleasure to meet you.\"\n\nThe priest, however, doesn't fall for her radiance.\n\n\"Stand back, concubine of the Dark. We have come not to be your lackeys but to put an end to your unnatural existence in the name of the Light and all it stands for!\"\n\nDeathrose cracks a smile.\n\n\"It is good to serve and revere the Light, Brother, but sometimes it blinds you and you see only darkness where there is none. I am certain your companion would not share your judgment.\"\n\nShe looks in ${astra}'s eyes with a ruby stare, mesmerizing her, making her want to serve this woman until the very last breath. In the background of ${astra}'s desires, she hears the priest sing a prayer. Suddenly, smoke starts to come from her back, as if she is burning.\n\n\"Your demonic wings! You can't hide who you are. The Light will cleanse you!\" The priest roars.\n\nFor a moment, the desire in ${astra} to rip him apart becomes quite strong, then the vampiress fails to maintain her spell on ${astra} and she comes out of her influence.\n*page_break\n*if will>2\n\t${astra} senses that the Brother was not right. The creature before them is not a vampire but rather a blood demon. They are a rare breed, a descendant of a line of succubi and humans. ${astra} guesses that she should warn the priest. On the other hand, maybe she  shouldn't. Her ability to tap into the collective knowledge of of folklore tells her that the powers of blood demons are vastly overrated in the stories in which they appear. The knowledge of the kind of rival they are facing may be useful but it could also frighten him and make him lose his focus.\n\tWhat would you choose?\n\t*choice\n\t\t#Tell him\n\t\t\t*set priestpower -1\n\t\t\t\n\t\t\tAs ${astra} tells him, she sees him get as pale as a snowman. Unfortunately, her message had just the effect she feared.\n\t\t\t\n\t\t\t\"You recognized me,\" says the demon woman. \"You seem to know how to impress me.\"\n\t\t\t*goto lairtwo\n\t\t\n\t\t#Don't\n\t\t\t*goto lairtwo\n\n*else\n\t*goto lairtwo\n\n*label lairtwo\n*page_break\n\"All right, I am growing tired of this game. Let's go to the point,\" says the woman, her facial features obtaining predatory hues.\n\n\"I should thank you, Reverend priest, for you brought to me what I was really looking for,\" she says.\n\n\"What do you mean,\" ${astra} asks dumbfounded.\n\n\"I need another body and I definitely prefer female ones. I have a strong preference for young, strong and beautiful women, just like you.\"\n\n\"What is wrong with the one you have now?\" ${astra} tries to win some time... or at least learn something valuable.\n\n\"Don't be fooled by its looks. I've always had high standards and this one is by far the most voluptuous body I inhabited for the last couple of decades. However, I know when it is beginning to \nwear out. I need to sleep more, eat more often and have been getting nervous recently. Believe me, with my way of living, a body wears out in less than a dozen years.\"\n\n\"What... what are you going to do?\"\n\n\"When I was younger, I tended to think that if I make a tempting offer, the girl would willingly give me her body. The truth is that none of the thirteen lasses agreed. So, I am going to do it myself!\"\n*goto lairthree\n\n*label lairthree\n*page_break\nNails as long as daggers come out of her fingers and she leaps in your direction, as quick as a cougar.\n*if physique>1\n\tHowever, ${astra}'s reaction is even quicker. She manages to jump out of her way. The vampiress chuckles and prepares for the next attack.\n\t*goto lairfour\n\n*else\n\t${astra}'s reaction is very quick and she manages to evade her initial attempt to disembowel her, however, her nails leave deep marks in the forearm.\n\t*set energy -1\n\t\t\n\t(Energy-)\n\t\t\n\tThe vampiress licks them clean, chuckles and prepares for the next attack.\n\t*goto lairfour\n\n*label lairfour\n*if garlic\n\t*set statues false\n\t\"I smell abominable garlic,\" she roars. Her next attack is just a feint, so that ${astra} lowers her guard and allows the demoness to reach her throat with her nails, shredding the scarf and exposing the choker.\n\t\n\t\"I am not easy to impress, but you just did.\" She crouches, ready for the next leap\n\t*goto lairfive\n\n*else\n\t*goto lairfive\n\n*label lairfive\n*page_break\n\n${astra} is beginning to wonder what the priest is doing all this time while she is trying to survive the attack of the creature of the Dark. The answer comes in the form of a\nfountain of light emerging around her.\n*if priestpower>6\n\tHer screams are the most terrifying noise you have ever heard. ${astra} doesn't want to have to face the rage that infused it, fortunately, it turns out she doesn't have to. The prayer puts an end to her existence.\n\t\n\tAll that remains of her is a pile of ash and a silver bracelet glistening amongst the soots, which you take.\n\t*achieve magda \n\t*set charm +2\n\t\n\t(Charm++)\n\n\tThe priest is so happy for her help that he gives her a bandana that is supposed to protect her from the forces of the Dark.\n\t*achieve protection \n\t\n\t${astra} bids the priest farewell and continue her journey.\n\t*goto endchurch\n\t\n*else\n\tHer screams are terrible. ${astra} hopes that it will be the end of her but she jumps out of the cascade of Light badly burned but still alive and willing to shred her to pieces.\n\t*if statues\n\t\tHer hands dance around ${astra}'s body, the nails taking down cloth, skin and muscle alike. ${astra} bets that her nails are covered with anaesthetic poison as after the first few scratches,\n\t\tthere is no pain, only admiration for the grace with which she does her business. The young woman feels the blood seething out of her veins and she slowly sails into the deep of death.\n\t\t*goto_scene death\n\t\n\t*else\n\t\tShe hugs ${astra} tightly, not letting her escape from her embrace. Her teeth sink into the throat of the young woman. [i] That is it [/i] ${astra} says to herself, believing that the final hour has come.\n\t\t\n\t\tBut she is mistaken.\n\t\t\n\t\tDeathrose screams again and in the high pitched cry ${astra} hears not only her pain, but most likely the pain of her victims. When the choker is finished with her, all that is left of the beautiful creature is a \n\t\tpile of ash. ${astra} really can't force herself to look into it, realizing that what happened to her may very well be her fate. The good news is that the choker must be sated at the moment.\n\t\t*achieve magda \n\t\t*set charm +1\n\t\t\n\t\t(Charm+)\n\t\t\n\t\tThe priest is so happy for her help that he gives her a bandana that is supposed to protect her from the forces of the Dark.\n\t\t${astra} bids the priest farewell and continue your journey.\n\t\t*goto endchurch\n\t\t\t\t\n*label endchurch\n*page_break\nWhat should ${astra} do now?\n*choice\n\t*selectable_if (not_visited_haunted) #Explore the abandoned inn\n\t\t*goto_scene haunted\n\t\t\n\t#Go to the market to buy apples\n\t\t*goto_scene astra 432", "choicescript_description": "Unleash the power and magic of the Divine Feminine and become the bane of evil entities. Discover a world of sword and magic and take its protection from a shadowy force as your own destiny. Prevail over dangers and discover friends among those who call themselves demons. Awaken their Forgotten Goddess and wield her power as your own. Challenge the establishment of the false light. Claim the Prelate’s tiara… or serve its wicked reign.\n\n[i]The Slayer of Evil[/i] is a 50,000 word interactive novel by Ivailo Daskalov, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n• Plays as a renegade Slayer of Evil lady.[n/]\n• Explore an alien land ruled by sword, magic and curse.[n/]\n• Face and shadow beings, vampires, succubi and angels.[n/]\n• Help a group of demonic females restore the balance in their world.[n/]\n• Awaken and wield the power of the Forgotten Goddess.[n/]\n• Allow an ancient love to blossom again.[n/]\n• Slay the Prelate of False light and take her place... or fail and serve her.\n", "choicescript_stats": "*stat_chart\n\n\ttext stealth Stealth \n\ttext marksmanship Marksmanship\n\ttext physique Physique\n\ttext lockpicking Lockpicking\n\ttext will Will\n\ttext charm Charm\n\ttext magic Magic \n\ttext energy Energy Field \n\n\n\t\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n  \n  Unlock the rest of the game, including the thrilling conclusion!\n  \n  *purchase adfree $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n  \n  You've paid to unlock the rest of the game.\n", "death": "*allow_reuse\n*label 23\n*page_break\nSuddenly, an explosion of light violently breaks the darkness of non-existence and a handsome man steps from the newly opened portal. She knows him well, the one her soul always turns to.\n\n\"Netho,\" she whispers his name. \"What a welcome sight for my weary eyes to behold. Did you come to save me... again?\"\n\n\"Yes, my dearest one. There can be no darkness that would prevent me from reaching out and pulling you from its low vibrational embrace. I love you. Now, shall we dance into the light as we used to?\" He offers her his hand and she gladly takes it.\n\n\"You are going to get in trouble for what you are doing, right?\" She asks him as they step toward the portal.\n\n\"I will. But I can't just stand there and watch your suffering, feeling every pang in the depth of my heart. It can not be, no matter what.\"\n\n${astra} sighs. \"Then maybe I should be more careful so that I don't end up here again, right?\"\n\n\"I would kindly ask you to do that.\"\n\nThey both laugh as the portal engulfs them and sends them back in time.\n*label ending\n*page_break End\nWe hope you've enjoyed playing [i]Slayer of Evil.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "epilogue": "*page_break\nA whirlwind of space and time engulfs ${astra} again and takes her to a place that smells of wild flowers and berries. The Forgotten Goddess is there. \n\n\"You did what I asked of you and now I can give you my blessings. This is the power I have been given by Source. It is not really mine, so you can take the gift with no \nstrings attached. I know that there is a group of people whom you belong to who were very adamant on me saying that. Please, take my hand.\"\n\n${astra} fulfills the wish of the Goddess and feels warm energy engulfing her.\n*set energy +1 \n\n(Energy+)\n\n\"It may take some time for you to fully understand how you can use it. Now I will give you a set of tools that can help you manifest one aspect of it. I know \nthat you have the soul of a warrior, or as Lazarus says, a Slayer of Evil.\"\n\nThe Goddess waves her hands and two sheathed daggers came out of the sleeves of her dress. ${astra} takes them and examines the dragon motives on the hilts.\n\n\"They have been infused with dragon magic, and the blades themselves are made of a material which we call angelic that has the frequency of burning light. It can cut through anything.\"\n\n${astra} takes one of them out of the sheath and marvels at the metal. It look as if it is burning and dancing. \n\n\"Now, go, my dear child and embrace your destiny. You will be teleported to the throne room of Prelate Chiera where you will face her in a glorious battle. But before that,\nI want to thank you for bringing Lazarus back into my field. And give you my piece of advice. The throne room is a dangerous place. Remember the last time when you were there. The threat \nyou sense then is the only one that exists in the timeline you are entering.\"\n\nThe world spins again...\n*goto x \n\n*label x \n*page_break\nThe whirlwind spits her out in the middle of Chiera's chamber.\n\n\"I don't remember inviting you here,\" Chiera hisses from the throne. \"But I am hungry and your energy would make a delicious lunch.\"\n\n${astra} feels a mesh of red energy engulf her and make her feel very week.\n\n*if energy>0 \n\t\"The power...\" ${astra} hears the voice of the Goddess in her head and her body gets immediately surrounded by light that pushes the mesh away.\n\t*achieve perseverance \n\t*goto 2\n\t\n*else \n\tShe succumbs to the ground, just a breath of fainting.\n\t\n\t\"I can't let you lose now,\" Netho says in her mind. \"Feel my energy flowing into you and regain the strength you need.\"\n\t\n\t${astra} suddenly feels able to control her body once again and stands up.\n\t\n\t\"The power...\" ${astra} hears the voice of the Goddess in her head and her body gets immediately surrounded by light that pushes the mesh away.\n\t*goto 2\n\t\n*label 2 \n*page_break\n\"You manage to overcome one challenge, but that is not all I have,\" Chiera chuckles. \n\nWhere would the next threat come from?\n*choice \n\t#The invisible warrior\n\t\t*if stalkers\n\t\t\t${astra} concentrates on the thought of the invisible stalkers. She could swer she could see the light bend as passing through their bodies. In the next moment, they \n\t\t\tdisintegrate, as if they never were.\n\t\t\t*goto 3\n\t\t\n\t\t*else \n\t\t\t*goto fail \n\t\n\t#The murals \n\t\t*if angels_cry\n\t\t\t${astra} looks at the murals bringing back pain from long lost times. She wishes that they would disappear and the negative emotions associated with the illusion \n\t\t\tthey bring to reality be washed away. \n\t\t\t\n\t\t\tThe reality she is present in listens to her call. The murals dissolve into nothing.\n\t\t\t*goto 3 \n\n\t\t*else \n\t\t\t*goto fail \t\t\t\n\t\n\t#The throne \n\t\t*if throne \n\t\t\t${astra} looks at the throne. \"It gives you power, doesn't it?\" she asks the Prelate.\n\t\t\t\n\t\t\t\"This is none of your business!\"\n\t\t\t\n\t\t\t\"That power is not yours by Creation. You claimed it in dark ways. I pray for Justice, and Justice will be done!\"\n\t\t\t\n\t\t\tThe throne fades away and disintegrates, leaving Chiera on the ground. \n\t\t\t*goto 3 \n\t\t\t\n\t\t*else \n\t\t\t*goto fail \n\t\t\t\n*label fail \n*page_break\nSomething inside ${astra} tells her she has failed to anticipate the main threat.\n*page_break \n*if stalkers\n\tThe light changes and suddenly ${astra} is able to see six armored warriors standing between the pillars. Suddenly they come to life and attack her from all sides. She fights with all \n\ther speed and fury, her daggers slaying them one after another. One falls as a proof they are not invincible. The second and third perish as she turns around with her hands away from her torso, a deadly \n\tmixer with divine grace. The fourth she kicks in the head, almost severing it from the body. But then somebody hits her from behind. Sapped from her strength, she succumbs to the floor.\n\t*goto lose \n\t\n*elseif angels_cry\n\tA storm of emotions hits ${astra} with might and depth she never felt capable of experiencing. It is as if all the traumas from the myriads of incarnations she ever had or will have \n\tare reaching her. She wants to take out her daggers and fight the battle she is prepared for, but she can't. She doesn't care any more, all that matters to her seems lost and \n\tunattainable.\n\t\n\tShe succumbs to the floor in tears. \n\t*goto lose \n\t\n*else \n\tThe throne starts vibrating and sending out an alluring hum. It reaches ${astra}'s ears and overrides the vibration of her own soul. Suddenly, she feels guilt \n\tfor wanting to oppose the Prelate, that champion of the light and justice. All she wants now is to make up for the sin and serve as until her last breath.\n\t\n\tShe humbly kneels down before Chiera. \n\t*goto lose \n\t\n*label lose \n*page_break\nChiera slowly walks to the floored figure before her. \n\n*if rel_chiera>0\n\t\"You know, ${astra}, I really like you and I will give you one more chance to make things right. I want you to serve me as an Abbes. Would you agree?\"\n\t*choice \n\t\t#Yes \n\t\t\tAnd so, ${astra} decides to continue her service to the light as much as she can withing Chiera's framework of the false one. She manages to make a different \n\t\t\tto the lives of many, although that inevitably came at the price of solidifying the regime of the Prelate.\n\t\t\t\n\t\t\tThe news of her change of role dismayed Melissa and the others from the resistance. They quickly found out they couldn't trust her to continue working for \n\t\t\ttheir cause, but also knew that she would never consciously try to stop them either. \n\t\t\t\n\t\t\tThe historians of timelines would remember her as the Slayer of Evil who lost the battle with a powerful enemy but still managed to continue her service to the \n\t\t\tall that is.\n\t\t\t*achieve servant \n\t\t\t*goto story \n\t\t\n\t\t#No \n\t\t\t\"Then you will be taken to a cell and executed at dawn,\" the Prelate says coldly. \"Guards!\"\n\t\t\t*goto execute \n\t\t\t\n*else \n\t\"You will be taken to a cell and executed at dawn,\" the Prelate says coldly. \"Guards!\"\n\t*goto execute \n\t\n*label execute \n${astra} is sitting in the darkness of her cell, waiting for the morning with no fear. But regret and sorrow wouldn't let her go. She really wishes that the moment \nof weakness didn't mean a failure of her mission.\n\n*if intervention\u003c1\n\t*set intervention 1\n\t*if (rel_melissa>3) and (rel_malice>3)\n\t\tSuddenly, the images of Melissa and Malice appear next to her, pale and etherial like ghost.\n\t\t\n\t\t\"Listen carefully, ${astra}, we can't stay long. We found a way to bring you back in time to the beginning of the battle with Chiera,\" explains Melissa. \n\t\t\n\t\t\"You have no idea how much we sacrificed in order to get that favor, but we trust in you and your ability to bring peace to this land,\" says Malice.\n\t\t\"Now, go and embrace your glory.\"\n\t\t*goto x \n\t\t\n\t*else \n\t\t*goto_scene death \n\t\t\n*else \n\t*goto_scene death \n\t\n*label 3 \n*page_break\nChiera takes her staff and charges.\n\n${astra} doesn't move. She knows she doesn't need to. Her eyes glisten with the determination of a soul that has been in the heat of the battle many times and feels \nintoxicated with the knowledge that victory is within reach. \n\nThe staff comes closer to her head. ${astra} knows she would be dead if she takes the hit, but she remains still. Only when the weapon is within an inch of her skull she shifts into that out of time. Chiera freezes.\nNot being in a hurry at all, ${astra} just moves to the sides and points the blade at the Prelate. Then she shifts back into the physical and the battle is over.\n*page_break\nThe next day, ${astra} is appointed as the new Prelate. Most of the clergy is happy with the decision, having always felt something was a bit off with Chiera. The ceremony is glorious and \nit brings joy to everybody in the cathedral. \n\n${astra} is very happy to see Melissa, Malice and Deathrose too. She knows she is an outrider to the world she has given herself to, but her actions brought her Melissa's trust \nand she has their support too. \n\nThe historians of timelines would remember her as the Slayer of Evil who brought true light and unity to a world she didn't even belong to.\n*achieve slayer \n*goto story \n\n*label story \n*page_break\nAnd so, you reached the end of ${astra}'s adventure. \n\nWould you like to read a non-interactive short story that is related to ${astra}'s star family, the Pleiadians?\n*choice \n\t#Yes\n\t\t*goto_scene mercy \n\t\t\n\t#No \n\t\t*goto_scene death ending ", "false_light": "*page_break\n${astra} wakes up in a small room. It is very cosy and smelling of flowers and incense. A bowl of various fruit awaits her on the table. The sight of it makes her feel hungry, so the gets out if bed and goes \nfor the grapes. \n\nOn a hanger, there is a white cassock embroidered with golden symbols. The sun is on the left sleeve, and on the other there are two moons - a full one and a crescent one.\n\nOnce her hunger has been satisfied, she puts the cassock on and leaves the room.\n\nShe runs into Chiera. She barely recognizes her at first since her choice of clothes is so different from the last time, and a more thorough analysis would reveal that her aura has dramatically too.\n\nNow, she has a cassock similar to ${astra}'s, but with with far more gold and more intricate symbols. A crescent moon skullcap gives her a more royal look, and the golden makeup covering \nmost of her face makes her look out of this world. [i]How apropriate,[/i], ${astra} thinks.\n\n\"I request you presence in my quarters by the end of the hour, Novice,\" Chiera says as she passes by her. It sounds more like an order.  \n\n${astra} does not reply, only stares at the older woman as she walks away. \n\nChiera is followed by a couple of priestesses, whom ${astra} guesses to be her guards. One of them pierces her with her dark eyes. \"How dare you stare at the Prelate! What an insolence and sacrilege!\"\n\n${astra} has the feeling the woman is about to hit her, which would be a grave mistake on her side. Luckily, she decides against it and hurries to catch up with Chiera.\n*page_break\n[i]I must speak to you in private.[/i] ${astra} hears a voice in her head, an energetic signature she recognizes.\n\n[i]Melissa, is that you?[/i]\n\n[i]Yes, ${astra}, that is me. I am so happy that I could reach you. Please, meet me behind the Palace of the Prelate[/i]\n\n[i]What do you mean by a Palace? Is Chiera the ruler of this kindgom?[/i] ${astra} asks in dismay.\n\n[i]Of course she is, where have you been those couple of years[/i] Melissa finds it hard to suppress her emotions. [i]I am sorry, such memory lapses are to be \nexpected by the one I believe you are.[/i]\n\n[i]It is okay, Melissa, I don't feel offended. But indeed there are a few questions that I need to ask having just woken in this timeline. I think I will be able to adapt \nquickly once I realize what the major differences are.[/i]\n\n[i]I would be glad to fill you in when you meet me[/i] Melissa says.\n\n[i]I will. The problem is that the Prelate herself requires my attention and there is a very strong feeling inside me that I should take something from my room. [/i]\n\n[i]I'd rather you didn't make me wait for long, but if you need to, so be it. [/i]\n*goto fork \n\n*label fork \n*page_break\nWhat should ${astra} do?\n*choice \n\t*disable_reuse #Visit Prelate Chiera \n\t\t*goto prelate \n\t\t\n\t*disable_reuse #Visit Melissa\n\t\t*goto mel \n\t\t\n\t*disable_reuse #Go back to her room \n\t\t*goto room \n\t\t\n\t*selectable_if (visited_melissa) #Look for Malice \n\t\t*goto malice \n\t\n\t*selectable_if (fork>3) #Proceed to the next location\n\t\t*goto afterfork \n\t\t\n*label mel \n*set fork +1 \nIt is not easy to spot Melissa, who is hiding in a half-etherial form behind a tree, but ${astra} has the eyes and intuition to do so.\n\n[i]Now, please, follow me[/i], says the demoness and leads you to the sewer. \n\nYou watch in dismay as she virtually passes through a couple of pedestrians without bothering to detour. Soon, you will reach the hiding place and Melissa\nreturns to the physical.\n\n\"I wish I didn't have to do that, the smell is not pleasant at all,\" she complains. \"But I know that it is necessary because if you shift to a lower density, you \nmay just as well automatically fly home and then you would be lost for the cause.\" She chuckles.\n\n\"What cause do you mean?\" ${astra} asks.\n\n\"I know that demons are known for liking to manipulate others. The same is true about the humans from this world, by the way. But I want to be honest with you because \nonly in this way can I assure your allegiance. My intuition tells me to open my heart completely.\"\n\n\"Please do,\" ${astra} smiles.\n*page_break\n\"Just like in any other world you may have known, demons stand for the choice of darkness, of exploring the Stygian aspects of life. Within that frame, I play \nthe role of the Keeper of Twilight. My mission is to make sure the demons don't get too far in their predatory guiles.\" She shows ${astra} her long manicures. \"You \nhave no idea how many of my own kind I have shred to pieces when they have dared take what higher selves have not allowed to.\"\n\nThe power in her voice makes ${astra} shiver.\n\n\"When Chiera and her people came here, they brought chaos with them. They are indeed embodiments of the same darkness that me and my kind represent, but from \na different source and I realize my powers are next to useless against them. As I speak, I am filled with terror because keeping the balance was what I was created to \ndo and it is all slipping away from me.\"\n\n\"The last time I saw Chiera, she didn't seem dark to me,\" ${astra} remarks.\n\n\"This is what makes things even worst,\" Melissa seethes. \"Instead of binding with us, she decided to pretend to be some kind of light in an attempt to feed from the natural link \nbetween humans and creation. That is so sick.\"\n\n\"Don't you demons have the same link too?\" the woman asks.\n\nMelissa shakes her head. \"It is not the same. As a demonic race, we stand for exploration of source through disconnection, as so we must experience at least some of it. It is a task \nthat sometimes weighs heavily on my shoulders.\"\n*page_break\n\"What is it that you want me to do?\" ${astra} gets to the point.\n\t\n\"Being an off-world entity yourself, you can defy Chiera in ways that are not attainable to us. But the beginning is to help me gain back my friends who abandoned me \nin order to serve the false light. One of them is my own sister Malice, who became a priestess just like you. You can usually find her by the river, she is \nobsessed with some kind of a ritual. The other one is a lady called Deathrose who continues \nliving in the cathedral. None of them would speak to me, brainwashed by the twisted rhetorics of the false light. Will you help me?\"\n\n${astra} thinks for a few seconds. \"In my system of beliefs, I am beyond the concepts of light and darkness, beyond good and evil. My aim is always to go for love, and I feel \nyour love for this world and your sister and friend. I can give you no binding promises, but I will talk to them.\"\n\nMelissa sighs in relief. \"I hoped you would say that.\"\n\n*if necklace\n\tHer eyes behold the necklace and the expression on her face turns into horror. \"You shouldn't have put that on. It is one of the instruments that fuel the power of of the Prelate over her minions.\"\n\t\t\n\tWhat should ${astra} reply?\n\t*choice \n\t\t#\"What if I am strong enough to withstand?\"\n\t\t\t*set rel_melissa +1\n\t\t\t\n\t\t\t\"I certainly hope so. You are far more important than you realize. You are right, I should have more trust in you. Not that I have any choice.\" She shruggs.\n\t\t\t*goto two\n\t\t\t\n\t\t#\"It has not affected me in any negative way.\"\n\t\t\t\"Well, wait and see. I have a bad feeling about this,\" she says.\n\t\t\t*goto two\n\t\t\t\n\t\t#\"I am just trying to make Chiera underestimate me.\"\n\t\t\t*set rel_melissa +1\n\t\t\t\"That certainly sounds like a very good idea, my dear. I just hope you have what it takes to withstand the challenge,\" Melissa says.\n\t\t\t*goto two \n\t\t\t\n\t\t#\"I want to experience her version of the truth too.\"\n\t\t\t*set rel_melissa -1 \n\t\t\t\n\t\t\t\"There is no truth in anything she teaches. Well, maybe a little, but it is twisted in a way that serves her own good. I will pray for your sanity.\"\n\t\t\t\n\t\t\t\"Do you demons also pray?\" ${astra} asks.\n\t\t\t\n\t\t\t\"It is not exactly praying, but more like sending intentions. It can be just as powerful without giving any energy to another entity, like Chiera, for example.\"\n\t\t\t*goto two\n\t\t\t\n*label two \n*set visited_melissa true \n*page_break\n\"I really must go,\" Melissa announces. \"Please, visit my sister and Deathrose in the Cathedral as you promised. We will speak again soon.\"\n\nBefore ${astra} manages to reply anything, the demoness vanishes into thin air. The woman wonders which of the two ladies she should visit first. There was a greater urgency in Melissa\nwhen she mentioned Deathrose, so that sounds like the more natural decision.\n*goto deathrose \n\t\t\t\n*label malice \n*set fork +1 \nIt is not hard to find Melissa's twin. When she sees ${astra}, waves at her enthusiastically and comes her way. She is wearing the white robes of a priestess. Hers is actually \nsoaked.\n\nWhen she reaches her, the demoness hugs ${astra}. \"Oh, I am sorry, I forgot I was wet. That feeling has been the norm for the last few days,\" she says.\n\n\"Don't you get cold?\" ${astra} asks her.\n\nMalice shakes her head. \"I never do. I guess I bring hell with me wherever I go.\" She giggles. \n\n\"What is this ritual you are performing?\"\n\n\"Oh, nothing special, just a way to show respect to mother nature and my new mistress... I mean Prelate.\"\n\n${astra} chuckles. No matter how Malice may look, she is still the child of darkness she met in the haunted house.\n\n\"I can feel that my sister sent you to me,\" Malice's expression gets serious. \n\n\"There is no way I can deny that. It is the truth. Did you two have a fight or something?\"\n\nMalice shakes her head. \"No. I know the stories of many relatives succumb to the forces of separation that are strong in our blood and get into terrible \nconflicts with each other. It is not the case with us. We just decided to split ways. She wanted to stay with the old order of things, while I chose to ride the \nnew. It is that simple.\"\n\n\"I understand. I see you have one of those necklaces I was warned against wearing,\" ${astra} notes.\n\n*if necklace\t\n\t\"Just as you do,\" Malice replies.\n\t*set rel_malice +1 \n\t\n\t\"I thought you could tell me more about it.\"\n\t\n\tShe shrugs. \"As a demon, I am used to respecting a hierarchy. This token makes me feel my new mistress in a much better way. That's it. I guess those who spoke \n\tagainst it are just afraid, and I am not. We demons like playing with fear, I would argue.\"\n\t*goto malice2 \n\t\n*else \n\t\"And you don't.\" She notices. \"This token makes me feel my new mistress in a much better way. That's it. I guess those who spoke \n\tagainst it are just afraid, and I am not. We demons like playing with fear, I would argue.\"\n\t*goto malice2 \n\t\n*label malice2 \n*page_break\n\"Look, there is something going on out there.\" You point out at a ramshackle cottage about a hundred feet away from you. \n\nMalice turns around. \"I can't believe they are doing that again,\" she seethes, her blood starting to boil.\n\nYou see a couple of young knights shoving a youngster in his late teens and nudging him inside. \n\n\"What is going on?\" you ask. \n\n\"Those bastards who are supposed to be royal knights have come again to make fun of the stable apprentice. I can't stay to the sides any more.\"\n\nYou can see her expression changing and even more, it seems she is transforming into something that is closer to her native form. \n\n\"They are going to pay with their blood!\" she hisses.\n\nNow she is more like the Malice you met before and certainly stands up to her name.\n\nWhat should ${astra} say to her?\n*choice\n\t#\"Malice, you shouldn't do it!\"\n\t\t*set rel_malice -2 \n\t\tShe looks at ${astra} with burning yellow eyes. \"And why should I not? I have seen knights being cruel to both our kind and theirs. Somebody should stand \n\t\tout and bring at least a bit of justice.\"\n\t\t\n\t\t\"But think about yourself, dear one. You may lose your cassock and be cast away. It seems you have finally found your peace.\"\n\t\t\n\t\t\"Nonsense! If I don't oppose them today when I am strong, they will probably come tomorrow, when I might be weak, and in greater numbers. This madness should be \n\t\tstopped. And if my mistress finds that the actions I am about to take make me unworthy, then she is unworthy of me too.\" She arches her back.\n\t\t\n\t\tWhat should ${astra} do?\n\t\t*choice \n\t\t\t*selectable_if (charm>2) #Persuade her not to do something she would regret\n\t\t\t\t*goto persuade \n\t\t\t\n\t\t\t#Join her \n\t\t\t\t\"I understand. You should not stand together in this fight, sister.\"\n\t\t\t\t*set rel_malice +3\n\t\t\t\t*goto fight_together \n\t\t\t\n\t\t\t#Let her go\n\t\t\t\t*goto lethergo\n\t\n\t#\"Maybe you should file a complaint.\"\n\t\t*set rel_malice -1 \n\t\t\"I don't have the patience for that. Whatever they are going to do to this fellow boy, it would happen anyway. Besides, I don't trust the system. Often times it would \n\t\tshield the royal knights so as not to spoil their reputation. That option is not acceptable to me.\"\n\t\t\n\t\tWhat should ${astra} do?\n\t\t*choice \n\t\t\t*selectable_if (charm>2) #Persuade her not to do something she would regret\n\t\t\t\t*goto persuade \n\t\t\t\n\t\t\t#Join her \n\t\t\t\t\"I understand. You should not stand together in this fight, sister.\"\n\t\t\t\t*set rel_malice +3\n\t\t\t\t*goto fight_together \n\t\t\t\n\t\t\t#Let her go\n\t\t\t\t*goto lethergo\n\t\t\t\t\n\t#\"You shouldn't stand alone in this fight, sister!\"\n\t\t*set rel_malice +4 \n\t\t*goto fight_together\n\t\t\n*label lethergo \n*set trouble true \n${astra} watches as the furious Malice approaches the cottage. She doesn't want to know what the demoness is going to do with them, but she knows it is not going to be \nsomething nice.\n*goto fork \n\n*label persuade\n*set rel_malice +1 \n\nMalice sighs. \"You may be right dear, I know that one should only strike when certain the war can be won. One day, it will be the case and I swear I will prepare \nfor it. Then, there will be no escape from my vengeance.\"\n\nThe demoness sits on the ground and starts weeping. ${astra} tries to comfort her, but doesn't provoke any reaction.\n*goto fork \n\n*label fight_together\n*set trouble true \n\n\"It would be an honor to fight by your side,\" Malice says. \"Any preferences regarding how to do it?\"\n\n${astra} takes a moment to think \n*choice \n\t#Use physical force \n\t\t*set fight_together true \n\t\t\"My weapons are ready! Actually, do you want one of my daggers?\" ${astra} asks.\n\t\t\n\t\t\"Nope, I have my nails and teeth.\" Malice says with determination that makes ${astra} thankful that the demoness is her friend and not foe.\n\t\t*page_break\n\t\tMalice enters the cottage first and finds one of the knights holding the collar of the stables apprentice, and the other one \n\t\tstanding right beside them. She attack with a blinding fury, closely followed by ${astra}, twin daggers in her hands. \n\t\t\n\t\t*if physique>2 \n\t\t\tBefore they manage to take their weapons out, the two knights suffer so much damage that they decide to run for their lives. Malice laughs \n\t\t\tafter them, taunting them with some curse in demonic. Then, she makes sure ${astra} was not wounded either.\n\t\t\t*goto apprentice \n\t\t\t\n\t\t*else \n\t\t\tThe two knights suffer a lot of damage, but one of them manages to take out his sword and inflict a wound on ${astra}'s thigh. Shortly after that, the \n\t\t\tknights flee for their lives. Malice laughs \n\t\t\tafter them, taunting them with some curse in demonic. Then, she pays attention to ${astra}'s wound. \n\t\t\t\n\t\t\t\"It is just a scratch,\" the woman explains. \n\t\t\t\n\t\t\tMalice shreds a piece of her cassock and uses is as a bandage. \n\t\t\t\n\t\t\t*set energy -1 \n\t\t\t(Energy-)\n\t\t\t*goto apprentice\n\t\t\t\n\t#Use magic \n\t\t*set fight_together true \n\t\t\"I think the knights may be good at physical combat, but what about challenging them with magical prowess?\" ${astra} suggests.\n\t\t\n\t\t\"I like the way you think.\" Malice smiles. \"I can sense your latent magical abilities too. I doubt you can awaken them, can you?\"\n\t\t\n\t\t\"I was actually thinking about your demonic powers. I am sure you can pull a trick or two.\"\n\t\t\n\t\t\"I am not sure I am as skillful in that as some of my sisters, but with your help, I think we can come up with a show they will remember. Just hold my hand and \n\t\ttrust me,\" Malice says.\n\t\t\n\t\t\"I think I can easily do that,\" ${astra} replies.\n\t\t*page_break\n\t\tMalice and ${astra} enter the cottage and find one of the knights holding the collar of the stables apprentice, and the other one \n\t\tstanding right beside them. The demoness whispers something and hell breaks lose. The cottage gets on fire and a horde of tiny demons surround the knights.\n\t\t\n\t\t*if magic>1 \n\t\t\tCreepy voices call their names and speak of the terrible things that will be done to them when their souls reach the purgatory. The knights\n\t\t\tflee for their lives. Malice laughs \n\t\t\tafter them, taunting them with some curse in demonic. Then, the illusion fades away.\n\t\t\t*goto apprentice\n\t\t\t\n\t\t*else \n\t\t\tOne of the knights manages to see through the illusions. He takes out his sword and before ${astra} manages to dodge, it bites her thigh. Malice summons \n\t\t\ta horde of infernal bees and this is the point when he decides to join his comrade and both flee for their lives.\n\t\t\t\n\t\t\tMalice laughs \n\t\t\tafter them, taunting them with some curse in demonic, as the illusions fade away. Then, she pays attention to ${astra}'s wound. \n\t\t\t\n\t\t\t\"It is just a scratch,\" the woman explains. \n\t\t\t\n\t\t\tMalice shreds a piece of her cassock and uses is as a bandage. \n\t\t\t*set energy -1 \n\t\t\t\n\t\t\t(Energy-)\n\t\t\t*goto apprentice\n\t\t\n\t\n\t*selectable_if (will>2) #Use cunning \n\t\t\"Actually, maybe there is no need to fight. Those knights are men and we are women. Quite attractive, I would say.\"\n\t\t\n\t\tMalice smiles as ${astra} continues her explanations. \"These robes get quite transparent when they get wet, don't they?\"\n\t\t\n\t\t\"They do.\"\n\t\t\n\t\t\"Show me!\" ${astra} orders.\n\t\t*page_break\n\t\tMalice enters the cottage first and finds one of the knights holding the collar of the stables apprentice, and the other one \n\t\tstanding right beside them.\n\t\t\n\t\t\"I am sorry guys, I didn't mean to interrupt you, but I really need help.\"\n\t\t\n\t\t${astra} comes in too and wraps her hand around Malice's shoulders. The drops of water falling on the floor break the silence. \n\t\t\n\t\t\"We were looking for the stable apprentice, but I think those two guys may actually do a better work, don't you think, sister?\" ${astra} feels like \n\t\ttheir ogling stares can actually pierce through their wet clothes. \n\t\t\n\t\t\"I don't know. I think they are quite handsome and seeing them in action is going to be quite rewarding, but will they be able to handle it?\" Malice \n\t\traises her eyebrow.\n\t\t\n\t\t\"I think we should test them. I bet we are going to have the time of our lives together. What would you say boys, are you up to it?\" ${astra} winks at them.\n\t\t\n\t\tThe knights just nod. It seems that the show the ladies are putting on has rendered them speechless. \n\t\t\n\t\t\"That is very nice, you have no idea how happy we are. Please, meet us here right after sunset. Now, kind gentlemen, if you would excuse us, we would \n\t\tlike to speak to the apprentice. Alone!\" Malice makes a theatrical gesture for then to leave and they do. \n\t\t\n\t\t\"Sheep!\" she whispers under her nose.\n\t\t*goto apprentice\n\t\t\n*label apprentice\n*page_break\n${astra} and Malice approach the apprentice. He steps back and cowers.\n\n\"Do not fear. We are not here to hurt you,\" ${astra} says.\n\n\"But what you did to them...\" he staggers.\n\n\"It was only a trick to make them go,\" Malice explains. \"Did they hurt you?\"\n\n\"No... they never did, but they would frighten me and it seems they would find that funny.\"\n\nMalice puts her hand in her pouch attached to her belt and takes out a big coin. \"This is for you. Spend it for something that brings you fun.\"\n\nThe young man takes it with trembling hands. \"You are so kind, lady. I don't know how to repay you.\"\n\n\"You already did,\" Malice whispers. \"You silently urged me to awaken who I really am.\"\n\n${astra} gapes in awe as the demoness turn her back and leaves the cottage.\n*goto fork \n\n*label prelate \n*set fork +1 \nIt seems that the royal guards are well aware that Chiera awaits you in her chambers since they put their halberds away as they see her, and some even \nshow her the way she should go.\n\nShe enters the throne room and the beauty of the ornaments stuns her. Stained glass covers all the walls, depicting scenes of angels spreading blessings to the world, \nhealing the wounded or fighting demons. ${astra} can't help but think how good it would be if she was able to come here more often.\n\nAnd there she is, sitting on the throne, Prelate Chiera in all her glory. She claps and gives an order to be left alone. Reality shifts for a second and ${astra} is able to \nsee the truth for what it is. \n\nWhere should she look?\n*choice \n\t#At whomever the order refers to \n\t\t${astra} notices six translucent figures as they start moving, heading for the door. She freezes in horror as she realizes there was no way for her to spot them \n\t\tuntil they changed their position.\n\t\t\n\t\t\"What are these being?\" She asks Chiera.\n\t\t\n\t\tThe Prelate ch
