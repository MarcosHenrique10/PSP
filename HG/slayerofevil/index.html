<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Slayer of Evil — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "slayerofevil", "title": "Slayer of Evil", "scenes": {"astra": "Her eyes engulf the image of the planet projected on the wide screen. Her spaceship is approaching it and it is easy for her to enjoy the view of the clouds hiding a lot of land, but still allowed her to see a few seas and an ocean.\nThat planet has less water than what she is used to, but she is sure she will find its beauty more than worth the trip to here.\n\nShe feels a gentle chill on her forehead, which shows that somebody is trying to establish a telepathic communication with her. The energetic blueprint shows that it is her dearest friend.\n\n\"Hey, Netho, I wish you were here with me. It has been quite a while since we had an exploration adventure with me,\" she welcomes him warmly.\n\n\"I am sorry...\"\n*choice \n\t#Plea \n\t\t*set astra \"Plea\"\n\t\t*goto y\n\t\n\t#Astra\n\t\t*set astra \"Astra\"\n\t\t*goto y \n\t\t\n\t#Vivian \n\t\t*set astra \"Vivian\"\n\t\t*goto y \n\t\t\n\t#Another name \n\t\t*input_text astra \n\t\t*goto y \n\t\t\n*label y\n\"${astra}, I was busy and couldn't receive your invitation in time. One of my crew members got into a lot of trouble and I had to help him out... the hard way.\"\n\n\"Oh, I am sorry about that. I hope it went well.\"\n\nNetho sighs. \"Well, I had to end up intervening in his situation. I bet I accepted some of his karma. The Commander will want to deliver one of her lectures.\"\n\n\"Are you afraid of her reaction?\" ${astra} enquires.\n\nNetho laughs. \"Not at all. She is a very kind and caring woman. I feel very lucky to be in her squad. Now, would you like to tell me something more about this planet you are about to explore.\"\n\n\"Well, it looks very much like Gaia, the last one I went to. There humans who are not very advanced but it seems they have some magical powers and I would be very happy to get to know them. \"\n\n\"Did you manage to look at the timelines?\"\n\n\"Well, only the basics,\" ${astra} admits. \"I know the chances of me surviving this mission are well within the advised. You know that going too deep deprives you from valuable experience. \"\n\nNethos sighs. \"I know that, dear one, I just want to make sure you are safe and sound. And possibly that no blonde hair falls from your head.\"\n\n\"Thanks for caring. I can only assure you that the feelings are mutual. I am preparing to enter the atmosphere...\"\n\n*page_break\nThe Commander enters the room and finds Netho in distress.\n\n\"What happened?\" she asks him.\n\n\"${astra} just entered that planet and I lost telepathic signal with her. The ship's intellect shows that her body variables suggest that she is in perfect shape, only that she...\"\n\n\"...has forgotten. That planet has a veil of oblivion. She has forgotten who she is but she will remember as time goes by. I can assure you that this one is not very strong.\"\n\nNetho shakes his head. \"But she will be very vulnerable until that happens. Can I please go there and pick her up?\"\n\n\"You don't want to go there and forget too, right? I am very well aware of your feeling for her and I can assure you that I will go to the meditation room and have a thorough look at her timeliness to be able to assess the risk she will face.\" She puts her hand on his shoulder. \"I know you love her very much. Please, don't be overprotective of her, you will only save her from valuable experiences. She is a warrior. You are not going to get confused by her sweet looks, are you?\"\n\nNetho shakes his head. \"Forgive me for my weakness, it is truth that I value her much. But I do know what strength of spirit and will she possesses and I trust that she will be able to face the perils that will come before her. I will keep an eye on her as much as I can.\"\n\nThe Commander smiles. \"It is always a pleasure to watch the two of you talk about each other. Hm, sorry to change the topic, but should I begin to tell you how wrong it was to go out of your way to save your protege earlier today?\"\nNetho shakes his head.\n\n\"Just as I thought. I bid you peace.\" She leaves the room.\n*goto 1\n\n*label 1\n*page_break\n${astra} opens her eyes and stands up. She has no idea how she ended up being on the floor, where or even who she was, but she has the feeling that she is in a safe place. Maybe everything will become clear, she hopes.\nShe hears a voice that startles her for a second, but then she is able to laugh at that reaction of hers.\n\n\"Miss ${astra}? Are you alright? All the telemetric data suggests you are in good health, but the failure to explain why you had that seizure worries me.\"\n\n\"Who are you?\" she asks with a smile in her face, as if expecting somebody to come out from inside the control cabin.\n\n\"I am the AI of the ship. My task is to assist you with the exploration of the planet you chose to be the next in a long series. To those who love you, you are known as a selfless explorer who usually works alone.\"\n\n\"What are our names?\" the woman asks.\n\n\"You can call me just ET, I don't need a name to be what I am. And, you are known as ${astra}.\"\n\nThe woman repeats, as if trying to awaken disabled neural connections. \"What about this suit, what does it do? I guess I see a pistol on the belt as well as a... handle or something.\"\n\n\"You have a self recharging laser hand arm which is a medium range, medium damage weapon. The handle you refer to can instantly turn into a light weapon capable of dealing enormous amounts of damage at melee range. What you don't see but may come handy is the healing bot device that may repair non-organic tissues such as the spaceship we inhabit or the suit you are wearing. There is also a stealth kit that may make you invisible for short periods of time, a tool for dealing with locks and an augmenter of your power of will. \"\n\n\"It seems I came prepared.\" ${astra} massages her temples. \"But why don't I remember.\"\n\n\"Some planets are surrounded by what we love to call a veil of oblivion. When you enter you temporarily forget just about everything. That disconnection can not last forever, it id little more than a temporal shock, yet it can lead to certain limitations.\"\n\n\"That pistol seems so alien to me. It is as if I never fired it.\"\n\nET laughs. \"Oh, trust me, you were good at it. The more you train any of your abilities, the more of your expertise you would pool through the veil. And, some of them were only vaguely covered by it, the ones you were best at.\"\n*goto 1114\n\n*label 1114\n*page_break\nYou can choose two skills in which ${astra} is an adept among stealth, marksmanship, physique, lockpicking, will, magic  and charm. \n*goto 111\n\n*label 111 \n*page_break\nYou can choose ${spread} more skill(s) in which ${astra} is an adept.  \n\n*if (spread=0)\n\t*goto 112\n\t\n*else\n\tWhich stat would you like to increase now?\n\t*choice\n\t\t\t*selectable_if (stealth\u003c3) #Stealth\n\t\t\t\t*set stealth 3\n\t\t\t\t*set spread -1\n\t\t\t\t*goto 111\n\t\t\t\t\n\t\t\t*selectable_if (marksmanship\u003c3) #Marksmanship\n\t\t\t\t*set marksmanship 3\n\t\t\t\t*set spread -1\n\t\t\t\t*goto 111\n\t\t\t\t\n\t\t\t*selectable_if (physique\u003c3) #Physique\n\t\t\t\t*set physique 3\n\t\t\t\t*set spread -1\n\t\t\t\t*goto 111\n\t\t\t\t\n\t\t\t*selectable_if (lockpicking\u003c3) #Lockpicking\n\t\t\t\t*set lockpicking 3\n\t\t\t\t*set spread -1\t\t\t\t\n\t\t\t\t*goto 111\n\t\t\t\t\n\t\t\t*selectable_if (will\u003c3) #Will\n\t\t\t\t*set will 3\n\t\t\t\t*set spread -1\t\t\t\t\n\t\t\t\t*goto 111\n\t\t\t\t\n\t\t\t*selectable_if (charm\u003c3) #Charm\n\t\t\t\t*set charm +1\n\t\t\t\t*set spread -1\t\t\t\t\n\t\t\t\t*goto 111\n\t\t\t\t\n\t\t\t*selectable_if (magic\u003c3) #Magic \n\t\t\t\t*set magic 3 \n\t\t\t\t*set spread -1 \n\t\t\t\t*goto 111 \n\t\t\t\t\n*label 112\n${astra} takes a look at the monitor showing the world outside. \"There is something pulling me out, not that I don't like your company.\"\n\nET chuckles. \"Of course, dear one, you came here to explore and the veil can't really make you forget about that. Before you came here, you could reach me telepathically and you had such a link to so many of your brethren. Now, that ability is disabled for the time being but I believe that it is temporal and if you reconnect with the power of your will, you would be able to get over that obstacle at times. Remember that you are never alone, even if you feel that way.\"\n\n\"You really are a sweet guy, aren't you? What can you tell me about what awaits me outside.\"\n\nThe artificial intelligence coughs. \"I was not designed to be immune to flattery, so I do appreciate the kindness of your words. Now back to your question, there is an interesting castle to the East, a human settlement to the North East, an insectoid hive to the West and an abandoned research facility next to a mine that is no longer used. I can fly you to whatever point you would like.\"\n\n\"I want to start with the castle,\" ${astra} says.\n\n\"So be it. Hold on tight, dear one.\"\n\nThe woman almost doesn't feel it as the spaceship hovers over the land and slowly approaches the massive building. As she begins to see the details of the towering structure, she starts to marvel at its beauty. \"It reminds me of something but I can't put my finger on it.\"\n\n\"It is almost an exact replica of one you saw on your last mission on Gaia,\" ET helps her. \"It is yet to be uncovered why. I also believe that this curiosity was the main reason you picked that destination as your first target, even though you may not be consciously aware of it.\"\n\nThe spaceship lands and ${astra} suddenly finds herself out of the ship.\n\n\"ET, did you just kick me out?\" she asks while her lungs enjoy the freshness of the planetary air for the first time.\n\n\"No, it is not like that, dear ${astra}, maybe you have forgotten how some things work. I... will miss your churling,\" ET sobs.\n\n\"I will be back, as always,\" she says and moves away. ET deliberates the possibility of reminding her of those two times when she almost did not come back and had to be rescued, but decided that it would not serve her highest good and decides to just remain silent.\n*goto 5\n\n*label 2\n*page_break\n${astra} takes out the handle and for a second she fears that she won't be able to make it work, to propel the surge of energy to form the blade she needs. However, it does not take long for the well-trodden neural pathways to pierce the veil of oblivion.\nShe awes at the image of the long blade that appears before her eyes and she receives distant reminiscence of myriads of battles assisted by that blade.\n\nGetting through the door takes a bit of effort, but the blade is very sharp despite being amazingly light, She manages to make a hole in it big enough for her to go through.\n\n(Physique+)\n*set physique +1\n*goto 8\n\n*label 3\n*page_break\n${astra} takes out the gun and for a second she fears that she won't be able to make it work, to propel the surge of energy to make it fire. It does not even have a trigger! However, it does not take long for the well-trodden neural pathways to pierce the veil of oblivion.\nShe awes at the feeling of the fully charged weapon ready to cause havoc and she receives distant reminiscence of myriads of battles assisted by that gun.\n\nGetting through the door takes a bit of mental effort in order to adjust the width of the beam, but the it is very powerful and it cuts through the heavy wood with delicate easiness. She manages to make a hole in it big enough for her to go through.\n\n(Marksmanship+) \n*set marksmanship +1\n*goto 8\n \n*label 4\n${astra} gives out a cry of joy as she dumps into the moat. She remembers swimming so many times in a world she barely remembers now, the one she knows she comes from. Feeling the energies of the water and its inhabitants, she closes her eyes to embrace them fully while moving her arms and legs in order to keep on the surface.\nIt turns out it is a very deep moat. Her attempt to come down and step on the bottom leaves her fully under water, her hair remaining up on the surface, floating up as beautiful as the lilies.\nNot a long time passes before a couple of mini dolphin comes and start speaking to her in a language she unconsciously understands. They send her a telepathic invitation, one she can not resist. He laughter reaches the surface in the form of bubbles as she tries to catch the waterborn. \nWhen her playfulness is sated, she waves them goodbye and goes to the spot she mentally marked as an easy way to get out.\n\n(Physique+. Charisma+, Energy-)\n*set physique +1\n*set charm +1\n*set energy -1\n*goto 6\n\n*label 5\n*page_break\nAs she made her tentative steps towards the immense building, ${astra} enjoyed the contact of her feet with the soil, the gentle tickling of the consciousness of the planet. It seemed to her that it was trying to reach for her, to greet her and to wish her a nice stay, and to thank her for bringing a bit of the matrix the young woman is carrying with her into the planetary field.\n\n${astra} sees a beautiful moat with crystal clear water with myriads of water lilies ornamenting the surface in opalescent hues. A variety of fish comes up, inquisitively popping up. A miniature dolphin jumps up and chuckles.\nThe woman suddenly desires to jump down and take a swim.\nShould she go for it? \n*choice\n\t#Yes\n\t\t*goto 4\n\t\t\n\t#No\n\t\t*goto 6 \n\n*label 6\n*page_break\nShe crosses the drawbridge and comes to a heavy wooden door. Trying to attract any attention by shouting fails and she starts to consider other alternatives. Climbing over it seems too dangerous. Maybe it was a time for her to use her weapons to go through, the thought unlocking a bit of the warrior mentality in her. She also remembers ET telling her about her lockpicking tool embedded in her suit. \nSo what would it be?\n*choice\n\t#The sword\n\t\t*goto 2\n\t\t\n\t#The handgun\n\t\t*goto 3\n\t\t\n\t#Or the master key\n\t\t*goto 7\n\n*label 7\n${astra}'s hand touches the keyhole and the very thought of it makes the master key come out of her sleeve and into it. It takes a few seconds of intense humming and vibrating before the click is heard and it retraces back.\nThe door opens with a nerve shattering noise and ${astra} enters the castle.\n\n(Lockpicking+)\n*set lockpicking +1\n*goto 8\n\n*label 8\n*page_break\n${astra} enters the huge inner yard and her peripheral vision acknowledges the different buildings cuddling into each other and dominated by the keep.\n\nBut she is mainly focused by the figure dressed in black that steps up, as if she was standing there, waiting for her. A white cloak hides some of her features, but yet it reveals a good-looking woman seemingly older than ${astra} with hair that was raven but beginning to gray in places.\n\n\"Welcome to my castle, dear one. I am Chiera and you became my guest by entering.\"\n\n${astra} introduces herself and greets her the way she traditionally does by putting her hand on her heart area and extending it in front of her. The older woman responds with a smile and a nod.\n\n\"From my watchtower, I saw your flying vehicle land nearby and it sparked interest in me. It is something I don't see every day. It also reminded me how we came to be here. But, please, before we continue our conversation, tell me why you are here.\"\n\n\"I just want to explore and experience and bring back home news and stories from this beautiful place. Right now, I have very little awareness of what home is or where it is situated, but it seems the spaceship computer knows that and this makes me feel calm.\"\n\nChiara sighs. \"You always carry your home with you wherever you go, it is the part in you that nobody can deny you or strip off you. And that veil of oblivion we experience here is much weaker than what I have experienced in other places. It will expire, of which I have no doubt, especially now that I feel the power in you.\"\n\n\"I hope so. I don't like. I mainly know that I was in harmony with who I am and surrounded... no it is not the right term, I would say connected to a lot of beautiful people.\"\n\n\"This is very good, dear ${astra}. Then, I can say that you entered this world in a far better condition than me and my friends. Now I see an opportunity. Would you like to see, or rather participate in the events following our arrival here? You may help us see something we missed, to provide some time-lost healing.\"\n\n\"Sure, I would love to do that.\"\n\nAs quick as lighting, Chiera rushes ahead and puts a choker around ${astra}'s neck. \"I am sorry I had to do that, dear one. It will enable you to be sent you back in time and play the role of one of the local women here. It will also ensure me that you would not rebel against me after you go back... and it will feed me a bit of your energy every now and then.\"\n\nHer laughter sounds sinister to the ears of the young woman. \"Why did you have to do this to me. It was not nice. It is not how I would have welcomed you.\"\n\n\"I believe you, dear one. But it is nothing compared to how we were welcomed here. And, if you are here to have experiences, this is an interesting one you can have. Worry not, it will not disable any of your abilities unless you decide to attack me after you return from your journey back in time.\"\n\n\"You are not telling me the truth about the choker, I can sense that!\" The young woman shouts.\n\n\"That is right. The necklace keeps a dark secret but I will leave it to you to discover it. I will give you a clue, however. When it is hungry, it would prefer to feed on any magic stored in an item you may have on you rather than your own life force. And even if you remove it, which\nI doubt, you should be well protected for what comes next.\"\n\n${astra} knows that she would not be able to remove the choker right now. Would you want her to try?\n\n*choice\n\t#Yes\n\t\t*goto 9\n\t\t\n\t#No\n\t\t*goto 10\n\n*label 9\nAs soon as her hands touch the choker, ${astra} feels pain and dizziness.\n\n\"Thanks for feeding me. I hope you try that again.\" Chiera laughs. \"Now, let the journey back in time begin.\"\n\n(Energy-)\n*set energy -1\n*goto 15\n\n*label 10\n\"What? Aren't you even going to try to remove it?\" Chiera stares at her in awe. \"Too bad for me. You are beginning to scare me, and my interaction with you has only just begun. Anyway, let the journey back in time begin now.\"\n\n(Will+)\n*set will +1\n*goto 15\n\n*label 11\n${astra} decides not to succumb to the urge. She knows she is currently playing the role of a servant and so thus she is limited in her freedom to perform. In a moment, she fears she can be punished for her actions.\n\nShe also wants to believe that in the nearby future, she will have a better opportunity to help these puny creatures, hopefully when fewer people are around watching.\n\nIt seems that her mental activity attracts the attention of the being on the floor because it turn its head in the direction of hers. A pair of dark eyes embraces her and she feels the creature probing her soul with chilling tentacles. At that point, the interaction was not pleasant, but not malicious either, just a result of pure interest, and probably opportunistic intentions too.\n\nShe tries to ignore the feeling of the contact with the alien mind while waiting to see what happens next.\n\n*goto 12 \n\n*label 12\n*page_break\n\"Take them to the dungeon, Cornelius,\" the King shots his order.\n\nThe old mustached chief of the royal guards nods. \"Xavier, take the one next to you,\" he orders.\n\nA younger guard joins him and they push the shadowy entities in the direction where ${astra} is standing. It appears they are going through a door that is currently shut. The internal feeling of service to others suggest that she opens it in order to help the guards do their job. However, she is not sure it is any of her business to do so.\n\nWhat should she do?\n*choice\n\t#Open the door\n\t\t*goto 13\n\t\t\n\t#Rather not\n\t\t*goto 14\n\n*label 13\nThe guards don't react in any way to her attempt to facilitate their task and she feels pity for the shadowy beings that are taken down. However, her intuition tells her that she will meet them again.\n\n*goto 17\n\n*label 14\nXavier steps ahead to open the door and at that moment one of the creatures just swipes at him, sliding its sharp claw along the unarmoured neck of the young man. He wails in agony even though he only appears to have received a gentle scratch. It is as if this pain was introduced to him from an external source.\n\nCornelius kicks the dark entity and that prevents it from attempting anything else. Xavier claims that he is alright and apologizes for his vocal reaction, claiming that it comes down to him being surprised and nothing else.\n\nDeep inside, ${astra} knows that it is hardly the case. She feels pity for the shadowy beings that are taken down. However, her intuition tells her that she will meet them again.\n*set scratch true\n*goto 17\n\n*label 15\n*page_break\n${astra} finds herself sucked in a whirlwind of time-space matter and spat out in another time, but a very close place. The majestic interior of the enormous building she is in is absolutely gorgeous. She looks up and her jaw drops as she examines the golden incrustations. There are a lot of people around her, each of them busy with their own activities. And her surprise increases even further as she becomes aware that in the back of the large chamber there is a throne and the King is there.\n\nHer clothes feel different and she takes her time to examine them. They seem very worn out and with patches. The predominant color is white and there is also a lot of brown that looks almost bleached. It has nothing compared to the dresses she vaguely knew she was used to, but as ugly it was, it was actually quite comfortable and last but not least, it revealed her role in this timeline, a helping hand.\n\nSuddenly, a couple of guard rushes in, carrying two shadowy figures. They are pushing up a couple of skinny figures dressed in strange white cloaks. The guards clank their chainmail as they push the creatures ahead, then take out the swords from their sheathes and poke them to take a step ahead.\n\nThe creatures struggle to remain on their feet for a few seconds, then one of them falls to the ground.\n\n${astra} feels a rush of pity for them, especially the one that is obviously in such a dire state. That scene defies the very nature of what she believes in.\n\nShe finds a cookie in her apron and asks herself what if that creature is just out of energy and feels compelled to step ahead and offer the cookie.\nShould she do that?\n*choice\n\t#Yes\n\t\t*goto 16\n\t\t\n\t#No\n\t\t*goto 11\n\n*label 16\nThe woman decides to follow the urge of her intuition, knowing that the internal voice often speaks with more wisdom than any logics can. She is also not very good at ignoring the need for a soul in struggle that can be helped if only a little on the thorny path it has taken.\n\nIt seems that her mental activity attracts the attention of the being on the floor because it turn its head in the direction of hers. A pair of dark eyes embraces her and she feels the creature probing her soul with chilling tentacles. At that point, the interaction was not pleasant, but not malicious either, just a result of pure interest, and probably opportunistic intentions too.\n\n${astra} takes a deep breath and quickly takes the few steps that separate her from the shadowy beings. She knows she is going to be stopped very soon and is actually surprised to make it to them, crouching and putting the cookie in the hand of the creature on the ground. It looks at it with interest, even sniffs the air but it seems the scent tells nothing. It hides it under the cloak, probably intending to continue the research at a later time.\n\n${astra} is violently pulled back and shaken by a guard, an old one with a bushy moustache. Another one rushes in, but his intentions are different. \"Leave her alone, she did nothing to deserve that,\" whispers the charming newcomer. \n\n\"I will teach you a lesson in obedience, Roland, you need to respect the chief of the royal guards, but it is not the time,\" the old one mutters under his nose and walks away, leaving ${astra} in the arms of the handsome guard. He looks her in the eyes and bows, then takes her by the hand and escorts her to the corner of the chamber.\n\n*set compassion true\n*goto 12\n\n*label 17\n*page_break\nA fattish elderly woman approaches ${astra} and starts shouting at her. \"What do you think you are doing? I lose sight of you and you end up in the throne room! How cheeky of you! Now, be gone. There are dishes to be done in the kitchen and don't forget that the priest requested the aid of \"somebody with a keener eye sight than him.\" What are you waiting for?\"\n\n${astra} remembers that she is among the newest of the castle servants and she enjoys a relative freedom of movement and chores and she expects it to be so before what she is best at is discovered.\n*choice\n\t#Should she head for the kitchen\n\t\t*goto 20\n\t\t\n\t#or the chapel?\n\t\t*goto 25\n\n*label 18\n${astra} steps forward, her face just an arm's length away from the bars of the case. Faster than a lightning, the shadow figure that lulled her so near leaps in her direction.\n*if compassion\n\t*goto 19\n\t\n*else \n\t*goto 22\n\n*label 19\n*page_break\n\"Stop it!\" the other one shouts. \"The girl will be an ally, not food.\"\n\n\nAt that point, ${astra} can see the claws extending from the bars right to her face, but this is where they remain. She screams and runs up the winding staircase, her heart racing faster than her feet. \n\nAfter returning to the surface, she takes her time to catch her breath, then heads for the chapel\n*goto 25\n\n*label 20\n*page_break\n${astra} finds doing the dishes to be boring but the simple activities help her to free her mind and she finds the peace she discovers to be very refreshing.\nShe also carries out a few tasks for the chief and finds herself passing around the door leading to the dungeon a couple of times. Something draws her down there. She wants to visit the shadowy beings even though she may not be exactly permitted to do so.\n\nWhat should she do?\n*choice\n\t#go down there\n\t\t*goto 21\n\t\t\n\t#head for the chapel once her kitchen chores are over\n\t\t*goto 25\n\n*label 21\n${astra} makes sure nobody is watching as she enters the door leading to the dungeon. Every step of hers echoes as she descends a winding stairway, thankful that the guards do their job of making sure there are burning torches illuminating the way. \n\nThe place gives her the creeps and the smell is certainly one of the worst she has encountered in her life, however, at least she doesn't have to search for the shadow being because their cage appears to be right in front of her.\n\nThey see her and move a little, trying to see her better.\n\n\"Leave us alone, girl, we need to rest,\" the one who probed her mind says.\n\n\"Don't listen to her, just come close to the bars so that I can see you better,\" states the other.\n\nWhat should ${astra} do?\n*choice\n\t#go back up and head for the chapel\n\t\t*goto 25\n\n\t#fulfill the request of the second shadow being\n\t\t*goto 18\n\n*label 22\nThe twisted claws of the shadow being sink in her throat and she feels paralyzed while all her energy is sucked dry from her body. She sinks into a black hole. \n*goto_scene death\n\n*label 24\n*page_break\n${astra} enters the chapel and feels the serenity within, the shelter from the noises permeating the air outside. It feels like a sanctuary, but it is also a place of darkness, of suppressed oppression.\n\n\"I greet you, my child,\" says the priest and squints his eyes, trying to see her better. \n\n${astra} feels comfortable in his presence. He is very old, with a big white beard that makes her draw an unconscious comparison to the arch wizards she saw on another planet. His pale blue eyes silently tell her of a lifelong dedication to service to others, making them forget about their worries and helping them listen to the voice inside telling them who they really are. There is also this sadness within, of the constant battles with himself on the subjects of the religious teachings he delivers, who are not only inconsistent with each other, but often times in direct opposition of everything he stands for.\n\nThe woman feels amazement with her ability to soak in so much information about the nature of a human just by looking at their eyes, but deep inside, beyond the veil of oblivion, she recognizes that it is the training of a seasoned explorer, one whose eyes has seen more than others can in a single lifetime.\n\n\"Thank you for coming along. I would ask you to go through the library next to the altar. I am looking for the work of the famous exorcist, Brother Broenermann. It is called Light in the Darkest Hour and I think it will help me gain more understanding of the nature of the creatures that were captured recently. But before you do that, please, tell me what the cross you are wearing means for you.\"\n\n${astra} puts her hand around her neck and it is the first time she realizes that the choker that was put there as a beautiful slave collar has changed, transmuted into a long necklace, a delicate silver chain with an emerald cross attached to it. \n\nShe tries to dig deep inside, where the consciousness of the one who she is in this timeline hides, and she sees both answers hanging there, in the out of time, and she realizes it is up to her to decide on this answer.\n\nWhat should she reply?\n*choice\n\t#she is a believer\n\t\t*goto 32\n\n\t#she is not\n\t\t*goto 33\n\n*label 25\n*page_break\n${astra} gets out and into the internal yard of the castle, enjoying the playful kisses of the sun. The chapel is on the other side of it and she quickly marches in that direction.\n\n*if charm>1\n\n\tBut it is not long before she hears her name. Turning back, she sees Roland, the royal guard. He looks at her with the affection and admiration she would only associate with the admiration for a pagan goddess.\n\n\t\"Dear ${astra}, I do not wish to prevent you from doing your task. But, please, if you have a moment to spare, I would appreciate that.\"\n\n\tShould ${astra} listen to him?\n\t*choice\n\t\t#yes\n\t\t\t*goto 26\n\n\t\t#no \n\t\t\t*goto 27\n*else \n\t*goto 24 \n\n*label 26\nThey go behind one of the buildings nearby to enjoy relative privacy.\n\n\"I know that we are living in strange times and I am worried about your safety.\" He says to her. \"I want you to take these.\"\n\nRoland takes out his crossbow and dagger.\n\n\"But you may need them too. Besides, I am sure they would be better used by you.\"\n\n\"I know, but I can't be with you all the time to protect you and that thought is slowly killing me, dear ${astra}.\"\n\nThe look in his eyes is desperate.\n\nShould ${astra} take the weapons?\n*choice\n\t#yes\n\t\t*goto 28\n\n\t#no \n\t\t*goto 29\n\n*label 27\n\"Why do you always have to be like that? I try to be nice with you, to open my heart, and you keep running away. You are breaking a heart so full of love, and if you could only tell me why?\" He says.\n\n\n*set well true\n\nWhat should ${astra} do?\n*choice\n\t#listen to him after all\n\t\t*goto 26\n\t\t\n\t#continue her way to the chapel\n\t\t*goto 24 \n\n*label 28\n\"Thank you very much, Roland. It is a kindness I am not used to receiving,\" she says as she puts the dagger in her sock. \"Where can I hide the crossbow, though?\" She chuckles.\n\n\"You can use the straps to attach them to your thigh and hide it under the skirt. I guess it won't be very convenient but it will always be within an arm's reach.\"\n\n\"Alright, would you please turn around so that I can actually do that without letting you see what you are not supposed to?\" She asks with a smile.\n\n\"Oh, yeah, sure, I am sorry.\" He fulfills her request.\n\n${astra} could almost feel Roland's desire to peek back, however, his will is adamant.\n\n\"Now, you can turn around, I am ready.\" ${astra} holds his hand and gives him the smile of his life. \"Thank you very much, I will never forget what you did for me. Now, I have to go, but I am sure we will meet soon.\"\n\nHe just nods. As she leaves, ${astra} can feel his eyes devouring her. \n\n*set arms true\n*goto 24\n\n*label 29\n\"Why not, dear ${astra}? I think what I am proposing makes perfect sense to me. What is the logic behind this?\"\n\nWhat would be the answer?\n*choice\n\t#\"I can take care of myself and I don't want to feel an obligation to you.\" \n\t\t*goto 30\n\n\t#\"I care about you.\"\n\t\t*goto 31\n\n*label 30\n\"You are not going to tell me that you believe me to be defenseless only because I am a servant woman and you are a shiny royal guard, aren't you.\"\n\n\"I know that, ${astra}, I can feel your strength, and yet I don't want you to underestimate the potential dangers. What if there are other of those shadow beings? What if you happen to meet any of them. I would never be able to forgive myself for not offering you weapons.\"\n\n\"If my path crosses theirs... I will be careful, I promise. Now that you have offered me the weapons, there would be no point in feeling bad now that you have done so. However, it is the right of my free will to refuse and this is what I am doing right now.\"\n\n\"Oh, ${astra}, you can be so stubborn at times. I often see it as a sign of strength and it is one of the reasons I love you so much. You mentioned me being a guard in shining armour. That may be right, but there is nothing shiny about the pain I feel inside from the longing for you.\"\n\nThe woman sighs. \"I am aware of that pain and as illogical and cruel as it may seem, I would like to gently push you away, to tell you that this fire you feel inside must slowly be extinguished because there is no fuel for it in mine.\"  \n\nYou gain codeword Cold.\n*set cold true\n*goto 24\n\n*label 31\n\"You have a beautiful soul, Roland. If you die because you are defenseless, it would be as much of a loss for this world as if it happens to me. I don't want to carry this sin on me. I want you to be safe, dear one.\" She gently pushes his weapons back towards him. \"I will give my best to take care of me. You believe me when I say that I am not as defenseless as I seem, don't you?\"\n\n\"${astra}, your words touch me in a way that is very new. Thank you for being so considerate and caring. It is really hard not to love you.\"\n\nShe smiles. \"You deserve to be loved too. But you did not answer my question.\"\n\n\"Your strength and it is one of the reasons I love you so much. This is all I can say right now.\"\n\n${astra} nods. \"I need to go. Take good care.\"\n\n\"Sure, as long as you promise me to do the same.\"\n\n\"I gladly will.\"\n\n*set smile true\n*goto 24\n\n*label 32\n\"Yes, father, I believe in the Light hidden within the sacred books of the religion we share,\" she states boldly.\n\n\"I feel delighted to see in your eyes the fire I had when I was your age, when I was just beginning my studies, when I decided I wanted to be a priest. I need to share a secret with you. I know the role I play does not allow me any weakness regarding my beliefs, but I have the knowledge inside that I can trust you. And there is a burden I would like to share with you.\"\n\n${astra} laughs. \"You are talking about your doubts of the teachings you preach almost daily, the questions you perceive as shadows within the Light they say they are, but often times are not.\"\n\nThe priest raises his eyebrows. \"You read me like an open book, young one and saved me the trouble of explaining it myself, and you did so with words my failing mind could not. It is truly a miracle I am experiencing today.\"\n\n\"It is okay, Father. The path that I have taken is the one of picking out what fits your belief system and let that be the bricks. Then, build up on the collective belief of everyone who is religious and allow it to be your mortar. In this way, you can build an impenetrable fortress where no darkness can dwell.\"\n\n\"That makes sense. There is great wisdom in what you say, I feel much better.\"\n\n\"I am glad I could help.\"\n\n*set belief true\n*set fourone +1\n*goto 34\n\n*label 33\n${astra} takes a deep breath. \"I fear that you may hate me for what I will say, but I do not like the teachings of religion. There is certain truth out there, a narrow path of light surrounded by a lot of darkness. I do not doubt that walking on it would be a way many have chosen following their soul's dictates to grow and experience enlightenment. My intuition tells me you are like that. But is it not easy to slip away and fall for the dogmas of darkness? Is it worth taking those risks instead of searching for another means altogether?\"\n\nThe priest sighs. \"I spent all my life studying the holy book, using the teachings as a way to help my congregation be at peace and to find meaning in the daily problems they are facing. There is wisdom in what you say and it is a true that I have always been aware of the darkness within but it was my task to make sure I don't slip and make sure none of the souls entrusted to me does not either. I am surprised because very few people come to this level of understanding so early in life. You certainly did not.\"\n\n${astra} laughs. \"The way I see it, the age of 28 is adequate for all sorts of discoveries.\"\n\nHe nods. \"I agree, maybe it is my advanced age that is clouding my perspective. If you don't believe in the teachings of religion, what do you believe in?\"\n\nWhat should ${astra} say?\n*choice\n\t#\"I believe in myself.\"\n\t\t*goto 35\n\t\t\n\t#\"I believe in nothing.\"\n\t\t*goto 36\n\n*label 34\n*page_break\nIt doesn't take much time for ${astra} to find the book she is looking for, probably relying on her intuition. When she does, she and the priest have a little bit of a hard time working with it because ${astra} has a hard time dealing with the archaic language used and the priest just can't see some of the finer print.\n\nIt turns out that these creatures have been contacted before and they are can be very vile. The fact that they need to feed on people's energies makes them very prone to violent acts.\n\nWhen their nature was revealed, the question how they should be treated found different answers. Most people wanted to destroy them and to make the threat disappear. Some priests saw them as failed creations of god and wanted to help them go back to the right path.\n\nThat division resulted in a few priests being engulfed by the shadow beings but a few of the dark kin ended up successfully connected to the source of love and light we carry and avoid the need to feed on suffering.\n\nAnother thing that is worth noting that these creatures are not loved by the energetic field of the land and they need to constantly be spending energy on fighting a force that would seek to engulf and imprison them.\n\nAfter you are done, you bid the priest farewell and walk to the next destination, the infirmary.\n*goto 37\n\n*label 35\n\"Let me explain further. I may have to step on a couple of the basics of the religion you cherish, the fact that we are created by god and that he is loving in nature.\"\n\n\"This is correct as far as I am concerned,\" replies the priest.\n\n\"Wouldn't it be natural of a loving creator to make his children worthy, extensions of his love and mercy?\"\n\n\"That would make sense.\"\n\n\"The next step is where our beliefs take different steps. I believe in humanity, in the spark of god lying within everyone. We don't need to bend our knees to the creator, just as we don't do when we interact with the physical parents we have. We only need to look within to find the spark that shines within, to embrace the god we carry. Can you not feel it too, Father. You have spent countless years working on it, it must be easy for you to spot it.\"\n\n\"There is great beauty in your words, dear one. Yes, I can feel it and it brings me a harmony and sense of strength and purpose.\"\n\n*set oneself true\n*set fourone +2\n*goto 34 \n\n*label 36\n\"The path I have taken is one of denying religion lest fall for the tricky treachery inside. I chop wood and carry water, learning from the daily experience and finding out more about who I really am every step I take.\"\n\nThe priest sighs. \"I respect your choice, even though it means there is little I could do to help you with the acceptance of the tasks you are given. All I can say is that I hope this ideology brings you peace. As for me, I will continue searching for the answers that elude me.\"\n*goto 34 \n\n*label 37\n*page_break\nThere are a few patients in the infirmary and they suffer from various ailments. Fortunately, none of it seems contagious, so ${astra} does not need to worry about getting sick. She usually prepares concoctions prescribed by the chief healer, but sometimes when she is in the mood she can engage deeper and do things like preparing and changing bandages or cleaning wound.\n\n*if scratch \n\t*goto 38 \n\n*else \n\tWhat should ${astra} do?\n\t*choice\n\t\t#stick to the concoctions\n\t\t\t*goto 39 \n\t\t\t\n\t\t#help more\n\t\t\t*goto 40\n\n*label 38\n*page_break\n${astra} spots Xavier on one of the beds. The chief healer is next to him with a worried look on his face.\n\n\"I have never seen anything like it before,\" he explains.\"The guard has fever and we are trying to control it by putting wet bandages on his forehead. But this scratch really worries me.\"\n\n${astra} takes a closer look. It is exactly the place where the claw of the shadow being touched Xavier's skin. It is swollen but is also starting to wither, revealing green scales below.\n\nWhat should ${astra} do? \n*choice\n\t#try to help\n\t\t*goto 41 \n\t\t\n\t#stick to the concoctions\n\t\t*goto 39\n\n\t#help with the bandages\n\t\t*goto 40 \n*label 39\n${astra} really enjoys working with herbs. She cherishes the mixture of the scents. \n\nThe chief healer carefully writes the receipts she needs to mix and gives her the note. She takes it with a nod and rolls up her sleeves.\n*goto 43\n\n*label 40\n${astra} changes the bandages of a few patients suffering from various wounds. Even though fight are pretty rare in the area of the castle, there still are domestic, hunting and training incidents.\n\nThe patients are eager to chat with her, trying to soak a bit of the benevolent spark. She finds herself connecting better with the local people.\n\n(Charm+)\n*set charm +1\n*goto 43 \n\n*label 41\n${astra} places her hand on the wound and it instantly reacts by pulsing like a beating heart. She realizes that she can affect his condition with the force of her will, but is it going to be enough?\n\n*if (will+fourone)>2\n\t*goto 42\n\n*else\n\t*goto 43\n\n*label 42\n*page_break\n${astra} feels a surge of energy inflame in her chest and then slowly make its way to her hands and through her fingers. Xavier shakes when it reached his wounds and he starts talking in his sleep. A few of the scales fall and healthy skin starts forming immediately.\n\nThe guard remains sleeping and little else changes in his condition, but ${astra} knows that his ailment is over.\n\nThe chief healer looks at her with wide open eyes. \"How did you do that?\"\n\nThe woman just smiles and shrugs. \"I wish I could tell you more but what happens remains clouded beyond a thin veil of oblivion.\"\n\n\"You really need to come here more often, please,\" he tells her.\n\n*set healer true\n\nNow, what else should ${astra} do in the infirmary?\n*choice\n\t#Prepare concoctions\n\t\t*goto 39\n\n\t#Help with the bandages\n\t\t*goto 40\n\n*label 43\n*page_break\nWhen her duties in the infirmary are over, she bids the chief healer farewell and leaves the building. \n\n\"Ah, there you are!\" The overweight crone finds her again. \"I need you to run to the town market and get 5 kilos of apples. And hurry! The Lord wants apple pie for dinner. And don't forget to pick the mushrooms from the \nwoods. Now, go get them.\" She walks away, murmuring something.\n\n${astra} shrugs and starts her way down the road. She somehow knows the town is not far away and she is actually looking for a walk among nature.\n*page_break\n\"${astra}, is that you?\"\n\nShe hears a familiar soft voice. When she turns around, she beholds a handsome man with longish brown hair. His skin-tight costume looks funny, but outlines the body of a warrior. There is something very \nfamiliar about him but she can't remember.\n\n\"I couldn't recognize you in that dress, but I must admit you look very sweet in it. Anyway, I can't stay long. I was just worried about your safety.\n*if arms\n\tWell, I can see that you have found weapons. I know that you like wielding two weapons, so take this.\" The man produces a second dagger out of thin air. \"This one will not be in existence\n\tfor a long time, but I hope it will help you deal with dangerous situations. Unfortunately, I was able to spot quite a lot of those in the timeline you are in. And before I go, I should remind you that love is all there is and it is all I feel for you.\"\n\t*goto 431\n\t\n*else \n\tWell, I can see that you don't have weapons. I want you to have those.\" The man produces a pair of daggers and a crossbow out of thin air. \"They will not be in existence\n\tfor a long time, but I hope they will help you deal with dangerous situations. Unfortunately, I was able to spot quite a lot of those in the timeline you are in. And before I go, I should remind you that love is all there is and it is all I feel for you.\"\n\t*goto 431\n\t\n*label 431\n*page_break\nThe man slowly becomes more and more translucent and eventually disappears before she even gets the chance to say anything to him.\n\n\"Netho...\" she whispers, remembering his name. A tear finds its way down her cheek.\n*page_break\nThe town is bustling with activity and ${astra} finds it a very interesting site to explore. Two buildings in particular capture her attention - the cathedral with the majesty of its size and design and an abandoned inn radiating dark energy.\n\nShould ${astra} visit any of those before going to the market?\n*choice\n\t#Yes - the cathedral\n\t\t*gosub trial_end\n\t\t*goto_scene cathedral\n\t\t\n\t#Yes - the abandoned inn \n\t\t*gosub trial_end\n\t\t*goto_scene haunted\n\n\t#No - proceed to the market\n\t\t*gosub trial_end\n\t\t*goto 432\n\t\t\n*label 432\n*page_break\nIt takes ${astra} some time to find good looking apples and she does have to mention that they are for the Lord in order to make the trader let her pick up the best.\n\nOn her way back to the castle, she remembers the other task she is supposed to fulfil - picking up mushrooms from the forest. \n\nShould she do so?\n*choice\n\t#Yes\n\t\t*goto 44\n\n\t#No, pretend that she has forgotten about it\n\t\t*goto 50\n\n*label 44\n*set knowledge true\n\n${astra} feels very good making her way among the trees. Their energy surrounds her and greets her. The noise of the wind playing with the leaves whispers gentle words of welcome, recognizing her as a stranger but asking her to feel welcome here.\n\nAnd among the scene of divine harmony, an ungodly scene takes place. A scream makes ${astra} realize that something terrible is happening within sight. She beholds a shadowy being bended over a man in brown clothes. A crossbow shattered into pieces lies next to them.\n\nThe final cry of the hunter rips the air. What should ${astra} do?\n*choice\n\t#try to hide\n\t\t*goto 45\n\t\n\t#boldly approach the shadow being\n\t\t*goto 46\n\n\t#run away\n\t\t*goto 47\n\n*label 45\nThe creature of darkness looks in her direction, seemingly sniffing the air.\n*if stealth>1\n\t*goto 48\n\n*else\n\t*goto 49\n\n*label 46\n${astra} bravely steps up, tearing away from the grip of fear that was beginning to claw in her soul. She decides to get close to the monster, not knowing where this encounter will lead her. But she would not succumb to fear, never, even if it is the last thing for her in this life.\n\nThe shadow being notices her and gets up. His face is twisted in an unimaginable mixture of malice and hunger. It runs towards her, crouching for a moment, letting its tentacles touch the ground before he leaps at her.\n*if arms\n\t*if (physique+marksmanship)>4\n\t\t*goto 51\n\n\t*else\n\t\t*goto 52\n\n*else\n\t*goto 52\n\n\n*label 47\n${astra} throws the apples away and runs as fast as her body can take her, ignoring the alarm in her lungs telling her that she should let them filter more air if she is to continue pushing herself to the limits. Her chest starts burning like never before and the castle seems so far away.\n\n(Energy-)\n*set energy -1\n*if physique>1\n\t*goto 53\n\n*else\n\t*goto 52 \n\n*label 48\n*page_break\n${astra} manages to hide, becoming one with the forest. The shadow being spends a lot of time searching for her, sniffing the air. The heart of the woman beats very hard, but she manages to remain still.\n\nAfter what seems like eternity, the evil one leaves the place making gurgling noises.\n\n${astra} comes out of her cache and slowly makes her way back to the castle. Fear makes her dizzy; afraid that she may just pass out and then the shadow beats would find her and that would be the end of her. And she wanted to live.\n\nLuckily, she manages to reach the castle.\n*goto 50\n\n*label 49\n*page_break\nUnfortunately, ${astra} fails at becoming undetectable to the shadow being. When their eyes lock, she realizes she should try something else.\n\nWhat would it be?\n*choice\n\t#Boldly approach the shadow being\n\t\t*goto 46\n\t\n\t#Run away\n\t\t*goto 47\n\n*label 50\n*page_break\n\"You are late for dinner!\" cries the hag.\n*if apples_dropped \n\t\"And you failed to get the apples? Well, the Lord changed his mind, lucky you.\"\n\t*goto 501\n\t\n*else\n\t*goto 501\n\t\n*label 501\n*page_break\n\"Next time you do that you will go to bed hungry.\" She shows you a plate full of porridge and a bit of dry bread. \"Since nobody wants to do it and somebody should, you will be the one feeding the new prisoner.\"\n\n${astra} had been feeling very hungry and her mouth had been salivating ever since her eyes lay on the food, but the old lady's words made her forget about the dish. And, her maniacal laughter as she left the kitchen room only adds up to that.\n\nShe looks at the plate and is actually disgusted to find pieces of raw meat.\n\n\"Oh, gosh, what kind of creatures are those! If they can eat raw meat, maybe they can devour me too,\" she whispers to herself in sheer terror. She considers not obeying the mistress but she discards the idea. It wouldn't feel right. Also, the idea of taking fear influence her decisions was not very appealing either. She is not sure why exactly she was not willing to succumb to the very natural feeling that actually borders with self-preservation, but she decides not to think about it any more, just gets it over and away with.\n\nShe gets a lid to cover the pieces of meat and congratulates herself for the decision to do so because it gives off a slightly rancid smell. She certainly feels happy she is not the one expected to eat this questionable meal.\n\n${astra} goes out and heads for the dungeon. She passes by a guard and a closer inspection reveals that he is no other than Roland himself.\n\n*if cold\n\t*goto 56\n\t\n*elseif charm\u003c2 \n\tHe greets her, his eyes locking with her for a moment. Then, ${astra} continues on her way.\n\t*goto 58 \n\n*else\n\t*goto 57\n\n*label 51\n*page_break\n${astra} raises the crossbow and fires. She doesn't have much time to aim, so she does it on her instincts, summoning her mastery from the time before arriving to the planet. The weapon is quite different from what she is used to, but it still feels like an extension of her arms, an instrument that is quite deadly when wielded by a warrior like her.\n\nThe bolt hits the creature while it is airborne and pushes it away, making it fall to the ground with a loud thud. It wriggles in agony and darkness sprays through its wound.\n\n${astra} knows the wound is not fatal. She drops the crossbow to the ground and takes out the dagger, mentally thanking Roland for equipping her with weapons of war.\n\nThe shadow being stands up on its feet and tentacles. Knowing there is little time before it attacks her again. ${astra} takes the initiative and charges at it. The blade makes a long cut through the chests of the monster and completely removes a couple of tentacles with a single blow.\n\nShe doesn't know why, but at this point she knows its resistance is over. ${astra} wipes the dagger in the grass and returns it to her belt, then she picks up the crossbow and recharges it, only after that approaching the abomination lying helplessly on the ground.\n\nShould ${astra} finish the creature?\n*choice\n\t#Yes\n\t\t*goto 54\n\n\t#No\n\t\t*goto 55\n\n*label 52\n*page_break\nIt happens before ${astra} can react. The body that falls on her and knocks her on the ground does so with force that is unexpected for the shadowy body that the being possesses.\n\nShe tries to get up, but her injured brain hurts so much it is unable to send signals to the rest of her body. The woman loses conscious and is saved the experience.\n*goto_scene death \n\n*label 53\n*page_break\nThere are times when ${astra} thinks she can't take even a step further but she somehow keeps doing so. One of the biggest challenges is resisting the temptation to look back and see if the shadowy being is on her trails, but she decides to embrace that fear rather than risk her life further.\n\nHer running gradually gets to a state of a trance and she is a bit surprised when she finds herself in front of the castle. Only after she is behind its gates does she allow herself to catch up her breath.\n*goto 50\n\n*label 54\n${astra} tries to remain cold blooded as she pulls the trigger of the crossbow and sends a bolt into the chest of the shadow being, where the heart of darkness would be... provided that it had any.\n\nIt wails in agony, the shadowy silhouette turns into a whirlpool that in a blink of an eye dissolves into nothingness.\n\n${astra} tries not to give up to the thought of degradation that try to siege the fortress of her consciousness. For it is not easy for an empathic being like her not to feel a bit of the pain she caused. That may have been a heartless creature made of pure evil but the point of death is as ugly as any when a sentient being is involved.\n\nShe tries to tell herself that this world would be a better place without this creature and she manages to convince herself that this is indeed the case, and yet when she catches herself looking at her hands, it is hard for her to fully forget them for the suffering they caused.\n\nThe air feels strangely cold as she makes her way back to the castle.\n\n(Energy-)\n*set energy -1\n*set slayer true\n*goto 50 \n\n*label 55\n${astra} remembers the words written in the book she had to find for the priest. As soon as the creature can't fight the will of the planet to which is nothing more than an unwanted visitor, it is going to be a prisoner.\n\nThe woman doesn't want to do any unnecessary harm to a sentient creature. She did what she had to in order to ensure her survival and the last thing she would want to do is entangle herself with negative karma.\n\nShe looks with self-imposed indifference as it wails in agony, as the shadowy silhouette turns into a whirlpool of darkness that is quickly encased by a coffin of light and carried into the ground.\n\nThere is a part of her that wishes that there is some other way that would be more benign for the shadowy being but she knows there is not and it is not her fault that it chose to be a threat to the living consciousness of the planet.\n\nThe air feels strangely cold as she makes her way back to the castle.\n\n*set prison true\n*goto 50 \n\t\t\t\t\n*label 56\n*page_break\nHis eyes only briefly meet with hers and then he looks down, embarrassed.\n\n\"Are you okay, Roland?\" ${astra} asks with concern on her face. However, it seems her gentle voice only fuels his sadness, revealing the softness of her soul, the warmth he desperately wants to touch, while in the state of knowing that he can never have her.\n\n\"I wish to be alone ${astra},\" he says with a trembling voice.\n\n\"Is that so?\" she asks, knowing very well that it is not the case.\n\nHe shrugs. \"I will feel the pain no matter if you are close to me or not, so I guess it doesn't really matter.\"\n\n\"Oh, I am sorry. I am sure there will be another woman that will be better able to give you what you need. You deserve that and much more.\"\n\n\"You don't understand, do you? There is no other woman like you. You are the one.\"\n\n${astra} is shattered by the power of his words. Not knowing what to do, she decides to continue on her way, trying to forget about connecting with the awkward way Roland's feels about her.\n\n*goto 58\n\n*label 57\n*page_break\nRoland gives her a warm smile and holds her free hand with the gentleness of one touching the fingers of his most precious woman in the whole world. \n\n\"I have been missing you, dear ${astra}. I was praying that I would be able to see your beautiful eyes again today.\n\nThe woman laughs. \"It has been only a couple of hours since our paths crossed, but I am touched by your words.\"\n\n\"Even a quarter of that is too much for the eyes that are longing for you. Where are you going so late?\"\n\n\"I have to feed the shadow beings.\"\n\n\"That is insane! How can you be given such a dangerous task? That is preposterous!\"\n\n${astra} sighs. \"It is okay, Roland. I guess somebody has to do it. I will be alright, I promise.\"\n\nHis thoughts drift to another place. \"Do you have the time to watch the sunset with me. This is an experience I have been dreaming of sharing with you.\"\n\n${astra} smiles. \"Are you serious? What if somebody sees you leaving your post with me?\"\n\n\"That would be worth the risk. Besides, the trees in front of the castle offer a perfect hiding place. So worry not, my dear. Just tell me if you accept my offer or not.\"\n\n${astra} ponders for a moment. She knows where saying yes would lead to. Roland is a very attractive man and he really manages to awaken the feminine in her. If she is not ready for things to get serious with him, maybe it is a better idea to refuse.\n*choice\n\t#Agree\n\t\t*goto 59\n\n\t#Refuse\n\t\t*goto 60\n\n*label 58\n*page_break\n${astra} goes down the winding staircase and can't help but tremble, not sure the reason is the cold damp air. As she makes her way to the shadow beings, she suddenly feels a strong desire to check another cage. \n\nShe can't really put her finger on what attracts her attention. The cage is empty and there are no signs it was used recently. She tries to open the bar door but it us locked.\n\n${astra} takes a deep breath, not sure she wants to try to unlock the door. The distant wall can not be seen no matter how much she tries to illuminate it with the torch. She wouldn't like to dismiss the possibility of something lurking in the darkness, although she realized that such an assumption is more likely the result of the atmosphere of fear reigning here rather than any rational thought.\n\nWhat should ${astra} do?\n*choice\n\t#attempt to deal with the lock\n\t\t*goto 63\n\n\t#move away to the cage of the shadow beings\n\t\t*goto 64\n\n*label 59\n\"I bet that would be fun,\" she says with a smile, slightly blushing. \n\n\"I would certainly enjoy it,\" says the guard. \"Come with me.\" He winks at her and they head for the agreed place. They detour a bit, making sure they remain hidden in the shadows most of the time.\n\nThe space between the trees is tight and they had to be really close to each other to fit in. ${astra} feels intoxicated by his proximity. The view of the sunset is very beautiful, but all it does is bring the initial spark that starts the fire.\n\nThe woman soon finds herself in his arms, kissing him passionately.\n*page_break\n\"I am worried about your emotional state,\" says the Commander as she sees Netho watching the scene of ${astra} and Roland making out.\n\n\"There is no need for your concern, dear one. I know that she allows herself to have that experience mainly because she is under the influence of the veil of oblivion on the planet she is on. I cherish her adventures, my love for her is unconditional. When she remembers and if she decides to stand by my side as she is is supposed to be, I will accept her with open arms.\"\n\n\"There is much wisdom in what you say, Netho, you have learned the lessons of the heart very well. And yet, to tell me that you don't feel any pain, even buried below layers of knowledge, would be a lie to you.\"\n\nNetho, sighs. \"I have little else to add to that answer.\"\n\nThe Commander puts her hand on his shoulder. \"It is a great pleasure to see the love for her in the highest vibrations.\"\n*page_break\n${astra} puts her dress back on and tries to sort out her hair. \"I need to go to the dungeon.\"\n\nRoland gives her a kiss on her cheek. \"I will come with you. I think it is dangerous to be there alone.\" The woman starts saying something to her, but he interrupts her. \"There is no away I am going to let you go away from me tonight.\"\n\nShe smiles and kisses him back. \"I don't think I would love to do that either. So let's get down to the dungeon and get it over and away with. I can swear I can smell the raw meat even from below the lid.\"\n\n\"So, thank you for allowing me to accompany you, milady.\" He winks.\n\n\"I thought I was just a servant, while you are a royal guard.\"\n\n\"Trust me, you are the biggest royalty my heart knows.\"\n\n*set romance true\n*achieve romance \n*goto 58\n\n*label 60\n\"I am sorry, Roland, maybe some other time,\" says ${astra}.\n\n\"So be it, I will be waiting for you as long as it takes. But right now I am really concerned about your task at hand. I want to come with you.\"\n\n\"Come on, my friend, you are a royal guard. You are supposed to escort the blue bloods.\" She chuckles.\n\n\"Trust me, you are the biggest royalty my heart knows. What do you say about my proposition?\"\nShould ${astra} agree?\n*choice\n\t#Yes\n\t\t*goto 61\n\n\t#No\n\t\t*goto 62\n\n*label 61\n\"You really know how to make me special,\" says ${astra}.\n\n\"I feel this way too.\"\n\nYou gain codeword Escort.\n*set escort true\n*goto 58\n\n*label 62\n\"I can't do that, Roland, I am sorry. I can't have you deviating from your duties because of me.\"\n\n\"But I will be worrying about you, my dear.\"\n\n\"Sometimes one needs to face their fears and defeat them.\" ${astra} winks at him and continues towards the dungeon.\n*goto 58\n\n*label 63\n${astra} puts the master key in the lock and tries to make it click. However, the task proves to be more difficult than she expected.\n\n*if lockpicking>1\n\t*goto 65\n\n*else\n\t*goto 66\n\n*label 64\n*page_break\n${astra} reaches the cage of the shadow being. She is surprised to see them standing tall and somehow more powerful. There is something in their radiance that makes her step back and her hands carrying the meal to tremble, realizing that she has to get really close to them so as to be able to carry out her task.\n*if romance\n\t*goto 74\n\n*else\n\t*if escort\n\t\t*goto 74\n\n\t*else\n\t\t*goto 75\n\n*label 65\n${astra} manages to deal with the lock and door opens with a terrible sound. She walks in, the torch finally doing its job well enough to see the whole room and make the woman regret it. There is an opening in the corner and an enormous rodent peaks from it. When it realizes it has been spotted, it boldly steps ahead, revealing a muscular body covered in thick fur, which in combination with the set of serrated teeth makes it look threatening.\n*if romance\n\t*goto 67\n\n*else\n\t*if escort\n\t\t*goto 67\n\n\t*else\n\t\t*goto 68\n\n\n*label 66\n*page_break\nUnfortunately, as hard as she tries, she fails at unlocking the door. Having no other choice, she continues her way to the cage of the shadow beings.\n*goto 64\n\n*label 67\n*page_break\nRoland boldly steps up, trying to defend ${astra}. The rat pauses for a moment, not sure what to do, and then the guard even takes a step further, attacking him. The rodent dodges and prepares for an attack on his own. \n*if arms\n\t*goto 69\n\n*else\n\t*goto 70\n\n*label 68\n*page_break\nThe rat bows before ${astra} and starts speaking with a heavy accent.\"Welcome to our dwelling, goddess. I want to be of service to you.\"\n\nThe woman freezes in shock. The only thing she manages to utter is:\"What are you?\"\n\n\"I am Snitz, the high shaman of the mutant rats. Our elders predicted your coming this month, at this very place. Even I had my doubts but I kept coming here and I am very excited to meet you.\"\n\n\"I... I am afraid there has been some mistake.\"\n\n\"I doubt it. Nobody has come to this room for eons of time. You are our woman hailing from the stars. Is it not how you are called?\"\n\n\"My name is ${astra}... and indeed it means a star,\" she admits.\n\n\"The shaman in me is very sure the one from the prophecy stands before me,\" Snitz chuckles.\n\n\"What am I supposed to do according to the prophecy?\"\n\n\"You are going to give the signal to the other mutant rats to return to the surface and escape the hostile environment of the sewers we were forced to inhabit for about a century by the evil humans,\" the rat spits on the ground.\n\n${astra} takes a step back, uncertain if there was a hidden threat. \"But I am a human too.\"\n\n\"You are unlike any human I have sensed. You are special. This is why we waited for you to come, to bind our miserable past with the future promised to us.\"\n\n\"How can I do so?\" ${astra} wonders.\n\n\"By just putting on this ring when the time for us to come to the surface.\" Snitz produces a golden ring encrusted with a jewel out of nowhere and hands it to her. \"Please take it.\"\n\n${astra} stands in amazement, not sure what to do. \"How do I know it is the time?\"\n\nThe rat shrugs. \"The prophecy says nothing about it, I guess you are expected to know yourself.\"\n\n\"Oh, do I?\" She puts her hand on her mouth realizing she said something she shouldn't have.\n\n\"The prophecy is crystal clear about it. Now, please take the ring already, I want to go home and spread the good word.\"\n\nWhat should ${astra} do?\n*choice\n\t#refuse to take it\n\t\t*goto 71\n\n\t#accept it\n\t\t*goto 72\n\n\t#suggest that even though she can be a trigger, it is what they are capable of doing that is important, not her role\n\t\t*goto 73 \n\n*label 69\n*page_break\nRoland takes a step to the side and the rat's body misses it. The guard instinctively searches for his dagger, forgetting that it is not there. The valuable second he loses allows the rat to hit his feet with its tail and knock him down.\n${astra} charges from behind in an attempt to help Roland. The rat sees her and decides to leave the battle and flee using the tunnel it came from but not before biting Roland's shoulder.\n\n\"Are you alright?\" she asks the guard.\n\n\"Sure thing,\" Roland answers while checking his wound.\n\n\"Are you sure you had to attack it?\"\n\nThe guard looks at her confused. \"It looked like it was going to attack. I hate rats, their bite it terrible and I really hope my wound does not get infected.\"\n\n${astra} sighs. \"I want you to get to the infirmary as soon as we get back. And, you may be right, I wouldn't go as far as doubt your warrior's decisions.\"\n\nRoland gets up and takes ${astra}'s hand as they return to the corridor and continue their way to the cage of the shadow beings.\n*goto 64\n\n*label 70\nRoland takes a step to the side and the rat's body misses it. The guard uses the opportunity to take out his dag
