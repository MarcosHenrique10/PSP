er. That must be some sort of magic. \n\nShe hears footsteps. Someone is coming. What should she do?\n*choice\n\t#Use her tools to unlock the chains\n\t\t*goto chains\n\n\t#Wait\n\t\t*goto wait\n\n\n*label chains\n*set lockpicking +1\n(Lockpicking+)\n\n${astra} searches for the master key under her shirt and is quite happy to find it in the usual place. Her hands tremble a little and unlocking is a bit hard since her hands are restricted, but her training shows and she unlocks them really quickly.\nNow that she is unchained, what would be the next step? Whoever is coming will enter your cell soon.\n*choice\n\t#There is time to unlock the door of the cell\n\t\t*goto celldoor\n\n\t#Hide in the corner of the room. As soon as the stranger comes in, hit and run\n\t\t*set stealth +1\n\t\t*set physique +1  \n\t\t(Physique+, Stealth+)\n\t\t\n\t\tThe stranger appears to be a hunchback. He uses a key to unlock the door of the cell. Limping heavily, ${astra} almost feels sorry for him. She knows how hard life can be even when you are in perfect condition.\n\t\tThe hunchback is carrying a bowl of soup, probably for her.\n\t\t\n\t\tThis is certainly not the most honourable deed she did in her life but she is afraid that he could sound an alarm or something if \n\t\the has the chance. A single blow at the back of his head sends him unconscious on the floor. ${astra} leaves him there and goes in the direction he came from.\n\t\t*goto weaponry \n\n\t#Hide at the corner of the room. As soon as the stranger comes in, you sneak out\n\t\t*set stealth +2\n\t\t(Stealth++)\n\t\t\n\t\tThe stranger appears to be a hunchback. He uses a key to unlock the door of the cell. Limping heavily, ${astra} almost feels sorry for him. She knows how hard life can be even when you are in perfect condition.\n\t\tThe hunchback is carrying a bowl of soup, probably for her. He steps ahead, wondering where she is. Either his senses are as incapacitated as the rest of his body, or you are very skilled in the ability to move unseen.\n\t\tAnyway, ${astra} manages to sneak past him and head in the direction he came from.\n\t\t*goto weaponry \n\t\t\n\t#Just stay where she is, pretending she is still enchained, then take him by surprise\n\t\t*set physique +2\n\t\t(Physique++)\n\t\t\n\t\tThe stranger appears to be a hunchback. He uses a key to unlock the door of the cell. Limping heavily, ${astra} almost feel sorry for him. She knows how hard life can be even when you are in perfect condition.\n\t\tThe hunchback is carrying a bowl of soup. He approaches her and leaves the bowl on the ground. ${astra} senses that it is the perfect opportunity. The chains hit the floor a second before her fist connects with his forehead, her uppercut sending him flying backwards, unconscious.\n\t\tShe leaves the cell and head in the direction he came from.\n\t\t*goto weaponry \n\n*label wait\nWhoever is coming, ${astra} feels confident that she can manage to handle the situation despite your chains. She doesn't wait long before a hunchback figure of a man reaches the door of the cell and uses a key to unlock it.\nHe limps heavily and she almost feels sorry for him. She knows how hard life can be even when you are in perfect condition.\nThe hunchback is carrying a bowl of soup. He tries to tell her something but she can't make out the words. \n\nWhat is your plan?\n*choice\n\t#As soon as he comes near her, she should attack him with her legs\n\t\t*goto attackhunchback\n\n\t#Convince him to let her go\n\t\t*set charm +1\n\t\t(Charm+)\n\t\t\n\t\t\"Is that for me? Thank you very much, you are so kind!\" ${astra} says to him. The hunchback just moans, not accustomed to being treated so kindly.\n\t\t\n\t\t\"You have a kind heart. Was there enough soup for you?\" she continues with the most concerned tone she is capable of. \"You know,\" she looks into his eyes, \"you look beautiful!\"\n\t\t\n\t\tThis is enough to make him burst into tears.\n\t\t\n\t\t\"The keys, mind you.\"\n\t\t\n\t\tThe hunchbach wipes his nose with his sleeve and gives her the key, his emotional breakdown making him incapable of understanding what is going on.\n\t\t\n\t\t${astra} unlock your chains and head in the direction he came from, leaving him still crying in the cell.\n\t\t*goto weaponry\n\t\n\t#Do nothing, just let him go away\n\t\t*set energy +1 \n\t\t(Energy+)\n\t\t\n\t\t${astra} takes the bowl and thanks him with a nod. He just moans and leaves the room forgetting to lock the door of the cell. The soup is cold but really nutritious and delicious. It seems that somebody is making sure she remains strong. But why? \n\t\t${astra} guesses there must be something special about the soup, something...\n\t\t*choice\n\t\t\t#magical \n\t\t\t\t*set magic +1\n\t\t\t\t(Magic+)\n\t\t\t\t\n\t\t\t\tThe taste reminds her of the aroma of the crystal powder she used to gather from the mana mines not long. Her grandmother would add a spoon or two in your tea when she was sick.\n\t\t\t\t\n\t\t\t\t${astra} shakes her head. Could those memories be her own, or is it the timeline playing jokes with her?\n\t\t\t\t*goto findkey\n\t\t\t\n\t\t\t#charming \n\t\t\t\t*set charm +1 \n\t\t\t\t(Charm+)\n\t\t\t\t\n\t\t\t\tThe taste reminds her of the aroma of the forest chamomile she used to gather from the enchanted glade not long ago. Her grandmother would add a spoon or two in your tea when she was about to perform one of those holiday songs that \n\t\t\t\tmade hearts melt.\t\t\t\t.\n\t\t\t\t\n\t\t\t\t${astra} shakes her head. Could those memories be her own, or is it the timeline playing jokes with her?\n\t\t\t\t*goto findkey\n\n*label findkey\n*page_break\n${astra} feels refreshed but she doesn't want to spend eternity in the cell. She looks around and sees a keychain. The hunchback probably dropped it without noticing. She smiles and reaches for it with her foot, dragging it closer so that she can get it with her hands and unlock the chains.\nShe massages her wrist for a few seconds before setting off in the direction the hunchback came from.\n*goto weaponry\t\n\n*label celldoor\n*set lockpicking +1\n\n(Lockpicking+)\n\nQuick as a lightning, ${astra} uses the master key again. This time, she turn it around three times before she manages to unlock it, however, in terms of time, it is just three heartbeats. Now that the door is open, she has two alternatives:\n*choice\n\t#run in the direction of the steps to face whoever is coming\n\t\t*set physique +1\n\t\t(Physique+)\n\t\t*line_break\n\t\t${astra} runs into a hunchback. He seems so startled that he drops the bowl of soup he's carrying, probably to her. ${astra} doesn't need a lot of skill to hit him so that he falls to the ground (and remains) there.\n\t\t\n\t\tActually, she feels sorry for having to do that but otherwise he could sound an alarm (or something). \n\t\t*goto weaponry\n\n\t#run in the other direction and hide\n\t\t*set stealth +1\n\t\t(Stealth+)\n\t\t\n\t\tJust a few steps ahead, she sees a small alcove that provides you with the perfect opportunity to hide. She doesn't wait long before a hunchback figure of a man reaches the door of the cell and uses a key to unlock it.\n\t\tHe limps heavily and she almost feels sorry for him, know how hard life can be even when you are in perfect condition.\n\t\t\n\t\tThe hunchback is carrying a bowl of soup.\n\t\t*choice\n\t\t\t#as soon as he enters, sneak past him towards the entrance\n\t\t\t\t*set stealth +1\n\t\t\t\t(Stealth+)\n\t\t\t\t\n\t\t\t\tProbably the hunchback's sense of hearing is as incapacitated as the rest of his body... or ${astra} is an adept at moving quetly. She passes by the cell and head in the direction the hunchback came from.\n\t\t\t\t*goto weaponry \n\t\t\n\t\t\t#sneak towards him and hit him in the back\n\t\t\t\t*goto hitandrun\n\t\t\t\t\n*label hitandrun\n*set physique +1\n(Physique+)\n\nThis is certainly not the most honourable deed ${astra} has done in her life but she is afraid that he could sound an alarm or something if he \nhe has the chance. A single blow at the back of his head sends him unconscious on the floor. She leaves him there and go in the direction he came from.\n*goto weaponry  \n\n*label attackhunchback\n*set physique +2\n(Physique++)\n\nAs soon as the hunchback leaves the soup on the floor ${astra} springs from the ground and her feet clench his throat like a vise. She rotate, making his head connect with the wall. The man \ngives out a muted wail and passes out. She spots the key on the floor and reach for it, unlock the chains and leave the cell, heading in the direction the hunchback came from.\n*goto weaponry\n\n*label weaponry\n${astra} passes by an open door. The torch burning inside makes something shimmer. She takes a closer look. There is a couple of daggers inside! She enters carefully, expecting to see a guard inside but there is no one in. A whistle escapes your lips when you observe the variety of weapons lying in all sorts of racks. Apart from the twin daggers, there are at least three varieties of swords, a few maces, a couple of ornamented spears and even a battle scythe! You are not proficient with most of those, but the longbow hanging on the wall makes your heart sing. Reaching for your favorite weapon, you grab the...\n*choice\n\t#the pair of daggers\n\t\t*set physique +1\n\t\t(Physique+)\n\t\t\n\t\t${astra} really likes daggers. They are easy to handle and hide and can be just as deadly if used properly . While she doesn't often wield both blades at the same time, there are cases in which a thrown dagger really facilitates the task of dealing with enemies. These are really beautiful - with dragon encrusted handles and long and narrow blades.\n\t\t\n\t\tShe also takes the longbow and a quiver.\n\t\t*goto exit\n\n\t#longbow\n\t\t*set marksmanship +1 \n\t\t(Marksmanship+)\t\n\t\t${astra} really like longbows. She is enamoured with the idea of being able to strike at a target without it having the chance to retaliate. A bow saved her skin in a number of situations. This very weapon is a masterpiece with encrusted dragons and fairies. There is a quiver nearby to complement the bow.\n\t\t\n\t\tShe also takes the pair of daggers.\n\t\t*goto exit\n\n*label exit\n*page_break\n${astra} leaves the weaponry well armed and soon reach the stairway the hunchback must have come from. A current of fresh air coming from above makes her look up. There is an air vent wide enough for her to climb. It wouldn't be easy to do so, but she knows she can rise up to the challenge.\n*choice\n\t#climb the stairway\n\t\t*goto stairway\n\n\t#climb the vent\n\t\t*goto vent\n\n*label stairway\nThe winding stairway seems endless, each step up the same as the last. When it finally comes to an end, she appears to be on the ground level of a castle. The abundant light makes her squint her eyes for a few seconds before they get used to it. Your intuition tells you where the back exit is and you continue in that direction. A few corridors later you spot one of the guards in leather armour with a white tabard on it.\n\nShe decides that the wisest course of action would be to use the element of surprise and attack him. How would she do so?\n*choice\n\t#Shoot him with the bow\n\t\t*set marksmanship +2\n\t\t(Marksmanship++)\n\t\t\n\t\tHer next movements are executed with precision that comes from a lot of training. Her left hand reaches for the quiver on her back. Meanwhile, her right one grabs the bow itself. The arrow kisses the string for a fraction of a second, then it flies with a swish before piercing the throat of the guard.\n\t\t\n\t\tHe lands on the floor with a thud.\n\t\t*goto deadguard\n\t\t\n\t#Throw one of the daggers at him and then charge\n\t\t*set physique +1\n\t\t*set marksmanship +1\n\n\t\t(Physique+, Marksmanship+)\n\t\t\n\t\tHer next movements are executed with precision that comes from a lot of training. Her left hand touches the dagger for a fraction of a second before she sends it flying towards the target. She doesn't wait for it to sink into the throat of the guard, she just grabs the other dagger and charges.\n\t\t\n\t\tDespite the heavy wound, her opponent manages to pull his sword and even to sway it in her direction. She dodges without a problem. A couple of attacks later, he just collapses on the floor with a thud.\n\t\t*goto deadguard\n\t\n\t#Charge him, both daggers in hands\n\t\t*set physique +2\n\t\t(Physique++)\n\t\t\n\t\tHer next movements are executed with precision that comes from a lot of training. ${astra}'s hands grasp the daggers while she charges. He hardly manages to pull his sword out before she stings him with both of her blades. The wounds are superficial and she needs to do a lot of dancing (and slicing) before managing to put him down on the floor.\n\t\t*goto deadguard\n\n*label deadguard\n${astra} crouches over the guard's body and quickly search him for anything valuable. She finds...\n*choice\n\t#a keen dagger\n\t\t*set physique +1\n\t\t(Physique+)\n\t\t\n\t\tThe blade ${astra} finds around his waist makes her smile. It is longer than any she has seen so far, yet very light and quite sharp. She hides it under her cloak and continue on her way.\n\t\t*goto next \n\t\n\t#a quiver full of arrows\n\t\t*set marksmanship +1\n\t\t(Marksmanship+)\n\t\t\n\t\t${astra} doesn't take much time to study the arrows in the quiver she finds at the guard's back. She only notices that the feathers are winded in a funny way. She has only heard of such arrows and they are supposed to be of a very high quality.\n\t\t*goto next \n\t\n\t#a magical ring\n\t\t*set magic +1\n\t\t(Magic+)\n\t\t\n\t\tThe ring emits a strange red glow. ${astra} is not sure if it has any value but decides to take it and check later. Her neck tingles a bit at the place where the choker is but she disregards it and continues on her way.\n\t\t*goto next\n\n*label next\n*page_break\n${astra} is very close to the back exit. While it would be a great relief to leave the castle as soon as possible, her intuition tells her she might be able to obtain something valuable. \n\nWould you like her to swerve around the corner and head for the guest rooms?\n*choice\n\t#Yes, please\n\t\t*goto guestrooms\n\t\n\t#No, getting out as soon as possible seems wiser\n\t\t*goto out\n\n*label vent\n*set physique +1\n\n(Physique+)\n\nClimbing is definitely not easy without any equipment to help her. Also, the vent appears to be too narrow for her to be able to stretch properly. The good thing is that the slots between the stone blocks provide her with perfect opportunities to put her fingers and feet in. The ascent seems to last forever but when she sees daylight again, it is more than worth it. She squints her eyes for a few moments, allowing them to get used to it. When they do, she examines the surroundings. She is on the second floor.\n\n${astra} hears gentle footsteps coming from the stairway nearby and sees an elegant woman in an official black dress covered in runes. She seems to not have seen her, so she has a few seconds to decide what to do. ${astra} is trying to assess the situation. She has heard a lot about women wearing such attires. They are priestesses of the the Order of the Twilight, ones following both the healing and cleansing path of light and the destructive powers of the dark. Rumors are that it makes them perfect tortures, as they can easily cause pain, then heal the victim and repeat.\n\nWhat would ${astra} do? There is still enough time to hide. She can also attack her with her weapons. Or, if she is brave enough, she can just go down the stairs and talk to her.\n*choice\n\t#Attack her\n\t\t*set physique +1\n\t\t(Physique+)\n\t\t\n\t\t${astra} turns down the idea of using the bow. The priestess is too close to her. \n\n\t\tSo, she takes out her daggers and jumps down the stairs. The woman is unaware of her presence until the moment ${astra} virtually lands on her, sting her with both daggers and knock her down. Her head hits the wall behind her. Any normal human would be knocked out by now, but the priestess just looks at her with serene blue eyes and renders her motionless. She says a quick healing prayer and rises to her feet.\n\t\t\n\t\t\"So you are the one with the necklace,\" she comes closer to ${astra} and puts her hand on her cheek. \"Good luck!\"\n\t\t\n\t\tThe way she says it, however, makes her certain that there is nothing lucky about wearing that damned trinket around her neck.\n\t\t\n\t\tThe priestess ascends the stairs and ${astra} finds herself able to move again, so she heads for the back exit.\n\t\t*goto next \n\n\t#Hide\n\t\t*set stealth +1\n\t\t(Stealth+)\n\t\t\n\t\t${astra} hides behind the heavy draperies a few meters away from her, making sure her feet are not seen below it. She can still see as the priestess passes near her. ${astra} is pretty certain she notices her... Or rather feels her. She examines the draperies with her hypnotizing blue eyes but all she does before continuing on her way is crack a smile. What did she see? ${astra} doesn't know, but as soon as you she loses sight of her, she comes out of your hiding place and heads for the back exit.\n\t\t*goto next\n\n\t#Talk to her\n\t\t*set twilight_priestess_available true \n\t\t*set charm +1\n\t\t\n\t\t(Charm+) \n\t\t\n\t\tLater on, ${astra} gets surprised by the courage she demonstrates. At the time, however, nothing seems as normal as walking down the stairs and greeting the woman.\n\t\t\n\t\tHer blue eyes widen with awe. \"Oh, you are the one with the necklace. Good luck!\"\n\t\t\n\t\tThe way she says it makes her sure there is nothing lucky about that damned trinket.\n\t\t\n\t\t\"Can you tell me more about it?\" ${astra} asks.\n\t\t\n\t\tHer answer is a mischievous smile.\n\t\t\"No, I won't. But I can give you a present to help you a bit. But, know that my presents are always mixed with pain.\" The sparkle in her eyes reminds her that the one standing before her is more than a beautiful woman but a sadistic tormentor.\n\t\tWhat would you answer?\n\t\t*choice\n\t\t\t#Yes, please\n\t\t\t\tShe takes a ring from her thumb and hands it to ${astra}. The priestess's fingers are so tiny and delicate, ${astra} observes. She puts it around your finger and cries as she experiences a full second of excruciating pain.\n\t\t\t\t*set magic +1\n\t\t\t\t*set energy -1\n\t\t\t\t(Magic+, Energy-)\n\t\t\t\t\n\t\t\t\tWhat happens seems to be very amusing to the woman. The shock renders her stunned for a few moments, so she can ask no more questions. The priestess continues on her way. As soon as ${astra} recovers, she heads for the back exit.\n\t\t\t\t*goto next\n\n\t\t\t#No\n\t\t\t\t\"Very well, begone then!\"\n\t\t\t\t\n\t\t\t\tIf looks could kill, ${astra} would be not only dead but buried too after the cold one she gives her. ${astra} feels compelled to do so and heads for the back exit.\n\t\t\t\t*goto next\n\n*label guestrooms\nThe first couple of rooms ${astra} checks are not inhabited at the moment and probably have nothing valuable in them. Well, nothing that she can take, at least. The beads, carpets and draperies - they look really luxurious. She wonders what it would be like to live in such a surrounding.\n\nIn The third room, there are sign of recent activity. The bed is not made, there is a scent of sweet perfume and a few lovely dresses on the chair. Whoever was in there seems to have high standards of clothing but not of tidying up. And, luckily, she is not here at the moment.\n\n${astra} quickly scans the room. On the desk, there is a small ornate box made of cherrywood. She...\n*choice\n\t#spots a magical trap\n\t\t*set magic +1\n\t\t(Magic+)\n\t\t\n\t\tLooking at the box from different angles, ${astra} notices distortions. At times, it seems as if there is a twisted layer of glass near it. It must be the mechanism of the trap. ${astra} is not very sure what the effect of touching the box would be but guesses that it would be quite unpleasant.\n\t\t\n\t\tA distant noise suggests that it is time to leave the room... And the castle.\n\t\t*goto out\n\n\t#spot an elaborate lock\n\t\t*set lockpicking +1\n\t\t(Lockpicking+)\n\t\t\n\t\tThis is the most intricate lock ${astra} has seen so far. Actually, it is a series of half of a dozen locks, some of which so small that she would need a magnifying glass to examine them properly. It seems that they need to be unlocked in a certain order.\n\t\tAll of a sudden,  the wooden box vanishes into thin air, probably some sort of a defensive mechanism. Not willing to spend more time here, ${astra} decide to leave the room... and the castle immediately.\n\t\t*goto out\n\n\t#decide to leave the castle immediately\n\t\t*goto out\n\n*label out\n*page_break\n${astra}'s feet touch the soil just outside the castle, moonlight pouring through the occasional clouds. \"Am I safe now?\" she asks herself.\n\nNetho comes out from behind the statue of a sword-wielding angel.\n\n\"You are, dear one, and always have been, especially in the dreamy world.\" He gently takes her hand as he leads her out of the yard. \"How do you feel now that tonight's adventure is over?\"\n\n\"It is a strange thing to say, but actually more powerful and confident.\"\n\n\"This is right, dear one, the purpose of those visits is to activate the powers that have always been available to you on the other side of the veil. Do you remember why you are in the planet?\"\n\n${astra} takes a deep breath, allowing memories to come out to the surface. \"I am quite surprised but I do recall certain pieces of a puzzle. I was piloting a flying disk and I came to explore these lands. And then, something went wrong. I felt so...\ndisconnected from all that I am.\"\n\n\"Dear ${astra}, you are so lovely in everything that you do.\" Netho smiles. \"Indeed you ran into an obstacle you did not foresee, a malignant matrix that doesn't allow those inside to remember much of \ntheir soul's journey. But what happened next is a manifestation of your strength. You didn't shiver in fear, or ask for help. You just came out of the ship and set off to explore what this world could \noffer you, to gather the experience that is the quest you are on. You actually went one step further than that, in your desire to correct the wrong brought to it by a small group of entities that does not have the best \ninterest of the humans and non-humans in this world. Could you go one step further?\"\n\n\"I think I want to try, Netho. I have grown to love the local people. Some of them have such pure souls. They just need to realize their power.\"\n\nThe man laughs. \"So you are again going to be the female wearing a dress embroidered with flowers who wields daggers like a slayer.\"\n\n${astra} giggles too. \"I wouldn't discard that possibility, although I am not sure I have such a dress, I guess you refer to another moment of time.\"\n\nNetho nods. \"One more thing, dear one. I don't want to take away the experience from certain choices you might make, but still I hope you will decide not to wear the necklace \ngiven to you. It can indeed give you power, but whether it is comparable to the price you will be required to pay... that is questionable.\"\n\nShe touches it, feeling its smoothness on her fingertips. \"Thank you for your advice.\"\n\n\"Now, I believe it is the time to have some rest, for tomorrow promises to be action-packed as well. Until we meet again, I bid you peace and joy.\"\n\n\"I am sending you my best wishes too, dear Netho... and one more thing. It seems that I love you.\"\n\n\"I love you too, dear ${astra}, as I always have and always will.\"\n*goto_scene false_light", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n*set astra \"Vivian\"\n*set stealth 1 \n*set marksmanship 3\n*set physique 4\n*set lockpicking 2\n*set will 1\n*set charm 2\n*set magic 5 \n*set energy 5\n\n\"By just putting on this ring when the time for us to come to the surface.\" Snitz produces a golden ring encrusted with a jewel out of nowhere and hands it to her. \"Please take it.\"\n\n${astra} stands in amazement, not sure what to do. \"How do I know it is the time?\"\n\nThe rat shrugs. \"The prophecy says nothing about it, I guess you are expected to know yourself.\"\n\n\"Oh, do I?\" She puts her hand on her mouth realizing she said something she shouldn't have.\n\n\"The prophecy is crystal clear about it. Now, please take the ring already, I want to go home and spread the good word.\"\n\nWhat should ${astra} do?\n*fake_choice\n\t#refuse to take it\n\n\t#accept it\n\n\t#suggest that even though she can be a trigger, it is what they are capable of doing that is important, not her role\n\n*script changeBackgroundColor(\"black\")\n*set astra \"Adriana\"\n*set stealth 2 \n*set marksmanship 1\n*set physique 2\n*set lockpicking 4\n*set will 3\n*set charm 2\n*set magic 2 \n*set energy 4\n\n\"Nice. All you need to do is pour the rat blood on the five corners of the pentagram to set the demon free. This is the easy part.\" She explains.\n\t\t\n\"And what is the hard part?\" ${astra} asks.\n\t\t\n\"Whoever you set free is likely to attack you or put your skills to a test one way or another. It is a custom among us, it is something like your term honour, however, many times stronger.\"\n\t\t\n\"Wait, a minute!\" You struggle to understand. \"Your honour requires you to attack the one who sets you free?\"\n\t\t\nMelissa nods.\n\t\t\n\"I know it is hard for a human to understand and I don't think we should discuss it right now. Just think of all the magic items each of them has. Let's go to the demons. Who shall be the first to be introduced to you?\"\n\t\t\nYou look at them. Beside the savage one, there is an attractive lady in black leather and a gray-feathered angel. Who do you approach?\n*fake_choice\n\t#The warrior demon\n\t\t\t\t\n\t#The flashy demonic lady \n\t\t\n\t#The angel\n*script changeBackgroundColor(\"sepia\")\n*set astra \"Simona\"\n*set stealth 3 \n*set marksmanship 2\n*set physique 2\n*set lockpicking 1\n*set will 3\n*set charm 4\n*set magic 2 \n*set energy 3\n\nThe winding staircase seems endless. She can't help but imagine what a fall down would cause.\n\nWhen she reaches the top, she is amazed by the size of the bell. It seems twice as tall as her. ${astra} guesses that ringing it would require some serious muscle. A sudden wind blows dust into her eyes, blinding her for a few moments. When she has finished wiping her eyes, she sees that there is a man next to the bell. He must have been behind one of the pillars when she reached the bell tower. It seems that he is about to actually ring it. The sound will most likely be painful and she has no time to rush downstairs.\n\nWhat would she do?\n*fake_choice\n\t#Shout at the man to stop\n\t\t\n\t#Shoot him\n\t\n\t#Shoot a bolt just in front of him (to attract his attention)\n\t\n*set astra \"Roana\"\n*set stealth 5 \n*set marksmanship 1\n*set physique 1\n*set lockpicking 3\n*set will 4\n*set charm 2\n*set magic 7 \n*set energy 3\n\t\n\t\nHer eyes behold the necklace and the expression on her face turns into horror. \"You shouldn't have put that on. It is one of the instruments that fuel the power of the Prelate over her minions.\"\n\t\t\nWhat should ${astra} reply?\n*fake_choice\n\t#\"What if I am strong enough to withstand?\"\n\t\t\t\n\t#\"It has not affected me in any negative way.\"\n\n\t#\"I am trying to make Chiera underestimate me.\"\n\t\t\n\t#\"I want to experience her version of the truth too.\"\n\t\t\n*set astra \"Vreya\"\n*set stealth 1\n*set marksmanship 1\n*set physique 5\n*set lockpicking 3\n*set will 5\n*set charm 5\n*set magic 2 \n*set energy 2\n\nNo longer having to pretend to be human, Magda obtains her true form. Leathery bat wings tear her cassock from behind and her facial \nfeatures get sharper, although retaining some of her previous beauty. \n\nMadga's eyes turn red, her legs slightly apart.\n\nWhat should ${astra} do?\n*fake_choice\n\t#Connect her to the Light \n\t\t\n\t#Ask Deathrose to step up\n\t\t\n\t#Hide behind the pillars again\n\t\n\t#Shoot her \n\t\t\t\t\t\n\t#Attack her with the sword", "startup": "*title Slayer of Evil \n*author Ivailo Daskalov \n\n*scene_list\n\tstartup\n\tastra\n\t$ haunted\n\t$ cathedral\n\t$ new\n\t$ false_light\n\t$ lighttemple\n\t$ epilogue\n\t$ mercy \n\tdeath\n\n*create astra \"\"\t\n*create stealth 1\n*create marksmanship 1\n*create physique 1\n*create lockpicking 1\n*create will 1\n*create charm 1\n*create energy 5\n*create damage 0\n*create spread 2\n*create magic 1\n*create fourone 0\n\n*create compassion false\n*create well false\n*create arms false\n*create cold false\n*create smile false\n*create belief false\n*create oneself false\n*create scratch false\n*create healer false\n*create knowledge false\n*create slayer false\n*create prison false\n*create romance false\n*create escort false\n*create wounds false\n*create goddess false\n*create source false\n*create ally false\n\n*create garlic false \n*create had false \n*create statues false \n\n*create protection 0\n*create priestpower 5\n*create nooffhand false \n\n*create not_visited_cathedral true\n*create not_visited_haunted true\n*create apples_dropped false \n\n*create bishop_damage 0\n\n*create twilight_priestess_available false \n*create rel_melissa 0\n*create rel_malice 0\n*create rel_chiera 0 \n*create visited_melissa false \n*create fork 0 \n*create trouble false \n*create fight_together false \n*create stalkers false \n*create angels_cry false \n*create throne false \n*create deathrose_friend false \n*create candle false \n*create partner \"\"\n*create rel_marcus 0 \n*create bear_name false \n*create wall_cache false \n*create bear_head false \n*create bear_lower false \n*create bear_upper false \n*create purpose false \n*create recipe false \n*create needle false \n*create thread false \n*create invisible_ink false \n*create bear 0 \n*create magda_free false \n*create marcus false \n*create intervention 0 \n*create met_deathrose false \n*create converse false \n*create hag false \n*create necklace false \n*create missing_page false \n\n*achievement reader visible 50 Pleiadian Mercy\n\tRead the bonus story.\n\tYou read the bonus story!\n\t\n*achievement slayer visible 100 Slayer of Evil \n\tDefeat the Prelate of False Light.\n\tYou defeated the Prelate of False Light!\n\t\n*achievement servant visible 50 Servant\n\tBecome a servant to the False Light.\n\tYou became a servant to the False Light!\n\n*achievement nothing visible 50 Useless broken key \n\tObtain a useless broken key.\n\tYou obtained a useless broken key!\n\n*achievement riddler visible 50 Master of the Riddle\n\tSolve the teddy bear riddle with the maximum possible score.\n\tYou solved the teddy bear riddle with the maximum possible score!\n\t\n*achievement magda visible 50 Exorcist\n\tExorcise a vampire.\n\tYou exorcised a vampire!\n\n*achievement vampire_slayer visible 50 Vampire Slayer \n\tSlay a vampire.\n\tYou've slain a vampire!\n\n*achievement trust visible 50 Trust of the Exarch \n\tGain the trust of the Exarch.\n\tYou gained the trust of the Exarch!\t\n\t\n*achievement protection visible 50 Blessing of Protection\n\tObtain a blessing of protection.\n\tYou obtained a blessing of protection!\t\t\n\t\n*achievement perseverance visible 50 The Last Stand \n\tEnter the final battle with sufficient energy.\n\tYou entered the final battle with sufficient energy!\t\t\n\t\n*achievement shadow_slayer visible 100 ShadowSlayer \n\tSlay a shadow.\n\tYou've slain a shadow!\t\t\n\t\n*achievement romance visible 50 Heartbreaker  \n\tCapture the heart of a Royal Guard.\n\tYou captured the heart of a Royal Guard!\t\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tUnleash the power and magic of the Divine Feminine and become the bane of evil entities. Discover a world of sword and magic and take its protection from a shadowy force as your own destiny. Prevail over dangers and discover friends among those who call themselves demons. Awaken their Forgotten Goddess and wield her power as your own. Challenge the establishment of the false light. Claim the Prelate’s tiara… or serve its wicked reign.\n\n\t[i]The Slayer of Evil[/i] is a 50,000 word interactive novel by Ivailo Daskalov, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\t\n\t• Plays as a renegade Slayer of Evil lady.[n/]\n\t• Explore an alien land ruled by sword, magic and curse.[n/]\n\t• Face and shadow beings, vampires, succubi and angels.[n/]\n\t• Help a group of demonic females restore the balance in their world.[n/]\n\t• Awaken and wield the power of the Forgotten Goddess.[n/]\n\t• Allow an ancient love to blossom again.[n/]\n\t• Slay the Prelate of False light and take her place... or fail and serve her.\n\n\t*if choice_prerelease and not(choice_is_ios_app)\n\t\t[i]You can play the first part of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n\t\t*choice\n\t\t\t#Sign up to be notified when the game is available.\n\t\t\t\t*subscribe {\"now\": true}\n\t\t\t\t*restart\n\t\t\t#Play the first part now for free.\n\t\t\t\t*goto purchased\n\n\t[i]You can play the first part of the game for free. Purchase the rest of the game below.[/i]\n\t*if choice_is_advertising_supported\n\t\t[i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n\t*purchase_discount adfree 2018-11-19 $3.99 $2.99 purchased\n\t*if choice_is_advertising_supported\n\t\t*page_break_advertisement\n\t*if not(choice_is_advertising_supported)\n\t\t*page_break Play Now for Free\n\n\n*label purchased\n\n\n*finish"}};
