<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dilemma — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "dilemma", "title": "Dilemma", "scenes": {"choicescript_description": "Make difficult moral decisions in this modern drama. You take the role of Alex, an average guy having a not so average day. Juggle relations with your friends while you puzzle over choices of right and wrong. Explore what it means to be a good person. Determine if the law is always right. Choose between yourself and your friends. Decide between romance or friendship. And ultimately hold the life of another in your hands. One day can be packed with enough drama, tension, and death to change your life forever. But at the end of that day you’re faced with the question: are you a good person?\n\n[i]Dilemma[/i] is a 7,000-word interactive novel by Mikhail Koroviev. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n  \n  Remove in-game advertisements.\n  \n  *purchase adfree $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n", "intro": "*reset", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\nAn errant buzzing rouses me from sleep. I slap my hand around on my bed stand in search of the phone. My palm smacks against the hard plastic receiver and I bring the thing toward my face. \n\n\"Yes?\" I grunt into the phone. \n\n\"Hey, Alex? I was wondering if you'd like to get some coffee with me. Seeing as how we haven't seen each other in so long I figured we should catch up on the times.\"\n\nThe voice was feminine to be sure but I can't place it. Still groggy with sleep, I reply, \"uhm yah sure.\"\n\n\"Great, there's this awesome little coffee shop on the corner of 10th. It's called The Grind, meet you there at two?\"\n\nI roll over in a mess of sheets and glance at my clock. It's 12:58PM. \n\n\"Yah alright that works, see you then.\" I hang up the phone and realize I just made plans with a stranger. No no, I think to myself,\n\nI probably know her. I clamber out of bed and stretch. It's too early to be doing anything but hell, I'm already up. She said the coffee shop was on 10th which is like a ten minute drive, not far. By the time I finally get out the door of my apartment it's already ten to two, so I should be just on time. I take the elevator down to the garage, wondering who this mystery woman could be. I'm about halfway to my shitty old Honda Civic when someone starts shouting at me. \n\n\"Hey, Mister? Could you give me a hand here?\" A middle-aged man at the back of the parking garage is waving at me. \"My car needs a jump could you help me?\" I stop and think for a minute. I could help the guy out, but then I'd be pretty late and mystery girl \nmight think I stood her up and get really upset. On the other hand, this guy is kind of screwed until someone helps him out, after all he could be late for his own appointments. I decide that helping the stranded motorist is the...\n*fake_choice\n\t#right thing to do\n\t#wrong thing to do\n\n*script changeBackgroundColor(\"black\")\n\"Alright! I knew you wouldn't let me down, bro.\" Jude grins and claps me on the shoulder.\n\t\t\n\"Yah, Yah. OK where's the stuff?\" Jude reaches into the garbage bin he's been leaning on and pulls out a small garbage bag. I blink at him and his grin stretches further. We walk down into the parking garage. I pop my trunk and Jude nestles the felonious cargo \ninto the back corner of the compartment.\n\n\"Excellent! OK so only like two or three days, man, I swear. I gotta run now but I'll stop by and see you tonight.\" Jude walks off and I go back up to my apartment.\nI decide to finish my macaroni and have a small nap before I start my shift. I've still got three hours till then so I curl up in my recliner and doze off, after setting my alarm of course. My alarm wakes me up at 8:00PM sharp. I quickly have another shower and down a cup of coffee. \n\nDespite the nap I still feel sluggish. I grab my uniform and make my way down to the garage. The streets are considerably quieter than they were this afternoon, I love driving at night so much better. Jude starts texting me again, he says he might have already found a buyer for that stuff. \n\nI start to text him back when my car jolts violently and spins out. I drop my phone and slam on the brakes. I come to a screeching halt in the middle of an intersection. The night is silent. I'm in a quiet part of town and there are no cars around. I peer in front of my car \nand see the body of a teenager bathed in the light of my headlamps. There's a dent in my hood and some blood spatter on it. I get a sick feeling in my stomach. I can't tell if the kid is dead or not but he's definitely injured. My car idles in the intersection, there are still no cars around.\n\nThis is bad, very bad. I don't know what to do. If I stay and try to help the kid I'm going to be in deep shit. I was texting while driving and will probably get my license taken away.\nPlus I have enough drugs in my trunk to go to prison for ten years.\n\nIf I just speed off I'm home free, no one was around to see this unfortunate accident. I just can't help thinking that this kid will die if I don't help him. Helping this kid and putting myself at risk is...\n*fake_choice\n\t#wrong\n\t#right\n\n", "startup": "*title Dilemma\n*author Mikhail Koroviev\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and (not(choice_purchased_adfree) and not(choice_is_web))\n\tThis game is supported by advertisements, but you can buy the unlimited version\n\tto turn off ads forever.\n\n\t*purchase adfree $4.99 purchased\n\t*page_break_advertisement\n\n*label purchased\n\nIn this game you will take the role of the protagonist's conscience. Throughout the narrative the protagonist will be presented with a number of moral dilemmas and it will be your duty to decide what is right and what is wrong. \n*page_break Start\nAn errant buzzing rouses me from sleep. I slap my hand around on my bed stand in search of the phone. My palm smacks against the hard plastic receiver and I bring the thing toward my face. \n\n\"Yes?\" I grunt into the phone. \n\n\"Hey, Alex? I was wondering if you'd like to get some coffee with me. Seeing as how we haven't seen each other in so long I figured we should catch up on the times.\"\n\nThe voice was feminine to be sure but I can't place it. Still groggy with sleep, I reply, \"uhm yah sure.\"\n\n\"Great, there's this awesome little coffee shop on the corner of 10th. It's called The Grind, meet you there at two?\"\n\nI roll over in a mess of sheets and glance at my clock. It's 12:58PM. \n\n\"Yah alright that works, see you then.\" I hang up the phone and realize I just made plans with a stranger. No no, I think to myself,\n\nI probably know her. I clamber out of bed and stretch. It's too early to be doing anything but hell, I'm already up. She said the coffee shop was on 10th which is like a ten minute drive, not far. By the time I finally get out the door of my apartment it's already ten to two, so I should be just on time. I take the elevator down to the garage, wondering who this mystery woman could be. I'm about halfway to my shitty old Honda Civic when someone starts shouting at me. \n\n\"Hey, Mister? Could you give me a hand here?\" A middle-aged man at the back of the parking garage is waving at me. \"My car needs a jump could you help me?\" I stop and think for a minute. I could help the guy out, but then I'd be pretty late and mystery girl \nmight think I stood her up and get really upset. On the other hand, this guy is kind of screwed until someone helps him out, after all he could be late for his own appointments. I decide that helping the stranded motorist is the...\n*choice\n\t#right thing to do\n\t\tSo I climb into my Honda Civic and drive to a parking spot adjacent the motorist's. It takes just over ten minutes to get his car running after which he thanks me graciously and roars off into the afternoon. I follow him right out of the garage.\n\t\tI hadn't counted on traffic which was really hectic; I usually travel at night, so I end up being about a half hour late. I push open the door of the urban coffee shop. The place is about half full, which is as full as any good coffee joint should ever get,\n\t\tso it was easy for me to pinpoint who Miss Stranger was. I recognize Allison immediately. Her and I had gone to high school together but had lost contact these past few years. It was no wonder I couldn't recognize her voice. \n\t\tShe looks pissed. \n\t\t\n\t\t\"You're late,\" she frowns at me, \"and you look like you just woke up.\"\n\t\t\n\t\t\"Yah sorry I hadn't counted on traffic and I work night shifts now, so this is like midnight for me.\"\n\t\t*goto next\n\t#wrong thing to do\n\t\tI act as if I didn't hear the guy and get in my car. When I get to 10th I park on the side of the street and check the time on my cell phone. It's 2:01PM. Bells jingle musically as I push open the door to the quaint little coffee shop. As soon as I step \n\t\tinside a woman at the far end of the place waves me down. It's Allison, my old high school friend. I sit down and order a coffee.\n\t\t\n\t\t\"Hey! How've you been Alex? Jeez it looks like you just woke up.\"\n\t\t\n\t\t\"I did,\" I laugh politely, \"I work night shifts now so this is like the middle of the night for me.\" \n\t\t*goto next\n\n*label next\nAllison apologizes for muddling up my sleep schedule but I tell her it's fine. We talk and talk; she tells me all about her trip to Europe which she just got back from. We're both working on our second cup of coffee when \nJude texts me. I pull out my phone to text him back and Allison slyly inquires who I'm talking to. I tell her and she remembers Jude instantly.\n\n\"Oh yah, I remember him! You were friends with him since high school started. Is he still his crazy self?\" She grins. I laugh and give her the affirmative. It's around three o-clock when we decide to part ways.\n\nWe exchange numbers and Allison starts looking a little distressed and shy.\n\n\"Hey, Alex? I was wondering if you could do me a favour. I really can't afford to pay this bill; I ordered more than I should have. I just got back from Europe and all and I don't have much money. You think you could pay for me?\" \n\nI give this some thought. Allison is my friend and all but I'm not that well off myself. I could barely afford to pay the whole bill with the cash I have on me. It really is her fault; she shouldn't have ordered a damn sandwich. \n\nIn the end I decide paying the bill is the...\n*temp money\n*choice\n\t#right thing to do\n\t\t\t*set money false\n\t\t\tI pay the bill and we leave The Grind. \n\t\t\t\n\t\t\t\"Thanks Alex, I really appreciate it\" Allison kisses me on the cheek and walks off, shouting at me to text her. I watch her weave down the street through the crowd for a bit, then cross the street towards my shit-box car. \n\t\t\t*goto hobo\n\t#wrong thing to do\n\t\t\t*set money true\n\t\t\"I'm sorry Allison, I'm pretty broke too, I really can't.\" She nods and says she understands, but it sours the mood. She has barely enough money to pay the bill. We hug and part ways, assuring each other we will meet again.\n\t\t\n\t\tAllison walks down the street and I wait for the light to turn so I can cross to my car.\n\t\t*goto hobo\n\n*label hobo\nBefore I reach my car I am beset by a smelly homeless man. \n\n\"Could you spare some change, friend?\" The man looks like he's about thirty. He's dressed in rags and I can smell the booze on his breath. If I do give him the money, he will probably just go and buy a bunch of alcohol. That's really judgemental though, \nand he really is down on his luck anyway. After a bit of internal debating I decide giving the vagrant money is...\n*choice\n\t#right\n\t\t*if money\n\t\t\tSo I reach into my pockets and dump my change into his money collecting cup. \n\t\t\t\n\t\t\t\"Thank you, Sir, Thank you!\"\n\t\t\t\n\t\t\t\"No problem,\" I mutter as I yank open the door to my vehicle.\n\t\t\t*goto jude\n\t\t*else\n\t\t\tI reach into my pocket to give the man money but realize I have no change because I spent it all at the coffee shop.\n\t\t\t\n\t\t\t\"Sorry, man. I've got no change on me.\" I feel embarrassed and get into my car and tear off quickly.\n\t\t\t*goto jude\n\t#wrong\n\t\t\"Sorry, I don't have any money.\" The smelly man begs some more, insisting I give him money. He stands in front of me and I'm forced to shoulder past him to reach my car. The vagrant grumbles something at me that sounded a lot like 'asshole'. Fuck him, I think, fucking bum.\n\t\t*goto jude\n\n*label jude\n\n\nI'm back in my apartment now. I click on the TV and decide to just chill until my shift starts at 9:00PM. While the TV blares on I make myself some Kraft Dinner. I wonder what Jude is doing tonight. He has the same sleep schedule as me, even though he doesn't work a job at all.\n\nWell, he sells dope if you can count that as a job. Sometimes though he comes to hang out with me at the office building I work at. I'm a janitor for this big lawyer type building and it gets awfully boring at night. Jude hasn't been texting me anymore so I assume he went to get high.\n\nI'm sitting on my lazy boy recliner (the only decent piece of furniture I posses) eating my macaroni when my cell phone goes off. It's Jude. The text reads: 'Alex, dude, I really need your help. Can you come outside? Please, man.' I groan and set my bowl of pasta down on the ground.\n\nJude does ridiculous shit like this all the time, it's probably a joke. Whatever though, Jude's my friend I should at least humour him. So I take the elevator down to the ground floor and see Jude standing on the corner leaning on a trash can, looking very sketchy.\n\n\"Alex! Great! Listen, dude, I really need your help.\" I sigh and tell him to explain. \"Well OK, it's like this: I wasn't all there this afternoon and I bought a bunch of drugs, I need you to hold them for me.\"\n\nI rub my hand across my head and give an exasperated curse. \"Why? Why do you need me to hold your damn drugs?\"\n\nJude looks increasingly uncomfortable. \"It's my parole office man, she's going to check in with me soon and if she catches me with all this shit, I'm fucked.\"\n\n\"Well, how much is it?\"\n\nJude averts my gaze. \"It's a lot, if my parole officer catches me with all this I'm going back to prison for a long time.\"\n*page_break\n\"Why would you do this?\"\n\nHe shouts angrily, \"I forgot my parole officer checks on me today! It was really expensive, I can't just chuck it. I just want to keep it in your car for a day or two then I swear I will unload it on someone else.\"\n\n\"Is it a lot?\"\n\n\"Enough to qualify for a felony,\" he says sadly.\n\n\"How did you afford that much drugs?\" I question tiredly\n\n\"Business is good,\" He replies meekly.\n\n\"Damn you, Jude. I have to think about this give me a minute\" I turn my back and start pacing up the block. I've known Jude most of my life, he's my best friend. If I get caught with drugs though, I'm going to prison for a long time.\n\nBut if Jude gets caught with that it, he's going to prison for much longer because he's already been there once. Plus he's way more likely to get caught, the cops know him and his parole office is always on his ass. I know Jude's my friend but this is a little extreme. I walk back to Jude. \"Alright, I've decided that holding this shit for you is the\"\n*temp drugs\n*choice\n\t#right thing to do\n\t\t\t*set drugs true\n\t\t\"Alright! I knew you wouldn't let me down, bro.\" Jude grins and claps me on the shoulder.\n\t\t\n\t\t\"Yah, Yah. OK where's the stuff?\" Jude reaches into the garbage bin he's been leaning on and pulls out a small garbage bag. I blink at him and his grin stretches further. We walk down into the parking garage. I pop my trunk and Jude nestles the felonious cargo \n\t\tinto the back corner of the compartment.\n\t\t\n\t\t\"Excellent! OK so only like two or three days, man, I swear. I gotta run now but I'll stop by and see you tonight.\" Jude walks off and I go back up to my apartment.\n\t\t*goto hitnrun\n\t#wrong thing to do\n\t\t*set drugs false\n\t\t\"Aw alright man, I understand. I guess it was a bit of a big favour to ask. I can probably manage though. Maybe I can get my roommate to hold the stuff for me.\" Jude gets on his bike and pulls \n\t\ta small garbage bag out of the trash bin he had been leaning on. \n\t\t\n\t\t\"You going to stop by the office tonight?\"\n\t\t\n\t\t\"I dunno, man. I've gotta get rid of this stuff now so I dunno.\" With that Jude bikes off. I feel like an asshole.\n\t\t*goto hitnrun\n\n*label hitnrun\nI decide to finish my macaroni and have a small nap before I start my shift. I've still got three hours till then so I curl up in my recliner and doze off, after setting my alarm of course. My alarm wakes me up at 8:00PM sharp. I quickly have another shower and down a cup of coffee. \n\nDespite the nap I still feel sluggish. I grab my uniform and make my way down to the garage. The streets are considerably quieter than they were this afternoon, I love driving at night so much better. Jude starts texting me again, he says he might have already found a buyer for that stuff. \n\nI start to text him back when my car jolts violently and spins out. I drop my phone and slam on the brakes. I come to a screeching halt in the middle of an intersection. The night is silent. I'm in a quiet part of town and there are no cars around. I peer in front of my car \nand see the body of a teenager bathed in the light of my headlamps. There's a dent in my hood and some blood spatter on it. I get a sick feeling in my stomach. I can't tell if the kid is dead or not but he's definitely injured. My car idles in the intersection, there are still no cars around.\n\nThis is bad, very bad. I don't know what to do. If I stay and try to help the kid I'm going to be in deep shit. I was texting while driving and will probably get my license taken away.\n*if drugs\n\tPlus I have enough drugs in my trunk to go to prison for ten years.\n\nIf I just speed off I'm home free, no one was around to see this unfortunate accident. I just can't help thinking that this kid will die if I don't help him. Helping this kid and putting myself at risk is...\n*temp kid\n*temp arrested\n*choice\n\t#wrong\n\t\t*set kid false\n\t\tI press down on the accelerator and screech off into the night. I try not to think about the poor mangled kid I just abandoned. When I get to the office the first thing I do is run inside to get some cleaning products. I wipe the blood of my car and pop the crumbled hood back out.\n\n\t\tI have a feeling my choice is going to haunt me a long time. I almost throw up as I wipe the blood off my hood.\n\t\t*set arrested false\n\t\t*goto theft\n\t#right\n\t\t*set kid true\n\t\t*if drugs\n\t\t\t*set arrested true\n\t\t\tI may have drugs in the car, but this boy needs my help. I get out and run to the boy. He's still breathing and I call an ambulance right away. I tell the kid to hang on and stuff, like they do in the movies. Before long I can hear sirens blaring towards us.\n\n\t\t\tAn ambulance arrives with a cop car in tow. The teenager is quickly carted off but the cops stick around. They take a statement from me and get my information. They tell me they won't charge me seeing as I called it in but that the boy’s family may want to press charges.\n\n\t\t\tThey have to take my car as evidence. I get this cold, dead feeling in my stomach. They let me go for now, but when they search my car; I'm in a lot of trouble. The cops thank me and I walk the last two blocks to my work. \n\t\t\t*goto theft\n\t\t*else\n\t\t\tI call an ambulance right away and rush out to the boy's side. It looks like his ribs are broken and maybe his arm. I tell him it's going to be OK and that the paramedics are on the way. The ambulance arrives in no time with two cop cars in tow. \n\n\t\t\tThe medics waste no time getting the boy into the ambulance and back to the hospital. The cops come and question me and take a statement from me. They take my car as evidence but say they won't be pressing charges on account of I called it in.\n\n\t\t\tBut they do inform me the boy's family may sue, so they need the car for evidence. I say it's no problem and I'm very sorry. They thank me and I walk the last two blocks to the office.\n\t\t\t*set arrested false\n\t\t\t*goto theft\n\n*label theft\nThe office building isn't that big, just a small ten story one. I only have to clean the bottom five floors, they have another janitor to clean the other five. I start at the top and work my way down as usual. Around 11:00PM Allison starts texting me. Says she can't sleep, jet lag.\n\nSo we talk while I clean. She decides she's going to come up and see me, and Jude if he gets here. I tell her to text me when she gets here so I can open the door for her and get back to work. As I'm cleaning out one of the cubicles on the third floor I notice a wallet.\n\nIt's a nice brown leather wallet. Upon further inspection I find it stuffed with cash. Ten hundred dollar bills are stuffed into it. I look at the money greedily. It's a lot of money and I'm pretty broke. It's not like this fancy lawyer or whoever really needs it anyway. He's probably rich\nand I have next to nothing. It is still his money though, not mine. I think that taking the money is the...\n*temp money\n*choice\n\t#right thing to do\n\t\t*set money true\n\t\tI empty the wallet and stuff the wad of cash into my pocket. I need it more than this guy anyway. \n\t\t*goto drugdeal\n\t#wrong thing to do\n\t\t*set money false\n\t\tThe money isn't mine, I can't just take it. I angrily walk out of the cubicle and keep cleaning. I try not to think of all the money. \n\t\t*goto drugdeal\n\n*label drugdeal\nI get a text from Allison at 12:04AM: 'I'm heeeere ;)'. I walk down two floors to let her in. We go back up to the third floor and she sits around in the swivel chairs and talks while I clean. The company is nice, I missed Allison. At 12:24AM Jude texts me. \n*if arrested\n\tHe says he is coming down to visit me now. When he arrives around one in the morning I let him in. I tell him what happened with the drugs and he's only a little mad. He says I can make it up to him by holding onto his gun for a while, so I do. So we just hang out until dawn, I clean and Jude and Allison catch up on old times. It was a nice time.\n\t*goto bank2\n*if drugs\n\tHe says he found a buyer for the drugs and is bringing him here to get the stuff. This makes me anxious, I don't want to get fired. I really want rid of this shit though so I agree. I tell Allison about it and she just thinks it's a funny situation. So Allison and I wait \n\toutside for Jude and his buyer to get here. They pull up in a car around one o-clock. The buyer is a skinny white kid in his twenties. We all walk over to my car and I pop the trunk. \n\t\n\t\"There it is,\" says Jude. The white guy doesn't say a word. He pulls a handgun out of his waistband and waves it over us. We step back and throw our hands in the air. \n\t\n\t\"OK so this is how it's gonna go,\" The gunman's voice is raspy, smoker's voice, \"I'm fucking robbing you. You try anything, I'll kill you.\" He stares us down to make sure we get the idea. He starts to advance\n\ttowards my trunk, slowly, keeping his eyes shifting between us. Allison and I are on the sidewalk and Jude is on the other side of my car. I think that I could overpower him. The guy is really skinny and I'm pretty strong. It's risky but I have a chance.\n\n\tThose drugs are worth a lot of money, and fuck, I can't just let this guy take my shit. I keep reminding myself I could get shot but I just don't know. Tackling the gunmen is the...\n\t*choice\n\t\t#right thing to do\n\t\t\tWhen he shifts his gaze over to Jude again I lunge at him. I take him down with a flying tackle. He struggles weakly and Jude steps in and takes the gun out of the freak’s hand. I let him go when Jude points the gun at him. \n\t\t\t\n\t\t\t\"OK so this is how it's gonna go,\" Jude mocks the guy, \"You're going to fuck off before I kill you.\" The guy turns heel and runs down the street cursing and screaming. We all breathe a sigh of relief. Jude\n\t\t\tpasses the gun to me and looks moodily at the drugs as he closes the trunk. Allison is shaking so I go over and hold her. \n\t\t\t*goto bank\n\t\t#wrong thing to do\n\t\t\tIt's too dangerous, I don't want to die. I stand there in resign as the drug addict advances on our stash. Suddenly Jude steps forward and knocks the guy right in the nose. The drug-fiend yelps\n\t\t\tin pain and drops the gun. Jude socks him again right in the face, knocking the guy on his ass. The guy starts to get up but Jude already has the gun in his hand. Upon realizing this, the gunman springs to his\n\t\t\tfeet and sprints off. Jude passes me the gun, which I tuck into my pocket, and closes the trunk. \n\t\t\t\n\t\t\t\"Fuck. Let's go inside,\" he says. And we do just that.\n\t\t\t*goto bank\n*else\n\tHe tells me he's sold the drugs and is on his way. I tell Allison that Jude will be joining us soon. She claps excitedly, she hasn't seen Jude in years. Around one o-clock Jude texts me again and tells me to open the door.\n\n\tAllison and I make our way down via the elevator and find a curious sight on the other side of the glass doors. Jude is there, but so are three other guys. They seem to be arguing. Allison gives me a concerned look but I open the door anyway.\n\t\n\t\"Uh what's going on here?\" I say timidly. One of the strangers angrily informs me that Jude ripped them off. Jude is just sputtering excuses and it isn't working even a little bit. They want their money back, they keep threatening to beat the shit out of Jude.\n\t*if money\n\t\tI remember that thousand dollars I stole. I could give these guys the money and they'd probably leave us alone. I do really need the money though, my cell phones like a year old and never works and I need a new TV. On the other hand, Jude's hospital visit\n\t\tcould cost a lot more than a thousand dollars. Giving the thugs the money is the...\n\t\t*choice\n\t\t\t#right thing to do\n\t\t\t\tI step in front of Jude. \"Look, guys, here have my money. I'm sure this covers the refund.\" I pull out the wad of cash and hold it out to them. One of them snatches it and tells Jude to never show his face around them again.\n\n\t\t\t\tThey walk off into the night without a word.\n\t\t\t\t\n\t\t\t\t\"Thanks, man. You just saved my ass. Where'd you get that money anyway?\" I gesture him inside and tell him I'll explain later. Jude tells me he feels guilty for letting me pay the thugs, so he gives me the gun he has on him. He knows I've been looking to buy a gun for a while.\n\t\t\t\t*goto bank\n\t\t\t#wrong thing to do\n\t\t\t\tI keep my mouth shut. Jude's my friend, but cash is my friend too.\n\t\t\t\t*goto shootan\n\t*else\n\t\t*label shootan\n\t\tThey keep pestering Jude. The thugs start getting physical, pushing him, and shoving him. Jude tells them to back off and they laugh. Suddenly, Jude pulls out a handgun and fires it up into the air. All three of the gangster back off. Jude tells them to fuck off.\n\n\t\tThey keep backing up but they're still making threats, telling him that they'll be back for him. Jude conceals the gun and jumps inside. I lock the doors tight and we all look at each other uneasily. \n\n\t\t\"Sorry about that,\" Jude mutters. I tell Jude to give me the gun, I don't trust him with it. He thinks that's a good idea, Jude never did really like guns.\n\t\t*goto bank\n\n*label bank\nWe're all still pretty shook up, so I make us all a cup of coffee. We sit and talk about the event for a while and finally start to settle down. Jude and Allison catch up on old times while I finish cleaning the ground floor.\n*label bank2\n\nI'm finished work around 4:30AM. I leave work early with Allison and Jude and we all pile into Allison's car and go to Denny's. It's a great time, we all order pancakes and tell jokes to each other. We're laughing nearly the whole time. I feel really glad\nthat everything has turned out like this despite the bad things that have been happening to me this past day. The sun starts rising as we talk and eat, the sunlight flooding through the window like a heavenly spotlight. Everyone stops talking for a minute and we all just sit there in silence. Jude is cramming his face \nfull of pancakes and Allison is staring out the window smiling. I smile and look at them. We're all so content. We leave Denny's at 8:04AM. Allison tells us she has to stop at the bank quick before she drives us\nback to the office to get our stuff. Jude and I don't mind a bit so we all climb into Allison's little car again.\n*page_break\nThe bank isn't very busy. There are maybe ten people standing in line, another five just sitting around. Allison tells us she just has to deposit a cheque and won't be long. Jude and I go and sit in the corner on these big comfy arm chairs. Jude starts drumming his hands idly on the black leather arm rest. Three men walk into the bank.\n\nThey all have black ski masks on their faces and are carrying assault rifles. I freeze. One of them fires off a few rounds into the ceiling and everyone screams.\n\n\"This is a fucking robbery, everyone get down on the ground and shut the fuck up.\" The gunman standing in front screams. Everyone complies instantly and dives into the floor. One of the gunmen herds all of the people into the corner where Jude and I are. The other two go and work over the employees.\n\nIt doesn't take long for them to get the safe open and start carting bags of money out into the lobby. The gunman guarding all us hostages yells back at his cohorts.\n\n\"Hurry up! The cops will be here soon.\" As if on cue sirens blare on and start closing in on the building.\n\n\"Shit,\" one of them swears. All three bank robbers get together and have a whispered conversation. I can only make out some of the words.\n\n\"... No it's OK... We've got hostages... Kill some... threaten them... they have to let us leave here.\" My blood goes cold. They stop talking and the one I assume is the leader raises his voice.\n\n\"OK everyone since the cops are here we're going to have to show them we mean business. Now let's see,\" He walks over to us and runs his eyes all over us, \"Who wants to be one of our lucky hostages?\" No one says a word, everyone looks down at the floor.\n\nThe gunman smirks and grabs Allison by the arm and pulls her to her feet. \"Lucky girl, hey come and get this one too.\" He points to Jude and one of the other gunman complies. They pull them out in front of the glass doors so the police can see and point guns at them. The cops start yelling through a loudspeaker \ntrying to get them to surrender and stuff. The leader steps towards the door and shouts out threats, threatens to kill the two hostages if they don't go free. The other two gunmen gesture at Jude and Allison aggressively with their firearms. They're going to kill them. I panic, every part of my body feels as taunt as a piano wire.\n\nI remember the gun, tucked into my jeans, the one I got from Jude. I pull it out and hold it under my prone body. Some of the other people see it and just give me this terrified look. I'm breathing hard, really hard. I have the element of surprise, I can definitely kill one of the robbers. But if I kill the one that has his gun pointed at Jude, the other one \nwill kill Allison, and vice versa. Then there's always the option I get gunned down right after too. There are those leather armchairs Jude and I were sitting in, I could use them as cover. I can't make up my mind though. Jude's been my friend since high school, we've shared ten plus years of our life together. But Allison, I really like Allison \nand I think there might be something between us, the way she always smiles at me. My time is running out, the leader turns away disgusted from the glass door and looks at my friends like they were steaks, deciding which one to kill. I jump to my feet aiming the gun as quickly as possible and decide to save...\n*temp saved\n*choice\n\t#Jude\n\t\t*set saved \"Jude\"\n\t\tI fire at the gunman standing over Jude. I hit him right in the head and he drops to the floor. One of the robbers keeps his gun trained on Allison, the leader turns to me with his gun poised. I dive behind the armchair as they both rattle off a bunch of hot lead into the wall behind me. From underneath the chair I can see Jude run out through the glass doors as they're distracted.\n\t\t\n\t\t\"You fuck,\" the leader shouts, \"you fuck, you fucking killed him.\" He screams in rage and I can hear him pacing.\n\t\t\n\t\t\"No, please.\" It's Allison's voice. A gun goes off and I hear shells clatter to the floor. I peek under the chair again. Pools of blood are spreading across the marble floor of the bank, Allison is dead. \n\n\t\tThen in a sudden frenzy the cops come running in and screaming for the robbers to drop their guns. The underling gets down on his knees and drops his gun. The leader scrambles towards the counter for cover but is shot down. Empty shells go rolling through the pools of blood, getting coated in the stuff. They leave these red curvy trails as they tumble around on the marble floor. I think I'm going to be sick.\n\t\t*goto epilogue\n\t#Allison\n\t\t*set saved \"Allison\"\n\t\tI squeeze the trigger like crazy and perforate the man standing over Allison. The remaining underling keeps his gun pointed at Jude but the leader spins around. I drop to the ground and crawl towards the armchair.\n\n\t\tI can hear the bullets go whizzing past me. I put my head on the ground and look at the scene through the bottom of the chair. Allison is halfway through the glass door, Jude is still on the ground. The leader is pacing back and forth in a rage, cursing me to no end.\n\n\t\tI can see his feet, he stops pacing. There's silence for a moment then a gun goes off. Jude, who was on his knees, falls right on his face. A pool of blood is already starting to form. Tears collect in my eyes and I look away. Then there's a loud bang and the sound of shattering glass.\n\n\t\tBefore anyone knows what happened there is another bang. I look back under the chair. The glass door is shattered the two remaining gunmen are now lying on the floor with Jude. The cops storm in and sweep the place. There's blood everywhere by now, it spreads thick and evenly over the marble floor. The cops stomp through the creamy blood and track crimson footprints all over the place. I squeeze my eyes closed and try to stop the tears.\n\t\t*goto epilogue\n\n*label epilogue\n*page_break\nI'm sitting on the steps outside the bank. One of the police officers brought me a coffee, I don't know from where. I'm still shaking and can't get the image of all that blood out of my head. The cops congratulated me, said I'm a hero. They couldn't have stormed the place with all three of them alive, they said.\n\nI nod and smile but I don't feel like a hero. I feel like someone who just saw a friend get gunned down in front of them, someone who chose which friend got gunned down. I check the time on my cell phone, it's 9:46AM. I should be asleep by now, I'm really tired. \n*page_break\n*if saved=\"Allison\"\n\tI still think about Jude every day. I won't ever forget him, he was my best and sometimes my only friend. I still have nightmares about those sick pools of blood pulsing out of his body. I'm starting to make peace with it though, slowly. Allison has been a great help. We've seen each other every day since the bank robbery. We're dating now.\n\n\tI really do love her, and I think she feels the same way about me. I don't know how it will work out though. No matter how much I love her, I'll always know I chose her over my best friend.\n\t*page_break\n\t*goto epilogue2\n*else\n\tI can't stop thinking about Allison. I have nightmares every night about all the blood. I really felt something between us, a connection. But I chose to kill her, that's what I keep telling myself. Jude's been a great help these past few days though. He's barely left my side since it happened. He spends all night reassuring me and comforting me.\n\n\tIt's really nice to have a friend here for me. Jude's my best friend, and I think we're going to be friends for the rest of our lives; more like brothers. I'll never forget the choice I had to make though, never.\n\t*page_break\n\t*goto epilogue2\n\n*label epilogue2\n*if arrested\n\tThat didn't last long though. A week after the robbery I was arrested while leaving for work. They obviously found the drugs in my car. I couldn't afford a good lawyer so the trial didn't go well at all. Ten years, I'm sentenced to ten years in a federal prison.\n\n\tI don't like Jude anymore, I won't think fondly of him again. Certainly not for the next ten years of my life\n\t\n\n\tThe End\n\t*goto ending\n*else \n\t*if kid\n\t\tI got a phone call a few days later. It was the mother of that boy I hit. He made a full recovery and was in perfect health again. She was very grateful that I didn't just speed off like everyone does on the news. The woman told me her son certainly would have died if not for me. It made me feel really good. I couldn't \n\t\tsave both my friends, but I did save someone. I asked the mother if she was going to press charges and she abruptly informed me they would do no such thing. I thanked her very much for the information and hung up the phone. Yes, I thought, I can get over this. I'm a good person at heart.\n\n\n\t\tThe End\n\t\t*goto ending\n\t*else\n\t\tI saw a story on the news the other day. It was about a boy who was the victim of a hit and run. It was the boy I hit. He had died in the hospital just yesterday. The police didn't have any leads on who had done it but were asking witnesses to please come forward. They showed a clip of the boy's mother, balling her eyes out and \n\t\tcursing whoever did this to the pits of Hell. It made me feel awful. I killed this boy, killed him! Just like I got one of my friends killed. Sometimes I think it would be better off if I was dead...\n\n\n\t\tThe End\n\t\t*goto ending\n\n*label ending\n*page_break End\nWe hope you've enjoyed playing [i]Dilemma.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n"}};
</script>
<script>
/* ChoiceScript runtime — vanilla-JS port of the Python engine in cs/.
 *

 * engine is I/O-agnostic: it talks to an `io` object exposing text(), choose(),

 *
 * Exposed as a global `CS` object (no modules, no build step).
