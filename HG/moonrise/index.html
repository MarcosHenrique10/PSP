of the game will be available on ${choice_release_date}.[/i]\n\n    *choice\n      #Sign up to be notified when the game is available.\n        *subscribe {\"now\": true}\n        *restart\n      #Play the first two chapters now for free.\n        *goto purchased\n\n  [i]You can play the first two chapters of the game for free. Purchase the rest of the game below.[/i]\n  *if choice_is_advertising_supported\n    [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n  *purchase_discount adfree 2019-10-24 $2.99 $1.99 purchased\n  *if choice_is_advertising_supported\n    *page_break_advertisement\n  *if not(choice_is_advertising_supported)\n    *page_break Play Now for Free\n\n\n*label purchased\n*if choice_is_omnibus_app\n  This game contains some potentially upsetting material. While anything can trigger unwanted remembrances of traumatic experiences and acute stress reactions, some are more common than others. Below is a list of core trigger warnings in the game.\n\n  These are not listed to make potential players feel unwelcomed. These are here as a warning to give players time to prepare themselves to encounter these topics, and approach these experiences on their own terms. I hope you enjoy playing the game. A chapter-specific list of warnings can be found on the stats screen.\n  \n  Violence, blood/gore, death, animal death, body horror, Identity Disassociation, description of mental health/mental illness, descriptions of homophobia.\n  *page_break\n\n\n[i]Dedicated to the Invisible Ninja Cat[/i]\n\n\n*page_break\n\nProtruding bone and slick spit. What are your preferred pronouns, spirit?\n\n*choice\n  #She/her/herself.\n    Neat!   \n    *set mc_nonbinaryfemale \"female\"\n    *set mc_personwoman \"woman\"\n    *set mc_personswomen \"women\"\n    *set mc_childgirl \"girl\"\n    *set mc_parentmother \"mother\"\n    *set mc_siblingsister \"sister\"\n    *set mc_partnerwife \"wife\"\n    *set mc_theyshe \"she\"\n    *set mc_theirshers \"hers\"\n    *set mc_themher \"her\"\n    *set mc_theirher \"her\"\n    *set mc_honorablepersonmadam \"madam\"\n    *set mc_mxms \"Ms.\"\n    *set mc_persongirl \"girl\"\n    *goto identify_as\n\n  #They/them/themself.\n    Neat!\n    *set mc_nonbinaryfemale \"nonbinary\"\n    *set mc_personwoman \"person\"\n    *set mc_personswomen \"persons\"\n    *set mc_childgirl \"child\"\n    *set mc_parentmother \"parent\"\n    *set mc_siblingsister \"sibling\"\n    *set mc_partnerwife \"partner\"\n    *set mc_theyshe \"they\"\n    *set mc_theirshers \"theirs\"\n    *set mc_themher \"them\"\n    *set mc_theirher \"their\"\n    *set mc_honorablepersonmadam \"honorable person\"\n    *set mc_mxms \"Mx.\"\n    *set mc_persongirl \"person\"\n    *goto identify_as\n\n*label identify_as\n\nAnd you are a…?\n\n*choice\n  #Trans person.\n    *set trans 100\n    *goto wolf_type\n  \n  #Cis person.\n    *goto wolf_type\n\n  #Other.\n    *goto wolf_type\n\n  #Prefer not to say.\n    *goto wolf_type\n\n*label wolf_type\n\nYou are a spirit of the ${mc_nonbinaryfemale} persuasion! We shall hear you roar! As soon as the curse takes, as soon as the waiting human body is changed to your liking. Some call you curse; some call you blessing. But you are definitely a wolf. What kind of wolf do you wish to be?\n\n*choice\n  #Fierce. A creature of the deep darkness, crimson blood, and howling starlight.\n    Great! I’m already terrified.\n    *set Bloodthirst %+20\n    *set Defense %+20\n    *set Uncanny %+20\n    *goto a_note\n    \n  #Civilized. Your body may be strong and strange, but your heart is entirely human.\n    Brilliant! A kind heart will be needed in this cruel world.\n    *set Empathy %+20\n    *set Responsibility %+20\n    *set Defense %+20\n    *goto a_note\n\n*label a_note\n\nBefore we begin properly, two notes. The first half of the game will work on building your stats, while the second half will focus on testing them. This passage point will be marked. During confrontations with other powerful characters, you may perish. Since you can die, approach confrontations in a manner that favors your strengths. Your stat screen will always be available to check what your strengths are.\n\n\nSecond, this game allows you to romance up to three different characters, if you so choose. Your stats screen will also show how romantic a light the various love interests view you in.\n\n\nDone! You have waited long enough for a bite to birth you.\n\n*finish", "the_choice": "\n[b]Chapter 8: The Choice[/b]\n\n\nThe promised day of the Masquerade meeting approaches in ominous turnings of the sun. Perhaps you are unworried. Perhaps certainty runs liquid in your veins. Perhaps none of the above.\n\n\n*choice\n  #Side with the Masquerade.\n    A wise decision.\n    *set Responsibility %+10\n    *set Defense %+12\n    *goto alice_reaction_m\n\n  #Side with the Rogues.\n    A heartfelt decision.\n    *set Empathy %+6\n    *set Bloodthirst %+8\n    *set Chika +25\n    *goto alice_reaction_r\n\n\n*label alice_reaction_m\n\n\n*page_break\n\n\nThe first person you tell is Alice. “I’m sorry,” she blurts out first thing. “I dragged you into a world I don’t even like.”\n\n\nYou wave your hand. “I’m over it.”\n\n\nAlice still doesn’t meet your eyes. “And…Cassandra?”\n\n\nYou can’t stop yourself from showing your teeth. “Other people can’t possibly be as unpleasant as her.”\n\n\nA weak chuckle escapes Alice, and her words sound tired and well worn. “There are as many ways to be supernatural as there are supernatural people.”\n\n\nYou pat Alice’s shoulder. “We’ll figure it out.”\n*goto masquerade_meeting\n\n\n*label alice_reaction_r\n\n\n*page_break\n\n\nThe first person you tell is Alice. Her eyes go wide. “You want to join the Rogues?”\n\n\nYou sigh. “I don’t want to hide.” A pause. “I know why you’re afraid.”\n\n\nAlice’s gaze drops down and away. “I don’t want to fight. I’m not built for it and I refuse to become so.”\n\n\n“I won’t let Chika make you fight the Masquerade. You’ll be safe. You can just…hang out.”\n\n\n“You promise?”\n\n\n“Yeah, I promise. It’ll all work out. We can be who we were born to be.”\n\n\nYou move to pat Alice on the shoulder, but she has other ideas. Her arms wrap around you in a hug. She smells like high school—the inky fuzz of whiteboard marker, the silt of pencil lead, the pre-processed lunch meat—and you find yourself welcoming it. “I trust you,” she says. “We’ll be careful together.”\n*goto telling_chika\n\n\n*label telling_chika\n\n\n*page_break\n\n\nYou decide to call Chika on the phone. You’re not ready to process the deep-running emotions that will flicker like firelight across her face as you confess to joining her and her cause.\n\n\nThe ringing jangles your ear only once. “Hello?” It may be something about the electrical translation of her signature sound, but the greeting is mechanical, cold, and automatic. She didn’t check caller ID.\n\n\n“Chika? It’s ${name}.”\n\n\n“Oh,” Chika says, tone instantly softening to tender. “A telephone call. Is this a special occasion?”\n\n\nAnxiety tickles your shin bones, and, out of the blue, you wish phones still had cords, so you could wrap the soft curling wire around your fingers over and over. Taking in a breath, you steady the feelings out. “I’ve decided. I want to join the Rogues.”\n\n\nYou hear Chika gasp and suddenly even the call is too intimate—hearing her voice in the dark shell of your ear is too much. “Thank you, ${name},” she says. “This makes me—I’m so glad.”\n\n\n“And Alice,” you blurt out. “Alice wants to join, as long as she doesn’t have to fight. That’s her condition. Non-negotiable.”\n\n\n“I accept her terms,” Chika says immediately. “Like I said before, I’ll keep you both safe. I’ll apologize to her for my behavior last time.”\n\n\nYou grip the sweaty plastic of the phone tight. “When can I see you again?”\n\n\nChika gives a deep rumble of pleasure. “Tomorrow. I’ll gather everyone tomorrow.”\n\n\n“Chika?”\n\n\n“Yes?”\n\n\n“Thank you.”\n*goto rogue_social\n\n\n*label rogue_social\n\n\n*page_break\n\n\nChika gathers her people like oh so many flowers, and these blooms are shockingly young. The abandoned warehouse, with its hot-wired electricity and DIY running water, crowds with happy voices that haven’t aged past their forties. Alice holds your hand quavering tight, and Rosario, who has insisted on coming, murmurs that they should have brought more cookies. They look quite nice in their black pleated skirt and floral button-up. Both Alice and you opted for plaid and jeans.\n\n\nThe warehouse is divided into two areas, and it speaks to the Rogues’ two-fold mission. Fight for their freedom: on the far end, wolves spar with tooth and claw, clearly readying themselves for battle. On the closer side, a shelter for loved ones: closer, thrift store couches huddle around a boxy television and people throw popcorn at what seems to be a remake of [i]The Wolfman[/i] on DVD. The tang of their laughter contrasts sharp as vinegar with the fighters’ snarls.\n\n\nIn her element, Chika stands ready to introduce you. Where do you go?\n\n\n*choice\n  #Join the movie snarkfest.\n    Chika leads you, Alice, and Rosario to the people sprawled out on the couch. She\n    introduces you all as new members, with Rosario as your close human friend.\n    Speaking of Rosario, they are instantly at home, ready to critique and gush about\n    the movie and its storytelling. You all squeeze onto a couch, with Alice curled\n    on your lap. Rosario is a warm fount of joy to your right; Chika emanates cool\n    reassurance and deep contentment to your left.\n    \n    \n    Is this a new pack? If so, you are welcomed. It is a good first night.\n    *set Snark %+16\n    *set Empathy %+6\n    *goto assignment_bisclavret\n\n  #Practice your fighting skills.\n    The wolves stop their exercise as Chika approaches. Regarding her with great\n    attention, they line up as she introduces them. Alice clutches your hand, and a\n    tension stretches Rosario’s shoulders, tight as a piano wire.\n    \n    \n    You tell Chika you’d like to spar, and she doesn’t brighten exactly, but the tilt\n    of her body—the way her muscles squeeze her bones—is eager. Rosario softly\n    murmurs that they’ll take Alice to watch the movie with the others, and you agree\n    that’s a good idea. It’s necessary for you to learn to fight, but Alice doesn’t\n    need to remain, especially if it freaks her out. Rosario squeezes your shoulder\n    once before taking Alice—they understand you completely.\n    \n    \n    Chika leads you to a back room to change and explain the rules. You nod along and\n    realize only when she strips too that Chika is going to let you watch her\n    transform into her wolf self for the first time. It makes a deep part of you go\n    still.\n    \n    \n    She hides in the curtain of her hair, and the curtain only becomes longer and\n    longer. Chika wraps herself in the velvet glow of deep night, falls to her hands\n    and knees as her skin firms and thickens its galaxies, and then color seeps out\n    of her, bleeds out until a giant wolf, as white as desert-bleached bones, stands\n    before you. You abruptly remember that white is the color of death and mourning\n    in Chika’s homeland. Ill luck indeed, but very, very beautiful.\n    \n    \n    Neither of you are stressed, but did Chika make her transformation that pretty on\n    purpose? Will you be able to do that one day? You avoid Chika’s great yellow eyes\n    as you transform. You hope wolf selves grow with age like humans do. For now you\n    are swept easily by Chika’s tail into the training area. You observe, mimic, and\n    practice. By the end of the session, you’re panting and have achieved an\n    easy camaraderie and mutual respect with your fellow warrior wolves. You are\n    welcomed. It is a good first night.\n    *set Defense %+12\n    *set Bloodthirst %+8\n    *goto assignment_bisclavret\n\n\n*label assignment_bisclavret\n\n\n*page_break\n\n\n“Alice, may I ask you something?” says Chika.\n\n\nAlice looks up from her homework spot on the Rogues’ sofa. In the month since you all joined, Alice, you, and Rosario have taken to meeting here almost every day. You’ve made friends and can feel your muscles strengthen from all the practice. It feels good. Alive.\n\n\nAlice blinks at Chika in slow motion, like a cat. “All right.”\n\n\nChika’s tone is soft and gentle—you can tell she is straining to be as delicate as possible, to cause the least distress. “I understand that you have not had any contact with your biological father. Would you like to?”\n\n\nWhatever Alice was expecting, it wasn’t that. “You’ve found my father?”\n\n\nChika nods. “To be more accurate, our fellow member Illtyd did. He’s still a wolf, but he’s close by. I thought this would be a good opportunity.”\n\n\nRosario watches the exchange with an ever-raising eyebrow. Alice cuddles closer to you, as if needing the assurance of reality. She doesn’t say anything for a long moment, but when she does speak, her voice doesn’t quaver. “This isn’t just to be nice to me. You’re also hoping he’ll join the Rogues.”\n\n\n“Yes,” Chika says, with no artifice or remorse. “That would be ideal. With him on our side, we would finally have enough strength to break silence and not suffer for it. But I will not undertake the endeavor without your permission, or presence. If he does not wish to join us….” Chika shrugs, but it is a careful gesture, like she performed it for Alice’s reassurance alone. “Reuniting a family is its own reward.”\n\n\nRosario speaks for the first time, “I don’t think she’s bullshitting. Seems like a good deal.”\n\n\nAlice sits up straight, sucks in a breath through her teeth, and looks Chika full in the face. “Let’s do it, then.”\n\n\n*page_break\n\n\nIt is decided that only you, Chika, and Alice will go into the forest to find Alice’s father, Bisclavret. A werewolf of age beyond memory and power beyond imagination will likely appreciate not being ganged up on.\n\n\nChika says that Bisclavret is deep in the forest. Will you run there on the power of your wolfish legs alone, or will you ride civilization’s train as far as it will take you?\n\n\n*choice\n  #Run there.\n    You all run as proper wolves do. Deeper yet deeper; stranger yet stranger.\n    *set Uncanny %+12\n    *goto ishara\n\n  #Take the train.\n    You take the train as any sensible person would. The electric rumble and screech\n    carry you far.\n    *set Uncanny %-12\n    *goto ishara\n\n\n*label ishara\n\n\n*page_break\n\n\nThe forest is a vast tangle of slow-growing blooms. Snow is only a faint remembrance now. The pale white, six-sided stars of wood anemones open to welcome sunshine and even some early bluebells nod in supplication. The group passes a meadow dense with light purple lady’s smock, and the air hangs heady with promise. Your blood quickens, to be amongst so many growing things. Even the birds refuse to be quiet, at high noon.\n\n\nThe ancient oakwood canopy shifts in breeze, and you drink it up hungry. Moist decomposition, warming earth, and the resin of deer fur fill your nose. The deer scent excites, but underneath that something…near unrecognizable, but quintessential werewolf.\n\n\nChika—resplendent in her enormous pure white coat—raises her head. She caught the scent too. She growls and has ear-pricked attention from you and Alice. Cautious and soft-stepped, you pick your way closer, low to the ground.\n\n\nTwo miles in, the wind strengthens and carries an irresistible temptation: the smell of woodsmoke and juicy, rich roasting meat. Whoever that werewolf is, they’re settling down to dinner with the aid of their human hands and feet.\n\n\nLeading the pack, Chika looks back at you and Alice. Are you ready?\n\n\n*fake_choice\n  #Yes.\n    *page_break\n\n  #No.\n    *page_break\n\n\nRegardless of your feelings on the matter, your party approaches, and it is quickly a bad idea.\n\n\nA one-armed woman hums over the campfire, roasting a deer carcass. A wolf standing on two legs turns a deer carcass over a campfire, while humming out a gravelly tune. Wolf and woman occupy the same space and in that space too is a pure indigo light that shimmers like a heart-deep absence does. Your brain vibrates with the image of a woman over the image of a wolf over the image of light; the smell of forest and ozone and burning incense clamor in your nose; in your ears the wingbeats of birds, loud and louder, flurry after flurry. Alice cowers. Chika screams.\n\n\nThe woman starts and stares at you. All you see are her vermillion eyes—the scarlet of blood; the damask of life coursing through her. Your wolf self is being scraped back, peeling away hair by hair by the blister of her gaze, until you are human, and it is your raw skin whimpering.\n\n\nYou black out.\n\n\n*page_break\n\n\n“Wake up,” says a voice. It is the voice of your father, and your mother too. It is the melody of them both. “I’m sorry about this. I wasn’t expecting you.”\n\n\nYou groan and open your eyes. Blue edges coddle your vision. Cradling you to her bosom is the most gorgeous woman you’ve ever witnessed. The low knife of her nose, the sleek ovals of her eyes, the high, dark arch of her brows, the roundness of her cheekbones—it is bewitching. Her lone arm hugs you closer. “You’re awake.” It’s a statement, not a question, and the relief in her voice is palpable as she touches your forehead with her own. The playful ringlets of her deep purple faux-hawk kiss your forehead, and you are utterly enamored.\n\n\nThe nameless butch beauty guides you into sitting up, and the blue fades. You feel energized, awake, and alert. Healed.\n\n\n“${name}!” Alice says, and the girl is suddenly beside you. “It took you so long to wake up!”\n\n\n“Gave us quite a scare,” Chika says and hands you a bottle of water. You’re surrounded by women and the forest. You sit close to the fire where the meat still roasts, and you, Chika, and Alice wear blankets for modesty’s sake. Camping supplies rest against a tree. You chug the water to hide your disappointment when the mystery woman disentangles herself from you.\n\n\nYou want to keep her close and know just the way to do it.\n\n\n*choice\n  #Compliment her and ask her name.\n    “What’s your name?” you ask first.\n    \n    \n    “Ishara,” the woman says, raising her arm and shaking down the sleeve of her\n    leather jacket as she prepares to stoke the fire. The other sleeve is pinned up\n    neatly.\n    \n    \n    “And did it hurt when you fell from heaven?”\n    \n    \n    Ishara stops mid-movement and laughs, a high, musical sound. Her plush lips widen\n    into a bashful smile. “No,” she said. “I have an enchantment for that.”\n    \n    \n    Your eyes round, and Chika nods to confirm. For the first time, you notice the\n    brightness of Chika’s expression. “She is the blue light. Ishara is a goddess\n    among werewolves.”\n    *set Empathy %+6\n    *set Ishara +25\n    *goto meet_bisclavret\n\n  #Ask a snarky question.\n    “Would anyone like to explain what’s going on?”\n    \n    \n    Ishara raises her arm and shakes down the sleeve of her leather jacket in\n    preparation to stoke the fire. Her other sleeve is neatly pinned up. “You can\n    call me Ishara. Your pack leader Chika has told me you’re after Bisclavret. So am\n    I, but it looks like I ensnared you instead of him.”\n    \n    \n    Your eyes round, and Chika nods to confirm. For the first time, you notice the\n    brightness of Chika’s expression. “She is the blue light. Ishara is a goddess\n    among werewolves.”\n    *set Snark %+16\n    *goto meet_bisclavret\n\n  #Aggressively demand answers!\n    As the woman shifts away, you grab her wrist. “Who are you?” you demand. “What\n    did you do to us?”\n    \n    \n    “My name is Ishara and it was a misunderstanding,” she says, tugging her wrist\n    out of your fingers. “I’m after Bisclavret, as you are.”\n    \n    \n    You refuse to let go. “Why?”\n    \n    \n    “${name}!” Chika says, sharp as a thrown knife. “Ishara is a goddess among\n    werewolves. She is the blue light and here to help us. Adjust your tone.”\n    *set Bloodthirst %+8\n    *goto meet_bisclavret\n\n\n*label meet_bisclavret\n\n\n*page_break\n\n\n“The others certainly put it like that,” Ishara responds, glancing at Chika. “They call me a goddess. I think of myself as a traveler.” A haunted flicker and flash across her face, and you realize she is not naturally still, but expressive and light. She turns to Alice. “I’ve been staying with the Masquerade this last month. They told me about you and their…hesitation,” Disdain mars her features to convey exactly what she thinks of their hesitation, “to find your father. I offered to help. It’s a blessing to meet you now.”\n\n\nStanding and drawing close to Ishara, Chika launches into an explanation of the Rogues and their goals. Ishara bustles around the campsite while she listens and murmurs that perhaps she’ll reconsider her current neutrality in the Masquerade-Rogue conflict. You feel calm. Twilight stains shades of gold and red, which wink and spark off Ishara’s earrings. A river rustles its waters nearby. The meat only smells more and more delicious.\n\n\nYou are thinking of asking for a bit of meat when you hear it. A howl.\n\n\nAlice stands up. “He is coming.”\n\n\n“${name}, Alice, let us prepare,” Chika says. Goddess or no, you have a plan to make Bisclavret more talkative than the typical feral wolf.\n\n\nWhich is…?\n\n\n*choice\n  #Fight him into submission.\n    *if Defense > 35\n      All three Rogues transform. You and Chika move to stand in front of Alice and\n      Ishara. “You choose battle?” Ishara says from behind you. “I’ll follow.” She\n      whispers something more, but you tear your eyes away as she emanates a holy\n      blue glow. Alice hides.\n      \n      \n      Your ears catch the crack of twig and tear of branch. A large something hurtles\n      towards the camp, and the howling call echoes in the cavities of your heart. A\n      crash, and before you is the colossal form of a wolf the gray color of\n      hurricanes, of rain beating down on humanity to hurt it dear, of sky angry and\n      seeking vengeance.\n      \n      \n      He dives for you, but you are quick and bite at his ankles. Chika and you flank\n      him, parry in and out and surround. Growling threatens to deafen. His jaws\n      could encase your entire body and they almost do, but you are fast, dizzy with\n      swiftness. Forked bursts of indigo lightening crackle the air, and Bisclavret\n      roars.\n      \n      \n      The roaring blares, rips, rattles. Ishara booms in return and you taste copper\n      on your tongue and live unknowing to whom it belongs. Chika careens into you;\n      covers you with her body—any effort to muffle this ear-splitting noise.\n      \n      \n      All at once it is silent and you do not know if your hearing has ceased\n      function, or if you have won until Alice says, “Hello Father.”\n      *goto recruitment_j\n\n    *else\n      All three Rogues transform. You and Chika move to stand in front of Alice and\n      Ishara. “You choose battle?” Ishara says from behind you. “I’ll follow.” She\n      whispers something more, but you tear your eyes away as she emanates a holy\n      blue glow. Alice hides.\n      \n      \n      Your ears catch the crack of twig and tear of branch. A large something hurtles\n      towards the camp, and the howling call echoes in the cavities of your heart. A\n      crash and before you is the colossal form of a wolf the gray color of\n      hurricanes, of rain beating down on humanity to hurt it dear, of sky angry and\n      seeking vengeance.\n      \n      \n      He dives for you, and you dart away, but not fast enough. His long, yellow\n      canines hook and interlock around your flailing body, and screams only fill\n      your own mouth with saliva and blood.\n      *goto_scene death\n\n  #Appeal to his humanity.\n    *if Empathy > 35\n      Chika morphs into her wolf shape and circles protectively around Alice and you,\n      who remain human. You root yourself in bravery, and put a hand on Alice’s\n      shoulder.\n      \n      \n      “Shall I help Chika, then?” Ishara asks, and before you can answer, a flame\n      ignites and surrounds Ishara, coats her body in bluebell light, and in that\n      shimmer her body melts and a wolf rises. She is different from Chika or you or\n      anyone else. Dark brown fur prickles out everywhere, but she stands on two\n      legs, her forepaws are clawed but human-bent, and her snout is shorter. Her\n      eyes remain their natural red. Familiar yet strange. Uncanny. You feel she is\n      dimming herself down so you may comprehend her.\n      \n      \n      Your ears catch the crack of twig and tear of branch. A large something hurtles\n      towards the camp, and the howling call echoes in the cavities of your heart. A\n      crash and before you is the colossal form of a wolf the gray color of\n      hurricanes, of rain beating down on humanity to hurt it dear, of sky angry and\n      seeking vengeance. \n      \n      \n      The hair on the back of your neck raises, and you struggle to keep your lips\n      from snarling to show off teeth. Chika and Ishara have no such inhibitions,\n      however, and you must boom your voice to echo. “Hail Bisclavret! We bring you\n      news from the civilized lands, my lord, my bite-line!”\n      \n      \n      The wolf visibly pauses, as you had hoped the formal address Chika had\n      taught you would—old souls like the old ways of doing things. His gaze is\n      steady and heavy on you, like a gavel weight.\n      \n      \n      Alice steps forward. You have never seen her more determined, more on fire.\n      “Hail Bisclavret! My lord, I am your natural born daughter and I would know my\n      father.”\n      *goto r, and\n      you do your best to ignore the beehive’s worth of buzzing coming from the\n      campsite.\n      \n      \n      Chika and you keep still, with Alice nestled between you safe. Your ears catch\n      the crack of twig and tear of branch. A large something hurtles towards the\n      camp, and the howling call echoes in the cavities of your heart. A crash, and\n      you hear Ishara’s voice. “Hail Bisclavret! I come bearing news from the\n      civilized lands.”\n      \n      \n      There is a pause. Your heart beats deep in your chest and slow in your ears.\n      Your breaths are shallow and quick. Everyone stills.\n      \n      \n      “It is all right to come out,” Ishara says. “He’s eating the meat.”\n      *goto recruitment_j\n\n    *else\n      After Ishara shares the details of her plan, you decide to stick with yours.\n      All three Rogues transform and hide. Ishara instructs you not to look at her,\n      and you do your best to ignore the beehive’s worth of buzzing coming from the\n      campsite.\n      \n      \n      Alice hides in the brush while you and Chika make ready. Your ears catch the\n      crack of twig and tear of branch. A large something hurtles towards the camp,\n      and the howling call echoes in the cavities of your heart. A crash, and you and\n      Chika leap out of hiding to bite the first flesh you can. You barely grasp the\n      enormity of the gray wolf before he shakes you off. His long, yellow canines\n      hook and interlock around your flailing body, and screams only fill your own\n      mouth with salvia and blood.\n      *goto_scene death\n\n\n*label recruitment_j\n\n\n*page_break\n\n\nThe massive wolf does not transform back into a man before first devouring most of the meat. You don’t want to watch, but you cannot look away either, as his massive yellow jaws hook and lock and shear. Only after the last of the blood is licked off his nose and the prime bits have disappeared down his gullet do his own sinews twang, snap, shrink, and reform. The grotesque dance of his flesh is a study in anatomy and dissection—fur sloughs off like bloated bark, giving glimpses of the pinkness of his lungs and healthy dark mauve of his liver. His nails, teeth, and skull shriek at their shortening. The wet lines of his veins muffle the bones mercifully quick.\n\n\nBefore them stands a smallish man with a riot of dense, thick curls and a coloring only a few shades lighter than Ishara’s. He does resemble Alice, except for his piercing blue eyes. Alice sucks in a breath at her paternal mirror. “Hello, Father.”\n\n\nExpressionless, he looks Alice up and down. You wonder if his want of expression is because of a serious demeanor or if he’s forgotten how to work a human face. Another minute before he speaks, and even then it is a rasp. “I acknowledge you as my child.”\n\n\nAlice takes a step towards him. “May I touch you?”\n\n\n“Come here. I haven’t held a child in an age,” he says, quiet, and Alice runs. Just as the moon rises, they hug, father and daughter, united at last.\n\n\n“Come away,” Ishara says, touching your shoulder. “Give them a moment.”\n\n\n*page_break\n\n\nAlice and Bisclavret talk for hours. Chika hovers close to the familial pair, a silent guardian. As the night grows, Ishara passes out spare long robes and ensures everyone eats meat and the dried berries from her pack. Rosario would call her “total Mom Friend material.” She withdraws beyond the firelight. You make to follow, but Chika stops you with a reassuring squeeze of your shoulder.\n\n\n“You did well today,” she says, letting her fingers slide off. She then tilts her head in Ishara’s direction. Perhaps in instruction and perhaps in approval.\n\n\nIn either case, you find Ishara sitting in the crook of an oak tree. She looks a vision, surrounded by new growth leaves and aching, praying branches. At first you think she’s sleeping, but then she cracks an eye open. “I was hoping you’d come.”\n\n\nThat makes you smile and climb. You straddle the bough adjacent hers. All the better to see her by the gibbous moonlight. The bark is pleasantly rough underneath your fingers and the blunt smell of old wood is welcome.\n\n\n*choice\n  #Say nothing.\n    You settle into the tree and say nothing. Ishara sighs, and then breaks the\n    silence. “How long have you been a werewolf? You’re a strange mix of young and\n    settled.”\n    \n    \n    “About three months,” you answer.\n    \n    \n    Ishara whistles. “It must be like that here.”\n    \n    \n    “What do you mean?”\n    \n    \n    “Well,” Ishara scratches her head and doesn’t meet your eyes.\n    \n    \n    You wait for her to fill the pause\n    *goto ishara_backstory\n\n  #Flirt back.\n    “Maybe you want to check my vitals again?” you grin. “I’ll take off my clothes\n    and everything.”\n    \n    \n    An answering smile splits Ishara’s face with giggles. “Oh, I like you,” she says.\n    “You treat me like anybody else.”\n    \n    \n    You cock your head, curious. “What do you mean?”\n    \n    \n    She waves her hand. “Oh, the others, they’re very polite, but they keep looking\n    at me like….”\n    \n    \n    You wait for her to fill the pause.\n    *set Ishara +25\n    *goto ishara_backstory\n\n  #Ask a question.\n    You settle into your place in the tree and ask if it’s okay if you ask a\n    question. Ishara says yes, so you say, “Are you really a goddess?”\n    \n    \n    Ishara peers at you in open curiosity. Whatever she finds there, it makes her\n    sigh. “I have magic that seems new to this place, and I think that…\n    out-of-place-ness overwhelms people.”\n    *goto ishara_backstory\n\n\n*label ishara_backstory\n\n\n*page_break\n\n\n“I’m not from here,” she blurts out.\n\n\n“What do you mean? The forest?”\n\n\n“No, no—I mean! Yes? Um, it’s difficult to explain.” Ishara may be the most comely woman you’ve met when composed, but she’s absolutely gorgeous flustered. She speaks very fast. “I’m from another world and in that world I’m a perfectly ordinary werewolf but my companions and I were tricked into going to [i]another[/i] world and we exploded it but now we’re separated across all creation and I landed here and I don’t quite [i]fit[/i] and it’s the worst.”\n\n\nIt takes you more than a few moments to absorb all of this tirade. Ishara watches you carefully, beseechingly. Gone is the warrior, the motherly caretaker, the compassionate healer—now she is as painful and exposed as a ghost. A wrong word and she’ll disappear. “Do you believe me?” she asks.\n\n\n*choice\n  #Yes.\n    “Yes,” you breathe, and Ishara leans forward as if she wants to capture the\n    sound. Your heart beats fast.\n    *set Empathy %+6\n    *set Uncanny %+12\n    *set Ishara +25\n    *goto empathy_test_i_r\n\n  #No.\n    “That…that’s impossible,” you say. Many impossible things have happened to you in\n    the last months, but this is one too much to comprehend and bear the burden of.\n    “You’re talking multiverse here.”\n    \n    \n    Ishara recoils as if stun. With grace you envy, she drops off the tree and dusts\n    off her jeans. “I’m returning to the others,” she says, not looking at you.\n    *set Ishara 0\n    *goto rogue_choice_end\n\n\n*label empathy_test_i_r\n\n\n*page_break\n\n\nWith impossible grace, Ishara drops off the tree and holds her hand out to you. “I would very much like to kiss you,” she says. “And more, besides. Would you like that too?”\n\n\n*choice\n  #Politely decline, explaining you don’t feel that way about her.\n    Ishara helps you down from the tree all the same. “I see. Thank you for\n    entertaining the notion and coming to find me.” She laughs, though it’s tinged\n    with disappointment. “Shall we go back to the others? I’m eager to try this new\n    delight called ‘smores.’”\n    *set Ishara 0\n    *goto rogue_choice_end\n\n  #Politely decline, explaining that you are asexual.\n    Ishara helps you down from the tree and smiles excitedly. “Oh! You are like my\n    little brother Sebitti! He desires no one as well. He also feels no love outside\n    the platonic and familial. One time he went fishing with his friends and a siren\n    came along and he was the only one able to keep his head! Saved them all, and the\n    village was well pleased. Shall we go back to the others then? I packed the\n    ingredients for these things called ‘smores’ and I’m eager to try them.”\n    *set Ishara 100\n    *goto rogue_choice_end\n\n  #Kissing.\n    Your mind reels and its speed only increases as you take Ishara’s hand and drop\n    down. “Oh god, a make out sesh would be fantastic right now.” Ishara laughs and\n    wraps you up in her arm, presses heartbeat to heartbeat, and kisses you full on\n    the mouth. Your spirit jumps, and your hands automatically frame her face,\n    relishing the feel of her razor side cut under the pads of your fingers. She\n    tastes the way roses and cloves smell.\n    \n    \n    “${name},” she whispers, and with a start you realize it’s the first time she’s\n    said it. She shudders and spreads her fingers across your spine; shares her\n    tingling warmth.\n    \n    \n    Your embrace builds passion and then turns gentle: a caress, an affirmation, a\n    sanctifying of intimate space. Ishara nuzzles into your neck and you breathe deep\n    the scent of her hair. Your heart brims with contentment and warmth. You hope the\n    feeling stays with you a long time.\n    *goto rogue_choice_end\n\n  #Kissing and more, besides.\n    *if trans > 50\n      Your mind reels and its speed only increases as you take Ishara’s hand and drop\n      down. “Oh god, yes to all.” Ishara laughs and wraps you up in her arm, presses\n      heartbeat to heartbeat, and kisses you full on the mouth. Your spirit jumps,\n      and your hands automatically frame her face, relishing the feel of her razor\n      side cut under the pads of your fingers. She  tastes the way roses and cloves\n      smell.\n      \n      \n      “${name},” she whispers, and with a start you realize it’s the first time she’s\n      said it. She shudders and spreads her fingers across your spine; shares her\n      tingling warmth.\n      \n      \n      Your embrace builds heat to an ever greater pitch; fans embers to cozy fires to\n      licking inferno. Clothes come off easy, but when Ishara catches sight of you,\n      she freezes. “Oh!”\n      \n      \n      “What?” you say, voice breathy. “Is something wrong?”\n      \n      \n      She touches your chest in reverence and for a wild moment you think she’s going\n      to cry. “They’ve kept me so isolated. I thought—I thought I was the only one.”\n      \n      \n      You shove aside the implications of this to kiss her hard. “You’ll never be\n      alone again.”\n      \n      \n      You kiss every inch of what you find. It is an act of adoration; a resolution;\n      a pledge to first meetings, to whirlwinds, and to happy endings.\n      \n      \n      Afterwards, Ishara cuddles close and whispers sweet nothings, like that every\n      goddess needs a consort.\n      *set Ishara 100\n      *goto rogue_choice_end\n\n    *elseif Empathy > 40\n      Your mind reels and its speed only increases as you take Ishara’s hand and drop\n      down. “Oh god, yes to all.” Ishara laughs and wraps you up in her arm, presses\n      heartbeat to heartbeat, and kisses you full on the mouth. Your spirit jumps,\n      and your hands automatically frame her face, relishing the feel of her razor\n      side cut under the pads of your fingers. She tastes the way roses and cloves\n      smell.\n      \n      \n      “${name},” she whispers, and with a start you realize it’s the first time she’s\n      said it. She shudders and spreads her fingers across your spine; shares her\n      tingling warmth.\n      \n      \n      Your embrace builds heat to ever greater pitch, fans embers to cozy fires to\n      licking inferno. Clothes come off easy, and you kiss every inch of what you\n      find. It is an adoration; a pledge to first meetings, to whirlwinds, and to\n      happy endings.\n      \n      \n      Afterwards, Ishara cuddles close and whispers sweet nothings, like that every\n      goddess needs a consort.\n      *set Ishara 100\n      *goto rogue_choice_end\n\n    *else\n      Your mind reels and its speed only increases as you drop down. “Oh god, yes to\n      all.” Ishara wraps you up in her arm, presses heartbeat  to heartbeat, and\n      kisses you full on the mouth. Your spirit jumps, and your hands automatically\n      frame her face, relishing the feel of her razor side cut under the pads of your\n      fingers. She tastes the way roses and cloves smell.\n      \n      \n      Your embrace builds passion but then turns gentle: a caress, an affirmation, a\n      sanctifying of intimate space. Ishara nuzzles into your neck and you breathe\n      the deep scent of her hair. Your heart brims with contentment and warmth. You\n      hope the feeling stays with you a long time.\n      *set Ishara 75\n      *goto rogue_choice_end\n\n\n*label rogue_choice_end\n\n\n*page_break\n\n\nBy next morning, Bisclavret has agreed to return to the human fold and fight for the Rogues. Alice is elated, and you catch her pinching herself. She murmurs that she never dared dream of having a father again, or one whose mind is so cool and calm, like walking in the shade of the greenwood during high summer. Bisclavret snorts at this description, but you see how his eyes follow Alice with delight and affection. “She’s a good girl.” You nod, knowing.\n\n\nChika is beside herself at the Rogues’ good fortune. They have gained an elder and a goddess in one fell swoop. Your group is more than ready to reveal and defend themselves now. It is only a question of setting up the cameras.\n*page_break\n*goto_scene last_masquerade\n\n\n*label masquerade_meeting\n\n\n*page_break\n\n\n“It’s going to be fine,” Rosario says as they, Alice, and you stand on Cassandra’s doorstep. “We’ll go in, we’ll answer any questions directed at us, and then we’ll eat and squirrel away as much free food as possible. I brought the big purse.”\n\n\nYou didn’t want Rosario to come, for safety reasons, but with that sentence you’re immensely glad they’re here, gray flounce skirt and autumn yellow blouse entire. Alice wears a violet dress and holds Rosario’s hand tight.\n\n\nHow are you feeling?\n\n\n*fake_choice\n  #Nervous.\n    *page_break\n\n  #Confident.\n    *page_break\n\n  #Determined to get this over with.\n    *page_break\n\n\nIt is…surprisingly underwhelming. Smells excluded, it appears to be a room full of ordinary people. There are the upper-crust snobs—you know, the healthy-looking blondes with artificially whitened teeth—who you itch to pull a fast one over on. The more unconventional types with their sequined tops and shimmery red dresses who look like they need listening ears for their fascinating stories. A brawny set of women, men, and those who identify as neither trade fighting tactics by the fireplace. Smells included, there [i]are[/i] no smells, beyond those of clean linen, laundry detergent, and a whiff of pine. You’d think it would be a mess of vampire sweetness and dog fur. Magic?\n\n\nThere’s no time for further questions, as Cassandra pops up unpleasantly into your vision. “Hello,” she says, smile wide and red as usual. “Welcome to the party. Please mix and mingle. People are eager to meet you.”\n\n\nYou give her a sour look, and she laughs out a sound that is throaty and fake. “I’ve made some magical adjustments to keep everyone comfortable. Watch for the floating hors d’oeuvre trays and the bar is tucked in the corner. Eat as much as you like.”\n\n\nWith that, she waltzes off, and you’re left to your own devices.\n\n\nWhere do you go?\n\n\n*choice\n  #Snark at the High Society.\n    Armed with cocktails and Rosario, you insert yourself among the fluffed up\n    feathers of the elite. They tut and simper and talk about health fads and sports\n    and museum openings, just as humans would. Alice is mostly silent, but it is a\n    special pleasure when you manage to make her laugh at a joke about Wall Street.\n    The only downside is you don’t get to stow away many appetizers in Rosario’s\n    purse.\n    \n    \n    Just as you think the evening will wind down, the distinctive chime of a knife\n    meeting a wine glass clinks. You turn to look.\n    *set Snark %+16\n    *goto sati_intro\n\n  #Sympathize with the bohemians.\n    The bohemian set reminds you of grown-up theater kids, or people who took the\n    Gothic literature period very seriously. They laugh, joke, and tell tale after\n    tale. Relaxed smiles and laughter are coaxed like treasures out of Alice, and\n    Rosario fits in like a glove to a long-lost hand. “Do we make the aesthetic, or\n    does the aesthetic make us?” is a hot topic, and it morphs to whether it is\n    better to breathe new fire into old stories or shape something entirely new for\n    this new century. You stretch your mind and heart to understand every point of\n    view. Completely understanding, the bohemians help stuff Rosario’s purse to\n    bursting with snacks for later.\n    \n    \n    Just as you think the evening will wind down, the distinctive chime of knife\n    meeting a wine glass clinks. You turn to look.\n    *set Empathy %+6\n    *goto sati_intro\n\n  #Learn fighting tips from the bears and butches.\n    There’s a happy queer feeling all around as you join the group as dedicated to\n    the art of fighting as their suits are to complementing muscle bulges. They call\n    you “little wolf,” and Rosario tries not to act starstruck. Tales, tips, and\n    health food abound. Comfortable, Alice listens with attentive politeness, like a\n    student among teachers. Rosario manages to slip a couple treats into their purse.\n    \n    \n    Just as you think the evening will wind down, the distinctive chime of a knife\n    meeting a wine glass clinks. You turn to look.\n    *set Defense %+12\n    *goto sati_intro\n\n\n*label sati_intro\n\n\n*page_break\n\n\nNow that Cassandra has everyone’s attention, she begins, “Thank you all for coming to my humble abode this night. We have a special guest among us, with an equally special request. Xe needs no further introduction.”\n\n\nNerves ricochet off your neck. What? You don’t have a request. You want to get out of here.\n\n\nCassandra stands in front of a bright light, which casts stark shadow outside of its circle. In the middle of your panic, what you took for a spat of darkness speaks in a musical, lilting tone, like that of violin strings. “Thank you, sweet Cassandra.”\n\n\nPins and needles skitter up your arms, and the room contracts a deathly chill with only werewolf breath to warm it. The shadow stretches and breathes and exhales a person with a body that could be described as feminine. Xe seems Indian, with cascading locks of black hair and a formal Western suit. The contrast of black and white does not hide the odd gray tinge to the brownness of xer skin, nor hide the thin foggy film over xer eyes, like dissected objects preserved in formaldehyde too long.\n\n\n“They call me Sati. I am a vetala. I would like to save Dracula’s brides.”\n\n\n*page_break\n\n\nThe plan is something straight out of the mad logic of dreams, or a Castlevania video game, or [i]something[/i] past the regular rhythm of the world and into fever. On the next new moon night, you will stand in the circle, with extra magical or ancient people at the four compass points: Sati to the north; Alice to the east; Cassandra to the west; and a woman named Ishara, who you haven’t met yet, to the south. In the center will be a mirror, which will transport all across time and space to Transylvania where Sati will have a second chance to convince xer partners to flee.\n\n\n“And you’re all right with this?” Alice asks again. “You’ll stay by my side?”\n\n\n“The whole time,” you assure her. “When we get back, Rosario will greet us and make cookies.”\n\n\n“And they won’t even have weed in them,” Rosario laughs. You think they’re a little jealous that you and Alice will have such an adventure, and this emotion clashes fierce with worry. “I want you to remember details so I can write every one down.”\n\n\nYou nod and, on impulse, hug Rosario close and nuzzle into their neck. They laugh and tell you to get going already.\n\n\n*page_break\n\n\nThe…spell? Ceremony? Incident. The incident takes place huddled in Cassandra’s spooky basement because of course Cassandra has a spooky basement. On the appointed night, Sati and Cassandra are already there when you and Alice arrive. You raise your hand in greeting, and the gesture freezes when you see that they’re talking to the most gorgeous woman you’ve ever had the honor of witness. You walk towards her as if magnetized. The low knife of her nose, the high, dark arch of her brows, the roundness of her cheekbones—it is bewitching. She glances at you, and her gaze is vermilion: the scarlet of blood; the damask of life.\n\n\nSati suddenly blocks your view and hooks xer arm through yours. “You haven’t met our werewolf goddess yet, I see,” Sati says. “I’ll announce you.”\n\n\nAlice moves mechanically, and you follow. Ishara is dressed in a leather jacket with her empty sleeve neatly pinned up and has her hair done in a deep purple faux-hawk with an undercut shave on the sides. Of course she’s a butch goddess. How could she not be?\n\n\n“Goddess Ishara,” Sati says, letting go of you to bow. “May I introduce Alice Devonfort and Dr. ${name} ${surname} of the Bisclavret bite-line.” You mimic Sati’s bow, as does Alice.\n\n\n“Please stand,” Ishara says. When you do, she extends her lone hand out to shake. “It’s nice to meet you.” Her voice is a melody you’ve always wanted to hear.\n\n\nYou shake, and you hear Cassandra tsk in the background. “They are not even sensible of the honor.”\n\n\n*choice\n  #Compliment Ishara.\n    “Did it hurt?” you ask, taking Ishara’s hand.\n    \n    \n    Ishara squeezes your hand in confusion. “Hm?”\n    \n    \n    “When you fell from heaven?”\n    \n    \n    Ishara laughs in a way that makes your heart sing and squeezes your hand harder,\n    more sure. “No, I have an enchantment for that.”\n    \n    \n    Your fingers reluctantly part. Cassandra looks like she’s swallowed a dozen\n    lemons while Sati smirks. Alice’s gaze flicks between you and Ishara with\n    question.\n    *set Empathy %+6\n    *set Ishara +25\n    *goto mirror\n\n  #Snark with Ishara.\n    You shake Ishara’s hand. “For a werewolf goddess, you’re hanging out with a lot\n    of vampires. Does it suck?”\n    \n    \n    Cassandra rolls her eyes so hard you’re afraid she’ll damage them. “Could you be\n    more adolescent?”\n    \n    \n    Ishara chuckles and lets go of you. “My hosts have been very polite and kind to\n    me.”\n    \n    \n    Alice stares at Ishara like she’s a puzzle, and you cough awkwardly.\n    *set Snark %+16\n    *goto mirror\n\n  #Bluntly ask Ishara what her deal is.\n    You take her hand and aim for the throat of the matter. “Are you really a\n    goddess?”\n    \n    \n    Cassandra hisses, like a cat, and the smile on Ishara’s face disappears. She\n    drops your hand. Sati is the only one who will answer. “I have lived more than\n    nine thousand years, and I have never heard of any werewolf with her power. She\n    is blessed, and she blesses us.”\n    \n    \n    The sheepish expression on Ishara’s face only makes her more endearing. “Try not\n    to look at the blue light. It will make you uncomfortable.”\n    \n    \n    You and Alice exchange a look. You shrug. You’ll cross that bridge when you come\n    to it.\n    *set Bloodthirst %+8\n    *goto mirror\n\n\n*label mirror\n\n\n*page_break\n\n\nSati intervenes. “Well, now that all the players are here, let’s proceed.”\n\n\nWith a blink, you realize other people are in the room: various Masquerade members mill about, and ten of you fill the circle around a tall gilded mirror. On impulse you kiss the top of Alice’s head for luck, and she grips you tight in return. You are to witness magic.\n\n\nHow do you feel about this?\n\n\n*fake_choice\n  #Nervous.\n    *page_break\n\n  #Excited.\n    *page_break\n\n\nYou stand on Alice’s right as everyone quiets down. The lights are off, and there is an intimacy in the deep dark, with only the sound of your own damp breathing. It is like you all wear masks and only speak truth.\n\n\nThe indigo light from Ishara nearly blinds you in its suddenness and intensity. It spreads from hand to hand like a virus and vibrates your bones before bouncing to the mirror. Goosebumps thick coat your wrists. Alice says words not of human tongue, and a red-black shadows pours from Sati’s heart and smothers the gilding. Cassandra is so ashen-faced she might as well have turned to stone. The mirror is wrong. It’s all wrong.\n\n\nYou feel like you want to throw up, but instead you fade deeper.\n\n\n*choice\n  #Fight it.\n    You curl your toes and scream. You wail and lean back and fight the bruising blue\n    light. The smell of roses and cloves grabs you, and Ishara holds you like iron\n    around your soul “Breathe,” she commands, and her voice sears your lungs open.\n    “Breathe into me.”\n    *goto dracula_castle_rampart\n\n  #Go with the feeling.\n    You relax your muscles and let go. Moving your body across time can be as easy as\n    falling asleep and dreaming.\n    *goto dracula_castle_rampart\n\n\n*label dracula_castle_rampart\n\n\n*page_break\n\n\nYou land as a wolf in a completely new place. Uneven, warm stone beneath your paws. The faint sound of fluttering and the insect hum. The air smells like perfume, like pomegranates, ginger, and ambergris, but there’s something underneath, like mold, dust, and ripe orange decay.\n\n\nSomebody places a hand on your head, but you nearly bite it off. “Shh,” Sati says. “Cassandra and the rest have stayed behind as our anchor. We’ll be safe.”\n\n\nAlice rubs your side, a wolf too. Ishara is a new creature altogether: thick dark brown fur may prickle out from her skin, but she stands on two legs, her forepaws are clawed but human-bent, and her snout is shorter. Her eyes remain their natural red.\n\n\nNevertheless, you all follow Sati down an eroding stone rampart. The sun keeps flashing golden red. At the end is a tower with a wooden door. Sati puts up xer hand to tell you to wait.\n\n\n*fake_choice\n  #Wait.\n    *page_break\n\n  #Carry on.\n    *page_break\n\n\nIn the hundredth of a second it takes to command your limbs to obey, it is too late. You are yanked in the air and hot pain on your neck demands attention. It’s like someone has forced you against a piping hot stove to watch you burn.\n\n\nYou writhe in a cacophony of roaring. Every cell within screams for you to escape, but whoever has you breaks your legs with a chopstick snap. You shut your eyes as shock descends its willful curtain against the brightness. Somebody wrenches your body sideways and then…and then everything is indigo.\n\n\n“${name}!” Ishara sits beside you, glowing in a halo of deep blue-violet. Her own claws pet your fuzzy head, and you want to weep. The pain recedes, but you’re not blacking out. Everything becomes…clearer? You feel fine.\n\n\nAlice whines and rubs against you, and you stand up. You’re healed. “That’s it,” Ishara says. “You got this.”\n\n\nThe vampire—you were attacked by a vampire, the very one you’re trying to save—speaks with Sati in terse tones for a liquid language. Her coral lips drip blood, your blood, in a vampiric smile.\n\n\nYour mind focuses in on how sensual the woman is, with her birchwood skin and thick blonde hair. Her eyes are like Chika’s, the color of the dark universe, and her fingers as strong and as delicate as a glacier. She’s the source of the perfume, the source of pomegranates, ginger, and ambergris smell. While the sun is dying, she is living in its dusty red wine light; she is taking in all the light; she is emanating it. The woman seems to embody sex, embody [i]vitality[/i].\n\n\nShe is bursting with all the secrets and knowledge you don’t have. How will you convince her to go with you?\n\n\n*choice\n  #Intimidate her.\n    *if Bloodthirst > 35\n      What you do know of tactics tells you that the vampire surprise-attacked\n      because some part of her is wary of you and your power. You bristle and growl,\n      putting all your bloodthirst danger into the sound, making a deep tremble of\n      warning. It makes the vampire smile and nod.\n      *goto return\n\n    *else\n      You bristle and growl, putting all your bloodthirsty danger into the sound,\n      making a deep tremble of warning.\n      \n      \n      She remains unimpressed, and you know this because your world narrows to red\n      pain.\n      *goto_scene death\n\n  #Persuade her.\n    *if Empathy > 35\n      You grit your teeth and transform into human. Alice guards your ankles, and\n      Ishara has your six. The vampire watches you with a fascinated expression. You\n      offer your wrist as a sign of trust and think about what words someone under\n      the thumb of a vampire lord would long to hear. “Tell her,” you say, “that\n      there’s plenty of blood in the future and she won’t have to be dependent on\n      anyone for it. Her life will be her own. But if she needs help, she has it.”\n      \n      \n      An impressed Sati translates, and adds in a murmur, “Thank you.”\n      *goto return\n\n    *else\n      You try to flash your wolf teeth sympathetically, but it’s taken as challenge.\n      Your world narrows to red pain far too quick.\n      *goto_scene death\n\n  #Let Sati handle it.\n    *if Snark > 35\n      As you know when to crack a joke, you know when to keep silent. Alice, Ishara,\n      and you silently back Sati up. It is a long discussion, but in the end Sati\n      smiles with relief. A good sign.\n      *goto return\n\n    *else\n      You transform into a human to put your two cents into Sati and the vampire’s\n      discussion. The only problem is they’re speaking too quickly for you to get a\n      word in edgewise, and when you talk over Sati, the vampire gives you a look of\n      disdain. The disdainful look is the last thing you see before the world narrows\n      to red pain.\n      *goto_scene death\n\n\n*label return\n\n\n*page_break\n\n\nThe vampire kisses Sati’s cheeks before taking xer hand in her own. Passing by you, they walk like a bridal pair down the rampart towards the portal. You follow at a distance as thick, dark mist and shadow tail them; then stretch and form into two other women. The Brides of Dracula do not spare a goodbye or tears for their master. Were they ever only [i]his[/i] brides?\n\n\nThey reach the end of the rampart and you see a mirror—the same mirror—resting against the wall. The mirror shimmers, like bad, sparkly CGI. It’s not supposed to be here. Just like you.\n\n\nAlice nudges you forward as if to encourage you home.\n\n\n*page_break\n\n\nPassing through the mirror is like passing through a fog. Your fur ruffles with cold for only a moment. After existing in the crumbling castle, Cassandra’s basement seems almost homey.\n\n\n“Everyone all right?” Cassandra calls. She sounds drained, half her usual self.\n\n\n“Yes,” Sati says. “May I introduce Cleo, Medusa, and Donn.”\n\n\nExhaustion runs rivulets through you, and you ignore introductions in favor of focusing on clothing your human body. Sleepy-eyed and yawning, Alice’s mind must run along the same vein. When she bumps into you, you give in to temptation and pick her up like the child she is. She doesn’t protest.\n\n\nYou’re halfway to the door when the vampire women step into your path. You eye them, wary. But instead of pouncing or demanding blood, or whatever it was you expected, one by one they come close and kiss your forehead. “Good ${mc_persongirl},” the leader pronounces in halting English.\n\n\n“Isn’t ${mc_theyshe} just?” Ishara pops out of nowhere by your side, back in human form. “Alice too.”\n\n\nThe vampire ladies blink at Ishara and then move away on silent feet. For her part, Ishara follows you upstairs and helps put Alice to bed in the room Cassandra keeps for her. Once you close Alice’s door, your thoughts dwell on texting Rosario and finding the least uncomfortable sofa when Ishara asks, “This might be a little sudden, but do you want to go on a date with me? Or, um, hang out sometime?”\n\n\n*choice\n  #Yes.\n    Surprise and pleasure mix equally within you. “I’d like that,” you say.\n    \n    \n    Delight spreads on Ishara’s face, and you set a time and place to meet the next\n    day.\n    *goto ishara_date\n\n  #No.\n    “Thank you for asking. I’m very flattered,” you say. “But I don’t think of you\n    that way.”\n    \n    \n    “Oh,” Ishara says, but then she forces a smile. “That’s all right. Thank you of\n    for thinking about it.”\n    *goto masquerade_choice_end\n\n\n*label ishara_date\n\n\n*page_break\n\n\nYou meet Ishara on a mountain hiking trailhead on the outskirts of town. When she sees you, relief washes over her face like rainwater. The daylight is overcast and steady, though the cool breeze might change all that. Already the sun presses against the clouds, granting the sky a pregnant, dim glow.\n\n\nIshara leads the hike. “I’ve never been here before,” she says, excited. As you wind your way up the mountain, five-petaled and butter yellow rock roses change to slate stones and lily-of-the-valley. The grasses and moss corrode cliff faces and rosette mats of purple saxifrage bloom rare and joyous.\n\n\n*choice\n  #Say nothing.\n    You settle into the rhythm of walking the dales up and down, higher and higher.\n    Ishara sighs, and then breaks the silence. “How long have you been a werewolf?\n    You’re a strange mix of young and settled.”\n    \n    \n    “About three months,” you    We did not count on it being so guarded.”\n    \n    \n    You nudge against Ishara in sympathy, and a smile graces her face again.\n    *goto mountaintop\n\n\n*label mountaintop\n\n\n*page_break\n\n\nThe view as you gaze downward is postcard perfect, and you feel you could fall forever. The city is so small, like a marble in your hand.\n\n\nPeace pervades, and you meet Ishara’s smile with your own. She offers you snacks and water, but you decline with a shrug. You don’t know if it’s the light or what, but a joyous, blue hum sings across her skin. The wind whirls the scent of roses, incense, and cloves.\n\n\nShe sways into the wind and you listen to her voice rumble as she says. “I should tell you something, before we go…further.” She doesn’t look at you as she speaks, like she’s afraid, but what could someone so powerful have to fear? “I’m not a goddess. I’m just not from this universe. I have magic no one here has seen, but it’s common where I come from.”\n\n\nIshara may be the most comely woman you’ve met when composed, but she’s absolutely gorgeous flustered. She speaks very fast. “I’m from another world and in that world I’m a perfectly ordinary werewolf but my companions and I were tricked into going to [i]another[/i] world and we exploded it but now we’re separated across all creation and I landed here and I don’t quite [i]fit[/i] and it’s awful.”\n\n\nIt takes you more than a few moments to absorb all of this tirade. Speech over, Ishara now watches you carefully, beseechingly. Gone is the warrior, the motherly caretaker, the compassionate healer—now she is as painful and exposed as a ghost. A wrong word and she’ll disappear. “Do you believe me?” she asks.\n\n\n*choice\n  #Yes.\n    “Yes,” you breathe.\n    \n    \n    Ishara’s eyes widen, and she steps closer into your space and touches your cheek. \n    “${name},” she whispers, like a tender prayer. “Thank you.”\n    *goto empathy_test_i_m\n\n  #No.\n    “That…that’s impossible,” you say. Many impossible   feeling stays with you a long time.\n    *goto masquerade_choice_end\n\n  #Agree to kissing and suggest a tumble in the sweet grass.\n    *if trans > 50\n      You want to kiss, so you nod and do, right on her plush lips. Your mind reels\n      and its speed only increases as Ishara kisses you with fervor. Your spirit\n      jumps, and your hands automatically frame her face, drawing her closer,\n      relishing the feel of her razor side cut under the pads of your fingers.\n      \n      \n      Your embrace builds heat to an ever greater pitch; fans embers to cozy fires to\n      tingling inferno. Ishara murmurs consent in the space behind your ear. Clothes\n      come off easy, but when Ishara catches sight of you, she freezes. “Oh!”\n      \n      \n      “What?” you say, voice breathy. “Is something wrong?”\n      \n      \n      She touches your chest in reverence and for a wild moment you think she’s going\n      to cry. “They’ve kept me so isolated. I thought—I thought I was the only one.”\n      \n      \n      You shove aside the implications of this to kiss her hard. “You’ll never be\n      alone again.”\n      \n      \n      You kiss every inch of what you find. It is an act of adoration; a resolution;\n      a pledge to first meetings, to whirlwinds, and to happy endings.\n      \n      \n      Afterwards, Ishara cuddles close and whispers sweet nothings, like that every\n      goddess needs a consort.\n      *set Ishara 100\n      *goto masquerade_choice_end\n\n    *elseif Empathy > 40\n      You want to kiss, so you nod and do, right on her plush lips. Your mind reels\n      and its speed only increases as Ishara kisses you with fervor. Your spirit\n      jumps, and your hands automatically frame her face, drawing her closer,\n      relishing the feel of her razor side cut under the pads of your fingers.\n      \n      \n      Your embrace builds heat to an ever greater pitch, fans embers to cozy fires to\n      tingling inferno. Ishara murmurs consent into the space behind your ear.\n      Clothes come off easy, and you kiss every inch of what you find. It is an\n      adoration; a resolution; a pledge to first meetings, to whirlwinds, and to\n      happy endings.\n      \n      \n      Afterwards, Ishara cuddles close and whispers sweet nothings, like that every\n      goddess needs a consort.\n      *set Ishara 100\n      *goto masquerade_choice_end\n\n    *else\n      You want to kiss, so you nod and do, right on her plush lips. Your mind reels\n      and its speed only increases as Ishara kisses you with fervor. Your spirit\n      jumps, and your hands automatically frame her face, drawing her closer,\n      relishing the feel of her razor side cut under the pads of your fingers.\n      \n      \n      Your embrace builds passion and Ishara keeps it gentle: a caress, an\n      affirmation, a sanctifying of intimate space. She nuzzles into your neck and\n      you breathe deep the scent of her hair. Your heart brims with contentment and\n      warmth. You hope the feeling stays with you a long time.\n      *goto masquerade_choice_end\n\n\n*label masquerade_choice_end\n\n\n*page_break\n\n\nBeside word that the brides have settled into modern life nicely, you hear nothing from the Masquerade for two peaceful weeks. One morning you awake to several digital alerts: your student loans have been paid in full, your rent has been filled for a year, your credit card debt is gone, and your savings account bursts at the proverbial seams. You are free to go about your life as you please. And you do. As the full moon approaches and you wonder about the lunar tingle at the end of your spine, you receive word: the Rogues are gearing up to reveal the supernatural community. You must stop them. Your heart clenches. Your logical mind knew this was inevitable.\n*page_break\n*goto_scene masquerade_forever"}};
