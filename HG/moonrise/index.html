<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Moonrise — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "moonrise", "title": "Moonrise", "scenes": {"alice_welcome": "[b]Chapter 4: Welcome[/b]\n\n\nAlice is home when you return, and your heart beats a little faster for it. The girl is reading [i]The Lais of Marie de France[/i] and filling out a worksheet on the couch. As you draw closer, you see that Alice is looking much better: she smells fresh from the shower and her hair is wrapped up in a silk bonnet. She looks at home. But you feel you should ask, “What are you doing here?”\n\n\n“Coursework,” Alice says, as if it’s the most normal thing in the world. She doesn’t look up from her writing on the coffee table. “And boiling water for pasta.”\n\n\n“Yes, but how did you get in?”\n\n\n“Rosario.”\n\n\nYou realize this was a dumb question. You pinch the bridge of your nose. “Okay, but why are you here?” You gesture up and down, at Alice generally. “Isn’t your foster parent freaking out?”\n\n\nAlice’s body tenses, but she still does not look up from her reading. “She was upset I left, but she’s used to it. It’s fine.”\n\n\n“You really don’t like it there, do you?”\n\n\n“She’s—she’s nice enough, but I don’t…. I don’t feel like I belong, you know? And it’s easy for the pack to find me. They know that place.”\n\n\nYou kick off your shoes. “A whole pack is after you? What did they do?”\n\n\n“Ideological differences,” Alice says. She rises to go check the water bubbling in the kitchen and add noodles.\n\n\n*fake_choice\n  #Well, that’s definitely not going to come back and haunt you.    \n    *page_break\n\n\nAlice seems shaky, unsure, and best not disturbed on the subject. You shrug and go to your room to change. The girl clearly isn’t talking.\n\n\nOnce you’re in your comfy clothes, Rosario spins into your bedroom and closes the door, as if they’re in the final move in a ballet dance sequence. Ah. You should’ve guessed the encroaching prancing footfalls belonged to them.\n\n\n“So what’s up?” they ask.\n\n\n“May I invite you to be more specific?”\n\n\n“Well, Alice rang the bell, so I let her up, but it seems like she wants to stay forever. Are we okay with that?”\n\n\nYou groan, flop backwards on the bed, and attempt to smother yourself with a pillow. “Ugh. I don’t know. Adulting is hard.”\n\n\n“Stop that.” The pillow is forcibly removed from your fingers to reveal that Rosario has taken the liberty to lying down on your bed across from you. “You’ve got to give me more than ‘ugh adulting,’” Rosario says. “I mean, [i]I[/i] like Alice.”\n\n\nYou sigh. “I do think she’s really troubled and she’s using us as a safe haven.”\n\n\n“And that’s fine. I’m cool with safe-haven-y deals. But we don’t have to provide a safe haven 24/7. We could be an after-school special hang out. I [i]am[/i] worried that she’s going to misstep one day and you’re going to freak out. Or we’re not the best equipped to deal with a troubled kid. I mean, we got this apartment with just the two of us so we would have room to freak out and scream and be our own kind of troubled. She’s been real quiet so far—I’m not sure what’s so ‘troubled’ about doing your homework the second you get home and then spending your free time listening to Florence + the Machine. I mean, Florence is awesome—I still regret not having my shit together enough to see her live in-”\n\n\n“Rosario.” Their face snaps back to attention.\n\n\n“Yeah, so, I would feel better if we decided something definite and knew a little more about her. We don’t know if one day something’s going to trigger her and she’ll snap and destroy everything in a huge teen-a-rific bomb. And you have a weird, werewolf connection-y thing so I’m electing you as the major decision maker and talk to her.”\n\n\nAs they speak, Rosario’s voice deepens to something tender. They cup your cheek, and you smell white sage and home. Despite everything, or perhaps because of everything, the smell calms you. You close your eyes and decide.\n\n\n*choice\n  #We let her live here.\n    “I want her to stay,” you say. “She needs us.”\n    \n    \n    “All right,” Rosario says, soft. Their fingers brush across your cheek. It makes\n    your chest rumble in pleasure.\n    \n    \n    When you open your eyes, Rosario’s gentle smile is the first thing you see.\n    \n    \n    “What?” you say. You’re not used to Rosario looking at you the way they’re\n    looking at you.\n    \n    \n    Rosario says nothing, but scoots close to touch foreheads. You breathe together\n    for an immeasurable moment.\n    \n    \n    “Thank you, friend,” Rosario whispers.\n    *set Responsibility %+15\n    *set Empathy %+3\n    *set Rosario +25\n    *goto alice_happy\n\n  #She can only visit.\n    “I don’t think we’re capable—I’m not capable of helping her right now. Taking on\n    a child…that’s my limit.”\n    \n    \n    “All right,” Rosario says, soft. Their fingers brush across your cheek.\n    \n    \n    When you open your eyes, Rosario’s sad smile is the first thing you see.\n    \n    \n    “What?” you say. Rosario says nothing, but scoots close to touch foreheads. You\n    breathe together for an immeasurable moment.\n    \n    \n    “My friend,” Rosario whispers.\n    \n    \n    After a nap, you break the news to Alice that while it’s very nice she cooked you\n    all dinner, you must insist she lives with her foster parent. She can visit after\n    school, but that’s it.\n    \n    \n    Alice lets out a slow breath and she nods. Her voice dries up. After a very\n    awkward dinner, which Rosario elects to not attend and silence reigns, she picks\n    up her stuff and leaves.\n    *set Bloodthirst %+4\n    *set Uncanny %+6\n    *goto forest\n\n\n*label alice_happy\n\n*page_break\n\nYou approach Alice cautiously—you feel like this is your first parent-to-child talk. Alice is frying up zucchini, mushrooms, sausage, and onions to add to pasta.\n\n\nAlice glances up. “What would you like to talk about?”\n\n\nYou stand awkwardly while Alice stirs the olive oil laden veggies. “I just wanted to make sure everything’s okay with you. Rosario says you mentioned wanting to stay here and we’d love to have you. So like, first off, will that be all right? Is that what you want?”\n\n\nAlice stops stirring, sucks in air through her teeth, and drops everything to hug you tight. “Thank you.”\n\n\nYou return the gesture. That painfully young smell fills your nose, and it makes your heart break a little. “Okay, good.”\n\n\nAlice composes herself before letting you go. With a slightly shaky laugh, she goes back to frying. “You wanted to know more about my foster parent? Earlier?”\n\n\n“If you wouldn’t mind.”\n\n\n“Her name is Cassandra. She’s a vampire.”\n\n\n“Oh,” is all that comes out of your jaw-dropped mouth. Well, if there are werewolves, there must be vampires, because of course.\n\n\n“She’s, um, pretty high up in the hierarchy. Everyone thinks werewolves are all about pack hierarchy, but honestly it’s the vampires who go bonkers without a central leader.”\n\n\n“And, um, Cassandra is the leader? And your foster parent.”\n\n\n“No, no, she’s just in charge of underage supernatural people like me. I’m the only child right now, but there have been others.”\n\n\n“But you don’t get on?”\n\n\nIn lieu of meeting your gaze, Alice finds a jar of marinara sauce, pops it open, and dumps it in the skillet. “My school counselor—I meet with her a lot—says that my intuition is really sensitive to my environment. Cassandra…smells wrong, if that makes sense.”\n\n\n“Sure.”\n\n\n“Not like you and Rosario. You’re perfect. You give me space, and your auras are kind. Here is good. Thank you for letting me in.”\n\n\nYou raise an eyebrow. “Our auras?”\n\n\nAlice’s cheeks heat up. “Um, I can explain another time. Dinner’s ready now.”\n\n\nDinner is homey with Rosario and you and Alice around the breakfast table. It feels a little strange, but still good.\n\n\nAfterwards, Alice and you exchange numbers, and Alice proposes a focused training session to help you adjust to your new abilities. Rosario can come too.\n\n\n*page_break\n\n\nRosario has no problem making the very early morning meeting, for all they have to do is walk out their bedroom door and make tea. Alice sips her cup of earl grey while you attempt to scowl a French press into submission. You stand there and wait for your utterly blank mind to remember how to wrangle coffee out of the slim glass contraption. It refuses. You swore you knew how to do it before, but between the lycanthropy and the desolate wasteland of the pre-coffee brain, no bright ideas are coming. “Do you want to help with that?” Rosario says. “All the supernatural strength in the world isn’t going to grind those beans.”\n\n\nYou could say something biting back, since it’s obvious you do need help, or you could tone the snark down and accept help, which is probably an option of greater wisdom. Will you accept help?\n\n\n*choice\n  #No.\n    Your scowl turns into a growl, and Rosario holds up their hands. “All right, all\n    right, just thought I’d ask.”\n    \n    \n    You remain uncaffeinated and it is the worst.\n    *set Snark %+8\n    *goto coffee_story\n\n  #Yes.\n    Sometimes blunting your prickly edges gets you caffeine. Like a mage performing\n    magic, Rosario measures out the correct amount of beans, grinds them in a grinder\n    (is [i]that[/i] what the squat, stabby thing is for? You’d thought it was a dirty\n    paperweight), dumps the ground beans into the press, and pours hot water over the\n    lot. “This is the most important step,” they say, raising a finger in emphasis.\n    You watch them critically and don’t realize what they’re doing until they’re\n    hugging you. You huff amusement into their neck and return the gesture.\n    \n    \n    After a deliciously warm moment, Rosario spins out of your arms and pushes down\n    the press to reveal the dark elixir of life known as coffee. Excellent. You grab\n    a mug, add plenty of sugar and milk, and gulp a mouthful down.\n    *set Snark %+16\n    *goto coffee_story\n\n\n*label coffee_story\n\n\n*page_break\n\n\nYou’re sitting on the couch next to Alice as Rosario sits in their chair and teases. “I remember, in our dorm in college, one time I was eating breakfast at my desk, and you sat up in bed. I said good morning, and, without saying anything, you got out of bed and stuck your head in our mini-fridge. It wasn’t until you had cranberry juice dribbling down your chin that I realized you were totally still asleep.”\n\n\n“That true?” Alice pipes up.\n\n\n“Oh absolutely,” Rosario says. “I told ${mc_themher} to wipe ${mc_theirher} mouth in my most authoritative voice and ${mc_theyshe} did and went back to bed. You can only really talk to ${name} after coffee. Or at least attempted coffee.”\n\n\nYou stick out your tongue. “[i]Anyway[/i] what did you want to show me, Alice?”\n\n\nAlice puts her tea down on the coffee table, turns to you, and takes your hands in hers. “First, I want you to breathe.”\n\n\nYou’re already closing your eyes and filling your lungs when Rosario asks, “Like to meditate?”\n\n\n“Yes,” Alice’s voice comes in soft, like airy cotton against your skin. “Take another breath and feel the interior of yourself. Find the wolf and know the animal is not the enemy. It never wanted to be the enemy. It can no more act against you than your own hand could. Once you achieve balance, you can pull out your wolf shape whenever you like, though it’s easier the closer we are to the full moon. On full moons, we have to turn.”\n\n\nAlice squeezes your hands for emphasis, and you are reminded of the talking lilt of therapy sessions, of the exposed wood smell of yoga studios, of psychiatrist’s ballpoint pen scratch. You’ve done this sort of thing before.\n\n\nWill you let the empathy flow through you and kindly tread within yourself? Will you acknowledge your inner uncanny valley?\n\n\n*choice\n  #Yes.\n    You breathe again and find in your center the blooming fur of a new shape. Alice\n    is right. You are wolf and the wolf is you, and you will not be lost to the\n    animal mind again. You have fused to become a whole new being.\n    \n    \n    When you open your eyes, Alice beams at you. “You did so well! Much better than I\n    did. It took me ages to get it right, and when Cassandra told me to do it every\n    morning for the first month, I really dreaded it.”\n    \n    \n    “${name}?” Rosario squints at you from their chair. They unearth themself from\n    the cushions and stand to touch your face. “Hmmm.”\n    \n    \n    “What?”\n    \n    \n    “I can tell you’re different,” Rosario says. “Something…weird about you.”\n    \n    \n    “Otherworldly,” Alice offers, nodding. “Yeah, that’s normal.”\n    \n    \n    You make a face. “It’s normal for my best friend to find me weird?”\n    \n    \n    Alice returns to her tea and takes a long sip. It must have gone cold. “Humans\n    meet supernatural people all the time, and all they feel is a tingle at the back\n    of their heads. Ignore it, Rosario, and it will fade.”\n    \n    \n    Rosario frowns, but you almost miss it because they head-butt you with all the\n    affection that can be encased in a gentle and reassuring head-butt to the\n    forehead. “Mmmm, I don’t like it, but I’ll live.”\n    \n    \n    You rub your head. “Would you please stop taking your how-to-show-affection-tips\n    from dwarves?”\n    \n    \n    “Sorry not sorry,” Rosario flits back to their seat, but this time perches on the\n    edge like a mildly disgruntled, paisley-dressing-gown-trapped bird.\n    \n    \n    Ignoring Rosario’s sulk and addressing Alice, you say, “So you’re saying I should\n    have a mini-meditation session every morning for the first month?”\n    \n    \n    “You can do it whenever or as often as you like, but don’t stop daily meditation\n    until you feel completely in control and balanced. The first month is the most\n    difficult adjustment period, so new werewolves should think of meditation as\n    required,” she recites, as if off a textbook. God, wouldn’t it be great if there\n    were a textbook for these things?\n    *set Empathy %+6\n    *set Uncanny %+12\n    *goto self_defense\n\n  #No.\n    You force yourself to breathe, but mostly you fidget in annoyance for a few\n    minutes until Alice spares you. “All right, let’s move on to something else.\n    You’re like me. I had a lot of trouble with this at first.”\n    \n    \n    Rosario peers at you in concern and sips their tea. More bizarre, they say\n    nothing, but only give you a look so searching it makes you wary.\n    *set Empathy %+3\n    *set Uncanny %+6\n    *goto self_defense\n\n\n*label self_defense\n\n\n*page_break\n\n\nAlice stands in a clear spot in the room and starts to stretch. “Another method of helping our human and wolf sides bond better is more physical. Wild wolves are very protective and so it follows that our wolves are protective of us. We—[i]I[/i]—want to survive. All it takes to turn is thinking about being the other, or feeling like we need the other’s power to get out of a difficult situation. It helps keep the wolf calm if the human knows self-defense.”\n\n\n“Question,” Rosario says. “Are werewolves more afraid of humans or other animals?”\n\n\nAlice places one arm across her chest and holds it there with the other. Her face turns inward and pondering. “I know wild wolves are quite frightened of humans. People have killed them for generations. But also….”\n\n\n“Our first instinct is to murder,” you blurt out, knowing Rosario will keep digging so you might as well say it plain. “I [i]can[/i] be afraid of humans, but I’m not naturally inclined that way.”\n\n\n“Werewolves are not indestructible, but we’re close. No one thinks of silver bullets until it’s too late. And if we shift, we heal.” Alice shrugs. “${name}, stand up, I’m going to teach you to SING.”\n\n\nWhile Rosario regains their humor with fond nostalgia of off-key karaoke sessions, Alice coaches you through elbowing the solar plexus, slamming a heel on the instep, striking the nose with a palm, and kneeing the groin.\n\n\n“I feel like I should be teaching you this,” you say. Alice is much shorter than you, and the height difference is a constant reminder of how much younger she is.\n\n\n“They say that if your children don’t teach you, then you’ve raised them wrong,” she replies, frowning at the fist you’ve formed. “Only put your thumbs over your pointer and middle fingers. Or stick to open palm hitting.”\n\n\nAfter a bit, Rosario offers to be practiced on, and Alice reminds you of both your techniques and your will to fight. “Remember who you’re protecting and how far you’re willing to go make sure they’re safe.”\n\n\n*choice\n  #Give it your all (without hurting Rosario, obviously).\n    “Oh no, you have defeated me!” Rosario says, as they flop onto the couch after.\n    “I am mortally hurt!”\n    \n    \n    “You are not,” you smile, handing them a fresh cup of tea.\n    \n    \n    Rosario peeks up from behind their fingers, which they have placed with\n    theatrical flair over their face. They whisper, “I know, but I’m boosting your\n    confidence by pretending you have. Don’t wolves do that too?”\n    \n    \n    That makes you laugh. “Thank you for letting me practice on you.”\n    \n    \n    “You are a great help and friend,” Alice adds from the kitchen, where she’s\n    rustling through cupboards for snacks.\n    *set Defense %+12\n    *set Bloodthirst %+8\n    *goto masquerade_reveal\n\n  #Flake out.\n    You stand there before Rosario, who has screwed their face up in determination.\n    You sigh. “Actually…I think I’m done for the day.”\n    \n    \n    Rosario is about to protest when Alice intervenes. “It’s all right. We can pick\n    up again later. I’ll go find some snacks.”\n    \n    \n    As Alice goes off, Rosario pads over and tugs on your shirt. “Are you sure?”\n    \n    \n    “Positive,” you say.\n    *set Defense %+12\n    *set Bloodthirst %+8\n    *goto masquerade_reveal\n\n\n*label masquerade_reveal\n\n\n*page_break\n\n\n“One last thing. I don’t want to overwhelm you,” Alice says, returning with granola bars. “The Masquerade.”\n\n\n“We’re going to a ball?” Rosario perks up. “I have the perfect Oscar Wilde cosplay.”\n\n\n“Wait, if you’re wearing the suit, what am I going to wear?” You may not own a ball gown, but you do half-own a production’s cast off Victorian-era gentlemen’s suit with a green carnation glued to the lapel.\n\n\nAlice laughs, but the sound has a bitter edge. “No, no, it’s not a party. I think it’s a reference to something in literature?”\n\n\nYou automatically turn to Rosario, whose mouth has clacked shut. “Rosario…?” you prod. “What’s she talking about?”\n\n\nRosario isn’t meeting your gaze. “It’s a literary trope. For when the supernatural community must keep their existence secret from the normal people, by any means necessary.” They pause for a beat, and it makes your heart race. “Am I in danger?” they ask Alice, gently.\n\n\n“No!” Alice rushes to say. Her words come out fast. “The Masquerade is a kind of neighborhood association of all the local supernatural people. In the past, it was that no one could know, but we realized that’s unsustainable. Vampires’ lives are a lot better if they have consenting human partners, and werewolves have to, well, organize so much of their life around the moon that it’s a million times easier if their boss knows. These days it’s just a promise to come to meetings and not expose us en masse to the media. No talking about it publicly online or telling the news.”\n\n\n“But you don’t like them, do you?” Rosario swallows in a way that makes their cheekbones sharpen for a second. “They put you with Cassandra, and you dislike her.”\n\n\nAlice looks taken aback by this insight, and nerves flood your belly. “Yeah, the Masquerade isn’t very good at childcare.”\n\n\n*page_break\n\n\n“They’re good at other things,” Alice fumbles. Her hands are knotted in her shirt. “Cassandra says all her friends are in it, and it’s nice to see them and go to their homes. And when I graduate, I’ll get a job real fast. Or get my university all paid for. I can join the adult werewolf pack and never be alone on a moon again. If I come to trouble, they’ve got safe houses everywhere and will provide for me.”\n\n\n“But you hate it,” you say.\n\n\n“I don’t trust them. You and Rosario were my final option. You’re neutral and I’m safe. Cassandra doesn’t know where I am or care. The Rogues can’t find me.”\n\n\n“Hold up, the Rogues?”\n\n\n“They’re this splinter group that wants to expose the supernatural world.” Alice’s hands flutter. “They’re worse. They’re willing to physically fight against the Masquerade. They won’t win. They’ll be slaughtered. I can’t be part of any of that. I’ve had enough violence. I don’t want to die.”\n\n\n“Are the Rogues the pack after you then?”\n\n\nAlice nods as she shakes, and you can’t stand it anymore. You go up and hug her close. A subtle shift of fabric and Rosario joins in. “It’s all right now, little friend,” they murmur. “You’re here.”\n\n\nYou breathe together. The world is bigger and stranger than ever before, and yet, right now, it is small and delicate as three heartbeats.\n\n\n*page_break\n\n\nNow that you have your bearings and have let Alice into your life, how would you characterize your not-exactly-parenting parenting style?\n\n\n*choice\n  #What parenting? Let Alice come and go as she pleases, like a roommate.\n    The next three weeks go by with little to no changes in your routine. Alice comes\n    over after school, cooks something to eat, does her coursework, and sleeps on\n    your couch underneath Star Trek blankets. When she asks for help with something,\n    you help, but you don’t go out of your way to anticipate her needs or suggest\n    group activities. You find yourself sleeping a lot. If not that, then training.\n    \n    \n    Rosario is a more active presence in Alice’s life. They teach Alice how to put on\n    makeup, help her with her school essays, and make sure she gets to school on\n    time. You even catch Rosario kissing her forehead good night. It’s lovely to\n    watch them from afar.\n    *set Empathy %+3\n    *set Defense %+6\n    *set Uncanny %-6\n    *finish\n\n  #Take an active interest in Alice’s affairs and goals.\n    The next three weeks settle into an odd routine. Well, pre-lycanthropy you would\n    have found it odd. Here is this girl—young woman, really—that you hadn’t known\n    existed, but now is happily cooking Rosario and you dinner, quietly doing her\n    homework on the couch, and softly asking if Rosario will review her essays or\n    you her biology assignment. \n    \n    \n    At night, she sleeps on the couch underneath your old Star Trek blankets and\n    whispers a tired “good morning” when you nudge her awake. There’s a stash of\n    clean clothes in Alice’s backpack. On weekends, Alice likes sketching while\n    watching movie marathons or nature documentaries. She talks about one friend at\n    school, a girl named Mary, who you’re pretty sure Alice has a crush on. It’s a\n    stark contrast to the crying mess of a person you first met in the parkland, but\n    people do look different when they’re not stretched out beyond belief. It’s like\n    you’ve adopted Alice, or Alice has adopted you.\n    \n    \n    One night you go to find Rosario about something and find them and Alice in their\n    room, looking up love letters from King James to George Villiers as a break from\n    translating James’ [i]Daemonologie[/i]. Watching the computer screen light up\n    their smiling faces makes your heart do a funny little flip. Could this be peace?\n    Home?\n    *finish\n\n\n*label forest\n\n\n*page_break\n\n\nIt is time to give up this charade. You do not want to live in the city, or take up the old life of this vessel. Returning was a mistake. You want to forget.\n\n\nYour return to the apartment is brief. When the call to sleep is soothing enough that even Rosario succumbs, you steal out into the night, your chosen birthright. You run.\n\n\nYou search for where forgetting is. That land that will bring you back to the beginning. You crave the animal, for your mind to match your shape. Nature welcomes you home, with the cheeping of crossbills, the snores of wood ants, and the groans of aged pinewood. You like it. Nature is simple. Listen to its pulse beat, treat it well, and you will flourish. Or you die. It is simple.\n\n\nLive in the city, and only the humans will hurt you. There is little danger from concrete, from the potholes in the roads, from the little square parks themselves. The sheer weight of indifference will smother you faster, and your last breath is heavier with the knowledge your fellow humans walked by as you froze.\n\n\nYou run and aim for the moon. You want to go beyond the horizon to where the stars live, to ignorance and oblivion, but your old human thoughts nip at your heels—how long until Rosario misses you? Will they be okay? What about Chika? How will the loss of you etch itself into their ribs and change the cage surrounding their hearts? A responsible, empathetic human would have cut ties clean.\n\n\n*choice\n  #Regret not saying a proper goodbye.\n    Regret may add muscle mass to your heart, but it is not heavy enough to turn your\n    back on the moon.\n    *set Empathy %+6\n    *set Responsibility %+10\n    *goto chika_finds\n\n  #Refuse the feeling.\n    You push the feeling deep down, all the way to the claws on your back toes. They\n    say that if a human shoves away a feeling like this, it will leak out in other\n    ways. Perhaps this regret will leak out when you next tear something apart.\n    *set Empathy %+3\n    *set Responsibility %+5\n    *goto chika_finds\n\n\n*label chika_finds\n\n\n*page_break\n\n\nThe deep forest’s thick brambles snarl into you, but you sacrifice thatches of fur to keep going. There are no flowers here yet—only ice-fueled streams, hard ferns, and lungwort lichen. Tinder fungus rots out the hardwood of already decaying pine.\n\n\nAnd yet you still remember.\n\n\nWhen your exhausted legs buckle out from under you, the human heart beats still onward. You sleep and dream as humans do, but the images jumble: the feel of cardboard against the pads of your fingers, the ripping death squeal of tape, the taste of cream and strawberries in your mouth. Rosario’s voice explains that it’s their favorite dessert, but they can’t make it often because the stores nearby refuse to carry the necessary [i]media crema[/i], but this time their mother sent it in a care package.\n\n\nYou’re yanked awake by teeth.\n\n\n*page_break\n\n\nA great white wolf has you by the neck and is shaking you like a soda bottle that kids want to watch explode. It feels like your eyes are rattling in their sockets while your nose is punched in. You whine and gnash your displeasure, and the interloper throws you in the dirt. Trying to stand brings on an urgent dizziness-induced lie-down.\n\n\nThe other werewolf—female, your age—changes tactics. As your chest heaves to bring in air, she trots over, lies down, and surrounds you in her fluff of fur. It’s as protective a stance as it is nonsensical. Who is this? Who has bothered to find you, amongst the slick pine needles and stones?\n\n\n…Chika?\n\n\nAfter an hour, maybe-Chika must hear a calm regularity to your heartbeat, for she gets up, turns around to face you, and drops her head to her front paws in a gesture even humans recognize: [i]come play with me?[/i]\n\n\nYou suppose Chika’s intentions are good. She probably only attacked first so you wouldn’t do so. Maybe if you play with her, she’ll teach you some of those fighting moves.\n\n\n*choice\n  #You don’t have time for this. Play only half-heartedly.\n    Chika’s somber yellow eyes watch you as you rise slowly. She tilts her head in\n    what might be concern. When you wag your tail, she darts teeth-first forward and\n    wrestles you into bushes, which flatten under your combined weight. You tumble\n    and wrestle her back, flipping yourself over. She nips at your paws, and you\n    mouth her ears. You go on playing for awhile, but tiredness creeps over you like\n    a glittering wood-moss. Chika seems to recognize your mood, returns to your\n    original napping spot, and stretches out with a swish of her tail. You join her\n    in rest.\n    *set Bloodthirst %+4\n    *set Defense %+6\n    *goto rogue_reveal\n\n  #Play with all you got.\n    You summon your supernatural strength and pounce towards Chika teeth-first. She\n    gives a playful yip and soon you are wrestling and flattening bushes with your\n    combined weight. Flipping you over and over, she nips at your paws, and you mouth\n    at her ears. You chase each other all over the forest, sneak and surprise and\n    play-attack. If you were human, you’d be laughing with the pure silver joy\n    running through your veins. [i]This is fun[/i].\n    *set Bloodthirst %+8\n    *set Defense %+12\n    *goto rogue_reveal\n\n\n*label rogue_reveal\n\n\n*page_break\n\n\nChika had woken you after the sun’s highest point, and no sun lights the forest now. The cool dark is a welcome balm, but it engenders wonder. Is Chika here to return you to the city? Has she abandoned her humanity like you have? That seems unlikely. The Chika you know is inexorable as stone.\n\n\nAnd clearly she wants to talk.\n\n\nThe white wolf has disappeared and left the woman in her place. She comes out from behind the pine tree, her soft skin against gnarled bark. If she was a wolf, it wouldn’t hurt at all.\n\n\n“${name},” Chika says. “I would like you to listen to me.”\n\n\nYou huff, since you likely have little choice. You ran here on all your strength, and Chika found you.\n\n\n“I know how tempting the wolf shape is. I know how easy it would be to circle the earth on four legs and never worry about human things again. The city could burn and you would only be thankful, for that will let the forest in. But I would like you to reconsider. Please.”\n\n\nShe says please, but her voice is not pleading. It is simple. You stand, shake your fur, and sit down.\n\n\n“All the supernatural people in the city are forced to swear an oath to this association. They call themselves the Masquerade. They have one mission, and that mission is to keep the supernatural world secret from the humans.” Chika gives a wry smile. “I’ll admit they take care of their involuntary members well. Any job you want, any position: it’s yours. You will never go hungry or want for a place to stay. I believe they even organize free cultural trips and education for the young. But.”\n\n\nChika takes a step forward, but ironically, this places her out of starlight and into leathery pitch black. “They are keeping us from being our true selves. I lead an opposing faction. We are the Rogues. Our goal is to reveal the community, so all can live in peace.”\n\n\nA part of you wants to roll your eyes at this news and another part wants not to interrupt. Of course there’s an underground guerrilla war going on. Of course.\n\n\n*choice\n  #Roll your doggo eyes.\n    Since wolves cannot roll their eyes, you roll your head in a similar motion.\n    Chika must understand your meaning because her voice sounds amused as she says,\n    “It is a bit funny, isn’t it? I love your sense of humor. It’s good.”\n    *set Snark %+16\n    *goto blue_light\n\n  #Stay silent.\n    You don’t roll your eyes, but you think about it very loudly.\n    *set Snark %+8\n    *goto blue_light\n\n\n*label blue_light\n\n\n*page_break\n\n\nChika continues, “We could upload a video to the Internet at any time, but the Masquerade has made it clear that they will hunt us down and murder us if we do. I would greatly prefer myself and my members to be alive to enjoy our freedom. Imagine the medical implications alone. We could ask vampires and werewolves to donate samples and find out how their healing abilities work. We could make a cure-all. We just need enough members so the Masquerade knows it would be unwise to attack.”\n\n\nChika moves again, and she is on her knees before you, with a hand on your shoulder. “We need your help. And I…If you don’t come back I would miss you dearly.” Her fingers hook and release your fur. “You don’t have to return to your old life exactly, but you can’t entirely run from your humanity either. Your mind will always be with you. Transforming back is easy too: just think about what it’s like to be human. Think about—“ She cuts herself off, and her next words sound unearthed only with great strength and force of will. “What it could be like. With me.”\n\n\nBefore you can give any other answer, a faint buzzing fills your ears. You glance away from Chika in confusion. It sounds like bees, but it is much too late for them. Chika pauses and says, “I hear it too. That’s not—“\n\n\nA light, blue as starburst, cracks the sky east of you. The buzzing rockets to near deafening, like the bees have taken residence in your skull. Colors are dim to wolf eyes, but you watch transfixed as the very stars break and snap apart. The sky slices open and a shape falls out and the insect hum is silent.\n\n\nChika is a wolf again beside you, ready for anything. Do you investigate?\n\n\n*choice\n  #Yes.\n    After all the practice earlier, you and Chika step forward in sync. With no\n    discussion needed, you both travel on silent feet, circling the spot where the\n    shape fell. Your nose fills with sulfur and smoke. A boulder has split down the\n    center, like lightening has cleaved it in two. The nighttime forest sounds—the\n    scuttles of badgers, the slithering of black slugs, the sighing of wind in the\n    trees—resumes like normal. What on earth has happened?\n    *set Uncanny %+12\n    *goto city_return\n\n  #No.\n    You are too spooked to think of aught else but running in the opposite direction.\n    *set Uncanny %+6\n    *goto city_return\n\n\n*label city_return\n\n\n*page_break\n\n\nYour trip to the forest is tinged with the feel of failure. You don’t have to return to your body’s old life, but that is cold comfort. There is no true going back to how it was before. You can no more lose your human mind in the wolf’s than you can command your paws to be wings. Chika has told you of the Masquerade and the Rogues, and you know you must choose a side. Rosario will forgive you at least and grant you a bed to sleep in. Barely a whole day in the forest, and you are returning to the city, as you know you must. The city does not have otherworldly lights splitting open the stars, and you are too young a werewolf to deal with whatever that is on your own.\n\n\nIn the meanwhile, Chika runs beside you.\n*finish", "choicescript_description": "You've been bitten into a brand new supernatural underground. Congratulations! It's terrifying and heartwarming all at once. In a game made by a queer woman and for queer women and femme nonbinary folk, this supernatural celebration of queer femininity takes you into the darkness and lets you own it. Use your compassion and sense of responsibility to make connections and fall in love. Or use your newfound fangs and claws to rip, shred, and tear through your problems. Is this the start of a satisfying, shape-shifting life full of romance, or the blood-soaked birth of a new deity of the forest? You decide!\n\n[i]Moonrise[/i] is a 49,000-word urban fantasy interactive novel by Natalie Cannon, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n∙ Play as a trans woman, cis woman, or nonbinary person; lesbian, bisexual, pansexual, or asexual.\n∙ Date your nonbinary best friend, the ruthless Rogue leader, or the lycanthropic goddess amongst werewolves.\n∙ Build up your Empathy, Bloodthirst, Snark, Responsibility, Uncanny Valley, and Defense to survive lethal encounters and protect those you hold dear.\n∙ Pledge allegiance to the tradition of the Masquerade or the desperate, volatile Rogues.\n∙ Expose the supernatural underground to the blistering light or keep their secrets in the deep dark.\n∙ Embrace the feral monster within or hold fast to your humanity.", "choicescript_descriptions": "[b]Content Warning:[/b] This game contains some potentially upsetting material. While anything can trigger unwanted remembrances of traumatic experiences and acute stress reactions, some are more common than others. Below is a list of core trigger warnings in the game.\n\nThese are not listed to make potential players feel unwelcomed. These are here as a warning to give players time to prepare themselves to encounter these topics, and approach these experiences on their own terms. I hope you enjoy playing the game. A chapter-specific list of warnings can be found on the stats screen.\n\nViolence, blood/gore, death, animal death, body horror, Identity Disassociation, description of mental health/mental illness, descriptions of homophobia.", "choicescript_stats": "\n\nWelcome to the stats screen! What would you like to see?\n\n*choice\n  #My Stats.\n    *goto stats_screen\n\n  #Trigger Warnings.\n    *goto trigger_warnings\n\n  #LGBTQ Glossary.\n    *goto lgbtq\n\n*label stats_screen\nThe first half of the game will work on building your stats, while the second half will focus on testing them. You can die in this game, so approach confrontations in a manner that favors your strengths!\n\n[b]Your Stats[/b]\n*stat_chart\n  text Name\n\n  percent Empathy\n  percent Bloodthirst\n  percent Responsibility\n  percent Uncanny\n  percent Defense\n  percent Snark\n\n[b]Romantic Relationships[/b]\n*stat_chart\n\n  percent Rosario\n  percent Chika\n  percent Ishara\n\n\n*finish\n\n*label trigger_warnings\n[b]List of Trigger Warnings[/b]\n\nThis game contains some potentially upsetting material. While anything can trigger unwanted remembrances of traumatic experiences and acute stress reactions, some are more common than others. Below is a list of core trigger warnings in the game.\n\nThese are not listed to make potential players feel unwelcomed. These are here as a warning to give players time to prepare themselves to encounter these topics, and approach these experiences on their own terms. I hope you enjoy playing the game.\n\nStartup: blood/gore, identity disassociation\n\nChapter 1: blood/gore, animal death, identity disassociation, body horror, violence\n\nChapter 2: identity dissociation, body horror, homophobia mention\n\nChapter 3: mental illness mention, identity disassociation, death\n\nChapter 4: mental health, identity disassociation, violence, death, blood/gore\n\nChapter 5: blood/gore, animal death, body horror, identity disassociation, violence\n\nChapter 6: death, violence, blood/gore\n\nChapter 7: violence, mental health/mental illness mention\n\nChapter 8, Rogue route: body horror, animal death, violence, death, blood/gore\n\nChapter 8, Masquerade route: violence, blood/gore, death\n\nChapter 9, Rogue route: mental health/mental illness mention, death, violence, blood/gore, identity disassociation\n\nChapter 9, Masquerade route: blood/gore, identity disassociation, violence, \n\n\n*finish\n\n*label lgbtq\n\nThis is a glossary of LGBTQ (Lesbian Gay Bisexual Trans Queer) terms used in, or relevant to, [i]Moonrise[/i]. For more information, ways to be an ally, and other helpful LGBTQ resources, please check out glaad.org. All definitions have been taken from glaad.org, UC Davis LGBTQIA Resource Center, or Aromantics Wiki. In some cases, definitions are slightly modified or shortened for clarity.\n\n\nAromantic: a romantic orientation generally characterized by not feeling romantic attraction or a desire for romance. Aromantic people can be satisfied by friendship and other non-romantic relationships, and may or may not still enjoy sex. For example, an aromatic woman could have many sexual partners over the years, but her most important, valued relationship is her platonic friendship with her best friend.\n\n\nAsexual: a person who does not experience sexual attraction or a desire for a partner sexually. Asexuality is distinct from celibacy, which is a deliberate abstention from sexual activity. Some asexual people do have sex. There are many diverse ways of being asexual. Some people consider asexuality as a more umbrella term for a wide variety of enduring physical, emotional, and romantic attractions and orientations that do not ever, or do not often, experience sexual desire.\n\n\nCisgender (sometimes shortened to “cis”): a term used by some people to describe people who are not transgender. Cisgender people identify with the sex they were assigned at birth.\n\n\nBear Community: a part of the queer community composed of queer men similar in looks and interests. Most of them are big, hairy, friendly, and affectionate. The community aims to provide spaces where one feels wanted, desired, and liked. It nourishes and values an individual’s process of making friends, of learning self-care and self-love through the unity and support of the community. Bears, Cubs, Wolves, Chasers, Admirers, and other wildlife comprise what has come to be known as the Brotherhood of Bears and/or the Bear Community. See also: Ursula.\n\n\nButch: a gender expression that fits societal definitions of masculinity. Usually used by queer women and trans people, particularly lesbians. Some consider “butch” to be its own gender identity.\n\n\nBisexual or pansexual: a person who has the capacity to form enduring physical, romantic and/or emotional attractions to those of the same gender and to those of another gender. People may experience this attraction in differing ways and degrees over their lifetime. Bisexual and pansexual people need not have had specific sexual experiences to be bisexual or pansexual; in fact, they need not have any sexual experience at all to identify as bisexual or pansexual.\n\n\nDemisexual: a person who has the capacity to form enduring physical, romantic and/or emotions attractions only to others with whom they have an emotional bond. Most demisexual people feel sexual attraction rarely compared to the general population, and have little to no interest in sexual activity. Demisexual people are considered to be on the asexual spectrum, meaning they are closely aligned with asexuality.\n\n\nGender Expression: external manifestations of gender, expressed through a person’s name, pronouns, clothing, haircut, behavior, voice, and/or body characteristics. Society identifies these cues are masculine and feminine, although what is considered masculine or feminine changes over time and varies by culture. Typically, transgender people seek to align their gender expression with their gender identity, rather than the sex they were assigned at birth.\n\n\nGender Identity: a person’s internal, deeply held sense of their gender. For transgender people, their own internal gender identity does not match the sex they were assigned at birth. Most people have a gender identity of man or woman. For some people, their gender identity does not fit neatly into one of those two choices. Unlike gender expression, gender identity is not visible to others.\n\n\nLesbian: a woman whose enduring physical, romantic, and/or emotional attraction is to other women.\n\n\nNonbinary and/or genderqueer: terms used by some people who experience their gender identity and/or gender expression as falling outside the categories of man and woman. They may define their gender as falling somewhere in between man and woman, or they may define it as wholly different from these terms. \n\n\nQueer: an adjective used by some people, particularly younger people, whose sexual orientation is not exclusively heterosexual (e.g. queer person, queer woman). Typically, for those who identify as queer, the terms [i]lesbian[/i], [i]gay[/i], and [i]bisexual[/i] are perceived to be too limiting and/or fraught with cultural connotations they feel don’t apply to them. Some people may use queer, or more commonly genderqueer, to describe their gender identity and/or gender expression. Once considered a pejorative term, queer has been reclaimed by some LGBT people to describe themselves; however, it is not a universally accepted term even with the LGBT community. When Q is seen at the end of LGBT, it typically means queer and, less often, questioning.\n\n\nQueer-platonic: an umbrella term for a relationship that defies the divide between romantic partnership and friendship. Queer-platonic can be used to describe feelings and relationships of either/both a nonromantic or ambiguously-romantic nature, in order to express that they break one or more social norms for relationships.\n\n\nSex: the classification of a person as male or female. At birth, infants are assigned a sex, usually based on their external anatomy. This is what is written on the birth certificate. A person’s actual sex, however, is actually a combination of bodily characteristics including: chromosomes, hormones, internal and external reproductive organs, and secondary sex characteristics.\n\n\nSexual Orientation: describes a person’s enduring physical, romantic, and/or emotional attraction to another person. Gender identity and sexual orientation are not the same. Transgender people may be straight, lesbian, gay, bisexual, or queer. For example, a person who transitions from male to female and is attracted solely to men would typically identify as a straight woman.\n\n\nTransgender (sometimes shortened to “trans”): an umbrella term for people whose gender identity and/or gender expression differs from what is typically associated with the sex they were assigned at birth. People under the transgender umbrella may describe themselves using one or more of a wide variety of terms, including [i]transgender[/i]. Many transgender people are prescribed hormones by their doctors to bring their bodies into alignment with their gender identity. Some undergo surgery as well. But not all transgender people can or will take those steps, and a transgender identity is not dependent upon physical appearance or medical procedures.\n\n\nTransition: altering one’s birth sex is not a one-step procedure; it is a complex process that occurs over a long period of time. Transition can include some or all of the following personal, medical, and legal steps: telling one’s family, friends, and co-workers; using a different name and new pronouns; dressing differently; changing one’s name and/or sex on legal documents; hormone therapy; and possible (though not always) one or more types of surgery. The exact steps involved in transition vary from person to person. [b]Avoid the phrase “sex change.”[/b]\n\n\nUrsula: Some lesbians, particularly those who identify as butch, also participate in Bear culture and refer to themselves with the distinct label Ursula.\n\n\n*finish", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Chapters 4 through 12[/b]\n  \n  Unlock chapters 4 through 12, including the thrilling conclusion!\n  \n  *purchase adfree $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Chapters 4 through 12[/b]\n  \n  You've paid to unlock chapters 4 through 12.\n", "dating": "[b]Chapter 7: Hands Held Out[/b]\n\n\nRecovering from your encounter with Cassandra is more a question of nerves than physical injury. Her behavior rankled, and it took skill to escape her. You feel tired in a way a solid nap and a good cup of coffee don’t entirely cure.\n\n\nRosario suggests going for a leisurely walk in the park, and you have to admit the idea has merit. When you find the time, you bundle up against the mid-spring chill and bend your steps toward the city’s section of nature.\n\n\nThe late morning light is steady and clear, thanks to scattered grey clouds that are doing their best to lull people into a false sense of security. It definitely won’t rain, suuuuuuuuuure you can trust [i]us[/i]—that sort of thing. The willow tree hangs its head over the pond like it knows the truth, while ducks and geese honk, happy in the knowledge that water is their element.\n\n\nThe pond flows into a man-made river, and a bridge crosses it. You follow the bridge’s example and make your way deeper into a sort of picturesque wooded area with picnic tables. Closing your eyes and breathing, the smell of fresh-cut wood shavings, the warm decay of stacked mulch, and the faint garlic scent of ramsons reach you. You can hear the squirrels chatter well enough and a few plaintive, angry tweets from birds. Animals are forever arguing about things.\n\n\nHow do you feel?\n\n*fake_choice\n  #Still shaken.\n    *page_break\n\n  #A little better.\n    *page_break\n\n  #At peace. Nature is where I belong.\n    *page_break\n\nYou open your eyes and before you stands Chika, of all people.\n\n\n“${name},” Chika says. It’s not a question—her voice is soft and full of the warmth of wonder. She steps closer and cups your cheek. “How are you? Something’s changed again.”\n\n\nThe gesture is familiar, and her palm is so soft. It would be easy to melt entirely into her keeping, to keep those fingers forever tangled in your hair.\n\n\n“I met Cassandra,” you say, because there’s really no reason to keep that secret.\n\n\n“Oh. Oh no,” Chika’s face is full to the brim with concern. “She harmed you, didn’t she?”\n\n\n“I survived.” That’s all you need to say.\n\n\n“Of course,” Chika says, smile wan. A hard emotion shutters behind her iris. “If she had harmed you, I would have killed her.”\n\n\nYou nod, because you see no reason to doubt her. Chika takes her hand away. She puts her hands in her pockets in a deliberate motion, like she knows better than to physically influence your reaction to what she says next. “There’s another way.”\n\n\n“The Rogues?”\n\n\n“I always want you to be with me.”\n\n\n*page_break\n\n\n\n“All these declarations—you’re going to have a second career as a romance writer at this point.”\n\n\nThe corner of Chika’s mouth quirks into a smile before smoothing out to neutrality again. “We just want to be out. We want to stop hiding. We want to use our abilities to help people.”\n\n\nNow that you have met Cassandra, the terrible consequences of the Rogues’ failure are all too easy to imagine. No matter your personal feelings for Chika, you don’t want her to die. The thought alone makes blood drain from your face. “How’s recruitment going?”\n\n\nShe sighs with a bitterness like the white pith of a lemon. “Poorly. We need to become strong enough to survive. But that has become complicated.”\n\n\nA knowing brews in the base of your stomach. You can confirm something here. “You tried to recruit Alice, right?”\n\n\nChika shrugs and gives an almost rueful smile. “She thinks if she keeps her head down, she’ll scrap through. She refuses to fight.”\n\n\nYou eye her carefully. “Cassandra said she’s powerful.”\n\n\n“And as a member of her bite-line, you are too. Once you’ve been a wolf longer,” Chika says. “Outside of my own feelings, the Rogues and I could use you. I’m their leader and I would protect those you hold dear.”\n\n\nThere’s a pause. Despite revealing so much about herself, Chika seems relaxed, like a weight has been lifted off her shoulders. “You don’t have to decide now, but soon, I think. One more thing, ${name},” she says.\n\n\n“Yeah?”\n\n\n“Will you go on a date with me?”\n\n\n*choice\n  #“Yes.”\n    Chika lights up. That’s the only way to describe it. Her eyes flicker with new\n    meaning. “I’m so glad. Thank you.”\n    \n    \n    You smile, and the two of you make arrangements for dinner the following day.\n    *goto chika_date\n\n  #“That’s very flattering, thank you, but no.”\n    Something akin to disappointment shifts underneath Chika’s skin, in how she’s\n    carrying her bones. “Thank you for your time and honesty,” she says. “Please\n    still consider my offer to join the Rogues, however. We may not be able to defend\n    ourselves against the full weight of the Masquerade yet, but we can protect you\n    and Alice against Cassandra.”\n    \n    \n    You say nothing, and Chika brushes past you to leave. You enjoy the rest of your\n    walk in the park with the comfort of your own silence.\n    *goto rosario_ask\n\n\n*label chika_date\n\n\n*page_break\n\n\nYou arrive at the agreed-upon sushi restaurant right on time. Chika stands under the neon. Her black hair cascades down her shoulders like a waterfall of silk. Her bangs are so straight they could cut. She’s wearing crimson and white layered shirt with a V-neck that plunges modestly. Your stomach tightens. “Hello.”\n\n\n“Good evening, ${name},” Chika says.\n\n\n“How’d you know about this place?” you ask. It’s not too far from the hospital, but you’re sure you’ve seen her in the hospital cafeteria…sometime.\n\n\n“Ah, I eat here often. It’s very good quality for low price and quick service,” Chika inclines her head exactly half an inch, as if bowing you past. “I enjoy it, though obviously I do not wish to shorten our evening.”\n\n\nYou take the hint and walk in. The place is a cross between homey and fancy, no white tablecloths, but faux marble tables and counters. Candles light every table, and the shadows dance across statues of the Buddha and landscape paintings. It smells like soy sauce, fish, and freshly warmed rice.\n\n\nChika motions to the hostess, and you two are immediately seated in the center. You are determined not to be intimidated or nervous. You ask:\n\n\n*choice\n  #“How did you become leader of the Rogues?”\n    “An understandable question,” Chika says with a rueful twist of her lips. She\n    looks relaxed and in her element. In control. It’s not hard to picture her as a\n    leader. People would naturally respect her, be in awe, defer to her as a\n    harbinger of cool authority—“Our previous leader passed away, and now I’m the\n    eldest.”\n    \n    \n    You blink and peer at Chika across the candlelight. “What? But you’re not even\n    thirty.”\n    \n    \n    Chika slowly opens her hands and shrugs. “The others have their own duties. I\n    have mine. I was best suited.”\n    \n    \n    A waiter covered in tattoos comes over and asks for your drink orders, but you’re\n    too busy trying to decipher the implications of Chika’s statement to ask for\n    anything but water. Something interesting happens with Chika’s face. Her smile\n    flattens out to baseline, and her alert eyes glass over. A mask. She is placing a\n    mask on and becoming far away from you. A professional veneer.\n    \n    \n    “How did she die?” you say. There’s a growl of gentleness in your voice, which\n    surprises even you.\n    \n    \n    In layman’s terms, old age,” Chika says. She meets your gaze steadily. “Her heart\n    tired itself out. It’s been a long struggle.”\n    \n    \n    Synapses connect dots. “Pacemakers don’t survive the transformation.”\n    \n    \n    A flicker of candlelit smile. “Exactly. The only thing I could recommend is\n    spending more time as a wolf, to act as a delay. Her wolf body was fine, and the\n    transformation would kickstart the heart to behave itself again for a time. But\n    she refused.”\n    \n    \n    “She valued her humanity that much?” You can’t keep the incredulity out of your\n    voice.\n    \n    \n    “She treated her wolf like a tool. Like you or I treat a stethoscope.” It sounds\n    like Chika’s answered these questions before. “I prefer to think of it as an\n    another, equal form.”\n    *set Empathy %+6\n    *goto take_her_hand\n\n  #“How did you become a werewolf?”\n    Chika’s fingers hold the menu a little more stiffly at your bluntness. “A natural\n    question, I suppose,” she says. “But not a particularly pleasant story.”\n    \n    \n    She raises her gaze to meet yours, and her dark eyes betray nothing but steadfast\n    clarity. The wolf inside you feels challenged.\n    \n    \n    “Do you not want to tell me? Is it a secret?” you ask.\n    \n    \n    Before Chika can reply, the mention of secrets summons a waiter covered in\n    tattoos. You order water to keep your head clear and settle in to wait.\n    \n    \n    When she does speak, her voice is slow and methodical, like water dripping off an\n    icicle. “Where I’m from, there are islands filled with animals so friendly that\n    children may walk up and pet them without fear. My parents took me to an island\n    full of foxes when I was very small. It was enchanting—being able to play with\n    kits like they were my siblings; having no fear of such bright, wild things. A\n    spell almost settled over me, and I thought ‘This is what utter peace and balance\n    is.’ The Garden of Eden, you’d call it.”\n    \n    \n    You don’t dare interrupt. You don’t dare breathe.\n    \n    \n    “When I came here, I ventured into the forest. I like to get the lay of the land\n    of the places I inhabit. This was almost three months before we met at the\n    hospital—I came early.” She doesn’t offer an explanation as to why, and you don’t\n    press. “I encountered two wolves fighting. The wolves were bigger than I’d ever\n    seen, ever imagined. At first, I was determined to leave, but then I saw the she\n    wolf was defending smaller, frightened wolves.”\n    \n    \n    “The Rogues,” you hazard as a guess.\n    \n    \n    “Yes. I later learned that. But at the time, all I could think of was the island\n    of foxes and how…this fighting wouldn’t happen in the Garden of Eden. I took up a\n    sharp stick and joined the fight. In the confusion, I was bitten.”\n    \n    \n    “Did you kill them? The other wolf?”\n    \n    \n    Chika doesn’t smile or show any change in emotion whatsoever. “Yes.”\n    \n    \n    “And the leader of the Rogues helped you through…everything?”\n    \n    \n    Chika nods. “And when she passed away, I became the leader.”\n    *set Empathy %+6\n    *goto take_her_hand\n\n  #“Got any favorite films?”\n    If Chika is surprised by the question, she hides it well. You get the feeling\n    that no one has asked her mundane questions in a while.\n    \n    \n    “I like action films,” Chika says. “[i]The Raid[/i] and [i]The Raid 2[/i] are my\n    favorites.”\n    \n    \n    The topic of movies lasts awhile. You remember liking more supernatural\n    thrillers, even if they tend to be goofier. At least you agree that [i]Get\n    Out[/i] is a masterpiece. It strikes you that, in all your memories of her, Chika\n    has never mentioned friends or roommates. Does she have anyone to vent to, to\n    really listen to her talk? Who listens to the minutia of her life, her opinions\n    on inanities?\n    \n    \n    Your food comes and goes. By the end of the meal, Chika’s eyes have a delicate\n    crinkle at the edges, the one end of her mouth is upturned, and the candlelight\n    only enhances her cheekbones. Maybe it’s a smirk. Maybe it’s a challenge. But,\n    overall, it is warm, it is soft, and it is very, very precious.\n    *set Empathy %+6\n    *goto empathy_test_c\n\n*label take_her_hand\n\n\n*page_break\n\n\nHere is the time, if you were fully human, that you would offer sympathy and support. That you would take her hand and switch to lighter topics. Do you?\n\n\n*choice\n  #Do not take her hand.\n    You keep your hands to yourself, and the meal goes the usual way meals do. The\n    waiter comes and takes your order for two dragons rolls. Silence reigns, and you\n    feel it’s amicable. When Chika’s ready, she asks how you’ve been adjusting, and\n    you give an honest answer. It’s not necessarily a romantic evening, but a good\n    meal in friendly atmosphere.\n    *goto empathy_test_c\n\n  #Take her hand.\n    You place your hand on top of hers. Chika’s hand is cool and dry to touch, and\n    her eyes widen in quickly smothered surprise. You say, “I’m sorry you had to go\n    through that, and for your loss. You must have admired her greatly.”\n    \n    \n    You’re unsure how many times Chika has told this story, but it seems like no one\n    else’s reaction has been to hold her hand and offer sympathies. Her gaze breaks\n    as she looks away, but a twining of the fingers lets you know she doesn’t want\n    you to stop.\n    \n    \n    “Thank you,” she says.\n    \n    \n    You swipe a thumb across skin until the waiter comes and asks for orders. The\n    remainder of the evening has an intimate, soft mood and lighter conversation.\n    *set Empathy %+6\n    *goto empathy_test_c\n\n*label empathy_test_c\n\n\n*page_break\n\n\nWhile winter snow has melted, the spring night is still cold outside the restaurant. “Can I escort you home?” Chika asks. She looks…hallowed in the phosphorescence streetlight amber. The vision makes your mouth dry, so your consent is a nod. She takes your arm, and you walk home together linked close, drunk on the smell of darkness and violets.\n\n\nA complicated emotion fills your abused heart as you arrive at your door. Do you invite Chika up for…“coffee?”\n\n\n*choice\n  #Yes.\n    *if Empathy > 40\n      Chika says yes, and within moments you are in your room and lost. Lost in the\n      taste of Chika’s mouth, in the way she breathes and smells and gasps as you\n      explore. You wake up before her in the morning and snuffle into her hair with\n      soft sleep noises. You must welcome in this bright new thing.\n      *set Empathy %+3\n      *set Chika 75\n      *goto rosario_ask\n\n    *else\n      Chika gives you a long, steady look. You suck in a breath. That’s a no, then.\n      “Please don’t hesitate to contact me if you need help,” Chika says. “And thank\n      you for going out with me.”\n      \n      \n      That’s really all there is to say as you go your separate ways. Chika may still\n      care for you, but perhaps seeks romance no longer.\n      *set Chika 0\n      *goto rosario_ask\n\n  #No.\n    You thank Chika for a lovely evening. She smiles and glances up toward your\n    windows. “Thank you for going out with me,” she says, focusing on you again. “I\n    had a good time. Please don’t hesitate to contact me if you need help, or want to\n    know more.”\n    *set Chika 0\n    *goto rosario_ask\n\n  #Ask her up for literal coffee. You’re asexual.\n    Chika accepts the invitation with eager happiness and follows you up the stairs\n    to the apartment. You two talk until the wee hours about, of all things, comics.\n    With the faintest dusting of a blush, Chika reveals she absolutely devoured\n    manga and anime as a teen, especially yuri. Rachel Deering’s [i]Anathema[/i],\n    Grace Ellis’s [i]Moonstruck[/i] and Marvel’s [i]Werewolf-by-Night[i] have\n    certainly taken on new meaning since you last read them.\n    *set Chika 75\n    *goto rosario_ask\n\n\n*label rosario_ask\n\n\n*page_break\n\n\nA few days later, you’re brooding in the park like a chicken on an egg of a problem when Rosario comes upon you. They say nothing—only fall in step beside you as you walk along the gravel path, with its orderly native plants and small spring-time shadows of new leaves. The crunching sounds of your feet sync, and the mood is as pleasant and natural as sunshine.\n\n\nPerhaps it’s something to do with not being alone, having someone to guard your side, or maybe even some unique effect of Rosario, but your chest eases as the path goes on. The trail winds easy until you reach the park’s boundaries.\n\n\nWithout missing a beat, Rosario links your arm with theirs and finds a cheap pizza place. It’s only after sitting together at a plastic table over a steaming carnivore’s pizza pie that they speak. “What are you thinking?”\n\n\n*page_break\n\n\nYou blink and take a slice of pizza. “I’m thinking about the Rogues and the Masquerade. Which I want to join.”\n\n\nRosario makes a sympathetic noise. “And I thought having writer’s block was bad.”\n\n\nThat cracks a smile out of you. Rosario looks cute today, in black plaid skirt and fuzzy red sweater. Their hair has grown longer again, curls kissing their shoulders. Silence settles as you eat.\n\n\n“Do you remember when I used to write to you?” Rosario asks about ten minutes later. “When you were in medical school.” You rummage in your brain and produce memorialized snippets of heavy envelopes and crisp postcard lines. Seeing your nod, Rosario continues, “Do you think this werewolf thing is worse than that?”\n\n\nYou eye Rosario and take a meditative bite of pizza. What were you like then? That time is hazy and hollowed out. You pushed yourself to be top of your class, pushed harder than you ever had, and at great and terrible price.\n\n\nWhen you don’t answer, Rosario sighs. “The worst is not as long as we can say ‘This is worst.’” They reach across the small table and place their hand over yours. “I know this whole transformation has been rough. I’m here for you, no matter what. I love you.”\n\n\nYou’re caught in the warm brown of Rosario’s eyes. Their gaze, their words, their strong hands—it sparks something in your blood. This place. These words. Is this…?\n\n\n*choice\n  #Ask them if this is a date.\n    You can feel the heat off Rosario’s cheeks from here. “It can be, if you want. I\n    would—I would like that. But I know about Chika. Are you two exclusive?”\n    \n    \n    “No,” you say, keeping it simple.\n    \n    \n    All right then.” Rosario moves to sit next to you. “You have my permission to\n    feed me pizza.”\n    \n    \n    You laugh and expertly throw tiny pork sausages into their mouth. Long-stemmed\n    happiness bursts to blooming like the daffodils Rosario impulse-buys you from a\n    street vendor on the way home, with much flourish, whirling, and even a curtsey.\n    You’ve never been so thrilled by the human act of laughter.\n    *set Empathy %+6\n    *set Rosario +25\n    *goto empathy_test_r\n\n  #Let things be.\n    You decide to let things be as they are. Rosario’s friendship has been invaluable\n    in the past and changed the human side of you irrevocably. You are satisfied and\n    fulfilled.\n    \n    \n    The afternoon goes as any afternoon with Rosario would—with jokes, smiles, and\n    comfort food. Humans did a good one when they invented pizza.\n    *finish\n\n\n*label empathy_test_r\n\n\n*page_break\n\n\nWhen you reach the apartment, it is still the middle of the work/school day, but you and Rosario decide to skip worry and work and do a TV marathon. With [i]Buffy the Vampire Slayer[/i] playing its musical episode in the background, Rosario asks, “Can I kiss you?” \n\n\n*choice\n  #Yes please.\n    They kiss you, and their chapstick tastes like lavender and honey. You tug on\n    gelled curls to bring them closer as heat sparks between you, hot to your\n    center. A fierce protectiveness seizes your heart. You have known this person\n    this bone, this flesh. They have been with you through a long course of hard\n    years, and your love is a love overwhelming. A happy sinking and a cheerful\n    blaze.\n    *finish\n\n  #Kisses and love-making please.\n    *if Empathy > 40\n      They kiss you, and their chapstick tastes like lavender and honey. You tug on\n      gelled curls to bring them closer as heat sparks between you, hot to your\n      center. A fierce protectiveness seizes your heart. You have known this person\n      this bone, this flesh. They have been with you through a long course of hard\n      years, and your love is a love overwhelming. A happy sinking and a cheerful\n      blaze.\n      \n      \n      Rosario and you kiss and paw at one another until your scents are all confused\n      and mingled. Telling Netflix that you’re not watching any longer, you carry the\n      party to the closest bedroom. You learn the intimate landscapes of Rosario’s\n      body, the hills and valleys, the clear expanse of their thrumming heart. Air\n
