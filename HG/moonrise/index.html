 heavy with sagebrush, it is like going home. It is like you never left.\n      *set Rosario 100\n      *finish\n\n    *else\n      Rosario and you begin with kissing, until the episode ends and the lack of\n      continued enthusiasm is too obvious to ignore. Rosario smiles at you, but a\n      puzzle occupies their eyes. Whatever spark you felt disappeared after the first\n      moments—it was the act of kissing that was welcome, not anything to do with\n      Rosario themself. Only nerves flit swift with you now.\n      \n      \n      Rosario squints and cants their head. “That was a bit like kissing a cousin.”\n      \n      \n      Relief floods the air with giggles. “Oh thank God. Same.”\n      \n      \n      After a quick trip to the kitchen for more popcorn, you two cheerfully settle\n      back into the couch of the rest of your [i]Buffy[/i] marathon.\n      *set Rosario 0\n      *finish\n\n  #Snuggles only please. I’m asexual.\n    A soul-deep romance such as yours is as rare and precious as a cavern of\n    gemstones. You rest your head on Rosario’s shoulder and play with their hands,\n    trace the whorls of their thumbs and fill with awe how your fingers fill the gaps\n    between theirs just so. A fierce protectiveness seizes your heart. You have known\n    this person—this bone, this flesh. They have been with you through a long course\n    of hard years, and your love is a love overwhelming. A happy sinking and a\n    cheerful blaze.\n    *set Rosario 100\n    *finish\n\n  #On second thought, no thanks, I don’t feel that way about you.\n    Rosario shrugs and smiles.\n        \n    \n    After a quick trip to the kitchen for more popcorn, you two cheerfully settle\n    back into the couch for the rest of your [i]Buffy[/i] marathon.\n    *set Rosario 0\n    *finish", "death": "*page_break\n\n\nYou’ve met with a terrible fate, haven’t you?\n\n*goto_scene ending", "ending": "A beginning and an end.\n\n\n[b]Your Stats[/b]\n*stat_chart\n  text Name\n\n  percent Empathy\n  percent Bloodthirst\n  percent Responsibility\n  percent Uncanny\n  percent Defense\n  percent Snark\n\n[b]Romantic Relationships[/b]\n*stat_chart\n\n  percent Rosario\n  percent Chika\n  percent Ishara\n\n*page_break End\nWe hope you've enjoyed playing [i]Moonrise.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "hospital_day": "[b]Chapter 3: The Thin Line[/b]\n\n\nYou wake up the next morning feeling refreshed and ready to begin the day. Normally, in the regular human life of your inherited body, you’d call the head of the teaching program, Dr. Selby, and the junior supervisor, Dr. Cadwallader, to report that you’re alive and would like to come back to work. Student loans and rent will only crush you faster, without an income. But you’re a werewolf now, and things might have changed. The park, for instance, is lovely this time of year.\n\n\n*choice\n  #Call Dr. Selby.\n    *gosub trial_end\n    You call Dr. Selby to tell him you’re not missing and really, really hoping you\n    can make up for this hiccup and you won’t have to re-apply or start over. Dr.\n    Selby makes a surprised noise and lets slip he hadn’t even noticed your absence\n    and wouldn’t you call Dr. Cadwallader, the junior supervisor, to do all the\n    necessary paperwork?\n    \n    \n    You then call Dr. Cadwallader, who replies that he hasn’t filled out the exit\n    paperwork, so it’s okay and are you sure you don’t need more time off? Your file\n    says you have a history of mental health issues, my speciality is neuroscience,\n    and the purpose of the time off was to get some rest. Are you doing okay? Are you\n    still living with that nice roommate? That’s good—having people around is good.\n    On a more personal note, remember how you passed my number along to your nice\n    roommate? You brought them to the student-teacher mixer and I thought we really\n    hit it off. Can you ask them to text me back?\n    \n    \n    You say yes, you did pass the number, goodbye, and hang up.\n    \n    \n    “Rosario, Dr. Cadwallader still wants to have sex with you.”\n    \n    \n    “Tell him I like toys and if he’s not into that, it’s not going to happen.”\n    \n    \n    “I’m not telling my teacher all that.”\n    \n    \n    “Then remind him that [i]I[/i] texted back telling him to call me and he\n    hasn’t called so if he likes me so much, he can listen to me,” Rosario says\n    from their position on the couch. Unperturbed and sipping breakfast tea, Alice\n    nods and pats them on the shoulder in support.\n    *set Responsibility %+5\n    *set Uncanny %-6\n    *goto hospital\n\n  #What kind of question—of course I’m going to call Dr. Selby!\n    *gosub trial_end\n    Oh! I’m sorry to have doubted you.\n    \n    \n    You call Dr. Selby to tell him you’re not missing and really, really hoping you\n    can make up for this hiccup and you won’t have to re-apply or start over. Dr.\n    Selby makes a surprised noise and lets slip he hadn’t even noticed your absence\n    and wouldn’t you call Dr. Cadwallader, the junior supervisor, to do all the\n    necessary paperwork?\n    \n    \n    You then call Dr. Cadwallader, who replies that he hasn’t filled out the exit\n    paperwork, so it’s okay and are you sure you don’t need more time off? Your file\n    says you have a history of mental health issues, my speciality is neuroscience,\n    and the purpose of the time off was to get some rest. Are you doing okay? Are you\n    still living with that nice roommate? That’s good—having people around is good.\n    On a more personal note, remember how you passed my number along to your nice\n    roommate? You brought them to the student-teacher mixer and I thought we really\n    hit it off. Can you ask them to text me back?\n    \n    \n    You say yes, you can just this once, goodbye, and hang up.\n    \n    \n    “Rosario, Dr. Cadwallader still wants to have sex with you.”\n    \n    \n    “Tell him I like toys and if he’s not into that, it’s not going to happen.”\n    \n    \n    “I’m not telling my teacher all that.”\n    \n    \n    “Then remind him that [i]I[/i] texted back telling him to call me, and he hasn’t\n    called so if he likes me so much, he can listen to me,” Rosario says from their\n    position on the couch. Unperturbed and sipping breakfast tea, Alice nods and pats\n    them on the shoulder in support.\n    *set Responsibility %+5\n    *set Snark %+8\n    *goto hospital\n\n  #Go to the park.\n    *gosub trial_end\n    The blue of the morning casts a chill over the covers—you snuggle down to wait\n    until afternoon sunshine. Only when golden light crests over your back do you\n    rise, dress, pat your apartment keys in your pocket, and make your way to the\n    door.\n    \n    \n    A polite choking noise interrupts you. Rosario is sitting on the couch with their\n    laptop and struggling to get a piece of toast out of their mouth.\n    \n    \n    “${name}??” they cough in a spew of crumbs. “You’re still here?”\n    \n    \n    Your face remains expressionless. “I’m going to the park now.”\n    \n    \n    “But your shift started hours ago!” they say, placing the laptop aside so they\n    can flutter nervously up to you, dressing gown strings tailing. “Why didn’t you\n    call your bosses? Are you nervous they’ll kick you out of the program? I don’t\n    think they will! The only way they will is if you don’t—“\n    \n    \n    You place a long finger on Rosario’s lips to silence them. “Shush.”\n    \n    \n    Rosario’s eyes spark and narrow. They brush your finger away. “Look. Alice\n    explained enough to me. I know this werewolf thing will take some adjustment, but\n    you can’t give up on your dreams. You’ve wanted to heal people since I’ve known\n    you.”\n    \n    \n    You shrug one languid shoulder. “I don’t care. That’s not a priority anymore.”\n    \n    \n    Your voice is cold and steady, and you can almost feel the memory of human tonal\n    inflection leave you. “I look like ${mc_themher}, don’t I?” You take a step\n    forward and touch Rosario’s cheek. “But I’m not quite ${mc_themher} any longer.\n    The same face. With an entirely different heart.”\n    \n    \n    You ponder the existence of Rosario, tilting your head to better calculate. They\n    open and close their mouth before visibly mastering themself and stepping away,\n    keeping their warm flesh away from your bestial coldness. “I guess you need some\n    time,” they say. “I’ll tell no one you’re back.”\n    \n    \n    The wilds sing within you. “I don’t care.” You spin on your heel and head to the\n    park.\n    *set Responsibility %-5\n    *set Uncanny %+6\n    *goto park\n\n\n*label park\n\n*page_break\n\nThe park is singing gold in the waning afternoon light. A weak spring breeze swings the hanging willow branches in gentle ripples on the pond, which ducks and geese populate in loud numbers. Human gardeners have made a stream go forth from the glittering pond, and you go on a bridge with smug satisfaction that other creatures cannot. Delicate yellow kingcups and pale primrose festoon the bank in glory, able to defy winter at last.\n\n\nYou are about to cross the bridge when you decide to instead lean on the damp wood grain of the railing, close your eyes, and breathe. You lungs suck in air and tell you all sorts of things: the warmth of earth spiced with recent rain; that underneath the far off oak trees bloom clusters of sweet violets; the sleek feather lines of waterfowl mixed with their droppings; the now familiar furry musk of rabbits and squirrels.\n\n\nBirds squawk, quack, and chatter, and the lilt of human voices speak of relief and brewed plots you don’t have time for. The breeze strengthens and shudders the willows, and abruptly the smell of violets is much closer. One could even say…heading toward you?\n\n\n“${name}?”\n\n\nAnother person who knew you? Christ, how many did this body have? Whatever the number, you’re sure it was excessive. With a sigh, you open your eyes and turn.\n\n\nYou must have forgotten. You must have forgotten the way twilight tended to intertwine with her long black hair, the burnished glow of her skin, and the fine lines of her gentle, deft fingers. Did you always know the comforting, soft darkness of her hooded eyes, how steady and sure they were of your wonder?\n\n\n“Chika Itou?” you say, the name returning to you in a flash. She’s a fellow first year in your medical internship, with a surgery speciality—she must be out on a brief break, for her pager is buckled to her hip. You suck in a breath and you learn something you for sure never knew: Chika smells like violets, ivory soap, and…wolf.\n\n\nThe surprise in your face mirrors hers. The full line of her mouth flattens in anger. “You know.”\n\n\n“You’re like me. Or I’m like you.” You breathe again to make sure and yes, she’s got that scent of an animal masquerading around in human skin.\n\n\n“That answers where you’ve been these past days. I’ve covered your shifts,” her voice is harsh and angry, but you can tell it’s not about you. Her cold gaze never leaves you, but it snaps anew. “Who did this?”\n\n\n“Excuse me?”\n\n\n“You’re a werewolf.” She stops herself. “But this is…you’re alone here in a park, and I could tell you’re not fully human from twenty feet away. Who did this to you?”\n\n\n*choice\n  #“It doesn’t matter who.”\n    You growl and flash your canine teeth. With a soft step on the old wood, you\n    slink closer. “I am who I am. You are who you are.”\n    \n    \n    To her credit, Chika stands her ground. “They are not doing a good job.”\n    \n    \n    You freeze, a little thrown by the topic change. “What?”\n    \n    \n    “Whoever turned you should be with you now. Should explain things. Do you even\n    know who I am?”\n    \n    \n    Your hackles raise again. Your true self brims against the barrier of your skin,\n    aching to be let out. Pretenses are tiring and unnecessary.\n    *set Bloodthirst %+4\n    *set Defense %+6\n    *set Uncanny %+6\n    *goto soft\n\n  #“Why do you care?”\n    You growl and flash your canine teeth. With a soft step on the old wood, you\n    slink closer. “I am who I am. You are who you are.”\n    \n    \n    To her credit, Chika stands her ground. “They are not doing a good job.”\n    \n    \n    You freeze, a little thrown by the topic change. “What?”\n    \n    \n    “Whoever turned you should be with you now. Should explain things. Do you even\n    know who I am?”\n    \n    \n    Your hackles raise again. Your true self brims against the barrier of your skin,\n    aching to be let out. Pretenses are tiring and unnecessary.\n    *set Bloodthirst %+4\n    *set Snark %+8\n    *set Uncanny %+6\n    *goto soft\n\n  #“She calls herself Alice.”\n    “I didn’t ask for any of this, but I’m embracing the change,” you growl. With no\n    regard to subtly, you spread and lower your stance, readying to spring.\n    \n    \n    But Chika does not attack you. Instead it’s her turn to look shocked. “Alice…?”\n    Alice Devonfort? No, that can’t be right.“\n    \n    \n    “Well, I don’t know her last name, but ‘Alice’ is definitely the first,” you say.\n    “She’s in secondary school.”\n    \n    \n    Chika’s hands tremble into fists. “God damn her.”\n    *set Bloodthirst %+8\n    *set Uncanny %+6\n    *goto soft\n\n\n*label soft\n\n*page_break\n\nIn a wholly unexpected move, Chika opens her hand and offers it to you. She very deliberately tilts her head in a bow, making the afternoon light bend and flicker at her jawline. “There are humans here. Come with me and I’l explain more about everything.”\n\n\n*choice\n  #Go with her.\n    You eye her hand for a minute, but ultimately take it. Chika holds your fingers\n    in her soft, delicate ones with a small sigh you think you weren’t supposed to\n    notice.\n    \n    \n    She leads you away from any crowds, to an enclosed thicket of saplings. A grey\n    gloom has rolled in, but you’ll have a modicum of privacy and be able to hear\n    anyone approach. Any bumbling human at least.\n    \n    \n    “I wish it had been me. I—I would have made it gentler. Not savage like this.”\n    Chika says,refusing to meet your gaze, dropping your hand. “I may not have said\n    it—I should have said it. But I have always admired you, ${name}. You have this\n    air about you. Like your soul is heavy, but you’ll gladly shoulder others’ pain,\n    if only they could have some relief. I had thought…I had dreamed once. That I\n    would tell you my secrets and you would understand. I would have given you a\n    choice, and it would have been an easy one for you to make.”\n    \n    \n    Chika stands her full height, and an icy sense of command and dread almost glows\n    off her. Her eyes are hard, remorseless—this was how you remember her, from the\n    lectures and rounds with patients. An utter, devastating authority that\n    intimidated all your classmates. “But now things are different. You’re barely\n    human as is. You’ve got an uncanny shimmer about you. Ordinary mortals will\n    notice. It will start small at first.” Her tone turns more casual, like she’s\n    listing minor symptoms. “Odd looks. An increased wariness at your proximity,\n    drawing away from you in crowds.” China steps into your space, silently letting\n    you know she will never do that. “Then, by leaps and bounds, they won’t want you\n    in civilized places. They won’t be able to properly name the reason. You will be\n    inexplicably [i]wrong[/i] to them.”\n    \n    \n    “It will be like…they will be able to grasp your arm.” Chika demonstrates in a\n    gentle holding of your wrist. “Or a small part, but not the rest. It won’t make\n    sense. You will be untranslatable. Unknown.”\n    \n    \n    “Even to you?” you ask. “Even to other werewolves?”\n    \n    \n    “I’ll always understand you, ${name}. I’ll go to any lengths,” Chika says, fierce\n    and earnest. She slides her hand back into your own and twines your fingers. “I\n    promise.”\n    *set Responsibility %+5\n    *set Defense %+6\n    *set Uncanny %+6\n    *goto kiss\n\n  #Refuse.\n    “I refuse,” you snarl. A full snarl, ones that humans aren’t supposed to make.\n    “Piss off.”\n    \n    \n    Chika doesn’t even flinch. “You may regret it, and I don’t want to see you regret\n    this, ${name}. The humans will stop recognizing you as one of them and sharpen\n    the proverbial torches and pitchforks.”\n    \n    \n    “Is that a threat?” Your vision flickers to a duller shade as your hearing piques\n    like the edge of a knife. You’re partially transforming, aren’t you?\n    \n    \n    Chika holds up two hands in the universal gesture of surrender. “If I am your\n    enemy, it is entirely because you want me to be. I’m on your side. Find me later,\n    if you decide you want more information than whatever your creator’s giving you.”\n    \n    \n    Without one misstep, she walks backward and out of sight, her gaze never leaving\n    yours, until the encroaching evening gloom swallows her up.\n    *finish\n\n\n*label kiss\n\n*page_break\n\nChika’s expression is carefully neutral, and you take the moment to gather and diminish your surprise. You’ve not seen Chika like this before: your lycanthropic revelation has unearthed vulnerability, distress, and a certain romance of feeling. You know in the way your own heart beats that her expression hides a great passion, and that passion might be for you. Her words are not the words of a friend, but of a colleague who dreamed of being a lover.\n\n\nWhat will you do with this knowledge?\n\n\n*choice\n  #Kiss her.\n    There was no great distance between you before, but there’s even less now.\n    Surprise and gratitude stiffen and then melt Chika’s spine. You cup her face in\n    your rough hands to deepen the kiss and draw her lithe body flush against yours.\n    She’s impossibly warm, and your core heats impossibly more. The kiss is soft,\n    thorough, and deliberate in its intentions right up until the point Chika’s\n    hospital pager beeps in shrill tones.\n    \n    \n    You growl in displeasure, transforming the kiss to nibbling her bottom lip, but\n    she pulls away to snuffle into the crook of your neck and cling for a moment\n    longer. “I have more to say, but that’s enough for now. Decide whether you are\n    more human or more wolf. Find me later. Please. Consider it.”\n    \n    \n    Then she is gone, and you are alone.\n    *set Chika +25\n    *finish\n\n  #Perhaps later.\n    “Thank you,” you say. You squeeze your weak human fingers to hers. “You’ve given\n    me things to think about, at least.”\n    \n    \n    “I think it’s enough for now,” Chika says. “Decide whether you’re more wolf or\n    more human and then find me. There’s more to say and I don’t trust others to do\n    the situation justice.”\n    \n    \n    You let your hands drop, and Chika’s pager beeps in shrill, annoying tones. “I\n    have to go back,” Chika says, sounding the teeniest bit wistful, like she wants\n    to stay.\n    \n    \n    You only nod and put your hands in your pockets. “Of course.”\n    \n    \n    Then she is gone, and you are alone.\n    *finish\n\n\n*label hospital\n\n*page_break\n\nYou push through the door to the first year locker room and drain the last drop of caffeine out of your sugar cookie latte. The neutral blue walls, scuffed up long benches, and crappy middle school lockers welcome you home. You’re ready to return to this normal, to pretend the whole werewolf thing hasn’t happened. Intensive Care Unit is good for that, Alice dropped off at what she says is her school is good for that, and Rosario set up to write in their bedroom is excellent for that. You throw the coffee cup away, shake yourself, and open your locker to change into scrubs. You’re not the only one here.\n\n\n“Hey Chika,” you say. Chika’s a bit eerie, in the general opinion. She doesn’t seem to move without deliberate thought, and always very slow and steady. Like now, she’s turning her head—just her head, like an owl does—and affixing you with a black stare.\n\n\n*fake_choice\n  #Say good morning.\n\n  #Ignore her.\n\n\n“Good morning, ${name},” Chika says, emotionless. Almost robotic. “You were gone one day longer than planned. I took over your duties.”\n\n\nYou’re in the middle of pulling off your shirt and that’s good because it hides your blinking blush. Another reason people find Chika eerie is how, well, to put it plainly, [i]beautiful[/i] she is. Her long hair is like swept up midnight in a bun, her cheekbones are sharp, sculpted brown, and her fingers are gentle, callused, and deft. When your head pops out of cloth again, the soft, penetrating darkness of her gaze is as intense as a burning. You stutter out. “Er, thanks for that. I’m really sorry. Everyone’s had to make such a fuss. Can I—can I take a shift of yours this week? It was really big of you to take on mine. I feel I should repay you.” You settle your uniform shirt.\n\n\nIf you’re not mistaken, Chika’s eyes [i]glint[/i], like she’s in an anime. Shit. “Don’t take my shifts.”\n\n\n“Is there anything I can do for you then?”\n\n\n*page_break\n\n\n“I’ll think of something,” Chika promises before turning away to exactly close her locker and spin her lock. Her spine is ramrod straight as she passes, and she smells of ivory soap and violets. Goddamn.\n\n\nChika doesn’t get to make her slow exit, though, because Naoki bursts into the locker room. Chika despises Naoki. They’re polar opposites.\n\n\n“${name}!” Naoki yells. Before you can even properly pull up your scrub pants, Naomi’s arms smother you in their warm, welcoming bulk. “You’re back! We thought you’d quit the program or something awful had happened!”\n\n\n“Nope, I’m still here,” you grin into Naoki’s shoulder. “Um, and I also still need my entire rib cage to work.”\n\n\n“Oh!” Naoki says, in her high, sweet voice, stepping back and giving you room. You use this space to properly tie up your pants. “It’s brilliant you’re back though. I missed you so much! Elain! Elain and I baked you welcome back cookies.”\n\n\nElain’s a woman literally covered from collarbones down in tattoos of different scenes and people from mythology. Elain lifts up a wicker basket full of chocolate chip and sugar cookies with rainbow sprinkles. Well, that explains why Naoki smelled so strongly of flour. “Hey, stranger.”\n\n\nYou wave. “Hey Elain. Thanks.”\n\n\n“Figured everyone could share.”\n\n\n“Did you two re-dye your hair?”\n\n\nNaoki squeals—dyeing her hair is one of her favorite activities. “Yes! The box called this color ‘azure.’ Do you like it? Elain wanted to go all pink undercut again. I told her if she’s going to experiment with hair color, she should experiment with [i]new[/i] colors—but nooooo, same old magenta.”\n\n\n“Hey, I like magenta,” Elain defends. “And it’s not like I’m stopping you from getting all the weird colors you want. ‘Azure’ my butt. It’s turquoise.”\n\n\n“Azure is not turquoise. It’s completely different.”\n\n\nMeanwhile, Chika is squashed between the banter, unable to exit. She stills and goes into what you like to call “statue mode.”\n\n\nWhat do you do?\n\n\n*choice\n  #Ask Elain and Naoki to move, but you know. Politely.\n    “Yo, guys, I think Chika’s trying to get out,” you say. You do seriously owe the\n    girl one, and she is clearly struggling.\n    \n    \n    “Oh!” Naoki bubbles. “Sorry, Chika. We’ll go get changed. See you there.”\n    \n    \n    “See you,” Chika says, without looking at Naoki or Elain. Instead she gives you a\n    purposeful glance. The hairs on the back of your neck raise, and heat flushes\n    your cheeks. Eerie.\n    \n    \n    You finish changing to the tune to Naoki and Elain’s banter and then hurry to\n    meet the boys and Dr. Cadwallader.\n    *set Empathy %+6\n    *set Chika +25\n    *goto cadwallader\n\n  #Leave Chika to her own devices.\n    You ignore Chika, who is about to vibrate out of her skin with the awkwardness of\n    her situation. Well, she’s an adult.\n    \n    \n    Naoki and Elain eventually get out of the way, and Chika speeds past, saying\n    nothing and looking at no one. You finish changing and wander over to where\n    you’re supposed to meet the boys and Dr. Cadwallader.\n    *set Uncanny %+6\n    *set Bloodthirst %+4\n    *goto cadwallader\n\n  #Ask Naoki and Elain to move in no uncertain terms.\n    “This is all fascinating, I’m sure, but Chika’s trying to leave. And so am I.”\n    \n    \n    “Oh,” Naoki says, inner light dimming a little. “My apologies. We didn’t mean to\n    bore you.”\n    \n    \n    Chika blinks at you with open curiosity, but speeds out the room all the same\n    once the two girlfriends move. You finish changing and try to catch up with\n    Chika, but to no avail.\n    *set Snark %+8\n    *set Empathy %+3\n    *goto cadwallader\n\n\n*label cadwallader\n\n*page_break\n\nYou’re not the first one to arrive, but also not the last. The PGY-1 morning begins with a brief “homeroom” for lack of a better description. Dr. Cadwallader says you all are working under Dr. Selby again today, accompanying Selby on rounds, and then he would collect you for lunch and give you your individual shadowing assignments.\n\n\n“And may I welcome Dr. ${surname} back to the group?” Cadwallader adds at the end. “We’ve missed you.”\n\n\nRichard, one of your male peers, mumbles something akin to “Missed the mammaries,” and you decide that “peer” is not really the right word for him, so much as soul-soon-to-be-crushed-lifeless-under-your-awesome-power.\n\n\n*choice\n  #Give ‘em a lupine reverse smile.\n    You lock eyes and smile at Richard. Smile wide. Smile wider. Adrenaline rushes\n    through your veins, your canines sharpen, and your eyes burn amber.\n    \n    \n    Richard pales and steps back. “What the fu—“\n    \n    \n    You drop the smile all and are abruptly human again. “Language, Dick.”\n    \n    \n    Dr. Cadwallader has heard none of this, so he claps his hands in cheery bliss.\n    “Let’s get started, shall we?”\n    *set Uncanny %+6\n    *goto icu\n\n  #Snark.\n    “Well aren’t you a sexual harassment lawsuit waiting to happen,” you murmur.\n    \n    \n    Richard’s face goes from surprised to defensive in a flicker. “Hey, what—“\n    \n    \n    Out of nowhere, Chika steps in front of you, blocking Richard from your sight.\n    She speaks to him with a severity to freeze vodka. “One more word and we will\n    report you for sexual harassment. We do not tolerate misogyny here.”\n    \n    \n    Richard’s mouth snaps closed with an audible click.\n    \n    \n    “Shall we begin the day?” Dr. Cadwallader says, forcing cheer and presumably\n    hearing none of this.\n    *set Snark %+8\n    *goto icu\n\n\n*label icu\n\n*page_break\n\n“Your partner is right this way,” you say in your softest, kindest voice. That’s the way it goes in Intensive Care. You haven’t raised your voice above a kind whisper the entire time. Even the shuffle of your tennis shoes down the long white hallway is muted. It’s almost deafening when you go on break and people speak at normal volume.\n\n\nAn elderly lady, her grown son and daughter holding one hand each, follows you down the hall. Your patient—or rather Dr. Selby’s patient—is the lady’s seventy-two year old wife with blossoming liver cancer. You don’t doubt that the cancer is beyond the liver now, but the time for tests is long gone. She collapsed in her home, and the only organ working properly now is her heart. And as soon as you stop the machines from pumping new blood to be circulated, that’s going to stop too.\n\n\nYou’re waiting for the goodbyes to be over. When the patient’s wife and children leave, you will tick up the morphine, discontinue the blood transfusions, step aside, and wait for the woman to fall gently into the long sleep.\n\n\n“This is your family’s waiting room. Your wife is just inside that door.” You stop and gesture to a little, nondescript alcove the hospital has reserved for visiting families. There’s a painting of a field on the wall, one of those green, flowing meadows with blotches of wildflowers. “My name is Dr. ${surname} and please let me know if I can get you anything.”\n\n\nThe lady nods. Her son and daughter squeeze her hands. They don’t pause at all in the waiting room and go straight in.\n\n\n“‘Once more into the fray,’” you quote. Even with the door closed, you can hear the family’s gasp. It stinks of sadness here, of tears and grief.\n\n\nHow do you feel about this upcoming death?\n\n\n*choice\n  #Saddened.\n    You know the taste of tears on your tongue, are intimately familiar with the way\n    throats close, and have carried tragedy in the marrow of your bones. You had a\n    grandmother once, who passed when you were in high school. Your family fractured\n    along buried fault lines. It was an end. It was a beginning. Any and all death\n    builds on your compassion and empathy.\n    *set Empathy %+3\n    *goto supply_closet\n\n  #She is human and I am wolf. This grief is foreign to me.\n    You vaguely remember what it is like for a human family to fracture, to ripple\n    and earthquake apart after the death of a matriarch, but it is a feeling best\n    forgot. You are a wolf now and have new blood and priorities.\n    *set Uncanny %+6\n    *goto supply_closet\n\n\n*label supply_closet\n\n*page_break\n\nYou move on. Naoki is really the best at this, warm presence and all. Up next on your duties is in the regular section of the unit, the one with the not-yet-dying and only baby blue wafting curtains. A Mr. Abdul is recovering from kidney surgery. He’d gotten a replacement kidney, and it worked great until his body figured out it was his brother’s and not his. Rejected and a bit of a grueling post-op. That and the man’s eighty. Thus intensive care.\n\n\nYou check all the tubes and watch him breathe for a moment. You feel like you can still hear the family next door; hear the tears patter down their faces. You shake your head. You’re imagining things, simple as that. It’s so quiet in the ward, with only whispers and machine hum.\n\n\n“${name}, there’s a new patient. Dr. Selby wants us to observe.”\n\n\nYou jump about a foot in the air. “Oh my god,” you default whisper. You turn around, and Chika’s beside you, neutral and frowning as ever. “Jesus Christ, Chika.”\n\n\nChika doesn’t miss a beat. “This man is Muslim.”\n\n\n“I [i]know[/i],” you retort. “I was reacting to the fact that you snuck up on me. Again.”\n\n\nAs you come back to earth, you become aware how close Chika is. Her scent of violets and ivory surrounds and welcomes like a cloud. “Something is different about you today,” Chika says. Her frown deepens as she tries to figure it out. “You’re nervous.”\n\n\n“Well, it’s not over changing my shampoo.”\n\n\nChika leans forward even more and honest-to-god [i]sniffs[/i] you.\n\n\n*fake_choice\n  #Panic.\n\n  #Freeze.\n\n\nYou breathe in a gasp of surprise, and the temperature in the room grows several degrees hotter. Scent washes over you, and you realize that Chika is a werewolf.\n\n\nYou smell it on her hair; feel the prickle of it come off her skin in aura-like waves. Chika must have figured you out too, because before you can do more than freeze, she grabs your wrist and pulls you out of the room.\n\n\nYou don’t resist as Chika takes you into the supply closet. You’re too busy processing the implication that Chika Itou, the woman as ethereal as she is a top-of-her-class doctor with surgery speciality is also a werewolf crowding into your space so close that you can watch her eyes dilate. Her hand still gripping your wrist, she snuffles into your neck and collarbones, making sure, confirming.\n\n\n“May I ask who turned you?” she says. The words are casual, but the intensity of her gaze is not—her voice is deep and rumbling from deep in her chest; her eyes shine wet. “Who did this?”\n\n\n*choice\n  #”It doesn’t matter who.”\n    You refuse to back down. This is all very shocking, but that’s no reason to spill\n    every bean. While you don’t know who or what Alice is running from, best to keep\n    her information on lockdown. “I am who I am. You are who you are.”\n    \n    \n    Chika touches your face with a cold finger. “You seem to be adjusting well. I had\n    daydreamed once that maybe…perhaps you and I could…and you would want….I should\n    have made my feelings known sooner.” With visible effort, Chika pulls away from\n    you and puts her hands in her pockets. She gives a little sad laugh. “I feel I\n    should re-introduce myself.”\n    \n    \n    “Honestly? Same,” you say. Every spot on your body Chika touches tingles and the\n    loss of warmth hurts like a physical thing.\n    \n    \n    Chika’s mouth forms a bleak smile. “It’s a pleasure to meet you, Dr. ${name} \n    ${surname}. Apologies for my abrupt behavior earlier. I’m sure whoever did turn\n    you has a plan for your adjustment, but should you need me, I’m here.”\n    \n    \n    Your smile is warmer and more genuine. “Thank you, Dr. Itou. I’ll be sure.”\n    *set Defense %+6\n    *set Responsibility %+5\n    *set Empathy %+3\n    *goto work_kiss\n\n  #“Why do you care?”\n    You growl and flash your canine teeth. This is all very shocking, but that’s not\n    enough reason to spill every bean. You know little of the supernatural world and\n    perhaps it’s not some[i]thing[/i] after Alice, so much as some[i]one[/i]. “I am\n    who I am. You are who you are.”\n    \n    \n    Chika recoils as if stung. Your body tingles in all the places you and she\n    touched. It feels a little bereft without her warmth. “I have always cared for\n    you, ${name}. I’m only sorry I have not shown it. I should have made my feelings\n    known. Whoever turned you must have done a good job. You’re adjusting well.”\n    \n    \n    You shake yourself, like how dogs shake to settle their fur. “I’m all right.”\n    \n    \n    Chika looks past you, into memory. “The first day of class I saw you and I knew\n    that you would understand me, not despite of my circumstances, but because of\n    them. But I moved too slowly it seems.”\n    \n    \n    You don’t meet her gaze, and she puts her hands in her pockets.\n    \n    \n    “I’m here if you need anything,” Chika offers. “Apologies for my abrupt behavior\n    earlier.”\n    \n    \n    You return a small smile. “Thank you. I appreciate it.”\n    *set Snark %+16\n    *set Responsibility %+5\n    *goto work_kiss\n\n  #“She calls herself Alice.”\n    “I didn’t ask for any of this, but I’m embracing the change,” you say. You know\n    little of supernatural politics, and Alice said someone is after her, but you’d\n    like to see them fucking try.\n    \n    \n    Just as you are thinking these brave thoughts, Chika goes still in your arms. Her\n    eyes widen and freeze, her shoulders tense, and bloodless lips ask, “Alice…?\n    Alice Devonfort? No, that can’t be right—“\n    \n    \n    “Well, I don’t know her last name, but ‘Alice’ is definitely the first,” you say.\n    “She’s in secondary school.”\n    \n    \n    Suddenly it is required for you to hold Chika up. The only things that seem to be\n    working are her hands, which she balls into fists. They tremble. “God damn her.”\n    Then, softer, she whispers into the folds of your lab coat. “How could she know\n    my feelings for you? Is this karma?”\n    \n    \n    “What are you on about?” you ask.\n    \n    \n    Chika draws herself out of your arms and tries to look cold and invulnerable\n    again, but you know better now. Something inside her is breaking and reshaping.\n    “You can ask her who I am,” she says. “It is her duty to tell you. You can tell\n    Cassandra about me for all I care at the moment.”\n    \n    \n    You’re unsure of her meaning, and by the firm line of her lips she’s not going to\n    tell you more. You’ve set something in motion.\n    *set Responsibility %-5\n    *set Defense %+6\n    *set Empathy %+3\n    *goto work_kiss\n\n\n*label work_kiss\n\n*page_break\n\nChika’s expression reforms to something fragile and neutral. You’ve not seen Chika like this before: your lycanthropic revelation has unearthed vulnerability, distress, and a certain romance of feeling. You know in the way your own heart beats that the expression hides a great passion, and that passion might be for you. Her words are not the words of a friend, but of a colleague who dreamed of being a lover.\n\n\nWhat will you do with this knowledge?\n\n\n*choice\n  #Kiss her.\n    There was no great distance between you before, but there’s even less now.\n    Surprise and gratitude stiffen and then melt Chika’s spine. You cup her face in\n    your rough hands to deepen the kiss and draw her lithe body flush against yours\n    again. She is impossibly warm and your core heats impossibly more. The kiss is\n    soft, thorough, and deliberate in its intentions right up until the point your\n    hospital pagers beep in shrill tones.\n    \n    \n    You growl in displeasure, transforming the kiss to nibbling her bottom lip, but\n    she pulls away to breathe kisses into the crook of your neck and cling for one\n    moment longer. “We’ve stayed so long that Dr. Selby noticed. Can we talk later?”\n    \n    \n    You nod and together you exit the supply closet with a careful distance between\n    you.\n    *set Chika +25\n    *finish\n\n  #Perhaps later.\n    The silence hangs fragile between you, and you can’t have that. “You came to get\n    me for Dr. Selby, right?” you prompt.\n    \n    \n    “Oh, yes,” Chika says. “Another half-muttered, holier-than-thou speech about a\n    patient’s inability to know anything about their own affliction, I expect.”\n    \n    \n    “Great,” you say. “Just what my education needs.”\n    \n    \n    Remarkably, Chika laughs. Balance has been restored between you, and together you\n    set off to face the world.\n    *finish\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n  *label purchased\n  *return\nRemember earlier how we told you that the first two chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n  *subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2019-10-24 $2.99 $1.99 purchased\n*abort\n", "last_masquerade": "\n[b]Chapter 9: The Last Masquerade[/b]\n\n\nA tall man is waiting for you at the train station. He’s one of those cream-skinned, willowy people with curly ink-brown hair and cheekbones sharp enough to cut. That’s all you have a chance to notice about him before he’s kissing Bisclavret full on the mouth.\n\n\n“That is, um, this is Illtyd,” Chika says with distinct discomfort. “You’ll recall that he’s the one who reported Bisclavret’s whereabouts to me.”\n\n\nIshara chuckles and mutters something like “whereabouts indeed.”\n\n\nBisclavret and Illtyd stop kissing, but it’s difficult to miss how they grip each other’s clothes like they want to rip them apart. “I told you to go out and love other people,” Bisclavret says, standing on his toes to touch his broad forehead to Illtyd’s narrow one.\n\n\n“I’ve always found it difficult to follow directions,” Illtyd says, breathless.\n\n\nBisclavret disengages only long enough to wrap an arm around Illtyd’s waist. He turns to Alice. “This is my daughter, Illtyd. They call her Alice.”\n\n\nIlltyd’s surprise is evident. “You didn’t tell me of this, Chika.”\n\n\nHer composure regained, Chika nods and says, “We have much to discuss and plan for.”\n\n\n“I would like to host a feast,” Bisclavret says. “To celebrate before battle.”\n\n\n“I like this idea,” Ishara says. “I haven’t had a feast in a positive era.”\n\n\nChika’s expression is unreadable, and Alice looks to you for an opinion.\n\n\n*fake_choice\n  #Sure, why not.\n    *page_break\n\n  #No.\n    *page_break\n\n\nBisclavret’s offer of a feast ends up being too big a temptation to resist for the Rogues. While Chika organizes defenses and visual logistics for the supernatural’s debut, you, Alice, and Rosario debate what food is and is not possible to serve with the Rogues’ limited budget and accommodations. The most difficult thing, however, is to explain what culinary delights this century has to offer Bisclavret and Ishara. Rosario calls a meeting in the apartment over it.\n\n\n“I would like to eat as modern people do. The last time I ate as a human long enough to savor was…1895, I think,” Bisclavret says. “I remember being in awe of the gaslamp.”\n\n\n“What did you eat then?” Alice asks, eager. She sits criss-cross applesauce at her father’s knee and it’s adorable. “We study so little about everyday life in history class.”\n\n\nBisclavret muses. Despite the few days as a human, his face remains curiously blank in expression, and having someone so clearly ancient process thoughts like a robot buffering is oddly disconcerting. “There were many people in the city. There are always more and more people here. I stayed on the margins. I liked curry. Bagels. Spaghetti. Sushi. Honeyed locusts. Honeyfingers. Once I had the rare chance to try this new vegetable from across the ocean called a potato. It wasn’t spicy enough.”\n\n\nIlltyd laughs from where he’s coddled on Bisclavret’s lap, and Ishara exclaims, “I know one of those! My mother made very good honeyed locusts.”\n\n\n“Oh?”\n\n\n“The secret is the balance of pepper and salt,” Ishara says, her face alight with excitement.\n\n\nBisclavret nods. “Your mother must have made a delicious roasted snake in fire sauce with the same secret.”\n\n\n“Snake? No, not kosher,” Ishara shakes her head, but beams all the same. “But my father’s favorite dish was fermented fish.”\n\n\n“You both like spicy foods. Thank god,” Rosario says from where they’re scrunched in their chair and taking notes. “You’re going to love chicken tikka masala.”\n\n\nAlice pipes up, “Do you have a favorite food from when you were born?”\n\n\nThe room goes quiet. Everyone’s been dancing around the age question.\n\n\nBisclavret [i]looks[/i] to be in his early forties, but appearances deceive more than stories when it comes to the supernatural.\n\n\nBisclavret takes longer to reply, but you realize it’s because he’s trying to smile. “Wild boar.”\n\n\nIt’s time to voice your opinion. What kind of food would you like at this Rogue feast?\n\n\n*choice\n  #Stick with the original plan. Only modern food.\n    “Maybe our victory feast could be old timey food,” you say. “If Bisclavret thinks\n    potatoes are new, we have a lot of fried foods to show him and Ishara.”\n    \n    \n    At first, Alice is disappointed, but her disappointment quickly fades as you plot\n    out glorious amounts of quick-serve food. Thick fried potato wedges, deep-fried\n    zucchinis with cayenne pepper, and hamburgers with juicy meat slices will be big\n    hits. Enchiladas dripping cheese, chocolate-rich mole sauce, steaming rice, and\n    black beans may have been around a long time, but he confesses he’s never tried\n    them. Yakitori chicken drenched in peanut sauce, edamame salted and warmed, and\n    of course, several types of tongue-swelling hot curries are in high demand.\n    Chicken tikka masala is a must. For dessert, jello molds will wobble with and\n    without alcohol lacing. All these dishes will be very easy and within budget to\n    acquire. The trouble is going to be fitting them all on the table.\n    *goto feast\n\n  #A mix of modern and older dishes.\n    “We can do both. Both is good,” you say.\n    \n    \n    Rosario gives you a despairing “why are you complicating my life” look, but\n    Ishara and Alice brighten. The rest of the afternoon is plotting     dipping into your own savings to fund this feast and every dish must be hand\n    cooked, but it will be more than worth it.\n    *goto feast\n\n*label feast\n\n*page_break\n\nThe feast night approaches with much anticipation from the Rogues and a flurry of activity from you. But it all comes together and you must admit that the way the table groans under the weight of the food is highly satisfying. The satisfaction only builds when the others taste the dishes and smack their lips in pleasure. Raw meat has its animalistic perks, but fire changed the culinary game for good. You did well, wolfy.\n\n\nYou dress up for the party, with a long, deep green skirt and matching fitted waistcoat over a black button up. Not to be outdone, Rosario retaliates with a sequined crop top. Alice rolls her eyes at Rosario’s antics and wears a short purple dress with ruffled cap sleeves.\n\n\nBedecked as you are, you decide to do the social rounds. You might owe a few people some conversations.\n*goto choice_wheel\n\n*label choice_wheel\n\n*page_break\n\nWhat would you like to do?\n\n*choice\n  *disable_reuse #See what Rosario and a group of Rogues are talking about.\n    *if Rosario > 99\n      Rosario is in a knot of people, which is generally where they like to be. When\n      they meet your eyes, however, there’s a plea for escape.\n      \n      \n      You cut in to conversation. “Hey fellas, I’m going to have to steal Rosario\n      away for a moment. Important, um, roommate stuff.”\n      \n      \n      Nice. You definitely nailed that lie. For sure.\n      \n      \n      You hook your arm through Rosario’s and lead them towards an unoccupied corner\n      of the training area. You’re so close you can feel their ribs expand in relief.\n      \n      \n      “Thank you,” they murmur. “If I have to explain how revolutionary Angela Carter\n      was to fairy tale storytelling one more time, I’ll scream.”\n      \n      \n      “No one picking up on the literary references you ould like to date someone else and be exclusive with them.”\n        *set Rosario 25\n        *page_break\n\n      #“I would like to date other people.”\n        *set Rosario 25\n        *page_break\n\n      #“I don’t want to date anyone right now.”\n        *set Rosario 25\n        *set Chika 25\n        *set Ishara 25\n        *page_break\n\n\n    This is uncomfortable. Why are feeling human things so squishy and uncomfortable?\n    \n    \n    “Oh…kay,” Rosario says. “I respect your choice.” They plaster a smile on their\n    face and hold out a hand. “Still friends?”\n    \n    \n    You take their hand between yours and shake it. “Always.”\n    *goto choice_wheel\n\n*label alice_mystery\n\n*page_break\n\nAlice touches your wrist. “${name}?”\n\n\nBisclavret says, “A word, please.”\n\n\nYou sit back down. Illtyd moves a hand to Bisclavret’s knee and squeezes once before very obviously pulling out his phone and scrolling. It gives the illusion of privacy.\n\n\n“My daughter tells me she made you a werewolf. That she felt it was your destiny,” Bisclavret says. “I wanted to thank you for embracing it.”\n\n\nNo one has ever thanked you for coping with trauma, so you’re unsure how to respond. “Thank you…?”\n\n\n“I don’t think it is an accident that Alice is a werewolf either,” Bisclavret says.\n\n\n“Someone has been meddling. I suspect it is the Masquerade. Fortune would not turn on Abigail thus.”\n\n\nAbigail?\n\n\nBisclavret must note your confusion. “Alice’s mother.”\n\n\nYou look to Alice, who has always been rather cagey about her past. She takes your hand in her own and squeezes. “It’s all right. It’s time I told you everything.”\n\n\n*choice\n  #Ask more about Alice’s parents. Gently.\n    “I would like to know what happened, if you don’t mind telling,” you say, sitting\n    back down.\n    \n    \n    “Tea,” Illtyd says, standing up with a wire-tight abruptness. “And more food.”\n    \n    \n    Pocketing his phone, he gathers everyone’s plates and walks off to or him to speak to me, so he made sure I was in foster care and\n    left the country. The murderer was his best friend.”\n    \n    \n    You swear a streak so blue it turns violet.\n    \n    \n    *page_break\n    \n    \n    “I find the whole affair odd,” Illtyd says. He had re-entered the group’s sphere\n    mid-blue streak and carries a tray of tea and desserts. Alice sits up so her\n    father can drink in peace. Bisclavret takes the cup gratefully and is grateful\n    all the more as Illtyd leans down for a kiss as brief as it is soft. Illtyd\n    continues, “Two boys are perfect friends for years and suddenly one snaps and\n    kills the others’ parents. It doesn’t add up. Every piece of violence has a\n    reason, no matter how twisted. What changed?”\n    \n    \n    Illtyd’s face twists into a deep frown. “Further, the Masquerade knew of Alice’s\n    true parentage. How? Alice is then orphaned and put in Cassandra’s care and\n    [i]mysteriously[/i] she is changed into a full supernatural being. And not just\n    any type of supernatural being, but the same as Bisclavret is, so her latent\n    werewolf genetics surface. Alice’s powers will grow exponentially as she ages.\n    Who wants an ultra-powerful empathic werewolf and why have they yet to step\n    forward?”\n    \n    \n    “Questions like these haunt,” Bisclavret says. “We will take care. But anyone so\n    foolish as to cross my line—my family—will, by the end, have more regrets than\n    they can number.”\n    *set Empathy %+6\n    *goto war_stories\n\n  #Leave this mystery be. You have enough on your (metaphorical) plate.\n    “What’s done is done, for better or worse. My sympathies on your loss,” you say\n    to Bisclavret. “Whoever transformed Alice is far less dangerous than you.”\n    \n    \n    Illtyd snorts, and Bisclavret smiles in a wicked way which distinctly reminds you\n    of Cassandra. “A fair point. I still offer my assurances. Alice loves you, and so\n    will I. We are family now the bruise of fighting well enough.\n    *set Defense %+6\n    *set Bloodthirst %+4\n    *goto choice_wheel\n\n*label consort\n\n*page_break\n\nHow about it? Will you commit to Ishara? She seems to have no preference for an open or closed relationship.\n\n\n*choice\n  #“Yes, and I would like an exclusive relationship.”\n    “You’ll travel with me?” Ishara says, hope in her voice.\n    \n    \n    “That will have to wait until the Masquerade falls, and the remnants stop\n    threatening us every minute, and then…I’ll think about it.” Your mind flashes\n    with images of Rosario and Alice, who cannot drop everything to trot the globe.\n    “But for now.” You take Ishara’s tankard from her and chug it down. Ishara\n    giggles as you put the tankard down on a table and grab Ishara’s hand to sneak\n    off to the shadows.\n    *set Rosario 25\n    *set Chika 25\n    *goto choice_wheel\n\n  #“Yes, and I would like an open relationship.”\n    “You’ll be my lover of this port,” Ishara smiles, brightness returning. Setting\n    her tankard down on a table, she cups your face with her hand and swipes a thumb\n    across your cheekbones. “You are beautiful.”\n    \n    \n    You close the distance and kiss her with a passion as lasting as a promise.\n    *goto choice_wheel\n\n  #“Let’s be in an open, queer-platonic relationship.”\n    “You’ll be my partner of this port,” Ishara smiles, brightness returning. Setting\n    her tankard down on a table, she cups your face with her hand and swipes a thumb\n    across your cheekbones. “You’re beautiful.”\n    \n    \n    You close the distance and touch your forehead to hers. There are at once a\n    hundred people in the room and only the two of you.\n    *goto choice_wheel\n\n  #“Let’s be in a closed, queer-platonic relationship.”\n    “You’ll travel with me?” Ishara says, hope in her voice.\n    \n    \n    “That will have to wait until the Masquerade falls, and the remnants stop\n    threatening us every minute, and then…I’ll think about it.” Your mind flashes\n    with images of Rosario and Alice, who cannot drop everything to trot the globe.\n    “But for now.” You take Ishara’s tankard from her and chug it down. Ishara\n    giggles and, by the sound, you know your future is bright.\n    *set Rosario 25\n    *set Chika 25\n    *goto choice_wheel\n\n  #No.\n    You know Ishara is not the kind who wields powers for vengeance, but it is still\n    quite a thing to reject a being others hail as a goddess.\n\n    *fake_choice\n      #“After consideration, I want to go back to being friends.”\n        *set Ishara 25\n        *page_break\n\n      #“I would like to date someone else and be exclusive with them.”\n        *set Ishara 25\n        *page_break\n\n      #“I would like to date other people.”\n        *set Ishara 25\n        *page_break\n\n      #“I don’t want to date anyone right now.”\n        *set Ishara 25\n        *set Chika 25\n        *set Rosario 25\n        *page_break\n\n\n    Ishara hides her initial reaction behind a swallow of beer, but she seems to take\n    little happiness in the drink now.\n    \n    \n    As you await her response, you grow more and more uncomfortable. When you can\n    finally see her face again, a bashful look is upon it. “I’m sorry I misread the\n    situation so badly,” Ishara says. “I’m new here.”\n    \n    \n    “No, no, I should have been clearer from the beginning,” you say. You flail for\n    some good news. “At least now you’re free to go out and connect with others. It’s\n    not just you and me. Tell more people your, uh, truth.”\n    \n    \n    “That’s a good idea,” Ishara says, voice mild. “I think I see someone who’s in\n    danger of overindulging. I’d better fetch them some water.”\n    \n    \n    She leaves and you can only hope your friendship will gain good footing again\n    later.\n    *goto choice_wheel\n\n*label girlfriend\n\n*page_break\n\nHow about it? Would you like to commit to Chika? She seems to prefer a closed relationship.\n\n\n*choice\n  #“Yes, and I would like an exclusive relationship.”\n    “Yes,” you say. Turning towards her, you find Chika’s fingers and twine them with\n    your own. “Let’s face this future together.”\n    \n    \n    “Thank you,” Chika says, suddenly, looking deep into your eyes. “Thank you for\n    believing in me, for letting me into your life, for helping this cause. I feel I\n    owe you a great debt.”\n    \n    \n    “A kiss will do in payment,” you say, and Chika pays in full.\n    *set Ishara 25\n    *set Rosario 25\n    *goto choice_wheel\n\n  #“Yes, and I would like an open relationship.”\n    Turning towards her, you find Chika’s fingers and twine them with your own. “I\n    want to be with you, but you’re not the only one I love.”\n    \n    \n    A fraction of the warmth leaks out of her, but Chika kisses you with a passion\n    fierce as her heart. “I accept,” she says, breathy. “Any way I can have you, I\n    shall take.”\n    *goto choice_wheel\n\n  #“Let’s be in an open, queer-platonic relationship.”\n    You find Chika’s fingers and twine them with your own. “I want to be with you,\n    but you’re not the only one I love.”\n    \n    \n    A fraction of the warmth leaks out of her, but Chika holds your hand tight. She\n    leans her head on your shoulder and breathes a deep breath. You listen to the\n    soft, domestic sound of her sigh. “I accept,” she says. “Any way I can have you,\n    I shall take.”\n    *goto choice_wheel\n\n  #“Let’s be in a closed, queer-platonic relationship.”\n    You find Chika’s fingers and twine them with your own. “Let’s face this future\n    together.”\n    \n    \n    Chika leans her head on your shoulder and breathes a deep breath. You listen to\n    the soft, domestic sound of her sigh. “Thank you,” Chika murmurs. “Thank you for\n    believing in me, for letting me into your life, for helping this cause. I feel I\n    owe you a great debt.”\n    \n    \n    You kiss the top of her head. “Your love is all I ask.”\n    *set Rosario 25\n    *set Ishara 25\n    *goto choice_wheel\n\n  #No.\n    “Chika…” you begin, but that seems no good.\n    \n    \n    Chika is still.\n\n    *fake_choice\n      #“After consideration, I want to go back to being friends.”\n        *set Chika 25\n        *page_break\n\n      #“I would like to date someone else and be exclusive with them.”\n        *set Chika 25\n        *page_break\n\n      #“I would like to date other people.”\n        *set Chika 25\n        *page_break\n\n      #“I don’t want to date anyone right now.”\n        *set Chika 25\n        *set Ishara 25\n        *set Rosario 25\n        *page_break\n\n    “I see,” Chika says. She stands her full height, her spine so rigid as to be\n    practically inhuman. “It was too much, too fast, wasn’t it? I should have done it\n    differently, been softer. The moment I saw you I should have asked you to tea and\n    slowly revealed my feelings over the course of months.” Her eyes are far away and\n    blaze like a void. “Damn.”\n    \n    \n    Your mouth is dry. You don’t know what to say.\n    \n    \n    “I’ll leave you,” Chika says. She sweeps off, and your insides feel hollowed.\n    *goto choice_wheel\n\n\n*label final_battle\n\n*page_break\n\nFate has yanked you out of your ordinary life into a purgatory of extraordinary trials. You had no warning, but you’ve done well.\n\n\nThis time, you do have warning. You feel fate loom over you; carry tension in your shoulders as you prepare to be plucked from your new normal and thrown. It is not easy. It is never easy.\n\n\nWhen the attack happens, you look into a mirror. You’ve always suspected that mirrors led into parallel worlds, and in the split second as the attack starts, you disassociate enough to see past the silver and into the physical reality of your double. You are setting up the cameras with your human hands. You crash through the door with your wolf strength and snarl. It is yourself, with different choices and a different fate.\n\n\nIn the second half of the second, a truth strikes. It is up to you. Bisclavret, Illtyd, Ishara, Chika, Rosario, Alice: they support you, but it has always been up to you to dissolve this conflict. Your power will bend reality; join sides together. The only question is how.\n\n\n*choice\n  #Persuade for peace.\n    *if Empathy > 40\n      You pounce into the middle of the conflict and let the words spill out. You are\n      vulnerable. The combatants careen to a stop to listen. You plead for peace, for\n      an end to this fighting, and say life is hard enough without blood. A\n      compromise can be reached. A slow reveal. Rosario and Alice stand beside you\n      first. Then Ishara. Chika and Cassandra are the last to clasp hands, but by\n      sunset there are plans for a brand new world.\n      *goto peacemaker_ending\n\n    *else\n      You pounce into the middle of the conflict. You are human; you are vulnerable.\n      It is not enough. Maybe the combatants don’t realize what—who—they’re tearing\n      into. Alice screams as you fall.\n      *goto_scene death\n\n  #Fight to defend.\n    *if Defense > 40\n      You bellow a war cry and leap into the fray, with the intent to harm, but not\n      murder. You swipe with claw and nip with tooth and your enemies limp back into\n      their hidey holes. Though you’ve dealt a mighty blow, you haven’t ended the\n      conflict.\n      *goto protector_ending\n\n    *else\n      You bellow a war cry and leap into the fray, but the fray is not to be so\n      underestimated.\n      *goto_scene death\n\n  #Fight to kill.\n    *if Bloodthirst > 40\n      You shriek and release all you have ever held back. You relish the blood spray,\n      the emptying of spirited eyes; the rip of soul from flesh, meat from bone. The\n      wolf runs true, undiluted in your veins, a creature of stark terror and pure\n      vengeance. You are a monster and this is your power and your enemies gravely\n      underestimated if they thought you aught else.\n      *goto monster_ending\n\n    *else\n      You bellow a wary cry and leap into the fray, but the fray is not to be so\n      underestimated.\n      *goto_scene death\n\n\n*label peacemaker_ending\n\n*page_break\n\nIt is said blessed are the peacemakers, and you are truly blessed. With your knowledge of the human soul and of the fighters’ true desires, you forge a compromise. The supernatural world will slowly reveal itself. The darkling whispers the general populace already speaks will grow louder until the Masquerade cracks and breaks. Even Cassandra can step into the proverbial sun.\n\n\nAs you and Chika watch over this process, you spend your days more human than wolf. Your life is full of soft, tender gestures, with laughter, joy, and love. When Alice graduates from secondary school and throws her cap in the air, you have never felt more proud.\n*page_break\n*goto_scene ending\n\n\n*label protector_ending\n\n*page_break\n\nAfter witnessing your teeth, no one dares openly challenge the might of the Bisclavret bite-line, and so the Rogue video goes live. As the days pass, you watch the world crack open like a walnut against stone. You know disgruntled Masquerade members skulk in the shadows, and you will face them as they come. The peace is uneasy, but Chika says it’s the best to be hoped for.\n\n\nYour personal life is perfectly divided between wolf and human: a constant balancing act which grants its boons and bruises in turn. When Alice graduates from secondary school and throws her cap in the air, you have never felt more proud: both of her and yourself for how far you’ve both come. Your victory is hard-earned.\n*page_break\n*goto_scene ending\n\n\n*label monster_ending\n\n*page_break\n\nThe supernatural world has cracked open like a walnut against stone and you join in rare celebration that all your enemies are dead.\n\n\nBut even as you smile, even as you eat, the food lacks spice. You have tasted the human wine, and suddenly the birdcalls are louder than friends’ voices. You find yourself, in absent moments, turning north and smelling the wind.\n\n\nBisclavret notices. “You feel the forest call,” he says. He presses your hand to his heart. “She calls to her own, to heed the wilderness beat, to mind the groaning drums.”\n\n\nYou close your eyes to listen and feel the last dregs of your humanity swirl.\n\n\n“All shall be well. I will explain to the others,” Bisclavret says. “It will hurt, but they will heal. They may even later join you. Or you will come back. Either way, we will be together again.”\n\n\nYou say your goodbyes, and finally, [i]finally[/i], you can be the monster you were born to be. There is nothing and no one to stop you. You howl; you feast; you run with joy. As the years pass, the locals know of you, a giant, earth-shaking wolf with gold eyes flamed by the fires of human intellect; the wild ${mc_personwoman} of the forest who stumbles into the lone pub to sing nature’s prophecies. You become a legend whispered to children on the darkest, moonless nights. People pray to you when they seek justice, and, sometimes, you listen.\n*page_break\n*goto_scene ending", "masquerade_forever": "\n[b]Chapter 9: You Will Forever Wear a Mask[/b]\n\n\nRosario and you walk in the fog-heavy, brutalist streets of the city like it’s not goodbye. You will survive the fight, you tell yourself, and live to laugh another day.\n\n\nYou turn a corner at the end of the next block. Rosario had the idea for coffee. You vaguely wish it was autumn so the pumpkin spice flavors would be available. If you’re going to have a last coffee, it should be a pumpkin spice latte—no, don’t think like that. You’re not going to die.\n\n\nYou bang into Rosario.\n\n\n“Dude,” you say, rubbing your nose. “What’s up?”\n\n\nRosario whirls around, grab your shoulders, and starts speaking so quickly your mind must run to catch the words. “Remember that absolutely drop-dead gorgeous goddess you told me about and the three brides and their spouse with the awesome hair?”\n\n\n“I remember you pouting about not meeting them by diving into werewolf AU fanfiction.”\n\n\nRosario’s grip tightens. “Dude, not the point! The point is they’re getting coffee right now!!” They release you to gesture through the giant glass windows of the very coffee shop you were hoping to patronize. And indeed Sati, xer wives, and Ishara are inside, not hiding their looks of anxious confusion at the variety of coffee flavors on the menu.\n\n\n“Oh my god, they’re getting coffee for the first time and they’re totally lost,” you say. Then your mind snags. “Wait a sec, did you really recognize them just based on my descriptions?”\n\n\n“Well, Cassandra glaring at us was another big hint.”\n\n\nThat’s when you notice a very irritated blonde vampire stalking towards you.\n\n\n\n*fake_choice\n  #Panic.\n    *page_break\n\n  #Flee the scene.\n    *page_break\n\n  #Be an adult.\n    *page_break\n\n\nIt’s too late for anything else but to face her as Cassandra’s starkly pale hand grips your forearm. “Dr. ${surname},” she says, voice terse. “What a surprise.”\n\n\n“Get. Your. Gross. Hand. Off,” Rosario hisses, and their expression is more poisonous than Cassandra’s could ever hope to be. The vampire lets go.\n\n\n“Hmph.” She flips her hair. “Perhaps you two would like to join us.”\n\n\nIt’s not a request so much as an order. Her tone is one of a strict mother insisting you come eat dinner with the family after catching you sneaking out of your bedroom window. Not that you’ve ever done that. Surely.\n\n\nAs what you suspect is a show of protection, Rosario takes your hand and leads the way. Perhaps disrespectful of your millennial roots, the coffee shop is a basic chain with inviting green and brown tones and gray tile floor. Then again, they’re running a promotion that makes the coffee cheap. When you enter, tinny alternative music soothes your nerves while wafts of warmed brown sugar, burned beans, and steam dampen your nose. Sati’s reserved smile plays across xer lips like a secret and Cassandra makes a beeline for xem. Ishara spots you and waves excitedly…and may or may not have a flicker of blue aura.\n\n\n*choice\n  #Say hello to Sati.\n    “Hello,” Sati says, pleasant as always. “Who is your friend?”\n    \n    \n    “This is Rosario. They write books. Rosario, this is Sati. Xe…” You struggle to\n    come up with something beside ‘banged Dracula’s wives so hard they deserted\n    him,’“…is the one I’ve been telling you about.”\n    \n    \n    Rosario holds out a hand, and the two shake. “Charmed, I’m sure,” Sati says. As\n    xe moves, you smell a city cleared after rain and…grave soil.\n    \n    \n    If you didn’t know any better, Cassandra looks miffed that Sati’s attention is\n    gracing someone else besides her. She brushes against xer shoulder and somehow\n    it’s possessive.\n    \n    \n    Rosario puts their hands in their knit dress’ pockets—a gesture you find odd\n    since Rosario usually requires hand gestures to speak. “Do you know what you’re\n    going to order?”\n    \n    \n    Sati’s dark eyes glitter. “Nothing fancy. Only an espresso.”\n    \n    \n    “From the outside, it looked like you and your partners were struggling to\n    choose,” you say. “Did Cassandra already help you decide?”\n    \n    \n    “Hm? Oh, no, no, I’ve been drinking coffee since humans were first using it\n    during Ramadan,” Sati assures, but xe smiles. “Cassandra and Ishara are here to\n    help Cleo, Medusa, and Donn acclimatize to human-heavy places. Your presence also\n    helps. They can focus on the smell of werewolf. The only novelty of a coffeehouse\n    for them is women being allowed in it.”\n    \n    \n    “I see,” you say. You take a step closer to Rosario and hope it’s not obvious.\n    “Glad to be of help.”\n    \n    \n    “Massacres are an awful lot of paperwork,” Cassandra comments, dry as a desert.\n    *set Empathy %+3\n    *goto relationship_talk\n\n  #Help Ishara order coffee.\n    You walk over to Ishara, who definitely doesn’t low-level glow briefly\n    as you introduce her to a starstruck Rosario. The smell of roses, cloves, and\n    ozone hang. “I’ve never been to a coffee shop,” she explains. “Or had coffee. Do\n    you have any suggestions? I love trying new things.”\n    \n    \n    Rosario looks like they’ve finally realized their highest calling. “Ma’am, you\n    can count on me.”\n    \n    \n    Ishara laughs, and you want to capture the sound and hoard it away as a dragon\n    does gold. “She likes fruits and sweets,” you tell Rosario before looking to\n    Ishara for confirmation. “Right?”\n    \n    \n    Ishara replies in the affirmative, and Rosario nods so hard their curls bounce.\n    “Uh huh, uh huh. I got you.”\n    \n    \n    Dire thoughts forgot, you order your usual caramel macchiato with what you think\n    is an ungodly amount of foam and syrup until you see the frappuccino Rosario\n    ordered for Ishara. It’s the largest size coffee made even bigger by a holy\n    mountain of whipped cream, strawberries, and chocolate sauce.\n    \n    \n    “Rosario,” you say, warning.\n    \n    \n    “Yes?”\n    \n    \n    “You’re going to send a woman with the powers of a god into a sugar high taller\n    than a skyscraper.”\n    \n    \n    Rosario leans close. “It’s going to be worth every moment.”\n    *set Empathy %+6\n    *goto relationship_talk\n\n\n*label relationship_talk\n\n*page_break\n\nSati, Cassandra, and the ladies seat themselves at a round table stuffed near the back of the shop. Once you have your drinks, you, Ishara, and Rosario seat yourselves a few tables away: close enough to intervene, but not close enough to share conversation.\n\n\nIshara is absolutely gleeful with her coffee. You have to stop yourself from staring too long at the eager bob of her throat as she swallows it down, and Rosario beams at the happy noises she makes. “You like it?” they ask.\n\n\n“Of course!” Ishara says. “This is marvelous! Can you really come here every day, at any time? Why don’t you [i]live[/i] here?”\n\n\nRosario laughs. “It’s not for lack of trying.”\n\n\n“You and ${name} live together already, yes? Are you dating as well?” Ishara asks.\n\n\n*choice\n  #Choke on your drink.\n    *if Rosario > 99\n      You take a sip of your drink to buy yourself time to answer and immediately\n      choke. You flail and splutter to the point that Ishara’s expression drops, and\n      she rises to smack your back. Her ministrations dislodge [i]something[/i] and\n      Rosario brushes a soothing hand over your forehead. “Are you all right?”\n      \n      \n      “Are you?” you counter.\n      \n      \n      Ishara sits back down and fidgets in her chair. “I’ve made an error.”\n      \n      \n      “No, we should talk about it before…you know,” Rosario sighs and pets you\n      again. You could get lost in the brown depths of those eyes, the canyons and\n      split mountaintops. “I would like to date you. Seriously. I can be exclusive\n      but would prefer an open relationship.” Their gaze flicks to Ishara. “I’ll only\n      live once.”\n      *goto datemate\n\n    *else\n      You take a sip of your drink to buy yourself time to answer and immediately\n      choke. You flail and splutter to the point that Ishara’s expression drops and\n      she rises to smack your back. Her ministrations dislodge [i]something[/i] and\n      Rosario brushes a soothing hand over your forehead. “Are you all right?”\n      \n      \n      “Are you?”\n      \n      \n      Ishara sits back down and fidgets in her chair. “I’ve made an error.”\n      \n      \n      “No, we should talk about it before…you know,” Rosario sighs and pets you\n      again. You could get lost in the brown depths of those eyes, and the canyons\n      and split mountaintops. “${name}, I love you, and I think our best\n      relationship is that of friends. That afternoon was fun, but—“\n      \n      \n      “It was just for the afternoon,” you say, nodding. “All right, yeah.”\n      *goto consort\n\n  #“No. We’re best friends and roommates.”\n    “Yep,” Rosario says. “Really good friends.” They take a sip of their coffee.\n    \n    \n    “I see,” Ishara says. “Then….”\n    *set Rosario 25\n    *goto consort\n\n\n*label datemate\n\n*page_break\n\nHow about it? Would you like to commit to Rosario? They prefer an open relationship.\n\n\n*choice\n  #“Yes, and I would like an exclusive relationship.”\n    You steady yourself with a breath, but the rising blush only deepens. Rosario\n    smiles and leans forward to kiss you with a chaste tenderness.\n    \n    \n    They then sit back into their chair with their coffee and a curling smile like\n    they’re a cat in possession of cream.\n    *set Ishara 25\n    *set Chika 25\n    *goto sati_hint\n\n  #“Yes, and I would like an open relationship.”\n    You steady yourself with a breath, but the rising blush only deepens. Rosario\n    smiles and leans forward to kiss you with a chaste tenderness.\n    \n    \n    They then sit back into their chair with their coffee and a curling smile like\n    they’re a cat in possession of cream.\n    *goto consort\n\n  #“Let’s be in an open, queer-platonic relationship.”\n    You steady yourself with a breath, but the rising blush only deepens. Rosario\n    smiles and leans forward to nuzzle into your shoulder.\n    \n    \n    They then sit back into their chair with their coffee and a curling smile like\n    they’re a cat in possession of cream.\n    *goto consort\n\n  #“Let’s be in a closed, queer-platonic relationship.”\n    You steady yourself with a breath, but the rising blush only deepens.\n    \n    \n    Rosario smiles and leans forward to nuzzle into your shoulder. “That’ll be an\n    adjustment for me, but we’ll make it work.”\n    \n    \n    They then sit back into their chair with their coffee and a curling smile like\n    they’re a cat in possession of cream.\n    *set Ishara 25\n    *set Chika 25\n    *goto sati_hint\n\n  #“I love you only as a friend would.”\n    “Oh,” Rosario says, deflating. “Okay, um, I thought…. Well, it doesn’t matter\n    what I thought. You didn’t mean it.” Rosario sits back in their chair, like\n    they’ve been struck down. They sip their drink, say nothing more, and meet no\n    one’s eyes. \n    \n    \n    “I see,” Ishara says, her gaze darting between you. “Then….”\n    *set Rosario 25\n    *goto consort\n\n\n\n*label consort\n\n*page_break\n\nIshara’s mouth closes. She frowns and looks into her drink, like it has the answers. It’s obvious she wants to say something. You have more than a particular suspicion what it is.\n\n\n*choice\n  #Beat her to the punch. Ask her if she wants to date.\n    *if Ishara > 99\n      “…would you like to date someone?” you ask, gentle as possible, trying not to\n      seem too forward. Rosario arches an eyebrow and says nothing. You say, “It’s\n      good to clarify.”\n      \n      \n      “Yes! You!” Ishara starts up and grabs a hand. “Yes, please. I’m used to open\n      relationships because I travel so much. After this battle, I would like to walk\n      the earth again. If the Masquerade will let me go.” She sounds doubtful at that\n      last bit, but otherwise she shines with earnestness.\n      *goto travel\n\n    *else\n      “…would you like to date someone?” you ask, gentle as possible, trying not to\n      seem too forward. Rosario arches an eyebrow and says nothing. You say, “It’s\n      good to clarify.”\n      \n      \n      “I’m not sure,” Ishara says. She plays with the straw of her drink. “I would\n      like to walk the world again, after this battle is over, and traveling craves\n      companionship.”\n      \n      \n      “A girl in every port, some magic up your sleeve,” Rosario sings. They grin.\n      “You’ve come to the right place for dating tips, my friend.”\n      \n      \n      The next twenty minutes are an in-detail retelling of how Rosario slowly\n      seduced your entire college’s Christian Club over the course of four years.\n      Ishara is going to be [i]much[/i] better at the modern dating game from now on.\n      *goto sati_hint\n\n  #What’s she saying?\n    You wait for as long as she needs to find the words. Your coffee’s almost done by\n    the time she says, “I’m thinking about dating someone, but I’m unsure how that’s\n    done here.”\n    \n    \n    Rosario grins. “You’ve come to the right place for dating tips, my friend.”\n    \n    \n    The next twenty minutes are an in-detail retelling of how Rosario slowly seduced\n    your entire college’s Christian Club over the course of four years. Ishara is\n    going to be [i]much[/i] better at the modern dating game from now on.\n    *goto sati_hint\n\n\n*label travel\n\n*page_break\n\nDelight spreads across your face and then stumbles. Travel? Could you do that? Will you commit to Ishara in an open relationship, even if it means someone could be left behind?\n\n\n*choice\n  #“Yes, I would like to be in an open relationship and to travel with you.”\n    A scuffle and your lap is full of goddess and you’re tasting the strawberry cream\n    of her mouth.\n    \n    \n    “Heck yeah,” Rosario mutters. “I mean, I’m not here. Carry on.”\n    \n    \n    Ishara breaks away to laugh and nuzzle into your neck. Your skin thrums in the\n    heady rose scent. With her deft fingers, she captures Rosario’s cheek and guides\n    them into a soft kiss too.\n    \n    \n    “Wow,” Rosario says. They swallow audibly, and their eyelashes flutter. “Where\n    did you say you’re from again? And where are we going?”\n    *goto sati_hint\n\n  #“Yes, I would like an open relationship, but I can’t travel with you.”\n    A scuffle and your lap is full of goddess and you’re tasting the strawberry cream\n    of her mouth.\n    \n    \n    “Heck yeah,” Rosario mutters. “I mean, I’m not here. Carry on.”\n    \n    \n    Ishara breaks away to laugh. “You’ll be my lover of this port.” She nuzzles into\n    your neck. Your skin thrums in the heady rose scent. With her deft fingers, she\n    captures Rosario’s cheek and guides them into a soft kiss too.\n    \n    \n    “Wow,” Rosario says. They swallow audibly, and their eyelashes flutter. “Where\n    did you say you’re from again?”\n    *goto sati_hint\n\n  #“Let’s be in an open, queer-platonic relationship and I’ll travel with you.”\n    “That sounds fantastic to me,” Ishara says with a smile. She lifts her coffee,\n    and you clink your plastic cups together with a muted tonk sound.\n    *goto sati_hint\n\n  #“Let’s be in an open queer-platonic relationship, but I can’t travel with you.”\n    “I shall miss you, and that longing will always bring me back,” Ishara says with\n    a soft smile. She lifts her coffee, and you clink your plastic cups together with\n    a muted tonk sound. “You’ll be my partner of this port.”\n    *goto sati_hint\n\n  #“I can’t do that.”\n    Ishara hides her initial reaction behind a swallow of coffee, but she seems to\n    take little happiness in the drink now. As you await her response, you grow more\n    and more uncomfortable. When you can finally see her face again, a bashful look\n    is upon it. “I’m sorry I misread the situation so badly,” Ishara says. “I’m new\n    here.”\n    \n    \n    “No, no, I should have been clearer from the beginning,” you say. You flail for\n    some good news. “At least now you’re free to go out and connect with others. It’s\n    not just you and me. Tell more people your, uh, truth.”\n    \n    \n    “That’s a good idea,” Ishara says, voice mild. She says nothing more and only\n    looks out the window. You can only hope your friendship will gain good footing\n    again later. Rosario nudges your knee with theirs in quiet sympathy.\n    *set Ishara 25\n    *goto sati_hint\n\n\n*label sati_hint\n\n*page_break\n\nWhen drinks are finished, you decide it’s time to go home. You rise and murmur that you need to say go
