odbye to Sati and the others. Rosario lets you go with reluctance, fingers trailing your wrist as you depart.\n\n\nXer arms crossed like a monarch surveying a supplicant, Sati notes your approach. Xer wives still have semi-pained looks on their faces, but their coffees are empty, so you assume the expressions are grimaces of bloodlust held back. Cassandra is mid-story, but before you can make sense of it, she cuts off. You’re reminded of your days as a lesser being approaching the popular kids’ table at high school. “Yes?” Cassandra says, tone frigid.\n\n\n“I just wanted to say goodbye and thanks for the coffee,” you say in a way that instantly feels vague and lame.\n\n\n“I was hoping Alice would join us,” Sati says. “Do you know where she is?”\n\n\n“I believe she’s in school at this hour,” Cassandra says.\n\n\nCloudy or not, Sati’s gaze is piercing as she sweeps from you to Cassandra. “And she has still told you nothing?”\n\n\n“Nothing about what?” you interrupt.\n\n\nSati doesn’t move. “Her transformation. Don’t you find it odd? The daughter of Bisclavret conveniently comes under the Masquerade’s care and turns into a werewolf.”\n\n\nCassandra growls. “If you’re suggesting I [i]allowed[/i] Alice to be attacked, you’ve known me for five hundred years and not at all.”\n\n\n*page_break\n\nThe thought of conspiracy hits you hard enough to erase any outward reaction. Your face relaxes to blank readiness. The wolf inside you pauses. Your feet shift silently against the tiles. Nothing has changed, but the air around you sparks with still danger.\n\n\nThe brides watch you with interest.\n\n\nCassandra doesn’t notice. “Alice may not like me—I’m not an idiot, I know she can’t stand me—but that has no bearing on whether I wish her ill or not. She was under my care. I failed as her caretaker. Her attack is to my great shame, and when I uncover who is plotting to control the daughter of the oldest and most powerful werewolf line, [i]I will wring their neck.[/i]”\n\n\nSati laughs. It’s a strange, hollow sound, like a drum. Cassandra stiffens and then sulks into her coffee. “You were testing me.”\n\n\nSati pats Cassandra’s shoulder. “Of course, of course, my old friend. I wanted to make sure nothing had happened to the woman who smuggled aristocratic ladies away from blood-hungry revolutionaries.”\n\n\n“Just because I see no value to romance doesn’t mean I wanted to see my former partners and their children wear gallow-dress.”\n\n\nYour inner world reels at the thought of Cassandra as an aromatic lesbian Scarlet Pimpernel. Do you want to ask her about it? You might learn some fighting moves and how to laugh with the taste of blood in your mouth.\n\n\n*choice\n  #Ask for a story.\n    “That sounds like a story,” you say. “I’d love to hear it sometime.”\n    \n    \n    You’re treated to the pleasure of Cassandra’s shock. “Pardon?”\n    \n    \n    Sati laughs again, and you call Rosario and Ishara over to hear a tale of escape.\n    *set Defense %+12\n    *set Bloodthirst %+8\n    *goto pimpernel\n\n  #Let the past rest.\n    “On that note, I’m going to leave,” you say, already stepping backward. “Have\n    fun.”\n    \n    \n    Sati casually waves as you exit the coffee shop.\n    *set Defense %+6\n    *set Bloodthirst %+4\n    *goto goodbye_chika\n\n\n*label pimpernel\n\n*page_break\n\nOnce everyone is settled in, Cassandra squints, as if not quite believing you all. Then she huffs, side-eyes Sati, and finishes her coffee with a long draught. “Well, if you insist. I think I know just the one.”\n\n\nSati nods, and you catch xer trying to squash down a sneaking smile.\n\n\n“Once the fighting began in earnest at the capitol, I arranged for the people who I cared about to leave. Now, if you bother to recall geography, the capitol of that country is many miles away from the ocean, I found myself in need of a safe overnight stop. I called upon my vampire friend Cornelius. He had a large country estate between the capitol and the coast. I thought there would be little problems.”\n\n\n“You make it sound like there were many problems,” Ishara comments.\n\n\n“Oh, there were. Heterosexual cis men are such rough things. At least back then, with their epaulette and buttons and such, they had a pleasing aesthetic, ornamental quality. Now it’s all awful sports hats and unwashed t-shirts.” Cassandra makes a disgusted face, but then recovers.\n\n\n*fake_choice\n  #“You’re totally right.”\n    *page_break\n\n  #“I think they do their best.”\n    *page_break\n\n  #Remain silent.\n    *page_break\n\n\nCassandra ignores you. “I personally supervised the first few runs myself, and I didn’t detect anything amiss. You see, the size of the operation required people to escape in shifts.”\n\n\n“You had a great many friends back then,” Sati says.\n\n\n“People had [i]class[/i] back then,” Cassandra says, wry. “Anyway, I suppose I grew complacent. I thought I could leave them alone. Miss Pross was tough as shotgun shells. I left Pross and her daughter Marie with Cornelius for three days, for I had urgent business in the capitol to save another woman who insisted on biting every policeman. When I returned, I escorted Miss Pross and Marie to the coast and just as Pross was stepping on the boat, she bade me to stay in the country and investigate Cornelius.”\n\n\n“Why?” Rosario says, puzzled.\n\n\n“In her time at the estate, Pross noted that the peasants were deeply afraid. It was strange enough that they weren’t revolting at that point, but I thought it was because Cornelius had earned their respect or something honorable.”\n\n\n“Nope,” Sati says, letting the sound pop.\n\n\nCassandra tsked. “I kissed Pross goodbye and returned to Cornelius’ estate undercover. I won’t bore you with details, so the long and short of it is instead of taking one or two people into his confidence and feeding off them, the whole estate knew Cornelius was a vampire and lived in stark terror. Children disappeared in the night, women called away from work to never return; poorly disposed bodies in the river—that sort of unimaginative slop. Anyway, I found the peasant with a brain in her head, encouraged her to revolt, and helped the lot take his house. I ate Cornelius’ heart in the marketplace and it was just as satisfying as the Bard’s Beatrice describes. Nina, who was their leader, let me use the house until the fighting ended.”\n\n\nSati prods, “And say what happened to the estate.”\n\n\nCassandra waves her hand. “Oh, well, the peasants were peasants no longer and owned the place in common. They kept it in group until a decade ago when the noble lady Claudia passed. She wanted the historical riches to be open to the people, so now I run it as a museum in all seasons except winter, during which I’m very fond of living there myself to see some actual snow and get out of this dratted rain. Satisfied?”\n\n\n*fake_choice\n  #“Greatly.”\n    *goto goodbye_chika\n\n  #“More stories please.”\n    *goto goodbye_chika\n\n  #Ponder the image of Cassandra devouring a heart.\n    *goto goodbye_chika\n\n\n\n*label goodbye_chika\n\n*page_break\n\n\nConsidering Cassandra’s words on the way home, you pass the mouth of an alley and see an unmistakable movement. You tell the others that you’ll catch up, and they should go ahead. Concern darkens Ishara’s face, but Rosario understands and wishes you luck.\n\n\nThe alley drives a channel between two brick buildings as a tenuous connection between broad avenues. Among the dumpsters and litter stands a very out-of-place Chika Itou. She looks…haggard.\n\n\nWith delicacy of step, she stalks towards you. “${name}, it’s good to see you again,” she says, but her voice is hoarser than you remember. “How are you?”\n\n\nYou stand your ground.\n\n\n*fake_choice\n  #Say nothing.\n    *page_break\n\n  #Ask her what’s going on.\n    *page_break\n\n\nBefore you can respond further, she says, “Your decision has filled me to the brim with regret.”\n\n\n“Chika….”\n\n\nShe’s close enough to see the whites of her eyes, to do nothing as they fill with tears. “I doubt every decision now. Question why I’m fighting. If the person I care about the most thinks the Rogues aren’t worthy, then why do I persist?”\n\n\nYou say nothing, and Chika swallows. She straightens and you try not to see the lie behind it. You try not to notice the bags under her eyes, or how her hair has lost some of its luster.\n\n\n“I want you to not be there,” Chika says. “I know I had a spy in my ranks because they’ve suddenly abandoned us so close to victory. The Masquerade must know when we’re filming, but I’m going to do it anyway because I have nothing else at this point. Better a final stand than to be picked off one by one. I want you to not be there. At the battle.”\n\n\nAll you can say is, “I have to go where I’m ordered.”\n\n\n“Damn you, ${name}!” Chika snaps, and the sound is like a whip cracking against flesh.\n\n\nShe rushes you and smacks your chest with her fist. This must offer some relief because she does it again and again and again—these weak little punches like hail-fall—until you wrap your arms around her and hold her close. “Chika, stop.”\n\n\n“I thought it would leave a mark.”\n\n\n“Hm?”\n\n\n“I said I would stay by you, no matter what, but then you joined my enemy, the Masquerade, and I’m…sad.” She slumps against you, no energy left. “Loneliness weighs me down. So much hurt should mark me somehow, but my skin’s the same as ever.”\n\n\n“Chika…are you okay? Do you want me to call someone?” Hugging her is like embracing ice.\n\n\n“I want things to be different. I want different choices,” Chika says.\n\n\nYou hold her for as long as she needs.\n*goto final_battle\n\n\n*label final_battle\n\n*page_break\n\n\nFate has yanked you out of your ordinary life into a purgatory of extraordinary trials. You had no warning, but you’ve done well.\n\n\nThis time, you do have warning. You feel fate loom over you; carry tension in your shoulders as you prepare to be plucked from your new normal and thrown. It is not easy. It is never easy.\n\n\nWhen the attack happens, you look into a mirror. You know now that mirrors lead into parallel worlds, and in the split second as the attack starts, you disassociate enough to see past the silver and into the physical reality of your double. You are setting up the cameras with your human hands. You crash through the door with your wolf strength and snarl. It is yourself, with different choices and a different fate.\n\n\nIn the second half of the second, a truth strikes. It is up to you. Sati, Cassandra, Ishara, Chika, Rosario, Alice: they support you, but it has always been up to you to dissolve this conflict. Your power will bend reality; join sides together. The only question is how.\n\n\n*choice\n  #Persuade for peace.\n    *if Empathy > 40\n      You pounce into the middle of the conflict and let the words spill out. You are\n      vulnerable. The combatants careen to a stop and listen. You plead for peace,\n      for an end to this fighting, and say life is hard enough without blood. A\n      compromise can be reached. A slow reveal. Ishara stands beside you first. \n      Chika and Cassandra are the last to clasp hands, but by sunset there are plans\n      for a brand new world.\n      *goto peacemaker_end\n\n    *else\n      You pounce into the middle of the conflict. You are human; you are vulnerable.\n      It is not enough. Maybe the combatants don’t realize what—who—they’re tearing\n      into.\n      *goto_scene death\n\n  #Fight to defend.\n    *if Defense > 40\n      You bellow a war cry and leap into the fray, with the intent to harm, but not\n      murder. You swipe with claw and nip with tooth and your enemies limp back into\n      their hidey holes. Though you’ve dealt a mighty blow, you haven’t ended the\n      conflict.\n      *goto protector_end\n\n    *else\n      You bellow a war cry and leap into the fray, but the fray is not to be so\n      underestimated.\n      *goto_scene death\n\n  #Fight to kill.\n    *if Bloodthirst > 40\n      You shriek and release all you have ever held back. You relish the blood spray,\n      the emptying of spirited eyes; the rip of soul from flesh, meat from bone. The\n      wolf runs true, undiluted in your veins, a creature of stark terror and pure\n      vengeance. You are a monster and this is your power and your enemies gravely\n      underestimated if they thought you aught else.\n      *goto monster_end\n\n    *else\n      You bellow a wary cry and leap into the fray, but the fray is not to be so\n      underestimated.\n      *goto_scene death\n\n\n*label peacemaker_end\n\n\n*page_break\n\n\nIt is said blessed are the peacemakers, and you are truly blessed. With your knowledge of the human soul and of the fighters’ true desires, you forge a compromise. The supernatural world will slowly reveal itself. The darkling whispers the general populace already speaks will grow louder until the Masquerade cracks and breaks. Even Cassandra and the brides can step into the proverbial sun.\n\n\nAs you and Chika reconcile and watch over this process, you spend your days more human than wolf. Your life is full of soft, tender gestures, with laughter, joy, and love. When Alice graduates from secondary school and throws her cap in the air, you have never felt more proud.\n*page_break\n*goto_scene ending\n\n\n*label protector_end\n\n\n*page_break\n\n\nAfter witnessing your teeth, no one dares openly challenge the might of the Masquerade, and the dark secrets of the night creatures remain. The Rogues dissolve like morning mist and catching them proves equally impossible. You don’t see Chika, not anymore. Maybe in a hundred years, she will re-emerge, and the world will again dance on knife point.\n\n\nYour personal life is perfectly divided between wolf and human: a constant balancing act which grants its boons and bruises in turn. When Alice graduates from secondary school and throws her cap in the air, you have never felt more proud: both of her and yourself for how far you’ve both come. Your victory is hard-earned.\n*page_break\n*goto_scene ending\n\n\n*label monster_end\n\n\n*page_break\n\n\nYou count the corpses. There aren’t enough. The leader has not fallen with her people.\n\n\nThe Masquerade washes off and celebrates anyway, for there is none left to oppose the night creatures’ singing. Dark secrets remain. Even as you smile, even as you eat, the food lacks spice. You have tasted the human wine, and suddenly the birdcalls are louder than your friends’ voices. You find yourself, in absent moments, turning north and smelling the wind.\n\n\nYou don’t realize what’s happening. You should be happy, right? Why do you go to the park, over and over, and long to live among the thistledown and weeds?\n\n\nIn dreams you hear the forests’ call, the drumming and groaning of wood, and shed the skin you were born in to reveal the blood-drench of your second baptism.\n\n\nOne night it is too much, so you arise from your bed and run. The need to run outstrips any love, any work, any reason to stay within the suffocating confines of the city. The need to wear the wolf-skin is so loud it deafens all else.\n\n\nYou howl; you feast; you run with joy. You splash into the tree line as a great white wolf joins you. She has been waiting. As the years pass, the locals know of you both, two giant, earth-shaking wolves with gold eyes flamed by the fires of human intellect; the wild gods of the forest who stumble into the lone pub to sing nature’s prophecies. You and Chika become a legend whispered to children on the darkest, moonless nights. People pray to you when they seek justice, and, sometimes, you listen.\n*page_break\n*goto_scene ending", "meet_alice": "\n[b]Chapter 1: Out of the Crucible[/b]\n\n\nAfter all that pain, you look out of your new wolf eyes for the first time. You breathe your first lungful as an entirely new thing, born again in the midnight moonlight and faint blue-lined stars.\n\n\nYou run.\n\n\nSomeone screams, but you ignore them for the joy of blood pumping in your re-arranged veins, for the sleek caress of wind through your newborn fur, for the hundred new smells in your nose. Grime and smoke then change to wet earth and the spice of pine and oak bark.\n\n\nYou slow only when the morning fog closes in, to claw a warm home out of the soil, to cushion your bed with thistledown, and to curl up for sleep.\n\nTwilight begins your time, you know this by instinct, and you wake up hungry. The moon peaks heavy and beautiful through the treetops, on the opposite end of the sky of golden light. Your stomach rumbles threats. Breathe deep to taste the light breeze; twitch your ears back and forth to listen. You smell the matted, downy undercurrent of a rabbit warren in one direction. In the other, you smell the grease of sheep. Which do you chase?\n\n\n*choice\n  #The rabbit warren.\n    You stalk delicately towards the scent, light on your toes and careful the wind\n    favors you. They are blinded and anosmic to your predatory shadow. You spring.\n    The blur of their shockingly white tails does not distract. You chomp merrily\n    into your feast and dig the rest out for second and third courses. Delicious.\n    *set Bloodthirst %+4\n    *set Defense %+6\n    *set Responsibility %+5\n    *goto Alice\n\n  #The sheep.\n    There are no wild sheep. These are kept by human ranchers behind a stone wall,\n    but no wall can deter you. You simply back up, run, and sail over it, grace\n    itself. The sheep do not take kindly to being intruded upon, yelling and making \n    fuss, but you are faster, stronger, and more demanding that your teeth be\n    experienced. You gorge yourself on hot, piping sheep, but must leave the carcass\n    behind as evidence you exist. The day after you must stay hidden in the\n    underbrush as humans search and whisper for who or what could have done this? We\n    thought we eliminated all the wolves? We have not seen such a slaughter in years’\n    worth of memory.\n    *set Uncanny %+6\n    *set Defense %+6\n    *set Bloodthirst %+4\n    *goto Alice\n\n  #I go back to sleep.\n    Cawing wakes you up. Next morning’s dawn infiltrates into your senses with slow\n    roots: you are safe; it is tomorrow. The cawing continues, and you poke your\n    nose out. A crow—a huge crow—is before you and squawking.\n    \n    \n    Seeing you are awake, the bird quiets, but ruffles up its feathers, trying to\n    look intimidating. You huff, unamused. The bird cocks its head and blinks a \n    blue-black eye. You blink back. In one swift movement, the crow spreads its\n    wings, caws straight in the your face, and flies off into the blue.\n    \n    \n    Well, that was sort of interesting. You maintain your unimpressed demeanor and\n    curl back in your nest.\n    *goto Alice\n\n\n*label Alice\n\n*page_break\n\n\nThe day after rains briefly, and you feel a high of playfulness. With a bounce you are off; you are hunting. You step light in the muck, wary of muddy pits. A creek burbles nonsense, and you whack cattails with your tail and stir up seeds. The wind guides you, grooms your fur, tantalizes your nose. The moon sings back to you with its light, with its starry comfort. Another howl sounds.\n\nNot you, not your howl. Your heart hammers in your chest. Running is important now; life important. Your ribs expand to breathe in as much air as possible; your nose sucks up the scent. Another wolf. Female. Alone, like you. You pump your legs; devour distance and land. And still the wind carries the foreign scent, the unknown. She’s fast, faster. Too soon, it’s filling your nostrils, and you sneeze out the stench. The other wolf and the salt of blood.\n\nYou spin around to face the intruder. The stranger is smaller, almost fox-like in her minuteness, the way her fur is black ringed and powdered with white. And red. A dead rabbit drips red from her jaws, and your yellow eyes narrow. The stranger stares. You stare back, hackles raised. \n\nThe stranger drops the rabbit, raises her chin, and growls. \n\nThe sound vibrates in the fine bones of your ear. It’s a familiar sensation, but not one you remember. Who is this strange female, exactly?\n\nThe stranger growls louder. On instinct and impulse, you put your tail between your legs and bow your head. You can’t fight this stranger. Something in you tells you not to fight.\n\n\nThe stranger comes closer, and you two begin to greet each other properly, sniffing and snuffling. You lower your hackles, but you’re still nervous. What does this new female wolf want? Friend? Foe?\n\nThe new wolf finishes her sniffing and takes the rabbit back in her jaws. She drops it at the your feet, sits, and waits. [i]Can you hunt? Can you eat?[/i], she’s asking.\n\n[i]Yes, of course I can.[/i] You rip off a foot and chew, proud. [i]See[/i]. The other wolf watches closely for a minute before joining the supper. Together you gobble the animal down.\n\nPack. This must be what pack feels like.\n\n*fake_choice\n  #Rejoice!\n    *page_break\n\n  #Make a show of celebration…but stay on your guard.\n    *page_break\n\n\n\nSomething’s wrong. It’s daytime—sun time. You fell asleep curled against your packmate, happily memorizing scent and furry touch, and now your packmate is gone and a two-legger is sitting like nobody’s bothered. Not cool.\n\nYou growl, loud, at the intruder, the way rattlesnakes shake their tails. Your hackles are up; your hair is raised; your mouth shows your teeth. This person is not welcome here. Not welcome at all.\n\nAnd they have the utter gall to reach out their hand to you. To extend your fingers like chewy little snacks, in…in offering? Does this person want her hand bitten off? She smells…she smells—almost just like your packmate.\n\nWhat?\n\n“It’s okay,” the woman says. Her voice carries a smooth lilt of accent. “It’s okay.”\n\nTentatively, you sniff the hand, the proffered fingers. Your tail wags of its own accord. This person smells nice, like fur and sweat and dirt. You lick them. You are not supposed to attack this person.\n\n“My name is Alice. Do you remember your name?”\n\nYour…name? Wolves have no need of names. You are a wild thing.\n\n“It took me awhile,” Alice says.\n\n*fake_choice\n  #Think about this name business.\n    *page_break\n  #What about pets?\n    *page_break\n\n\nAlice scratches under your chin, and you love it. Little pleasant jitters bounce across your skin. You wag your tail harder.\n\n“I’m sorry this happened to you. I’m sorry I did this to you. It’s just….” Alice’s eyes well up with tears. You can hear her breathing struggle and sob as she wipes her eyes. “They were after me [i]again[/i] and I saw you…. You looked so fit, so strong. And I knew…. So spur of the moment, like everything else I do, I bit you. It’s just…It’s just so hard to be alone.”\n\nAlice cries, and you make a high-pitched dog whine of displeasure. You stick your snout in Alice’s face and huff, nuzzling her cheek. Pack. Person pack. “But I thought—I had this feeling. You [i]needed[/i] it. Like you were meant for it. I dunno if that’s a good enough excuse, but it’s all I’ve got.”\n\nGiving up on speech, Alice’s arms circle the wolf, and she buries her face in fur, breathing deep. You sit and let her. Alice smells young, almost a pup, not quite grown into her adult scent. Still deciding.\n\nAlice falls half asleep: you can feel her breath gently swaying in and out, calm at last. You’re sure Alice is fully unconscious, but then a soft voice whispers, “Do you remember your name yet?”\n\nName. Names again. What did Alice mean by it?\n\n“You’re human, like me,” she says. “A werewolf.”\n\nThat sparks some understanding. A human? Like Alice? But Alice is wolf. This two-legger form is a lie. You whine and back away. You don’t like these thoughts. They are not good thoughts.\n\n“Hold yourself together,” Alice says. She sucks air through her teeth and stands slowly to her feet. “Watch this.”\n\n\n\n\n*page_break\n\n\n\n\nFur erupts from Alice’s skin, breaks out like happy fungus on new decay. Alice tilts her head back, and hunks of teeth elongate out of her mouth; her nails shrivel and blacken into claws. Her bones grate and scrape against one another in unnatural, shrill breakings, shrinking and enlarging to dog-form. Her eyes roll like cue balls into the back of her skull and roll forward yellow. The transformation is fucking terrifying, and you back away in fright.\n\nAs soon as it’s begun, it’s over, and your packmate returns.\n\nAnd starts walking west. Out of the forest. Back toward the city.\n\n\n*choice\n  #What the hell? You want me to follow you after THAT?\n    Alice hears your soft backward step against the wet leaves and whirls around.\n    Before you can make a move more, she snuggles beside you, makes her packmate\n    scent waft around and floofs her tail. Calm settles over you and you follow her\n    all the same. At the end of the day, you instinctually trust Alice.\n    *set Responsibility %+5\n    *set Snark %+8\n    *finish\n\n  #Follow her immediately.\n    You follow Alice with no hesitation, for she is pack and you trust her. You bump\n    against her, and she makes a pleased rumbling sound as you step out of the\n    wilderness to the land of civilized things.\n    *set Responsibility %+5\n    *set Empathy %+3\n    *set Uncanny %-6\n    *finish\n\n  #No, I want to stay in the forest! Fight her.\n    Even as you leap, some part of you screeches that this is wrong, against instinct\n    and custom, that you must [i]stop[/i].\n    \n    \n    Instead of being greeted by soft neck flesh, you meet the business points of\n    Alice’s teeth. While Alice’s human form is at least a solid decade younger than\n    yours, she has much more experience being a wolf. Growling, spitting, desperately\n    urging, she grips you hard by the neck and shakes you until you yield. Her eyes\n    hold accusation as you meekly put your tail between your legs and follow her back\n    to the land of humans.\n    *set Bloodthirst %+5\n    *set Defense %+6\n    *set Uncanny %+6\n    *finish", "meet_cassandra": "\nBefore we proceed, a warning: you have crossed the point of no return. Starting with this chapter, we will focus on testing your skills. Play to your strengths. Consequences can be lethal.\n\n*page_break\n\n\n[b]Chapter 6: Cassandra[/b]\n\n\nThe train ride home is full of morning commuters, and they stink of cheap aftershave and drugstore perfume. It wouldn’t bother you if your nose was only a nose, but it isn’t. You’re not only human.\n\n\nYou muscle your way through the platform crowd, only to spot Alice stopping dead in her tracks. She had perfectly blended in with the crowd before, been as unobtrusive as anything. Now she is overwhelmingly present in your senses, her heart slamming your ears as loud as your own, her fright making your complexion go pale, her smell crowding your nose full of adrenaline purified through terror. Your shoulders tense, and she’s not looking at you. She’s looking at a stranger.\n\n\nThe strange woman looks so upper crust she could be made out of white plastic. Her hair is platinum blonde, her skirt suit is tight dark blue; her pearls are shiny and round. Her lips are painted very, very dark red, and it makes the hair on the back of your neck stand on end.\n\n\n“My Lady Cassandra Mallory,” Alice pronounces. You are surrounded by people; you three are utterly alone in this confrontation. A high-pitched buzzing noise razes your ears, as Alice, stiffly but elegantly, bows in deference. “What is your pleasure?”\n\n\n“Don’t try to appease me,” Cassandra says. “I have dealt with many a new pup, so you can follow me on your own two feet, or I can drag you.”\n\n\n“Let’s do as she says, ${name}.”\n\n\nA growl escapes, but you do as you’re told. No matter what Cassandra wants, you are confident in your abilities.\n\n*page_break\n\nCassandra leads you to an expensive-smelling car, which takes you to a Victorian townhouse. Cassandra opens her door and serves you both tea and small cucumber and cream cheese sandwiches. Neither Alice nor you touch them.\n\n\nYou sit in a proper drawing room, which is full of the type of under-stuffed furniture with heavy wood lining that you’ve always found uncomfortable. The décor screams old imperialism.\n\n\nCassandra smells off. Once upon a time, Rosario had this story character who was a horseback rider, and like all horseback riders, she was fond of giving horses carrots. However, rats kept getting into her carrot supply, so she decided to float the carrots in water so the rats would drown trying to eat the carrots. The result: no dead rats, but the discovery that carrots suspended in water give off a strangely sweet odor. It’s strange because it is sweet, and people generally like sweet things, but at the same time it’s too sweet, unnervingly sweet, so sweet it sends alarm bells off in your skull. Because, while it’s sweet, it’s also dead. It’s the smell of decay, of [i]rot[/i]. That’s what Cassandra and her house smell like.\n\n\nIn real life, Rosario floated some carrots in a bucket in your shared kitchen “for the purposes of realism,” and after a week, you literally put your foot in their face to make them dump it out.\n\n\nYou and Alice squeeze together on one of the uncomfortable sofas, and Cassandra settles in a wing-backed chair. Alice glares at her, and you, satchel on your lap, hide your fist with your housekeys sharp between your knuckles. The wolf is a paper cut thin line away from bursting.\n\n\nCassandra sniffs and pours herself tea. “Such hostility. If I didn’t know what you all are, I might even be afraid.”\n\n\n“What do you have to tell us?” you say, and, with remarkable restraint, do not spit a single word through your teeth.\n\n\nCassandra takes a sip of tea and then sets it on its saucer with a clink. “I’m sure Alice has told you very little, because if she did, you would have contacted me sooner. Would you like the short version or the long version?”\n\n\n*choice\n  #The short version.\n    “The short version,” you say. If anyone says you have been blessed with patience,\n    they’re lying.\n    \n    \n    Cassandra puts down her teacup. “As I suspected.” She sneers. “I can almost see\n    that wolf pacing behind your ridiculous human mask.”\n    \n    \n    Your only reply is to show your fangs. Alice trembles beside you.\n    \n    \n    Cassandra sits back, unruffled. “The short version is Alice comes from a powerful\n    werewolf bite-line, and she’s my ward. She must be better at checking in with me\n    and better at explaining the supernatural world to you. She has, for instance,\n    forgotten to extract your oath to the Masquerade.”\n    \n    \n    Alice’s folded hands shake in her lap. Her eyes are averted. Awaiting punishment.\n    You shift in your seat to rub up against her in support.\n    \n    \n    “I know about the Masquerade.”\n    \n    \n    Cassandra makes an eloquent eye-roll. “Knowing is only half of it. The\n    association needs your oath. If you live past this interview, I’m sure you’ll\n    make another mistake some other time and a random mortal will learn about\n    werewolves. If they’re not one of your confidantes, you must silence them.”    \n    \n    \n    “She means kill them,” Alice interjects like a stray bullet.\n    *set Bloodthirst %+8\n    *set Uncanny %+12\n    *goto confrontation\n\n  #The long version.\n    Cassandra arches a pencilled eyebrow. “Well, that’s a refreshing surprise.\n    Usually you young people are always rushing on about getting on.” She says the\n    words “young people” like they’re a particularly ugly vase that begs to be\n    smashed.\n    \n    \n    Your spine stiffens, but you say nothing. You can wait out anything if necessary.\n    \n    \n    Cassandra takes another sip of tea before setting her cup on the tray. “Like many\n    supernatural people, Alice’s past is heavy and needlessly convoluted. She is my\n    ward because her parents were murdered, but who she thought was her father is not\n    her father. Her father is a very old werewolf named Bisclavret.”\n    \n    \n    Alice folds her hands in her lap, and her gaze is averted. You can hear her take\n    deep breaths beside you, and you shift to sit closer and provide comfort.\n    \n    \n    “Bisclavert is an odd misanthrope of a beast.” Cassandra waves her hand. “He\n    spends most years as a wolf, but every decade or so he remember he has manners\n    and becomes human for a stint. We do not know how old he is, but Alice is his\n    spitting human image. When she was born, she started manifesting abilities, which\n    caught the association’s attention.”\n    \n    \n    “It’s nothing special,” Alice blurts out. “My intuition is very high.”\n    \n    \n    “She can sense danger, use her ridiculously high empathy to predict people’s\n    actions, and perform low-level hypnosis is what she can do,” Cassandra clarifies\n    with a snap. “Bisclavert doesn’t know she exists quite yet. People seem to value\n    their lives too much to pull him out of the forest.” Cassandra glances at her\n    nails with distaste as subtext to what she thinks of those people.\n    \n    \n    Silence reigns as you soak this in. Cassandra pours herself another cup of tea\n    and drains it. Alice is stiff as a board beside you, and you grip your house\n    keys tighter.\n    \n    \n    “So that’s Alice,” Cassandra says.\n    \n    \n    “No it isn’t,” you cut in. “How did she become a werewolf?”\n    \n    \n    Cassandra doesn’t deign to even glance at you. “Oh, you know, the usual way. An\n    investigation turned up nothing, and she was under my care already. I usually\n    deal with the young supernatural population until they learn the rules and reach\n    adulthood. That’s why she needs to check in with me more.”\n    \n    \n    Her flippancy irritates, but you set that aside for now. “Is that all I need to\n    know? That Alice is powerful?”\n    \n    \n    “Oh, the other thing is such a banal and small matter that I was saving it for\n    last,” Cassandra says. “You must give me your oath you will maintain the\n    Masquerade.”\n    \n    \n    “I know about the Masquerade.”\n    \n    \n    Cassandra waves her hand again. “Then you know what I must do. If you live past\n    this interview, I’m sure you’ll make another mistake some other time and a random\n    mortal will learn about werewolves. You must silence them, if you do not want to\n    make them your responsibility.”\n    \n    \n    “She means kill them,” Alice interjects like a stray bullet.\n    *set Responsibility %+10\n    *set Empathy %+6\n    *goto confrontation\n\n*label confrontation\n\n*page_break\n\nIf you feel any shock, you push it down. You absolutely will not appear weak in front of this woman. “And if I refuse?”\n\n\nCassandra’s smile forms predatory. The deep blue angle of her eyes spells redrum. “Then I shall give you a moment to make your peace.”\n\n\nAlice’s panic explodes into pleas. “No! Don’t harm ${mc_themher}.”\n\n\n“Come stand by me, Alice,” Cassandra orders, standing up herself. “One way or another this interview is over. Let’s hope for your friend’s sake you haven’t been telling them the Rogues’ nonsense about breaking Masquerade. That group is full of dead fools walking.”\n\n\nBefore you can blink, Alice is ripped from your side, and you watch real time bruises forming on her wrist underneath Cassandra’s fingers.\n\n\nYou spring forward, and Cassandra backhands you so hard you slam into the wall with a crunch. It’s clear that you will need near every ounce of fighting skill to beat Cassandra. Even if you don’t care about the Masquerade, you must convince her you’ll abide by the rules. What do you do?\n\n\n*choice\n  #Swear your oath…for now.\n    *if Responsibility > 30\n      “I promise not to break Masquerade,” you snarl in a voice more wolf than\n      human. You glare at her out of yellow eyes, adrenaline pumps through your\n      muscles at the ready to bolt; your breath comes in shallow spurts.\n      \n      \n      “Excellent,” she says, releasing a whimpering Alice. “I’ll have Alice contact\n      you with the official ceremony details.”\n      \n      \n      Blood drips from your head, and pressing to stop it makes your whole hand\n      red. “Ceremony?”\n      \n      \n      “It’s really to introduce you to everyone. Nothing terrible,” Cassandra\n      drawls. \n\n\n      Alice scampers to you and gasps. “${name}, I’m so sorry, I’m sorry. It’s okay.\n      We can heal right up and it’ll be better.”\n      \n      \n      “I want out of here first,” you say.\n      *goto riddle\n\n    *else\n      “I promise not to break Masquerade,” you snarl in a voice more wolf than\n      human. You glare at her out of yellow eyes, adrenaline pumps through your\n      muscles at the ready to bolt; your breath comes int shallow spurts.\n      \n      \n      “You’re lying to save your skin,” Cassandra hisses. Her terrible pale form,\n      her cloying sweet rot scent, draws closer.\n      *goto empathy_test\n\n  #Fight your way out!\n    *if Defense > 30\n      Damn Cassandra to hell. “Alice, transform!” you shout. You launch yourself\n      not at Cassandra like she probably expects, but backwards into the sofa. The\n      breathing room allows you to transform, allows the bloodlust to roar, allows\n      strength to flood through your veins like iron. Cassandra is a corpse, and\n      you are something far more horrifying.\n      \n      \n      The vampire flinches as your might tackles her down. She is more solid than a\n      human, but her wrists are bone all the same. Your jaws clamp down and hold as\n      Alice’s ringed wolf barrels Cassandra off her feet.\n      \n      \n      You yank up and then down with all your strength, and there is a sound like\n      granite cracking coming from Cassandra’s skull.\n      \n      \n      Alice barks anxiously and you know her meaning immediately—now is when you\n      run. Cassandra is dazed, not dead, and when she reorients herself, she will\n      be very, very angry.\n      \n      \n      With a howl of frustrated triumph, you choose to live another day.\n      *finish\n\n    *else\n      You launch yourself at Cassandra. Alice screams.\n      *goto_scene death\n\n\n*label empathy_test\n\n*page_break\n\nYour eyes flick to Alice. “No, I’ll keep my promise…”\n\n\n*choice\n  #“Because you’re best to protect Alice.”\n    *if Empathy > 30\n      Cassandra leans back and laughs a full-bodied laugh. The sound makes your ears\n      ache. “So you have been paying attention!” she says, smiling a smile too full\n      of saliva and teeth. “Yes, maintaining the Masquerade is what’s best for Alice\n      and [i]I’m[/i] her assigned protector. You won’t cross me because I’m best for\n      her. Very good. I suppose you two may have a fondness for each other. She\n      created you and it’s only natural to want what’s best for someone who changed\n      you for the better.”\n      \n      \n      Blood drips down your forehead and obscures your vision. “Can we go?” you ask.\n      \n      \n      “Oh, yes, I’ll have Alice give you details about the initiation ceremony. It’s\n      more of an introductory get-together really.”\n      *goto riddle\n\n    *else\n      “Dirty little [i]liar[/i].”\n      \n      \n      Alice screams.\n      *goto_scene death\n\n  #“I’ll side with anyone who helps me protect Alice.”\n    *if Empathy > 30\n      Cassandra leans back and laughs a full-bodied laugh. The sound makes your ears\n      ache. “Oh my, you really do care for her, don’t you? How terribly sentimental.”\n      \n      \n      Cassandra practically throws Alice off, and Alice scampers to your side. She\n      keens your name as blood drips from your forehead. Tears fall from her face,\n      and she tries to staunch your bleeding.\n      \n      \n      “Hmph, some protector,” Cassandra says. Through your obscured vision, all you\n      can make out is a smile too full of saliva and teeth. “Alice, I’ll pass you\n      details about the initiation ceremony.”\n      \n      \n      “Okay, okay,” Alice says. “It’ll be fine, ${name}.”\n      \n      \n      “Yes, it’s not called that to scare you. Well,” Cassandra pauses, “perhaps a\n      little. It’s more of a get-together to make introductions.”\n      \n      \n      Alice helps you begin to hobble out.\n      *goto riddle\n\n    *else\n      “Dirty little [i]liar[/i].”\n      \n      \n      Alice screams.\n      *goto_scene death\n\n*label riddle\n\n*page_break\n\nCassandra can’t seem to let you limp away without one last remark. “I have a riddle.”\n\n\nThe unexpectedness of a person like Cassandra having something as playful as a riddle seems so ludicrous that you and Alice pause.\n\n\n“It goes like this,” Cassandra says in high mocking sing-song, “why did I serve the tea myself? Why do I not have servants?”\n\n\nYou and Alice exchange a puzzled glance.\n\n\nCassandra smiles, low and wicked. “Because I ate them.”\n*finish", "return_to_rosario": "\n[b]Chapter 2: Repossession[/b]\n\n\nThe forests fade like the sun’s light, and leaf mold secedes to sidewalk. There’s less hiding places, more trash and gutter water than birdsong and streams. Alice seems an expert at the urban, digging through cans and scraps with relish. She teaches you.\n\n\nThe smells in suburbia are…disconcertingly familiar. The faint slime of the air, the exhaust fumes of cars, the nicotine from the elderly sucking on cigarettes: are they important? Is it true you once belonged here? When your spirit was born, someone screamed, and you get the distinct impression that they live here. That sound came out of a nearby mouth. It makes your hair raise, and your skin prickle.\n\n\nThe moon rises, and Alice leads you to parkland caged by buildings. The soft grass grows silver green. She transforms to her second self and asks, “All right, what’s your name?”\n\n\nYou don’t know how to respond. You can only howl, bark, whine, and growl.\n\n\nAlice sighs and sucks in air through her teeth. “Don’t you remember something of being human? Your parents? Do you got a partner? Remember their face? Faces always help me. We can’t stay in the country forever. I want to graduate secondary school. It’s—it’s only right.” Alice leans down to scratch behind your ear. “You know, I think this is why humanity hasn’t figured out about werewolves. I mean, the lore is there, for all to see, right? Read it in school. But I suppose so many wolf bites turn into missing person reports. People get lost in the wolf’s mind and end up wild dogs. Like you. This would be perfect if Cassandra would let me have a pet. Would you like that? Kibble? Walks? On the street, like, ‘cause there’s lots of scents there. Enough to mask mine.”\n\n\nYou want to ask:\n\n*fake_choice\n  #Just how many other werewolves are there?\n    *page_break\n  #Who’s after you?\n    *page_break\n  #Do you know who the screamer is?\n    *page_break\n\n\n“Ah,” Alice says. She is all smiles and excitement. “I saw that! You wanted to speak! Wolves don’t speak, you know. You’ve got to be human for that. Come on. Give us a try.”\n\n\nDo you want to know what she means? Humans have to think, have to be responsible, have first-year residencies to complete and student loans to pay. Wolves have to catch rabbits.\n\n\n“You won’t live as long,” Alice says. “Wolves don’t live too long in the wild. Unless you get stuck in a zoo. I think that one wolf in the zoo pack is a wer. Explains the good behavior.”\n\n*page_break\n\n\nAlice sits down and gathers your face to her, looks deep in your eyes. “There’s something…” she mutters. “Something I can say.”\n\n\nYou try to back up and pull away, don’t want to meet Alice’s gaze, but her hands hold your hair tight. It makes you uncomfortable, reminds you too much of challenge, of humans expecting things of you that you’re too unraveled to do.\n\n\nAlice’s dark brown eyes bore into you. “You…” she begins. “You left someone behind. Someone you promised. Who are…they?”\n\n\nYour ears perk. They—the screams—they!\n\n\nAlice says, “Transform. I need you to transform.” She growls, finally frustrated. “You’re not meant to stay like this!” she shouts. “You want to help people instead of destroy them and I need help!”\n\n\nYou tear yourself away in shock. That…that was your promise. You promised not to destroy, like your family did, but to…heal.\n\n\nSkin traps fur; teeth dull; ears migrate to the sides of your head. Fingers stretch from your wrists; feet and knees bend in their proper places. Your voice comes last: “Rosario.”\n\n\n“Your name is Rosario?” Alice says, eager. “Hello!”\n\n\nCollapsed on the ground, you hug your knees to your chest and shake your head. It feels like you’ve been swimming in deep, dark water without bothering to come up for air. Maybe you forgot air was important. “No, my name is….”\n\n*choice\n  #Lucy\n    I always thought she deserved more.\n    *set name \"Lucy\"\n    *goto surname\n  #Maleva\n    The story is about you this time.\n    *set name \"Maleva\"\n    *goto surname\n  #Alex\n    You won’t find him here, but hopefully your fate will be much kinder.\n    *set name \"Alex\"\n    *goto surname\n  #Heather\n    Oh! Well. The author thanks you for your continued support.\n    *set name \"Heather\"\n    *goto surname\n  #Larry\n    Classic.\n    *set name \"Larry\"\n    *goto surname\n  #These are very clever references, but they’re not my name. Let me input it please.\n    *input_text name\n    *goto surname\n\n\n*label surname\n\n*page_break\n\n“Go on, what’s your surname?” Alice says. “It’s going to be all right.”\n\n*choice\n  #I wish my surname to remain unknown. Please signify this obfuscation with ___\n    *set surname \"___\"\n    *goto hello_name\n  #Westenra\n    You will have three suitors again, but none of them will be cowboys.\n    *set surname \"Westenra\"\n    *goto hello_name\n  #Ouspenskaya\n    A surname for a wise face. At last.\n    *set surname \"Ouspenskaya\"\n    *goto hello_name\n  #Price\n    You hide multitudes behind the ordinary.\n    *set surname \"Price\"\n    *goto hello_name\n  #Leelan\n    That sounds made up because it is.\n    *set surname \"Leelan\"\n    *goto hello_name\n  #Talbot\n    Classic’s are classy.\n    *set surname \"Talbot\"\n    *goto hello_name\n  #I shall whisper it in your ear.\n    *input_text surname\n    *goto hello_name\n\n\n*label hello_name\n\n*page_break\n\n“My name is Dr. ${name} ${surname}. I just finished medical school and I’m in my first year of internship. Rosario is my best friend.”\n\n\n“The one you promised?” Alice asks.\n\n\n“How do you know this stuff about me?” you counter, avoiding the question in sitting up and palming the soft grass. You feel dizzy; the dappled moonlight is making the landscape whirl. Wolfish intents and wants be damned: the electrical paths in your brain are shot through with memory, of who this vessel was before. You want to close your eyes, but don’t. You focus on Alice: Alice has frizzy corkscrew hair that moves when she moves, like gentle extra appendages.\n\n\nAlice shrugs, and her black skin shines. “I just do. Like I knew you in the park.”\n\n\nAnger. A plain, unbidden human anger surfaces amongst the lost confusion. It boils hot in your stomach. “You changed me. You changed me into a [i]werewolf[/i].” Your jaw clenches, and you hiss the last word through your teeth.\n\n\n“I’m sorry!” Alice backs away, and tears spring to her eyes. “I didn’t have a choice. I need you! I need help and you—I saw you and knew you’d help me.”\n\n\n“You could have asked. You could have explained. You can shift whenever you want.” The anger grounds you, centers you in the cityscape that is your human home.\n\n\nThe tears leaking out of Alice’s eyes are silent ones. “You wouldn’t believe me. Nobody does. If I transformed, you’d just call the police or, or, or somebody else awful.” She visibly swallows down the lump in her throat.\n\n\nYou snap, “What did you think would happen, Alice? That’d I’d take care of you?”\n\n\n“Y-yes.”\n\n\n*choice\n  #“Well, it’s your lucky day because I’m fucking going to.”\n    “Not because I’m a wolf, but because I’m a decent fucking human being.” You glare\n    at her for a beat, watching Alice deconstruct your words and sift through their\n    meaning. Friend or enemy? Perhaps Alice is a little of both, and entirely in need\n    of safe harbor.\n    \n    \n    Alice sucks in air through her teeth and squares her shoulders. “All night. What \n    do we do?”\n    \n    \n    “We need to go back to mine and Rosario’s apartment. I can get us clothes and\n    showers.” You hold your head in your hands and try to will your anger into\n    nothing. Ugh.\n    \n    \n    “Is that the nausea? I hate the nausea,” she says. She looks like she wants to\n    come to you, but stops herself. “It will pass soon. The first hundred\n    transformations are rough.”\n    \n    \n    “Hundred?”\n    \n    \n    “Yes.”\n    \n    \n    “Goddamnit.” A beat later. “Alice?”\n    \n    \n    “Yeah?”\n    \n    \n    “Thank you for finding me out there.”\n    *set Snark %+8\n    *set Responsibility %+5\n    *goto clothes\n\n  #Say nothing.\n    You rise, spin on your heel, and walk away. You’re already in the city, so you\n    will stop in your apartment for supplies, explain the situation to Rosario, and\n    go from there.\n    \n    \n    You only make it a few feet when Alice’s fingers find your wrist.\n    \n    \n    “Please, ${name}, I’m begging you! I’m sorry, all right? I’ll—I’ll make it up to\n    you. Somehow I’ll make it right.”\n    \n    \n    You tear your wrist out of her grip. You can’t stop her from following you, \n    but you provide no encouragement either. You allow Alice to follow you home at a\n    distance.\n    *set Responsibility %-5\n    *set Bloodthirst %+4\n    *goto clothes\n\n  #“You were right. Of course I will.”\n    Alice’s relief is scrawled on her every muscle. “Really?”\n    \n    \n    “Yeah, I’ll really help you.”\n    \n    \n    “Oh my god, thank you, ${name}, thank you.”\n    \n    \n    Your arms are suddenly full of teenager, who hugs you like a lifeline found. You\n    carefully place your arms around her to return the gesture. “For you to resort to\n    transforming randos, something or someone must have majorly failed you,” you say.\n    “I’m sorry the world isn’t kinder.”\n    \n    \n    Alice says nothing, which is probably the most worrying response of all.\n    \n    \n    Your stomach roils. Alice must sense it because she lets go, so you may curl up\n    to put your head between your knees. Ugh.\n    \n    \n    “Are you getting the nausea? I hate the nausea.” You feel feather light pressure\n    of hands on your back. “Sometimes happens when you transform, especially in the\n    early days.”\n    \n    \n    “How long have you…been like this?” You breathe through your nose as your stomach\n    drops like it’s on a personal rollercoaster.\n    \n    \n    “For awhile. After my parents died, I was sent into foster care. My foster isn’t\n    so choosy about her locks and I like walking off a nightmare.”\n    \n    \n    Alice’s hands move up and down your back in soothing slowness, and it’s downright\n    wonderful. You don’t want to comment on the utter stupidity of said foster\n    parent, but the counseling training sessions in you do. “She didn’t notice you\n    sneaking out?”\n    \n    \n    “At least she didn’t say anything. I was fine right up until I got bit. I had a\n    knife. And a flashlight.”\n    \n    \n    You know little about the foster care system, besides what you’ve seen on TV and\n    in stories, but you first impression of Alice’s foster parent is abysmal. You’re\n    sure Alice doesn’t need to hear that though, so you settle for: “You’ve had an\n    interesting life, haven’t you?”\n    \n    \n    You can hear Alice shrug. She continues to pet your back. “I’ve had one, yeah.”\n    \n    \n    It would be easier to be mad at this girl. Easy to rage. But: Alice’s deep brown\n    shoulders look more like the delicate wing-bones of some soaring bird. You have\n    known her less than seventy-two hours and she’s cried for help twice. A wreck. A\n    wreck of a werewolf with the bones of a bird. You sigh. “Okay. Let’s go. How do I\n    transform back?”\n    \n    \n    “It’s better if you stay human for awhile. Establish it as your first form.”\n    \n    \n    You breathe through your nose again. “Okay. Then we’re going to need clothes.”\n    *set Responsibility %+5\n    *set Empathy %+3\n    *goto clothes\n\n\n*label clothes\n\n*page_break\n\nYou and Alice hunt for someone who’s industrious and already finished their morning washing. Within minutes, a clothesline of overlarge dresses provides two garments like colored potato sacks for you both. You may or may not make note of the address with the intent to return them.\n\n\nIt’s a long trudge back to Rosario. The concrete is freezing, broken, shifted, and gum-splattered in places. Once you hit Central, crowds make it known that they are used to the shod. Your toe is stepped on six times, and whatever expression is on your face makes people apologize. You were fine with crowds before this, but now nerves tickle the back of your neck, and the smell of so many different types of shampoo makes your head spin. There’s just [i]so many[/i]. Were there before? A distinct longing for home and bed fills you.\n\n\nYou spot an electric sign with the date. It’s…Monday? You’ve been gone five days. That was your whole desperately fought for time off residency (and then some), and you spent it running around the countryside. Great. At least you’ve only missed your Monday shifts, should you choose to return to your training.\n\n\nYou reach your former street and have to stop yourself from running. You glance at Alice and note her gaze darting around madly, noting everything. She’s probably nervous. She starts worrying her lips too, and it hits you—oh, the pack. The mysterious pack she keeps talking about is probably here too.\n\n\nBut so is Rosario.\n\n\nYou alight on your destination’s doorstep. After a minute of buzzing, Rosario opens the door.\n\n\nHow do you react?\n\n\n*choice\n  #Go the classic hug and snark.\n    “${name}!” they launch themself in your arms. They’ve been crying. The flash of\n    puffy, red eyes is enough for you to know.\n    \n    \n    “I thought I would never see you again,” they say. “Oh my god ${name}.”\n    \n    \n    “So I take it you missed me,” you shush them. Soothing.\n    \n    \n    You and Rosario hug for long breaths on the doorstep. They smell like weed, but\n    underneath you recognize their scent from years of friendship back, that\n    masculine sagebrush musk that seems to exude natural from their pores. Their\n    black spikes of hair tickle.\n    \n    \n    Rosario lets you go and wipes their eyes. “How did—how did you get back?”\n    \n    \n    “It’s a long story. You’re going to be glad you’re not vegan anymore.”\n    \n    \n    Rosario releases a teary laugh. “That was only for a year.”\n    \n    \n    “A [i]year[/i], dude.”\n    \n    \n    “I—whoa, why do you have a kid?”\n    \n    \n    Alice hides behind you. Her nerves are obvious by how she’s gripping the middle\n    of her dress in a bunch. “This is Alice,” you say. “She’s part of the long story.\n    Alice, meet Rosario. They use they and them pronouns.”\n    \n    \n    “Hello, Rosario,” Alice says.\n    \n    \n    You and Rosario’s eyes meet to ask a silent question: is she homophobic?\n    Minutely, you shake your head. Alice hadn’t so much as blinked when you \n    brought up your own pronouns during the walk here. Rosario understands and nods.\n    \n    \n    Besides, what Rosario hides is the ordinary brand of human experience. Not\n    anywhere near lycanthropy. Rosario is a nonbinary pansexual person with a\n    kaleidoscopic sense of expression, and they like their skirts when they’re not in\n    their pajamas and dressing gown. The first time you saw them all done up with\n    feminine codifiers in college, you didn’t recognize them, and wondered who the\n    prospective student in your Science Writing Through the Ages class was.\n    *set Snark %+8\n    *set Empathy %+3\n    *goto apartment\n\n  #Embrace them.\n    “${name}!” they launch themself in your arms. They’ve been crying. The flash of\n    puffy, red eyes are enough for you to know. Last you checked, you do not, despite\n    what’s happened to you, consider yourself a spiritual person. You like to remain\n    with both feet on the ground. But it’s hard not to thank a higher power when\n    Rosario is so present and real in your arms.\n    \n    \n    “I thought I would never see you again,” they say. “Oh my god, ${name}.”\n    \n    \n    “I know, I know,” you shush them. Soothing.\n    \n    \n    You and Rosario hug for long breaths on the doorstep. They smell like weed, but\n    underneath you recognize their scent from years of friendship back, that\n    masculine sagebrush musk that seems to exude natural from their pores. Their\n    black spikes of hair tickle. Rosario tries to let you go, but a sense of\n    wrongness seizes your heart. You hold them yet tighter, and tears spring out of\n    your eyes unbidden.\n    \n    \n    “It’s really you,” Rosario says. They pet your hair and worm away enough to look\n    at your face and cup your cheek. “My dearest, loveliest friend.”\n    \n    \n    A teary laugh escapes you, and you both touch foreheads. Rosario hums and swipes\n    a warm thumb across your cold cheekbone. “I missed you.”\n    \n    \n    You kiss Rosario’s cheek before letting go. Both of you wipe your eyes.\n    \n    \n    Rosario shakes themself and asks, “How did you get back?”\n    \n    \n    “It’s a long story. You’re going to be glad you’re not vegan anymore.”\n    \n    \n    Rosario laughs. “That was only for a year.”\n    \n    \n    “A [i]year[/i], dude.”\n    \n    \n    “I—whoa, why do you have a kid?”\n    \n    \n    Alice hides behind you. Her nerves are obvious by how she’s gripping the middle\n    of her dress in a bunch. “This is Alice,” you say. “She’s part of the long story.\n    Alice, meet Rosario. They use they and them pronouns.”\n    \n    \n    “Hello Rosario,” Alice says.\n    \n    \n    You and Rosario’s eyes meet to ask a silent question: is she homophobic?\n    Minutely, you shake your head. Alice hadn’t so much as blinked when you brought\n    up your own pronouns during your walk here. Rosario understands and nods.\n    \n    \n    Besides, what Rosario hides is the ordinary brand of human experience. Not\n    anywhere near lycanthropy. Rosario is a nonbinary pansexual person with a\n    kaleidoscopic sense of expression, and they like their skirts when they’re not in\n    their pajamas and dressing gown. The first time you saw them all done up with\n    feminine codifiers in college, you didn’t recognize them, wondered who had let\n    the prospective student into your Science Writing Through the Ages class.\n    *set Empathy %+3\n    *set Uncanny %-6\n    *set Rosario +25\n    *goto apartment\n\n  #Brush past them and go straight inside with minimal pleasantries.\n    As Rosario stands there in complete shock, you say, “Hey.”\n    \n    \n    They splutter, and you brush past. A further exclamation of “Child??” and a soft\n    answer “Hi, I’m Alice,” follow you into the hallway.\n    \n    \n    The apartment is really the second story of a renovated townhouse you and Rosario\n    rent from an elderly homebody, so you must climb stairs. You begin, but, by the\n    fifth step, Rosario has recovered from their bewilderment, dashed over, and now\n    grips your hemline. “${name}? What the hell happened? You’ve been gone for days!\n    I had to call the police and convince your residency you were coming back. I\n    mean,” they fumble, but then find their determination in your eyes again, “I\n    hoped you’d be back.”\n    \n    \n    “Oh, Well, I guess that was kind of you,” you say, tugging the fabric out of\n    their fingers. “Thanks.”\n    \n    \n    A look sharpens Rosario’s face to flint angles. “That’s it? That’s all you want\n    to say to me?”\n    \n    \n    Your memories of Rosario don’t match the expression on their face. The Rosario\n    your brain supplies is easy-going charm in the shaky reality of 2am dorm rooms,\n    deep umber hair that poofed into curls, and sagebrush perfume. This one has puffy\n    red eyes from crying, hair shorn to sticks, and the smell of weed. You sigh. “I’m\n    not sure I want to be officially ‘back’ yet, Rosario. All I want right now is\n    food and sleep, in that order.”\n    \n    \n    Rosario lets go of you as if scalded. “Jesus Christ above, what [i]happened[/i]\n    to you?”\n    \n    \n    Their warm brown eyes peer at you, up and down, like they’re trying to find\n    something. For a moment there is no one else but you and them in the whole silent\n    universe. Your breath catches in your throat. Suspended.\n    \n    \n    The moment breaks as quickly as it was made. Rosario backs away and their hands\n    clutch uselessly at their own heart. “You’re not entirely ${name}, are you?”\n    \n    \n    You turn away and keep going up the stairs.\n    \n    \n    Alice murmurs to Rosario that she will explain.\n    *set Bloodthirst %+4\n    *set Uncanny %+6\n    *finish\n\n*label apartment\n\n*page_break\n\nYou all walk up to the apartment, which is actually the second story of a renovated townhouse you rent from an elderly homebody, and the carpet is heaven on your feet. Calluses seem to have grown on your soles in a matter of hours. How many miles have you walked? How many until this is over?\n\n\n“How are you?” you ask Rosario as they let you into the apartment. Despite everything, it is an unchanged two bedroom with lounge area and kitchen. Rosario shakes their head—bad then. “Did you throw yourself into writing?”\n\n\n“I read and bothered the police, mostly. I didn’t tell our parents, yours or mine,” they say. You don’t miss the hitch in their breath. “That would make it too real.”\n\n\nYou touch their shoulder. “We’re okay now, Rosario.”\n\n\nThey glance at you and then nod. “I told your residency that you were missing, but the police would find you any day. I didn’t want you to lose your spot if—if you did come back.”\n\n\nYou tell them the truth, “I wasn’t quite sure I’d make it back.”\n\n\nRosario smiles and says, “I’m so happy you did.”\n\n\nThey shake themself again, put a bright smile on, and flounce to the kitchen. “Now who would like some tea?”\n\n\n“But I don’t like tea,” you say.\n\n\nRosario points to Alice. “She’s upset. Upset people get tea.”\n\n\nYou’re not sure how Rosario managed to already pick up on that, but they’re not wrong. You give a big mock sigh and steer Alice to the leather couch, which immediately tries to suck you both into some alternate couch dimension. You squirm your way into sitting straight, and Alice perches on the edge, her hands clasped in her lap. You remember your first day of high school, the way you’d put your hands together like that, so to seem normal, seem obedient.\n\n\n*choice\n  #Comfort Alice.\n    “Hey, it’s okay,” you say to her. “They’re good.”\n    \n    \n    Alice looks at you with a grateful expression. You take her hand, give it a\n    squeeze, and let go. Much more relaxed, she sinks into the couch.\n    *set Empathy %+3\n    *set Responsibility %+5\n    *goto tell_me\n\n  #Leave her be.\n    Still nervous, Alice twiddles her thumbs.\n    *set Responsibility %+5\n    *goto tell_me\n\n*label tell_me\n\n*page_break\n\nHer eyes flick to Rosario, who’s practically dancing in the kitchen and currently opening a top cupboard with their foot.\n\n\n“So they’re a writer and you’re…?” Alice asks.\n\n\n“I’m a doctor-in-training. I’m doing my first year residency at the Central hospital. Or I was.”\n\n\n“Your bosses are going to understand, ${name}!” Rosario calls. “I can feel it!”\n\n\n“Yeah, tell me when you start your career as a professional psychic.” You roll your eyes. “I should call them and say I’m alive.”\n\n\n“After tea!” Rosario insists. They dance your direction with a heavily burdened tea tray, including lemon scones and those little jammy dodgers and jelly babies they love. Dainty, they place the tray on the varnished wood coffee table and sit across from you two in a well-stuffed armchair.\n\n\nThere’s a beat of silence. After politely taking tea, Alice glances around the apartment. You catch her and smile a little. Rosario spreads their arms to show her, like a TV host on [i]Extreme Makeover: Home Edition[/i]. “You like? ${name} probably can’t tell because ${name} is technology illiterate outside of medical equipment circles, but the Blu-Ray player is new.”\n\n\n“It is?” you say. You really can’t tell the difference between one DVD-eating black box and another. As long as it works.\n\n\n“Yes. While I didn’t tell them, my parents could sense I was distressed, so, as typical, they threw money at the problem.”\n\n\nYou turn to Alice and explain. “Rosario’s parents are loaded.”\n\n\n“Well, more accurately, they’re going through marriage and family counseling and feeling incredibly guilty about my whole shithole of a transition and are trying to convince me to not pretend they totally don’t exist,” Rosario explains. “So they pay for stuff.”\n\n\n“Rosario’s here on a fellowship with its own pay,” you say, quickly. For some reason, it’s important that Alice thinks the best of Rosario.\n\n\nAlice tilts her head. “Somebody’s paying you to live in Central and write?”\n\n\n“Yep!” Rosario says, happily. “Best gig ever. And I may be able to teach after this.”\n\n\n“And people say writers don’t care about job security,” you sigh, fond and proud. It feels so good to be here, even dressed in a printed sack of potatoes. Happiness is warm and bright in your chest.\n\n\n“But enough about me,” Rosario says, picking up the tea pot. “Tell me everything that has ever happened to you.”\n*finish", "screenshots": "\n*comment screenshot 1: rabbit or sheep?\n\n*set name \"Lucy\"\n*set surname \"Westenra\"\n*set Bloodthirst 5\n*set Defense 6\n*set Responsibility 5\n*set Uncanny 6\n*set Empathy 0\n*set Snark 0\n*set Rosario 0\n*set Chika 0\n*set Ishara 0\n\nTwilight begins your time, you know this by instinct, and you wake up hungry. The moon peaks heavy and beautiful through the treetops, on the opposite end of the sky of golden light. Breathe deep to taste the light breeze; twitch your ears back and forth to listen. You smell the matted, downy undercurrent of a rabbit warren in one direction. In the other, you smell the grease of sheep. Which do you chase?\n\n\n*fake_choice\n  #The rabbit warren.\n    *page_break\n\n  #The sheep.\n    *page_break\n\n  #Go back to sleep.\n    *page_break\n\n\n*comment screenshot 2: Alice’s transformation\n\n*set name \"Maleva\"\n*set surname \"Ouspenskaya\"\n*set Bloodthirst 0\n*set Defense 0\n*set Responsibility 10\n*set Uncanny 5\n*set Empathy 10\n*set Snark 5\n*set Rosario 0\n*set Chika 0\n*set Ishara 0\n\n\n“Watch this,” Alice says.\n\n\nFur erupts from Alice’s skin, breaks out like happy fungus on new decay. Alice tilts her head back, and hunks of teeth elongate out of her mouth; her nails shrivel and blacken into claws. Her eyes roll like cue balls into the back of her skull and roll forward yellow.\n\n\nAs soon as it’s begun, it’s over, and your packmate returns.\n\n\nAnd starts walking west. Out of the forest. Back toward the city. She expects you to follow.\n\n\n*fake_choice\n  #You want me to follow you after THAT?\n    *page_break\n\n  #Follow her immediately.\n    *page_break\n\n  #No, I want to stay! Fight her.\n    *page_break\n\n\n*comment screenshot 3: Rosario grinds beans\n\n*set name \"Alex\"\n*set surname \"Price\"\n*set Bloodthirst 15\n*set Defense 15\n*set Responsibility 40\n*set Uncanny 20\n*set Empathy 35\n*set Snark 20\n*set Rosario 25\n*set Chika 25\n*set Ishara 0\n\n\nYou attempt to scowl a French press into submission. You stand there and wait for your utterly blank mind to remember how to wrangle coffee out of the slim glass contraption. It refuses. You swore you knew how to do it before, but between the lycanthropy and the desolate wasteland of the pre-coffee brain, no bright ideas are coming.\n\n\n“Do you want help with that? Rosario, your best friend, roommate, and potential savior, says. “All the supernatural strength in the world isn’t going to grind those beans.”\n\n\n*fake_choice\n  #No.\n    *page_break\n\n  #Yes.\n    *page_break\n\n\n*comment screenshot 4 Cassandra battle\n\n*set name \"Larry\"\n*set surname \"Talbot\"\n*set mc_themher \"them\"\n*set Bloodthirst 35\n*set Defense 40\n*set Responsibility 25\n*set Uncanny 25\n*set Empathy 20\n*set Snark 32\n*set Rosario 50\n*set Chika 25\n*set Ishara 0\n\n\nYou must not appear weak against this vampire woman. You say, “And if I refuse to join the Masquerade?”\n\n\nCassandra’s smile forms predatory. The deep blue angle of her eyes spells redrum. “Then I shall give you a moment to make your peace.”\n\n\nAlice’s panic explodes into pleas. “No! Don’t harm ${mc_themher}.”\n\n\n“Come stand by me, Alice,” Cassandra orders. “Let’s hope for your friend’s sake you haven’t been telling them the Rogues’ nonsense about breaking Masquerade. That group is full of dead fools walking.”\n\n\n*fake_choice\n  #Swear your oath…for now.\n    *page_break\n\n  #Fight your way out!\n    *page_break\n\n\n*comment screenshot 5: Chika date\n\n*set name \"Heather\"\n*set surname \"Leelan\"\n*set Bloodthirst 20\n*set Defense 35\n*set Responsibility 45\n*set Uncanny 30\n*set Empathy 50\n*set Snark 25\n*set Rosario 0\n*set Chika 50\n*set Ishara 0\n\n\nWhile the winter snow has melted, the spring night is still cold outside the restaurant. “Can I escort you home?” Chika asks. She looks…hallowed in the phosphorescence streetlight amber. The vision makes your mouth dry, so you consent with a nod. She takes your arm, and you walk home together linked close, drunk on the smell of darkness and violets.\n\n\nA complicated emotion fills your abused heart as you arrive at your door. Do you invite Chika up for… “coffee?”\n\n\n*fake_choice\n  #Yes.\n    *finish\n\n  #No.\n    *finish\n\n  #Ask her up for literal coffee. You’re asexual.\n    *finish\n", "second_full_moon": "\n[b]Chapter 5: Second Full Moon[/b]\n\n\nFate turns her wheel, and the full moon approaches. Alice arrives on your doorstep with a question.\n\n\n“You can feel it too, can’t you? The lunar pull,” she says. “Would you go back to the forest with me?”\n\n\nAlice’s practically standing on her toes in hopefulness as she asks this. “You don’t have to, but it’s safer in groups. We could take the train out and be back before my school starts the next morning.”\n\n\nWill you spend the full moon with Alice?\n\n\n*choice\n  #Spend it with Alice.\n    You answer that of course you’ll go with her. You’re pack, right? Alice’s face\n    shines with eagerness.\n    \n    \n    The train ride to deep forest is nerve-wracking. It’s too late for the real rush\n    hour folks, but there are stragglers: somber people in suits and one group of\n    tourists blinking rapidly in over-caffeination. Alice twines your arms together,\n    the arms not holding the school backpack (Alice’s) and work satchel (yours). A\n    restlessness haunts and prods you, the need to run coursing through the blood.\n    Your left leg is about bouncing out of its socket.\n    \n    \n    “Keep breathing,” Alice says when the intercom finally announces your stop.\n    “We’re almost there.”\n    \n    \n    You both disembark, board a bus, ride as far as it will take you, and then walk\n    out of civilization to the wilderness it besieges. By the time the last city\n    sounds fade, you feel ready to claw off your human skin.\n    \n    \n    “Okay, this looks good, we can bury our things here for the night. Let’s\n    transform and start digging. The transformation will be easier—smoother—this\n    time. We aren’t under duress.”\n    \n    \n    You can only nod. Alice’s eyes are warm and happy as she turns to you. Like she\n    knows. She knows this will be good.\n    \n    \n    With due modesty, you both take off your clothes. You sneak a peek at Alice’s\n    transformation. Compared to the memory of yours, Alice’s transition between the\n    two forms is smooth and fluid, like the wolf’s skin is a gentle blanket covering\n    her. It’s beautiful, in its own terrifying way.\n    \n    \n    You look away and stuff your clothes in your bag before thinking about wolves.\n    Think about fur, and claws, and sharp ears and all sorts of useful things like\n    that. Instead of being a slow, clumsy human, you want to be powerful and\n    dangerous and horrifying.\n    \n    \n    And like that, hair sprouts like weeds gone to seed, and nails sharpen enough to\n    break skin with a mere glance. The world clusters around smells: yes, there is\n    the sticky pine sap and cool spring earth, but also Alice and wolves and old\n    rabbit blood. Rosario’s scent lingers on your clothes where they hugged you\n    goodbye, and you decide then and there you’re never going to use those Tide\n    detergent pods ever again because they make your clothes smell [i]awful[/i].\n    \n    \n    Crickets and birds settle to sleep. Alice digs a hole, carefully places your\n    things inside, and gives a happy bark. Feeling adjusted, you sniff each other all\n    over, tails wagging. Packmate. Friend. Pup. Alice. Home.\n    \n    \n    Alice barks again and bounces back. [i]Chase me![/i]\n    \n    \n    Feeling better than you have all month, you oblige. Maybe this whole wolf thing\n    won’t be so bad.\n    *set Responsibility %+5\n    *set Empathy %+3\n    *set Bloodthirst %-4\n    *goto sheep\n\n  #Go solo.\n    You consider it. You really do. As a more experienced werewolf, Alice would be\n    provide tips and perspective. But do you want Alice to see you like that? And\n    she’s young in human years—maybe she will, in fact, slow you down.\n    \n    \n    “Thanks for the offer, but I’m fine,” you say.\n    \n    \n    If hope is a butterfly, you have broken its wings. Alice’s expression shuts\n    close. “Well, good thing I asked instead of assuming,” she says. “I suppose I’ll\n    see you around.”\n    \n    \n    She spins around and walks off. No skin off your nose.\n    \n    \n    The next evening, there is a definite pull behind your navel, and the wolf longs\n    to leak out of your skin more than usual. You pack an overnight bag, board the\n    first train out, and when it reaches the furthest station, you jog off. And keep\n    jogging. You jog until civilization loses to forest, and you shiver with relief.\n    \n    \n    Take off your clothes not a moment too soon. Moonrise and your fur bursts out\n    of your skin like individual piano wires, your face-bones fracture like kindling;\n    your canine teeth rejoice in true, elongated purpose. Human virtue is nowhere in\n    the yellow of your eyes, nor the vengeance promised in your claws. Your ears\n    flick back and forth to the flap of moth wings, to owl calls, to prey’s\n    heartbeat. A song lovingly familiar.\n    \n    \n    Clothes are left to wither in mud as you howl.\n    *set Bloodthirst %+8\n    *set Empathy %-3\n    *goto sheep\n\n\n*label sheep\n\n\n*page_break\n\n\nAs the night goes on, you taste the stream and listen to rushing of the wind. They whisper back that sheep are nearby. You remember the sheep from last moon, and hunger roils in your belly just the same. What do you do?\n\n\n*choice\n  #Mmmm, sheep.\n    They protest and scream, but you attack with the sure expectation that your\n    demands will be met. While breaking into their pens is easy, the escape proves\n    harder. What you thought was a slight noise from the houses is actually humans\n    waking. The boom of a gun; the whistle of a bullet; the ache of your back legs\n    after you spring to safety. The blood on your muzzle drips like guilt, and the\n    cries of horror follow you into the night. You hunger no longer.\n    *set Bloodthirst %+4\n    *set Defense %+6\n    *finish\n\n  #Leave the sheep alone.\n    You aren’t that hungry and instead focus on running. You run through the midnight\n    darkly, howling your joy to the moon, whipping through underbrush, play-fighting\n    as interest and inclination come. The wind tangles in your hair, the moon sings a\n    lullabies in return; the trees creak approval. This is your time to be free, and\n    you take it gleefully.\n    *set Responsibility %+5\n    *set Defense %+6\n    *finish", "startup": "*title Moonrise\n*author Natalie Cannon\n*scene_list\n  startup\n  meet_alice\n  return_to_rosario\n  hospital_day\n  $ alice_welcome\n  $ second_full_moon\n  $ meet_cassandra\n  $ dating\n  $ the_choice\n  $ masquerade_forever\n  $ last_masquerade\n  $ death\n  $ ending\n\n\n*comment for when character unnamed\n*create no_name \"\"\n\n*comment stat creation\n*create Empathy 0\n*create Bloodthirst 0\n*create Responsibility 0\n*create Uncanny 0\n*create Defense 0\n*create Snark 0\n*create trans 0\n\n*comment relationship stat creation\n*create Rosario 0\n*create Chika 0\n*create Ishara 0\n\n*comment MC gender creation\n*create mc_nonbinaryfemale \"\"\n*create mc_personwoman \"\"\n*create mc_personswomen \"\"\n*create mc_childgirl \"\"\n*create mc_parentmother \"\"\n*create mc_siblingsister \"\"\n*create mc_partnerwife \"\"\n*create mc_theyshe \"\"\n*create mc_theirshers \"\"\n*create mc_themher \"\"\n*create mc_honorablepersonmadam \"\"\n*create mc_mxms \"\"\n*create mc_theirher \"\"\n*create mc_persongirl \"\"\n\n\n*comment MC first and last name\n*create name \"name\"\n*create surname \"surname\"\n\n*if not(choice_is_web or choice_is_steam) and not(choice_randomtest)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  You've been bitten into a brand new supernatural underground. Congratulations! It's terrifying and heartwarming all at once. In a game made by a queer woman and for queer women and femme nonbinary folk, this supernatural celebration of queer femininity takes you into the darkness and lets you own it. Use your compassion and sense of responsibility to make connections and fall in love. Or use your newfound fangs and claws to rip, shred, and tear through your problems. Is this the start of a satisfying, shape-shifting life full of romance, or the blood-soaked birth of a new deity of the forest? You decide!\n\n  [i]Moonrise[/i] is a 49,000-word urban fantasy interactive novel by Natalie Cannon, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n  ∙ Play as a trans woman, cis woman, or nonbinary person; lesbian, bisexual, pansexual, or asexual.[n/]\n  ∙ Date your nonbinary best friend, the ruthless Rogue leader, or the lycanthropic goddess amongst werewolves.[n/]\n  ∙ Build up your Empathy, Bloodthirst, Snark, Responsibility, Uncanny Valley, and Defense to survive lethal encounters and protect those you hold dear.[n/]\n  ∙ Pledge allegiance to the tradition of the Masquerade or the desperate, volatile Rogues.[n/]\n  ∙ Expose the supernatural underground to the blistering light or keep their secrets in the deep dark.[n/]\n  ∙ Embrace the feral monster within or hold fast to your humanity.[n/]\n\n  *if choice_prerelease and not(choice_is_ios_app)\n    [i]You can play the first two chapters of the game for free today. The rest
