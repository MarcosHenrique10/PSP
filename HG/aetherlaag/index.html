ting, if you'd be willing to trade some of your creations. I'd knock 200 Essence off the price of a stone.\"\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t*if (Power\u003c101) #\"I still wouldn't have enough Essence.\"\n\t\t\t\t\t\t\t\"Unfortunate,\" he sighs, \"but I will still be here next time you visit!\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou leave the marketplace and start heading back to the Court Center.\n\t\t\t\t\t\t\t*return\n\t\t\t\t\t\t*if (Power>100) #\"That seems like a fair trade.\" (-1 Race Strength)\n\t\t\t\t\t\t\t\"Very good, my friend! Here you are, use it wisely!\" The merchant hands you a stone, you can feel the power the resides within, coursing through the rock's rugged outer surface.\n\t\t\t\t\t\t\t*set gotdiscount true\n\t\t\t\t\t\t\t*set essencestones +1\n\t\t\t\t\t\t\t*set race1strength -1\n\t\t\t\t\t\t\t*set power -100\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t(Power -100)\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou leave the marketplace and start heading back to the Court Center.\n\t\t\t\t\t\t\t*return\n\t\t\t\t\t\t*if (Power>300) #\"I'll just take one for 300 Essence.\"\n\t\t\t\t\t\t\t\"Very good, my friend! Here you are, use it wisely!\" The merchant hands you a stone, you can feel the power residing within.\n\t\t\t\t\t\t\t*set essencestones +1\n\t\t\t\t\t\t\t*set power -300\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t(Power -300)\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou leave the marketplace and start heading back to the Court Center.\n\t\t\t\t\t\t\t*return\n\t\t\t\t\t\t#\"Apologies, but I'm not interested.\"\n\t\t\t\t\t\t\t\"Sorry, my friend, but items as powerful as these are not cheap. I am certain they would be of use to you.\"\n\t\t\t\t\t\n\t\t\t\t\t\t\tYou leave the marketplace and start heading back to the Court Center.\n\t\t\t\t\t\t\t*return\n\t\t\t\t*selectable_if (Power>300) #\"I'll take one for 300 Essence.\"\n\t\t\t\t\t\"Very good, my friend! Here you are, use it wisely!\" The merchant hands you a stone, you can feel the power residing within.\n\t\t\t\t\t*set essencestones +1\n\t\t\t\t\t*set power -300\n\t\t\t\t\t\n\t\t\t\t\t(Power -300)\n\t\t\t\t\t\n\t\t\t\t\tYou leave the marketplace and start heading back to the Court Center.\n\t\t\t\t\t*return\n\t\t\t\t#\"That is outrageous! Good day, sir.\"\n\t\t\t\t\t\"Sorry, my friend, but items as powerful as these are not cheap. I am certain they would be of use to you.\"\n\t\t\t\t\t\n\t\t\t\t\tYou leave the marketplace and start heading back to the Court Center.\n\t\t\t\t\t*return\n\t\t#\"I'm not interested.\"\n\t\t\t\"Unfortunate,\" he sighs, \"I am certain they would be of use to you. I will still be here next time you visit!\"\n\t\t\t\n\t\t\tYou leave the marketplace and start heading back to the Court Center.\n\t\t\t*return\n*elseif hasbeen = true\n\t*if gotdiscount = false\n\t\t\"My offer still stands.\"\n\t*fake_choice\n\t\t*if (gotdiscount=false) #\"I'll share with you some of my creations.\" (-1 Race Strength)\n\t\t\t*if (Power>100)\n\t\t\t\t\"Very good, my friend! Here you are, use it wisely!\" The merchant hands you a stone, you can feel the power residing within.\n\t\t\t\t*set gotdiscount true\n\t\t\t\t*set essencestones +1\n\t\t\t\t*set race1strength -1\n\t\t\t\t*set power -100\n\t\t\t\t\n\t\t\t\t(Power -100)\n\t\t\t\t\t\t\t\t\n\t\t\t\tYou leave the marketplace and start heading back to the Court Center.\n\t\t\t\t*return\n\t\t\t*else\n\t\t\t\t\"My friend, you don't even have the strength to take advantage of the good deal I'm giving you,\" the merchant barks. \"Please, come back with more essence.\"\n\t\t\t\t\n\t\t\t\tWith insufficient essence to buy the stone, you leave the marketplace and start heading back to the Court Center.\n\t\t\t\t*return\n\t\t*selectable_if (Power>300) #\"I'll take a stone for 300 Essence.\"\n\t\t\t\"Very good, my friend! Here you are, use it wisely!\" The merchant hands you a stone, you can feel the power residing within.\n\t\t\t*set essencestones +1\n\t\t\t*set power -300\n\t\t\t\t\t\t\t\n\t\t\t(Power -300)\n\t\t\t\n\t\t\t\"Can I interest you in another?\" the merchant inquires.\n\t\t\t*fake_choice\n\t\t\t\t#\"No thank you, farewell.\"\n\t\t\t\t\t\"Good luck to you, my friend. May the stone prove useful.\"\n\t\t\t\t\t\n\t\t\t\t\tYou leave the marketplace and start heading back to the Court Center.\n\t\t\t\t\t*return\n\t\t\t\t*selectable_if (Power>300) #\"Sure, I'll take another one.\"\n\t\t\t\t\t\"Excellent, my friend! Here you are.\" The merchant hands you another stone, \"you are truly a wise god to be so prepared.\"\n\t\t\t\t\t*set essencestones +1\n\t\t\t\t\t*set power -300\n\t\t\t\t\t\t\t\n\t\t\t\t\t(Power -300)\n\t\t\t\n\t\t\t\t\tYou keep the stones on your person and leave the marketplace, heading back to the Court Center.\n\t\t\t\t\t*return\n\t\t#\"I'm afraid I still can't afford one.\"\n\t\t\t\"Unfortunate,\" he sighs, \"I am certain they would be of use to you. I will still be here next time you visit!\"\n\t\t\t\n\t\t\tYou leave the marketplace and start heading back to the Court Center.\n\t\t\t*return\n*else\n\t*bug", "quest1": "*disable_reuse\n*temp hegood true\nYou fly through the void so quickly you are unable to make out the space around you until you abruptly stop. Disoriented, you look around and find yourself out in the Aether. Behind you lies a conscious god, but just barely.\n\n\"${name}, I have heard your name,\" the weakened god murmurs. \"I am, Oberon, and I need your aid. I was out collecting essence when I was ambushed…\" the god barks in enraged tone, \"By a traitorous daemon. I destroyed the fool, but not without taking a debilitating blow. Please, if you could escort me back to the Court and I will be in your debt.\"\n*temp ouch\n*temp ouch2\n*temp ouch3\n*rand ouch 22 28\n*rand ouch2 350 500\n*rand ouch3 200 300\n*label choice1\n*choice\n\t#\"What do you need me to do?\"\n\t\t\"Please, just defend me while we make our way back. I will offer what support I can, but it may not be much.\"\n\t\t*goto ayokay\n\t#\"What's in it for me?\"\n\t\tThe god narrows its eyes at you. \"I have lost a lot of strength, so there is not much I can offer in the means of raw power. But I can offer influence within the court. If you keep my weakened state from the other gods of course.\"\n\t\t*goto choice1\n\t#\"It was unwise for you to bring me here.\"\n\t\tThe god looks taken back, \"why is that? Would you have suggested I instead just lay here and wait to be taken by wisps?\"\n\t\t*fake_choice\n\t\t\t#\"I apologize, I had merely been preoccupied. I will take you back to the court.\"\n\t\t\t\t*goto ayokay\n\t\t\t#\"The wrath of wisps is nothing compared to what I would do for your power.\" (Attack Oberon)\n\t\t\t\t${helper} appears before you manage the utterance, \"Now, Master, I know Oberon looks very appetising, but consider the repercussions before you attack a god of the court. Many will not take kindly to the hostility and Oberon's power is not even at full strength.\"\n\t\t\t\t*fake_choice\n\t\t\t\t\t#\"Be gone!\" (Attack)\n\t\t\t\t\t\t*set Evil +20\n\t\t\t\t\t\t*goto attack\n\t\t\t\t\t#\"You're right, I have changed my mind.\"\n\t\t\t\t\t\t*goto ayokay\n*label attack\n\nWithout flinching, Oberon flings a ghostly arm in the air, launching a massive ball of energy toward you. You barely evade the orb and it manages to just graze you, burning away a portion of your outer essence.\n\n*set Power -(ouch)\n\n(Power -${ouch})\n\nYou feel your power building as your rage amplifies your strength. Oberon quickly tries to get up, spinning around to rise upright.\n*fake_choice\n\t*selectable_if (Power > 500) #Unleash an onslaught of energy bombs upon the weakened god. (-Momentous Power)\n\t\tYou channel power into your appendages and form them into massive spheres of raw energy. One by one you hurl the armaments at the fallen god and they explode, tearing the creature apart bit by bit. Oberon cries in agony as the explosions rip away the being's shape and energy discharges into the void. You show no relent and continue to reign death upon the fallen being until its cries are no more and nothing but wispy essence remains where the being once rested.\n\t\t*set Power -(ouch2)\n\n\t\t(Power -${ouch2})\n\t\t\n\t\tAs your rage dies you realize the extent of your overkill. \n\t*selectable_if (Power > 300) #Disintegrate the being with astral lightning. (-Massive Power)\n\t\tBefore Oberon gets up you strike the being with a channel of lightning. The raw energy streams from your appendages and tears into Oberon, shredding pieces of his crippled ethereal form. While spinning from the impact, Oberon redirects your attack and the current shoots off into the distance. Oberon charges forward and attempts to parry your attacks, but is too slow from the weakened state and succumbs to your torrent of strikes. The being howls in pain as your energy tears away at his shell. You show no relent and continue to reign death upon the fallen being until its cries are no more and nothing but wispy essence remains.\n\t\t*set Power -(ouch3)\n\n\t\t(Power -${ouch3})\n\t\t\t\n\t#Charge and tear the weakened being apart.\n\t\t*rand ouch 30 40\n\t\t*page_break\n\t\tJust as Oberon gains balance, you bash into him and pierce his outer husk with fists of raw energy. Oberon cries in pain, but quickly retaliates, forcing you back with a burst of lightning. Essence from both you and Oberon flies into the void.\n\t\t*set Power -(ouch)\n\n\t\t(Power -${ouch})\n\t\t\n\t\t*page_break\n\t\t*if Power \u003c 10\n\t\t\t*gosub_scene death\n\t\tWith your remaining strength, you drive a beam of energy through Oberon's core and a burst of anguish erupts. You split the beam in two and tear his body apart. Where the god once stood, nothing but wispy essence remains.\n\t\t*rand ouch 25 49\n\t\t*set Power -(ouch)\n\n\t\t(Power -${ouch})\n*rand ouch 425 600\n*page_break\t\t\nYou take a moment to rest, but it is not long before you start sensing the encroachment of hungry daemons. Intently you consume the loose essence around you from the fallen god. The harvested energy heals and strengthens your celestial fibers. You can feel the energy hum through you.\n*set god1rel 0\n*set hegood false\n*set Power +(ouch)\n\n(Power +${ouch})\n*label ayokay\n\n*if (hegood)\n\tOberon rises and floats upright. \"The Court is that way, I will follow suit.\"\n\nWithout warning two beasts launch themselves at you from a distance, appearing from the blackness of the void.\n*fake_choice\n\t*selectable_if (Power > 15) #Dual Energy Pulse (-Minor Power)\n\t\tYou raise your arms and launch a large wave of arcane energy towards the two creatures. Completely exposed, the beings take the full force of the attack and are completely disintegrated. From their remains you absorb what little energy they possessed.\n\t\t*set Power +8\n\t\t\n\t\t(Power +8)\n\t\t\n\t#Evade\n\t\tYou dash to the side and allow the creatures to fly past. Swinging a leash of energy around, you ensnare the weak beings and vaporize them into nothing, but what little energy they possessed is lost to oblivion.\n\nWithout further hesitation you glide through the Aether back toward the Court.\n*rand ouch2 90 100\n*page_break\n*if (hegood)\n\tOberon struggles to keep up, constantly losing balance and flying into rubble. You glance back, contemplating whether or not to help, when you witness a flood of daemons approaching from the ethereal fog.\n\t\n\t${helper} appears before you in a panic, \"Master, it may be wise to leave Oberon to his demise! I am certain the other Court Gods would understand. It is the nature of this realm.\"\n\t*fake_choice\n\t\t#Rush back and push Oberon ahead.\n\t\t\tYou sprint and wrap yourself around Oberon's weakened body, which barely holds itself together, and pull Oberon alongside you.\n\t\t\t\n\t\t\t\"They can sense my waning essence!\" Oberon shouts. The being hurls balls of energy into the distance in an effort to slow down the horde's advance, but to little avail.\n\t\t\t*fake_choice\n\t\t\t\t*selectable_if (Power > 100) #Unleash an onslaught of energy bombs upon the encroaching horde. (-Great Power)\n\t\t\t\t\tYou channel power into your appendages and form them into massive spheres of raw energy. One by one you hurl the armaments at the mass of beings and they explode, tearing the creatures apart. Their shreds of essence flood the void. You show no relent and continue to rain death upon the beasts until not a single sign of life remains.\n\t\t\t\t\t*set Power -(ouch2)\n\n\t\t\t\t\t(Power -${ouch2})\n\t\t\t\t\t\n\t\t\t\t\t\"That was incredible!\" Oberon exlaims, \"remind me never to get on your bad side. There's an ocean of raw energy from their corpses waiting to be absorbed. Go, before more sense it!\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"We will share it. You are in greater need of it.\"\n\t\t\t\t\t\t\t*set god1rel %+80\n\t\t\t\t\t\t\t*set Evil -5\n\t\t\t\t\t\t\t\"I… I don't understand.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou push Oberon to the flood of celestial energy and a pool forms around him as his bod absorbs it to restore equilibrium. You fly around and collect the remaining, feeling it completely regenerate your lost strength.\n\t\t\t\t\t\t\t*set power +112\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t(Power +112)\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"I am at a loss, ${name}. No god has ever shown such kindness,\" Oberon remarks.\n\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t#\"That is something that should change among the Court.\"\n\t\t\t\t\t\t\t\t#\"Don't worry, Oberon. Perhaps one day you can repay this favor.\"\n\t\t\t\t\t\t\tOberon looks away and speak humbly, \"Yes. Come, let us return to the Court together.\"\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\tUpon returning, Oberon speaks with you once more, \"thank you again for your aid, ${name}. I am in your debt. May our paths cross again soon.\"\n\t\t\t\t\t\t\t*goto ending\n\t\t\t\t\t\t#Consume it all.\n\t\t\t\t\t\t\t*set god1rel %+40\n\t\t\t\t\t\t\tYou glide to the center of the mass and meditate to harness the scattered remains. The energy pools around you and you feel it completely regenerating your lost strength and more.\n\t\t\t\t\t\t\t*set Power +162\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t(Power +162)\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Come, let's return to the Court before more find us,\" you say to Oberon, ushering him with you.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\tUpon returning, Oberon speaks with you once more, \"thank you again for your aid, ${name}. May our paths cross again soon.\"\n\t\t\t\t\t\t\t*goto ending\n\t\t\t\t#Attempt to outrun the horde with Oberon.\n\t\t\t\t\t*set god1rel %+70\n\t\t\t\t\tMoving as quickly as possible, the savage creatures continue to gain on you. Suddenly, you feel yourself being launched forward without effort. You turn and see Oberon casting a beam of light the seems to be propeling you both at the speed of the light itself.\n\t\t\t\t\t\n\t\t\t\t\tIn seconds, you reach the gates of the Court. After expelling such energy, Oberon has but one breath remaining when the guards reach you. Without hesitation, one of the guards sacrifices the energy in its arm to restore Oberon.\n\t\t\t\t\t\n\t\t\t\t\t*page_break\n\t\t\t\t\tWithin the gates, Oberon speaks with you once more, \"thank you for your aid, ${name}. I am in your debt. May our paths cross again soon.\"\n\t\t\t\t\t*goto ending\n\t\t#Flee and leave Oberon behind.\n\t\t\tYou sprint away, leaving Oberon to fend for himself. The being will undoubtedly be torn to shreds and his essence consumed by the lesser creatures.\n\t\t\t\n\t\t\t\"You did what was necessary, Great One.\" ${helper} reassures you, \"Oberon was the one foolish enough to venture out here. It is well known that the Aether is a savage place!\"\n\t\t\t\n\t\t\tLuck hasn't entirely abandoned you, however. On your way back you happen across a small font of energy floating through space, likely left by some being traveling through prior. Without hesitating, you quickly consume the lost essence.\n\t\t\t\n\t\t\t(Power +22)\n\t\t\t*set power +22\n\t\t\t*set god1rel 0\n\t\t\t*page_break\n\t\t\t*return\n*label ending\n\nUnscathed and safely within the Court, you decide to head back to ${planetname} from there.\n*page_break\n*return", "quest2": "*disable_reuse\n*temp tname name\n*temp notellnoth false\n*rand pflux 25 35\n\"You there,\" a brawny voice emerges from behind you. Turning, you see a large being that takes the form of what seems to be a bipedal, golden fox creature. \"God entity,\" he continues, \"what is your name?\"\n*fake_choice\n\t#\"${Name}.\"\n\t\t\"Yes, you'll do. I am Nothastrus, God of the Court.\" \n\t#\"Who's asking?\"\n\t\tThe god scowls, \"I am Nothastrus, God of the Court.\" He tilts his head slightly and raises a brow, expecting your introduction next.\n\t\t*fake_choice\n\t\t\t#\"${Name}.\"\n\t\t\t\t*goto continue1\n\t\t\t#\"What is it you want, Nothastrus?\"\n\t\t\t\t*set tname \"No Name\"\n\t\t\t\t*goto continue1\n*label continue1\nThe god raises a fist to emphasise his might, \"I am seeking strong minded individuals to help maintain order in our beloved Court. It pays in power. Are you interested?\" Nothastrus inquires.\n*fake_choice\n\t#\"Sign me up.\"\n\t\t\"Excellent, I knew you seemed like a just fellow. Come with me, we will speak further inside,\" Nothastrus motions for you to follow him inside the Courthouse. \n\t#\"You've peaked my interest, tell me more.\"\n\t\tHe smiles, \"I thought you might be. Come with me, we will speak further inside,\" Nothastrus motions for you to follow him inside the Courthouse. \n\t#\"You'll have to search elsewhere for your grunts.\"\n\t\t\"Very well, suit yourself.\" Nothastrus proceeds inside the Courthouse and the door is shut behind him.\n\t\t\n\t\tThe doordaemon speaks up again, \"I'm afraid no others are seeking assistance at the moment.\"\n\t\t\n\t\tWith no further leads you decide to head back.\n\t\t*return\n*comment endif\n\nHe leads you down a long, expansive hallway and ushers you into one of the many rooms. It's a decently sized room with artwork and artifacts lining the walls. Noticing you looking around, he comments on the pieces, \"These are some of the greatest inventions ever developed by my mortals. I like to keep the mementos. Now then, on to business,\" he backtracks, \"recently there have been a surplus of attacks on travelers making their way to the Court. The Court is supposed to be a haven where beings from all over the Aether can come to feel sheltered. To be attacked on their voyage is the last thing we want. I'm sending anyone willing out to patrol the void near the city boarders and kill off any hostile daemons they come across. I will provide you with a bit of power to defend yourself with, but your true reward will come from the beings you defeat. Anything you get off them is yours. If you bring me back any useful information, I will reward you further.\" \n\nNothastrus raises one of his fox appendages and streams a font of power into you.\n*set power +100\n\n(Power +100)\n\n\"Return to me after you feel you've cleared the perimeter,\" he instructs.\n*fake_choice\n\t#\"Right away.\"\n\t#\"I'm going to need a lot more strength than this to defend myself.\"\n\t\t\"Then you better start small,\" he remarks acerbically. \nHe waves his arm and you find yourself transported outside the city walls. You start your patrol casually gliding along the city's exterior.\n*page_break\nAs you patrol, you soon realize the wall seems much larger on the outside than it did inside and wonder if it will ever loop back around. After quite some time in mortal years, you begin to grow bored of inspecting the immutable wall and staring off into space. With your ever evolving mind, you try pondering the origin of the universe, but just end up perplexed.\n*fake_choice\n\t#Start singing.\n\t\tTo occupy your mind you start making up songs. Perhaps if they are good enough you could even share them with the ${race1}.\n\t\t\n\t\tVibrating essence, you start harmoniously generating current, eliciting an audible reaction around you. The pitch moves high and low and you adjust the tempo, trying to mimic the chants you've heard your mortals sing in the past.\n\t#Stay resolute.\n\t\tConcentrating your mind, you try to maintain your resolve and focus on the task at hand. Left then right, you scan the horizon, watching for any suspicious activity. \n*comment endif\n\nSuddenly, a stream of light catches your eye in the distance. You speed toward it and discover a hole in the supposedly impenetrable wall. A significant crack is allowing a small amount of celestial energy to seep out of the city and into the Aether.\n\nA shout erupts from behind you and you turn to find several daemons charging toward you from the ethereal fog. Using the power that Nothastrus gave you, you swing your arm around and send a pulse of energy toward the creatures. The wave strikes them, instantly killing all but one. The survivor flees back into the clouds of the Aether, whimpering in pain.\n*set power -pflux\n\n(Power -${pflux})\n*rand pflux 50 60\n*fake_choice\n\t#Chase after the survivor.\n\t\tWithout hesitating, you charge into the fog, following the fugitive's faint trail of essence.\n\t\t\n\t\tYou follow the trail for a bit, but it isn't long until the clouds clear and a large open expanse is revealed. You spot the daemon fleeing to a massive asteroid floating in the middle of the clearing. Quickly, you follow suit.\n\t\t*page_break\n\t\tYou watch as the creature flies into one of the crevasses on the surface. As you pursue him, though, your path is suddenly cut off by another being, this one somewhat larger than those who ambushed you.\n\t#Stay and absorb the dead's essence.\n\t\tKnowing where your priorities lie, you let the daemon escape and instead gather the loose essence lost by the creatures that attacked you.\n\t\t*set power +31\n\t\t\n\t\t(Power +31)\n\t\t*page_break\n\t\tGlancing back, you examine the breach in the wall. As your peer closer, you can feel the seeping energy empowering you slightly.\n\t\t*set power +2\n\t\t\n\t\t(Power +2)\n\t\t\n\t\tThis leaking power must be why daemons have been loitering around the Court recently. Before you have time to decide what to do, another being appears from the void, this one slightly larger than those who ambushed you earlier.\n*comment endif\n\n\"Whoa, whoa, whoa there,\" it speaks, \"Don't worry, I'm not gonna attack you, I'm no fool. I just wanna talk.\"\n*fake_choice\n\t#\"Who are you?\"\n\t#\"You better talk fast.\"\n\t#\"I don't negotiate.\" (Attack)\n\t\t*set Evil +1\n\t\t*goto attacking\n\"Name's Jomey,\" the creature remarks, \"look, I know you were sent out here to clear us daemons out, but I want you to see both sides.\" The being moves a little closer after realizing you aren't going to immediately attack. \"Your 'Court Gods', as you call them, consider us monsters, nothing more than dangerous wisps, but there was a time when all of you were just like us. The daemons out in the Aether attack each other because they don't know any better! Its only when we accumulate enough power to grow our minds, like you and I, that we finally start to understand. That's why I've come to you; we need that essence leak. It's a source of power for all of us not welcome in the Court and we don't have to kill each other over it. In time, as my brothers become stronger, they will learn and the attacks will stop. Just buy us enough time to get there and tell Nothastrus you couldn't find anything.\"\n*fake_choice\n\t#\"Alright, I'll tell him I did all I could.\"\n\t\t*set Evil -5\n\t\t*set notellnoth true\n\t\t\"Thank you, stranger! I knew you looked like a reasonable fellow. I'll do my best to keep these gremlins in check!\" The being responds in excitement, backing away into the ethereal fog before you can change your mind.\n\t\t*goto done\n\t#\"The power Nothastrus would reward me is too great, you must leave or die.\"\n\t\tThe being's face grows pale, \"I understand, the temptation of power is too great; you are no better than us.\" The being quickly retreats back into the ethereal fog before you can retaliate.\n\t\t*goto done\n\t#\"There are enough beasts in this realm as it is!\" (Attack)\n\t\t*set Evil +4\n\t\t*goto attacking\n*label done\n*page_break\n*if (notellnoth)\n\tReturning to the Court, you inform Nothastrus that you found nothing unusual on your patrol.\n\t\n\t\"Really?\" Nothastrus responds, aghast. \"It seems whatever miscreant is responsible for these attacks is more elusive than I anticipated. Very well, thank you for your efforts, ${tname}. You may keep the power I bestowed to you.\" Nothastrus waves his arm toward the door, signifying your dismissal.\n\t*line_break\n\t*line_break\n\t*goto donedone\nReturning to the Court, you inform Nothastrus of the seeping energy and the brood of daemons around it.\n\n\"Excellent work, ${tname}. How none of my other agents discovered this, I'll have to look into,\" the god scowls. \"Regardless, I am pleased by your work so I'll give you that bonus.\" Nothastrus lifts his arm again and streams more power into you. You feel completely refreshed and stronger than ever.\n*set power +100\n*set god2rel +15\n\n(Power +100)\n\n\"I look forward to working with you again in the future, Young God,\" he remarks before ushering you out of the Courthouse.\n\n*label donedone\nHaving exhausted your leads at the Court, you return to your planet for now.\n*page_break\n*return\n*label attacking\nYou hurl a ball of energy toward the being, catching the daemon by surprise. The orb strikes its side and tears away a large chunk of its outer husk. In retaliation, the creature spins and a similar orb of energy detaches from its body and flies toward you. With ease, you deflect the attack and capture the fiend in your extended grasp, crushing the essence from its being for your own.\n*set power -35\n\n(Power -35)\n\nThe being squeals with its final breath, \"The power is so tempting; you… are no better than… us.\"\n\nThe daemon's essence dispels outward and the remaining husk of its corpse dissipates. Sweeping your arm, you absorb the creature's remaining power.\n*set power +pflux\n\n(Power +${pflux})\n*achieve merciless\n*goto done\n", "quest3": "*disable_reuse\n*temp openedd false\nSuddenly everything grows dark and then a few moments later you regain vision inside of a small library. Around you, infinitely tall bookshelves line the walls of the cylindrical room.\n\n\"Ah, ${name}.\" A strange creature that takes the form of an owl turns and looks at you from the edge of the room. \"Yes, I know you,\" he remarks, \"I know most of the celestial beings that make their way into the Court's walls. I am Ofaldir, one of the seven Court gods.\" He smiles at you, expecting some sort of response.\n*fake_choice\n\t#\"Pleasure to meet you, Ofaldir.\"\n\t\t\"Ah, finally a creature with some degree of civility. \n\t#\"I was told you need help with something?\"\n\t\t\"Well, yes, that is true. \nI have summoned you to assist with a rather…\" Ofaldir appears to struggle in developing the appropriate descriptor, \"sensitive matter.\" He walks to one of the many bookshelves throughout the room and pulls out one of the millions of books, as if at random. \"This is the Book of Poxiziius, something that has recently come into my possession. I need you to bring it to the Court, to Ylen in particular.\"\n*temp duntalked false\n*label convo1\n*fake_choice\n\t#\"What's so special about this book?\"\n\t\tOfaldir is very forthcoming with his information and makes no effort to hide the answer from you. \"It possesses the power to drive gods mad.\"\n\t\t*set duntalked true\n\t\t*goto convo1\n\t*if (duntalked) #\"How is that possible?\"\n\t\t\"It was created by a mortal,\" he responds, \"the mortal of a god who is no longer around and in turn, no longer is the mortal, but the book remains. The mortal managed to imbue the essence of his master into the book and then pervert and desecrate the divine energy. When invoked, the book devours any divine energy within radius.\"\n\t\t*goto convo1\n\t*if (duntalked) #\"And you're giving this to me?\"\n\t\t\"Indeed,\" he answers, \"we are not concerned. Anyone who opens the book would likely be destroyed, so it would not behoove you to use it in any way. We need someone to, as some mortals would say, 'hand-deliver' it, without the use of divine energy.\"\n\t\t*goto convo1\n\t#\"Who is Ylen?\"\n\t\t\"Ylen is one of the Court gods, a powerful one at that. She will be able to safely store the book away where it will no longer pose a danger to the Aether.\"\n\t\t*goto convo1\n\t#\"Where are we now?\"\n\t\t\"My personal library of course. Adrift in the Aether. I can point you the way back, however. The journey shouldn't be too far.\"\n\t\t*goto convo1\n\t#\"What do I get in return?\"\n\t\t\"I'm sure Ylen will reward you appropriately for such an important task,\" he remarks.\n\t\t*goto convo1\n\t#\"Very well, I will deliver the book.\"\n\t\t\"Excellent!\" Ofaldir ushers you out the door, \"the Court is that direction,\" he points in an arbitrary direction, as every direction in the Aether looks identical, \"good luck.\" He hands you the book and quickly shuts the door behind you.\n\t#\"I'm not foolish enough to handle that kind of artifact! I must decline.\"\n\t\t\"What a shame. Very well then, goodbye ${name}.\" Ofaldir turns back around and you are suddenly teleported back to the Court Center.\n\t\t*return\n*page_break\nYou head in the direction Ofaldir instructed. The darkness of the Aether is eerie and you begin hearing whispers from the book in your possession.\n\n[i]You are alone. None would witness your atrocities.[/i]\n*choice\n\t#Ignore the voice.\n\t\t*goto part2\n\t#\"How are you speaking?\"\n\t\t[i]You know so little for a god.[/i]\n\t\t*choice\n\t\t\t#Ignore the voice.\n\t\t\t\t*goto part2\n\t\t\t#\"What do you know of the gods?\"\n\t\t\t\t[i]I am beyond omniscience. Open the pages and you will have knowledge beyond the incomprehensible.[/i]\n\t\t\t\t*choice\n\t\t\t\t\t#\"I won't fall for you tricks.\"\n\t\t\t\t\t\t*goto part2\n\t\t\t\t\t#Open the book.\n\t\t\t\t\t\t*goto open\n*label part2\n[i]Incomprehensible power at your fingertips. They don't want you to have it.[/i]\n*choice\n\t#Ignore the voice.\n\t\t[i]Open the book, I will relinquish it to you.[/i]\n\t\t*choice\n\t\t\t#Open the book.\n\t\t\t\t*goto open\n\t\t\t#Ignore the voice.\n\t\t\t\t*goto part3\n\t#\"What kind of power?\"\n\t\t[i]The power to destroy dimensions. Power you need.[/i]\n\t\t*choice\n\t\t\t#\"I need power. Relinquish it to me!\"\n\t\t\t\t[i]Open the book, I will give it to you.[/i]\n\t\t\t\t*choice\n\t\t\t\t\t#Open the book.\n\t\t\t\t\t\t*goto open\n\t\t\t\t\t#\"No, you won't fool me!\"\n\t\t\t\t\t\t*goto part3\n\t\t\t#Ignore the voice.\n\t\t\t\t*goto part3\n*label part3\nYou continue flying through the Aether, certain that you must be nearing the Court.\n\n[i]They lied to you. You will never reach the Court. They are rid of us both.[/i]\n*choice\n\t#\"Silence!\"\n\t\t[i]They have damned you. I can give you the strength to free yourself.[/i]\n\t\t*goto choice2\n\t#\"Why would they do this?\"\n\t\t[i]Less to stand in their way. I can give you the power to stop them.[/i]\n\t\t*label choice2\n\t\t*fake_choice\n\t\t\t#\"Yes, give me the power!\"\n\t\t\t\t[i]Open the book so we can be free.[/i]\n\t\t\t\t*choice\n\t\t\t\t\t#Open the book.\n\t\t\t\t\t\t*goto open\n\t\t\t#\"No, your power is a trap.\"\n\t\t\t\t[i]No, theirs is the trap. I can free you. Open the book and know all.[/i]\n\t\t\t\t*choice\n\t\t\t\t\t#Open the book.\n\t\t\t\t\t\t*goto open\n\t\t\t\t\t*selectable_if (Power>24) #Ignore the voice. (-Significant Power)\n\t\t\t\t\t\tIt strains you, but you muster your strength and ignore the voice's demand. You continue onward into the infinite void.\n\t\t\t\t\t\t*set power -24\n\t\t\t\t\t\t\n\t\t\t\t\t\t(Power -24)\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto part4\n*label part4\n[i]You are a fool. You are weak. You will not succeed. They have beaten you.[/i]\n*choice\n\t#\"No, no, no, no! I am a god! I am all powerful!\"\n\t\t[i]You are lost. I am your only salvation. Open the book so we can be free.[/i]\n\t\t*choice\n\t\t\t#Open the book.\n\t\t\t\t*goto open\t\t\n\t*selectable_if (Power>40) #Ignore the voice. (-Significant Power)\n\t\tYou can feel your mind becoming weaker. The voice riddles your thoughts and you can not escape it.\n\t\t*set power -30\n\t\t\t\t\t\t\t\n\t\t(Power -30)\n\t\t\n\t\t*page_break\n*label part5\n[i]Where am I? I am lost. There is nothing but void around me. What is this book in my clutch? Perhaps it holds the answers. I should open it.[/i]\n*fake_choice\n\t#Open the book.\n\t\t*goto open\t\t\n\t*selectable_if (Power>40) #\"No, you are not my thoughts. My mind is still my own.\" (-Major Power)\n\t\tWith your remaining strength you resist the final whispers of the book.\n\t\t*set power -40\n\t\t\t\t\t\t\t\n\t\t(Power -40)\n\t\t\n\t\tFinally, after what seemed ages wandering through the Aether, you see the Court emerge through the dark ethereal clouds. You rush to its gates as swiftly as you can.\n*page_break\nRecognizing you again, the gatekeepers allow you passage.\n\t\t\n[i]This isn't real. None of it is real. You can still save yourself. Open the book![/i]\n\t\t\nYou pay no heed to the words and proceed to the Courthouse.\n*page_break\n*achieve bookie\n*set god4rel %+30\n*set god3rel %+30\n*label done\nYlen greets you inside, \"Ah, thank you Young One. I hope the Book of Poxiziius didn't give you too much trouble. I'm glad to see you didn't destroy yourself with it.\"\n*fake_choice\n\t#\"No trouble at all.\"\n\t\t\"Glad to hear it,\" Ylen stretches out an arm and streams a beam of energy into you, \"here you are, this should be a fair reward.\" You feel the font of strength rejuvenate your mind.\n\t#\"Just give me a reward.\"\n\t\t\"Very well little one,\" Ylen stretches out an arm and streams a beam of energy into you, \"this should be a fair reward.\" You feel the font of strength rejuvenate your mind.\n\t*if (openedd) #\"Poxiziius escaped.\"\n\t\t\"You opened the book and you're still alive?\" Ylen inspects the bindings, \"curious. Perhaps we don't know as much as we had thought about this text. As for Poxiziius, he better pray to us that we never cross his path again. I don't know if I could withstrain Nothastrus again,\" she chuckles a bit under her breath. \"I'm not entirely pleased with your efforts, but this should be a fair reward.\" Ylen stretches out an arm and streams a beam of energy into you. The font of strength rejuvenates your mind.\n*set Power +300\n\n(Power +300)\n\n\"May our paths cross again, Young One,\" she waves her arm and you find yourself back outside the Courthouse, finally alleviated from the burden of carrying that book.\n*page_break\n*return\n*label open\n*set openedd true\nYou lift the cover of the book slowly. With just a peak inside, energy suddenly starts spewing out from within. A maniacal laugh echoes throughout the void, \"I am free!\" a cloud of energy conjures around you and you feel essence being ripped away from your body. \"Thank you foolish being. For your stupidity I will spare you.\" The being laughs once more before fleeing into the distance, hauling a portion of your essence with it.\n*temp pflux\n*set pflux round(Power*(45/100))\n\n(Power -${(pflux)})\n\nWith the voice gone you rush back to the Court. After what seemed ages, you see the Court emerge in the distance, through the dark ethereal clouds. You rush to its gates as swiftly as you can.\n\nRecognizing you again, the gatekeepers allow you passage.\n\n*goto done", "quest4": "*disable_reuse\nYou are led to Calabius's palace by one of his servants. Unlike the rest of the court the landscape of Calabius's courtyard is made up of dark ethereal clouds. Before you lies a pathway made up of golden bricks, imbued within the clouds, leading to the palace doors. The servant forces them open remotely and guides you inside.\n\n\"The Master will be with you shortly,\" he asserts and drifts away, leaving you alone in the Great Hall.\n\nLooking around, you take note of all the unnecessary intricacies throughout the palace: The elegant columns, the ornate railings along the staircase, and the marble floor.\n\n\"Ah, my esteemed guest,\" Calabius remarks upon entering the room. \"You are here about my request for a prophet no doubt?\" Calabius takes the form of a lion whom walks on his two hind legs. Though seemingly unnatural, he manages to move with surprising grace.\n*label datconvodo\n*fake_choice\n\t#\"Why do you take the form of a lion?\"\n\t\t\"It is the image of grace and power of course. While others take the forms of foolish creatures, I prefer a more, potent form.\"\n\t\t*goto datconvodo\n\t#\"Your domain is quite decorated.\"\n\t\t\"Do you like it? Many believe my taste excessive and pointless, but I believe the subtleties of one's domain speaks volumes about their abilities.\"\n\t\t*goto datconvodo\n\t#\"What exactly is required of me in your contract?\"\n\"My mortals have begun worshipping that sorry excuse for a god, Asos! This is unacceptable.\" Calabius conjures two glasses of a strange purple juice and serves you one as he continues to speak. \"I am faced with a rather awkward predicament. I myself can not slaughter these heretics or they would simply become martyrs and start a full blown war, and I can't afford to lose any more followers to bloodshed.\" Calabius sips his beverage…\n*fake_choice\n\t#Sip the drink.\n\t\tYou feel the cool fluid flow through your celestial body, it is quite refreshing.\n\t\t*set Power +2\n\t\t*set god5rel +3\n\t\t\n\t\t(Power +2)\n\t#Dissipate the drink.\n\t\tYou silently vaporize the drink without him noticing as he paces back and forth.\n*line_break\n*line_break\n\"This is where I need the aid of a third party, someone that can rally the mortals behind me without causing any more death. If you succeed I will bestow upon you 300 of my divine power.\"\n*choice\n\t#\"How will I accomplish this?\"\n\t\t*label asking\n\t\t\"Simply,\" he remarks, \"You will be conceived by one of my mortals through supernatural forces. Through life you will preform miracles and declare them in my name. With the power you display my mortals will have no choice but to give up their foolish false religions.\"\n\t\t*label convo1\n\t\t*choice\n\t\t\t#\"Excuse me? What was that part about being conceived by a mortal?\"\n\t\t\t\tCalabius looks at you strangely, \"Yes, one of the populace will give birth to you. It is how all creations spawn, demigods and mortals alike! Trust me, gods do it all the time.\"\n\t\t\t\t*goto convo1\n\t\t\t#\"Won't this take a long time?\"\n\t\t\t\t\"Well to them yes, but we are gods, time means nothing to us!\"\n\t\t\t\t*goto convo1\n\t\t\t#\"Alright, let's get started!\"\n\t\t\t\t*goto start\n\t\t\t#\"I don't have time for all this.\"\n\t\t\t\tHe glares at you angrily, \"I spent all this time writing cool quests for you and you won't even play through them! Get out.\" He hurls you from his front door back to the Court Center.\n\t\t\t\t*page_break\n\t\t\t\t*return\n\t#\"Should be easy enough, let's do it.\"\n\t\t\"You're certain you don't have any questions?\"\n\t\t*choice\n\t\t\t#\"Yes.\"\n\t\t\t\t\"Very well, good luck to you.\"\n\t\t\t\t*goto start\n\t\t\t#\"Alright, how do I accomplish this?\"\n\t\t\t\t*goto asking\n*label start\nCalabius spins a glowing blue essence around you and suddenly everything fades away.\n*page_break\nYou were born on a clear winter's morning to a woman who claimed she had no mate. Through a series of biological tests doctors confirmed that your DNA is the result of your mother's simply randomized into a new pattern. The first of many miracles to come.\n\nYour memory as a god is wiped and as a child you can't help but find these creatures of your own race strange. With bulbous bodies and five-legs you just can not find yourself attracted to them.\n\nYou are known around the world as the miracle child and religious leaders pamper you throughout your adolescence, waiting for you to enact a miracle. On your tenth birthday many of these leaders have grown impatient and confront you after your birthday party. \n\nA strange man leans down and speaks with you, \"Bebe,\" the name your mother gave you, \"you are a special kid, we know that, but do you know who your father is?\"\n*fake_choice\n\t#\"I don't have a father.\"\n\t#\"Uncle Tater is my daddy.\"\n\"No, no, we know that,\" the man mutters, trying to control his frustration, \"We believe you were born from someone very special, do you know who?\"\n\nYou simply stare at the man in confusion. Realizing you have no idea what he's talking about the man loses his temper, \"this kid is a fake! She was not born from a god, the doctors must have made a mistake!\" The man raises his hands in the air. Unsure of his intentions, he frightens you.\n*fake_choice\n\t#Scream as loud as possible.\n\t\tYou release a chilling cry and the earth shakes. The man is thrown back in shock and falls to the floor.\n\t#Punch the man in the gut and run.\n\t\tYou hit the man and he flies back. Everyone around you is struck in awe.\nFor weeks you are the talk of the world once more, but you yourself can not quite comprehend what is happening, until your fifteenth birthday. That night a being comes to you in your sleep. He calls himself, Calabius.\n\n\"Bebe, I am your father,\" the entity speaks. \"Well, not literally, I created you. I have sent you to this world to restore order. The planet is divided and it is your destiny to reunite them in my name. Do this, and you will be brought to paradise.\" The vision fades and you wake up that morning unsure what to make of it.\n*page_break\nMuch happens over the next few years. You enact several small miracles around the globe and as you grow older your memory of godhood slowly returns.\n*page_break\nUpon reaching adulthood you are confronted by the religious leaders once again. One man introduces himself as Jojo, Leader of Asos's Followers, \"Bebe, the time has come. Our world is on the brink of a holy war between the followers of Asos and those of Calabius. You must tell us who you are the child of.\"\n\nYou go before an audience of millions, at the holy capital of the planet, to reveal to the people who the True Divine God is.\n*temp god5ispissed 0\n*temp truedivinegod \"\"\n*fake_choice\n\t#\"I am the child of Calabius.\"\n\t\t*set truedivinegod \"Calabius\"\n\t\t*set god5rel %+40\n\t\t*set Evil -5\n\t#\"I am the child of Asos.\" (Lie)\n\t\t*set truedivinegod \"Asos\"\n\t\t*set god5ispissed 1\n\t\t*set god6rel 70\n\t\t*set god5rel %-70\n\t#\"I am the child of ${Name}; ${he} is the True Divine God!\" (Lie)\n\t\t*set truedivinegod \"${Name}\"\n\t\t*set god5ispissed 2\n\t\t*set god5rel %-70\n\t\t*set Evil +5\nThe people break into an uproar! Before fights can commence Jojo speaks out, \"People, people, please! We must heed the prophet! She has been gifted by the Divine. So she has revealed the truth and so we must listen. ${truedivinegod}, is the True Divine God and we must worship without question or our people will perish.\" Jojo turns to you, \"Bebe, as a final act to end the ceremony we ask humbly that you heal those struck by illness among our people so that we may thrive and worship ${truedivinegod} without hindrance.\"\n*temp powerloss1 0\n*temp powerloss2 0\n*rand powerloss1 30 60\n*rand powerloss2 10 35\n*fake_choice\n\t*selectable_if (Power>70) #\"Very well, I will heal your sick.\" (-Great Power)\n\t\t*set Evil -4\n\t\t\"${truedivinegod} be praised!\" he shouts. The people chant your name in the streets for hours.\n\t\t\n\t\tThough it takes a great deal of power to heal so many individuals, their praise strengthens you in return and overall you feel yourself growing stronger.\n\t\t*set Power +powerloss1\n\t\t\n\t\t(Power +${powerloss1})\n\t\t\n\t\tYou spend the next few days healing the sick in your temple. The people praise ${truedivinegod} without question. All appears normal until Jojo requests an audience with you in private. Upon meeting with him you are greeted only by a knife in your back.\n\t\t\n\t\t\"I am sorry, Prophet, but it must be done,\" you hear him whisper as you quickly bleed out in your dormitory.\n\t*selectable_if (Power>30) #\"I will heal your sick, but only those I deem worthy.\" (-Significant Power)\n\t\tJojo bows before you. \"Whatever ${truedivinegod} wills.\" The people chant your name in the streets for hours.\n\t\t\n\t\tYou heal those among the population you respect most and feel will further your cause. Though it drains a portion of your power, you can feel the praise of the people strengthening you in return.\n\t\t*set Power +powerloss2\n\t\t\n\t\t(Power +${powerloss2})\n\t\t\n\t\tYou spend the next few days healing the sick in your temple. The people praise ${truedivinegod} without question. All appears normal until Jojo requests an audience with you in private. Upon meeting with him you are greeted only by a knife in your back.\n\t\t\n\t\t\"I am sorry, Prophet, but it must be done,\" you hear him whisper as you quickly bleed out in your dormitory.\n\t#I am sorry, but it is not ${truedivinegod}'s will.\n\t\tJojo is taken back by your response, \"very well, Prophet.\" Even with your refusal, the people chant your name in the streets for hours.\n\t\t\n\t\tThe people praise ${truedivinegod} without question. All appears normal until Jojo requests an audience with you in private. Upon meeting with him you are greeted only by a knife in your back.\n\t\t\n\t\t\"I am sorry, Prophet, but it must be done,\" you hear him whisper as you quickly bleed out in your dormitory.\n*page_break\nYou regain consciousness in the Great Hall of Calabius's Palace.\n*if god5ispissed=2\n\t*rand powerloss1 300 320\n\n*if (god5ispissed=1) or (god5ispissed=2)\n\tCalabius looms over you as you emerge, regaining your strength. \"You are a fool, ${Name}. Do you not understand that if you can not accomplish a basic task that I can simply find someone else? All beings are replaceable and you will never survive if you can not understand that fundamental concept! You are a pathetic creature, take yourself and leave my domain!\"\n\t\n\t*if god5ispissed=2\n\t\tYou can feel the prayers of Calabius's old followers feeding you. Their worship strengthening you with every utterance of your name.\n\t\t*set Power +powerloss1\n\t\t\n\t\t(Power +${powerloss1})\n\t\t\n\t*fake_choice\n\t\t#Leave\n\t\t\t*return\n\t\t#\"Not without the remainder of your power!\" (Attack Calabius)\n\t\t\t${helper} appears before you, \"Master, what are you doing!? Do not attack one of the Court gods unless you are certain you are powerful enough to take him on.\"\n\t\t\t*fake_choice\n\t\t\t\t#Never mind.\n\t\t\t\t\t*return\n\t\t\t\t#Attack Calabius.\n\t\t\t\t\t*set Evil +15\n\t\t\t\t\t*goto battle\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\n\"Ah you have returned, ${Name}! I know your mission was a success. I can already feel the strength of my followers returning. You have saved me a great loss and I am in your debt. Here, as promised.\" Calabius raises his arm and channels a stream of dark energy into your body.\n*set Power +300\n\t\n(Power +300)\n\t\n\"May we cross paths again soon,\" he says as his servant ushers you out.\n*return\n*label battle\n*temp hiddendmg 0\n*temp hp 2\n*set god5rel 5\nYou launch an orb of raw energy toward Calabius and it strikes his left arm, knocking him back and sending him reeling.\n\nThe god roars in anger and almost immediately the room around you fades and you become surrounded by a dense fog. You glance around waiting for Calabius to take you by surprise. Instead, however, he materializes before you and lunges with claws of potent ethereal energy drawn.\n*fake_choice\n\t*selectable_if (Power>184) #Blast him with a powerful beam of energy. (-Massive Power)\n\t\tAs he charges, you centralize your essence and send forth a devastating beam of energy. The charge engulfs Calabius and sends him soaring back as shreds of essence are sent flying into the void.\n\t\t*set Power -184\n\t\t\n\t\t(Power -184)\n\t\t\n\t*selectable_if (Power>113) #Dematerialize and reform behind him. (-Great Power)\n\t\tAs he charges, you fade away and force Calabius's attack to strike at nothing. While he is off balance you rematerialize behind him and strike the god with a powerful blow.\n\t\t*set Power -113\n\t\t\t\t\n\t\t(Power -113)\n\t\t\t\t\n\t#Attempt to dodge the attack.\n\t\tYou dash aside, but Calabius interprets this and turns his single strike into a spiral, nicking you from behind. Sensing your imbalance, he then moves in for another strike, but this time you manage to knock him back with a powerful blow.\n\t\t*set hp -1\n\t\t*set hiddendmg round(Power/4)\n\t\t*set Power -hiddendmg\n\t\t\n\t\t(Power -${hiddendmg})\n\t\t\n\"It seems I underestimated you, ${name}. You are strong, but still foolish.\" Unwilling to take you at melee range, Calabius ascends into the air and sheds his physical form, revealing the gelatinous ethereal essence he possesses. A single colossal limb protrudes from his core. \"You have chosen your fate,\" he remarks.\n\t\t\nThe void around him distorts and a ball of energy forms at his fist.\n*fake_choice\n\t*selectable_if (Power>215) #Surround yourself with a shield. (-Massive Power)\n\t\tYou tuck yourself under a celestial shield which forms above you. A beam of light bursts from Calabius's grasp and makes contact with the barrier. The combined force causes both to explode, sending you and Calabius flying back.\n\t\t*set Power -215\n\t\t\t\t\n\t\t(Power -215)\t\n\t*selectable_if (Power>152) #Evade and disorient him with a series of rapid jolts of lightning. (-Great Power)\n\t\tQuickly, you dash from side to side, firing a series of small bolts of energy toward the being. The shots hit him with just enough strength to send his energy awry and force his devastating beam into the dark.\n\t\t*set Power -152\n\t\t\t\n\t\t(Power -152)\t\n\t#Try to evade his fire.\n\t\tHis shot fires and a beam of light bursts from Calabius's grasp. You fly to the side, but Calabius immediately delivers another attack from his adjacent hand which strikes you dead on and shreds the essence from your body.\n\t\t*set hp -1\n\t\t*set hiddendmg round(Power/3)\n\t\t*set Power -hiddendmg\n\t\t\t\t\n\t\t(Power -${hiddendmg})\n*if (hp=0) or (Power\u003c1)\n\t*page_break\n\tYou lie on the ground unable to move as his attacks rain on you from above.\n\t\t\n\t(Power -${Power})\n\t*set Power 0\n\t*gosub_scene death\n*line_break\n*line_break\n\"A valiant effort, but you can not win!\" Calabius shouts, his voice echoing around the mists. His tonality reveals he must be growing weak.\n*fake_choice\n\t*selectable_if (Power>299) #Launch a final assault against the being. (-Momentous Power)\n\t\tWith your remaining strength, you rise into the air and witness Calabius recovering on the ground. Concentrating, you form a series of orbs around you and channel immense power into them. As soon as Calabius looks up and witnesses your act you unleash the volley. He tries fading out of existence, but your missiles strike too quickly and hit while he's vulnerable. As the orbs make contact, they explode into shards of light and tear him to pieces. Blow after blow, milliseconds apart in mortal time, Calabius tries to reassemble, but is immediately torn apart by the succeeding missile.\n\t\t\n\t\tCalabius cries in agony and, in a last ditch effort, emmits a massive burst of energy which knocks you out of the sky.\n\t*selectable_if (Power>225) #Fly toward him and unleash a crushing blow. (-Massive Power)\n\t\tWith your remaining strength you fly into the air and fall into the being with all your might. The last thing you sense is the power of the impact which shakes the cosmos around you.\n\t#Charge toward him and attempt to siphon his remaining energy.\n\t\t*set hiddendmg round(Power/3)\n\t\t*set Power -hiddendmg\n\t\tWith your remaining strength you move toward him with lightning speed and grasp onto his essence, drilling into him with your own. \n\t\t\n\t\tIn an effort to fight you off, Calabius wraps himself around you and begins burning you from the inside out. You can feel yourself withering away and your strength shredding into the void, but you continue to hold on and drain him of what's left.\n\t\t\t\t\n\t\t(Power -${hiddendmg})\n\t\t\t\t\n\t\tSoon, everything grows dark.\n*page_break\nRegaining conciousness, you look around and find both you and the corpse of Calabius lying on the ground of his domicile.\n\t\t\nCalabius's essence begins seeping away, searching for the nearest conduit to restore equilibrium, you. The being's energy pours into you and your strength quickly reconsitutes. Your essence grows greater and greater, surpasing any strength you have ever felt before.\n*set Power +1389\n\t\t\n(Power +1389)\n\n\"You've done it, Great One. You've slain Calabius,\" ${helper} remarks in shock. He stares in awe as the essence cascades into you.\n*fake_choice\n\t#\"This entire realm will be mine.\"\n\t#\"I take no joy in it, but I need the power.\"\n\"Yes, Omnipotent One, there is no question! The Court will have no choice but to acknowledge you now.\"\n*set god5rel 0\n*if (god1rel=0) and (god6rel=0)\n\t*achieve gwar\n*page_break\n*return\n", "quest5": "*disable_reuse\n*temp pflux\n*temp str false\n*if (power>199)\n\t*set str true\n\"Please, follow me,\" the being requests.\n\nYou follow it into the courthouse and down a long hallway. An infinite number of doors stretch its span and, as if at random, the being stops and motions you inside of one. \n*page_break\nInside, you are met by a powerful entity who takes the appearance of a large blue panther. \"Hello, ${name},\" the being speaks, \"you are new here, are you not?\" Before you have time to answer the question, the being continues, \"Have we met? I am quite forgetful. I meet many young beings that wander here. I am Ylen, and I have summoned you so that you may, hopefully, assist me.\"\n*choice\n\t#\"What is it you require, Ylen?\"\n\t\t*label explaining\n\t\t*if (god1rel=0)\n\t\t\tYlen sighs, \"There were once seven of us on the court. Ever since Oberon vanished things have been uneasy. \n\t\t\t*goto continue\n\t\t*else\n\t\t\tYlen sighs, \"There are seven of us on the court. \n\t\t\t*goto continue\n\t\t*label continue\n\t\tWe try our best to provide a safe haven within this mad realm, the only one known to exist, but power is a damning thing, ${name}. Chaos will always exist, but this time it has grown serious. Nothastrus and Ofaldir can not cooperate. We have given them countless eons to get along, but it seems an impossible task for them.\" Ylen releases another sigh, heavier than the last, \"It does me great pain, but we must settle this one way or another. None of us on the court can resolve their farce so I am sending you in, a new aril, to attempt to solve this problem.\"\n\t\t*label convo1\n\t\t*choice\n\t\t\t#\"What happens if I can't solve this?\"\n\t\t\t\t\"If you can not, then we will have no choice but to exile them both. If this happen, it will be a serious blow to the strength of The Court, but it will be for the good of all in the long of it.\"\n\t\t\t\t*goto convo1\n\t\t\t#\"Why me?\"\n\t\t\t\t*if (str)\n\t\t\t\t\t\"You are not familiar, they will have no predisposition toward you. Though you have more to grow, your strength has accumulated considerably, perhaps one of them will be wise enough to heed you.\"\n\t\t\t\t\t*goto convo1\n\t\t\t\t*else\n\t\t\t\t\t\"You are not familiar, they will have no predisposition toward you. Though you are weak compared to us, you are strong compared to many. Perhaps one of them will be wise enough to heed you.\"\n\t\t\t\t\t*goto convo1\n\t\t\t#\"Is there a reward?\"\n\t\t\t\t\"The reward is the sense of doing what is right,\" Ylen remarks, then suddenly bursts into laughter, \"I jest of course, ${name}. You should have seen the expression on your ethereal face. For your efforts the court will gladly grant you a reward of 250 Celestial Power and if you actually manage to resolve their quarrel an even greater bonus may be due.\"\n\t\t\t\t*goto convo1\n\t\t\t#\"Very well, I will see what I can do.\"\n\t\t\t\t\"Excellent! I have summoned both Nothastrus and Ofaldir to the courtroom. I will take you there.\" Rather than having you follow her, Ylen simply snaps her fingers and you are instantly teleported inside the courtroom.\n\t\t\t\t*goto begin\n\t\t\t#\"Those two will tear me apart, I must refuse.\n\t\t\t\t\"I am sorry to hear that. Very well then, we are done here. Goodbye, ${name}.\" Ylen snaps her fingers and you are instantly teleported back to the Court Center.\n\t\t\t\t*page_break\n\t\t\t\t*return\n\t#\"That depends, what's in it for me?\"\n\t\t\"A being who cuts to the chase I see. Let me explain the situation first.\" \n\t\t*goto explaining\n*label begin\n\n*if (power\u003c500)\n\tYou bear witness to two beings of great power, nearly five times your size, arguing between one-another.\n*if (power>=500)\n\tYou bear witness to two beings of great power, only about twice your own size, arguing between one-another.\n\n\"You don't deserve to be a god of the court, Ofaldir. You suppress your mortal race and your power suffers because so! Step down.\"\n\n\"There is so much of the Aether you don't understand, Nothastrus. You would have an intellect no greater than a common wisp to think me weak!\"\n\nNothastrus's body grows larger and the speed of electrical energy flowing through him amplifies. \"All talk and no show. Let's see what you can really do!\"\n\n\"Don't do this, Nothastrus, it will only end badly for both of us.\"\n*fake_choice\n\t#Intervene.\n\t\t\"Stop!\" You shout and immediately grab the beings' attention.\n\t\t\n\t\t\"What is this?\" Nothastrus shouts belligerently, \"you would dare intrude upon the business of gods?\" Nothastrus looks as if he is ready to vaporize you at any instant.\n\t\t*fake_choice\n\t\t\t#\"I was sent on behalf of Ylen.\"\n\t\t\t\t\"Ylen, I knew she was up to something,\" Nothastrus responds. \"So let me guess, Ylen sent you here with ultimate authority and you now think that your decision is law?\" The bonds holding Nothastrus's celestial form together dissolve and his essence falls to the floor. It then wraps around you and Nothastrus's voice echoes throughout the courtroom, \"that's not how it works foolish daemon.\"\n\t\t\t\t\n\t\t\t\t\"Stop this madness at once, Nothastrus!\" Ofaldir shouts and sparks fly from the beings hands, electrocuting Nothastrus and forcing him to release his grip on you.\n\t\t\t\t\n\t\t\t\tNothastrus shouts in anguish and launches toward Ofaldir.\n\t\t\t\t*goto attackscene\n\t\t\t#\"I have come to settle this farce.\"\n\t\t\t\t\"You?\" Nothastrus laughs hysterically, \"what could a worm like you hope to accomplish against a being as powerful as a Court God?\"\n\t\t\t\t*fake_choice\n\t\t\t\t\t#\"I give you an ultimatum: Stop your squabbling or face exile.\"\n\t\t\t\t\t\t\"You dare command me?\" Nothastrus shouts in anger, \"you think that your decision is law?\" The bonds holding Nothastrus's celestial form together dissolve and his essence falls to the floor. It then wraps around you and Nothastrus's voice echoes throughout the courtroom, \"that's not how it works foolish daemon.\"\n\t\t\t\t\n\t\t\t\t\t\t\"Stop the madness at once, Nothastrus!\" Ofaldir shouts and sparks fly from the beings hands, electrocuting Nothastrus and forcing him to release his grip on you.\n\t\t\t\t\n\t\t\t\t\t\tNothastrus shouts in anguish and launches toward Ofaldir.\n\t\t\t\t\t\t*goto attackscene\n\t\t\t\t\t#\"Nothastrus, why do you challenge Ofaldir?\"\n\t\t\t\t\t\t*label finalchoice\n\t\t\t\t\t\t*rand pflux 250 300\n\t\t\t\t\t\tNothastrus scowls, attempting to cool his rage. \"The Court has one purpose, to maintain order. To do this, The Court must be made up of the strongest beings in existence and Ofaldir sunders that reputation. He has no sense of duty!\" Nothastrus shouts. \"He craves power so much that he suppresses his worshipers' desire to grow and in turn suppresses his own growth. Truly a sad and pathetic irony, but what can be expected of a being whose mind never grew beyond that of a wisp.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Nothastrus, you are the only fool here. With power comes chaos, just look at yourself. You have become exactly what The Court seeks to dismantle, you and Lyciph, both. I halt progress in order to maintain equilibrium, what you fail to comprehend is the fundamental quality of the cosmos, energy flows! If you try to bundle it up it will tear everything apart!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Do not try to justify your weakness by disguising it as wisdom! Energy flows every time it is expended and every time it is gained. If you've proven anything, its only that you are a coward in addition to a fool unfit to be a Court God.\" Nothastrus glares at you, \"${name}, I apologize for lashing out at you, you must understand my anger. Stand beside my decision to tear Ofaldir apart and I will split his power with you. No doubt better in your hands than his.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Do not fall for his treachery,\" Ofaldir implores you. \"Beings like Nothastrus will only bring an end to order The Court has fought so hard to achieve. He must be banished.\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Side with Nothastrus.\n\t\t\t\t\t\t\t\t\"Do it,\" you tell Nothastrus.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tHe faces Ofaldir and prepares to strike, but Ofaldir quickly summons a mass of lightning which arcs toward every corner of the room. Without hesitation, Nothastrus conjures a barrier which surrounds both of you and reflects the bolts of energy back at Ofaldir, knocking him to the ground.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tNothastrus strikes Ofaldir while he's down and rips the essence from his body. Ofaldir cries in pain, but Nothastrus shows no mercy and continues until there is nothing left of Ofaldir's body but a clump of whithered essence.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tNothastrus collects himself and meditates for a moment, allowing the residue to flow into his being. His body pulsates with power and he turns back at you. \"The rest is yours. Make better use of it than its former Master.\" Nothastrus whips out of the room near the speed of light, leaving you to collect your reward.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tConcentrating, you absorb the residual essence and feel it empower your being, growing your strength greater than ever before.\n\t\t\t\t\t\t\t\t*set power +pflux\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t(Power +${pflux})\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*set god3rel 0\n\t\t\t\t\t\t\t\t*set god2rel %+30\n\t\t\t\t\t\t\t\t*set god4rel %-40\n\t\t\t\t\t\t\t\t*set god7rel +5\n\t\t\t\t\t\t\t\t\"What have you done?\" Ylen remarks upon your return. \"I asked you to settle the feud, not slaughter our order! Ofaldir was a loyal member of The Court and did not deserve his fate. You will get nothing from us. Get out of my sight, daemon.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou have no choice but to return to ${planetname} for now.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*return\n\t\t\t\t\t\t\t#Side with Ofaldir.\n\t\t\t\t\t\t\t\t\"Nothastrus, by the right granted to me by Ofaldir and Ylen, you are hereby banished from The Court.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tNothastrus laughs manically, \"I don't need The Court, The Court needed me. You have chosen to damn yourselves!\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tIn an instant, Nothastrus conjures an explosion of energy that engulfs the room. Without hesitation, Ofaldir creates a barrier surrounding both of you. When the light dissipates, Nothastrus is nowhere to be found.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"It is alright,\" Ofaldir speaks, \"you have played your part. He is The Court's concern. Speak with Ylen, I'm certain she'll want to know what has transpired.\"\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*set god4rel %+40\n\t\t\t\t\t\t\t\t*set god3rel %+45\n\t\t\t\t\t\t\t\t*set god2rel 0\n\t\t\t\t\t\t\t\t\"So Nothastrus has fled the city?\" Ylen inquires upon your return. \"No matter, gone is gone. If he tries to return he will face the combined might of The Court. I appreciate your intervention in this matter, ${name}. As promised, the power is yours plus a little extra. Now then, we all have other matters to attend to. Farewell, ${name}.\"\n\t\t\t\t\t\t\t\t*set Power +300\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t(Power +300)\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou are teleported back to the Court Center and have little choice but to return to ${planetname} for now.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*return\n\t\t\t\t\t\t\t#Enact the ultimatum, exile both.\n\t\t\t\t\t\t\t\t\"You leave The Court no choice. Ylen and the others will have you both banished,\" you proclaim.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tNothastrus laughs manically, \"I don't need The Court, The Court needs me. You have chosen to damn yourselves!\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tIn an instant, Nothastrus conjures an explosion of energy that engulfs the room. Without hesitation, Ofaldir creates a barrier surrounding both of you. When the light dissipates, Nothastrus is nowhere to be found.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"I am not happy with your decision, being.\" Ofaldir speaks, \"but I can not go against the will of The Court. May my path never cross yours or Nothastrus's ever again.\" Ofaldir's body fades away and he vanishes from sight.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\"So you were not able to resolve their conflict?\" Ylen inquires upon your return. \"That is a shame, their banishment will deal a great blow to The Court and leave a hole until they can be replaced. Regardless, you have played your part. As promised, the power is yours. Now then, we all have other matters to attend to. Farewell, ${name}.\"\n\t\t\t\t\t\t\t\t*set god4rel %+40\n\t\t\t\t\t\t\t\t*set god3rel 0\n\t\t\t\t\t\t\t\t*set god2rel 0\n\t\t\t\t\t\t\t\t*set Power +250\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t(Power +250)\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou are teleported back to the Court Center and have little choice but to return to ${planetname} for now.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*return\n\t#Step back.\n\t\tNothastrus launches toward Ofaldir.\n*label attackscene\n\nThe two clash together and sparks of lightning shoot across the room. Wrestling on the ground and in the air, you watch helplessly as they strike blows at one-another.\n\nSlivers of essence flutter around you as they are shred from their masters during the brawl. You do your best to collect those that come near you, but don't dare get to close to the fray.\n*set Power +12\n\n(Power +12)\n\nAfter a short while, the two separate, realizing they are evenly matched.\n*page_break\n*goto finalchoice", "quest6": "*disable_reuse\n*temp reward 200\n*if god6rel>62\n\t\"Greetings, ${name}!\" You turn to find a large god walking up the steps behind you. He takes the form of a white bird, but with four distinct appendages, upon two he walks and the other two he holds interlaced behind his back. \"I am Asos, glad we could finally meet. I hear you've thrust Calabius into a world of chaos by turning his followers over to me,\" Asos chuckles, \"I wanted to thank you. Here, as a thanks.\" Asos extends one of his talons and streams a portion of power into you.\n\t*set power +250\n\t\n\t(Power +250)\n\n\tI could use the help of an intelligent being such as yourself. I am trying to write a few new commandments for my mortals, but I could use a second opinion on some. I will pay you for your efforts of course, what do you say?\"\n\t*goto continue\n*else\n\t\"Greetings, ${name}!\" You turn to find a large god walking up the steps behind you. He takes the form of a white bird, but with four distinct appendages, upon two he walks and the other two he holds interlaced behind his back. \"I am Asos, glad we could finally meet. I've heard your name a few times around the Court. I could use the help of an intelligent being such as yourself. I am trying to write a few new commandments for my mortals, but I could use a second opinion on some. I will pay you for your efforts of course, what do you say?\"\n\t*goto continue\n*label continue\n*fake_choice\n\t#\"Of course, Asos.\"\n\t#\"How much pay are we talking?\"\n\t\t\"Hmm,\" Asos ponders for a moment, \"Does 200 celestial power sound appropriate?\"\n\t\t*fake_choice\n\t\t\t#\"Lead the way.\"\n\t\t\t\t*goto continue2\n\t\t\t#\"300 would make it worth my time.\"\n\t\t\t\tAsos hesitates, \"Very well, but I expect a phenomenal consultation.\"\n\t\t\t\t*set reward 300\n\t\t\t\t*goto continue2\n\t#\"Not now, I have prior commitments I'm afraid.\"\n\t\t\"What a shame, very well. It was still a pleasure meeting you face to face at last. I'm sure our paths will cross again.\" Asos continues into the courthouse.\n\t\t\n\t\t\"I'm afraid there are no further requests, ${name},\" the servant remarks.\n\t\t\n\t\tWith no further leads, you return to ${planetname} for now.\n\t\t*page_break\n\t\t*return\n*label continue2\nAsos leads you up a spiral staircase which you had never seen before inside the Courthouse. At the top exists an elegantly decorated room with windows peering over the rest of the Court.\n\n\"Now then, I have what I've written so far jotted down here.\" He reviews a golden parchment that resides on his desk. He picks it up, grasping the paper with one claw and holding a monocle up to his eye with the other.\n\nYou glance at Asos and the first question pops into your head, \"First off…\"\n*temp duntalked false\n*label choice1\n*fake_choice\n\t#\"Is the monocle really necessary?\"\n\t\tAsos scoffs at your query, \"I can assure you it is, ${name}. How would you expect me to read without it? What a silly question.\" He returns to reviewing the parchment silently.\n\t\t*set duntalked true\n\t\t*goto choice1\n\t#\"This is a beautiful office you have.\"\n\t\tHe smiles, \"Thank you, it was a quite a fierce battle that took place over this space, but the others of the Court, of course, never stood a chance.\"\n\t\t*set duntalked true\n\t\t*goto choice1\n\t#\"How do you plan on introducing these new commandments?\"\n\t\t\"I'm not quite sure yet. There's always the classic way of sending another prophet down, but it always becomes such an ordeal with them. Mass genocide almost every time.\" Asos looks up in thought, \"this time I might try something more direct, like a lightning strike that burns the words directly into a monument.\"\n\t\t*fake_choice\n\t\t\t#\"That sounds like a good idea.\"\n\t\t\t\tAsos nods in agreement, \"yes, I think I might do that instead.\"\n\t\t\t#\"I'd stick with prophets, they're still reliable.\"\n\t\t\t\tAsos nods in agreement, \"perhaps you're right.\"\n\t\t*set duntalked true\n\t\t*goto choice1\n\t*if (duntalked) #\"Alright, lets hear these commandments.\"\n\"First,\" he proclaims, \"Thou shall share all things.\"\n*temp answers 0\n*fake_choice\n\t#\"Let me stop you right there…\"\n\t\t\"You don't believe all material possessions should be distributed equally among mortals?\" Asos inquires.\n\t\t*fake_choice\n\t\t\t#\"Hard workers should earn more.\"\n\t\t\t\tAsos contemplates your suggestion for a few moments, \"That does seem fair, I suppose. Though, I will have to ensure all mortals receive equal opportunity then. Very well, I will change it.\" \n\t\t\t\t*set answers +1\n\t\t\t\t*goto next1\n\t\t\t#\"Obviously, leaders and masters should have more.\" \n\t\t\t\t*set god6rel -4\n\t\t\t\t*set Evil +8\n\t\t\t\tAsos seems taken back, \"I discourage hierarchy among my mortals. That may work in your world, ${name}, but I enjoy my mortals being treated equally. I will let that commandment stay for now.\" \n\t\t\t\t*set answers +1\n\t\t\t\t*goto next1\n\t\t\t#\"Perhaps you're right, continue.\"\n\t\t\t\t*goto next1\n\t#\"Sounds good to me, go on.\"\n*label next1\nHe continues down his list of commandments, \"Second, thou shall kill only those imprisoned.\"\n*fake_choice\n\t#\"Hang on a second…\"\n\t\t\"Does it not make sense to kill dangerous prisoners? It will reduce mortal costs on prison upkeep,\" Asos suggests.\n\t\t\n\t\tYou find Asos' arguments stretching new reaches of your mind, finally able to use the intellect your power has given you.\n\t\t*fake_choice\n\t\t\t#\"Yes, but what of those wrongfully imprisoned?\"\n\t\t\t\t*set Evil -3\n\t\t\t\t\"Hmm,\" Asos thinks for a moment, \"that is a valid point I hadn't thought of. Very well, I will reconsider that one.\"\n\t\t\t\t*set answers +1\n\t\t\t\t\n\t\t\t\tHe \n\t\t\t\t*goto next2\n\t\t\t#\"Prisoners should be conscripted as soldiers or gladiators.\"\n\t\t\t\t*set god6rel +4\n\t\t\t\t*set Evil +1\n\t\t\t\tAsos raises an eyebrow, \"That could work, it would empower nations' military and economy. Good thinking, ${name}.\"\n\t\t\t\t*set answers +1\n\t\t\t\t\n\t\t\t\tHe \n\t\t\t\t*goto next2\n\t\t\t#\"That is an excellent point, the economy needs to flourish.\"\n\t\t\t\tAsos nods and \n\t\t\t\t*goto next2\n\t#\"Makes sense.\"\n\t\tAsos nods and \n*label next2\ncontinues down the list, \"Third, females should be held sacred and offer at least two children each.\"\n*fake_choice\n\t#\"That one definitely needs to change.\"\n\t\tAsos seems surprised, \"I thought you would agree with this one. Only females can produce offspring among my mortals. This commandment would protect them and ensure the population of my worshippers does not dwindle. I had considered increasing it to a minimum of three children.\"\n\t\t*fake_choice\n\t\t\t#\"Some women may prefer not to bear any children.\"\n\t\t\t\tAsos lowers his monocle and scratches his feathery chin, \"I will do further investigation before enacting that one then. You may be right.\"\n\t\t\t\t*set answers +1\n\t\t\t\t*goto next3\n\t\t\t#\"Only three? Gods need as many worshippers as possible.\"\n\t\t\t\t*set god6rel +2\n\t\t\t\t\"Well, I wouldn't want them growing too quickly. They already use more resources than they should be. Very well, I will increase it to three children each!\"\n\t\t\t\t*set answers +1\n\t\t\t\t*goto next3\n\t\t\t#\"On second thought, I suppose that is reasonable.\"\n\t\t\t\t*set god6rel +2\n\t\t\t\t*goto next3\n\t#\"I could see the reasoning behind that.\"\n*label next3\n\n\"Lastly,\" Asos states, \"worship must take place three times per week.\"\n*fake_choice\n\t#\"That seems a bit excessive.\"\n\t\t\"Previously, I had no regulation and my mortals only worshiped me once per week. With this divine law in effect I will, in theory, receive three-times as much power from them.\"\n\t\t*fake_choice\n\t\t\t#\"Yes, but at the cost of your worshippers' freedom.\"\n\t\t\t\t*set god6rel %+6\n\t\t\t\t\"I wonder,\" Asos ponders, \"I hadn't considered, but if forced I suppose the strength of their worship wouldn't be as great. You're right, I may rewrite this one.\"\n\t\t\t\t*set answers +1\n\t\t\t\t*goto next4\n\t\t\t#\"I recommend moderation. Perhaps two times per week?\"\n\t\t\t\t*set god6rel %+6\n\t\t\t\t\"Good point, ${name}. They may be more willing to accept two time per week rather than jumping to three.\"\n\t\t\t\t*set answers +1\n\t\t\t\t*goto next4\n\t\t\t#\"I hadn't considered the power advantage.\"\n\t\t\t\tThe god simply nods his head in response. \n\t\t\t\t*goto next4\n\t#\"That's a good idea. Greater frequency means more power.\"\n*label next4\nAsos places the parchment back on the table. \n*if (answers=0)\n\t*set god6rel 30\n\t\"${name}, I had asked for assistance in hopes that you would offer constructive feedback, but you didn't modify a single commandment.\" Asos sighs, \"I am a god of my word, here is the restitution for your time.\" He feeds a great stream of power into you; you can feel the very fibers of your being strengthening. \"Farewell, ${name}.\"\n*if (answers=1)\n\t*set god6rel -5\n\t\"Well, at least you offered a constructive argument on one of my amendments.\" Asos seems disappointed, \"I am a god of my word, here is the restitution for your time.\" He feeds a great stream of power into you; you can feel the very fibers of your being strengthening. \"Farewell, ${name}.\"\n*if (answers>1)\n\t*set god6rel +20\n\t\"That's all of them! I appreciate your feedback, ${name}, you've opened my eyes to several flaws. No doubt my mortals are grateful.\" He feeds a great stream of power into you; you can feel the very fibers of your being strengthening. \"Farewell, ${name}, I'm certain our paths will cross again soon.\"\n*set power +reward\n\n(Power +${reward})\n\n*set pflux power\n*set pflux /20\n*set pflux round(pflux)\n*if power>699\n\t*choice\n\t\t#Leave.\n\t\t\tAsos suddenly vanishes and you are left alone to guide yourself out.\n\t\t\t*page_break\n\t\t\t*return\n\t\t#Ensnare him in a chain of energy. (Attack Asos)\n\t\t\t*set Evil +20\n\t\t\t*goto attacking\n*else\n\tAsos suddenly vanishes and you are left alone to guide yourself out.\n\t*page_break\n\t*return\n*label attacking\nYou lash out and entrap Asos, celestial energy entangling his body.\n*set power -pflux\n\n(Power -${pflux})\n\n\"How dare you!\" he snaps. Mustering his strength, Asos emits a massive explosion of power, knocking you back and destroying the upper tower.\n*set power -144\n\n(Power -144)\n\nWith his wings spread, Asos floats stationary in front of you, \"It seems you are as foolish as Ofaldir believed. I will tear your power from you and if you don't resist, I may spare your miserable life.\"\n\n\"You're the fool, Asos, for prolonging your own suffering!\" you shout.\n*set pflux Power\n*set pflux /4\n*set pflux round(pflux)\n*fake_choice\n\t*if (Power>323) #Launch a massive beam of energy toward him. (-Momentous Power)\n\t\t*set power -323\n\t\tConjuring your strength, you fire a colossal ray toward Asos. He rapidly tries to dodge, but is too slow. Your shot tears his right wing apart and it quickly evaporates into a wispy essence.\n\n\t\t(Power -323)\n\t\t\n\t\tAsos falls to the tower floor alongside you, dazed from the powerful blow.\n\t*if (Power>241) #Fire rapid missiles and knock him down. (-Great Power)\n\t\tIn rapid succession, you unleash a flurry of lightning bolts from your fingertips and they strike Asos at his core. Though individually the bolts aren't very potent, combined they are enough to daze the god and he falls to the tower floor alongside you.\n\t\t*set power -241\n\t\t\n\t\t(Power -241)\n\t#Lunge toward Asos and attack him at melee range.\n\t\tYou push off the tower floor and fly toward Asos, grabbing onto him by his wings. Sporadically, he tries to shake you off, but using your might you severe his wings from his body and you both fall to the ground.\n\t\t*set power -pflux\n\t\t\n\t\tPower -${pflux}\n\t\t\n\t\tThe impact you both make is grand and shreds of essence are lost to the abyss around you.\n*line_break\n*line_break\n*set pflux Power\n*set pflux /3\n*set pflux round(pflux)\nBefore you can react, Asos is already up, his physical form shed, and summoning a massive sphere of light above him.\n*fake_choice\n\t*if (Power>317) #Conjure an explosion around yourself to knock him away. (-Momentous Power)\n\t\tYour essence explodes outward and Asos is sent flying, the sphere dissipating into nothingness. You launch yourself upward, now floating yourself, and glance toward the location Asos landed, a distant cloud that hovers above the remainder of the Court.\n\t\t*set Power -317\n\t\t\n\t\t(Power -317)\n\t*if (Power>267) #Siphon the energy from the sphere. (-Great Power)\n\t\tWith one arm raised, you draw the energy from the orb as quickly as Asos can supply it. He glances down at you, enraged. Without it fully empowered, Asos slams the sphere into the ground between you both and you're sent flying. Though you manage to catch yourself, Asos lands further away, a distant cloud that hovers above the remainder of the Court.\n\t\t*set Power -267\n\t\t\n\t\t(Power -267)\n\t#Knock him back down.\n\t\tYou tackle Asos back to the g
