pe that together we can deter it.\"\n\t#Remain silent.\n\t\tYlen gazes into space alongside you. \"Titans are the most powerful beings in existence,\" she remarks, \"but together, we have to hope we can deter it.\"\n*fake_choice\n\t#\"You don't believe we can destroy it?\"\n\t\tShe pauses for a moment, providing no answer, \"regardless, we must consider the safety of all. I don't believe we should take any risks.\"\n\t#Say nothing.\n*temp killingspree 0\n*temp loner false\n\n*if god1rel > 0\n\t*set speaker1 \"Oberon\"\n\t*if god2rel > 0\n\t\t*set speaker2 \"Nothastrus\"\n\t\t*goto notloner\n\t*elseif god3rel > 0\n\t\t*set speaker2 \"Ofaldir\"\n\t\t*goto notloner\n\t*elseif god5rel > 0\n\t\t*set speaker2 \"Calabius\"\n\t\t*goto notloner\n\t*elseif god6rel > 0\n\t\t*set speaker2 \"Asos\"\n\t\t*goto notloner\n\t*else\n\t\t*set speaker2 \"Ylen\"\n\t\t*goto notloner\n\t\n*elseif god2rel > 0\n\t*set speaker1 \"Nothastrus\"\n\t*if god3rel > 0\n\t\t*set speaker2 \"Ofaldir\"\n\t\t*goto notloner\n\t*elseif god5rel > 0\n\t\t*set speaker2 \"Calabius\"\n\t\t*goto notloner\n\t*elseif god6rel > 0\n\t\t*set speaker2 \"Asos\"\n\t\t*goto notloner\n\t*else\n\t\t*set speaker2 \"Ylen\"\n\t\t*goto notloner\n\n*elseif god3rel > 0\n\t*set speaker1 \"Ofaldir\"\n\t*if god5rel > 0\n\t\t*set speaker2 \"Calabius\"\n\t\t*goto notloner\n\t*elseif god6rel > 0\n\t\t*set speaker2 \"Asos\"\n\t\t*goto notloner\n\t*else\n\t\t*set speaker2 \"Ylen\"\n\t\t*goto notloner\n\n*elseif god5rel > 0\n\t*set speaker1 \"Calabius\"\n\t*if god6rel > 0\n\t\t*set speaker2 \"Asos\"\n\t\t*goto notloner\n\t*else\n\t\t*set speaker2 \"Ylen\"\n\t\t*goto notloner\n*elseif god6rel > 0\n\t*set speaker1 \"Asos\"\n\t*set speaker2 \"Asos\"\n\t*goto notloner\n*else\n\t*set loner true\n\t*goto YlenOnly\n\n*label notloner\n${speaker1} suddenly interrupts, \"We're ready, Ylen, ${name}.\" \n*if power > 1800\n\tHe nods at you both. Your power has grown tremendously and it is recognizable. \nHis essence pulses with power, he is clearly ready for battle.\n\n\"${speaker1} and ${name}, I want you to get as far from here as you can before this thing attacks. You two will strike from behind and flank the Titan while the rest of us keep it busy. Hit it with everything you've got,\" Ylen commands. \"Go now.\"\n\n${speaker1} nods and takes off, you quickly follow suit. You are both silent the entire journey. You fly quite some distance as quickly as you can and turn to see it. The Court appears as a tiny shimmering dot far off in space, on its left infinitely more glimmers of essence floating through space mixed with debris and ethereal clouds of all shapes and colors, and to the right, nothing but black void.\n\n${speaker1} looks on in horror as the void appears to swallow everything in its path. \"How will we ever stop something like this?\" his voice seems drained of all hope.\n*rand pflux 1400 1700\n*fake_choice\n\t#\"If we strike together we stand a chance.\"\n\t\t${speaker1} sighs, \"It's approaching the city now, we must attack!\"\n\t\t\n\t\tThe god charges toward the encroaching Titan and, after a brief moment, you charge toward the being as well, prepared to strike.\n\t\t*goto attacking\n\t*if (numdead>2) #\"You must give me your essence.\"\n\t\t${speaker1} seems utterly taken back. \"What?\" he cries, \"you can't be serious?\"\n\t\t*fake_choice\n\t\t\t#\"It is the only way our power will be strong enough to defeat the Titan.\"\n\t\t\t#\"There's no time; don't make me use force!\"\n\t\t\"No, no, I will not sacrifice myself to you!\" he cries. Seeing the intent in your eyes, he quickly tries to fly back toward the Court.\n\t\t*fake_choice\n\t\t\t#Vaporize him.\n\t\t\t\t*set killingspree +1\n\t\t\t\tChanneling your great pool of power, you unleash the greatest bolt of electricity you've ever conjured. The lightning travels for light-years until it finally makes contact with ${speaker1}. The god screams in agony and you watch as his essence melts from his body and seeps into the surrounding Aether. t a mass of dissolved essence where the old god previously floated.\n\t\t\t\t\n\t\tQuickly, the now wandering essence swarms into you, nearly tripling the power you exerted killing the god.\n\t\t*set power +pflux\n\t\t\t\t\n\t\t(Power +${pflux})\n\t\t\t\t\n\t\tThe power you wield is unlike anything you've ever felt before. \n\t\t*if animal !=\"Incorporeal\"\n\t\t\tYour physical form is shredded by the culmination of energy, impossible to sustain. \n\t\tThe fabric that weaves the realm together slowly becomes more clear to you and the arcane networks that form your mind grow greater and greater. But with the power, comes a greater craving for more.\n\t\t*if speaker1 = \"Nothastrus\"\n\t\t\t*set god2rel 0\n\t\t\t*set numdead +1\n\t\t\t*goto attacking\n\t\t*elseif speaker1 = \"Ofaldir\"\n\t\t\t*set god3rel 0\n\t\t\t*set numdead +1\n\t\t\t*goto attacking\n\t\t*elseif speaker1 = \"Calabius\"\n\t\t\t*set god5rel 0\n\t\t\t*set numdead +1\n\t\t\t*goto attacking\n\t\t*elseif speaker1 = \"Asos\"\n\t\t\t*set god6rel 0\n\t\t\t*set numdead +1\n\t\t\t*goto attacking\n\t\t*elseif speaker1 = \"Oberon\"\n\t\t\t*set god1rel 0\n\t\t\t*set numdead +1\n\t\t\t*goto attacking\n\n*label YlenOnly\nYou look on as the creature grows larger and see nothing but black void behind it, not even distant stars shimmer.\n*rand pflux 1400 1700\n*fake_choice\n\t#\"If we strike together we stand a chance.\"\n\t\tYlen sighs, \"It's approaching the city now, we must strike!\"\n\t\t\n\t\tShe charges toward the encroaching Titan and, after a brief moment, you charge toward the being as well, prepared to strike.\n\t\t*goto attacking\n\t#\"You must give me your essence.\"\n\t\tYlen seems utterly taken back. \"What?\" she cries, \"you can't be serious?\"\n\t\t*fake_choice\n\t\t\t#\"It is the only way our power will be strong enough to defeat the Titan.\"\n\t\t\t#\"There's no time; don't make me use force!\"\n\t\t\"You are mad! A Titan is at our door and you seek to steal my power? I knew you were not to be trusted,\" she cries. \"If you make one move toward me I will strike you down!\"\n\t\t*fake_choice\n\t\t\t#Vaporize her.\n\t\t\t\t*set killingspree +1\n\t\t\t\tChanneling your great pool of power, you place a palm on Ylen and unleash the greatest charge of electrical potential you've ever conjured. She screams in agony, unable to move. You watch as the essence melts from her body and seeps into the surrounding Aether. Slowly, her cries fade as the overwhelming power dissipates, leaving nothing but a mass of dissolved essence where the god previously floated.\n\t\t\t\t\t\t\n\t\t\t\tYou move closer and outstretch one hand. The power you collect nearly doubles that which you exerted killing her.\n\t\t\t\t*set pflux +600\n\t\t\t\t*set power +pflux\n\t\t\t\t\t\t\n\t\t\t\t(Power +${pflux})\n\t\t\t\t\t\t\n\t\t\t\tThe power you wield is unlike anything you've ever felt before. \n\t\t\t\t*if animal !=\"Incorporeal\"\n\t\t\t\t\tYour physical form is shredded by the culmination of energy, impossible to sustain.  \n\t\t\t\tThe fabric that weaves the realm together slowly becomes more clear to you and the arcane networks that form your mind grow greater and greater. But with the power, comes a greater craving for more.\n\t\t\t\t*set god4rel 0\n\t\t\t\t*set numdead +1\n\t\t\t\t*goto noalliesattack\n\t\t\t#Let her go.\n\t\t\t\t\"Very well, die by the Titan then.\"\n\t\t\t\t\n\t\t\t\tShe turns and flies toward the Titan.\n\t\t\t\t*goto attacking\n\t#Attack her by surprise.\n\t\t*set killingspree +1\n\t\tChanneling your great pool of power, you place a palm on Ylen and unleash the greatest charge of electrical potential you've ever conjured. She screams in agony, unable to move. You watch as the essence melts from her body and seeps into the surrounding Aether. Slowly, her cries fade as the overwhelming power dissipates, leaving nothing but a mass of dissolved essence where the god previously floated.\n\t\t\t\t\n\t\tYou move closer and outstretch one hand. The power you collect nearly doubles that which you exerted killing her.\n\t\t*set pflux +600\n\t\t*set power +pflux\n\t\t\t\t\n\t\t(Power +${pflux})\n\t\t\t\t\n\t\tThe power you wield is unlike anything you've ever felt before. \n\t\t*if animal !=\"Incorporeal\"\n\t\t\tYour physical form is shredded by the culmination of energy, impossible to sustain.  \n\t\tThe fabric that weaves the realm together slowly becomes more clear to you and the arcane networks that form your mind grow greater and greater. But with the power, comes a greater craving for more.\n\t\t*set god4rel 0\n\t\t*set numdead +1\n\t\t*goto noalliesattack\n\n\n*label noalliesattack\nAs fast as light will carry you, you charge at the great Titan. As you approach, its incredible mass becomes ever more apparent to you. It appears as an enormous black cloud, electrical spikes arc across its surface.\n\nThe Titan's anatomy as a whole looks as if the power contained within is battling itself, trying to break free of the celestial bonds it is forced to create. There is seemingly no order, the being has become nothing but chaos.\n\nCloser and closer the darkness looms until, at last, you make contact with the creature's dark husk. Just as any cloud, you fly straight through it and find yourself in a void even darker than that of the Aether, but still, you travel forward. You sense the great potential of the being as you pass through its divine strands. Suddenly, you begin suffocating inside the beast's black belly, as if the life were being squeezed out of you, until finally you pierce the beast's opposite side and find yourself within the Aether once again. A deafening wail erupts from the Titan.\n\n*goto skipto\n\n*label attacking\n*page_break\nAs fast as light will carry you, you charge at the great Titan. As you approach, its incredible mass becomes ever more apparent to you. It appears as an enormous black cloud, electrical spikes arc across its surface. In the distance you can hear the shouting, but you never look away from the monstrosity. With what you have, you prepare for your impact with the beast.\n\n*if numdead\u003c5\n\tCloser and closer the darkness looms until, at last, you make contact with the creature's dark husk. Just as any cloud, you fly straight through it and find yourself in a void even darker than that of the Aether, but still you travel forward. You sense the great potential of the being as you pass through its divine strands. Suddenly, you start to suffocate inside the beast's black belly, as if the life were being squeezed out of you. Whispers grow loud around you with no discernible source, incessantly asking a single question, \"why? why? why?\" until finally you pierce the beast's opposite side and find yourself within the Aether once again.\n\t*if speaker2 != \"Ylen\"\n\t\t*line_break\n\t\t*line_break\n\t\tTo your right, ${speaker2} flies back, supposedly tossed aside by the Titan's powerful blows. He regains his repose and draws a divine sword from thin air, emanating a holy aura. A deafening wail erupts from the Titan as ${speaker2} prepares to charge the cloud-like monstrosity once more.\n\t\t*rand pflux 200 250\n\t\t*fake_choice\n\t\t\t#Grab ${speaker2} and crush the essence from him.\n\t\t\t\tYou lash out, extending an arm until you intercept ${speaker2}'s charge.\n\t\t\t\t\n\t\t\t\t\"What? What are you doing, ${name}!?\" he shouts before you tighten your grasp. He cries out in pain before lunging his blade into your appendage. The blade stings, but it isn't enough to release your grip. You continue to constrict the god, squeezing out what is left of his already weakened state; all the while the Titan inches closer to the golden gates.\n\t\t\t\t*set power -pflux\n\t\t\t\t\n\t\t\t\t(Power -${pflux})\n\t\t\t\t*fake_choice\n\t\t\t\t\t#\"I am sorry, there is no other way.\"\n\t\t\t\t\t\n\t\t\t\t\t#Remain silent.\n\t\t\t\tWith his dying breath, ${speaker2} curses your name, \"Fiend…\" \n\t\t\t\t\n\t\t\t\tSoon ${speaker2}'s body gives way and essence pours from his corpse. The Titan's immense pull tries to tear the loose essence from your grasp, but you are quick to absorb it before it is diluted by the vast creature's mass.\n\t\t\t\t*set power +1457\n\t\t\t\t\n\t\t\t\t(Power +1457)\n\t\t\t\t\n\t\t\t\tBeaming with power, it feels as if the bonds holding your body together are going to burst. You turn your attention back toward the great Titan. Its rolling fog seems to have slowed to a crawl.\n\t\t\t\t*if speaker2 = \"Nothastrus\"\n\t\t\t\t\t*set god2rel 0\n\t\t\t\t\t*set numdead +1\n\t\t\t\t\t*goto illegaltofall\n\t\t\t\t*elseif speaker2 = \"Ofaldir\"\n\t\t\t\t\t*set god3rel 0\n\t\t\t\t\t*set numdead +1\n\t\t\t\t\t*goto illegaltofall\n\t\t\t\t*elseif speaker2 = \"Calabius\"\n\t\t\t\t\t*set god5rel 0\n\t\t\t\t\t*set numdead +1\n\t\t\t\t\t*goto illegaltofall\n\t\t\t\t*elseif speaker2 = \"Asos\"\n\t\t\t\t\t*set god6rel 0\n\t\t\t\t\t*set numdead +1\n\t\t\t\t\t*goto illegaltofall\n\t\t\t\t*goto illegaltofall\n\t\t\t#Join ${speaker2}'s attack.\n\t\t\t\tYou charge alongside ${speaker2}, desperately trying to cut the fibers that hold the Titan together.\n\t\t\t\t\n\t\t\t\t\"It's no use,\" ${speaker2} claims, still swinging his blade wildly, each strike chipping away at the Titan's infinite mass, \"Its husk is impenetrable, we need to find another way!\"\n\t\t\t\t*goto illegaltofall\n\t*goto illegaltofall\nCloser and closer the darkness looms until, at last, you make contact with the creature's dark husk. Just as any cloud, you fly straight through it and find yourself in a void even darker than that of the Aether, but still you travel forward. You sense the great potential of the being as you pass through its divine strands. Suddenly, you start to suffocate inside the beast's black belly, as if the life were being squeezed out of you. Whispers grow loud around you with no discernible source, incessantly asking a single question, \"why? why? why?\" until finally you pierce the beast's opposite side and find yourself within the Aether once again.\n*label illegaltofall\n*line_break\n*line_break\n*if (god4rel > 0)\n\tYou hear Ylen cry out from space, \"Break its gaze, rip the essence from its eyes!\"\n\n*if numdead>3\n\tDashing toward the gates you find Ylen accompanied by the two gatekeepers. \n*if numdead\u003c4\n\tDashing toward the gates you find the others accompanied by the gatekeepers. \nPeering toward them, you witness the hideousness that is the Titan's face. Still consisting of the same ethereal mush as its body, the creature's eyes are held together only by a few strands of essence stretched to ungodly proportions. The Titan's anatomy as a whole looks as if the power contained within is battling itself, trying to break free of the celestial bonds it is forced to create. There is seemingly no order, the being has become nothing but chaos.\n\nSwallowing your disgust, you glance back at Ylen just in time to witness a massive tendril, as large as the golden gates themselves, sweep  down from the upper reaches of the Aether and crush one of the guardians, obliterating it in a single blow and simultaneously absorbing its essence. Then, another tendril of smoky essence propels out of the Titan's husk, seeking the god. In an act of desperation to save the court god, the remaining gatekeeper dashes between them and the Titan's appendage impales the noble creature. In a rage, Ylen, strikes the tendril with a celestial whip and it becomes severed, leaving a pool of essence that she absorbs. The Titan's relentless assault continues as you see another tendril forming, prepared to strike her from behind.\n*fake_choice\n\t#Warn Ylen\n\t\t\"Behind you, Ylen!\" you shout. She dashes aside just in time to evade the creature's swing and sever the Titan's mass.\n\t\t\n\t\t*if (god1rel > 0)\n\t\t\tOberon appears nearby, \"Stand together!\" he shouts and, from him, a massive beam of energy strikes across the sky, tearing away a portions of the hideous Titan's face. The being roars in response and seems dazed by the incredible attack. \n\t\t\n\t\t\"Together,\" Ylen cries out, \"\n\t\t*if god1rel > 0\n\t\t\tOberon, \n\t\t*if god2rel > 0\n\t\t\tNothastrus,\n\t\t*if god3rel > 0\n\t\t\tOfaldir, \n\t\t*if god5rel > 0\n\t\t\tCalabius, \n\t\t*if numdead\u003c3\n\t\t\tand \n\t\t*if god6rel > 0\n\t\t\tAsos,\n\t\tcome together and unite our attacks against the Titan. You fly to her, but suddenly the fog grabs you from behind and pulls you toward its core. \n\t\t\n\t\t\"${Name}!\" You hear Ylen cry out.\n\t\t*page_break\n\t\tThe titan's power wraps itself around you until everything is black and you once again feel suffocated by the pressure. Slowly, the being starts to crush you.\n\t\t*set power -247\n\t\t\n\t\t(Power -247)\n\t\t\n\t\t*temp beingkilled 0\n\t\t*label choice1\n\t\t*set pflux power\n\t\t*if beingkilled=0\n\t\t\t*set pflux /4\n\t\t\t*set pflux round(pflux)\n\t\t*if beingkilled=1\n\t\t\t*set pflux /3\n\t\t\t*set pflux round(pflux)\n\t\t*if beingkilled=2\n\t\t\t*set pflux /2\n\t\t\t*set pflux round(pflux)\n\t\t\t*goto notkilled\n\t\t*fake_choice\n\t\t\t#Forcefully tear yourself from its grasp. (-Enormous Power)\n\t\t\t\tFuriously, you strike the air in an effort to escape, but to no avail.\n\t\t\t\t*set pflux +73\n\t\t\t\t*set power -pflux\n\t\t\n\t\t\t\t(Power -${pflux})\n\t\t\t\t*set beingkilled +1\n\t\t\t\t*goto choice1\n\t\t\t#Blast your way out. (-Tremendous Power)\n\t\t\t\tBlow after blow, you emit the most powerful bursts of energy you can muster, but the Titan's essence reconstitutes faster than you can maneuver.\n\t\t\t\t*set pflux -73\n\t\t\t\t*set power -pflux\n\t\t\n\t\t\t\t(Power -${pflux})\n\t\t\t\t*set beingkilled +1\n\t\t\t\t*goto choice1\n\t\t*label notkilled\n\t\t*line_break\n\t\t*line_break\n\t\tYour senses begin to grow weak and you have difficulty feeling the flow of essence around you. \n\t\t*set power -pflux\n\t\t\n\t\t(Power -${pflux})\n\t\t\n\t\t*if (essencestones>0)\n\t\t\t*set essencestones -1\n\t\t\tYou crush the Essence Stone you withheld, but the power within is immediately consumed by dark space around you.\n\t\t\t\t\n\t\tIn the distance, you faintly hear the cries, but are too weak to discern their voices.\n\t\t*set pflux (power)\n\t\t*fake_choice\n\t\t\t#Give in to the Titan's grasp.\n\t\t\t\tRealizing it is no use, you meditate and wait from the Titan to consume what remains of you, hoping that in your final moments, you can at least be at peace.\n\t\t\t\t*set power -pflux\n\t\t\t\t\n\t\t\t\t(Power -${pflux})\n\t\t\t\t*page_break\n\t\t\t\t\"Peace is something we all covet,\" an unfamiliar voice emerges from the darkness, \"but \n\t\t\t#Continue fighting.\n\t\t\t\tWith what strength you have left, you continue striking. Harnessing your rage, you become a vortex of lightning, searing the stomach of the beast. You can hear the beast cry out in pain, but soon the last of your light dies and you have nothing left to give.\n\t\t\t\t*set power -pflux\n\t\t\t\t\n\t\t\t\t(Power -${pflux})\n\t\t\t\t*page_break\n\t\t\t\t\"A warrior at heart.\" An unfamiliar voice emerges from the darkness, \"\n\t\tdisequilibrium is the nature of things. Simply to exist is a battle in itself.\"\n\t\t*goto insidetitan\n\t\t\n\t#Let the Titan strike.\n\t\t*set god4rel 0\n\t\t*set numdead +1\n\t\tThe Titan's coil comes down and strikes Ylen with unimaginable power. Over half of Ylen's body is obliterated and what remains is tossed aside.\n\t\t\n\t\tYou move in, delivering the final blow to absorb the last of Ylen's essence.\n\t\t\n\t\t\"Why?\" the dieing god asks before fading into nothing.\n\t\t*set power +2345\n\t\t\n\t\t(Power +2345)\n\t\t*page_break\n\t\t*if numdead>3\n\t\t\tOne by one you witness your once allies fall, fighting until their last breath, but ultimately succumbing to the unstoppable beast. Each torn to shreds by the Titan's great power, until finally only you remain.\n\t\t\t*set numdead 6\n\t\t\t*set god1rel 0\n\t\t\t*set god2rel 0\n\t\t\t*set god3rel 0\n\t\t\t*set god4rel 0\n\t\t\t*set god5rel 0\n\t\t\t*set god6rel 0\n\t\t*label skipto\n\t\t*set pflux power/4\n\t\t*set pflux round(pflux)\n\t\t*page_break\n\t\tThunder shoots across the heavens as the Titan begins to assail the city walls. Your power oozes from your fibers much like the Titan's, your older bonds strained by the mass you've acquired. [i]Now it is time to use it.[/i]\n\t\t\n\t\tClasping one hand with the other, like any other conjuration, you materialize a small star between your palms.\n\t\t*set power -pflux\n\t\t\n\t\t(Power -${pflux})\n\t\t\n\t\tYou fuel it, giving the orb more and more energy until, even with your immense power, you can barely contain it.\n\t\t*set pflux power/3\n\t\t*set pflux round(pflux)\n\t\t*set power -pflux\n\t\t\n\t\t(Power -${pflux})\n\n\t\tThe star illuminates the void around you and, still, you continue to feed it.\n\t\t*set pflux power/2\n\t\t*set pflux round(pflux)\n\t\t*set power -pflux\n\t\t\n\t\t(Power -${pflux})\n\t\t\n\t\tFinally, the power within the object is so great it becomes unstable and erupts.\n\t\t*page_break\n\t\tYou fly back hundreds of light-years as the great explosion lights up the Aether. The Titan howls in agony as shreds of the abomination fly through the void, leaving glimmers of light in their wake.\n\t\t\n\t\tThe walls of the Court no longer shine, the essence that held them up almost completely dissolved, but still they stand.\n\t\t\n\t\tThe great Titan lies spread across the Aether as it quickly tries to reconstitute itself, but you teleport before the being's mangled face and reach into its dismal eye. You feel the network of power that courses through the creature. As your essence makes contact with its, you feel more than just power; you feel pain, sorrow, emptiness, and anger. Rapidly though, you feel the Titan's strength growing again, you must act quickly.\n\t\t*fake_choice\n\t\t\t#Tear the creature to shreds.\n\t\t\t\tYou tear into the Titan's husk, mutilating it in a mad effort to keep it from regaining its strength.\n\t\t\t#Try to absorb its power.\n\t\t\t\tJust as Lyciph had proposed, you dig into the fibers of the being, searching for its infinitesimal bonds.\n\t\tSuddenly, the Titan unleashes a deafening roar and lunges onto you. It surrounds your body with an inescable grip and pulls you into a newly revealed black maw. \n\t\t*set pflux power/2\n\t\t*set pflux round(pflux)\n\t\t*fake_choice\n\t\t\t#Detonate your outer layer of essence. (-Enormous Power)\n\t\t\t\tYou emit a burst of energy from your core, shredding your outer essence in a colossal explosion. The Titan cries in agony, but still continues to engulf you.\n\t\t\t\t*set power -pflux\n\t\t\n\t\t\t\t(Power -${pflux})\n\t\t\t#Cut yourself free. (-Great Power)\n\t\t\t\tYou form a blade with your arm and slice into the black essence around you. Breaking the Titan's body apart, but it still continues to engulf you.\n\t\t\t\t*set power -pflux\n\t\t\n\t\t\t\t(Power -${pflux})\n\t\t*line_break\n\t\t*line_break\n\t\tYou cry out in a rage of pain and anger and begin obliterating everything within radius, essence flying into oblivion, until finally everything grows silent.\n\t\t*set power -pflux\n\t\t\n\t\t(Power -${pflux})\n\t\t*page_break\n\t\tYou spin around, trying to gain a bearing, but only nothingness exists in all directions.\n\t\t\n\t\t\"A true warrior at heart.\" An unfamiliar voice emerges from the darkness, \"disequilibrium is the nature of things. Simply to exist is a battle in itself.\"\n\t\t*goto insidetitan\n\t\t\t\n*label insidetitan\n*page_break\n*set power 0\nYou look around, but still everything is black. The sensation of being crushed is gone and you no longer feel the Titan's presence.\n\nSuddenly, another, more familiar voice, speaks, \"Master!\" ${helper} spins around you, his recognizable tail of essence spiraling behind him. \"It's good to see you again.\"\n*fake_choice\n\t#\"What?\"\n\t#\"Who?\"\n\t#\"How?\"\n\t#\"Where?\"\nYou try to ask questions, but the verbalization of your thoughts simply come out as garbled gibberish.\n\n\"Now you may finally understand,\" ${helper} continues. \"I was sent to you by The High One, Gaea, Shiva, however you call it. The being told me to guide you so that you may one day reach this moment, and here you are!\" The daemon grins and trembles proudly, both impressed by your growth and his own accomplishment.\n\nThe disembodied voice speaks again, emanating from all directions. ${helper} jumps and hides behind your body, which now is not much larger than his own. \"I know you have many questions, I have heard them. But so few can be answered. Dimensional limitations are unfathomable, just as your mortals could not understand you, you could not understand me, but you need only listen. The Titan you seek to destroy is known as Epmir Eqnia, a being that has roamed your verse for some time, but must return to the realm from which it spawned. You will be a vestige of this being ${name}. Destroy the disequilibrium and set the creature free from its immortal shackles.\" The voice slowly fades away as the last reverberations of its mighty echo distort around you.\n\nSuddenly, a dim light appears far off in the distance.\n\n\"That!\" ${helper} shouts, darting out from behind you. \"There's something important about that light. I think it wants to destroy you.\"\n*fake_choice\n\t#\"Who's voice was that?\"\n\t\t\"That was Gaea,\" ${helper} exclaims, \"it's spoken to me before. It was the being who told me to find you and how to find you.\"\n\t#\"How do you know all this?\"\n\t\t\"The High One told me long ago. Gaea, it was the being who told me to find you and how to find you.\"\n*fake_choice\n\t#\"Why me?\"\n\t#\"What is Gaea?\"\n${helper} simply responds with an inaudible shrug. \"I was told to teach you the ways of the gods and that you were a god with destiny; that you were the most important god right now.\"\n\n[i]Destiny.[/i] You had heard the word before, you taught it to your mortals, but it was a word used only by them. A mortal's destiny was a path set for them by their creator, but gods don't have destinies.\n\nThe light begins to grow brighter, as if moving closer to you or you're moving closer to it; in this infinite timeless expanse it is impossible to tell the difference.\n\nA warped and mutilated orb of black and green energy glows before you. It is the only source of light in an otherwise black vacuum. The object pulsates and essence flows within. It's beat is mesmerising.\n\nYou are drawn to it by an irresistible force. Placing what little physical body you have on the object, the light suddenly bursts.\n*page_break\nRegaining your vision, you find yourself at the bottom of a large whirlpool, dark essence swirling around you. A deafening roar blocks out any sound beyond the vortex. The energy drains into your body and then a large portion disperses into the Aether as the bright lights fade. You are weak, but alive.\n\nYou look up and see the Court walls, their light dim, but still standing. You glance around and see the Aether as it was before, stars and debris freckling the endless expanse.\n\n\"Phenomenal, Great One!\" ${helper} appears beside you, \"I think - I think the Titan is dead!\"\n*set power 20000\n*page_break\n\n*comment EVERYONE IS DEAD\n*if numdead > 5\n\tOnly now do you realize the silence that has arisen. Not a single tremor disturbs the space around you. You glance toward the Court gates nearly collapsing on top of one-another, but still standing. Their radiance has grown dim, but the Court walls still stand.\n\t\n\t${helper} speaks up, \"With the other gods dead, there is no one to watch over the Court.\"\n\t\n\tYou look down and take note of the feeble state your body is in. You can feel the essence you've consumed from the fallen titan pulsating through your fibers, but you can't escape the fatigue of battle.\n\t\n\tWearily, you enter the city through the half sundered gates. The daemons that inhabit the sanctuary peer out from around corners of the ornate structures, poised, ready to retreat again at the first sign of danger. Only when you reach the Courthouse steps, do they finally emerge.\n\t\n\tThe daemon you know as the one that once manned the Courthouse door wistfully inquires as he emerges from behind two marble stones, \"The others, are they…?\"\n\t*fake_choice\n\t\t#\"I ensured they were removed.\"\n\t\t\t\"Wha… What?\" the little daemon trembles.\n\t\t\t*label silent\n\t\t\t*fake_choice\n\t\t\t\t#\"It was the only way to ensure the Court's survival.\"\n\t\t\t\t\t*goto cont\n\t\t\t\t#Kill him.\n\t\t\t\t\t*set evil +30\n\t\t\t\t\tMustering your remaining strength, you reach out and grab the weak creature. Tightening your grip, it squeals before its essence pours into you. The daemon around the court scream in horror and rapidly try to flee the city through the collapsing gates.\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#Block their escape.\n\t\t\t\t\t\t\tYou summon a wall of energy, fueled by the energy disintegrated from those who crash into it.\n\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t#\"You will all serve me now.\"\n\t\t\t\t\t\t\t\t\t*set evil +10\n\t\t\t\t\t\t\t\t\t*goto dictatorship\n\t\t\t\t\t\t\t\t#Consume them all.\n\t\t\t\t\t\t\t\t\t*set evil +25\n\t\t\t\t\t\t\t\t\tWith one fell swoop, you siphon the essence from the miserable beings, adding it to your vast collection. With the last bit of life in proximity burned out, you collapse to the ground in exhaustion.\n\t\t\t\t\t\t\t\t\t*goto destroyed\n\t\t\t\t\t\t#Let them flee.\n\t\t\t\t\t\t\tYou watch as the hundreds of defenseless daemons run for their lives out of the Court gates, retreating into the far unknown reaches of the Aether. With the last bit of life in proximity fled, you collapse to the ground in exhaustion.\n\t\t\t\t\t\t\t*goto destroyed\n\t\t#\"I was the only one to survive.\"\n\t\t#Say nothing.\n\t\t\t\"You slew them didn't you?\" the little daemon trembles.\n\t\t\t*goto silent\n\t*label cont\n\t\"I… I see.\" The daemon, followed by the hundreds of other minuscule creatures, crowd around you. \"What are we to do now? The Court gods, the protectors, are gone.\"\n\t\n\t\"You!\" one of the little beings shouts, \"you must be the new guardian!\"\n\t\n\tThe crowd of daemons erupts into a clamor, \"Yes, will you protect us?\"\n\t*fake_choice\n\t\t#\"Yes, I will rebuild the Court.\"\n\t\t\tThe crowd of beings cheer in excitement. \"We serve you, Guardian,\" the daemon exclaims, bowing before you.\n\t\t\t*goto dictatorship\n\t\t#\"No, I am leaving.\"\n\t\t\t\"Leaving?\" the crowd exclaims hysterically, \"you can't leave! What will we do, who will protect us?\"\n\t\t\t*fake_choice\n\t\t\t\t#\"You must fend for yourselves.\"\n\t\t\t\t\tThe daemons erupt in a panic, clearly uncertain of what to do. Most flee the city and others stay and try to salvage what they can. \n\t\t\t\t\t\n\t\t\t\t\t\"But, Great One, what will you do now?\" ${helper} questions as you travel toward the Court gates.\n\t\t\t\t\t*label choice2\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t*if (race1size>0) #\"I will follow my mortals. Live with my creations and see just how far life can go.\"\n\t\t\t\t\t\t\t\"But for what purpose? Mortal races have always been a means, not an end.\"\n\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t#\"I simply have no interest in these affairs.\"\n\t\t\t\t\t\t\t\t#\"There may be more to our connection with mortal planes than is known.\"\n\t\t\t\t\t\t\t*goto destroyed\n\t\t\t\t\t\t*if (race1size=0) #\"I will start again. Create new life, new followers and see just how far life can go.\"\n\t\t\t\t\t\t\t\"But for what purpose, Great One?\" \n\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t#\"For power. My people will become the most advanced in the universe.\"\n\t\t\t\t\t\t\t\t#\"There may be more to our connection with mortal planes than you know.\"\n\t\t\t\t\t\t\t*goto destroyed\n\t\t\t\t\t\t#\"I will travel the Aether and try to unravel its secrets.\"\n\t\t\t\t\t\t\t\"A most noble goal, Great One,\" ${helper} says.\n\t\t\t\t\t\t\t*goto destroyed\n\t\t\t\t\t\t#\"I'm not sure where I'll go, but it won't be here.\"\n\t\t\t\t\t\t\t*goto destroyed\n\t\t\t\t#\"I will relinquish a portion of my power to you all.\"\n\t\t\t\t\tClasping your hands together then casting them out in a sweeping motion, you expel a large chunk of your essence into the crowd of daemons. How they use it is up to them, but as for you, you head for the golden gates to leave the city.\n\t\t\t\t\t\n\t\t\t\t\t\"But, Great One, what will you do now?\" ${helper} inquires.\n\t\t\t\t\t*goto choice2\n\n*comment EVERYONE IS DEAD EXCEPT 1\n*if numdead = 5\n\t*if god4rel > 0\n\t\t*set speaker1 \"Ylen\"\n\t\t*goto continue3\n\t*elseif god1rel > 0\n\t\t*set speaker1 \"Oberon\"\n\t\t*goto continue3\n\t*elseif god3rel > 0\n\t\t*set speaker1 \"Ofaldir\"\n\t\t*goto continue3\n\t*elseif god5rel > 0\n\t\t*set speaker1 \"Calabius\"\n\t\t*goto continue3\n\t*elseif god6rel > 0\n\t\t*set speaker1 \"Asos\"\n\t\t*goto continue3\n\t*elseif god2rel > 0\n\t\t*set speaker1 \"Nothastrus\"\n\t\t*goto continue3\n\t*label continue3\n\t\"How?\" you hear ${speaker1}'s voice assert from behind. You turn and see the being approaching you from the city's destroyed gates. \"You did it,\" she mutters, her voice dawning a melancholias tone from the destruction she's witnessed, \"how did you destroy the Titan?\"\n\t*fake_choice\n\t\t#\"I don't really know.\"\n\t\t\t\"No doubt it was the power you took from our comrades.\" She eyes you wearily, \"the mad fool was right, you were able to destroy it from the inside out, but the cost…\" she grows silent. \"The Titan is dead, that's all that matters. Without you we would've likely faced a similar fate.\"\n\t\t\t*goto looking\n\t\t#\"A being called Gaea helped me destroyed it.\"\n\t\t\t\"Gaea?\" ${speaker1} inquires calmly, \"who is Gaea?\"\n\t\t\t*fake_choice\n\t\t\t\t#\"A being of power even greater than a Titan.\"\n\t\t\t\t#\"Something beyond our dimension.\"\n\t\t\tShe grows silent, \"how could anything possibly be greater than what we just faced?\"\n\t\t\t*goto looking\n\t\t#\"I tore it apart from the inside out.\"\n\t\t\t\"So the mad fool was right?\" ${speaker1} whispers. \"A being can be shredded alive, truly a damning fate.\" She eyes you wearily, \"The Titan is dead, that's all that matters. Without you we would've all likely faced a similar fate.\"\n\t\t\t*goto looking\n\t*label looking\n\tYou look around and take note of the feeble state everything is in, including yourself. You can feel the essence you've consumed from the fallen titan pulsing through your body, but you cant shake the sensation of exhaustion.\n\t\n\tYou enter the city through the half sundered gates and the daemons that inhabit the sanctuary start cheering for you. \"The Protectors!\", \"Titan Slayers!\" they chant.\n\t\n\t${speaker1} approaches from behind, \"The Court is in ruin,\" she sighs and takes a long pause. \"I will begin rebuilding, but you, what will you do?\"\n\t*fake_choice\n\t\t#\"I will stay and help you rebuild.\"\n\t\t\t${speaker1} nods, \"you have wrought devastation, but also prevented so much more. For that, I can not turn you away. Though the Court is in ruins, together we can rebuild and achieve a new glory.\"\n\t\t\t\n\t\t\tYou follow ${speaker1} up to the Courthouse and assume your own seat alongside the others that now lie empty. \n\t\t\t*page_break\n\t\t\t*achieve courtgod\n\t\t\tIt is not long before new beings join your ranks and the Court regains its former glory, with you at its head.\n\t\t\t*if race1size = 0\n\t\t\t\tWithout a mortal race to guide, you have nothing holding you back. Perhaps in the future you will create a new race or you will guide others, but that is the destiny of the future ${name}, for now... It is simply time to rest...\n\t\t\t*if race1size > 0\n\t\t\t\tYour mortals call to you, empowering you for eternity through their faith. What becomes of them, though, is the destiny of the future ${name}, for now... It is simply time to rest...\n\t\t\t*goto ending\n\t\t#\"I will go and discover what other secrets lurk in this infinite realm.\"\n\t\t\t${speaker1} nods, her opinion seeming indifferent. \"I wish you luck, ${name}.\" She turns and walks back toward the Courthouse, reassembling her corporeal form.\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\t*goto bothendings\n\t\n\t\n*comment AT LEAST 2 ALIVE\n*if numdead \u003c 5\n\n\t*if god1rel > 0\n\t\t*set speaker1 \"Oberon\"\n\t\t*goto fix7\n\t*elseif god2rel > 0\n\t\t*set speaker1 \"Nothastrus\"\n\t\t*goto fix7\n\t*elseif god6rel > 0\n\t\t*set speaker1 \"Asos\"\n\t\t*goto fix7\n\t*elseif god5rel > 0\n\t\t*set speaker1 \"Calabius\"\n\t\t*goto fix7\n\t*elseif god3rel > 0\n\t\t*set speaker1 \"Ofaldir\"\n\t\t*goto fix7\n\t*elseif god4rel > 0\n\t\t*set speaker1 \"Ylen\"\n\t\t*goto fix7\n\t\t\n\t*label fix7\n\t*if god3rel > 0\n\t\t*set speaker2 \"Ofaldir\"\n\t\t*goto fix5\n\t*elseif god5rel > 0\n\t\t*set speaker2 \"Calabius\"\n\t\t*goto fix5\n\t*elseif god2rel > 0\n\t\t*set speaker2 \"Nothastrus\"\n\t\t*goto fix5\n\t*elseif god4rel > 0\n\t\t*set speaker2 \"Ylen\"\n\t\t*goto fix5\n\t*elseif god6rel > 0\n\t\t*set speaker2 \"Asos\"\n\t\t*goto fix5\n\t\t\n\t*label fix5\n\t*if god4rel > 0\n\t\t*set speaker3 \"Ylen\"\n\t\t*goto fix8\n\t*elseif god6rel > 0\n\t\t*set speaker3 \"Asos\"\n\t\t*goto fix8\n\t*elseif god5rel > 0\n\t\t*set speaker3 \"Calabius\"\n\t\t*goto fix8\n\t*elseif god2rel > 0\n\t\t*set speaker3 \"Nothastrus\"\n\t\t*goto fix8\n\t*elseif god1rel > 0\n\t\t*set speaker3 \"Oberon\"\n\t\t*goto fix8\n\t\n\n\t*label fix8\n\t\"You've done it!\" ${speaker1} shouts charging toward you from the gates. \"How did you do it?\" the god asks after reaching you, \"you destroyed the Titan, how?\"\n\t*fake_choice\n\t\t#\"I don't really know.\"\n\t\t\t\"What do you mean you don't know? You just destroyed the most powerful being in existence! How did you do it?\" ${speaker2} demands upon approach.\n\t\t\t*goto howser\n\t\t#\"A being called Gaea helped me destroyed it.\"\n\t\t\t*if god3rel > 0\n\t\t\t\t\"Gaea?\" Ofaldir inquires calmly, \"who is Gaea?\"\n\t\t\t\t*goto explain\n\t\t\t*else\n\t\t\t\t\"Gaea?\" ${speaker1} inquires, \"who is Gaea?\"\n\t\t\t\t*goto explain\n\t\t\t*label explain\n\t\t\t*fake_choice\n\t\t\t\t#\"A being of power even greater than a Titan.\"\n\t\t\t\t\t${speaker2} scoffs, \"greater than a Titan?\"\n\t\t\t\t\t*goto howser\n\t\t\t\t#\"Something beyond our dimension.\"\n\t\t\t\t\t${speaker2} scoffs, \"beyond our dimension?\"\n\t\t\t\t\t*goto howser\n\t\t#\"I destroyed it from the inside out.\"\n\t\t\t\"With what?\" ${speaker2} inquires. \"You just destroyed the most powerful being in existence, with a fraction of its power. How did you do it?\" The god demands.\n\t\t\t*goto howser\n\t*label howser\n\t\n\t*if speaker2 != \"Ylen\"\n\t\t\"Enough with dismal questions,\" ${speaker3} remarks, \"we've been through quite a bit, ${name} especially. The Titan is dead, we all need rest now.\"\n\t\t\n\t*if speaker2 = \"Ylen\"\n\t\tYou disregard the difficult question.\n\tYou look around and take note of the feeble state everything is in, including yourself. You can feel the essence you've consumed from the fallen titan pulsing through your body, but you cant shake the sensation of exhaustion.\n\t\n\tYou enter the city through the half sundered gates and the daemons that inhabit the sanctuary start cheering for you. \"The Protectors!\", \"Titan Slayers!\" they chant.\n\t\n\t*if (god1rel > 0)\n\t\t\"We can't rest yet,\" Oberon remarks, \n\t\t*goto continue2\n\t*else\n\t\t\"We can't rest yet,\" ${speaker2} remarks, \n\t\t*goto continue2\n\t*label continue2\n\t\"the Court must be reordered. Convene in the Courtroom, please join us ${name}.\"\n\t*page_break\n\tYou make your way up the steps, each one seems to require the strength of a thousand gods to surpass, but you pull yourself together and march to the top.\n\t\n\t\"How exciting, you may finally have a say in the ordering of the realm, Almighty One!\" ${helper} claims excitedly.\n\t*fake_choice\n\t\t#\"I am eager to join their ranks.\"\n\t\t\t\"Yes, you will be revered by all beings of the realm!\"\n\t\t#\"They'll have no choice but to heed me now.\"\n\t\t\t\"Yes, at last your greatness will be acknowledged!\" \n\t\t#\"I don't plan on sticking around for long.\"\n\t\t\t${helper} looks at you curiously, but doesn't have time to question you before you enter the Courthouse.\n\t\n\t\"${name} please, take Lyciph's throne. The traitor will not be missed,\" ${speaker1} suggests.\n\t*fake_choice\n\t\t#Take the seat.\n\t\t\t*if god4rel > 0\n\t\t\t\tYou walk to the marble throne, identical to the others, and take your seat on Ylen's left side.\n\t\t\t*if god4rel = 0\n\t\t\t\tYou walk to the marble throne, identical to the others, and take your seat next to an empty throne where Ylen once sat.\n\t\t\t\n\t\t#Remain standing.\n\t\t\tYou remain standing at the Courtroom door, the other gods stare at you curiously, but continue on with business, disregarding your barbarity.\n\t\t\t\n\t\t#Conjure your own throne at the head. (-Momentous Power)\n\t\t\tGathering what little strength you have, you construct a unique throne at the head of the room. The gods stare at you brazenly, not oblivious to the statement you're making, but they say nothing and continue on with business.\n\t\t\t\n\t${speaker1} speaks up, \"Obviously the gate's repair must be top priority. We can't allow any wild entities to take advantage of our weakened state. The primary reason behind this urgent meeting is to discuss the future of the order once we've regathered our strength. With our numbers thinned, some restructuring is necessary,\" the god pauses momentarily. \n\t*if numdead > 1\n\t\t\"${name}, you've slain some of our order. \n\t\t*if god5rel = 0\n\t\t\tCalabius, \n\t\t*if god6rel = 0\n\t\t\tAsos, \n\t\twhether it was just or not, that is an act that can not go unrecognized.\"\n\t\n\t\t*if god2rel > 0\n\t\t\tNothastrus glares at you distrustfully from across the rotunda.\n\t\t\n\t\t\"But…\" ${speaker2} interjects awkwardly, \"…we find ourselves in destitution.\"\n\t\n\t\t${speaker1} scowls, \"${name}, would you abandon your quest for domination and accept the duty of becoming one of us, a Court God, and pursue peace and order?\"\n\t*if numdead \u003c 2\n\t\t\"${name}, your power has grown significantly and you may have just saved us all from a horrid fate. I offer you a seat among our Court. Will you accept the duty of becoming one of us, a Court God, and pursue peace and order?\"\n\t*fake_choice\n\t\t#\"Yes, I will.\"\n\t\t\t\"Then by our authority, welcome.\" Slamming a fist onto the arm of the chair, a flare of light brightens the room, the domed roof fades away, and a beacon of light radiates into the infinite expanse above you, signifying the initiation.\n\t\t\t*goto courtmember\n\t\t#\"No, I will not stay.\"\n\t\t\tThe gods around the room gasp. ${speaker2} laughs nervously, offsetting anxiety, \"But where else will you go? There is nothing but chaos outside this city.\"\n\t\t\t*fake_choice\n\t\t\t\t*if (race1size>0) #\"I will follow my mortals. Live with my creations and see just how far life can go.\"\n\t\t\t\t\t\"But for what purpose?\" ${speaker3} interjects. \"Mortal races have always been a means, not an end.\"\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#\"I simply have no interest in your affairs.\"\n\t\t\t\t\t\t#\"There may be more to our connection with mortal planes than you know.\"\n\t\t\t\t\t\t\t*if god3rel > 0\n\t\t\t\t\t\t\t\tOfaldir seems intrigued by your proposal, but says nothing.\n\t\t\t\t\t\"Very well,\" ${speaker2} hisses, \"if you will not join us then you have no further business within these walls. We will maintain the Court without your aid!\"\n\t\t\t\t\t*goto outcast\n\t\t\t\t*if (race1size=0) #\"I will start again. Create new life, new followers and see just how far life can go.\"\n\t\t\t\t\t\"But for what purpose?\" ${speaker3} interjects. \n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#\"For power. My people will become the most advanced in the universe.\"\n\t\t\t\t\t\t#\"There may be more to our connection with mortal planes than you know.\"\n\t\t\t\t\t\"If you will not join us then you have no further business within these walls,\" ${speaker2} hisses, \"be gone, we will maintain the Court without your aid!\"\n\t\t\t\t\t*goto outcast\n\t\t\t\t#\"I will travel the Aether and try to unravel its secrets.\"\n\t\t\t\t\t*label leavin\n\t\t\t\t\t\"You will die out there! There is nothing beyond this sanctuary,\" ${speaker2} snaps.\n\t\t\t\t\t\n\t\t\t\t\t\"I will see for myself,\" you remark before proceeding out the Courthouse doors.\n\t\t\t\t\t*goto outcast\n\t\t\t\t#\"I'm not sure where I'll go, but it won't be here.\"\n\t\t\t\t\t*goto leavin\n*label outcast\n*page_break\n*achieve wander\nYou are cast out, forbidden to return to the sanctity of the Court. That is of no concern to you, however, as your real quest has only just begun. Now, your journey into the unknown begins, the search for answers long overdue.\n\n*goto bothendings\n*label courtmember\n*page_break\n*achieve courtgod\nAmong the Court Gods, you take your place. Without a doubt the most powerful among them, you will rule alongside them to maintain balance. The Aether presenting infinite challenges, but with the aid of the allies you've mustered, you're power and rule will remain steadfast.\n\n*if race1size = 0\n\tWithout a mortal race to guide, you find companionship in the other gods. Something you've come to realize is a rare phenomenon as trust can be a damning thing to build, even for a god. Perhaps in the future you will create a new race or you will guide others, but for now... It is simply time to rest...\n*if race1size > 0\n\tYou find companionship in the other gods and you find meaning in the mortals you guide, watching as they achieve amazing feats and eventually, perhaps even inter-dimensional travel. What secrets the future may hold for you is unknown, even to a god, but for now... It is simply time to rest...\n*goto ending\n\n*label destroyed\n*page_break\n*achieve aba\nRubble, that is all that remains. Through your great power you have conquered every enemy you have faced, every challenge laid before you, and none could withstand your strength, not even the Titan. Now, your journey into the unknown begins, the search for answers long overdue.\n*label bothendings\n*if race1size = 0\n\tWithout a mortal race to guide, you have nothing holding you back. Perhaps in the future you will create a new race or you will guide others, perhaps you will allow ${helper} to continue following you or cast him away, but for now... It is simply time to rest...\n*if race1size > 0\n\tYour mortals call to you, empowering you for eternity through their faith. What becomes of them and ${helper}'s fate is for the future ${name} to decide, but for now... It is simply time to rest...\n*goto ending\n\n*label dictatorship\n*page_break\n*achieve dicta\nPower, that is how you rule. \n*if Evil > 50\n\tThrough your mighty fist you will turn the once oligarchical government into your dictatorial domain. ${helper}, your right hand, assisting in the resolution of the infinite challenges the Aether presents. The daemons that reside in your realm must serve unquestioningly, bringing you the knowledge and power you seek. \n*if Evil \u003c 51\n\tAlongside you, those that prove themselves as strong and competent will rule over the Court together. ${helper}, your right hand, assisting in the resolution of the infinite challenges the Aether presents. The daemons that reside in your realm must serve unquestioningly, bringing you the knowledge and power you seek. \n\n*if race1size = 0\n\tWithout a mortal race to guide, you have nothing holding you back. Perhaps in the future you will create a new race or you will control others, but that \n*if race1size > 0\n\tYour mortals call to you, empowering you for eternity through their faith. What becomes of them, though,\nis the destiny of the future ${name}, for now... It is simply time to rest...\n*goto ending\n*label ending\n*page_break End\nWe hope you've enjoyed playing [i]The Aether: Life as a God.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "choicescript_description": "Create a mortal race to worship you and grow your strength. Guide them in their daily lives and help them grow. The power you collect will grow your mind and body. Dabble in the affairs of other gods or seek to destroy them and steal their power.\n\n[i]The Aether: Life as a God[/i] is a 60,000 word interactive fantasy novel by Alex Ryan, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n• Create a custom mortal race.[n/]\n• Engage in mortal affairs.[n/]\n• Travel the Aether and steal power from lesser beings.[n/]\n• Dabble in political affairs at The Court of Gods.[n/]\n• Battle other gods in epic one one one conflicts.[n/]\n• Complete unique quests and events with impactful outcomes.\n", "choicescript_stats": "*if Power \u003c 26\n\t*set level \"Powerful Daemon\"\n*if Power > 25\n\t*set level \"Weak God\"\n*if Power > 100\n\t*set level \"Moderately Powerful\"\n*if Power > 500\n\t*set level \"Very Powerful\"\n*if Power > 1000\n\t*set level \"Extremely Powerful\"\n*if Power > 1500\n\t*set level \"High God\"\n*if Power > 3000\n\t*set level \"Supreme God\"\n*if Evil > 100\n\t*set Evil 100\n*if Evil \u003c 0\n\t*set Evil 0\n*label top\n[b]Player Details[/b]\n*stat_chart\n\ttext Name\n\ttext animal Court Appearance\n*line_break\n*if power\u003c10000\n\t*stat_chart\n\t\ttext Power\n\t\ttext essencestones Essence Stones\n*if power>9999\n\tPower: Uncertain\n\t*stat_chart\n\t\ttext essencestones Essence Stones\n*line_break\n*stat_chart\n\topposed_pair Evil\n\t\tGood\n*line_break\n[b]Creation Details[/b]\n*stat_chart\n\ttext planetname Planet\n\ttext race1 Dominant Race\n\ttext race1stre set cityname \"Aria\" \n*if randname=92   \n\t*set cityname \"Azmar\" \n*if randname=93   \n\t*set cityname \"Satburgh\" \n*if randname=94   \n\t*set cityname \"Preywen\" \n*if randname=95   \n\t*set cityname \"Irragin\"\n*if randname=96   \n\t*set cityname \"Kailand\" \n*if randname=97   \n\t*set cityname \"Taridawn\" \n*if randname=98   \n\t*set cityname \"Griffyn\" \n*if randname=99   \n\t*set cityname \"Haywall\"\n*if randname=100   \n\t*set cityname \"Cresthill\"\n\n*return", "death": "*page_break\nUnable to move, you feel your essence fleeting. Slowly, everything starts to fade away.\n*if (essencestones>0)\n\t*fake_choice\n\t\t#Break an Essence Stone.\n\t\t\t*set essencestones -1\n\t\t\tWith your last ounce of strength, you crush an essence stone in your palm.\n\t\t\t*set power +400\n\t\t\t\n\t\t\t(Power +400)\n\t\t\t\n\t\t\t*return\n\t\t#Restart Game.\n\t\t\t*goto death\n*label death\nYour quest for omnipotence has ended.\n\n*ending", "event1": "*gosub_scene male_generator\n*gosub_scene city_generator\n*temp pflux\n*rand pflux 20 35\n*page_break\n*set mostknown unitname\n\"Hear my plea, Almighty One,\" you hear a voice call out from below. Peering down you witness a small man kneeling at one of your shrines. \"I am ${unitname}, and all I wish is to be as strong as the other men in my village. The hunters mock me and call me the Man-Gatherer. I know I could be useful if they would only let me prove myself.\"\n*fake_choice\n\t#Speak with the young man.\n\t\t\"${unitname}…\" you call to the man.\n\t#Ignore the man's request.\n\t\tThe man gazes up at the sky hoping for a response. After several minutes of silence, however, he gives up and returns home.\n\t\t*goto badending\n*fake_choice\n\t#\"Start a church in my name and you will find a different kind of strength.\"\n\t\tFirst stunned by your omnipresent voice then confused upon realizing your response. \"Y-yes, Almighty One,\" he responds. Without another word the man turns and walks back to his village. The next day the man stands outside his hut, inviting others inside for worship, however, none provide him any attention.\n\t\t*fake_choice\n\t\t\t#Tell the man to warn the village of a bad omen.\n\t\t\t\tIn a dream you go to the man and warn him that if the villagers do not heed him then their yearly harvest will be devoured by a swarm of locusts.\n\t\t\t\t\n\t\t\t\tThe next day the man awakens trembling at the vividness of his dream. \"You must listen, our people will starve this winter if you do not pay thanks to ${name}!\" ${unitname} continuously shouts across the village center, but still no one listens.\n\t\t\t\t*fake_choice\n\t\t\t\t\t#Unleash the locusts.\n\t\t\t\t\t\tYou conjure a vast colony of the insects and send them toward the ignorant village. Just as the ${race1} begin harvesting their hard cultivated crop, the swarm overwhelms them, forcing the villagers to take shelter as their fields are obliterated.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe winter is long a treacherous for the village without a reliable reserve of food and many of the young and elderly do not survive, but your message is heard and the village does not undermine you thereafter. Nearly every day, the villagers worship you in ${unitname}'s church and he becomes an idol among his people.\n\t\t\t\t\t\t\n\t\t\t\t\t\tSeveral years later ${unitname} comes to your sacred shrine once more and speaks, \"Thank you, ${name}. Though it was a harsh lesson, I see now the strength of which you spoke.\"\n\t\t\t\t\t\t*achieve locusts\n\t\t\t\t\t\t*set Power +(pflux)\n\t\t\t\t\t\t\n\t\t\t\t\t\t(Power +${pflux})\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*return\n\t\t\t\t\t#Stay your hand.\n\t\t\t\t\t\t*set pflux 11\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tYou decide to spare the village of the devastation, however, ${unitname}'s omen goes unfulfilled and your lesson not learned. After months of wasted effort, ${unitname} gives up on you and stops encouraging the village to follow you closer. The village's faith slowly drifts away.\n\t\t\t\t\t\t*set loyalty \"Fleeting\"\n\t\t\t\t\t\t*set Power -(pflux)\n\t\t\t\t\t\t\n\t\t\t\t\t\t(Power -${pflux})\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*return\n\t\t\t#Smite the iconoclastic village and burn the heathens!\n\t\t\t\t*label smite\n\t\t\t\t*set Evil +5\n\t\t\t\tThat autumn, you conjure a harsh storm and strike the village with a devastating bolt of lightning. Fire quickly spreads and burns their huts to the ground. The rain prevents the fire from spreading beyond the village edge, but the civilization is charred to near nothing. The few who survive are forced to flee and seek refuge in neighboring villages.\n\t\t\t\t\n\t\t\t\tThe village is destroyed and the fear struck into the survivors, including ${unitname}, causes them to spread knowledge of your unforgiving and destructive nature. Though the overall opinion towards you degrades, the race's worship increases out of fear.\n\t\t\t\t*set Power +(pflux)\n\t\t\t\t\t\t\n\t\t\t\t(Power +${pflux})\n\t\t\t\t*page_break\n\t\t\t\t*return\n\t#\"I will give you this strength, but in return you must spread my faith.\n\t\tThe man is stunned upon hearing your omnipresent voice around him, \"Yes! I will dedicate the rest of my life spread the word of your name, Almighty ${name}!\"\n\t\t\n\t\tEnergy pours onto ${planetname} and wraps around ${unitname}. The energy of the Aether seeps into the fibers of his muscle and becomes imbued within them. As the cloud around him dissipates the man emerges twice as strong and slightly taller.\n\t\t\n\t\tUnable to contain his excitement, ${unitname} sprints back to the village shouting your name in praise. The other villagers are dumbfounded and become jealous of his newly found gift, but are not able to deny his sudden acquisition of charm and utility. ${unitname}, does not forget his end of the deal and does indeed continue to spread knowledge of your power to nearby villages using graphical representations. \"This is what I looked like before discovering the power of ${name} and this is me now.\"\n\t\t*set Power +pflux\n\t\t\n\t\t(Power +${pflux})\n\t\t*page_break\n\t\t*return\n\t*if (essencestones>0) #\"Consume this stone, it will make you the strongest man on the planet.\" (-Essence Stone)\n\t\tYou toss the stone down to ${Planetname} and it lands just at ${unitname}'s feet. At first ${unitname} seems hesitant, but quickly downs the rock in a single gulp. It takes a moment for the effects to kick in, but suddenly the man grows twice as tall and his muscles four times in size. \"Yes!\" he shouts, \"Now I will show them what a true man is!\" ${unitname} jogs back to the village, squashing the foliage beneath him.\n\t\t\n\t\tAt first the villagers are hesitant to accept him, but after sharing the tale of the gift you bestowed onto him they are awestruck. With the village's faith strong and ${unitname}'s wish fulfilled, the man acted as the village's guardian for years. A warrior, a diplomat, and an inspiration, until one day he is killed by a slingshot.\n\t\t*set essencestones -1\n\t\t*achieve goliath\n\t\t*set pflux +40\n\t\t*set Power +pflux\n\t\t\n\t\t(Power +${pflux})\n\t\t*page_break\n\t\t*return\n\t#\"No.\"\n\t\tThe man hears your single word echo around him. At first he is stunned by your omnipresent voice, but upon realizing your response his awe is replaced by anger. The man, fearful of your power, says nothing, but simply walks away.\n*label badending\n\nUpon the man's return, he begins sullying your name, telling villagers of what an apathetic god you are. The village's faith quickly degrades as there is no one else to vouch for you.\n*fake_choice\n\t#Give the man knowledge of a bad omen.\n\t\tIn a dream you go to the man and warn him that if the village does not ask forgiveness then their year's harvest will be devoured by a swarm of locusts.\n\t\t\t\t\n\t\tThe next day the man awakens trembling at the vividness of his dream. \"You must listen, our people will starve this winter if you do not pay thanks to ${name}!\" ${unitname} continuously raves across the village center, but now people consider him a madman for changing opinion so quickly and ignore him.\n\t\t*fake_choice\n\t\t\t#Unleash the locusts.\n\t\t\t\tYou conjure a vast colony of the insects and send them toward the ignorant village. Just as the ${race1} begin harvesting their hard cultivated crop, the swarm overwhelms them, forcing the villagers to take shelter as their fields are obliterated.\n\t\t\t\t\n\t\t\t\tThe winter is long a treacherous for the village without a reliable reserve of food and many of the young and elderly do not survive, but your message is heard and the village does not undermine you thereafter. Nearly every day, the villagers worship you in their town square.\n\t\t\t\t\n\t\t\t\tNot another request ever comes to you from ${unitname}.\n\t\t\t\t*achieve locusts\n\t\t\t\t*set Power +(pflux)\n\t\t\t\t\n\t\t\t\t(Power +${pflux})\n\t\t\t\t*page_break\n\t\t\t\t*return\n\t\t\t#Stay your hand.\n\t\t\t\t*set pflux 11\n\t\t\t\t*page_break\n\t\t\t\tYou decide to spare the village of the devastation, however, ${unitname}'s omen goes unfulfilled and your lesson not learned. After months of wasted effort, ${unitname} ceases his doom-saying. The village's faith slowly drifts away.\n\t\t\t\t*set loyalty \"Fleeting\"\n\t\t\t\t*set Power -(pflux)\n\t\t\t\t\n\t\t\t\t(Power -${pflux})\n\t\t\t\t*page_break\n\t\t\t\t*return\n\t#Smite the iconoclastic village and burn the heathens!\n\t\t*goto smite", "event10": "*gosub_scene male_generator\n*gosub_scene city_generator\n*temp datgain\n*rand datgain 25 35\n*page_break\n\"I am ${unitname}, Great Alchemist of ${cityname}! I have come before your shrine today to inform you that I have developed a potion capable of harvesting the power of the universe! I will unleash this power on ${cityname} unless you bestow upon me great wealth and beauty so that I never have to gaze upon the hideous rabble of ${cityname} again. What say you, hmm?\"\n*fake_choice\n\t#Ignore the man's bargain.\n\t\t${unitname} stomps his foot on the ground, \"How dare you! I am ${unitname}, Great Alchemist of ${cityname}, no one ignores me, not even a god! Fine then, bare witness to the destruction of ${cityname}!\"\n\t\t\n\t\tLater that same evening ${unitname} stands atop a cliff-side overlooking the city of ${cityname}. \"I warned you, but you didn't listen, now face the destructive powers of the universe!\" \n\t\t\n\t\t${unitname} winds back his arm, preparing to hurl the bottled potion with all his strength. However, before his arm unwinds beyond his shoulders the bottle slips from his grasp and flies straight up in the air. Immediately realizing his mistake he quickly tries to run away, but to no avail. The bottle hits the ground and shatters before ${unitname} can even get a few feet away. A massive explosion tears apart the cliff-side, spewing rocks and vaporized dust into the air. Luckily, the explosion was so powerful that the only rocks to travel more than a few yards were no larger than a ${race1} fist.\n\t\t\n\t\tThe citizens of ${cityname} believe that no one short of The Almighty himself could have caused such an explosion, but for what reason remains unknown for the rest of time, but their faith grows even stronger.\n\t\t*achieve passive\n\t\t*set Power +datgain\n\t\t\n\t\t(Power +${datgain})\n\t\t*page_break\n\t\t*return\n\t#Smite the mortal where he stands.\n\t\tWithout giving a response, you hurl a bolt of lightning down upon the man and it disintegrates him instantly. However, the energy also shatters the bottled potion which he held and a massive explosions tears apart the shrine, spewing rocks and vaporized dust into the air.\n\t\t\n\t\tWitnessing the lightning and destruction of your shrine, the city of ${cityname} falls into chaos. Many lose their faith wondering how you could have allowed such a thing to happen. Fights break out between those that question you and your loyalists. Overall, your influence over the people has degraded.\n\t\t*set power -(datgain)\n\t\t\n\t\t(Power -${datgain})\n\t\t*page_break\n\t\t*return\n\t#\"Very well ${unitname}, you will have your beauty and wealth, but in exchange you must share your knowledge with the world.\"\n\t\t\"Hmm,\" ${unitname} ponders the request for a moment, \"very well, but once my secrets are revealed I will be rid of this place for good.\"\n\t\t\n\t\tWith a snap of your fingers you make the man beautiful. His greasy gray hair turns to thick, flowing black silk and his grimy facial hair becomes trim and proper. His complexion is renewed and he looks 40 years younger.\n\t\t\n\t\t\"You will gain your wealth by selling your secrets,\" you proclaim.\n\t\t\n\t\t\"What?\" he scowls. \"Fine, fine, fine,\" he mutters as he walks away from your shrine running his fingers through his lush new hair.\n\t\t\n\t\tOver the next few weeks the technological advancements of the ${race1} improve by centuries. Whether or not this new found strength will prove beneficial to the race has yet to be determined.\n\t\t*set race1strength +2\n\t\t*page_break\n\t\t*return", "event11": "*gosub_scene male_generator\n*disable_reuse\n*temp pflux\n*rand pflux 30 45\n\"Please, ${name}, you must help me!\" You hear a feeble mortal's voice shouting from below, \"An invisible wolf has been stalking our sheep and we have no way of vanquishing it.\" You find an old man standing before your sacred shrine.\n*fake_choice\n\t#\"Speak with the man.\"\n\t\t\"What is your name mortal?\" you respond.\n\t#\"Ignore the man's plea.\"\n\t\tThe man waits for an answer, but when none is provided he hobbles away, saying nothing.\n\t\t*goto badwolf\n\"I am ${unitname}, a humble servant of The Almighty.\" He responds rather nonchalantly compared to most mortals.\n*temp choicesselected 0\n*label choice1\n*fake_choice\n\t#\"What is a wolf? I did not create any wolf creatures.\"\n\t\tThe man ponders for a moment, \"Well, I'm not exactly sure what it is, but my son keeps saying he's found its tracks!\"\n\t\t*goto choice1\n\t#\"Has this wolf killed any of your sheep?\"\n\t\t\"Well, no, not yet.\" He pauses for a moment, as if trying to conjure a defense, \"But I'd like to keep it that way!\"\n\t\t*set choicesselected +1\n\t\t*goto choice1\n\t*if(choicesselected>0) #\"${unitname}, are you sure this beast exists?\"\n\t\t\"What?\" the man remarks, taken back by your question. \"Of course I'm sure, my own son told me it does!\"\n\t\t*set choicesselected +1\n\t\t*goto choice1\n\t*if(choicesselected>1) #\"${unitname}, is it possible your son is lying just to get attention?\"\n\t\tThe man scoffs, \"How dare you? My son… Well, now that you mention it…\" The man wanders off into thought for a few seconds. \"You may be right, Great One. Oh when I get my hands on that boy!\" The man stomps off back towards his farm.\n\t\t*label badwolf\n\t\t*page_break\n\t\tThe next day the same man returns. \"${name}!\" he cries out. \"They're dead, nearly all of my sheep, dead!\" he exclaims hysterically. \"My son was right, their necks bitten! It was the invisible wolf.\"\n\t\t*choice\n\t\t\t#\"Very well, I will deal with the beast.\"\n\t\t\t\t*goto wolfattack\n\t\t\t#\"Your farm is not my concern, ${unitname}. Whatever this creature is, it requires nourishment just as you.\"\n\t\t\t\tThe old man is infurianted by your response. \"My family does everything to thank you and this is what we are thankful for? You care nothing for your people! We will hunt this wolf ourselves.\" The man hobbles off, back to his farm.\n\t\t\t\t\n\t\t\t\tThe next day he goes out hunting for the wolf and gets lost in the vast wilderness. He dies of starvation several days later. The family is distraught by your lack of involvement and the loss of ${unitname}.\n\t\t\t\t*set Power -pflux\n\t\t\t\t\n\t\t\t\t(Power -${pflux})\n\t\t\t\t*page_break\n\t\t\t\t*return\n\t#\"I will deal with the beast, ${unitname}, do not fret.\"\n\t\t\"Oh thank you, ${name}, Your Greatness, you will save my family a lot of hardship.\"\n*label wolfattack\nThat night you watch the old man's farm, your omnipresent gaze witnessing the flow of each blade of grass succumbing to the wind, when at midnight you find one of the young ${race1} sneaking about the field. Upon closer inspection you find it to be the old man's son, creating false impressions of a creature's foot in the dirt.\n*fake_choice\n\t#Speak to the boy as the creature he impersonates.\n\t\tYou appear out of the woods taking the physical form of the beast the boy described. \"Why are you doing this?\" you ask the boy.\n\t\t\n\t\tHe is stunned by your presence, \"What are you?\" the boy asks.\n\t\t\n\t\t\"I am the wolf,\" you simply respond.\n\t\t\n\t\tNearly soiling himself in fear, the boy breaks down in tears, \"I just wanted my father's time. He is so busy with his farm and the animals that he ignores our family,\" the boy continues crying into the palms of his hands.\n\t\t*fake_choice\n\t\t\t#\"Go home, cease your lying and I will tell your father the beast is dead.\"\n\t\t\t\tThe boy sighs. \"Yes ${sir},\" he turns and walks back to the house.\n\t\t\t\t\n\t\t\t\t*label telling\n\t\t\t\tThe next day, the father, ${unitname}, returns to your shrine once more and asks about the beast.\n\t\t\t\t*fake_choice\n\t\t\t\t\t#\"The beast turned out to be your son.\"\n\t\t\t\t\t\t\"What? How could my own son do such a thing?\" The man is clearly distraught. \"I will deal with him, thank you for involving yourself in this matter, ${name}. As a token of gratitude I will donate half of my farm's harvest to the church this year.\"\n\t\t\t\t\t\t*set Power +pflux\n\t\t\t\t\t\t*set Evil -2\n\t\t\t\t\n\t\t\t\t\t\t(Power +${pflux})\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*return\n\t\t\t\t\t#\"The beast is dead, your farm is safe.\"\n\t\t\t\t\t\t\"Thank you, thank you ${name}, you truly are a benevolent god!  As a token of gratitude I will donate half of my farm's harvest to the church this year.\"\n\t\t\t\t\t\t*achieve wolfboy\n\t\t\t\t\t\t*set Evil -4\n\t\t\t\t\t\t\n\t\t\t\t\t\t*set Power +pflux\n\t\t\t\t\n\t\t\t\t\t\t(Power +${pflux})\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*return\n\t\t\t#\"You must tell your father the truth or I will reveal it for you.\"\n\t\t\t\tThe boy sighs. \"Yes ${sir},\" he turns and walks back to the house.\n\t\t\t\t\n\t\t\t\tThe next day the man returns to your shrine once more and apologieses for his foolishness and his son's behavior. \"In return for your efforts we will donate half of our harvest to the church this year,\" he claims.\n\t\t\t\t*set Power +pflux\n\t\t\t\t\n\t\t\t\t(Power +${pflux})\n\t\t\t\t*page_break\n\t\t\t\t*return\n\t\t\t#\"Your internal affairs are of no importance to me, do as you wish.\"\n\t\t\t\tYou vanish from the boys sight.\n\t\t\t\t*goto telling\n\t#Tell the boy's father.\n\t\t*goto telling", "event12": "*gosub_scene male_generator\n*gosub_scene city_generator\n*temp pflux round(Power*(10/100))\n*comment set pflux \n*page_break\n\"All hail the God King, ${unitname}!\" The blasphemous cries permeate the divine realm and strike you at your core.\n*set Power -pflux\n\n(Power -${pflux})\n\nYou are taken back by the sudden blow against you from your own creations. Glancing down on ${planetname}, you find a large number of ${race1} bowing before another.\n*page_break\n\"I am The Great God King ${unitname}, Conquerer of Kingdoms and Slayer of the Impure. Bow before me and accept me as your divine savior and I will lead you to prosperity.\"\n\n${helper} stares down alongside you, \"How dare they? Those ungrateful mortals. You have given them life and all they need and still they betray you. They must be taught a lesson.\"\n*choice\n\t#\"I will speak with this, ${unitname}.\"\n\t\t\"I have no doubt you will resolve this matter more effectively than any other being in the universe, Your Omnipotence,\" ${helper} remarks.\n\t\t\n\t\t*label speaking\n\t\tYou go down to ${planetname} and speak with ${unitname} while he sleeps. Your divine voice echoes through his thoughts.\n\t\t*choice\n\t\t\t#\"Cease your blasphemous ways and pledge loyalty to your creator.\"\n\t\t\t\t\"${unitname},\" you speak, \"Cease your blasphemous ways and pledge your loyalty to me and your heresy will be forgiven.\"\n\t\t\t\t\n\t\t\t\tThe vision is short and seems to ${unitname} almost as a lasting dream. The following weeks, however, it appears ${unitname} disregards your demands and continues to conquer neighboring settlements under his banner and forces them to pledge divine praise and fealty.\n\t\t\t\t*goto wrath\n\t\t\t#\"You have cursed my name and in return I will now curse you.\"\n\t\t\t\t\"${unitname},\" you speak, \"You have cursed my name through your impiety and in return I will now curse you. Your further impious acts will enact death and misfortune upon that which you love.\"\n\t\t\t\t\n\t\t\t\tThe vision is short and seems to ${unitname} almost as a lasting dream. The following weeks, however, it seems ${unitname} seeks to challenge your omnipotence by continuing to conquer neighboring settlements and forcing them to pledge divine praise and fealty.\n\t\t\t\t*label wrath\n\t\t\t\t*choice\n\t\t\t\t\t*selectable_if (Power>14) #Unleash a modest plague on his people. (-Significant Power)\n\t\t\t\t\t\t*label plague\n\t\t\t\t\t\tCulminating your strength, you breathe death unto the planet's surface. A haze falls over ${unitname}'s capital city of ${cityname} and spreads to neighboring lands. The death of those infected is swift and, within a few short weeks, nearly a third of all ${unitname}'s nation is wiped out.\n\t\t\t\t\t\t*set Power -14\n\t\t\t\t\t\n\t\t\t\t\t\t(Power -14)\n\t\t\t\t\t\n\t\t\t\t\t\tQuickly realizing ${unitname} is powerless to help them, they turn back to you and beg for mercy.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*selectable_if (Power>8) #Retract the plague. (-Minor Power)\n\t\t\t\t\t\t\t\tInhaling, you restore the haze of death back as energy into the Aether. The infections within the citizens quickly die out and the people are saved thanks to your intervention.\n\t\t\t\t\t\t\t\t*set Power -8\n\t\t\t\t\t\n\t\t\t\t\t\t\t\t(Power -8)\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tA rebellion quickly erupts within the kingdom and, in only a month's time, ${unitname} is taken prisoner and executed by the people for his crimes against humanity and religion.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tThe people rejoice at their liberation and their worshipping of you has grown ten fold in all nations.\n\t\t\t\t\t\t\t\t*rand pflux 70 90\n\t\t\t\t\t\t\t\t*set Power +pflux\n\t\t\t\t\t\n\t\t\t\t\t\t\t\t(Power +${pflux})\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*return\n\t\t\t\t\t\t\t#Allow the weak plague to dissipate on its own.\n\t\t\t\t\t\t\t\tThe plague continues to spread and thin, claiming hundreds of more lives until finally dieing out a few months later.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tA rebellion quickly erupts within the kingdom and, in only a month's time, ${unitname} is taken prisoner and executed by the people for his crimes against humanity and religion.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tThe people rejoice at their liberation and quickly return to worshipping you as their true divine and mighty god.\n\t\t\t\t\t\t\t\t*rand pflux 50 70\n\t\t\t\t\t\t\t\t*set Power +pflux\n\t\t\t\t\t\n\t\t\t\t\t\t\t\t(Power +${pflux})\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*return\n\t\t\t\t\t*selectable_if (Power>8) #Burn his Palace to the ground. (-Minor Power)\n\t\t\t\t\t\tAs repercussion, you conjure a storm over his capital city, ${cityname}, and strike his palace with great bolts of lightning. The poor engineering allows the flammable structure to quickly combust. Some ${race1} are caught in the flames, including the King ${unitname}, himself.\n\t\t\t\t\t\t*set Power -8\n\t\t\t\t\t\n\t\t\t\t\t\t(Power -8)\n\t\t\t\t\t\t\n\t\t\t\t\t\tShocked by their god king's demise, the people quickly link his heresy and death to you. Without further question, the people quickly return to worshipping you as their true divine and mighty god and beg for forgiveness.\n\t\t\t\t\t\t*rand pflux 60 70\n\t\t\t\t\t\t*set Power +pflux\n\t\t\t\t\t\n\t\t\t\t\t\t(Power +${pflux})\n\t\t\t\t\t\t\n\t\t\t\t\t\t*return\n\t\t\t\t\t#Inspire a rebellion to kill his family.\n\t\t\t\t\t\tAs repercussion, you influence the people of his capital city, ${cityname}, to spark a rebellion and they quickly kidnap and execute ${unitname}'s beloved family. Outraged, ${unitname}, responds with fury and a civil war breaks out within the kingdom.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe war lasts for two long years and many innocence die in the onslaught, but finally, thanks to the strength and ingenuity of your faithful followers, ${unitname} is finally over thrown.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe people rejoice at their liberation and quickly return to worshipping you as their true divine and mighty god.\n\t\t\t\t\t\t*rand pflux 50 70\n\t\t\t\t\t\t*set Power +pflux\n\t\t\t\t\t\n\t\t\t\t\t\t(Power +${pflux})\n\t\t\t\t\t\t\n\t\t\t\t\t\t*return\n\t\t\t\t\t#Do nothing.\n\t\t\t\t\t\t*goto nothingg\n\t\t\t#\"Return my people's faith or all your kingdom will face my wrath.\"\n\t\t\t\t\"${unitname},\" you speak, \"your impiety will not go unpunished. Return the people's faith to me or all your kingdom will face my wrath.\"\n\t\t\t\n\t\t\t\tThe vision is short and seems to ${unitname} almost as a lasting dream. The following weeks, however, it seems ${unitname} seeks to challenge your omnipotence by continuing to conquer neighboring settlements and forcing them to pledge divine praise and fealty.\n\t\t\t\t*goto wrath\n\t#\"Yes, I will make an example of their civilization.\"\n\t\t*label dooom\n\t\t\"Excellent, Your Omnipotence, what is your plan?\"\n\t\t*choice\n\t\t\t*selectable_if (Power>24) #\"A weak plague will topple the heathens.\" (-Significant Power)\n\t\t\t\t*goto plague\n\t\t\t#\"I will conjure a flood to sink their nation.\"\n\t\t\t\t\"What a unique idea, Your Greatness! A flood would do much less harm to the planet than fire. Should you warn the innocence of the impending doom?\"\n\t\t\t\t*fake_choice\n\t\t\t\t\t#\"No, let the corrupt drown.\"\n\t\t\t\t\t\tYou make no effort to give the ${race1} warning of your devastation.\n\t\t\t\t\t\t\n\t\t\t\t\t#\"Yes, let those that head my warning be saved.\"\n\t\t\t\t\t\tYou go before several mortals and warn them of the impending flood, but all your omens fall of deaf ears, save for one. He builds a giant boat and urges his neighbors to seek shelter, but they do not listen. Instead, he turns his attention to the innocent animals of the region and manages to save a hundred native species.\n\t\t\t\t\t\t\n\t\t\t\tYou emit a pulse of energy from the heavens and it strikes the nearby ocean with great force. From the earthquake a tsunami rises and rushes toward the kingdom. The water floods the lands for miles and takes thousands with it as it recedes back into the ocean. In a single day the mighty empire is reduced to mere rumble and a fraction of what it was.\n\t\t\t\t\n\t\t\t\tThe induced poverty and famine that results from the disaster causes the people of ${unitname}'s empire to rebel and he is powerless to stop it without the proper resources. After only a few weeks of civil war, ${unitname} is over thrown and the once mighty empire loses control of its many scattered cities.\n\t\t\t\t\t\t\n\t\t\t\tThe people rejoice at their liberation and quickly return to worshipping you as their true divine and mighty god.\n\t\t\t\t*rand pflux 50 70\n\t\t\t\t*set Power +pflux\n\t\t\t\t\t\n\t\t\t\t(Power +${pflux})\n\t\t\t\t\n\t\t\t\t*return\n\t#\"You grow bold, ${helper}. I did not request your opinion.\"\n\t\t${helper} retreats into himself, \"My apologies, Master. I did not mean to undermine you omnipotence. Please forgive my foolishness.\"\n\t\t*choice\n\t\t\t#\"I will speak with this, ${unitname}.\"\n\t\t\t\t*goto speaking\n\t\t\t#\"I will make an example of their civilization.\"\n\t\t\t\t*goto dooom\n\t#\"I don't have time for this farce.\"\n\t\t*label nothingg\n\t\tYou ignore the civilization and allow ${unitname} to pursue his quest for domination.\n\t\t\n\t\tThe god king reigns for many years until old age finally takes him. His several heirs fight for control and while they feud, sense is shocked back into the people of the empire as they realize that their once \"god king\" could not even outlast death.\n\t\t\n\t\tA civil war erupts and lasts for two long years until, finally, the many outstretched cities achieve liberty. Without playing a role, many begin to question your existence and their faith in you heavily deteriorates.\n\t\t*rand pflux 40 50\n\t\t*set Power -pflux\n\t\t\t\n\t\t(Power -${pflux})\n\t\t\n\t\t*return\n", "event13": "\"This one was definitely chosen by ${name}. It is another certainly quintessential specimen.\" \n\nThe mentioning of your name draws your attention. You witness a male in a clean, well kept, white lab coat standing over a caged litter of critters. You recognize these animals as one of the many species you first conjured when creating ${planetname}; the ${race1} have taken to calling them plorbies. The mortal picks up one of the plorbies and pulls it away from its kin, carrying it off into another facility were it is integrated with others of its kind. You notice this selected group of animals all have similar genetic traits: large eyes, big fluffy paws, and soft fur. You can only conclude that the ${race1} must be selectively breeding these creatures and domesticating them as pets.\n*fake_choice\n\t#\"They are disrupting the natural order!\"\n\t#\"An interesting modification to natural selection.\"\n${helper} weighs in, a bit confused by the mortals' acts, \"are they attempting to enslave these creatures, Great One?\"\n*fake_choice\n\t#\"No creations of mine will be altered!\"\n\t\t\"How will you deal with the matter, Your Omnipotence?\"\n\t\t*fake_choice\n\t\t\t#Make your church against genetic selection.\n\t\t\t\tSending a message to your High Priest, you ban all synthetic breeding of your creations
