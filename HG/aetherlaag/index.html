.\n\t\t\t\t\n\t\t\t\tThe business that sells plorbies is obviously not happy with the church's decree and continues to breed the species regardless.\n\t\t\t\t\n\t\t\t\t\"Oh, this act of defiance can not be tolerated, Your Omnipotence!\" ${helper} proclaims angrily.\n\t\t\t\t*fake_choice\n\t\t\t\t\t*selectable_if (power>25) #Destroy their businesses. (-Minor Power)\n\t\t\t\t\t\tFurious at the foolish mortals blatant contempt, you strike their corporate offices with disaster, burning them all to the ground. \n\t\t\t\t\t\t\n\t\t\t\t\t\tThe sudden destruction of the corporation is too absurd to be coincidental and soon your ${race1} realize the severity of your anger. The plorbies are released and fear of your wrath is re-distilled in the mortals.\n\t\t\t\t\t\t*set obed +1\n\t\t\t\t\t\t*set power -25\n\t\t\t\t\t\t\n\t\t\t\t\t\t(Power -25)\n\t\t\t\t\t\t*return\n\t\t\t\t\t#Stay passive.\n\t\t\t\t\t\tYou stay your hand deciding to let the mortals dispute amongst themselves. \n\t\t\t\t\t\t\n\t\t\t\t\t\tEventually the market for plorbies explodes and every mortal has one as a pet in their home. The church stands firm against it, but their incredible cuteness towards the ${race1} is irresistible. The church loses influence, but the race as a whole is a bit happier with these furry friends in their homes.\n\t\t\t\t\t\t*set race1strength +1\n\t\t\t\t\t\t*set obed -1\n\t\t\t\t\t\t*return\n\t\t\t#Create a species of lice that protect the plorbies.\n\t\t\t\tYou spawn a species of insect that use the plorbies as a mode of transportation. Disinterested in the furs of the critters themselves, they prefer to attack any ${race1} that come within radius of the animals. It doesn't take long before the marker for these genetically altered pets completely crashes and their synthetic breeding halted. \n\t\t\t\t\n\t\t\t\tThough your race now has no cuddly friends to keep them company, your fury creations are still pure and free to roam ${planetname}.\n\t\t\t\t*return\n\t#\"They seek to improve their companionship with other species, interesting.\"\n\t\t\"How will you deal with the matter, Your Omnipotence?\"\n\t\t*fake_choice\n\t\t\t#My church should receive a portion of the profits.\n\t\t\t\tSending a message to your High Priest, you declare the church must receive a portion of all profit made from the application of your creations.\n\t\t\t\t\n\t\t\t\tThe business that sells plorbies is obviously not happy with the church's decree, but through political persuasion, and fearing your wrath, they accept the terms.\n\t\t\t\t\n\t\t\t\tEventually the market for plorbies explodes and every mortal has one as a pet in their home. The business that breeds the critters becomes one of the most influential entities on ${planetname}. With a sizable portion of their profits going to the church as well, both your influence and the happiness of your mortals improves overall.\n\t\t\t\t*set race1strength +1\n\t\t\t\t*return\n\t\t\t#Stay passive.\n\t\t\t\tEventually the market for plorbies explodes and every mortal has one as a pet in their home. The business that breeds the critters becomes one of the most influential entities on ${planetname}, rivaling that of the church itself. Against their wealth and power, the church loses a small amount of influence, but the race as a whole is a bit happier with these furry friends in their homes.\n\t\t\t\t*set race1strength +1\n\t\t\t\t*set obed -1\n\t\t\t\t*return", "event14": "*gosub_scene female_generator\n*gosub_scene godname_generator\n*rand pflux 100 120\n\"Heathens!\" a mortal cries out, \"${name} be damned!\" the foolish curse immediately sparks your interest. \"Those who worship ${name} will spend an eternity in oblivion! ${godname} will bring us salvation. Beg for mercy and perhaps ${godname} will grant you forgiveness.\" The mortal stands in the streets preaching blasphemy.\n*fake_choice\n\t#Speak with her.\n\t\t\"${unitname}…\" you speak the mortal's name in broad daylight and she falls off the box she's preaching from in shock. Looking back on her life, she has received nothing but blessings from you, you can't understand why she would be so against you. Then suddenly, you see it. A being corrupting her spirit, a daemon.\n\t\t\n\t\tIt squirms, trying to escape the mortal's physical body once it realizes you've spotted it.\n\t\t\n\t\t\"Be careful, Great One,\" ${helper} comments, \"handling this daemon too aggressively could kill the mortal it occupies.\"\n\t\t*fake_choice\n\t\t\t#Rip the daemon out of your mortal plane.\n\t\t\t\tYou grab a firm hold of the creature and rip it from the mortal's body. The daemon cries out and the mortal female dies almost instantly from the shock.\n\t\t\t\t\n\t\t\t\tYou pull the spastic creature from the dimension and hold it in your ethereal grasp.\n\t\t\t\t\n\t\t\t\t*label talking\n\t\t\t\t${helper} speaks after pondering for a bit, \"the daemon must have a good source of essence to be able to travel between dimensions like that.\"\n\t\t\t\t*fake_choice\n\t\t\t\t\t#Kill it.\n\t\t\t\t\t\tEnergy flows down your arm and releases into the pitiful daemon, killing it.\n\t\t\t\t\t\t\n\t\t\t\t\t\t${helper} chuckles, \"these feeble daemons are nothing compared to your omnipotence, Master.\"\n\t\t\t\t\t\t*set power +pflux\n\t\t\t\t\t\t\n\t\t\t\t\t\t(Power +${pflux})\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*return\n\t\t\t\t\t#Tell it to spread a warning.\n\t\t\t\t\t\t\"Any daemon that impedes upon my domain will meet a swift demise,\" you tell the feeble creature to spread the warning to any others that come near your realm.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*label goodending\n\t\t\t\t\t\t${helper} chuckles, \"these feeble daemons are nothing compared to your omnipotence, Master. Hopefully, they'll realize that in the future.\"\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*return\n\t\t\t#Gently try to pull the daemon away.\n\t\t\t\tCautiously, you slowly try to pull the daemon out of the physical realm, but it fights back vigorously. It surrenders the woman's body and dashes from one mortal to another, eagerly trying to evade your capture. This goes on for several mortal hours, shocking hundreds of your followers in the process.\n\t\t\t\t*fake_choice\n\t\t\t\t\t#Rip the daemon out of your mortal plane.\n\t\t\t\t\t\tYou grab a firm hold of the creature and rip it from one of the mortal's bodies. The daemon cries and the mortal dies almost instantly from the shock.\n\t\t\t\t\n\t\t\t\t\t\tYou pull the spastic creature from the dimension and hold it in your ethereal grasp.\n\t\t\t\t\n\t\t\t\t\t\t*goto talking\n\t\t\t\t\t#Send a mortal priest after it.\n\t\t\t\t\t\tYou send a message to one of your priests at a nearby shrine, providing him a sense that something is amiss. Hastefully, the holy servant travels by one of the newfangled vehicles that just come into production. With you as his guide, he quickly tracks down the path of the leaping possessor.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"The power of ${name} compels you!\" the priest shouts, trapping the young man, now possessed by the daemon, in the corner of an alleyway.\n\t\t\t\t\t\t\n\t\t\t\t\t\tSuddenly, the daemon flies out of the man and attempts to take control of your holy servant. The priest fights back, but the daemon's power starts to overwhelm the simple mortal.\n\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t*if (essencestones>0) #Break an Essence Stone over him. (-Essence Stone)\n\t\t\t\t\t\t\t\t*set evil -3\n\t\t\t\t\t\t\t\tWith your divine fist, invisible to mortal eyes, you crush an Essence Stone over the possessing daemon. It cries in agony and seemingly melts away from the priest's body. Its essence spreading to the spirits of nearby mortals, strengthening both their minds and bodies, slightly empowering the race permanently.\n\t\t\t\t\t\t\t\t*set race1strength +1\n\t\t\t\t\t\t\t\t*set essencestones -1\n\t\t\t\t\t\t\t\t*goto goodending\n\t\t\t\t\t\t\t#Carefully pull the daemon and priest apart. (-Major Power)\n\t\t\t\t\t\t\t\t*set evil -2\n\t\t\t\t\t\t\t\tFed up with this daemon's games, you charge into the priest's very essence along with the daemon. Identifying the essence of the daemon from the essence of the mortal, you pry the creature from the innocent man.\n\t\t\t\t\t\t\t\t*set power -103\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t(Power -103)\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tThe priest faints as the daemon is expelled from his body, but you manage to save all of the mortals' lives and drag the daemon back into the Aether.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto talking\n\t\t\t\t\t\t\t#Force the daemon out of the mortal plane.\n\t\t\t\t\t\t\t\tYou grab a firm hold of the creature and rip it from the priest's body. The daemon cries and the poor priest dies instantly from the shock.\n\t\t\t\t\n\t\t\t\t\t\t\t\tInfuriated by the daemon's games, you pull the spastic creature from the dimension and hold it in your ethereal grasp.\n\t\t\t\t\n\t\t\t\t\t\t\t\t*goto talking\n\t#Ignore her.\n\t\tYou ignore the woman and allow her to continue her protests against you. One by one she convinces those around her of her beliefs, but you pay no heed. Eventually you realize a daemon must've been responsible for the mortal's treachery. Though, by the time you manage to rid the realm of the nuisance, the damage had already been done, greatly hindering your mortal's faith.\n\t\t*set power -114\n\t\t\n\t\t(Power -114)\n\t\t*page_break\n\t\t*return\n", "event15": "*rand pflux 130 150\n\"Just tear it down,\" a mortal voice breaks the silence of the skies. It sounds close, as if speaking directly to you.\n\nYou peer down to find its origin and witness a mortal directing a machine with a large drill toward one of your ancient holy shrines.\n\n\"The latrine will go over here,\" the mortal explains to several other ${race1}, pointing to the land around your alter. \"The garden could go here,\" he continues, all the while the machine of destruction inches closer to your sacred site.\n*fake_choice\n\t#Smite the machine.\n\t\tDark skies gather around the laborers. They halt their machines and look up in awe as lightning arcs between the clouds. You redirect the arcs to the ground and obliterate the demolisher with a single cast. The contraption explodes into a ball of fire as the overwhelming electricity pours into it and the ${race1} dive for cover.\n\t\t\n\t\tYour ostentatious display is more than enough to keep the contractors from returning and proves your existence to those who doubt your omnipotence.\n\t\t*set power +pflux\n\t\t\n\t\t(Power +${pflux})\n\t#Allow the mortals to build over your shrine.\n\t\tYou hold your anger back and allow your precious race to demolish your once sacred shrine, the past means less to you than the ${race1}'${ad} future. On top of the holy site, they build a new office building where future technologies and social communications will advance. Overall the race is strengthened for your patience, but their reliance on you degrades.\n\t\t*set race1strength +1\n\t\t*set power -pflux\n\t\t\n\t\t(Power -${pflux})\n*page_break\n*return", "event16": "*rand pflux 50 80\n\"${name}, be with us,\" the request stands out to you with particular importance. You return your attention back to ${planetname} and find three brave ${race1} seated in a large contraption riddled with technology. A countdown proceeds on a large monitor in front of them.\n\n\"Your Greatness,\" ${helper} interjects, \"it seems the ${race1} are trying to reach space! This contraption they are sitting in is something they call a 'spaceship', rightly named I suppose.\"\n*choice\n\t#\"I am so proud, I will give them my blessing.\"\n\t\tAs a massive combustive blast erupts from the shuttle's engine, you give the rocket a subtle nudge to help it lift off the ground.\n\t\t\n\t\t\"We have liftoff,\" one of the ${race1} states from the control room.\n\t\t\n\t\tUsing your divine grasp, you guide the ship safely through the atmosphere and help it reach orbit around the planet's gravitational pull.\n\t\t\n\t\t${race1} all around ${planetname} cheer and marvel in their accomplishment, blissfully unaware of the hand you played in its success.\n\t\t*page_break\n\t\tThe ${race1} manage to land the ship back on the planet's surface successfully and the first three ${race1} in space are regarded as heroes. For the first time since their creation, the race is united in celebration of their grand achievement.\n\t\t*set race1strength +1\n\t\t*return\n\t#\"This is unacceptable, they have progressed too far.\"\n\t\t\"I concur, Almighty One, but what will you do to detain them?\" ${helper} responds.\n\t\t*set pflux round(Power*(2.3/100))\n\t\t*fake_choice\n\t\t\t#Hurl a meteor at the launchpad. (-Minor Power)\n\t\t\t\t*achieve locusts\n\t\t\t\tYou launch a massive hunk of space rock toward the craft. Scanners and alerts sound all around the complex as the comet hurls toward the surface.\n\t\t\t\t\n\t\t\t\t\"Evacuate, evacuate!\" you hear ${race1} shouting and chaos erupts inside the control room.\n\t\t\t\t\n\t\t\t\tUnfortunately, the strapped down ${race1} inside the ship, along with many residing within the nearby buildings, are unable to escape and the meteor crashes into the planet's crust at immeasurable speed, leaving both a crater on ${planetname}'s surface and a reminder in the minds of the ${race1}.\n\t\t\t\t*set obed +1\n\t\t\t#Turn the launch into a civil disaster. (-Minor Power)\n\t\t\t\t*achieve locusts\n\t\t\t\tYou influence the engines so that they will engage uncontrollably.\n\t\t\t\t\n\t\t\t\t\"Three, two, one…\" you here the ${race1} say excitedly as the engines first cut on and a massive combustive blast begins to propel the ship upward. Suddenly, just as the ship reaches a few feet off the ground, half the engines cut off and the ship is suddenly sent hurling toward the control building nearby.\n\t\t\t\t\n\t\t\t\tUnfortunately, the strapped down ${race1} inside the ship, along with many residing within the building, are unable to escape and the ship crashes into the structure with great speed. It is a day that lives in infamy throughout their society and abolishes many ${race1}'${ad} desire to reach the stars.\n\t\t\t\t*set obed +1\n\t\t\"I know it is sad to witness the unnatural death of your creations, but we must remind ourselves it is for the greater good,\" ${helper} reassures you.\n\t\t\n\t\tWith the obedience of the race further in your grasp and their fear of the natural world greater than ever before, their worship grows.\n\t\t*set Power +pflux\n\t\t\n\t\t(Power +${pflux})\n\t\t\n\t\t*page_break\n\t\t*return\n\t#\"Good for them, but I have other matters to tend to.\"\n\t\t\"We have liftoff,\" one of the ${race1} states from the control room.\n\t\t\n\t\tThe spaceship manages to successfully break the planet's atmosphere and reach orbit. ${race1} all around ${planetname} cheer and marvel in their accomplishment.\n\n\t\tThe ${race1} manage to land the ship back on the planet's surface successfully and the first three ${race1} in space are regarded as heroes. For the first time since their creation the race is united in celebration of their grand achievement.\n\t\t*set race1strength +1\n\t\t*return", "event17": "\"I need this to work, please, ${name}, don't let this fail.\" You peer down and find a young woman praying to you from behind the curtains of a large crowd of conventionists. Seconds later the woman is called to stage and stands next to a contraption of advanced technology. \"Ladies and gentlemen, I present to you, the Holoprojectionator, the world's first, fully functional, holographic projector.\" The woman goes on to give a brief synopsis of how the machine functions, which of course you already know and are surprised it took the ${race1} this long to figure out. The woman lowers her hand, preparing to push the button to activate the device. However, you can sense that their is a faulty connection between two critical wires inside the machine's central chamber and the device will fail to start.\n*choice\n\t#Fix the connection.\n\t\tWith a thought, you wire the metallic cables tighter and allow for the electrons to flow freely. When the woman hits the button, the device starts up without a hitch and a projection of man appears above it.\n\t\t\n\t\tThe crowd is bewildered by the advanced technology and investors quickly get the device marketed around the globe. Soon, every home, business, and automobile contains some version of the original Holoprojectionator.\n\t\t\n\t\tThough the race's intellect grows, it does nothing to improve their faith.\n\t\t*set race1strength +1\n\t\t*page_break\n\t\t*return\n\t#Allow the device to fail.\n\t\tYou decide to use the flop as a hindrance to the race's progression and allow the hologram machine to fail. When the woman hits the switch, not only does the device fail to start, but the faulty connection combusts and the device is thrown into flames.\n\t\t\n\t\tCoincidentally, the remainder of the convention remains a flop as well and not a single piece of technology is implemented into society. By hindering their technological dependency, you maintain the faith of your followers for years to come.\n\t\t*set obed +1\n\t\t*page_break\n\t\t*return", "event2": "*disable_reuse\n*gosub_scene male_generator\n*rand pflux 3 6\n*temp rev false\n\"For the love of ${name}!\" you suddenly hear your name tear through the skies of the Aether, immediately grabbing your attention. You glance down at ${planetname} to see what event could possible merit the use of your name is such a profane manner.\n\n\"Someone stole my corn once again!\" You witness one of the ${race1} stomping out of his hut and directly into another.\n\n\"${unitname}, what are you doing? This is my hut!\" Shouts another man hiding within the intruded structure.\n\n\"Admit it, Malock, you stole my corn,\" the initial man execrates.\n\n\"I did not, ${unitname}. I told you yesterday, I simply save my rations! Unlike you, you gluttonous pig.\"\n\n\"That's it, step outside and we'll settle this like men!\"\n\n\"Children, children, please,\" a priest begs, approaching the hut from outside. The two men step out to confront the holy man. \"We are all children of ${name}, surely we can cooperate and stay unified under ${his} name?\"\n\n\"I can not cooperate with a thief!\" ${unitname} exclaims.\n*fake_choice\n\t#Intervene\n\t\t*label gogo\n\t\t\"I know you are eager to intervene, Great One,\" ${helper} interjects, \"but it would require far too much energy to speak with these mortals for a prolonged duration, we should think of another way.\"\n\t\t*choice\n\t\t\t#Appear as a revered animal.\n\t\t\t\t*set Power -pflux\n\t\t\t\tYou appear in the village as one of their revered spirit animals. Those that witness you passing by drop to their knees in respect. The three men are shocked as you approach.\n\t\t\t\t\n\t\t\t\t(Power -${pflux})\n\t\t\t\t*set rev true\n\t\t\t\t*goto intervening\n\t\t\t#Commune with the priest and speak through him.\n\t\t\t\t*set Power -pflux\n\t\t\t\tThe priest's eyes suddenly glow white and his voice begins to echo with power.\n\t\t\t\t\n\t\t\t\t(Power -${pflux})\n\t\t\t\t*goto intervening\n\t#Continue listening to the squabble.\n\"Thief?\" Malock rebuttals, \"I'm no thief, you're just a moron who eats faster than he can think.\"\n\n\"That is enough,\" the priest dictates. \"You are both men of our tribe and expected to settle this feud as such and not like barbarians.\"\n*fake_choice\n\t#Intervene\n\t\t*goto gogo\n\t#Ignore the farce.\n\t\tYou go about your godly business, ignoring the feud between the two men.\n\t\t\n\t\tLater you witness one of the men carried away in chains and forced to work as a slave. You shrug and hope it all worked out for the better.\n\t\t*page_break\n\t\t*return\n*label intervening\n\n\"Enough.\" You proclaim.\n*temp decided 0\n*rand pflux 25 40\n*label choice1\n*if (decided>1)\n\t*goto ending\n*fake_choice\n\t#\"${unitname}, what makes you believe Malock is guilty?\"\n\t\t*set decided +1\n\t\t${unitname} drops to his knees, \"Oh Great One, you humble me by intervening on this treachery. I have been missing food for days while Malock's supply has only grown. He claims it is savings, but no man can go days without food. He is stealing mine to feed his greed.\"\n\t\t\n\t\t\"That is not…\" Malock interrupts.\n\t\t*fake_choice\n\t\t\t#\"Silence!\"\n\t\t\t\tMalock quickly shuts up when your voice echoes throughout the valley.\n\t\t\t\t*goto choice1\n\t\t\t#Let Malock speak.\n\t\t\t\t\"… true. Almighty One, your wisdom knows no bounds, surely you can see that I am no traitor!\"\n\t\t\t\t*goto choice1\n\t#\"Malock, where did you get your rations from?\"\n\t\t\"As I have said, I have been saving them to share with my love. We are expecting children soon and I want them to be well fed in this world and not the children of beggars.\"\n\t\t*set decided +1\n\t\t*goto choice1\n*label ending\n\nBoth the mens' stories are cloaked by the scent of truth, but one more scent reveals to you the ultimate truth. The past scent of corn travelling from ${unitname}'s hut to Malock's.\n*fake_choice\n\t#\"${unitname}, I have seen that which mortal eyes can not and Malock is indeed stealing your food. I will leave his punishment to your people.\"\n\t\t\"I knew it!\" ${unitname}'s shouts, pointing at Malock.\n\t\t\n\t\t\"No, no, you must understand!\" Malock shouts as other villagers apprehend him, \"I was only doing it for my family!\"\n\t\t\n\t\tThe priest speaks, \"Thank you, ${name}. We know it is not easy, but righteous justice must be done.\"\n\t\t\n\t\tYou retreat from the mortal plane back into the Aether. Malock is enchained and forced to work as a slave for the tribe for the rest of his life. The people's faith in you, however, has been renewed.\n\t\t*set Power +(pflux)\n\t\t\t\t\t\t\n\t\t(Power +${pflux})\n\t\t\n\t\t\"What you did was just, Your Omniscience,\" ${helper} reassures you.\n\t#\"My eyes see all and I have not seen Malock's thievery. Your gluttony blinds you, ${unitname}, and I will leave your fate to the tribe.\"\n\t\t\"What?\" ${unitname}, asks in shock, \"No, I know someone is taking my food!\" Other villagers quickly apprehend him as he tries to run.\n\t\t\n\t\tThe priest speaks, \"Thank you, ${name}. We know it is not easy, but righteous justice must be done.\"\n\t\t\n\t\tYou retreat from the mortal plane back into the Aether. You watch as ${unitname} is enchained and forced to work as a slave for a fraction of his past ration for the rest of his life. The people's faith in you, however, has been renewed.\n\t\t*set Power +(pflux)\n\t\t\t\t\t\t\n\t\t(Power +${pflux})\n\t\t\n\t\t\"I know your decision was for the greater good, Your Omniscience,\" ${helper} reassures you.\n*page_break\n*return\n", "event3": "*disable_reuse\n*gosub_scene male_generator\n*temp pflux\n*rand pflux 3 6\n*temp rev false\n*page_break\n\"${name}!\" You hear your name travel through the skies of the Aether. \"${name}!\" you hear it once more. Peering down you find the source of the cry to be a man trapped in a small cave with a narrow entrance. Outside the cave, a large beast seems to be patrolling the the area.\n*fake_choice\n\t#Commune with the man. (-Minor Power)\n\t\t*set power -pflux\n\t\tYou identify which of the ${race1} it is and channel the man's consciousness to commune with him.\n\t\t\n\t\t(Power -${pflux})\n\t#Ignore the man's cries.\n\t\tYou ignore the man and wish him the best.\n\t\t\n\t\t*return\n*line_break\n*line_break\n\"${unitname}…\" You say the man's name and he immediately knows its you.\n\n\"${name}? Oh thank ${name} you've answered my prayers! I got myself stuck in a bit of a pickle. I was out huntin' with my brothers when we got split up by this monstrous beast! Now it's gone and trapped me in this cave and won't leave.\"\n*rand pflux 15 20\n*fake_choice\n\t#\"I will scare off the wild beast.\"\n\t\tYou call upon the wild animals of ${planetname} and send them towards the cave.\n\t\t\t\t\n\t\tWhen ${unitname} hears the heavy impacts of the stampeding predators he inches back into the cave as far as possible. Like lightning the predators chase the creature from the cave and back into the forest.\n\t\t\n\t\tAfter a few minutes of silence, ${unitname} slowly crawls back out of the crevice to check if the coast is clear.\n\t\t\n\t\t\"${unitname}!\" his brothers shout from the distance. Although their hunting trip was a failure, they celebrate their reunion around the village fire with a festive shindig.\n\t\t*set Power +(pflux)\n\t\t\t\t\n\t\t(Power +${pflux})\n\t\t*page_break\n\t\t*achieve easy\n\t\t*return\n\t#\"I will kill the beast, but you must haul the carcass with you and not waste it.\"\n\t\t\"Yes, of course, ${name}!\" the man responds.\n\t\t\n\t\tIn a classic display, you conjure lightning from the skies and strike the monstrous beast with a billion volts of electricity. The beast is instantly cooked and ${unitname} is pressed against the back of the crevice as deep as possible.\n\n\t\tAfter the storm subsides he pokes his head out to make sure the coast is clear.\n\t\t\n\t\t\"${unitname}!\" his brothers shout from the distance. As the three are reunited they celebrate over the catch you have blessed them with. Bringing it back to the village, they throw a grand feast to celebrate your omnipotence.\n\t\t*set Power +(pflux)\n\t\t\t\t\n\t\t(Power +${pflux})\n\t\t*page_break\n\t\t*achieve easy\n\t\t*return", "event4": "\"Mighty ${name}, hear our prayers.\" Your attention is grabbed by the voice of a female mortal, \"A giant storm reaches our shores and will destroy our village. Please, protect us.\"\n\n\"Hmm,\" ${helper} ponders, eavesdropping on the prayer, \"I'm not sure if saving this tiny village is worth the resources that would be required to counter this storm, Master.\"\n\nYou glance toward the sea and witness the colossal hurricane rocketing toward the primitive village. It will most definitely devastate the people.\n*choice\n\t*if (essencestones>0) #Dissipate the storm. (-Essence Stone)\n\t\t*achieve skypeople\n\t\t*set essencestones -1\n\t\tYou toss the stone into the eye of the storm and in only a few seconds the clouds completely dissipate, scattering in all directions. The concentration of energy is so powerful, in fact, that no harsh weather impedes upon the coast for hundreds of years thereafter. Everyone who now visits The Village of Eternal Sky stops at the local temple and offers tribute.\n\n\t\t*set power +164\n\t\t\n\t\t(Power +164)\n\t\t*page_break\n\t\t*return\n\t*selectable_if (Power>26) #Dissipate the storm. (-Significant Power)\n\t\tTapping into your power, you reach out and siphon away the energy of the storm and return it to the Aether. It takes a few minutes, but the storm lifts just as it reaches the shore and leaves the villages completely unscathed.\n\t\t*set power -26\n\t\t\n\t\t(Power -26)\n\t\t\n\t\t*page_break\n\t\tThe people rejoice at their survival and spread word of the miracle you cast on their village. The people offer double tribute to you that year and improve the faith of the neighboring settlements as well.\n\t\t*set power +42\n\t\t\n\t\t(Power +42)\n\t\t*page_break\n\t\t*return\n\t*selectable_if (Power>14) #Redirect the storm. (-Minor Power)\n\t\tConserving your strength, you summon a strong gale of wind which pushes the storm further north, just grazing the small village.\n\t\t*set power -14\n\t\t\n\t\t(Power -14)\n\t\t\n\t\t*page_break\n\t\tThe people rejoice at their survival and easily repair the little damage that was sustained on the northern side of the village. The people offer double tribute to you that year for saving them and their faith in you improves for years to come.\n\t\t*set power +35\n\t\t\n\t\t(Power +35)\n\t\t*page_break\n\t\t*return\n\t#Do nothing.\n\t\tThe storm bashes against the shore and wreaks havoc on the small village. After a few hours the storm finally lifts, revealing the utterly wrecked village beneath it. Not a single structure stands and many lie dead. Those that survive are forced to flee their home and seek shelter in neighboring settlements. Though the surviving villagers do not curse your name, their faith in you in no way improves.\n\t\t*page_break\n\t\t*return\n", "event5": "*gosub_scene male_generator\n*gosub_scene city_generator\n*temp pflux\n*rand pflux 30 45\n*page_break\n\"${name}, ${name}, ${name},\" you hear your name repeatedly chanted by mortals, \"${name}, ${name}…\" You scour the planet, searching for the origin of the nuisance. It takes nearly a full millisecond in mortal time, but you finally discover the source. A small cult of ${race1} seems to have gathered in an underground labyrinth beneath one of the mortal cities.\n\"${name}, ${name}, ${name}…\"\n*fake_choice\n\t#Watch the worshippers.\n\t\tYou focus your gaze on them when, suddenly, one of the ${race1} raises his arms, \"Stop, ${he} is upon us! I can feel ${name}'s gaze.\"\n\t#\"What!?\"\n\t\tYour voice erupts with the power of thunder and half of the cultists are knocked to the ground. \"${name}, ${he} has answered our call!\" one of the cultists shouts.\n\t#Ignore the cultists.\n\t\tYou ignore the fanatics and allow them to begin sacrifices in your name. You can feel the power of their blood rituals re-imbuing you with strength you once lost. However, your people divide as these rituals become more common practice among the ${race1}.\n\t\t*set Evil +5\n\t\t*set Power +pflux\n\t\t\n\t\t(Power +${pflux})\n\t\t\n\t\t*return\nYou presume this individual must be the group's leader. \"Bring forth the sacrifice!\" The man waves one of his arms and two other individuals haul another of the ${race1} from a nearby cage. \"Oh, ${name}, please accept this humble sacrifice as tribute and may your blessings continue to be bestowed upon us!\"\n\n\"Help!\" The female prisoner shouts, \"Don't do this!\"\n\nThe two cultists carry her to the alter. A knife resides plunged into the stone, awaiting its victim.\n\n\"Interesting,\" ${helper} interjects, \"it seems these ${race1} seek to honor you through sacrifice. Consider its advantages and the disadvantages, Almighty One. Sacrifices made by mortals can provide you with a significant source of power, it is the ultimate form of worship! However, many mortals may not approve of the inhumane practice.\"\n*fake_choice\n\t*if (essencestones>0) #Empower the woman to escape. (-Essence Stone)\n\t\tYou hurl the stone from the heavens and it shatters upon the woman. The ethereal rock disintigrates, but the magic of the essence pours into the prisoner's body. Suddenly, the woman grows two-times in size and shatters the chains that bind her.\n\t\t\n\t\t\"What witchcraft is this?\" the cultist shouts, taken back by the woman's sudden transformation. \"Restrain her! Take the demonic beast down!\" The cultists rush to attack her with their puny daggers, but with a single punch the woman manages to knock the cultists out. She flees from the labyrinth, following the torches to find her way out.\n\t\t\n\t\tAn investigation takes place afterward and the cultists are promptly imprisoned for their treachery. The leader of the cultists claims they were only trying to honor ${name}, but their pleas for mercy fall on deaf ears. With the cult of heretics dismantled and their leader executed, the faith of the city improves and the population grows stronger.\n\t\t*achieve witch\n\t\t*set race1strength +1\n\t\t*set pflux +40\n\t\t*set Power +pflux\n\t\t*set essencestones -1\n\t\t\n\t\t(Power +${pflux})\n\t\t\n\t\t*return\n\t#Shatter the alter.\n\t\tYou send down a wave of force and just as the woman approaches the table, it cracks. Starting at the center, the crack rushes outward in every direction, down the sides, and touches the ground. The alter crumbles to the floor in large chunks and the cultists stand shocked.\n\t\t\n\t\t\"${name} has spoken! The sacrifice must be spared this day,\" the maniac continues ranting about some fabricated divine prophecy.\n\t\t\n\t\tUnfortunately, the following month, the cultists again attempt to offer you a sacrifice and each time you shatter the alter. It isn't until, finally, on the fifth month that the fanatics cease their false worship.\n\t\t\n\t\tThose that witness the alters' sundering and your mercy, spread word of their experiences and the faith and loyalty of your people grows.\n\t\t*set Evil -5\n\t\t*set Power +pflux\n\t\t\n\t\t(Power +${pflux})\n\t\t\n\t\t*return\n\t#Allow the woman to be sacrificed.\n\t\tYou watch as the fanatics plunge the dagger into the woman's stomach. Blood flows off the alter and pools around the indented base. The cultists sing chants concocted from their ancient languages. You can feel the power of their blood rituals re-imbuing you with power you once lost. However, your people divide as these rituals become more common practice among the ${race1}.\n\t\t*set Evil +8\n\t\t*set pflux +35\n\t\t*set Power +pflux\n\t\t\n\t\t(Power +${pflux})\n\t\t\n\t\t*return", "event6": "*gosub_scene male_generator\n*gosub_scene city_generator\n*temp pflux\n*rand pflux 14 20\n*page_break\n\"Oh ${name}, Your Almighty, I am ${unitname}, a humble peasant from ${cityname}. I have come to your shrine to beg you for your aid. A mighty beast has appeared from the wilderness and wreaks havoc on our village. Our soldiers are no match for the creature, he has slaughtered many of our greatest warriors. Those who survive say the beast cannot be injured by any normal sword and can cut a man in half with one swoop of its claws!\"\n*fake_choice\n\t#Speak with the man.\n\t\t*rand pflux 20 40\n\t\t*page_break\n\t\tYou speak and your voice echoes throughout your shrine, \"${unitname},\" you say the man's name and he falls to the floor in shock.\n\t#Ignore the man's request.\n\t\t*set Evil +2\n\t\tYou ignore the peasant's prayers and allow the creature to continue its attacks upon the helpless village.\n\t\t\n\t\tFor years the beast, which you discover to be a giant mutated creature, terrorizes the village and devours its inhabitants. Eventually a powerful noble arrives at the village with a platoon of knights at his side. He manages to slaughter the beast. The peasants begin worshipping the noble for his heroic deeds and lose faith in you.\n\t\t*set Power -(pflux)\n\t\t\n\t\t(Power -${pflux})\n\t\t*page_break\n\t\t*return\n*choice\n\t#\"I hear your prayer and I bless you with the strength to slay this beast.\"\n\t\tThe man is in shock and not a word escapes his mouth as he stares in awe at your shrine. Eventually, he comes to and makes his way back to the village without uttering a word. For two days nothing happens and the man goes about his normal routine, constantly peering over his shoulder waiting for the beast to return, until finally, on the third day, it does.\n\t\t\n\t\t*if race1arms = \"teeth\"\n\t\t\tThe beast appears at the edge of the village and chases the inhabitants into their homes. The man, remembering your words, runs into his house and grabs his woodcutting axe in his teeth.\n\t\t*if race1arms != \"teeth\"\n\t\t\tThe beast appears at the edge of the village and chases the inhabitants into their homes. The man, remembering your words, runs into his house and grabs his woodcutting axe.\n\t\t\n\t\tStanding before the beast at the town's edge the man trembles in fear as the creature watches him. You discover this being to be a giant mutated version of one of your creations. Without warning, the beast charges the man and he hurls his axe with all his strength at the beast, but the creature is too quick and knocks the flying axe to the ground. The man races to get around the creature and recover the axe, but takes a grievous blow in his attempt. The creature makes a final charge toward the man. He flails his axe once more, this time rending the creature's gut just as the beast strikes him in return. Both the man and the creature lay at the village's edge, bleeding until they both succumb to their wounds.\n\t\t\n\t\tThe man is hailed as a hero and is considered a Chosen of ${name}. The village is safe and their faith is stronger than ever.\n\t\t*set Power +(pflux)\n\t\t\n\t\t(Power +${pflux})\n\t\t*page_break\n\t\t*return\n\t#\"I will smite this beast and it will no longer terrorize your village.\"\n\t\tThe man is in shock and not a word escapes his mouth as he stares in awe at your shrine. Eventually, he comes to and makes his way back to the village to spread the word of your intervention.\n\t\t\n\t\tEven with your omnipresent gaze you have difficulty locating the beast until a few days later when it returns to the village. The beast, which you discover to be a giant mutated version of one of your own creations, appears at the village's edge and chases the inhabitants into their homes. A small militia forms as the village center, ready to battle the encroaching beast. However, just as the two catch sight of one another, dark clouds begin to gather above the village. The beast, impartial to the strange occurrence, begins to charge the vulnerable townsmen. Quickly, you launch a stream of energy down upon the creature and a bolt of lightning strikes the beast mid dash. The creature's corpse continues to slide until it reaches the feet of the villagers, charred and smoking from the heat of the strike.\n\t\t\n\t\tThe next day the villagers throw a feast to celebrate the death of the monstrous beast. It is dismembered, cooked, and served as the main course. The village is safe and their faith is stronger than ever.\n\t\t*set Power +(pflux)\n\t\t\n\t\t(Power +${pflux})\n\t\t*page_break\n\t\t*return\n\t#\"This beast is one of my many creation and you must respect it. Pay tribute to this creature and it will no longer harm your village.\"\n\t\tThe man acknowledges your response and quickly returns to his village to share the information. Without hesitation, the members of the village gather ample food for the beast and leave it at the village's edge.\n\t\t\n\t\tJust two days later the beast returns. This time, however, it goes straight for the food. Satisfied, the creature, which you discover to be a giant mutated version of one of your own creations, takes the offered food and returns to the wilds without even setting foot inside the village.\n\t\t\n\t\tThe next day the villagers celebrate the newly found peace and waste no time gathering offerings for the next tribute. For years following, the village offers tribute to the beast every few days and each time the beast leaves the village unharmed until finally the being dies of old age. The faith of the villagers is stronger than ever.\n\t\t*set Power +(pflux)\n\t\t\n\t\t(Power +${pflux})\n\t\t*page_break\n\t\t*return", "event7": "*gosub_scene female_generator\n*temp ladyname unitname\n*gosub_scene male_generator\n*gosub_scene city_generator\n*temp pflux\n*rand pflux 25 40\n*page_break\n\"${name}, I call to you for aid!\" a woman shouts, \"My name is ${ladyname}, third daughter of King ${unitname}, and I have come to ask for your divine intervention. My father seeks to force my hand in marriage to a prince of the most powerful kingdom in the realm, ${cityname}, but this man is a swine! He claims women as his property and treats them like servants. I cannot marry him, Almighty! Please, convince my father to call off the wedding.\"\n*fake_choice\n\t#Speak with the woman.\n\t#Ignore the woman's request.\n\t\tThe woman waits for a response, but receives none and exits the temple disappointed.\n\t\t*goto badend\nYou speak and your voice echoes throughout your shrine, \"${ladyname},\" you say the woman's name and she throws her head back in disbelief.\n*fake_choice\n\t#\"I will speak with your blasphemous father. Marriage is a sacred act, not part of a political campaign.\"\n\t\t*set Evil -3\n\t\t*rand pflux 10 15\n\t\t*page_break\n\t\tYou go to the woman's father, King ${unitname}, and in a vision tell him what you have told ${ladyname}. Not questioning his faith, he abides by your declaration and outlaws all arranged marriages within his kingdom. However, not all are pleased by this law, most of all the opposing Kingdom of ${cityname}, who has lost a valuable ally. Though the kingdoms do not go to war, political tension exists between the two for centuries to come. Faith in many grows, but strains in many as well.\n\t\t*set Power +(pflux)\n\t\t\n\t\t(Power +${pflux})\n\t\t*page_break\n\t\t*return\n\t#\"Marriage is a concoction of mortals and I will not intervene.\"\n\t#\"Those that are strongest have the right to conquer. If you cannot defeat your enemies then you must succumb.\"\n\t\t*set Evil +4\nShe is severely displeased, but is not foolish enough to question your judgment. \n*label badend\n\nSeveral months later the two are wed and the kingdoms form an alliance. However, predictably displeased with the character she has been forced to marry, the woman stages a violent coup against her husband and the kingdom. Having gotten out of hand, the entire royal family is murdered by rebels, the woman included, and the kingdom is thrown into chaos for several years. The people of the kingdom lose all faith as they struggle to survive.\n*set Power -(pflux)\n\t\n(Power -${pflux})\n*page_break\n*return", "event8": "*gosub_scene male_generator\n*gosub_scene city_generator\n*temp pflux\n*rand pflux 40 55\n*page_break\nYou witness a small boy, praying before your shrine. Mister ${name}, or Misses since I don't really know, my mommy was taken by bad guys and she hasn't come back. My daddy is angry and wants to go fight them to get her back, but says I can't come. I don't want to be alone. Will you please bring my mommy back so he wont go?\"\n*label choice1\n*fake_choice\n\t#\"I will bring your mother back, ${unitname}.\"\n\t\t*set Evil -3\n\t\tThe boy leaps with joy, \"Yes, thank you!\" He sprints back to his house to share the news with his father.\n\t\t\n\t\tHowever, upon discovering the location of the boy's mother, you find that she was slain by bandits.\n\t\t\n\t\t\"Oh dear,\" ${helper} exclaims, peering down by your side. \"The boy will be devastated.\"\n\t\t*label choice2\n\t\t*choice\n\t\t\t#\"Can I not resurrect her?\"\n\t\t\t\t${helper} shakes his head, \"I'm afraid not, Your Greatness. It has been too long. The energy imbued within her has already been lost to the cosmos.\"\n\t\t\t\t*goto choice2\n\t\t\t*if (essencestones>0) #Use an Essence Stone. (-Essence Stone)\n\t\t\t\t\"Great One, are you certain you want to use such a powerful item on a single mortal?\" ${helper} strenuously questions.\n\t\t\t\t*choice\n\t\t\t\t\t#\"Yes.\"\n\t\t\t\t\t\tYou crumble the stone onto the woman's corpse. Her body quickly become imbued with the powerful essence, her flesh regenerates, and she draws breath again. Disoriented, but alive, you guide her to safety and then back home.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe boy is elated to see his mother again, but the man and woman spend the rest of their lives pondering the miracle. Neighbors hear about the act and word spreads quickly. Soon, the story of how ${name} saved the woman's life and guided her home to her family strengthens the faith of ${race1} all across ${planetname}.\n\t\t\t\t\t\t*set race1strength +1\n\t\t\t\t\t\t*set essencestones -1\n\t\t\t\t\t\t*achieve hera\n\t\t\t\t\t\t*set pflux +40\n\t\t\t\t\t\t*set Power +(pflux)\n\t\t\t\t\n\t\t\t\t\t\t(Power +${pflux})\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*return\n\t\t\t\t\t#\"No, I should save it.\"\n\t\t\t\t\t\t\"I believe that may be for the best, Master. It may come in handy again,\" ${helper} suggests.\n\t\t\t\t\t\t*goto choice2\n\t\t\t*selectable_if (Power>30) #Rain fire on the defilers. \"They will pay for their insolence!\" (-Significant Power)\n\t\t\t\t*set Power -30\n\t\t\t\tYou unleash a volley of flaming meteors upon the bandits, setting ablaze their tents and supplies. Those fortunate enough to be within range of an impact are incinerated, but nearly all others slowly burn to death by the immense flames. The event can be witnessed from miles away and none question that it was an act by your hand.\n\t\t\t\t\n\t\t\t\t(Power -30)\n\t\t\t\t\n\t\t\t\tThe boy is devastated and loses all faith in you for not bringing her back, but the praise of all those around is strengthened by grandiose display.\n\t\t\t\t*set Power +(pflux)\n\t\t\t\t\n\t\t\t\t(Power +${pflux})\n\t\t\t\t*page_break\n\t\t\t\t*return\n\t\t\t#Return to the boy and inform him that his mother is gone.\n\t\t\t\tYou go to the boy and hope that he understands the loss, but he is devastated and loses all faith in you for not bringing her back.\n\t\t\t\t*set Power -2\n\t\t\t\t\n\t\t\t\t(Power -2)\n\t\t\t\t\n\t\t\t\tHis father decides not to pursue the bandits, however, and the two continue to live a simple life in the countryside.\n\t\t\t\t*page_break\n\t\t\t\t*return\n\t#\"I am sorry, there is no bringing your mother back. Serve the church as my disciple and you will never be alone.\"\n\t\tThe boy ponders for several hours, sitting at your shrine, when a priest of your temple finds him. The two talk for quite some time until the boy finally decides to join him. The boy is trained as a priest, a wielder of your divinity.\n\t\t\n\t\tOnly a few months later the boy receives word that his father was killed by the bandits. The boy grew up with the inner rage to make him strong, but the wisdom of the monks to give him patience and fortitude. Upon reaching adulthood, the boy travelled the world under your banner, slaying all who opposed your dogma. Soon, songs of ${unitname}, the Boy of Legend and ${name}, are sung across the land.\n\t\t*set Power +(pflux)\n\t\t\n\t\t(Power +${pflux})\n\t\t*achieve legends\n\t\t*page_break\n\t\t*return\n\t#Ignore the boy's request.\n\t\t*set Evil +3\n\t\t*set pflux 20\n\t\t*page_break\n\t\tThe boy waits for a response, but after a few minutes walks away disappointed.\n\t\t\n\t\tThe boy receives word a few days later that his father was killed by the bandits. Devastated, he grows up cursing your name for betraying his family and terrorizes your followers. Eventually, the boy is killed by guardsmen after inciting a riot against the church.\n\t\t*set Power -(pflux)\n\t\t\t\t\n\t\t(Power -${pflux})\n\t\t*page_break\n\t\t*return", "event9": "*gosub_scene male_generator\n*gosub_scene city_generator\n*rand pflux 35 45\n*disable_reuse\n*page_break\n\"${name}, hear your humble servant! I am ${unitname}, High Priest in the Temple of ${cityname}. I have come before you to beg for your protection. A terrible plague has broken out in our city and hundreds die of it every day. The alchemists and doctors have done everything in their power to stop it, but to no avail. The power of their beaked masks has failed!\"\n*fake_choice\n\t#Speak with the priest.\n\t#Ignore the priest's plea.\n\t\t*temp datname cityname\n\t\t*set disaster \"The Plague of ${datname}\"\n\t\tAfter receiving no response from you, the high priest decides to take matter into his own hands. He organizes quarantines, curfews, and blockades to prevent anyone from leaving the city, even the healthy.\n\t\t\n\t\tDespite the priest's efforts, after months of famine the city is completely decimated. Piles of corpses line the streets, looters come and go, and eventually the plague goes extinct, but not before taking all of ${cityname} with it. The faith of other cities remain unaffected, but you have lost a lot of worshipers.\n\t\t*set Power -(pflux)\n\t\t\t\t\n\t\t(Power -${pflux})\n\t\t*page_break\n\t\t*return\n\"${unitname},\" you find it easy to commune with holy man. Upon hearing your voice he falls to his knees and bows so far as to nearly kiss the floor.\n*label choice1\n*choice\n\t#\"Rise, ${unitname}, there is no need for that.\"\n\t\t${unitname} glances at the shrine and sits up, but remains low to the ground.\n\t\t*goto choice1\n\t#\"What is the origin of this plague?\"\n\t\t*set Evil -2\n\t\t\"No one is certain, Almighty One, but most believe it came from the vermin that populate the streets of our cities.\"\n\t\t*choice\n\t\t\t*selectable_if (Power>60) #\"I will bless the priests with the ability to heal disease.\" (-Major Power)\n\t\t\t\t*set pflux +10\n\t\t\t\t*set Power -(pflux)\n\t\t\t\t${unitname} nods, \"We humbly accept your blessing, ${name}. We will use this power to heal all ${race1} impacted by the disease.\"\n\t\t\t\t\n\t\t\t\t(Power -${pflux})\n\t\t\t\t\n\t\t\t\tIn the following months the priests do just as ${unitname} claimed. In less than two months nearly the entire kingdom had been rid of the disease. The magical healing was beneficial as it strengthened the faith of all those affected by your light and it also proved advantageous for your church as well due of the many generous donations the priests accepted.\n\t\t\t\t\n\t\t\t\tUnfortunately, with wealth comes corruption and some of your divine followers abandoned the church to become rogue healers, accepting money to heal ${race1} of their ailments.\n\t\t\t\t*fake_choice\n\t\t\t\t\t#Leave them be since your gift is still being used for healing.\n\t\t\t\t\t\tThe healing magic improves faith around the world!\n\t\t\t\t\t\t*set Power +64\n\t\t\t\t\t\t\n\t\t\t\t\t\t(Power +64)\n\t\t\t\t\t\t*return\n\t\t\t\t\t#Immolate the sacrilegious heretics in holy fire.\n\t\t\t\t\t\tThe sight of Priests of ${name} bursting into flames terrifies citizens around the world. Their faith strengthens, but out of fear of your omnipotence more than anything else.\n\t\t\t\t\t\t*set Power +72\n\t\t\t\t\t\t\n\t\t\t\t\t\t(Power +72)\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*return\n\t\t\t*if (essencestones>0) #Give the priest an Essence Stone. (-Essence Stone)\n\t\t\t\t\"Take this stone and crush it into the mouths of the victims, even the dead, only the tiniest grain is necessary,\" you tell the man. You hurl the rock to the planet's surface and it hits to the ground at the priest's feet.\n\t\t\t\t\n\t\t\t\t${unitname} nods, a bit confused, \"Thank you, Almighty, I will do as you command,\" he then leaves the temple and disperses the grains into small bottles which he gives to each of the surviving priests. Together they carry out your instructions and administer the powerful remedy to every body in the city, even those deceased, by dropping a bit down their throats.\n\t\t\t\t\n\t\t\t\tMiraculously, within only a short hour, every individual who consumed the divine powder finds themselves cured from the effects of the devastating disease. At first startling, the dead begin to breath once more and quickly regenerate decayed tissue. It takes the city a few days to fully recover, but the bottles used to house the stone's pieces become national treasures and are housed by the church for centuries to come.\n\t\t\t\t\n\t\t\t\tYour act allows the city to fully rebuild, strengthening the race as a whole, and all traces of the disease are completely squashed within days. Other cities around ${Planetname} hear of the miracle and worship is stronger than ever.\n\t\t\t\t*set essencestones -1\n\t\t\t\t*achieve repoc\n\t\t\t\t*set race1strength +1\n\t\t\t\t*set power +120\n\t\t\t\t\n\t\t\t\t(Power +120)\n\t\t\t\t*page_break\n\t\t\t\t*return\n\t\t\t#\"You must quarantine the sick within the church. The plague will be contained there.\"\n\t\t\t\t*temp datname cityname\n\t\t\t\t*set disaster \"The Plague of ${datname}\"\n\t\t\t\t${unitname} nods, \"Yes, Your Grace, we will begin housing the sick immediately.\"\n\t\t\t\t\n\t\t\t\tIn the following months the priests do just as ${unitname} instructs. By quarantining the sick within the church, where your influence is strongest, you were able to keep the plague from spreading with virtually no expenditure of power. Though many died to the plague and the overall strength of the race weakened because so, in less than two months nearly the entire kingdom had been rid of the disease.\n\t\t\t\t*set race1strength -1\n\t\t\t\t\n\t\t\t\tThe people celebrate for weeks and none question the power of the church!\n\t\t\t\t*set Power +(pflux)\n\t\t\t\t\n\t\t\t\t(Power +${pflux})\n\t\t\t\t*page_break\n\t\t\t\t*return\n\t#\"I have cast this plague on my own people, ${unitname}, as punishment for their blasphemy.\"\n\t\t*temp datname cityname\n\t\t*set disaster \"The Plague of ${datname}\"\n\t\t*set Evil +8\n\t\tClearly ${unitname} is shocked by this knowledge, but he does not question you. \"I understand, ${name}. But what of your true servants? Those of us that follow you without question?\"\n\t\t*fake_choice\n\t\t\t#\"Those that remain faithful to me may find sanctuary within the walls of the church.\"\n\t\t\t\t*label hidechurchgo\n\t\t\t\t*achieve locusts\n\t\t\t\t${unitname} nods, \"Yes, Your Grace, we will begin housing those still faithful to you immediately.\"\n\t\t\t\t\n\t\t\t\tIn the following months the priests do just as ${unitname} instructs. By seeking shelter within the church, where your influence is strongest, you were able to keep the plague at bay with virtually no expenditure of power. Though many died to the plague and the overall strength of the race weakened because so, in less than two months nearly the entire kingdom had been rid of the disease.\n\t\t\t\t*set race1strength -1\n\t\t\t\t\n\t\t\t\tThe people celebrate for weeks and none question the power of the church!\n\t\t\t\t*set Power +(pflux)\n\t\t\t\t\n\t\t\t\t(Power +${pflux})\n\t\t\t\t*page_break\n\t\t\t\t*return\n\t\t\t#\"No one can escape my wrath, all must suffer for the sins of others.\"\n\t\t\t\tThe High Priest throws his head back in shock, \"But, Your Grace, that makes no sense!\"\n\t\t\t\t*fake_choice\n\t\t\t\t\t#\"I am the god, it doesn't need to make sense.\"\n\t\t\t\t\t\tAfter hearing your response the high priest decides to take matter into his own hands. He organises quarantines, curfews, and blockades to prevent anyone from leaving the city, even the healthy.\n\t\t\n\t\t\t\t\t\tDespite the priest's efforts, after months of famine the city is completely decimated. Piles of corpses line the streets, looters come and go, and eventually the plague goes extinct, but not before taking all of ${cityname} with it. This faith of other cities remain unaffected, but you have lost a lot of worshippers.\n\t\t\t\t\t\t*set Power -(pflux)\n\t\t\t\t\n\t\t\t\t\t\t(Power -${pflux})\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*return\n\t\t\t\t\t#\"Remain faithful and you may find sanctuary within the walls of the church.\"\n\t\t\t\t\t\t*goto hidechurchgo", "event_chooser": "*set eventcounter +1\n*label start\n\n*if (earlygame=true)\n\t*rand var 1 4\n\t*goto continue\n*elseif (midgame=true)\n\t*rand var 5 12\n\t*goto continue\n*elseif (earlygame=false) and (midgame=false)\n\t*rand var 13 17\n\t*goto continue\n*comment *else\n*comment \t*rand var 18 22\n*comment \t*goto continue\n\n*label continue\n*if (var=1) and (event1done=0)\n\t*set event1done 1\n\t*gosub_scene event1\n\t*return\n*elseif (var=1)\n\t*set var +1\n*if (var=2) and (event2done=0)\n\t*set event2done 1\n\t*gosub_scene event2\n\t*return\n*elseif (var=2)\n\t*set var +1\n*if (var=3) and (event3done=0)\n\t*set event3done 1\n\t*gosub_scene event3\n\t*return\n*elseif (var=3)\n\t*set var +1\n*if (var=4) and (event4done=0)\n\t*set event4done 1\n\t*gosub_scene event4\n\t*return\n*elseif (var=4)\n\t*set var +1\n*if (var=5) and (event5done=0)\n\t*set event5done 1\n\t*gosub_scene event5\n\t*return\n*elseif (var=5)\n\t*set var +1\n*if (var=6) and (event6done=0)\n\t*set event6done 1\n\t*gosub_scene event6\n\t*return\n*elseif (var=6)\n\t*set var +1\n*if (var=7) and (event7done=0)\n\t*set event7done 1\n\t*gosub_scene event7\n\t*return\n*elseif (var=7)\n\t*set var +1\n*if (var=8) and (event8done=0)\n\t*set event8done 1\n\t*gosub_scene event8\n\t*return\n*elseif (var=8)\n\t*set var +1\n*if (var=9) and (event9done=0)\n\t*set event9done 1\n\t*gosub_scene event9\n\t*return\n*elseif (var=9)\n\t*set var +1\n*if (var=10) and (event10done=0)\n\t*set event10done 1\n\t*gosub_scene event10\n\t*return\n*elseif (var=10)\n\t*set var +1\n*if (var=11) and (event11done=0)\n\t*set event11done 1\n\t*gosub_scene event11\n\t*return\n*elseif (var=11)\n\t*set var +1\n*if (var=12) and (event12done=0)\n\t*set event12done 1 ar\"\n*if randname=96   \n\t*set godname \"Imistus\" \n*if randname=97   \n\t*set godname \"Damius\" \n*if randname=98   \n\t*set godname \"Imos\" \n*if randname=99   \n\t*set godname \"Wistus\"\n*if randname=100   \n\t*set godname \"Traasil\"\n*if randname=101   \n\t*set godname \"Varus\" \n*if randname=102  \n\t*set godname \"Yolan\" \n*if randname=103   \n\t*set godname \"Siso\" \n*if randname=104  \n\t*set godname \"Lezo\" \n*if randname=105   \n\t*set godname \"Zion\" \n*if randname=106  \n\t*set godname \"Thane\"\n*if randname=107  \n\t*set godname \"Akeles\" \n*if randname=108  \n\t*set godname \"Velencas\" \n*if randname=109  \n\t*set godname \"Vane\" \n*if randname=110  \n\t*set godname \"Wisni\"\n*if randname=111\n\t*set godname \"Voedin\"\n\n*if (godname=god1) or (godname=god2)\n\t*goto start\n*if (godname=god3) or (godname=god4)\n\t*goto start\n*if (godname=god5) or (godname=god6)\n\t*goto start\n*if (godname=god7)\n\t*goto start\n\n*return", "hunt1": "*temp pflux\n*rand pflux 12 22\nYou continue wandering for a while and happen upon another helpless creature of the void. It squirms along a trail of essence, scavanging for residue.\n*fake_choice\n\t#Attack.\n\t\t*if (Power>21) \n\t\t\tYou sneak up on the feeble beast and grasp it in your ethereal claws. The scavanger puts up virtually no fight and you easily absorb its harvested essence.\n\t\t\t*set Power +pflux\n\t\t\t\n\t\t\t(Power +${pflux})\n\t\t\t*goto end\n\t\t*else\n\t\t\tYou attempt to aprehend the creature, but it senses your presence as you approach. The daemon is too fast for you and you don't possess the necessary power to catch it. You are left empty handed.\n\t\t\t*goto end\n\t#Leave the creature be.\n\t\tYou decide the pitiful creature isn't worth your time and continue on.\n*label end\n*choice\n\t#Continue hunting.\n\t\tYou decide you have enough strength to continue hunting and, through the Aether, you proceed.\n\t\t\n\t\t*gosub_scene hunt3\n\t\t*return\n\t#Return to your planet.\n\t\t*return", "hunt2": "*temp pflux 30\n*rand pflux 45 60\nYou wander the Aether for some time with no luck. As you wander, you find your thoughts beginning to wander as well, unlike ever before. What ${helper} said was true, as your power grows so too does your mind. You continue to question the origin of the debris you pass, but you quickly realize that there is an inherent asymmetry to the questions you ask and the answers you find.\n\nEventually, you happen upon a mass of energy; two beings frolicking together.\n\n\"Interesting that these daemons show a level of social regard toward one-another,\" ${helper} remarks following up from behind. \"To possess such a level of understanding, these daemons must have a quantifiable level of power. At least, compared to others of their kind. Perhaps similar to what you once were, Master.\"\n\nYou continue to watch the beings, swirling around one-another's trailing essence, interacting similarly to how your mortals do. As you ponder their actions, you find your mind growing weary.\n*fake_choice\n\t#Attack the beings.\n\t\t*set Evil +4\n\t\tYou catch the beings off guard by launching a series of ranged attacks. The bolts explode around the two, herding them together. You pull back and a cage of energy quickly surrounds the daemons. Clutching them, you drain the essence from their souls until nothing is left.\n\t\t*set Power +pflux\n\t\t\n\t\t(Power +${pflux})\n\t\t\n\t\tFeeling fatigued, you are forced to return home, but upon resting your mind, you find your strength quickly returning.\n\t\t*return\n\t#Leave the them be.\n\t\t*set Evil -2\n\t\tYou turn away and trail back the way you came.\n\t\t\n\t\t\"Master? These daemons have power! Should it not be yours?\" ${helper} cries out in question.\n\t\t*fake_choice\n\t\t\t#\"Those daemons are not the mindless creatures I hunt.\"\n\t\t\t\t*set Evil -5\n\t\t\t#\"I grow weary. It is safest if I return for now.\"\n\t\t\t#\"I do not need to explain myself to you, ${helper}.\"\n\t\t${helper} watches you with concern as you drift away.\n\t\t\n\t\tYou continue to wander the Aether for ages, but with little luck, finding only a small amount of ethereal dust floating about.\n\t\t\n\t\t(Power +4)\n\t\t\n\t\tFeeling fatigued you are forced to return home, but upon a short rest, you find your strength quickly returning.\n\t\t*return\n", "hunt3": "*temp pflux\n*rand pflux 15 20\nYou pursue the trail of residue the scavenger was following.\n\nThe trail itself, unfortunately, has decayed into nothing but ethereal dust and offers no source of power. You assume though, that the trail had to of originated from something and that something might be an even larger source of celestial power.\n*page_break\nAfter following the trail for some time, you happen across a large celestial creature being encircled by three others. From what you can gather it would seem the larger of the four beings is acting territorial and the other three are challenging it. Regardless, the four creatures block your path to continue following the trail.\n*choice\n\t*selectable_if (Power>50) #Kill them all. (-Major Power)\n\t\tCharging in, you cast out four appendages that each grab one of the creatures. You can feel them squirming, trying to escape your grasp, and their essence flowing through them. With a burst of power your grip tightens and crushes all four of the beings simultaneously. Relaxing, their essence merges with your own. You quickly recover your expended strength and more.\n\t\t*set pflux (pflux+5)\n\t\t*set Power +pflux\n\t\t\n\t\t(Power +${pflux})\n\t\t\n\t\t*goto won\n\t#Attack the large one to scare off the lessers.\n\t\tYou charge into the fray and grab hold of the larger of the four beings. You can feel its essence flowing, it definitely has a significant supply. However, the creature suddenly exerts a burst of energy which forces you to release your grip and it franticly tries to scurry away.\n\t\t*fake_choice\n\t\t\t*selectable_if (Power>32) #Shoot the creature. (-Significant Power)\n\t\t\t\tA conjured bolt of lightning explodes from your arm, striking the creature from half a light-year away. Even from the distance, you can see the creature's essence explode in a small cloud around its core. You look around and find the other beings nowhere in sight.\n\t\t\t\t*set power +pflux\n\t\t\t\t\t\n\t\t\t\t(Power +${pflux})\n\t\t\t\t\n\t\t\t\t*goto won\n\t\t\t#Charge after and crush it.\n\t\t\t\t*if (Power>26)\n\t\t\t\t\tYou charge after the creature, easily catching up to it and grabbing hold. Without hesitation this time, you crush the being in your grasp and let its essence absorb through your grip.\n\t\t\t\t\t*set power +pflux\n\t\t\t\t\t\n\t\t\t\t\t(Power +${pflux})\n\t\t\t\t\t\n\t\t\t\t\t*goto won\n\t\t\t\t*else\n\t\t\t\t\tYou charge after the creature, but are too weak to catch up. The being flees out of your sight and you look around and find the other creatures are nowhere to be found as well.\n\t\t\t\t\t\n\t\t\t\t\t*goto won\n\t#Go around.\n\t\tNot looking to pick a fight with the group you fly around some nearby debris and slink past them.\n\t\t\n\t\t*goto won\n*label won\n*choice\n\t#Continue hunting.\n\t\tYou continue down the seemingly endless trail of faded essence.\n\t\t*gosub_scene hunt4\n\t\t*return\n\t#Return to your planet.\n\t\tDeciding you've expended enough energy, you head back for now.\n\t\t*return", "hunt4": "*temp pflux2\n*rand pflux 45 55\n*rand pflux2 26 35\nFinally, after following the trail for ages, you come upon the giant slug-like beast that has been leaving the trail. It appears to be a giant power glutton, perhaps not as powerful as you, but more-so than any other daemon you've encountered.\n\n${helper} appears and warns you, \"Oh, be careful, Great One. Though it may not look it, any being that possesses power has the strength to defend itself. Looks can be deceiving here in the Aether.\"\n\nGlancing back at the creature, it continues to slug through the void, seemingly unaware of your presence.\n*choice\n\t*selectable_if (Power>60) #Ensnare the beast in a chain of energy. (-Major Power)\n\t\tYou whip up a chain of lightning and lasso it around the slug-like creature. As soon as it makes contact, the beast starts bucking. You are too quick, however, and easily immobilize it. Though unable to move, the beast squirms and starts spitting balls of raw energy toward you. Side to side, you weave to evade the missiles, displaying your superior agility. Realizing your power far exceeds its own, the being stops and seemingly surrenders.\n\t\t*set Power -40\n\t\t\n\t\t(Power -40)\n\t\t*label surrender\n\t\t*choice\n\t\t\t#Kill the beast and absorb its power.\n\t\t\t\tYou strike the beast with one final crack of lightning which pierces its core. The creature's cries only last a moment until the celestial bonds holding it together break and its essence melts into the void.\n\t\t\t\t\n\t\t\t\t*goto victory\n\t\t\t#Let it go.\n\t\t\t\t*set Evil -8\n\t\t\t\tRealizing this creature is not as primal as others in this void, you release it. Without hesitation, the being hightails it and becomes nothing more than a speck in the distance within seconds.\n\t\t\t\t\n\t\t\t\t${helper} seems to question your decision, but says nothing.\n\t\t\t\t\n\t\t\t\tFatigued, you find yourself needing to rest and return for now.\n\t\t\t\t*return\n\t*selectable_if (Power>36) #Launch several bolts of lightning at it. (-Significant Power)\n\t\tCharging your fists, you launch a series of attacks against the unaware slug creature. One by one, they fly through the skies and strike the being. The charges are so powerful the creature seems stunned and you take advantage of this by releasing one final, powerful attack.\n\t\t*set Power -pflux2\n\t\t\n\t\t(Power -${pflux2})\n\n\t\tBefore you can unleash it, the creature begins spitting balls of raw energy toward you. Side to side, you weave to evade the missiles, displaying your superior agility. Realizing your power far exceeds its own, the being tries to flee, but you manage to catch it in your sublime grasp. Knowing it has been bested, the creature seems to surrender and ceases its struggle.\n\t\t*goto surrender\n\t#Charge toward it and take it on melee.\n\t\tYou launch yourself at the beast and grab hold. As soon as you make contact, however, the beast starts bucking. You tighten your grip and dig your claws of lightning into the creature's celestial body. It cries in agony and begins emitting pulses of energy, each ripping away a portion of the fibers that make up your outer essence.\n\t\t*set Power -25\n\t\t\n\t\t(Power -25)\n\t\t\n\t\t*page_break\n\t\t*if (Power\u003c1)\n\t\t\t*page_break\n\t\t\tYou are no match for the beast and its attacks tear you apart.\n\t\t\t\n\t\t\t\"Maste….\" ${helper}'s voice is the last thing you hear.\n\t\t\t\t\t\n\t\t\t(Power -${Power})\n\t\t\t*achieve sucker \n\t\t\t*set Power 0\n\t\t\t*gosub_scene death\n\t\tIn the end, however, you manage to hold on and your grip burns the creature inside out. The creature's cries only last a moment until the celestial bonds holding it together break and its essence melts into the void.\n\t\t*goto victory\n\t#Leave it be.\n\t\tDeciding it may not be worth it to fight the beast, you decide it may be best to head back for now.\n\t\t\n\t\t*return\n*label victory\n\nHaving defeated the beast, you abate your rage. Meditating, you allow your body to absorb the loose essence around you and you can feel it bolstering the fibers of your being.\n*set Power +pflux\n\n(Power +${pflux})\n\nThe fatigue finally catches up to you.\n\n*return", "hunt_chooser": "*label start\n*temp mod 1\n*if Power>200\n\t*set mod 2\n*if Power>600\n\t*set mod 3\n\n*temp var 0\n*rand var 5 9\n*if (var=5) and (hunt5done=0)\n\t*goto hunt5\n*elseif (var=6) and (hunt6done=0)\n\t*goto hunt6\n*elseif (var=7) and (hunt7done=0)\n\t*goto hunt7\n*elseif (var=8) and (hunt8done=0)\n\t*goto hunt8\n*elseif (var=9) and (hunt9done=0)\n\t*goto hunt9\n*else\n\tYou hunt for decades, but with no luck. The Aether seems oddly quiet.\n\t\n\t*return\n\n*label hunt5\n*set hunt5done 1\n*rand pflux 8 14\n*set pflux *mod\nIt isn't long before you come across a group of small wandering daemons.\n\n\"Those are wisps, Your Greatness.\" ${helper} notes, \"the weakest of all known beings in the Aether, easy pickings.\"\n*choice\n\t#\"Devour the wisps.\"\n\t\tYou protrude your mass outward and in one colossal swoop, sweep the wisps from the void, as if catching them in a net, and ripping what little essence they possessed from their husks.\n\t\t*set power +pflux\n\t\t\n\t\t(Power +${pflux})\n\t\t*choice\n\t\t\t#Continue hunting.\n\t\t\t\t*goto start\n\t\t\t#Head back.\n\t\t\t\t*return\n\t#\"Leave the creatures be.\"\n\t\tYou decide to leave the wisps alone, they aren't even worth the effort. You watch as they continue to swirl through the void, blissfully unaware of their own existence.\n\t\t*choice\n\t\t\t#Continue hunting.\n\t\t\t\t*goto start\n\t\t\t#Head back.\n\t\t\t\t*return\n\n*label hunt6\n*set hunt6done 1\n*rand pflux 18 25\n*set pflux *mod\nDiving through the Aether once again, you almost instantly stumble upon a small daemon fleeing for its life, a gluttonous beast right behind it. The two are far enough away that neither has noticed your presence, so you still possess the element of surprise, but they are rapidly escaping.\n*choice\n\t*selectable_if (Power>45) #Dash ahead and consume both. (-Major Power)\n\t\tWith your superior power, you dash ahead at light speed and catch the little one with ease. Then, before the predator has time to react, you snatch him up as well, trapping him in your omnipotent grip. With nowhere to run, you easily vanquish the daemon and the new power melds with your own, replenishing that which you lost and then some.\n\t\t*set pflux +4\n\t\t*set power +pflux\n\t\t\n\t\t(Power +${pflux})\n\t\t*choice\n\t\t\t#Continue hunting.\n\t\t\t\t*goto start\n\t\t\t#Head back.\n\t\t\t\t*return\n\t*selectable_if (Power>25) #Wrangle the larger one in an energy net. (-Significant Power)\n\t\tYou let loose an expansive bolt of lightning that travels toward the large beast as light speed. You never let the bolt leave your grasp, however, and when it makes contact with the daemon, you ensnare it instantly. From range you are then able to easily crush the creature in your omnipotent grasp and devour its essence, replenishing that which you lost and then some.\n\t\t*set power +pflux\n\t\t\n\t\t(Power +${pflux})\n\t\t*choice\n\t\t\t#Continue hunting.\n\t\t\t\t*goto start\n\t\t\t#Head back.\n\t\t\t\t*return\n\t#Leave them be.\n\t\tYou disregard the two daemons and decide to let nature take its course. It doesn't take long before the two completely vanish out in the vast ethereal space.\n\t\t*choice\n\t\t\t#Continue hunting.\n\t\t\t\t*goto start\n\t\t\t#Head back.\n\t\t\t\t*return\n*label hunt7\n*set hunt7done 1\n*rand pflux 9 14\n*set pflux *mod\nShifting through the infinite expanse, you are careful to remain hidden. Somewhere far from your origin, you finally come across a wandering daemon, apparently feeding off some loose essence clinging to a void rock. The being seems completely unaware of your presence. As you grow stronger, you find daemons and lesser creatures more and more easily fooled.\n\nThe daemon's escape is blocked by the giant rock it clings to. If you strike quickly, it will have no chance of escape.\n*choice\n\t*selectable_if (Power>30) #Stun it with lightning before finishing it with ease. (-Minor Power)\n\t\tYou conjure a bolt of energy and strike the creature square on its core. It squeals and involuntarily splits from the rock, drifting into space. You come up from behind and drain the withered being of its essence.\n\t\t*set power +pflux\n\t\t\n\t\t(Power +${pflux})\n\t\t\n\t\t*fake_choice\n\t\t\t#Continue hunting.\n\t\t\t\t*label fail1\n\t\t\t\tYou search for several more ages, but find little more than some wandering essence dust. With mortal time passing, you eventually return to ${planetname}.\n\t\t\t\t*set Power +5\n\t\t\t\n\t\t\t\t(Power +5)\n\t\t\t\t*return\n\t\t\t#Head back.\n\t\t\t\t*return\n\t#Ignore the beast and move on.\n\t\t*goto fail1\n*label hunt8\n*set hunt8done 1\n*rand pflux 9 14\n*set pflux *mod\n*disable_reuse\nWandering through the Aether, you eventually come across a small daemon gliding through space. Something is different about the creature though, its essence glows brighter than most. You trail the being, careful not to give yourself away.\n*label choice1\n*fake_choice\n\t#\"${helper}, why does that being glow so brightly?\"\n\t\t\"Hmm,\" he ponders, poised above your shoulder, \"perhaps its essence is simply denser than most?\" he answers questioningly.\n\t\t*goto choice1\n\t*selectable_if (Power>50) #Attack the being by surprise. (-Major Power)\n\t\tYou launch toward the being the great speed, attempting to snatch it from the void with relative ease. However, just as you reveal yourself from behind the space debris, the daemon propels itself away at near the speed of light. Quickly reacting, you arc a bolt of lightning in its general direction, but it connects to a nearby asteroid instead.\n\t\t*set Power -pflux\n\t\t\n\t\t(Power -${pflux})\n\t\t\n\t\t\"Incredible,\" ${helper} remarks. \"The small daemon must've had quite a bit of energy stored up. Do not fret, Great One, I have no doubt you will destroy it eventually.\"\n\t\t*fake_choice\n\t\t\t#Continue hunting.\n\t\t\t\t*goto start\n\t\t\t#Head back.\n\t\t\t\t*return\n\t#Follow it further.\n\t\tYou continue trailing the being until suddenly it darts through the void at the speed of light, immediately breaking your vision of it.\n\t\t*choice\n\t\t\t*selectable_if (Power>100) #Chase after it.\n\t\t\t\tYou pursue the daemon at near the speed of light yourself. You chase the little white dot in front of you, but limitations on your power prevent you from moving in quicker. Finally, the daemon is forced to stop and you plow straight into it. The force and energy of the impact shatters the creature into pieces. Curious, you approach the splattered essence and absorb it. Though it is not nearly the most you have seen from a daemon, its concentration is great and you feel a rush similar to that when you first absorbed the power of the dieing god.\n\t\t\t\t*set pflux *7\n\t\t\t\t*set Power +pflux\n\t\t\t\t\n\t\t\t\t(Power +${pflux})\n\t\t\t\t\n\t\t\t\t\"Incredible,\" ${helper} remarks. \"I can not comprehend how, but that daemon managed to accumulate quite a bit of power and still maintain its small form.\"\n\t\t\t\t\n\t\t\t\tUnsure what to think of it as well, you are forced to move on.\n\t\t\t\t*fake_choice\n\t\t\t\t\t#Continue hunting.\n\t\t\t\t\t\t*goto start\n\t\t\t\t\t#Head back.\n\t\t\t\t\t\t*return\n\t\t\t#Continue hunting.\n\t\t\t\t*goto start\n\t\t\t#Head back.\n\t\t\t\t*return\n*label hunt9\n*set hunt9done 1\n*rand pflux 110 126\n*set pflux *mod\nYou anxiously fly through The Aether, continuing your eager search for weaker beings. You glide around an unusually large rock formation, adrift in the vastness of the void, when you catch sight of a small grotto dug into its side. A strange feeling overcomes you, as if knowing there was source of power residing within.\n\nSuddenly, the cave entrance is consumed by a dark haze and it quickly surrounds you. Growing closer, you feel suffocated by whatever the dark power is. The sound of a faint groan permeates the void around you.\n*fake_choice\n\t*selectable_if (Power>90) #Release an explosion of energy around you. (-Major Power)\n\t\tEverything goes white for a moment and upon regaining your sight you see the rock flying away from you at incredible speed, and a dark creature tailing behind it, clinching on for dear life.\n\t\t*set power -74\n\t\t\n\t\t(Power -74)\n\t\t*fake_choice\n\t\t\t#Lasso the creature back to you.\n\t\t\t\tYou conjure a rope of essence and launch it toward the rocketing debris, grabbing hold of the mysterious creature. With a firm yank, you tear the dark being from the rock and pull it toward you. The being scream and lunges toward you with its own net of dark energy.\n\t\t\t\t*fake_choice\n\t\t\t\t\t*selectable_if (Power>30) #Shoot the creature. (-Significant Power)\n\t\t\t\t\t\tWithout hesitation, you quick-conjure a bolt of energy and send it at the daemon. It strikes it at its center, splattering its essence backward.\n\t\t\t\t\t\t*set power -9\n\t\t\t\t\t\t\n\t\t\t\t\t\t(Power -29)\n\t\t\t\t\t\t\n\t\t\t\t\t#Try to evade its attack.\n\t\t\t\t\t\tWithout hesitation, you dash aside, but the eager daemon grabs hold of you with a single arm of its dark ethereal energy. Angered, you emit a shock of essence which travels up the being's already weakened form. Stunned, the fibers holding the dark creature together fail and the creature falls apart, its essence leaking back into the Aether.\n\t\t\t\tYou slurp up the essence, which has already returned to its light nature after being freed from the being's bonds, and feel empowered. Nothing strikes you as unusual about the essence.\n\t\t\t\t*set power +pflux\n\t\t\t\t\n\t\t\t\t(Power +${pflux})\n\t\t\t\t*goto done1\n\t\t\t#Let the creature flee.\n\t\t\t\tYou allow the mysterious being to escape, relieved it didn't have another second to ensnare you.\n\t\t\t\t*goto done1\n\t#Try to flee.\n\t\tYou fire a small burst of energy against the dark haze, hoping to reveal an exit. A squeal erupts as the dark mist seems to burn at your touch. Quickly, you flee the being's suffocating grasp before it can reform the mist around you. You gain no power, but manage to escape the mysterious being's entailment.\n\t\t*goto done1\n*label done1\n\nYou fly away from the scene, still unsure what could've turned the being's essence so dark.\n*fake_choice\n\t#Continue hunting.\n\t\t*goto start\n\t#Head back.\n\t\t*return\n", "male_generator": "*temp randname 1\n*temp randgender 1\n\n*label firstname \n*rand randname 1 100\n\n*rand randgender 1 2\n*if randgender=1\n\t*goto male_names\n*if randgender=2\n\t*goto uni rname\n\t\n*label surname\n\n*return", "merchant": "*allow_reuse\n*if hasbeen = false\n\t*set hasbeen true\n\tYou wander over to the market stalls and walk by countless beings auctioning off their goods, some famous artifacts like the petrified head of Cleopatra and others simple souvenirs like an artificial eye of Ra. You pass one stall and the merchant grabs your attention. \n\t\t\n\t\"You there, Godly Person,\" he shouts, \"you seem like you face the headaches brought on by foolish mortals and potent beings, yes? Perhaps you should carry one of Richardo's Essence Stones. Guaranteed to solve any of your godly headaches or even save you life.\"\n\t\t\n\tHe picks up a small silver stone that emanates with power. \"The secret,\" he whispers to you closely, \"concentrated power within the stone. Break it open and feel the greatest rush of power you'll ever experience!\"\n\t*fake_choice\n\t\t#\"What's the catch?\"\n\t\t\t\"You seem like quite an intelligent being, unlike many others,\" the merchant exclaims. \"I'm afraid these stones are very rare, my friend. I would be happy to sell one to you for the right price, however.\"\n\t\t#\"Relinquish the stone to me, merchant!\"\n\t\t\tThe merchant pulls away, pulling the stone close to his core. \"You seem like quite an intelligent being, unlike many others, but I'm afraid these stones are very rare, my friend. I would be happy to relinquish a stone to you for the right price, however.\"\n\tThe merchant steps back to his stall, on the shelf you see four distinct stones resting on the table. \"I must warn you, however,\" the merchant remarks, \"your form may need time to rest after such a burst of power, so they should only be used when necessary.\"\n\t*fake_choice\n\t\t#\"How much are they?\"\n\t\t\tThe merchant ponders for a moment, \"Normally I charge 300 Essence each, but for you, my friend, I would be willing to make a deal.\"\n\t\t\t*fake_choice\n\t\t\t\t#\"What kind of deal?\"\n\t\t\t\t\t\"I possess no talent for crea
