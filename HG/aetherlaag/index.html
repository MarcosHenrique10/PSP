ptical of her claim that you and ${godname} are one. However, after much deliberation, they unanimously conclude that her argument is within reason; their faith lies with you and not this secondary entity. The church concludes that while ${godname} may still be acknowledged, all worship is instead to be made to you.\n\t\t\t\t\t\n\t\t\t\t\tFrom that point onward, the church ceases its glorification of ${godname}, but many are displeased with the change and still acknowledge the being separately as The Life Guider. This tear in beliefs causes many feuds between your people and they begin to divide.\n\t\t\t\t\t*goto continue\n\t#\"Remove the false icon from this city or you will all perish.\"\n\t\tThe woman bows humbly. \n\t\t*goto response\n*label continue\n*page_break\n*set mostknown unitname\nWith the flux of religious change and the growth of the race's population, it is an extremely eventful era for the ${race1}. Greater cities begin sprouting all across ${planetname}. Their skills evolve further and artisans begin crafting more complex materials, metal alloys, and fabrics. Along with the surge of technology, the amount of worship and prayer you receive grows tremendously as well. \n*set Power +pflux\n\n(Power +${pflux})\n\nSuddenly, a disturbance washes over you.\n*temp gonehunting false\n*temp gonecourt false\n*set eventcounter 0\n*page_break\n*gosub_scene event_chooser\n*page_break\n*label continuation\nWith the matter settled, ${helper} almost immediately grabs your attention, \"You should continue to grow your power beyond that which the mortals provide you, Master. Perhaps it is time to pay another visit to the Court?\"\n*fake_choice\n\t#Head to the Court.\n\t\t*label gointodacourt\n\t\t*set gonecourt true\n\t\tYou guide yourself to the court and make your way to the Court Center with ease.\n\t\t*fake_choice\n\t\t\t#Visit the marketplace.\n\t\t\t\t*if hasbeen = true\n\t\t\t\t\tYou visit the market on the way. As usual, the place is bustling with all sorts of daemons.\n\t\t\t\t\t\n\t\t\t\t\tYou make your way toward the only merchant that offers you something useful. \n\t\t\t\t\t\n\t\t\t\t\t\"My friend, come, come,\" the vendor remarks.\n\t\t\t\t*gosub_scene merchant\n\t\t\t\t\n\t\t\t\tAfter making the trip from the market, you begin the journey up the Courthouse steps.\n\t\t\t\t\n\t\t\t\t*goto cc\n\t\t\t#Go straight to the Courthouse.\n\t\t\t\t*label cc\n\t\t\t\t\"Seeking more work, ${name}?\" the door-daemon inquires upon your approach. \n\t\t\t\t*gosub_scene quest_chooser\n\t\t\t\t*if fin1=0\n\t\t\t\t\t*goto goinghome\n\t\t\t\t*if fin1=1\n\t\t\t\t\t*goto thisisbecauseyoucantfalloutofanelsestatement\n\t#Go hunting instead.\n\t\t*set gonehunting true\n\t\t*gosub_scene hunt_chooser\n\t#Stay at ${planetname}.\n\t\t${helper} is clearly displeased by your decision. \"Very well, Omnipotent One. Are you going to intervene on your creations and push them ahead?\"\n\t\t*goto choice1\n*label goinghome\nAs you return home, ${helper} rambles on your shoulder, \"Almighty Great One, isn't it marvelous? Your ${race1} are making such great progress! It could, however, grow to be both a blessing and a curse. Though, with the increased population and lifespans, the power you receive from prayers will be greater, the development of their minds may continue to cause them to drift apart from your divine path. But I have no doubt your omnipotence will guide them in the direction of your will, Great One!\"\n\nFocusing on your creations more-so than ${helper}'s flattery, you do take note of the ${race1}'${ad} great progress, but further intervention from you could push them a bit further if you wish.\n*label choice1\n*disable_reuse\n*rand pflux 100 150\n*line_break\n*line_break\nPower: ${Power}\n*fake_choice\n\t*selectable_if (Power > 185) #Teach the ${race1} how to harness electricity. (-Great Power)\n\t\t*set power -185\n\t\tBoom! Crash! You hurl lightning bolts across ${planetname}, the current electrifying metal for miles and causing hair to stand on end. Finally, after months of trying to get your point across, one of the ${race1} gets an idea. After watching how the intense heat could make metal glow; she devised a contraption out of particular metals that would house the energy in a conductive paste and release it when a similarly conductive material was introduced for it to flow through. It would take many more years before a reliable supply of energy could be implemented, but the race is on its way to great technology breakthroughs!\n\t\t\n\t\t(Power -112)\n\t\t*set race1strength +2\n\t\t*goto choice1\n\t*selectable_if (Power > 100) #Teach the ${race1} mechanical engineering. (-Major Power)\n\t\t*set power -pflux\n\t\tYou find the most brilliant and evolved minds among the ${race1} and inspire them to experiment further with their physical world. A few individuals focus their attention on the physics of liquids while others engage themselves with structures and mechanics. With your divine spark cranking their minds, it doesn't take long before cities start producing aqueducts, mills, and basic machines like crossbows and gatehouses. Over the years, the ${race1} fine tune their inventions, recording smaller increments and even time.\n\t\t\n\t\t(Power -${pflux})\n\t\t*set race1strength +1\n\t\t*goto choice1\n\t*selectable_if (Power > 100) #Show the ${race1} how to better navigate. (-Major Power)\n\t\t*set power -pflux\n\t\tYou speak with the pioneers among the race, the brave souls that venture out into the unknown, and teach them the art of using the stars to navigate. You tell them of the constellations you've made to guide them into creating maps thats implement longitudinal lines that run horizontally across ${planetname}. ${race1} will now be able to travel much further distances.\n\n\t\t(Power -${pflux})\n\t\t*set race1strength +1\n\t\t*goto choice1\n\t*selectable_if (Power > 100) #Teach the ${race1} how to make medicine. (-Major Power)\n\t\t*set power -pflux\n\t\tYou go to the herbalists among your people and inspire them to create more advanced concoctions. You grow and lead them to the appropriate plants to experiment with. Just as planned, new and more effective remedies become common place throughout society and many herbalists begin taking on more pupils to teach them the art of medicine crafting.\n\n\t\t(Power -${pflux})\n\t\t*set race1strength +1\n\t\t*goto choice1\n\t#Rest\nWith the race settled, for now, you once again return to watching over all of creation, only to be interrupted once more by your race's constant desire for intervention.\n*if (obed>1)\n\t*set loyalty \"Firm\"\n\n*gosub_scene event_chooser\n*page_break\n*label fin\n*allow_reuse\n*if (eventcounter=8)\n\t*achieve quester\n\tYou have answered all the prayers your mortals have sent you this age. The ${race1} are so content that the race enters a golden era, improving the race's growth and development.\n\t*set race1strength +2\n\t*goto thisisbecauseyoucantfalloutofanelsestatement\n*elseif eventcounter\u003c8\n\tReturning to the skies of ${planetname}, still more prayers come to you from your ${race1}.\n\t*goto thisisbecauseyoucantfalloutofanelsestatement\n*label thisisbecauseyoucantfalloutofanelsestatement\n*set fin1 1\n*choice\n\t*if (gonehunting=false) #Take a break and go hunting for essence.\n\t\t*gosub_scene hunt_chooser\n\t\t*goto fin\n\t*if (gonecourt=false) #Visit the Court.\n\t\t*goto gointodacourt\n\t*selectable_if (eventcounter\u003c8) #Answer another prayer.\n\t\t*gosub_scene event_chooser\n\t\t*goto fin\n\t#Rest.\n\t\t*label popcalc\n\t\t*temp pop\n\t\t*rand pop 8 16\n\t\t*set race1size ((race1strength) + (pop))\n\t\t*set race1size \"${race1size} million\"\n\t\t*set pflux (38*(race1strength))\n\t\tWith the disputes settled and desires all quenched, you are finally able to rest.\n\t\t*finish Rest\n", "chapter6": "*disable_reuse\n*set loyalty \"Faithful\"\n*set earlygame false\n*set midgame true\n*comment THE ABOVE EARLY/MID SET IS ALREADY DONE IN CH 5.\n*gosub_scene city_generator\n*set largestcity cityname\n*rand wars 15 25\n*set lifespan +3\n*page_break\nFor the first time in ages you awaken on your own accord, managing to get a full era's rest. All seems quiet around you and the Aether remains relatively undisturbed. You glance down to ${planetname} and find the ${race1} still scurrying about the surface, only their technological advancements have come far. When you last saw your beloved race, they were still learning how to glue rocks together, but now large metallic structures protrude from the ground and scrape against the sky. As you stretch your celestial limbs, you once again feel power surging through you thanks to your scrupulous followers. The resources you have invested in their development finally seem to be paying off.\n*set Power +pflux\n\n(Power +${pflux})\n\n${helper} soon greets you, \"Ah, welcome back to the world of the sentient, Great One. I hope your long rest has you feeling refreshed and ready to take on the universe! I kept watch over your ${race1} while you rested and, aside from their technological pursuits, things have been mostly quiet until recently. It seems that once again, your ${race1} are becoming restless with their current knowledge and understanding of the universe and have begun developing all sorts of convoluted alterations to your religion, Almighty One.\"\n*rand pflux 140 160\n*fake_choice\n\t#\"You should have asked for my intervention.\"\n\t\t${helper} tucks his metaphysical head down, \"I apologize, Master. I thought you would prefer rest.\" \n\t#\"You did well not to wake me.\"\n\t\t${helper} flutters with glee. \nTransferring your gaze to ${planetname}, you eavesdrop on the worship of your mortals and their masses.\n\n\"…and then ${name} graced us with ${his} presence!\" You hear a minister preaching, \n*if (belief=1)\n\t\"${name} corrected the blasphemy of our forefathers and taught us the way of the cosmos. That upon our demise, we shall rejoin The Energy and become one with the universe. So I pass this wisdom unto you, brothers and sisters, take advantage of your mortality now for when it is over, you will have no place on ${planetname} anymore.\" \n\n\tThe audience seems eager to escape and almost immediately after the minister finishes his last sentence, they rush out the door. Not only did very little praise actually occur, but what takes place outside shocks you. The ${race1}'${ad} industry spews toxic chemicals into the atmosphere, poisoning their own air, forests are burned and their resources extinguished, and the wildlife you so painstakingly hand-crafted is slaughtered with careless regard.\n\t\n\t\"I had no idea they would resort to such brutish practice so quickly. My greatest apologies, Great One, I did not know,\" ${helper} confesses.\n\t*choice\n\t\t#Unleash terrible natural disasters to halt their activity.\n\t\t\t*set Evil -3\n\t\t\tYour anger at the mortals builds up to the point that it must be unleashed in some form. You grab hold of the planet and your energy discharges across ${planetname}, materializing as massive hurricanes, volcanic eruptions, earthquakes, and tsunamis. Cities across the globe enter states of emergency and the message that you are unhappy is very clear.\n\t\t\t\n\t\t\tThe disasters you unleash wreak havoc on the ${race1} and their economy is in ruin. They have no choice but to regard you now and church attendance is higher than ever. Individuals seek answers and aid through this terrifying time.\n\t\t\t*goto continue\n\t\t#\"My creations have finally embraced their potential!\"\n\t\t\t*set Evil +5\n\t\t\tYou laugh maniacally and it erupts as harsh thunder on the planet's surface. \"I can always create more resources, but I can't pull divine power out of nothing. This is exactly what I wanted from my creations,\" you explain to ${helper}.\n\t\t\t\n\t\t\t\"Brilliant, Omnipotent One! That is why you are the God and I am but your humble assistant,\" ${helper} remarks.\n\t\t\t\n\t\t\tYou stem the growth of wildlife across ${planetname} and do your best to thin the dispersion of the ${race1}'${ad} poisonous toxins. Though your presence is indirect, your assistance fuels the ${race1}'${ad} growth tremendously.\n\t\t\t*set race1strength +1\n\t\t\t*goto continue\n*elseif (belief=2)\n\t\"${name} corrected the blasphemy of our forefathers, blessing those who repented and joined the righteous path! For those who follow in ${his} wake shall ascend into The Beyond, the realm of perfection. \" \n\t\n\tThe individuals attending the session then begin shouting inaudible chants in some ancient tongue you had long assumed forgotten, \"Thank, ${name}, for the blessings ${he} has bestowed upon us. May ${he} guide us away from the impure. For our physical bodies are temporary and soon we will ascend to be with ${name}.\" \n\t\n\tAfter finishing their clearly rehearsed mantra, the minister continues, \"Those that believe themselves ready, please approach the alter and prepare for ascension.\" You watch as dozens of your followers approach the alter, where corresponding cups rest, and prepare to consume a poisonous substance.\n\n\t\"I had no idea the ${race1} were resorting to self-sacrifice. Their devotion would provide you with a great deal of power though, Great One,\" ${helper} informs you.\n\t*choice\n\t\t#Shatter the cups containing the poison.\n\t\t\t*set primarytrait \"Individualists\"\n\t\t\t*set Evil -5\n\t\t\tYou clinch your fists and the matter comprising each cup gives way, breaking into dozens of small pieces and allowing the liquid to spill out across the table.\n\t\t\t\n\t\t\tThe room false silent for a moment as no one, not even the minister, knows how to respond. Suddenly, an uproar comes over the crowd, as no such event could have been sheer coincidence. The minister tries desperately and foolishly to calm the enraged participants. Your message is clear and ${race1} take to the streets in protest of the practice, shouting things like, \"${name} wants us to live!\" \"Pro-life, pro-life!\" \"Go away false herdsmen!\"\n\t\t\t\n\t\t\tThough the power your worshippers provide you hardly increases, your grandiose display against sacrifice earns you a new appreciation amongst modern and progressive individuals.\n\t\t\t*goto continue\n\t\t#\"My mortals will finally grant me the power I need!\"\n\t\t\t*set primarytrait \"Evangelic\"\n\t\t\t*set Evil +5\n\t\t\tYou allow the followers to consume the poison and one by one their life essence fades from their bodies. Those remaining in the audience cheer for the corpses and the bodies are taken to be cremated. The life-sacrificing worship grows more and more popular as ${race1} around ${planetname} desire to ascend into The Beyond. With every devoted death, you feel the fibers in your being strengthen.\n\t\t\t*set Power +pflux\n\n\t\t\t(Power +${pflux})\n\t\n\t\t\tThe perverse practice continues to be controversial, but turns out to be ambivalent for the race. The reduced population makes progress and reproduction more difficult, but reduces their environmental impact on ${planetname}. Overall, the practice yields a much more significant, reoccurring source of power for you.\n\t\t\t*goto continue\n*elseif (belief=3)\n\t\"${name} corrected the blasphemy of our forefathers who once looked to a devil as their guide through the afterlife. Thanks to ${name} and The Divine Intervention, we now know that this is not true. Mortals guide themselves to a new body, you,\" he emphasises, \"can guide yourself to a better body. Donating to the church will empower your spirit, paying homage to ${name} will empower your spirit. These are ways you can be reincarnated as a better you.\" The minister dismisses the church and nearly every individual gives the preacher a significant donation. The mortals take your name seriously and are devoted, you can feel their praise empowering you.\n\t*set pflux/2\n\t*set Power +pflux\n\t\n\t(Power +${pflux})\n\t\n\tIt is clear to you that many of the religious figures among the ${race1} have begun extorting others for their own gain, but in the process encourage others to worship you further. This burden created by the church hinders many, but is beneficial for both you and those and your religious sect.\n\t\n\t\"I could not see this corruption in the church. My greatest apologies, Great One, I did not know,\" ${helper} confesses.\n\t*choice\n\t\t#Condemn the preachers.\n\t\t\t*set Evil -5\n\t\t\tYou go before the holy men and women of your sect and scold them for their crimes. You give them no choice, either cease their corruption and use the charity for the church or they will face whatever wrath you deem fit. Fortunately, however, it never has to come to that. The religious leaders are quick to spend their savings on improving the conditions of the church. Many hold feasts for those of the community and overall your words improve the strength of your ${race1}.\n\t\t\t*goto continue\n\t\t#Allow the preachers to continue their practice.\n\t\t\t*set Evil +5\n\t\t\tYou look past the corruption among those that still tilt the scale in your favor. The economic drain caused by the church slows the technological progress of society, regardless of whether or not it was intended. The power your worshippers provide you is increased as a result as well.\n\t\t\t*goto continue\t\n*label continue\n*page_break\n*set planlooks \"Industrial cities riddle the landscapes and pollute the environments.\"\nJust then, as you observe the ${race1} recoiling from your intervention, a flash catches your divine eye. In the distance, you spot a daemon squirming through the Aether, scavenging for power scraps. The beast seems completely unaware of you while your mind is concentrated in the dimension of your mortals. You break your focus away from ${planetname} and almost immediately the beast spots you and darts away. You can only assume the daemon isn't powerful enough to acknowledge or even see alternate dimensions.\n\nWith the problem corrected and the daemon having taken your attention off ${planetname}, you come to realize its been quite some time since you last visited the Court, a few hundred generations of ${race1} in fact. Surely some god would have a contract for you to fulfil. Then again, if there's one daemon nearby there may be more to hunt and the mortal prayers are building up as well. [i]Which should be tackled first?[/i] you ponder.\n*temp went 1\n*temp answeredprayers 0\n*label datchoice\n*fake_choice\n\t#Visit the Court.\n\t\tYou head to the Court once again, deciding the other tasks can wait. You enter with ease.\n\t\t*fake_choice\n\t\t\t#Visit the marketplace.\n\t\t\t\t*if hasbeen = true\n\t\t\t\t\tYou make your way through the stalls of the Court market, dodging individuals soliciting their goods. Finally, you reach the appropriate merchant.\n\t\t\t\t\n\t\t\t\t\tHe grins upon seeing your approach. \"Ah, come to make a mutually beneficial exchange I hope,\" the vendor remarks.\n\t\t\t\t*gosub_scene merchant\n\t\t\t\t\n\t\t\t\tAfter reaching the center, you immediately turn and start up the Courthouse steps again.\n\t\t\t\t\n\t\t\t\t*goto cc\n\t\t\t#Go straight to the Courthouse.\n\t\t\t\t*label cc\n\t\t\t\t\"Welcome back,\" The daemon manning the door hails you. \n\t\t\t\t*set went 1\n\t\t\t\t*gosub_scene quest_chooser\n\t\t\t\t*goto donewithvisit\n\t#Go hunting.\n\t\tPrayers can wait and rather than immediately heading to the Court, you decide the better option may be to track that daemon.\n\t\t\n\t\t*set went 2\n\t\t*gosub_scene hunt_chooser\n\t\t*goto donewithvisit\n\t#Answer individual prayers.\n\t\tYou decide its best not to let mortal requests build up, so you remain at ${planetname} for now.\n\t\t\n\t\tAs if queued, a mortal plea reaches you.\n\t\t*label answeringprays\n\t\t*allow_reuse\n\t\t*set answeredprayers +1\n\t\t*gosub_scene event_chooser\n\t\t*if answeredprayers=7\n\t\t\tAt last, after what seemed centuries, you fulfill the final request, for now at least.\n\t\t*if answeredprayers\u003c7\n\t\t\tYou return to the skies, but there are plenty more requests being made.\n\t\t*fake_choice\n\t\t\t*selectable_if (answeredprayers\u003c7) #Continue watching over ${planetname}.\n\t\t\t\t*goto answeringprays\n\t\t\t#Move on to other matters.\n\t\t*disable_reuse\n\t\t*goto datchoice\n*label donewithvisit\n*page_break\n*if (went=1)\n\tOn your return to ${planetname}, you come across a sliver of astral essence floating through space. Where it came from, you aren't certain, but you waste no time snatching it up.\n\t*set power +6\n\t\n\t(Power +6)\n\t\n\tThe small charge was quite refreshing after your recent visit to the Court. Perhaps the source of the lost essence is nearby as well.\n\t*choice\n\t\t#Track more essence.\n\t\t\tYou sniff around for traces of nearby essence and find yourself heading off course in search of additional power.\n\t\t\t\n\t\t\t*gosub_scene hunt_chooser\n\t\t\t*goto home\n\t\t#Return to ${planetname}.\n\t\t\tRather than wasting your time with insignificant sources, you head straight back to ${planetname} to check on the ${race1}.\n\t\t\t*goto home\n*if (went=2)\n\tAfter your journey, you ponder whether or not you should give the Court a visit before returning to your mortals.\n\t*choice\n\t\t#Head to the Court.\n\t\t\tYou decide to head to the Court once again.\n\t\t\t*fake_choice\n\t\t\t\t#Visit the marketplace.\n\t\t\t\t\tYou make your way through the stalls of the Court market, dodging individuals soliciting their goods. Finally, you reach the appropriate merchant.\n\t\t\t\t\t\n\t\t\t\t\tHe grins upon seeing your approach. \"Ah, come to make a mutually beneficial exchange I hope,\" the vendor remarks.\n\t\t\t\t\t*gosub_scene merchant\n\t\t\t\t\t\n\t\t\t\t\tAfter reaching the center, you immediately turn and start up the Courthouse steps again.\n\t\t\t\t\t\n\t\t\t\t\t*goto cc2\n\t\t\t\t#Go straight to the Courthouse.\n\t\t\t\t\t*label cc2\n\t\t\t\t\t\"Welcome back,\" The daemon manning the door hails you. \n\t\t\t\t\t*set went 1\n\t\t\t\t\t*gosub_scene quest_chooser\n\t\t\t\t\t*goto home\n\t\t#Return to ${planetname}.\n\t\t\tDeciding your current strength is sufficient, you head straight back to ${planetname} to check on your ${race1}.\n\t\t\t\n\t\t\t*gosub_scene hunt_chooser\n\t\t\t*goto home\n\n\t\t\t\n*label home\n\"Welcome back, Your Omnipotence,\" ${helper} greets you upon your return to the skies of ${planetname}. \"The mortals' prayers are really piling up now with their population growing so rapidly.\"\n*temp pflux2 round(Power*(16/100))\n*label choice3\n*allow_reuse\n*fake_choice\n\t*disable_reuse #Answer mortal prayers. (-Great Power)\n\t\tYou concentrate on ${planetname} and hear the voices of millions of ${race1}. The race has grown significantly over the past few ages. Using your divine focus, you answer what prayers that you can. Reviewing the recent years of history and shaping the mentality of the beings.\t\t\n\t\tOverall, the race's strength grows stronger thanks to your intervention.\n\t\t*set Power -pflux2\n\t\t*set obed +1\n\n\t\t(Power -${pflux2})\n\t\t\t\n\t\tAfter recoiling from the task, another request suddenly reaches your divine ear.\n\t\t*page_break\n\t\t*gosub_scene event_chooser\n\t\t*page_break\n\t\tWith the matter resolved you are finally able to refocus your attention on other issues. \n\t\t*goto choice3\n\t*if (answeredprayers\u003c7) #Answer individual prayers.\n\t\t*label answeringprays2\n\t\t*set answeredprayers +1\n\t\t*gosub_scene event_chooser\n\t\t*page_break\n\t\t*if answeredprayers=7\n\t\t\tAt last, after what seemed centuries, you fulfill the final request, for now at least.\n\t\t*if answeredprayers\u003c7\n\t\t\tYou return to the skies, but still more requests are being made.\n\t\t*fake_choice\n\t\t\t*selectable_if (answeredprayers\u003c7) #Continue watching over ${planetname}.\n\t\t\t\t*goto answeringprays2\n\t\t\t#Move on to other matters.\n\t\t\t\t*goto choice3\n\t#Rest.\n\t\t\"Not now,\" you assert. You spread out and relax in your domain after a long era of ruling. \nYou find that with the culmination of your power, your rests grow shorter. Even with the power fluctuations you have endured recently, you slept for only a thousand mortal years.\n*disable_reuse\n*page_break\n*label popcalc\n*temp pop\n*if (belief=2)\n\t*set pflux (56*(race1strength))\n\t*rand pop 12 14\n\t*set race1size ((race1strength) + (pop))\n\t*set race1size \"${race1size}0 million\"\n\t*goto done\n*else\n\t*set pflux (51*(race1strength))\n\t*rand pop 20 23\n\t*set race1size ((race1strength) + (pop))\n\t*set race1size \"${race1size}0 million\"\n\t*goto done\n*label done\n*finish", "chapter7": "*disable_reuse\n*gosub_scene city_generator\n*set earlygame false\n*set midgame false\n*set plevel 0\n*temp pflow Power\n*set loyalty \"Diverging\"\n*temp datname cityname\n*set disaster \"War of ${datname}\"\n*gosub_scene city_generator\n*set lifespan +11\n*page_break\n\"Great One,\" ${helper} grabs your attention as soon as you awaken, \"I have been pondering. I am certain you have come to realize just how chaotic mortals can be. It may be wise to create some kind of guidance for them. Something to more easily direct your creations without pulling every strain of power you possess.\"\n\nYou contemplate ${helper}'s insight for a time until you develop the ideal solution. \"I need a prophet,\" you proclaim.\n\nFor the first time in millennia, you enter your metaphoric workshop. Grabbing the old template you used to create the very first two ${race1}, you harness an insignificant amount of your power to shape the body of your prophet.\n\t\t\nSilently, you ponder the being's characteristics, [i]First and foremost, should my prophet be male or female?[/i]\n*fake_choice\n\t#Male\n\t\t*temp ad1 \"him\"\n\t\t*temp ad2 \"his\"\n\t\t*temp ad3 \"He\"\n\t\t*temp ad4 \"he\"\n\t\t*temp ad5 \"he\"\n\t\t*gosub_scene male_generator\n\t#Female\n\t\t*temp ad1 \"her\"\n\t\t*temp ad2 \"her\"\n\t\t*temp ad3 \"She\"\n\t\t*temp ad4 \"she\"\n\t\t*temp ad5 \"she\"\n\t\t*gosub_scene female_generator\n\t#Unisex\n\t\t*temp ad1 \"them\"\n\t\t*temp ad2 \"their\"\n\t\t*temp ad3 \"The Being\"\n\t\t*temp ad4 \"the being\"\n\t\t*temp ad5 \"they\"\n\t\t*gosub_scene male_generator\n[i]How do I want this prophet to enact my will?[/i]\n*comment ALIGNMENT 0-8; 0=EVIL 8=ALTRUISTIC\n*fake_choice\n\t#${ad3} will be benevolent and unifying.\n\t\t*set alignment 6\n\t#${ad3} will be righteous and just.\n\t\t*set alignment 4\n\t#${ad3} will rule with an iron fist.\n\t\t*set alignment 2\n[i]Now that the basics are out of the way, I need to decide how much power I'm willing to invest in this prophet.[/i]\n*temp choicesused 0\n*temp pdrain\n*label choice1\n*if (choicesused=4)\n\t*line_break\n\t*line_break\n\tYou exhaust the traits of mortals into this being and, with every chance in the universe, you send ${ad1} to ${planetname}.\n\t\n\t*goto done\n*line_break\n*line_break\nPower: ${Power}\n*fake_choice\n\t*if (essencestones>0) #Use an Essence Stone on ${ad1}. (-Essence Stone)\n\t\tYou crumble the stone over the ethereal body and the concentrated essence quickly soaks into the mortal structure. Imbued with this kind of power, you are certain there is nothing this prophet can not accomplish.\n\t\t*achieve smart\n\t\t*set plevel +6\n\t\t*set essencestones -1\n\t\t*goto choice1\n\t*selectable_if (Power>23) #Make ${ad1} larger than most ${race1}. (-Minor Power)\n\t\t*set choicesused +1\n\t\t*set plevel +2\n\t\t*set pdrain round(pflow/20)\n\t\t*set Power -pdrain\n\t\tYou infuse the prophet's body with divine essence. The muscles that tie ${ad2} body together and the bones that support them grow larger. The simple infusion requires very little strength.\n\t\t\n\t\t(Power -${pdrain})\n\t\t*goto choice1\n\t*selectable_if (Power>55) #Make ${ad1} more attractive to other ${race1}. (-Major Power)\n\t\t*set choicesused +1\n\t\t*set plevel +2\n\t\tYou chip away at the prophet's face, molding it into what the ${race1} would consider beautiful. The tedious fine tuning and precision takes a noticeable toll on your fortitude, but the end results may be worth it.\n\t\t*set pdrain round(pflow/10)\n\t\t*set Power -pdrain\n\t\t\n\t\t(Power -${pdrain})\n\t\t*goto choice1\n\t*selectable_if (Power>143) #Give ${ad1} a silver tongue. (-Great Power)\n\t\t*set choicesused +1\n\t\t*set plevel +3\n\t\t*set pdrain round(pflow/7)\n\t\tYou drill into the mind of your creation and tweak ${ad2} neurons. Though you don't actually turn ${ad2} tongue to silver, the prophet's power of persuasion and charisma will rival any politician's.\n\t\t*set Power -pdrain\n\t\t\n\t\t(Power -${pdrain})\n\t\t*goto choice1\n\t*selectable_if (Power>253) #Give ${ad1} the gift of wisdom. (-Massive Power)\n\t\t*set choicesused +1\n\t\t*set plevel +4\n\t\t*set pdrain round(pflow/5)\n\t\tHarnessing your power and the essence around you, you stream the traits of virtue into the prophet: Passion, discipline, confidence, knowledge, and understanding; everything that makes up wisdom. This mortal will certainly lead the world through body and mind.\n\t\t*set Power -pdrain\n\t\t\n\t\t(Power -${pdrain})\n\t\t*goto choice1\n\t#Finalize the prophet.\n\t\tYou spark life into the soul essence of your creation and send ${ad1} to ${planetname}.\n\t\t\n\t\t*goto done\n*label done\n*page_break\nThe prophet is born on a cool autumn's day, as the plant life of ${planetname} have just entered their initial stages of hibernation. ${ad3} is birthed by a female who names ${ad1}, ${unitname}.\n*fake_choice\n\t#Remain passive during ${ad2} childhood.\n\t\t${unitname}, the future prophet, has a modest life as the child of two dairy farmers. Life is fair and just to ${ad1} and ${ad4} is forced to work hard for everything in life. \n\t\t*if plevel>6\n\t\t\tThough ${ad4} doesn't receive a great education from the local school systems, ${ad4} learns quickly thanks to ${ad2} inquisitive nature. \n\t\t*if plevel\u003c7\n\t\t\t${ad3} struggles through school, finding the physical world difficult to understand. \n\t\t\n\t\tDespite the difficulties, however, ${unitname} manages to pass grade school and be accepted to a\n\t\t*if plevel>4\n\t\t\tuniversity of grand prestige.\n\t\t*if plevel\u003c5\n\t\t\tlocal university.\n\t#Let ${ad1} grow up in a peaceful environment.\n\t\t*set alignment +1\n\t\t${unitname}, the future prophet, is born as the child of two luxuries businesspeople. ${ad3} receives an excellent education in the upper district of ${cityname}.\n\t\t*if plevel>6\n\t\t\tThough ${ad2} education proves grueling through a strict curriculum, ${ad4} learns quickly thanks to ${ad2} inquisitive nature. \n\t\t*if plevel\u003c7\n\t\t\t${ad3} struggles through the early years of ${ad2} education as the physical world proves difficult for ${ad1} to understand. \n\t\t\n\t\tDespite the struggles, ${unitname} manages to pass grade school, emerging with a positive outlook on life, and is promptly accepted to a\n\t\t*if plevel>4\n\t\t\tuniversity of grand prestige.\n\t\t*if plevel\u003c5\n\t\t\tlocal university.\n\t#Teach the young prophet pain and suffering.\n\t\t*set alignment -1\n\t\t${unitname}, the future prophet, lives a harsh childhood. ${ad3} is born to a narcotic addict in the outer districts of ${cityname} and is taken away to live with an orphanage at a young age. ${ad3} receives a decent education at a local school, but the real knowledge the future prophet acquires comes from living on the streets.\n\t\t*if plevel>6\n\t\t\t${ad3} takes what ${ad5} can from the school, but it's ${ad2} inquisitive nature that leads the future prophet to the library every day and teaches ${ad1} how to stay out of danger. \n\t\t*if plevel\u003c7\n\t\t\t${ad3} struggles through ${ad2} education and it takes several years and many harsh lessons before the future prophet finally takes it seriously.\n\t\t\n\t\tDespite the many struggles, however, ${unitname} manages to pass grade school and is accepted to a\n\t\t*if plevel>4\n\t\t\tuniversity of grand prestige.\n\t\t*if plevel\u003c5\n\t\t\tlocal university.\n*line_break\n*line_break\nIt is here that ${unitname} reaches ${ad2} true potential. ${ad3} interacts with individuals from all over ${planetname} and learns about the higher level socio-political aspects of the world.\n*page_break\n*if alignment\u003c4\n\t${unitname} uses the knowledge ${ad5} worked so hard to gain to ${ad2} advantage. Quickly, ${ad4} becomes a master of manipulation and has no moral confliction about using people to get ahead. \n*if alignment>3\n\t${unitname} wastes no time learning as much as ${ad5} can. ${ad3} quickly becomes well known throughout the university and it is ${ad2}\tbroad social network that keeps ${ad1} ahead. \n\nImmediately after graduating, ${unitname} runs in the local election to become a Representative of ${cityname} and, not to your surprise, wins.\n*fake_choice\n\t#Nudge ${ad1} to take control.\n\t\t*set alignment -1\n\t\tYou intervene and send dreams of power and collectivism to the soon to be prophet. \n\t\t\n\t\tSeduced by the idea of order, ${unitname} begins using ${ad2} incredible coercion to advance higher and higher up the political spectrum.\n\t#Nudge ${ad1} to be diplomatic.\n\t\t*set alignment +1\n\t\tYou intervene and send dreams of unification and world-peace to the soon to be prophet.\n\t\t\n\t\tSeduced by the ideas, ${unitname} begins using ${ad2} skill of persuasion to advance higher and higher up the political spectrum.\n*page_break\n\n*if (alignment>4) and (plevel>6)\n\tIn a decade's time, ${unitname} rises to become a political icon and founds The Council of ${planetname}, a group of the most powerful leaders on the planet. Through its vast influence, every nation is eventually compelled to join.\n\n\tThe council begins to unite the divided countries of ${planetname} and your religion flourishes as missionaries are finally able to travel without restriction. Soon, however, your gaze is forced away as other matters require your attention.\n\t*set loyalty \"Strong\"\n\t*set race1strength +4\n\t\n*if (alignment>4) and (plevel \u003c7)\n\tIn a decade's time, ${unitname} rises to become a political icon and founds The Council of ${planetname}, a group of the most powerful leaders on the planet. Through its vast influence, every nation is eventually compelled to join.\n\t\n\tThe council strives to achieve peace, but struggles to battle the many political scenarios that plague the planet's surface. Though not perfect, for the first time in ages, ${planetname} is brought together and forced to cooperate. Your religion flourishes as missionaries are finally able to travel between lands unrestricted. Soon, however, your gaze is forced away as other matters require your attention.\n\t*set race1strength +2\n\t\n*if (alignment\u003c5) and (plevel>6)\n\tIn a decade's time, ${unitname} unites the greatest world leaders under a common banner, promising power and order to all those who follow ${ad1}. With a combination of force and simple intimidation, ${unitname} slowly seizes control of ${ad2} followers' assets, silently removing them from the picture, and conquers ${planetname} under dictatorial rule.\n\t\n\tThough initially facing heavy dispute, the unification ${unitname} brings soon rallies the support of ${race1} all across ${planetname}. Scattered factions break out across the continents, but are easily squashed by ${unitname}'s superior strategic knowledge. For the first time in ages, ${planetname} is united. Your religion flourishes as missionaries are finally able to travel without restriction. Soon, however, your gaze is forced away as other matters require your attention.\n\t*set loyalty \"Strong\"\n\t*set race1strength +4\n\t\n*if (alignment\u003c5) and (plevel\u003c7)\n\tIn a decade's time, ${unitname} unites the greatest world leaders under a common banner, promising power and order to all those who follow ${ad1}. With a combination of force and simple intimidation, ${unitname} slowly seizes control of ${ad2} followers' assets, silently removing them from the picture, and conquers ${planetname} under dictatorial rule.\n\t\n\tThough initially facing heavy dispute, the unification ${unitname} brings soon rallies the support of ${race1} all across ${planetname}. Scattered factions continuously break out across the continents, but ${unitname} fights relentlessly. Though not perfect, for the first time in ages, a large portion of ${planetname} is united. Your religion flourishes as missionaries are finally able to travel without restriction. Soon, however, your gaze is forced away as other matters require your attention.\n\t*set race1strength +2\n\t\n*set mostknown unitname\n\"Miraculous, Great One!\" ${helper} interjects, \"It was quite an effort, but the ${ad5} should keep your mortals on your divine path for at least another millennium or two. Now that the prophet has a foothold, there are other, more particular, matters that may need your attention.\"\n\nAnother plea strikes you just then.\n*page_break\n*gosub_scene event_chooser\n*page_break\nThe century flies by and, before you know it, you grow weary again.\n*temp answeredprayers 0\n*label finalchoice\n*fake_choice\n\t#\"I will make one final visit to The Court before resting.\"\n\t\t\"Very well, Almighty One.\"\n\t\t\n\t\tYou eagerly make your way to the Court. \n\t\t*fake_choice\n\t\t\t#Visit the marketplace.\n\t\t\t\t*if hasbeen = true\n\t\t\t\t\tYou visit the prominent merchant at his market stall.\n\t\t\t\t\t\n\t\t\t\t\t\"Welcome, my friend, how go your godly affairs? Interested in an Essence Stone?\" the vendor inquires.\n\t\t\t\t*gosub_scene merchant\n\t\t\t\t\n\t\t\t\tYou continue all the way to the Courthouse doors.\n\t\t\t\t\n\t\t\t\t*goto cc\n\t\t\t#Go straight to the Courthouse.\n\t\t\t\t*label cc\n\t\t\t\tThe door-daemon greets you once again.\n\t\t\t\t*gosub_scene quest_chooser\n\t\t\t\t*page_break\n\t\t\t\t*goto finalchoice\n\t#Answer individual prayers.\n\t\t*label answeringprays\n\t\t*allow_reuse\n\t\t*set answeredprayers +1\n\t\t*gosub_scene event_chooser\n\t\t*if answeredprayers=4\n\t\t\tFinally, after answering the last request of you, the heavens are silent.\n\t\t*if answeredprayers\u003c4\n\t\t\tYou return to the skies.\n\t\t*fake_choice\n\t\t\t*selectable_if (answeredprayers\u003c4) #Continue watching over ${planetname}.\n\t\t\t\t*goto answeringprays\n\t\t\t#Move on to other matters.\n\t\t\t\t*disable_reuse\n\t\t\t\t*goto finalchoice\n\t#Go hunting.\n\t\tYou harness your strength and voyage into the unknown in search for additional power.\n\t\t\n\t\t*gosub_scene hunt_chooser\n\t\t*goto finalchoice\n\t#\"Watch over ${planetname} for me while I rest, ${helper}.\"\n\t\t\"Very well, Almighty One.\"\n\t\t\n\t\tReturning to the skies of your dimension, you collapse in exhaustion.\n\t\t*goto popcalc\n*label popcalc\n*if (belief=2)\n\t*set pflux (65*(race1strength))\n\t*rand race1size  2 3\n\t*set race1size \"${race1size} billion\"\n\t*goto done2\n*else\n\t*set pflux (60*(race1strength))\n\t*rand race1size 5 8\n\t*set race1size \"${race1size} billion\"\n\t*goto done2\n*label done2\n*finish", "chapter8": "*disable_reuse\n*gosub_scene city_generator\n*set largestcity cityname\n*set lifespan +5\n*rand pflux 700 800\n*page_break\n*if (alignment>4) and (plevel>6)\n\t*rand wars 25 30\n\tYou awaken, having not rested as long as you used to, and find The Council of ${planetname} still intact. Unfortunately, ${mostknown} has long since passed away, but the legacy they left is still very apparent.\n\t\n\tThe Council rules over ${planetname}, providing peace across the globe as the threat of global confrontation keeps violence between nations at bay. The new heads, all elected through a global democracy, have lead ${planetname} into a new golden age. However, though there is political peace, the ${race1}'${ad} growth has wreaked havoc elsewhere.\n\t\n*if (alignment>4) and (plevel \u003c7)\n\t*rand wars 60 80\n\tYou awaken, having not rested as long as you used to, and find The Council of ${planetname} barely intact. Unfortunately, ${mostknown} has long since passed away and those that have come after struggle to keep unity.\n\t\n\tWithout the proper ties, The Council simply has no way to reinforce its doctrines and ${planetname} slowly begins returning to the political playground it was before.\n\t\n*if (alignment\u003c5) and (plevel>6)\n\t*rand wars 40 50\n\tYou awaken, having not rested as long as you used to, and find ${mostknown}'s regime still standing strong. Unfortunately, however, the prophet has long since passed away, but the legacy of order remains as the United Sovereignty of ${planetname}.\n\t\n\tNearly all traces of foreign factions have been squashed out and the race has entered an industrial golden age. However, though there is little political dispute, the ${race1}'${ad} growth has wreaked havoc elsewhere.\n\t\n*if (alignment\u003c5) and (plevel\u003c7)\n\t*set disaster \"Usurpation of ${mostknown}\"\n\t*rand wars 90 120\n\tYou awaken, having not rested as long as you used to, and find ${mostknown}'s regime in ruin. While you were away, a plot to overthrow ${mostknown} took root and was eventually successful. However, the outcome was not entirely negative, as a large majority of ${planetname} has become united against such fascist rule and many treaties have emerged discouraging future war.\n\t\n\tWithout a single governing body to enact order, ${planetname} slowly begins returning to the political playground it was before.\n\t\n*page_break\nYou harness the reserve of power that accumulated while you were away, being larger than ever before.\n*if\tprimarytrait=\"Evangelic\"\n\tThe power granted by their sacrificial worship is much greater than pure praise.\n\t*set pflux +100\n*set power +pflux\n\n(Power +${pflux})\n\n*if obed>4\n\tPeering across ${planetname}, you find the planet riddled with ${race1} all across its surface. Though they mean well, their population has simply become too large for the planet you once thought to be so vast.\n\t*set loyalty \"Undying\"\n\n\tThrough your omnipresence, you existence has been ingrained within them and you have become a predominant aspect of their daily lives. Individual thought is widely frowned upon and technological advancement is heavily barred. It is well known in society that the lives of ${race1} are meant to praise their almighty creator and foolish endeavors should be abandoned.\n\t\n\tHowever, you have come to realize that their simple existence is a manifestation of chaos. ${planetname} has become a barren wasteland for resources as the powerful race inhabits its every corner.\n\t\n*if obed\u003c5\n\tPeering across ${planetname}, you find the planet riddled with ${race1} all across its surface. Their technological prowess knows no bounds and their machines run rampant across ${planetname}. After hundreds of years of careless progression, the ${race1} have turned ${planetname} into a barren wasteland. It seems not even your prophet was enough to undo the curious and progressive nature of your ${race1}. \n\t*set loyalty \"Scant\"\n\t\n\tAs you continue your observations you uncover their attempts to traverse the stars and discover distant worlds to settle and feed their insatiable demand for more resources, but their modern technology is still lacking.\n*page_break\n\"It seems your mortals have been exceedingly careless with the resources you so generously provided them, Almighty One. Your intervention may be required once again.\"\n\nYou gaze once more, this time witnessing the horrid state of the poorer societies. Many ${race1} are on the brink of starvation as famine sweeps across the desert planes which were once lush forests filled with your beautiful creations.\n\n*temp helpthrive false\n*fake_choice\n\t#\"I am proud of their progress.\"\n\t\t*if obed\u003c5\n\t\t\t\"Of course, Your Omnipotence, but does it not bother you that they've destroyed so much of your creation? The world you painstakingly crafted so many eons ago?\"\n\t\t\t*fake_choice\n\t\t\t\t#\"They are simply in a state of transition.\"\n\t\t\t\t\t\"As their minds continue to advance and their understanding of their universe grows their destructive nature will quell,\" you explain.\n\t\t\t\t#\"I can always create more, but not without the power they provide.\"\n\t\t\t\t\t\"That is a very practical way of thinking about it, Great One. You are omniscient, indeed,\" ${helper} reconciles.\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\tYou continue to watch your mortal race and your mind begins to reflect. For so many eons you have watched over this race, from the instant they were first put on ${planetname} to the moment they will first leave it. So heavily dependent on your guidance in their early years and now so eager to lead themselves; now the future is clear to you. With their autonomy growing, it is only a matter of time before your intervention is no longer necessary. In time, you will become nothing more than a legend of the past to them. They will simply exist as a pool of essence that provides you nothing but the destruction of your other creations.\n\t\t\t*goto choice1\n\t\t*if obed>4\n\t\t\t*set helpthrive true\n\t\t\t\"Indeed, Your Omnipotence. Though their numbers got the better of them, they have stayed profoundly loyal to you. I never doubted your might, you have done a remarkable job guiding your creations on a faithful path,\" ${helper} nods his head happily.\n\t\t\t\n\t\t\tYou continue to watch your mortal race and your mind begins to reflect. For so many eons you have watched over these beings, from the instant they were first put on ${planetname} to the moment they destroyed it. So heavily dependent on your guidance that they inevitably destroyed themselves and now look to you to save them. You have done what you set out to do, create beings that will worship you for eternity, but now you see that life itself is a state of chaos. You are as much bound to guiding them as they are bound to worshiping you.[i]This race has fulfilled their potential.[/i]\n\t\t\t*goto choice1\n\t#\"Their desecration must end.\"\n\t\t*if obed\u003c5\n\t\t\t\"Yes, I agree, Your Omnipotence. These mortals express no regard for your creation. They must understand that they exist because you allow it!\" ${helper} trembles with anger.\n\t\t\t\n\t\t\tYou contemplate a proper consequence for the irreverent race, but as you ponder, your mind also reflects. For so many eons you have watched over this race, from the instant they were first put on ${planetname} to the moment they will first leave it. So heavily dependent on your guidance in their early years and now so eager to lead themselves; now the future is clear to you. With their autonomy growing, it is only a matter of time before your intervention is no longer necessary. In time, you will become nothing more than a legend of the past to them. They will simply exist as a pool of essence that provides you nothing but the destruction of your other creations.\n\t\t\t*goto choice1\n\t\t*if obed>4\n\t\t\t*set helpthrive true\n\t\t\tYou contemplate a proper consequence for the irreverent race, but as you ponder, your mind also reflects. For so many eons you have watched over these beings, from the instant they were first put on ${planetname} to the moment they destroyed it. So heavily dependent on your guidance that they inevitably destroyed themselves and now look to you to save them. You have done what you set out to do, create beings that will worship you for eternity, but now you see that life itself is a state of chaos. You are as much bound to guiding them as they are bound to worshiping you.[i]This race has fulfilled their potential.[/i]\n\t\t\t*goto choice1\n*label choice1\n*fake_choice\n\t#Destroy the race.\n\t\t\"The race must be destroyed,\" you remark. \"The threat they pose on any more of my creations is too great.\"\n\t\t\n\t\t${helper} lowers his head, \"I understand, you must do what is in your best interest, Great One.\"\n\t\t*goto destroy\n\t#Teach the ${race1} space travel.\n\t\tDespite the risk the race poses, you can't bring yourself to destroy your beloved race. They are indeed the pride of your creation and so you aid the leading scientists in their development of cold fusion technology. Striking them with inspiration toward the development of their reverse-field configuration modules. The scientists struggle to contain the radioactive material within the magnetic field, even when you believe you've made the answers blatantly obvious. You recall the struggle the race had even with basic agriculture when they were young. Eventually they produce a stable prototype.\n\t\t*goto space\n\t*if (helpthrive) #Continue guiding the race on ${planetname}.\n\t\tIn the end, you decide that the source of seemingly infinite power is worth the cost. A colony of subordinate mortals who provide endless amounts of power must be what every god dreams of.\n\t\t*fake_choice\n\t\t\t*if (essencestones>0) #Use an Essence Stone to restore ${planetname}. (-Essence Stone)\n\t\t\t\t*set essencestones -1\n\t\t\t\tYou break the stone and press the essence into ${planetname}. Skies pour down rain for days on end. Volcanoes erupt and tsunamis riddle the coasts. ${race1} flee for higher ground, certain that this is the end of their world. However, as soon as you release your grip, the skies clear and the volcanoes lie dormant once more. When the mortals crawl out of their caves and shelters they witness the most powerful miracle you've ever enacted. Wildlife covers the surface of ${planetname} once again. Trees and critters scurry across the surface and the ${race1} find themselves in a mad dash to reestablish themselves.\n\t\t\t#Restore ${planetname}. (-Enormous Power)\n\t\t\t\tYou conjure clouds in the sky and press essence into ${planetname}. Skies pour down rain for days on end. Volcanoes erupt and tsunamis riddle the coasts. ${race1} flee for higher ground, certain that this is the end of their world. However, as soon as you release your grip, the skies clear and the volcanoes lie dormant once more. When the mortals crawl out of their caves and shelters they witness the most powerful miracle you've ever enacted. Wildlife covers the surface of ${planetname} once again. Trees and critters scurry across the surface and the ${race1} find themselves in a mad dash to reestablish themselves.\n\t\t\t\t*set power -743\n\t\t\t\t\n\t\t\t\t(-743 Power)\n\t\t\t#Create scattered Oases. (-Great Power)\n\t\t\t\tYou conjure clouds in the sky and press essence into ${planetname}. Lightning strikes the desert surface and water and foliage sprout from nothingness. New critters scurry across the surface and the ${race1} find themselves in a mad dash to reestablish themselves in the havens you've created.\n\t\t\t\t*set power -362\n\t\t\t\t\n\t\t\t\t(-362 Power)\n\t\t*goto end\n*label space\nYou watch as they land the first ${race1} on a distant celestial surface. To you, nothing more than a coagulated hunk of dead rock, but to them, proof that they can stretch far across the galaxy. Dozens of these brave mortals inhabit a large spacecraft made of a dense alloy of metals harvested from ${planetname}'s crust. Impressive fusion rockets and laser guidance systems work in tandem to propel the large ship through mortal space, but a faint echo of the true dimensional realm you inhabit.\n*goto end\n\n*label destroy\nYou gloom over ${planetname}, contemplating how to end your perverse sentient race. \n*set Evil +6\n*fake_choice\n\t#Siphon the essence from all living ${race1}.\n\t\tYou loom over ${planetname}, ruminating on the destruction you are about to wreak. You wrap your dark essence around the planet and, rapidly, the skies grow black. Gripping ${planetname}, tightly you pull the essence from its surface and drain the life from the select organisms that inhabit it. All at once, eons of growth and progress are devoured and the great cities of the ${race1} stand silent. What little wildlife remains slowly emerges from the crevasses of ${planetname} and warily reclaims the now polluted surface. With time, ${planetname} will heal, but the ${race1} are forever wiped from its domain.\n\t\t*set race1strength 0\n\t\t*set race1size 0\n\t#Summon a great flood to wipe out all traces of the race.\n\t\tYou loom over ${planetname}, ruminating on the destruction you are about to wreak. You wrap your dark essence around the planet and, rapidly, the skies grow black. Shifting back and forth you pull the tides of ${planetname}'s oceans and rock the planet's core. Earthquakes erupt across the surface and on the ocean floor, combining with the great swells to form the largest tsunamis ${planetname} has ever witnessed.\n\t\t\n\t\tThe waves wash over whole continents, drowning entires cities before they are swallowed by the core during the immense cataclysm. In the end, not a hint of intelligent life persists. What little wildlife remains slowly emerge from the crevasses of ${planetname} and warily reclaim the now polluted surface. With time, ${planetname} will heal, but the ${race1} are forever wiped from its domain.\n\t\t*set race1strength 0\n\t\t*set race1size 0\n\t#Cast another planet into ${planetname} and obliterate everything.\n\t\tYou loom over ${planetname}, ruminating on the destruction you are about to wreak. Clasping your hands together and slowly pulling them apart, a solid sphere materializes between your ethereal palms. It grows in size until its mass just shadows that of ${planetname} and you cast it into orbit around the local star. Quickly, it's swallowed by the gravitational sway and enters a direct collision course with ${planetname}.\n\t\t\n\t\tSlowly, the two planets dance around the star until they meet. Chaos erupts on ${planetname} as ${race1} all across its surface pray to you for mercy that never comes. The newly formed celestial entity crashes into ${planetname} and, instantly, everything near the point of impact is obliterated. Ripples are sent across the planet's surface, toppling structures all over the world. Gradually, the two entities blend together as their momentum carries them, ripping the worlds apart in the process.\n\t\t\n\t\tIn the end, only planetary debris remains in the wake of the collision and all life that once resided on ${planetname} is wiped from existence.\n\t\t*set race1strength 0\n\t\t*set race1size 0\n*set disaster \"The Apocalypse\"\n*set pflux /2\n*set pflux round(pflux)\n*page_break\nYou feel the life essence you've managed to salvage and reclaim empowering you, but it is the last bit of strength you will ever amass from your lost creations.\n*set power +pflux\n\n(Power +${pflux})\n\n*label end\n*line_break\n*line_break\n\"${name}! ${name},\" you hear a voice call out to from the dark Aether.\n*page_break\nSuddenly, a figure emerges from the twisting ethereal mists. It is the Court daemon that manages the doorway. \"${name}, you are being summoned by the Court. It is of the utmost urgency and your presence is requested immediately.\"\n*fake_choice\n\t#\"Let's not waste any time then.\"\n\t#\"What could possibly be so important?\"\n\t\t\"I don't know,\" the daemon responds warily, \"the gods were shouting something about power and danger. It was all beyond my comprehension, but I was told it is a matter of importance that precedes all others!\"\n\t\t*line_break\n\t\t*line_break\nYou glance back at ${planetname} one last time, before jetting off near the speed of light toward the Court.\n*finish Next", "chapter9": "*disable_reuse\n*temp numdead 0\n*temp Oberon_isalive true\n*temp Nothastrus_isalive true\n*temp Ofaldir_isalive true\n*temp Calabius_isalive true\n*temp Asos_isalive true\n\n*if god1rel = 0\n\t*set numdead+1\n\t*set Oberon_isalive false\n*if god2rel = 0\n\t*set numdead +1\n\t*set Nothastrus_isalive false\n*if god3rel = 0\n\t*set numdead +1\n\t*set Ofaldir_isalive false\n*if god5rel = 0\n\t*set numdead +1\n\t*set Calabius_isalive false\n*if god6rel = 0\n\t*set numdead +1\n\t*set Asos_isalive false\n\n*if Nothastrus_isalive\n\t*temp speaker1 \"Nothastrus\"\n\t*goto sp2\n*elseif Calabius_isalive\n\t*temp speaker1 \"Calabius\"\n\t*goto sp2\n*else\n\t*temp speaker1 \"Lyciph\"\n\t*goto sp2\n\t\n*label sp2\n*if god1rel > 0\n\t*temp speaker2 \"Oberon\"\n\t*goto sp3\n*elseif god6rel > 0\n\t*temp speaker2 \"Asos\"\n\t*goto sp3\n*elseif god3rel > 0\n\t*temp speaker2 \"Ofaldir\"\n\t*goto sp3\n*else\n\t*temp speaker2 \"Lyciph\"\n\t*goto sp3\n\n*label sp3\n*if (god6rel > 0) and (speaker2 != \"Asos\")\n\t*temp speaker3 \"Asos\"\n\t*goto start\n*elseif god5rel > 0\n\t*temp speaker3 \"Calabius\"\n\t*goto start\n*elseif god2rel > 0\n\t*temp speaker3 \"Nothastrus\"\n\t*goto start\n*else\n\t*temp speaker3 \"Lyciph\"\n\t*goto start\n\n*label start\n*if numdead>2\n\t*if (god3rel = 0)\n\t\t*if (god2rel = 0)\n\t\t\t*goto achfix2\n\t\t*goto achfix1\n\t*label achfix1\n\t*achieve gwar\n*label achfix2\nYou are immediately ushered in upon reaching the golden gates of the Court. The gatekeepers, whose size once eclipsed your own, are now belittled by your strength. They direct you straight to the Courthouse.\n\n*if Nothastrus_isalive\n\t\"Well then what do you propose we do?\" you hear Nothastrus' voice shout from inside the Courthouse.\n\t*goto illegaltofall1\n*else\n\t\"You have lead this realm astray! Now what do you propose we do?\" you hear an unfamiliar voice shout from inside the Courthouse.\n\t*goto illegaltofall1\n\n*label illegaltofall1\n\n*if numdead = 5\n\tEntering, you find a series of empty thrones lining both sides of a circular room. Only two of the eight thrones still harbor a being of power. \n\t*goto illegaltofall2\n*else\n\tEntering, you find the remaining Court gods seated on marble thrones encircling the rotunda.\n\t*goto illegaltofall2\n\n*label illegaltofall2\n\n\"I don't know,\" Ylen responds to the god's outburst.\n\n*if Oberon_isalive\n\tYou hear a deep voice erupt from the other side of the room, \"Regardless of logic, we have to act. We created this city to enact order, I will not allow it to falter at first test.\" You peer over and see Oberon seated at the far end, fully restored and coursing with power, having taken the form of a great white ox.\n\t*goto i2f3\n*elseif (Oberon_isalive = false)\n\t*if speaker2 != \"Lyciph\"\n\t\t\"Where is Oberon?\" ${speaker2} interjects. \"We need his strength.\"\n\t\t\n\t\t\"Nobody has seen Oberon since he left some time ago. We must assume the worst,\" Ylen replies mournfully.\n\t\t\n\t\t\"Then there is no hope,\" ${speaker2} mutters.\n\t\t*goto i2f3\n*label i2f3\n\n\"${Name}!\" Ylen shouts noticing your recent entrance. \"I am glad you've come.\" \n\nShe waves you in and you proceed further into the rotunda. Near her, a dark god infused with an almost black aura resides on a similar throne.\n\n*if (Calabius_isalive = false) and (Asos_isalive = false)\n\t*if Nothastrus_isalive\n\t\t\"Why have you brought this traitorous wisp here?\" Nothastrus shouts. \"We know this filth slew Calabius and Asos!\"\n\t\t\n\t\t\"Silence! Now, of all times, is not right to enact judgment.\" Ylen turns back to you. \n\t\t*goto fix1\n\t*elseif Oberon_isalive \n\t\t\"Why have you brought this traitorous wisp here?\" Oberon shouts. \"We know ${ad} slew Calabius and Asos!\"\n\t\t\n\t\t\"Silence! Now, of all times, is not right to enact judgment.\" Ylen turns back to you. \n\t\t*goto fix1\n\t\n*if (Calabius_isalive = false) and (Asos_isalive = true)\n\t*if Nothastrus_isalive\n\t\t\"Why have you brought this traitorous wisp here?\" Nothastrus shouts. \"We know this filth slew Calabius!\"\n\t\t\n\t\t\"Silence! Now, of all times, is not right to enact judgment.\" Ylen turns back to you. \n\t\t*goto fix1\n\t*else\n\t\t\"Why have you brought this traitorous wisp here?\" Asos shouts. \"We know this being slew Calabius!\"\n\t\t\n\t\t\"Silence! Now, of all times, is not right to enact judgment.\" Ylen turns back to you. \n\t\t*goto fix1\n\t\n*if (Calabius_isalive = true) and (Asos_isalive = false)\n\t*if Nothastrus_isalive\n\t\t\"Why have you brought this traitorous wisp here?\" Nothastrus shouts. \"We know this filth slew Asos!\"\n\t\t\n\t\t\"Silence! Now, of all times, is not right to enact judgment.\" Ylen turns back to you. \n\t\t*goto fix1\n\t*else\n\t\t\"Why have you brought this traitorous wisp here?\" Calabius shouts. \"We know ${ad} slew Asos!\"\n\t\t\n\t\t\"Silence! Now, of all times, is not right to enact judgment.\" Ylen turns back to you. \n\t\t*goto fix1\n\n*label fix1\n\n\"It isn't often that we summon outsiders into the Courtroom,\" Ylen continues, \"but I am afraid these are dire times. Outside of us, you have become a great power in this realm and we need all the strength we can muster.\"\n\n*fake_choice\n\t#\"What is all this about?\"\n\t\tYlen lowers her head. \"A titan...\" she trembles. \"Daemons fleeing from the outer edges have been rambling on about sightings of a great entity in the far reaches of the realm.\"\n\t#Remain silent.\n\t\t*if numdead\u003c5\n\t\t\t\"Enough of this nonsense, Ylen. This being can not help us!\" ${speaker1} cries out. \"We should be pooling the power of what daemons we can.\"\n\t\t\t\n\t\t\t\"Silence, ${speaker1}. ${Name}, please forgive him, we are all restless.\" Ylen lowers her head and the rest of the room remains silent as well. \"A titan has been sighted in the far reaches of the realm.\"\n\t\t\t*goto fix2\n\t\t*else\n\t\t\tYlen lowers her head. \"A titan...\" she trembles. \"Daemons fleeing the outer edges have been rambling on about sightings of a great entity in the far reaches of the realm.\"\n\t\t\t*goto fix2\n\n\n*label fix2\n*fake_choice\n\t#\"What exactly is this Titan?\"\n\t\t\"A Titan,\" the dark figure beside Ylen speaks up, his voice echoes intensely throughout the hall, \"is the apex of destruction. \n\t#\"How powerful is this creature, exactly?\"\n\t\t\"More powerful than you could possibly imagine,\" the dark figure beside Ylen speaks up, his voice echoes intensely throughout the hall. \"It is the apex of destruction. \nA being that obliterates everything in its path. Only a few have ever been defeated.\"\n\n*temp choices 0\n*label convo1\n*if choices = 2\n\t*goto endconvo1\n*fake_choice\n\t#\"So they can be killed?\"\n\t\t*set choices +1\n\t\t*if speaker1 != \"Lyciph\"\n\t\t\t\"A weapon we don't have,\" ${speaker1} interjects.\n\t\t\t\n\t\t\tThe shadowy god scowls at him, then turns back to you. \"Yes, a powerful weapon, so powerful, in fact, that it is said to destroy beings from the inside out.\"\n\t\t\t*goto convo1\n\t\t*else\n\t\t\tHe grins, \"A great weapon. A weapon so powerful that it is said to destroy beings from the inside out.\"\n\t\t\t*goto convo1\n\t#\"Where could it have obtained so much power?\"\n\t\t*set choices +1\n\t\t\"None know,\" he replies. \"They are beings that predate all known gods.\"\n\t\t*goto convo1\n\t#Remain Silent\n\t\t\"But...\" the being continues, \"there is a way to stop it, a weapon of great potential.\"\n\t\n\n*label endconvo1\n\n*if Nothastrus_isalive\n\t\"I am tired of your legends Lyciph!\" Nothastrus speaks up. \"This Titan is practically on our doorstep, we must prepare or it will devour our entire city in an instant.\"\n\t*goto i2f4\n*elseif Asos_isalive\n\t\"That is of course...\" Asos speaks up, \"only a legend. We must be realistically prepared when this being shows up!\"\n\t*goto i2f4\n\n*label i2f4\n\n*if Oberon_isalive\n\t*temp speaker4 \"Oberon\"\n\t*goto i2f5\n*else\n\t*temp speaker4 \"Ylen\"\n\t*goto i2f5\n\n*label i2f5\n\n${speaker4}'s voice erupts above the others', \"Enough! \n*if Ofaldir_isalive\n\tOfaldir, summon the daemons of the Court and siphon their essence, we need every ounce of power they can spare. \n${speaker1}, gather as much power from the outskirts as you can. We will assist where we are able. ${Name}, I want you to watch the skies from the wall. If you notice the slightest bit of distortion on the horizon, throw a flare into the sky, signaling for everyone to return to the Court immediately. Dismissed.\" \n*if numdead=5\n\t${speaker4} slams a fist against the ground and the room shakes as she and the lesser daemons vanish from sight, save for Lyciph.\n\t*goto fix3\n*else\n\t${speaker4} slams a fist against the ground and the room shakes as everyone vanishes from sight, save for Lyciph.\n\t*goto fix3\n*label fix3\n*page_break\n\n*if numdead\u003c4\n\tThe being stares at you from his throne, his misty black essence cascading over the arms of the seat. \"They're all going to die, ${Name},\" he professes. \"Even with the combined force of the entire Court, they will stand no match against the Titan. Ofaldir knew it, and I know it.\n\t*if god3rel=0\n\t\t*if god2rel>0\n\t\t\tToo bad you allowed Nothastrus to slay him.\" Lyciph grins, \"I won't hold it against you, he was more a thorn in my side.\"\n\t\t\t*goto fix6\n\t\t*else\n\t\t\tToo bad you banished him and Nothastrus to oblivion.\" Lyciph grimaces, \"They'll certainly die alone.\"\n\t\t\t*goto fix6\n\t*if god3rel>0\n\t\tBut he's more of a coward than a scholar.\" \n\t\t*goto fix6\n*if numdead>3\n\tThe being stares at you from his throne, his misty black essence cascading over the arms of the seat. \"They're all going to die, ${Name},\" he professes. \"Even if the Court were alive, they would've stood no chance against the Titan. Ofaldir knew it, and I know it.\n\t*if god3rel=0\n\t\t*if Nothastrus_isalive\n\t\t\tToo bad you allowed Nothastrus to slay him.\" Lyciph grins, \"I won't hold it against you, he was more a thorn in my side.\"\n\t\t\t*goto fix6\n\t\t*else\n\t\t\tToo bad you banished him and Nothastrus to oblivion.\" Lyciph grimaces, \"They'll certainly die alone.\"\n\t\t\t*goto fix6\n\t*if god3rel>0\n\t\tBut he's more of a coward than a scholar.\" \n\t\t*goto fix6\n*label fix6\n*line_break\n*line_break\nThe being stands up from his throne and moves closer to you. He dons no physical costume like the other gods. \"There is another way,\" he remarks boldly. \"Stories will have you believe it was cunning that defeated so many Titans before, but that couldn't be further from the truth. With power comes omniscience and how could you outsmart that which knows so much more than you? Come with me,\" Lyciph musters a dark haze around you both until you are completely blinded. Then, as quickly as it appeared, the mist recedes, revealing a vast room filled with books and ancient texts. \"Ofaldir won't mind us intruding upon his collection, all things considered,\" he remarks.\n*fake_choice\n\t#\"We should be helping the others.\"\n\t\t\"We are,\" Lyciph remarks. He \n\t#Remain silent.\n\t\tLyciph \nopens a large and ornate book already resting on a marble slab, its pages seemingly infinite. As if it were bookmarked, the god opens the cover straight to the page he desired, revealing a plethora of hieroglyphics you've never once witnessed. \"The weapon,\" he speaks, \"an orb crafted by powerful gods known as the Olympians, was lost to the Aether along with its former masters. It has taken thousands of eons,\" he exhales, as if exhausted by his words, \"but I believe I finally know how they created it.\" He looks at you curiously, as if trying to see something, \"Do you know what the energy that makes up our very being is?\"\n*fake_choice\n\t#\"What do you mean?\"\n\t#\"I have considered it, but no.\"\nHe glances back at the book, his glowing eyes clearly not reading any of the text. \"No one truly does.\" He extends an arm and grabs another book off a random shelf. \"Ofaldir has spent his entire life amassing this collection of texts from across the universe, from gods and mortals alike. All who have studied the nature of the universe we ultimately know so little about.\" He holds the book out before you, skimming through the pages, revealing information about the cycle of the heavenly essence you crave and how it flows through the universe and between beings. \"In small amounts, essence does nothing, but in concentrations it becomes life itself. It is what you and I are made of. There is so much others do not consider, perhaps because they can't yet comprehend or perhaps they don't care.\" He closes the book and returns it to the shelf, still glaring at the original text. \"It is the material that makes up all we know,\" he continues. \"It holds together the fabric of the universe, that much is true, but if it can be harvested from a broken being then should it not be harvestable from a being that is still alive?\" he inquires, as if you held the answer. \"In theory,\" he continues, \"all it would require is a concentration of power strong enough to tear the individual bonds that hold the being together. That is what the artifact did, it was a vault of immense, concentrated energy. We can create another, all we need is enough power packed in one place.\"\n*fake_choice\n\t#\"Does anyone have that kind of power?\"\n\t\t\"No.\" \n\t#\"Where are you going with this?\"\nLyciph closes the book and then looks at you. \"Separately, the power of the Court is too weak, but concentrated into one being…\" he pauses for a brief moment and allows you to draw your own conclusion.\n*choice\n\t#\"No one being should possess that much power.\"\n\t\t*label fix4\n\t\tLyciph glares at you, his eyes turned dark. His voice shakes the room, \"${name}, we can save everything that has been built. We can defeat the Titan and free the Aether from its destruction.\" His voice begins to tremble and the room shakes with it, \"All I need is enough power. It must be united.\" The dense fog reappears around you, consuming the library and slowly encasing your body, restraining you. \"I will defeat this Titan and save all I have built. If that requires that some be sacrificed in the process, then so be it.\" You can feel the dark energy squeezing the fabric of your being, trying the siphon the essence from your body.\n\t\t\n\t\tOut of no where, ${helper} slams into Lyciph, knocking him away and freeing you from his grasp. \"Run, Master!\"\n\t\t*goto fight\n\t*if (numdead\u003c5) #\"Would the other gods willingly sacrifice their power?\"\n\t\t\"Would you?\" he inquires blatantly.\n\t\t*choice\n\t\t\t#\"Yes.\"\n\t\t\t\tHis eyes widen, \"then give it here.\" Lyciph wraps a dark tendril of mist around you as the dense fog returns. You can feel the dark energy squeezing the fabric of your being, trying the siphon the essence from your body.\n\t\t\t\t\n\t\t\t\tOut of no where, ${helper} slams into Lyciph, knocking him away and freeing you from his grasp. \"Master, he's only trying to kill you and everyone else!\"\n\t\t\t\t*goto fight\n\t\t\t#\"No.\"\n\t\t\t\t\"Exactly,\" he scowls, \"a god would never relinquish their power freely.\" Lyciph glares at you, his eyes turned dark. His voice shakes the room, \"${name}, we can save everything that has been built. We can defeat the Titan and free the Aether from its destruction.\" His voice begins to tremble and the room shakes with it, \"All I need is enough power. It must be united.\" The dense fog reappears around you, consuming the library and slowly encasing your body, restraining you. \"I will defeat this Titan and save all I have built. If that requires that some be sacrificed in the process, then so be it.\" You can feel the dark energy squeezing the fabric of your being, trying the siphon the essence from your body.\n\t\t\t\t\n\t\t\t\tOut of no where, ${helper} slams into Lyciph, knocking him away and freeing you from his grasp. \"Run, Master. You must warn the others!\"\n\t\t\t\t*goto fight\n\t*if (numdead>4) #\"I have defeated the other gods.\"\n\t\t\"Yes,\" Lyciph remarks, \"you have already halfway accomplished our goal. \n\t\t*goto fix4\n\t#\"You only want the power for yourself!\"\n\t\tLyciph glares at you, his eyes turned dark. His voice shakes the room, \"I have spent my entire existence seeking answers and I finally have them.\" The dense fog reappears around you, consuming the library and slowly encasing your body, restraining you. \"I will defeat this Titan and save all I have built. If that requires that some be sacrificed in the process, then so be it.\" You can feel the dark energy squeezing the fabric of your being, trying the siphon the essence from your body.\n\t\t\n\t\tOut of no where, ${helper} slams into Lyciph, knocking him away and freeing you from his grasp. \"Run, Master!\"\n\t\t*goto fight\n*label fight\n*line_break\n*line_break\n\"Foolish daemon!\" Lyciph howls after recovering from the blow. In retaliation, he strikes ${helper} with a massive coil of black energy.\n*rand pflux 50 60\n\nIn an instant, ${helper} is disintegrated and all that remains of him slowly drifts to the floor.\n\n*if Power\u003c800\n\t*Set Power +400\n\n*fake_choice\n\t#Unleash your power.\n\t\tYou feel an intense rage wash over you. Every vain and fabric of your being tightens and you are overwhelmed by the sensation of your essence trying to break free from its shackles. Your senses heighten and you feel the push and pull of every bond around you. You glare at Lyciph, your expression blank. He returns your gaze for a brief moment and you can see by the lurching of his eyes that you must've grown three times in size. Without further hesitation, you recoil your arm and send an explosion of energy flying toward Lyciph at the speed of light. Then another from an opposing limb, and then another, and another until a volley of detonations erupt around the dark god.\n\t\t\n\t\tYour vision is blinded by the exploding light, but you hear him cry in agony and then the flow of his energy through the Aether. He shifts right and then glides through the dense fog, trying to get around you.\n\t#Flee back to the Court.\n\t\tTaking advantage of the precious time ${helper} has bought you, you break free from the shackles and teleport yourself from the room as fast as you can.\n\t\t*set god7rel 4\n\t\t*goto ran\n*fake_choice\n\t*selectable_if (Power>748) #Turn and obliterate everything behind you. (-Enormous Power)\n\t\tYou clasp your arms together and form a dense ball of energy in front of you. Before he can move again you release your grasp and a cone of light bursts outward, vaporizing the fog and catching the mad god in the center. His husk scorched and essence shedding from his body like fur, he is forced to retreat.\n\t\t*set power -748\n\t\t\n\t\t(Power -748)\n\t*selectable_if (Power>641) #Follow his movement and continue bombarding him. (-Momentous Power)\n\t\tSensing his movement, you continue your strafing attack. You can tell by the fluctuations in the flow of energy around you that the detonations are striking him, but he continues to try and evade your relentless assault. Finally, he is forced to retreat.\n\t\t*set power -641\n\t\t\n\t\t(Power -641)\n\t#Lunge toward him and strike melee.\n\t\tJudging the bombs to be useless, you lunge toward the mad god in an attempt to flank him. With one long arm outstretched and sharpened, you swing, trying to sever his body in two. Still blinded by the combination of light and darkness, though, he manages to parry your attack and the two of you exchange several more blows. He strikes you several times, chipping off small portions of your husk, but finally your rage overpowers him. You guide your fist straight into the dark god's core, ripping a huge chunk of essence from his body on your way out. Collapsing back, he is forced to retreat.\n\t\t*set power -323\n\t\t\n\t\t(Power -323)\n*page_break\nFollowing Lyciph out of the library, you cast bolts of lightning toward him to hinder his escape.\n\n\"Don't you understand I'm trying to save this realm?\" he cries out as your bolts continue to strike him, tearing more and more essence from his body.\n\nIn a last ditch effort, he rapidly grabs one of your lightning bolts from the air and twists it around his body, sending it back toward you. Surprised, you try to evade the attack, but it manages to contact your shoulder and knock you back.\n*set power -pflux\n\n(Power -${pflux})\n\n\"Stop, ${name}.\" You look up to see Lyciph approaching you, hunched over and clinching his side. The once illustrious, dark energy that made up his body now molten and shredded. \"You've beaten me,\" he confesses. \"Take me before the Court, kill me, whatever you do it won't matter. The Titan will wash over this realm and devour everything in its path. You've squandered our only hope of salvation.\"\n*rand pflux 2000 2150\n*fake_choice\n\t*selectable_if (numdead \u003c3) #\"The gods will defeat the Titan together, not apart.\"\n\t#\"Your greed has only made us weaker. You squandered our hope.\"\n\t#\"No, the power will be mine.\"\nLyciph simply glares at you hysterically and laughs, \"Either kill me now and spare me the fate that awaits the rest of you or give me the hope of outrunning it.\"\n*fake_choice\n\t#Kill him.\n\t\t*set god7rel 0\n\t\tYou grab the god's head and crush it in your fist. Through the connection, his dark power quickly flows into you. Lyciph's power was truly great, but according to him, not even he could withstand the power of a Titan.\n\t\t*set power +pflux\n\n\t\t(Power +${pflux})\n\t\t\n\t\t*if numdead>3\n\t\t\tWith Lyciph destroyed, you teleport yourself back to the Court to inform Ylen of what's transpired.\n\t\t*if numdead\u003c4\n\t\t\tWith Lyciph destroyed, you teleport yourself back to the Court to inform the other gods of what's transpired.\n\t#Let him go.\n\t\t*set god7rel 12\n\t\tYou instruct the coward to run and then teleport yourself back to the Court, leaving the weakened god to his feeble fate.\n*label ran\n*page_break\nUpon your return you find Ylen \n*if speaker1 != \"Lyciph\"\n\tand ${speaker1} \nat the Courthouse collecting essence from the daemons of the Court who have willingly donated.\n\n\"${name}!\" Ylen shouts, \"what are you doing here? Has the Titan been sighted?\"\n\n\"No, but Lyciph has betrayed us,\" you respond.\n\n*if speaker1 != \"Lyciph\"\n\tBoth her and ${speaker1} lower their heads. \n*if speaker1 = \"Lyciph\"\n\tShe lowers her head, \n\"I knew he was not to be trusted,\" she sighs. \"Here,\" she stretches out her ethereal hand, donning no physical form either, \"take this essence, it isn't much, but its all the daemons could contribute.\"\n*set power +127\n\n(Power +127)\n\nSuddenly, the space above the Court darkens and is overcome with a dismal shade of green. It is subtle, but you can sense a disturbance in the flow of energy through the Aether around you and from her expression, Ylen can feel it too.\n\n*if numdead>3\n\t\"It's only us now,\" Ylen states, trying to maintain a confident demeanor.\n\t\n\tYou approach the gates and peer into the distance. \n*if numdead\u003c4\n\t\"Summon the others,\" Ylen commands.\n\t\n\tOutstretching your arm, you launch a bolt of light into the sky and await their return.\n\t\n\t*if speaker1 != \"Lyciph\"\n\t\t${speaker2} bashes through the golden gates of the court shouting, \"The horizon, on the horizon!\"\n\t\n\tUnable to see over the insuppressible court walls, you approach the gates yourself and peer into the distance. \nLike an organism growing from a single cell, a green cloud appears far off in the distance and quickly grows larger.\n\n\"It's attracted to the concentration of power,\" Ylen comments, following up behind you. \"It will be upon us in a matter of moments. Are you prepared?\"\n\nYou can't help but recall Lyciph's statement. No Titan has ever been defeated since the time of the Olympians.\n*fake_choice\n\t#\"We will overcome this monstrosity.\"\n\t\tYlen nods uncertainly, \"Titans are the most powerful beings in existence. But together, we must hope to deter it.\"\n\t#\"Lyciph was right, there is no hope. We must flee.\"\n\t\tYlen looks at you, her surreal face expressionless, \"you can't outrun a Titan, ${name}. It may not look it from here, but that Titan is further away than most have ever traveled. No one can truly move at the speed of light, we only come close, but none can come closer than a Titan. They are the most powerful beings in existence. We can only ho
