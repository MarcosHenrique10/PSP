<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Aether: Life as a God — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "aetherlaag", "title": "The Aether: Life as a God", "scenes": {"chapter1": "*disable_reuse\nThe hunger… Your body feels weak. Your mind obscured and clouded as you float through the empty void. Streaks of light catch your peripheral attention, but you can only focus for so long until the craving overwhelms you again.\n\nSuddenly, a concentrated glow appears in the distance, standing out among the millions of faint white specks scattered across the endless expanse. It glows brighter and brighter until you can finally make out a figure within the aura. It charges toward you, faster than you can move.\n\nBefore you can react, a voice emerges, \"Greetings, Your Young Omnipotence, I am ${helper}.\" The being floats stationary in front of you. \"I will guide you throughout your sacred quest of becoming the most powerful being in the universe!\" ${helper} looks you up and down, \"Oh no, it seems your celestial form is in quite a weak state. Quickly, you must absorb the power of the recently deceased god.\"\n*label convo1\n*fake_choice\n\t#\"What is happening, where am I?\"\n\t\t\"Why, you are in the Aether, the realm of gods! I understand your confusion, Master. It is well known that in weaker forms divine entities can have difficulty grasping reality and forming memories, but do not fret, Your Mightiness, you will soon grow to rival the strength of all others in this realm!\"\n\t\t*goto convo1\n\t#\"What do you mean by 'Absorb the power?'\"\n\t\t\"Recently, a powerful god was slain very near here. When a god dies all other astral beings possess the ability to absorb a portion of that god's energy. Why, in the Aether, energy is never created nor destroyed so the power of that being has to go somewhere and it should be yours, Master! However,\" he interjects, \"the power of a god is of great desire and there is much demand for it so the longer you stay and the more power you absorb, the more dangerous it becomes as other beings will want to take it for themselves.\"\n\t\t*goto convo1\n\t#\"How did this god die?\"\n\t\t${helper} looks around, as if checking to ensure the coast is clear of something, \"Who knows,\" he shrugs, \"gods can die from all sorts of causes. Perhaps he was slain by another powerful god or the mortals of his realm rose up and destroyed him.\"\n\t\t*goto convo1\n\t*allow_reuse #\"Your name is no longer ${helper}.\"\n\t\t\"Of course, your Omniscience, what is it?\"\n\t\t*input_text helper\n\t\t\"${helper}, of course! My apologies, Master.\"\n\t\t*goto convo1\n\t#\"Lead me to this fallen being!\"\n\t#\"I am powerful enough as it is, take me straight to the Court of Gods!\" (Skip Intro)\n\t\t*set power 42\n\t\t\"Of course, Oh Powerful One!\" ${helper} spins around you, creating a vortex of light. Suddenly, you find yourself in a small room, another being floating before you.\n\t\t*goto courtgate\n*disable_reuse\n${helper} flies you through the twisting nether, dodging clouds of ethereal gas and scattered rocks. Suddenly, in the distance, a faint glow of light penetrates the vast darkness. As you come closer, the light glows brighter and brighter until everything around you becomes visible.\n\nBefore you lies the colossal corpse of a fallen god, its celestial form appearing to slowly disintegrate into nothing. You feel a powerful energy permeating the void around you. Simply being in the presence of this great being seems to make you more powerful.\n\n\"Quickly, Your Greatness, concentrate on harvesting as much energy as possible from the void around you!\" ${helper} shouts. \"We cannot linger here long, I can already feel daemons, other creatures of great power, approaching.\"\n*page_break\nYou meditate on the vast source of energy around you. Floating stationary, you feel it seeping into your very being.\n*set power 42\n\n(Power +42)\n\n\"Alright, Master. That is enough, we must get out of here!\"\n*fake_choice\n\t#\"No, I need more power!\"\n\t\tYou concentrate harder, consuming as much of the energy as possible in a few more seconds. \n\t\t\n\t\t(Power +22)\n\t\t\n\t\tSuddenly, ${helper} knocks into you and flies you away from the being.\n\t\t*set power +22\n\t\t*fake_choice\n\t\t\t#\"How dare you, I was not finished!\"\n\t\t\t\t*set Evil %+8\n\t\t\t\t\"I am sorry, Your Mightiness, but it was too dangerous to stay any longer.\"\n\t\t\t\t*goto end_opening\n\t\t\t#\"Thank, you ${helper}. It was hard for me to pull myself away.\"\n\t\t\t\t\"It is quite alright, Your Divine. The energy of gods can be very appetizing.\"\n\t\t\t\t*goto end_opening\n\t#\"Right, let's get out of here.\"\n\t\t${helper} flies you away from the being and back into the void. \"Though it is not much, it is enough to get started. After all, forty-two is the answer to life the universe and everything!\" ${helper} smiles, as if pleased with the joke he just made. \n*label end_opening\n*line_break\n*line_break\nLooking back, you see a horde of astral beings swarm over the body like ants, tearing each other apart.\n\nAs you fly through the Aether with ${helper} he speaks up once more. \"Now that you have a bit of power under your belt it's time to get you registered at the Court of the Gods!\"\n*label convo2\n*fake_choice\n\t#\"What is the Court?\"\n\t\t\"The Court of the Gods is the powerhouse of this realm. It is where all beings of power go to discuss godly matters. There you will gain a foothold with other gods and obtain additional power.\"\n\t\t*goto convo2\n\t#\"Why are you helping me?\"\n\t\t\"I was sent to you by someone. I'm not quite sure who, but I think you will meet them one day,\" your mind grows weary from the sudden accumulation of so much information, but he continues, \"and with a being as powerful as you at my side, I will have no fear of the others in this realm.\"\n\t\t*goto convo2\n\t#\"I find it difficult to process everything that is happening.\"\n\"That is understandable, Master,\" ${helper} responds, \"Just moments ago you were a lost spirit within the void, possessing little to no energy to your name. You will find that as your power grows, so too will your mind and body. You will find it easier to understand the complex systems of the universe and manipulate them to your will!\"\n*fake_choice\n\t#\"That sounds daunting.\"\n\t\t\"It may at first, Master, but I have no doubt that you will become a great god!\"\n\t#\"Sounds exciting!\"\n\t\t\"It is, Master! You will become a force not to be trifled with and finally have purpose within this void!\"\n*line_break\n*line_break\nJust as before, ${helper} weaves you through the fabric of the Aether and a dim glow emerges in the distance. As you approach, the astral clouds start to become more orderly and less sporadic, debris becomes sparse, and an energy similar to that which you experienced by the fallen god fills the space around you.\n\nSuddenly, structures appear from nothing and an expansive wall materializes before you. Regardless of how high or low you fly it seems the wall reflects your elevation. As you approach, an ornate golden gate becomes visible and two colossal beings stand before it. Their massive size belittles you.\n\n\"Halt!\" one of the beings shouts. His voice shakes the Aether and you can't help but be at least somewhat intimidated, knowing that with a swing of his astral power he could likely destroy you. \"What business do you have in the Court of the Gods?\"\n\n${helper} speaks up, \"I have here a being of power that must register before the gods.\"\n\nWith that short exchange of words the guards move aside, a trail of stars following behind them, and the gate opens.\n*page_break\nAs you float in awe, ${helper} pulls you in and reveals a flat ground upon which more structures seem to be built. Despite your efforts you can't fly far from this new surface, forced to hover just above it.\n\n\"If there is one thing the Court loves, it is order in this chaotic realm. And this is their place of power, don't expect nearly the level of freedom in here as you would possess elsewhere,\" ${helper} comments, noticing your struggle.\n*label convo3\n*fake_choice\n\t#\"I am not fond of being bound.\"\n\t\t\"Soon you will rule this realm, Master. I am sure of it!\"\n\t\t*goto convo3\n\t#\"What is the Court?\"\n\t\t\"The court is a group of gods that attempt to rule over the Aether. They are supposedly some of the most powerful beings in the universe.\"\n\t#\"Let's just get this over with.\"\nYou approach a long marble staircase that leads up to an equally impressive structure with tall, ornate columns and golden clouds surrounding all sides.\n\n\"This,\" ${helper} holds his astral arms out, \"is the Courthouse of the Gods!\"\n\nHe leads you up the grandiose staircase and into an expansive room that appears even larger on the inside than the building itself. Massive thrones line the walls and in many of them sit giant beings arguing amongst one-another.\n\n\"You are weak, Ofaldir!\" one of the great beings shouts.\n\n\"Nothastrus, please!\" another of the entities cries from across the room.\n\n\"I will have order!\" A third god shouts at the end of the room. His voice shakes the entire building and a flash of light blinds you for a moment. As your vision quickly returns, the being continues speaking, \"You argue amongst yourselves like worthless daemons…\"\n\nSuddenly the room stretches and distorts before you, rapidly becoming unrecognisable. In a flash, you are teleported into another room, a similar being, but much smaller and closer to your size, stands before you. \"I'll beg you not to disturb the Masters.\" The creature stares at you for a short duration, \"I assume a weak being such as yourself would have no purpose here other than seeking recognition.\" \n\n*label courtgate\nYou look around and ${helper} is nowhere to be found.\n*fake_choice\n\t#\"What is this place?\"\n\t\tThe being shakes its head, \"You are in my registration office. Now please, fill this out.\" \n\t#\"I am here to register, I think?\"\n\t\tThe being shakes its head, \"Just fill this out.\" \n\t#\"I have come seeking power!\"\n\t\tThe being just stares at you blankly for a moment in silence, \"Just fill this out.\" \nIt hands you a golden document with inscriptions. It takes you a while, but you are eventually able to understand their meaning.\n\n*label namechoice\n*allow_reuse\nPlease inscribe your name exactly as you would like to be addressed:\n*input_text Name\nIn high level court settings some beings wish to identify as specific genders; though, these identifiers hold no real significance other than personal preference. Please specify below which identifiers you would prefer:\n*fake_choice\n\t#He, him, his.\n\t#She, her, hers.\n\t\t*set he \"she\"\n\t\t*set his \"her\"\n\t\t*set sir \"ma'am\"\n\t#Enter your own pronoun.\n\t\t*input_text he\n\t\t*set his \"their\"\n\t\t*set sir Name\nYou hand the creature back the golden parchment.\n\n\"${name}? Interesting, are you sure?\"\n*fake_choice\n\t#\"No, wait…\"\n\t\tThe attendant hands you another parchment, clearly annoyed.\n\t\t\n\t\t*goto namechoice\n\t#\"Yes.\"\n*disable_reuse\n\"Great,\" he mumbles in a clearly disinterested tone, \"as a god, you have the power to create and alter lower dimensions. You may enact upon these realms however your strength allows. Please refrain from interfering with the mortal planes of other gods. Bend reality responsibly. Thank you and have a nice day.\"\n\nBefore you can say another word you are whisked away and find yourself back in the dark void.\n*page_break\n\"There you are!\" ${helper} says as he appears beside you, seemingly out of nowhere. \"I guess it went well since we're back out here!\"\n*fake_choice\n\t#\"Where is here?\"\n\t\t\"This is the void! Here you can create your own world and bend it however you like! Well, granted you have the power to do so. \n\t#\"Out of my way, I have a universe to rule!\"\n\t\t\"Eager I see, very well, Master! \nGo ahead, fill this infinite void with stars!\"\n\nYou snap your fingers and suddenly shimmering dots glisten all around you.\n\n\"Magnificent, All Mighty One!\" ${helper} exclaims.\n*fake_choice\n\t#Create a calm world filled with cooperative plants and animals and a non-violent food chain.\n\t\t*set Evil %-8\n\t\t*set planlooks \"Vibrant fauna, rolling hills, and high mountains.\"\n\t\tYou twist the void around you and shape it into a physical form. You zap the newly formed surface and organisms spring to life amidst the disorderly rubble. \"That is a beautiful planet, Master,\" ${helper} comments as you give the mountains shape. \n\t#Create a balanced planet with herbivores, carnivores, and a complex biosphere.\n\t\tYou twist the void around you and shape it into a physical form. You zap the newly formed surface and organisms spring to life amidst the disorderly rubble. \"Quite a remarkable planet, Master.\" ${helper} comments as you merge several tectonic plates. \n\t\t*set planlooks \"Vast grasslands and dense forest biomes.\"\n\t#Create a hostile world dominated by strong, carnivorous plants and creatures.\n\t\t*set Evil %+8\n\t\t*set planlooks \"Giant floral species and tropical forests.\"\n\t\tYou twist the void around you and shape it into a physical form. You zap the newly formed surface and organisms spring to life amidst the disorderly rubble. \"Wow, you create the strongest creatures I have seen in some time, Master.\" ${helper} comments, watching you piece together a magnificent beast. \n\"May I ask what kind of world you wish to create?\"\n*fake_choice\n\t#\"I would like to create a world in which all species thrive equally.\"\n\t\t\"Interesting,\" ${helper} remarks, \"As your knowledge of the universe grows to that beyond my comprehension, I think you'll find that sentience has a nasty habit of messing things up.\"\n\t\t*choice\n\t\t\t#\"Exactly, that is why I will limit the free will of my creations.\"\n\t\t\t\t\"Ah, yes, a most wise choice, Master. You must keep your mortals in check and ensure their minds do not grow too quickly.\"\n\t\t\t\t*goto endconvo\n\t\t\t#\"I will ensure that balance resides in the world.\"\n\t\t\t\t\"A most burdensome task, Master. The stronger your mortals grow the more difficult they may become to control, but I have no doubt in your omnipotent abilities!\"\n\t\t\t\t*goto endconvo\n\t#\"I want to create a powerful race that will worship me.\"\n\t\t\"Ah, a very good idea indeed, Master. Worshippers will slowly grow your power. However, if your creations were to become smart enough to worship you, their minds will begin to wander and they may try to deviate from your divine will!\"\n\t\t*choice\n\t\t\t#\"I will not allow it. If my mortals forget who their creator is I will remind them.\"\n\t\t\t\t${helper} spins with delight, \"Yes, a firm hand is necessary to lead! Your power will thrive, Your Omniscience.\"\n\t\t\t\t*goto endconvo\n\t\t\t#\"My great race will be like my children, I want nothing more than for them to conquer the cosmos!\"\n\t\t\t\t${helper} shivers, \"I am certain with your guidance they will achieve everything you hope for and grow your power in turn.\"\n\t\t\t\t*goto endconvo\n\t#\"I just want to create life and see where it goes.\"\n\t\t\"Interesting approach, Master. Most beings would crave power, but perhaps you value understanding and knowledge foremost? I would warn you though, Oh Great One, if left too freely to wander, the minds of your mortals may diverge from your divinity.\"\n\t\t*choice\n\t\t\t#\"If they stray to far I will remind them who their creator is.\"\n\t\t\t\t${helper} nods with delight, \"Yes, I have no doubt in your omnipotent abilities, Master!\"\n\t\t\t\t*goto endconvo\n\t\t\t#\"Let them, I desire to see how life festers if left to do so freely.\"\n\t\t\t\t${helper} shivers, \"I have faith in your omnipotent abilities, Master!\"\n\t\t\t\t*goto endconvo\n*label endconvo\n\nYou fill the landscapes with all sorts of magnificent plants and exotic animals, but finally decide it is time to create a worshipping race to grow your strength. You spend some time contemplating what this new species should look like.\n\nHow will these creatures walk?\n*fake_choice\n\t#Bipedal legs for strength and flexibility.\n\t\t*set primarytrait \"Strong\"\n\t#Four lean legs for speed.\n\t\t*set primarytrait \"Swift\"\n\t#Several appendages for climbing mobility.\n\t\t*set primarytrait \"Agile\"\n\t#Slug-like movement through mucus covered membranes.\n\t\t*set primarytrait \"Slow\"\nWhat kind of arms will these creatures have?\n*fake_choice\n\t#Two strong arms for maximum strength.\n\t#Several arms to improve multitasking and climbing.\n\t#Fin-like appendages for swimming.\n\t\t*set race1arms \"fin\"\n\t#No arms, they manipulate objects with their mouths.\n\t\t*set race1arms \"head\"\nWill these creatures be large or small compared to their environment?\n*fake_choice\n\t#Tiny, for energy efficiency.\n\t\t*rand lifespan 25 40\n\t#Moderately sized, for adaptability.\n\t\t*rand lifespan 40 60\n\t#Large, to fend off predators.\n\t\t*rand lifespan 50 70\n*set race1strength 1\n*label naming\n*allow_reuse\nWhat will you call this new species? (Plural)\n*input_text race1\n*if race1 = \"None\"\n\tYou can not name your race \"None\".\n\t*goto naming\nYou decide to name your new creations, the ${race1}.\n*fake_choice\n\t#Rename.\n\t\t*goto naming\n\t#Continue.\n\t\t*temp word_length length(race1)\n\t\t*temp last_letter race1#word_length\n\t\t*if last_letter = \"s\"\n\t\t\t*set ad \"\"\n*disable_reuse\nYou create the first two ${race1}, already full-grown, and greet them upon their birth on your planet.\n*set race1size 2\n*rand pflux 30 40\n*fake_choice\n\t#\"Greetings, my creations, I am ${name}. I have created this world for you and as long as you and your children worship me, you will thrive here.\"\n\t#\"Welcome to your new home, ${race1}. You and your children are free to live however you wish.\"\nThe young creatures are confused at first, but after a short while they understand that you are their creator and build a small shrine to worship you.\n*set Power +6\n\n(Power +6)\n*finish Next", "chapter2": "*disable_reuse\n*temp gonehunting false\n*temp skipcourt false\n*temp enclave\n*rand enclave 1 3\n*if enclave=1\n\t*set enclave \"mountains\"\n*if enclave=2\n\t*set enclave \"forest\"\n*if enclave=3\n\t*set enclave \"desert\"\nYou continue tweaking your creations when suddenly an intense sensation of fatigue rushes over you.\n*set Power -(pflux)\n\n(Power -${pflux})\n\n\"Oh no, Master!\" ${helper} cries, \"You have expended a great deal of energy into your creations, you should rest.\"\n\n\"P-per-perhaps…\" you stutter.\n*page_break Rest\n*set race1size 64\nYou slowly regain consciousness, gazing out into the endless Aether.\n\n\"Ah, Almighty One, you are awake! Did you enjoy your rest?\"\n*fake_choice\n\t#\"What happened?\"\n\t\t\"You exhausted yourself. The influx of essence you've absorbed and then relinquished must have been too much and caused a debilitating reaction.\" ${helper} responds, but you have trouble fully understanding what he's talking about. \n\t#\"I've had better.\"\n\"Don't worry, Great One. As your power grows, so too will be your ability to wield it and your understanding of the universe.\"\n\nMoving on, you return to your mortals and continue watching them grow.\n*page_break\nThough there is no literal sense of time in the Aether, your memories do accumulate and bring about the sensation of time passing and you begin to grow bored. The ${race1} have begun reproducing and now several dozen inhabit a small cave in the ${enclave}. The shrine they have erected in your honor still stands and the ${race1} have begun offering you a portion of their scavenged food as tribute.\n*set power +8\n\n(Power +8)\n\nSuddenly, a plea from one of your ${race1} erupts from the surface.\n*page_break\n*gosub_scene event_chooser\nResolved, you return to the skies of the Aether and continue your everlasting watch. Again, however, you eventually grow tired of watching the primitive progress of your creations.\n\n\"Master,\" ${helper} interrupts, appearing out of nowhere again, \"may I make the suggestion? You are the almighty creator of this world, there are many things you can do! Though they will eventually learn on their own, you can lend a hand and teach them a thing or two yourself. Be careful though because influencing alternate dimensions always takes a toll on your energy and exactly how much can not always be determined.\"\n*temp variableson 0\n*temp powerloss 0\n*temp duntalked 0\n*label convo1\n*rand powerloss 6 12\n\nPower: ${Power}\n*fake_choice\n\t*selectable_if (Power > 14) #Teach the ${race1} how to create fire. (-Significant Power)\n\t\t*set power -14\n\t\tBy your creation's side, you teach them the simple technique of creating fire through friction. Though it takes weeks in their time, they eventually grasp the concept and the power of fire boosts their faith.\n\t\t\n\t\t(Power -14)\n\t\t*set race1strength +2\n\t\t*goto convo1\n\t*selectable_if (Power > 10) #Teach the ${race1} to hunt. (-Minor Power)\n\t\t*set power -(powerloss)\n\t\tYou gather the strongest individuals among the ${race1} and teach them the art of crafting simple weapons and hunting. It does not come quickly and there are a few casualties in their first few hunting voyages, but soon the ${race1} become master hunters.\n\t\t\n\t\t(Power -${powerloss})\n\t\t*set race1strength +1\n\t\t*goto convo1\n\t*selectable_if (Power > 10) #Teach the ${race1} to farm. (-Minor Power)\n\t\t*set power -(powerloss)\n\t\tThe ${race1} are dumbstruck at the ease of planting seeds in the ground. At first, they try planting in rocks and then decide that if plants need water to survive, to simply plant them in lakes, but eventually they understand the concept and begin sectioning off fertile land for farming.\n\t\t\n\t\t(Power -${powerloss})\n\t\t*set race1strength +1\n\t\t*goto convo1\n\t*selectable_if (Power > 10) #Teach the ${race1} to fish. (-Minor Power)\n\t\t*set power -(powerloss)\n\t\tThe most difficult aspect of fishing is the patience it requires. The younger and stronger among the ${race1} have difficulty concentrating on the task for extended periods of time, but the elderly of the tribe seem to excel at the task, catching as many as two-dozen fish a day.\n\t\t\n\t\t(Power -${powerloss})\n\t\t*set race1strength +1\n\t\t*goto convo1\n\t*if (duntalked=0) #\"If I rest will I regain my power?\"\n\t\t\"I'm afraid it is not that easy, Master. When you expend your power it is either consumed by something you have created or lost to the Aether. There are, however, several methods to gaining power beyond that which your worshipers provide. For example, you can absorb essence from deceased gods as you did before. However, it is not often that gods of any significance are bested, perhaps once in an eon! You could gather energy from lesser beings scattered throughout the Aether, assuming you have the strength to best them, but as you grow more powerful that may prove to be more trouble than it's worth. Gods can also relinquish power willingly, perhaps if you were to make a deal with one of them they would bestow power onto you in exchange.\"\n\t\t*set duntalked 1\n\t\t*goto convo1\n\t*if (duntalked=0) #\"The power these worshipers supply me will not be enough, I need more.\"\n\t\t\"Yes, Your Omnipotence. There are alternative methods to acquiring power of course. For example, you can absorb essence from deceased gods as you did before. However, it is not often that gods of any significance are bested, perhaps once in an eon! You could gather energy from lesser beings scattered throughout the Aether, assuming you have the strength to best them, but as you grow more powerful that may prove to be more trouble than it's worth. Gods can also relinquish power willingly, perhaps if you were to make a deal with one of them they would bestow power onto you in exchange.\"\n\t\t*set duntalked 1\n\t\t*goto convo1\n\t*if (duntalked=1) #\"I will hunt the creatures of the Aether and consume their essence!\"\n\t\t*label aggro1\n\t\t\"I must warn you, Master, I admire your ambition, but if you lack the power now to best these beings it may not turn out well for you.\"\n\t\t*fake_choice\n\t\t\t#\"Do not worry, ${helper}. I have the strength to destroy these pitiful beings.\"\n\t\t\t\t*goto hunting\n\t\t\t#\"Out of my way pest! Your doubt has riled me for the last time!\"\n\t\t\t\t*goto hunting\n\t\t\t#\"Perhaps it is best if I gather some strength at the court first, then.\"\n\t\t\t\t*goto apro1\n\t*if (duntalked=1) #\"It seems to gain a significant source of power I must dabble in politics.\"\n\t\t*label apro1\n\t\t\"Indeed, Master. Though it is not the quickest source of power, you may even be able to twist some circumstances in your favor.\"\n\t\t*fake_choice\n\t\t\t#\"On second thought, hunting the demons of the Aether may be the easiest solution.\"\n\t\t\t\t*goto aggro1\n\t\t\t#\"Let us make another visit to the Court then.\"\n\t\t\t\tYou whisk yourself through the twisting void of the Aether, continuously dodging debris spread throughout the infinite space. You find yourself questioning, for the first time, the origin of this rubble. From what you have found it seems to consist merely of scattered rocks and ethereal dust. As you ponder this new enigma, you find your mind growing weary as you verge on the brink of this new mentality.\n\t\t\t\t*goto court\n*label hunting\n*set gonehunting true\nYou whisk yourself through the twisting void of the Aether, continuously dodging debris spread throughout the infinite space. You find yourself questioning, for the first time, the origin of this rubble. From what you have found it seems to consist merely of scattered rocks and ethereal dust. Suddenly, a shimmer catches your eye in the distance. Moving closer, you make out what appears to be a thin gaseous cloud squirming through empty space.\n\n\"A daemon,\" ${helper} asserts, coming up from behind you.\n*fake_choice\n\t#\"What is a daemon?\"\n\t\t\"A daemon is one of the weakest forms of life that inhabit the Aether. They possess very little power, but I would not underestimate their strength. Without a strong mind, beings often regress to savagery.\"\n\t#\"Begone, ${helper}. I will handle this.\"\n\t\t\"As you wish, Great One.\" ${helper} vanishes before you. You are not quite sure if he has simply rendered himself invisible or if he has gone somewhere.\n*temp pflux\n*rand pflux 12 22\n*fake_choice\n\t#\"Perhaps I should turn back and gain more power before I take on this creature.\"\n\t\tYou decide to turn around and finish your hunt in the future.\n\t\t*goto court\n\t#Attack the being.\n\t\tYou encroach upon the entity, careful you do not give yourself away as a predator. However, as you peer around the cover of a floating stone, the daemon somehow senses your presence and begins charging toward you! From its ghastly core, an arm extends and claws protrude outward.\n\t\t*fake_choice\n\t\t\t*selectable_if (Power > 10) #Grasp the creature, vastly overpowering it, and crush it in your fist. (-Moderate Power)\n\t\t\t\tAs the daemon foolhardily charges you, you reach out with your superior size and grab the creature in an ethereal fist. Clinching, you squeeze the essence from the being, killing it instantly.\n\t\t\t*selectable_if (Power > 4) #Evade the creature's charge and attempt to blast the daemon from a distance. (-Minor Power)\n\t\t\t\tYou dash to the side. Your burst of speed leaves a trail of ethereal dust in your wake. Before the daemon can respond you blast it with a powerful burst of lightning and nearly disintegrate the creature.\n\t\t\t#Flee.\n\t\t\t\tYou turn around and fly away as quickly as possible, realizing you do not have the strength to best it. Luckily, you're faster than the daemon, but next time fortune may not favor you. \n\t\t\t\t\n\t\t\t\t*if skipcourt=false\n\t\t\t\t\tYou decide it may be safer for now to visit the Court and gather additional power.\n\t\t\t\t\n\t\t\t\t*goto court\n\t\t*line_break\n\t\t*line_break\n\t\tThe remains of the daemon float in place, as its essence disperses. Taking a deep breath, you inhale what is seeping around you. The rush of energy flows through you and you can feel it bolstering your strength.\n\t\t*set Power +(pflux)\n\t\t\n\t\t(Power +${pflux})\n\t\t\n\t\t*fake_choice\n\t\t\t#Continue hunting.\n\t\t\t\t*gosub_scene hunt1\n\t\t\t\t*page_break\n\t\t\t\t*if skipcourt=false\n\t\t\t\t\tSatisfied with the amount of power you have harvested, you decide it's time to revisit The Court of Gods, if nothing else, to at least to see what it has to offer.\n\t\t\t\t\t*goto continue3\n\t\t\t\t*else\n\t\t\t\t\tSatisfied with the amount of power you have harvested and facing exhaustion, you decide it's time to head back.\n\t\t\t\t\t*goto continue3\n\t\t\t\t*label continue3\t\n\t\t\t\t*goto court\n\t\t\t*if (skipcourt=false) #Go to the Court of Gods.\n\t\t\t\t*goto court\n\t\t\t*if (skipcourt=true) #Return to your planet.\n\t\t\t\t*goto court\n*label court\n*if skipcourt=true\n\t*goto continue2\n*page_break\n\nYou arrive at the Court gates once more, the same two guards standing watch. This time, however, as you approach they seem to recognise you and allow you passage without confrontation.\n\n${helper} appears next to you, \"We should head to the Courthouse and seek an audience with one of the Court gods. One of them is bound to have a contract they need filled.\"\n\nYou look around the Court Center and notice a large marketplace not too far away. You can hear the voices of beings advertising their wares. [i]What kind of goods could gods be selling?[/i] you ponder silently.\n*label marketchoice\n*fake_choice\n\t#\"What do you mean by 'contracts', ${helper}?\"\n\t\t\"Jobs, quests, missions, wills, or deeds, Oh Great One! When you complete the requirements of a contract a god has offered you they will bestow upon you whatever reward was outlined. You never know what quest a god will offer you when you visit the Court.\"\n\t\t*goto marketchoice\n\t#\"Or we could browse the marketplace first.\"\n\t\t*gosub_scene merchant\n\t#\"To the Courthouse!\"\t\t\n\t#\"Let's just get this over with.\"\n\t\t\"Try not to hate politics too much, Master. With a little finesse it can be the easiest way to overpower your enemies.\"\n\t\t*line_break\n\t\t*line_break\nYou approach the Courthouse doors, only this time they are guarded by a being much smaller than those at the gates.\n\n\"What business have you at the Courthouse of the Gods?\" the being inquires.\n\n\"I have come seeking a contract with one of the court gods,\" you respond.\n\n\"Hmm,\" the creature looks you up and down, \"in this form? Could you don something a little more…\" a momentary pause suggests the lacking of a better word, \"cordial?\"\n*label test\n*fake_choice\n\t#\"My ethereal form is fine.\"\n\t\t\"Very well,\" the being arches its brow and then holds a golden scroll in front of its face.\n\t#Conjure a physical form.\n\t\t*allow_reuse\n\t\tSpinning your essence around yourself in a flamboyant vortex, you arrange your celestial fibers into a sequence that resembles some fantastic creature, much like the other gods.\n\t\t\n\t\t*label appearance\n\t\tWhat creature do you identify with most?\n\t\t*fake_choice\n\t\t\t#Fox\n\t\t\t\t*set animal \"Fox\"\n\t\t\t#Lion\n\t\t\t\t*set animal \"Lion\"\n\t\t\t#Bear\n\t\t\t\t*set animal \"Bear\"\n\t\t\t#Eagle\n\t\t\t\t*set animal \"Eagle\"\n\t\t\t#Wolf\n\t\t\t\t*set animal \"Wolf\"\n\t\t\t#Goat\n\t\t\t\t*set animal \"Goat\"\n\t\t\t#Tiger\n\t\t\t\t*set animal \"Tiger\"\n\t\t\t#A new animal.\n\t\t\t\t*input_text animal\n\t\tWhat feature will be most prominent?\n\t\t*fake_choice\n\t\t\t#Magnificent wings.\n\t\t\t\t*set adj \"Winged\"\n\t\t\t#Four legged.\n\t\t\t\t*set adj \"Four-legged\"\n\t\t\t#Dark essence.\n\t\t\t\t*set adj \"Dark\"\n\t\t\t#White coat.\n\t\t\t\t*set adj \"White\"\n\t\t\t#A custom descriptor.\n\t\t\t\t*input_text adj\n\t\t*set animal (adj&\" \")&animal\n\t\tYou will appear as a ${animal}. Is this acceptable?\n\t\t*fake_choice\n\t\t\t#Yes\n\t\t\t\t*goto cont\n\t\t\t#No, let me start over.\n\t\t\t\t*goto appearance\n*label cont\n*disable_reuse\nThe creature simply nods and then holds a golden scroll in front of its face.\n\n*gosub_scene quest_chooser\n*page_break\n*if gonehunting=false\n\t${helper} advises you on the way back, \"Great One, we are already out here, now would be a good time to hunt for some additional essence if you wish.\"\n\t*choice\n\t\t#\"No, I will head back for now.\"\n\t\t\t*goto continue2\n\t\t#\"Very well, let's see what we can find.\"\n\t\t\t*set skipcourt true\n\t\t\t*goto hunting\n*label continue2\n*rand race1size 700 1000\nWith your newly found power, you arrive home and check on your worshippers.\n*finish Return", "chapter3": "*rand pflux 55 80\n*set loyalty \"Fleeting\"\nAs you head back to your planet, bearing the newly found power you have acquired, ${helper} speaks up beside you. \"Great One, it has just dawned on me that you have yet to name your planet! All great worlds have a name. Do you have one in mind?\"\n*label nameplanet\n*input_text Planetname\n\"${Planetname}, this is how all the Aether will know of your world, are you certain this is the name you want?\" ${helper} inquires.\n*fake_choice\n\t#\"Yes, let it be so!\"\n\t*allow_reuse #\"Hang on a sec…\"\n\t\t*goto nameplanet\n*disable_reuse\nUpon reaching ${Planetname} and peering down from the sky, you realize several centuries have passed since you left and the ${race1} have begun dividing themselves into many different villages. As you watch, you witness the tribes feuding, arguing over how to properly worship you. A majority of the villages stick to the old ways of worship through daily prayer and tribute, but a couple tribes have branched off. One branch seems to think that the offerings the other villages provide are excessive and believe that you would prefer these resources instead be used by the ${race1} to fuel their growth. A third faction has also arisen, the other ${race1} call them the Extremists. They live in shanty homes and believe that all luxuries and excess goods should be sacrificed to you as tribute and consume only what is necessary to survive.\n\nThe feuding has gone on for decades and it seems the extremists are preparing to attack the other villages for their blasphemous ways. \n\n\"What will you do, Your Omnipotence?\" ${helper} inquires. \"The ${race1} can think for themselves so you don't have to do anything, but this holy quarrel may be a pivotal moment in the race's development.\"\n*set wars 1\n*choice\n\t#Stay neutral and watch the war unfold.\n\t\t*label choice1\n\t\tYou focus your gaze on each of the tribes, taking note of how each prepares for the war they know is coming.\n\t\t\n\t\tYou watch the traditional loyalists and hear their prayers for protection. They mobilize a weak army amidst their allied villages with the hope of fending off the encroaching army of savage extremists.\n\t\t\n\t\tYou move your gaze to the progressive tribe. Their stockpiles are plentiful and their people well equipped. A shrine to you exists at the town center and citizens gather around it asking for your blessing.\n\t\t\n\t\tFinally, you gaze upon the extremist tribe. Their food and resources are all housed by the priests and rationed out equally. Surprisingly, you find little corruption throughout the community as the priests would not dare touch your sacred tribute. As they sharpen their wooden spears and weave shields out of hides, the people of the village pray for strength in their coming battle.\n\t\t*goto noally\n\t#Intervene on one of the tribes' behalf.\n\t\t\"Which tribe do you favor, Great One?\" ${helper} inquires.\n\t\t*choice\n\t\t\t#The traditional tribe.\n\t\t\t\t*set obed 1\n\t\t\t\tYou focus your gaze on your loyalists and can hear their prayers asking for protection. They mobilize a weak army amidst their allied villages with the hope of fending off the encroaching army of savage extremists.\n\t\t\t\t*goto ally\n\t\t\t#The progressive tribe.\n\t\t\t\t*set obed 0\n\t\t\t\tYou focus your gaze on the progressive tribe, their stockpiles plentiful and their people well equipped. A shrine to you exists at the town center and citizens gather around it asking for your protection.\n\t\t\t\t*goto ally\n\t\t\t#The extremist tribe.\n\t\t\t\tYou focus your gaze on the extremist tribe. Their food and resources are all housed by the priests and rationed out equally. Surprisingly, you find little corruption throughout the community as the priests would not dare touch your sacred tribute. As they sharpen their spears and weave shields out of hides, the people of the village pray for strength in their coming battle.\n\t\t\t\t*set obed 2\n\t\t\t\t*goto ally\n\t\t\t#On second thought, I may not interfere.\n\t\t\t\t*goto choice1\n*label ally\n\n\"So sorry to disturb you, Master,\" ${helper} intrudes, \"but I must warn you. How you resolve this conflict will impact your people almost as much as the victor themselves. Whether or not your people evolve into righteous warriors or apathetic cultists may depend on your actions. Your people are your children and they learn from your actions as much as they learn from their own parents.\"\n*choice\n\t#Rain fire on the enemy tribes.\n\t\t*set primarytrait \"Aggresive\"\n\t\tYou bend the elements to your will and your followers gaze at the sky with awe as dark clouds gather and eventually block out the sun. The sky turns blood red and your mortals fall to the ground in praise. From your divine fist you hurl a ball of fire towards the blasphemous tribes followed by a hundred more. The meteorites strike ${planetname} with such force that the tribes' primitive structures topple to the ground and all ${race1} unfortunate enough to get caught within the range of an impact are instantly incinerated. After a few short minutes you release your grip on the skies, but the smoke from the burning villages continues to fill the atmosphere for days. The faith of your chosen ${race1} are stronger than ever and not a soul questions your omnipotence.\n\t\n\t\tThe ${race1} scour the destroyed villages for resources and squash any remaining insurgence. Several survivors of the opposing tribes surrender and are taken prisoner.\n\t\t\n\t\tLater, the leader of the tribe comes to you and asks for guidance, \"Your Omnipotence, should the prisoners of war be spared or executed?\"\n\t\t*set Evil +2\n\t\t*set obed +1\n\t\t*goto warover\n\t#Bless a chosen one with divine power.\n\t\t*set primarytrait \"Patriotic\"\n\t\tYou go before the most worthy individual in the tribe and imbue them with great power. You bless their weapon with the power to cut down any foe. In their right hand they wield the mighty Axe of the Chosen and in their left, your divine will.\n\t\t\n\t\tOn the battlefield the Chosen One leads the army against the other tribes and strikes them down with ease. With a single swing they decapitate a dozen enemies and at the same time heal their allies. The opposing tribes quickly realize they stand no chance and surrender.\n\t\t\n\t\tThe tribe celebrates their victory and legends are sung about the glory of the Chosen One and the favor you showed their people. The faith of the chosen ${race1} is stronger than ever.\n\t\t\n\t\tAfter the war subsides, the leader of the tribe comes to you and asks for guidance, \"Your Omnipotence, should the prisoners of war be spared or executed?\"\n\t\t*goto warover\n\t#Bestow a blessing of might on the warriors.\n\t\t*set primarytrait \"Physical Prowess\"\n\t\tYou go before the priests of the village, those you can most easily commune with, and imbue within them the ability to bless individuals with divine favor. Before the battle your priests bless every single soldier with your boon.\n\t\t\n\t\tAs the troops battle in the onslaught they fight with otherworldly strength, striking down as many as a dozen foes before succumbing to any enemy blows. In only a few short hours your chosen ${race1} completely overrun the opposing tribes. They take prisoner those who surrender and cut down the rest. \n\t\t\n\t\tAs the slaughter subsides the commander of the blessed army asks you for guidance, \"Your Omnipotence, should the prisoners of war be spared or executed?\"\n\t\t*set Evil -2\n\t\t*set race1strength +1\n\t\t*goto warover\n*label noally\n*page_break\nAs the the horde of extremists marches toward the enemy villages, the two opposing tribes meet to discuss an alliance against the savages. A great deal of discrimination exists between the two, but they are able to ignore their difference to fend off a greater threat.\n\nThe two tribes combine their strength and face the extremists on the battlefield. A great skirmish takes place as your ${race1} slaughter one-another in the hundreds. So much death occurs that you feel a slight pain shoot through your center.\n\n\"Hmm,\" ${helper} ponders, \"it seems the loss of so much of your imbued essence is taking a toll on you, even being separated from your primary form.\"\n\nIn the aftermath of battle, the two allied tribes emerge victorious, but at a heavy cost. The leader of the progressive tribe gives a heartening speech which implicates peace between the two tribes and discourages such barbaric bloodshed from ever occurring again.\n\nYou can feel the combined strength of the two tribes united bolster your own.\n*set obed 1\n*set Power +pflux\n\n(Power +${pflux})\n*goto ending\n*label warover\n*fake_choice\n\t#\"Release those who repent.\"\n\t\t*set obed -1\n\t\t*set Evil -4\n\t#\"Execute the heretics.\"\n\t\t*set obed +1\n\t\t*set Evil +4\n\t#\"Enslave them.\"\n\t\t*set obed +1\n\t\t*set Evil +6\nIn the coming years after the war, the tribe develops and establishes itself on the planet.\n*if (obed>0)\n\t*set loyalty \"Unquestioning\"\n*set Power +pflux\n\n(Power +${pflux})\n*label ending\n*page_break\n\"Now that this primitive feud is over we can focus on evolving your race, teaching them more advanced things like writing, building, or animal husbandry. Look, as we speak it seems one of your ${race1} has just discovered the wheel!\"\n\nYou glance down and see a man being chased down a hill by a rolling boulder.\n\n\"Marvelous!\" ${helper} continues, \"We should still keep it relatively simple, though, we don't want their heads to explode. Let's not go revealing the ultimate meaning behind life's existence amidst the barren wastes of the cosmos or anything,\" ${helper} chuckles a little bit.\n*set disaster \"The Tribal War\"\n*label choice2\n*rand pflux 35 50\n\nPower: ${Power}\n*fake_choice\n\t*selectable_if (Power > 80) #Teach the ${race1} a written language. (-Major Power)\n\t\t*set power -80\n\t\tYou teach the ${race1} how to craft paper out of plant-life and dyes from local berries. It isn't easy, but with a little exertion on your part you are able to evolve the ${race1}'${ad} minds to identify and understand chirography. By introducing the basics, the race quickly takes to this new media and rapidly advances the language with more complex vernacular and grammatical structure. In only a few short years some ${race1} have even begun exploring poetry and historical documentation. With the ability to communicate through writing, the race will grow much more quickly.\n\t\t\n\t\t(Power -80)\n\t\t*set race1strength +2\n\t\t*goto choice2\n\t*selectable_if (Power > 50) #Teach the ${race1} carpentry. (-Significant Power)\n\t\t*set power -pflux\n\t\tWithout advanced tools the ${race1} have difficulty constructing complex buildings, but you teach the laborers how to cut notches into the wood which allows for taller and sturdier structures. Additionally, you show the race how to use certain materials as adhesives to cement structures even further. With more durable buildings the ${race1} will be better able to shelter themselves from the harsh environment.\n\t\t\n\t\t(Power -${pflux})\n\t\t*set race1strength +1\n\t\t*goto choice2\n\t*selectable_if (Power > 50) #Teach the ${race1} basic smithing. (-Significant Power)\n\t\t*set power -pflux\n\t\tYou go before the most talented craftsmen among the ${race1} and teach them to forge weapons, armor, and tools using the most malleable metals on the planet. The stronger ${race1} take hold of the concept easily and begin producing crude items. With practice though, they soon incorporate masterful designs with beautiful craftsmanship. Some ${race1}, however, still prefer crafting with leather and flax, but implement similar designs which strengthen their materials as well. With better equipment, the ${race1} will be better able to defend themselves.\n\n\t\t(Power -${pflux})\n\t\t*set race1strength +1\n\t\t*goto choice2\n\t*selectable_if (Power > 50) #Teach the ${race1} to domesticate animals. (-Significant Power)\n\t\t*set power -pflux\n\t\tThe task proves quite difficult. In the past, the ${race1} have only known how to hunt wild animals, never tame them. You find yourself having to constantly exert energy to calm the beasts because of the ${race1}'${ad} aggressive behavior, but soon they learn patience. Though learning to ride the creatures is still a work in progress, the ${race1} have managed to domesticate the animals enough to harvest a reliable supply of produce.\n\n\t\t(Power -${pflux})\n\t\t*set race1strength +1\n\t\t*goto choice2\n\t#Rest\nAs the sun sets on ${planetname}, you gaze upon all your beautiful creations. Relaxing and seeping back into the Aether, you calm your godly hands.\n*rand race1size 1500 1900\n*set race1size (race1size*(race1strength+1))\n\n*gosub_scene event_chooser\n\nWith the crises dealt with, you feel your expenditures wearing on you. Your celestial body becomes heavy and you find yourself forced to rest, ignoring the rest of the cosmos.\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*finish Rest\nRemember earlier how we told you that the first three chapters are available for free? This is the end of the free content.\n*if choice_prerelease and choice_is_web\n\t*subscribe {\"allowContinue\": false}\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n*purchase_discount adfree 2017-01-18 $3.99 $2.99 purchased\n*abort", "chapter4": "*rand pflux 80 100\n*disable_reuse\n*temp hunted 0\n*temp timesended 0\n*page_break\n*rand wars 1 4\n\"Time to awaken, Master!\" A voice echoes around you. Regaining consciousness, you find ${helper} floating in front of you. \"You've been asleep for nearly a millennium, Great One, and the ${race1}'${ad} prayers are piling up!\" You glance at ${planetname} and behold the great cities the race has built. As you begin stretching, you feel your strength regenerating and a thousand years of worship empowering you as well.\n*set Power +(pflux)\n\n(Power +${pflux})\n*fake_choice\n\t#\"A nap was just what I needed.\"\n\t\t\"I am pleased that you feel refreshed, Almighty One, but we shouldn't waste any time. If you concentrate, you will hear all the prayers your ${race1} have sent you over the past millennium. With each one you answer the faith of your people will grow and so too will your power.\"\n\t#\"I was expecting a bit more.\"\n\t\t\"The ${race1} are still a relatively small race compared to many, but they are growing quickly. If you concentrate, you will hear all the prayers your ${race1} have sent you over the past millennium. With each one you answer the faith of your people will grow and so too will your power.\"\n*fake_choice\n\t#\"I haven't time for such menial tasks. I'll head to the Court and see if I can't earn more power there.\"\n\t\t${helper} replies nervously, \"Very well, Master. I can not question the Omniscient One.\"\n\t\t*set obed -1\n\t\t*set loyalty \"Questioning\"\n\t\t*goto gotocourt\n\t#\"Nonsense, my people are fine. I will hunt within the Aether for power instead.\"\n\t\t${helper} replies nervously, \"Very well, Master. I can not question the Omniscient One.\"\n\t\t*set obed -1\n\t\t*set loyalty \"Questioning\"\n\t\t*goto gotohunting\n\t#Concentrate on fulfilling the prayers.\n\t\t*rand pflux 60 70\n\t\tYou focus your mind on the words of your creations and hear the millions upon millions of requests. Although the energy required to answer each one individually is of no real significance, aggregated it would take nearly all of the power you've gained over the last millennium of slumber.\n\t\t*fake_choice\n\t\t\t#Fulfill all the prayers within reason. (-Great Power)\n\t\t\t\tYou crack the stars that make up your knuckles and get to work. It only takes you a few months to process over a thousand prayers per second and answer each one with the well-being of all in mind.\n\t\t\t\t*set power -(pflux)\n\t\t\t\t\n\t\t\t\t(Power -${pflux})\n\t\t\t\t\n\t\t\t\t\"Truly remarkable, Your Omnipotence!\" ${helper} remarks. \"I'm certain your people will be quite happy and their worship will be even greater because so. \n\t\t\t\t*set race1strength +2\n\t\t\t#Answer only prayers of significance. (-Significant Power)\n\t\t\t\t*set primarytrait \"Elitist\"\n\t\t\t\tYou crack the stars that make up your knuckles and get to work. It doesn't take long. Processing a thousand prayers per second, you fulfil each one reasonably in only a few short days.\n\t\t\t\t*set power -(pflux/2)\n\t\t\t\t\n\t\t\t\t(Power -${pflux})\n\t\t\t\t\n\t\t\t\t\"Good thing you got those out of the way,\" ${helper} remarks. \"I'm certain your people will be quite happy and their worship will be even greater because so. \n\t\t\t\t*set race1strength +1\n\t\t\t#Ignore them, surely the people will understand.\n\t\t\t\t*set primarytrait \"Conceited\"\n\t\t\t\t*set obed -1\n\t\t\t\t*set loyalty \"Questioning\"\n\t\t\t\t\"I need to conserve my strength for when its needed most. I can't waste it on menial prayers,\" you remark.\n\t\t\t\t\n\t\t\t\t${helper} replies nervously, \"Very well, Master. I can not question the Omniscient One. \n\t\tNow then, what's next on your godly agenda?\"\n\t\t*choice\n\t\t\t#\"I'll head to the Court and see if I can't earn more power there.\"\n\t\t\t\t\"Very good, I'm certain there are all kinds of tasks other gods need assistance with.\"\n\t\t\t\t*goto gotocourt\n\t\t\t#\"I think I'll spend some time wandering the Aether. Maybe I'll manage to collect something out there.\"\n\t\t\t\t\"Do be careful, Master. Remember, the Aether is a savage place.\"\n\t\t\t\t*goto gotohunting\n*label gotocourt\n\nYou return to the Court and enter with ease. The city is bustling with creatures flying around in every which way.\n*label choice1\n*fake_choice\n\t#Go to the Courthouse.\n\t\t*label cc\n\t\t\"Oh, its you again,\" the doordaemon remarks.\n\t\t*fake_choice\n\t\t\t#\"Any of the Court Gods require assistance?\"\n\t\t\t\tSeveral pieces of parchment materialize before the creature and he begins looking them over. \n\t\t\t#\"Silence, fool! I have come seeking an audience.\"\n\t\t\t\t*if (Power>150)\n\t\t\t\t\tLightning sparks from your ethereal body and strikes nearby columns. \n\t\t\t\t\t\n\t\t\t\t\t\"R-right,\" the feeble creature squirms, but tries to maintain its demeanor.\n\t\t\t\t\t*goto convo\n\t\t\t\t*else\n\t\t\t\t\tThe creature rolls its eyes, you don't bear the kind of power to speak like that. It reluctantly begins looking over several pieces of parchment. \n\t\t\t\t\t*goto convo\n\t\t*label convo\n\t\t*gosub_scene quest_chooser\n\t\t*goto endofchapter4\n\t#Visit the marketplace.\n\t\t*if hasbeen = true\n\t\t\tYou enter the marketplace and peruse the stalls. Vendors from all corners of the realm offer rare goods. An auctioneer glares at you, hoping you'll bid on the stone tablet he's trying to sell-off. Ignoring the peddlers, you continue to the essence stone stall, the only merchant that possesses anything that could be of value to you.\n\t\t\n\t\t\t\"Ah, my friend! How are you doing?\" the merchant inquires as you approach.\n\t\t*gosub_scene merchant\n\t\t\n\t\tFrom the Court Center you proceed up the steps to the Courthouse.\n\t\t\n\t\t*goto cc\n*label gotohunting\n*set hunted 1\n*line_break\n*line_break\n*gosub_scene hunt2\n\n\n*label endofchapter4\n*if timesended = 1\n\t*goto realendofchapter4\n*page_break\n*set timesended 1\n*if hunted = 0\n\tAs you make your way home, Epoch approaches you once again. \"${planetname} has been quiet. Perhaps you would like to spend this time scouting the Aether?\"\n\t*fake_choice\n\t\t#\"Excellent idea!\"\n\t\t\t*goto gotohunting\n\t\t#\"No, not this millennium.\"\n\t\t\t*goto realendofchapter4\n*if hunted = 1\n\tAs you make your way home, Epoch approaches you once again. \"${planetname} has been quiet. Perhaps you would like to spend this time attending Court affairs?\"\n\t*fake_choice\n\t\t#\"Excellent idea!\"\n\t\t\t*goto gotocourt\n\t\t#\"No, not this millennium.\"\n\t\t\t*goto realendofchapter4\n\t\t\n*label realendofchapter4\n*page_break\nGazing across ${planetname}, you watch the momentous progress your ${race1} have made. Their minds grow with every generation and you begin to wonder if there is any physical limit to their understanding. Then, the question dawns on you, [i]is there any limit to my comprehension?[/i] As your power grows, you find yourself developing thoughts you've never once conceived before. However, your peaceful contemplation is soon interrupted.\n\n*gosub_scene event_chooser\n*label popcalc\n*rand race1size 10000 13000\n*set race1size (race1size*(race1strength+1))\n*page_break\nWith such a flux of energy, you are once again forced to rest. Confident your race will thrive, you slumber for another millennium.\n*finish Rest", "chapter5": "*rand pflux 200 280\n*disable_reuse\n*set earlygame false\n*set midgame true\n*gosub_scene female_generator\n*gosub_scene city_generator\n*gosub_scene godname_generator\n*set largestcity cityname\n*rand wars 5 10\n*set lifespan +15\n*set planlooks \"${planlooks}\"&\" Cities dot the landscapes.\"\n*temp fin1 0\n*page_break\nYou are suddenly jolted awake by a sharp pain that shoots through your body. Alarmed, you look around, prepared to fend off any attackers, but find no beings in sight. Turning your attention to ${planetname}, you realize the source of the blow. \n*page_break\nA large idol has been erected at the city center of ${cityname}, one of the mortal realms, but the idol is not of you.\n\n*if obed\u003c1\n\t*set loyalty \"Skeptical\"\n\t*set primarytrait \"Naturally Curious\"\n\tUpon further observation, you find that the ${race1} regard the monument as a symbol of evolution. They refer to the idol as ${godname}, the icon of progress.\n\t*goto ifover1\n*elseif obed>0\n\t*set loyalty \"Moderate\"\n\tUpon further observation, it seems the ${race1} have adopted another god to worship, ${godname}, they call the being. They refer to the entity as the god of death.\n\t*goto ifover1\n*label ifover1\n*line_break\n*line_break\n\"Are you alright, Your Greatness?\" ${helper} inquires, popping into existence. He travels to a nearby cloud and peers over. \"It seems the ${race1} are becoming dissatisfied with the lack of answers to their existential questions, so they've begun concocting their own; fabricating this false idol to worship. You mustn't allow this to persist, Master. Every minute of worship and praise this false idol receives is a minute not given to you.\"\n*page_break\nOne morning, while a priestess prays at your shrine, you commune with her. \"${unitname}…\" you speak the female's name and she looks up to find her mind clouded by divine light.\n*choice\n\t#\"Why have my people begun worshipping this false idol?\"\n\t\t*label response\n\t\t*if obed\u003c1\n\t\t\t\"${name}, forgive me, but many have begun to look to ${godname} for guidance. Many respect ${godname} as a Deity that allows the people to adapt and change.\"\n\t\t\t*choice\n\t\t\t\t#Tell her this is not true.\n\t\t\t\t\t\"This figure you call, ${godname}, is a fabrication. By believing in it, my people are drawn further from me and will eventually be driven to madness,\" you explain to the priestess. \"This idol must be destroyed to keep my people on the righteous path.\"\n\n\t\t\t\t\tThe woman seems puzzled, \"Where does our path lead, Great ${name}? What happens to us when our bodies decease?\" she inquires.\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#\"Your spirit rejoins the universe.\"\n\t\t\t\t\t\t\tThe woman looks shocked, \"We had no idea, please forgive us, ${name}. I will ensure the monument is destroyed and inform the clergy of the truth.\" You sever your communion.\n\t\t\t\t\t\t\t*set belief 1\n\t\t\t\t\t\t\t*set race1strength +1\n\t\t\t\t\t\t#\"You ascend into a realm of perfection.\"\n\t\t\t\t\t\t\tThe woman looks shocked, \"We had no idea, please forgive us, ${name}. I will ensure the monument is destroyed and inform the clergy of the truth.\" You sever your communion.\n\t\t\t\t\t\t\t*set belief 2\n\t\t\t\t\t\t\t*set race1strength +1\n\t\t\t\t\t\t#\"Your spirit finds a new body on its own.\"\n\t\t\t\t\t\t\tThe woman looks shocked, \"I suppose there is much to the universe we do not yet understand, please forgive us, ${name}. I will ensure the monument is destroyed and inform the clergy of the truth.\" You sever your communion.\n\t\t\t\t\t\t\t*set belief 3\n\t\t\t\t\t\t\t*set race1strength +1\n\t\t\t\t\t\t\t*set obed -1\n\t\t\t\t\t\t#Give no answer.\n\t\t\t\t\t\t\tThe woman awaits a response that never comes. \"I suppose there is much to the universe we do not yet understand, please forgive us, ${name}. I will ensure the monument is destroyed, but the people of ${planetname} may not understand.\" You sever your communion.\n\t\t\t\t\t\t\t*set obed -1\n\t\t\t\t\t*line_break\n\t\t\t\t\t*line_break\n\t\t\t\t\tThe woman returns to the city and immediately consults the rest of the clergy. Reminiscing her encounter with you, the other priests become skeptical of her claim and her accusation of ${godname}'s falsity. However, after much deliberation, they unanimously conclude that her argument is within reason; their faith lies with you and not this Deity. By order of the church, the idol is dismantled and rebuilt in your glory.\n\t\t\t\t\t\n\t\t\t\t\tFrom that point onward, the church ceases its acknowledgement of ${godname}, but many are displeased with the change and still see the paragon as legitimate. This tear in beliefs causes many feuds between your people and they begin to divide.\n\t\t\t\t\t*goto continue\n\t\t\t\t#Tell her ${godname} is actually evil.\n\t\t\t\t\t\"You must destroy this idol. If my followers continue down this unrighteous path they will descend into madness, for ${godname} is, in reality, a being of evil,\" you explain to the priestess.\n\t\t\t\t\t\t\t\n\t\t\t\t\tThe woman looks shocked, \"${godname} is a deceiver then? If ${godname} is not a paragon to us then what is it?\"\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#\"Those that follow ${godname} become evil spirits.\"\n\t\t\t\t\t\t\tThe woman looks shocked, \"We had no idea, please forgive us, ${name}. I will ensure the monument is destroyed and inform the clergy of the truth.\" You sever your communion.\n\t\t\t\t\t\t\t*set obed +1\n\t\t\t\t\t\t\t*set race1strength +1\n\t\t\t\t\t\t#\"It is a figure of chaos that leads you astray.\"\n\t\t\t\t\t\t\tThe woman looks shocked, \"We had no idea, please forgive us, ${name}. I will ensure the monument is destroyed and inform the clergy of the truth.\" You sever your communion.\n\t\t\t\t\t\t\t*set race1strength +1\n\t\t\t\t\t\t#Give no answer.\n\t\t\t\t\t\t\tThe woman awaits a response that never comes. \"I suppose there is much to the universe we do not yet understand, please forgive us, ${name}. I will ensure the monument is destroyed, but the people of ${planetname} may not understand.\" You sever your communion.\n\t\t\t\t\t\t\t*set obed -1\n\t\t\t\t\t*set belief 2\n\t\t\t\t\t*line_break\n\t\t\t\t\t*line_break\n\t\t\t\t\tThe woman returns to the city and immediately consults the rest of the clergy. Reminiscing her encounter with you, the other priests become skeptical of her claim and her accusation of ${godname}'s true evil. However, after much deliberation, they unanimously conclude that her argument is within reason; their faith lies with you and not this Deity. By order of the church, the idol is dismantled and rebuilt in your glory.\n\t\t\t\t\t\n\t\t\t\t\tFrom that point onward, the church ceases its following of ${godname} and it becomes a symbol of darkness. The ${race1}'${ad} faith in you grows stronger out of fear for ${godname}. However, the dread the ${race1} hold toward ${godname} steals it from you and the overall obedience of the race becomes skewed between those most faithful to you and those less devoted.\n\t\t\t\t\t*goto continue\n\t\t\t\t#Tell her ${godname} is actually part of you.\n\t\t\t\t\t\"I am ${godname},\" you explain to the priestess. \"I guide you on the righteous path and allow the change you speak of. Those that remain faithful are lead to a better life and the unfaithful to a less fortunate one.\"\n\t\t\t\t\t\n\t\t\t\t\tThe woman looks shocked, \"I understand. Thank you for bestowing this knowledge unto me, ${name}. I will share it with the others of the clergy and ensure that ${godname} is simply considered as a portion of your power.\" You sever your communion.\n\t\t\t\t\t*set belief 2\n\t\t\t\t\t*set race1strength +1\n\t\t\t\t\t\n\t\t\t\t\tThe woman returns to the city and immediately consults the rest of the clergy. Reminiscing her encounter with you, the other priests become skeptical of her claim that you and ${godname} are one. However, after much deliberation, they unanimously conclude that her argument is within reason; their faith lies with you and not this secondary entity. The church concludes that while ${godname} may still be acknowledged, all worship is to be made to you.\n\t\t\t\t\t\n\t\t\t\t\tFrom that point onward, the church ceases its glorification of ${godname}, but many are displeased with the change and still acknowledge the being separately as The Life Guider. This tear in beliefs causes many feuds between your people and they begin to divide.\n\t\t\t\t\t*goto continue\n\t\t*else\n\t\t\t\"${name}, forgive me, but many have begun to look to ${godname} for guidance. Many believe that ${godname} guides their souls to new bodies once their current body has deceased.\"\n\t\t\t*choice\n\t\t\t\t#Tell her this is not true.\n\t\t\t\t\t\"This figure you call, ${godname}, is a fabrication. By worshipping it, my people are drawn further from me and will eventually be driven to madness,\" you explain to the priestess. \"This idol must be destroyed to keep my people on the righteous path.\"\n\n\t\t\t\t\tThe woman seems puzzled, \"If ${godname} does not guide our souls, then what becomes of us?\" she inquires.\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#\"Your spirit rejoins the universe.\"\n\t\t\t\t\t\t\tThe woman looks shocked, \"We had no idea, please forgive us, ${name}. I will ensure the monument is destroyed and inform the clergy of the truth.\" You sever your communion.\n\t\t\t\t\t\t\t*set belief 1\n\t\t\t\t\t\t\t*set race1strength +1\n\t\t\t\t\t\t#\"You ascend into a realm of perfection.\"\n\t\t\t\t\t\t\tThe woman looks shocked, \"We had no idea, please forgive us, ${name}. I will ensure the monument is destroyed and inform the clergy of the truth.\" You sever your communion.\n\t\t\t\t\t\t\t*set belief 2\n\t\t\t\t\t\t\t*set race1strength +1\n\t\t\t\t\t\t#\"Your spirit finds a new body on its own.\"\n\t\t\t\t\t\t\tThe woman looks shocked, \"I suppose there is much to the universe we do not yet understand, please forgive us, ${name}. I will ensure the monument is destroyed and inform the clergy of the truth.\" You sever your communion.\n\t\t\t\t\t\t\t*set obed -1\n\t\t\t\t\t\t\t*set belief 3\n\t\t\t\t\t\t\t*set race1strength +1\n\t\t\t\t\t\t#Give no answer.\n\t\t\t\t\t\t\tThe woman awaits a response that never comes. \"I suppose there is much to the universe we do not yet understand, please forgive us, ${name}. I will ensure the monument is destroyed, but the people of ${planetname} may not understand.\" You sever your communion.\n\t\t\t\t\t\t\t*set obed -1\n\t\t\t\t\t*line_break\n\t\t\t\t\t*line_break\n\t\t\t\t\tThe woman returns to the city and immediately consults the rest of the clergy. Reminiscing her encounter with you, the other priests become skeptical of her claim and her accusation of ${godname}'s falsity. However, after much deliberation, they unanimously conclude that her argument is within reason; their faith lies with you and not this secondary entity. By order of the church, the idol is dismantled and rebuilt in your glory.\n\t\t\t\t\t\n\t\t\t\t\tFrom that point onward, the church ceases its belief in ${godname}, but many are displeased with the change and still acknowledge the being as legitimate. This tear in beliefs causes many feuds between your people and they begin to divide.\n\t\t\t\t\t*goto continue\n\t\t\t\t#Tell her ${godname} is actually evil.\n\t\t\t\t\t\"You must destroy this idol. If my followers continue down this unrighteous path they will descend into madness, for ${godname} is an evil being,\" you explain to the priestess.\n\t\t\t\t\t\t\t\n\t\t\t\t\tThe woman looks shocked, \"${godname} is a deceiver then? If ${godname} is not a guide to us then what is it?\"\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#\"Those that follow ${godname} become evil spirits.\"\n\t\t\t\t\t\t\tThe woman looks shocked, \"We had no idea, please forgive us, ${name}. I will ensure the monument is destroyed and inform the clergy of the truth.\" You sever your communion.\n\t\t\t\t\t\t\t*set obed +1\n\t\t\t\t\t\t\t*set race1strength +1\n\t\t\t\t\t\t#\"It is a figure of chaos that leads you astray.\"\n\t\t\t\t\t\t\tThe woman looks shocked, \"We had no idea, please forgive us, ${name}. I will ensure the monument is destroyed and inform the clergy of the truth.\" You sever your communion.\n\t\t\t\t\t\t\t*set race1strength +1\n\t\t\t\t\t\t#Give no answer.\n\t\t\t\t\t\t\tThe woman awaits a response that never comes. \"I suppose there is much to the universe we do not yet understand, please forgive us, ${name}. I will ensure the monument is destroyed, but the people of ${planetname} may not understand.\" You sever your communion.\n\t\t\t\t\t\t\t*set obed -1\n\t\t\t\t\t*set belief 2\n\t\t\t\t\t*line_break\n\t\t\t\t\t*line_break\t\n\t\t\t\t\tThe woman returns to the city and immediately consults the rest of the clergy. Reminiscing her encounter with you, the other priests become skeptical of her claim and her accusation of ${godname}'s true evil. However, after much deliberation, they unanimously conclude that her argument is within reason; their faith lies with you and not this secondary entity. By order of the church, the idol is dismantled and rebuilt in your glory.\n\t\t\t\t\t\n\t\t\t\t\tFrom that point onward, the church ceases its worship of ${godname} and it becomes a symbol of darkness. The ${race1}'${ad} faith in you grows stronger out of fear for ${godname}. However, the dread the ${race1} hold toward ${godname} steals it from you and the overall obedience of the race becomes skewed between those most faithful to you and those less devoted.\n\t\t\t\t\t*goto continue\n\t\t\t\t#Tell her ${godname} is actually part of you.\n\t\t\t\t\t\"I am ${godname},\" you explain to the priestess. \"It is the portion of my omnipotence that guides the righteous and faithful to a reincarnated, better life and the unfaithful to a less fortunate one.\"\n\t\t\t\t\t\n\t\t\t\t\tThe woman looks shocked, \"I understand. Thank you for bestowing this knowledge unto me, ${name}. I will share it with the others of the clergy and ensure that ${godname} is simply considered as a portion of your power.\" You sever your communion.\n\t\t\t\t\t*set belief 3\n\t\t\t\t\t*set race1strength +1\n\t\t\t\t\t\n\t\t\t\t\tThe woman returns to the city and immediately consults the rest of the clergy. Reminiscing her encounter with you, the other priests become ske
