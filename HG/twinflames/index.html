 I am particularly vulnerable since I don't have a soul but I do have what they call a soul seat, so I am \nperfect for any entity to just jump in and possess me. I think I was getting to that point, and I got a desire to attack your soul twin, but I am happy I was able to resist. However, it is more of function \nof darkness being chased away by you than anything else.\" \n\n\"Well, thank you for not doing that. Is there any other reason why you have such sadness in your eyes?\" ${red_name} inquires.\n\n\"Yes, dear one. I see the beauty of your souls and I really wish I could have the pleasure of feeling one of yours in my soul seat. I won't go as far as to suggest any of you killing yourself and taking my body, but let me propose something. Take one of \nmy feathers. There are dangers lying ahead. If any of you dies in combat, the feather will act like a link to my body. I will fly to you and be available. You can continue your mission. Could you really turn down this offer of mine? Is there \nanything for you to lose?\" Lima asks with watery eyes.\n\n\"I think I would feel uncomfortable in a female body,\" ${blue_name} admits.\n\n\"I am bigender. I can switch to any of the both sexes in a matter of seconds. I don't want to show you right now since it takes a lot of energy, but trust me when I say I was designed to be easy to welcome and comfort any soul that needs shelter. Well, some of my features will still be unisex. For example, \nI won't have the beautiful curves on the otherwise slender frame of ${red_name}, nor your broad shoulders and square jaw, but other than that, I will be a fully functional male or female. Plus, you get the feathers and wings and they come with the ability to fly, which I believe you don't have.\" She winks theatrically.\n\n\"Well, you certainly learned how to advertise yourself.\" ${red_name} laughs and it quickly infects ${blue_name} and Lima.\n\nThe Abbot looks in the eyes of the witch, indicating that he leaves the decision to her.\n*choice\n\t#Take the feather\n\t\t\"Thank you very much,\" Lima says as she gives it to ${red_name}. And tears flow freely down her cheeks, making it hard for her to speak. \"You have no idea how much this means to me. Even if you never use me, it is still the greatest gesture \n\t\tof kindness and a token of love I have received in my whole soulless life. Blessings, dear ones, and may you complete your mission with glory.\"\n\t\t\n\t\tShe doesn't wait for a reply, just turns away and vanishes in the tall glass.\n\t\t\n\t\t${blue_name} shrugs, not wanting to add anything to the emotional speech of the angelic looking creature. ${red_name} also doesn't want to break the silence, so they just move ahead.\n\t\t*set feather true\n\t\t*goto 117\n\t\t\n\t#Decline the offer\n\t\t\"I am sorry, Lima, we can't do that,\" says ${red_name} and looks away, unable to watch the expression of pain on the face of the soulless woman.\n\t\t\n\t\t\"I understand, you don't trust me. You fear I may be a soul trap and there certainly were models that were designed to do that. Sometimes I wish I was like them, I would have eaten many souls, but \n\t\teverybody just gets in to use me for their purposes and then leaves me in agony. I finally managed to find souls I would love to be connected with, full of love and passion, ones that would be kind to me because of the love of self... Anyway \n\t\tit would be best for me to just move on and forget about it. Blessings, dear ones, and may you complete your mission with glory.\"\n\t\t\n\t\tShe doesn't wait for a reply, just turns away and vanishes in the tall glass.\n\t\t\n\t\t${blue_name} shrugs, not wanting to add anything to the emotional speech of the angelic looking creature. ${red_name} also doesn't want to break the silence, so they just move ahead.\n\t\t*goto 117\n\n*label 117\n*page_break\n\"This is such a beautiful forest, ${blue_name},\" says the witch.\"I spent my whole life in the forest, and I don't want to appear to having cheated to it in my heart, but I think I like this place better.\nit has a certain virgin feel to it. Besides, look at the red leaves of that palm tree or the blue blossoms of that orchard over there.\"\n\nA colourful bird flies over their heads, singing with joy. And then a small plush-looking animal comes out of the bushed and sniffs in their direction. Seemingly satisfied with what he managed to catch with its nose, it rolls back into the bushes.\n${red_name} laughs.\n\n\"I have never been very close to nature, even though managing to appreciate its beauty. I also like this place and I wish we could stay forever here and there wasn't a mission to worry about. I also like this place very much, but the real joy for me is being able to see the \nexpression on your face as you look around and connect with the way it brings happiness to your heart,\" says the Abbot.\n\n\"Oh, you are so sweet,\" he gives him a smile and a hug.\n\nAnd the she sees the lupine approaching them...\n*page_break\nHe is just the way her people described them, a tall and muscular humanoid, slightly hunched forward, covered in thick fur, with massive paws and a face that is half human and half wolfish. He is walking in their direction.\n${red_name} feels the terror of her twin flame and it is painful to her. At that point, she knows he is helpless, stunned by the fear that wounded him so deeply the night when he lost his parents.\n\nWhat should the witch do? There is very little time to react, so the options are not that many.\n*choice\n\t#Hug ${blue_name} tightly, putting her body in front of him\n\t\t\"Please, don't hurt him,\" says the woman as she embraces her man. \"He has suffered enough from the fury of your kind.\"\n\t\t\n\t\t\"Your reactions is really touching and I respect it, sister of the forest. But I am not here to harm any of you. I know that a pack of ours went corrupt and did acts of unspeakable terror, and their \n\t\tburden weighs heavily on our shoulders. I just came here to teach you something, and it is really you who choose which lesson to accept.\"\n\t\t\n\t\t${red_name} lets her hands of ${blue_name} and looks at the lupine.\n\t\t\n\t\t\"Then I should say that it is a great pleasure to meet you, protector of the forest. I am ${red_name} and this is Brother ${blue_name} of the Church of Light.\"\n\t\t\n\t\t\"I am happy to stand in your aura too, dear twin flames. I know very well who you are, I am Silkmane. Now, I want to work with him alone, if you would let me. You have experienced the dream of being able to fly, haven't you, dear ${red_name}?\"\n\t\t\n\t\tThe woman nods.\n\t\t\n\t\tSilkmane raises his tail and a whirlwind takes her up in the air, making lifting the skirt of her dress and making her hair swirl. She cries with surprise, but quickly begins to enjoy it, laughing like a child.\n\t\t*goto 118\n\t\t\n\t#Attack the lupine\n\t\tShe stands in front of ${blue_name}, ready for a fight.\n\t\t\n\t\t\"Silkmane respects your decision to fight, sister, but if you are ready to assault, you must also be prepared to take some damage yourself! This is one of the fundamental laws of warfare and I must respect it,\" says the lupine.\n\t\t\n\t\t*if (dagger_spiritual)\n\t\t\t${red_name} takes out her dagger and throws it at the lupine. It misses only by a couple of inches, but it seems a sudden gust of wind was the reason.\n\t\t\t\n\t\t\t\"You came prepared, dear sister, I owe you that. Know that I am not here to harm any of you. I know that a pack of ours went corrupt and did acts of unspeakable terror, and their \n\t\t\tburden weighs heavily on our shoulders. I just came here to teach you something, and it is really you who choose which lesson to accept.\"\n\t\t\n\t\t\t${red_name} suddenly feels bad for trying to hurt the lupine. \"Please, forgive me for trying to do harm to you. I was just filled with terror.\"\n\t\t\n\t\t\t\"There is nothing to apologize for, dear one, I knew the risks when approaching you and really nothing bad happened to me as a result of your actions.\" \n\t\t\t\n\t\t\tThe witch nods. \"I am happy to hear that and I should say that it is a great pleasure to meet you, protector of the forest. I am ${red_name} and this is Brother ${blue_name} of the Church of Light.\"\n\t\t\n\t\t\t\"I am happy to stand in your aura too, dear twin flames. I know very well who you are, I am Silkmane. Now, I want to work with him alone, if you would let me. You have experienced the dream of being able to fly, haven't you, dear ${red_name}?\"\n\t\t\n\t\t\tThe woman nods.\n\t\t\n\t\t\tSilkmane raises his tail and a whirlwind takes her up in the air, making lifting the skirt of her dress and making her hair swirl. She cries with surprise, but quickly begins to enjoy it, laughing like a child.\n\t\t\t*goto 118\n\t\t\t\n\t\t*else\t\n\t\t\tHaving no weapon she could use effectively against this spiritual being, ${red_name} just attacks him with her bare hands in an outrage of desperation.\n\t\t\tThe lupine just parries with his massive paws. The with falls to the ground in pain.\n\t\t\t*set damage +1\n\t\t\t\n\t\t\t(Your spiritual damage increases by 1)\n\t\t\t\n\t\t\t\"I am sorry, dear friend, I hope it didn't cause you too much pain. Know that I am not here to harm any of you. I know that a pack of ours went corrupt and did acts of unspeakable terror, and the their \n\t\t\tburden weighs heavily on our shoulders. I just came here to teach you something, and it is really you who choose which lesson to accept.\"\n\t\t\n\t\t\t${red_name} stands up, feeling better as the pain subsides and suddenly feels bad for trying to hurt the lupine. \"It is alright, you were really defending yourself. Please, forgive me for trying to do harm to you. I was just filled with terror.\"\n\t\t\n\t\t\t\"There is nothing to apologize for, dear one, I knew the risks when approaching you and really nothing bad happened to me as a result of your actions.\" \n\t\t\t\n\t\t\tThe witch nods. \"I am happy to hear that and I should say that it is a great pleasure to meet you, protector of the forest. I am ${red_name} and this is Brother ${blue_name} of the church of Light.\"\n\t\t\n\t\t\t\"I am happy to stand in your aura too, dear twin flames. I know very well who you are, I am Silkmane. Now, I want to work with him alone, if you would let me. You have experienced the dream of being able to fly, haven't you, dear ${red_name}?\"\n\t\t\n\t\t\tThe woman nods.\n\t\t\n\t\t\tSilkmane raises his tail and a whirlwind takes her up in the air, making lifting the skirt of her dress and making her hair swirl. She cries with surprise, but quickly begins to enjoy it, laughing like a child.\n\t\t\t*goto 118\n\t\t\t\n*label 118\nThe lupine steps ahead and stops a few steps away from ${blue_name}.\n\n\"I know what you have been through, dear one. I can feel your pain and it is not a place anybody deserves to go for whatever reason. As one born as a lupine, I offer you my sincerest regrets. And ask you to take the first steps to forgiveness.\"\n\nThe Abbot feels a lump in his throat, forcing him to talk very slowly. \"Your regrets will not change anything, they will not bring my parents back.\"\n\nSilkmane shakes his head. \"No, unfortunately what is done is done, but you can get closer to ending the hatred inside you.\" He extends his paw, inviting him for a weird handshake.\n\nWhat should the priest do?\n*choice\n\t#Accept the offer\n\t\t${blue_name} takes his hand. The lupine pulls him closer and they share a hug. The priest actually feels good in the soft embrace of the lupine. It lasts only for a few seconds, then the lupine thanks him and dashes away.\n\t\t\n\t\tThe tornado gently subsides and ${red_name} steps on the ground again.\n\t\t\n\t\t\"How are you, my love?\" she asks concerned.\n\t\t\n\t\tHe starts crying in a sudden outburst of suppressed emotions. \"I feel... wonderful, my sweet twin flame. It is as if some poison has been removed from my body. I feel like a better person and it allows me to love you better.\"\n\t\t\n\t\t\"Oh, my love,\" she exclaims an embraces him.\n\t\t*set flame +1\n\t\t*set damage -1\n\t\t\n\t\t(Your twin flames score increases by 1 and soul damage decreases by 1)\n\t\t*goto 119\n\t\t\n\t#Deny it\n\t\t\"I am sorry, but I am not yet ready to shake the hand of a lupine,\" he says coldly.\n\t\t\n\t\tThe protector of the forest sighs and dashes away. The tornado gently subsides and ${red_name} steps on the ground again.\n\t\t\n\t\t\"How are you, my love?\" she asks concerned.\n\t\t\n\t\t\"I am fine, my dear,\" he replies.\n\t\t*goto 119\n\t\t\n\t#Attack him \n\t\t${blue_name} takes out his sword and charges at the lupine. He just dodges and dashes away, leaving the Abbot seething with anger. \n\t\t\n\t\tThe tornado gently subsides and ${red_name} steps on the ground again.\n\t\t\n\t\t\"How are you, my love?\" she asks concerned.\n\t\t\n\t\t\"I feel rage burning inside me, it is awful,\" he pants and drops the weapon on the ground.\n\t\t\n\t\t\"I want to help you,\" she offers. I would like to kiss it away.\n\t\t\n\t\t\"No!\" He raises his hand to stop her. \"I am afraid that it can enter you and damage you too.\"\n\t\t\n\t\t\"But we are one! Your pain is mine too.\"\n\t\t\n\t\t${blue_name} looks at her, not sure how to proceed.\n\t\t*choice\n\t\t\t#He should let allow her to kiss him\n\t\t\t\tTheir lips embrace each other and ${red_name} flinches as her chest starts burning, but doesn't stop her from continuing the kiss.\n\t\t\t\t\n\t\t\t\t\"Do you feel better?\" she asks him after their lips finally depart.\n\t\t\t\t\n\t\t\t\t\"Yes, thank you for taking some of your pain.\"\n\t\t\t\t\n\t\t\t\t\"Thank you for allowing me to do that. I believe it drew us even closer.\"\n\t\t\t\t\n\t\t\t\tThe Abbot nods.\n\t\t\t\t*set flame +1\n\t\t\t\t*set damage +1\n\t\t\t\t\n\t\t\t\t(Your twin flames score and soul damage increase by 1)\n\t\t\t\t*goto 119\n\t\t\t\n\t\t\t#He should not \n\t\t\t\t\"I am sorry, my love, safety first,\" he explains.\n\t\t\t\t\n\t\t\t\t\"I understand my love, however, being able to do nothing while your suffer makes me feel bad.\"\n\t\t\t\t\n\t\t\t\t\"It is really alright, I feel better,\" he smiles.\n\t\t\t\t*set damage +1\n\t\t\t\t\n\t\t\t\t(Your soul damage increases by 1)\n\t\t\t\t*goto 119\n\t\t\t\t\n*label 119\n*page_break\n${red_name} suddenly bursts into laughter.\n\n\"What is it, my sweetness,\" the Abbot enquires.\n\n\"I spent so much time with my skirt waving above my waist and you didn't even take a look.\"\n\n\"It is a pity. Next time I am not going to miss the opportunity to feast on your thighs to die for. By the way, how did it feel up there?\"\n\n\"You are so funny. It was weird but still a positive experience.\"\n\n\"I am glad to hear that,\" ${blue_name} says and then continue on their way\n*page_break\nThe twin flames reach the end of the forest and the terrain becomes more rocky. There is even a cave several dozens of steps away from them.\n\nThe air starts moving, bending the light in a funny way, as if there is a mirage.\n\n\"Look out, ${red_name}, something evil is next to you,\" ${blue_name} shouts but it is too late. The beast drops his stealth, revealing its true self. He is a muscular lizardman.\nThe reptilian roars in the direction of the witch and turns her into stone.\n\n\"No, my sweet ${red_name}, what did you do to her, damn you!\" ${blue_name} cries.\n\n\"Yes, feed me with your anguish and let me feel your anger too. You had no business here, I claimed this realm as mine.\"\n\nThe Abbot feels he has nothing to lose any more, the monster having taken his all. He takes out his sword and charges... only to bump into an invisible wall. He drops to the ground and his blade slides in the feet of the reptilian.\n\n\"Hopeless, right?\" The monster chuckles. \"I like that.\"\n\n${blue_name} is really feeling that way.\n\nWhat should he do?\n*choice\n\t#Surrender\n\t\t\"Reptile, you can't deny me the pain of what you did to my twin flame, but I am not going to allow you to treat me like a puppet. You want me to do that, and I am not going to give you that pleasure!\"\n\t\tsays ${blue_name}, tears almost drowning his words.\n\t\t*goto 220\n\t\t\n\t#Try to get the weapon \n\t\t${blue_name} plunges ahead, his fingers get only a few inches away from the hilt when the foot of the reptilian connects with his chest and sends him flying in the air. The Abbot almost loses consciousness.\n\t\t*set damage +3\n\t\t\n\t\t(Your soul damage increases by 3)\n\t\t*goto 220\n\t\n\t#Attack him with bare hands\n\t\t${blue_name} realizes that he has no chance of getting to the sword without exposing himself to danger, so he decides to use the weapons he was born with. He walks around the invisible wall, that now appears to look like \n\t\ta mirage too and approaches the lizardman. The reptilian attacks, quick as a lightning.\n\t\t\n\t\t*if (unarmed_fighting)\n\t\t\t${blue_name} has been taught to face opponents much stronger than him and his instincts tell him what to do. He just ducks and grabs the hand of the reptilian, then with a single spin he throws him over his shoulder.\n\t\t\tThe massive body drops on the floor with a massive thud and ${blue_name} kicks his muzzle, removing several teeth.\n\t\t\t\n\t\t\tBut it really takes him a couple of seconds for him to be on his feet again.\n\t\t\t*goto 220\n\t\t\t\t\t\t\n\t\t*else\n\t\t\tThe foot of the reptilian connects with ${blue_name}'s chest and sends him flying in the air. The Abbot almost loses consciousness.\n\t\t\t*set damage +2\n\t\t\n\t\t\t(Your soul damage increases by 3)\n\t\t\t*goto 220\n\n*label 220\n*page_break\nJust when ${blue_name} believes all hope is lost, a second dragon comes into view. Unlike the first one, who is apparently a wizard, this one is a warrior and carries a big axe. The latter roars and charges the spell caster.\nThe battle that follows is truly epic, this is the comment Abbot ${blue_name} would like to make once it is over.\n\nThe wizard constantly tries to keep a distance, often teleporting a small distance away and firing frost bolts and even summoning demonic minions to fight for him, but the warrior proves to be much too fast and strong. It takes him what feels like more than half and hour\nto reach the magician but when he does so, he plants his axe into the chest and the battle is over.\n\nThe fighter bends over, supporting his massive body with the axe still deep in the body of the enemy.\n\n${blue_name} is faced with the necessity to make a decision. Fear tells him that maybe he should attack the dragon while he is tired. The caster was very malicious. What if the axe wielder is too? What if he attacks him once he catches his breath?\nAnd if the Abbot ever stands a chance against this creature, it is most likely this time when he is exhausted from having to dance for so long between frost bolts.\n\nThe intuition of the priest, however, tells him the soul imprint of the warrior is very different from the one of the caster. The fighter is vicious, there is no doubt about that, but he still feels like a creature of the Light.\n\nWhat should ${blue_name} do?\n*choice\n\t#Attack the dragon warrior\n\t\tThe attempt to do that ends with the ${blue_name} receiving a punch in his face.\n\t\t\n\t\t\"I am sorry, brother-in-arms, I really tend to lose myself in the battle or, like in this case, right after that. Once I almost killed my best friend just because he tapped me on the shoulder after we had the enemies slain.\n\t\tI hope you are alright, I know you are strong enough to take it, which by no means suggests that you should.\"\n\t\t*set damage +1\n\t\t\n\t\t(Soul damage increases by 1)\n\t\t*goto 221\n\t\n\t#Just wait\n\t\t\"It is nice to see you again, brother-in-arms. I am happy I came in the right moment,\" says the dragon.\t\n\t\t*goto 221 \n\t\t\n*label 221\n*page_break\n\"You speak as if you know me, but I have no memory of meeting you. Well, forget it, nothing makes sense right now, nothing is important,\" says ${blue_name} and weeps, afraid to even look at \nhis twin flame.\n\n\"Oh, you are worried about your twin flame, I see. But, you really don't need to. The draco wizard is dead and as soon as his soul leaves the body, which can take up to half an hour, the spell will be over and she will return to her flesh texture virtually intact.\"\n\n\"Are...are you sure... She will be alive again?\" the Abbot splatters.\n\n\"I am more than sure, dear one, I have seen it happen like that dozens of times. It is more of a mind trick designed to cause horror in the loved ones. Now, I guess I have some information that may be interesting to you, but it is hard to comprehend what exactly you would like to know, so you can ask me questions.\nI believe it would be the best way to spend the time talking because this will keep your mind occupied for the time it takes for the spell to fade away. And, by the way, she is gorgeous. Oh, I forgot to introduce myself, I am Barnathius.\"\n*goto 222\n\n*label 222\n*page_break\nWhat would Abbot ${blue_name} ask?\n*choice\n\t*disable_reuse #\"Why don't I remember?\"\n\t\t\"This is the way things work in the world you decided to incarnate on. It is a way to learn lessons better, having the illusion of starting from scratch and see what happens. For example, if you were a butcher in a previous life,\n\t\tyou can check if under different circumstances you would become a vegetarian or an animal rights activist,\" the dragon says.\n\t\t\n\t\t\"But this means I can uncover some memories of my past lives that I may not like,\" replies the Abbot.\n\t\t\n\t\t\"This is true. The process of aligning yourself might bring back traumas you came here to forget, but if I have to be completely honest with you, whether you know it or not, is still there to give you a hard time. And, learning about the glory of the past days may make you love yourself more. Also, I bet the memories of \n\t\tyou meeting your twin flame and all the roles you played before may bring you a certain type of sweetness.\"\n\t\t\n\t\t\"Oh, I haven't thought about it.\"\n\t\t\n\t\t\"Then, please do and enjoy yourself.\" The dragon winks.\n\t\t*goto 222\n\t\t\n\t*disable_reuse #\"Do you like human women?\"\n\t\t\"The short answer is yes, but I also owe you a slightly longer explanation. See, our species is generally not against love between members of different species. Besides, many of us are able to shape shift, so that we can assume the form that the \n\t\tother one considers to be most attractive. Also, I should say that the majority of the members of my species are guided by the principles of love and light, so our loved ones are really treated with respect, something we don't \n\t\tnecessarily often see in the relationships between the partners belonging to your species.\"\n\t\t\n\t\t\"Do you want to infer that some of our women really wanted to make love to a dragon in its natural form?\" the Abbot inquires.\n\t\t\n\t\t\"Argh, you are taking the conversation in a direction I don't necessarily want to go, but so be it. Yes, some women display patterns that don't fall into the category of finding people with characteristics close to their own as attractive. Other times, dragons quite frankly \n\t\tabused the ability to project their will over others. They were declared criminals and there were consequences for blemishing the reputation of our kind. And, I can assure you that we take those issues very seriously.\"\n\t\t*goto 222\n\t\t\n\t*disable_reuse #\"Do you two belong to the same species?\"\n\t\tBarnathius spits to the ground. \"No. I am a dragon and that over there is a pile of rubbish.\"\n\t\t\n\t\t\"I believe in what you say, but I guess I need a more thorough explanation in order to understand it,\" says the priest.\n\t\t\n\t\t\"I get that. See, I am a real dragon. Dracos like that evil wizard were not initially like this, legends say that they resembled humans. However, they possess very advanced genetic \n\t\tengineering capabilities and so they stole our DNA.\"\n\t\t\n\t\t\"What is DNA?\" asks the Abbot.\n\t\t\n\t\t\"Er, let's say they took the way we look and how our bodies function. They are abominations, and most of them are pure evil. What they did was a crime against the dragonkind and I know they are hated by other species because of \n\t\tthe blatant acts of cruelties they have committed.\"\n\t\t*goto 222\n\t\t\n\t*disable_reuse #\"Why are you here?\"\n\t\t\"I got wounded in combat and even the advanced medical capabilities of our kind couldn't bring me back to 100 % of the functionality I used to enjoy. This made me retire since I didn't want to be a burden to my brothers in battle. So, I specialized in \n\t\ttracking where the dracos go and following them. I came here alone since it was evident there was only one of them here and I can easily take as many as three by myself without any problem at all.\"\n\t\t*goto 222\n\t\t\n\t*disable_reuse #\"What can you tell me about myself that I can't remember?\"\n\t\t\"It is a long story, but I will try to cover the basics. First of all, when I say I know you, I really mean your soul. My memories of you two date to a time when you were not using these bodies. They were \n\t\tanother incarnations of yours, but I am a dragon and I can sense souls, so to me you are the same guys I knew back then.\n\t\t\n\t\t\"It was a very bloody war with the dracos and our forces were joined by a legion of human operatives from the DAL universe. I could say that despite the inherent pride of my species, these guys were formidable \n\t\tmachines. And you and your twin flames were there. We were together in a couple of missions, but then something happened with you while you were near a hatchery of the dracos. I was not near you, but I heard you required aid in order to be transported back to the \n\t\tmother ship despite taking no physical damage. Later that day your soul guide passed by me, but the look on her face was so concerned that I didn't really want to bother her with my questions.\"\n\t\t\n\t\t\"What do you mean by a soul guide?\"\n\t\t\n\t\t\"Souls are generally interested in having experiences that enable them to expand. They set a path for themselves and incarnate in order to have the experiences they need. Soul guides assist them by informing them about the different paths \n\t\tthat can be take and sometimes appear in key moments to provide support to the incarnated souls under their wing. Some guides are animal spirits, others are creator gods or older souls. In your case, it was an incarnated human who often resided on the mothership. I \n\t\treally respect her, there was something about her presence that required me to do that without being intimidating at all. Just the opposite, it was an aura of unconditional and universal love.\"\n\t\t\n\t\t\"Did we die in combat?\" ${blue_name} asks.\n\t\t\n\t\t\"I heard your twin flame actually retired a few days before the incident at the hatchery, and a few days after it, you were declared killed in action. I didn't delve into your personal story because it is not how I think a warrior should act, putting their noses in other people's affairs, but if I knew I was going to meet you, probably I would \n\t\thave done so. Anyway, I am going to propose you something that may help those memories awaken if that is what you are aiming at. But, I will do that a bit later.\"\n\t\t*goto 222\n\t\t\n\t#\"That is all for now.\"\n\t\t*goto 2222\n\n*label 2222\nDusts starts falling from the statue and ${red_name} comes to life.\n\n\"My love, are you alright?\" ${blue_name} asks and rushes into her direction.\n\n\"Br, yes, I am just so cold.\" She shivers.\n\n\"Don't worry, I will warm you up,\" he hugs her,starts rubbing her back and planting kisses all over her face.\n\n\"That feels better, thank you,\" she says and sees the dragon warrior.\n\n\"Oh, don't worry about him, he is a friend,\" the Abbot explains.\n\n\"I was able to hear your conversation, my love,\" the witch explains and turns in the direction of the dragon. \"Thank you, I am forever indebted to you.\"\n\n\"Well, it is a pleasure to help you, dear twin flames. However, it is not right for a beautiful woman like you to say that to a dragon, unless you know him well. Which, technically you do, but don't remember quite well. Anyway, what I really want to say is that you should be more careful, dear one.\"\n\n\"I appreciate your concerns and I promise you I will be,\" ${red_name} responds.\n\n\"You'd better be. Now, I guess there is no point in just staying here and exchanging pleasantries. Poets may want to do that, but I happen to be a warrior. My proposal is to get to the ancient ritual of looting.\"\n\n\"Are you sure we should to that?\" ${red_name} asks.\n\n\"Quite frankly, yes,\" answers the dragon and approaches the remains of the draco sorcerer.\n*choice\n\t#The talisman of unrequited love\n\t\t\"Nice,\" says Barnathius picking up the trinket. \"This ornamented piece of rubbish is supposed to bring bad luck to couples in love. So, a draco would just drop it in the neck of either partner and they drink their anguish as they start quarrelling.\n\t\tThe world would be a better place without it.\" He drops it on the ground and stomps on it, breaking it.\n\t\t\n\t\t\"I can feel that something in me just changed,\" says ${blue_name}.\n\t\t\n\t\t\"I feel the same, as if my love for you grew stronger,\" responds ${red_name}.\n\t\t\n\t\t\"That was to be expected,\" comments the dragon. \"Sometimes such artifacts can affect negatively a whole realm. And it was just destroyed, so you can no longer feel affected by it.\"\n\t\t*set flame +1\n\t\t\n\t\t(Your twin flames score increases by 1)\n\t\t*goto 222a\n\t\t\n\t#A healing potion \n\t\t\"Nice,\" says Barnathius picking up the vial and opening it. \"I don't think draco sorcerers usually have healing potions on them, but this one smells very nice.\"\n\t\t\n\t\t\"Do you think it would be safe to drink it?\" asks ${blue_name}.\n\t\t\n\t\t\"Absolutely. I can bet my life on it. Here you are.\"\n\t\t\n\t\tThe Abbot takes it and drinks it at one go. It tastes like a mixture of wild berries.\n\t\t*set damage -1\n\t\t\n\t\t(Your soul damage decreases by 1)\n\t\t*goto 222a\n\t\t\n\t#Amulet of mind protection\n\t\t\"Nice,\" says Barnathius picking up the trinket. \"Now this is a real treasure. If you wear it, malign entities trying to impose their will on you will have a really hard time doing so. Please, take it.\"\n\t\t\n\t\t\"Does it matter who wears it?\" asks the Abbot.\n\t\t\n\t\t\"Not really, having in mind that you are twin souls.\"\n\t\t\n\t\t\"Then I suggest you take it, my love,\" ${blue_name} proposes. \"It will look lovely around your neck.\"\n\t\t\n\t\t\"Thanks.\" The witch smiles and takes the amulet.\n\t\t*set mind true\n\t\t*goto 222a\n\n*label 222a \t\t\nSo, I can lead you into the cave where you there is a crystal that can help you remember more of that past life, if you wish.\nit is somewhat risky because of the possibility of recalling sad events. If you decide to skip that phase, I would suggest heading to the East, where is the place you need to reach in order to set the lupines free.\" The dragon raises his axe, pointing on the direction.\n\n\"What about this settlement over there?\" ${red_name} points in the other direction.\n\n\"Oh, there are some corrupted humans over there. I don't recommend visiting that place, the energy is almost unbearable. You can still try if you think the energy you share is  strong enough but there is hardly any point in\nrisking your mission.\"\n\nWhat would the twin flames decide?\n*choice\n\t#Go into the cave in order to learn \n\t\t*goto cave\n\n\t#Go West to the settlement\n\t\t*goto settlement\n\t\t\n\t#Go East and proceed with your mission\n\t\t*goto east\n\n*label cave\nThe dragon warrior enters first, followed by the twin flames. Soon, they reach a big purple crystal.\n\n\"I am going to touch it and align it with my energy so that it will induce memories related to the timeline in which we fought together,\" explains the dragon and does so. \"Now is your turn, ${blue_name}, just close your eyes and, please, you can tell us what you see and feel. I already told you what I know about the events back then, the crystal will\nhave to fill in the gaps.\"\n\n${blue_name} steps up and puts his hands on the crystal. \"I can see my body feels different. It is very strong and fast. I am wearing a costume like Netho's but there is some armour on it. My twin flame and me have just returned from a mission. We are tired \nand as we take our armour off, she says she can't take it any more. She claims that the was with the dracos is taking its toll on us and that I am becoming too rude and aggressive and she can barely recognize me any more. However, it is not a blame, she is just worried that \nI am sacrificing what I truly am in order to help win the war. She says she can't bear to watch it any more and wants to return to our homeworld.\n\n\"I say I can't so it because somebody has to fight the war and I can't run away from the responsibilities. Then she leaves... it is an awful experience.  \n\n\"A few days later, my team enters the draco facility. A comrade of mine is wounded and then three dracos jump on him, shredding him to peaces. Anger fills my very being as I charge at them as slice them with my sword. At this point, I hate them more than anything for all the atrocities they committed, for making me choose between my twin flame and my duty. Having lost control, I enter the hatchery, with the \nthought to destroy all the eggs and small dracos I can. A mother comes to protect its offspring and I slay her cold bloodedly. Then, my heart just can't take it any more, I drop the sword, fall on my knees and start crying. Luckily, my comrades find me before the dracos and take me to the extraction point.\n\n\"Then, I go to the woman who is my soul guide and I tell her... the exact words are:[i] Look at this atrocity his hands have made! I did not\nhave the strength to waver his fist or to bring down his sword by his side. Unsheathed, the\nform took action through unbridled emotional energy just as a transformer loosens the\nflow of electrons in the heat of overcharge. Truly this human is a formidable machine….\nHelp me understand its ways, and forget the suffering these eyes have witnessed. I know\nthe heart felt the pain[/i] \n\n\"She offers me several therapies to help me recover, but I know I am broken beyond repair, so I volunteer for a suicide mission. My soul guide asks my twin flame to come and we are able to speak before the operation. She tells me I should give up, that we can still be together, but also accepts my refusal. She knew it was going to be like that.\n\n\"I set off and the soul guide invites my twin to take place in a big armchair and they wait... for me to die. When my body has taken some damage, my twin flame pulls my soul out to save me from the suffering. I am able to tell her we will be together in a new world and I love her so much. Then, I drift to the other side, and the soul guide sheds a few tears.\"\n\nThe power of the crystal is depleted and the vision finishes.\n\n\"Oh, my love,\" says ${red_name} and hugs ${blue_name}. He feels wetness on her cheeks.\n\n\"It is alright, my dear, everything is fine,\" the Abbot assures her.\n\nThe dragon warrior waits for the outburst of feelings to subside, then suggests that maybe they should move as time is ticking.\n*set flame +2\n*set damage +1\n\n(Your twin flames score increases by 2 and soul damage increases by 1)\nWhere should the twin flames go after saying goodbye  to the dragon warrior?\n*choice\n\t#Go West to the settlement\n\t\t*goto settlement\n\t\t\n\t#Go East and proceed with your mission\n\t\t*goto east\n\t\t\n*label settlement\n\"I have a bad feeling about this,\" says ${blue_name} as they walk toward the settlement.\n\n\"Yeah, me too. But I also believe that something good may come out of it,\" replies ${red_name}.\n\n\"I get that too,\" he agrees.\n\n*if snow\n\t\tThe fluffy white goblin jumps out of the rocks nearby and nearly makes the twin flames scream with terror.\n\n\t\t\"I am sorry, dear ones, I am not very good at making less dramatic appearances. It is just in my blood,\" it says.\n\t\t\n\t\t\"What are you doing here?\" ${red_name} says and crouches, opening her arms to invite it for an embrace.\n\t\t\n\t\t\"It is just the usual stuff,\" the goblin presses its fur to the witch and she embraces it. \"I felt the light coming to this world and I came here to absorb some of it, which I will later just carry to a place of \n\t\tdarkness.\"\n\t\t\n\t\t\"I guess you overdid that part before we found you in the dungeon below the monastery,\" ${blue_name} comments.\n\t\t\n\t\t\"It is true, I overestimated myself and I am very thankful that you found me.\"\n\t\t\n\t\t\"We are also glad we reached you and were able to help you. You are such a sweet snowflake!\" ${red_name} beams.\n\t\t\n\t\t\"Thank you, dear one. I don't like snow, but I feel that it is a compliment.\"\n\t\t\n\t\t*if healing_amulet\n\t\t\t\"${blue_name}, I notice you have something dangerous on your neck,\" says the goblin.\n\t\t\t\n\t\t\t\"It is the healing amulet my... wife gave me,\" says the priest.\n\t\t\t\n\t\t\t\"She is using a very dark way of healing. I am sure her patients don't mind it, but having such an instrument on you can be used against you by malignant entities. Let me fix that.\"\n\t\t\t\n\t\t\t\"Oh, sure, I trust you,\" says the Abbot.\n\t\t\t\n\t\t\t\"As a side effect, you will also feel better,\" explains the goblin. Its eyes flash and the amulet sparkles and disappears.\n\t\t\t*set healing_amulet false\n\t\t\t*set damage -1\n\t\t\t\n\t\t\t(Your soul damage decreases by 1 and you also no longer have the trinket)\n\t\t\t*if ear_talisman\n\t\t\t\t*goto ear_settlement\n\t\t\t\t\n\t\t\t*else\n\t\t\t\t*goto end_goblin\n\t\t\t\t\n\t\t*elseif ear_talisman\n\t\t\t*goto ear_settlement\n\n\t\t*else\n\t\t\t*goto end_goblin\n*else\n\t*goto settlement2\n\t\n*label ear_settlement\n*page_break\n\"${red_name}, I sense a source of darkness near me, what is it?\" asks the goblin.\n\n\"Oh, it must be the medallion my husband gave me. It is supposed to summon the spirit if a she-wolf. Why would it be bad?\"\n\n\"Because it is a portal to the other side and an entity may actually use it to summon something nasty,\" explains the goblin. \"I kindly ask you to allow me \nto destroy it and I can also use the remaining energy to do some healing for you.\"\n\n\"I trust you, snowflake, do what you must.\"\n\nThe trinket sparkles and disappears and ${red_name} feels positive energy spreading around her neck.\n*set ear_talisman false\n*set damage -1\n\n(Your soul damage decreases by 1 and you also no longer have the trinket)\n*goto end_goblin\n\n*label end_goblin\nThe twin flames say goodbye to the goblin, wish it luck in its endeavors and continue their way to the settlement\n\n*goto settlement2\n\n*label settlement2\n*page_break\nIt looks like an ordinary small village with tiny cottages and a temple in the middle. Some of the houses need repair, but what is really weird is that there is nobody to be seen.\n\n\"I think I can hear something coming from the temple,\" says ${red_name} and they go in that direction.\n\nThey look through the window and see a very emotional preacher delivering a speech with passion as if his life depended on it. The church is full to the brim and everyone seems to listen carefully.\n\n\"And then, the god of mercy and glory created us, created you, sinners. Oh, we are not worthy of his attention, we are just ants or vermin in his house. But we are blessed with the\ngreatest gift, the way to get closer to him. He even sent his one and only son among men and he died in great pains so that we can be saved. The path to god, is a path of pain and suffering. Are \nyou ready for it?\"\n\n\"What is this utter nonsense?\" ${red_name} asks. \"How can god or Mother Nature create people and deem them unworthy? How can he have only one son? And what kind of a demon should he be to want people to suffer?\"\n${red_name} whispers.\n\n\"I don't know, my love, there seems to be little light in what he is preaching.\"\n\nThe pastor takes out a whip and starts flogging its congregation like a mad man. A few men started punching each other, all in the name of their creator!\n\nAnd then ${red_name} sees a little boy in the back, crying.\n\n\"I have to pull him out, immediately,\" ${red_name} says.\n\n\"But they can rend you to pieces. I can't let you do it,\" says the Abbot.\n\n\"I will be okay, you may have to pull me once I am in. Remember what the dragon warrior said, we should be safe if the energy we share is strong enough. I believe in us.\"\n\n\"I believe in us too, the decision is yours, just ask yourself if it is worth risking it all. And I really don't want anything bad to happen to you.\"\n\nWhat should the witch do? \n*choice\n\t#Try to save the boy\n\t\t\"I can't let him stay there,\" says ${red_name} and her eyes fill with tears.\n\t\t\n\t\tShe rushes into the building and touches the boy's hand. She is immediately surrounded by darkness, totally disoriented.\n\t\t*if (flame)>6\n\t\t\tThe though about her twin flame, however, makes a guiding light appear and she just follows it, pulling the child with her kicks and punches rain around her, but it seems that there is an invisible barrier around her. She takes a few steps and finds herself back outside.\n\n\t\t\tLuckily, nobody comes out.\n\t\t\n\t\t\t\"I think I sealed the door,\" says ${blue_name}. \"I asked the Light for help and received it.\"\n\t\t\n\t\t\tThe witch just nods, knowing that it is not the time to say thanks. Instead, she looks at the boy. \"We came here to take you away from these people. What is your name?\"\n\t\t\n\t\t\t\"I am Gregory and I prayed that somebody saves me from this hell,\" he says.\n\t\t\n\t\t\t\"Oh, poor boy, you are safe now,\" she says as they walk out of the settlement.\n\t\t\n\t\t\t\"What are we going to do with him?\" asks the Abbot.\n\t\t\n\t\t\t\"I hope the Barnathius will be still where we left him and he can think of something. Are you afraid of dragons, Greg?\"\n\t\t\n\t\t\t\"No, I love them,\" the boy laughs. \"I draw pictures of them all the time, although my step mom punishes me for that.\"\n\t\t\n\t\t\t\"Oh, I am sorry about that,\" replies ${red_name}. \"Now we will show you to a real dragon warrior. He is not the big type with four legs and stuff, but he is a real one.\"\n\t\t\n\t\t\tThe boy gives out a cry of triumph.\n\t\t\t*page_break\n\t\t\t\"Barnathius, can you please take care of him?\" asks the witch.\n\t\t\n\t\t\t\"Do I have a choice?\" responds the dragon, looking lovingly at the boy hugging his leg and not letting him go. \"I am sure I can take him to a place where he will be taken good care of.\"\n\t\t\n\t\t\t\"Thank you very much, Barnathius,\" says the Abbot and the twin flames continue to the east.\n\t\t\n\t\t\t\"I feel a better person after that rescue,\" sighs ${red_name}.\n\t\t\n\t\t\t\"You are so brave, my love.\"\n\t\t\n\t\t\t\"Well, you helped me so much, we were into this together.\"\n\t\t\t*set damage -3\n\t\t\n\t\t\t(Soul damage decreases by 3)\n\t\t\t*achieve save\n\t\t\t*goto east \n\t\t\n\t\t*else\n\t\t\tWhen the witch enters the church, she finds herself in an abyss of darkness. She feels the negative entities around her and she attracts their attention. She realizes \n\t\t\the would die is seconds. ${blue_name} tries to do something, but he feels so far away. Just before the blows come, he enters the church, only to die with her.\n\t\t\t*goto_scene death\n\t\n\t#Give up\n\t\t\"You are right, my love,\" says the witch, crying. \"Let's continue with our mission.\" And as they leave the settlement, she adds: \"But my heart feels so much pain.\"\n\t\t\n\t\t${blue_name} takes her hand. \"I can feel it, my sweetness.\"\n\t\t*set damage +2\n\t\t\n\t\t(Soul damage increases by 2)\n\t\t*goto east\n\t\t\n*label east\n*page_break\nThe terrain gets very rocky, with very little vegetation along the way.\n\n\"It is not as beautiful as where we... arrived at first,\" comments ${red_name}.\n\n\"Yeah, I can almost feel something evil in the air,\" says ${blue_name}.\n\n\"You are right, Brother,\" a voice from above says.\n\n${blue_name} looks up. Standing on a high bolder, he sees a familiar face, her long dark hair dancing in the wind.\n\n\"Sister Cabala, what are you doing here?\" the Abbot asks as she jumps down in front of the twin souls.\n\n\"I came to destroy you. Slowly.\" She raises her hands and looks around. \"What a beautiful scenery for me to kill you, don't you think?\"\n\n\"I never knew you wanted that,\" says ${blue_name}.\n\n\"Oh, I did,\" assures him Cabala. \"I just couldn't do in on holy ground.\"\n\n\"But why?\" the Abbot enquires.\n\n\"Defeat me, and I will tell you. Die and remain in oblivion forever,\" she chuckles.\n\n\"You will have to kill me first,\" ${red_name} roars.\n\n\"What a good idea, you are such a smart witch.\"\n\nCabala extend her hand and suddenly ${red_name} starts feeling very dizzy.\n\n*if mind\n\tIt takes a couple of seconds before the anti mind control trinket starts working, but when it does, ${red_name} starts feeling better immediately.\n\t\n\t\"Damn it, I hate it when my victims are protected,\" Cabala swears.\n\t*goto east2\n\n*else\n\t${red_name} feels her mind being pushed away and replaced by the will of another. It is a horrible experience that makes her want to scream.\n\t*set damage +2\n\t\n\t(Soul damage increases by 2)\n\t\n\tBut then ${blue_name} touches her and the energy of her twin flame help her chase the intruder away.\n\t\n\t\"You resisted,\" Cabala hisses. \"Very well, I still cause you anguish.\"\n\t*goto east2\n\t\n*label east2\n*page_break\n${blue_name} takes out his sword.\n\n\"I hope you are a better warrior than priest. You know that nobody in the church likes you?\" Cabala says.\n*if (respect)>1\n\t\"No, I don't know that, I won't believe in your lies,\" the Abbot replies.\n\t\n\tThe priestess remains silent.\n\t*goto east3\n\t\n*else\n\tThe priestess hurts a sore point in ${blue_name}'s ego, making him feel worthless for a second.\n\t*set damage +1\n\t\n\t(Soul damage increases by 1)\n\t*goto east3\n\t\n*label east3\n*page_break\nA bolt of dark energy appears on the fingers of Cabala's left hand.\n\n*if shooting\n\t${blue_name} wishes he had a crossbow and immediately one materializes in his hands. It has only one bolt in it, and he is quick to fire it.\n\t\n\tThe bolt hits Cabala's hand, making her scream with pain and she loses the charge of dark energy.\n\t*goto east4\n\n*else\n\tShe launches it at ${blue_name} and it flies to him too quickly for him to respond. It hits him in the torso, making him wail.\n\t*set damage +1\n\t\n\t(Soul damage increases by 1)\n\t*goto east4\n\n*label east4\n*page_break\n*if healing_amulet\n\t\"Oh, you have Sister Jays healing amulet. I forgot, she told me that her passion for you is... burning,\" says Cabala.\n\t\n\t${blue_name} feels the amulet getting scorching hot and quickly removes it, still burning his fingers.\n\t*set damage +1\n\t\n\t(Soul damage increases by 1)\n\t*goto east5\n\n*else\n\t*goto east5\n\t\n*label east5\n*page_break\n*if ear_talisman\n\t\"Dear witch, I see a beautiful medallion around your neck. Who gave it to you? A close one? Don't you feel a bit of guilt,\" Cabala says in a mocking voice.\n\t\n\t${red_name} opens her mouth, about to deny it, but she knows the priestess managed to hit her at a sore point.\n\t*set damage +1\n\t\n\t(Soul damage increases by 1)\n\t*goto east6\n\n*else\n\t*goto east6\n\t\n*label east6\n*page_break\nCabala closes her eyes, concentrating all of her dark might, trying to destroy the twin souls.\n*page_break\n*if (damage)>1\n\t*if feather\n\t\t${red_name} gives out a cry and falls motionless on the ground.\n\t\t\n\t\t\"My love!\" ${blue_name} falls on his knees next to her.\n\t\t\n\t\tCabala's laughter pierces his ears, but he cares only for his dearest twin flame who gives no signs of life. He sees the feather and grabs it. In a second,\n\t\tLima appears next to him and begins to change, her features starting to resemble ${red_name}'s.\n\t\t\n\t\t\"What has happened?\" she asks. \"I feel somehow different. And what is my body doing over there?\" she almost loses balance.\n\t\t\n\t\t\"It is alright, my sweetness. You just died and now your soul is in Lima's body,\" the Abbot explains.\n\t\t\n\t\t\"Am I pretty? Can you love me this way?\" ${red_name} starts touching her face in an effort to find out more about it.\n\t\t\n\t\t\"Yes, you are. I just need a couple of hours to get used to it,\" ${blue_name} admits.\n\n\t\t\"I think I may need more time to do that,\" says the witch.\n\t\t*achieve lima\n\t\t*set flame -2\n\t\t\n\t\t(Your twin flames score decreases by 2. Temporarily)\n\t\t*goto cabala_defeated\n\t\n\t*else\n\t\t${blue_name} and ${red_name} feel their minds exploding into the nothingness.\n\t\t*goto_scene death\n\t\n*else\n\t*goto cabala_defeated\n\t\n*label cabala_defeated\n${blue_name} approaches the dark priestess with a sword in hand. ${red_name} is right next to him.\n\nCabala gives them a wicked smile. \"I used all my energy to disrupt your twin soul, to shatter it into fragments, but I failed. Now it is the time for the last resort.\" A shadow bolt forms in her hand.\n\n\"Cabala, you don't have to do that!\" says ${blue_name}.\n\n\"No, I will not let you slay me with your sword again,\" hisses Cabala.\n\n\"But I don't want to...\" ${blue_name}'s sentence is interrupted by the buzzing sound of Cabala's last shadow bolt leaving her clawy fingers and cutting into her chest and engulfing her in black smoke that covers her completely. \n\"... kill you. And why did you say again?\"\n*page_break\nWhen the smoke subsides, ${blue_name} finds the answer to that question. Cabala's appearance has changed, and he recognized the mother draco he slew in a previous reincarnation. \nShe is heavily wounded, but still breathing.\n\n${blue_name} drops his sword and steps ahead.\n\n\"No, don't, my love, she can be still dangerous,\" shouts the witch.\n\n\"It will be alright, my dear twin flame,\" the Abbot says calmly. \"She is no longer an enemy, I feel it.\"\n\nHe sits on the ground and pulls her so that her head rests in his lap. Cabala coughs blood, but still manages to speak. \"I hope I have the strength to tell you a few things before I die. I want to thank you for killing me back then. I really needed that.\" \n\n\"But why? I can't comprehend that.\"\n\nThe draco woman hisses a smile. \"See, all of my life back then, I was attacked for not being harsh enough, for not giving the young ones the right treatment to make them the fierce warriors that they needed to be. And, to make them behave, I had \nto deliver them cruel punishments, which I sometimes couldn't. I was resented and abused as a weak and awful mother... or what you would probably call a nanny, or a caretaker. Letting me die protecting them was the only way to achieve the image I always craved to have. \nIn my death, I managed to do that, I was finally able to rise in the eyes of the dracos. It was a special gift, coming from a perfect stranger.\"\n\n${blue_name} pets her hairless skull.\n\n\"You also made me ask myself questions,\" Cabala continues. \"I was still not dead when I saw you fall down on your knees and start crying. I wondered why. Any draco in your shoes would destroy all the eggs and kill all the hatchlings, but you just froze and weeped. When I went on the other side, I decided that I \nwanted to be born as a human in order to understand your thinking process. I also became a priestess so that I could learn about the love and light that guides you... most of the times. Of cource, I remain a violent and manipulative draco in my heart, and I was tempted to kill you just like you did, that would have brought me joy.\nPlease, understand that it is just my first step on the long road. Now, excuse me, I should go.\"\n\nCabala exhales for the last time. ${blue_name} closes her eyes, gently moves her away and stands up. \"Go with peace, my dear draco sister.\"\n\nThe Abbot sighs. \"I also returned some of the peace I lost back then.\"\n\n${red_name} hugs him. \"It is a pleasure for me to be able to share this moment with you, my love.\"\n\nHe gives her a warm kiss.\n*page_break\nWhen they open their eyes, they see that a thick mist has fallen around them. An altar has appeared and three figures stand before it. ${blue_name} recognizes Silkmane and brings his hands in front of his chest to greet the angel, while ${red_name} \nbows in reverence to the great white wolf spirit.\n\nSilkmane sniffs the air.\n*if (flame)\u003c12\n\t\"I am sorry, my friends. Your love has been measured and found wanting. You will not be allowed to summon the lupine guardians, we can't take the risk. I am willing to allow only a twin flames couple in \n\tstrong alignment with their love to connect to the lupine heart. My brethren have been tainted, they really need that kind of love to heal and return to what they were always supposed to be. The friends behind me gave their best to \n\tfind a couple with the potential to do so. And even you couldn't do that, so I am desperate,\" says Silkmane.\n\t\n\t\"But the High Priestess said that I could do it alone,\" ${red_name} argues.\n\t\n\t\"She is wise, but this is a matter beyond her understanding,\" says the lupine and dashes into the mist.\n\t\n\t\"And now what?\" asks the Abbot.\n\t\n\tThe angel and the white wolf come closer to them.\n\t\n\t\"Now, you are going to return to where you came from and I hope you manage to fall deeper in the love you share, the one you are beginning to manifest itself. I hope you will continue working\n\ttoward the peace in the region, but for now you won't be able to have the help of the lupines... for the time being. Go with peace, dear brethren,\" says the angel.\n\t\n\tThe wolf gives each of them a lick in the face and the reality around them fades, as they return to where the twin flames came from.\n\t*goto ending\n\n*else \n\t\"You are welcome to unleash the beast, dear brethren,\" Silkmane invites them. \"Let the power of your love cleanse the damage done by the previous one who set them free, heal them and make them return to what they were always supposed to be.\"\n\n\t\"What should we do?\" asks ${red_name}.\n\t\n\t\"All you need to do is touch the altar.\"\n\t\n\tThe twin flames follow the instruction, and a portal of white energy appears next to them. One after another, the lupines start coming out and running into the mist. Some of them stop to greet therm or just stare at the eyes of the humans. Others come for a handshake. A female looking one even gives them a wink and blows them a kiss.\n\t\n\tThere must be dozens of them. When they are all gone, Silkmane bids the twin souls farewell and disappears through the portal followed by his friends. \n\t*goto epilogue\n\n*label epilogue\n*page_break\t\nEpilogue\n\nThe last lupine vanishes, warping to the realm where ${blue_name} and ${red_name} came from.\n\n\"Did we win?\" the Abbot asks.\n\n\"Yes, my love, we did what we came here for. We unleashed the lupines. Could you feel their energy?\"\n\n\"It was so pure, nothing like the monsters that... I met as a child.\"\n\n\"We made them this way, we set the range of their feelings,\" she embraces him and gives him a kiss.\n\n\"Did we make them that naughty, what do you think, my sweetness?\" the Abbot asks.\n\n\"I bet so!\" ${red_name} gives him one more peck and breaks free from his embrace. \"I want to take some flowers home, I hope they will like our realm.\"\n\n\"As long as you give them your love, which I know you will, they will be fine anywhere.\" \n\nA woman comes up from the mist. She is wearing a long dress with many folds which highlight the golden hue of her skin. Her hair is long and straight and platinum blonde.\n\n\"Greetings, dear ones. I came to you to share your joy, the well-deserved triumph of accomplishing the deed you came here to achieve.\"\n\n\"You must be the one the dragon warrior told me about! My soul guide!\" ${blue_name} exclaims.\n\nThe lady smiles. \"We are Asket of Temmer, of the League of Light. I am happy to help a fellow soul on their quests of understanding and bringing the light to many. I also came to explain the magnitude\nof the actions you took today, the release of the protectors of the forest. You planted the seeds of love that will eventually bring the end to the conflict that plagued the place you know as the great clearing. The lupines will\nuse their abilities to help new trees grow. They will also show kindness to the woodcutters, slowly but certainly removing the fear. The humans will be able to embrace the universal truth that you may have forgotten, but you still carry in your hearts. The \nreality is that love is all there is. This is the knowledge that shines brightly once you remove the dirt of fear from your minds.\"\n\n${red_name} comes closer to Asket and touches her dress. \"I like it... wait, this is what I wore in the previous incarnation.\"\n\nAsket smiles. \"Yes, you saw yourself wearing the dress so many of the women from Temmer like to wear. That night, you were morning the loss of your beloved soul twin. Next time we meet, I will bring you one.\"\n\n\"Oh, thank you Asket, you are so kind!\" ${red_name} says as Asket gives her a hug.\n\n\"It is time for me to leave you. I feel great joy for being able to be in your presence one more time. Until we speak again, I wish you peaceful tomorrows. Go for love, my dear ones, and find the way home.\"\n\nSuddenly, ${blue_name} starts crying.\n\n\"Are you alright, my love?\" ${red_name} asks.\n\n\"Yes, I just saw a vision of our future. It was you and me as small children, walking hang in hand on a beach and then making sand castles. It is a majestic world with a purple sky and forests even more\nbeautiful than the one here.\"\n\n\"You saw a vision of the future, one that may come to be, if this is what your souls desire,\" Asket explains.\n\n\"There is nothing I want more than to be with him again in the next life right from the start of my journey,\" says ${red_name}.\n\n\"I don't want to waste any time being away from my twin flame love. And, I want to go back home. I want to share the joy of enjoying the beauty of Temmer,\" replies ${blue_name}.\n\n\"So be it!\" says Asket and disappears into the mists.\n*achieve happy\n*label ending\n*page_break end\nWe hope you've enjoyed playing [i]Twin Flames.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n*delay_ending 1200 $4.99 $0.99", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set red_name \"Estelle\"\t\n*set blue_name \"Xavier\"\n*set flame \t2\n*set damage 2\n*set respect 3\n*set light 52\n\t\n\"Tell me, what do you think about the conflict of the great woods?\"\n\nHe trembles as the memory of that night comes to life. He was awoken by the last scream of his mother. \nA beast crouching next to his mother turned the bloody muzzle in his direction...\n\nWhat would ${blue_name} answer?\n*fake_choice\n\t#\"Lupines are monsters. They should be slaughtered as the creatures of the darkness they are.\" \n\n\t#\"It is a strife that should be solved before many more die.\" \n\n\t#\"Lupines are right to defend the forest.\" \n\t\t\n*script changeBackgroundColor(\"black\")\n\n*set red_name \"Estelle\"\t\n*set blue_name \"Xavier\"\n*set flame \t1\n*set damage 3\n*set respect 4\n*set light 51\n\n\"I wouldn't trust that being. It looks like a creature of the Darkness to me.\"\n\nWhat should ${blue_name} do?\n*fake_choice\n\t#Say a scanning prayer to make sure the goblin is not a creature of the Darkness\n\n\t#Allow ${red_name} to do what she proposed\n\t\n\t#He should take the responsibility of trying to connect the creature to the Light\n\t\t\n\t#Decide that it is best to leave the room immediately despite ${red_name}'s protests\n\t\n*script changeBackgroundColor(\"sepia\")\n\n*set red_name \"Estelle\"\t\n*set blue_name \"Xavier\"\n*set flame \t3\n*set damage 3\n*set respect 4\n*set light 53\n\n\"I can spend eternity with you,\" says ${red_name} and her fingers slide down his forearm. \"Yet, I believe I should go back to my people.\"\n\nWhat should Abbot ${blue_name} reply?\n*fake_choice\n\t#\"So be it, I am looking forward to meeting you next time.\"\n\t\t\t\t\n\t#\"I want you to move here, in the monastery.\"\t\n\t\n*set red_name \"Estelle\"\t\n*set blue_name \"Xavier\"\n*set flame \t5\n*set damage 3\n*set respect 4\n*set light 54\n\nAnd then she remembers why the High Priestess sent her to the monastery. Time is passing by, the moment to search for the lupines and set them free is drawing closer, and she \nhasn't even talked to him. \n\nShould she do so now?\n*fake_choice\n\t#Be open with him and tell him\n\t\t\n\t#Wait for now\n\t\t\n*set red_name \"Estelle\"\t\n*set blue_name \"Xavier\"\n*set flame \t8\n*set damage 5\n*set respect 4\n*set light 56\n\n${blue_name} and ${red_name} hold hands, allowing their energies to roam freely between them and in a moment they simultaneously say that they choose...\n*fake_choice\n\t#Healing\n\t\t\n\t#Hand fasting\t\t\n\t\t\n\t#Vision of the enemy\n\t\t\n\t#Nothing", "startup": "*title Twin Flames\n*author Ivailo Daskalov\n\n*scene_list\n\tstartup\n\ttwin\n\tflames\n\tdeath\n\t\n\n*create red_name \"?\"\n*create cp_red_name \"?\"\n\n*create light 50\n*create cp_light 0\n\n*create flame 0\n*create cp_flame 0\n\n*create damage 0\n*create cp_damage 0\n\n*create blue_name \"?\"\n*create cp_blue_name \"?\"\n\n*create respect 0\n*create cp_respect 0\n\n*create healing_amulet false\n*create cp_healing_amulet false\n\n*create sword_fighting false\n*create cp_sword_fighting false\n\n*create unarmed_fighting false\n*create cp_unarmed_fighting false\n\n*create shooting false\n*create cp_shooting false \n\n*create shapeshifting false\n*create cp_shapeshifting false\n\n*create resurrection false\n*create cp_resurrection false\n\n*create pentacle false\n*create cp_pentacle false\n\n*create ear_talisman false\n*create cp_ear_talisman false\n\n*create dagger_physical false\n*create cp_dagger_physical false\n\n*create dagger_spiritual false\n*create cp_dagger_spiritual false\n\n*create blade false\n*create cp_blade false\n\n*create dragon false\n*create cp_dragon false\n\n*create snow false\n*create cp_snow false\n\n*create riddle 0\n*create cp_riddle 0\n\n*create mind false\n*create cp_mind false\n\n*create feather false\n*create cp_feather false \n\n*achievement res visible 100 The twin resurrector\n\tResurrect your twin flame.\n\tYou made your twin flame rise up like a phoenix! \n\n*achievement riddler visible 100 Riddle solver \n\tSolve the altar riddle in the best possible way.\n\tYou solved the altar riddle like a pro!\n\n*achievement happy visible 100 The happy ending\n\tFulfill your mission.\n\tYou set the lupines free!\n\n*achievement glory visible 100 Foolish glory\n\tRefuse help in the name of glory.\n\tYou refused help in the name of glory!\n\n*achievement save visible 100 Saviour\n\tSave a young soul.\n\tYou saved a young soul!\n\n*achievement lima visible 100 The body of an angel\n\tFulfill Lima's dream.\n\tYou fulfilled Lima's dream.\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tTap into pure, unconditional love, be engulfed in a journey of oneness, and bring peace to a place that knows none.\n\n\t\"Twin Flames\" is an interactive novel by Ivailo Daskalov, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n\tEnjoy the beauty of the self-discovery that occurs when one soul finds its other half, and they start a mission that will change the lives of many. Help the twin flames uncover the mystery of who they were in previous lives and find their way home.\n\n\t• Enjoy a 50,000-word tale of love, redemption, and ascension.[n/]\n\t• Surrender to the power of true love.[n/]\n\t• Switch back and forth between both the male and female twin flames.[n/]\n\t• Decide on their specializations and relations with current romantic partners.[n/]\n\t• Delve in an universe of light, witchcraft, ETs, dragons and reptilians.\n\n\t*if choice_is_advertising_supported\n\t\t[i]Twin Flames[/i] is supported by advertisements, but you can buy the unlimited version\n\t\tto turn off ads forever.\n\t\t\n\t\t*purchase adfree $4.99 purchased\n\t\t*page_break_advertisement\n\n\t\t*goto purchased\n\t*else\n\t\t[i]You can play through the game once for free, or purchase unlimited replays below.[/i]\n\n\t\t*purchase adfree $4.99 purchased\n\t\t*page_break Play Now for Free\n\n*label purchased\n", "twin": "To my lovely red - my love, my soul, my everything.\n\nAlso, in loving memory of the Slayer and his lady in a white dress.\n\nPlus, many thanks to Maryann Rada, the one that binds.\n*page_break\nDear reader,\n\nYou are about to embark on a journey of faith and magic, of violence and healing, of conflict and resolution.\nYou will be able to shape the destinies of two individuals into a single one.\n\nWhat are twin flames? Some say that they are physical projections of a single souls. Will the protagonists be able to make their\nrelationship grow? What abilities will the recognition of each other bring? Will they decide to love or fight?\n\nI don't know, because it is up to you to decide.\n\nNow, please, allow me to introduce you the red flame first, since it is habitual for ladies. She is amazingly beautiful, with\nlong wavy brown hair, and a very elegant silhouette. Her home is the Great Wood where she lives in a tribe dedicated to protecting the nature and living in harmony with its laws.\nShe is skilled at tapping at the energies of the wilds. In other words, a witch.\n\nHer name is...\n*choice\n\t#Victoria\n\t\t*set red_name \"Victoria\"\n\t\t*goto 1\n\t\n\t#Luna\n\t\t*set red_name \"Luna\"\n\t\t*goto 1\n\n\t#Nightwhisper\n\t\t*set red_name \"Nightwhisper\"\n\t\t*goto 1\n\n\t#something else\n\t\t*input_text red_name\n\t\t*if red_name = \"rating\"\n\t\t\t*goto_scene flames ending\n\t\t*goto 1\n\n*label 1\nNow, let me tell you about the blue flame. His faith in the Light is strong, even though unlike many of his Brothers, he doesn't have the abilities to heal or exorcise... yet.\nHe usually wears chainmail and shoulder plates and his athletic body is fit to the task of carrying the heavy load all day long. His sword is heavy and he enjoys wielding it as much as reading the holy books of the Light.\n\nHis name is... \n*choice\n\t#Mayday\n\t\t*set blue_name \"Mayday\"\n\t\t*goto 2\n\t\n\t#Dawnbringer\n\t\t*set blue_name \"Dawnbringer\"\n\t\t*goto 2\n\t#Lothar\n\t\t*set blue_name \"Lothar\"\n\t\t*goto 2\n\t\t\n\t#something else\n\t\t*input_text blue_name\n\t\t*goto 2\n\t\t\n*label 2\n*page_break\nBefore the story begins, would you like to receive background information?\n*choice\n\t#Yes, tell me about the setting, the forces of the Dark and Light and the witches.\n\t\tThe story takes place in a fantasy world - a constant battlefield of the forces of the Light and Darkness. The Nature appears to be the third major source of power. Even though believed to have been created, together with everything else, by the Light, the Nature is autonomous and hardly predictable. \n\n\t\tThe Darkness is represented by a rebel group of angels, who underwent a metamorphosis to become what is now known as demons. Though imprisoned in a realm of their own, they somehow manage to find their way out and spread the seeds of fear, hatred, disease and frustration. They watch them grow and then feed on them. Often, demons are unleashed by demonologists - brave and power-hungry sorcerers who seek to enslave demons. In most cases, the demons manage to take control of their masters, turning them into shadowborne abominations.\n\n\t\tThe Church of Light has the goal of protecting people from the Darkness and its minions. While widely respected because of the helping hand they offer, the clergy never tried to interfere with the king's politics.\n\n\t\tWitches and witchers (as their male counterparts are sometimes called) comprise the third major group of wielders of the supernatural. They revere Mother Nature. Witches tend to be able to speak with animals and even persuade them to perform tasks for them. More destructive ones tend to summon the wrath of the elements - blizzards, earthquakes, even volcanoes. Another distinctive feature of witches is their ability to use a bit of both the powers of the Dark and the Light. The Church of Light has mixed feelings towards witches. Priests are instructed to preach that playing with forces of the Dark can lead to possession. At the same time witches (together with the Order of the Cleansed) offer understanding of the way the Dark works that makes them likely allys of the priests of Light.\n\t\t\n\t\tThe female protagonist, ${red_name}, is a witch.\n\t\t*goto 2\n\t\n\t#Yes, I would like to hear more about the Church of Light and its orders.\n\t\tThe Church of Light ... Is headed by the Exarch. It consists of 7 orders.  \n\n\t\t- The Order of the Pure Heart is devoted to fighting demons by performing complex prayers. It's priests are also effective in returning the shadowborne back to their original form.\n\n\n\t\t-The Order of Divine Restoration specializes in healing - both wounds and diseases. Their knowledge of herbs and ailments comes second only to the lore of witches.\n\n\n\t\t-The Order of Penance pays more attention to the soul of the followers of the Light. In their ranks, the have the most eloquent scholars, who theorise on the social role of the priests. \n\n\n\t\t-The Order of Celestial Wings is devoted to studying the mystical agents of the Light - the angels. There are records of actual contacts with them. Angels are known to feel very uncomfortable outside their heavenly realm. One of the responsibilities of priests from that order is helping them get over their sickness so that the angels can accomplish their mission. \n\n\n\t\t- The Order of the Holy Shield is among the newest. Patriarch Atoro was the first to recognize the need for the priests to be able to defend themselves (and those who need protection). Members of the order tend to combine physical exercises, battle training and reading sacred books. The weapon typically used is the short metal mace used during liturgies. \n\n\n\t\t-The Order of Perseverance teaches reliance on the Light even in the most utter situations and not giving up even when the mind can find no hope.\n\n\t\t-The Order of the Cleansed is the most controversial one. It is comprised of demons who underwent a special exorcism process. As a result, they look like human beings. The order is recognized as part of the Church, despite the protests of some of the clergy and the disrespect towards particular aspects of the Canon. The cleansed insist on wearing an all black cassock as opposed to the officially recognized white one adorned with the sigils of the sun and moon. More important, they would have no qualms about using magical trinkets, engaging in the rituals of the witches or even contacting their former kind. At the same time, they tend to put a higher value on other of the hallmark values of the Church of Light - honesty, compassion, abnegation. And, their devotion is unquestionable. There are rumours that their demonic origin somehow allows them to achieve feats in the name of the Light such as resurrections or even changing the flow of time. Up to date, there has been no official confirmation.\n\t\t*goto 2\n\t\n\t#No, I want to start playing\n\t\t*goto 2a\n\t\t\n*label 2a\n${blue_name} enters the congregation hall with mixed feelings. It is an honour for him to be among the high clergy for the first time. The order of the zealots (the one of the Holy Shield) really needs people like him,\nstrong in their faith in the light, skilled in the sword and fit to endure a thousand battles. Some say that he is among the youngest to be invited to participate in the congregation and\nit is most likely so.\n\nWhen he enters the chamber, most of the other priests are at their places. He says a quiet greeting, a wish for the Light to bless its children, but nobody pays attention. He slowly sits on the chair, careful for his\nchainmail to make minimal noise.\n\nHe waits for a few minutes before the Exarch starts speaking. He is very old, his small frame carrying a burden bending his back to the front, but his voice is confident. He brings up several questions and quite a few of the \nother members of the high clergy speak their minds with confidence that inspire admiration from young ${blue_name}. What surprises him the most is that he feels only a little Light in each of them. He expected it to be different. He thought that on top \nof the Church would be the holiest. He doesn't want to judge, but in his heart, he is disappointed.\n\nThe Exarch announces it is time for the final question at hand. \"I want to bring up the necessity to choose one of our Brothers to head our mission in the Great Clearing. As you may know, Brother Tervel declared himself \nunable to proceed as he suffered heavily from a likely poisoning. This time, I would like to use my power to decide solely on the choice. It is my only second time of making that heavy decision and again \nthe reason is the same. An angel came to me and asked me to do that.\"\n\nIf the Exarch expected an enthusiastic reaction, he would be in for a big disappointment. ${blue_name} understands why. Very few of the people in the chamber believe him. This lack of trust in their leader disgusts ${blue_name}. He knows that these same \npeople chose the Exarch to represent themselves when it was the time for the old one to go. \n\n\"Quiet, please, Brothers and Sisters. The name the angel pronounced was Brother ${blue_name}.\"\n\nIn one second, ${blue_name}'s world becomes still. He can't believe what he is hearing. And then the hatred of so many bombards him. He is so young, one thinks. He is neither a healer nor an exorcist, spits his venom another. He hasn't even participated in a real battle, mentally\ncomments an old zealot. But none of them speaks. They know it is better for them to wait and stab him in the back than show their true faces now when the decision is already taken.\n\n\"Now, I call the end of the congregation,\" says the Exarch. \"You may go in peace. Brother ${blue_name}, you may remain here for additional instructions.\"\n*page_break\nAll of the members of the high clergy make their way out.\n\n\"May the Light bless your steps, Father,\" ${blue_name} greets him and bows in reverence just according to the canon.\n\n\"Be my guest, Brother ${blue_name},\" the Exarch waves. \"You can forget the formalities. For all I know, you are much more important to the Light than me. Please, take a seat,\" he points at the parched chair next to him.\n\nYou do as he asks.\n\n\"Tell me, what do you think about the conflict of the great woods?\"\n\n${blue_name} sighs as an avalanche of suppressed feelings hits him. He lost both of his parents in the ongoing conflict. People need wood to survive the winter. The growing population makes woodcutters go deeper into the heart of the mother forest, which in turn makes them a prey to the forest protectors - the wolf-like lupines. \n\n${blue_name} trembles as the memory of that night comes to life. He was awoken by the last scream of his mother. A beast crouching next to her turned the bloody muzzle in his direction, yellow eyes full of feral hatred. He sniffed the air. He must have sensed ${blue_name} but yet left him alone. Most of the group, including ${blue_name}'s father,  died that night. Only he and another boy survived.\n\nWhat would ${blue_name} answer the Exarch?\n*choice\n\t#\"Lupines are monsters. They should be slaughtered as the creatures of the darkness they are.\" \n\t\t\"I know your past and I certainly understand why you say that, but I don't like the malice in your voice,\" says the Exarch. \"I would expect more from a priest of the light. Especially from you, ${blue_name}.\"\n\n\t\t${blue_name} looks down, ashamed. His heart is pounding in his chest and his cheeks get red.\n\t\t*goto 6\n\n\t#\"It is a strife that should be solved before many more die.\" \n\t\tThe Exarch smiles.\n\n\t\t\"I like your way of thinking. Certainly, both parties have their points but at the end of the day, there is a pile of corpses. It is the duty of the Church of Light to do its best to prevent it from going on.\"\n\n\t\t(Your respect score increases by 2 points)\n\t\t*set respect +2\n\t\t*goto 6\n\n\t#\"Lupines are right to defend the forest.\" \n\t\tThe Exarch's eyes open wide.\n\n\t\t\"I know your story and I didn't expect to hear that from you. But, maybe seeing through the eyes of the other side is the key to ending the conflict. I am tired of all the massacre going on there. It pains me. It is the duty of the Church of Light to do its best to prevent it from going on.\"\n\n\t\t${blue_name} nods. \n\n\t\t(Your respect score increases by 1 point)\n\t\t*set respect +1\n\t\t*goto 6\n\n*label 6\n*page_break\n\"There is a group of people who dedicate their lives to studying the nature and its laws. What do you think about them, ${blue_name}? Can they be trusted? Could they help in the conflict?\" the Exarch suddenly changes the topic.\n\n${blue_name} finds himself unable to answer immediately. There were witches in the village where he grew up and they were helpful and respected. Their aid in times of draught and mosquito swarms was invaluable. On the other hand, the church officially does not approve of them.\n\nWhat would ${blue_name} answer?\n*choice\n\t#Yes\n\t\t*goto 7\n\n\t#No\n\t\t*goto 8\n\n*label 7\n\"The witches in my village helped a lot, just like the priests of the Lights healed the sick. I saw no Darkness in their actions. I know that the Church is unwilling to trust them, but I guess when it comes to something as complex… they shouldn't be cast out,\" ${blue_name} says assertively.\n\n\"Very well,\" the Exarch smiles. \"There is wisdom in your words. Can you keep a secret?\"\n\n${blue_name} nods.\n\n\"My wife... may the Light shine on her ashes.. she was into witchcraft. I never met someone as willing to go out of their way to help the poor and deprived...\"\n\n${blue_name} could swear that he sees tears in his eyes. When he opens his mouth again, his voice is trembling.\n\n\"If some human could understand the point of view of lupines, that would definitely be a witch. Remember that, son.\"\n\n(Your respect score increases by 1 point)\n*set respect +1\n*goto 9\n\n*label 8\n\"You can't play with the Darkness the way witches sometimes do and fail to succumb to it,\" ${blue_name} recites.\n\n\"I've heard that before... But, remember kid, if someone could understand the point of view of lupines, that would definitely be a witch.\"\n*goto 9\n\n*label 9\n*page_break\n\"You maybe wonder how exactly the angel who spoke to me communicated that you are the one to head our mission at the Great Clearing, and I am sorry for bringing back painful memories. I had a strange vision and I believe it was a prophecy. I saw you bringing peace to the cursed Great Clearing, getting lupines and wood cutters to work together side by side... forgetting the rivers of blood they shed. If anyone can end this mad
