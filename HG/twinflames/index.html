"Yes, I am in a relationship. What about you?\"\n\nHe nods. \"Yes. But that will not stop me from loving you the way I do.\"\n\nThere comes a silence. It may feel awkward on the outside, but inside, each of them is basking at the radiance of each other.\n\nSuddenly, they realize they are no longer alone.\n*page_break\nA man has appeared in the corner of the room. He is tall and well-built and dressed in something that seems skin tight and yet shines like platemail.\nBoth ${blue_name} and ${red_name} are slightly surprised to realise that they are not frightened by his appearance. \n\n\"I come from far away with peace and in the name of the Light. I am known as Netho.\"\n\n\"May the Light bless you, Netho,\" says the Abbot and laughs. \"Maybe where you come from you don't use door?\"\n\n\"Actually, sometimes we don't and I apologize for making that appearance, I just guessed I would raise too much suspicion. I am glad that I didn't scare you.\"\n\n\"No, my intuition tells me there is nothing to be scared of.\" ${red_name} assures him.\n\n\"What can we do for you?\" the Abbot asks.\n\n\"I did not come here to ask for help but offer mine,\" answers Netho. \"Generally, I am not allowed to intervene in your lives because you are here to learn lessons and I am not going to \nstand in the way of the process. However, the existence of that ghost here is a failure of the system, she is not supposed to extend to this timeline. I also fear that you,\n${red_name}, may have a very hard time banishing her from here, despite my beliefs in your exorcising powers, which are to be marvelled upon.\"\n\n\"Thank you. You mentioned the word timeline. What does it mean?\" ${red_name} asks.\n\n\"The timeline is a representation of reality, an embodiment of a series of situations. My comparison would be to the roof of the churches of the light. They are all made of opalescent \nglass and in the same shape, the only variation would be an occasional crack or dimensions, probably an imperfection here or there. Am I right, Abbot?\"\n\n\"That is true,\" says ${blue_name}.\n\n\"Now imagine that a change in the roof on one church could somehow affect the designs of all the others. Could you do that?\"\n\n\"I guess I could,\" responds the priest.\n\n\"Now, let's say that this ghost is a shadow of a possessed woman in another reality, a different timeline. In order to release her, you would need to go to that \ntimeline and jump in the shoes of the physical representations of your souls there and deal with the demon that possessed her. I never want to make statements causing fear\nbut there might be serious consequences if that doesn't happen. As far as I could tell, that demon resides deep below the main building of the monastery, but you \nwill have more information when you go there. If you go there. You have a choice. I am just here to make an offer.\"\n\n\"In which way is the timeline you speak about different than the one we are in right now?\" asks ${red_name}.\n\n\"Well, the monastery is the same, the Abbot is pretty much the same character, and that, ${red_name}, also applies to you. And, the possessed woman plays the role of your mother there.\"\n\nThe Ambassador freezes.\n\nNetho continues. \"It may be a bit hard for you to grasp it right now, but I can assure you once you are there, you won't have any trouble getting in the shoes of the \ncharacter that is an extension of your soul there.\"\n*goto midnight5\n\n*label midnight5\n*page_break\nWhat would ${blue_name} and ${red_name} do now?\n*choice\n\t*hide_reuse #Ask Netho where he comes from \n\t\t\"As I said, I come from far away, probably much further than I can explain,\" he says.\n\t\t\n\t\t\"Further than the great mountains?\" Abbot ${blue_name} suggests.\n\t\t\n\t\t\"Much further, actually. Can you imagine where the two moons are?\" He asks.\n\t\t\n\t\t\"Kind of.\" ${red_name} replies.\n\t\t\n\t\t\"Well, much further than that on a land called Temmer.\"\n\t\t\n\t\t\"I haven't heard of it,\" ${blue_name} admits.\n\t\t\n\t\t\"I can offer you to come and visit after the work that needs to be done is over,\" says Netho.\n\t\t\n\t\t\"I would love that,\" replies ${red_name}.\n\t\t\n\t\t\"I must admit I am more interested in the costume you are wearing,\" mentions Brother ${blue_name}.\n\t\t\n\t\t\"Oh, no problem, next time we meet I will bring each of you one. I just couldn't foresee you would love that.\"\n\t\t\n\t\t\"Thank you in advance,\" says ${blue_name}.\n\t\t*goto midnight5\n\t\t\n\t\t\n\t*hide_reuse #${red_name} would like to try to exorcise the spirit\n\t\t\"I need to try to deal with the ghost,\" says ${red_name}.\n\t\t\n\t\t\"That doesn't surprise me at all,\" says Netho. \"You have a warrior soul.\"\n\t\t\n\t\t${red_name} prepares mentally and picks up the chalk. She enters boldly and feels chill in her bones. Ignoring the frightening image, she quickly starts drawing \n\t\tpentacles and other holy symbols on the door and on several other places while chanting prayers to the Mother Nature to have mercy on that lost spirit and return it to the circle of life, death, and incarnation.\n\t\t\n\t\tShe has done it before, but now it doesn't seem to work. Trying again more fervently only makes her feel exhausted. The ghost passes through her body a couple of times and it brings her feelings of \n\t\thopelessness, desperation and rage. Giving up, she hesitates whether to try to destroy the ghost so that it can return to source. She is not sure she is able to do it. But, she can't let herself try either.\n\t\tShe feels the connection with the creature the woman once was. What Netho said about the mother-daughter relationship on another timeline is a perfect explanation.\n\t\t\n\t\tA glance at the window shows her that Abbot ${blue_name} is there, his eyes embracing her and sending her energy.\n\t\t\n\t\t\"Run, just turn back and leave. The door is so near.\" She hears him although his lips don't move. She follows his directions, feeling very dizzy. ${red_name} manages to walk out and collapses on \n\t\ther knees and hands.\n\t\t\n\t\t\"It is okay, my dear.\" ${blue_name}'s warm arms engulf her and she immediately feels better, as if healed by his touch. She stands up.\n\t\t\n\t\t\"Can you walk?\" He asks cautiously.\n\t\t\n\t\t\"Yes, I am fine now. Let's return and continue our conversation with Netho.\"\n\t\t\n\t\t\"Alright, just stay close and if you feel like fainting, just let me know. I will catch you,\" he explains.\n\t\t\n\t\t${red_name} smiles, \"You are so kind.\"\n\t\t*set damage +1\n\t\t\n\t\t(You take 1 point of soul damage)\n\t\t*goto midnight5\n\t\n\t#Tell Netho they are ready to go\n\t\t\"Very well. Now, please, close your eyes and take a deep breath.\"\n\t\t\n\t\t${red_name} and ${blue_name} do so and and vanish.\n\t\t*goto 49\n\t\t\n*label 49\n*page_break\nSister Amie rushes into the room.\n\n\"Abbot, we have a problem. The militia just brought an old woman from the town. They said she killed her husband in a rage.\"\n\n\"Don't they have a judge?\" he murmurs.\n\nThe priestess shakes her head. \"They believe she is possessed by a demon. I guess there must have been some supernatural power that could turn such a weak looking old lady into a murderer.\"\n\nSister Amie leads him down to the first floor, to one of the confession's chambers. There is a young girl talking to Thomas, waving her hands.\n\n\"You must let me in, she is my mother.\"\n\n\"I can't let you do that,\" the zealot says. \"She may hurt you.\"\n\n\"But she is my mom!\" Tears roll down her cheeks, making her wavy hazel hair stick to them. \"She has been like that before. Only I can help her come back.\"\n\nThomas looks at ${blue_name} for help.\n\n\"Who is this woman?\" the Abbot asks Sister Amie.\n\n\"This is ${red_name}. She came a few days ago, saying she wanted to become a priestess. We explained to her that she can't even be a Novice until she is baptized and that it could only be done at the first moon of an year, but we couldn't really stop her from coming here and occasionally participating in our prayers.\"\n\nWhat would be ${blue_name}'s decision?\n*choice\n\t#Refuse her to go in\n\t\t*goto 50\n\t\n\t#Allow her to get in alone\n\t\t*goto 51\n\n\t#Go in together with her\n\t\t*goto 52\n\t\t\n*label 50\n\"I am sorry, dear one. There are things that should be left to the clergy.\"\n\n${red_name} gives out a sad sigh.\n\n\"Thomas, would you mind showing her the canteen. I am sure the Sisters there would have a cupcake or two for her. They usually make me relax.\"\n\nThe zealot nods and takes her hand.\n\n\"Now, let us see what we have here.\"\n\n${blue_name} finds the old woman in a destitute state. She still has blood on her hand and clothes and is desperately trying to tear the rope around her wrists. He initiates the exorcism ritual and spends a couple of hours in prayers.\n\nFinally, the woman calms down and only wants to lie down and sleep. The Abbot asks a Novice to bring a few bags of hay in the room so that she can have some rest. \nWhen he leaves the room, the Abbot feels very thirsty and decides to go to that canteen. Thomas and ${red_name} are still there. \n\n\"Your mom is fine,\" he assures her as he takes a jar of lemon juice.\n\n\"I know. She always is once it is over.\"\n\nThe Abbot dismisses Thomas and sits next to the table.\n*goto 96 \n\n*label 51\n*set respect -1\n(Your respect score decreases by 1)\n\n\"You can't be serious, Abbot,\" says Sister Amie. \"That woman has just killed her husband. We don't know what she could do to her.\"\n\n\"Come on, she is her mother…\"\n\n\"And the man she killed today was her husband.\"\n\n\"I am sure your men have tied her hands.\"\n\n\"There are plenty of things that she can do to endanger ${red_name}'s life.\"\n\nThe Abbot looks at the woman. She looks quite fragile. He realizes Sister Amie is right.\n*goto 52\n\n*label 52\n*page_break\n*set flame +1\n\n(Your twin flame score increases by 1)\n\n\"You can go in and see your mother, but I will be by your side, making sure nothing bad happens to you,\" he tells the woman. \n\nShe rolls her eyes. \"We've been through this before. My mommy never hurt me. I am her little guardian angel.\"\n\nThe Abbot smiles as he takes her hand and they both enter the room. They find the woman in a destitute state. She still has blood on her hand and clothes and is desperately trying to tear the rope around her wrists. When she sees ${red_name}, she stops fidgeting and falls to her knees and starts crying quietly. Her daughter approaches her and ${blue_name} makes sure she is within an arm's length from him.\n\n\"What have I done? I... I killed your father.\"\n\n${red_name} hugs her. \"You know it was not you, mommy. It was the demon inside you. It is not your fault that he chose to get inside you.\"\n\n\"I can't take it any more...\" whispers the old woman.\n\n\"You are in the right place. This is the monastery of Light. The priests here will help you recover.\"\n\n\"It is too late. I can never be the same after what happened. I should have listened to you.\"\n\n\"What is done is done. Be strong, mommy.\"\n\n\"I... feel so tired.\"\n\n${blue_name} asks a Novice to bring a few bags of hay in the room s that she can have some rest. The woman lies down and instantly falls asleep. \n\n\"Let's go grab some cupcakes and juice from the canteen. I will have another exorcist see her if necessary once she wakes up. I will also send Brother Joseph, our best confessor to help her get over the shock.\"\n\n\"You are a good priest, Abbot,\" says ${red_name} as they make your way towards the canteen. The Sisters there offer them a couple of cherry cupcakes and a jar of lemonade.\n*goto 96\n\n*label 96\n*page_break\n\"I am sorry about your father,\" ${blue_name} says with a trembling voice. He is not quite sure he should bring the topic up.\n\n\"Oh, he was not my real father. Mommy said mine died while I was a little baby, so she decided to find another one. But this one was very violent.  The world is a better place without him.\" The girl finishes her cupcake.\n\"Have you heard of the Rainbow people, Abbot?\" \n\n\"Yes, they are ones gifted by the Light. You must be one of them, right?\"\n\n\"Well, not really. Rainbow people are masters of all the ways in which the Light manifests itself. I can only read minds and sometimes I receive prophecies. Well, I am also immune to possession.\"\n\n\"When did you understand you are one?\"\n\n\"I became one. One day, an angel came to me. She was very injured. She said she fought demons and barely managed to escape. About to die, she instead gave me this bracelet and hid in it.\" ${red_name} pulls her sleeve up and shows you a brilliant white piece of jewelry. It just radiates Light.\n\nYou sip your drink. \"That angel must have felt you were unique. By the way, did any demons come to look for you?\"\n\n${red_name} nods. \"One of them comes to my room every other night and we play chess.\"\n\nYou shake your head. \"Aren't you afraid of him?\"\n\n\"I am not afraid of creatures of the dark. They can do nothing to me. Besides, nobody else wants to play with me after I defeat them a couple of times.\" She shrugs.\n\n\"Tell me something more about him,\" ${blue_name} asks her.\n\n\"Well, he is very bad and leaves in the dungeon of the monastery. He always wants to have me remove my bracelet and give it to him. He thinks he can use its power. The demon thinks humans and lupines should kill each other so that he and his friends could drink their pain or even consume a few of their souls. That is disgusting.\" ${red_name} makes a funny face.\n\n\"And you say he lives here... in the monastery.\" The Abbot realizes he is getting sweaty.\n\nThe woman nods. \"Yes, here in the dungeon. I think we should go there and defeat him before he does something very bad.\"\n\n\"Maybe I should organize a party of the best exorcists we have.\"\n\n\"I doubt it will help. This one is very powerful. He thinks he can be defeated only by performing a complex ritual in an altar in the dungeon.\"\n\n\"There are no altars there,\" ${blue_name} argues.\n\n\"There is a secret passage leading to a room with five of them. I am sorry, but I don't know which of them is the right one. I also didn't manage to get the complete instructions for the ritual.\"\n\n\"Then, tell me what you know,\" he ask.\n\nThe woman looks at the roof and recites. \"Mingle merry snow with sweet blood. A long dragon claw shall write the executioner's light on the altar of ... I am not sure. I only know that these are reagents we must take from there.\"\n\n\"That is okay, dear.  Now, I will introduce you to a Novice who will take care of you for the remainder of the day.\"\n\n\"Novice Lilly grows the most beautiful flowers I have ever seen!\"\n\n\"Yeah, she does. Wait, did I tell you I was going to bring you to that Novice?\"\n\n\"Nope,\" ${red_name} smiles.\n\n\"I see.\"\n*goto 53\n\n*label 53\nAfter leaving the woman to the Novice's hands, ${blue_name} goes to Amie's room.\n\n\"So you want to go to the dungeon and try to banish the demon ${red_name} told you about?\" the priestess asks.\n\n\"I do believe there is something very special about this woman,\" he explains. \"I think we should go there.\"\n\nThe priestess nods. \"By we you mean the two of us?\" \n\n\"Honestly, I doubt we could deal with the riddle ourselves. Besides, ${red_name} might be the single most protected against demons person in the monastery. Risking her life is something I don't want to do, but then again, she might be the most valuable asset in the path to solving the mystery.\"\n\n\"Don't you think we should get somebody else? I mean, us and a lady who is not even a priestess might not be enough to deal with the horrors in the dungeon.\" Sister Amie proposes.\n\nThe Abbot shakes his head. \"I am pretty sure it will be quite narrow down there. Being in a crowd, we will just make more mess.\" \n\n\"Sounds logical. When do we go?\"\n\n\"I suggest meeting in an hour. Let's hope that we will be able to come back for supper.\"\n\nThe priestess agrees and you leave her room. ${blue_name} spends the time meditating, going over prayers and polishing his sword. Then, he goes outside to look for ${red_name} and finds her watering the flowers, laughing with Novice Lilly. The whole scene looks so stunningly beautiful that a part of him wants to forget about going to the dungeon.\n\n\"${red_name}, I thought about your proposal to enter the dungeon. Let's go. Sister Amie will come with us.\"\n\nLilly seems perplexed by your announcement, but says nothing as ${red_name} blows her a kiss. ${blue_name} takes her hand and leads her back into the monastery and to the entrance of the dungeon. Sister Amie is already there.\n\n${blue_name} leads the way downward. \"We will need torches,\" he announces.\n\n\"Not really,\" says ${red_name}. \"See what my bracelet can do.\" She blows it and a dozed of dancing sparks come out. They grow brighter and start flying around them, illuminating the stairway.\n\n\"That is very nice.\" Sister Amie smiles. \"Having a torch in one hand and a two-handed sword in the other is not fun.\"\n\n\"We should stop here,\" ${red_name} announces.\n\n\"Why, we are in the middle of the staircase?\" ${blue_name} asks.\n\nShe touches the wall and the slate opens like a door.\n\n\"I would have never guessed,\" the Abbot smiles.\n\n\"The same is true about me, but I read about it in the demon's mind.\"\n\t\nThe new corridor winds a couple of time and ${blue_name} wonders whether there is something waiting to ambush them, but his fears are unfounded. Finally, they come to what looks like a torture chamber. There are a lot of dreadful instruments there... and they are not alone in their ugliness. A tall muscular figure rises up from the floor to greet them. Sister Amie takes her sword out, but the Abbot raises his hand up, signaling her not to attack for the time being. The executioner seems like a powerful opponent and ${blue_name} hopes there should be a way to avoid the battle. He takes his time to examine him. There is a big axe next to him and he could grab it at any moment. \n\nHe is half nude – wearing only a pair of black trousers and a chain around his torso that seems to act like a belt. On his head, there is a turban that slightly covers a star tattooed on his forehead.\n\n\"So, you have brought a slave to the master. He would be delighted. Is that the case?\"\"\n\nAbbot ${blue_name} pauses for a few seconds, considering his answer. If it is positive, the executioner may let them proceed past him. Or, he could require that they leave the woman here. At least this is what ${blue_name} has in mind.\n\nWhat should he answer?\n*choice\n\t#Yes\n\t\t*goto 54\n\n\t#No\n\t\tThe executioner grabs his axe and attacks.\n\t\t*goto 55\n\t\t\n*label 54\n\"Yes, the fragile-looking one is for the master.\" ${blue_name} will never forget the look in ${red_name}'s eyes. He can sense her fear and it permeates his very being. It seems that the executioner is not exactly demonic, so she can't rely on the protection of her bracelet.\n\n\"Then, push her forward. The master wants his food prepared.\"\n\n\"No!\" you shout. \n\n\"I knew you were lying,\" the executioner roars with laughter as the room is filled with black smoke. \"Let me tell you something fools. The only reason you are still alive is that you are claimed by the Light. But when you act against its virtues, you become vulnerable.\"\n\n\"I never acted against the Light!\" ${blue_name} shouts.\n\n\"You just lied. If you had not, I wouldn't bother use the dark gas because it would have been like fresh air to your lungs.\"\n*set flame -2\n*set damage +1\n\n(Your twin flame score decreases by 2 and you take 1 point of soul damage)\n \nThe party has no choice but fight the executioner.\n*goto 55\n\n*label 55\n*page_break\n${red_name} doesn't want to just stay and watch the Abbot and Amie fight.\n\nHow can she help?\n*choice\n\t*selectable_if (dagger_physical) #Use her keen dagger\n\t\t${blue_name} takes out his sword and charges. Sister Amie needs no second invitation to do so. The executioner swings his axe as if it was a pinwheel.\n\t\tEven though he fights alone, he has the home advantage and makes the most of it, occasionally kicking tables and chairs toward\n\t\tthem or throwing instruments at them. He almost manages to wound Sister Amie's leg with a sickle, but that moment of lack of concentration allows ${red_name} to run into him,\n\t\tas fast as the wind, and stab him with a dagger. The executioner roars and hits the floor with a loud thud and never moves again.\n\n\t\t\"What did just happen?\" Abbot ${blue_name} wonders.\n\n\t\t\"Oh, I have that little dagger, it is a legacy from my granny. It is useless against demons, but works like magic on physical bastards.\"\n\n\t\tSister Amie smiles. \"You have the heart of a warrior, brave one. One day you will be a great hero.\"\n\n\t\t\"Truly,\" says Abbot ${blue_name}\n\t\t*goto 56\n\n\t*selectable_if (shapeshifting) #Turn into a lioness\n\t\t${blue_name} takes out his sword and charges. Sister Amie needs no second invitation to do so. The executioner swings his axe as if it was a pinwheel.\n\t\tEven though he fights alone, he has the home advantage and makes the most of it, occasionally kicking tables and chairs toward\n\t\tthem or throwing instruments at them. He almost manages to wound Sister Amie's leg with a sickle, but at that  moment of lack of concentration, a lioness jumps at his neck and razor sharp teeth and claws rip it open. The executioner gurgles and hits the floor with a loud thud and never moves again, just a pile of flesh in the puddle of his own blood.\n\n\t\t\"What did just happen?\" Abbot ${blue_name} wonders. Then his eyes meet ${red_name}, who is spitting blood and wiping it out with her sleeve.\n\t\n\t\t\"That beast was me, I can turn into a lioness,\" she explains. \"I really wanted to help you in that battle, but I didn't know he would taste that bad.\"\n\t\n\t\tAbbot ${blue_name} is still shocked by what he sees, unlike the female zealot.\n\t\n\t\tSister Amie smiles. \"You have the heart of a warrior, brave one. One day you will be a great hero.\"\n\n\t\t\"Truly,\" says Abbot ${blue_name}\n\t\t*goto 56\n\n\t#She can do nothing to help\n\t\t${blue_name} takes out his sword and charges. Sister Amie needs no second invitation to do so. The executioner swings his axe as if it was a pinwheel.\n\t\tEven though he fights alone, he has the home advantage and makes the most of it, occasionally kicking tables and chairs toward\n\t\tthem or throwing instruments at them. He manages to wound Sister Amie's leg with a sickle. Seeing the priestess fall down on the floor, ${blue_name} let out a cry of anger and\n\t\tdelivers a ferocious sway, cutting his hand on his blade but piercing the executioner's heart.\n\n\t\t${red_name} helps the zealots bind their wounds. \"I am sorry I couldn't help, I wish I could.\"\n\n\t\tSister Amie smiles. \"You have the heart of a warrior, little one. One day I will be a great hero.\"\n\n\t\t\"Truly,\" says Abbot ${blue_name}, then moans. \"There is something wicked about these wounds, I can feel them in my soul.\"\n\t\t*set damage +1\n\n\t\t(Your soul damage increases by 1)\n\t\t*goto 56\n\n*label 56\n*page_break\nAfter they recover from the fight with the horrific opponent, the group continues down the corridor. Soon, it comes to a vestibule. The corridor itself goes on forward, but there are four other ones starting \nfrom there.\n\n\"Where do we go now?\" ${blue_name} asks himself.\n\n${red_name}, however, takes the question seriously. \"I think we should try each of them before continuing forward.\"\n*goto 56a\n\n*label 56a\n*page_break\nWhere do you go now?\n*choice\n\t*hide_reuse #The first one to the left\n\t\t*goto 57\n\n\t*hide_reuse #The second one to the left\n\t\t*goto 64\n\n\t*hide_reuse #The first one to the right\n\t\t*goto 70\n\n\t*hide_reuse #The second one to the right\n\t\t*goto 72\n\n\t#Forward (if you have visited all the other locations)\n\t\t*goto 77\n\n*label 57\nThe corridor leads to a room that appears to be a lab. There are vials with all kinds of concoctions everywhere, some of which boiling. There is a strong smell of sulphur in the air. ${blue_name} and ${red_name}\nappear to be alright, but Sister Amie begins to choke.\n\n\"Are you alright?\" ${blue_name} asks the priestess.\n\nShe just nods, unable to speak.\n\nShould ${blue_name} suggest that she waits for them outside?\n*choice\n\t#Yes \n\t\t*goto 58\n\n\t#No \n\t\t*goto 59\n\t\t\n*label 58\n${blue_name} really can't look at her struggling for breath, so he sends her out where the concentration of sulphur fumes is lower. There are obviously no monsters to fight in the lab anyway.\n*goto 60\n\n*label 59\nWhile examining the surrounding, Sister Amie struggles for breath and eventually faints, falling over a vial of nasty acid. ${blue_name} quickly pulls her out of the room thankful that the acid just corroded her armour at one place.\n\n\"I should have said it earlier, but you'd better stay here while ${red_name} and me check the lab. There are obviously no monsters to fight there anyway,\" ${blue_name} tells her and his soul shrinks at the guilt of making her suffer without any point.\n\nThe priestess nods.\n*set damage +1\n\n(Soul damage increases by 1)\n*goto 60\n\n*label 60\n*page_break\n\"Look at that, Abbot.\" ${red_name} points a big cauldron in the back of the lab. It is filled with some orange mash.\n\n\"Do you have any idea what it is?\"\n\n\"I think we should use it to test the blood.\"\n\n\"What blood?\" The Abbot scratches his neck.\n\n\"The sweet blood you need to mingle with merry snow. Remember the instructions for the ritual, right?\"\n\n\"Oh, the ritual, right. What about this vial. It looks like blood.\" You pick one and open it. \"It smells of cherries.\"\n\n\"What about that one?\" She picks a nasty looking jar with what seems to be coagulated blood. I have another idea. Why don't we poor this?\" She takes out a small potion of holy water. \"Maybe we should consecrate this cauldron.\"\n\nWhat should be put in the cauldron?\n*choice\n\t#The cherry juice\n\t\t*goto 61\n\n\t#The coagulated blood\n\t\t*goto 62\n\t\t\n\t#The holy water\n\t\t*goto 63\n\t\t\n*label 61\nAs soon as ${blue_name} pours a bit of the liquid, the mash in the cauldron begins to disappear.\n\n\"So that must be the sweet blood we need,\" says ${red_name}.\n\nThe Abbot guesses she is right, so he put the seal of the vial back and they return to Sister Amie.\n*set riddle +1\n\n(You successfully solved a piece of the riddle)\n*goto 56a\n\n*label 62\nThe mash in the cauldron does not respond in any way. Maybe ${blue_name} and ${red_name} should try something else.\n*choice\n\t#The cherry juice\n\t\t*goto 61\n\n\t#The holy water\n\t\t*goto 63\n\n*label 63\t\t\nThe mash in the cauldron reacts violently with the holy water, exploding. A bit of it falls in ${blue_name}'s eye.\nHe doesn't feel pain, but the corrupted liquid feels bad... as if permeating within his soul.\n*set damage +1\n\n(Soul damage increases by 1)\n\n\"Shall we give up on this corrupted room?\" ${red_name} suggests. \"I don't want you to suffer any more, I can't take it.\"\n\n${blue_name} smiles and pets her hair. \"I am alright, dear one.\"\n\nWhat shall ${blue_name} do now?\n*choice\t\n\t#Pour the cherry juice\n\t\t*goto 61\n\t\n\t#Pour the coagulated blood\n\t\t*goto 62\n\t\t\n*label 64\nThe corridor ends in a very hot chamber. ${blue_name} soon realizes why. There is a big furnace with live embers, and there are big eggs inside. It seems that a couple of them have already hatched, but the babies are nowhere to be found.\n\nIn fact, another one is just hatching in front of their eyes. A baby dragon comes out! It looks around, gives out a shriek and starts crawling.\n\n\"Oh, how sweet!\" says ${red_name}. \"I want to have it as my pet.\"\n\n\"Stay back!\" Sister Amie orders. \"Do you see its big fangs? It can be dangerous.\"\n\nWhat do ${blue_name} do?\n*choice\n\t#Say a prayer of detect evil to find out the nature of the dragon\n\t\t*goto 66\n\n\t#Slay the dragon\n\t\t*goto 67\n\t\t\n*label 66\nIt is a wise move since you really don't know much about dragons. The Abbot connects with the spirit of the dragon and feel that the dragon's soul is as pure as that of any child.\n\n${red_name} takes it in her arms and hugs it.\n\n\"Abbot, can I take it with me. It is so sweet.\"\n\nShould he allow her\n*choice\n\t#Yes\n\t\t*goto 68\n\n\t#... or rather not\n\t\t*goto 69\n\t\t\n*label 67\n${blue_name} takes out his sword and ${red_name} immediately jumps in front of him.\n\n\"What ungodly act are you going to commit?\" She cries.\n\n\"I am just trying to protect you,\" he says and lowers his blade.\n\n\"You can't protect me by acting like a monster. That would hurt me so bad. It would send poison along the soul link. Please, at least connect with the \nconsciousness of that little baby.\"\n\n${blue_name} puts his sword back into his sheathe. \"Please, forgive me. There is wisdom in what you say.\"\n*set flame -2\n*set damage +1\n*set light -2\n\n(Your twin flames score and alignment with the light decrease by 2 and you take 1 point of soul damage)\n*goto 66\n\n*label 68\n\"Sure. But only one condition. You take care of it at all times, which could mean that you may have to carry it all the time.\"\n\n\"I would do that for my dragon!\" she says with determination that makes ${blue_name} smile.\n*set light +1\n\n(Your alignment with the light increases by 1)\n*set dragon true\n*goto 56a\n\n*label 69\n\"I am sorry, ${red_name}. Its mom may come back and get very upset when she doesn't find it here.\"\n\n\"But I will be a good step mother!\" ${red_name} doesn't give up.\n\n\"A step mother could hardly compare to the original mother,\" ${blue_name} explains to her.\n\n\"I see.\" She puts the dragon down and pets it one last time. \"But we need a dragon claw for the ritual. Look, my dragon has one of its nails broken, probably while popping the egg.\"\n\n${blue_name} takes it, they say goodbye to the baby dragon and return to the vestibule.\n*goto 56a\n\n*label 70\nThe narrow corridor leads them to a small library. Despite the meager surroundings (consisting of a table, a chair, and a couple of bookshelves), there are probably hundreds of books there.\n\n\"What are we looking for?\" Sister Amie asks impatiently.\n\n\"I need to find the whole instructions for the ritual of banishing,\" says ${red_name}\n\n\"Great. Where do we start from?\" The priestess picks up a book and throws it down.\n\n\"What is wrong?\" ${blue_name} asks.\n\n\"There was a big spider!\" She makes a disgusted face.\n\nThe Abbot laughs as he could never imagine the otherwise brave zealot fearing such small creatures.\n\n\"I know where to look for it.\" ${red_name} picks a book, opens it and starts reading. \"Mingle merry snow with sweet blood. A long dragon claw shall write the executioner's light on the altar of dread. And then sacrifice your soul. Hm, this last sentence seems written between the lines, that is weird.\"\nShe puts the book back on its shelf. \"Very well, let's move out. There is too much forbidden knowledge here.\"\n\n\"Did you see that?\" Sister Amie points at a beautiful ritual knife on the table. \"If we are going to perform a ritual, we would need it.\"\n\n\"What do you think, ${red_name}?\" He asks the her.\n\nShe just shrugs.\"Unfortunately, I don't know every detail.\"\n\nShould ${blue_name} pick up the knife?\n*choice\n\t#Yes\n\t\t*goto 71\n\t\t\n\t#No - return to the vestibule\n\t\t*goto 56a\n\n*label 71\nThe knife feels unnaturally heavy and cold. ${blue_name} puts it in his belt, careful not to cut himself.\n*set blade true\n*goto 56a \n\n*label 72\nThe corridor leads you to what looks like a child's room. There is a colourful bed and a lot of toys scattered on the floor.\n\n\"Oh, dear Light, what is this?\" Sister Amie cries. It seems she found the child. It turns out to be a humanoid with long black fur. It is breathing, however it appears to be unconscious or sleeping. Actually, the reaction of the priestess nullifies the probability of the latter.\n\n\"Oh, the poor goblin is sick. I will go and heal him,\" says ${red_name}.\n\n\"Wait a minute. You are going nowhere, at least until we sort things out. First of all, what kind of a creature is it, and second, you told me you are not a healer?\" Abbot ${blue_name} protests.\n\n${red_name} rolls her eyes. \"People think goblins are creatures of the Darkness, but they are not. They are like... like your cassock. When you entered the dungeon, it was all clean and now it has absorbed some of the dirt here. It is the same with goblins. That one needs just a little bit of love to wake up and come back to the Light.\"\n\n${blue_name} looks at his cassock. He would definitely not want to appear on a mesa looking like that. He is about to ask ${red_name} where she learned that, but decides that there is no point.\n\n\"I wouldn't trust that being. It looks like a creature of the Darkness to me.\"\n\nWhat should ${blue_name} do?\n*choice\n\t#Say a scanning prayer to make sure the goblin is not a creature of the Darkness\n\t\t*goto 73\n\t\n\t#Allow ${red_name} to do what she proposed\n\t\t*goto 74\n\t\n\t#He should take the responsibility of trying to connect the creature to the Light\n\t\t*goto 75\n\t\t\n\t#Decide that it is best to leave the room immediately despite ${red_name}'s protests\n\t\t*goto 56a\n\n*label 73\n\nThe prayer confirms that the creature's origin stems from the Darkness.\n\n\"I am sorry, ${red_name}, this does not belong to the Light.\"\n\n\"Oh, Abbot, aren't you listening to what I say. It doesn't belong now but it will if you show it just a little bit of love.\"\n\nWhat should ${blue_name} do?\n*choice\t\n\t#Allow ${red_name} to do what she proposed\n\t\t*goto 74\n\t\n\t#He should take the responsibility of trying to connect the creature to the Light\n\t\t*goto 75\n\t\t\n\t#Decide that it is best to leave the room immediately despite ${red_name}'s protests\n\t\t*goto 56a\n\n*label 74\n\"Thank you, Abbot.\" ${red_name} gives him a quick hug and then rushes towards the creature. \n\nShe puts her palms on its forehead and gently whispers something. The goblin bathes in bright light and its fur changes colour from black to snow white, then it wakes up.\n*goto 76\n\n*label 75\n\"Let me face the peril!\" he says as he moves toward the goblin.\n\n${red_name} gives him a warm smile. \"You are my hero.\"\n\nThe compliment makes him blush.\n*set flame +1\n\n(Your twin flames score increases by 1)\n\n\"You know how to make good impressions, don't you?\" Sister Amie laughs. \"Be careful, though.\"\n\n\"No doubt about it. What should I actually do?\" he asks ${red_name}.\n\n\"Just follow your instincts.\"\n\nThe goblin bathes in bright light and its fur changes colour from black to snow white, then it wakes up.\n*goto 76\n\n*label 76\n*page_break\n*set snow true\n*set light +1\n\n(Your alignment with the light increases by 1)\n\nSister Amie raises her sword, but you know that even she realizes that there is no need for that. The goblin just radiates Light.\n\n\"You are so beautiful,\" it says to ${red_name}. \"You remind me of my sister I lost a few years ago.\"\n\n${blue_name} tries to suppress his laughter, which only brings tears to his eyes. He has no idea how ${red_name} can even distantly resemble a white furry creature. Sister Amie gives him a questioning look, then she realizes the funny part.\n\nThe goblin searches the piles of toys and picks up a snowball. \"This brought her a lot of joy. I wish that you have it.\"\n\n${red_name} takes it. \"Oh, you shouldn't have!\" She gives it a hug and then looks at you. \"Can we bring him along with us?\"\n\n\"I'd really love to come with you, dear sir,\" says the goblin.\n\nYou can't say no to what currently appears to be a creature of the Light. However, you are afraid that it could transform back to a monster when it gets close to a demon.\n\n\"Alright, we have a job to do, but when we are done, we will come here and take you with us back to the monastery.\"\n\n\"You'd really do that? I haven't seen daylight in quite a while.\"\n\n\"You can have my word.\" You say and leave the room.\n*goto 56a\n\n*label 77\n\"It is now time to go to the ritual chamber,\" says ${red_name} and leads the way. The room you come to makes you say a prayer to the light just by the smell of sulphur and suffering. \"We've arrived at our final destination. Now, let's make the ritual happen.\"\n\nThere are five altars and there is a carved picture on each of them.\n\nWhich one should be chosen for the ritual?\n*choice\n\t#The 1st has a bleeding heart.\n\t\t*goto 78\n\t\n\t#The 2nd has a drop (probably blood).\n\t\t*goto 78\n\t\n\t#The 3rd has a demonic-looking rune.\n\t\t*goto 78\n\t\t\n\t#The 4th has a scared face.\n\t\t${blue_name} remembers what ${red_name} read in the book she picked at the library\n\t\t*set riddle +1\n\t\t\n\t\t(You solved a piece of the riddle)\n\t\t\n\t\t*goto 78\n\t\n\t#The 5th has a skull.\n\t\t*goto 78\n\t\t\n*label 78\n${red_name} approaches the altar ${blue_name} chose. \"We already know what the sweet blood is. Now, about the merry snow…\"\n*if (snow)\n\t*goto 79\n\n*else \n\t*goto 80\n\n*label 79\n*set riddle +1\n(You solved a piece of the riddle)\n\n${red_name} looks at the toy the goblin gave her. \"I am sorry, my hairy friend.\" She crashes it on the altar, and then you poor the cherry juice on top. \n*if dragon\n\t*goto 81\n*else \n\t*goto 82\n\t\n*label 80\n${red_name} looks around and sees a bit of wool. \"I hope that will suffice even though I doubt it is that merry or snowy.\"\n*if dragon\n\t*goto 81\n*else \n\t*goto 82\n\t\n*label 81\n\"Now, we need a dragon claw,\" announces ${red_name} and lets the dragon walk on the ground. Then, she grabs his claw and pulls it toward the altar. \"What should I draw? What symbol is the executioner's Light?\"\n*set riddle +1\n\n(Using the claw attached to a real dragon contributes to the strength of the ritual)\n\n${blue_name} scratches his head, trying to remember which of the popular symbols of the light was tattooed on the forehead of the executioner they faced earlier.\n*choice\n\t#A star\n\t\t*set riddle +1\n\t\t(You solved a piece of the riddle)\n\t\t*goto 83\n\t\n\t#A moon\n\t\t*goto 83\n\t\n\t#A sun\n\t\t*goto 83\n\n*label 82\n\"Now, we need a dragon claw,\" announces ${red_name}. ${blue_name} hands her the nail.\n\n\"What should I draw? What symbol is the executioner's light?\"\n${blue_name} scratches his head, trying to remember which of the popular symbols of the light was tattooed on the forehead of the executioner they faced earlier.\n*choice\n\t#A star\n\t\t*set riddle +1\n\t\t(You solved a piece of the riddle)\n\t\t*goto 83\n\t\n\t#A moon\n\t\t*goto 83\n\t\n\t#A sun\n\t\t*goto 83\n\t\t\n*label 83\n\"And now for the final part. We need someone's soul.\" ${red_name} says in a cold, creepy voice.\n\n\"You can take mine,\" Sister Amie steps forward.\n\n\"That is insane, I am not going to kill her,\" ${blue_name} protests.\n\n${red_name} shrugs. \"This is what is written in the instructions. However, I doubt you will manage to sacrifice one's soul unless you have a proper instrument.\"\n\nWhat should ${blue_name} choose?\n*choice\n\t*selectable_if (blade) #Use the ritual knife to take his life and sacrifice his soul\n\t\t*goto 84\n\t\t\n\t#Just say a prayer\n\t\t*goto 85\n\n\t#Do nothing\n\t\t\"Do you remember that line seemed to you as if added later?\" He asks ${red_name}. \"It is obviously a trap, I will just ignore it.\"\n\t\t*goto 86\n\t\t\n*label 84\nWithout saying a word, ${blue_name} plunges the knife in his chest. The pain lasts for a couple of seconds and then he falls into the endless abyss.\n*if (resurrection)\n\tSuddenly, he feels the  hands of his twin flame pulling him back.\n\t\n\t\"What did you do, my silly blue,\" she cries. \n\t\n\t\"The blade just scratched you, your death was cause by something else. It is a cursed piece of metal!\" Sister Amie takes it and throws it away.\n\t\n\t\"And you brought me back, ${red_name}?\" The Abbot wanders.\n\t\n\tShe only nods, tears starting running down her lovely face again. \"The demon was starting to possess me, then I saw you die and the Light in me returned again. You are my\n\tlifeline to its brightness, but he will try to possess me again. I don't know how he manages to be so strong, I thought I was immune to that. Maybe it is because of the cursed place.\" She weeps.\n\n\t\"Everything is going to be alright,\" he assures her and kisses her forehead.\n\t*achieve res\n\t*goto 86\n\t\n*else\n\tIt is a sad end to the adventure.\n\t*goto_scene death\n\n*label 85\n\"Forget about this nonsense. I am a priest and if I need something I do it by praying to the Light,\" says Abbot ${blue_name}\n\nThere is no prayer for a ritual of banishing performed on a dark altar, so he needs to improvise.\n*set riddle +1\n\n(The prayer contributes to the strength of the ritual)\n*goto 86\n\n*label 86\t\n*if (riddle)>2\n\t*if (riddle)>4\n\t\t*achieve riddler\n\t\t*goto 87\n\t\t\n\t*else\n\t\t*goto 87\n*else\n\t*goto 88\n\t\n*label 87\nThe altar starts glowing.\n\n\"Well done! You did manage to complete the ritual!\" says a voice coming from ${red_name}. \nHer facial expression distorts beyond recognition.\n\n\"You've helped me a lot. Thank you, dear priests. You will have my gratitude but let me have some fun before that. You let a pure soul lead you by the nose, so you deserve that,\" says the demon.\n\nSister Amie takes out her sword, but you stop her.\n\n\"You don't want to hurt her. If you slice her, ${red_name} will die and the demon will just run away,\" he reminds her one of the first lessons in exorcism.\n\n\"I feel your blood seething with anger. You can't hold it any longer. Let it all out,\" the demon taunts her.\n\nThe priestess freezes, her sword pointing at ${red_name}. ${blue_name} can only imagine the magnitude of the struggle behind her green eyes. But, it seems that she won, as she puts her weapon down.\n*if (damage)>2\n\t*goto 94\n\t\n*else\n\t*goto 95\n\t\n*label 88\nThe ritual is finished but nothing happens.\n\n\"Fools! You can't even conduct the most stupid ritual,\" says a voice coming from ${red_name}. \"Die!\"\n${red_name} toward ${blue_name}. The last thing he sees is her twisted expression bearing nothing of the child's innocence, before she reaches him and crushes his neck with a single move.\n*goto_scene death \n\n*label 94\n\"I offered you a reward,\" says the demon. \"I swear I really meant to fulfill my promise, but your soul is so holy and so weak right now. I can't resist.\"\n\nThe feeling is hard to describe, but the demon just sucks in ${blue_name}'s soul. The cold abyss takes him away.\n\nThis is a sad end to the adventure. \n*goto_scene death\n\n*label 95\n\"I offered you a reward,\" says the demon.\n\n\"I don't want anything from you. Just free ${red_name}.\"\n\nThe demon laughs. \"I don't feel very comfortable here anyway. Her soul is so holy, so pure. It is like swimming in a lake of chocolate and not being able to even taste it. Not even a powerful demon can crush the soul of a warrior of the Light. \nBesides, the ritual is complete. In a few minutes, I will be gone from this realm, so thank you for letting me go.\"\n\n\"Why do you thank me?\"\n\n\"My duty here is done. I paved the way for a couple of more powerful demons to come. Now, it is time for me to return to the Abyss.\"\n\n\"What do you want?\"\n\nThe demon laughs. \"You already know.\"\n\n${blue_name} does. Feeding on the suffering of others. The weakened souls of those who kill. The exhausted ones of the priests who embrace the dogmas of religion. The Abbot sighs, realizing they won a small battle in the war that will probably never stop.\n\nBut when he looks in ${red_name}'s eyes again, ${blue_name} realizes there is sense in going forward with it.\n*goto_scene flames\n\t\n\n\n"}};
