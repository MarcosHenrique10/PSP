ness, that could be you,\" whispers the Exarch.\n\n\"Are you sure that is a prophecy and not merely a dream... I mean, until last year, I was just a Novice. How can I achieve what no one else managed to?\"\n\n\"I'm sure it was not a dream. I was wide awake at that point and it is not the first time the Light gave me a glimpse of the future. Have you heard about the attempt to assassinate the king last year? Or the mysterious beast ravaging the farms near Foldd?\"\n\n\"Yes,\" you say. \"Both cases ended with the Church interfering…\"\n\n\"... after I rang the bell about what the Light showed me in those visions,\" the old man interrupts ${blue_name}. \"I'm more than sure what I saw... you can make it happen.\"\n*goto 10\n\n*label meet\nBrother ${blue_name} is walking in front of the main building of the monastery. A clatter attracts his attention and he turns around. He sees Sister Amy pushing a feminine \nfigure in front of her. It seems that the hands of the stranger are bound behind her back.\n\n\"${blue_name}, our brethren caught her sneaking in the barracks. She is one of the people of the woods. She is a trespasser.\"\n\n${blue_name} looks at the woman. The vision burns his eyes with the intensity of embers fire, yet he can't look away, attracted like a moth to a camp fire. Curls of brown hair spill from \nunderneath her hood as she raises her eyes to behold his. He adores hers, hazel with a hint of green and capillaries making them look like a raging storm of blood. \n\nHe remembers seeing those eyes in the reflection of the crystal clear water at the mountain spring. His have seen many pretty women, but none of them could match the beauty standing proud   \nbefore him. Her presence hints of no fear. \n\n\"Did you lose your tongue, Abbot?\" Sister Amie scolds him. \"What do I do with her? I suggest sending her to the torture chamber. She could know something we could use.\"\n\nBrother ${blue_name} is at loss for words. He doesn't know the stranger, but yet he feels like they have been together since the beginning of time. He feels he shouldn't hurt her, but\nletting her go would mean losing face.\n\n\"What crime did she commit?\" the priest asks Amie.\n\nThe zealot loses some of her enthusiasm. \"Technically none, but she sneaked in at the barrack. I caught her just in time.\"\n\n\"Nobody is forbidden from entering the barracks, right? Was she in the armory or the area with the training dummies?\"\n\nSister Amie sighs. \"I knew I should have waited. When I saw her near the dummies, I asked a couple of our Novices to arrest her.\"\n\n\"Thank you for telling me the truth, Sister.\"\n\nThe Abbot turns to the woman from the woods. His voice is trembling an he hopes Sister Amie can't feel that. \"What is your name and what are you doing here.\"\n\nThe woman raises her back even more. \"I am ${red_name}, daughter of the forest. My pentacle medallion was taken from me by a priest. It fell down while I was in a hurry and he picked it up. I tried to explain, even begged him, but he was relentless. I only came to reclaim what is mine.\"\n\nBrother ${blue_name} is hypnotized by her voice, a gentle ripple. He needs to hear more.\n\n\"Liar! My boys could never do that!\" Sister Amie cries. She raises her hand but the intensity of the Abbot's glare dissuaded her from hitting ${red_name}.\n\n\"Abbot, you must believe me!\" ${red_name} says in a quiet voice, no more than a whisper, but it resonates deep inside his very soul. He believes her. He couldn't fight it even if he wanted to.\nBut he actually needs to believe her.\n\nWhat should the Abbot say?\n*choice\n\t#Order a couple of randomly picked Novices to search the barracks for the medallion\n\t\t\"Sister Amie I don't like the situation. It is your word against her. I don't want to doubt what you say, but what if you trust somebody who doesn't deserve it. What if that zealot really did what the woman... ${red_name} said?\"\n\t\t\n\t\tThe priestess gets red, but sees the wisdom of the Abbots words and just nods.\n\t\t\n\t\t\"${red_name}, could you please describe the priest who took your medallion?\"\n\t\t\n\t\tThe Abbot gulps, his eyes open wide, trying to engulf the majestic entity standing before him. He can barely hear her words, but they are melting him. It is as if he sees the Light for the first time.\n\t\t\n\t\t\"This must be Brother Brone,\" says Amie.\n\t\t\n\t\t\"Very well. Sister, would you please pick two novices and tell them to search the barracks and especially Brother Brone's belongings?\"\n\t\t\n\t\tSister Amie shouts at two boys to come and then she explains the task to them. \"Shall I say that if any of you finds the pentacle, there will be a big reward. What if I teach my very special halo sword jab.\"\n\t\t\n\t\tThe eyes of the Novices fill with hope and they run toward the barracks.\n\t\t\n\t\t\"Sister Amie, you always know how to motivate the new recruits, that must be given to you,\" Abbot ${blue_name} says.\n\t\t\n\t\tThe zealot smiles. ${blue_name} sees that ${red_name} is shaking a bit. He finds himself filled with desire to comfort her.\n\t\t\n\t\t\"What bothers you, woman of the woods. Do you doubt the medallion being there?\" ${blue_name} tried to make his voice sound authoritative, but what comes out has too many hints of caring.\n\t\t\n\t\t\"I am afraid that they won't manage to find it. I don't want anybody to believe I am a liar because I am not. I have my dignity.\"\n\t\t\n\t\t${blue_name} marvels at her. Here she is standing, captured by hostiles, her hands tied behind her back. And, she is standing tall, afraid not for her safety, but for the dignity of her words.\n\t\t\n\t\t${blue_name} was falling in for her. Deeply. \"Worry not, my..., those guys will give a hand and leg for a private lesson by Sister Amie.\"\n\t\t\n\t\tIt wasn't long before the boys come running and shouting. They are almost fighting, unable to decide who really got the pentacle.\n\t\t\n\t\t\"Quiet,\" Sister Amie shouts. \"You will be both taught to use my special finishing move. Now, I can't wait to find Brone. I will beat him so hard he would beg to leave the monastery and never return!\"\n\t\t\n\t\t\"Sister, don't make anything you may regret,\" ${blue_name} warns her, but he knows she won't hear. He takes the pentacle from the Novice and puts it around ${red_name}'s neck. Fire burns him as his fingers slide down her hair. So soft, smelling of wild \n\t\tflowers. She looks up and smiles and millions of galaxies dance in her eyes.\n\t\t\n\t\t\"Thank you priest. May mother Nature bless you.\"\n\t\t\n\t\tBrother ${blue_name} wants to protest. The puritan in him wants to say that he doesn't accept any blessings other than those related to the Light. But he can't fight.\n\t\t\n\t\t\"What do we do now, Abbot?\" asks Sister Amie. \"I suggest we send her to the torture chambers just in case she has something to tell us.\"\n\t\t*set pentacle true\n\t\tWhat should Brother ${blue_name} say?\n\t\t*choice\n\t\t\t#Set her free\n\t\t\t\t\"Sister Amie, do you think such an action would be in alignment with the Light we are all trying to serve?\" ${blue_name} asks the priestess.\n\t\t\t\t\n\t\t\t\tShe doesn't answer. The Abbot takes it as a silent agreement. \n\t\t\t\t\"Set her free, please.\"\n\t\t\t\t*goto set_free\n\t\t\t\n\t\t\t#Send her to the dungeon\n\t\t\t\t\"That is a good idea, Sister. I am sure she can tell us something valuable about her people.\"\n\t\t\t\t\n\t\t\t\t\"But on what ground are you taking me there? I proved that I had a reason to be here,\" ${red_name} raises her voice. ${blue_name} tries to fight the feeling of a dozen knives tearing his soul apart.\n\t\t\t\t\n\t\t\t\t\"You shouldn't have come here,\" is all the Abbot can say.\n\t\t\t\t\n\t\t\t\tThen Sister Amie takes her away.\n\t\t\t\t*set flame -3\n\t\t\t\t\n\t\t\t\t(Your twin flame relationship decreases by 3.)\n\t\t\t\t*goto dungeon\n\t\t\t\n\t#Set ${red_name} free\n\t\t\"You must be out of your mind!\" Sister Amie shouts. \"How can you show such disrespect to me. I didn't catch that woman from the woods so that you release her.\"\n\t\t\n\t\tThe Abbot raises his voice too. \"Sister, I would kindly ask you not to listen to the voice of your ego, it speaks bad for any priestess of the Light. Should I explain \n\t\tthat according to the customs of the monastery, this woman committed no crime. Set her free, please.\"\n\t\t*set respect -1\n\t\t*set flame +1\n\t\t\n\t\t(Your respect decreases by 1 but your twin flame score increases by 1.)\n\t\t*goto set_free\n\t\n\t#Send ${red_name} to the torture chambers\n\t\t${red_name} looks at the Abbot and only for a split second he senses a hint of fear in her beauty. That fear burns him so bad that he needs to step back lest he falls.\n\t\t\n\t\tThe woman from the woods doesn't fight. She just walks towards the ugliest building on the monastery campus. It seems she has accepted his fate. The realization makes him want to cry so badly. The haze of tears smears the \n\t\timage of the two women vanishing into the torture chambers.\n\t\t*set flame -2\n\t\t\n\t\t(Your twin flame relationship decreases by 2.)\n\t\t*goto dungeon\n\n*label set_free\n*page_break\nSister Amie cuts the ropes tying the wrists of ${red_name} and the priestess walks away, seething with rage. The woman from the woods massages her wrists.\n\n\"Thanks for letting me go, Abbot. I appreciate it. I need to be on my way.\"\n\nThe priest looks as she turns her back and his heart skips a beat, unable to take the vision of her grace as she does that. He can't take the thought of her leaving, of never seeing her again.\n\n\"${red_name}, wait!\"\n\nShe stops.\n\n\"Do you have the time to join me for a cup of tea. It won't take much,\" says ${blue_name}.\n\nThe Abbot would be pleased if he could see the smile of the hooded female. She needs to take a deep breath. On one hand, she wants to get out of the cursed monastery. On the other hand,\nshe wouldn't want to miss the opportunity to spend some more time with the hot priest.\n\nWhat should the witch do?\n*choice \n\t#Accept ${blue_name}'s proposition\n\t\t\"So be it, I have some more time before my brethren start worrying about me,\" ${red_name} says and turns around. As she steps closer to the Abbot, she has the feeling she can walk all the way into his arms.\n\t\t\n\t\t\"Welcome to the monastery, dear ${red_name}. Let me take you to a place where we can be alone.\"\n\t\t\n\t\tThe expression on his face shows ${red_name} that even he is surprised by what he says, but the closeness they suddenly discover makes her smile. She somehow knows that in the next hour or so she is going to smile more than she did during the last month.\n\t\t\n\t\tThey head for one of the buildings. On their way, they meet several priests. Most of them look at her with judgement. ${red_name} understands them completely. They know she is a witch, a protector of the forest,\n\t\tan enemy of the Light they serve. Some of them feel betrayed by the Abbot. They are insecure.\n\t\t*set respect -1\n\t\t\n\t\t(Your respect score decreases by 1.)\n\t\t\n\t\t${red_name}, however, is amazed by the reaction of the Abbot. He doesn't seem to care at all. It seems as if he is in another world in which he no longer carries the \n\t\tweight of the cassock. And those eyes of his, they spend so much time tingling her milk-white skin.\n\t\t\n\t\t\"This is my study, please welcome,\" The Abbot opens the door and invites her to enter first.\n\t\t\n\t\t\"I am not very used to being treated this way,\" ${red_name} admits. \"We don't have that ritual, but I have seen several of the zealots do so. Women tend to appreciate it.\"\n\t\t\n\t\t\"This is truly the way zealots are taught, women are supposed to be weaker and should be protected... unless they are trespassers. While there is some charm in treating women that way, I don't think it is entirely true.\"\n\t\t\n\t\t\"Do you mean Sister Amie?\" ${red_name} asks and they both laugh.\n\t\t\n\t\t\"She really is on fire to prove no man can be a match to her in her zeal. Last time a male Novice tried to open the door for her she felt so offended that she literally pushed him in as if he were a straw target dummy.\"\n\t\t\n\t\t\"Well, I don't mind it when you do that for me.\" ${red_name} realizes that the soft tone she uses makes his cheeks red. She knows she is flushing too.\n\t\t\n\t\t\"It wouldn't be bad it I stick to my manners. Please, have a seat. I will try making an echinacea tea.\"\n\t\t\n\t\t${red_name} sits and takes a look at the study. \"It is a very spacious chamber. There are so many books on the shelves. And so much parchment. You probably write a lot.\"\n\t\t\n\t\t${blue_name} returns on the table with two cups and pours a liquid in each. He then handles one to ${red_name}.\n\t\t\n\t\t\"Yes, sometimes I think the Light talks to me and I feel the need to write. As the Abbot here, I have everything I need - parchment, ink, quills... and time. I also make sure \n\t\tthose resources are available to any of my Brothers or Sisters who feel they have wisdom to share.\"\n\t\t\n\t\t\"You are a wise man, ${blue_name}, I wish all of our men could be like that.\"\n\t\t\n\t\t\"Do you have anything to complain about, dear ${red_name}? Do they treat you bad?\" the Abbot asks.\n\t\t\n\t\tThe witch sighs. \"I don't think I have the right to do that. They really are not bad people. It is just that I am not exactly in heaven out there.\"\n\t\t\n\t\t\"I can say that about my situation here, even though I am treated as a king all the time, by everybody but Sister Amie, but I really need that so that I don't forget who I am.\"\n\t\t\n\t\t\"I see.\" ${red_name} was beginning to feel very comfortable. She had the vague feeling that time was flying. \"I have to go. By the way, have you tried making tea with hot water? It tastes better.\"\n\t\t\n\t\t${blue_name} raised his eyebrows. \"No, thank you for telling me that. If you must, then do so. I hope you come back to visit me one day,\" he says even though he knows she most likely wouldn't want to do that. \"Shall I see you off?\"\n\t\t\n\t\t\"No, thanks, you did enough for me.\"\n\t\t\n\t\t\"No, I can't let you be arrested again. Here take this.\" The Abbot gives her his ring. \"Give it to the first Novice you see ans ask them to be escorted out. Then, they will return it to me.\"\n\t\t\n\t\t\"Thank you,\" says ${red_name} as she takes the ring. \"For everything.\"\n\t\t*set flame +2\n\t\t\n\t\t(Your twin flame relationship increases by 2)\n\t\t*goto next\n\t\t\n\t#Save it for some other time\n\t\t\"I really have to go, priest,\" says the witch.\n\t\t\n\t\t\"So be it, dear witch.\"\n\t\t\n\t\tShe is surprised by the way he addresses her and she can feel the sadness in his voice without being sure why.\n\t\t*goto next\n\n\t#Decline\n\t\t\"I am one of the forest. Do you think I am feeling comfortable here?\" ${red_name} asks. She hopes she is not too rude.\n\t\t\n\t\t\"I understand.\"\n\t\t\n\t\t\"There is a big abyss between us, Brother. I am a witch and you are a priest. There may be a day on which I will be able to cross the bridge, but this day is not today.\"\n\t\t\n\t\t${blue_name} feels his heart cut so badly he can't even shriek.\n\t\t\n\t\t${red_name} leaves the monastery grounds.\n\t\t*set flame -1\n\t\t\n\t\t(Your twin flame relationship decreases by 1.)\n\t\t*goto next\n\t\t\n*label dungeon\n${red_name} is freaking out. She is trying her best not to show it as she is strong enough to fake it, but she knows she is being taken to the place her people fear the most. There she is going to be at the mercy of the priestess.\n\nAs soon as she enters the door, she feels her world is ending. A small part of her wishes she could end her life quickly, but she knows even this comfort is denied to her. She doesn't fight Sister Amie along the way, nor does she when she chains her to the wall.\n\nThat moment the Abbot comes.\n\n\"Thank you for your services, Sister. You are now free to go,\" he says to the priestess.\n\n\nThe Sister leaves and Brother ${blue_name} is the only one at that part of the building. Much to her surprise, the Abbot\nsteps closer and unlocks her chains. \"Would you be able to forgive me for what I did?\"\n\n\"I will be brutally honest, Abbot. I hope you find your peace and know what you want, because your actions left me very confused about your intentions.\"\n\n\"Go with my blessings, dear one.\"\n*goto next\n\t\t\t\n*label 10\nBrother ${blue_name} exits the Cathedral. It is cold outside and there is still snow here an there in the capital city, but he continues to sweat. He knows that what just happened will change his life forever.\n\nThere are several places he wants to visit. He has to tell his fiancee who at this time of the day is in the infirmary, taking care of the wounded. She is a Sister and unlike ${blue_name}, she \nhas the gift of healing touch. The priest takes a deep breath, not sure he really wants to tell her, but he understands he has no choice.\n\n${blue_name} realizes that as an Abbot, he would need people who he can trust. His first thought is about Brother Thomas, his trainer in sword fighting, the one who really believed in him and \nhelped him raise in the clergy rankings. He was also eager to duel him with a wooden sword. This activity usually helps him release stress and this is what he really needs.\n\nBrother Rome is another he hopes to agree to join him on the mission. Unlike Thomas, Rome is quite old he has been suffering from illnesses associated with his advanced age and that may present a hindrance to him. The wise librarian has always been a source of wisdom and \n${blue_name} would have a hard time if he has to be separated from him.\n*goto 10a\n\n*label 10a\n*page_break\nWhere should Brother ${blue_name} go now?\n*choice\n\t*hide_reuse #The infirmary\n\t\t*goto infirmary\n\t\t\n\t*hide_reuse #The training range\n\t\t*goto range\n\t\t\n\t*hide_reuse #The library\n\t\t*goto library\n\t\t\n\t#Finished with visiting those places\n\t\t*goto 11 \n*label infirmary\nThere is a lot of hustle in front of the infirmary. It seems that there has been an incident involving a few woodcutters. Nobody prevents ${blue_name} from entering the building or even asks \nwhat you he is doing in, but the priest is very careful not to stand in the way of the his brethren.\n\nIt seems that his appearance makes a young Novice drop the infusion she's carrying. Brother Jensen, the chief healer, gives her a threatening look, his dark eyes glistening in the torch light.\n\n${blue_name} beholds a terrible sight in the middle of the infirmary. It seems that the shoulder of the man has been stripped of all the flesh. And the blood... there is so much blood.\n\nBrother ${blue_name}'s close friend Novice Lilly faints and only the quick reaction of Sister Amie saves her from hitting the floor.\n\n\"Get her outside,\" Brother Jensen asks another Novice. It is only then that ${blue_name} sees his spouse, Sister Jay. Her long blonde hair is knit in a couple of pony tails. Her green eyes seem more watery than usually. She tries not to flinch, just like a true \nhealer with quite a lot of experience should, but you know that deep inside she is not oblivious to anyone's pain.\n\nJensen tells her \"He is suffering too much. End his pain. Present him with the gift of mercy.\"\n\nYou look in her eyes. You know she won't obey. \"No, I can handle it.\"\n\nBrother Jensen decides to back off. Jay crouches and starts praying. The expression on her face changes. Then, the whole of her face turns into something ${blue_name} has seen before. \nA reptilian being with glowing yellow eyes and razor sharp teeth. ${blue_name} knows what is going on. Jay needs to return to her real form in order to feed on the pain and injuries of the man so that there is nothing left. It is ugly, but \nbeneficial to the one being healed, and so the church approves.\n\nWhen the prayer is over, Jay finally sees ${blue_name} and asks him to go out with her so that they can talk.\n\nBrother ${blue_name} doesn't feel very comfortable having to tell her that he is going away, especially after she had to deal with an emergency, but he knows that it is better for him to do it now and \nget it over and away with.\n\nWhat is the state of the relationship between ${blue_name} and Jay?\n*choice\n\t#They are still in love\n\t\t\"What? Are you telling me you have to leave the capital?\" Jay asks with a confused half smile.\n\t\t\n\t\t\"You understand that I must do that, even though I don't really want to be away from you. I was hoping you would come with me.\"\n\t\t\n\t\t\"Well, I have just a couple of years before I finish my training in healing. You know that the best teachers are here in the capital. I can't follow you \n\t\timmediately but you can bet I will be back after I am a true healer. Who knows I may be able to resurrect even.\"\n\t\t\n\t\tBrother ${blue_name} sighs.\n\t\t\n\t\t\"I knew you would say that and I really don't want you to stray from your path, my dear.\"\n\t\t\n\t\tSister Jay smiles. \"I won't let you go so easily, my Alpha wolf. I can come often to keep the fire burning. Who knows, the distance may be a fuel for the desire we share.\"  She gets closer to him and \n\t\tcan feel the tension, his breath becoming laboured. To increase the effect even more, she puts her hand on his chest and puts a seductive smile on her face, content for the oil she is pouring into the fire\n\t\tin his heart.\n\t\t\n\t\t\"You are free tonight, aren't you?\" ${blue_name} asks with hope.\n\n\t\t\"I will prepare a very hot surprise for you. You will remember that night for the rest of your life, I promise you that.\"\n\n\t\tSister Jay winks at him, removes the snake amulet from her neck and throws it as ${blue_name}.\n\t\t\n\t\t\"Something to remember me and always carry next to your heart.\" She blows him a kiss and enters the infirmary.\n\t\t\n\t\tBrother ${blue_name} pauses for a second, then puts the amulet on.\n\t\t*set flame -1\n\t\t\n\t\t(Your twin flame relationship decreases by 1 because it seems Brother ${blue_name}'s heart is not unoccupied, but at least you have Sister Jay's healing amulet.)\n\t\t*set healing_amulet true\n\t\t*goto 10a\n\t\t\n\t#Their hearts have gone cold\n\t\tSister Jay listens to ${blue_name}'s explanation without showing too much of an emotion.\n\t\t\n\t\t\"How do you feel about it?\" she asks coldly.\n\t\t\n\t\tBrother ${blue_name} remains silent. He knows very well how he feels inside. Their relationship was over a long time ago. It was never meant to be. The strong physical \n\t\tattraction was all that kept them together all the time, but his soul desires more, and that priestess is different, so much different from him.\n\t\t\n\t\t\"It must be the perfect reason for you to get away from me, isn't it?\"\n\t\t\n\t\t\"I didn't see that one coming,\" he tries to change the subject.\n\t\t\n\t\t\"You know that nobody can complete me the way you do, but you keep running away from me,\" she says in a low voice.\n\t\t\n\t\t${blue_name} sighs. This is what drives him nuts. Jay always tried to make him fit into the reptilian model of partners fighting each other and trying to dominate.\n\t\tHe would rather run away. No, he'd rather die than be in her reach again.\n\t\t\n\t\t\"Come on, Jay, do you remember how many times you called me an asshole, cold as a rock, irresponsible to your desires. Believe me, you don't want me by your side! That is not an act of \n\t\tloving yourself. You don't love yourself and in that way, you can't really love me,\" he almost shouts.\"\n\t\t\n\t\t\"Things don't work that way among us, my dear. When our kind binds, we stay together. Pain and pleasure, honey and poison, they are all mixed in what we call love.\"\n\t\t\n\t\t\"I can't be in such a relationship, Jay, you must understand. I am not like that.\"\n\t\t\n\t\tThe pupils of her eyes become vertical, her having a difficulty keeping her human form intact. \"Do you realize how much suffering you are bringing me with that statement? Do you\n\t\tunderstand that I will love you even more for it? I shall thank you for it, because when you run back to me, the emotions you will find will be quite intense.\"\n\t\t\n\t\tBrother ${blue_name} decides to just walk away, once more finding out that the two of them are speaking very different languages.\n\t\t\n\t\t*set flame +1\n\t\t(Your twin flames score increases by 1 because Brother ${blue_name}'s heart is not occupied)\n\t\t*goto 10a\n\n*label range \nIt is quite noisy at the range. There a lot of young zealots having their daily training. It is not hart to spot Brother Thomas, he is shouting obscene encouragements to \na couple of boys. He was received several warnings about having to use a vocabulary more in alignment with the Light and there have been cases in which Novices had to sign for another instructor, but even high clergy can't deny \nthe effectiveness of his methods on the ones who manage to align themselves with them.\n\n\"Thomas!\" ${blue_name} approaches him. The instructor turns around and smiles under his bushy moustache. He must be in his mid to late 40s but his physique leaves little doubt he could \nbe a real challenge for just about anybody decade and a half younger than him.\n\n\"Good to finally have your ass here, ${blue_name}. I can't believe you prefer sitting at tables and listening to crap when you could be dancing with a sword. And I know what fate \nhas chosen for you may involve even more of that.\"\n\n${blue_name} raises his eyebrows. \"Do you already know?\"\n\nThomas nods. \"I may intentionally stay away from high clergy because I do want to use my sword to cut their tongues sometimes. But I do have my channels of information. I am not stupid.\"\n\n\"I need you to come with me, Thomas. I want to have people that I can trust where I am going. You really were a fatherly figure to me...\"\n\nBrother Thomas coughs to interrupt him and then laughs.\n\n\"Please, don't even presume to praise me. I am good at dealing with weapons and warfare not words. So I will waste no more and tell you that I am coming with you. I guess I can't stand the climate here.\"\n\n\"Thank you, that means a lot. But it was you who taught me that you can't escape yourself, so it is rarely a good decision to run, one must stand up and fight.\"\n\n\"I am just advancing in the right direction and I can continue fighting elsewhere. And, who knows, I can find the warrior chick I have been searching for. All the women here are such... you know.\"\n\n\"But most men like them this way.\"\n\nThomas shrugs. \"Now, unless you are going to actually train, I would like you to turn your back and move away.\"\n\n\"No, of course I will train. I want to try what I like the most.\"\n\nWhat is it?\n*choice\n\t#Sword fighting\n\t\t\"I doubt you are ready for what you are asking for,\" says Thomas.\n\t\t\n\t\t\"I do not fear being defeated by you. There is no failure, only experience, you know.\"\n\t\t\n\t\t\"Then we have a long history of me giving you experiences.\"\n\t\t\n\t\t${blue_name} smiles. \"This is why you are the teacher and I am the pupil.\"\n\t\t\n\t\t\"You always had a smart mouth. Too bad your expertise with the sword is on a much lower lever.\"\n\t\t\n\t\tThe fight appears to be be pretty one sided. Thomas disarms ${blue_name} after a furious exchange of blows but allows him to pick the weapon agains. ${blue_name}, however just can't keep with the aggressive\n\t\tstyle of Thomas and ends falling on his back. The instructor points his sword at the younger man's neck.\n\t\t\n\t\t\"You are improving, my son. You are beginning to give me quite a lot of a sweat. And don't tell me I am getting old.\"\n\t\t\n\t\t${blue_name} gets the hand offered by his instructor. \"Thank you, Brother. I wish you a peaceful day.\"\n\t\t*set sword_fighting true\n\t\t*goto 10a\n\t\t\n\t#Unarmed fighting\n\t\t\"I have always questioned your choice to specialize in unarmed warfare. It is plain obvious that your chances of survival against an armed opponent are minimal,\" reminds you Thomas.\n\t\t\n\t\t\"I know, but there are situations in which you may not have the weapon by your side. It is better to be prepared,\" ${blue_name} replies.\n\t\t\n\t\t\"I see that point. Just let me tell you that I am not super excited to leave my weapon, but I also teach unarmed fighting, so I guess I don't have much of a choice.\"\n\t\t\n\t\tThe two men warm up for a couple of minutes and approach each other in battle stances. They know what to expect from each other, so they keep dancing for quite a while \n\t\tbefore ${blue_name} launches himself low under his instructor's guard, then take his hand and throws him over his shoulder. He gets slightly worried, really not wanting to have hurt the older man, but \n\t\the knows in those moments showing any affection would be considered as an insult.\n\t\t\n\t\t\"You are getting better, my child. Keep up the good work,\" says Thomas.\n\t\t\n\t\t\"Thank you, Brother. I think I've had enough training for today and still have a few matters to attend. I wish you peace.\"\n\t\t*set unarmed_fighting true \n\t\t*goto 10a\n\t\n\t#Shooting\n\t\t\"With your mediocre skills in armed combat, it is easy to understand that you don't want to allow any enemy close to you,\" laughs Thomas.\n\t\t\n\t\t\"Yes, I don't want to give them any chance, this is exactly what I plan to do.\" ${blue_name} does not get any offense by what his instructor's words.\n\n\t\tThe two men move to the shooting range and try their luck with crossbows and then long bows. ${blue_name} gets slightly better results.\n\t\t\n\t\t\"You are more skilled as a marksman,\" Thomas admits. \"I guess I have to work on my concentration. But I still think I can have better results under pressure, when the enemy is near.\"\n\t\t\n\t\t\"I agree so. Thank you for your time, Brother Thomas, still have a few matters to attend. I wish you peace.\"\n\t\t*set shooting true \n\t\t*goto 10a\n\t\t\n*label library\nThe old library smells of mold. Several Novices look at you as you enter, ceasing the big books they are reading for a second before continuing their pursuits. It doesn't \ntake long to find Brother Rome, his hunched figure taking care of a pile of parchments ready to be ascribed.\n\n\"Do you know why I always like seeing you?\" the old man asks ${blue_name} instead of a greeting.\n\n\"Why, Father?\" The younger priest manifests his respect.\n\n\"Because you are among the very few of the zealots who take the time and energy to come here and read. I don't want to say anything bad about your order, I know that your role is to be warriors of \nthe faith, to protect us all against physical danger. But, there are the ones like you who manage to put into their agenda paying homage to the scribes who spent countless ears coding wisdom. And, I heard you were \npretty good with the sword too.\"\n\n\"There certainly are better than me.\" ${blue_name} blushes.\n\n\"Well, whatever the reasons were, none of them has been selected to head a mission as important as the one in the great clearing.\"\n\n\"You know about it too?\"\n\n\"Book rats somehow have the ability to receive information before everybody else.\" He raises his fist.\n\n\"Then you probably know I am going to invite you to come with me.\"\n\nThe old priest shakes his head. \"No, this one I didn't anticipate. Don't you see how old I am? My mission is very close to its termination day. This flock of Novices you see in the hall is probably the \nlast I will be able to help ascend. If I come, I will very soon be a liability to your mission.\"\n\n\"Oh, don't speak like that about yourself!\" Brother ${blue_name} protest.\n\n\"Truth is sometimes ugly, but it is still better than a beautiful lie. I won't come with you, but I will try to help you a little bit. The information I am going to give you access to is not for everybody, and \nthe role the Light has given you is not of anybody, my son. Please, follow me.\" Brother Rome takes the young man to his private chambers and then opens a secret tunnel. The priest descends a winding staircase and come to a small room. Light comes through a series of mirrors.\n\n\"This is where I usually write. Also, some of the books you see on the shelves can potentially get me in trouble because they are forbidden, but my intuition tells me to trust you. Besides, at this point, I don't \nhave much to lose anyway,\" says Brother Rome. \"Now, let me see what I can offer you. You can stay here and read, although I don't believe you have too much time to do that. This is my favourite tome of \nprayers. It is pretty vanilla, but still helps me cleanse my soul when I am angry or fearful.\n\n\"The black book next to it is my work related to the church dogmas. I guess there is no need to tell you that there is some demagogy supported by the higher clergy. I have spent \na lot of energy trying to expose it and bring an end to it, but the high clergy believes that it is vital to use low punches to control the masses. I don't actually recommend you choosing that book. It made\nme feel very dirty writing it and I still shiver even thinking about it.\n\n\"When you get to the clearing, you will indubitably meet the people of the forest. Their system of beliefs is regarded as a taboo by many priests, but there is Light in them as well... probably even more that\nwhat we believe in. The green book is about them.\"\n\nBrother Rome scratches his beard. \"I see a trail in your aura. When I was younger, I didn't know what it meant, but now I do and this is what the book I am currently writing \nis about. I believe your soul is a double one, a twin. The trail I see is the connection to another soul. If you choose, I will tell you more about it.\"\n\nWhat would Brother ${blue_name} decide?\n*choice\n\t#Pick the book of prayers\n\t\tReading the prayers feel good and enables Brother ${blue_name} to better connect with his higher self.\n\t\t*set light +1\n\t\t\n\t\t(Your alignment with the Light increases by 1)\n\t\t*goto library2\n\t\t\n\t#Read about the dogmas\n\t\tThe book proves many of the theories Brother ${blue_name} has. The Light is not almighty as the clergy likes to believe, it is pure and sends no hardships in order to test its children. And there is no hell\n\t\tif you don't obey the dogma's of the church.\n\t\t\n\t\tAll that information is very useful, but it fills Brother ${blue_name}'s soul with negativity.\n\t\t*set light -1\n\t\t\n\t\t(Your alignment with the Light decreases by 1)\n\t\t*goto library2\n\t\t\n\t#Inform himself about the pagan beliefs\n\t\tBrother ${blue_name} reads in amazement. He never believed a priest could write with so much love about anything beyond the traditional teaching popular within the Church of Light. However,\n\t\tBrother Rome depict the Goddess the forest people revere as a carrier of very pure Light. He believes it can be used as a medium to connect to the Light and in many cases, he claims, can be more useful and powerful.\n\t\t\n\t\t${blue_name} looks at the older man. If anyone read that heresy, Rome would be exhaled as a traitor. But, he could tell that he was speaking his heart out and he had the experience to really make him believe in it.\n\t\t\n\t\tThe young priest decides to keep his heart open for the time when he would have personal experience with the cult of the Goddess.\n\t\t*goto library2\n\n\t#Ask about twin souls \n\t\t\"I still have to write it down, my young friend and I hope I will be able to do that. I only recently came about this wisdom in a very deep meditation. You see, many souls are created by \n\t\tthe Light as doubles. They are inseparable, but each of the halves is connected to different bodies, different people. Usually, they are a male and a female and when they meet, the world becomes a better place.\n\t\tWell, I haven't experienced that but I have spoken to angels and other ascended beings who speak about their twin souls (or twin flames) with such reverence and love... It seems that the link between the two parts of the soul is sealed \n\t\twith pure Light.\"\n\t\t\n\t\t\"And you believe that I will meet such a woman?\" Brother ${blue_name} asks with surprise.\n\t\t\n\t\t\"Yes, the soul trail I see you leave suggests that there is that special someone whom, when you meet, the whole of reality of yours will shift and become a dream of Light and love.\"\n\t\t\n\t\t\"Thank you for your kind words, teacher.\"\n\t\t*set flame +1\n\t\t\n\t\t(Your twin flame score increases by 1)\n\t\t*goto library2\n\t\t\n*label library2\n*page_break\nYou realize you can spend eternity here, but time is ticking away and you have other places to visit. Also, Brother Rome seems to be getting tired and you want to let him have his rest. you bid hum farewell and leave the library.\n*goto 10a\n\n*label 11\nThe day is coming to its end. Brother ${blue_name} starts feeling tired and heads for his personal quarters, thinking about the shortly departure towards the great clearing.\n\nHe sees one of his acquaintances, Sister Cabala. Honestly, he doesn't feel much like talking to her. He knows she likes him and enjoys spending time with him, but her soul is poisoned.\nUnfortunately, the Church of Light seems to need such ruthless individuals in order to extract information from its victims and excel in manipulation and mind control.\n\nBrother ${blue_name} suddenly stumbles and falls. Cabala's laughter ripples in his ears. \"You wouldn't have noticed me otherwise, would you?\"\n\n${blue_name} stands up and dusts off his clothes. \"Well, hello, Sister. I hope you are having fun.\"\n\nHe looks at her. Many Novices consider her beautiful and he can't deny that there is certain charm in her proportionate features and long jet black hair. However, her watery blue eyes are as cold as an icicle.\n\n\"Not, yet, but I am heading toward the torture chambers. I heard there is someone who needs extra attention. Would like to accompany me? I know that you are going and it might be one of the last opportunities to spend\ntime with me... in a while?\"\n\n\"You don't plan to follow me to the great clearing, do you?\" Brother ${blue_name} asks.\n\n\"I tend to be where the action is. Are you coming with me? I know you said you weren't into enjoying breaking other people, but I can teach you how to enjoy it.\"\n\n${blue_name} realizes a part of him wants to go with her, but he is also almost sure this desire is just a projection of hers.\n\nWhat would he reply?\n*choice\n\t#\"Not even in a million years!\"\n\t\t\"There is no need to be rude, dear ${blue_name}, even though I do enjoy bony walnuts even more.\"\n\t\t\n\t\tSister Cabala blows him a kiss and continues on her way. He spends a few seconds, not sure why such an evil creature would be interested in him.\n\t\t*set light +2\n\t\t\n\t\t(Your alignment with the Light increases by 2)\n\t\t*goto 12\n\t\n\t#\"Okay, as long as it doesn't take too long.\"\n\t\tSister Cabala's eyes embrace him and they head toward the torture chambers together. For the duration of the next hour or so, Brother ${blue_name} doesn't feel like himself.\n\t\tMany of the things he sees doesn't feel like he wants to see and if he enjoys them it is just a reflection of Sister Cabala's satisfaction of twisted need.\n\t\t\n\t\tIn the end, ${blue_name} feels exhausted and his soul contaminated.\n\t\t*set light -4\n\t\t\n\t\t(Your alignment with the light decreases by 4)\n\t\t*goto 12\n\t\t\n*label 12\n*page_break\nThe next morning, Brother ${blue_name} and Thomas get on the carriage and start their journey to the great clearing. It takes them the whole day to even reach the skirts of the mountains. The two men get tired, despite the many stops to let the horses rest or even to exchange them with freshly powered ones.\n\nWhen the night falls, Brother ${blue_name} hears the howl of the wolves and says a quick prayer for the Light to protect them. It seems it works, because the carriage manages to reach its destination the following morning.\n\nThe last stop is at the woodcutters' village, where the cabman stops for the last time to ask for the way. The monastery can be seen towering it, but it is hard to realize the shortest way to it. It turns out to be really narrow and winding.\n\nAt first glance , it doesn't seem very different from the campus ${blue_name} is used to. The cannon extends even to building design.\n\nA Novice directs the newcomers to the building where, he said, they were expected. The cabman leaves the two priests in fron of the main building and heads for the stables.\n\n${blue_name} and Thomas are greeted by a man and a woman, who invite them to join them in the conference room.\n\nHe is in his mid 40s, with long graying hair and imposing beard. His aura is very pleasant and it is not hard for ${blue_name} to imagine him with a pair of big wings, like an angel. He is wearing\na white cassock with golden embroidery of a moon and sun below his shoulders. There is a broad sword in a sheath on his waist, but his lack of armour suggests he is not \na zealot.He introduces himself as Brother Jacob. \n\nThe woman is a tall blonde in her late 20s and she is wearing the chainmail uniform of a zealot, just like Thomas and ${blue_name}.\n\n\"Welcome to the monastery, dear ones,\" says Jacob.\"Sister Amie and me were chosen to take care of the matters concerning the administration before the new Abbot arrives. We would also \nbe glad if we can continue giving our contribution as much as our experience allows us.\"\n\n\"I don't have much administrative experience,\" ${blue_name} says, not sure if he is making a good choice admitting a weakness of his.\n\n\"You don't need to worry about it. You can always rely on our help. And as long as you respect us, we will be one team,\" says Sister Amie.\n\n\"There is one topic I would like to discuss, and then I am going to show you your quarters,\" says Jacob.\"What are your directives regarding the mission of the clergy in the monastery?\nBy what principles are you going to be guided?\"\n\n\"I will tell you what information I got from the Exarch. Our mission here is one of non-intervention, of support. The woodcutters need the timber and there is some export going on because \nit is needed for the people of the planes to keep warm in winter. I have heard about a tribe leaving in the forests that regards the trees as sacred and often tries to sabotage the \nwoodcutting, often providing work for the healers. I am afraid I don't know how to treat them,\" Brother ${blue_name} says.\n\n\"I guess it may be up to you to decide and set the general policy about it. The clergy is divided on the subject. I believe that our services should be extended to them as well because\nwe are all humans,\" explains Jacob.\n\n\"I disagree,\" says Amie. \"I have been on a mission of escorting woodcutters. It involves exposing priests to great danger. Being so passive makes little sense to the \nzealot in me. Would you agree?\" she looks at you and Thomas for support. It seems that Thomas is just enjoying the contact with the young lady. \n\n${blue_name} just shrugs. \"I need more time to be able to make up my mind.\"\n\nJacob nods.\"I see, are there any questions you would like to ask us or shall I show you your quarters?\" \n*goto 13\n\n*label 13\n*page_break\nWhat would you like to ask?\n*choice\n\t*hide_reuse #What are your specialisations?\n\t\t\"I have spent my life learning about a little bit of everything. It was a nice experience to try a bit of healing, confessing, exorcising and even sword wielding. I believe that \n\t\tthis combination made my brethren choose me as one of the people to be temporarily in charge of the role of the Abbot. I however, was truly unable to instill discipline \n\t\tin the hearts of the zealot, this is where the expertise of Sister Amie comes.\" Brother Jacob smiles.\n\t\t\n\t\tBrother ${blue_name} turns to the woman. \"I hope you don't feel threatened by us. I can guess you may feel that, seeing that we wear the armour of zealots.\"\n\t\t\n\t\tHer blue eyes meet his and he is amazed by the power lurking inside. \"It all depends on you, Abbot. Nobody knows better the warriors of the monastery. Letting me continue doing my job\n\t\twill only be of the best interest to the church of Light. I guess there is no need to explain that zealots are very important in these turbulent times. The fact that one of our order is \n\t\tchosen as the Abbot speaks by itself.\"\n\t\t\n\t\t\"There is no need to worry,\" he assures her. \"I am sure I will have enough work without having to worry about the men at arms. As for Brother Thomas, he \n\t\tis an excellent instructor, this is what he does best.\"\n\t\t\n\t\tThomas clears his throat.\"I must warn you, Sister, that I tend to have conformity issues. But, receiving orders from such a beautiful woman may help.\" He smiles under his moustache.\n\t\t\n\t\t\"Believe me, I know how to show my respect to real men.\" Amie winks at him.\n\t\t*goto 13 \n\t\t\n\t*hide_reuse #Do you feel bad about having an outsider become the Abbot?\n\t\tBrother Jacob shakes his head. \"Being in charge is a great responsibility and there is a part of me that feels glad that I will be able to step to the side. However, I \n\t\twill still continue giving my contribution as much as I am required. Growth in ranks has never been my goal.\"\n\t\t\n\t\t\"I just want to have the freedom to do what I do best,\" says Sister Amie.\n\t\t*goto 13\n\t\t\n\t*hide_reuse #Did you like the last Abbot?\n\t\t\"It is very hard to speak something negative about a man who is not present, even more when it comes to a high ranking member of the clergy,\" says Sister Amie. \"So, I will not go into any details, but there \n\t\twere several decisions made by him that raised a lot of questions and no logical reasons were provided. I am sure you will find out more abut them as time goes by.\"\n\t\t*goto 13\n\t\n\t*hide_reuse #How did the last Abbot die?\n\t\tSister Amie sighs. \"I am not sure it is the time to discuss it. But, it is also true that you asked a question an deserve an honest answer. There are parts of the monastery where bad things happen... haunted \n\t\tunderground tunnels. I was following him one day and I could swear he turned into a demon. I screamed and Brother Jacob came along. It was his reaction that saved my life. I am good \n\t\twith the sword, but almost defenseless against creatures of the Darkness...\"\n\t\t\n\t\tIt seems that the woman can speak no more, so Jacob continues. \"My prayers were heard and the demon was defeated. What was left of him was the sickened body of the Abbot.\n\t\tIt had the signs of poisoning and I believe it was what happened to him. He took the poison with the idea of becoming one with the Darkness, but Sister Amie found him\n\t\tbefore the total transformation took place.\"\n\t\t\n\t\tBrother ${blue_name} awes in amazement. \"I guess I am too tired to be properly able to assess what you told me.\"\n\t\t*goto 13\n\t\n\t#Finished with the questions\n\t\t*goto 14\n\n*label 14\n\"I think I am getting tired, the journey was longer than I expected,\" Brother ${blue_name} says.\n\n\"I understand completely,\" replies Sister Amie. \"The last time I had to travel to the capital I was going to kill somebody, I swear.\"\n\n\"Please, follow me, I will show you your quarters.\" Jacob opens the door.\n\n\"I hope you are not going to give me the chamber the last Abbot was using,\" ${blue_name} suggests.\n\n\"No, it would have been an act of bad taste,\" Jacob assures him. \"Besides, there is still an ongoing investigation. I expect priests trained in energy trailing \nto come here in a week, we don't want anything to interfere with what they may find.\"\n\nThe rooms appear to be next to each other.\n\n\"Well, that one is quite luxurious,\" ${blue_name} comments with a smile while looking around his.\n\n\"We just believe that the comfort of the body is also the comfort of the soul.\"\n\n\"I may ask for a different mattress.\" Thomas laughs. \"This one is so soft that I would feel as if sinking under water.\"\n\n\"I will send a Novice to do that later,\" Jacob assures him. \"By the way, if you need something, my room is just above your, Brother ${blue_name}.\"\n\nSister Amie approaches the older zealot. \"I like you, Brother Thomas. My quarters are in the barracks. I am sure every Novice can show you the way.\"\n\nThomas chuckles. \"It would be a lie if I told you I didn't feel the same, young lady. And I am no liar.\"\n\nSister Amie gives him a wink and leaves, followed by Brother Jacob.\n\n[i]Now is the time to allow the travellers to rest and check how our sweet witch is doing.[/i]\n*page_break\n${red_name} is walking fast towards the forest. She usually doesn't feel comfortable when going to the woodcutters village. Did she really need to lose her healing pendant? Did really \nthat had to happen just in front of the priests. Did they really have to pick it up? Now, the High Priestess is going to give her a hard time. ${red_name} tries to calm herself by\ntelling herself that what is done is that and nothing too bad is going to happen anyway.\n\nShe realizes, however, that she needs to hurry for the congregation. It seems that this time the council of priests and elders has something important to say and \nshe, as the wife of one of the elders, is required to be there. On time.\n\nShe is trying to catch her breath and sweating. A few animals feel her energetic imprint and come out of the bushes and to greet her. In other \ncircumstances she would stop and play with them, connect with their emotions and enjoy a state of oneness with them, but this time she is in a hurry. She fails to see\nthe squirrel, and her fast stride actually makes the rabbit jump away, but when he does so, he turns back to look at the woman and she blows him a kiss without slowing down.\n\nShe arrives just on time and hastily makes her way through the crowd. The High Priestess has already taken her place in the centre of the main square and the twelve elders are sitting around her. Seven of them\nare women.\n\n${red_name} waves to her husband, making sure he sees her, and then takes her place behind the circle of the elders. She finally allows her heart to slow down \nas she places her bottom on the ground and takes on a lotus posture. She doesn't feel very enthusiastic about the whole event. Before she married Tob, she never \neven bothered to come. Now, she usually finds it very hard not to fall asleep. The High Priestess is very powerful, but her speeches tend to be much too long and \nthey never managed to touch her. Little did she know this time it was going to be different.\n*page_break\nThe High Priestess starts her speech. \"Dear ones, we are living in dire times. In my dreams, I have been approached by the great white wolf who \ncame to wail his pain away. The forest is bleeding. All these years, we were guided by patience and love toward our kind that we call woodcutters. We understood their needs. Each week I was \nsearching for the spirits of the forest, asking them if she could take more of the damage and every time I got a positive answer. I was told that all of our service should be limited to making sure \nthey stay out of particular areas. I was asked to ask our warriors to attack only as a means of last resort.\n\n\"But this time, it was the white wolf who delivered a different message. The forests is nearing the end of its capacity to sustain itself naturally. What is even more scary, it seems that dark forces are trying to take over \ntheir allies, the church of light. The wolf didn't know how successful it was, but I could feel his fear. He wanted us to awaken the lupines so that the the forest is ready to retaliate if things get ugly.\"\n\nThe mentioning of the canine forest protectors raises a lot of noise. Many of the ones living in the forest village have only heard stories about the lupines since most of them are dormant, gathering energy for the time when they would be needed. The ones that actually came in contact \nwith one were very thrilled by the experience.\n\nThe High Priestess continues. \"What the white wolf said next surprised me even more. He asked for a specific person to be the one to awaken them. Normally, the spirits would leave that choice to us. The white wolf asked for my apology and I gave it to him. My trust in him is infinite and I am not offended \nby the fact that it will not be the High Priestess this time. I would kindly ask the members of the circle of elders to adopt the same approach.\"\n\nThe old lady looks around and her eyes stop on ${red_name}. \"The one whose name I will say in a minute has been chosen because of the ability to open her heart to the spirits and animals. May Mother Nature guide \nyour footsteps, ${red_name}.\"\n\nThe young woman suddenly desires nothing more than to hide somewhere. The feeling of all eyes set on her makes her so embarrassed that she can't even comprehend what she just heard.\n*page_break \nIt seems like the High Priestess senses her suffering so she comes to her, takes her by the hand and leads to the Tree Temple.\n\n\"My child, why do you have to be so shy? A jewel shining so brightly should be exposed for everybody to see and marvel at its beauty.\"\n\n${red_name} just shrugs. \"I really don't know, it is just the way I was created.\"\n\n\"It is okay, really. You can spend some time here to align with the energies of the tree, make yourself some tea from the herbs at the altar and relax. At moon rise tonight, I would like you to come back here so that I can give you\ninstructions on what to do.\"\n\nThe High Priestess goes out and ${red_name} takes the opportunity to have her favourite drink. Her hands are shaking and she almost drops the cup, but the liquid quickly soothes her.\n*page_break\nNow that she calmed down, ${red_name} tries to make a mental list of the things she has to do until the day is over.\n\nShe didn't manage to explain the High Priestess that she couldn't return the pentacle she borrowed from her because she lost it. As much as she hates the idea, it seems\nshe has to go to the monastery and hope that her intuition would lead her to it. Serendipity has always been among her best qualities and she hopes that her intuition won't let her down this time as well.\n\n${red_name} also wants to go back home to speak with Tob. She is curious how he accepts what the High Priestess announced. Is he proud with her being chosen to awaken the guardians? Does he feel bad about \nan outsider being chosen for that? She wants to check. She also needs to take her favourite dagger, just in case it is needed.\n\nThe temple of animals is another place she wants to spend some time at. This is where she meditates and trains her special abilities.\n*goto cross\n\n*label next\n*goto cross\n\n*label cross\n*page_break\nWhere shall ${red_name} go next?\n*choice\n\t*hide_reuse #Go to the temple of animals\n\t\tThe temple of animals is a very old building with unknown usage. It seems derelict and there are trees growing inside it. It is actually the vegetation that keeps the walls from falling,\n\t\ta dense network of branches crawling up the bricks.\n\t\t\n\t\tAnd, as the name suggests, there are quite a few animal species residing there. Songbirds make for a very pleasant atmosphere. There are squirrels and badgers. ${red_name} has even seen a few bats residing in the attic. She is always very careful not to \n\t\tstep on any of the super large spider species that have made the temple their home.\n\t\t\n\t\tThe young woman is greeted by her childhood friend, Jared, who is the priest in charge of the temple. He is tall and his head and face are always shaved. \n\t\t\n\t\tHis smile is as charming as always when she sees her.\n\t\t\n\t\t\"I am glad to see you, ${red_name}. I missed you.\"\n\t\t\n\t\tHe touches her hands, his usual greeting. The beauty finds herself smiling back.\n\t\t\n\t\t\"I was a bit busy,\" she explains.\n\t\t\n\t\t\"It is okay, dear ${red_name}, we all have missions we need to attend. What would you like to do today?\"\n\t\t\n\t\t\"The usual stuff.\"\n\t\t*choice\n\t\t\t#Shapeshifting\n\t\t\t\tJared smiles. \"I know you like animals.\"\n\t\t\t\t\n\t\t\t\t\"Yes, they are so sweet. One can learn a lot by observing them. They are in such an alignment with themselves.\"\n\t\t\t\t\n\t\t\t\tThe man nods. \"I am glad that you learned your lessons.\"\n\t\t\t\t\n\t\t\t\tIt is then she realizes she is telling him something he knows, but praising animals is something she needs to do quite often. Jared knows that and \n\t\t\t\t${red_name} is sure she didn't look stupid in his eyes. \n\t\t\t\t\n\t\t\t\t\"What animal do you plan to show me today?\" he asks.\n\t\t\t\t\n\t\t\t\t\"The lioness!\" ${red_name} answers without hesitation.\n\t\t\t\t\n\t\t\t\t\"That would be good. Please do.\"\n\t\t\t\t\n\t\t\t\t${red_name} sits on a pile of fallen leaves in a lotus posture. She closes her eyes and starts breathing slowly and deeply, mentally inviting the spirit of the\n\t\t\t\tfemale lion. She feels her body change. The feeling is intoxicating. There is so much strength in this body, so much harmony... so little to worry about.\n\t\t\t\t\n\t\t\t\t\"You are doing great, my dear. You can go and take a look at your reflection at the dish full of water next to the altar.\"\n\t\t\t\t\n\t\t\t\tThe words make very little meaning to he right now, but she can still grasp the general meaning, his request to go to the silver plate and take a look. She does so slowly, enjoying the \n\t\t\t\tway her muscles feel under her soft hide. A soft purr escapes her as she enjoys the view, and she even takes a lick.\n\t\t\t\t\n\t\t\t\tA sudden movement catches her intention. It is a forest mouth. The lioness realizes she is hungry...\n\t\t\t\t\n\t\t\t\t\"No, ${red_name}, please, you are not allowed to do that... at least not here.\"\n\t\t\t\t\n\t\t\t\tThe feline looks at the priest, her eyes lost none of the grace, intelligence and beauty of her former form. She just nods and returns to the pile of leaves.\n\t\t\t\t\n\t\t\t\t\"What is it? You have a trouble switching back. Don't worry, I will help you,\" Jared offers.\n\t\t\t\t\n\t\t\t\tHe approaches her slowly, cautious not to activate any of the instincts she may not be able to control... not yet. He crouches before her and puts his hand on her neck.\n\t\t\t\t\n\t\t\t\t\"You are a human being, dear ${red_name}, just like me. Connect to the form, there is much grace in that. Also, the hand that rests on your neck touched you while you were in human form. \n\t\t\t\tCan you feel the energy blueprint?\"\n\t\t\t\t\n\t\t\t\tInstead of an answer, the lioness returns to her native form. ${red_name} gives him a wide smile and a quick hug.\n\t\t\t\t\n\t\t\t\t\"That was a wonderful experience, thank you.\"\n\t\t\t\t\n\t\t\t\t\"It was a pleasure to watch your transformation. You may have to be more careful with the backward one. Just remember to connect with another human, preferably someone who \n\t\t\t\tyou know, had recently touched you... or whom you love.\"\n\t\t\t\t\n\t\t\t\t\"Thank you, Jared. I will try to remember that. Now, please, excuse me, I need to go. Peace and blessings.\"\n\t\t\t\t*set shapeshifting true\n\t\t\t\t*goto cross\n\t\t\t\t\n\t\t\t\t\n\t\t\t#Resurrection\n\t\t\t\t\"Well, that can be a really useful skill. Unfortunately, or maybe I should say the opposite, there is nothing to resurrect in here. However, you can meditate and \n\t\t\t\treturn to the moment when you did that.\"\n\t\t\t\t\n\t\t\t\t${red_name} sighs. \"It was a pretty epic experience.\"\n\t\t\t\t\n\t\t\t\t\"Please, tell me about it. I know you often reconnect with it, but never speak about it. I would like to hear about it in details. Would you give me that present, please?\"\n\t\t\t\t\n\t\t\t\t\"Of course, Jared. Why didn't you ask earlier?\" ${red_name} arches her eyebrows.\n\t\t\t\t\n\t\t\t\tThe man shrugged. \"I didn't want to intervene in the sacredness of your meditation. Some people do not want to have another one between themselves and their memories.\"\n\t\t\t\t\n\t\t\t\t\"I have nothing against it,\" ${red_name} assures him. \"You are a friend, a very close on indeed.\"\n\n\t\t\t\tJared bows in reverence. \"It is an honour to hear that, dear ${red_name}.\"\n\t\t\t\t\n\t\t\t\t\"Okay, I think we shall begin.\" ${red_name} sits on a pile of fallen leaves in a lotus posture. She closes her eyes and starts breathing slowly and deeply, mentally inviting the memory.\n\t\t\t\t\"It was a beautiful sunny day and I was having a walk in the forest, searching for herbs as requested by the High Priestess. I was feeling particularly tense, but I didn't know why. Suddenly, a falcon \n\t\t\t\tflew just in front of me, perched at a branch on the tree beside me and stared at me, trying to say something to me. [i]Follow me[/i] I heard in my mind. And so I did.\"\n\t\t\t\t\n\t\t\t\t${red_name} makes a quick pause and licks her lips. \"I followed the bird of pray and came across the body of my dear friend Ophelia. She was lying motionless in the leaves, her head in a puddle of blood. Her foot probably \n\t\t\t\tgot entangled in a root, she fell and her head bumped into a tree. I... I crouched and took her in my arms, turning her around. She was already cold and all I could do was pet her hair.\"\n\t\t\t\t\n\t\t\t\tHer breathing becomes very intense and Jared puts his hand on her shoulder, trying to soothe her. It seems it has a positive effect on her. \n\n\t\t\t\tFeeling better, she continues. \"I cried. I told her she was not going to leave me. I asked her to come back. I felt my spirit reaching for her, pulling her. Suddenly, I was seeing her spirit just in front of me.\n\t\t\t\tShe was smiling, thanking me for loving her and supporting her in this hard time, but she explained that she just couldn't return the damaged body. And then I saw the falcon again and I knew he was going to summon a healer. As so I waited. I was\n\t\t\t\tkind of holding her hands the whole time, speaking how much I treasure her.\" At that point tears are flowing down ${red_name}'s cheeks. \"Then the High Priestess came on her mare and lay her hands on \n\t\t\t\tmy friend's body and started healing her. My eyes were on the face of my friend's spirit and I enjoyed her smile. When the High Priestess finished, the spirit entered the body.\"\n\t\t\t\t\n\t\t\t\t${red_name} takes a deep breath. The vision is over.\n\t\t\t\t\n\t\t\t\t\"Thank you very much for the experience of having you recalling those events, dear ${red_name}. Know that you can always do that feat again, even if the person is not your \n\t\t\t\tfriend.\" says Jared.\n\t\t\t\t\n\t\t\t\tThe woman smiles back and get up, the leaves bidding her goodbye in their own way.\n\t\t\t\t\n\t\t\t\t\"Thank you, Jared. I will try to remember that. Now, please, excuse me, I need to go. Peace and blessings.\"\n\t\t\t\t*set resurrection true\n\t\t\t\t*goto cross\n\t\n\t*hide_reuse #Visit the monastery\n\t\t*goto meet\n\t\t\n\t*hide_reuse #Drop at your place\n\t\t\t\t\tWhen ${red_name} comes home, she sees her husband sitting at the table. He raises his eyes and they embrace her.\n\t\t\t\t\t\n\t\t\t\t\t[i]What is the current state of the relationship between the elder and ${red_name}?[/i]\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#They are still in love with each other\n\t\t\t\t\t\t\t\"I missed you, my love,\" says Tob and stands from the table. ${red_name} sighs as he puts his arms around her waist and pulls her closer to himself. He \n\t\t\t\t\t\t\tgives her a gentle kiss that quickly gains momentum into an expression of pure passion.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tHe pulls back, trying to control himself.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"I want more!\" says ${red_name} with a voice coarse with desire.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"I want you too, but I don't want to drain your power right now. I know the High Priestess has something special planned for you tonight and I \n\t\t\t\t\t\t\tdon't want to be held responsible.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Do you think she will know?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tTob nods. \"She can smell that from miles. Now, let me give you a present and I hope it will help you in your quest.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe elder goes to the locket and pick up what appears to be a ruffled wolf ear on a string.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"This is the ear of my friend Miral. She died of natural death when I was young and her spirit asked me to take that part of her body to remember her.\n\t\t\t\t\t\t\tI also found out that on some level the animals in the forest remember her and just allowed me closer to them because of me wearing it on my neck. Now, it is yours.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tHe puts it on her neck, but his fingers make and additional move, a tickling petting.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Do not tempt me,\" she laughs.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"I will try not to. Please, don't forget your dagger, I know you are going to need it.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Sure, thank you for reminding me,\" says ${red_name} and goes to her room.\n\t\t\t\t\t\t\t*set flame -1\n\t\t\t\t\t\t\t*set ear_talisman true\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t(Your twin flame score decreased by 1 because ${red_name}'s heart is occupied but she gets the ear talisman)\n\t\t\t\t\t\t\t*set ear_talisman true \n\t\t\t\t\t\t\t*goto dagger\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t#Their hearts have gone cold\n\t\t\t\t\t\t\tTob says nothing, almost ignoring the beautiful woman. She makes a couple of steps in his direction, unsure how to \n\t\t\t\t\t\t\tprovoke a reaction from him.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"You are very popular now, congratulations,\" he finally says.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Is that what worries you? The fact that I suddenly became more respected than you? But I never wanted that, I don't feel \n\t\t\t\t\t\t\tcomfortable this way.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Isn't it why you married me? Weren't you after my status when you did so?\" he says in a cold tone.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Tob, you are insulting me,\" she says almost in tears.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"I don't care!\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t${red_name} weeps and goes to her room.\n\t\t\t\t\t\t\t*goto dagger\n\t\n\t#Finished with the other places\n\t\t*goto midnight\n\t\t\n*label dagger\n${red_name} bends next to her bed and takes out a stash. Her fingers search for her dagger. It is...\n*choice\n\t#a keen and extra durable one\n\t\tThe cold handle gave her a sense of security. The dagger could easily cut through anything but metal with ease. She attaches it to her belt and leaves the house.\n\t\t*set dagger_physical true\n\t\t*goto cross\n\t\t\t\n\t#a ritual one\n\t\tThe small dagger feels like a toy even in her delicate hands, but she knew that was just an illusion. It was a formidable weapon when used against an evil spirit. She attaches it to her belt and leaves the house.\n\t\t*set dagger_spiritual true \n\t\t*goto cross\n\t\t\t\n*label midnight\nThe moons are shining high in the cloudless sky. ${red_name} feels her adrenaline level high as she heads for the temple of the High Priestess.\n\n\"Welcome, daughter,\" the crone says, stirring a big cauldron situated next to the altar. \"Please, try to calm down, there is nothing scary, except for the fear inside you.\"\n\nShe takes a cup an fills it with some of the liquid in the cauldron.\n\n\"There is a mix of herbs inside that will make you feel at ease,\" the High Priestess suggests. \n\n${red_name} takes a deep breath, enjoying the aroma, then takes a sip. \"Thank you.\"\n\n\"I want to assure you that there is no hard feelings from my side for not being the one to be chosen for the task. It may sound strange to you, but I don't think\nthat my qualities are superior to yours, plus you are much younger and physically stronger. The sickness of our society is that it still thrives on stratification. There is \nsupposed to be a High Priestess on top, who hopefully has some wisdom in her head after the old age dementia takes its toll. We also have the circle of elders, some of \nwhich are just bastards with egos as big as the forest.\"\n\n${red_name} laughs and almost spits the concoction in her mouth.\n\n\"The idea of this monologue was mostly to let you have the time to finish your drink in peace, but it seems I am doing a poor job. Anyway, I know a change would be better for our\nsociety. However, I don't see it being ready for that. Until that comes, all I can do is try to be a good and humble High Priestess.\"\n\n\"This is what everybody thinks of you,\" says ${red_name} and finishes her drink.\n\n\"Well, I guess this is what I think of me too,\" admits the crone. \"I hope you don't mind, but I used the cauldron to make a reading on your soul and I came across an interesting finding.\nYour soul is among the many who have been created as doubles.\"\n\n${red_name} leaves her cup on the chair. \"Doubles? What does it mean?\"\n\n\"Well, many of the things that are created in this universe come in pairs. The two moons, balancing each other out, the cycle of day and night, the traditional couples\nconsisting of a male and female. This is the same with souls.\"\n\n\"Does it mean that I am a single part of two?\" ${red_name} asks, a hint of fear in her voice.\n\nThe High Priestess shakes her head. \"Absolutely no, each of the two parts is complete by all means. It is the link, however, that is very special. In which, the \nPrime Creator coded and instilled the love for Creation in its purest form. There is power in it, more than many can comprehend.\"\n\n${red_name} raises her eyebrows. \"Why don't you ever teach that?\"\n\nThe High Priestess sighs. \"Our society is centered around another way to be in alignment with Creation, another system in which the Prime Creator left its pure \nsignature and that is nature. For many, it is easier to comprehend as it encompasses everything around us.\" The High Priestess smiles. \"You know, there is a part of me that envies you.\nMy soul is a single one and that link, the love you are going to experience, it will forever be a mystery to me. However, single souls are much better suited for leaders like me, besides,\nI know I can experience something really really close to that with somebody else from my soul family if we go through the right procedures.\"\n\n\"Who is the other part of the soul I share?\" ${red_name} asks with a coarse throat.\n\n\"Please, come in and look at the cauldron.\" The High Priestess invites her.\n*page_break\n\n\"It is the Abbot!\" ${red_name} shouts. \"I met him today. It was a peculiar experience, yet a very powerful one. His body language suggested he was feeling the same.\"\n\nThe High Priestess nods. \"The reason I am telling you this is my belief that it would be best if you undertake the quest for setting the lupines free. There some time before it can be done. I will \ninform you when that window of opportunity is available and tell you what to do next. I will be doing my spiritual research in the meanwhile, I don't want to say something I \nam not sure about.\"\n\n\"I don't understand, High Priestess. You expect the Abbot to help me release the protectors of the forest. Why would he do that? He is an official of the Church of Light and they\nprotect the woodcutters. They are on the other side of the conflict.\"\n\nThe crone shakes her head. \"As much as you are right about it, the current situation is a bit different. I allowed myself to spy a little bit about him. Abbot ${blue_name} was appointed by a fellow spirit \nassociated with the way they perceive the Light to come in and put an end of the conflict here, just the way the white wolf appointed you. He was thrown into a deep lake he knows little about.\nI can sense some injustice being done to him by lupines, so the experience you may offer him could be a chance to find his peace.\"\n\n${red_name} looks into the eyes of the High Priestess. \"What should I do now, I am confused.\"\n\n\"Well, things will unfold by themselves. I caught him writing a letter to us, asking to send a representative to help them with an issue. From now on, \ndear ${red_name}, you are officially entitled to be an Ambassador of the Forest and represent our people in front of the Church of Light. You can go to the monastery\ntomorrow morning before the letter is sent to take those self-enlightened bastards in awe. Now, if you don't have any other questions, feel free to go, my back is killing me and \nmany of my bones crave for rest. Oh, and don't forget to pick up the pack next to the door. It is your Ambassador's dress. Show them we have style, dear one.\"\n*page_break\nAbbot ${blue_name} has just asked a young Novice by the name of Lilly to take the way the letter he wrote and make sure it reaches the leader of the forest people who, according to her\nhas the title of High Priestess.\n\nAs soon as Lilly shots the door, she opens it again and looks in. \"Oh, there is a woman wanting to speak to you.\" Then she whispers and gives him a wink. \"She is gorgeous.\"\n\nThe Abbot raises his eyebrows. \"Sure, let her in.\"\n\nIt is good that he managed to take a deep breath before ${red_name} enters the room because it takes a lot of time before he can do that again. Her long green dress perfectly \noutlines the beauty of her body without restricting her movements. Her shoulders are bare and her wavy hazel hairs falls freely on them.\n\nShe gives him a smile that can melt the entire monastery. \"You requested to speak with a representative of the forest people and here I am.\" She raises her hands, \naccentuating on the beauty of the dress and the one inside it. \"This is the uniform of an Ambassador, so I am at your service.\"\n\n${blue_name} decides to try to change the topic until he can get a better grasp of his thoughts. \"I just sent the letter, how do you know about it? Can you read minds? Oh, let me guess,\nthere was a dove perched on the window right behind you. Or the cockroach that actually was running all over it while I stood up to have some lemonade.\"\n\nWhat should ${red_name} reply?\n*choice\n\t#\"I am not sharing our secrets.\"\n\t\t\n\t\t\"You have the right to have your secrets, dear one. I won't deny them. I actually think it was a good sequence of events that lead you here more quickly.\"\n\t\t\n\t\t${red_name} frowns. There is a very strong desire in her to share everything with this stranger. Her reply was not in alignment with that want and that made her feel uneasy.\n\t\tHowever, he is kind enough to respect her territory and that melts her from inside. She doesn't find the words to reply, so she only only nods.\n\t\t*goto midnight2\n\t\n\t#\"I would have shared that knowledge you if I knew. Our High Priestess told me about it. But, you are right, we usually use the eyes of animals to spy.\"\n\t\t${red_name} darts the answer and only then she asks herself if she has spoken too much, but there is a very strong desire in her to share everything with this stranger.\n\t\tDoing so makes her feel better, in alignment with herself.\n\t\t\n\t\t\"I actually am sorry if I asked an improper question, dear ${red_name}. You have the right to have your secrets. I won't deny them. I actually think it was a good sequence of events that lead you here more quickly.\"\n\t\t\n\t\tHe is kind enough to respect her territory and that melts her from inside. She doesn't find the words to reply, so she only only nods.\n\t\t*set flame +1\n\t\t\n\t\t(Your twin flame relationship increases by 1)\n\t\t*goto midnight2\n\t\t\n*label midnight2\n*page_break\n\"What is it that I can help you with, Abbot?\" ${red_name} asks.\n\n\"There is a ghost that inhabits one of the buildings. Our exorcists seem to be unable to do anything about it. It appears to be a woman spraying blood\neverywhere, wailing. It is an awful sight. The main problem is that several very important books and artifacts are kept there and nobody wants to get in. I \nwas told that the forest people also have exorcists of a different kind and decided that I could ask for help,\" says the Abbot.\n\nWhat should ${red_name} respond?\n*choice\n\t#\"Of course, we are better than you!\"\n\t\tAbbot ${blue_name} tries to decide how to respond. He certainly didn't expect it. \"I guess there is wisdom in your words, dear ${red_name}. If our brothers fail to \n\t\texorcise the demon, then, at least in this aspect and case, your people are more skilled. But, I don't see the relationships between our people as ones based on \n\t\tcompetition but rather on cooperation.\"\n\t\t\n\t\t${red_name} is surprised by his answer. She is used to the cockiness of the priest of the light and she would expect the Abbot to be the cockiest of them all. His \n\t\tkind-hearted response makes her doubt if listening to her ego was the right choice.\n\t\t*set flame -1\n\t\t\n\t\t(Your twin flames score decreases by 1)\n\t\t*goto midnight3\n\t\t\n\t#\"The forest people would be happy to help.\"\n\t\t\"Thank you very much, dear ${red_name}. Your attitude tells me that there can be oneness between our people if we really strive for it.\"\n\t\t\n\t\tSomething sparkles in ${red_name}'s eyes. She realizes that oneness with him is what her heart hopes for.\n\t\t*set flame +1\n\t\t\n\t\t(Your twin flames score increases by 1)\n\t\t*goto midnight3\n\t\t\n*label midnight3\n*page_break\n\"Who will be the exorcist who will try to banish the demon?\" ${blue_name} asks ${red_name}.\n\n\"That would be me,\" she states without hesitation.\n\n\"Why does it have to be you?\" the Abbot protests. \n\n\"Don't you think I would be a good choice?\" the Ambassador snaps back.\n\nWhat explanation shout Abbot ${blue_name} give?\n*choice\n\t#\"Please, forgive my reaction. I just thought that Ambassadors in general rarely deal with such dangerous and painstaking work.\"\n\t\t${red_name} smiles. Her white teeth flash.\n\t\t*goto midnight4\n\t\t\n\t#\"You seem too young and fragile.\"\n\t\t${red_name} gives him a very serious look. \"Please, do not presume to judge me before you have seen me in action. I believe you will be more than amazed.\"\n\t\t*set flame -1\n\t\t\n\t\t(Your twin flames score decreases by 1)\n\t\t*goto midnight4\n\t\t\n\t#\"I am afraid you may get hurt.\"\n\t\t\"I am sorry, dear ${red_name}, if anything happens to you, I will not forgive myself for being involved in that. I may have only met you yesterday, but\n\t\tI treasure you deeply.\"\n\t\t\n\t\t${red_name} wants to immediately throw herself in his arms. Instead, she just says. \"Your caring attention is touching, Abbot ${blue_name}, but I promise you that \n\t\teverything is going to be fine.\"\n\t\t\n\t\t\"I know,\" he sighs. \"I believe in you.\"\n\t\t*set flame +1\n\t\t\n\t\t(Your twin flame relationship increases by 1)\n\t\t*goto midnight4\n\t\n*label midnight4\n*page_break\nThe Abbot stands up and walks closer to ${red_name}, his eyes bathing in the beauty of hers, then he realizes he can't say these words before they lock away, and so \nhe turns to the side, however, still feeling engulfed by her energy. \"Please, tell me if you feel the same?\"\n\n${red_name} opens her mouth, a thousand questions run through her mind and she chooses the most proper one. \"Feel what, ${blue_name}?\"\n\nHe sighs. \"I don't know, I have never felt this way before. It feels as if I have always known you even though I have just met you. I sense you so close to me, as if \nyou are a part of my world, part of my very soul.\"\n\n\"Those are very new feelings to me, I am surprised I could feel that. I am slightly confused but happy to discover them.\"\n\nHe looks at her again. \"Is there somebody in your life?\"\n\nShe understands his question even though the wording is open to interpretations. \
