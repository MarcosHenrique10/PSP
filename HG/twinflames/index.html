<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Twin Flames — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "twinflames", "title": "Twin Flames", "scenes": {"choicescript_description": "Tap into pure, unconditional love, be engulfed in a journey of oneness, and bring peace to a place that knows none.\n\n\"Twin Flames\" is an interactive novel by Ivailo Daskalov, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\nEnjoy the beauty of the self-discovery that occurs when one soul finds its other half, and they start a mission that will change the lives of many. Help the twin flames uncover the mystery of who they were in previous lives and find their way home.\n\n• Enjoy a 50,000-word tale of love, redemption, and ascension.[n/]\n• Surrender to the power of true love.[n/]\n• Switch back and forth between both the male and female twin flames.[n/]\n• Decide on their specializations and relations with current romantic partners.[n/]\n• Delve in an universe of light, witchcraft, ETs, dragons and reptilians.\n", "choicescript_stats": "*stat_chart\n\ttext red_name Name of the red flame\n\t\n\ttext blue_name Name of the blue flame\n\t\n\ttext flame Twin flames score\n\t\n\ttext damage Soul damage\n\n\ttext respect Respect\n\n\t\n\t\n*line_break\n*stat_chart\n\topposed_pair Light\n\t\tDarkness\n\n\n\t\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n\n  Remove in-game advertisements and delay timers.\n\n  *purchase adfree $4.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n\n  Remove in-game advertisements and delay timers.", "death": "*allow_reuse\nYour journey ended prematurely. Please, start from the beginning.\n*delay_ending 1200 $4.99 $0.99", "flames": "\"And now you can open them again,\" says Netho.\n\n${blue_name} and ${red_name} do so.\n\n\"What happened?\" asks the Abbot.\n\n\"You successfully completed the mission of banishing the demon. Congratulations for that, I did expect you to be a beautiful team. It was a real pleasure to be able to feel your cooperation,\" the Temmerian explains.\n\n\"Were we gone for long?\" the witch asks.\n\nNetho shakes his head. \"You may have spent hours in that timeline, but here, only 15 heartbeats passed.\"\n\n${red_name} locks her eyes on the Abbot. They both feel like the world is shifting again and they are moving to another place, even though in a slightly different way, without moving to another timeline or realm.\n\n\"I should leave you alone. It was a pleasure to be with you, dear. Until we meet again, I bid you peace.\"\n\nThe twin flames hear him somewhere in the background of the storm of feelings they are experiencing now, but can't break the trance they are in to say farewell to the traveller.\n*page_break\nTears start rolling down ${red_name}'s cheeks. She wipes them away.\n\n\"These are tears of joy and release, right. Only in that case can I find your face so beautiful with the tears on it. It is like a rain in May, bringing more life to the blossoming nature.\"\n\nShe smiles, a sunshine after the storm, a monochromatic rainbow upside down. \"This is what your love is doing to me, bringing me back to life, aligning my heart with hope, silently reminding me \nof what love is in another world, the one we come from, the one we share.\"\n\n\"I feel I am falling in love so deeply,\" says the Abbot. \"It is like delving into an endless abyss of warm feelings. It brings me immense pleasure. But at the same time, I sense that parts of me \nare being destroyed and recreated in a more divine and beautiful way. I must tell, you, my dearest ${red_name}, that there is a bit of me that is not completely ready for that. I have wounds that probably need to be healed.\nI really don't know how to handle those feelings.\"\n\nWhat should ${blue_name} do?\n*choice\n\t#Succumb to the feeling of insecurity and push ${red_name} away\n\t\tAbbot ${blue_name} steps back. \"I am sorry, dear ${red_name}, I am not ready for it. Please, forgive me. It is not that I am denying my feelings, it is just that I am not ready to embrace them with the whole of my heart.\n\t\tI need more time to get accustomed to it.\"\n\n\t\tThe facial expression of the Ambassador of the forest freezes. ${blue_name} involuntarily puts his hand on his heart. He is feeling her hurt as if it is his own. Maybe because it is his own, as they are one.\n\t\t\n\t\t\"My love for you is unconditional and I can wait. But, please, don't deny me the right to feel the pain inside,\" she says and bursts into tears, this time of a different kind.\n\t\t\n\t\t${red_name} leaves the room. He knows the beauty is going back to her people. His intuition tells him she is not going to give up on him. But the pain... it is so overwhelming.\n\t\t\n\t\t\"What hell of a dark path I am stepping into,\" he says to himself and there is nobody to answer that.\n\t\t*set flame -2\n\t\t\n\t\t(Your twin flames score decreases by 2)\n\t\t\n\t\t*goto 110\n\t\t\n\t#Surrender to his love for her\n\t\t\"However, my sweet ${red_name}, I am going to jump in the adventure of loving you. It feels lava hot, and I may burn, but I would rather turn into ashes than run away.\"\n\t\t\n\t\t\"I am not going to show you my back, ever, my love.\"\n\t\t\n\t\tHer eyes become even wetter and she has to blink to chase some of tears away from her mesmerizing eyes. She puts her hand on his cheek and lets it stay there. It feels so warm, so \n\t\tfull of positive energy that ${blue_name}'s heart starts beating faster.\n\t\t\n\t\tWhat should ${blue_name} do?\n\t\t*choice\n\t\t\t#Grab her hand and put it down and while still holding it explain that he is worried that it is an impossible love\n\t\t\t\t\"While I would not deny my feelings, I still fear that there are so many barriers between us that would make it very hard for us to be together,\" he says. \"We both\n\t\t\t\tare into relationships of certain kinds, I am a priest and you are one of the forest...\"\n\t\t\t\t\n\t\t\t\t\"A witch,\" she helps him. \"It is not an insult the way I see it.\"\n\t\t\t\t\n\t\t\t\t\"Well, there are certain negative connotations of the word when used by priests of the Light, and I don't want to hurt you in any way. I just feel discouraged by the hurdles \n\t\t\t\tthat stand in our way and that makes me confused.\"\n\t\t\t\t\n\t\t\t\t\"I understand how you feel and I can almost sense it. However, this is not the way I want to approach what I have for you in my heart.\"\n\t\t\t\t\n\t\t\t\tWhat should ${red_name} do?\n\t\t\t\t*choice\n\t\t\t\t\t#Kiss him\n\t\t\t\t\t\t\"Why don't you just enjoy the moment? I am sure it would be much more pleasant than worrying about the future.\" She says and moves her body closer to his. \"Do you want me as badly as I want you?\"\n\t\t\t\t\t\tShe pronounces each word slowly, making him sweat.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Yes, in the name of the Light, I want you more than any other woman I have ever wanted,\" he whispers.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Then take me, ${blue_name}. I am sure it will be an unforgettable experience for both of us.\"\n\t\t\t\t\t\t*goto 106a\n\t\t\t\t\t\n\t\t\t\t\t#Allow him to think things over\n\t\t\t\t\t\t*set flame +1\n\t\t\t\t\t\t\n\t\t\t\t\t\t(Your twin flames score increases by 1)\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"It seems you need more time to fully embrace and understand what is happening to you. I respect that and I am going to give you that time and wait patiently. I take leave of you now. Blessings\n\t\t\t\t\t\tand peaceful tomorrows.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t${red_name} leaves the room. He knows the beauty is going back to her people. His intuition tells him she is not going to give up on him.\n\t\t\t\t\t\t*goto 110\n\t\t\t#Kiss her\n\t\t\t\t*goto 106a\n\n*label 106a\n*set flame +3\n\n(Your twin flames score increases by 3)\n\nTheir lips meet in an implosion of emotions never experienced before, not to this extend. The minds step back, letting the instincts guide the bodies toward \nthe oneness their twin souls are used to experiencing.\n\t\t\t\t\nClothes hit the floor, found standing in the way of unrestricted passion, just before ${blue_name} and ${red_name} begin the dance of their lives.\n*page_break\nThey cuddle gently in bed and enjoy the intimacy of the closeness of their bodies, experiencing the simple joy of being able to hear each other's breaths...\n\t\t\t\t\nAnd then Sister Amie enters the room. She looks away. \"Wow, I am sorry to bother you, I really didn't want to spoil anything.\"\n\n\"No, you didn't spoil anything, Sister. What is done is done. Would you please be as kind as to pass me the cassock?\" the Abbot asks her.\n\n\"Sure,\" she fulfills his request. \"I just don't want you to feel bad about me seeing you. You can be sure I won't let the cat out. I mean, what you did is natural.\"\n\nThe Abbot dons the cassock then picks up ${red_name}'s gorgeous dress and gives it to her.\n\n\"Thank you, Sister Amie, I really appreciate that and when I think about it, I would expect no less of you,\" the priest tells her.\n\nThe blonde zealot finally picks up the courage to look back and is happy to see them dressed. \"Thank you for trusting me. We haven't known each other for a long time, so I am flattered by that.\nI also want to tell you that if you hear the noise of armour clanking coming from next door, most likely I am there and Thomas and me are doing something other than training. I am sorry, he is so \ncharming, I really can't resist him,\" the priestess blushes.\n\n\"There is nothing to be ashamed of, dear Sister,\" says the Abbot. \"I know that Thomas has been feeling very lonely for some time and he has been closing the door on many women. I am happy he finally found \nsomebody to consider worthy.\"\n\nSister Amie beams. ${blue_name} looks at ${red_name}, trying to figure out if she is feeling right and he is more than happy to find her smiling too, her eyes embracing his with their warmness.\n\n\"What was the reason for your coming here?\" The Abbot asks the priestess.\n\n\"Oh, yes, I totally forgot. It was something related to the horses, but I really have a solution, I only wanted your approval.\"\n\n\"You have it,\" ${blue_name} assures her.\n\n\"Thank you,\" says Amie and leaves the room.\n\n${blue_name} and ${red_name} laugh and join hands.\n*page_break\n\"I can spend eternity with you,\" says ${red_name} and her fingers slide down his forearm. \"Yet, I believe I should go back to my people.\"\n\nWhat should Abbot ${blue_name} reply?\n*choice\n\t#\"So be it, I am looking forward to meeting you next time.\"\n\t\t${red_name} gives him a peck on the lips. \"I will be back. I can't stay away from you long. Thanks for giving me so much pleasure.\"\n\t\t\n\t\t\"Oh, I assure you it was mutual,\" ${blue_name} says.\n\t\t\n\t\tShe winks at him and leaves, going back to her people. The Abbot knows she is not going to give up on him despite her relationship with another man.\n\t\t\n\t\tHe starts feeling the pain of separation and he tries to go back to the pleasant memories and projections of his future with her to make the pain stop.\n\t\t*goto 110\n \t\t\n\t#\"I want you to move here, in the monastery.\"\n\t\t\"Are you serious?\" The witch laughs. \"You want me to live here with you?\"\n\t\t\n\t\t\"Well, not in this room, that would be too blatant. I will ask Jacob to give you another. It makes sense. You are an Ambassador of the people of the forest, my mission here is to \n\t\tfind a resolution of the conflict regarding the cutting of trees. The church of Light should work together with all factions involved and that includes your people.\"\n\t\t\n\t\t\"That sounds reasonable. I believe the High Priestess wouldn't have made me an Ambassador for no reason. It seems that there is some master plan that works in our favour, pulling us together.\" She sighs. \n\t\t\"I couldn't say no to such a proposition even if I wanted to. And I clearly don't want that. There is nothing I desire more than being with you.\"\n\t\t\n\t\t\"I assure you I feel the same way,\" he says.\n\t\t\n\t\t\"So be it, I just need to get back to my people and inform them and pack my stuff. I won't take longer than I need to.\" She heads for the door and blows him a kiss. \"Goodbye, my love.\"\n\t\t\n\t\t\"Farewell, my sweet twin flame. Take your time, there is eternity behind and in front of us.\"\n\t\t*page_break\n\t\tShortly after that, ${blue_name} finds Brother Jacob and asks to speak to him in private.\n\t\t\n\t\t\"I need your help,\" the Abbot says. \"I want you to find a room for the Ambassador. I want it to be a safe place, preferably somewhere closer to my chamber.\"\n\t\t\n\t\t\"I would gladly do that. Would you like me to make a comment on that request?\"\n\t\t\n\t\t\"Yes, Brother. I know that you know the situation here much better than me. I also feel that in many aspects you are far more suited for the Abbot role than me.\"\n\t\t\n\t\t\"Your words flatter me,\" Brother Jacob replies. \"That decision is one of the reasons why I am not the Abbot. I wouldn't be able to take, even though I realize how\n\t\tright it is in the context of getting closer to the people of the forest, with which our relationship has always been tense. I have a lot of respect for that and you as the one taking it.\"\n\t\t\n\t\t\"But?\" The Abbot expects to hear a counter argument.\n\t\t\n\t\t\"Many of our Brothers and Sisters will see it as an act of treason to the church. You came here carrying the respect the Exarch bestowed on you, but that decision will take away some of it. And,\n\t\tI am definitely not speaking about me or Sister Amie.\" He smiles. \"It seems that by bringing Brother Thomas here you made a lifelong ally in the face of the blonde zealot.\"\n\t\t\n\t\t\"I hope everything between them goes smoothly. Is there any action I can take to alleviate the bad feelings of the lower clergy?\"\n\t\t\n\t\tBrother Jacob scratches his shoulder. \"There is something I can think of, but it is too radical and I certainly won't recommend it. I don't want to even speak about it, but I fear the role of your \n\t\tadviser I volunteered for requires it.\"\n\t\t\n\t\t\"What is it, Brother?\"\n\t\t\n\t\t\"To ask her to convert into our religion. Of course, it will be seen as us dominating over the forest people, which wouldn't be right.\"\n\t\t\n\t\t\"I will think about it. Thank you.\"\n\t\t*page_break\n\t\tA couple of hours later, ${red_name} comes to ${blue_name}'s room with a small sack on her shoulder and a radiant smile of her face.\n\t\t\n\t\t\"I am back!\" she announces. \"I bet you would personally want to show me the room.\"\n\t\t\n\t\tWhat would ${blue_name} do?\n\t\t*choice\n\t\t\t#Fulfill her request\n\t\t\t\t*goto 109\n\t\t\t\t\n\t\t\t#Ask her to convert\n\t\t\t\t*goto 107\n\t\t\t\t\n\t\t\t#Tell her that she can't stay in the monastery\n\t\t\t\t*goto 108\n\t\t\t\t\n*label 107\n\"I will do so, but I have to ask you to change your faith and adopt my belief system, at least officially,\" he says with a trembling voice.\n\n\"What? You can't be serious. I quite frankly can't do that. I can't betray the High Priestess and my people that I have been asked to represent. Even for you, even in the name of the \nlove we share.\"\n\n\"You must understand that my role requires me to save face...\"\n\n\"And you want me to lose my face?\" She interrupts him. \"I don't know what you are trying to do. The way the High Priestess explained things between twin flames, there is not supposed to be any condition on us \nbeing together... and you just put up a major one.\"\n\nAbbot ${blue_name} puts his hands just in front of his face, as I if in a prayer. \"I am not going to put a condition on us loving each other, only on you staying here.\"\n\n\"My answer is no,\" she says in an adamant manner.\n*set flame -2\n\n(Your twin flames score decreases by 2)\n\nWhat should the Abbot do?\n*choice \n\t#Allow her to stay anyway\n\t\t\"Please, forgive me.\" He hugs her. \"I hope you forget it. Now, let me show you your room.\"\n\t\t\n\t\t\"I can't deny I feel hurt by your proposition, but I know our love can make me heal,\" says the witch.\n\t\t*goto 109\n\t\n\t#Tell her that she can't stay in the monastery\n\t\t*goto 108\t\n\t\t\n*label 109\n${red_name} is beaming as she explores her new room, but what she enjoys the most is the proximity to her twin flame.\n*set flame +2\n\n(Your twin flames score increases by 2)\n*goto 110\t\t\n\n*label 108\n\"I am sorry, dear ${red_name}, but I can't allow you to stay in the monastery. I won't be able to fulfil my promise of letting you stay here.\"\n\n\"Do you know how much it cost me to come here?\" Her voice is seething with pain. \"I had to fight my husband and most of my relatives. If it wasn't for the High Pristess, I would \nhave been cast out of my tribe, all in the name of us being close to each other. Why do you have to be so cruel to me?\"\n\nShe runs away, sobbing, and ${blue_name} starts crying too, because her pain is his as well.\n*set flame -3\n\n(Your twin flames score decreases by 3)\n*goto 110\n\n*label 120\n*page_break\n${red_name} is showing ${blue_name} her favourite place in the woods. It is a small pond next to a glade.\n\n\"I used to come here very often as a child with my cousin. She is two years older than me. We would swim in its crystal clear waters and try to make friends with the fishes,\" she tells the priest.\n\n\"It is a very beautiful place and I thank you for showing it to me.\" The Abbot puts his hand on her shoulders. \"Many of the people I grew up with would rather catch the fishes.\"\n\n${red_name} shakes her head. \"There are two streams of beliefs. One of them reveres nature the way it is, including the act of predation. They are knows as the priests of the claw. The other ones \nstick to the belief that nature was much more peaceful in the past and they strive to bring it back to that state. They are known as the witches of harmony.\"\n\n\"Let me guess, you are of the second kind,\" ${blue_name} guesses.\n\n\"You know me well, my love. You can call me a lunatic, but somewhere deep inside me I believe I remember that time when a wolf and a sheep could play with each other as friends.\" The witch looks into his eyes.\n\n\"I wouldn't even think about that, my sweetness. Let me tell you that this memory resonates very well within my soul.\"\n\n\"This is probably because we are one,\" the witch laughs.\n\nAnd then she remembers why the High Priestess sent her to the monastery. Time is passing by, the moment to search for the lupines and set them free is drawing closer, and she \nhasn't even talked to him. \n\nShould she do so now?\n*choice\n\t#Be open with him and tell him\n\t\t\"There is something that is just burning me from inside and needs to come out. I need to tell you why the High Priestess sent me to you,\" she says.\n\t\t\n\t\t\"Then be brave and tell me about it. I know you will feel better in the end, so just go ahead with it,\" the Abbot replies.\n\t\t\n\t\t\"Thank you, my love, for making it easier to handle.\"\n\t\t*set flame +1\n\t\t\n\t\t(Your twin flames score increases by 1)\n\t\t*goto 123\n\t\t\n\t#Wait for now\n\t\t\"What is it?\" Abbot ${blue_name} asks.\n\t\t\n\t\t\"Well, why, nothing I guess,\" ${red_name} asks confused.\n\t\t\n\t\t\"But I can clearly sense that something is tormenting you, my love. I want to help.\"\n\t\t\n\t\t\"Is it that obvious?\" she asks.\n\t\t\n\t\t\"To your twin flame, yes. I kindly ask you to open your heart and let me in where it hurts.\"\n\t\t\n\t\t${red_name} gives him a faint smile. \"But you are already there. I can have no secrets from you. I guess I just got lost in my love for you and almost completely forgot the reason why the High\n\t\tPriestess sent me to you.\"\n\t\t*goto 123\n\t\t\n*label 123\n*page_break\n\"I though it was just an attempt to come to peace with the church of Light. I believe it is very good that a pair of twin flames was chosen for that,\" ${blue_name} remarks.\n\t\t\n\"I haven't thought about it, but it really makes perfect sense. I know that what the High Priestess really wants peace as much as you, but the task I am appointed to do is set free the lupines.\"\n\t\t\n${blue_name} involuntarily steps back.\n*page_break\n\"Are you really going to do that?\" he asks, his eyes wide with horror.\n\t\t\n\"Why do you fear them, my love? I don't understand.\"\n\t\t\n\"Because lupines killed my family before my very eyes. I thought I was going to be the next. It was terrible.\"\n\t\t\n\"Oh, I am so sorry.\" ${red_name} steps ahead and hugs him, making him feel better, but still with a lot of negative energy inside. \n\t\t\n\"Please, don't take my fear as your own. Protect yourself, I don't want you to be hurt,\" he begs her with a low voice.\n\t\t\n\"Just concentrate on yourself.\" She puts her head on his chest. \"Last time they were out, many of them ran amok and started killing civilians. This is not what they were created for. The aim \nof their existence is to protect the forest, to teach the enemy how to live in harmony with us and nature, to capture their hearts with the message of love, mercy and harmony.\"\n\t\n\"There is very little harmony in what I saw,\" he says slowly, holding back his tears.\n\t\t\n\"It was later found out that the one that set them free wasn't pure, he was full of hatred and it spread throughout all of them. The lupines were then banished into \ntheir pocket realm. We can make them what they were supposed to be and they will help us restore peace.\"\n\t\t\n\"We?\"\n\t\t\n\"Yes, the High Priestess appointed me because the great white wolf spirit talked to her. She then found out that I had a twin flame and who he was and sent me to you.\nShe thought that is was better to set the lupines free together.\"\n\t\t\n${blue_name} sighs. \"Quite frankly, I doubt I can do that. I managed to find my peace, to forgive and forget, but right now you are bringing me back to my horror. Please, don't ask me to \nbe with you in this endeavor.\"\n\t\t\nWhat should ${red_name} say?\n*choice\n\t#Tell him how important it is \n\t\t\"I know you realize how important that is. It is much bigger than you and me. As you said, we were chosen to bring peace here. I ask you to think about all the suffering setting the \n\t\tlupines free will spare. This time they will behave, I will ensure that. We can do this together!\" ${red_name} says.\n\t\t\n\t\t${blue_name} shakes his head. \"You don't understand. What if bringing peace requires jumping over that tree? Or spending half an hour underwater. I can't do that, please accept it.\"\n\t\t\n\t\tThe witch looks away. \"Then I have no choice but to go alone.\"\n\t\t\n\t\t\"No, ${red_name}, please, the fear for you will just kill me. I can't let you do this,\" he begs her.\n\t\t\n\t\t\"Then come with me and protect me. The choice is yours.\"\n\t\t\n\t\t\"I won't let you stand alone with these beast. That scares me more than death,\" he whispers and tears roll down his cheek.\n\t\t\n\t\tSuddenly, ${red_name} starts feeling very sick. \"Please, forgive me, my love, I know I am not supposed to manipulate you like that. I didn't realize what I was doing.\"\n\n\t\t\"It is alright, my sweetness, I understand that your motives were pure. I will come with you and conquer my fear.\"\n\t\t*set flame -2\n\t\t\n\t\t(Your twin flames score decreases by 2)\n\t\t*goto 113\n\t\t\n\t#Explain him that this is an opportunity to come to peace with himself\n\t\t\"I want you to heal, my lovely blue. And, in order to that, your fear must rise and be cast away. I will be next to you and we will conquer it together,\" she explains.\n\t\t\n\t\t\"And what if I don't want to be healed. The wound has been closed so long ago. I don't need somebody opening it to make it disappear.\"\n\t\t\n\t\t\"It is your choice, ${blue_name}.\"\n\t\t\n\t\t\"Yes,\" he sighs. \"Thank you for acknowledging my right. But, hey, you are going there even without me, right?\"\n\t\t\n\t\tShe nods. \"This is my choice.\"\n\t\t\n\t\tThe Abbot hugs her. \"Then my choice is to come with you and protect you. Lupines scare me, but no more than the thought of you being alone with them.\"\n\t\t\n\t\t\"You have no idea how much I love you,\" she says as quickly as possible, impatient to give him a deep kiss.\n\t\t\n\t\tSeveral minutes later, ${blue_name} gets the chance to reply. \"I am pretty sure I have an idea. I just need more kisses like that.\"\n\t\t*set flame +1\n\t\t\n\t\t(Your twin flames score increases by 1)\n\t\t*goto 113\n\t\t\n\t#Accept his refusal \n\t\t\"I understand how you feel, my love, and why you feel this way. I love that choice as much as I love you. One of the things I intuitively sense is that I am not allowed to \n\t\tmake you change and I must accept you the way you do, which I am doing with pleasure.\"\n\t\t\n\t\t\"Thank you for your kind words, my sweetness. You are beyond amazing. I am sure I would have been head over heels in love with you even if you were not my twin flame. But, hey, you are going there even without me, right?\"\n\t\t\n\t\tShe nods. \"This is my choice.\"\n\t\t\n\t\tThe Abbot hugs her. \"Then my choice is to come with you and protect you. Lupines scare me, but no more than the thought of you being alone with them.\"\n\t\t\n\t\t\"You have no idea how much I love you,\" she says as quickly as possible, impatient to give him a deep kiss.\n\t\t\n\t\tSeveral minutes later, ${blue_name} gets the chance to reply. \"I am pretty sure I have an idea. I just need more kisses like that.\"\n\t\t*set flame +2\n\t\t\n\t\t(Your twin flames score increases by 2)\n\t\t*goto 113\n\t\t\n*label 110\n*page_break\n*if (dragon)\n\t${red_name} is having her daily walk around the forest, when a creature jump out of the bushes in front of her. It takes some time for her to recognize it.\n\t\n\t\"You are the dragon we rescued from the hatchery in the dungeon! You have grown so much.\" She exclaims and hugs it tightly.\n\n\t\"I love you, ${red_name}, your energy is so pure. I was able to find out that the woman who saved me at the time a projection of you and this is why I came here to thank you before returning home.\"\n\t\n\t\"Oh, I am so happy you will return where you belong. What is your name?\" She asks.\n\t\n\t\"The name the other version of you gave me is Scalytail and I am going to use it in honour of her. And, I almost read your next question, I am female,\" the dragon chuckles.\n\t\n\t\"Thanks, I would really be embarrassed to have to ask that.\"\n\t\n\t\"Now, before I go, would you like me to show you how I played with the other you in the parallel timeline? She enjoyed it very much,\" the dragon offers.\n\t\n\t${red_name} doesn't even consider refusing, but a thought passes thought her mind. Maybe it would be good to share the moment with ${blue_name}. Well, getting him to come to the forest may take some time \n\tand she doesn't want to keep the dragon here for too long.\n\t*choice\n\t\t#Play with Scalytail\n\t\t\t\"It would be a great pleasure to play with you,\" says the witch. \"What are the rules of the game.\"\n\t\t\t\n\t\t\t\"Well, I usually hide and you have to find me, which is not an easy task, especially as my psychic abilities are growing. You will need to give your best in order to find me.\"\n\t\t\t\n\t\t\t\"Aren't you taking things too seriously?\" she asks Scalytail.\n\t\t\t\n\t\t\t\"I guess I am, but my particular people tend to take games like that very seriously because they teach us important skills about how to survive. I feel it in my blood. What today is a means to have fun may tomorrow be a matter of \n\t\t\tlife and death.\"\n\t\t\t\n\t\t\t\"I see,\" says ${red_name}. \"Aren't you afraid it would be easy for me to find you? After all, this is my forest. I know it very well, I actually feel it in me, it is an extension of my very self.\"\n\t\t\t\n\t\t\t\"I can sense that, dear one. And yet, I will manage to hide myself from the forest, even while being in it. Now, I can ask you to close your eyes, count to ten and then try to find me. If you feel me tapping on your shoulder from behind, know that you have lost.\"\n\t\t\t\n\t\t\t\"So be it, dear dragon,\" she smiles and starts counting.\n\t\t\t*page_break\n\t\t\t${red_name} opens her eyes and listens carefully. It is oddly quiet. For some reason, even the birds aren't singing. Her connection with the forest feels intact, but the great trees would not tell her where her dragon \n\t\t\tfriend is hiding. She is trying to connect with the wildlife in the area, but to no avail. She can still sense them, she is not separated from the network, but she is just... muted. ${red_name} says to herself that she must be thankful that \n\t\t\tScalytail is not an enemy, otherwise she would have been in a serious trouble. Was this what her captors wanted to make of her? She doubts that her other self would ever want to engage in such a conversation with the dragon.\n\t\t\t\n\t\t\tThe witch puts her finger on her chin contemplating what to do next. Maybe she could still pull a trick out of her hat. Probably she could...\n\t\t\t*choice\n\t\t\t\t*selectable_if (ear_talisman) #use the ear medallion\n\t\t\t\t\t${red_name} touches the medallion and says a silent prayer to the mother wolf, and its spirit appears before the beautiful woman. The animal appears to be \n\t\t\t\t\tdelighted to be in the forest where she spent her whole life. ${red_name} quickly explains the rules of the game she is playing with the young dragon. \n\t\t\t\t\t\n\t\t\t\t\tThe beast seems quite inquisitive to whether a dragon, an outsider, can successfully hide in the forest. She starts sniffing the air and runs in the direction behind her.\n\t\t\t\t\tSoon, they reach Scalytail hiding in the crown of a tree.\n\t\t\t\t\t\n\t\t\t\t\t\"You got me,\" the dragon admits. \"I underestimated you, dear ${red_name}. You taught me a lesson.\"\n\t\t\t\t\t\n\t\t\t\t\t\"Well, I have very important friends.\" She bows as a sign of gratitude to the spirit of the old wolf and it vanishes, going home.\n\t\t\t\t\t\n\t\t\t\t\t\"I see,\" says the dragon. \"As much as I would like to stay, I also have to finally reach the place where I belong, the land I call home. Please, stay aligned with the centre of \n\t\t\t\t\tyour inner peace.\"\n\t\t\t\t\t\n\t\t\t\t\t${red_name} waves her goodbye.\n\t\t\t\t\t*set damage -2\n\t\t\t\t\t\n\t\t\t\t\t(Your spiritual damage decreases by 2 as a result of the blessing of the dragon)\n\t\t\t\t\t*goto 120\n\t\t\t\t\n\t\t\t\t*selectable_if (shapeshifting) #transform into a lioness\n\t\t\t\t\tThe dragon managed to partially block her contact with the wood, but can she block her sense of smell? The witch turns into a lioness and sniffs the air. The aroma of the dragon is \n\t\t\t\t\tvery specific and she can't miss it. A gust of wind carries it to her nose and she prowls in the direction. Soon, she reaches Scalytail hiding in the crown of a tree.\n\t\t\t\t\t\n\t\t\t\t\t\"You got me,\" the dragon admits. \"I underestimated you, dear ${red_name}. You taught me a lesson.\"\n\t\t\t\t\t\n\t\t\t\t\tShe assumes her human form. \"Let's say that I have the nose of a lioness.\" She smiles.\n\t\t\t\t\t\n\t\t\t\t\t\"I see,\" says the dragon. \"As much as I would like to stay, I also have to finally reach the place where I belong, the land I call home. Please, stay aligned with the centre of \n\t\t\t\t\tyour inner peace.\"\n\t\t\t\t\t\n\t\t\t\t\t${red_name} waves her goodbye.\n\t\t\t\t\t*set damage -2\n\t\t\t\t\t\n\t\t\t\t\t(Your spiritual damage decreases by 2 as a result of the blessing of the dragon)\n\t\t\t\t\t*goto 120\n\t\t\t\t\n\t\t\t\t#just use her intuition\n\t\t\t\t\tIt seems that her intuition is also blocked by the dragon because it leads the witch to several places and the dragon is just not there. Suddenly, she feels the \n\t\t\t\t\twarm breath on her neck and a gentle tap on her shoulder.\n\n\t\t\t\t\t\"You have got me, Scalytail.\" She smiles. \n\t\t\t\t\t\n\t\t\t\t\t\"It was a great pleasure to play with you, dear ${red_name}. And as much as I would like to stay, I also have to finally reach the place where I belong, the land I call home. Please, stay aligned with the centre of \n\t\t\t\t\tyour inner peace.\"\n\t\t\t\t\t\n\t\t\t\t\t${red_name} waves her goodbye.\n\t\t\t\t\t*set damage -1\n\t\t\t\t\t\n\t\t\t\t\t(Your spiritual damage decreases by 1 as a result of the blessing of the dragon)\n\t\t\t\t\t*goto 120\n\t\t\t\t\t\n\t\t#Send a message to Brother ${blue_name}\n\t\t\n\t\t\t\"Do you remember the man who was with me when we rescued you?\" ${red_name} asks the dragon.\n\t\t\n\t\t\t\"Brother ${blue_name}? Yes, he is a good man.\"\n\t\t\n\t\t\tThe witch smiles. \"Would you like to see him before you go?\"\n\t\t\n\t\t\t\"Sure, I would be glad.\"\n\t\t\n\t\t\t\"I am just afraid it may take some time to have him here.\"\n\t\t\n\t\t\tScalytail laughs. \"The way I see it now, time is a joke.\"\n\t\t\n\t\t\t${red_name} looks at her with a certain confusion in her eyes, but she decides not to ask for an elaboration. She whistles and a couple of minutes later, a falcon perches on her shoulder.\n\t\t\tIt looks with suspicion at the dragon, but remains still while she gently whispers into its year something into its ears and it flies away.\n\t\t\n\t\t\t\"Don't you two have a telepathic com link or something? You are twin flames, for goodness sake,\" the dragon asks.\n\t\t\n\t\t\tThe witch raises her eyebrows.\n\t\t\n\t\t\t\"Oh, yeah, I was told the humans on this realm operate limited machineries, but I just failed to believe in that. Anyway, you have your ways and I respect them. It is hard not to, having in mind how you saved me from a sad fate.\"\n\t\t\t\n\t\t\t\"I am glad we could do that. I just fell in love with you the moment you saw me and approached me.\"\n\t\t\t\n\t\t\t\"I was drawn by your energies.\" Scalytail winks at her.\n\t\t\t*page_break\n\t\t\tSoon, the falcon flies over their heads and the Abbot follows shortly, riding a beautiful raven mare. When he sees the dragon, he dismounts and leaves the horse away from, making sure she doesn't get frightened.\n\t\t\t\n\t\t\t\"Hello, my love and hello... dragon. I had the feeling this bird tried to tell me something,\" he says.\n\t\t\t\n\t\t\t\"Hello, my blue flame. Her name is Scalytail and she is the one we saved from the dungeon,\" she says and gives him a peck on the lips.\n\t\t\t\n\t\t\t\"She has grown a lot.\" He gently pets her forehead.\n\t\t\t\n\t\t\t\"She offered to play with me and I asked her that you join us. Then, she is returning to the realm of the dragons.\"\n\t\t\t\n\t\t\tThe Abbot looks in the eye of the dragon. \"Can you take us with you for a while?\"\n\t\t\t\n\t\t\tScalytail chuckles. \"Certainly, I just didn't suppose you would like that. Are you up to that too, ${red_name}?\"\n\t\t\t\n\t\t\t\"Well, sure... I trust you guys.\"\n\t\t\t\n\t\t\tThe dragon whips her tail and creates a whirlwind that sucks them all.\n\t\t\t*page_break\n\t\t\tThey suddenly find themselves on another world. The sky seems gray, but the light somehow manages to seethe through it. ${blue_name} looks around, but all he can see is a sea of green grass. And dragons!\n\t\t\tThey are huge, mostly green, but speckled with other colours. And, they graze peacefully, some of them have their wings spread open as if to accumulate more of the sunlight.\n\t\t\t${blue_name} points at their direction and enjoys the look in ${red_name}'s eyes as she beholds the glorious sight. He observes as she holds her breath for a while. He likes that sight even more.\n\t\t\t\n\t\t\tThe biggest of them sees the newcomers and comes running through the grass.\n\t\t\t\n\t\t\t\"Greetings, dimensional travellers, I am Yona, leader of the flock of the Greenhorns. Welcome to our home.\"\n\t\t\t\n\t\t\tScalytail rushes to her and she engulfs the young one, making her purr. \"Welcome home, sister, I am so glad you managed to find your way to where you truly belong.\"\n\t\t\t\n\t\t\tYona whistles and another dragon comes and lovingly takes Scalytail away, letting her mount his (or her) neck.\n\t\t\t\n\t\t\tThen, the leader of the flock concentrates on the people. ${blue_name} uses the opportunity to introduce himself and ${red_name}.\n\t\t\t\n\t\t\t\"You have my thanks for returning the small one. A decade ago, a group of humans raided our hatchery and escaped with a few eggs. The young one that brought you here is one of them. My flock and me\n\t\t\tare forever grateful for what you did.\"\n\t\t\t\n\t\t\t\"It was her who saved the hatchling.\" ${blue_name} points at ${red_name}. \"I only allowed her to do so.\"\n\t\t\t\n\t\t\tYona nods. \"I can feel your positive energy. Quite frankly, I don't usually meet humans like you, most of them want to take away something that doesn't belong to them. To be honest, many of the creatures here share an open\n\t\t\tanimosity to your kind. Under other circumstances, I would invite you to join my tribe, but this is not possible, it would be considered an act of treason.\"\n\t\t\t\n\t\t\t\"It is okay, we just wanted to see where Scalytail lives,\" says ${red_name}.\n\t\t\t\n\t\t\t\"Scalytail,\" Yona repeats. \"A beautiful name, given by a beautiful woman, if my intuition is correct about you naming her.\"\n\t\t\t\n\t\t\t\"I hope it is a proper name,\" the witch replies.\n\t\t\t\n\t\t\tYona laughs and it is an earthshaking roar. \"Yes, it is proper. Only a little funny, but there is nothing wrong with it. Is there anything I can do for you before I send you home, I really fear for your safety.\"\n\t\t\t\n\t\t\t\"How about you let us ride you as you fly?\" ${blue_name} suggests.\n\t\t\t*page_break\n\t\t\t${red_name} has her heart racing when she mounts Yona. ${blue_name} puts the reigns on her as she instructed him, explaining that they are usually used by hatchlings when they need to get the feel for flying.\n\t\t\t\n\t\t\tThen, the Abbot positions himself behind ${red_name} and she closes her eyes and succumbs to the pleasure when his eyes engulf her from behind before he grabs the reigns too.\n\t\t\t\n\t\t\t\"Are you ready? Hold on tight, it might be a little rough.\"\n\t\t\t\n\t\t\t${red_name} starts screaming as the serpent accelerates and jumps, spreading her massive wings and takes off. The wind in their hair doesn't allow ${blue_name} and ${red_name} to hear their heartbeats, but they get wild.\n\t\t\t\n\t\t\tThe view is breathtaking, the land looks like a postcard from a fairy tale world. In the distance, there is mountain and a big lake in its skirts.\n\t\t\t\n\t\t\tThis time ${blue_name} screams as Yona slants slightly in order to change her direction. Once she decides that they must have gotten used to the riding experience, she decides to try some advanced maneuvers, even a loop.\n\t\t\t\n\t\t\tWhen the dragon lands and ${blue_name} and ${red_name} dismount her, they seem shaking with excitement. They start kissing as if there is no tomorrow.\n\t\t\t\n\t\t\t\"Yes, dear one, make love to each other, use the adrenaline rush to give yourself an unforgettable experience even my flight can't match. I will be here, making sure no harm comes to you while you are busy.\"\n\t\t\t\n\t\t\tOf course, they don't hear her, swimming in the ocean of their own passion.\n\t\t\t\n\t\t\tYona uses the time to send them healing energy and patiently waits until they finish. After that, she bids them goodbye and sends them home.\n\t\t\t*set flame +2\n\t\t\t*set damage -2\n\t\t\t\n\t\t\t(Your twin flames score increases by 2, and soul damage decreases by 2)\n\t\t\t*goto 120\n*else\n\t*goto 120\n\t\n*label 113\n${red_name} leads ${blue_name} into her village. Most eyes are on him, but a few meet hers with open hatred. They think she betrayed them, allying herself with the church of Light. She sighs. How the hell is she supposed \nto bring peace to these people who are ready for none? The good thing is that she doesn't take their silent blames to heart. The witch knows her mission and is within the aura of her twin flame and very few things can bother her right now.\n\nThey enter the main temple. The High Priestess greets them.\n\n\"So, you must be the new Abbot. I like your energies, they are so pure. I am glad they appointed such a man to head the mission of the church of Light here,\" the hag says.\n\n\"This is my twin flame,\" ${red_name} giggles. ${blue_name} slides his hand down her back.\n\n\"${red_name}, I like you too, there is no need to feel jealous,\" the old woman jokes.\n\n\"I know, it is just that I love him so much,\" the young witch says and presses her body into his.\n\n\"I love you too,\" he answers and turns to the other lady. \"It is an honour to finally be able to meet you, I have heard the Ambassador speak with a lot of love and respect about you and this is the line of feelings you can expect me to\nmanifest toward you.\"\n\n\"Thank you, young man. So, you two decided to set the lupines together?\"\n\n\"Yes,\" Brother ${blue_name}. \"We will go together.\"\n\n\"Do you know where you are actually going?\" the High Priestess asks.\n\n${blue_name} looks at ${red_name}'s eyes, but sees no answer there either.\n\n\"It is the forest of fear. There, you will have the dubious pleasure of meeting some of your fears and conquering them.\"\n\n\"I have a fear of the lupines. I know I am to expect no less of the experience lying ahead of me,\" says the Abbot.\n\nThe High Priestess coughs.\"Regarding your fears, I had the time so search about the origins of your twin soul and what you were in a previous incarnation. You may be pleasant and useful for you two to know that you were quite fearless before coming to this world. You were one, rather two, of the \npeople of Temmer. And their cultural beliefs are centered around love in the absence of fear. I am not trying to say that you were completely immune to it, since you were human beings too, however, this feeling was not promoted, it was something to be conquered or cast aside.\"\n\n\"That name sounds familiar to me,\" says ${red_name}.\n\n\"Didn't Netho say he comes from there?\" asks the Abbot.\n\n\"I think so. Well, I liked him immediately,\" says the young woman.\n\n\"Me too,\" replies her twin flame.\n*page_break\n\"Abbot, would you like me to give you a better explanation on what the lupines are?\" the High Priestess asks.\n\nWhat should ${blue_name} say?\n*choice\n\t#Yes, please\n\t\t\"Maybe I should start with the fact the the lupines were not the first race to be chosen to protect the forest. The original ones were the so called dancing trees. They could uproot and move and use \n\t\tbranches almost the way we use our limbs,\" the High Priestess explains. \"They were powerful but too slow to be effective. This is when nature decided to make a new race, combining the qualities of the wolves and the glory of the human race.\n\t\tIn our spiritual believes, the wolf is a guide. She is humble, sociable, cunning and is a warrior, so she can use force as a last resort.\"\n\t\t\n\t\t\"Like werewolves?\" the Abbot asks.\n\t\t\n\t\tThe High Priestess sighs and makes a long pause before being able to speak again. \"The werewolves are a shame to the lupine race, and it is because of them that all of the forest people carry out a heavy burden on our shoulders.\n\t\tWerewolves are indeed fallen lupines. They are abominations of what a true lupine should stand for. I know you had a bad karmic experience with them and the fact that you are standing here, ready to enroll on a journey leading to the lupines speaks very much \n\t\tabout the warrior soul that you... both of you have.\n\t\t\n\t\t\"I can sense that ${red_name} already told you that the responsibility for creating the werewolves lies within the one who set the lupines free last time. He got corrupted. I swear nobody knew it would happen like that, I have come to observe and sense the events many times. When the one was chosen and sent to\n\t\tawaken the lupines, there was no signs, not even a hint of darkness in him. But, it seems, something happened to him on the other side. There must be something evil out there, something I am not familiar with. Well, this is one of the reasons I wanted to send you two. As twin flames, \n\t\tyou share immense power. If one of you starts getting corrupted, the other one can potentially clean the other, wash the darkness away.\"\n\t\t\n\t\t\"We will be very careful,\" ${red_name} promises.\n\t\t\n\t\t\"I know, dear child. The great white wold made an excellent choice. I love her even more for that,\" the High Priestess smiles at her, showing a couple of missing teeth.\n\t\t*goto 114\n\t\n\t#No, thank you \n\t\t\"Well, I appreciate your choice, Abbot. Sometimes it is easier to approach issues intuitively, without being burdened by knowledge, especially knowing that you have so many answers, so much experience\n\t\tfrom past lives that you only need to connect to. And your soul is an ancient one. I can feel it,\" says the High Priestess.\n\t\t\n\t\t\"And I also call upon the Light to protect me and guide me at all times,\" remarks the priest.\n\t\t\n\t\t\"Yes, there is a lot of Light in your beliefs and a few shades too, but it is just a function of the imperfect world we live in.\"\n\t\t\n\t\t\"Truly, there are many things in our church I dislike and I would love to change them.\"\n\t\t\n\t\t\"Then enjoy the blessing that you are in a position to make some decisions, at least regarding the mission here,\" the crone suggests.\n\t\t\n\t\t\"I love that. I am still learning the ropes, but I am starting to feel the potential to make a positive difference for so many people.\" ${blue_name} smiles.\n\t\t*goto 114\n\n*label 114\n*page_break\n\"Now, dear ones, I will give you a choice regarding the help I can give you before starting the journey, and you can choose one of them. I can, for example, give you a potion to heal some of the soul damage you have accumulated do far. I won't lie to you, your mission there may be related to taking more and the last \nthing any of us wants is that any of your two parts of the same soul having to retire to source and spend several decades recovering before coming back. Well, there is nothing fatal about it, it would just be a sad end to the current mission.\n\n\"The second offer I can give you may sound a bit strange to you. I can perform the ritual of hand fasting on you two.\"\n\n\"Marriage?\" ${red_name} shouts in dismay. \"But I am already married. To an elder! Putting an end to it is supposed to be a crime against all we believe in.\"\n\n\"Er, I am technically married too,\" says the Abbot.\n\n\"Well, ${blue_name}, you don't look very married to me when you look at that flower of the forest, and this is not a blame. She is your twin flame and according to all standards I am familiar with, very beautiful.\n${red_name}, my comment for you will be slightly lengthier. Don't tell me you take that old trump seriously and buy that elder nonsense. Ending a marriage with an elder is considered bad only because they decided to proclaim it as such. It is a perfect\nexample of how seemingly spiritual people abuse power to take control of people. If I could afford that, I would remove all elders, I would even remove myself, but our people is not ready yet for such a step, in the vision of me doing so I see consequences far worse than the ones we will face otherwise.\n\n\"I am not going to advertise this offer any more, I just want to tell you that the link between your complete soul parts is so strong that it goes much above a marriage. If you choose to have that ritual performed by me, it will be just another way to make love to each other,\" the High Priestess concludes.\n\n${blue_name} takes a dive into ${red_name}'s eyes. \"I do want to express my love to you in all possible ways.\"\n\n\"I have that desire in me too, my love, but let's hear about the other options the High Priestess will give us. If it is something more useful for the mission, we may pick it and fast our hands later,\" ${red_name} suggests.\n\n\"There is wisdom in what you say,\" the Abbot remarks and kisses her cheeks.\n*page_break\n\"The limitations of my remote perception are very limited when it comes to the side you are going to, but I can show you a glimpse of one of the enemies that wait for you there. It is a spell I haven't used before but it worked when cast by the former High Priest.\nI believe that if you have that knowledge, you would be better suited to find a way to deal with them before the time to face them comes.\"\n\n\"Sounds logical,\" says ${blue_name}. \"You were very kind to offer us those presents, we really have to think about it.\"\n\n\"Wait, young one,\" the crone snaps back. \"How did you decide it is all I am offering you?\"\n\n\"I am sorry, High Priestess, I really don't know I got that impression,\" the Abbot apologizes.\n\nThe old woman laughs. \"There is nothing to apologize for, dear follower of the Light. It may have been your intuition and it was spot on, because the last option I would offer to you is do nothing.\"\n\n\"Do nothing?\" ${red_name} doesn't understand. \"Why would we want that?\"\n\nThe crone shrugs. \"This option has been offered before and has been taken. Honestly, I think it is a very stupid decision. It is believed that if the one chosen to set the lupines free rejects the offers of the High Priest or Priestess, that would add glory to the act \nand it would be commemorated in the legends and songs to follow. Well, people have the right to be stupid and serve their inflated egos, even chosen ones. I also don't consider any of the presents to be defining of your success of the mission. Your soul is strong enough to take damage, you would probably be able to defeat the \nenemy anyway and your relationship definitely does not need any strengthening to shine brightly. However, depending on your past and future actions, any of these could slightly turn the scales in your favour.\"\n\n${blue_name} and ${red_name} hold hands, allowing their energies to roam freely between them and in a moment they simultaneously say that they choose...\n*choice\n\t#Healing\n\t\t\"I don't want anything bad to happen to my twin flame,\" says ${red_name}. \"I want to make sure our souls are as intact as possible when we enter.\"\n\t\t\n\t\t\"Your health on all levels is what matters to me the most too, my love,\" says ${blue_name}.\n\t\t\n\t\t\"It is a wise choice, dear ones, and I really enjoy preparing the tea. Just give me a few minutes to make the mixture.\" The High Priestess disappears into the room behind the portal and soon comes back with a single cup.\n\t\t\n\t\t\"Who should drink it?\" ${blue_name} asks taking the cup.\n\t\t\n\t\t\"It doesn't really matter, since you basically share the same soul, I just think that it may be more enjoyable to you to have it together,\" the High Priestess suggests.\n\t\t\n\t\t\"Gladly!\" ${blue_name} brings it to ${red_name}'s lips and she takes a sip while looking in his eyes. \"Is it good?\"\n\t\t\n\t\tShe nods and takes another sip. Without gulping, her hand gently move his out of her way as she steps forward and gives him a passionate kiss. A bit of the tea splashes on his cassock.\n\t\t\n\t\t\"Yes, there is healing and salvation in oneness,\" comments the High Priestess. \"I just want to remind you that further acts of it are not generally encouraged at this place.\"\n\t\t*set damage -1\n\n\t\t(Soul damage decreases by 1)\n\t\t*goto 115\n\t\t\n\t#Hand fasting\t\t\n\t\t\"Well, you are very much in love aren't you? Sweet twin souls,\" the crone chuckles. \"Now, I am going to explain the ritual for Abbot ${blue_name}. ${red_name}, I know that you are more than familiar with that since you went through it.\"\n\t\t\n\t\t\"So you really need to remind me of that,\" asks the young woman annoyed.\n\t\t\n\t\t\"Oh, excuse me, my child, I didn't think it would sound that mean. Anyway, my role is simple, I just have to explain to you that the ritual involves you two giving vows to each other. They are revocable, so you can pull away from them any time you want in an honour of the fundamental right of free will \n\t\tthat every being in this universe. At the end, I have to give you my blessing and tie your hands with a blessed canopy string. Do you still want to do this?\"\n\t\t\n\t\t\"Yes,\" boldly says the Abbot.\n\t\t\n\t\t\"I have no doubt,\" says the witch.\n\n\t\t\"So be it, dear ones. ${red_name}, as the female, you may speak first. This symbolism comes as a representation of the act of creation which starts with the Divine Feminine producing the raw foundations of what is to be and then the Divine Masculine helps it \n\t\tacquire the shape as a co-creator.\"\n\t\t\n\t\t${red_name} closes her eyes and speaks her heart out with a smile. \"My beloved twin flame, I vow to always search for you throughout each of our incarnations, trying to give you all the love, support, and oneness you need in order to \n\t\tbe able to do the work that needs to be done by you and to give you as much happiness as I can in the process. I want you as much as a plant wants the sunlight, water and air, and if you want me as much as I do, know that I will be there for you as much as you need me. Always.\"\n\t\t\n\t\t${blue_name} sighs and answers with a trembling voice. \"Yes, I love you, need and desire you more than anything on this world. You are my lovely red twin flame and I have been created to love you as much as myself and this is what I vow to continue doing until the end of times. I will also keep searching for you through space and time, realities and dimensions, trying to \n\t\tgive you the love that you need. If you decide to join me on my mission, I would accept that with the gratitude of my whole heart and soul, and then I would kindly ask you to allow me to be by your side when you decide how your assets and abilities may help the universes become a better place. I want to be with you. For eternity.\"\n\t\t\n\t\tThe High Priestess wipes her tears and prepares the string. \"Hardly have my ears ever heard such beautiful and sincere vows. The beloved usually explain things related to giving birth to children, hunting, house cleaning and intimacy.\" She binds their hands. \"Now, you can share a kiss. Further exhibition of physical oneness are generally not \n\t\tencouraged here.\"\n\t\t\n\t\tThe twin souls do so with the typical passion burning in their very being and find it very hard to follow the guides of the High Priestess.\n\t\t\n\t\t\"Good, thank you or choosing me to preside over the ritual. You can spend a few minutes tied to each other and then I will remove it.\"\n\t\t*set flame +2\n\t\t\n\t\t(Your twin flames score increases by 2)\n\t\t*goto 115\n\t\t\n\t#Vision of the enemy\n\t\t\"So be it. Let the knowledge be your weapon,\" says the crone and closes her eyes. \"I see several, I try to pick somebody you actually know... There is one, Abbot. A beautiful woman with long jet black hair. She wears a cassock just like you, so she is probably a member of the church of light\n\t\t. However, unlike you, her soul is dark and thrives on control. It makes me sick just to look at the perversion of a soul she has. Her name starts with... probably K.\"\n\t\t\n\t\t\"I can't remember such a woman. K? Can it be Cabala?\"\n\t\t\n\t\t\"I believe so. Excuse me, Abbot, her darkness is distracting me.\"\n\t\t\n\t\t\"Who is she?\" ${red_name} asks.\n\t\t\n\t\t\"Sister Cabala is part of a very questionable program by the church that includes a special types of confessors to take control of people, basically for the purpose of extracting information, but, \n\t\tas it turned out, probably much more. And, I hope you don't feel bad when I tell you that, but I think she has a crush on me,\" ${blue_name} explains.\n\t\t\n\t\t\"Well, thank you for telling me,\" says ${red_name}. \"Can I ask you if you got intimate with her... I mean, did she manage to take control over you, this is what is important to me.\" The young witch blushes.\n\t\t\n\t\t${blue_name} shakes his head. \"No, but I always would get the feeling that she is playing me like a sated cat with a mouse she could eat at her wish. I definitely think she can gain control of me.\"\n\t\t\n\t\tThe crone sighs. \"I am sorry I can't help you with that. I have never dealt with possession. I hope that you can find something to help. Or, maybe the love you share will be a shield, I don't know. Keep in mind, however,\n\t\tthat her powers will be much stronger in that realm.\"\n\t\t\n\t\t\"It is your church that created that monster. Don't you have a way to fight her?\" ${red_name} asks with sparkling eyes.\n\t\t\n\t\t\"Not anything I know of.\" The Abbot shrugs.\n\t\t\n\t\t\"I am beginning to regret my actions,\" says the High Priestess. \"Repeat what I say. I will not be afraid, even if I go trough the deepest darkness, the spark of divinity in me and the beauty of the love we share \n\t\twill light the way like eternal sunshine.\"\n\t\t\n\t\tThe twin flames do as she says.\n\t\t\n\t\t\"This is good. Just don't let fear guide you. It is a parasite sapping your abilities, it disconnects you from source. Just take the valuable information it betrays and cast it away.\"\n\t\t*goto 115 \n\t\n\t#Nothing\n\t\t${blue_name} speaks and ${red_name} opens her mouth to say something, but decides to remain silent.\n\t\t\n\t\t\"Is there something you want to add, ${red_name}?\" The High Priestess asks.\n\t\t\n\t\t\"No, really, I respect the decision of my twin flame. May it be as he wishes.\"\n\t\t\n\t\tThe crone sighs. \"So be it. When I said all those things about the stupidity of this choice, I really had no right to insult you. I didn't think you would pick that, but that was not \n\t\ta good reason for me to judge you or the others that picked it. Now, it is me who feels stupid. Serves me right, my mouth is too big sometimes.\"\n\t\t\n\t\t\"It is okay, High Priestess,\" says ${blue_name}. \"I can understand your point of view.\"\n\t\t\n\t\t\"And this only makes me feel worse because it shows how wise you are and how badly I judged you. Anyway, let's just forget about it and get it over and away with.\"\n\t\t*achieve glory\n\t\t*goto 115 \n\t\t\n*label 115\n*page_break\nThe High Priestess takes a candy out of her pocket and gives it to ${red_name}. \"This little sweet will send you to the realm where the lupines are. I have only one, so you need to take it in your mouth and then kiss. I am pretty sure you won't mind that part.\n\n\"Now, I want to give you some instructions on what to expect. I have personally not been there, so anything I tell you may not be exactly as I believe it to be. I have read notes by people who were there and I had some visions regarding it, but it is nothing \ncompared to the experience you are going to embark on. In that realm, matter is a bit different, it is less dense and it really is just energy. Any wound you take there will mean soul damage to you and I hope that you won't receive more than you can take, because it will mean that \nyou won't be able to go back to the bodies that will remain here. In other words, you will die. Your souls won't be lost, you will get back to the reincarnation cycle, but your mission here will be considered lost.\n\n\"I sense a lot of darkness there. You will find enemies but allies to. At times, you may find it very difficult to proceed, but when it is over you will be able to get back to it and smile about all the hurdles you jumped over. May the Light and Mother Nature protect you in every step you take. Now, you can go to the ritual room over there and\ntake your places in the ritual bed. I don't want to carry your bodies around, or have you hurt yourselves when you lose consciousness.\"\n\n${red_name} takes ${blue_name}'s hand and takes him to the room.\n\n\"It looks quite comfortable,\" he says as they lay in bed.\n\n\"Please, forgive me,\" ${red_name} asks.\n\n\"For what?\" the Abbot wonders.\n\n\"For giving you the bitter pill that can kill us both.\"\n\n\"No, it can't be the end of anything. My love to you is eternal and will keep us intact. Besides, I don't think that anything would be bitter if it comes from your lips.\"\n\nShe nods, takes the candy and gives him one of the most dramatic kisses they ever shared.\n*page_break\n${blue_name} and ${red_name} find themselves in a beautiful world. The rays of the sun gently kiss their skin without burning, a light breeze carries the smell of sea. Birds sing a love song, hidden somewhere in the crown of the trees nearby. Tall grass, reaching to their breasts whispers a hello\nonly a few feet away from them.\n\n\"Wasn't it supposed to be a gloomy realm?\" ${blue_name} asks his beloved.\n\nShe shrugs and smiles. \"The High Priestess told us that she couldn't see very well here. Anyway, I guess we should enjoy ourselves without asking questions.\"\n\n\"Sounds like a good idea. Look out!\" He grabs ${red_name} by the arm and drags her toward him, hugging her, instinctively trying to protect her.\n\nA shadowy creature crawls in their direction. It seems to be made of sheer darkness, a hybrid born from the kinky love of an octopus and a hyena. It hisses as it approaches them. \n\nBoth twin flames start saying prayers to the version of the Light that feels closer to their part of the double soul.\n\n*if light>52\n\tThe shadowy figure starts smoldering, as if burning in the sunlight. It tries to leap at them, but dissolves into thin air.\n\t*goto 116\n\t\n*else \t\n\tThe shadowy figure is quick. Neither ${blue_name} nor ${red_name} manage to get too far with the prayers before the demon is at them. Time freezes, its tentacles just inches from their faces. \n\t\n\tAnd then they hear its voice. \"You shall pay for your insolence. Choose your punishment, disgusting followers of the Light. I can take a bite of your soul or infect you with my darkness.\" It chuckles, an ugly \n\tcombination of gurgling and belching. \"You like the freedom of making choices, don't you? It is your birthright, you say. So, exercise it, choose how to please me!\"\n\t*choice\n\t\t#Take soul damage\n\t\t\tThe tentacle whips at them sending them flying in the embrace of the tall grass. It binds their wounds and stops the bleeding, but fails to heal them completely. When they manage to get on their foot, they see the demon dissolving into \n\t\t\tthin air.\n\t\t\t\n\t\t\t*set damage +2\n\t\t\t\n\t\t\t(Your soul damage increases by 2)\n\t\t\t*goto 116\n\t\t\t\n\t\t#Embrace the darkness\n\t\t\tThe tentacle passes through them, ghostly and incorporeal. It doesn't do anything to their bodies, but their souls get scars. In an expression of anguish, the twin flames hug each other, oblivious to the danger of the shadowy \n\t\t\tcreature still being next to them, the lovers searching the healing embrace of the oneness.\n\n\t\t\tWhen they manage to look at it, they behold it smoldering and vanishing into thin air.\n\t\t\t\n\t\t\t*set light -3\n\t\t\t\n\t\t\t(Your alignment with the light decreases by 3)\n\t\t\t*goto 116 \n\t\t\t\n*label 116\n*page_break\n\"What in the name of the Light was that?\" ${blue_name} asks.\n\nA graceful figure comes out of the tall grass. It is a slim human-like being with body covered in white feathers and a pair of wings on its back. It also has tall blonde hair and blue eyes, a very\nNordic expression of angelic beauty but with little signs regarding the gender, which leaves a slightly awkward feeling in ${blue_name}'s mind used to accepting beings as either male or female.\n\n\"That being with unpronounceable name has very little to do with the Light, dear ones. Blessings to your twin souls. My name is Lima and I welcome you to this realm.\" \n\nThe name and voice sound feminine, so ${blue_name} decides to accept the stranger as a lady.\n\n\"Thank you,\" says the witch. \"I am ${red_name} of the forest people and this is Brother ${blue_name} of the Church of Light. How do you know we are twin souls? I mean, is it that obvious?\"\n\nLima nods. \"I can definitely tell, but I really don't need to look at you at all to be able to tell this is the truth. You were told it was a place of doom and gloom right? You were told the truth. It was a very scary place before you two came here. But there is divinity in the link between the two\ncomplete parts of your soul that has the power to change worlds. Well, this one is very volatile, and darkness was a bit vulnerable despite being almost everywhere, but that doesn't devalue the difference you made to this realm. Thank you for that.\"\n\n\"I am glad we could help,\" says ${red_name}\n\n\"Are you an angel?\" asks the Abbot.\n\nLima shakes her head. \"I was designed to look like one, and I would really like to be one, but the sad truth is that I am just a biological entity without a soul attached. I was created by a demons to \ntake care of a captured angel and after the lab where I worked was raided by a succubus and a priestess, I came to this world.\"\n\n\"Tell me more about that creature that attacked us,\" ${blue_name} asks.\n\n\"When you chases most of the darkness away from here as you came, a few of the strongest ones remained. By the way, this is something very typical of them. They are designed to fight until their bitter end.\nThat nightmare with the tentacles is of the karmic induced ones, but if you are not familiar with the basics of demonology, this may speak little to you.\"\n\n\"I have tried my luck in exorcism, but I really have no knowledge of the subject,\" says ${red_name}.\n\nLima coughs. \n*if (light)\u003c50\n\tSuddenly, the colour of her feathers changes to jet black and her hands turn into claws. \"We will never give up!\" she screams and flies toward ${blue_name}. \n\t\n\tFor some reason, ${red_name} freezes, only able to see the harpy coming dangerously close to her beloved.\n\t\n\t${blue_name} manages to take out his sword.\n\t*if (sword_fighting)\n\t\tHe quickly realizes he won't be able to strike at the enemy from such a short distance. He rolls to the side and allows Lima to fly above him. She turns into his direction and this is when \n\t\t${blue_name} beheads her.\n\t\t\n\t\t\"Holy four letter!\" he swears, wiping the blood in the ground.\n\t\t\n\t\t\"I am so glad you are okay,\" says the witch. \"It was terrible to watch her trying to rip you to peaces. I could do nothing to help, I was petrified. Oh, please don't feel bad \n\t\tabout what happened, it really was not your choice.\"\n\t\t\n\t\t\"I know,\" he sighs. \"I really don't enjoy killing sentient beings, soul or no soul. But I understand that this is a something that happens to warriors, and somebody just has to face the peril. Now, if you please, let's leave this place.\"\n\t\t*goto 117\n\t\t\n\t*else\n\t\tThe harpy moves his sword away and claws at his breast, leaving painful marks before he manages to kick her away from him and behead her.\n\t\t\n\t\t\"Are you alright?\" asks the witch, coming closer to examine the wound.\n\t\t\n\t\t\"Yes, my love, it is just a scratch, there is nothing to worry about,\" he says wiping the blood in the ground.\n\t\t\n\t\t\"I am so glad it is nothing serious,\" says the witch. \"It was terrible to watch her trying to rip you to peaces. I could do nothing to help, I was petrified. Oh, please don't feel bad \n\t\tabout what happened, it really was not your choice.\"\n\t\t\n\t\t\"I know,\" he sighs. \"I really don't enjoy killing sentient beings, soul or no soul. But I understand that this is a something that happens to warriors, and somebody just has to face the peril. Now, if you please, let's leave this place.\"\n\t\t*set damage +1\n\t\t\n\t\t(Your soul damage increases by 1)\n\t\t*goto 117\n\t\t\n*else\n\"Are you alright?\" the witch asks.\n\n\"Yes, sometimes I would get sick and the darkness would take control of me. It seems
