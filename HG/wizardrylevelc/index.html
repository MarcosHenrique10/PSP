ack at the bunyip which is continuing to rip apart the esky. [i]\"Ok, be careful alright?\"[/i] \n\nYou give her an affectionate scratch on the head, before she spreads her wings, quickly flying away into the forest. \n*page_break\n\n You don't have long to wait before you see the small bird appear on the other side of the clearing, perched on a leafy branch. You wait nervously for the bunyip to react, but its attention is firmly split between you and its meal. \n \n Diving towards the bunyip, the kingfisher starts to peck furiously at the creature's furry head. [i]Oh no, you weren't expecting him to do that![/i]\n \n The bunyip howls in pain, fangs elongating as is morphs in front of you, tossing its head around as it attempts to dislodge the bird which has grabbed hold of one of the spines and continues to rain blows above its eyes. \n \n You hesitate, glowing orb in hand. There's no way to capture the bunyip without hitting your friend as well. [i]\"Move! Let go!\"[/i] you urge silently.\n \n *page_break\n \n The bird releases her grip and starts to flap away, but is caught by a glancing blow by the thrashing bunyip's head and tumbles to the ground in a flurry of feathers. As the bunyip hisses in anger, bringing up a wickedly clawed hand to finish your familiar off, you throw the orb with all your strength. \n\nIt sails through the air and hits true. Shattering on impact, it wraps the startled creature in a cascade of light before pulling it through the portal with a loud snapping sound. \n\nRunning over the torn ground you hunch down beside the fallen bird, fearing the worst. \n\n*page_break\n\nAs you turn her over, she blinks a few times and slowly gets back up to her feet. You could cry with relief. It looks like she was only stunned!\n\n\"Never do that again! I said [i]distract[/i] it, [b]not[/b] [i]attack[/i] it!\" You gather her up tenderly in your hands. \n\nWait, what's that noise? As you pause to listen, you realise the quiet lake sounds have been replaced by the excited voices of a group of people heading your way. \n\n[i]Oh no, the people over in the picnic area must have heard or seen something to do with your altercation with the bunyip. Definitely time to go! You don't want to get caught here.[\\i]\n\nCarrying the kingfisher, you quickly retreat into the forest. Too late you realise that you left the shredded cooler behind on the bank. Hopefully it doesn't cause too much trouble. Shame there's no crocodiles to blame it on in the lake, maybe they'll think it was a pack of wild dogs or something? Maybe...you can hope anyway. \n\t\t\n*set Third_Task 60\n*set good_standing -5\t\n*set grade3 \"Pass\"\n*set bunyipfamiliar 0\t\t\n*goto TPfinish\n\n\n\n\n*label telepathybutterfly \nYou glance at the butterfly on your hand who regards you with bright, intelligent eyes. \n\n[i]\"Ok, here's the deal,\"[/i] you voice silently. [i]\"Can you take that bunyip's attention off me for a minute? While its distracted I'll try to get in close enough and capture it.\"[/i]\t\n\nThe shimmering blue and gold insect gives a very human like nod. \n\nYou glance back at the bunyip which is continuing to rip apart the esky. [i]\"Ok, be careful alright?\"[/i] \n\nHe gives you a flicker of wings to show he understands before flitting away into the forest. \n*page_break\n\n You don't have long to wait before you see the large butterfly appear on the other side of the clearing, perched on a leafy branch. You wait nervously for the bunyip to react, but its attention is firmly split between you and its meal. \n \n Flying swiftly towards the bunyip, the butterfly flaps furiously around the glowing creature's eyes. [i]Oh no, you weren't expecting him to do that![/i]\n \n The bunyip howls in annoyance, fangs elongating as is morphs in front of you, tossing its head around and swiping at the air with its claws as it attempts to rid itself of the irritating insect.\n\n You hesitate, glowing orb in hand. There's no way to capture the bunyip without hitting your friend as well. [i]\"Move! Fly away!\"[/i] you urge silently.\n \n *page_break\n \n The butterfly breaks off his attack and and starts to flap away, but is caught by a glancing blow by the thrashing bunyip's head and falls limply from the air. As the bunyip hisses in anger, bringing up a wickedly clawed hand to finish your familiar off, you throw the orb with all your strength. \n\nIt sails through the air and hits true. Shattering on impact, it wraps the startled creature in a cascade of light before pulling it through the portal with a loud snapping sound. \n\nRunning over the torn ground you hunch down beside the fallen butterfly, fearing the worst. \n\n*page_break\n\nAs you turn him over, he flutters his wings and and slowly gets back up to his feet. You could cry with relief. It looks like she was only stunned!\n\n\"Never do that again! I said [i]distract[/i] it, [b]not[/b] [i]attack[/i] it!\" You gather him up tenderly in your hands. \n\nWait, what's that noise? As you pause to listen, you realise the quiet lake sounds have been replaced by the excited voices of a group of people heading your way. \n\n[i]Oh no, the people over in the picnic area must have heard or seen something to do with your altercation with the bunyip. Definitely time to go! You don't want to get caught here.[\\i]\n\nCarrying the butterfly, you quickly retreat into the forest. Too late you realise that you left the shredded cooler behind on the bank. Hopefully it doesn't cause too much trouble. Shame there's no crocodiles to blame it on in the lake, maybe they'll think it was a pack of wild dogs or something? Maybe...you can hope anyway. \n\t\t\n*set Third_Task 60\n*set good_standing -5\t\n*set grade3 \"Pass\"\n*set bunyipfamiliar 0\t\t\n*goto TPfinish\n\n\n\n\n*TPfinish\n\n*page_break\nTrouble is not long in coming. You find yourself once again in Merlinus' office. \n\nHe raises an eyebrow at you. \"So....what's this I've been hearing about wild creatures rampaging around Lake Arymire lately?\"\n\nYou cringe slightly. \"Sorry, it kind of didn't go as I planned.\" \n\n\"Uh huh, I see... You know they brought the park rangers in? They were worried that maybe someone had released a tiger into the park or something. Fortunately for you, they've decided to put it down to being someone's prank, especially with that light show of yours. Apparently the tracks in the sand and the teeth marks in the cooler don't exactly match any particular animal alive. You really did get lucky on this one. We could have been having a very different conversation otherwise.\" \n\nHe continues to regard you sternly. \"You know why this happened right?\" \n\nYou shrug. \"That bunyip was a nasty piece of work. Could have easily killed me and my familiar. I feel lucky we managed to catch it at all. Also I sure wasn't expecting that kind of light show from that capture orb. How was I to know it would be bright enough to draw people in for miles?\"\n\n*page_break\n\n\"Hmm well yes, you do have a point there... however this probably wouldn't have happened at all if you had have [i]followed the directions.\"[/i]\n\n\"You were told to work with another wizard for a reason, but you went out on your own anyway. Part of this probationary period is learning when others know better, and to follow their lead when advised to.\"\n\nHe sighs. \"Anyway, you got lucky this time and brought the Triaxian in, so I'm going to give you a passing grade on this one...just. You do need to follow directions from those higher up in the future though, understand?\"\n\nYou nod. \n\n\"Ok, well lets move forward. I actually have another assignment lined up for you.\"\n*goto_scene bunyiptodragon\n", "bunyiptask": "*page_break\nYour bedside clock is blinking 06:00 on Sunday morning when your phone rings. Blearily you answer it. \"Hello?\" \n\nA gruff voice rings tinnily down the line. \"Am I speaking to Trainee Wizard ${name}?\"\n\n*Fake_Choice\n\t#How nice of you to remember the trainee part. [i] \u003cinsert sarcasm>[/i]\n\t\t\"Well that [i]is[/i] your title isn't it?\" \n\n\t\tYou roll your eyes to the heavens and sigh, adding [i]\"No comprehension of sarcasm\"[/i] to the list of things that the phone operators don't appear to be able to grasp. \"What is it this time?\"\n\n\t#You do realise it's 6am here right?\n\t\t\"Well yes, we have detailed files on all our members and their time zones.\"  \n\n\t\tYou decide that no one working on the guild's phone service has any sense of humour. Everything seems to get taken literally. (You make a mental note never to use the phrase [i]\"Just kill me\"[/i] in jest around any of them). \n\n\t\t\"Ok, what is it this time?\" you ask wearily. \n\n\n*page_break\n\n\"We've got a situation we need you to handle.\" The voice continues without missing a beat. \n\n\"It's [i]6am[/i] on a [i]Sunday.[/i] Of [i]course[/i] you do.\" There's no way to keep the irritation out of your voice. \n\n\"Anyway,\" the phone operator continues blithely, \"this one is probably a bit above your pay grade so we're sending someone else to meet up with you there. Probationary wizard C class Jillian Smith.\" \n\nAnother rookie you think to yourself, [i]fantastic.[/i] On the bright side, it's probably still better than nothing. \"Ok what's the assignment?\"\n\n*page_break\n\n\"A water-dwelling Triaxian has taken up unauthorised residence in a waterway of your district. So far the reports are that he seems to be content with stealing the occasional sheep, however due to the populated location, there's a concern that he may bring too much attention to himself. Not to mention that this species has a reputation for taking larger prey.\" \n\nYou have a horrible suspicion you know what that \"prey\" includes. \n\n\"The Triaxian has ignored summons to speak to the council, so we're bringing him in by force.\" The voice concludes.\n\n\"By force?\" you quaver uncertainty. \"Ok...So what [i]is[/i] a water-dwelling Triaxian anyway?\" It had to be asked although you're pretty sure you're not going to like the answer.\n\n\"A Triaxian...\" The voice over the phone pauses thoughtfully. \"Hmm... what would the colloquial term be?...A bunyip I think. It will all be in your book. I recommend you have a read before you head down there. You're expected by 11 o'clock lakeside.\"\n \n*page_break\n\n\"I'm sending you a pre-made capture device. Just break it against the Triaxian and it will send him across to us to deal with. Be careful with it, it's fragile.\" The gruff voice warns.\n\nWith a rushing sound, a marble sized, violet orb pops into existence beside your ear, glowing softly. Even with the warning, its sudden materialisation startles you, causing you to drop the phone as you flinch away from the magical item. Retrieving the phone from the floor, you place it to your ear but it's already gone dead. \n\n*page_break\n\n\n\nCarefully you wrap the floating orb in a handkerchief and zip it securely into the pocket of your coat to prevent it from floating away. Perhaps you should read up on bunyips before you leave? \n\n*choice\n\t#I already know what a bunyip is, having read all about them the other day. Lets go! \n\n\t\t*goto bus\n\n\t#Better brush up on my knowledge before I head out to capture a Triaxian today. \n\t\tOpening your book to the magical creatures section, you skim down until you reach the section on Triaxians. \n\n\t\t[b]Triaxian:[/b] \n\n\t\t[i]Otherwise known as a \"Bunyip\" or \"Kianpraty\" by human residents of the planet Sol.[/i] \n\n\t\tThe Book features a black and white representation. You would have expected something more interactive from a magical volume, however things are obviously still a bit old school in wizardry circles. \n\n\t\tYou take a closer look at the sketch and decide that it is scary enough without any enhancements. \n\n\t\t*image 256px-Bunyip_1890.jpg center\n\n\n\t\t*page_break\n\n\t\t[i]Originating from the Mira System, Triaxians have developed the ability to create portals, which they have used to colonise a number of suitable planets including Earth.[/i]\n\n\t\t[i]These are primarily water dwelling creatures favouring rivers, lakes and swamps. It should be noted however, that they can be found on land within a short distance of a waterway, since they are capable of respiration in both air and water. [/i] \n\n\t\t[i]Medium to Large carnivorous entity of average intelligence and significant cunning. Appearance often resembles a hybrid of local fauna, including crocodiles, wolves and manatees, however this creature's shape shifting ability means this is variable. [/i]\n\n\t\t[i]Highly dangerous, aggressive tendencies, difficult to reason with. [b]Caution recommended.[/b] [/i] \t\n\n\t\t*goto bus\n\t\n\n\t#Decide to ignore the assignment. I'm not tangling with a bunyip thank you very much.   \n\t\t*goto declinebunyip\t\n\n\n*label declinebunyip\n\nYou've got some idea of what a bunyip is, and going out trying to catch one is [i]not[/i] your idea of a good time. You suspect you should let the know that you're not going but you have no idea how to contact the Wizard's Guild directly. Well serves them right for ordering you around and hanging up on you. \n\n*page_break\n\nYou spend the rest of the day quite productively, catching up on all manner of jobs you'd been putting off. At the end of the day, you decide to switch on the TV and have some dinner. \n\nTurning on the news, what you see makes your heart sink. The fluffy story at the end of the program, usually reserved for surfing sheep, talking dogs and other quirky going's on; today features a rather shaken group of people who are insisting their lake has its own monster. Some are even insisting it was some kind of alien due to its sudden disappearance amidst bright lights.\n\n*page_break Uh-Oh\n\nWell at least it sounds like the other wizard caught it in the end? You suspect there's going to be trouble over this, but it still beats being potentially eaten by a bunyip. \n\nAs you continue to listen to the broadcast, it becomes clear that so far, it's still being treated as a joke. The presenter makes a number of quips, including the good old [i]\"There must be something in the water\"[/i] and there was some implied speculation about whether the party had been gathering their own mushrooms for the BBQ and a \"special\" one was inadvertently included. Hopefully it'll be enough to keep you off the hook.                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           \t\n*Set strikes +1\t\n*set Good_Standing -10\t\n*set grade3 \"Fail\"\n*goto_scene declinebunyipoffice\t\n\n\n\n*label bus\n\n*page_break\n\nAfter a long trip involving several changes of buses and trains you arrive at the popular fishing spot, Lake Arymire.  The weather has held and it's turning out to be a beautiful morning with the sun shining brightly through a softly cloud streaked sky. Only the lightest of breezes disturbs the dark grey-green surface of the water. \n\nA group of holiday makers are already out at the picnic ground by the lake shore. Potential witnesses are going to make your life more difficult, unfortunately there's nothing for it but to go ahead with your assignment. \n\nSitting down to wait, time ticks by with no sign of the wizard you're meant to meet here. It's already 11:30am, maybe you should get started without her?\n\n*choice\n\t#Try to find and capture the bunyip by yourself. \n\t\tYou fidget, glancing frequently at your watch. By 11:45am you decide that Jillian is not coming and head out on your own around the far side of the lake. After searching the area, you settle on a small beach, shielded by overhanging willow trees. Setting down the plastic cooler, you take out some lamb chops tied up with fishing line and dangle them in the murky water by the shore as bait. You pick a spot clear of the water's edge and settle down to wait.\n\n\t\tIt takes a while, but eventually you see a string of bubbles heading rapidly towards your position. With a flick of a muscular, furred tail, the bunyip launches itself out clean out of the water, meat fastened securely in a crocodile like jaw. With a sharp twist of it's head, it snaps the fishing line and gulps the food down in a single swallow. Sniffing the air like a wolf, it quickly zero's in on your cooler with the remaining cuts of lamb and fearlessly saunters up the embankment. \n\n\t\t*goto bunyipshore\n\n\n\t#Follow the assignment brief and wait for back up.   \n\t\tYou decide the guild probably know what they're doing and wait for the other wizard to turn up. \n\t\t*goto waitwizard \n\n\n*label bunyipshore\n \n*choice \n\t#Try to talk to the bunyip.\n\t\t\"Hey bunyip, over here!\" You call waving your arms around for effect. The creature turns glowing eyes on you, tail lashing back and forth in the sand. As you watch, a line of wickedly sharp, ragged looking spines, sprout from the top of the bunyip's head continuing down to the end of the tail. It growls threateningly at you. \n\n\t\t\"Triaxian, I am a representative of the wizard's council. I'm here to tell you that the council requires your attendance, to discuss your presence here and to ensure that you cease your activities that are making you visible to the public.\" \n\n\t\t*page_break\n\n\t\tIt gives a guttural laugh that sounds surreal coming from the jaws of a crocodile. Muscular legs tipped in sharp claws, rake the sand menacingly. You gulp. Is it just your imagination or is the bunyip larger than it was a few moments ago? Saliva drips from its fanged maw as it slowly but deliberately advances. \n\n\t\tFumbling at the zip on your jacket pocket you manage to pull the orb free. Seeing the magical item, the monster springs backwards with more agility than you would have believed possible, turning to gallop back to the water. You hurriedly throw the orb after the retreating creature, but miss, the construct splashing into the water with a soft fizzle. \n\n\t\t*page_break\n\n\t\tWhoops. You have a feeling you're going to have some explaining to do to the Wizard's guild and they're not likely to be happy. On the upside maybe you've scared the bunyip into keeping a low profile for a while. Maybe...\n\t\t*Set third_task 0\n\t\t*set Good_Standing -10\n\t\t*set grade3 \"Fail\"\n\t\t*set bunyipfamiliar 0\n\t\t*goto failbunyip\n\n\n\n\t\t\n\t#Throw the orb! Don't waste time, throw it now!\n\n\t\tThe bunyip is distracted, busily attacking your cooler, sharp teeth and claws tearing chunks out of the plastic.  With a shiver you decide you never want to meet one of these guys in the water. \n\t\t\n\t\tQuickly retrieving the orb from your pocket you lob it towards the monster. It sails gracefully in an arc though the air, smashing into a curtain of glittering sparkles over the bunyip's back. The cascade of magic, whips around the unhappy creature, surrounding it in a curtain of light. With a last blinding flash, the bunyip is sucked though a portal and disappears. \n\n\t\t*page_break\n\n\t\tYour sigh or relief is short lived. You hear the raised voices of a number of people running towards your location. There's confusion as they enter the clearing and see you, all jabbering at once about the brilliant flash of light they've seen coming from this area. \n\t\n\t\t*choice\n\t\t\t#Um well you see there was this beam of sunlight, and it was reflecting off some swamp gas.....\n\t\t\t\tYou fumble through an explanation that you decide has an unfortunate resemblance to something you heard in a movie about ET's. Your audience looks sceptical and you can tell they're not buying your story, as they take in the mangled cooler and claw marks around the shoreline. You hope no one got any of the magical working on film. Even if they didn't, you can see there'll be trouble over this. At least the bunyip has been dealt with. \n\n\n\t\t\t\t*achieve mib\n\t\t\t\t*set Third_Task 60\n\t\t\t\t*set good_standing -5\t\n\t\t\t\t*set grade3 \"Pass\"\n\t\t\t\t*set bunyipfamiliar 0\n\t\t\t\t*goto mib\n\n\t*selectable_if ((familiarnumber > 0) and (bunyipfamiliar = 0)) #Wait, how did your familiar get here?  \n\t\tEven though you doubt the creature managed to stow away in your bag, the familiar form of your ${familiartype} appears at the edge of the clearing as if called. It must have something to do with the magical link between the two of you, you surmise. \n\t\n\t\tIt'll certainly help you if you ask. Do you want to risk having your familiar too close to the bunyip?\n\t\n\t\t*choice\n\t\t\t*if (familiartype = \"Moody Badger\") #Ask for help. \n\t\t\t\tYou call over your friend from the tree line, as you watch the bunyip stalking up the embankment, long claws creating deep furrows in the sand as it heads towards the cooler containing the rest of the meat you'd bought as bait. That might be distraction enough? You take a hesitant step towards the bunyip. \n\t\t\t\n\t\t\t\tWith lightening speed, the creature spins around, crocodile like tail thrashing as it hisses menacingly in your direction. When you freeze, the bunyip lowers its spined neck, returning its attention to attacking the plastic container. You notice it keeps at least one glowing eye trained on you at all times though. \n\t\t\t\n\t\t\t\tSneaking up on it is going to be difficult and ideally you'd like to get closer to be sure of hitting the monster with your capture orb. If you miss, that fanged maw will probably make as short a work of you, as it has of the cooler. Maybe your familiar can help out with a distraction?\n\n\t\t\t\tThe badger sits quietly by your side. Hmm, how to do this? If you speak aloud the bunyip is close enough that it might hear and understand you. You don't dare leave the area in case it disappears as soon as you're out of sight. How is your telepathy coming along?\n\t\t\t\t*choice\t\n\t\t\t\t\n\t\t\t\t\t*selectable_if (telepathy > 9) #Actually it's one of my specialities, I think I'm accomplished enough at this to communicate clearly enough to be understood.\n\t\t\t\t\t\t*goto telepathybadger\n\t\t\t\t\t\t\n\t\t\t\t\t*selectable_if (telepathy \u003c 10) #I'm still working on it, but find it tricky. \n\t\t\t\t\t\n\t\t\t\t\t\tIt's not like ${speciality}, which you find so much easier. Your abilities in mental communication can sometimes be a bit hit and miss. You're not sure you really want to risk your familiar on a miscommunication. \n\t\t\t\t\t\n\t\t\t\t\t\tDo you want to risk telling the badger aloud what the plan is? Or try something else that doesn't involve your familiar.\n\t\t\t\t\t\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Take the risk, whispering as quietly as you can. \n\t\t\t\t\t\t\t\t*goto whisperbadger\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#No, I've changed my mind, lets try something different. \n\t\t\t\t\t\t\t\t*goto bunyipshore\n\t\t\n\t\t\n\t\t\n\t\t\t*if (familiartype = \"Ember Gecko\") #Ask for help. \n\t\t\n\t\t\t\tYou call over your friend from the tree line, as you watch the bunyip stalking up the embankment, long claws creating deep furrows in the sand as it heads towards the cooler containing the rest of the meat you'd bought as bait. That might be distraction enough? You take a hesitant step towards the bunyip. \n\t\t\t\n\t\t\t\tWith lightening speed, the creature spins around, crocodile like tail thrashing as it hisses menacingly in your direction. When you freeze, the bunyip lowers its spined neck, returning its attention to attacking the plastic container. You notice it keeps at least one glowing eye trained on you at all times though. \n\t\t\t\n\t\t\t\tSneaking up on it is going to be difficult and ideally you'd like to get closer to be sure of hitting the monster with your capture orb. If you miss, that fanged maw will probably make as short a work of you, as it has of the cooler. Maybe your familiar can help out with a distraction?\n\n\t\t\t\tThe gecko perches lightly on a nearby rock. Hmm, how to do this? If you speak aloud the bunyip is close enough that it might hear and understand you. You don't dare leave the area in case it disappears as soon as you're out of sight. How is your telepathy coming along?\n\t\t\t\t*choice\t\n\t\t\t\t\n\t\t\t\t\t*selectable_if (telepathy > 9) #Actually it's one of my specialities, I think I'm accomplished enough at this to communicate clearly enough to be understood.\n\t\t\t\t\t\t*goto telepathylizard\n\t\t\t\t\t\n\t\t\t\t\t*selectable_if (telepathy \u003c 10) #I'm still working on it, but find it tricky. \n\t\t\t\t\t\n\t\t\t\t\t\tNot like ${speciality}, which you find so much easier. Your abilities in mental communication can sometimes be a bit hit and miss. You're not sure you really want to risk your familiar on a miscommunication. \n\t\t\t\t\t\n\t\t\t\t\t\tDo you want to risk telling the gecko aloud what the plan is? Or try something else that doesn't involve your familiar.\n\t\t\t\t\t\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Take the risk, whispering as quietly as you can. \n\t\t\t\t\t\t\t\t*goto whisperlizard\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#No, I've changed my mind, lets try something different. \n\t\t\t\t\t\t\t\t*goto bunyipshore\t\n\t\t\n\t\t\t*if (familiartype = \"Sapphire Winged Butterfly\") #Ask for help. \n\t\t\t\tYou call over your friend from the tree line, as you watch the bunyip stalking up the embankment, long claws creating deep furrows in the sand as it heads towards the cooler containing the rest of the meat you'd bought as bait. That might be distraction enough? You take a hesitant step towards the bunyip. \n\t\t\t\n\t\t\t\tWith lightening speed, the creature spins around, crocodile like tail thrashing as it hisses menacingly in your direction. When you freeze, the bunyip lowers its spined neck, returning its attention to attacking the plastic container. You notice it keeps at least one glowing eye trained on you at all times though. \n\t\t\t\n\t\t\t\tSneaking up on it is going to be difficult and ideally you'd like to get closer to be sure of hitting the monster with your capture orb. If you miss, that fanged maw will probably make as short a work of you, as it has of the cooler. Maybe your familiar can help out with a distraction?\n\n\t\t\t\tThe butterfly perches lightly on your outstretched hand. Hmm, how to do this? If you speak aloud the bunyip is close enough that it might hear and understand you. You don't dare leave the area in case it disappears as soon as you're out of sight. How is your telepathy coming along?\n\t\t\t\t*choice\t\n\t\t\t\t\n\t\t\t\t\t*selectable_if (telepathy > 9) #Actually it's one of my specialities, I think I'm accomplished enough at this to communicate clearly enough to be understood.\n\t\t\t\t\t\t*goto telepathybutterfly\n\t\t\t\t\t\n\t\t\t\t\t*selectable_if (telepathy \u003c 10) #I'm still working on it, but find it tricky. \n\t\t\t\t\t\tNot like ${speciality}, which you find so much easier. Your abilities in mental communication can sometimes be a bit hit and miss. You're not sure you really want to risk your familiar on a miscommunication. \n\t\t\t\t\t\n\t\t\t\t\t\tDo you want to risk telling the butterfly aloud what the plan is? Or try something else that doesn't involve your familiar.\n\t\t\t\t\t\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Take the risk, whispering as quietly as you can. \n\t\t\t\t\t\t\t\t*goto whisperbutterfly\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#No, I've changed my mind, lets try something different. \n\t\t\t\t\t\t\t\t*goto bunyipshore\t\t\n\t\t\n\t\t\t*if (familiartype = \"Iridescent Kingfisher\") #Ask for help. \n\t\t\t\tYou call over your friend from the tree line, as you watch the bunyip stalking up the embankment, long claws creating deep furrows in the sand as it heads towards the cooler containing the rest of the meat you'd bought as bait. That might be distraction enough? You take a hesitant step towards the bunyip. \n\t\t\t\n\t\t\t\tWith lightening speed, the creature spins around, crocodile like tail thrashing as it hisses menacingly in your direction. When you freeze, the bunyip lowers its spined neck, returning its attention to attacking the plastic container. You notice it keeps at least one glowing eye trained on you at all times though. \n\t\t\t\n\t\t\t\tSneaking up on it is going to be difficult and ideally you'd like to get closer to be sure of hitting the monster with your capture orb. If you miss, that fanged maw will probably make as short a work of you, as it has of the cooler. Maybe your familiar can help out with a distraction?\n\n\t\t\t\tThe kingfisher perches quietly on your shoulder. Hmm, how to do this? If you speak aloud the bunyip is close enough that it might hear and understand you. You don't dare leave the area in case it disappears as soon as you're out of sight. How is your telepathy coming along?\n\t\t\t\t*choice\t\n\t\t\t\t\n\t\t\t\t\t*selectable_if (telepathy > 9) #Actually it's one of my specialities, I think I'm accomplished enough at this to communicate clearly enough to be understood.\n\t\t\t\t\t\t*goto telepathybird\n\t\t\t\t\t\n\t\t\t\t\t*selectable_if (telepathy \u003c 10) #I'm still working on it, but find it tricky. \n\t\t\t\t\t\tNot like ${speciality}, which you find so much easier. Your abilities in mental communication can sometimes be a bit hit and miss. You're not sure you really want to risk your familiar on a miscommunication. \n\t\t\t\t\t\n\t\t\t\t\t\tDo you want to risk telling the kingfisher aloud what the plan is? Or try something else that doesn't involve your familiar.\n\t\t\t\t\t\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Take the risk, whispering as quietly as you can. \n\t\t\t\t\t\t\t\t*goto whisperbird\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#No, I've changed my mind, lets try something different. \n\t\t\t\t\t\t\t\t*goto bunyipshore\t\t\n\t\t\t\n\t\t\t#You don't want to risk it, maybe there's another way. \n\t\t\t\tYou don't want to put anyone in danger needlessly, maybe you could try something else? \n\t\t\t\t*set bunyipfamiliar 1\n\t\t\t\t*goto bunyipshore\n\t\t\t\n\n\n\n*label waitwizard\nSitting on a log near the car park, you try not to look too impatient you wait. It's almost an hour before you notice a stressed looking girl running down the road. Maybe 16 years of age with her hair tied back in a long plait and thick glasses, she's holding a leather bound book under her arm.\t\n\nYou decide this is probably who you have been waiting for and call out to her. \"Jillian?\"\n\nShe runs over and comes to a stop, wheezing slightly and out of breath. \"Yes that's me....Sorry, I know I'm late. It's just my watch stopped working....and I missed the bus....and then took a wrong turn...\"\n\nYou cut her off. \"It's ok, at least you're here now.\" \n\n*page_break\n\nShe looks uncomfortable. \"You know we're meant to be catching a bunyip?\" \n\nYou nod silently. \n\nShe continues nervously. \"I know someone who had a run in with one. They still haven't found him...\" \n\nShe's looking really scared and honestly you're not all that sure she's going to be of much help tracking down the creature with you. \n\n\"Say Jillian,\" you take her by the shoulder, steering her towards the lake. \"You know what I could really use help with? See all those people having a picnic down by the lake shore, it'd be really nice to have them distracted for a while so they don't stumble onto what we're doing with the bunyip, don't you think?\" \n\nShe brightens immediately at the suggestion. \"Oh yes I could definitely manage a distraction. But don't you need help with the bunyip itself?\"\n\nYou show her the capture orb. \"I'll be alright as long as I can find it.\"\n\n\"I can help with that, illusion is kind of my thing.\" She retrieves a small stone from the pocket of her faded jeans and hands it to you. \n\n\"I made this earlier, one of the other reasons why I was late. See here.\" She points to some symbols inscribed on the edge of the stone. \"When you're ready just say the words and it'll look just like a dead sheep.\" \n\nShe screws up her nose. \"Should smell like one too, if it's anything like the practice one I made on the floor of my room. Should be enough to get the attention of our beastie out there.\" \n\n*page_break\n\nThanking her, you take the stone and head over to the other side of the lake where you should be shielded by some trees from anyone watching from the picnic ground. Right on cue, you hear distant voices yelling. You peek through the branches and it seems as if the picnickers are chasing what looks like a riderless, escaped horse. Jillian seems to be directing the hunt, you hear occasional clear words that seem to indicate that the horse had apparently had thrown her during a ride by the lake. It would have been amusing to stay and watch the chaos, but you have a monster to catch. \n\nSetting the stone down by the water, you activate the symbols. Immediately there's a week old, rotting, dead sheep by the lake shore. The illusion is a good one, it even seems to convince the flies that appear out of nowhere to buzz around the corpse.\n\nWrinkling your nose at the smell, you hope it doesn't take too long for the Triaxian to take the bait. \n\n*page_break\n\nBefore long, you see a disturbance in the water heading your way. Bubbles and the occasional splashes, let you track the incoming creature's progress.\n\nWith a surge of water, a 14 foot mixture of scales, fur and spines, flicks a muscled, flattened tail to propel it clean out of the lake onto the shore. Fastening a crocodile like jaw around the sheep carcase, it shakes it viciously. There's a moment of confusion, as the creature realises it's bitten down on air, which gives you the seconds you need to hit it squarely in the chest with the magical orb. \n\nThe Triaxian disappears in a shower of bright sparks. You fear the bright flash would most likely be visible for miles and sincerely hope Jillian is still keeping the other visitors busy.\n\n*Page_break\n\nBy the time you've walked back to the car park, Jillian is busy thanking everyone for helping to catch her wayward horse, a very convincing shaggy, brown pony with mischievous eyes. No one seems to notice that the equine leaves no hoof prints in the dirt and simply wish her well in getting the troublesome pony home. \n\nYou join up with the other wizard as she walks away from the lake, horse by her side. She smiles, \"I gather it all went ok?\"\n \n\"All to plan,\" you confirm.  \"Say this illusion spell is fantastic.\" \n\nYou reach over to pat the horse which nips bad temperedly at your fingers. You snatch your hand away in spite of yourself. \"You must show me how you do that!\"\n\nJillian laughs, and with a wave of her hand, horse disappears in a puff of smoke. \"Sure, I'd love to.\"\n\n\n*set Third_task 100\n*set good_standing +10\n*achieve plays\n*set grade3 \"Pass\"\n*set hundredpercent +1\n*goto 100bunyip\n\n*comment ---------------------------------------\n\n\n\n\n\n\n\n*label failbunyip\n*page_break\nTrouble is not long in coming. You find yourself once again in Merlinus' office. \n\nHe clears his throat. \"Ok, tell me about it.\"\n\nYou consider lying but his stern grey eyes convince you otherwise. \"I kind of missed the bunyip with the orb, it's still out there.\" you say softly. \n\nThe old wizard sighs. \"Yes I know that. And now it's going to be on the look out for us making my job much harder. Why do you think you failed?\"\n\nYou shrug. \"It's fast, cleverer than I would have thought. It caught me by surprise.\"\n*page_break\n\n\"Yes well there was that.\" Merlinus continues. \"But the main reason was that you [i]didn't follow directions.[/i]\" \n\n\"You were told to work with another wizard for a reason, but you went out on your own anyway. Part of this probationary period is learning when others know better, and to follow their lead when advised to.\"\n\n\"Well that's that. Hope you have learned from this. I'm going to have to put a failing grade on this task. Make sure it doesn't happen again. Alright?\" He shuffles some papers on his desk. \n\n\"Ok I have another assignment for you, make sure you do follow directions this time. The creature you're going out to deal with is significantly more dangerous than a bunyip.\"\n*goto_scene bunyiptodragon\n\n\n*label mib\n*page_break\nTrouble is not long in coming. You find yourself once again in Merlinus' office. \n\nHe raises a bushy eyebrow at you. \"So....Swamp gas huh?\"\n\nYou cringe slightly. \"It was all I could come up with at the time.\" \n\n\"Uh huh, I see... You know you're lucky those people decided it was some kind of prank on your part. Could have ended quite differently.\" He continues to regard you sternly. \"You know why this happened right?\" \n\nYou shrug. \"Well I sure wasn't expecting that kind of light show from that capture orb. How was I to know it would draw people in for miles?\"\n\n*page_break\n\n\"Hmm well yes, you do have a point there... however this probably wouldn't have happened at all if you had have [i]followed the directions.\"[/i]\n\n\"You were told to work with another wizard for a reason, but you went out on your own anyway. Part of this probationary period is learning when others know better, and to follow their lead when advised to.\"\n\nHe sighs. \"Anyway, you got lucky this time and brought the Triaxian in, so I'm going to give you a passing grade on this one...just. You do need to follow directions from those higher up in the future though, understand?\"\n\nYou nod. \n\n\"Ok, well lets move forward. I actually have another assignment lined up for you.\"\n*goto_scene bunyiptodragon\n\n\n\n\n*label 100bunyip\n*page_break\nSoon enough you find yourself back in Merlinus' office. \n\nHe gives you a wide grin. \"Hey, congratulations on bringing that Triaxian in. Couldn't have handled it better myself. You know, I'm glad to see you can co-operate with other wizards well, you should be proud. Oh, and good idea using Jillian to distract the other people at the lake. They could have been a problem.\"\n\n\"Ok so I've called you in again today, as you've likely already surmised, to give you your next assignment. This one could be a little tricky, but I'm sure you're up to it.\" He tells you confidently.\n\n*goto_scene bunyiptodragon\n\n\n\n\n\n\t\t\t\n\n\t\t\t\n*label whisperbird\t\n\nYou glance down at the kingfisher who regards you with bright, intelligent eyes. \n\n\"Ok, here's the deal,\" you whisper. \"Can you take that bunyip's attention off me for a minute? While it's distracted I'll try to get in close enough and capture it.\"\t\n\nThe iridescent white and green bird gives a human like nod. \n\nYou glance back at the bunyip which has stopped its attack on the esky and now regards you steadily with glowing red eyes, wolf like ears pricked in your direction. [i]Oh no! Looks like it heard you![/i]\n\nAs you watch, the creature morphs, increasing in size, muzzle elongating into a crocodile like maw, filled with sharp teeth. \n\n\"Run!\" you yell to your familiar, who streaks off towards the cover of the forest. The bunyip hesitates for a second, deciding which of you to go after. It's all you need. \n\nSwiftly retrieving the capture orb from your pocket, you fling the glowing object towards the hissing monster. \n\nIt sails through the air and hits the bunyip squarely on its scaled nose. Shattering on impact, magic wraps the startled creature in a cascade of light before pulling it through the portal with a loud snapping sound. \n\n*page_break\n\nYou sit down shakily. [i]Wow that was too close![/i] Your kingfisher reappears unharmed, peaking out through the foliage Deciding it was safe to come out, she flies over to your side. \n\nWait, what's that noise? The quiet lake sounds have been replaced by the excited voices of a group of people heading your way. \n\n[i]Oh no! The people over in the picnic area must have heard or seen something to do with your altercation with the bunyip.[/i]\n\nThe bird makes a motion towards the trees with her head. \n\nYou give her a quick scratch. \"Yes I agree, it's definitely time to get out of here.\"\n\nPlacing the bird on your shoulder, you quickly retreat into the forest, pushing your way through the dense undergrowth, before circling around back to the carpark. Too late you realise that you left the shredded cooler behind on the bank. Hopefully it doesn't cause too much trouble. Shame there's no crocodiles to blame it on in the lake, maybe they'll think it was a pack of wild dogs or similar? Maybe...you can hope anyway. \n\t\t\n*set Third_Task 60\n*set good_standing -5\t\n*set grade ud snapping sound. \n\n*page_break\n\nYou sit down shakily. [i]Wow that was too close![/i] Your badger reappears unharmed, peaking out through the undergrowth. Deciding it was safe to come out, he trots over to your side. \n\nWait, what's that noise? The quiet lake sounds have been replaced by the excited voices of a group of people heading your way. \n\n[i]Oh no! The people over in the picnic area must have heard or seen something to do with your altercation with the bunyip.[/i]\n\nThe badger makes a motion towards the trees with his head. \n\nYou give him a quick pat. \"Yes I agree, it's definitely time to get out of here.\"\n\nYou quickly retreat into the forest, pushing your way through the dense undergrowth, before circling around back to the carpark. Too late you realise that you left the shredded cooler behind on the bank. Hopefully it doesn't cause too much trouble. Shame there's no crocodiles to blame it on in the lake, maybe they'll think it was a pack of wild dogs or similar? Maybe...you can hope anyway. \n\t\t\n*set Third_Task 60\n*set good_standing -5\t\n*set grade3 \"Pass\"\n*set bunyipfamiliar 0\t\t\n*goto TPfinish\n\n\n\n*label telepathylizard \nYou glance down at the lizard who regards you with bright, intelligent eyes. \n\n[i]\"Ok, here's the deal,\"[/i] you voice silently. [i]\"Can you take that bunyip's attention off me for a minute? While it's distracted I'll try to get in close enough and capture it.\"[/i]\t\n\nThe black and orange scaled animal gives a human like nod. \n\nYou glance back at the bunyip which is continuing to rip apart the esky. [i]\"Ok, be careful alright?\"[/i] \n\nYou reach down and give him an affectionate patch on the head, before the gecko bounds away into the forest out of view. \n\n*page_break\n\nYou don't have long to wait before you see movement on the other side of the clearing. You wait nervously for the bunyip to react, but its attention is firmly split between you and its meal. \n \nLeaping from a nearby branch, the gecko lands on the monster's head and sinks his teeth into a wolf like ear. [i]Oh no, you weren't expecting him to do that![/i]\n \nThe bunyip howls more in surprise than pain, fangs elongating as it morphs in front of you. Thrashing its head from side to side, it attempts to dislodge the unwelcome passenger.\n\nYou hesitate, glowing orb in hand. There's no way to capture the bunyip without hitting your friend as well. [i]\"Move! Let go!\"[/i] you urge silently.\n \n*page_break\n \nThe gecko releases his grip and is thrown away, tumbling along the sand in a tangle of legs. The bunyip hisses in anger pouncing after him. As the creature brings up a wickedly clawed hand to finish your familiar off, you throw the orb with all your strength. \n\nIt sails through the air and hits true. Shattering on impact, it wraps the startled creature in a cascade of light before pulling it through the portal with a loud snapping sound. \n\nRunning over the torn ground, you hunch down beside the fallen lizard, fearing the worst. \n\n*page_break\n\nAs you turn him over, he blinks a few times and slowly gets back up to his feet. You could cry with relief. It looks like he was only stunned!\n\n\"Never do that again! Is said [i]distract[/i] it, [b]not[/b] [i]attack[/i] it!\" You gather him up in a hug. \n\nWait, what's that noise? The quiet lake sounds have been replaced by the excited voices of a group of people heading your way. \n\n[i]Oh no! The people over in the picnic area must have heard or seen something to do with your altercation with the bunyip. Definitely time to go! You don't want to get caught here.[/i]\n\nCradling the the small lizard in your hands, you quickly retreat into the forest. Too late you realise that you left the shredded cooler behind on the bank. Hopefully it doesn't cause too much trouble. Shame there's no crocodiles to blame it on in the lake, maybe they'll think it was a pack of wild dogs or similar? Maybe...you can hope anyway. \n\t\t\n*set Third_Task 60\n relief. It looks like he was only stunned!\n\n\"Never do that again! Is said [i]distract[/i] it, [b]not[/b] [i]attack[/i] it!\" You gather him up in a hug. \n\nWait, what's that noise? The quiet lake sounds have been replaced by the excited voices of a group of people heading your way. \n\n[i]Oh no! The people over in the picnic area must have heard or seen something to do with your altercation with the bunyip. Definitely time to go! You don't want to get caught here.[/i]\n\nPicking up the heavy badger, you quickly retreat into the forest. Too late you realise that you left the shredded cooler behind on the bank. Hopefully it doesn't cause too much trouble. Shame there's no crocodiles to blame it on in the lake, maybe they'll think it was a pack of wild dogs or similar? Maybe...you can hope anyway. \n\t\t\n*set Third_Task 60\n*set good_standing -5\t\n*set grade3 \"Pass\"\n*set bunyipfamiliar 0\t\t\n*goto TPfinish\n\n\n\n\n\n*label telepathybird \nYou glance at the kingfisher on your shoulder who regards you with bright, intelligent eyes. \n\n[i]\"Ok, here's the deal,\"[/i] you voice silently. [i]\"Can you take that bunyip's attention off me for a minute? While its distracted I'll try to get in close enough and capture it.\"[/i]\t\n\nThe iridescent green and white bird gives a very human like nod. \n\nYou glance back at the bunyip which is continuing to rip apart the esky. [i]\"Ok, be careful alright?\"[/i] \n\nYou give her an affectionate scratch on the head, before she spreads her wings, quickly flying away into the forest. \n*page_break\n\nYou don't have long to wait before you see the small bird appear on the other side of the clearing, perched on a leafy branch. You wait nervously for the bunyip to react, but its attention is firmly split between you and its meal. \n \nDiving towards the bunyip, the kingfisher starts to peck furiously at the creature's furry head. [i]Oh no, you weren't expecting him to do that![/i]\n \nThe bunyip howls in pain, fangs elongating as it morphs in front of you, tossing its head around as it attempts to dislodge the bird which has grabbed hold of one of the spines and continues to rain blows above its eyes. \n \nYou hesitate, glowing orb in hand. There's no way to capture the bunyip without hitting your friend as well. [i]\"Move! Let go!\"[/i] you urge silently.\n \n*page_break\n \nThe bird releases her grip and starts to flap away, but is caught by a glancing blow by the thrashing bunyip's head and tumbles to the ground in a flurry of feathers. As the bunyip hisses in anger, bringing up a wickedly clawed hand to finish your familiar off, you throw the orb with all your strength. \n\nIt sails through the air and hits true. Shattering on impact, it wraps the startled creature in a cascade of light before pulling it through the portal with a loud snapping sound. \n\nRunning over the torn ground, you hunch down beside the fallen bird, fearing the worst. \n\n*page_break\n\nAs you turn her over, she blinks a few times and slowly gets back up to her feet. You could cry with relief. It looks like she was only stunned!\n\n\"Never do that again! Is said [i]distract[/i] it, [b]not[/b] [i]attack[/i] it!\" You gather her up tenderly in your hands. \n\nWait, what's that noise? The quiet lake sounds have been replaced by the excited voices of a group of people heading your way. \n\n[i]Oh no! The people over in the picnic area must have heard or seen something to do with your altercation with the bunyip. Definitely time to go! You don't want to get caught here.[/i]\n\nCarrying the kingfisher, you quickly retreat into the forest. Too late you realise that you left the shredded cooler behind on the bank. Hopefully it doesn't cause too much trouble. Shame there's no crocodiles to blame it on in the lake, maybe they'll think it was a pack of wild dogs or similar? Maybe...you can hope anyway. \n\t\t\n*set Third_Task 60\n*set good_standing -5\t\n*set grade3 \"Pass\"\n*set bunyipfamiliar 0\t\t\n*goto TPfinish\n\n\n\n\n*label telepathybutterfly \nYou glance at the butterfly on your hand who regards you with bright, intelligent eyes. \n\n[i]\"Ok, here's the deal,\"[/i] you voice silently. [i]\"Can you take that bunyip's attention off me for a minute? While its distracted I'll try to get in close enough and capture it.\"[/i]\t\n\nThe shimmering blue and gold insect gives a very human like nod. \n\nYou glance back at the bunyip which is continuing to rip apart the esky. [i]\"Ok, be careful alright?\"[/i] \n\nHe gives you a flicker of wings to show he understands before flitting away into the forest. \n*page_break\n\nYou don't have long to wait before you see the large butterfly appear on the other side of the clearing, perched on a leafy branch. You wait nervously for the bunyip to react, but its attention is firmly split between you and its meal. \n \nFlying swiftly towards the bunyip, the butterfly flaps furiously around the glowing creature's eyes. [i]Oh no, you weren't expecting him to do that![/i]\n \nThe bunyip howls in annoyance, fangs elongating as it morphs in front of you, tossing its head around and swiping at the air with its claws as it attempts to rid itself of the irritating insect.\n\nYou hesitate, glowing orb in hand. There's no way to capture the bunyip without hitting your friend as well. [i]\"Move! Fly away!\"[/i] you urge silently.\n \n*page_break\n \nThe butterfly breaks off his attack and and starts to flap away, but is caught by a glancing blow by the thrashing bunyip's head and falls limply from the air. As the bunyip hisses in anger, bringing up a wickedly clawed hand to finish your familiar off, you throw the orb with all your strength. \n\nIt sails through the air and hits true. Shattering on impact, it wraps the startled creature in a cascade of light before pulling it through the portal with a loud snapping sound. \n\nRunning over the torn ground, you hunch down beside the fallen butterfly, fearing the worst. \n\n*page_break\n\nAs you turn him over, he flutters his wings and and slowly gets back up to his feet. You could cry with relief. It looks like she was only stunned!\n\n\"Never do that again! Is said [i]distract[/i] it, [b]not[/b] [i]attack[/i] it!\" You gather him up tenderly in your hands. \n\nWait, what's that noise? The quiet lake sounds have been replaced by the excited voices of a group of people heading your way. \n\n[i]Oh no! The people over in the picnic area must have heard or seen something to do with your altercation with the bunyip. Definitely time to go! You don't want to get caught here.[/i]\n\nCarrying the butterfly, you quickly retreat into the forest. Too late you realise that you left the shredded cooler behind on the bank. Hopefully it doesn't cause too much trouble. Shame there's no crocodiles to blame it on in the lake, maybe they'll think it was a pack of wild dogs or similar? Maybe...you can hope anyway. \n\t\t\n*set Third_Task 60\n*set good_standing -5\t\n*set grade3 \"Pass\"\n*set bunyipfamiliar 0\t\t\n*goto TPfinish\n\n\n\n\n*label TPfinish\n\n*page_break\nTrouble is not long in coming. You find yourself once again in Merlinus' office. \n\nHe raises an eyebrow at you. \"So....what's all this I've been hearing about wild creatures rampaging around Lake Arymire lately?\"\n\nYou cringe slightly. \"Sorry, it kind of didn't go exactly as I had planned.\" \n\n\"Uh huh, I see... You know they brought the park rangers in? There were some people around who apparently thought that maybe someone had release a tiger or something into the park. Fortunately for you, they've decided to put it down to being someone's idea of a bad joke, especially with that light show of yours into the bargain. Apparently the tracks in the sand and the teeth marks in the cooler are not a match for any particular animal. You really did get kind of lucky with that, we could have been having a very different conversation otherwise.\" \n\nHe continues to regard you sternly. \"You know why this happened right?\" \n\nYou shrug. \"That bunyip was a nasty piece of work, it could have easily killed me and my familiar. I'm feeling lucky we managed to catch it at all. Also, I sure wasn't expecting that kind of light show from the capture orb. I would have been helpful if someone had have warned me it did that!\"\n*page_break\n\n\"Hmm well yes, you do have a point there... however this probably wouldn't have happened at all if you had have [i]followed the directions.\"[/i]\n\n\"You were told to work with another wizard for a reason, but you went out on your own anyway. Part of this probationary period is learning when others know better, and to follow their lead when advised to.\"\n\nHe sighs. \"Anyway, you got lucky this time and brought the Triaxian in, so I'm going to give you a passing grade on this one...just. You do need to follow directions from those higher up in the future though, understand?\"\n\nYou nod. \n\n\"Ok, well lets move forward. I actually have another assignment lined up for you.\"\n*goto_scene bunyiptodragon\n", "bunyiptodragon": "*COMMENT follows bunyip task\n\n*page_break\n\n\"What's the assignment this time?\" you ask warily. \n\n\"Well it's a simple task really.\" Merlinus allows. \"The difficulty is not in what you need to do.... as it is in who you might need to deal with while you're there.\"\n\nYou nod silently, while the wizard pulls out a small box from from his drawer. The package sparkles slightly with energy, and you notice a magical seal on the top of the box to prevent anyone from opening it without permission. \n\n\"I need you to deliver this to an address in the Scottish Highlands. The Loch Ness area to be precise.\" Merlinus continues handing you the parcel. \n\n\"There's a shielded cave hidden along the shoreline, a larger ward protects the area discouraging anyone from getting too close. I have a map here somewhere...\" He resumes rifling through the pages on his desk\n\n*page_break\n\nYou have a sinking feeling you know where the Merlinus is going with this. \n\n\"This delivery. It wouldn't happen to involve a large, reptilian-like monster, reported to live in the lake would it?\"\n\n\"Why yes, it certainly may,\" the wizard responds thoughtfully. \"Although with any luck she'll be resting or away hunting when you get there. She's not always home.\" \n\nYou blink a few times. \"Seriously? You're getting me to hand deliver a magical box to Nessie?!\"\n\n\"Why yes. Although she doesn't like that name much. If you do meet her, I'd recommend addressing her by her real name, Myranda.\" Merlinus pauses his search and turns to face you. \n\n\"This is important. Once you're through the wards, find the cave and leave the box by the entrance. No one will bother it if left there. Do not walk through the shielded cave entrance and do not linger. Once you've dropped the package off, come straight back. If you do happen to see Myranda...\" \n\nHe pauses. \"Well just stay polite ok, regardless of what happens, [i]do not[/i] upset her. Dragons are volatile creatures, you do not want to be on the receiving end of an angry one. Name drop the guild if you have to. Retreat quickly if there looks like there's going to be a problem. It's unlikely she'll follow you outside the warded zone.\"\n\n*page_break\n\n\"Sooo... can I at least know what's in this box that's so important?\" you ask.\n\n\"Nope sorry, classified.\" Merlinus gives you a smile. \"Don't take it too hard, you don't need to know what's in there, it's nothing that should affect your assignment.\"\n\nHe gives you an expectant look, waiting for you to agree to go head with the task. \n\n*Choice\n\t#Ok, I'll do it. Just tell me where to go. \n\t\t*goto accepttask\n\t\t\n\t\n\t#Thanks for the vote of confidence, but I really don't feel comfortable making deliveries to a lake monster. Isn't there something else I can do instead?\n\t\t*goto declinetask\n\t\t\n\n*label declinetask\n\nMelinus frowns. \"No, I'm afraid there's not. You need this assignment if you want to get off your probationary licence. If you turn this task down, I'll have no choice but to fail you. The result will be the loss of your magic for good.\"\n\nHe pauses to let you consider. Are you sure you want to decline this task?\n\n*Choice\n\t#Well, if that's the only choice I have available. Alright, I guess I'd better go see Nessie after all. \n\t\t*goto accepttask\n\t\t\n\t#Of course I'm sure. If I stay in the guild it's only going to get me killed. I'm sick of it. Let me out of the contract. \n\t\tMerlinus gives you a puzzled look. \"Well of course it is your decision. I must say I'm surprised though. I thought you were made of stronger stuff than that.\"\n\t\t\n\t\tHe waves his hand over your wrist and you feel an unpleasant prickling sensation as the ink from your licence, seems to seep out of your skin leaving it blank. \n\t\t\n\t\t\"I'll need the book as well.\" He says apologetically. \n\t\t\n\t\tYou hand it over. \n\t\t\n\t\t\"Ok, well was nice knowing you while it lasted. Good luck with the rest of your life. I hope you find a path that pleases you more than this one.\" He escorts you out of his office and you step back into your room. \n\t\t*achieve kickedout\n\t\t*set good_standing -10\n\t\t*set grade3 \"Fail\"\n\t\t*page_break\n\t\t\n\t\t\"Well that's that.\" You say to yourself. You're uncertain if you made the right decision but at least it was yours to make. Still it seems unfair to you that that they have the power to make an ultimatum like that: Their way or no magic. \n\t\t\n\t\tDespite it being dark outside, you feel that you really need some air to help yourself think. Walking down the stairs, you step outside into the cool night air and walk aimlessly along the deserted roads.\n\t\t*page_break\n\n\t\t*goto_scene faillicence\n\t\t\n\t\t\n\t\t\n\t\t\n*label accepttask\n\"Ok, let's get to it then.\" Merlinus says as he finally finds the crumpled sheet of paper he's been hunting for and hands it to you. \n\nThere's a cave marked with an X not far from the Loch shore and a dotted line makes an uneven wider circle around the area. He points to the X. \"That's where I need you to leave the parcel. Make sure it's close to the entrance so it's easily found.\"\n\nHe indicates the dotted lines. \"This is the perimeter of the ward, discouraging anyone from getting too close. You'll be able to feel it, just ignore it and keep going though. Once you're past the perimeter, the effects will dissipate. There's no permanent harm from it. Don't try to teleport directly to the cave through the ward. It won't allow it and who knows where you'll end up.\"\n\nHe traces a finger along a thin line, which winds through the trees down to the cave entrance. \"This is the path you're best to follow. It's largely overgrown from disuse, but if you're careful you won't lose it. I'd recommend you leave at night. Less people around then.\" \n\n\"Good luck, come and see me when you're done.\" He gives you another smile waving you off. \n*page_break\n\n\nYou pack your book, the map given to you by Merlinus and the parcel carefully into a backpack and prepare to head out to Scotland. \n\nWith a now familiar rush, your teleport spell lands you on a grassy bank by the Loch. The night air is cool, with a light fog veiling the surface of the lake. \n\nUnpacking the map you get your bearings. You've done pretty well, landing not too far from the edge of the warded area. Picking your way through the trees by the light of a small glowing energy ball you've conjured up, you soon find the overgrown path mentioned on the map. \n\n*page_break\n\nThe path winds upwards along the side of the hill before turning back towards the shore. Your first clue that you're getting close is an unpleasant pricking that makes the hair on your arms stand on end. As you get closer it becomes almost electric, combined with a sense of danger and foreboding. \n\n[i]\"Must be the ward,\"[/i] you think to yourself. It's a good one. Without prior warning that it was around, the effects would have been more than enough to make you turn tail and get out of the area as fast as you could. \n\nYou turn a corner in the path and come across a translucent barrier which shimmers faintly to your magically enhanced sight with a golden glow. Stepping though it, the powerful waves of fear that have been buffeting you simply disappear as if they were never there. Now you only have your own fear to deal with as you creep towards the monster's lair. \n\n*page_break\n\nThe path opens up into a large rocky area open to the sky above. Extinguishing your small orb, you cross the clearing as silently as you can, flinching at every broken twig and crunched leaf beneath your footfalls. \n\nThe clearing borders the side of the hill, which rises sharply away to form a small cliff face. Examining the rock face closely, you can make out the shimmering lines of a spell hiding what you assume is \"Nessie's\" lair. \n\nOpening the backpack, you remove the box and place it by the cave entrance as instructed and as quickly as you can, beat a fast retreat back towards the path and your way out. \n\nYou've almost made it when you see a disturbance forming on the previously still waters of the lake. You put on a final burst of speed but it's not enough. \n\n*goto_scene dragonwizard\n", "ch2": "The alarm goes off with a harsh buzzing. \n*fake_choice\n\t#Leap out of bed\n\t\tYou push the silent button and jump out of bed. You're such a morning person, not many people could be a chirpy as you at this time of the morning. You've got plenty of time to get dressed and have a full breakfast with time to spare. \n\n\t#Push the snooze button. \n\t\tYuck! Way too early. You push the snooze button to shut the alarm up for a few more minutes of peace. You repeat the procedure several times until it gives a strangled squeak and you realise you may have hit it a little hard this time. \n\n\t\tDragging yourself out of bed you jump into the shower and quickly throw some clothes on. No time for breakfast, you snag a museli bar on the way out. You're going to be late...again. \n\n*page_break\n\nYou open the front door and step out into....A massive office space.\nCubicles stretch as far as you can see in every direction. The flicker of fluorescent lights is overhead and the murmer of voices and tapping of computer keys comes from all directions. You're standing at the entrance of one of the cubicles, a clipped voice from behind the computer screen calls you in. \n\nYou walk in and take a seat. From here you can see the office worker who's called you in.  Stocky and of middling height, she wouldn't have been particularly remarkable apart from her green tinted skin and pointed tufted ears. You notice a long thin tail twitching under the desk. She looks down her glasses at you. \n\n*page_break\n\n\"${name} ${lastname}?\" She asks in a clipped tone.\n\n\"Applicant for Wizardry Class C Licence?\"\n\n*Choice\n\n\t#Wha?......\n\t\t\"Oh very eloquent,\" she gives an overly exaggerated sigh. \"The standard of wizards being accepted these days has really gone to the dogs.\"\n\n\n\t\tShe tries again, speaking slowly and loudly for your benefit. You can tell she's being deliberately obnoxious. \n\t\t\n\n\t\t\"Are you.....Or are you not...... ${name} ${lastname}?\"\n\n\n\t\t\"Well yes....\" you quaver. \n\t\t\n\n\t\t\"And did you... or did you not...sign the wizardry application contract?\"\n\n\n\t\t\"That old library book about magic? Um yes I think so,\" you reply trying focus on her gold rimmed spectacles and not at the tail twitching agitatedly under the table. \n\n\n\t\t\"Ok well that's settled,\" she snaps. \"At least it's not another case of mistaken identity, that last one was.... messy.\" \n\n\t\tYou give her a weak smile. She scowls back. \n\t\t*goto application\n\n\n\t#Are you?...\n\t\tYou break off mid sentence. Maybe you will offend her by asking what she is. She looks up sharply. \"You want to finish that sentence?\"\n\t\t\n\t\t\"Um well, I was just wondering are you some kind of alien? Not trying to cause any offence I mean, just wondering....\" You trail off uncomfortably. \n\n\t\t\"Why would I be offended. I'm rather proud not to be part of your annoying, fragile little race thank you very much. And yes by your standards that would make me an alien. From the Sirius system to be precise.\" Her tone suggested that she'd been through this conversation way too many times before. \n\n\n\t\t*page_break\n\t\t\n\n\t\t\"I will give you a tip though wizardling, a bit of tact goes a long way around here. Some aren't as tolerant as me and don't take kindly to questions like that, they expect you to know. Actually you should know, why haven't you been reading your manual?\" \n\t\t\n\t\t\"I only got it yesterday,\" you say weakly, trying to sink into your chair. \n\t\t\n\t\t\"Excuses.\" She shrugs. \"Well not my problem is it? I suggest you make the time to read it through.\"\n\t\t\n\t\t*achieve advice\n\n\t\t*goto application\n\n\n\n*label application\n*page_break\n\n\"Ok application for a Class C Wizardry Licence.\" She taps a few keys on the computer screen and pages start printing noisily on an old, battered dot matrix printer. You give it a closer look. [i]Is that a scorch mark?[/i] The receptionist gives you another withering glare. \"What?\"\n\n\"Well, it's just not what I was expecting. You know a magical organisation with old school computers and printers in a giant office building....\" you trail off. \n\n\"Hey buddy, I just work here for a living ok? As for the equipment, that's because of you folks. Modern technology often doesn't agree with magical workings. We lose more electronics that way compared to anything else. The older and more basic the machine, the more likely it'll survive the week around here.\" She looks at the digital watch on your wrist. \"Wouldn't get too attached to that if I were you.\" \n\nSnatching up the printouts she gives you a pen. \"Sign here and here.\" \n\nIt seems safest just to oblige. \n\nShe takes a card out of the desk and swipes it through an odd looking machine you can't place. \n\n\"Hand.\" she snaps curtly.\n\nYou reach out with your left hand. With a swift movement she smacks the card down into your palm. \n\n*page_break\n\n\n\"Ouch!\" You snatch your hand back in surprise. \"Hey where's the card gone?!\"\n\nShe mutters something under her breath you can't quite catch. You think the gist of it involves her thoughts on the backward, ignorant humans she had to deal with.\n\nShe taps your palm with a smooth black wand. Black ink appears swirling into a clear outline of your licence, inked into your skin. She removes the wand and the outline quickly fades. \n\n\"Ok you're done, you've got a probationary licence activated. Off you go.\"\n*set occupation \"Wizard Level C- On Probation\"\n\n*page_break\n\n\n\"Go where?\" you ask alarmed. You're not even sure you're on Earth anymore. \n\n\"Go back to where ever you came from. Back out the door. Just away.\" It's obvious the conversation is closed as she turns away and resumes typing on her computer, but you're not giving up that easily.\n\n\"But what do I do now?\" You're completely confused by this point.\n\n\"What do I look like, your nanny? You signed the contract. That means you've got the book. Go read it, it's all in there. Go.\" You're not going to get anything further out of this one today, best find someone else to talk to. You turn and leave the cubical and step....\n\n\n*page_break\n\n....out your front door. Disoriented by the sudden change in your surroundings, you almost fall as you flail your arms in circles trying to regain your balance. \n\nCrap, you're going to be so late now. Who's going to believe the \"I got transported to another dimension and had a chat with a green alien with glasses\" excuse? You hope this isn't going to happen too often, it could get tricky. \n\nPicking up your fallen backpack, you run to catch the next arriving bus. \n\n*finish\n\n\n", "choicescript_description": "The discovery of an old magic book turns your life upside down. Will you succeed in becoming a guild wizard? Or instead travel a different path, striking out on your own, moving to a different plane of existence or perhaps not even remaining human?\n\n\"Wizardry Level C\" is a 100,000-word interactive novel by Jacic where your choices control the story. It's entirely text-based--without graphics or sound effects--and fueled by the vast, unstoppable power of your imagination.\n", "choicescript_stats": "*label stats\n[b]Name:[/b] $!{name} $!{lastname} [i] ${aka} $!{supername} $!{superlastname} [/i]\n\n[b]Occupation:[/b] ${occupation}\n\n[b]Elemental Alignment:[/b] ${EA}\n\n[b]Magical Speciality Area:[/b] $!{speciality}\n\n[b]Familiar:[/b] ${familiarname} ${familiarthe} ${FamiliarType}\n\n[b]Items:[/b] ${Ring} ${Unicornhair} ${invisible} ${wand}\n\n[b]$!{YSC}[/b] $!{supercolour} ${supercolour2}\n\n\n[b]Personality[/b]\n*stat_chart\n\topposed_pair Good_Standing  \n\t\tGood Standing\n\t\tRule Breaker\n[i][b]${darkside}[/b][/i]\n\n\n[b]Tasks[/b]\n*stat_chart text\n\tpercent First_Task First Task\n\tpercent Second_Task Second Task    \n\tpercent Third_Task Third Task\n\tpercent Fourth_Task Fourth Task\n\t\n*line_break\n\t\nIf you would like to return to continue with the story, please select the \"Return to the Game\" button at the top of the screen. Otherwise:\t\n*choice\n\t#I need a hint on how achieve part of the game \n\t\t*goto hintspage\n\n\n\t\t\n\t\t\n\t\t\n*comment HINTS section\t\n\n*label hintspage\nHaving trouble finding part of the book or getting an achievement? Then you've come to the right place.\n\nI recommend you try playing the book right though at least once, but if you're having trouble this is the screen to turn to. It's not a walk through, but should help put you on the right track. \n\nAre you sure you want to look at hints now?\n*choice\n\t#Return to the stats screen\n\t\t*goto stats\n\t\t\n\t#Continue to the hints page\n\t\t*goto hintstitle\n\t\t\n\n\t\t\n*label hintstitle\n[b]Hints Page[/b]\n*goto hints\n\t\t\n*label hints\t\t\n*choice\n\t#[b]I want to return to the stats screen.[/b] \n\t\t*goto stats\n\t\t\n\t#Does my elemental affinity and magical speciality affect anything other than my stats?\n\t\tYes. It will affect some options and events open to you. \n\t\t*goto hints\n\t\t\n\t#My stats are changing and I don't know why/Some options are greyed or invisible in the story, why?\n\t\tYour choices have an effect on your stats and can influence what will happen in future events, just like in real life. Not all consequences will be visible to track on the stats page so be careful with the choices you make. \n\t\t*goto hints\n\t\t\n\t#Are there invisible choices I might not be able to see in every story?\n\t\tOnly a few, which ones you encounter them depends on what story you play.\n\t\t*goto hints\n\t\t\n\t#Why are there choices with only one option?\n\t\tIn most cases, it's due to hidden options being present. Different stats are generally required.\n\t\t*goto hints\n\t\t\n\t#I don't want “X” familiar? Why can't I have something different?\n\t\tAnimals tend to be attracted to the element they have the most affinity for. \t\n\t\t*goto hints\n\t\t\n\t#Why does the cup keep breaking? It's so frustrating!\t\n\t\tYou might want to try specialising in a different kind of magic.\n\t\t*goto hints\n\t\t\n\t#I want to be a famous magician\n\t\tThe general public knows nothing of the wizard's guild. Maybe your path lies outside of it? Of course you'll need some level of skill before you head out on your own won't you?\n\t\t*goto hints\n\t\t\n\t#Who do I play nicely with again?\n\t\tTry following the directions you are given for your assignments to meet new friends. \n\t\t*goto hints\n\t\t\n\t#Where can I get a valuable item?\n\t\tPerhaps a familiar could help with that?\n\t\t*goto hints\n\t\t\n\t#Where can I find a familiar?\n\t\tTry helping out an animal through magical means. \n\t\t*goto hints\n\t\t\n\t#How can I be an MIB impersonator?\n\t\tYou know how it is...When things involving aliens go wrong...and then the public sees it....\n\t\t*choice\n\t\t\t#Ok, got it\n\t\t\t\t*goto hints\n\t\t\t#I need another hint\n\t\t\t\tIt could involve not handling the case involving a bunyip as well as it could have been. \n\t\t\t\t*goto hints\n\t\t\t\t\n\t#Take advice from which alien?\n\t\tKeep chatting to the green skinned alien. She's [i]such[/i] a pleasent individual to talk to after all, I'm sure you'll enjoy it. \n\t\t*goto hints\n\t\t\n\t#Why can't I help/not help the fairy? Only one option is available.\n\t\tYou might want to re-think whether you want to continue to have anything with the magical world. \n\t\t*goto hints\n\t\n\t\n\t#How do I find Cernuuous?\n\t\tYou will probably need \"help\" from one of the fae folk.\n\t\t*choice\t\n\t\t\t#Ok, got it. \n\t\t\t\t*goto hints\n\t\t\t#I need another hint.\n\t\t\t\tThat fairy has a real temper when you don't do as she asks.\n\t\t\t\t*goto hints\n\t\t\t\t\n\t#How can I find Garmr or the fae folk?\n\t\tThey're lurking on the edges, not generally having much to do with official wizard types. Maybe wizardry through the guild might not be the path for you, if that's who you'd prefer to associate with?\n\t\t*choice\n\t\t\t#Ok I got it. \n\t\t\t\t*goto hints\n\t\t\t#I need another hint.\n\t\t\t\tHow far into your probationary period you get, how much you annoy the guild in the process, and what objects you have in your inventory, might affect who you meet and how you can interact with them.\n\t\t\t\t*goto hints\n\t\t\t\t\n\t#How can I get a ring?\n\t\tIt's the responsibility of all potential wizards to be well read and prepared. \n\t\t*goto hints\n\t\t\n\t#How can I be a force for evil?\n\t\tRebellious one aren't you? Make sure everyone knows it, then have a chat to Garmr.\n\t\t*goto hints\n\t\t\n\t#I want to be a superhero!\n\t\tThat doesn't sound much like a wizardry career does it?\n\t\t*choice\n\t\t\t#Ok, got it. \n\t\t\t\t*goto hints\n\t\t\t#I need another hint. \n\t\t\t\tGarmr should be able to set you up with what you need. \n\t\t\t\t*goto hints\n\t\t\t\t\n\t#I want to go off world. \n\t\tWait, are dragons native to Earth? I'm not sure if they are....\n\t\t*choice\n\t\t\t#Ok, I got it. \n\t\t\t\t*goto hints\n\t\t\t#I need another hint.\t\n\t\t\t\tYou might need some special jewellery to pull it off. \n\t\t\t\t*choice\n\t\t\t\t\t#Right, I've got it. \n\t\t\t\t\t\t*goto hints\n\t\t\t\t\t#Come on, one more hint?\n\t\t\t\t\t\tDon't be so nice to Merlinus all the time. Be a little impulsive and get his attention by any means necessary.\n\t\t\t\t\t\t*goto hints\n\t\n\t#I want to be human again!\n\t\tYou might need to be rescued from a planet far, far away. \n\t\t*goto hints\n\t\t\n\t#Monster?\n\t\tHmm, that title's sounding somewhat familiar. Following in the footsteps of someone you've met maybe?\n\t\t*goto hints\n\t\t\n\t#I want to have my own business\n\t\tI hear there's equal opportunity for all species now...\n\t\t*goto hints\n\n\t#What's with the toad?\n\t\tTrade a ring to Myranda and maybe you'll find out. \n\t\t*goto hints\n\t\t\n\t#What's the deal with “dragon-speech”?\n\t\tDragon speech is [b]not[/b] the same as human telepathy although to a casual glance it seems similar. Although they are both forms of mind to mind communication, the type of innate magic able to be utilised by dragons, is quite different to that learnt by wizards and the two are not interchangeable. \n\t\t*goto hints\n\t\t\n\t#I want to feed the animals! I don't care if it tells me not to. \n\t\tAlright, alright, it's your choice. Just don't run away then. I'm sure they'll be happy to stick around. \n\t\t*goto hints\t\t\n\t\n\t#And Finally. This story is so short! Is there more to it that just that? *RAWR* ;)\n\t\tSome of the stories are longer and shorter than others, and this particular book does branch significantly into different tales. Hopefully there's some adventures in there that you might enjoy on different read throughs. Thank you for giving Wizardry Level C a go :)\n\t\t*goto hints\t\n\t\t\n\n\n\t\n\t\n\n\t\n\t\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n  \n  Unlock the rest of the game, including the thrilling conclusion!\n  \n  *purchase_discount adfree 2016-01-01 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n  \n  You've paid to unlock the rest of the game.", "decidewand": "*page_break\n\nNow that you have your magic back it's time to decide what to do with it. \n\n*choice\n\t#Use your magic for good. You've always wanted to be a superhero. \n\t\t*goto_scene superhero\n\t\n\t\n\t*Selectable_if ( Good_Standing \u003c 71) #Use your magic for evil. That will teach the Wizard's Guild to throw you out. \n\t\t*set good_standing -10000\n\t\t*set darkside \"Turned to the Dark Side\"\n\t\t*goto bad\n\t\t\n\t\t\n*label bad\n*set occupation \"Rouge Mage\"\n\nYou give your wand a few more swipes through the air, watching the magical sparkles it creates glitter behind it. You've decided you want revenge, but how? You're no match for the Wizards Guild on your own armed only with a wand and your semi-trained magic skills. \n\nYou really need a spell book. Garmr alluded to the fact that he may be able to get one for you at a price, but at present you have nothing of enough value that he'd want to trade for it. That thought gives you an idea. You remember a cave boardering a national park you visited once years ago. To be honest the place made you feel really unsettled, however there the theory is there is an old burial site hidden within. \n\nNot that anyone has ever discovered anything concrete, no one working the site had lasted long enough to get any serious excarvating done. In the end, the park officers had simply fenced it off from the rest of the park citing safety conc
