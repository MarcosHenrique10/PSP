in the wilds, which the larger settlements would raid and even kill as they pleased. You feel thankful that you didn't head south on your first day here, which would have put you firmly at any raiding dragon's mercy.\n\t\t*page_break\n\t\t\n\t\tTime continues to roll by and eventually Aryanth lets slip that she wants you around when they eventually put their plan in action to reopen the gate to Earth, with its fertile hunting fields for prey and treasure. \n\t\t\n\t\tStrangely enough, you're not certain how to feel about this. Although once human, your time spent among the dragons has left you content to call this your home now. Besides which, it seems unlikely you will ever wear your human form again. \n\t\t\n\t\tRegardless, you likely have time to contemplate the idea and come to a decision. No one has come through the portal since your own arrival and since dragon lifespans are measured in centuries, they appear satisfied to wait for the moment. In the meantime you're content to live out your new life as a black dragon of the Sararia Clan.\n\t\t\n\t\t*achieve clan \n\t\t\n\t\t*goto clanending\n\t\t\n\t\t\n\t\t\n\t\t\n\t#South- Scout along the rocky lands for shelter. \n\t\tYou decide to head south away from the concentration of dragons you can see to the east. Myranda seemed keen not to come here, until you've learned more, it would seem wise to stay clear of any encounters for now. \n\t\t\n\t\tYou unfurl your wings and give a few experimental flaps. The gravity seems lighter here, easily lifting you off the ground with each wing beat. Leaping from the ledge you fly swiftly into the sky. \n\t\t\n\t\tThe ground beneath you is shattered and rocky. You notice a few small animals darting for cover, but none slow enough for you to catch in your unpractised state. Your stomach twists and growls in hunger, all this flying must be rapidly depleting your energy reserves. You decide to make food your first priority. The faint metalic scent of blood wafts across your nose. Turning into the breeze you track it back to a pair of mottled green and brown dragons. Smaller than yourself, the two are hunched over the remains of a shaggy goat like creature, gulping down strips of meat that they're tearing off the carcass with great relish. \n\t\t\n\t\tThey haven’t noticed you yet, will you approach?\n\t\t\n\t\t*goto goatchoice\n\t\n\t\n*label clanending\n*page_break\n\nThank you for Playing Wizardry Level C. \n\nThis adventure is over, however there are still many other choices that can be made. \n\nWould you like to play again?\n\n*choice\n\t#Reload from the last checkpoint. (Initial encounter with Nessie). Please note some paths may not be available due to saved stats for this point.\n\t\t*set occupation \"Wizard Level C: On Probation\"\n\t\t*set good_standing +20\n\t\t*set grade4 \"\"\n\t\t*set ring \"Ruby Ring.\"\n\t\tThe world fades around you, then snaps back into sharp focus, leaving you with the odd sense of deja vu. \n\t\t\t\t\n\t\tYou're standing on the shore of Loch Ness, cold breeze pulling at your clothes. Movement catches your attention from the dark waters.\t\t\t\n\t\t*goto_scene dragonwizard\n\t\t\t\t\n\t#Restart from the beginning.\n\t\t*goto_scene ending \t\n\t\t\n\t\t\n*label goatchoice\n\n*choice\n\n\t#Approach the dragons.\n\t\tYou're starving and these dragons seem small enough to take a risk of approaching to share their meal. \n\t\t*goto approach\n\t\n\t#Avoid them\n\t\tYou decide it's too risky to approach dragons. Although smaller, there's two of them and you're still a bit clumsy at times in your dragon form and becoming weakened by hunger. \n\t\t*goto flyon\n\t\t\n\t\t\t\n\t\t\n\t\t\n\n\n*label approach\n\nAs casually as you can, you flap over towards the mottled dragons. They hear the sound of your wingbeats as you close on their position and turn to crouch defensively over their prey snarling.\n\nHow do you want to handle this?\n\n*Choice\t\t\n\n\t#Dive in, attacking. Attempt to use your larger size to scatter them, leaving the remains for you to eat. \n\t\tFolding your wings tightly against your sides, you dive at the two dragons roaring threateningly. Satisfyingly, the pair flee before you, allowing you to settle down to enjoy the remains of their meal. \n\t\t\n\t\tUnfortunately, either food must be particularly scarce here, or maybe they just don't like your attitude, because soon as you're distracted with the kill, both dragons reappear and attack you from behind. Smaller than you they may be, but they're quicker and very agile, darting in to bite and scratch, then flitting away out of reach before you can retaliate. \n\t\t\n\t\tWounds multiplying at an alarming rate, you have no choice but to make a hasty retreat. The smaller dragons harry you out of their territory before allowing you to leave. \n\t\t*page_break\n\t\t*goto flyon\n\t\t\n\t#Try the diplomatic approach. Land and walk toward them, trying to seem as harmless as possible. \n\t\tAlthough you are larger and could probably bully the dragons into letting you have their meal, you're going to have to live here now, so you might as well try to start off with good relations with the natives.\n\t\t\n\t\tLanding some distance away, you walk slowly toward the two, careful to keep your fire-breath to yourself. It's going to be tricky considering your speech skills are rudimentary at best, but you hope you can convince them to let you join them for the meal. \n\t\t\n\t\t*page_break\n\t\t\n\t\tThe Moor Dragons continue to hunch protectively over their meal, flapping their stumpy wings agitatedly, while giving you uncertain, almost fearful looks. Obviously your approach is not what they were expecting.\n\t\n\t\tYou try to picture the image of the three of you sharing the carcass and project it towards the wyrms, hoping it gets through to them....It doesn't....However the waves of hunger your growling stomach is projecting does seem to be understood. \n\t\t\n\t\tThe male of the pair speaks up in a light mental voice. \"What is your game dark one? Do you seek to trick us by walking alone, when you would normally just swoop in and take what it ours? Well this belongs to us and we are more than capable of defending it against the likes of you.\" \n\t\t\n\t\tHe gives a low growl exposing rows of sharp teeth to emphasise his point. \n\t\t\n\t\tYou halt your advance. Any closer and the dragons will attack, of this you're sure. With one alone you might have a chance, but with both harrying you? The dragon could be is right, they may succeed in driving you off, possibly injuring you in the process.  Your language skills don't seem to be getting through to them, you'll need to try something different. \n\t\t\n\t\tSinking to the ground, you lift your neck, exposing the relatively vunerable skin there in what you hope is a submissive gesture and wait. \n\t\t\n\t\t*page_break\n\t\t\n\t\tThe mossy dragons stare at you in confusion. You overhear snatches of conversation as they discuss your fate. \n\t\t\n\t\t\"It's a trick. Don't trust it.\" the first dragon advises urgently of his mate as she takes a hesitant step towards you. \n\t\t\n\t\t\"I don't think so...\" she replies, although she still sounds uncertain. \"Why can't it talk clearly? Maybe there's something wrong with it, so one of the colonies have cast it out for for being damaged?\" \n\t\t\n\t\tShe takes a few more steps towards you, as you hold completely still not daring to move. \"And it looks young. Maybe we should feed it. Could be useful to us.\"\n\t\t\n\t\t\"We've barely got enough food for ourselves,\" the male grumbles. \"And it still could be a trick. Since when have you ever known a black dragon to be anything but aggressive? It's in their nature, I say we grab our meal and leave it here.\"\n\t\t\n\t\t*page_break\n\t\t\n\t\tThe female dragon seems to be wavering, swayed by her mate's arguments. You force yourself not to react, continuing to project harmless meekness as well as you can. That and hunger. You can't help it, you're so famished you don't know what you'll do if they leave without sharing their food with you. \n\t\t\n\t\t\"I think it's worth the risk.\" The female dragon finally decides. \"Imagine having a black dragon around to help defend our home against those bullies from the colony. Even if it's small now, it'll grow far larger than either of us given time.\" Pulling off a leg, she tosses it towards you. Greedily you pick it up and start gnawing at the stringy flesh. Even raw and tough, it could be the best thing you've ever tasted. \n\t\t\n\t\t*page_break\n\t\t\n\t\tHunger pains still gnaw at your stomach, the meager meal being little more than a snack for a dragon of your size, but after a moment's hesitation decide not to push your luck and settle down to wait. When you don't close in to take the rest of their meal, the Moor dragons continue to finish their food nervously. \n\t\t\n\t\tThis show of restraint seems to go a long way towards assuring them that you mean no harm, and they tolerate your presence in their territory without chasing you away; even going so far as to allow you to join them for meals when you are unable to catch enough to feed yourself. Gradually you win over their trust and they accept you as part of their clan. \n\t\t\n\t\t*achieve win\n\t\t*page_break\n\t\t\n\t\tYou discover out what their concern was soon enough, with raiding parties of red, silver and black dragons swooping in on occasion from the surrounding colonies. These larger dragons seem to enjoy harassing the moor dragons for sport, taking their kills and sometimes even hunting the unfortunate dragons themselves. The hierarchy in this world seems to be dominated by the strength, with no laws in effect to protect the weak or vulnerable. Although not always successful, your presence does appear to deter some attacks, which makes your foster family grateful enough to keep you around. \n\t\t\n\t\tThey're not a bad bunch once you get to know them better, and while each day is an exercise in survival, you start to slip into your new life and accept it as home. \n\t\t\n\t\tAs your speech improves, you relay the whole sorry tale about your transformation from human to dragon. You suspect they still continue to believe it's a hallucination caused by a blow to the head, but they like you enough to pretend to humour you. \n\t\t\n\t\tYou settle in for your new life as a dragon of the shattered plains.\n\t\t\n\t\t*page_break\n\n\t\tThank you for Playing Wizardry Level C. \n\n\t\tThis adventure is over, however there are still many other choices that can be made. \n\n\t\tWould you like to play again?\n\n\t\t*choice\n\t\t\t#Reload from the last checkpoint. (Initial encounter with Nessie). Please note some paths may not be available due to saved stats for this point.\n\t\t\t\t\n\t\t\t\t*set occupation \"Wizard Level C: On Probation\"\n\t\t\t\t*set good_standing +20\n\t\t\t\t*set grade4 \"\"\n\t\t\t\t*set ring \"Ruby Ring.\"\n\t\t\t\tThe world fades around you, then snaps back into sharp focus, leaving you with the odd sense of deja vu. \n\t\t\t\t\n\t\t\t\tYou're standing on the shore of Loch Ness, cold breeze pulling at your clothes. Movement catches your attention from the dark waters.\n\n\t\t\t\t*goto_scene dragonwizard\n\t\t\t\t\n\t\t\t#Restart from the beginning.\n\t\t\t\t*goto_scene ending \n\t\t\n\t\t\n\t\t\n\t\t\n\t\n\n\n*label flyon\n\nContinuing on, the landscape becomes even more desolate. As the altitude rises, the temperature plummets, making you shiver with cold, longing for the humid heat of the savannah plains. As the twin suns set, the air takes on a frosty bite. Not able to continue further without rest you're forced to settle down in the open to sleep. \n\nYou awake the next morning, covered in a fine layer of silver ice crystals. Shaking them off you beat your wings stiffly, trying to get some warmth back into your limbs. You're weaker today due to lack of food and the cold. Pressing on you flap wearily to the south hoping for a change in climate. \n\nTo your distaste, you get your wish and as it starts to snow. The soft white flakes start off in a light, gentle flurry, but quickly become heavy, whipping around you as a blizzard sets in forcing you once again to the ground. You cower against the meagre shelter offered by some rocks, not daring to sleep in case you never wake. \n\nWhen you spot the disembodied, orange light bobbing towards you, your first thought is to wonder if you've fallen asleep despite yourself and are dreaming. Frozen and miserable, at this point you no longer care, just longing for the fiery warmth of the lantern.\n\nAs the light gets closer, to your surprise you make out the shadowy form of a human through the billowing snow. \n\t\t\n*page_break\n\t\t\n\"${name}?\" You manage to lift your head slightly off the ground and nod before it becomes too much and you collapse back into the snow. \n\t\t\n\"Thank goodness I found you!\" Your mentor Merlinus comes into view, a glowing orb hovering a few inches above his outstretched hands. \"Stay right there while I get help.\" \n\t\t\n[i]\"As if I could do anything else.\"[/i] you think dizzily as you slip into unconsciousness. \n\t\t\n*page_Break\n\t\t\nYou wake to the pleasant feeling of warmth and soft bedding. Opening your eyes, you blink against the bright orange light infusing the room. You bring up a hand to shield your eyes while they adjust. Wait, it's a human hand! You marvel at the smooth skin and claw-less fingertips. You feel along the features of your face discovering no fangs or scales. You're back to your old self again. \n\t\t\n\"Back with the living I see.\" Merlinus walks quietly into the room and takes a seat beside your hospital bed. \n\n\"Pretty close call there, you're lucky you were found when you were. Any later and...\" he doesn't finish the sentence.\n\t\t\n\"What...?\" you begin. \n\t\t\n\"What happened?\" the old wizard finishes. \n\n\"A mistake is what happened, One for which I am truely sorry. It seems like even the best of us are not infallible when it comes to such matters.\" he muses. \n\t\n*page_break\n\t\n\"When you couldn't be found, I got to thinking about \"Myranda's\" strange behaviour at the lake, and decided that it needed to be looked into further. In a way, it was fortunate that you were sent off world. It caused Myranda to feel confident that she had tricked us all and let down her guard enough for me to discover what was going on. I managed to track her down before any permanent harm was done. Would you believe she had already started arranging for an army of skeletons to be revived? Wastes no time that one.\" \n\t\t\nHe pauses. \"She's been placed in a much stricter form of confinement. Raising an unholy row about it too, but hopefully it should keep her from causing any more major dramas for a while. It's fortunate that you didn't head over to one of the dragon settlements, wizards are [i]very[/i] unwelcome there. I would have had no way to get you back without starting an all out war with them.\"\n\t\t\n*page_break\n\t\t\n\"You do realise you've caused quite a stir. You released one of the most dangerous necromancers in existance back into the world, deliberately or not seems to be the question of the day.\" \n\t\t\nYou start to protest, but he holds up a hand. \"It's not me you need to convince wizardling. I think what you did was very stupid, but not malicious. Your case is being decided as we speak.\"\n\n\"Over half the guild's council members want to see you conviced as an accessory to Myranda's jailbreak, and confined in a small tank as a newt for the next 20 or so years. Most of the remaining members seem to want you stripped of your magic and cast out.\" \n\t\t\nYou flinch under Merlinus' stern gaze. \"It's ok, don't panic...at least not quite yet,\" he continues. \"I'm still feeling partially responsible for throwing you to the dragons like that, so I've put in a submission for you to remain under my direct care and supervision. There's a good chance they'll agree since I've vouched for you. You'll need to work hard and be on your best behaviour to make this work though. It's likely they'll insist on an extended stay as an apprentice before they'll agree to review your licence status as well. Still, it beats being a salamander for a few decades doesn't it?\"\n\t\t\nYou can only nod. \n\t\t\n\"Ok get some rest,\" the mage says rising. \"I'll be in touch as soon as I know anything concrete.\" \n\t\t\n*page_break\n\t\t\nConfined to the hospital room, the next few days pass restlessly for you. You find the semi-sentient energy constructs that deliver meals to your room are less than useless at divulging any useful information outside their core programming, which evidently doesn't include anything relating to your trial. You reflect that it seems unfair that your fate is being decided without you even being able to state your case, but as always, the rules seem to run differently in underworld of wizardry. \n\t\t\nFinally you receive the news you've been waiting for. Although you're definitely ranking in the top of several influential wizard's \"bad books,\" (which is not the greatest of places to be,) the council has decided to release you on probation into Merlinus' care. \n\t\t\nDefinitely a relief, however you're sure you're going to be worked hard for all the trouble you've inadvertently caused. Welcome to the next few years as an apprentice wizard. \n\t\t\n*Achieve apprentice\n\t\t\n\t\t\n*page_break\n\nThank you for Playing Wizardry Level C. \n\nThis adventure is over, however there are still many other choices that can be made. \n\nWould you like to play again?\n\n*choice\n\t#Reload from the last checkpoint. (Initial encounter with Nessie). Please note some paths may not be available due to saved stats for this point.\n\t\t\t\t\n\t\t*set occupation \"Wizard Level C: On Probation\"\n\t\t*set good_standing +20\n\t\t*set grade4 \"\"\n\t\t*set ring \"Ruby Ring.\"\n\t\tThe world fades around you, then snaps back into sharp focus, leaving you with the odd sense of deja vu. \n\t\t\t\t\n\t\tYou're standing on the shore of Loch Ness, cold breeze pulling at your clothes. Movement catches your attention from the dark waters.\n\n\t\t*goto_scene dragonwizard\n\t\t\n\t#Restart from the beginning.\n\t\t*goto_scene ending \t\n\n\t\n\t\t\n\t\t\n", "dragonmagic": "As the dragon advances, you've only got a moment to decide how to try and get out of this alive. You decide on a magical solution. But of what kind? \n\nWith limited resources and no time to consult your book, you'll have to rely on something simple, already memorised and that you a talent for and can complete quickly. \n*goto attackchoice\n\n*label attackchoice\n*Choice\n\t#Elemental: Stick to where you are strongest, with a spell related to your natural affinity with a particular element.\n\t\t*goto elementattack\n\t\n\t#A speciality area that you have a talent for.\n\t\tAlthough well researched in healing you can't think of an immediate application for it here. (You sincerely hope you wont have a need for it later either). Teleportation may be risky, you know you can't teleport in due to the ward around the area, but your genuinely unsure if that applies to an outward bound trip as well. You kick yourself for not having the time altering watch with you. It could have been very useful right now. Sadly it's safely in your bedroom draw at home. \n\t\t\n\t\tFortunately, you've been talented in the area of ${speciality} from the start and see no reason not to rely on it now. \n\t\t*goto speciality\n\t\t\n\n*label speciality\n\n*Choice\n\t*Selectable_if (speciality = \"illusion\") #Spell of Illusion- Create a ring of illusory fire around the dragon.\n\t\tYou need an illusion fast. Anything to distract the beast long enough to enable you to leave the area without it catching you. Casting the first thing that comes to mind, you pour energy into a huge, crackling fire. Orange tongues shoot towards the heavens in a roar with a wash of heat. \n\t\t\n\t\t\"That wasss ill advisssed human,\" the dragon growls. Without flinching she steps straight through the wall of fire unharmed. \n\t\t\n\t\tShe cocks her head to the side. \"What? Do you really think I wouldn't sssee through your pathetic illusionsss. I ussse far ssstronger magic myself. And fire? What dragon hasss ever feared fire? Wizardsss on the other hand...\" She arches her head back and spits a fireball just over your head with an evil laugh. \n\t\t\n\t\t\"This is going to be [i]fun![/i]\" You see an orange glow building at the back of her throat again. \n\t\t*page_break\n\t\t\n\t\tYou jump from side to side. Ducking behind rocks and leaping backwards to avoid the fireballs being thrown at you. Gasping for breath, you duck down behind some scrubby bushes only to have them bust into flame. \n\n\t\t[i]She's toying with me.[/i] You realise. The dragon could have roasted you at any time, however she's having more fun, playing this game of cat and mouse, pushing you backwards towards the cliff face and an end game. \n\n\t\t\"Urgh!\" the wind's knocked out of you as you dodge to the side only to catch your foot on a branch and fall to the ground. You hear the dragon's rumbling chuckle as she gives you the time you need to stand before tossing another gout of fire your way. \n\t\t\n\t\tYou desperately try to make it to the forest, but Myranda's quicker, countering every escape move with a wall of fire that drives you back.\n\t\t*page_break\n\t\t\n\t\tFinally you're left with no where else to run. Backing against the cliff face to await the final bust of fire.....you somehow fall straight through the wall. \n\t\t\n\t\tScrambling to your feet, you realise you've had the fortune to be backed against the illusion masking the cave entrance to the dragon's lair. Your initial elation quickly fades though as you look around to see a cavern devoid of any other passageways or exits. \n\t\t\n\t\tYou hear the thudding steps of the wyrm as she approaches the cave. \"Come out, come out little wizzzardling! Thisss isss not hide and ssseek, ssshow yourssself!\"\n\t\t\n\t\t[i]Yeah, not going to happen Myranda,[/i] you think. There has to be something you can use in this rotten cave, desperately you start a search. \n\t\t\n\t\t\"I'm growing impatient little mage,\" she hisses. \"Do not make me come in there! I'll tell you what, becaussse I'm enjoying the game we've been playing, I'm going to be a good sssport and give you a head ssstart of twenty ssseconds ssstarting from now!....20......19.....18....\"\n\t\t*page_break\n\t\t[i]Not good![/i] You pause your digging through the small pile of treasure up against the back wall. So many coins and trinkets, but no weapons to be found.\n\t\t\n\t\t\"....17....16....15....\"\n\n\t\tYou have an epiphany. Maybe if the entrance if sealed with an illusion, others may as well. Walking quickly around the room, you feel for any apparent gaps in the rock.\n\t\t\n\t\t\"....14....13....12....11....\" \n\t\t\n\t\tIt's no good. If there's a hidden doorway, you can't find it with your quick exam of the area. \n\t\t\n\t\tTime's almost up, what haven't you checked?\n\t\t\n\t\t\"....10....9....8....\"\n\t\t\n\t\tThe chests! Two wooden chests rest on a rocky ledge out of the damp of the cave floor. They're bound with bands of heavy metal which look slightly rusted but are in otherwise perfect condition.\n\n\t\t\"....7....6....\"\n\t\t\n\t\tThey're unlocked! You open the first revealing a pile of expensive, but very outdated looking women's clothing....[i]Weird.[/i]\n\t\t\n\t\t\"....5....4....3....\"\n\t\t\n\t\tYou heave on the lid of the second chest but it's heavy and stiff from disuse. No matter how you try, it just wont budge. \n\t\t\n\t\t\"....2....1....\"\n\t\t\n\t\tCrap, out of time. What now?\n\t\t\n\t\t\"....zzzero....Ok mageling, you had your chance, now it'sss my turn!\" Confidently the black dragon strides into her lair, not showing the least amount of fear. She knows you're down to your last reserves.\n\n\t\t*page_break\n\t\t\n\t\t\"What do you think you're going to achieve with that?\" the dragon rumbles with laughter, seeing you standing near the chests, a small orb of fire hovering above your left hand. \n\t\t\n\t\t\"Ok wizzard, give me your besst ssshot. Then it'sss [i]my[/i] turn!\" She grins at you evilly showing rows of sharp teeth. \n\t\t\n\t\t\u003c[i]Ok, stay calm, look confident[/i]> you repeat silently to yourself standing tall. \n\t\t\n\t\t\"What this little thing?\" You toss the ball of fire casually from one hand to the other. \"Oh, I'm well aware, it's of no use against you. This chest however? I think it will burn nicely, don't you?\"\n\t\t\n\t\tAnd this is the crux of your little gamble. You're hoping there is something of value to the dragon in the chest and that it is flammable. \n\t\t\n\t\t*page_break\n\t\t\n\t\t\"Why you little....I'll burn you to the ground for thisss!\" The dragon's reaction to your threat tells you all you need to know. Deep breaths, you can do this. \n\t\t\n\t\t\"Well of course you can,\" you reply chirpily, dancing your fireball from one finger to the next. Suddenly you swing around to hold the burning orb within inches of the wooden box. \n\t\t\n\t\t\"Of course you need to ask yourself, who is quicker? You can take me out, but will it be before I set your precious chest on fire? Are you sure you want to take that risk?\" Every nerve is strung tight, but you force yourself to sound casual, almost bored like you don't care too much about the outcome. \n\t\t*page_break\n\t\t\n\t\tThe dragon stills, thinking it over, the only sound in the cavern, is the quiet crackle from your fireball and the heavy thump of the wyrm's tail twitching agitatedly across the rocks. \n\t\t\n\t\tFinally she gives a harsh roar which shakes the roof of the cavern, raining small pieces of rock down onto the top of your head. You tense edging the fire closer to the wooden boards. \n\t\t\n\t\tAfter a long moment, the dragon drops her head, the orange glow in her throat going out. \n\t\t\n\t\t\"Fine! You win thisss time. Leave my chessst and go!\" She moves aside from the entrance leaving just enough room for you to squeeze through.\n\t\t\n\t\t\"I want your [i]word[/i] Myranda. Promise me you will let me leave unharmed.\" You wave the fireball around for effect. \n\t\t\n\t\t\"Fine! Nasssty Wizzard! I give you my word....thisss time. If we ssshould ever meet again however? If that happensss, I will finisssh this game.\"\n\t\t\n\t\tIt certainty sounds sincere, complete with a death threat attached. It's likely the best you'll get from her right now. Putting out the flames with a flick of your wrist, you carefully edge past the dragon, skipping to the side to avoid the wickedly spined tail that Myranda \"accidentally\" flicks your way as you exit. You back away through the clearing keeping up an appearance of strength. Once beyond the tree line however, you run for your life. \n\t\t\n\t\tAll seems peaceful as you make it to the shimmering edge of the barrier, however you know it's anything but. You probably should warn the Guild about Myranda's current foul temper. Hopefully they won't be too mad, from the warnings you were given, it sounds as if this is not an isolated occurrence though. \n\t\t*set fourth_task 60 \n\t\t*Set grade4 \"Pass\"\n\t\t*goto_scene passdragon\n\t\t\n\t\t\n\t*selectable_if (speciality = \"transmutation\") #Spell of Transmutation- Change some pebbles into gold nuggets.\n\t\tRight well everyone knows dragons love treasure, what could be better than getting on her good side with some gifts?\n\t\t\n\t\t\"Great Myranda, please hear me out. I'm simply here as a courier for the Wizard's Guild delivering a box that I've left by your cave.\" You point in the general direction, not being brave (or silly) enough to take your eyes off the dragon. \n\t\t\n\t\t\"I'm also here to make you a gift...some gold.\" You see her pause at that. \n\t\t\n\t\t\"I don't sssee any gold. The human liess.\" she hisses, leaning in to douse you in sulphurous breath.\n\t\t\n\t\t\"I...I...know I don't have any gold.\" you quaver. Being this close to something that wants to eat you is making you legitimately nervous. \"...But I will make you some. I'm a powerful wizard myself. It's my gift to you.\"\n\t\t*page_break\n\t\t\n\t\tThe dragon's head lifts to the sky as she shakes with open laughter. \"You? A powerful wizard? I wasn't born yesssterday ${boy}. You're barely a hatchling in the magical world.\"\n\t\t\n\t\tWell laughter's still better than anger you reflect. \"I should have known better than to overstate my abilities to you great dragon. Even still, will you allow me to make you an offering. Nothing worthy of your magnificence, but still all one such as me can offer.\"\n\n\t\tThe dragon regards you with a glowing eye, then laughs again. \"I'm finding I like having a wizard grovel before me. Fine, make your gold and I'll consssider letting you live.\"\n\t\t\n\t\t*page_break\n\t\t\n\t\tIt's a complicated spell, made no easier by the presence of the giant wyrm hanging over you the entire time. After a few missteps you can [i]feel[/i] irritation building in the dragon. Your value as an amusement seems to be coming to an end. \n\t\t\n\t\tFinally you manage to get the spell to work. The amount of gold it produces is pitifully small and has leaves you exhausted. You pick up the tiny golden pebbles and present them to the dragon. \n\t\t\n\t\t\"Isss that all?\" She puffs out a stream of smoke. \"Whatever, it'll do. I don't want magesss poking around my lair if you don't return to your massster. Leave the gold and begone before I change my mind.\"\n\t\t\n\t\tHastily you set the glittering rocks down and leave the clearing at a run. You think you can hear her chuckling at your retreating back.\n\t\t*set fourth_task 100\n\t\t*set good_standing +20\n\t\t*Set grade4 \"Pass\"\n\t\t*set hundredpercent +1\n\t\t*goto_scene passdragon\n\t\t\n\t\t\n\t*selectable_if (speciality = \"mind control and communication\") #Telepathy- Try to read the dragon's thoughts.\n\t\t\n\t\tAlthough the dragon is broadcasting her speech loudly and clearly, you wonder if you can get a hint as to what might get you out of this alive from her thoughts. Narrowing your eyes you concentrate on feeling a connection between yourself and the wyrm. Thoughts flood strongly into your mind threatening to overwhelm you as you quickly strike up a shield to mute the onslaught. \n\t\t\n\t\tWith the information at a more civilised tone, you try to sort through the jumble. Surprisingly the information feels less alien than you were expecting from another species and is relatively easy to decipher. You always imagined something like a dragon would feel quite different.  \n\n\t\t[i]\u003cOne little human. Who would notice? Would it be missed? Hungry...>[/i] The train of thought slides smoothly though your brain. Sure enough, the dragon really is considering whether to eat you. Not what you wanted to hear. But there's something else... you try and dig a little deeper. \n\t\t*page_break\n\t\t\n\t\t[i]\u003cIs it a mage?> *Hostility* \u003cThey'll know if it's a wizard. Nasty interfering wizards. They'd never dare if I was myself> *Anguish* \u003cIf only I had my ring, my long lost ring>[/i] You shake your head to clear it. Only seconds have passed although it seems much longer. The dragon is a few steps closer to making you into her next meal.  \n\t\t*goto tp\n\t\t\n\t\n\t\n\t#Actually I'll go with an elemental spell instead.\n\t\t*goto elementattack\n\t\n\t\n*label elementattack\n\n\n\nWill you use your magic to attack the dragon or to try and win her over? \n\n*choice\n\t*selectable_if (water = 100) #Charm: Create a bunch of ice flowers to present to Myranda\n\t\tWell Merlinus told you to stay polite, so polite you'll be even if it kills you. You flinch reflecting that this turn of speech might turn out more literal than you intended. \n\t\t\n\t\t\"Please hold a minute great dragon. I apologise for entering your domain uninvited, however I had an urgent delivery for you from the Wizard's Guild.\" Dipping floes of energy into the lake, you extract a fine stream of water which you use to sculpt a garden of icy roses by the dragon's feet. The flowers glisten in the moonlight, perfect reproductions of the real thing. You've never attempted this particular spell on such a large scale before, fortunately adrenaline seems to have given you the boost you need to get it to work. \n\t\t\n\t\t\"For you Myranda, as a way of apologise for disturbing you tonight.\" The dragon bends her head down to sniff at the icy constructs. With a puff of her heated breath, a large patch of the flowers dissolves into a wet puddle. Whoops, you hadn't thought of that. You hold your breath, waiting for the dragon's reaction. \n\t\t\n\t\t*page_break\n\t\t\n\t\tTo your surprise, the dragon lets out a rumbling laugh. \"You're nothing more than a mageling aren't you? Don't look ssso worried, it'sss been sssuch a long time sssince anyone tried to win me over with flattery and giftsss. Despite being a nassty magic ussser, I may just grow to like you.\"\n\t\t\n\t\tShe shifts out of you way, leaving a clear path back to the forest path. \"Go. Remind your mastersss that I too can be civilized if treated with the ressspect I'm due.\"\n\t\t\n\t\tWith her volatile swinging moods, you worry that Myranda is decidedly more unstable than civilised, although maybe that's normal for a dragon? You don't know. Either way, it sounds like now would be a good time to get out of here.\n\t\t\n\t\tGiving the dragon a slight bow that allows you to continue to keep both eyes on her, you quickly retreat from the clearing before the wyrm has a chance to change her mind. \n\t\n\t\t*set fourth_task 100\n\t\t*set good_standing +10\n\t\t*Set grade4 \"Pass\"\n\t\t*set hundredpercent +1\n\t\t*goto_scene passdragon\n\t\n\t\n\t*selectable_if (water = 100) #Attack: Blast the dragon with an elemental attack- Fight fire with ice. \n\t\tWhile you were deciding your course of action, the dragon has continued her deliberate advance. \n\t\t\n\t\t\"It'sss so rare that I get visssitors.\" She snarls, \"I almost forgot my mannersss. You mussst be sssso cold out here, travelling alone in the night. Here, let me warm you up.\" \n\t\t\n\t\tAn orange glow builds at the back of her throat as she prepares to breathe a stream of fire in your direction. \n\t\t\n\t\tNot wasting any time, you reach within yourself and draw on the pool of energy, willing the water from the lake to respond to your call. With a sweeping gesture, a stream of water rushes towards the surprised wyrm, causing her to gasp back the readied fireball. \n\t\t\n\t\tThe cold lake water is not far above freezing and it doesn't take much extra energy to turn it to ice, encasing the dragon in a glittering film of frost. You had hoped that dragon would be reptilian enough in nature that the cold would slow her right down but it seems like more of an inconvenience. With a shake, shards of ice fly from the dragon's hide, making sharp clinking sounds where they bounce from the surrounding rocks. \n\t\t\n\t\tYou're never going to get a better chance so you bolt. Enraged, the dragon screams, spitting a fireball into your path. You dive for the ground as the flames pass just above your body in a wash of heat. You watch in horror as the ball of fire, continues across the clearing to connect with the warded parcel by the cave. There's a low boom as shock wave of energy ripples out from the smoking remains of the box, rattling the rocks and making the dragon stagger back away from where you lie fallen on the ground. \n\n\t\tStruggling to your feet you run for your life, tripping and sliding towards the trees. The wyrm having regained her balance, roars a stream of white hot flames at you once again, the fire setting the grass behind you alight. With a frustrated howl, the dragon lunges towards you, jaws snapping shut on air as you duck to the side. You catch a glimpse of ice slivers, still caught in the scales around her eyes, seemingly causing enough on an impediment to the dragon's vision to prevent a direct strike. \n\t\t\n\t\tFleeing through the tree line you pass though the shimmering barrier and keep running. You can hear the muted sounds of Myranda raging behind the ward, but thankfully she doesn't follow you. \n\t\t*set Fourth_Task 0\n\t\t*set Good_Standing -10\n\t\t*set fail +1\n\t\t*Set grade4 \"Fail\"\n\t\t*goto_scene explodingparcel\n\t\t\n\t\t\n\t\n\t*if (fire = 100) #Charm: Create a fireworks display for the dragon.\n\t\tWell Merlinus told you to stay polite, so polite you'll be even if it kills you. You flinch reflecting that this turn of speech might turn out more literal than you intended. \n\t\t\n\t\t\"Please hold a minute great dragon. I apologise for entering your domain uninvited, however I had an urgent delivery for you from the Wizard's Guild.\" The dragon's still looking pretty hungry, so you decide to go ahead with a little fire spell. \n\t\t\n\t\t\"Please allow me to present a small gift as a way of apologise for disturbing you tonight.\" Concentrating, you build up an image of a miniature dragon outlined in fire and release it into the night, sending multi-coloured points of light whizzing around the display. The effect is rather breathtaking, (if you do say so yourself,) you just hope Myranda agrees.\n\t\t*page_break\n\t\t\n\t\tTo your profound relief, the dragon lets out a rumbling laugh. \"You're are nothing more than a mageling aren't you? Don't look ssso worried, it's been sssuch a long time since anyone tried to win me over with flattery and gifts. Despite being a nassty magic user, I may just grow to like you.\"\n\t\t\n\t\tShe shifts out of you way, leaving a clear path back to the forest path. \"Go. Remind your mastersss that I too can be civilised if treated with the respect I'm due.\"\n\t\t\n\t\tWith her volatile swinging moods, you worry that Myranda is decidedly more unstable than civilised, although maybe that's normal for a dragon? You don't know. Either way, it sounds like now would be a good time to get out of here.\n\t\t\n\t\tGiving the dragon a slight bow that allows you to continue to keep both eyes on her, you quickly retreat from the clearing before the wyrm has a chance to change her mind. \n\t\n\t\t*set fourth_task 100\n\t\t*set good_standing +10\n\t\t*Set grade4 \"Pass\"\n\t\t*set hundredpercent +1\n\t\t*goto_scene passdragon\n\t\n\t\n\t\n\t*selectable_if (fire = 100) #Attack: Blast the dragon with a fireball. \n\t\tWhile you were deciding your course of action, the dragon has continued her deliberate advance. \n\t\t\n\t\t\"It'sss so rare that I get visssitors.\" She snarls, \"I almost forgot my mannersss. You mussst be sssso cold out here, travelling alone in the night. Here, let me warm you up.\" \n\t\t\n\t\tAn orange glow builds at the back of her throat as she prepares to breathe a stream of fire in your direction. \n\t\t\n\t\tNot wasting any time, you reach within yourself and draw on the pool of energy, willing a fiery orb to materialise in your hand. Your aim is true and it flies through the air to connect with the dragon's snout, causing her to cough back the fire in her throat in surprise.\n\n\t\t*page_break\n\t\t\n\t\tIncensed the dragon lashes the ground with her tail, sending rocks flying to impact with sharp cracks against the trees. \n\n\t\t\"That wasss ill advisssed human.\" The dragon snarls. You notice that the fireball appears to have been reflected by her scales, leaving her completely unharmed. \n\t\t\n\t\tShe cocks her head to the side. \"What? Do you really think I would be troubled by a pathetic little fireball? What dragon hasss ever feared fire? Wizardsss on the other hand...\" She arches her head back and spits a fireball into your path with an evil laugh. \n\t\t\n\t\tThrowing yourself to the ground, the flames pass just over your body with the smell of singed hair. [i]Too close![/i]\n\t\t\n\t\tMyranda however is enjoying herself \"Oh very good little mageling, run! Thisss is going to be [i]fun![/i]\" You see an orange glow building at the back of her throat again. \n\t\t*page_break\n\t\t\n\t\tYou're never going to get a better chance so you bolt. With a rumbling laugh, the dragon spits another fireball in your direction. Dodging to the side, the gout of fire misses again, continuing across the clearing to connect with the warded parcel by the cave. There's a low boom as shock wave of energy ripples out from the smoking remains of the box, rattling the rocks and making the dragon stagger back away from where you've fallen to the ground. \n\n\t\tStruggling to your feet you run for your life, tripping and sliding towards the trees. The wyrm having regained her balance, roars a stream of white hot flames spits fire at you once again, the fire setting the grass behind you alight. With a frustrated howl, the dragon lunges at you, jaws snapping shut on air as you duck to the side. You catch a glimpse of ice slivers, still caught in the scales around her eyes, seemingly causing enough on an impediment to the dragon's vision to prevent a direct strike. \n\t\t\n\t\tFleeing through the tree line you pass though the shimmering barrier and keep running. You can hear the muted sounds of Myranda raging behind the ward, but thankfully she doesn't follow you. \n\t\t*set Fourth_Task 0\n\t\t*set Good_Standing -10\n\t\t*set fail +1\n\t\t*Set grade4 \"Fail\"\n\t\t*goto_scene explodingparcel\n\t\n\t\n\t\n\t*selectable_if (earth = 100) #Attack: Change the ground under the dragon's feet.\n\t\tWhile you were deciding your course of action, the dragon has continued her deliberate advance. \n\t\t\n\t\t\"It'sss so rare that I get visssitors.\" She snarls, \"I almost forgot my mannersss. You mussst be sssso cold out here, traveling alone in the night. Here, let me warm you up.\" \n\t\t\n\t\tAn orange glow builds at the back of her throat as she prepares to breathe a stream of fire in your direction. \n\t\t\n\t\tNot wasting any time, you reach within yourself and draw on the pool of energy, willing the sandy areas of the clearing to soften into quicksand. The moisture filled soil by the loch's edge responds easily, causing the surprised dragon to loose her footing, legs quickly sink into the ground leaving only one clawed front leg grasping solid rock. \n\t\t\n\t\tYou're never going to get a better chance and it's only a matter of time before the wyrm will pull herself free, so you bolt. Enraged, the dragon screams, spitting a fireball into your path. Wallowing in the unstable sand, the gout of fire goes wide, passing just above your body in a wash of heat. You watch in horror as the ball of fire continues across the clearing to connect with the warded parcel by the cave. There's a low boom as shock wave of energy ripples out from the smoking remains of the box, rattling the rocks and making the dragon stagger back away from where you've fallen to the ground. \n\n\t\tStruggling to your feet you run for your life, tripping and sliding towards the trees. The wyrm having regained her balance, roars a stream of white hot flames spits fire at you once again, the fire setting the grass behind you alight. With a frustrated howl, the dragon lunges at you, jaws snapping shut on air as you duck to the side. You catch a glimpse of ice slivers, still caught in the scales around her eyes, seemingly causing enough on an impediment to the dragon's vision to prevent a direct strike. \n\t\t\n\t\tFleeing through the tree line you pass though the shimmering barrier and keep running. You can hear the muted sounds of Myranda raging behind the ward, but thankfully she doesn't follow you. \n\t\t*set Fourth_Task 0\n\t\t*set Good_Standing -10\n\t\t*set fail +1\n\t\t*Set grade4 \"Fail\"\n\t\t*goto_scene explodingparcel\n\t\t\n\t\t\n\t*selectable_if (earth = 100) #Charm: Search the ground for something of value to give to Myranda.\n\t\tWell Merlinus told you to stay polite, so polite you'll be even if it kills you. You flinch reflecting that this turn of speech might turn out more literal than you intended. \n\t\t\n\t\t\"Please hold a minute great dragon. I apologise for entering your domain uninvited, however I had an urgent delivery for you from the Wizard's Guild.\"  \n\t\t\n\t\tThe wyrm hisses in annoyance, it seems she's not a big fan of the Guild. You had better make this quick. Delving underground with your senses you cross your fingers that there is something of value hidden in the soil beneath the clearing. Several points catch your attention and you convince the rock to shift, allowing the objects to be brought to the surface with the harsh sound of cracking bedrock. \n\t\t\n\t\tThe dragon looks poised to attack, obviously disquieted by the shifting ground under her feet.\n\t\t\n\t\tQuickly you gather up the small handful of items, holding them up to catch the moonlight. \"For you Myranda, as a way of apologise for disturbing you tonight.\" \n\t\t\n\t\tThe dragon bends her head down to sniff at small pile of golden rocks and discarded jewellery in your hands. You hold steady, careful not to flinch away from her acrid breath, crossing your fingers that the dragon will be appeased enough by the small offering to let you go unharmed. \n\t\t\n\t\t*page_break\n\t\t\n\t\tTo your surprise, the dragon gives a deep rumbling laugh. \"Don't look ssso worried, it's been sssuch a long time sssince anyone tried to win me over with flattery and gifts. Despite being a nassty magic user, I may just grow to like you.\"\n\t\t\n\t\tShe shifts out of you way, leaving a clear path back to the forest path. \"Go. Remind your masters that I too can be civilized if treated with the respect I'm due.\"\n\t\t\n\t\tWith her volatile swinging moods, you worry that Myranda is decidedly more unstable than civilised, although maybe that's normal for a dragon? You don't know. Either way, it sounds like now would be a good time to get out of here.\n\t\t\n\t\tGiving the dragon a slight bow that allows you to continue to keep both eyes on her, you quickly retreat from the clearing before the wyrm has a chance to change her mind. \n\t\n\t\t*set fourth_task 100\n\t\t*set good_standing +10\n\t\t*Set grade4 \"Pass\"\n\t\t*set hundredpercent +1\n\t\t*goto_scene passdragon\n\t\n\t\n\t*selectable_if (air = 100) #Attack: Create a whirlwind.\n\t\tWhile you were deciding your course of action, the dragon has continued her deliberate advance. \n\t\t\n\t\t\"It'sss so rare that I get visssitors.\" She snarls, \"I almost forgot my mannersss. You mussst be sssso cold out here, travelling alone in the night. Here, let me warm you up.\" \n\t\t\n\t\tAn orange glow builds at the back of her throat as she prepares to breathe a stream of fire in your direction. \n\t\t\n\t\tNot wasting any time, you reach within yourself and draw on the pool of energy, whipping the air into motion, willing it to circle around the dragon.\n\t\t\n\t\tThe wind spirals into a howl, picking up dirt and debris from the ground and adding to the confusion as a mini tornado appears in the clearing with the surprised wyrm at its centre. \n\t\t\n\t\tYour energy reserves are draining fast and you're never going to get a better chance, so you take advantage of the distraction and bolt. Enraged, the dragon screams, spitting a fireball into your path which is swept up by the gale and flicked out of the storm on a different trajectory. You can only watch in horror as the ball of fire continues across the clearing to connect with the warded parcel by the cave. There's a low boom as shock wave of energy ripples out from the smoking remains of the box, rattling the rocks and making the dragon stagger back away from where you've fallen to the ground. \n\n\t\tStruggling to your feet you run for your life, tripping and sliding towards the trees. The wyrm having regained her balance, roars a stream of white hot flames spits fire at you once again, the fire setting the grass behind you alight. With a frustrated howl, the dragon lunges at you, jaws snapping shut on air as you duck to the side. You catch a glimpse of ice slivers, still caught in the scales around her eyes, seemingly causing enough on an impediment to the dragon's vision to prevent a direct strike. \n\t\t\n\t\tFleeing through the tree line you pass though the shimmering barrier and keep running. You can hear the muted sounds of Myranda raging behind the ward, but thankfully she doesn't follow you. \n\t\t*set Fourth_Task 0\n\t\t*set Good_Standing -10\n\t\t*set fail +1\n\t\t*Set grade4 \"Fail\"\n\t\t*goto_scene explodingparcel\n\t\n\t*selectable_if (air = 100) #Charm: Pick up Myranda's parcel on strands of air and float it over the dragon.\n\t\tWell Merlinus told you to stay polite, so polite you'll be even if it kills you. You flinch reflecting that this turn of speech might turn out more literal than you intended. \n\t\t\n\t\t\"Please hold a minute great dragon. I apologise for entering your domain uninvited, however I had an urgent delivery for you from the Wizard's Guild.\" Wrapping floes of air around the small parcel, you lift it off the ground and float it over the the wyrm, landing it gently by her feet. \n\t\t\n\t\t\"You're from the Wizzard'sss guild?\" she hisses, halting her advance to eye the parcel. \n\t\t\n\t\tYou nod vigorously. \"Yes it was my honour to deliver this to you. I must admit, the descriptions of your magnificence, do not even begin to do you justice.\" \n\t\t\n\t\tYou know you're probably laying it on too thick, but the overdone flattery seems to be improving the creature's temperament so why not continue you rationalise.\n\t\t\n\t\t\"Oh you are a polite one, aren't you.\" the dragon croons. \"Not that I believe one word of it, I know what you Wizzardsss really think of me...You're just a mageling though aren't you?\" She pauses. \n\t\t\n\t\t\"Never let it be sssaid that I too cannot be civilised.\" The dragon steps to the side leaving a path clear for you to leave. \"You are free to go.\"\n\t\t\n\t\tIt all seems way to easy but who are you to turn away good fortune? Giving the dragon a slight bow that allows you to continue to keep both eyes on her, you quickly retreat from the clearing before the wyrm has a chance to change her mind. \n\t\n\t\t*set fourth_task 100\n\t\t*set good_standing +10\n\t\t*Set grade4 \"Pass\"\n\t\t*set hundredpercent +1\n\t\t*goto_scene passdragon\n\t\n\t\n\t#Actually I'll go with a spell in my speciality area instead.\n\t\t*goto speciality\n\n\t\t\n\t\t\n\t\t\n\n\n*label tp\nThe whirling thoughts are emotion laden and confusing. You think you've obtained two important pieces of information from it though. The first is that the dragon seems to be wary of upsetting the council of wizards. The second is something about a ring. You got the image clearly from her mind and it's obviously of great importance to her, even though you can't fathom why. \n\nIf you're going to say something, now is the time. The dragon's close enough now that her breath is starting to singe the fibres on your clothes. \n*choice\n\t#Tell her you're from the Wizard's Guild.\n\t\t\n\t\t\"Great dragon, I apologise for disturbing you, I would not have presumed to do so, but that I was bid by my superiors at the Wizard's Guild who charged me with bringing you the package I have left by the entrance to your abode.\" You gesture to the parcel on the ground by the shielded entrance of the cave. \"By your leave I will depart, I'm sure I've taken up too much of your very valuable time already.\"\n\n\t\tThe wavelength of hunger and rage gives way to frustrated annoyance. \"The Wizzard'sss Guild sssent you?\" \n\t\t\n\t\tHer jaw snaps together with a sharp click.\n\n\t\t*page_break\n\n\t\t\"Well then thisss is a dilemma. Ssshould I eat you? I am hungry....\" Drops of saliva drip from her maw, sizzling corrosively as they hit the ground near your leg. You take a hasty side step to get out of harms way. \n\n\t\t\"If I eat you, the Wizard'sss Guild will come asssking questionsss, though.\" she ponders. \"I do not want my lair ssswarming with nasssty little wizards.\" \n\n\t\tIt seems to you rather concerning, that she is giving the two options so much thought. You're just about to speak up again in your defence when she moves out of your path with more agility than you would have believed from a creature of her bulk. \n\n\t\t\"Leave now!\" She commands with a baleful glare. \"Before I change my mind!\" Her spined tail flicks out at you to empathise the need to get moving. Dodging the barbs you hurry away as you're able. \n\t\t*set fourth_task 100\n\t\t*Set grade4 \"Pass\"\n\t\t*set good_standing +20\n\t\t*set hundredpercent +1\n\t\t*goto_scene passdragon\n\n\t#Use coercion to influence the dragon's thoughts about the ring. \n\t\tAlthough the dragon [i]might[/i] respect your position as courier for the guild enough to let you go. Her thoughts seem to indicate that she's considering whether to barbecue you regardless. It's a gamble you're not willing to take. \n\t\t\n\t\tThe ring seems to be of utmost importance to the wyrm though. Although it's difficult not knowing why exactly, you think you can work with it. \n\t\t\n\t\tYou send a probe into the dragon's mind. \"Look over there. What is that?\" \n\t\t\n\t\tFocusing, you twist the dragon's perception to see a shadow like creature making a taunting gesture, displaying the ring for the wyrm to see, before fleeing back into the forest. \n\t\t\n\t\tThe effect is immediate. Loosing interest in you, the dragon launches into the air in a rush of leathery wings, raining gouts of fire over the area of forest where you've made her see the shadowy figure retreating. Roaring in rage at the continued escape of her quarry, the wyrm continues to attack the area, crisping it black with fire and knocking trees to the ground with her powerful claws and tail. \n\t\t\n\t\t*page_break\n\t\t\n\t\tWasting no time you run forgotten from the scene. In the distance you can hear the dragon wailing in anger and despair. \"Curssse you Garmr, you promisssed to help me! What is thisss betrayal?!\"\n\t\t\n\t\tOh no. You realise Myranda has filled in the blanks of your shadowy thief with the features of a particular individual. You have no idea who this Garmr is but you certainly wouldn't want to be him right now. Whoever he is, you hope he has the good sense to stay clear of the rampaging dragon for the time being. \n\t\t*page_break\n\t\t*set fourth_task 70\n\t\t*set good_standing +5\n\t\t*Set grade4 \"Pass\"\n\t\t*goto_scene passdragon\n\t\t\n\t*Selectable_if (Ring = \"Ruby Ring.\") #That ring from the dragon's thoughts looks kind of familiar. I might be able to use it as a decoy.\n\t\tThat ring you saw in the dragon's thoughts is a pretty close match for the one given to you by the brownie. Although you have your doubts that it is the exact one Myranda is searching for, (after all how many plain golden rings set with a single ruby are likely to be out there?) it should be close enough to serve as a distraction and allow you to get out of here in one piece. \n\t\t\n\t\tPulling the ring from your pocket, you wave it around wildly, you've definitely got the wyrm's full attention now. Her attention is fixated on the small object. \n\t\t\n\t\t\"You want your ring dragon? Go and get it!\" Without hesitation you throw the ring as far as you can into the thick undergrowth by the large reptile. The wyrm's eyes light up as they follow the golden object spinning though the air. With a shriek of triumph she crashes into the bushes after the ring. \n\n\t\tWasting no time you race past the distracted dragon as fast as you're able and high-tail it back towards civilisation where you doubt she will follow. \n\n\t\tYou lost your magical ring but on the positive side you've escaped with all limbs in tact. That's got to be a positive outcome dosen't it? \n\t\t*set fourth_task 90\n\t\t*set ring \"\"\n\t\t*set good_standing +10\n\t\t*Set grade4 \"Pass\"\n\t\t*goto_scene passdragon\n\t\n\t\n", "dragonwizard": "\nA wave of lake water drenches you, surging up over the shore as dark coloured creature larger than a bus, launches itself out of the loch to land in front of you, blocking off any form of easy escape. The giant reptile furls her wings tightly against her body as the moonlight glints off midnight dark scales. A sinuous neck arches down as a fanged maw opens in a snarl. \n*page_break\n\n*image Myranda.jpg center \n\"Meddling Humanssss!\" A voice hisses in your mind, as a crimson eye larger than your hand turns to focus on you. You are hit by a wave of emotion from the dragon. Weakly you realise it's hunger. Being eaten was definitely not part of your life plan.\n\n*choice\n\t#I know a spell I think may help\n\t\t*goto_scene dragonmagic\n\n\n\t*Selectable_if (ring = \"Ruby Ring.\") #I'll try to use that ruby ring\n\t\tYou reach into your coat pocket fumbling around for the ring that the brownie gave you. In a shower of loose change and pocket lint, you pull out the ring triumphantly and hold it up before you. You're uncertain what the ring can actually do, only that it is a magical item. \n\t\t*goto ringchoice\n\n\t#Freeze. I got nothing....\n\t\tYou freeze as the dragon hisses, bathing you in the hot unpleasant stench of sulphur mixed with fish. You're mind's gone totally blank apart from that saying you heard once [i]\"Do not meddle in the affairs of dragons, for you are crunchy and taste good with ketchup.\" [/i] Potentially useful advice if headed earlier perhaps, but ultimately unhelpful at this point in your venture. \n\n\t\tBacking away from the beast, you stumble over a rock and fall hard to the ground spraining your ankle. No running away for you now. With a terrifying grin, the black dragon advances slowly towards you, tail lashing the ground. At least the sharp pain in your leg has shocked you back to your senses, with no magic at your disposal and no way to run you're going to have to talk your way out of this one. \n\t\t\n\t\t*Choice\n\t\t\t#Insult the dragon. Maybe if you can make her irrationally angry, you can use that to your advantage. \n\t\t\t\tAre you sure you didn't hit your head in that fall as well? You're seriously going to insult a large, fire breathing reptile, with teeth longer than your fingers? Well ok if you insist...\n\t\t\t\t*page_break\n\t\t\t\t*goto insultdragon\n\n\n\t\t\t#Try to sweet talk the dragon.\n\t\t\t\tYou're doubtful about how far you're going to get with this tactic but decide it's worth a shot. \n\n\t\t\t\t*goto sweettalkdragon\n\n\n\n\n\n*label ringchoice\n\nWhat would you like to do with it?\n\t\n*choice\n\n\t#Throw the ring at the dragon. \n\t\tHopefully dragons are as gold obsessed as the stories make them out to be and the distraction will let you get away. \n\t\t*goto ringthrow\n\n\t#Channel a stream of pure elemental magic through the ring. \n\t\tWith any luck it will focus it into a bolt of energy strong enough to repel the dragon. \n\t\t*goto ringuse\n\n\t#Try and bargain for your freedom with the ring. \n\t\tDragons love treasure right? Hopefully this one is no exception. \n\t\t*goto_scene dragongivering\n\n\n\n*label insultdragon \n\"Your mother was an gecko and your father was an earthworm!\" You yell at the dragon, propping yourself up to a sitting position. \n\nIf you wanted to make the dragon angry, it's working. She hisses at you again, louder now, with the sound of a hundred displeased cats. \n\n\"Wow,\" you comment waving a hand in front of your face. \"I always thought most dragons killed people with fire, but I can see your weapon of choice is your awful breath!\"\t\n\nThe dragon's head arches up towards the sky and you see an orange glow forming at the back of her throat. Uh oh, maybe you should have thought this plan through a bit further. \n\n*page_break\nWith a wash of searing heat, a yellow-white gout of flame flows from the dragon's mouth to engulf you. \n\nShielding your face with your arms you can only scream as it hits you.....\n\n*page_break\n\nAnd nothing happens....\n\nYou should be in a world of pain right now but you're not. Fleetingly to wonder if you're already dead but the carpet under your fingers suggests otherwise. \n\nHesitantly you bring your hands away from your face and open your eyes.\n\n*page_break\n\nAs your bright spots clear from your vision, you register that you're sitting on the ground next to a plain white wall while a neon light flickers overhead. [i]What is going on?![/i]\n\nSomeone clears their throat impatiently behind you. Scrambling to turn around you come face to face with the Wizard Merlinus. This time he's out of his official uniform, dressed only in an faded blue T-shirt and jeans, however the air he's projecting makes him seem more formidable than ever. \n\n*page_break\n\n\"Well you're one very fortunate wizardling. How lucky do you feel right now that I was keeping tabs on you?!\" He exclaims sternly. \n\n\"On what planet do you think it is [i]ever[/i] appropriate to insult a dragon! You might have been...\" He pauses correcting himself \"No, you [i]would[/i] have been a pile of ash on the ground right now, if I hadn't pulled you out when I did. With stupidity like that I was tempted to let her have you.\" He coughs, composing himself again. \n\n\"I'm sorry $!{name} but with a stunt like that, it's an instant fail for your wizards licence. I can't have you running around starting that sort of trouble that will potentially get not only yourself but those around you killed as well.\"\n\n*page_break\n\nThe shock of almost being crisped still has you reeling. Half dazed, you can't think of anything to say in your defence. There's a sharp pain in your hand as if the ink for your wizard's licence is sucked out of your skin, then with a dizzying crash you're dumped unceremoniously onto your bedroom floor. Everything spins and you pass out.  \n*achieve kickedout\n*set good_standing -10\n*Set grade4 \"Fail\"\n*page_break\n\nWhen you wake it's still dark outside. Whether the same night or another, you have no idea how long you were out for. Your head still pounds in time with your heartbeat making you wince as you climb to your feet. Deciding you need to walk, you head down stairs and into the darkened streets. \n\nAimlessly you walk, the cool night air helping to clear your head. Bitterly you start to think on the events leading up to your expulsion from the Guild. \n\n*page_break\n*goto_scene faillicence\n\n\n\n\n*label sweettalkdragon\n\nYou prop yourself up into a sitting position and paste a wide smile onto your face. \n\n\"My!\" you exclaim. \"I was told how magnificent you were, but the stories don't do you justice! I mean, just look at the way your ebony scales glimmer in the moonlight And such beautiful, graceful wings. I've never seen a dragon more impressive.\"\n\nYou decide at this point the dragon doesn't need to know, it's the [i]only[/i] one of it's species you've ever seen. \n\nThe dragon cocks her head slightly at you and pauses in her advance. She seems to at least be listening to you for the moment. It encourages you to continue. \n\n\"And your size, a bigger, more mighty dragon I've never seen. I bet you have a huge hoard full of gold and gems beyond compare.\"\n\n*page_break\n\nThe dragon's eyes narrow suspiciously, bringing up her treasure, may not be the way to go. \n\n\"You humansss! Alwaysss trying to sssteal my treasssure! You can't fool me mage!\" The dragon's unspoken communication is menacing, the sensation is one of the words dripping like acid into your brain. You wince in pain, shying away from the reptile's gaze. \n\nSqueezing your eyes shut in pain you talk quickly. \"No, no great dragon, I meant no offence. I have no intention of stealing your treasure. Being able to gaze upon you is reward enough for one such as myself.\" \n\nThe serpent gives a low growl that causes the ground to vibrate under your feet. She doesn't believe you. \n\n*page_break\n\n\"Great dragon, I apologise for disturbing you, I would not have presumed to do so, but that I was bid by my superiors at the Wizard's Guild who charged me with bringing you the package I have left by the entrance to your abode.\" You gesture to the parcel on the ground by the shielded entrance of the cave. \"By your leave I will depart, I'm sure I've taken up too much of your very valuable time already.\"\n\nThe wavelength of hunger and suspicion gives way to frustrated annoyance. \n\n\"The Wizzard'sss Guild sssent you?\" Her jaw snaps together with a sharp click.\n\n*page_break\n\n\"Well then thisss is a dilemma. Ssshould I eat you? I am hungry....\" Drops of saliva drip from her maw, sizzling corrosively as they hit the ground by your leg. You hastily move out of harms way. \n\n\"If I eat you, the Wizard'sss Guild will come asssking questionsss, though.\" she ponders. \"I do not want my lair ssswarming with nasssty little wizards.\" \n\nIt seems to you rather concerning, that she is giving the two options so much thought. You're just about to speak up again in your defence when she moves out of your path with more agility than you would have believed from a creature of her bulk. \n\n\"Leave now!\" She commands with a baleful glare. \"Before I change my mind!\" \n\nHer spined tail flicks out at you to empathise the need to get moving. Despite your sprained ankle, you manage to get to your feet in time to avoid the barbs and hobble painfully away as fast as you're able. \n*set fourth_task 100\n*set good_standing +10\n*Set grade4 \"Pass\"\n*set hundredpercent +1\n*page_break\n\nHobbling up the track through the darkness, (you don't want to chance a light in case Myranda changes her mind,) you trip several times each instance increasing the stabbing pain in your leg. With relief, you finally make it through the shimmering barrier and a portal flickers into existence as if on cue. Through the shifting light you recognise Merlinus' office and gratefully step through, happy to be clear of the dragon below.\n\nShaken and looking worse for wear with your torn clothes from the painful hike along the overgrown path, you step out before Merlinus' desk who regards you with grey eyes. \n\n\"Gave you some trouble I'm gathering?\" The question is almost a statement. He doesn't sound in the least bit surprised. \n\n\"Well I'm gathering the delivery went ok at least?\" \n\nYou nod not trusting your voice at this stage as you shift your weight off the injured ankle. You'll need to do something about that as soon as you're through with this interview. \n\n\"Great. Myranda can be...[i]challenging[/i] to deal with. You did well to deliver the parcel without upsetting her unduly. Impressive thinking on your feet like that, dragons are quite intimidating.\"  \n\n\"So, let's see how you've been progressing so far shall we?\"\n\n*goto_scene testmarks\n\n \n*label ringthrow\n\nYou wave the ring around making sure the dragon sees it then without hesitation, throw it as far as you can into the thick undergrowth by the large reptile. The wyrm's eyes light up at the sight of the golden object spinning though the air, and with a shriek she crashes into the bushes after the ring. \n\nWasting no time you race past the distracted dragon as fast as you're able and high-tail it back towards civilisation where you doubt she will follow. \n\nYou lost your magical ring but on the positive side, you've escaped with all limbs in tact. That's got to be a positive outcome, dosen't it? \n\n*set fourth_task 90\n*set ring \"\"\n*set good_standing +10\n*Set grade4 \"Pass\"\n\n*page_break\n\nTo your surprise you see a portal shimmering open on the path ahead. Through the shifting light you recognise Merlinus' office. Gratefully you jump through, relieved to be clear of the dragon below.\n\nShaken and looking worse for wear with your torn clothes from the wild run through the overgrown path, you step out before Merlinus' desk who regards you with grey eyes. \n\n\"Gave you some trouble I'm gathering?\" The question is almost a statement. He doesn't sound in the least bit surprised. \n\n\"Well I'm gathering the delivery went ok at least?\" \n\nYou nod not trusting your voice at this stage. \n\n\"Great. Myranda can be...[i]challenging[/i] to deal with. You did well to deliver the parcel without upsetting her unduly. So, let's see how you've been progressing so far shall we?\"\n\n*goto_scene testmarks\n\n\n\n\n*label ringuse\n\nWith shaking fingers you slip the ring onto your index finger. Not being sure what spell would work with the ring, you hope a blast of energy will suffice. Fear gives you the boost you need as you focus your will through the ring into a bolt of blinding, white energy, hitting the oncoming dragon squarely on the chest. \n\nThe dragon stops dead in her tracks, falling with eyes glazed to the ground with a crash. Not realising you had been holding your breath, you begin to gulp air again as relief sets in. \n\nYou're not going to be eaten after all. Time to get out of here before the dragon wakes again though. You can see she's still alive from the rise and fall of her chest.\n\n*page_break\n\nYou start creeping past the dragon hoping not to wake her. Having collapsed across the path and your only way out of here, you find yourself having to edge rather closer to the creature than you would have liked. Your skin prickles as if the air itself is charged. \n\nThe ruby in your ring is now burning brightly enough to cause shadows, bathing everything in fiery glow. It's almost as if it's flickering in a pulsing pattern, making the shadows move. Wait! The shadows [i]really are[/i] moving!\n\n*page_break  \n\nShadows swirl around the clearing as if alive, flowing into a dark river around yourself and the unconscious dragon. Black mist seeps from the dragon's skin while her appearence changes, shrinking in size until only the form of a slight woman lies puddled in black robes on the ground. Dark, blood-red tinted eyes flutter open. \n\n“My word!” her voice croaks harshly as if long unused. She gets to her feet unsteadily, looking in wonder at her hands. \n\nA smile lights her pale features. “I never thought I'd be human again!” Her form shimmers as if still in flux and a concerned look passes over her features. \n\n“Oh! I almost forgot!” With a gesture, she hits you with a bolt of crimson energy. \n\n*page_break\n\nThe bolt throws you off your feet and leaves you hanging suspended in the air, paralysed from the neck down while the stream of shadowy magic howls around the two of you at its centre. The dragon-woman walks towards you hesitantly as if learning how to balance on two legs again. The magical breeze causes her long, raven hair to whip around her face and tugs at the concealing black and silver cloak. \n\nReaching out, she takes your hand removing the ring and with a moments consideration places it on her own finger. \n\n\"I am sorry,\" she says with a tone that doesn't convey the slightest hint of regret. \"I do thank you for returning my ring though. Unfortunately for you, the curse is yours now.\" The swirling darkness shatters, collapsing in on you as everything goes black. \n*set ring \"\"\n*page_break\n\nSnapping awake, you realise with relief that it's still dark. You can't have been out too long. Your head feels heavy and you ache all over as if every muscle in your body has been twisted and bruised. The sorceress is nowhere to be found of course. She's long gone and taken your ring with her no doubt. \n\nYou decide you should get out of here as well. You start to stand up only to stab yourself in the leg with a spine as you trip over your tail. \n\n*page_break Wait. What?!\n\nThere's no doubt about it. You have a tail. Not only that, but four claw tipped legs, a long arching neck and leathery wings! You take in your reflective midnight scales and with panic realise what the sorceress meant about the curse. You've been turned into a bona fide dragon. \n\n*achieve dragon \n*set good_standing -10\n*set occupation \"Dragon\" \n*Set grade4 \"Fail\"\n*goto_scene newdragon\t\t\n", "elementchoice": "*page_break\nMost wizards apparently have an affinity for a particular element, which in turn dictates which kinds of magic are easier to cast. The book details a meditation, designed to guide potential wizards to what your strengths are. Feeling a little silly you sit cross legged on your bed, breathing deeply while you stare at the black square on the page. \n\nYou get sounds and a faint smell first, then an image starts to form. \n*choice\n\t#Sinking through the water column in the ocean.\t\n\t\tYou're surrounded by the deep blue of the ocean. Colourful fish flit around you and in the distance you can hear the sound of humpback whales singing. \n\n\t\t*image watersymbolsmall250.jpg center\n\t\tYour Element is Water. \n\t\t*set water 100\n\t\t*set EA \"Water\"\n\t\t*Set eyecolour \"deep blue\"\n\t\t*goto_scene book\n\n\t#Trees rising up around you, standing with both feet planted on the ground. \n\t\tDappled light shines though the leaves. You can feel the dirt between your toes and a wet, earthy smell surrounds you. \n\t\t\n\t\t*image earthsmall.jpg center\n\t\tYour Element is Earth. \n\t\t*set earth 100\n\t\t*set EA \"Earth\"\n\t\t*set eyecolour \"glowing green\"\n\t\t*goto_scene book \n\n\n\t#Flying through the air above the clouds.  \n\t\tA cool breeze tosses your hair as you glide though the air, arms outstretched like wings. \n\t\t\n\t\t*image airsymbolsmall250.jpg center\n\t\tYour Element is Air\n\t\t*set air 100\n\t\t*Set EA \"Air\"\n\t\t*set eyecolour \"metalic, steely grey\"\n\t\t*goto_scene book   \n\n\t#A large fire raging around you. \n\t\tRed-gold flames dance around you while you sit quietly in their midst. The smell of burning wood fills your nose and the heat from the fire feels like it should be scorching your skin but you remain unharmed. \n\n\t\t*image firesymbolsmall250.jpg center\n\t\tYour Element is Fire.\n\t\t*set fire 100\n\t\t*set EA \"Fire\"\n\t\t*goto_scene book ", "ending": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n*restart", "explodingparcel": "*page_break\nHolding your sides and gasping for breath, you have run far enough that you feel you can pause for a minute to compose yourself and get a spell organised to get you out of here.\n\nCollapsing shaking to the ground you remove your back pack which fortunately although blackened, hasn't burnt though to your supplies contained within. Not daring to create a light in case Myranda is circling above somewhere on silent wings, you hunt frantically for the right ingredients to send you home. \n\nA flash of light almost stops your heart, but to your relief it's only Merlinus. You don't think you've ever been so happy to see someone in your life before. \n\n\"Here take my hand.\" Merlinus grabs you by the hand pulling you to your feet. With a last furgetive glance at the skies, he sketches a series of glowing gestures in the air and pulls you though the portal. \n\n*page_break\n\nYou notice you're not the only one to breathe a sigh of relief and the familar office block with its drearu carpeting and overhead neon lights. Not saying a word he gestures for you to take a seat. Walking around to the other side of the wooden desk, he leans across the table, folded hands resting in front of him. \n\n\"You blew up the parcel.\" It's a statement not a question, delivered in an overly calm, cold voice. Somehow it makes it worse than if he was yelling at you.\n\n\"Well to be fair, it was Myranda, not me who set fire to it...\" You protest. \n\n\"Maybe, but who made her angry enough to do that? Remember my parting words. Stay polite, do NOT anger the wyrm. In what way does launching a magical attack fit in with that plan of action?\" The wizard regards you cooly. \n\n\"But she was going to eat me!\" You blurt. \"She had me trapped and was threatening to roast me!\"\n\n\"I'm sure it seemed that way but it's highly unlikely Myranda would have gone through with it....Well that is until you provoked her. I'd stay well clear of that whole area for at least the next 50 years or so, if I were you by the way.\" He pauses considering.\n\n\"Would she have tried to scare the pants off you...yes. Maybe gone so far as to singe the edges of your clothes a little...possibly, but she well knows that if she want's to stay on earth, the primary ground rule is 'DON'T EAT THE HUMANS.' She would have known there was no way she would have gotten away from it, with you being on an errand from the council.\"\n\n*page_break\n\nHe pauses again, giving you a studying look. \"You [i]did[/i] tell her why you were there when she showed up didn't you?\"\n\nWith everything happening so fast, you realise that you hadn't. You consider lying but the wizard's stern expression convinces you otherwise. No trusting your voice you simply give your head a slight shake. \n\nHe leans back away from the table and sits back into his chait. \"Well this is a mess isn't it? I must say I'm very disappointed. Not only in you, but in myself. I really thought you were grounded enough to cope with this task without everything hitting the fan, but I see I was wrong.\"\n\n\"Well what's done is done.\" He drums his fingers idling on the table thinking. \"I'll have to wait a few months for the old wyrm to calm down before I can go down there and start to get everything straigtened out. Hopefully she'll just burn down her clearing and not venture out beyond that to cause any havoc. She really does have a temper that one, even by dragon standards.\"\n\nOk, well on that low note, lets keep going with what I was originally going to chat to you about. You've been on probation for over a month now and we've set you a number of assignments. Lets see how you faired with the other ones. \n\n*goto_scene testmarks", "eyecontact": "*page_break\nQuickly you take advantage of the situation and arch your neck down level with the wizard's face, fixing him with a giant eye, willing him to hear you. \n\nThe wizard pauses for a moment, looking puzzled.\n\n*choice\n\t*if (water = 100) #\"Since when did your eyes change colour\"\n\t\t*image blueeyedragon.jpg center\n\t\t\"What has happened to your eyes? Being a fire mage, your dragon form always had red eyes. Yours are a ${eyecolour}.\"\n\t\t*goto eye\n\n\t*if (earth = 100) #\"Since when did your eyes change colour\"\n\t\t*image greeneyedragon.jpg center\n\t\t\"What has happened to your eyes? Being a fire mage, your dragon form always had red eyes. Yours are a ${eyecolour}.\"\n\t\t*goto eye\n\n\t*if (air = 100) #\"Since when did your eyes change colour\"\n\t\t*image greyeyedragon.jpg center\n\t\t\"What has happened to your eyes? Being a fire mage, your dragon form always had red eyes. Yours are a ${eyecolour}.\"\n\t\t*goto eye\n\t\n\t*selectable_if (fire = 100) #\"You're behaving rather oddly today, even for you.\"\n\t\t*image redeyedragon.jpg center\n\t\t*goto oddbehaviour\n\t\t\n\t\t\n\t\t\n\n*label oddbehaviour\nTo your dismay, having direct eye contact, doesn't seem to be changing your luck at getting through to Merlinus. He just thinks you're behaving strangely and it's wearing thin on his already frayed nerves. \n\n\"Well if you've finished with your antics for the
