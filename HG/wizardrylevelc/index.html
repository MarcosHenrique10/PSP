rby animal hospital you present the kingfisher to the veterinarian on duty there. She exclaims over the broken wing and assures you they will do what they can to repair it. You leave feeling like you've done your good deed for the day. Unfortunately you're now really late. Luckily you have the time manipulation watch with you. You turn the hands on the time piece and the world blurs around you as if in a fast rewind. \n\t\t\t\n\t\t\t\tAll of a sudden the world jolts back into normal motion, just in time for a man carrying boxes to collide with you, sending both of you sprawling to the ground. You help him collect the boxes while he apologises profusely for not seeing you there. Lesson learnt, next time you use the watch, pick a place out of sight. \n\n\t\t\t\t*goto_scene unicorntest\n\n\n\t\t\t#Leave it be. \n\t\t\t\tYou leave it on the road telling yourself it's all part of nature, even if it seems cruel sometimes. \n\t\t\n\t\t\t\tWalking away you can't help feeling you may have missed out on an opportunity to use your magic for good. You make it to the bus stop in time and get on.\n\n\t\t\t\t*goto_scene unicorntest\n\n\t*if (Fire = 100) #A gecko lies crumpled by the side of the road. \n\t\tIt's almost frozen and only moves weakly, You can see blood seeping slowly from a cut on its hind leg. What do you do?\n\n\t\t*choice\n\t\t\t#Attempt to heal it. \n\t\t\t\tYou scoop the lizard up in your hands, trying to give it as much warmth as possible and jog down the road as fast as you can to a local park. \n\t\t\t\t\n\t\t\t\tYou turn off the main path, heading towards a secluded area, shielded by large trees. Mud splashes across your shoes with every step as you walk further away from the trail, however this still seems preferable to trying out a ritual where people could stumble across you and ask questions.  \n\n\t\t\t\tReaching a suitable spot, you pull out your magic book and flip to the section on healing spells. You find one which should work with what you have available. Snapping your fingers, you create a small flame which dances on the end of your fingertips. Tracing a rune in the air you intone the words \"Sanos Vulnerare.\" Trails of red light from your rune fracture off, wrapping the reptile in a red glow. To your delight, as the glow fades, the lizard gets to its feet and climbs into your waiting palm.\n\n\t\t\t\tIt looks up at you with glowing, intelligent eyes. You've created a bond with this creature and he has decided to stay with you and help where he can.  \n\t\t\t\t*achieve familiar\n\t\t\t\t*set good_standing +10\n\t\t\t\t*set familiartype \"Ember Gecko\"\n\t\t\t\t*set Familiarnumber 4\n\t\t\t\t*set animal \"gecko\"\n\t\t\t\t*set fhe \"he\"\n\t\t\t\t*set fhis \"his\"\n\t\t\t\t*set fhim \"him\"\n\t\t\t\t*goto watchtime\n\n\t\t\t#Take it to an animal hospital. \n\t\t\t\tYou scoop the lizard up in your hands, trying to give it as much warmth as possible and run down the road as fast as you can to a nearby animal hospital. \n\n\t\t\t\tThe veterinarian on duty looks surprised to see the gecko. \"I've never seen one like this before, it must have escaped from someone's collection.\" She looks the reptile over and assures you they will do what they can to repair the leg. You leave feeling like you've done your good deed for the day. Unfortunately you're now really late. Luckily you have the time manipulation watch with you. You turn the hands on the time piece and the world blurs around you as if in a fast rewind.\n\n\t\t\t\tAll of a sudden the world jolts back into normal motion, just in time for a man carrying boxes to collide with you, sending both of you sprawling to the ground. You help him collect the boxes while he apologises profusely for not seeing you there. Lesson learnt, next time you use the watch, pick a place out of sight. \n\t\t\t\t*goto_scene unicorntest\n\n\n\t\t\t#Leave it be. \n\t\t\t\tYou leave it on the road telling yourself it's all part of nature, even if it seems cruel sometimes. \n\t\t\n\t\t\t\tWalking away you can't help feeling you may have missed out on an opportunity to use your magic for good. You make it to the bus stop in time and get on.\n\n\t\t\t\t*goto_scene unicorntest\n\n*label watchtime\n*page_break\n\n\n\nAs happy as you are to have your new companion, you're aware of just how late you really are now. Luckily you have the time manipulation spelled watch with you. Signalling the creature to stay close, you turn the hands on the time piece and the world blurs around you as if in a fast rewind. \n\n[i]Fantastic,[/i] you think to yourself. You could get used to playing with time like this. Leisurely you stroll back towards the road, familiar in tow. \n\n\n*goto_scene familiarbus", "helpfairy": "The fairy disappears from sight but you can still feel her tugging at a lock of your hair and whispering urgently for you to hurry. She leads you into your neighbour's front garden who is thankfully not home at the moment. There's a growling sound from one of the gnarled old trees by the fence line. \n\nRunning over you see Canon, a battle scarred ginger tom perched on a low branch while intently hissing and striking at something within a hollow in the tree. \n\n\"Canon! Bad Cat! Scat!\" You wave your hands at him shooing him away. \n\nThe feline looks disdainfully at you and gives you a parting scratch, before bounding off across the lawn. \n\n*page_break\n\n\"Alri, you're ok!\" The blue winged fairy leaps from her hiding place on your shoulder and flutters down to hug the silver clad fae. Emerging from his hiding spot, he sketches a bow, purple wings fluttering while praising you for your bravery at driving off the cat creature, even to the point of being wounded while saving him from the beast.  \n\nMore fae appear from the trees fluttering around you, thanking you for your help. \n\nYou tell them you were happy to help but to be careful not to get cornered by crafty old Canon again in case you're not around next time he turns up. \n\nYou decide it's really time to get going when you notice Mrs Brown, the local street gossip, pretending to water the plants in he front yard, while actually watching you intently out of the corner of her eye. You sigh, just what you need. She's going to have the whole street notified by tomorrow morning that you walk around in your pajamas, holding conversations with trees. Saying goodbye to the faeries, you quickly exit back to your home. \n\n*page_break\n\nOver the next few days, you find small gifts of fruit and berries left on your kitchen bench for you each morning. There's no notes attached to the presents but you're fairly sure you know who is bringing them.  \n\nFinding the fairy pair sitting on your window sill one day, you take the opportunity to ask them about why they were unable to drive off the cat attacking Alri. \"With your magic, I would have thought it would have been easy enough to scare even the nastiest tomcat away?\" \n\n\"Felines are partly of the underworld,\" the fae explain. \"There's a reason why they've been held sacred in many cultures. Unfortunately it also means that they think they're superior to the rest of us and will hunt us down when they can. What's worse is our magic has little effect against them. That orange cat is the worst of them all,\" she says, pointing to the tom cat hidden in the bushes along the back of your yard. At least he seems to be keeping his distance from your fairy friends while you're around. \n\n*page_break\n\nThinking on what the fae have said, you pay a visit Canon's owner, expressing your concern about the number of \"birds\" you'd seen him catching lately. His owner, a sweet lady, horrified by the thought of him killing wildlife, quickly agrees help out. \n\nYou've spotted Canon a number of times since then with his bright pink, bell ladenn collar, looking decidedly grumpy as he jingles around the neighbourhood, audible from a mile away. The cat may have his nose out of joint, however the local fairies are overjoyed with the arrangement, bestowing you with their made up title of \"Champion of the Fae,\" as well as frequently popping in to ask your advice or just to gossip. You get the distinct impression that the blue winged fairy Salia, has claimed you as \"her human\" having found you first.  \n\n*page_break\n\nOne morning Salia flits in bearing a ring of daisies which she settled on your head. \"For you Wizard ${name}.\" \n\nYou decided you needed to come clean, after all, friends don't lie to each other. \"Salia, you know I'm not actually a wizard right?\"\n\n\"But I've seen you do magic,\" she chirps confidently. \n\n\"I know, but I can't any more, the Wizard's Guild won't let me,\" you reply. \n\n\"Really?\" You nod. \n\n\"Well that's great!\" she exclaims to your astonishment. At your blank look she elaborates. \n\n\"I'm glad you're not with them. We fairies have never really gotten on with the Guild, they put restrictions on our kind. There used to be a time when humans [i]had[/i] to respect our kind, or else...\" There's feral glint in her eyes which is kind of disturbing. \n\nShe launches into some stories about the good old days where the fae were free to interact with people as they willed in both beneficial and malevolent ways. After hearing some of the stories, you're actually starting to side with the Guild's view about control in spite of yourself. \n\nThe stories are fascinating, Salia tells a good tale. \"Hey Salia, would you mind if I wrote some of these down for a book?\" \n\nNothing would make her happier, \"Anything to make the mortals remember us.\" As she put it. \n\n*page_break\n\nOver the next few months you record story after story. When Salia runs out of tales to tell, she starts dragging other supernatural creatures along to tell you their stories. Although you appreciate the effort, finding a sphinx in your lounge room for the first time was enough to send you into conniptions until the creature assured you she was only there as a favour to Salia to give you some information, not to devour you.\n\nBook finally compiled, you end up with a sizable volume of largely unknown folk tales and legends. It's published to positive reviews. No one can work out how you have managed to mix fantasy and the reality of the middle ages so well. When asked you only smile and reply that \"It's a secret.\"\n\n*achieve author\n\nYou get your wish, working with the fae folk, able to be involved with the supernatural, without being under the iron thumb of the Wizards Guild. And thanks to your resident faeries, your house never lacks for flower adornments or fruit for morning tea. You munch happily on some berries as you work on the follow up to your first book on fairy tale and legends. \n*Set occupation \"Author\"\n\n*page_break\n\nThank you for Playing Wizardry Level C. \n\nThis adventure is over, however there are still many other choices that can be made. \n\nWould you like to play again?\n*choice\n\t#Reload from the last checkpoint.(Just lost your licence). \n\t\t*set nomagic 0\n\t\t*set occupation \"Mundane Member of Society\"\n\t\t*goto_scene savepointfairy\n\n\t#Restart from the beginning.\n\t\t*goto_scene ending ", "hints": "Having trouble finding part of the book or getting an achievement? Then you've come to the right place.\n\nI recommend you try playing the book right though at least once, but if you're having trouble this is the screen to turn to. It's not a walk through, but should help put you on the right track. \n\nAre you sure you want to look at hints now?\n*choice\n\t#Return to the stats screen\n\t\t*goto_scene choicescript_stats\n\t\t\n\t#Continue to the hints page\n\t\t*goto hints\n\t\t\n\n\n\t\n*label hints\n\n[b]Hints Page[/b]\t\t\n\t\t\n*choice\n\t#[b]I want to return to the stats screen.[/b] \n\t\t*goto_scene choicescript_stats\n\t\t\n\t\t\n\t#Does my elemental affinity and magical speciality affect anything other than my stats?\n\t\tYes. It will affect some options and events open to you. \n\t\t*goto hints\n\t\t\n\t#My stats are changing and I don't know why/Some options are greyed or invisible in the story, why?\n\t\tYour choices have an effect on your stats and can influence what will happen in future events, just like in real life. Not all consequences will be visible to track on the stats page so be careful with the choices you make. \n\t\t*goto hints\n\t\t\n\t#Are there invisible choices I might not be able to see in every story?\n\t\tOnly a few, which ones you encounter them depends on what story you play.\n\t\t*goto hints\n\t\t\n\t#Why are there choices with only one option?\n\t\tIn most cases, it's due to hidden options being present. Different stats are generally required.\n\t\t*goto hints\n\t\t\n\t#I don't want “X” familiar? Why can't I have something different?\n\t\tAnimals tend to be attracted to the element they have the most affinity for. \t\n\t\t*goto hints\n\t\t\n\t#Why does the cup keep breaking? It's so frustrating!\t\n\t\tYou might want to try specialising in a different kind of magic.\n\t\t*goto hints\n\t\t\n\t#I want to be a famous magician\n\t\tThe general public knows nothing of the wizard's guild. Maybe your path lies outside of it? Of course you'll need some level of skill before you head out on your own won't you?\n\t\t*goto hints\n\t\t\n\t#Who do I play nicely with again?\n\t\tTry following the directions you are given for your assignments to meet new friends. \n\t\t*goto hints\n\t\t\n\t#Where can I get a valuable item?\n\t\tPerhaps a familiar could help with that?\n\t\t*goto hints\n\t\t\n\t#Where can I find a familiar?\n\t\tTry helping out an animal through magical means. \n\t\t*goto hints\n\t\t\n\t#How can I be an MIB impersonator?\n\t\tYou know how it is...When things involving aliens go wrong...and then the public sees it....\n\t\t*choice\n\t\t\t#Ok, got it\n\t\t\t\t*goto hints\n\t\t\t#I need another hint\n\t\t\t\tIt could involve not handling the case involving a bunyip as well as it could have been. \n\t\t\t\t*goto hints\n\t\t\t\t\n\t#Take advice from which alien?\n\t\tKeep chatting to the green skinned alien. She's [i]such[/i] a pleasent individual to talk to after all, I'm sure you'll enjoy it. \n\t\t*goto hints\n\t\t\n\t#Why can't I help/not help the fairy? Only one option is available.\n\t\tYou might want to re-think whether you want to continue to have anything with the magical world. \n\t\t*goto hints\n\t\n\t\n\t#How do I find Cernuuous?\n\t\tYou will probably need \"help\" from one of the fae folk.\n\t\t*choice\t\n\t\t\t#Ok, got it. \n\t\t\t\t*goto hints\n\t\t\t#I need another hint.\n\t\t\t\tThat fairy has a real temper when you don't do as she asks.\n\t\t\t\t*goto hints\n\t\t\t\t\n\t#How can I find Garmr or the fae folk?\n\t\tThey're lurking on the edges, not generally having much to do with official wizard types. Maybe wizardry through the guild might not be the path for you if that's who you'd prefer to associate with?\n\t\t*choice\n\t\t\t#Ok I got it. \n\t\t\t\t*goto hints\n\t\t\t#I need another hint.\n\t\t\t\tHow far into your probationary period you get, how much you annoy the guild in the process, and what objects you have in your inventory, might affect who you meet and how you can interact with them.\n\t\t\t\t*goto hints\n\t\t\t\t\n\t#How can I get a ring?\n\t\tIt's the responsibility of all potential wizards to be well read and prepared. \n\t\t*goto hints\n\t\t\n\t#How can I be a force for evil?\n\t\tRebellious one aren't you? Make sure everyone knows it, then have a chat to Garmr.\n\t\t*goto hints\n\t\t\n\t#I want to be a superhero!\n\t\tThat doesn't sound much like a wizardry career does it?\n\t\t*choice\n\t\t\t#Ok, got it. \n\t\t\t\t*goto hints\n\t\t\t#I need another hint. \n\t\t\t\tGarmr should be able to set you up with what you need. \n\t\t\t\t*goto hints\n\t\t\t\t\n\t#I want to go off world. \n\t\tWait, are dragons native to Earth? I'm not sure if they are....\n\t\t*choice\n\t\t\t#Ok, I got it. \n\t\t\t\t*goto hints\n\t\t\t#I need another hint.\t\n\t\t\t\tYou might need some special jewellery to pull it off. \n\t\t\t\t*choice\n\t\t\t\t\t#Right, I've got it. \n\t\t\t\t\t\t*goto hints\n\t\t\t\t\t#Come on, one more hint?\n\t\t\t\t\t\tDon't be so nice to Merlinus all the time. Be a little impulsive and get his attention by any means necessary.\n\t\t\t\t\t\t*goto hints\n\t\n\t#I want to be human again!\n\t\tYou might need to be rescued from a planet far, far away. \n\t\t*goto hints\n\t\t\n\t#Monster?\n\t\tHmm, that title's sounding somewhat familiar. Following in the footsteps of someone you've met maybe?\n\t\t*goto hints\n\t\t\n\t#I want to have my own business\n\t\tI hear there's equal opportunity for all species now...\n\t\t*goto hints\n\n\t#What's with the toad?\n\t\tTrade a ring to Myranda and maybe you'll find out. \n\t\t*goto hints\n\t\t\n\t#What's the deal with “dragon-speech”?\n\t\tDragon speech is [b]not[/b] the same as human telepathy although to a casual glance it seems similar. Although they are both forms of mind to mind communication, the type of innate magic able to be utilised by dragons, is quite different to that learnt by wizards and the two are not interchangeable. \n\t\t*goto hints\n\t\t\n\t#I want to feed the animals! I don't care if it tells me not to. \n\t\tAlright, alright, it's your choice. Just don't run away then, I'm sure they'll be happy to stick around. \n\t\t*goto hints\t\t\n\t\t\n\t#And Finally. This story is so short! Is there more to it that just that? *RAWR* ;)\n\t\tSome stories are longer and shorter than others, and this particular book does branch significantly into different tales. Hopefully there's some in there that you might enjoy on different read throughs. Thank you for giving Wizard Class C a go :)\n\t\t*goto hints\t", "jaculus": "*comment follows paraanimals\n\n*page_break\nA wave of searing desert heat hits you as you step through the portal into the blazing sun. Undulating waves of sand and rocks stretch as far as your eyes can see. A few hundred meters ahead has to be your destination, it's the only area of vegetation visible with a mixture of palm trees, spindly acacias and a small amount of scrubby bushes which cluster around a small pool of greenish water. \n\nIn despair, you realise your long black trousers, while sensible clothing for the climate you came from, are completely inappropriate for the desert weather you've been sent to. \n\nOpening the wallet you reach in surprisingly deep all the way up to your elbow (I guess Merlinus wasn't kidding about that pocket dimension) hoping there's a hat included in with the \"survival supplies.\" Grabbing the object that slides into your hand, you pull out a wide brimmed straw hat. [i]Fantastic![/i] How about a container of water? A bottle of ice cold water is right at the entrance. You gulp down a few mouthfuls gratefully. And now maybe for a change of loose fitting clothes? You fumble around in the depths of the wallet, but are disappointed that none of the objects you remove are the longed for clothing. You're getting very hot, very quickly out here under the beating sun. You wish you knew some kind of cooling or temperature regulation spell that might help, but none come to mind. Surely there'd have to be one though.  \n\n\"Probably should have asked Merlinus before I left.\" you mutter to yourself, \"Although if it's in the indecipherabled pages of my book, I doubt he'd teach it to me anyway.\" you try to console yourself bitterly.\n\n*page_break\n\n\"Well the sooner I catch that serpent, the sooner I can get back to somewhere with air conditioning.\" you think to yourself. But how? \n\nThe oasis looks cool and inviting with its shady trees and pool of water, however it would be a mistake to simply walk up there and take a seat. You've already seen how well camouflaged the snakes are, even when contained in a relatively small space. Out here it's likely to strike you dead before you know what hit you. No, you need a plan.\n\nYour first thought is a simple illusion, an invisibility spell to allow you to walk up to the trees and take a good look around. Checking out if the snake is away hunting, or at home on its nest, then organising a plan from there. The down side of this, is that you've discovered that some magically inclined animals are capable of seeing magic at work or even have the ability to see straight though illusions. You're uncertain if jaculus are capable of doing this, but if they can, your spell may do the equivalent of walking up to the creature wearing a neon sign reading \"I'm right over here. Come eat me!\" Good plan if it works, but certainly involving some potential risk. \n\nA second thought is to stay out here in the desert and try to lure the snake into the open where it is more visible, potentially setting a trap for it. The flip side of this one is that the jaculus may not even be at the oasis right now. Even if it is in residence, it may not choose to leave the safety of the trees. Meanwhile, you'll be left cooking out in the sun.\n\n*choice\n\t#Search for the snake at the oasis.\n\t\tYou decide that the snake will be the least of your worries if you end up with heat stroke and decide to risk an invisibility spell for reconnaissance.\n\t\t\n\t\tEven with the invisibility spell, you decide you'd still feel safer with a back up plan and spend fifteen long sweaty minutes combing the book of spells, deciding on a net like capture device. \n\t\t\n\t\tFrom the piles of objects you have already pulled out of the wallet earlier, you quickly find the appropriate materials for the spell. Linking a series of opals together with a simple piece of string in a circle, you draw the criss-cross outline of a net in the sand through the middle. Sealing the whole contraption with a surge of power, you're pleased to see a shimmering net of energy laid out on the sand, weighted by the small stones around it's perimeter. You should be able to use this to restrain the snake...if you can get close enough to throw it. Using a form of telekinesis to levitate the item could also be an option, however you're uncertain your accuracy and speed in this area would be up to the task. \n\t\t\n\t\tFolding the glowing net, you sketch out an invisibility spell with a circle drawn in the sand and feel ready to go. Packing the remaining items back into the wallet, you consider a small packet of frankincense that was mixed in with the bag of spell components. Remembering the passage in the book about jaculus being attracted to certain scents, you pocket the frankincense as being potentially useful.\n\n\t\t*page_break\n\t\t\n\t\tConfidently you approach the trees, amazed that the spell even seems to mask your footsteps in the sand. Finally under the protection of the leafy trees, you revel in the cooling shade they cast. Looking to the treetops, you search the branches for your target. \n\n\t\tWith a whiz something shoots past your head close enough to feel feathers brush up against your ear. A seven foot long snake finishes its dive, climbing back into the air on stubby wings to hover in the air above you. It fixes you with a beady black eye, letting out a hawk like hunting cry. \n\t\t\n\t\t\"Well that solves that mystery.\" you think decidedly displeased. \"These snakes can obviously see straight though my illusions.\"\n\t\t\n\t\tYou don't have time to consider this any further, as the snake plunges towards you in another dive. In what is a near miss, you throw yourself to the side only just avoiding mpalement. The snake's wings beat in a blur as it hovers, sizing you up for its next strike. \n\t\t\n\t\t*page_break\n\t\t\n\t\tDropping the useless illusion you consider your options. You can either try to throw the magical net over the swooping reptile, hopefully entrapping it; or try to work out a way to use the snake's reported fixation with scents to your advantage. \n\n\t\t*choice\n\t\t\t#Throw the net.\n\t\t\t\tHovering above you, the snake presents a perfect target to entangle in your net, provided you're fast enough to get it over its head. Before you can line it up, the snake dives again sending you dropping to the sandy ground. This thing is really getting on your nerves. \n\t\t\t\t\n\t\t\t\tShaking the glistening net out you start to swing it in an arc above your head, observing the jaculus closely as it hovers and darts around you, seemingly more wary now but unwilling to give up the attack. Several times, the creature disappears only to plunge downwards from one of the overhanging trees without warning. Each time you've managed to duck out of the way or get your net up to thwart the snake's attack, but you're breathing hard from the exertion in the oven like temperatures and it's only a matter of time before you make a misstep and the javelin snake lives up to its name. \n\t\t\t\t\n\t\t\t\tThe creature has vanished again. Scanning the branches above, you think you can see a hint of gleaming scales in the tree tops, this could be your chance. You deliberately ignore the tree containing the jaculus, instead creeping towards a tree to the left, all the while watching the hiding spot from the corner of your eye. \n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tWith your attention apparently sufficiently diverted, you watch as the snake uncurls above. Wings tucked and body bunched like a spring, the snake lines you up, then launches. With reflexes in overdrive, you spin, flinging the net towards the oncoming creature, its momentum carrying it straight into the glistening threads. Falling to the ground it thrashes, enmeshing itself ever more securely in the net. It twists around to study you with a hateful eye but can do no more than hiss angrily at you while you carefully bind the ends of the rope together preventing escape. \n\t\t\t\t\n\t\t\t\tIn your pocket dimension wallet, you find Merlinus has been kind enough to include a large, burlap sack. Gingerly you pick up the edges of the net and place the reptile inside where it finally calms in the darkness. \n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tWith the snake now safely contained, you explore the periphery of the oasis. All seems quiet, so you take up a position under a palm tree, feet dangling in the cooling water while you wait for your back up to arrive. \n\t\t\t\t*goto capturenet\n\t\t\t\n\t\t\t#Use the frankincense.\n\t\t\t\tYou retrieve the packet of resin from your pocket, tearing the paper open and tipping the pale yellow nuggets into your hand. \n\t\t\t\t\n\t\t\t\t\"Hey over here!\" you wave one of the pieces in front of you the toss it to the ground. The snake moves lightening fast, diving to scoop up the precious substance and then winging back into the air before you have a chance to throw your net. It disappears from view and you breathe a sigh of relief, hopefully that will distract it for a time so you can formulate a plan B.\n\n\t\t\t\t[i]\"Thwack!\"[/i]\n\t\t\t\t\n\t\t\t\tSomething brushes past your shoulder hitting a tree before you with a smack. The jaculus strikes at you with attacks, seemingly more aggressive than before, the frankincense seems to have driven it into some kind of frenzy. Grabbing the net, you swing it at the animal but it has already moved. This thing's incredibly fast. Hurriedly untangling the net from the branches you feel a stabbing pain in your shoulder. \n\t\t\t\t\n\t\t\t\tThe impact sends you to your knees as you feel warm blood tricking down your back. Without thinking you pick up a stick, using it to hit the snake embedded in your back loose. The snake screeches in pain, flapping away from you, snout covered in bright red blood. [i]You have to get out of here. [/i]\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tStaggering away from the trees, you wave the branch wildly, trying to forestall any further attacks. Each step sends pain stabbing though your, body making you feel faint and dizzy. Legs wobbling, you make it back to your base camp out on the sands. With shaking hands, an attempt to open a portal away from this place fails as you collapse. \n\t\t\t\t\n\t\t\t\t\"Help...\" you whisper breathlessly. The darkness claims you. \n\t\t\t\t\n\t\t\t\t*goto failnet\n\n\n\t\t\t\n\t\n\t\n\t#Try to lure the snake out into the desert.\n\t\tWalking into a jaculus nest just has too many risks associated with it to your mind. Let it come to you. \n\t\t\n\t\tFirst you need bait. The thought of using yourself as live bait makes you feel slightly queasy, besides which you need to set up some kind of shelter soon if you want to last the day anyway. Staying out in the sun for the remainder of the day will likely kill you, if the snake doesn't beat the weather to it first. \n\t\t\n\t\tSorting though a bag of food stuffs also kindly packed into your wallet, you find a string of sausages. Jaculus are carnivorous, you hope this is close enough. Tracing a circle in the sand with your shoe, you set up a containing ward around the pieces of meat, set to trigger as soon as anything crosses the line. \n\t\t\n\t\tAs for your shelter, you discard the dark green, plastic tent as being as much help to you as a greenhouse. A thick blanket shows a little more promise, and you manage to prop it up so it lies about two feet above the ground. Enough for you to crawl under and stay shaded with the open sides allowing a slight intermittent breeze to reach you, small relief as it it. \n\t\t\n\t\t*page_break\n\t\tAnd so one of the most unpleasant days of your life begins. Even with the shade afforded by the blanket, the air is still blazingly hot, leaving your throat parched and your clothes clammy with sweat. The scratchy sand seems determined to make its way into your eyes and clothes while insects buzz insistently around your face.\n \n\t\tYou have a single false alarm when the smell of your sausages baking on the sand attracts an argumentative group of blue and red faced vultures, however after releasing them, nothing else arrives to try for the meat in your reset trap. \n \n\t\tAs the sun dips towards the horizon, you bless the cooling temperature. Once the sun sets however, the air temperature becomes positively chilly and you take the blanket off its moorings to wrap tightly around you. \n\t\t\n\t\tYou try to stay on alert, however find yourself dozing intermittently despite your best intentions. At one such episode, you're awakened to the rustling of something going through your bags. \n\t\t*page_break\n\t\t\n\t\tKeeping stock still you strain your eyes to see what is out there. Although dark, there is enough moonlight to show the coiled form of a large snake, trying to rip open a hole in the side of your battered backpack. \n\t\t\n\t\tWith the sound of ripping cloth, the snake dives it's head into the bag, emerging triumphant with a plain white paper package. Of course! There was some frankincense in with your magic supplies. You kick yourself for not baiting the trap with the the scented material instead. \n\t\t\n\t\tThe snake slithers off showing no interest in the food offerings, seemingly content with the prize in its jaws. You crouch silently. What to do? The snake's making off with your only supply of frankincense and there's no guarantee you'll be able to find it again later. Maybe you should quietly tail the creature back to the oasis and discover where it nests? Of course if it decides to attack you in the darkness you'll be at a distinct disadvantage.\n\n\t\t*Choice\n\t\t\t#Follow the snake back to the oasis.\n\t\t\t\tYou decide there's nothing for it, you need to track down the hiding spot of the jaculus so you have some chance of capturing it before your deadline. You really need to complete this assignment. It's worth the risk. \n\t\t\t\t\n\t\t\t\tCarefully you bring your hands and knees under you, planning to crawl out from under the blanket once the creature is a safer distance away. By the light of the moon, you see the snake pause. Dropping the paper package it swings its head back and forth, double forked tongue testing the air. Gleaming scales reflect the starlight as it turns and heads back towards the camp site, pausing from time to time to reorient on your position. \n\t\t\t\t\n\t\t\t\tYou freeze, awkward in your hunched position, barely breathing. The snake currently seems uncertain as to your presence, but you have little doubt it will attack once it gets a bit closer. Your mind races trying to think of the best way to deal with a large predatory reptile if it becomes hell bent on killing you. The only weapon you have to hand, is the blanket. Not much to speak of, still you may be able to tangle it in the cloth, rendering it harmless for long enough to either get a Plan B in action- a spell if you can think of one on the fly, or just flee the area and hope for the best. \n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tLeaving curved grooves in the sand, the snake closes in. Its direction has altered slightly. Could you really be so lucky? With flickering tongues testing the air, the jaculus moves forward into the edge of your trap. [i]Got ya![/i]\n\t\t\t\t\n\t\t\t\tShimmering light appears in a dome over the unfortunate reptile which responds by striking repeatedly but unsuccessfully at the walls of its prison. Stubby wings flapping, it hisses and screeches madly at you, furious at your containment. Feathers shake loose, leaving a downy layer on the ground while large dark eyes stare balefully at you. If it escapes, you're in real trouble. \n\t\t\t\t\n\t\t\t\tThe snake curls cobra like into the centre of the circle, upper body swaying from side to side, wings tightly furled along a sinuous back. Changing tactics, the reptile arches back and spits, a shower of venom flying from its fangs which causes the barrier to crackle. Without missing a beat, the jaculus rears back again for another strike, creating a further shower of tiny light flares where the liquid hits your magic. To your concern you notice the overall brightness of the containing field dimming slightly, with small holes forming momentarily where the venom impacts, before the energy flows over to fill them in. \n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#Try to bolster the ward with your own energy. \n\t\t\t\t\t\tThere's no time to sit down and have a long think about how to keep the reptile contained, if it gets out you're in real trouble. The first thing that comes to mind, is to pour more energy into the warding spell to keep it there until back up arrives or it gives up and settles down. \n\t\t\t\t\t\t\n\t\t\t\t\t\tThe spell isn't designed to be open ended, since it should have remained self contained for a few hours after being triggered, however you manage to unpick a small weave of energy on the periphery to siphon further energy into the spell to shore it up. The increase in energy brightens the barrier, however does not deter the jaculus. \n\t\t\t\t\t\t\n\t\t\t\t\t\tTo your alarm it continues to spit venom at your ward, the poison acting corrosively to eat away at the very fabric of your magical working. Strands of energy are disintegrated under the jaculus' attack, which no amount of additional energy will be able to repair. Within minutes, your barrier is flickering fitfully, due to fail at any moment. With no time to set up additional warding, you run for your backpack, grabbing the wallet in the desperate hope that there may be something you can use as a weapon inside. A small serrated knife slides into your hand and you pull it out in triumph. Holding the knife with both hands, you watch as the magical barrier dissolves with a last faint shimmer. Springing into the air with a victorious cry, the reptile flaps into the air. It hovers considering you for a moment, then thinking better of it, swoops away in a graceful arc, vanishing into the night. \n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tYou continue to hold your position, waiting for an attack, but the night remains silent, the only sound your harsh breathing. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"The book said nothing about Jaculus being able to dissolve spells.\" You mutter darkly to yourself as you set up a small fire. The snake already knows where you are, you might as well have some light and warmth. Besides which, fire has always had a reputation for keeping wild animals at bay. It's too risky to hunt the jaculus in the darkness, so you hunker down close to the fire to wait for the dawn. \n\t\t\t\t\t\t\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\n\t\t\t\t\t\tAfter the \"excitement\" of your failed capture you get no sleep, adrenaline keeping you awake and alert to anything that could approach from outside the ring of firelight. With the yellow light of dawn you inspect your camp site. As expected, your faithful blue backpack is going to need repairs, a large strip of fabric hangs loosely along its side, spilling the contents into the orange sand. You search for the packet of frankincense to no avail. The reptile must have carried it off when leaving, or stalked back later to collect it. Either way it's gone and apart from using yourself, you're out of bait.\n\t\t\t\t\t\t\n\t\t\t\t\t\tS shaped tracks mark the snake's progress around the camp, however since it took to the air when fleeing, there are no marks to follow. You assume it nests somewhere in the oasis up ahead, exactly where is still a mystery though. As much as you dislike the idea, you're going to have to search tree to tree.\n\t\t\t\t\t\t\n\t\t\t\t\t\tExhausted from lack of sleep and the rising sun already starting to build the heat, you need to get moving. With little enough energy left, you manage to enchant some herbs which should act to slow the reptile down...if you can get it close enough. Anything more is beyond you right now. You gather up the blanket which could be useful to subdue the jaculus and find a large burlap bag to hold it in should you manage to capture it. The more mundane the means of capture, the better it seems in this particular case. Feeling safer armed, you slip the knife through the belt on your waist.\n\t\t\t\t\t\t\n\t\t\t\t\t\tWith senses on high alert you stride towards the oasis, glad of the leafy shade, although all to aware that death could be lurking just above. Finding a fallen branch, you brake the leafy twigs away to leave a long thin poll like tool which you use to poke at the tree tops and undergrowth. After hours of searching, you find the bleached bones of everything from bats to hyenas scattered around on the ground, but no sign of the snake itself. Either it's not around, or staying very well hidden. Considering its rapid retreat last night, you suspect the former. \n\t\t\t\t\t\t\n\t\t\t\t\t\tDejectedly you concede defeat. Feeling vulnerable, you retreat back to your base camp. \n\t\t\t\t\t\t\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\n\t\t\t\t\t\tLater that day, Merlinus finds you red with sunburn, exhausted and a generally unhappy camper, as he steps gracefully down from a portal back to the air conditioned world. You sigh wistfully as the portal closes, shutting off the cool breeze of air along with it. \n\t\t\t\t\t\t\n\t\t\t\t\t\tYou don't bother to rise as he approaches. \"Not enjoying Saudi Arabia?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYour only answer to this rhetorical question is a slight downward twist of the lips. \n\t\t\t\t\t\t\n\t\t\t\t\t\tThe wizard takes your uncharacteristic sullenness in his stride. \"Well no Jaculus...Close though.\" \n\t\t\t\t\t\t\n\t\t\t\t\t\tHe scrapes at the periphery of the warded area where the sand has fused into small chunks of mottled glass. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"If it hasn't returned to attack you outright by now, it'll have gone to ground. No point hanging around here for any longer. Besides which I'm sure you're keen to get out of this heat. Come on, I'll help you gather up the gear and we'll talk more back in my office.\" He offers you a hand up as a peacemaking gesture. \n\t\t\t\t\t\t\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\n\t\t\t\t\t\tAlthough still feeling dejected over the failed capture attempt, your mood improves significantly with the canned, air-conditioned air of the Guild headquarters. Gratefully you sink into the wooden chair by the desk, wriggling a bit to get comfortable since the scratchy sand seems to have permeated every square of your clothing. It's small consolation that Merlinus normally pale features are looking a bit reddened as he takes a seat on the other side of the desk to talk to you. \n\n\t\t\t\t\t\t\"Ok I'm sure you know what I need to speak to you about. Unfortunately a failure to capture the rouge jaculus, no matter how close you may have been, counts as a failing mark on your academic record. I'm guessing you know what that means for you?\" he asks solemnly.\n\t\t\t\t\t\t*set good_standing -5\n\t\t\t\t\t\t*goto missedward\n\t\t\t\t\t\t\n\t\t\t\t\t#Try to think of some other way to keep the snake contained. \n\t\t\t\t\t\t[i]\"I didn't know they could do that.\"[/i] You think in alarm as the jaculus continues its assault on the magical barrier, dissolving it piece by piece. With every attack, the overall brightness of the warding dims and the energy field takes longer to fill in the holes made by the corrosive liquid. You won't have much time before it breaks free. \n\t\t\t\t\t\t\n\t\t\t\t\t\tWhat to do? You rack your brain trying to come up with a solution. You might be able to build a second ward although at the rate the first one seems to be going down, it'll be a close call. How much venom does one of these creatures have? Enough to eat through one ward? two? twenty? It's a risky strategy with each construct running your manna reserves lower and lower. \n\t\t\t\t\t\t\n\t\t\t\t\t\tAnother idea pops into your head. Will it work? You're uncertain but decide it's worth a try. Half running, half floundering in the soft sand you sprint along the snake's tracks, following them to the dropped parcel. To save on energy, your ward has been specifically programmed to keep things within it contained. There's nothing there about keeping objects from outside the ward from entering. \n\t\t\t\t\t\t\n\t\t\t\t\t\tThe reptile has continued the assault on its prison in your absence leaving the barrier alarmingly faint. You really hope this works. Tossing the frankincense at the creature, it sails though the shimmering barrier to be snapped up by the snake. Coiling around the bundle protectively it stops its frantic escape efforts, instead seeming to be distracted by the need to protect its new treasure. Settling, it rests cobra like, head arching menacingly at your approach, quietening when you back away. This might just work!\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\n\t\t\t\t\t\tCome daybreak, the reptile is still thankfully contained within the glowing barriers of its enclosure. You've shored it up as much as possible with some additional energy, however the entire structure is inherently weak. Interestingly, the snake's venom appears to have disintegrated entire sections of the weave making up the underlying structure of the ward. You're glad of its apparent contentment to stand guard over the incense, there's no way the ward would last long if it decided to launch another play for freedom. \n\t\t\t\t\t\t\n\t\t\t\t\t\tHow you're going to remove it safely from the enclosure is another story altogether, one you sincerely hope will not be your problem. \n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe dawn also brings Merlinus, his impractical long, heavy robes trailing in the sand. \"Excellent, you've contained the Jaculus.\"\n\n\t\t\t\t\t\tHe walks towards the entrapped creature which rears up with a shriek at his approach. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Watch out!\" you call out. \"The ward...\" \n\t\t\t\t\t\t\n\t\t\t\t\t\tThe warning is cut short as the wizard opens his hand relieving a faceted rose coloured crystal, which he casually tosses into the circle with the creature. The jaculus stops its threatening display in mid hiss. Eyelids drooping, it quietly curls up in a ruffle of feathers, apparently fast asleep.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tYou stare in disbelief. Relief wars with anger, as you consider whether to be relieved that the job of transporting the jaculus has just been made a whole lot easier or to be annoyed that you've been kept awake, stressing that the jaculus could escape at any moment, when one of those little crystals would have solved all your problems. \n\t\t\t\t\t\t\n\t\t\t\t\t\tIf Merlinus notices your twitching he gives no sign of it, walking to the edge of the barrier to study the sleeping form. \"Yep that's definitely the right one. The markings match the description perfectly.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*if (fail \u003c 3) #\"Well done Wizard $!{name} $!{lastname}\"\n\t\t\t\t\t\t\t\tYou pause your internal debate for a second. \"Wait a minute. Did you just say [i][b]Wizard[/i][/b] $!{name} $!{lastname}?\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Of course!\" Merlinus beams. \"You've done a good job with this assignment. I'm happy to recommend you receive a full level C licence as soon as we finish getting the jaculus settled back at headquarters.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tAnnoyance over the unpleasantness of the last 24 hours (almost) forgiven, you give into excitement. \"Ok, well what are we waiting for, lets go!\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*set occupation \"Wizard: Level C\"\n\t\t\t\t\t\t\t\t*achieve passb\n\t\t\t\t\t\t\t\t*set good_standing +10\n\t\t\t\t\t\t\t\t*goto ending\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*if (fail = 3) #\"Nicely Done $!{name}, I think you're going to have a bright future with us.\"\n\t\t\t\t\t\t\t\t\"Really, so I passed, I'm allowed to stay?\" You can't keep the hope from your voice. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Definitely. After the skill you've displayed on this assignment, I'd be happy for you to continue under my supervision until you can get a full licence.\" Merlinus smiles brightly at you as if the thought of being a dogsbody for another couple of months is the best thing that had ever happened to you. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tStill a bit short tempered from your unpleasant night in the desert, you wisely bite back on a sarcastic retort. Well at least you get to stay and keep your magic. And they're always be another chance to get your licence, if you can meet the standards to pass the tricky final exam, making up a few mid-semester assignments can only be child's play after this. The thought is making you feel brighter already. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tThen Merlinus says something that makes your day complete. \"I know it's been a hard couple of months adjusting for you, so I've decided you need a holiday. I'm taking you off the active duty roster for a month, no one will bother you, although you can contact me if you need anything. Just rest up, read up and I'll expect great things from you on your return.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"A holiday to catch up sounds wonderful. You think you'll start your R&R period by having a nice long sleep in.\" As if reading your mind, Merlinus gives you a knowing smile, sending you home with a flick of his fingers. \n\t\t\t\t\t\t\t\t*achieve apprentice\n\t\t\t\t\t\t\t\t*set good_standing +10\n\t\t\t\t\t\t\t\t*goto ending\n\n\t\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\n\t\t\t\n\t\t\t#Continue to hide and search once it's light.\n\t\t\t\tYou decide the best course of action is to sit tight and resume the hunt in the morning. Racing off into the darkness after a deadly reptile sounds like a recipe for disaster. You're going to make sure you have a plan in place before you leave. \n\t\t\t\n\t\t\t\tYou hear the soft scraping sound as the snake channels though the soft sand, retreating into the distance...and suddenly all goes silent. Uh Oh. The creature is no longer visible having moved to far into the darkness. Has it just paused for a moment? Maybe it has taken flight? \n\n\t\t\t\tContinuing to hold your frozen position, you strain your ears listening for any sound that may indicate that the snake has not left the area. \n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tOne minute passes....five....ten....[i]nothing.[/i] \n\t\t\t\t\n\t\t\t\tYou sigh with relief. It really has gone. \n\t\t\t\t\n\t\t\t\tCrawling out from under the sheltering blanket you stretch the kinks out of your cramped muscles. \n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t[i]Whoosh...[/i]\n\t\t\t\t\n\t\t\t\tFeathers brush past your ear. Crap, the rotten thing must have been playing for time waiting for the right moment to strike.\n\n\t\t\t\t\"Ouch!\" you yelp as something sharp grazes the back of your arm. Spinning wildly you try to pinpoint the source of the attacks. How can you fight something you can't see?!\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t[i]Leukos![/i] a deep voice commands from the darkness accompanied by a brief, blinding flash of white light. You hear a high pitched shrilling rapidly retreating into the distance.\n\t\t\t\t\n\t\t\t\t\"It's ok, let me help you up. Your eyes will readjust momentarily.\" Although blinded by the flash you recognise the voice as belonging to Merlinus. Blinking you can dimly make out the shape of his hand, grasping it he lifts you to your feet. \n\t\t\t\t\n\t\t\t\t\"Thank you\" you murmur shaken. That had been close. Too close. \n\t\t\t\t\n\t\t\t\tMerlinus makes a non-committal sound. \"Well, it's been frightened enough that it'll go to ground for now. No point in hanging around, it'll have to be caught another day. Come on, help me pack up and we'll head on back to headquarters.\"\n\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tFiling back into the wizard's office you quietly take a seat, your eyes downcast. Having to be rescued doesn't seem to bode well for a passing grade. \n\t\t\t\t\n\t\t\t\tSighing Merlinus leans back into his chair. \"So...that could have gone better. What do you think went wrong?\"\n\t\t\t\t\n\t\t\t\tThat kind of seems obvious but you oblige him. \"The jaculus attacked me, I thought it had left but it was sneakier than I thought and had doubled back. I couldn't see it to stop it.\"\n\t\t\t\t\n\t\t\t\tMerlinus nods. \"True, however the real reason was that you panicked. You let the situation overwhelm you and your mind went blank. You could have cast any number of spells including the one I used to drive the creature off...but you didn't.\"\n\t\t\t\t\n\t\t\t\t*set good_standing -5\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\n\t\t\t\t\t*if (finalexamfail = 0) #\"I know I could have handled this better. I'll definitely try to improve if you'll just give me another chance?\"\n\t\t\t\t\t\tAlthough still quite rattled by the recent encounter, you're determined to prove you can handle this. A thought comes to mind. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Do you still have that Tsuchigumo that needs capturing? Would you let me do that?\" You cross your fingers hoping that Merlinus might give you a second chance to prove you can do this. \n\t\t\n\t\t\t\t\t\tHe gives you a surprised look that you'd want to head out again so soon after your near brush with death. \"Well, there's no rules that say you can't have another try, especially considering the difficulty of the original task you were set. To be honest I could use the help in tracking down the spider....as long as you feel up to it of course?\"\n\t\t\n\t\t\t\t\t\tNodding vigorously you assure him you feel ready for anything.\n\t\t\n\t\t\t\t\t\t\"Ok\" Merlinus allows dubiously. \"You can have one more chance at this. Be more careful this time, remember tsuchigumo are no less dangerous than javelin snakes...in fact I'd rate them as the more dangerous of the two. They're quite intelligent, although their method of thought is about as alien as is possible, while still evolving on Earth.\" The thought sends a cold shiver down your spine but you force yourself to keep the uncertainty about your next mission from your face. \n\t\t\n\t\t\t\t\t\t\"I'm sending you to Mt. Mocchomu, located on the island of Kyushu, Japan.\" Merlinus continues. \"The area can be fairly rugged with forests and mountainous terrain, however we think we've got the Tsuchigumo's lair narrowed down to a fairly small tract of land for you and will set you down nearby. There's been some disturbing reports for this area with a number of hikers going missing or coming back with some wild tales. In fact the one back at headquarters came from the same area. It's odd, they've been largely quiet for over a century, I don't know what has them so stirred up at the moment.\"\n\t\t\t\t\t\t*page_break\n\t\t\n\t\t\t\t\t\tHe pauses \"I almost forgot to ask, would you like to review the information on Tsuchigumo before you leave?\"\n\t\t\n\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t#Read the entry on Tsuchigumo\n\t\t\t\t\t\t\t\tFlicking though the yellowed pages of your book, you find a short description detailing the Tsuchigumo.\n\t\t\n\t\t\t\t\t\t\t\t[i][b]Tsuchigumo[/b][/i]\n\t\t\n\t\t\t\t\t\t\t\t[i]Tsuchigumo are a species of supernatural spider-like creatures, native to the islands of Japan.[/i]\n\t\t\n\t\t\t\t\t\t\t\t[i]Although usually appearing as a giant, hairy, darkly coloured spider, tsuchigumo are capable of spinning spells of illusion to trick their prey into entering their webs or to shift their form, so caution is advised.[/i]\n\t\t\n\t\t\t\t\t\t\t\t[i]Tsuchigumo are not overly fussy about their prey type, preferring mammals of decent size which they paralyse first with a potent toxin from their fangs, before draining the victims of blood.[/i]\n\t\t\n\t\t\t\t\t\t\t\t[i]The favoured lair type for these spiders are caves or underground tunnels where they can build their webs undisturbed.[/i]\n\t\t\n\t\t\t\t\t\t\t\t[i]Classified as sentient, some Tsuchigumo are capable of human speech, although they will not always deign to speak it.[/i]\n\t\t\n\t\t\t\t\t\t\t\t[i]Tsuchigumo are capable of reaching advanced ages, the extent of which is unknown but suspected to be measured in thousands of years. Make no mistake, despite their intelligence, tsuchigumo are not human and their way of thinking can seem quite alien. Mammals in general are seen as potential prey so although they can be reasoned with, caution should always be maintained. Ideally an official agreement should always be made when dealing with these spiders as they do appear to honour their given word.[/i]\n\t\t\t\n\t\t\t\t\t\t\t#Assure Merlinus you're fine to go right away. \n\n\t\t\t\t\t\tWishing you luck, he sketches a symbol in the air opening a onto a rocky path, old growth trees towering to each side. A cool breeze ruffles your hair as you step through.\n\t\t\t\t\t\t*set finalexamfail 1\n\t\t\t\t\t\t*goto_scene tsuchigumo\n\t\t\t\n\t\t\t\n\t\t\t\t\t*if (fail = 3) #\"I'm sorry, you need a certain type of personality to stay alive in this profession. I think the best thing I can do at this point is to fail you and let you out of the contract you signed.\"\n\t\t\t\t\t\t\"Seriously? You're kicking me out?\" You protest. \"But I'm just a beginner at this, if you could just give me more time...\"\n\t\t\n\t\t\t\t\t\tMerlinus interjects \"No, I'm afraid not, you needed to pass this assignment in order to stay with the Guild due to your already low marks leading up to date. I really don't think this is the correct path for you $!{name}.\" He says it as gently as he can but it still feels like a kick to your stomach. \n\n\t\t\t\t\t\tIn response to your silence, he gives you what you suppose is meant to be an encouraging smile. \n\t\t\t\t\t\n\t\t\t\t\t\t\"Cheer up. Looks like this path was not meant to be, however when one door closes, another opens, as my mother used to say. Other opportunities are bound to show up, something you're more suited to.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tHis sentiments are meant kindly but they sound hollow to your ears. Silently you allow him to escort you to the door of the office and step through the portal back into your room. \n\t\t\t\t\t\t*achieve kickedout\n\t\t\t\t\t\t*goto_scene magician\n\t\t\n\t\t\t\t\t*if (fail \u003c 3) #\"It makes me wonder if you have the right personality for this career.\"\n\t\t\t\t\t\tYou freeze. \"You're going to kick me out?\"\n\t\t\t\t\t\n\t\t\t\t\t\t\"No you have shown talent in the past. It was probably just a case of too much too soon. Tell you what, I think you could use some private tutoring sessions, just you and me and we can go from there. How does that sound?with the right kind of ground work, with time and study there's nothing you won't be able to do. What do you say?\"\n\t\t\n\t\t\t\t\t\tOne of your complaints so far has been the distinct lack of help with your studies the Guild has been providing. There's been a distinct sink or swim attitude in effect. Private tutoring from a wizard. While you suspect you might live to regret it, right now you're definitely in. \n\t\t\n\t\t\t\t\t\t\"Great.\" The old wizard's smile returns at your acceptance. \"For now though, I need you to rest up and get your head back in the right place after what you've been though tonight. I believe you know the way home?\"\n\t\t\n\t\t\t\t\t\t\"Straight out the door and on 'till morning?\" You quip. \n\t\t\t\t\t\t\n\t\t\t\t\t\tMerlinus rolls his eyes. \"Off with you now.\"\n\t\t\n\t\t\t\t\t\tAlthough you didn't get your licence today, things could definitely be looking up. Maybe this could be the best thing that ever happened now that you're going to get some actual guidance and Merlinus doesn't seem like a bad sort to work with. \n\t\t\n\t\t\t\t\t\tWith a skip to your step, you walk through the portal. \n\t\t\n\t\t\t\t\t\t*achieve apprentice\n\t\t\t\t\t\t*goto ending\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\n*label capturenet\nMerlinus finds you later that day, looking quite comfortable munching on a fallen coconut. \n\n\"Too easy was it? Next time I'll have to remember to set you something significantly more deadly.\" When you protest, he waves you silent. \"I was joking. Why do students never get my jokes?\" \n\nYou consider informing him that it's because he isn't in the least bit funny, but thinking better of it, you snap your mouth shut before it can get you into trouble. \n\nHe considers the jaculus resting quietly within the bag. \n\n*choice\n\t*if (fail \u003c 3) #\"Well done Wizard $!{name} $!{lastname}\"\n\t\tDid he just say what you think he did? \"[i][b]Wizard[/i][/b] $!{name} $!{lastname}?\"\n\t\t\t\t\t\t\t\t\n\t\t\"Of course!\" Merlinus beams. \"You've done an excellent job with this assignment. I'm happy to recommend you receive a full level C licence as soon as we finish getting the jaculus settled back at headquarters.\"\n\t\t\t\t\t\t\t\t\n\t\tLetting out a whoop of excitement, you jump up abandoning the coconut by the shore. \"Ok, well what are we waiting for, lets go!\"\n\t\t\n\t\t\"Wizard $!{name} $!{lastname}.\" Yep, you could definitely get used to that title. Helping Merlinus lift the heavy sack containing the sleepy reptile, you head back to the Guild headquarters.\n\t\t*achieve passb\n\t\t*set good_standing +10\n\t\t*set occupation \"Wizard: Level C\"\n\t\t*goto ending\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t*if (fail = 3) #\"Nicely Done $!{name}, I think you're going to have a bright future with us.\"\n\t\t\"Really, so I passed, I'm allowed to stay?\" You can't keep the hope from your voice. \n\t\t\t\t\t\t\t\t\n\t\t\"Definitely. After the skill you've displayed on this assignment, I'd be happy for you to continue under my supervision until you can get a full licence.\" Merlinus smiles brightly at you as if the thought of being a dogsbody for another couple of months is the best thing that had ever happened to you. \n\t\t\n\t\tWell it definitely could be worse, at least you get to keep your magic and there'll always be a next time to try your luck at getting a full licence. \n\t\t\n\t\tThe afternoon by the water must have put you in a more mellow mood, erasing the stress from earlier in the day. You offer the wizard a piece of coconut to celebrate. He looks like he's about to refuse, then shrugs taking the piece from your hand and sinking down in a puddle of dark robes beside you. \"Sometimes you forget to slow down and give yourself a break in this job. Thank you for reminding me.\"\n\t\t\n\t\tChatting under the palm trees, the wizard regales you with all manner of stories, that just a few months ago, you would have considered impossible. Looking up at the sun you realise hours have passed. \n\t\t\n\t\tNoting your look, Merlinus gets to his feet. \"Well we'd better head back and get this critter settled back at headquarters. Coming?\"\n\t\t\n\t\tDespite his sometimes gruff manner, Merlinus seems to be a genuinely nice person that you definitely think you could come to call a friend. Suddenly more time as an apprentice doesn't sound bad at all. \n\t\t\n\t\tHelping to heft the heavy sack containing the sleepy reptile, you follow Merlinus through the portal back to Guild headquarters. \n\t\t\t\t\n\t\t*set good_standing +10\t\t\t\t\n\t\t*achieve apprentice\n\t\t*goto ending\n\n\n \n*label failnet\n*page_break\nYou awaken to a cooling ointment being applied to your shoulder. Although the air has the dry bite of the desert, a piece of canvas hovers overhead, a shield against the full force of the sun. \n\n\"You're back with us.\" Merlinus kneels beside you, a jar of pale blue ointment in his hands. You try to sit up but he motions for you to lie back down. \n\n\"There's a healing spell at work, just sit tight or you may disrupt the effects. I'm glad you called me when you did, I managed to stop the bleeding from that nasty gash on your back before you lost too much blood.\"\n\n\"You really heard me?\" you quaver. To be quite honest, you hadn't expected anyone to come to your rescue. \n\nThe wizard nods. \"Of course, I was keeping tabs on you. That cry for help came through very clearly though even so. Quite a mental voice you have there.\"\n*page_break\n\nHe studies the glowing bands of energy stitched across your body critically. \"I think that should just about do it. How do you feel?\"\n\nYou sit up carefully, surprised to only have a mild numbness over your injured shoulder. Otherwise you seem surprisingly well. Seeing your expression he smiles, dismissing the ropes of energy with a flick of his fingers and hands you a glass of water which you gulp down thankfully. You decide the water must be the best thing you've ever tasted, although that could just be the dehydration talking. \n\n\"Now about the Jaculus, it's ok I've sent some others out after it but considering what happened I'm going to have to give you a failing grade on this one. Don't feel too bad, this one was certainly one of the more aggressive ones I've ever seen.\"\n*set good_standing -5\n\n*choice\n\t*if (finalexamfail = 0) #I know I could have handled this better, but as you said this creature was particularly aggressive and hard to handle. Can I at least have a second chance?\n\t\tAlthough still quite rattled by the recent encounter, the healing provided by Merlinus seems to have worked miracles, leaving you feeling alert and almost 100% back to normal. Even the numbness in your shoulder seems to be fading away as you talk.\n\t\t\n\t\t\"Do you still have that Tsuchigumo that needs capturing?\" You cross your fingers hoping that Merlinus might give you a second chance to prove you can do this. \n\t\t\n\t\tHe gives you a surprised look that you'd want to head out again so soon after your near brush with death. \"Well, there's no rules that say you can't have another try, especially considering the difficulty of the original task you were set. To be honest I could use the help in tracking down the spider....as long as you feel up to it of course?\"\n\t\t\n\t\tYou babble assurances that you feel ready for anything.\n\t\t\n\t\t\"Ok\" Merlinus allows dubiously. \"You can have one more chance at this. Be more careful this time, remember tsuchigumo are no less dangerous than javelin snakes...in fact I'd rate them as the more dangerous of the two. They're quite intelligent, although their method of thought is about as alien as is possible, while still evolving on Earth.\" The thought sends a cold shiver down your spine but you force yourself to keep the uncertainty about your next mission from your face. \n\t\t\n\t\t\"I'm sending you to Mt. Mocchomu, located on the island of Kyushu, Japan.\" Merlinus continues. \"The area can be fairly rugged with forests and mountainous terrain, however we think we've got the Tsuchigumo's lair narrowed down to a fairly small tract of land for you and will set you down nearby. There's been some disturbing reports for this area with a number of hikers going missing or coming back with some wild tales. In fact the one back at headquarters came from the same area. It's odd, they've been largely quiet for over a century, I don't know what has them so stirred up at the moment.\"\n\t\t*page_break\n\t\t\n\t\tHe pauses \"I almost forgot to ask, would you like to review the information on Tsuchigumo before you leave?\"\n\t\t\n\t\t*fake_choice\n\t\t\t#Read the entry on Tsuchigumo\n\t\t\t\t\t\tFlicking though the yellowed pages of your book, you find a short description detailing the Tsuchigumo.\n\t\t\n\t\t\t\t\t\t[i][b]Tsuchigumo[/b][/i]\n\t\t\n\t\t\t\t\t\t[i]Tsuchigumo are a species of supernatural spider-like creatures, native to the islands of Japan.[/i]\n\t\t\n\t\t\t\t\t\t[i]Although usually appearing as a giant, hairy, darkly coloured spider, tsuchigumo are capable of spinning spells of illusion to trick their prey into entering their webs or to shift their form, so caution is advised.[/i]\n\t\t\n\t\t\t\t\t\t[i]Tsuchigumo are not overly fussy about their prey type, preferring mammals of decent size which they paralyse first with a potent toxin from their fangs, before draining the victims of blood.[/i]\n\t\t\n\t\t\t\t\t\t[i]The favoured lair type for these spiders are caves or underground tunnels where they can build their webs undisturbed.[/i]\n\t\t\n\t\t\t\t\t\t[i]Classified as sentient, some Tsuchigumo are capable of human speech, although they will not always deign to speak it.[/i]\n\t\t\n\t\t\t\t\t\t[i]Tsuchigumo are capable of reaching advanced ages, the extent of which is unknown but suspected to be measured in thousands of years. Make no mistake, despite their intelligence, tsuchigumo are not human and their way of thinking can seem quite alien. Mammals in general are seen as potential prey so although they can be reasoned with, caution should always be maintained. Ideally an official agreement should always be made when dealing with these spiders as they do appear to honour their given word.[/i]\n\t\t\t\n\t\t\t#Assure Merlinus you're fine to go. \n\n\t\tWishing you luck, he sketches a symbol in the air opening a onto a rocky path, old growth trees towering to each side. A cool breeze ruffles your hair as you step through. \n\t\t*set finalexamfail 1\n\t\t*goto_scene tsuchigumo\n\t\t\n\t\t\n\n\t*if (fail = 3) #Failing Grade? What does that mean?\n\t\tI'm afraid you needed to pass the assignment that was set for you to continue to work for your licence due to your already low marks leading up to it. Since you have failed this test as well, I'm going to have to expel you, I'm not allowed to give you any more chances.\" He looks genuinely unhappy about the situation, not that this makes you feel any better.  \n\t\t\n\t\tIn response to your silence, he gives you what you suppose is meant to be an encouraging smile. \n\t\t\t\t\t\n\t\t\"Cheer up. Looks like this path was not meant to be, however when one door closes, another opens, as my mother used to say. Other opportunities are bound to show up, something you're more suited to.\"\n\t\t\t\t\t\t\n\t\tHis sentiments are meant kindly but they sound hollow to your ears. Silently you allow him to escort you to the door of the office and step through the portal back into your room. \n\t\t*achieve kickedout\n\t\t*goto_scene magician\n\t\t\n\n\t*if (fail \u003c 3) #You're going to fail me? Does that mean I'm being kicked out?\n\t\t\"Calm down, nothing that drastic.\" The wizard soothes. \"It just means I feel you need to work under supervision for a bit longer before you're allowed to have a full licence with the privileges that entitles you to.\"\n\t\t\t\n\t\t\"In fact, he continues, I've decided to take a personal interest in your studies. It's going to be tricky with all the commitments I've already got on my time, but I've decided that some personal tutoring is in order. It won't be easy, but with with the right kind of ground work, with time and study there's nothing you won't be able to do. What do you say?\"\n\t\t\n\t\tPrivate tutoring from a wizard. While you suspect you might live to regret this decision, right now you're definitely in. \n\t\t\n\t\t\"Great.\" The old wizard beams at your acceptance. \"For now though, I just need you to rest up after what you've been though today while I try to get the situation with the jaculus and tsuchigumo under control. Will you be all right if I send you home?\"\n\t\t\n\t\tAnywhere but this desert sounds good to you right now. You accept his offer happily. \n\t\tpage_break\n\t\t\n\t\tAlthough you didn't get your licence today, it sounds like great things are in store for you. Maybe this could be the best thing that ever happened now that you're going to get some actual guidance as to how to be a wizard. \n\t\t\n\t\tWith a skip to your step, you walk through the portal. \n\t\t\n\t\t*achieve apprentice\n\t\t*goto ending\t\t\n\t\t\n\t\t\n\t\t\n\t\t\n\t\t\n*label missedward\n*choice\n\t*if (finalexamfail = 0) #I almost had this! Is there no way I can have a second chance? I was so close to a success this time.\n\n\t\tThere was no way you could have known that jaculus venom eats through the fabric of spells based on the information you had at your fingertips. Although you get these \"tests\" are meant to prepare you for the real world, you still believe your plan was solid and worthy of a second chance.\n\n\t\tAn idea springs to mind. \"Do you still have that Tsuchigumo that needs capturing? I could go after that...\" You cross your fingers hoping that Merlinus might give you a second chance to prove you can do this. \n\t\t\n\t\tHe gives you a sideways look. \"Well, there's no rules that say you can't have another try, especially considering the difficulty of the original task you were set. You kept your head and escaped without injury. I'm willing to allow it, as long as you feel up to the task?\"\n\n\t\tYou nod enthusiastically while he looks you up and down consideringly. \"Ok\" Merlinus allows. \"You can have one more chance at this but I want you to get some rest first, you don't look like you got much sleep last night. Turn right and head to the end of the corridor, there's a lounge area you can use. When you feel rested, let me know and I'll organise for you to be sent out to the tsuchigumo's location.\" \n\n\t\t*page_break\n\t\t\n\t\tThe lounge area turns out to be behind an innocuous white door, opening up into a spacious gently lit space with various chairs and cushions positioned around the room in muted colours. \n\t\t\n\t\tPicking a comfortable looking couch in the corner of the room, you kick off your shoes, curling into the soft fabric. It's only now that you've stopped that you realise just how exhausted you area. Sleepily you wonder if you should check up on your book's entry for the creature you've volunteered to catch or just get some sleep. \n\t\t\n\t\t\n\t\t\n\t\t*choice\n\t\t\t#Review the entry on the Tsuchigumo\n\t\t\t\tYawning, you flick through the aged pages to find a short excerpt on the creature. [/i]\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t[i][b]Tsuchigumo[/b][/i]\n\t\t\t\n\t\t\t\t[i]Tsuchigumo are a species of supernatural spider-like creatures, native to the islands of Japan.[/i]\n\t\t\n\t\t\t\t[i]Although usually appearing as a giant, hairy, darkly coloured spider, tsuchigumo are capable of spinning spells of illusion to trick their prey into entering their webs or to shift their form, so caution is advised.[/i]\n\  not meant to be, however when one door closes, another opens, as my mother used to say. Other opportunities are bound to show up, something you're more suited to.\"\n\t\t\t\t\t\t\n\t\tHis sentiments are meant kindly but they sound hollow to your ears. Silently you allow him to escort you to the door of the office and step through the portal back into your room. \n\t\t*achieve kickedout\n\t\t*goto_scene magician\n\t\t\n\t*if (fail \u003c 3) #You're going to fail me? Does that mean I'm being kicked out?\n\t\t\"Calm down, nothing that drastic.\" The wizard soothes. \"It just means I feel you need to work under supervision for a bit longer before you're allowed to have a full licence with the privileges that entitles you to.\"\n\t\t\t\n\t\t\"In fact, he continues, I've decided to take a personal interest in your studies. It's going to be tricky all the other demands on my time, but I've decided that some personal tutoring is in order. It won't be easy, but with with the right kind of ground work, with time and study there's nothing you won't be able to do. What do you say?\"\n\t\t\n\t\tPrivate tutoring from a wizard. While you suspect you might live to regret this decision, right now you're definitely in. \n\t\t\n\t\t\"Great.\" The old wizard beams at your acceptance. \"For now though, I need you to rest up after what you've been though tonight. I believe you know the way home?\"\n\t\t\n\t\t\"Straight out the door and on 'till morning.\" You quip. \n\t\t\n\t\tAlthough you didn't get your licence today, it sounds like great things are in store for you. Maybe this could be the best thing that ever happened now that you're going to get some actual guidance as to how to be a wizard. \n\t\t\n\t\tWith a skip to your step, you walk through the portal. \n\t\t\n\t\t*achieve apprentice\n\t\t*goto ending\t\t\n\n*label ending\n*page_break End\nWe hope you've enjoyed playing [i]Wizardry Level C.[/i]\n\n*feedback\n\nChoice of Games releases new games on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "magician": "*comment follows fail/kicked out from testmarks\n\n*page_break\n\nYou take a seat on the hard wooden chair in the kitchen leaning forward onto the table, head in your hands, trying to process everything leading up till today from the time you found that ratty old magic book in the library. It makes your head hurt, how will you ever see the world in the same way, even now you no longer have access to magic?\n\n[i]\"Riiinnng! Riiinnng!\"[/i]\n\nThe press button phone on the kitchen counter shrills harshly, making your head throb all the more. [i]\"Arrggh why can't everyone leave you alone!\"[/i]\n\n[i]\"Riiinngr.r..r....r.....\"[/i] The phone trills sickly, tailing off with a sharp crack that makes you jump as the acrid smell of burning plastic fills the air. Jumping up, you gingerly inspect the phone which still smokes slightly from a blackened power point. [i]Power surge? Has to be...Unless...?\" [/i]\n\nYou reach for the pen on the end of the bench with your mind and will it to move. It twitches hesitantly before rolling unevenly towards your hand. You still have magic!\n\n*page_break\n\nYou sit down hard on the cold tiled floor. You were sure they would make sure you'd never use magic again when you were kicked out of the guild, but here you are, moving pens with your mind and shorting out electrical equipment. Crawling back to the table you rip the zip open on your dark blue backpack and rummage through it. With relief, your hand feels the cracked leather cover of the book. Hurriedly pulling it out, you flip it open. The level C section remains perfectly legible. \n\nYou can't believe your luck. Whether it's an oversight that the haven't taken your power away or whether they can't, you're not certain but you're certainly not going to look a gift horse in the mouth. You can use this!\n\nThe book you're less certain of, owing to the fact that it originally contained illegible symbols. Maybe with time it'll revert to it's original form or someone from the wizard's guild will come to claim it back. Collecting an exercise book from your desk, you grab a pen and start to copy the spells contained on the manual's pages. For hours you scrawl, determined to get it all written down until your eyes are unable to focus properly and you have to take a break. \n\n*page_break\n\nLooking up from your work you rub at your tired eyes and yawn. You've gotten the majority of what you need copied down, just a few more pages should do it then you'll take a proper rest. Blinking you return to the text filled page. [i]\" Why is it so blurry?\" [/i] You shake your head and blink a few more times trying to clear your vision. \n\nAs you watch, words slowly crawl across the page, blurring and reshaping into flowing symbols. \n\nYour instincts were right! The book is reverting to it's original, \"pre-licence\" form. You can't help but smile in triumph. Well they can't stop you, you've got your own grimoire now. \n\nJust to be safe, you hide the ordinary looking note book in amongst others in a draw and leave it for a time to hopefully lull anyone checking up on you into believing you've accepted your mundane fate. \n\n*page_break\n\nYou step out into the blinding spotlight to the thunderous applause of thousands of people awaiting your next performance. \n\n\"Ladies and Gentlemen, welcome to the show!\" With a wave of your hands brightly colour lights sparkle and zoom though the amphitheatre to the delight of the crowd. \n\n\"Do you believe in magic?\" You ask consiprationally, knowing full well few in the audience actually do, but over the next hour your draw them into a world where levitation is commonplace, objects appear and disappear into thin air and claps of thunder and light stun the audience with their strength and clairity.\n\n*page_break\n\nYou're a famous up and coming stage magician, even the biggest names in the business contemplate exactly how you manage your \"tricks\", but of course as you put it, \"A good magician, never tells ${his} secrets\", so you have your excuse to remain silent on the matter. \n\nSo are you using magic? Well yes, you'll admit to cheating a little (Ok well sometimes a lot) when it comes to stage magic, although you have become adept enough to manage many tricks without any help and are always careful to make your performances look like just that, an act. You don't want the Wizard's Guild getting any ideas and spoiling your success. So far at least they've remained silent on the matter. \n\nIt suits you this life. You have fame, money and no pedantic superiors to order you around or send you on suicide missions. Smiling you reach for your battered blue and yellow striped exercise book and begin to read, planning your next amazing magic show. \n\n*achieve famous\n\t\t\n*page_break\n\nThank you for Playing Wizardry Level C. \n\nThis adventure is over, however there are still many other choices that can be made. \n\nWould you like to play again?\n*choice\n\t*if (paramagician = 1) #Reload from the last checkpoint. (The magical creatures habitat area). Please note some paths may not be available due to saved stats for this point.\n\t\n\t\t\t\t*set good_standing +5\n\t\t\t\t*set occupation \"Wizard Level C: On Probation\"\n\t\t\t\t*set finalexamfail 0\n\t\t\t\t*set spiderknow 0\n\t\t\t\tThe world fades around you, then snaps back into sharp focus, leaving you with the odd sense of deja vu. \n\t\t\t\t\n\t\t\t\tWhat were you doing again? You look around, seeing Merlinus walking away through the rows of offices at the guild's headquarters. You hurry to catch up to him.\n\t\t\t\t*goto_scene paraanimals\n\t\n\t\n\t*if (paramagician = 0) #Reload from last checkpoint (Hear about the Loch Ness assignment from Merlinus). Please note some paths may not be available due to saved stats for this point.\t\t\t\n\t\n\t\tThe world fades around you, then snaps back into sharp focus, leaving you with the odd sense of deja vu. \n\t\t\t\
