t\n\t\tWhat were you doing again? You seem to have lost your train of thought. \n\t\t\n\t\tYou're standing in Merlinus' office, who is giving you an odd look. \"Are you ok?\" he asks with concern. \"You seemed to space out there for a minute\".\n\t\t\n\t\t\"No I'm fine,\" you assure him, \"I just had the strangest feeling of deja vu. Sorry what were you saying again?\"\n\t\t\n\t\t\"I was starting to tell you about the next assignment,\" Merlinus prompts.\n\t\t\n\t\t*set Good_Standing +10\n\t\t*set fourth_task 0\n\t\t*set fail -1\n\t\t*set grade4 \"\"\n\t\t*set occupation \"Wizard Level C: On Probation\"\n\t\t\n\t\t*goto_scene bunyiptodragon\n\t\t\n\n\t\n\t#Restart from the beginning.\n\t\t*goto_scene ending \n", "malename": "The name you write into the book is?\n*choice\n\t#Mark.\n\t\t*set name \"Mark\"\n\t\t*goto lastname\n\n\t#Gendry.\n\t\t*set name \"Gendry\"\n\t\t*goto lastname\n\t\n\n\t#Ethan.\n\t\t*set name \"Ethan\"\n\t\t*goto lastname\n\n\t#John.\n\t\t*set name \"John\"\n\t\t*goto lastname\n\n\n\t#None of these are right!\n\t\t*label input_name\n\t\tWhat name would you prefer?\n\t\t*input_text name\n\t\t*set name \"$!{name}\"\n\t\t*goto lastname\t\n\n*label lastname\nAnd your last name?\n\n\nThe surname you write into the book is:\n*choice\n\t#Drake.\n\t\t*set lastname \"Drake\"\n\t\t*goto finish\n\n\t#Song.\n\t\t*set lastname \"Song\"\n\t\t*goto finish\n\t\n\n\t#Emrys.\n\t\t*set lastname \"Emrys\"\n\t\t*goto finish\n\n\t#Smith.\n\t\t*set lastname \"Smith\"\n\t\t*goto finish\n\n\n\t#None of these are right!\n\t\t*label input_lastname\n\t\tWhat name would you prefer?\n\t\t*input_text lastname\n\t\t*set lastname \"$!{lastname}\"\n\t\t*goto finish\t\n*label finish\n*goto_scene oath\n", "newdragon": "*comment follows from dragon wizard after being turned into a dragon. \n*page_break\nIn a state of panic you wonder what you should do. \n\nYou dismiss leaving the clearing to look for the sorceress out of hand. Since you're not certain you can hide your new dragon form, alerting hundreds of tourists with cameras to the fact that there really is a dragon wandering around Loch Ness seems like a bad plan. \n\nYour parcel still sits by the cave entrance untouched. Ropes of energy attached to the seal continue to glow softly. Although you may get desperate enough to open it, you worry what the magic might do if the wrong person were to do so. Besides which, you reason, if it was anything of importance, wouldn't Myranda have taken it with her when she left? No you'll leave that one alone for now.\n\nAs you see it, you've really got two choices for now. Stay put and keep on the lookout for when someone [i]hopefully[/i] comes looking for you. Or explore Myranda's lair to see if there's anything that can help you in there. Although not overly hopeful, it's likely the sorceress left in quite a hurry and could have accidentally left something of importance behind. \n\n*choice\n\t#Stay in the clearing. \n\t\tRight now you decide your best chance at getting help is to stay put and watch for anyone who comes looking for you. You'd hate to miss them if they creep in and out without you realising while you're rummaging around in the cave. What are the chances Myranda would have left anything of value behind in the cave anyway?\n\t\t\n\t\tStill aching all over from your recent transformation, you stretch on the ground exhausted; fairly certain that the ward will protect you from random prying eyes. Although determined to stay awake, your eyelids start to feel heavy and you drift off to sleep. \n\t\t\n\t\t*goto sleep\n\t\t\n\t\t\n\t#Investigate the cave\n\t\tYou decide it's worth at least a quick look around the cave to check if there's anything of value there. \n\t\t\n\t\tAs you approach the cliff face where you suspect the illusion is covering the entrance, you wonder how you are to get inside. Deciding that the best solution is the simplest, you reach through the illusion hoping there's no protective wards that will do you harm attached to it. \n\t\t\n\t\tWhen nothing happens you breath a sigh of relief and bring the rest of your body though. \n\t\t\n\t\t*goto cave\n\t\t\n\t\n*label cave\n*page_break\t\t\nThe interior of the cave entrance opens up into a spacious cavern with a smooth sandy floor that's comfortable beneath your feet. It is mostly bare apart from a small pile of glinting treasure at the far end of the cave and a few chests which sit on a natural ledge off to your left. \n\nDo you investigate either of these further?\n*goto start\n\n*label start\n*choice\n\t*disable_reuse #Search the pile of treasure\n\t\tMyranda had evidently gathered a small pile of treasure for her collection. You notice coins that range from this years mint, all the way back a few hundred years. \n\t\t\n\t\tOther trinkets dot the pile. Rings, necklaces, bracelets and watches, anything shiny and of value seems to have been welcomed. \n\t\t\n\t\tAfter rummaging through the pile for a while, you accept that although you could use it to make yourself a rich person should you ever get out of this situation, it's unlikely to help you right now. \n\t\t*goto start\n\t\t\n\t*disable_reuse #Look inside the chests\n\t\tTwo metal bound wooden chests sit on a rocky ledge away from the damp floor. To your relief they are unlocked and although difficult with your long claws, you manage to undo the clasps and flick the lids open. \n\t\t\n\t\tThe first contains unusual clothing, obviously belonging to a woman, but several centuries out of fashion from the look of it. Folded neatly, the material is well preserved and expensive. Some of the garments have precious stones sewn into the material in glittering patterns. \n\t\t\n\t\tThe second chest proves more useful containing a few fragile looking books. The first two you discard as unreadable since you don't understand the language. The third is handwritten and in the same unusual text however some sketches have been included on the pages. If you had to guess, you suspect this was Myranda's diary or at least a personal notebook. \n\t\t\n\t\tCarefully turning the pages so as not to damage them with your clawed hands, what you see disturbs you. Some of the pictures seem to depict skeletons rising from the grave to follow a robed woman. Sketches of rune inscribed knives and bones abounded. Who was this woman? \n\t\t\n\t\tUnfortunately the unreadable text makes anything you may assume nothing more than a guess. Eventually you put the book away, more concerned but with little more insight than when you picked it up. \n\t\t*goto start\n\t\t\t\n\t#I've seen enough for now, head back outside into the clearing. \n\t\tYou decide you've learnt all you can for now in the cave, and head back outside into the clearing. Some time must have passed since entering the cave as the morning sun has already risen over the lake.\n\t\t\n\t\tTo your surprise Merlinus stands in the clearing waiting for you. \n\t\t\n\t\t\"Right Myranda, what have you done with ${name}? The wizardling was here to deliver a package to you last night, I can see it by the entrance to your cave. You wouldn't know anything about where ${he} is now would you?\"\n\t\t*page_break\n\t\tWith alarm, you realise that in your dragon form, Merlinus now thinks you're Myranda. You open your mouth to explain the situation before it can deteriorate any further. \n\t\t*goto wizardtalk\n\t\t\n*label sleep\n*page_break\nYou're awaken rudely to someone smacking a staff across your nose. \n\nJumping to your feet, you realise to your relief it's Merlinus. He did come looking for you!\n\n\"Right Myranda, what have you done with ${name}? The wizardling was here to deliver a package to you last night, I can see it by the entrance to your cave. You wouldn't know anything about where ${he} is now would you?\"\n*page_break\nWith alarm, you realise that in your dragon form, Merlinus now thinks you're Myranda. You open your mouth to explain the situation before you get any more cracks on the nose. \n*goto wizardtalk\n\n\n\n\n*label wizardtalk\n\n\"Merlinus it's me ${name}!\" Unfortunately what actually comes out is a rumbling growl. \n\nThe wizard gives the dragon a withering look. \"Don't try that with me Myranda. I'm not in the mood for your attitude today.\"\n\n[i]\"Uh Oh,\"[/i] you think to yourself. [i]\"No speech.\"[/i] Well Myranda seemed to use some kind of mind to mind communication, you'll try your hand at that. \n*page_break\n\nYou do your best to pull up a mental picture of yourself and push it, along with your name at Merlinus, willing him to hear it. \n\nNothing happens. He just stands there giving you an angry look. \"What's wrong with you dragon? Usually I can't stop you from talking. Nothing to say?\"\n\nOh dear. There must be more to talking like a dragon than you thought. It may take you some time to learn. Time you really don't have right now. \n\n\"Ok Myranda, be stubborn, but if something's happened to ${name} your permission to stay on Earth will be revoked.\" He spins storming out of the clearing. \n\nYou need to let him know what's happened. Maybe eye contact will allow you to reach his mind more easily. It's certainly worth a shot, if you can stop him. \n\n*choice\n\n\t#Stomp towards him making as much noise as possible. \n\t\tYou stomp towards him, flicking your tail back and forth, making sure to create as much noise as possible. \n\t\t\n\t\t\"This conversation is over Myranda, don't make me take more drastic measures.\" Merlinus turns to address you coldly. \n\t\t*goto_scene eyecontact\n\t\n\t#Go all out- breathe a little fire. \n\t\tDesperate times call for desperate measures, and you're sure that a little fire will get the wizard's attention long enough for you to try talking to him again. \n\t\t\n\t\tYou've never done this before but how hard could it be? You're a dragon now, that's what they do. \n\t\t\n\t\tYou take a deep breath and try for a small puff of fire. \n\t\t*page_break\n\t\t\n\t\tUnfortunately what you get is rather larger. A fireball rockets from your mouth, wizzing across the clearing to hit the some trees close to where Merlinus was headed. \n\t\t\n\t\t\"Have you gone [i]insane!\"[/i] he yelps at you. \"Attacking a senior wizard of the guild? I know you hate us, but even I thought you had more sense than that!\"\n\t\t\n\t\tYou feel ropes of unseen energy winding around your muzzle snapping it closed and tangling in your legs causing you to fall to the ground. \"You brought this on yourself.\" Merlinus says calmly as he advances toward you, staff outstretched.\n\t\t*page_break\n\t\t*set good_standing -10\n\t\t*goto_scene dragonland\n\t\n", "oath": "Your study or employment status? Well if they really want to know...\n\nYou tick the closest option which is:\n*fake_choice\n\t#You are a school student\n\t\t*set work \"school\"\n\t\t\n\t#You are a university student\n\t\t*set work \"university\"\n\t\t\n\t#You are employed/working\n\t\t*set work \"work\"\n\t\t\nYou finish filling in your details and sign at the bottom. Standing up, you put two fingers from your left hand over your heart and recite the oath. \n\n[i]\"I promise to uphold the values of the wizards codex.\"[/i]\n\n[i]\"I will use my abilities to further the greater good, seeking out knowledge and sharing it with all for the advancement of wizard kind.\"[/i]\n\n[i]\"I will not abide the wilfully evil, and will stand against such where I can.\"[/i]\n\n[i]\"I acknowledge being part of the wizard's guild is a privilege not a right, and sanctions may be taken if I do not uphold the good standing of magicians in the galaxy.\"[/i]\n\nYou use your right hand to sketch a circle in the air and then bring both hands together in a clap. \n\n*page_break\n\nHmm nothing. \n\nThat was anticlimactic. Even though you weren't expecting anything it was still a bit of a let down somehow. \nYou look down at the alarm clock on the bedside table. 12:30am glows in red. \n[i]Way too late,[/i] you think tiredly. Time to go to bed. Sliding the book back into your bag, you climb beneath the cozy blankets and turn out the lights. \n\n*finish\n", "paraanimals": "*comment follows testmarks after pass/2nd chance\n*page_break\nYou follow silently as Merlinus leads you though the rows of identical office blocks to a blank whitewashed wall. Touching a silver rune inlaid into the otherwise featureless surface, a set of doors appear and slide open smoothly to reveal a small room filled with metallic surfaces which you assume is some kind of lift. \n\nThe wizard makes a waving gesture with his hand, inviting you forward with a small smile. With the slightest of hesitations, you step forward onto the mirrored surface. Merlinus steps in behind you and the doors close once more. The room is brightly lit without any obvious light source, almost as if the light emanates from the metal itself and is amplified by the glass like surfaces covering the remainder of the room. Merlinus hums over a set of buttons that line one section of the wall. \n\n*page_break\n\n\"Ah, this is the one we need.\" Depressing the switch the double doors soundlessly reopen. You don't know why it should surprise you, but although there was no sensation of movement like you'd get in a normal lift, the doors now open into a very different room. \n\nLarge glowing enclosures line one side of the corridor, each with a self contained, realistic environment inside. You approach the first enclosure which contains a forested scene, sun shining though onto a grassy clearing with dappled light. There's movement amongst the scrubby area beside a large oak as a small, antlered, rabbit like creature hops into view. He perches on hind legs, nose twitching as he surveys the scene for danger. Apparently satisfied he relaxes, dipping his head to munch at a tuft of grass. \n\n\"Jackalope,\" Merlinus comments, jolting you out of your reverie. The sound doesn't seem to illicit any reaction from the small creature though, which continues to tear up pieces of vegetation contentedly. \n\n\"This is one of our holding areas for magical creatures.\" Merlinus elaborates. \"Sometimes when they wander into the wrong areas where they may be sighted by the general population, they need to be brought in until we can find an appropriate area for them to be resettled. Each room can be configured to match the animal's requirements in a way that they usually don't ever realise they've been in captivity for a time. It's a mixture of wards, terraforming and illusion. This way.\"  \n\n*page_break\n\nHe continues to lead you down the corridor passing habitats that would have made any sanctuary proud. You catch a glimpse of a finned horse like creature swimming through a sapphire hued ocean environment, while a tawny cat sized griffon stalks through an arid scene. Finally your guide halts at the junction between two enclosures. \n\n\"I thought you might want to see what you're going to be looking for.\" The cell to the left contains a thickly forested area with a disused dirt pathway winding through the trees. He points to a nest high in the branches where you can see a bundle of mottled brown and white feathers. You squint and realise that what you'd taken at first for a vine, is actually the outline of a large coiled snake. \n\n\"That's a Jaculus, can you make him out?\" You nod. \n\n\"Good, they can be hard to see.\" The wizard smiles approvingly. Turning to the enclosure on the right, you can make out the interior of a dimly lit cavern. Something skitters in the dark with the tapping sound of multiple legs on rocks. Cobwebs are strung around the walls, further obscuring your view. \n\n\"That one you will have trouble seeing unless he decides to wander in close.\" Merlinus observes. \"You'll have to take my word for it that there is a Tsuchigumo in residence.\"\n\n*page_break\n\n\"So back to the task. As you can see, part of the job of a wizard is to contain magical creatures that may become troublesome, including many that can be potentially very dangerous to humans. Right now I've got a request for two such creatures that need to be brought in, a Tsuchigumo and a Jaculus. To mimic a typical assignment, I need you to find and then securely contain one of these creatures safely for a few hours until they can be picked up and moved by guild staff. This is to simulate the....delays that sometimes occur around here. Make no mistake, both have the ability to cause you permanent harm if you don't handle them correctly. Which would you like to retrieve? I'm happy to wait while you consult your book for more information on these two species if you're unfamiliar with them.\" \n\nYou look from one enclosure to the other, which to choose? Perhaps you should read more about them first?\n*goto consult\n\n*label consult\n*Choice \n\t#Consult the book about Jaculus\n\t\tYou flick through the leather bound tome and find a short excerpt on the creature. \n\t\t\n\t\t[i][b]Jaculus (Otherwise known as the \"Javelin Snake\")[/b][/i]\n\t\t\n\t\t[i]The Jaculus is a smaller relative of the dragons in the serpent family, a subgroup which also contains the larger wyverns and coatls. Small to moderate in size, these serpents are capable of growing up to nine feet in length. Their scales are sedately patterned in shades which can include orange, browns, greens and white. The serpent possesses clawed hind legs and feathered wings, allowing flight over short distances and can reach considerable speeds.[/i] \n\t\t\n\t\t[i]Favouring forested areas, the Jaculus is an arboreal, ambush predator using the foliage for camouflage. Although possessing a mild venom, the serpent does not use this to hunt, instead launching attacks at potential prey using its \"V\" shaped, armoured head to kill its victim through sheer force of impact. [/i]\n\t\t\n\t\t[i]This method of hunting has earned the Jaculus it's common name the \"Javelin Snake.\" It is thought that these snakes are attracted to certain scents particularly spices, and one should be careful if in the vicinity of one of these trees or if carrying the scents on your person.[/i]\n\t\t\n\t\t[i]Most commonly found around the Arabian Peninsula, Jaculus are known to be potentially lethal to creatures up to and including human in size.[/i]\n\t\t*image jaculus.jpg center\n\t\t*goto consult\t\t\n\t\n\n\t#Read up about Tsuchigumo \n\t\tFlicking through the yellowed pages of your book, you find a short description detailing the Tsuchigumo.\n\t\t\n\t\t[i][b]Tsuchigumo[/b][/i]\n\t\t\n\t\t[i]Tsuchigumo are a species of supernatural spider-like creatures, native to the islands of Japan.[/i]\n\t\t\n\t\t[i]Although usually appearing as a giant, hairy, dark coloured spider; tsuchigumo are capable of spinning spells of illusion to trick their prey into entering their webs, or to shift the appearence of their form, so caution is advised.[/i]\n\t\t\n\t\t[i]Tsuchigumo are not overly fussy about their prey type, preferring mammals of decent size which they paralyse first with a potent toxin from their fangs, before draining the victims of blood.[/i]\n\t\t\n\t\t[i]The favoured lair type for these spiders are caves or underground tunnels where they can build their webs undisturbed.[/i]\n\t\t\n\t\t[i]Classified as sentient, some Tsuchigumo are capable of human speech, although they will not always deign to speak it.[/i]\n\t\t\n\t\t[i]Tsuchigumo are capable of reaching advanced ages, the extent of which is unknown but suspected to be measured in thousands of years. Make no mistake, despite their intelligence, tsuchigumo are not human and their way of thinking can seem quite alien. Mammals in general are seen as potential prey so although they can be reasoned with, caution should always be maintained. Ideally an official agreement should always be made when dealing with these spiders as they do appear to honour their given word.[/i]\n\t\t*goto consult\n\t\n\t#I've made up my mind and want to choose my assignment\n\t\tAfter careful consideration you have decided which creature you want to volunteer to capture.\n\t\t*choice\n\t\t\t#I choose the Jaculus\n\t\t\t\t*goto jaculuschoice\n\t\t\n\t\t\t#I choose the Tsuchigumo \n\t\t\t\t*goto tsuchigumochoice \n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\n*label jaculuschoice\nMerlinus nods, a serious expression on his face. \"Remember, you need to be careful on this assignment, there's a reason why it's been chosen for a final exam, Jaculus are potentially lethal, always remember that. I don't want to hear that you've let yourself.... or anyone else for that matter, be eaten while capturing the serpent. Contain it, but do not injure the creature unless your life depends on it, got it?\"\n\nYou nod again. \n\nMerlinus continues. \"Good, I'm sending you to Saudi Arabia, keep a low profile. It shouldn't be too hard, the area you will be arriving in is generally sparsely populated. Jaculus are generally fairly sedentary, this one however seems to be hunting further afield, possibly due to a lack of prey in it's home area. Unfortunately this has been bringing it dangerously close to settlements and it's only sooner or later before someone captures a picture of the animal and the whole area becomes over run with people trying to find a real life dragon.\"\t\t\n\n*page_break\n\n\"Anyway you're going to get a chance to do this one by yourself this time, no pre-made capture devices like the bunyip, no maps like with Nessie. Oh I almost forgot.\" He tosses you something resembling a small leather wallet. \n\n\"Some supplies in case you need to stay overnight for this. Just a couple of essentials: some food, a tent, sunscreen, rope, a shovel, a few basic spell components, that kind of thing.\"\n\nYou look doubtfully at the leather packet in you hands, deciding it'd be lucky to weight 100g. \"All in here?\"\t\n\n\"Yup, pocket dimension technology. Energetically very expensive to make, but dead useful. Try not to lose it please, I want it back.\" He walks back to the end of the corridor with you in tow. \"Ok, lets get you started then.\"\t\n\nSketching a symbol in the air, a doorway opens into an arid, sandy area with some trees visible in the distance. You step through. \n*page_break\n*goto_scene jaculus\n\n\n*label tsuchigumochoice\nMerlinus nods, an odd expression twisting his features. \"Interesting choice, I would have gone for the Jaculus personally.\"\n\n\"No, no don't panic,\" he says noticing your stricken expression. \"It's just I've got a slight thing about spiders, that's all. Don't tell anyone.\" He adds the last as a conspiratorial whisper. \n\n\"Ok, well back to topic, please remember to be very careful on this assignment, there's a reason why it's been chosen for the final exam. Do not let yourself or anyone else for that matter, be eaten while capturing the spider. Contain it, but do not injure the creature unless your life depends on it, got it?\" \t\t\n\nYou nod distractedly looking back into the darkened enclosure. You think if you strain your eyes, there might actually be something moving about in the shadows. Shivering you hope you've made the right choice. \n\n*page_break\n\n\"I'm sending you to Mt. Mocchomu, located on the island of Kyushu, Japan. The area can be fairly rugged with forests and mountainous terrain, however we think we've got the Tsuchigumo's lair narrowed down to a fairly small tract of land for you and will set you down nearby. There's been some disturbing reports for this area with a number of hikers going missing or coming back with some wild tales. In fact this one...\" He gestures to the enclosure. \"Came from the same area. We thought once we had him under control the attacks would stop, but it seems like more than one has decided to get in on the act. It's odd, they've been largely quiet for over a century, I don't know what has them so stirred up at the moment.\"\n\nThe tapping sound from the darkened enclosure becomes louder, placing your hands against the smooth surface of the ward, you peer into the shadows, hoping to get a glimpse of the creature you need to set out to find. Suddenly a large bristle covered head with multiple obsidian dark eyes jumps straight towards you, causing you reel backwards in fright. The spider pauses for a second, regarding you with bright, expressionless eyes, before retreating back into the gloom.  \n\n*page_break\n\n\"I thought you said they couldn't see us, that they didn't know they were in captivity.\" you say shaken. \n\nMerlinus looks uncomfortable. \"It's not usually our policy to hold beings that display sufficient intelligence to realise they are being held captive at this facility, however this one was caught in the act of attacking a hiking party. We had no choice really. We had to move him somewhere fast. I guess it's not entirely his fault, it's in his nature to hunt in this way and humans have been steadily encroaching on their habitat.\" \n\n\"Usually we'd try reasoning with them, however this can be difficult with the Tsuchigumo. They're about as alien as they come while still originating on Earth. These spiders can be ancient, no one's really sure how long they live. They've shown contempt for remaining within warded areas in the past and although we have tried talking to this one, it's not responding. Either it can't or wont, either way, we'll need to keep him here until we can find an appropriate area to house a 4ft tall arachnid.\"\t\t\n\t\t\n\"I really hope not too many of them get this idea. It's going to be hard enough re-homing just the two of them.\" He scratches his jaw thoughtfully. \n\n*page_break\n\n\"Anyway you're going to get a chance to do this one by yourself this time, no pre-made capture devices like the bunyip, no maps like with Nessie. Oh I almost forgot.\" He tosses you something resembling a small leather wallet. \n\n\"Some supplies in case you need to stay overnight for this. Just a couple of essentials: some food, a tent, raincoat, rope, a shovel, a few basic spell components, that kind of thing.\"\n\nYou look doubtfully at the leather packet in you hands, deciding it'd be lucky to weight 100g. \"All in here?\"\t\n\n\"Yup, pocket dimension technology. Energetically very expensive to make, but dead useful. Try not to lose it please, I want it back.\" He walks back to the end of the corridor with you in tow. \"Ok, lets get you started then.\"\t\n\nSketching a symbol in the air, a doorway opens onto a rocky path, old growth trees towering to each side. You step through. \n*page_break\n*goto_scene tsuchigumo\n", "passdragon": "*page_break\n\nHiking up the overgrown path as quickly as you can, you pass through the shimmering barrier with a heartfelt sigh of relief. As if on cue a portal flickers into existence ahead, the outline of Merlinus' office clear through the shifting light. Happy to be clear of the dragon below, you gratefully step through.\n\nBlinking, unaccustomed to the brightly lit office space, you find yourself before Merlinus' desk who regards you with clear, grey eyes. \n\n\"You're looking well. Myranda usually gives people more grief than that when we send them down. Maybe we'll schedule you on for future errands.\" You stare speechless. Hopefully he's not serious. \n\n\"Great thinking on your feet, Myranda can be...[i]challenging[/i] to deal with as you've seen. You did very well to deliver the parcel without upsetting her unduly.\"  \n\n\"So, how about we review how you've been progressing so far shall we?\"\n\n*goto_scene testmarks\n", "phonecall1": "The day seems to take an eternity to pass. At times you find yourself staring at the clock at the front of the room. Each second ticking as if in slow motion. Given the events of this morning you can't wait to investigate your magic book further, but don't dare bring it out where others might see it. \n\nFinally you arrive home late that afternoon, hurry up to your room and toss the book on the bed. Flipping though the pages, you're delighted to find the first chapter of spells deciphered into clear English. \n\nYou make the decision to try the first spell listed. It's an illusion spell to cloak a small object, should be fairly harmless. \n\nYou select a small blue cup from the kitchen and place it on a sheet of clean paper. Using a blue biro you copy the symbol illustrated in the book onto the white sheet of paper. Closing your eyes you concentrate on the symbol being full of white light and tap the cup with an index finger. \n\n*choice\n\t\n\t*Selectable_if (illusion >= 10) #The cup flickers out of sight. Wow, it's really gone!\n\t\t\n\t\t\tYou wave your hand through where the cup was located a second ago and feel it connect with something that crashes to the ground. Although you can't see it, you can hear pieces of china skittering across the floor. Whoops. Invisible, not gone. You'll have to remember that. (And clean up the broken pieces of china once they reappear).\n\t\t\t*achieve illusioncup\n\t\t\t*goto phone\n\t\t\n\t*Selectable_if (illusion \u003c 10) #The cup flickers out of sight....Then reappears. \n\t\tWell not too bad for a first try, you'll sure it'll get easier with practice. \n\t\t*goto phone\n\n*label phone\n\nYou're startled when your phone chimes with a loud ring. With annoyace at being disturbed, you reach over and pick it up. \"Hello?\"\n\n\"Wizard ${name}?\" The voice sounds tinny and echos like it's coming from the end of a long tunnel.\n \n\"Ah yes, that's me,\" you reply uncertainty.\n\n\"This is Raphael from the Wizard's guild. We've got an assignment for you.\"\n\n*Choice\n\t#Wait the Wizard's guild communicates with it's members by cell phone?\n\t\t\"Why yes. What would you prefer? Ravens? Letters written in blood?\" His tone is sarcastic. \n\n\t\t\"Uh no, not really, just caught me by surprise that's all. By the way, you know I'm a real newbie right? I don't think I'm really ready for an assignment.\"\n\t\t*goto 1sttaskchoice\n\n\t#But I don't want an assignment. \n\t\t\"Well that's just bad luck. You agreed to it. It's in the fine print. If you don't want to be a wizard any more though?....\" He lets the thought hang. \n\t\t*choice\n\t\t\t#Well now that you mention it, I am having second thoughts about the whole thing...\n\t\t\t\t*goto_scene 2ndthought\t\n\n\t\t\t#No that's not what I meant..\n\t\t\t\t\"No, no.\" you reply quickly, \"I just mean I only just got my licence. I'm not ready for an assignment.\" \n\t\t\t\t*goto 1sttaskchoice\n\t\n*label 1sttaskchoice\n\n\"Well then you shouldn't have signed up for it,\" he snaps. \n\n(You make a mental note that there seem to be some real charmers working at the guild. People skills don't seem to be a requirement). \n\n\"Look,\" he sighs, \"we're understaffed at the moment alright? There isn't much call for wizards these days. So few people actually want to make it a career. Fewer still have much talent for it these days either. Don't panic, the assignment's an easy one. It's not like we'll send you up against a dragon on your first case, ok?\"\n\n[i]Dragons...wonderful. This is sounding like an OHS nightmare already.[/i]\n\n*page_break\n\n\"So the assignment, all you have to do is relocate a brownie. Nothing too fancy. Just go in, convince it to come with you and find somewhere for it to live. Easy. I'm sending the details to your phone now. I need you to go there tonight, the house it lives in is scheduled for demolition tomorrow.\" \n\n\"Tonight!\" you squark. \"You're kidding right, do you know what time it is? How am I supposed to get there in the middle of the night?\"\n\n*page_break\n\n\"Use the book. Come on it's not that hard. Look up your basic teleport spell. Use a simple time warp cantrip turn back time an hour or two if you need. Gotta go.\" The line goes dead. \n\n\nSearching through your book you find the appropriate spells. You need a map to make the teleport spell work. Thank goodness for google, a quick search on your phone brings the street map up. \n\nYou worry about your pronunciation as you stumble through the wording of the spell. Fortunately it must have been close enough as suddenly with a sharp popping sound, you're standing in a dark room.\n\n*page_break\n \n\nYou use your phone as a torch, searching the room. You take in the peeling paint, holes in the wall and decaying floorboards. The place looks condemned, pretty sure this is the right place. Now to find that brownie. \n\n*choice\n\t#You creep though the house. Floorboards squeaking with every step. You hope you don't fall through. \"Here Brownie, brownie, brownie\" you call softly.\n\t\t*goto_scene browniecall\n\n\t*selectable_if (browniestat >= 10) #You remove a bottle of milk and a glass from your bag. (I think there was something in the manual about that wasn't there?) \n\t\tYou pour a glass of milk and set it down on the ground. You remember reading in your book that brownies often like milk and cookies left out for them in payment for work done. You suspect it's a good way to lure it out.\n\t\t*goto_scene browniecookie\n", "savepointfairy": "How do you feel about the loss of your licence?\n\n*Fake_Choice\n\t#Good riddance. The whole thing was more trouble than it was worth. \n\t\tAlthough it had seemed like a good idea at the time. In practice, it was full of overbearing superiors who liked to order you around, taking care of all their odd jobs and even dangerous assignments for them. You're genuinely glad to be rid of it all, even though it means the loss of your magic.\n\n\t\tExperimentally you try zapping a pen off the table. No matter how hard you concentrate, the pen stays stubbornly still. \n\n\t\t[i]\"Well that's that.\"[/i] you think silently to yourself. There really is no more magic. In a way you're relieved. That night you fall into a peaceful, dreamless sleep. \n\t\t*set nomagic 1\t\n\t\t*page_break\n\t\t\t\t\n\n\n\t#Saddened. You're unhappy about the way everything turned out in the end.\t\n\t\tThere are things you decide that you definitely wont miss. All the ordering around and cranky, superior attitudes from many of the office staff for one. On the other hand, you think that given other circumstances, you could have gotten along well with the old wizard Merlinus. \n\n\t\tAnd then there is the magic. You will miss that. If only there was a way to practice it without having to be under the thumb of the guild. \n\n\t\tExperimentally you try zapping a pen off the table. No matter how hard you concentrate, the pen stays stubbornly still. \n\n\t\t[i]\"Well that's that.\"[/i] you think silently to yourself. There really is no more magic. It saddens you but there's nothing for it, you made the choices that brought you here. You head dejectedly off to bed and fall into a deep sleep. \n\n\t\t*page_break\n\t\t\t\t\n\nYou're half-awakened the next morning by a moth's wings fluttering in your face. Grumpily you try to brush it away with your hand when it bites you!\n\nSnapping to full alertness your eyelids fly open, only to see not a moth but a tiny fairy, batting at your face trying to get your attention. You give a startled yelp which turns into a fit of coughing as the fae flits away in a shower of golden dust. \n\nDoubled over, it takes a few minutes of hacking to clear your lungs of the irritant particles. When you can finally catch your breath again, you search with watery eyes for the small creature. You find her easily, perched on top of the curtain rail, reflective blue wings twitching uncertainty. \n\n\"It's ok,\" you call out to her. \"You just startled me, that's all. I'm not going to hurt you. Why are you here?\"\n\n*page_break\n\nThe fae looks uncertain but flies down to hover level with your face. Hands pull at her green tunic anxiously. \n\n\"Wizard, you've got to help us!\" The high pitched voice pipes. \"The feline one has my friend trapped!\"  \n\n*choice\n\t*Selectable_if (nomagic = 1 ) #I can't help you, I'm not a wizard anymore, I'm out of the magic game now. \n\t\tThe fae's pale feature blanch even further. \"But the feline one will [i]eat[/i] him!\" She wails.\n\n\t\tYou almost give in at that point, it's not like you're completely stone-hearted after all; but you really need a clean break if you want to get back to your life before all the wizardry stuff happened. \n\n\t\tBesides which, you have a sneaking suspicion that for the fae with their own brand of magic, not to be able to deal with the \"feline one,\" it's probably going to be more than your average domestic tabby. Most likely you'll go down there and end up face to face with something more like a cat sith or a manticore, which will only go badly for you now that you're without magic. \n\n\t\t\"Look I'm sorry,\" you tell the fairy firmly \"But I really can't help you. Try the wizard's guild, they're sure to send someone along who can save your friend.\"\n\n\t\tThe fae's hands ball up into tiny fists as her face contorts with rage. \"You'll live to regret this human!\" She screams at you, before leaving swiftly through the open window in a cloud of sparkling dust that sets you to coughing harshly again.\n\t\t\n\t\t*page_break\n\t\t*goto_scene declinefairy\n\n\n\t*Selectable_if (nomagic = 0 ) #Of course I'll help you. where is he?\n\t\tThe fae's anguished features brighten. \"You'll really help?\" Tugging at your hair she pulls you towards the door. \"No time to wait, the feline one is going to [i]eat[/i] him.\" \n\n\t\tThe fairy pulls you down the stairs and towards the front door. You're still in your pajamas but considering what's been going on lately, having your neighbours catch you walking down the street in blue striped flannel is probably going to be the least of your worries. \n\n\t\t*page_break\n\t\t*goto_scene helpfairy\n\n", "screenshots": "*comment Screenshots\n\nscreenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n\n*set Good_Standing 50\n*set FamiliarType \"None\"\n*set he \"he\"\n*set name \"John\"\n*set lastname \"Drake\"\n*set Good_Standing 50\n*Set occupation \"Mundane Member Of Society\"\n*set familiarnumber 0\n*set EA \"None\"\n\nMost wizards apparently have an affinity for a particular element, which in turn dictates which kinds of magic are easier to cast. The book details a meditation, designed to guide potential wizards to what your strengths are. Feeling a little silly you sit cross legged on your bed, breathing deeply while you stare at the black square on the page. \n\nYou get sounds and a faint smell first, then an image starts to form. \n*fake_choice\n\t#Sinking through the water column in the ocean.\t\n\t\n\t#Trees rising up around you, standing with both feet planted on the ground. \n\t\n\t#Flying through the air above the clouds.  \n\t\n\t#A large fire raging around you. \n\t\n\t\n*comment pagebreak_____________________________________________________________\t\n\t\n*script changeBackgroundColor(\"black\")\n\n\n*set Good_Standing 75\n*Set occupation \"Wizard Level C- On Probation\"\n*set he \"she\"\n*set name \"Ceres\"\n*set lastname \"Smith\"\n*set First_Task 100\n*set Second_Task 90\n*set Ring \"Ruby Ring.\"\n*set familiarname \"Tokay\"\n*set familiarthe \"the\"\n*set speciality \"Illusion\"\n*set fire 100\n*set EA \"Fire\"\n*set familiartype \"Ember Gecko\"\n*set Familiarnumber 4\n*set animal \"gecko\"\n*set fhe \"he\"\n*set fhis \"his\"\n*set fhim \"him\"\n\n\"The Triaxian has ignored summons to speak to the council, so we're bringing him in by force.\" the voice concludes.\n\n\"By force?\" you quaver uncertainty. \"Ok...So what [i]is[/i] a water-dwelling Triaxian anyway?\" It had to be asked although you're pretty sure you're not going to like the answer.\n\n\"A Triaxian...\" the voice over the phone pauses thoughtfully. \"Hmm... what would the colloquial term be?...A bunyip I think. It will all be in your book. I recommend you have a read before you head down there. You're expected by 11 o'clock lakeside.\"\n \n*page_break\n\n\n\n*comment pagebreak_____________________________________________________________\n\n*script changeBackgroundColor(\"sepia\")\n\n*set Good_Standing 60\n*Set occupation \"Wizard Level C- On Probation\"\n*set he \"she\"\n*set name \"Alice\"\n*set lastname \"Song\"\n*set First_Task 0\n*set Second_Task 100\n*set familiartype \"Iridescent Kingfisher\"\n*set Familiarnumber 1\n*set animal \"kingfisher\"\n*set fhe \"she\"\n*set fhis \"her\"\n*set fhim \"her\"\n*set familiarname \"Cyan\"\n*set familiarthe \"the\"\n*set Ring \"\"\n*set Unicornhair \"Unicorn Hair.\"\n*set speciality \"Mind control and communication\"\n\n\nIt takes a while, but eventually you see a string of bubbles heading rapidly towards your position. With a flick of a muscular, furred tail, the bunyip launches itself out clean out of the water, meat fastened securely in a crocodile like jaw. With a sharp twist of its head, it snaps the fishing line and gulps the food down in a single swallow. Sniffing the air like a wolf, it quickly zeros in on your cooler with the remaining cuts of lamb and fearlessly saunters up the embankment. \n\n*fake_choice \n\t#Try to talk to the bunyip.\n\t\t\t\t\n\t#Throw the orb! Don't waste time, throw it now!\n\n\t \n\n\n\t\n*comment pagebreak_____________________________________________________________\n\t\n\n*set Good_Standing 70\n*Set occupation \"Wizard Level C- On Probation\"\n*set he \"he\"\n*set name \"Mark\"\n*set lastname \"Smith\"\n*set First_Task 100\n*set Second_Task 90\n*set Third_Task 60\n*set Ring \"Ruby Ring.\"\n*set familiarname \"Loki\"\n*set familiarthe \"the\"\n*set speciality \"Transmutation\"\n*set fire 100\n*set EA \"Fire\"\n*set familiartype \"Ember Gecko\"\n*set Familiarnumber 4\n*set animal \"gecko\"\n*set fhe \"he\"\n*set fhis \"his\"\n*set fhim \"him\"\n*set Unicornhair \"\"\n\t\n*image Myranda.jpg center \n\"Meddling Humanssss!\" A voice hisses in your mind as a crimson eye larger than your hand turns to focus on you. You are hit by a wave of emotion from the dragon. Weakly you realise it's hunger. Being eaten was definitely not part of your life plan.\n\n*fake_choice\n\t#I know a spell I think may help\n\t\t\n\t#I'll try to use that ruby ring\n\n\t#Freeze. I got nothing....\n\t\n\n*comment pagebreak_____________________________________________________________\n\n\n\n*set Good_Standing 55\n*Set occupation \"Mundane Member of Society\"\n*set he \"she\"\n*set name \"River\"\n*set lastname \"Emrys\"\n*set First_Task 100\n*set Second_Task 90\n*set Third_Task 0\n*set Ring \"Ruby Ring.\"\n*set familiarname \"None\"\n*set Air 100\n*set EA \"Air\"\n*set familiarthe \"\"\n*set speciality \"Transmutation\"\n*set familiartype \"\"\n*set Familiarnumber 0\n*set animal \"\"\n\n\n\"Couldn't help but overhear.\" the hound voices smoothly, teeth flashing in a canine grin. \"I may have a bargain for you, [i]if[/i] my sources are correct and you have what I need. Rumour has it, you have something of value for trade.\"\n\n\"I may.\" you say hesitantly. \"But I have a few questions of you first.\"\n\n*fake_choice\n\t#\"Who am I dealing with may I ask?\" \n\n\t\t\n\t#\"What are you?\"\n\n\t\t\n\t#\"Why are you approaching me?\"\n\t\t\n\t\t\n\t#\"What are you offering to trade?\"\n\t\t\n\t\n\t#\"Enough questions for now, what do I have that you want?\"\n\t\t\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\t\t", "startup": "*title Wizardry Level C\n*author Jacic\n*scene_list\n    startup\n    wizard2\n    choicescript_stats\n    elementchoice\n    dontsign\n    2ndthought\n    book\n    malename\n    oath\n    ch2\n    phonecall1\n    browniecookie\n    browniecall\n    familiarsearch\n    familiarbus\n    unicorntest\n    $ bunyiptask\n    $ declinebunyipoffice\n    $ declinefairy\n    $ helpfairy\n    $ bunyiptodragon\n    $ dragonwizard\n    $ dragonmagic\n    $ dragongivering\n    $ explodingparcel\n    $ newdragon\n    $ passdragon\n    $ eyecontact\n    $ dragonland\n    $ faillicence\n    $ decidewand\n    $ superhero\n    $ supertask\n    $ testmarks\n    $ paraanimals\n    $ tsuchigumo\n    $ jaculus\n    $ magician\n    ending\n    $ thankyous\n    $ savepointfairy\n\n*create familiar 0\n*create animal \"\"\n*create familiarname \"\"\n*create familiarthe \"\"\n*create fhe \"\"\n*create fhis \"\"\n*create fhim \"\"\n*create work \"\"\n*create bunyipfamiliar 0\n*create water 0\n*create fire 0\n*create air 0\n*create earth 0\n*create name \"\"\n*create lastname \"\"\n*create FamiliarType \"\"\n*create EA \"\"\n*create darkside \"\"\n\n*create First_Task 0 \n*create Second_Task 0\n*create Third_Task 0\n*create Fourth_Task 0\n\n*create Good_Standing 50\n\n\n*create Ring \"\"\n*create Unicornhair \"\"\n*create wand \"\"\n\n*create supername \"\"\n*create aka \"\"\n*create supercolour \"\"\n*Create supercolour2 \"\"\n*create superlastname \"\"\n*create YSC \"\"\n*create occupation \"\"\n*create he \"\"\n*create invisible \"\"\n*create grade4 \"\"\n*create grade3 \"\"\n*create grade2 \"\"\n*create grade1 \"\"\n*create his \"his\"\n*create boy \"boy\"\n\n\n*comment hidden values\n*create illusion 0\n*create telepathy 0\n*create browniestat 0\n*create strikes 0\n*create nomagic 0\n*create eyecolour \"\"\n*create object 0\n*create speciality \"\"\n*create fail 0\n*create hundredpercent 0\n*create ringunicorn \"\"\n*create language2 \"\"\n*create finalexamfail 0\n*create spiderfail 0\n*create spiderknow 0\n*create paramagician 0\n\n\n\n\n*create Familiarnumber 0\n*comment Familiarnumber 0=none, 1=water, 2=earth, 3=air, 4=fire\n\n*achievement famous visible 10 Fame and Fortune\n   You became a famous magician.\n   Abracadabra.\n\n*achievement plays visible 10 Play Nicely\n   You worked well with another wizard.\n   Plays well with other wizards.\n\n\n*achievement unicorns visible 10 Valuable Item\n   White and bright.\n   Obtain unicorn hair for your workings.\n\n\n*achievement passa visible 10 A+++\n   Passed your initial testing with flying colours.\n   Best of the best.\n\n*achievement passb visible 10 Passed\n   You're a fully fledged wizard now.\n   Finally a full licence, lets go celebrate.\n\n*achievement familiar visible 10 Familiar Friend\n   Obtain a familiar to work with you.\n   Nothing's going to tear you two apart :)\n\n*achievement mib visible 10 MIB impersonator\n   Do a men in black impersonation.\n   Here come the men in black.\n\n*achievement brownie visible 10 Befriend a Brownie\n   Help out a house elf.\n   Help out a house elf.\n\n*achievement ire visible 10 Curdled milk and crumpled clothes\n   Earn the ire of a Brownie.\n   Revenge of the brownies.\n\n*achievement illusioncup visible 10 Illusory Skill\n   Successfully perform a spell of illusion.\n   Broken cup, hidden china.\n\n*achievement advice visible 10 Take my advice\n   Get advice from an alien.\n   Advice from a Siris'ian.\n\n*achievement kickedout visible 10 Expelled\n   Lose your licence.\n   You got kicked out of the Guild.\n\n*achievement future visible 10 Futuristic \n   See the future.\n   Settle down in the 32nd Century.\n\n*achievement castle visible 10 Castle\n   Settle down in a Castle.\n   Servant to the Unseelie Host.\n\n*achievement author visible 10 Author\n   Have a book published.\n   Book of fairy tales and legends.\n\n*achievement dragon visible 10 Dragon\n   Scales and treasures.\n   You became a real live dragon. \n\n*achievement superhero visible 10 Superhero\n   For the good of all mankind.\n   You became a super hero.\n\n*achievement evil visible 10 Force for evil\n   Rule breaker. \n   Train to be a necromancer.\n\n*achievement hound visible 10 Don't feed the animals\n   Meet the otherworldly hounds.\n   Ending by Cwn Annwn.\n\n*Achievement clan visible 10 Become a member of a prominant clan\n   Accepted into a Clan.\n   Survived to become a member of the Sararia Dragon Clan.\n\n*achievement apprentice visible 10 Apprentice\n   Apprentice Wizard- sounds like a good thing doesn't it?\n   Merlinus' Apprentice.\n\n*achievement win visible 10 Accepted\n   Win over the trust of the dragons.\n   Accepted into a Moor Dragon clan.\n\n*Achievement shallow visible 10 Mundane\n   Keep to the shallow end of the supernatural pool.\n   Prevented yourself from getting in over your head.\n\n*achievement minion visible 10 Minion\n    Become one of the Necromancer's minons.\n    Undead Warrior.\n\t\n*achievement loch visible 10 Monster\n    Inherit a dragon's title.\n    Become the Loch Ness Monster.\n\t\n*achievement business visible 10 Mind your own business\n    Set up your own business.\n    Dragon Transport Services Ltd.\n\t\n*achievement failed visible 10 Achievement in itself\n    Four out of Four.\n    Manage to fail every test set for you. That takes skill in itself!\n\t\n*achievement battle visible 10 Are you ready?\n    Waiting is the worst. \n    Myranda's return.\n\n*achievement toad visible 10 Toad.\n    Ribbet.\n    A few decades as a toad...outstanding.\n\n\n\n*set FamiliarType \"None\"\n*set familiarnumber 0\n*set EA \"None\"\n*Set occupation \"Mundane member of society\"\n*set he \"he\"\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  The discovery of an old magic book turns your life upside down. Will you succeed in becoming a guild wizard? Or instead travel a different path, striking out on your own, moving to a different plane of existence or perhaps not even remaining human?\n\n  \"Wizardry Level C\" is a 100,000-word interactive novel by Jacic where your choices control the story. It's entirely text-based-without graphics or sound effects-and fueled by the vast, unstoppable power of your imagination.\n\n  [i]You can play the first few chapters of the game for free. Purchase the rest of the game below.[/i]\n  *if choice_is_advertising_supported\n    [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n  *comment endif\n\n  *purchase_discount adfree 2011-01-01 $4.99 $2.99 purchased\n  *if choice_is_advertising_supported\n    *page_break_advertisement\n  *if not(choice_is_advertising_supported)\n    *page_break Play Now for Free\n\n\n*label purchased\n\n*comment STORY STARTS HERE\n\n\nYou rush in through the sliding doors of the library, shaking the rain off your coat and hanging it on one of the pegs by the entrance. The weather outside is foul. Freezing temperatures, wind, rain you name it. It would make most people depressed, but not you. It gives you the perfect excuse to go and hide out in the library for a few hours. \n\nYou've always loved the library, a place with shelves piled high with books containing lifetimes of information both real and imagined. Heading over to the fantasy and science fiction novels, you run your hands over the spines as you walk down the isles, remembering the books as if they were old friends of yours. \n\n*page_break\n\nYou pick out a few books that look interesting. One is a book about dragon riders, another about an adventuring party in an alternate world. [i]What's this?[/i] You slide out an old tome with a peeling leather binding. You've never seen this one on the shelves before. \"Book of Wizardry\" is inscribed in flowing copperplate letters on the front cover. You take the book over to a table and open it carefully, releasing a plume of dust and making you cough. Must have just come out of storage you guess. \n\n*page_break\n\nThe first page of the book is in the same flowing script as the cover.\n\n[i][b]\"To who shall ever findeth this book, [/i][/b]\n\n[i][b]A wizard thou may be. [/i]\n\n[i][b]Continue reading, [/i][/b]\n\n[i][b]Make a choice,[/i][/b]\n\n[i][b]And in time thou shalt see.\"[/i][/b]\n\n*page_break\n\nHmm, alrighty then. You flick forward a few pages. Most of the book seems illegible, with odd symbols covering the pages. Maybe it's some kind of puzzle book you muse, could be interesting to try and decipher. You bundle up the selected books and take them with you to the check out desk. \n\n*page_break\n\nThe librarian at the front desk looks distracted. She scans the books and slides them over to you, never noticing that the final book doesn't have a bar code. You decide not to bring her attention to it, she may decide to hold the book until it's been processed and not let you loan it out today. \n\nThe walk home is wet and miserable. Once inside your home you shed your dripping jacket by the door and head upstairs to flop into bed. Fishing the leather bound book out of your bag, you open it and begin to read. \n\nTo your disappointment the book seems to read like a manual. The subsequent pages seem to have lost the flowery speech in favour of a rather ponderous text on the responsibilities of prospective wizards. Serving the greater good, seeking out knowledge, hiding magic from the general public and other related principles. You have a chuckle at the last one. A book that instructs prospective magicians to keep out of view while publishing books that end up in public libraries. [i]Good one.[/i] \n\n*goto_scene wizard2\n\n", "superhero": "Well and good, you've decided to use your new found powers for a worthy cause. Upholder of truth and justice, champion for the helpless, striker of fear into the hearts of evil doers everywhere... and all that sort of thing. \n\nNow that you've made your decision, you'll need to choose your alias. All superheroes need an alternate identity. It'll help stop criminals, wizards and any obsessive fans from tracking you down. You would also like to be anonymous so no one can sue you for any damages that may or may not occur in the upholding of the law. \n*achieve superhero\nSo do you have a name in mind?\n*Set YSC \"Your Superhero colours are:\"\n*set aka \"aka\"\n*Set occupation \"Superhero\"\n\n*choice\n\t#Yes this is something I've been contemplating for a while now and would like to enter it in. \n\t\t*label input_supername\n\t\tWhat is your superhero name?\n\t\t*input_text supername\n\t\t*set supername \"$!{supername}\"\n\t\t*goto selectcolours\n\t\t\n\t#No I'm not certain, I'd like to select from a random list of superhero names I found on the net. \n\t\tLooking at the list you find you like the ring of a double name. Like wonder-woman, green-lantern and super-man. \n\t\t\n\t\tYou decide you'd better stay away from names that contain the word \"magic\" or \"mage\" to help throw the Wizard's Guild off the scent if they notice your activities.\n\t\t\n\t\t*page_break\n\t\t\n\t\tWhat will be the first part of your name?\n\t\t\n\t\t*goto firstname\n\t\t\n\t\t\n\t\t\n\t\t\n\t\t\n*label selectcolours\t\t\n*page_break\nYou decide on $!{supername}, it's good to come up with something original. You hope this name strikes fear into those with evil in their hearts everywhere.\n\nNow to choose your costume, what colours would you like?\n\n*label input_supercolour\nWhat are your superhero colours?\n*input_text supercolour\n*set supercolour \"$!{supercolour}\"\nYou've chosen a fashionable design in ${supercolour}. Now you feel ready to face the world as a Superhero. \n*goto_scene supertask\n\t\n\t\n\n\n\n*label firstname\n*choice\n\t\t#Frost\n\t\t\t*set supercolour \"Pale, icy blue\" \n\t\t\t*set supername \"Frost\"\n\t\t\t*goto lastname\n\t\t\n\t\t#Captain\n\t\t\t*set supercolour \"Red, royal blue\"\n\t\t\t*set supername \"Captain\"\n\t\t\t*goto lastname\t\n\t\t\t\n\t\t#Masked\n\t\t\t*set supercolour \"Silver-grey flecked charcoal\"\n\t\t\t*set supername \"Masked\"\n\t\t\t*goto lastname\n\t\t\t\n\t\t#Ultra\n\t\t\t*set supercolour \"Flourescent pink\"\n\t\t\t*set supername \"Ultra\"\n\t\t\t*goto lastname\n\t\t\t\n\t\t#Dragon\n\t\t\t*set supercolour \"Silver, gold\"\n\t\t\t*set supername \"Dragon\"\n\t\t\t*goto lastname\n\t\t\t\n\t\t#Bronzed\n\t\t\t*set supercolour \"Metalic brown\"\n\t\t\t*set supername \"Bronzed\"\n\t\t\t*goto lastname\n\t\t\t\n\t\t#Eagle\n\t\t\t*set supercolour \"Gold\"\n\t\t\t*set supername \"Eagle\"\n\t\t\t*goto lastname\n\t\t\t\n\t\t#Watermelon\n\t\t\t*set supercolour \"Lime green, red\"\n\t\t\t*set supername \"Watermelon\"\n\t\t\t*goto lastname\n\t\t\t\n\t\t#I've changed my mind, I want to enter in an original name after all. \n\t\t\t*goto input_supername\n\t\t\t\n\t\t\t\n\t\t\t\n\t\t\t\n\t\t\t\n*label lastname\n\nWhat is the second part of your name going to be?\n*choice\n\t#Man\n\t\t*set supercolour2 \"and dark blue\" \n\t\t*set superlastname \"Man\"\n\t\t*goto nameset\n\n\t#Woman\n\t\t*set supercolour2 \"and white\"\n\t\t*set superlastname \"Woman\"\n\t\t*goto nameset\n\n\t#Girl\n\t\t*set supercolour2 \"and peach\" \n\t\t*set superlastname \"Girl\"\n\t\t*goto nameset\t\n\n\t#Boy\n\t\t*set supercolour2 \"and dark green\" \n\t\t*set superlastname \"Boy\"\t\t\n\t\t*goto nameset\n\n\t#Shadow\n\t\t*set supercolour2 \"and black\"\n\t\t*set superlastname \"Shadow\"\n\t\t*goto nameset\n\t\t\n\t#Shade\n\t\t*set supercolour2 \"and dove grey\"\n\t\t*set superlastname \"Shade\"\n\t\t*goto nameset\n\t\t\n\t\t\n\t#Light\n\t\t*set superlastname \"Light\"\n\t\t*set supercolour2 \"and neon yellow\"\n\t\t*goto nameset\n\t\t\n\t#Defender\n\t\t*set supercolour2 \"and indigo\"\n\t\t*set superlastname \"Defender\"\n\t\t*goto nameset\n\n\t#Crusher\n\t\t*set supercolour2 \"and bright orange\"\n\t\t*set superlastname \"Crusher\"\n\t\t*goto nameset\n\n\t#Inferno\n\t\t*set supercolour2 \"and deep crimson\"\n\t\t*set superlastname \"Inferno\"\n\t\t*goto nameset\n\t\t\n\t#I'd like to change my superhero first name.\n\t\t*goto firstname\n\t\n\t#I don't like any of these after all and want to enter in my own name.\n\t\t*goto input_supername\n\t\t\t\n\n\t\n\t\n\t\n*label nameset\n\n*Choice\n\t#You've chosen $!{supername} $!{superlastname} to be your superhero alias.\n\t\t*If (supername = \"Watermelon\")\n\t\t\tHmm... $!{supername} $!{superlastname}? That is an...ah...[i]interesting[/i] choice. Are you sure it's going to strike fear into the hearts of criminal elements everywhere though?\n\t\t\t\n\t\t\tOh well it's your choice after all. I guess if nothing else it may well lead to people underestimating you. \n\t\t\t\n\t\t\tSo you don your skin tight lime green ${supercolour2} outfit, with red piping along the arms and legs. Smoothing out the very fashionable watermelon motif over the chest area, you feel ready to head out and rid the world of evil. \n\t\t\t*goto_scene supertask\n\t\t\t\n\t\tThat sounds like a name that people will remember. You hope it will strike fear into the hearts of evil doers everywhere. \n\n\t\tNext to choose your disguise. Finally you settle on a fashionable, caped design in ${supercolour} ${supercolour2} and head out, ready to rid the world of those who harbour evil in their heart.\n\t\t\n\t\t*goto_scene supertask", "supertask": "*page_break\n\nYour stint as a superhero is a successful one. Your ability with magic enables you to foil many a dastardly plan to the point that many mastermind criminals pack up and elect for a change in career. \n\nNo matter though, there's still plenty of kittens that need saving from trees to fill in the quiet times. \n\nAlthough you always worry that the Wizard's Guild will cotton on to what you're up to, but either your alias and disguise are cunning enough that they never work out who you are, or maybe they just don't care about your activities now. Either way, you never get a visit from them demanding to know what you're up to.\n\nSuperhero-ing becomes a full time job for you and you find it a struggle some days to afford important things like rent, food and phone bills. \n\nYou need to find a way to make ends meet and you consider merchandising as an option. How do you feel about your own \"official\" superhero branded line of products? \n\n*Choice\n\t#Sure merchandising sounds like a great idea. \n\t\tHey why not cash in on your superhero fame. It's not like you're not working for it. It's justice that you should make money by having a line of mugs, T-shirts and bumper stickers with your name on them. \n\t\t\n\t\tSetting up an anonymous Swiss bank account is easy, with all the funds from your venture going there without anyone being the wiser as to who you are. You make a [b][i]lot[/i][/b] of money, but surprisingly no-one seems to mind. In fact everyone is just pleased to have [i]their[/i] superhero protecting the streets full time. \n\t\t\n\t\tFollowing in the steps of Bruce Wayne, you set yourself up with a nice house, private jet and lots of \"toys\" from the research company you now fund. Although you don't need to, you sometimes take the inventions with you to use when you feel the need to mix it up with something other than magic when catching criminals. \n\t\t*set occupation \"Superhero/Entrepreneur\"  \n\t\t*goto superending\n\t\n\t#I'd never sell out like that. I got into this to make the world a better place, not to cash in on the fame.\n\t\tOk so it's a \"no\" to cashing in on your fame, but you still need to make ends meet. So how can you do it?\n\t\t*goto endsmeet\n\t\t\n\t\t\n\t\t\n*label endsmeet\n\nThe way you see it, there's two options. Cut back on the superhero-ing and get a part time job; or continue with the superhero gig full time posting a plea for money on a crowd funding site and hope for the best. \n\nWhat do you do?\n*choice\n\n\t#Get a part time job.\n\t\tWell it worked for Clark Kent didn't it? \n\t\t\n\t\tYou get yourself a job as a reporter, getting just enough scoops on $!{supername} $!{superlastname} to make you invaluable to the paper, but not so many that people would become overly suspicious. \n\t\t\n\t\tUnfortunately cutting back your hours where you are actively defending the people, means that crime starts to creep up again slightly. However you look on the bright side which means you have more of the significant stories to report on again.\n\t\t*set occupation \"Superhero/Mild Mannered Reporter\"\n\t\t*goto superending\n\t\t\n\t#Post a money request online.\n\t\tYou make yourself a web page detailing some of your superhero-ing highlights and a request for spare cash to help fund your basic needs so you can continue to protect the planet full time.   \n\t\t\n\t\tThe response is overwhelming, most people seemed to have no idea you had mundane troubles like overdue power bills and are happy to pitch in and help support you. In fact so much money is donated that there's enough left over to set up a retirement fund for the future and some charitable donations to causes in need. \n\n\t\t*goto superending\n\t\t\n\t\t\n*label superending\n*page_break\nAll in all you feel you made the right choices in the end. The world is a better place due to your ability to use magic without all the stuffy types of the guild putting a crimp on your style. \n\nThis really is a happy ending. Up Up and Away $!{supername} $!{superlastname}!\n\n*page_break\n\nThank you for Playing Wizardry Level C. \n\nThis adventure is over, however there are still many other choices that can be made. \n\nWould you like to play again?\n\n*choice\n\t#Reload from the last checkpoint. (Decide how to use your wand- please note some options may not be available depending on your stats from this save point). \n\t\t*set occupation \"Mundane Member of Society\"\n\t\t*Set YSC \"\"\n\t\t*set aka \"\"\n\t\t*set supercolour \"\"\n\t\t*set supername \"\"\n\t\t*set superlastname \"\"\n\t\t*set supercolour2 \"\"\n\t\t\n\t\tThe world fades around you, then snaps back into sharp focus, leaving you with the odd sense of deja vu. \n\t\t\t\t\n\t\tWhat were you doing again? You study the wand in your hand that you've just been given by Garmr.\n\t\t\n\t\t*goto_scene decidewand\n\n\t#Restart from the beginning.\n\t\t*goto_scene ending \n\t\n\t\t", "testmarks": "*page_break\n\nHe pulls out a drawer of a battered looking grey cabinet and pulls out a crisp, yellow manilla folder. You notice it seems kind of full considering the short time you've been a part of the organisation, hopefully that's a good rather than a bad sign. \n\n\"Ok here it is.\" The wizard says opening the folder on the desk. Flicking through the papers, he gives you no indication of what he's thinking apart from the occasional nod and distracted \"hmm.\"\n\n\"Alright,\" he continues, obviously deciding he'd kept you in suspense for long enough. \"These files are reports from not only myself, but also a few of my colleagues that have been keeping tabs on you. \n\nThese are the grades we've decided on:\n\n1st Test: Brownie Relocation-[b] $!{grade1} [/b]\n\n2nd Test: Dealing with Magical Wildlife (Unicorns)-[b] $!{grade2} [/b]\n\n3rd Test: Triaxian (Bunyip) Capture-[b] $!{grade3} [/b]\n\n4th Test: Parcel Delivery/ Dealing with Dragons-[b] $!{grade4} [/b]\n*line_break\n\n[b]Overall Assessment/Suitability For Full Level C Licence (Pending Conditions): [/b]\n\n*choice\n\t*Selectable_if (hundredpercent = 4) #Pass- with honours.\n\t\t*achieve passa\n\t\tMerlinus gives you a wide smile. \"Congratulations, it's been some time since we've had a candidate pass every test we've set with such competence. You're sure to have bright future ahead of you in the wizardry world.\"\n\t\t\n\t\tYou can't keep the grin from your face. \"What so I passed? I'm a wizard for real? No catches, no more check ups?\"\n\t\t\n\t\t\"Well not exactly...You've passed all the initial tests, it means you will certainly have a place here, barring any major disasters of course. Your marks suggest you're ready for a last task, a final exam if you will.\"\n\n\t\t\"Another one?\" You can't keep the disappointment out of your voice, you knew there had to be a catch.\n\t\t\n\t\t\"Hey don't look so glum,\" the wizard folds up your paperwork and replaces it in the filing cabernet. \"I'm sure with your talent you will be more than up to the task.\"\n\t\t\n\t\tOne final test, he's right, you can do this. \"Ok what do I need to do?\"\n\t\t\n\t\tMerlinus rises and heads for the door. \"It's easier if I show you, come on.\"\n\t\t\n\t\t*goto_scene paraanimals\n\t\t\n\t\t\n\t*Selectable_if ((fail \u003c 3) and (hundredpercent != 4)) #Pass\n\t\t\"Hey not bad.\" Merlinus gives you a smile. \"A few things that probably could have been handled a bit differently, however on the whole this is a solid performance and more than enough to keep you in the organisation from now on, barring any major disasters of course.\"\n\t\t\n\t\t\"So I passed? I'm a fully fledged wizard now? No catches, no check ups?\" You reply hopefully.\n\t\t\n\t\t\"Well you've certainly passed overall. But...\" He forestalls the wide grin spreading across your face. \"There is one more test you need to complete successfully in order for me to issue you with a full \"C Level\" licence.\"\n\t\t\n\t\t\"Oh\" you reply crestfallen. \n\t\t\n\t\t\"Hey not to worry.\" The wizard smiles. \"Your marks suggest you're more than up to the test. Come with me, it's easier if I show you what it is.\"\n\t\t\n\t\t[i]\"Well let's see what's in store this time, can't be worse than the dragon.\"[/i] You think to yourself following Merlinus out the door.\n\n\t\t*goto_scene paraanimals\n\t\n\t*selectable_if (fail > 2) #Fail\n\t\t*if (fail = 4)\n\t\t\tMerlinus' frown deepens as he sorts through the paperwork. \"I'm really disappointed in you $!{name}. I feel you have far more talent and sense than this transcript suggests, I can't believe you have not managed to complete a [i]single[/i] task successfully! I'm afraid I have no choice but to fail you which means expulsion from the guild.\"\n\t\t\t*achieve failed\n\t\t\t*choice\n\t\t\t\t#Seriously you're going to kick me out? Isn't there some way I can earn extra credit to stay?\n\t\t\t\t\tYou know you can do this, you just need more time to learn the ropes and get up to speed. If only they will give you one last chance?\n\t\t\t\t\t\n\t\t\t\t\tThe wizard shakes his head sadly. \"No I'm afraid not. My hands are tied here, four strikes and you're out, company rules.\"\n\t\t\t\t\t\t\n\t\t\t\t\tHe helps you up and escorts you to the door. \"Cheer up. Looks like this was not meant to be. Other opportunities are bound to come along. Something you're more suited to.\"\n\t\t\t\t\t\t\n\t\t\t\t\tHis sentiments are meant kindly but they sound hollow to your ears. You step through the portal and back into your room. \n\t\t\t\t\t*achieve kickedout\n\t\t\t\t\t*goto_scene magician\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t#You're disappointed in me for failing? Well who's fault is that? I'll be glad to be rid of this stupid organisation. \n\t\t\t\t\tYou're fuming at Merlinus' gall to be disappointed in you?! If the guild members had have done their job better and given you more guidance, perhaps you would have had a fighting chance at living up to their expectations. You're over it, and inform your supervisor of this fact quite bluntly. \n\t\t\t\t\t\t\n\t\t\t\t\tThe old wizard's face becomes stormy as his features darken and stern, grey eyes flash with an inner light. You sink back into your chair concerned that you may have pushed things a bit too far. \n\t\t\t\t\t\t\n\t\t\t\t\tFreezing, you wait for the zap that will send you scurrying out of the room as a rat, but it never comes. Taking a few deep breaths the wizard composes his features and the atmosphere in the room lightens both figuratively and literally. \n\t\t\t\t\t\t\n\t\t\t\t\t\"Well, you've made your opinion of myself and the Guild clear. Now that I see your attitude, it seems just as well you are leaving now before any further trouble can be caused.\"\n\t\t\t\t\t\t\n\t\t\t\t\tHe rises from his desk, impossibly tall, dark sparks dancing around his features. \"Leave. Now!\"\n\t\t\t\t\t\t\n\t\t\t\t\tYou don't need to be told twice. Tipping the chair over in your haste to be gone, you run from the office. Jumping through the portal you land sprawled on the floor of your room. \n\t\t\t\t\t*achieve kickedout\n\t\t\t\t\t*set good_standing -10\n\t\t\t\t\t*goto_scene magician\n\t\t\t\t\t\n\t\t*if (fail = 3)\n\t\t\tMerlinus frowns, studying the slips of paper. I'm afraid to say you haven't successfully completed enough assignments to get a passing mark $!{name}. You need to have accepted and passed at least two assignments and I can see here that you've only successfully completed one. I'm afraid a failing mark means expusion from the Guild. \n\t\t\t*Choice\n\t\t\t\t#Wait, I really want to get this licence. Isn't there something else I can do to make up the extra credit I need?\n\t\t\t\t\tThe old wizard studies you for a minute. \"You really want to work for the Guild?\"\n\t\t\t\t\t\n\t\t\t\t\tYou nod.\n\t\t\t\t\t\n\t\t\t\t\t\"Well, you do show a lot of promise...maybe with time we can get you up to speed.\" He drums his fingers on the wooden desk in a staccato rhythm mulling it over. You hold your breath, willing him silently to decide in your favour. \n\t\t\t\t\t\n\t\t\t\t\t\"Alright.\" He agrees quietly. \"I'm going to let you take the final exam even with your failing mark as it is. [i]If[/i] you can pass that test, I'm going to let you stay on in the program. You'll need to complete some extra work before I can assign you a full licence though, regardless of how well you handle this test.\"\n\t\t\t\t\t\n\t\t\t\t\tYou nod eagerly. \"I understand, let do it.\"\n\t\t\t\t\t\n\t\t\t\t\t\"Hmm...I hope you're up to the task. Anyway, come along then. it's easier if I show you.\" You follow the wizard out the door.\n\t\t\t\t\t*set paramagician 1\n\t\t\t\t\t*goto_scene paraanimals\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t#Fine. I don't want to be in this organisation anyway. \n\t\t\t\t\tMerlinus lifts an eyebrow at you. You can tell he's not convinced that you're not just saying that to lessen the blow of failure. When you stay silent, he gives you what you suppose is meant to be an encouraging smile. \n\t\t\t\t\t\n\t\t\t\t\t\"Cheer up. Looks like this path was not meant to be, however when one door closes, another opens, as my mother used to say. Other opportunities are bound to show up, something you're more suited to.\"\n\t\t\t\t\t\n\t\t\t\t\tHis sentiments are meant kindly but they sound hollow to your ears. Silently you allow him to escort you to the door of the office and step through the portal back into your room. \n\t\t\t\t\t*achieve kickedout\n\t\t\t\t\t*goto_scene magician", "thankyous": "[b]References and Acknowledgements[/b]\n\nA big thank you goes out to all the kind folk on the choice of games website, who helped me with feedback and editing to get this to publishing! \n\n[b]Image acknowledgements:[/b]\n\nFront cover: \nStock image for the book: http://inadesign-stock.deviantart.com/art/Book-7-Stock-183357716\nBrushes/Stamps: http://spiritsighs-stock.deviantart.com/art/Magic-17786062\n\nBunyip Image is used under \"Public Domain\" permission from: \nABORIGINAL MYTHS. - THE BUNYIP (caption) - photomechanical reproduction : halftone. State Library of Victoria \nAccession Number: IAN01/10/90/12 Image Number: mp006089 \nNotes: Print published in the Illustrated Australian news. \nTitle printed below image l.c. \nPublication: Melbourne : David Syme & Co., Engraved in image l.l.: J. Macfarlane\n\n*image simbarsmall.jpg center\n*choice\n\t#[b]Return to the stats page[/b]\n\t\t*goto_scene choicescript_stats\n\n", "tsuchigumo": "The cool earthy scent of wet vegetation assails your nostrils as you walk onto the trail, the portal blinking out of existence behind you. Although the sun peeks though the dense vegetation directly overhead, it's obvious from the puddles and droplets of water that splash down as birds land in the branches above, that it had been raining quite heavily earlier on. You hope your luck holds and you won't need that raincoat. \n\nContinuing down the track, you come across a cleared area with a small fire pit. Just what you need, a camp site. You sit down on a fallen tree and contemplate what your next move is. \n\nLeafing through your magic book, there looks like two promising options. \n\n*choice\n\t#1) Use a divination spell to help locate the spider's lair.\n\t\tYou really need to find that spider and you have no idea how long the Guild is going to give you to do it. Better you actively go looking for it.\n\n\t\tThe first part of your plan involves readying two spells. One is a strong sleep spell to quickly stun the creature. It looks fairly straight forward and needs no special components but the amount of energy it appears to need is at your limits for your current level. You can probably manage one, possibly two of these spells if you're lucky, before you are not going to be good for much until you've had time to recover your energy levels. Another complicating factor is that you will need to drop any other spells you're actively holding due to the amount of power involved. \n\t\t\n\t\tYou hesitate, wondering if perhaps you should try something less energy intensive, however you decide to go with this spell reasoning that the Wizard's guild has never made anything easy, and you don't want an underpowered spell resulting in a lion sized spider crashing though your spell to take you down. \n\t\t*page_break\n\t\tThe second part of the plan is a binding spell, something to hold the sleep spell in place for a time since you don't think you'd be able to actively hold it for long. \n\t\t\n\t\tTrue to his word you reach into the wallet removing a long piece of roughly woven rope. You hope there's a pen or marker in the wallet also. Reaching into the wallet, up to shoulder level, you feel around blindly until you have a light bulb moment. [i]\"Marker!\"[/i] You think at the wallet. Instantly you feel something cylindrical in your palm. Pulling it out you're happy to see a sharpie. [i]Yes![/i]\n\t\t\n\t\tHmm maybe it'll work for other things too? You reach back into the wallet thinking [i]\"Net!\"[/i] Nothing happens. That's a shame, looks like it won't materialise anything you can imagine up, only what has been stored in there for you. \n\t\t\n\t\t*goto divination\n\t\t\n\t\n\t#2) Set up camp here and set a trap, hoping the presence of a \"hiker\" will be enough to entice the tsuchigumo to come to you. \n\t\n\t\n\t\t*goto camp\n\n \n \n \n*label divination\n*page_break\nRetrieving the marker, you set to work inscribing a series of symbols on the rope's rough surface. When satisfied you infuse the runes with a small amount of power making them shine momentarily with a bright yellow light before they disappear.\n \nYou pick the rope up, looking at it doubtfully. Apart from a slight tingle when you touch it, there's nothing to suggest it is anything but a normal non-magical piece of hiking equipment. You hope your spell has worked as it should. \n \nNext you find a small forked branch. Holding one piece of the fork in each hand you trickle some magic into the wood, willing it to locate the tsuchigumo's lair. \n \nThe branch takes on a life of its own as it twitches this way and that like a dog sniffing the air, then pulls you along off the track and into the undergrowth. \n \n*page_break\n \nThe whole experience is less pleasant than you had hoped with branches whipping at your face, unable to move them aside with both hands fixed to your divination rod. Finally the pulling sensation lessens as you arrive wet and scratched at the entrance to a hole in the side of the mountain. Mossy boulders outline the dark opening, draped with silken cobwebs. This looks like the right place. \n \nTucking the branch into the back of your trousers, you walk quietly forward to investigate the small cave. It's large enough for you to enter, although you would need to crawl on your hands and knees which is not making you feels great about the whole situation. Listening closely, there's no sounds apart from the normal forest babble of birds, insects and leaves. Of the interior of the cave you can see almost nothing as the narrow entrance results in the tunnel quickly falling into shadow. \n \nYou hesitate, debating whether to continue into the cave. Maybe tsuchigumo sleep during the day? You are really not certain. It could be quite bad if you're ambushed within the tight confines of the tunnel. \n \n*choice\n\t#Head back to the camp site and hope to ambush the spider instead. \n\t\tYou regard the darkened tunnel and decide against crawling inside. A better option would surely be setting a trap for the creature rather than heading into its nest.\n\t\t\n\t\tQuietly you retrace your steps back to the camp site. \n\t\t*goto camp\n\t\t\n\t#Enter the tunnel and hope for the best. \n\t\tYou procrastinate for a while at the cave's entrance, trying to think of a good reason not to proceed. Not just one but several come to mind, causing you to seriously consider the sanity of walking, no make that [i]crawling,[/i] straight into a giant spider's lair. In the end though you decide it's the only way to be sure you'll find the tsuchigumo. Besides which you're prepared with a stun and binding spell, it's not like you're going in unprotected. \n\t\t\n\t\tSighing you get down onto your hands and knees and enter the cave. \n\t\t\n\t\t*page_break\n\t\t\n\t\tThe ground starts off uneven with gaps in the tumbled rocks providing traps for unwary hands and feet. A short way in, the tunnel abruptly opens up so you can stand upright, if slightly hunched, and you realise a much larger cave system must have become partially blocked by a rockfall somewhere in the distant past.\n\t\t\n\t\tYou try to proceed forward into the tunnel feeling your way with your hands along the stone walls. Tacky strings of web cling to your arms, making you brush at them agitatedly as they tangle your limbs. Ultimately you give up on stealth creating a small glowing orb, rationalising that in the darkness you could walk straight into your target without ever seeing it and a small light should be the least of your concerns right now. \n\t\t\n\t\tYou are able to travel faster now by the light of the hovering blue orb as the tunnel slants downwards, deeper into the  Earth. Eventually your tunnel opens up into a wide cavern, your tiny light source not strong enough to reach the edges of the room. \n\t\t\n\t\t*page_break\n\t\t\n\t\tYou explore gingerly, threading though thic
