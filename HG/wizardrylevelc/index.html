kly draped cobwebs and loose stone on the floor. Despite your care you hear something crunch beneath your shoe, the sharp snapping sound reverberating loudly around the cavern. \n\t\t\n\t\tFreezing, you listen intently, awaiting an attack that doesn’t come. Maybe the spiders really do sleep soundly during the day? Allowing yourself to start breathing again, you direct your light down to see what it was that you stepped on. What you see makes you feel cold. \n\t\t\n\t\tTo your horror, you've wandered into a section of the cave littered with not stones, but bleached white bones. Several animals of various sizes hang cocooned in silken shrouds from the roof. As quickly as you dare, you back away from the chamber full of death. \n\t\t\n\t\t*page_break\n\t\t\n\t\tYou're now well and truly over messing about, you need to find this spider then get out of here. Your footfalls echo softly as you shuffle back towards the tunnel entrance. Wait what is that? You freeze again waiting for the echoes to die down. You can't be certain but you think there was a familiar tick of claws on stone. \n\t\t\n\t\tYou take a few more steps continuing to listen closely. Yes there it is again. You're being stalked, it's using your own steps to mask its approach. You try to keep your breathing even, not letting on you've discovered the tsuchigumo's presence in case it invites an immediate attack. \n\t\t\n\t\tRunning for the tunnel exit would be suicide. Seeing how fast the one back at the Guild headquarters was, it'd catch you long before you could make the awkward crawl through the last tunnel section. \n\t\t\n\t\tStraining your ears, you know which direction the spider is coming from. Although admittedly this does assume it hasn't switched to crawling silently though it's webs. You could strike out in that direction with your prepared sleep spell although this would mean having to drop your only light source. \n\t\t\n\t\tAlternatively, you could try flaring your light orb to locate the spider at worst, scare it away at best. However this may just give it better light to pounce on you by. \n\t\t\n\t\tWhat would you like to do?\n\t\t\n\t\t*choice\n\t\t\t#Go for the stun option. Drop the light source and strike with the sleep spell. \n\t\t\t\tIt's stalking you from the shadows for now, but that could change at any moment once it decides it has a clear opening to strike. You need to act now, before it has that chance. \n\t\t\t\t*goto sleepspell\n\t\t\t\t\n\t\t\t#Flare the light orb as brightly as you can. \n\t\t\t\tCareful to keep your breathing even you pause as if trying to get your bearings. Your skin crawls as you hear the occasional soft scrape on rock and rustle of webs being pushed aside. It takes all your determination not to react as the giant spider creeps up behind you. Finally you can bear it no longer. Squeezing your eyes almost shut, you funnel a powerful pulse of magic into your light orb causing it to flair with a blinding blue light. \n\t\t\t\t\n\t\t\t\tYou give an involuntary yelp of fear as the light illuminates a massive spider poised ready to pounce only a couple of feet from your position. The tsuchigumo reacts even more strongly to your bust of light as multiple eyes accustomed to seeing in the pitch black are suddenly exposed to painful brightness. With no eyelids to shield them from the light, the spider gives an inhuman shriek and scuttles backwards blindly in a tangle of legs. \n\t\t\t\t\n\t\t\t\tWith no time to think, you react on instinct. Dropping the orb, you call up the sleep spell and hurl it at the incapacitated arachnid.  The spell flies true and impacts the spider in a shower of green sparks causing it to crash to the ground, legs twitching convulsively before lying still. The light from the spell quickly fades leaving you in the dark.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tPanicking you try to bring up another light source. Weakened, it takes a few tries to produce a faint flickering globe. To your relief the spider is still where it collapsed under the spell. It looks like the magic is holding...for now at least.\n\t\t\t\t\n\t\t\t\tTentatively you edge forward, hoping this is not some kind of tactic of the creature to lull you into a false sense of security and draw you in close enough to attack. You reach out with a foot and nudge one of the spider's legs, jumping backwards as you expect it to leap up. When there's no reaction you become bolder, leaning in closer, you watch the rhythmic rise and fall of the polished black abdomen covered in coarse brown hair. Approaching its head, the opaque black eyes tell you nothing, however there seems to be a vacancy there which suggests the creature really is asleep. With a shudder, you study the long tapered fangs which have a toxin beading in readiness at their tips. You don't want to think about how closely this one came to ending badly.\n\t\t\t\t\n\t\t\t\tRetrieving the enchanted rope from the wallet, you gingerly reach around the thorax, circling the creature's bulk and hastily knotting it to activate the spell. With the rope now glowing with a golden light, you sit down hard as the adrenaline rush subsides leaving only exhaustion in its place. \n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tShivering as the cold creeps in from your seat on the ground you review your options. The spider is too heavy to move manually and you've got precious little left in the way of magic reserves, barely enough to keep your small orb alight. You're not even sure you have enough energy to make it back outside unaided and to be honest you'd like some prior warning if it seems like your spell is starting to wear off. The tsuchigumo is probably going to be very unhappy with you when it wakes and you do not want to be caught unawares. No, you'll stay here and wait it out you decide. \n\t\t\t\t\n\t\t\t\tTime travels slowly when you're trapped in the dark with a giant spider. You jump at every sleepy click of its mandibles and twitch of its jointed legs. As you wait in the dark it occurs to you that there may be more than one spider living in this cave. What if another one turns up? You don't have enough energy for another fight. You've almost lost your nerve and decided to get out of there regardless of the consequences when you hear a familiar voice. \n\t\t\t\t\n\t\t\t\t\"$!{name} we're coming in. Are you all right?\"\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tYou sag with relief. Finally it's over. \"Yes I'm over here, in the cavern!\"\n\t\t\t\t\n\t\t\t\tA dirt encrusted Merlinus appears at the cavern entrance by the light of several brightly glowing orbs. Seeing your sleeping companion he hurries over and check the binding. Satisfied he turns back to you. \n\t\t\t\t\n\t\t\t\t\"Good job with that binding spell, looks like it'll stay sleeping for a number of hours yet. Are you ok, it didn't bite you did it?\"\n\t\t\t\t\n\t\t\t\tYou shake your head, \"Just very tired.\"\n\t\t\t\t\n\t\t\t\t\"Of course, come on I'll help you out.\" He offers you a warm hand and hauls you to your feet. \n\t\t\t\t\n\t\t\t\t\"What about the spider?\" You gesture to the sleeping arachnid.\n\t\t\t\t\n\t\t\t\t\"It's ok, I've brought in some help to take it from here.\" In your exhaustion and fixation on the tsuchigumo, you hadn't noticed to more forms following Merlinus into the cave. Standing at the entrance is a heavy set fellow with a long black beard, and a slight pale woman with pixie like features. Merlinus waves them forward as he propels you back down the tunnel. The woman gives you an encouraging smile before turning to focus on the spider. \n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tFinally back out in the open, you breath the fresh air deeply, in the dusky light. \n\t\t\t\t\n\t\t\t\t\"That was well handled $!{name}\" He claps you on the back, making you stagger slightly in your weakened state. Oblivious Merlinus continues. \"I'd say that was a definite pass on what was a very challenging assignment. Well done!\"\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t*if (fail = 3) #So I passed? I can stay in the Guild?\n\t\t\t\t\t\t\"I'll say, I'd be happy for you to continue under my supervision until you can get a full licence.\" Merlinus smiles brightly at you as if the thought of being a dogsbody for another couple of months is the best thing that had ever happened to you. \n\t\t\t\t\t\t\n\t\t\t\t\t\tWell at least you get to stay and keep your magic. And they're always be another chance to get your licence. If you can pass the tricky final exam, making up a few mid-semester assignments can only be child's play after this. The thought makes you feel brighter already. Then Merlinus says something that makes your day complete. \n\n\t\t\t\t\t\t\"I know it's been a hard couple of months adjusting for you, so I've decided you need a holiday. I'm taking you off the active duty roster for a month, no one will bother you, although you can contact me if you need anything. Just rest up, read up and I'll expect great things from you on your return.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"A holiday to catch up sounds wonderful. You think you'll start your R&R period by having a nice long sleep in.\" As if reading your mind, Merlinus gives you a knowing smile, sending you home with a flick of his fingers. \n\t\t\t\t\t\t*achieve apprentice\n\t\t\t\t\t\t*set good_standing +10\n\t\t\t\t\t\t\n\t\t\t\t\t\t*page_break\n\n\t\t\t\t\t\tThank you for Playing Wizardry Level C. \n\n\t\t\t\t\t\tThis adventure is over, however there are still many other choices that can be made. \n\n\t\t\t\t\t\tWould you like to play again?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Reload from the last checkpoint. (The magical creatures habitat area). Please note some paths may not be available due to saved stats for this point.\n\t\n\t\t\t\t\t\t\t\t*set good_standing -10\n\t\t\t\t\t\t\t\t*set occupation \"Wizard Level C: On Probation\"\n\t\t\t\t\t\t\t\t*set finalexamfail 0\n\t\t\t\t\t\t\t\t*set spiderknow 0\n\t\t\t\t\n\t\t\t\t\t\t\t\tThe world fades around you, then snaps back into sharp focus, leaving you with the odd sense of deja vu. \n\t\t\t\t\n\t\t\t\t\t\t\t\tWhat were you doing again? You look around, seeing Merlinus walking away through the rows of offices at the guild's headquarters. You hurry to catch up to him.\n\t\t\t\t\t\t\t\t*goto_scene paraanimals\n\n\t\t\t\t\t\t\t#Restart from the beginning.\n\t\t\t\t\t\t\t\t*goto_scene ending \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t*if (fail \u003c 3) #So I've passed for real this time? No more tests?\n\t\t\t\t\t\t\"For real this time.\" Merlinus confirms with a large smile. \"Congratulations $!{name} $!{lastname} officially a full level C Wizard!\"\n \n\t\t\t\t\t\tYou try to cheer but the effort makes you almost fall, Merlinus catches you by the arm. \"Well how about I send you home for some rest, you can come by the office tomorrow and we'll get all your paperwork sorted.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tNothing could sound better right now. With a flick of his fingers the old wizard sends you back to your house, without even changing you collapse on the bed. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Wizard $!{name} $!{lastname}. That has a nice ring to it.\" you murmur sleepily as you drift off to sleep. \n\t\t\t\t\t\t*achieve passb\n\t\t\t\t\t\t*set occupation \"Wizard: Level C\"\n\t\t\t\t\t\t*set good_standing +10\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t*page_break\n\n\t\t\t\t\t\tThank you for Playing Wizardry Level C. \n\n\t\t\t\t\t\tThis adventure is over, however there are still many other choices that can be made. \n\n\t\t\t\t\t\tWould you like to play again?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Reload from the last checkpoint. (The magical creatures habitat area). Please note some paths may not be available due to saved stats for this point.\n\t\n\t\t\t\t\t\t\t\t*set good_standing -10\n\t\t\t\t\t\t\t\t*set occupation \"Wizard Level C: On Probation\"\n\t\t\t\t\t\t\t\t*set finalexamfail 0\n\t\t\t\t\t\t\t\t*set spiderknow 0\n\t\t\t\t\n\t\t\t\t\t\t\t\tThe world fades around you, then snaps back into sharp focus, leaving you with the odd sense of deja vu. \n\t\t\t\t\n\t\t\t\t\t\t\t\tWhat were you doing again? You look around, seeing Merlinus walking away through the rows of offices at the guild's headquarters. You hurry to catch up to him.\n\t\t\t\t\t\t\t\t*goto_scene paraanimals\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t\t\t#Restart from the beginning.\n\t\t\t\t\t\t\t\t*goto_scene ending \t\t\n \n*label sleepspell\n \nKeeping your breathing as steady as you can so as not to tip off the spider that you've noticed its presence, you gather the energy needed to cast the sleeping spell. You continue to listen intently for any sign of the spider but hear nothing. It must still be hiding in the dark behind you. \n \nWith a quick motion you extinguish your light and cast the spell out into the darkness, holding your breath waiting for the energy to impact... \n \nAnd impact it does, striking the far wall of the cavern in a shower of bright green sparks which fade rapidly into darkness. In the fading light you frantically search for your target, panicking that it is nowhere to be seen. \n*page_break\nWithout warning a large multi-limbed body lands on top of you knocking you to the ground. [i]\"It must have been hiding in the webs above me.\"[/i] You think while trying to throw your attacker off you. \n \nYour fists meet an unyielding carapace, hard and slick, causing your hands to slip when you try to get a grip on the animal. When a leg comes within range, you grab for it, giving it a hard twist which causes the spider to scream with the sound of nails down a chalkboard. \n \nTwisting in your grip it sinks twin fangs into your shoulder, causing burning tendrils of agony to spread though your body with each beat of your heart. The pain makes you gasp as you try in vein to crawl away but everything spins out of focus, as your muscles go limp and you fall into unconsciousness. \n \n*page_break\n \n\"$!{name}? Hey $!{name} come on, come back to us!\" The voice sound fuzzy and far away. All you want to do is sleep, blocking out the annoying voice you slip back towards unconsciousness. \n \n[b]SLAP[/b]\n \n\"$!{name} wake up!\"\n \nThe sting in your cheek brings more of a reaction. Your eyes flutter open you try to focus on the human sized shape in front of you. Everything is blurry and grey. Why won't they just let you sleep?\n*page_break\n\"Oh thank goodness, you're still with us!\" the voice continues. \"Here drink this down.\"\n \nA foul tasting concoction is forced into your mouth making you gag. You try to lift your arms to push him away, but suddenly realise they're bound to your side. As the potion kicks in and awareness floods back, you start to struggle wildly as you recognise you're cocooned in thick silk strands, all set for a tsuchigumo's dinner. \n \nHands hold you down. \"Calm down, it's all right now. The spider's gone, relax.\"\n \nEasy for him to say, he's not the one tied up in spider silk you think acidly. As your eyes adjust you make out the form of Merlinus leaning concernedly over you by the light of several glowing orbs. Somewhere out of sight you can hear the murmur of several other voices. \n\n*page_break\n\nSeeing the recognition in your eyes, the wizard relaxes his grip on your shoulders. \"Welcome back. I really thought I'd lost you there for a minute. Never lost a student myself, not about to start now.\"\n \n\"The tsuchigumo...\" you begin.\n \n\"We know, it bit you.\" Merlinus finishes for you. \"That potion I fed you was the antivenene. Doesn't taste particularly good but effective.\" Traces of his normal humour are starting to return as he decides you're going to be ok. \n \n\"It's ok, we've captured it already, it's on it's way to headquarters as we speak.\" He looks you up and down. \"That's where I'm taking you as soon as you're stable enough to teleport as well.\"\n \n\"Guess I failed that one.\" you trail off weakly. \n \nThe wizard shakes his head, then chuckles softly. \"You almost die and what you're most worried about is a test score. Time for that later. You can spend some extra time as an apprentice under my care and we'll arrange for another test when I think you're more ready. For now, you'll get to explore another area you shouldn't be in, the hospital wing!\"\n \nMerlinus' Apprentice you think hazily, definitely could be worse. You slip back into unconsciousness as you're transported back to headquarters.\n*achieve apprentice\n*set good_standing +10\n\n\t\n\n*page_break\n\nThank you for Playing Wizardry Level C. \n\nThis adventure is over, however there are still many other choices that can be made. \n\nWould you like to play again?\n*choice\n\t#Reload from the last checkpoint. (The magical creatures habitat area). Please note some paths may not be available due to saved stats for this point.\n\t\t*set good_standing -10\n\t\t*set occupation \"Wizard Level C: On Probation\"\n\t\t*set finalexamfail 0\n\t\t*set spiderknow 0\n\t\t\t\t\n\t\tThe world fades around you, then snaps back into sharp focus, leaving you with the odd sense of deja vu. \n\t\t\t\t\n\t\tWhat were you doing again? You look around, seeing Merlinus walking away through the rows of offices at the guild's headquarters. You hurry to catch up to him.\n\t\t*goto_scene paraanimals\n\t\t\t\t\t\t\n\t\n\t#Restart from the beginning.\n\t\t*goto_scene ending  \n \n\n \n*label camp\n*page_break\nThere's still a number of daylight hours left and you decide to put them to good use. It's a shame there's the spectre of giant man-eating spiders hovering over the whole experience as otherwise you probably would have enjoyed the peaceful wilderness with its fluttering butterflies and bird calls echoing amongst the trees. \n \nFirst to set up your camp. You find a tent in the pocket dimension wallet and prop it up in the clearing, then build a smoky fire that you hope will give away your presence to anyone in the area.\n \nNext you decide on building some wards. They're tricky in that you need smooth enough ground to draw the circles in unbroken, making the inner edge closer to your tent than you would have preferred, but there's no help for it. Reaching into your bottomless wallet, you find a bottle of table salt and some quartz, using them to mark out the inner and outer boundaries of the trap in a doughnut shape around the clearing. Carefully you cover the trails of salt and marks carved into the ground with a fine layer of dirt and leaves that should hide it from casual inspection, especially in the darkness. \n\n*page_break\n \nThe wards have taken you some time to build and you're fast heading towards twilight. Just enough time to prepare one more spell in case the ward isn't enough to hold the giant spider. Searching though the book you find a relatively straight forward spell that should stun what ever it hits, rapidly sending it into a deep sleep for a number of hours.\n \nThe spell seems suitable, being basic to set up and needing no special ingredients to prepare, however the amount of energy it appears to need is at your limits for your current level. You can probably manage one, possibly two of these spells if you're lucky before you are not going to be good for much until you've had time to recover. \n\nAnother complicating factor is that you will need to drop any other spells you're actively holding, including the ward that prevents it from getting to you or escaping, due to the amount of power involved. Still, hopefully you won't need it anyway, and you need to decide on something now before the light fades and decide to set about preparing this one.\n \n*page_break\n  \nDusk falls, quietening the birds and bringing annoying buzzing insects out to nip at your exposed arms and face. To your annoyance, the wallet with all of its survival gear seems to be lacking in bug repellent. You don't dare set up a spell to send them away in case the tsuchigumo have some kind of magical senses, you need all the advantages you can get, which includes taking the creature by surprise. \n \nAs the darkness settles, even the bugs seem to take off, leaving the forest in an eerie silence broken only by the crackle of your fire. You shiver involuntarily, leaning closer into the welcoming orange light. \n \n*page_break\n \n*choice\n\t#Sing a camp fire song to pass the time.\n\t\tThe unnatural silence is really getting on your already frayed nerves. You start to hum softly. When nothing launches itself from the trees, you pick up confidence and before long have launched into a loud rendition of\n\t\t*choice\n\t\t\t#Kumbayah\n\t\t\t\tUm quite.. yes a loud rendition of Kumbayah.\n\t\t\t\t\n\t\t\t\t[i]\"Kumbayah my Lord, Kumbayah. Kumbayah my Lord, Kumbayahhh!\"[/i] Nerves are straining your voice making it sound a bit squeaky and out of tune but hey, it's better than the silence.\n\t\t\t\t\n\t\t\t\t[i]\"Someone's laughing Lord, Kumbayah...\"[/i] You're definitely not the one laughing you reflect. You hope it's not the tsuchigumo that is. Despite your lusty singing, you're still on high alert, eyes and ears scanning the night for anything out of place. You think there might have been the faint sound of some leaves being crushed underfoot to your left. Realising you've paused your song, you continue. \n\t\t\t\t\n\t\t\t\t[i]\"Someone's Crying Lord...Kumbayah...\"[/i] The sound of a small twig snapping. Yes definitely something out there. All of a sudden you're not certain about your song choice any more. Singing about crying with a giant spider hunting you down is not helping. \n\n\t\t\t\t[i]\"Kumbayah...\"[/i] The night is broken by the high pitched screech of a large multi-limbed creature throwing itself directly at you....guess it didn't like your singing after all.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t*goto aftersong\n\t\t\t\t\n\t\t\t#U Smile by Justin Beiber\n\t\t\t\tWell who says it has to be a traditional camp fire song? You launch straight into the refrain which you think went something like this from memory.\n\n\t\t\t\t[i]\"You smile, I smile, Hey hey hey hey, You smile, I smile, I smile, I smile...\"[/i]\n\t\t\t\t\t\n\t\t\t\tA loud screech which sounds like nails being dragged down a chalkboard, stops you in your tracks. It seems like the tsuchigumo doesn't like your singing or maybe it's just the song choice? \n\t\t\t\t\t\n\t\t\t\tA large multi-limbed creature springs out of a nearby tree, hurtling straight towards you.\n\t\t\t\t*goto aftersong\n\t\t\t\t\n\t\t\t\t\n\t\t\t# A half remembered song about spiders.    \n\t\t\t\tOk point taken, it probably is a bad idea to start up a song about spiders while you wait alone in the dark for a giant arachnid to try to kill you, but it's one of those annoying tunes that try as you might, you can't get out of your head. Taking a deep breath you start to hum softly, the whining tune rising and falling rhythmically as you try to remember the exact lyrics, voice echoing through the otherwise quiet forest. \n\t\t\t\t*page_break\n\n\t\t\t\t[i]\"Spider, spider on the wall.....creeping, crawling, hairy and small.....\" [/i]\n\n\t\t\t\tWhat was that! You break off your song searching the darkness. You could have sworn there was an odd scraping sound coming from the woods. The fire crackles contentedly beside you, otherwise there's not a sound. After a few minutes of barely breathing, waiting for the attack, you finally let out a sigh of relief. This whole thing really does seem to have you on edge. The song's still running though your head so you continue to sing from where you left off.\n\n\t\t\t\t[i]\"All at home in the darkest night....Disappears with the morning light....\"[/i]\n\n\t\t\t\tYou pause, there it is again, no doubt about it. The sound ceases as the echos of your voice fade. Ok, might as well see what it is. You take up the song again, a bit louder this time, wobbling distractedly over the notes as you wait tensely.\n\n\t\t\t\t*page_break\n\n\t\t\t\t[i]\"Completely still with a many eyed glare.....He peeks from out of his web draped lair...\"[/i]\n\n\t\t\t\tYou think you can glimpse something moving stealthily around the edges of the clearing. You need to keep singing, how did the rest of the song go again? Something about eyes? Yes that's it...\n\n\t\t\t\t[i]\"With so many eyes he cannot help but see.... Perhaps he is as scared as me?\"[/i]\n\n\t\t\t\tYou seriously doubt that this is the case, as a gigantic black spider skitters into view, long fangs shining in the firelight. She crawls towards you deliberately on eight bristled legs, seemingly attracted by your singing. Well here goes, you just need her a little closer. \n\n\t\t\t\t[i]\"Spiiider on my walllll...\"[/i]\n\n\t\t\t\tCome on just a few more feet\n\n\t\t\t\t[i]\"Slient, stealthy, watcher smallll...\"[/i]\n\n\t\t\t\tThere!\n\n\t\t\t\t*page_break\n\n\t\t\t\tBreaking off the song you snap your fingers, triggering the ward with a flair of light and trapping the unsuspecting arachnid in a ring between the edge of your camp site and the forest. \n\n\t\t\t\tThe effect is immediate. The previously cautious tsuchigumo springs towards you with blinding speed, fangs extending for the kill. With a sharp crack, the arachnid hits the barrier which thankfully holds, flinging her backwards where she sprawls in a tangle of legs. \n\n\t\t\t\t*page_break\n\n\t\t\t\t*goto aftersong2\n\t\t\n\t#Cook some food on the fire. \n\t\tYou don't feel like singing, besides which your stomach is uncomfortably empty and is rumbling loudly in protest. Reaching into your bottomless wallet, you pull out a bag of marshmallows. That'll do. \n\n\t\tThe plastic bag crackles as you rip it open and start poking marshmallows onto the end of a long stick. Hang on.... You listen intently, that last sound didn't come from you. There's something out there in the forest. It's quiet, but the occasional snapping twig or rustle of leaves is gives it away. \n\t\t\n\t\tYou continue to behave as nonchalantly as possible, fussing over the marshmallows, appearing oblivious to what it happening beyond the pool of light cast by your fire. \n\t\t\t\t\n\t\tEven knowing something is lurking nearby, it still takes you by surprise when a large multi-limbed shape, hurtles into view hissing as it fixes you with it's multiple reflective eyes.\n\t\t*goto aftersong\n\t\t\n\t\t\n*label aftersong\n*page_break\nYou flinch back involuntarily as the spider exposes long pointed fangs, ready to sink into your flesh, when it hits the air about 2 feet from your position with a crackle sprawling. With a quick word you bring the outer ward on line, trapping the spider in a ring between you and the forest. \n*goto aftersong2\n\n*label aftersong2\nThe spider regains her feet and stalks towards you, more carefully now. Legs waving, she traces the barrier, looking for a weakness. Finding none she turns to face you. The noise she makes is the sound of old, crackling paper interspersed with clicks but seems to have a pattern. Listening closer, you think it might be some kind of language.  \n\nSome skill in languages might help you out here. (That is if the spider is even speaking a human language at all.) Can you understand anything other than English?\n*choice\n\t#You kidding me? I'm a whiz at languages. I'm most fluent in: \n\t\t*goto language\n\t\t\n\t#English, that's it. (Although I speak it very well thank you very much!)\n\t\t*goto dontunderstand\n\n\n*label language\n*hide_reuse\n*Choice\n\t#Japanese\n\t\tYou listen harder to the whispery voice. Although difficult to understand, you recognise some of the words as being Japanese. Makes sense you figure for a creature living in Japan after all. \n\t\t\n\t\tYou interject, asking the spider to continue more slowly. If the spider is surprised at your comprehension, she doesn't show it, just moderating the speech to a slower pace which you can understand. \n\t\t\n\t\tIt seems she is angry about the abduction of her mate recently by wizards and is holding them, and you by default, responsible for all the disappearances. \n\t\t\n\t\t*page_break\n\t\t\n\t\t\"Wait.\" you stop her. \"I think we do have your mate.\" \n\t\t\n\t\tShe hisses angrily, pressing into the ward, making you gasp as you have to pour more energy into the field to keep it upright.\n\t\t\n\t\t\"No, please keep calm, he was only brought in for attacking hikers, I know nothing of the \"others\" you speak of.\" Her soft voice continues rapidly. It seems she doesn't entirely believe you. Abductions have been occurring for months. The truce has been broken, they will defend themselves.\n\n\t\tIt sounds like someone or something has been catching tsuchigumo and spiriting them away for unknown reasons. When you last spoke to Merlinus, he seemed in the dark as to the motives behind the spiders recent attacks, it's likely he doesn't know about the other disappearances either. Catching those responsible could go a long way to restoring peace to the forests. The tsuchigumo stares at you with flinty eyes reflecting the fire light, expressionless and alien. How to get her to trust you?\n\t\t\n\t\tYou could release her as a gesture of good will (and hope she doesn't run off, or worse gather a larger force to attack you). After all, you are just taking her word from it that the tale you've been told is actually true. Or you can try and hold the spider in your ward, continuing to talk to her until back up arrives to decide what to do with her from there. \n\t\t\n\t\tDecide.\n\t\t*choice\n\t\t\t#Release the spider.\n\t\t\t\tYou take a deep breath. Trust needs to occur on both sides and it's not looking like the tsuchigumo will give it first. After all, your kind are responsible for kidnapping her mate in her mind. \n\t\t\t\t\n\t\t\t\t\"We are not responsible for the other abductions.\" you tell her levelly. \"I will make sure it is looked into though, as well as the situation of your mate being held at the Guild. As a show of faith, I'm going to release you now.\" \n\t\t\t\t\n\t\t\t\tCareful to keep the innermost ward between yourself and the spider alive, you dismiss the barrier between the creature and the forest. She pauses for a few seconds, giving you an unreadable look, then skitters away into the trees. \n\n\t\t\t\tThe rest of the night passes quietly. You hope you don't get into too much trouble over releasing a dangerous creature back into the forest. \n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tAfter a fitful nights sleep, you're awake with the dawn, stiff and cold from sitting upright against the side of your tent. Although no threats were made by the fleeing spider, you couldn't bring yourself to let your guard down and sleep peacefully within your shelter. The fire has long since burnt to ashes, not wanting to leave your warded sanctuary to gather more wood to keep it going. \n\t\t\t\t\n\t\t\t\t\"You look terrible!\" Merlinus appears in the clearing dressed warmly in a long frayed woollen coat. He looks around. \"No tsuchigumo? It was definitely here earlier though.\" He gestures to the tracks in the dirt and burnt out warding lines. \n\t\t\t\t\n\t\t\t\tYou quickly give him a run down of the night's events. He nods along. \"No you did the right thing. No use provoking them further by detaining more of their kind until we've had a chance to investigate her claims. Could be hard though, we're going to have to start up surveillance of the area to try and catch them in the act, not an easy task given the terrain and that our presence here today has probably not gone unnoticed.\"\n\t\t\t\t\n\t\t\t\tThe morning sun casts a warming glow over the clearing, dispelling the terrors of the night before. \n\t\t\t\t\n\t\t\t\t\"What's this?\" you say aloud, walking the edge of the clearing. Catching the light reflectively is a curved golden knife, strung from a branch by a cord of spider silk. The hilt inscribed with elaborate patterns. \n\t\t\n\t\t\t\tPulling the weapon down, Merlinus turns it over in his hands. \n\t\t\t\t\n\t\t\t\t\"Now this is interesting.\" he murmurs. He points to a stamp on the butt of the knife \"See this mark? It's the sign of a rouge group of bounty hunters. Amongst other things, they specialise in smuggled goods and animals. Definitely a place to start the investigation with.\"\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\"Well done $!{name}, this shows real initiative. Even though you haven't caught the tsuchigumo, it looks like you've achieved one better in convincing one to trust us enough to give us the means to put a stop to the problem at its source. I'm giving you a passing mark for this assignment. \n\t\t\t\t*choice\n\t\t\t\t\t*if (fail = 3) #So I passed? I can stay in the Guild?\n\t\t\t\t\t\t\"I'll say, I'd be happy for you to continue under my supervision until you can get a full licence.\" Merlinus smiles brightly at you as if the thought of being a dogsbody for another couple of months is the best thing that had ever happened to you. \n\t\t\t\t\t\t\n\t\t\t\t\t\tWell at least you get to stay and keep your magic. And they're always be another chance to get your licence, if you can pass the tricky final exam, making up a few mid-semester assignments can only be child's play after this. The thought makes you feel brighter already. Then Merlinus says something that makes your day complete. \n\n\t\t\t\t\t\t\"I know it's been a hard couple of months adjusting for you, so I've decided you need a holiday. I'm taking you off the active duty roster for a month, no one will bother you, although you can contact me if you need anything. Just rest up, read up and I'll expect great things from you on your return.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"A holiday to catch up sounds wonderful. You think you'll start your R&R period by having a nice long sleep in.\" As if reading your mind, Merlinus gives you a knowing smile, sending you home with a flick of his fingers. \n\t\t\t\t\t\t*achieve apprentice\n\t\t\t\t\t\t*set good_standing +10\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t*page_break\n\n\t\t\t\t\t\tThank you for Playing Wizardry Level C. \n\n\t\t\t\t\t\tThis adventure is over, however there are still many other choices that can be made. \n\n\t\t\t\t\t\tWould you like to play again?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Reload from the last checkpoint. (The magical creatures habitat area). Please note some paths may not be available due to saved stats for this point.\n\t\t\t\t\t\t\t\t*set good_standing -10\n\t\t\t\t\t\t\t\t*set occupation \"Wizard Level C: On Probation\"\n\t\t\t\t\t\t\t\t*set finalexamfail 0\n\t\t\t\t\t\t\t\t*set spiderknow 0\n\t\t\t\t\n\t\t\t\t\t\t\t\tThe world fades around you, then snaps back into sharp focus, leaving you with the odd sense of deja vu. \n\t\t\t\t\n\t\t\t\t\t\t\t\tWhat were you doing again? You look around, seeing Merlinus walking away through the rows of offices at the guild's headquarters. You hurry to catch up to him.\n\t\t\t\t\t\t\t\t*goto_scene paraanimals\n\t\t\t\t\t\t\n\t\n\t\t\t\t\t\t\t#Restart from the beginning.\n\t\t\t\t\t\t\t\t*goto_scene ending  \n \n\n\t\t\t\t\t\t\n\t\t\t\t\t*if (fail \u003c 3) #So I've passed for real this time? No more tests?\n\t\t\t\t\t\t\"For real this time.\" Merlinus confirms with a large smile. \"Congratulations $!{name} $!{lastname} officially a full level C Wizard!\"\n \n\t\t\t\t\t\tYou try to cheer but the effort makes you almost fall, exhausted from the effort of spell casting combined with a sleepless night in the forest. Merlinus catches you by the arm steadying you. \"Well how about I send you home for some rest, you can come by the office tomorrow and we'll get all your paperwork sorted.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tNothing could sound better right now. With a flick of his fingers the old wizard sends you back to your house, without even changing you collapse on the bed. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Wizard $!{name} $!{lastname}. That has a nice ring to it.\" You murmur sleepily as you drift off to sleep. \n\t\t\t\t\t\t*achieve passb\n\t\t\t\t\t\t*set good_standing +10\n\t\t\t\t\t\t*set occupation \"Wizard: Level C\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t*page_break\n\n\t\t\t\t\t\tThank you for Playing Wizardry Level C. \n\n\t\t\t\t\t\tThis adventure is over, however there are still many other choices that can be made. \n\n\t\t\t\t\t\tWould you like to play again?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Reload from the last checkpoint. (The magical creatures habitat area). Please note some paths may not be available due to saved stats for this point.\n\t\t\t\t\t\t\t\t*set good_standing -10\n\t\t\t\t\t\t\t\t*set occupation \"Wizard Level C: On Probation\"\n\t\t\t\t\t\t\t\t*set finalexamfail 0\n\t\t\t\t\t\t\t\t*set spiderknow 0\n\t\t\t\t\n\t\t\t\t\t\t\t\tThe world fades around you, then snaps back into sharp focus, leaving you with the odd sense of deja vu. \n\t\t\t\t\n\t\t\t\t\t\t\t\tWhat were you doing again? You look around, seeing Merlinus walking away through the rows of offices at the guild's headquarters. You hurry to catch up to him.\n\t\t\t\t\t\t\t\t*goto_scene paraanimals\n\t\t\t\t\t\t\n\t\n\t\t\t\t\t\t\t#Restart from the beginning.\n\t\t\t\t\t\t\t\t*goto_scene ending  \n \n\n\t\t\t\t\n\t\t\n\t\t\t#Hold the wards and continue to try and talk to her. \n\t\t\t\tThere's no telling what will happen if you release the spider, you decide it's safer to keep her contained. \n\t\t\t\t\n\t\t\t\tYou try to talk to the tsuchigumo, explaining that you would like to hear more about what has been going on so you can help them to the best of your ability. Besides which, your supervisor would be here soon and could help sort this mess out. \n\t\t\t\t\n\t\t\t\tThe spider stiffens at the mention of more wizards arriving in the forest. With a screech about traps she starts throwing herself at the wards, causing them to fizzle with rippling energy. \n\t\t\t\t\n\t\t\t\tYou wince at each shimmering impact. The spider is strong, much more so than her size would indicate. Keeping the wards intact is taking all your focus and a continuous drain of energy to maintain. The spider can't keep this up forever, however you're uncertain who will tire first, you or her. You've got a decision to make.\n\t\t\t\t*set spiderknow 1\n\t\t\t\t*goto warddecide\n\t\t\n\t#Klingon\n\t\tYou've always prided yourself on your knowledge of the Klingon language, often greeting people with \"NuqneH!\" (Which either gets you a strange look or an enthusiastic response, depending on whether the person has the slightest clue to what you're on about.) \n\t\t\t\t\n\t\tUnfortunately, the tsuchigumo doesn't seem to have attended many Star Trek conventions and is not speaking Klingon. \n\t\t\t\t\n\t\tDo you know any other languages?\n\t\t*goto language\n\t\t\n\t#Pig Latin\n\t\tEriouslysay? Ouay areyay oingay otay ountcay Igpay Atinlay asay aay anguagelay ouya areay killedsay inay? Okay hentay...\n\t\t\n\t\tPredictably the creature is [i]not[/i] speaking Pig Latin. \n\t\t\n\t\tDo you know any other languages which might be of help?\n\t\t*goto language\n\t\t\t\n\t#Something else\n\t\t*label input_language2\n\t\tWhat do you speak?\n\t\t*input_text language2\n\t\t*set language2 \"${language2}\"\n\t\t*page_break\n\t\tYou speak ${language2} well enough to realise that this is definitely not what the spider is speaking. Your trained ear does pick up the rhythm of a true language, you're just not sure that you can understand what she's saying. \n\t\t\n\t\tDo you speak any other languages which might be of help?\n\t\t*goto language\n\t\t\n\t#Nothing else\n\t\t*goto dontunderstand\n\t\t\t\n\t\t\t\n\t\t\t\n\t\t\t\n\t\t\t\n\t\t\t\n\t\t\t\t\n\t\t\n*label dontunderstand\nTry as you might, you can't seem to make out anything the creature seems to be trying to say to you. You try speaking to her in English, but it's obvious that she understands as much of your speech as you do of hers.\n\t\nHer tone seems to be getting progressively more agitated until finally she gives up with a hiss and proceeds to begin throwing herself at the wards trying to break her way out. \n\t\nYou wince at each shimmering impact. The spider is strong, much more so than her size would indicate. Keeping the wards intact is taking all your focus and a continuous drain of energy to maintain. The spider can't keep this up forever, however you're uncertain who will tire first, you or her. You've got a decision to make.\n*goto warddecide\n\t\n*label warddecide\n*choice\n\t#Continue to hold the wards and keep the spider contained until she calms down. \n\t\tYou can do this! All you need to do is keep the wards up for a bit longer and the spider has to start to tire. The way she's slamming into the walls makes you concerned about how injured she will be by the time she gets to that point though. \n\t\t\t\n\t\tCalling out in calming tones makes no difference to her behaviour and to your alarm you notice smears of dark ichor on the ground where her carapace has been scraped and gorged by rocks and branches lying around the clearing. \n\t\t\t\n\t\tThe constant barrage is also taking its toll on you. Shakily you sink to your knees, squeezing your eyes closed for focus as you continue to pour all your strength into the barrier. Which each blow, you feel your energy sinking to dangerous levels as you struggle to maintain control. Suddenly you're thrown to the ground with the sensation of a giant rubber band being cut, the snap of your energy weaves being shattered as the tsuchigumo forces her way though your weakening wards. \n\t\t*page_break\n\t\t\n\t\tWeakly you raise yourself up onto your hands and knees, knowing there's no way you can stop the spider from killing you if she wishes. The tsuchigumo looks as if she's faired little better than you. Pulling herself up off the ground where she'd collapsed with the effort of forcing her way though the magical barrier, she hobbles on shaky legs back towards the trees. One of her legs dangles, dragging behind her with a trail of blue hued blood. Giving you a final glance she disappears into the darkness, obviously no more up for a fight than you are at this point in the proceedings. \n\t\t\t\n\t\tDespite trying to remain on guard, weakness from the backlash overtakes you and you sink into unconsciousness. \n\t\t*goto notcontain\n\t\t\t\n\t#Drop the wards and try to hit her with the stun bolt before she can escape or take you out first.\n\t\tWith each impact, your energy reserves are being drained lower and lower. Soon you won't have enough power left for the stun spell at all and where will that leave you if she breaks through your wards? It's now or never. \n\t\t\t\n\t\tGathering all your remaining energy you shape the spell. \n\t\t\t\n\t\t[i]Now![/i]\n\t\t\t\n\t\tDropping the wards you take advantage of the tsuchigumo's momentary confusion as her lunge sends her sailing through the air instead of banging up against a wall, causing her to land awkwardly with half her legs folded underneath her. \n\t\t\t\n\t\tBefore she can rise, you cast the spell seeing it impact with a satisfying shower of green sparks which envelop the spider. The tsuchigumo wobbles on her feet, legs collapsing but still carrying her inexorably forward, forcing you towards the edge of your fire lit clearing. \n\n\t\tDesperately you try to draw more energy for another spell but it's like trying to grasp air. There's no magical reserves left to draw on and the effort has left you too weak to run far. You see your face reflected in the multiple black orbs of the tsuchigumo's eyes as you back up against a tree. \n\t\t\t\n\t\tWith a hiss, she tries to lunge for you, falling short to collapse twitching on the ground. You take a shaky breath of air. That was too close. The spider's twitching seems to have stopped as she relaxes into a deep sleep. You hope it holds her long enough for back up to get here. You don't have enough juice left to restrain a kitten at this point. \n\t\t\t\n\t\tSliding down to the ground with your back still against the tree trunk, you hug your knees against the cold and settle in to wait. \n\t\t\t\n\t\t*goto capturespider\n\t\t\t\n\t\t\n\n\n*label notcontain\n*page_break\n\n\"$!{name}. Hey $!{name} can you hear me?\" The voice reaches through the darkness pulling you into a state of semi-conciousness, your thoughts fuzzy and unfocused. Every muscles in your body aches and you feel yourself wanting to slip back down into the warm, enfolding darkness again. \n\n\"$!{name}! Wake up!\" Something stings your check with a smack, bringing you back to conciousness. In a panic it all comes flooding back.\n\n\"Have to get out of here! Spiders, coming...Run...\" You scramble trying to get your uncooperative limbs to move properly, flailing weakly as if full of lead. \n\n\"Whoa, easy there tiger. It's ok, just you and me here right now.\" the voice soothes, pushing your shoulders gently back towards the ground. As your vision clears, Merlinus' face swims into view, lit by the flickering firelight. \n\n*page_break\n\n\"Ok I'm going to help you up, and then we're going to get out of here before any of those spiders come back. One...Two...Three....\" He heaves you to your feet, supporting you as the forest spins wildly around you. \n\n\"Some backlash you've got there. Nothing quite like it is there?\" He gives you a sympathetic glance. \"I'll give you something for it, but right now, we [i][b]need[/i][/b] to go.\" \n\nA series of clicks sound behind where the two of you stand. To the left and right, there is an answering rustle of leaves. There's a raspy hiss from somewhere in the forest in front of you. Definitely time to go, looks like the tsuchigumo you caught earlier has returned with back up. \n\nThe whites of his eyes showing, Merlinus sketches some symbols in the air and without hesitating pushes you through the portal where you fall tumbling to the ground. There's the sound of high pitched screeches as you hear Merlinus' deep voice reciting an incarnation before he two backs through the portal pulling it shut behind him. \n*page_break\n\nThis is as unsettled as you've ever seen the old wizard as he takes a number of deep breaths to steady shaking hands. \n\n\"If then tsuchigumo were being difficult before, they're now on the war path. What did you do to upset them this much? This very nearly ended quite badly for the two of us tonight. I'd better send out a call, try to make sure we steer any other folks out of the area, we don't need any more dead hikers on our hands. Stay here.\" As if you had the strength to do anything more. You manage a nod from where you remain sprawled on the carpet. \n\nAlmost as an after thought, he reaches into one of his pockets and removes a blotchy purple and brown leaf. \"Here chew on this.\"\n\nWith that he sweeps out of the room. \n\n*page_break\n\nYou examine the sickly looking plant material that has been thrust into your hands dubiously. With a shrug you place it on your tongue and start to chew. \n\nThe taste makes you gag. It's as if someone has combined all the worst aspects of rotting fish, fermented milk and stinging nettles. Spitting the plant out, you breathe deeply trying to control the reflex to retch all over the floor. The urge to heave subsiding, you have to admit that you do feel clearer and stronger...Although your taste-buds may never recover. \n\nYou pull yourself up off the floor and take a seat to await Merlinus' return. \n*page_break\n\nStone faced the wizard finally returns to his office, taking a seat behind the battered wooden desk. \n\n\"Well this is a mess isn't it? Admittedly it's not entirely your fault, if we had have known things were this volatile, we never would have sent a student to deal with it. Regardless there's got to be consequences, in this case it means more work for me and a failing grade for you.\"\n\n*Set finalexamfail +1\n*set good_standing -5\n*goto spiderfail\n\n*label spiderfail\n*choice\n\t*if (spiderknow = 1) #I have something else you should know, something the tsuchigumo said to me before it got out.\n\t\tMerlinus raises an eyebrow waiting. \n\t\t\n\t\t\"Well it's like this. The tsuchigumo was already pretty riled up, even before I tried to contain her. They seem to think someone is kidnapping their kind, not just the one we have in the enclosures here.\"\n\t\t\n\t\tMerlinus sighs. \"That is bad news, I felt something must have been up to cause them to come out into the open again after all these years. Unfortunately your failed attempt to capture one of them will only reinforce their belief that wizards are behind it all. I will have to look into this further though. Maybe there's a solution in this provided the situation hasn't degraded too far.\"\n\t\t\n\t\t*goto spiderfail\n\t\t\n\t*if (finalexamfail = 0) #I know I could have handled this better, but as you said, this case was not what it seemed. Can I at least have a second chance?\n\t\tAlthough still thoroughly rattled by the recent encounter, the foul tasting leaf seems to have done it's job and the effects of the overload are fading into the background leaving you steadier and increasingly clear headed. \n\t\t\n\t\t\"Do you still have that Jaculus that needs capturing?\" You cross your fingers hoping that Merlinus might give you a second chance to prove you can do this. \n\t\t\n\t\tHe gives you a stern look. \"Well, there's no rules that say you can't have another try, especially considering the difficulty of the original task you were set. Dealing with Tsuchigumo is going to side track much of our resources, we definitely could use the help....\"\n\t\t\n\t\tHe studies you intently. \"Are you sure you're up to it though, after all you've been though tonight?\"\n\t\t\n\t\tMerlinus looks you up and down weighing the options. \"Well I must admit, you do look better than you did earlier, that Fucasia leaf must have done the trick I'm gathering.\" \n\t\t\n\t\tYou nod, feeling slightly green at the memory. \n\t\t\n\t\t\"Ok\" Merlinus allows. \"You can have one more chance at this. Turn right and head to the end of the corridor, there's a lounge area there, get a few hours rest before you head out. When you're ready let me know and we'll send you out to catch the Jaculus.\" He looks haggard with his slumped posture and dark circles forming under his eyes. He really seems to be pushing himself to hard. You feel kind of bad about your part in contributing to his responsibilities and hesitate at the door, trying to find the words to say. Finally you simply thank him before hurrying down the row of offices. \n\t\t\n\t\t*page_break\n\t\t\n\t\tThe lounge area turns out to be behind an innocuous white door, opening up into a spacious, gently lit space with various chairs and cushions positioned around the room in muted colours. \n\t\t\n\t\tPicking a comfortable looking couch in the corner of the room, you kick off your shoes, curling into the soft fabric. It's only now that you've stopped that you realise just how exhausted you area. Sleepily you wonder if you should check up on your book's entry for the creature you've volunteered to catch or just get some sleep. \n\t\t\n\t\t*choice\n\t\t\t#Review the entry on the Jaculus\n\t\t\t\tYawning, you flick through the aged pages to find a short excerpt on the creature. [/i]\n\t\t\t\t\n\t\t\t\t[i][b]Jaculus (Otherwise known as the \"Javelin Snake\")[/b]\n\t\t\n\t\t\t\t[i]The Jaculus is a smaller relative of the dragons in the serpent family. Small to moderate in size, their scales are sedately patterned in shades including orange, browns, greens and white. The serpent possesses clawed hind legs and feathered wings, allowing the serpents to fly short distances and reach considerable speeds.[/i] \n\t\t\n\t\t\t\t[i]Favouring forested areas, the Jaculus is an ambush predator, using the foliage for camouflage. Although possessing a mild venom, the serpent does not use this to hunt, instead launching attacks at potential prey using its \"V\" shaped, armoured head to kill its victim though sheer force of impact. [/i]\n\t\t\n\t\t\t\t[i]This method of hunting has earned the Jaculus it's common name the \"Javelin Snake.\" It is thought that these snakes are attracted to certain scents, especially spices, and one should be careful if in the vicinity of one of these trees or if carrying the scents on your person.[/i]\n\t\t\n\t\t\t\t[i]Jaculus are known to be potentially lethal to creatures up to and including human in size.[/i]\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tClosing the book, you quickly fall into a deep, dreamless sleep. \n\t\t\t\t\n\t\t\t\t*goto_scene jaculus\n\t\t\t\t\n\t\t\t#Catch up on some sleep then head out on your next mission. \n\t\t\t\tSleep comes quickly and dreamlessly. Surprisingly, no nightmares disturb your rest. \n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t*goto_scene jaculus\n\t\t\t\t\n\t*if (fail = 3) #Failing Grade? What does that mean?\n\t\tI'm afraid you needed to pass the assignment that was set for you to continue to work for your licence due to your already low marks leading up to it. Since you have failed this test as well, I'm going to have to expel you, I'm not allowed to give you any more chances.\" He looks genuinely unhappy about the situation, not that this makes you feel any better.  \n\t\t\n\t\tIn response to your silence, he gives you what you suppose is meant to be an encouraging smile. \n\t\t\t\t\t\n\t\t\"Cheer up. Looks like this path was not meant to be, however when one door closes, another opens, as my mother used to say. Other opportunities are bound to show up, something you're more suited to.\"\n\t\t\t\t\t\t\n\t\tHis sentiments are meant kindly but they sound hollow to your ears. Silently you allow him to escort you to the door of the office and step through the portal back into your room. \n\t\t*achieve kickedout\n\t\t*goto_scene magician\n\t\t\n\t*if (fail \u003c 3) #You're going to fail me? Does that mean I'm being kicked out?\n\t\t\"Calm down, nothing that drastic.\" The wizard soothes. \"It just means I feel you need to work under supervision for a bit longer before you're allowed to have a full licence with the privileges that entitles you to.\"\n\t\t\t\n\t\t\"In fact, he continues, I've decided to take a personal interest in your studies. It's going to be tricky with the tsuchigumo situation taking up my time, but I've decided that some personal tutoring is in order. It won't be easy, but with with the right kind of ground work, with time and study there's nothing you won't be able to do. What do you say?\"\n\t\t\n\t\tPrivate tutoring from a wizard. While you suspect you might live to regret this decision, right now you're definitely in. \n\t\t\n\t\t\"Great.\" The old wizard beams at your acceptance. \"For now though, I need you to rest up after what you've been though tonight. I believe you know the way home?\"\n\t\t\n\t\t\"Straight out the door and on 'till morning.\" You quip. \n\t\t\n\t\tAlthough you didn't get your licence today, it sounds like great things are in store for you. Maybe this could be the best thing that ever happened now that you're going to get some actual guidance as to how to be a wizard. \n\t\t\n\t\tWith a skip to your step, you walk through the portal. \n\t\t\n\t\t*achieve apprentice\n\t\t*set spiderknow 0\n\t\n\n\n\t\t*page_break\n\n\t\tThank you for Playing Wizardry Level C. \n\n\t\tThis adventure is over, however there are still many other choices that can be made. \n\n\t\tWould you like to play again?\n\t\t*choice\n\t\t\t#Reload from the last checkpoint. (The magical creatures habitat area). Please note some paths may not be available due to saved stats for this point.\n\t\t\t\t*set good_standing +10\n\t\t\t\t*set occupation \"Wizard Level C: On Probation\"\n\t\t\t\t*set finalexamfail 0\n\t\t\t\t*set spiderknow 0\n\t\t\t\t\n\t\t\t\tThe world fades around you, then snaps back into sharp focus, leaving you with the odd sense of deja vu. \n\t\t\t\t\n\t\t\t\tWhat were you doing again? You look around, seeing Merlinus walking away through the rows of offices at the guild's headquarters. You hurry to catch up to him.\n\t\t\t\t*goto_scene paraanimals\n\t\t\t\t\t\t\n\t\n\t\t\t#Restart from the beginning.\n\t\t\t\t*goto_scene ending  \n \n\n\t\t\n\n\t\t\n*label capturespider\n*page_break\n\nBefore long you hear the familiar voice of your supervision announcing his arrival. You begrudge every moment he has left you to sit in the dark with a terrifying spider-creature which could wake up at any moment, but you guess that he's been monitoring the situation and is confident that you have it all under control....at least you hope that's what is going on. \n\nYou wave him over. He's followed by a short, stocky man with a long beard and an elfin, blue skinned woman who holds back, allowing him to approach alone. \n\nIf not for the ornately carved staff, you'd never pick Merlinus for a powerful wizard you muse. Dressed in a ratty brown woollen coat, baggy jeans and a pair of blundstones, he's a far cry from the ornately robed, immaculately dressed wizards of the story books.\n\nHe reaches out with his staff and gives the spider a gentle poke. When the only response is a few sleepy clicks, he grunts in satisfaction and loops a glowing string of rope around the creature's thorax. \n\nHe turns to his companions. \"That should hold her for now. Please make sure she's taken directly to holding and has her wounds treated as required.\"\n\nThe two step forward with a nod, the stocky man deliberately ignoring you while, the lady gives you a fleeting smile. \n\n\"They'll sort that from here.\" The wizard takes you by the shoulder steering you back towards the fire. Did you get any indication as to why they are attacking before you managed to subdue her?\n\n*fake_choice\n\t*Selectable_if (spiderknow = 1) #There was something she said, although I'm not certain whether to believe it. \n\t\tYou relay the conversation with the tsuchigumo, explaining how they believe that wizards are responsible for abductions of their kind. \n\t\t\n\t\t\"This is bad.\" Merlinus muses softly. \"The last thing we need is giant spiders coming out of the shadows to attack out in the open. There's far more of them than you'd expect, and as you've seen first hand they're not easy to contain.\"\n\t\t\n\t\t\"It's a shame we don't have more to go on, but at least it's a start. Hopefully we can contain this before it's too late.\"\n\t\n\t\t\n\t\n\t*Selectable_if (spiderknow = 0) #No nothing, Although she did seem to be trying to tell me something, I just couldn't understand it. \n\t\tMerlinus looks thoughtful. \"Shame, it would be nice to know what has them so wound up that they would risk attacking mundane people out in the open, let alone wizards. Hopefully she'll still be in a talkative enough mood when she wakes.\"\n\n\t\t\nThe wizard's expression brightens somewhat. \"On the upside, you showed quite a degree of strength and skill for one so new to the wizardry world. I knew you had it in you to complete the task set for you. Congratulations!\"\n\n\n*choice\n\t*if (fail = 3) #So I passed? I can stay in the Guild?\n\t\t\"I'll say, I'd be happy for you to continue under my supervision until you can get a full licence.\" Merlinus smiles brightly at you as if the thought of being a dogsbody for another couple of months is the best thing that had ever happened to you. \n\t\t\t\t\t\t\n\t\tWell at least you get to stay and keep your magic. And they're always be another chance to get your licence, if you can pass the tricky final exam, making up a few mid-semester assignments can only be child's play after this. The thought makes you feel brighter already. Then Merlinus says something that makes your day complete. \n\n\t\t\"I know it's been a hard couple of months adjusting for you, so I've decided you need a holiday. I'm taking you off the active duty roster for a month, no one will bother you, although you can contact me if you need anything. Just rest up, read up and I'll expect great things from you on your return.\"\n\t\t\t\t\t\t\n\t\t\"A holiday to catch up sounds wonderful. You think you'll start your R&R period by having a nice long sleep in.\" As if reading your mind, Merlinus gives you a knowing smile, sending you home with a flick of his fingers. \n\t\t*achieve apprentice\n\t\t*set spiderknow 0\n\t\t*set good_standing +10\n\t\t\n\t\t*page_break\n\n\t\tThank you for Playing Wizardry Level C. \n\n\t\tThis adventure is over, however there are still many other choices that can be made. \n\n\t\tWould you like to play again?\n\t\t*choice\n\t\t\t#Reload from the last checkpoint. (The magical creatures habitat area). Please note some paths may not be available due to saved stats for this point.\n\t\t\t\t*set good_standing -10\n\t\t\t\t*set occupation \"Wizard Level C: On Probation\"\n\t\t\t\t*set finalexamfail 0\n\t\t\t\t*set spiderknow 0\n\t\t\t\t\n\t\t\t\tThe world fades around you, then snaps back into sharp focus, leaving you with the odd sense of deja vu. \n\t\t\t\t\n\t\t\t\tWhat were you doing again? You look around, seeing Merlinus walking away through the rows of offices at the guild's headquarters. You hurry to catch up to him.\n\t\t\t\t*goto_scene paraanimals\n\t\t\t\t\t\t\n\t\n\t\t\t#Restart from the beginning.\n\t\t\t\t*goto_scene ending  \n \n\n\n\t\t\t\t\t\t\n\t*if (fail \u003c 3) #So I've passed for real this time? No more tests?\n\t\t\"For real this time.\" Merlinus confirms with a large smile. \"Congratulations $!{name} $!{lastname} officially a full level C Wizard!\"\n \n\t\tYou try to cheer but the effort makes you almost fall, Merlinus catches you by the arm. \"Well how about I send you home for some rest, you can come by the office tomorrow and we'll get all your paperwork sorted.\"\n\t\t\t\t\t\t\n\t\tNothing could sound better right now. With a flick of his fingers the old wizard sends you back to your house, without even changing you collapse on the bed. \n\t\t\t\t\t\t\n\t\t\"Wizard $!{name} $!{lastname}. That has a nice ring to it.\" You murmur sleepily as you drift off to sleep. \n\t\t*achieve passb\n\t\t*set occupation \"Wizard: Level C\"\n\t\t*set spiderknow 0\n\t\t*set good_standing +10\n\t\t\n\t\t*page_break\n\n\t\tThank you for Playing Wizardry Level C. \n\n\t\tThis adventure is over, however there are still many other choices that can be made. \n\n\t\tWould you like to play again?\n\t\t*choice\n\t\t\t#Reload from the last checkpoint. (The magical creatures habitat area). Please note some paths may not be available due to saved stats for this point.\n\t\t\t\t*set good_standing -10\n\t\t\t\t*set occupation \"Wizard Level C: On Probation\"\n\t\t\t\t*set finalexamfail 0\n\t\t\t\t*set spiderknow 0\n\t\t\t\t\n\t\t\t\tThe world fades around you, then snaps back into sharp focus, leaving you with the odd sense of deja vu. \n\t\t\t\t\n\t\t\t\tWhat were you doing again? You look around, seeing Merlinus walking away through the rows of offices at the guild's headquarters. You hurry to catch up to him.\n\t\t\t\t*goto_scene paraanimals\n\t\t\t\t\t\t\n\t\n\t\t\t#Restart from the beginning.\n\t\t\t\t*goto_scene ending  \n \n", "unicorntest": "*page_break\n\nThe next few weeks are blessedly quiet, allowing you to catch up with life in general and take some time to read and practise what is in your book of magic.\n\nWith the weather finally starting to improve, you decide to spend the weekend hiking though the mountains. \n\nThe forest covered mountains near where you live are truly beautiful. You pause for a moment to enjoy the cool, clean air; turning your face upwards to watch the sunlight filter through the leaves above. You decide to set up camp in a clearing where ancient trees reach their branches far into the sky and a clear, shallow stream trickles nearby. \n\n*page_break\n\nThe moon climbs overhead, shining through the rustling leaves above your tent. Restless and unable to go back to sleep, you decide to take a walk. It's peaceful as you slowly pick your way along the narrow path along the river. The clear, moonlit sky lights your way clearly without needing to turn on your torch. With the bright light from the moon streaming down from above, it takes you a moment to realise there is something glowing through the trees up ahead. \n\n*page_break\n\n\nCreeping closer you realise the light is coming from the snow white form of a unicorn. \n\n*image unibooksmall.jpg center\n\nWhat do you do?\n*choice\n\t*Selectable_if (Familiarnumber > 0 ) #Send your familiar ahead to calm the unicorn. \n\t\t*gosub trial_end\n\t\tYou send your familiar out to meet the unicorn. The mare startles slightly but then relaxes, breath misting in the cool night air. \n\n\t\tCarefully the horse advances towards you, moonlight glimmering off her twisted, silver horn. You notice plants growing and flowering in her hoof prints. You realise this creature is full of nature magic. Unicorns in the forest are likely responsible for why this area is as wild and full of life as it is. \n\n\t\tShe extends her neck and nuzzles your hand, allowing you to stroke her soft coat for a moment, then turns and silently trots off into the darkness.\n\n\t\tA few long, white strands of hair have fallen to the ground where they continue to glow softly. You pick them up and place them in your pocket for safe keeping.  Unicorn hair is rare and highly useful for the creation of all sorts of magical items and spells.\n\n\t\t*Set Unicornhair \"Unicorn Hair.\"\n\t\t*achieve unicorns\n\t\t*set good_standing +10\n\t\t*set Second_Task 100\n\t\t*set grade2 \"Pass\"\n\t\t*set hundredpercent +1\n\t\t*goto_scene bunyiptask\n\n\n\n\t#Stay where you are and watch the creature from a distance. \n\t\t*gosub trial_end\n\t\tYou realise the unicorn is likely the reason for the amount of life in these forests. Not wanting to scare it off you continue to watch it from a distance. It's long curved horn sparkles in the moonlight and as you watch, the plants seem to shimmer and grow as the horse passes. There are few unicorns left in this world and you are fortunate to have seen one. You'll remember this encounter for the rest of your life. \n\n\t\t*set Second_Task 100\n\t\t*set good_standing +5\n\t\t*set grade2 \"Pass\"\n\t\t*set hundredpercent +1\n\t\t*goto_scene bunyiptask\n\n\n\t#Creep closer, trying to stay hidden. Maybe if you can get close enough you can charm it and take a few stands of mane or tail. \n\t\t*gosub trial_end\n\t\tYou creep closer under the cover of an invisibility spell. It'd be nice to get a few stand of hair, you've heard they're fantastic for making various magical items and spells. Readying a charm to cause the horse to freeze for a short time you wait for the right moment. The unicorn continues to graze closer until it's only a few feet away. With a whisper you let the spell fly. \n\n\t\t...And watch as it bounces off the the creatures hide harmlessly. The unicorn startles as if zapped and spins to face you. Seeing straight through your invisibility spell.  \n\n\t\t*set Good_standing -10\n\t\t*page_break\n\n\t\tYou know how unicorns are magical creatures right? Well this one's magic is far stronger than yours. Unfortunately, the medieval legends about unicorns being aggressive when feeling threatened are also true. It lowers its head and charges. \n\n\t\tRacing though the undergrowth, you duck and weave trying to throw the unicorn off your trail. It's not working. Desperately you scale the nearest tree and crouch in the branches while the mare snorts and paws around the trunk unable to get to you.  \n\n\t\tYou must have drifted off to sleep eventually, as you're woken by someone calling out to you. The sun's out and even better, the unicorn nowhere to be seen. A group of hikers are gathered around the base of your hiding place. \"Hey buddy are you ok?\" One of the men calls out again. \n\n\t\t*page_break\n\n\t\tStiffly you unclench your hands from around the branch where you've slept. Still a bit apprehensive that the unicorn may be hiding in wait, you yell down to the group. \"I've been trapped up here by some kind of wild animal all night. Are you sure it's gone?\"\n\t\t\n\t\tThere's laughter from the group. \"From the tracks mate, I'd say your wild animal was a deer. A small one too. Pretty sure you're safe to come down now.\"\n\n\t\tThere's plenty of jokes at your expense as they walk you back to your camp. You decide against telling them about the unicorn, it's probably better they just think you're a city slicker with no sense of the wild rather than crazy.\n\t\t*set grade2 \"Fail\"\n\t\t*set good_standing -10\n\t\t*goto_scene bunyiptask\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first few chapters are available for free? This is the end of the free content.\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2011-01-01 $4.99 $2.99 purchased\n*abort\n", "wizard2": "*page_break\nThe next section detailed some of the kinds of magic that one could specialise in. Time manipulation, Teleportation and Healing are all highly recommended for study. Which other area catches your eye the most? \n\n*choice\n\t#Transmutation\n\t\tChanging one substance into another. includes the stereotypical lead into gold trick. Could be useful. \n\t\t*Set speciality \"transmutation\"\n\t\t*goto_scene elementchoice\n\n\n\t#Illusion\n\t\tThe ability to make things appear or disappear without moving anything real. Great choice.\n\t\t*set illusion 10\n\t\t*Set speciality  \"illusion\"\n\t\t*goto_scene elementchoice\n\t\n\n\t#Mind control and communication\n\t\tTelepathy, Empathy and Coercion. The mainstay of psychic communications. A myriad of uses. \n\t\t*set speciality \"mind control and communication\"\n\t\t*set telepathy 10\n\t\t*goto_scene elementchoice\t\t\n\n\t"}};
