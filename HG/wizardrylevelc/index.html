day, I will be leaving now.\" He turns and starts to walk away once more. \n\nYou could scream in frustration, how to get through to that wizard that you're not Myranda. You need to find some way to stop him again before he leaves so he can help make you human again.\n*goto oddchoice \n\n*label oddchoice\n*choice\n\t#Make a lot of noise scraping your talons along the rocks. \n\t\tYou extend your claws scraping them along the rocks with the sound of nails down a blackboard. Merlinus halts his retreat from the clearing to cover his ears and give you an angry look. \n\t\t\n\t\tYour chosen rock has deep furrows in it's surface. Looking at it gives you an idea. Of course! You don't know why you didn't think of it earlier. \n\t\t*goto draw\n\t\t\n\t#Growl at Merlinus. He may not understand you but the volume is sure to get his attention.\n\t\tYou howl your frustration at full volume, the sound making the rocks rattle. Merlinus is deliberately ignoring your tantrum, continuing to walk away (albeit with his hands covering his ears.)\n\n\t\t[i]\"No way.\"[/i] you think. [i]\"You're so not leaving me here!\"[/i]\n\t\t\n\t\tTaking a deep breath you start to scream at the departing wizard again. Unfortunately with your emotions running riot, you seem to have gotten carried away and a small fireball flies from your open mouth to hit the trees near the mage, causing them to burst into flames. \n\t\t\n\t\t\"Have you gone [i]insane!\"[/i] he yelps at you. \"Attacking a senior wizard of the guild? I know you hate us, but even I thought you had more sense than that!\"\n\t\t\n\t\tYou feel ropes of unseen energy winding around your muzzle snapping it closed and tangling in your legs causing you to fall to the ground. \n\t\t\n\t\t\"You brought this on yourself.\" Merlinus says calmly as he advances toward you, staff outstretched.\n\t\t*page_break\n\t\t*set good_standing -10\n\t\t*goto_scene dragonland\n\t\t\n\t\t\n*Label eye\nThe mage addresses you suspiciously. \"Myranda, you know as part of your sentence, you are not allowed to dabble in anything other than innate dragon magic. What have you been up to? And why the silent treatment? I've usually I've got an acidic comment or two out of you by now. Nothing to say in your defence?\"\n\nYou stare helplessly, unsure how to convey the events from last night to him. He takes your silence as an answer anyway. \n\n\"Very well, if you have nothing to say in your defence, I'll be leaving...for now.\" He turns in a swirl of robes and starts to head away. He's leaving again, you've got to stop him! Who knows when someone will be back again. You really need his help to reverse the spell that's landed you in the form of a dragon. \n\n*page_break\nYou scrape your claws through the dirt in frustration. Of course! \n*goto draw\n\n\n*label draw\nYou frantically start trying to draw out the events of last night in the sand. Your claws are unwieldy for fine detail such as writing but you manage a passable sketch of a stick figure person, a dragon, and something that could pass for your name. \n\nMerlinus has come back to watch what you're doing. \"Ok Myranda, well I did gather ${name} was here already. Something else has happened, is that why you're not talking to me?\"\n\nYou could cry with relief, (if dragons could actually shed tears.) He finally seems to be getting it. \n\nYou sketch a circle with a diamond on top for the ruby and an arrow to the stick figure's hand. \n\n*page_break\n\nThis he does understand. \"The ring? Why would ${name} have your ring? And more to the point why would you tell me if ${he} did?\"\n\nRealisation dawns. \"$!{name}? Is that really you in there?\"\n\nYou nod vigorously.\n\n\"You really let Myranda out? Why would you do that. Think of the grief she'll cause!\" he sighs looking old. \n\n\"You didn't know. Did you? Well right now my priority has to be trying to set this straight. Stay here ok?\" With no other choice you let him leave. \n\n*page_break\n\nWhen Merlinus finally returns a few weeks later, the news is not what you wanted to hear. \n\n\"I'm afraid you may be stuck ${name}. I along with most of the Guild, tried to track our sorceress down, however she must have gotten word we were coming and has disappeared. We're not even sure she's still on the planet any more.\"\n\n\"That ring of yours is the key. Myranda is a powerful necromancer. When she was last out in the world, she caused all sorts of grief, raising the dead into a formidable force for evil until she was caught. One of her tricks was to spend time in dragon form, just to cause a little extra chaos and destruction. She had a ring, sealed with some of her power to enable her to easily switch from human to dragon whenever she wished. It was with that ring, we finally caught her and bound her into that form, unable to change back. We thought the ring had been lost with time, and so much the better for it, since without it, she could never regain human form and access to the magic she'd lost.\"\n\nHe gives you a steady look. \"Unfortunately it also works the other way. The spell on the ring had been altered when she was trapped as a dragon. As an extra safety measure, the only way her dragon-form could be lifted, was if another took her place by channeling their own unfocused energy freely though the same ring. Without the ring, we have no way to make you human again.\"\n*page_break\n\nHe leaves to let you digest what that will mean. Dragons can live for hundreds of years. If they don't find Myranda, this will be your life from now on. Sitting around in your cave for a few centuries is bound to drive you crazy, is there something you'd like to do, to help pass the years?\n\n*choice\n\t#Hire yourself out for transport services.\n\t\tOne suggestion brought up by Merlinus, was to consider working with the Guild on other projects. With your size, strength and ability of flight, you'd be perfect for transporting people and cargo where teleporting is not a desired option. \n\t\t\n\t\tThe more you consider it, the better it sounds. The wizard's will provide you with an invisibility charm, allowing you to travel where you will unnoticed (as long as you take care not to bump into any passing jets), and also pay you a generous sum of money. \n\t\t\n\t\tWhat a dragon would do with money you're not really sure, but for some reason the idea of having more gold to add to the small pile left behind by Myranda in the cave has a real appeal for you. \n\t\t\n\t\t*page_break\n\t\t\n\t\tThe next time Merlinus comes by to check on you, you tell him you'll do it. \n\t\t\n\t\tThe years pass by and you find yourself really enjoying your new role. Interesting people, new places to visit and a large pile of coins to curl up on at night. You smile contentedly as you drift off to sleep. \n\t\t*set occupation \"Dragon Transport Services\"\n\t\t*set invisible \"Invisibility charm.\"\n\t\t*achieve business\n\t\t*set good_standing +20\n\t\t\n\t\t*page_break\n\n\t\tThank you for Playing Wizardry Level C. \n\n\t\tThis adventure is over, however there are still many other choices that can be made. \n\n\t\tWould you like to play again?\n\n\t\t*choice\n\t\t\t#Reload from the last checkpoint. (Initial encounter with Nessie). Please note some paths may not be available due to saved stats for this point.\n\t\t\t\t\n\t\t\t\t*set occupation \"Wizard Level C: On Probation\"\n\t\t\t\t*set good_standing -10\n\t\t\t\t*set grade4 \"\"\n\t\t\t\t*set ring \"Ruby Ring.\"\n\t\t\t\t*set invisible \"\"\n\t\t\t\tThe world fades around you, then snaps back into sharp focus, leaving you with the odd sense of deja vu. \n\t\t\t\t\n\t\t\t\tYou're standing on the shore of Loch Ness, cold breeze pulling at your clothes. Movement catches your attention from the dark waters.\n\t\t\t\t*goto_scene dragonwizard\n\t\t\t\t\n\t\t\t#Restart from the beginning.\n\t\t\t\t*goto_scene ending \n\t\t\n\n\t#Nothing, I'd rather be bitter and alone in my cave.\n\t\tWell since your a dragon now, you might as well act like one. Your days are spent brooding by your cave, becoming progressively more ill-tempered as the years wear on. You have no wish to be involved any further in the doings of wizards and just want to be left alone to do your own thing.\n\t\t\n\t\tEventually even Merlinus gives up and stops visiting you, leaving you as you wished in peace. \n\t\t\n\t\tYou're not sure if it's the isolation or whether having the body of a dragon starts to wear off on you, but your find yourself more and more preoccupied by the small hoard of treasure left behind by Myranda and claimed by you in her absence. \n\t\t\n\t\tYou find yourself at your happiest, trawling the lake bottom for lost coins and other valuables. It's usually fairly slim pickings, but you have time to spare and slowly your treasure pile increases in size. Sure your activities lead to the occasional \"Loch Ness Monster\" sighting, but it's no worse than when Myranda was the resident dragon by the Lake, and you figure the wizards owe you one for leaving you here in the body of a wyrm anyway. \n\t\t\n\t\tYou live out your life alone, but content with your treasure. The new Monster of the Loch Ness. \n\t\t*achieve loch\n\t\t*set good_standing -5\n\t\t*set occupation \"Loch Ness Monster\"\n\t\t\n\t\t\n\t\t*page_break\n\n\t\tThank you for Playing Wizardry Level C. \n\n\t\tThis adventure is over, however there are still many other choices that can be made. \n\n\t\tWould you like to play again?\n\n\t\t*choice\n\t\t\t#Reload from the last checkpoint. (Initial encounter with Nessie). Please note some paths may not be available due to saved stats for this point.\n\t\t\t\t\n\t\t\t\t*set occupation \"Wizard Level C: On Probation\"\n\t\t\t\t*set good_standing +15\n\t\t\t\t*set grade4 \"\"\n\t\t\t\t*set ring \"Ruby Ring.\"\n\t\t\t\tThe world fades around you, then snaps back into sharp focus, leaving you with the odd sense of deja vu. \n\t\t\t\t\n\t\t\t\tYou're standing on the shore of Loch Ness, cold breeze pulling at your clothes. Movement catches your attention from the dark waters.\n\n\t\t\t\t*goto_scene dragonwizard\n\t\t\t\t\n\t\t\t\t\n\t\t\t#Restart from the beginning.\n\t\t\t\t*goto_scene ending \n", "faillicence": "*set occupation \"Mundane Member of Society\"\n[i]\"It's so unfair! Failing me like that. I never stood a chance, being thrown in the deep end without any real guidance or options.\"[/i] you fume silently walking down the darkened street. \n\n\"Well they can stuff their rules, and stuff their stupid licences!\"  you mutter, kicking at some sickly tufts of grass growing though the cracks in the side walk. \n\nSuddenly the deserted road seems less empty. You feel the malevolent presence before you see it. Out of the gloom, the shadowy form of a large, shaggy black dog appears. Silently he pads towards you. \n*image garmr.jpg center\n\n*page_break\n\"Couldn't help but overhear.\" the hound voices smoothly, teeth flashing in a canine grin. \"I may have a bargain for you, [i]if[/i] my sources are correct and you have what I need. Rumour has it, you have something of value for trade.\"\n\n\"I may.\" you say hesitantly. \"But I have a few questions of you first.\"\n*goto start\n*label start\n*choice\n\t*disable_reuse #\"Who am I dealing with may I ask?\" \n\t\t\"You're courteous. So rare a trait in this day and age. Yes you may ask.\"\n\t\t\n\t\t\"I am known by many names: \"Black Dog\" is by far the most common, but you may also have heard of me as \"Barguest,\" \"Cu Sith,\" \"Padfoot\" or \"Skriker.\"\" \n\t\t\n\t\t\"You however, may call me Garmr.\"\n\t\t\n\t\t*goto start\n\t\t\n\t*disable_reuse #\"What are you?\"\n\t\t\"You don't recognise me?\" Instead of being angry, the creature seems almost sad to be so forgotten.\n\t\t\n\t\tHe turns softly glowing eyes on you. \"I am the harbinger of death human. I guard the gates of the underworld and send souls there as I choose. But....\" he adds more brightly, \"that is not what I have planned for you....today at least.\"\n\t\n\t\t*goto start\n\t\t\n\t*disable_reuse #\"Why are you approaching me?\"\n\t\tThe dog gives you a sideways glance. \"Why I thought that would be obvious. You seem disillusioned with the [i]high and mighty[/i] Wizard's Guild.\" His sarcastic tone, implies they were anything but that in his opinion. \n\t\t\n\t\t\"Since they've kicked you out, and they're no friends of mine either, I thought I might have something that could interest you. At a price of course.\"\n\t\n\t\t*goto start\n\t\t\n\t*disable_reuse #\"What are you offering to trade?\"\n\t\t\"Missing your magic yet?\" The hound gives you a hard look. \"Thought you might be. Your sort are born to have mana running though your veins. It's the Guild council that's cause of all the problems with the balance of power in this time. Wasn't always that way.\" For a moment he looks almost wistful. \n\t\t\n\t\t\"Anyway\" he continues. \"Giving you full access to your magic is beyond my scope of power, however I can offer you the next best thing.\" He produces a small wand, inlaid with silver and gold details that glint reflectively despite the dim light. \n\t\t\n\t\t\"This wand is enchanted to get around the binding spell they've put on your channelling abilities. You can use your magic as before, but only while you have this in your possession. Lose this and you are back to being utterly mundane. Understand? \n\t\t\n\t\t\"It's also not a miracle device. If you didn't know the spell before, you won't be able to work it now. Unless of course... you happen to have access to a magic book.\" His tone implies he may be able to source one of those too, for a future trade if you desire.\n\t\t\n\t\t*goto start\n\t\n\t#\"Enough questions for now, what do I have that you want?\"\n\t\t\"Well that's the question isn't it? Do you have what I want? There are two things in particular I have been unable to get hold of. I've been told you may have at least one of them.\"\n\t\t*goto offer\n\t\t\n\t\t\n\t\t\n*label offer\n\n*choice\n\t*selectable_if (ring = \"Ruby Ring.\") #Offer the Ruby Ring as a trade.\n\t\tYou produce the ring that was given to you by Ashie as a gift. He said it was magical but you've found no use for it. Perhaps Garmr will accept it as a trade. \n\t\t\n\t\t\"How about this?\" You hold the ring up for the black dog to see, making sure to move it slightly so the gold and ruby stone catch the dim light from the distant street lamps. \n\t\t\n\t\tGarmr leans forward eagerly to inspect the ring. Although he tries to hide it, you can tell by the light in his eyes that this is what he's been searching for. \n\t\t\n\t\t\"I might be persuaded to part with the wand for that ring.\" he says in a tone composed to sound casual and slightly bored. \n\t\t\n\t\t\"The ring itself is a pretty piece, I'm sure I can find someone who would want it, even if I myself do not. Besides which I like you human, I wouldn’t want to see you lack for magic.\"\n\t\t*page_break\n\t\t\n\t\tYou know there's more going on here than meets the eye, but you could really use the wand. \n\t\t\n\t\t\"Ok\" you say holding out the ring to the canine. \"It's a deal.\"\n\t\t\n\t\tGarmr nods and hands you the wand, before delicately taking the ring from you in his teeth. You give the slim rod a few experimental swipes though the air feeling energy pulsing though the object. [i]\"It certainty seems as if the black dog was telling the truth about the wand.\"[/i] You do still wander about the fate of your ring though. \n\t\t\n\t\t\"Garmr!\" you call after him as he trots away into the gloom. \n\t\t\n\t\t\"Yes human?\" he pauses his retreat.\n\t\t\n\t\t\"Why do you really want that old ring?\" you ask. \n\t\t\n\t\tHis jaws fall open in another canine grin and you notice that he's already hidden the ring somewhere out of sight. \n\t\t\n\t\t\"Ah. A question. Knowledge is power you know...And you haven't paid me anywhere near enough to learn the answer to your query. Good night human. Perhaps I'll see you around and you'll get your answer one day.\" With that, he fades into the darkness.\n\t\n\t\t*set ringunicorn \"your old ring, the ruby glowing softly.\"\n\t\t*set ring \"\"\n\t\t*set wand \"Garmr's Wand\"\n\t\t*goto_scene decidewand\n\t\t\n\t\n\t*selectable_if (unicornhair = \"Unicorn Hair.\") #Offer a single strand of unicorn hair\n\t\tGarmr looks annoyed at your offering. \n\t\t\n\t\t\"I know you have more than that in your possession.\" he growls. \"I offer you your magic back and you think to cheat me?\"\n\t\t*goto unicornchoice\n\t\n\t\t\n\t\t\n\t*selectable_if ((unicornhair = \"Unicorn Hair.\") or (ring = \"Ruby Ring.\")) #I will not trade with the likes of you. \n\t\tYou give the Black Dog a steady look. \"If you think I will trade with you, you're very much mistaken. I want nothing to do with you. Leave now.\"\n\t\t\n\t\t\"Brave for a mundane.\" the canine almost purrs. \"You realise I could rip your throat out and just take what I want from your cold, dead body.\"\n\n\t\t\"If you could have, you already would have done so instead of standing around on the street trying to bargain with me.\" You hope your instincts are correct, and like many supernatural creatures, this one has some restrictions guiding its behaviour around people. \n\t\t\n\t\t\"Maybe I was just looking for an ally.\" the dog growls showing his teeth. \"After all, an ally is better than a corpse who will do me no favours. The wand is of no use to me, why wouldn't I trade it to you?\"\n\t\t\n\t\t\"Maybe all you're looking for is a friend,\" you reply. \"But I doubt it.\"\n\t\t\n\t\tThe creature gives a howl of frustration. \"Clever human, but not clever enough, you should have accepted my offer, it would have been to your benefit. Watch your back.\" \n\t\t\n\t\tThe hound lunges, teeth bared at your throat. Ducking for the pavement, the creature sails over your head with the smell of sulphur then disappears without a trace into the night. \n\t\t\n\t\t*page_break\n\t\t*goto donttrade\n\t\n\t*Selectable_if ((unicornhair != \"Unicorn Hair.\") and (ring != \"Ruby Ring.\")) #I have nothing to trade with you.\n\t\tGarmr stares at you with his uncanny, glowing eyes. Evidently satisfied that you're telling the truth, his features twist into a disappointed frown. \n\t\t\n\t\t\"Well that's a shame. I had high hopes you'd have something for me. Can't be helped.\"\n\t\t\n\t\t\"Wait!\" you call after him as he starts to leave. \"I'm still interested, is there anything else I could trade for the wand?\"\n\n\t\t\"Afraid not human. Objects like this one are valuable, I can't go around just giving them away. Tell you what, now you know my name, if you ever come into possession of something you think I may have use for, just give me a call.\"\n\t\t\n\t\tWith that he lopes off silently into the gloom, leaving you standing alone on the deserted street. \n\t\t*page_break\n\t\t*goto declinebunyipofficetrack\n\n*label donttrade\nDespite the threatening parting statement from Garmr, you never see him again. Despite this, it is some time before you cease jumping at shadows.\n\nAs time passes you settle back into the life of a regular magic-less human. Sometimes you find yourself wondering if you should have taken the black dog up on his offer, however it's all water under the bridge now, and there was no telling what sort of trouble dealing with a creature like that would have gotten you into. Yes you're probably better off where you are. \n\n*choice\n\t*if ((ring != \"Ruby Ring.\") and (unicornhair = \"Unicorn Hair.\")) #Epilogue\n\t\tYou still have your strands of Unicorn hair, which most people assume are some kind of spun sliver. \n\n\t\tAlthough unable to use them yourself as a consequence of the Wizard's Guild taking away your licence, you enjoy telling stories to the children at family get-togethers about the magical things present all around us, only hidden from view. \n\n\t\tAlthough the children believe your stories, the adults only laugh and ask you where you get such an imagination from. You're ok with that, simply laughing along with them at the \"make believe\" stories you tell. \n\t\t\n\t\tTo your surprise you notice that a brownie has taken up residence in your house, keeping your house spotlessly clean for you for the price of a few cookies and the odd glass of milk. Although he considers it a great breach of brownie etiquette, he will come out and join you for morning tea from time to time at request, filling you in on all the latest supernatural gossip. \n\t\t\n\t\tYou're glad you've seen beyond the mundane veil, however relieved that you retain the peace to live your life that comes with not being in too deep. \n\t\t*achieve shallow\n\t\t\n\t\t*page_break\n\t\t\n\t\tThank you for Playing Wizardry Level C. \n\n\t\tThis adventure is over, however there are still many other choices that can be made. \n\n\t\tWould you like to play again?\n\t\t*choice\n\t\t\t#Reload from the last checkpoint. (Meeting with Garmr). \n\n\t\t\t\tThe world fades around you, then snaps back into sharp focus, leaving you with the odd sense of deja vu. \n\t\t\t\t\n\t\t\t\tWhat were you doing again? Something broke your train of thought. You look around at the dark street. That's right, you were going blowing off some steam after being kicked out of the guild.  \n\t\t\t\t*goto_scene faillicence\n\n\t\t\t#Restart from the beginning.\n\t\t\t\t*goto_scene ending \n\t\n\t\t\n\t*if ((unicornhair = \"Unicorn Hair.\")\tand (ring = \"Ruby Ring.\")) #Epilogue\n\t\tYou still have your strands of Unicorn hair, which most people assume are some kind of spun sliver and the valuable ruby ring that was a gift from the little Brownie Ashie. \n\n\t\tAlthough unable to use them yourself as a consequence of the Wizard's Guild taking away your licence, you enjoy telling stories to the children at family get-togethers about the magical things present all around us, only hidden from view. \n\n\t\tAlthough the children believe your stories, the adults only laugh and ask you where you get such an imagination from. You're ok with that, simply laughing along with them at the \"make believe\" stories you tell. \n\t\t\n\t\tAshie is still around, continuing to keep your house spotlessly clean for you, and although he considers it a great breach of brownie etiquette, he will come out and join you for morning tea from time to time at request, filling you in on all the latest supernatural gossip. \n\t\t\n\t\tYou're glad you've seen beyond the mundane veil, however relieved that you retain the peace to live your life that comes with not being in too deep. \n\t\t*achieve shallow\n\t\t\n\t\t*page_break\n\t\t\n\t\tThank you for Playing Wizardry Level C. \n\n\t\tThis adventure is over, however there are still many other choices that can be made. \n\n\t\tWould you like to play again?\n\t\t*choice\n\t\t\t#Reload from the last checkpoint. (Meeting with Garmr). \n\n\t\t\t\tThe world fades around you, then snaps back into sharp focus, leaving you with the odd sense of deja vu. \n\t\t\t\t\n\t\t\t\tWhat were you doing again? Something broke your train of thought. You look around at the dark street. That's right, you were going blowing off some steam after being kicked out of the guild.  \n\t\t\t\t*goto_scene faillicence\n\n\t\t\t#Restart from the beginning.\n\t\t\t\t*goto_scene ending \n\t\n\n\n\t*if ((unicornhair != \"Unicorn Hair.\") and ( ring = \"Ruby Ring.\" )) #Epilogue\t\n\t\tYou still have your valuable ruby ring that was a gift from the little Brownie Ashie. \n\n\t\tAlthough unable to use it yourself as a consequence of the Wizard's Guild taking away your licence, you enjoy telling stories the children at family get-togethers about the magical things present all around us, only hidden from view. \n\n\t\tAlthough the children believe your stories, the adults only laugh and ask you where you get such an imagination from. You're ok with that, simply laughing along with them at the \"make believe\" stories you tell. \n\t\t\n\t\tAshie is still around, continuing to keep your house spotlessly clean for you, and although he considers it a great breach of brownie etiquette, he will come out and join you for morning tea from time to time at request, filling you in on all the latest supernatural gossip. \n\t\t\n\t\tYou're glad you've seen beyond the mundane veil, however relieved that you retain the peace to live your life that comes with not being in too deep. \n\t\t*achieve shallow\n\t\t\n\t\t*page_break\n\n\t\tThank you for Playing Wizardry Level C. \n\n\t\tThis adventure is over, however there are still many other choices that can be made. \n\n\t\tWould you like to play again?\n\t\t*choice\n\t\t\t#Reload from the last checkpoint. (Meeting with Garmr). \n\t\t\t\tThe world fades around you, then snaps back into sharp focus, leaving you with the odd sense of deja vu. \n\t\t\t\t\n\t\t\t\tWhat were you doing again? Something broke your train of thought. You look around at the dark street. That's right, you were going blowing off some steam after being kicked out of the guild.  \n\t\t\t\t*goto_scene faillicence\n\n\t\t\t#Restart from the beginning.\n\t\t\t\t*goto_scene ending \n\t\t\n\t\t\n\n\t\t\n\n\n\t\n*label unicornchoice\n*Choice\n\t#Retrieve the remaining strands of unicorn hair from your pocket and offer them to Garmr.\n\t\t\"My misunderstanding.\" you apologise. \"Of course something of this value is worth more than one strand of unicorn hair.\"\n\t\t\t\n\t\tGarmr looks annoyed but still seems to want to go ahead with the trade and backs down, composing his features again into one of stillness. \n\t\t\t\n\t\t\"Very well human, the trade is a good one.\" He picks up the wand from the ground in his jaws and flicks it across to you. As you catch it from the air, you're immediately hit by the thrum of power surrounding the slim wand. Yes it does seem to have been a good trade for all involved. \n\t\t\t\n\t\t\"You know my name now human. If you come across any other objects I may be interested in, just call my name and I will answer.\" With a nod, he slinks off into the gloom silently and disappears. \n\t\t*Set unicornhair \"\"\n\t\t*set wand \"Garmr's Wand\"\n\t\t*set ringunicorn \"a ruby ring, the golden band wound with silvered strands of unicorn hair glowing softly with magic.\"\n\t\t*goto_scene decidewand\n\t\t\n\t#Insist this is all you have. (Even though you have several more strands in your pocket.)\n\t\t\"This is all I have Garmr. Really I'm telling the truth. Your sources must be mistaken.\"\n\t\t\t\n\t\tThe Black Dog fixes you with an unsettling stare, his glowing eyes seem to bore into you. He starts to growl, white teeth gleaming brightly against the darkness. \n\t\t\t\n\t\t\"You lie human. I should take your life for this.\" He advances on you menacingly, hackles raised, teeth bared in a snarl.\n\t\t\t\n\t\t\"Please don't! Here take it, it's yours!\" You throw the strand of hair to Garmr who catches it in his jaws with a snap. \n\t\t\t\n\t\t\"I'll take this as a good will gesture human, and you will have your life tonight. But don't think this is over. I will be watching you.\" \n\t\t\t\n\t\tWith that ominous statement, the hound slinks silently off into the gloom. \n\t\t*set object 1\n\t\t*page_break\n\t\t*goto donttrade\n\t\t\n\t\t\n\t\t\t\n\t\t\n\t\t\n*label declinebunyipofficetrack\n\nHeading home, you slam the front door close and plonk down on the couch in the lounge room. Leaving the TV off, you contemplate recent events in silence. \n\n*comment same as the declinebunyipoffice txt from here.\n\nHow do you feel about the loss of your licence?\n\n*Fake_Choice\n\t#Good riddance. The whole thing was more trouble than it was worth. \n\t\tAlthough it had seemed like a good idea at the time. In practice, it was full of overbearing superiors who liked to order you around, taking care of all their odd jobs and even dangerous assignments for them. You're genuinely glad to be rid of it all, even though it means the loss of your magic.\n\n\t\tExperimentally you try zapping a pen off the table. No matter how hard you concentrate, the pen stays stubbornly still. \n\n\t\t[i]\"Well that's that.\"[/i] you think silently to yourself. There really is no more magic. In a way you're relieved. That night you fall into a peaceful, dreamless sleep. \n\t\t*set nomagic 1\t\n\t\t*page_break\n\t\t\t\t\n\n\n\t#Saddened. You're unhappy about the way everything turned out in the end.\t\n\t\tThere are things you decide that you definitely wont miss. All the ordering around and cranky, superior attitudes from many of the office staff for one. On the other hand, you think that given other circumstances, you could have gotten along well with the old wizard Merlinus. \n\n\t\tAnd then there is the magic. You will miss that. If only there was a way to practice it without having to be under the thumb of the guild. \n\n\t\tExperimentally you try zapping a pen off the table. No matter how hard you concentrate, the pen stays stubbornly still. \n\n\t\t[i]\"Well that's that.\"[/i] you think silently to yourself. There really is no more magic. It saddens you but there's nothing for it, you made the choices that brought you here. You head dejectedly off to bed and fall into a deep sleep. \n\n\t\t*page_break\n\t\t\t\t\n\nYou're half-awakened the next morning by a moth's wings fluttering in your face. Grumpily you try to brush it away with your hand when it bites you!\n\nSnapping to full alertness your eyelids fly open, only to see not a moth but a tiny fairy, batting at your face trying to get your attention. You give a startled yelp which turns into a fit of coughing as the fae flits away in a shower of golden dust. \n\nDoubled over, it takes a few minutes of hacking to clear your lungs of the irritant particles. When you can finally catch your breath again, you search with watery eyes for the small creature. You find her easily, perched on top of the curtain rail, reflective blue wings twitching uncertainty. \n\n\"It's ok\" you call out to her. \"You just startled me, that's all. I'm not going to hurt you. Why are you here?\"\n\n*page_break\n\nThe fae looks uncertain but flies down to hover level with your face. Hands pull at her green tunic anxiously. \n\n\"Wizard, you've got to help us!\" the high pitched voice pipes. \"The feline one has my friend trapped!\"  \n\n*choice\n\t*Selectable_if (nomagic = 1 ) #I can't help you, I'm not a wizard anymore, I'm out of the magic game now. \n\t\tThe fae's pale feature blanch even further. \"But the feline one will [i]eat[/i] him!\" She wails.\n\n\t\tYou almost give in at that point, it's not like you're completely stone-hearted after all; but you really need a clean break if you want to get back to your life before all the wizardry stuff happened. \n\n\t\tBesides which, you have a sneaking suspicion that for the fae, with their own brand of magic not to be able to deal with the \"feline one,\" it's probably going to be more than your average domestic tabby. Most likely you'll go down there and end up face to face with something more like a cat sith or a manticore, which will only go badly for you, now that you're without magic. \n\n\t\t\"Look I'm sorry,\" you tell the fairy firmly \"But I really can't help you. Try the wizard's guild, they're sure to send someone along who can save your friend.\"\n\n\t\tThe fae's hands ball up into tiny fists as her face contorts with rage. \"You'll live to regret this human!\" she screams at you, before leaving swiftly through the open window in a cloud of sparkling dust that sets you to coughing harshly again.\n\t\t\n\t\t*page_break\n\t\t*goto_scene declinefairy\n\n\n\t*Selectable_if (nomagic = 0 ) #Of course I'll help you. where is he?\n\t\tThe fae's anguished features brighten. \"You'll really help?\" \n\t\t\n\t\tTugging at your hair she pulls you towards the door. \"No time to wait, the feline one is going to [i]eat[/i] him.\" \n\n\t\tThe fairy pulls you down the stairs and towards the front door. You're still in your pajamas but considering what's been going on lately, having your neighbours catch you walking down the street in blue striped flannel is probably going to be the least of your worries. \n\n\t\t*page_break\n\t\t*goto_scene helpfairy\n\n", "familiarbus": "*page_break\n\nReaching the bus stop you plonk your backpack down on the cold metal chair and take a seat beside it. Having arrived in plenty of time, no one else has turned up yet. You give a start when your familiar appears on the seat beside you. \n\n\"Hey little buddy, you followed me all the way here after all. Well I guess you can keep me company while I wait for the bus.\" You give the animal a smile. \n\n\"Maybe I should give you a name? I can't very well keep calling you \"${animal}\" can I?\"\n\n*Choice\n\t#I think I'll name you....\t\t\n\t\t*goto animalname\n\t\t\n\t*if (animal = \"badger\") #Actually I've changed my mind, I think I'll just continue calling you ${animal}\t\n\t\tYour familiar gives you a look that seems almost disappointed. Strange, how could you know what a disappointed ${animal} looks like? There may be more to this familiar bond than meets the eye. \n\t\t*set familiarname \"Badger\"\n\t\t*set familiarthe \"the\"\n\t\t*goto bus1\n\t\t\n\t*if (animal = \"butterfly\") #Actually I've changed my mind, I think I'll just continue calling you ${animal}\t\n\t\tYour familiar gives you a look that seems almost disappointed. Strange, how could you know what a disappointed ${animal} looks like? There may be more to this familiar link than meets the eye. \n\t\t*set familiarname \"Butterfly\"\n\t\t*set familiarthe \"the\"\n\t\t*goto bus1\t\n\t\t\n\t*if (animal = \"gecko\") #Actually I've changed my mind, I think I'll just continue calling you ${animal}\t\n\t\tYour familiar gives you a look that seems almost disappointed. Strange, how could you know what a disappointed ${animal} looks like? There may be more to this familiar link than meets the eye. \n\t\t*set familiarname \"Gecko\"\n\t\t*set familiarthe \"the\"\n\t\t*goto bus1\t\n\t\t\n\t*if (animal = \"kingfisher\") #Actually I've changed my mind, I think I'll just continue calling you ${animal}\t\n\t\tYour familiar gives you a look that seems almost disappointed. Strange, how could you know what a disappointed ${animal} looks like? There may be more to this familiar link than meets the eye. \n\t\t*set familiarname \"Kingfisher\"\n\t\t*set familiarthe \"the\"\n\t\t*goto bus1\t\n\t\t\n\t\t\n*label animalname\n\n*choice\n\t*if (animal = \"butterfly\") #Sapphire\n\t\t*set familiarname \"Sapphire\"\n\t\t*set familiarthe \"the\"\n\t\t*goto bus\n\t\t\n\t*if (animal = \"butterfly\") #George\n\t\t*set familiarname \"George\"\n\t\t*set familiarthe \"the\"\n\t\t*goto bus\t\n\n\t*if (animal = \"butterfly\") #Flutter\n\t\t*set familiarname \"Flutter\"\n\t\t*set familiarthe \"the\"\n\t\t*goto bus\n\t\t\n\t*if (animal = \"butterfly\") #Lepi\n\t\t*set familiarname \"Lepi\"\n\t\t*set familiarthe \"the\"\n\t\t*goto bus\t\n\t\t\n\t*if (animal = \"butterfly\") #Tera\n\t\t*set familiarname \"Tera\"\n\t\t*set familiarthe \"the\"\n\t\t*goto bus\t\n\t\t\n\t\t\n\t*if (animal = \"badger\") #Snuffles\n\t\t*set familiarname \"Snuffles\"\n\t\t*set familiarthe \"the\"\n\t\t*goto bus\t\n\t\n\t*if (animal = \"badger\") #Muste\n\t\t*set familiarname \"Muste\"\n\t\t*set familiarthe \"the\"\n\t\t*goto bus\t\n\n\t*if (animal = \"badger\") #Taxus\n\t\t*set familiarname \"Taxus\"\n\t\t*set familiarthe \"the\"\n\t\t*goto bus\t\t\n\n\t*if (animal = \"badger\") #Tanuki\n\t\t*set familiarname \"Tanuki\"\n\t\t*set familiarthe \"the\"\n\t\t*goto bus\n\t\t\n\t*if (animal = \"badger\") #Brock\n\t\t*set familiarname \"Brock\"\n\t\t*set familiarthe \"the\"\n\t\t*goto bus\t\n\t\t\n\t\n\t*if (animal = \"kingfisher\") #Iri\n\t\t*set familiarname \"Iri\"\n\t\t*set familiarthe \"the\"\n\t\t*goto bus\t\n\t\t\n\t*if (animal = \"kingfisher\") #Alice\n\t\t*set familiarname \"Alice\"\n\t\t*set familiarthe \"the\"\n\t\t*goto bus\t\n\n\t*if (animal = \"kingfisher\") #Cora\n\t\t*set familiarname \"Cora\"\n\t\t*set familiarthe \"the\"\n\t\t*goto bus\t\n\n\t*if (animal = \"kingfisher\") #Feather\n\t\t*set familiarname \"Feather\"\n\t\t*set familiarthe \"the\"\n\t\t*goto bus\t\n\n\t*if (animal = \"kingfisher\") #Cyan\n\t\t*set familiarname \"Cyan\"\n\t\t*set familiarthe \"the\"\n\t\t*goto bus\t\n\n\t*if (animal = \"gecko\") #Ember\n\t\t*set familiarname \"Ember\"\n\t\t*set familiarthe \"the\"\n\t\t*goto bus\t\t\t\n\n\t*if (animal = \"gecko\") #Tokay\n\t\t*set familiarname \"Tokay\"\n\t\t*set familiarthe \"the\"\n\t\t*goto bus\t\n\t\t\n\t*if (animal = \"gecko\") #Gekkota\n\t\t*set familiarname \"Gekkota\"\n\t\t*set familiarthe \"the\"\n\t\t*goto bus\t\t\n\t\t\n\t*if (animal = \"gecko\") #Loki\n\t\t*set familiarname \"Loki\"\n\t\t*set familiarthe \"the\"\n\t\t*goto bus\t\n\n\t*if (animal = \"gecko\") #Draco\n\t\t*set familiarname \"Draco\"\n\t\t*set familiarthe \"the\"\n\t\t*goto bus\t\t\t\n\t\t\n\t#I have another name in mind\n\t\t*label input_familiarname\n\t\tWhat name would you prefer?\n\t\t*input_text familiarname\n\t\t*set familiarname \"$!{familiarname}\"\n\t\t*set familiarthe \"the\"\n\t\t*goto bus\n\n*label bus\n\n\"How about it? Do you mind if I call you ${familiarname}?\" you ask the ${animal}.\t\n\nYour familiar gives you a look that seems almost pleased. Strange, how could you know what a happy ${animal} looks like? There may be more to this familiar bond than meets the eye. \t\n*goto bus1\n\n*label bus1\t\t\n*choice\n\t*If (animal = \"badger\") #Try to talk to your familiar\n\t\tYou look down at the furry black and white animal. \"So, can you talk to me?\"\n\t\t\n\t\tSilently the ${animal} looks up at you with dark eyes. \n\t\t\n\t\t\"Do you want to stay with me? I wouldn't want to accidentally keep you here against your will.\" you ask ${fhim}.\n\t\t\n\t\tYou [i]feel[/i] another surge of emotion, one of contentment, from the creature at your side. Reassured, you settle back to wait for your ride.\n\t\t*goto badgerbus \n\t\t\n\t*If (animal = \"badger\") #Sit quietly \n\t\tThe morning sunshine peeks out from behind the clouds, bathing you in its warm light. You lean back into the seat with your ${animal} beside you, silently enjoying their company while you think over the events of the morning, trying to make sense of it all. \n\t\t*goto badgerbus\n\t\t\n\t\t\n\t*If ( animal = \"butterfly\" ) #Try to talk to your familiar\n\t\tYou study the delicate blue and gold insect. \"So, can you talk to me?\"\n\t\t\n\t\tSilently the ${animal} looks up at you with dark eyes. \n\t\t\n\t\t\"Do you want to stay with me? I wouldn't want to accidentally keep you here against your will.\" you ask ${fhim}.\n\t\t\n\t\tYou [i]feel[/i] another surge of emotion, one of contentment, from the creature at your side. Reassured, you settle back to wait for your ride.\n\t\t*goto butterflybus \n\t\t\n\t*If ( animal = \"butterfly\" ) #Sit quietly \n\t\tThe morning sunshine peeks out from behind the clouds, bathing you in its warm light. You lean back into the seat with your ${animal} beside you, silently enjoying their company while you think over the events of the morning, trying to make sense of it all. \n\t\t*goto butterflybus\n\t\t\n\t\t\n\t*If ( animal = \"gecko\" ) #Try to talk to your familiar\n\t\tYou look down at the orange pattered reptile. \"So, can you talk to me?\"\n\t\t\n\t\tSilently the ${animal} looks up at you with dark eyes. \n\t\t\n\t\t\"Do you want to stay with me? I wouldn't want to accidentally keep you here against your will.\" you ask ${fhim}.\n\t\t\n\t\tYou [i]feel[/i] another surge of emotion, one of contentment, from the creature at your side. Reassured, you settle back to wait for your ride.\n\t\t*goto geckobus \n\t\t\n\t*If ( animal = \"gecko\" ) #Sit quietly \n\t\tThe morning sunshine peeks out from behind the clouds, bathing you in its warm light. You lean back into the seat with your ${animal} beside you, silently enjoying their company while you think over the events of the morning, trying to make sense of it all. \n\t\t*goto geckobus\n\t\t\n\t\t\n\t*If ( animal = \"kingfisher\" ) #Try to talk to your familiar\n\t\tYou look down at your feathered friend. \"So, can you talk to me?\"\n\t\t\n\t\tSilently the ${animal} looks up at you with dark eyes. \n\t\t\n\t\t\"Do you want to stay with me? I wouldn't want to accidentally keep you here against your will.\" you ask ${fhim}.\n\t\t\n\t\tYou [i]feel[/i] another surge of emotion, one of contentment, from the creature at your side. Reassured, you settle back to wait for your ride.\n\t\t*goto kingfisherbus \n\t\t\n\t*If ( animal = \"kingfisher\" ) #Sit quietly \n\t\tThe morning sunshine peeks out from behind the clouds, bathing you in its warm light. You lean back into the seat with your ${animal} beside you, silently enjoying their company while you think over the events of the morning, trying to make sense of it all. \n\t\t*goto kingfisherbus\n\n\t\t\n*label badgerbus\t\t\nBefore long you notice the red painted bus approaching, chugging along the road towards your stop. Standing to signal the vehicle, you turn to your familiar.\n\n\"I've got to go now, will you be ok while I'm at ${work}?\" The ${animal} gives a strangely human like nod. \"Just keep out of sight, ok? I'll be back as soon as I can.\"\n\nThe bus pulls into the curb with a metallic squeak as the door swings open. With one last glance at the ${animal}, you climb up the stairs and hand the grey haired driver some coins for the fare.\n\n*page_break\n\nWalking towards the back of bus you find a seat free and slide in. You're still a little concerned about leaving your familiar like that at the stop, but you couldn't very well bring ${fhim} on the bus with you, the driver would never have allowed it.\n\nYou jump as something brushes by your legs. Looking down, you see your badger with a rather pleased look on ${fhis} face before curling up on your shoes contentedly. \n\n\"You can't be here,\" you whisper down at the badger. \"What if someone sees you?\"\n\nA grey suited lady across the aisle gives the two of you a concerned look. \n\n\"I'm sorry,\" you say forcing a nervous smile. \"My pet must have gotten out of ${fhis} enclosure and followed me here. Please don't tell the driver.\"\n\nShe tilts her head, studying you closely. \"Are you ok?\" \n\n*page_break\n\nSuddenly it all clicks into place. The passenger is looking directly at you, [i]only[/i] you.\n\n[i]Of course.[/i] You think to yourself. [i]I told ${familiarname} to keep out of sight. Somehow ${fhe} must be using magic to stay hidden.[/i] \n\nYou can't stop yourself from giggling. [i]No wonder wizards are seen as eccentric. They're not crazy, just busy talking to entities no one else can see![/i]\n\nYou notice the lady has started to lean away from you, looking more worried than concerned now. [i]Ok, definitely time to try and do some damage control.[/i]\n\n\"I'm fine, really.\" you tell her smoothly. \"I'm sorry if I seemed a bit strange, I'm ah.....I'm practising method acting.\" At her bewildered look you elaborate. \"Method acting? It's when you immerse yourself in a role, really live it, to try and get the most realistic performance possible. I'm trying to get the hang of a character for a play I'm in. Sometimes I get so caught up in it, I forget what it must look like to anyone who isn't aware of what I'm doing.\"\n\nShe nods slowly, obviously thinking you're a little unusual, but seemingly buying your story. \n\nThen you hear something that make your blood run cold. \"Oh ${name}! I thought that was your voice!\"\n\n*page_break\n\nYou cringe inwardly as the over-loud, trilling voice of Mrs Brown booms though the bus as she leans across from the seat behind you. Of all the people who could have been eavesdropping, she is definitely one of the less favourable. Always up for gossip, anything you say will likely be repeated to anyone who will listen before the week is out.\n\nWithout asking she gets up and moves to the seat next to you, smoothing the folds of a long, flowery, purple dress and adjusting a matching straw hat decked with artificial flowers and butterflies. \n\n\"Ah..Mrs Brown, how nice to see you.\" You give her your best (albeit forced) smile. You reflect she insists on being called by her last name even though she makes full use of your given one. It's easier to humour her. You try not to sigh, just keep smiling.\n\n\"Now ${name},\" her voice takes on a lecturing tone. \"You never told me you were in a play.\"\n\n*fake_choice\n\t#Make up a story about the play you're acting in.\n\t\t\"Didn't I?\" You try to sound innocent. \"I'm sorry Mrs Brown, you know you'd be one of the first people I'd tell. I really thought I had.\"\n\t\t\n\t\tShe nods her head, perfectly coiffured brown curls not shifting even slightly with the movement. She seems mollified by your apology.\n\t\n\t\t\"So tell me, what is the play? When will it be presented? Is it Shakespeare? You know I [i]love[/i] Shakespeare. Or a musical? I [i]adore[/i] musicals. As long as they're tasteful you understand. None of that rock and roll nonsense...\" She continues to natter on for a few minutes about what does and does not make a good play to her standards. \n\n\t\tYou're only half listening at this point, absorbed in your own concerns. You hadn't thought she might actually want to come. How to discourage her?\n\t\t*page_break\n\t\t\n\t\t\"Um... it's only a small local production. Very amateur. It's for new actors, I'm not sure it'll really be any good, particularly for someone with your cultured tastes. I'd love to have you there...but I'd hate for you to have a bad time. Maybe wait until we're all a bit more practised?\"\n\t\t\n\t\tShe purses her pink tinted lips, considering. Always the socialite, it really wouldn't do to be seen at an [i]amateur production.[/i] \n\t\t\n\t\t\"Oh well...quite. Maybe next time.\" She replies, oblivious to the offence that would have caused had you really been in a performance. \n\n\t\t\n\t#Tell her you're only practising and not in a play after all.\n\t\t\tAn outright lie to someone who is likely to spread that falsehood to at least half the neighbourhood might be a bad idea. You decide on something less able to be checked. She looks at you expectantly, perfectly coiffured brown hair not showing a strand out of place. It gives you an idea.\n\t\t\t\n\t\t\t\"Well...to say I'm actually [i]in[/i] a play is a bit of an exaggeration. I'm practising, I think it'd be something I'd like to take up as a hobby. There's some amateur presentations I was thinking about trying out for. Small ones, they'll probably run in the local scout hall or such like.\"\n\t\t\t\n\t\t\tAt the words [i]amateur presentation[/i] and [i]scout hall[/i] you see her eyes glaze over and you know you've won. Someone of her finicky personality would have no interest in a locally run play. \n\t\t\t\n\t\t\t\"Well that's nice dear,\" she tells you in an irritatingly condescending tone. \"I'm sure you'll be wonderful. Keep up with your practice. Maybe not where people can see you though, it might be better you do your acting in private don't you think?\"\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tYou mentally face-palm at the comment. If you really had been in a production, that would have been highly offensive, even if made by someone too self absorbed to realise the hurt she may have given by that offhand comment. As it is, you're just glad she bought it. \n\n\n\t\t\t\nAs the bus rumbles along, you only half listen to the ongoing chatter from your neighbour, that as usual consists of the general rumours and goings on of the people in your area, many of which you barely know.\n\n*page_break \n\nYour reverie is broken when you spot ${familiarname} investigating the tropical flower pattern along the hem of Mrs Brown's dress. Your eyes widen as ${fhe} chews experimentally on a bright purple petal.\n\nYour shift in attention does not go unnoticed. \"I see you're admiring my dress. Isn't it just lovely! I bought it yesterday from Blooming Fashions. Expensive you understand, but I had to have something to wear to the tea party today. I was invited by Dame Blant. Did you know she has personally met the Queen of England...\" She continues to ramble with excitement about the social event, oblivious to your alarm as the ${animal} turns ${fhis} attention from the tasteless cotton flowers, to paw at the zip of her black leather handbag.\n\n\"Uh huh....yes...that sounds lovely...\" You try to make the appropriate noises in response to her conversation, while desperately trying to get the attention of your familiar who seems to be intent on ignoring you right now. \n\n*page_break\n\nWith a triumphant look the ${animal} manages to get the bag open and starts rummaging through the contents, spilling money, pens and containers of makeup onto the floor where they start to roll away with the movement of the bus. Mission accomplished, ${familiarname} bounds playfully down the aisle, chasing a biro.\n\nYou take the opportunity to intervene. \"Oh look, your bag has tipped over! Let me help you pick everything up.\"\n\nScrambling to pick up the spilled items that have rolled under adjacent seats, you give your familiar a warning scowl. With a playful flick of ${fhis} head, he hides under a chair holding the pen in his mouth, daring you to try and take it off ${fhim}. You decide it's not worth the hassle and leave ${fhim} to ${fhis} prize.\n\n[i]Ok, better get out of here before your familiar can create any further mischief. [/i]\n\n*page_break\n\n\"Oh look, this is my stop already!\" you exclaim loudly, shooting a sideways look at the ${animal}.\n\nMrs Brown narrows her eyes at you. \"This isn't the stop for your ${work}. Where are you going?\"\n\nThink quick... \"Yes, well we're having walk to ${work} week. You know, more exercise for healthier hearts?\"\n\nShe nods, plastic butterflies swinging on their wires from her hat. \"Ok, but be careful. Who knows what kind of people could be out there?\"\n\nYou assure her you'll be careful and signal the driver to stop. Quickly you exit, making surreptitious gestures to your delinquently inclined familiar to follow.\n*page_break\n\t\t\n*goto_scene unicorntest\n\n\n\n\n\n*label geckobus\t\t\nBefore long you notice the red painted bus chugging along the road towards your stop. Standing to signal the vehicle, you turn to your familiar.\n\n\"I've got to go now, will you be ok while I'm at ${work}?\" The ${animal} gives a strangely human like nod. \"Just keep out of sight, ok? I'll be back as soon as I can.\"\n\nThe bus pulls into the curb with a metallic squeak as the door swings open. With one last glance at the ${animal}, you climb up the stairs and hand the grey haired driver some coins for the fare.\n\n*page_break\n\nWalking towards the back of bus you find a seat free and slide in. You're still a little concerned about leaving your familiar like that at the stop, but you couldn't very well bring ${fhim} on the bus with you, the driver would never have allowed it.\n\nYou jump as something sticky touches your ear. Turning, you see your gecko flicking his long pink tongue at you from his perch on the top of the vinyl seat. $!{fhe} seems to have a very pleased, almost mischievous look on ${fhis} face.\n\n\"You can't be here,\" you whisper to the gecko. \"What if someone sees you?\"\n\nA grey suited lady across the aisle gives the two of you a concerned look. \n\n\"I'm sorry,\" you say forcing a nervous smile. \"My pet must have gotten out of ${fhis} enclosure and followed me here. Please don't tell the driver.\"\n\nShe tilts her head, studying you closely. \"Are you ok?\"\n\n*page_break\n\nSuddenly it all clicks into place. The passenger is looking directly at you, [i]only[/i] you. \n\n[i]Of course.[/i] You think to yourself. [i]I told ${familiarname} to keep out of sight. Somehow ${fhe} must be using magic to stay hidden.[/i] \n\nYou can't stop yourself from giggling. [i]No wonder wizards are seen as eccentric They're not crazy, just busy talking to entities no one else can see![/i]\n\nYou notice the lady has started to lean away from you, looking more worried than concerned now. [i]Ok, definitely time to try and do some damage control.[/i]\n\n\"I'm fine, really.\" you tell her smoothly. \"I'm sorry if I seemed a bit strange, I'm ah.....I'm practising method acting.\" At her bewildered look you elaborate. \"Method acting? It's when you immerse yourself in a role, really live it, to try and get the most realistic performance possible. I'm trying to get the hang of a character for a play I'm in. Sometimes I get so caught up in it, I forget what it must look like to anyone who isn't aware of what I'm doing.\"\n\nShe nods slowly, obviously thinking you're a little unusual, but seemingly buying your story. \n\nThen you hear something that make your blood run cold. \"Oh ${name}! I thought that was your voice!\"\n\n*page_break\n\nYou cringe inwardly as the over-loud, trilling voice of Mrs Brown booms though the bus as she leans across from the seat behind you. Of all the people who could have been eavesdropping, she is definitely one of the less favourable. Always up for gossip, anything you say will likely be repeated to anyone who will listen before the week is out.\n\nWithout asking she gets up and moves to the seat next to you, smoothing the folds of a long, flowery, purple dress and adjusting a matching straw hat decked with artificial flowers and butterflies. \n\n\"Ah..Mrs Brown, how nice to see you.\" You give her your best (albeit forced) smile. You reflect she insists on being called by her last name even though she makes full use of your given one. It's easier to humour her. You try not to sigh, just keep smiling.\n\n\"Now ${name},\" her voice takes on a lecturing tone. \"You never told me you were in a play.\"\n\n*fake_choice\n\t#Make up a story about the play you're acting in.\n\t\t\"Didn't I?\" You try to sound innocent. \"I'm sorry Mrs Brown, you know you'd be one of the first people I'd tell. I really thought I  thinking about trying out for. Small ones, they'll probably run in the local scout hall or such like.\"\n\t\t\t\n\t\t\tAt the words [i]amateur presentation[/i] and [i]scout hall[/i] you see her eyes glaze over and you know you've won. Someone of her finicky personality would have no interest in a locally run play. \n\t\t\t\n\t\t\t\"Well that's nice dear,\" she tells you in an irritatingly condescending tone. \"I'm sure you'll be wonderful. Keep up with your practice. Maybe not where people can see you though, it might be better you do your acting in private don't you think?\"\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tYou mentally face-palm at the comment. If you really had been in a production, that would have been highly offensive, even if made by someone too self absorbed to realise the hurt she may have given by that offhand comment. As it is, you're just glad she bought it. \n\n\n\t\t\t\nAs the bus rumbles along, you only half listen to the ongoing chatter from your neighbour, that as usual consists of the general rumours and goings on of the people in your area, many of which you barely know.\n\n*page_break \n\nYour reverie is broken when you spot ${familiarname} walking along the seat to investigate the contents of your companion's hat more closely. Your eyes widen as you see ${fhim} peck experimentally at the fake butterflies wired into the straw hat. \n\nYour shift in attention does not go unnoticed. \"I see you're admiring my hat. Isn't it just lovely! I bought it yesterday from Blooming Fashions. Expensive you understand, but I had to have something to wear to the tea party today. I was invited by Dame Blant. Did you know she has personally met the Queen of England...\" She continues to ramble with excitement about the social event, oblivious to your alarm as the ${animal} turns ${fhis} attention from the tasteless plastic insects, to eye investigate the bright flowery pattern on her sleeve. \n\n\"Uh huh....yes...that sounds lovely...\" You try to make the appropriate noises in response to her conversation, while desperately trying to get the attention of your familiar who seems to be intent on ignoring you right now. \n\n*page_break\n\nWith a curious look, the ${animal} gives a ladybug printed on a bright purple flower a quick peck. \n\n\"Ouch!\" your companion exclaims, slapping at her arm. Confused to see nothing there. \"Something just bit me...Did you see what it was?\"\n\nYou shrug helplessly, indicating you didn't see anything unusual.\n\n\"Oh, ok... I'm not sure...Maybe..\" She looks around, seemingly uncertain about what to do from here.\n\nA quick glance around spots ${familiarname}, hovering in the air with a mischievous feeling radiating from her. You have a horrible feeling your familiar has decided this could be a good game to play on your poor neighbour. \n\n[i]Ok, it's definitely time to go before your butterfly an cause any further trouble.[/i]\n\n\n*page_break\n\n\"Oh look, this is my stop already!\" you exclaim loudly, shooting a sideways look at the ${animal}.\n\nMrs Brown narrows her eyes at you. \"This isn't the stop for your ${work}. Where are you going?\"\n\nThink quick... \"Yes, well we're having walk to ${work} week. You know, more exercise for healthier hearts?\"\n\nShe nods, plastic butterflies swinging on their wires from her hat. \"Ok, but be careful. Who knows what kind of people could be out there?\"\n\nYou assure her you'll be careful and signal the driver to stop. Quickly you exit, making surreptitious gestures to your delinquently inclined familiar to follow.\n*page_break\n\t\t\n*goto_scene unicorntest\n", "familiarsearch": "*page_break\nRunning for the bus again, seems to be the story of your life. It's another wet and miserable day with overcast skies and a cutting wind that pulls at your coat. Running along the road, you skip around puddles and fallen branches on the side walk. Although in a hurry, you notice something lying on the road and stop to investigate. \n\n*choice\n\t*if (Air = 100) #A brightly coloured butterfly lies crumpled by the side of the road. \n\t\tOne of its wings looks torn and it's unable to fly off.  What do you do?\n\n\t\t*choice\n\t\t\t#Attempt to heal it. \n\t\t\t\tYou scoop up the tiny blue and gold insect, cradling it gently in your hands. It looks weak but you think you can help it. You jog down the road and turn into a park. \n\n\t\t\t\tYou turn off the main path, heading towards a secluded area, shielded by large trees. Mud splashes across your shoes with every step as you walk further away from the trail, however this still seems preferable to trying out a ritual where people could stumble across you and ask questions.  \n\n\t\t\t\tReaching a suitable spot, you pull out your magic book and flip to the section on healing spells. You find one which should work with what you have available. Gathering some flower petals and leaves from the surrounding trees, you call up a breeze to settle them around the small creature. \"Sanos Vulnerare,\" you intone, wrapping bands of yellow light around the injured limb. To your delight, as the glow fades, the butterfly flaps his wings experimentally then lifts off alighting on your hand. \n\n\t\t\t\tHe looks at you with intelligent eyes. You've created a bond with this creature and he has decided to stay with you and help where he can.  \n\n\t\t\t\t*achieve familiar\n\t\t\t\t*set good_standing +10\n\t\t\t\t*set familiartype \"Saphire Winged Butterfly\"\n\t\t\t\t*set Familiarnumber 3\n\t\t\t\t*set animal \"butterfly\"\n\t\t\t\t*set fhe \"he\"\n\t\t\t\t*set fhis \"his\"\n\t\t\t\t*set fhim \"him\"\n\t\t\t\t*goto watchtime\n\n\t\t\t#Take it to an animal hospital. \n\t\t\t\tYou scoop up the tiny blue and gold insect, cradling it gently in your hands. Walking down the road to a nearby veterinary clinic you present the butterfly to the veterinarian on duty there. She seems kind of surprised that someone decided to bring in a butterfly, but promises to do what she can for it. You leave feeling like you've done your good deed for the day. Unfortunately you're now really late. Luckily you have the time manipulation spelled watch with you. You turn the hands on the time piece and the world blurs around you as if in a fast rewind. \n\n\t\t\t\tAll of a sudden the world jolts back into normal motion, just in time for a man carrying boxes to collide with you, sending both of you sprawling to the ground. You help him collect the boxes while he apologises profusely for not seeing you there. Lesson learnt, next time you use the watch, pick a place out of sight. \n\n\t\t\t\t*goto_scene unicorntest\n\n\t\t\t#Leave it be. \n\t\t\t\tYou leave it on the road telling yourself it's all part of nature, even if it seems cruel sometimes. \n\t\t\n\t\t\t\tWalking away you can't help feeling you may have missed out on an opportunity to use your magic for good. You make it to the bus stop in time and get on.\n\n\t\t\t\t*goto_scene unicorntest\n\n\t*if (Earth = 100) #A badger lies crumpled by the side of the road. \n\t\tWhen it sees you it gives a low growl and tries to crawl away. It's obvious one of its hind legs is badly broken. What do you do?\n\n\n\t\t*choice\n\t\t\t#Attempt to heal it. \n\t\t\t\tYou take off your jacket and scoop up unhappy creature, trying to avoid its sharp teeth. Some people give you sideways looks at the growling bundle in your hands, but you ignore them and jog down the road as fast as you can to a local park. \n\t\t\t\t\n\t\t\t\tYou turn off the main path, heading towards a secluded area, shielded by large trees. Mud splashes across your shoes with every step as you walk further away from the trail, however this still seems preferable to trying out a ritual where people could stumble across you and ask questions.  \n\n\t\t\t\tReaching a suitable spot, you pull out your magic book and flip to the section on healing spells. You find one which should work with what you have available. Gathering small piles of dirt around the injured creature, you plant them with fallen twigs. You trickle some magic into the twigs, causing them to sprout soft green leaves. \"Sanos Vulnerare,\" you intone, wrapping bands of green light around the injured limb. To your delight, as the glow fades, the badger gets to its feet and waddles over to sit beside you.\n\t\n\t\t\t\tHe looks up at you with dark, intelligent eyes. You've created a bond with this creature and he has decided to stay with you and help where he can.  \n\n\t\t\t\t*achieve familiar\n\t\t\t\t*set good_standing +10\n\t\t\t\t*set familiartype \"Moody Badger\"\n\t\t\t\t*set Familiarnumber 2\n\t\t\t\t*set animal \"badger\"\n\t\t\t\t*set fhe \"he\"\n\t\t\t\t*set fhis \"his\"\n\t\t\t\t*set fhim \"him\"\n\t\t\t\t*goto watchtime\n\n\t\t\t#Take it to an animal hospital. \n\t\t\t\tYou take off your jacket and scoop up unhappy creature, trying to avoid its sharp teeth and claws. Some people give you sideways looks at the growling bundle in your hands, but you ignore them and jog down the road as fast as you can to a nearby animal hospital. \n\n\t\t\t\tThe veterinarian on duty seems a little concerned about the snarling badger presented to her but assures you that she will do what she can to repair the leg. You leave feeling like you've done your good deed for the day. Unfortunately you're now really late. Luckily you have the time manipulation watch with you. You turn the hands on the time piece and the world blurs around you as if in a fast rewind. \n\n\t\t\t\tAll of a sudden the world jolts back into normal motion, just in time for a man carrying boxes to collide with you, sending both of you sprawling to the ground. You help him collect the boxes while he apologises profusely for not seeing you there. Lesson learnt, next time you use the watch, pick a place out of sight. \n\n\t\t\t\t*goto_scene unicorntest\n\n\t\t\t#Leave it be. \n\t\t\t\tYou leave it on the road telling yourself it's all part of nature, even if it seems cruel sometimes. \n\t\t\n\t\t\t\tWalking away
