erns over an unstable cliff face. In reality, no one in their right mind would go anywhere near the place....except maybe you. \n\nAlthough not your favourite option to visit by a long shot, knowing what you do now, you'd bet that the cave had some kind of magical deterrent field in effect, hopefully to prevent something of value from being disturbed.  \n\nIt's worth a shot anyway. You pick a morning to teleport over there for a reconnaissance mission. \n\n*page_break\n\nYou arrive at the foot of an imposing, craggy cliff face, overgrown with trees and vines. You'd slipped though the safety barriers erected by park staff without a problem. What was causing you more of an issue was the nagging feeling of what you could only describe as \"wrongness.\" An unnatural, malevolent sensation that threatens to break your nerve and send you scurrying back home. \n\nSteeling yourself with the thought that what you are feeling is probably just due to a warding spell, you brush away the tangled vines and enter the cave. \n*page_break\n\nThe interior of the cave is only dimly lit with the filtered light managing to pass through the vegetation choaked enterance. You tread carefully over the uneven floor, littered with fallen rocks. A trickle of water flows sluggishly through one side tunnel causing soft echoes to reverberate though the chamber. Creating a small light on the end of your wand, you carefully pick your way though the slippery rocks, fearful that a fall could leave you trapped and forgotten in this cave. \n\nA branch of the tunnel splits off, heading steeply upwards. There's a creepy skittering sound, as something moves in the darkness of the tunnel above. You pause imagining what could be lurking in wait in the shadows. Hesitant to continue with something stalking the tunnels behind you, you point your wand into the tunnel. \n\n\"Incendia,\" you whisper, causing a jet of living flame to leap from the end of your wand and snake away through the darkness. With the shrill sound of screeching, you're suddenly battered by a cloud of wings and teeth as dozens of bats flee from their roosting place. Covering your head with your hands, you duck, waiting for the animals to pass.  \n\nWhen the cave is slient again, you allow yourself to take a shaky breath. \n\n\"Just bats,\" you tell yourself. You decide to try and get a grip on your fear before you do anything else stupid. \n\n*page_break\n\nContinuing to creep deeper into the cave system, you eventually come to a dead end. Rubble fills the tunnel, blocking any exploration past this point. \n\nFrustrated, you stand before the obstruction. So close, yet so far. There's no way you can move all this, even with your magic. You'd risk bringing the whole cave system down on you. \n\nSearching by the light of your wand, you notice a small silver rune carved into the side of the cavern wall, almost hidden by the rockfall. Placing you hand on the sigil you close your eyes feeling for the magic. To your surprise it seems to be anchored to bands of energy pulsing over the fallen rocks themselves.\n\n\"An illusion.\" you whisper. A good one too. If not for the presence of the rune, you never would have realised. Taking a deep breath, you brush aside the strands of magic and step through. \n\n*page_break\n\nA woman dressed in heavy black and scarlet robes is seated at a work bench piled high with ancient looking scrolls. Chalk outlines and intricate symbols are sketched along the walls and floor. Human bones are dotted around the room in neat piles, illuminated by softly glowing blue orbs placed around the cavern. A tunnel stretches into the darkness on the far side of the cave. \n\nThe feeling of evil here is almost overwhelming, radiating outward from the black robed woman at the centre of it all. You advance slowly, keeping your wand ready in front of you. \n\n\"Ah! You must be ${name},\" the woman exclaims without looking up from her work. \"Oh, do put that away.\" With a flick of her finger she send your wand flying out of your hand and skittering across the floor to rest against the wall of the cave. Bereft of your only defense against the mage, you freeze. \n\n\"See, much better.\" She gets to her feet and walks gracefully towards you. \"Now we can have a civilised conversation.\" \n\n*page_break\n\nShe stops a few feet from you and looks you up and down. Tall for a woman, she stands about 6 feet high, with long, glossy raven dark hair falling in waves past her shoulders. Thin to the point of gauntness, her skin is the moonbeam pale of one rarely exposed to sunlight. Her most defining feature however is her eyes. Dark, almost black, they glow redly with an inner sheen seeming to catch and hold your gaze. You feel an odd shiver of energy trickle though your body, then she releases you. \n\n\"There.\" She nods with satisfaction. \n\n\"My apologies, I sometimes forget my social graces. Perhaps you will take a seat?\" She gestures to the table stacked with yellowed scrolls. Not seeing any choice you walk over and draw back one of the polished stools. Taking the seat beside you, she regards you again with her hypnotic eyes. \n\n\"Well Garmr did say you had promise. Seems like he was right for you to have gotten into my little sanctuary. How do you like it by the way?\" She pauses thoughtfully for a moment. \"Actually no, don't answer that, not yet until you've heard what I have to say.\"  \n\n\"I've got more reason than most to hate the Wizard's Guild. They had a hand in imprisoning me for some time after all. But I am captive no longer...thanks to you.\" She holds out her hand revealing ${ringunicorn}\n\n*page_break\n\n\"No, no\" she forestalls your questions, \"it's not my story that's important right now, it's yours.\"  \n\nShe rises to pace along the length of the room, robe whispering softly as it brushes the ground. \n\n\"The black dog told me something of your story. How the Wizard's Guild took away your magic. How dare they presume to decide who may hold power and who may not!\" By her tone, you are not the only person in this room included in this statement. \n\n\"I am going to get back at them for all they've done to me.\" she hisses angrily. \n\n\"See these piles of bleached bones? They and more will be my army. There is no shortage of the dead to rise up and fight for me. But I could always use more help. The undead are loyal but have no thoughts of their own. You could help me command this force. I could teach you things you'd never imagined.\" She leaves the thought hanging for a minute, waiting for you to digest it. \n\n\"So the question is, will you help me?\" Her eyes narrow. \"You should know I've placed you under a truth spell, so think carefully before you speak.\"\n\nIt's obvious what answer she wants to hear. How will you answer? \n\n*Choice\n\t#Tell the truth: \"Raising the dead to fight the Wizard's Guild with necromancy sounds like a brilliant idea. I'm in!\"\n\t\t*set occupation \"Necromancer's Apprentice\"\n\t\tGet back at the Guild and learn Necromancy into the bargain, You're definitely in. \n\t\t\n\t\tA smile spreads across her features. \"Glad to hear it, I'm looking forward to having you along.\"\n\n\t\t\"Just like that? I mean, you're going trust me? Just on my say so?\" Whoops, where did that come from?! You wonder why you said that. Way to go at shooting yourself in the foot, just when she seemed to be trusting you as well. \n\t\t\n\t\tHer laughter has a dry rattle to it. \"Yes my friend. Just like that. Truth spell remember?\"\n\t\t\n\t\tYou grimace sheepishly. [i]Of course.[/i]\n\n\t\t\"Well anyway, now that we're on the same side, I think we can dispense with that.\" You feel an unpleasant prickling sensation as the spell dissipates. \n\t\t\n\t\t\"This little plan of mine may take some time to reach fruition, however this gives me time enough for me to teach you some of the basics. Sound like a plan?\" \n\t\t\n\t\tYou settle in to learn from one of the most powerful necromancers who ever lived. \n\t\t*achieve evil\n\t\t\n\t\t*page_break\n\n\t\tThank you for Playing Wizardry Level C. \n\n\t\tThis adventure is over, however there are still many other choices that can be made. \n\n\t\tWould you like to play again?\n\n\t\t*choice\n\t\t\t#Reload from the last checkpoint. (Decide how to use your wand). \n\t\t\t\t*set occupation \"Mundane Member of Society\"\n\t\t\t\t*set good_standing +10000\n\t\t\t\t*set darkside \"\"\n\t\t\t\tThe world fades around you, then snaps back into sharp focus, leaving you with the odd sense of deja vu. \n\t\t\t\t\n\t\t\t\tWhat were you doing again? You study the wand in your hand that you've just been given by Garmr.\n\t\t\t\t*goto_scene decidewand\n\n\t\t\t#Restart from the beginning.\n\t\t\t\t*goto_scene ending \n\t\t\n\t\t\n\t#Lie: \"Raising the dead to fight the Wizard's Guild with necromancy sounds like a brilliant idea. I'm in!\"\n\t\tYou want to get back at the Guild, but raising a few thousand undead warriors to do it, seems like an all round bad idea. Taking a deep breath you prepare to lie as convincingly as you can. \n\n\t\t\"Raising the dead sounds like an insane idea. You're worse than the Guild and that's saying something. I'm getting out of here as soon as I can.\" You clap your hands over your mouth, horrified by what you've just said. \n\t\t\n\t\tThe necromancer frowns slightly. \"Pitty, you really did have promise. Well, there is always other ways for you to serve me.\"\n\t\t\n\t\tA cold spike strikes between your temples like an icepick digging into your brain. In less than a second, everything has gone black. \n\t\t\n\t\t*page_break\n\t\t\n\t\tYou awaken feeling stiff and cold to your core. Opening your eyes, everything seems grey, as if the colour has been leached out of the world. Shimmers of energy dance around structures, visible as clearly as solid objects to your white hazed eyes. \n\t\t\n\t\tYou try to remember what you were doing to bring you to this place, but the memories keep escaping you, like grains of sand slipping between your fingers. All you are sure of now, is a burning desire to obey your master. \n\n\t\tA raven haired woman comes to stand before you, in a swirl of heavy robes. \"Perfect,\" she smiles. \"Well come along, we have work to do.\" \n\t\t\n\t\tWithout question you follow, just one more minion in the necromancer's undead army.\n\t\t*Set occupation \"Undead Minion\"\n\t\t*achieve minion\n\n\t\t*page_break\n\n\t\tThank you for Playing Wizardry Level C. \n\n\t\tThis adventure is over, however there are still many other choices that can be made. \n\n\t\tWould you like to play again?\n\n\t\t*choice\n\t\t\t#Reload from the last checkpoint. (Decide how to use your wand). \n\t\t\t\t*set occupation \"Mundane Member of Society\"\n\t\t\t\t*set good_standing +10000\n\t\t\t\t*set darkside \"\"\n\t\t\t\tThe world fades around you, then snaps back into sharp focus, leaving you with the odd sense of deja vu. \n\t\t\t\t\n\t\t\t\tWhat were you doing again? You study the wand in your hand that you've just been given by Garmr.\n\t\t\t\t*goto_scene decidewand\n\n\t\t\t#Restart from the beginning.\n\t\t\t\t*goto_scene ending \t\t\n", "declinebunyipoffice": "*page_break\n*set grade3 \"Fail\"\nYou finish eating and head back to the kitchen. As you step though the door, you trip into the now familar office space, dropping your plate with a crash of broken china. A young woman with fox like features pokes her head out from the nearest cubical, scowling in annoyance at the racket. \n\n\"Sorry about that,\" you stutter. \"I'm...\"\n\n\"I know who you are,\" she snaps with a growl. \"You're expected you know.\" She gives you a sideways look. \"Can't do anything right can you? You're over on the wrong end of the complex.\"\n\n\"Hey!\" you protest \"It's not [i]my[/i] fault I ended up here. I was just walking around my house and then I was....here.\" You gesture helplessly to the space around you. \n\n\"Whatever,\" she snaps. \"You need to go to section B office 31. Can you find that?\" You shake your head. \n\n\"Ok, follow me,\" she huffs. \"Keep up, I've got work I have to get back to.\" She turns and without looking back trots away. You glance from the broken plate to the retreating office worker, deciding you'd better leave it for someone else to clean up and run after her. \n\n*page_break\n\nAs you catch up to her, you notice that her vulpine like features are not the only fox like trait she has. A tail peaks out from below the hem of her skirt as she jogs along. \n\nYou try to strike up a conversation. \"Uh that's a nice tail you have.\" Maybe not your best opening line, but the only thing you can think of at the moment, nervous as you are about the summons.\n\nShe actually looks quite annoyed that you've noticed it. Turning her head, she studies you with almost coal black eyes. \"I'm a kitsune ok? Drop the subject please.\" \n\nWith a flick of her auburn pony tail she picks up the pace, making you run to keep up and stalling any further conversation. You wind in and out of corridors stretching in all directions. There appear to be no windows and few other features of note,  soon you're soon completely disorientated.\n\n*page_break\n\nTo your relief she finally stops beside a cubical that looks much like hundreds of others you've passed along the way. \"In there,\" she gestures with a movement of her head and walks away before you can thank her.\n \nYou're not surprised to see Merlinus as you enter. It's also no surprise that he doesn't look particularly happy. \n\n*Choice\n\t*If (strikes = 1) #Walk over and quietly take a seat\n\n\t\t\"Well?\" He lifts an eyebrow at you. \"Seen the news lately?\"\n\n\t\tYou wince. \n\n\t\t\"I'll take that to be a yes then,\" he continues. \"The department issues assigments in a way to try and stop complications like this happening. You're lucky this is being swept under the rug by the mainstream media, otherwise we may have been having a different conversation you and I.\" \n\n\t\t\"You do understand, you need to complete a certain number of tasks to our satisfaction to get your full licence right?\" You nod. \n\n\t\t\"Ok,\" he sighs, \"I'm going to let this one slide since it's the first time you've declined an assignment. You won't get another chance though ok? Turn down something like this again without a good reason and you're out ok?\"\n\n\t\t\"What if I do need to talk to someone though?\" you enquire. \"I wasn't given much of a chance to ask questions before I was hung up on. How am I supposed to know if I'm capable of completeing one of these \"assignments.\"\n\n\t\t\"There's a phone number in the back of your book. It'll put you through to a help line. I thought you [i]had[/i] been reading your book?\" He gives you a studying look, then waves you away. \t\n\n\t\t\"Well, I've got work to do,\" he says dismissively. \"Off you go. We'll be in touch.\"\n\n\t\t*page_break\n\n\t\tAs always the Guild certaintly was in touch with another task for you to complete for them. You find yourself once again in Merlinus' office. The old wizard is shuffling papers on his desk when you walk in. \n\n\t\t\"Ah ${name}, just the person I wanted to see. I've got another task for you, to help make up for the whole bunyip incident.\"\n\n\t\t*goto_scene bunyiptodragon\n\n\n\n\t*If (strikes = 2) #Walk over and quietly take a seat\n\n\t\t\"Ok,\" the wizard sighs tiredly \"Tell me about it.\" \n\n\t\t\"I was sent to deal with a bunyip,\" you state. \"You know, a shape shifting, predatory, man eating [i]BUNYIP![/i] There's no way students should be required to go out hunting those sorts of things.\"\n\n\t\t\"Wizardry is not a safe profession.\" Melinus replies softly. \"You were to be given assistance, a partner and a capture construct.\" He holds his hand up stalling any further protests from you. \n\n\t\t\"This profession is not for everyone which is why we have a testing system, and you were warned not to decline another assignment. It's a shame since you have so much potential but unfortunately rules are rules and it's out of my hands.\"\n\n\t\t*page_break\n\n\t\tYou feel a sharp prickling sensation in the back of you're hand as the licence is removed. \"I'll need the book as well ${name}.\" \n\n\t\tYou don't see how you can refuse and hand the tome over reluctantly. \n\n\t\t\"Ok well that's all done and finished then.\" To your surprise he reaches over and pats you on the arm. \"Don't worry things often have a way of working themselves out. Best of luck with your future.\" \n\t\n\t\tHe stands and leads you out the door, through the portal back to your kitchen.\n\n\t\t*Achieve kickedout\n\t\t*Set occupation \"Mundane Member Of Society\"\n\n\t\t*page_break\n\n\t\tHeading back to the TV area you sit down on the couch and reflect on the recent events. \n\n\t\tHow do you feel about the loss of your licence?\n\n\t\t*Fake_Choice\n\t\t\t#Good riddance. The whole thing was more trouble than it was worth. \n\t\t\t\tAlthough it had seemed like a good idea at the time. In practice, it was full of overbearing superiors who liked to order you around, taking care of all their odd jobs and even dangerous assignments for them. You're genuinely glad to be rid of it all, even though it means the loss of your magic.\n\n\t\t\t\tExperimentally you try zapping a pen off the table. No matter how hard you concentrate, the pen stays stubbornly still. \n\n\t\t\t\t[i]\"Well that's that.\"[/i] you think silently to yourself. There really is no more magic. In a way you're relieved. That night you fall into a peaceful, dreamless sleep. \n\t\t\t\t*set nomagic 1\t\n\t\t\t\t*page_break\n\n\n\t\t\t#Saddened. You're unhappy about the way everything turned out in the end.\t\n\t\t\t\tThere are things you decide that you definitely wont miss. All the ordering around and cranky, superior attitudes from many of the office staff for one. On the other hand, you think that given other circumstances, you could have gotten along well with the old wizard Merlinus. \n\n\t\t\t\tAnd then there is the magic. You will miss that. If only there was a way to practice it without having to be under the thumb of the guild. \n\n\t\t\t\tExperimentally you try zapping a pen off the table. No matter how hard you concentrate, the pen stays stubbornly still. \n\n\t\t\t\t[i]\"Well that's that.\"[/i] you think silently to yourself. There really is no more magic. It saddens you but there's nothing for it, you made the choices that brought you here. You head dejectedly off to bed and fall into a deep sleep. \n\t\t\t\t\n\t\t\t\t*page_break\n\nYou're half-awakened the next morning by a moth's wings fluttering in your face. Grumpily you try to brush it away with your hand when it bites you!\n\nSnapping to full alertness your eyelids fly open, only to see not a moth but a tiny fairy, batting at your face trying to get your attention. You give a startled yelp which turns into a fit of coughing as the fae flits away in a shower of yellow dust. \n\nDoubled over, it takes a few minutes of hacking to clear your lungs of the irritant particles. When you can finally catch your breath again, you search with watery eyes for the small creature. You find her easily, perched on top of the curtain rail, reflective blue wings twitching uncertainty. \n\n\"It's ok,\" you call out to her. \"You just startled me, that's all. I'm not going to hurt you. Why are you here?\"\n\n*page_break\n\nThe fae looks uncertain but flies down to hover level with your face. Hands pull at her green tunic anxiously. \n\n\"Wizard, you've got to help us!\" the high pitched voice pipes. \"The feline one has my friend trapped!\"  \n\n*choice\n\t*Selectable_if (nomagic = 1 ) #I can't help you, I'm not a wizard anymore, I'm out of the magic game now. \n\t\tThe fae's pale feature blanch even further. \"But the feline one will [i]eat[/i] him!\" She wails.\n\n\t\tYou almost give in at that point, it's not like you're completely stone-hearted after all; but you really need a clean break if you want to get back to your life before all the wizardry stuff happened. \n\n\t\tBesides which, you have a sneaking suspicion that for the fae with their own brand of magic, not to be able to deal with the \"feline one,\" it's probably going to be more than your average domestic tabby. Most likely you'll go down there and end up face to face with something more like a cat sith or a manticore, which will only go badly for you now that you're without magic. \n\n\t\t\"Look I'm sorry,\" you tell the fairy firmly \"But I really can't help you. Try the wizard's guild, they're sure to send someone along who can save your friend.\"\n\n\t\tThe fae's hands ball up into tiny fists as her face contorts with rage. \"You'll live to regret this human!\" she screams at you, before leaving swiftly through the open window in a cloud of sparkling dust that sets you to coughing harshly again.\n\t\t\n\t\t*page_break\n\t\t*goto_scene declinefairy\n\n\n\t*Selectable_if (nomagic = 0 ) #Of course I'll help you. where is he?\n\t\tThe fae's anguished features brighten. \"You'll really help?\" Tugging at your hair she pulls you towards the door. \"No time to wait, the feline one is going to [i]eat[/i] him.\" \n\n\t\tThe fairy pulls you down the stairs and towards the front door. You're still in your pajamas, but considering everything that's happened lately, having your neighbours catch you walking down the street in blue striped flannel, is probably going to be the least of your worries. \n\n\t\t*page_break\n\t\t*goto_scene helpfairy\n\n", "declinefairy": "[i]Well that could have gone better.[/i] you reflect. You try to console yourself with the thought of \"How much damage could one little Tinkerbell do?\" Besides which, she said you'd [b][i]live[/b][/i] to regret it, which has to count for something. \n\nThe next few weeks pass peacefully as you slip back into your day to day routine before you'd ever heard of the Wizard's Guild. You see nothing of the blue winged fairy, nor in fact of any of her kind. No gargoyles, hobgoblins or creatures from the black lagoon either for that matter. It looks like word has finally got around that you want to be left alone which is comforting. The absence also makes you hopeful that maybe the fae's threat was just an empty promise.\n\n*page_break\n\nTraveling home from work, you turn your face to the afternoon sun, enjoying the bright warmth. Walking along the edge of the parklands, you decide to take a detour through the park itself and make the most of the fair weather. \n\nHumming a random tune you head along the paved path then turn off to walk though the trees. the dappled light creates beautiful shadows along the ground, as a soft breeze stirs the leaves. Head turned upwards, you suddenly hit a brick wall. \n\n*page_break\n\nOk, well maybe it's not a [i]real[/i] brick wall being completely transparent, but it certainly feels like one. Carefully you reach out and run your hands along the cool, un-yealding surface. Exploring by touch, you realise you're contained in a circular area about two meters in diameter. \n\nYou yell for help but have no idea if your voice is travelling beyond the confines of what looks like a decidedly magically created prison. Banging on the walls only results in your hands becoming bruised and sore. \n\nYou take to searching the ground, clearing away the grass and leaf litter. To your alarm, you uncover a number of red and white spotted toadstools along the perimeter, previously hidden by the undergrowth. \n\n[i]\"A Fairy Ring.\"[/i] you whisper alarmed. It's looking like an ambush. \n\n*page_break\n\nAs if waiting for the realisation to hit home, the air is suddenly full of multicoloured lights flitting around like fireflies. One bright yellow orb flies close to the edge of your prison and you notice with a sinking heart that it's the same fairy you refused to help a few weeks ago. \n\nHer face is alight with triumph as her voice shills sweetly. \"I told you you'd regret failing to help me human. We fae always get our revenge!\"\n\nBefore you can answer, something slams into the side of your head with the force of a sledge hammer and you crumple into unconsciousness. \n\n*page_break\n\nYour first thought is that your head is throbbing in time with your heartbeat in a way that's worse than the nastiest headache you've ever had. Your second thought is that death couldn't possibly hurt this much, so to your amazement you must still be alive. To be honest you didn't think you would be after that vengeful little fairy had got her hands on you.\n\nYou groan, trying sit up while the world tilts drunkenly around you. Keeping your eyes closed against the spinning sensation in your head for a few minutes, you finally feel stable enough to open them again. \n\nYou squint against the bright light. Either you have a concussion or something is definitely not right. All the colours seem super-saturated and blindingly bright in a way that makes your head hurt even more if that was possible. \n\n\"Ah, you're awake!\" a musical voice calls out from behind you. Turning you try and focus on the figure striding towards you.\n\n*page_break\n \nYou blink furiously trying to clear your swimming vision but only succeed in inducing a new wave of vertigo which leaves you retching dryly on the ground. \n\nYou feel a hand on your shoulder and a cool, clearing sensation spreads though you. The figure takes your hand and helps you up. \n\n\"You'll have to excuse my cousins, they can be a bit heavy handed when incensed. No, no it's ok.\" he soothes, noticing your stricken expression. \"I've sent them away, they wont bother you for now. My name is Cernunnos. Allow me to make amends for their behaviour.\"\n\n*page_break\n\nHe leads you along a path and you take a good look at your rescuer. At over seven feet tall he towers above you. His physique is lithe, but the way he moves speaks of an easy, almost predatory strength. His fine features are delicate, almost elven. Indeed you see glimpses of finely pointed ears beneath a shaggy mane of brown hair. What makes you sure beyond doubt that you're dealing with another supernatural entity though, is the silver, stag like horns that sprout from the top of his head. \n*image Cern.jpg center\n\n*page_break\n\nIf your guide notices your scrutiny he doesn't react, instead taking up a light hearted chatter about the ways of the lesser fae folk. Entering a clearing, he leads you over to a great oaken table piled high with all manner of delicious food. \n\n\"Please take a seat and help yourself to refreshments.\" he tells you in his low musical voice. \n\n*choice\n\t#Graciously accept the offer, you wouldn't want to offend your host. \n\n\t\tYou pull out one of the heavy wooden chairs and sit. Choosing a golden hued apple you take a bite. You've never tasted something so delicious in your life. Quickly you finish eating the fruit and reach for another. \n\n\t\tAfter eating enough to be sated, you sit back into the chair and thank your host for the amazing meal. \n\n\t\tA sly smile twists his mouth. \"I'm so glad you enjoyed it ${name}.\"\n\n\t\tThe smile is slightly unnerving and it you decide it really is past time to get going, no matter how gracious your host. \n\n\t\t*goto food\n\n\n\n\n\t#Decline, you're still worried there's something not quite right here.\n\t\tAs politely as you can, you decline the offer of food saying you're still feeling a little dizzy from the fall and couldn't eat a thing. \n\n\t\tYour host's expression falls into one of concern. \"You should have told me you were still not feeling well. I will fetch you something to drink immediately to help clear your head instead.\" \n\n\t\t\"I'll be fine,\" you insist. \"I just need a bit of air. And perhaps some rest. If you would be so kind as to show me the way home?\" \n\n\t\t\"And what kind of host would that make me!\" the elven figure exclaims. \"If I were to send a guest home, injured as they were by one of my own. I will take you to my own residence. I have plenty of room, a bed will be made for you there. And when you are more rested I will throw you a wonderful feast as a way of apology for this whole disaster.\"\n\n\t\t*page_break\n\n\t\tYour host's insistence that you consume something one way or another, is strengthening your resolve to get out of here as quickly as possible. Something is definitely amiss. \n\n\t\t\"You have been a most gracious host Cernunnos and I am thankful for your help in rescuing me, no further amends are needed. I'm really not feeling well and would just like to return home please.\"\n\n\t\t*page_break\t\n\t\t\n\t\tCernunnos' features darken, the friendly facade falling away. \t\n\n\t\t\"You would refuse my hospitality? So be it,\" he growls. \"I can't keep you here, but your home may not be as you remember it.\" A nasty smile pulls at the corners of his mouth revealing pointed teeth. \n\n\t\t\"Cwn Annwn, to me!\" he snaps. There is a fearsome growling from the trees as three huge hounds slink into view to stand behind Cernunnos. Snow white in colour, you notice their ears are the colour of dried blood. Snarling, they turn glowing red eyes on you. \n\t\t\n\t\t*image CwnAnnwn.jpg center\n\t\t\n\t\t*page_break\n\t\t\"Steady there my hounds,\" Cernunnos chirps brightly. \"We've a hunt today but we need to give the prey a chance to make it interesting do we not?\"\n\n\t\t\"The way back to your home lies along this path.\" He gestures and a spectural pathway appears as if a thin layer of fog was laid along the ground. You notice it's not in a straight line but seems to twist and turn as far as you can see. Part of the \"interesting\" part you suppose. \n\n\t\t\"Because I'm a sporting man, I'm going to give you a head start.\" He leans in close and whispers just loud enough for you to catch. \"Run little human. Run fast. Run Fleet.\" \n\n\t\tTurning away he produces a golden horn from the air and blows a long wailing note. You hear hoof beats in the distance answer. \n\n\n\t\t*Choice\n\t\t\t#Flee\n\t\t\t\tDeciding you'd best do as he says, you push yourself into a run. His maniacal laughter drifts through the trees after you.\n\t\t\t\t*goto flee\n\n\t\t\t#Stand your ground. (Are you really sure that's a good idea?)\n\t\t\t\t*goto stand\n\n\t\t\n\n\n*label flee\n\n*page_break\n\nRacing though the tangled forest, the vibrant colours of the landscape, once so beautiful, can only hinder your progress. The softly glowing path is faint against the brilliance and you find yourself losing the path and having to double back a number of times, aware always of the distant, but closing, baying of the hunting hounds. \n\nNight falls unnaturally swiftly, the sunset bathing everything in a deep blood red before fading to black. The darkness makes the trail easier to follow however new challenges arise. You jump at every unseen sound from the trees and are tripped up repeatedly by vines which reach out to grab at your arms and legs before you can pull them away. \n\nExhausted you stumble onwards, bruised and bloodied, spurred on by the sounds of the wild hunt closing in on you, well aware that you can't keep this up much longer. \n\n*page_break\n\nThe horn sounds again in a series of sharp bursts, you've been sighted. Frantically you put the last of your strength into a burst of speed and emerge into a clearing. In its center is a pool of dark, still water, the spectural path creating a vortex like effect just above its surface. \n\nYou hesitate. What if it's a trap? Will something appear to drag you under and drown you in the black water should you get too close? The crashing of broken branches and barking dogs closing in on your position makes the decision for you. You're dead for certain if you stay here. \n\nYou take a deep breath, close your eyes and jump. \n\n*page_break\n\nThe frigid water closes over your head, stealing the breath from your body and pulling you down. As you lose consciousness, the last thing you hear is the receding sound of laughter. \n\n*goto water\n\n\n\n*label food\n*page_break\nIt's been lovely meeting you, but I wonder if you might point me in the direction of the way home?\" you enquire. \"Not that this hasn't been wonderful but I really must be getting going, early start tomorrow and all that.\"\n\n\"Oh yes you do have an early start tomorrow don't you.\" he still has the same twisted smile playing across his lips. It's enough to make you nervous. \n\n\"Glad you understand. The way home then?\" you ask again, trying to stay painfully polite. \n\n\"Oh but you are home ${name} ${lastname}!\" he exclaims. The remains smile fixed to his face but there's a decidedly nasty edge to it now. \n\n*page_break\tWhat?!\n\"Why ${name},\" he continues, casually running a finger along the rim of a gilded glass. \"So surprised? You accepted my hospitality, eating faerie food. You can't leave this plane. You're mine.\" You tremble as his wicked grin, reveals a set of pointed teeth. \n\n\"Well come along,\" he says brightly, tugging you to your feet. \"I need to show you to your duties. You will have the privilege of serving the Unseelie Court from now on. I suggest you serve faithfully and well. You won't like the alternative. Besides, you've nowhere else to go, do you?\"\n\nHe's got a point, and there's nothing to do about it for now. With heavy steps follow him back to the unseelie castle. \n\nPerhaps it won't be so bad being a servant in the land of faerie? \n*achieve castle\n*set occupation \"Servant to the Unseelie Host\" \n\n*page_break\n\nThank you for Playing Wizardry Level C. \n\nThis adventure is over, however there are still many other choices that can be made. \n\nWould you like to play again?\n*choice\n\t#Reload from the last checkpoint. (Just lost your licence). \n\t\t*set occupation \"Mundane Member of Society\"\n\t\t*set nomagic 0\n\t\t*goto_scene savepointfairy\n\n\t#Restart from the beginning.\n\t\t*goto_scene ending \n\t\t\n\n\n\n*label water\n*page_break\nShivering, you come to on the bank of a small lake. Although it's hard to be sure in the darkness, you think it's the same one in the park you were taken from by the fairy ring. Of the hunt, there's no sign, however you decide that it's a bad idea to stick around in case they are following through the portal. \n\nGetting wearily to your feet, you take stock of your injuries. Scraped, bruised and exhausted, you make for a sorry sight, however thankfully there appears to be no permanent damage. Limping, you head as quickly as you can towards home. \n\nReaching the street is the first sign that something is definitely wrong. Instead of bitumen, trees grace the area where cars once traveled. Above your head you see the lights of craft traveling at speed along aerial highways. You're not sure what's happened, have you somehow been shifted into a parallel universe? At a loss of what else to do, you continue towards your home. Hopefully \"parallel you\" will also live there and be able to give you some sort of assistance. \n\n*page_break\n\nReaching your address, your heart sinks. In place of the neat row of single story, brick houses, there is a towering, multistory apartment complex. You hunt around for some kind of panel that will let you know who lives in the building but come up empty. Flagging some passersby, you ask them if they know if a ${name} ${lastname} lives here?\n\nThey look confused at your request, speaking quickly with an accent that is difficult to understand. They're definitely speaking English, just not your dialect. With a lot of gesturing and speaking in loud, slow words, you finally make yourself understood, but the answer is not what you wanted to hear. No one by that name lives here. Taking in your damaged appearence they suggest taking you to what you think is the police station for help. \n\n*page_break\n\nThe two walk with you towards the city until you come to a glowing white and blue building. Gesturing towards the double glass doors, they wave and continue on their journey. Swallowing, you make your way up the steps and though the automatic doors into a harshly lit rectangular foyer. \n\nA number of people are present, going about their business dressed strangely in all manner of unusual clothing. The current trend seems to favour some kind of dark, skin tight material covered with a bright flowing robe. To your eyes it looks ridiculous, but at this stage who are you to judge? \n\nYou approach the counter and get the attention of a middle aged woman wearing a crisp dark blue uniform. As she approaches you notice what appears to be some kind of metallic weapon clipped into her belt and decide that you've probably guessed correctly and this is indeed the local police station. \n\nRemembering the trouble with the pedestrians who brought you here, you start to explain why you're here using slow, clear words. Since the content is more complicated than \"Me look for ${name} ${lastname},\" she seems to be having even more trouble comprehending a lot of what you're saying. Even worse, if you are understanding her correctly, she may be about to lock you up for being drunk and disorderly. \n\n*page_break\n\nBefore they can take you away, a dark haired man dressed far more conservatively than most of the other people in the room, touches you on the shoulder. \"That's old English right?\" He speaks with a curious lack of accent but is perfectly understandable. You nod. He turns to the policewoman talking so rapidly that you are unable to follow the entire conversation, then leads you back to one of the benches. \n\n\"It's ok, I'll get it sorted for you.\" the man says patting you on the arm.  \n*goto start\n\n\n*label start\n\n*choice\n\t*disable_reuse #Who are you?\n\t\t\"My name is Myren,\" he says simply.\n\t\t*goto start\n\t\t\n\n\t*disable_reuse #Why are you here?\n\t\t\"Blunt and to the point in your century weren't they? Well if it matters, no I'm not a criminal, you're just fortunate my licence was going to expire tomorrow. I was here to renew it.\"\n\t\t*goto start\n\n\n\t*disable_reuse #Why do you speak like me? Everyone else seems to have this weird dialect happening. \n\t\t\"I think more to the point is, why don't you speak like them? You do realise you're speaking a form of English that is at least 1200 years out of date don't you?\"\n\t\tYou blink a few times, trying to comprehend what this means. \"Are you sure?\" you finally whisper. \n\n\t\t\"Very sure.\" Myren replies. \"I'm a professor of linguistics at the university. My specialty is ancient languages. I'm fluent in a number of them, including yours luckily.\"\n\t\t*goto start\n\n\t*disable_reuse #Do you know why I'm here?\n\t\t\"Well,\" he says thoughtfully. \"I was kind of hoping you might be able to tell me that?\" \n\n\t\tYou hesitate, uncertain how talk of fairy lands is going to go over. You don't want to lose your only ally by convincing him you're crazy. He takes your hesitation to mean you don't remember. \n\n\t\t\"Well that's a shame. It might come back to you in time. If I had to guess, I'd say you were from one of the early cryo experiments. Many of the people who were actually revivable experienced extensive memory loss. Where you've been though? No idea, I would have thought all the caches of cryo pods would have been found by now, even the ones buried deep in the earth. You know, due to the fear of nuclear attack before all the peace accords were finally signed. A dark period in our history, I don't blame you for wanting to escape it.\"\n\n\t\t*goto start\n\n\t*disable_reuse #What will happen to me?\n\t\t\"I'd say they'll confirm what I think you are, then get you set up in a program to reintegrate you into our society. Come to think of it, we are looking for a history researcher at the university which I think you may fit into well if you're interested. I'll ask them to give you my details after they've cleared you.\"\n\t\t*goto start\n\n\t#I don't have any more questions, sit quietly and wait.\n\t\t*goto exam\n\n\n*label exam\nTrue to Myren's predictions, testing indicates that the concentration of pollutants in strands of your hair, dialect, memories and clothing, all place you as genuinely belonging to a time frame somewhere between the late 20th to early 21st Century. \n\nThe reintegration process takes the part of a crash course in learning how to function in a vastly different society, language skills and counseling. \n\nSitting with your councilor one session, the white coated man looks down his nose at you and asks you again if you remember how you got here. \n\n*Choice\n\t#Lie convincingly about having no memory. \n\t\t\"Well try not to stress on it too much,\" he soothes. \"The mind will remember in time if it's able. If you ever need to talk, just let me know.\"\n\t\t*goto ending1\n\n\t#'Fess up about the trip to fairy land.\n\t\t\"Ah well,\" he says in his most soothing tone. \"Sometimes to deal with trauma or missing memories, the mind will piece together all sorts of things to help it make sense. It's all part of the healing process, we'll just have to make sure you can determine reality from fiction before we allow you to re-enter society at large.\"\n\n\t\tHe doesn't believe you, no surprises there. Obviously the fae haven't come out of the closest in the intervening years. \n\t\t*goto ending1\n\n*label ending1\n\nYou make some discrete enquiries about the Wizard's Guild, but these all seem to be turning up empty. They are either very well hidden or no longer in existence. Either way, for the moment it seems that they will be of no help to you, so you concentrate your efforts on catching up on a thousand years or so worth of developments.  \n\nOf the fairies themselves, you find no sign. However your research does turn up myths and stories relating to time sometimes traveling differently on the other planes, including apparently the one you think you were taken to. \n\n*page_break\n\nFinally adjusted enough to as your instructors put it \"to function in modern society,\" they release you into the world at large. You're helped along the way of course. You have an apartment, ongoing training and a mentor you can go to for advice; another cryostasis emergent, albeit from a later time and with more practice than you at fitting into the futuristic lifestyle. \n\nYou meet up with Myren and take him up on the researcher offer. Needless to say, you're very good at your job. Although you sometimes find yourself missing your own time line, there's plenty to see and do here to keep you occupied for many lifetimes. Why just next week you've got a weekend away planned on the moon. Life's good.\n\n*achieve future\n*Set Occupation \"Researcher\"\n\n\n*page_break\n\nThank you for Playing Wizardry Level C. \n\nThis adventure is over, however there are still many other choices that can be made. \n\nWould you like to play again?\n*choice\n\t#Reload from the last checkpoint. (Just lost your licence). \n\t\t*set occupation \"Mundane Member of Society\"\n\t\t*set nomagic 0\n\t\t*goto_scene savepointfairy\n\n\t#Restart from the beginning.\n\t\t*goto_scene ending \n\n\t\t\n\n\n\n\n*label stand\n\nYou almost do as you're told and run. Cernunnos and his hounds are certainly terrifying enough to stike fear into even the bravest of hearts; however you force yourself to pause and think about the situation. You've been designated the rabbit in this hunt, and everyone knows that things don't tend to end well for the rabbit. Especially one where the hunt master is making all the rules. \n\nYou don't know this place, you have no idea if Cernunnos is being sincere about the path leading to a way home and you have no weaponry to use against the hounds and their master if you take his advice and flee before them. \n\nWell you're sick of being pushed around by these faeries and you are not going to play this game. You're going to show him he's caught not a rabbit after all, but a wolverine.  Taking a deep breath you stand your ground. \n\n\"I will not run. You don't scare me Cernunnos.\" you tell the fae with as much confidence as you can muster. \n\n*page_break\n\nHe raises an eyebrow at you. \"You're not scared? Then you are foolish human. When the wild hunt rides, people lock their doors and cower inside hoping to evade our notice. The sound of the hunt's horn strikes terror into even the bravest souls and with good reason. Our coming is the herald of death, strife and despair.\"\n\nYou meet his eyes refusing to back down. \"I will not run. I wont play your games. What will become of your hunt then?\"\n*page_break\n\nYou hope by by putting on a show of strength, you can convince the fae to change his mind, or at least put him off balance and give you an opportunity to take the advantage. Unfortunately you're dealing with a being who is probably thousands of years old and quite alien in his way of thinking. Your defiance doesn't confuse him, it just annoys him slightly that the afternoon's entertainment has been canceled. \n\n\"You disappoint me ${name}. I was so looking forward to the chase. It's rare that I get to indulge these days.\" For all the emotion in his voice, Cernunnos could be discussing the weather. \n\n\"Well if you will not play my game, you're of no use to me. I'll leave you to get better acquainted with my hounds.\" He gives you a twisted grin that makes your blood go cold. \n\nCernunnos calmly takes a seat at the oaken table and waves the pack forward. The terrifying canines advance, circling around to cut off any escape routes. Too late you realise you probably should have run after all, Cernunnos will show you no mercy. The last thing you see, is one of the hounds with its blood red ears lunging for your throat. \n*achieve hound \n\n*page_break\nEverything goes numb as your life slips away into darkness. Although you can no longer see, the voice of Cernunnos echoes dully in your ears. \"You will certainly die if I do not heal you now, my hounds have not been gentle. I do so love the hunt, and for you to die like this is just...boring. Don't you agree? I give you one final chance human.\"\n*choice\n\t#Allow Cernunnos to heal you and participate in his \"hunt.\"\n\t\tAlthough your strength is almost gone, you grasp at any chance of life and try to voice an assent. What comes out is little more than a strangled, unintelligible murmur, but to the fae, it's enough. \n\t\t\n\t\t\"Excellent! I knew you'd come round.\" The numbness recedes to the unpleasant feeling of unseen spiders climbing over your skin. You find your voice and start to scream as tissue pulls and stretches, knitting itself back together. \n\t\t\n\t\tFinally it disappears leaving you gasping for breath on the ground. Your eyelids flutter open and you find yourself staring straight into Cernunnos' inhuman grey ones. \n\n\t\t\"Ah, there you are.\" he exclaims brightly grabbing you by your arm and hoisting you roughly to your feet. \"Time for you to honour your end of the bargain.\" \n\t\t\n\t\tThe hounds continue to circle, giving you no option to back out. \n\t\t\n\t\tYou run.\n\t\t\n\t\t*goto flee\n\t\n\t\n\t#Refuse. You'd rather die than be a part of his games. (And you will die, Cernunnos is through messing around.)\n\t\tYou know your options, however both are likely to end with your end anyway. You refuse to let the fae take any joy in it. Although your strength is almost gone, you manage a slight shake of your head. \n\t\t\n\t\t\"So be it.\" the fae's voice is no more than a whisper in your mind as you fade into death.\n\t\t\n\n\t\t*Set occupation \"None\"\n\t\t\n\t\t\n\t\t*page_break\n\n\t\tThank you for Playing Wizardry Level C. \n\n\t\tThis adventure is over, however there are still many other choices that can be made. \n\n\t\tWould you like to play again?\n\t\t*choice\n\t\t\t# Reload from the last checkpoint. (Just lost your licence). \n\t\t\t\t*set occupation \"Mundane Member of Society\"\n\t\t\t\t*set nomagic 0\n\t\t\t\t*goto_scene savepointfairy\n\n\t\t\t# Restart from the beginning.\n\t\t\t\t*goto_scene ending ", "dontsign": "*page_break\n\nYou contemplate signing the book...then decide against it. Reading ahead the book seems to take itself way too seriously, detailing all sorts of mythical creatures from sirens to basilisks as if they were a reality. \n\nAccording to one of the distribution maps in this book, there are a type of water horse called kelpies, in the waterways local to your area. Really? As if no one would have noticed loose horses running around, particularly ones that like to drown people. You really don't think so. \n\nWhile the bestiary pages are interesting, if a bit far fetched in places, the rest of the book is maddening. Try as you might, you can't work out any kind of code to decipher the symbols in the remainder of the book. Placing it back in your bag you decide the mystery will keep for another day. \n\n*page_break\n\nThe following day you're back at the library to escape another dreary afternoon outside. Deciding to get the magic book out for another look, you rummage around your backpack looking for it. After tipping everything out, you conclude that it's no longer there. Although you don't remember it falling out, that must have been what happened. \n\n*page_break\n\nGuiltily you decide you should own up to the librarian since you've lost one of their books. Alice is on at the front desk today, she knows you well. She smiles brightly as you come over, flicking her long brown hair out of her eyes. You tell her about the missing book. She frowns, typing a query into the computer. \n\n\"Hmm. We don't seem to have that book here. Are you sure it was one of ours?\"\n\nYou nod. \n\n\"Well must have been one someone else left here by mistake. Haven't had anyone come looking for it, so don't worry too much about it. If you do find it, bring it by and I'll put it in the lost and found box ok?\"\n  \nYou quickly agree, relieved that it's not a potentially valuable library book you've lost. \n\n*page_break\n\nYou never do find the book again and get another chance to decipher the odd symbols covering the pages. On the upside it gives you plenty of time to start reading the other borrowed books, where you spend many hours reading about wizards, dragons, warriors and the like. \n\nAll in all a good way to spend a rainy day.  \n\n*page_break\n\nThank you for Playing Wizardry Level C. \n\nThis adventure is over, however there are still many other choices that can be made. \n\nWould you like to play again?\n*choice\n\t#Reload from the last checkpoint. (Decide whether to sign the contract). \n\t\tThe world fades around you, then snaps back into sharp focus, leaving you with the odd sense of deja vu. \n\t\t\t\t\n\t\tWhat were you doing again? You shake your head to clear it and look down at the open book before you.\n\t\t*goto_scene book\n\n\t#Restart from the beginning.\n\t\t*goto_scene ending \n\n", "dragongivering": "*comment Try and trade with Myranda for the ring. From Dragonwizard. \n\n\n\"You must be Myranda,\" you call out the the dragon. \"I've heard so much about you! What a pleasure it is to meet you, I thought you were out and I'd have to leave without being able to say hello.\"\n\nThe dragon gives an unintelligible snarl, indicating that she doesn't believe a word of it. \n\n\"Um...yes quite...Well...Ah...as nice as it's been, I should be going now. Have a nice day! If I may just get past you here?\" You try to keep your tone light, in contrast to the vibes given off by the bad tempered wyrm blocking your way out. \n\nMyranda gives a harsh laugh. \"No I don't think sssso human. Thisss isss [b]my[/b] home and I will tell you when you may leave.\" Her tail thrashes the rocky ground sending small pebbles pinging off the surrounding trees with sharp cracks. \n\n*page_break\n\nYou gulp, trying not to shake, this does not seem to be going well. Ok, looks like time for Plan B. \"Please Myranda, you have no reason to be angry with me. In fact, I've got something you might want. I'll give it to you, in exchange for letting me leave unharmed.\"\n\nYou open your hand showing the drake the golden ring lying on your palm. You notice a spark of greedy interest in her eyes, she's definitely interested. \n\nMyranda steps in close, head meer inches from your own. You resist the urge to back away as she puffs fetid smelling, sulphurous air over you with each breath. \n\n\"And jussst what do you think will ssstop me from taking it from your cold, dead fingersss little human?\" she replies menacingly, the cold tone of her voice indicating that she would have no qualms about ending you this way. \n\nYou take a deep breath to steady your nerves, remembering Merlinus' parting advice. \"I don't think you want to do that dragon. I'm here on behalf of the Wizard's Guild. You wouldn't want to have to explain my demise to them would you?\"\n\n*page_break\n\nThe dragon rears back in annoyance. With a roar she breathes a stream of white hot flames into the surrounding trees, setting them ablaze. Her midnight scales glint redly in the crackling light. \n\n\"You dare threaten me?! Who sssays, they would ever recognissse your charred remainsss?\" You'll have to play this carefully, one wrong move and you'll end up like looking like the unfortunate trees near her cave. \n\n\"No threats, just an observation. I am more than willing to simply give you the ring. Would that not be simpler for everyone?\" You do your best to keep your tone calm and warm, though you don't feel it. \n\n*page_break\n\n\"I do ssso hate wizardsss!\" Myranda grumbles, but is sounding a little less volatile than a few moments ago. \n\n\"Fine! Give me the ring and leave.\" she demands. \"I have no wisssh for any other nasssty humansss to invade my home tonight.\"\n\nCarefully you place the ring on a large piece of rock and back away, hands out where the wyrm can see them. With a parting glare, the dragon moves out of your way, allowing you to leave the clearing. She gives you a parting flick with her spined tail, which you only narrowly manage to avoid, and stalks away to claim the treasure. As soon as you're out of view and under the cover of the forest, you run.\n\n*page_break\n\n*set ring \"\"\n\nHiking up the overgrown path as quickly as you can, you pass through the shimmering barrier with a heartfelt sigh of relief. As if on cue a portal flickers into existence ahead, the outline of Merlinus' office clear through the shifting light. Happy to be clear of the dragon below, you gratefully step through.\n\nBlinking, unaccustomed to the brightly lit office space, you find yourself before Merlinus' desk who regards you with clear, grey eyes. \n\n\"You're looking well. Myranda usually gives people more grief than that when we send them down. Maybe we'll schedule you on for future errands.\" You stare speechless. Hopefully he's not serious. \n\n\"The warding over Myranda's lair makes it tricky to keep a stable scrying spell in effect. Although I was trying to keep an eye on you, just in case the dragon gave you any problems you couldn't handle, I did lose you there for a while. How about you tell me how it went?\" You blink at Merlinus. The person who was meant to be looking after you, just [i]lost you[/i] for a while? Just as well you can take care of yourself then!\n\n*page_break\n\nYou describe the trip down to Myranda's lair, her sudden appearance and the associated threats made to you. \n\n\"Hmm. She really was in worse form than usual. I'll have to get someone to go and check up on her. What you're saying really does sound a bit concerning. She was probably just playing with you, but still...\" Merlinus tails off in thought. \"Anyway, I'll get onto that in a moment. You were saying?\"\n\nYou pick up your tale, emphasising how brave and calm you were throughout the whole incident, [i](Hey, after what they put you through, sending you to deal with a murderous dragon, you figure you deserve some serious bonus points!)[/i] and how clever you were to use the dragon's love of gold and grudging respect for the guild to get you out of there in one piece. \n\n*page_break\n\nInstead of seeming pleased with your work, your mentor has gone quite pale. \"This ring you gave the dragon, where did you get it from?\" \n\n\"From a brownie. You remember, the one I had to relocate from the derelict house? Why? Is it important?\" you ask.\n\nMerlinus ignores your question. \"And you're sure it was a magical ring, with a genuine ruby set into it?\"\n\n\"Well yes I think so...That's what the brownie told me anyway. I never did work out what it was for though. Merlinus, what's going on?\"\n\n*page_break\n\nHe says a few words and the image of a ring floats above the desk, rotating slowly. \"Ok, this is really important, have a hard look. Was this the ring you gave to Myranda?\"\n\nYou study the spinning ring carefully. \"Yes I'm sure, there's even that small nick on the edge of the band there. It's the same one.\"\n\nMerlinus sighs looking very old as he banishes the image. \"You have no idea what you've done. That ring should never have been allowed to fall back into Myranda's hands. We'd thought it lost for over a century and the world would have been better for it if it had stayed that way.\"\n\n\"I....I'm sorry, I didn't know.\" you stammer. \n\n\"Yes, I think I know you well enough to realise you meant no harm in it. Others may not see it that way though, I'll have to inform them immediately.\" The old wizard starts to rise. \n\n\"Wait,\" you call out. \"What exactly [i]does[/i] that ring do?\"\n*set good_standing -20\n*page_break\n\nMerlinus pauses, then reseats himself. \"Well I guess there's no harm in you knowing this now. You'll probably have to answer charges over it after all.\"\n\nHe clears his throat and then begins. \"Myranda is not what you think she is. She was not always a dragon. No, once she was a powerful mage. A necromancer to be precise.\" \n\n\"Before she was trapped in the body of a dragon without access to her magic going back a few hundred years ago now, she was an agent of chaos and death. She created almost apocalyptic levels of destruction, managing to band together many of the more unsavoury elements of the magical community, and successfully raised armies of skeletal warriors completely loyal to her commands. If she manages to work out how to reverse the binding spell attached to that ring? There's going to be hell to pay...literally.\"\n\n*page_break\n\n\"Well, I must get going. We need to act on this right away.\" He starts to get up and leave.\n\n\"I'll come with you,\" you say. \"It's only fair I help clean up this mess.\"\n\nHe gives a sour laugh. \"I think not. You'll be lucky if you don't spend the next fifty years as a frog in a glass box, once some of the council members get wind of this. Besides which, Myranda is one of the most powerful mages alive. Sending a student up against her, well that would be nothing short of suicidal. No, wait here until I return.\"\n\nHe sweeps out of the room in a swirl of dark robes leaving you alone to worry on what will happen to you next. \n\nThis is not sounding at all promising. Although you feel terrible about what has happened, you really didn't know. That may not save you though. You hesitate. Should you try to run now before Merlinus comes back? Or do you obey his command to wait for his return. \n\n*choice\n\t#Run for it. \n\t\t*goto run\n\n\t#Wait in the office. \n\t\t*goto wait\n\n\t\t\n\n\n*label wait\n\nThe minutes turn into hours with no sign of Merlinus' return. You get up intermittently to pace the small confines of his office, but remembering his warnings about being turned into a toad, you don't dare set foot outside of it. \n\nFinally a haggard looking Merlinus returns. \"It's worse than I thought I'm afraid. There's no sign of Myranda anywhere, it's possible she's already managed to get off world. If that's happened, our chances of re-catching her before she can cause us grief, have just decreased dramatically. Dragons only have limited magical ability, it's one of the things that made her confinement so useful. If she's able to hide from us now, it's safe to say that she's broken the spell...or has someone powerful working with her to keep her hidden until she does. Either way...it's bad.\"\n\nYou stand in the corner of his office, mouth working silently, unsure what to say. The old wizard is almost swaying on his feet with exhaustion, so you decide to take the initiative and help him over to his desk chair before he falls down. He gratefully sinks into the seat, taking a few minutes to gather his thoughts. Helplessly you hover, uncertain what to do. \n\n*page_break\n\nFinally he speaks again. \"Ok ${name}, have a seat, I need to talk to you.\"\n\nHe sounds serious and you steel yourself for the worst. \"There's been some discussion as to what to do with you. Predictably, many on the council are less convinced of your ignorance in helping Myranda than I am. Turning you into a frog was actually one of their lighter suggestions.\"\n\nAt your horrified expression, he makes a calming gesture with his hands. \"I'm not trying to scare you on purpose, but you need to know what you're up against, wizards have long memories and I feel that many of us get more stubborn and inflexible with age.\" He gives you a rueful smile\n\n*page_break\n\n\"You'll be happy to hear however, that I have organised a compromise that doesn't involve death or transformation into something small and slimy. They want you watched. Watched [i]very carefully[/i] for any sign of traitorous intent. Even with me vouching for you, they do not completely trust that you had no knowledge of what you were doing when you gave Myranda the means to release herself. They fear, as do I, that we have not seen the last of Myranda, and when she returns, she'll want to make all of us pay.\" He pauses to catch his breath. \n\n\"So, you'll stay with me, under my personal supervision as an apprentice.\" You blink a few times. That's it? You'd expected something far harsher. \n\n\"Don't look too pleased yet ${name}. It's going to be hard work. You've got a lot of potential and I'm going to make [i]sure[/i] you reach it as quickly as is safe to do so. We're going to need all the help we can get I'm afraid.\"\n\n*set occupation \"Merlinus' Apprentice\"\n*page_break\n\nMerlinus wasn't kidding. He expected nothing short of perfection from you, running you through continuous drills and giving you books worth of texts he expected to be memorised to the letter. \n\nYou also suspect that Merlinus was correct in his assessment that many of your superiors hold you personally responsible for Myranda's release, deliberately setting you tasks as part of your \"apprenticeship\", that in reality are simply jobs that no one else wants. \n\nYou don't complain too much though, (and certainly never within their hearing), as even the task of collecting stink-worms from banshee infested boglands, beats the alternative of decades croaking in an aquarium. \n\nUnder the strict tutelage of your mentor, your magical skills advance rapidly, although on the mundane side of life, you find yourself becoming progressively more detached.\n\n*page_break \n\nAs the years go by, you're almost lulled into a sense of security with no sign of the rouge mage. Perhaps they were wrong? Maybe Myranda never figured out how to break the spell? And then the day came, when disturbing reports started to trickle in. \n\nThey were only small things at first. Reports of restlessness or activity amongst some of the more unsavoury creatures in the magical community. A broken tomb here, scattered reports of zombies by terrified humans there. \n\nThe reports continue to build up however until they become impossible to ignore. Someone was playing with the darkest magics, someone of immense power, and there was one prime candidate on the list. \n\n[i]Myranda.[/i] She was back on Earth. \n\n*page_break\n\nA sense of fear; one where people are just waiting for the hammer to fall and crush them, hangs over the magical community. You look out the window wistfully at the bright, clear day outside. The carefree days of your past seem so far away now. \n\nAlthough the powers that be in the guild hierachy have been trying to keep you out of any of the significant skirmishes due to your \"questionable\" affiliations, [i](Yes, despite everything, they've never completely forgiven you, and certainly make sure no one forgets your part in the current situation);[/i] you've ended up facing off against two groups of undead and a manticore in the last week alone. Although harsh at the time, you're now thankful for Merlinus' strict training regime which has allowed you to survive relatively unscathed.\n\n*page_break\n\nYou turn away from the window regretfully. Time for another interview with Merlinus. You hope the news is more positive, although you know in your gut that it will not be. The peaceful facade maintained by the guild is eroding away, most fear Earth at will slip back into a new dark ages were the supernatural roams freely though the world again. \n\nSomething nags at the back of your mind, an ancient Chinese curse. How did it go again? That's right:\n\n[i][b]\"May you live in interesting times.\"[/i][/b]\n\nWell you certainly will at that. You just hope you're up to the task.\n\n*achieve battle\n*page_break\n\nThank you for Playing Wizardry Level C. \n\nThis adventure is over for now, however there are still many other choices that can be made. \n\nWould you like to play again?\n\n*choice\n\t#Reload from the last checkpoint. (Hear about the Loch Ness assignment from Merlinus. Please note, some options may not be available depending on your stats from this save point). \n\t\t*set ring \"Ruby Ring.\"\n\t\t*set good_standing +20\n\t\t*set occupation \"Wizard Level C: On Probation\"\n\t\t\n\t\tThe world fades around you, then snaps back into sharp focus, leaving you with the odd sense of deja vu. \n\t\t\t\t\n\t\tWhat were you doing again? You seem to have lost your train of thought. \n\t\t\n\t\tYou're standing in Merlinus' office, who is giving you an odd look. \"Are you ok?\" he asks with concern. \"You seemed to space out there for a minute\".\n\t\t\n\t\t\"No I'm fine,\" you assure him, \"I just had the strangest feeling of deja vu. Sorry what were you saying again?\"\n\t\t\n\t\t\"I was starting to tell you about the next assignment,\" Merlinus prompts.\n\t\t\n\t\t*goto_scene bunyiptodragon\n\n\t#Restart from the beginning.\n\t\t*goto_scene ending \n\t\t\n\t\t\n\t\t\n\t\t\n\t\t\n*label run\n\n\nThere's no way you're going to take the blame for this. You're so out of here. \n\nYou creep out into the hallway which is mercifully empty. If you're quick about it, you may just have a chance. In the past you've relied on one of the guild staff members to create the portal to send you home, but you're pretty sure you can improvise one if they work the same way here, as they have on Earth. Ducking back into Merlinus' office, you swipe a piece of chalk off his desk and sketch some symbols on one of the walls. \n\nTaking a step back, you take a moment to study your handiwork. Although your heart feels like it's beating its way up into your throat, you force yourself to check all the sigils thoughly for accuracy. Getting out of here won't help you much if you re-materialise within a mountain range or a few miles under the sea.\n\n*page_break\n\nJust a few more adjustments and you should be set to go. What you'll do once you're out of here, you are really not sure, but you figure you'll take it one step at a time. \n\n\"Hi, I'm here to take you to....\" You spin around, so intent on your work that you hadn't heard the soft foot falls enter the office behind you. A willowy mage stands in the doorway, mouth half open in mid sentence, as her blue eyes widen at your handiwork on the wall.\n\n*page_break\n\n\"They were right!\" she hisses. \"You're trying to escape to find [i]her[/i] aren't you?\"  \n\nShe raises a pale, scarlet robed arm to point her finger at you. The air takes of a leaden feel as her eyes flash with anger. \n\n\"No wait!\" you protest. \"I can explain!\"\n\n\"The time for that has passed.\" The wizard flicks long brown hair from her eyes. \"You brought this on yourself.\" \n\nThere's a sharp pain that causes your body to convulse as you flop bonelessly to the ground into unconsciousness. \n\n*page_break\n\nYou open your eyes groggily, thankful that you're still alive. As your vision comes into focus you realise that there are transparent, glassy barriers on every side. You have a bad feeling about this. Your neck won't seem to bend properly, so you bring one of your hands to your face. Heart sinking, you take in the warty olive green appearance. \n\n[i]They turned you into a toad. Not even a just a frog, but a [b]toad![/b]\n\nMerlinus pays you the occasional visit, staring sadly at you through the walls of your glass prison. You gather he did the best he could for you, but after your failed escape attempt, the council had overwhelmingly voted for your guilt and incarceration. \n\nThis could turn out to be a long couple of decades. \n\n*achieve toad\n*set occupation \"Toad\"\n\n\n*page_break\n\nThank you for Playing Wizardry Level C. \n\nThis adventure is over, however there are still many other choices that can be made. \n\nWould you like to play again?\n\n*choice\n\t#Reload from the last checkpoint. (Hear about the Loch Ness assignment from Merlinus. Please note, some options may not be available depending on your stats from this save point). \n\t\t*set ring \"Ruby Ring.\"\n\t\t*set good_standing +20\n\t\t*set occupation \"Wizard Level C: On Probation\"\n\t\t\n\t\tThe world fades around you, then snaps back into sharp focus, leaving you with the odd sense of deja vu. \n\t\t\t\t\n\t\tWhat were you doing again? You seem to have lost your train of thought. \n\t\t\n\t\tYou're standing in Merlinus' office, who is giving you an odd look. \"Are you ok?\" he asks with concern. \"You seemed to space out there for a minute\".\n\t\t\n\t\t\"No I'm fine,\" you assure him, \"I just had the strangest feeling of deja vu. Sorry what were you saying again?\"\n\t\t\n\t\t\"I was starting to tell you about the next assignment,\" Merlinus prompts.\n\t\t\n\t\t*goto_scene bunyiptodragon\n\n\t#Restart from the beginning.\n\t\t*goto_scene ending \n\n \n\n\t\t", "dragonland": "You awaken lying on a granite outcrop, overlooking a vast savannah dotted with rocks and trees. The air is pleasantly humid and warm again your skin. Trying to get your bearings, you look up noticing two suns in the clear blue sky above. One large and yellow, the second smaller and red tinged. \n\nSo the dragon colony you've been sent to is off world. That's going to definitely complicate things. \n\nYour vantage point allows you to see some distance. To the east across the rolling plains of the Savannah, you can see the grey outline of a distant mountain range. With your sharp eyes, you can make out shapes circling in the sky above. Either they're some kind of very, very large birds, or more likely they're other dragons. To the South, the rocky wasteland you're currently perched upon seems to continue towards the horizon. Craggy outcrops, stunted trees and tufted grasses abound. You study it dubiously. You'll need to eat and prey is likely to be more sparse in this weathered region, however it is away from the dragon colony which might be a good thing. You're still quite uncertain what kind of reception you will get there. There had to be some reason why Myranda didn't want to be sent to this place.\n\nYou decide against heading west, where a seemingly endless ocean stretches into the distance as far as your eyes can see. The North looks equally unpromising, with the savannah rapidly fading into the dunes of a vast waterless desert. No, it'll have to be East or South. \n\nWhich direction do you decide to go? \n\n*Choice\n\t#East- Towards the dragon colony. \n\t\tYou decide that your best chance of survival is to meet up with more of of what is now your \"kind\" and elect to head east towards the mountains. You unfurl your wings and give them a few experimental flaps. The gravity seems lighter here, easily lifting you off the ground with each wing beat. Leaping from the ledge, you launch swiftly into the sky. \n\t\t\n\t\tThe ground blurs beneath you as you pick up speed. It really is exhilarating to feel the air rush past your body in effortless flight and you find yourself enjoying the journey despite everything that has happened. Breathing deeply of the clean air you dip low as the savannah gives way to forest, startling strange membranous-winged monkey creatures which screech and hoot loudly in protest as they dart away through the branches. \n\t\t\n\t\tLazily swooping and dipping you see what else you can flush out of the trees, all that flying has caused you to work up quite an appetite. Finally it pays off as a group of six legged deer-like creatures are startled from cover and gallop across a grassy clearing. Their brown and black dappled hides camouflage them well within the trees but make them easy prey on the grasslands. Readying your talons, you select a straggler and dive. \n\t\t\n\t\t*page_break\n\t\t\n\t\t[b]*Whump*[/b]\n\t\t\n\t\tSomething strikes you from the side with the force of a steam-train. Preoccupied with your hunting, you never saw it coming. Claws rake at your sides, causing deep lacerations as you fall, flailing from the air. Craning your neck around, you realise a much larger red dragon has you in her grasp. Giving you one last shake, she releases you to plummet, tangled to the ground. You hit hard knocking the breath from your body. \n\t\t\n\t\tThe crimson dragon alights gracefully nearby. \"Get up!\" she demands, her voice echoing angrily in your mind. \"I want to know who it is, that would [i]dare[/i] to not only trespass, but to [i]hunt[/i] in our lands without permission to do so.\"\n\t\t\n\t\tYou struggle to your feet weakly. One of your legs can't support your full weight and has a deep set of scratches which bleed freely. Your right side burns like fire, and you get a stabbing pain with each breath. You suspect the fall has cracked some of your ribs.\n\t\t\n\t\t\"Pitiful thing aren't you?\" she addresses you snidely. \"Not much of a fighter at all. Makes me almost feel sorry for you....[i]Almost.[/i] Nothing to say before I kill you?\"\n\t\t\n\t\t*page_break\n\t\t\n\t\tIn a panic you desperately try to send out images of being turned into a dragon. Pleading with the wyrm not to hurt you further. Unsure how much, if anything, is getting though to the angry red dragon. \n\t\t\n\t\t\"Whoa!\" she growls, reaching up to clutch her head in a very un-dragon like fashion. \"I said...[b]STOP![/b]\" The force of her thoughts crashing through your brain, shocks you back into silence. \n\t\t\n\t\t\"Your language skills are appalling,\" she grumbles. \"Most of that was completely unintelligible. However....I think I did I did catch something about a wizard turning you into a dragon and exiling you here?\" \n\t\t\n\t\tHer expression becomes feral. \"What did you do, to earn that? You must have [i]really[/i] done something spectacular to make them hate you enough to send you here.... Actually don't answer that,\" she adds quickly. \"I don't need another migraine.\"\n\t\n\t\t*page_break\n\t\n\t\tShocked, you realise your \"speech\" has been garbled enough, that the wyrm has mistaken you for an enemy of the Wizard's Guild sent here for punishment. \n\t\t\n\t\t\"Well... as much as my clan dislikes intruders, we hate the Wizard's Guild more. As you're probably well aware, it was they who closed off the portal to the hunting grounds on your Earth.\" \n\t\t\n\t\tShe tilts her head thoughtfully \"'An enemy of my enemy, could be my friend' as they say. Not that you're much of a friend at the moment, but with time....maybe. Or, we can go back to option number one and I'll dispatch you now, then get back to my breakfast.\"\n\t\t\n\t\t*page_break\n\t\t\n\t\tLooking at her wickedly curved claws and knife like teeth, you have no illusions that she can make good on the threat, especially given your current injured state. You don't really have a choice. Besides, what do you owe the guild anyway? They got you into this mess, then abandoned you on some far away planet full of hostile lifeforms.\n\n\t\tYou nod, indicating you will go back with her. It's a slow trip to the cave system, injured as you are. The crimson dragon who tells you her name is Aryanth, becomes progressively more impatient and finally gives up half way there. She leaves you to make the remainder of the journey by yourself, with the departing threat that she will easily track you down if you have any thoughts of running, rather than meet her as you promised at the mountain.                        \n\n\t\tFinally you land unevenly in a natural amphitheatre below a series of tunnels and caves dug into the side of the mountain's face. A number of dragonlings peak curiously out from their aeries, clambering across the rocks as stealthily as they can manage to get a closer look at the new arrival. Far above, you see maybe a dozen dragons circling on the overhead thermals. Predominantly red in colour, you spot a few silvers, golds and blacks in the air also. Most appear to be far larger than yourself, you realise heart sinking. \n\t\t\n\t\t*page_break\n\t\t\n\t\tAryanth wings down and lands nearby. \n\t\t\n\t\t\"Took you long enough,\"  she growls in irritation. \"Follow me.\"\n\t\t\n\t\tShe leads you over to a smallish cave on the edge of the colony. Too small to admit Aryanth's bulk, you find that with a bit of wriggling you can squeeze though the entrance and into a chamber comfortable enough for you to curl up in. \n\t\t\n\t\t\"You'll be thankful for that.\" Aryanth observes as if reading your thoughts. \"This cave will keep the larger ones from entering while you're settling in. I plan to keep you alive at least long enough to make use of you. Stay here for now, I'll be in touch.\"\n\t\t\n\t\t*page_Break\n\t\t\n\t\tThe next few months pass swiftly. Aryanth seems to have taken a personal interest in your well being, keeping other dragons who wish you harm largely at bay. You quickly find that the black dragons seem to have the worst temperaments, with almost sadistic tendencies. The majority of reds are not much better, being volatile and quick to rage about any imagined slights, of which you commonly commit, being uneducated in dragon etiquette as you are. \n\t\t\n\t\tAfter being cornered a few times, you quickly learn your best option is to flee back to your lair and lie low for a while. Although this policy keeps your hide largely intact, it wins you no increased standing amongst the clan. Along with your young age, small size and lack of any treasure to speak of, you find yourself planted firmly at the bottom of the pecking order.\n\t\t\n\t\tYou sit in on lessons with the young ones, learning how to speak clearly and the history of this world and its people. Aryanth quizzes you on the finer points of human society which has progressed rapidly since she was last there, interested particularly in the weaponry mankind now possesses. She also seems hopeful that the wizards might reopen the gate between Earth and this world to send others through, or perhaps just to check up on you. When asked how probable this is though, you have to admit ignorance. \n\t\t\n\t\t*page_break\n\t\t\n\t\tYou settle into life in the enclave, gradually growing stronger, more confident and less needing of Aryanth's constant protection. You learn that yours is not the only settlement of dragons on the continent, although with their aggressive tendencies, exchanges between the groups are uncommon and prone to escalate into conflict when they do. \n\t\t\n\t\tThe exception to this is the groups of smaller \"feral\" Moor Dragons, living out
