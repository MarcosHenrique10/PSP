<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wizardry Level C — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "wizardrylevelc", "title": "Wizardry Level C", "scenes": {"2ndthought": "The silence is palpable. The phone operator obviously isn't used to getting that response. \n\n\"Well if that's the way you feel about it. You did sign the contract, but since you haven't been tested yet, there is likely a way to let you out of it. The consequences are the loss of your magic though. You won't get a second chance. You know wizards quick to anger and all that.\"\n\n*choice\n\n\t#Ok you've talked me into it after all. What's the assignment. \n\t\t\"Alright if you're sure, no backing out while you're there though ok?\" The voice on the phone pauses for a response. When there's nothing further from you he continues.\n\t\t*goto firsttask\n\n\t#No, I do want to be a wizard, I just don't want an assignment yet. \n\t\t\"Well you did sign up for it.\" He snaps. \n\t\t\t\n\t\t\"Sure I realise I'll have responsibilities\" you reply \"but...not until I've had a chance to work some of this stuff out.\"\n\t\t\n\t\t\"Well if that's your attitude, good luck getting past your probationary licence.\" You can hear the tapping of a keyboard in the background. \n\n\t\t\"Lucky for you I've managed to find someone else available to take on your assignment. This will be on your permanent record though. I suggest you don't turn down the next one as well. At best, you'll probably be kicked out of the guild. At worst, well I heard of this one P plater who had to hide a donkey tail for a few weeks until the wizard who had to take on his job calmed down and removed it.\" \n\n\t\tThe line goes dead. It seems like the folks working the administration end of the wizards guild don't seem to be high on the positive personality traits. \n\n\t\t*set Good_Standing -10\n\t\t*set grade1 \"Fail\"\n\t\t*Set strikes 1\n\t\t*goto noassignment\n\n\n\n*label firsttask\n*comment same as the storyline on phonecall1\n\n\n*page_break\n\n\"So the assignment, all you have to do is relocate a brownie. Nothing too fancy. Just go in, convince it to come with you and find somewhere for it to live. Easy. I'm sending the details to your phone now. I need you to go there tonight, the house it lives in is scheduled for demolition tomorrow\". \n\n\"Tonight!\" You squawk. \"You're kidding right, do you know what time it is? How am I supposed to get there in the middle of the night?\"\n\n*page_break\n\n\"Use the book. Come on it's not that hard. Look up your basic teleport spell. Use a simple time warp cantrip turn back time an hour or two if you need. Gotta go\" The line goes dead. \n\n\nSearching through your book you find the appropriate spells. You need a map to make the teleport spell work. Thank goodness for google, a quick search on your phone brings the street map up. \n\nYou worry about your pronunciation as you stumble though the wording of the spell, fortunately it must have been close enough as suddenly with a sharp popping sound, you're standing in a darkened room.\n\n*page_break\n \n\nYou use your phone as a torch, searching the room. Peeling paint, holes in the wall, lifting floorboards. The place looks condemned, pretty sure this is the right place. Now to find that brownie. \n\n*choice\n\t#You creep though the house. Floorboards squeaking with every step. You hope you don't fall though. \"Here Brownie, brownie, brownie\" you call softly.\n\t\t*goto_scene browniecall\n\n\t*selectable_if (browniestat >= 10) #You remove a bottle of milk and a glass from your bag you'd packed in readiness. \n\t\tYou pour a glass of milk and set it down on the ground. You remember reading in your book that brownies often like milk and cookies left out for them in payment for work done. You suspect it's a good way to lure it out.\n\t\t*goto_scene browniecookie\n\n\n\n*label noassignment \n\n*page_break\n\nThe rest of the night passes without incident but you don't sleep well imagining all sorts of retaliation. One nightmare in particular involved turning into a donkey fortunately you're thankfully human when you wake. \n  \nDragging yourself out of bed the next morning you head towards the kitchen in desperate need of a hot chocolate. As you walk through the kitchen door you walk straight into the office space you were summoned to yesterday. You look down at your blue spotted flannel pyjamas and fluffy grey slippers. \n\nYou're not dressed for the occasion and even worse, they didn't let you get your hot chocolate!\n\n*page_break\n\n\"Come on in\" A voice calls from the cubical in front of you. \n\nScuffing your slippers you shuffle inside. You find yourself standing in front of a kindly, older looking man in traditional wizards garb. He wears a cloak decorated in moons and stars and a tall pointed hat. He's frowning. \n\n\"Heard there was some trouble yesterday. Declined an assignment, did you?\"\n\nYou decide to be truthful. \"I'm sorry for any trouble I caused, I just didn't feel ready\".\n\n\"Well\" He sighs \"The best way to learn is by doing. The assignment was a simple one, you would have been fine\". You start to protest but he holds up a hand. \n\n\"Be that as it may, they shouldn't have been assigning you out before an initial chat with your supervisor. That would be me for the time being. I'm willing to overlook the incident and let you stay on, as long as you co-operate with the guild from now on.\"\n\n*choice\n\t\n\t#Murmur something that sounds vaguely like an affirmative\n\t\tHe nods satisfied and gives you an encouraging smile. \"Ok don't panic, we've got it all sorted now. Just take the next assignment and we should be back on track ok?\"\n\n\t\t\"By the way, I'm guessing you haven't mastered any time manipulation spells yet\". He reaches into a pocket and pulls out a watch. \"Here, move the hands on this watch back a few hours every time you need to catch up on some sleep. It's spelled to be good for a few uses, should give you the time to get up to speed.\" \n\n\t\tYou take the offered watch gingerly \"Thank you...?\" \n\n\t\t\"Oh yes sorry, I can be forgetful. My name is Merlinus\" Seeing your look he gives a short laugh. \"No not as in [i]The Merlin[/i]. Its a more common name than you'd expect in magic circles. Ok off you go, should be all set now. We'll be in touch.\"\n\n\t\tHe directs you back out the door and you step through into your kitchen. [i]\"Ok how about that cup of hot chocolate\"[/i] you think.\n\n\n\t\t*goto_scene familiarsearch\n\n\t\n\t#Ask what the consequences are for not co-operating\n\t\t\"Excuse me..um...Sir..Wizard.. but what if I don't want a particular assignment?\"\n\t\t\n\t\tThe wizard gives you a sideways look. \"Well that would be a shame. You've got a lot of potential but you need to have the right attitude to work around here. Can't have people who won't pull their weight, we're often short staffed enough around here without having to deal with cleaning up problems arising from those who won't do their jobs. We'd have fail your probation and put you out of the guild.\" \n\t\t\n\t\t\"So you wouldn't say...give me a tail or anything?\" You ask nervously. \n\n\t\t\"A tail!? Why no why would I...Raphael! Sometimes I swear...No I'm not of the school that believes that donkey ears or time spent crawling around in a tank as a newt helps teach students discipline.\" Seeing you sag with relief he gives you a hard look. \"Well not usually anyway. If it keeps you motivated though....Hmm. Well just a word of advice, I wouldn't put it past Raphael or some of the other hobgoblins to try a prank like that if you make their job harder than it needs to be. Nasty streak in them hobgoblins\". \n \n\t\t\n\t\t*page_break\n\n\t\t\"Ok don't panic.\" He adds soothingly. \"Just take the next assignment if you want to stay with us\".\t\n\n\t\t\"By the way, I'm guessing you haven't mastered any time manipulation spells yet.\" He reaches into a pocket and pulls out a watch. \"Here, move the hands on this watch back a few hours every time you need to catch up on some sleep. It's spelled to be good for a few uses, should give you the time to get up to speed.\" \n\n\t\tYou take the offered watch gingerly \"Thank you...?\" \n\n\t\t\"Oh yes sorry, I can be forgetful. My name is Merlinus\" Seeing your look he gives a short laugh. \"No not as in [i]The Merlin[/i]. Its a more common name than you'd expect in magic circles. Ok off you go, should be all set now. We'll be in touch.\"\n\n\t\tHe directs you back out the door and you step through into your kitchen. [i]\"Ok how about that cup of hot chocolate\"[/i] you think.\n\n\n\t\t*goto_scene familiarsearch", "book": "\n*page_break\n\nTurning the page you notice what looks like a contract. The wording was to the effect that the user had read the aforementioned codes, ethics and responsibilities and agreed to follow them in return for joining the guild of wizards. At the bottom of the page this is a box for you to print your name and an oath that it instructs you to say out loud. You're sure it's all for fun (you found it in the fiction section of the library after all) but why not go along with it. You know, for the immersive RPG type experience. \n\n\n*choice\n\t#Decide to read ahead. \n\t\tYou continue reading. The next chapter was devoted to types of magical creatures. Skipping through the pages you pick out the more interesting parts. Flicking through the remaining pages you come to the main section of the book with the odd symbols you saw earlier. Try as you might, there's no deciphering it. The text might as well be written in an alien language. \n\t\t*set browniestat 10\n\t\tFlicking back to the start, the book falls open at the contract page. You shrug. Why not?\n\t\t\n\t\t*choice\n\t\t\t#Go ahead and sign the contract\n\t\t\t\t*goto booksign\n\n\t\t\t#Decide against signing the book\n\t\t\t\t*goto_scene dontsign\n\t\t\n\n\t#Decide to play along and sign the contract now. \n\t\tWell no one's around right now to see you, you decide to play along with the books instructions. \n\t\t*goto booksign\n\n*label booksign\nFirst to fill in your details. You feel a little guilty about defacing a library book, so you rummage around in your drawer for a pencil. At least that way you can always erase it later. [i]The thrill of doing something slightly illegal.[/i] (You agree at this point you probably need to get out more). \n\nThe first thing it asks you to fill in is your gender. Well obviously you are....\n\n*Choice\n\t#Female\n\t\t*goto femalenames\n\n\t#Male\n\t\t*goto_scene malename\n\n*label femalenames\n*set he \"she\"\n*set his \"her\"\n*set boy \"girl\"\nThe name you write into the book is?\n*choice\n\t#Sarah.\n\t\t*set name \"Sarah\"\n\t\t*goto lastname\n\n\t#Ceres.\n\t\t*set name \"Ceres\"\n\t\t*goto lastname\n\t\n\n\t#Alice.\n\t\t*set name \"Alice\"\n\t\t*goto lastname\n\n\t#River.\n\t\t*set name \"River\"\n\t\t*goto lastname\n\n\n\t#None of these are right!\n\t\t*label input_name\n\t\tWhat name would you prefer?\n\t\t*input_text name\n\t\t*set name \"$!{name}\"\n\t\t*goto lastname\n\n\n\n\n\n\n*label lastname\nAnd your last name?\n\nThe surname you write into the book is:\n*choice\n\t#Drake.\n\t\t*set lastname \"Drake\"\n\t\t*goto finish\n\n\t#Song.\n\t\t*set lastname \"Song\"\n\t\t*goto finish\n\t\n\n\t#Emrys.\n\t\t*set lastname \"Emrys\"\n\t\t*goto finish\n\n\t#Smith.\n\t\t*set lastname \"Smith\"\n\t\t*goto finish\n\n\n\t#None of these are right!\n\t\t*label input_lastname\n\t\tWhat name would you prefer?\n\t\t*input_text lastname\n\t\t*set lastname \"$!{lastname}\"\n\t\t*goto finish\t\n\n*label finish\n*goto_scene oath\n", "browniecall": "A pixie like creature pops into existence in front of you. Hands on hips, he scowls up at you as his small voice squeaks angrily. \"I'm not a dog you know!\"  His delicately pointed ears are flushed red and his many pocketed, faded brown tunic swings around him as he twitches in fury. All of one foot tall and very cranky. \n\n*Choice\n\t#Look I'm sorry about that, I'm new to all this. I've been sent to move you to safety. \n\t\tThe apology seems to take some of the tension out of the little fae. \"You're going to move me to safety? Really? I've been here by myself for so long, it'll be a relief. Where are you taking me?\"\n\n\t\tYou show him your phone. The guild has sent you a list of suitable houses to re-home the brownie to. \"Would one of these be ok?\"\n\t\t\"This one\" He points to the third house on the list. \"Three young kids I can try to convince to smuggle me cookies and no cats.\" \n\t\t\"Fine lets go.\" You take his hand and repeat the teleport spell. By the time you have the little brownie settled in and made it back home it's almost dawn. No one told you that sleep deprivation was part of being a wizard. \n\t\t*set First_Task 90\n\t\t*set Good_Standing +10\n\t\t*set grade1 \"Pass\"\n\t\t*goto Office2havebrownie\n\t\n\t#Hey shortie, don't use that tone with me! I've come out in the middle of the night to get you. Pack your things and lets get out of here. \n\t\t\"Shortie?!\" You've made him beyond angry now. He disappears a huff and no amount of calling, pleading or apologising will get him to come back. With dawn on the way, you have to return home without completing your assignment. \n\t\t\n\t\t*Set Good_Standing -10\n\t\t*achieve ire\n\t\t*set grade1 \"Fail\"\n\t\t*goto Office2nobrownie\n\n\n\n*label Office2nobrownie\n*page_break\nDragging yourself out of bed the next morning you walk bleary eyed to the bathroom and splash water across your face. Being a wizard is getting exhausting, you don't know how much longer you can take it. Stepping back through the door of the bathroom you walk straight into the office space you were summoned to yesterday. And you're still in your PJ's. \n\n*Fake_Choice\n\t#You're kidding me\n\t\tA voice calls you into the cubicle. \"Nope afraid we're not kidding you.\"\n\t#No way...\n\t\t\"Yes Way I'm afraid, come on in.\" A voice calls you inside the cubicle. \n\n\n*page_break\n\nYou find yourself standing in front of a kindly, older looking man in traditional wizards garb. He wears a cloak decorated in moons and stars and a tall pointed hat. He notices you gaping at the clothes and gives a short laugh. \"Oh yes that, I know it's stereotypical wizards attire but it really is the traditional attire you're encouraged to wear to official functions. I didn't have time to change either. No rest for the wicked... or the wizards as you're discovering.\"\n\n\"Sorry, forgot to introduce myself. I'm Merlinus.\" \n\nYou blink. \"As in Merlin?\" \n\nHe laughs again. \"No, I wish. I'm just from a wizarding family where such names are more common than in the general population. So I'm here to assess your first assignment. You know you're on probation right until you've proven yourself and can work independently.\" You nod. \"Ok so tell me, how do you think it went?\"\n\n\n*choice\n\t#Tell the truth, you couldn't get the brownie to come with you. \n\t\tTo your surprise the wizard doesn't seem angry. \"Well we all make mistakes sometimes and since this is your first case don't stress, just try and be more prepared next time. Don't worry about the brownie, someone has already moved him out ahead of the construction workers that are due to arrive later today.\" \n\n\t\tHe gives you a considering look. \"You look exhausted. I'm guessing you haven't mastered any time manipulation spells yet.\" He reaches into his pocket and pulls out a watch. \"Here, move the hands on this watch back a few hours every time you need to catch up on some sleep. It's spelled to be good for a few uses, should give you the time to get up to speed.\" \n\n\t\tYou thank him and sleep walk back through your bathroom door and give the watch it's first try out and get a few hours sleep.\n\n\t\t\n\t\t*goto_scene familiarsearch\n\n\t#Lie and pretend everything went swimmingly. \n\t\tYou summon up your biggest smile. \"Well it was tricky but I eventually convinced him to relocate.\" \n\t\t\n\t\tThe smile slips fromt he wizard's face. \"So the emergency evacuation call I got this morning, from that address to get there ahead of the construction workers was?\"\n\t\t\n\t\tYou stay silent, not sure what to say. Finally you look up. \"Sorry, I just didn't want my licence taken away.\" \n\t\t\n\t\tThe wizard walks around the desk and pats you on the shoulder. \"Hey, you think we'll kick you out for that? Everyone makes mistakes sometimes, just don't lie about it next time huh?\"\n\t\t\n\t\tYou nod.\n\n\t\t\"You look exhausted. I'm guessing you haven't mastered any time manipulation spells yet.\" He reaches into his pocket and pulls out a watch.\" Here, move the hands on this watch back a few hours every time you need to catch up on some sleep. It's spelled to be good for a few uses, should give you the time to get up to speed.\" \n\n\t\tYou thank him and sleep walk back through your bathroom door and give the watch it's first try out and get a few hours sleep.\n\n\t\t\n\t\t*goto_scene familiarsearch\n\n\n\n\n*label Office2havebrownie\n\n\nDragging yourself out of bed the next morning you walk bleary eyed to the bathroom and splash water across your face. Being a wizard is getting exhausting, you don't know how much longer you can take it. Stepping back through the door of the bathroom you walk straight into the office space you were summoned to yesterday. And you're still in your PJ's. \n\n\n*Fake_Choice\n\t#You're kidding me\n\t\tA voice calls you into the cubicle. \"Nope afraid we're not kidding you.\"\n\t#No way...\n\t\t\"Yes Way I'm afraid, come on in.\" A voice calls you inside the cubicle. \n\n\n*page_break\n\nYou find yourself standing in front of a kindly, older looking man in traditional wizards garb. He wears a cloak decorated in moons and stars and a tall pointed hat. He notices you gaping at the clothes and gives a short laugh. \"Oh yes that, I know it's stereotypical wizards attire but it really is the traditional attire you're encouraged to wear to official functions. I didn't have time to change either. No rest for the wicked... or the wizards as you're discovering.\"\n\n\"Sorry, forgot to introduce myself. I'm Merlinus.\" \n\nYou blink. \"As in Merlin?\" \n\nHe laughs again. \"No, I wish. I'm just from a wizarding family where such names are more common than in the general population. So I'm here to assess your first assignment. You know you're on probation right until you've proven yourself and can work independently.\" You nod. \"Ok so tell me, how do you think it went?\"\n\n\n*page_break\n\n\n\"I think I did ok for my first time out.\" You allow.  \n\nThe old wizard nods. \"I agree, you handled the case adequately and got the brownie out with no fuss. Congratulations on completing your first assignment.\" \n\nHe gives you a hard look. \"You look exhausted. I'm guessing you haven't mastered any time manipulation spells yet.\" He reaches into his pocket and pulls out a watch. \"Here, move the hands on this watch back a few hours every time you need to catch up on some sleep. It's spelled to be good for a few uses, should give you the time to get up to speed.\" \n\nYou thank him and sleep walk back through your bathroom door and give the watch it's first try out and get a few hours sleep.\n\n\n*goto_scene familiarsearch\n\n", "browniecookie": "You don't need to wait for long. A large pixie like creature comes creeping out of the darkness and snatches up the glass of milk greedily. He spills milk over his ragged brown tunic in his haste to swallow the fluid. \n\n\"More?\" the tiny voice squeaks. You pour the remainder of the milk into the glass for him which is swallowed down with equal enthusiasm. \n\nThe creature looks at you with bright green eyes, long pointed ears twitching. \"Thank you. It's been so long since I had a glass of milk. No one has been here in so long.\" He looks sad. \"No one to clean or garden for.\"\n\t\t\n\"Why didn't you simply leave before?\" you ask him kindly. \n\n\"I couldn't. I'm a house elf. I'm bound to this house unless someone gives me a home somewhere else?\" His bright eyes lock with yours. \"Say are you here to offer me a job?\"\n\n*choice\n\t#Sure why not\n\t\tYou can't see why he couldn't live at your place. As far as you were aware, you have no resident brownies. \n\n\t\tThe elf's eyes sparkle. \"This is going to be great! I'll keep everything clean and tidy for you, you'll never even know I'm there. I love doing that sort of thing.\"\n\n\t\tYou on the other hand hate doing things like dusting and washing dishes. Having someone around who enjoys cleaning and will work for milk and cookies sounds like a great deal. You can see this is going to be the start of a beautiful relationship. \n\n\t\t\"Actually, I've got something for you,\" the little elf chimes. Fishing around in the many pockets in his tunic, he finally finds a golden ring set with a large ruby. \"I found it out in the garden one day. It's magic, not sure what it does but...for you.\" He hands you the ring. It fits your finger perfectly. \"Thank you....?\" \n\t\t\t\n\t\t\"Ashie,\" the brownie chirps, \"it's Ashie.\"\n\n\t\t*achieve brownie\n\t\t\t\n\t\t*Set Ring \"Ruby Ring.\"\n\t\t*set grade1 \"Pass\"\n\t\t*Set First_Task 100\n\t\t*set hundredpercent +1\n\t\t*set Good_Standing +10\n\t\t\n\t\t*goto Office2\n\n\n\t#Uh...no sorry I'm just here to relocate you. \t \n\t\t\"Oh..\" he looks crestfallen. \n\n\t\t\"The guild has sent me a list of houses you might find suitable though. How about one of these?\" You show him the list. \n\n\t\t\"This one.\" He points to the third house on the list. \"Three young kids I can convince to smuggle me cookies and no cats.\"\n \n\t\t\"Fine lets go.\" You take his hand and repeat the teleport spell. By the time you have the little brownie settled in and made it back home it's almost dawn. No one told you that sleep deprivation was part of being a wizard. \n\n\t\t*Set First_Task 100\n\t\t*set Good_Standing +10\n\t\t*set grade1 \"Pass\"\n\t\t*set hundredpercent +1\n\t\t\n\t\t*goto Office2\n\n\n*label Office2\n*page_break\n\nDragging yourself out of bed the next morning you walk bleary eyed to the bathroom and splash water across your face. Being a wizard is getting exhausting, you don't know how much longer you can take it. Stepping back through the door of the bathroom, you walk straight into the office space you were summoned to yesterday. And you're still in your PJ's. \n\n*Fake_Choice\n\t#You're kidding me\n\t\tA voice calls you into the cubicle. \"Nope afraid we're not kidding you.\"\n\t#No way...\n\t\t\"Yes Way I'm afraid, come on in.\" A voice calls you inside the cubicle. \n\n*page_break\n\nYou find yourself standing in front of a kindly, older looking man in traditional wizards garb. He wears a cloak decorated in moons and stars and a tall pointed hat. He notices you gaping at the clothes and gives a short laugh. \"Oh yes that, I know it's stereotypical wizards attire but it really is the traditional attire you're encouraged to wear to official functions. I didn't have time to change either. No rest for the wicked... or the wizards as you're discovering.\"\n\n\"Sorry, forgot to introduce myself. I'm Merlinus.\"\n\nYou blink. \"As in Merlin?\" \n\nHe laughs again. \"No I wish. I'm just from a wizarding family where such names are more common than in the general population. So I'm here to assess your first assignment. You know you're on probation right until you've proven yourself and can work independently.\" You nod. \"Ok so tell me, how do you think it went.\"\n\n*page_break\n\n\"I think I did ok for my first time out,\" you say tentatively.\n\n\"You sure did,\" the wizard smiled warmly. \"Couldn't have handled it better myself. Even though they're not particularly dangerous, brownies can be easily offended. You took the correct tact with this one.\"\n\n\n*page_break\n\"By the way, you look exhausted. I'm guessing you haven't mastered any time manipulation spells yet.\" He reaches into his pocket and pulls out a watch. \"Here, move the hands on this watch back a few hours every time you need to catch up on some sleep. It's spelled to be good for a few uses, should give you the time to get up to speed.\" You thank him and walk sleepily back through the portal and collapse to collapse on your bed. Turning the hands on the watch as instructed, you immediately drift off to sleep.\n\n*goto_scene familiarsearch\n", "bunyipfamiliar": "*selectable_if (familiar = 1) and (bunyipfamiliar =\u003c 1) #Wait, how did your familiar get here?\n\tEven though you doubt the creature managed to stow away in your bag, the familiar form of your ${familiartype} appears at the edge of the clearing as if called. It must have something to do with the magical link between the two of you, you surmise. \n\t\n\tIt'll certainly help you if you ask. Do you want to risk having your familiar too close to the bunyip?\n\t\n\t*choice\n\t\t*if (familiartype = \"Moody Badger\")#Ask for help. \n\t\t\tYou call over your friend from the tree line, as the bunyip stalks up the embankment, long claws creating deep furrows in the sand as it heads towards the cooler containing the rest of the meat you'd bought as bait. That might be distraction enough? You take a hesitant step towards the bunyip. \n\t\t\t\n\t\t\tWith lightening speed, the creature spins around, crocodile like tail thrashing as it hisses menacingly in your direction. When you freeze, the bunyip lowers its spined neck, returning its attention to attacking the plastic container. You notice it keeps at least one glowing eye trained on you at all times though. \n\t\t\t\n\t\t\tSneaking up on it is going to be difficult and ideally you'd like to get closer to be sure of hitting the monster with your capture orb. If you miss, that fanged maw will probably make as short a work of you, as it has of the cooler. Maybe your familiar can help out with a distraction?\n\n\t\t\tThe badger sits quietly by your side. Hmm, how to do this? If you speak aloud the bunyip is close enough it might hear and understand you. You don't dare leave the area in case it disappears as soon as you're out of sight. How is your telepathy coming along?\n\t\t\t*choice\t\n\t\t\t\t\n\t\t\t\t*if (telepathy => 10)#Actually it's one of my specialities, I think I'm accomplished enough at this to communicate clearly enough to be understood.\n\t\t\t\t\t*goto telepathybadger\n\t\t\t\t\t\n\t\t\t\t*if (telepathy \u003c 10) #I'm still working on it, but find it tricky. Not like ${speciality}, which you find so much easier. \n\t\t\t\t\tYour abilities in mental communication can sometimes be a bit hit and miss. You're not sure you really want to risk your familiar on a miscommunication. \n\t\t\t\t\t\n\t\t\t\t\tDo you want to risk telling the badger aloud what the plan is? Or try something else that doesn't involve your familiar.\n\t\t\t\t\t\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Take the risk, whispering as quietly as you can. \n\t\t\t\t\t\t\t*goto whisperbadger\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t#No, I've changed my mind, lets try something different. \n\t\t\t\t\t\t\t*set bunyipfamiliar 1\n\t\t\t\t\t\t\t*goto bunyipshore\n\t\t\n\t\t*if (familiartype = \"Ember Gecko\")#Ask for help. \n\t\t\n\t\t\tYou call over your friend from the tree line, as the bunyip stalks up the embankment, long claws creating deep furrows in the sand as it heads towards the cooler containing the rest of the meat you'd bought as bait. That might be distraction enough? You take a hesitant step towards the bunyip. \n\t\t\t\n\t\t\tWith lightening speed, the creature spins around, crocodile like tail thrashing as it hisses menacingly in your direction. When you freeze, the bunyip lowers its spined neck, returning its attention to attacking the plastic container. You notice it keeps at least one glowing eye trained on you at all times though. \n\t\t\t\n\t\t\tSneaking up on it is going to be difficult and ideally you'd like to get closer to be sure of hitting the monster with your capture orb. If you miss, that fanged maw will probably make as short a work of you, as it has of the cooler. Maybe your familiar can help out with a distraction?\n\n\t\t\tThe gecko perches lightly on a nearby rock. Hmm, how to do this? If you speak aloud the bunyip is close enough it might hear and understand you. You don't dare leave the area in case it disappears as soon as you're out of sight. How is your telepathy coming along?\n\t\t\t*choice\t\n\t\t\t\t\n\t\t\t\t*if (telepathy => 10)#Actually it's one of my specialities, I think I'm accomplished enough at this to communicate clearly enough to be understood.\n\t\t\t\t\t*goto telepathylizard\n\t\t\t\t\t\n\t\t\t\t*if (telepathy \u003c 10) #I'm still working on it, but find it tricky. Not like ${speciality}, which you find so much easier. \n\t\t\t\t\tYour abilities in mental communication can sometimes be a bit hit and miss. You're not sure you really want to risk your familiar on a miscommunication. \n\t\t\t\t\t\n\t\t\t\t\tDo you want to risk telling the gecko aloud what the plan is? Or try something else that doesn't involve your familiar.\n\t\t\t\t\t\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Take the risk, whispering as quietly as you can. \n\t\t\t\t\t\t\t*goto whisperlizard\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t#No, I've changed my mind, lets try something different. \n\t\t\t\t\t\t\t*set bunyipfamiliar 1\n\t\t\t\t\t\t\t*goto bunyipshore\t\n\t\t\n\t\t*if (familiartype = \"Sapphire Winged Butterfly\")#Ask for help. \n\t\t\tYou call over your friend from the tree line, as the bunyip stalks up the embankment, long claws creating deep furrows in the sand as it heads towards the cooler containing the rest of the meat you'd bought as bait. That might be distraction enough? You take a hesitant step towards the bunyip. \n\t\t\t\n\t\t\tWith lightening speed, the creature spins around, crocodile like tail thrashing as it hisses menacingly in your direction. When you freeze, the bunyip lowers its spined neck, returning its attention to attacking the plastic container. You notice it keeps at least one glowing eye trained on you at all times though. \n\t\t\t\n\t\t\tSneaking up on it is going to be difficult and ideally you'd like to get closer to be sure of hitting the monster with your capture orb. If you miss, that fanged maw will probably make as short a work of you, as it has of the cooler. Maybe your familiar can help out with a distraction?\n\n\t\t\tThe butterfly perches lightly on your outstretched hand. Hmm, how to do this? If you speak aloud the bunyip is close enough it might hear and understand you. You don't dare leave the area in case it disappears as soon as you're out of sight. How is your telepathy coming along?\n\t\t\t*choice\t\n\t\t\t\t\n\t\t\t\t*if (telepathy => 10)#Actually it's one of my specialities, I think I'm accomplished enough at this to communicate clearly enough to be understood.\n\t\t\t\t\t*goto telepathybutterfly\n\t\t\t\t\t\n\t\t\t\t*if (telepathy \u003c 10) #I'm still working on it, but find it tricky. Not like ${speciality}, which you find so much easier. \n\t\t\t\t\tYour abilities in mental communication can sometimes be a bit hit and miss. You're not sure you really want to risk your familiar on a miscommunication. \n\t\t\t\t\t\n\t\t\t\t\tDo you want to risk telling the butterfly aloud what the plan is? Or try something else that doesn't involve your familiar.\n\t\t\t\t\t\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Take the risk, whispering as quietly as you can. \n\t\t\t\t\t\t\t*goto whisperbutterfly\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t#No, I've changed my mind, lets try something different. \n\t\t\t\t\t\t\t*set bunyipfamiliar 1\n\t\t\t\t\t\t\t*goto bunyipshore\t\t\n\t\t\n\t\t*if (familiartype = \"Iridescent Kingfisher\")#Ask for help. \n\t\t\tYou call over your friend from the tree line, as the bunyip stalks up the embankment, long claws creating deep furrows in the sand as it heads towards the cooler containing the rest of the meat you'd bought as bait. That might be distraction enough? You take a hesitant step towards the bunyip. \n\t\t\t\n\t\t\tWith lightening speed, the creature spins around, crocodile like tail thrashing as it hisses menacingly in your direction. When you freeze, the bunyip lowers its spined neck, returning its attention to attacking the plastic container. You notice it keeps at least one glowing eye trained on you at all times though. \n\t\t\t\n\t\t\tSneaking up on it is going to be difficult and ideally you'd like to get closer to be sure of hitting the monster with your capture orb. If you miss, that fanged maw will probably make as short a work of you, as it has of the cooler. Maybe your familiar can help out with a distraction?\n\n\t\t\tThe kingfisher perches quietly on your shoulder. Hmm, how to do this? If you speak aloud the bunyip is close enough it might hear and understand you. You don't dare leave the area in case it disappears as soon as you're out of sight. How is your telepathy coming along?\n\t\t\t*choice\t\n\t\t\t\t\n\t\t\t\t*if (telepathy => 10)#Actually it's one of my specialities, I think I'm accomplished enough at this to communicate clearly enough to be understood.\n\t\t\t\t\t*goto telepathybird\n\t\t\t\t\t\n\t\t\t\t*if (telepathy \u003c 10) #I'm still working on it, but find it tricky. Not like ${speciality}, which you find so much easier. \n\t\t\t\t\tYour abilities in mental communication can sometimes be a bit hit and miss. You're not sure you really want to risk your familiar on a miscommunication. \n\t\t\t\t\t\n\t\t\t\t\tDo you want to risk telling the kingfisher aloud what the plan is? Or try something else that doesn't involve your familiar.\n\t\t\t\t\t\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Take the risk, whispering as quietly as you can. \n\t\t\t\t\t\t\t*goto whisperbird\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t#No, I've changed my mind, lets try something different. \n\t\t\t\t\t\t\t*set bunyipfamiliar 1\n\t\t\t\t\t\t\t*goto bunyipshore\t\t\n\t\t\t\n\t\t*else #You don't want to risk it, maybe there's another way. \n\t\t\tYou don't want to put anyone in danger needlessly, maybe you could try something else? \n\t\t\t*set bunyipfamiliar 1\n\t\t\t*goto bunyipshore\n\t\t\t\n\n\t\t\t\n*label whisperbird\t\n\nYou glance down at the kingfisher who regards you with bright, intelligent eyes. \n\n\"Ok, here's the deal,\" you whisper. \"Can you take that bunyip's attention off me for a minute? While it's distracted I'll try to get in close enough and capture it.\"\t\n\nThe iridescent white and green bird gives a human like nod. \n\nYou glance back at the bunyip which has stopped its attack on the esky and now regards you steadily with glowing red eyes, wolf like ears pricked in your direction. [i]Oh no! Looks like it heard you![/i]\n\nAs you watch, the creature morphs, increasing in size, muzzle elongating into a crocodile like maw, filled with sharp teeth. \n\n\"Run!\" you yell to your familiar, who streaks off towards the cover of the forest. The bunyip hesitates for a second, deciding which of you to go after. It's all you need. \n\nSwiftly retrieving the capture orb from your pocket, you fling the glowing object towards the hissing monster. \n\nIt sails through the air and hits the bunyip squarely on its scaled nose. Shattering on impact, magic wraps the startled creature in a cascade of light before pulling it through the portal with a loud snapping sound. \n\n*page_break\n\nYou sit down shakily. [i]Wow that was too close![/i] Your kingfisher reappears unharmed, peaking out through the foliage Deciding it was safe to come out, she flies over to your side. \n\nWait, what's that noise? As you pause to listen, you realise the quiet lake sounds have been replaced by the excited voices of a group of people heading your way. \n\n[i]Oh no, the people over in the picnic area must have heard or seen something to do with your altercation with the bunyip.[\\i]\n\nThe bird makes a motion towards the trees with her head. \n\nYou give her a quick scratch. \"Yes I agree, it's definitely time to get out of here.\"\n\nPlacing the bird on your shoulder, you quickly retreat into the forest, pushing your way through the dense undergrowth, before circling around back to the carpark. Too late you realise that you left the shredded cooler behind on the bank. Hopefully it doesn't cause too much trouble. Shame there's no crocodiles to blame it on in the lake, maybe they'll think it was a pack of wild dogs or something? Maybe...you can hope anyway. \n\t\t\n*set Third_Task 60\n*set good_standing -5\t\n*set grade3 \"Pass\"\n*set bunyipfamiliar 0\t\t\n*goto TPfinish\n\t\t\t\n\n\t\t\t\n\t\t\t\n\t\t\t\n*label whisperlizard\t\n\nYou crouch down next to the gecko who regards you with bright, intelligent eyes. \n\n\"Ok, here's the deal,\" you whisper. \"Can you take that bunyip's attention off me for a minute? While it's distracted I'll try to get in close enough and capture it.\"\t\n\nThe black and orange scaled animal gives a human like nod. \n\nYou glance back at the bunyip which has stopped its attack on the esky and now regards you steadily with glowing red eyes, wolf like ears pricked in your direction. [i]Oh no! Looks like it heard you![/i]\n\nAs you watch, the creature morphs, increasing in size, muzzle elongating into a crocodile like maw, filled with sharp teeth. \n\n\"Run!\" you yell to your familiar, who streaks off towards the cover of the forest. The bunyip hesitates for a second, deciding which of you to go after. It's all you need. \n\nSwiftly retrieving the capture orb from your pocket, you fling the glowing object towards the hissing monster. \n\nIt sails through the air and hits the bunyip squarely on its scaled nose. Shattering on impact, magic wraps the startled creature in a cascade of light before pulling it through the portal with a loud snapping sound. \n\n*page_break\n\nYou sit down shakily. [i]Wow that was too close![/i] Your gecko reappears unharmed, peaking out through the undergrowth. Deciding it was safe to come out, he crawls over to your side. \n\nWait, what's that noise? As you pause to l
