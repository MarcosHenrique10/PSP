sid_him}, wanting to linger between the sheets and ignore the rest of the world just a little longer. \n\n\tLeaving a quick kiss on Sid's forehead, you run out to see what the big deal is. \n\t*page_break \n\n\tIn the living room, the angels are standing at the front window, watching anxiously.\n\n\t\"What is it?\" \n\n\tYou fall in next to Candee and peer out between the blinds. The problem is immediately apparent.\n\n\t\"Oh, no. How long have they been hanging out?\"\n\t*page_break\n\t*goto shitstorm\n\n\t*label thanks_pal\n\t\"Heh. So, thanks again for not flipping out after everything that's happened. You're my best friend and I don't want to lose that. Or you.\"\n\n\tSidney laughs. \"I know exactly what you mean!\"\n\n\t\"Maybe it's because I feel like I've been so close to death so many times this week, but…it made me realize what's important. Sid…I really care about you. I wanted to say that, in case…well, you know.\"\n\n\t\"Aww! I care about you, too, ya big softie!\" $!{sid_he} lightly punches your arm. \"It's been a helluva week, am I right? So, are we good?\"\n\n\t\"Yes,\" you sigh, gratefully. \"We're good. Should we think about dinner?\"\n\n\t\"Yeah, cool. I know those other weirdies don't eat, but I am starving, what do you think about…\" \n\n\tSidney trails off as ${sid_he} walks into the kitchen to scrounge up a meal. You smile to yourself and accompany ${sid_him}.\n\n\t*page_break Later\n\t*goto pre-shitstorm\n\n\t*label nevermind\n\t\"I'm sorry for…well, it's like I was taking advantage. I don't know what I was thinking. I mean, I like being your friend too much to risk…I-I never want to hurt you. Or lose you. I'm so sorry. I made it weird, and if I could take it all back, I would.\"\n\n\tSidney flinches, almost imperceptibly, but smiles. \n\n\t\"Cool. That's fair. B-F-Fs forever.\"\n\n\t\"You're sure you're not mad? Or disappointed, or…?\"\n\n\tSidney makes an exaggerated fanning motion at you. \"Water under the bridge. All this doom and gloom would mess with anyone's emotions. It's been a helluva week, am I right? Consider it forgotten.\"\n\n\t$!{sid_he} raises a fist for you to bump.\n\t*choice\n\t\t#Fist bump.\n\t\t\t*goto bumped_it\n\t\t#Leave Sid hanging.\n\t\t\t*set sid -2\n\t\t\t*set games_gauge -1\n\t\t\t*goto all_air\n\t\n\t*label bumped_it\n\tYou fist bump ${sid_him} back, confident you made the right choice, even if it feels a little more bittersweet than you anticipated. Maybe there is something more to your connection with each other deep down, but, ideally, you don't want to initiate a significant romance while battling a murderous entity that's been joy riding your soul. \n\n\tSidney, and your relationship with ${sid_him}, deserves better.\n\t\n\t*label all_air\n\t*if (games_gauge \u003c= 2)\n\t\t*achieve nofun\n\tAfter an awkward silence, Sidney says, \"Well, we should head back to mission control, make sure things haven't gone haywire in our absence. And while we're at it, I know those other weirdies don't eat, but I am starving, what do you think about…\" \n\n\tSidney trails off as ${sid_he} walks into the kitchen. Realizing your stomach is also growling, you accompany ${sid_him} to scrounge up a meal.\n\n\t*page_break Later\n\t*goto pre-shitstorm\n\n*label thats_sweet\n\n\"Aww!\" $!{sid_he} grins, your arms wrapped loosely around one another. \"It's been a helluva week, am I right?\"\n\n\"That's an understatement,\" you laugh, contentedly. You nestle into ${sid_his} neck for a moment, breathing in slowly. In this moment, you try to ignore the dangers outside and imagine that the entire universe consists of exactly you, Sidney, and this narrow room, here and now.\n\nYour gurgling stomach brings you back to reality. You pull back again and smile sweetly.\n\n\"Hey, are you hungry?\"\n\n\"Yes! I know those other weirdies don't eat, but I am starving. Let's go see what we can dig up.\" \n\nSidney interlocks ${sid_his} fingers in yours and you walk out to the kitchen to scrounge up a meal.\n\nTogether.\n\n*page_break Later\n\n*label pre-shitstorm\n\n\n\"Your comrade seems a little high strung.  Is she always like this?\"\n \nWhispering to Candee, Sidney studies Shelter. She continues to stand guard, crisscrossed by glowing strips of moonlight through the blinds.  You're curled up next to them with ${cat_name}.  The television flashes mutely before you in the dim room.\n\n\"It's just that she's been rooted to that spot, like, all night.  Is she even blinking?  I can't tell.\"\n\n\"Oh!  Shelly's always been well vigilant. She prefers to keep watch whilst she minds the barrier 'round your flat. Helps her concentrate, you know what I mean?\"\n\n\"So, wha—\"\n\n\"A moment, please, Incandescence.\"  \n\nShelter's interruption is gentle but serious.  It's enough to rouse Vex's attention, still idling in the armchair.  \n*page_break\n\nCandee bounces over to the window.  \n\n\"All right?\"\n\nShelter nods wordlessly toward the glass, her eyes locked ahead.  Candee looks every which way through the pane, but doesn't seem to discover anything alarming. \n\nYour curiosity gets the better of you and, setting ${cat_nickname} down, you go peer over Candee's shoulder. Save for a few cars and a generous smattering of litter, the parking lot appears vacant.  As she searches, Dobl-Eu-DeFort-E crawls out from behind Vex, producing a low, guttural growl.\n\n\"Sorry, Shel, I don't…\"  \n\nHer voice trails off as she finally identifies something in the darkness. She is barely audible when she asks, \"Bollocks! How long have they been hanging about?\"\n*page_break\n\n*label shitstorm\nThe opposite end of the property, where the gravel lot ends, is bordered by a dilapidated fence and poorly lit.  There, in the darkness, stand six beings of suspicious size and shape.\n\n\"Not long, as far as I can tell,\" Shelter explains, agitated, \"But I can't be sure. I saw them before I could sense them, which concerns me more than the fact that they're there to begin with.\"\n\nCandee squints. \"And they're all blurry. Flip!  How is this bloody possible?\"\n\nOdd. Although obscured by shadows, they don't look blurry to you.\n\n\"No idea.  They're just standing there, watching the building.  For now.\"\n\nSidney, finally drawn to the conversation, stands on ${sid_his} tiptoes and looks over Candee's head, holding on to \n*if ((relationship=\"false\") or (romance_sid=\"false\"))\n\ther shoulders for balance.  She gently shakes ${sid_him} off, deep in thought.\n*if (romance_sid=\"true\")\n\tyour shoulder for balance. You lightly rest your hand on the small of ${sid_his} back.\n\n\"Seems a tad dodgy. Could they have followed us, d'ya reckon?\"\n\n\"You know I did thorough perimeter checks when we arrived. We were clear. They shouldn't be able to, but they know we're here. I'm sure of it.\"\n\n\"That's because one of them is me,\" Vex says, coolly.  \n*page_break\n\nShelter gives him some room to maneuver without looking away. \"What does that mean?\"\n\nVex plants his claws on the windowsill, pulling himself up just enough to peek out. \n\n\"It means that one of those clowns has my heart and, to top it off, is using it. \n*if (vex >= 17)\n\tThat fuzzy energy field you see around them, that's one of my powers. Was. It allowed me to move among certain beings undetected. \nI can't tell which specific bozo is carrying it yet, but I feel it's presence. Conversely…\" He makes an exaggerated back and forth gesture.\n\nCandee brings her hand to her mouth and looks at all of you. \"That's mental. I've never heard of such a thing! How'd those blokes get ahold of it?\"\n\nVex frowns, his voice dripping with contempt. \"Ever since we learned his weapons were involved, this whole catastrophe stinks of Mac. I should've put the pieces together sooner. He did arrange for my abrupt exile, after all.\"\n\n\"Elder Elysian mentioned Machination's weapons had been deployed and they are the only means of performing a heart removal on divine beings that we know of,\" Shelter says. \"That explains the how, though not the why.\"\n\n\"I thought it was just a personal vendetta against me, but there must be more to it. That slippery bastard never did anything without working an angle. He doesn't seem to be with these goons, but I don't know if that's a good sign.\"\n*page_break\n\nPerhaps realizing that they have been spotted, the mysterious gang moves across the lot. As they snake closer to the security lights affixed to the building, their features are more easily distinguished.\n\nLeading the pack is a massive figure, easily over eight feet tall, clad in the kind of billowing, black robe you've seen cultist stereotypes in horror films wear, at least twice as broad between the shoulders as any single person should be. You can even make out the curves of bulging muscles through the loose fabric. \n\nIts face, which you assume must exist by virtue of six glowing red eyes, is otherwise concealed by the baggy hood.\n\n\"Blimey, he's a stonker!\" Candee apprehensively chews on her neon fingernail.\n*page_break\n\nCreepy Robes McGee, as you internally decide to call it, is flanked on either side by a pair of familiar, one-eyed monsters in pristine suits. Though shorter than their cohort, they're impressively tall, just as you remember them. Machination's infamous weapons…\n\nDirectly behind them are two demons, more human in appearance. \n\nOne, in a leather jacket and pants, wears his bleached blonde hair high and tight, spiked at the top. The other is dressed in a plain white t-shirt and blue jeans, his bald head glinting against the street lamps. His skin seems to have an unusual, metallic sheen to it.\n\nYour chest  \n*if (sid >= 52)\n\tconstricts and you exchange looks of concerned recognition with Sidney. \n\t*if (romance_sid=\"true\") \n\t\t$!{sid_he} reaches over and gives your hand a reassuring, but shaky, squeeze.\n\t*goto blocked\n*else\n\tconstricts.\n*label blocked\n\nBringing up the rear, boldly undisguised, is Trifle.\n*page_break\n\nThey stop about two-thirds of the way through the parking lot, where Shelter's barrier blocks their path. The spiky-haired demon pushes against it experimentally.\n\nShelter purses her lips. \"Aware of us or not, no mere demon, no matter how powerful, can breach my protective shield. I can keep them out until Elder Elysian returns.\"\n\n\"Uh, are you sure about that?\" Sidney points out the window. \n\nThe others rally around Creepy Robes, whose arms are splayed out, resembling a cartoon character that ran straight into a wall. Colossal claws emerge from inside the dangling sleeves. They drag across Shelter's barrier, like nails against a transparent blackboard.\n\nEveryone else in the posse shifts their weight onto the barricade. The surface shimmers and flexes with each painstaking scrape from their cloaked accomplice.\n\nShelter concentrates harder than before. You speculate that angels must not sweat, since she's straining enough break one.\n*page_break\n\nShelter raises her clenched hands higher. The barrier responds by temporarily expanding, bumping against the intruders and making them retreat a few steps.\n\nUndeterred, Creepy Robes regains a footing and continues.  \n\nThey quickly redouble their efforts, the wall bulging inward again, causing Shelter to huff.\n\nAs ${e_name} might say, you feel your faith start to falter. \n*if (romance_sid=\"true\")\n\tYou grip Sidney's hand tighter.\n\n*choice\n\t*selectable_if (bloodthirsty >= 12) #\"We need to do something else! NOW!\"\n\t\tSomething hot and thirsty boils deep inside you when you think of these demonic trespassers getting their way, but Sidney and Vex are still too absorbed by this strange turn of events to feel appropriately psyched by your rallying cry. You look around the room, brainstorming different traps or defensible items you might employ in a pinch. Surely, your guardians must be ready to act.\n\n\t\t\"You angels are with me, aren't you?\"\n\n\t\t*set bloodthirsty +2\n\t\t*goto plan_b\n\t#\"I assume that's not supposed to happen.\"\n\t\tShelter seems tongue-tied. \"We…no.\"\n\n\t\t*goto plan_b\n\t#\"Do, uh…do we have a Plan B?\"\n\t\tSidney shuffles uncomfortably beside you, perhaps hoping someone has another suggestion, as well. \n\n\t\t*set confidence -1\n\t\t*goto plan_b \n\n*label plan_b\nCandee sets her jaw. \"Too right! We'll get it sorted…Shel?\"\n\nStepping into her partner's line of sight, Candee wears an expression of composed determination. Shelter looks past her, forlorn.\n\n\"Right, then. You keep this lot safe. I'll suss out our guests.\" In an aside to you, she whispers, \"If this goes pear shaped, don't tit about. Leg it! Find Elysian, if you can.\"\n\nYou didn't understand every word she just said, but you think you got the gist, so you nod.\n\nStepping back from the window, Candee's hair flickers and combusts. She opens your front door, without bothering to close it, and calmly walks straight ahead. In one fluid move, she swings her legs around and vaults off the handrail with the skill of an Olympian gold medalist.\n\n*if ((relationship=\"false\") or ((romance_sid=\"false\") and (kiss_sid=\"false\")))\n\tSidney gulps, gripping your shirt. \"I think I'm in love!\"\n*choice\n\t#\"I can't look!\"\n\t\t*set confidence -1\n\t\t*goto cringing\n\t#\"We can't miss this!\"\n\t\t*goto looksie\n*label looksie\nClumsily pulling up the blinds, you and Sidney press your foreheads to the windowpane to see what happens next. For once, you're grateful your walls are so thin. Between that and the open door, you won't have to strain much to hear the conversation outside.\n\n*goto candy_girl\n\n*label cringing\nYou bring your hands up to your face, recoiling from the window, but stealing glances. Sidney clumsily pulls up the blinds, pressing ${sid_his} forehead against the glass for a better look. Between the open door and your thin walls, you can hear every noise outside. \n\n*label candy_girl\nWhen Candee walks back into view from underneath the gangway, her hands are blazing as brightly as her head.\n\n\"Oi!  Clear off, ya shirty wankers!  We don't want any trouble from the likes of you.\"\n\nTrifle glides out in front of her posse, arrogant as ever. She strokes the barrier \n*if (women=\"true\")\n\tsensually, \n*if (women=\"false\")\n\tmethodically, \nalmost nuzzling it.\n\n\"Hand over Vex and we will leave peacefully,\" she says, with a homicidal lilt to her genial voice. \"Otherwise, we'll take him AND the 'gifted' primate. By force.\"\n\nCandee laughs so loud and merrily, you hear her as clearly as if she were still standing next to you. \n\n\"Stop taking the piss, you daft arsehole! You and the rest of these yobs are getting sod all.\"\n\nTrifle smiles.\n*page_break\n\nOn cue, Creepy Robes slams both fists, each the size of a wine cask, down onto the barrier, causing it to reverberate. Luminescent cracks spiderweb around an opening in the invisible wall between them, hanging in the air.\n\n\"Impossible!\" Shelter cries out.\n\nCandee's face kindles as she opens her mouth. You hear a thunderclap, then a beam of white, hot energy erupts from her throat, shooting a larger hole through the already weakened barrier. Creepy Robes is blasted back across the lot.\n\nAfter some tense backward skidding, beefy feet peek from beneath the fluttering hems to dig into the gravel. The other demons scatter to either side in its wake. \n\n\"You punk bastards setting off fireworks better not hit my car,\" someone hollers from an adjacent apartment, followed by a slam.\n*page_break\n\nCandee glances back up at your window and makes a curious hand signal over her shoulder. Shelter nods. \n\n\"We're going for broke, then,\" she says.\n\nThe damaged barrier dissipates, with an audible sigh of relief from Shelter. She slumps over a bit as she disengages, but never looks away from the fight.\n\nCandee turns back to Creepy Robes. Beams of light stretch out from her shoulder blades, forming wings. They remind you of the pair ${e_name} had, except Candee's shine with the intensity of high-brightness LEDs. \n\nAgainst the radiance of a miniature sun, the demons cast giant, eerie shadows across the other buildings that lie far beyond the property fences.\n*page_break\n\nComposure regained, Creepy Robes launches itself forward, howling. It swings those humongous claws at Candee and the angel…simply isn't there to catch the blow. \n\nShe swoops inhumanly fast and low, evading the attack entirely. \n\nHer fists are smoldering orbs of pain when she retaliates, striking the large figure in a quick one-two combo, before sliding outside of its range once again. Each strike explodes in a shower of sparks, making Creepy Robes cry out in frustration.\n\n\"Give over, already,\" Candee yells, broiling beneath her clothes.\n*page_break\n\nThe two cyclopes drift forward, in a mist, to surround her. They move almost in unison, suits falling away as they both transform into expanding clouds of grasping, gaseous limbs, reaching across the entire parking area.\n\nCandee tries to fly out of their reach, but the wispy extremities interlock to form a coiled death match cage. She looks trapped. Their vapor must be more solid than it appears. \n\nBeams of light frequently fly through the crossbars of this enclosure, as Candee continues to battle the other demons inside it. You can make out Trifle and Creepy Robes through the gaps, but none of the rest.\n\nSo, you…\n*choice\n\t#…call everyone to action.\n\t\t*set confidence +1\n\t\t*goto action\n\t*selectable_if (bloodthirsty >= 12) #…grab a weapon.\n\t\t*set confidence +1\n\t\t*set bloodthirsty +1\n\t\t*set umbrella \"true\"\n\t\t*goto weapon\n\t#…do nothing and wait for someone to suggest what to do next.\n\t\t*set confidence -1\n\t\t*goto inaction\n*label weapon\nScanning the living room for something quick and easy, the only semi-serviceable item within your reach is an old, retractable umbrella. You pick it up and brandish it dramatically above your head to draw everyone's attention.\n\n*label action\n\"Candee said we need to book it if things go wonky,\" you declare. \"I think now may be that time!\"\n\n*goto in_trouble\n\n*label inaction\nYou're stunned, unable to think of anything encouraging or helpful to contribute.\n\n\"We gotta do something,\" Sidney pleads. \"It isn't safe here anymore!\"\n\n*label in_trouble\n\"Agreed. Prepare to fight your way out,\" Shelter says. \n\nTwo figures sneak upstairs. You watch them lurk just outside \n*if (umbrella=\"false\")\n\tthe window.\n\n*if (umbrella=\"true\")\n\tthe window, clutching your makeshift cudgel as your pulse quickens.\n\n\n\"Hand them over, Feathers,\" the blonde demon sneers. \n\nShelter's demeanor remains placid and undaunted. \"Not a chance, thank you.\"\n\nYou hear a warning creak as he crouches down to leap through your doorway. Shelter calmly lifts a flat palm at him. He slams face-first into an unseen force field, which immediately sends him over the railing and tumbling down to the ground below. \n\n\"Damn,\" Sidney giggles. \"It even made a 'sproinging' noise when he bounced off!\"\n*page_break\n\nThe bald demon, gleaming like polished metal, tries to slide smoothly around the door frame after him. \n\nAs though banging a gavel, Shelter sweeps her hand down through the air in front of her. Almost knocked flat, he catches himself on one knee with his hands raised up, pushing back against an unseen weight. The wooden boards beneath him groan worryingly under pressure. \n\nShelter grunts, lowering her fist down further, but before she can subdue him, the entire length of the walkway gives out. The sound of splintering beams intensifies into a loud crash as it crumbles off the face of the complex and the demon is lost with the debris. \n\n*if (aloof \u003c= 35)\n\tYou really hope your neighbors are okay. \n\t*if (sarcastic >= 63)\n\t\tAnd also that they have no clue you might be found liable for destruction of property.\n*if ((aloof \u003c= 50) and (aloof >= 36))\n\tSurely, your neighbors are okay.\n\t*if (sarcastic >= 63)\n\t\tHopefully, they have no clue you might be found liable for destruction of property.\n*if (aloof >= 51)\n\tSurely, your neighbors have rental insurance. \n\t*if (sarcastic >= 63)\n\t\tHopefully, they have no clue you might be found liable for destruction of property.\n*page_break \"Oh, man.\"\n\n\"Now! Hurry!\"\n\nShelter jumps down, coat fluttering behind her. She deftly avoids the sharp slats piled below. You try to keep up, Sid and Vex at your heels, ${cat_name} cradled in the imp's arms. You \n*if (umbrella=\"false\")\n\tjoin Vex in stomping hard on \n*if (umbrella=\"true\")\n\tuse your umbrella to thump both of \nthe demons buried in the rubble a couple of times each as you pass. Satisfying!\n\n\"Follow me. Stay close,\" Shelter instructs, walking briskly and keeping everyone clustered around her in a tight huddle. You recognize the glossy outline of her barrier as it passes through other objects in the environment, once again encasing your group in a protective dome, though this one is much smaller and more compact.\n\nBehind you, the parking lot remains a swirling nebula, glowing rays periodically cresting from its depths.\n\nYou take three steps into the street before you see a massive shadow loom over you.\n*page_break \n\n*achieve outtahell\nYou look up precisely as Creepy Robes descends, colliding with the shield.\n\nEverything erupts.\n*page_break\n\nYou have fallen before, even been pushed into the deep end of a pool by bullies back in middle school, but you've never been thrown so completely off your feet that it feels like you've hit orbit. \n\nThere's a rush of wind as the world spirals in your vision, sky and earth flipping one over the other, again and again, for what feels like an eternity, before your trajectory peaks and you come crashing down. \n\nThe ground is equally unforgiving, but you don't stop there.\n\nYou somersault across concrete, grass, and dirt until you finally come to a halt against a tree trunk.  \n\n\"Oof!\"\n\nLooking around for a confused moment, you wonder how your apartment moved all way down the block and across the street.\n*page_break\n\nYour head spins for a few seconds more, the horizon slowly listing from side to side as you regain your bearings.\n*if (sex_sid=\"true\")\n\n\tYou're so sore and exhausted, you almost regret the extent of your physical activities earlier this evening. Almost. \n\n\tOkay, not really at all, you admit to yourself, especially considering this may now be the last night of your life. \n*if (romance_sid=\"true\")\n\tYou ardently hope Sidney rolled to safety, too.\n\n*if (vex >=18)\n\tSomeone tries to help you up. \nThat's when you notice Dobl-Eu-DeFort-E flitting about. Like you, it and Vex are grimy and studded with burrs.\n\n*if ((vex_fights=\"true\") and (vex >= 11))\n\t\"You look like shit, demon.\"\n\n\tVex smirks. \"This is, what? Three times I've tried to help save your life? You know, I'm getting damn tired of pulling your ass out of the fire, Monkey.\" \n\t\n\t*if (sarcastic >= 63)\n\t\t\"At least you're not keeping score.\"\n\n*if (vex_fights=\"false\") or (vex \u003c= 10)\n\t\"V-Vex?\" You sputter, winded.\n\n\t\"Someone has to pull your sorry ass out of the fire, Monkey,\" he says. Do you detect a note of amusement?\n*page_break\n\nA rumbling growl diverts your attentions. \n\nCreepy Robes has also recovered and is heading your way from down the road. \n\nLooking even worse for wear, prime swaths of it's cloak are shredded and the hood is off, exposing a slimy, grotesque anatomy wriggling underneath.\n\nThrough tattered fabric, you see an amalgam of many different creatures, writhing and weaving in and out of one another. The head is a mash-up of three warped faces, asymmetrically conjoined, each with a set of glowing red eyes. \n\nIt's grown quadruple the number of clawed arms you noticed previously. These chitinous appendages, sprouting out haphazardly, make it resemble a mobile bouquet of enormous crab legs.\n\n\"That THING is no demon. I don't what know it is. An abomination against every known natural order?\" Vex's voice is low, tinged with disbelief. \"But it's the source. That hideous slab of meat has MY powers!\"\n\n*choice\n\t#\"Sweet crap on a cracker! Well, now what!?\"\n\t\t*goto now_I_shoot\n\t#\"Gross. Come on, we need to find the others.\"\n\t\t*set aloof -1\n\t\t*goto lets_go\n\t#\"Buh…umm…errr…\"\n\t\t*goto thats_it!\n*label now_I_shoot\n\"Now,\" Vex says, his incredulity replaced by defiance, \"I get my damn heart back!\"\n\n*goto shoot_it!\n\n*label lets_go\n\"No,\" Vex says, his incredulity replaced by defiance. \"First, I'm getting my damned heart back!\"\n\n*goto shoot_it!\n\n*label thats_it!\nYou have seen some mind-bogglingly bizarre creatures lately, but this is the icing on the inevitable future therapy cake.\n\n\"That's it!\" Vex shouts, his incredulity replaced by defiance. \"I'm getting my damned heart back!\"\n\n*label shoot_it!\nHe squares off. Dobl-Eu-DeFort-E lands on Vex's shoulder and elongates into some kind of rocket launcher that he hefts up.\n\nThe monstrosity plods ever toward you, each nearing footfall echoing your racing heartbeat. \n*page_break\n\nVex lines up his shot.\n\nBaffling noises, like a whale trying to hock a loogie, emanate from Dobl-Eu-DeFort-E, building up until an oozing green projectile belches out. It smacks into the abomination formerly known as Creepy Robes, splattering across its stomach with a loud hiss and acrid smell.\n\nThe gurgling sound builds again and Vex fires another shot, then another and another in quick succession. In less than a minute, he has propelled a veritable hail of hot, demonic phlegm at the abomination. Each successful hit elicits a cry of pain and contributes to a growing cloud of putrid steam rising from each sizzling blob. \n\nUnfortunately, the creature barely slows down. \n*page_break\n\n\"Um, Vex…\"\n\n\"Shut up, I know!\" He bristles. \"Just stay behind me!\"\n\nDobl-Eu-DeFort-E tapers down to a long stick, ballooning at the top to form a gigantic mallet head.\n\n\"No, leave it! We can get your heart back later! We can't defeat this. Not right now, anyway.\"\n\nAs Vex hesitates, you hear a familiar engine roar, followed by the squeal of tires. \n*page_break Wait for it…\n\nYour rusty car sails through the acid haze, in reverse, at breakneck speed. \n\n[b]SCREEEEEEEeeeee…! CLANG![/b]\n\nIt rams into the abomination, pinning it to the pavement with a ringing, metallic crunch, accompanied by a crinkling jangle as your back window crumbles from the impact.\n\nSidney leans out of the open driver's window to survey the situation, then ducks back inside and shifts gears.\n\nThe chassis groans as ${sid_he} lays on the gas, wheels gouging away at flesh before the car finally gains enough traction to bounce free. The car fishtails dramatically, kicking up gravel and grass in all directions before it spins to a halt on the lawn in front of you. \n\nYou and Vex stare at ${sid_him} with a mix of fear and admiration.\n\t\n\"Come on, mofos! All aboard the crazy train,\" Sidney calls. \n\n*comment TO CAT OR NOT TO CAT\n*choice\n\t#Run to the car.\n\t\t*set aloof +1\n\t\t*set cat_grab \"false\"\n\t\t*goto run_mofos\n\t#Look around.\n\t\t*goto cat_found\n\n*label run_mofos\nWith a glance at Vex—who, you have to admit, looks pretty funny holding a comically large mallet sporting a smiley face—you bolt to the waiting vehicle together, nearly tripping over each other in the effort. You both slide into the back seat and pull the door shut.\n\n\"Welcome aboard, folks,\" Sidney grins, obviously proud of ${sid_him}self. \"Uh, watch out for broken glass.\"\n\n*goto burn_rubber\n\n*label cat_found\nYou swivel quickly to make sure there isn't anything you didn't notice or forget. \n\nA faint meowing catches your ear. \n\n${cat_name}, back arched and looking terrified, hides underneath a nearby bush. She must have darted off when the barrier exploded. Initially overwhelmed by the urge to cuddle her, you hesitate.\n\nOn one hand, you don't want to leave her alone. On the other, you're not certain that she'll be any safer with you. If those demons remain in hot pursuit, you may be able to lead them away and she can make a clean escape to somewhere, or someone, less hazardous to be around.\n\nFilled with guilt, you know you have to make a decision and leave soon…\n\n*choice\n\t#Grab ${cat_name} and run to the car.\n\t\t*set aloof -1\n\t\t*set cat_grab \"true\"\n\t\t*goto grab_cat\n\t#Chase her off and run to the car.\n\t\t*set aloof -1\n\t\t*set cat_grab \"false\"\n\t\t*goto sorry_kitty\n\n*label sorry_kitty\nYou fling your arms out, encouraging her to flee. \n\n\"Go on, ${cat_nickname}, SHOO! Get out of here! I don't want you to get hurt.\"\n\nShe cowers, looking at you with woeful and uncertain eyes, but finally slinks away into the night.\n\nYou choke back a tear and breathe a sigh of optimistic relief at the same time.\n\nWith a glance at Vex—who, you have to admit, looks pretty funny holding a comically large mallet sporting a smiley face—you bolt to the waiting vehicle together. You both slide into the back seat and pull the door shut.\n\n\"Welcome aboard, folks,\" Sidney grins, obviously proud of ${sid_him}self. \"Uh, watch out for broken glass.\"\n*page_break\n*goto burn_rubber\n\n*label grab_cat\n*achieve kitty\n\"C'mere, ${cat_nickname}. I'm sorry for all this, but I'm gonna try to protect you.\"\n\nShe cowers back until you gently coax her to you. Scooping her up, she purrs with gratitude.\n\nWith a glance at Vex—who, you have to admit, looks pretty funny holding a comically large mallet sporting a smiley face—you bolt to the waiting vehicle together. You hustle ${cat_name} into the back seat ahead of you, next to Vex, and pull the door shut.\n\n\"Welcome aboard, folks,\" Sidney grins, obviously proud of ${sid_him}self. \"Uh, watch out for broken glass.\"\n*page_break\n\n*label burn_rubber\nThe pulpy mass of sundered muscle and skin that used to be Creepy Robes peels itself off the asphalt, dripping with plasma and scored with tread burns. \n\nFive remaining eyes zero in on you with a snarl.\n*page_break Ick.\n\nSuddenly, it flattens back to the ground with a disgusting squish. Shelter jogs up behind it, her outstretched arm held stiff, palm down. The creature strains against the force, which Shelter wearily holds, shooting you a desperate look. \n\n\"GO!\" She gestures with her free hand.\n\nSidney slams the pedal to the floor. \n\nThe abomination and angel shrink into the distance.\n*page_break\n\n*if (cat_grab=\"false\")\n\t\"This is insane! I hope they know what they're doing,\" Sidney says. \"Hey, wait. Didn't we have ${cat_nickname} with us at one point?\"\n\n\t*if (vex >= 10)\n\t\tYou exchange sad frowns with Vex.\n\t\n\t\t\"Eh, she must have got away from me after the barrier exploded. Sorry,\" he mutters.\n \n\t*if (vex \u003c= 9)\n\t\tYou frown.\n\n\t\t\"Don't look at me, I tried,\" Vex mutters.\n\n\t\"Oh! Uh…\" Sidney looks at you sympathetically in the rear view mirror as you sniffle. \"I'm sure she'll be okay. Don't worry.\"\n\n\t\"Yeah, she will,\" you try to convince yourself as much as anyone. \"She's a survivor.\"\n\t*page_break\n\nJust when it seems like you're able to catch your breath for the first time since the demons invaded your doorstep, a shuddering plonk from above causes the car to bounce. The vehicle swerves and briefly bottoms out. \n\nA mirthful voice cries out. \"My darling Vex! Leaving without saying goodbye?\" \n\nSomething pierces the roof as easily as if it were made of paper, ripping out an impressive chunk. The improvised solar vent reveals Trifle's delirious face.\n\n\"Come out and play, you cowardly slug,\" she chides.\n\n\"Keep driving,\" Vex commands. \n\nDobl-Eu-DeFort-E slides back into his hand and extends into clawed knuckles. Using it as a kind of crampon, Vex rolls down his window and hoists himself onto what is left of the roof to meet his adversary.\n\n\"How I've missed you,\" Trifle sings. \n*page_break\n\n\"Didn't you always want a sunroof?\" Sidney chuckles. \n*if (sid >= 56)\n\tOnly Sidney could joke and drive effectively at the same time.\n\n*if (sid \u003c= 55)\n\t$!{sid_he} better be able to joke and drive effectively at the same time.\n\n\n\"I think we already lost the muffler a mile back. My poor car is never going to make it through this.\"\n\n\"Poor US, you mean. WE'LL be lucky to make it through this!\" \n\n$!{sid_he} does ${sid_his} best to keep the car from skidding out of control in the dark as ${sid_he} burns rubber around the outskirts of town.\n\nThere must be more you can do to help.\n*page_break\n\n\"Hold it steady,\" you say, searching the car.\n\n\"Sure, piece of cake. Those stunt drivers make this look way harder than it is,\" ${sid_he} responds with an eye roll, making a quick U-turn and screeching down an alleyway. \n\n[b]THUD.[/b]\n\nSomething falls and slides across the roof. Vex drops into view next to the rear passenger window, clinging on for dear life. Another set of claws punctures the roof right above your head as Trifle digs in to stabilize herself, to your chagrin.\n\n\"Ugh! There's got to be SOMETHING in here we can hit her with!\"\n\n\"How about this?\" Sidney holds up\n*if (major=\"english lit\")\n\ta hefty hardcover.\n\n*if (major=\"art\")\n\tsomething smooth and hard, about a foot long, wrapped in an old cloth.\n\n*if ((major=\"music\") or (major=\"astronomy\"))\n\ta small, black carrying case.\n\n*if (major=\"fashion\")\n\ta slim, plastic pitcher with a vented spout.\n\n*if (major=\"architecture\")\n\ta polished hardwood ruler with an engraved brass head.\t\n\n*if (major=\"engineer\")\n\ta small scale robotic arm.\n\n\n\"What!? I can't use that! It's my \n*if (major=\"english lit\")\n\tfavorite book! I just got that back after loaning it out a year ago!\"\n\n*if (major=\"art\")\n\tbest statuette! I've been meaning to bring that inside…\"\n\n*if (major=\"astronomy\")\n\tfavorite travel scope! Those aren't cheap!\"\n\n*if (major=\"music\")\n\tbest mini amp! It wasn't cheap!\"\n\n*if (major=\"fashion\")\n\tfavorite mini steamer! It gets out the worst creases!\"\n\n*if (major=\"architecture\")\n\tvintage T square! It's too pretty to die!\"\n\n*if (major=\"engineer\")\n\tremote-controlled friend, Mr. Grabby!\"\n\n\n\"Hate to be that person, but it seems like beggars can't be choosers, \n*if ((romance_sid=\"true\") and (sid_gender=\"male\"))\n\tbaby.\" \n*if ((romance_sid=\"true\") and (sid_gender=\"female\"))\n\thoney.\" \n*if ((romance_sid=\"false\") and (gender=\"male\"))\n\tdude.\" \n*if ((romance_sid=\"false\") and (gender=\"female\"))\n\tchica.\"\n\n*choice\n\t#\"Last resort ONLY! Keep looking!\"\n\t\t*set keep_stuff \"true\"\n\t\t*goto no_dammit\n\t#\"Ugh, fine! Break my heart, then.\"\n\t\t*set keep_stuff \"false\"\n\t\t*goto this_sucks\n\t*if (umbrella=\"true\") #\"Wait! I've got an umbrella!\"\n\t\t*set keep_stuff \"true\"\n\t\t*goto umbrella\n \n*label no_dammit\n\"$!{name}, the only other thing up here is a half empty drink in the cup holder!\"\n\n\"Better than tossing out what few possessi—uh, I mean, things, I have left. Pass it back!\"\n\nSnatching it from Sid, you prop yourself out of the window, holding on to a head rest for support. \n\nVex swings back onto the roof, dodging Trifle's claws. She cackles gleefully as she tries to catch him with another slash. \n\nYou wind back and whip that can at Trifle as hard as you can. It's a direct hit to her face, dark liquid splattering all over. \n\n*goto gotcha\n\n*label umbrella\nIt's at this precise moment you realize that you're still gripping your old umbrella in one hand, and have been this whole time. Derp.\n\n\"Well, better than nothing,\" you muse out loud.\n\nYou prop yourself out of the window, trying to swing it at the demonic assailant. When your flailing fails to land anywhere close to her, you thumb the release button on the umbrella handle to extend the pole. \n\nVex swings back onto the roof, dodging Trifle's claws. She cackles gleefully as she tries to catch him with another slash.\n\nHolding on to the head rest, you bash at her until the wrapping comes loose. \n\n\"YEAH! Take THAT!\"\n\nThe canopy bursts open from the force of your blows, startling Trifle, but the resulting increase in air resistance pulls it from your grasp.\n\nYou curse helplessly as your umbrella swoops away in an updraft, getting briefly tangled in Trifle's hair, and then buckles down onto the street behind you. As she struggles to compose herself, you realize it still served as the distraction Vex needed.\n\n*goto gotcha\n\n*label this_sucks\n*achieve precious\n\"I'm sorry, $!{name}. If I had anything else…\"\n\nYou wince, knowing Sidney is right. Time to suck it up and make some tough sacrifices if you want to get out of this unscathed. It's replaceable.\n\nVex swings back onto the roof, dodging Trifle's claws. She cackles gleefully as she tries to catch him with another slash.\n\nPropping yourself out the window, you send what may be one of your last intact, treasured pieces of property off with a farewell kiss and aim for Trifle's head. \n\nDirect hit! \n\nIt's the distraction that Vex needs.\n\n*label gotcha \n\nHe sweeps low, thwacking Trifle in the leg while her hands are raised to her face. She loses her footing and skids down to the trunk on her stomach, catching herself at the last second.\n*page_break\n\n*comment MEOW MEOW MEOW MEOW\n*if (cat_grab=\"true\")\n\tYou and Vex scramble to get a grip on the car as it heaves to one side. Trifle shrieks with rage. \n\n\tThat's when ${cat_name} springs out of the broken back window and pounces, clawing Trifle across the eyes just as Sidney rounds another turn. \t\n\n\t\"$!!{cat_nickname}! NO!\" \n\t\n\tYou try to pull her in, but she and Trifle fall off the back of the car together. \n \n\tTrifle hits the pavement and rolls. Though they quickly fall behind, you are relived to see a feline form leap safely away before Trifle's body crumples into a parked car, denting the side of it. \n\n\tSidney pulls to the side and slams on the breaks as Vex climbs back in, throwing the car into park.\n\n\t\"${cat_nickname} just jumped out like it was nothing,\" ${sid_he} exclaims. \"That cat is a damned hero! Is she okay!?\"\n\n\t\"I think so, but we need to go back and get her!\"\n\n\t\"Monkey, I don't think that's such a good idea…\" Vex trails off. \n\n\tA huge, dark cloud swirls down the street, on a direct path to intercept you. Floating within are two chilling, white eyes.\n\n\tBefore Sidney can get the car moving, it's on top of you. Everyone braces for the impact, crouching down and covering their heads like an old school tornado drill.\t\n\t*page_break\n\n\tNo noise. No movement. After what seems like forever (but is probably ten seconds, tops), you venture a peek. It seems to have passed right by.\n\n\t\"What the…?\"\n\n\tA bloodcurdling scream draws everyone's attention behind the car. Under the lurid spotlight cast by a street lamp, vaporous limbs have reappeared and are dragging Trifle down into the earth. Thankfully, ${cat_name} slinks under a van in time to avoid them. After a brief scuffle, the demon and twin weapons disappear. \n\n\tIt feels eerily final.\n\t*page_break\n\n\tYou catch one, last glimpse of ${cat_name} running away from the chaos, along the storm drains. You mentally urge her to keep going. There must be more secure places for her to be right now.\n\n\t\"I-I'm so sorry. It'll be okay,\" Sidney stammers at your reflection in the rear view mirror, hearing you sniffle. \n\n\t\"Yeah,\" you try to convince yourself as much as anyone, \"I'm sure she'll be fine. She's a survivor.\"\n\n\t*page_break\n\t*goto cops\n\n*comment NO KITTY FOR YOU\n*if (cat_grab=\"false\")\n\tYou and Vex scramble to get a grip on the car as it heaves to the side. Trifle shrieks with rage. Vex, clinging to the roof with one hand, strikes out with the other as she lifts her head, clawing her across the eyes just as Sidney rounds another turn. \n\n\tTrifle tumbles back. She hits the pavement and rolls, crumpling into a parked car hard enough to dent it.\n\n\tSidney pulls over and slows to a stop, so Vex can safely climb back in. \n\n\t\"Woo hoo! Nice job,\" ${sid_he} enthuses, putting the car in park to offer high fives all around. \"Um, should we go back and help Candee and Shelter?\" \n\t\n\t\"I don't think that's such a good idea…\" Vex trails off.\n\t\n\tYou look around. A huge, dark cloud swirls down the street, on a direct path to intercept you. Floating within are two chilling, white eyes.\n\n\tBefore Sidney can get the car moving, it's on top of you. Everyone braces for the impact, crouching down and covering their heads like an old school tornado drill.\n\t*page_break\n\t\n\tNo noise. No movement. After what seems like forever (but is probably ten seconds, tops), you venture a peek. It seems to have passed right by.\n\n\t\"What the…?\"\n\n\tA bloodcurdling scream draws everyone's attention back through the busted rear window. Under the lurid spotlight cast by a street lamp, vaporous limbs have reappeared and are dragging Trifle down into the earth. After a brief scuffle, the demon and twin weapons disappear. \n\n\tIt feels eerily final.\n\t*page_break\n\n*label cops\n*set anonymous -5\n\"Huh. Well, Trifle may be down for the count, but we should still put some mileage between us and the rest of the horde. Never know if more might show up,\" Vex says.\n\nYou hear sirens getting closer. Three police cruisers, traveling in the direction of your complex, wail past with lights flashing. Considering the sorry state of your vehicle, Sidney tries to play it casual as they race by. \n\n\"Someone must've called the cops, after all.\"\n\n*if (sarcastic >= 63)\n\t\"Took them long enough.\" \nYou laugh nervously. \"Not that we were planning on going home any time soon, I guess. Ideas?\"\n\n*if (vex \u003c= 7)\n\tVex's eyes quickly dart to you, then back to the road ahead. \n\n\t\"Yes. Head to WallGredes.\"\n*if ((vex \u003c= 21) and (vex >= 8))\n\tVex glances at you and smiles. \n\n\t\"Sure. Head to WallGredes.\"\n*if (vex >= 22)\n\tVex glances at you. \"I have one. A good one, if you'll trust me.\"\n\n\tYou arch a brow, but nod.\n\n\tHe smiles. \"Driver? Take us to WallGredes!\"\n*page_break\n\nWhat remains of your car barely putters into the parking lot before it dies as dawn breaks. \n\nYou grumble as you salvage what you can from the trunk, stuffing it all into a dusty book bag that was buried deep within it. The mounting number of losses you've taken today has put you in a sour mood. Sure, this car was always a piece of shit, but it was YOUR piece. \n\nYou shoulder the backpack and still lock up, despite the large openings in the roof and back window. Everything else you thought you were or had up until now seems to be falling away, out of your control. \n*if (confidence \u003c= 24)\n\tIt's a terrifying prospect. \nYou head inside.\n\nThe entrance chimes pleasantly as it slides open. \n*page_break\n\nThe store looks exactly as it did, prior to the demonic onslaught. \n\nShelving restored, the products clean and put away. The entire building's infrastructure has been seamlessly repaired. Had you not been present for the decimation of the interior mere days ago, you'd never know anything had been wrong.\n\nSidney whistles as ${sid_he} eyes the spotless layout.\n\n\"Yeah, unbelievable,\" you agree, looking around the aisles in awe. \n\nVex seems to know exactly where he is going, though you wonder why you're here. Even if Trifle is out of commission for good this time, someone may think to look for you at the first place they tangled. That's when it occurs to you that you never did figure out why demons were scrapping inside a WallGredes to begin with.\n\nYou all cut through the middle aisle and walk toward the employee area. \n\n\"Our escape portal is in the back,\" he says. \n\n*if (vex >= 12)\n\t\"Did you say 'portal?'\"\n\n*if (vex \u003c= 11)\n\t\"You have got to be kidding me!\"\n\nJust as Vex reaches for the handle, the storeroom door swings open and you find yourselves facing ${d_name}.\n*page_break\n\nThe clerk seems unconcerned by this trespass.\n\n\"Ah, ${d_name},\" Vex says, \"Nice work. Almost looks less shoddy than it did before. Way to polish that turd! Now, if you'll excuse us, we've got business through there.\"\n\n\"Whatever,\" ${d_name} says, folding ${d_his} arms across ${d_his} chest. $!{d_he} leans out to block you with ${d_his} shoulder as you walk by. \n*if ((name=\"Sidney\") or (name=\"Sid\"))\n\t\"Gotta talk to you. WITHOUT the other Sid.\"\n\t*goto shrug\n*else\n\t\"Gotta talk to you. Alone.\"\n\t*goto shrug\n\n*label shrug\n\nSidney shrugs grudgingly and follows Vex into the stockroom.\n\n*choice\n\t#\"Huh? Uh, sure.\"\n\t\t*set holden +1\n\t\t*set hester +1\n\t\t*goto sure \n\t#\"I dunno, we're kinda busy.\"\n\t\t*set holden -1\n\t\t*set hester -1\n\t\t*goto grave_consequences\n\n*label grave_consequences\n\"Too busy for a truth bomb about your demon friend? Whatever.\"\n\nSeems oddly specific and catty coming from the store clerk, but the attitude does grab your attention.\n*choice\n\t#\"Too busy and too tired to care, yes.\"\n\t\t*set holden -1\n\t\t*set hester -1\n\t\t*goto take_this\n\t#\"When you put it that way, you have my attention.\"\n\t\t*set holden +1\n\t\t*set hester +1\n\t\t*goto for_realsies\n\n*label sure\nConsidering that ${d_name} typically speaks to you in one-word sentences, you figure what ${d_he} has to say might be worth a momentary delay. $!{d_he} motions for you to follow ${d_him} back out onto the sales floor.\n\n\"Sooooo…what's up? Heh, fixed this fast, didn't they?\" \n\n\"Yeah, Dad knows some people,\" ${d_name} says. This is officially the longest conversation you've ever had with ${d_him}. \"Look, \n*if ((holden \u003c= 8) or (hester \u003c= 8)) and (d_rescue=\"false\")\n\tI know you don't usually like talking to me, so I'll make this quick. \n*if (d_rescue=\"true\")\n\tI know you tried to look out for me when things went berserk in here, so it feels like I kinda owe you one. \n$!{name}, you've really stepped in it. Immortals are no joke.\"\n\nYou blink, trying to reconcile the memories of your previous acquaintance with ${d_name} with what is coming out of ${d_his} mouth. \n*if (d_rescue=\"true\")\n\tThen again, Vex did say they had met before, so maybe you shouldn't be shocked.\n\n\"What do you know about it?\" You sound more suspicious than intended. \"I mean, you weren't exactly freaking out during the fight…\"\n\n${d_name} groans, as if reciting a tiresome chore. \"My father is part of some super secret organization that monitors their activity or whatever. I'm stuck here working for him at this transdimensional intersection. We're not supposed to discuss it with anyone, but screw that,\" ${d_he} adds, irritably.\n\n*choice\n\t#\"You have my attention.\"\n\t\t*set sarcastic -1\n\t\t*set holden +2\n\t\t*set hester +2\n\t\t*goto for_realsies\n\t#\"That's nice, Agent Mulder, but I gotta go…\"\n\t\t*set sarcastic +2\n\t\t*set aloof +2\n\t\t*set holden -3\n\t\t*set hester -3\n\t\t*goto take_this\n\t#\"Why are you telling me this? What can I do?\"\n\t\t*set holden +1\n\t\t*set hester +1\n\t\t*goto not_crazy\n\n*label not_crazy\n\"Because if this stuff is so important, then everyone should know. That fear of mass panic is stupid, people should just know the truth and deal with it. Do you know how often something major happens with them in a human years? Or the last time someone used the portal before this week? It makes our whole family seem like a bunch of conspiracy nuts.\"\n\n\"Uh, sorry? Was that what you had to tell me?\"\n\n*label for_realsies\n$!{d_his} apathetic expression belies the seriousness of ${d_his} words. \n\n\"Something big is in the works. Like, a revolution or whatever. And that red guy is in the middle. I don't know what you think you're doing with him, but it'll probably get you killed. Ya know, if it doesn't just destroy the whole world or whatever.\"\n\n*choice\n\t#\"Dammit. Really?\" Could things possibly get any worse?\n\t\t*goto take_this\n\t#\"Well, duh.\" $!{d_he} should tell you something you don't know.\n\t\t*set sarcastic +2\n\t\t*goto noshitsherlock\n\t\n*label noshitsherlock\n\"I hate to say it, but a LOT has happened in the past couple days and I kinda figured that much out already.\"\n\n*label take_this\n\"Here,\" ${d_name} shoves a strip of receipt tape into your hand, \"Take my number. \n*if ((hester >= 9) or (holden >= 9))\n\tIf you need something or get into trouble or whatever, give me a call and I'll see what I can get out of my dad. Maybe I won't have wasted my precious youth on nothing.\"\n\n*if ((holden \u003c= 8) or (hester \u003c= 8))\n\tI guess if you don't wind up dead and need some advice, call it. Or don't. Whatever.\"\n\nYou shove it in your pocket. \"Okay, then. Um, thanks.\"\n\n$!{d_he} walks away, then turns back, poker-faced. \"Beware the bespectacled one.\"\n\n*fake_choice\n\t#\"Wait, who?\" $!{d_he} couldn't mean Sidney, right? Or Shelter?\n\t#\"What does that even mean?\" How cryptic. And alliterative. \n\t#\"Sure, I will…weirdo.\" As ${d_name} would say, whatever!\n\t\t*set aloof +1\n\n${d_name} says nothing more and leaves you by yourself. You shake your head and enter the storeroom, where Vex and Sidney are waiting. \n\nThey're standing in front of a concrete wall with what looks like a charcoal oval approximately your height drawn on it. Vex studies it carefully, muttering calculations.\n\n*if (sid >= 49)\n\tSidney pretends to whine. \"Aww, ${d_name}'s never made any hush-hush buddy talk at me. Let me guess: ${d_he}'s always been obsessed with you and wanted some naughty pictures for ${d_his} shrine.\"\n\n\tYou massage your temples. \"You wouldn't believe me if I told you.\"\n\n\t$!{sid_he} looks at you over the top of ${sid_his} sunglasses. \n\n\t\"Geez, I was joking, but it must have been serious. What is it?\"\n\n\t*choice\n\t\t#Lie. Vex might be listening. ${d_name} did want to talk only to you privately, after all.\n\t\t\t*set sid -2\n\t\t\t*set lie_sid \"true\"\n\t\t\t*goto lieslieslies\n\t\t#Tell the truth. Who cares? Didn't ${d_name} say ${d_he} was tired of secrets?\n\t\t\t*set sid +1\n\t\t\t*set lie_sid \"false\"\n\t\t\t*goto truthiness\n\n\t*label truthiness\n\tYou pull Sidney behind a stack of boxes and speak as quietly as possible. \n\n\t\"${d_name} said ${d_his} family's part of some underground organization that spies on the supernatural. $!{d_he}'s stuck with this job so ${d_he} can guard the portal.\"\n\n\t\"Ahhh, you're messing with me! I almost bought it, too.\" Sidney laughs uproariously, but when you don't join in, it dies on ${sid_his} lips, ${sid_his} face falling into a stony frown. \"Oh. Wow.\"\n\n\t*goto done_chattering\n\n\t*label lieslieslies\n\t\"Oh, er…just trying to get me to pay for some of the damage to the store,\" you say as casually as you can, watching Vex. \n\n\t\"Haha, really? It wasn't your fault! That's what insurance is for. Besides, everything looks fine now, anyway.\"\n\n\t*label done_chattering\n\t\"If you monkeys are done chattering, we've got a trip to take.\" \n\nVex holds Dobl-Eu-DeFort-E in his hand, now in the form of a remote device, complete with blinking white lights where its eyes used to be, tuning levers in place of wings, and rows of tiny teeth for buttons. He adjusts the controls and, with a zap that gives you goosebumps, the oval outline opens into a glowing, purple vortex.\n\nYou stare into a gateway that looks more science fiction than reality, never mind like something that should be in the back of a convenience store. It makes you wonder only one thing:\n\n*choice\n\t#\"Where does this go?\"\n\t\t*goto smarterer\n\t#\"Instead of messing with this, shouldn't we find ${e_name}?\" \n\t\t*goto no_way\n\t#\"THIS is a real magic portal!? And they all laughed at my sci-fi and fantasy obsession!\"\n\t\t*goto obsession\n\n*label obsession\n\"Nyah, you're still a nerd.\" Sidney grins. \"Just please tell me it leads to the Bahamas!\"\n\n*goto anywhere\n\n*label no_way\n\"Nope. First of all, I don't know where ${e_he}'s holed up with ${e_his} compatriots, most of whom would still be none too pleased to see us. Second, if ${e_he}'s in Heaven, I can't get in, anyway. Third, I have a much better plan. One that will also put serious space between us and those other nitwits.\"\n\n\"Just how much 'space' are we talking? Where are we going?\"\n\n*label smarterer\n*if (sid >= 41)\n\tSidney crosses ${sid_his} fingers. \"Please say it leads to the Bahamas!\" \n\n*label anywhere\n*if (vex >= 12)\n\t\"Technically, it goes anywhere we want. Universal doorways are rare and this one isn't well known.\" Vex shoots you an I'm-so-clever smile. \"We're going get some answers and gain the advantage. \n\t*if (vex >= 22)\n\t\t*achieve evilknow \n\tYou were right, earlier. About getting my heart. We'll need more help. \n\tSo, you in?\"\n\n\t\"I don't know,\" you say, considering this proposition uneasily. You're still worried about something. \"What about…\"\n\t*choice\n\t\t#\"…Shelter and Candee?\"\n\t\t\t*goto angel_stuff\n\t\t#\"…my hidden passenger?\"\n\t\t\t*goto plus_one\n\t\t#\"…the rest of this town?\"\n\t\t\t*goto hometown\n\n\t*label hometown\n\t\"Shelter and Candee are still here. Believe me, those doves can take care of themselves. They'll know what to do and everything will get cleaned up, especially once Elysian gets back. It's probably better if we're not around to cause more collateral damage.\"\n\n\t*goto decisions\n\n\t*label angel_stuff\n\t\"Those doves can take care of themselves. I doubt we've seen the last of them, even if they do have their hands full at the moment. And Elysian tracked me down once already, remember?\"\n\n\t*goto decisions\n\n\t*label plus_one\n\t\"You help me, maybe I'll be able to help you, too. At the very least, you'll be safe from those other demons until the doves catch up with us again, which I'm sure they will.\"\n\n\t\"You think?\"\n\n\tHe shrugs. \"Only one good way to find out.\"\n\n\t*label decisions\n\tWhile Vex continues to fiddle with Dobl-Eu-DeFort-E, the profound suckitude of your current situation settles over you. \n\n*if (vex \u003c= 11)\n\tVex shoots you an I'm-smarter-than-you smirk and doesn't answer. As he fiddles with the controls on Dobl-Eu-DeFort-E, the profound suckitude of your current circumstances settles over you. \n\nAs far as you can tell, you have only the clothes on your back and whatever you're carrying. You're also stranded, unemployed, and either homeless or renting the ruins of a demon-infested apartment. \n\nAnd yet, before you lies opportunity. Granted, it probably involves more danger than you can imagine, but maybe you could use a change of scenery. You wonder at the interesting possibilities.\n*if (confidence >= 30)\n\tThe unknown is intimidating, but it's strangely liberating to have nothing material left to lose. \n*if ((romance_sid=\"true\") or (sid >= 59))\n\n\tYou glance at Sidney, who is watching Vex with anticipation. You've managed to hold on to what's important, at least.\n*if (confidence >= 26)\n\tYou feel more content and self-assured than you have in a long, long time. \n\n\tYou think you might be able to handle this.\n\n*if (confidence \u003c= 25)\n\tTrying to ignore the queasy feeling churning upward from your intestines, you steel yourself.\n\n*choice\n\t#You can definitely do this.\n\t\t*set confidence +1\n\t\t*goto gone\n\t#Oh, criminy, can you do this?\n\t\t*goto gone\n\t#There is no way in Hell you can do this!\n\t\t*set confidence -3\n\t\t*goto gone\n\n*label gone\n*if ((sid >= 70) or (romance_sid=\"true\"))\n\t*set sid_follows \"true\"\n\t*if (confidence >= 26)\n\t\tSidney nudges you encouragingly.\n\n\t\t\"Listen, $!{name}, you were so sad and lost when you had to drop out. Then, yesterday and today, you've been almost fearless and really stood up for yourself, no matter how bonkers things got. \n\t*if (confidence \u003c= 25)\n\t\tSidney notices the inner turmoil reflected in your furrowed brow. $!{sid_he} nudges you.\n\n\t\t\"Listen, $!{name}. Not to sound mean, but you've seemed lost since you had to drop out. Then, yesterday and today, you somehow found the strength to keep going, no matter how bonkers things got. \n\tAnd you really stepped up to help shake Trifle and her mutants back there!  \n\t*if ((childhood=\"false\") and (confidence >= 26))\n\t\tI don't think I've ever seen you act so confident before. \n\t*if ((childhood=\"true\") and (confidence >= 26))\n\t\tThat confidence…it's a side of you I haven't seen in a long time. \n\t*if (romance_sid=\"true\")\n\t\tYou even worked up the nerve to share your feelings for me! I wondered for so long…well, anyway, I couldn't be happier about that. \n\t*if ((childhood=\"false\") and (confidence \u003c= 25))\n\t\tNo point in slowing down now, right? \n\t*if ((childhood=\"true\") and (confidence \u003c= 25))\n\t\tDo you know how excited little $!{name} and Sid would be to see all the amazing things we've done? \n\tThis week has been scary, but awesome!\"\n\n\t*if ((apologize=\"false\") and (romance_sid=\"true\"))\n\t\tYou run a finger along ${sid_his} cheek. \"I should have said something this morning when I had the chance, but I'm sorry if I've been cranky lately. I can't tell you how much I appreciate your support.\"\n\n\t\t$!{sid_he} smiles and takes both your hands in \n\t\t*if (sid_gender=\"male\")\n\t\t\this.\n\t\t*if (sid_gender=\"female\")\n\t\t\thers.\n\n\t*if (apologize=\"true\")\n\t\tWhen you don't know how to respond, \n\t\t*if (romance_sid=\"true\")\n\t\t\t${sid_he} pulls you closer, holding both your hands in \n\t\t\t*if (sid_gender=\"male\")\n\t\t\t\this.\n\t\t\t*if (sid_gender=\"female\")\n\t\t\t\thers.\n\t\t*if (romance_sid=\"false\")\n\t\t\t${sid_he} laughs and claps you on the shoulder encouragingly.\n \n\t\"So, are you ready for the next big adventure?\"\n\n\tYou can't help but admire how ${sid_he} always takes everything in stride. \"You're cool with this? Running away?\"\n\n\t\"Seems to me this town might actually be safer if we get out for a bit. We've kinda become disaster magnets! Maybe we can bring back reinforcements.\"\n\n\t*if (romance_sid=\"true\")\n\t\t\n\t\t\"Right. Good point. Um…kiss for good luck?\"\n\n\t\t\"Absolutely!\" \n\n\t\tSidney leans in. You gently cup ${sid_his} face in your hands and savor the moment.\n\t\t*page_break\n\n\tVex forcefully clears his throat. \n\n\t*if (vex >= 10)\n\t\t\"All right, monkeys, let's get this party started before \n\t\t*if (romance_sid=\"true\")\n\t\t\tI'm too nauseated to go on. \n\t\t*if (romance_sid=\"false\")\n\t\t\twe lose any more time. \n\t\tFollow me!\"\n\n\t*if (vex \u003c= 9)\n\t\t*if (romance_sid=\"true\")\n\t\t\t\"Are you stupid monkeys going to stand around playing kissy face forever? Let's go!\"\n\n\t\t*if (romance_sid=\"false\")\n\t\t\t\"Are you coming or not? Let's go.\"\n\n\tThe demon hops fearlessly through the portal. Its bright surface scintillates with his passage.\n\n\t\"After you.\" You gesture ahead of Sidney. \n\n\t\"See you on the other side!\" \n\n\t*if (romance_sid=\"true\")\n\t\tSidney squeezes your hand one last time, dancing in place the way ${sid_he} does when ${sid_he}'s anxious, but excited. It's so cute. \n\t$!{sid_he} backs up, waggles ${sid_his} eyebrows, takes a running leap into the wall and disappears.\n\t*page_break\n\n\tYou take a last, wistful look around, mentally bidding adieu to your old routine and life as you know it.\n \n\t*goto go_forth\n\n*if (sid \u003c= 38)\n\t*set sid_follows \"false\"\n\t*achieve bffnot\n\tSidney sticks out ${sid_his} hand to shake.\n\n\t\"Well, I guess this is goodbye. For now, anyway.\"\n\n\t\"Sid, you…you're n-not coming?\"\n\n\t$!{sid_he} exhales and has a hard time maintaining eye contact. \n\n\t\"I told Vex while you were having a private chitchat with ${d_name}. ${name}, I gave it a lot of thought and it seems like you don't want me around for this. So, when you get back from these wacky hijinks and you need a friend, look me up. I will have your back. But if you prefer to go this one alone, I should let you. This is your journey to take.\"\n\n\tYou look down at your feet, \n\t*if ((bloodthirsty >= 12) and (aloof >= 51))\n\t\tfrustrated with yourself and the world. \n\t\t*goto push_back\n\t*if ((bloodthirsty \u003c= 9) and (aloof \u003c= 49))\n\t\tfilled with remorse. \n\t\t*goto push_back\n\t*else\n\t\tnot knowing what to say. \n\t*label push_back\n\tYou pushed ${sid_him} too far away and you know it. Your best friend. \n\n\t\"How are you so cool with this? And with me just running away?\"\n\n\t\"Seems to me like you and this town might actually be safer for it. You've kinda become a disaster magnet.\" Sidney takes a deep breath. \"It hurts, but I get it. Besides, someone should get the old car towed and handle our landlord, right? Be around when ${e_name} gets back?\"\n\n\t*choice\n\t\t*selectable_if (aloof >= 50) #Hug ${sid_him} and leave.\n\t\t\t*set sid +4\n\t\t\t*goto huggies\n\t\t#Say farewell and leave.\n\t\t\t*goto bye_bye\n\n\t*label huggies\n\tOn impulse, you step up and catch Sidney in an embrace ${sid_he} wasn't expecting, but that ${sid_he} returns twice as tight.\n\n\t\"I'm gonna miss you, jerkface,\" ${sid_he} chokes. \"Be careful or I will kick your ass.\"\n\n\tYou pull away, reluctantly. At least ${sid_his} sunglasses make it easier to pretend you can't see the tears welling behind them.\n\n\t*label bye_bye\n\t\"Thanks for understanding, I guess. Catch you later.\"\n\n\tVex clasps his hands together, indicating his readiness to depart. \t\n\t*if (vex >= 10)\n\t\t\"All right, Monkey, let's get this party started! Follow me.\"\n\n\t*if (vex \u003c= 9)\n\t\t\"Hey, Monkey! Are you coming or not? Let's go.\" \n\n\tHe hops confidently at the wall and through the portal. Its bright surface scintillates with his passage. \n\n\tThis is it.\n\t*page_break\n\n\tYou turn away and Sidney quickly squeezes your shoulder one last time.\n\n\t\"Good luck. I mean it. I hope you find what you need to make everything okay.\"\n\n\tYou nod, looking down again.\n \n\t*goto go_forth\n\n*else\n\t*set sid_follows \"true\"\n\tSidney notices the conflicting emotions knotted in your furrowed brow and nudges you.\n\n\t\"Ready for the next, big adventure, buddy? \n\t*if (childhood=\"true\")\n\t\tJust another field trip or vacation together. Like old times! \n\tWe got this, no worries.\"\n\n\t\"So, you're cool with all this? Just running away?\"\n\n\t\"Think of it as regrouping. Seems to me this town might actually be safer if we get out. We've kinda become disaster magnets. Maybe we can bring back reinforcements!\"\n\n\tYou shrug, figuring you're too far down the rabbit hole to turn back anyway. \n\n\tVex claps his hands together, indicating his readiness to depart. \n\t*if (vex >= 10)\n\t\t\"All right, monkeys, let's get this party started! Follow me.\"\n\n\t*if (vex \u003c= 9)\n\t\t\"Well, monkeys, are you coming or not? Let's go!\"\n\n\tThe demon hops confidently through the portal. Its bright surface scintillates with his passage.\n\t\n\t*if (confidence \u003c= 28)\n\t\t\"Guess we're actually doing this. After you.\" You smile and gesture ahead of Sidney. \n \n\t*if (confidence >= 29)\n\t\t\"We're doing this! I was nervous at first, but now I'm stoked. After you.\" You gamely gesture ahead of Sidney.\n\t\n\t\"See you on the other side!\" \n\t\n\t$!{sid_he} backs up, waggles ${sid_his} eyebrows, takes a running leap into the wall and disappears. \n\t*page_break\n\n\t*if (confidence >= 26)\n\t\tYou take a last, wistful look around,  \n\t*if (confidence \u003c= 25)\n\t\tYou swallow the heavy lump forming in your throat, \n\tmentally bidding adieu to your old routine and life as you know it. \n\n*label go_forth\nThen, you take a deep breath and step into the light.\n*if (relationship=\"false\")\n\t*achieve lonewolf\n\n*line_break\n\n*line_break\n\n*page_break End of Chapter Six\n", "choicescript_description": "Love a good “demon meets human, demon uses human, demon unlocks apocalyptic force within human” story?\n\nHelp uncover the mysterious plot that draws an eclectic group of otherworldly beings together! Because a lousy delivery job, an unemployed roommate, and delayed graduation aren't stressful enough without adding possession or an epic battle between the forces of good and evil to the list.\n\n[i]So, You're Possessed![/i] is a 50,000 word contemporary fantasy novel by Tony R. Smith and Beth Townsend, where your choices impact how the tale unfolds. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\nWill you nurture friendships or fight your demons alone? Should you keep your dark side contained? Can you unlock all 26 achievements?\n\nChoose carefully! It's going to take a little mortal ingenuity, divine intervention, and plain dumb luck to navigate your soul to safety in this first installment of a multipart series.\n", "choicescript_stats": "*text_image about_you.png center All About You\n\n[b]Name:[/b] $!{name} $!{last_name}\n*line_break\n[b]Gender:[/b] $!{gender}\n*line_break\n[b]Age:[/b] 21\n\n[i]PERSONALITY[/i]\n*stat_chart\n\tpercent Confidence\n\n\topposed_pair Sarcastic\n\t\tSincere\n\topposed_pair Aloof\n\t\tFriendly\n*if (smashed=\"true\")\n\t*stat_chart\n\t\topposed_pair Bloodthirsty\n\t\t\tIn Control\n*if (meet_vex=\"true\")\n\t*line_break\n\t[i]NOTORIETY[/i]\n\t*stat_chart\n\t\topposed_pair Anonymous\n\t\t\tInfamous\n\n\n*line_break\n[i]RELATIONSHIPS[/i]\n*if (meet_sid=\"Unknown\")\n\t*stat_chart\n\t\tpercent Unknown\n*if (meet_sid=\"true\")\n\t*stat_chart\n\t\tpercent sid Sidney\n*if (meet_vex=\"true\")\n\t*stat_chart\n\t\tpercent Vex\n*if (meet_e=\"true\")\n\t*stat_chart\n\t\tpercent Elysian\n*if (meet_d=\"true\")\n\t*if (d_gender=\"male\")\n\t\t*stat_chart\n\t\t\tpercent Holden\n\t*if (d_gender=\"female\")\n\t\t*stat_chart\n\t\t\tpercent Hester\n\n\n*line_break\n\n\n*line_break\n\n[b]A Beginner's Guide to \"So, You're Possessed!\"[/b]\n*line_break\nor \n*line_break\n[b]Everything You Always Wanted to Know About Stats[/b]\n*line_break\n[b][i](But Were Afraid to Ask)[/i][/b]\n*line_break\n\n\n[i]CONFIDENCE[/i]: \n*line_break\nNaturally quiet, shy, and awkward, you had a tough time navigating the raging rapids of childhood and adolescence, but as long as you keep things in perspective and take a risk every now and then, things can only get better. Or so you hope. The greater self-assurance and bravery you exhibit, the more opportunities to express yourself you might discover.\n\n[i]SARCASTIC[/i] or [i]SINCERE[/i]: \n*line_break\nThere is nothing wrong with joking around or wearing your heart on your sleeve. Just be aware that your personality influences how you interpret the world, as well as how others view you. Wield your words too much like weapons and you may seem cynical or bitter. Act too noble and you may appear vulnerable to those who want to manipulate you. Balancing that is up to you.\n\n[i]FRIENDLY[/i] or [i]ALOOF[/i]: \n*line_break\nThe kinder and more involved you are with others, the greater the return on your investment. Likewise, any disdain you demonstrate may come back to you twofold. When it comes to tackling your problems, you can fight alongside appreciative allies or face your demons solo.\n\n*if (meet_vex=\"false\")\n\t[i]Be sure to stay tuned to this page for exciting updates as your journey progresses![/i]\n\n*if (meet_vex=\"true\")\n\t[i]BLOODTHIRSTY[/i] or [i]IN CONTROL[/i]: \n\t*line_break\n\tA dark, mysterious presence lurking inside you has been unlocked! Dun DUN DUUUUUUUUNNNNNN! Giving in to your anger only makes it more powerful. Can you keep it in check or will it start to take over your thoughts and destroy everything you hold dear?\n\n\t[i]ANONYMOUS[/i] or [i]INFAMOUS[/i]: \n\t*line_break\n\tToday's unknown pizza delivery driver may be tomorrow's next big savior. Or evil overlord. Or martyr. However you slice it, certain choices and events are sure to get all sorts of individuals talking...about YOU. Watch out!\n\n\n*line_break\n\n*comment So, You're Possessed\n*comment Evolving Stats Page", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Chapters 3 through 6[/b]\n  \n  Unlock chapters 3 through 6, including the thrilling conclusion!\n  \n  *purchase adfree $3.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Chapters 3 through 6[/b]\n  \n  You've paid to unlock chapters 3 through 6.\n", "epilogue": "\n*text_image epilogue.png center Epilogue\n\n\nTrifle grunts as the two cyclopes throw her unceremoniously to the floor. Collapsing onto her side, she stares petulantly back at them through her tangled hair. They stand robotically, staring off at nothing and ignoring her indignation. \n\nShe sits up and dusts herself off with exaggerated motions. Even in the dimly lit office, her furious expression is a poor mask for the dread shining in her yellow eyes.\n\n\"Another defeat for a once mighty warrior. I don't imagine that makes you happy. I know I'M not happy.\"\n\nA flame dances to life, hovering low over the desk separating Trifle and the back of a tall executive chair. He always delights in overblown showmanship. Trifle is reluctant to interrupt.\n\n\"When that ulcerated worm escaped detainment, I assumed someone of your caliber could easily recapture him. You were thirsty enough for your own revenge while reaping the benefits of working for me. Yet, it seems I made an error in judgment.\" The polite, breezy tone turns hard. \"Do you understand my problem?\"\n\n\"Mac, as you know, there were…unforeseen complicat—\" \n\nHe spins his chair around sharply to face her.\n\n\"I. Do. Not. Make. Errors.\" Each word is hammered down like a nail. \"Nor do I have to tolerate them in others. Not anymore.\"\n*page_break\n\nMachination makes a show of appearing contemplative, idly resting his elbow on the desk and making soft suction sounds through his pointy teeth. He plucks at the small fire before him with his thumb and index finger, as though pulling the petals off a delicate flower. The scintillating light sparkles within his round, oversized glasses.\n\n\"We'll need to revisit our contract,\" he finally says. \"You managed three strikes, even with so many resources at your disposal. Was there anything you lacked that I didn't provide?\"\n\n\"Not even your own weapons—\"\n\n\"Did I?\" He cuts her off, almost pleading. \"Fail to motivate you, I mean. Did I not properly impress upon you the importance of honoring our agreement? Or forget to loan you my most powerful tools? No, of course not. That couldn't be it. Hmm.\"\n\n\"Who could have predicted that Vex would find an unusual human to hide behind? \n*if (Trifle \u003c 4)\n\tThat impudent, foulmouthed primate has it coming, too. \n$!!{name_he} should be our new focus, having such power and—\"\n\nMachination jumps out of his chair, which rolls away behind him. In his red shirt and black suit, he's a deranged businessman with all the patience of a child demanding expensive gifts. \n\n\"MORE POWER THAN ME!?\"\n*page_break\n\n\"I…no, I didn't mean…\" Trifle squeaks, weakly. \"But we lost Maim to ${name_him}…\"\n\nMachination's hand shoots out, his arm stretching all the way across the room to where she cowers. He places his fingertip gently against her lips.\n\n\"Shh, shhhhh. I know. Don't worry, I'll deal with that troublesome mortal soon enough.\" \n\nHe walks around his desk with a deliberately slow stride, finger never leaving her face, arm bending like rubber to keep it in place as he moves. It shortens back to its normal length when he closes the distance between them.\n\nStill cupping the flame in his other hand, he shakes it out like a match when he steps directly in front of Trifle. He lifts her chin to force her to look up at him, a gesture made all the more uncomfortable given their height difference, despite his bending forward.\n\n\"Look at it from my point of view,\" he says, coolly. \"Every setback I must endure pulls me a step away from the precipice of glory. The slightest delay could bring the Elders nipping at my heels. We don't want that, do we?\"\n\nHe releases her jaw with a little flick, straightening back to his full height. His head and shoulders disappear beyond the range of the dull light that still glows around them. A sinister glint off his lenses is the only thing Trifle can still see of his face in the shadows.\n*page_break\n\nMachination grins, his voice instantly effervescent. \"Now, for the fun part!\"\n\n\"Please, Mac, I did everything I could! My heart was fully devoted to the mission!\"\n\n\"Indeed? I'm touched. However, given your repeated failure to deliver, I'm invoking the liquidation clause. I have decided that your 'devotion' is best taken literally.\"\n\nTrifle blanches with realization before growing equal parts irate and desperate. \n\n\"No, NO! You can't do this! You have no authority!\"\n\n\"Ah HA! So, you weren't a true believer, after all. How disappointing.\"\n\nMachination nods to his weapons. As they drag her away, kicking and screaming, he waves her off.\n\n\"Don't worry, my dear. I will make certain your heart is still working for the cause.\"\n\n*page_break To Be Continued…\n\n*achieve ended\n\nThank you for reading [i]So, You're Possessed![/i], the first volume in a multipart series. We hope you enjoyed it!\n\nStay tuned for updates on this story and more from the authors:\n\n*link_button https://www.Facebook.com/SoPossessed Facebook\n*link_button https://twitter.com/so_possessed Twitter\n\nMake sure to save your game below! You'll need your saved game to continue where you left off in the next episode.\n\n*save_game episode2\n\nWe hope you've enjoyed playing [i]So, You're Possessed![/i]\n\n*feedback\n\nThanks for playing!\n\n*ending\n\n", "episode2": "This saved game was created at the end of the first volume.\nYou can't restore it until we finish writing the second volume.\n*ending", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Lee\"\n*set last_name \"Kawa\"\n*set gender \"Male\"\n\n*set meet_sid \"true\"\n*set sid 62\n*set meet_vex \"false\"\n*set meet_d \"false\"\n*set meet_e \"false\"\n*set smashed \"false\"\n*set confidence 6\n*set sarcastic 60\n*set aloof 49\n\nYou feel stronger and your thoughts are your own again, at least for now. The demon seems vulnerable. You may be able to regain control of your body. This is probably your last opportunity to fight back, before there are dire consequences. \n\nAre you prepared to forfeit your entire existence to demonic poessession?\n\n*fake_choice\n\t#Actively resist! You believe you can free yourself!\n\t#Give up and give in. The world sucks and you are utterly alone.\n\n*script changeBackgroundColor(\"black\")\n\n*set name \"Taylor\"\n*set last_name \"Gonzales\"\n*set gender \"Female\"\n\n*set meet_sid \"true\"\n*set sid 51\n*set meet_vex \"false\"\n*set meet_d \"false\"\n*set meet_e \"false\"\n*set smashed \"false\"\n*set confidence 10\n*set sarcastic 64\n*set aloof 43\n\n\"I'm from Hell, monkeys.\"\n\n\"'Monkeys,'\" your friend repeats. \"I'm going to do us all a favor and assume that's a reference to human evolution.\"\n\n\"You're not doing anyone any favors when you humans assume that you're evolved!\" The demon laughs.\n\n\"Great. Demonic AND racist. Demonist? No, never mind.\" You shake your head. \"That green chick called you Vex?\"\n\n\"That's me! And I'll stop calling you 'Monkey' when you two stop calling me 'it.'\" \n\n*fake_choice\n\t#\"You're right, we're sorry. What should we call you?\"\n\t#\"Well, you look like an 'it' to me!\"\n\t#\"I couldn't care less.\"\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Noel\"\n*set last_name \"Weiss\"\n*set gender \"Male\"\n\n*set meet_sid \"true\"\n*set sid 67\n*set meet_vex \"false\"\n*set meet_d \"false\"\n*set meet_e \"false\"\n*set smashed \"false\"\n*set confidence 18\n*set sarcastic 58\n*set aloof 49\n\nIn the shower, you linger under the hot water twice as long as you normally would, letting it run over your aching muscles, lost in thought. \n\nAfter you finally drag yourself out and towel off, you walk to your bedroom at the end of the hall. Flicking on the light illuminates a space...\n\n*fake_choice \n\t#...scattered with your favorite novels, movies, and video games.\n\t#...covered with posters and mementos from your favorite bands.\n\t#...littered with model rockets, mobiles, and maps of the night sky.\n\t#...strung with fabric swatches and design sketches.\n\t#...plastered with museum prints and art supplies.\n\n\n*set name \"Kai\"\n*set last_name \"Bradford\"\n*set gender \"Female\"\n\n*set meet_sid \"true\"\n*set sid 64\n*set meet_vex \"false\"\n*set meet_e \"false\"\n*set meet_d \"false\"\n*set smashed \"false\"\n*set confidence 12\n*set sarcastic 57\n*set aloof 38\n\nVex interlaces his claws behind his head and reclines on your threadbare couch. He is greeted with surprising affection by your cat.\n\nYour head is buzzing with a million different questions, but all you can articulate at the moment is, \"What now?\"\n \n\"For now?\" Vex scoffs, scratching the fluffy feline around the ears. \"Nothing! I know you'll need me whenever that demoness returns to finish the job. But tonight, you should probably relax and rest while you can.\"\n\n*fake_choice\n\t#\"Thanks, I guess?\"\n\t#\"Screw you.\"\n\t#\"Just don't trash this place, too. I'd like to get the security deposit back someday.\"\n\n\n*set name \"Riley\"\n*set last_name \"Spencer\"\n*set gender \"Female\"\n\n*set meet_sid \"true\"\n*set sid
