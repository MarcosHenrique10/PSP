dney got smacked down for helping and then you barfed up Vex, repulsive as that is. And that's really all there is to it.\n\nRight?\n\nBut, if that's true, then where did the green woman and her monster go?\n*page_break\n\nMaybe you should ask Sidney. After all, ${sid_he}'s your best friend.\n\nDo you want to talk to ${sid_him} about it?\n\n*choice\n\t*selectable_if (sid >= 50) #Yes, of course! You trust ${sid_him} more than anyone and you always look out for each other. If you can't discuss this with [i]${sid_him}[/i], who can you?\n\t\t*set sid +2\n\t\t*set confidence +1\n\t\t*set confess \"true\"\n\t\t*goto truthiness\n\t#You will, just not now. You need to time to think. Maybe after a good night's sleep, your head will be more clear. You should go.\n\t\t*set confess \"false\"\n\t\t*set sid -1\n\t\tAs if reading your mind, Sidney is already guiding you toward the exit. \n\t\t*goto letsgo\n\t#No way. What if ${sid_he} thinks you're certifiable? Grows afraid of you? How can you trust ${sid_him} if you can't even trust yourself?\n\t\t*set confess \"false\"\n\t\t*set sid -4\n\t\t*set aloof +2\n\t\t*set confidence -2\n\t\tSidney is already guiding you toward the exit. \n\t\t*goto letsgo\n\n*label truthiness\nYou sidle up next to Sidney and lower your voice. \"The truth is, I don't really know what just happened. This place looks even worse than I remember. Am I missing something?\"\n\nSidney searches your eyes, as though truly seeing you for the first time. You flinch under ${sid_his} scrutiny, unsure of why you feel \n*if (relationship=\"true\") and (sid >= 68)\n\tembarrassed.\n\t*goto awk_ward\n*else\n\tashamed.\n\n*label awk_ward\n\n\"Uh…honestly, $!{name}, I'm not even sure where to begin.\"\n\n\"If it's gonna be that long of an explanation,\" you sigh, \"I'd much rather do it away from here. In the comfort of our own home after a hot shower, maybe.\"\n\nIn that, you and Sidney are in enthusiastic agreement. \n*if (relationship=\"true\") and (sid >= 71)\n\t$!{sid_he} puts ${sid_his} arm around your shoulder and gives you a genial squeeze.\n \n\t*goto letsgo\n*label letsgo\n\"Let's get outta here, roomie, before some other lunatic crashes the party.\"\n\nYou climb over wreckage, picking your way toward the door. Vex runs ahead, arms extended to block your escape. \n\n\"Wait! I'm coming with you.\" \n\nYou exchange quizzical looks with Sidney before confronting this deluded creature.\n\n*choice\n\t#\"I guess?\" You don't want to argue, but you don't have to be nice about it, either.\n\t\tYou're tired, dirty, and, despite the unappetizing events, still hungry. \n\t\t*set Vex +6\n\t\t*goto trunk\n\t#\"WHAT!? After what you did to me!? HELL NO! No. Get lost, you creep!\" Does it think you are dumb or just masochistic?\n\t\t*set confidence +2\n\t\t*set Vex +4\n\t\t*goto argue\n\t#\"I couldn't care less what you do.\" At this point, you just want to bounce.\n\t\tYou wipe your sweaty forehead with your hand and drag the fingers over your hair. You glance at Sidney, who holds ${sid_his} palms out indecisively, but will clearly support your decision.\n\n\t\t\"Stay or go, makes no difference to me, but don't think you're riding shotgun.\"\n\n\t\t\"Yeah!\" Sidney chimes in. \"That's MY seat!\"\n\n\t\t*set aloof +1\n\t\t*set vex +4\n\t\t*goto whatevs\n\n*label argue\n\"I thought you might disagree,\" Vex says, coolly, \"But Trifle never forgets a face. Or a grudge. I can protect you, Monkey.\"\n\n\"Protect me!?  I don't remember half of what just happened and, frankly, I don't want to, but I'm pretty sure you're some kinda brainwashing devil beast, and as for your demented girlfriend…\"\n\nYou go off on an impressively obscene tangent that would make a sailor blush. Your voice cracks as you continue to rant, the pitch increasing until you're passionately mouthing profanities at an inaudible frequency.\n\nIn the ensuing silence, Sidney looks from you, to Vex, and back again.\n*page_break\n\nYou take a deep, calming breath. \n\nHaving discharged any residual rage and panic, you consider the forecast of more danger to come. If this \"Trifle\" shows up again, could you and Sidney really defend yourselves against her without this…thing?\n\n*label trunk\nYou wipe your sweaty forehead with your hand and drag the fingers over your hair. You glance at Sidney, who holds ${sid_his} palms out indecisively. $!{sid_he} clearly thinks this is your call to make and will support whatever you decide.\n\nYou concede defeat.\n\n\"Fine, but you're riding where no one can see you.\"\n*page_break\n*label whatevs\n\n*gosub trial_end\n\n*if (d_rescue=\"true\")\n\tYou start to leave again, but stop dead in your tracks and clasp your hands over your mouth.\n\t\n\t\"I almost forgot about ${d_name}!\"\n\n\t\"Silly Monkey, ${d_name} is fine.\" Vex waves at you dismissively, then hollers toward the back, \"Aren't you, ${d_name}?\"\n\n\t\"Whatever,\" echoes the reply.\n\n\t\"You know ${d_him}?\"\n\n\tVex smiles mysteriously. \"We've met.\"\n*page_break\n*if (d_rescue=\"true\")\n\t\"I give up. Your ride leaves in two minutes.\"\n\nYou stomp outside. The crooked entry rings eerily off-key. At least the rain finally stopped.\n\nVex bows and yells triumphantly at the wreckage, \"Tidy this place up, \n*if (d_gender=\"female\")\n\tHessie, my girl!\"\n*if (d_gender=\"male\")\n\tHoldy, my boy!\"\n\n\"Whatever.\"\n\n*line_break\n\n*line_break\n\n*finish End of Chapter Two\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first two chapters are available for free? This is the end of the free content.\n\n[b]To find out what happens next, please purchase the remaining chapters.[/b]\n\n*purchase adfree $3.99 purchased\n*abort\n", "chap3": "\n*text_image chap3.png center Chapter Three: Risk Management\n\n\nWhen you pop open the trunk, you find Vex basking comfortably atop a pile of your dirty laundry, mixed with a few fast food wrappers.  It grins at you in the misty moonlight.\n\nWhat a jerk.\n \n\"I figured it'd be upset, 'specially after you jumped those curbs,\"  Sidney chuckles, accidentally stretching the scratches that are scabbing over on ${sid_his} cheek.  $!{sid_he} winces and presses a hand to ${sid_his} face.\n\n\"After what it did to me? Totally worth it.\"\n\n*if (confess=\"true\")\n\tOn the way back, you couldn't wait any longer and had Sidney fill in the blanks from the store brawl as best ${sid_he} could. You felt a disquiet chill as ${sid_he} described your post-Vex transformation. Sprouting horns, claws, and fangs, the whites of your eyes turning blood red. How you annihilated the ${animal}.\n \n\t*if (sid >= 68)\n\t\tYou almost got a little misty-eyed when you realized that, even after seeing you turn into a homicidal monster, Sidney stuck by you. $!{sid_he} never lost faith that the real you was still in there and could get back out. \n\t\t*goto next\n\t*else\n\t\tAnd yet, Sidney never lost faith that the real you was still in there and could get back out. \n*label next\n*page_break\n\nVex leaps out of the trunk. \n\n\"I'm from Hell, monkeys.  No mortal tomfoolery can rival that place.\"\n\n\"'Monkeys,'\" Sidney repeats. \"I'm going to do us all a favor and assume that's a reference to human evolution.\"\n\n\"You're not doing anyone any favors when you assume that you're evolved!\" Vex laughs as Sidney frowns.\n\n\"Great. Demonic AND racist. Demonist? No, never mind.\" You shake your head. \"You might already know this from hacking my nervous system, but I'm ${name} and this is Sidney. That green chick called you Vex?\"\n\n*if (name=\"Sidney\")\n\n\t\"Hold on, you two have the exact same name? So much for human creativity! Isn't that confusing for your poor, simian brains?\"\n\n\t\"Only when your mom calls them out,\" your friend replies. $!{sid_he} elbows you and snorts as Vex smooths away a pained look of regret. \n\n\t\"All humans look the same, anyway. May as well simplify things, which is why I refer to each one as 'Monkey' to begin with. I will stop doing so to you when you both quit calling me 'it.' And you were correct, if you still care. My name is Vex.\" \n\t*goto notsorry\n\n*elseif (name=\"Sid\")\n\t\n\t\"Hold on, you two have almost the same name? So much for human creativity! Are many of your kind similarly christened these days? Granted, all humans look the same to begin with.\"\n\n\t\"You wish!\" \n\n\tYour friend points a triumphant finger at the demon, then demurs as ${sid_he} realizes that ${sid_his} impulsive comeback doesn't make much sense. Vex shrugs away an annoyed look. \n\n\t\"Anyway, yes. I'm Vex and I'll stop calling you both 'Monkey' if you quit calling me 'it.'\" \n\t*goto notsorry\n\n*elseif (name=\"Vex\")\n\n\t\"Wait, YOUR name is Vex, as well? Is that your feeble, simian attempt at humor?\"\n\n\t\"No joke.\" You shrug. \"Guess my family is weird like that. Quite a coincidence, don't ya think?\"\n\n\tVex snorts. \"Unfortunately for you, Monkey, you're thousands of years too late to be the original. Oh, and I'll stop calling both of you 'Monkey' when you stop calling me 'it.'\"\n\t*goto notsorry\n\n*elseif (name=\"Trifle\")\n\n\t\"Wait, YOUR name is Trifle, as well? Is that your feeble, simian attempt at humor?\"\n\n\t\"No joke.\" You shrug. \"Guess my family is weird like that. Quite a coincidence, don't ya think?\"\n\n\tVex snorts. \"A coincidence that the universe has saddled me with two of you? Sounds more like a curse! But, I'll stop calling you humans 'Monkey' when you stop calling me an 'it,' at least.\"\n\t*goto notsorry\n\n*else\n\n\t\"That's me. And I'll stop calling you two 'Monkey' when you stop calling me 'it.'\" \n\t*goto notsorry\n\n*label notsorry\n*choice\n\t#\"You're right, we're sorry. What do you want us to call you?\"\n\t\t*set vex +2\n\t\t*set aloof -1\n\t\t*goto sincere\n\t#\"Well, you look like an 'it' to me. You're definitely not human!\"\n\t\t*set sarcastic +2\n\t\t*set vex -1\n\t\t*goto inhuman\n\t#\"I couldn't care less either way.\"\n\t\t*set aloof +2\n\t\t*goto guy\n\n*label guy\nVex's white, pupilless eyes narrow contemptuously. \n*label guy_2\n\n\"Lets just say I'm what you imbeciles would call a 'dude' and leave it at that, shall we?\"\n\n*goto cool\n\n*label inhuman\n\"Thank Satan for that,\" Vex snaps. \"Me, a filthy, frail, fetid human! What a revolting idea.\"\n\n\"Okay, I'm sorry, but…\" \n\n*label sincere\n\nYou gesture up and down at Vex. \n\n\"I don't mean to offend, I just don't know much about, um…I didn't want to assume, like…?\"\n\n\"$!{name_he} wants to see your junk,\" Sidney finishes slyly, nodding at you as if ${sid_he}'s being very helpful, while trying to keep a straight face. \n\nYou're suddenly way more aware than you want to be that Vex has been nude this whole time.\n*choice\n\t#You chastise Sidney.\n\t\t*set sid -1\n\t\t*goto so_rude\n\t#You laugh.\n\t\t*set vex -1\n\t\tYou stifle a giggle and Sidney chuckles along with you. When Vex glares, you quickly compose yourself. \n\n\t\t\"Ah, hah. Right. That's not funny. We're just being immature. I'm sorry.\"\n\t\t*goto gross\n\t#You're so embarrassed!\n\t\t*goto so_embarrassed\n*label so_rude\n\"SID! What are you, the genital police? You don't just ask someone that! $!{sid_he} doesn't speak for both of us, I swear.\" \n\nYou apologize while trying to avoid looking directly at the demon's potential erogenous zones. Vex's white, pupilless eyes narrow at Sidney in disgust. \n\n\"Your reproductive imperative sickens me. How do you know your friend is ${gender}? From looking at ${name_his} 'junk?'\"\n\n*goto gross\n\n*label so_embarrassed\nYou can't hide your horrified expression.\n\n\"I…no! That's not what I meant and you know it!\"\n\nVex's white, pupilless eyes narrow in disgust. \"Your reproductive imperative sickens me, Monkey. How do you know your friend is ${sid_gender}? From looking at ${sid_his} 'junk?'\"\n\n*if (relationship=\"true\") and (sid >= 63)\n\t\"WHAT? No, that's not…I d-didn't mean, we…it's not like that!\" \n\n\tCrap, are you flustered?\n\t*goto gross\n*else\n\t\"What? No! Sick.\"\n\n*label gross\n\nSidney's eyebrows shoot up in amusement, but ${sid_he} says nothing.\n\n*choice\n\t#\"Look, I sincerely apologize, for myself and my friend. It's been a long night and that came out all wrong. But since YOU brought it up, I really am curious what you prefer, if you don't mind. Please?\"\n\t\t*set vex +3\n\t\t*set aloof -3\n\t\t*goto biology\n\t#\"Maybe we should just drop it.\"\n\t\t*goto guy_2\n\n*label biology\n\"You imbeciles really won't stop chattering at me until I explain, will you? FINE. I'm a divine being, we don't fall into the same categories you monkeys try to limit yourselves to. Our true forms are transubstantial in nature and what you'd consider androgynous, because no mortality means no need for sex. Individually, we vary. If you must know, I consider myself more masculine, like \n*if (gender=\"male\") and (sid_gender=\"female\")\n\tyou.\" \n\n\tThe comparison seems to leave a bad taste in his mouth, so he quickly adds, \"Not exactly like you, obviously. Ugh.\"\n\t*goto lesson\n*if (gender=\"female\") and (sid_gender=\"female\")\n\t…er, like NOT you two.\" \n\n\tHe seems perfectly content to not compare himself to you any more than he has to.\n\t*goto lesson\n*if (gender=\"male\") and (sid_gender=\"male\")\n\tyou two.\" \n\n\tThe comparison seems to leave a bad taste in his mouth, so he quickly adds, \"Not exactly like you two, obviously. Ugh.\"\n\t*goto lesson\n*if (gender=\"female\") and (sid_gender=\"male\")\n\thim.\" \n\n\tVex points at Sidney, then seems to reconsider that comparison and quickly adds, \"Not exactly like him, obviously. Ugh.\"\n\t*goto lesson\n\n*label lesson\n\nHe interprets your stunned silence as a crude lack of comprehension about his otherworldly physiology lesson.\n\n\"We. Don't. Have. Babies.\" He waves both hands with irritated emphasis toward his smooth crotch. \"And we don't 'go potty.' There is nothing happening down there, so you can stop ogling me!\"\n\n*label cool\n\"Okay, cool, got it. Geez!\" You and Sidney both raise your hands in surrender.\n\n\"Are we done?\" Vex taps his foot impatiently.\n\n\"Uhhh, yeah. Definitely. Let's go in.\" \n*page_break\n\nThe three of you walk across the gravel lot toward your apartment complex, which is notable mainly for its picturesque crumbling masonry and rust-colored water stains.  Sidney leads the way up an uncovered, rickety staircase and down the wooden walkway jutting out from the front of the building to your unit on the second level.\n\n\"Welcome to our humble abode! Low income living at its finest,\" Sidney says, opening the door with a flourish. \"Make yourself at home! Just don't touch my computer.\"\n\nYou follow Vex inside and quickly close the door behind you, stealing an apprehensive glimpse through the peephole as you secure the locks.  You keep cautious surveillance on the demon, who is being received with surprising affection by your cat, named…\n*choice\n\t#…Mister Bojangles. \n\t\t*set cat_name \"Mister Bojangles\"\n\t\t*set cat_nickname \"Bojo\"\n\t\t*goto cat\n\t#…Ralph.\n\t\t*set cat_name \"Ralph\"\n\t\t*set cat_nickname \"Ralphie\"\n\t\t*goto cat\n\t#…Sir Pawtrick Stewart.\n\t\t*set cat_name \"Sir Pawtrick Stewart\"\n\t\t*set cat_nickname \"Sir Paw\"\n\t\t*achieve sirpat\n\t\t*goto cat\n\t#…Rumpurrstiltskin.\n\t\t*set cat_name \"Rumpurrstiltskin\"\n\t\t*set cat_nickname \"Rumpy\"\n\t\t*goto cat\n\t#…Bubba.\n\t\t*set cat_name \"Bubba\"\n\t\t*set cat_nickname \"Bub\"\n\t\t*goto cat\n\t#…Archduke Franz Furdinand.\n\t\t*set cat_name \"Archduke Franz Furdinand\"\n\t\t*set cat_nickname \"Archie\"\n\t\t*achieve archduke\n\t\t*goto cat\n\t#…Sweet and Sour Sauce.\n\t\t*set cat_name \"Sweet and Sour Sauce\"\n\t\t*set cat_nickname \"Saucy\"\n\t\t*goto cat\n\t#…Ernesto.\n\t\t*set cat_name \"Ernesto\"\n\t\t*set cat_nickname \"Ernie\"\n\t\t*goto cat\n*label cat\n\nWhether she was somehow separated from her litter or abandoned, you'll never know, but she was definitely a cold, hungry, and scared little kitten when you found her near the dumpster and felt a stab of pity. Did you see a part of yourself in her sad, lonely eyes? \n\nAlthough \"$!{cat_name}\" started off as an inside joke, it stuck and now you can't imagine calling her anything else. \n\nIt chafes to see her cuddle up to that stupid demon. Not that she would know any better, but you still feel a slight pang of betrayal.\n*page_break\n\nIdly scratching the fluffy feline around the ears, Vex reclines on your threadbare couch.  Sidney strolls into the kitchen and rummages around.\n\nYour head is buzzing with a million different questions, but all you can articulate at the moment is, \"What now?\"\n \n\"For now? Nothing. I just know you'll need me whenever Trifle returns to finish the job. But tonight, you've exerted your sad, pitiful body enough and should probably relax while you can.\"\n\n*choice\n\t#\"Please don't trash this place like you did the store.  I'd like to get the security deposit back someday.\"\n\t\t*set sarcastic +3\n\t\t*set vex +1\n\t\t*goto drinks\n\t#\"Thanks, I guess?\"\n\t\t*set sarcastic -2\n\t\t*set aloof -2\n\t\t*set vex +2\n\t\t*goto drinks\n\t#\"Screw you.\"\n\t\t*set aloof +4\n\t\t*set vex -1\n\t\t*goto drinks\n\n*label drinks\n\"Refreshment incoming!\" Sidney tosses a can of soda pop and a bag of chips to you. \n\t\nPondering your unanticipated guest hesitantly as ${sid_he} grips a second can, Sidney asks, \"Ummm, do you want something?  I mean, do you even eat or anything?\"\n\nVex interlaces his claws behind his head. \"Occasionally, but I don't touch most of the slop you humans cram down your maws.\"\n\nSidney shrugs one shoulder, chugs half of ${sid_his} drink in one go, burps, grabs a plate piled with cold leftovers, and plops down on the opposite end of the sofa from Vex. $!{sid_he} turns on the TV, but when you visibly blanch from the pounding it causes in your ears, ${sid_he} dials the volume down low.\n\n\"I wish we could take credit for television, but that's one you fashioned all by yourselves.  It's made you fantastically ignorant and malleable,\" Vex sneers.\n\nSidney raises ${sid_his} soda. \"Amen to that!\"\n*page_break  \n\nYou relax into your armchair. The can fizzles softly as you open it. After taking a sip, you say, \"I was wondering…\"\n\n\"Nope, let me stop you right there.\" Vex puts his hand up without looking at you. \"We're not going to sit here, giggling and gossiping and doing each others' makeup. Demons don't usually reveal themselves openly like this. My case is, shall we say, unique.\"\n\n\"Are you sure there aren't more 'reveals' in our future? We're not exactly equipped to be battling the forces of evil and stuff.\"\n\nVex scoffs.  \"Apart from Trifle, my kind probably wouldn't bother with the likes of you. You're barely a blip on the radar. And if you keep your head down and listen to me, it might stay that way.\"\n\n\"That's very reassuring. Never mind that I found out Hell is real and I thought I was going to die! I'm just a silly 'blip!' I guess if there's nothing to talk about, I'm gonna get ready for bed.\"  You feel older and wearier than usual, and it hurts to stand up.  \"Somebody has to work around here and that means a lot of drivin' tomorrow.\"\n*page_break\n\n\"Perfect! That reminds me,\"  Vex exclaims, sitting up, \"I need to run an errand and your pitiful vehicle will have to suffice.\"\n\nThe sound of an aluminum pop-top rattling inside an empty can draws attention to Sidney.  \n\n\"Also, \n*if (sid_gender=\"male\")\n\tdaddy \n*if (sid_gender=\"female\")\n\tmomma \nneeds more drinky-poo. We're all out.\"\n\nYou'd roll your eyes, but even that effort is painful.\n\n\"Wonderful, I can add 'chauffeur' and 'personal shopper' to my résumé. G'night.\"\n*page_break\n\nA once-over while you're in the bathroom confirms that just a hand wash isn't going to cut it, so you climb into the shower. You linger under the hot water twice as long as you normally would, letting it run over your aching muscles, lost in thought. \n\nAfter you finally drag yourself out and towel off, you walk to your bedroom at the end of the hall. Flicking on the light illuminates a space…\n\n*choice \n\t#…scattered with your favorite novels, movies, and video games, your computer desk and notebooks squeezed into the corner.\n\t\t*set major \"english lit\"\n\t\t*goto cat_nap\n\t#…littered with reproduction rockets, mobiles, and maps of the night sky, your favorite telescope sitting in the corner.\n\t\t*set major \"astronomy\"\n\t\t*goto cat_nap\n\t#…plastered with museum prints and examples of your work, bins of art supplies and an easel leaning in the corner.\n\t\t*set major \"art\"\n\t\t*goto cat_nap\n\t#…strewn with metal parts, tools, and engineering schematics, your robotics competition piece disassembled in the corner. \n\t\t*set major \"engineer\"\n\t\t*goto cat_nap\n\t#…covered with posters and mementos from your favorite bands, your prized guitar and mic stand propped in the corner.\n\t\t*set major \"music\"\n\t\t*goto cat_nap\n\t#…strung with fabric swatches and design sketches, your sewing table and dress form crammed into the corner.\n\t\t*set major \"fashion\"\n\t\t*goto cat_nap\n\t#…stacked with building models and drafting supplies, tubes of blueprints and tracing paper shoved into the corner.\n\t\t*set major \"architecture\"\n\t\t*goto cat_nap\n\n*label cat_nap\n\nThe cat is waiting for you when you lumber in. You pull on some ratty sleepwear, turn off the lights, and collapse into bed.\n\n\"So, ${cat_nickname}, demons are real. Wild, huh,\" you mumble, face down, into the pillow. \"Do you think that means angels are real, too?\"\n\n$!{cat_name} meows, as indifferent to your existential crises as ever, so you roll over and gather her into your arms. You grunt as she steps on your stomach and curls up, flicking her tail. Running your fingers along her spine, she purrs placidly at your touch as you doze off together.\n\n\"Maybe I'll wake up and this will all have just been some random nightmare?\"\n\n*line_break\n\n*page_break Zzzzz…\n\nTwo indistinct beings huddle together, obscured by endless, sparkling light. The largest outline, in a booming voice, consults the delicate companion floating nearby.\n\n\"A removal is confirmed? You are certain?\"\n\nGentle sounds, like a mix between the tinkling of a teeny bell and the cries of a newly hatched bird, answer his query.\n\n\"An imp? This would never have happened if…\"\n\nHe trails off thoughtfully, unreadable in the brightness.  \n\n\"Clearly, the balance is in peril,\" he finally continues. \"I will arrange a personal meeting, but we must be prudent until we know more.\"\n\nAs a crescendo of white noise rises around them, they vanish.\n\n*line_break\n\n*page_break Next Morning\n\n\"Wake the—\" RING! RING! \"—up!\"\n\nYou turn toward the nightstand. Your donkey-shaped clock digitally displays the time across its plastic haunches as 10:30 AM.  The hinged mouth drops open, blaring. \n\n\"Wake the—\" HONK! \"—up!\"\n  \n\"Wake the—\" CUCKOO! \"—up!\"\n\nYou flop out a hand to silence the clamorous alarm. You vaguely recall having some bizarre dreams as you rub your eyes, no doubt triggered by your demonic exploits the previous evening. With concerted effort, you sit up. Every joint in your body protests. It feels like you just ran a marathon. Picking a cat hair off your tongue, you notice ${cat_name} seized most of the pillow space during the night.  \n\nTime to wipe the sleep from your eyes and greet the new day.  \n*page_break Blech.\n\nOnce you're dressed and ready to leave, you head out to the living room and find Sidney splayed out in the exact spot you left ${sid_him} hours before, sunglasses askew and snoring lightly. Vex, too, does not seem to have moved from his seat, but he appears alert and returns your inquiring gaze expectantly.\n\n\"Good morning, Monkey!\"\n\n\"Have you…? Did you just sit here all night? Don't you sleep?\"\n\n\"Slumber is such a mortal weakness.\"  Vex climbs off the couch, jostling Sidney.\n\n\n*if ((cat_name=\"Sweet and Sour Sauce\") and (animal=\"rabbit\"))\n\t\"That's gonna leave a mark,\" ${sid_he} moans and turns over.\n\t*goto weird_dreams\n\n*elseif ((cat_name=\"Sweet and Sour Sauce\") and (animal=\"platypus\"))\n\t\"He's dead, Jim,\" ${sid_he} moans and turns over.\n\t*goto weird_dreams\n\n*elseif ((cat_name=\"Sweet and Sour Sauce\") and (animal=\"fox\"))\n\t\"Gotta pucker up your lips, like dis,\" ${sid_he} moans and turns over.\n\t*goto weird_dreams\n\n*elseif ((cat_name=\"Sir Pawtrick Stewart\") and (animal=\"platypus\"))\n\t\"I'm a meat popsicle,\" ${sid_he} moans and turns over.\n\t*goto weird_dreams\n\n*elseif ((cat_name=\"Sir Pawtrick Stewart\") and (animal=\"fox\"))\n\t\"I'll get you next time!\" $!{sid_he} moans and turns over.\n\t*goto weird_dreams\n\n*elseif ((cat_name=\"Sir Pawtrick Stewart\") and (animal=\"rabbit\"))\n\t\"Why's there bacon in the soap?\" $!{sid_he} moans and turns over.\n\t*goto weird_dreams\n\n*elseif ((cat_name=\"Mister Bojangles\") and (animal=\"rabbit\"))\n\t\"No, evil robot monkey!\" $!{sid_he} moans and turns over.\n\t*goto weird_dreams\n\n*elseif ((cat_name=\"Mister Bojangles\") and (animal=\"platypus\"))\n\t\"Get the hell down in the cellar,\" ${sid_he} moans and turns over.\n\t*goto weird_dreams\n\n*elseif ((cat_name=\"Ralph\") and (animal=\"fox\"))\n\t\"I should go,\" ${sid_he} moans and turns over.\n\t*goto weird_dreams\n\n*elseif ((cat_name=\"Ralph\") and (animal=\"rabbit\"))\n\t\"Dive! Dive!\" $!{sid_he} moans and turns over.\n\t*goto weird_dreams\n\n*elseif ((cat_name=\"Ralph\") and (animal=\"platypus\"))\n\t\"You're gonna get it an' you don't even know it,\" ${sid_he} moans and turns over.\n\t*goto weird_dreams\n\n*elseif ((cat_name=\"Archduke Franz Furdinand\") and (animal=\"fox\"))\n\t\"Don't blink,\" ${sid_he} moans and turns over.\n\t*goto weird_dreams\n\n*elseif ((cat_name=\"Archduke Franz Furdinand\") and (animal=\"platypus\"))\n\t\"There's no earthly way of knowing,\" ${sid_he} moans and turns over.\n\t*goto weird_dreams\n\n*elseif ((cat_name=\"Archduke Franz Furdinand\") and (animal=\"rabbit\"))\n\t\"That'll do, pig,\" ${sid_he} moans and turns over.\n\t*goto weird_dreams\n\n*elseif ((cat_name=\"Bubba\") and (animal=\"platypus\"))\n\t\"Who's gonna take care of my kitties?\" $!{sid_he} moans and turns over.\n\t*goto weird_dreams\n\n*elseif ((cat_name=\"Bubba\") and (animal=\"fox\"))\n\t\"You knew that was the last lollipop,\" ${sid_he} moans and turns over.\n\t*goto weird_dreams\n\n*elseif ((cat_name=\"Bubba\") and (animal=\"rabbit\"))\n\t\"Yay! I'm a llama again,\" $!{sid_he} moans and turns over.\n\t*goto weird_dreams\n\n*elseif ((cat_name=\"Ernesto\") and (animal=\"toad\"))\n\t\"Shh! Don't look at it!\" $!{sid_he} moans and turns over.\n\t*goto weird_dreams\n\n*elseif ((cat_name=\"Ernesto\") and (animal=\"platypus\"))\n\t\"Who's scruffy lookin'?\" ${sid_he} moans and turns over.\n\t*goto weird_dreams\n\n*elseif ((cat_name=\"Rumpurrstiltskin\") and (animal=\"platypus\"))\n\t\"Not s'posed to be here today,\" ${sid_he} moans and turns over.\n\t*goto weird_dreams\n\n*elseif ((cat_name=\"Rumpurrstiltskin\") and (animal=\"rabbit\"))\n\t\"You meddling kids,\" ${sid_he} moans and turns over.\n\t*goto weird_dreams\n\n*elseif ((cat_name=\"Rumpurrstiltskin\") and (animal=\"toad\"))\n\t\"Who ate all my cookies?\" $!{sid_he} moans and turns over.\n\t*goto weird_dreams\n\n*elseif (animal=\"panda\") and ((cat_name=\"Sir Pawtrick Stewart\") or (cat_name=\"Mister Bojangles\"))\n\t\"The panda's dead,\" ${sid_he} moans and turns over.\n\t*goto weird_dreams\n\n*elseif (animal=\"panda\") and ((cat_name=\"Rumpurrstiltskin\") or (cat_name=\"Archduke Franz Furdinand\"))\n\t\"Silly, old bear,\" ${sid_he} moans and turns over.\n\t*goto weird_dreams\n\n*elseif (animal=\"panda\") and ((cat_name=\"Ernesto\") or (cat_name=\"Ralph\"))\n\t\"Go back to making noodles,\" ${sid_he} moans and turns over.\n\t*goto weird_dreams\n\n*else\n\t\"Hold onto your butts,\" ${sid_he} moans and turns over.\n\t*goto weird_dreams\n\n*label weird_dreams\n\n\"You know, it's quite the sport among demons to torment human dreams.\"  Vex rubs his hands together in a sinister fashion.\n\n\"That is incredibly disturbing. And you said you weren't going to call me 'Monkey' anymore.\"\n\nVex smirks. \"Did I? Oops.\"\n\n\"Just…I gotta go.  Haul your ass if you insist on coming with.\"\n*page_break Minutes Later\n\n\"You're lucky I'm so patient, Monkey!\"\n\nIt's difficult to tell if Vex is raising his voice in irritation or to be heard over the corroded muffler as you wait at the intersection.\n\nWatching for the light to turn green, you say, \"It's simple.  I go to work and THEN we take care of your crap.  Whatever that is, since you won't tell me.\" \n\nYou pause to check your blind spot before changing lanes as you approach A Pizza This, then explain, \"I don't have the luxury of mind control powers and unless yours also include the ability to spontaneously conjure legit cash, I have no way to pay my bills except through good, old-fashioned, soul-sucking labor.\"\n\n\"Please.  I am above your petty need for currency.\"\n\n\"Fantastic for you. But since I also don't wanna deal with my boss screaming at me later if we blow by, you'll have to put up with it.\"\n\n*if (sarcastic >= 56)\n\tYou grumble under your breath, \"I always suspected he was demonic. Maybe you'll know each other.\"\n*page_break\n\nVex crinkles his nose (or rather, the part of his face where one would be) as you make your way through the back of the pizzeria.  \n\n\"I've seen countless cesspools over the millennia, but some human dining establishments make even the vilest pits of my dimension look like five-star resorts.  Is there anything you monkeys won't guzzle so long as it's oozing lard?\"\n\n*choice\n\t#\"Yeah, well, I did ask you nicely to stay in the car. I'll only be a minute.\"\n\t\t*set aloof -2\n\t\t*set vex +1\n\t\t*goto roy\n\t#\"I'm SO sorry you have to mingle with the uncivilized peasants, Your Royal Highness, but trust me. I'm trying to make this quick for both our sakes.\"\n\t\t*set sarcastic +2\n\t\t*set vex +1\n\t\t*goto roy\n\t#\"Shut up and don't let anyone see you.\"\n\t\t*set aloof +2\n\t\t*set vex -2\n\t\t*goto roy\n\n*label roy\n*if (vex \u003c 0)\n\t*set vex \"0\"\nAs you swing by the storage room for an insulated bag, you hear the gruff, familiar voice of your boss.\n\n\"You get my cigarettes, \n*if (gender=\"female\")\n\tgirl?\"\n\t*goto royboy\n*if (gender=\"male\")\n\tboy?\"\n\t*goto royboy\n\n*label royboy\n\nYou find him carelessly leaning against one of the stoves, perspiring. His smudged shirt glistens with pools of grease, thick hair curling out of the collar.  \n\n\"Yeah, Roy, left 'em by the tip jar.\"\n\nHe grunts, his bushy eyebrows knitting together. Then, he notices Vex.  They regard each other in silent disdain.\n\nRoy grumbles suspiciously. \"Who's the midget in the Halloween get-up?\"\n\n*choice\n\t#\"I, ah, have to b-babysit. For my…that's my…uh, n-neighbor. Neighbor's kid. Y-young…person.\"\n\t\t*set dog_excuse \"false\"\n\t\t*set sarcastic -1\n\t\t*goto kid\n\t#\"That's, um, nobody. Don't worry about it. We're gettin' outta here, anyway.\"\n\t\t*set dog_excuse \"false\"\n\t\t*goto rush_out\n\t#\"Uhhhhhhhhhhhhhhmmmmm…my dog?\"\n\t\t*set dog_excuse \"true\"\n\t\t*set confidence +3\n\t\t*set sarcastic +1\n\t\t*set vex -1\n\t\t*goto really\n*label kid\n\nRoy stares you down, obliging you to provide a more detailed excuse.\n  \n\"He's got a, uhh, costume thing. P-party. With his friends. J-just gonna drop him off…after the first delivery. Stop scaring him, man. He's just a child!\"  \n\n*label rush_out\nYou usher Vex closer to the exit to avoid any cross-examination.  Roy grunts again.\n\n\"Make it fast!  Gotta lotta prep to do today.\"\n*goto leaving\n\n*label really\n*if (vex \u003c 0)\n\t*set vex \"0\"\n*achieve woof\nIt takes some kind of extraordinary intestinal fortitude to look a grown man in the eyes and tell a lie THAT blatantly obvious, but it passes because you know Roy goes from zero to apoplectic at the hint of any vermin in his kitchen, regardless of how un-canine Vex may look. \n\n\"You know better than to bring some mangy mutt in here, gatdayum! You want the health inspector on my ass!? Get outta my sight and don't let that mongrel near the food! I don't wanna see it in here again!\"\n\nPeeved though Roy may be, you're somewhat proud of yourself. You can't believe that worked and, judging by his expression, Vex doesn't, either.\n*label leaving\n\nYou hurriedly pocket the receipts and shove a stack of boxes from under the heat lamps into the bag.\n\n\"Yeah, yeah. I hear ya!\" \n\nYou herd Vex around the corner and out the door.\n*page_break\n\n\"That was too close. We have to do something about this cozy arrangement, 'cause I have no desire to keep dodging questions about who you are and why you look like, well…you. Or get fired for it,\" you say, pulling out of the parking lot.\n\n*if (dog_excuse=\"true\")\n\t\"Just buy me a collar and leash. No one will be be the wiser.\"\n\n\tOkay, so he didn't care for that excuse. \n\n\t\"Duly noted.\"\n\t*goto choices\n*else\n\tThere is no response from your passenger. \n\n*label choices\n\nYou decide to…\n\t\n*choice\n\t#…drop it, even though it makes you mad.\n\t\t*set bloodthirsty +1\n\t\t*goto brakes\n\t#…keep pressing for answers.\n\t\t*set confidence +1\n\t\t*goto try\n*label try\n\nHe isn't getting off the hook that easily.  \n\n\"Let me guess, this act of yours is all part of some big, underground cover-up or something that we dumb humans aren't supposed to comprehend?\"\n\n\"How very perceptive of you.\"\n\n\"So, why aren't you keeping out of sight?\"\n\n\"From ignorant monkeys?  I have more pressing concerns.\" \n\n*label brakes\n\nThe brakes squeal as you slam to a halt along the boulevard. You grab the first order of pizzas and stomp toward what appears to be a frat house to drop them off.\n\nThe trip to your next destination is made in complete silence. \n*page_break Awkward!\n\n*set bloodthirsty +1\nAfter returning to the car from your second delivery, you can't ignore the tension anymore and pound the steering wheel.  The car horn whines feebly. \n\nVex stares out the window. For the first time, sitting in the sunlight, you notice a vertical, jagged scar running down his chest.\n\n\"What's up with that mark?  You hurt or something?\"\n\n\"Careful, Monkey.\"\n\n*choice\n\t#\"Yeesh, forget I asked.\"\n\t\t*set aloof +1\n\t\t*set confidence -1\n\t\t*goto lunatic\t\n\t*selectable_if (aloof \u003c= 49) #\"I withdraw the question. I was only concerned.\"\n\t\t*set aloof -1\n\t\t*set sarcastic -1\n\t\t*set vex +1\n\t\t*goto lunatic\n\t#\"Ooo, sorry I pretended to care. Wouldn't want to tempt your demonic wrath.\"\n\t\t*set sarcastic +1\n\t\t*set vex +1\n\t\t*goto lunatic\n\n*label lunatic\n*set bloodthirsty +2\n\nVex crosses his arms over his chest.\n\nAll your fear and anger finally boils over, coursing through your veins in the form of adrenaline. You're so mad you want to break something, which is an unusual notion for you.\n\n\"Dammit, you need to stop acting like you're doing me a favor, 'cause that lunatic attacked YOU! She didn't care about me until you jumped into MY body!  I figure once you're outta the picture, I'm golden.  So, gimme one good reason why I shouldn't leave your ass on the curb!\"\n\nVex sighs. \n\n\"How about because most of the humans that encounter demons wind up insane or persecuted by their own kind or dead?  I told you, Trifle isn't known for tolerating loose ends and she'll return whether I'm here to protect you or not.  You should be grateful I'm still around!\" \n\n*if (vex >= 7)\n\tHe hesitates at the prospect of supplying you with a further confession. \"But, you're right. That vindictive harpy was originally just after me.  You were…a convenient option.\"\n\nSo many questions race through your mind!\n*label discuss\n\n*choice\n\t*disable_reuse #\"I was just in the wrong place at the wrong time, wasn't I?\"\n\t\t*goto whim \n\t*disable_reuse #\"So, Trifle's a demon, too?\"\n\t\t*goto biot\n\t*disable_reuse #\"Tell me you're not gonna climb down my throat anymore.\"\n\t\t*goto neck\n\t*disable_reuse #\"When you were in my head, could you…hear my thoughts?\"\n\t\t*goto thoughts\n\t*disable_reuse #\"Anything else I should know?\"\n\t\t*goto thats_all\n\n*label whim\n\"Bingo!  Now, you're waist deep in it and you need me if you want to keep on living your sad, insignificant life.\"\n\nIt could have been anyone. Or, between the two of you, Sidney. What are the odds?\n\n*if (sarcastic >= 59)\n\t\"With my lucky streak, I should go buy a lottery ticket after this.\"\n*goto discuss\n\n*label neck\nBeing force fed a demon is not your fondest memory.\n\n\"I don't make promises, but if we can get to where I need to go, I might be able to rummage up another form of assistance.\"\n*goto discuss\n\n*label biot\n\"Yes, she's an imp, just like me.\"\n\n\"Funny, she doesn't look like you. Seems stronger, too. Didn't I hear her threaten to make you her slave or something?\"\n\n\"I don't want to talk about it.\"\n*goto discuss\n\n*label thoughts\n\"Yes, when you 'yelled' them at me. As for any dirty little secrets you mistakenly believe I might be interested in, I can't just read minds like they're books. Not even when I'm in one as simple as yours, so don't worry your primitive, little head about that.\"\n\nSomehow, you don't find that comforting.\n*goto discuss\n\n*label thats_all\n\"The most important thing: I don't know when Trifle will return, but it could be soon. And since she's already seen us together, you're stuck with me.\" \n*if (vex >= 9)\n\tVex struggles with this next part, begrudgingly mumbling, \"For what it's worth, I'm sorry you got dragged into this.\"\n\nHe clears his throat. \"Now, I have a question for you, Monkey. Have you always been so athletic?\"\n\n\"Me? Athletic?\" You can't say the word without breaking into laughter. \"I was never any good at sports! \n*if (childhood=\"true\")\n\tExcept skeeball, maybe. Just ask Sidney.\"\n\t*goto stares\n*if (childhood=\"false\")\n\tExcept skeeball. Does that count?\"\n\t*goto stares\n\n*label stares\n\nVex stares blankly until you stop smiling. You feel almost giddy now, calming down from your outburst and absorbing all this new information. Maybe you're just losing your mind, but it's starting to make sense. It's hard to believe that, this time yesterday, your biggest concerns were cheapskates and what to eat for dinner. \n\nAnd Vex is being more forthcoming! You think.\n\n\"By the way,\" he leans over, whispering conspiratorially, \"Your anger is good.  Feed it and let it thrive.  It works for you.\"\n\nAnd, just like that, the mood is ruined.\n\n*line_break\n\n*line_break\n\n*finish End of Chapter Three \n\n", "chap4": "\n*text_image chap4.png center Chapter Four: Networking\n\n\nVex mercifully agrees to wait in the car between deliveries for the rest of your shift and, after you clock out, you can't put off his errand any longer.\n\nThough the sun hangs lower in the sky, the road before you shimmers with heat, late summer humidity palpable even with every window rolled down.  You've been puttering along this county byway for a while, passing one vast farm field after another with no other vehicles in sight.  A cluster of small buildings emerges in the distance.\n\n\"How much farther we gotta go?\"\n\n\"Relax, Monkey. It's right up here.\"\n*page_break\n\nYou reach a peaceful, single-road town.  It feels like driving into some bygone era, except everything is faded and dusty, revealing the undeniable passage of time.  Bleached out posters and flaking signs beseech tourists to stop; each neglected structure begs not to be completely forgotten.\n\n\"There!\" Vex points ahead, to the right. \"That business, at number 313.\"\n\nPulling into a parking space adjacent to the address he indicated, you're incredulous.  \n\n\"We came all this way for a pet shop?  Are you kidding me?\"\n\n\"It's precisely that kind of thinking that makes it so easy to hide among you cretins.\"\n*page_break\n\nA cowbell dangling above the door clanks as you enter, riling the already lively shop into a cacophony of tweets, barks, and metallic rattling.  A skinny, old man waddles around to the many cages, mumbling under his breath and patting the excited puppies as he fills their food bowls.  Despite the ruckus, he seems oblivious to you.\n \nVex approaches the counter, where a huge, gray parrot roosts on a wooden perch near an antique cash register.  You're watching the elderly shopkeeper bustle about, expecting to be waited on, when you hear the bird speak. \n\n\"Call me a soggy fig leaf,\" it says, wheezing slightly. \"I knew someday you would drag your sorry carcass back in here, though I never would have imagined you traveling with a mortal. Playing with the poor thing, are we?\"\n\nBewildered, you turn to see the bird looking at you sympathetically.\n \n\"Never mind ${name_him},\" Vex whines. \"I need your help.\"\n\nYou…  \n*choice\n\t#…respond to the parrot.\n\t\t*set confidence +1\n\t\t*set aloof -1\n\t\t*set talk_sly \"true\"\n\t\t*goto talk_sly\n\t#…stay quiet, but listen to them converse.\n\t\t*set aloof +1\n\t\t*set confidence -1\n\t\t*set talk_sly \"false\"\n\t\t*goto listen_sly\n\n*label talk_sly\n*achieve flock\nYou're afraid of sounding delusional, even to yourself, but join in anyway. \n\n\"I'm sorry, I just wanted to make sure that you're real. Are you demonic, too?\"\n\nThe bird lets loose a strange, raspy laugh, punctuated by episodes of squawking. \n\n\"I am no demon!\" He lightheartedly chastises Vex, \"You have not picked the brightest disciple, eh?\"\n\n\"This is Sly. He's an angel,\" Vex explains condescendingly, by way of introduction. At the mention of his name, Sly bobs his downy head graciously at you.\n\nOther than being able to fly, he's not exactly what you'd expect. \"Then, why would you help a demon?\"\n\nSly chuckle-squawks some more, a grating noise that makes you involuntarily cringe. \n*page_break\n\n\"You humans, always so sure you have the universe figured out, hmm?  Always convinced that the big picture is a black and white mosaic, cemented in place.  We are all more like shades of gray, constantly weaving in and out of a great tapestry.  Some of us literally, I suppose.\"  He ruffles his pewter colored feathers, amused by his own analogy.\n\nYou tally all the unearthly characters you've met so far out loud. \"Vex, Trifle, and now Sly. 'Sly' doesn't sound like an angel's name.\"\n\n\"Not a very good listener, are we? Just because I do not fit your preconceived notions about halos and harps does not make the facts untrue, but it does make my work easier.\" \n\nSly winks at you. At least, you think he did, though it's hard to tell, since the parrot can only look at you with one eye at a time. \n\n*choice\n\t#\"And what exactly is it you do? Especially from in here?\"\n\t\t*set aloof -1\n\t\t*goto tinkerer\n\t#\"Does your 'work' include driving that old man crazy with all your squawking?\" \n\t\t*set sarcastic +1\n\t\t*goto nitpick\n\n*label nitpick\nYou stick a thumb out toward the hoary keeper, who has moved on to cleaning the parakeet enclosure.\n\n\"Him? Oh, Nitpick is mad enough, it is true, but he keeps himself busy.  As for me, I am merely an old tinkerer that deals in secrets.  And I have many, do I not, Vex?\" \n*goto winks\n\n*label tinkerer\nA clicking gurgle emanates from his beak. \"I am merely an old tinkerer that deals in secrets.  And I have many, do I not, Vex?\"  \n\n*label winks\n\nTurning back to Vex, he flaps a convivial wing. \"But right now, I am more interested in hearing yours! Trifle, eh? You old dog! She sure found you quick. Hmm, quickly, indeed.\"\n\n\"Sly, please! I need to ask a favor!\"\n\n\"No need to be impatient, I am merely trying to be a cordial host. What is it, then?\"\n\n*goto planning\n\n*label listen_sly\n\nThe bird keeps an eye on you, a clicking gurgle emanating from his beak. He seems far more amused by your false disinterest than truly interested in what his other guest has to say. Vex, however, is ready to get down to business.\n\n\"Sly, please! I ran into Trifle and—\"\n\nSly lets loose a strange, raspy laugh and flaps a convivial wing at Vex. \"Trifle, eh? You old dog! She sure caught up with you quick. Hmm, quickly, indeed. What is it, then?\n\n*label planning\n\nVex presents him with a tiny, shriveled lump, holding it up for the bird to get a good look.  Sly rotates his head slowly one way and then another to inspect it closely from all directions.\n\nIt looks awfully familiar…\n*page_break\n\nYou've never heard a parrot gasp in delight before.\n\n\"Ah, yes, Dobl-Eu-DeFort-E! One of a kind.\" Sly clicks his beak, proudly.\n\n\"Double yew dee for tee?\" Surely you misheard that.\n\n\"A Docible Eukaryotic Demon-Fortified Engine. One of my crowning achievements.\" The pupil fixed on the imp constricts in keen curiosity. \"If you have it, that means you liberated it from Trifle.  How did you accomplish that, I wonder?\"\n\nPutting the pieces together, you vaguely remember, through the fog of your experience, when you saw it. Vex must have figured out a way to sneak it out of the store. \n\n*if (talk_sly=\"true\")\n\t\"Oh! I know wh—\"\n\n\t\"HA-shahashhhhhssSHUSH!\" Vex interrupts you, before gesturing nonchalantly at Sly. \n\"It's a really long and boring story. I only need it bound to me and we'll be out of your way.\"\n\n\"Harrumph!\" Sly shakes his feathers in agitation. \"THAT is what you came to ask of me?  You are going to need—\" \n\nSly stops himself, peering at you, and drops his head to speak softly for this next part, obviously unsure of how much you know or what is safe to say. \n\n*choice\n\t*selectable_if (confidence >= 20) #Brazenly attempt to eavesdrop without being noticed.\n\t\t*goto listen_in\n\t#Casually attempt to overhear, without looking too invested.\n\t\t*goto partial\n\t#Stay out of it, concerned but excluded.\n\t\t*goto nope_nope\n\n*label listen_in\n*if (confidence >= 24) or (vex >= 12)\n\t*set listen_in \"true\"\n\tFortunately, you manage to position yourself closely yet discreetly enough that you can make out most of the conversation.\n\n\t\"You are going to need more than this measly umbrella in the proverbial monsoon that is about to wash over you…I hear they are going to convene a full assembly, Vex…be busy staying on the move and out of sight until an official decision has been struck.\"\n\n\t\"An assembly? I thought that'd happened. A removal is rare, but…\"\n\n\t\"Had your removal been sanctioned…as is proper, it would most likely have resulted in…custody over to their agents. I am telling you, it was not…butchered and exiled, all off the record…and the Elders will not be lenient.\"\n\t*goto donezo\n\n*label partial\n\n*if (confidence \u003c= 17) or (vex \u003c= 5)\n\t*label nope_nope\n\tUnfortunately for you, parrots are notoriously good whisperers, and all you can do is watch them confer secretively with one another, with the occasional glance at you to make sure you're not listening.\n\t*set listen_in \"false\"\n\t*goto bunny\n\n*else\n\t*set listen_in \"true\"\n\tYou manage to position yourself closely yet discreetly enough that you can make out parts of the conversation.\n\n\t\"…need more…wash over…a full assembly…on the move and out of sight…\"\n\n\t\"…I thought…removal is rare…\"\n\n\t\"…sanctioned by the Council…transfer of custody…not approved…butchered…off the record…the Elders…\"\n\n\tToo bad none of it makes any sense.\n\t*goto bunny\n\n*label bunny\n\nIn exasperation, you decide that, until they are done, your energy is better spent petting the fluffy bunny in the center pen.\n\n*label donezo\n\nVex concludes the private portion of their exchange by loudly proclaiming, \"If I'm screwed either way, I'm at least going down fighting.\"  \n\nAgain, he raises the pod toward Sly in his outstretched palm.\n*page_break\n\n\"Not going gentle, eh?  I should have known little Vex would be so bold. Very well, I will give you this aid, but, eventually, someone will figure out that you visited me.  Increasing attention is being called to your predicament.  I am eager to see how this will be resolved.  But, we should get started, lest I ramble on, eh?\"\n\n[b]DING![/b]\n\n*if (listen_in=\"false\")\n\tYour interest is reignited \n*if (listen_in=\"true\")\n\tYou involuntarily jump \nwhen the till drawer springs open by itself.  Sly dips his beak into a hidden compartment to retrieve a swirling, dichroic marble.  He deposits it next to the pod in Vex's waiting hand.  \n\n\"Swallow the weapon, then this.\"\n \nYou both squint at Sly, but Vex obediently ingests each ingredient in quick succession.  Following a suspenseful wait, Vex produces a belch that resonates throughout the store, provoking another chorus of frantic animal cries.\n\n\"That's it?\" \n\nHe sounds disappointed. It was rather anticlimactic.\n\n\"Give it time.\"\n*page_break\n\nVex rubs his chest in discomfort.  \"What was that marble for?\"\n\n\"To see if I could get you to swallow one,\" Sly says, his blank expression augmented by a screech.  \n\nVex's face bulges with indignation as the bird cackles.\n\n\"Ha, I jest!  Look at you!  That was the special catalyst.  More than meets the eye, eh, human?\"\n*if (talk_sly=\"true\")\n\tSly may or may not have winked at you again.\n\t*goto spew\n*if (talk_sly=\"false\")\n\t\n\tSly winks at you. At least, you think he did, though it's hard to tell, since the parrot can only look at you with one eye at a time.\n\n*label spew\n\nVex opens his mouth as if to curse at the angel for joking at his expense, but can't manage to say anything as a sour pulse rises in his gullet.  He stoops over, vomiting what resembles a slimy hairball onto the floor. You sidestep the slippery clump. \n\n\"Vile! Do ALL supernatural abilities involve regurgitation?\"\n\nSly regards you with a curious look. \"Certain situations call for an old-fashioned touch, yes.\"\n\n*if (vex \u003c= 6) or (aloof >= 70)\n\tAt least Vex got a taste of his own medicine.\n*page_break\n\nThe mass quivers, distending in some places, and thrashes around.  It changes color from black to red as thin, interlacing veins spread across the sticky surface.  Two milky white circles blink open and a pair of wings unfurl on top, netted with goo.  A sinewy red tail snakes out from underneath and twitches to life. \n\nVex gingerly reaches down to caress the tennis ball-sized creature.  Its colorless eyes meet the demons and, for a poignant moment, it seems to recognize its new master with a trilling coo.  \n*page_break\n\nWhen Vex scoops it up, the round body appears to split nearly in half, flipping open like a spring hinged box.  Then, without warning, multiple rows of tiny, shark-like teeth clamp down on the demon's index finger.\n\n\"GAH!  Weasel taints!\"  \n\nThat looked like it hurt.\n\n*choice\n\t#\"I like it already!\"\n\t\t*set sarcastic +1\n\t\t*goto chinny_chin\n\t#\"Fascinating.\"\n\t\t*set sarcastic -1\n\t\t*goto helpful\n\t#\"Aww, who's a vicious baby? You are! Yes, you are!\"\n\t\t*set aloof -1\n\t\t*set sarcastic -1\n\t\t*goto chinny_chin\n\t#\"Keep that gargoyle away from me!\"\n\t\t*set confidence -1\n\t\t*set aloof +1\n\t\t*goto helpful\n\n*label chinny_chin\nYou'd pet it if you weren't afraid of getting just as chomped.\n\n*label helpful\n\nVex regains his composure. Hand held aloft, the living weapon continues to nibble playfully. \n\n\"It'll do.\"\n*page_break\n\n\"It likely is not capable of anything too drastic, considering your, ahem, current predicament,\" Sly explains to Vex, \"but it should be of some use.\"\n\n\"Yeah, I'll figure that other part out later. I owe you one.\"\n\nSly clucks agreeably.  \"Everyone always does, lad.\"  \n\nWith a parting bow to you, he says, \"Watch over him, please.  Our Vex would often lose his head if there was not someone around to pull it off the chopping block at the last minute.\"\n\n*fake_choice\n\t#\"I'll keep that in  mind…\"\n\t#\"Ha! To hear him tell it, it's the other way around…\"\n\t#\"No promises…\"\n\n\"…I still can't believe we're hanging out to begin with.\"\n\n\"Indeed. You are in a rare club, learning things few mortals know.  Whatever happens, there is no jumping off this train now, eh?\"  \n\nSly reascends his perch as Vex walks toward the door, pulling Dobl-Eu-DeFort-E off his finger.\n\nBidding Sly farewell, you turn to follow Vex, but bump into something solid, instead.  \n*page_break \"Oh, shit!\"\n*set anonymous -1\n\nYou gape, stupefied. \n\nThe wrinkled keeper is almost nose-to-nose with you, aggressively gnawing at his bottom lip with his yellowed teeth. You are positive that he was shorter, scrawnier, and hunched over when you arrived.  The once drooping and watery eyes are now unnaturally wide.\n\n\"Nitpick, leave ${name_him} be,\" Sly cautions.\n\nVex stops in the doorway.  \"The monkey's with me.\"\n\nNitpick mutters viciously under his breath.  Vex beckons you to join him, which you're actually glad to do, skittishly avoiding having to turn your back on the daunting figure who continues to stare intently.\n\n\"I said, ${name_he} is MINE, fiend! BACK OFF!\"\n\nNitpick points accusingly.  \"You can have ${name_him}.  $!{name_he}'s unbalanced!\"  \n\n\"Huh!?\"  You examine vital parts of your person anxiously, as though you might spot an embarrassing stain or undetected injury.\n\n\"Unbalanced!  UNBALANCED!\"\n\nHe shrinks back into his feebler persona, hobbling out of sight behind a shelf full of feed. \n*choice\n\t#\"Guys? What the heck was that about?\"\n\t\t*goto we_dunno\n\t#\"Forget this! I'm out!\"\n\t\t*goto menagerie\n\n*label we_dunno\nNeither Vex nor Sly claim to know what brought that on, but they do urge you to be on your way, just in case.\n*goto trembling\n\n*label menagerie\nYou swiftly slip out the door to distance yourself from Nitpick and his dubious menagerie.\n\n*label trembling\n*page_break\n\nYour hands tremble as you try to unlock the car.  Even a few deep breaths of fresh air do little to quiet the jangling of your keys.  You drop your head onto the roof in exasperation, only to get a painful reminder that it is scorching hot after your skin makes contact.  \n\n\"Ow!\" Rubbing your stinging forehead, you sigh. Turning your back to the car, you slide down into a curled up sitting position on the pavement. A dawning realization weighs heavily on your shoulders. \n\n\"My life's never gonna be the same again, is it?\"\n\nVex grins, prodding the diminutive red sphere flapping clumsily in the air beside him.\n\n\"Not a chance in Hell.\"\n\n*line_break\n\n*page_break Later\n\nBeautiful shades of rose, peach, and lilac streak across the sky, but it barely registers. You navigate homeward, lost in thought. \n\nAt least the demeanor of your companion has noticeably improved.  \n\nVex is occupied with throwing his freshly recycled weapon in high arcs, as if juggling one lopsided ball badly.  Its wings flutter for a few seconds before dropping back down, sporting a puckish smile.  \n\nA few tosses have come uncomfortably close. With a shudder, you brush it away after you feel something rubbery flap against your cheek.\n*page_break\n*if (sarcastic >= 57) and (aloof >= 52)\n\t\"All right, I give up. What does that spit wad do that's so damn important, anyway?\"\n\t*goto demonstration\n*if (aloof \u003c= 44)\n\t\"You never did tell me what exactly that does or how it can help us.\"\n\t*goto demonstration\n*else\n\t\"So, what does that thing do that's so important, anyway?\"\n\n*label demonstration\n\nThey turn toward you, Dobl-Eu-DeFort-E mirroring its master's expression with uncanny precision.\n\n .\"\n\t\t*set sid +1\n\t\t*goto sweet\n\t#\"I don't think so. I, uh, have my hands full, here. And I'm not exactly feeling sociable.\"\n\t\t*set sid -3\n\t\t*set aloof +1\n\t\t*goto killin_me\n\n*label killin_me\n\"${name}, come on. You're killin' me, ${name}. We need to grab a drink and decompress, don't you think?\"\n\n*choice\n\t#\"Sid, you know I friggin' hate crowded bars, but I guess if you're going to guilt me into it…\"\n\t\t*set aloof +1\n\t\t*set bloodthirsty +1\n\t\t*goto sweet\n\t#\"Okay, you win. I guess that does sound nice. I'll get there when I get there.\"\n\t\t*set sid +2\n\t\t*set aloof -1\n\t\t*goto sweet\n\n*label sweet\n\n\"Sweet. Later!\"\n\nPutting your phone away, you say, \"Looks like I got somewhere to be after this family bonding trip, so you'll have to find someone else to play your sidekick tonight.\"\n\n\"Nuh-uh,\" Vex says, waggling a finger with bands of bite marks around the knuckles. \"I told you that until I say otherwise, I'm your shadow.\"\n\n*choice\n\t#Argue.\n\t\t*goto morons\n\t#Agree.\n\t\t*goto disguise\n*label disguise\n\"Ugh! Fine, but my point still stands. You are gonna scare the crap outta people or, at the very least, hedge some indecency laws. Maybe get arrested or beat up. Actually, I'm starting to like this plan.\"\n\n*goto gil_is_born\n\n*label morons\n\"And I told you, you're conspicuous!  Roy's a moron and easy to distract, but I'm going to a very busy, very public place and you look like something outta Dante's Inferno.\"\n\n*label gil_is_born\nAs you speak, the weapon rolls into a ball again.  Vex places it carefully on the center of his face, where Dobl-Eu-DeFort-E flattens and trickles outward, as if liquefied.  It spreads over Vex's features like a living mask, developing into a reasonable humanoid facsimile, with a ruddy complexion and bulbous, veiny nose.\n \nYou do a triple take.  \"That's amazing, but kinda gross.\"\n\n\"See?  More to it than you think!\"\n*page_break\n\nVex prods at his new appearance trons.  \n\n\"How quaint.\"\n\n\"You're lucky they don't always card thoroughly.  Or can your blobby pet produce an accurate forgery of government identification, too?\"\n\n\"Please, Monkey.  I look ancient, as mortals go.  It won't be a problem.\"\n*page_break\n\nYou begrudgingly admit to yourself that Vex was right, as the bouncer only nods at the peculiar senior citizen dawdling behind you.  \n\nYou make your way inside, the air thick with the regrettably familiar odors of perspiration, beer, and fryer oil.  There is music playing from somewhere, all but bass drowned out by the thrum of several dozen people chatting, mixed with booming sound effects and clacking billiard balls from the sizable arcade.\n\nYou find it difficult to hear your own thoughts in this din, but after the last twenty-four hours, you're just grateful to be mingling with individuals that share similar interests and dimensional origins.\n*page_break\n\n\"Yo! Pizza pusher! Over here!\"\n\nSidney's arms flail wildly above the crowd as ${sid_he} nearly jumps on the bar to get your attention.  You wave back, then glance behind you to check on Vex.  The imp's sight is glued to a nearby video game competition, but he remains only a step behind.\n\n\"Hey, dingus.\"  \n\nYou ease onto the only empty stool next to your friend.  The cuts on ${sid_his} cheek are slathered with a viscous substance that you are mostly confident is petroleum jelly. $!{sid_he} raises a shooter to toast you. \n\n\"Nerd. Hope you made some mega tip money today, 'cause I already opened your tab.\"\n\n\"Dammit, Sid, I told you the next time you did that, I'd empty ${cat_nickname}'s litter box on your bed.\"\n\nSidney guffaws. \n*if (relationship=\"true\") and (sid >= 66)\n\t$!{sid_he}'s flushed and it's kind of adorable. \nYou wonder how much ${sid_he}'s imbibed already. \n\n\"Idle threats, \n*if ((gender=\"female\") and (sid \u003c= 52))\n\tma'am, \n\t*goto roll_out\n*elseif ((gender=\"male\") and (sid \u003c= 52))\n\tson, \n\t ame's ${last_name}. $!{name} ${last_name}. And the pleasure is all mine.\"\n\t#\"Gosh, you're purdy.\"\n\n*if (relationship=\"false\")\n\t…is what you think about saying.\n \n\t\"Um, sure. You too, I mean. Th-thanks. And ignore Sid, ${sid_he} has a flair for the dramatic. I, uh, call me ${name},\" is what you sputter instead.\n\n\t*goto good_fwiends\n*if (relationship=\"true\")\n\t…is what you think about saying. \n\n\t\"Oh, uh, sure. Er, you t-too, I mean,\" is what you sputter instead. Sidney flashes you a secret thumbs up. \n\"And ignore Sid, ${sid_he} has a flair for the dramatic. I, uh, call me ${name}.\"\n\n\"'$!{name}' it is.\" ${e_name} beams, tucking a stray lock of chin-length hair behind ${e_his} ear. \n*if ((name=\"Sidney\") or (name=\"Sid\"))\n\t\"Lovely name. I think it's cute that you both share the same one, \n\t*goto may_say\n*elseif (name=\"Vex\")\n\t\"That's a very interesting name. Quite distinct, \n\t*goto may_say\n*else\n\t\"That's a lovely name,\n\t*goto may_say\n*label may_say\nif I may say so.\"\n\n*if (relationship=\"true\")\n\t\"Th-thanks.\" You consider responding with your own compliment, but feel tongue-tied. \n\n*if (relationship=\"false\")\n\t\"Th-thanks, I guess.\" You never know how to take compliments. \n\nScratching a non-existent itch on your neck, you're relieved to see Sidney putting in another drink request, overcome by the desire to have something tangible in front of you with which you can pretend to be preoccupied. You fumble for another topic when ${e_name} beats you to it. \n\n*label good_fwiends\n\"Sidney has told me a lot about you, ${name}. \n*if (name=\"Sidney\")\n\tI mean, the other Sidney, obviously. \nYou sound like really good friends.\"  \n \nYou snort. \"I wouldn't believe a word ${sid_he} says if I were you.\"\n\nSidney feigns shock.  \"Frankly, this \n*if (gender=\"female\")\n\twoman \n*if (gender=\"male\")\n\tman \nwon't quit \n*if (relationship=\"true\")\n\tcoming on to \n*if (relationship=\"false\")\n\tfollowing \nme.\"\n\n\"I've known Sid \n*if (childhood=\"true\")\n\tforever, but \n*if (childhood=\"false\")\n\tfor a while, but \nI'm still surprised when other people can spend more than ten minutes around ${sid_him}. Kudos. You're either very brave or very patient. Probably both.\"\n*page_break\n\n$!{e_name} laughs and the easy, dulcet sound is contagious, so you and Sidney join in.  \n\nSuddenly, ${e_he} looks very serious. \"And I'm sorry to hear about your automobile accident. It's fortunate that you both got out safely.\"\n\nYou're about to stammer through another platitude of appreciation when the bartender approaches. Sidney pushes ${sid_his} sunglasses further up ${sid_his} nose and claps excitedly as three tumblers are placed before you. Sidney scoots one beer to ${e_name} and then hands you…\n*choice\n\t#…another, whatever was on tap.\n\t\t*set drinking \"true\"\n\t\t*goto cheers\n\t#…your favorite mixed cocktail, complete with garnish.\n\t\t*set drinking \"true\"\n\t\t*goto cheers\n\t#…some kind of juice. $!{sid_he} knows you're not into alcohol.\n\t\t*set drinking \"false\"\n\t\t*goto cheers\n\n*label cheers\n$!{sid_he} raises the last drink above ${sid_his} head.\n\n\"Cheers! Shall we find a booth?\"\n\nAs tempting as that is, you worry about how you're going to explain who Vex is to ${e_name}, not to mention why he looks so different to Sidney, when you realize you don't see him anywhere.\n\nSo much for playing your shadow.\n*choice\n\t#Look for Vex first.\n\t\t*set vex +2\n\t\t*goto vex_hunt\n\t#Forget about it. Sit down and drink with Sidney and ${e_name}.\n\t\t*set sid +2\n\t\t*set vex -1\n\t\t*goto drinkin_buddies\n\n*label vex_hunt\nWhispering, you tell Sidney, \"I should go find out where Vex got off to. Just to be safe.\"\n\n\"Suit yourself,\" Sidney shrugs. \"We'll be over here when you get thirsty.\"\n\n\"I, uh…gotta use the washroom. I'll be back,\" you excuse yourself to ${e_name}.\n\nYou circle around the bar area before you travel back to the spot you last remember seeing him, immediately outside the arcade. A bunch of vocal spectators have assembled there, making it difficult to weave your way around. They alternately bellow and cheer at the virtual adversaries facing off on a large-screen combat game.\n\nYou push through.\n*page_break\n\n*achieve details\nYou find Vex in the middle of the throng, eyes shining as his soldier slays another foe.  His claws, mostly hidden by your long sleeves, move furiously over the controls. Fans gawk in admiration.\n\n\"Ooh, damn!\"\n\n\"That old geezer is kickin' yer asses!\"\n\n\"Where'd you learn to play like that, gramps?\"\n\nFor someone so dismissive of human indulgence, Vex is in his element. \"Virtual war is a pale comparison to the real thing, whippersnappers.\"\n  \nHis avatar makes another victorious kill and dives behind some crates, to a surge of applause. \n\nAfter watching him extinguish any would-be challengers for a short while, you leave him to it. Given how he's been hot on your trail, you doubt he'll sneak off, or let you sneak off without him, for that matter. The whole point of coming out tonight was to forget about him for a few hours, anyway.\n*page_break\n\n\"…and that's when I see what looks like ${name}'s \n*if (gender=\"female\")\n\tbikini top \n*if (gender=\"male\")\n\tswim trunks \nfloat to the surface—\"\n\n\"SID!\" \n\nYou haven't been gone that long and ${sid_he} has already shared last year's humiliating summer camping saga with someone you just met.\n\nSidney, now beyond buzzed and well into smashed, hiccups loudly and falls into a fit of laughter. A few shot glasses are stacked on their table.\n\nYou're not sure how many of these ${e_name} drank in your absence, but ${e_he} appears to be the more sober person by a landslide. In fact, ${e_he} seems completely alert.\n\nWell, you have plenty of embarrassing stories of your own to share…\n\n*line_break\n\n*page_break Hours Later\n\nSidney is laughing so hard ${sid_he} is almost crying
