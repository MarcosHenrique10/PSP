robably taste delicious if we cooked her right.\"\n\n*choice\n\t#\"What has gotten into you? Leave her out of it,\" you hiss.\n\t\t*set sarcastic -1\n\t\t*goto kitchen\n\t#You grit your teeth. \"For the last time, shut up!\"\n\t\t*set vex -2\n\t\t*set aloof +1\n\t\t*set bloodthirsty +1\n\t\t*goto kitchen\n\t#\"You might, too! Watch your mouth in case I get hungry, short stack.\"\n\t\t*set vex -1\n\t\t*set bloodthirsty +1\n\t\t*set sarcastic +1\n\n*label kitchen\n*if (vex \u003c 0)\n\t*set vex \"0\"\nVex scowls and climbs into the armchair.\n\n*if (sid >= 51)\n\tAfter supplying Sidney with a glass of water and some crackers in front of the TV, you return to the kitchen with ${e_name}.  \n*if (sid \u003c= 50)\n\tAfter waiting for Sidney to sloppily procure a glass of water and some crackers for lounging in front of the TV, you're left with ${e_name} in the kitchen.\nYou grab another spotty cup for yourself and fill it in the sink.\n\n\"Nice accommodations,\" ${e_name} says graciously, stroking ${cat_name}.\n\nYou lean against the refrigerator.  \"Naw, it's a shithole, I know it.  You don't have to be polite.  Best we—or I—can afford, at the moment.\"\n\n${e_name} smiles at you and you can hear your own heartbeat pounding in your ears.  \n\n\"So, does Sidney's grandfather visit often?\"\n\n*fake_choice\n\t#No.\n\n\"Uhh…not exactly. First time we've met, actually. He's come up on some hard times or something.\" You almost confess that \"Gil\" isn't really Sidney's grandfather, but stop yourself.\n\n\"That's kind of you to take him in. Not everyone would be so hospitable.\"\n\n\"Probably too kind for my own good.  It's not like either of them are currently contributing to the rent,\" you smirk.\n\n${e_name} cocks ${e_his} head, thoughtfully. \"Are you a student?\"\n\n*fake_choice\n\t#No.\n\n\"Not anymore, but Sidney is, when ${sid_he} bothers to go to class, anyway.  We enrolled around the same time, but I couldn't afford it for long. Didn't have much luck with scholarships or loans, for…well, various reasons. So, I took a semester off to work and save up. And then, that turned into an indefinite break.  You know how it goes.\"\n\n${e_name} nods. \"What of your family?\"\n\nNope. Absolutely not. No freaking way. That is the LAST topic you want to discuss and you're not going to go there…\n*page_break \n\nYou take a deep breath. \n\n\"Dad lives in the city, so I don't see him much.  When I do, we don't really talk.  That's part of why I chose this school, to put some distance between us.  He treats me like an irresponsible burden, when he isn't ignoring me.  He thinks I'm lazy and refuses to ever 'bail me out,' even though I've never asked him to. I mean, I've been working since I was fifteen!  I never met my mother, at least not that I remember.  I've thought of looking for her, but it's too painful and I'm too chicken.  Dad never discussed her much, either.  I always got the impression that their history together was…brief.\"\n\nExhaling, you can't believe you just admitted all that out loud. It's hard to read ${e_name}'s expression at the moment, but ${e_he} seems sympathetic. \n*page_break\n\n\"I'm so sorry.\"\n\n\"Don't be.  It'll all work out, I think,\" you say, wistfully.  \"Wow!  Other than Sidney, I haven't talked about that with anyone. It's weird everything came out like that. Thanks for listening to me babble about my personal baggage. \n*if (drinking=\"true\")\n\tI must have had way too much alcohol tonight!\"\n\n*if (drinking=\"false\")\n\tI wasn't even the one getting drunk tonight!\"\n\n${cat_name} slinks out of the kitchen. ${e_name} simpers. \n\n\"Perhaps you needed to unburden yourself more than you think.\"\n\n\"Heh, yeah. Maybe.\" \n\nYou do feel…peaceful. Lighter.\n*page_break\n\n\"What about you?  Do you go to school here?  If you don't mind me nonchalantly keeping the conversation going while smoothly changing the subject.\"\n\n${e_name} laughs.  \"I'm here to check in on an ex-associate.\"\n\n*if (relationship=\"true\")\n\tYour eyebrows rise involuntarily. \"Yeah?  Is this 'ex' of yours at the college?\"\n\n*if (relationship=\"false\")\n\t\"Yeah?  Is this 'associate' of yours at the college?\"\n\n\"No, moved to the area recently.\"\n\n\"I don't see why they'd do that.  This town doesn't have anything else to offer, except maybe dive bars and cheap junk food.  Oh, and when the wind gusts just right, the lovely musk from the local farms wafts in.\" \n\nYou wave a hand under your nose, as if savoring the delectable aroma of manure and industrial processing.  \n\n${e_name} keeps smiling and shakes ${e_his} head. \n*page_break\n\nYou take a long drink and try to think of something else funny and not creepy or awkward to say when you notice ${e_his} expression change. \n \n\"Oh. Hello, again, Grandpa Gil.\"\n\nIrritated by this intrusion, you turn to see the demon standing in the doorway and almost choke on your water. Vex is pulling back his hood as Dobl-Eu-DeFort-E slides off his face.\n\n\"Are you done?  As entertaining as it has been to watch you lead these sad, stupid mammals around \n*if (relationship=\"true\")\n\tby their glands \nhalf the night, the novelty has worn off.\"\n\n\"DUDE, what the—!\"\n\n${e_name} lays a soothing hand on your arm.  \n\n\"Don't worry, ${name}. I'm sure we can discuss this calmly. Right, Vex?\"\n*page_break\n\n\"So, you played me this whole time!?\"\n\nCurled up in a ball on one of the metal folding chairs positioned around the cheap card table in what serves as your dining area, you're taken aback and more than a little offended.  \n\nVex sits on the floor, Dobl-Eu-DeFort-E at his side.  \"I told you ${e_he} was trouble, Monkey.\"\n\nUndeterred, ${e_name} strategically settles into the chair across from you, wearing ${e_his} usual, gentle smile.\n\n\"I regret being less than forthcoming, but I never lied to you.  I needed to know what kind of humans would collaborate with a demon like Vex.  I'm not omnipotent.  If I had been sure that you were an innocent, exposed to as many occult elements as you have already, this rigmarole would've been unnecessary.  But, as I am loathe to see you are partly aware, you've been lead into danger.\"\n*choice\n\t#\"I guess that makes sense, but it doesn't mean I have to like being manipulated.\"\n\t\t*set sarcastic -1\n\t\t*set aloof -1\n\t\t*goto sigh\n\t#\"Dangerous or not, at least Vex is honest with me!\"\n\t\t*set vex +2\n\t\t*goto not_vex\n\t#\"And here, I thought I was getting better at this meeting people thing. Should've known it was a con.\"\n\t\t*set aloof -2\n\t\t*set confidence -1\n\t\t*goto sigh_2\n\t#\"I really don't trust any of you as far as I can throw you…\"\n\t\t*set aloof +2\n\t\t*goto not_far\n\n*label sigh\n\"No, I suppose it doesn't,\" ${e_he} replies, looking contrite. \n*label sigh_2\n\"Again, I humbly beg your pardon.\"\n\nYou sigh. \"Not only did you use me, I actually felt good about it, too! What the hell?\"\n\n${e_name} steels ${e_him}self. \"I've always been adept at inspiring others to open up. People relax around me. But, let me assure you, that relief was real. I can't force anyone to truly feel better about themselves than they do.\"\n\n\"What does that even mean? What are you?\"\n*goto angel_stuff\n\n*label not_vex\n\"Vex has been nothing but a pain since we met, but at least I've witnessed what's up with him.  I don't know who, or even what, you are!\"\n*goto angel_stuff\n\n*label not_far\n\"…but at least I know what Vex is. What the hell are YOU supposed to be?\"\n*goto angel_stuff\n\n*label angel_stuff\n*set meet_e \"true\"\n\n\"I can answer that,\" Vex jumps in, enthusiastically. \"$!{e_his} name is Elysian and ${e_he}'s an ancient, powerful deva.\"\n\n\"Deva? Ancient!?\" \n\nSooner or later, you may have to start writing all this stuff down.\n*page_break\n\n\"An angelic denomination—\" ${e_name} says, before Vex cuts ${e_him} off.\n\n\"—as likely to use and abuse you as any demon would! $!{e_his} kind just does so under the guise of righteousness. Not that you could help yourself. Persuasion is one of ${e_his} many talents. $!{e_he} can get the most hardened degenerate to bare their darkest secrets. A monkey like you, I'm surprised ${e_he} doesn't have your Social Security and pin numbers by now.\"\n\n\"Thanks for the vote of confidence,\" you grumble.\n\nIt all rings true. $!{e_name} felt inherently trustworthy from the beginning. The whole time you've been getting to know ${e_him}, not only did you elaborate on your answers way more than you intended, but the less it occurred to you to refuse or tell ${e_him} anything but the truth. Afterward, you even felt grateful that ${e_he} had lent you an understanding ear! \n\nEven now, as \n*if (bloodthirsty >= 8)\n\tangry \n\t*goto residue\n*else\n\thurt\n*label residue\nas you are, you feel a kinship to ${e_him}. A residual effect of ${e_his} powers, no doubt.\n\n${e_name} raises ${e_his} hands defensively.  \"That is a very biased explanation. It's not as sinister as all that!\"\n\n*choice\n\t#\"I don't give a damn!\"\n\t\t*set vex +1\n\t\t*set aloof +1\n\t\t*set bloodthirsty +1\n\t\t*goto lovey_dovey\n\t#\"Oh? Just how sinister is it?\" \n\t\t*set vex +1\n\t\t*set sarcastic +1\n\t\t*goto lovey_dovey\n\t#\"If you have a better explanation, I'm all ears. Please.\"\n\t\t*set aloof -1\n\t\t*goto e_turn\n\n*label lovey_dovey\t\n\"A pleasant interrogation is still an interrogation,\" Vex mumbles.\n\n*label e_turn\n${e_name} peers sidelong at Vex. \"To be plain, your demon friend here is rather notorious in the divine realms right now.  He's been the victim of a brutal ritual that hasn't been performed in ages…and shouldn't have been performed on him at all.\"\n\nVex jumps to his feet and aims an angry claw at the angel.  \n\n\"So, Sly was right! And, what? You're here on behalf of the Old Gulls Club?  You finally decide to step in instead of spouting useless ideology while sitting on your wings?\" \n\n\"I was sent to investigate! What have I done to deserve such spite?  I've never slighted you.\" \n*page_break \n\nYou motion for a time out. \n\n\"Hold on!  One, he's not my friend.  Two, victim of what?\"  \n\nDobl-Eu-DeFort-E screeches and flies in manic circles around its master.\n\n\"Don't act as though you've done me any favors lately, either, Dove!  The Elders haven't so much as bothered to fart in my direction.\"\n\n\"Tsk! With such charming turn of phrase as that, I can't imagine why.\"\n\n\"There you go, always acting so superior!  That's how I recognized you right away.  Only your kind would be arrogant enough to use a disguise that's so faithful to your true appearance.\"\n\n*choice\n\t#Interject.\n\t\t*set argue_out \"false\"\n\t\t*set confidence +1\n\t\t*goto chill_out\n\t#Let them argue it out.\n\t\t*set aloof +1\n\t\t*set argue_out \"true\"\n\t\t*goto steam\n\t#Get angry.\n\t\t*set bloodthirsty +1\n\t\t*goto you_mad\n\n*label chill_out\n\nYou bend over the table to get their attention.  \"Not that this witty banter ain't got me hanging on the edge of my lowly mortal seat or nothing, but can we chill out for a sec?\"\n\nThey continue bickering.\n\n*label steam\n\n\"If you're chasing me down for answers, you're out of luck.  I have no clue why I was singled out.\"\n\n\"I want more than answers, I'm compelled to be of assistance! And shame on you for involving humans in this chaos! They can't possibly comprehend the severity of the situation like we do.\"\n\n*if (argue_out=\"true\")\n\t*achieve notme\n\t\"If you wanted to assist, you should have come to ME! All this snooping around at monkey bars really undermines your integrity, don't you think?\"\n\n\tWhipped into a frenzy, Dobl-Eu-DeFort-E tailspins and dive bombs the table.\n\t*goto BAM\n\n*label you_mad\n\"HEY!  For fuck's sake, will you stop ignoring me?\"  You spread both arms out and holler like a referee before pounding your fists down on the tabletop in exasperation.\n\n*label BAM\n\n[b]BAM![/b]\n\nWeakened by the blow, one of the collapsible legs buckles.  Everyone stares as a weeks' worth of pizza boxes, dirty dishes, and aluminum cans clatter to the floor.  \n\nYou appraise the mess with a despondent sigh.\n*page_break \"Crap.\"\n\nStooping down, ${e_name} helps you clean up. You reason with ${e_him} over the clinking of silverware.\n\n\"Look, you said it yourself, I'm already dragged into this, right?\"\n\nVex grimaces and shakes his head at the angel, who purses ${e_his} lips.\n\n\"It's, ahh, a unique dilemma and Vex is caught in the middle for reasons perhaps only one demon knows.\"\n\n*if (confidence >= 21)\n\t\"No, none of that cryptic bull. I want the unfiltered truth. After everything that's happened,  I think I've earned a straight answer. You mentioned a ritual?\"\n\n*if (confidence \u003c= 20)\n\t\"Aww, come on, that's not an answer! If there's a good chance I'm gonna die, can't I know why?\"\n\nYou notice that ${e_name} is staring at the scar on Vex's chest.  $!{e_his} words are soft and measured when ${e_he} finally speaks again.\n\n\"His heart was taken. The source of power for all divine beings, what makes each of us unique. Immortal, even. It's terrible.\"\n*page_break\n\nDobl-Eu-DeFort-E nips consolingly at one of Vex's horns as he sulks.  \n\n\"Any demon without a heart is about as useful as a castrated stud.  While we're adding insult to injury, let's not forget I was banished from the only home and purpose I ever knew.  I hope that satisfies all your burning questions, Monkey.\"\n\nYou're about to sweep up the remaining crumbs when the significance of his \"current predicament,\" as Sly called it, hits you.  \n\n\"Y-you're totally powerless? You let me think…you said you could protect us from Trifle! But what I'm hearing now is that if she had actually shown up, it would have been WallGredes all over again. Or we'd both be dead!\"\n\n\"Hey!  I'm not completely helpless!\" \n\n*choice\n\t#\"Not now, but what about BEFORE we fixed the weapon?\"\n\t\t*set knew_it \"false\"\n\t\t*set sarcastic -1\n\t\t*goto broken_trust\n\t#\"I knew it! I KNEW you were keeping secrets from me!\"\n\t\t*set confidence +1\n\t\t*set bloodthirsty +1\n\t\t*set vex -1\n\t\t*set knew_it \"true\"\n\t\t*goto called_it\n\t#\"Right. You're just extremely downgraded. Be better in no time.\"\n\t\t*set knew_it \"false\"\n\t\t*set sarcastic +1\n\t\t*set vex +1\n\t\t*goto called_it\n\t#\"I'm so stupid. I can't believe I started trusting you.\"\n\t\t*set knew_it \"false\"\n\t\t*set confidence -1\n\t\t*set sarcastic -1\n\t\t*set vex +1\n\t\t*goto broken_trust\n\n*label called_it\n*if (vex \u003c 0)\n\t*set vex \"0\"\n\"You were even cocky about it! \n*if (knew_it=\"true\")\n\tI knew there was more to your offer of protection than good intentions, or even guilt! \nYou hypocrite. You insult Elysian, but you were coercing me the whole time, too!\"\n\n*label broken_trust\n\nYou sink back into your chair. \n\n\"You said I needed you to survive, but you're the one who has always needed me. You're still here because I'M protecting YOU. You want to pull me back on like an old sock, if you need to!\"\n\n${e_name}'s gaze passes uncomfortably between the two of you. The extent of Vex's deceptions must be a revelation to ${e_him}, as well. \n\n*label done\n*disable_reuse\n*choice\n\t*if (why_me=\"true\") #\"How am I a threat to her?\"\n\t\t${e_name} also looks puzzled. \"That's an excellent question. But then, I'm not as familiar with \n\t\t*if (name=\"Trifle\")\n\t\t\tthe other \n\t\tTrifle as you are, Vex.\"\n\n\t\tVex looks down and scuffs the floor with his foot. Even Dobl-Eu-DeFort-E zippers its mouth closed and hides behind him.\n\t\t*goto done\n\t#\"Was I ever really at risk? Other than from you, I mean.\"\n\t\t\"Yes. I swear, everything I told you about Trifle is true. Even if she gets to me first, she won't be satisfied until you're dead or belong to her, too.\"\n\n\t\tIn this, he seems earnest, but you don't really trust yourself to be a good judge of that, anymore.\n\t\t*set why_me \"true\"\n\t\t*goto done\n\t#\"Why me?\"\n\t\t\"I told you: wrong place, wrong time. Convenience.\"\n\n\t\t\"I mean, why aren't ${d_name} or Sidney in danger, too?\" \n\n\t\tVex laughs darkly. \"If I told you they might be, would you feel any better? Sucks to be you, Monkey, but I thought you'd prefer to minimize collateral damage. They aren't the ones who personally kicked Trifle's ass, are they?\"\n\n\t\t${e_name} looks grim. \"He has a point. A terrible, but valid, point.\"\n\t\t*set why_me \"true\"\n\t\t*goto done\n\t*if (why_me=\"true\") #No more questions. You're done with all the lies and drama.\n\t\t*set bloodthirsty +1\n\t\t*goto separate_ways\n\n*label separate_ways\nYou speak quietly, unable to look any of them in the eyes. \"${e_name} has ${e_his} powers, right? You could take on Trifle?\"\n\nThe angel perks up. \"Yes, that is correct.\"\n\n\"So, now that ${e_he} is here and you have Dobl-Eu-DeFort-E, maybe this is where you and I go our separate ways and I can salvage something resembling a normal life.\"\n\nThe sound of a toilet flush down the hall breaks the subsequent silence.  Soon after, Sidney skips in.\n\n\"S'up, chumps? I almost couldn't nap through all the racket coming from in here.\"\n*page_break\n\n\"Come on in, Sid,\" you snap. \"Thanks for your concern. You're right, I AM a chump. These two were just telling me about how they've both been using me all along. I'm such a sucker, I shouldn't be surprised. I don't suppose YOU'VE betrayed me recently? You could all start a club! The…the Pants on Fire Club!\"\n\n\"Huh!? Of course not! Geez, don't take it out on me!\"\n\n*if (bloodthirsty >= 8)\n\tYou feel a headache coming on. \"Everyone just SHUT UP, and give me a second to think!\"\n\n\tOne second later, ${e_name} seizes and falls to the floor.\n*if (bloodthirsty \u003c= 7)\n\tBefore you have a chance to respond, ${e_name} seizes and falls to the floor.\n*page_break\n\nYou jump over the dust pan to kneel beside ${e_him}.  The convulsions pass almost as quickly as they hit and, after a tense moment, ${e_his} eyes flutter open again.\n\n\"What's happening? Are you all right!?\" Your concern for ${e_his} well-being still feels genuine. \n\n${e_name} brings ${e_his} fingers to ${e_his} temples, groaning. \"Yes, I should be fine. It's confounding. There's been another one!\"\n\n$!{e_he} and Vex exchange a meaningful glance before ${e_he} shivers.  \n\nYou help ${e_him} up. \"Let's sit somewhere more comfortable. Can I get you anything?\"\n\nThe other two step aside as you guide ${e_name} to the couch, looking conflicted.\n\n\"Not the reaction I hope for when I walk into a room,\" Sidney sighs, and goes to finish tidying up.\n*page_break\n\n\"There's been another removal. One more heart taken. We're all connected, so…\" ${e_name} looks back at the kitchen, forlornly. \"Except those whose link is already severed, so the rumors say. That must be why I felt it and he didn't.\"\n\n\"Who was it? Where?\"\n\n\"That, unfortunately, I have no way of knowing.\"\n\nYou're not sure what else to offer an ailing angel, other than moral support. You stifle a yawn. It's so late that it's really early.\n\nWhen ${e_name} seems to be feeling better, ${e_he} says, \"$!{name}, I shall atone for my part in making you feel compromised. It is my sincerest wish that, from now on, we can collaborate respectfully. Perhaps as friends, even.\"\n\n*choice\n\t#\"I'd like that, too.\"\n\t\t*set elysian +2\n\t\t*set aloof -1\n\t\t*goto like_that\n\t#\"Oh. Maybe. We'll see.\"\n\t\t*goto heaven\n\t#\"Uh, no, I'm not sure that would work.\"\n\t\t*set elysian -1\n\t\t*set aloof +1\n\t\t*set bloodthirsty +1\n\t\t*goto yikes\n\n*label yikes\n$!{e_name} frowns, but nods understandingly. $!{e_his} benevolent sympathy only irritates you more. \n*goto heaven\n\n*label like_that\nYou would? Huh. Apparently, you would. \n\n\"Maybe if I hadn't lied about who Vex was first,\" you say, \"There wouldn't have been as much for you to keep from me, either. It's not the only time I've tried to hide something weird and embarrassing about my life to impress someone or because they made fun of me. It's probably terrible for my self-esteem. I should stop.\" \n\nYou weren't aware you'd felt that way, either. Is this still ${e_name}'s power working through you? Confessing to others is difficult enough, but to yourself…\n\n$!{e_he} gives your shoulder an encouraging squeeze. \"I appreciate you exactly as you are.\"\n*page_break\n\n*label heaven\nThat's when you remember a question that's been on your mind lately.\n\n\"Can I ask you something? I thought about going to Vex for this, but you're probably a more appropriate source.\"\n\n${e_name} nods patiently, awaiting your inquiry.\n\n\"If Hell is real, is Heaven real, too? Or God?\"\n\n$!{e_he} smiles. \"I'm not certain the answers are what you'd expect. Even Hell, though it does exist, might not work the way you assume. Think about it differently. You're asking the wrong question.\"\n\n*choice\n\t#\"Okay, then what's the right one?\"\n\t\t*goto heaven_or_hell\n\t#\"Never mind, then, I guess.\"\n\t\t*set confidence -1\n\t\t*goto migration\n\n*label heaven_or_hell\n\"If Hell is possible, what isn't?\"\n\n$!{e_he} lets you turn that over in your mind for a bit and you can't tell if it's profound, scary, or infuriating.\n*label migration\nThe angel elaborates no further.\n\nVex soon joins you in the living room, where he and ${e_name} debate some kind of plan. You listen to them drone on and on, discussing the pros and cons of your shared dilemma.\n\nIt's not long at all before your eyelids get…so…heavy…you can't force them open anymore and you…fall…asleep…\n\n*line_break\n\n*line_break\n\n*finish End of Chapter Four\n \n", "chap5": "\n*text_image chap5.png center Chapter Five: Public Relations Nightmare\n\n\n*comment ROMANCE OR NOT BRANCH PATHS\nYou blink. Unsure of where you are, you sit up, panicked. You're wearing the same clothes from last night. You thought you fell asleep on the couch, but…\n\n*comment SID INTEREST PATH\n*if ((sid >= 69) and (relationship=\"true\"))\n\tOh, wait. You're in Sid's bed?\n\t*goto sid_flirt\n*comment LOW SID OR NO INTEREST PATH\n*if ((sid \u003c= 68) and (relationship=\"true\")) or (relationship=\"false\")\n\tOh. You're in your bed?\n\t*goto flirtless\n\n*label sid_flirt\n\nYou roll over and see ${sid_him} curled up in a sleeping bag on the carpet of ${sid_his} own room. You reach over and give ${sid_him} a gentle shake.\n\n\"Psst, Sidney! Sid, wakey wakey.\"\n\n\"Nnnahh…whaaa?\" $!{sid_he} squints at you, still half asleep. \"Mmm…${name}?\"\n\n*choice\n\t#You wonder what this goofball got up to last night that lead you both in here, like this.\n\t\t\"Good morning, lazy ass. Why on earth am I in your room?\"\n\t\t*goto yawn_stretch\n\n\t#You can't help but think ${sid_he} looks adorable, still half curled up and squinting at you.\n\t\t\"Yes, it's me, sleepyhead. Hey, how did I end up in your room?\"\n\t\t*set sid +2\n\t\t*goto yawn_stretch\n\n*label yawn_stretch\n\nSidney yawns and stretches. \n\n\"Um…Vex and ${e_name} kept talking, but then they started getting mad again and ${e_name} said ${e_he} needed some alone time, some place dark. I think ${e_he} had a headache or needed to meditate or something. You were tired, but you told ${e_him} to take your room. So then,\" Sidney yawns again,  \n*if (sid_gender=\"male\") and (gender=\"female\")\n\t\"You passed out and I carried you in here.\"\n\t*goto grinning\n*else\n\t\"I dragged you in here so you didn't have to fall asleep on the couch.\"\n\n*label grinning \n\n\"You didn't have to do that! You especially didn't have to spend the night on the floor, dummy.\"\n\n\"Yeah, well, I'm  \n*if (sid_gender=\"male\")\n\ta motherfucking gentleman!\" \n*if (sid_gender=\"female\")\n\tmotherfucking ladylike!\" \nYou both laugh. \"Besides, after what you told me last night, about them manipulating you…I wanted to make sure you were safe. So, I left you with someone I know for a fact is extremely trustworthy.\"\n\n*if (sid >= 74)\n\tYou can't help but grin. \"That's sweet. \n\t*goto whatisaid\n*if (sid \u003c= 73)\n\tYou smile. \"A true pillar of the community, for sure.  \n*label whatisaid\nBut, um, since you bring it up, about what I said…\"\n*page_break\n\nAfter arguing with Vex and ${e_name}, you bit Sidney's head off when ${sid_he} didn't deserve it. \n*if ((aloof \u003c= 43) and (sid >= 70))\n\tYou haven't always been feeling or acting like yourself since…that night. \n\t*if (confess=\"false\")\n\t\tYou couldn't even bring yourself to confide in ${sid_him} after the brawl at WallGredes.\n\t*line_break\n\t*line_break\n\tIt breaks your heart to think you may have hurt Sidney's feelings. You want to make it right.\n\t*goto apology\n\n*if (aloof >= 60)\n\tYou've been an asshole sometimes, no way around it. \n\t*if (confess=\"false\")\n\t\tAnd you couldn't even bring yourself to confide in ${sid_him} after the brawl at WallGredes.\n\t*line_break\n\t*line_break\n\tYou know you should make it right.\n\t*goto apology\n\n*else\n\tYou haven't always been feeling or acting like yourself since…that night. \n\t*if (confess=\"false\")\n\t\tYou couldn't even bring yourself to confide in ${sid_him} after the brawl at WallGredes.\n\t*line_break\n\t*line_break\n\tYou want to make it right.\n\t*goto apology\n\n*label apology\n*choice\n\t#Apologize now.\n\t\t*set sid +1\n\t\t*set apologize \"true\"\n\t\t*goto suck_it_up\n\t#Wait until later.\n\t\t*set sid -1\n\t\tSidney doesn't seem mad and you don't want to ruin a perfectly pleasant morning. You'll address it if it comes up, but you're certain this relationship can weather worse than a few hasty words spoken mid-crisis.\n\n\t\t\"Ahh, never mind.\"\n\n\t\t*set apologize \"false\"\n\t\t*goto never_saying_sorry\n\n*label suck_it_up\n\"I'm sorry. I've been short-tempered lately. I must be stressed out, considering. But that's not on you. Sorry I lost it.\"\n\n$!{sid_he} puts ${sid_his} hand up st, ${sid_he} seems confused by that sentiment, then giggles like you must be teasing ${sid_him}. After that, ${sid_he} grows quiet, but keeps smiling.\n\n\t*goto im_late\n\n*if (sid \u003c= 73)\n\t\"Uh, sorry. Must still be sleepy,\" you laugh, placing the frames carefully onto ${sid_his} face. \n\n\t\"No problem, kiddo. Thanks for the assist.\" $!{sid_he} grins.\n\n\t*goto im_late\n\n*label kiddo\n\n\"No problem, kiddo. Happy to help.\" \n\n$!{sid_he} takes ${sid_his} glasses from you and puts them on, grinning.\n*goto im_late\n\n*label first_move\nWithout thinking, you slide off the mattress and into Sidney's lap, your lips finding \n*if (sid_gender=\"male\")\n\this. \n*if (sid_gender=\"female\")\n\thers.\n$!{sid_his} glasses slip out of your grasp as your fingers intertwine in ${sid_his} hair. \n\nYou slowly melt into each other. $!{sid_his} hands glide up your body, one traveling around your waist and the other across your shoulders, sending a shiver down your spine.\n\nIt feels amazing.\n\nSuddenly, Sidney pulls back, breathless. $!{sid_he} gently pushes you away, keeping you at arms length, as if searching for something to say and failing.\n\n$!{sid_he} doesn't look upset, but ${sid_he} doesn't look delighted, either. Maybe astounded. \n\n\"${name},\" ${sid_he} finally whispers.\n\nDid you make an awful miscalculation?\n*page_break\n\nYour face feels red hot.\n\n\"Shit! I'm really, really sorry. I messed up! I shouldn't have done that.\"\n\n\"No, it's oka—\"\n\n\"Oh, man. I gotta go. That was a mistake. I'm so completely sorry!\" \n\nYou untangle yourself to leave. $!{sid_he} catches your arm, pleading calmly with ${sid_his} eyes. \n\n\"Please, stay.\"\n\n\"I can't,\" you mumble, \"I have to get ready for work.\"\n\n\"Fine, but we're talking about it lat—\"\n\nYou shut the door behind you before ${sid_he} can finish and run to the bathroom, mortified. \n\nYou hope you didn't just ruin the best friendship you've ever had.\n*page_break\n*goto vex_help\n\n*label  Besides, you'll want to see this.\"\n\nTrifle waves her other hand toward the mirror on the wall, which distorts like an old analog receiver. A grainy image of Vex appears inside the frame, facing you. His eyes scan from side to side, as if he's reading something. All over the mirror are little pictures that, upon further inspection, look like backwards icons. \n*if (access_denied=\"true\")\n\tLike you're inside a computer monitor, staring out.\n\t*goto choosey\n\n*if (access_denied=\"false\")\n\tAnd not just any arrangement of icons…\t\n\n\tYou're inside your own computer monitor, staring out.\n\t*goto choosey\t\n\n*label choosey\n\nHe doesn't seem to notice you.\n*choice\n\t#Attempt to warn him.\n\t\t*set confidence +1\n\t\t*set vex +2\n\t\t*set aloof -1\n\t\t*goto warning\n\t#Watch silently.\n\t\t*set aloof +1\n\t\t*set confidence -1\n\t\t*goto computer_standoff\n*label warning\n\"Vex!\" You bellow, vaguely aware that you sound like you're caught in some kind of low-budget action movie, \"I'm with Trifle! It's a trap!\"\n\nThe only reaction your effort elicits is a melodious chuckle from Trifle.\n\n\"Are you one of those obtuse primates that shouts at their television? He can't hear you.\"\n\nTo encourage your compliance, Trifle brings her claws to rest on her captive's shoulder, the tips pressing through his shirt and into skin. Droplets of blood seep through the fabric and he gasps from behind the gag. \n\nYou shut up and…\n*fake_choice\n\t#…bite your lip, worriedly.\n\t\t*set aloof -1\n\t\t*set sarcastic -1\n\t#…smirk. Outplayed again. For now.\n\t\t*set sarcastic +1\n\t\t*set confidence +1\n\t#…scowl at her. If only looks could kill!\n\t\t*set bloodthirsty +1\n\n*label computer_standoff\nThe mirror chimes, indicating a new program is loading. Vex watches apprehensively as a desktop folder labeled \n*if (access_denied=\"true\")\n\t\"nroP TON\" \n*if ((access_denied=\"false\") and (major=\"english lit\"))\n\t\"seliF evaS\"\n\t*goto bursting\n*if ((access_denie ce of the one you stole.\"\n\nOver Vex's shoulder, you hear Dobl-Eu-DeFort-E snarl. Maim gnashes her teeth in amusement.\n\n\"Anyway, do as you please. Trifle said I can wear ${name_his} pelt as a cape if you don't show. I'm going to make ${name_his} yummy eyeballs into earrings, if I don't gobble them up, first!\"\n\nShe cackles maniacally before sinking beyond view into the base of the screen in a grimy wisp of smoke.\n*page_break\n\nTrifle flicks her wrist dramatically and the mirror shimmers back to its default state, reflecting your concerned expression back at you from across the table.\n\nYou've had some time to study the layout of the room and everything in it. If you can't count on Vex, then you're on your own.\n\nTaking a breath to steady yourself, you…\n\n*choice\n\t#…reason with Trifle.\n\t\t*set sarcastic -2\n\t\t*set trifle +1\n\t\t*goto hug_it_out\n\t#…insult Trifle.\n\t\t*set sarcastic +3\n\t\t*set confidence +1\n\t\t*set trifle -4\n\t\t*set anonymous -1\n\t\t*goto bitch\n\t*selectable_if (confidence >= 23) #…devise a plan of attack.\n\t\t*set bloodthirsty +1\n\t\t*goto wwf\n*label bitch\n*achieve pokebear\n\"You're a fucking moron. What exactly are you hoping to accomplish, anyway? I do love that your master plan included ordering half-price pizza. Real top tier villainy, there. Maybe you should monologue next. You must be every bit as weak and useless without your weapon as—\"\n\nYou blink and she is gone.\n*page_break Huh?\n*goto she_mad_now\n\n*label hug_it_out\n\"Okay,\" you say, slowly, \"It's just me and Vex you want, right? So, if I promise to behave, can you let these poor saps go?\"\n\nMuffled wails from your fellow prisoners permeate the kitchen.  \n\nTrifle leers at you with a dangerous gleam in her eyes. \"You think you understand what I want? Simple creature, you have no clue what's really at stake.\"\n\n\"Then keep us humans out of your war,\" you continue, passionately.  \"Besides, Vex won't waste a rescue effort on me.  I don't think he's the sentimental type.\"\n\nShe slinks toward you like a predator stalking unsuspecting prey, smiling. \n\n\"Tsk, tsk. You're looking at it all wrong.  See, I've never heard of any possession destroying a weapon, even when the demon was potent.  For an imp without powers, you must be a valuable tool, indeed.\"\n\n\"But, I'm…I'm nobody!\"\n\n*goto fight_or_flight\n\n*label wwf\n\n\"Okay,\" you stand up slowly, holding on to the back of your chair as if leaning on it, \"It's just me and Vex you want, right? So, you can let these poor saps go.\"\n\nMuffled wails from your fellow prisoners permeate the kitchen.  \n\nTrifle leers at you with a dangerous gleam in her eyes. \"You think you understand what I want? Simple creature, you have no clue what's really at stake.\"\n\nStill, it has the intended effect of luring her closer. As she slinks toward you, putting a reasonable distance between herself and the others, you time your attack precisely right. \n\nYou throw your chair high and quick, aiming for Trifle's head.  Her body goes semi-transparent and quivers as the projectile furnishing passes through her, rattling against a cupboard. \n\nShe vanishes.\n*page_break\n*label she_mad_now\n\nIn a heartbeat, you feel something squeeze your neck. Trifle is behind you. You try to pry her off, unsuccessfully. \n\n\"Tsk, tsk! Very naughty.  We're going to behave while we wait, but I admire your rebellious spirit.\"\n\nYou kick at her, but it only serves to infuriate her more. The demon tightens her hold on your airway. You feel her lips graze your ear.\n\n\"I know that festering pimple is staying with you.  You reek of him.  He must be genuinely desperate.  Vex despises humanity.  He's only exploiting you.\"\n\n*choice\n\t#\"So? Just because he's using me doesn't mean I'm useful.\"\n\t\t*goto so_special\n\t#\"Kiss my ass! I don't want to be exploited by either of you!\"\n\t\t*goto sentimental_type\n\n*label sentimental_type\nYou pant, the pain from her embrace increasing.  \"Besides, he won't waste a rescue effort on me.  I don't think he's the sentimental type.\"\n\n*label so_special\nHer eyes flash again, greedily. \"You're looking at it all wrong.  See, I've never heard of any possession destroying a weapon, even when the demon was potent.  For an imp without powers, you must be a valuable tool, indeed.\"\n\nYou choke, but continue to struggle.  \"I-I'm nobody!\"\n\n*label fight_or_flight\n\n\"Don't be so hard on yourself, my darling. Unlike Vex, I appreciate…human potential. And you're especially special. I just need to find out why.\"\n*page_break\n\nTrifle dissolves into a fine, green particulate, the sharper angles of her features trickling away like falling sand.  The mist envelops you like nerve gas.  \n\nYou sense a foulness climbing into your thoughts. \n*page_break\n\nYou attempt to walk away, or at least support yourself against the table, but your motility is hampered. Every extremity feels heavy and the edges of your vision fade to green, like being pulled under murky lake water. \n\nWhen you do manage to stand upright, you catch a glimpse of yourself in the mirror.\n\nYou look sickly. Small sections of your hair float around your head independently, resembling a gorgon's serpents, but smoldering at the tips. \n\n*choice\n\t#Focus on the darkness and push against it.\n\t\tYou concentrate as hard as you can on fighting that sinking feeling.\n\n\t\t*goto no_way\n\t#Stare into the mirror, transfixed.\n\t\t*goto sinking_feeling\n\n*label sinking_feeling\nYou can't look away, even as your vision fluctuates in and out of focus. A spastic rush jigsaws through your body.\n\nYour reflection goes rigid, wearing an expression of sudden shock. Your pupils dilate until their blackness engulfs your irises and continues to spread, diffusing across the whites of your eyes like an oil spill.\t\n\nThe darkness bores inward, deeper and deeper, cutting through your essence. It feels like a wormhole tearing through your body from another place and time.\n\nIf you don't try to stop it now, you may not have another chance.\n\n*choice\n\t#Snap out of it, before it's too late and fight back!\n\t\tYou shake off the ominous veil that had fallen over your thoughts and renew your concentration. You take a few deep breaths and will Trifle's influence away. \n\t\n\t\t*goto blackness\n\t#Close your eyes and fall into the endless darkness forever.\n\t\t*set bloodthirsty 100\n\t\t*set confidence 0\n\t\t*set sid 0\n\t\t*set vex 0\n\t\t*set elysian 0\n\t\t*set holden 0\n\t\t*set hester 0\n\t\t*goto allgone\n\n*label allgone\n*achieve lookingglass\n\nYou relinquish your unique mortal essence to malevolent possession. It feels like falling backwards into a cold, black pit that has no bottom.\n\nWhile you never see or hear Trifle again, you know a part of her consciousness is still here, trapped with you for eternity. Unfortunately, she was the least of your problems!\n\nAn evil and dangerous secret, lurking within you, awoke when you first met Vex and has been trying to break free ever since. With Trifle's curiosity leading to accidental self-sacrifice when completely combined, it is now powerful enough to take over and bring doom upon all the world, in every dimension.\n\nBefore you're slowly driven mad, you find an odd peace in never learning the terrible fates of your loved ones and other innocents. \n\n[b][/i]THE END?[/b][/i]\n\n----------------------------------\n\n*line_break\n\nYou came so far, but more story awaits! Would you like to try again?\n\n*ending\n\n*label no_way\n\"No…you…don't!\"\n\nIn the edge of your vision, you notice your reflection go rigid. Your pupils dilate until their blackness engulfs your irises and continues to spread, diffusing across the whites of your eyes like an oil spill. You ignore the eerie electric jolts shooting up and down your body.\n\n*label blackness\nAs you inhale, your breath catches in your throat and you gag. A lumpy cloud jettisons from your mouth, flinging a granular e angel and is, instead, discreetly suggesting a retreat.\n\nWith that, the suited figures charge directly through the table and chairs, sending them flying in pieces as they bear down on \n*if (vex_fights=\"true\")\n\tthe three of you. \n*if (vex_fights=\"false\")\n\tyou both. \nTrifle is lost in the chaos.\n\n${e_name} exhales wearily and raises ${e_his} sword. \n*page_break\n\nFeeling faint, you look down and place a tentative fingertip on the swollen patch of mottled flesh visible through a bloody rip in the front of your shirt.\n\n\"Dammit, Roy'll take that outta my paycheck.\"\n\nYou whimper as the room blurs, fireworks whirling into view in front of the skirmish, willing yourself to stay alert and failing.\n\nYou feel tired.\n*page_break Really tired…\n\n*if (vex_fights=\"true\")\n\tAs your eyes start to close, a stinging pain against your cheek jolts them open again. A hazy, red face fills your field of vision.\n\n\t\"Rise and shine, Monkey, or I swear I'll smack you again.\"\n\n\t\"I'm awake, geez! \n\t*if (sarcastic \u003c= 62)\n\t\tDon't hit me!\"\n\n\t*if (sarcastic >= 63)\n\t\tLay off. Haven't I earned my 'Beaten Up' badge for the day?\"\n\n\t\"Good,\" Vex says. \"I need you conscious.\"\n\t*page_break\n\nThere's a loud noise and whoosh of air, like the room is being depressurized. Blinking again, you can't believe it, but the entire back of the house is cleanly gone, like a graphics loading error. \n\nIs this house fake?\n\nYour assailants are nowhere to be seen, but ${e_name} still stands with ${e_his} back to you. \n\n\"${e_name}…?\"\n\n\"I've got them on the run. Get out, now!\"\n\n$!{e_he} turns to smile reassuringly before approaching the gaping hole.\n*if (vex_fights=\"false\")\n\t*goto possessed\n\n*if (vex_fights=\"true\")\n\n\t\"Let ${e_him} deal with the troublemakers, you need to get to safety. Stand up,\" Vex says.\n\n\t*choice\n\t\t#Leave on your own.\n\t\t\t*goto cant_run\n\t\t#Offer to merge with Vex.\n\t\t\t*goto just_do_it\n\n\t*label cant_run\n\tYou don't want to be left vulnerable if the battle finds its way back to you, but the effort burns and leaves your head spinning. \n\n\t\"Nnaaargh…I can't!\"\n\n\tVex smirks. \"Monkey, any second now you're going to be out cold and that won't help me help you. It's time to either fight or run!\"\n\t*goto out_cold\n\n\t*label just_do_it\n\tEvery twitch or movement is agony and leaves your head spinning. There is no way you can pull yourself out on your own, leaving you open and vulnerable if the fight finds its way back to you.\n\t\n\t\"Eh, fuck it. \n\t*if (vex >= 17) \n\t\tI trust you. \n\tJump in.\"\n\n\t\"Monkey, are you saying what I think you're saying?\"\n\n\t\"I'm pretty sure I almost died a minute ago and I'd rather not risk it again. If two is better than one, so be it. Let's please not make a big thing out of this.\"\n\n\tYou'll never be thrilled with the idea of a demon using your windpipe like a water slide, but if he can lend you the strength to get you both out safely one last time and it's on your terms…\n\n\tVex sighs. \"\n\t*if (vex >= 17)\n\t\tI know you hate this and, for that, I'm sorry. \n\tOpen your mouth and say 'Ahh!'\"\n\n*label out_cold\n*page_break\n\nYou don't get the chance.\n\nWith an indignant roar, Maim tears back into what little is left of the kitchen.  She scrabbles around on all fours like a rabid dog, crowned with twisted, black antlers and clumps of knotted fur.  Bits of foam bubble along her overbite as she howls.\n\n\"Don't think you can pawn that stupid angel off on all of us, you filthy, rotten pig excrement!  FIGHT ME!\"\n\nVex yells something, but you're barely coherent.\n\nThe room spins into blackness.\n\n*line_break\n\n*line_break \n\n*finish End of Chapter Five\n\n*label possessed\n$!{e_he}'s buying you some time, but you're too busy drifting in and out of consciousness to take advantage of any kind of escape.\n*page_break\n\nSeveral minutes later, you're still struggling to drag yourself out of the house. The effort burns and leaves your head spinning.\n\nWith an indignant roar, Maim tears back into what little is left of the kitchen.  She scrabbles around on all fours like a rabid dog, crowned with twisted, black antlers and clumps of knotted fur.  Bits of foam bubble along her overbite as she howls.\n\n\"Don't think you can pawn that stupid angel off on all of us! Show me what's inside you! FIGHT ME!\"\n\nYou can barely hear her. \n\nThe room spins into blackness.\n\n*line_break\n\n*line_break\n\n*finish End of Chapter Five\n\n\n", "chap6": "\n*text_image chap6.png center Chapter Six: Hostile Negotiations\n\n\n*set anonymous -3\n\"${name}?\"\n\nIt's painfully bright. You raise a hand to shield your eyes against the light, unable to perceive anything else. Someone tenderly touches you shoulder.  Though bewildered, you feel reassured.\n\n\"You're safe. Think you can stand?\"\n\n*choice\n\t#Yes, you can.\n\t\t*set confidence +1\n\t\t*goto stronger\n\t#No, you're too weak.\n\t\t*set confidence -1\n\t\t*goto feeble\n\n*label stronger\nYou feel stronger already, eager to show the voice what you can do. Picking yourself up, you see your hands first, then your arms and torso, until, at last, the rest of your body comes back into focus.  \n\n*goto its_you\n\n*label feeble\nYou feel weightless and dense at the same time. \n\nLooking around, there's nothing to grab hold of to pull yourself up. That's when you realize you can't see your hands in front of your own face. \n\nYou're invisible!\n*page_break What!?\n\n\"Here, allow me to help.\"\n\nLike a toddler learning to walk under the cautious eye of a caring adult, you're hoisted up from underneath where your arms should be, if they were discernible. After you stand and steady yourself, you watch as your hands reappear, then your arms and torso until, at last, the rest of your body comes back into focus. \n\n*label its_you\n\nYou squint at the encouraging figure before you.\n\n\"${e_name}! Thank goodness.\"\n\nEven in the brightness, you see ${e_him} smiling in the soft way that puts you at ease. $!{e_his} skin looks iridescent.  Staring at the angel, you realize, with awe, that the two of you aren't standing under a bright light. \n\n${e_name} IS the light.\n*page_break\n\n\"W-what's going on?\"\n\n${e_name} forces a laugh.  \"That's…complicated.\"\n\nYou look around, but only grow more confused.  Though you distinctly remember standing, you hover in nothingness.  In every direction, including under your feet, you see white.  \n\nNo ground, no shadows.  \n\n\"Holy shit!\"\n\n\"Yes, something like that,\" ${e_he} concurs.  \"Forgive me. I don't normally do this, but everything had gotten quite out of hand.\"\n\nYou study ${e_him} skeptically, a distrust creeping in that turns down the intensity of the glow around you by a shade.\n\n*choice\n\t#\"Huh? I'm so confused.\"\t\t\n\t\t*goto alright\n\t#\"Oh, no. I've got a bad feeling about this.\"\n\t\t*goto alright\n\t#\"AM I DEAD!?  Aww, that's IT, isn't it!? Game over, man!\"\n\t\t*goto game_over\n*label alright\nThe white space pulsates with your misgivings.  You feel around your chest for the weird injury, but it's not there.  ${e_name} reaches out comfortingly again with both hands, patting your shoulders.\n\n\"Fear not. \n*goto safe_with_me\n\n*label game_over\nThe white space mirrors your distress, pulsating and darkening.  You frantically grope around your chest for the weird injury, but it's not there.  ${e_name} reaches out comfortingly again with both hands, patting your shoulders.\n\n\"Calm yourself. \n*goto safe_with_me\n*label safe_with_me\n*achieve angel\nWe're safe now. You've even experienced something like this before. It may just be…um, different. With me.\"\n\n$!{e_he} smiles timidly.  You look at ${e_him}, then around you again, feeling like you're missing some important clue.\n\n\"For all intents and purposes, I've possessed you.\"\n \n\"No kidding? I was in the dark when Vex was in control.  And I never saw him, but I could kinda hear him or watch through my eyes, like my life was an out of focus movie or something, I think.  I'm still not sure I understand everything that happened when he was inside m—\" \n\nYou hesitate, rethinking your choice of words. \"Uh, I mean…in here.\"\n*page_break\n\n${e_name} nods, empathetic, but with an edge of urgency to ${e_his} voice. \n\n\"Tell me, $!{name}: what is the last event you can recall?\"\n\n\"Trifle wanted to find out why I'm supposed to be 'special,' but it made her mad. Then, you saved me…\"\n\n\"I see,\" ${e_name} says, thoughtfully. \"So your spirit has been exposed to two demons now, this one subsequently more powerful than the last. Surely, that is no coincidence.\"\n\n\"Huh?\"\n\n\"My apologies, I'm just speculating. Was there nothing else?\"\n\n\"I woke up and then…no, wait. I don't know. I remember…anger?\"\n\nThe light dims again, white turning to gray. You're developing a headache.  \n \n\"Yes, that was part of it.\"  ${e_name} cranes ${e_his} neck, concentrating ${e_his} attention upward, and the environment brightens anew.  $!{e_he} leans in closer.  \"The rest might be difficult to hear.\"\n\n*choice\n\t#\"Uh…this is going to be something we can't just forget about and go home, isn't it?\"\n\t\t*goto need_to_know\n\t*if (gender=\"male\") #\"Super. Well, spit it out. I'm a big boy.\"\n\t\t*set sarcastic +1\n\t\t*goto no_going_back\n\t*if (gender=\"female\") #\"Super. Well, spit it out. I'm a big girl.\"\n\t\t*set sarcastic +1\n\t\t*goto no_going_back\n\t*selectable_if ((bloodthirsty >= 16) or (aloof >= 58)) #\"No! Keep it to yourself! Haven't I been traumatized enough?\"\n\t\t*set bloodthirsty +2\n\t\t*set aloof +1\n\t\t*set elysian -2\n\t\t*goto jackass\n\n*label jackass\nEverything looks gloomy. \n\n\"Please keep your obnoxiously beautiful trap shut for one second so I can think!\"\n\n${e_name}'s eyes are wide with surprise at your vitriol. \"I'm sincerely sorry for your discomfort, but I think Vex already made this discovery and kept it a secret, putting all of us in danger. The truth is the first best step to combating it. \n*goto wuh_oh\n\n*label need_to_know\n\"True. I wish it were that simple, but I'm afraid you should know, because it's a secret Vex must have discovered already. \n*goto wuh_oh\n\n*label no_going_back\n\"Good, because I think you should know. It's a secret Vex must have discovered already. \n*label wuh_oh\nI'm fairly certain there is something malevolent sharing your soul.  Commandeering your body was the only way I could contain it after it broke free.\" \n\n\"Y-you make it sound like I hurt someone!\"\n\n\"Yes, it did. As far as I can tell, the imp called Maim is no longer present on any known plane of existence.  Alive or dead. She lunged to attack you, then…vanished into the void of this entity. Before I could intervene.\"\n\nThe area below your feet grows darker, grim streaks swirling together like a funnel cloud. \n\n\"If…next time…could it hurt someone I care about?\"\n\n\"That's a possibility, yes. I'm so sorry.\" \n\nYou are literally reeling in surprise.  Where do you even begin?\n\n*label questions\n*disable_reuse\n*choice\n\t*if (happening=\"true\") #\"Where is it now?\"\n\t\t*goto gone_baby\n\t*if (happening=\"true\") #\"Is it another demon? Where did it come from!?\"\n\t\t*goto not_demon\n\t#\"What exactly happened? What did I do?\"\n\t\t*set happening \"true\"\n\t\t*goto the_happening\n\t*if (vex_fights=\"true\") #\"What about Vex?\"\n\t\t*goto think_of_the_demon\n\t*if (vex_fights=\"false\") #\"How did you even find me?\"\n\t\t*goto demon_outtie\n\t*if (happening=\"true\") #\"I don't know what else to say…\"\n\t\t*goto devastating\n\n*label the_happening\n\"You fell unconscious due to the exertion of your ordeal and…transformed. A blackness spilled out of your eyes and across your body. An absolute lack of any pigment, substance, or light. It wasn't you anymore, not in that instant. Whatever it was felt like a profane abscess in the universe. A phantasm that existed between all dimensions and none simultaneously.\"\n\nYou flash back to your reflection in Trifle's mirror. A sound like rolling thunder percolates in the distance. \n\n\"A profane WHAT!? That sounds HORRIBLE!\"\n\n${e_name} looks more thoughtful than alarmed, but gravely serious. \"A hard truth often does.\" \n*goto questions\n\n*label not_demon\nEven in the center of a burgeoning storm, ${e_name} manages to sound understanding.\n\n\"I've honestly never seen anything like it before. I'm sorry I can't tell you more. But if it's any consolation, I'm sure it's not a demon. It may have been hiding within you for quite a while.\"\n*goto questions\n\n*label gone_baby\n\"It has retreated, but it is still inside you. Look around…\"\n\n$!{e_he} indicates the churning clouds and dark streaks swirling around you.\n\n\"We hold it at bay, even now. I can help, but you need to be strong and steady, as well.\"\n*goto questions\n\n*label think_of_the_demon\n\"Vex alerted me immediately after Maim contacted him and we sought your captors together. I was able to shield him from harm. He's out there, watching over us while I'm here with you. You'll have to be ready to wake up in the material world before we can go anywhere else, ${name}.\"\n*goto questions\n\n*label demon_outtie\n\"I overheard Vex's conversation with Maim and, seeing how disinterested he was in providing assistance, I immediately set out to find you. I expect he is still at your residence, if he hasn't wandered off somewhere on some other errand of deception, which seems unwise, considering.\"\n*goto questions\n\n*label devastating\nYou can no longer hear ${e_name}'s voice over the mounting tumult. The entire area jolts violently, bubbling and hissing like boiling water.  \n\nWithin the turbulence, something big and eerie rises in the distance.  Resembling the crest of an encroaching tsunami, it threatens to engulf you.  \n\nYou have no idea how to stop it.\n*page_break\n\nJust as you're about to be swept up by the invading darkness, you feel strong arms enclose you.  ${e_name}'s head is next to yours and ${e_he} pulls you tightly against ${e_him}.  \n\nYour senses are overwhelmed by a smell that you can't quite define, but that somehow seems to condense everything good and beautiful that you ever remember from your childhood all mixed together, with just a hint of wildflowers.  Despite the cold, metallic appearance of ${e_his} breastplate, the embrace is warm and comforting.  \n\n*choice\n\t#Relax your hands and return ${e_his} hug.\n\t\t$!{e_his} soft yet resolute voice at your ear is as soothing as ${e_his} firm embrace.\n\n\t\t*goto huggles\n\t#Resist ${e_his} attempts to comfort you.\n\t\t*set elysian -1\n\t\t*set aloof +1\n\t\t*goto no_touchy\n\n*label no_touchy\nYou wriggle out of ${e_name}'s grasp. $!{e_he} gazes at you, looking wounded. \n\n\"I'm sorry, I didn't mean…I can't explain everything that's happening to you, ${name}. Not yet. But I promise that, whatever comes, you won't face it alone. Whether you believe you need my help or not.\"\n\n${e_name} hunkers down and raises ${e_his} arms, as if pushing back against a physical wall. Instantly, the tempest dissipates, revealing ${e_his} brilliant white light once more.\n*goto dust_settles\n\n*label huggles\n\"I can't explain everything that's happening to you, ${name}. Not yet. But I promise that, whatever comes, you don't have to face it alone.\"\n\nInstantly, the tempest dissipates, revealing ${e_name}'s brilliant white light once more.\n\n*label dust_settles\n*page_break A Moment Later\n\nThe dust is still settling in the vacant lot that was used for Trifle's captive projection.\n\n*if (vex_fights=\"true\") \n\tVex, with his back to us, studies the scene with a kind of perverse respect. Dobl-Eu-DeFort-E hovers around its master like a hummingbird.\n\n\t\"Damned if I've ever seen anything like it before.\"   \n\n\tVex turns around when he hears the drawing of a long, shivery breath.  On exhale, the lustrous outline of ${e_name} separates from your body in a backward step. $!{e_he} solidifies and continues to support you from behind, grasping your shoulders as you sink gently to the ground.\n\n\t\"About time!  What's the verdict?\"\n\t*choice\n\t\t#Hey, was he actually concerned about you?\n\t\t\t*set vex +1\n\t\t\t*set aloof -1\n\t\t\t*goto buddy_cares\n\t\t#Yeesh. He's always so agitated, even when you're injured.\n\t\t\t*set aloof +1\n\t\t\t*set vex -1\n\t\t\t*goto shut_it\n\t\t#Wow, you still can't believe he showed up at all!\n\t\t\t*set sarcastic +1\n\t\t\t*goto buddy_cares\n\t*label shut_it\n\t*if (vex \u003c 0)\n\t\t*set vex \"0\"\n\t\"I just can't catch a break with you, can I?\" You groan.\n\n\t\"We shouldn't loiter here with big baddies lurking about. Besides, you seem fine to me. Assuming your wild side is back in check?\"\n\n\t$!{e_name} nods. \"Yes. \n\t*goto maim_gone\n\n\t*label buddy_cares\n\n\t\"Aww, buddy. You DO care. I'm touched,\" you groan.\n\n\t\"Don't read too much into it, Monkey.\"\n\n\t\"$!{name_he}'s going to recover. \n\t*label maim_gone\n\tI've subdued its essence the best I can for now, but Maim is gone.\"\n\n\tVex gestures in denial. \"Good riddance.\"\n\n${e_name} steadies you, raising a hand to your cheek like a fretful \n*if (e_gender=\"female\")\n\tmaternal  \n*if (e_gender=\"male\")\n\tfather\nfigure.\n\n*if (vex_fights=\"true\")\n\t\"No,\" ${e_he} presses, \"As in, GONE, gone. Disappeared completely.\"\n\n\tVex remains unconvinced. \"Uh huh. Anyway, I'm pretty sure Trifle got away, too. Others will come. We need to leave, oh, YESTERDAY.\"\n\n\t\"Agreed. At least the destruction seems to have conveniently tidied itself up.  And, Vex?\" $!{e_he} glares at the imp in stern warning, \"Now that we know you latched onto ${name} in a woefully imprudent bid to draw power from whatever is within ${name_him}, I trust you won't withhold any more dangerous information? You both almost paid the ultimate price for keeping it to yourself.\"\n\n\t\"Seriously, dude,\" you cough.\n\n\t\"I liked it better a second ago, when the two of you were still a silent anima of shining energy. Catch!\"\n\n\tToo slow to react, your cell phone bounces off your thigh. \"Ow.\"\n\t\n\t${e_name} sighs. \n*if (vex_fights=\"false\")\n\t\"Oh, hey,\" you groan, pointing to the grass a few feet away. \"My phone!\"\n \n\tOnce assured that you're ready and able, ${e_he} smiles.\n\n\"Let's get you home.\"\n\n*page_break Later\n\n\n\"Don't get mad, but you might have to explain what happened one more time.  You lost me somewhere between a phony customer totally trying to murder you and now we're under house arrest.\"\n\nYou prop your feet up on the coffee table, leaning back into the cushion to roll your head toward your friend impatiently. At least you are feeling clean, refreshed, and recovered back at home. Except for a small bruise, the wound on your chest has miraculously healed.\n\n\"Geez, Sid.\"\n\n\"Good thing ${e_name} stalked you, so ${e_he} could take names and get all up in your biz to fix things. Except for the part where ${e_he} smelled like a kid or whatever. \n*if (relationship=\"true\")\n\tYou got some really gross fetishes.\"\n\n*if (relationship=\"false\")\n\tThat was pretty weird.\"\n\n\"That's not…ugh!\" You close your eyes and knead the lids with you fingertips.  \"Why do you make me regret telling you stuff?\"\n\n*if ((relationship=\"true\") and (sid >= 70))\n\n\tSidney laughs. \"Honestly, I'm just glad you're home safe.\"\n\n\t\"Heh, thanks. Me too.\"\n\t*goto armchair\n\n\n*elseif ((relationship=\"true\") and (gender=\"male\")) and ((sid \u003c= 69) and (sid >= 47))\n\n\tSidney grins mischievously. \"On a scale of one to ten, just how awkward is a metaphysical boner?\"\n\n\t\"You're nasty. And wrong.\" You can't help but laugh.\n\t*goto armchair\n\n\n*elseif ((relationship=\"true\") and (gender=\"female\")) and ((sid \u003c= 69) and (sid >= 47))\n\n\tSidney grins mischievously. \"On a scale of one to ten, just how awkward is a metaphysical lady boner?\"\n\t\n\t\"You're nasty. And wrong.\" You can't help but laugh.\n\t*goto armchair\n\n\n*elseif (relationship=\"false\") and ((sid \u003c= 46) and (aloof >= 58))\n\n\tSidney frowns. \"I dunno, maybe because you used to have a sense of humor? The demon's been a bigger barrel of laughs than you, lately!\"\n\t*goto armchair\n\n\n*elseif (relationship=\"true\") and ((sid \u003c= 46) and (aloof >= 58))\n\n\tSidney frowns. \"I dunno, maybe because you used to have a sense of humor? The demon's been a bigger barrel of laughs than you, lately!\"\n\t*goto armchair\n\n*else\n\tSidney grins mischievously. \"$!{e_name} can meld with my mind any day!\"\n\n\t\"Assuming there's anything in there.\" You can't help but laugh. Sidney smacks you lightly with a pillow.\n\t*goto armchair\n\n*label armchair\n\n\"Don't mind me,\" Vex mutters from the armchair.\n\n*if (vex_fights=\"false\")\n\t\"Whoa,\" you stop him, \"You weren't even around, so you get zero input, you miserable asshat! Don't think I've forgotten that you must have known about this thing the whole time and never told me!\"\n\nYou all straighten up when you hear the door open.  \n*page_break\n\n${e_name} walks in and paces back and forth in front of your couch, ${e_his} hands clasped behind ${e_his} back.  \n\n\"The plan is set. Please believe me when I say that, while there are issues that need to be dealt with immediately, my priority is to protect you.\"\n\nVex sits with his chin propped in one hand, looking apathetic.  Dobl-Eu-DeFort-E and ${cat_name} loll upside-down across his lap, their heads swaying as they watch the deva pace.\n\n\"I dunno,\" you mumble. \"I never asked to be in your paranormal circus and I sure as hell don't want more spectators.\"\n\n\"Probably too late for that,\" Sidney chimes in.\n\n\"No, that's exactly what I'm hoping to avoid. If I can keep everyone focused on the real threat, which appears to be Machination and his followers, then we can deal with your…predicament, away from prying eyes. I've only clued in two associates to keep you safe while I meet with the Council of Elders. Trifle may be a loose cannon, though.\" ${e_name} adds that last part as an afterthought, more to ${e_him}self than anyone else.\n\n\"Why don't you just admit that you have zero control over anything right now,\" Vex says irritably, before turning to you.  \"This is going to detonate, Monkey. The removals are heinous, but no demon or angel has ever been utterly erased from existence. With their heart intact, no less!\"\n\n*choice\n\t#\"Is that true, ${e_name}? Are the angels going to blame me for this?\"\n\t\t*set vex +1\n\t\t*goto rational_e\n\t#\"Spare me your analysis, Vex. This is all your damn fault, anyway!\"\n\t\t*set bloodthirsty +1\n\t\t*set vex -1\n\t\t*goto rampages\n\n*label rampages\n*if (vex \u003c 0)\n\t*set vex \"0\"\n\"…I never went on destructive rampages before you screwed around in my head!\"\n\nVex snorts. \"I suppose that's the thanks I get for saving your life earlier.\"\n\n\"If 'save' means completely ruin, then yeah! Thank you SO much!\" \n\n\"Friends, please!\" \n*label rational_e\n${e_name} sighs. \"I know this 'entity' isn't anyone's fault, unpredictable as it is. But, it emerged and now we all have to deal with it like mature adults, agreed?\"\n\n*if (sid >= 47)\n\tSidney nudges you.  \"$!{e_he} called us mature.\"\n\n\"This is the only solution I can think of that doesn't involve me dragging you before the Council.  We don't have a reputation for being lenient in most cases.\"\n\n\"Yep, they'd probably make an example of you on the spot.\"\n\n\"Vex, that's counterproductive!  As I was saying, I will make them see that we have bigger issues to deliberate.\"\n*page_break\n\nYou drop your head into you hands. \"Guess I don't have a choice. Either way, I'm probably hosed.\"\n\n${e_name} kneels down in front of you.  $!{e_he} pats your arm and smiles.  \n\n\"That's not true! You'll be fine. Have faith. Just like I have complete faith that Shelter and Incandescence can manage any problems that might arise until I get back.\" \n\nThough there is no sound from outside, ${e_he} looks toward the front door. \n\n\"Speaking of which…\"\n*page_break\n\nThe first woman steps in with confidence, wearing a drape coat with wide lapels, her cornrows gathered into a low ponytail.  She pushes a few stray braids behind her shoulder and peers around the room over a sleek pair of glasses.  \n\nAn energetic, petite woman bounds in after her.  Even without the lively entrance, it's hard to miss the vivid make-up, pink hair divided into several spiky buns, and tight, fashionable clothing. She throws her bangled arms around ${e_name}, grinning. \n\n\"El! All right, love? Haven't seen you for yonks!\"\n\n*if (relationship=\"false\") or (sid \u003c= 55)\n\tSidney leans into you and emphatically mouths, \"Dibs!\"\n\n\tYou elbow ${sid_him}, hoping no one else witnessed that exchange.\n\n\"I'm very grateful you're here.\" ${e_name} spreads ${e_his} arms in mutual introduction. \"Everybody, these are the ones I told you about.\" \n\nShelter gives a dignified bow. Incandescence smiles. \n\nYou stand to shake hands. \n \n\"Nice to meet you.  I'm $!{name}, this is Sidney, and I'm not sure if I should bother introducing him, but that's Vex.\"\n\n\"How do you do? Just Candee, if you please.\"\n*Page_break\n\nCandee trots over in her chunky heels to crouch in front of Vex, clucking to herself while she inspects his scar.  \n\n\"That's the sad bugger got sacked, innit?\"\n\nThe demon pouts.  \"Typical.  Birds of a feather flocking together, strutting around like they own the place.  Before you know it, they'll be crapping all over your car.\"\n \n\"Ooo, and cheeky for someone what's made a right hash of things, as well.\"\n\nShelter smirks.  \"We have to babysit the imp, too?\"\n\n${e_name} looks over, almost forlorn. \"Please do.  I just can't trust the little guy to stay out of trouble.\" \n*if (vex \u003c= 8)\n\tYou think you hear ${e_him} whisper, \"And remember, try not to leave him alone with $!{name}.\"\n\n\n\"Very well. I'll put the shield in place as soon as you leave, Elder.\"\n\n\"Perfect! Thanks again. I'd better get going.\" $!{e_he} waves at you and Sidney. \"Play nice! Remember, they're doing us a big favor.\"\n\nWith that, ${e_his} form dissipates in a flash of light worthy of the best cinematic lens flare treatment.\n*page_break\n\nSidney \n*if (relationship=\"false\") or (sid \u003c= 55)\n\teagerly \nbrushes some crumbs off a cushion to make room for Candee while Vex ignores everyone.  \n\nShelter keeps watch from the front of the room.\n\nShoving your hands in your back pockets, you saunter to the window, beside Shelter.  You contemplate the scenic sunset, hoping ${e_name} will return soon.  \n\n*choice\n\t*selectable_if ((aloof \u003c= 48) and (confidence >= 20)) #Express gratitude for their protection.\n\t\t*set aloof -1\n\t\t*set confidence +1\n\t\t*goto thanks_lady\n\t#Awkwardly attempt small talk.\n\t\t*goto gossip\n\t#Stand around, quietly.\n\t\t*set confidence -1\n\t\t*goto troubling\n\n*label troubling\nAfter a few minutes pass, Shelter addresses you, still looking ahead.\n\n\"Is something troubling you?\"\n\nYou…\n\n*choice\n\t#…nod your head \"yes.\"\n\t\t*goto yep\n\t#…shake your head \"no.\"\n\t\t*goto nope\n\t#…shrug your shoulders.\n\t\t*goto ya_got_me\n*label yep\n\"Uh, yeah. What hasn't been troubling, lately? \n*goto on_with_it\n\n*label nope\n\"No, not exactly. Well, nothing you can help with, I guess. \n*goto on_with_it\n\n*label ya_got_me\n\"Well, I guess…no. I don't know. Maybe? \n*goto on_with_it\n\n*label on_with_it\nI mean, all of this is pretty new to me.\"\n\n\"Indeed. Elder Elysian indicated as much.\"\n\n*goto explain\n\n*label thanks_lady\n\nClearing your throat self-consciously, you say, \"I, ah, just wanted to thank you.\"\n\nShelter turns slightly.  \"For what?\"\n\n*if (sarcastic \u003c= 61)\n\t\"Well,
