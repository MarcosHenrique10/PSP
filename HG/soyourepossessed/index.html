<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>So, You're Possessed! — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "soyourepossessed", "title": "So, You're Possessed!", "scenes": {"chap1": "\n*text_image chap1.png center Chapter One: The Fast Track\n\n\nYou smile respectfully, reading the receipt.  \n\n\"Your total comes to $8.15.\" \n\nMrs. Craine opens her faded floral purse and rummages for her wallet while you move the greasy box to your other hand, stifling an impatient sigh.\n\n\"Here you go, um…uh…\" \n\nYou can tell by her labored squinting that she's trying to read your name tag.  \n\nAgain.\n\nShe's a very sweet and loyal customer, but she never remembers you, despite the fact that you've made about a dozen deliveries to this house over the past year and she's always chatty.  You probably know more graphic details about her medical history than your own.\n\nAre you THAT forgettable, you wonder?\n*page_break\n\n*label naming\nBy now, Mrs. Craine should know your name is…\n*choice\n\n\t*disable_reuse #Noel.\n\t\t*set name \"Noel\"\n\t\t*goto recognize_1\n\t*disable_reuse #Kai.\n\t\t*set name \"Kai\"\n\t\t*goto recognize_1\n\t*disable_reuse #Drew.\n\t\t*set name \"Drew\"\n\t\t*goto recognize_1\n\t*disable_reuse #Jules.\n\t\t*set name \"Jules\"\n\t\t*goto recognize_1\n\t*disable_reuse #Taylor.\n\t\t*set name \"Taylor\"\n\t\t*goto recognize_1\n\t*disable_reuse #Lee.\n\t\t*set name \"Lee\"\n\t\t*goto recognize_1\n\t*disable_reuse #Riley.\n\t\t*set name \"Riley\"\n\t\t*goto recognize_1\n\t#Oh, no.  Her vision must be getting much worse, none of these are even close! \n\t\t*goto your_name\n\n*label your_name\n\t\nIf she had on her reading glasses, she'd be reminded that your name is…\n    \t\n*input_text name\n\n*label recognize_2\n\n\"Oh, ${name}, of course!  These old peepers aren't as strong as they used to be, I'm afraid.\"\n\n*choice\n\t#\"Heh, I understand.  It's okay, ma'am.\"\n\t\t*set name \"${name}\"\n\t\t*goto gender\n\t*hide_reuse #No kidding, grandma.  She got it wrong, again!\n\t\t*goto your_name\n\n*label recognize_1\n\n\"Oh, ${name}, of course!  These old peepers aren't as strong as they used to be, I'm afraid.\"\n\n*choice\n\t#\"Heh, I understand.  It's okay, ma'am.\"\n\t\t*set name \"${name}\"\n\t\t*goto gender\n\t*hide_reuse #No kidding, grandma.  She read it wrong!\n\t\t*goto naming\n\n*label gender\nWell, even if she can't read the fine print, she's bound to have noticed that you're…\n*label gender_identity\n*choice\n\t#…a young woman.\n\t\t*set gender \"female\"\n\t\t*set d_gender \"female\"\n\t\t*goto payment\n\t#…a young man.\n\t\t*set gender \"male\"\n\t\t*set d_gender \"male\"\n\t\t*goto payment\n\t*hide_reuse #…an alien from the planet Xzykrpteexh XI.\n\t\t*set sarcastic +1\n\t\tHa! You crack yourself up with that imagination. That would be pretty interesting, if it were true.\n\n\t\tIn your experience, reality is more mundane. As such, you're just…\n\t\t*goto gender_identity\n\n*label payment\n\n\"That's a ten, sweetie.  I just need a dollar back.\"\n\nYou take her payment, pass the food, and pull a fistful of crumpled bills and loose change from your pocket.  You yank out a single and reluctantly present it to her. \n \n\"Enjoy, ma'am.\"  In a rehearsed monotone, you remember to add, \"Thanks for ordering A Pizza This.\"\n  \nNoting the darkening sky above, you walk briskly back to the curb where your rusty car idles. \n \nAt the behest of your employer, a plastic sign on the roof advertises the local pizzeria, featuring a cartoon slice with pepperoni biceps and the prominent tag line \"Try 'A Pizza This' In Your Mouth!\"  \n\nYou promptly detach it, fold it up, and toss it into the back seat for the night. You're not sure why you need it, since business is pretty good and there isn't much competition.\n\nOperating in a tiny, rural college town with limited dining options has its perks.\n*page_break\n\nIt also has some drawbacks.\n\n\"Eighty-five cent tip!  Unbelievable.\"\n\nYou groan as you climb inside the car, closing the door with a hollow clang.  You roll your eyes at the sound of laughter coming from the passenger side. \n\nSidney lounges comfortably, one arm half draped out the open window and one foot resting on the dashboard.\n\n\"Really, eighty-five?  Please tell me she gave it to you all in pennies, too.\" \n\n\"Remind me why I agreed to let you ride along?\"\n\n\"Because misery loves company.  And my sparkling conversation.  Also, I'm bored as hell, with nothing to do until tonight.  You'd be stupid NOT to take me!\"\n\n\"If those are the qualities you list in your online dating profile, it would explain a lot,\" you quip, fastening your seat belt.\n\n\"Low blow!\" Sidney sits up, grinning. \"Last time I checked, I wasn't the only one having a dry spell.  When was the last time YOU hooked up?\"\n\n*page_break \"Touché.\"\n\nSocial situations in general have always caused you some anxiety, never mind romantic ones.  You've had a couple brief relationships, but really wish you were better at…\n\n*choice\n\t#…flirting with men.  Something about being in close proximity to a guy you really like makes your stomach turn into a lump of ice.  Yet, you still somehow manage to sweat profusely in front of him.\n\t\t*set sid_gender \"male\"\n\t\t*set e_gender \"male\"\n\t\t*set e_name \"Eli\"\n\t\t*set relationship \"true\"\n\t\t*set men \"true\"\n\t\t*set women \"false\"\n\t\t*goto friendship\n\t#…flirting with women.  You get so nervous around a lady you're crushing on, you feel like you're making a total fool of yourself.  Usually, right before she confirms that your suspicions are 100% correct.  \t\t\n\t\t*set sid_gender \"female\"\n\t\t*set e_gender \"female\"\n\t\t*set e_name \"Elyse\"\n\t\t*set relationship \"true\"\n\t\t*set women \"true\"\n\t\t*set men \"false\"\n\t\t*goto friendship\n\t#…flirting with anyone.  Rather than multiplying your chances at finding love, it sometimes feels like being attracted across the board has only made you vulnerable to equal opportunity rejection. Not fun.\n\t\t*set sid_gender \"female\"\n\t\t*set e_gender \"male\"\n\t\t*set e_name \"Eli\"\n\t\t*set relationship \"true\"\n\t\t*set men \"true\"\n\t\t*set women \"true\"\n\t\t*goto friendship\n\t#…flirting with spurning the status quo. Whatever your reasons, you're tired of the absurd idea that you need someone else to be complete.  This lone wolf isn't interested in being caged (by society's expectations)!\n\t\t*set sid_gender \"male\"\n\t\t*set e_gender \"female\"\n\t\t*set relationship \"false\"\n\t\t*set e_name \"Elyse\"\n\t\t*set men \"false\"\n\t\t*set women \"false\"\n\t\t*goto friendship\n\n\n*label friendship\n*set meet_sid \"true\"\n*comment Working Pronouns:\n*if (e_gender=\"male\")\n\t*set e_him \"him\"\n\t*set e_he \"he\"\n\t*set e_his \"his\"\n*if (e_gender=\"female\")\n\t*set e_him \"her\"\n\t*set e_he \"she\"\n\t*set e_his \"her\"\n\n*if (sid_gender=\"female\")\n\t*set sid_him \"her\"\n\t*set sid_he \"she\"\n\t*set sid_his \"her\"\n*if (sid_gender=\"male\")\n\t*set sid_him \"him\"\n\t*set sid_he \"he\"\n\t*set sid_his \"his\"\n\n*if (gender=\"female\")\n\t*set name_him \"her\"\n\t*set name_he \"she\"\n\t*set name_his \"her\"\n*if (gender=\"male\")\n\t*set name_him \"him\"\n\t*set name_he \"he\"\n\t*set name_his \"his\"\n\n*if (d_gender=\"male\")\n\t*set d_name \"Holden\"\n\t*set d_him \"him\"\n\t*set d_he \"he\"\n\t*set d_his \"his\"\n*if (d_gender=\"female\")\n\t*set d_name \"Hester\"\n\t*set d_him \"her\"\n\t*set d_he \"she\"\n\t*set d_his \"her\"\n\nNaturally, you wouldn't tolerate being teased about these feelings by just anyone. Sidney \n*if (relationship=\"false\")\n\tfully accepts and respects your choices, but \ncan get away with saying that kind of stuff to your face and more, only because you're best friends…\n*choice\n\t#…from college.  You two really hit it off at orientation, even if your respective academic endeavors did not.  Although you've only known each other a couple of years, it feels like it has been way longer.\n\t\t*if ((name=\"Sidney\") or (name=\"Sid\"))\n\t\t\tThe fact that you became so inseparable while also having similar names was a funny coincidence, though sometimes confusing to tell whose attention was being sought across a crowded room at student gatherings \n\t\t\t*if (sid_gender=\"male\")\n\t\t\t\t(usually his).\n\t\t\t*if (sid_gender=\"female\")\n\t\t\t\t(usually hers).\n\n\t\t*set sid +8\n\t\t*set childhood \"false\"\n\t\t*goto banter\n\t#…since childhood.  You grew up together, went through nature's cruel hazing ritual called puberty together, and, as a result, you'll forever have each others' backs.  And, if not, then plenty of blackmail.\n\t\t*if ((name=\"Sidney\") or (name=\"Sid\"))\n\t\t\tThe fact that you were so inseparable while also having similar names was a happy coincidence that no doubt caused some frustration, or at least temporary befuddlement, among teachers trying to get either one or the other's attention from time to time.\n\n\t\t*set sid +12\n\t\t*set childhood \"true\"\n\t\t*goto banter\n*label banter\n*if ((name=\"Sidney\") or (name=\"Sid\"))\n\t*achieve hasanyonetriedthisyet\nIf you absolutely had to break it down mathematically, taking all the nuanced experiences that have comprised your entire existence thus far, distilling them into strings of cold data, and laying those statistics out before you like a spreadsheet, it would probably look something like this:\n\n*line_break\n[b][i]ME AND MY BORING LIFE[/i][/b]\n*line_break\n----------------------------------\n\nName: $!{name}\n*line_break\nGender: $!{gender}\n*line_break\nAge: 21\n*line_break\nLocation: East Dullnowheresville, U.S.A.\n*line_break\nWealth: Largely Imaginary\n*line_break\nCollege Graduation Date: TBD, Indefinitely\n*line_break\n*stat_chart\n\tpercent Confidence\n\n\topposed_pair Sarcastic\n\t\tSincere\n\topposed_pair Aloof\n\t\tFriendly\n\n\n*line_break\n----------------------------------\n\nAlso, you have a cat, but no real direction in life.\n\nYep. Exciting stuff. \n\nOf course, just because things have been predictably quiet most of the time, doesn't mean there's no possibility for change.\n*page_break Yeah, right.\n\nThe engine creaks in protest as the car pulls away.\n\nWhat starts as a mild shower soon roars into a downpour, so Sidney cranks the window shut, brushing the raindrops off ${sid_his} sunglasses without removing them. \n*if (childhood=\"true\")\n\tFor the last five or six years, \n*if (childhood=\"false\")\n\tFor as long you've known ${sid_him} and probably longer, \n${sid_he}'s prided ${sid_him}self on hardly ever taking them off.\n  \n\"I gotta swing by work to cash out, then I'm done,\" you shout over a thunderclap.  Turning your squeaky wiper blades up to the highest setting, you murmur, \"I dunno why I don't quit this job.\"\n\n\"Because you're lazy.\"\n\n\"I mean, the boss doesn't do anything but sit around, smoking and counting his money, which he barely uses to pay me…\"\n\n\"Because HE'S lazy.\"\n\n\"…and since you got fired for back talking everyone, you're not gonna be able to pay your share of the rent much longer!\"\n\nSidney raises ${sid_his} arms majestically.  \"Because I am Mooch \n*if (sid_gender=\"male\")\n\tKing! \n*if (sid_gender=\"female\")\n\tQueen! \nAnd lazy.\"\n*page_break\n\nAfter a pause, Sidney nudges you affably.  \"Seriously, ${name}, it'll all work out.  Don't worry so much.  We're too young and sexy to worry!\"\n\n\"It's just, I feel like such a loser sometimes.  Like, what am I even doing with my life?  What are WE doing with OUR lives?\"\n\nSidney counts down each activity on ${sid_his} fingers.  \"Weeeeell, the plan is we're going over to Jorge's place later to hang out with some peeps, watch crappy horror movies, and game.  First, we need snacks.\"  \n\nWhen you side eye ${sid_him}, ${sid_he} shrugs.  \"What?  Baby steps.  We'll deal with the future in the future.  My immediate concern is that I'm hungry.\"\n\nSidney can be a dork, but ${sid_he}'s your dork, and you know ${sid_he} means well. \n*page_break\n\nHonestly, you're not sure you'd be going tonight if it wasn't for ${sid_him}, because you don't know this group very well. Unlike you, Sidney is pretty sociable, with the kind of playful, laid-back personality that people tend to gravitate toward. \n*if (relationship=\"true\")\n\t$!{sid_he} can be ridiculously charismatic when ${sid_he} wants to and it's almost mesmerizing to watch ${sid_him} work a room.\n\n\nWhereas, you…\n\n*choice\n\t#…protest on the outside, but secretly love it. $!{sid_he} has all the party connections you could never make. Even if you sometimes have to rely on Sidney for social cues and live vicariously through ${sid_his} antics, there's never a dull moment and you hate feeling left out.\n\t\t*set aloof -6\n\t\t*set sid +4\n\t\t*goto puppy_eyes\n\t#…feel totally out of your element in a large gathering, but manage to enjoy yourself. Sidney's been gently encouraging you to spread your wings and meet more people, and you appreciate it. You wish talking to people felt as easy for you as ${sid_he} makes it seem.\n\t\t*set aloof -3\n\t\t*set sid +2\n\t\t*goto puppy_eyes\n\t#…would rather stay in and relax with a book or play your favorite video games. Sidney's been forcing you to meet new people, but you wish ${sid_he} would let you do your thing instead of pushing so hard. Sidney mistakenly believes that just because ${sid_he} loves a good party, you do, too.\n\t\t*set aloof +4\n\t\t*set sid -4\n\t\t*goto puppy_eyes\n\n*label puppy_eyes\n\nSidney's puppy dog eyes and insistence that ${sid_his} stomach is going to devour itself brings your attention back to the matter at hand.\n\n\"All right, I get it.  I'll stop complaining.  But I am NOT eating A Pizza This again, discount or no, so we'll have to pick something up on the way.\"\n\nSidney raises ${sid_his} arms gleefully for a second time and you zone out to the rhythmic pounding of the rain as your car roars down the glistening road toward the promise of extra spicy chips and ultra-caffeinated, sugary beverages.\n\n*line_break\n\n*page_break Later\n\n*set meet_d \"true\"\nYou pull into the 24-hour WallGredes at dusk and dash inside to avoid getting soaked.  You're so busy jumping over the huge puddles churning in the parking lot that you almost don't notice yours is the only car there.\n\nThat's weird, even for a stormy weeknight.\n\nA familiar chime from the entrance heralds your arrival, along with another crescendo of thunder. You shake off the water and wipe your shoes on the mat.\n\nSidney makes a beeline for the chips and dip.  Casually browsing, you come across the only clerk on duty, bent over a crate of laxatives near the pharmacy. \n\nIt's ${d_name} Smiley.\n\nYou had a handful of classes with ${d_him} and, from what you remember, ${d_his} family runs this place. So, you…\n\n*choice\n\t#…go ask how ${d_he}'s doing.\n\t\t*set aloof -4\n\t\t*set confidence +2\n\t\t*set holden +7\n\t\t*set hester +7 \n\t\t*goto friendly_d\n\t#…pretend not to notice ${d_him}.\n\t\t*set aloof +2\n\t\t*goto unfriendly_d\n\n*label unfriendly_d\nYou know that ${d_name} is even less of a social butterfly than you, a kind of weirdly silent type.  \n\nYou tell yourself that ${d_he} probably doesn't want to talk to you, anyway. ${d_name} and Sidney never really got along that well, either, so maybe it's best to avoid a potential conflict.\n\nInstead, you find Sidney perusing the candy aisle and join ${sid_him} in debating the edibility of black versus red licorice.\n\n*goto huh\n\n\n*label friendly_d\n\n\"Uh…hi,\" you say. $!{d_he} had to have heard you come in and you figure it'd be impolite not to acknowledge ${d_him}, especially if ${d_he}'s going to ring you up later.\n\n\"Whatever,\" ${d_name} drawls, not looking up from ${d_his} task.  \n\n\"Oh, HEY, Smiles!  How's tricks?\" Sidney, sauntering up behind you, casually props an elbow against your shoulder, resting ${sid_his} cheek in ${sid_his} palm to grin down at ${d_name}.\n\n${d_name} continues to stock the shelf, repeating, \"Whatever.\"\n\n\"Yeah, cool. SEE YA,\" Sidney hollers, already pulling you away to check out the candy aisle. ${d_name} is one of the few people you know that seems even more socially awkward than you, so you feel bad for ${d_him}. \n\n\"I really don't know why you have to be so rude sometimes, Sid.\"\n\n\"Meh, it's all part of my charm.  Ooo, look, licorice!\"\n*page_break\n\n*label huh\n\nSoon after, the entryway peals again.\n\nA young girl steps in.  With blank expression and ruffled dress, she resembles a living porcelain doll.  Under one arm, she clutches a strange stuffed animal.  \n\nShe moves languidly through the store, almost gliding over the linoleum, not looking at anything in particular. ${d_name}, unpacking the last of the boxes, noticeably shudders as she passes by.\n\nNo umbrella and not a speck of water on her.\n\nWhat parent lets their child wander through a drugstore alone at night?\n\n*page_break\n\nAs quickly as you noticed her entrance, you're already forgetting the details. Your recollection is hazy…\n\nUm, what kind of stuffed animal was she holding, again?\n\n*choice\n\t#A white rabbit. Definitely, definitely a rabbit.\n\t\t*set animal \"rabbit\"\n\t\t*goto forgetting\n\t#No, a panda bear.\n\t\t*set animal \"panda\"\n\t\t*goto forgetting\n\t#Or was it a toad?\n\t\t*set animal \"toad\"\n\t\t*goto forgetting\n\t#Maybe a fox.\n\t\t*set animal \"fox\"\n\t\t*goto forgetting\n\t#It could have been a three-winged, purple polka-dotted platypus for all you can remember.\n\t\t*set animal \"platypus\"\n\t\t*set sarcastic +2\n\t\t*goto forgetting\n\n*label forgetting\n\nMore importantly, where did she disappear to?\n\n*line_break\n\nWho was…wait, what were you doing…?\n\n*line_break\n\nAh, yes, you and Sidney are ready to buy the huge assortment of goodies you have gathered and be on your way!\n*page_break Right!\n\nYou approach the checkout counter. You're sure ${D_name} knows you're ready. Probably milling around the back of the store finishing inventory, but it shouldn't be too long before ${d_he} makes ${d_his} way up front.\n\nSidney impatiently checks the time on ${sid_his} phone. You're running a little late, but you reassure ${sid_him} that if you leave soon, there's still plenty of B-movie zombie goodness and friendly competition to be had.\n\nInstead, you continue to wait. And wait. And keep waiting…\n*page_break\n\t\t\nIt's all very exciting.\n\n*page_break Ugh.\n\nYou've been standing at the empty register for almost fifteen minutes. Sidney sits cross-legged on the counter next to a bar code scanner, cradling ${sid_his} precious snacks and drink bottles, but looking more incensed by the second. You flip halfheartedly through a trashy tabloid magazine.\n\n\"Hurry it up, Smiles, we haven't got all night!  Me and my compadre got places to go, things to do, V.I.P. and all that. Chop, chop!\"\n\nFrom some concealed area of the store you hear an indifferent, \"Whatever.\"\n\n\"Awesome,\" you grouse. Guess you managed to offend ${d_name}, after all. Or maybe ${d_he}'s never really liked you. \"Should we go talk to ${d_him}?\"\n\nSidney grimaces. \"Whaaateverrrrr.\" A failed attempt to imitate the store clerk that makes you chuckle, nevertheless.\n\nSeriously, though, where is ${d_name}? \n*page_break\n\nSidney jumps down and starts stomping in the general direction of the storeroom.\n\n\"That's IT! What do you think they pay you for!? So help me, I will find a way to report you to a manag…\" \n\n$!{sid_he} trails off, mid-rant, looking confused.\n\n*choice\n\t#\"Did you realize how ironic it is that you're lecturing others about quality customer service, too?\"\n\t\t*set sarcastic +4\n\t\t*set sid +1\n\t\t*goto wtf\n\t#\"Sid? Are you okay?\" It's usually much harder to stop ${sid_him} once ${sid_he} gets on a roll like that. \n\t\t*set sarcastic -2\n\t\t*set aloof -1\n\t\t*set sid +2\n\t\t*goto high_road\n\n*label high_road\nIgnoring the irony of ${sid_his} complaints, you put down your magazine and realize something is wrong. \n*goto wtf\n\n*label wtf\nThere's an odd static feeling in the air. \n\nIs something humming? Are the walls vibrating?\n\nThe fluorescent lights flicker.\n*page_break What the…\n\n*label explosion\n\n*line_break\n\n[b][i]BOOOOooOOoOooOOOoooOoOOooOOOM!!![/i][/b]\n\n*line_break\n\n*page_break …FUCK!?\n\nA massive explosion from the rear of the building shakes the foundation and sends merchandise flying in all directions.  The shelving units lining the back wall collapse into one another like dominoes.\n  \nHaving tumbled behind the counter during the blast, you pull yourself up and peer cautiously over the edge. \n\nSidney coughs.  $!{sid_he}'s not far from you, waving ${sid_his} arms at the cloud of debris wafting across the storefront.  \n \nFrom somewhere further in, you hear ${d_name} yell, \"I'm not fixing that!\" $!{d_he} sounds hoarse and far away.\n\nWhat should you do?\n\n*choice\n\t#Look for a way out.\n\t\t*set aloof +2\n\t\t*goto demons\n\t#Check on Sidney.\n\t\t*set sid +1\n\t\t*goto demons\n\t#See if ${d_name} is hurt.\n\t\t*set hester +1\n\t\t*set holden +1\n\t\t*goto demons\n\n*label demons\nBefore you can act on any plans, you're distracted by the sound of movement. Lots of movement.\n\nAnd then your brain has to completely reboot, because it is really, REALLY difficult for you to connect words and emotions to the insane spectacle flooding your senses when the dust settles.\n*page_break\n\nA woman with emerald skin and large horns curling back from her temples stands gloating in the crater where the \"Employees Only\" door used to be. Her platinum hair isn't cut so much as the ends gradually dissolve into a rippling green and black mist around her shoulders. \n*if (animal=\"rabbit\") or (animal=\"fox\")\n\tSomething with claws writhes grotesquely at her feet, screeching in a mass of fur and spittle.\n\t*goto vex\n*if (animal=\"panda\")\n\tSomething black and white writhes grotesquely at her feet, growling in a mass of fur and spittle.\n\t*goto vex\n*if (animal=\"toad\")\n\tSomething bumpy and brown writhes grotesquely at her feet, croaking in a squelching pile of slime.\n\t*goto vex\n*if (animal=\"platypus\")\n\tSomething dark and speckled flops around grotesquely at her feet, growling and flapping, glistening with slime.\n\n*label vex\n\nIn the middle of the greatest concentration of rubble, a small, red creature pushes itself out from under a heap of adult undergarments.\n\nYou must have hit your head when you fell.\n*page_break Hard.\n\nThe green lady speaks first and the words roll off her tongue in a melody that is smooth yet venomous. \n*if (women=\"true\")\n\tIt draws you in before you realize you're probably staring too hard. You're pretty sure you've never been terrified AND a bit aroused at the same time before and you don't know how to feel about this new development. But, if she's as dangerous as she seems, reason dictates you should probably ignore it.\n\n\n\"You never were the most powerful one, Vex, my darling, but you could always take a hit.  Why don't you just agree to be my minion and this can all be over?\"\n\nYou assume that red creature is the \"Vex\" she is referring to, because it flicks its whip-like tail and laughs defiantly in response. \n\n\"I'd rather die!\" It has a surprisingly deep voice.\n\nShe scoffs and smiles, as if this is all part of a dance that is rather beneath her. \n\n\"If you insist.\"\n*page_break\n\nShe crosses her arms as the monstrous…well, \n*if (animal=\"panda\")\n\tit sort of looks like a mutated panda? Uh, THAT gross, drooling thing, it puffs out its barrel chest and saunters forward on stout hind legs.  Its thick fore claws swell into large, hairy maces that it brandishes  \n\t*goto yanked\n*if (animal=\"rabbit\")\n\tit sort of looks like a mutant Easter bunny? Uh, THAT gross, bucktooth thing, it puffs out its fluffy chest and saunters forward on muscular hind legs, long ears twitching.  Its white fore paws swell into large, hairy maces that it bounces  \n\t*goto yanked\n*if (animal=\"fox\")\n\tit sort of looks like a mutated fox? Uh, THAT gross, snarling thing, it puffs out its hairy chest and saunters forward on sinewy hind legs, copper tail snapping back and forth.  Its furry fore paws swell into large, fuzzy maces that it twirls \n\t*goto yanked\n*if (animal=\"toad\")\n\tit sort of looks like a mutated toad? Uh, THAT gross thing with its long, sticky tongue hanging out, it puffs out its coarse chest and saunters forward on muscular hind legs.  Its webbed fore claws swell into large, knobby maces that it waggles  \n\t*goto yanked\n*if (animal=\"platypus\")\n\tnobody is going to believe you in a million years, but it looks like a three-winged, purple polka-dotted platypus! THAT duck-billed thing, straight out of a kaleidoscopic nightmare, puffs out its sleek, spotted chest and waddles forward, tri-wings flapping.  Its fore feet swell into large, webbed maces that it jiggles  \n\t*achieve purple\n*label yanked\nthreateningly in Vex's direction. \n\nWhatever it's actually supposed to be, it looks pissed.\n\nYou're processing all this when you're abruptly yanked backwards.\n*page_break\n\nThe unexpected tumble makes you yelp in surprise.\n\n\"Shh!\" Sidney has your sleeve in a death grip, the other hand holding a finger over ${sid_his} lips.\n\nYou recover your wits and nod, \n*if (relationship=\"true\") and (sid >= 58)\n\tfeeling more grateful and relieved to see ${sid_him} than you've ever been. \n\t*goto whisper\n*else\n\ta wave of relief washing over you. \n\t*goto whisper\n*label whisper\nYou whisper as quietly as you can.\n\n*choice\n\t#\"Come on, we need to get the hell outta here!\"\n\t\t*set aloof +1\n\t\t*goto phone\n\t#\"We need to grab ${d_name} and get the hell outta here!\"\n\t\t*set d_rescue \"true\"\n\t\t*set aloof -1\n\t\t*set hester +2\n\t\t*set holden +2\n\t\t*goto phone\n\t\t\n*label phone\nIt's Sidney's turn to nod, then ${sid_he} leans in close. \n*if (relationship=\"true\") and (sid > 60)\n\tYou can feel ${sid_him} breathing hard against your ear. It's strange to think your rock solid support system might actually be as scared as you.\n\n\"We should call the police, too. I lost my phone in the blast and it got totally jacked. Do you have yours?\"\n\n*choice\n\t#You do! Yay!\n\t\t*goto you_do\n\t#You don't! It's in the car.\n\t\t*goto you_don't\n*label you_do\nYou eagerly reach into your pocket and pull it out.  Sidney is right, this is a job for people who get paid to wear riot gear, not you.\n\nAs the screen illuminates, you both frown. No reception.\n\n*label you_don't\n\nFat lot of good that's going to do, then.\n*page_break Poop.\n\nYou can still \n*if (d_rescue=\"true\")\n\tfind ${d_name} and \nmake a break for it. You tell yourself that it's probably better to call for help from a secure location, anyway. You hear sounds of a struggle from the other side of the register.\n\nSidney looks around to survey your options, then beckons you to sneak out ahead of ${sid_him} while ${sid_he} follows close behind. The two of you round the corner and creep along the wall. \n\n*if (d_rescue=\"true\")  \n\tHeading toward the pharmacy, you scan the ground for signs that ${d_name} might be trapped somewhere. \"Psst, ${d_name}! Where are y—\"\n\nThere's another crash. You cringe, then open your eyes one at a time. \n*page_break\n\nSidney, not expecting you to stop so quickly, almost trips over you, then follows your gaze.\n\nIn the course of their feud, the three combatants have scuffled right down the aisle in front of you.\n\nUnfortunately, the sound of stumbling humans mere yards away has not escaped their notice, and you are all making uncomfortable eye contact with one another.\n*if (childhood=\"false\")\n\tIt's the harshest stare down you've been on the receiving end of since that time Jesse Butler pantsed you in the middle of 8th grade gym class. Except deadlier, probably.\n\n*if (childhood=\"true\")\n\t\n\t\"We haven't been stared at this hard since that time Jesse Butler pantsed us in the middle of 8th grade gym class,\" Sidney deadpans, softly.\n\n\tUnder normal circumstances, you appreciate ${sid_his} use of humor as a coping tool, but right now…?\n\nYou feel frozen in place.  \n*page_break\n\nNone of them look too thrilled about your intrusion, but you really don't like the way that Vex character is sizing you up, in particular. \n\nIt smiles.\n\nA moment later, Vex salutes the woman and her gruesome pet, then jumps over a pile of crushed prophylactics and starts running.\n\nStraight.\n\nAt.\n\nYOU.\n\n*page_break\n\nAs often happens when you know something bad is about to go down, the passage of time feels like it decelerates to a crawl. This gives you a moment to grasp what's going to happen, without being able to react quickly enough to stop it.\n\nMeanwhile, Vex runs FAST.\n\n[i]Funny[/i], you manage to think, [i]it can't be much more than two feet tall…[/i]\n*page_break\n\nLike that, Vex is already scrabbling up your body. Within a fraction of a second, despite appearing physically impossible, it dives into your mouth.  \n\nSidney can only produce a string of nonsensical, stammering syllables while you both swipe at the crimson blur assaulting your esophagus, but it's no use.  You reflexively inhale, clutching your neck, and stagger around, as Vex's backside dangles between your straining lips.\n\nIt makes one more push, causing you to gag and then swallow.  The thin, red legs vanish inside you with a massive gulp.\n\nSidney, grasping at ${sid_his} scalp like ${sid_he}'s going to tear out ${sid_his} hair, is shrill with bug-eyed horror at what ${sid_he}'s witnessed. \n\n\"DID YOU JUST FREAKING EAT THAT THING?\"\n*page_break\n\nThat's the last clear memory you have before agonizing pain racks your body and you pass out.\n\n*line_break\n\n*line_break\n\n*finish End of Chapter One \n", "chap2": "\n*text_image chap2.png center Chapter Two: Scream Building Exercises\n\n\n*achieve hellwithin\nWe hold our stomach, hunched over and shuddering.\n\nOur guttural coughs subside into shallow breaths, until we fall silent.\n\nYour spirit has been subdued.\n\nWe flex your fingers experimentally. My claws have transferred over nicely. Running our hands over our forehead, we can feel two small horns jutting out from the brow.\n\nThe other human, the peculiar \n*if (sid_gender=\"female\")\n\tmaiden \n*if (sid_gender=\"male\")\n\tfellow \nwith rectangles of black glass concealing ${sid_his} eyes, apprehensively taps us on the back. For comfort? For attention? Hard to tell with you simians. \n\nAll ${sid_he} can manage to whisper in between gasps is, \n*if (gender=\"male\")\n\t\"Dude…\" \n\n*if (gender=\"female\")\n\t\"What even…\"\n\nPathetic.\n\nBut, my gamble paid off. This vessel is acceptable.\n*page_break \n\nTrifle materializes behind us.  \"Crude, but functional.  I'm almost impressed.\"\n\n\"Ahh!\" The glass-eyed monkey dives away in fright.\n\n\"Such entertaining animals,\" she purrs as we watch ${sid_him} scamper off, before she turns her attention back to us. She drinks in the details of our new form.\n\nWhen I manipulate your speech functions, we smirk.  \"A tad clunky, but they have their uses.\"  \n\n[i]NO![/i] You shriek inside our head. [i]Get out of MY body![/i]\n\n*fake_choice\n\t#Fight!\n\t#Scream!\n\t#Run!\n\nFor a brief moment, your muscles tense against me, but I quickly shrug it off.\n*page_break\n\nTrifle seems to be calculating whether to strike, in light of my recent acquisition.\n\n\"Last chance to change your mind,\" she coos.\n\nWe shake our head with finality. \"No.\"\n\n\"Pity.\"\n\nHer \n*if (animal=\"rabbit\")\n\trabbit \n\t*goto weapon\n*if (animal=\"panda\")\n\tpanda \n\t*goto weapon\n*if (animal=\"toad\")\n\ttoad \n\t*goto weapon\n*if (animal=\"fox\")\n\tfox \n\t*goto weapon\n*if (animal=\"platypus\")\n\tplatypus \n\t*goto weapon\n*label weapon\nsquats down, brandishing its deadly appendages above its head as it lunges at us.  \n\nWe immediately focus on the incoming assault.  Crouching down for momentum, our fist catches it in a devastating uppercut. We put way more power behind it than I expected.\n\n\n[b]SMASH![/b]\n\n\nThe animalistic weapon disappears in an explosion of broken ceiling panels.   \n\nI hide my excitement. \n\nThis vessel is so much more than acceptable.\n*page_break\n\n*set smashed \"true\"\nIt's unusual to deliver an attack that potent from within a human, but it should be impossible without my powers to supplement it.  \n\nIn a standard possession, the person's will is present yet submissive. This time, however, it feels like something else is lurking in here with us and it's…pleased?  Aggressive?  Not another demon, and yet—  \n\n\"Oh, my baby!  Look what you did!\"\n\nTrifle gawks at the hole blasted above us. Ha! She actually looks desperate. Fuming, she turns on her heel and advances menacingly, claws extended. \n\n\"I guess it's just you and me now, darling,\" she growls.\n*page_break\n\n\"That's what you think, 'darling!' Eat wood!\"\n\nThe glass-eyed monkey has returned, running at full speed. $!{sid_he} launches ${sid_him}self off an upended ATM to deliver a theatrical, flying swing to Trifle's head with a baseball bat. A foolhardy, if somewhat admirable, gesture.\n\nTrifle absorbs the force of the blow entirely, shattering the wooden implement and stopping ${sid_him} cold.  \n\n\"How dare you touch me, primate scum!\"\n\nShe slaps ${sid_him} so hard that the human goes rocketing into one the few displays left standing.  \n\nIt topples onto ${sid_his} limp body.\n*page_break\n\nYou saw that. \n\nYou feel paralyzed, woozy, and helpless, but you saw that.\n\nSidney got hurt. \n\nThat makes you very, very, very angry.\n*page_break \"Ggrrraaaaagggh!\"\n\n*set bloodthirsty %+75\nI feel the resolve inside you resurface, galvanized by consuming wrath.  From inside us, something savage calls out and I feel my dominance fail for a moment.\n\nLong enough for the other presence to act.  \n\nWe are already moving before I can comprehend what is happening, though I am vaguely aware of our hands closing around Trifle's neck with enough vigor to lift her off her feet…\n*page_break A Moment Later\n\nWhen I regain full control from this state of blind rage, I recognize our outstretched arms, elbow deep in drywall, still firmly gripping Trifle.\n\nWe lick our lips and find our tongue running along a fresh set of fangs, jammed alongside the human teeth.  It is difficult for me to discern where my influence ends and this impulse within you begins, but I don't mind. Whatever this manifestation means, our combined ability is exhilarating.\n\nTogether, we revel in the joy of violence.\n*page_break\n\nWe suddenly find ourselves soaring upside-down across the store, sent reeling by an unknown agent.  After flipping around in midair, we land lithely on our feet.  I am delighted by the comfort and speed with which your physique reacts without my direct influence. It's like inhabiting my own bodyguard.  \n\n\"Nice try. Not only is this monkey tougher than ${name_he} looks, ${name_he}'s nimble, too.\"\n\nThe ${animal}, visibly damaged with brightly glowing fissures running from head to toe, positions itself protectively in front of its mistress.  Trifle groans and dislodges herself from the wall, her half vaporous hair a matted, powdery mess.\n \n\"That,\" she snarls, \"will cost you.\"\n\nThe \n*if (animal=\"rabbit\")\n\trabbit's \n\t*goto canons\n*if (animal=\"panda\")\n\tpanda's \n\t*goto canons\n*if (animal=\"toad\")\n\ttoad's \n\t*goto canons\n*if (animal=\"fox\")\n\tfox's \n\t*goto canons\n*if (animal=\"platypus\")\n\tplatypus' \n\t*goto canons\n*label canons\nbulbous fists double in number as another pair of arms springs from its back.  With a rapid series of heaves, each extremity shoots out like a fettered, organic cannon ball.\n\nWe reflexively evade each attack: sidestep two projectiles, smack the third away effortlessly, and spin on one foot to narrowly dodge ou want to live!\n\t\t*goto victory\n\t#Yes, you are sure. The world sucks and you are utterly alone.\n\t\t*set bloodthirsty 100\n\t\t*set confidence 0\n\t\t*set sid 0\n\t\t*set vex 100\n\t\t*set meet_vex \"true\"\n\t\t*goto possessed\n\n*label possessed\n*achieve lostlife\nConvinced that your situation is completely hopeless, you relinquish your unique mortal essence to demonic possession. Vex is perfectly content to joy ride your bones and unlock all your secrets without you until even he can no longer extricate himself if he tried, leaving you to stew inside your own mind.\n\nYou never see Sidney or anyone else that was important to you ever again.\n\nAt least you're too busy slowly going insane to care about what atrocities are being committed under your former identity! \n\nAs time passes, your ability to tune in to the outside world decreases substantially, until, at long last, even the dark force still wearing your corpse forgets that you, as an individual, ever existed at all.\n\n[b][/i]THE END?[/b][/i]\n\n----------------------------------\n\n*line_break\n\nSurely, there is more of your story to tell than that! Won't you play again?\n\n*ending\n\n*label victory\nYou haven't had much success overshadowing Vex through sheer power of will, but if it hijacked you manually, maybe you can take it out that way, too. \n\nIf you concentrate, you think you can remotely command one of your limbs. \n\nHere goes nothing…\n*page_break\n*set bloodthirsty %-98\n*set meet_vex \"true\"\n*achieve movingout\nYou land a few well-placed blows, punching yourself in the stomach. \n\nIt works!\n\nYou dry heave and finally retch, expelling the slobbery demon. Your composure comes back to you in hard, burning jolts. You feel uncoordinated and weak, wiping an errant string of blood-tinged saliva on your sleeve. But, you did it! You are free.\n\nStruggling to speak, you make as if to lunge at Vex.  \n\n\"You cr-crazy, pint-sized shhhi—aargh!\" A spasm of pain makes you double over.\n\n
