 even find humor in it.  That has to count for something.\"\n\n\"So, if jokes alone could stave off impending doom, we'd be set.\"\n\n\"Your biggest weakness is pessimism.  You'll damn yourself before anyone else can with a negative attitude.  I know it's an old platitude, but you should always try to look on the bright side. And trust me, there is ALWAYS a bright side, no matter how elusive.\"\n\n*if (sarcastic >= 62)\n\t\"Hooray.\"  You raise your hands in mock celebration.  \"I am host to the epitome of death and destruction, but at least I can wake up tomorrow and deliver pizzas!\"\n\t*goto exactly\n\n*if (sarcastic \u003c= 61)\n\t\"So, I'm just supposed to act like nothing has changed and appreciate working some crummy job?\"\n\n*label exactly\n\n\"From what I understand, humans adore their pizza.  You're providing a great service.\"\n\nYou snort and contemplate Shelter with new appreciation, unsure of whether or not she's being facetious. Then, it occurs to you that, after already clocking in late, you never came back from your delivery today. \n\nDo you even have a job to go back to? \n*page_break \"Dang.\"\n\nThe angel stretches an arm toward the inside of the apartment.\n\n\"You are surrounded by individuals who appear ready to fight and protect you, regardless of what you think of yourself or the odds of success.\"\n\nSidney cheers and claps like an excited child.  Candee sits serenely next to ${sid_him}, pink hair glowing white hot, each bun blazing like a miniature spotlight.  The air around her head ripples with heat.  When she blinks, it's apparent her eyes are exuding their own light, as well.\n\nYou smile sadly at them.  \"That's just it.  My problems are bad enough.  I'm not comfortable dragging anyone down with me, too.\"\n\n\"I'm not sure that's how life works.  Even the demon seems to want to be here.  Any of us could leave if we didn't.\"\n\nTee-heeing, Sidney gingerly pokes at Candee's sweltering hair, which has dulled to rosy embers.  Vex covers his face with his palm.\n\n*if (sid \u003c= 48) \n\t\"Yeah, maybe,\" you say, but the uncertainty in your voice betrays you.\n\n\tShelter resumes her lookout. \"You know, if I could choose anyone to have my back, I'd want it to be Elder Elysian. The rest…I leave you to navigate as you feel is necessary.\"\n\t*goto your_move\n\n*elseif (kiss_sid=\"true\") or ((sid >= 69) and (relationship=\"true\"))\n\t\"You're right. I should make the most of this. Stop taking everything for granted. Be the person…\" \n\n\tThoughtfully unable to take your eyes off Sid, you shake your head to break the trance and state, \"I want to live up to the potential they see in me.\"\n\t\n\tShelter resumes her lookout. \"That sounds more like it.\"\n\t*goto your_move\n\n*elseif ((sid >= 65) and (relationship=\"false\"))\n\t\"You're right. I should make the most of this. Stop taking everything for granted. Could be worse, right?\"\n\n\tShelter resumes her lookout. \"Even it did get worse, if I could choose anyone to have my back, I'd want it to be Elder Elysian.  You're in excellent hands.  Don't worry.\"\n\t*goto your_move\n\n*else\n\tShelter resumes her lookout. \"Besides, if I could choose anyone to have my back, I'd want it to be Elder Elysian.  You're in excellent hands.  Don't worry.\"\n\t*goto your_move\n\n*label your_move\n\nShe's certainly given you plenty to think about.\n*page_break\n\n*label talking_time\n*if (kiss_sid=\"true\")\n\tWith the excitement over Candee's unique coiffure extinguished, you approach the couch.\n\n\t\"Um, hey, Sid. Think we could have that talk, now?\"\n\n\t$!{sid_he} grins, looking relieved. \"Anything for you. Excuse us, Candee.\"\n\n\tYou lead ${sid_him} down the hall and into your bedroom, closing the door.\n\n\t\"So, about this morning…\"\n\t*goto choice_1\n\n\t*label choice_1\n\t*choice\n\t\t#Express the growing romantic feelings you have toward Sidney.\n\t\t\t*set confidence +1\n\t\t\t*set romance_sid \"true\"\n\t\t\t*goto u_sure_bro\n\n\t\t#Apologize for the kiss and move on, just as friends.\n\t\t\t*set sid -2\n\t\t\t*set romance_sid \"false\"\n\t\t\t*set sex_sid \"false\"\n\t\t\t*goto nevermind\n\n*if ((relationship=\"true\") and (sid >= 68)) and (kiss_sid=\"false\")\n\tWith the excitement over Candee's unique coiffure extinguished, you approach the couch.\n\n\t\"Hey, Sid. Can we talk?\"\n\n\t$!{sid_he} grins. \"Anything for you, home slice. Excuse us, Candee.\"\n\n\tYou walk to the hallway. Sidney follows and looks at you, expectantly.\n\n\t\"So, whats up?\"\n\n\t*goto choice_2\n\n*if ((sid \u003c= 46) and (aloof >= 59)) and (kiss_sid=\"false\")\n\tWith the excitement over Candee's unique coiffure extinguished and your conversation with Shelter stalled out, Sidney gets up and walks over to you.\n\t\n\t\"Hey, ${name}, do you think we could have a quick word? In, uh, private?\"\n\n\t\"Oh, um…yeah, sure.\"\n\n\tYou follow ${sid_him} into the hallway. When ${sid_he} turns to face you, ${sid_he} looks conflicted.\n\n\t\"So, \n\t*if (apologize=\"false\")\n\t\tsince you blew me off earlier, \n\t*if (apologize=\"true\")\n\t\tI know you apologized earlier, but \n\tI just want to clear the air. I'm really worried about you. It's like I hardly know you anymore. You're so spiteful lately, \n\t*if (apologize=\"false\")\n\t\twhen you aren't totally ignoring people. Are you mad at me? \n\t*if (apologize=\"true\")\n\t\tthen you say sorry, but keep acting like a butt anyway! \n\tSeriously, if I didn't live here and wasn't afraid of getting murdered by a goblin in an alley right now or something, would you even want me around?\"\n\t\n\t*choice\n\t\t#\"What!? Of course we're still friends! I want you to be safe, and I'd rather not go through this alone. Would you?\"\n\t\t\t*set sid +5\n\t\t\t*set aloof -4\n\t\t\t*set romance_sid \"false\"\n\t\t\t*set sex_sid \"false\"\n\t\t\t*goto need_you\n\n\t\t#\"No, I don't. Maybe. I'm not sure. I don't think I can control myself. You're probably better off without me.\"\n\t\t\t*set bloodthirsty +5\n\t\t\t*set confidence -4\n\t\t\t*set sid -6\n\t\t\t*set romance_sid \"false\"\n\t\t\t*set sex_sid \"false\"\n\t\t\t*goto fuck_you\n\t*label fuck_you\t\n \n\t\"Something is seriously wrong, Sid, and I don't know what's going to happen or when. So, the smart thing for you to do would probably be to run. Run away from Vex and me and this THING inside me, and never look back.\"\n\n\tSidney stands there, staring at you in disbelief. Strangely, you would feel better if ${sid_he} were indignant, railed at you, or told you to go fuck yourself, but ${sid_he}'s as solid as ever. You're not angry with ${sid_him}, you've always cared about ${sid_him} like a\n\t*if (sid_gender=\"female\")\n\t\tsister, \n\t*if (sid_gender=\"male\")\n\t\tbrother, \n\tyet you keep pushing ${sid_him} further and further away.\t\n\n\t*if (sid \u003c= 44)\n\t\tWhy are you being such a jackass?\n\n\tThere's so much rage bubbling up inside you. You suspect the extra presence joy riding your soul and flossing with your spirit has something to do with it, but you're not sure. Nothing feels certain, anymore.\n\n\t\"Well, if you change your mind, you know where to find me, I guess.\"\n\n\tDeflated, Sid strides away, leaving you in the hallway to think.\n\t*page_break\n\n\tYou're sitting on the floor, your head drooped between your knees in a sovereign cocoon of self-loathing, when Candee tiptoes toward you.\n\n\t\"Cheer up, love. Face like a smacked arse, you have.\"\n\n\tYou grimace. \"Did you need something?\"\n\n\t\"Sorry, but you really ought to come have a gander.\"\n\n\tFollowing her into the living room, you see Shelter on alert at the front window.\n\n\t\"What is it?\" \n\t\n\tYou and Candee peer out between the blinds. The problem is immediately apparent.\n\n\t\"Ugh. Of course. How long have they been there?\"\n\t*page_break\n\t*goto shitstorm\n\n*else\n\tWith the excitement over Candee's unique coiffure extinguished, you approach Sidney.\n\n\t\"Hey, Sid. Can we talk?\"\n\n\t$!{sid_he} grins. \"Anything for you, home slice. Excuse us, Candee.\"\n\n\tYou walk to the hallway. Sidney follows and looks at you, expectantly.\n\n\t\"So, whats up?\"\n\t*choice\n\t\t#Thank ${sid_him} for being such a supportive friend.\n\t\t\t*set sid +2\n\t\t\t*set aloof -1\n\t\t\t*set romance_sid \"false\"\n\t\t\t*set sex_sid \"false\"\n\t\t\t*goto thanks_pal\n\t\t#Warn Sidney away. Demand ${sid_he} leave before ${sid_he} gets hurt.\n\t\t\t*set confidence -2\n\t\t\t*set sid -5\n\t\t\t*set bloodthirsty +1\n\t\t\t*set romance_sid \"false\"\n\t\t\t*set sex_sid \"false\"\n\t\t\t*goto sadness\n\t\t#Ask ${sid_him} if ${sid_he}'s hungry.\n\t\t\t*set romance_sid \"false\"\n\t\t\t*set sex_sid \"false\"\n\t\t\t*goto so_hungry\n\n\t*label so_hungry\n\t\"Are you hungry?\"\n\n\t\"Uhh…yeah, sure,\" Sidney says, looking bemused. $!{sid_he} obviously expected you to say something more significant if you wanted some privacy, but seems content with your serious concern for ${sid_his} appetite. \"I know those other weirdies don't eat, but I AM starving. Let's go see what we can dig up.\"\n\n\tYou nod and follow ${sid_him} into the kitchen to scrounge up a meal.\n\t*page_break Later\n\t*goto pre-shitstorm\n\n\t*label sadness\n\t\"If you want to bail out now, before things get any crazier around here, I understand. I know I'm a monster. I'll only put your life at risk.\"\n\n\t\"${name}, what are you talking about? I think you need me more than ever.\" \n\n\t$!{sid_he} tries to reach out, to put a hand on your shoulder, but you pull away.\n\n\t*goto fuck_you\n\t\n\t*label need_you\n\tSidney might be blinking back tears, but seems happy to hear that.\n\t\n\t\"I've thought about how this must be making you feel. I should have apologized \n\t*if (apologize=\"true\")\n\t\tmore often or something. \n\t*if (apologize=\"false\")\n\t\tsooner, when I had the chance, but I'll say it now: \n\tI'm sorry. My bad, but please don't turn away from me now. I'll try harder to do better, I promise. Please.\"\n\n\tSidney only nods and throws ${sid_his} arms around you in a bear hug. You both stand there for a little while, before ${sid_he} releases you, sniffling.\n\n\t\"We'll figure this thing out and kick its ass. For now, we should probably head back to mission control, make sure things haven't gone haywire in our absence,\" ${sid_he} laughs. \"And while we're at it, I know those other weirdies don't eat, but I am starving, what do you think about…\" \n\n\tSidney trails off as ${sid_he} walks into the kitchen. You smile to yourself, realizing your stomach is also growling, and accompany ${sid_him} to scrounge up a meal.\n\t*page_break Later\n\t*goto pre-shitstorm\n\n\t*label choice_2\n\t*choice\n\t\t#Admit that you've developed romantic feelings toward Sidney.\n\t\t\t*set confidence +1\n\t\t\t*set romance_sid \"true\"\n\t\t\t*goto confess\n\t\t#Thank ${sid_him} for ${sid_his} (very much platonic) friendship. \n\t\t\t*set romance_sid \"false\"\n\t\t\t*set sex_sid \"false\"\n\t\t\t*set sid +2\n\t\t\t*goto thanks_pal\n\t\t#Ask Sidney if ${sid_he}'s hungry.\n\t\t\t*set romance_sid \"false\"\n\t\t\t*set sex_sid \"false\"\n\t\t\t*goto so_hungry\n\n\t*label u_sure_bro\n\t\"I acted on something I felt something in that moment and I think you did, too. I still feel it. But if I crossed a line or you don't want this, then I'm sorry. I'll drop it.\"\n\n\tSidney looks nervous, but you can't tell if that's good or bad. You assume you're about to find out. \n\n\t\"Look, ${name}, if you want to chalk it up to, I dunno, getting wrapped up in all the life or death drama that's been going on, that's fine. Because, if you're saying what I think you're saying, it changes everything. So, I want you to be absolutely sure…let's just be honest about this with each other. You can still back out. No harm, no foul.\"\n\n\tYou shake your head and step forward, taking ${sid_his} hand in yours.\n\t*goto confess_2\n\n\t*label confess\n\tPhew. Confession time. \n\t\n\tYou pull ${sid_him} into your room and shut the door for privacy before plunging ahead.\n\n\t*label confess_2\n\n\t\"Sidney…\n\n\t*choice\n\t\t#\"…you are so awesome, we always have such a great time…\"\n\t\t\t*set sid +1\n\t\t\t*goto keep_going\n\t\t*if (childhood=\"false\") #\"…we've always clicked, ever since we met…\"\n\t\t\t*goto keep_going\n\t\t*if (childhood=\"true\") #\"…we've known each other for almost as long as I can remember…\"\n\t\t\t*goto keep_going\n\t\t#\"…you mean more to me than anyone else…\"\n\t\t\t*set sid +2\n\t\t\t*goto keep_going\n\t*label keep_going\n\t\"…and that still feels like it's only just the beginning of what we could be. Maybe I'm thinking about it because, sure, I've ALMOST DIED so many times this week, but that didn't cause these emotions to magically appear.\" \n\n\tSidney blinks slowly, but you can't decipher ${sid_his} expression. \n\t*if (kiss_sid=\"true\")\n\n\t\t\"Wait, I thought this all was spur of the moment. How long have you felt this way?\"\n\t\t*goto heart_strings\n\t*if ((kiss_sid=\"false\") and (childhood=\"true\"))\n\n\t\t\"Really? We've always…I thought…since when? How long have you felt this way?\"\n\t\t*goto heart_strings\n\t*if ((kiss_sid=\"false\") and (childhood=\"false\"))\n\n\t\t\"For real? If I had known you felt like this sooner, I…since when?\"\n\t\t*goto heart_strings\n\t*else\n\n\t\t\"That's…since when?\"\n\n\t*label heart_strings\n\t*fake_choice\n\t\t#\"I think I always knew, deep down, but it never consciously crossed my mind until recently…\"\n\t\t#\"After you stood by my side, time and again, no matter how weird or scary things got, it hit me…\"\n\n\t\"…and I know that majorly changes things, but you've always been so fun and funny and, when I look at you lately, my stomach does cartwheels. The thought of losing you terrifies me, especially over something as dumb \n\t*if (kiss_sid=\"false\")\n\t\tas taking it to the next level, only to crash and burn—harder than we ever would have just staying pals—later.\"\n\n\t*if (kiss_sid=\"true\")\n\t\tas making a move on you when you didn't want me to. I just wanted to explain myself.\" \n\t\n\tYou take another deep breath, before concluding, \"I feel like I'm terrible at this. But, in all of this chaos, I didn't want something to happen to either of us before I told you that I realized what's truly important:…\"\n\n\t*choice\n\t\t#\"…you.\"\n\t\t\t*set sid +4\n\t\t\t*goto waiting\n\t\t#\"…following my heart.\"\n\t\t\t*set confidence +1\n\t\t\t*set sid +3\n\t\t\t*goto waiting\n\t\t#\"…us.\"\n\t\t\t*set sid +5\n\t\t\t*goto waiting\n\t\t#\"…never wondering 'what if.'\"\n\t\t\t*set confidence +1\n\t\t\t*set sid +3\n\t\t\t*goto waiting\n\n\t*label waiting\n\t*achieve crush\n\tSidney waits, and when it becomes clear that you're done, ${sid_he} answers slowly, the words measured, contemplating ${sid_his} response extra carefully. \n\n\t\"You are my best friend and if you think, even for half a second, that I wouldn't be supportive because of whatever, you're wrong. \n\t*if (apologize=\"true\")\n\t\tI told you I'd always have your back and I meant it.  \n\tWe've been through too much together.\"\n\t\n\tThat statement is encouraging and frustrating at the same time. \n\n\t\"But, what do you think about what I said? How do you feel…about me?\"\n\n\t$!{sid_he} scoffs. \"I think you're complicated. You're stubborn and, when you're really in a mood, tortured and brooding. You're smart and original and too hard on yourself. You challenge \n\t*if (games_gauge = 4)\n\t\tme, make me laugh, and even like my stupid jokes. \n\t*if (games_gauge \u003c= 3)\n\t\tme, especially when you don't play along with my dumb jokes, which I usually think is even funnier, anyway. \n\tYou're adorable and captivating and a better \n\t*if (gender=\"male\")\n\t\tman \n\t*if (gender=\"female\")\n\t\twoman \n\tthan you realize. You are easily in my top three favorite people on this planet.\" \n\t\n\tSidney looks down at the floor, smiling. \n\t*if (kiss_sid=\"false\")\n\t\t\"And I think anyone would be lucky to be with you, $!{name}…you idiot.\"\n\t*if (kiss_sid=\"true\")\n\t\t\"And I liked it. I did want to kiss you, $!{name}…you idiot.\"\n\t*page_break\n\t\n\tThe air is thick as you both process what you've just heard. \n\n\t*choice\n\t\t*if (kiss_sid=\"false\") #Make a serious move. Maybe several moves…\n\t\t\t*set sex_sid \"true\"\n\t\t\t*goto its_so_on\n\t\t*if (kiss_sid=\"true\") #Kiss ${sid_him} passionately again, and then some…\n\t\t\t*set sex_sid \"true\"\n\t\t\t*goto its_so_on\n\t\t#Hug Sidney and give ${sid_him} a peck on the cheek.\n\t\t\t*set sex_sid \"false\"\n\t\t\t*goto thats_sweet\n\n\t*label its_so_on\n\tAs soon as ${sid_he} looks back up at you, it's game on. \n\n\t*if (sid_gender=\"female\")\n\t\tYou sweep her up—or maybe it's Sidney that grabs you—and pull her close, spurred on by the feeling of fingers curling at the nape of your neck when you kiss.\n\t*if (sid_gender=\"male\")\n\t\tYou jump him—or maybe it's Sidney that grabs you—and pull him close, spurred on by the feeling of fingers curling at the nape of your neck when you kiss. \n\tBefore you have time to catch your breath, ${sid_he} starts peeling off your clothes while you're unzipping ${sid_his} jeans. $!{sid_his} sunglasses fly off and skitter across the floor. \n\n\tYou both lose your balance and tumble onto the bed, laughing and kissing and laughing while trying to kiss.\n\t\n\tIn this moment, there is no Heaven or Hell, no angels or demons. No thought to the danger you're in. \n\n\tThe entire universe consists of exactly you, Sidney, and this narrow room, here and now. \n\t*page_break\n\t\n\tIt's perfect.\n\n\t*page_break Later\n\n\n\t*if (childhood=\"false\")\n\t\t\"…it really does look like a sideways teacup,\" Sidney giggles.\n\n\t\t\"I told you,\" you smile. \"Are you sure you aren't hiding one of your own?\"\n\n\t\t\"No, I—HAHAHA!\" You don't give ${sid_him} a chance to finish, tickling ${sid_him} all over during your bogus inspection.\n\t\n\t\t$!{sid_he} hits
