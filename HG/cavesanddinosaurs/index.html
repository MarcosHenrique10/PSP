\n\t\t\t\t\t\t\t\ttext Deaths \n\t\t\t\t\t\t\t*goto_scene ending\n\n\n*label sharp_mind_steady_hand\nTrying to turn over a new leaf and a better life, you swear off killing altogether in hopes to appease your guilt. You find that with each passing day, the pain in your nightmares only gets worse. Killing is the only resolution. You devise a plan to appease the gods while safeguarding your good conscious.\n\n\nInside the hidden treasure room you’ve been accumulating overtime, there is a powerful scroll, one with the power to cast any spell. You hold the parchment outward and call to the gods, “Summon Dinosaur.” Out of a swirling mist appears a vicious beast.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 3\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou tame the beast and call him Spot. “I will send you sacrifices, and you will destroy them. For the gods’ will.”\n\t\t\t\t\t*achieve end5\n\t\t\t\t\t\n\t\t\t\t\t*stat_chart\n\t\t\t\t\t\ttext Deaths \n\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\n\t\t*if (dieroll = 2)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tThe dinosaur manages to bite you hard and play with your mangled body before swallowing you whole. The only thing is that you’re not dead, not completely. Instead, you spend the remainder of your life inside its body, unable to be digested, but also unable to be passed through its system. It is a lonely existence, living in limbo. Not exactly dead, but also not exactly alive. \n\t\t\t\t\t*achieve end6\n\t\t\t\t\t*stat_chart\n\t\t\t\t\t\ttext Deaths \n\t\t\t\t\t*goto_scene ending\n\t\t*if (dieroll = 3)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tThe dinosaur attacks you and you fight it with everything you got. In the end, you kill it, and your soul enters its body, and it’s in yours. The dinosaur now has a human body, and it’s going to eat everything. Starting with its old body.\n\t\t\t\t\t*achieve end7\n\t\t\t\t\t*stat_chart\n\t\t\t\t\t\ttext Deaths \n\t\t\t\t\t*goto_scene ending\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Get a pet?\n\t\t\t\t\t\t\tYou tame the beast and call him Spot. “I will send you sacrifices, and you will destroy them. For the gods’ will.”\n\t\t\t\t\t\t\t*achieve end5\n\t\t\t\t\t\t\t*stat_chart\n\t\t\t\t\t\t\t\ttext Deaths \n\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t#Get swallowed?\n\t\t\t\t\t\t\tThe dinosaur manages to bite you hard and play with your mangled body before swallowing you whole. The only thing is that you’re not dead, not completely. Instead, you spend the remainder of your life inside its body, unable to be digested, but also unable to be passed through its system. It is a lonely existence, living in limbo. Not exactly dead, but also not exactly alive. \n\t\t\t\t\t\t\t*achieve end6\n\t\t\t\t\t\t\t*stat_chart\n\t\t\t\t\t\t\t\ttext Deaths \n\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t#Kill the dino.\n\t\t\t\t\t\t\tThe dinosaur attacks you and you fight it with everything you got. In the end, you kill it, and your soul enters its body, and it’s in yours. The dinosaur now has a human body, and it’s going to eat everything. Starting with its old body.\n\t\t\t\t\t\t\t*achieve end7\n\t\t\t\t\t\t\t*stat_chart\n\t\t\t\t\t\t\t\ttext Deaths \n\t\t\t\t\t\t\t*goto_scene ending\n\n\n*label back_alley\nYou pull up your mask and get to work. Behind some piled-up trash, you equip your axe and get ready to hack up the corpse when you notice two onlookers witnessing your dastardly deed. One is wearing all fur and leathers that they must have killed many animals to make their clothes. The other is wearing tattered garments that tell an age-old story of poverty. \n\n\n“No witnesses,” you say as you rush towards them with murderous intent.\n\n\n“Why are you doing this? I thought we had a deal?” the one in fur says, putting up their arms as the universal sign for truce.\n\n\n“Nothing matters, soon it will be reset, and you won’t remember a thing,” you say.\n\n\n“That is ludicrous,” the poorly dressed one says.\n\n\n“You don’t have to believe me; you only have to die.”\n\n\n“If what you’re saying were remotely true, why attack us at all. Or why do anything at all, for that matter?”\n\n\n“Because today isn’t over yet, and I have plenty to do without your meddling with my plans.”\n\n\n“We won’t say anything. It’s not our business.”\n\n\n“But this is mine,” you say and end all further negotiations.\n\n\nDecide which one you attack first.\n\n*choice\n\t#Attack the one in fur?\n\t\tIf you attack the one in fur, they throw down a bear trap that catches your foot. The other one uses some ability that electrifies the bear trap, causing you to violently shake in a convulsion. Once the effect wears off, you swing your flail and bash the one in fur directly in the head. \n\t\t\n\t\t\n\t\tYour next hit manages to kill the one in fur, only something different happens. Your soul leaves your body, and your vessel is now theirs to control.\n\t\t*achieve end8\n\t\t*stat_chart\n\t\t\ttext Deaths \n\t\t*goto_scene ending\n\t#Attack the one in rags?\n\t\tIf you attack the one in rags, you step on a bear trap, but that doesn’t slow you down; in fact, pain only makes you more powerful. Limping with the heavy clamp on your leg, you hack up the poorly dressed one with ease. Before you could finish off the other one, something unique happens…your soul is free, you successfully found your target and transferred the curse back on to them.\n\t\t*achieve end9\n\t\t*stat_chart\n\t\t\ttext Deaths \n\t\t*goto_scene ending\n\n\n*label the_regulars\nYou arrive at the Mud Puddle, and straight away the bartender is mixing and concocting something special for you with great fanfare. \n\n\nBy the time you reach your regular seat, the freshly made spirit is brought to your table without any instruction. It feels nice for someone to make such a fuss over you. Though this feeling cannot completely substitute for a companion or family, it has a sense of togetherness in its own sort of way.\n\n\nAfter a long day of killing, it’s a relief for you to steal a moment for yourself to unwind. You take a couple sips of the beverage, and it tastes sweet. A little too sweet to your liking. In fact, you are fairly certain that this doesn’t have a drop of alcohol in it.\n\n*choice\n\t#Sen it back?\n\t\t*goto what_is_wrong_with_this\n\t#Drink it anyway.\n\t\t*goto straight_edge\n\n\n*label playing_in_the_mud\nAfter taking advantage of a food mix-up over at the seafood joint, you make your way over to Mud Puddle to try your luck over there.\n\n\nThere is nothing more magical in this world than getting something for free, except, of course, magic.\n\n\nWanting to pay the karma gods or perhaps just pass on the feeling, you decide to do something out of character.\n\n\nAfter approaching the bar, your presence startles Angus, one of the bartenders you’ve only met on a few occasions. His eyes look heavy and have bags under them, and he’s unshaven. Suffice it to say, he looks like a shipwreck.\n\n\nAngus lets out a deep sigh before greeting you.\n\n*choice\n\t#Do you tip Angus?\n\t\t*goto i_see_you\n\t#Buy everyone a drink. \n\t\tYou gain +1 SAVE!\n\t\t\n\t\t\n\t\t*set save +1\n\t\t*goto drinks_on_me\n\n\n*label i_see_you\nYou toss a couple coins onto the bar, and Angus looks taken aback by the gesture. “Sorry that I didn’t have your usual ready. I…”\n\n\n“No. It’s not for drinks. It’s for you. A little extra something,” you explain.\n\n\n“You mean like a tip?”\n\n\n“Not ‘like.’ Exactly a tip.”\n\n\n“Why, thank you, sir. May I ask what I’ve done to deserve such an offering?” Angus inquires, while securing the coin in a leather pouch on his belt.\n\n\n“You seemed like you were having a rough day, and I thought I’d make it a little less rough.”\n\n\n“I have been having a crow shitter. If you don’t mind, may you allow me to return the favor?”\n\n\nUnknowing what he was getting at, you shrug your shoulders.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto news_around_town\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto what_is_wrong_with_this\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Get You learn some bit of information.\n\t\t\t\t\t\t\t*goto news_around_town\n\t\t\t\t\t\t#Inquire about the drink?\n\t\t\t\t\t\t\t*goto what_is_wrong_with_this\n\n\n*label news_around_town\nAngus leans in and whispers something into your ear. “Nothing is real. It’s all staged.”\n\n\nYou reach out and grab him by his fine shirt. “Where did you hear that?”\n\n\n“People are talking about how this is all a game for a god’s amusement. They say there is a master of the dungeon cave outside of town who is all- seeing, and all-knowing.”\n\n\n“Who has been spreading this nonsense?” you say through gritted teeth.\n\n\n“Well…”\n\n\n“Tell me!”\n\n\n“You have. Every time you get drunk.”\n\n\nLosing your balance, you slump down on the barstool. Every night, you have lucid dreams about speaking to an all-powerful god, one who goes by the name of Danger Manager. Up until now, you didn’t believe it was real, although now you’re not sure what you believe. If true, you must find some people to defeat the gods at their own game. And if they happen to lose, maybe the gods might stop tormenting you in the night. It was a win-win plan, or so you think. \n\n\nThrough a sideways glance, you notice a young priestess leaning in and eavesdropping on your little conversation—you know this based on her aghast expression. Once you spot her, though, she grabs her things and exits out the front. \n\n\nYou follow her with a crossbow bolt, and it clips her in the back. \n\n\nWhen you go over to her to claim your prize, she says but one last thing before dying, “I will get my revenge. We are all watching you.”\n\n\nThat seems like a silly thing to say, but then your soul trades places with hers, and you take her dying breath while gazing on her devilish grin. \n\n\nMaybe she was right after all.\n*achieve end3\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label drinks_on_me\nYou look around the few scattered customers and utter a simple phrase “Drinks are on me.”\n\n\nSuddenly there is a burst of commotion, and people start to flood into the place from everywhere. It was almost like they were hiding in the shadows like cockroaches. Nevertheless, the huge torrent of people is most assuredly going to clean you out of all your riches. \n\n\n“No, I…didn’t mean everyone…” You try to explain, but it is far too late for backies. You’ve been pushed and elbowed out of the way as your tab at the Mud Puddle quickly puts you into great debt.\n\n\nFrom this point forward, you decide to erase that simple phrase from your vocabulary, forever.\n\n\nYou gain +1 SAVE!\n*set save +1\n*choice\n\t#You are happy.\n\t\t*goto the_rush\n\t#You're not so happy.\n\t\t*goto the_rush \n\n\n*label what_is_wrong_with_this\nThe man behind the bar, Angus, leans in close and whispers something into your ear. “We ran out of alcohol earlier this week, and you’re the first person to notice.”\n\n\nThe idea of a dry bar operating as normal was a comical concept, but the thought of no one noticing was downright hilarious. “What are they drinking, then?”\n\n\n“Oh, you know, random herbs, potions, poison, anything we have lying around.”\n\n\nAnything they have lying around? They do realize that you are among those people who didn’t notice. “You’ve been feeding me poison?”\n\n\n“You never got sick,” he responds, almost a little too quickly.\n\n*fake_choice\n\t#Get angry, real angry.\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto murder_parade\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto early_bird\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t#It's murder time!\n\t\t\t\t\t\t\t\t\t*goto murder_parade\n\t\t\t\t\t\t\t\t#I am bad at fighting.\n\t\t\t\t\t\t\t\t\t*goto early_bird\n\t#Let it go, let it go.\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto straight_edge\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto blackout\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#No more drinks for me.\n\t\t\t\t\t\t\t\t\t*goto straight_edge\n\t\t\t\t\t\t\t\t#Drink until you black out.\n\t\t\t\t\t\t\t\t\t*goto blackout\n\n*label murder_parade\nBefore Angus could reach for the crossbow that you know is hidden below the bar, you crack open his head with your trusty flail. Blood splatters everywhere from the brutal hit.\n\n\nUpon hearing the crushing sound, a waiter pops out of the back like a mole out of a hole. “Did you hear something?”\n\n\n“No. Nothing.”\n\n\n“Where is Angus? There are a lot of drink orders back here.”\n\n\n“Uh…he’s sick.” You look down at his limp body that fell behind the bar. “Possibly dead.”\n\n\n“What am I supposed to do? I’m not a bartender…” the waiter abruptly leaves out the back, beyond flustered. \n\n\nLucky for you, the Mud Puddle was nearly empty, and you are able to sneak Angus’s corpse into the alley without anyone noticing.\n\t\n*choice\n\t#Is it trash day already?\n\t\t*goto back_alley\n\t#Everyday is a good day to litter.\n\t\t*goto back_alley\n\n\n*label straight_edge\nAfter finishing your cloying beverage, you feel a burst of energy. This prompts you to order another one just the same, even though it wasn’t the adult beverage you came here for.\n\n\nAfter your third straight sugar drink, you feel hyperactive and incredibly motivated; not at all sleepy or stumbly like you would after the same number of alcoholic beverages. You decide this is going to be your new regular drink in order to keep your wits about you and increase your productivity.\n\n\nFrom this point forward, you’re now a straight-edge fighter.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*set save +1\n\t\t\t\t\tYou gain +1 SAVE!\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto sharp_mind_steady_hand\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto blackout\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Do you want +1 SAVE?\n\t\t\t\t\t\t\t*set save +1\n\t\t\t\t\t\t\t*goto sharp_mind_steady_hand\n\t\t\t\t\t\t#Do you choose to black out?\n\t\t\t\t\t\t\t*goto blackout\n\n\n*label blackout\n*image death.jpg\nAfter drinking the mystery beverage, you start to feel an intense pain inside you. It is as if acid is melting away your insides. First using your finger, then your whole hand, you try to induce vomiting, but it is too late. You’re already being hallowed out. Then you fall face-down on the table as if you were black-out drunk. Only you’re black-out dead. In a matter of minutes, whatever it was that you drank dissolved your body into a bubbling puddle that is later picked up by a mop used by the nightly clean-up crew.\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#Go back to the “The Beginning” and try again.\n\t\t*goto the_beginning\n\n\n*label page_68\nCongratulations! You are the Healer!!\n*image healer.jpeg\n*set character \"Healer\"\nPutting others’ needs above your own has always been your philosophy. Although you subscribe to nearly all the goodly religions the realm has to offer, above all else, you believe in love and the helping of those in need. \n\n\nUsing magic, herbalism and the unmistakable power of thoughts and prayers, you put your faith in yourself and your ability to heal others. \n\n\nAfter helping out at the establishment for no pay, an incredibly attractive man approaches you. “Hello there, little lady. I was watching you do a wonderful job in helping out.”\n\n\nFeeling a butterfly flutter around in your stomach, you stammer a little before answering. “Thanks. I try my best.”\n\n\n“How would you like to help me out with a favor?” he asks, with his square-jawed smile.\n\n\nFeeling a little helped out at the moment, you are skeptical. On the other hand, it’s not every day that you get compliments from such a good- looking man.\n\n*choice\n\t#Do you blindly help him out?\n\t\t*goto lets_do_it\n\t#Do you ask for more information?\n\t\t*goto what_kind_of_quest \n\n\n*label lets_do_it\nAlways a sucker for a pretty face, you double down on your helpful nature and agree to lend a hand in any way you can, even before finding out what help he actually needs.\n\n\n“Great! Thank you so much. I cannot pay you anything, but I’ll give you an unlimited amount of good will in exchange for your assistance.”\n\n\nThis is starting to sound like a sucker’s bargain, but you can’t back out now; that would be rude.\n\n\nHe reaches out to shake, and you delicately place your hand into his. His firm grip gives you goosebumps all over. \n\n\n“I don’t need payment. I’m happy to help.”\n\n\n“Splendid. Should we get a party together, or are you more of a solo quester?”\n\n\nFlustered, you blurt out the first thing that comes to mind.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\"I am a pacifist.\"\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto the_pacifist \n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\"I am a one woman army.\"\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto one_woman_army\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"I am a pacifist.\"\n\t\t\t\t\t\t\t*goto the_pacifist \n\t\t\t\t\t\t#\"I am a one woman army.\"\n\t\t\t\t\t\t\t*goto one_woman_army\n\n\n*label the_pacifist\n“I’m not a fighter. I specialize more in healing,” you admit, feeling red in the face.\n\n\n“This will not be a problem; we’ll just have to find you someone to heal.”\n\n\n“I can heal you all day,” you say, with a flirtatious grin.\n\n\n“I bet you can, but sadly, I’m not going on the expedition. I have a ton of logistics work to attend to here in town.”\n\n\nSuddenly you feel a bit like a fool. Here you thought you were going on this romantic quest with this grade-A eye candy, but alas, you’re just doing more free work.\n\n\nHeading out of town, you arrive at the mouth of a dreary-looking cave. To your surprise, someone is already there waiting for you.\n\n\nWith a bounce in your step, you introduce yourself as “the Healer.” \n\n\nLess excited as you were, they reply. “I’m…”\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto trapper\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto support\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#You know they are the Trapper.\n\t\t\t\t\t\t\t*goto trapper\n\t\t\t\t\t\t#You know they are the Support.\n\t\t\t\t\t\t\t*goto support\n\n\n*label trapper\n“…the Trapper. I’ll make sure no giant boulders are going to squish you,” they say with a chuckle. \n\n\nAlthough you don’t see anything humorous about what they said. \n\n\n“Nice to meet you,” you say with courtesy.\n\n\n“There will be plenty of time for the both of you to get acquainted inside,” the attractive man says, guiding you from the small of your back.\n\n\n“Wait a minute,” the Trapper protests.\n\n\n“Right, you didn’t tell me your name yet.” \n\n\n“That wasn’t what I meant. What’s the mission?” the Trapper clarified.\n\n\n“My name is Marc, and I need the two of you to steal all riches that are hidden deep inside this here cave,” Marc says, answering both questions.\n\n\n“That sounds dangerous,” you point out.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tHe says, “Here, take this potion, for good luck.” Gain +1 SAVE!\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto what_have_i_gotten_into\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto what_have_i_gotten_into\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#He says, “Here, take this potion, for good luck.”\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*set save +1\n\t\t\t\t\t\t\tYou gain +1 SAVE!\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto what_have_i_gotten_into\n\t\t\t\t\t\t#\"It is. Sucks to be you,\" he says.\n\t\t\t\t\t\t\t*goto what_have_i_gotten_into\n\n\n\n*label support\n“…Support. I’ll make you look good,” they explain with a smirk. \n\n\n“How do you do?” you ask. This could be somewhat fun, at least you weren’t going inside the dreadful cave alone. A little company could do you some good.\n\n\n“I read your quest on the board. I’m ready when you are,” the Support explains.\n\n\n“Super. Then I’ll see you both back in town in a day or so,” the dreamboat says, flashing his pearly white teeth.\n\n\nNot wanting to say goodbye, you turn away and head into the dark cave without another word. You’re determined to complete this quest in record time. Your aim is to win the heart and hand of this scrumptious quest giver. He will be yours. Oh, yes.\n\n*choice\n\t#You want to marry him.\n\t\t*goto supportive_healing\n\t#You want to own him like a dog.\n\t\t*goto supportive_healing\n\n\n*label one_woman_army\nTrying to sound big, you spin a bit of a lie, touting yourself as a healer, tank, and DPS.\n\n\nThe attractive man’s chiseled jaw drops in amazement after hearing your lies. “You really are a gift from the heavens.”\n\n\nAlthough his flattery makes you giggle, you feel that you may have overdone it with your boasting. But you didn’t want to chance him hiring anyone else to get in the way of your little quest date.\n\n\n“Here’s a blank map. All you need to do is fill it in with the layout of the entire cave, and report back to me once you’re done,” he says, shattering your hopes of being alone with him.\n\n\n“Oh. I thought we’d go in together?”\n\n\n“My sweet. You know I’d love to, but I have some important stuff to attend to back in town. I hope you understand.”\n\n\nYou understand alright, but you don’t approve. Still, making a map seems simple enough, and if it would make him happy, you’re all for it.\n\n\nHe blows you a kiss, and you enter the cave alone and disappointed as usual.\n\n*choice\n\t#You catch the kiss and tuck it into your pocket.\n\t\t*goto dating_is_hard\n\t#You swat the kiss out of the air like it were a pesky fly.\n\t\t*goto dating_is_hard\n\n\n*label what_kind_of_quest\nNot really sold on the whole idea of helping another person, you probe for more details. Especially since he’s obviously trying to woo you with his dashing good looks and charm. “What does this little favor involve?” you ask.\n\n\n“It is more of a mission…inside this cave. How do you feel about tight spaces?”\n\n\n“You mean like the one you’re putting me in?”\n\n\n“No. I mean yes. Well, you got me. This is a really big favor to ask of you, or anyone, for that matter. I wish I had at least some way to pay you for your efforts.”\n\n\n“Cut the act and lay it on me straight,” you say, folding in your arms into your chest.\n\n\n“I seek to rid the world of abominations. Unholy things that are not creations of God. This special cave is the remnants of the star rock that created Crater Lake. Which means that it’s filled with monsters from beyond the stars. It is a dangerous job, but someone holy has to do it.”\n\n\n“But that someone isn’t you, I gather?”\n\n\n“I will tell you the truth now because you’re obviously a woman of faith. I am but a coward. I faint at the sight of blood. And I couldn’t possibly…” \n\n\n“You can stop now.” You interrupt his sad sob story. He is trying way too hard to get you to help him, and the more he talks, the more pathetic this exchange is becoming. You liked him much more when he was just a pretty face without the ugly personality that went along with it.\n\n\nIf you were to even contemplate dating this man, there would be a lot of training he would have to go through.\n\n\nBiting your bottom lip, you take a moment and give him your final answer. \n\n*fake_choice\n\t#“Fine, I’ll help you, under one condition.”\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto party_of_three\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto party_of_two\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t#You want a big party.\n\t\t\t\t\t\t\t\t\t*goto party_of_three\n\t\t\t\t\t\t\t\t#You want a small party.\n\t\t\t\t\t\t\t\t\t*goto party_of_two\n\t#“No. You’re on your own.”\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto reconsider\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto end_of_the_road\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Play hard to get.\n\t\t\t\t\t\t\t\t\t*goto reconsider\n\t\t\t\t\t\t\t\t#Reject him.\n\t\t\t\t\t\t\t\t\t*goto end_of_the_road\n\n\n*label party_of_three\n“My condition for helping you is that you get me two other adventurers to assist me on the journey.”\n\n\n“That’s a tall order…” the attractive man says.\n\n\nKnowing he’s trying to bargain, you close the door on any further negotiations. “That’s my final offer. Take it or leave it.”\n\n\n“I’ll take it, but that means you have to split your half of any treasure you find with the two other adventurers.”\n\n\nYou agree to his terms. Up until this point, you weren’t getting paid, so any percent of anything was better than nothing. \n\n\nFaster than you would have expected, he introduces you to the Trapper and Support. Once at the cave, he says a final prayer. “Bless these fine folks in their journey to besmirch the plague that has befallen us all.”\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*set save +1\n\t\t\t\t\tYou gain +1 SAVE!\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto ready_to_plunder\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto ready_to_plunder\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Get ready to plunder.\n\t\t\t\t\t\t\t*set save +1\n\t\t\t\t\t\t\tYou gain +1 SAVE!\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto ready_to_plunder\n\t\t\t\t\t\t#Get ready to pillage. \n\t\t\t\t\t\t\t*goto ready_to_plunder\n\n\n*label party_of_two\n“My one condition is that you get me another adventurer to help with the quest.”\n\n\n“Deal,” he quickly answers.\n\n\nYou can’t help but wonder if you should have haggled a little for a third companion. Based on how fast he responds, you get the sense that he saw a good deal and quickly jumped on it.\n\n\nAfter leading you to a cave outside of town, he introduces a young woman as the DPS. She holds a long sword by her side like it was an old friend.\n\n\nHe whispers something in her ear before bidding you both adieu. \n\n\nYou look around to see if there is anyone else around that he might not want to hear. The sad truth is that it’s just you. There is no doubt they’re passing secrets about you. \n\n\nEven though you feel a little hoodwinked into this situation, what swayed your ultimate decision to help him was that doing so involved destroying unholy monsters, which is one of your favorite pastimes. Your only hope is that this DPS person shares your affinity for such things.\n\n*choice\n\t#You feel more comfortable around woman,\n\t\t*goto two_gals\n\t#You feel less comfortable around woman.\n\t\t*goto two_gals\n\n\n*label reconsider\nYou turn away fr om the hunky man, hoping to find a better crusade for you on the quest board. Suddenly, he grabs you by the arm and spins you around like you were dance partners.\n\n\nCaught in his embrace, he holds you firmly against his chest as his face moves in close to yours.\n\n\n“Isn’t there anything I can do to change your mind? Anything?”\n\n\nLost gazing inside his deep brown eyes, you contemplate for a moment your options. You can either accept his solo pilgrimage and gain his affections, or you can leave forever. It is a tough call. He is handsome, but good looks aren’t everything, especially when the possibility of death is very real. You know what they say, dead can’t date. \n\n*if (save > 0)\n\t*set save -1\n\tYou used a SAVE to save yourself from something bad!\n\t\n\t\n\t*goto dating_is_hard\n*else \n\t*goto end_of_the_road\n\n\n*label end_of_the_road\nYou slap the beautiful man across his nicely manscaped face. You will not be made a fool.\n\n\n“I could have given you love, riches, children.”\n\n\n“I don’t need any of those things. All I need is my faith, which is unbreaking.” Leave the man who came close to temping you into breaking your vow of celibacy.\n\n\nYou leave the town of Teepeekay and continue your pilgrimage onward to the next town, and the next one after that until old age catches up to you. You lived out your long life and died an old maid, never finding love, riches, or children with your similar genetic index. Instead, you have a boring life that no one remembers or talks about. \n\n\nThe End\n\n\nCongratulations! You have successfully derailed the whole adventure and found the most boring ending to this story, which is the only ending that happens before the journey actually begins. Start over from the beginning and try to get something more exciting next time. Look at the bright side. You didn’t die, but then again, death might have actually put you out of your long-lasting misery.\n\n\nHow many times did you die before getting this ending. \n*stat_chart\n\ttext deaths\n\n*achieve end1\n\n*goto_scene ending\n\n\n*label page_81\nCongratulations! You are the DPS (damage per second) Character!!\n*image dps.jpeg\n*set character \"DPS\"\nYour adventurous spirit brought you to Teepeekay in order to find fortune and impact the world much like the crater had done upon the swamp. Nothing has ever been given to you, nor does it ever come easy. Your motto is to stab first and ask for directions later. All your worldly possessions have been born from blood, sweat, and without tears. Because when you’re dishing out heavy damage every single second, there isn’t a moment to shed even a single drop of weakness.\n\n\nSpeaking of drops, your glass is nearly empty. You ponder refilling it, though you suspect you might have had too much food and drink for one day.\n\n*choice\n\t#You would like more to drink.\n\t\t*goto hit_me_with_another\n\t#You decide that you’re done drinking.\n\t\t*goto check_please\n\n\n*label hit_me_with_another\nBefore you could order another drink, a wealthy-looking man barges into the establishment and frantically cries out, almost in a panic, “Are there any adventurers around?”\n\n\nAlmost by habit, you raise your sword and circle it around your head a couple times.\n\n\nHe spies your signal and rushes over to you. “That’s a mighty fine-looking weapon you got there. Is it enchanted?” the wealthy man asks.\n\n\n“Cut the small talk. It will be one hundred gold a day, not a copper less,” you say, leaning your large sword against your leg.\n\n\n“But I haven’t even told you what the adventure is yet.”\n\n\n“Don’t care. Just point me in a direction, and I’ll stab the first thing that gets in my way.”\n\n\n“I like your spunk. One hundred gold sounds reasonable. Can I pay you at the end of the day, considering you survive?”\n\n\n“I will survive. I always survive.”\n\n\n“What if you don’t, though? I’ll be out a lot of coin.”\n\n\n“You’re wearing a ring on every finger. That one actually has two on it,” you point out. “I’d say you can afford much more than I’m asking. So, stop trying to haggle, you cheapskate.”\n\n\n“Fine. I’ll pay. But you still didn’t answer my question. Do you require the gold before or after the day is through?” the wealthy man says. \n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t“No, you must pay me first.”\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t“I can do that, but I’ll have to hire some people as an insurance policy to make sure you don’t skip town with my investment.”\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t“Do whatever you have to.”\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t“Meet me at the cave at the edge of town in one hour. I’ll have your coin by then.” \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\tYou stand up and motion to the server while pointing down at the extravagantly dressed man indicating that he is going to be paying for your bill.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t“Oh, yes, no problem. It’s on me. I can write it off as a business lunch.”\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto an_hour_later\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou say: “You can pay me at the end of the job.”\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t“Even better,” he exclaims. \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\tYou give him a sideways glance as you rattle the ice inside your empty glass. \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t“In that case, let me tell you what I have planned; I want you to slay the magical dinosaur in the cave at the edge of town.” \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t“No problem,” you say, without even thinking twice about it. Dead is dead. It doesn’t matter if it’s a giant spider woman or some undead pirate.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t“You’re quite sure of yourself, aren’t you?” \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t“Why shouldn’t I be? I’m the deadliest thing around.”\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t“We’ll see about that. The name’s Marcus Gar…” \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t“I don’t care,” you interrupt him. I’ll see you before the week’s end with some magical dino skin on my back.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\tWithout another word, you walk out of the establishment without paying. \n t him. I’ll see you before the week’s end with some magical dino skin on my back.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tWithout another word, you walk out of the establishment without paying. \n\t\t\t\t\t\t\t*goto its_killing_time\n\n\n*label check_please\nYou pay your bill and start to make your way out of the establishment. A well-dressed man seems to be in a hurry and does a double take when his eyes cross your path.\n\n\n“Hey, you look like you’re up for a little adventure?” he says.\n\n\n“I might be, for a price.”\n\n\n“How does 50 gold sound?” \n\n\n“Per kill?”\n\n\n“No, no. 50 gold per day,” he clarifies, waving his hands back and forth.\n\n\nYou size up the man who has an extravagant silk robe and jewelry up the wazoo. “I like per kill better,” you counter.\n\n\nHe pulls his facial hair as he contemplates your offer. “Okay. That seems reasonable, but I require solid proof of each kill before I pay up. Which means you get paid after all is said and done.”\n\n\n“It won’t be the first time I’ve been on carcass detail. Where’s the job?”\n\n\n“Inside the cave outside of town. Kill as many as you can and return here for payment.”\n\n\nWithout so much as a goodbye, you leave the establishment, then the town. These cave creatures aren’t going to kill themselves. \n\n\nOn your way to the cave mouth, you notice an older gentleman who appears to be lost and possibly confused. This assumption is based on the fact that he is holding two shields. You figure that some sort of dementia has already developed long ago.\n\n\n“Hey, geezer, want to earn a little extra coin?”\n\n\n“That depends. What do you need?”\n\n\n“I need you to hold my kill carcasses for me. I’ll pay you one gold each.”\n\n\nA sour expression forms on his face, but he reluctantly accepts your offer with a shrug.\n\n\nWith an elder in tow, you find the cave opening and equip your sword, ready to slaughter them all.\n\n\n“Make sure you can keep up, old timer,” you say with a sly grin.\n\n*choice\n\t#Dinosaurs are really dragons.\n\t\t*goto dinos_dont_slay_themselves\n\t#Dinosaurs are lizards who play basketball.\n\t\t*goto dinos_dont_slay_themselves\n\t#Dinosaurs are birds. Big, fat...birds.\n\t\t*goto dinos_dont_slay_themselves\n\t#Dinosaurs are extinct, and it makes me sad.\n\t\t*goto dinos_dont_slay_themselves\n\t#Dinosaurs ate my baby!!\n\t\t*goto dinos_dont_slay_themselves\n\n\n*label an_hour_later\nAfter getting your weapon sharpened, you make your way to the cave location. \n\n\nA little over an hour of waiting, the wealthy man arrives with a tidy-looking woman. She bears an aura of innocence.\n\n\nStraight away, you notice that your employer is wearing significantly less rings and other jewelry. Could it be that he is not quite as rich as you previously thought? At any rate, it’s not your concern one way or another. “Is this my babysitter?” you ask, adjusting your bag of gear.\n\n\n“No. This is your healer. She is going to keep you and my investment alive.”\n\n\nYou give the religious-looking woman a nod as a greeting. “Isn’t there something else you’re forgetting?” You look down at a burlap sack in his hand.\n\n\n“Right, here you go. Don’t spend it all in one place.” The rich man tosses you the sack. \n\n\nUpon catching the sack, it has the unmistakable sound and feel of coins. You gauge its weight, and it feels right. Only a damn fool would dare stiff you on payment. \n\n\nAs she watches you weigh the sack of coins, you take note of the strange look from the healer. Her expression is one you know well. It is betrayal. \n\n\n“Nice doing business with you, Mr?”\n\n\n“Garvin. It’s Dr. Gavin, actually.”\n\n\nUpon hearing the word “doctor,” the healer’s eyes perk up, but you suspect for an entirely different reason than yours did. \n\n\nFor you, there is no way this man is a trained doctor. He comes from old coin, or perhaps he conned a lot of people out of their wealth. No way he earned it all from an honest profession, especially one that involves helping others. \n\n\n“Whatever, let’s go, chick,” you say to the healer, who follows behind you like a lost puppy. \n\n\nDr. Garvin holds up his hand, ready to speak.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tHe says: “Wait, one more is coming.”\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto all_the_support_i_need\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tHe says: “Good luck on your journey.”\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto cat_fight\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#He says: “Wait, one more is coming.”\n\t\t\t\t\t\t\t*goto all_the_support_i_need\n\t\t\t\t\t\t#He says: “Good luck on your journey.”\n\t\t\t\t\t\t\t*goto cat_fight\n\n\n*label page_90\nCongratulations! You are the Support Character!!\n*image support.jpeg\n*set character \"Support\"\nGrowing up in a broken household, you were the middle child of nine. This left you with both the role of nurturing your younger siblings while also policing the older ones. Years of keeping everyone safe and secure has attuned you to a lifetime of giving people exactly what they need, even before they know what is needed. \n\n\nAt times, your support falls under the umbrella of potions and tinctures. Other times it’s a little more obtuse, like giving some simple words of encouragement. At any rate, while you don’t have any real skillset to speak of, in a group, you really bring out the best in the people around you. \n\n\nAfter adequately getting your stomach filled, you decide to check the local quest listing. Surrounded by many flyers and solicitor adverts, there is a sole listing that catches your attention. \n\n\n“Adventurers needed!! Must be healthy. No experience necessary,” the flyer eagerly requests. After skimming the gory details about the dungeon delve, you decide to head over to the rendezvous point, a cave outside of town.\n*choice\n\t#Do you want to join a group?\n\t\t*goto hello_friends\n\t#Do you want to go solo?\n\t\t*goto army_of_one\n\n\n*label hello_friends\nAfter thoroughly reading the request to clear out the dungeon of monsters and retrieve the treasure hoard, you ultimately decide that it’s a tall order to be done by one person. Scouring the town, you eventually find a couple of people willing to share the quest with you. There is an older gentleman who specializes in the role of tanking, a young woman who has a talent for healing, and a spunky DPS. Who do you think you will have the best chances to survive with?\n\n*choice\n\t#Do you take the Tank?\n\t\t*goto tank_me_later\n\t#Do you take the DPS?\n\t\t*goto damage_time\n\t#Do you take the Healer?\n\t\t*goto heal_me_please\n\t*if (Save > 0) #Use a SAVE and take them all?\n\t\t\t*set save -1\n\t\t\t*goto lets_do_this\n\n\n\n*label tank_me_later\n“Hey, old stuff, you’re coming with me,” you say, accompanying a sharp whistle.\n\n\nThere are a couple grumbles from the rest of the group, but you pay them no mind. The Tank was the oldest of the lot and appeared to be the most seasoned for your upcoming expedition.\n\n\nSeeming just as surprised to be chosen as everyone else, the Tank rushes by your side as you make your way to the quest’s location.\n\n\n“Let me ask you a question…why me?” the Tank asks. \n\n\nWhile your role has always been that of supporting and boosting up others, this guy seemed like he needed a pick-me-up. But that wasn’t something you could admit aloud. “You seemed like you were the most experienced. Don’t let it go to your head.”\n\n\nHis eyes perk up upon hearing your reasoning. “I won’t let you down.”\n\n\n“I hope not,” you say, hiding a smile behind your stoic look. \n\n\n*choice\n\t#You believe him.\n\t\t*goto tank_time\n\t#You don't believe him at all.\n\t\t*goto tank_time\n\n\n\n*label damage_time\nLooking over everyone, you decide to go with raw, inexcusable power. “DPS girl, come with me,” you say with a snap of your fingers.\n\n\nShe looks you up and down and hesitates for a long, uncomfortable moment.\n\n\n“What’s wrong?” you ask, wondering what it was that you had done to give her pause.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tShe says “Nothing. Let’s go crack open some heads.”\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto skull_crushing\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tShe says, “No thanks, I’d rather take my chances alone.”\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#Take the Healer.\n\t\t\t\t\t\t\t*goto heal_me_please\n\t\t\t\t\t\t#Take the Tank\n\t\t\t\t\t\t\t*goto tank_me_later\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#She says “Nothing. Let’s go crack open some heads.”\n\t\t\t\t\t\t\t*goto skull_crushing\n\t\t\t\t\t\t#She says, “No thanks, I’d rather take my chances alone.”\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Take the Healer.\n\t\t\t\t\t\t\t\t\t*goto heal_me_please\n\t\t\t\t\t\t\t\t#Take the Tank\n\t\t\t\t\t\t\t\t\t*goto tank_me_later\t\t\t\t\t\t\t\n\n\n*label heal_me_please\nWith a new bounce in her step, the Healer is beaming like a light from a lantern as she stands next you to. It seems as if she was never picked first for anything.\n\n\nEven though she wasn’t exactly your first choice, if she was halfway decent at healing, you should be able to complete the quest without too much incident. Plus, only having two of you means that there was much more of the quest reward to go around. Based on the quest’s description, there would be an ungodly amount of treasure and goodies if you succeed.\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto heal_bot\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t“On second thought, I’ll rather go with the Tank.”\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto tank_me_later\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Take the Healer?\n\t\t\t\t\t\t\t*goto heal_bot\n\t\t\t\t\t\t#Say “On second thought, I’ll rather go with the Tank.”\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto tank_me_later\n\n\n*label lets_do_this\nYou reach both your arms high in the air, beckoning them all to come forth. “We will defeat this dungeon together as a team or perhaps even a family,” you exclaim. \n\n\n“Sounds fun!” the Healer says.\n\n\n“Is there enough reward to go around?” the DPS asks, narrowing her eyes.\n\n\n“A noble group of warriors,” the Tank declares while raising his clenched fist.\n\n\n“I read through the quest notes twice. Even if we clear half the dungeon, Saint Garvin will reward us with five hundred gold to share. But I believe that there is more treasure hidden deeper inside the cave—people call it the money pit.”\n\n\n“Wouldn’t he want that treasure for himself?” the Healer asks.\n\n\n“What Mr. Garvin doesn’t know won’t hurt him,” the DPS says.\n\n\n“I agree,” you say, emptying all your pockets to make room for all the possible loot.\n\n*choice\n\t#You like the idea of stealing stuff.\n\t\t*goto four_of_a_kind\n\t#You hate the idea of stealing stuff.\n\t\t*goto four_of_a_kind\n\t#You are luke warm on the idea of stealing stuff.\n\t\t*goto four_of_a_kind\n\t#It is only stealing if you get caught.\n\t\t*goto four_of_a_kind\n\n\t\t\t\n*label army_of_one\nYou glance down at your poorly mended clothes and know exactly what has to be done. Deep in debt, you decide to try and head out on an adventure by yourself for once. You’ve spent your entire life supporting others, and now you wish to support yourself.\n\n\nMaking your way to the cave, you notice an odd-looking person approaching you.\nPerhaps you were a little hasty in your idea for the solo run. There is a chance you might be able to get this person to support you for a change.\n\n*fake_choice\n\t#Head into the cave before they get there?\n\t\t*goto solo_rider\n\t#Or wait.\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto no_traps\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto gank_you_very_much\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#It is the Trapper.\n\t\t\t\t\t\t\t*goto no_traps\n\t\t\t\t\t\t#It is a killer.\n\t\t\t\t\t\t\t*goto gank_you_very_much\n\n\n*label no_traps\nYou wait a spell and are approached by an oddly dressed character. They have fur-lined clothes and appears to be a hunter of sorts, wearing the spoils of past hunts as clothing.\n\n\n“Hail. What brings you by these parts?” you ask with them with a smirk.\n\n\n“I heard a rumor of a quest of sorts.”\n\n\n“Same. But no one besides us are here.”\n\n\n“Bummer. I guess I’ll do it solo, then,” they say.\n\n\n“Wait. We can go in together if you like. I’m a good supporter.”\n\n\nThe animal-skinned character looks you up and down while biting their cheek. “I dunno.”\n\n\n“Please?” you press, wondering what about your appearance seems to be so off-putting.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tThey agree to your duo\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto supportive_duo\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tThey refuse to go with you.\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*set save +1\n\t\t\t\t\tYou gain +1 SAVE!\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto solo_rider\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#They agree to your duo.\n\t\t\t\t\t\t\t*goto supportive_duo\n\t\t\t\t\t\t#Decide to leave?\n\t\t\t\t\t\t\t*set save +1\n\t\t\t\t\t\t\tYou gain +1 SAVE!\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto solo_rider\n\n\n\n*label gank_you_very_much\nYou approach the strange masked figure with a couple raised thumbs, trying to seem agreeable with their scary vibe. Because of the wooden face mask, you can’t tell how exactly your greeting is received.\n\n\nNo bother, you try again, using your words this time. “Hello there, would you like to group up for a quest? I have all the details.”\n\n\nThe masked figure shows no indication that it understands or cares about you. \n\n\nUsing the elven tongue, you repeat yourself, but to no avail. Thinking this thing is either deaf or dumb, you head over to the cave by yourself.\n\n\nOnly you aren’t by yourself. The masked figure follows you to the opening, like a shadow.\n\n\nMaybe it does understand me, you think to yourself. “So, we’re grouping up, then? Or no?”\n\n\nThe figure gives you a slow, yet peculiar nod. It looks as though its head is going to fall straight off its shoulders. \n\n\n“Okay, then,” you say, wondering if you made a huge mistake or not.\n\n*choice\n\t#Sing a song.\n\t\t*goto the_odd_couple\n\t#Hum a tune.\n\t\t*goto the_odd_couple\n\t#Dance a jig.\n\t\t*goto the_odd_couple\n\t#Do nothing.\n\t\t*goto the_odd_couple\n\n\n*label page_100\nCongratulations! You are the Trapper!!\n*image trapper.jpeg\n*set character \"Trapper\"\nA lifetime of keeping to yourself has taught you ways to survive without having to rely on anyone. Good riddance. People only ever let you down. At least that was in your experience. \n\n\nWith the clothes on your back and tools in your sack, you utilize trapping to catch food, for your ultimate protection, and to snare yourself some animal companionship.\n\n\nHaving trust issues, you would much rather spend time with the beasts you catch. Their motives are never secret, unlike the deceptive nature of humankind who only look out for their own best interests. These truths have led you to a nomadic life of the great outdoors, although not all necessities can be bartered for, and that is why you must on occasion accept coin in exchange for your guide services. \n\n\nAfter restocking, you’re set to leave Teepeekay for greater pastures, when an average-height man approaches you. \n\n\n“Hello, are you a guide looking for a hire?” the average-height man asks with big smile. \n\n\nWith a puzzled expression, you give him a reluctant nod. \n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto i_need_payment_upfront\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto you_can_pay_me_afterwards \n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Demand payment upfront.\n\t\t\t\t\t\t\t*goto i_need_payment_upfront\n\t\t\t\t\t\t#He can pay afterwards.\n\t\t\t\t\t\t\t*goto you_can_pay_me_afterwards \n\n\n*label i_need_payment_upfront\n“I would gladly help you out, but I require payment up front, because my business is in my knowledge of the land,” you boast.\n\n\nHe stammers a bit, trying not to back out of his offer right away.\n\n\nWaiting for a reply, you pull out your hand axe, chop off a piece of the wooden table and start to whittle yourself a toothpick out of it.\n\n\n“Let me ask you. Have you been inside the cave at the edge of town?” he finally asks.\n\n\n“I have, many times.”\n\n\n“Do you think you could escort a couple of adventurers through that cave?”\n\n\n“To the very end?”\n\n\n“If possible.”\n\n\n“You know the cave is very dangerous, and it is certain death to venture too far inside there?”\n\n\n“Yes, I am aware. All I require is for you to guide them along, and if they shall end up at the other end of a spear or claw, you may return for your payment.”\n\n\nThis sounds quite different from any other guidance job you’ve been hired for. This quest giver doesn’t seem at all concerned for the safety of his questers. \n\n\n“How about half now, and half when…you’re done?” he bargains.\n\n\n“Let me get this straight—I get paid the same no matter if they complete the dungeon or die in the first room?”\n\n\n“That is correct. Think of it as a danger tour. I get paid to send people on an adventure. And it’s your job to make sure they don’t get lost or flee.”\n\n\nThis whole scheme keeps getting even more suspicious.\n\n\n“Deal.” You take him up on his offer.\n\n\nHe slides over a sack of about twenty gold coins across the table. “Meet my team by the cave entrance. Hope to see you soon,” he says with a sinister grin.\n\n\nYou suddenly start to fear for your own safety and wonder if you should bring your extra set of traps along. Just in case.\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*set save +1\n\t\t\t\t\tYou gain +1 SAVE!\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto guiding_the_way\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto full_party\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Be a guide.\n\t\t\t\t\t\t\t*set save +1\n\t\t\t\t\t\t\tYou gain +1 SAVE!\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto guiding_the_way\n\t\t\t\t\t\t#Get a full party?\n\t\t\t\t\t\t\t*goto full_party\n\n\n\n*label you_can_pay_me_afterwards\n“Sure. I require prompt payment after the job is complete. What is the job by the by?” you ask, feeling wary about getting propositioned without any indication as to why.\n\n\n“I need you to track a person who’s been killing my adventurers. They’re a ruthless assassin with no morals whatsoever,” the youthful man explains.\n\n\n“That’s it? Just track him, not engage with him afterwards?” you try and clarify.\n\n\n“Not just tracking. I need you to lay a trap for him and return to me once he’s snared in it.”\n\n\n“Does it matter if he’s dead or alive?”\n\n\n“Yes, alive is a must, but the trap doesn’t at all need to be humane. Just not lethal.”\n\n\nTapping against your pack, you have just the device for such a job. “How much are you paying for this?”\n\n\n“One thousand gold pieces.”\n\n\n“Consider it done,” you say without hesitation. That is by far the biggest bounty you’ve ever been offered, and you didn’t even have to kill anyone.\n\n*choice\n\t#Is he the sucker?\n\t\t*goto how_to_catch_a_criminal\n\t#Are you a sucker?\n\t\t*goto how_to_catch_a_criminal\n\t#Are you both suckers?\n\t\t*goto how_to_catch_a_criminal\n\t\n\n*label just_the_two_of_us\nEntering the dank dark cave, you feel a chill crawl up your spine like a spider up a wall. \n\n\nYour healing companion is quick to light a candle that gives off only a smidge of light. While it isn’t much, it’s better than sitting in the dark.\n\n\nFrom beyond your light, you hear a faint scratching sound that tells you that something else is sharing the corridor with you both.\n\n\n“Did you hear that?” you ask, but based on the Healer’s wide-eyed expression, you know she heard it, too. If only you had a long pole to poke around with. You realize how unprepared you are for this secret mission.\n\n*fake_choice\n\t#Do you investigate the sound?\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\ t’s…it’s…a little green guy.”\n\n\n“He’s kind of cute, actually,” the Healer admits, lowering her battle-ready staff.\n\n\nYou take a moment to examine the situation.\n\n\n“What is our secret mission again?” you ask, wondering if murdering this small monster was part of it. This is proof that your mind isn’t what it used to be.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto lost_puppy\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\t\t\t\t\t\n\t\t\t\t\t“It doesn’t matter because he’s coming right for us!”\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto small_green_guy\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#It's a puppy!\n\t\t\t\t\t\t\t*goto lost_puppy\n\t\t\t\t\t\t#It's a little green monster.\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t“It doesn’t matter because he’s coming right for us!”\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto small_green_guy\n\n\n\n*label lost_puppy\nThe Healer says, “Our secret mission is to find Bishop Garvin’s pet,” she explains. \n\n\nWhile this creature is small and is cute, in a hairless cat sort of way, you doubt a bishop would keep such an animal as a pet. Then you wonder if you’re both talking about the same Mr. Garvin, because the guy you met was wearing no holy attire and spoke quite commonly, nothing like you would expect from someone high ranking in any clergy. “Welp, since it doesn’t seem to be hostile towards us, maybe we should save our energy for a more menacing foe,” you reason.\n\n\n“Good plan,” the Healer agrees.\n\n\nYou hesitate, wondering if fighting this creature would trigger one of your long-lost memories. It is a tactic you’ve used in the past to keep your mind sharp as a shark’s tooth. \n\n\n“You coming?” the Healer asks. \n\n*choice\n\t#Do you murder the creature anyway?\n\t\t*goto round_two\n\t#Do you move on?\n\t\t*goto corridor\n\n\n\n*label small_green_guy\nWith only one small creature to deal with, you swing your shields around in a windmill attack, and it scrambles about trying to make a break for it. Finding your opening, you prepare to slam your shield down, and everything appears to be moving in slow motion. It looks directly into your soul with a puppy dog stare. Guilt forces you to pause for a moment. Then its grin turns devilish, and it hits you in the face with a jagged rock while disappearing into the darkness.\n\n\n“Son of a B!” you blurt out, rubbing your forehead.\n\n\n“Serves you right. He wasn’t hurting anyone.”\n\n\nHaving had a closer look, you can’t help but wonder whether the monster’s tone is green or more brownish. Likewise, you’re not sure if it has scales or fur. You contemplate if it’s even worth fighting this nuisance.\n\n*choice\n\t#Do you fight?\n\t\t*goto round_two\n\t#Do you retreat?\n\t\t*goto lets_get_out_of_here\n\n\n*label round_two\nReady for revenge, you approach the creature hiding in the darkness and notice a second pair of little green eyes staring back at you. Before you can warn the Healer of this new threat, both little green guys jump on you and proceed to scratch your face and neck. Their claws are thin and sharp like that of a feral kitten. While you feel the initial pain, a numbness washes over you as you experience the healing power of your companion. \n\n\nYou block one while slamming the other. They are no match for your double-shield assault. With a final spinning attack, you manage to knock both creatures into the air. When they land, however, you hear a loud cracking sound, and they both are now lifeless. You spend a moment going through their little corpse pockets, looking for treasure.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou find a coin. You gain +1 SAVE!\n\t\t\t\t\t*set save +1\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto corridor\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto lets_get_out_of_here\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#You find a coin.\n\t\t\t\t\t\t\tYou gain +1 SAVE!\n\t\t\t\t\t\t\t*set save +1\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto corridor\n\t\t\t\t\t\t#You notice that one of your shields is now broken.\n\t\t\t\t\t\t\tYou lose 1 SAVE.\n\t\t\t\t\t\t\t*set save -1\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto lets_get_out_of_here\n\n\n*label corridor\nYou enter a long and narrow passageway. Visibility is quite low due to all the dust floating around. Someone has most assuredly gone through this corridor recently, or perhaps they’re still here.\n\n\nYou look behind you into the darkness, fearing that there might be some green-eyed monsters following you from the previous room. There is no telling how many of them were hiding in the shadows. Your eyesight isn’t what it used to be, especially in these low-light situations.\n\n\nYou hear a faint click, and some projectiles fly at you from out of nowhere. Luckily, they stick into your shield.\n\n\n“That was fortunate,” the Healer says.\n\n\n“Fortune has nothing to do with it. Readiness and good-quality gear are key,” you say, giving your shield a hearty pat.\n\n\n“I am more of a fate girl, myself. But now’s not the time for me to get all preachy.”\n\n\nNever interrupt a holy girl when she concedes to proselytizing; that’s what they say, anyway. \n\n\nYou decide to investigate the area instead of “getting into it.” Judging by the dust and the long stretch in front of you, an idea comes to mind. “I think we’re going to have to run for it. I have a feeling this place is rife with traps.”\n\n\n“You’re the bodyguard.”\n\n\n“I suppose you want me to guard your body, then?” \n\n\n“That would be ideal.”\n\n\nForced into showing off your bravery, you rush forward through the corridor as arrows fire at you from both directions. The Healer is close behind you, letting you trigger all the oncoming traps.\n\n\nYou feel invincible. It could be that the Healer is healing you, or perhaps it’s your adrenaline, but either way, you don’t think you’re getting hurt.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*set save +1\n\t\t\t\t\tYou managed to block every single arrow with your superior shield technique. Gain +1 SAVE.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto spot\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou managed to get nailed by nearly every single trap along the way. You resemble a cactus, with all the arrows sticking out of you. If it wasn’t for the Healer, you would have absolutely died right then and there. \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto spot\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Block the arrows?\n\t\t\t\t\t\t\t*set save +1\n\t\t\t\t\t\t\tYou managed to block every single arrow with your superior shield technique. Gain +1 SAVE.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto spot\n\t\t\t\t\t\t#Get hit by a couple?\n\t\t\t\t\t\t\tYou managed to get nailed by nearly every single trap along the way. You resemble a cactus, with all the arrows sticking out of you. If it wasn’t for the Healer, you would have absolutely died right then and there. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto spot\n\n\n\n*label alone\nAfter suffering great loss, you have no choice but to continue on this adventure alone. Fortune hasn’t been good for you, but you won’t let your downfalls destroy your mood. You’ve lived a long time, and this isn’t by far the worst of it. You just have to better prepare yourself for the future.\n\n\nIf only you had a better weapon, you might be able to thrive like in your youth.\n\n\nDirty, emotionally wrecked, and starved for companionship, you spot a man handing out flyers deeper inside the endless cave.\n\n\nIn a double step, you rush up to him and eagerly introduce yourself. “Hello. I’m the Tank.”\n\n\n“Oh. We’re using roles, are we?” the man in business casual attire asks.\n\n\nTaken aback by his response, you nod in agreement.\n\n\n“I’m OT3,” the man says, with a look that says you should be impressed.\n\n\nNot knowing what all that means, you give him a smile. “Would you like to join my party?”\n\n\n“What happened to your friends? I’m sure you didn’t come all the way down here alone.”\n\n\n“I don’t remember, actually,” you say, trying to recall how you got down this far, as it were.\n\n\n“Memory loss, huh? You know what, I have a tool that can help you with that,” the man says.\n\n\n“You do?”\n\n\n“Of course. It’s called perfect recall. It’s just one of our galactic powers, along with remote viewing, going exterior from your body, and finding good parking spots for my horse. As an OT, I can do all kinds of stuff like that. And if you join, you can, too.”\n\n\nYou were skeptical of this person, but now you start to think of him as some sort of space wizard.\n\n\n“Hmm.” Changing class roles so late in life might not be such a good plan. But all of his spells seem to be really interesting.\n\n\nDecide what you say.\n\n*fake_choice\n\t#“Sure, I’ll give this OT thing a try.””\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto going_up_the_bridge\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\tHe hands you a book.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto one_little_book_cant_hurt\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t#Join a cult.\n\t\t\t\t\t\t\t\t\t*goto going_up_the_bridge\n\t\t\t\t\t\t\t\t#Read about it first.\n\t\t\t\t\t\t\t\t\tHe hands you a book.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*goto one_little_book_cant_hurt\n\t#“No. I think I’ll stick with tanking.”\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto pts_curse\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto fair_game\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Become PTS?\n\t\t\t\t\t\t\t\t\t*goto pts_curse\n\t\t\t\t\t\t\t\t#Become an SP?\n\t\t\t\t\t\t\t\t\t*goto fair_game\n\n\n\n*label pts_curse\n*image death.jpg\n*set deaths +1\n*set character \"unknown\"\n*set save 0\nAfter the encounter with the space cultist, you feel that something about you isn’t quite right. At every turn, you seem to be bumping into things and fumbling your attacks and even fouling up simple tasks like bandaging up your wounds.\n\n\nYou were once a great warrior of the crown, but now you can’t seem to do anything right. You regret not taking him up on his offer to join.\n\n\nThrough the next couple days, you end up hiding from monsters instead of attacking them, fearing that you might hurt yourself beyond repair. \n\n\nSoon you end up getting pneumonia and dying. \n\n*choice\n\t#Please go back to “The Beginning” and avoid cults.\n\t\t*goto the_beginning\n\n\n*label fair_game\nHow quickly tides turn when you refuse his offer of enlightenment. The cultist is now attacking you with a huge book adorning an embossed cross on the cover. The points of the cross appear to be sharpened into points. \n\n\nYou’re glad to have your trusty shield by your side. It’s reliable, sturdy, and never mouths off. Speaking of mouthing off…\n\n\n“KSW. Shatter SP,” the cultist says, relentlessly attacking you with his scripture.\n\n\nHe may be speaking gibberish, in tongues, or perhaps it’s some incantation for a spell. Whatever the case may be, you’re on guard waiting for an opportunity to retaliate.\n\n*choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*choice\n\t\t\t\t#The wheels of fate have decided.\t\t\t\t\t\n\t\t\t\t\tYou scare the cultist away by asking a bunch of logical questions. As he flees, a small booklet falls out of his back pocket.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto one_little_book_cant_hurt\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto pts_curse\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Scare the cultist.\n\t\t\t\t\t\t\tYou scare the cultist away by asking a bunch of logical questions. As he flees, a small booklet falls out of his back pocket.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto one_little_book_cant_hurt\n\t\t\t\t\t\t#Make a fist.\n\t\t\t\t\t\t\tYou punch the culty in the face, and he’s knocked out cold.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto pts_curse\n\n\n*label going_up_the_bridge\nYou join the order of the OT and are teleported to a giant sandcastle. There you begin your training at the base of a golden bridge that stretches up to the heavens. Each step on the bridge costs you an exorbitant amount of coin and your sense of self.\n\n\nYour ending is based on how many SAVES you have.\n\n*if (Save = 0)\n\t*image death.jpg\t\n\t*set deaths +1\n\t*set character \"unknown\"\n\tYou get bogged down and fall off the bridge and drown in the clear water. You dead.\n\t*choice\n\t\t#Please go back to “The Beginning” and avoid cults.\n\t\t\t*set save 0\n\t\t\t*goto the_beginning\n\t\t\t\n\n*if (Save = 1) \n\t*image death.jpg\n\t*set deaths +1\n\t*set character \"unknown\"\n\tYou make it all the way to the wall of fire and burn up from all the truth you can’t handle.\n\t*choice\n\t\t#Please go back to “The Beginning” and avoid cults.\n\t\t\t*set save 0\t\t\t\n\t\t\t*goto the_beginning\n\n\n*if (Save = 2) \n\t*image death.jpg\n\t*set deaths +1\n\t*set character \"unknown\"\n\tYou defeat the wall of fire but are later defeated by battle thetans that haunt your body.\n\t*choice\n\t\t#Please go back to “The Beginning” and avoid cults.\n\t\t\t*set save 0\n\t\t\t*goto the_beginning\n\n\n*if (Save > 2) \n\tYou defeat the battle thetans by realizing you made them up, then you fight the ultimate boss…Xenu (or possible XEMU, the jury is out on the spelling). After a long galactic battle, you use your OT spells to shatter and destroy his suppression. You’re now the new ecclesiastic ruler of the cult and renowned as a god. \n\t\n\t\n\tThe End?\n\t*achieve end10\n\t*stat_chart\n\t\ttext Deaths \n\t*goto_scene ending\n\n\n*label spot\nYou enter a large room and feel an intermittent rumbling sound that keeps getting louder.\n\n\n“What is going on?” you say aloud.\n\n\n“Could it be an earthquake?” the Healer asks.\n\n\n“This is not the ideal place to be if it is, although I don’t believe it is. I think it’s a…”\n\n\n“Magical dinosaur!” she blurts out with an outstretched hand and a pointing finger.\n\n\nIt was indeed that. Standing before you is a huge lizard with its bat-like wings outstretched.\n\n\n“And now it’s flying!” you admit, watching in awe as it takes to the sky. To slay a dragon dinosaur has always been a dream of yours. Your only impetus for not pursuing it is that you have no fireplace of your own in which to mount its massive head. That and they were rumored to be extinct.\n\n\n“Wait. Don’t hurt it,” the healer says, blocking your way with her staff.\n\n*choice\n\t#Do you fight it?\n\t\t*goto dino_fight\n\t#Or do you hold off?\n\t\t*goto i_have_a_hunch\n\n\n*label i_have_a_hunch\nYou turn towards the Healer. “Why would you ever stand between a man and slaying a rare dino?” \n\n\n“Look at its collar,” she explains as the huge monstrosity roars at you both, nearly knocking you both over from the burst of hot air.\n\n\nYour eyesight isn’t what it used to be, and you’re unable to read what the collar says. “And?”\n\n\n“And…I think this is Cardinal Garvin’s pet.”\n\n\n“Really? A dinosaur?”\n\n\n“Why not a dinosaur?” she asks, slamming her foot down in a huff.\n\n\n“It’s not like you can buy one at the local market, and then when it outgrows the small cage that came with it, you have to release it into the wild or anything,” you explain, recalling a time you bought your daughter a turtle.\n\n*choice\n\t#Do you need some kind of proof?\n\t\t*goto why_cant_i_kill_it_again\n\t#Do you take her word for it?\n\t\t*goto how_to_catch_a_dino\n\n\n*label how_to_catch_a_dino\nThe huge beast is licking its chops and heading straight for the Healer’s holy meat.\n\n\nYou bang your shield against the cavern wall to get its attention. “Over here, you over-sized lizard with magical abilities and rare bones.”\n\n\nIt lets out a small bark that is much, much smaller than its bite. It sounds almost cute, except there isn’t anything cute about the huge fireball that is released afterwards.\n\n\nYou block the blast with your shield, but you’re instantly on fire.\n\n\nThe Healer casts a miracle spell, and you’re instantly cured of your ailment. If she wasn’t around, you would have been dino food, medium rare.\n\n\nThe towering beast spins around with a massive whipping tail attack. You block it with your shield but also reel backwards from the sheer force. \n\n*if (Save > 0)\n\t*set save -1\n\tReadying yourself for more abuse, you throw your shield at the beast, and it catches it in its mouth, biting it in half.\n\t\n\t\n\t“Keep him distracted, Tank,” the Healer demands, finally getting onboard with the fight.\n\t\n\t\n\tThis is your chance to do what you’re born to do—draw the creature’s ire. You shout at the top of your old lungs. What comes out is an old bard’s tune that you have nearly forgotten all the lyrics to. Instantly the beast comes back at you.\n\t\n\t\n\tAnticipating another tail attack, you jump over it like it was a rope and run under the beasts’ legs, all while the Healer manages to close up your previous wounds with her magical staff. But this might have been a poor plan, because the dinosaur picks up its massive foot. You might not be able to get away in time…\n\t*if (Save > 0)\n\t\t*set save -1\n\t\tYou dodge his humongous foot and climb on its spiky back. Each step is like walking through small blades as they go right through the soles of your armored boots.\n\t\t\n\t\t\n\t\tLuckily the Healer has enough power to regenerate your life as you climb the giant beast. \n\t\t\n\t\t\n\t\tThe intense conditions of the climb happen to trigger an event from your past. You recall ascending the long, stone steps of a hillside monastery. \n\t\t\n\t\t\n\t\tYour wife joined the order, abandoning you and your only daughter. You had no business raising children, not after giving your oath to the crown. You aimed to make her come back to her senses and do the right thing…come home.\n\t\t\n\t\t\n\t\tScaling those steps was the hardest thing you’ve ever had to do. Only in the end, your wife wouldn’t see you. I was told that she had married the order now, and she was a widow of her former life.\n\t\t\n\t\t\n\t\t“Oh, Ethelbe, why would you deny me,” you whisper with tears in your eyes. You still cannot recall her reasons for leaving. But you do recall her saying, “Even a bad plan is better than no plan.”\n\t\t\n\t\t\n\t\tReaching the dinosaur’s head, you’re forced out of your memory and begin to choke the beast.\n\t\t\n\t\t\n\t\t“Don’t hurt it,” the Healer says.\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto sleepy_time\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto pancakes\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Let it go.\n\t\t\t\t\t\t\t\t\tThe dinosaur flaps its magical wings and soars up to the ceiling of the cave, out of reach\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*goto sleepy_time\n\t\t\t\t\t\t\t\t#Hurt it more.\n\t\t\t\t\t\t\t\t\t*goto pancakes\n\t*else\n\t\t*goto pancakes\n*else\n\t*goto dino_fight\n\n\n\n*label sleepy_time\nHeeding the Healer’s warning, you begin to pet the scaly beast’s nose as she sings a soothing hymn with her angelic voice. \n\n\nIts eyes, which are roughly the size of crystal balls, start to look heavy while being lulled. \n\n\nSoon it nods off into a dead sleep.\n\n\n“We did it. We defeated the magical flying dino,” the Healer says in an excited whisper, hoping to not wake the snoozing giant.\n\n\n“What do we do now?” you ask.\n\n\nThe Healer pulls out a magical ball of holding and throws it at the monster. The ball snaps open, and the beast disappears into the mysterious dimension inside of the ball.\n\n\nAfter a couple wiggles, the ball is locked, and she picks it up with ease, as if it were as light as a feather. \n\n\nYou both return to town and meet up with Strongman Garvin.\n\n\n“We have returned victorious,” you call out.\n\n\n“Did you guys meet my pet?” Mr. Garvin asks.\n\n\n“We sure did,” you say, wiping your brow.\n\n\n“I take it he wasn’t hungry?” \n\n\n“Oh, I think he was,” you counter.\n\n*fake_choice\n\t#Give back the magical ball.\n\t\tHe acc
