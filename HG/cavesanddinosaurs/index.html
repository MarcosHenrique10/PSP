u with an arsenal of weaponry.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto a_new_plan_2\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou clash, stabbing each other in the throat\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto page_105\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Fight good?\n\t\t\t\t\t\t\t*goto anyone_home\n\t\t\t\t\t\t#You clash, stabbing each other in the throat\n\t\t\t\t\t\t\t*goto page_105\n\n*label a_new_plan_2\nYou hit him in the chest while his stabs you in the leg. When it comes to trading blows, you seem to have the upper hand.\n\n\nUnnaturally fast, the masked figure drinks down a potion of healing, closing up the gaping, gushing wound on his neck.\n\n\nBefore you can think about using your special ability, the masked figure comes at you again, this time twirling its flail overhead.\n\n\n“Die!” you scream as you both clash weapons again. This time, you’re close enough to the darkness in his dark graveyard eyes.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tWaiting for a trick, you notice a small dagger the masked figure pulls out of his sleeve. As he lunges at you, you knee his hand, driving the blade back into his chest. Dark smoke pours out of his clothes, and you take a generous step backwards. \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t“What is happening right now?”\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\tThis was not just a normal kill. Something much bigger is at work.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto a_curse_is_lifted\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tWith an unseen dagger and a flick of his wrist, you get disemboweled.\n\t\t\t\t\t*goto page_105\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Waiting for a trick, you notice a small dagger the masked figure pulls out of his sleeve.\n\t\t\t\t\t\t\tAs he lunges at you, you knee his hand, driving the blade back into his chest. Dark smoke pours out of his clothes, and you take a generous step backwards. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t“What is happening right now?”\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThis was not just a normal kill. Something much bigger is at work.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto a_curse_is_lifted\n\t\t\t\t\t\t#With an unseen dagger and a flick of his wrist, you get disemboweled.\n\t\t\t\t\t\t\t*goto page_105\n\n\n*label a_curse_is_lifted\nUpon killing the masked figure, you notice its soul escape the body and disappear into the ether. As this is happening, you get flashes of all the countless murders it has committed.\n\n\nWhat a wicked, disgusting beast that one was. After ridding the likes of it from this world, you feel somehow at peace. It is as if something has mysteriously changed for the better. \n\n\nTraveling through the cave, you can’t help but feel like it is stale and still. First, you notice that there are no longer any monsters, traps, loot, or adventuring people. It is like the whole cave has been cleared out, defeated. It is like you have won, only you have nothing but your memories to show for it. No prize or banner.\n\n\nYou end up finding the exit without incident. In town, when you try and locate Mr. Garvin to collect your quest reward, he is nowhere to be found. This all might have been a bad dream, or an adventurous nightmare or perhaps the very person who sent you on this wild goose chase was trying to kill you all along. At any rate, you won, and you swear to never enter a cave or a deep dark closet for as long as you shall live.\n*achieve end23\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label every_move_you_make\nYou follow the two girls into the drafty cave. The more abrasive one pulls out a torch and hands it to the meeker one. This small action reveals to you the matriarchal pecking order between the two.\n\n\nInside the first room, there are a bunch of smallish creatures scurrying around, but they pay them no mind. \n\n\nYou, on the other hand, nearly make an alliance with the creatures in order to keep quiet. One in particular is pulling on your leg with the eagerness of a starved child.\n\n\n“Okay, okay, just be quiet.”\n\n\nYou look inside your pack for something to give the green little guy.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou give him your lantern.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto room_two\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou take some time rummaging around but ultimately decide to give him your extra shield.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto room_four\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#You give him your lantern.\n\t\t\t\t\t\t\t*goto room_two\n\t\t\t\t\t\t#You take some time rummaging around but ultimately decide to give him your extra shield.\n\t\t\t\t\t\t\t*goto room_four\n\n\n*label room_two\nCreeping into the next room, you notice the duo fighting some sort of snake-haired monster. With each swipe, snakeheads go flying this way and that. \n\n\nThe DPS girl is a wonderful fighter, and that’s why you found this one tidbit strange; every now and then, one of her attacks would miss. But only after you could have sworn that you saw them connect. The only reasonable explanation is that your eyes aren’t what they used to be. That was your first assumption anyway, but after the third or fourth time, you dare to reconsider.\n\n\nThe snake-headed monster has a paralyzing stare, but the healer seems to keep its effect to a minimum with some prayer spell. Soon, they prove victorious.\n\n\nAfter they leave the area, you see a little twinkle of an item they must have overlooked.\n\n*choice\n\t#Do you follow them?\n\t\t*goto room_three\n\t#Do you search the room?\n\t\t*goto fine_loot\n\n\n*label fine_loot\nThe room is dark, nearly pitch black, and you have no means to make it brighter. Though you don’t need light to feel the cold, hard steel of a jeweled greatsword. You trace out the rune etchings on the steel blade. Feeling its heft, you know this will be a fine weapon.\n\n\n“Now I’ll be able to venture through here alone,” you reason, already getting sick of serving the role of “stalker.”\n\n\nSuddenly a jagged mouth appears on its hilt, and it bites down on your arm. It isn’t a weapon at it. It’s a monster!\n\n\n“You tricky bastard.” Staggering around like a drunk, you flail around trying to get this thing off of you. It’s got a grip like a politician. After bashing it a couple times, it lets go. Once detached, it flops around like a metal fish, making a high-pitch clanging sound.\n\n\nYour back is up against the wall as you wonder.\n\n*choice\n\t#Do you fight it?\n\t\t*goto lets_go\n\t#Do you flee?\n\t\t*goto room_five\n\t#Do you flee AND fight?\n\t\t*goto lets_go\n\n\n*label lets_go\nUsing both your shields in tandem, you spin around until you crash into something, anything, not sure if you’re hitting a wall or the monster sword, but you don’t rightfully care. You’ll smash into the bitey sword eventually.\n\n\nYou spin and thrash about until the point where you throw up. You’re beyond dizzy. \n\n\nAfter you wipe off your chin, you see a slight shimmer of a piece of loot. You did it. You’ve bested the monster, and in the dark, no less.\n\n\nIt was a reckless move but effective. This was the same tactic you used once to defeat a rabid unicorn back in your heyday. Only instead of using shields, you had swords. Back then, your weapons were your only children. Now you can’t recall what happened to them. Did you set them to rest in the castle armory or pass them down?\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou’re in hurry to catch up with the girls.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto room_four\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou aim to collect the loot.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto fine_loot\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#You’re in hurry to catch up with the girls.\n\t\t\t\t\t\t\t*goto room_four\n\t\t\t\t\t\t#You aim to collect the loot.\n\t\t\t\t\t\t\t*goto fine_loot\n\n\n*label room_three\nUsing the two girls’ shadows as your only concealment, you are close enough to eavesdrop on their conversation.\n\n\n“You should give it a try sometime. You might like it,” the DPS says.\n\n\n“No thanks,” the Healer says.\n\n\n“Suit yourself. But I think you’d be wonderful at it, if you’d only let your guard down.”\n\n\nIn the nearby corner, you notice some magical smoke start to take shape in the form of a giant boulder. Then, as if it triggered some trap, the thing rolls towards them as if the unseen hand of God gave it a little push. This is very suspicious.\n\n\n“Look out!” the DPS yells, but you can’t exactly see what’s happening. After some commotion, the DPS and boulder have left out one exit and the Healer out another. \n\n*choice\n\t#Do you want to follow the Healer?\n\t\t*goto there_she_goes\n\t#Do you want to follow the DPS?\n\t\t*goto secret_door\n\t#Surprise me.\n\t\t*goto secret_door\n\n\n*label secret_door\nYou follow the boulder “trap” through the exit. \n\n\nIn the nick of time, the DPS jumps out of the way and the boulder crashes through the wall, creating a hole. \n\n\nShe runs towards the hole as an act of defiance. \n\n\nAs if something were watching and taking offense to her rude gesture, a giant six-headed snake creature emerges out of the hole.\n\n\nYou know there was no way a creature of that magnitude could have been hiding in that small hole. It must have materialized like the boulder. \n\n\nSomething about this cave is not right, and you’re just beginning to see behind the scenes of it. The strange thing is that neither the DPS nor the Healer seems to be spotting any of the oddities. They must be seeing everything from the wrong angles.\n\n\nCatching her breath, the Healer comes in, huffing and puffing. “Are we…fighting this?” \n\n\n“You bet your ass, we are.”\n\n\nSide by side, they do a fighting pose like a couple of badass chicks.\n\n*choice\n\t#Fight for your life?\n\t\tYou gain +1 SAVE!\n\t\t*set save +1\n\t\t\n\t\t\n\t\t*goto fight_for_your_life\n\t#Fight, but not for your life?\n\t\t*goto fight_for_your_life\n\t#Fight like that scene in the Abyss where Virgil (Ed Harris) screams as his estranged ex-wife Lindsey (Mary Elizabeth Mastrantonio) into coming back to life?\n\t\tYou gain +2 SAVES!\n\t\t*set save +2\n\t\t\n\t\t\n\t\t*goto fight_for_your_life\n\n\n*label room_four\nUpon entering, your armor makes a slight sound, and it startles the Healer. She looks over towards you, but you’re cast in shadows by her candle.\n\n\nYou don’t know what happened, but it seems that the DPS is nowhere to be seen. They might have had a disagreement or might be trying to flank a monster up ahead. This room has four exits, so the DPS could have gone out of any of those paths.\n\n\nBounding, nearly skipping, the Healer leaves out the north exit, splashing a trail of candle wax behind her.\n\n\nYou are now left alone in utter darkness. This reminds you of a shadow monster you once had to slay. It had become unattached from its host, and you and the other lost men had acquired magical weapons in order to be able to strike it. In the end, you won but never trusted a shadow since.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto there_she_goes\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto the_dark\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Chase the girl?\n\t\t\t\t\t\t\t*goto there_she_goes\n\t\t\t\t\t\t#Chase your shadow?\n\t\t\t\t\t\t\t*goto the_dark\n\n\n*label room_five\nThe girls begin to fight a towering six-headed snake thing. Each head could easily swallow a man such as yourself. You can’t help but wonder how such an enormous monster could ever fit through the cave entrance in the first place. It must have been hatched here. \n\n\nEven though your presence is unknown to the girls who are busy fighting this monstrous thing, one of the snakeheads is following your every move.\n\n\nThen the girls manage to cut off one of the heads they’re dealing with.\n\n\nYou look down at your blunt shield and realize that for you, cutting is not an option. Blocking and bashing are more your deal.\n\n\nA snakehead lurches at you, and the girls both notice you standing as if you got caught peeing in a bush.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto fight_for_your_life\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto snap\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Fight, for your right...to paaarty.\n\t\t\t\t\t\t\t*goto fight_for_your_life\n\t\t\t\t\t\t#Ohhhh snap.\n\t\t\t\t\t\t\t*goto snap\n\n\n*label fight_for_your_life\nThe enormous snakehead comes down on you, and you manage to block it with your shield. \n\n\n“What are you doing here?” The DPS girl yells at you while positioning herself to attack another head.\n\n\n“We could use his help,” the Healer says.\n\n\n“Absolutely not. We don’t need a man to save us. He is only going to get us killed. Or worse yet, try to explain stuff to us.” Distracted by you, the girls overlook the two snakeheads en route to eat them both. You have a decision to make, and it’s going to be a tough one.\n\n*choice\n\t#Save the Healer?\n\t\t*goto heroics\n\t#Save the DPS?\n\t\t*goto protector\n\t#Save them both?\n\t\t*goto snap\n\t\n\t*if (Save > 0) #Use a SAVE to make sure you save them both?\n\t\t\t*goto power_of_three\n\n\n*label heroics\nYou jump in front of the Healer and block the snake from devouring her. The DPS, on the other hand, is gobbled up.\n\n\nYou grab her by the hand. You lead her out of there. This monster is much too much for the both of you, especially without the DPS’s damage output. \n\n\nWithout looking back, you go through many meandering hallways. \n\n\n“Why did you save me?” the Healer asks.\n\n\n“I see a kindness in you that I’ve only ever seen in my wife.”\n\n\n“You’re married?” the young woman asks, pulling her hand away from yours.\n\n\n“I was. A lifetime ago. But she left me for another life.”\n\n\n“What did you do?”\n\n\n“Why does it always have to be my fault?”\n\n\n“I’m sorry, I just assumed.” \n\n\n“Well, it wasn’t She had a better plan.” The conversation turns dry, and you walk a while in silence.\n\n*choice\n\t#Let's get out of here.\n\t\t*goto lets_get_out_of_here\n\t#Think about the past.\n\t\t*goto lets_get_out_of_here\n\t#Laugh it off.\n\t\t*goto lets_get_out_of_here\n\n\n*label protector\nYou jump in front of the DPS, and she climbs you like a staircase in order to launch in the air and cut the large snakehead in half…vertically.\n\n\n“Oh, no, you’re not stealing my kill,” the DPS says, giving you a glare scarier than the snakehead.\n\n\nFeeling useless, you step aside while the DPS is already moving on to the next one. This time she is decapitating the snakehead that is in the process of eating the Healer. \n\n\nYou get the sense that they don’t really need or want you around. Feeling low, you leave the fight just as it is ramping up.\n\n\nThis life is best left to the capable, you decide, and walk the endless halls for about an hour, contemplating the age-old questions What is the meaning of life and What happens when you die.”\n\n*choice\n\t#The meaning of life is happiness.\n\t\t*goto anti_social\n\t#The meaning of life is the little things.\n\t\t*goto anti_social\n\t#The meaning of life is adventure.\n\t\t*goto anti_social\n\t#The meaning of life is family.\n\t\tYou gain +1 SAVE!\n\t\t*set save +1\n\t\t\n\t\t\n\t\t*goto anti_social\n\t#The meaning of life is unknown.\n\t\t*goto anti_social\n\t#The meaning of life is meaningless.\n\t\t*goto anti_social\n\t#The meaning of life is success.\n\t\t*goto anti_social\n\t#The meaning of life is living.\n\t\t*goto anti_social\n\t#The meaning of life is STFU.\n\t\t*goto anti_social\n\n\n*label snap\n*image death.jpg\nOne of the snakeheads swallows you whole. You’re left inside the belly of the beast. You want to attack it from the inside but instead are held in place by its stomach tissue.\n\n\nEven though a battle is still going on outside, it is calm, almost tranquil inside here. Then the stomach acid slowly pours in, slowly showering you. It doesn’t hurt at first, but slowly agony is all you know as you’re dissolved into sustenance. It is a long and painful way to go. Your only regret is that the beast didn’t chew you up before swallowing. \n\n\n\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#If you don’t want to be lunch, go back to “The Beginning” and try again.\n\t\t*goto the_beginning\n\n\n*label power_of_three\nYou throw both your shields and block both the biting snakeheads. Both girls turn back to you in amazement, with agreeable nods. \n\n\nEven without a weapon or shield, you draw the multi-headed creature’s attention. It hisses and snaps at you while the DPS hacks and slashes at the thing from its flank.\n\n\nOne head bites down on to your foot, and the other, your arm. Both snakeheads are trying to make a wish as they try and pull you apart. You managed to save the girls, but not so much can be said for yourself.\n\n\nThen you think about your own wishes and aspirations. All you’ve ever wanted to be is noticed and respected. For someone to find a use for you and not be forgotten like a boring story. \n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto a_feat\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto wishes_come_true\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Make your own fate?\n\t\t\t\t\t\t\t*goto a_feat\n\t\t\t\t\t\t#Do wishes come true?\n\t\t\t\t\t\t\t*goto wishes_come_true\n\n\n*label a_feat\n\nYou feel a soothing sensation cover you all over. The Healer is healing you. As long as she can keep it up, you might not get ripped in half.\n\n\nBoth of the snakeheads got a taste of you, and they’re not giving up the ghost. \n\n\nSoon the DPS decapitates the snakehead attached to your arm, and now you’re being dragged around the room by your foot.\n\n\nThe healer is having a difficult time keeping her healing beam targeted on you. This could all be over soon.\n\n\nDown to the last head, the DPS throws her large sword, and it soars end over end, slicing into the head but not cutting it off.\n\n\nYou reach up and grasp the hilt and run it deep into the head, severing it the rest of the way.\n\n\nThe huge monster lets out a chorus of a wail from all the severed heads that are on the ground, then dies.\n\n\n“We did it!” the Healer jumps up with joy.\n\n\n“No sweat,” the DPS admits.\n\n\n“Did what?” You ask.\n\n\n“The quest, silly,” the Healer admits. “We were hired to find a massive creature of immeasurable power. If this isn’t it, you can call me crazy.”\n\n\n“We make a pretty good team,” the DPS says, and you agree.\n\n\nTogether you drag all six heads back to town and meet the quest giver for payment.\n\n\n“It seems you picked up a straggler,” Mr. Garvin says, giving you a sideways glance.\n\n\n“Don’t you worry about him, he’s our Tank.”\n\n\n“A deal is a deal.” Mr. Garvin gives them a large sack of gems, leaving you out of the equation. \n\n\n“Nice doing business with you,” the DPS says.\n\n\n“You know, I have another quest, if you’re interested.” Mr. Garvin asks.\nWithout words, you all share a look.\n\n\nDecide what you say.\n\n*choice\n\t#“Sure,” you all say in unison. The DPS has one condition. She wants to lead, this time around. \n\t\t*goto deeper_in_the_cave\n\t#“No. I think we’re good.” You hand all the snakeheads to Garvin and prepare to go your separate ways. \n\t\t*goto affirmations\n\n\n*label affirmations\nYou motion for your party to come in closer. \n“There is one thing I wanted to bring up to everyone. While inside the cave, I saw a lot of strange things that appeared out of nowhere. It was like some exterior force was at play.”\n\n\n“I got a sense that the cave was somehow against us winning,” the Healer admits.\n\n\n“If there is a higher force at play, I want to go back, not to quest, but to defeat it,” the DPS says.\n\n\n“But how?” the Healer asks.\n\n\n“If we win, it loses.” The DPS lets out a devilish grin, and you all agree. \n\n\n“Let’s go defeat a god.”\n\n\nGoing back inside the cave, everything respawns, although your resources grow with each run-through, and you’re able to defeat everything that the mysterious force throws at you. Once you were in tune with the odd power, you could almost predict its presence, spawning overpowered monsters, setting traps, destroying loot.\n\n\nYou have a purpose now, and it’s trolling a god.\n*achieve end24\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label wishes_come_true\n*image death.jpg\nThe snakehead rips you in half, and they actually were making a wish. They wished that there were two of your corpses to feast upon. \n\n\nAs if you had just let a genie out of a bottle, two of your corpses appear, and both heads get to enjoy your aged meat.\n\n\nThis might not have been your ideal way to go, but in death you made someone’s wish come true. And that isn’t nothing. Although, you died and are nothing.\n\n\nIs making monsters happy your intention? \n*choice\n\t#No.\n\t\tHere is a new death for you.\n\t\t\n\t\t\n\t\t*goto snap\n\t#Yes.\n\t\tGreat, then this is the perfect end for you.\n\t\t*set deaths +1\n\t\t*set save 0\n\t\t*set character \"unknown\"\n\t\t*choice\n\t\t\t#Try again\n\t\t\t\t*goto the_beginning\n\n\n*label there_she_goes\nYou follow the Healer right away notice that she is on edge for some reason by her cautious approach to doorways, how she seems to be walking on her tippy toes. But most of all, she keeps moving her lips, but no words come out. It’s like she’s talking to an imaginary person. \n\n\nYou follow her to a room where a long-eared guy with a bow and arrow advances on her, menacing, and she casts some protection spell that quells the threat, but you’re not exactly sure how.\n\n\nAfter letting out a hysterical chuckle, she leaves out of the next room.\n\n\nYou are not so lucky. Without the help of her protective spell, the archer comes right for you.\n\n*fake_choice\n\t#Get ready to fight?\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto evil_does\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto multi_plicity\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t#Do some evil stuff?\n\t\t\t\t\t\t\t\t\t*goto evil_does\n\t\t\t\t\t\t\t\t#Get dead?\n\t\t\t\t\t\t\t\t\t*goto multi_plicity\n\t#Get ready to flee?\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto lost_in_space\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto ward\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Get yo' ass lost?\n\t\t\t\t\t\t\t\t\t*goto lost_in_space\n\t\t\t\t\t\t\t\t#Find a magical field?\n\t\t\t\t\t\t\t\t\t*goto ward\n\n\n*label evil_does\nYou run at the long-eared archer and feign an attack. It flinches so hard that he nearly falls over. \n\n\nHe’s scared, and you use this knowledge to your advantage. Letting out a horrible scream, you throw your shield like a frisbee, or an American captain. The forester flees the room you entered in through. If it had a tail, it would have been tucked behind its legs.\n\n\nCrisis averted. You nod at your ingenuity, then remember the person whom you were supposed to be following.\n\n\nYou enter the next room, and to your surprise, the Healer is awaiting you with a pentagram of blood drawn around her.\n\n\n“It isn’t smart to sneak up on someone. That someone might be forced into a dark pact,” she says with blood dripping out of her eyes like tears.\n\n\n“What did you do?” you ask, taken aback by her new gothic appearance. \n\n\n“What is necessary.” She fires a shadow blast that knocks the wind out of you and throws you to the floor.\n\n*choice\n\t#What a mean girl?\n\t\t*goto mean_girls\n\t#What a nice girl?\n\t\t*goto mean_girls\n\t#What's a girl?\n\t\t*goto mean_girls\n\t\t\n\n*label multi_plicity\n*image death.jpg\nYou ready yourself to fight, but there is a poof of magical smoke, and now there are two of them. It’s as if an exact duplicate jumped out of a mirror.\n\n\n“I can handle you,” you say, getting yourself psyched up.\n\n\nThere are a couple more poofs of magic, and a third, fourth, and fifth appear around you. \n\n\nThis is most peculiar indeed. It is either an elaborate illusion or something beyond your comprehension. Whatever the case may be, they bombard you with attacks, and you suffer a quick death. \n\n\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#I think you can do better than that. Please go back to “The Beginning” and try again.\n\t\t*goto the_beginning\n\n\n*label ward\n*image death.jpg\nYou try and flee the room, but there appears to be an invisible wall or ward that blocks your escape. The air ripples as you bang against it and try to escape. But it is no use.\n\n\nThe monster you were attempting to get away from has been attacking your back all along, and your adrenaline acted as a painkiller until you’re knocked unconscious.\n\n\nYou have a dark dream about soup. In reality, you’re being boiled alive. You are stock for someone’s meaty broth. \n\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#Start over at “The Beginning” if you don’t want to be featured in some monster’s recipe book.\n\t\t*goto the_beginning\n\n\n*label three_of_a_kind\n“Welp, I’m off to ferment some pickles,” Mr. Garvin says as he makes his way back to town. \n\n\nYou’re all about to enter the cave, and the Trapper holds up their fist. “Wait. This is a false entrance.” \n\n\n“What? How do you know?” you ask.\n\n\n“There is a teleporter spell attached to the threshold, serving as a trap.”\n\n\n“Wow. You’re good,” the Healer admits.\n\n\n“What say you?” the Trapper asks you.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 3\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto singing_frog\n\t\t*if (dieroll = 2)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto it_starts\n\t\t*if (dieroll = 3)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto trap_attack\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#You find another way inside.\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Do you go the old way?\n\t\t\t\t\t\t\t\t\t*goto it_starts\n\t\t\t\t\t\t\t\t#You don't find a new way.\n\t\t\t\t\t\t\t\t\t*goto singing_frog\n\t\t\t\t\t\t\t\t#Defuse a trap?\n\t\t\t\t\t\t\t\t\t*goto trap_attack\n\t\t\t\t\t\t\t\t#Go in anyway?\n\t\t\t\t\t\t\t\t\t*goto it_starts\n\n\n\n*label singing_frog\nYou enter this secret entrance, and you spot an almost human-sized frogman croaking out a sad- sounding song on a black rock.\n\n\nYou’re not sure if this has to do with heartache or the loss of a loved one, but one thing is abundantly clear—the acoustics in this cave are amazing.\n\n\nOnce the song is finished, you toss a coin inside its empty lute case to show your support for the arts. Then you remember why you’re here…\n\n*fake_choice\n\t#Talk to the Frog?\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto poison_talk\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\tThe frogman spits acid.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou lose 1 SAVE.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*set save -1\n\t\t\t\t\t\t\t*goto bridge\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t#Have a chat?\n\t\t\t\t\t\t\t\t\t*goto poison_talk\n\t\t\t\t\t\t\t\t#The frog spits acid.\n\t\t\t\t\t\t\t\t\tThe frogman spits acid.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou lose 1 SAVE.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*set save -1\n\t\t\t\t\t\t\t\t\t*goto bridge\n\t#Attack the frog?\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto croaking\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\tThe frogman jumps away.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto bridge\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#The frogman jumps away.\n\t\t\t\t\t\t\t\t\t*goto bridge\n\t\t\t\t\t\t\t\t#You hit the frogman.\n\t\t\t\t\t\t\t\t\t*goto croaking\n\n\n*label croaking\n“Everyone’s a critic,” the frogman says in the common tongue. He slowly puts away his lute and cracks his knuckles. Then something strange happens. He grows twice its size and looks twice as menacing. \n\n\nIn all outcomes, the frogman poisoned each of the attacking people. It turns out that he isn’t that strong and shortly thereafter dies. The Healer can only cure one person before death sets in.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 3\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou tank, the Healer heals, and the Trapper acts as a DPS. After curing the Trapper’s poison, everyone is okay.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto broken_party\n\t\t*if (dieroll = 2)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou and the Trapper both attack and the Healer heals. Your poison gets healed and the Trapper dies. Then you see a pair of eyes in the dark.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto its_a_monster\n\t\t*if (dieroll = 3)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tEveryone attacks; therefore, everyone is poisoned.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto poisoned\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#You tank, the Healer heals, and the Trapper acts as a DPS. After curing the Trapper’s poison, everyone is okay.\n\t\t\t\t\t\t\t*goto broken_party\n\t\t\t\t\t\t#You and the Trapper both attack and the Healer heals. Your poison gets healed and the Trapper dies. Then you see a pair of eyes in the dark.\n\t\t\t\t\t\t\t*goto its_a_monster\n\t\t\t\t\t\t#Everyone attacks; therefore, everyone is poisoned.\n\t\t\t\t\t\t\t*goto poisoned\n\n\n*label broken_party\nNearing death, the three of you have a moment to reflect on how dangerous this quest really is. Death is a very probable outcome if you don’t all start working together.\n\n\nAfter hours of talking about your feelings and tribulations, you all come to an agreement. \n\n\nThis whole quest is not worth the effort. Instead, you are determined to start a musical group that travels around from town to town, entertaining patrons in the street for coin. It’s safe, reliable, and most of all, it’s outside.\n\n\nLiving out your life as a nomadic band is fulfilling in its own right, but sometimes, in the dead of night, you wonder what would have happened if you had completed that cave quest.\n\n\nThe End\n\n\nYou can accept this ending or try again back at “The Beginning.”\n\n*choice\n\t#Accept this ending?\n\t\tSo it shall be.\n\t\t*achieve end25\n\t\t*stat_chart\n\t\t\ttext Deaths \n\t\t*goto_scene ending\n\t#Decline this ending?\n\t\t*set character \"unknown\"\n\t\t*goto the_beginning\n\n\n*label poisoned\n*image death.jpg\nYou feel the hot poison course through your whole body, using your veins as a thoroughfare.\n\n\nEvery slight movement leaves you in excruciating pain. So, you try and stay as motionless as possible to ensure your final moments will be somewhat peaceful.\n\n\nExhaustion sets in as you close your eye and drift off into an eternal slumber.\n\n\nYou always heard poison was a woman’s weapon, but there is nothing lady-like in the way you left this world.\n\n\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#You can start over at “The Beginning,” if you like.\n\t\t*goto the_beginning\n\n\n*label poison_talk\nYou get down low and speak to the frogman like you would a child. “Why do you seem so glum, chum?”\n\n\n“Riiibbit,” it answers, as if it were responding.\n\n\nThis all seems quite peculiar. “Which way to the money pit?” you cut to the chase and ask what’s really on your mind.\n\n\nHe points to a medium hole.\n\n\nYou can’t help but wonder how trustworthy this singing amphibian is.\n\n\nThe frogman launches out its long tongue and snatches a deadly spider the size of a kitten that was directly over your head. This gives you a bout of confidence as to its loyalty.\n\n*choice\n\t#Do you go in the hole?\n\t\t*goto claustrophobia\n\t#Head out the normal exit.\n\t\t*goto bridge\n\t#Fight him?\n\t\t*goto croaking\n\n\n*label claustrophobia\n*image death.jpg\nYou enter the long dark hole on your belly. It continues on for a long while and gets smaller the deeper you go. \n\n\nThen the hole becomes too tight, and you are now stuck inside and cannot move. This is where you’re going to die—in a stinking hole.\n\nIf you have a SAVE, use it to roll a die. If not, you die.\n*choice\n\t#Go back to the beginning?\n\t\t*set deaths +1\n\t\t*set save 0\n\t\t*set character \"unknown\"\n\t\t*goto the_beginning\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#You are free!\n\t\t\t\t\t\t\t\t\t*goto the_pit\n\t\t\t\t\t\t\t\t#Something goes wrong.\n\t\t\t\t\t\t\t\t\tThe hole collapses, killing you.\n\t\t\t\t\t\t\t\t\t*set deaths +2\n\t\t\t\t\t\t\t\t\t*set save 0\n\t\t\t\t\t\t\t\t\t*set character \"unknown\"\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t#Nice try. Go back to the beginning.\n\t\t\t\t\t\t\t\t\t\t\t*goto the_beginning\n\n\n\n*label the_pit\nYou enter a round room that is filled with riches beyond your comprehension. There is gold, jewelry, ornate weapons, you name it.\n\n\nThis is the place where you were hired to locate, only now that you’ve found it, you’re having second thoughts. There is no way this amount of treasure was obtained through legal means.\n\n\nThe rest of your party soon follows you and are equally shocked at the amount of wealth.\n\n\n“What should we do?” you ask aloud.\n\n\n“I think we should stick to the mission and tell Garvin of the hoard,” the Healer suggests.\n\n\n“I say we take it all,” the Trapper says.\n\n\nNow it’s time for you to weigh in.\n\n\nWhat do you say?\n\n*choice\n\t#“I agree with the Trapper.” \n\t\t*goto trapper_plan\n\t#“I agree with the Healer.” \n\t\t*goto healers_plan\n\t#“I think we should do both.” \n\t\t*goto your_plan\n\n\n*label trapper_plan\nYou and the Healer stuff your pockets with as many riches as you can to the point where you can only move at a snail’s pace. You notice that the Trapper isn’t joining in the fun.\n\n\n“Why aren’t you filling your pockets?” you ask.\n\n\n“Because I haven’t forgotten about the magical beast that protects this vault.”\n\n\nYou and the Healer look at each with horror- filled eyes. You don’t remember a thing about that.\n\n\n“And I’m going to catch it, using you two as bait.”\n\n\nThen, almost on cue, a huge dinosaur lands on both you and the Healer. The Trapper, not being weighed down by greed, manages to get out of harm’s way.\n\n*choice\n\t#Sruggle?\n\t\t*goto pancakes\n\t#Go with it?\n\t\t*goto pancakes\n\n\n*label healers_plan\nYou decide to not touch the gold. Deep down, you know it’s not yours, and you wouldn’t want any trouble with the magistrate if you happen to get caught with any of it. “Come on,” you say, making your way back towards the hole.\n\n\n“I can’t let you leave,” the Trapper says.\n\n\n“What? Why not?” \n\n\n“Because of this.” The Trapper deliberately pulls on a trip-wire trigger, setting off a trap.\n\n\nA dark cloud of death enters the room through secret vents. \n\n\nThe Trapper is wearing some sort of face covering. This whole deception was premeditated, and you fell for it hook, line, and sinker.\n\n\n“Why would you do this?” the Healer asks.\n\n\n“I never liked people very much. You’re all so greedy,” the Trapper admits.\n\n\n“I can’t believe I ever healed you,” the Healer says.\n\n\n“Don’t try and guilt me. I’m immune to it,” the Trapper says, wagging a finger.\n\n\n“You piece of trash.” Anger turns your face dark red as you rush the Trapper and their smug little face.\n\n*choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou manage to pull off the Trapper’s face covering, dooming them to suffer the same fate as you. \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto healers_plan2\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou accept your fate and fall to the ground, defeated. You wait for your life to flash before your eyes, but it doesn’t come. It’s almost as if your life doesn’t matter, to you or anybody.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto healers_plan2\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#You manage to pull off the Trapper’s face covering, dooming them to suffer the same fate as you. \n\t\t\t\t\t\t\t*goto healers_plan2\n\t\t\t\t\t\t#You accept your fate and fall to the ground, defeated. You wait for your life to flash before your eyes, but it doesn’t come. It’s almost as if your life doesn’t matter, to you or anybody.\n\t\t\t\t\t\t\t*goto healers_plan2\n\n\n*label healers_plan2\nIn either outcome, the Healer quickly cures herself from the death plague.\n\n\nThe Trapper rushes the Healer with their handaxe, but the Healer manages to dodge the attack. Unexpectedly, the Trapper is run through by a golden sword that was conveniently sticking out of the treasure hoard.\n\n\nYour chest feels heavy as you struggle to breathe. “Cure me. Please. You have time.”\n\n\n“No. Not this time,” the Healer says, and blows you a kiss goodbye.\n\n\nIncidentally, you don’t die for some reason. Instead, you have a chronic illness that plagues you for the rest of your days. \n\n*achieve end26\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label your_plan\nThe Healer goes over to a pedestal with a golden crown resting on top. She hesitantly looks over at the Trapper for confirmation.\n\n\n“It’s fine,” the Trapper says reassuringly. \n\n\nShe gently places the crown upon her head. You can tell that it has some huge significance to her by the tears streaking down her cheeks.\n\n\n“Are you okay?” you ask.\n\n\nAs she begins to answer, there is a loud rumbling sound. This has to be a trap. You turn to the Trapper and say, “You have one job!”\n\n\nThey throw back a rude gesture in your general direction. Treasure churns and shifts throughout the chamber. Acting as a drain, your leg gets caught in the riches, and you start to get pulled down. You look over at your companions, and they are both having similar troubles. \n\n*choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto alive\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto rich_in_death\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Escape your fate?\n\t\t\t\t\t\t\t*goto free\n\n\n*label free\nYou manage to get yourself free from the money trap, but you couldn’t save the Trapper. You feel bad for giving them grief in their last moments.\n\n\nThe Healer gives you a deep hug once you both crawl through the hole and subsequently out of the cave.\n\n\nYou make your way to Teepeekay and find Mr. Garvin underneath his carriage, replacing its axel. \n\n\n“We finished your quest,” you say as a greeting.\n\n\n“Yeah. How did you do that?” Mr. Garvin says.\n\n\n“We crawled through a hole and found the money pit. Just like you asked.”\n\n\n“Splendid. Your payment is on the table over there. Can you hand me a hammer while there?”\n\n\n“Sure,” you reluctantly say. Both you and the Healer give each other a look. It was odd that he didn’t even want to know where it was. \n\n\nYou hand him the tool and have a conversation with the Healer without words—just silently mouthing to each other. In the end, you determine he was trying to get you killed for some reason. On a whim, you kick the stand that was holding the carriage up, and it crushes Mr. Garvin flat. \n*achieve end27\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n*label alive\nYou manage to escape the cursed money pit, but not so much can be said for your companions.\n\n\nBack at Teepeekay, you find Mr. Garvin in his laboratory, brewing some cider for the Mud Puddle. Apparently, they were out dry.\n\n\n“I did it.” You finally broach the subject after thirty minutes of small talk.\n\n\n“Did what?” he asks.\n\n\n“The quest. I finished your quest.”\n\n\n“Which one is that again?”\n\n\n“The one in the cave.”\n\n\n“Yes. I know, but what did I tell you to do?”\n\n\nThis answer seems a little strange to you. As far as you know, there was only one quest. You decide to test him.\n\n\n“Uh. I cleared all the mushrooms out,” you lie.\n\n\n“Oh…I guess you did. Here is your payment.” He tosses you a small sack of coins.\n\n\n“Thanks,” you say, and quickly leave. There has to be a reason why he was sending people into the cave. But that isn’t your problem because you have a sack filled with treasure to retire with.\n\n\nYou decide to open up a morgue in town. There seems to be a lot of deaths going around.\n*achieve end28\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label rich_in_death\n*image death.jpg\nThe shifting treasure makes unstable ground and soon you are literally drowning in it. You try and scream, but your mouth is quickly filled with jewels. Technically you found the treasure, but you also found yourself a crushing death.\n\n\nCenturies go by, and eventually some curious archaeologists discover this chamber of the cave. After years of excavating, its loot was unearthed, along with your bones, on the very bottom of the pile. They declare you were a king or pharaoh of the pit. This, of course, couldn’t be further from the truth…or could it? If a king’s daughter is called a princess, what is a princess’s father called? \n\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#Please try again to uncover the mystery.\n\t\t*goto the_beginning\n\n\n*label bridge\nAt the edge of a ravine, you discover a long rope bridge crossing over it. \n\n\nThinking nothing of its tattered ropes or rotted slats, you cross the bridge.\n\n\n“This doesn’t look right,” the Healer admits.\n\n\n“It’ll be fine. I promise.”\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 3\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou cross the bridge without incident. However, once you reach the other side, you notice a masked figure cut the end of the bridge, blocking your exit. You gain +1 SAVE!\n\t\t\t\t\t*set save +1\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto broken_party\n\t\t*if (dieroll = 2)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\t\t\t\t\t\n\t\t\t\t\tThe bridge breaks while you’re still on it. You all fall deep into the dark abyss below. Right before hitting the floor, a snake-like creature reaches up and catches you in its mouth.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto snap\n\t\t*if (dieroll = 3)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tThe bridge breaks, and you manage to hang on, but you fail to save the Healer. \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto falling\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#You cross the bridge without incident. However, once you reach the other side, you notice a masked figure cut the end of the bridge, blocking your exit.\n\t\t\t\t\t\t\tYou gain +1 SAVE!\n\t\t\t\t\t\t\t*set save +1\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto broken_party\n\t\t\t\t\t\t#The bridge breaks while you’re still on it. You all fall deep into the dark abyss below. Right before hitting the floor, a snake-like creature reaches up and catches you in its mouth.\n\t\t\t\t\t\t\t*goto snap\n\t\t\t\t\t\t#The bridge breaks, and you manage to hang on, but you fail to save the Healer. \n\t\t\t\t\t\t\t*goto falling\n\n\n*label trap_attack\nThe Trapper releases a drawn-out sigh and walks over to the entrance. “Just to let you know, I specialize in non-magical mechanisms, but here goes nothing.” They kneel down next to the cave and meticulously tinker with something hidden in the ground.\n\n\nThe Trapper wipes their hands together and stands up. “Okay. Everything should be…”\n\n\nThere is a loud explosion followed by a blinding light.\n\n\nThe sound of crumbing rocks is muted by the loud ringing in your ears. \n\n\nStaggering around, you bump into someone. “Excuse me,” you say, but cannot see or hear a response. After a couple minutes of confusion, your ears and eyes start to work again.\n\n\n“What the heck was that?” you rhetorically ask.\n\n*if (Save > 0)\n\t*choice\n\t\t#Use a SAVE, and everyone is okay. “I swear I disarmed it; something must have rearmed it afterwards,” the Trapper says. \n\t\t\t*set save - 1\n\t\t\t*goto singing_frog\n*else\n\t*choice\n\t\t#Without a SAVE, the Trapper has been blown up.\n\t\t\t*goto just_the_two_of_us\n\n\n*label it_starts\nYou enter the room, and you’re separated from the rest of your party. It seems that there was some kind of teleporter trap that only went off when you entered the room. Either that or it didn’t send you all to the same place at the same time. \n\n\nThis is unfortunate, not only for you, but for the rest of the party that won’t have your experience and expertise at their disposal.\n\n\nYou wonder if maybe you’re better off without them. I mean, everyone always leaves you eventually; maybe it’s all for the best.\n\n*choice\n\t#Do you quietly try to find your companions.\n\t\t*goto shh\n\t#Do you call out?\n\t\t*goto hey_you_guys\n\t#Do you try to exit the cave?\n\t\t*goto where_is_my_mind\n\n\n*label shh\nYou sneak around the cave for a while, hiding from any monsters that might be afoot, and are. You spot the Healer, but it seems she has already found someone to team up with…another girl.\n\n\n“That old man was cramping your style, believe me. You need some damage output, like me, the DPS,” the new girl boasts, flexing her bicep.\n\n\nYou can’t help but feel a little bit rejected. Then you remember something you’ve long since forgotten—another painful rejection.\n\n\nWhile serving as a guard, you had an affair with someone, and that resulted in you having a bastard child, one you wished you could have been a real father to. But it was taboo for some reason. If only you could remember why. Something about the Healer seems to trigger memories from your past. You want to keep close in case she triggers something else hidden inside your unreliable brain.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto room_two\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto alone\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Head to room two?\n\t\t\t\t\t\t\t*goto room_two\n\t\t\t\t\t\t#Get out of there?\n\t\t\t\t\t\t\t*goto alone\n\n\n*label hey_you_guys\n*image death.jpg\nYou call to your friends, and your voice echoes down multiple paths. There is a rumbling sound, and the ceiling collapses, covering you with stone.\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n\n*choice\n\t#I was crushed.\n\t\tEvery bone in your body breaks, and you die within an hour.\n\t\t*choice\n\t\t\t#In either case, you’re dead. Please start over.\n\t\t\t\t*goto the_beginning\n\t#I was buried alive.\n\t\tYou can’t breathe or move, and you spend your last couple minutes in a panic.\n\t\t*choice\n\t\t\t#In either case, you’re dead. Please start over.\n\t\t\t\t*goto the_beginning\n\n\n*label slayer_of_beasts\nAs the three of you enter the dark cave, a candle, lantern, and sunrod are all lit simultaneously. The room is so bright that all the little monsters that were hiding in wait rush out of the room without instigating their ambush.\n\n\n“That’s one way to clear a room,” you say.\n\n\n“I suppose we’ve all come prepared,” the Support adds, snapping his fingers.\n\n\nWith all this light, you notice that there are many little claw marks lining every inch of this room, even the ceiling. You may have averted something more deadly than you thought.\n\n\n“Who should light the way?” the Healer asks.\n\n*choice\n\t#Do you use the candle?\n\t\t*goto by_candlelight\n\t#Do you use the lanern?\n\t\t*goto oil_is_gold\n\t#Do you use the sunrod?\n\t\t*goto magic_is_might\n\t#Do you use all of them?\n\t\t*goto beacon_of_light\n\n\n*label by_candlelight\n“My candle will lead the way,” the Healer declares, and you all huddle together so as not to block its flickering light. The warm glows and the close proximity to people make you feel as though you’re camping.\n\n\nYou haven’t camp for…well, forever. You’ve spent maybe a third of your life sleeping outside but never for recreational reasons. \n\n\nTogether you go through a couple rooms without provoking any random monsters. It is entirely possible that you just didn’t see some that were lurking, although you’re not one to complain about your good fortune.\n\n\nSpeaking of fortune, it might have taken a turn for the worst, as you hear a series of grinding snaps and clanks.\n\n\n“Watch out!” the Support says abruptly.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto mucho_gusto\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto we_didnt_see_it_coming\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#You watch out?\n\t\t\t\t\t\t\t*goto mucho_gusto\n\t\t\t\t\t\t#You didn't watch out?\n\t\t\t\t\t\t\t*goto we_didnt_see_it_coming\n\n\n*label mucho_gusto\nThe Healer is shining her candle in every direction, though you don’t see anything out of the ordinary—nothing that could have made such an unnatural sound or caused the Support to act the way he did.\n\n\n“What was that all about?” you ask the Support, who has his hands around the Healer. \n\n\n“I…thought something was going to happen,” he says, and you start to wonder if this was all a ploy for him to get fresh with the young girl.\n\n\n“You can release me now,” the Healer demands.\n\n\n“I really thought…” the Support says as he distances himself from the Healer.\n\n\n“We know what you thought. And cut it out.”\n\n\nThen a powerful gust of wind picks up the Support and pushes him out of the room. Additionally, the Healer’s candle is blown out.\n\n\nMaybe he did see something after all. In the dark, you hear a lot of commotion, and you start to scramble around to find your bearings.\n\n*if (Save > 0)\n\t*set save -1\n\t*goto out_of_the_darkness\n*else \n\t*goto i_cant_see_a_thing\n\n\n*label out_of_the_darkness\nBlindly fighting anything taller than the Healer, you determine, based on the sound of flapping wings and the musky ammonia-like smell, some large bats are flocking above you. \n\n\nEven if your weapon were enchanted and sharp, there are way too many of them to easily handle. The good news is that your eyes are starting to adjust to the darkness somewhat. You wonder if you should be selfish and save yourself or be a team player and save the party.\n\nAction: Decide if you RUN or FIGHT IT OUT.\n\n*choice\n\t#Run Forrest?\n\t\t“It’s dark,” the Healer says.\n\t\t\n\t\t\n\t\t“I know. Just follow the sound of my voice.”\n\t\t\n\t\t\n\t\t“Okay. But I’m scared,” she says, and based on the trill in her voice, you know she’s not lying.\n\t\t\n\t\t\n\t\t“It’s going to be okay. I promise.” As if the universe is hellbent on turning you into a liar, you hear the Healer scream as she is taken by a bat. \n\t\t\n\t\t\n\t\t*goto anti_social\n\t#Fight it out?\n\t\tThe bat swoops down and grabs you. \n\t\t\n\t\t\n\t\t*goto i_can_see_my_house_from_here \n\n\n*label we_didnt_see_it_coming\nHidden in plain sight is a generous collection of bear traps. They are armed and strategically scattered around the whole room.\n\n\n“What is the…” before you can get the words out, something or rather someone sets off one of the traps, which creates a chain reaction of snapping traps. All around you, the traps are jumping up at you like a school of hungry piranha. \n\n\nYou dodge and weave, narrowly avoiding the deadly metal jaws. \n\n\nThe Healer drops her candle, and it is hard to determine who is snared and who isn’t. \n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 3\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tNo one is hit by the traps.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto no_ones_home\n\t\t*if (dieroll = 2)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tThe Support and Healer are both snared by the trap.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto fox_trap\n\t\t*if (dieroll = 3)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tAll three of you are caught in the trap.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto a_dire_situation\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#No one is hit by the traps.\n\t\t\t\t\t\t\t*goto no_ones_home\n\t\t\t\t\t\t#The Support and Healer are both snared by the trap.\n\t\t\t\t\t\t\t*goto fox_trap\n\t\t\t\t\t\t#All three of you are caught in the trap.\n\t\t\t\t\t\t\t*goto a_dire_situation\n\n\n*label no_ones_home\nNarrowly avoiding losing a limb or two in the trap room, your party continues on throughout the cave with your lives intact. The only disconcerting factor is that there appears to be no one around, only fresh corpses and evidence that someone has beaten you to the punch, in a sense. \n\n\nAfter a few hours of this, you determine that you cannot seem to be able to clear the cave, because there is nothing left to clear. It’s dead, literally and figuratively. Even the money pit that was supposed to be at the end of the line is completely empty. \n\n\nAfter all is said and done, you exit the cave and look everywhere for Mr. Garvin. You hope for a partial payment to cover your expenses, but he’s nowhere to be found.\n\n\nOne of your companions says, “What a boring quest.”\n\n\n“It’s much worse than that. This is a very boring ending,” you correct.\n\n\nThe End\n\n\nIf you want something a little more exciting, or maybe find out what happened, go back to “The Beginning” and try once more.\n*achieve end29\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label fox_trap\nWith both the Healer and the Support snared by bear traps, you’re the only one left able to save the day, so to speak. The Healer is trying to heal, but the pain seems to be overwhelming her, while the Support is trying to grab his bag that’s just out of reach.\n\n\nThis is a very hard choice for you to make. Saving one could mean the death of the other. \n\n\n“Help me. Hurry,” the Healer demands.\n\n\n“I’m dying here,” the Support mentions.\n\n*choice\n\t#Do you help the Healer?\n\t\tThe Support bleeds out right as you free her from the metal jaws.\n\t\t\n\t\t\n\t\t*goto bridge\n\t#Do you help the Support?\n\t\tThe Healer dies mid prayer.\n\t\t\n\t\t\n\t\t*goto looting_friends\n\t*if (Save > 0) #You manage to toss both the Healer and Support one of your shields to help pry open their respective traps. \t\t\t\n\t\t\t*set save -1\n\t\t\t*goto broken_party\n\n\n*label looting_friends\nAfter the tragic loss of your only healer, your party is left crippled and desperate. \n\n\n“Should we go through her things?” the Support asks, with a wound on his leg that isn’t healing.\n\n\nYou were going to offer up your bandages, but that seems like a better suggestion. “Sure. I mean, it can’t hurt, right?”\n\n\nAfter rifling through a lot of religious books and scriptures, the Support pulls out a demonic book of horrors.\n\n\n“I wouldn’t have thought someone so sweet would consider carrying something so wicked,” you admit, glancing over at her lifeless corpse.\n\n\nYou crack open the spine, and a dark cloud exits its pages and swirls around the room like a bat out of hell. \n\n\n“What was that all about?” you ask. When you don’t get an answer, you turn towards the Support, who is now bleeding from the mouth. \n\n\nThe Healer is still alive and just ran her glowing fist through the Support, killing him outright. \n\n*choice\n\t#The Support was dead weight?\n\t\t*goto shame_on_you\n\t#The Support was a friend?\n\t\t*goto shame_on_you\n\t#The Support was your best friend in the whole world?\n\t\t*goto shame_on_you\n\n\n*label a_dire_situation\nAll three of you have been bitten by a bear trap and are currently bleeding out. You start to pull open the jaws on your leg with the intent to subsequently help the others with theirs.\n\n\nYou hear a whisper that is somehow louder than both your companions’ moans. “Save the Healer. She is younger.”\n\n\n“No. Save the Support. He is more resilient,” a different whispering voice interjects.\n\n\n“Get out of my head,” you yell, as you try to come up with a remedy for this situation.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tThe Support casts a magical spell that strengthens the Healer’s healing power, granting her the ability to group-heal.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto clearing_the_way\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tThe Healer is healing you, but the Support is heavily bleeding. She tries to toggle between the three of you, but the Support ends up succumbing to his injuries before you’re all able to get free. You decide that you’ll do a better job healing. \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto weapon_swap\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#The Support casts a magical spell that strengthens the Healer’s healing power, granting her the ability to group-heal.\n\t\t\t\t\t\t\t*goto clearing_the_way\n\t\t\t\t\t\t#The Healer is healing you, but the Support is heavily bleeding. She tries to toggle between the three of you, but the Support ends up succumbing to his injuries before you’re all able to get free. You decide that you’ll do a better job healing. \n\t\t\t\t\t\t\t*goto weapon_swap\n\n\n*label oil_is_gold\nHolding your lantern outward, you agree to take the lead, with the Healer in the middle and the Support taking up the rear. With your marching order straightened out, things seem to be going great. \n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto clearing_the_way\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto oil_is_gold2 \n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Do good.\n\t\t\t\t\t\t\t*goto clearing_the_way\n\t\t\t\t\t\t#Do bad.\n\t\t\t\t\t\t\t*goto oil_is_gold2\n\n*label oil_is_gold2\nYou hear a loud crunching sound from the rear. You spin around and notice the Support is being devoured by a hungry squidman. Not ready to be dessert, you try and flee for your life, not caring if you happen to leave your party far behind. If they want to live, they’ll follow you. That is your logic anyway. Besides, you were designated as the leader when you took the front rank. \n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto faster\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto ward\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Run faster than you ever have before?\n\t\t\t\t\t\t\t*goto faster\n\t\t\t\t\t\t#Bump into something?\n\t\t\t\t\t\t\t*goto ward\n\n\n*label clearing_the_way\nThe Support has a unique skill that enhances your ability to draw creatures over to you, leaving the Healer undisturbed so that she can heal your minor wounds. \n\n\nFinding your groove, you guys have a good system that only lacks in your ability to dish out some serious damage…that and the occasional traps are quite a nuisance. \n\n\nIt takes you nearly a year, but you three manage to clear the dungeon of all its inhabitants, though you never find the treasure that was supposedly hidden inside the cave. You head back into town.\n\n\nYou almost didn’t recognize the place because of how much has changed around town. Apparently, your quest giver, Mr. Garvin, had been killed a long time ago, leaving you without payment. You all discuss going back to the cave to look for the treasure that was undiscovered. It is a long shot, but it also might be your only shot.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto slayer_of_beasts\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto a_long_life\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Is it your shot?\n\t\t\t\t\t\t\t*goto slayer_of_beasts\n\t\t\t\t\t\t#Forget it.\n\t\t\t\t\t\t\t*goto a_long_life\n\n\n\n*label a_long_life\n*image death.jpg\nYou spend the rest of your days looking for the hidden treasure inside the mysterious cave. After years of searching, you die peacefully and naturally from old age without any wealth other than a couple of gold coins beyond your expedition expenses. \n\n\nYou’re buried where you took your last breaths, and your companions have a service for you, which involves naming the cave after you—its greatest inhabitant. If home were simply where you roam, this dark, damp cave is the closest thing you have ever had to one. \n\n\nThe End\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*achieve oldage\n*choice\n\t#Do you believe in reincarnation? \n\t\t*goto the_beginning\n\t\n\n*label magic_is_might\nThe Support chuckles. “I can be in charge of the luminescence for the time being.”\n\n\nOnce the Healer’s candle and your lantern are extinguished, you start to feel in the adventurous mood once more, standing amidst the light glow of the magical item. This brings on a memory of the time you set on an adventure after the old queen had passed. You were her sworn protector, though you couldn’t protect her from a broken heart. \n\n\nThese were troubling times, and once the political change occurred with a new ruler, you had to find something to fill your days so that your despair wouldn’t take over. You were with a plucky bunch of deviants, and the job was a simple fetch quest. You couldn’t begin to remember their names, but in some ways, they remind you of this group. After a painful migraine, you momentarily don’t remember who you’re with and why. Your failing memory is to blame.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto singing_frog\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto room_five\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Do you like rooms?\n\t\t\t\t\t\t\t*goto room_five\n\t\t\t\t\t\t#Do you like frogs?\n\t\t\t\t\t\t\t*goto singing_frog\n\n\n*label beacon_of_light\nThe bright illumination from your combined light sources creates a zone where no shadows may penetrate. Each room you enter causes the monsters inside to flee while shielding their eyes. It appears as if they all have been acclimated to the darkness. Soon you clear all the obvious rooms. This is a great method of learning the layout of the cave but not exactly good for clearing it of its occupants or looting corpses of their belongings.\n\n\n“I would like to fight something before I die of old age,” you say, watching a giant lumber out of the room.\n\n\n“I like being a pacifist,” the Healer admits.\n\n\n“Either way is fine by me,” the Support says.\n\n\nYou realize that three lights are overkill.\n\n\nGain +1 SAVE!\n*set save +1\n\n\nDecide whose light you’re going to use.\n*choice\n\t#The Healer's?\n\t\t*goto by_candlelight\n\t#The Support's?\n\t\t*goto magic_is_might\n\n\n*label what_have_i_gotten_into\nYou head into the cave, and the Trapper takes the lead, scouring the grounds for anything suspicious. The way they hold up a cautious hand and tell you to hold up makes you feel like a noble or princess. Never has anyone ever fussed over you so much. \n\n\nAbout the point where you are going to call off that level of concern, the Trapper seems to have found something.\n\n\n“What is it?” you ask.\n\n\n“Shh,” they say, holding a finger to their lips.\n\n\nYou silently and patiently wait while the Trapper disables a tripwire trigger.\n\n\nTension is high, as you bite your nails to the bone.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tThe trap is disabled.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto treasure_hunting\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tThe trap goes off, and acid splashes on your face, melting away your soft features.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto it_burns\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#The trap is disabled.\n\t\t\t\t\t\t\t*goto treasure_hunting\n\t\t\t\t\t\t#The trap goes off, and acid splashes on your face, melting away your soft features.\n\t\t\t\t\t\t\t*goto it_burns\n\n\n*label treasure_hunting\nAfter a couple uneventful rooms, you come across a four-way intersection. The Trapper observes each exit closely and carefully. \n\n\nThe northern exit looks rugged and rarely traveled the western route is wet and thick with mud, and the southern path seems to have cracked marble floors. \n\n\n“Which path would you take?” you ask your companion, after debating it in your head.\n\n\n“They are all trapped. But I would say that North seems like the least deadly path.”\n\n\n“What makes you think they’re all trapped?”\n\n\n“Every room in this place is trapped. Some might be so subtle that you never notice them; others are instant death.”\n\n\n“I had no idea.”\n\n\n“No one ever does.”\n\n\nDecide which path to take.\n\n*choice\n\t#Go North?\n\t\t*goto northern_path\n\t#Go South?\n\t\t*goto southern_path\n\t#Go West?\n\t\t*goto western_path\n\t\n\n*label northern_path\nYou decide to enter the exit to the north, but then some unseen influence makes you go down another path instead.\n\n\nYou are extremely upset by this turn of events, but you can’t seem to voice your concern. It is like fate is intervening over your legs and mouth.\n\n\n“What’s wrong?” the Trapper asks, but you cannot answer. “Does the displacer beast got your tongue or something?”\n\n\nStill unable to answer, you say the first thing that comes to mind, but it isn’t related to going North, “Spirit penis.”\n\n\n“What?”\n\n\n“Um, nothing. Let’s just get out of here.”\n\n\n“No. I want to know what is up with this spirit penis and why you yelled it out like an answer to an unspoken trivia question,” the Trapper presses.\n\n\n“I was once haunted by an attractive…you know what, never mind. Let’s just go.”\n\n\nLose 1 SAVE if you have one.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto southern_path\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto western_path\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Go South.\n\t\t\t\t\t\t\t*goto southern_path\n\t\t\t\t\t\t#Go West.\n\t\t\t\t\t\t\t*goto western_path\n\n\n*label southern_path\nWalking through this path, you hear a sudden clicking sound. “What is that?”\n\n\n“It’s not a trap. I already disabled the one in this room,” the Trapper admits.\n\n\n“Watch out!” the Trapper yells.\n\n\nThen out of nowhere swings a giant blade attached to a pendulum. It cuts through the air, heading right for you. \n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYour companion gets cut in half, while you narrowly miss the same fate.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto the_deep_south\n\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou stand there, paralyzed with fear. How could this happen? Maybe there was a second trap? Or rather the first trap was a decoy, disguising a deadlier one. Then there is the possibility that the Trapper might not be as good as he boasts. \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto halfway_there\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#You and your companion can use it to ride the pendulum all the way to the northern path and go to page\n\t\t\t\t\t\t\t*goto real_north\n\n*label the_deep_south\nYou travel down a winding path that grows smaller with each revolution. \n\n\n“It’s getting a little cramped,” you observe. A couple more turns, and you hear a trigger as a stone plate sinks down. This causes you to break out into a sprint as flame traps burst fire out at you. The floor beneath you crumbles, and numerous other death traps go off and try to murder you. \n\n\nA couple revolutions later and the path opens up into a large room shrouded by darkness. You light your candle and uncover a vast treasure room. You have done it! There are coins and jewels and other items underfoot. Sitting center stage is a golden crown displayed on a pedestal.\n\n\nThis has been your purpose all along, to recover your mother’s long-lost crown. It was stolen long ago by one of her most loyal guards, along with a bunch of the family’s treasure. \n\n*choice\n\t#Do you fill your pockets?\n\t\t*goto rich\n\t#Do you take the crown?\n\t\t*goto birthright\n\t#Do you take everything?\n\t\t*goto rich\n\n\n*label rich\nYou fill your pockets with only the most valuable riches you can smuggle but leave the crown alone. The crown is absolutely that of royalty. Taking such a recognizable artifact would draw attention to the fact that you found the queen’s lost treasure. \n\n\nThat life is best left in your past. \n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto rich2\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tA giant magical dinosaur soars into the room and lets out a mighty roar.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto pancakes\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#A giant magical dinosaur soars into the room and lets out a mighty roar.\n\t\t\t\t\t\t\t*goto pancakes\n\t\t\t\t\t\t#Looting is fun?\n\t\t\t\t\t\t\t*goto rich2\n\n\n*label rich2\nOn an even result, you manage to take enough loot to allow you to live out your days in harmony. Only once you arrive to town, it seems that you have filled your pockets with piles of feces, not gold. Could it all have been an illusion, or a cheap trick, or perhaps a bit of both?\n\n\nEmbarrassed and ashamed, you decide to join the clergy and dedicate your life to the cloth.\n*achieve end30\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label birthright\nIt has been foretold that only an offspring with royal blood could wear such a crown. The crown of sorrows, you recognize it to be Queen Malbery’s long-lost crown of sorrows. This is the moment you have been waiting for your whole life. You were abandoned at the steps of an orphanage back in Sully Falls while the queen was visiting. Later in life, you heard the rumor that the queen had an illegitimate child out of wedlock. Putting two and two together, you knew that you had to be that child. \n\n\nOnce word got out that the royal treasure had been stolen, you decided to leave the church and dedicate your life to the cause. \n\n\nWith a little luck and a couple answered prayers, you found yourself closer than ever in the town of Teepeekay. And now it’s your chance to prove your birthright.\n\n\nYou gingerly pick up the crown and place it upon your head. You cannot help but feel important, regal, and righteous. \n\n\nThen the crown starts to heat up, as smoke pours out of it like a chimney. \n\n\n“Damn!” You quickly toss the crown into the pile of coins. Something isn’t right…this was supposed to be your destiny. \n\n\nLooking down at your hands, there is a clear burn mark across both your palms from where you gripped it. You frantically search through the treasure hoard until you find a brass shield. Checking out your reflection, you use the brass as a mirror to check out your head. As expected, the crown burned a mark of failure across your forehead, matching the ones on your hand. This marking is known commonly as the thief’s band, and now everyone will know what you really are…a fake.\n\n\nYou spent your whole life following a lie. You’re not a royal. You never were. \n\n\nRight then you decide to leave with as much treasure as you can and donate it all to the church as penance for your unfaithful departure.\n\n\nThe End\n\nIf you want to find the queen’s true offspring, go back to “The Beginning” and try again.\n\n*achieve end31\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label halfway_there\n*image death.jpg\nThe large blade descends upon you and slices you directly in half. Right before you die, your vision is cut in two, and you’re able to see all sides of the room from both of your splitting halves.\n\n\nYou are twice as dead now, but two is always better than one, right?\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#Please go to “The Beginning” and try to get some luckier dice. Thank you for coming to my Ted Talk. \n\t\t*goto the_beginning\n\n\n\n*label real_north\nReaching this precarious path, you and your companion are scooting along a dangerously thin ledge. \n\n\n“I don’t like this,” you admit.\n\n\n“Don’t worry, that’s why they pay me the big chunks…of gold, that is.” The Trapper is taking the lead and disabling trap after trap after trap. This path is quite heavily guarded, and you know that one false move might push you off the ledge and into the dark cavern below.\n\n\nOnce you reach the bottom, you are greeted by a giant magical dinosaur!\n\n\n“Pretty girl,” the Trapper says to the beast as it rifles through the bag for something.\n\n\n“Do something,” you say, quickly backing up.\n\n\n“I am!” the Trapper snaps.\n\n*choice\n\t#Do you fight the beast?\n\t\t*goto dino_fight\n\t#Do you try and trap it?\n\t\t*goto bait\n\t#Do you try and flee?\n\t\t*goto ward\n\n\n*label bait\nNot having any real attacking skills, you start to heal the dino. Brilliant light swirls out of your staff and catches the lizardly eyes of the humongous beast. “Over here, you fat reptile!”\n\n\nHot on your trail, the beast is crushing precious sculptures and other art pieces in its run.\n\n\n“Keep it up. You’re doing great,” the Trapper calls out to you.\n\n\nYou blindly shoot a couple more heals over your shoulder as you hear the loud thumping behind you.\n\n\nEven a bad plan is better than no plan, at least that’s what you always say. \n\n\nBack at the monastery
