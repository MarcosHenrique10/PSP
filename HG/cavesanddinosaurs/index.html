 your master, becoming one of the most powerful creatures in the world.\n\n\nThen you are forced to fight the end boss of existence, yourself. It is a hard fight but, in the end, you win, proving you are not only the most powerful, but also the most dead being.\n*achieve end68\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label self_help\nThrough much meditation, self-reflection, and yoga, you learn how to love yourself just the way you are, flawed and imperfect. Confidence is a good look to you, and you now walk a little taller, speak a little louder, and smile a lot more. \n\n\nAfter your training is complete, you and your squid friend go your separate ways. On your way out of the cave, you spy a sweet-looking woman trying to make a map. You offer to help, and together you finish the little quest she was on. \n\n\nLittle did you know this was a chain quest, and the next journey involved a life of happiness, marriage, and even kids. \n\n\nEvery year you spend a whole week celebrating your anniversary by renewing your vows, and every year your best man takes time out of his squidface schedule to honor the union.\n*achieve end69\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label immortality\n*image death.jpg\nYou want to be remembered for the rest of days, though you’ve never done anything worthy of such high praise.\n\n\n“Here, I have someone you have to meet,” the squidface says, leading you through a dark chamber. Soon you are met by a snake-haired woman, and you stare into her beautiful eyes that are full of sadness. Instantly you fall in love with her. Too bad she possesses the power to turn anyone who looks at her into a stone statue. She spends a lifetime with your loving look until one day she kisses you while looking into a hand mirror, leaving you both forever entwined in stone.\n*achieve end70\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#Maybe go back to “The Beginning?”\n\t\t*goto the_beginning\n\n\n*label think_again\n*image death.jpg\nYou advance on the squidface with malice intent. \n\n\nIt turns toward you with a mouth full of brains, slurping on them like a bowl full of noodles.\n\n\nWith your staff in hand, you jab its stomach in hopes that it will spit out what’s left of your friend. Only it stares at you with its milky white eyes. Then the creature’s head leaps off its body and on to you. This is not a squid man but just a hungry squid who is about to get its dessert. Too bad it attaches itself to you instead. \n\n\nBefore you lose all sense of self, you recognize the outfit of its former body. It is Mr. Garvin, the one who gave you this quest in the first place.\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#Please try again at “The Beginning,” if you like.\n\t\t*goto the_beginning\n\n\n*label four_of_a_kind\nWith nearly a full party at your disposal, you head into each room with a certain amount of confidence. The smaller monsters seem to go down without the need to even heal. Some of the medium ones prove to be a little more difficult but ultimately meet the same end.\n\n\nThen you enter a room that is much different. There is no monster waiting for you to destroy. Every room up until now had a monster in it, and you wonder why there’s no monster now.\n\n\n“What gives?” the DPS says.\n\n\n“Maybe it’s invisible. This one time…” the Tank starts to say.\n\n\n“We know, we know,” the Healer interrupts, rolling her eyes.\n\n\n“This doesn’t feel right,” you chime in. \n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 3\n\t\t*if (dieroll = 1)\n\t\t\t\t\t*goto big_party\n\t\t*if (dieroll = 2)\n\t\t\t\t\t*goto something_funny\n\t\t*if (dieroll = 3)\n\t\t\t\t\t*goto downfall\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Do you like to party?\n\t\t\t\t\t\t\t*goto big_party\n\t\t\t\t\t\t#Do you want to know something funny?\n\t\t\t\t\t\t\t*goto something_funny\n\t\t\t\t\t\t#Are you down for fall?\n\t\t\t\t\t\t\t*goto downfall\n\n\n*label big_party\nTaking the lead, you survey the area just to make sure you’re not being stalked.\n\n\nSomeone jumps out of the shadows. A bandit or another wizard, perhaps? \n\n\n“Boo!” they say, and you nearly crap your slacks. They seem to be wearing some dead animal hide as a hat. You’re not sure if this is a monster or not, but everyone in the party arms themselves for battle.\n\n\n“Hold on, hold on. I’m not here to fight you. I just wanted to let you know that there is a trap over there.”\n\n\n“Is that so?” you say.\n\n\n“It is.”\n\n\n“And how would you know that?” you press.\n\n\n“Because I put it there. And I will be willing to disarm it for a small fee.”\n\n\n“How about I don’t kill you…for a fee,” the DPS interjects.\n\n\n“Hold on a moment. I have a better proposal. Why don’t you help us slay the dinosaur, and I will pay you one fifth of the treasure hoard?” you propose.\n\n\n“No thanks. I’d rather get paid per trap I set.”\n\n\n“Suit yourself. One gold per trap?”\n\n\n“Deal,” they quickly agree as you toss your first payment.\n\n\n“I’m the Trapper, and this is your first disarmed trap.”\n\n\n“You’re getting paid to disarm your own traps?” the Tank asks. “How is that fair?”\n\n\n“Oh, I trapped the heck out of this whole cave; you’re going to want me to disarm them all. Some of the trap, you won’t even know you’re affected by them; others might have two or more traps going off simultaneously. That is how clever I am.”\n\n\n“One gold is worth the hassle,” the Healer says.\n\n\n“Don’t forget— it’s per trap,” the Trapper adds.\n\n\n“We won’t.”\n\n\nThe Trapper walks over to a trip wire and simply moves it aside. “All done.”\n\n\n“That thing is still armed,” the DPS says.\n\n\n“It may be a scam, but we can afford the luxury,” you say, trying to quell the dispute. \n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou gain +2 SAVES!\n\t\t\t\t\t*set save +1\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto dino_party\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto dino_party\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#It's a dino party.\n\t\t\t\t\t\t\tYou gain +2 SAVES!\n\t\t\t\t\t\t\t*set save +2\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto dino_party\n\t\t\t\t\t\t#It's a dino party, and no one is dancing.\n\t\t\t\t\t\t\t*goto dino_party\n\n\n*label dino_party\nThe Healer casts a protection from an evil spell while the Trapper acts as a guide disarming their own traps and a couple rogue ones thrown into the mix. \n\n\nMonsters come at you guys, and monsters fall. With everyone utilizing their talents, it seems that you can handle anything the cave can throw at you. \n\n\nSoon your group finds the sought-after treasure room equipped with its very own fire-breathing magical dinosaur. First, the dino snaps at the Healer with its mighty jaws while also shooting a score of magical arrows out of its tail like a porcupine. No one is safe from a foe of its caliber. \n\n\n“This beast has every monster’s attack. Watch out,” the Trapper says while the Tank blocks all the projectiles with his dueling shields. Everyone is doing their part, and now it is time for yours.\n*choice\n\t#Do you buff out the DPS?\n\t\t*goto burst_damage\n\t#Do you buff out the Tank?\n\t\t*goto slow_and_steady\n\n\n*label burst_damage\nThe DPS’s weapon glows red hot as she tears this ancient mythical beast a literal new one right above its tail. With each slash, she draws the beast’s ire until it is in an all-out rage!\n\n\nYou try and divert the dino’s attention to the Tank, but it’s too busy rampaging to care. First, it bites through the Healer, then it crushes the Tank underfoot.\n\n\nRunning out of steam, the DPS gets the killing blow right as the foe shoots a fireball out of its mouth, burning her to a crisp.\n\n\nYou won the fight, but at a hefty cost. \n\n\nThe Trapper looks at you with your friend’s blood splattered all over their face. “I want a raise,” they say looking over all the gold inside the treasure room.\n\n\n“You can have it all. I don’t deserve a single coin,” you say, too depressed to argue. \n\n\nDeep in the western wing of the cave, you find an old witch. You decide to trade your body for that of a horse’s in exchange for three resurrection scrolls. The only problem is that you didn’t anticipate stairs, so you never get the opportunity to bring your friends back.\n\n*achieve end71\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label slow_and_steady\nYou cast a dazzling effect over the Tank, which catches the dino’s attention straight away. \n\n\nBefore your foe attacks, the Healer has already readied a quick heal for the Tank. \n\n\nYou’re all working together like a well-oiled machine. It is a sight to see. For a moment you realize that you’re really going to win this fight. \n\n\nThen something strange happens. All the armor and equipment you all managed to loot from the previous fights become cursed and are now hindering you instead of helping. For instance, the amulet that was providing extra life to everyone in the party is now causing them to suffer from a negative effect. \n\n\nThe DPS’s sword is now dull and barely getting through the dinosaur’s tough scales.\n\n\nThe armor the Tank wears is now cracked and nearly falling off him.\n\n\nThe healing effect from the Healer is nearly half of what it was mere moments before.\n\n*if (Save > 0)\n\t*set save -1\n\tYou use a SAVE!\n\t\n\t\n\t*goto restoration\n*else\n\t*goto growing_anger\n\n\n*label restoration\nThe Healer takes a break from healing the Tank to intermittently un-curse each item. You hope that she can get everything before you all perish. \n\n\nBy the time she is done with this task, everyone is very wounded, as your whole system broke under the unexpected change. During the ordeal, you have to use your healing potion to save the Tank instead of helping him keep the dinosaur’s attention.\n\n\nThe DPS is currently on the dinosaur’s back, stabbing it when she can, between hanging on for dear life.\n\n\nYou’re now supporting the Healer with your haste ability, allowing her to heal the whole party at once. \n\n\n“Thanks, I needed that,” the Tank says.\n\n\n“Now let’s murder,” the DPS says, repeatedly stabbing the dinosaur’s back.\n\n\nThe extra healing, however, draws the attention of the dinosaur, and it charges in to attack her.\n\n*if (Save > 0)\n\tYou use a SAVE to save your own…\n\t\n\t\n\t*set save -1\n\t*goto moment_of_truth\n*else\n\t*goto sad_victory\n\n\n*label moment_of_truth\n“Something is healing it or giving it more life. Dinosaurs normally can’t take that much damage,” the Trapper admits. Something is up, indeed.\n\n\nYou call the whole party together and decide on a new plan. \n\n\n“We all need to attack it at once for maximum burst damage. Can we coordinate that?”\n\n\n“We can try,” the DPS says, and everyone else agrees. \n\n\nThe Trapper attaches a beartrap on a chain which tethers the dinosaur to the ground, keeping it from flying around. Then the DPS climbs the wall, getting the high ground. The Healer turns her staff around, hoping to hit the beast with the non-healing end.\n\n\n“Ready…Now!” you command, and everyone in the party descends upon the beast at once; poking, prodding, slashing, stabbing, bashing, and whacking.\n\n\nAll sorts of magical attacks fly out of the dinosaur as you continue your assault. There are poison spores, fire sprays, to name a few.\n*if (Save > 0)\n\tYou use a SAVE to save your own…\n\t\n\t\n\t*set save -1\n\t*goto true_end\n*else\n\t*goto pancakes\n\n\n*label true_end\nYou all hit the dinosaur at the exact same time for a massive critical strike! The DSP pinned its mouth shut with her sword stabbed through its muzzle and lower jaw. The Tank pounded on its feet with his two shields. The Healer poked its eye out with her staff. The Trapper chopped off the tip of its tail. And you, you hit the ancient dinosaur right in its balls.\n\n\nThe thing dies right then and there.\n\n\n“We did it!” you cry out, and everyone joins in to cheer and chant loudly.\n\n\nThere is so much treasure, it would take you hundreds of trips to collect it all. Luckily, amongst the horde, the Trapper finds a magical bag of holding that allows unlimited loot to be stored inside of it through the use of another dimension.\n\n\nOnce the riches are gathered up, you collectively buy a castle equipped with lands and titles to start your very own kingdom.\n\n\nThe Tank is the captain of the castle guards, dealing mostly with training and scouting. \n\n\nThe DPS is in charge of the mercenary army that she has put together from scratch. They are more ruthless than even the Tank’s men.\n\n\nThe Healer rules over the clergy inside the castle, and she has an assembly of priests always by her side.\n\n\nThe Trapper is in charge of the castle’s defenses, along with providing fresh meat and hides for everyone who resides within the stone walls.\n\n\nAs for you, you take charge of all the logistics and are acting treasury. Nothing is allocated without going through you first.\n\n\nEven though there are five of you, no one is more powerful than the other. It is a noble rule of equal parts where, like inside the cave, you work together to overcome all odds.\n\n\nIn the tower, in the dead of night, the Healer is working on a secret plan to destroy all reality and the very threads of space and time. Though that is a tale for another time.\n\n*achieve end72\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label sad_victory\nIn a blink of an eye, the dinosaur eats the Healer alive. You can still hear her screams from inside its belly. \n\n\nThe DPS is doing her best to cut the Healer free, but the dinosaur is too nimble, especially for its size. \n\n\nAs a last-ditch effort, you rush in and pound on the over-sized lizard’s side in order to hopefully kill it in time to save the Healer. Everyone else is doing their best to hit in hard and fast, sparing no extra breaths for resting.\n\n\nA couple stabs later and the dinosaur falls on its stomach, dead. \n\n\nThe Healer’s cries have turned silent. As the DPS tries to open up the stomach, you crawl in through the mouth and pull out the Healer’s crushed and otherwise half-chewed body. It’s too late. You and everyone else split the treasure equally and go your separate ways.\n\n\nThe Trapper opens a trapping supply store.\n\n\nThe DPS opens up an armory.\n\n\nThe Tank opens a blacksmith’s.\n\n\nAnd you open up a park where you bury the Healer in tribute.\n*achieve end73\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label growing_anger\nWith all your equipment breaking, the dinosaur seems to have the upper hand, and it’s tearing through your ranks. Now it seems to be out damaging whatever the Healer can possibly heal.\n\n\nThe dinosaur turns the DSP and the Trapper into stone statues with just a casual glance, then it scratches out the Tank’s eye with a flailing claw. \n\n\nThe pain causes the Tank to steal the DPS’s stone sword and fight valiantly, though half blind. Based on his fighting style, you realize that he must be a full-blown barbarian. \n\n\nAs the Tank plunges the stone sword inside the beast, it lets out a mighty roar, casting a magical death spell upon him.\n\n\nThe Tank grows bigger and wider, which causes him to burst right out of his armor, transforming into a one-eyed giant. He thrashes around, and soon the Healer gets flattened under his enormous foot. You flee from the treasure room never to return again. Your feet never slow until you are back in town and in front of Mr. Garvin. You manage to find him in a field, training one of his prized horses.\n\n\n“Were you painting?” Mr. Garvin asks, noticing your friend’s blood splattered all over your body.\n\n\n“No. I don’t want to talk about it.”\n\n\n“Welp, here’s your 500 gold for completing the quest.” He hands you a heavy sack which seems like chump change in comparison to the room full of treasure you gave up back inside the cave.\n\n\nWith your money, you decide to invest it into a new idea. You spend your days writing a fantastical game where you roll dice and fight monsters. It doesn’t become a hit in your lifetime. What is a stranger thing is that everyone loves it after some popular kids play it wrong in a stage show, years and years later.\n*achieve end74\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label something_funny\nEven though you cleared a bunch of different rooms, you somehow ended up back at the entrance of the cave. Not only that, it seems like the whole cave has been repopulated with more monsters. They weren’t just more of them; they were the same ones. \n\n\n“What is going on here?” you call out, and you could have sworn you heard faint laughter, as if God or something equivalent was amused by your failures.\n\n\nThe only problem with this discovery is that you are a lot more tired than you were the first time around. \n\n\nWith a hefty sigh, you continue on the exact same path as you had previously followed in the longest sense of déjà vu you’ve ever experienced. \n\n\n\nYou lose 1 SAVE.\n*set save -1\n*choice\n\t#You want that save back?\n\t\tToo bad.\n\t\t\n\t\t\t\t\n\t\t*goto four_of_a_kind\n\t\t\n\t#No, you don't need it.\n\t\t*goto four_of_a_kind\n\n\n*label downfall\nYou step across a tripwire, and a magical omen appear on your forehead. It looks like a black skull. \n\n\n“What is wrong with me?” you ask, and the Healer inspects the symbol.\n\n\n“It looks like a curse. Let me do a little research.” While the Healer flips through one of her many religious texts, everyone else sets up camp and rests a while.\n\n\nAfter a good hour, the Healer stands up abruptly. “I found something. It’s the mark of the misty plague.”\n\n\n“That doesn’t sound good,” the Tank says.\n\n\n“No, it doesn’t. What does it mean?” you reluctantly ask.\n\n\n“It says here that you cannot be healed…ever.”\n\n\n“I haven’t needed any healing so far, so, that might be okay.”\n\n\n“Great. Let’s jam,” the DPS says, already heading towards the exit. \n\n\nSuddenly there is a black flash, and now the Tank also bears the misty plague mark.\n\n\n“I think this thing is contagious,” you say. \n\n\n“This is bad. All I do is heal the Tank,” the Healer says.\n\n\n“I’m getting away from you guys,” the DPS admits, leaving the room in a hurry. Though, to be fair, she was heading out of the room already.\n\n\nThere is another dark flash, and now the Healer bears the misty mark as well.\n\n\n“What should we do? If we can’t heal, we have to…” you start to say.\n\n\n“Just play it safe,” the Healer cuts you off. \n\n\n“Okay,” you agree. “We can do this. All we have to do is avoid all the chaff and all of the big baddies. Let’s fight only when we have to and only when we can win.”\n\n\n“Sounds like a great plan,” the Healer says.\n\n\n“Should we include her?” you say, pointing towards the exit where the DPS left.\n\n\n“I never liked her much,” the Healer says.\n\n\n“I know she wasn’t nice, but what would be nice is getting out of here alive.”\n\n*choice\n\t#Do you follow the DPS?\n\t\t*goto together_again\n\t#Do you go another way?\n\t\t*goto around_the_bend\n\t\n\n*label together_again\n*image death.jpg\nEntering the next room, you find the DPS with a spike sticking out of her chest. That isn’t the worst part; she also bears the mark of the misty plague.\n\n\n“Not you, too?” you say with a sigh. \n\n\n“Come here, I want to tell you something,” she says through blood-lined teeth.\n\n\nYou get down low, and she stabs you in the stomach after saying “Die, bitch.” And that is exactly what happens to you…you die…bitch.\n\n\nTime starts to reverse. and for a split second, you see the Healer casting some reverse spell. \n\n\n\nYou lose all SAVES\n*set deaths +1\n*set save 0\n*choice\n\t#Time rewinds...\n\t\t*goto four_of_a_kind\n\n\n*label around_the_bend\n*image death.jpg\nGoing down the opposite path, your party is showered with poisoned darts. The damage they do is minor, but even minor damage accumulates over time, and soon you are all majorly in need of some healing. \n\n\n\nFirst the Tank dies, then the Healer, and finally you succumb to the poison that could have easily been cured if it weren’t for the misty plague curse.\n\n\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#You were so close to having a good ending, but you had to botch it up. Better luck next time.\n\t\t*goto the_beginning\n\n\n*label glory\nYou pull out Excalibur, and a single bolt of lightning streaks down from the heavens and charges up your sword, giving it an electric damage effect.\n\n\nYou activate your special skill and drain each party member of their power. First you take the DPS’s attacking, the Tank’s resilience, the Trapper’s cunning tricks, the Healer’s faith, and the Support’s knowledge. \n\n\nTogether you are now the ultimate fighting machine. Every attack does massive damage while equally healing you. \n\n\nYou face the ancient titan with the power of lightning on your blade. Together you clash, and the whole world explodes upon feeling your immense power!\n\n\nThis all didn’t happen—y’all were caught cheating by reading some random page you never actually got to. You should be ashamed of yourself. \n*set deaths +1\n*set save 0\n*achieve secretpage\n*set character \"unknown\"\n*choice\n\t#Go back to “The Beginning” and try to win the honest way. By the way, I’m telling your mother. \n\t\t*goto the_beginning\n\n\n*label the_odd_couple\nAlong with your strange companion, you enter the cave and look around for more adventurers. You see a cluster of sleeping giant bats. This might be a great opportunity to kill a couple before they’re able to attack.\n\n\nThe masked figure holds out his hand and shakes his head. You have yet to hear him speak. Perhaps he has no tongue. Lowering your staff, the bats ignore you altogether. \n\n\nThere is something really quite strange about this whole exchange. Bats are gross flying rodents, and it isn’t like they do not fly around, even if it’s just to give you a little fright. It’s the law of any cave you’ve ever been inside. But here they are, ignoring a golden opportunity to flap on through your hair, like they do.\n\n\nNow you have a dilemma.\n\n*choice\n\t#Do you attack the sleeping bats?\n\t\t*goto death_to_monsters\n\t#Do you leave them be?\n\t\t*goto pooper_scoopers\n\n\n*label death_to_monsters\nIgnoring your masked companion, you whap a sleeping bat squarely in his bat face, and it falls to the ground, dead. \n\n\nEven though your actions wake up a dozen or so other ones, something about their horrible squeaks feels right to you. This feels how it’s supposed to be, like fate. As cliché as it is, they flap around in a flurry and attack from left and right.\n\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\t\t\t\t\t\n\t\t\t\t\tOne of the bats grabs you by the hair and takes off into the sky. \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t“Wait, this isn’t supposed to happen!” you say. \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto i_can_see_my_house_from_here\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYour masked companion gets angry and stabs you in the back.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t“Sleep in the devil’s bedroom,” he finally speaks. \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\tTruth be told, you’re not as happy to hear him speak as you would have expected. \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto page_105\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Get a cool ride.\n\t\t\t\t\t\t\tOne of the bats grabs you by the hair and takes off into the sky. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t“Wait, this isn’t supposed to happen!” you say. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto i_can_see_my_house_from_here\n\t\t\t\t\t\t#Get punk'd?\n\t\t\t\t\t\t\tYour masked companion gets angry and stabs you in the back.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t“Sleep in the devil’s bedroom,” he finally speaks. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tTruth be told, you’re not as happy to hear him speak as you would have expected.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto page_105\n\n\n*label pooper_scoopers\nYou enter a room clad with wind chimes and find two adventurers—a religious-type girl and an older, armored gentleman. They both are looking for something on the ground with the aid of a lantern.\n\n\n“What are you guys up to?” you ask.\n\n\n“Just collecting poop; mind your own,” the older man scoffs.\n\n\n“I can see that, but why?”\n\n\n“We have our reasons.” \n\n\n“There is a hot steamy one,” the younger religious girl says, ignoring your presents. \n\n\nYou shake your head back and forth. This is the grossest thing you’ve ever seen. The only explanation you can think of is that they might be farmers in search of fertilizer for their crop. \n\n\nYour companion pulls out their flail, indicating that he wishes to fight them.\n\n*choice\n\t#Do you hang around to see what they're doing?\n\t\t*goto a_dirty_job\n\t#Or do you attack them?\n\t\t*goto pvp\n\n\n*label a_dirty_job\nAfter following them around for a couple rooms, you take note of all the excrement they found. They collected bear poop, horse poop, and you’re pretty sure they got some man poop as well. You’re not certain which is more pathetic—what they’re doing, or that you’re watching them do it.\n\n\nOnce their dripping sack is full, the religious girl starts to do a prayer, or cast a spell, or something. Whatever it is, white light surrounds the bag, turning each pile of crap into some sort of rolled-up parchment. \n\n\n“Did you just transmute poop into paper?” you ask.\n\n\nThe religious girl says, “No. I uncursed it.”\n\n\n“Okay. But why did it turn into paper?”\n\n\n“You don’t know anything about anything. It’s not just paper…it’s a resurrection scroll.”\n\n\nDecide what you say.\n\n*choice\n\t#“Can I have one?”\n\t\t*goto work_for_it\n\t#“Resurrect This!”\n\t\t*goto the_robbery\n\n\n*label work_for_it\n“We worked hard collecting all of these. And we’re not about to part with them,” the young girl says, holding the bag behind her back.\n\n\n“Yeah. Get your own,” the older man agrees.\n\n\n“I would, but I’m pretty sure you guys already picked this cave clean.”\n\n\nThey both give you a look that suggests there is another way.\n\n\n“Why are you both looking at me like that? What…” You shrug at your masked companion, but they seem to want no part in this whole ordeal.\n\n*choice\n\t#Do you try to make a poopy?\n\t\t*goto pop_a_squat\n\t#Do you forget the whole thing?\n\t\tYou say, “Smell you fools later,” and move on deeper into the cave. Your masked companion seems annoyed that you didn’t fight them when you had the chance. You know this because he keeps on going for his blade and reluctantly puts it back. One more mistake like that and you might find yourself at the end of it soon.\t\t\n\t\t*goto get_a_room\n\n\n*label pop_a_squat\nYou pull down your trouser slacks and try to drop the kids off in the pool, but it proves to be more difficult than normal because there is a room filled with people watching your process.\n\n\n“Can you guys, like, give me some privacy?”\n\n\n“Not a chance,” the Healer says. “I want to make sure you don’t try anything funny.”\n\n\nThere is nothing funny about pooping in public.\n\n\n“I have some fiber if you’re having trouble with your bowl movements,” the Tank offers.\n\n\n“I just need to concentrate!”\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tEverything goes to plan, and after a couple moments that you don’t dare remember, you have a scroll of resurrection. Gain +1 SAVE!\n\t\t\t\t\t*set save +1\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto target\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tThere is something oozing around your feet, but it isn’t coming from you, but rather some sort of gelatin monster. Before you know it, you’re completely surrounded by the stuff. \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto hell_o\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Get upset?\n\t\t\t\t\t\t\tEverything goes to plan, and after a couple moments that you don’t dare remember, you have a scroll of resurrection. Gain +1 SAVE!\n\t\t\t\t\t\t\t*set save +1\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto target\n\t\t\t\t\t\t#Decide to leave?\n\t\t\t\t\t\t\tThere is something oozing around your feet, but it isn’t coming from you, but rather some sort of gelatin monster. Before you know it, you’re completely surrounded by the stuff. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto hell_o\n\n\n\n*label the_robbery\nYou grab the bag of scrolls, forcing an impromptu game of tug of war between you and the older gentleman. \n\n\nRight as the bag begins to tear, the younger girl casts the same spell as before, and the scrolls turns back into feces. Of course, they splat all over you. \n\n\nWiping the running liquid off your face, you hear the laughter of the two of them as they vacate the vicinity.\n\n\nThere is a recurring dream you have where all of your siblings are surrounding you while throwing their feces at you. Every time you have this dream, you wake up puking your brains out. This is no dream, but puking you do, adding to the mess.\n\n\nBent over on his knees, your companion also throws up on the inside of his mask. How hardcore is this guy? Even now he doesn’t take it off, causing puke to gush out of the eye holes and down his neck. \n\n\nYou start to get the impression that it isn’t a mask at all but material that is graphed to his face.\n\n\nPick a random number.\n*choice\n\t#1.\n\t\tYou lose 1 SAVE.\t\t\n\t\t\n\t\t\t\t\n\t\t*set save -1\n\t\t*goto get_a_room\n\t#69.\n\t\tYou lose 69 SAVES!\n\t\t*set save -69\n\t\t\n\t\t\n\t\t*goto get_a_room\n\t#14.\n\t\tYou lose 14 SAVES!\n\t\t*set save -14\n\t\t\n\t\t\t\t\n\t\t*goto get_a_room\n\t#7.\n\t\tYou lose 7 SAVES1\n\t\t*set save -7\t\t\n\t\t\n\t\t\n\t\t*goto get_a_room\n\t#2.\n\t\tYou gain 2 SAVES!\n\t\t*set save +2\t\t\n\t\t\n\t\t\n\t\t*goto get_a_room\n\t#1,000,000.\n\t\tYou lose all SAVES!\n\t\t*set save 0\t\t\n\t\t\n\t\t\n\t\t*goto get_a_room\n\t\n\n*label get_a_room\nYou enter a room that is misting. It feels as though you’re walking through a cloud. After about a minute of walking through these conditions, your whole body is drenched. You’re excited to have an opportunity to wash all the filth away. \n\n\nOff in the distance, you spy a dry alcove, but it seems to be occupied by two people kissing.\n\n*fake_choice\n\t#Do you bother them?\n\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYour companion pushes the kissing couple out of the alcove, and they fall onto the wet ground.\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto pvp_take_two\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\tYou grab your companion’s sword and skewer them both.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto blood_on_your_hands\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t#Your companion pushes the kissing couple out of the alcove, and they fall onto the wet ground.\n\t\t\t\t\t\t\t\t\t*goto pvp_take_two\n\t\t\t\t\t\t\t\t#You grab your companion’s sword and skewer them both.\n\t\t\t\t\t\t\t\t\t*goto blood_on_your_hands\n\t#Do you leave?\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe couple is so into their kiss that you are able to steal a resurrection scroll from them.\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto target\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\tYour companion has had enough of you and stabs you in the back.\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto page_105\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#The couple is so into their kiss that you are able to steal a resurrection scroll from them.\n\t\t\t\t\t\t\t\t\t*goto target\n\t\t\t\t\t\t\t\t#Your companion has had enough of you and stabs you in the back.\n\t\t\t\t\t\t\t\t\t*goto page_105\n\n\n*label pvp_take_two\n*image death.jpg\nThe couple faces you with their weapons drawn. Because they both have short hair, you’re surprised to see that they are both girls. One of them has a huge sword, and the other has some sort of staff. \n\n\nBefore you can process what was happening, they gut you and your companion. While you bleed out and gasp for help, they go back to making out. Gosh, that’s love, or is it lust?\n\n\nYou die.\n\n\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#This might be the way you always wanted to go, but if not, go back to “The Beginning” and sort it out.\n\t\t*goto the_beginning\n\n\n*label target\nYou make your way out of the backside of the cave and on to a small cabin. Inside, there’s a room lined with candles and the sound of someone singing loudly. In the center of the room is a brass tub with bubbles flowing out of it. Your masked companion puts his index finger to the lip hole of his mask and sneaks in with two weapons drawn. \n\n\n\nOnce you’re about thirty feet from the tub, you recognize Junior Lifeguard, Mr. Garvin. He is relaxing and singing loudly, unsuspecting what your “friend” is about to do. He has a wonderful singing voice as he sings about high rent prices in some place called “Colorado.”\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou make a sound.\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto target2\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\t\t\t\t\t\n\t\t\t\t\tYou sneak and miss your attack, falling into the tub.\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto target3\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#You make a sound.\n\t\t\t\t\t\t\t*goto target2\n\t\t\t\t\t\t#You sneak and miss your attack, falling into the tub.\n\t\t\t\t\t\t\t*goto target3\n\n\n*label target2\n*if (Save > 0)\n\t*goto splish_splash\n*else\n\t*goto page_105\n\n\n*label target3\n*if (Save > 0)\n\t*goto bubbles\n*else\n\tYou murder Mr. Garvin with ease and without reason.\t \n\t\n\t\t \n\t*goto blood_on_your_hands\n\n\n*label splish_splash\nMr. Garvin stops singing and catches your masked companion in the throat while mid-swing. With his other hand, Garvin pulls out a bomb and lodges it inside your companion’s stomach.\n\n\nYou fall to your stomach and cover your head.\n\n\n“Bye, ho,” Mr. Garvin says, and the explosion goes off. Once the wet pieces of flesh land, you open your eyes and rise to your feet.\n\n\nBoth of them are goners; only the wooden mask remains. You decide to read the resurrection scroll you have. Magical energy swirls around and soon Mr. Garvin is alive. You wait while he gets himself dressed in his signature attire. \n\n\n“Thank you. Consider your debt wiped clean.”\n\n\n“How did you know about my debt?” you ask.\n\n\n“I know everything. Except this…” he picks up the mask and looks at it curiously. “You can leave now. Don’t worry, no traps or monsters will harm you on your way out.”\n\n\n“Who are you?” I ask.\n\n\n“I am the master of this dungeon.” Mr. Garvin puts on the mask and leaves you alone with your wandering thoughts. Free of your debts, you’re able to start over in the town across the lake.\n*achieve end75\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label bubbles\nUnderwater, you splash around and try to get your bearings. Once you find the surface again, Mr. Garvin is already out of the bath and holding a nine-inch knife.\n\n\nWith suds in your eyes, you try and watch your masked companion and Mr. Garvin blocking and parrying each other’s strikes. They are equally matched. You pull out your staff and take aim, holding it like a javelin. \n\n\n\nDecide who you help.\n\n*fake_choice\n\t#You helo Mr. Garvin.\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto quest_denied\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t“If you don’t like the zombies’ kill, suck it up, bitch,” Garvin sings.\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto splish_splash\n\t\t\t\t\t\t\t\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t#Marc sings about poop on the ground.\n\t\t\t\t\t\t\t\t\t*goto quest_denied\n\t\t\t\t\t\t\t\t#“If you don’t like the zombies’ kill, suck it up, bitch,” Garvin sings.\n\t\t\t\t\t\t\t\t\t*goto splish_splash\n\t#You help your masked friend.\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto gotcha_sucka\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\tYou rush at the masked guy, and he senses you approaching, and you run right into his blade.\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto page_105\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Gotcha Sucka.\n\t\t\t\t\t\t\t\t\t*goto gotcha_sucka\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t#Don't Gotcha.\n\t\t\t\t\t\t\t\t\tYou rush at the masked guy, and he senses you approaching, and you run right into his blade.\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*goto page_105\n\n\n*label gotcha_sucka\n*image death.jpg\nYou throw your bow staff, and it hits the masked companion in the back, doing no damage. Your weapon was wet from the tub, causing him to lose his footing. \n\n\n\nMaster swordman Garvin uses your distraction to stab the masked figure with his knife. He pulls off the mask, then looks perplexed. You lean in but cannot see a thing. \n\n\n\nWithout explanation, Garvin walks up to you and stabs you in the face, turning the bubbles around you all red.\n\n\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#If it wasn’t your intention to die in a tub next to a naked man, go back to “The Beginning” and try something else, why don’t cha?\n\t\t*goto the_beginning\n\n\n*label quest_denied\nYou throw your staff, and it hits Mr. Garvin in a sensitive spot. He buckles over in pain, and your companion doesn’t hesitate bashing in your old quest giver’s skull with his flail.\n\n\n\n“Good job,” the masked figure finally speaks. “The curse is over. And I am free to leave this place.”\n\n\n\nIt hits you that you’ve blindly followed your companion without ever questioning why. \n\n\n\n“What curse?”\n\n\n\n“Hopefully you’ll never know.” The masked figure turns his back to you and walks towards the exit door. Before exiting, though, he pauses and tosses his mask on the ground. “She means everything to you. Don’t get greedy like I did,” he says, then disappears forever.\n\n\n\nThat final word was a little cryptic and confusing. He was your only friend, and now you’re alone to find your own way out of this place. And who was this girl?\n\n*choice\n\t#Continue on.\n\t\t*goto solo_rider\n\t#Try not to go on.\n\t\t*goto solo_rider\n\t#Think about doing something else?\n\t\t*goto solo_rider\n\t#Just go with it?\n\t\t*goto solo_rider\n\n\n*label pvp\nYou pull out your staff, and your masked companion follows suit. \n\n\n\nThe old man is quite good at blocking your companion’s attacks. You, on the other hand, are able to hit the girl without too much trouble, though she keeps smacking herself in the head with her own staff.\n\n\n\n“Whose team are you on?” you ask, but she doesn’t answer you. She just keeps whapping. \n\n\n\nAfter a couple minutes of this, you wonder how strong this girl is because she isn’t going down. Now she’s giggling and taunting your failures.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYour companion manages to defeat the old man and comes over to help you finish off the woman who is really quite resilient.\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto blood_on_your_hands\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tNo matter how much you hit her, the woman doesn’t seem to be getting damaged. The older man defeats your masked friend, and now it’s two against one. \t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto homeless_and_helpless\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Your companion manages to defeat the old man and comes over to help you finish off the woman who is really quite resilient.\n\t\t\t\t\t\t\t*goto blood_on_your_hands\n\t\t\t\t\t\t#No matter how much you hit her, the woman doesn’t seem to be getting damaged. The older man defeats your masked friend, and now it’s two against one. \n\t\t\t\t\t\t\t*goto homeless_and_helpless\n\n\n*label blood_on_your_hands\nKilling has turned your heart hard as stone, and instead of helping people, you decide to utterly destroy them. Word gets out in town and there is a bounty on your head, but that only brings more lambs to the slaughter. Your appetite for murder has become unmanageable and even caused your companion to turn on you, maybe for the reward, maybe for sport, you’re not sure.\n\n*if (Save > 0)\n\tYou cut off both their arms and legs. Slowly you pull off your companion’s mask to see your own face looking back at you.\n\t\n\t*achieve end76\n\t*stat_chart\n\t\ttext Deaths \n\t*goto_scene ending\n\n*else\n\t*image death.jpg\n\tYou lose that fight with a slit neck. \n\t*set deaths +1\n\t*set save 0\n\t*set character \"unknown\"\n\t*choice\n\t\t#Try again\n\t\t\t*goto the_beginning\n\n\n*label supportive_duo\nInside the cave, you’re avoiding any monster that comes your way. Instead, you focus on your mission at hand—to find her. \n\n\nTime is of the essence, and with each room, it’s running out fast.\n\n\n“Hello? Where are you?” you call out, but there is no answer.\n\n\n“Will you slow down?” the Trapper says while trying to disarm a boulder trap.\n\n\n“If we slow down, all will be lost,” you say, already heading into the next room. Your heart is racing fast, your palms are silk with anticipation. There is too much at stake to dilly-dally.\n\n\n“No. All will be lost if you’re dead.”\n\n\n“I’ve already died before. Now it’s my chance to truly live.”\n\n\n“You’re a hopeless romantic.”\n\n\n“No. I’m a hopeful one.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto crossroad\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto blinding_light\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Go to the crossroads?\n\t\t\t\t\t\t\t*goto crossroad\n\t\t\t\t\t\t#Go to a blinding light?\n\t\t\t\t\t\t\t*goto blinding_light\n\n\n*label crossroad\nYou enter a room and you see a sign pointing to a merchant store and another one pointing to a lake.\n\n\n“Oh, let’s go to the lake. I bet we could catch some fish down there,” the Trapper says.\n\n\n“I told you. We don’t have time for leisure.”\n\n\n“You need to lighten up a bit. Relieve some stress. That sort of thing.”\n\n\n“There is still more cave to comb.”\n\n\n“No. This thing goes on forever in an endless loop. You’re better off giving up now and try to enjoy yourself.”\n\n\n“What do you mean?”\n\n\n“I’ve scouted this cave for years. Trust me.”\n\n\n“How can that be?”\n\n\n“It’s alive. The cave, I mean.”\n\n\nYou take a moment, and you can hear the subterranean winds lightly blowing in and out as if it were breathing. “You may be right.”\n\n*choice\n\t#Do you go in the store?\n\t\t*goto shops\n\t#Do you go the lake?\n\t\t*goto the_lake\n\n\n*label shops\nUpon entering the shop, a bell alerts the shopkeeper of your presence. You pull out a couple coins to make a purchase of a potion, but your coins disappear into thin air. That was strange, you think, but not as strange as the fact that the rest of your money is also missing.\n\n\nYou turn towards the Trapper and ask, “Were you going through my things?”\n\n\n“What do you mean?”\n\n\n“I seem to be missing some coins.”\n\n\n“Are you calling me a thief?”\n\n\nDecide how you answer.\n*choice\n\t#“Things don’t just grow legs on their own now, do they?”\n\t\tThe Trapper walks over to you and holds out their hand, you reach for it, and they slap you across the face. \t\t\n\t\t\n\t\t\t\t\n\t\t“I don’t need your things.”\t\t\n\t\t\n\t\t\t\t\n\t\tLose all SAVES.\t\t\n\t\t\n\t\t\t\t\n\t\t*set save 0\n\t\t*goto deep_in_debt\n\t#“No…I just…never mind. Can I borrow some coins?”\n\t\t*goto deep_in_debt\n\n\n*label deep_in_debt\nThe Trapper shakes their head in annoyance. “This is just like you, borrowing money again.”\n\n\n“Again?”\n\n\n“How much will it be this time?”\n\n\n“Just a couple coins.”\n\n\n“Fine. I’ll add it to your tab.”\n\n\nMy tab? I don’t remember any of that. Are they confused or something?\n\n\nThe Trapper goes on to looking through some trap supplies in the corner.\n\n\nYou approach the long-eared forester. “Hello, sir, I’m looking for someone, and I can’t seem to find them.”\n\n\n“Who do you seek?” they encourage you to come in closer to their long ears.\n\n\nYou lean in and whisper the name.\n\n\n“Oh, that’s a tough one indeed. Where are you coming from?”\n\n\nYou tell the story, and he shakes his head even more disappointingly. “You will never find her.”\n\n\n“Why not?”\n\n*if (Save > 2)\n\t*set save -3\n\t*goto secrets_shh\n*else\n\t*goto history_lesson\n\n\n*label secrets_shh\nThe shopkeeper leans in close and whispers you a tale of his own. “This is a time loop. You are not real. Every day, another you will come by. And another, me as well. I had to alter my appearance so that I would stop killing myself because the end is always the same.”\n\n\n“What are you going on about?”\n\n\n“Wake up. This cave is evil. The gods are out to kill us. That is their purpose, their only purpose. When you’ve seen as much as I have, you will soon start to see the patterns. The reason you can never find the Healer is that once you left the cave, it started over again. She might be around, maybe changed slightly, but her memory of you is gone.”\n\n\n“Gone? But to where?”\n\n\n“I’m guessing on another lap of the loop. This is all a game. You either play to win, which will cause others to die, or you lose and start all over at The Beginning. You can try and beat the system, but that means that existence becomes nothingness.” He then opens up a portal. “The choice is up to you, my friend.”\n\nGo to a random page in this story.\n\n*choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 10\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto crossroad\n\t\t*if (dieroll = 2)\n\t\t\t*image fate.jpg\n\t\t\t*choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto crossroads\n\n\t\t*if (dieroll = 3)\n\t\t\t*image fate.jpg\n\t\t\t*choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto dark_path_1\n\t\t*if (dieroll = 4)\n\t\t\t*image fate.jpg\n\t\t\t*choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto the_deep_south\n\t\t*if (dieroll = 5)\n\t\t\t*image fate.jpg\n\t\t\t*choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto glory\n\t\t*if (dieroll = 6)\n\t\t\t*image fate.jpg\n\t\t\t*choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto bubbles\n\t\t*if (dieroll = 7)\n\t\t\t*image fate.jpg\n\t\t\t*choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto dance_off\n\t\t*if (dieroll = 8)\n\t\t\t*image fate.jpg\n\t\t\t*choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto red_pages\n\t\t*if (dieroll = 9)\n\t\t\t*image fate.jpg\n\t\t\t*choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto wizards_are_not_jerks\n\t\t*if (dieroll = 10)\n\t\t\t*image fate.jpg\n\t\t\t*choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto target3\n\n*label history_lesson\nThe long-eared forest dweller looks at you sympathetically, like you were a puppy with only three legs. \n\n\n“Look. I once was like you. Wet behind the ears, thinking I was invincible. That fantasy came crashing down on me hard, giving me a reality adjustment.”\n\n\n“How so?”\n\n\n“This cave is your punishment. There is no ending, no beginning and no way out. It will change you in many ways. Believe it or not, I used to be a woman. And that is the honest to goodness truth.”\n\n\n“You used to be a what?”\n\n\n“Listen to me and listen good. The harder you try, the worse your outcome will become. So, if you want to find this girl, if you really do, you have to stop looking. That is my advice to you.”\n\n\n“What do you want me to do, then? Just give up?” \n\n\n“Anything else. The cave knows what you want, and it will deny you any pleasure.”\n\n\n“Do you think I want to sell used gear for eternity? No. This is my personal hell. Don’t make the same mistake as me,” the elf says.\n\n\n“Can’t you just leave?” you ask.\n\n\n“You’re not listening to me. Time is a lie. Space is a goddamn joke. And you can’t live through this because you’re already dead.”\n\n\n“Time is a lie? My brain hurts. I need to sit down.”\n\n\n“Okay. Just…” the shopkeeper looks over at the Trapper and says, “Keep this between us.”\n\n\nYou take a long moment to contemplate if this shopkeeper is crazy or telling you some higher truth that is beyond your comprehension. And why does it matter if the Trapper finds out or not. This is all too much for you to fathom, especially since you were on a huge time crunch. What if this is a trick devised to slow you down.\n\n*choice\n\t#Do you keep looking for the girl?\n\t\t*goto lost_and_found\n\t#Do you forget it?\n\t\t*goto the_lake\n\t#Do you leave it up to fate?\n\t\t*goto the_lake\n\n\n*label lost_and_found\nYou continue your search even harder than before, leaving no stone unturned, no shadow unlit. In the process, you’ve become crazy obsessed with finding the Healer. \n\n\nIn a dark room, you find a hoard of resurrection scrolls in a sack. This sparks an idea to collect all the skeletons you come across. At the cliffside by the rope bridge, you pile them up and start reading the scrolls one by one. Monster after monster appears before you, reanimated from their rotten bones. There was a frogman, a cultist, a wizard, a centaur, to name a few.\n\n\nYou are forced to shove them all off the cliff and into the depths below.\n\n\nNumb to murder, you continue on in this fashion, casting each one aside until finally you’ve reached the very last resurrection scroll and pile of bones. You read the scroll aloud, and a black-winged she-devil emerges. You try and shove her into the ravine, but her wings keep her afloat. “I remember my past and future lives. And this moment will not be forgotten likely,” she says before turning you into an extinct animal…a magical flying dinosaur.\n\n*achieve end77\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label the_lake\nYou go to an underground lake, and straightaway the Trapper pulls out a fishing rod. \n\n\n“I give up, you win,” you yell out to the surging tide. Defeated, you have a seat next to the Trapper. Maybe you should just find a way to enjoy yourself like they are.\n\n\nAlone with your thoughts, you are debating life and existence against the sound of crashing waves. An hour turns into two and three.\n\n\n“I got a bite,” the Trapper says. You help pull on the rod, and out pops a squid which attaches to the Trapper’s face, hallowing it out from the inside.\n\n\nThe scene is so grotesque that you cannot look away from the horror show. Once the squid is finished, it somehow takes control of the Trapper’s body and stands its corpse upright. “See ya later,” the squid says and goes up towards the shop.\n\n\nThis place is truly a nightmare. You think of only death and take a couple steps toward the shoreline, thinking about diving in and drifting off into nothingness. Then you feel a soft hand on your shoulder. You turn around…it’s her.\n\n*achieve end78\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label blinding_light\nYou enter a room, and there is an old man kneeling in front of an altar of a copper chalice.\n\n\n“I admit my wrongdoings. I betrayed my oath and stole the crown for my daughter. She is the rightful owner, no matter what the nobles say. In doing so, I gave up my honor. Now give me peace, I beg of you.” The old man drinks out of the chalice, and a blinding flash goes through the room, and right then you forget everything that has happened to you lately. \n\n\n“Where am I? Who are you?” you say.\n\n\nThe old man walks up to you curiously. “I’m not who I am, either. Strange.”\n\n\nYou both look through your belongings, trying to figure out how you got here. “Hey, I have a quest request, and I think its location is a cave. Could it be this cave? Want to team up a while and find out?”\n\n\nThe old man agrees, and you both go on a journey together.\n*choice\n\t#High-five yourself.\n\t\t*goto tank_time\n\t#Give a thumbs up to a bug?\n\t\t*goto tank_time\n\t#Yell out a happy curse word?\n\t\t*goto tank_time\n\t\t\n\n", "screenshots": "*set character \"Healer\"\n*set Save 1\n*set deaths 17\n\nYou enter the room and are faced with a golden translucent cube and a dead end.\n\n\nThe cube slowly goops and slimes its way across the room until it reaches you, then pauses.\n\n\n“Hello. Are you alive?” you reluctantly ask.\n\n\nA couple bubbles form inside it as if it were trying to answer you.\n\n\n“You are alive, aren’t you?”\n\n\nThe cube changes its form to match your shape. This is the strangest thing ever. The details are perfect, even though it is still translucent.\n\n\nYou wave your hand at it, and it mimics your motion exactly.\n\n\n“Friends?” you ask, and extend your hand out to it, and it does the same, nearly touching yours.\n\n\nEven though this cube doesn’t appear to be hostile, you are skeptical of anything that lives inside a cave.\n\n*fake_choice\n\t#Do you shake its hand?\n\t\tThats a funky feeling.\n\t#Do you leave it hanging?\n\t\tDon't leave me hanin' bro.\n\n*goto screenshot2\n\n\n*label screenshot2\n\n*set character \"Tank\"\n*set save 3\n*set deaths 1\nYou enter a large room and feel an intermittent rumbling sound that keeps getting louder.\n\n\n“What is going on?” you say aloud.\n\n\n“Could it be an earthquake?” the Healer asks.\n\n\n“This is not the ideal place to be if it is, although I don’t believe it is. I think it’s a…”\n\n\n“Magical dinosaur!” she blurts out with an outstretched hand and a pointing finger.\n\n\nIt was indeed that. Standing before you is a huge lizard with its bat-like wings outstretched.\n\n\n“And now it’s flying!” you admit, watching in awe as it takes to the sky. To slay a dragon dinosaur has always been a dream of yours. Your only impetus for not pursuing it is that you have no fireplace of your own in which to mount its massive head. That and they were rumored to be extinct.\n\n\n“Wait. Don’t hurt it,” the healer says, blocking your way with her staff.\n\n*fake_choice\n\t#Do you fight it?\n\t\tKilling is the reason you woke up this morning.\n\t#Or do you hold off?\n\t\tHolding off doing stuff is why you're always tired.\n*goto screenshot3\n\n*label screenshot3\n\n*set character \"DPS\"\n*set save 0\n*set deaths 3\n\nThe shopkeeper seems to be following you around like a shadow. You keep looking over your shoulder at him while trying to not seem suspicious, but the items you stuffed inside your sack make it quite difficult to do. You want to put the items back, but his intense gaze isn’t giving you the opportunity.\n\n\nYou pick up random supplies—bandages, rope, and other worthless things—to seem like a normal, unsuspecting customer, but the shopkeeper doesn’t seem to be buying it. In fact, now his eyes are narrowing.\n\n\nThis whole situation might have been a bad idea. But what’s done is done, and there is no going back now. \n\n*fake_choice\n\t#Create a diversion.\n\t\tJust like you never do.\n\t#Flee.\n\t\tJust like you always do.\n\n*goto screenshot4\n\n\n*label screenshot4\n*image fate.jpg\n*fake_choice\n\t#The wheels of fate have decided.\n\t\t*goto screenshot5\n\n*label screenshot5\n*image death.jpg\nThe large blade descends upon you and slices you directly in half. Right before you die, your vision is cut in two, and you’re able to see all sides of the room from both of your splitting halves.\n\n\nYou are twice as dead now, but two is always better than one, right?\n*set deaths +1\n*set save 0\n*choice\n\t#Please go to \"The Beginning\" and try to get some luckier dice. Thank you for coming to my TED Talk. \n\t\t*ending\n\n", "startup": "*title Caves and Dinosaurs\n*author P.A. Wikoff\n*scene_list\n\tmaster_scene\n\t\n\t\n*create Save 0\n*create Character \"Unknown\"\n*create Deaths 0\n\n*achievement dead1 visible 2 Dying Young\n\tDie as fast as you can.\n\tYou died at the earliest possible moment.\n*achievement end1 visible 5 Boring\n\tDon't try too hard.\n\tYou found the lamest ending in the game.\n*achievement pancakes visible 5 Waffles are Better \n\tWhat is the best breakfast food?\n\tPancakes are for poor people!\n*achievement end2 visible 25 Curse at Marc\n\tCurse him real good.\n\tYou gave Marcus the curse, and now you are free.\n*achievement end3 visible 25 Danger Manager\n\tLearn some news around town.\n\tYou have learned about the DM, grats.\n*achievement end4 visible 20 Uncursed\n\tCleanse yourself of the curse.\n\tYou are free from the curse, but also dead.\n*achievement end5 visible 10 Find Spot\n\tGet yourself a loyal pet.\n\tYou are the queen of dragons now.\n*achievement end6 visible 10 Parasite\n\tGet involved in a codependent relationship. \n\tYou are a blood sucking parasite, you know, a vampire.\n*achievement end7 visible 10 Swapper\n\tHunger knows no bounds.\n\tWhat have you done?\n*achievement end8 hidden 20 The Right Target\n\thidden\n\tYou have located your former self, you think.\n*achievement end9 hidden 20 Wrong Target\n\thidden\n\tYou have forgotten who you once were.\n*achievement end10 visible 75 Total Freedom\n\tReach the top of the bridge.\n\tYou defeated Xenu!\n*achievement end11 visible 30 Gotta Catch Em All\n\tGet yourself a ball of holding.\n\tYou are a pokemon master.\n*achievement end12 visible 5 Bad End\n\tFind a bad ending.\n\tYou found a bad ending.\n*achievement end13 visible 7 Cults Cults Cults\n\tJoin a cult.\n\tYou were a Scientologist, for a bit.\n*achievement end14 visible 10 Happy Ending, But Not for You\n\tBe a great wingman.\n\tYou helped someone find love.\n*achievement end15 visible 10 This Ending Wasn't So Bad\n\tFind a good ending.\n\tYou found happiness in this dreadful cave.\n*achievement end16 visible 5 The Dark\n\tFind the darkest ending.\n\tThis ending wasn't dark, it was pitch black.\n*achievement end17 visible 15 Ripped\n\tDo you even lift bro?\n\tYou can't touch your belt, but you look swol!\n*achievement end18 visible 15 Turn In\n\tComplete the quest.\n\tYou turned in the quest and got your reward!\n*achievement end19 visible 15 A Real Knight\n\tMeet a real knight.\n\tYou trained a real night.\n*achievement end20 visible 15 A Death Knight\n\tAid an evil being.\n\tA lot of blood is on your hands.\n*achievement end21 visible 15 Peggy\n\tMeet Peggy.\n\tYou are Peggy.\n*achievement end22 visible 15 Become Homeless\n\tLose everything.\n\tSpare some change?\n*achievement end23 visible 10 Kill the Masked Figure\n\tHunt down the masked figure. \n\tYou unleashed the curse.\n*achievement end24 visible 12 Special Purpose\n\tFind your purpose.\n\tYour purpose is to troll a god.\n*achievement end25 visible 16 I Can Play The Lute\n\tJoin a band.\n\tYou are in a band and would love to sell out.\n*achievement end26 visible 15 Survivor\n\tGet the plague.\n\tYou got the plague and survived.\n*achievement e
