, you used to drink from the fountain of vigilance. The water in the well has been foretold to keep one youthful, even sometimes reverse age altogether. Up until this moment, you never believed such tales, but your surefooted run says otherwise. \n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto a_big_trap\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto pancakes\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Use a big trap?\n\t\t\t\t\t\t\t*goto a_big_trap\n\t\t\t\t\t\t#Get squished?\n\t\t\t\t\t\t\t*goto pancakes\n\n\n*label a_big_trap\nRunning around in circles, you manage to keep just ahead of the magical dinosaur until the Trapper’s ginormous cage is set. Once able, you head inside the cage, and the dinosaur is close behind. Then the iron door slams shut. You’re able to escape out of the wide bars that are just your size.\n\n\nThe dinosaur thrashes and claws at the bars while the Trapper tries to sooth its rage with a flute.\n\n\nYou wonder how the Trapper manage to carry or construct such a massive cage. It is surely an enigma. “How in the world…”\n\n\n“Shhh,” the Trapper cuts you off. “Take whatever you want; just don’t distract me.” \n\n\n“You look around, and all of the treasure is smashed and otherwise destroyed. But wealth wasn’t you reason for venturing here. You search everywhere for a certain item, but it’s nowhere to be found. \n\n\nMonths pass and you and the Trapper manage to tame the dinosaur and make an exotic animal zoo, together with the scrap gold that you melted down from flattened coins. You’re now dubbed as the Dinosaur Queen. \n\n*achieve end33\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label western_path\nYou go the western path, and your companion isn’t at all impressed with your decision. “Go ahead. I’ll maybe catch up with you later.”\n\n\nAbout ten minutes on the rocky path, you begin to have a change of heart. For some reason, you thought of yourself as the leader, the decision maker of this whole escapade. But alas, another person doesn’t respect your authority and just does what he wants without consulting you first. This has been the story of your life and why you’ve gone off on your own to rediscover yourself, although being stubborn is proving to be very lonesome. Not wanting to go on this adventure alone, you decide to go their way, but something prevents you from doing so.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto group_therapy\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto loud_silence\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Down on your luck.\n\t\t\t\t\t\t\t*goto group_therapy\n\t\t\t\t\t\t#Down on your faith.\n\t\t\t\t\t\t\t*goto loud_silence\n\n\n*label group_therapy\nWithout anyone to heal, you find yourself wandering through many empty caverns until you come across a cultist. “Would you like to learn the way to happiness?” the cultist asks.\n\n\nContorting your hands, you flash him the secret cult sign.\n\n\n“Oh, I see you’re a lifetime member!”\n\n\nAt a young age, you joined the same group before you knew any better. Though now that you’re at a low point in your life, and alone, you decide to return to the flock, no matter how dangerous it is. You know they’ll love-bomb you, which makes you feel important. This time it’s going to be different. I heard they fixed all the grammatical errors in the only scriptures and are under new management.\n\n*choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou gain +2 SAVES!\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*set save +2\n\t\t\t\t\t*goto bridge\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou gain +1 SAVE!\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*set save +1\n\t\t\t\t\t*goto bridge\n\n\n\n*label it_burns\nAs the corrosive substance burns your face, you cast a healing spell to soothe the pain, but the damaged skin is not so easily healed.\n\n\n“Are you okay?” The Trapper rushes over.\n\n\n“Yes, it seems that it’s more cosmetic than anything,” you say, feeling your rippled skin.\n\n\n“I will take more care next time.” \n\n\nYou had given up on vanity long ago. Back when your ex cheated on you, you decided to discard all things you cannot control, and beauty was just another one of them. \n\n\nSurveying the area, the Trapper discovers a secret entrance up some stairs, though they warn you to keep to the left side of the steps as they are most likely not trapped. Reaching the top, you are greeted by a shirtless man on a horse. He takes one look at your melted face and charges in to attack, most likely thinking you’re a monster. \n\n*choice\n\t#Do you flee from all this jazz?\n\t\t*goto golden_rule\n\t#Do you fight the mounted combatant?\n\t\t*goto mounted_one\n\n\n*label mounted_one\nThe beast and rider come straight for you both with flailing arms and stamping feet. You pull back your weapon, ready for anything.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto mounted_one2\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto trample\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Avoid getting tramped?\n\t\t\t\t\t\t\t*goto mounted_one2\n\t\t\t\t\t\t#Get trampled?\n\t\t\t\t\t\t\t*goto trample\n\n\n*label mounted_one2\nThe Trapper lays down a bear trap that clamps down on one of the horse’s hooves, causing it to trip over itself and crash down on the ground. You avert your gaze as the Trapper finishes it off with a hand axe.\n\n\nAfter much butchery, the Trapper holds up a torso of the rider, as if it’s some sort of prize to be hung on a wall. You are not into this type of gruesome violence.\n\n\n“What’s wrong?” the Trapper asks, as you leave through the next room, feeling sick to your stomach.\n\n\n“I need some air,” you say.\n\n\nThe next room has a golden translucent cube awaiting you. It has bones, weapons and other indigestible things suspended inside it.\n\n*choice\n\t#Are you ready?\n\t\t*goto cubert\n\t#Are you not ready?\n\t\t*goto cubert\n\t#Are you ready to...rumble?\n\t\t*goto cubert\n\n\n*label trample\n*image death.jpg\nYou get run over like a common piece of trash. Your body rolls and thrashes around like a rag doll while getting caught between the horse’s hooves.\n\n\n\nOnce the beast stops dragging you, you try and get up, but your body is broken past the point of repair. “Ouch.”\n\n\n\nRight before the horse rears up for a final blow, you notice that it isn’t a mounted combatant, but the horse and rider are one and the same—a centaur, to be more exact.\n\n\n\nThen you are crushed and killed by the hybrid beast. \n\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#Start over at “The Beginning” and try to get a better ending next time. \n\t\t*goto the_beginning\n\n\n*label golden_rule\nYou run into the next room, which is covered by a golden sheen. You wonder if this might be the treasure, but soon the golden walls start to move and shift until they congeal into a square gelatinous mass. That isn’t something you see every day.\n\n\nSeeing this is a dead end, you and the Trapper look at each other. It is obvious that this trap couldn’t have been defused or avoided.\n\n\nAs if things couldn’t get any worse, the mounted combatant from the previous room appears, forcing you into a pincer attack. Fighting two baddies at the same time is tough.\n\n\n“It’s been nice adventuring with you,” you say.\n\n\n“Don’t give up so easily,” the Trapper says.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 4\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto lucky_break\n\t\t*if (dieroll = 2)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto goo_gone\n\t\t*if (dieroll = 3)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto trample\n\t\t*if (dieroll = 4)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto hell_o\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Get a lucky break?\n\t\t\t\t\t\t\t*goto lucky_break\n\t\t\t\t\t\t#How do you feel about goo?\n\t\t\t\t\t\t\t*goto goo_gone\n\t\t\t\t\t\t#Get trampled?\n\t\t\t\t\t\t\t*goto trample\n\t\t\t\t\t\t#Do you like jell-o?\n\t\t\t\t\t\t\t*goto hell_o\n\n\n*label lucky_break\nThe mounted rider comes at you, and you and the Trapper manage to leap out of the way.\n\n\nUnable to stop or turn in time, the rider is engulfed by the giant gelatin cube. Once trapped inside, you witness your foe getting eaten alive; first its flesh burns away, then its tissue, followed by its bones. Each stage is even more gruesome than the last. \n\n\n“What did I tell you. Never give up,” the Trapper says with a grin, as if this were some sort of victory.\n\n\n“I wasn’t giving up. I was saying goodbye early… just in case.”\n\n\n“Well, you shouldn’t have.”\n\n\n“And now I never have to again.”\n\n\nLooking inside the cube, you notice a potion floating around inside its transparent form. That must have been loot from its dinner. Too bad there is no way to get it out without becoming dessert.\n\n\nRecognizing this is a dead end, you decide to go back the way you came. “Come on,” you say.\n\n*choice\n\t#Look around for some clue?\n\t\t*goto treasure_hunting\n\t#Test the area for magic?\n\t\t*goto treasure_hunting\n\t#Check with your god for guidance.\n\t\t*goto treasure_hunting\n\t#Look for tracks?\t\t\n\t\tYou gain +1 SAVE!\n\t\t*set save +1\n\t\t\n\t\t\n\t\t*goto treasure_hunting\n\t#Use your survival skills?\n\t\t*goto treasure_hunting\n\n\n\n*label cubert\nYou enter the room and are faced with a golden translucent cube and a dead end.\n\n\nThe cube slowly goops and slimes its way across the room until it reaches you, then pauses.\n\n\n“Hello. Are you alive?” you reluctantly ask.\n\n\nA couple bubbles form inside it as if it were trying to answer you.\n\n\n“You are alive, aren’t you?”\n\n\nThe cube changes its form to match your shape. This is the strangest thing ever. The details are perfect, even though it is still translucent.\n\n\nYou wave your hand at it, and it mimics your motion exactly.\n\n\n“Friends?” you ask, and extend your hand out to it, and it does the same, nearly touching yours.\n\n\nEven though this cube doesn’t appear to be hostile, you are skeptical of anything that lives inside a cave.\n\n*choice\n\t#Do you shake its hand?\n\t\t*goto hell_o\n\t#Do you leave it hanging?\n\t\t*goto goo_gone\n\n\n*label goo_gone\nThe Trapper runs up and tries to capture the cube creature with a net, but its form consumes the instrument, melting it down to foam.\n\n\n“Don’t touch it!” you instruct.\n\n\n“No kidding,” the Trapper says.\n\n\n“It was merely a suggestion. Why does everything have to turn into a fight with you?”\n\n\n“Whatever.” Then the Trapper’s leg is grabbed by the translucent form.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou start to heal the Trapper before their leg can get digested down to the bone. They are able to break free. The Trapper throws in some meat they had saved to bait a trap, and this seemed to distract the hungry cube enough for you to escape. Lose 1 SAVE.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*set save -1\n\t\t\t\t\t*goto treasure_hunting\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tThe Trapper is consumed by the deadly goo and eaten alive. You leave this room before the cube is ready to feed again. You wanted to heal, but the gruesome sight stole your attention, and you couldn’t turn away no matter how hard you tried. \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto loud_silence\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Heal the Trapper?\n\t\t\t\t\t\t\tYou start to heal the Trapper before their leg can get digested down to the bone. They are able to break free. The Trapper throws in some meat they had saved to bait a trap, and this seemed to distract the hungry cube enough for you to escape. Lose 1 SAVE.\n\t\t\t\t\t\t\t*set save -1\n\t\t\t\t\t\t\t*goto treasure_hunting\n\n\t\t\t\t\t\t#Trapper becomes an ingredient. \n\t\t\t\t\t\t\tThe Trapper is consumed by the deadly goo and eaten alive. You leave this room before the cube is ready to feed again. You wanted to heal, but the gruesome sight stole your attention, and you couldn’t turn away no matter how hard you tried. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto loud_silence\n\n\n\n*label loud_silence\nYou have never been one for violence, and without someone to heal, you’re left alone and without any hope. Getting down on your knees, you pray to all the Gods and Goddesses you know, looking for guidance. Soon you get an answer from a dark book you had planned on burning long ago. It is the book of Angelic Agony. It has been foretold that within its pages are trapped souls that fell from heaven’s grace. The book calls out to you with bitter insults.\n\n\n“No. I shouldn’t…but what other choice do I have?” you say, covering your mouth, knowing the dark book is listening.\n\n\nDo you dare read what’s inside its pages?\n\n*choice\n\t#Do you read the book?\n\t\t*goto red_pages\n\t#Do you leave the book?\n\t\tYou exit the room.\n\t\t\n\t\t\n\t\t*goto where_is_my_mind\n\t#Do you burn the book?\n\t\t*goto black_flames\n\n\n*label red_pages\n*image death.jpg\nReading the horrors that are written inside this necrotic book, your mind is unable to fathom the descriptive agony that is contained within its pages, although you are unable to pry your eyes from its cracked spine. Reaching your limit, you claw out your own eyes to simply make the madness stop. In death, you find relief, though in the afterlife, you have an eternal guilt that stems from your weakness during your time as a living.\n\n\n\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#Start over at “The Beginning” to read a better story.\n\t\t*goto the_beginning\n\n\n*label black_flames\nDenying all urges and curiosity to read the dark book, you light the devilish thing on fire with your cleansing candle. The pages don’t burn. Instead, black smoke smolders and enters your nostrils. Breathing in the dark death makes your eyes turn black and bleed dark stigmatic liquid.\n\n\nYour soul is turned inside out. Every kind thought you had is now rotten as your blood festers from the inside. You have an unholy black power that you use to corrupt every living being that comes in your path. You are now the reincarnated plague queen, and death is your new domain.\n\n\nLiving or dying is no longer a concern of yours. Corrupting others is all you care about. Within a couple days, all of Teepeekay is under your influence, and soon, with a little evility, soon the rest of the world will fall.\n*achieve end32\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n*label hell_o\n*image death.jpg \nThe congealing mass engulfs you. Its acidic nature starts to feed on your body, one layer at a time, like a seven-layer bean dip, starting with your flesh and ending with your bones, with no guacamole to ease your pain. \n\n\nYou know what they say, “You are what you eat.” If you believe in such things, I guess in a small way you are now a mindless gelatinous mass that feeds off of anything it happens to get trapped inside its jiggly form. You spend the rest of eternity without collective or independent thought and know only one feeling…hunger.\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#Please try again back at “The Beginning.”\n\t\t*goto the_beginning\n\n\n\n*label supportive_healing\nYou agree to heal the Support and finish the quest together, on one condition…only that condition hasn’t been determined yet.\n\n\n“What’s the quest anyway?” you ask the Support, who clearly read the fine print.\n\n\n“We are to clear the cultish presence from this wretched place.”\n\n\n“That sounds easy enough.”\n\n\n“You would think so, but we have no way of knowing what kind of cult it is.”\n\n\n“What are you going on about?”\n\n\n“They could be a brainwashing cult, a blood ritual cult, a bunker cult, a sci-fi cult or a sex cult.”\n\n\n“Oh…I never really thought about how many different varieties a cult could have.” Up until now, you saw all cults as equally bad.\n\n\n“No matter. Dead is dead.”\n\n\nEntering the cave, it is too dark to see anything. The Support lights a magically infused sunrod and attaches it to his belt before you could even reach your candle. Observing the newly illuminated surroundings, you notice that on the floor, there seems to be blood splatters around the room. \n\n\n“Maybe blood cult,” you say as a joke, forgetting that something just died.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\t\t\t\t\t\n\t\t\t\t\tThe Support laughs. You gain +1 SAVE!\n\t\t\t\t\t*set save +1\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto supportive_healing2\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto supportive_healing2\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#The Support laughs.\n\t\t\t\t\t\t\t*goto supportive_healing2\n\t\t\t\t\t\t#The Support doesn’t laugh at all. He is much too busy looking for clues to care about your musings.\n\t\t\t\t\t\t\tYou gain +1 SAVE!\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto supportive_healing2\n\n\n*label supportive_healing2\nYou notice a crude staircase leading up to a higher level. Like a cat, you always feel safer taking to the higher ground.\n\n\n“Hey, I think I found something,” the Support says, pointing to a secret tunnel. “I just followed the blood trail.”\n\n\n*choice\n\t#Do you go inside the tunnel?\n\t\tIf you go inside the tunnel, “We can go your way, I suppose,” you say. \n\t\t\n\t\t\n\t\t*goto small_spaces\n\t#Do you go up the stairs?\n\t\t“My one condition is that we don’t go there,” you say.\n\t\t\n\t\t\n\t\t*goto crossroads\n\t#Do you split yourself in two and go up the stairs and in the tunnel?\n\t\tYou can't do that. Come on.\n\t\t\n\t\t\n\t\t*choice\n\t\t\t#Do you go inside the tunnel?\n\t\t\t\tIf you go inside the tunnel, “We can go your way, I suppose,” you say. \n\t\t\t\t\n\t\t\t\t\n\t\t\t\t*goto small_spaces\n\t\t\t#Do you go up the stairs?\n\t\t\t\t“My one condition is that we don’t go there,” you say.\n\t\t\t\t*goto crossroads\n\n\n*label small_spaces\nYou crawl through a tight tunnel that was never meant for someone of your size. Soon you find yourself staring right into a little green butt that is most assuredly blocking the only exit. \n\n\n“There is a creature in my way,” you say.\n\n\n“Make it move. Wait…does it look cultish?”\n\n\n“No, it is more of a monster. A green one.”\n\n\n“Stab it.”\n\n\n“I can’t reach my staff.”\n\n\n“Try talking to it.” You feel a tingling sensation flow through your body. \n\n\n“Now you can speak and understand any language,” the Support says.\n\n\n“Excuse me, can you move?”\n\n\n“Me is dying. Can’t move.”\n\n\n“If you don’t move, I might also die.”\n\n\n“Don’t care.”\n\n*choice\n\t#Offer healing?\n\t\t*goto with_terrorists\n\t#Bite it on the tushy?\n\t\t*goto this_bites\n\n\n*label with_terrorists\n“Look. If you can find enough energy to clear the path, I promise I will heal your wounds when we reach the other side,” you say.\n\n\n“You are lying to me, thinking me a fool.”\n\n\n“It doesn’t matter what I think. This is your only chance of survival.”\n\n\n“I okay with death.”\n\n\n“Move your ass!” Something about the way you say it has struck the fear of god into the green thing, and it scrambled forward.\n\n\nAfter no more than a couple yards, you reach a small room with a trickling fountain.\n\n\nThe little green creature looks as though it was stabbed in its side, and judging by his blood-soaked clothes, he is on death’s door, frantically knocking.\n\n\n“Okay, I move. Now your turn.”\n\n*choice\n\t#Do you heal the guy?\n\t\tYou lose 1 Save.\n\t\t*set save -1\n\t\t\n\t\t\n\t\t*goto allies\n\t#Let him suffer and die?\n\t\t*goto pillow_talk\n\t\n\n*label this_bites\n*image death.jpg\nYou sink your teeth down on the little green butt, and he cuts a loud fart right in your face and down your throat. Unfortunately, your butt bite took away the last of his life, and he dies right then and there. The fart might have been his soul leaving his body. There is a lot about monsters you don’t know.\n\n\nThe smell, however, is so foul, so pungent, that you’d rather hold your breath than breathe any more of that rotten smell.\n\n\nTrapped in a small, confined space, you are hotboxed to death by a noxious gas.\n\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#If death by a fart wasn’t your ideal way to go, please try again at “The Beginning” and avoid spicy foods.\n\t\t*goto the_beginning\n\n\n*label allies\nYou heal the little green man, and his wounds begin to close up and his form actually begins to change until his skin becomes pink.\n\n\nHe is no longer a little green man; he is a beautiful elf macho man. \n\n\n“Hello there,” you say, observing his muscles as they rip through his small clothes.\n\n\n“Thank you so much, my goddess. Let me show you my kingdom.” \n\n\nThe elf man presses a secret button, and the wall opens up, revealing a room with treasure as far as the eye can see.\n\n\n“Marry me, and we can start our life together.”\n\n\nTaken aback by his unprovoked request, you’re at a loss for words.\n\n\n“I…I…”\n\n\n“I’m ordained,” the Support says, entertaining the idea of the union.\n\n*choice\n\t#Do you marry him?\n\t\t*goto matrimony\n\t#Do you reject his love?\n\t\t*goto old_maid\n\t#Do you reject his love but marry him anyway?\n\t\t*goto matrimony\n\n\n*label matrimony\nYou accept his proposal no matter how sudden it is, and the Support gives you both a wonderful service. When it comes time to kiss the bride, he lays one on you so passionate that you become weak in the knees.\n\n\nWhen you open your eyes, you notice that your husband has turned back into a big-nosed little green man.\n\n\n“Hooray, you broke da curse. Me is back to old self.”\n\n\n“This is your normal!?” you ask with a cringe.\n\n\n“Of course, me wifes.”\n\n\nYou look over at the Support, who is wiping tears out of its eyes. \n\n\n\n*if (Save > 0)\n\tThe Support is laughing at your unfortunate expense.\n\t\n\t\n\tYou would never dream of breaking a marriage vow once given, especially in the eyes of God. Instead, you live out your life rich in money, but poor in love.\n\t\n\t*achieve end34\n\t*stat_chart\n\t\ttext Deaths \n\t*goto_scene ending\n*else\n\tThe Support says, “Weddings always make me cry.”\n\t\n\t\n\tYou would never dream of breaking a marriage vow once given, especially in the eyes of God. Instead, you live out your life rich in money, but poor in love.\n\n\t*achieve end35\n\t*stat_chart\n\t\ttext Deaths \n\t*goto_scene ending\n\n\n*label old_maid\n“I am sorry, I cannot marry you for…many reasons.” You only just met the guy and being a trophy wife for a beautiful hunk of elven meat isn’t you’re idea of self. You were married once, and that was a disaster. If he hadn’t broken your trust, you wouldn’t have had him killed. But that is all the past. All you can do is learn from those previous mistakes, and that is what you have done.\n\n\n“Go ahead, take whatever you want from my money pit. My love was the only treasure worth a damn thing,” the elf says, proving to you that you might have really missed out.\n\n\nWith greed in your eyes, you head into the treasure room like a frog in a fly trap.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 3\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto alive\n\t\t*if (dieroll = 2)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto rich\n\t\t*if (dieroll = 3)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto rich_in_death\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Stayin alive?\n\t\t\t\t\t\t\t*goto alive\n\t\t\t\t\t\t#Become rich.\n\t\t\t\t\t\t\t*goto rich\n\t\t\t\t\t\t#Die with all your money.\n\t\t\t\t\t\t\t*goto rich_in_death\n\n\n*label pillow_talk\nThe little green guy spits out some blood, cursing you forever, then he lays down to die.\n\n\n“Well. That was dramatic,” you say to the Support, who looks ill, almost green. “What is wrong with you?”\n\n\nHe looks down at his chest and sees some of the blood that was splattered.\n\n\nRight before your eyes, you watch your companion transform into a frogman half his original size. This causes all his clothes to literally fall off his body. \n\n\nYou avert your eyes. “Oh, no. That curse was supposed to be for me, wasn’t it?” There is a sudden feeling of guilt that comes over you. \n\n\n“Ribbit,” he responds.\n\n\nYou no longer care about any cults, sci-fi or otherwise. Instead, you dare to try and find a book to cure your companion of his transformation.\n\n\nFirst you try the good book, to no avail. Then the Secret book, still nothing. Finally, you gaze upon a dark, dark book you swore to destroy. You debate using it to put the frogman out of his misery, then reconsider.\n\n*choice\n\t#Feeling low?\n\t\t*goto loud_silence\n\t#Feeling great?\n\t\t*goto loud_silence\n\t#Feeling like a pimp?\n\t\t*goto loud_silence\n\n\n*label crossroads\nYou enter this spongy room, and your feet make a croaking sound with each step. Something isn’t right, and you decide to leave as soon as possible. There are two exits to choose from, one to the South and the other to the West.\n\n\n“Based on the blood trail, I think the cultists went to the South,” the Support says with certainty.\n\n\n“We don’t even know whose blood that is. It might just be a menstruating…you know what, never mind.” On the one hand, the Support might be on to something; on the other, you might inadvertently finish your sentence if you keep following the trail.\n\n\n“Maybe we should go West,” you say.\n\n\n“What? Why would you say that? There is a trail of blood to the South. It’s a clue.”\n\n\n“A clue that there is something dangerous.”\n\n\n“Cults are dangerous!”\n\n*choice\n\t#Do you go west?\n\t\t*goto western_path\n\t#Do you go south?\n\t\t*goto southish_path\n\n\n\n*label southish_path\nYou decide to go the southern route, and you find a bunch of books and empty cans scattered about. Upon further inspection, it seems to be all cult-like paraphernalia, but not the sacrificial daggers blood vials that you used to finding.\n\n\nThe Support claps his hands together excitedly. “I knew it! Do I know cults, or do I know cults?” He rushes forward.\n\n\nA thought comes to mind, why does he know so much about cults? You shake off the idea as you get a strange feeling that something might be up.\n\n*choice\n\t#Do you take the lead?\n\t\tYou call out to him, “Wait, what about the blood? The blood trails seem to have gone dry. I think I should take point.”\n\t\t\n\t\t\n\t\t*goto leader\n\t#Do you let the Support lead?\t\t\n\t\tYou say “Yes, I should have never doubted you.”\n\t\t\n\t\t\n\t\t*goto farther_south\n\t\t\n\n*label leader\n*image death.jpg\nYou decide to take charge and empower yourself into a leader role for the first time in your life. In that single moment, you feel powerful and assertive. It is that kind of unstoppable feeling where you take over the world.\n\n\nThen a large spike sticks out of the entryway, skewering you like a Healer kabob.\n\n\nThough your leader role was limited, you did manage to get there. If only your ex could see you now. Well…not exactly now, but before now, before you learned that you’re not unstoppable.\n\n\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#Start over at “The Beginning” to try and get there without dying.\n\t\t*goto the_beginning\n\n\n\n*label farther_south\nBeing a pushover, you let the Support have this one. Unfortunately, the door was trapped, and a big spike stabbed him through. \n\n\nYou begin to heal him, but he was already entering into the afterlife. You pray for a miracle, and when none comes, you start to lose your faith.\n\n\nPushing yourself further, you pull out a dark book you swore to never use. Imbuing its power to your healing staff, you manage to resurrect the Support through black and white energies.\n\n\nBut the dark power of the evil book caused his flesh to rot, and due to his unhinged jaw, his speech is nothing more than a bunch of groans and moans. He looks like a zombie or ghoul. “It’s okay. You’ll be okay.”\n\n\n“Mmmmmaammamamam!” One of his eyes is literally falling off his face. You gently push it back into its socket and place your reading glasses over them. The magnifying effect only makes him even more hideous. You wipe some soot over the lenses before placing them back on him. Now he looks much better, almost cool, really. \n\n\nAvoiding the spike trap, you both enter the next room, which has a large gap with a pitch-black abyss below. \n\n\nEying this obstacle, you realize that the Support has become more like a burden, since you have to direct it around like a drunken pirate. \n\n\nYou look through your belongings and find nothing you can use to get you both safely across. The Support, however, has a large bunch of rope sticking out of his adventuring bag. “This is my one condition…” you say, stealing the rope.\n\n*fake_choice\n\t#Do you take the rope to get across the gap?\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\tYou take the rope and make your way across the gap with ease, leaving the ghoul behind.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto the_deep_south\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\tThe supportive ghoul attacks you and you flee, not wanting to abolish your creation.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto ward\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t#You hit something...\n\t\t\t\t\t\t\t\t\tThe supportive ghoul attacks you and you flee, not wanting to abolish your creation.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*goto ward\n\t\t\t\t\t\t\t\t#You go deeper south.\n\t\t\t\t\t\t\t\t\tYou take the rope and make your way across the gap with ease, leaving the ghoul behind.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*goto the_deep_south\n\t#Do you scale the cliff?\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto loud_silence\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\tYou fall, and a bat catches you midair.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto down_you_go\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Do you like being depressed?\n\t\t\t\t\t\t\t\t\t*goto loud_silence\n\t\t\t\t\t\t\t\t#Do you like bats?\n\t\t\t\t\t\t\t\t\tYou fall, and a bat catches you midair.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*goto down_you_go\n\n\n*label dating_is_hard\nWith your healing staff in one hand and some brass knuckles in the other, you set off to wreak havoc on this ungodly cave. That dreamboat Garvin is not only a man of faith and principle, he is the full package. And that’s exactly what you want in a husband. Unfortunately, sometimes you have to break a few eggs in order to get a perfect omelet. And in this case, all the eggs are faces. \n\n\nYou look around for some unsuspecting abominations, while burning the wax of your special cleansing candle for light. At first you see some green goblinoids.\n\n\n“Boo!” you say, and they scurry off.\n\n\nYou continue deeper down the cave, wanting to pick a fight with anything that eyeballs you funny. After a while, you hear a voice from within the shadows. “Can you spare some rations?”\n\n\nYou point your cleansing candle to uncover an elderly man with a long white beard. He’s wearing rusty armor and appears to be unarmed.\n\n\n“Are you a man of faith?”\n\n\n“If you show me kindness, I might be.”\n\n\nThis seems like a trick of sorts. It isn’t exactly a hard question to answer. He either believes in a higher power, no matter which one, or he doesn’t.\n\n\nYou notice his body is badly scarred, and his eyes are white with blindless.\n\n*choice\n\t#Show him kindness?\n\t\tYou reach into your bag and hand him the last of your rations.\n        \n        \n\t\t*goto helping_hand\n\t#Cleanse him of all his sins?\n\t\tYou reach back with your brass knuckle and say a silent prayer.\n       \n       \n\t\t*goto vile_demon\n\t#Ignore him?\n\t\tYou leave the corridor with the desperate cries of a broken man to your back. You had it in your power to help him, but you didn’t. Selfishness had gotten the better of you. You used to heal others, not turn a cheek away from them.\n\t\t\t\n\t\t\t\n\t\t*goto loud_silence\n\n\n*label helping_hand\nHe takes your food and gobbles it up without taking so much as a breath. By the way he swallows, you wonder how long it has been since he had a bite to eat. \n\n\n“You were hungry, weren’t y…” you start to say, but before you could finish your sentence, the elder jumps on you, and his filthy hands search through your pockets for more grub.\n\n\n“I know you’re hiding something from me. People are always hiding things from me.”\n\n\nYou scream, but no one is around to heed your call.\n\n\n“If you don’t tell me where it is, I might have to dig a little deeper.” The man pulls out a knife.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou manage to push him off of you before he could get anything too valuable. Gain +1 SAVE!\n\t\t\t\t\t*set save +1\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto vile_demon\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tHe robbed you blind—of your staff of healing, your sacred books, everything. Without your cleansing candle, you’re left alone in darkness. \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto the_dark\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#You manage to push him off of you before he could get anything too valuable. \n\t\t\t\t\t\t\tGain +1 SAVE!\n\t\t\t\t\t\t\t*set save +1\n\t\t\t\t\t\t\t*goto vile_demon\n\t\t\t\t\t\t#Decide to leave?\n\t\t\t\t\t\t\tHe robbed you blind—of your staff of healing, your sacred books, everything. Without your cleansing candle, you’re left alone in darkness. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto the_dark\n\n\n*label vile_demon\nYou hold your staff up in the air and cast a spell. A white sphere forms around you like a bubble of protection. \n\n\n“Give me your loot.” The elder bandit claws and bangs against your magical shield, mystified by its effect.\n\n\nYou walk forward, using the sphere to push the old bandit backwards. “You cannot break through my spell. So, I must break you in return.” You keep pushing forward, ramming him backwards.\n\n\nThe bandit hisses at you, more like a beast than a human.\n\n\nDriving him toward a steep cliff, you give him one final chance. “Denounce evil and pledge yourself to good, and you shall be spared.”\n\n\nEven though he has no pupils, his expression is terrified. “Where am I? Who are you?” There is a sudden burst of humanity left inside him.\n\n\nYour magical bubble starts to flicker, and you shove him off the edge before its power is all but lost. “That wasn’t what I asked.”\n\n\nHe didn’t scream or shout. All you hear is a sly snicker followed by a loud thud. He is gone. You know this for certain because your protection spell has ended.\n\n\nThis must have been the evil you were sent here to abolish. You feel righteous in your decision, but buried deep inside you is a pang of remorse.\n\n\nPondering your position, your options are either go back to Teepeekay and try to turn in this quest or continue on through the cave to make sure there is no evil left inside. “What would Pope Garvin do?” You say aloud.\n\n*choice\n\t#Go back to town?\n\t\t*goto a_job_well_done\n\t#Continue on inside the cave?\n\t\tLooting the bandit’s trash-filled shelter, you find a letter that he must have stolen from someone. It says, “My dearest king, my strength is fading. Please find my true heir and deliver her this crown. I can only trust you to this task, and I’m sure you know precisely why. Once complete, I release you from my royal service. xoxo -Bae“ \n\t\t\n\t\t\n\t\t*goto hunting_evil\n\n\n*label a_job_well_done\nYou backtrack your steps and find the entrance to the cave without too much trouble. Outside you’re met by none other than the hunky Garvin himself.\n\n\n“That was quick,” he said, with a flirtatious grin.\n\n\n“What can I say. I’m the total package.”\n\n\n“I have to admit, I’m impressed. Good job destroying the space cult.”\n\n\n“Space cult?”\n\n\n“Yes, that’s why I sent you in there.”\n\n\n“Heavens, no. I destroyed an evil bandit.”\n\n\n“Bandit? I have no record of a bandit.” He opens up a ledger and flips through it.\n\n\n“Are you sure? He had a long white beard and tarnished armor,” you say.\n\n\nHe then turns white as a ghost.\n\n\n“What’s wrong, hon?” you ask, fearing you’ve done something dreadfully wrong.\n\n\n“That wasn’t a bandit. It was my uncle. He has dementia and went missing a while ago.”\n\n\n“I feel sick.” You can’t bear to unwrap what you did. So you run away. Being so preoccupied, you didn’t notice that while talking to Garvin, your protective spell had returned.\n*achieve end36\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label hunting_evil\nKnowing you’re finally on the right path, your long quest is nearly complete. You continue down the path until you come across a dancing automaton. While its movements are fresh, you don’t hear any music. It must be evil spirits inside its soulless mind. This is the work of the devil’s playground, and it must be stopped at all costs, or so you believe.\n\n\nBefore you can do a thing, you’re punched in the gut and fall to the floor. This is a devastating blow, though deep down you know it wasn’t at all intentional but just one of its flailing dance moves.\n\n\nOnce able, you rise to your feet and slowly wipe some blood off your chin.\n\n*fake_choice\n\t#Attack.\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto dance_off\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto bone_breakdance\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t#Have a dance off?\n\t\t\t\t\t\t\t\t\t*goto dance_off\n\t\t\t\t\t\t\t\t#Do a bone, breakdance?\n\t\t\t\t\t\t\t\t\t*goto bone_breakdance\n\t#Heal.\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto health_good\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto health_bad\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Are you in good health?\n\t\t\t\t\t\t\t\t\t*goto health_good\n\t\t\t\t\t\t\t\t#Are you in bad health?\n\t\t\t\t\t\t\t\t\t*goto health_bad\n\t\t\t\t\t\t\t\t\n\n*label dance_off\nYou spin and twirl around, counterbalancing his moves for some of your own. To the unsuspecting eye, it would appear that you both have spent many hours practicing this whole routine. But little would they know that the automaton’s eyes are closed, and you’re just a superb follower.\n\n\nBack and forth and side to side, you keep the rhythm that’s inside the construct’s head. \n\n\nYou haven’t danced like this since your wedding. That day felt like a hundred years ago. How naive you once were to think that love was all you needed.\n\n\nSince then you’ve learned that you cannot fully trust anyone other than your faith. It’s all you can control and truly rely on.\n\n\nImpressed with yourself, you forgot how good you actually are at shaking it, and a slight smile creeps onto your lips.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto moonwalker\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto killer_dance_move\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Do the moonwalk?\n\t\t\t\t\t\t\t*goto moonwalker\n\t\t\t\t\t\t#Do a killer dance move?\n\t\t\t\t\t\t\t*goto killer_dance_move\n\n\n*label bone_breakdance\nYou go in to brass-knuckle punch the robot into scrap metal when it spins around and smacks you in the nose with its flying elbow.\n\n\nBlood pours out of your nostrils. “You broke my nose. No one wants to marry a girl with a witch nose!” you say in a nasal voice, while pinching your nostrils closed.\n\n\nThe robot ignores you and continues throwing its limbs as though it’s punching and kicking an imaginary halfling.\n\n\nYou’ve sacrificed so much of yourself in order to gain back your beauty only to have it taken away by an accidental swing.\n\n\n“Once you find the crown, vanity won’t matter, nor will age or wealth,” you remind yourself through gritted teeth. “Keep your eye on the prize one room at a time.”\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou decide to beat this soulless thing at its own game.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto dance_off\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou attempt to heal yourself above all else.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto health_bad\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#You attempt to heal yourself above all else.\n\t\t\t\t\t\t\t*goto health_bad\n\t\t\t\t\t\t#You decide to beat this soulless thing at its own game.\n\t\t\t\t\t\t\t*goto dance_off\n\n\n\n*label health_good\nYou manage to restore your life, but not before the automaton does the splits and nearly kicks you in the nether region.\n\n\n“That was a close one, almost got me in the baby door.” Not that you’re even capable of having children, though it would have hurt like a B.\n\n\nYou back the hell up and try to come up with a better plan of action. “If you can’t beat ‘em, join ‘em.”\n\n\nClosely watching the construct’s moves, you try and find a good opportunity to jump in.\n\n\nDancing is like prayer; it’s not important what you say or do. It’s all in the feeling and intention behind your efforts that make all the difference.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou gain +1 SAVE!\n\t\t\t\t\t*set save +1\n\t\t\t\t\t*goto dance_off\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto bone_breakdance\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Break some bones?\n\t\t\t\t\t\t\t*goto bone_breakdance\n\t\t\t\t\t\t#Have a dance off?\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou gain +1 SAVE!\n\t\t\t\t\t\t\t*set save +1\n\t\t\t\t\t\t\t*goto dance_off\n\n\n*label health_bad\nYou attempt to heal yourself but fail utterly because you were so distracted by the robot creature doing the robot dance move. It was a sight to behold, one which you wish you had someone in your life to share it with, someone who values you over their work or quest.\n\n\nSuddenly you are reminded of the person who let you down the most. More specifically, one day he came to you with an injured child, begging for assistance. Over and over you asked, “Where did you get this child?” but he wouldn’t answer you. Being a good person and a woman of faith, you healed the little girl of her ailments, but doing so left you with a scar on your heart that would never heal. For you knew the answer to your own question…it was his child, from another woman.\n\n\nThe next day, you left for the church to be absolved of your sins…\n\n\nYou lose 1 SAVE.\n*set save -1\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto dance_off\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto bone_breakdance\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Show off your skills?\n\t\t\t\t\t\t\t*goto dance_off\n\t\t\t\t\t\t#Show off your guns?\n\t\t\t\t\t\t\t*goto bone_breakdance\n\n\n*label moonwalker\nYou start to do a dance-off with the automaton, and it opens its mechanical eyes wide. At first, they go red, but after watching you move, they shift to a cool blue color. Together you keep the beat that’s in its head, and you swear if it was able to, it would be smiling.\n\n\nTogether you dance the rest of the night away while laughing and having a grand old time. At one point during the night, a cultist tries to cut in, and the construct rips his arms off, and you both laugh and laugh. \n\n\nBefore dawn, you make it back to the automaton’s place in the west side of the cave. There you sleep on its couch and dream of partying like this every night of the week, not just on the weekend. And you do just that. In fact, you never grow old and never feel a bit of sadness. Only party and dance, which leaves you in the best shape of your life…that never seems to end.\n*achieve end37\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label killer_dance_move\n*image death.jpg\nYou find an opening in the choreography to strike, and strike you do, knocking the automaton off his groove. The soulless entity stares at you with vacant red eyes. You get the feeling that this was the first instance that it was aware of your presence.\nThe construct starts to shake and smoke.\n\n\nThen it explodes into pieces, sending shrapnel throughout the room, and in turn, into you as well.\n\n\nYou reach for your staff of healing, but both your arms are blown clean off. One thing is for certain—that murder bot is just as good at killing as it is at dancing.\n\n\nYou are dead.\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#You got this. I believe in you.\n\t\t*goto the_beginning\n\n\n*label ready_to_plunder\nYou enter the cave, and something seems to be off. There is an unspoken tension about, but you can’t seem to place it. Even the small lizards and other critters seems to be on edge. \n\n\nThen echoing through the halls, you hear a series of screams. \n\n\nBefore you could even decide what to do, the Trapper and Support both run towards the sound.\n\n\n“Don’t you know danger is that way?” you call out, but they are already gone. “Typical.”\n\n\nYou start to wonder if you should continue on this little quest or perhaps follow your real, hidden purpose for coming to this region. \n\n*choice\n\t#Do you follow them?\n\t\tYou call out “Wait up.”\n\t\t\n\t\t\n\t\t*goto crazy_sounds\n\t#Go your own way?\n\t\tYou decide to take matters into your own hands and gain all the glory for yourself.\n\t\t\n\t\t\n\t\t*goto dating_is_hard\n\n\n\n*label crazy_sounds\nYou rush into the next room, and the Support and Trapper are already fighting what looks to be a giant…well…giant. \n\n\nThe Support uses some ability that makes you glow, and when you start to heal the Trapper, everyone, including yourself, is healed in the process. That is what you call some real supportive skill they got there.\n\n\nThe enormous being is wearing nothing but a loin cloth, but what he lacks in clothing, he more than makes up for in brute strength.\n\n\nWhile your healing is rather ramped up, the goliath seems to be out damaging your healing prowess.\n\n\nThe dire situation prompts the Trapper to throw some of its traps at the beast, trying to utilize them as improvised weapons. They are much too small to disable a creature of its magnitude, but they do manage to chip away at his health some.\n\n\nDue to the large attack range, each one of the giant’s attacks seems to hit everyone in the room, except for the Support that seems to be magically dodging every single one for some reason. Attacking at his heels, you are but insects against a rat. \n\n\nThe titan of a foe rears back and does a devastating blow, one that might just do it for your party…\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tThe giant crushes the Support with its fist.\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#Do you fight it?\t\t\t\t\t\t\t \n\t\t\t\t\t\t\tYou yell “I’ll avenge your memory!”\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto pain_in_the_a\n\t\t\t\t\t\t#Do you flee?\t\t\t\t\t\t\t \n\t\t\t\t\t\t\tYou say “Better come and get it,” you say, grabbing one of the Trapper’s traps.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t“Hey, you better give that back,” they threaten. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto treasure_hunting\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tThe giant grabs the Trapper and chews them up for a midafternoon snack.\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#Do you fight it?\n\t\t\t\t\t\t\t“For the queen!” you yell, and rush in without reservations.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto giant_pain\n\t\t\t\t\t\t#Do you flee?\n\t\t\t\t\t\t\t“Honor is overrated,” you say, grabbing the Support on your way out the room.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto supportive_healing\n\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#The giant crushes the Support with its fist.\n\t\t\t\t\t\t\tYou yell “I’ll avenge your memory!”\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto pain_in_the_a\n\t\t\t\t\t\t#Taunt?\n\t\t\t\t\t\t\tYou say “Better come and get it,” you say, grabbing one of the Trapper’s traps.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t“Hey, you better give that back,” they threaten.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto treasure_hunting\n\t\t\t\t\t\t#The giant grabs the Trapper and chews them up for a midafternoon snack.\n\t\t\t\t\t\t\t“For the queen!” you yell, and rush in without reservations.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto giant_pain\n\t\t\t\t\t\t#Run\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t“Honor is overrated,” you say, grabbing the Support on your way out the room.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto supportive_healing\n\n\n\n*label giant_pain\nWith the giant momentarily preoccupied with murdering the Trapper, you come up with a new plan. “If you are able to dodge its attacks, why don’t you try and kite it around, and I will act as the DPS?”\n\n\n“Role changing? I like it.” \n\n\nLetting out a thunderous burp, the giant spits out your companion’s bones in a pile next to you.\n\n\n“Here we go!” the Support says, throwing its surplus of potions and tinctures at the giant to get its attention. You pick up the Trapper’s axe and charge in, relentlessly hacking at its heel.\n\n\nSoon the beast lets out a mighty roar that matches its burp before falling down like a hundred-year-old tree.\n\n\nYour life flashes before your eyes, and you realize that while you’ve been so obsessed with finding out who you are, that you never thought to ask yourself about who you want to be. Life is too short to hold on to grudges, and you might have just run out of yours.\n\n*if (Save > 0)\n\tYou use a SAVE and dodge the falling giant.\n\t*set save -1\n\t\n\t\n\t*goto aftermath\n*else\n\t*goto pancakes\n\n\n*label pain_in_the_a\nSeeing the giant creature pound on the Support, you use this opportunity to stab the towering giant right in his huge butt.\n\n\nEven though your staff is more used for healing, it causes the thing quite a lot of discomfort and the looming foe begins to rampage around.\n\n\nStalactites, rocks and other falling rubble crash down all around you. One particularly large one goes right through the giant’s neck, killing it outright. \n\n\nThe Trapper has already assembled a quick cage for you both to use as shelter. \n\n\nBlood rains down from his wound like a tropical storm.\n\n*if (Save > 0)\n\t*set save -1\n\tYou manage to get into the cage in time to avoid the blood and falling stones. \n\t\n\t\n\t*goto aftermath\n*else\n\tThe cage is covered in rubble. You try and unearth your companion, but most of the stones are too big for you to lift by yourself. “They escaped out of the side,” you reason, giving up on your task. You decide to look for them rather than continue with this orphan-making work. \n\t*goto hey_you_guys\n\n\n*label aftermath\nAfter killing the giant, you begin to loot its enormous body, though all it had on it was a giant’s loincloth you don’t dare lift up.\n\n\n“This can’t be it. He has to have something epic,” you say, starting your second round of searching, this time leaving no nook or cranny unchecked. While digging deep into its toe jam, you find a piece of paper, a scroll, really. You read the words aloud, and a spell is being cast…a resurrection spell. Before you know it, your friend has been restored to life. And your party is whole again. You, the Trapper, and the Support.\n\n\nTogether you all decide to chop up the giant for its meat and turn its hair into rope. Forget trying to finish the quest. This kill alone proves to give you enough profit to fund whatever escapades you have in the future.\n\n\nWho did you save?\n\n*choice\n\t#The Trapper?\n\t\t*goto trapped_my_heart\n\t#The Support?\n\t\t*goto support_each_other\n\n\n*label trapped_my_heart\nWhen you saved the Trapper, something changed in the way they look at you. You know this because it happened to you as well. No longer did you simply see them as a party member or a friend. Your feelings went much deeper than that. \n\n\nAfter you sold the giant’s teeth to a piano maker, you both decide to move in together at a lake-side domicile outside of town.\n\n\nThis was never the ending you thought you would have or ever need, but it was exactly both those things and more. The Trapper has ensnared you in a love trap, and you decided to give up on your faith and pursue a quest of love instead.\n\n\nYou live out your days in happiness, though once you reach the afterlife, you’re denied entry to your place of preference due to living in sin.\n\n\nDecide if happiness of the living is worth an eternity of sadness.\n\n*choice\n\t#It is.\n\t\tCool.\n\t\t\n\t\t*achieve end38\n\t\t*stat_chart\n\t\t\ttext Deaths \n\t\t*goto_scene ending\n\t#It is not.\n\t\tBummer.\n\t\t*achieve end39\n\t\t*stat_chart\n\t\t\ttext Deaths \n\t\t*goto_scene ending\n\n\n*label support_each_other\nAfter saving the Support, you noticed a connect that wasn’t there before…a spark. Every time he is close to you, he inadvertently steals your breath away. Which makes you feel quite silly. The Trapper notices it too, and they keep their distance, not being into anything remotely like flirting. \n\n\n“I would like to spend time with you after we’re done,” the Support says, matter of factly.\n\n\n“What do you mean?”\n\n\n“I want to support you…in a more intimate way.”\n\n\nTaken aback by his bluntness, you hesitate to answer.\n\n\n“You don’t have to say yes or no. Just send me away if you get bored with me.”\n\n\nThat is something you can agree to. \n\n\nYears go by, and you still don’t get bored with him and the love he gives you. Even after four kids, you never send him away. Although you two were never married in the eyes of the gods, you found something much more fulfilling—a supportive partner. \n*achieve end40\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label two_gals\nYou enter the cave and feel butterflies inside your stomach, and you’re not really sure why. Maybe it’s because you are a little intimidated by your companion, or perhaps you feel the presence of your current god watching over you.\n\n\nWhatever the reason, you try and force it out of your head. \n\n\nThe DPS lights a torch and slaughters a bunch of little creatures in the first room. \n\n\nYou start to cast a healing spell through your staff, but she already leaves via a secret staircase that she knew was there.\n\n\n“I guess you don’t need me, then?” you say aloud, hoping she hears you due to the echo, although you think she is too self-centered to even care if she had.\n\n\nWhat you wanted was a co-op situation, not to be left behind by a bull-headed woman.\n\n\n“They always leave in the end,” you say with a sigh.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto wait_up\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto dark_path_1\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Wait.\n\t\t\t\t\t\t\t*goto wait_up\n\t\t\t\t\t\t#Get all goth.\n\t\t\t\t\t\t\t*goto dark_path_1\n\n\n*label wait_up\nYou carefully walk up the secret stairs to find that the DPS has already slaughtered a horse-like beast and was about to stab something in the air when you call out to her, “Stand still if you want me to heal you.”\n\n\n“What?” she says, distracted by your words. Then a bat swoops down, and she jams her sword right into its mouth.\n\n\nYou cast your healing spell, and holy light flies out of your staff and closes up her wounds instantly. \n\n\n“Why did you distract me?” the DPS scolds.\n\n\n“I wasn’t trying to; I was trying to help.”\n\n\n“Well, next time, don’t bother.”\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou ignore her instructions and heal her up as she beats the beast with her bare fists.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto teamwork\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYour healing misses, and you heal the giant bat instead. Then the bat picks up the DPS and takes her away into the darkness. You are now alone.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto loud_silence\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#You ignore her instructions and heal her up as she beats the beast with her bare fists.\n\t\t\t\t\t\t\t*goto teamwork\n\t\t\t\t\t\t#Your healing misses, and you heal the giant bat instead. Then the bat picks up the DPS and takes her away into the darkness. You are now alone.\n\t\t\t\t\t\t\t*goto loud_silence\n\n\n*label teamwork\nFinally, the DPS sees your value, and together you become a force to be reckoned with. Your healing matched with her damage output makes you an almost unstoppable team. Together you managed to kill a wizard, cultist, dancing robot, until you met your match…a squidman. \n\n\nEach kill thus far has dropped a book or scroll that you were chomping at the bit to be able to delve into reading. You wondered what kind of strange scriptures the squid creature might have on its summer reading list. \n\n\nThe DPS keeps missing all of her attacks. It is as if the creature could read her thoughts, anticipating all of her attacks. Then he bites on to her head, trying to taste her thoughts.\n\n\nYou have to get angry. You think about your ex, and how he abandoned you for his duty. You will never be abandoned again.\n\n*choice\n\t#Do you heal her?\n\t\t*goto super_heal\n\t#Do you attack?\n\t\t*goto take_this\n\n\n*label super_heal\nYou heal the DPS, and the squidman continues to gorge on her brains. This forces you into an endless loop of healing, and him an endless loop of eating. \n\n\nSoon his stomach bursts from the inside, killing him outright. But while you were able to heal the DPS’s damaged brain, her mind is nothing more than a vegetable. You spend the rest of your life being her caregiver, cleaning up her bedpan and making her food. \n\n\nShe is lucky to have you as a friend, although she doesn’t know it.\n\n\nAnd you are lucky to have her, though you don’t know it, either…\n*achieve end41\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label take_this\nYou smack the squidman in the face, knocking him off the DPS. Her head is wet with blood from where his slurping mouth was attached.\n\n\nYou swing your staff of healing back and forth, keeping the squidman at bay. \n\n\n“Save yourself. I’m done for,” the DPS says.\n\n\n“No. We’re a team.” You keep at it, swiping at the squidman as if your life depended on it, because it did.\n\n\nSoon he grows tired of this game and flees down a corridor, looking for easier pickings. \n\n\nBefore you can cast a healing spell, the DPS bleeds out and dies in front of you. \n\n\nYou bury her there and say a couple nice words as a sendoff. It is a nice service, not your best, but pretty good, nevertheless. \n\n*if (Save > 0)\n\t*set save -1 \n\t*goto rewind\n*else\n\t*choice\n\t\t#Do you follow the squidman?\n\t\t\t*goto leader\n\t\t#Do you leave the area?\n\t\t\t*goto hunting_evil\n\n\n*label rewind\nYou pull out a magical scripture from some ancient writing from the disciple of time. You chant loudly until everything that has happened will happen again but in reverse. With all this knowledge of the future fresh in your mind, you decide to do something quite different this time around. \n\n\nYou aim to go all the way back to the moment you asked your uncle to murder your ex. That was one of the biggest regrets you ever had to live, one that pushed you closer to God.\n\n\nThen you realize that without putting on the hit, you would never have gone to the church. Changing one act would undoubtably change your whole life. You decide to not venture back that far, only far enough to undo your recent regrets.\n\n\nWith only one chance at a redo, you say goodbye to your current adventure and hello to something new.\n\n*if (Save > 0)\n\t*set save +1\n\tYou gain +1 SAVE!\n\t\n\t\n\t*goto page_68\n*else\n\t*goto page_68\n\n\n*label dark_path_1\nYou go up to find the DPS ripping out the heart of a fallen foe and eating it while it still beats.\n\n\n“That is disturbing…” you say, choking on your own vomit.\n\n\n“It gives me power and protein. Want to try some?”\n\n\n“No thank you.”\n\n\n“You really need to lighten up and not be afraid to get your white little robes dirty.\n\n\n“It’s not that I’m afraid of getting dirty in this life, but rather getting punished in the one after.”\n\n\n“Oh, you’re a religious freak, aren’t you?”\n\n*choice\n\t#Do you lie?\n\t\tYou say, “No, I just want to cover all my bases, just in case.”\n\t\t\n\t\t\n\t\t*goto mortality\n\t#Do you tell the truth?\n\t\tYou say “I am, and it’s very important to me. This life is but a hundred years or so, the next one is forever. It’s simple math, really.”\n\t\t\n\t\t\n\t\t*goto dark_path_2\n\n\n*label mortality\nYou continue in a passive role of healing the DPS and entertaining her evil acts of brutality. After completing the quest, you receive your reward to go back to the church, but they know what you did—you lied about your faith. \n\n\nYou’re no longer welcomed by your faith. You die under suspicious conditions involving a rope and chair. Once in the afterlife, you explain why you sided with the DPS, but you’re denied entry to the heavenly place of choice and are forced to spend eternity in a place of lava and suffering. \n\n\nAs you await your manticore transport to your eternity below, you remember a special book you still had in your ghost inventory.\n\n*if (Save > 0)\n\t*set save -1\n\t*goto rewind\n*else\n\tIf not, you spend eternity in hell and it ain’t no handbasket. \n\t*achieve end42\n\t*stat_chart\n\t\ttext Deaths \n\t*goto_scene ending\n\n\n*label dark_path_2\n“I believe in an afterlife, and that life is much more important than this little test we’re on right now. “\n\n\n“I agree. But I follow a dark path, one that will take you to a place of indulgence,” the DPS says. \n\n\n“I know what you speak off…darkness. It pulls at me constantly,” you say with a frown.\n\n\n“Does the light pull at you the same way?”\n\n\n“Sadly, no. It’s blind faith that keeps me going.”\n\n\n“Open your eyes. Give into the darkness and truly see for the first time. Don’t let the light deny you from your true potential.”\n\n\n“No, I can’t. I need a sign or something to give me direction.” \n\n\n“This is your sign.” The DPS declares and slits her own throat, dying instantly.\n\n*choice\n\t#Do you give into the dark?\n\t\t*goto dark_path_3\n\t#Do you give into the light?\n\t\tYou leave her blood-soaked body there.\n\t\t\n\t\t\n\t\t*goto loud_silence\n\n\n*label dark_path_3\n“No. I can’t be alone. I don’t trust myself.” You cradle the DPS’s bloody body and draw a star shape for you both.\n\n\nActivating your hidden dark power that you had trapped within the pages of your old journal, tears begin to bleed out of you, and the DPS is absorbed into your body.\n\n\nFour black feathered wings sprout out of your back, and you grow twice as big. Both your thoughts and conscience are one, and you aim to destroy more than just this cave. \n\n\nWith each life you take, your power grows exponentially until you possess a strength matched only by a god.\n\n\nNow you’re ready to conquer the kingdom of heaven that once cast you out, only this time you will return with the DPS’s desire for punishment.\n*achieve end43\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label its_killing_time\nEntering the cave, a score of creatures flees at the sight of you as if they’ve heard all the rumors of your past exploits.\n\n\n“That was easy enough,” you say, giving yourself a wink.\n\n\nThe next chamber, you find a sleeping snake-haired woman. “Yuck,” you say, sticking out your tongue at the sight of the snake hair. On the one hand, you would rather not get close enough to murder her/them; on the other, murdering her would rid the world of more snake people, which are really becoming a nuisance lately.\n\n*choice\n\t#Do you move on?\t\t\n\t\tShe wakes up and attacks you with a hiss.\n\t\t\n\t\t\n\t\tYou lose 1 SAVE.\n\t\t*set save -1\n\t\t\n\t\t*goto i_hate_snakes\n\t#Do you attack her?\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\tYou slice her throat without any incident.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou gain +1 SAVE!\n\t\t\t\t\t\t\t*set save +1\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto friend_or_foe\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto i_hate_snakes\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Don't kill her?\n\t\t\t\t\t\t\t\t\tShe wakes up and attacks you with a hiss.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou lose 1 SAVE.\n\t\t\t\t\t\t\t\t\t*set save -1\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*goto i_hate_snakes\n\t\t\t\t\t\t\t\t#Kill her?\n\t\t\t\t\t\t\t\t\tYou slice her throat without any incident.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou gain +1 SAVE!\n\t\t\t\t\t\t\t\t\t*set save +1\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*goto friend_or_foe\n\t\t\n\n*label friend_or_foe\nUpon entering the next room, you notice an old man who appears to be lost or delusional or possibly both. \n\n\n“You a friendly?” you ask, brandishing your sword.\n\n\nThe man looks up at you inquisitively. “I think so. I mean…I hope so.”\n\n\n“That’s reassuring.” You roll your eyes. “How long have you been down here, old-timer?”\n\n\n“I don’t recall.”\n\n\n“Have you seen any dinosaurs? Besides yourself.” You let out a chuckle. \n\n\n“I doubt I would even recognize myself anymore.” The man says, pulling on his white facial hair. The old man doesn’t seem to get your joke. Maybe he’s so old that humor wasn’t invented in his day.\n\n\nWhile his age is a real problem, you gather that he’s harmless.\n\n*choice\n\t#Do you take him along with you?\n\t\t*goto a_mighty_pair\n\t#Do you leave him to die?\n\t\t*goto solo_run\n\n\n*label solo_run\nBeing an orphan, you’re always more comfortable doing things on your own. People just get in the way and make you wait. \n\n\nGoing through these dark passages alone, your torch seems to scare the meekest monsters of your presence and challenge the more dangerous ones, which is exactly how you like it—no use dulling your sword on anything less. However, getting ambushed by a monster isn’t what you were banking on, but that’s exactly what happens next.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tA spark of brilliant light starts to grow and swirl until it looks suspiciously like a portal. You debate throwing all caution to the wind and jumping into this mysterious rift in space, but before you can do just that, a large creature emerges from the other side. The portal closes behind it.\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto beautiful_eyes\n\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tSuddenly portcullises fall down and block the exits in the room. You try and attack them, but sparks fly off the clashing metal. You are trapped and unprepared for what comes next.\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto snake_food\n\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#A spark of brilliant light starts to grow and swirl until it looks suspiciously like a portal. You debate throwing all caution to the wind and jumping into this mysterious rift in space, but before you can do just that, a large creature emerges from the other side. The portal closes behind it.\n\t\t\t\t\t\t\t*goto beautiful_eyes\n\t\t\t\t\t\t#Suddenly portcullises fall down and block the exits in the room. You try and attack them, but sparks fly off the clashing metal. You are trapped and unprepared for what comes next.\n\t\t\t\t\t\t\t*goto snake_food\n\n\n*label snake_food\n*image death.jpg\nOut of an illusionary wall emerges a six-headed snake beast roughly the size of a giant. There is nothing you hate more than snakes, and bigger ones are even worse. You swing your blade back and forth to keep it at bay. The scaly thing is giving you the heebiejeebies. With no one to impress or look brave in front of, you turn tail and try to find a secret escape path, but you get swallowed up in one gulp.\n\n\nInside the snake’s belly, you decide to try to cut your way out of it, but the buckets of stomach acid have a different plan for you as they digest you over the next week. \n\n\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#Go back to “The Beginning” and try again.\n\t\t*goto the_beginning\n\n\n*label i_hate_snakes\nThe scaly snake woman doesn’t frighten you in the least, but her snapping snake hair sure does. They are such smooth and slimy strands. Yuck. \n\n\nYou pull back your sword to decapitate them all, but each snake grows in length and snaps at you from different directions.\n\n\nThe snake woman glides closer to you, as if she were walking on air. “What’sss the matter, scared of a little hiss?”\n\n\n“Get back, witch. I’ll end you if I have to.”\n\n\n“I was once-sss like you. Young, arrogant, pretty. Now I am much more…hardened.”\n\n\n“I don’t need your whole backstory. I need you to back the hell up.” You poke and prod your weapon at her.\n\n\n“But my babiesss are hungry. Give us a bite.”\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou don’t want to get close enough to stab the thing, so instead you douse her with oil and toss your torch, lighting her ablaze.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto in_the_dark\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou look at her closely. Something is familiar.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto stone_cold\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#You don’t want to get close enough to stab the thing, so instead you douse her with oil and toss your torch, lighting her ablaze.\n\t\t\t\t\t\t\t*goto in_the_dark\n\t\t\t\t\t\t#You look at her closely. Something is familiar.\n\t\t\t\t\t\t\t*goto stone_cold\n\n\n*label in_the_dark\nAfter burning the snake woman alive, you’re forced to survive on instincts alone to complete your mission. Being an elf, you’re able to see in the dark and use stealth to your advantage. This might be a blessing in disguise because now you’re able to determine which monsters you want to fight and which ones you would rather avoid.\n\n\nAfter an hour or so, you find an empty room with a pile of bones in the center. There must be four or five bodies piled up in the aboveground grave. You survey the area for any signs of what might have done such a thing. \n\n\nNext to the pile is a small vial. Written on the label is “Sardine Oil” in elvish. This must be a fallen brother. You say a family blessing to the old tree roots and continue through a series of secret tunnels until you face a foe worth your efforts.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto big_fella\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto beautiful_eyes\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Find something big?\n\t\t\t\t\t\t\t*goto big_fella\n\t\t\t\t\t\t#Find something beautiful?\n\t\t\t\t\t\t\t*goto beautiful_eyes\n\n\n*label big_fella\nYou find yourself face to face with the flying magical dinosaur while it takes a huge not-so-magical dump. At first you look away, but curiosity gets the better of you, and you sneak a peek. Out of its backside is nothing like what you expected…instead, it’s a hot steamy pile of coins and jewels. Then you search around and realize that you’re standing in its lair, money pit, but more appropriately…its litter box. \n\n\nThe dino lets out a mighty roar, and you give it a roar of your own. This is a formidable foe, and you need to be on your best game in order to defeat the mythical thing. While you may come across as hot-headed and spontaneous, each battle is carefully thought out and well crafted.\n\n\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 3\n\t\t*if (dieroll = 1)\n\t\t\t\t\t*goto pancakes\n\t\t*if (dieroll = 2)\n\t\t\t\t\t*goto dino_fight\n\t\t*if (dieroll = 3)\n\t\t\t\t\t*goto the_next_round\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Get squished?\n\t\t\t\t\t\t\t*goto pancakes\n\t\t\t\t\t\t#Fight like a gorilla?\n\t\t\t\t\t\t\t*goto dino_fight\n\t\t\t\t\t\t#Fight like a champ?\n\t\t\t\t\t\t\t*goto the_next_round\n\n\n*label the_next_round\nThe dinosaur comes at you with a snapping jaw and a hunger in its eyes.\n\n\nDodging to the side, you find your mark—a large armored scale on its underbelly. You pull out a pry tool you fashioned in case of such an occasion. Once you used the tool to best a giant armored insect by prying open part of its exoskeleton. Today it’s going to be used in order to make a creature go extinct.\n\n\nYou evade a mighty claw attack and a flattening foot stomp. \n\n\nWhile keeping your distance, it attacks you with a couple magical attacks you weren’t expecting—first a death ray surging out of its eyes, followed by an electric bolt.\n\n\nFinally circling around, you have a perfect opening to punish the spot you de-scaled, and punish you do. Over and over again, you stab, slice, and twice your large blade jabs deep into its unprotected tissue. \n\n\nThe creature is in so much pain that it seems to be barfing up fire and smoldering smoke.\n\n\nYou reach back for a final blow, and it bites down on you right as you thrust into it. \n\n\nIts jagged teeth easily sink into your soft flesh.\n\n\nMoments drift into an hour, and soon you have enough energy to dislodge yourself from its death chomp. As luck would have it, its teeth helped your internal bleeding to clot. You stumble your way out of the cave without taking a single piece of its golden shit, just a huge
