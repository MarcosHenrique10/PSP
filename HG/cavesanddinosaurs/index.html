<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Caves and Dinosaurs — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "cavesanddinosaurs", "title": "Caves and Dinosaurs", "scenes": {"choicescript_description": "In this game, you will play as one of five unique player characters, roll dice, and choose paths that lead to over 70 different endings, all while avoiding the 50+ interesting ways to die! Each path will give you a piece of an even deeper storyline. So, doing multiple playthroughs is a must! \n\nThis game is based on the TPK boardgame KILL ALL PLAYERS. In K.A.P. you (as a DM) are competing against other DM players in order to see who can kill their party first. You can set traps, buff skill tests, curse items, and spawn some over-powered monsters. \n\nUnlike the KILL ALL PLAYERS boardgame, the Caves & Dinosaurs story takes place from the perspective of the players who don't know they're actually inside a game. \n\nIf you like D&D or LitRPG, you will love this interactive experience.", "choicescript_stats": "*if (character = \"Healer\")\n\t*image healer.jpeg\n*if (character = \"Tank\")\n\t*image tank.jpeg\n*if (character = \"DPS\")\n\t*image dps.jpeg\n*if (character = \"Support\")\n\t*image support.jpeg\n*if (character = \"Trapper\")\n\t*image trapper.jpeg\n*if (character = \"Ganker\")\n\t*image ganker.jpeg\n*stat_chart\n\ttext Deaths \n\ttext Character\n\ttext Save\n\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Chapters 4 through 12[/b]\n  \n  Unlock chapters 4 through 12, including the thrilling conclusion!\n  \n  *purchase adfree $4.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Chapters 4 through 12[/b]\n  \n  You've paid to unlock chapters 4 through 12.\n", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Caves and Dinosaurs.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99 $0.99\n", "master_scene": "*label the_beginning\nAfter much struggle and downfall, you arrive at the quaint lake-side town of Teepeekay—the once crater, turned lake, turned town. Five years ago, before the catastrophic sky-rock smashed into the planet, this region was originally a marshy swampland, much too moist for farming or agriculture. Once all the remaining swamp water drained into the ocean-sized dimple, a new thriving society grew literally overnight. \n\n\nMining and excavation expeditions have become a major supply chain for the economy. The sought-after space-rock has been the main component in smelting the strongest of armor and swords alike. \n\n\nLooking for a bite to eat or maybe a couple gulps of drink, you make your way over towards the local eatery. How are you feeling?\n*choice\n\t#Hungry.\n\t\t*goto the_crabs_revenge\n\t#Thirsty.\n\t\t*goto the_mud_puddle\n\n*label the_crabs_revenge\nThe odd odor is not that of dead fish or rotting bait. It’s more the salt and butter that permeate through Skuttle Street that overlooks the pier on the east embankment. Even though Crater Lake isn’t salt water, the smell entices visions of the beach and sea life in general. Your mouth waters while you gaze upon the sign of Crab’s Revenge. It depicts a crustacean holding utensils in its claws while wearing a bib, as if it was going to eat itself. This imagery makes you believe that the food is so good that a crab might self-cannibalize to score such a taste.\n\n\nUnderfoot, you hear the distinct sound of crunching exoskeletons as you walk. It is customary for patrons to discard the hallowed-out crabs, lobsters and other seabugs on the floor of this restaurant. \n\n\nHouse cats roam the floors for any morsels that might not have been sucked dry out of their armored husks. \n\n\nWith your eyes fixated on the special’s menu, you thread your way through the round tables and squat barstools without incident.\n\n\nCaught in a spill of butter or some other slick liquid, you start to lose your balance and flail around to keep yourself upright as if you are standing on ice.\n\n\nIf you had known this place was going to be so treacherous, you would have worn your hiking boots or perhaps ice skates. \n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto electric_slide\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto watch_where_youre_going\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Gumby slide out of there?\n\t\t\t\t\t\t\t*goto electric_slide\n\t\t\t\t\t\t#Try to catch your balance?\n\t\t\t\t\t\t\t*goto watch_where_youre_going\n\n\n*label electric_slide\nGetting yourself stable, you nearly collide with a burly patron who is waiting for a table. Skillfully and tactfully, you manage to use the slippery surface to your advantage and glide your way free from incident, unharmed.\n\n\n“Hey! Who do you think you are?” you hear the burly man say to another person, but you pay it no mind and continue to slide your way over to the mistress behind the counter, who’s ready to take your order.\n\n\nThe signage above the counter explains that this section of the restaurant is used for standing customers only, which is mostly used once all the tables are occupied. Before committing to this arrangement, you glance around to make sure there aren’t any open tables. There are none.\n*set save + 1\n\n\nYou gain +1 SAVE.\n*choice\n\t#Go to the bar with a smile.\n\t\t*goto may_i_take_your_order\n\t#Go to the bar with a grimace.\n\t\t*goto may_i_take_your_order\n\n*label watch_where_youre_going\nSomeone shoves you in the side, which causes you to bump into a burly patron—spilling their large platter of king crab legs. He looks angry and hungry and soon to be hangry. “Hey! Who do you think you are?”\n\n\nThis is an interesting question, now, isn’t it. It doesn’t quite matter what you think or what you say, actions speak louder than words, and right now, you have a choice to make. What kind of person are you?\n\n\n*choice\n\t#Do you help the man clean up the mess?\n\t\t*goto im_sorry\n\t#Pretend you didn't notice him?\n\t\t*goto im_your_worst_nightmare\n\n\n*label im_sorry\nMeaning no harm, you’re quick to apologize for the accident, even if it wasn’t entirely your fault. \n\n\nThe burly man notices the other individual who shoved but didn’t stop to help clean up the mess. “Hey, get back here.”\n\n\n“It’s okay. I’ll clean it all up,” you say, using your own cloak to pick up the fallen crab legs.\n\n\n“Thanks a lot. What’s your name, stranger?”\n\n\n“Oh, it’s not important. I don’t like to subscribe to labels,” you say, feeling flush in the face.\n\n\n“That’s dumb, but okay.” The burly man holds his platter high above his head this time and makes his way deeper into the establishment. \n\n\nYou let out a sigh. I wasn’t trying to be dumb. I was trying to be helpful.\n\n*choice\n\t#Do you stay here?\n\t\t*goto may_i_take_your_order\n\t#Do you go someplace else?\n\t\t*goto the_mud_puddle\n\n\n*label im_your_worst_nightmare\nThe burly man impatiently waits for an apology from you that will never come. “Hey, aren’t you going to help me clean this up?” he finally pipes up.\n\n\n“Why?” you ask with an obvious rolling of your eyes and shaking of your head.\n\n\n“You ruined my meal. Look at the huge mess you’ve made.”\n\n\n“Relax. You still have some sea bugs there.” \n\n\nThe burly man shoves the remaining crab legs off his tray and onto the ground alongside the rest of his meal. Slowly squeezing a lemon over the pile, he stares you down with narrowed eyes. “Now I need a whole new meal.”\n\n\n“I don’t know why you did that. You bumped into me. That’s a fact,” you challenge the burly man.\n\n\n“Oh, is it, now?”\n\n\n“That’s the way I see it.”\n\n\n“My eyes might be going bad or a bit wonky, because I see things a little differently from my point of view.”\n\n\n“I don’t care,” you say, turning your back to him.\n\n\nHis arm grabs your shoulder as he pulls you back to face him. “You should care, because you are either going to buy me a new one, or am I going to have to force you to eat the one you spilled on the ground,“ the burly man threatens, now hungry for a fight.\n\n\nYou glance down and notice three cats already making their way over to the mess.\n\n\nSizing up your aggressor, you have an obvious solution to this altercation. “You know what I’m going to do?”\n\n*choice\n\t#Buy him a new meal?\n\t\t*goto can_i_buy_you_a_meal\n\t#Fight him!\n\t\t*goto them_is_fighting_words\n\n\n*label may_i_take_your_order\nAfter dusting yourself off, you make your way to the counter in the standing room orders. \n\n\nWithin a moment of arriving at the counter, you are approached by an older, well-mannered employee. She has wizened eyes and a kind smile. “What’ll it be, sir. Or is it madam?” she asks you in a way that shows she isn’t trying to offend.\n\n\nYou are taken aback by this claim; you thought your gender is quite obvious. But to an older generation where fashion trends are quick to come and pass, it might not be so apparent. \n\n\nDecide what you say:\n\n*fake_choice\n\t#“I’m a feminine man.”\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 3\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto page_90\n\t\t\t\t*if (dieroll = 2)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto page_100\n\t\t\t\t*if (dieroll = 3)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto page_90\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t#Pick the Support\n\t\t\t\t\t\t\t\t\t*goto page_90\n\t\t\t\t\t\t\t\t#Pick the Trapper\n\t\t\t\t\t\t\t\t\t*goto page_100\n\t#“I’m a manly woman.”\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 3\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto page_81\n\t\t\t\t*if (dieroll = 2)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto page_100\n\t\t\t\t*if (dieroll = 3)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto page_81\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Pick the DPS.\n\t\t\t\t\t\t\t\t\t*goto page_81\n\t\t\t\t\t\t\t\t#Pick the Trapper.\n\t\t\t\t\t\t\t\t\t*goto page_100\n\n\n*label can_i_buy_you_a_meal\nYou make your way over to a counter at the back of the room where a woman is awaiting you. She opens her mouth for a greeting, but you quickly interrupt her. “Hello. I ran into a situation with that bearded guy over there. Do you know him?”\n\n\n“Yes, I do. He’s a regular here. What seems to be the problem?”\n\n\n“He was quite rude to me.”\n\n\n“People always get grumpy when they’re hungry.”\n\n\n“So, he isn’t dangerous?”\n\n\n“Nah. He’s a little teddy bear,” she admits.\n\n\nDecide what you do next.\n*choice\n\t#Buy him a meal.\n\t\t*goto bygones\n\t#Buy yourself something.\n\t\t*goto may_i_take_your_order\n\t#Go back and fight him.\n\t\t*goto them_is_fighting_words\n\n\n\n*label bygones\nYou order a meal for the burly man, even though you don’t have enough coin to buy one for yourself as well. After a couple minutes, the olive branch is delivered to his table. At first, he looks shocked, but after the waiter points in your direction, the burly man starts to smile. He really is a teddy bear, and a hungry one, at that.\n\n\nAfter seeing the happiness your good deed gave, there isn’t any sense in hanging around. You make your way to exit the restaurant. Before you leave, someone catches your arm.\n\n\n“Thank you for doing that. I’m sorry if I lost my cool before,” the burly man says, keeping his eyes to the floor.\n\n\n“No problem. I get hungry too sometimes.”\n\n\n“I have to admit that I’m embarrassed on how I behaved. Here, take this.” The burly man reaches out to you with something in his palm. You place your hand under his and collect your reward. The object is soft and…a little gross. It’s a lucky rabbit’s foot.\n\n\nYou gain 1 SAVE!\n*set save +1\n\n*choice\n\t#Introduce yourself.\n\t\t*goto page_68\n\t#Let your legacy do the talking.\n\t\t*goto page_68\n\n\n*label i_could_have_killed_you\nYour weapon swings true, heading straight for the burly man’s neck. At the last possible second, you halt your attack, leaving your blade pressed against his neck. If you’d desired, you could have cut him through, but you didn’t. You’re no monster. You just don’t take kindly to bullies.\n\n\n“What, what…are you going to do?” the burly man asks, not daring to take a gulp. \n\n\n“I’m going to ask you to buy me a meal, and I don’t want an appetizer, either,” you warn.\n\n\n“Yes…of course. Anything you like. It’s on me.” His eyes dart around, looking for a waiter.\n\n\nYou return your weapon to its scabbard and watch as the man quickly makes his way to an employee at the back of the room. \n\n\nThis is turning out exactly how you planned. It feels nice to be on top of the food chain.\n\n\n*set save +1\nYou gain +1 SAVE!\n\n*choice\n\t#Show who you really are.\n\t\t*goto page_81\n\t#Show who they want you to be.\n\t\t*goto page_81\n\n\n*label oops_my_bad\nYou swing your weapon wildly, and it slips out of your grasp and soars towards the back of the room. Luckily no unsuspecting patron was caught in it.\n\n\nOf course, this wasn’t at all your intention, although now you feel the firm hands of two bouncers. They quickly escort you out of the establishment without caring if you hit every table along the way, because, based on their round-a-about route, you think you must have. \n\n\nAfter literally tossing you out of the seafood restaurant, you stand up to dust yourself off.\n\n\nOne of the bouncers gives you a warning, “And I better not see you coming in here ever again. You hear me, old timer?”\n\n\nOld timer? Who does he think I am? You size yourself up and down, thinking about how many more years these bones have. \n\n*choice\n\t#Now you remember who you are.\n\t\t*goto page_50\n\t#You think you remember who you are.\n\t\t*goto page_50\n\n\n*label them_is_fighting_words\n“I never back down in a fight, and a fight is exactly what you ordered from the menu of pain.”\n\n\n“Is that so? I could cut through you like butter for my meal,” the burly man threatens. \n\n\nWithout another word, you brandish your sword and swing it wide, causing other patrons to take cover before getting caught in your broad arc. This guy has pushed your patience to the limit, and now he is going to pay with a little maiming.\n\n\nThe whole incident is playing out before you in slow motion. The look of horror on his bearded face all the way to the shell cracker he is holding up to his face in an attempt to block your attack.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto i_could_have_killed_you\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto oops_my_bad\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Scare the heck out of him?\n\t\t\t\t\t\t\t*goto i_could_have_killed_you\n\t\t\t\t\t\t#Miss on purpose?\n\t\t\t\t\t\t\t*goto oops_my_bad\n\n*label the_mud_puddle\nAdventuring has been slow as of late, what with all the good people going missing. Dark rumors are circling around about a master demon god that has cursed these lands. Like any gossip, it starts from a loose-lipped person, and there is no place looser with its drinks than the Mud Puddle. This rustic tavern focuses on its craft ales and its alcohol- infused finger foods. Nothing can be ordered without some sort of mind-altering substance in it.\n\n\nYou walk inside, and the joint is relatively empty, with small clusters of patrons scattered around, generally keeping to themselves. You take an empty table and wait for someone to serve you.\n\n\nA couple long minutes drag on, and no one comes by to wait on you. Your patience is starting to run thin.\n*choice\n\t#Raise your hand?\n\t\t*goto my_arm_is_tired\n\t#Call out?\n\t\t*goto can_i_get_some_help\n\n\n*label my_arm_is_tired\nWhat started as an obedient child’s way to get attention turns into a test of your strength and fortitude. Holding up your arm for so long, you feel like it’s going to fall right off at the elbow. \n\n\nEven after alternating between your left and right arms a couple of times, you end up having to give your muscles a well-deserved break. \n\n\nNot only are you still parched, you’re now tired and very agitated. You start to wonder if it’s even worth your time—though you’ve already invested this much of yours. \n\n\nGlancing around, you notice all the empty glasses next to the smiling customers. A pang of jealously comes over you as they look so relaxed and hydrated.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t*goto anyone_home\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto im_outta_here\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Get upset?\n\t\t\t\t\t\t\t*goto anyone_home\n\t\t\t\t\t\t#Decide to leave?\n\t\t\t\t\t\t\t*goto im_outta_here\n\n\n*label anyone_home\nGiving in to your impatience, you stand up in a huff and make your way towards the empty bar. Standing on your tippy toes, you peek over to see if there was anyone hiding behind it. Still, there is no one around. \n\n\nYou scan the rest of the establishment and notice that no one else seems to have fresh drinks, only empty glasses on un-bussed tables.\n\n\nThen a peculiar thought comes to you, are they even open?\n\n\nOn the verge of giving up, there is some banging and other commotion coming from an open door leading into the back.\n\n*choice\n\t#Do you investigate the sound?\n\t\t*goto whats_happening_back_here\n\t#Do you steal a drink?\n\t\t*goto everybody_loves_free_beer\n\n\n*label whats_happening_back_here\nYou head into the back room that is reserved for employees. Straight away you notice a frantic waiter trying to put the finishing touches on a large order of mixed drinks. You gather that he’s trying to get everyone’s order done at once. “Why did Angus have to pick today to get dead,” the waiter mumbles to himself. You notice that he grabs a healing potion or tincture and adds it to one of the beverages.\n\n\nYou’re no bartender, nor a fool, but something isn’t right about all of this.\n\n\nTaken aback, the waiter jumps at the sight of you. “Are you the new hire?” he eagerly asks.\n\n\nWhile debating if you should lie or not, the waiter holds up a bubbling drink that is amid curdling. “Does this look right to you?”\n\n\nDecide how you answer.\n\n*choice\n\t#“Yes, it looks right.”\n\t\t*goto the_golden_rule\n\t#“That is wrong.”\n\t\t*goto thats_not_edible\n\n\n*label the_golden_rule\nDeep down you know the drink is not right, but you haven’t the heart to tell him such bad news, not when he is trying his very best. You always believe that a kind lie is always better that a disappointing truth.\n\n\nYou didn’t save him from embarrassment, but you did save yourself from having to be the bearer of bad news.\n\n\n“Thank you so much. It’s been one of those days,” the waiter admits. After wiping the sweat from his brow, he takes two trays’ worth of drinks back into the bar.\n\n\nA pang of guilt comes over you as he is met with hollering and other sounds of jubilation. \n\n\n*set save +1\nYou gain +1 SAVE!\n\n*choice\n\t#Find out who you are.\n\t\t*goto page_68\n\t#You know who you are.\n\t\t*goto page_68\n\n\n*label thats_not_edible\nYou look into the waiter’s eager eyes and know exactly what he wants to hear, but you decide to tell him the truth instead. “I wouldn’t serve that to even my worst enemies,” you say bluntly. That elixir is going to kill someone; that much you were certain of. \n\n\n“Are you serious?” the waiter asks, looking as if he’s about to cry.\n\n\nYou’ve dabbled in alchemy for a couple years, and it seems that bartending isn’t much different. Just follow the recipe without making crazy substitutions. Forcing your way forward, you help him out with the beverage orders. \n\n\nThe waiter thanks you profusely as you study the drink recipe book while redoing all of his botched work.\n\n\nIt doesn’t take you too long, but you figure out that this waiter obviously doesn’t know how to read or write.\n\n\n*set save +1\nYou gain +1 SAVE!\n\n*choice\n\t#You introduce yourself as...\n\t\t*goto page_90\n\t#You falsely introduce yourself as...\n\t\t*goto page_90\n\n\n*label everybody_loves_free_beer\nYou jump behind the bar and grab yourself a bottle of cider and start to drink it down.\n\n\nFeeling the chilled liquid go down your throat gives you a sense of calmness that was before lost to you. Once your thirst is quenched, however, something about the drink seems off. It is wet, though the carbonation is all but lost. Smacking your lips, you realize that it is just apple juice inside a cider bottle. \n\n\nThings are quite unusual today in the Mud Puddle. Then you remember what day it is…the anniversary of an incident you very much want to forget.\n\n\nDespite your best efforts to get back on the wagon, your Cider Anonymous sponsor will be proud of you for holding out during this significant time.\n\n\nYou look around, wondering where Angus is. Apple juice behind the bar must have been his doing to keep you on the straight and narrow.\n\n\n\n*set save +1\nYou gain +1 SAVE!\n\n*choice\n\t#Your age is starting to catch up to you.\n\t\t*goto page_50\n\t#You have many years ahead of you still.\n\t\t*goto page_50\n\n\n*label im_outta_here\nThe establishment was beyond slow, and there is no excuse for being ignored like this. The poor service is much too much for you to handle right now, so you decide to head on over to the crabby place. Making your way towards the exit, you feel a strong hand grab you by the arm.\n\n\n“Where do you think you’re going?” a voice says, with as equal force as the grab.\n\n\nTurning to the side, you’re now face to face with a waiter holding a large tray with more than a few drinks on it. One false move and everything could come crashing down around you.\n\n\nIt’s now in the realm of possibility that the waiter was busy in the back mixing all those extravagantly-looking spirits.\n\n\n“I just want something to drink and no one…” Before you could finish your privileged complaint, the clean-shaven man shoves a multi-colored drink into your hand and says, “Why don’t you drink up and shut up?”\n\n\nHis insult was the needle that broke the camel’s back. Although camels have humps, humps that are filled with water, water that is used for drinking on hot days on the open desert. \n\n\nThis roundabout logic is proof of how thirsty you really are.\n\n\nIn some ways you are ready to shut up the waiter in your own way, with your fists, but that would mean destroying a lot of drinks and possibly causing a riot. \n\n\nThere is also the possibility that you might get wet, and no one wants that.\n\n\nNow, with a fresh drink in your hand, you have a couple of options.\n\n*choice \n\t#Take his offering\n\t\t*goto bottoms_up\n\t#Refuse\n\t\t*goto whats_in_it\n\t#Knock the tray out of his hand.\n\t\t*goto back_off \n\n*label im_hella_outta_here\n*image death.jpg\nAs you flee for your life, the forester shoots you in the leg, pinning you in place. The pain is bad, but the humiliation is far worse. You can’t be a coward.\n\n\nThe Tank is busy fighting the bear when the archer foe walks up to you and puts an arrow straight through your skull. There is some solace that the Tank didn’t happen to see you die in this way. It’s not the worst way you could have died. But it was a little short of a journey.\n\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#Try again at “The Beginning” and good luck.\n\t\t*goto the_beginning\n\n\n\n*label bottoms_up\nBeing so very thirsty, you try some of the liquid without questioning what is even in it. The chunky substance burns on the way down, and instantly you feel warm all over to the point of being numb. This is strange to you because the beverage was filled to the brim with ice.\n\n\n“Well, then. All is forgiven, yes?” the waiter says with a reassuring grin.\n\n\nYou stagger from left to right as you experience double vision. What did he give me to drink? You wonder. In some situations, your brash ask-questions-later sort of attitude has gotten you out of more than a few jams. This, however, doesn’t seem to be one of them.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto what_is_this_poison\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto im_not_drunk_youre_drunk\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Does it taste bad?\n\t\t\t\t\t\t\t*goto what_is_this_poison\n\t\t\t\t\t\t#Does it taste good?\n\t\t\t\t\t\t\t*goto im_not_drunk_youre_drunk\n\n\n\n*label what_is_this_poison\nReluctantly, you take another sip and realize that the drink might actually be a toxic tonic. After a third taste, you’re now sure of it. Living on the edge of danger, you thank the waiter for the free drink with a nod and make your way over to the bar to enjoy the rest of the swill, one small sip at a time.\n\n\nIn all your years and in all the taverns, you’ve certainly had worse, and your high tolerance of poisons and plague would have to be your armor, or immunity in this sense.\n\n\nFree was free, and there was no way you had the patience to wait for a drink that most likely wouldn’t kill you.\n\n\n\n*choice\n\t#Only one person could have survived that drink.\n\t\t*goto page_81\n\t#You almost didn't survive that drink.\n\t\t*goto page_81\n\n\n*label im_not_drunk_youre_drunk\nSipping, or gulping rather, you get down the whole glass as your body rejects the substance, jerking and gagging through it all. Instantly, you start to slur your words and sway around like a tree against a mighty windstorm.\n\n\n“What did you put in this thingy?” You ask, mumbling through the words.\n\n\n“You weren’t supposed to chug it. That drink is made for sipping over the span of an hour.” The waiter tries to hide his amazement with his hand. \n\n\n“Wait…what? There weren’t any instructions listed…were there?” You hold the glass up in the air and look underneath it, not knowing what you expect to find.\n\n\n“I think you’re going to die,” the waiter confesses.\n\n\nThose words are the last detail you remember of the night. \n\n*choice\n\t#There is only one person this could happen to.\n\t\t*goto page_50\n\t#This could have happened to anyone.\n\t\t*goto page_50\n\n\n*label whats_in_it\nSomething about this drink seems off to you, almost like a trap. Your gut never lies, and right now it is saying to not drink the drink. \n\n\nThere are a couple of truths you’ve learned early on in life. One is that if something is too good to be true, it most likely is. Another is that there is no such thing as a free meal. And today, you feel that a free drink also applies to that truth. \n\n\nYou refuse the drink and politely place the nearly full glass back on the tray.\n\n\n“Thanks, but I’m not thirsty,” you admit. This wasn’t a lie. Something about that foul beverage made you lose your appetite, or rather thirst.\n\n\n“If you’re not going to drink it, I can’t give it to someone else. Not after your lips were on it. Or maybe I can…” the waiter trailed off to himself as he made his rounds to the clusters of other patrons.\n\n\n\n*set save +1\nYou gain +1 SAVE!\n\n*choice\n\t#Someone has to get up pretty early to trick you. \n\t\t*goto page_100\n\t#You were fooled, a little.\n\t\t*goto page_100\n\n\n*label back_off\nYou reach back to knock the tray full of drinks out of the waiter’s hand.\n\n\nMulti-colored liquid sprays every which way, creating a rainbow of destruction. It is almost beautiful. Making a huge mess wasn’t your initial intention, but a mess is what you made.\n\n\n“The waiter has a dumbfounded look upon his face as he stands there, frozen in time.\n\n\nYou have a fairly restrictive diet when it comes to things you can and cannot put in your mouth. The audacity that you would just drink some random stranger’s drink was beyond you.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*set save +1\t\t\t\t\t\n\t\t\t\t\tYou gain +1 SAVE!\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto page_50\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto dont_murder_me\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Pick the Tank as your character.\n\t\t\t\t\t\t\t*set save +1\n\t\t\t\t\t\t\tYou gain +1 SAVE!\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto page_50\n\t\t\t\t\t\t#Be a coward instead.\n\t\t\t\t\t\t\t*goto dont_murder_me\n\n\n\n*label dont_murder_me\nThe waiter’s face turns bright red. He is beyond his boiling point. In a fit of rage, he pulls out a rusty dagger from his hip and points it at you menacingly. “Why did you go and do that for?”\n\n\nLost for words, you try and come up with a reasonable explanation, but nothing comes to mind—nothing that would make that rusty dagger magically go away. \n\n\nMaybe you were startled, or perhaps you’re just a bully at heart. In either case, you had your reasons, and you couldn’t take it back now. \n\n\nYou say…\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t“It was an accident.”\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto page_50\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t“I did it on purpose.”\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto early_bird\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#“It was an accident.”\n\t\t\t\t\t\t\t*goto page_50\n\t\t\t\t\t\t#“I did it on purpose.”\n\t\t\t\t\t\t\t*goto early_bird\n\n\n*label early_bird\n*image death.jpg\nYou ain’t a bird, nor a worm, but you will be feeding the worms because you are dead! \n\n\nThe waiter stabbed you in the face and drained your blood for a special “off menu” drink he hadn’t planned on making. \n\n\nThink back to all your choices you made in life and realize that you have died at the earliest possible spot in this book. You’re the best at being the worst, I’ll give you that.\n\n\n*achieve dead1\n*set deaths +1\n*set save +1\n*set character \"unknown\"\n*choice\n\t#Go back to “The Beginning” with a +1 SAVE and please try to make better choices next time around.\n\t\t*goto the_beginning\n\n\n*label can_i_get_some_help\n“Hello. Can I get some service around here?” you call out to the air, but no one responds. \n\n\nA couple more times, you holler out but with this same effect. The other patrons are starting to give you rude looks and grumble in your direction, and you decide that maybe it would be best if you just got yourself a drink.\n\n\nIf you want things done, you’re better off doing them yourself, as the old adage goes.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto everybody_loves_free_beer\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto whats_happening_back_here\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Get yourself a drink?\n\t\t\t\t\t\t\t*goto everybody_loves_free_beer\n\t\t\t\t\t\t#Check the back room?\n\t\t\t\t\t\t\t*goto whats_happening_back_here\n\n\n*label page_50\nCongratulations! You are the Tank!!\n*image tank.jpeg\n*set character \"Tank\"\nIn your youth, you were once a great hero of the queen. You served for the royal guard and went on many adventures. Although now that you’re more or less retired, your Alzheimer’s disease robs you of all your past exploits. Trying to hold on to a glimmer of your previous glory, you set out on small adventures. In the thrill of battle, your memory returns, if only briefly. \n\n\nEven though your arthritis won’t allow you to wield a sword, two shields work just fine for protecting members of a small party.\n\n\nYou may be old and your mind half-decrepit, but you’re not dead yet. \n\n\nAfter getting thrown out of the establishment, for reasons you cannot recall, you see a strong- looking man walking with a young woman who is dressed in white and has a pillow of soft hair.\n\n\n“Are you guys going on an adventure?” you ask eagerly, hoping to reclaim parts of your past.\n\n\nThe muscle man takes one look at you and laughs. “I’ll bite, old timer. What do you know about adventure?”\n\n\n“Well, quite a bit, actually. I once served as the queen’s guard.”\n\n\n“Queen Malbery?”\n\n\n“No. Her mother…Bea…Beaitry.”\n\n\n“You mean Beatrice?” The muscle man corrects, then rolls his eyes.\n\n\n“Yes, her,” you say with a wide grin.\n\n\n“I don’t begin to believe that you’re telling the truth. How could you possibly protect someone if you can’t even remember their name?”\n\n\n“It will come to me. It always does. My brain just needs a little time to warm up is all.”\n\n\n“You’ve got one foot in the grave already. Sorry,” the muscle man says sourly.\n\n\n“I assure you; I still have a great many fights left in me,” you protest, smashing both of your shields together, creating a hell of a racket.\n\n\nThe muscle man is about to refute your claim when the woman in white interjects. “Let him come along. I could use some protection,” she says, with an endearing grin and soft eyes.\n\n\nThe muscle man looks you up and down again. This time he wears a face that looks as though he is smelling something bad with his eyes. “I don’t know, my dear…”\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto i_guess_we_need_a_bodyguard\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto youre_going_to_get_us_all_killed_geezer\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Convince them they need you.\n\t\t\t\t\t\t\t*goto i_guess_we_need_a_bodyguard\n\t\t\t\t\t\t#Convince them they don't need you.\n\t\t\t\t\t\t\t*goto youre_going_to_get_us_all_killed_geezer\n\n\n\n*label i_guess_we_need_a_bodyguard\n“I suppose we can use your help,” the muscle man admits. “But if you prove to be more trouble than you’re worth, so help me…” \n\n\nUpon hearing the good news, you feel youthful again, like you did when you had a purpose for living. Like when you served in the queen’s guard.\n\n\nThe young woman claps her hands excitedly. “Oh, joy. It will be nice to have some more company on this adventure. My name is…”\n\n\nThe muscle man interrupts her by raising his hand. “No names. I want you all to refer to each other as your roles. She is the Healer and you are the Tank. Got it?”\n\nDecide what you say.\n\n\n*choice\n\t#“How come she gets to be the healer? I want to be the healer.” \n\t\t*goto i_can_heal\n\t#“Why don’t we use our real names?”\n\t\t*goto hi_my_name_is\n\n\n*label i_can_heal\n“Are you telling me you can heal? Because from where I’m standing, you look as though you could use some healing right now,” the muscle man asks.\n\n\n“Looks can be deceiving. I can do whatever I put my mind to, only sometimes my mind gets a little bit confused,” you admit.\n\n\n“I don’t think you’re fit for the job.”\n\n\n“He can heal if he really wants to,” the young woman interjects.\n\n\n“If he’s healing, what exactly will you do?” the muscle man asks her.\n\n\n“I hadn’t thought of that,” she says, as if she’s now weighing her options.\nAfter a moment of contemplation, she chimes in.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto ill_also_heal\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto she_can_tank_i_think\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Both of you can heal.\n\t\t\t\t\t\t\t*goto ill_also_heal\n\t\t\t\t\t\t#Let her tank.\n\t\t\t\t\t\t\t*goto she_can_tank_i_think\n\n\n*label ill_also_heal\nThe woman stands tall and says, “We can both heal.”\n\n\nThere is an audible smacking sound as the muscle man’s hand hits his forehead. “How is that going to work?”\n\n\n“Yeah, how is that going to work?” you wonder aloud.\n\n\n“We can both heal each other,” the woman explains, with an assertive nod.\n\n\nThe muscle man looks at you then shakes his head. “You know what, I don’t care anymore. Just follow me.”\n\n\nIn silence, you all hike over to a cave mouth before taking a brief rest.\n\n\n“My name is Marcus Garvin. Here’s the deal. Go inside there and find me the location of the hidden money pit.” He hands the girl a blank map with grid lines on it. “If you happen to survive, I’ll pay your living expenses…” Mr. Garvin pauses while looking you over. “…or retirement home fees. Whatever, whatever. There is enough treasure to set us all up for life. All I need is the location. Don’t play a hero and try to fight anything too menacing. Just run in and run out. Do you get me?”\n\n\n“You mean, you’re not coming in with us?” you ask, eyeballing his bulging muscles.\n\n\n“Oh, these. They are just glamor muscles. They’re not built for fighting,” Mr. Garvin admits.\n\n\n“Somehow I thought you would play the DPS role or something.”\n\n\n“Are you kidding me? I exercise every single day. Which means that half my body is sore and recovering from the previous day’s workout.”\n\n\n“So, it’s just us two, then?” you ask, a little worried about how you agreed to heal.\n\n\n“Yes. This is a very top-secret mission. And I expect you to keep it between us three, okay?”\n\n\nAfter you all agree, you wonder if you had made a mistake agreeing to heal.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou decide to go back to your role of tanking. You gain +1 SAVE!\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*set save +1\n\t\t\t\t\t*goto just_the_two_of_us\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou think healing is something new and different for you.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto two_healers \n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#You decide to go back to your role of tanking. Gain +1 SAVE!\n\t\t\t\t\t\t\t*set save +1\n\t\t\t\t\t\t\t*goto just_the_two_of_us\n\t\t\t\t\t\t#You think healing is something new and different for you.\n\t\t\t\t\t\t\t*goto two_healers \n\n\n\n*label she_can_tank_i_think\nThe woman proclaims that she can handle the role of a tank. The tremble in her voice makes you think otherwise. \n\n\nThe muscle man throws up his hands in a fuss. “You know what? I don’t care what either of you do. Just go in that cave, find me some riches, and I’ll pay you handsomely.”\n\n\nThat seemed easy enough to you. This wasn’t your first time spelunking. Looking over at your companion, you’re not so sure she is up to the challenge.\n\n\n“Is that fine with you?” you ask the young woman who has her whole life ahead of her.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tShe shakes her head, “No. Maybe I should heal, and you should tank.”\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto just_the_two_of_us\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t“Sounds fun to me,” she reluctantly says.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto a_tank_and_a_heal\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#She shakes her head, “No. Maybe I should heal, and you should tank.”\n\t\t\t\t\t\t\t*goto just_the_two_of_us\n\t\t\t\t\t\t#“Sounds fun to me,” she reluctantly says.\n\t\t\t\t\t\t\t*goto a_tank_and_a_heal\n\n\n\n*label hi_my_name_is\n“My name is Earl…wait, no, it isn’t,” you say, feeling a bit confused. You take a solid minute to straighten things out, but still for the life of you cannot figure out what your name is. “Francis. No.”\n\n\n“See, this is precisely why we shouldn’t use real names. When you die, I don’t want to explain that Earl—no, wait—Francis has passed away. It makes things a lot less sentimental for me and everyone involved. Believe me,” the muscle man explains.\n\n\n“I’ve got it! Marc Garvin. That’s who I am.”\n\n\n“What!? No. That’s my name,” the muscle man says. “How did you know my name? I hadn’t given you it yet.”\n\n\nNow you’re in a whirlwind of confusion. How did you know his name? “I’m not…quite sure.”\n\n\n“It doesn’t matter. You’re going to tank.” Mr. Garvin points at you. “And you’re going to heal.” He then points at the girl. “Got it?”\n\n\nYou both nod in agreement.\n\n\n“I think we need to rustle up a third person or else you’re not going to make it very far,” Mr. Garvin says.\n\n*choice\n\t#This is fine...\n\t\t*goto friends\n\t#This is not fine.\n\t\t*goto friends\n\t#This guy is fine.\n\t\t*goto friends\n\n\n*label friends\nYou arrive at a cave’s mouth, and Mr. Garvin rests on a rock while pulling out a large piece of paper with grid lines going across it. Nothing is drawn in except one square with a “you are here” label.\n\n\nAfter a couple long moments of watching him mess around with the empty map, you speak up. “What are we waiting for?”\n\n\n“I posted this adventure on the adventure’s board, and I’m waiting to see if anyone shows up.”\n\n\nThe woman in white gives you a shrug.\n\n\nYou came on this journey for adventure, and waiting around isn’t going to cut it. About the point when you’re ready to charge forward into the cave, you hear someone approach. \n\n\n“Greetings,” they said. You couldn’t quite figure out if they’re a woman or a man.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto traps\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto supporter\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Are they the Trapper?\n\t\t\t\t\t\t\t*goto traps\n\t\t\t\t\t\t#Are they the Support?\n\t\t\t\t\t\t\t*goto supporter\n\n\n*label traps\nMr. Garvin holds out his arms and welcomes the newcomer warmly. “It’s been said that this particular dungeon is filled with booby traps and other nasty things. I’ve gone the extra mile to provide you with a trained trapper to help with the mission.”\n\n\nIf he just posted about the adventure on the adventure board, how could he have known a trapper was going to show up? This all seems a little strange to you, but you chalk it up as more memory stuff.\n\n\n“Hello. I am the Trapper. I enjoy defusing traps and making traps. I also enjoy the company of animals.”\n\n\n“Nice you meet you. I’m the Tank, and this is the Healer.”\n\n\n“I have a good feeling about this group,” Mr. Garvin says, clasping his hands together excitedly.\n\n*choice\n\t#Now there are three in your party.\n\t\t*goto three_of_a_kind\n\t#Now there are three in your gang.\n\t\t*goto three_of_a_kind\n\n\n*label supporter\nMr. Garvin bows to the newcomer. “This is the Support. I hired them to make sure you don’t mess this all up. I have a lot riding on this mission, and I expect compliance.”\n\n\nYou raise your hand like a child in a class. \n\n\n“Just speak.”\n\n\n“What is the mission? You never quite told us that part.”\n\n\nThe Support chimes in before Mr. Garvin could respond. “I suppose you didn’t read the quest. No bother. I did. Basically, we are set to clear the cave and slay the magical dinosaur in order to loot the money pit.”\n\n\nPleased with the Support’s answer, Mr. Garvin smiles widely.\n\n\n“Magical Dinosaur? Do you mean a dragon?” you ask incredulously.\n\n\n“No. I think this beast identifies as a dinosaur,” Mr. Garvin says.\n\n\nThis adventure was much more dangerous than you had initially expected. But danger is your middle name, or at least you think it is.\n\n\nGain +1 SAVE!\n*set save +1\n*choice\n\t#You're ready to kill some people.\n\t\t*goto slayer_of_beasts\n\t#You're ready to kill some monsters.\n\t\t*goto slayer_of_beasts\n\n\n*label youre_going_to_get_us_all_killed_geezer\nWaving his hand, the muscle man shoos you away like a pesky racoon that is invading his garbage can. It seems that he isn’t at all impressed with your first impression. Could you blame him?\n\n\nLaughing and chatting, they both walk out of town and into the forest surrounding the town. Without much else to do, you keep a far distance and stalk them until they reach a hidden cave. You figure that this has to be the location of whatever quest they were going to embark upon.\n\n\nSoon they are met by another party member, no doubt your replacement. She has a large sword and air of confidence about her. Which is quite the opposite of you.\n\n\nYour hearing isn’t what it used to be, and you cannot for the life of you make out anything they are discussing—no doubt the details of the adventure.\n\n\nAfter they’re done, the muscle man tosses the girl with the sword a large sack of coins and leaves them to enter the cave alone.\n\n\nYou can’t help but feel a pang of jealously watching these young adventurers go on a quest.\n\n\nThis sparks a memory that you hadn’t thought of in a very long time. You recall the first time you went on patrol for the queen. It was late, and you heard a relentless scratching sound from the corridor outside her bed chambers. With each passing minute, the sound got louder and louder until it was unbearable for most of the guards. Even though it was your first day, you stayed strong and held your weapon tightly at the ready position, where everyone else cowered on the ground—covering their ears.\n\n\nFinally, a wailing banshee appeared, and you single-handedly cut down the vile creature, earning you a smile from the queen herself.\n\n\nAfter remembering that moment in time, you wonder if you should proceed after them or give in to your obsolescence. \n\n*choice\n\t#Follow them.\n\t\t*goto every_move_you_make\n\t#Head back to town.\n\t\t*goto hidden_in_the_shadows \n\n\n*label hidden_in_the_shadows\nYou decide to give up on your dreams and head back to town and find yourself a drink to help you forget.\n\n\nSuddenly, you see a flash of a shadow make its way out from behind the tree next to you. It seems that you weren’t the only one spying on the party. The only difference is that this mysterious figure looks like they’re up to something nefarious. \n\n\n“Hey, what do you think you’re doing?” you yell out.\n\n\nThe masked figure turns towards you and puts up a gloved finger over the mouth of the mask as if to say “shhh,” then disappears into the cave after the girls.\n\n\nFearing you might have met an assassin, or worse, you abandon your idea to give up, and enter in the cave after them. \n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto every_move_you_make\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto move_along\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Become a stalker and follow the girls.\n\t\t\t\t\t\t\t*goto every_move_you_make\n\t\t\t\t\t\t#Stop the masked figure.\n\t\t\t\t\t\t\t*goto move_along\n\n\n*label move_along\nYou run into the mouth of the cave just in time to spot the mysterious figure approaching the girls who are unsuspecting and casually exiting down a path to the left. The masked figure is brandishing a sword, and his intention is quite obvious—he is going to murder them.\n\n\n“Not today,” you say, slamming into him with one of your mighty shields. \n\n\nCaught off guard, your foe falls to a knee and growls at you. \n\n\n“If you want to harm those girls, you’re going to have to go through me first,” you declare, crashing both your shields together in a taunting manner.\n\n\nThe masked figure accepts your conditions and swipes his unarmed hand across his neck as a threat.\n\n*if (save > 0)\n\t*set save -1\n\tYou used a SAVE!\n\t\n\t\n\t*goto counter_gank\n*else\n\tIf only you had a SAVE.\n\t\n\t\n\t*goto feeling_my_age\n\n\n*label counter_gank\nThe masked figure comes at you repeatedly with sword chops and slashes. Years of serving in the queen’s guard has seasoned your muscles to act without thinking.\n\n\nMatching each of his attacks, you push against every strike, driving him back towards the edge of the cave. \n\n\nWhere his mask hides his expression, you notice droplets of sweat running down his neck. This observation tells you that you have him right where you want him.\n\n\nUsing your shoulder, you ram him into a stalagmite jutting out of the wall, and he’s run through by the sharp rock. \n\n\nAfter thrashing and twisting around in an unnatural way, an avalanche of large boulders buries him completely. \n\n\nWith a satisfied look on your face, you can’t help but say to yourself “I still got it.”\n\t\n*choice\n\t#You feel guilty.\n\t\t*goto every_move_you_make\n\t#You feel nothing.\n\t\t*goto every_move_you_make\n\n\n*label feeling_my_age\n*image death.jpg\n\nThe masked foe comes at you with a skillful combo of sword swipes. At first, you’re able to keep up—matching each of his attacks. After going at it like this for a couple minutes, your arms start to tire and burn from exhaustion. \n\n\nThe masked fiend reaches back, and with both hands, aims for your neck. You’re unable to raise your shield in time to protect yourself. Your head is taken clean off your shoulders. You are dead!\n\n*set deaths +1\n*choice\n\t#This is not the end.\n\t\t*goto page_105\n\n\n*label page_105\nCongratulations! You are now the Ganker!! \n*image ganker.jpeg\n*set character \"Ganker\"\n*achieve ganker\n*set deaths +1\nAfter getting brutally killed by another adventurer, you find that your spirit is now occupying the body of your murderer. Some foul magic is most certainly at play. Echoing throughout the chamber, you hear a hallow voice. “You have been granted a second chance at life. Don’t squander it away like you did with your last one. In order to break the curse that binds you to this vessel, you must take another life in exchange. Only then will you become free.”\n\n\nSpinning around, you desperately look around for the source of the haunting voice, but no one is around. \n\n\nUpon inspecting your new self, you notice that your body a hodgepodge of different materials, wood, fabric, and even flesh and bones. This is most disturbing and most unnatural. Heeding the warning, you head back to town almost in a daze. Washing over you is a heavy sense of déjà vu. \n\n\n“How did this happen to me?” You carry the heavy sack of gear over your shoulder. If it weren’t for your patchwork body, you might have considered continuing on with your life anew. But this “thing” you control isn’t natural. It is exactly as the strange voice had warned—a curse. You can’t help but wonder if the person who killed you had suffered the same fate as you. \n\n\nI bet you didn't see that one coming?\n*choice\n\t#I saw it coming.\n\t\t*goto troll_time\n\t#I was shook.\n\t\t*goto troll_time\n\n*label troll_time\nTrying to free yourself from the curse that befell you, you’ve gone on many successful hunting expeditions without any resolution. As the days turn into weeks, the kill became more appetizing than the cure. It was as if only a small fragment of your former self remains as an echo of guilt, whispering baseless words of reprieve.\n\n\nAfter murdering your latest victim, you return to Teepeekay with riches beyond your dreams. You could retire for the season and live a modest life. But killing isn’t about comfort. It’s about the thrill of the hunt, drinking the tears of your victims, but most importantly, it’s for the lolz.\n\n\nNot sure where and when your next victim will fall, you decide to head over to one of the town’s main spots.\n\n*choice \n\t#Go to your regular spot?\n\t\t*goto the_regulars\n\t#Head to the place with the foul smell?\n\t\t*goto crabby_claws\n\n\t\t\n*label crabby_claws\nHangry for crustaceans, you eagerly enter the pungent establishment with a shell cracker in one hand and a pouch of coins in the other. Hanging around your neck is a cheeky bib that reads, “feeling shellfish.”\n\n\nOff in the far corner, you notice the last vacant table in the place, and it has your name on it, even if you don’t remember what that name is. \n\n\nExcited to eat some soft-shelled limbs, you push your way through the crowd of people that is waiting to be seated. Sure, they got there before you, but if you want something bad enough in this life, you have to take it. There is a crash and a shove, and you might have knocked someone over. But you don’t dare look back for fear of losing the last seat in the house.\n\n\nYou take the open table, and before you can order or even peruse a menu, a large platter of mixed seafood is presented before you. Clearly it was made for two people to share. Deep down you know this grub wasn’t initially intended for you, though that doesn’t stop you from digging in with both hands.\n\n\nThe crab meat is soft and salty and the dipping sauce buttery and light. This is exactly what you wished for. You only wished that you were able to finish it all.\n\n\nIn the feeding frenzy, memories of your former life start to come back to you. You wonder how long has it been since you’ve eaten anything so delectable? Certainly not while occupying this body. A fleeting thought reminds you of the curse and the warning the voice had given you. How could I have forgotten something to important, you wonder, but then popping fried shrimp in your mouth brought you back to the feast in front of you. Hot tuna, this is good.\n\n\nBut not a minute into your bliss, the server comes back in a hurry. “Oh, I’m sorry. That wasn’t meant for you…” She stops speaking upon noticing you devouring the platter without care.\n\n*choice\n\t#Give the dish back.\n\t\t*goto my_mistake\n\t#Keep eating.\n\t\t*goto nomnomnom\n\n\n*label getting_my_fill\nWith fidgeting fingers and toes, you eagerly await your lobster entree.\n\n\nYou quickly learn how slow the service is when going through the proper ordering channels. The appetizer you had earlier only makes your appetite worse with each passing moment, as if you had awakened a sleeping beast which is now rumbling in anger.\n\n\nAround twenty minutes pass, and you start to get a strange feeling inside your stomach. It is hard to determine if it’s stage two hunger pains or food poisoning. Before you can fully decide, a ruby-red lobster the size of a small dog is presented in front of you. The fragrant steam hits your face as you savor the scent inside your nostrils. \n\n\n“It’s time to dig in,” you say, and do just that. \n\n\nAfter consuming every bit that isn’t an eyeball or exoskeleton, your palms begin to sweat, and you feel flush in the face. Something isn’t at all right.\n\n\nThe server walks by your table and quickly doubles back after glancing at you. “Hey, mister, are you doing alright?” she asks, leaning down on the table.\n\n\n“I think the lobster is off. I feel sick.”\n\n\n“I’m so sorry. Is there anything I can get you instead, on the house, of course?”\n\n\n“Uh, I would like another lobster.”\n\n\n“Are you sure?”\n\n\n“Yes. A fresh one this time.”\n\n\nWith a wide-eyed expression, she gives you a nod and quickly leaves with your dirty plate.\n\n\nWhile waiting for your next lobster, you hear a couple of the staff talking about you. They aren’t necessarily in earshot, but something about the angled ceiling really messes with the whole acoustics of the restaurant. \n\n\n“The last thing you want after food poisoning is the food you just ate.”\n\n\n“I think he’s faking it. He tried to eat someone else’s dish earlier. What a cheapskate.”\n\n\n“He’ll get a free lobster alright, with a little extra sauce, if you catch my drift.”\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto im_going_to_explode\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto i_think_im_allergic\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Throw up?\n\t\t\t\t\t\t\t*goto im_going_to_explode\n\t\t\t\t\t\t#Do you have an allergic reaction?\n\t\t\t\t\t\t\t*goto i_think_im_allergic\n\n\n*label im_going_to_explode\nAfter eating your weight in seafood, you feel so heavy in the stomach that you’re having difficulty breathing. Your taut center is sticking out like a pimple, ready to pop. \n\n\nThe pressure continues to build and build until you let out an overwhelmingly loud, croaking burp. Only it wasn’t a burp. Instead, you projectile-vomit everything that you had just ingested. Like a dragonborn spitting acid, you manage to spray the half-chewed contents over everything within five feet of you. \n\n\nIn the background, in between heaves, you notice a busboy throw down his towel and up and quit right then and there.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto im_going_to_ask_you_to_leave\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto i_think_im_allergic\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Get kicked out?\n\t\t\t\t\t\t\t*goto im_going_to_ask_you_to_leave\n\t\t\t\t\t\t#Get an allergic reaction?\n\t\t\t\t\t\t\t*goto i_think_im_allergic\n\n\n*label im_going_to_ask_you_to_leave\nYour grotesque display clears out everyone from the establishment. After taking off your wooden mask, you change into some fine clothing you find at the bottom of your sack. You cast a glamor illusion that makes everyone who looks at you see the best version of you that they can conceive of. It is time to update your quest board and catch yourself a couple more suckers for the slaughter. \n\n\nUpon leaving, you hear someone calling out to you. “Garvin. I’ve finally found you.”\nYou glance over to see the town’s mortician. \n\n\n“What can I do for you?” You roll your eyes at the busybody. \n\n\n“You’re not fooling anyone. I know what you’re up to.”\n\n\n“You do, do you?”\n\n\n“Yes, and I won’t let you put me out of business. People turning up missing, and I know you’re at the center of it.”\n\n\n“I don’t know what you’re talking about.”\n\n\nBefore he could elaborate, you run him through with your knife, giving him the curse. “You should have brought your two shields for protection.”\n\n\n*achieve end2\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n*label nomnomnom\nContinuing eating like a cow with eight stomachs, your mouth is nearly bursting with sea life, as if it was trying to escape. You give the server an irresponsible shrug.\n\n\n“Would you like to order anything else, then, or are you all set?” your server asks, judging you hard.\n\n\nYou respond with an inaudible response that sprays wet particles everywhere. \n\n\nShe takes your response as an unequivocal “no” and leaves in a huff, mouthing silent curses to herself.\n\n\nYou get the impression that she might get her wages docked due to your inconsiderate gorging, but you push away the part of you that cares for such morality.\n\n\nAfter demolishing the platter in one sitting, you start to feel a little uneasy.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto im_going_to_explode\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto getting_my_fill\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Eat more?\n\t\t\t\t\t\t\t*goto im_going_to_explode\n\t\t\t\t\t\t#You're full.\n\t\t\t\t\t\t\t*goto getting_my_fill\n\n\n*label my_mistake\nUsing your unwashed and otherwise unkempt hand, you pull chewed-up bits of fish, crab, and shrimp out of your mouth and proceed to place them down on the corner of the platter. Your actions are gross, barbaric, and also uncalled for.\n\n\n“If you knew it wasn’t yours, why did you start eating it,” the server asks incredulously. \n\n\n“What, I was hungry?” you say with a shrug, still licking your chops.\n\n\nAfter rolling her eyes and shaking her head, she asks you if there is anything you would like to order. \n\n\nDecide how you answer.\n\n*choice\n\t#“No thanks. I’m full.”\n\t\t*goto playing_in_the_mud\n\t#“I would like the lobster, please.”\n\t\t*goto getting_my_fill\n\t#“Actually, I wasn’t done eating that.”\n\t\t*goto nomnomnom\n\n\n*label i_think_im_allergic\nThe pain radiates up towards your chest, and your face is now dripping with sweat. What starts out as fidgeting turns into uncontrollably scratching at your extremities. You wish that you could be like one of the octopi you ate and have eight limbs to scratch. Large welts start forming all over your body.\n\n\nYou’ve eaten large quantities of seafood your whole life. There is no way you suddenly turned allergic.\n\n\nDefying your inner proclamation, your throat starts to close up, and you’re now gasping for air, trying to clutch on to life. \n\n\nYou can’t breathe, but simultaneously, you cannot stop scratching at your sores that are now starting to open up and bleed. \n\n\nA couple of the waitstaff notice you struggling, but they give you a look that says it’s no sweat off their back if you die.\n\n*choice\n\t#Hit yourself on the chest.\n\t\t*goto dead_again\n\t#Eat more seafood.\n\t\t*goto dead_again\n\n\n*label dead_again\n*image death.jpg\n\nLike a fish out of water, your long struggle to breathe has taken your life away.\n\n\nThough this vessel wasn’t you in the traditional sense. Your body was borrowed and had its own allergic reactions beyond your ability to know. \n\n\nThis time there isn’t a second chance. In some strange way, you freed yourself from the curse by ending your struggle. But in another way, you have failed to reach the ending you were pining for. \n\n\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#Please start over from “The Beginning.”\n\t\t*goto the_beginning\n\n\n*label the_rush\nPeople are rushing to the bar like a stampede of cattle. You are getting shoved and pushed aside. \n\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tOn an even result, someone yells, “He’s got a knife.” This threat prompts you to throw down a vial that fills the room with thick black smoke. As everyone is coughing and hacking, you get to work and murder every single person inside the joint without a care or ounce of regret. \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\tSomething strange happens, something quite different. The curse has somehow been lifted. You must have murdered the right person, but with all the smoke, there isn’t any way for you to know for certain which one it was.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\tEven without knowing, you enjoy the sweet silence of death.\n\t\t\t\t\t\n\t\t\t\t\t*achieve end4\n\t\t\t\t\t*stat_chart\n\t\t\t\t\t\ttext Deaths \n\t\t\t\t\t*goto_scene ending\t\t\t\t\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*image death.jpg\n\t\t\t\t\tOn an odd result, you hear a soft whisper inside your ear, “Pain is my promise.” You suddenly feel warm liquid pouring down your leg, and your extremities go ice cold. Collapsing to the ground, no one seems to notice. Someone is killing you, but who?\n\t\t\t\t\t*set save 0\n\t\t\t\t\t*set deaths +1\n\t\t\t\t\t*set character \"unknown\"\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#Please start over from “The Beginning.”\n\t\t\t\t\t\t\t*goto the_beginning\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Do you want to die?\n\t\t\t\t\t\t\t*image death.jpg\n\t\t\t\t\t\t\tOn an odd result, you hear a soft whisper inside your ear, “Pain is my promise.” You suddenly feel warm liquid pouring down your leg, and your extremities go ice cold. Collapsing to the ground, no one seems to notice. Someone is killing you, but who?\n\t\t\t\t\t\t\t*set save 0\n\t\t\t\t\t\t\t*set deaths +1\n\t\t\t\t\t\t\t*set character \"unknown\"\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Please start over from “The Beginning.”\n\t\t\t\t\t\t\t\t\t*goto the_beginning\n\t\t\t\t\t\t#Do you want to live?\n\t\t\t\t\t\t\tOn an even result, someone yells, “He’s got a knife.” This threat prompts you to throw down a vial that fills the room with thick black smoke. As everyone is coughing and hacking, you get to work and murder every single person inside the joint without a care or ounce of regret. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tSomething strange happens, something quite different. The curse has somehow been lifted. You must have murdered the right person, but with all the smoke, there isn’t any way for you to know for certain which one it was.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tEven without knowing, you enjoy the sweet silence of death.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*achieve end4\n\t\t\t\t\t\t\t*stat_chart
