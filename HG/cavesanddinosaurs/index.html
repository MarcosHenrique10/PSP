at_chart\n\t\t\t\t\t\ttext Deaths \n\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\n\t\t*if (dieroll = 2)\n\t\t\t\t\tYou’re able to open a theater where you preform as the beastmaster every night to sold-out crowds.\n\n\t\t\t\t\t*achieve end56\n\t\t\t\t\t*stat_chart\n\t\t\t\t\t\ttext Deaths \n\t\t\t\t\t*goto_scene ending\n\n\t\t*if (dieroll = 3)\n\t\t\t\t\tAlong with opening a theater, you also open up you kill your own meal restaurant that is attached to the theater, creating a medieval experience of dinner and tournament. \t\n\t\t\t\t\t*achieve end57\n\t\t\t\t\t*stat_chart\n\t\t\t\t\t\ttext Deaths \n\t\t\t\t\t*goto_scene ending\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#You’re able to feed and care for a zoo’s worth of animals\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tAnd so it was.\t\t\t\n\t\t\t\t\t\t\t*achieve end55\n\t\t\t\t\t\t\t*stat_chart\n\t\t\t\t\t\t\t\ttext Deaths \n\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t#You’re able to open a theater where you preform as the beastmaster every night to sold-out crowds.\n\t\t\t\t\t\t\tAnd so it was.\n\t\t\t\t\t\t\t*achieve end56\n\t\t\t\t\t\t\t*stat_chart\n\t\t\t\t\t\t\t\ttext Deaths \n\t\t\t\t\t\t\t*goto_scene ending\n\t\t\t\t\t\t#Along with opening a theater, you also open up you kill your own meal restaurant that is attached to the theater, creating a medieval experience of dinner and tournament.\n\t\t\t\t\t\t\tAnd so it was.\t\n\t\t\t\t\t\t\t*achieve end57\n\t\t\t\t\t\t\t*stat_chart\n\t\t\t\t\t\t\t\ttext Deaths \n\t\t\t\t\t\t\t*goto_scene ending\n\n*label pitfall\nYou dig a deep pit in some soft soil, then place a tarp over the hole, utilizing some medium rocks to hold down the edges. After you sprinkle just the right about of dirt to cover the tarp, your trap is set. \n\n\nAll you have to do now is come up with a plan to get someone to leave the given path in order to get caught in it. This style of trap is commonly used for catching tigers or other dangerous beasts. \n\n\nYour diversion has to be obvious, but not too obvious.\n\n*fake_choice\n\t#Do you use sound?\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto ooga_booga\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto nope\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t#It works.\n\t\t\t\t\t\t\t\t\t*goto ooga_booga\n\t\t\t\t\t\t\t\t#It doesn't work.\n\t\t\t\t\t\t\t\t\t*goto nope\n\t#Do you use smell?\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto pee_you\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto nope\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#It works.\n\t\t\t\t\t\t\t\t\t*goto pee_you\n\t\t\t\t\t\t\t\t#It doesn't work.\n\t\t\t\t\t\t\t\t\t*goto nope\n\t#Do you use a visual cue?\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto jump_scare\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto nope\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#It works.\n\t\t\t\t\t\t\t\t\t*goto jump_scare\n\t\t\t\t\t\t\t\t#It doesn't work.\n\t\t\t\t\t\t\t\t\t*goto nope\n\n\n*label nope\nYou wait and wait, but nothing seems to be coming by this trap. Maybe you put it in a poor location. Or maybe you’re just going about it all wrong.\n\n\nAfter wasting the better part of a day, you really hope this murderer is going to be worth all the effort. 1000 gold can buy a lot of things, but if you don’t invest it wisely, you’ll be right back here in six months’ time. You have to devise a plan to make it last, and not just buy a bunch of animals.\n\n\nGiving up on this method, you decide to try something different.\n\n\n“Better try something else,” you say to a lizard who is climbing the cave wall, looking for bugs.\n\n\n“Hey, it’s a hard grind,” the lizard says back to you.\n\n\nYup, you can speak to animals. That’s definitely a thing you can do.\n\n*choice\n\t#Would you like to use the tripwire method?\n\t\t*goto tripwire\n\t#Would you like to use the beartrap method?\n\t\t*goto beartrap\n\n\n*label jump_scare\nYou put a white cloth over your head that has two eyeholes pre-cut out so that you can see. \n\n\nDressed in this ridiculous getup, you wait for someone to approach, and eventually someone does. He’s a long-eared forest type who’s holding a bag of worn-looking gear on his back. He seems to be searching the floor for more forgotten loot, like a bottom feeder. At least that’s what he appears to be doing from your vantage point. \n\n\nOnce he is passing the pit, you jump out and yell the first thing that comes to mind. “Get wrecked, knife ears!” \n\n\nScared out of his wits, the unsuspecting victim falls into your pit and bangs his head on the way down. Watching the rise and fall of his chest, you know that he’s still alive, just knocked out. This plan worked out perfectly, except for the fact that this isn’t the murderer you were hired to find. \n\n\nBased on the business card he dropped, he’s a shopkeeper of a little shop located inside the cave.\n\n\nYou gain +3 SAVES!\n*set save +3\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto tripwire\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto beartrap\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Try a tripwire?\n\t\t\t\t\t\t\t*goto tripwire\n\t\t\t\t\t\t#Try a beartrap?\n\t\t\t\t\t\t\t*goto beartrap\n\n\n*label pee_you\nHaving a “great” plan, you decide to pee all over the pathway, which will urge people to take a detour and step directly into your obscured pitfall. Just to make sure your plan is foolproof, you take a poop at the end of the path.\n\n\nAfter waiting a while, the only thing that seems to be interested is all the flies that are surrounding your feces. You’re about to give up when you hear someone approaching, someone with an abnormal stride. Soon, out of the darkness emerges a frogman. He can’t be the murderer you’re looking for. With that cute froggy face, you doubt he could hurt a fly, until he does. Running around your hot steamy pile, the frogman eats the very flies that were just sitting in excrement. \n\n\nThe frogman doesn’t seem to mind. Then he falls into your pit, ruining the whole thing.\n\n\nNot wanting to clean up this whole mess, you decide to try one of your other traps.\n\n\nLose 1 SAVE.\n*set save -1\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto tripwire\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto beartrap\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Would a tripwire work better?\n\t\t\t\t\t\t\t*goto tripwire\n\t\t\t\t\t\t#Would a beartrap work better?\n\t\t\t\t\t\t\t*goto beartrap\n\t\n\t\t\t\t\n*label ooga_booga\nYou reach deep into your chest of costumes and put on a scary green outfit that makes you appear out of this world or rather out of this plane of existence. If this won’t scare him into your pit, nothing will.\n\n\nYou hide in the shadows behind a black cloth, just in case the murderer has night vision or a light source lit. \n\n\nAfter a while, you hear a peculiar sound, and you hold up your probing prop. A man wearing a tie and a tucked-in shirt comes by.\n\n\nYou emerge out of your concealment, and he runs off the path, screaming, straight into your pitfall. Eager to collect your kill, you notice that his neck is snapped. You may have dug this hole a little too deep. After climbing down, you go through his stuff and realize that he’s nothing more than a cultist. Cults are bad, but you don’t think this one is the murdering type. You decide to try one of your other traps.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto tripwire\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto beartrap\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Would a tripwire work better?\n\t\t\t\t\t\t\t*goto tripwire\n\t\t\t\t\t\t#Would a beartrap work better?\n\t\t\t\t\t\t\t*goto beartrap\n\t\t\t\t\t\t\n\n*label full_party\nAs you approach the group of four adventurers, you’re not quite sure if they’re in elaborate costumes for the full emersion experience or if they’ve actually seen some real action before. One older gentleman is dressed like a Tank, a dark-haired girl with a large sword must be roleplaying as the DPS, a girl in white that is holding a staff and some religious book must have chosen the Healer character, and a lanky guy whom you can’t quite figure out.\n\n\n“Who are you supposed to be?” you blurt out.\n\n\n“The Support,” he says with a grin.\n\n\n“Couldn’t afford the full costume, huh?” you ask, eyeballing his tattered clothes.\n\n\n“Excuse me?”\n\n\n“Nothing, nothing.” You turn to address the whole group. “Welcome to the cave. I will be your guide. Please save your questions for the end of the tour.” Just then, two of the party members put their hands down.\n\n\nWalking in a single-file line, you all enter the cave like a mama duck with her little ducklings.\n\n\nYou wait until they all fall in, and you continue your speech. “This rock was once flying with the stars until it crashed down here. Many indigenous creatures died from the sheer force of impact. Others died because their habitat was changed.”\n\n\n“I heard that they got wiped out because this space rock brought all kinds of new and dangerous monsters to our world, and they’re the real reason for the climate change?” the Support says.\n\n\n“I’m sorry; are you giving the tour, or am I?”\n\n\nThe Support just grumbles, and you say, “That’s what I thought,” under your breath. Giving tours isn’t really your strong point, but gold is gold.\n\n\n“Are we going to see any danger?” the DPS asks, while playing around with her large sword.\n\n\n“Most definitely, you might see a couple lizards, or a maybe a large bug or two…”\n\n\n“Or a bat!” the Healer says.\n\n\n“Yes, you might see one of those, but they’re harmless, I assure you. They only eat fruit.”\n\n\nA giant bat swoops down at you. In all your days, you’ve never seen one quite like this. It’s got red eyes and large talon-like hands.\n\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto close_call\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto off_they_go\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Bat goes towards the Tank.\n\t\t\t\t\t\t\t*goto close_call\n\t\t\t\t\t\t#Bat goes after the Healer.\n\t\t\t\t\t\t\t*goto off_they_go\n\t\n\t\t\t\t\t\n*label close_call\nThe huge bat grabs ahold of the Tank’s shield. \n\n\n\nYou light a flare while pointing it directly into the bat’s face, scaring it off and possibly blinding it…wait, you remember that bats are already blind.\n\n\n\nEveryone flees out a different exit during the commotion. This is just the type of excitement this group was looking for. \n\n\n\nYou resort to using your flare to try and corral everyone back together, but it’s worse than herding cats, which you’ve done before as a summer job.\n\n\n\n“It’s in my hair. Get it out!” the Healer says.\n\n\n\n“It’s not in your hair,” you say.\n\n\n\n“Let me at him,” the DPS says, swinging her sword around.\n\n\n\n“Everyone, stay calm. The bat has flown off,” you reason, but everyone is still losing their minds over the ordeal.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto reunion\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tSome of your party members are still lost.\n\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t*goto guiding_the_way\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Gain a SAVE?\n\t\t\t\t\t\t\t*set save +1\n\t\t\t\t\t\t\t*goto reunion\n\t\t\t\t\t\t#Some of your party members are still lost.\n\t\t\t\t\t\t\t*goto guiding_the_way\n\n\n*label reunion\nRunning around through the dark, you manage to find the Tank, DPS, Support, and even the Healer without too much trouble. Things were looking lost there for a minute, but now you’re all back together again safe and sound.\n\n\nEveryone has big smiles on their faces as the excitement of the cave has given them renewed life. Nothing like the thread of death to make you feel so alive. Only they don’t know how real the threat was, and you aim to keep it that way.\n\n\nOn occasion, guests on your guided tours have passed away; one fell inside a live volcano; another got bitten by a poisonous snake; and a rare instance happened where a man got entangled in one of your traps. This was nothing like those accidents. You have a sneaky suspicion that it has everything to do with this cave.\n\n\nLooking over the map you were given, you can’t help but wonder if it was made by a child because of all the cute pictures drawn on it.\n\n*if (Save > 0)\n\t*set save -1\n\tYou use a SAVE!\n\t\n\t\n\t*goto dance_party\n*else\n\tYou take everyone to the very spot where a dinosaur is located. \n\t\n\t\n\t*goto jurassic_park\n\n\n*label dance_party\nYou decide to take them to a spot on the map that is labeled Dance Party. Awaiting you is a dancing automaton. \n\n\nWhile there isn’t any music around, the Tank starts to bang on his shield, the Support blows into an empty potion bottle, the DPS actually has a lute in her bag and begins to strum it, and the Healer sings with a voice of an angel. Accompanied by your mouth bass noises, you guys aren’t bad.\n\n\nYou know good talent when you see it, and together you become a traveling band, going from town to town performing music in exchange for coin. Your popularity increases with each year until you find yourself in front of the queen herself, playing before her majesty’s court. \n\n\nAt the end of your set, you’re met with a standing ovation following two encores. After the curtain falls, the queen has requested an audience with your traveling group. The moment you enter the room, she says “Seize them!” \n\n\nAnd her royal guards apprehend the DPS and the Tank for some reason. The rest of you are free to go, but without your string and percussionist, your group is through.\n*achieve end58\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label off_they_go\nThe giant bat snatches the Healer by her hair and flies off with her. That was not supposed to happen, but it was quite entertaining for the party that is laughing and in awe of the whole thing.\n\n\n“Boring, I knew she was just an actor,” the DPS says, folding in her arms.\n\n\n“Yes, you got me, she’s…an actor.” You can’t admit that she was most likely being eaten alive at this very moment. \n\n\n“I knew it.”\n\n\n“Let’s see what the next room might have in store for us. Watch your step and keep your eyes open,” you say. \n\n\nThe next room has a tripwire trap connected to some bladder filled with a dark gas.\n\n\n“Hold up. There seems to be a trap over here.” Disarming traps is most definitely something you’re into, but then you wonder, what if you pretend to disarm it…\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto did_i_do_that\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto backfire\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Spring the trap?\n\t\t\t\t\t\t\t*goto backfire\n\t\t\t\t\t\t#Disarm the trap?\n\t\t\t\t\t\t\t*goto did_i_do_that\n\n\n*label did_i_do_that\n“All clear,” you say, swiping your hands together a couple times, though it is most definitely not clear.\n\n\nThe Support smiles and walks right through the trigger, and a black cloud surrounds him. \n\n\nYou and everyone else take a couple generous steps backwards to avoid the stuff.\n\n\nOnce the smoke clears, the Support holds up a hand. “I’m fine, guys. Don’t worry,” though their rotting face says otherwise.\n\n\n“That looks bad,” the Tank points out.\n\n\n“If only we had a healer…damn,” you say, trying to look like you care.\n\n\n“I have this healing potion, but I know this is all part of the fun,” the Support says.\n\n\nIf only he knew that this is no act and the deadly cave is very much real. \n\n*choice\n\t#Do you force him to drink the potion?\n\t\t*goto reunion\n\t#Do you let him die?\n\t\t*goto guiding_the_way\n\t#Do you stall?\n\t\t*goto guiding_the_way\n\n\n*label backfire\n*image death.jpg\nYou attempt to pretend to disarm the tripwire, and the death trap goes off right in your face. Normally the trap takes some time to murder its victims, but you breathed in the full concentrated dose, and it kills you instantly. \n\n\nNot only that, your companion tells the tale of your demise across many towns, and your reputation for as both a guide and trapper is forever tarnished. Though your notoriety does grow, if that’s what you’re into.\n\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#If you want to restore your reputation, go back to “The Beginning” and try again.\n\t\t*goto the_beginning\n\n\n*label guiding_the_way\nYou’ve gone three or so more rooms without anything interesting to note. This whole guide thing is going to be the death of you…death by boredom. \n\n\nWith only two people in your party to babysit, an idea suddenly comes to you. Scoutmaster Garvin said that he didn’t care if your group lived or died. If you happened to lead them to their demise sooner rather than later, it would save you a lot of time. I don’t owe them anything. This isn’t personal; it’s just business.\n\n\nFor some time, you’ve collected traps that you’ve disarmed for safekeeping. What if you decide to re-arm a couple?\n\n\n“Hold on, I think I smell a trap,” you say as if you have some clairvoyance. \n\n\nThe Tank and DPS cautiously stand back as you approach an empty chest and with goods. \n\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto trap_set\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto thats_no_chest\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Set a trap.\n\t\t\t\t\t\t\t*goto trap_set\n\t\t\t\t\t\t#It's a trap!\n\t\t\t\t\t\t\t*goto thats_no_chest\n\t\t\t\t\t\t#That's a mimic.\n\t\t\t\t\t\t\t*goto thats_no_chest\n\n\n*label trap_set\nYou put some of your own money inside the chest to make it seem more alluring, then you add a spring mechanism as a trigger. Greed will make them overlook the obvious trap. “There. It’s all disarmed.” You do your best to hide a grin. \n\n\nThe Tank unsuspectingly opens the chest and gets a poison dart to the neck. “Son of a basilisk,” he blurts out, grabbing at his wound.\n\n\n“Oh, no, it must have been double-trapped,” you say, though your acting is lacking a bit this time around. \n\n\n“Does anyone have a healing potion?” the DPS says to both you and your dying companion. \n\n\nYou do have one, but debate using it on the Tank. Doing so will defeat all the trouble you went through in setting the trap.\n\n*choice\n\t#Do you heal the Tank?\n\t\t*goto a_new_leaf\n\t#Do you not heal the Tank?\n\t\tYou fumble with the potion and purposely drop it on the ground, shattering its contents everywhere.\n\t\t\n\t\t\n\t\t*goto one_down\n\t#Fumble the potion?\n\t\tYou fumble with the potion and purposely drop it on the ground, shattering its contents everywhere.\n\t\t\n\t\t\n\t\t*goto one_down\n\n\n*label thats_no_chest\n*image death.jpg\nLeaning down, you begin to install a doubt trap on the chest. Unfortunately for you, the chest turns out to be a tricky object, a deceptive shape- shifting monster that is lying in wait. It has many sharp teeth with which to smile at you. Did I say smile? I meant bite…and bite down it does, then chew, then swallow. This is normally the sequence of getting eaten, and, well, you did…get eaten, that is. \n\n\nYour last memory is the hungry chest monster saying “Yummy num-nums” at your flavors.\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#Go back to “The Beginning” and try to make better life choices.\n\t\t*goto the_beginning\n\n\n*label one_down\nWith only one person left on the tour, you decide to try that trap bit one more time. You would love to get out of here and get on with your normal life. No one will suspect that move twice in a row. \n\n\nThis time you spot an actual trap that someone set. It is connected with a boulder precariously positioned at the top of a ramp. No wonder no one sprung the thing; it’s obvious as hell. “Look at that trap there,” you say with a chuckle. \n\n\nThe DPS shrugs and doesn’t seem amused. You wait until she’s in its path of destruction, and you pull out the pin that holds the boulder in place. Only it doesn’t trigger the trap. You kick the boulder a couple times.\n\n\n“What are you doing?” the DPS asks.\n\n\n“Disarming…this…thing…”\n\n\n“If you say so.”\n\n\nThen the rock starts to move. \n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto quest_complete\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto a_crush\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Get upset?\n\t\t\t\t\t\t\t*goto quest_complete\n\t\t\t\t\t\t#Decide to leave?\n\t\t\t\t\t\t\t*goto a_crush\n\n\n*label a_crush\nStanding below the trap as it triggers, the boulder crushes your legs, leaving you paralyzed. Not only that, it flattened your pack with all your traps and camping gear and all the rest of your worldly possessions.\n\n\nThe DPS utters a curse and leaves you there to die a slow death.\n\n\nLittle did they know you’re quite adept when it comes to survival and manage to crawl your way back to town. \n\n\nThere you spend the rest of your days as a cartographer, selling your maps for coins. \n\n\nYou miss the quiet sounds of the forest life and all of your animal friends. \n\n\nLiving among people takes a bit of cruelty and deceit for one to be able to survive. But it’s something you’ve come to accept.\n\n\nThe End\n\n\nGo back to “The Beginning” if you would like to walk around at the end of your life.\n*achieve end59\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label quest_complete\nYou leap out of the way just in time. The boulder rolls past you, and you hear a loud crunching noise as the DPS gets all of their bones crushed it. Oh, happy days, all your burdens have been eliminated.\n\n\nYou return to Mr. Garvin while he’s churning some snow and cream in a barrel. \n\n\n“Here, try this.” He gives you a spoonful of the frozen milk. The texture is creamy and rich. “This is wonderful. What you do call it?”\n\n\n“Icy cream.” \n\n\n“Can you teach me how to make it?”\n\n\n“Sure, if you forgo your payment. I assume you completed the quest, and they’re dead?”\n\n\n“They are.”\n\n\n“Good.”\n\n\n“Wait. Why did you want them to die?”\n\n\n“I have a pet dinosaur who needs feeding. Last time I tried to feed it, I almost became its lunch.”\n\n\nAs promised, Snowmaster Garvin teaches you the ways of his cold treats, and you open a dessert shop in town. There you trap everyone’s taste buds with your original flavors. \n*achieve end60\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label a_new_leaf\nYou give the Tank the healing potion, and the wound on his neck vanishes along with the arrow lodged in it. \n\n\n“Sorry, I should have taken more care with the trap. There must have been two set,” you lie.\n\n\n“No problem. Thanks for the heal,” the Tank says, rising from the spot where he almost died.\n\n\n“Would you guys like to see?” You hold up a map that the quest giver gave you. Each line was drawn with a girlish flourish, which tells you Master Garvin must have commissioned someone young to drawn it.\n\n\n“I want to see the magical flying dinosaur,” the DPS admits, tapping the parchment.\n\n\nYou look at the map and, sure enough, one is shown with a large X marking the spot.\n\n*choice\n\t#Do you take them to the dinosaur?\n\t\t*goto jurassic_park\n\t#Or do you get them lost instead?\n\t\t*goto wild_goose\n\n\n*label jurassic_park\nAfter taking plenty of shortcuts, your group is standing in front of a giant ferocious reptile! \n\n\nYour party members arm themselves and take action as if they weren’t posers but actual seasoned adventurers. Who knew?\n\n\nThe dino wastes no time in attacking everyone without prejudice. First it whips its tail back and forth, and you manage to jump it like a rope, though the DPS wasn’t so lucky; she is knocked through the air.\n\n\nWith everyone fighting the beast at the same time, blood, skin, and other substances are flying everywhere. It’s hard to tell who’s the sourceof such gore. \n\n\n“Duck!” someone yells, but you turn your head towards the warning instead of blindingly complying.\n\n\nThe dinosaur thrashes its head and clamps down on you. This could very well be the end of you. \n\n*if (Save > 0)\t\n\t*set save -1\n\tYou use a SAVE!\n\t\n\t\n\t*goto curtain_call\n*else\n\t*goto blood_bath\n\n\n*label blood_bath\nBefore the magical dinosaur could sever you in half, you break a vile of poison you had saved for an arrow trap. \n\n\nUpon tasting the poison, the dino spits you out into a giant pile of fluffy dinosaur dolls. Suffice it to say, they cushion your fall. \n\n\nAfter trampling the DSP into a blood puddle, the dinosaur becomes still as a statue.\n\n\nLooking around, every one of the tourists you were guiding has been brutally slaughtered by this enormous beast. You are the sole survivor, and you can’t help but feel a bit guilty for your role in this. \n\n\nWhile making your way to the exit, you’re met by a masked figure who has been stalking you for a couple of rooms now. You’ve tracked him tracking you but paid him little mind until now.\n\n\n“What do you want?” you ask, but the mysterious one doesn’t respond. Instead, he walks right up to you and guts you with a large hook.\n\n\nAs your body spills out of you, karma seems to be playing a part, right here and right now.\n\n*choice\n\t#You die instantly.\n\t\t*goto page_105\n\t#You die in a couple minutes.\n\t\t*goto page_105\n\t#You die when you're good and ready.\n\t\t*goto page_105\n\t#You will never die.\n\t\t*goto page_105\n\t#Death is a state of mind.\n\t\t*goto page_105\n\t#Revenge is a dish best served cold?\n\t\t*goto page_105\n\t\n\n*label curtain_call\nYou close your eyes, ready to get gobbled up, when you hear a strange tune. It sounds almost like a victory jingle. You’re alive…\n\n\nYou open your eyes, and the room is brightly illuminated. Everything seems a lot less real than it was before. There are strings and pullies operating the dinosaur’s movements and candles behind stained glass to mimic its glowing eyes. A couple actors climb out of the dino suit and congratulate the adventures on defeating the vicious monster. Who knew; you were the only one who was tricked into believing this whole thing was real and not some attraction for entertainment.\n\n\nYou can’t help but feel foolish. The dino’s lair is actually a gift shop, and all the people you are guiding are busy buying dino-themed trinkets and stuffed animals, alike. \n\n\nRingmaster Garvin approaches you with a hearty smile and a bag of coins. “Good job. Five stars all around. I’ve got more tours booked all week, if you’re interested.”\n\n\nAlthough his offer is tempting, you’re looking forward to a much deserved vacation.\n*achieve end61\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label wild_goose\nYou run around and around in circles, keeping to the safest parts of the cave. Feeling like a rabbit being chased by a wolf, you get a little too into the ordeal, smiling and laughing. \n\n\nTurning around, you notice that you’re now alone after successfully ditching your dead weight, even if it wasn’t initially your intention. \n\n\nFreedom has never felt so good, but now there is the issue of finding your own way out.\n\n\nAll your footprints are mixed together, but that isn’t the half of it. Some of your prints seem to have disappeared from one room to the next, making backtracking nearly impossible. Someone or something is deliberately trying to keep you here. \n\n\n“Whoever is doing this, I know you can hear me. Just stop doing whatever it is you’re doing, and I’ll let it slide,” you say, thinking that Garvin fellow might be behind it all.\n\n\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto ditched\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto porter\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Ditch out?\n\t\t\t\t\t\t\t*goto ditched\n\t\t\t\t\t\t#Find a teleporter.\n\t\t\t\t\t\t\t*goto porter\n\n\n*label ditched\nYou hear some soft voices down a ways. Not wanting to get reunited with the party you oh so skillfully lost in the underground labyrinth, you find a hole and jump inside it.\n\n\n“Why would they leave us like that?” you recognize the Tank saying.\n\n\n“They didn’t seem right in the head. That’s what happens when you spend too much time alone with animals.” the DPS adds.\n\n\nOnce the coast is clear, you try and get out of the hole you are hiding in only to find that you’re actually inside some monster marsupial’s stomach pocket—or rather—pouch.\n\n\nYou’re forced to live out your days roleplaying with a mega-kangaroo, which can be loving at times and utterly horrifying at others. \n\n\nA couple years later, you are attacked by a couple of adventurers that seem familiar to you from your former life. You pay them no mind and protect mama-roo at all costs!\n*achieve end62\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label solo_rider\nYou enter the cave, and right off the bat, you’re attacked by a bear. While swinging your bo staff at the thing, you could have sworn that you hit it, but your attack missed instead. It was almost like the bear were an illusion. Its claws were nothing short of real, and sharp, and really sharp. Especially against your skin.\n\n\nYou try once more to fend off the raging animal, and again, your attack misses. This time you have a strange déjà vu feeling right before the moment of impact that doesn’t come. Something quite inexplicable is up. You decide you’re in no position to ride solo, not when your debts are inhibiting your spiritual advancement. \n\n*choice\n\t#Do you continue on attacking?\n\t\t*goto all_or_nothing\n\t#Do you want to flee?\n\t\t*goto friend_one\n\t#Do you flee really hard?\n\t\t*goto friend_three\n\t#Run harder than anyone has ever ran before?\n\t\t*goto friend_three\n\n\n*label friend_one\nYou enter the room and see a woman clad in leather and carrying a larger than normal sword. \n\n\nThe bear follows closely behind you, and the woman throws her massive sword across your vision, and it stabs right into the bear, proving that she has wonderful aim.\n\n\n“You must be a DPS,” you say, wondering how you might be able to assist her.\n\n\n“Sure am.” She pulls the blade out of her kill.\n\n\n“We should team up.”\n\n\n“Why would I want to do something like that?”\n\n\n“I can increase your damage output.”\n\n\n“How exactly are you going to do that?”\n\n\n“For starters, I can sharpen your blade.”\n\n\nShe looks you up and down, then reluctantly agrees. Without invitation, she tosses you her heavy blade, and you, being you, nearly drop it. “Clean the blood off of it while you’re at it, squire.”\n\n\n“Yes…my lady,” you say with a bow. Her bossiness reminds you of your older sister, and like your sibling, you fall into a subservient role like you had when you were a child.\n\n\nYou gain +1 SAVE!\n*set save +1\n\n*choice \n\t#Crush some skulls?\n\t\t*goto skull_crushing\n\t#Cut off some legs?\n\t\t*goto skull_crushing\n\t#Go full-on murder hobo?\n\t\t*goto skull_crushing\n\n\n*label friend_two\nYou enter the next room after being chased by the scary bear and find a young religious-type girl looking as helpless as you feel.\n\n\n“Help, help, help!” you say, and she turns and hits you with her staff. Luckily, it doesn’t hurt; instead, it feels good, like a backrub. Observing the bear scratches, you notice that they’re gone. Her staff has some sweet healing properties to it.\n\n\n“Thank you so much.”\n\n\n“Glad to be of service.”\n\n\n“Would you like to team up?”\n\n\nShe gives you a warm smile and says, “Sure.”\n\n\n“What are you doing out here alone?”\n\n\n“I am trying to relive my youth after a bad breakup.”\n\n\nYou give her a sideways glance, “Funny, you don’t look to be any older than I am. What did you find, a fountain of youth or something?”\n\n\nThe Healer laughs hysterically, “That would be rich now, wouldn’t it.”\n\n\nYou can’t help but second-guess your alliance; something was off about her.\n\n\nYou gain +1 SAVE!\n*set save +1\n*choice\n\t#You smile.\n\t\t*goto heal_bot\n\t#You don't smile.\n\t\t*goto heal_bot\n\t#You do your favorite emogi face.\n\t\t*goto heal_bot\n\n\n*label friend_three\nYou try and flee from the bear, but it bounces on top of you and opens its jaws wide, covering you with thick slobber. This thing can swallow me whole, you think to yourself, then contemplate which would be less painful, swallowed or chewed.\n\n\nSuddenly, the bear is knocked off of you. You look up to see an older man pushing the beast back with his shields. Intimidated by his two- shield tactics, the bear tucks its tiny tail and flees.\n\n\n“Thank you so much.”\n\n\n“I’m here to serve.”\n\n\nYou drink down a potion you had been saving for a special occasion. It was a gift from your mother on her deathbed. She was the only one in your whole family who had approved of your adventuring spirit, and this potion was a symbol of that support. And now it is gone.\n\n\nOnce you’re feeling less like death, you ask the old Tank if he would like to join up with you, and he agrees, under one condition; you help him find and complete a quest that he has forgotten the details about. \n\n\nYou gain +1 SAVE!\n*set save +1\n\n*choice\n\t#It's Tank time!\n\t\t*goto tank_time\n\t#It's time for a change.\n\t\t*goto tank_time\n\t#It's time to get ill?\n\t\t*goto tank_time\n\t#It's beginning to look a lot like Christmas.\n\t\t*goto tank_time\n \n\n*label all_or_nothing\n*image death.jpg\nAfter a couple more minutes of utterly failing at attacking the bear, you decide to try and befriend it instead. Something about this room is weakening your efforts. You hold out your hand in a non-threatening way and allow the beast to take in your scent. This is going to work. It has to work.\n\nRoll seven dice. Add up the number of odd results. That number is the amount of more minutes you survive before the bear murders you, because it’s a bear. \n\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#Go back to “The Beginning,” and maybe next time you might be able to hold out for even more minutes!\n\t\t*goto the_beginning\n\n\n*label skull_crushing\nAfter a mile or so of cavernous nothingness, you enter a room and hear a faint dripping sound every so often. While the air seems damp, you are sure it’s not water. Using your flare as a light, you aim it at the sky. \n\n\n“It’s blood,” the DPS says. \n\n\n“It’s dripping from the room above,” you say.\n\n\n“It’s still blood.”\n\n\n“I wasn’t debating what it was; I was merely adding to the discussion.”\n\n\n“If you were, you would be wrong because it is blood.”\n\n\n“We have already established that!” Shining your flare, you notice that there is so much blood coming through that a river of it is forming.\n\n\n“It’s warm.” The DPS swipes a taste of some with her finger, “And fresh.”\n\n*choice \n\t#Do you investigate the ceiling?\n\t\t*goto river_of_red\n\t#Do you leave it alone?\n\t\t*goto shelter\n\t#Do you taste it?\n\t\tIt tastes like bood dumbass.\n\t\t\n\t\t\n\t\t*goto river_of_red\n\n\n*label river_of_red\nYou poke the dripping ceiling with your bo staff, and the whole thing tumbles down in a tidal wave of slippery bloody rocks. \n\n\nThe sound of metal on stone fills the room as the world falls around you. Dazed and confused, something hard must have knocked you on the head. Not only that, but your companion is nowhere to be found.\n\n\nA figure rises out of the red mess, drenched.\n\n\n“I’m glad you’re okay. I thought you must have been crushed or worse.”\n\n\n“You eyeballing me?” she says. Then her eyes flash open. All you see is black looking back at you. This is not your companion, but something much, much worse.\n\n\n“Holy red wedding, what is going on!?”\n\n\n“Death is my only resolve.”\n\n\n“Why would you say that to a person?” You look around the ground for something to throw.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto stoned\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto she_bitch\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Are you hardened?\n\t\t\t\t\t\t\t*goto stoned\n\t\t\t\t\t\t#Is she a bitch?\n\t\t\t\t\t\t\t*goto she_bitch\n\n\n*label stoned\nEven though you’re clearly outmatched, you rush at the ceiling devil without reservations. \n\n\nOut of the red river jumps the DPS who intercepts your target, stabbing her through.\n\n\n“You can destroy my body, but I live forever inside the mouth of hate,” the she-devil says. \n\n\n“Dead is dead, and you’re going to be one of the two,” the DPS taunts.\n\n\n“I know your innermost fears, and I will turn them against you,” the she-devil says before exploding all over the room.\n\n\nThe river of blood starts to congregate around the DPS. At first, she does everything in her power to fight against whatever magic is at play. \n\n\nYou use your buffing ability to increase her attacks, but it only slows the inevitable. Soon the room is void of all blood. The DPS transforms her form. She now has snakes for hair.\n\n*choice\n\t#Do you try and sedate her?\n\t\t*goto once_bitten\n\t#Do you leave while you still can?\n\t\t*goto moar_bearz\n\t#Do you give up on this whole playthrough and start over?\t\t\n\t\t*set character \"unknown\"\n\t\t*set save 1\n\t\t*goto the_beginning\n\n*label once_bitten\nThe DPS is no more; she is a now a monster of pure evil. You grab her from behind and plan to snap her neck, giving her a quick, relatively painless death. \n\n\nHissing and snapping, she curses you while struggling to break free from your grasp.\n\n\nWhile looking deep into one of her hair snake’s eyes, you notice that they have a stern look, the same look that you’ve seen in the DPS. It is then that you realize that even though she is a freakshow monster, she is still a person. Just a freaky snake person.\n\n\nPutting her in a chokehold, you squeeze on her neck until she falls asleep. You then lay her body carefully on the ground. “I’m sorry, friend. I support your new lifestyle,” you say, and give her your cloak as a blanket.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto anti_social\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tShe wakes up and looks you directly in the eyes.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto stone_cold\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Become a loner Dottie.\n\t\t\t\t\t\t\t*goto anti_social\n\t\t\t\t\t\t#She wakes up and looks you directly in the eyes.\n\t\t\t\t\t\t\t*goto stone_cold\n\n\n\n*label moar_bearz\nAfter leaving the gruesome room, you’re met by two bears that eagerly point their wiggly noses in your general direction.\n\n\nAfter what you just witnessed, you don’t have any desire to mess with the likes of them or any monster, for that matter. You decide to keep running until you find another companion. A nicer companion, and less monster-like companion.\n\n\nAll you really want is someone worth supporting, someone who will appreciate your hard work and efforts and now make a mockery of the master/minion code. As a great man once said, “Support me, support you.” That is what you strive to find in this journey.\n\n\nWalking through a room filled with terrestrial roots, you come across a room with two exits; one leads up a ramp, the other goes down.\n\n\n“One is as good as the next, I suppose,” you say and flip a coin in order to determine your path.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto friend_two\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto friend_three\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Friend number two?\n\t\t\t\t\t\t\t*goto friend_two\n\t\t\t\t\t\t#Friend number three?\n\t\t\t\t\t\t\t*goto friend_three\n\n\n*label she_bitch\nYou arm yourself with random potions and poisons and face the demonic she-devil, but her power is too strong. \n\n\nFirst, she levitates you in the air. Then she explodes your body and somehow sucks all your life force into the one piece of you that remains…your eyeball, which is growing and multiplying by the second. This is your new form, a giant mass of eyeballs, all-seeing, and all-around horrifying. Good thing you have nice eyes.\n\n\n“That will teach you to mind your gaze,” the she-devil says, leaving you to roam these halls, gently floating.\n\n\nAnd you do just that, from now until forever.\n*achieve end63\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label shelter\nYou decide that blood cult stuff isn’t what you’re down with. You’re more of a space cult sort of guy.\n\n\n“Come on, let’s get out of here,” you urge the DPS who is now drinking the stuff. “Eww. What is wrong with you?”\n\n\n“My father was a barbarian. It’s a thing,” she says, lapping up another handful of blood.\n\n\n“Well, stop. Please.”\n\n\n“It gives my kind power.”\n\n\n“And diseases!”\n\n\nThe DPS shrugs off your comment and follows you out the exit.\n\n\n“I never knew my father. This ritual is my only connection to him. When I drink blood, I get images from his life. Like lost memories.”\n\n\n“I’m sorry. I didn’t know.”\n\n\n“Whatever. There’s no way you could have known.” She wipes her mouth with her sleeve.\n\n*choice\n\t#Do you try to comfort her?\n\t\t*goto loots\n\t#Do you leave her alone?\n\t\t*goto resurrection\n\t#Do you want some loot?\n\t\t*goto loots\n\t#Do you want to try a little resurrection?\n\t\t*goto resurrection\n\n\n*label loots\nIn the corner of the room, you spy a pile of human remains. Searching through her corpse, you find a scroll that looks very much magical. “Can you use this,” you ask, handing the scroll to the DPS.\n\n\nShe looks at you with a great disdain. “Is this some kind of joke?”\n\n\nConfused, you glance over and inside her nicely manicured hand is a steamy pile of poop.\n\n\n“How did that get there? I didn’t mean to. I..I..” You stammer while trying to explain yourself.\n\n\nShe flicks her hand and wipes the warm residue off on your shoulder. “I can’t believe I ever trusted you.”\n\n\n“I didn’t mean to, I swear!” You know that you’ve been known to be forgetful at times, but hallucinating is something entirely new.\n\n\nThe DPS leaves the party, leaving you alone.\n\n\nNeeding to work on your communication skills, you seek social and mental health from anyone willing to supply. That is where you meet a sci-fi cult that takes all your money and leaves you broke and needing to take on side jobs and adventuring work just to make ends meet.\n\n\nYou get the sense that you’ve done this before, almost like you’re stuck in an endless loop where there is no beginning and no end. It is a classic chicken or the egg scenario where you’re both—a full-grown chicken living inside a huge egg.\n\n\nThis phenomenon is often justified by the concept of past lives, that we’ve all done the same experiences before in a previous life. Though in your situation, you feel that it isn’t just a coincidence, but that you’re doing the exact same thing over and over again, with minor differences.\n\n\nMaybe one day you’ll figure it all out.\n\n\nBut today is left for starting the cycle over once again.\n*achieve end64\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label resurrection\nFinding a stack of bones next to a resurrection scroll, you decide to read the thing aloud because that’s just how you read. Little did you know that the magic imbued in the script is unleased upon the bones. Once the magic flows off the page, there is no stopping it. Your lips continue reading like they were possessed by some word-spirit. \n\n\nOrgans, muscle, then skin all reform around the skeleton. And soon you bring back to life a young Healer type. Averting your gaze, you hand her an extra pair of robes you had on you, because you never know. “Welcome back!” you say with a grin upon watching her body take in a breath.\n\n\n“Thank you. What…happened to me?”\n\n\n“We don’t know. I used a resurrection scroll on you.” \n\n\n“I remember everything up until how or why I died,” she explains. “Follow me.”\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto ghouls\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto ghouls_and_ghosts\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Ghouls?\n\t\t\t\t\t\t\t*goto ghouls\n\t\t\t\t\t\t#Ghouls and Ghosts?\n\t\t\t\t\t\t\t*goto ghouls_and_ghosts\n\n\n\n*label ghouls_and_ghosts\n*image death.jpg\nThe Healer leads you to a shambling ghoul wearing dark glasses. The DPS unsheathes her sword, and the Healer yells “Stop! Let him do it.”\n\n\nYou pull out your staff and hesitantly approach the ghoul. The mindless thing bites on your neck and proceeds to rip it out with its teeth.\n\n\n“The Healer casts a hold-person spell on the DPS while she watches you die.”\n\n\n“Why!?” you scream out in pain.\n\n\n“Because last time around, you didn’t believe me. I remember that you were the one that killed me in the first place,” the Healer admits.\n\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#Please start over at “The Beginning” to try and understand whatever the heck that was.\n\t\t*goto the_beginning\n\n\n*label ghouls\nThe Healer presses a hidden switch on a wall, and a secret passage opens up.\n\n\n“How did you know that was here?” you ask.\n\n\n“I’ve mapped this place before,” she admits.\n\n\nYou follow her, with the DPS taking up the rear, guarding your six.\n\n\nAvoiding a couple of roaming monsters, you finally make it to a room with a shambling ghoul wearing black-out glasses. \n\n\nThe DPS unsheathes her sword, and the Healer yells “Stop!” She pulls out a book of blessings and chants loudly. Golden energy flows out of the book and starts to restore the ghoul in a similar way that we used the scroll to restore her.\n\n\nIn utter amazement, the ghoul is now a living being…no…it is your exact twin.\n\n\n“What is the meaning of this witchery?” the DPS demands.\n\n\nYou and your doppleganger are busy staring at each other, making the same facial expressions, almost like looking at the reflection of a slightly delayed mirror.\n\n\n“This is nothing more than proof that life is not at all what it seems. I have been testing a theory, but you might not want to hear it,” the Healer says.\n\n\nBoth you and the ghoul version say in unison, “I can handle it.”\n\n\n“I don’t know if I can handle two of you,” the DPS admits, leaning against the stone wall.\n\n\n“Here goes. I am not from your timeline. And this ghoul is someone who is also from my timeline. That is how I knew he was here. I’ve read about this in many holy books while trying to cure him. And it seems that our times are flowing into each other through a rift. I found this concept merely by accident.”\n\n\n“How many timelines exist?” you ask.\n\n\n“And which one is the original,” the other you chimes in.\n\n\n“I barely understand the full extent of this theory. I don’t know how or why or for how long. There could be endless possibilities coexisting at the same time and space.”\n\n\n“But what can we do about it?” you ask.\n\n\n“Murder your other self and move on,” the DPS interrupts.\n\n\n“No. We should survive as long as we can and write down everything we’ve learned in this journal I call…Caves and Dinosaurs. \n*achieve end65\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label heal_bot\nIt is nice having a companion that heals you for a change. Living a lifetime as a supportive role, you are used to putting yourself above others and never having the favor returned. \n\n\nYou walk along a cobblestone path, and one of the stones sinks into the floor. There is a grinding sound as a trapdoor above you spills runny mud all over you, like it is some sort of prank. The mud is thick and difficult to deal with. Every step feels like you’re walking with an extra 200 pounds on your back. Even raising your staff to attack proves to be taxing.\n\n\n“Oh, dear. It really got you, didn’t it? Hold still.” The Healer starts to pray, and water droplets form into a small cloud above you. Once it becomes too saturated with moisture, the cloud sheds its rain and washes away the muck.\n\n\nOnce the rain subsides, you whip your wet hair out of your face. That was refreshing. “I feel so much better. Thanks.”\n\n\n“That’s what I’m here for,” she says, biting her lip.\n\n\nTogether you continue on deeper in the cave. \n\n\nYou find a spot that is inundated with bears, but they aren’t normal, run-of-the-mill beasts. They appear as though they’re having a spot of tea around a flat rock which is posing as a table. They all turn towards you with salivating grins as if lunch just arrived.\n\n\nYou decide to hightail it out of there, grabbing your healing companion by the hand. One of the bears grabs her by the foot, and now you’re both tugging on her like she was a wishbone. If you had just one wish, it would to not be in this awkward situation.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\t\t\t\t\t\n\t\t\t\t\tYou manage to pull her free and get away safely. \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto emo_trap\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tThe strength of these bears, that incidentally walk on two feet, is incredible, and they pull her free from your grasp. \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t“No!” you yell, but it’s too late. She is gone to become the Goldilocks to this family of bears. Having a lot of siblings, you’re no stranger to being outnumbered and decide to save yourself and never look back.\n\t\t\t\t\tYou lose 1 SAVE.\n\t\t\t\t\t*set save -1\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto friend_three\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#You manage to pull her free and get away safely. \n\t\t\t\t\t\t\t*goto emo_trap\n\t\t\t\t\t\t#The strength of these bears, that incidentally walk on two feet, is incredible, and they pull her free from your grasp. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t“No!” you yell, but it’s too late. She is gone to become the Goldilocks to this family of bears. Having a lot of siblings, you’re no stranger to being outnumbered and decide to save yourself and never look back.\n\t\t\t\t\t\t\tYou lose 1 SAVE.\n\t\t\t\t\t\t\t*set save -1\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto friend_three\n\n\n*label emo_trap\n“Let’s get out of here!” you say, though you don’t have to tell the Healer twice; she’s already ten feet ahead of you. Almost losing her leaves you full of self-doubt and unexplored emotions. “I’m so sorry for that. I really didn’t support you in the way I wish I could.”\n\n\n“It’s okay. We survived,” the Healer says, trying to cheer you up.\n\n\n“No. That isn’t good enough. I need to try harder, be braver, and do more.”\n\n\n“You did fine. But may I suggest we get a little farther away from those freaky bears before we have a full-on chat about it?”\n\n\n“They were freaky, weren’t they?”\n\n\n“I think one of them was wearing pants.”\n\n\nYou let out a fair amount of laughter.\n\n\nSuddenly, a giant pillar collapses next to her. \n\n\nYou’re not sure if you have enough time to act, but you have to try.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto my_hero\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto doubt_trap\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Heroes.\n\t\t\t\t\t\t\t*goto my_hero\n\t\t\t\t\t\t#Doubt?\n\t\t\t\t\t\t\t*goto doubt_trap\n\n\n*label my_hero\nYou spring into action and manage to save the healer girl from the falling pillar. Scraped and bruised, but otherwise you’re okay.\n\n\nThe girl dusts herself off before noticing your limp. “Are you okay?”\n\n\n“I’ll be fine.”\n\n\n“No. Let me heal you.” \n\n\n“Don’t,” you say, holding up your hand. “Save it for yourself.” \n\n\n“But I’m not even hurt.”\n\n\n“And if you happen to get hurt, I wouldn’t want you to run out of heals.”\n\n\n“That’s sweet but…”\n\n\n“No buts, little missy. I have something up my sleeve.” You pat your satchel that is filled with your one and only potion.\n\n\n“Okay. Well, let me know if you change your mind,” she says.\n\n*choice\n\t#Do you drink your potion?\n\t\t*goto flamer\n\t#Do you save your potion for later?\n\t\t*goto ice_storm\n\n\n*label flamer\nAll your wounds disappear, at the same time the Healer’s smile reappears. Truth be told, you weren’t really that hurt, although it made her happy seeing you unscathed, and therefore it was worth it in your opinion.\n\n\nVenturing onward, you reach an area that is filled with thick smoke and raging fire. Still feeling like a hero and a gentleman, you pick up the Healer and carry her through the flames. Once safe, you both look at each other’s ashy faces. You lean in to kiss her, and she caresses your cheek as she closes her eyes, preparing for the embrace…\n\n\n“Your face. Are those blisters?”\n\n\n“Just a little sunburn.” You try and play off your injuries to get back to the moment before.\n\n\n“No. Here, let me heal you this time.”\n\n\n“Please, no, my lady. You must save it for yourself,” you reiterate. The fire has scorched her hair off, although she seems much more concerned about your wellbeing than her own. “You have the most beautiful hair. Please show it to me.”\n\n\nHer face grows red with color as she raises her staff. Magic flows out of it, and her silky locks sprout out of her head as if they were fast-growing plants. “I can do the same thing for you.”\n\n\n“That is all the healing I can ever ask for,” you say, admiring the view. Holding hands, you both walk a while until you reach a flooded room. There is a carefully laid-out path going across the subterranean swamp. Large aquatic mushrooms stick out of the water’s surface like lily pads. \n\n\nYou bow and allow her to cross ahead of you as you hold her staff and book bag.\n\n\nShe smiles and skips across the path with a child-like spring in her step.\n\n\nOut of the watery swamp, a long-toothed eel bites onto her leg. Dropping to your knees, you squeeze the eel’s neck until it lets go of her. Another one slithers out of the water and tries to pull her under. Your attention is now on that one. They keep coming, one after another after another. You manage to fend them off enough for her to get to her feet. \n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto closer_to_god\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto tragedy\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Do you believe in god?\n\t\t\t\t\t\t\t*goto closer_to_god\n\t\t\t\t\t\t#Do you believe in tragedies?\n\t\t\t\t\t\t\t*goto tragedy\n\n\n*label ice_storm\nYou enter an area, and the climate must have been magically altered somehow because there is a blizzard of ice and snow obstructing your view in all directions. \n\n\nYou remove your cloak and wrap it around the Healer’s thin silk robes.\n\n\nShe thanks you, and you both trudge through a foot or so of deep snow.\n\n\nYou feel a numbness as frostbite starts to set into your exposed skin.\n\n\nThe farther you go on through, the worse the storm gets. Frost is forming on your cheeks.\n\n\n“There is some shelter over there,” the Healer points out, though the white-out conditions block your line of sight.\n\n\nHand in hand, you make it to a small cave within the cave. Inside, you’re protected from the biting wind and snow underfoot. \n\n\nTogether you cuddle up for warmth.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto summer_nights\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto frozen\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Warm...\n\t\t\t\t\t\t\t*goto summer_nights\n\t\t\t\t\t\t#Cold...\n\t\t\t\t\t\t\t*goto frozen\n\n\n*label summer_nights\nUsing friction, you rub her shoulders to warm her up, but it isn’t working; it isn’t enough. There is no way for you to outlast this type of storm. You will freeze long before hunger pangs arise. \n\n\n“I’m so cold,” the Healer says.\n\n\n“I know. Just close your eyes and imagine that we’re on a beach. The sand is so hot that it burns your feet. Can you feel it?”\n\n\n“Yes…I think so.”\n\n\n“Good. I am there with you, holding your hand like this.” You blow on her dainty fingers to warm them up some.\n\n\n“That feels nice,” she says, a smile forming on her pale lips.\n\n\n“There is a bar selling cocktails right on the beach. The waiter has no shirt on, with tanned skin. He asks you what you would like to drink.”\n\n\n“Anything with coconut.”\n\n\n“Here is your drink, miss,” you say as you pop the cork of your healing potion. “We ran out of little umbrellas, but I hope this will do.” You bring the potion to her lips, and she takes a sip as if it were the coconut one from the fantasy. “Mmm, this is perfect. I’m so glad we decided to take this vacation.”\n\n\n“Me too, my dear. Now drink up before the ice melts.” \n\n\nShe takes another sip, and you see life returning to her cheeks. The healing properties are fighting the intense cold. As for your well-being, you can barely move your arms anymore. It will all be over soon, you know.\n\n\n“Do you see the sun setting?” you ask.\n\n\n“I do.”\n\n\n“Describe it to me. Leave out no details.”\n\n\n“The sun is so warm and bright, but also beautiful. The colors keep changing from a deep orange to a fiery red as is sinks behind the horizon. The sight really is spectacular. Maybe the brightest I’ve ever witnessed. What do you think?”\n\n\nAll you can do is slowly nod, as tiny icicles form below your eyes.\n\n\nHiding inside the daydream, you slowly drift off into a deep sleep.\n\n*if (Save > 0)\n\t*set save -1\n\tYou use a SAVE!\n\t\n\t\n\t*goto wake_up\n*else\n\t*goto frozen\n\n\n*label wake_up\nYou open your eyes, and you feel flush from the hot fireplace next to you. The last thing you remember is that you were inside the bizarre cave. This is some sort of cabin. The décor is rugged, and every surface is covered with some sort of animal hide. \n\n\nSomeone adds another log to the roaring fire.\n\n\n“Where am I?”\n\n\n“This is my home. You’re safe now,” they say.\n\n\n“Who are you?”\n\n\n“I am the Trapper. I was lucky to have found you when I did. You were nearly a block of ice.”\n\n\n“And what about the girl who was with me?”\n\n\n“There was no girl. You were the only one inside that tiny cave.”\n\n\n“We have to go back.” \n\n\n“You rest up first. Then we’ll talk.”\n\n\n“There is no time. We must go now. It’s dangerous in there. And she is all alone.”\n\n\nThe Trapper looks at you and pauses. \n\n\n“Please…”\n\n\n“I’ll get your things.”\n\n\nYou gain +3 SAVES!!\n*set save +3\n*goto supportive_duo\n\n\n*label frozen\n*image death.jpg\nYou both freeze to death within the hour. Months later, this room is cleared out after a party of adventurers kills the ice elemental that was guarding that room. \n\n\nAfter the snow begins to thaw, your corpses are found, preserved in time with your lips pressed against each other’s, with your bodies covered in sparkling crystals of ice.\n\n\nThe adventurers are so moved by your embrace, their whole party is abandoned, and they each independently decide to pursue happiness instead of riches and loot.\n\n\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#Start over at “The Beginning” to try and give love a chance.  \n\t\t*goto the_beginning\n\n\n*label tragedy\n*image death.jpg\nFour large eels are attached to your legs, and they drag you under the water. You paddle and thrash, but it is no use. An eel wraps itself around your stomach and squeezes tight, ejecting all the air you had left in your lungs. Soon, the water turns silent and still as you see a flicker of the Healer’s candle above the water’s surface as she searches for you. \n\n\nThere are small ripples made from her falling teardrops as they hit the water.\n\n\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#Go back to “The Beginning” and try to be cool; then maybe you might get the girl. \n\t\t*goto the_beginning\n\n \n*label closer_to_god\n*image death.jpg\nMore and more eels bite onto your flesh, and your blood is turning the swampy water dark red. The Healer is on the other side of the room, aiming her staff at you. Golden magic flows out of it, but it won’t touch you.\n\n\n“My healing won’t work. I don’t get it.” She points the staff again with the same result.\n\n\nPulling out your healing potion, you have forgotten that it was empty. Feeling cold, you raise your hand, “It’s no use. I’m a lost cause.”\n\n\n“No. I won’t give up.” She tries once more, but to the same effect.\n\n\nYou pass on to the next life. There you are transported to a room with countless doors. Above each door is a religious symbol. You discern that each path will take you to a different designated afterlife based on their faith.\n\n\nYou never gave death much thought, and you sit there for hours, maybe eternities, trying to determine what afterlife to choose. If for a second you thought there was going to be a test at the end of your life, you might have actually studied scripture every once in a while. \n\n\nAs far as you can see, there’s an endless bookcase filled with every religious text imaginable.\n\n\nSoon a little cherub approaches you with a note and extends it to you without a word.\n\n\n“What is this?” you ask.\n\n\n“It’s a prayer.”\n\n\n“For me?”\n\n\n“Yuppers.” \n\n\n“Thank you so much.”\n\n\n“I’m just doing my job.” The cherub closes its eyes and holds out his hand patiently. \n\n\nHoping that you aren’t reading this wrong, you place a gold coin in his palm.\n\n\nThe naked little guy accepts the gesture with a smile and takes off into the heavenly clouds above.\n\n\nThis all is very strange to you. But you accept it at face value and eagerly study your paper prayer.\n\n\nInside the note reads: \n\n\n“Dearest Support,\nWait for me in Sunshine Summit so that we might meet again in the afterlife.\nI’ll bring my heart if you bring yours.\n\n\nSincerely,\nThe Healer.”\n\n\nYou look around the room in order to question the messenger, but the cherub is long gone. \n\n\nWith the excitement of a child, you run around the lobby looking for the Sunshine Summit door.\n\n\n“Hey, watch it!” a goat person says as you almost crash into them.\n\n\n“Sorry, love is calling me, and I don’t dare be late.”\n\n\nNearly out of breath, you find the Sunshine Summit door. With a quivering hand, you open it, and this is where your real life begins. \n*achieve end66\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label doubt_trap\n*image death.jpg\nLeaping into action, you push the woman out of the path of the falling rubble. Instead, you are crushed completely, though you’re not nearly as crushed as the woman who fell in love with you as she watches you sacrifice yourself for her, all in the same breath. \n\n\nShe tries to resurrect your body, but the scroll isn’t working. She wanders on throughout the cave in search for a way to bring you back to her. She finds a mysterious book that she would normally destroy, but with you on the top of her mind, she decides to let its dark power influence her soul in order to gain insight into your resurrection. But through trial and tribulation, she never does.\n\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#Try again\n\t\t*goto the_beginning\n\n\n*label tank_time\nEarly on, you and the Tank have a good rapport. You are able to use your firework dust to influence any monster you come across and coax them into attacking your companion. While the Tank doesn’t do much damage with his double shields, you’re now able to whap at monsters with your staff without them showing you any interest. \n\n\nAlthough it would be nice to have a Healer, the Tank’s armor seems to be holding up to most of the bear scratches and bat bites and whatever monster you come across.\n\n\nAfter resting a bit, you enter a room with candles lit in a circle. Upon entering, there is a loud click, and you’re hit in the face with a rabbit corpse that must have been rotting for a long time. If the smell isn’t the worst part the maggots have to be.\n\n\nLooking at the contraption as you untangle yourself from it, it appears that someone set this trap, and the rabbit got itself snared in it a while ago. The tripwire that threw the corpse on you was still attached to the hook that killed the bunny.\n\n\nIt had to have been accidental.\n\n\n“Can you stand over there,” the Tank asks, while holding his nose. “You smell rank.”\n\n\nWrapping your cloak around your face, you attempt to dampen the smell. You can’t exactly stand downwind from yourself now, can you?\n\n\nDown the way, you are faced with a long-eared forest type. He has a bow and arrow in his hands and a bear companion by his side.\n\n\nYou dazzle the Tank with your firework dust, but this time the foe isn’t paying attention to him; instead, he shoots an arrow right into your arm. \n\n\nThe bear is also bounding towards you, even though you’re the farthest target. This is just not how things are supposed to go. Just when you think you have everything figured out, something like this happens to pull the rug out from underneath your feet.\n\n\nThis isn’t the first bear you guys have encountered, but this is the first time they even glanced your way. It has to be this rancid smell. The enemies hate it as much as the Tank does.\n\n*choice\n\t#Do you wash yourself with your healing potion?\n\t\t*goto bath_time\n\t#Do you flee?\n\t\t*goto im_hella_outta_here\n\n\n*label bath_time\nYou douse yourself with your healing potion; that actually heals your wounds, even though you hadn’t drunk it. Right away the bear changes course over to the Tank. Likewise, the forester is also leaving you alone with its barrage of arrows. \n\n\nThe smell wasn’t exactly washed away; it is more like the healing properties in the potion cured it of its negative effect. Let’s face it, you still smell bad.\n\n\nGoing back into your old routine, the Tank absorbs the blows while you get a few good whacks in when you can. Once the bear falls, the forester flees before either of you can get the killing blow. \n\n\n“That was a close one,” you say.\n\n\n“I’ve defeated a whole band of foresters at the same time back in my heyday. It’s a dirty shame that only one gave us trouble.” \n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto sleeping_beauties\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tThe Tank leaves the party.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto solo_rider\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Sleeping beauty.\n\t\t\t\t\t\t\t*goto sleeping_beauties\n\t\t\t\t\t\t#The Tank leaves the party.\n\t\t\t\t\t\t\t*goto solo_rider\n\n\n\n*label sleeping_beauties\nUpon entering a new section of the cave, you hear an eerie creaking sound. Off in the corner, you spot a rope net swinging from an old mining rafter. Inside the net are a couple women. They both call out to you “Hey, over here,” while reaching out their needy hands. They’re covered in soot, and it’s hard to make out their appearances.\n\n\n“What can I do for you?” you ask, noticing that their weapons are on the ground below them.\n\n\n“Can you free us from this trap?” one of them asks, their voice suddenly sounding sweet and higher pitched than moments ago. \n\n\n“How did you get caught in there in the first place?”\n\n\n“Someone is trying to murder us.”\n\n\n“Why would someone want to do that?” you ask, not wanting to get involved in any disputes, if possible. \n\n*choice\n\t#Do you free them?\n\t\t*goto cat_in_a_tree\n\t#Do you leave them be?\n\t\t*goto trap_zone\n\n\n*label cat_in_a_tree\nYou carefully and skillfully use a snipper tool to free the two ladies from the net. \n\n\n“Thank you so much. We might have died in there if you hadn’t come along and saved us,” the stronger-looking girl says while reclaiming her large sword. “I’m the DPS.” \n\n\nStanding next to her is the Healer.\n\n\n“Hey, I know you,” you say with a chuckle.\n\n\n“I’m sorry, but I don’t believe we’ve met before,” the Healer says, and based on her expression, you trust that she is correct. Something must be up.\n\n\n“Are you in trouble?” you whisper to her, thinking the DPS might be kidnapping her.\n“I. Don’t. Know. You,” the Healer reiterates.\n\n\n“I hear you. I would forget my name too if I didn’t write it down,” the Tank chimes in while pulling back his leather gauntlet. Sure enough, there are notes written all up and down his arm. Stuff like, “Bring two shields. You are not evil. Find your daughter. Nothing is what it seems.” And more crazy musings of an old coot.\n\n\nHowever, written on his other hand seems to be some kind of map. \n\n\n“Hey, what do you have there?” \n\n\n“I don’t…remember.”\n\n\nLooking over the rooms and backtracking from where you’ve already explored, you realize that this is, in fact, a full map of the cave, all the way down to the treasure room itself. If it weren’t for his long gauntlets being uncovered, you might have never known what was hidden there.\n\n\nWhile you were distracted, the two girls point their weapons at you in a menacing way. “Hand over your gear, your loot, and your food!” the DPS insists.\n\n\n“Are you being serious right now?” you ask with a slack-jawed expression.\n\n\n“Do I look like I’m joking around? Hand it over before I take both your hands,” the DPS threatens.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\t\t\t\t\t\n\t\t\t\t\tThey’re just kidding around and agree to go along with you on whatever quest you’re on.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto four_of_a_kind\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tThey take all of your worldly belongings, including the Tank, and leave you to fend for yourself in this dangerous cave.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto all_by_myself\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#They’re just kidding around and agree to go along with you on whatever quest you’re on.\n\t\t\t\t\t\t\t*goto four_of_a_kind\n\t\t\t\t\t\t#They take all of your worldly belongings, including the Tank, and leave you to fend for yourself in this dangerous cave.\n\t\t\t\t\t\t\t*goto all_by_myself\n\t\t\t\t\t\t\n\n*label all_by_myself\nThey strip you of all your belongings except your clothes. The DPS didn’t like their badly mended holes and loose threads. \n\n\nHow are you supposed to support people as the Support without your rope, bandages, potions, tinctures, book of positivity, and everything else? Instead you’re left to your own devices and to learn to fend for only yourself for a change. The first week is the hardest for you to adapt, but after that, this becomes your new normal.\n\n\nWithout your staff, you start to develop magical powers—a strength that you never would have found while relying on your bag of tricks. Little did you know that all your belongings were a crutch that prohibited your true potential. A long beard grows off your chin as the years go on.\n\n\nOne day, a young woman barges in while you’re catching up on some reading. She is talking all kinds of crazy talk about other dimensions and threatens you upon pain of death. Being lonely, you turn her into a dog, a corgi breed to be more exact. Together you spend the rest of your life together, and you love your pal unconditionally.\n\n*achieve end67\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label trap_zone\nYou leave the ladies entangled in the net, thinking that the real trap would have been sprung when you freed them—a clever ruse to try and catch you while vulnerable. “Not today. You have to get up pretty early in the morning to…” you begin to say, then get zapped by a magical spell. Surveying the area, you look for an enemy, but no one is there. Sizing yourself up and down you don’t appear to be injured. You open your mouth to speak, but no words come out; you’ve been magically muted! \n\n\n“What’s wrong?” the Tank asks.\n\n\nAfter playing the most counter-productive game of charades, you give up on the act and accept your silent fate.\n\n\nOut of the shadows, you see a squid-face gliding over to the Tank. You scream at him to watch out, but no words come out. You watch in horror as his brain is eaten raw, like sushi. \n*choice\n\t#Do you attack?\n\t\t*goto tentacle_horror\n\t#Do you not attack and run away with your tail between your legs?\n\t\t*goto ward\n\n\n*label tentacle_horror\nAs you approach the feasting squidman, you hear a voice inside your head. “Never interrupt a person while they’re eating.”\n\n\nAre you inside my head?\n\n\n“Yes,” the voice says.\n\n\nWhat do you want?\n\n\n“To finish eating.”\n\n\nThat is my friend you’re dining on. You suspect that it’s the squidman that is brain-speaking to you.\n\n\n“I can be your new friend. A better friend.”\n\n\nWhat do you know about friendship?\n\n\n“I’ve tapped into another dimension. There, I’ve seen an echo of a world where a group of people—Joey, Ross, Phoebe, Rachel, Chandler, and Monica—overcome many tribulations in order to become the bestest of friends.”\n\n\nThat seems made up.\n\n*choice\n\t#Do you let it finish eating your friend?\n\t\t*goto best_friends\n\t#Do you murder it while it's distracted?\n\t\t*goto think_again\n\n\n*label best_friends\nYou wait around as the beast devours your companion, one loud slurp after another. Once done, it daps its tentacles clean and lets out a loud burp.\n\n\n“Do you trust me?” the squidbeast that ate your friend asks from inside your own mind.\n\n\n“No,” you say aloud. There is no sense in lying to the mind reader. \n\n\n“I will give you anything your heart desires. Just think it, and it will come true.”\n\n\nThis seems a little far-fetched. Why would he give you such a gift just because you didn’t interrupt him eating?\n\n*choice\n\t#Do you think of becoming powerful?\n\t\t*goto power\n\t#Do you think of being self-sufficient?\n\t\t*goto self_help\n\t#Do you think of immortality?\n\t\t*goto immortality\n\n\n*label power\nYou think about becoming powerful, and the squidface begins to support you in this venture. \n\n\nAt first the struggle is real, and hard, then really hard. After sustaining a couple facial scars, you are able to destroy any adventurer who comes your way, and there are a lot of them, almost every single hour. This cave is quite popular.\n\n\nWith each kill, you are taught how to eat their brains and gain their knowledge. Soon your greed for power consumes you and you destroy everyone, including
