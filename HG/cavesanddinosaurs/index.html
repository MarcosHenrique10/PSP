epts it with a nod.\t\n\t#Keep it for yourself.\n\t\tYou hide the magical ball behind your back.\n\nAfter explaining to Strongman Garvin about your whole adventure, you get paid a small sum of money. Fighting the beast has helped exercise your memory, and you decide to go back to the monastery to confront your wife. You give your portion of the quest reward to the Healer as a donation to her church. \n\n\nUpon reaching the monastery, you find that your wife died of old age, years prior. All they had left was her journal that had many pages dedicated to your early life together, including many moments you shared with your daughter that you never remembered having. You notice that whenever she mentions your daughter, she never uses the word “our” to describe but rather “his.” That may be the sole reason for her departure.\n\n\nYou spend the rest of your days reading the journal and remembering who you are and reliving some of the happiest moments of your life.\n\n\nAnd you may or may not have a magical dinosaur to ride on.\n*achieve end11\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label pancakes\n*image death.jpg\nDo you like pancakes with syrup? Me, too. I mean, everyone loves pancakes, right?\n\n\n*choice\n\t#Yes.\n\t\tThat’s right, and so does the monster who first flattened you like a pancake, then gobbled you up like one. Go back to “The Beginning” to try again.\n\t\t*set deaths +1\n\t\t*set save 0\n\t\t*set character \"unknown\"\n\t\t*goto the_beginning\n\t\t\n\t#No.\n\t\tIt is an acquired taste, for sure. But like pizza, you may not like pancakes, but you’re going to eat them just the same. And that’s what the monster did, even though he didn’t enjoy it. \t\tGo back to “The Beginning” to try again.\n\t\t*set deaths +1\n\t\t*set save 0\n\t\t*set character \"unknown\"\n\t\t*achieve pancakes\n\t\t*goto the_beginning\n\n\n*label why_cant_i_kill_it_again\n“I’ll give you one chance to convince me that this is in fact that buff guy’s pet and not some rare magical beast that I should exterminate for sport.”\n\n\n“Fine. His holiness told me that his pet is attracted to this scent.” She pulls out a large vial from her sack. “Then he told me to do this.” She pops open the cork and douses herself with the brownish liquid.\n\n\n“What are you doing?” you ask, snatching the vial out of her hand. Its label is written in elvish. In your youth, you were able to decipher the language after taking three years of it in knights’ school, but currently you have all but forgotten. “Can you read this?” You look up just in time to notice the Healer getting gobbled up by the horrendous beast. Her legs flail as the beast slurps them inside its mouth like spaghetti noodles.\n\n\nSo many emotions are going through you right now that you don’t know how to express yourself.\n\n*choice\n\t#Do you fight it?\n\t\t*goto dino_fight\n\t#Do you flee?\n\t\t*goto alone\n\t#Do you stab it, thee flee?\n\t\t*goto alone\n\t#Do you attack it super hard?\n\t\t*goto dino_fight\n\n\n*label dino_fight\n*image death.jpg\nNot caring about the sole reason for this escapade, you rush in to slay the beast except it swoops down and eats you in one bite. It wasn’t hard, really…not the eating part, but more the chewing part. To be fair, it was more like the first bite cut you in half, and then it played with your legs a bit by thrashing them around in its mouth some. \n\n\nDon’t worry, all the bards are still singing songs about your death, and it was a hell of a way to be remembered. The only question was, who was around to witness it? \n\n\nIf you didn’t want to be dino food, please restart your adventure back at “The Beginning.”\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#Start over.\n\t\t*goto the_beginning\n\t\t\n\n*label its_a_bigger_monster\nOut of the darkness, you take aim at the small reptilian eyes, thinking this will be an easy fight to get your muscles all warmed up. You plan on felling this small fry by simply tossing a shield at it.\n\n\nThen a dozen or so glowing eyes instantly appear around it in a cluster. You’re going to need a much bigger shield if you want to get them all.\n\n\nThe Healer holds out her candle to reveal the true horror set before you. It looks like a pile of angry snakes that are attached to a grey-skinned woman’s head as if they were her wig. While the woman appears to be sleeping, or possibly dead, the snakes reach for you off of her unmoving body. \n\n\n“We have to help her,” the Healer says, prodding at the snakes, trying to keep them at bay. \n\n\nHer actions prove that the Healer must not understand the severity of this famous monster.\n\n\nThe snake-haired girl leaps to her feet and opens her eyes wide, staring right into your soul. It’s either your arthritis flaring up because of the impending rain, or you’re being turned into stone!\n\n*if (Save > 0)\n\t*set save -1\n\t*goto lets_get_out_of_here\n*else\n\t*goto seducea_medusa\n\n\n*label seducea_medusa\nThis is no ordinary snake pile, or girl, for that matter. It’s a monstrous combination of both. The scariest part about her is the peculiar way she moves her body with quick jarring motions. Only the snakes resting upon her crown have natural movements among them. Of course, that is if they are growing out of her skull.\n\n\nThe snake-haired girl has bewitching eyes and you’re lost inside of them, marooned with this feeling of despair. Images of past failures flash before your eyes. The queen, you always loved her but kept your true feelings a secret. And in your elder state, you kept them even from yourself. Though the old queen has long since passed away, you experience the trauma as if it were happening all over again.\n\n\nSeeing you in this entranced state, the Healer prays for a miracle with her heavenly power.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto snake_charmer\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto stone_cold\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Are you a charmer?\n\t\t\t\t\t\t\t*goto snake_charmer\n\t\t\t\t\t\t#Are you hardened?\n\t\t\t\t\t\t\t*goto stone_cold\n\n\n\n*label snake_charmer\nThe Healer has done something spectacular; she cured your mind. Not in a way of bringing back all of your forgotten memories, but quite the opposite. Whatever thought the snake-haired girl was inspiring, your vision had been blocked out. \n\n\nWith your wits and movement now restored, you’re ready to fight this fiend until it is good and dead. Using your shield to block your line of sight, you blindly go into battle with a combination of ramming and shoving attacks. Each direct hit causes the snakes to hiss and snap at the shield. This defensive tactic is slow going but also effective. \n\n\nYou feel an incredible strain on your shield and realize that her magical stare had turned it into stone, making it much heavier.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 3\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto greater_healing\n\t\t*if (dieroll = 2)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto sacrificial_healing\n\t\t*if (dieroll = 3)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto stone_cold\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Get healed?\n\t\t\t\t\t\t\t*goto greater_healing\n\t\t\t\t\t\t#Sacrificial healing.\n\t\t\t\t\t\t\t*goto sacrificial_healing\n\t\t\t\t\t\t#Get stoned?\n\t\t\t\t\t\t\t*goto stone_cold\n\n\n*label greater_healing\nFighting the snake girl, you feel your bone and joints stiffen with every move you make. Then prismatic light launches out of the Healer’s staff, and you suddenly feel young again, as if you were back serving the queen’s guard.\n\n\nOut of nowhere, you suddenly recall an attack combination that used to be one of your go-to’s.\n\n\nThe Healer’s power really is something else. Using your past skill, you’re moving like an unstoppable juggernaut. \n\n\nImpervious from damage, you strike hard and fast, never letting up. Strike after strike, you tear into the girl, thinking nothing of her gender and only of her monstrous appearance. \n\n\nAfter pummeling the snake girl into a mass of severed snake parts, you are victorious.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou loot the corpse and find an ornate ring that looks familiar to you.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto spot\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto falling\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Loot the corpse and find an ornate ring that looks familiar to you.\n\t\t\t\t\t\t\t*goto spot\n\t\t\t\t\t\t#You hear a snapping sound, and the floor below you crumbles. \n\t\t\t\t\t\t\t*goto falling\n\t\t\t\t\t\t\n\n\n*label sacrificial_healing\nThe snake-haired girl opens her eyes once again, and a bright green light flows out of them. \n\n\nOut of healing, the Healer jumps in front of the beam, shielding you from its magical effects. From her toes on up, her body turns to grey until her whole self is a mere statue. \n\n\nYou look upon her innocent face and see so many years that had been stolen from her. You recall an incident where your daughter was forced to work the castle’s fields. Tears fell down her cheeks as she begged you for protection. You failed her that day just as you failed to protect the Healer now. \n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tIn a rage, you bash the stone-gaze snake-girl until there is nothing left but a bloody smear.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto despair\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tBefore you can invoke your revenge, the snake-haired girl stares you down with her prismatic eyes. \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto stone_cold\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#You bash the stone-gaze snake-girl until there is nothing left but a bloody smear.\n\t\t\t\t\t\t\t*goto despair\n\t\t\t\t\t\t#Before you can invoke your revenge, the snake-haired girl stares you down with her prismatic eyes. \n\t\t\t\t\t\t\t*goto stone_cold\n\t\t\t\t\t\t#Venture on alone.\n\t\t\t\t\t\t\t*goto alone\n\n\n\n*label stone_cold\n*image death.jpg\nTime is utterly lost to you, as you feel your body become forever still, hardened by the beautiful gaze that has fallen upon you. You have found perfection, and its merriments are endlessly shown upon your stone expression. Serving as both a corpse and headstone, you are dead, although this moment in time lives to be debated among scholars and art critics throughout history. “What do you suppose they were thinking in that moment?” they will ponder. But only you will know the answer to their casual wonder. \n*set save 0\n*set character \"unknown\"\n*set deaths +1\n*choice\n\t#Please go back to “The Beginning” and try again.\n\t\t*goto the_beginning\n\n\n*label lets_get_out_of_here\nRushing out of the room, you wind your way down a path that spills into a small room with cracks throughout the floor and ceiling. Due to your low light, you’re not sure how many intersections you’ve missed on your way here. On the far side of the room, there is a wooden arch leading onward, deeper inside the cave.\n\n\nYou get a strange sense about this room but proceed inside anyway. Taking your first step, the cracks start to grow and spread out like a spider’s web. With both you and the Healer standing on the delicate floor, you’re sure that the whole room is going to collapse at any moment, though it might already be happening.\n\n\nTrying your best to be as still as possible, you hear the Healer continuing on as normal, humming a gentle tune. \n\n\n“No. Wait!”\n\n\nThe whole room begins to crumble like a fresh-cooked pastry. The décor, stone walls, floor, ceiling…everything. This had to have been a trap.\n\n*if (Save > 0)\n\t*set save -1\n\t*goto rescue\n*else\n\t*goto falling\n\n\n*label rescue\nYou see the look of horror upon the Healer’s face as she descends. This very look reminds you of your daughter. In fact, up until now, you had forgotten that you had any kin to speak of. Your past is always fleeting, coming in and out of existence like the tide.\n\n\nActing on your tanking instincts alone, you dive in to catch her. Once you feel her soft hand against yours. You slam your shield above you, and it catches on to a piece of the floor that is still hanging on by a thread. Together you dangle on the edge like a ripe piece of fruit, ready to fall.\n\n*fake_choice\n\t#Climb up?”\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto spot\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\tShe slips through your hands.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto falling\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t#You find a dinosaur.\n\t\t\t\t\t\t\t\t\t*goto spot\n\t\t\t\t\t\t\t\t#You drop the girl.\n\t\t\t\t\t\t\t\t\t*goto falling\n\t#Climb Down.”\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto rubble_rubble\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\tShe slips through your hands.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto falling\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Make it out safely.\n\t\t\t\t\t\t\t\t\t*goto rubble_rubble\n\t\t\t\t\t\t\t\t#You drop the girl.\n\t\t\t\t\t\t\t\t\t*goto falling\n\n\n\n*label falling\nYou watch the Healer slowly fall to her doom. It’s as if time has slowed down just to torture you. \n\n\nWith all of your being, you try and let go to fall down with her, though you feel as if a force bigger than you is preventing you from doing so. There has to be a ward or some sort of magical spell standing in your way. That is the only fathomable explanation. All you can do is scream through the moment. “Noooooo.”\n\n\nShe lands a couple stories below with a loud thud. Unfortunately, she doesn’t get up from her crushing injuries.\n\n\n“What will I even tell them to put on your headstone? I didn’t even catch your name.” The gravity of the situation starts to hit you—there will be no funeral nor a grave, headstone or otherwise. This is will she will rest until only her bones remain. “Go with peace to the beyond. I will pray for you every day, even though it’s not my way.” \n \n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto alone\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto despair\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Are you alone and sad?\n\t\t\t\t\t\t\t*goto alone\n\t\t\t\t\t\t#Are you in a pit of despair?\n\t\t\t\t\t\t\t*goto despair\n\n\n*label i_cant_see_a_thing\nHearing the sound behind you this time, you spin around with your shield in front. “Oof,” you say as you bump into the Healer, knocking out of her hands the only light source. Now you’re both in the dark, and the sound is now right next to you.\n\n\n“Who’s there?” the Healer asks, with a slight tremble in her voice. \n\n\n“I’m not sure, but I’m not taking any chances.” You swing your shields wildly at anything that moves, though it’s just out of your reach.\n\n\nYou hear a woman’s scream, and you rush to the spot the sound originated from. \n\n\nDancing around with your paranoia, you swing your shield around until you finally connect with something. Then you continue to bash it over and over, until it stops moving. You re-light the candle, and you start to see exactly what you attacked.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto its_a_monster\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto despair\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#You killed the Healer.\n\t\t\t\t\t\t\t*goto alone\n\t\t\t\t\t\t#You killed the healer and you're not sad about it.\n\t\t\t\t\t\t\t*goto alone\n\t\t\t\t\t\t#It wasn't the Healer who you attacked.\n\t\t\t\t\t\t\t*goto its_a_monster\n\n\n*label despair\nAfter failing to save the very person you aimed to protect, you’re left in deep, deep depression. You decide to hide your shame away inside this cave, never to surface to the outside world again.\n\n\nTime is not kind to your body or mind, and as the years fly by like weeks, you’re uncertain what kind of a person you’ve become, or if you’re even a person at all because there isn’t any humanity left in you. Visitors often cower at the sight of you, and women wince at the smell of you. But in all cases, they attack you without a hearty greeting.\n\n\nYou might as well be called a bandit or even a monster since you’ve resorted to robbing people blind to help pass the time.\n\n\nThe End\n\n\nWant a better ending for yourself? Please start back at “The Beginning” and try again. Unless this is what you were going for, then, good on you.\n\n*achieve end12\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label rubble_rubble\nYou both safely make your way down to an old mining tunnel. There are shattered support beams that obviously didn’t do their job.\n\n\nAfter dusting yourself off, you continue on many intersecting paths that are dimly lit by lanterns hanging from old metal hooks. This is quite pleasant enough until it isn’t.\n\n\nThe mining tunnels seem to be going in circles, and you know for sure that you’re lost.\n\n\nAlmost on cue, you hear a male voice say, “Are you lost, friend?”\n\n\n“Why, yes, we are,” you answer without thinking who is doing the asking.\n\n\n“Would you like to take a free personality test?”\n\n\nThis time you notice a man in a blue button-up shirt, black tie, and some extremely uncomfortable-looking slacks, leaning up against the stone wall. You get the sense that he isn’t hostile, despite his blinklesss stare.\n\n\n“What is a personality test?” you ask.\n\n\nBefore the man can answer, the Healer interrupts. “Don’t do it. They are trying to trick you with a brainwashing technique where they tell you that your life is all messed up and how they’re the only ones who can fix it,” she scolds. \n\n\n“You’re just a suppressive person, like that anonymous masked fellow,” the man accuses.\n\n\n“What are both of you going on about?” you ask, waving your hands back and fourth.\n\n\n“I’m from the church of Scientology. Our founder L. Ron Hubbard developed this new technology to…”\n\n\n“It’s not a church, it’s a cult!” the Healer interrupts, spitting on the floor next to him.\n\n\nAghast, the Scientologist hands you a small book titled “The Way to Happiness” while holding his other hand in front of the Healer’s face. He obviously doesn’t take well to criticism. \n\n*choice\n\t#Do you take the book?\n\t\t*goto one_little_book_cant_hurt\n\t#Do you reject the book?\n\t\tThe Healer starts to chant “Xenu, Xenu, Xenu,” and the Scientologist runs away while covering his ears.\n\t\t\n\t\t\n\t\t*goto spot\n\t#Do you scare away the cultist?\t\t\n\t\tYou say, \"I hate Tom Cruise\" and the cultist jumps on a couch and flies away.\n\t\t\n\t\t\n\t\t*goto spot\n\t\n\n*label one_little_book_cant_hurt\nFirst you flip through The Way to Happiness book, because, why not. It is mostly filled with common sense and tools on being a good person. Then you take a couple of their self-help courses at the local center. They’re affordable at first, but soon each step costs you an exorbitant amount of coin, coin you can’t rightfully afford. \n\n\nAt last, you’re forced to join their paramilitary group called the Sea Org in exchange for the courses. Addicted to the tech, you are now a full-fledged member and decide to cut all ties with your friends, family, party members, and associates in order to be free from suppression and entheta.\n\n\nYou live the rest of your life working 120 hours a week for virtually no pay, eating only beans and rice. And you love it, because you’re too tired to know otherwise. Plus, you get to meet Tom Cruise. \n\n\nThe End\n\n\nPlease start back at “The Beginning” and never trust a Scientologist. Yes, they might look friendly, but it’s really a sales tactic called “love bombing.”\n\n*achieve end13\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label two_healers\nThe Healer marks down the cave’s entrance on the center of the map with little hash marks showing the exit. “Ready when you are.”\n\n\n“After you, Healer,” you say.\n\n\n“No, after you, Healer,” she says playfully.\n\n\n“Let’s go in at the same time,” you reason.\n\n\nShe agrees, and you both enter the cave as equals, side by side.\n\n\nThe cave is dark, with the limited light coming from the entrance. \n\n\n“Do you have a light?” the healer asks you. “All I have is this candle of faith, but I don’t feel like fate wants me burning it at the moment.”\n\n\n“I don’t think I…” You glance inside your gear as a gesture but notice a rusty lantern in your inventory. “I suppose I do have this old thing.”\n\n\nYou were a little embarrassed that you have no recollection of having such a light source.\n\n\n“Splendid,” she says with a smile.\n\n\nUpon lighting the lantern, you see a dozen or so green creatures staring back at you.\n\n\nThe Healer girl lets out an ear-piercing scream. \n\n\nHearing the girl’s deafening cry causes all the brownish-green creatures to scatter in all directions.\n\n\nYou jump in front of the girl, unknowingly letting your tanking instincts kick in. \n\n\nShe allows you to take the lead, and once all the goblinoid creatures have vacated the room without instigating a battle, she places a gentle hand on your shoulder. “Thanks, but you can just heal me next time.” \n\n\nTaken aback, you size yourself up and down, looking for any evidence of injury, and then you realize it was merely a joke. “Oh, I see. That’s funny.”\n\n\nHolding the lantern above your head, you notice a passageway leading up a crude staircase on the far end of the oddly shaped room. This exit would have been left in shadow if you hadn’t used the powerful light source.\n\n*choice\n\t#Do you climb in the secret passage?\n\t\t*goto unstable_ground\n\t#Do you take the exit the monsters fled out of?\n\t\t*goto map_it\n\t#Do you close your eyes and let fate decide?\n\t\t*goto map_it\n\t#Whatever you decide, it's a secret.\n\t\t*goto unstable_ground\n\n\n*label unstable_ground\nWhile you’re climbing up the eroded stairs, you hear a light squeaking sound from above. You keep your head down as the stairs are literally breaking apart underfoot.\n\n\n“This doesn’t seem very safe,” the Healer admits with worry in her voice.\n\n\n“I tend to agree with you.”\n\n\nNearing the top, the Healer starts to stumble and lose her footing. You’ve ascended quite high, and a fall from this distance wouldn’t go un-scathed. There is very little time to act, and you much be swift with your intent.\n\n*choice\n\t#Do you defy your role as a healer and try to protect her, as tanks do?”\n\t\t*if (Save > 0)\n\t\t\t*set save -1\n\t\t\t*goto back_to_basics\n\t\t*else\n\t\t\t*goto unreliable\n\n\t#Do you let her fall and heal her afterwards, as healers do?\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto angel_wings\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto falling\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Nothing happens.\n\t\t\t\t\t\t\t\t\t*goto falling\n\t\t\t\t\t\t\t\t#Something happens.\n\t\t\t\t\t\t\t\t\t*goto angel_wings\n\n \n*label back_to_basics\nWithout giving it another thought, you grab the girl’s staff and pull her back onto the ledge. It’s like your adrenaline gave you incredible strength.\n\n\nShe holds on to you for dear life, and you are reminded of a much simpler time, when you had a family of your own.\n\n\nFor a moment she seems almost familiar to you, like a person from a past life, maybe. These are not romantic feelings, since she isn’t but a child to you. But rather, it’s the togetherness you’ve long since missed. “You remind me of a person I’ve nearly forgotten.”\n\n\n“Is that a bad thing?”\n\n\n“Heaven’s no,” you say, wiping a tear from your eye.\n\n\n“Then why are you crying?”\n\n\n“I don’t rightfully know.” You separate yourself from her and let out a series of coughs. “We better move on. That map isn’t going to draw itself.”\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto stairs\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto oh_bats\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Stairs are cool.\n\t\t\t\t\t\t\t*goto stairs\n\t\t\t\t\t\t#Bats are cool.\n\t\t\t\t\t\t\t*goto oh_bats\n\n\n\n*label stairs\n“Oh, my,” the Healer says upon reaching the top.\n\n\nTowering above you both is a half-man, half-horse creature. You haven’t seen one of those in a long while. “Farrin?” you ask, but before he can answer, you remember that your friend Farrin died in the battle of Grey Steel. \n\n\n“I am Nameless Jo,” the creature says.\n\n\nYou open your mouth to point out the error in his name but decide to let it go. He’s half-horse; he has enough to deal with.\n\n\n“What can we do for you, Nameless Jo?”\n\n\n“I seem to be in a predicament. You see, I would like to leave this cursed dungeon, but my horse side won’t let me go down these here stairs.”\n\n\nThe Healer is fixated on his chiseled muscles on his tunicless chest. \n\n\nYou notice that his horse half also isn’t wearing any pants, which means…this guy is full-on naked.\n\n*choice\n\t#Do you help the horseman?\n\t\t*goto im_on_it\n\t#Do you send in the girl to help?\n\t\t*goto wingman\n\n\n*label im_on_it\nYou stand behind the horse end and abruptly bang both your shields together, scaring the dickens out of the sexy horse guy.\n\n\nHe gallops, then neighs before stumbling down the stairs, crashing on the hard ground below. That was a horrifying sight to witness. You quickly yet carefully head back down the stairs after him. \n\n\n“What were you thinking??” the Healer cries out as she follows behind you.\n\n\n“I thought it was all in his mind or something.”\n\n\n“No. Horses can’t go down stairs, you idiot.”\n\n\n“How was I supposed to know that?”\n\n\n“Everyone knows that!” You both stop bickering once you reach the ground floor.\n\n\nAfter a quick observation, you realize that he has two broken legs but is still alive. Knowing that he will “probably” never walk again, you must decide what to do.\n\n*choice\n\t#Do you put him out of his misery?\n\t\t*goto euthanize\n\t#Do you heal him?\n\t\t*goto my_bandages\n\n\n*label euthanize\nYou pull back your shield and begin to bludgeon him, but your shield isn’t cutting it. You continue to bash over and over again, but Nameless Jo is strong and resilient. \n\n\nThe Healer pleads with you, “Stop! You’re killing him!”\n\n\n“Isn’t that why we’re here?” you ask, looking at her, confused. “I mean, clearing dungeons of his ilk isn’t exactly a new concept.”\n\n\n“No!” She pushes you off of the monster, showing who the real monster is in this moment. “That wasn’t our quest, to murder beautiful, majestic beings.”\n\n\nShe must be delusional, or under some glamor spell. If “they” got to her, “they” can get to you…\n\n\nYou look at her as if she’s next.\n\n\nShe takes a couple steps backwards, shaking her head in disgust.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*set save -1\n\t\t\t\t\tYou lose 1 SAVE!\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto my_bandages\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto shame_on_you\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Use your bandages?\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*set save -1\n\t\t\t\t\t\t\tYou lose another SAVE.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto my_bandages\n\t\t\t\t\t\t#You attack.\n\t\t\t\t\t\t\t*goto shame_on_you\n\n\n\n*label my_bandages\nAfter counting backwards from ten, you cool off. You attempt to make right and heal his wounds, but your bandage wrappings aren’t quite cutting it. \n\n\nThen the Healer pushes you aside and casts her magical force upon him, fixing his legs and the rest of his unnecessary injuries.\n\n\nNameless Jo looks at her like an angel sent from heaven above to save him.\n\n\nOnce able to stand, Nameless Jo kneels down and kisses her hand. \n\n\n“See, I did it,” you boast, about getting the horse down the stairs.\n\n\n“That is enough out of you. I hate you and never want to see you again,” the Healer says, giving you a shooing motion with her hand.\n\n\n“Yes, my lady.” You hang your head down low and continue on with your journey alone.\n\n\nDisappointing her was like disappointing your own daughter, if you ever had one. And leaving her alone with this strange horse guy made you feel like a failure of a father, even if she wasn’t your own kin. It wasn’t your finest moment, but it was your finest failure.\n\n*choice\n\t#You are sad.\n\t\t*goto despair\n\t#You are a somewhat sad.\n\t\t*goto despair\n\t#You are mildly sad.\n\t\t*goto despair\n\t#Meh...\n\t\t*goto despair\n\t\n\n*label wingman\n“She can help you,” you say, shoving the girl’s back, causing her to take one step closer. \n\n\nThe Healer becomes instantly flush and bats at your arm. “What are you doing,” she whispers.\n\n\n“Just give it a shot; I don’t know.”\n\n\nShe then flashes you a disgusted look, and you know she’s putting it on.\n\n\n“Hi. Uh…I am trying to…um.” The Healer tries to first push the beast from the back, but it doesn’t budge. Then she tries to pull, and that still doesn’t work. Soon she awkwardly climbs on his bare back and whispers into his ear. He closes his eyes as if he trusts her completely. \n\n\nSoon, bright magical wings sprout out of her back, and she oh so gently carries him down the stairs, safe and sound. \n\n\nWhen Nameless Jo opens his eyes, he falls in love with her, and they kiss. \n\n\nAs a surrogate parent, you give her away at their interspecies wedding. \n\n\nThey have a kid, because that is possible somehow, and name it after you. You have finally found the family you had always wanted.\n\n*achieve end14\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label oh_bats\nYou hear a loud squeaking sound, and it is only getting louder until it is right overhead.\n\n\n“What do you suppose that is? A squeaky wheel of a cart, perhaps?” the Healer asks.\n\n\nYou shake your head back and forth. “It’s coming from…whoa.” You and the Healer both duck under the giant creature that is about the same size as you.\n\n\n“Is that the magical flying dinosaur?” the Healer asks, frantically swatting at her hair as if something got into it.\n\n\n“No. It’s just a bat.”\n\n\n“That was not just a bat. It was a bat-man!”\n\n\nAlmost on cue, it turns around and prepares to make another pass.\n\n\n“Here it comes!” the Healer says, cowering.\n\n*choice\n\t#Do you attack the bat?\n\t\t*goto batter_up\n\t#Does the Healer attack?\n\t\t*goto healing_time\n\t#Do both of you attack?\n\t\t*goto faster\n\n\n*label batter_up\nYou get ready to slam the oversized flying rat when it grabs ahold of you with its sharp claws, which burrow deep inside your flesh. Golden light shoots out of the Healer’s staff, eliminating the piercing pain, but it isn’t enough.\n\n\nThe bat carries you out of the room and down a corridor and on to an open area. You can see stars above you. You can’t help but wonder how have you been inside the cave? It was light when you first entered.\n\n\nEverything happens so fast, it’s hard to determine where you’re going and where you’ve been or how you will get reunited with the Healer at this point. \n\n\nFeeling free as the wind blows through your hair, you take a moment to clear your mind and just enjoy the ride.\n\n\nThat is until you feel the warmth of blood dripping down your arm. You have to do something before it’s too late and you become lost forever.\n\n*if (Save > 0)\n\t*set save -1\n\t*goto broken_wings\n*else\n\t*goto i_can_see_my_house_from_here\n\n\n*label broken_wings\nFolding your body, you’re able to pry open the bat’s claws and free yourself from its grasp. Pinching its claws with your legs, you’re now dangling upside down from the flying beast. \n\n\nYou lean left and right dodging jagged rocks and other obstacles that you nearly collide with.\n\n\nReaching up, you grab ahold of both the bat’s wings, and using only your brute strength, you manage to stop them from flapping. This is a maneuver you used once when you had a run-in with a griffon. It worked then, and it’s working now! Twisting and turning in all directions, you’re rapidly descending until... \n\n\nCrash! You both tumble to the ground. Motionless, you figure that the bat must have snapped its neck on the landing. \n\n\nBloody and nearly dead yourself, you use some bandages to patch up your injuries. \n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto me_and_my_sword\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto lost_in_space\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Go on an adventure?\n\t\t\t\t\t\t\t*goto lost_in_space\n\t\t\t\t\t\t#Brandish your weapon?\n\t\t\t\t\t\t\t*goto me_and_my_sword\n\n\n*label me_and_my_sword\nWhile looting the bat, you discover that it had somehow swallowed a large sword. This is a huge upgrade from what you’ve been using, though you’re still a little wary that you might not be up to the task of reverting back to your old fighting style. But with a weapon in your hand, you relive your glory days, one kill at a time. Exercising your physical body has begun to heal your mental lapse. This only encourages you to continue on deeper, slaying beast after beast after beast.\n\n\nYou recall that you once saved the queen from her archnemesis—boredom and spent many nights in her company. It was an affair to remember, and one you wouldn’t soon forget.\n\n\nThe fight has given you back your youth, and with that you decide to never leave the cave for fearing that you would go back to your old habits.\n\n\nIt has been rumored that the cave is haunted, and often people hear murmurs such as “I remember my first time killing one of you,” or some chants of an old war song.\n\n\nYou are happy, free, and whole again for the first time in a long time.\n*achieve end15\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label i_can_see_my_house_from_here\nThe bat continues to pick up aerial speed and soars through stalactites that hang off the ceiling. You’re getting a bird’s eye tour of the whole cave. Too bad you don’t have the map in order to jot down each room’s location. \n\n\nOnce you reach a large ravine and the giant bat keeps ascending in circles until you’re so high that a drop would surely liquify you on impact, only it has something worse in mind for you.\n\n\nYou hear a chorus of baby bat squeaks as you approach the nest.\n\n\n“Wait a minute. Bats don’t have nests!” you blurt out. Though you are technically right, this nest of baby rodents doesn’t care much for semantics. You suspend your disbelief and have to make a tough choice.\n\n*choice\n\t#Do you try and break free?\n\t\t*goto down_you_go\n\t#Do you take your chances with the nest?\n\t\t*goto feeding_time\n\t\t\n\n\n*label down_you_go\n*image death.jpg\nTime is of the essence, and you bite down on the bat’s talons, and warm rabies-infested bat blood sprays into your gnawing mouth. The bat screams out in agony in a frequency you cannot hear, but your ears ring out as the pain hits you regardless.\n\n\nNow you’re weightless, falling out of the sky like a stone. \n\n\nThe ground is coming up faster and faster until it’s here. You are dead, and ground rats quickly come by to pick your flesh from your bones.\n\n\nIf you as rat food wasn’t the ending you were looking for, go back to “The Beginning” and try again.\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#Try again\n\t\t*goto the_beginning\n\n\n*label feeding_time\n*image death.jpg\nThe giant bat reaches its nest perched atop a jutting-out stone and drops you into a pile of furry, fuzzy-winged rodents the size of large cats. Before you can begin to fight them off, you are swarmed by twenty vicious rodents that rip you into pieces, one cute little bite at a time.\n\n\nYou can’t help but feel as though you’re part of the circle of life. You’ve lived a long enough life, and you find giving your body to a group of hungry babies, even though their sharp teeth give you an unbearable pain, isn’t the worst way to go. \n\n\nBut if you would like to find the worst way to go, start over at “The Beginning” and try again.\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#Try, try again\n\t\t*goto the_beginning\n\n\n*label healing_time\nYou motion to the Healer to do her thing, and you pull out your bandages, ready to administer some first aid. \n\n\nBefore she whaps the bat with her staff, she gives you a puzzled look. “Is that what you plan on healing me with?”\n\n\n“Yes. Why?”\n\n\n“You moron. I thought you had some magical ability or spell. You’re going to get me killed, get us both killed.”\n\n\nBefore you could defend your position, the bat beat its wings hard, letting out a huge gust of wind. The Healer is blown out of the room and on to god knows where. It’s just you and the bat now. \n\n\nWithout someone to heal, your whole role is kind of kaput.\n\n*choice\n\t#Go after her?\n\t\t*goto there_she_goes\n\t#Fight the bat?\n\t\t*goto broken_wings\n\n\n*label faster\nYour feet move faster and faster until you’re in an all-out sprint. It’s been a long time since you’ve reached speeds like this; it is almost invigorating. \n\n\nThen you remember your companion, who you left far behind. Using the back of some parchment you received from the queen honoring your service, you start to jot down the last couple rooms you blew through so that you won’t end up lost. \n\n\nThen some form of undead creature wearing sunglasses shambles in and interrupts your run.\n\n\n“Hey, there, fella,” you say.\n\n\nThe rotting creature gives you a horrible moan as a response.\n\n\n“Okay…” Not being fluent in zombie, and also not wanting to fight without a real weapon, you decide to keep running until you can catch up with your companion once more. “It was real, it was nasty, and you’re real nasty,” you say as you exit.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto leroy_jenkins\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto lost_in_space\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Leroy Jenkins??\n\t\t\t\t\t\t\t*goto leroy_jenkins\n\t\t\t\t\t\t#Get lost in space?\n\t\t\t\t\t\t\t*goto lost_in_space\n\n\n*label unreliable\nYour initial response was to keep to your role and let her fall, but then you decided to save her anyway. You reached out and grabbed her arm, pulling her into you. You can feel her racing heartbeat against your chest. Only that wasn’t what happened. Instead, it felt as if time had reversed, and this time you stood there watching her fall, powerless to do anything about it.\n\n\nShe casts some regeneration spell on herself right before going splat on the stone ground below.\n\n\n“Are you okay?” you call out.\n\n\n“No. You were supposed to heal me, and you just stood there, doing nothing.”\n\n\n“I tried to grab you, but something strange happened. I can’t explain it,” you admit, replaying the incident in your head.\n\n\n“I can. It’s called choking. And I don’t think we should group up any longer,” she says, and leaves.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto there_she_goes\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto anti_social\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Go out on your own?\n\t\t\t\t\t\t\t*goto anti_social\n\t\t\t\t\t\t#Follow her.\n\t\t\t\t\t\t\t*goto there_she_goes\n\n\n*label anti_social\nWithout anyone to party with, you suddenly feel lost and without purpose. It is as though your mission, quest, or whatever sole reason for being here feels pointless. Beyond that, you start to doubt your whole reason for living. Maybe you’ve spent too much time without any sunlight.\n\n\nLosing hope, you make your way towards the exit to return to Teepeekay, to reevaluate things and get a warm meal. Except the exit isn’t where you left it. You didn’t venture too far, and even without a map, you knew for certain that the exit should be right in front of you. Only it isn’t. Feeling claustrophobic, you start to hyperventilate while searching the walls for a secret exit or illusion spell, even though the latter is beyond your skillset.\n\n\n“Get me out of here. I can’t stand breathing this stagnant air any longer!”\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto porter\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto where_is_my_mind\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Find a teleporter?\n\t\t\t\t\t\t\t*goto porter\n\t\t\t\t\t\t#Lose your mind?\n\t\t\t\t\t\t\t*goto where_is_my_mind\n\n\n*label porter\nIt seems that every time you enter a new room, you’re teleported to another place. You’re not going crazy…not entirely anyway. Trying to calm yourself down, you look for any possible clues as to how to get out of this insane situation.\n\n\nStanding at the exit of the room, you jump in and out, back and forth continuously teleporting until you find a steel door. This seems to be a place you haven’t visited before. \n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 3\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou open the metal door, and light pours out of the entryway.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto a_new_plan\n\t\t*if (dieroll = 2)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tThe room teleports again, and you missed your opportunity.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto lost_in_space\n\t\t*if (dieroll = 3)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\t\t\t\t\t\n\t\t\t\t\tAs you approach the steel door, it vanishes from view.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto where_is_my_mind\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#You open the metal door, and light pours out of the entryway.\n\t\t\t\t\t\t\t*goto a_new_plan\n\t\t\t\t\t\t#The room teleports again, and you missed your opportunity.\n\t\t\t\t\t\t\t*goto lost_in_space\n\t\t\t\t\t\t#As you approach the steel door, it vanishes from view.\n\t\t\t\t\t\t\t*goto where_is_my_mind\n\n\n\n*label where_is_my_mind\nThings are definitely not what they appear to be; you decide to go out the way you came, and you find that the exit is no longer there. Instead, there is a small hole in the wall that appears to be blasted out. \n\n\nIt is either the rooms around you are moving or changing without your control or you’ve completely lost your mind and are unfit for this whole adventure. To prove yourself wrong, or possibly right, you enter through the hole, and there is a long corridor leading into a dark fog. This is definitely somewhere that wasn’t there before. You ponder going back the way you came to prove a theory, though you’re not sure if you want to know the answer.\n\n*choice\n\t#Do you enter the fog?\n\t\t*goto lost_in_space\n\t#Go back the way you came?\n\t\t*goto bear_with_me\n\t#Track a bear.\n\t\t*goto bear_with_me\n\n\n*label starved\n*image death.jpg\nGoing around in circles and circles, you’re lost for days, maybe weeks. Once your rations run out, the madness set in, and you started to dine on dirt and rubble to satiate the pains in your stomach. Left as a deranged mess, crawling around in the darkness, you have nothing left to give yourself but death.\n\n\nYou’re dead, friend. \n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#Please restart the story back at “The Beginning” and try again.\n\t\t*goto the_beginning\n\n\n*label lost_in_space\nYou enter a strange room that has four exits spanning out in all directions. All the rocks look as though they have been filed down into a smooth surface. You have the sense that you’ve been here before, but you cannot recall when or how.\n“No witnesses,” you say as you rush towards them with murderous intent.\n\n\nThings are really not what they seem, and you can’t find your way out of this insane loop.\n“No witnesses,” you say as you rush towards them with murderous intent.\n\n\nYour sense of direction is all mixed up, and you debate which exit you should take, then reconsider doing the opposite of your instincts.\n\n*fake_choice\n\t#North.\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto porter\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto despair\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t#Find a teleporter.\n\t\t\t\t\t\t\t\t\t*goto porter\n\t\t\t\t\t\t\t\t#Get lost in despair.\n\t\t\t\t\t\t\t\t\t*goto despair\n\t#South.\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto porter\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto starved\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#You're hungry.\n\t\t\t\t\t\t\t\t\t*goto starved\n\t\t\t\t\t\t\t\t#You're teleporting.\n\t\t\t\t\t\t\t\t\t*goto porter\n\t#East.\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto porter\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto the_dark\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#The room gets dark.\n\t\t\t\t\t\t\t\t\t*goto the_dark\n\t\t\t\t\t\t\t\t#The room is moving.\n\t\t\t\t\t\t\t\t\t*goto porter\n\t#West.\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto swol\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto porter\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Can you teleport?\n\t\t\t\t\t\t\t\t\t*goto porter\n\t\t\t\t\t\t\t\t#Can you bench 250?\n\t\t\t\t\t\t\t\t\t*goto swol\n\n\n*label the_dark\nWithout a light source, you’re left meandering the halls in utter darkness. \n\n\nYour eyesight has devolved with time, leaving you blinded as a result, though your other senses are heightened, leaving you better acclimated to survive in this subterranean setting. You now have a sonar sense and are able to guide yourself without the use of your eyes. Slowly, leathery flaps start to form on your arms, and you haven’t a clue as to why. Although that isn’t the worst of it.\n\n\nThis solitary sentence has gone to war with your mind. You don’t know if the world has ceased to exist or if time has died alongside you. Either way, you walk the endless abyss looking for answers, but they never come. Like a dream where there is no escape, no waking up, no end to the relentless pain known as existence.\n*achieve end16\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label bear_with_me\nYou enter the room that’s clearly a dead end. Rubble fills the corner from where a cave-in once occurred. This wasn’t at all what you were expecting to find. Not only that, there is a sleeping dire bear snoring loudly in the corner.\n\n\nThe furry friend looks peaceful, but you don’t dare interrupt its slumber. If only this world were different and you could curl up next to this living blanket and have yourself a good old-fashioned nap. But sadly, that is not the case.\n\n\nYou lingered around too long, and its nose starts to twitch, and its nostrils begin to flare. The bear knows you are here, and it might be too late for you to escape.\n\n*if (Save > 0)\n\t*set save -1\n\t*goto lost_in_space\n*else\n\t*goto only_you\n\n\n*label only_you\n*image death.jpg\n…can prevent dying, and you didn’t. You tried to sneak out of the dead end, but instead met you own end in death. The bear woke up and mauled you, ate you, and fed you to her cubs. I ain’t gonna lie. You should have let this sleeping bear lie.\nAs far as hunting exploits go, you’ve defeated much stronger beasts, and if it weren’t for your weakened state, you might have survived.\n\n\n*set save 0\n*set deaths +1\n*set character \"unknown\"\n*choice\n\t#Please bear in mind that “The Beginning” is where you must go and try again.\n\t\t*goto the_beginning\n\n\n*label swol\nWalking through this endless maze has made you to stronger than ever. You decide to exercise further and work on your physique. If it weren’t for the fact that you’re stuck in a forever loop, you’ve never looked this good in your entire life. You get plenty of protein from all the meat you’ve been able to collect by slaughtering the endless bear supply. \n\n\nToo bad no one is ever going to see your progress. But if they did, you would have won an award or something.\n*achieve end17\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label angel_wings\nYou watch the Healer fall to her death, and she becomes surrounded by a glowing light. Then her back sprouts two golden wings, slowing the descent.\n\n\nAwestruck by her heavenly power, you forget to breathe as she flies up to the top of the stairs, unharmed from the fall.\n\n\n“That was…amazing. I’ve never seen anything like that before in my life,” you gush.\n\n\n“And you never will again,” she says in a huff.\n\n\n“What do you mean?”\n\n\n“You were supposed to heal me, and you just stood there with a dumb look upon your face.”\n\n\n“Hey…that’s just how my face looks.”\n\n\n“It doesn’t matter. I believed in you, and you let me down. Good thing that will never happen to my faith,” she declares.\n\n\n“I’m sorry.” She hands you the map and leaves.\n\n*choice\n\t#Follow her?\n\t\t*goto there_she_goes\n\t#Go in alone?\n\t\t*goto map_attack\n\t#Do something.\n\t\t*goto there_she_goes\n\n\n*label map_it\n“Maybe we should clear this area before going up there,” you say, pointing at the rolled-up map on the Healer’s waist.\n\n\nShe gives you an assuring nod, and you exit the room the green creatures were in. \n\n\nYou turn down the intensity of your lamp and continue on through the next room.\n\n\nErring on the side of caution, you manage to sneak past a sleeping girl with dreadlocks and a disseminating cultist without incident. Your goal is not conflict, but rather to fill in this paper map. So far, all seems to be going as planned.\n\n\nSneaking around spurs a memory of a time back at the castle when you were on duty. There was someone you used to meet in secret, because it was forbidden. You searched your memory, but you cannot for the life of you remember who it was or why you had to meet in secret. Then something approaches you out of the shadows.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto oh_bats\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto hello_boy\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#It's a bat!\n\t\t\t\t\t\t\t*goto oh_bats\n\t\t\t\t\t\t#It's not a bat!\n\t\t\t\t\t\t\t*goto hello_boy\n\n\n*label hello_boy\nA cute little corgi dog runs playfully back and forth through the dark chamber.\n\n\n“Oh, he’s adorable!” the Healer says, clutching her arms together. “Can we keep him?”\n\n\n“Like how?”\n\n\n“Like a pet, to…well…pet.” The Healer squats down and tussles the dog’s fur excitedly.\n\n\nYou look around the surrounding area and current situation and ponder your decision. \n\n\n\nDecide what you say.\n*choice\n\t#“I suppose you can keep him.”\n\t\tThe Healer jumps up and down and gives you a big hug. “Thank you, thank you! I’ll feed him and walk him every day.”\n\t\t\n\t\t\n\t\t*goto new_best_friend\n\t#“Get out of here! Shoo.”\n\t\tBut the little scamp just wags its tail in response. Letting out a low whimper, the puppy follows you into the next room. You pick up a bone from a rather large pile and toss it out the exit door, but the mutt doesn’t fall for it. \n\t\t\n\t\t\n\t\t*goto bark_is_louder_than_its_bite\n\n\n\n*label new_best_friend\nWith a new furry companion along for the ride, the Healer is quite distracted by his presence—constantly petting and playing with the little fur ball. She seemed to have lost her desire for this whole quest.\n\n\nAfter falling on your butt from an oil slick trap, you look at the Healer, hoping to get some kind of healing. “Do you still want to do this?” you finally ask what has been on your mind for a while now.\n\n\n“Actually, no. I think I’d rather play with this little cutie pie. But you can finish it.” She stands up and hands you the map that she hasn’t been filling out since the dog showed up.\n\n\nAfter saying your goodbyes, you’re left alone with a map and your thoughts.\n\n*choice\n\t#You are thinking about life.\n\t\t*set save +1\t\t\n\t\tGain +1 SAVE!\n\t\t\n\t\t\n\t\t*goto map_attack\n\t#You are thinking about death.\n\t\t*set save +1\n\t\tGain +1 SAVE!\n\t\t\n\t\t\n\t\t*goto map_attack\n\t#You are thinking about sex.\n\t\t*set save +1\n\t\tGain +1 SAVE!\n\t\t\n\t\t\n\t\t*goto map_attack\n\t#You are thinking about how Gary Gygax might have been a huge racist.\n\t\t*set save +1\n\t\tGain +1 SAVE!\n\t\t\n\t\t\n\t\t*goto map_attack\n\n\n\n*label map_attack\nAfter losing your companion, you continue jotting down each room’s location on your map. It takes a bit of effort, but you manage to avoid all the monsters that are roaming around the halls. \n\n\nCross-referencing your path with what the Healer noted down, you realize that there is something off with this whole cave, making mapping it an impossible task. Rooms keep shifting around and exits rotating. There has to be some other force at play. Perhaps you’re stuck inside a celestial game and you are nothing more than a peon used to entertain. As fast as the thought comes to you, you shake it off as another one of your senior moments.\n\n\nA plan comes to you…what Garvin doesn’t know won’t hurt him. All he needs is a full map, and it isn’t your responsibility to make sure it’s correct.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto leroy_jenkins\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto where_is_my_mind\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Run for it.\n\t\t\t\t\t\t\t*goto leroy_jenkins\n\t\t\t\t\t\t#Lose your mind?\n\t\t\t\t\t\t\t*goto where_is_my_mind\n\n\n\n*label leroy_jenkins\nAfter making your way through a couple quick rooms, you realize that you’re being chased by a cultist that really wants you to join his cause. You walked past him without making eye contact earlier, but it seems that he didn’t get the hint. \n\n\nTrying to find a good place to hide, you walk straight into a room with a wizard casting a spell.\n\n\n“Nope,” you say and run through the next room, noting down its exact location on the map. Unfortunately, the next room also has something that wants to kill you. This time it’s a floating eyeball beast. \n\n\nSoon you have six or seven blood-thirsty monsters and one annoying cultist behind you.\n\n\nThe bad news is that if you break, even to just catch your breath, you will get destroyed. Luck would have it that you went in a long circle, and now you’re back at the cave’s entrance. \n\n*choice\n\t#Continue mapping? \n\t\t*goto in_honor_of\n\t#Leave the cave?\n\t\t*goto turn_in\n\n\n*label in_honor_of\n*image death.jpg\nMoving on, you find yourself at a room with a humanoid statue that catches your eye. You pause a moment and shine your lantern on it to get a better view. The detail is astonishing, and its likeness resembles the Healer you were grouping with earlier. \n\n\nNot knowing the girl’s name, you wonder if she was an art model or possibly a noble or other person of interest. \n\n\nAs you jot down the location of the statue room, the horde of monsters swarms into the room and rips you apart, limb from limb.\n\n\n*set save 0\n*set deaths +1\n*set character \"unknown\"\n*choice\n\t#You’re fajita meat. Please go back to “The Beginning” and try again.\n\t\t*goto the_beginning\n\n\n*label turn_in\nHeading back to Teepeekay, you look around for the quest giver, that cool Garvin guy. But he isn’t in the Crab’s Revenge or the Mud Puddle. After checking a dozen or so other establishments, you find him loudly wailing on some string instrument at Lute Center, the number one choice for bards to test out some gear before buying.\n\n\n“Wow. I didn’t know you could play like that,” you say, bobbing your head to his supreme rhythm.\n\n\n“I’ve mastered every musical instrument that isn’t wind.”\n\n\n“That is quite a feat. Where did you find the time?\n\n\n“Oh, by not adventuring. of course,” he says with a chuckle.\n\n\n“Speaking of which, I’ve finished your map.” You extend the folded parchment to him.\n\n\n“Oh. good. And the girl?”\n\n\n“She gave up on the whole thing.”\n\n\nGarvin nods along while he looks over your work as if he’s not really listening.\n\n\n“It’s not complete.”\n\n\n“Yes, I know, but I…”\n\n\n“And the girl, she is still inside, you say?”\n\n\n“I didn’t say. But I suppose so. That’s where I left her anyway.”\n\n\n“Good. Good.”\n\n\n“Why is that good?”\n\n\n“It’s not important. Look, you did about half the work, so, I can give you only half the pay. Does that sound reasonable to you?”\n\n\nNot wanting to go back inside that death trap, you agree to any peanuts he is willing to part with.\n\n\n“Did the Healer tell you what your half was supposed to be?”\n\n\n“She might have…I don’t recall.”\n\n\n“It’s fine. Twenty gold should do it.”\n\n\nIt seems quite low for all the deadly creatures that were about, but you take it with a fraudulent smile. As far as you know, this is your first unsuccessful mission. You wonder if it’s a sign of the times and maybe you’re not cut out for such an adventurous lifestyle. Not anymore.\n\n\nAfter parting ways, you decide to try out the retirement life.\n\n\nWithout the excitement of questing, your brain becomes lazy, and you completely forget your past and live out your life as a nobody.\n*achieve end18\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label bark_is_louder_than_its_bite\nThe puppy lets out a happy little yip, and a huge fireball shoots out of its mouth, engulfing you in flames. \n\n\n“No. Bad dog. Bad dog!” you yell, but it’s too late. You don’t think it was trying to burn you to a crisp. Nevertheless, that is currently a very possible outcome. \n\n\nThe Healer swats you with her bedroll, trying to put out the flames.\n\n\n“What are you doing? Cure me!”\n\n\n“Oh, right.” The Healer gets down on her knees and begins to pray the flames away rather than use her staff to cure your burning flesh. Even though you don’t believe in such things, you pray along with her, hoping to survive this fight.\n\n\nIn the moment, you remember an argument with your wife; she was angry about something, throwing plates and breaking pottery. \n\n\nThis was supposed to be a joyous beginning, though it quickly turned into the end. You lit so many candles, it looked as though the room was on fire, just like the one you’re currently in.\n\n*if (Save > 0)\n\t*set save -1\n\t*goto firefight\n*else\n\t*goto cinder\n\n\n*label firefight\nThe Healer’s prayers are answered, and she uses the rest of her magic power to cure you from being on fire. \n\n\n“Now me,” she says, holding out her arms, awaiting the same treatment you just received.\n\n\nYou were so busy inside your daydream that you hadn’t realized that she was also ablaze.\n\n\nScrambling through your inventory, you look for a potion, waterskin, anything to cure her of the flaming ailment. Only the hard truth is that you’re not a healer, and all you have are very flammable bandages.\n\n\nYou’re too late. She, along with the map, are reduced to ash. Despite everything, you really wish you could have protected her in some way. \n\n\nThe fire-breathing corgi knows not of what it has done, and it wags its tail at you, wanting a pet.\n\n\nBut no pets will be given to it today. \n\n\nOnce the fire subsides, the dog begins to gnaw on the Healer’s bones, and you decide to leave this place, never to return.\n\n*choice\n\t#Become anti-social.\n\t\t*goto anti_social\n\t#Join the anti-social social club.\n\t\t*goto anti_social\n\n\n*label cinder\n*image death.jpg\nThe fire builds around you until it is too much to put out. You flail around and decide to stop, drop, and roll. This only makes this worse because now you’re just rolling around in more fire.\n\n\nIt only takes a short while, and you are reduced to ash, and only your smoldering bones are left behind.\n\n\nYou’re dead.\n*set save 0\n*set deaths +1\n*set character \"unknown\"\n*choice\n\t#If you want a “cooler” ending, go back to “The Beginning” and try again.\n\t\t*goto the_beginning\n\n\n*label a_tank_and_a_heal\nYou both enter the dark cave ready to try out your role reversal. While rummaging through your adventure’s pack, you trip over something.\n\n\n“Oof.” Face down, you see the very thing that tripped you up. It’s a small green creature, with razor-sharp teeth and claws.\n\n\nThe little creature swipes at you, but it glances off your armor. It’s a pipsqueak, and you’re about to dispose of it with your shield when you hear a voice above you. “No, let me attack it. I’m the tank, remember?”\n\n\nShe was right. You both switched jobs. \n\n\nYou stand up and watch as the Healer dances back and forth in a fighting stance she clearly just made up on the spot.\n\n\nThis reminds you of the time your father taught you how to take a punch and kick or whatever else was at his whim. It was a hard lesson to learn, but one that has benefited you from that day forward.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto weapon_swap\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto hard_to_watch\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Swap weapons?\n\t\t\t\t\t\t\t*goto weapon_swap\n\t\t\t\t\t\t#Don't swap.\n\t\t\t\t\t\t\t*goto hard_to_watch\n\n\n*label weapon_swap\nYou hand her one of your shields. “This might work better.”\n\n\n“Thanks,” she says.\n\n\nSure enough, slamming the creature with your shield seems to be doing some damage; admittedly, not as much as you would have done if you were wielding it, but it’s not too shabby.\n\n\n“I could use a little healing,” she asks. \n\n\nYou rummage through your sack to get out your healing method, a couple of bandages. \n\n\n“No way. Hit me with my staff.”\n\n\n“What? Are you sure?”\n\n\n“Yes. Trust me.”\n\n\nYou swing her staff, and bright light radiates out of it. Sure enough, her wounds are healed upon impact. “You got this, girl.”\n\n\n“Don’t call me girl,” she protests. “If I’m going to play you, you have to play me…gender and all.”\n\n*choice\n\t#Do you want to cosplay her?\n\t\t*goto the_healer_tank\n\t#Do you want to go back to tanking?\n\t\t*goto something_new\n\n\n*label the_healer_tank\n“Oh…fine.” When you signed up for this switching role arrangement, you didn’t think it would involve this whole gender bender. Though she is having so much fun with it, you reluctantly agree.\n\n\nShe goes back to attacking the monster, and you use the healing properties of her staff to keep her from dying.\n\n\nIt doesn’t take long, but she manages to finish off the little guy. “Destroyed!” she says, resting her foot upon its corpse. She has a devilish look upon her face that says she is enjoying this way too much.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto healer_tank_two\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto lost_in_space\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Disappointed in her, you decide to leave the party. \n\t\t\t\t\t\t\t*goto lost_in_space\n\t\t\t\t\t\t#She finds a sword, and this only increases her blood lust.\n\t\t\t\t\t\t\t*goto healer_tank_two\n\n\n*label healer_tank_two\nNext you both are confronted with a cultist. “Would you like to increase your communication skills with others?” he asks.\n\n\nThe sword-wielding tank (pseudo) attacks the non-hostile person before letting you answer, while yelling “Cults are bad,” over and over again until he is murdered as well.\n\n\nShe pilfers the cultist’s corpse while baptizing herself with his blood on her face. “Healing wench,” she demeans you, and you quickly comply.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tShe loots some armor off of the cultist and screams out in ecstasy.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto healer_tank_three\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou decide to stop her vicious rage.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto shame_on_you\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#She loots some armor off of the cultist and screams out in ecstasy.\n\t\t\t\t\t\t\t*goto healer_tank_three\n\t\t\t\t\t\t#You decide to stop her vicious rage.\n\t\t\t\t\t\t\t*goto shame_on_you\n\n\n*label healer_tank_three\nDrenched in her victim’s blood, she continues to slaughter everything in sight without any end to her fury, and you stand by and silently heal her. You can’t help but feel guilty for your role in her savagery. You’ve been trained by the queen’s guard, a prestigious institute that teaches honor of battle and the art of mercy. This is not the case, and it makes you feel more than uncomfortable.\n\n*if (Save > 0)\n\t*set save -1\n\t*goto resistance\n*else\n\t*goto the_top\n\n\n*label resistance\nThings have gotten way out of control, and you grab the Healer by both hands. “Boss. You need to control your lust for pain, or else I fear it might become you.”\n\n\n“Why should I? All I have ever done was play by the rules, pray to the right gods, and do what I am told. And what did it get me? Nothing but relentless sorrow.”\n\n\n“It got you me. I will follow you and be your humble servant. But this road of death and destruction is one place I cannot go with you.”\n\n\nYou see tears welling up in her blood—shot eyes. You’re reaching her; she’s coming back.\n\n\n“You mean, you don’t hate me?”\n\n\n“No. I respect and admire you. Let me train you how to fight but in an honorable way.”\n\n\nShe nods and wipes away a tear that has fallen.\n\n\n“Let’s go home,” you say, and she agrees.\n\n\nThrough the years, you train her to become a male knight. No one knows the secret of her gender, nor yours—her old maiden. Together you save a lot of kingdoms and do good wherever you go. It was a shaky start, but all’s well that ends well.\n*achieve end19\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label the_top\nEach kill is more gruesome than the last. The Healer has turned borderline satanic in her efforts to rid the world of all its inhabitants. \n\n\nYou were once a member of the queen’s guard, and now you’re serving a new master. Except this red queen is brutal in her rule.\n\n\nRunning out of things to slaughter, you arrive in a room filled with treasures beyond your wildest imagination. But the hoard isn’t unguarded. There is a magical dinosaur lying in wait. Your blood queen takes on the challenge with delight, and before the day’s end, there’s a river of blood covering all the treasure and leaking through cracks on the floor down into the room below.\n\n\nAfter clearing this cave, you had hoped that your service would have been fulfilled, but that was just the beginning. With unlimited riches, the red queen buys the services of death priests to raise her slaughtered victims back from the grave, creating an empire of death. Soon there is nothing left alive but you and your queen, and if being reanimated as a walking corpse wasn’t an option, you would have taken your own life long ago.\n*achieve end20\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label something_new\n“I’m not really sure if this is going to work out,” you admit, trading your armor for her white dress. \n\n\n“Why the hell not?” the Healer scoffs.\n\n\n“I don’t know the first thing about healing,” you lie, having trouble putting on her dress. \n\n\n“Only because you’re unwilling to try.”\n\n\n“I am a protector. I protect.”\n\n\n“Healing is a form of protection.”\n\n\n“Look, you can’t teach an old dog new tricks. And I am a very old dog.” \n\n\n“Honestly, I wish you were a dog. All I ever wanted was a pooch to call my own.”\n\n\nYou stare at each other, neither willing to budge on their stances.\n\n\n“Okay, you can tank. Let’s trade weapons back.\n\n\nShe holds out your shield, and when you reach for it, she slams you in the face with your own weapon. “Now you have to heal yourself.” \n\n*choice\n\t#Heal yourself.\n\t\t*goto cease_fire\n\t#Attack her.\n\t\t*goto shame_on_you\n\n\n*label cease_fire\nSwinging her magical staff at yourself, healing energy flows out of it and eliminates the pain your face felt from her attack.\n\n\nYou decide to no longer fight her on your role and just do as you’re told.\n\n\nAs time passes, she calls you Peggy as an insult; in turn, she has you call her boss, the big cheese, or master chief.\n\n\nAfter the cave, you decide to go on your own path as your memory gets worse and worse. Soon the only persona you have left is Peggy, an old seamstress who does a great job at protecting garments from holes and tears, though in the dead of night, you have wild dreams of adventure, queens, treasure, and serving as a royal guard. \n\n\nTruth be told, Peggy is always excited for sleep since her dreams make her feel more alive than living.\n\n\nThe End\n\n\nThis might be the ending you’re looking for. If not, go back to “The Beginning” and try again.\n*achieve end21\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label shame_on_you\nYou swing your shield at the Healer’s pretty young face, and she blocks it while following up with a leg sweep of her own.\n\n\nYou’re now on your back, and she laughs at you as if you’re an upside-down turtle.\n\n\nGetting up from this position is actually quite difficult for you, due to all your preexisting back pain. “Wait. I don’t want to fight you.”\n\n\n“Well, it’s too late for that. But I’ll give you a choice. Do you want me to kill you and put you out of your misery, or do you want me to steal all your stuff and leave you for dead?”\n\n\nShe runs a tough bargain, but you must decide for yourself what seems more appealing.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto mean_girls\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto homeless_and_helpless\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Convice her you're going to pretend you're a girl.\n\t\t\t\t\t\t\t*goto the_healer_tank\n\n\n*label mean_girls\n*image death.jpg\nYou decide that it’s best to end your suffering and let the Healer murder you in cold blood.\n\n\nShe puts her soft hands around your neck until you die of asphyxiation. It is reasonably painless.\n\n\nYou were once the great hero of the battle of Grey Steel, and now you’ve been killed by someone a third your age and experience. What a pitiful way to end your great legacy. If it’s any consolation, you didn’t remember the battle of Grey Steel or any of your other past exploits. In your death, you’re remembered and mourned by many people you’ve saved during your life. \n\n*set save 0\n*set deaths +1\n*set character \"unknown\"\n*choice\n\t#Go back to “The Beginning” and try something else.\n\t\t*goto the_beginning\n\n\n*label homeless_and_helpless\nThe Healer spares your life but not before liberating you of all your belongings. \n\n\nAlone and cold, you manage to find your way out of the cave and back into town, although the trek to the outside has cost you your left eye and a couple fingers. \n\n\nNot fit for employment, you’re forced to sleep in a gutter and rely on the kindness of strangers in order to get a bite to eat.\n\n\nLuckily there seems to be a steady flow of adventurers each day to accommodate your needs. They all seem to belong to some club or group. Or perhaps shop at the same store because there is always a holy person, a fighter, a heavily armored one, a wizard, and an outdoorsy one. Though you might be imaging things. Your memory isn’t what it used to be.\n\n\nSoon your memory completely fails you, and you even forget your own name.\n\n\nThe End\n\n\nNot everyone wants this to be the end of their story, but it happens to a lot of a good people around the world. Be kind to each other.\n*achieve end22\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label hard_to_watch\nThe Healer whaps the little green monster as it scratches her leg, then she whaps it again, and it swipes her again.\n\n\nBack and forth they trade blows in this pitiful manner. She isn’t the most athletic person and doesn’t even try to dodge any attacks. That and wearing no armor, she is unable to protect herself from any of the little creature’s attacks. You walk up to her and wrap her arm and leg using your whole surplus of bandages, pausing the fight momentarily. Unfortunately, that is the extent of your healing ability. \n\n\nAbout the point where you’re going to intervene and kill the thing with a one-shot attack, it draws her deeper into the shadows, and she’s ambushed by a pack of them, each one scratching and biting her all over. In the darkness, all you see are terrible green eyes and horrendous screams as they devour her.\n\n\nTears well up in your eyes, but it’s too late to save her. Going in now would only seal your fate the same as hers.\n\n*choice\n\t#Slow walk away.\n\t\t*goto anti_social\n\t#Wallow in your self pity.\n\t\t*goto anti_social\n\t#Get mad.\n\t\t*goto anti_social\n\n\n*label a_new_plan\nYou’re now inside a room you’ve been in before, only this time you’re somehow transported to the center of it instead of using one of the many entrances. \n\n\nSome sort of teleporter has to be at play here. That, or perhaps an evil god-like being is shifting around the rooms as you enter them. Either way, you hate it.\n\n\nYou hear a slow clapping sound.\n\n\nSpinning around, you spot a masked figure who wasn’t there before.\n\n\nNot sure if he is a human or beast, he starts to attack yo
