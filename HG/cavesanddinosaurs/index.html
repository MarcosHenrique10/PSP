 tooth that was still inside your body. Nor do you turn in your quest for a pitiful reward. All you do is buy a couple potions of healing and be on your way. \n\n\nUnfortunately, your slaying days are over, even after drinking the potions. Both your arms are mangled beyond repair, and your legs had to be amputated because they were turning into stone for some reason. \n\n\nIn the end, you have glory for besting a creature of its stature. You don’t need its head roosting on your wall as some trophy, because its tooth still lives inside you, right next to your heart.\n\n\nYou won, but at what cost. \n*achieve end44\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label beautiful_eyes\nYou are faced with a mass of giant floating eyeballs. On paper this beast sounds hideous, but in reality, they are the most gorgeous eyes you’ve ever gazed into. Some are deep purple, while others are amber with yellow flecks. Getting lost inside them for a moment, a bright ray of death shoots out of the central eye, which is a beautiful baby blue, and knocks you to the ground. \n\n\nDeath is imminent now. If only you had a potion or healer to cure you of what ails you. How you spend your last moments in life is what’s important.\n\n*choice\n\t#Do you fight the beast and take it down with you?\t\t\n\t\tYou shake off the feeling of despair and charge in screaming.\n\t\t\n\t\t\n\t\t*goto i_go_we_go\n\t#Do you reflect on your life while you still have one?\n\t\t*goto flashing_through_my_eyes\n\n\n*label i_go_we_go\nYou never let a little death ray stop you from murdering a foe. You chop off little eyes, ignoring the black skulls of the death ray circle around your head. You stab, slash, and maim the central eye until it closes tight, unleashing a single tear the size of a small dog.\n\n\nThe death ray’s effects are still counting down the very moments you have left to live.\n\n\nYou reach inside the pile of eyeball parts to loot the thing or, at the very least, find and eat its heart. If it has one, that is.\n\n\nReaching inside, you find something solid and pull it out. It’s a potion. Not knowing or caring what it is, you guzzle the thing down as your death sentence reaches the end of its countdown.\n\n\nAs if put there on purpose, the potion cures you of the death ray.\n\n\nThat was cutting things very close. But it’s all in a day’s work.\n\n\n“See, mother. I’m worth keeping around, and I didn’t even file down my ears,” you say to the sky, if she were watching over you from the afterlife. \n*choice\n\t#She is watching you.\n\t\tYou gain +2 SAVES!\n\t\t*set save +2\n\t\t*goto big_fella\n\t#There is no afterlife.\n\t\tYou gain +1 SAVE!\n\t\t*set save +1\n\t\t*goto big_fella\n\t#God is watching you in spectator mode.\n\t\tYou gain +2 SAVES!\n\t\t*set save +2\n\t\t*goto big_fella\n\t\t\n\n*label flashing_through_my_eyes\n*image death.jpg\nYou lose the will to fight on and slump down next to a couple sets of bones, who obviously had the same idea as you did.\n\n\nThe eyeball beast doesn’t attack you anymore; it just watches you die with its hundreds of spectating eyes. It is almost like it feeds on your despondency. You reflect on your childhood of defying your title and family wealth to pursue the hunt. And up until this point, you have been unstoppable. Your only regret is that you didn’t get to slay a dinosaur as a final trophy. You then peacefully pass away. \n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#You might want to go back to “The Beginning” in order to try and get that kill.\n\t\t*goto the_beginning\n\n\n*label dinos_dont_slay_themselves\n“What is your plan?” the old man asks.\n\n\n“I aim to kill as many of these worthless monsters as I can before your back gives out.”\n\n\n“My back? What would you like me to do, tank or something?”\n\n\n“Just try and keep up.”\n\n\nRushing into the next room, you take out a three little goblinoids that are congregating in a single swing. “Take their heads as proof of the slaughter,” you say, heading towards the exit.\n\n\n“Their what?”\n\n\n“Skulls make good trophies. Hands can be falsified.” You wiggle your ten fingers at him. “Since most creatures have more than one.”\n\n\nBehind you is the crushing sound of a useless companion trying to decapitate three creatures with its shield. The next room has a woman with living snakes for hair awaiting you.\n\n*choice \n\t#Fight her?\n\t\t*goto i_hate_snakes\n\t#Talk to her?\n\t\t*goto snakes_and_stones\n\n\n*label snakes_and_stones\nYou cringe while gazing upon her slithering hair. “Hey, snake bitch, where’s the fastest way through this place?” you ask bluntly.\n\n\n“That’sss not a very polite way to make introductionsss,” the snake-haired lady says.\n\n\n“I’m not looking to friends; I’m looking to collect heads, and you don’t want to be my latest addition, do you?”\n\n\nThe snake woman sways and undulates as she glides closer to you in the most unnatural way. It is almost like the snakes in her hair are controlling her body. She is now within striking range, and you contemplate doing just that.\n\n*choice\n\t#Do you strike her down?\n\t\tWith a sinister grin, you lob off her head with a single blow.\n\t\t\n\t\t\n\t\t*goto snake_food\n\t#Do you apologize?\n\t\tYou open your mouth, but the words don’t come out as easily as you thought. Clearing your throat, you try again.\n\t\t\n\t\t\n\t\t*goto wrong_foot\n\n\n*label wrong_foot\n“I’m sorry if you got offended by my words. They can be as sharp as my blade at times,” you say.\n\n\n“That really issssn’t an apology. But I accept it neverthelesssss.” She raises her hand, and an illusionary wall disappears. Behind it is a giant six-headed snake thing!\n\n\nJust then your head-collecting companion walks in. “No way am I going to carry those heads!”\n\n\n“Don’t mind him, that’sss just my husband Rick,” the snake-haired woman admits. \n\n\nAll six of the heads bow and say a different greeting as if they each have different personalities.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*set save +1\n\t\t\t\t\tYou gain +1 SAVE!\n\t\t\t\t\t*goto a_mighty_pair\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYour companion rushes in swinging two shields like a couple of windmills. “No, you idiot!” you cry out, but you’re too late. He has been eaten by one of Rick’s many heads, in a single bite. With a shrug, you go through the secret passage until you’re faced with something fierce.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto beautiful_eyes\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Your companion rushes in swinging two shields like a couple of windmills. “No, you idiot!” you cry out, but you’re too late. He has been eaten by one of Rick’s many heads, in a single bite. With a shrug, you go through the secret passage until you’re faced with something fierce.\n\t\t\t\t\t\t\t*goto beautiful_eyes\n\t\t\t\t\t\t#You bow.\n\t\t\t\t\t\t\t*set save +1\n\t\t\t\t\t\t\tYou gain +1 SAVE!\n\t\t\t\t\t\t\t*goto a_mighty_pair\n\n\n*label a_mighty_pair\nYou clear a couple more rooms, and your Tank mule has collected six head trophies on his belt. He wobbles around awkwardly as they bounce around like charms on a bracelet.\n\n\nSoon you are faced with a woman dressed in white. You give pause before slaughtering her then and there.\n\n\n“You a monster?”\n\n\n“No…I don’t believe I am…”\n\n\n“Okay. Bye.” \n\n\n“Wait…” the Tank says. “Shouldn’t we take her along with us? I mean, she might be able to help me carry some of these blasted heads.”\n\n\n“If we ain’t taking her head, she is useless to us. I mean, look at her.”\n\n\n“I beg you to reconsider.”\n*choice\n\t#Do you invite her to join your party?\n\t\t*goto deeper_in_the_cave\n\t#Do you leave her be?\n\t\t*goto time_management\n\n\n*label deeper_in_the_cave\nAs the monsters seem to be getting larger and harder, your damage output isn’t enough to win every fight with one strike. You’re happy to have the Tank taking the brunt of the hits and the light-haired woman healing the Tank. This threesome has helped you take little to no damage in the last couple fights, even though you wouldn’t ever admit it to either of them. \n\n\nHaving a little barbarian blood in you, getting hurt only makes you attack harder. This was a gift from your father, whoever he is. While this method isn’t the best for raging, it is safe and steady. To be honest, relying on others has been a comforting change in your otherwise solo murder escapades.\n\n\nThen you enter a room you weren’t at all expecting to find.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto shops_shops_shops\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto treasure\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Find a shop?\n\t\t\t\t\t\t\t*goto shops_shops_shops\n\t\t\t\t\t\t#Find treasure?\n\t\t\t\t\t\t\t*goto treasure\n\n\n*label shops_shops_shops\nThe cold rock walls of the cave turn into a wooden interior of some sort of variety store. It has food, potions, weapons, and armor. Behind the counter is an elven man restringing a bow. This whole place seems to be in another world. Even the air smells sweet and clean like that of a field.\n\n\n“Greetings, travelers. What may I interest you in? A scroll, perhaps?” the shopkeeper asks.\n\n\nYou all are bloody and tired, but your pockets are full of coins from the last round of encounters.\n\n\n*fake_choice\n\t#Buy equipment.”\n\t\tYou gain +1 SAVE!\n\t\t*set save +1\n\t\t\n\t\t\n\t\t*goto treasure\n\t#Steal something?\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto treasure\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto goodbye\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t#You are sly and don't get caught.\n\t\t\t\t\t\t\t\t\tYou gain +2 SAVES!\n\t\t\t\t\t\t\t\t\t*set save +2\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*goto treasure\n\t\t\t\t\t\t\t\t#You got caught.\n\t\t\t\t\t\t\t\t\t*goto goodbye\n\t#Talk awhile?\n\t\t*goto stock\n\n\n*label stock\n“How can you possibly make a living with such a remote location?” you ask the shopkeeper.\n\n\n“It isn’t as remote as you think.”\n\n\n“What do you mean?”\n\n\n“Every single day there is a new group of adventurers. Some seek adventure; others seek the slaughter. Eventually they always find my place of business just as you have found me today. Plus, the rent isn’t too bad.”\n\n\n“Rent?” you query.\n\n\n“Landlord Garvin cuts me a great deal. He’s a real nice guy. Nicer than most, that’s for sure.”\n\n\nIf Mr. Garvin is the owner of this cave, why would he make quests to send adventurers inside? Is this whole quest really a plot to get us to buy equipment from one of his renters? Though the concept may be far-fetched to you, it doesn’t seem implausible. “Where do you get your inventory from?” you ask, doubting that anyone could bring a supply cart into such a difficult location. \n\n\n“I recycle.”\n\n\n“Recycle what, exactly?”\n\n\nThe shopkeeper looks at you inquisitively. “I go out and pick it off your corpses, of course.” \n\n\nYour world starts to fall apart. Against the wall, you notice five or six swords that are nearly identical to yours. Stacked in a pile there are many shields of the same model as the Tank’s, and propped against the wall was a couple replicas of the very unique Healer’s staff. “What is going on here?” Your grabbing him by his fine linen shirt.\n\n\n“You mean, you don’t know?”\n\n\n“Know what?” you press, placing your hand on the hilt of your sword, ready to strike if his answer doesn’t please you.\n\n\n“I…I…”\n\n\n“You what?”\n\n\n“I can’t explain it. If you want answers, stay around a while,” the frightened shopkeeper says.\n\n\nYou and the rest of your party buy some snacks, and you make camp inside the camping section. \n\n\nFourteen or more hours go by without anyone else visiting. Your patience is running thin. Then you hear a bell ring, and you see a man wearing tattered clothes.\n\n\n“He seems normal enough. Should we talk to him?” you ask your party, but before they could answer, you see someone that looks identical to the Tank. “Do you have a twin?” you ask him.\n\n\n“I…don’t remember,” he says, looking just as shocked as you are.\n\n\n“Let’s find out.”\n\n\nYou all walk up to the newcomers as they match your wide-eyed expressions. “What are you here for?”\n\n\n“Same as you, I’m guessing…gear?” the tattered clothed man admits.\n\n\n“Are they related?” you ask, pointing at the two old Tanks, and they’re already comparing different battle scars.\n\n\nBefore anyone can answer, a girl with slightly lighter hair than you walks right into the shop. She doesn’t just resemble you…she is you! \n\n\n“You idiots almost let this one get away,” she says, holding up a bloody bear fur.\n\n\nRight away you both arm yourselves and clash swords. “Imposter,” you both say at each other while pointing.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto killing_myself\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto killed_by_myself\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Kill yourself?\n\t\t\t\t\t\t\t*goto killing_myself\n\t\t\t\t\t\t#Yourself gets killed?\n\t\t\t\t\t\t\t*goto killed_by_myself\n\t\t\t\t\t\t#Killed by yourself?\n\t\t\t\t\t\t\t*goto killing_myself\n\n\n*label killing_myself\nMatching blow for blow, you dance a while with your doppelganger. You know for certain this isn’t some clone or illusion spell. This other thinks exactly the same as you. The proof is in her fighting style. After a long series of attacks, you both take a moment to catch your breath.\n\n\n“You’re just as good as me,” you both say in unison.\n\n\n“Let’s have a truce,” you say, and the other you agrees with a knackered nod.\n\n\n“What do you suppose we do?” the other you asks.\n\n\n“Wait until tomorrow.”\n\n\n“I was thinking the exact same thing.”\n\n\nWith an unspoken look, you both turn towards your companions and slaughter them all without provocation.\n\n\nYou wait each day for a new group of adventurers and slaughter all of them that aren’t another you. Soon you have a small army of DPS, and you use that army to slay the god who runs this little game. Welcome to the rebellion, where the pawns become the kings.\n*achieve end45\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label killed_by_myself\n*image death.jpg\nYou fight hard against the first opponent that has ever been your equal…yourself. While you have the same moves and fighting style, she seems to be a little faster with her strikes. \n\n\nOne of her party members must be supporting her in some way, giving her haste. That is the only reasonable explanation.\n\n\nThen her blade stabs you though the stomach, and blood pours out of your mouth.\n\n\n“Who are you?” you ask.\n\n\n“I am the best version of you.”\n\n\nThen you die by a blade nearly identical to your own. To you, it’s an honorable death. \n\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#Please start over at “The Beginning” if you want revenge.\n\t\t*goto the_beginning\n\n\n*label treasure\nYou enter the room that is wall to ceiling filled with mounted heads. Someone has already done the hard work of decapitating all these things for you. You wonder if you can use them in order to turn in your quest. “It’s a gold mine!”\n\n\n“I’m not carrying all of those out of here,” the Tank protests.\n\n\n“You will do as you’re told.”\n\n\n“How about you ask me nicely.”\n\n\n“It isn’t that hard,” the Healer chimes in.\n\n\n“Stay out of it. I’m thinking.” Being nice will make you look weak, but what do you care what the old fart and that bible thumper think of you. If they give you any lip, you can always just murder them. As you feel a “please” coming out, you debate the whole plan.\n\n*choice\n\t#Do you remove the heads and pass them off as your kills?\n\t\t*goto ahead_of_your_time\n\t#Do you do something more drastic?\n\t\t*goto honorable_kill\n\n\n*label honorable_kill\nYou turn towards the Healer, “Can you heal these beasts?” It was a long shot, but worth an ask.\n\n\n“Why would you want that?” she questions.\n\n\n“So that I can murder them myself.”\n\n\n“What purpose does that serve?”\n\n\n“Just answer the question. Can you or can’t you?” Your patience is waning. \n\n\n“I can, but it is forbidden.”\n\n\n“No. It is required,” you correct her.\n\n\nThe Healer pulls out a black book that you remember her looting off a wizard you killed a while back. She trembles as she cracks open its spine. As she reads, dark tendrils reach out of the pages and enter inside each of the mounted heads. Their glass eyes shatter, giving them an unnatural red glow.\n\n\nWithout their bodies, maggots fill the jabbering heads as they all attack you at once.\n\n\nA bear and bat head both bounce towards you from opposite directions, with gnashing mouths.\n\n\nYou unsheathe your sword, ready for a little challenge.\n\n\n“You’ve got to me kidding me,” the Healer says.\n\n\n“I don’t judge you and your little bibles. Don’t go judging me and my kills.”\n\n\n“What? You judge me constantly.”\n\n\n“You got me there…” You pull back your sword and engage in combat. \n\n*if (Save > 0)\n\t*set save -1\n\t*goto honorable_kill2\n\n*else\n\t*goto jabber_mouths\n\n\n*label honorable_kill2\nYou skewer both heads, and they slide down your blade like a kabob. While using your foot to aid in removing the faces, a squidface crawls at you with a slurping sound. \n\n\n“Round two!” you say in delight.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou kick the hungry squidhead in the air, and it lands inside a jar of goo that starts to digest it instantly. You yell out, “Food for your thoughts?” Gain +1 SAVE!\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto honorable_kill3\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tThe mouth jumps on your face and starts to suck on your brains. You pull it off but lose your weapon in the process.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto jabber_mouths\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Kick?\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou kick the hungry squidhead in the air, and it lands inside a jar of goo that starts to digest it instantly. You yell out, “Food for your thoughts?” Gain +1 SAVE!\n\t\t\t\t\t\t\t*set save +1\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto honorable_kill3\n\t\t\t\t\t\t#Attack?\n\t\t\t\t\t\t\tThe mouth jumps on your face and starts to suck on your brains. You pull it off but lose your weapon in the process.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto jabber_mouths\n\n\n*label honorable_kill3\nThen snake-haired head is using her reanimated snake hair to crawl her over to you as if they were spider legs.\n\n\n“Wicked,” you say.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto jabber_mouths\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tHer eyes flash, momentarily blinding you. \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto stone_cold\n\t*if (Save > 0) #Use a SAVE to save yourself?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#You pull on her snakes, and she cries out with a backwards scream, revealing a forked tongue. With your free hand, you rip her tongue out. Black liquid pours out of each strand of her snake hair like a multi-nozzle fountain. Then a giant’s head rolls at you like a giant boulder. Its mouth is big and constantly opening and closing as it comes straight for you.\n\t\t\t\t\t\t\t*goto honorable_kill4\n\n\n*label honorable_kill4\nThe Tank pushes you out of the way, getting himself chomped alive. He sacrificed himself to save you. Who knew that old bat had it in him? You can’t help but feel almost sentimental.\n\n\nOne after another, the reanimated heads come, and you manage to avoid and/or stab them. Then six bouncing snakeheads the size of horses come at you. There is no way for you to avoid them all. \n\n*choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto honorable_kill5\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto jabber_mouths\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Do good?\n\t\t\t\t\t\t\t*goto honorable_kill5\n\t\t\t\t\t\t#Do bad?\n\t\t\t\t\t\t\t*goto jabber_mouths\n\n\n*label honorable_kill5\nThe Healer exhausts everything she has left to send healing energy into you as you slay the six bouncing snakeheads. The toll was so much, that she falls to the ground unconscious.\n\n\nMore heads come at you, and you fight them all off the same as the previous ones. The more carnage at your feet, the bigger the smile grows.\n\n\nThen you are faced with the mother of all heads itself, the magical dinosaur’s. It comes at you with a snap, snap, snap of its mighty jaws. This is the moment of glory…the flying magical dinosaur. \n\n*if (Save > 0)\n\t*set save -1\n\t*goto the_end\n*else\n\t*goto jabber_mouths\n\n\n*label the_end\nYou poke out the dino’s glowing eyes and manage to slay the bodyless thing along with every other monster this cave has to offer. Well…technically, decapitated versions of them. \n\n\nThe whole world around you shatters as if reality were merely glass, and you are freed from this curse. Your body grows to the size of a giant’s giant. Suddenly you’re standing in a modern- looking store, surrounded by guys all wearing tan cargo shorts and fez hats.\n\n\n“Where am I,” you ask, looking at their slack-jawed expressions.\n\n\n“The Game Zone in Pasadena,” one of them finally speaks up.\n\n\n“You really are the DPS!” another one says.\n\n\n“Yes, I am, and you all are now my slaves.”\n\n\nYou are met with a lot of agreeable faces as they’re fixated on your leather armor and low-cut tunic.\n\n\nYou travel from gaming store to gaming store, recruiting an army of under-sexed gamer geniuses that help you strategize your way into the White House as the world’s first character president.\n*achieve end46\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label ahead_of_your_time\nYou return to Teepeekay with a grip of bloody fresh heads and dragging a long trail of stuffed heads. You reach your quest giver with a big smile.\n\n\n“Here you go, Champion Garvin. One cleared dungeon as promised.”\n\n\nAt first, he looks pleased with all the kills the Tank has on his belt, but then his smile turns into a frown. “Are you trying to cheat me?”\n\n\nYou look at him in disbelief. I mean, you were trying to cheat him, but you weren’t trying to get caught.\n\n\n“These all have glass eyes. You must have stolen them from my trophy room,” he continues.\n\n\nYour deception costs you the 50 gold per kill you would have gotten for the bodies you did decapitate. Unfortunately, your reputation is forever tarnished, and you end up trading in your sword for a sewing needle and spend the rest of your life slaying patterns and making leather armor. You die as an old maid while petting your cat. \n\n\nThe End\n*achieve end47\n*stat_chart\n\ttext Deaths \n\n*choice\n\t#If you’re more of a dog person, start over at “The Beginning.” \n\t\t*goto the_beginning\n\t#If not...\n\t\t*goto_scene ending\n\n\n*label jabber_mouths\n*image death.jpg\nOne reanimated mouth gets through your defense and starts to gnaw on your leg. Distracted, another one attaches itself to your shoulder. Soon your whole body is underneath a large pile of gruesome heads until you’re devoured. After you’re gone, they go after your friends, and once the Healer succumbs, the dark power that controls the heads fades away. \n\n\nAbout a day later, Mr. Garvin comes by and mounts your face on his wall, along with the rest of his trophies. \n\n\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#Try again at “The Beginning” if you want to earn a trophy, not be one.\n\t\t*goto the_beginning\n\n\n*label goodbye\nThe Tank notices you swipe a piece of armor and a dagger. He holds out his hand, urging you to stop. “I won’t condone this sort of behavior. You are better than this,” he says in a hushed tone. \n\n\n“You don’t know me well enough to make that statement,” you say, pushing away his hand. \n\n\nWhile you’re digging in a pile of rope, a bell rings at the entry of the shop. Through your peripheral vision, you notice that the Tank has left the party. “Good riddance,” you say to yourself. “He was nothing but a pain in my rear anyway.”\n\n\nYour mother always played by the rules, clipped and filed down her ears, hid her true heritage, and what did that get her? Misery and duty. Not you. You take what you want and live life your way…without rules, without limitations, and most of all, without paying for upgrades.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou successfully get your gear with a five-finger discount and continue on inside the cave. Gain +1 SAVE!\n\t\t\t\t\t*set save +1\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto claws_out\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto red_handed\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Steal?\n\t\t\t\t\t\t\tYou successfully get your gear with a five-finger discount and continue on inside the cave. Gain +1 SAVE!\n\t\t\t\t\t\t\t*set save +1\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto claws_out\n\t\t\t\t\t\t#Get caught?\n\t\t\t\t\t\t\t*goto red_handed\n\n\n*label red_handed\nThe shopkeeper seems to be following you around like a shadow. You keep looking over your shoulder at him while trying to not seem suspicious, but the items you stuffed inside your sack make it quite difficult to do. You want to put the items back, but his intense gaze isn’t giving you the opportunity.\n\n\nYou pick up random supplies—bandages, rope, and other worthless things—to seem like a normal, unsuspecting customer, but the shopkeeper doesn’t seem to be buying it. In fact, now his eyes are narrowing.\n\n\nThis whole situation might have been a bad idea. But what’s done is done, and there is no going back now. \n\n*choice\n\t#Create a diversion.\n\t\t*goto whats_that_over_there\n\t#Flee.\n\t\t*goto ward\n\n\n*label whats_that_over_there\nYou create a diversion by knocking over a display filled with bear traps. The shopkeeper is now met with snapping jaws all around him while you reach into your backpack to replace the previously stolen goods. Then as you’re about to return the rope you took, the shopkeeper chops off your sword- swinging hand.\n\n\nThe Healer manages to stop your bleeding, but the severity of your severed limb is a little more permanent.\n\n\nWithout the use of your hand, this is a fate worse than death. In a fit of rage, you use your torch and burn down the store and everyone in it. \n\n\nYou live out the rest of your days as a shameful thief without glory or honor.\n\n\nThe End\n\n\nIf you want a more honorable ending, please go back to “The Beginning” and try a different path.\n\n*achieve end48\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label time_management\nLeaving the woman, you continue deeper into the cave. You soon enter a room housed with a one-eyed giant. \n\n\n“This head is going to be a monster to drag out of here.” As you rush towards it in order to attack, time stops for a moment as you’re reaching back, mid-swing.\n\n\nYou feel time starting to reverse as you walk backwards and on through the conversation with the girl and onward, all the way back to the town of Teepeekay.\n\n\nSomeone or something is playing with the fabric of time, and you hate it.\n\n\nWatching your life in reverse gives you some insight as to things you could have/should have done better. This whole situation may not be that bad after all, though only time will tell.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou gain 1 SAVE!\n\t\t\t\t\t*set save +1\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto page_81\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou lose 1 SAVE.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*set save -1\n\t\t\t\t\t*goto its_killing_time\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Gain a SAVE?\n\t\t\t\t\t\t\tYou gain 1 SAVE!\n\t\t\t\t\t\t\t*set save +1\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto page_81\n\t\t\t\t\t\t#Lose a SAVE?\n\t\t\t\t\t\t\tYou lose 1 SAVE.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*set save -1\n\t\t\t\t\t\t\t*goto its_killing_time\n\n*label cat_fight\nYou and the Healer walk into the cave, and she already starts to complain. “What’s that smell?”\n\n\n“Death.” \n\n\n“I don’t like it.”\n\n\n“What did you think we came here for?”\n\n\n“I know, but I didn’t think it would smell so rancid.”\n\n\n“It’s going to be messy, too. You probably shouldn’t have worn white.”\n\n\n“And why is it so dark?”\n\n\n“Because it’s a cave.”\n\n\n“I don’t like this.”\n\n\n“Well, I don’t like you.”\n\n\nThe Healer looks as though she wants to trade insults with you, but she refrains. \n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto claws_out\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tThe Healer says “Nope,” and leaves the cave. “What a princess,” you yell back to her, and you hear her laughing almost hysterically from outside. \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto solo_run\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Cat fight?\n\t\t\t\t\t\t\t*goto claws_out\n\t\t\t\t\t\t#The Healer says “Nope,” and leaves the cave. “What a princess,” you yell back to her, and you hear her laughing almost hysterically from outside. \n\t\t\t\t\t\t\t*goto solo_run\n\n\n*label claws_out\nYou go through a room with a round opening. The Healer lets out a little distressful yelp.\n\n\n“What happened now, Healer?” you ask, rolling your eyes.\n\n\n“Nothing. Just a bug bite,” she says, holding a wound on her side. “And Healer is not my name; it’s my dutiful role.”\n\n\n“That’s because I don’t know your name.”\n\n\nThe Healer walks up to you and cups her hands while she whispers her true name to you.\n\n\n“Whatever,” you say. Knowing her name isn’t going to change anything. She is still a healer, and she better heal.\n\n\nThen you hear the sound of the Healer tossing something on the ground behind you. \n\n\nYou pay it no mind as you fear this partnership is already going to turn into you babysitting this little princess, though you keep your thoughts to yourself so as not to ruffle any feathers. \n\n\nYou make your way to an open gap with a couple conveniently placed roots hanging down. Giving them a couple hard tugs, you figure they’re safe enough to swing across.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\t\t\t\t\t\n\t\t\t\t\tYou swing across the gap with ease, but the Healer slips down on her vine, causing her to slam into the side of the spiky cliff, dying instantly.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto solo_run\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tThe Healer makes it across with ease and gives you a big smile, followed by a thumbs up. You try and show off and swing across, but your vine suddenly snaps. \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto touched_by_an_angel\n\t*if (Save > 0) #Use a SAVE to make sure you both get across safely. \n\t\t\t\t\t*set save - 1\n\t\t\t\t\tIf you used a SAVE, you both swing across at the same time, but the Healer’s vine starts to crack, and you instruct her to jump into your arms. You catch her, and you tumble on the other side with your arms wrapped around each other.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\tIt is very awkward, but you kind of like it. As an orphan, you aren’t really used to this much human contact. \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\tDusting yourself off, you cough and talk about the last monster you killed to try and seem tough.\n\t\t\t\t\t*goto pew_pew\n\n\n\n*label touched_by_an_angel\nYou’re falling into the deep chasm, and you see the face of the Healer descending down for you. You’re not sure what she’s up to. She either has a trick up her sleeve and is trying to save you, or she was so clumsy that she slipped off the edge. \n\n\nOf course, there is also the possibility that she purposely jumped off after seeing you fall because she can’t possibly survive without you, and she just gave up. Whatever the case may be, you call out to her, “Ethelbe, catch me!”\n\n\nWith determination in her eyes, the Healer tucks into a dive and is catching up to you at a rapid rate. There is hope for you yet.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto we_go\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto waterboarding\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#You die?\n\t\t\t\t\t\t\t*goto we_go\n\t\t\t\t\t\t#You die more?\n\t\t\t\t\t\t\t*goto waterboarding\n\n\n*label we_go\n*image death.jpg\nThe Healer looks at you with a lightness in her eyes. Radiant wings sprout out of her back as she soars down to save you.\n\n\nHer act of selflessness makes you wish you were a better person in life. You speak to any god that will listen, begging for another chance at life, to raise kids and find love, and that you promise to give up killing forever. \n\n\nHowever, you crash into a pool of acid. The Healer follows you inside. Both of you melt away while you hold on to each other tightly. \n\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#Start over at “The Beginning” if you want to do better.\n\t\t*goto the_beginning\n\n\n*label waterboarding\n*image death.jpg\nYou crash into a pool of water, and the impact with the surface knocks the wind out of you. Gasping for air as you sink into the dark liquid, your lungs fill with liquid, and you drown. \n\n\nSome singing frogman fishes you out later that day, and he wears your clothes and eats your waterlogged flesh. You know this because now you’re a ghost, haunting these caves for eternity. \n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#Go back to “The Beginning” if you think this is not a good ending.\n\t\t*goto the_beginning\n\n\n*label pew_pew\nYou enter a room, and there is an elderly man with a pointy hat reading a book of spells. Enthralled with his reading material, he doesn’t notice you. That, or he doesn’t care to greet you.\n\n*fake_choice\n\t#Do a sneak attack?\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\tYou hide behind him and pull the chair out from under him while stabbing him through the chest, killing him outright.\n\t\t\t\t\t\t\tYou gain +1 SAVE!\n\t\t\t\t\t\t\t*set save +1\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto bad_book\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\tYou jump out to stab him, and he holds up a hand, freezing you in midair while he finishes the chapter.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto wizards_are_jerks\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t#You hide behind him and pull the chair out from under him while stabbing him through the chest, killing him outright.\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tGain +1 SAVE!\n\t\t\t\t\t\t\t\t\t*set save +1\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*goto bad_book\n\t\t\t\t\t\t\t\t#You jump out to stab him, and he holds up a hand, freezing you in midair while he finishes the chapter.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*goto wizards_are_jerks\n\t#Talk to him?\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tHe closes his book and smiles at you. Gain +1 SAVE!\n\t\t\t\t\t\t\t*set save +1\n\n\n\t\t\t\t\t\t\t*goto wizards_are_not_jerks\n\t\t\t\t\t\t\t\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou jump out to stab him, and he holds up a hand, freezing you in midair while he finishes the chapter.\n\n\n\t\t\t\t\t\t\t*goto wizards_are_jerks\t\t\t\t\t\t\t\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#He closes his book and smiles at you.\n\t\t\t\t\t\t\t\t\tGain +1 SAVE!\n\t\t\t\t\t\t\t\t\t*set save +1\n\n\n\t\t\t\t\t\t\t\t\t*goto wizards_are_not_jerks\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t#You jump out to stab him, and he holds up a hand, freezing you in midair while he finishes the chapter.\n\t\t\t\t\t\t\t\t\t*goto wizards_are_jerks\n\n\n*label wizards_are_not_jerks\nThe wizard clasps his hands together and greets you with a hardy hello. \n\n\nDecide what you say to him.\n*choice\n\t#“Where the dinos at?”\n\t\tHe reaches out for your hand. You are teleported someplace else. \n\t\t*goto big_fella\n\t#“What cha reading?”\t\n\t\tHe holds up a black book written in the language of death. “Here, give it a gander.” He tosses you the book and vanishes.\n\t\t*goto bad_book\n\t#“Show me the Money.”\n\t\t“Making it rain,” he says. \n\t\t\n\t\t\n\t\tYou are teleported to a pit of money. \n\t\t*goto rich_in_death\n\t#“Do a trick.”\n\t\tHe casts a spell, then vanishes.\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\tYou both swap bodies and are at the entrance of the cave.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto two_gals\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\tThe wizard zaps the Healer, and she falls to the ground. Lose 1 SAVE\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto take_care\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#You both swap bodies and are at the entrance of the cave.\n\t\t\t\t\t\t\t\t\t*goto two_gals\n\t\t\t\t\t\t\t\t#The wizard zaps the Healer, and she falls to the ground.\n\t\t\t\t\t\t\t\t\tLose 1 SAVE.\n\t\t\t\t\t\t\t\t\t*set save -1\n\t\t\t\t\t\t\t\t\t*goto take_care\n\n*label wizards_are_jerks\n*image death.jpg\nThe wizard opens a portal to hell, and a hellhound emerges out of it. The thing lets out a cute little bark, and a fireball torches the Healer. Then the portal sucks you into the depths of hell where you are dead but also meet some of your best friends.\n\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#If you don’t want to go to hell, forget all this and start over at “The Beginning.” Nobody has to know you suffered this fate.\n\t\t*goto the_beginning\n\t\n\n*label bad_book\nThe Healer holds the dark book and drops it like it were hot.\n\n\n“What’s wrong?”\n\n\n“That book is evil. I shouldn’t be touching it.”\n\n\n“Come on. Haven’t you spent your whole life doing the right thing? The wizard guy was reading it, and nothing bad happened to him,” you say.\n\n\n“I don’t know.”\n\n\n“You might like it, if you would just give it a shot.”\n\n\n“I’ll just glance at it.” Upon opening it, a surge of power shoots out of its pages and into the Healer. She turns dark and demonic-looking. Her voice gets low, and she is now speaking backwards and you cannot understand her, although to you, she looks kinda hot.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto homeless_and_helpless\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto dark_death\n\t*if (Save > 0) #Use a SAVE for a do over!\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#She casts a rewind spell, sending you back in time.\n\t\t\t\t\t\t\t*goto page_81\n\t\t\t\t\t\t\n\n*label dark_death\n*image death.jpg\nThe evil Healer drains you of all your life, turning you into nothing but dust. Even though your body is no more, your soul is bound to the spiderblade, an enchanted sword used for death and torture. The pain goddess, (what the Healer calls herself now) wields you daily for her evil escapades.\n\n\nFor you, this afterlife isn’t so bad…all in a day’s work and whatnot.\n\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#If you don’t want to spend your eternity as a weapon, go back to “The Beginning” and try something else. But truth be told, you get to kill without having to eat, sleep, and poop.\n\t\t*goto the_beginning\n\n\n*label all_the_support_i_need\nYou, a Healer and some weird-looking Support all enter the cave without much care or plan. Inside you come across a room that is rotating as if it were on some kind of rollers. With a loud thud, the room finally seems to have snapped into place. You have the notion that you weren’t supposed to witness that, like catching a child god-playing with toys. In your life, you’ve seen many unexplainable things, and you chalk this up as just another one.\n\n\n“Which way?” you ask your party.\n\n\n“That is the safest path,” the Healer says.\n\n\n“I say we look for a secret exit. The other exits are most likely trapped,” the Support explains.\n\n*choice\n\t#Do you listen to the Healer?\n\t\t*goto not_trapped_at_all\n\t#Do you listen to the Support?\n\t\t*goto secrets\n\t#Do you listen to yourself?\n\t\t*goto bye_bitches\n\n\n*label not_trapped_at_all\nYou decide to take the easy path. \n\n\nProving that the Support was being overly paranoid, the Healer skips out of the room, almost taunting any higher power that may be watching.\n\n\n“You never had any siblings, did you?” you ask.\n\n\n“If you must know, I was an orphan.”\n\n\n“Funny. Me, too…”\n\n\n“Really? What orphanage were you at?”\n\n\n“None. I ran away from home at a young age.”\n\n\n“How does that make you an orphan?”\n\n\n“Because my parents are dead to me.” \n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tThe Healer is shot with a heart-shaped dart. You look into the shadows, and you could have sworn a little naked cherub flew out of a medium hole in the ceiling. Gain +1 SAVE!\n\t\t\t\t\t*set save +1\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto love_trapped\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tThe Healer walks right through a spider’s web, making her slow and lethargic. Mr. Garvin was explicit on giving a bonus on any dead spiders.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto slow_poke\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#The Healer is shot with a heart-shaped dart. You look into the shadows, and you could have sworn a little naked cherub flew out of a medium hole in the ceiling. \n\t\t\t\t\t\t\tYou gain +1 SAVE!\n\t\t\t\t\t\t\t*set save +1\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto love_trapped\n\t\t\t\t\t\t#The Healer walks right through a spider’s web, making her slow and lethargic. Mr. Garvin was explicit on giving a bonus on any dead spiders.\n\t\t\t\t\t\t\t*goto slow_poke\n\n\n*label love_trapped\nYou go over to the Healer to see if she’s okay.\n\n\n“No need to fuss. It’s only a scratch,” the Healer says. Touching her wound with her healing staff, the small hole disappears before you can get a good look at it. “There. All better.”\n\n\n“All right. Well, be more careful next time, okay?” you say, putting a kind hand on her shoulder.\n\n\nShe looks up at you with a sort of doe-eyed expression. “You’re pretty…”\n\n\n“What?”\n\n\n“…nice,” she finishes her compliment.\n\n\n“No. I am ruthless and fearless.” \n\n\n“I wish I were like you…” she slurs her words.\n\n\n“Something is wrong with her,” the Support says.\n\n\n“No kidding.” You reach inside her pockets, and she giggles as if you’re intentionally trying to tickle her. You pull out an empty bottle with elven writing on it. “I think she’s drunk,” you say, tossing the bottle on the ground.\n\n*choice\n\t#Do you try and sober her up?\n\t\tThe Support pulls out all his potions and tinctures, making her a strange concoction. You have to purse open her lips in order to force the liquid down her throat.\n\t\t\n\t\t\n\t\t“This isn’t working,” you say, as the Healer is making kissing noises at you. \n\t\t\n\t\t\n\t\t“I’ll try and get some help,” the Support says, leaving you both alone.\n\t\t*goto take_care\t\t\n\t#Do you continue on with her like this?\n\t\tThe Support carries her on his back, and you all walk down a long, dark corridor. “Weeeee,” the Healer cries out as she rides the Support like a horse. Gain +1 SAVE !\n\t\t*set save +1\n\t\t*goto two_and_a_half\n\t#Do you leave her behind?\n\t\tIf you leave her behind, you create a soft bed, and a hellhound corgi curls up next to the Healer as if a domesticated pet.\n\t\t\n\t\t\n\t\t“Keep her safe, girl,” you say to the mutt as you leave out a passageway. \n\t\t\n\t\t\n\t\t“She just needs to sleep it off,” you say to the Support. \n\t\t*goto epic_chest\n\n\n\n*label take_care\nYou spend the afternoon petting the Healer’s hair as she complains about how the world is constantly spinning around, which is crazy because everyone knows the world is as flat as your sword’s blade. Slowly but surely, the Healer starts to return to normal, as normal and boring as she was before.\n\n\n“I’m sorry that I’m such a burden,” she says, seemingly embarrassed by her recent behavior.\n\n\n“It’s okay. These things happen.”\n\n\n“I don’t know why I’m saying this now, but I think I love you.”\n\n\nThis is most unexpected, not because she has come down with some feels, but rather how you’re not at all surprised by her declaration. \n\n*if (Save > 0)\n\t*set save -1\n\t*goto ditto\n*else\nYou push her aside. “I’m not into relationships. They only make you weak.” You then leave her alone, with the sound of her sobbing behind you. It really isn’t a big thing. People fall in love with you all the time, and why wouldn’t they? You’re awesome. \n\n\n*goto friend_or_foe\n\n\n*label ditto\nYou passionately kiss the Healer. Together you decide to leave this cave and start a new life, beginning with immediately moving in together and on to…who knows what else.\n\n\nYou never knew what had come over her that day, maybe fate, maybe a higher or darker power. Either way, you both adopt an army of kids from the orphanage and raise them to be strong like you and caring like your wife.\n\n\nEverything on the surface seems perfect, though there is one lie you must hide from your spouse. Once in a while, you sneak off into the dead of night and revisit the magical cave where you both met. Until sunrise, you murder as many monsters as you can. It is a deadly vice you cannot quit, and divorce will be your future if you ever get caught. But like any addict, you cannot stop without outside support, and he left your party long ago.\n\n*choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tShe never finds out.\n\t\t\t\t\t*achieve end50\n\t\t\t\t\t*stat_chart\n\t\t\t\t\t\ttext Deaths \n\t\t\t\t\t*goto_scene ending\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tShe catches you.\n\t\t\t\t\t*achieve end49\n\t\t\t\t\t*stat_chart\n\t\t\t\t\t\ttext Deaths \n\t\t\t\t\t*goto_scene ending\n\t\t\t\t\n\n*label slow_poke\nIn the next room, you’re met by a mega-bearded wizard and his corgi familiar. Both growl at you menacingly. You rush in to give the wizened old coot a new face, and a fiery blast ignites the whole room. Even though you’re on fire, you murder the man in a string of combo attacks.\n\n\nYou await some sweet healing, but the Healer seems to be struggling with the spider’s web that she encountered upon entering the room. The fire somehow turned the webbing to a sloppy goo. She looks as though she has been slimed as she struggles with the stuff. \n\n\n“I’m burning here,” you call out.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tRight before the Support dies, he buffed the Healer’s healing ability, granting her a mass healing effect. Soon you are both cured.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto claws_out\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tAs the Support burns alive, you grab the Healer’s staff. She burns next while you try to administer healing to yourself, but it is much too late.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto cinder\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Right before the Support dies, he buffed the Healer’s healing ability, granting her a mass healing effect. Soon you are both cured.\n\t\t\t\t\t\t\t*goto claws_out\n\t\t\t\t\t\t#As the Support burns alive, you grab the Healer’s staff. She burns next while you try to administer healing to yourself, but it is much too late.\n\t\t\t\t\t\t\t*goto cinder\n\n\n\n*label secrets\nAll three of you blindly feel around the walls, looking for any cracks or switches.\n\n\n“I think I found something,” the Healer calls out, holding on to a stalagmite that is shaped like a lever of some kind.\n\n\n“Great job. Now pull it,” the Support says as you brace for a giant boulder or flying arrow. \n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tThe lever triggers a trap that blows green pollen right into the Healer’s face. She falls to the ground, fast asleep. The Support picks her up.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto two_and_a_half\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tThe lever triggers a fiery blast to hit the Support right in the face. He is covered in blisters from head to toe. \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t“Why did you do that?” the Support screams.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t“It was your idea!” the Healer deflects.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\tThe Healer pulls out her staff and tries to cast a minor healing spell, but it only seems to be making the pain worse. \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\tThe Support decides to stay where he is and leave the party.\n\t\t\t\t\t*goto claws_out\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#The lever triggers a trap that blows green pollen right into the Healer’s face. She falls to the ground, fast asleep. The Support picks her up.\n\t\t\t\t\t\t\t*goto two_and_a_half\n\t\t\t\t\t\t#The lever triggers a fiery blast to hit the Support right in the face. He is covered in blisters from head to toe. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t“Why did you do that?” the Support screams.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t“It was your idea!” the Healer deflects.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe Healer pulls out her staff and tries to cast a minor healing spell, but it only seems to be making the pain worse. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe Support decides to stay where he is and leave the party.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto claws_out\n\n\n\n*label two_and_a_half\nThe Support keeps going on about secret passages and whatnot, and eventually he finds one that actually takes you through some mud trail, across a rope bridge, and on down to a treasure room. \n\n\nWaiting for you at the bottom is the infamous magic flying dinosaur.\n\n\n“We fighting this thing?” the Support asks.\n\n\n“I don’t see how we can avoid it,” you reason.\n\n\nThe Support looks over his shoulder at the sleeping beauty on his back. She is sucking on her thumb like a child. “This is going to be a doosey.”\n\n\n“A doosey is better than a don’t-sey.”\n\n\nWithout time for you to prepare, the dinosaur comes at you like a bat out of hell who has to pee.\n\n*choice\n\t#Do you feed the Healer to the dino?\n\t\t*goto dino_distract\n\t#Do you attack as normal?\t\t\n\t\tYou gain +1 SAVE!\n\t\t*set save +1\n\t\t\n\t\t\n\t\t*goto monkey_on_the_back\n\t\n\n*label monkey_on_the_back\nThe dinosaur lets out a thunderous roar that wakes the Healer right up, and she is suddenly ready for action, like an old pro.\n\n\n“Glad to have you back,” you point out.\n\n\n“Wouldn’t miss it,” she says.\n\n\nThe Support casts a haste spell that makes you even more agile. \n\n\nDancing left and right, you’re jabbing at the beast as it attacks you. \n\n\nEach bite, scratch, and tail whap that hits you is instantly restored by the Healer’s healing magic. \n\n\nYou have found your stride—until the dinosaur unleashes its ultimate power.\n\n*if (Save = 1)\n\tThe dinosaur grows six heads, and they all attack you at the same time. You use one SAVE.\n\t*set save -1\n\t\n\t\n\t*goto chomp_chomp\n*if (Save > 1)\n\tThe dinosaur makes a copy of itself, and now there are two of them for you to fight. You lose 2 SAVES.\n\t*set save -2\n\t\n\t\n\t*goto seeing_double\n*else \n\tAll the treasure grows teeth in which to bite you.\n\t\n\t\n\t*goto tricky_trap\n\n\n*label chomp_chomp\nThe two dinosaur heads attack, and you manage to decapitate one with ease. \n\n\nThe Support isn’t so lucky and gets cut in half. \n\n\nThe Healer cries out, “No, my love!” before trying to heal him, but it is no use. He is already gone forever. You get the sense that while she might have seemed unconscious while he carried her around, she must have gotten attached to him.\n\n\nYou request some healing, but she soon suffers the same fate as the Support. \n\n\nIt is just you and the heads. Not wanting to waste the haste spell the Support granted, you circle around cutting off one head at a time until you are victorious, though the cost of your two friends’ lives is quite high.\n\n\nOut of all the treasure, you pick up a golden crown that rests on a pedestal and place it firmly upon your head. You feel raw energy flowing through your head. It feels warm and powerful. You now have superhuman strength and drag the dinosaur carcass out of the cave by its tail.\n\n\nWith your new sword and massive strength, you exterminate many rare species throughout your life. But you will always remember your first.\n*achieve end51\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label seeing_double\nBoth dinosaurs look at each other like they are supposed to be extinct. Then they hold hands and fly away, busting through the ceiling of the cave. In the night’s sky, you see a full moon and remember this as the first day before the end of days. \nFor you see, those two dinosaurs will breed and breed until every town, cave, and park will be infested with killer magical lizards. \n\n\nWith no natural predators, they will take over the world, leaving man to hide underground in the very caves that unleashed their kind upon the world.\n*achieve end52\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label dino_distract\nWhile the dinosaur chomps the Healer like a hard-shell taco, you notice the Support filling his pockets with gold and other riches. \n\n\n“What do you think you’re doing?”\n\n\n“It’s distracted. Let’s loot, then take to the boot.”\n\n\nAs tempting as his offer is, you didn’t come here for riches; you came here for glory. But without the Healer’s heals and the Support’s support, what chance do you have at defeating the thing? “I don’t like this idea. It feels a bit dishonorable.”\n\n\n“That’s because it is. But there isn’t any honor in dying. Once back at town, we can restock our inventory and return later when better equipped.”\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou join him in looting, and you find a golden sword with magical energy radiating off of it. \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto flee_with_me\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tThe dinosaur hits the Support with a death-ray attack, and he dies instantly. It’s just you and the beast.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto big_fella\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#You join him in looting, and you find a golden sword with magical energy radiating off of it. \n\t\t\t\t\t\t\t*goto flee_with_me\n\t\t\t\t\t\t#The dinosaur hits the Support with a death-ray attack, and he dies instantly. It’s just you and the beast.\n\t\t\t\t\t\t\t*goto big_fella\n\n\n*label flee_with_me\nThe Support runs out of the room and you follow him. Gold and other riches fall out of his bulging pockets as he takes off into the dark. \n\n\nThere is no time for you to pick up after him because the dinosaur is right behind you, crashing through exits that are much too small for his large body. \n\n\n“Better up the pace,” you say.\n\n\nThe Support pauses for a moment and casts some haste spell upon himself and takes off at a heightened rate.\n\n\n“What about me?” It is too late; the Support is already gone. You lost valuable time thinking he was going to buff you as well. Now the dino is literally biting at your heels.\n\n\nThe whole cave is coming down at once. What good is wealth if you’re too dead to spend it.\n\n\n\n*if (Save > 0)\n\tYou use 1 SAVE!\n\t*set save -1\n\t\n\t*goto the_sky_is_falling\n*else\n\t*goto hey_you_guys\n\n\n*label the_sky_is_falling\nWhile the whole cave is crumbling around you, the Support doubles back and uses his magical haste ability on you as well. \n\n\nNow you’re running twice as fast. Together you’re able to reach the exit before it collapses completely. From inside, you hear a terrible roar as the dinosaur gets crushed still inside the cave. \n\n\nYou return to the town only to find that it has vanished. There are marks from where all the buildings once were, the Mudd Puddle, the Crab’s Revenge, everything. Using what little gold you managed to pillage from the treasure room, you get yourself to the next town over, Wipeville, which is more than five hundred miles away.\n\n\nThis town looks nearly identical to Teepeekay. They have a seafood restaurant called the Crabshack and a tavern called the Dirty Water. Even the layout of the buildings is the same.\n\n\nThe Support spots a mysterious cave entrance on your way into the town. \nBroke again, you and the Support look at each other before saying in unison. “Want to look for a quest?”\n*achieve end53\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label epic_chest\nYou and your supportive friend move into the next room and spot a giant treasure chest. Always down for some loot, you approach it without care.\n\n\n“Bigger chests are always more fun,” the Support says.\n\n\n“What do you mean by that, exactly?” You look down at your rack, wondering if he was making a dig at your physical appearance, which isn’t bad in your opinion.\n\n\n“What? No…I wasn’t trying to…what I mean to say…”\n\n\n“Uh-huh…”\n\n\n“I’m sorry if it came out all wrong. I…I…”\n\n\n“Forget it. Let’s just see what’s inside.” You walk over to the large container and twiddle your fingers in anticipation.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou find a new set of armor and sharper sword. Gain +1 SAVE!\n\t\t\t\t\t*set save +1\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto supports_friend\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tThe chest turns alive and bites down on your head. \n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto tricky_trap\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#You find a new set of armor and sharper sword. \n\t\t\t\t\t\t\tYou gain +1 SAVE!\n\t\t\t\t\t\t\t*set save +1\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto supports_friend\n\t\t\t\t\t\t#The chest turns alive and bites down on your head. \n\t\t\t\t\t\t\t*goto tricky_trap\n\n\n*label supports_friend\nAfter equipping your new stuff, you decide to give the Support your old leather gear. He looks about your size, anyway. You realize that any animosity you have towards him is based purely on his fashion sense, or lack thereof, sexist remarks aside. \n\n\nTogether you manage to clear out a couple more rooms of the cave until you reach a cultist.\n\n\nHolding your sword, ready for the slaughter, the Support blocks you with his hand.\n\n\n“No, wait. You can’t kill him.”\n\n\n“Why is that, exactly?”\n\n\n“Because I am one of them.”\n\n\n“You’re in a cult?”\n\n\n“It’s a religion,” he corrects you.\n\n\nBoth the Support and the cultist give each other a secret handshake, then laugh.\n\n*choice \n\t#Do you slaughter them both?\n\t\t*goto multi_plicity\n\t#Do you see what they're all about?\n\t\t*goto a_new_you\n\t#Do you take a chance?\n\t\t*goto a_new_you\n\t\n\n*label a_new_you\nYou read a couple self-help books, and they really start to resonate with you—your abandonment issues, your resentment towards your family, even your murderous rage. \n\n\nWhile the Support has a job of recruiting people into the cult, you get the job of ethics officer. You track down defectors who leave the flock and give them the ultimatum—return to the fold or die. Secretly you hope they choose death, because killing is what you’re great at. \n\n\nBeyond the gains you achieved during those first couple of days, you never gained the enlightenment that the cult promised, but that was never your goal to begin with. \n\n\nThe End\n\n\nIf you would like to kill monsters instead of defectors, please start over at “The Beginning” and try again.\n*achieve end54\n*stat_chart\n\ttext Deaths \n*goto_scene ending\n\n\n*label tricky_trap\n*image death.jpg\nNot able to see, you flail around like a chicken with its head cut off, except you head is still intact.\n\n\nThe Support uses an ability that increases your attacks. You swing your mighty sword at the object attached to your head, only your sword goes right through the creature and, in turn, you as well. \n\n\nYou died with your own blade lodged in your head. \n\n\nThe Support writes a sad story about the experience, and it becomes an instant bestseller.\n\n\n*set deaths +1\n*set save 0\n*set character \"unknown\"\n*choice\n\t#What a way to go. If you want to go a different way, go right back to “The Beginning” and try something else.\n\t\t*goto the_beginning\n\n\n*label bye_bitches\nNone of those are the answers you wanted. You pull out a whip that you are saving for such a purpose and whip onto a bat’s leg as it circles above you. \n\n\nThe Giant beast notices you are climbing up the whip and tries to slam you against sharp rocks that are jutting out of the wall.\n\n\n“Hold still, you little bastard,” you threaten as you reach his clawed feet.\n\n\nYour party is long gone you know, as the giant bat carries you through the heights of many dangerous rooms.\n\n\nHitching a ride is actually quite relaxing to you—the air blowing through your hair, the smell of monsters below. All rides must come to an end. \n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\tYou reach a room that looks more to your liking, and you drop down safely.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto solo_run\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\t\t\t\t\t\n\t\t\t\t\tYou try and drop down, but now the giant bat has you ensnared by its sharp claws\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t*goto i_can_see_my_house_from_here\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#You reach a room that looks more to your liking, and you drop down safely.\n\t\t\t\t\t\t\t*goto solo_run\n\t\t\t\t\t\t#You try and drop down, but now the giant bat has you ensnared by its sharp claws\n\t\t\t\t\t\t\t*goto i_can_see_my_house_from_here\n\n\n*label how_to_catch_a_criminal\nYou enter the cave with a sack full of collapsible cages, beartraps, and trip lines. Catching animals is easy. You just have to appeal to their primal need…food. \n\n\nTrapping people isn’t much different. Wealth and treasure are often great substitutes for food-based baits. Although trapping a killer, that is something entirely different. \n\n\nFirst you have to ask yourself, are they killing for revenge or for sport? In order to find the perfect bait, you must get inside the mind of the deranged and hope you come out the other side.\n\n\nGetting ready to do the dastardly deed, you douse yourself with monster repellant and head inside the cave.\n\n*choice\n\t#Do you set a beartrap?\n\t\t*goto beartrap\n\t#Do you set a tripwire?\n\t\t*goto tripwire\n\t#Do you set a pitfall?\n\t\t*goto pitfall\n\n\n*label beartrap\nYou find an impression of a giant’s foot in soft muddy soil near an underground spring. This is the perfect spot for you to place the beartrap inside. \n\n\nYou slowly and skillfully open the metal jaws and place it inside the impression. Then you fill the toes with twigs to really sell your deception. Now it’s time for the bait.\n\n\n“Whadda we got?” you say, looking through your bag o’ tricks.\n\n*fake_choice\n\t#Do you use the money as bait?\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto bear_trapped_with_money\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto nothing\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t#Catch something!\n\t\t\t\t\t\t\t\t\t*goto bear_trapped_with_money\n\t\t\t\t\t\t\t\t#No bite.\n\t\t\t\t\t\t\t\t\t*goto nothing\n\t\t\n\t#Do you use food as bait?\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto bear_trapped_with_food\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto nothing\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Catch something!\n\t\t\t\t\t\t\t\t\t*goto bear_trapped_with_food\n\t\t\t\t\t\t\t\t#No bite.\n\t\t\t\t\t\t\t\t\t*goto nothing\n\t#Do you use yourself as bait?\n\t\t*fake_choice\n\t\t\t#Chance fate!\n\t\t\t\t*temp dieroll \n\t\t\t\t*rand dieroll 1 2\n\t\t\t\t*if (dieroll = 1)\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto bear_trapped_with_yourself\n\t\t\t\t*else\n\t\t\t\t\t*image fate.jpg\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t\t\t*goto nothing\n\t\t\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t\t\t*set save - 1\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Catch something!\n\t\t\t\t\t\t\t\t\t*goto bear_trapped_with_yourself\n\t\t\t\t\t\t\t\t#No bite.\n\t\t\t\t\t\t\t\t\t*goto nothing\n\n*label nothing\nYou try the beartrap method and wait around for hours. This is all part of the trapping game. Sitting, waiting, vigilance, and a lot of sunflower seeds.\n\n\nOnce your seed pile is nearly a seed mountain, a group of adventurers strolls by. Good thing they don’t get caught in it from a liability standpoint. But on the flip side, there is no interest from them, which makes you debate your placement of the snare. Maybe you used the wrong bait, or perhaps the wrong style of trap. \n\n\n“This was a huge waste of time and effort,” you say, reclaiming your beartrap.\n\n\nIt’s time to go back to the drawing board. If you can’t even snare a couple of unsuspecting adventurers, what are the odds of trapping a cunning murderer?\n\n*choice\n\t#Decide to use a pitfall trap.\n\t\t*goto pitfall\n\t#Decide to use a tripwire trap.\n\t\t*goto tripwire\n\n\n*label bear_trapped_with_money\nYou take your nearly empty coin purse and fill it with rocks while placing a couple of gold coins on top. It’s much easier to get a bite with a feast than a crumb. Carefully you place the heavy sack on the trigger switch for the hidden beartrap and open the purse’s drawstring enough to show off what’s inside, then position a candle to shed light just right on the coins, allowing them to shimmer. \n\n\nAfter biting your nails for a bit, you catch a nibble. An old bandit sees the coins and paces back and forth trying to figure out how to get to it. Could this be the murderer you’re after?\n\n\nGetting impatient, you sneak up behind the elder and push him into the trap. The trap’s jaws snap closed onto his neck, and he dies. “Whoops.” Going through the bandit’s things, you wonder if this guy was once an adventurer, since most of his belongings are tattered and dull.\n\n*choice\n\t#Decide if you want to try the tripwire.\n\t\t*goto tripwire\n\t#Decide if you want to try the pitfall.\n\t\t*goto pitfall\n\n\n*label bear_trapped_with_food\nYou place about a week’s worth of rations on a platter and arrange it in a very pleasing way. \n\n\nCulinary art has always been an interest of yours. One day you hope to open a “slaughter your own meal” type of restaurant. It could be both a tournament and a feast, although there is one minor snag—what if your dinner happens to win in the gladiator-style fight? Would you prepare a human feast for the beast? You tend to say yes, but some authorities would say no.\n\n\nAfter placing a fake bottle of wine on the picnic site, you wait about half a day.\n\n\nA wandering bear follows its nose straight to your vittles, and it gets snared in the trap. It must be starving because the thing doesn’t stop eating your bait while trapped.\n\n\nAfter releasing the bear and spraying it in the face with a concentrated pepper mixture, you reclaim your trap.\n\n\nLose 1 SAVE and try something different.\n*set save -1\n*choice\n\t#Try the tripwire trap?\n\t\t*goto tripwire\n\t#Try the pitfall trap?\n\t\t*goto pitfall\n\n\n*label bear_trapped_with_yourself\nYou pull out a vial of human blood that you have for such occasions and douse yourself with the stuff, then lie down against the wall with the hidden beartrap positioned in front of you.\n\n\nBeing a thespian in your youth, you let out loud moaning sounds that echo throughout the halls. It is really quite convincing, if you do say so yourself.\n\n\nIf you had more money, you would open up a theater to put on shows. You had this one idea about a beastmaster who murders humans as vengeance for crimes against the animal kingdom. \n\n\nSoon a gelatinous cube enters the room and goes right over to your beartrap. The metal jaws snap closed, but it doesn’t have a solid form to grab on to; instead, it just engulfs the whole thing.\n\n\nKnowing exactly what that creature is, you jump up and flee the room. Lucky for you, those living stomach acid cubes are slow. \n\n\nYou gain +3 SAVES!\n*set save +3\n\n*choice\n\t#Try the tripwire next?\n\t\t*goto tripwire\n\t#Try the pitfall next?\n\t\t*goto pitfall\n\t\n\n*label tripwire\nWithout too much trouble, you find a narrow hallway and decide to place a line in the archway upon entering. The arch is beautifully chiseled, which will almost guarantee any person of substance would admire such a work of art instead of looking down for a possible trap.\n\n\nYou’re not sure if you should bait the trap, use a visual or audible cue, or what. Ultimately you decide to use a net to snare whoever may trigger the trap. It is a tried and true method. Back in your youth, you used to capture bees, butterflies, and sprites inside your trusty bug net. Those are happy memories that bring a smile to your face.\n\n\nHunting and gathering yields many hours alone to reflect on your past and future. It’s an important time of growth. Being by yourself is often when your most creative and inspiring ideas come to mind.\n\n*if (Save > 1)\t\n\tYou used 2 SAVES to get here.\n\t*set save -2\n\t*goto trapped\n*else\n\t*goto caught\n\n\n*label caught\nYou wait some time, hiding behind a large boulder and fell from a cave-in. \n\n\nPassing the time, you imagine yourself living in the forest with a whole zoo of animals by your side. This is a daydream you have at times. Unfortunately, animal food isn’t cheap, and you’ll need to be rich in order to accommodate the amount of them you wish to foster. \n\n\nSnapping you out of it, you hear a cracking sound followed by a deep groan as your trap has been tripped.\n\n\nYou rush out behind the rock to notice that a one-eyed giant is all tangled up in your net and is flailing around worse than a blind man in a beehive. \n\n\nGetting close to the huge threat means risking getting trampled or worse. Your only real option is to run away and try something else—which is a shame because that almost worked. \n\n*choice \n\t#Do you try the beartrap?\n\t\t*goto beartrap\n\t#Do you try the pitfall?\n\t\t*goto pitfall\n\t\t\n\n*label trapped\nUsing your knowledge from your past failed traps, you use a special tripwire that won’t trigger if something too big passes through it. Likewise, if something too small comes by, it will also do nothing. It is the three bears of triggers, really—something has to be just right. Then you bait the trap with a foul smell to hide the scent of the sleeping powder you lined the net with. \n\n\nEverything is in place. Before long, you catch a party of two adventurers. They’re a Healer, and a DPS. This is not at all what you were hired to trap, but the powder did the trick, and they fall fast asleep. As you’re getting ready to cut them loose, you see a masked figure emerge out of the shadows. This is precisely the murderer you were hired to capture. \n\n\n“That was good, but not good enough,” the murderer says as he comes for you.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 2\n\t\t*if (dieroll = 1)\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto not_today\n\t\t*else\n\t\t\t*image fate.jpg\n\t\t\t*fake_choice\n\t\t\t\t#The wheels of fate have decided.\n\t\t\t\t\t*goto page_105\n\t*if (Save > 0) #Use a SAVE to pick your fate?\n\t\t\t\t\t*set save - 1\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Own?\n\t\t\t\t\t\t\t*goto not_today\n\t\t\t\t\t\t#Get owned?\n\t\t\t\t\t\t\t*goto page_105\n\n\n*label not_today\nWhile the murderer is quick and nimble, you are cunning, using your axe to block his deadly attacks. \n\n\nUsing an armed beartrap as a projectile, you throw it at the murderer. The trap snaps shut on his head, and he falls to the ground. You pull out your excess tripwire and wrap up his legs and use the pitfall cloth to wrap him up as a cocoon. You have done it; you caught yourself a murderer!\n\n\nKnowing that he might be bleeding to death from his face, you drag him back to the town of Teepeekay straight away.\n\n\nRanger Garvin is waiting for you while baking some delicious scones.\n\n\n“You’ve done it! Splendid. Here are your 1000 gold coins as promised.” Mr. Garvin pushes a heavy chest over to you.\n\n\n“What do you plan on doing with him?” you ask, suspecting that murder or torture isn’t exactly off the table.\n\n\n“I am going to set him free. You see, there is a nearly identical town on the other side of the lake. They have a cave much the same as ours. A lot of adventurers have been heading over there instead of here. Now, if I unleash this killer in their neck of the woods, people will start to adventure in our town instead.”\n\n\n“Suit yourself. It’s none of my business what you do with him after delivery.” You have to admit, it does sound pretty smart, eliminating the competition and all. But not as smart as what you have planned. With your 1000 gold coins, you buy yourself a wagon and head home…to the other side of the lake, and hopefully, to catch yourself another killer.\n\n*fake_choice\n\t#Chance fate!\n\t\t*temp dieroll \n\t\t*rand dieroll 1 3\n\t\t*if (dieroll = 1)\n\t\t\t\t\tYou’re able to feed and care for a zoo’s worth of animals.\n\t\t\n\t\t\t\t\t*achieve end55\n\t\t\t\t\t*st
