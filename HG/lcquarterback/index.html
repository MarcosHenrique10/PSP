<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Last Chance Quarterback — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "lcquarterback", "title": "Last Chance Quarterback", "scenes": {"17_loss": "The crowd showers the field in cheers, as your opponents cheer and celebrate. You know this feeling all too well, having lived it at the end of every decent season you've had: eliminated from the playoffs at the end of the season. You notice that the visual part of the scoreboard is showing plenty of shots of you in between the shots of your opponents celebrating. You try to keep a composed and professional look so that you at least go out with some dignity. Although you're not able to completely have a great pokerface, you have your helmet on, meaning that your ability to control your body language is enough to hide your emotions from the general public. A few teammates pat you on the back. Although this makes you feel a little better, and seems like a genuine response to cheer you up, its not enough to deal with the pain. \n*line_break\n*line_break\nYou and your teammates go out on the field to congratulate the opposing team, so you take your helmet off after taking a few seconds to calm down and go up to the opposing quarterback. He looks into your eye, shakes your hand and nods. \"Good game,\" he says to you. How do you respond?\n*fake_choice\n  #\"Good game\"\n  #\"Congrats\"\n  #I don't say anything, but I do give him a 'bro hug' while smiling.\n\n\"Thanks,\" he say to you. The cameras didn't see the whole thing, but they saw you being a good sport. After a few minutes of you getting to process the situation, a reporter with some of their production assistants stop you and request an interview. Although you're not in anything near a mood to do this, you recognize the cost of leaving your career by ducking out of an interview, and they promise to only ask on question, so you decide to accept. \n*page_break\n*line_break\n\"We have ${first_name} ${last_name} here,\" they say starting the interview. \"I just have one question for you,\" they say before asking said question.\n*line_break\n*if (team = \"Dogs\")\n  *line_break\n  \"At the start of the season, you decided to remain on the Dogs instead of changing teams. The Hyenas, who won earlier today, offered you a very generous offer. Do you have any regrets about your decision to remain with the Dogs?\"\n  *choice\n    #\"No. Loyalty is something that I never regret.\"\n      *set Team %+ 10\n      *set fans %+ 5\n      *goto part2\n    #\"I never really think about that stuff.\"\n      *set fans %+ 5\n      *goto part2\n    #\"Yes, I would have loved to have a better chance at winning it in my final season.\"\n      *set Team %- 10\n      *set fans %+ 5\n      *goto part2\n\n*if (team = \"Hyenas\")\n  *line_break\n  \"At the start of the season, you decided to join the Hyenas instead of remaining on the Dogs. Your old team The Dogs, won earlier today. Do you have any regrets about your decision to change teams?\"\n  *choice\n    #\"No. Making a decision that seems right in the moment is something that I never regret.\"\n      *set Team %+ 10\n      *set fans %+ 5\n      *goto part2\n    #\"I never really think about that stuff.\"\n      *set fans %+ 5\n      *goto part2\n    #\"Yes, I would have loved to have a better chance at winning it in my final season.\"\n      *set Team %- 10\n      *set fans %+ 5\n      *goto part2\n\n*label part2\n\n\"Thank you,\" the reporter says after finishing the interview. After a few days, nothing really happens and you decide to officially retire.\n*goto_scene retirement", "18_loss": "There's a brief silence of about a second or two after the game before the crowd erupts into an extremely loud cheer. You know the feeling of this so well, but this time it hits differently.\n*if (team_name = \"Dogs\")\n  You had the chance to sign with the Hyenas in the off-season and were genuinely considering it. This is an opportunity that you never had in the past. You knew the importance of this game as soon as you saw the match-up, and wanted to prove to yourself that you made the right decision. You don't want to think about it right now, but you feel you'll need some time to properly process this moment. You see that the scoreboard is showing you at the moment, but the fans don't really react as the news about your possible signing wasn't really that big. A teammate of yours pats you on the shoulder and says \"Don't worry about it, bro,\" You appreciate the sentiment, but it doesn't really do much to help you. You're focused on keeping professional body language, and thusly don't move much. Your poker face does break a little, but with your helmet still on, nobody notices so you're able to get away with it.\n  *goto part2\n*else\n  You had played your whole career with the Dogs before this season. The cheers sound exactly the same as before, but they hit in a whole new way. Previously, it was one of your favourite sounds in the world. Now, however, it feels like being crushed by a train. A deep part of you feels happy for your former teammates, but you mostly feel empty. You're not sure what would have happened had you stayed, but this will take a lot of time for you to sort out. You see that the scoreboard is showing shots of you. The fans don't seem to react to you very much, as they're too busy celebrating their team's victory. You find that not knowing the fans feeling towards you will probably be better. You don't know how you'd react to either a positive or negative opinion from them, but feel its best to not overthink it. The idea of not knowing their reaction is something you feel stops it. One of your teammates grabs your shoulder and looking you in the eye, saying \"You played good boss.\" Although the use of the nickname 'boss' sounds a little weird, you know its a term of endearment in this case, so you let it go. You're able to keep your body language professional, and since you have your helmet on, the devastated look on your face is hidden from the fans. \n  *goto part2\n\n*label part2\n\n\nAfter a few minutes of processing the feeling, you remove your helmet to go to onto the field to congratulate the other quarterback.\n*if (team_name = \"Dogs\")\n  The Hyenas were clearly able to sign someone who could get the job done. Feels odd to congratulate him, but its needed in order to keep some respect from fans.\n  *goto part3\n*else\n  It feels weird congratulating someone who took your old job, but its something you have to do in order to look at all professional.\n  *goto part3\n\n*label part3\n\nHe says \"Good game,\" and shakes your hand. How do you respond?\n*fake_choice\n  #\"Good game\"\n  #\"Congrats\"\n  #I don't say anything, but I do give him a 'bro hug' while smiling.\n\n\"Thanks,\" he says before leaving bck to his teammates. As you go back to the locker room wanting to get this over with, you're stopped by a reporter who aks you a simple question.\n*page_break\n*line_break\n\"We have ${first_name} ${last_name} here,\" they say starting the interview. \"I just have one question for you,\" they say before asking said question.\n*if (team = \"Dogs\")\n  *line_break\n  \"At the start of the season, you decided to remain on the Dogs instead of changing teams. The Hyenas, who offered you a solid contract, have now defeated you. Do you regret your decision to remain with the Dogs?\"\n  *choice\n    #\"No. Loyalty is something that I never regret.\"\n      *set Team %+ 10\n      *set fans %+ 5\n      *goto part2b\n    #\"I never really think about that stuff.\"\n      *set fans %+ 5\n      *goto part2b\n    #\"Yes, I would have loved to have a better chance at winning it in my final season.\"\n      *set Team %- 10\n      *set fans %+ 5\n      *goto part2b\n\n*if (team_name = \"Hyenas\")\n  *line_break\n  \"At the start of the season, you decided to join the Hyenas instead of remaining on the Dogs. The Dogs have now defeated you in the playoffs Do you regret changin teams?\"\n  *choice\n    #\"No. Making a decision that seems right in the moment is something that I never regret.\"\n      *set Team %+ 10\n      *set fans %+ 5\n      *goto part2b\n    #\"I never really think about that stuff.\"\n      *set fans %+ 5\n      *goto part2b\n    #\"Yes, I would have loved to have a better chance at winning it in my final season.\"\n      *set Team %- 10\n      *set fans %+ 5\n      *goto part2b\n\n*label part2b\n\n\"Thank you,\" the reporter says after finishing the interview. After a few days, nothing really happens and you decide to officially retire.\n*goto_scene retirement", "19_loss": "*check_achievements\n*if not(choice_achieved_close)\n  *achieve close\n\nThere's a loud cheer immidiately after the final whistle is blown. You know this feeling well, as this is the forth time you've experienced it, all four times with Ace Armstrong and the Flagbearers being the ones who delivered it. You can see them celebrating on the field. This time stings especially hard, though.\n*if (team_name = \"Dogs\")\n  You stayed loyal to the Dogs, a team that you had been with since the start. You feel you made the right choice, especially for the last week given that you defeated the Hyeanas, the only other highly ranked team to offer you a decent contract. The fact that this is your last season is what really rubs salt in the wound at this point, however. As few teammates, mostly those who have been on the team for a few seasons each try to comfort you with kind words as well as pats on the back. Although their intension is clearly good, it does little to ease the pain. You really struggle to maintain your composure, and are just barely able to do so. Since you still have your helmet on, you don't face the consequences of not being able to keep your poker face. On some level, you wish you had never made it this far, as another finals loss stings extra hard, and will likely contribute to your legacy as a choker.\n  *goto part2\n*else\n  You signed away from the Dogs to join the Hyenas in a last ditch attempt to try to avoid feeling it again. You always felt as if you made the smart choice, especially since you defeated the dogs last week in order to get to the finals. The fact that this is your last season is what really rubs salt in the wound at this point, however. A few teammates seem to console you, but at this point you feel disconnected from most of them since they've only been on the team for one season. You know that they mean well, but but they are unable to ease anything but a small amount of the pain. You are just barely able to maintain your composure and keep professional body language. You still have your helmet on, so you don't face the consequences of not being able to maintain your poker face. A small part of you wishes you you had lost earlier, or not even made it to the finals. You think that losing specifically in the finals will add to your legacy as a choker.\n  *goto part2\n\n*label part2\n\nAfter a few minutes of processing the feeling, you remove your helmet to go to onto the field to congratulate Ace yet again..\n*if (team_name = \"Dogs\")\n  You hate congratulating him again, but in order to maintain any real bit of dignity, you have to do it, no matter how much it eats you up inside.\n  *goto part3\n*else\n  You hate congratulating him again, even though its in a different team's uniform, you have to do it, no matter how much it eats you up inside.\n  *goto part3\n\n*label part3\n\n\"Don't feel bad, its me,\" he says to you with a pretentious smirk on his face. You want to punch him in the face, but know that the media backlash would be too much of a knightmare to handle. How do you remain professional?\n*fake_choice\n  #\"Good game\"\n  #\"Congrats\"\n  #I don't say anything, but I do give him a 'bro hug' while smiling.\n\nHe smirks again after you respond, but doesn't say anything. You can see that the shot of you two was on the scoreboard, and his smirks were clearly visible. It gives you some comfort to know that he'll likely be seen as unprofessional afterwards. After some time passes, you go back into the locker room, and announce your official retirement a few days later.\n*goto_scene retirement", "19_win": "*check_achievements\n*if not(choice_achieved_champion)\n  *achieve champion\n\nAfter a moment, your teammates begin to jump up in celebration. one of them pats you on the back, but you barely notice, as you throw off your helmet and raise your hands in celebration. You won! You finally won! After over a decade of disapointment, and three times where you got super close, you finally won! To make it that much sweeter, you defeated Ace Armstrong in the finals. You knew that victory would taste great, but you never figured it would be this great. You love the feeling so much that for the first few seconds of it you don't even notice the crowd cheering at the end of the game. You run up onto the field to celebrate with your team. In the corner of your eye, you can see that your thrilled face is up on the scoreboard. You smile and wink into it, effectively winking at the audience.\n*if (team_name = \"Dogs\")\n  One of the linebackers who's been your team for years jumps up from behind you onto your back. You carry him in what appears to be a piggyback ride. Some of your teammates chuckle. Despite the silliness of this you know that deep down you know that nobody, not even fans of the other team, will ever judge you for this. You've seen Ace himself do much sillier things, and he's still falsely seen as the greatest, most professional person in the entire history of the sport.\n  *goto part2\n*else\n  Your team's back-up tight end, also a veteran player who's been in the league for over a decade without winning a championship gives you a large bearhug and lifts you up into the air. You pump your fists in the air like a madman, choosing to celebrate this moment with someone else who wanted it just this badly.\n  *goto part2\n\n*label part2\n\nAce walks up to you after a few moments. \"Finally slayed the dragon, didn't you? Congrats, white knight,\" he says as he reaches out for a handshake. You're unable to tell if he's being sarcastic, and you know that's what he wants. You however reach out and give him the handshake he wanted. You don't say anything, but you give him a friendly smile and nod, knowing that by not responding you're getting in his head.\n*line_break\n*line_break\nAfter a few minutes, a ceremony is put on at midfield. The league commissioner hands you the trophy while saying \"Congratulations to ${first_name} ${last_name} and the ${team_name}!\" He hands you the Megacup and you lift it above your head and let out a scream of joy.\n*line_break\n*line_break\nAfter a few minutes, a reporter walks up to you and asks one question.\n*line_break\n*line_break\n*if (team_name = \"Dogs\")\n  \"After years of being with the Dogs, you've finally taken them to the promiseland. How does it feel to finally win?\" You answer, with a bunch of generic exciting answers, but within a minute don't even remember what you said.\n  *goto part3\n*else\n  \"At the start of the season, you signed with the Hyenas, and immidiately took them all the way? What do you feel makes the difference?\" Placed on the spot, you dismiss the question and just claim it feels great to finally win with a bunch of generic mumbo jumbo.\n  *goto part3\n\n*label part3\n\nIt doesn't matter what you said, though. You finally won, and you run into the locker room the shower in champagne. After briefly teasing the idea of your return for one more year just to play with the media and the public, you decide to officially retire a couple of weeks after the game.\n\n*goto_scene retirement", "game_play": "*looplimit 1000000000\nThe pre-game festivities begin.\n\n*temp opp_off 0\n*temp opp_def 0\n\n*label game_setup\n*temp time 900\n*temp quarter 1\n*temp minute 15\n*temp second 0\n*temp down 0\n*temp distance 10\n*temp yard 50 \n*temp yard_opposite 50\n*temp score 0\n*temp opp_score 0\n*temp yards \"yards\"\n*temp clock \"true\"\n*temp timeouts 3\n\n\n*temp gain 0\n*temp last \"default\"\n*temp possession \"true\"\n*temp opp_drive 50\n*temp opp_drive_result 0\n*temp percentage 50\n*temp time_factor 1\n*temp time_lost 0\n*temp deficit 0\n\n*temp WR1_route 0\n*temp WR1_yards 0\n*temp WR2_route 0\n*temp WR2_yards 0\n*temp TE_route 0\n*temp TE_yards 0\n*temp RB_route 0\n*temp RB_yards 0\n*temp FB_route 0\n*temp FB_yards 0\n\n*temp attention_WR1 25\n*temp attention_WR2 25\n*temp attention_RB 25\n*temp attention_FB 25\n*temp attention_TE 25\n*temp attention_QB 25\n*temp pass_roll 50\n*temp full_roll 100\n*temp throw_challenge 100\n*temp panic_test 100\n*temp panic_mod 1\n*temp run_yards 25\n\n*if (team_name = \"Dogs\")\n  *goto Dogs_Schedule\n\n*if (team_name = \"Hyenas\")\n  *goto Hyenas_Schedule\n\n*label Dogs_Schedule\n\n*if (week = \"1\")\n  *set opponent \"Hyenas\"\n  *set opp_off 25\n  *set opp_def 40\n  *set location \"away\"\n  You are playing an away game against the Hyenas, a team that offered you a contract in the off-season. The pre-game warm-up goes smoothly without incident. You were expecting something to have happened since they offered you a contract over the off-season that you turned down, but are glad that nothing happened. Perhaps the fans aren't too upset, and don't see you as having owed the team anything.\n  *line_break\n  The pre-game introductions start normally, with the fans booing your teammates as they run out. Finally, your name is the last one announced. \"And at quarterback, ${first_name} ${last_name}!!!\" The announcer enthusiastically yells. This is followed by a louder chorus of boos than any of your teammates got, and is comparable to what you hear when you face your rival team, the Cats. How do you feel about this?\n  *fake_choice\n    #I feel pretty bad. I don't owe them anything.\n    #It doesn't bother me. Fans will boo you, it's just part of the culture.\n    #It's a little annoying, but it's not worth worrying about since there's nothing I can do.\n    #I actually kind of like being seen as a heel. It makes my victory at the end that much more satisfying.\n  You reach the end, look around, and almost right after you're done the crowd has quieted down quite a bit faster than usual. You go to the bench quickly and put your helmet down in order to secure your seat and then head to midfield for the coin flip.\n  *line_break  \n  *goto game_start\n*if (week = \"2\")\n  *set opponent \"Bulls\"\n  *set opp_off 35\n  *set opp_def 15\n  *set location \"home\"\n  You're playing a home game against the Bulls, a team with a strong offence, but a weak defence. During warm-up, you throw the ball a little bit weird and then feel a harsh pain that lingers. Given your addiction to painkillers, this is a bit of a red flag since the damage must be really bad. You immediately go to your team's lead trainer who panics when you describe the incident. They give you a few exercises to do, and after about 5 minutes, the pain goes away. The trainer mentions that this kind of pain is common in older quarterbacks, as well as older pitchers in baseball. These injuries aren't serious but will become more common. You resume warm-ups and your arm goes back to normal. How do you feel about this incident?\n  *line_break\n  *fake_choice\n    #If the trainer says it's no big deal, that's good enough for me. I trust him.\n    #This is really making me want to retire at the end of the season more.\n    #If I can suffer this in warm-ups, what will happen in a game?\n    #I'm worried about how these little 'nothing' injuries will affect me in 20 years when age has really caught up with me.\n  You're able to move on from the incident and hide any worries that you've had about it from earlier. You then head to midfield to take the coin toss.\n  *goto game_start\n*if (week = \"3\")\n  *set opponent \"Swordsmen\"\n  *set opp_off 30\n  *set opp_def 20\n  *set location \"away\"\n  You are playing an away game against the Swordsmen. The team that Bruce Billstien plays for. Bill is the third-best quarterback to enter the league in the year that you and Ace joined the league. He had a solid career, becoming a starter in his third season, making an All-Star game once, and being a starter for the Hawks for almost a decade. However, he is now reduced to the role of a backup, jumping from team to team each season. However, each other quarterback from that year has either retired or been cut. He has also never won a Megacup, but never had the high expectations that you and Ace did, and thusly never became known for being a 'loser'. How do you feel about facing him?\n  *fake_choice\n    #I feel great knowing that I've lasted longer as a starter and had a better career than him. \n    #I feel kind of bad for him, having lived in my shadow.\n    #It doesn't matter, since he's not even a starter anymore. He's just another face among many.\n    #On a professional level, I'm proud of how he had a solid career.\n    #No real opinion.\n  After placing your helmet on the bench, you go to midfield for the coin toss. You see that Bruce is there to take it as well, as his experience has placed him in a leadership role on the Swordsmen. He says nothing to you, but does respectfully nod. How do you respond?\n  *fake_choice\n    #I respectfully nod back.\n    #I wave.\n    #I do nothing\n  *goto game_start\n*if (week = \"4\")\n  *set opponent \"Flagbearers\"\n  *set opp_off 40\n  *set opp_def 30\n  *set location \"home\"\n  This game is an exciting one from a fan perspective. You're playing against Ace Armstrong. Being both your rival player, and the leader of the team that beat you in the Megacup last year, this match is being pushed by the media as an official rematch. As you run out onto the field during player introductions you are pleasantly surprised by how loud the cheers are. Although the fans have supported you, at least on the field, for your entire career, it seems as if they're extra excited for this match. Perhaps it's the opportunity for revenge. You see, moments later, when the opposing team is introduced, Ace Armstrong is booed extremely loudly. This is the one place where he'll be booed more than any other player in the league, but this one seems to be much louder. What do you think about this?\n  *fake_choice\n    #Its slightly cathartic to hear, even if it's expected.\n    #I feel it's poor sportsmanship. I'm not even as upset as the fans.\n    # It's actually kind of funny.\n    #No bog deal. Fans will be passionate, and it's just part of the game.\n  After placing your helmet on the bench, you go to midfield for the coin toss, and see Ace there. He doesn't have nearly the respect for you the Bruce did last week, as you can hear him snort when you enter. You're not sure what to do, and just do nothing as a response.\n  *goto game_start\n*if (week = \"5\")\n  *set opponent \"Fish\"\n  *set opp_off 15\n  *set opp_def 20\n  *set location \"away\"\n  You're playing an away game against the Fish, a weak rebuilding team that recently fell apart after signing lots of older players who were unable to bring them a Megacup. They lost twice in the semi-finals to Ace and the Flagbearers a few years ago, but fell hard after their best players aged out. They don't seem like much of a threat now.\n  *line_break\n  You look around the stadium during warm-ups, and see that the stadium is missing a fair number of people. You note that this is likely due to the team's poor performance recently. Thoughts?\n  *fake_choice\n    #I feel bad for the team. Fairweather fans are the worst.\n    #The fans are right to not go to games. Loyalty is earned, not automatic.\n    #Makes things easier for me, not having to deal with louder boos.\n    #Don't really have an opinion, but I do have respect for the fans who are able to stick with the team through the tough times.\n    #I'm just glad this never happened to any team I play for.\n    #This will be bad for the league's finances.\n    #Seriously? Who cares? I'm here to play, not comment on the relationship between a team I don't even play for and its fans.\n  After running out onto the field, you hear a much quieter boo than usual, which you attribute to the smaller crowd. Afterwards, you place your helmet on the bench and go to take the coin flip. \n  *goto game_start\n*if (week = \"6\")\n  *set opponent \"Monsters\"\n  *set opp_off 10\n  *set opp_def 10\n  *set location \"home\"\n  Your next game is a home game against the Monsters. They're the worst team in the league, having won only two games last year, one was a fluke victory against the fish. The other was even worse a victory against the Hawks in the final game of the season when the Hawks were playing all their backups since they knew where they were going to finish and wanted to rest their starters for the playoffs. The monsters also have not won yet this year, with some journalists writing about how they could be the first team to go winless. Nothing during the pregame warm-up stands out, although you see fans holding up signs saying things like \"shut them out\" and \"blowout time\".  Thoughts on this?\n  *fake_choice\n    #No big deal. This is just fans being fans, nothing to see here.\n    #I love the fact that the fans are passionate about supporting us and enjoying themselves.\n    #I feel it's just rubbing unneeded salt in the wound for the Monsters. \n    #We are going to look awfully silly if we lose.\n    #This is just part of the culture of the sport. If the Monsters players can't take it, they shouldn't play. There's plenty of other talented players who wouldn't care about silly signs.\n  You run out onto the field during player introductions to a cheering crowd. The level of noise is not abnormally loud or quiet compared to the rest of your home games. Afterwards, you bring your helmet with you to midfield for the coin flip.\n  *goto game_start\n*if (week = \"7\")\n  *set opponent \"Cats\"\n  *set opp_off 30\n  *set opp_def 25\n  *set location \"away\"\n  You're playing against the Cats, your team's biggest divisional rival. In the standings, its just another game against a solid but not great team, but to the fans, its much more. Many Dogs fans even say things like \"If we defeat the Cats both times we play them, it doesn't matter how well we do for the rest of the season. It's good enough for me.\" How do you feel about this?\n  *fake_choice\n    #The rivalry is silly and built by the media and league looking for extra attendance. It's just another game, and I can't believe people actually fall for this.\n    #I'm just as excited as the fans. This is huge.\n    #I didn't see the big deal at first, but it's grown on me over the years.\n    #I don't really see the big deal, but I play along anyway for the sake of professionalism.\n  You run out onto the field during player introductions, and as expected, are greeted with some of the loudest 'boos' you've ever had to deal with. This is something you've dealt with over a dozen times in your career, and you're used to it at this point. In a small way, you actually kind of come to enjoy the fact that people you're supposed to defeat often are mad enough to boo you personally. After the whole thing, you place your helmet down near your team's bench, and go to midfield for the coin flip.\n  *goto game_start\n*if (week = \"8\")\n  *set opponent \"Swarming Bees\"\n  *set opp_off 15\n  *set opp_def 20\n  *set location \"home\"\n  You're playing a home game against the Swarming Bees next, an overall mediocre team from your division. Funny, given that your rivalry game last week was also against a team from your division. How do you feel about playing two division games back to back?\n  *fake_choice\n    #I love it. Keeps me on my toes part way through the season.\n    #Not a fan. It's tiring dealing with the fans having us in the spotlight so often.\n    #No real opinion. These games are all the same either way.\n    #No real opinion. It's just a job.\n    #It's okay, I'm just glad that next week isn't a divisional game.\n    #I'm just glad to get this out of the way at this point.\n  During player introductions, you are cheered extremely loudly, due to the fact that this is a divisional game. You note the opposite contrast compared to last week when you played against the Cats and were booed loudly. This is expected, and something you've experienced each time, but it still seems to hit a strange emotional note each time.\n  *line_break\n  After the player introductions, you glance over at the stands and see that a fan is holding up a sign specifically for you, hoping that you stay in the league next season. You look and smile, and then go back to the bench, place your helmet down, and then head to midfield for the coin flip.\n  *goto game_start\n*if (week = \"9\")\n  *set opponent \"Wizards\"\n  *set opp_off 20\n  *set opp_def 20\n  *set location \"away\"\n  Your next game is an away game against the Wizards. They used to be a solid team with championship aspirations, but similar to the Fish, they fell short and have now aged out. Their fall wasn't quite as harsh as the Fish, but they're still considered one of the weaker teams. During the pregame warm-up, your back-up asks you \"Can you give me some advice on being a starter so I'm ready when you retire during the off-season?\"\n  *fake_choice\n    #I give him some advice. Its part of my job as a mentor and starter winding down in my career.\n    #I tell him I'll do so in private later. I don't want to do it in front of so many people and in a loud environment.\n    #I say no need to do so. I'll be back.\n    #I say I really can't say much, he'll learn better by doing.\n    #I reinforce some generic stuff he's probably heard before.\n    #I tell him that I'll lead him by example.\n  He nods after you finish saying what you were saying. During player introductions, you run out onto the field to an average amount of booing from an away crowd. Afterwards, you place your helmet near the bench and go towards midfield in order to take the coin toss. As you run out, you notice that your back-up is looking at you, as if studying everything you do. It gets to you for a second, but then your attention is redirected to what you are doing.\n  *goto game_start\n*if (week = \"10\")\n  *set opponent \"Volcanoes\"\n  *set opp_off 30\n  *set opp_def 20\n  *set location \"home\"\n  This week, your opponent is the Volcanoes. They're the final team in your division. They're not as strong as the Cats, but they are a better team than the swarming bees. They were recently a rebuilding team and have now built a solid core of young players with a lot of potential, although they still have to reach said potential. You can see that the crowd is about as large as you expect - not quite a sell-out due to not playing against the Cats or the Flagbearers, but almost there and probably the third largest home crowd you'll see all season. During player introductions, you're given an extremely loud cheer. How does this make you feel?\n  *fake_choice\n    #I miss this feeling. I'm not sure how often I'll be able to experience this again.\n    #It's to be expected at this point. It's a bit of a rivalry game, so the crowd is going to be a bit more excited than ordinarily.\n    #I don't even care at this point. It's all just background noise.\n    #I'm actually kind of tired of it at this point. \n    #It feels like a lot of pressure that I'm too sick of having to live up to.\n  Eventually, after that's done, you return to your bench. After looking around for a minute, you find a place to put your helmet before rushing off to midfield in order to be on time for the opening coin toss.\n  *goto game_start\n*if (week = \"11\")\n  *set opponent \"Hawks\"\n  *set opp_off 30\n  *set opp_def 30\n  *set location \"home\"\n  Your opponent this week is the Hawks, a team that's made the playoffs in each of the past few seasons, although they haven't achieved any success, at least not yet. The game is a home game. You look around and see only an average crowd for this game, since that you have no specific rivalry with the Hawks. As you rush out for the player introductions this week, you notice that there's not as much cheering as there usually is. It's not just for you, your teammates also receive slightly less cheering throughout the game. What do you think of this?\n  *fake_choice\n    #I feel a little bit let down by the fans not showing support.\n    #I think I'm comparing it too much to the recent rivalry games. This is likely no big deal.\n    #I kind of like the quiet. Nice change of pace.\n    #Who cares? It doesn't really affect that much.\n    #Did we do something wrong?\n    #Honestly, it doesn't really bother me. The fans might just not be feeling it today. It's not perfect, but what can you really expect?\n    #As long as they get back to cheering during the game, it'll be okay.\n    #Maybe the fans are at the concessions?\n  After seeing the slight lack of support from the fans, you slowly place your helmet on the bench and head to midfield in order to take part in the coin flip. You look around, and the stands seem full enough to give more cheering than they should.\n  *goto game_start\n*if (week = \"12\")\n  *set opponent \"Martial Fighters\"\n  *set opp_off 20\n  *set opp_def 20\n  *set location \"away\"\n  This week, you have an away game against the Martial Fighters, a mediocre team that currently has no direction. However, they do have Dwight Schiltz, the defensive end who got a sack against you in the pre-season, leading to Anita Bryant's large story on you slowing down. The media has been playing that clip again during this week, and Dwight is in the top 5 in the league in sacks and is almost guaranteed to be an All-Star this season. How do you feel about this matchup?\n  *fake_choice\n    # It's just another game. I have to put my ego aside and just try to win.\n    #Dwight is a great young player with plenty of potential. This isn't as embarrassing as it seems.\n    #Nothing to see here. It's just the media making a big deal about one play. The media is the real villain here.\n    #I really have to prove that the play was a fluke. Time to embarrass Dwight.\n    #A weak team with no direction? Should be an easy win.\n    #I'm really worried about this game. I don't want to have to deal with Dwight again.\n  During player introductions, Dwight is cheered extremely loudly, the loudest of any player on the Martial Fighters. This doesn't really surprise you given the fact that he's a young player with so much potential, but some fans are holding signs that say things like Dwight, take down ${last_name} again. As much as you're able to put it behind you, it's still annoying. After you're introduced and booed as per usual in away games, you go to midfield to take part in the coin flip. \n  *goto game_start\n*if (week = \"13\")\n  *set opponent \"Frogs\"\n  *set opp_off 25\n  *set opp_def 30\n  *set location \"home\"\n  Your next game is a home game against the Frogs. You and the Dogs defeated the Frogs in the semi-finals last season in an absolute nail-biter of a game where you got the offence into field goal range on the final drive before your kicker got the winning 40-yarder. The media has once again been hyping this up as a large rematch. Although the team doesn't seem quite as strong as last year, at least on paper, they've shown they're still in playoff contention and a solid team. How do you feel about this being a rematch?\n  *fake_choice\n    #I don't have any feelings about it. That's just a distraction that takes away from me concentrating on the game.\n    #I love the fact that we can beat them again and show that our victory wasn't a fluke.\n    #I hate having to face them again.\n    # It's going to be tough since they'll really want this one.\n    #Personally, I'm more focused on the big picture, winning a championship.\n    #The media finds a way to hype up every game. I've learned to drown it all out at this point in my career.\n  As you run out during player introductions, you notice that the crowd is back to being loud, and it's not the soft or quiet version that you heard in your game against the Hawks. Looks as if whatever happened there was just a small blip in the crowd for some reason. Afterwards, you go to midfield for the coin flip.\n  *goto game_start\n*if (week = \"14\")\n  *set opponent \"Volcanoes\"\n  *set opp_off 30\n  *set opp_def 20\n  *set location \"away\"\n  In your last 3 games of the regular season, you will play against your three divisional opponents again. The Volcanoes, Swarming Bees and Cats are the three teams you'll be playing again. If you played home games against one of them earlier, it will be an away game against the same team, and vice-versa. As if the playoff race wasn't enough pressure. This week, you have an away game against the Volcanoes, and the media has begun to talk about what happened in your earlier, recent match against them. What are your thoughts?\n  *fake_choice\n    #I actually like the intense finish. Makes it exciting for the fans.\n    #Didn't we just play these guys like less than a month ago?\n    #Not a fan of how tight the schedule makers always make things at the end. Makes me nervous about how the fans will react.\n    #I don't see it as a big deal anymore. They're just more games, and my job is to win.\n  During the pregame warm-up, the fans seem excited since the Volcanoes can still make the playoffs, although they're seen as a longshot. There's nothing notable that happens during player introductions. You and your teammates are booed like usual during player introductions, and the home team is cheered. At this point, it's just noise for you, especially since you've seen it so often. You quickly place your helmet at the end of the bench to save a spot for yourself and then walk up to midfield in order to take the coin toss.\n  *goto game_start\n*if (week = \"15\")\n  *set opponent \"Swarming Bees\"\n  *set opp_off 15\n  *set opp_def 20\n  *set location \"away\"\n  The second to last game of the regular season is going to be played against the Swarming Bees, a welcome opponent given that they're weaker than the Volcanoes. During the warm-up to this game, you have a problem with your shoulder, similar to what you did before your game against the Bulls. Once again, you go up to the team's personal trainer who walks you back through all the exercises that you did previously. They once again work and you feel relieved. You ask if this injury will become more often as you age and continue to play, and the trainer says that yes, it will, especially if you don't retire.\n  *fake_choice\n    #Good thing I'm retiring at the end of the season.\n    #Great, so I have to deal with this for the rest of my life.\n    #Well, I guess it could be worse. At least I'll still be able to walk in my 60's.\n    #Just part of the job, I guess.\n  After you finish talking with him, you continue with the pre-game warmup, and go back into the tunnel before pre-game introductions. As you're about to be introduced, it dawns on you that this could be the last time you're booed as part of an away team, depending on if you make the playoffs. How do you feel about this?\n  *fake_choice\n    #Great, I'm not going to be booed anymore. This is a relief\n    #Getting booed has kind of grown on me in a weird way.\n    #I don't really care that often.\n  After the loud boos, you place your helmet on the bench and go to midfield for the coin toss.\n  *goto game_start\n*if (week = \"16\")\n  *set opponent \"Cats\"\n  *set opp_off 30\n  *set opp_def 25\n  *set location \"home\" \n  The final game regular season game of the season is a home game against your biggest rivals, the Cats. It hits you about a day before the game that this will be the last time you will face the Cats, and will be your final regular season game. Do you have any strong feelings about this?\n  *fake_choice\n    #Yes, I love the feeling of being cheered for and will miss it.\n    #Yes, I don't like having to be the centre of attention so much. \n    #Not really. The whole thing is just background noise at this time.\n  The warmup finishes, and the whole thing feels a little bit surreal. You actually pinch yourself a couple of times in private in order to make sure this isn't a dream. You then go get ready for player introductions. As your name is enthusiastically introduced by the announcer, you run out onto the field to a chorus of cheers louder than what you thought was possible to receive. How do you feel about this?\n  *fake_choice\n    #I feel great. Nice to be appreciated.\n    #I guess it's nice. Not really that big of a deal, though.\n    #I didn't think I would get emotional, but I guess I was wrong.\n    #Wait, did I pinch myself? What? Why?\n  After you take a few seconds to enjoy the moment, you go back to the bench with a bit more confidence than usual, place your helmet down, and go to midfield in order to take the coin toss.\n  *goto game_start\n*if (week = \"17\")\n  *set opponent \"Frogs\"\n  *set opp_off 25\n  *set opp_def 30\n  You made it to the quarter-finals. Win all of the next three games, and you win the championship. Lose any, and you're instantly eliminated. This is the challenge you've failed at every year in your career, despite coming close three times. Its your last chance. Good luck.\n  *line_break\n  *if (wins > 10)\n    *set location \"home\"\n    You are playing against the Frogs. Since you won more games than they did, you're playing them in a home game. You defeated them last year in the semi-finals, and played them again recently in week 13. If you thought there was a lot of hype in the game earlier this season, you haven't seen anything yet. This game is a sell-out, and the crowd is louder than it's been all season, even louder than your last game against the Cats. You're not surprised by this, given how it's happened every year in your career, but it always manages to hit you a little bit differently this year. What does it feel like knowing that this could be not only your last home game, but also the final game of your career?\n    *fake_choice\n      # It's a little bit surreal. This one hits me a little bit differently since it could be the last game of my career.\n      #It doesn't feel that different. I knew that this was how it was going to be, and I've seen everything at this point in my career. Well, everything except a championship.\n      #I like the pressure. It motivates me, especially knowing every game could be my last.\n      #I hate the pressure. Good thing I don't have to deal with this much anymore.\n      #I feel a mix of all of the above. It's complicated.\n      #What do you mean by the last game of my career? I'm winning this game.\n    After you're introduced to a deafening cheer by the fans during player introductions. You feel a large burst of energy during this, which makes you feel nostalgia for almost every year earlier in your career. You just wish this one will end differently. After the player introductions, you go to midfield for the coin flip. During the flip, you are barely able to hear anyone speaking due to the loud crowd, despite the fact that you're right beside the people you're speaking to.\n    *goto game_start\n  *else\n    *set location \"away\"\n    Your first playoff game is against the Frogs. Since they won more games than you did, it'll be an away game. This is the opposite as to what happened in both week 13 and last season in the semi-finals. You thought that the hype for the game earlier in this season was hyped by the media, but this is even bigger given the simple fact that this is a playoff game. This game is a sell-out and the boos that you hear are even louder than your mid-season away game against the Cats. This comes as no surprise to you since it happened in every year of your career, but it hits you a little bit differently thi alk on the turf.\n    *goto game_start\n  *else\n    *set location \"away\"\n    Finally, after what somehow felt like both the longest and shortest season of your career, it's time to play the Megacup. The opposing team is the Flagbearers, the team lead by Ace Armstrong. Since you won fewer games than they did, it'll be an away game, just like every time beforehand. How do you feel about being the away team yet again in the Megacup?\n    *fake_choice\n      #I don't like it, but it is what it is. I have to deal with it.\n      #I'm used to it at this point. Not a big deal.\n      #Its never been a big deal. I'm not using it as an excuse for previous losses.\n      #I kind of like being booed at this point. It's going to make my victory just that much sweeter.\n    During player introductions, you're greeted by the loudest boo of your career. Usually, the away crowd knows you're about to be introduced and is able to start booing beforehand. This happened this time as well, but the difference is that this time the crowd is so loud, you can't even hear your name being screamed by the commentator. You think you timed your run out properly, but either way, nobody will ever know for sure. After you run out and have your helmet playfully slapped by some teammates, you feel some extra adrenaline already pumping through your veins. You can fully feel your heat pumping without placing your hand on your chest. You think you can even hear your heart, but you can't tell due to how loud the crowd is. You feel like you have more energy than ever, but because of some past experiences where you burned yourself out, you know that this adrenaline never lasts for the entire game. How does this make you feel?\n    *fake_choice\n      #Great! I'm going to miss having all of this energy after I retire.\n      #It has me pretty startled actually. No matter how many times I feel it, it'll always catch me off guard.\n      #It's alright. Kind of a mix of the above.\n    After this, still having a racing heart, you go to midfield in order to take the coin flip. As you walk on the turf, you feel a strong mix of nerves and excitement.\n    *goto game_start\n   \n\n*label Hyenas_Schedule\n\n*if (week = \"1\")\n  *set opponent \"Dogs\"\n  *set opp_off 25\n  *set opp_def 40\n  *set location \"home\"\n  You have a home game against your former team, the Dogs. You recognize that since this is a home game, playing against your former team isn't nearly as big of a deal as it would be for an away game. You're still a little bit nervous over how the fane of the new team will treat you on your first regular season home game. The question 'what will the fans think of me,' is fluttering around in the back of your mind for the entire week.\n  *line_break\n  You get your answer at exactly the time you expected it. Not much happens during the pre-game warm-ups. However, during the player introductions, you get a large surprise. When you run out of the tunnel, the announcer excitedly yells, \"And at quarterback, a legend who wants to be the missing piece in bringing your Hyenas a championship, ${first_name} ${last_name}!!\" You run out to the loudest crowd cheering you've ever received. You look around and see people holding up signs saying things like 'savior', 'the final piece', and 'hero'. How do you feel about this?\n  *fake_choice\n    #Great! I love being appreciated.\n    #I don't like the pressure.\n    #I don't care what the fans think. I'm just here to do my job.\n  You then go to place your helmet on the bench to save your spot and go to midfield to help take the coin toss.\n  *goto game_start\n*if (week = \"2\")\n  *set opponent \"Ninjas\"\n  *set opp_off 15\n  *set opp_def 35\n  *set location \"away\"\n  You're playing an away game against the Ninjas, a team with a strong defence, but a weak offence. During warm-up, you throw the ball a little bit weird and then feel a piercing pain that remains. Given your addiction to painkillers, this is a bit of a red flag since the damage must be really bad. You immediately go to your team's lead trainer who remains calm when you describe the incident. They give you a few exercises to do, and after about 5 minutes, the pain goes away. The trainer mentions that this kind of pain is common in older quarterbacks, as well as older pitchers in baseball. These injuries aren't serious but will become more common. You resume warm-ups and your arm goes back to normal. How do you feel about this incident?\n  *line_break\n  *fake_choice\n    #If the trainer says it's no big deal, that's good enough for me. I trust him.\n    #This is really making me want to retire at the end of the season more.\n    #If I can suffer this in warm-ups, what will happen in a game?\n    #I'm worried about how these little 'nothing' injuries will affect me in 20 years when age has really caught up with me.\n  You're able to move on from the incident and hide any worries that you've had about it from earlier. You then head to midfield to take the coin toss.\n  *goto game_start\n*if (week = \"3\")\n  *set opponent \"Flagbearers\"\n  *set opp_off 40\n  *set opp_def 30\n  *set location \"home\"\n  This game is an exciting one from a fan's perspective. You're playing against Ace Armstrong. Being both your rival player, and the leader of the team that beat you in the Megacup last year, this match is being pushed by the media as an official rematch between you and him, but it highlights the fact that you changed teams. You see, before the game starts, when the opposing team is introduced, Ace Armstrong isn't booed nearly as loudly as he was when he played against the Dogs. You're aware that the Hyenas haven't been wrecked by Ace and the Flagbearers as much as the Dogs. What do you think about this?\n  *fake_choice\n    # It's a bit of a disappointment. I like hearing Ace get booed really loud.\n    #It's understandable that they wouldn't hate him as passionately. He hasn't cost them any Megacups.\n    #It's actually kind of funny.\n    #No bog deal. Fans will act a certain way, and it's just part of the game.\n    #I'm actually kind of relieved for him. Booing people that much is bad sportsmanship.\n    #At least they're booing him a little bit.\n  After placing your helmet on the bench, you go to midfield for the coin toss and see Ace there. He doesn't seem to have any respect for you at all, as you can hear him snort when you enter. You're not sure what to do, and just do nothing as a response.\n  *goto game_start\n*if (week = \"4\")\n  *set opponent \"Swordsmen\"\n  *set opp_off 30\n  *set opp_def 20\n  *set location \"away\"\n  You are playing an away game against the Swordsmen. This is the team that Bruce Billstien plays for. Bill is the third-best quarterback to enter the league in the year that you and Ace joined the league. He had a solid career, becoming a starter in his third season, making an All-Star game once, and being a starter for the Hawks for almost a decade. However, he is now reduced to the role of a backup, jumping from team to team each season. However, each other quarterback from that year has either retired or been cut. He has also never won a Megacup, but never had the high expectations that you and Ace did, and thusly never became known for being a 'loser'. You find it interesting that you're playing his team right after Ace's. How do you feel about facing him?\n  *fake_choice\n    #I feel great knowing that I've lasted longer as a starter and had a better career than him. \n    #I feel kind of bad for him, having lived in my shadow.\n    #It doesn't matter, since he's not even a starter anymore. He's just another face among many.\n    #On a professional level, I'm proud of how he had a solid career.\n    #No real opinion.\n  After placing your helmet on the bench, you go to midfield for the coin toss. You see that Bruce is there to take it as well, as his experience has placed him in a leadership role on the Swordsmen. He says nothing to you, but does respectfully nod, a much better greeting than what you got from Ace. How do you respond?\n  *fake_choice\n    #I respectfully nod back.\n    #I wave.\n    #I do nothing\n  *goto game_start\n*if (week = \"5\")\n  *set opponent \"Wizards\"\n  *set opp_off 20\n  *set opp_def 20\n  *set location \"home\"\n  You're getting ready for your next game, a home game against the Wizards. They used to be a very strong team just a few years ago. They front-loaded a lot of contracts for great players in an attempt to win a championship, and despite having a very strong team and even making it one year, they lost. Yes, their loss in the finals was to Ace Armstrong and the Flagbearers. Now, the Wizards are one of the weakest teams in the league after those players aged out and put the team into a situation where they couldn't properly manage the salary cap. Everyone, including them, knew this would happen as soon as they signed off, but they were still hoping to win a championship. It feels as if that's what the Hyenas are doing now, building specifically for the short term, at the cost of the long term. You are clearly one of the players that were signed purely for the short-term with no clear replacement in the long term. How do you feel about this?\n  *fake_choice\n    #Great. It improves my odds at a championship. I'll be retired by the time this catches up with them.\n    #I feel bad if the team I'm on will be worse in a few years because of me.\n    #Who cares? This is something that almost always happens in every sport. Just part of the championship-obsessed culture.\n    #Obviously I don't like it. It didn't work for the Wizards. It's not going to work for us.\n    #Obviously I like it. The Hyenas were a great team before trying this and it's just sending us to the next level. The Wizards were average beforehand, and that's why it didn't work for them.\n    #Are you kidding? Winning in the short term is the whole reason I signed here.\n  During player introductions, you're cheered extremely loudly as usual. This feels like a breath of fresh air as you stop overthinking the long-term ramifications of what the Hyenas are doing and how you fit into it. After this, you go to the bench in order to place your helmet there in order to save your spot and then jog out to midfield in order to take part in the coin flip.\n  *goto game_start\n*if (week = \"6\")\n  *set opponent \"Snakes\"\n  *set opp_off 15\n  *set opp_def 15\n  *set location \"away\"\n  Your next game is an away game against the Snakes. The snakes are an even worse team than the Wizards, and don't even have the excuse of having recently been good and then rebuilding. They actually have a history of mediocrity, having gone 6-10 last season, and not having made the playoffs in over a decade. Despite having never come in last at any point in their history, it's clear that they still have no direction. You're not sure if this is placing the team in financial trouble, due to fewer fans attending games since they're sick of the mediocrity. Do you feel bad for them?\n  *fake_choice\n    #No. It's the job of management. If they have a hard time drafting or signing players, and then they often lose them, it's their own fault.\n    #No. I feel a little bad for the fans, though, having to deal with the mediocrity.\n    #No. The players have the choice to leave, which they often take.\n    #A little bit, actually.\n    #Yes, but there's nothing that can be done about it.\n    #Yes. It must be tough to experience that.\n    #I'm just glad I was never on a team that was so bad.\n    #No. Fairweather fans aren't even worth the effort to please. They're not true fans.\n  When it's time for player introductions, you're not booed as loudly as you usually are. You look around and see that there are fewer fans in the stands than for most teams, which you attribute to them being such a traditionally weak team. How do you feel about this?\n  *fake_choice\n    #Just a bit of a relief.\n    #Not that big lot, he talks about team spirit and keeping up the great work. If you're losing, he talks about how a game is never out of reach. If it's close, he highlights the importance of winning the tight games and playing until the final whistle. But now, he's nowhere to be seen. \n*line_break\n\"That's strange,\" you mumble to yourself. The player next to you nods, signifying that he knows what you mean. YOu remember seeing the coach walk off with about 10 minutes left in the first half, and start wondering what happened. After a couple of minutes of total silence, the assistant coach steps up in front of everyone. He takes a deep breathe before starting.\n*line_break\n\"Everyone, I'm sad to announce that Coach Jim has had a mild heart attack.\" There's gasps from the other players. You noticed something subtle, your assistant coach usually simply calls the coach \"Jim\", not \"Coach Jim\", and this added bit of respect seems to hit home, drawing attention to the seriousness of the situation.\n*line_break\n\"Is he gonna be okay?\" you hear one of your teammates say after a few seconds.\n*line_break\n\"I think so,\" the assistant coach says. \"Some of the hospital staff have called, and they said he's currently recovering. I don't think I need to say who we're winning this game for,\" he finishes.\n*line_break\nThe players all nod, and you could hear a pin drop on the other side of the room at any other point afterwards during halftime.\n*line_break\n*if (kickoff = \"2\")\n  *goto kickoff\n*else\n  *goto kickoff_opp\n\n*label half_2_event\nAs you head off the field, reporter Anita Bryant pulls you aside and has a few questions for you. You remember that she had some not-so-nice things to say about your performance in the preseason, and although you're hesitant about taking the interview, you decide to do it since you know the consequences of dodging the media. You accept the interview. \n*line_break\nWith a camera in your face, she asks you a simple question: \"What do you think of your team's performance in the first half?\"\n*fake_choice\n  #\"I think that if we keep up what we've been doing, we should come out with a win.\"\n  #\"We came out strong and we need to keep it up in the second half.\"\n  #\"I love how we've been working together so much, and I hope we can keep it up in the second half.\"\n  #\"We've been doing great, but so has the other team. It's going to be tough, but I know we can do it.\"\n  #\"I know what needs to be done, and I hope we can pull it all together in the second half.\"\n\nAfter you finish, there's a brief pause, and she follows it up with another generic question that invites a generic answer. \"What will your team change at halftime?\"\n*fake_choice\n  #\"I know that some things need to be changed, but I fully trust the coach to make the needed changes.\"\n  #\"It's not my job to think about. All I have to do is do what I'm told, and I know I'll be hearing something soon.\"\n  #\"I have my own ideas, but in the end, it's the coach's job to create the needed changes. All I need to focus on is doing my job.\"\n  #\"We'll make changes in order to improve our game plan, overcome all challenges, and take away the win.\"\n  #\"Anything we need to change in order to get that W.\"\n  \nAfter your response she says. \"Do you have faith in your team's ability to close this one out?\"\n*fake_choice\n  #\"Of course I do. We can do anything.\"\n  #\"With as much talent and work ethic as we have, I know we can do it.\"\n  #\"Its never easy in this league, and we're facing a good team, but we've overcome a lot, and I know we can do this.\"\n  #\"I always have faith in my team, no matter what.\"\n\nShe closes it off simply by saying \"Thank you for your time, ${first_name}.\"\n*line_break\n\"Thank you,\" you respond before going into the locker room.\n*line_break\n*if (kickoff = \"2\")\n  *goto kickoff\n*else\n  *goto kickoff_opp\n\n*label half_3_event\n\nThe coach is unusually quiet during halftime, unlike his usual
