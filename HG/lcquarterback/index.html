offs, we'll get distracted and decrease the chance of a win. The same will happen if we start thinking about the playoffs now.\" There's a few seconds of silence before the reporters switch to talking to your teammate. The next morning however is when the real landslide starts, as the media blasts you as being a poor team player. You clearly become a target for slander and jokes that will last years after your career is over.\n  *set Team %- 10\n  *set Coach %- 5\n  *set Media %+ 5\n  *goto end\n\n*label poor\n\n*if (wins \u003c 5)\n  The reporters asking seem to be somewhat deterred. They take a couple more stabs at you saying something that will get you to 'admit' that your team is doing poorly, but you're able to politely stop them from baiting you to saying something that would backfire. Luckily, after their unsuccessful attempts to provoke you, they seem to move on with the event and begin to interview your teammate. You feel relieved that despite your team's poor play, you were able to save the dignity of both yourself and your teammates.\n  *set Team %+ 5\n  *goto end\n\n*if (wins  \u003c 7)\n  Without even hesitating, the reporters continue to ask similar questions. It's almost as if there was a script, or at least guidelines given to them beforehand. However, despite the fact that they seem on top of their game, the fact that you and your teammate had prepared for this beforehand shows. You're able to calmly and professionally answer the rest of the similar questions without having to 'admit' that your team had a bad season. After a few minutes, the media event continues, and the pressure is off...at least for today.\n  *set Media %+ 5\n  *goto end\n\n*if (wins  \u003c 9)\n  \"Is this because of your record?\" One of the reporters asks.\n  *line_break\n  \"Although our record isn't at the level we would like it to be right now, we still have a chance to make the playoffs. We really don't want to think too far ahead at the moment in order to stop ourselves from getting carried away or distracted. At the moment, I would just like to take it one game at a time.\" Your reply is confident and smooth. Luckily, the reporters stop asking you questions soon after this, and you feel no backlash after this event. You feel a slight relief that you were able to dodge that bullet.\n  *set Media %+ 5\n  *set Team %+ 5\n  *goto end\n\n*if (wins \u003c 11)\n  \"Is this because of your record?\" One of the reporters asks.\n  *line_break\n  \"Of course not,\" you counter. \"I do like our chances of making the playoffs this year, but we're trying to not think about that right now. We don't want to become lost in the distraction of thinking too far ahead, as it could cause a lapse in judgement. We feel our chances are better if we take baby steps. No need to plan the parade,\" You pause before adding \"At least not yet,\" you say with a small smile on your face to indicate that you're joking. The reporters seem to chuckle and move on, and even afterwards, you feel no consequences.\n  *set Media %+ 15\n  *goto end\n*else\n  \"Why not? You certainly have a good chance of making it, don't you?\"\n  *line_break\n  You're tempted to say, \"You just answered your own question, didn't you?\" but resist the temptation in order to save professionalism in front of the camera. \"I prefer to just raise the odds as much as possible, rather than just analyze them,\" you say. \"Even if I could give you an exact answer, it wouldn't change anything.\" This lands a little bit awkward, but you're able to get across your point clearly enough.\n  *set Team %+ 10\n  *goto end\n\n*label okay\n\n*if (wins \u003c 5)\n  \"If you make it in at all,\" one of the reporters says in response.\n  *line_break\n  \"We're not having the best season so far,\" you admit, before trying to course correct. \"Right now, we're hoping to win our last few games. If we're able to get into the playoffs, it gives us some momentum we might be able to ride into the playoffs. It would be a great story if we did.\" The reporters actually seem somewhat impressed with your answer, and the event continues.\n  *set Media %+ 5\n  *set Fans %+ 5\n  *goto end\n\n*if (wins  \u003c 7)\n  \"Do you feel you can make it in?\" someone asks you.\n  *line_break\n  \"Of course,\" you say. \"I have total faith in the rest of my team to be able to beat the odds and win the last few games in order to make it to the playoffs,\" you say. \"Once we get in, it's all about momentum, so getting hot at the right moment would be a great way to handle it.\n  *set Media %+ 5\n  *set Team %+ 5\n  *goto end\n\n*if (wins \u003c 9)\n  The reporters seem satisfied with that answer, and although they do prod around and try to get a strange answer from you, you're able to prevent yourself from falling into the trap of saying something dumb. After you remain relatively tight-lipped, the event continues as per usual.\n  *set Team %+ 10\n  *goto end\n\n*if (wins \u003c 11)\n  \"Do you feel as if going in on a higher note would be helpful?\" Someone asks.\n  *line_break\n  \"Of course,\" you respond. \"Although a team going in cold can make a successful championship run, having momentum can give a team the confidence to bring them to the next level. We're in it for more than just stats and our legacy. Finding our best work at the end of the season can give a great boost, and improve our chances. It's always an improvement if we go in at our best, instead of being just good.\" You're worried that what you said could be taken out of context and make you look arrogant, but that doesn't happen. Luckily.\n  *set Media %+ 5\n  *set Team %+ 10\n  *goto end\n\n*else\n  \"Do you think that momentum can help you at this point, given your record?\" asks a reporter.\n  *line_break\n  \"Of course,\" you say before coming up with a way to build on your point without sounding too overbearing. \"Any team can get hot at any point, and even an average team that gets hot can be a threat to us, especially if we underestimate them. Every game at this point is hugely important. The playoffs are do-or-die of course, but if you're able to get hot right beforehand, it'll boost your chances. I don't think we're unbeatable, so we can't let ourselves go cold,\" you say in an attempt to sound semi-humble. Luckily, it works.\n  *set Media %+ 10\n  *set Fans %+ 5\n  *goto end\n\n*label great\n*if (wins \u003c 5)\n  \"Uhhhh...okay,\" one of the reporters says in response. You can tell that you've made a mistake since your chances are actually nonexistent at this point.   This will come back to bite you in the future, as you're basically mocked by both fans and the media as a whole. Yeah, while it's true that it's best to not give a perfectly honest response, saying stuff that's blatantly so false that even an idiot can see the lie is probably even worse. You're introduced to how aggressive the media can be the next morning. Okay, you already knew it could eat people alive, but the reminder still feels like a slap in the face.\n  *set Media %- 10\n  *set Fans %- 5\n  *set Team %+ 5\n  *goto end\n\n*if (wins \u003c 7)\n  There's a bit of a pause from all of the reporters. It doesn't take long, however before someone says, \"This season?\" You're taken off-guard, having forgotten at the moment that your team has been eliminated from playoff contention already. Luckily, you're able to think of something to save yourself right away.\n  *line_break\n  \"Yes, I'm sure we can pull it off,\" you say sounding confident. However, you know that this isn't true, and your chances are 0%. You're mocked by the media and fans the next morning for this.\n  *set Media %- 5\n  *set Fans %- 5\n  *goto end\n\n*if (wins \u003c 9)\n  \"You believe so?\" asks one of the reporters in a slightly confused voice. You suddenly realize that although you still can make the playoffs, it's a bit of a longshot at this point. Now, you have to back up your thought process, and still sense. Luckily, you have the perfect thing to say.\n  *line_break\n  \"Yes,\" you say. \"I know it doesn't look like much right now, but I have faith in this team. We have all the ingredients to make a run at the perfect time. Look out for us if we ever get hot,\" you say. While the media gives you some flack for appearing overly confident, your teammates appreciate the fact that you say you have faith in them.\"\n  *set Media %- 5\n  *set Team %+ 5\n  *goto end\n\n*if (wins \u003c 11)\n  The interview pretty much ends right there, as you gave a reasonable response to the question. There are a few brief inconsequential questions in order to pad out time, but nothing really happens. You're starting to notice how pointless the whole thing is, but you decide to go along with it in order to maintain a public image.\n  *set Team %+ 5\n  *goto end\n\n*else\n  This pretty much goes as expected. Given your record, nobody is going to question you as the event continues. Your teammate even looks to you and gives a brief nod before he's asked similar questions and handles it quite well. What a team you two make! Despite the utter pointlessness of the event, you're able to improve your reputation by playing along. Good for you, I guess?\n  *set Team %+ 5\n  *set Media %+ 5\n  *goto end\n  \n\n*label end\nNothing much happens for the rest of the week.\n*line_break\n*line_break\nTime for the next game to start.\n*page_break\n*goto_scene Game_play", "week_15": "Your team is having an open practice and at the end of it, you're ambushed for a live interview. You expect them to ask you about the practice that just happened, but instead, you feel somewhat blindsided. They ask a question that you knew you'd be asked eventually, but why now seemingly out of nowhere?\n\n*if (team = \"Dogs\") \n  *goto Dogs\n\n*if (team = \"Hyenas\")\n  *goto Hyenas\n\n*label Dogs\n\n*line_break\n\"At the beginning of the season, you had the choice of staying with the Dogs or signing with one of many other interested teams. You chose to remain loyal to the team that drafted you. What was your thinking behind this decision?\n*choice\n  #I wanted to remain loyal to the team that's been so good to me.\n    The reporter seems to move on to the next questions relatively quickly as if they either didn't care about your answer or just wanted to get to the next question.\n    *set Team %+ 5\n    *set Fans %+ 5\n    *set Coach %+ 5\n    *goto Dogs2\n  #I felt they had the best chance to win.\n    After a brief pause, the reporter seems to continue the interview as if they had another main question that they had to get to.\n    *set Coach %+ 5\n    *set Team %+ 5\n    *goto Dogs2\n  #They offered me the most money. Duh.\n    There's a slightly longer pause than usual on this one, but you feel very little flack here despite the fact that you missed a chance to make yourself more likeable.\n    *set Fans %- 5\n    *goto Dogs2\n  #I enjoy the team, the fans and the atmosphere and wanted to finish my career in a place I like.\n    This seems to raise an eyebrow from the reporter, but nothing comes of it and the interview continues as usual.\n    *goto Dogs2\n\n*label Dogs2  \n*line_break\nIt's at this point that you see what the reporter was really trying to get at. They ask, \"Do you regret this choice?\"\n*choice\n  #\"I have no regrets about staying loyal to a team that's treated me so well.\"\n    *goto noregrets_dogs\n  #\"Yeah, I feel another team could have given me a better season.\"\n    *goto regrets_dogs\n  #\"I try to not think about it too much and just focus on what's happening on the field.\"\n    *goto focus_dogs\n  #\"I can't really say anything until after the season,\" said as a joke.\n    *goto joke_dogs\n  #\"I can't really say anything until after the season,\" said in a serious tone.\n    *goto serious_dogs\n\n*label noregrets_dogs\n\n*if (wins \u003c 7)\n  \"You aren't making the playoffs in your last season. Doesn't that upset you?\" the reporter asks.\n  *line_break\n  \"It's a little bit disappointing, but I was able to spend the final season of my career with the team that's brought me so much joy in my career.\" The next day you see that you were luckily able to convince the public that you're being genuine, regardless of if you were or not.\n  *set Fans %+ 5\n  *set Media %+ 5\n  *set Coach %+ 5\n  *goto end\n\n*if (wins \u003c 9)\n  \"Do you feel you'll get the chance to compete with your current team?\"\n  *line_break\n  \"One of the most fun aspects of this job is the playoff race,\" you respond. \"Most fans know what it's like to be on the edge of your seat when you don't know if your team will make it at the end of the season. Imagine that times 10,\" you say excitedly.\n  *set Fans %+ 10\n  *goto end\n\n*if (wins \u003c 11)\n  \"Did your team's success this season have anything to do with your happiness?\" the reporter asks trying to bait you.\n  *line_break\n  \"I would have liked my decision to stay regardless of our success. That said, our success is certainly good icing on the cake,\" you respond hoping to stave off controversy before the interview abruptly ends.\n  *set Team %+ 5\n  *goto end\n*else\n  \"Because of how great the team's been doing?\" the reporter asks.\n  *line_break\n  \"It certainly made me feel even better, but I like this team so much that I would have liked staying regardless,\" you state confidently.\n  *set Fans %+ 5\n  *goto end\n  \n\n*label regrets_dogs\n*if (wins \u003c 7)\n  \"What factors are currently attracting you to other teams that weren't enticing you before?\" You can tell the reporter is trying to sound understanding but is actually just trying to bait you into getting too comfortable and saying something too honest.\n  *line_break\n  \"I feel I could have had a better chance with another team,\" you say. The interview ends quickly. You're worried about the backlash you'll see tomorrow, but the immediate problem you face is the fact that some of your teammates clearly overheard your answer.\n  *set Team %- 5\n  *goto end  \n\n*if (wins \u003c 9)\n  \"Do you feel you would have been a better decision to go to a better team?\" the reporter asks trying to get some detail from you.\n  *line_break\n  \"Yes,\" you say. \"Right now, I'm not a fan of how close we are to not making the playoffs. At this point in my career, I want to win a championship in order to improve my legacy,\" you say before the interview ends and you see your coach overheard your answer.\n  *set Coach %- 5\n  *goto end\n\n*if (wins \u003c 11)\n  \"Despite the fact that you're doing well this season?\" the reporter asks.\n  *line_break\n  \"The team has been doing 'well', for the majority of my career, and look how many championships I've won. Look at how I've been treated,\" you respond. If you thought the media treated you badly before, wait for the next morning.\n  *set Media %- 5\n  *set Team %- 5\n  *goto end\n*else\n  \"Your team is doing great, though,\" the reporter says.\n  *line_break\n  \"If I finally win this year, I'll be remembered as the guy who was carried to the finals in his last year, instead of the guy who was the missing piece of another puzzle,\" you say. Yeah, this one won't go over well.\n  *set Team %- 10\n  *set Fans %- 5\n  *goto end\n\n*label focus_dogs\n\n*if (wins \u003c 7)\n  \"Do you feel like you could have done a better job with another team?\" the reporter says, continuing to push the issue.\n  *line_break\n  \"There's never any way to tell these things, you just have to look at all the factors, and make what you think is the best decision in the situation. There's no time to ever look back,\" you say in a noticeable attempt to ensure that you're not going to be pushed around and duped into giving a stupid answer. At this point, they basically give up and leave you alone and nothing comes of this interview.\n  *goto end\n\n*if (wins \u003c 9)\n  \"But you do think about it?\" the reporter says, seeming to focus on your use of the word try.\n  *line_break\n  \"Not really,\" you follow up.\n  *line_break\n  \"What do you mean really?\" they ask continuing to push.\n  *line_break\n  \"I mean I really don't think about it,\" you say. After a couple more rounds of going around in circles like this, the reporter gives up on trying to break your persona and leaves. Nothing really comes of it within the next few days, as people seem to see it as just another boring interview where people really didn't say anything.\n  *set Fans %+ 5\n  *goto end\n\n*if (wins \u003c 11)\n  \"But what if you think about it now?' the reporter asks.\n  *line_break\n  You see the stupidity of the reporter's pushiness, and want to counter with a 'smart', or 'creative' answer but then think of how if you keep your composure, everybody else will see how pushy the reporter will look,\" I try to not distract myself with asking myself these questions. You can get lost in your own thoughts very easily,\" you say giving the reporter nothing to really go on. Nothing comes of it, and just as you predicted, this interview isn't even aired. The media seems to be getting pretty desperate to get stuff from you.\n  *set Team %+ 5\n  *goto end\n*else\n  \"Even though you're doing well?\" the reporter asks, hoping to be able to push your buttons.\n  *line_break\n  You try to think of something to say, and then the perfect idea comes to mind. \"I feel that part of the reason for the team's success is not thinking about stuff like that. Keeping our minds sharp and focused has given us an edge in key moments over any opponents who had their heads in their own thoughts. If we let ourselves start thinking of that, not only will we lose that edge, but we'd actually be behind the teams who are able to focus.\" The reporter seems somewhat stunned by your bravery, but after the interview airs, fans love the fact that you essentially called out the media while also giving a perfect answer to their question.\n  *set Media %- 5\n  *set Fans %+ 15\n  *goto end\n  \n\n*label joke_dogs\n\nThe reporter lets out a pretty gregarious laugh, understanding that it's a joke, and you let out a little chuckle simply to ease the tone. This one is turned into a meme as well but in a good way. You've immortalized this interview and made both fans and the media like you. Look at you go!\n*set Media %+ 10\n*set Fans %+ 10\n*goto end\n\n*label serious_dogs\n\n*if (wins \u003c 7)\n  \"Seems as if you've already made your decision,\" the reporter says as if trying to prompt you into admitting that your team isn't doing well.\n  *line_break\n  \"Not really, the result isn't the only thing that matters,\" you say, intentionally being as vague as possible. Nothing really comes out of this, and the interview isn't even broadcast.\n  *goto end\n\n*if (wins \u003c 9)\n  \"Can't say anything?\" the reporter asks, trying to prompt you into looking like you only care about winning. Whether you do care about anything else is meaningless to everyone else.\n  *line_break\n  \"I feel there's still stuff that can't be predicted, and I don't feel comfortable giving you an answer before they come to the surface,\" you say. The reporter seems to give up, seeing that you're responding to their meaningless questions with meaningless answers.\n  *set Fans %+ 5\n  *set Media %- 5\n  *goto end\n\n*if (wins \u003c 11)\n  \"What do you mean?\" asks the reporter trying to bait you into saying something that implies you're only in it to win it.\n  *line_break\n  *line_break\n  \"I still have to let everything play out,\" you say.\n  *line_break\n  *line_break\n  \"What do you mean everything?\" the reporter asks.\n  *line_break\n  *line_break\n  \"I mean everything,\" you say. After you and the reporter keep going around in circles, they finally let the interview go, seeing it as useless.\n  *set Openness %+ 5\n  *set Media %- 5\n  *goto end\n*else\n  \"You talking about a championship?\" the reporter asks with a blatant bait.\n  *line_break\n  *line_break\n  You laugh and shake your head. The reporter is confused but lets it go and leaves, seeing that you're not going to give a straight answer.\n  *set Team %+ 5\n  *set Media %- 5\n  *goto end\n  \n\n*label Hyenas\n\n*line_break\n\"At the beginning of the season, you had the choice of staying with the Dogs or signing with one of many other interested teams. You chose to change teams and join the Hyenas. What was the thinking behind this?\n*choice\n  #I just wanted a change of scenery.\n    The reporter simply moves on, as if this question was meant to set up a later question. In a second, you see that this intuition was correct.\n    *goto Hyenas2\n  #I feel that a championship would help my legacy.\n    Fans will be divided on this one, but the main question is yet to come.\n    *set Fans %+ 5\n    *set Team %+ 5\n    *goto Hyenas2\n  #I feel the Dogs were ready to move on, so I went to a place that was ready to take me.\n    Although you were anticipating the reporter to ask for more details, they instead ask another question which you figure was planned the whole time.\n    *set Fans %+ 10\n    *goto Hyenas2\n  #Just an impulse decision.\n    The interview moves on as if your answer here didn't matter.\n    *goto Hyenas2\n  #They offered me the most money. Duh.\n    There's a slightly longer pause than usual on this one, but you feel very little flack here despite the fact that you missed a chance to make yourself more likeable.\n    *set Fans %- 5\n    *goto Hyenas2\n\n*label Hyenas2\n\n*line_break\n\"At this point, do you regret your decision?\"\n*choice\n  #\"I have no regrets about moving to the team I felt was best for me.\"\n    *goto noregrets_hyenas\n  #\"Yeah, I feel another team could have been a better fit for me.\"\n    *goto regrets_hyenas\n  #\"I try to not think about it too much and just focus on what's happening on the field.\"\n    *goto focus_hyenas\n  #\"I can't really say anything until after the season,\" said as a joke.\n    *goto joke_hyenas\n  #\"I can't really say anything until after the season,\" said as a serious comment.\n    *goto serious_hyenas\n\n*label noregrets_hyenas\n\n*if (wins \u003c 7)\n  \"It seems as if this team may not have been the best fit for you, though,\" the reporter says, referring to your team's poor record this far into the season. In an attempt to save the situation, you try to divert the attention away from your team's poor record.\n  *line_break\n  *line_break\n  \"There's more to my decision than simply winning,\" you say. You take a brief pause before finishing the answer. Although you were half expecting to be interrupted by someone, the media lets you continue. \"I feel that the chemistry here is a breath of fresh air. This has been one of the most fun seasons of my career, and I feel as if thinking too much about winning and losing would kill my love for the game.\" The response from everyone is surprisingly relaxed, and the interview is relatively forgettable.\n  *set Team %+ 5\n  *set Fans %+ 5\n  *goto end\n*if (wins \u003c 9)\n  \"Were the Dogs not a great fit for you?\" the reporter asks. It seems as if you're going to have to be careful of what you say. The Dogs are going to be the team you'll be mostly remembered playing for, so maintaining a good relationship with them is critical.\n  *line_break\n  *line_break\n  \"They certainly were,\" you say attempting to save face. Regardless of if they were a good fit, you note the importance of remaining positive. \"However, sometimes simply changing things up is for the best. Sometimes you have to keep things fresh,\" you say in a positive voice. The media seems happy with that response, not pushing for more.\n  *set Team %+ 5\n  *set Fans %+ 10\n  *goto end\n*if (wins \u003c 11)\n  \"Do you feel as if the Dogs were a poor fit for you?\" asks the reporter in an attempt to put you into a lose-lose scenario. In an attempt to answer the question without falling for this classic trap, you decide to just say bland positive stuff.\n  *line_break\n  *line_break\n  \"Of course, they were, after all, I stayed there for so many years,\" you say. It actually takes a second or two to remember how many seasons, but you're able to continue. \"Sometimes, however, you need to change things up in order to keep yourself on your feet. It's important to go out of your comfort zone every once in a while,\" you say while looking directly at the reporter. The tone seems to shut them up and they leave, with the interview becoming more of a footnote.\n  *set Team %+ 10\n  *set Fans %+ 5\n  *goto end\n*else\n  \"Good fit as in..?\" the reporter asks, trying to prompt you to say something that'll get a headline. Luckily, you think before you say anything and come up with an idea that's just going to show the media spinning its wheels.\n  *line_break\n  *line_break\n  \"As in a good fit,\" you say and abruptly end the sentence. The reporter already realizes he's going around in circles and stops before continuing. It seems as if not answering the question with any substance seems to be the best strategy in anything.\n  *set Media %- 5\n  *set Team %+ 5\n  *set Fans %+ 10\n  *goto end\n\n*label regrets_hyenas\n\nThe reporter at that point is happy with your answer and walks away. There's a bit of a media circus the next day, with plenty of \"what if\" scenarios. This includes the possibility of you remaining with the Dogs, as well as you joining some of the other teams that made you offers. These include the Bulls, Alpha Lions and the Swordsmen. The Alpha Lions are of particular interest, being the Hyenas' biggest rival. This seems to give you a lot of unwanted attention, however, mostly from Hyenas fans. Some Dogs fans seem to be getting a good laugh from your regrets though, especially given the fact that they have a decent season despite having a good quarterback. Other Dogs fans seem to be more upset, seeing you as someone who could have given the team one last shot in a storybook ending. You know that now this will be a large part of your legacy regardless of how well this season ends for you.\n*set Fans %- 15\n*set Team %- 10\n*goto end\n\n*label focus_hyenas\n\n*if (wins \u003c 7)\n  \"Do you feel you could have had a better season playing for someone else or staying with the Dogs?\" The reporter asks hoping to bait you into an answer where you try to 'get your complaining off your chest,' after a frustrating season.\n  *line_break\n  *line_break\n  \"As I said, I try to not think about it,\" you say in an attempt to de-escalate the situation in order to not face such critique from the media and fans. The reporter doesn't seem to want to press the issue, as they recognize that they're not going to be able to push you any further.\n  *set Fans %+ 5\n  *set Team %+ 5\n  *goto end\n\n*if (wins \u003c 9)\n  \"Do you still feel the need to focus given what your team has been through at this point,\" the reporter asks. You feel as if the entire sports industry would be insulted by this simple question, so you answer with the only thing you can think of in order to save everyone's dignity.\n  *line_break\n  *line_break\n  \"Of course I do. It's always worth keeping focus. Even if we had zero wins right now, I would be 100% focused on the game. Anything else is disrespectful not just to your team, but to the game of football as a whole.\" Stunned, the reporter stands down, packs up and leaves. The interview never airs, but your teammates sure heard it and loved your response.\n  *set Team %+ 10\n  *set Coach %+ 5\n  *goto end\n\n*if (wins \u003c 11)\n  The reporter really doesn't say much, as they recognize that saying anything like that to a team in playoff contention could easily come back to bite them. They seem to give you a fair bit of respect.\n  *set Media %+ 5\n  *goto end\n*else\n  The reporter looks as if he's about to say something, but then retreats back into his previous persona and packs up. Your interview isn't aired.\n  *goto end\n\n*label joke_hyenas\n\nThe reporter lets out a pretty gregarious laugh, understanding that it's a joke, and you let out a little chuckle simply to ease the tone. This one is turned into a meme as well but in a good way. You've immortalized this interview, and made both fans and the media like you. Look at you go!\n*set Media %+ 10\n*set Fans %+ 10\n*goto end\n\n*label serious_hyenas\n\n*if (wins \u003c 7)\n  \"Is this because of your record?\" the reporter asks you in a clear attempt to get you to say something that would bring you negative attention.\n  *line_break\n  *line_break\n  \"Of course not,\" you say in an attempt to save face. \"There's plenty of factors that must be considered when seeing if a decision was good, and many of them can't be seen until the team reacts to the end of a season.\"\n  *set Team %+ 5\n  *set Fans %+ 5\n  *goto end\n\n*if (wins \u003c 9)\n  \"Because you don't know if you'll make the playoffs?\" the reporter asks, reminding you of the thing that's been on your mind for the last few weeks, and will continue to think about.\n  *line_break\n  *line_break\n  \"It's more complicated than that. I really don't like to talk about personal stuff in interviews,\" you say. At the moment, it feels like you successfully diverted them, but the media turns it into a bit of a witch hunt as to what you mean by 'personal stuff'.\n  *set Media %- 5\n  *set Team %+ 5\n  *goto end\n\n*if (wins \u003c 11)\n  \"Championship?\" the reporter asks with no context.\n  *line_break\n  *line_break\n  After thinking for a brief second, you respond with \"There are a lot of factors.\" They ask what you meant by that, but you respond to each of them with a non-answer, the reporter realizes they're not getting anything from you.\n  *set Fans %+ 5\n  *set Team %+ 5\n  *goto end\n*else\n  \"Is this dealing with you possibly winning a championship?\" the reporter asks.\n  *line_break\n  *line_break\n  \"Not entriely,\" you respond before dodging questions for the rest of the interview.\n  *set Media %- 5\n  *goto end\n\n*label end\nTime for the next game to start.\n*page_break\n*goto_scene Game_play", "week_16": "You're having dinner with ${SO_name} with the news on in the background. As the reporters about some financial stories and the strength of the dollar, you're both able to drown it out as you two finally have a rare moment of peace.\n*line_break\n*line_break\n\"So, marriage,\" ${SO_name} says. \"What are your thoughts?\"\n*line_break\n*line_break\nYou're caught mostly off guard by this, especially since just a few weeks ago ${SO_name} got uncomfortable when your mom brought it up. You're still second-guessing your response to that, so this conversation is both a bit of a surprise and one that hits a sensitive spot for you. \"I thought you really didn't want to talk about it,\" you respond putting your thoughts into words.\n*line_break\n*line_break\n\"I'm uncomfortable talking about it with others. I feel your mother was encroaching on our privacy. But it is something that I feel we do need to talk about. I just want to keep the talks private for now.\" The responce given by ${them} is quite direct.\n*line_break\n*line_break\nAfter thinking about it for a few seconds, you take a breath before saying, \"Okay, when were you thinking?\" before waiting for a response.\n*line_break\n*line_break\n\"What I want is at some point in a couple of years,\" ${SO_name} answers very directly. After a second, you respond.\n*choice\n  #I was thinking it would be something sooner.\n    They actually smile a little and respond with \"I was hoping you would say that,\" as they look into your eyes.\n    *set SO %+ 10\n    *goto part2\n  #I was hoping for something a little more down the line.\n    They sigh and look upset. \"I guess that could work, too,\" they say in a disappointed sounding voice. You're not sure how to process the answer, but at least you were honest.\n    *goto part2\n  #That sounds great.\n    They smile and say \"Perfect, it's set then. Well, almost,\" before winking at you.\n    *goto part2\n  #I wasn't hoping to get married at all, actually.\n    You can see them upset. \"Should we stay together, knowing that?\" they respond.\n    *line_break\n    You try to save the conversation with \"Of course, I just feel the whole wedding thing is a little much.\" They nod, but their slouching body language shows they think poorly of your answer.\n    *goto part2\n\n*label part2\n\n*line_break\n*line_break\nAfter that slightly uncomfortable but needed conversation, there's a brief pause. ${SO_name} then pauses and asks about where you will want to live.\n\n*fake_choice\n  #I'd like to stay here. It's where both our families are.\n  #I'd like to live near the coast. It looks really nice.\n  #How about we just travel for a little bit instead of settling down?\n  #I don't know. What were you thinking?\n\nRight before they respond, as if on cue, the news starts to mention you will be part of a story later in the show, and then switches to a commercial break. \"Oh boy,\" ${SO_name} says sarcastically with a smile on their face before shaking their head. \"Look, at that, superstar, you're on the news again.\"\n*line_break\n*line_break\nYou chuckle for a second before they continue.\n\n*if (SO > 74)\n  \"Listen, I know I signed up for having you have to divide your attention since I knew your job before I agreed to see you. But I can't wait for this to be over in a few weeks,\"\n  *goto part3\n*elseif (SO > 54)\n  \"I understand that you have to have our lives under the microscope a lot because of your job, but I can't wait to have your full attention.\" They say it in a tone that indicates they see the possibility of you not giving them as much attention as they want.\n  *goto part3\n*elseif (SO > 34)\n  \"I really hope that once you retire, our lives will stop being put under the microscope,\" they say in an annoyed voice, indicating that they're sick of being polite in the name of allowing you to live your dream job.\n  *goto part3\n*else\n  \"I'm sick of having our lives, especially yours, seen under the microscope. Can you just give me the attention I want?\" they ask in a heavily annoyed voice.\n  *goto part3\n\n*label part3\n*line_break\n*line_break\n\"Of course. I'm pretty sick of it too. Don't worry though, in a little more than a month, the worst part will be over,\" you respond.\n*line_Break\n*line_break\n\"The worst part?\" they ask.\n*line_break\n*line_break\n\"Yeah,\" you say. You then pause to acknowledge the fact that you're about to say something unpleasant. \"Immediately after my retirement, there's going to be some attention, and after that it'll quickly go down to a mild annoyance, popping back up again when I'm inducted into the hall of fame, and when I get some endorsement deals,\"\n*line_break\n*line_break\n\"[i]When[/i] you get in?\" ${SO_name} asks in a joking voice. You smile, chuckle and acknowledge the joke made at your ego, as ${SO_name} laughs along with you. After a few minutes of chatting back and forth, you both hear the aforementioned news report come on. The two of you are both very interested to see what direction they're going to take it in.\n*line_break\n*line_break\n\"The career of ${first_name} ${last_name} is a very interesting. Many people see ${him} as the greatest player to never win a championship in this league,\" says the sports journalist reporting on the issue.\n*line_break\n*line_break\n\"Oh, great, this story again,\" ${SO_name} says.\n*line_break\n*line_break\n\"Tell me about it,\" you respond back in a joking way before the report continues.\n*line_break\n*line_break\n\"There was a lot of talk about if this season ${he} would finally win it all, and snap ${his} curse in his final season. \n*if (team = \"Dogs\")\n  After even staying loyal to the team he's played for his whole career despite being given the chance to leave, in hopes to finally bring them to the promise land. \n  *goto wins\n*else\n  After leaving ${his} former team the Dogs for a chance to join the Hyenas, a team that was looking for a good quarterback to bring them into championship contention. There were hopes this seemingly great fit would lead to a championship.\n  *goto wins\n\n\n*label wins\n*if (wins \u003c 9)\n  It seems as if that's not happening this year, however, as his team has been eliminated from the playoffs.\"\n  *goto part4\n*if (wins = 9)\n  Fans are waiting with bated breath and to see if he makes the playoffs this year, with only 1 week left.\"\n  *goto part4\n*else\n  It seems as if ${last_name} has gotten the ${team_name} to the playoffs. That's the first step completed. We have to see how ${last_name} finishes.\"\n  *goto part4\n\n*label part4\n*line_break\n*line_break\n\"Media spinning stories like a web,\" ${SO_name} says, noting about how each of these seems to be focused on a negative spin.\n*line_break\n*line_break\n\"Yup,\" you say. You want to make a joke about the media being spiders, but you can't quite think of one in the moment.\n*line_break\n*line_break\n\"You're making the face again,\" ${SO_name} says in a funny voice, referring to the face you make whenever you try to think of a joke, but can't quite think of one. Your conversation is then interrupted by the continued report.\n*line_break\n*line_break\n\"Plenty of people have compared ${him} to Ace Armstrong throughout ${his} career,\" the report continues. However, ${first_name} has always come off as the inferior of the two. Thusly, we here polled fans as to which is more popular.\" Results of the poll are shown on screen as the report continues.\n*line_break\n*line_break\n*if (fans > 70)\n  *check_achievements\n  *if not(choice_achieved_popularity)\n    *achieve popularity\n  \"Surprisingly, ${last_name} turned out to be the more popular player, according to our poles, finishing with over 70% of the total votes.\"\n  *line_break\n  *line_break\n  \"Surprisingly?\" ${SO_name} snorts in laughter. The two of you laugh before the report ends. You feel a small sense of catharsis heading into your last game.\n  *goto end\n*elseif (fans > 55)\n  *check_achievements\n  *if not(choice_achieved_popularity)\n    *achieve popularity\n  \"In a close poll, ${last_name} came out on top, with 55% of the total votes.\"\n  *line_break\n  *line_break\n  You feel a slight sense of catharsis heading into the last game of the regular season.\n  *goto end\n*elseif (fans > 45)\n  \"In an interesting result, the two came out dead even, with 50% of the vote each.\"\n  *line_break\n  *line_break\n  You have mixed feelings about this, going into the final week of the season.\n  *goto end\n*elseif (fans > 30)\n  \"In a close poll, Ace came out on top, with 55% of the total votes.\"\n  *line_break\n  *line_break\n  You feel a bit of an emotional sting heading into the last game of the regular season.\n  *goto end\n*else\n  \"Our viewers seem to agree with the stats, with over 70% of the votes going to Ace.\"\n  *line_break\n  *line_break\n  You feel a major emotional sting heading into the last game of the regular season.\n  *goto end\n   \n\n\n\n*label end\n*line_break\n*line_break\nTime for the next game to start.\n*page_break\n*goto_scene Game_play", "week_17": "*check_achievements\n*if not(choice_achieved_playoffs)\n  *achieve playoffs\n\n*if (wins = 16)\n  *check_achievements\n  *if not(choice_achieved_undefeated)\n    *achieve undefeated\n\n*if (Passing_TDs > Interceptions)\n  *check_achievements\n  *if not(choice_achieved_ratio)\n    *achieve ratio\n\n\nYou're invited to a local news station for a full interview. When you arrive, you see that they have a full suite full of comfortable places for you to stay and will offer you a free meal. They will be asking you about your professional history. How do you feel about accepting this?\n*fake_choice\n  #Fully set up! That's great.\n  #I love the attention.\n  #I hate all this media stuff. Thank god I'm retiring soon.\n  #I don't care one way or another. It's just part of the job at this point.\n  #Something is suspicious here. It seems too good to be true.\n\nRegardless of your feelings on the issue, it's time to go. When you get there, you're immediately greeted by a very friendly receptionist who lets you know where you can wait. You're given a very comfortable reclining seat to stay in. The reclining chair reclines itself automatically as you sit down, making you feel like a king. There's plenty of water available. What do you do while you wait?\n*fake_choice\n  #I watch the news but ensure it's a non-sports channel so there's nothing to remind me of my career. Mostly finance stuff would be best.\n  #I watch some infomercials for stuff I'm not going to buy. What am I even doing?\n  #I read some nearby magazines provided. It's quiet, low-stress, and makes me look smart.\n  #I look through my phone. Standard stuff that anyone can enjoy.\n  #I just sit back and relax in a semi-meditation-type thought process. Best to clear my head before addressing the public.\n\n\nAfter you've escaped reality for 15 minutes, one of the production assistants who works at the news station comes downstairs and addresses you. They walk you upstairs and show you around. You're only half paying attention as you're thinking about what you'll say, and wondering what you'll even be asked. You're introduced to some of the production staff, and they all greet you with big smiles and handshakes.\n*line_break\n*line_break\nAfter a few minutes of small talk, you're prepared for the interview. \"You entered the league at the same time as Ace Armstrong,\" they start. Already you're really getting to you, and they haven't even finished the first question. \"The two of you have been compared to each other for the last 16 years since you entered the league and were drafted first and second overall.\"\n*line_break\n*line_break\nYou're getting more and more sick of this. Every time you wake up in the morning you wake up surrounded by Ace Armstrong posters. Okay, that part is voluntary, in order to motivate you to work harder so that one day, you can beat him. It looks like it's not going to work, but the media rubbing everything in is getting worse, especially this year. As you're trying to contain your anger, the journalist finished her question.\n*line_break\n*line_break\n\"Despite your great and well-deserved individual awards, you're in danger of being remembered by fans as the guy who lost to Ace in order to solidify his position as the greatest of all time. How do you respond to these fans?\" Okay, being remembered as just a guy who lost to Ace, who you hate more than any athlete ever, is really grinding your gears. However, being seen as the guy who inadvertently made him into the GOAT feels like a personal attack.\n*choice\n  #I have to keep my head up. I've accomplished some great things in my career, and I don't get anywhere by comparing myself to others.\n    You're seen as professional and confident despite what people think.\n    *set Confidence %+ 5\n    *set Professionalism %+ 5\n    *goto part2\n  #I'm not going to let what a few people think that get in the way of how I feel about my own legacy.\n    The media doesn't like it very much, but the public likes that you don't let it bother you.\n    *set Media %- 5\n    *set Fans %+ 10\n    *goto part2\n  #Nobody says that.\n    It's a little bit awkward, but the interview continues seemingly without a hitch.\n    *set Media %- 10\n    *goto part2\n  *selectable_if (Team = \"Hyenas\") #That's the reason I changed teams. I have to adapt to the current climate and I figured a change of scenery would do the trick.\n    The fans get a little mad for throwing some shade at your former team, but others appreciate your honesty.\n    *set fans %- 5\n    *set Openness %+ 5\n    *goto part2\n\n*label part2\n\nThe interview continues as you start to worry that you might give away the fact that you're nervous. Your palms are sweating a little bit, but you're able to keep your hands down in order to hide your nervousness. You desperately hope that your face doesn't start sweating, and so far notice nothing. As all these thoughts flash through your brain at lightning speed, you actually miss the question that the journalist asked you.\n*line_break\n*line_break\n\"Can you repeat the question, please?\" you ask hoping that you will be able to hear them this time. You're also hoping that this won't come back to bite you later.\n*line_break\n*line_break\n\"Do you feel you are Hall of Fame worthy?\" This one once again gets to you.\n*choice\n  #Yes, of course, I am.\n    You're seen as being quite confident. Some fans love your attitude, while others see you as arrogant. The two fan opinions seem to balance out, though.\n    *set Confidence %+ 10\n    *goto part3\n  #I'd like to think so.\n    You're seen as confident enough, while still respecting the fact that its not your decision to make.\n    *set Confidence %+ 5\n    *set Professionalism %+ 5\n    *goto part3\n  #I try not to think about that very much. I instead try to focus on my job.\n    *set Professionalism %+ 10\n    *goto part3\n  #That's for the Hall of Fame voters to decide.\n    You're seen as professional for letting a team of specialists do their job.\n    *set Professionalism %+ 10\n    *goto part3\n  #I'm not sure to be honest.\n    This is pretty much seen as a non-answer, but you don't appear very confident.\n    *set Professionalism %+ 10\n    *set Confidence %- 5\n    *goto part3\n  #Not without a championship, no.\n    You seem like a bit of a pushover for this answer.\n    *set Confidence %- 10\n    *goto part3\n\n*label part3\n\n*line_break\n*line_break\nThe journalist nods and continues the interview, not paying much attention to your answers. You're able to quickly come to the conclusion that this interview has an agenda behind it, and that they're likely trying to trap you. 'Not again,' you think to yourself, knowing you have to be careful how you answer these questions. \"What do you feel about the amount of help the Dogs have given you during your years with them?\n*choice\n  #They've done well. This is a tough league, and sometimes you don't get the lucky breaks you need to win it all.\n    *set Professionalism %+ 5\n    *if(team = \"Dogs\")\n      You're seen as being relatively professional, and you gave your team solid credit for doing their best and for not blaming them.\n      *set Team %+ 5\n      *goto part4\n    *else\n      You appear quite professional for giving credit to a former employer, and it's implied that you still have a positive relationship with them.\n      *set Professionalism %+ 5\n      *goto part4\n  #I think they've done fine. It's tough to get good help these days. There's only so much talent out there.\n    You're basically seen as taking a cliche, cop-out non-answer. At least you didn't say anything negative, though.\n    *goto part4\n  #I really don't think it's my place to judge the front office. My job is on the field.\n    You're seen as being professional enough, but it's still seen as a bit of a cop-out answer.\n    *set Professionalism %+ 5\n    *goto part4\n  #With the team usually doing well, they often didn't have the pieces to trade for something.\n    You seemed to give them an 'out' so to say, but overall it seems like you're giving them an excuse. Looks okay professionally, but not that great for your legacy.\n    *goto part4\n  #I think they could have done better.\n    Seems as if you're throwing them under the bus, and blaming them for your failure. Pretty unprofessional by you.\n    *set Professionalism %- 5\n    *goto part4\n  *selectable_if (team = \"Hyenas\") #Why do you think I changed teams? They've done terribly.\n    You're seen as blaming others for your failure to win a championship, and boy will you get a rude awakening from fans later.\n    *set Professionalism %- 10\n    *goto part4\n  *selectable_if (team = \"Dogs\") #They've done pretty well. If I didn't think so, I would have left. (laugh)\n    The reporter chuckles a little bit, and you're seen as being supportive and loyal to the team.\n    *set Fans %+ 5\n    *goto part4\n\n*label part4\n\nAfter a little bit of back and forth, the interview finally ends. You're glad to be out of there, but now it's time for both the most exciting and scariest time of the year: the playoffs.\n\n*label end\n*line_break\nTime for the next game to start. This however is not just an ordinary game. In the playoffs, it's either win or go home.\n*page_break\n*goto_scene Game_play", "week_18": "You have yet another interview that'll be fully televised live. How do you feel about having another interview like this?\n\n*fake_choice\n  #I just had one last week. You have got to be kidding me.\n  #I hate it. Even if I didn't have to do it so often. I hate it all.\n  #I would be fine if I didn't have to do it so often.\n  #Meh. It's okay.\n  #I love the attention.\n  #I have no opinion. It's just a job.\n\nThis one however feels different. This different feeling doesn't just the fact that its a small organization that you've only vaguely heard of. Right after you agree to it, you feel as if it was a mistake. The day comes, and during your drive you have a pit in your stomach. You park, and before you get out of your car, you say to yourself \"I have a bad feeling about this,\" after glancing around to ensure that nobody is within earshot. After stepping out of the vehicle and stepping into the news station, you're greeted much quicker than last week and rushed upstairs. You feel taken off guard, but out of remaining at least somewhat professional, you don't resist anything. \n*line_break\n*line_break\nThe interview starts almost right away, and the whole thing feels like a blur. The mic is attached to you in a hap-hazard fashion. You feel that this is being set up to make you look as bad as possible. Before you're able to get a game plan down though, you're asked your first question.\n*line_break\n*line_break\n\"Over the course of your career, you've been called 'the greatest choker in the history of the game'. Do you have a response to this? Okay, you've had the media beat around the bush on this one, but this is the first time that it was called out without any subtlety. A lump forms in your throat. \"Well?\" the reporter asks after you think for about a second. It's now that you recognize that your intuition about this being a bad idea was correct. You also recognize that you now have almost no time to think of an answer, and that won't change during this entire interview.\n*choice\n  #\"I'm not really putting much stock into what fans think of me.\"\n    You look confident in yourself by showing you don't care about what strangers think.\n    *set Confidence %+ 10\n    *goto part2\n  #\"People say these things, you just have to put up with it and keep your head up.\"\n    You're seen as being professional while also not allowing yourself to be taken down.\n    *set Confidence %+ 5\n    *set Professionalism %+ 5\n    *goto part2\n  #\"I don't like it when people say that.\"\n    You're seen as being unprofessional, but at least you spoke your mind.\n    *set Professionalism %- 5\n    *set Openness %+ 5\n    *goto part2\n  #\"Those people are stupid.\"\n    Wow, you are embarrassing yourself with how poor you're acting.\n    *set Professionalism %- 10\n    *set Openness %+ 10\n    *set Fans %- 10\n    *goto part2\n  #\"I try not to think about stuff like that.\"\n    Pro move, albeit boring, dodging the question like that.\n    *goto part2\n\n\n*label part2\n\n*line_break\nAfter that answer, you're asked the next question without very much of a break. They were clearly ignoring your answer to the previous question as well just adding insult to injury. This is also one that is putting you on the spot as you feel as if you're on the back foot already. \"How do you feel your legacy will be impacted by these titles?\"\n*choice\n  #\"I don't think it will. People generally don't think that. You're talking about a vocal minority. Most people understand those accusations are hyperbole.\"\n    You're seen as being confident enough to deal with some criticism.\n    *set Professionalism %+ 5\n    *set Confidence %+ 5\n    *goto part3\n  #\"It won't. We're winning it this season.\"\n    Confident move. Let's hope you follow through.\n    *set Confidence %+ 10\n    *goto part3\n  #\"I don't care.\"\n    Unprofessional, but honest and confident.\n    *set Confidence %+ 5\n    *set Openness %+ 5\n    *set Media %- 5\n    *set Professionalism %- 5\n    *goto part3\n  #\"I don't want to think about that right now. I want to just focus on what's going on on the field.\"\n    Solid move side-stepping the issue.\n    *set Professionalism %+ 5\n    *goto part3\n\n\n*label part3  \n\n*line_break\nThe answer to the question is barely out of your mouth, and the journalist asks yet another question designed to get on your nerves. \"Do you feel as if Ace's greatest accomplishment is defeating you?\" You feel it's time to turn this on its head, and quickly a few ideas come to mind.\n*fake_choice\n  #\"I'm certainly a tough player to beat.\"\n    As you're in the middle of saying \"player\", you're interrupted.\n  #\"Ace has done a lot of great things in his career. It's not my place to judge.\"\n    As you're in the middle of saying \"career\", you're interrupted.    \n  #\"Anyone who beats me must be good.\"\n    As you're in the middle of saying \"must\", you're interrupted.\n  #\"Well anyone else couldn't have done this so often, so yes.\"\n    As you're in the middle of saying \"this\", you're interrupted.\n\nYou don't like the interruption. However, you feel as if it's best to bite your tongue for now before they ask the next question.\n*line_break\n*line_break\n\"Do you feel that Ace is the greatest player of all time?\" In your head, you're thinking 'Oh now come on! You can't be serious!' this whole thing seems to be just a way for them to either rub salt in the wound or get a reaction out of you. How do you respond to this question?\n*choice\n  #\"Oh now come on!\"\n    The journalist smiles as if smelling blood in the water.\n    *set Professionalism %- 10\n    *goto part4\n  #\"It's not my place to judge who the best is.\"\n    The journalist really doesn't do anything, as you've avoided controversy with this answer.\n    *set Professionalism %+ 5\n    *goto part4\n  #\"Yes, it's been an honour to play against him.\"\n    You're seen as professional, but also a little weak.\n    *set Professionalism %+ 5\n    *set Confidence %- 5\n    *goto part4\n  #\"No way!\"\n    The journalist can see you starting to break. Uh oh.\n    *set Professionalism %- 10\n    *goto part4\n  #I don't say anything, I just get up and leave. \n    Despite the fact that people sympathize with your situation, you're seen as extremely unprofessional.\n    *set Professionalism %- 15\n    *goto ending\n\n*label part4\n\nYou know you're being set up, but aren't sure how many people who watch the report will be able to pick up on this. You're asked one last question. This one upsets you quite a lot. \"What will you do after losing in the playoffs?\"\n*choice\n  #\"I won't be losing.\"\n    People like your confidence, and understand that since this question was unprofessional you don't come off as arrogant.\n    *set Confidence %+ 5\n    *goto part5\n  #\"I'm not thinking about afterwards at this point.\"\n    \"So you are going to lose?\" the journalist asks.\n    *line_break\n    \"Hahaha, no,\" you say with a smile on your face.\n    *set fans %+ 5\n    *goto part5\n  #\"You mean if, not when, right?\"\n    The journalist feels caught off guard and then follows up with \"No, I mean when. You've paid attention to your own career, right?\"\n    *line_break\n    \"Well, the game is still played for a reason, right?\" you say.\n    *line_break\n    \"Yes, the league needs its money,\" the journalist replies.\n    *line_break\n    \"Well, they wouldn't make any money with such a foregone conclusion,\" you respond, to which they stop.\n    *set Professionalism %+ 5\n    *goto part5\n  #\"WHEN!?\"\n    The journalist chuckles in a 'Yes, I got 'em,' type of way, but ends the interview. You appear a little unprofessional after your anger, even though people somewhat understand why you got angry given the questions you've been asked.\n    *set Professionalism %- 5\n    *goto part5\n  #I don't say anything, I just get up and leave. \n    Despite the fact that people sympathize with your situation, you're seen as extremely unprofessional.\n    *set Professionalism %- 15\n    *goto ending\n\n*label part5\nThe interview ends, and with a huge smirk on their face, the journalist bids you farewell. ${SO_name} calls you as you're on your way to your car, and a conversation with ${them} starts.\n*line_break\n*line_break\n\"Hey honey. I just saw the interview you had. Man, they were really trying to paint you in a negative light weren't they?\"\n*line_break\n*line_break\n\"Yup,\" you say as you quickly look both ways to ensure you're out of earshot before dipping into your car in order to ensure nobody who works at the station hears you. After you quickly shut the door behind you, you take a moment to transfer ${SO_name} to Bluetooth so you can get out of there quickly. \"Okay, now that I'm out of there you can go into detail, \" you say, paying half attention to the conversation, and half attention to the road.\n*line_break\n*line_break\n\"Sounds like you're the one who needs to get into the details about what it was like. I certainly know what it was like to watch,\" ${they} said, putting plenty of stress on the word 'I' as if implying that everyone else feels the same way.\n*line_break\n*line_break\n\"It feels as if they were trying to trap me,\" you say not caring about how you come off and just wanting to get it off your chest.\n*line_break\n*line_break\n\"Really?\" ${SO_name} asks in a highly sarcastic manner. You can picture ${them} rolling ${their} eyes while saying that, as is normal for ${them} when the obvious is stated.\n*line_break\n*line_break\n\"Yeah really,\" you say in an equally sarcastic manner, one you consistently use to counter ${their} initial statement. However, afterwards you seem to have nothing to say, and after a few seconds of silence, ${SO_name} takes the initiative and speaks up.\n*line_break\n*line_break\n\"I'm not sure that everyone will be able to see that though when they watch the interview,\" they chime in a slightly dejected voice.\n*line_break\n*line_break\n\"Now come on,\" you say in a voice that sounds surprisingly patient considering what you just went through. \"How could people not see right through that? If it was taped, I could see them being able to edit it so that people wouldn't be able to see their manipulative questions. Live though everyone will be able to see what they're asking, and their bias.\"\n*line_break\n*line_break\n\"Never underestimate the ability of people to use whatever they see to confirm their bias. This station is popular with people who like to bash everything, so I wouldn't be surprised if you see a whole storm of people attacking you on social media,\" ${SO_name} responds.\n*line_break\n*line_break\n\"Wait, that's what this station does!?\" you exclaim back.\n*line_break\n*line_break\n\"You didn't even research the place before you agreed to interview with them?\" ${SO_name} yells back at you in what you call thier signature 'I'm not mad, I'm just very upset,' voice.\n*line_break\n*line_break\n\"No. A few times when younger, I turned down some interviews, and every time I got slammed with a story that was biased against me, usually with a disclaimer that I 'denied' my chance to comment. I can't risk that happening again. Imagine what this place could have done with my denial to comment. Here, at least I'm able to somewhat control the debate,\" you're able to stammer out in a panic. You then slam on the brakes, as you were unaware of the red light and the stopped car in front of you. Knowing what would happen if you got into an accident now, you hope with all your heart that you're able to stop in time and...\n*page_break\n*line_break\nYou come to a stop with your front bumper millimetres away from the back bumper of the car in front of you. You sigh in relief before ${SO_name} responds.\n*line_break\n*line_break\n\"What was that?\" ${SO_name} asks.\n*line_break\n*line_break\n\"It was a few different news stations doing that, not one in particular,\" you respond, in response to which station had been slandering you like that.\n*line_break\n*line_break\n\"No, I meant what was that screeching sound?\" ${SO_name} reinforces, now in a more concerned voice.\n*line_break\n*line_break\n\"Oh, that. I had to slam on the breaks in order to avoid crashing into the car in front of me,\" you respond.\n*line_break\n*line_break\n\"Guess I should let you go then. See ya,\" ${SO_name} snarks before quickly hanging up. You snicker to yourself before putting your foot on the gas soon after the light turns green again. You get home later and notice that some people are calling out the news station, while others eat their lies up.\n*line_break\n*line_break\n*label ending\nTime for the semi-finals\n*page_break\n*goto_scene Game_play", "week_19": "This week, you're finally given some space, as your team has made it extremely clear that you and your teammates are not available for interviews. How do you feel about being left alone?\n*fake_choice\n  #It's great. I can finally decompress.\n  #It's great. I can focus on the upcoming game.\n  #It's great. The media can't blast me like they usually do. I'm done with that.\n  #I have no opinion. Just another week of work for me. My last week, but it's no big deal.\n  #I hate it. I can't spread my reputation during my downtime? Boo!\n\nOnce you're able to process your feelings on the issue, you're able to focus more on practice than usual. During this time, you're able to build a stronger bond with some of your offensive linemen. You're able to learn a little more about their personal life. \n\n*if (Team = \"Dogs\")\n  You find out that your right guard's daughter won the state spelling bee earlier this year. Your left tackle also fishes in his spare time. Your center is learning about meteorology and wants to become a weatherman after he retires.\n  *goto part2\n\n*else\n  You find out that your left guard's son won the state math-a-thon last year. Your right tackle is a champion of superhero trivia. Your center wants to make a career with his bodybuilding after he retires, and wants to pay it forward by becoming a personal trainer afterwards.\n  *goto part2\n\n*label part2\nAfter practice, you're able to watch the news without having to worry about them talking about what you did this week. Or so you think. A report starts a seemingly innocuous story, \"With the Megacup coming up this Sunday, many people are placing their bets, while others wait for the odds to come in before committing their money.\"\n*line_break\n*line_break\n'Well, I hope this isn't about me,' you think to yourself. 'OH no,\" you then think again, after remembering that you're playing Ace Armstrong and the Flagbearers. \"At least they're not going to make a direct comparison between Ace and I. There are so many other things to say and everybody's going to be sick of that already,\" you think to yourself.\n*line_break\n*line_break\n\"Now we're going to make a direct comparison between the two quarterbacks in this game: ${first_name} ${last_name} and Ace Armstrong. It's the most important aspect of the game, and nobody will get sick of hearing it, regardless of how much we talk about it,\" the report continues.\n*line_break\n*line_break\n\"Great, that seemed almost comedically designed to counter exactly what I just said,\" you say to nobody in particular. \"It's like this is being written by someone trying way too hard to make this a comedic moment\" you finish before turning your attention back to the report.\n*line_break\n*line_break\n*if (Team = \"Dogs\")\n  \"The last three times the Flagbearers faced the Dogs, these two quarterbacks were at the helm of their respective teams. This includes last year when Ace and his team won after ${last_name}'s interception during the final drive that was a last-ditch attempt to claw out a victory. ${last_name} hopes that this year things will change, despite staying on the same team.\"\n  *goto part3\n*else\n  \"Although the Hyenas haven't ever faced the Flagbearers in the finals, ${last_name} has lost to Armstrong's team 3 times when he was the quarterback for the Dogs. This includes last year when Ace and his team won after ${last_name}'s interception during the final drive that was a last-ditch attempt to claw out a victory. He hopes to change things up this year, and this was the reason he left the Dogs in the off-season.\"\n  *goto part3\n\n*label part3\n*page_break\n*line_break\nYou hate the wording given in the report, but at this point, what's the point in fighting it? Compared to the last week, this isn't even that bad, now that you think about it. As the report goes on, the numbers are run. Ace has won 8 Megacups compared to your 0. He's won 5 regular season MVPs, with you winning 0 but getting 2 runner-ups, both to Ace. He also beat you in rookie of the year voting during your mutual first season and has 14 all-star appearances compared to your 8.\n*line_break\n*line_break\nOkay, in a vacuum your accomplishments aren't bad at all. In fact, you will likely be in the Hall of Fame. You can guarantee it with a victory in the Megacup this coming week.\n*page_break\n*line_break\nA few days pass, and you quickly forget about what had happened earlier. It's something that you've learned to do whenever the media says something that's clearly false, which is happening more and more. If you don't block it out quickly, it'll all get into your head and affect your mental health. However hurtful the older ones were, the one today feels strange.\n*page_break\n*line_break\n\"With tomorrow's Megacup likely being the last game of ${first_name} ${last_name}, now would be a great time to gain a retrospective on his career,\" the reporter starts. As you only half pay attention while you and ${SO_name} cook dinner together, the report continues. \n*page_break\n*line_break\n\"${last_name} is seen as the best player to never win a championship and has the opportunity to finally put the narrative to rest. However, regardless of if ${he} will, ${he} will have a lot to be proud of.\" This catches your attention.\n*page_break\n*line_break\n\"Something wrong?\" ${SO_name} asks you. How do you feel about the situation?\n*fake_choice\n  #\"No. I'm curious about where this is going.\"\n    \"Interesting,\" they respond before letting you turn your attention to the story.\n  #\"Yeah, I wonder how they're going to slander me this time.\"\n    \"Oh, you know not to let it bother you,\" they say in a cheerful tone before letting you pay attention to the report.\n  #\"Yeah, it kind of bothers me that they're putting on this fake front all of a sudden.\"\n    \"No kidding,\" they snark before letting you pay attention to the report.\n  #\"No, I love that they're finally giving me credit.\"\n    \"Oh, good,\" they laugh before letting you pay attention to the report.\n\n\"As a player who has seen plenty of criticism from others for not winning, but at this station, we really don't think those points are as valid as people think.\"\n*line_break\n*line_break\n\"But you're the ones who made so many of those criticisms yourself!\" you yell at the TV, despite knowing that they can't hear you. This gets ${SO_name} to chuckle as the report continues.\n*line_break\n*line_break\n\"${last_name} would have likely won at least one championship had ${he} not played against the player most consider the GOAT, and also would have won at least one MVP and the rookie of the year.\"\n*line_break\n*line_break\n\"Thank you!\" you scream, only to have ${SO_name} chuckle again.\n*line_break\n*line_break\n\"It's so cute to watch you react to what's happening on TV as if the people on the other end can hear you,\" ${SO_name} responds.\n*line_break\n*line_break\n\"I mean, all our fans do it,\" you counter with a smirk on your face to indicate that you're half-joking.\n*line_break\n*line_break\n\"True,\" ${SO_name} says before pausing and finishing with, \"Doesn't make it any less funny though. In fact, it makes it funnier,\" they say with an even bigger smirk on their face. You then turn back to the report. In order to not miss anything.\n*line_break\n*line_break\n\"${first_name} ${last_name} is someone who has been made fun of ${his} whole career and turned into a meme. However, with these clearly Hall of Fame stats, people are beginning to speak about ${his} greatness.\"\n*line_break\n*line_break\n\"Starting to!?\" you exclaim. You roll your eyes. \"People have been saying it for a while now. It's just been a vocal minority driving home this dumb narrative!\"\n*line_break\n*line_break\n\"Calm down,\" ${SO_name} says softly. \"Let's see where they're going with this.\" You don't have to wait long to see where this goes.\n*line_break\n*line_break\n\"We can see some of ${his} career highlights here,\" the report then changes to show a few clips of your best career moments as inspiring music plays in the background. How does this make you feel?\n*fake_choice\n  # It's great to finally have the media do something positive for me.\n  # It's too little too late on their part to start saying stuff that's true.\n  #This is so fake.\n  #This is a little cliché.\n  #I have no real opinion. This is all just noise that nobody pays attention to, anyway.\n\nNow, time for the game.\n*line_break\n*line_break\n*label ending\nTime for what everything has been building towards: the finals. Your entire legacy is on the line in this game. Good luck.\n*check_achievements\n*if not(choice_achieved_finalist)\n  *achieve finalist\n\n*page_break\n*goto_scene Game_play", "week_2": "Midway through the second week, you have to face a series of interviews with several media personalities. You've done this several times in your career, and by now you've decided how you feel about it.\n*line_break\n*if (team_name = \"Dogs\")\n  You heard that the Hyenas had to do one of these last week. Thoughts?\n  *choice\n    #Doesn't matter. My feelings aren't positive or negative, it's all just a job.\n      I guess not.\n      *goto event_start\n    #I was so happy I was helping kids instead of taking interviews last week. I kind of wish I could do it again. These interviews suck.\n      Your positivety from the children's hospital was visible for most of last week, but people can see you're not enjoying this,\n      *set Fans %+ 5\n      *set Openness %- 5\n      *goto event_start\n    #I'm so happy I'll be  taking interviews instead of dealing with kids this week. I can actually promote myself.\n      Your negativity from the children's hospital was visible for most of last week, but at least you look more positive for the cameras this week.\n      *set Fans %- 5\n      *set Openness %+ 5\n      *goto event_start\n\n*if (team_name = \"Hyenas\")\n\n  This is the second week of interviews in a row. Thoughts?\n  *choice\n    #I'm pretty annoyed, I'd rather being doing almost anything else. These are so fake and tacky.\n      Yeah, I don't blame you. The media can be annoying.\n      *set media %- 5\n      *set Openness %+ 5\n      *goto event_start\n    #I'm pretty excited, I love the chance to promote myself and the team.\n      Yeah, I don't blame you. The hype can feel great.\n      *set media %+ 5\n      *set Openness %- 5\n      *goto event_start\n    #I don't care. All of this is just part of my job either way, and as long as I'm on the clock, I'll do what the bosses say.\n      I guess not.\n      *goto event_start\n\n*label event_start\nYou're opening up with a handful of reporters and journalists all interviewing you at once. You get asked about the interception you threw at the end of last season's championship game that cost your team the game.\n*choice\n  #I admit fault and say that I've been working on reducing the number of interceptions it throw.\n    You seem like a true professional, but some members of the media exaggerate how much fault is on you, even using you to some extent as a scapegoat for the team's loss.\n    *set Professionalism %+ 10\n    *set Fame %- 5\n    *set Confidence %- 5\n    *goto question_2\n  #I say stuff like 'these things happen' and stress the importance of taking it in stride. They're trying to get me to give in, and I want to maintain confidence and composure.\n    You maintain professionalism, and also look confident in the face of questioning.\n    *set Professionalism %+ 5\n    *set Confidence %+ 5\n    *goto question_2\n  #I blame my offensive line for not protecting me. They should have done their job.\n    You're seen as a bad teammate, and as unprofessional.\n    *set Team %- 5\n    *set Professionalism %- 5\n    *goto question_2\n  #I give credit to the player who got the interception. It takes a lot of skill and control to make such a play in the clutch.\n    You're seen as professional, but things get awkward with you praising an opponent.\n    *set Professionalism %+ 5\n    *goto question_2\n  #I get mad about being asked by the reporters. This happened months ago, stop bothering me about it.\n    Yeah, not a good move. You're escorted out.\n    *set Professionalism %- 10\n    *set Media %- 10\n    *set Fans %- 5\n    *goto event_end\n\n*label question_2\n\nThe next question you're given is about how this is probably your last season. Deep down, you know it'll almost certainly be your final season. Given that, what do you say?\n*choice\n  #I give a non-answer. If I give any real details, the media will hype this up, and my team and I don't need that kind of distraction.\n    Nothing really comes of it.\n    *goto question_3\n  #I admit it likely is. The media will only make a big deal about it once, might as well get it out of the way so I don't have to deal with it as much near the playoffs...if we make it.\n    You get a lot less attention than you would expect.\n    *Set Media %+ 5\n    *goto question_3\n  #I deny it. Hopefully they don't catch me lying.\n    They keep pushing a story that you're 'denying it'. Yeah, they've figured out that you're probably going to retire.\n    *set Media %- 10\n    *goto question_3\n  #I announce it as my 'farewell tour'. Let's get some positive fan reaction from this.\n    The media loves it, but fans are split. Some love your enthusiasm, but others see you as arrogant.\n    *set Media %+ 15\n    *set Fans %- 10\n    *set Fame %+ 5\n    *goto question_3\n\n*label question_3\n\nNext comes a question you were secretly hoping wouldn't happen. You're asked about rumours of a secret addiction to painkillers. The questions aren't asked in an accusatory manor, since unlike steriods, they're not against the rules, but there's still a stigma attached.\n*choice\n  #I open up about it, and admit I am getting help. They're probably going to find out, so I might as well be honest about it.\n    The fan reaction is really mixed. You're seen as weak by some, but symathetic by others. Yet others view this as a problem with the sport as a whole.\n    *set Fame %+ 10\n    *goto question_4\n  #I deny it. I don't need the attention from fans and the media. If I can just cover it up for one more season, I'm in the clear.\n    The fans don't turn on you, as the media pushes stuff like this all the time.\n    *goto question_4\n\n\n*label question_4\n\n\nAfter a series of unspectacular interviews, you break for lunch. After lunch, you return to interviews. How are you holding up?\n\n*fake_choice\n  #I'm doing great.\n  #I'm doing good.\n  #I'm doing okay.\n  #I'm not doing so good.\n  #I'm doing terribly.\n\nAfter processing your emotions towards the event, you're placed in a group interview. You get asked a few questions about your relationship with ${SO_name}. How do you answer these questions?\n*choice\n  #I'm open about it, including all my negative emotions. I want to show I have nothing to hide.\n    The media and the fans are glad you're opening up, but ${SO_name} is pretty upset, and sees this as a breach of privacy.\n    *set Media %+ 5\n    *set Fans %+ 10\n    *set SO %- 10\n    *goto event_end\n  #I just compain about ${SO_name}. God, ${they} can be so annoying.\n    You turn some people off, especially ${SO_name}, but the media eats it up.\n    *set Media %+ 15\n    *set Fans %- 5\n    *set SO %- 15\n    *goto event_end\n  #I'm fully positive. I'm so happy to have ${SO_name} in my life, and I want everyone to know it.\n    ${SO_name} is happy that you're being postive, but really wishes you had just kept your mouth shut.\n    *set Media %+ 5\n    *set Fans %+ 5\n    *set SO %- 5\n    *goto event_end\n  #I'm vague in an attempt to protect our privacy. No need to drag someone else's secrets into the public.\n    ${SO_name} is happy you respected privacy.\n    *set SO %+ 10\n    *goto event_end\n    \n\n*label event_end\n*line_break\nWith that over, the game begins on Sunday.\n*page_break\n*goto_scene Game_play\n", "week_3": "The week preceding the third game of the season you get some time to yourself. \n\n*if (team_name = \"Hyenas\")\n  How do you feel about not having another round of interviews with the media?\n  *fake_choice\n    #Thank god!!! I have all those interviews and was worried that's all it would be.\n    #Glad to get something different.\n    #A good breath of fresh air.\n    #Let down. I liked them.\n    #Just glad to have some time to myself.\n    #Indifferent.\n\nRegardless of how you feel about it, it's time to choose what you do with your spare time. You're thinking this might be the only week throughout the entire season where you'll have some prolonged time to yourself. How do you choose to spend it, knowing that if people recognize you, it'll turn into another day of stopping attention?\n\n*choice\n  #I see the media anyway. I love the limelight, why would I shy away from it?\n    You actually get some solid publicity from this for once. Yeah, it's a little bit weird, but you appreciate the fact that they're off your tail for once, since you can control the narrative. They talk mostly about how you've been able to consistently be named an All-Star despite a lack of recognition from others. You feel that this is because the station you approached was mostly looking for a small filler story, but its still something that could give people a positive impression of you for a while.\n    *set Media %+ 10\n    *goto ending\n  #I spend time with the team. Time for away from the field bonding.\n    You go bowling with some of your teammates during your downtime. You score 146 and have a lot of fun. It draws you closer to your teammates on a superficial level, as you're enjoying time together and making light-hearted jokes. You gain very little knowledge of who they are as people, but your dynamic with them improves drastically. When you go to practice for the next time the next day, your teammates seem happy to see you, and you're happier to see them than you usually are. Some jokes are made during practice, which is a nice of change of pace.\n    *set Team %+ 10\n    *goto ending\n  #I spend time with my family. I don't get to see them very often.\n    You go incognito to the movies. Afterwards, you, your parents and your sister play some board games together for the first time since you were a teenager, and it draws you closer to all of them. You also see some of your cousins that you usually only get to see once a year. You appreciate the break from your teammates and are now seeing some of the things you sacrificed for your career. You know that this was something that had to happen for you to
