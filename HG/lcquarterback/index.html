 have this career, but that doesn't make you feel much better in the end. However, today made you see the light at the end of the tunnel and look forward to your retirement.\n    *set Family %+ 10\n    *goto ending\n  #I spend time with ${SO_name}. I don't get to see ${them} very often.\n    The two of you choose to stay home in order to avoid the crowds. You order a restaurant meal and have it delivered to you, with ${SO_name} answering the door and you hide in order to minimize the chances of someone recognizing you and derailing your privacy. The two of you have a romantic evening together, one that you and ${SO_name} both admit that you miss. ${SO_name} says that they look forward to getting to be able to do stuff like this more often, and you promise that you'll be able to do that after you retire at the end of this season.\n    *set SO %+ 10\n    *goto ending\n  #I spend time in therapy to decrease my dependency on painkillers.\n    You and your therapist, who signed a confidentiality waiver, talk about your dependency and what's really driving it. She lets you know that there are ways to wean you off of your painkillers, but it requires some work from you. As the next few days pass, you go through the motions, and can now successfully take one less painkiller per day. It's not anything completely groundbreaking, but it's certainly a step in the right direction.\n    *set Painkiller_Addiction -1\n    *goto ending\n\n*label ending\n*line_break\n*line_break\nOkay, now that that's done...game time!\n*page_break\n*goto_scene Game_play", "week_4": "During the 4th week of the season, you're given the opportunity to deal with a sponsor. You recognize them as a sports shoe manufacturer. You're aware that this industry has a lot of controversial companies in it, and this is one that you aren't familiar with. Do you choose to research this company before deciding whether or not to sign a deal with them?\n*choice\n  #Yes, I need to know what I'm signing up for so that my brand isn't tarnished.\n    *goto description\n  #No, I'm too busy to worry about small details. Just let me choose if I'm getting it.\n    *goto choice\n\n*label description\n\nThey're known for running sweatshops in many countries. This isn't just something that they have been accused of, they have confirmed that third world children who are paid pennies make up 100% of their labour force, and they are openly proud of it. In fact, they advertise themselves as someone who 'lowers unemployment in 3rd world countries, bringing them from a developing nation into a developed one, as well as building a strong work ethic for the next generation.' You're tasked with the chance of being one of the athletes to bring them from an almost unknown entity into a household brand. You know that the public will respond negatively if you affiliate with them, but it's also a pretty solid paycheque.\n\n*label choice\n*line_break\nThey're offering you $25,000 for one day of filming a TV commercial. This includes a deal where you wear these shoes on the field as well in order to help promote them to a general audience.\n*line_break\n*line_break\nFans have shown that they are pretty disgusted by this comapny's business practices, but the brand is still becoming more popular since other athletes, including Ace Armstrong, also wear them. Each athlete who is sponsored by them notices a sharp increase in both overall fame and hate. \n\n*choice\n  #Yes, I could use the money.\n    You're seen as promoting this company's corruption. You do see some fans of the ${team_name} wearing them, however, so it does show that you still have some die-hard fans who want to associate themselves with you regardless of branding. Most fans, however, are critical of your choice.\n    *set Sponsor +1\n    *set Fans %- 10\n    *goto filming\n  #No, I don't want to spend time on this.\n    You successfully dodge the controversy by not being involved. Some fans however still long for more merchandise of you, and you get no glory for turning down the offer since something that's just an offer doesn't get any media attention.\n    *goto ending\n  #No. Not only do I turn down the offer, but I also speak out against this company's business practices, since some people don't know about them.\n    You recieve praise for standing up to this company's practices. There's even some protests against the company from fans who didn't know about what they did before. You get some positive attention from fans who want to stand up to this, but some negativity from those who just want more merch. Overall, the two are both minorities and cancel each other out.\n    *set Fans %+ 10\n    *goto ending\n\n\n*label filming\n\nThe day of filming comes and you're given the script, and it contains a lot of stuff that you don't morally agree with. Some members of the film crew look uncomfortable. How do you respond to this situation?\n*choice\n  #I tell some of the film crew who feel bad that it's understandable that they're uncomfortable, and that there's nothing wrong with doing something they hate because they need the money.\n    Some of them feel better, but there's little change in the feel of the room.\n    *set Fans %+ 5\n    *goto filming_2\n  #I tell the uncomfortable crew that they should do their job better. I want to get out of here! My time is valuable!\n    This makes you look bad, as news of your brash thoughts spreads to fans.\n    *goto filming_2\n  #I go on with filming without question. It's just a job.\n    Filming continues.\n    *goto filming_2\n  #I quit!\n    You don't get corporate recognition. Your public name recovers from the initial backlash that you gained, however.\n    *set sponsor -1\n    *set fans %- 10\n    *goto ending\n\n*label filming_2\n\nFurther into filming, you're asked to say that the company is 'saving the economy and the world', while saying that their customers can 'join them' in their mission. Do you continue anyway?\n*choice\n  #Yes. I need the money.\n    You film, and then the commercial hits. You're attacked for endorsing a company with such a transparent view and obvious lies.\n    *set fans %- 5\n    *goto ending\n  #No. I have to stop these lies.\n    Your reputation somewhat recovers, but this whole thing was still damaging. At least you got paid, though.\n    *set fans %+ 10\n    *goto ending\n\n*label ending\n\nThe company says that they'll remember their interaction with you. However, it's well known among athletes who they've reached out to that they say this to everyone who they interact with, so you know not to take it at face value. Overall, you're just glad that the whole thing is behind you.\n*line_break\n*line_break\nTime for the next game to start.\n*page_break\n*goto_scene Game_play", "week_5": "${SO_name} requests to see you during one of the very few times you asked for time to yourself. You need to wind down, as having the public watching you like a hawk all the time is emotionally tiring, so some alone time is really the only time you have to relax. You however also value ${SO_name}, your time with ${them}, and ${their} feelings. Do you go see ${them}?\n*choice\n  #Yes. ${SO_name} is my significant other, a partner in my life. I need to see ${them}, even if I don't always want to.\n    ${SO_name} is happy that you're taking the time to talk to ${them}...this time at least. What do they mean by that, though? Are they mad at you for not seeing them at other times? You think you know, but you're not quite sure. Uh-oh.\n    *set SO %+ 5\n    *set Openness %- 5\n    *goto time\n  #No. I need the time to myself.\n    ${SO_name} upset that you're brushing ${them} off again...and you still have to meet with ${them} later. Uh-oh.\n    *set SO %- 5\n    *set Openness %+ 5\n    *goto meeting\n\n*label meeting\n\n${SO_name} is pretty upset that you're spending so much time focused on yourself and your career. They say you should focus on them tonight instead of time spent with teammates and the coach.\n\n*choice\n  #They know what they signed up for when dating a celebrity. It's harsh, but that's life. I'm sure we can both find other people if you don't like this.\n    They're pretty upset and continue to push you. It almost seems like they're threatening to break up with you soon if you don't start spending more time with them. You can't tell if they're bluffing.\n    *set SO %- 10\n    *set Team %+ 5\n    *set Coach %+ 5\n    *goto Q2\n  #I already made a commitment to my coach and teammates. I need time to myself to wind down so I don't explode during practice. But I promise another time.\n    They're a bit upset, and keep pushing, but with less hostility. You're not sure if they really calmed down.\n    *set SO %- 5\n    *set Coach %+ 5\n    *goto Q2\n  #I don't exactly like having to always be near someone, and this is poor timing, but I haven't been spending as much time with ${SO_name} as I should. \n    ${SO_name} is happy you cancelled plans this once, but also note that you should do more in the future.\n    *set SO %+ 5\n    *set Coach %- 5\n    *goto end\n  #${SO_name} is right. I should be spending more time with them.\n    They're thrilled. Hopefully, you pull through though in the future as well.\n    *set SO %+ 10\n    *set Team %- 5\n    *set Coach %- 5\n    *goto end\n  #I correct ${SO_name}. I'm not spending time with my teammates and coaches. I'm not upset with ${SO_name}. I just need some time to myself for a little bit.\n    ${SO_name} really doesn't appreciate you being Mr. \"Well actually\", and arguing semantics when what they're really upset about is you not spending time with them. They feel you're dodging the actual issue of your relationship not being the best.\n    *set SO %- 5\n    *goto end\n    \n\n*label Q2\n\nAs ${SO_name} continues to push you for time together, how do you feel?\n\n*choice\n  #I don't feel guilty. They should know this is what happens when you partner yourself with a public figure. This is part of the deal. Not my problem. \n    They feel upset. Deep down, they knew on paper, but feeling it in person is a little different.\n    *set SO %- 10\n    *set Openness %+ 10\n    *goto end\n  #I feel a little bad, but there's nothing that can be done. If they have a problem, ${they} can leave and I'd understand.\n    ${SO_name} gets a little upset, and you're worried that ${they}'ll take up your 'offer' of a breakup, but they don't go that far. In fairness, they seem to have some legitimate beef with you at this moment.\n    *set SO %- 5\n    *set Openness %+ 5\n    *goto end\n  #I feel better reminding ${them} that this is my final season. Just a few more months and my time belongs to ${them}.\n    ${SO_name} seems to be understanding of this and stifles their negative feelings. Some feelings do bleed through though, so you can tell they're upset deep down.\n    *set Openness %- 5\n    *goto end\n  #I should probably give them some more attention. They're my partner.\n    You can see a sigh of relief from ${SO_name}, and they are happy that you're acknowledging their needs.\n    *set SO %+ 10\n    *set Openness %- 10\n    *goto end\n\n*label time\n\nWhat do you do with ${SO_name}?\n*fake_choice\n  #I stay at home and do something simple. Just enjoying each other's company is what matters.\n    The two of you stay at home, have dinner, play a board game, and watch a movie together.\n  #We go out to a fancy restaurant. I'm a pro athlete. I can afford it. We can go to a private booth where nobody recognizes me.\n    You go out to a place so expensive that nobody there really even sees you as a celebrity, so the two of you are left alone.\n  #We go out to do something simple, like bowling.\n    You go incognito so that nobody recognizes you. The two of you are able to enjoy something that ordinary people get to do. You're reminded that being super rich isn't the only way to enjoy life.\n  #We go to a game. Of another sport of course. I don't want to think about work.\n    Some people recognize you, but you're mostly able to enjoy the game. \n\n\"Thank you,\" ${SO_name} says afterwards, and they give you a soft kiss on the cheek. You return the kiss and are happy to have enjoyed a nice evening with them.\n\n\n*label end\n\n*line_break\n*line_break\nTime for the next game to start.\n*page_break\n*goto_scene Game_play", "week_6": "About halfway through the week, your coach calls a major meeting for the entire team. After you arrive, and players stop chit-chatting with each other, the coach takes control of the meeting. He says that he's tightening rules and regulations on the team, and being very strict. This includes a curfew, diet regulations, and limiting when players can see their families. He says that this is due to the need for the team to tighten their belts in order to improve the odds of winning. Many players are notably upset, some even vocalizing their dissent. What do you do?\n*choice\n  #I verbally support the coach. We need to be focused on our jobs.\n    The players get more and more upset, but the coach lets you take the stage.\n    *set Coach %+ 10\n    *set Team %- 10\n    *goto Q2\n  #I sit quietly. I like these changes and there's nothing to argue against.\n    The meeting continues.\n    *goto Q2\n  #I sit quietly. I don't like these changes, but the coach is the boss, so there's nothing I can do.\n    The meeting continues. You can hear other players complaining, but it dies down fast enough that the coach is able to continue.\n    *goto Q2\n  #I vocalize some slight disappointment. I may have to go along with these changes, but I should be allowed to complain about it.\n    Nobody really hears you because it's so loud and your voice is almost drowned out, but it's by people who are agreeing with you.\n    *set Coach %- 5\n    *set Team %+ 5\n    *goto Q2\n\n*label Q2\n\n*page_break\nThe coach waits until most of the players have stopped complaining. When only a couple of players are still complaining, he decides to simply speak over them. \n*line_break\n*if (team_name = \"Dogs\")\n  \"I know a few of you will be upset by this news, and I understand. But, after years of getting so close to winning it all, and a championship so close to our grasp, we need every advantage we can get.\"\n  *line_break\n  *line_break\n  The team has by now calmed down and is quiet, although the players are still visibly upset based on their body language. The coach continues.\n  *line_break\n  *line_break\n  \"We have someone here who's been here for ${his} whole career, and carried us through it, but has nothing to show for it.\"\n  *line_break\n  *line_break\n  Although he doesn't say it, you know he's talking about you. How does this make you feel?\n  *choice\n    #I feel great. I want to win. If that means less freedom, I'm prepared to make that sacrifice.\n      *set Professionalism %+ 5\n      *set Openness %+ 5\n      *set Fame %+ 5\n      *set Coach %+ 5\n      *set Team %- 10\n      *goto Q3\n    #I don't like it. My team will blame me for all these new rules.\n      *set Coach %- 5\n      *set Team %+ 5\n      *set Openness %+ 5\n      *goto Q3\n    #I just like the attention.\n      *set Team %- 5\n      *set Fame %+ 10\n      *set Openness %+ 5\n      *set Professionalism %- 5\n      *goto Q3\n    #I just don't like the attention.\n      *set Fame %- 5\n      *set Fame %- 5\n      *goto Q3\n    #I don't care any either way. It's all just a job in the end.\n      *set Professionalism %+ 5\n      *goto Q3\n\n*if (team_name = \"Hyenas\")\n  \"Well,\" he says loudly, grabbing everyone's attention. \"If anyone here has a problem with this, you can leave.\" You look around, half expecting some of the more brazen members of the team to get up and start to leave as a joke, but that doesn't happen. After a brief pause, the coach continues.\n  *line_break\n  \"So, you're all on board.\" He pauses before continuing. \"Good. Now, as I said earlier this year, you have one goal: win it all. Is that clear?\"\n  *line_break\n  An unenthused \"Yes sir,\" reaches accross the room. It seems as if the coach's brash approach is getting diminishing returns, at least in terms of getting and maintaining attention.\n  *line_break\n  How do you feel about the changes to the team's rules?\n  *choice\n    #I feel great. I want to win. If that means less freedom, I'm prepared to make that sacrifice.\n      *set Professionalism %+ 5\n      *set Openness %+ 5\n      *set Fame %+ 5\n      *set Coach %+ 5\n      *set Team %- 10\n      *goto Q3\n    #I don't like it. My team will blame me for all these new rules.\n      *set Coach %- 5\n      *set Team %+ 5\n      *set Openness %+ 5\n      *goto Q3\n    #I just like the attention.\n      *set Team %- 5\n      *set Fame %+ 10\n      *set Openness %+ 5\n      *set Professionalism %- 5\n      *goto Q3\n    #I just don't like the attention.\n      *set Fame %- 5\n      *set Openness %- 5\n      *goto Q3\n    #I don't care any either way. It's all just a job in the end.\n      *set Professionalism %+ 5\n      *goto Q3\n\n*label Q3\n\nRegardless of your emotions, the meeting moves on. You hear some grumbling from players, but nobody openly objects to the policy anymore. The coach continues.\n*if (team_name = \"Dogs\")\n  A handful of the team members look at you, and you realize that they can read your body language and know how you feel. You breathe as the coach keeps talking as if nothing else was happening.\n  *line_break\n  *line_break\n  \"Now, we're not just doing this for ${him}. We're doing it for the fans, and for ourselves.\" You can see a handful of players on the team roll their eyes at these clearly cliché ideas that the coach has clearly said many times over. Do you even pay attention to the rest?\n  *choice\n    #No, not really.\n      The coach and other players can tell you're not paying attention though.\n      *set Coach %- 5\n      *set Team %- 5\n      *goto end\n    #Yes, of course, I do. \n      The meeting continues.\n      *goto Q4\n\n*if (team_name = \"Hyenas\")\n  There is a brief silence from the players before he speaks, however.\n  *line_break\n  *line_break\n  \"If nobody else objects, we'll continue.\" After a few seconds of nobody objecting, the meeting continues. Do you pay attention?\n  *choice\n    #No, not really.\n      The coach and other players can tell you're not paying attention though.\n      *set Coach %- 5\n      *set Team %- 5\n      *goto end\n    #Yes, of course I do. \n      The meeting continues.\n      *set Coach %+ 5\n      *set Team %+ 5\n      *goto Q4\n\n*label Q4\n*line_break\n*line_break\nThe rest of the meeting is just the coach rambling. It's so cliché and unremarkable that even 10 minutes afterwards you forgot everything. Don't worry, everyone else did too.\n\n\n*label end\n*line_break\n*line_break\nTime for the next game to start.\n*page_break\n*goto_scene Game_play", "week_7": "When in the hotel your team is staying at, you have an unforeseen incident. You go down to the front desk to comment on the lamp in your room not turning on. The people at the desk apologize for it not working and promise it'll be fixed soon. Satisfied with that response, you head back to your room. On your way back, when you're in the hallway, simply minding your own business and recognize the quarterback from your rival team going in the opposite direction walking by you as you make your way to the stairs. You face them in the game later this week. What do you do?\n*choice\n  #I walk by him hoping nothing happens. I just want to get back to my room in peace.\n    It doesn't seem to work, as he says something to grab your attention.\n    *goto Q1\n  #I give him a nod of respect. We're playing for rival teams, but we can still be respectful towards each other.\n    He responds in kind and then begins to speak.\n    *goto Q1\n  #I try to engage him in conversation. He might actually be a nice guy.\n    He responds in a friendly manner but this takes a back seat as he takes control of the conversation before you can.\n    *goto Q1\n  #I try to make a scene. Might as well play up the rivalry.\n    He approaches it in a much more calm manner than you did, but he does seem interested in talking to you.\n    *goto Q1\n\n*label Q1\n*page_break\n\"So, if it isn't the [i]great[/i] ${first_name} ${last_name},\" he says. You haven't interacted with him personally yet and can't make out if he's being respectful, or mocking you since his tone of voice could go either way. He put a lot of stress on the word 'great', but you're not quite able to determine if his tone was sincere or sarcastic. You try to process his meaning as quickly as you can in order to figure out what he means, but before you can respond, he continues.\n*line_break\n*line_break\n*if (team = \"Dogs\")\n  \"You've been in this rivalry before, your whole career in fact.\" He states. You don't like him telling you your life story, as it seems like he's mocking you. He continues talking, bothering you further.\n  *line_break\n  *line_break\n  \"But me, I'm new to it all. Exciting! I get to be a part of your legacy, and you get to be a part of mine.\" He put a lot of stress on the word exciting. By the time you process this, you recognize that he's finally shut up, leaving time for you to say something.\n  *choice\n    #\"Listen, save it for the field this weekend.\"\n      \"Oh, I'll only save the best for that,\" he responds in a more playful manner. You're not sure if he's joking and having fun, or just a poor trash-talker.\n      *goto Q2\n    #\"I'll put on a great show and beat you.\"\n      \"Sure, I guess we'll see,\" he says with a smirk on his face. You can't tell if his confidence is genuine, or fake.\n      *goto Q2\n    #\"Good luck, you're going to need it.\"\n      \"Believe me, you're the one who'll need it oldie.\" You can't tell if his name-calling is light-hearted, or a poor attempt to get into your head.\n      *goto Q2\n    #I don't say anything, I just look back at him.\n      He meets your gaze before continuing.\n      *goto Q2\n\n\n*if (team = \"Hyenas\")\n  \"You're new to this rivalry aren't you? What was it, the Dogs were your first team, and your rivalry was the Cats?\" He asks. How do you respond?\n  *choice\n    #\"What's it to you?\"\n      \"What's it to me? Just trying to see who my opponent is. Get an idea of the next chapter in my legacy.\"\n      *goto Q2\n    #\"Yes...\"\n      \"Ahhh...interesting, an opponent with experience added to my legacy.\"\n      *goto Q2\n    #\"No...\"(lie)\n      \"Don't try to mess with me like that. You're the next rival in my legacy\"\n      *goto Q2\n    #I don't say anything, I just look back at him.\n      After he sees that you're not going to talk, he takes the opportunity. \"A stoic one, I guess. Looks I have one of those 'let my actions do the talking' guys added to my legacy.\"\n      *goto Q2\n\n*label Q2\n*line_break\n*line_break\n*if (team = \"Dogs\")\n  \"Strange, I never pictured myself in a rivalry with you. I was always hoping to play against Ace.\" This is a bit of a trigger for you. What's your response?\n  *choice\n    #\"Oh, you're not good enough to be even near his level!\"\n      \"Oh, yes. That's why I get his leftovers.\" You're able to control your anger, but this did get a little into your head.\n      *goto Q3\n    #\"You...\" and then I shut myself up, remembering the importance of keeping a professional demeanour and not letting my opponent know they're in my head.\n      He laughs, recognizing the slip in your persona. \"Guess we'll see you.\" He waves at you, smiling. Once again you're unsure of if his smile is genuine and friendly, or if he thinks he 'won' this interaction.\n      *goto Q3\n    #\"He's been carried by a good team. I'm the real deal.\"\n      His eyes widen \"Really?\" he remarks in a clearly sarcastic manner before laughing.\n      *goto Q3\n    #\"It is what it is though, right,\" followed with a shrug.\n      \"Can't control our destiny, I guess,\" he says in a way that matched the tone you spoke in.\n      *goto Q3\n    #I don't say anything.\n      He slowly starts to grin, and after a few seconds just starts to laugh. Not just that, but he's loud enough to get a few onlookers to glance in your direction. Luckily, they all somehow either don't recognize you two or just don't care.\n      *goto Q3\n\n*if (team = \"Hyenas\")\n  \"Your legacy?\" you respond, challenging him.\n  *line_break\n  *line_break\n  \"Yup. Now, what of your legacy?\"\n  *choice\n    #\"I think my awards speak for themselves.\"\n      \"Yeah, but so does your lack of a ring,\" he responds.\n      *goto Q3\n    #\"Does it matter?\"\n      \"Yeah, to pretty much everyone. Even the best careers last little more than a decade, but they're in history for several decades.\" his response hangs in the air for a few seconds before he continues.\n      *goto Q3\n    #\"I'm pretty established, I think.\"\n      \"Established, yes. Not legendary though. Such a shame,\" he responds.\n      *goto Q3\n    #I smirk confidently.\n      He grins back before continuing.\n      *goto Q3\n\n*label Q3  \n*line_break\n*line_break\n\"You know, I used to really look up to you,\" He says as he flips through his wallet. Not sure what he's doing, you wait for him to continue his point. \"Do you remember your first All-Star game?\"\n*line_break\n*line_break\n\"Of course,\" you respond in a tired tone, simply trying to end the conversation. You've been polite long enough, time to end this here.\n*line_break\n*line_break\n\"So do I,\" he says as he pulls a piece of fancy cardboard out of his wallet, that you instantly recognize as a collectable football card. He shows you the front of it, and you see that it's your rookie card, signed by you.\n*line_break\n*line_break\nYou let out a slightly curious \"Oh,\" before letting him continue.\n*line_break\n*line_break\n\"I was just a teenager, so it was super exciting to meet you,\" he says with a smile that displays genuine nostalgia. \"You're a good guy, and I wasn't disappointed.\" His face then switches to show some disappointment before he finishes with \"I'm just disappointed in the lack of championships you won.\" He pauses, and you're not sure if he's saying it in a sympathetic way, a disappointed way, or a mocking way. How do you respond?\n*fake_choice\n  #\"Well, if it means so much to you, you can help me win one\".\n    \"Funny, I'm not throwing any game, though,\" he responds.\n  #\"Trust me, I can get one\"\n    \"If you say so,\" he says.\n  #Say nothing\n    After seeing you won't respond, he lets it go.\n\n\"Well, see ya this weekend,\" he says in a slightly friendly, slightly competitive tone before putting the card back in his wallet and continuing to go wherever he was off to before he bumped into you. Happy to have this conversation over with, you head back to your hotel room. A few minutes later, a member of the hotel staff comes by to fix the lamp.\n\n*label end\n*line_break\n*line_break\nTime for the next game to start. This is going to be a unique one since its a game where you get to face the man you just spoke with. It'll be interesting to see if what happened here today is going to affect anything.\n*page_break\n*goto_scene Game_play", "week_8": "You wake up mid-week in a daze. You feel disorientated, and your head is pounding. \"That's odd,\" you think to yourself. You don't remember being hit hard enough in the head the previous day in practice to cause this pain. But, then it occurs to you that if you were hit in the head that hard, you likely wouldn't remember the hit anyway.\n*line_break\n*line_break\nYou chuckle to yourself in realization, and then the realization hits you that this could be very serious. You feel as if you're about to throw up, and slowly stumble towards a toilet, reaching it just in time to hurl without making a mess all over the floor. You calm yourself down, and try to remember the previous day.\n*line_break\n*line_break\nPictures slowly start to play in your head. Yes, the SAM linebacker on your team broke his block when running drills in practice and hit you. You get caught in a cycle of rage before pulling yourself together. You replay the hit in your mind several times, and then notice that hit didn't strike you in the head, so something else was at play.\n*line_break\n*line_break\nA second flashback plays in your mind. You tried to scramble and foolishly thought you could break a tackle from the team's biggest defensive tackle. Was that the hit that caused this? No, it couldn't be, that also wasn't a hit to the head.\n*line_break\n*line_break\nYou try to think back to each hit, and there was none that could have caused it. Nothing that was out of line for practice, nothing in the head. Then how could you possibly have a concussion? You then notice you're sweating buckets. After a few minutes of vomiting, you seem to have cleared your stomach, so you get up and search for your painkillers.\n*line_break\n*line_break\nAfter stumbling around for a while you find the container. You open it and try to shake the pills into your hand, but get nothing. \"That's strange,\" you say to yourself. You then notice an increasingly bad itch on the back of your neck, and involuntarily begin to start scratching it. Then it finally hits you.\n*line_break\n*line_break\n\"CRAP!\" you yell. You must have overdosed last night. You're now taking ${Painkiller_Addiction} pills per day, and as your memory comes back, you remember taking more than double that. The fuzziness of morning memory is going away, and you're clearly remembering popping in pills without a second thought last night. You vaguely remember having trouble falling asleep, and knowing that the pills were having reduced effects, so you scarfed down the rest of the container. You could run to the pharmacy to get more to hold you over, but it'll enable your addiction. Also, you could be seen by the public.\n*choice\n  #I run off to the pharmacy to get more.\n    *goto pharmacy\n  #I use this as an opportunity to try and resist the addiction. \n    *goto resist\n\n*label pharmacy\nYou run to the pharmacy in an emergency. Hoping to simply go in and out in a few minutes, you walk straight to where the painkillers are. You usually have a prescription specifically for you, so shopping for them is unusual. Not knowing the names or qualities of the consumer brands, and being rich enough to afford the minuscule difference, you grab the most expensive ones. Thinking you're about to scoot out without being noticed, the cashier, a young woman who appears bored with her job, perks up when she sees you're the customer. \"Are you ${first_name} ${last_name}?\" she asks.\n*choice\n  #I tell her the truth. If she recognizes me and finds out I lied, I could face a lot of backlash from the public.\n    *goto truth\n  #No, I lie and say she must have me confused with someone else. I don't want fans to know I'm on painkillers.\n    *goto lie\n\n*label truth\n\"That's so cool!\" she says excitedly. \"Can I get an autograph and a selfie please?\"\n*choice\n  #Of course!\n    It takes about a minute and everyone in line seems to get impatient, wondering what's taking so long. Then someone recognizes you and also asks for an autograph and photo.\n    *goto crowd\n  #I'll make you a deal. Make this quick don't let anyone know why I was here, and I'll say yes.\n    It's over in less than a minute. However, you do succumb to more painkiller addiction.\n    *set Painkiller_Addiction +1\n    *goto end\n  #Sorry, I can't. I'm in a hurry.\n    She gets upset, but you see no backlash. Lucky. However, you do succumb to more painkiller addiction.\n    *set Painkiller_Addiction +1\n    *goto end\n\n*label crowd\n*choice\n  #I submit.\n    You entertain the crowd for a good ten minutes before getting to go. However, you do succumb to more painkiller addiction, and the pain you're in is clearly bothering you.\n    *set Painkiller_Addiction +1\n    *goto end\n  #I say sorry and leave quickly.\n    They get upset, but you see no backlash. Lucky. However, you do succumb to more painkiller addiction.\n    *set Painkiller_Addiction +1\n    *goto end\n\n*label lie\n\n*temp lie 1\n*rand lie 1 2\n\n*if (lie = \"1\")\n  \"Oh, sorry, you just looked a lot like ${him},\" she says in a somewhat disappointed voice\n  *line_break\n  \"I get that a lot,\" you say smiling to spare her feelings. You make your way out, but you do succumb to more painkiller addiction.\n  *set Painkiller_Addiction +1\n  *goto end\n*else\n  \"Really?\" She says in a tone that indicates she can see through your lie. Not knowing how to respond, you're able to get out of there so that she can't speak with you. You get out of there, but you do succumb to more painkiller addiction.\n  *set Painkiller_Addiction +1\n  *goto end\n  \n\n\n\n*label resist\n\nYou try to distract yourself with something else. What do you do?\n*fake_choice\n  #Use electronic entertainment (video games, TV, movies, etc.)\n    You've barely started and are starting to deal with withdrawal symptoms.\n  #Talk to a friend on the phone.\n    They don't pick up.\n  #Light workouts that won't hurt or injure me.\n    You last less than five minutes before suffering withdrawal symptoms.\n  #Reach out to ${SO_name}.\n    They don't pick up.\n  #Go back to sleep.\n    You lie down for less than 5 minutes before suffering withdrawal symptoms.\n\nYou continue to try to distract as you start to feel more and more pain. What do you do?\n*choice\n  #Phone up the team's medical staff. I can't hide this anymore, and they'll know what to do.\n    *goto doctor\n  #Cave and go to the pharmacy to get more painkillers anyway.\n    *goto pharmacy\n\n*label doctor\nThe team's doctor says that they can help you reduce the painkiller intake and make up a fake injury to let the team save face publicly, but you would miss the next game. Do you do this?\n*choice\n  #Yes, I need to get this sorted out.\n    You are given exercises that allow you to heavily reduce your dependency. You do miss the next game though due to heavy pain.\n    *set Painkiller_Addiction -4\n    *set week +1\n    *goto_scene season\n  #No, I've gotta play this week. Gimme the painkillers.\n    Alright, your addiction continues. At least you get to play in the next game, though.\n    *set Painkiller_Addiction +1\n    *goto end\n\n\n*label end\nTime for the next game to start.\n*page_break\n*goto_scene Game_play", "week_9": "You're called in for interviews with several television channels. You go with one based on an impulse since you had very little time to research most of them. However, nothing could have prepared you for what was going on.\n*line_break\n*line_break\nAfter you get there, the camera operators and journalists give you the traditional preamble and are polite. The light shines on you, and for a few seconds, you're reminded that you're a star. However, once the interview starts, it feels like a slap in the face.\n*line_break\n*line_break\n\"What do you have to say about your painkiller addiction?\" the interviewer asks brashly.\n*line_break\n*line_break\n\"How do they know about that?\" you think to yourself. There's no time to think about the mental gymnastics of it though. You have to just answer the question.\n*choice\n  #Nothing. I'm not addicted to painkillers.\n    *goto lie\n  #That's something I've been trying to deal with recently.\n    *goto honest\n  # It's nothing to worry about. It's just how I deal with things.\n    *goto dodge\n  *selectable_if (Painkiller_Addiction = 0) #I've dealt with it.\n    You're able to get out of the interview without navigating anything else.\n    *goto end\n\n*label lie\n\"According to Twitter, it's a big story under the hashtag '#coveringthepainoflosing',\" replies one of the journalists.\n*line_break \n*line_break\nNot sure if this is true, but you can feel a few drops of sweat on your forehead. You don't use Twitter, so this feels random to you.\n*line_break\n*line_break\n\"I don't know what you're talking about,\" you reply, hoping to get them off your tail.\n*line_break\n*line_break\nAnother journalist grabs his phone and starts reading off random tweets. This gives no context as to how people found out, but the information is accurate. Well, most of it is. It is something that you realize you need to address though. This interview could be turned into a chance to control the narrative, though.\n*line_break\n*line_break\nWhich way do you want to take the conversation?\n*choice\n  #I continue to deny the allegations.\n    Your claims are easily debunked, and you look silly in the eyes of the public.\n    *set Fans %- 10\n    *set Media %- 5\n    *goto end\n  #I admit it's a problem, but claim to be doing my best to quench it.\n    The media divides into two factions. One is set to destroy your reputation as before, but the other is set to highlight your recovery as an inspirational story. Either way, they're happy to have a story.\n    *set Fans %- 5\n    *set Media %+ 10\n    *goto end\n  #I try to justify my addiction.\n    Your back peddling makes you look silly, and people feel like there's something wrong with you.\n    *set Fans %- 5\n    *set Media %- 5\n    *goto end\n\n\n*label honest\n\"Deal with?\" a journalist asks as if waiting for you to take a cue as to details.\n*line_break\n*line_break\nYou take a second to respond before talking about the therapy you've been to and how it helped you. You understand what you did was wrong and you've been working to improve.\n*line_break\n*line_break\nYou feel some journalists furiously writing. You wait until the next day to see what happens. The media divides into two factions. One is set to destroy your reputation as before, but the other is set to highlight your recovery as an inspirational story. Either way, they're happy to have a story.\n*set Fans %- 5\n*set Media %+ 10\n*goto end\n\n*label dodge\n\"What do you mean 'just how you deal with things?'\" asks a journalist.\n*line_break\n*choice\n  #How I deal with the pain of injuries.\n    The media is able to spin it into you being a drug addict. Yeah, not good.\n    *set Fans %- 15\n    *goto end\n  #If it wasn't for this, I'd have had to retire years ago.\n    You're made into a laughing stock in front of the media.\n    *set Fans %- 15\n    *goto end\n  #Everyone does this.\n    While its true that lots of players take painkillers, it's something that's not supposed to be said publicly. You face backlash from other players and the league.\n    *set Team %- 5\n    *set Coach %- 5\n    *goto end\n\n\n*label end\n*line_break\n*line_break\nTime for the next game to start.\n*page_break\n*goto_scene Game_play"}};
