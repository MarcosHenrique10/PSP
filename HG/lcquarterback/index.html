\n*temp savesys_var_86 \"half_17\"\n*temp savesys_var_87 \"half_18\"\n*temp savesys_var_88 \"half_19\"\n*temp savesys_var_89 \"half_20\"\n*temp savesys_var_90 \"He\"\n*temp savesys_var_91 \"Him\"\n*temp savesys_var_92 \"His\"\n*temp savesys_var_93 \"them\"\n*temp savesys_var_94 \"their\"\n*temp savesys_var_95 \"they\"\n*temp savesys_var_96 \"Rushing_TDs\" \n*return\n\n\n===========================================================\n*finish\n\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*set first_name \"Jim\"\n*set last_name \"Jones\"\n*set jersey_number 1\n*set Long_Pass 60\n*set Medium_Pass 55\n*set Short_Pass 45\n*set Speed 50\n*set Awareness 60\n*set Composure 40\n*set Leadership 50\n*set Professionalism 52\n*set Fame 51\n*set Optimism 45 \n*set Openness 56\n*set Confidence 49\n*set SO 50\n*set Family 53\n*set Fans 54\n*set Media 46\n*set Coach 49\n*set Team 51\n*set Passing_Yards 146\n*set Passing_Attempts 26\n*set Passes_Completed 18\n*set Passing_TDs 2\n*set Interceptions 1\n*set Rushing_Yards 16\n*set Rushing_Attempts 3\n*set Rushing_TDs 0\n*set Times_Sacked 1\n\n*script changeBackgroundColor(\"sepia\")\n4th Quarter\n*line_break\nTime Remaining: 1:52 Timeouts remaining: 3\n*line_break\nScoreboard:\n*line_break\nDogs: 27\n*line_break\nHyenas: 30\n*line_break\n3rd Down and 6.\n*line_break\nLine of scrimmage: Own 45\n*line_break\nYour first receiver runs a hook route 13 yards out. You can't tell how well he is being covered.\n*line_break\nYour second receiver runs a corner route 10 yards out. You can't tell how well he is being covered.\n*line_break\nYour running back runs a corner route 4 yards out. He is being covered very well.\n*line_break\nYour fullback runs an out route 2 yards out. He is wide open.\n*line_break\nYour tight end runs an in route 9 yards out. He is being covered decently.\n\nWho do you pass to?\n*fake_choice\n  #My first receiver.\n  #My second receiver.\n  #My running back.\n  #My fullback.\n  #My tight end.\n  #I hold on to the ball.\n  #I scramble for yardage.\n\n*set first_name \"Jeff\"\n*set last_name \"Stien\"\n*set jersey_number 15\n*set Long_Pass 63\n*set Medium_Pass 51\n*set Short_Pass 42\n*set Speed 51\n*set Awareness 40\n*set Composure 60\n*set Leadership 40\n*set Professionalism 55\n*set Fame 52\n*set Optimism 46 \n*set Openness 57\n*set Confidence 59\n*set SO 51\n*set Family 63\n*set Fans 50\n*set Media 41\n*set Coach 42\n*set Team 50\n*set Passing_Yards 201\n*set Passing_Attempts 30\n*set Passes_Completed 21\n*set Passing_TDs 1\n*set Interceptions 1\n*set Rushing_Yards 21\n*set Rushing_Attempts 5\n*set Rushing_TDs 1\n*set Times_Sacked 1\n\n*script changeBackgroundColor(\"black\")\n4th Quarter\n*line_break\nTime Remaining: :21 Timeouts remaining: 0\n*line_break\nScoreboard:\n*line_break\nDogs: 14\n*line_break\nHyenas: 18\n*line_break\n3rd Down and Goal.\n*line_break\nLine of scrimmage: Opponent's 5\n*line_break\nYour first receiver runs a post route 5 yards out. You can't tell how well he is being covered.\n*line_break\nYour second receiver runs a hook route 10 yards out. You can't tell how well he is being covered.\n*line_break\nYour running back runs a in route 1 yard out. He is being covered very well.\n*line_break\nYour fullback runs an corner route 2 yards out. He is wide open.\n*line_break\nYour tight end runs an in route 6 yards out. He is being covered decently.\n\nWho do you pass to?\n*fake_choice\n  #My first receiver.\n  #My second receiver.\n  #My running back.\n  #My fullback.\n  #My tight end.\n  #I hold on to the ball.\n  #I scramble for yardage.\n\n*set first_name \"Quinn\"\n*set last_name \"Ricks\"\n*set jersey_number 21\n*set Long_Pass 45\n*set Medium_Pass 55\n*set Short_Pass 61\n*set Speed 58\n*set Awareness 51\n*set Composure 49\n*set Leadership 56\n*set Professionalism 43\n*set Fame 55\n*set Optimism 48\n*set Openness 58\n*set Confidence 69\n*set SO 56\n*set Family 61\n*set Fans 52\n*set Media 46\n*set Coach 52\n*set Team 46\n*set Passing_Yards 2010\n*set Passing_Attempts 300\n*set Passes_Completed 222\n*set Passing_TDs 19\n*set Interceptions 10\n*set Rushing_Yards 195\n*set Rushing_Attempts 56\n*set Rushing_TDs 7\n*set Times_Sacked 15\n\n*script changeBackgroundColor(\"sepia\")\nOne of the reporters opens by asking you a question. You currently have 6 wins going into week 11. It's expected that your team will need 9 wins to make the playoffs. Do you think you can make it?\n\n*fake_choice\n  #I know that at this moment, things look bad, but I think we can make it.\n  #It's not going to be easy. It's never easy in this league. However, I know that the team we have is capable of it.\n  #Of course, we can, if we keep up what we've been doing.\n  #Sadly, I don't think we can make it.\n  #We've pretty much made it at this point.\n  #It's important to not start to overthink things like this. We're just trying to take it one game at a time.\n\n*set first_name \"Jordan\"\n*set last_name \"Love\"\n*set jersey_number 13\n*set Long_Pass 48\n*set Medium_Pass 51\n*set Short_Pass 49\n*set Speed 70\n*set Awareness 48\n*set Composure 45\n*set Leadership 51\n*set Professionalism 49\n*set Fame 51\n*set Optimism 49\n*set Openness 56\n*set Confidence 65\n*set SO 62\n*set Family 64\n*set Fans 47\n*set Media 47\n*set Coach 51\n*set Team 49\n*set Passing_Yards 2230\n*set Passing_Attempts 318\n*set Passes_Completed 224\n*set Passing_TDs 18\n*set Interceptions 12\n*set Rushing_Yards 612\n*set Rushing_Attempts 98\n*set Rushing_TDs 11\n*set Times_Sacked 19\n\n\nThe conference begins and one of the reporters asks you \"What are your chances of making the playoffs this year?\"\n*fake_choice\n  #\"Playoffs?! Seriously!? Playoffs? We can barely even win a game!\"\n  #\"I'm not really focused on our chances, I'm just trying to take this one game at a time.\"\n  #\"I'm hoping we can go in with some momentum.\"\n  #\"They're great!\"\n\n\n*set first_name \"Taylor\"\n*set last_name \"Steele\"\n*set jersey_number 12\n*set Long_Pass 55\n*set Medium_Pass 56\n*set Short_Pass 49\n*set Speed 52\n*set Awareness 52\n*set Composure 58\n*set Leadership 52\n*set Professionalism 56\n*set Fame 56\n*set Optimism 42\n*set Openness 49\n*set Confidence 57\n*set SO 47\n*set Family 57\n*set Fans 49\n*set Media 57\n*set Coach 50\n*set Team 51\n*set Passing_Yards 0\n*set Passing_Attempts 0\n*set Passes_Completed 0\n*set Passing_TDs 0\n*set Interceptions 0\n*set Rushing_Yards 0\n*set Rushing_Attempts 0\n*set Rushing_TDs 0\n*set Times_Sacked 0\n\n\nThe day before the first game of the season, your team has a public appearance to make. You know from experience that this type of thing will be happening once or twice per week for the entire season. How do you feel about this?\n*fake_choice\n  #It sounds like a lot of work. I have my career to focus on, and I don't want to deal with distractions every week.\n  #It sounds great. If it was just football 24/7, I'd probably have gotten sick of it already.\n  #I'm kind of in the middle on this. I see both sides.\n  #I'm so lucky to play the game I love for so much money. It's my responsibility to give back.\n  #I hate having to 'give back' to the communities. My life's not as great as it seems, and there's so many people with more who give nothing back.\n  #I really don't have that strong an opinion. It's just part of the job.\n  #It's a lot more complicated than any of this.\n\n", "season": "*label practice_stats\n*if (Painkiller_Addiction = 0)\n  *check_achievements\n  *if not(choice_achieved_painkiller)\n    *achieve painkiller\n*gosub_scene savesys save 1 \n\n*temp fall 1\n*rand fall 1 6\n*if (fall = 1)\n  Your ability to throw long passes goes down ever so slightly due to aging this week.\n  *set Long_pass -1\n  *goto increase\n*if (fall = 2)\n  Your ability to throw medium passes goes down ever so slightly due to aging this week.\n  *set Medium_pass -1\n  *goto increase\n*if (fall = 3)\n  Your ability to throw short passes goes down ever so slightly due to aging this week.\n  *set Short_pass -1\n  *goto increase\n*if (fall = 4)\n  Your speed goes down ever so slightly due to aging this week.\n  *set Speed -1\n  *goto increase\n*if (fall = 5)\n  Your awareness goes down ever so slightly due to aging this week.\n  *set Awareness -1\n  *goto increase\n*if (fall = 6)\n  Your composure goes down ever so slightly due to aging this week.\n  *set Composure -1\n  *goto increase\n\n*label increase\nWhat skill would you like to train this week?\n*choice\n  #Long passing\n    *set Long_pass +1\n    *goto start\n  #Medium passing\n    *set Medium_pass +1\n    *goto start\n  #Short passing\n    *set Short_pass +1\n    *goto start\n  #Speed\n    *set Speed +1\n    *goto start\n  #Awareness\n    *set Awareness +1\n    *goto start\n  #Composure\n    *set Composure +1\n    *goto start\n\n\n*label start\n\n*if (super = \"false\")\n  Would you like to set yourself to becoming a \"super player\"? This can be done between games for an easier experience and is reversible.\n  *choice\n    #Yes. I would like an easier experience.\n      *set Long_pass +10\n      *set Medium_pass +10\n      *set Short_pass +10\n      *set Speed +10\n      *set Awareness +10\n      *set Composure +10\n      *set super \"true\"\n      *goto events\n    #No thanks. I enjoy the challenge.\n      *goto events\n\n*else\n  Would you like to turn off super player mode? This can be done between games for a more challenging experience and is reversible.\n  *choice\n    #Yes. I would like a more challenging experience.\n      *set Long_pass -10\n      *set Medium_pass -10\n      *set Short_pass -10\n      *set Speed -10\n      *set Awareness -10\n      *set Composure -10\n      *set super \"false\"\n      *goto events\n    #No thanks. I enjoy the challenge.\n      *goto events\n\n*label events\n*temp event 1\n*rand event 1 25\n*if (event = 1)\n  *if (Situation_1 = \"unavaliable\")\n    *goto events\n  *else\n    You come home and hear that ${SO_name} is having an argument on the phone, with ${their} voice raised. Curious, you slowly walk up to them to hear what they're saying...and to who. \"Can you just please leave the two of us alone! I'm ${His} family to!\" You can right away tell that ${SO_name} is talking about you, to your mother. There's a pause, as you imagine that your mom getting pretty mad. ${SO_name} turns around and puts ${their} finger up to indicate 'wait a minute' before turning ${their} attention back to the conversation.\n    *line_break\n    \"I know that, but ${he} chose to be with me now,\" ${SO_name} says into the phone.\n    *line_break\n    \"YOU'RE NOT PART OF THE FAMILY YET!!!\" you hear your mother scream from the other.\n    *line_break\n    \"YET!\" ${SO_name} responds. 'Oh boy,' you think to yourself, knowing where this is going. \n    *line_break\n    \"I don't want to deal with this right now,\" you whisper to yourself, hoping that ${SO_name} doesn't hear you. Luckily, ${they} didn't as they were paying to much attention to the thing you wished wasn't happening. Weird how it works out, sometimes.\n    *line_break\n    \"Don't tell us how to handle our own relationship!\" ${SO_name} says into the phone, once again leading to a pause. \"Listen, I'll put the phone on speaker, and have ${Him} speak. ${He}'ll  be on my side,\" ${SO_name} says.\n    *line_break\n    \"Oh, you wish,\" you can hear your mother say now that speakerphone is on. ${SO_name} places the phone on the table, and indicates that it's time for you to make a choice. What do you say, knowing both can hear everything you say.\n    *choice\n      #\"Listen, can I just have a few minutes?\"\n        You're able to buy yourself a few minutes, but are unable to think of something that makes both parties happy. Eventually, the two are still mad, but mostly at each other.\n        *set Situation_1 \"unavaliable\"\n        *goto next\n      #\"It's complicated. Can everyone just calm down for a minute?\"\n        Both of them now team up on you, thinking that you're calling their feelings 'unreasonable'.\n        *set Family %- 5\n        *set SO %- 5\n        *set Situation_1 \"unavaliable\"\n        *goto next\n      #\"Mom listen, I love you, but can youlet me live my own life?\"\n        Your moms is a little upset, but ${SO_name} is thrilled that you picked ${their} side.\n        *set Family %- 5\n        *set SO %+ 5\n        *set Situation_1 \"unavaliable\"\n        *goto next\n      #\"${SO_name}, I want to be with you, but this is my mother.\"\n        Your moms thrilled, but ${SO_name} is pretty upset.\n        *set Family %- 5\n        *set SO %+ 5\n        *set Situation_1 \"unavaliable\"\n        *goto next\n\n*if (event = 2)\n  *if (Situation_2 = \"unavaliable\")\n    *goto events\n  *else\n    You decide to brave the crowds in order to grab groceries. How do you feel about people possibly approaching you?\n    *choice\n      #I love the attention.\n        *set Fame %+ 10\n        *set Optimism %+ 10\n        *goto 2_2\n      #I love a little bit of it, but it gets annoying after too long. \n        *set Fame %+ 5\n        *set Optimism %+ 5\n        *goto 2_2\n      #I'm pretty neutral on it.\n        *goto 2_2\n      #I'm okay with having a few people ask for an autograph or something, but I hate crowds.\n        *set Fame %- 5\n        *set Optimism %- 5\n        *goto 2_2\n      #I have to talk with people. Ewwwwww... \n        *set Fame %- 10\n        *set Optimism %- 10\n        *goto 2_2\n    *label 2_2\n    You decide to dress in sunglasses and some subtle facepaint just so that you can get out of there without spending several hours. You promised ${SO_name} that you would spend time with them when they left work, so you're on a bit of a schedule. When you're in the grocery store, surprisingly your disguise works and nothing happens. However, you also decide to stop for gas, hoping to keep it going. The clerk recognizes you, and asks for an autograph and a photo. What do you do?\n    *choice\n      #I give it to him. Its a pretty reasonable request.\n        *set Fans %+ 5\n        Luckily, he keeps his word, and you're done within 2 minutes. \n        *set Situation_2 \"unavaliable\"\n        *goto next\n      #No, sorry. I'm in a hurry.\n        *set Fans %+ 5\n        Seems like a bit of a misplay, as he's noticably disapointed.\n        *set Situation_2 \"unavaliable\"\n        *goto next\n\n*if (event = 3)\n  *if (Situation_3 = \"unavaliable\")\n    *goto events\n  *else\n    During practice, there's an argument between your coach and one of the rookie linebackers on the team. The rookie seems like his confidence is taking a bit of a hit as his shoulders and hunched over more and more. You can't hear what they're talking about though since it's half way across the field. Do you go over to see what's going on?\n    *choice\n      #Yeah, I'm kind of curous.\n        *goto 2_3\n      #No. This is none of my business.\n        You choose not to do anything.\n        *set Situation_3 \"unavaliable\"\n        *goto next\n\n    *label 2_3\n    You approach them down the field. Nono of your teammates seem to be paying attention to you, as they're either too engaged in what they're doing or otherwise distracted. When you reach them, it deals with your teammate's lazy attitude that carried over from college. Do you interject?\n    *choice\n      #Yes. I take my teammate's side. The coach is probably making a mountain out of a molehill.\n        The player appreciates your support, but the coach is noticably shaken than you challenged his authority.\n        *set Coach %- 5\n        *set Team %+ 5\n        *set Situation_3 \"unavaliable\"\n        *goto next\n      #Yes. I take the coach's side. This is literally my teammate's job, laziness will not be tolerated.\n        The player feels even worse, but the coach is happy that you took his side.\n        *set Coach %- 5\n        *set Team %+ 5\n        *set Situation_3 \"unavaliable\"\n        *goto next\n      #No. I don't know enough about my teammate's habits to make a judgement.\n        You walk away and nobody notices.\n        *set Situation_3 \"unavaliable\"\n        *goto next\n\n*if (event = 4)\n  *if (Situation_4 = \"unavaliable\")\n    *goto events\n  *else\n    You are able to somehow get a moment alone at home. You're overcome with thoughts about your future. How do you feel about retirement?\n    *choice\n      #Its a great chance to finally unwind and enjoy life.\n        *set Optimism %+ 10\n        *goto 2_4\n      #I feel terrible about not being able to add to my legacy anymore.\n        *set Optimism %- 10\n        *goto 2_4\n      #I have mixed feeling about it.\n        *goto 2_4\n    *label 2_4\n    How do you feel about the media following you everywhere?\n    *choice\n      #It was great at first, but now its getting annoying.\n        *goto 3_4\n      #It was annoying at first, but I've learned how to enjoy it.\n        *goto 3_4\n      #I've always loved it.\n        *set Optimism %+ 10\n        *goto 3_4\n      #I've always hated it.\n        *set Optimism %- 10\n        *goto 3_4\n      #I have mixed feelings about it.\n        *goto 3_4\n    *label 3_4\n    How about your coach?\n    *choice\n      #I feel great about him.\n        *set Optimism %+ 5\n        *set Coach %+ 5\n        *goto 4_4\n      #I feel terrible about him.\n        *set Optimism %- 5\n        *set Coach %- 5\n        *goto 4_4\n      #Somewhere in between.\n        *goto 4_4\n    *label 4_4\n    How about your teammates?\n    *choice\n      #I feel great about them.\n        *set Optimism %+ 5\n        *set Team %+ 5\n        *goto 5_4\n      #I feel terrible about Team.\n        *set Optimism %- 5\n        *set Team %- 5\n        *goto 5_4\n      #Somewhere in between.\n        *goto 5_4\n    *label 5_4\n    And about fame in general?\n    *choice\n      #I love it.\n        *set Fame %+ 5\n        *set Optimism %+ 5\n        *set Situation_4 \"unavaliable\"\n        *goto next\n      #I hate it.\n        *set Fame %- 5\n        *set Optimism %- 5\n        *set Situation_4 \"unavaliable\"\n        *goto next\n      #It has its pros and cons.  \n        *set Situation_4 \"unavaliable\"\n        *goto next\n\n*if (event = 5)\n  *if (Situation_5 = \"unavaliable\")\n    *goto events\n  *else\n    You're not that surprised to learn that your coach is talking to the media today. This is something that happens a lot. The thing that catches you off guard is the fact that he's talking about you to everyone during the interview. What makes it stranger is that it's not just one or two questions, you're the focus of the conversation.\n    *line_break\n    *if (Coach > 65)\n      He stays postive about you. You were expecting him to be nice for the sake of professionalism since its an interview in front of the media, but he got very specific and you actually kind of feel almost embaressed.\n      *set Fans %+ 10\n      *set Situation_5 \"unavaliable\"\n      *goto next\n    *if (Coach > 55)\n      He stays mostly positive. You were expecting him to be nice since he's in a professional interview and would want to give nice but vague answers, but he's more positive than you expect.\n      *set Fans %+ 5\n      *set Situation_5 \"unavaliable\"\n      *goto next\n    *if (Coach > 45)\n      He stays positive, but it seems as if he's being professional. You're not able to tell his real opinion.\n      *set Situation_5 \"unavaliable\"\n      *goto next\n    *if (Coach > 35)\n      He's able to stay professional, but you're able to read between the lines and tell that your relationship with him isn't exactly the best.\n      *set Fans %- 5\n      *set Situation_5 \"unavaliable\"\n      *goto next\n    *else\n      He's barely able to be professional despite the fact that he's in front of several cameras. \n      *set Fans %- 10\n      *set Situation_5 \"unavaliable\"\n      *goto next\n\n*if (event = 6)\n  *if (Situation_6 = \"unavaliable\")\n    *goto events\n  *else\n    You hear from the star receiver from your team that he's being interviewed by the media later this week, so you decide to watch. When it comes on, the thing that catches you off guard is the fact that he's being asked about you to everyone during the interview. What makes it stranger is that it's not just one or two questions, you're the focus of the conversation.\n    *line_break\n    *if (Team > 65)\n      He stays postive about you. In fact, he describes your leadership skills and how its such a privelidge to catch passes from someone who's places the ball right where he wants it.\n      *set Fans %+ 10\n      *set Situation_6 \"unavaliable\"\n      *goto next\n    *if (Team > 55)\n      He stays mostly positive. You were expecting him to be nice since he's one of your teammates and being nice is the only way to save professionalism, but he's more positive than you expect.\n      *set Fans %+ 5\n      *set Situation_6 \"unavaliable\"\n      *goto next\n    *if (Team > 45)\n      He stays positive, but it seems as if he's doing so to be professional. You're can't tell his real opinion on you, but luckily nobody else can.\n      *set Situation_6 \"unavaliable\"\n      *goto next\n    *if (Team > 35)\n      He's able to stay professional, but you're able to read between the lines and tell that your relationship with him isn't exactly the best.\n      *set Fans %- 5\n      *set Situation_6 \"unavaliable\"\n      *goto next\n    *else\n      He's barely able to be professional despite the fact that he's in front of several cameras, and talking about a teammate. Seems you need to look into your connection with him.\n      *set Fans %- 10\n      *set Situation_6 \"unavaliable\"\n      *goto next\n\n\n*if (event = 7)\n  *if (Situation_7 = \"unavaliable\")\n    *goto events\n  *else\n    The media is doing some \"man on the street\" interviews with random fans about you.\n    *line_break\n    *if (Fans > 65)\n      The fans almost endlessly raise both your talent and you attitude. Looks like their love for you is starting to rub off on the media.\n      *set Media %+ 10\n      *set Situation_7 \"unavaliable\"\n      *goto next\n    *if (Fans > 55)\n      Although there's a few who say negative things about you, most of what they say is positive. Seems as if they have a positive impression of you.\n      *set Media %+ 5\n      *set Situation_7 \"unavaliable\"\n      *goto next\n    *if (Fans > 45)\n      The fans have a mixed reaction towards you.\n      *set Situation_7 \"unavaliable\"\n      *goto next\n    *if (Fans > 35)\n      Although there are some positive things said about you, most of the fans seem to be favouring negative. You're wondering what you did wrong.\n      *set Media %- 5\n      *set Situation_7 \"unavaliable\"\n      *goto next\n    *else\n      You're shocked at how badly the fans see you, and wonder if this will make your relationship with the media worse.\n      *set Media %- 10\n      *set Situation_7 \"unavaliable\"\n      *goto next\n\n\n*if (event = 8)\n  *if (Situation_8 = \"unavaliable\")\n    *goto events\n  *else\n    You're surprised to learn from your sister that ${SO_name} has created a blog dedicated to what it's like to be in a relationship to you. You wonder if this was brand new, and your sister says it is, there's only one post so far.\n    *line_break\n    *if (SO > 65)\n      ${SO_name} is excited to be in a relationship with you. ${SO_name} loves you so much and this blog being put out to the public, while a bit of an invasion of privacy does make people think more highly of you.\n      *set Fans %+ 10\n      *set Situation_8 \"unavaliable\"\n      *goto 8b\n    *if (SO > 55)\n      The blog is mostly positive, and focuses mostly on positive stuff, but you feel a bit weird about how much personal information is revealed about you.\n      *set Fans %+ 5\n      *set Situation_8 \"unavaliable\"\n      *goto 8b\n    *if (SO > 45)\n      The blog doesn't seem to have much of an effect on the public perception of you. You're not quite comfortable with the invasion of privacy, but in the end there's no real damage done.\n      *set Situation_8 \"unavaliable\"\n      *goto 8b\n    *if (SO > 35)\n      They say some positive things, but that is outweighed by the negative things said. It's also a huge invasion of your privacy.\n      *set Fans %- 5\n      *set Situation_8 \"unavaliable\"\n      *goto 8b\n    *else\n      You're shocked at how badly ${SO_name} sees you and your relationship situation. Time to get to work on that.\n      *set Media %- 10\n      *set Situation_8 \"unavaliable\"\n      *goto 8b\n\n*label 8b\nHow do you feel about this blog being started, and what do you do about it?\n*choice\n  #I love the blog. It's great having the attention! I tell them that I love it.\n    *goto next\n  #I appraciate the idea, but I wish ${SO_name} had told me before. I speak with ${SO_name} in private about maintaining privacy.\n    *goto next\n  #I don't really care at all. I let it go.\n    *goto next\n  #I'm indifferent about the blog itself, but I wish I had been consulted about this. I let ${SO_name} know that they should have consulted me.\n    *goto next\n  #I have it. I should ask ${SO_name} to take it down.\n    *goto next\n\n\n*if (event = 9)\n  *if (Situation_9 = \"unavaliable\")\n    *goto events\n  *else\n    You give an inspirational speech during the middle of a practice. \n    *line_break\n    *if (Leadership > 65)\n      The speech is absolutely great due to your leadership, and your teammates look up to you a lot more after this.\n      *set Team %+ 10\n      *set Situation_9 \"unavaliable\"\n      *goto next\n    *if (Leadership > 55)\n      The speech is good due to your leadership, and your teammates look up to you a little bit more after this.\n      *set Team %+ 5\n      *set Situation_9 \"unavaliable\"\n      *goto next\n    *if (Leadership > 45)\n      The speech does its job due to your decent leadership, but doesn't exactly 'inspire' your team.\n      *set Situation_9 \"unavaliable\"\n      *goto next\n    *if (Leadership > 35)\n      Your speech is a little bit awkward due to your mediocre leadership, and your teammates notice this.\n      *set Team %- 5\n      *set Situation_9 \"unavaliable\"\n      *goto next\n    *else\n      Your speech really misses the mark, and your teammates see this as a bit of a failure due to your poor leadership.\n      *set Team %- 10\n      *set Situation_9 \"unavaliable\"\n      *goto next\n\n\n*if (event = 10)\n  *if (Situation_10 = \"unavaliable\")\n    *goto events\n  *else\n    A video of you has gone viral. Its you responding to questions in interviews during your career.\n    *line_break\n    *if (Professionalism > 65)\n      Due to how professional you are, the video is strangely boring and really only catches fire because you're a celebrity. Strange that it went viral, but hey, it goes in your favour.\n      *set Fans %+ 10\n      *set Fame %+ 5\n      *set Situation_10 \"unavaliable\"\n      *goto next\n    *if (Professionalism > 55)\n      Since you're relatively professional, the video isn't exactly exciting, but it does improve your image somewhat.\n      *set Fans %+ 5\n      *set Fame %+ 5\n      *set Situation_10 \"unavaliable\"\n      *goto next\n    *if (Professionalism > 45)\n      Since your level of professionalism is pretty average, the video doesn't really have much in it.\n      *set Situation_10 \"unavaliable\"\n      *set Fame %+ 5\n      *goto next\n    *if (Professionalism > 35)\n      Since you're not the most professional player in the world, the video is a little awkward to watch, and fan opinion of you goes down.\n      *set Fans %- 5\n      *set Fame %+ 5\n      *set Situation_10 \"unavaliable\"\n      *goto next\n    *else\n      Your professionalism is pretty poor, so the video basically becomes a cringeworthy meme and tanks public opinion on you.\n      *set Fans %- 10\n      *set Fame %+ 5\n      *set Situation_10 \"unavaliable\"\n      *goto next\n\n\n*if (event = 11)\n  *if (Situation_11 = \"unavaliable\")\n    *goto events\n  *else\n    There's a brief media report on your career that goes viral.\n    *line_break\n    *if (Media > 65)\n      Due to your solid relationship to the media, its surprisingly positive.\n      *set Fans %+ 10\n      *set Fame %+ 5\n      *set Situation_11 \"unavaliable\"\n      *goto next\n    *if (Media > 55)\n      Since you're relatively good with the media, the report is more positive than you'd think.\n      *set Fans %+ 5\n      *set Fame %+ 5\n      *set Situation_11 \"unavaliable\"\n      *goto next\n    *if (Media > 45)\n      Since your relationship with the media is pretty average, the report doesn't really have much bias in it.\n      *set Situation_11 \"unavaliable\"\n      *set Fame %+ 5\n      *goto next\n    *if (Media > 35)\n      Since you're not on the best terms with the media, the report is pretty negative.\n      *set Fans %- 5\n      *set Fame %+ 5\n      *set Situation_11 \"unavaliable\"\n      *goto next\n    *else\n      Your relationship with the media is terrible, the report mostly slams you.\n      *set Fans %- 10\n      *set Fame %+ 5\n      *set Situation_11 \"unavaliable\"\n      *goto next\n\n\n*if (event = 12)\n  *if (Situation_12 = \"unavaliable\")\n    *goto events\n  *else\n    While at practice, ${SO_name} watches you and listens to what your teammates have to say about you. \n    *line_break\n    *if (Team > 65)\n      Due to your solid relationship with your teammates, ${SO_name} actually becomes more attracted to you.\n      *set SO %+ 10\n      *set Situation_12 \"unavaliable\"\n      *goto next\n    *if (Team > 55)\n      Since you're on relatively good terms with your teammates, hearing their opinions gets ${SO_name} to like you a little more.\n      *set SO %+ 5\n      *set Situation_12 \"unavaliable\"\n      *goto next\n    *if (Team > 45)\n      Since your relationship with your teammates is pretty average, it really doesn't sway ${SO_name}'s opinion of you.\n      *set Situation_12 \"unavaliable\"\n      *goto next\n    *if (Team > 35)\n      Since you're not on the best terms with your team, the conversation is pretty negative.\n      *set SO %- 5\n      *set Situation_12 \"unavaliable\"\n      *goto next\n    *else\n      Your relationship with your teammates is terrible, they spend most of the conversation mostly slamming you.\n      *set SO %- 10\n      *set Situation_12 \"unavaliable\"\n      *goto next\n\n\n*if (event = 13)\n  *if (Situation_13 = \"unavaliable\")\n    *goto events\n  *else\n    While at practice, ${SO_name} watches you and talks to your teammates about you. \n    *line_break\n    *if (SO > 65)\n      ${SO_name} says almost exclusively great things about you, improving your relationship with your teammates.\n      *set Team %+ 10\n      *set Situation_13 \"unavaliable\"\n      *goto next\n    *if (SO > 55)\n      ${SO_name} says a lot of good things about you, slightly improving your relationship with your teammates.\n      *set Team %+ 5\n      *set Situation_13 \"unavaliable\"\n      *goto next\n    *if (SO > 45)\n      ${SO_name} is pretty neutral towards you during the conversation.\n      *set Situation_13 \"unavaliable\"\n      *goto next\n    *if (SO > 35)\n      Since your relationship with ${SO_name} isn't at its best, they spend most of the time saying slightly negative things about you.\n      *set Team %- 5\n      *set Situation_13 \"unavaliable\"\n      *goto next\n    *else\n      Your relationship with ${SO_name} is terrible, they spend most of the conversation mostly slamming you.\n      *set Team %- 10\n      *set Situation_13 \"unavaliable\"\n      *goto next\n\n*if (event = 14)\n  *if (Situation_14 = \"unavaliable\")\n    *goto events\n  *else\n    The coach is ready to declare a new team captain for the rest of the season. Do you put your name forward?\n    *choice\n      #Yes\n        *goto captain\n      #No\n        One of the defensive linemen who's been on the team for over a decade gets the position.\n        *goto next\n    *label captain\n    *if (Coach > 65)\n      Your coach makes you the new captain. Congrats! Looks like your great relationship with him paid of drastically.\n      *set Leadership %+ 10\n      *set Situation_14 \"unavaliable\"\n      *goto next\n    *if (Coach > 55)\n      Your coach makes you the alternate captain, since one of the defensive linemen on the team has shown to be a great leader. Looks like this is your reward for being worthy of his trust.\n      *set Leadership %+ 5\n      *set Situation_14 \"unavaliable\"\n      *goto next\n    *if (Coach > 45)\n      Your coach makes you the third captain, since you have so much experience and no red flags. You feel you could have impressed him more, but at least you got something, right?\n      *set Situation_14 \"unavaliable\"\n      *goto next\n    *if (Coach > 35)\n      After a lot of thought, your coach names someone else the captain. Seems as if the coach doesn't consider you the leader that you consider yourself. Strange, maybe its your relationship with him.\n      *set Leadership %- 5\n      *set Situation_14 \"unavaliable\"\n      *goto next\n    *else\n      Your coach struggles not to laugh, and you are quickly denied the captain role. Seems as if for some reason not only does your coach not consider you to be trustworthy, but he seems to pretty much dismiss you.\n      *set Leadership %- 10\n      *set Situation_14 \"unavaliable\"\n      *goto next\n\n\n\n*if (event = 15)\n  *if (Situation_15 = \"unavaliable\")\n    *goto events\n  *else\n    Some footage of you walking down the street somehow goes viral. Its strange, since you weren't doing anything special, just going out for a walk. You decide to look into what's going on, and the results are slightly surprising to you.\n    *line_break\n    *if (Confidence > 65)\n      You're seen walking extremely positively, which gives fans a much more positive impression of you. Maybe that's what made it go viral Good job Champ! Well, hopefully champ!\n      *set Fans %+ 10\n      *set Situation_15 \"unavaliable\"\n      *goto next\n    *if (Confidence > 55)\n      You're seen as walking pretty confidently, which improves fan perception of you. Strange that this went viral, but it works in your favour, so okay.\n      *set Fans %+ 5\n      *set Situation_15 \"unavaliable\"\n      *goto next\n    *if (Confidence > 45)\n      After watching it a few times, you realise there is literally nothing special about this video. You wonder why this went viral in the first place. Yeah, this is just really weird.\n      *set Situation_15 \"unavaliable\"\n      *goto next\n    *if (Confidence > 35)\n      Some people are noting your lack of confidence showing in your walk. Strange that this went viral though, since its not that bad.\n      *set Fans %- 5\n      *set Situation_15 \"unavaliable\"\n      *goto next\n    *else\n      The video shows you walking with a huge slouch displaying a lack of confidence. Seriously, the media and the internet are turning this into a meme.\n      *set Fans %- 10\n      *set Situation_15 \"unavaliable\"\n      *goto next\n    \n\n*if (event = 16)\n  *if (Situation_16 = \"unavaliable\")\n    *goto events\n  *else\n    You and ${SO_name} stay in together for dinner. You two have a nice, relaxing home cooked meal that the two of you prepared together. However, during both the preparation of the meal, ${SO_name} asks you how you feel about being a famous celebrity. A bit werid that they never asked before, but you're glad ${they} finally asked you as opposed to just being upset over seeing you less often. Overall, how would you describe this position?\n    *choice\n      #I love it. The money isn't the point. I simply love the fact that so many people recognize me and look up to me.\n        ${SO_name} feels divided. They're glad you love the attention, but are still disapointed that you'll always be somewhat in the spotlight.\n        *set Fame %+ 10\n        *set Situation_16 \"unavaliable\"\n        *goto next\n      #It was fun at the start, but the novelty has long worn off. Now its a bit of a chore.\n        ${SO_name} feels relieved that you'll likely be a bit more laid back now and they'll be able to spend time with you.\n        *set Fame %+ 5\n        *set Situation_16 \"unavaliable\"\n        *goto next\n      #There's pros and cons. Overall, it balances out in the end.\n        ${SO_name} understands the nuance that you describe, but doesn't quite make their feelings known to you.\n        *set Situation_16 \"unavaliable\"\n        *goto next\n      #It's not really that great having to be on my best behaviour 24/7 and being hounded by the media. If it wasn't for me loving the game, and the money, I would have quit long ago.\n        ${SO_name} feels divided. They don't like the fact that you're unhappy, but they like that you'll soon be taking a step back.\n        *set Fame %- 5\n        *set Situation_16 \"unavaliable\"\n        *goto next\n      #I hated it right from the start. Its really annoying being one small public mistake away from ruining my life.\n        ${SO_name} feels sad and somewhat confused. They find its strange that you chose a career where fame was such a big part of the role.\n        *set Fame %- 10\n        *set Situation_16 \"unavaliable\"\n        *goto next\n\n*if (event = 17)\n  *if (Situation_17 = \"unavaliable\")\n    *goto events\n  *else\n    The coach calls a meeting with you at the last minute. This is pretty unusual, so you know it's probably important. You had plans with your family that have been in place for several weeks. What do you do?\n    *choice\n      #I cancel my plans with the family and go to the meeting with my coach. Sorry, but this is for my career.\n        Your family is disapointed in you, but your coach thanks you for making it despite the last minute nature of the meeting.\n        *set Coach %+ 10\n        *set Family %- 10\n        *set Situation_17 \"unavaliable\"\n        *goto next\n      #I tell the coach I can't make it. Family comes first, and with my retirement coming I need to focus on what's coming after my career.\n        Your family is relieved, but your coach si pretty upset.\n        *set Coach %- 10\n        *set Family %+ 10\n        *set Situation_17 \"unavaliable\"\n        *goto next\n\n*if (event = 18)\n  *if (Situation_18 = \"unavaliable\")\n    *goto events\n  *else\n    There's a one-off event where your teammates are expected to sign autographs during what would usually be time off. Your teammates are protesting what little free time they have by refusing to go. None of your teammates are going.\n    *choice\n      #I stand alongside my teammates. This is outrageous! It's unfair!\n        Your teamamtes appreciate the fact that you're standing alongside them.\n        *set Team %+ 10\n        *set Fans %- 10\n        *set Situation_18 \"unavaliable\"\n        *goto next\n      #I stand alongside my teammates. Not because I don't want to do it, but because I don't want my teammates to see me as a pariah.\n        Your teamamtes appreciate the fact that you're standing alongside them, although something about your demeanor the whole time feels off.\n        *set Team %+ 5\n        *set Fans %- 5\n        *set Situation_18 \"unavaliable\"\n        *goto next\n      #I want to sign autographs. I don't see anything wrong with it. Its part of the job.\n        Your teamamtes don't like the fact that you're standing against them, saying they would have stood up beside you.\n        *set Team %+ 10\n        *set Fans %- 10\n        *set Situation_18 \"unavaliable\"\n        *goto next\n      #I want to sign autographs. Not because I want to make the fans happy, but because I want to suck up to everyone.\n        The fans appreiciate it, but something about you seems dishonest during the whole thing.\n        *set Team %+ 5\n        *set Fans %- 5\n        *set Situation_18 \"unavaliable\"\n        *goto next\n\n*if (event = 19)\n  *if (Situation_19 = \"unavaliable\")\n    *goto events\n  *else\n    You see a news report on your family. You're not sure where the media is getting their 'information' its all wrong and slanderous towards them. What do you do about it?\n    *choice\n      #I speak out against it on a competitor's media platform with the truth.\n        It seems cleared up, and the media who like you more balances out the ones who tried blasting you.\n        *set Fame %+ 5\n        *set Situation_19 \"unavaliable\"\n        *goto next\n      #I contact them with threats to contact a lawyer for demation.\n        They stop, and correct it the next day. You're able to control the damage, but not prevent what was already done.\n        *set Fans %- 5\n        *set Fame %+ 5\n        *set Situation_19 \"unavaliable\"\n        *goto next\n      #I let it happen. Any publicty is good publicity.\n        Yeah, no. People see you and your family in a worse light, now.\n        *set Fans %- 15\n        *set Fame %+ 5\n        *set Situation_19 \"unavaliable\"\n        *goto next\n      #I speak up about it on social media.\n        People see you more positively, standing up for yourself.\n        *set Fans %+ 5\n        *set Fame %+ 5\n        *set Situation_19 \"unavaliable\"\n        *goto next\n      #I ignore it. People will know this isn't true.\n        Yeah, no. People see you and your family in a worse light, now.\n        *set Fans %- 15\n        *set Fame %+ 5\n        *set Situation_19 \"unavaliable\"\n        *goto next\n\n*if (event = 20)\n  *if (Situation_20 = \"unavaliable\")\n    *goto events\n  *else\n    You're supposed to be going out with ${SO_name} when your coach calls a last-second team meeting, that the entire team is expected to attend. Anyone who doesn't attend will be one step closer to sitting on the sidelines. Many of your teammates panic and cancel plans. What do you do?\n    *choice\n      #I cancel my plans with ${SO_name} and go to the team meeting. Sorry, but this seems mandatory. Plus, it will be (hopefully) the last time that this happens.\n        Your ${SO_name} is disapointed in you, but your coach and teammates thank you for making it despite the last-minute nature of the meeting. The meeting is pretty boring though, and you wish you could have spent it with ${SO_name}.\n        *set Coach %+ 5\n        *set Team %+ 5\n        *set SO %- 10\n        *set Situation_20 \"unavaliable\"\n        *goto next\n      #I tell the coach I can't make it. ${SO_name} comes first, and with my retirement coming I really don't care as much about the consequences of missing a meeting.\n        ${SO_name} is relieved, but your coach and teammates are pretty upset.\n        *set Coach %- 5\n        *set Team %- 5\n        *set SO %+ 10\n        *set Situation_20 \"unavaliable\"\n        *goto next\n\n*if (event = 21)\n  *if (Situation_21 = \"unavaliable\")\n    *goto events\n  *else\n    Your family decides to look up what fans are saying about you online in internet forums. You're curious as to if this will change their opinion on you.\n    *line_break\n    *if (Fans > 65)\n      They're extremely impressed by how well you're able to maintain such a good public image. Your positive attitude and positive impression on the public lets your family see you in an even more positive light.\n      *set Family %+ 10\n      *set Situation_21 \"unavaliable\"\n      *goto next\n    *if (Fans > 55)\n      They see that most of the public sees you in a generally positive light. This isn't surprising to your family, but it does make them just a little bit more proud of you.\n      *set Family %+ 5\n      *set Situation_21 \"unavaliable\"\n      *goto next\n    *if (Fans > 45)\n      Your family sees that the public has a mostly nuetral viewpoint of you. This really doesn't phase them since deep down they don't care about strangers' opinions very much, so you wonder if this impacts their opinion on anything at all.\n      *set Situation_21 \"unavaliable\"\n      *goto next\n    *if (Fans > 35)\n      Your family notes the fact that the public views you in a slightly negative light. It doesn't effect thier opinion of you very much, since its just the opinions of a bunch of strangers, but its still something to note.\n      *set Family %- 5\n      *set Situation_21 \"unavaliable\"\n      *goto next\n    *else\n      Your family is shocked at how negatively the piblic views you. This seems to shake them a little bit despite the fact that they say it doesn't.\n      *set Family %- 10\n      *set Situation_21 \"unavaliable\"\n      *goto next\n\n\n*if (event = 22)\n  *if (Situation_22 = \"unavaliable\")\n    *goto events\n  *else\n    ${SO_name} is curious to see what fans think about you. They decide to check online internet forums to see the opinions of random people. Knowing that this would happen eventually, you wait to see if this changes ${their} opinion of you.\n    *line_break\n    *if (Fans > 65)\n      ${SO_name} sees that you're loved by many and quite popular. This goes as far as making ${them} even more attracted to you.\n      *set SO %+ 10\n      *set Situation_22 \"unavaliable\"\n      *goto next\n    *if (Fans > 55)\n      ${SO_name} sees that most fans have a positive opinion of you. This isn't surprising to them since they're dating you, but it does make ${them} just a little bit more attracted to you.\n      *set SO %+ 5\n      *set Situation_22 \"unavaliable\"\n      *goto next\n    *if (Fans > 45)\n      ${SO_name} sees that the public has a mostly neutral viewpoint of you. They really don't switch ${their} opinion on you, since it was moreso curiousity drawing ${them} to do the research, and they don't care much about the opinions of strangers.\n      *set Situation_22 \"unavaliable\"\n      *goto next\n    *if (Fans > 35)\n      ${SO_name} notes the fact that the public views you in a slightly negative light. They really don't lower their opinion much, they're more concerned than anything.\n      *set SO %- 5\n      *set Situation_22 \"unavaliable\"\n      *goto next\n    *else\n      ${SO_name} is shocked at how negatively people see you, and it goes so far as seeming to affect your dynamic.\n      *set SO %- 10\n      *set Situation_22 \"unavaliable\"\n      *goto next\n\n\n*if (event = 23)\n  *if (Situation_23 = \"unavaliable\")\n    *goto events\n  *else\n    There's a large event that many of the best players in the league, including Ace Armstrong, are attending. Its mostly signing autographs in exchange for only a pat on the back and recognition. You don't have any plans when its scheduled to happen. Do you go?\n    *choice\n      #I go since I want to be recognized.\n        You certainly get the attention you seek, although this event seemed kind of annoying to attend.\n        *set Fame %+ 10\n        *set Situation_23 \"unavaliable\"\n        *goto next\n      #I go to become more popular with the fans.\n        You put on a good show of wanting to be there, improving fan opinion of you.\n        *set Fans %+ 10\n        *set Situation_23 \"unavaliable\"\n        *goto next\n      #I go to show up Ace.\n        He mostly ignores you, and os focused on promoting himself. Not surprising, really.\n        *set Situation_23 \"unavaliable\"\n        *goto next\n      #I Don't both to go. Waste of time.\n        Nothing comes of it.\n        *set Situation_23 \"unavaliable\"\n        *goto next\n\n*if (event = 24)\n  *if (Situation_24 = \"unavaliable\")\n    *goto events\n  *else\n    You find out that the coach of ${team_name} is partaking in lobbying with some local politicians. You're not sure what he's paying them for, but it seems as if he's creating some personal financial loophole. What do you do?\n    *choice\n      #I keep it to myself. What he's doing is technically legal, and snitching on someone who has authority over me is likely to be a bad idea.\n        Nothing happens since you decide to keep it to yourself. Deep down you feel like something's odd, but you don't regret your decision.\n        *set Situation_24 \"unavaliable\"\n        *goto next\n      #I openly say it to the media. He can't get away with this!\n        You're in a fiar bit of trouble, and the coach seems rather distant from you for the next while. However, the public appreciates you coming forward.\n        *set Media %+ 5\n        *set Fans %+ 5\n        *set Fame %+ 5\n        *set Coach %-20\n        *set Situation_24 \"unavaliable\"\n        *goto next\n      #I anonymously disclose it to the media. I don't want to get in trouble.\n        Since you're doing it anonymously, you can't disclose a source you have no proof. You get no consequences, though at least.\n        *set Situation_24 \"unavaliable\"\n        *goto next\n\n*if (event = 25)\n  *if (Situation_25 = \"unavaliable\")\n    *goto events\n  *else\n    You're meeting with your therapist about your painkiller addication. You are currently taking ${Painkiller_Addiction} painkiller per day.\n    *if (Painkiller_Addiction = 0)\n      You're able to maintain a hold on your addiction.\n      *set Situation_25 \"unavaliable\"\n      *goto next\n    *else\n      Are you honest about your situation?\n      *choice\n        #Yes.\n          Your therapist give you some help in taking one less per day.\n          *set Painkiller_Addiction -1\n          *set Situation_25 \"unavaliable\"\n          *goto next\n        #No.\n          You receive no help.\n          *set Situation_25 \"unavaliable\"\n          *goto next\n\n\n*if (event = 26)\n  *if (Situation_26 = \"unavaliable\")\n    *goto events\n  *else\n    *set Situation_26 \"unavaliable\"\n    The week starts off quiet.\n    *goto next      \n\n*label next\nYour record: ${wins} - ${loses}\n*line_break\n*line_break\nWeek: ${week}\n*if (week = 1)\n  *goto_scene week_1\n*if (week = 2 .  \n\n*achievement painkiller visible 25 Inspirational story\n  Beat the addiction.\n  Get off your painkiller addiction.\n\n*achievement number1 visible 10 The real number one\n  Can you figure out how literal this one is?\n  Have your jersey number be #1.\n\n\n*achievement nailbiter visible 10 Nailbiter\n  Can the fans take the pressure?\n  Have a game go into overtime.\n\n*achievement popularity visible 50 Take that, Ace\n  Can Ace handle what you do to him here?\n  Have more popularity than Ace Armstrong at the end of the season.\n\n*achievement confidence visible 10 I can see you're confident\n  Show a display of confidence. If you're a gamer, you'll find this after enough playthroughs.\n  Skip the tutorial.\n\n*achievement loyalty visible 10 Show your loyalty\n  Should explain the team name.\n  Remain on the Dogs.\n\n*achievement traitor visible 10 Traitor\n  The opposite of the above.\n  Sign with the Hyenas.\n\n*achievement close visible 10 So close\n  Not again!\n  Lose in the finals.\n\n*achievement load visible 10 Right where I left off\n  I knew I put this here for a reason.\n  Load a saved file.\n\n  \n*create Long_pass 0\n*create Short_pass 0\n*create Medium_pass 0\n*create Speed 0\n*create Awareness 0\n*create Composure 0\n*create Super false\n\n*create Leadership 50\n*create Professionalism 50\n*create Fame 50\n*create Optimism 50\n*create Openness 50\n*create Confidence 50\n\n*create SO 50\n*create Family 50\n*create Fans 50\n*create Media 50\n*create Coach 50\n*create Team 50\n\n*create wins 0\n*create loses 0\n*create draws 0\n\n*create first_name \"unknown\"\n*create last_name \"unknown\"\n*create jersey_number 1\n*create team_name \"unknown\"\n*create opponent \"unknown\"\n\n*create SO_name \"unknown\"\n*create SO_gender \"unknown\"\n\n*create Painkiller_Addiction 6\n*create Sponsor 0\n\n*create Passing_Yards 0\n*create Passing_Attempts 0\n*create Passes_Completed 0\n*create Passing_TDs 0\n*create Interceptions 0\n\n*create Rushing_Yards 0\n*cr
