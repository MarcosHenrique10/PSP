_15_1 \"avaliable\"\n*create savesys_Situation_16_1 \"avaliable\"\n*create savesys_Situation_17_1 \"avaliable\"\n*create savesys_Situation_18_1 \"avaliable\"\n*create savesys_Situation_19_1 \"avaliable\"\n*create savesys_Situation_20_1 \"avaliable\"\n*create savesys_Situation_21_1 \"avaliable\"\n*create savesys_Situation_22_1 \"avaliable\"\n*create savesys_Situation_23_1 \"avaliable\"\n*create savesys_Situation_24_1 \"avaliable\"\n*create savesys_Situation_25_1 \"avaliable\"\n*create savesys_Situation_26_1 \"avaliable\"\n*create savesys_location_1 \"home\"\n*create savesys_status_1 \"single\"\n*create savesys_week_1 1\n*create savesys_half_1_1 \"avaliable\"\n*create savesys_half_2_1 \"avaliable\"\n*create savesys_half_3_1 \"avaliable\"\n*create savesys_half_4_1 \"avaliable\"\n*create savesys_half_5_1 \"avaliable\"\n*create savesys_half_6_1 \"avaliable\"\n*create savesys_half_7_1 \"avaliable\"\n*create savesys_half_8_1 \"avaliable\"\n*create savesys_half_9_1 \"avaliable\"\n*create savesys_half_10_1 \"avaliable\"\n*create savesys_half_11_1 \"avaliable\"\n*create savesys_half_12_1 \"avaliable\"\n*create savesys_half_13_1 \"avaliable\"\n*create savesys_half_14_1 \"avaliable\"\n*create savesys_half_15_1 \"avaliable\"\n*create savesys_half_16_1 \"avaliable\"\n*create savesys_half_17_1 \"avaliable\"\n*create savesys_half_18_1 \"avaliable\"\n*create savesys_half_19_1 \"avaliable\"\n*create savesys_half_20_1 \"avaliable\"\n*create savesys_He_1 \"Unknown\"\n*create savesys_Him_1 \"Unknown\"\n*create savesys_His_1 \"Unknown\"\n*create savesys_them_1 \"Unknown\"\n*create savesys_their_1 \"Unknown\"\n*create savesys_they_1 \"Unknown\"\n\n*if choice_is_omnibus_app\n    *comment skip description\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n    After a career where you’ve achieved everything but a championship, you have one last chance. However, the strongest team ever is led by your biggest rival, who is also great greatest player of all time. Can you finally overcome the biggest hurdle in your career?\n    [i]Last Chance Quarterback[/i] is a 115,000-word interactive novel by Chris Viola, author of [i]Super Star Soccer Striker[/i]. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination. Choose your playstyle, your personality, and even your team.\n    • Play as male like the rest of the league or be the sport’s first female or nonbinary star.\n    • Romance a partner of your choice.\n    • Choose how you present yourself to your family, the media, and your teammates, developing a full personality.\n    • Feel the highs and lows of having to rival the greatest player of all time.\n    • Choose between being a team-first player to increase your chances of victory or boosting your own reputation by increasing your career stats.\n    • Choose between playing as a powerhouse who can make the big throw, a precise and consistent player, a quick-thinking leader, a shifty fast-on-your-feet scrambler, and more.\n    The team’s fate rests on your shoulders. Can you handle the pressure?\n\n\n    *if choice_prerelease and not(choice_is_ios_app)\n        [i]You can play the first portion of this game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n        *choice\n            #Sign up to be notified when the game is available.\n                *subscribe {\"now\": true}\n                *restart\n            #Play the first portion now for free.\n                *goto purchased\n\n    [i]You can play the first portion of this game for free. Purchase the rest of the game below.[/i]\n    *if choice_is_advertising_supported\n        [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n    *purchase_discount adfree 2023-08-10 $4.99 $2.99 purchased\n    *if choice_is_advertising_supported\n        *page_break_advertisement\n    *if not(choice_is_advertising_supported)\n        *page_break Play Now for Free\n\n*label purchased\n\n*if choice_is_omnibus_app\n  CONTENT WARNING?\n  *page_break\n\n*goto_scene wake\n", "wake": "Do you want to play from the last checkpoint?\n\n*fake_choice\n  *selectable_if (savesys_slot_1 != 0) # Yes.\n    *check_achievements\n    *if not(choice_achieved_load)\n      *achieve load\n    *gosub_scene savesys load 1\n  # No.\n    *goto start\n\n*label start\nYou watch as the legendary quarterback Ace Armstrong raises the Megacup into the air for the 8th time in his career. The trophy is cradled in his right hand, as he raises the finals MVP trophy in his left. The crowd cheers, showering the league's all-time best player with praise. His teammates, mostly average players raise him over their shoulders as he seems to cry in joy. Barely audible due to all the other noise in the arena, a triumphant tune plays in the background.\n*line_break\n*line_break\nBZZZZZZZZZZ!!!! You smash your alarm clock waking up yet again with the ending of last year still in your mind. You look around at all the posters of Ace in your room. He's smiling in all of them. 8 Megacups. 6 Finals MVPs. 5 Regular season MVPs. 1 Rookie of the year. 1 Most improved player. 14 All-Star game appearances. Without a doubt, the greatest player in World Football Organization history.\n*page_break\nAnd you hate his guts. You have all these posters all over your room so that every time you wake up, you're reminded of who it is you have to beat. He was drafted right before you, and you've lived in his shadow. You, also a quarterback, have made the finals three times, including last year, losing to him each time. 5 semi-final losses. 4 Quarterfinals losses. You see your individual awards, and it's not bad. 2 Regular season MVP runner-ups. 8 All-Star game appearances. Rookie of the year runner-up. You're going to be a Hall of Famer one day. Your heart then breaks as you look at your hand to see no rings on your fingers.\n*line_break\n*line_break\nYou then roll over towards your nightstand and grab your bottle of painkillers. Despite them being recommended one pill every 12 hours at most, you take two pills at a time, once every 8 hours. You suffer from many side effects, including nausea, dizziness, itching, depression, and constipation. You wish there was another way, but you've started to develop both an addiction and a tolerance. You slowly get up, turn the TV on to the local sports station and start to prepare a healthy breakfast. \n*line_break\n*line_break\nWhat's for breakfast?\n\n*fake_choice\n  #Eggs and brown bread\n  #High protein cereal\n  #A sandwich with meat and vegetables\n  # Low-sugar burrito\n  #Flavoured, nutritional oatmeal\n*line_break  \nAs you eat your breakfast, you turn on the television. As if on cue, there is currently a news story talking about you. Speaking of which, who are you? What's your first name?\n\n*input_text first_name\n\nAnd your last name?\n\n*input_text last_name\n\nAnd your gender?\n*choice\n  #Male\n    *set he \"he\"\n    *set him \"him\"\n    *set his \"his\"\n    *goto Anita\n  #Female\n    You're the first, and so far, the only woman to play in the league.\n    *set he \"she\"\n    *set him \"her\"\n    *set his \"her\"\n    *goto Anita\n\n  #I don't perform to traditional gender norms.\n\n    You're the first, and so far, the only person not conforming to the two traditional genders to play in the league.\n    *set he \"they\"\n    *set him \"they\"\n    *set his \"their\"\n    *goto Anita\n\n*label Anita\n\n\n\nReporter Alicia Bryant is speaking \"${first_name} ${last_name} has finished the pre-season and oh boy, ${last_name} shows signs of age. Firstly, ${his} release has shown signs of slowing down, as ${he} was sacked by last year's rookie of the year, defensive end Dwight Shiltz in the most recent preseason game while winding up for a throw.\"\n\n*line_break\n*line_break\nThe footage then cuts to you ready to throw before Shiltz takes you down with what appears to be a tame-looking hit. In your younger years, you likely would have been able to muscle your way out of that hit, but not anymore. \"${last_name} likely would have easily gotten out of here in any one of several ways, as ${He} would have had the speed to outrun Shiltz, the strength to break this hit, or the quickness to release the ball earlier. But sadly, it looks like ${he} fell off a cliff in the past couple of years. Sadly for ${his} fans, ${last_name} is but a shadow of ${his} former self.\"\n*line_break\n*line_break\nWhat's your response?\n\n*choice\n  #That play was a fluke. I can still play with the best of them.\n    *set confidence %+ 10\n    *set optimism %+ 5\n    *goto Anita2\n  #Shiltz is likely the best rookie in the league. That's not as bad a looking play as it looks.\n    *set professionalism %+ 10\n    *set openness %+ 5\n    *goto Anita2\n  #Shut up, Alicia, what do you know?\n    *set professionalism %- 10\n    *set openness %+ 5\n    *goto Anita2\n  #Yeah, I've gone downhill a lot.\n    *set confidence %- 10\n    *set optimism %- 5\n    *goto Anita2\n  #This doesn't bother me. It's just the media looking for a story.\n    *set confidence %+ 10\n    *set optimism %- 5\n    *goto Anita2\n  #I say nothing and just listen.\n    *goto Anita2\n\n \n*label Anita2\nAlicia continues speaking. \"Of course, ${last_name} was great in ${his} prime. Easily one of the best quarterbacks of this generation, and certainly one of the best of ${his} style of play.\"\n*line_break\n*line_break\nSpeaking of which, what style of play do you use?\n*line_break\n*choice\n  #Gunslinger. You like to throw long passes from inside the pocket.\n    *set Long_pass 60\n    *set Short_pass 40\n    *set Medium_pass 50\n    *set Speed 45\n    *set Awareness 55\n    *set Composure 60\n    \"With one of the strongest arms in the league, but we wonder if ${he} can still put the same zip on the ball,\" Alicia says before pausing.\n    *goto reaction\n  #West Coast QB. You like quick short passes.\n    *set Long_pass 40\n    *set Short_pass 60\n    *set Medium_pass 50\n    *set Speed 40\n    *set Awareness 60\n    *set Composure 60\n    \"With one of the most accurate arms in the league, but we're not sure if ${he} can still get the fast release needed for that playstyle,\" Alicia says before pausing.\n    *goto reaction\n  #Balanced Passer. You're good with both long and short passes, but don't specialize in either.\n    *set Long_pass 50\n    *set Short_pass 50\n    *set Medium_pass 50\n    *set Speed 40\n    *set Awareness 60\n    *set Composure 60\n    \"Formerly with one of the most well-rounded skill sets in the league, but has started to go downhill in the last few years,\" Alicia says before pausing.\n    *goto reaction\n  #Scrambler. You like to run out of the pocket and take the ball yourself instead of throwing it.\n    *set Long_pass 45\n    *set Short_pass 45\n    *set Medium_pass 45\n    *set Speed 65\n    *set Awareness 60\n    *set Composure 50\n    \"${Last_name} was one of the fastest scramblers in the league, but there is doubt that ${he} can still outrun the league's best defenders,\" Alicia says before pausing.\n    *goto reaction\n  #Pocket Passer. You're a smart, composed passer who makes great decisions even under pressure.\n    *set Long_pass 45\n    *set Short_pass 45\n    *set Medium_pass 45\n    *set Speed 35\n    *set Awareness 70\n    *set Composure 70\n    \"${last_name} was always been one of the smartest and most composed players in the league, but can ${his} body still survive?\" Alicia says before pausing.\n    *goto reaction\n  #Short Yardage Monster. You're cautious while also having plenty of options to keep the defense guessing.\n    *set Long_pass 40\n    *set Short_pass 65\n    *set Medium_pass 40\n    *set Speed 65\n    *set Awareness 55\n    *set Composure 45\n\n    \"${last_name} was always been able to steadily march ${his} team down the field with both passes and ${his} ability to take the ball and run.\n\n    *goto reaction\n  #Athletic Freak. You have a powerful arm, and you can take off and run the ball if you need to.\n    *set Long_pass 60\n    *set Short_pass 40\n    *set Medium_pass 45\n    *set Speed 60\n    *set Awareness 50\n    *set Composure 55\n    \"One of the most athletic players in the league ${last_name} can both throw accurate bombs and take off and run with the ball when there's nobody open.\n    *goto reaction\n  #What do these do in more detail?\n    Gunslingers have an extremely strong arm and throw plenty of deep passes. Are also okay at running the ball, but it's not their preferred method. It's a riskier playstyle, as you need enough time for a receiver to get down the field, and gives up more sacks and interceptions. They make the biggest plays on offense, though.\n    *line_break\n    *line_break\n    West Coast QBs are more cautious and have high accuracy on short passes. They steadily make their way down the field in a methodical drive. They have the added advantage of being able to pass to running backs and tight ends more often.\n    *line_break\n    *line_break\n    Balanced Passers can throw decently at any range, but don't have a specialty. This makes it hard for the defense to counter them since if the defense overcompensates in any direction, these guys can attack the defense's weakness.\n    *line_break\n    *line_break\n    Scramblers are fast and often run for yardage themselves, giving them an alternative to passing. This is very tough for a defense to counter, as long as the scrambler remembers that they still have to throw more often than they run. However, they need to be able to run fast to be effective. Sadly, they are usually slightly less skilled at passing, which is still their primary job.\n    *line_break\n    *line_break\n    Pocket Passers have solid awareness and composure, letting them stay cool under pressure and see the entire field. This lets them make good decisions, as they can see the whole field, and they also panic less often.\n    *line_break\n    *line_break\n    Short Yardage Monsters are able to both make short passes with a lot of consistency and take off with the ball themselves to gain yardage. This makes them both unpredictable while also being cautious.\n    *line_break\n    *line_break\n    Athletic Freaks have both powerful arms and can run really fast, allowing for a very exciting variety of plays.\n    *goto Anita2\n\n*label reaction\n*line_break\nYou crack your neck, barely feeling anything at all. You know it should hurt, even with the painkillers, but with how overdosed you are, you feel immune to pain. You think back to the broken thumb that kept you out for a few weeks last season that you also didn't feel very much. \"I wonder if my neck's permanently damaged,\" you mumble to yourself before turning your attention back to Alicia's report.\n*line_break\n*line_break\nHighlights of your career are being shown. What number is on your jersey?\n*line_break\n*line_break\n*input_number jersey_number 1 99\n*check_achievements\n*if not(choice_achieved_number1)\n  *achieve number1\n\nYour number ${jersey_number} is shown on screen, as Alicia recounts both your awards and your team's failures. \"He just signed a one-year contract this off-season,\" she says. Who did you sign with?\n\n*choice\n  #I signed with the Dogs. They drafted me and are the team that I've been on my whole career.\n    *goto dogs\n  #I changed teams for the first time and now play for a recent champion who is replacing their quarterback in a last-ditch attempt to win a championship.\n    *goto Hyenas\n\n*label dogs\n*check_achievements\n*if not(choice_achieved_loyalty)\n  *achieve loyalty\n\n\"At the start of the season, ${he} remained loyal to ${his} old team, the dogs, who ${he} stayed with ${his} whole career despite a very tempting offer from the Hyenas. ${Last_name} is a team legend and supported by both fans and those inside the organization.\"\n*set fans %+ 10\n*set team %+ 15\n*set media %- 5\n*set team_name \"Dogs\"\n*goto team\n\n*label Hyenas\n*check_achievements\n*if not(choice_achieved_traitor)\n  *achieve traitor\n\n\"At the start of the season, ${he} surprised everyone when ${he} signed with the Hyenas, who won 3 years ago and needed a quarterback. This is despite having been on the Dogs for years. This came as a shock to fans of the Dogs and their fans. Many understood the decision, while others burned their jerseys.\"\n*set fans %- 5\n*set team %- 5\n*set media %+ 20\n*set team_name \"Hyenas\"\n*goto team\n\n*label team\n*line_break\n*if (team_name = \"Dogs\")\n  *line_break\n  Alicia pauses quickly before continuing.\n  *line_break\n  \"With so few players staying loyal to the team that drafted them throughout their career, ${last_name} has become respected even by ${his} detractors.\" You feel good about yourself, getting a break from the lack of championships for a second. However, the moment doesn't last long.\n  *line_Break\n\n  \"However, ${first_name} is also a common target of ridicule for having never led them to a championship. Many call ${him} 'overrated', saying that ${last_name} was carried to ${his} 3 finals appearances, and only deserved 1 or 2 of ${his} All-Star appearances. With the recent acquisition of better offensive linemen recently, the team has shown that they can do great despite ${him} being washed up.\"\n\n  Thoughts?\n  *choice\n    #\"Washed up?\" Despite being 36, you were still rated near all-star level, at least statistically.\n      *set Leadership %+ 5\n      *set Confidence %+ 10\n      *goto dogs2\n    #She's right. I need to stay on a good team to be relevant at this point in my career.\n      *set Openness %+ 10\n      *set Confidence %- 5\n      *goto dogs2\n    #It's just the media. I'm not going to let them get to me.\n      *set Openness %+ 5\n      *set Confidence %+ 5\n      *goto dogs2\n\n  *label dogs2\n  *line_break\n  *line_break\n\n  \"In ${his} career, ${he} lead the dogs to the championship game 3 times, losing every time to the Flagbearers, each time led by Ace Armstrong. This includes last year, when down by 4 with a minute left, ${last_name} threw an interception that ended what people thought was ${his} last chance at a championship. Now that ${he} has returned, people are wondering if ${last_name} still has the athleticism to pull off a victory.\"\n\n  *line_break\n  *line_break\n  Although that is how it happened, you hate that the media just isn't letting it go. You think it may be the reason you keep having flashbacks and nightmares of Ace lifting the trophy. The rest of the story just feels like background noise that you tune out as you eat breakfast.\n  *goto call\n\n*if (team_name = \"Hyenas\")\n  Alicia pauses before continuing.\n\n  \"Fans of other teams have shown a mixed reaction to this. Many criticize the quarterback for giving up on the team that gave ${him} so much. Others see it as just business, and understand ${him} wanting to fill a hole on a team that seems to have everything else in place.\"\n  *line_break\n  *line_break\n  Do you care about how the fans see you?\n  *choice\n    #No, I gotta do what I gotta do.\n      *set Leadership %+5\n      *set Confidence %+ 5\n      *set Openness %-5\n      *goto hyenas2\n    #No, the fans who think this is shallow and dumb.\n      *set Fame %+5\n      *set Confidence %+ 5\n      *set Professionalism %-5\n      *goto hyenas2\n    #Yes, I care about my legacy.\n      *set Fame %+5\n      *set Openness %+ 5\n      *set Confidence %-5\n      *goto hyenas2\n    #Yes. The more popularity I lose, the more endorsements I miss out on. Duh. \n      *set Fame %+5\n      *set Leadership %+ 5\n      *set Confidence %-5\n      *goto hyenas2\n\n  *label hyenas2\n  Alicia continued with her report. \"In ${his} career ${he} lead the dogs to the championship game 3 times, losing every time to the Flagbearers, each time led by Ace Armstrong. This includes last year, when down by 4 with a minute left, ${last_name} threw an interception that ended what people thought was ${his} last chance at the game. Switching teams indicates ${he} didn't have faith in ${his} old team to win.\"\n  *line_break\n  *line_break\n  Tired of being blasted by the media, you return to your breakfast.\n  *line_break\n  *line_break\n  *goto call\n\n*label call\n\nAfter you finish, your phone goes off. You pick it up, and it's your significant other. They are a...\n\n*choice\n  #Male\n    *set SO_gender \"Male\"\n    *set they \"he\"\n    *set their \"his\"\n    *set them \"him\"\n    *goto call_2\n  #Female\n    *set SO_gender \"Female\"\n    *set they \"she\"\n    *set their \"her\"\n    *set them \"her\"\n    *goto call_2\n  #They don't conform to gender norms\n    *set SO_gender \"Person\"\n    *set they \"they\"\n    *set their \"their\"\n    *set them \"them\"\n    *goto call_2\n\n*label call_2\n\nAnd their first name?\n\n\n*input_text SO_name\n\n\"Hello ${first_name}!\" ${SO_name} says in a rather excited voice. \"How's your mourning?\". When speaking, ${their} tone indicates the knowledge that it's not going well.\n\n*choice\n  #Great.\n    *set Optimism %+ 10\n    *set SO %- 10\n    \"Oh, excellent,\" ${SO_name} says, ${Their} voice indicating that ${they} can tell you're lying but doesn't want to challenge you on it.\n    *goto call_3\n  #Good.\n    *set Optimism %+ 5\n    *set SO %- 5\n    \"Oh, nice,\" ${SO_name} says, pausing and taking a breath indicating that they're not sure how to respond.\n    *goto call_3\n  #Okay.\n    *goto call_3\n    \"Oh,\" ${SO_name} says, pausing before you continue.\n  #Oh, you know.\n    *set Optimism %- 5\n    *set SO %+ 5\n    \"Don't worry about the media, hun,\" they respond positively. You can tell that they have mixed feelings about this. You know ${SO_name} is upset you're not doing so well, but happy that you're at least being honest with ${them}.\n    *goto call_3\n  #To be honest, not so good.\n    *set Optimism %- 10\n    *set SO %+ 10\n    \"Don't think about what's going on too much. The media are going to say things because it's profitable, and people have strong emotions about what they invest their emotions in. Just do your best, and remember all the people who support you.\"\n    *goto call_3\n\n*label call_3\n\nAfter a few seconds, you respond with \"How are you?\"\n*line_break\n*line_break\n\"I'm doing alright, just busy with work,\" ${SO_name} responds. So given what's going on, let's talk about your relationship with ${SO_name}. How did the two of you meet?\n\n*fake_choice\n  #We met through a mutual friend.\n  #Online dating.\n  #We had classes together in college.\n  #At your old part-time job before your career started.\n  #At a bar.\n  #Somewhere else.\n\nWere you two friends before getting together?\n\n*fake_choice\n  #Yes.\n  #No.\n  #It's complicated.\n\nOkay. After saying that they've been busy with work, you and ${SO_name} continue your conversation. \"I saw your interview yesterday.\" Your mind flashes back to the interview where you were asked the typical media questions designed to get a reaction out of you. What were the details?\n*line_break\n*line_break\n*temp ans 0\n\n*choice\n  *selectable_if (team_name = \"Dogs\") #They asked how I feel about being carried by a team that's given me everything last year.\n    *set ans 1\n    *goto answer\n  *selectable_if (team_name = \"Hyenas\") #They asked how I could possibly betray the team that's given me everything.\n    *set ans 2\n    *goto answer\n  #They ask about how I feel about blowing it in last year's championship.\n    *set ans 3\n    *goto answer\n  #They ask if I seriously think I can still compete at my current age.\n    *set ans 4\n    *goto answer\n  #They ask what it's like to be denied by Ace Armstrong so often.\n    *set ans 5\n    *goto answer\n\n*label answer\n\n*if (ans = \"1\")\n  How did you respond?\n  *choice\n    #I explained calmly that I feel I have contributed and that a good quarterback is necessary in getting a team so far.\n      The interviewer continues to prod, but you hold your ground.\n      *set Confidence %+ 5\n      *set Leadership %+ 5\n      *set Professionalism %+ 5\n      *set Team %- 5\n      *goto Schedule\n    #I objected to the term 'carried' while also acknowledging the skills of my teammates.\n      You take a long enough time to not give the interviewer the chance to counter.\n      *set Confidence %+ 5\n      *set Leadership %+ 5\n      *set Team %+ 5\n      *goto Schedule\n    #I went along with it and say that it's nice to have a team do well near the end of my career.\n      You feel dejected afterward, but you're seen as being a team player.\n      *set Confidence %- 5\n      *set Leadership %- 5\n      *set Team %+ 10\n      *set Professionalism %+ 5\n      *goto Schedule\n    #I called out the questions clearly designed to provoke me.\n      The media continues to blast you, but you feel better after calling this out.\n      *set Confidence %+ 15\n      *set Leadership %- 5\n      *set Professionalism %- 10\n      *set Media %- 10\n      *set Leadership %+ 5\n      *goto Schedule\n\n*if (ans = \"2\")\n  How did you respond?\n  *choice\n    #I said it's not a betrayal and I appreciate everything the dogs have done for me, but this is just business.\n      The fans respect your professionalism in the situation, and it somewhat heals the damage to your relationship with Dogs fans.\n      *set Fans %+ 10\n      *set Media %+ 5\n      *set Professionalism %+ 5\n      *set Team %- 5\n      *goto Schedule\n    #I said I feel the Hyenas are in a better position to win.\n      Some fans are upset with you being somewhat tactless, with others seeing you as at least being honest. Your teammates feel appreciated to some degree.\n      *set Fans %- 5\n      *set Media %- 5\n      *set Leadership %+ 5\n      *set Team %+ 15\n      *goto Schedule\n    #I pointed out some behind-the-scenes disagreements with some of the higher-ups within the organization.\n      You are seen as being somewhat unprofessional, especially with your old team.\n      *set Professionalism %-5\n      *set Fans %- 5\n      *set Leadership %+ 10\n      *set Team %- 5\n      *goto Schedule\n    #I called out the questions clearly designed to provoke me.\n      The media continues to blast you, but you feel better after calling this out.\n      *set Confidence %+ 15\n      *set Leadership %- 5\n      *set Professionalism %- 10\n      *set Media %- 10\n      *set Leadership %+ 5\n      *goto Schedule\n\n*if (ans = \"3\")\n  How did you respond?\n  *choice\n    #I stated that I made a mistake in the heat of the moment and have worked to improve since.\n      You look professional, but admitting mistakes to the media is a dangerous game.\n      *set Professionalism %+ 10\n      *set Media %- 5\n      *set Fans %- 5\n      *set Leadership %+ 5\n      *goto Schedule\n    #I disreagrded it as luck.\n      You look confident, but also unprofessional.\n      *set Professionalism %- 10\n      *set Fans %- 5\n      *set Fame %+ 10\n      *goto Schedule\n    #I congratulated my opponents on playing well.\n      You look professional but like a bit of a coward.\n      *set Professionalism %+ 10\n      *set Leadership %- 5\n      *set Fame %- 5\n      *goto Schedule\n    #I blamed my teammates.\n      You pat yourself on the back for appearing like the competent one, but look unprofessional, and your teammates are worried about your attitude.\n      *set Professionalism %- 5\n      *set Leadership %- 15\n      *set Team %- 10\n      *set Fame %+ 10\n      *set Confidence %+ 15\n      *goto Schedule\n    #I say I don't think about it often and stress the importance of 'moving on'.\n      Little comes of it, and the media seems to stop prodding.\n      *set Professionalism %+ 5\n      *set Leadership %+ 5\n      *set Leadership %+ 5\n      *set Fame %- 5\n      *goto Schedule\n    #I called out the questions clearly designed to provoke me.\n      The media continues to blast you, but you feel better after calling this out.\n      *set Confidence %+ 15\n      *set Leadership %- 5\n      *set Professionalism %- 10\n      *set Media %- 10\n      *set Leadership %+ 5\n      *goto Schedule\n\n*if (ans = \"4\")\n  How did you respond?\n  *choice\n    #I said that of course, I can.\n      The interview comes to a screeching halt as the interviewer awkwardly has nothing to go on. You can decide if this is a good thing or a bad thing.\n      *set Professionalism %+ 5\n      *set Confidence %+ 5\n      *set Fame %- 5\n      *goto Schedule\n    #I stated that I do my best to stay in good shape.\n      You look solid for the cameras, but fans begin to doubt you as you are getting old.\n      *set Professionalism %+ 5\n      *set Confidence %+ 5\n      *set Leadership %+ 5\n      *set Fame %- 10\n      *goto Schedule\n    #I asked the reporter if they can still do a good job at their age.\n      You look pretty unprofessional, and the media has a field day blasting you. At least you get more publicity than Ace for a day, though.\n      *set Professionalism %- 15\n      *set Leadership %- 5\n      *set Media %- 10\n      *set Fame %+ 15\n      *goto Schedule\n    #I said that I feel this season is probably my last chance.\n      The media begins to build a narrative around this being a possible storybook ending for you. A blessing in disguise, maybe?\n      *set Professionalism %+ 5\n      *set Fame %- 5\n      *set Media %+ 5\n      *set Confidence %- 5\n      *goto Schedule\n    #I said probably not.\n      The media rallies around you being unable to win anymore and you face public criticism.\n      *set Professionalism %+ 10\n      *set Fame %- 5\n      *set Media %+ 5\n      *set Confidence %- 15\n      *goto Schedule\n    #I called out the questions clearly designed to provoke me.\n      The media continues to blast you, but you feel better after calling this out.\n      *set Confidence %+ 15\n n*line_break\n*line_break\nWeek 16: @ Alpha Lions\n*line_break\nYour biggest rival in the last game.\n*goto Post_schedule\n\n*label Post_Schedule\n\nAfter seeing your schedule, wind down for about an hour. You don't want to do anything physical since you have practice later today. What do you do?\n\n*fake_choice\n  #Watch TV or a movie\n    You're able to escape the world for a couple of hours.\n  #Play video games\n    You win at whatever you were playing.\n  #Browse the internet\n    Some funny memes brighten your day.\n  #Communicate with friends and family\n    They're happy to hear from you.\n  #Read a book\n    It's nice and relaxing.\n  #Engage in a personal hobby  \n    You enjoy pursuing personal goals that have nothing to do with your career.\n\n\nAfter you finish, you go to practice.\n\n*goto_scene Practice\n  \n\n\n\n    \n", "week_1": "The day before the first game of the season, your team has a public appearance to make. You know from experience that this type of thing will be happening once or twice per week for the entire season. How do you feel about this?\n*fake_choice\n  #It sounds like a lot of work. I have my career to focus on, and I don't want to deal with distractions every week.\n  #It sounds great. If it was just football 24/7, I'd probably have gotten sick of it already.\n  #I'm kind of in the middle on this. I see both sides.\n  #I'm so lucky to play the game I love for so much money. It's my responsibility to give back.\n  #I hate having to 'give back' to the communities. My life's not as great as it seems, and there's so many people with more who give nothing back.\n  #I really don't have that strong an opinion. It's just part of the job.\n  #It's a lot more complicated than any of this.\n\n\n*page_break\n*if (team_name = \"Dogs\")\n  You and your team are all attending a local children's hospital, where you give autographs and let sick children and their families meet you. This has been a tradition for several years, and you've been helping your entire career. Thoughts?\n  *choice\n    #I don't exactly enjoy it, but I find it very rewarding.\n      *set Leadership %+ 10\n      *set Professionalism %+ 5\n      *set Openness %- 5\n      *goto event\n    #I love the experience, and find it very rewarding. \n      *set Openness %+ 5\n      *set Leadership %+ 5\n      *set Optimism %- 5\n      *goto event\n    #I think that its very performative. I bet many of the players and staff actually don't even care about the children and are just looking for some good publicity.\n      *set Openness %+ 15\n      *set Leadership %+ 5\n      *set Professionalism %- 10\n      *goto event\n    #Community stuff like this is just another part of the job. I have no real positive or negative feelings on it.\n      *set Professionalism %+ 5\n      *set Leadership %+ 5\n      *goto event\n\n*if (team_name = \"Hyenas\")\n  You are going to have a media day. When you were with the Dogs, you'd go to a children's hospital to give autographcs and let sick children meet you. What are your thoughts on the change?\n  *choice\n    #This might be more fun, but giving emotional support to sick children was rewarding. The media day feels so tacky.\n      *set Leadership %+ 10\n      *set Openness %+ 5\n      *set Professionalism %- 5\n      *goto event\n    #I miss actually doing something that made a difference, and hate the bureaucracy of spending time with the media. Plus, this feels like the kind of thing Ace would do. Ewww....\n      *set Leadership %+ 10\n      *set Openness %+ 10\n      *set Media %-10\n      *goto event\n    #The children's hospital was very performative and fake. But then again, so is this, so it all evens out. I just want to be on the field.\n      *set Openness %+ 15\n      *set Media %- 5\n      *set Professionalism %- 5\n      *goto event\n    #Doesn't really matter. Either way, its just part of the job.\n      *set Professionalism %+ 5\n      *set Leadership %+ 5\n      *goto event\n\n*label event\n\nRegardless of your feelings, the event begins.\n\n*if (team_name = \"Dogs\")\n  You're sent to an area for children with broken bones. As you visit some kids, one of them, aged around 8, is very blunt in their critiques of you. What's your response?\n  *choice\n    #I humour them. They're just a kid, and an injured one at that.\n      Most onlookers can tell you're humouring them, but the kid falls for it hook, line and sinker.\n      *set Professionalism %+ 10\n      *set Leadership %+ 5\n      *set Openness %- 5\n      *goto event_2\n    #I take the critiques to heart. This hurts, I'm a public figure.\n      Onlookers seem to think that you're humouring them, but you take a real hit.\n      *set Professionalism %+ 10\n      *set Confidence %- 5\n      *goto event_2\n    #I politely let them know they're being rude.\n      The kid is quiet, but you maintain your dignity...mostly. A few people look at you weird, but things could be worse.\n      *set Confidence %+ 10\n      *set Leadership %+ 5\n      *set Fans %- 5\n      *goto event_2\n    #I give token recognition to them to be polite, and then change the topic.\n      Everyone around you understands that you were trying to change the topic without being rude.\n      *set Professionalism %+ 5\n      *set Leadership %+ 5\n      *goto event_2\n\n  \n\n*if (team_name = \"Hyenas\")\n  You set up with three teammates for a set of interviews. The first interviewer is mostly focused on your two teammates. How do you feel and respond?\n  *choice\n    #I sit back. I don't have to do anything? This is easy!\n      Nothing really happens, but you enjoy what if effectively a 15 minute break.\n      *goto event_2\n    #I let the interviews happen. No need to draw attention to myself.\n      You look calm and composed in the background.\n      *set Professionalism %+ 5\n      *goto event_2\n    #I make it clear I'm there to support my teammates. Might as well do something.\n      Your teammates appreciate the help, the reporters look annoyed.\n      *set Media %- 5\n      *set Team %+ 5\n      *goto event_2\n    #I subtly try to draw attention to myself. Low risk gambit.\n      It doesn't really go anywhere, but at least it didn't backfire.\n      *goto event_2\n    #I lash out to draw attention to myself. Gotta get those headlines.\n      Oh, you certainly draw some attention to yourself, and look silly fishing for attention.\n      *set Professionalism %- 10\n      *set Media %- 5\n      *set Fans %- 5\n      *set Fame %+ 10\n      *set Openness %+ 5\n      *goto event_2\n\n\n*label event_2\n\n*if (team_name = \"Dogs\")\n  In what seems like a complete reversal, one of the children runs up to you, gives you a large hug and wants to spend all day talking to you. How do you handle it?\n  *choice\n    #I humour the kid for a socially accpetable amount of time, offer a photo together and an autograph, and politely say that I need to see other kids.\n      You're seen as professional, and even though the kids seems a little bit upset, they seem to understand.\n      *set Professionalism %+ 10\n      *set Fans %+ 5\n      *goto event_3\n    #I offer to spend the rest of the day with the kid as they asked. I'm just here to help.\n      The kid is trilled, the your teammates seem let down as you seem to take the opportunity to abandon your duty for the rest of the day.\n      *set Fans %+ 10\n      *set Team %- 5\n      *goto finish\n    #I get mad at the kid for asking.\n      Not a good look for you, as this is seen as over the top anger on your part. You're also excorted out, and face some negative feedback from the public.\n      *set Fans %- 10\n      *set Team %- 5\n      *goto finish\n\n*if (team_name = \"Hyenas\")\n  Your second interviewer focuses mostly on you, and is strangely positive. How do you handle it?\n  *choice\n    #I just go with it. With how negative everything is, I'll enjoy this opportunity.\n      The media loves it, and so do the fans.\n      *set Media %+ 5\n      *set Fans %+ 5\n      *goto event_3\n    #I remain professional, but am on the lookout for trick questions.\n      The interview seems to go off without incident.\n      *goto event_3\n    #I try to dodge the questions. Positive interview? This is suspicious. \n      People can tell you're dodging questions, and the interview goes slightly south.\n      *set Media %- 5\n      *set Fans %- 5\n      *goto event_3\n      \n*label event_3\n\n*if (team_name = \"Dogs\")\n  You're asked to do a Q&A session with all of the children who wish to attend. Thoughts?\n  *choice\n    #I'm excited for this. Sounds so rewarding.\n      *gosub trial_end\n      People love you for it, and you're showered in praise.\n      *set Media %+ 5\n      *set Fans %+ 10\n      *set Openness %- 5\n      *goto finish\n    #I'm not exactly excited, but in the name of being professional, I put on a brave face.\n      *gosub trial_end\n      People seem to fall for your smiles. You actually do manage to get some enjoyment from it.\n      *set Professionalism %+ 10\n      *set Fans %+ 5\n      *set Openness %- 5\n      *goto finish\n    #Makes no difference. Either way, its just a job.\n      *gosub trial_end\n      You make your rounds without incident.\n      *set Professionalism %+ 5\n      *goto finish\n    #I do it, but don't hide the fact that I'm not enjoying it.\n      *gosub trial_end\n      People are split, but mostly disapointed since they can see you as being upset at nothing.\n      *set Professionalism %- 10\n      *set Fans %- 5\n      *set Openness %+ 10\n      *goto finish\n    #I flat out refuse. This is going to be frusturating.\n      *gosub trial_end\n      You're seen as someone who's unprofessional to the extreme.\n      *set Professionalism %- 15\n      *set Fans %- 10\n      *set media %- 5\n      *set Openness %+ 15\n      *goto finish\n\n\n*if (team_name = \"Hyenas\")\n  Finally you get what you dreaded, an interviewer who is really negative with the questions they ask. What's your reaction?\n  *choice\n    #I give brief non-answers not giving in to their crazy mix-ups.\n      *gosub trial_end\n      Nothing really comes of it.\n      *set Fans %+ 5\n      *goto finish\n    #I explain my side without being condescending.\n      *gosub trial_end\n      You're seen as very professional in from of everyone.\n      *set Professionalism %+ 5\n      *set Fans %+ 5\n      *goto finish\n    #I explain myself by being condescending.\n      *gosub trial_end\n      You're seen as brash by fans and the media.\n      *set Professionalism %- 5\n      *set Media %- 10\n      *set Openness %+ 5\n      *goto finish\n    #I get mad and make a scene.\n      *gosub trial_end\n      Let's just say there's consequences to your reputation.\n      *set Professionalism %- 10\n      *set Media %- 15\n      *set Openness %+ 20\n      *goto finish\n\n\n*label finish\nWith that over, the game begins on Sunday.\n*page_break\n*goto_scene Game_play\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n  *label purchased\n  *return\n*page_break\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n  *return\nRemember earlier how we told you that the first portion of the game is available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n  *subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the rest of the game.[/i]\n\n*purchase_discount adfree 2023-08-10 $4.99 $2.99 purchased\n*abort\n*line_break\n\n\n", "week_10": "You're watching the news, and it feels like this week has been rather uneventful. However, that changes when the anchor changes the topic to you.\n*line_break\n*line_break\n\"In sports news today, there are rumours about ${first_name} ${last_name}. There are rumours that ${he} cheated on ${his} partner ${SO_name} with a stranger while at a hotel last night.\"\n*line_break\n*line_break\n\"Oh no, where did this come from?\" you ask yourself as you breathe not sure how these rumours could have possibly even started. You didn't cheat. You haven't even heard from ${SO_name} yet, so maybe this will wither and die. What's the plan?\n*choice\n  #Call ${SO_name} and sort this out.\n    *goto call\n  #Wait for this to die down.\n    *goto wait\n\n*label call\n\nYou decide to call ${SO_name} to clear this up. After a few rings, they pick up the phone. \"Hi honey,\" they say with a lot of genuine enthusiasm and happiness.\n*line_break\n*line_break\n\"Hello,\" you respond. You sigh before getting directly to the point. \"Listen, I don't know if you've seen the news recently, but there's been some rumours about...\"\n*line_break\n*line_break\n\"About you cheating?\" they correctly guess. \"Yeah, I heard those. I hate having my name attached to these rumours. I was hoping for a more private life. Don't get me wrong, I knew that dating you was going to be a wild ride, but I wasn't hoping to have my name smeared all over.\"\n*choice\n  #Yeah, I'd like to have the media off my back as well.\n    \"Oh I can imagine,\" ${SO_name} responds with a laugh.\n    *set SO %+ 5\n    *goto call2\n  #I understand, but it just comes with the territory.\n    \"Yeah, I guess,\" ${SO_name} responds with a sigh.\n    *set SO %+ 5\n    *goto call2\n  #So does everyone (laugh).\n    \"True,\" ${SO_name} chuckles before continuing.\n    *set Family %+ 5\n    *set SO %+ 5\n    *goto call2\n\n\n*label call2\n\"I was hoping to have a talk to you about these rumours though. I'm thinking they're probably false, but I just want to make sure,\" ${SO_name} says. You figured from the past minute or so that ${they} had come to that conclusion, but it still comes as a relief.\n*line_break\n*line_break\n\"Okay,\" you calmly respond. \"What would you like to know?\"\n*line_break\n*line_break\n\"Well, very simply, where were you last night?\"\n*line_break\n*line_break\n\"I was at home,\" you say before finish off with that you were doing. So, what were you doing?\n*fake_choice\n  #Watching TV/movies.\n    You go into details about the plot of what you watched last night. \n  #Playing video games.\n    The same game you've been playing for weeks. Geez, you need something else to do.\n  #Exercising.\n    Careful no to push yourself too hard or you'll get injured.\n  #Reading a book.\n    Good book. You're still not sure what the theme of it was, though.\n  #I went to bed early.\n    Zzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzz.\n  #I had some friends over\n    Had a trivia night. Good times.\n\n*line_break\n*line_break\n\"Alright, okay, sounds like you,\" they say in a calm voice, followed by a chucke. You've heard this enough to know that they're just joking with you. There's a brief pause before ${SO_name} continues. \"As I said, I knew it was probably just the media being the media.\"\n*line_break\n*line_break \n\"Yeah, thanks for your trust,\" you say. The two of you have a brief conversation for another 15 minutes, and then you end it. You whipe your brow after the conversation, relieved that ${SO_name} believes and trusts you.\n*goto end\n\n\n\n*label wait\n\nWithin a couple days, you don't hear anything, and you see ${SO_name} then. They bring it up almost right away, but luckily its not in an accusatory tone.\n*line_break\n*line_break\n\"I was hoping to have a talk to you about these rumours though. I'm thinking they're probably false, but I just want to make sure,\" they say.\n*line_break\n*line_break\n\"Okay,\" you calmly respond. \"What would you like to know?\"\n*line_break\n*line_break\n\"Well, very simply, where were you last night?\"\n*line_break\n*line_break\n\"I was at home,\" you say before finish off with that you were doing. So, what were you doing?\n*fake_choice\n  #Watching TV/movies\n    You go into details about the plot of what you watched last night. \n  #Playing video games\n    The same game you've been playing for weeks. Geez, you need something else to do.\n  #Exercising\n    Careful no to push yourself too hard or you'll get injured.\n  #Reading a book\n    Good book. You're still not sure what the theme of it was, though.\n  #I went to bed early\n    Zzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzz\n  #I had some friends over\n    Had a trivia night. Good times.\n\n*line_break\n*line_break\n\"Alright, okay, sounds like you,\" they say in a calm voice. There's a brief pause before they continue. \"As I said, I knew it was probably just the media being the media.\"\n*line_break \n*line_break\n\"Yeah, thanks for your trust,\" you say. The two of you have a brief conversation for another 15 minutes, and then you end it. You whipe your brow after the conversation, relieved that ${SO_name} believes and trusts you.\n*goto end\n\n\n\n\n\n*label end\n*line_break \n*line_break\nTime for the next game to start.\n*page_break\n*goto_scene Game_play", "week_11": "It's slightly more than halfway through the season. According to the team's manager, it's time to present yourself to the media. However, it's not just you. The entire team is having a media event full of interviews. How does this make you feel?\n*choice\n  #Great, I love the attention and fame I get from the media.\n    *set Media %+ 10\n    *set Openness %- 5\n    *goto part2\n  #It's okay. Just part of the job, really.\n    *set professionalism %+ 5\n    *goto part2\n  #Not AGAIN!!!\n    *set Media %- 5\n    *set Openness %+ 10\n    *goto part2\n\n*label part2\n*line_break\nYou're able to hide your real feelings for the event in the name of remaining presentable to the media. You're set up as part of a 5 player panel.  \n\n*if (team = \"Dogs\")\n  Your panel includes a defensive tackle who's been on the team for a few years, a rookie backup guard, a sophomore cornerback who plays on special teams, and a linebacker who's played in the league for a few years, but is on his first season for the Dogs.\n  *goto part3\n\n\n*if (team = \"Hyenas\")\n  Your panel includes a receiver who's been on the team for a few years, a rookie backup free safety, a sophomore linebacker who plays on special teams, and an offensive tackle who's played in the league for a few years, but is on his first season for the Hyenas.\n  *goto part3\n\n*label part3\nOne of the reporters opens by asking you a question. You currently have ${wins} wins going into week 11. It's expected that your team will need 9 wins to make the playoffs. Do you think you can make it?\n\n*choice\n  #I know that at this moment, things look bad, but I think we can make it.\n    *goto lookbad\n  #It's not going to be easy. It's never easy in this league. However, I know that the team we have is capable of it.\n    *goto noteasy\n  #Of course, we can, if we keep up what we've been doing.\n    *goto ofcourse\n  #Sadly, I don't think we can make it.\n    *goto sadly\n  #We've pretty much made it at this point.\n    *goto madeit\n  #It's important to not start to overthink things like this. We're just trying to take it one game at a time.\n    *goto dontoverthink\n\n*label lookbad\n\n*if (wins \u003c 4)\n  \"Yeah, it indeed does,\" says one reporter who calls a spade a spade at this point. \n  *line_break\n  \"Do you have any idea of what you'll do?\" asks another reporter. \n  *line_break\n  \"Yes, of course,\" you say before pausing. When there is a pause, and you realize you're expected to give a specific response, you follow with, \"The coach is having us do some new work,\" in an attempt to satisfy the press without giving away any specifics. That seems to satisfy them as they move on with the questions.\n  *set Coach %+ 5\n  *goto question3\n*if (wins \u003c 6)\n  There are no real follow-up questions to this one, given that on the surface this sounds about right.\n  *set Media %+ 5\n  *goto question3\n*if (wins = 6)\n  There's a bit of a pause before one of the other reporters asks a follow-up question. \"What do you think the odds are at this point?\"\n  *line_break\n  You pause briefly before saying \"I don't feel I'm the kind of person capable of putting a number on it right now, but it is my job to make it as likely as possible for us to make the playoffs.\" There's some note-taking by the journalists, but now real follow-up questions.\n  *set Team %+ 5\n  *goto question3\n*else\n  \"Tough?\" One of the reporters asks you. \"You have ${wins} wins right now. How could it be tough?\"\n  *line_break\n  \"It's always tough in this league,\" you say, before continuing. \"We've been doing great, but we have to keep it up.\" You recognize that although you were able to 'save' this, you likely could have started with something else that gave your team more credit and made you look more confident.\n  *goto question3\n\n*label noteasy\n\n*if (wins \u003c 4)\n  \"You're off to a poor start,\" said one of the reporters, stating the obvious.\n  *line_break\n  \"Yes,\" you say in response. \"However, it's never too late to keep pushing and move on. Many of the greatest moments in this sport are underdogs catching fire at the right time, coming back, and winning against all odds. That could be us.\"\n  *set Team %+ 5\n  *goto question3\n*if (wins \u003c 6)\n  \"You've faced challenges like this in your career many times. How does that impact your current situation?\"\n  *line_break\n  Despite feeling angry for a split second, you're able to control yourself before breaking your poker face. \"I've learned many lessons over the years. Each year I've learned something,\" you respond, trying to spin the team's losing record into a positive. Since the journalists can't really respond negatively without breaking professionalism, you've basically stood your ground.\n  *set Leadership %+ 5\n  *goto question3\n*if (wins = 6)\n  There's not really much for anyone to say, and the interview continues to the next stage.\n  *set Confidence %+ 5\n  *goto question3\n*else\n  \"You're certainly making it look easy,\" one of the reporters responds. Despite the fact that you have the opportunity to take all the credit, you're able to remain somewhat humble.\n  *line_break\n  \"We have a good team,\" you say, wanting to share the credit for the sake of professionalism. \"But we can't just rest on what we've done so far. We have to keep doing our best.\"\n  *set Team %+ 5\n  *goto question3\n\n\n\n\n*label ofcourse\n\n*if (wins \u003c 4)\n  \"But you only have ${wins} wins,\" one of the journalists says as a counter. \"How can you make the playoffs?\"\n  *line_break\n  *line_break\n  \"We just have to keep our heads up at this point,\" you say. \"Things are off to a bad start, but we have to have faith in each other.\"\n  *line_break\n  *line_break\n  Little else happens in this part of the interview, and it moves on. You feel however that you could have done better.\n  *goto question3\n\n*if (wins \u003c 6)\n  \"Your start indicates you've been having some trouble,\" someone says from the crowd of reporters. \n  *line_break\n  *line_break\n  \"It's just a start,\" you respond. \"It's how you finish that really matters,\" you say in an attempt to save face. Little else happens, and the interview moves on.\n  *set Confidence %+ 5\n  *goto question3\n\n*if (wins = 6)\n  There's a bit of a pause before a reporter says \"How do you feel about being able to keep up your current pace?\"\n  *line_break\n  *line_break\n  \"Of course I feel we can keep it up,\" you answer. Despite not backing up your claim, there's nobody questioning you.\n  *set Team %+ 5\n  *goto question3\n\n*else\n  \"That certainly seems true,\" a reporter said as if he was fishing for something to say. After he realized there was nothing more to pursuit, the interview continues.\n  *set Team %+ 5\n  *set Coach %+ 5\n  *goto question3\n\n*label sadly\n\n*if (wins \u003c 4)\n  \"Do you not have faith in your team?\" one of the reporters asks. You feel for a second he's being genuine, but then notice that he's trying to get an angry reaction out of you.\n  *line_break\n  *line_break\n  \"I have total faith in the fact that we can be a good team at this point,\" you respond hoping for the best, \"but at this point, we're a little too far behind,\" you finish.\n  *set Media %+ 5\n  *goto question3\n\n*if (wins \u003c 6)\n  \"Really?\" One of the journalists says in a voice that you can't place the tone of. Maybe he's genuinely surprised, maybe he's trying to get you to say something dumb. Either way, there's an awkwardly long silence that you decide to fill after thinking of something appropriate to say.\n  *line_break\n  *line_break\n  \"This one a tough league, and we have a tough schedule remaining,\" you say in an attempt to save yourself. The conversation moves on.\n  *goto question3\n\n*if (wins = 6)\n  There's some silence from the journalists. You have no idea of what's going on and hope to not see a backlash.\n  *goto question3\n\n*else\n  There are lots of rumbling from the journalists working the job, and you can tell you've likely messed up. You even see your teammates look at you funny after that one.\n  *set Team %- 5\n  *goto question3\n\n*label madeit\n\n*if (wins \u003c 4)\n  There's a bit of silence before one of the journalists says \"Do you think some of the other teams might be a bit strong this season?\" This obvious attempt to treat your poor record with professionalism prompts you to answer.\n  *line_break\n  *line_break\n  \"I think we're ready to make a run. We just needed a while to get started, but we're about to get hot,\" you say with an air of confidence. Everyone, including your teammates, look at you a little funny, but it doesn't effect your confident state.\n  *set Confidence %+ 5\n  *goto question3\n\n*if (wins \u003c 6)\n  \"We're ready to get hot, and it's the perfect time to do so,\" you say with a large smile on your face, unwavering confidence on your part. There are some heavy sighs from the journalists, but the interviews move on.\n  *set Confidence %+ 5\n  *goto question3\n\n*if (wins = 6)\n  One of the reporters asks you in a very neutral tone, \"What do you think of your opponents?\"\n  *line_break\n  *line_break\n  \"They're good,\" you say, \"but we know how to handle them. This is our year!\" Your enthusiasm seems to transfer to your teammates, who show some smiles.\n  *set Team %+ 5\n  *goto question3\n*else\n  \"You have some strong opponents,\" one of the reporters says as if trying to bait you into a trap.\n  *line_break\n  *line_break\n  \"I'm aware, but we can handle it,\" you say in a safe tone before letting the interview continue.\n  *set Team %+ 5\n  *goto question3\n  \n\n*label dontoverthink\n\nGiven that you've basically given a non-answer to a non-question, the journalists see that there's nothing to press you on, and the interviews continue.\n\n*goto question3\n\n*label question3\n*page_break\n*line_break\nAfter your teammates are asked questions individually, you wait patiently for your turn. When it comes, you're asked about your past.\n*line_break\n\n*if (team = \"Dogs\")\n\n  \"After years of disappointment, do you think this is finally your year?\"\n  *fake_choice\n    #I'm certainly doing what I can to make it that way.\n    #Of course. I'm ready for my storybook ending.\n    #I certainly hope it is.\n    #I'll do what I can and not worry about it too much.\n  \n  There's a pause after you answer the question, and some notes are taken, but such a vague answer did nothing to give the media something to spin. \"Is there anything special about this year?\"\n  *fake_choice\n    #There's never anything special. You just have to do what you can, try your hardest and hope for the best.\n    #I have a feeling deep within me that this is our year.\n    #There's nothing special about any year. We still have to let it play out.\n    #I feel the team is better put together this year.\n  Growing tired of you giving non-answers, the media continues with the interviews, moving on to your teammates as the day finishes.\n  *goto end\n\n\n*if (team = \"Hyenas\")\n\n  \"Do you feel as if changing teams improved your chances of winning?\"\n  *fake_choice\n    #I just needed a fresh start. I stand by my choice.\n    #I needed a change of scenery. \n    #You can never tell these things until after.\n    \n\n\n*label end\nTime for the next game to start.\n*page_break\n*goto_scene Game_play", "week_12": "You have nothing planned this week, so you decide to spend time with ${SO_name} and your family. You're relieved to finally have some downtime that you can spend time with your family. You choose to sit beside ${SO_name} during dinner, where you all choose to have the TV set to the news with the sound on.  Luckily, there's no mention of you or Ace during the sports section. At least, not yet. You and your family begin discussing random stuff, and your mom asks when you and ${SO_name} are getting married. You look over at ${SO_name} who seems slightly uncomfortable. You and ${SO_name} have only talked about it in passing, and were going to start discussing it at the end of this season after you retire. What do you do?\n\n*choice\n  #I say that we're still talking about it. I don't want to give a full answer now.\n    It seems to keep her quiet, and ${SO_name} feels relieved that there's no direct answer given.\n    *set Family %+ 5\n    *set SO %+ 5\n    *goto part2\n  #I say we haven't talked about it yet. Hopefully, it will buy us some time.\n    \"Really?\" your mom asks. \n    *line_break\n    \"Yes,\" you respond. \"We're still sorting out if it's even right for us.\" Your mom seems upset, but ${SO_name} seems highly relieved.\n    *set SO%+ 10\n    *goto part2\n  #I say we'll talk about it after I retire from football. It's honest but doesn't give too much information.\n    \"Okay...\" your mom says, sounding kind of disappointed but still buying the explaination, but but really just buys you time.\n    *set SO %+ 10\n    *set Openness %+ 5\n    *goto part2\n  #I say we'll get married after I retire from football. It might be true, it might not, but it'll make mom happy.\n    Your mom is really excited. So excited, that she doesn't even notice that ${SO_name} is uncomfortable. You notice though and immediately regret your choice.\n    *set Family %+ 10\n    *goto part2\n  #I tell her it's a private issue and to not discuss it. AT least not yet.\n    The topic immediately changes, and your mom looks upset. ${SO_name} is majorly relieved, however.\n    *set Family %- 5\n    *set SO %+ 15\n    *goto part2\n\n*label part2\n\nAfter that slightly awkward start to the conversation, things settle back into a regular family dinner. \"Funny that there's the potential for conflict,\" you think to yourself. \"It's not Thanksgiving, why are people arguing?\" You give yourself a metaphorical pat on the back for making such a funny joke in your head. Given the fact that we're discussing Thanksgiving though, that brings up an important point: What food is your main course at the family meal?\n*fake_choice\n  #Chicken\n  #Sandwiches\n  #Mixed veggies\n  #Pizza\n  #Pasta\n  \n\nMmmmmm, that sounds delicious. Good choice. For dessert? I know you're a pro athlete, but you're with family, so today can be a 'cheat day'.\n*fake_choice\n  #Pie\n  #Cake\n  #Cookies\n    \nSounds great!\n*line_break\n\"${first_name}!\" you hear from the living room. You're able to identify the voice as belonging to your sister, and it seems urgent. You rush over right away. \"Look!\" she says, pointing to the TV while turning up the volume. You see Ace Armstrong on screen. \"Of course,\" you say to yourself, upset not with your sister for calling you over, but with Ace being on TV. Actually, this is even worse than usual. Most of the time, he's just talking to the media, but the media wanted to interview him, and they're asking him the same nonsense questions they ask you. Here you're quickly able to determine that he bought out a half hour of time in order to promote himself. You knew he was egotistical, but this is bad even for him.\n*line_break\n*line_break\n\"As you can see, I'm ready to win it all again,\" Ace says as soon as the volume comes on. You see the wall behind him decorated in Flag Bearers colours and, clothes that also bare their logo. There's also a table in the background, holding each of his individual awards, and championships. He continues to drone on about his history.\n*line_break\n*line_break\n\"Great, just great,\" you say to yourself.\n*line_break\n*line_break\n\"Are you mad at me for calling you over?\" your sister asks.\n*line_break\n*line_break\n\"No, not at all,\" you say in a very straightforward voice. \"It's probably best I see this. It'll keep me motivated to defeat him,\" you answer, somewhat getting excited at the idea of finally defeating him after he's built himself up so much. You pause for a brief second before turning to her again saying \"Thanks.\"\n*line_break\n*line_break\nThe program on TV continues. \"I don't want to say that I'm the GOAT or anything. In fact, I hate the term. It implies that everyone agrees on who the greatest is and that people even have these discussions. I'm just here for your entertainment.\" You think to yourself about how he's obviously lying and just putting on a good show for the camera.\n*line_break\n*line_break\nYou imitate him. \"Me-mah-me-mah. Me me me me me me me me,\" you say in an intentionally baby-ish voice before switching back to your normal voice to ask \"How does anyone believe him?\"\n*line_break\n*line_break\n\"Because ordinary people aren't as invested in this as you,\" your sister says. You turn to her, intrigued as she continues her explanation. \"For you, your job and identity are constantly tied to him. That's fine, nobody would ever make fun of you for it given your situation. However, for 99% of people, you and he are both 'just another celebrity who they see sometimes'. When they get home from work, they really don't care, unless they're fans of the Flag Bearers or the ${team_name}. Even then, it's just a means of escapism. You don't care about ordinary people's lives very much, and you have to accept, they don't care about yours and Ace's as much as you think they do.\"\n*line_break\n*line_break\nHow do you feel about being told this?\n*fake_choice\n  #I don't like it. It feels like I'm failing as a celebrity if nobody cares.\n  #It's actually a bit of a relief. I feel like I have some freedom from the public eye.\n  #It's a bit of a combination of both. It's complicated.\n  #Honesltly, I never cared either way.\nYou nod before saying \"You're right,\" in a slightly dejected tone before turning your attention back to Ace.\n*line_break\n*line_break\n\"I might even be back next year,\" Ace said. You hear some cheering in the background, but it's obviously a sound effect and not a genuine crowd.\n*line_break\n*line_break\nDo you turn the TV off at this point?\n*choice\n  #Yes, Ace is so annoying and I hate seeing him on screen. I'd rather spend time with my family, especially since I don't get to do that very often.\n    You turn the TV off and continue to spend time with your family.\n    *set Family %+ 5\n    *goto end\n  #No, I have to see this.\n    \"I gotta see this,\" you say.\n    *line_break\n    \"Alright, have fun superstar,\" your sister says gently hitting the back of your head in a joking way as she goes back to see the rest of the family.\n    *goto continue\n\n*label continue\n\n*line_break\n*line_break\nYou continue watching Ace make a show for the cameras, with sound effects and over-the-op fake reactions. You don't recognize the supposed journalists following him, and you think that they're likely simply new. You then do a Google search on their names and recognize that they are in fact simply paid unknown actors who didn't make it in Hollywood. Typical of Ace, going all the way to create false immersion and getting people hyped for what is effectively nothing.\n*line_break\n*line_break\nThe rest of the show seems like a bit of a drag. Ace glorifies himself as much as he usually does. He tells about how much he loves his fans, how much he loves the media, how much he loves football, and how much he loves his team. None of it honest. However, its what he says at the end that gets you.\n*line_break\n*line_break\n\"Before I'd go, I'd just like to say one thing: Good game ${first_name} ${last_name}. It was tough to beat you four times in the playoffs,\" he says.\n*line_break\n*line_break\n\"Four times?\" you say, knowing that it's only been three. It doesn't take you any time to figure out that the fourth time is beating you again this time. \"Okay, it's on,\" you say as the program closes and the credits begin to roll.\n*goto end\n\n\n\n*label end\nYou finish dinner with your family, and the rest of the week goes on without incident.\n*line_break\n*line_break\nTime for the next game to start.\n*page_break\n*goto_scene Game_play", "week_13": "Okay, you've decided to schedule a check-up on Monday with doctors not employed by the ${team_name} in order to get an unbiased opinion on your career, and if you should continue. You think it's best that you retire, but feel that a doctor would be the best one to make the decision. The guys from ${team_name} keep saying that you're going to be fine, but you want the opinion of someone who doesn't have something to gain by lying to you. \n*line_break\n*line_break\nYou walk into the office and take a seat. You're wearing a trench coat and hat to prevent people from recognizing you. You also chose a fake name. What first name did you pick?\n\n*temp first \"Fake\"\n*temp last \"Fake\"\n*label fake_1\n*input_text first\n\n*label fake_2\nAnd what about your fake last name?\n*input_text last\n\n\n*label wait\nYou wait in a chair. You've forgotten how long it can take to see a doctor when they have other appointments. You're so used to the team doctor who will always see you immediately. Of course, the TV is showing a program that has Ace on it. Ace buying more time air really doesn't bother you, does it? You're used to it, aren't you?\n*fake_choice\n  #Not really. He does this a lot, especially this year apparently.\n  #Yeah, actually, it kind of does. He's annoying.\n  #I'm totally indifferent. It's just noise at this point.\n  #I actually feel slightly relieved. I like knowing that it's getting harder and harder for him to be able to feed his ego.\n  #Wait, he's not practising? Perfect!\n\nAfter ignoring Ace's TV bit and keeping to yourself for a half hour, one of the secretaries calls you by your fake name. \"${first} ${last}!\" she says. You walk up to her and she quickly says \"Go over to room number 4,\" as if she's on autopilot. After you reach room 4 and walk in, the doctor looks at you a little bit weirdly. You close the door behind you, and take off your hat and trench coat, going down to your ordinary street clothes.\n*line_break\n*line_break\n\"${first_name} ${last_name}?\" he says in a calm quiet voice, clearly recognizing you immediately.\n*line_break\n*line_break\n\"Yes,\" you say, pushing your finger against your lips to make a 'ssshhhhh' gesture.\n*line_break\n*line_break\n\"Don't worry,\" he says, \"You're not even close to the first person to come here in disguise. I can't even remember the last time I went a month without something like this happening.\" You breathe a sigh of relief before sitting down for your appointment. \"What is it you came here for?\" he asks.\n*line_break\n*line_break\n\"I was hoping to get an unbiased opinion on my body's condition,\" you say. \"Specifically, I was hoping to see if this should be my last season, as the team doctors are saying I should play another one, but I feel as if they're incentivized to say that.\"\n*line_break\n*line_break\n\"You seem to be right to the point,\" the doctor says, \"So in the name of not wasting time, let's get the tests started right away.\n*page_break\n*line_break\nAfter the tests are done, you grab your trench coat and hat and walk out of the doctor's office without incident.\n*line_break\n*line_break\nA few days later, you get the results with notes. You see some X-Rays and images of your muscles and joints. Certain things are highlighted or circled, with numbers and codes attached, but you're unable to understand their meanings. There are notes attached, saying the following:\n*line_break\n*line_break\n\"Dear ${first_name} ${last_name},\n*line_break\n*line_break\n\"This is an important message about your current health situation. As you can see in diagram 1A, you have the knees of a 60-year-old. Each season you extend your career after this will age your knees an extra 2 years. Your shoulders will likely need surgery if you play another season. You have had 3 minor concussions, the full effects of which will compound with time. The damage to your wrist will increase, and your chances of needing a brace will increase each year.\"\n*line_break\n*line_break\nYou cringe when looking at your current physical symptoms. You can't see all of these but aren't about to question the doctor's orders. You've already dealt with the negative side effects of pain killers, and have had a couple of seasons shortened by injuries. The concussions are really getting to you, and the thought of the occasional headaches getting worse and into actual damage is scary. You continue to read, and figure that you'll face a series of injuries that will make day-to-day tasks very difficult by the time you're 60, especially if you don't retire soon. You breathe and recognize what you have to do.\n*line_break\n*line_break\nYou close the report and call your agent. \"I'd like to retire at the end of this season,\" you say.\n*line_break\n*line_break\nAfter a brief pause, he responds. \"If you're sure about this, I can arrange a meeting for you to announce it publicly.\" You think about it for a second, before deciding.\n*choice\n  #Yes, please let me make an announcement tomorrow.\n    *goto announcement\n  #No, let me finish my career in peace. \n    Your agent listens to you and you have some moments of peace.\n    *goto end\n\n*label announcement\nThe next day you call a press release to speak about your retirement. You're careful to only invite journalists who have either supported you or at least been unbiased since you don't want the whole thing to devolve into a media frenzy. You step up to the platform with the microphone, inhale, exhale and ready yourself.\n*line_break\n*line_break\n\"Thank you all for attending,\" you say before getting to the point. This isn't to soften the blow or out of social obligation, you're just emotional about this moment. You knew from the start of the season that this was the most likely scenario, but that can only help calm you down so much. \"After much debate, and thought, I have decided that this is going to be my final year in the league.\" The journalists don't say much, other than some mumbling amongst themselves, but you do see the flashes of a few cameras. \"It was not an easy decision to step away from the game that I love,\" you say, knowing you got what was likely the hardest part out of the way, \"but it is what I feel is best for myself and my family.\"\n*line_break\n*line_break\n\"What do you make of your career so far? Many people call you the greatest player to never win a championship. Are you proud of your accomplishments?\" asked one of the journalists.\n*line_break\n*line_break\nYou answer her question very promptly, having somewhat prepared for this one, \"Of course I am. As you stated, I currently do not have a championship under my belt. However, I feel as if I showed my talent, and I've played alongside many great teams. Winning a championship this year would be simply icing on the great cake that is my career.\"\n*line_break\n*line_break\nYou immediately get worried that someone will ask if your career was a piece of cake, and use it as a chance to say you bashed your opponents, but nobody says so. \"Do you feel you will get into coaching?\" one of the reporters asks.\n*fake_choice\n  #Yes, I feel coaching is a great way to stay connected with the game.\n  #No, I feel this chapter in my life has passed.\n  #I'm not sure. I might get into commentary instead.\n  #I'm not thinking about that at this moment. I'll likely wait a season or two and see if the itch to come back is one that needs to be scratched.\n\nYou see the flashes of a few more cameras go off after answering that question. You answer a few more standard questions, and then wrap it all up. The rest of the week goes on without incident.\n*line_break\n\n*label end\nTime for the next game to start.\n*page_break\n*goto_scene Game_play", "week_14": "\"Another media event?\" you overhear one of your receivers ask after the coach brings him to the side. \"Is there anyone who'll be joining me?\" he asks. After a pause, you overhear him again. \"${first_name} ${last_name}!?\" The coach begins to respond detailing that the next day, the two of you will be speaking with the media about the end of this season. Given how quickly the end of the season is coming, you understand the need but are getting sick of the crazy amount of media events.\n*line_break\n*line_break\nYou stop paying attention to the conversation. \"Oh no,\" you say to yourself, \"Please let this be the last one,\" you whisper, knowing that it's a fool's hope.\n*page_break\n*line_break\nThe next day, you walk in prepared in a full suit knowing that you're going to be talking about your team's future for the rest of the season. There are only going to be a couple of questions at most, but you're still nervous.\n*line_break\n*line_break\nThe conference begins and one of the reporters asks you \"What are your chances of making the playoffs this year?\"\n*choice\n  #\"Playoffs?! Seriously!? Playoffs? We can barely even win a game!\"\n    *goto mora\n  #\"I'm not really focused on our chances, I'm just trying to take this one game at a time.\"\n    *goto poor\n  #\"I'm hoping we can go in with some momentum.\"\n    *goto okay\n  #\"They're great!\"\n    *goto great\n\n*label mora\n\n*if (wins \u003c 5)\n  The media personalities seem slightly perplexed, some look as if they're attempting to hold back laughter. You're confused as to what's going on for a little while, and there are no more questions, as the media spends the rest of their time asking your receiver questions. It's not until the next day that you determine your rant has become a meme. Embarrassed, you have a bad feeling that this will be something that people will associate you with for years even after you retire.\n  *set Team %- 5\n  *set Coach %- 5\n  *goto end\n*if (wins \u003c 7)\n  You can see some of the media personalities start to stifle their laughter. \"Thank you for your honesty,\" someone in the crowd says in an almost mocking way before all the members of the media begin to turn towards your teammate. The next morning, you recognize the interview, with the news stories focusing on your 'real' response. You however can tell that this will be used to create jokes in the future about struggling teams. You can see that you'll likely be regretting this for a few years, but at least some of the current media companies are talking about your performance off the field instead of on it.\n  *set Team %- 5\n  *set Coach %- 5\n  *set Media %+ 5\n  *goto end\n*if (wins \u003c 9)\n  \"This is despite the fact that you have a respectable record,\" one of the reporters says. \"Are you saying that your team will drop off at the last minute, or that this team is not as good as you say?\"\n  *line_break\n  \"I am not saying either of those,\" you say in an attempt to save face, realizing that what you've said is most likely left to be considered in a negative light. \"What I'm saying is that I hope to take this one game at a time in order to not lose focus. I feel that this will maximize our chances to win future games.\"  You feel as if this was a great way to save yourself from a media storm. It seems as if you were successful, at least until the next morning, when the focus of the media is on your brutal words and they're taken out of context. You realize that this is likely going to be remembered for years and mostly as something for people to make fun of.\n  *set Team %- 5\n  *set Media %+ 5\n  *goto end\n*if (wins \u003c 11)\n  There's a bit of a stunned silence immediately after you finish before one of the journalists responds with \"What makes you say that, given your team's record?\"\n  *line_break\n  You inhale and exhale before beginning to say something to attempt to save yourself, \"Many of our wins have been very close, and we've had to be very careful to not let our guards down. The final stretch is always tough, and the playoffs are always against the top teams in the league. We have to keep our concentration,\" you say. You're worried that you likely weren't able to save your initial bad wording, and the next morning, you recognize that you were right. Every news station only shows the clip of your initial response, which runs in contrast to your team's winning record. You're going to be regretting this every time its brought up, which will be for several years.\n  *set Team %- 10\n  *set Media %+ 5\n  *goto end\n*else\n  Everyone present is in complete shock. This isn't just the media that's present. You can even see the shock on your teammate's face. After a few seconds, the shock seems to fade slowly, until someone says \"You're on one of the best teams in the league. Is there something that you're insinuating? Who do you place the responsibility on?\"\n  *line_break\n  You let out a loud exhale and then a slow inhale in order to calm yourself before clarifying what it was you meant. \"I am not holding anyone responsible for anything. This is a tough league, and most of our games have been close. We have to focus as much on the moment, and not think too far ahead. If we think of the championship early in the play
