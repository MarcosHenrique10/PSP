if (kickoff = \"2\")\n  *goto kickoff\n*else\n  *goto kickoff_opp\n\n*label idk\n\nThere's not much of a response.\n*line_break\n*if (kickoff = \"2\")\n  *goto kickoff\n*else\n  *goto kickoff_opp\n\n*label half_4_event\n\nDuring your coach's usual spiel, he yells unusually loud at once of your linebackers. YOu know that the linebacker has been doing decently, but the coach has decided to single him out anyway. Do you jump in and defend him?\n\n*choice\n  #Yes. The blame should go to someone else.\n    *goto stick_up\n  #No. I'm not sticking my neck out for anyone else.\n    *goto no_stick_up\n\n*label stick_up\n\nThe player appreciates it, but the coach is mad at you. Halftime ends awkwardly.\n*set coach %- 10\n*set team %+ 10\n*if (kickoff = \"2\")\n  *goto kickoff\n*else\n  *goto kickoff_opp\n\n\n*label no_stick_up\n\nThe coach continues to reel into him, and he just takes it. Halftime ends awkwardly.\n*if (kickoff = \"2\")\n  *goto kickoff\n*else\n  *goto kickoff_opp\n\n*label half_5_event\n\nWhen you're about to go into the locker room, ${SO_name} waves at you from the front row, trying to get your attention. You recognize that's not where ${their} seats were, and walk up to ${them}.\n*line_break\n\"Hello,\" you say after walking over. \"You wanted to see me?\"\n*line_break\n\"No,\" ${SO_name} says, somewhat embarrassed. \"Just wanted to say hi.\" What do you say in response?\n*fake_choice\n  #Say \"oh, sorry,\" and leave.\n  #Laugh it off and continue with your day.\n  #Talk for about 30 seconds in an attempt to not make things awkward.\n\nTurns out you were able to save the interaction, and ${SO_name} seems to have ${their} embarrassment waved off. What do you think of this interaction?\n*choice\n  #It happens. Best to not make a big deal out of it.\n    Yeah, nothing seems to come of it, so best to let it go.\n    *set optimism %+ 5\n    *if (kickoff = \"2\")\n      *goto kickoff\n    *else\n      *goto kickoff_opp\n  #Its kind of funny actually.\n    That's one way of looking at it. You even tell a teammate what goes on, and he thinks it's a little funny.\n    *set optimism %+ 10\n    *if (kickoff = \"2\")\n      *goto kickoff\n    *else\n      *goto kickoff_opp\n  #Its pretty annoying.\n    You seem kind of grumpy for the first bit of half-time.\n    *set optimism %- 5\n    *if (kickoff = \"2\")\n      *goto kickoff\n    *else\n      *goto kickoff_opp\n\n*label half_6_event\n\nTwo of your teammates get into a large argument at the start of halftime. You can't tell right away what they're arguing about, and you know the coach will arrive in about a minute. Neither player seems intent on backing down. What do you do?\n*choice\n  #I try to break it up. I don't want this to disrupt the team's chemistry or the coach's control once he gets here.\n    *goto get_involved\n  #I ignore it. If I do anything, I'll just end up making things worse and causing myself a headache.\n    *goto dont_get_involved\n  #I wait to hear what they're fighting about.\n    *goto hear_out\n\n\n\n*label get_involved\n\nIt turns out that one of the players involved, a defensive tackle, missed a sack opportunity. The defensive back giving him an earful is mad because apparently the quarterback escaping gave the receiver the defensive back was covering enough time to get open. \n*line_break\n*label get_involved_2\n\nHow do you choose to get involved?\n*choice\n  #I just try to calm everyone down without taking sides.\n    *goto calm_down\n  #I say that the coach will bring it up if its an issue.\n    *goto let_coach_handle\n  #I take the side of the tackle. Its the defensive back's job to cover the receiver. He can't blame anyone else. He's lucky the tackle even broke through at all.\n    *goto side_w_tackle\n  #I take the side of the defensive back. He can't cover forever, and the tackle should have gotten the quarterback after breaking through.\n    *goto side_w_db\n  #On second though, I'm not getting involved.\n    *goto dont_get_involved\n\n*label dont_get_involved\n\nThe coach comes in and breaks up the fight, but doesn't resolve it, instead just telling both players to shut up. Things are awkward for the rest of halftime, but at least its over.\n*if (kickoff = \"2\")\n  *goto kickoff\n*else\n  *goto kickoff_opp\n\n*label hear_out\n\nIt turns out that one of the players involved, a defensive tackle, missed a sack opportunity. The defensive back giving him an earful is mad because aparently the quarterback escaping gave the receiver the defensive back was covering enough time to get open. Do you get involved now?\n*choice\n  #Yes, I have something to say.\n    *goto get_involved_2\n  #No, this doesn't concern me.\n    *goto dont_get_involved\n\n*label calm_down\n\nYou're able to calm things down before the coach gets there.\n*set team %+5\n*if (kickoff = \"2\")\n  *goto kickoff\n*else\n  *goto kickoff_opp\n\n*label let_coach_handle\n\nThe coach doesn't even mention it, and the players both seem to forget it afterwards.\n*if (kickoff = \"2\")\n  *goto kickoff\n*else\n  *goto kickoff_opp\n\n*label side_w_tackle\n\nThe defensive back is pretty mad at you, but the tackle is happy.\n*if (kickoff = \"2\")\n  *goto kickoff\n*else\n  *goto kickoff_opp\n\n*label side_w_db\n\nThe tackle is pretty mad at you, but the defensive back is happy.\n*if (kickoff = \"2\")\n  *goto kickoff\n*else\n  *goto kickoff_opp\n\n\n*label half_7_event\n\nThe coach decides that instead of changing tactics, you'll listen to the halftime show on the radio for a few minutes. You hear a mixture of responses from the other players. How do you feel about this?\n*fake_choice\n  #It's a little bit weird, but okay, whatever the coach says.\n  #I love it. The normal stuff is so boring.\n  #I like it. Nice change of pace.\n  #Sounds nice to find out what others think.\n  #Sounds like a bad idea to find out what others think.\n  #Are you kidding me? This is dumb. We should be focused on strategy and winning.\n\nWhen the coach turns the radio on, you can tell right away that the show is on commercials. You look at one of your defensive ends who you recognize as having a very sarcastic sense of humour open his mouth as if ready to say something, and then close it as if he had thought better of it. Other players are quietly grumbling, but nobody seems to have the courage to say anything loud enough to be distinctly heard. After about a minute, the show returns to normal.\n*line_break\n\"Welcome back, folks,\" the host starts out after the musical theme plays. \"Now, one thing that can clearly be seen is that ${first_name} ${last_name} has lost a few steps. We thought beforehand that he was able to stand up to Ace, but now he's fallen off harder.\"\n*line_break\nYou can see the rest of the team look over at you. Most of them seem more understanding and are simply reacting naturally as they look back right away. The coach turns off the radio before the host continues. \"Okay, never mind,\" the coach says.\n*line_break\nThere is a brief pause before a random player from the special team unit asks \"Did you know that was going to happen?\"\n*line_break\n\"No,\" says the coach. He then switches right back to the usual changing of strategies and tries to carry on with the usual halftime stuff.\n*if (kickoff = \"2\")\n  *goto kickoff\n*else\n  *goto kickoff_opp\n\n*label half_8_event\n\nYour team going through the usual halftime activity of the coach changing tactics in order to adapt in order to the opponent, when suddenly you can hear some rumbling from outside. It starts to build up and get louder. After some time, you're finally able to figure out that there's a riot happening in the stands. How do you feel about this?\n*if (location = \"home\")\n  *choice\n    #This is embarrassing, and is going to be a public relations nightmare for the team.\n      *goto riot_end\n    #Is this because of how the team's been doing?\n      *goto riot_end\n    #Why is this going on?\n      *goto riot_end\n    #I just hope everyone is okay.\n      *goto riot_end\n\n*else\n  *choice\n    #This must be embarrassing for the other team.\n      *goto riot_end\n    #Does this have to do with the current game or with the other team in general?\n      *goto riot_end\n    #Why is this going on?\n      *goto riot_end\n    #I just hope everyone is okay.\n      *goto riot_end\n\n*label riot_end\nYour team continues without interfering, and when you return to the field at the end of halftime, you see there's less damage than you expected, although there is a heavy police presence. The game seems to continue regardless.\n*if (kickoff = \"2\")\n  *goto kickoff\n*else\n  *goto kickoff_opp\n\n\n\n*label half_9_event\n\nDuring halftime, the coach doesn't give very much feedback, and also doesn't make any adjustments. You think this is strange, but decide to go with it.\n*if (kickoff = \"2\")\n  *goto kickoff\n*else\n  *goto kickoff_opp\n\n\n\n\n*label half_10_event\n\nThe coach goes beyond his usual self, where he makes slight adjustments, and instead tears down the entire gameplan in favour of a totally new one. You're not sure why, but you hope it's for the best.\n*if (kickoff = \"2\")\n  *goto kickoff\n*else\n  *goto kickoff_opp\n\n*label half_nothing\n\nNothing unusual happens at halftime, and you're able to focus on the game. The coach gives his usual generic rant. You found these types of things very exciting when you were younger, but now they're just part of the background.\n*line_break\n*if (kickoff = \"2\")\n  *goto kickoff\n*else\n  *goto kickoff_opp\n\n*label safety_opp\n*set opp_score +2\n*goto crowd_safety_opponent\n\n*label safety \n*set score +2\n*goto crowd_safety\n\n*label crowd_interception\n\n*if (location = \"home\")\n  *rand percentage 1 5\n  *if (percentage = 1)\n    The crowd boos extremely loudly for several seconds. They're still doing so by the time you reach the bench.\n    *goto play_quarter\n  *if (percentage = 2)\n    There is an instant, very loud boo that goes away quickly.\n    *goto play_quarter\n  *if (percentage = 3)\n    The crowd boos, but not as loud as you would have expected.\n    *goto play_quarter\n  *if (percentage = 4)\n    The boo that follows is even louder than you expected to hear.\n    *goto play_quarter\n  *else\n    The crowd is shockingly quiet, barely booing at all.\n    *goto play_quarter\n\n\n*else\n  *rand percentage 1 5\n  *if (percentage = 1)\n    The crowd erupts into a loud cheer. They're still cheering by the time you reach the bench.\n    *goto play_quarter\n  *if (percentage = 2)\n    There is an instant, very loud cheer of excitement that fades quickly.\n    *goto play_quarter\n  *if (percentage = 3)\n    The crowd cheers, but not as loud as you would have expected.\n    *goto play_quarter\n  *if (percentage = 4)\n    The cheer that follows is even louder than you expected to hear.\n    *goto play_quarter\n  *else\n    The crowd is shockingly quiet, barely cheering at all.\n    *goto play_quarter\n\n*label crowd_touchdown\n\n*if (location = \"home\")\n  *rand percentage 1 5\n  *if (percentage = 1)\n    The crowd erupts into an extremely loud cheer lasting several seconds, that's still going by the time the extra point is ready to be kicked.\n    *goto extra_point\n  *if (percentage = 2)\n    The crowd's cheer showers you and your team in praise, but doesn't last very long. It's actually stopped before you reach the bench.\n    *goto extra_point\n  *if (percentage = 3)\n    The crowd is silent for a brief moment as if in disbelief, and then they erupt into a large cheer that slowly quiets down.\n    *goto extra_point\n  *if (percentage = 4)\n    The crowd cheers relatively loud, but not quite as loud as you would have expected for a touchdown.\n    *goto extra_point\n  *else\n    The crowd's cheer isn't as loud as you would have expected, but it lasts a long time. There's actually a longer pause than usual befor ethe extra point is kicked.\n    *goto extra_point\n\n*else\n  *rand percentage 1 5\n  *if (percentage = 1)\n    The crowd erupts into an extremely loud lasting several seconds, but nobody on your team cares, since you're all too busy celebrating.\n    *goto extra_point\n  *if (percentage = 2)\n    The crowd's cheer showers both teams in boos after the score.\n    *goto extra_point\n  *if (percentage = 3)\n    The crowd is silent for a brief moment as if in disbelief, and then they start booing as if in unison.\n    *goto extra_point\n  *if (percentage = 4)\n    The crowd boos relatively loud, but not quite as loud as you would have expected for a touchdown.\n    *goto extra_point\n  *else\n    The crowd's boos aren't as loud as you would have expected, but they last a long time.\n    *goto extra_point\n\n    \n\n*label crowd_fieldgoal\n\n*if (location = \"home\")\n  *rand percentage 1 5\n  *if (percentage = 1)\n    The crowd applauds your team's kicker.\n    *goto kickoff\n  *if (percentage = 2)\n    The crowd cheers relatively quickly after the ball goes through the uprights.\n    *goto kickoff\n  *if (percentage = 3)\n    The crowd is quite excited for what is considered a relatively small score.\n    *goto kickoff\n  *if (percentage = 4)\n    The crowd cheers and applauds.\n    *goto kickoff\n  *else\n    The crowd gives a bit of applause and it lasts longer than you expected.\n    *goto kickoff\n\n*else\n  *rand percentage\n  *if (percentage = 1)\n    The crowd is pretty quiet.\n    *goto kickoff\n  *if (percentage = 2)\n    The crowd seems more to grumble rather than boo.\n    *goto kickoff\n  *if (percentage = 3)\n    The crowd boos slightly, but doesn't seem that bothered.\n    *goto kickoff\n  *if (percentage = 4)\n    The crowd lets out a collective groan but doesn't boo.\n    *goto kickoff\n  *else\n    The crowd is almost completely silent. You're not sure if it's stunned silence or they think that it's not that big of a deal.\n    *goto kickoff\n\n*label crowd_fieldgoal_opponent\n\n*if (location = \"home\")\n  *rand percentage 1 5\n  *if (percentage = 1)\n    The crowd is almost silent.\n    *goto kickoff_opp\n  *if (percentage = 2)\n    The crowd grumbles slightly.\n    *goto kickoff_opp\n  *if (percentage = 3)\n    The crowd is quiet for a little bit.\n    *goto kickoff_opp\n  *if (percentage = 4)\n    The crowd boos slightly.\n    *goto kickoff_opp\n  *else\n    The crowd seems to brush it off, with very little response.\n    *goto kickoff_opp\n\n*else\n  *rand percentage 1 5\n  *if (percentage = 1)\n    The crowd cheers for their kicker\n    *goto kickoff_opp\n  *if (percentage = 2)\n    The crowd applauds the kick.\n    *goto kickoff_opp\n  *if (percentage = 3)\n    The crowd cheers as the ball sails through the uprights.\n    *goto kickoff_opp\n  *if (percentage = 4)\n    The crowd quietly cheers.\n    *goto kickoff_opp\n  *else\n    The crowd loudly applauds.\n    *goto kickoff_opp\n\n\n*label crowd_safety\n\n*if (location = \"home\")\n  *rand percentage 1 5\n  *if (percentage = 1)\n    The crowd cheers wildly and your defense celebrates the score.\n    *goto kickoff_opp\n  *if (percentage = 2)\n    The crowd's cheer both starts and ends quite abruptly.\n    *goto kickoff_opp\n  *if (percentage = 3)\n    The crowd applauds like crazy at the unexpected score.\n    *goto kickoff_opp\n  *if (percentage = 4)\n    The crowd lets out a loud roar of approval as your defense experiences a rare score.\n    *goto kickoff_opp\n  *else\n    The crowd wildly shows excitement at the two points.\n    *goto kickoff_opp\n\n*else\n  *rand percentage 1 5\n  *if (percentage = 1)\n    The crowd boos loudly and your defense celebrates the score.\n    *goto kickoff_opp\n  *if (percentage = 2)\n    The crowd's boo both starts and ends quite abruptly.\n    *goto kickoff_opp\n  *if (percentage = 3)\n    The crowd boos like crazy at the unexpected score.\n    *goto kickoff_opp\n  *if (percentage = 4)\n    The crowd lets out a loud roar of disapproval as your defense experiences a rare score.\n    *goto kickoff_opp\n  *else\n    The crowd wildly shows outrage at the two points.\n    *goto kickoff_opp\n\n\n\n*label crowd_safety_opponent\n\n*if (location = \"home\")\n  *rand percentage 1 5\n  *if (percentage = 1)\n    The crowd boos loudly and the opposing defense celebrates the score.\n    *goto kickoff\n  *if (percentage = 2)\n    The crowd's boo both starts and ends quite abruptly.\n    *goto kickoff\n  *if (percentage = 3)\n    The crowd boos like crazy at the unexpected score.\n    *goto kickoff\n  *if (percentage = 4)\n    The crowd lets out a loud roar of disapproval as the opposing defense experiences a rare score.\n    *goto kickoff\n  *else\n    The crowd wildly shows outrage at the two points.\n    *goto kickoff\n\n*else\n  *rand percentage 1 5\n  *if (percentage = 1)\n    The crowd cheers wildly and the opposing defense celebrates the score.\n    *goto kickoff_opp\n  *if (percentage = 2)\n    The crowd's cheer both starts and ends quite abruptly.\n    *goto kickoff_opp\n  *if (percentage = 3)\n    The crowd applauds like crazy at the unexpected score.\n    *goto kickoff_opp\n  *if (percentage = 4)\n    The crowd lets out a loud roar of approval as the opposing defense experiences a rare score.\n    *goto kickoff_opp\n  *else\n    The crowd wildly shows excitement at the two points.\n    *goto kickoff_opp\n\n*label crowd_firstdown\n\n*if (location = \"home\")\n  *rand percentage 1 8\n  *if (percentage = 1)\n    The crowd cheers quietly.\n    *goto play_quarter\n  *if (percentage = 2)\n    The crowd applauds the play.\n    *goto play_quarter\n  *if (percentage = 3)\n    The crowd shows their appreciation for the play.\n    *goto play_quarter\n  *if (percentage = 4)\n    Your hear the crowd cheering you and the rest of the team on.\n    *goto play_quarter\n  *if (percentage = 5)\n    The crowd lets out a quick cheer.\n    *goto play_quarter\n  *if (percentage = 6)\n    You hear the sound of cheers and applause for the play.\n    *goto play_quarter\n  *if (percentage = 7)\n    The crowd stands up to cheer.\n    *goto play_quarter\n  *else\n    The crowd cheers less than you were expecting.\n    *goto play_quarter\n    \n\n\n*else\n  *rand percentage 1 8\n  *if (percentage = 1)\n    The crowd boos a little.\n    *goto play_quarter\n  *if (percentage = 2)\n    The crowd groans the play.\n    *goto play_quarter\n  *if (percentage = 3)\n    The crowd shows their disapproval for the play.\n    *goto play_quarter\n  *if (percentage = 4)\n    Your hear the crowd booing you and the rest of the team on.\n    *goto play_quarter\n  *if (percentage = 5)\n    The crowd lets out a quick moan.\n    *goto play_quarter\n  *if (percentage = 6)\n    You hear the sound of moaning and groaning after the play.\n    *goto play_quarter\n  *if (percentage = 7)\n    The crowd stands up to boo.\n    *goto play_quarter\n  *else\n    The crowd boos less than you were expecting.\n    *goto play_quarter\n  \n\n*label crowd_short_gain\n\n\n*if (down = \"4\")\n  *if (location = \"home\")\n    *rand percentage 1 5\n    *if (percentage = 1)\n      The crowd is silent.\n      *goto play_quarter\n    *if (percentage = 2)\n      The crowd quietly groans at the lack of a first down.\n      *goto play_quarter\n    *if (percentage = 3)\n      The crowd hardly responds.\n      *goto play_quarter\n    *if (percentage = 4)\n      The crowd has a mixed response.\n      *goto play_quarter\n    *else\n      The crowd doesn't have much of a response, but what little there is seems negative.\n      *goto play_quarter\n  *else\n    *rand percentage 1 5\n    *if (percentage = 1)\n      The crowd lets out a slight cheer.\n      *goto play_quarter\n    *if (percentage = 2)\n      The crowd quietly cheers at the lack of a first down.\n      *goto play_quarter\n    *if (percentage = 3)\n      The crowd hardly responds.\n      *goto play_quarter\n    *if (percentage = 4)\n      The crowd has a mixed response.\n      *goto play_quarter\n    *else\n      The crowd doesn't have much of a response, but what little there is seems positive.\n      *goto play_quarter\n\n*else\n  *if (location = \"home\")\n    *rand percentage 1 5\n    *if (percentage = 1)\n      The crowd gives a quiet applause.\n      *goto play_quarter\n    *if (percentage = 2)\n      The crowd slightly cheers.\n      *goto play_quarter\n    *if (percentage = 3)\n      The crowd is mostly quiet with some scattered cheers.\n      *goto play_quarter\n    *if (percentage = 4)\n      You can hear some scattered applause.\n      *goto play_quarter\n    *else\n      The crow is mostly quiet.\n      *goto play_quarter\n\n  *else\n    *rand percentage 1 5\n    *if (percentage = 1)\n      The crowd hardly responds.\n      *goto play_quarter\n    *if (percentage = 2)\n      The crowd is mostly quiet.\n      *goto play_quarter\n    *if (percentage = 3)\n      The crowd responds with scattered applause.\n      *goto play_quarter\n    *if (percentage = 4)\n      The crowd responds with scattered cheering.\n      *goto play_quarter\n    *else\n      The crowd's response is just scattered groans.\n      *goto play_quarter\n\n*label crowd_incomplete\n\n*if (location = \"home\")\n  *rand percentage 1 5\n  *if (percentage = 1)\n    The crowd groans.\n    *goto play_quarter\n  *if (percentage = 2)\n    The crowd boos quietly.\n    *goto play_quarter\n  *if (percentage = 3)\n    The crowd sounds like they're about to cheer, but when they see the drop, they groan loudly.\n    *goto play_quarter\n  *if (percentage = 4)\n    The crowd shows a lack of enthusiasm.\n    *goto play_quarter\n  *else\n    The crowd shows little passion for the failed play.\n    *goto play_quarter\n  \n*else\n  *rand percentage 1 5\n  *if (percentage = 1)\n    The crowd cheers.\n    *goto play_quarter\n  *if (percentage = 2)\n    The crowd celebrates quietly.\n    *goto play_quarter\n  *if (percentage = 3)\n    The crowd sounds like they're about to groan, but when they see the drop, they groan cheer.\n    *goto play_quarter\n  *if (percentage = 4)\n    The crowd shows some enthusiasm.\n    *goto play_quarter\n  *else\n    The crowd sighs a collective sigh of relief.\n    *goto play_quarter\n\n*label crowd_loss\n\n*if (location = \"home\")\n  *rand percentage 1 5\n  *if (percentage = 1)\n    The crowd boos loudly at the loss of yards.\n    *goto play_quarter\n  *if (percentage = 2)\n    The crowd groans at seeing the team go backwards.\n    *goto play_quarter\n  *if (percentage = 3)\n    The crowd lets out a collective sigh as you get further from the endzone.\n    *goto play_quarter\n  *if (percentage = 4)\n    The crowd shows a mix of upset emotions.\n    *goto play_quarter\n  *else\n    The crowd lets out a soft, but still audible boo.\n    *goto play_quarter\n\n\n*else\n  *rand percentage 1 5\n  *if (percentage = 1)\n    The crowd cheer loudly at the loss of yards.\n    *goto play_quarter\n  *if (percentage = 2)\n    The crowd celebrates at seeing your team go backwards.\n    *goto play_quarter\n  *if (percentage = 3)\n    The crowd lets out a collective cheer as you get further from the endzone.\n    *goto play_quarter\n  *if (percentage = 4)\n    The crowd shows a mix of happy emotions.\n    *goto play_quarter\n  *else\n    The crowd lets out a soft, but still audible cheer.\n    *goto play_quarter\n\n\n*label crowd_no_gain\n\n*if (location = \"home\")\n  *rand percentage 1 5\n  *if (percentage = 1)\n    The crowd groans in mild disappointment.\n    *goto play_quarter\n  *if (percentage = 2)\n    The crowd lets out a brief and quiet boo.\n    *goto play_quarter\n  *if (percentage = 3)\n    The crowd screams in frustration.\n    *goto play_quarter\n  *if (percentage = 4)\n    The crowd's sigh sounds more disappointed than mad.\n    *goto play_quarter\n  *else\n    The crowd collectively groans.\n    *goto play_quarter\n\n\n*else\n  *rand percentage 1 5\n  *if (percentage = 1)\n    The crowd cheers in mild celebration.\n    *goto play_quarter\n  *if (percentage = 2)\n    The crowd lets out a brief and quiet cheer.\n    *goto play_quarter\n  *if (percentage = 3)\n    The crowd celebrates quietly.\n    *goto play_quarter\n  *if (percentage = 4)\n    The crowd's sigh sounds more relieved than happy.\n    *goto play_quarter\n  *else\n    The crowd collectively cheers.\n    *goto play_quarter\n\n*label game_over\n\n*if (week \u003c 17)\n  *goto regular_season\n\n*if (week = 17)\n  *goto week_17\n\n*if (week = 18)\n  *goto week_18\n\n*if (week = 19)\n  *goto week_19\n\n*label regular_season\n\n*if (opp_score > score)\n  You lose ${opp_score} - ${score}\n  *set week +1\n  *set loses +1\n  *goto_scene season\n\n*if (score > opp_score)\n  You win ${score} - ${opp_score}\n  *set week +1\n  *set wins +1\n  *goto_scene season\n\n*if (score = opp_score)\n  It's a tie. The game will go into overtime.\n  *check_achievements\n  *if not(choice_achieved_nailbiter)\n    *achieve nailbiter\n  *goto overtime\n  \n  \n*label week_17\n\n*if (opp_score > score)\n  You lose ${opp_score} - ${score}\n  *set week +1\n  *set loses +1\n  You lost in the quarter-finals.\n  *goto_scene 17_loss\n\n*if (score > opp_score)\n  You win ${score} - ${opp_score}\n  *set week +1\n  *set wins +1\n  *goto_scene season\n\n*if (score = opp_score)\n  It's a tie. The game will go into overtime.\n  *goto overtime\n\n*label week_18\n\n*if (opp_score > score)\n  You lose ${opp_score} - ${score}\n  *set week +1\n  *set loses +1\n  You lost in the semi-finals.\n  *goto_scene 18_loss\n\n*if (score > opp_score)\n  You win ${score} - ${opp_score}\n  *set week +1\n  *set wins +1\n  *goto_scene season\n\n*if (score = opp_score)\n  It's a tie. The game will go into overtime.\n  *goto overtime\n\n*label week_19\n\n*if (opp_score > score)\n  You lose ${opp_score} - ${score}\n  *set week +1\n  *set loses +1\n  You lost in the finals.\n  *goto_scene 19_loss\n\n*if (score > opp_score)\n  You win ${score} - ${opp_score}\n  *set week +1\n  *set wins +1\n  You win the championship!\n  *goto_scene 19_win\n\n*if (score = opp_score)\n  It's a tie. The game will go into overtime.\n  *goto overtime\n\n*label overtime\nIn overtime, the first team to score will win. There will be another coinflip to determine who kicksoff. \n*line_break\nThe referee once again goes through the motions of explaining the coin flip. He then reinforces that the first team to score will win.\n\n*if (location = \"home\")\n  *rand odd_even 1 2\n  *if (odd_even = 1)\n    A player on the other team calls \"heads\".\n    *rand odd_even 1 2\n    *if (odd_even = 1)\n      His call is correct, it is heads.\n      *rand kickoff 1 2\n      *if (kickoff = 1)\n        \"We choose to recieve,\" the same player says. You choose your side of the field and then go back to the bench for the kick off.\n        *goto kickoff\n      *else\n        \"We choose to kick off,\" the same player says. You choose your side of the field and then go back to the bench for the kick off.\n        *goto kickoff_opp\n    *else\n      His call is incorrect, it is tails. Do you choose to kick off or receive?\n      *choice\n        #kick off\n          You state that you want to kick off. The other team chooses their side of the field, and then you go back to the bench for the kick off.\n          *set kickoff 1\n          *goto kickoff\n        #Recieve\n          You state that you want to recieve. The other team chooses their side of the field, and then you go back to the bench for the kick off.\n          *set kickoff 2\n          *goto kickoff_opp\n  *else\n    A player on the other team calls \"tails\".\n    *rand odd_even 1 2\n    *if (odd_even = 1)\n      His call is correct, it is tails.\n      *rand kickoff 1 2\n      *if (kickoff = 1)\n        \"We choose to receive,\" the same player says. You choose your side of the field and then go back to the bench for the kick off.\n        *goto kickoff\n      *else\n        \"We choose to kick off,\" the same player says. You choose your side of the field and then go back to the bench for the kick off.\n        *goto kickoff_opp\n    *else\n      His call is incorrect, it is heads. Do you choose to kick off or receive?\n      *choice\n        #kick off\n          You state that you want to kick off. The other team chooses their side of the field, and then you go back to the bench for the kick off.\n          *set kickoff 1\n          *goto kickoff\n        #Recieve\n          You state that you want to receive. The other team chooses their side of the field, and then you go back to the bench for the kick off.\n          *set kickoff 2\n          *goto kickoff_opp\n\n*if (location = \"away\")\n  After finishing the explanation, he looks at you, waiting for you to predict the result of the coin flip. \n  *choice\n    #Heads.\n      *rand odd_even 1 2\n      *if (odd_even = 1)\n        The referee nods and then flips the coin. \"Heads is correct,\" he says. \"Do you choose to kick off or receive to begin the game?\" he asks you.\n        *choice\n          #Kick off\n            The referee nods at your decision and announces to the crowd that you will kick off, before hearing what side of the field the opposing team takes to defend. Then everyone goes to the bench to await the kick off.\n            *set kickoff 1\n            *goto kickoff\n          #Receive\n            The referee nods at your decision and announces to the crowd that you will receive, before hearing what side of the field the opposing team takes to defend. Then everyone goes to the bench to await the kick off.\n            *set kickoff 2\n            *goto kickoff_opp\n      *else\n        \"Incorrect, it is tails,\" the ref says after flipping the coin. \"Do you choose to kick off or receive?\" he asks the players on the opposing team.\n        *rand odd_even 1 2\n        *if (odd_even = 1)\n          \"We choose to kick off,\" says the opponent in the middle. The referee announces this to the crowd and then you and your teammates then choose which side you want, and then you return to the bench to prepare for the kick off.\n          *set kickoff 2\n          *goto kickoff_opp\n        *else\n          \"We choose to receive,\" says the opponent in the middle.  The referee announces this to the crowd and then you and your teammates then choose which side you want, and then you return to the bench to prepare for the kick off.\n          *set kickoff 1\n          *goto kickoff\n    #Tails.\n      *rand odd_even 1 2\n      *if (odd_even = 2)\n        The referee nods and then flips the coin. \"Tails is correct,\" he says. \"Do you choose to kick off or receive to begin the game?\" he asks you.\n        *choice\n          #Kick off\n            The referee nods at your decision and announces to the crowd that you will kick off, before hearing what side of the field the opposing team takes to defend. Then everyone goes to the bench to await the kick off.\n            *set kickoff 1\n            *goto kickoff\n          #Receive\n            The referee nods at your decision and announces to the crowd that you will receive, before hearing what side of the field the opposing team takes to defend. Then everyone goes to the bench to await the kick off.\n            *set kickoff 2\n            *goto kickoff_opp\n      *else\n        \"Incorrect, it is heads,\" the ref says after flipping the coin. \"Do you choose to kick off or receive?\" he asks the players on the opposing team.\n        *rand odd_even 1 2\n        *if (odd_even = 1)\n          \"We choose to kick off,\" says the opponent in the middle. The referee announces this to the crowd and then you and your teammates then choose which side you want, and then you return to the bench to prepare for the kick off.\n          *set kickoff 1\n          *goto kickoff\n        *else\n          \"We choose to receive,\" says the opponent in the middle. The referee announces this to the crowd and then you and your teammates then choose which side you want, and then you return to the bench to prepare for the kick off.\n          *set kickoff 2\n          *goto kickoff_opp\n\n  \n\n  \n", "practice": "You reach practice and get into the locker room. The final cuts were made a few days ago and some of the players around you are notably down since their friends were cut. \n\n*if (team_name = \"Dogs\")\n  Some of the friends you've made over the past few seasons were cut. You're upset about it, but its something that you've accepted at this point. \n  *goto cuts\n\n*if (team_name = \"Hyenas\")\n  Since you're new to the team, you never really made 'friends' at this point on the team. Sure a few guys you met and got along with were cut, but you never got close with anyone.\n  *goto cuts\n\n*label cuts\n\nThe player beside you however is visibly upset, as his friend from college was cut. He's not complaining or making a scene, but you can tell by his face. You recognize him as a rookie, and his friend was a rookie. Do you console him?\n\n*choice\n  #Yes, he's a teammate and going out of my way isn't hard.\n    He seems to feel a little better, but there's some awkwardness around you.\n    *set Team %+ 10\n    *set Professionalism %- 5\n    *goto coach_speech\n  #No, he has to learn this is part of the job, and it may look unprofessional to get personal so fast.\n    He seems to feel a little better, but there's some awkwardness around you.\n    *set Team %- 5\n    *set Professionalism %+ 10\n    *goto coach_speech\n\n*label coach_speech\n\n*line_break\n\nMost of your new teammates are just engaging in small talk with each other when the coach walks in. However, after he gets closer to the middle of the room, the players stop talking one-by-one until the coach has simply used his confident body language, authority and standing position to gain the undivided attention of everyone in the room.\n\n*line_break\n\n*if (team_name = \"Dogs\")\n  He speaks slowly, with the volume a little above conversational, but without shouting. \"Listen up everyone. Last year, we came so close to winning it all. Most of you were here last year, and can't get the terrible taste of defeat out of your mouth.\"\n  *line_break\n  *line_break\n  You think to yourself about him being right. You hear some grumbling of agreement from some players. Your team's kicker looks at you and nods, indicating he understands that this hurts for you. He's also been on the team for over a decade, and has been through just as much heart break as you.\n  *line_break\n  *line_break\n  After a few seconds, the grumbling dies down and the coach continues. \"There is nothing that can make that taste disappear completely, believe me I know. Those of you who are new here will hear a lot about this loss. However, that loss was probably the reason you were brought in. The team had a need, and we're looking at you to fill that need. That is no different from any other situation.\" He pauses before continuing. \n  \"However, your job has now become clear. Do what this team has never done, win a championship. Do it, and you'll be seen as heroes. Fail, there will be a heavy burden on your shoulders you will never live down.\"\n  *line_break\n  *line_break\n  You know he's exaggerating. However, you say nothing. These types of speeches have been part of the game since time immemorial. You made the mistake of calling out this exaggeration in your rookie season, and boy did it turn out bad for you.\n  *line_break\n  *line_break\n  The coach continues to speak without even a pause. \"This is both the best and worst situation for you. Now, before the pre-season, I mentioned this, and told anyone that wants to leave that was their chance. By the way, I've never had anyone leave when I say that.\"\n  *line_break\n  *line_break\n  He pauses to let the team chuckle at his joke before continuing. \"That means, all of you signed up to be here. At least, that's what your words say. If your actions show me something else, you'll be a step closer to having someone else replace you. Understood?\"\n  *line_break\n  *line_break\n  The players on the team react differently. Some continue sitting, some nod and others say \"yes sir,\" with a few even screaming or holding up their helmets in agreement.\n  *line_break\n  *line_break\n  \"Good,\" the coach says. \"Now, give me one lap around the field and meet me at midfield when you're done!\" His enthusiam on the last part seemed to get the team rallied and pumped, but you're a bit more stoic, having seen the same song and dance every season. Empty words, empty meaning designed to make you think he said something special.\n  *goto midfield\n\n*if (team_name = \"Hyenas\")\n  He speaks loudly, as if a step away from yelling. \"Alright, everyone listen. People are expecting a good year from us this year. We had a solid season last year, and now we've gotten a big upgrade at the position we needed the most, a quarterback.\" He pauses to look at you, as a few of the other players turn their heads. \"That means anything less than a championship will be seen as unacceptable!\" His voice picks up, to the point of yelling the last few words.\n  *line_break\n  *line_break\n  You're not a fan of the yelling by any means, but you've dealt with much worse in your career. Plus, you know it's more of an act. He pauses and takes a few breathes before relaxing both in voice and body language. He starts speaking in a calmer and more composed way. \"Now, I know you can do it. But, there's going to be people in the media, and the fan base saying you can't. Don't listen to them. It's all for attention.\" He then raises his voice again, but in a more positive way. \"We are going to prove them wrong!!!\" He lifts his clipboard up in a triumphant way, as some of the players do the same with thier hands.\n  *line_break\n  *line_break\n  You don't, but you do breathe a sigh of relief. You knew this coach was more enthusiastic than your coach with the Dogs, who was more stoic and reserved. You look around and see some of the players loving the enthusiasm, and others still a little spooked, with a fair amount also in between. \"Now everyone get up and give me a lap around the field before you meet me at midfield!\" The team does so, strapping on helmets and running out excitedly, your teammates show a level of energy that you only wish you could still match.\n  *line_break\n  *line_break\n  *goto midfield\n\n*label midfield\n*page_break\n\nYour legs are already slightly sore from only a single lap. You wonder what's going on for a second, only to discover that you've gone longer than usual without painkillers. YOu've worker through much worse, even in ordinary practices, but your physical dependency on the painkillers is notable.\n\nThe coach then starts to call out one of your teammates for slacking, and makes an example out of him. In your opinion, the player wasn't slacking. The coach then turns to you and says you should give him a good talking to, in front of the rest of the team. What do you do?\n\n*choice\n  #I side with the player and stand up for him. He was doing his best.\n    Your teammates seem thankful, but the coach is pretty upset.\n    *set Team %+ 10 \n    *set Coach %- 5\n    *set Openness %+ 5\n    *goto Drill1\n  #I do what the coach says. It's nothing personal, my coach told me to do something, so I'm going to do it.\n    Some of your younger teammates seem a but put off by you siding with the coach, but the veteran players understand. Your coach is pretty happy.\n    *set Coach %+ 10 \n    *set Team %- 5\n    *set Professionalism %+ 5\n    *goto Drill1\n  #I'm even harsher on the player. Gotta maintain that leadership position.\n    Most of your teammates seem a but put off, not so much by you siding with the coach, but by how harsh you are. The coach is indeed imrpessed though.\n    *set Coach %+ 15\n    *set Team %- 10\n    *set Openness %+ 5\n    *goto Drill1\n  #I state the player should work harder, but say it in a calmer voice. I can get the point accross without being a jerk.\n    It's hard to tell, but it seems as if it had a small, but positive effect on the players. It's hard to tell how the coach feels.\n    *set Team %+ 5\n    *set Professionalism %+ 5\n    *goto Drill1\n  #I fake being tired so I don't have to say anything.\n    Dodging the question like that is getting people to think twice about you, despite that fact they don't exactly dislike you.\n    *set Leadership %- 5\n    *goto Drill1\n  #I get mad at the coach. It's not fair of him to do that.\n    Seems unprofessional, and the coach is taken aback quite a bit. Your teammates seem impressed, though.\n    *set Coach %- 10\n    *set professionalism %- 5\n    *set Team %+ 10\n    *goto Drill1\n\n*label Drill1\n\nAfterwards, it's time for you to do some drills. When doing passing exercises, how do you handle them?\n*choice\n  #I throw deep passes as often as possible to increase my skill with those.\n    You get slightly better at long passes.\n    *set Long_Pass +1\n    *goto painkiller\n  #I make short throws as often as possible to increase my skill with those.\n    You get slightly better at short passes.\n    *set Short_Pass +1\n    *goto painkiller\n  #I handle a mix of the above two.\n    You get slightly better at medium passes.\n    *set Medium_Pass +1\n    *goto painkiller\n  #I rush out of the pocket to focus on my scrambling ability.\n    You get slightly faster.\n    *set Speed +1\n    *goto painkiller\n  #I stay in the pocket to handle blitzes better.\n    You get slightly better at keeping your composure.\n    *set Composure +1\n    *goto painkiller\n  #I look over the field to try and improve my awareness.\n    You get slightly better at maintaining awareness of your surroundings.\n    *set Awareness +1\n    *goto painkiller\n\n*label painkiller\n\nYou start feeling more intense pain. You know that there's a 5 minute window you can dash back to the locker room and get some painkillers without being caught. You'll have a hard time continuing practice if you don't take them, but you're also aware that taking more will lead to a harder addiction.\n\n*choice\n  #No, even if I don't get the full benefits of practice, I have to do what's best for my health.\n    You continue practice, but don't benefit from it.\n    *goto end_practice\n  #Yes. I need to do everything in my power to get better. It's my last chance at a championship.\n    You get them, and get to benefit from the final drill. Hopefully this doesn't catch up with you too much.\n    *set Painkiller_Addiction +1\n    *goto Drill2\n\n*label Drill2\n\nAfterwards, it's time for you to do some drills. When doing passing exercises, how do you handle them?\n*choice\n  #I throw deep passes as often as possible to increase my skill with those.\n    You get slightly better at long passes.\n    *set Long_Pass +1\n    *goto end_practice\n  #I make short throws as often as possible to increase my skill with those.\n    You get slightly better at short passes.\n    *set Short_Pass +1\n    *goto end_practice\n  #I handle a mix of the above two.\n    You get slightly better at medium passes.\n    *set Medium_Pass +1\n    *goto end_practice\n  #I rush out of the pocket to focus on my scrambling ability.\n    You get slightly faster.\n    *set Speed +1\n    *goto end_practice\n  #I stay in the pocket to handle blitzes better.\n    You get slightly better at keeping your composure.\n    *set Composure +1\n    *goto end_practice\n  #I look over the field to try and improve my awareness.\n    You get slightly better at maintaining awareness of your surroundings.\n    *set Awareness +1\n    *goto end_practice\n\n*label end_practice\n\nNow, its time to run a full scrimmage. It'll be the closest thing you've had to a real game since last season.\n*page_break\nYou have a three minute drill, where you'll be starting at midfield, one play at a time. It is meant to introduce you to the game engine. If this is your first time playing, I recommend that you play through this.\n*choice\n  #I would like to do the three minute drill.\n    *goto TMD\n  #I would like to skip it please.\n    *check_achievements\n    *if not(choice_achieved_confidence)\n      *achieve confidence\n    *goto end_scene\n\n*label TMD\n*temp opp_def 30\n\n*label game_setup\n*temp time 180\n*temp minute 15\n*temp second 0\n*temp down 1\n*temp distance 10\n*temp yard 50 \n*temp yard_opposite 50\n*temp score 0\n*temp opp_score 0\n*temp yards \"yards\"\n\n\n*temp gain 0\n*temp last \"default\"\n*temp possession \"true\"\n*temp opp_drive 50\n*temp opp_drive_result 0\n*temp percentage 50\n*temp time_factor 1\n*temp time_lost 0\n*temp deficit 0\n\n*temp WR1_route 0\n*temp WR1_yards 0\n*temp WR2_route 0\n*temp WR2_yards 0\n*temp TE_route 0\n*temp TE_yards 0\n*temp RB_route 0\n*temp RB_yards 0\n*temp FB_route 0\n*temp FB_yards 0\n\n*temp attention_WR1 25\n*temp attention_WR2 25\n*temp attention_RB 25\n*temp attention_FB 25\n*temp attention_TE 25\n*temp attention_QB 25\n*temp pass_roll 50\n*temp full_roll 100\n*temp throw_challenge 100\n*temp panic_test 100\n*temp panic_mod 1\n*temp run_yards 25\n*temp odd_even\n\n*label play_quarter\n*page_break\n*if (time \u003c 1)\n  *goto end_scene\n\n\n*label minute\n\n\n*if (time >= 180)\n  *set minute 3\n  *goto second\n*elseif (time >= 120)\n  *set minute 2\n  *goto second\n*elseif (time >= 60)\n  *set minute 1\n  *goto second\n*else\n  *set minute 0\n  *goto second\n\n*label second\n\n\n*if (time >= 180)\n  *set second time-180\n  *goto play_make\n*elseif (time >= 120)\n  *set second time-120\n  *goto play_make\n*elseif (time >= 60)\n  *set second time-60\n  *goto play_make\n*elseif (time >= 1)\n  *set second time\n  *goto play_make\n\n*label down\n\n\n*if (gain >= distance)\n  *set down 1\n  *set distance 10\n  *goto play_make\n*else\n  *set down +1\n  *set distance -gain\n  *goto play_make\n\n*label play_make\n*line_break\nTime Remaining: ${minute}:\n*if (second \u003c 10)\n  0${second}\n  *goto team_possession\n*else\n  ${second}\n  *goto team_possession\n\n\n goto increase\n\n*label increase\nWhat skill would you like to train this week?\n*choice\n  #Long passing\n    *set Long_pass +1\n    *goto start\n  #Medium passing\n    *set Medium_pass +1\n    *goto start\n  #Short passing\n    *set Short_pass +1\n    *goto start\n  #Speed\n    *set Speed +1\n    *goto start\n  #Awareness\n    *set Awareness +1\n    *goto start\n  #Composure\n    *set Composure +1\n    *goto start\n\n*label start\nScrimmage time is over. Practice ends, and you pack up.\n\n*goto_scene week_1\n\n\n\n\n\n  \n", "choicescript_description": "After a career where you’ve achieved everything but a championship, you have one last chance. However, the strongest team ever is led by your biggest rival, who is also great greatest player of all time. Can you finally overcome the biggest hurdle in your career?\n[i]Last Chance Quarterback[/i] is a 115,000-word interactive novel by Chris Viola, author of [i]Super Star Soccer Striker[/i]. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination. Choose your playstyle, your personality, and even your team.\n• Play as male like the rest of the league or be the sport’s first female or nonbinary star.\n• Romance a partner of your choice.\n• Choose how you present yourself to your family, the media, and your teammates, developing a full personality.\n• Feel the highs and lows of having to rival the greatest player of all time.\n• Choose between being a team-first player to increase your chances of victory or boosting your own reputation by increasing your career stats.\n• Choose between playing as a powerhouse who can make the big throw, a precise and consistent player, a quick-thinking leader, a shifty fast-on-your-feet scrambler, and more.\nThe team’s fate rests on your shoulders. Can you handle the pressure?", "choicescript_stats": "The stats screen is below. It shows your person stats, attributes and relationships.\n*line_break\n\nPersonal Info. Basic information about your player.\n*line_break\nName: ${first_name} ${last_name}\n*line_break\nJersey_number: ${jersey_number}\n*line_break\nTeam: ${team_name}\n*line_break\n\nOn the field attributes. These determine how well you play in game. These will experience very little change after you decide your starting starts.\n*line_break\n*stat_chart\n  percent Long_Pass Long Pass\n  percent Medium_Pass Medium Pass\n  percent Short_Pass Short Pass\n  percent Speed\n  percent Awareness\n  percent Composure\n\n\nPersonality traits. These show you the personality you've been playing as. Change these with your off-the field decisions.\n*line_break\n*stat_chart\n  percent Leadership\n  percent Professionalism\n  percent Fame \n  percent Optimism \n  percent Openness\n  percent Confidence\n\n*line_break\nRelationships. These determine how well you get along with certain people, and how much they like you. You can adjust these with decisions made in-game.\n*line_break\n*stat_chart\n  percent SO Significant Other\n  percent Family\n  percent Fans\n  percent Media\n  percent Coach\n  percent Team\n\n*line_break\nSeason stats. How well is your player doing?\n*line_break\nPassing Yards: ${Passing_Yards}\n*line_break\nPassing Attempts: ${Passing_Attempts}\n*line_break\nPasses Completed ${Passes_Completed}\n*line_break\nPassing Touchdowns: ${Passing_TDs}\n*line_break\nInterceptions: ${Interceptions}\n*line_break\nRushing Yards: ${Rushing_Yards}\n*line_break\nRushing Attempts: ${Rushing_Attempts}\n*line_break\nRushing Touchdowns: ${Rushing_TDs}\nTimes Sacked: ${Times_Sacked}\n*line_break\nFumbles: ${Fumbles}\n*line_break\n\n\nAmerican Football 101: If you are not familiar with American football, this is the basics. Terms in [i]italics[/i] are explained in the glossary part way down. There is also a list of some of the most common penalties in the game below that.\n*line_break\n*line_break\n[b]History of the game[/b]\n*line_break\nA game based off of rugby, the game developed in the 1860's. Over the next few decades, the game took hold in America and Canada. Additions were made such as forward passing, and ending a play after a player was tackled.\n*line_break\n*line_break\n[b]The field[/b]\n*line_break\nThe game is played on a large field 100 yards long and 53.5 yards wide (a yard in about 0.91 meters). The end of each side has an endzone 10 yards long containing an upright. There are a handful of ways to score:\n*line_break\n*line_break\nTouchdown: 6 points. Be in possession of the ball in your opponent's endzone. In addition, your team gets to attempt a conversion.\n*line_break\nField Goal: 3 points. Snap the ball back from the [i]line of scrimmage[/i], and kick the ball being held by a teammate. The ball must go between the opponent's uprights.\n*line_break\nSafety: 2 points. Tackle an opponent who has the ball within an endzone.\n*line_break\nConversion: 1 or 2 points. Kick an easy point, or get the ball into the endzone in a single play for a more difficult 2 points. Since 1 pointers have a success rate of about 99%, and 2 pointers have one of about 40%, most of the time a 1 point converion is attempted.\n*line_break\n*line_break\nEach team fields 11 players at once. All players who start a play must be the ones who finish is. Between plays each team may substitute as many players as they wish, inlcuding all 11 players if desired.\n*line_break\n*line_break\n[b]Time[/b]\n*line_break\n*line_break\nThe game is divided between 4 15 minute quarters. Sometimes time runs down between plays, but sometimes it doesn't. The reaons for it not include the following: a score, the play going out of bounds, and incomplete pass and the previous play being a special teams (kicking) play.\n*line_break\n*line_break\n[b]Positions on offence[/b]\n*line_break\n*line_break\nQuarterback (QB): The most important position on the team. The quarterback start behind the offensive line and recieves the snap at the start of each offensive play, and can either hand the ball off to a teammate, or throw to a teammate. A team on offence will field exactly one quarterback. Quarterbacks are almost always of average size, and have a very strong arm. Some are very fast.\n*line_break\n*line_break\nRunningback (RB): Starts 5 or so yards behind the line of scrimmage. On a running play, the running back is usually the player who the quarterback hands the ball off to. On a passing play, he is occasionally the target of the pass, and will also sometimes block for the quarterback. On most plays, the offence has one running back. Runningbacks can be a variety of sizes, and are usually fast and/or great at breaking tackles. They also have to be good at avoiding tackles.\n*line_break\n*line_break\nFullback (FB): Usually starts near the runningback. They are generally of above average size, and block for the runningback or quarterback. They are generally strong, with a select few also being fast. Most of the time, the offence will have one fulllback.\n*line_break\n*line_break\nWide Reciever (WR): Usually starts on or near the line of scrimmage. When the quarterback throws, usually a wide receiver is the intended target. They are often tall but thin, extremely fast, and good at catching. Usually, the offence will use two wide receivers on the field at once.\n*line_break\n*line_break\nOffencive Line (OL): Starts on the offencive line, and protects the quarterback or player running with the ball. The player in the middle, known as the center, snaps the ball back to the quarterback at the start of the play. Offencive linemen are often very big, muscular, and tall. The offence will usually have 5 offensive linemen on the field at once.\n*line_break\n*line_break\nTight End (TE): Starts next to the offencive line. Sometimes they will act as a 6th offensive linemen, and other times they will act as an extra reciever. They generally have above average size and strength, with many also having solid speed and being good at catching. The offence will usually have 1 Tight End.\n*line_break\n*line_break\n\n[b]Positions of Defence[/b]\n*line_break\n*line_break\nDefensive Line (DL): They start near the ball, and almost always try to pursuit the ball carrier and apply pressure to the quarterback. Defensive Linemen are very strong and are sometimes very fast. Teams usually have 4 on the field at once, with the two on the outside being called 'ends' and the two in the middle being called 'tackles'\n*line_break\n*line_break\nLinebacker (LB): They start a few yards behind the linemen. Linebackers have a large varition in their strength and speed, with many being well-rounded. They often end up with more tackles than any other position. Defenses usually have 3 on the field at once, which are differentiated by their positions 'right', 'left' and 'middle'?\n*line_break\n*line_break\nCornerbacks (CB): Usually the start as close to the offense's recievers as possible, and cover them during the play. They are generally very fast, while still being strong enough to tackle most opponents. Defenses usually have 2 on the field at once.\n*line_break\n*line_break\nFree Safety (FS): Usually they start pretty far back from the play. They will usually be used either to double team the offense's best player, or be the last man back in case the offense gets by everyone else. Defenses usually have 1 on the field at once.\n*line_break\n*line_break\nStrong Safety (SS): Usually they start relatively far back. They are generally almost as large as linebackers, and bigger than cornerbacks and free safeties, while having okay speed, and being very good at hitting hard, Defenses usually have 1 on the field at once.\n*line_break\n*line_break\n\n[b]Positions of Special Teams (kicking)[/b]\n*line_break\n*line_break\nKicker (K): The kicker is responsible for kicking the ball from a held potion. Usually, this is on [i]4th down[/i] when the team is attempting a field goal, or a 1 point conversion, and they are also usually responsible for kicking during a [i]kickoff[/i].\n*line_break\n*line_break\nPunter (P): The punter is responsible for [i]punting[/i] the ball away for better field position when the team fails to advance the ball, usually on a 4th down.\n*line_break\n*line_break\nKick Returner (KR): Responsible for returning kickoffs and punts.\n*line_break\n*line_break\n\n[b]Passing and Running Plays[/b]\n*line_break\n*line_break\nFormat of a play: The quarterback starts behind the middle of the offensive line, who snaps the ball back to him. The play then turns into a run play or a passing play. When the player with the ball is successfully tackled, runs out of bounds, scores or takes a knee, the play ends. The play also ends upon an incomplete pass. A socring play is followed up with a kickoff, and any other play is followed by another standard play that starts where the previous one ended.\n*line_break\n*line_break\nPassing Plays: The quarterback keeps the ball, and throws it to a teammate. This is the only overhand forward pass that is allowed during a game, and only one of these is allowed per play. The quarterback will occasionally run with the ball themselves, known as scrambling. If a pass hits the ground, it is incomplete, and is counted as gaining 0 yards. If a pass is intercepted, the team that intercepted it goes on offence when the play is over. \n*line_break\n*line_break\nRunning Plays: The quarterback hands the ball to a teammate, usually a running back, who then runs with the ball.\n*line_break\n*line_break\n\n[b]Glossary:[/b]\n*line_break\n*line_break\n1st Down: See \"Down System\"\n*line_break\n*line_break\n2nd Down: See \"Down System\"\n*line_break\n*line_break\n3rd Down: See \"Down System\"\n*line_break\n*line_break\n4th Down: See \"Down System\"\n*line_break\n*line_break\nDrive: A single output of a team having the ball using the [i]down system[/i].\n*line_break\n*line_break\nDown System: A team is given 4 attempts (or downs) to get a total of 10 yards. The situation is explained in X and Y where X is the attempt number, and Y is the number of yards needed. For example, teams start at 1st and 10, representing it is their first attempt to gain 10 yards. On this attempt, they gain a total of 3 yards. The next play is considered 2nd down, and since they need 7 more yards, the situation is 2nd and 7 with the ball 3 yards downfield. They attempt to pass on this play, and it is incomplete, meaning 0 yards are gained. It is now 3rd and 7. The team gains 9 yards. Since they gained more than the required number, it is now first and 10 again. If a team fails to gain the 10 yards in 4 attempts, the other team takes over at the [i]line of scrimmage[/i]. If at first and 10, the team with the ball is less than 10 yards away from scoring a touchdown, the situation is \"1st and goal\", and the team needs to score a touchdown instead of gaining 10 yards.  \n*line_break\n*line_break\nFlag: An orange piece of nylon thrown by the official after a penalty. At the end of a play, a referee will declare what the flag is for. The opposing team may choose to accept or decline the penalty. See \"common penalties and penalty rules\" below for more info.\n*line_break\n*line_break\nKickoff: A kick from a stationary position that the kicker makes from his own team's 35 yard line, which is returned by the opposing team. Teams kickoff after scoring a touchdown or field goal. A kickoff also occurs at the start of each half, with one team kicking off in the first half, and the other team kicking off in the second half.\n*line_break\n*line_break\nLine of Scrimmage: The line from which that particular play begins.\n*line_break\n*line_break\nPossession:  A team currently in offense has \"possession\".\n*line_break\n*line_break\nPunt: A kick usually done on 4th down to retain decent field postion after a failed drive.\n*line_break\n*line_break\nSack: Tackling the quarterback behind the [i]line of scrimmage[/i].\n*line_break\n*line_break\n[b]Time and timeouts[/b]\n*line_break\n*line_break\nThe game is made up of 4 15 minute quarters. Incomplete passes, special team plays, turnovers, and plays where a player runs out of bounds stop the clock. Normal plays keep the clock running, however. Teams can stop the clock from running between plays by taking a timeout. Each team gets 3 timeouts per half.\n*line_break\n*line_break\n[b]Common penalties and penalty rules. Below are many of the most common.[/b]\n*line_break\n*line_break\nWhen a ref catches a player breaking the rules, he throws a [i]flag[/i] and at the end of the play, penalizes the player. The opposing team is told what happens if a penalty is accepted or declined.\n*line_break\n*line_break\nClipping: Hitting a player without the ball from behind. 15 yard penatly after the play.\n*line_break\n*line_break\nChop Black: Hitting a defencive player below the waist who is already being blocked by an offensive player. 15 yard penalty after the play.\n*line_break\n*line_break\nDelay of Game: The quarterback takes more than 40 seconds to start the play. 5 yard penalty called before the play starts.\n*line_break\n*line_break\nFacemask: A player grabbing the facemak of another player. 15 yard penalty after the play.\n*line_break\n*line_break\nFalse Start: An offensive lineman moves after setting up, but before the snap is made. 5 yard penaly before the play.\n*line_break\n*line_break\nGrounding: Throwing the ball well behind the [i]line of scrimmage[/i] in order to prevent a [i]sack[/i]. Treated as if the quarterback was sacked.\n*line_break\n*line_break\nHolding: Grabbing an opposing player other than the ball carrier. 10 yard penalty.\n*line_break\n*line_break\nOffside: Any player jumping to the opposing side of the [i]line of scrimmage[/i] before the play starts. 5 yard penalty before the play.\n*line_break\n*line_break\nPass Interference: Any player making physical contact with an opponent while a forward pass from the quarterback is in the air. This penatly is 10 yards if called against the offence, and is penalized at the spot of the foul if commited by the defence.\n*line_break\n*line_break\nRoughing the Passer: Hitting the passer after they have released the ball. Usually not called if the hit can be explained as follow through from a hit that started while the quarterback had the ball. Kickers and punters are protected by a similar rule.\n*line_break\n*line_break\nTripping: A 10 yard penatly enforced against anyone who attempts to trip an opponent.\n*line_break\n*line_break\nUnnecessary Roughness: Hitting another player after the play is over. This includes after a tackle has been made, after an incomplete pass and after the player with possession runs out of bounds. 15 yard penatly. In extreme situations, the player can also be ejected.\n*line_break\n*line_break\nUnsportsmanlike Conduct: A catch-all term for anything that violates the unwritten rules of professional play. This includes excessively taunting an opponent, kicking or throwing the ball after the play is over, abusive language beyond what can be dismissed as frusturation, use of slurs, damaging equipment or anything else the referee determines the be unreasonable behaviour not covered by any other rule.\n*line_break\n*line_break\nPlease note that like in all sports, there is a grey where it is not clearly defined if the player's conduct is considered flagrant enough to warrant a penalty. There will be many incidents where one ref will call a penalty in a situation where another will let it go. \n\n\n\n\n\n\n\n\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n  \n  Unlock the rest of the game, including the thrilling conclusion!\n  \n  *purchase_discount adfree 2023-08-10 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n  \n  You've paid to unlock the rest of the game.\n", "ending": "*page_break End\nWe hope you've enjoyed playing [i]${choice_title}.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "no_playoffs": "Sorry, but your team has failed to reach the playoffs as this year 10 wins were needed to make it. \n*line_break\nYou seem to spiral into a bit of a depression that ${SO_name} offers to have a conversation with you on. Do you accept ${their} offer to help?\n*choice\n  #Yes\n    *goto conversation\n  #No\n    *goto announcement\n\n*label conversation\nSo, what do you feel is wrong? ${SO_name} asks you.\n*choice\n  #I feel as if I should have done much better in my career and won a championship.\n    \"You can't do anything about that. Nobody can. Most players don't win one, and many who do are carried to one. You played in a tough era.\"\n    *goto announcement\n  #I feel like with my retirement coming, there's going to be a large void in my life.\n    \"Well, now's the time to fill it with something meaningful,\" ${SO_name} replies. \n    *goto announcement\n  #I'm not sure how I'll be seen by the public now that I'm no longer playing.\n    \"Don't worry about that here,\" ${SO_name} replies, trying to make you feel better. \"Everyone here, myself, your family, your friends, they all love you very much. Who cares what other people think?\"\n    *goto announcement\n  #I feel like now my life is directionless. I should have started to think about what to do after I retired a lot earlier.\n    \"Do you feel as if there's someone who you should be dedicating a portion of your life to?\" ${SO_name} asks in a flirtatious way.\n    *goto announcement\n  \n\n*label announcement\nYou officially announce your retirement a few days later. \n*goto_scene retirement", "retirement": "How would you like to announce your retirement?\n*choice\n  #A large press conference where I invite several reporters so that I get more attention.\n    *set Media %+ 5\n    *set Family %- 5\n    *set SO %- 5\n    *goto large\n  #A small private conference with just a few reporters who I choose personally.\n    *goto small\n  #I don't even have a press conference\n    *set Media %- 5\n    *set Family %+ 5\n    *set SO %+ 5\n    *goto none\n\n*label large\n\nYou field questions all day. However ${SO_name} and your family see this as just an attempt to get one last gasp of attention from everyone. Is this what's going on?\n*fake_choice\n  #Yes\n  #No\n\nThe conference takes a few hours, and the media is more respectful of you than they usually are. Even the news report afterwards is focused on how great of a career you had. You still find this to be a little bit weird, as they've been bashing you ever since you lost the rookie of the year award to Ace. But now, it all appears to finally be over, and they're giving you your due respect.\n\n*goto part2\n\n*label small\n\nYou field a few questions, but the event is pretty brief. ${SO_name} and your family understand that you want to have one last moment in limelight, and appreciate that you are able to finish it reasonably quickly. The media, despite making a large deal about your retirement is focused on your career as a whole. They seem to be pretending that a lot of the critisisms you faced were only from the fans, not from the media themselves.\n\n*goto part2\n\n*label none\n\n${SO_name} and your family seem to appreciate that you're starting to melo out in retirement, and hope that this is going to be what you act like in the future. The media starts to look back on your career, and is actually being very respectful of you. They're even building you up despite the fact that they played a large role in tearing you down. Funny how things work sometimes.\n\n*goto part2\n\n*label part2\n*line_break\n*line_break\nA few days later, you see what the online reports say with their retrospectives about your career.\n*if (media \u003c 35)\n  The media doesn't seem very friendly with you anymore, and your choker resputation is still included in a lot of reports. \n  *goto fans\n*if (media \u003c 50)\n  The media hasn't completely gotten rid of their critisisms, but overall they seem to be more respectful than they were when you were playing.\n  *goto fans\n*if (media \u003c 60)\n  There's a large increase in the respect the media has. The more negative stations seem to still mention your choker reputation, but overall the media isn't playing that card much anymore.\n  *goto fans\n*else\n  The media seems to have done a complete 180 on their attitude towards you. You're regarded as a future hall of famer.\n  *goto fans\n\n*label fans\n*line_break\n*line_break\nYou decide to check what fans think of you, mostly in online forums. This is something you avoided doing during your career in order to stop it from getting in your head, but now there's noting to lose.\n*if (fans \u003c 35)\n  Many fans are quite upset with you, and seem to be happy that you retired. Part of you wonders what you did wrong, but another part of you figures its best to not worry about it.\n  *goto family\n*if (fans \u003c 50)\n  Fans are divided on your legacy, with some loving you, some hating you, and most being somewhere in between.\n  *goto family\n*if (fans \u003c 60)\n  The fans seem to overall see your career as quite good, with only a few haters.\n  *goto family\n*else\n  Only the fans of rival teams seem to have much negative to say about you. Looks like in the end they came around.\n  *goto family\n\n*label family\n*line_break\n*line_break\n*if (family \u003c 35)\n  Despite your attempts in the next few weeks to reconnect with your family, they seem to stay distant. You're not quite sure where you went wrong.\n  *goto SO\n*if (family \u003c 50)\n  Your family is slow to warm up to you as if they're afraid of you turning away again. After about a month, they warm up to you once they see you're truly done with your career. Glad they're there for you.\n  *goto SO\n*if (family \u003c 60)\n  Your family warms up to you right away, as you seem to have kept a mostly positive relationship with them.\n  *goto SO\n*else\n  Your family is super happy to have time with you, as you seem to have maintained a great relationship with them.\n  *goto SO\n\n*label SO\n*line_break\n*line_break\n*if (SO \u003c 35) \n  *goto breakup\n*if (media \u003c 50) \n  *goto distant\n*if (media \u003c 60)\n  *goto future\n*else\n  *goto proposal\n\n*label proposal\n*line_break\n*line_break\nAfter a couple of months, ${SO_name} proposes to you. Do you accept?\n*choice\n  #Yes\n    Congrats! The wedding is in 2 years!\n    *set status \"married\"\n    *check_achievements\n    *if not(choice_achieved_lover)\n      *achieve lover\n    *goto finale\n  #No\n    Ooooofff, your choice on how to proceed.\n    *choice\n      #Break up with them\n        *set status \"single\"\n        *goto finale\n      #Say \"maybe another time. Its too soon now.\n        *goto finale\n\n*label future\n*line_break\n*line_break\nYou and ${SO_name} begin talking about your future together.\n*goto finale\n\n*label distant\n${SO_name} becomes more distant over time, and you worry about if there's problems in your relationship.\n*goto finale\n\n*label breakup\n${SO_name} breaks up with you. Sorry about that.\n*goto finale\n\n*label finale\n*line_break\n*line_break\nHere are the stats for your final season.\n*line_break\n*line_break\nPassing Yards: ${Passing_Yards}\n*line_break\n*line_break\nPassing Attempts: ${Passing_Attempts}\n*line_break\n*line_break\nPasses Completed ${Passes_Completed}\n*line_break\n*line_break\nPassing Touchdowns: ${Passing_TDs}\n*line_break\n*line_break\nInterceptions: ${Interceptions}\n*line_break\n*line_break\nRushing Yards: ${Rushing_Yards}\n*line_break\n*line_break\nRushing Attempts: ${Rushing_Attempts}\n*line_break\n*line_break\nTimes Sacked: ${Times_Sacked}\n*line_break\n*line_break\nFumbles: ${Fumbles}\n*line_break\n*line_break\n\nAfter a while, things begin to simmer down and you get used to this \"new normal\" for you. You're put into the Hall of Fame seven years after you retire. Do you want to focus on another aspect of your career now?\n*fake_choice\n  #Yes, I want to become a coach.\n    You become the quarterback coach for the Hawks in a career that you hope will one day be as good as your playing career.\n  #Yes, I want to become a commentator.\n    You're surprisingly a solid hit. Just don't talk too much about how players were 'tougher back in your day'. Give the modern kids some credit.\n  #Yes, I want to become a scout.\n    The Swordsmen are quick to hire you. You get a laugh when they say you're the perfect person to find the next Ace Armstrong.\n  #No, I want to spend time with my family.\n    You feel at peace with your career, and your personal life improves.\n\n*line_break\nYou're able to enjoy a life of your own after your playing career. \n\n\n*goto_scene ending", "savesys": "*label start\n*finish\n\n===========================================================\n        SOFTLY SAVE SYSTEM v0.0.4\n===========================================================\n\nTHIS MODULE IS SAFE TO USE WITH IMPLICIT CONTROL FLOW OFF.\n\n\n===========================================================\n\n\n*comment @function [slot: int] (scene: str) (label: str)\n*label save\n*params slot\n*set savesys_slot[slot] choice_time_stamp\n*gosub init\n*comment BEGIN REPEAT LOOP\n*comment @loop repeat\n*temp repeat_times savesys_var_length\n*comment ci == current_iteration\n*temp ci 1\n*label savesys_repeat_save\n*if (ci \u003c= repeat_times)\n    *set { \"savesys_\" & (savesys_var[ci] & \"_${slot}\") } { savesys_var[ci] }\n    *set ci +1\n    *goto savesys_repeat_save\n*comment END REPEAT LOOP\n*if (param_count > 1)\n    *set {\"savesys_slot_${slot}_scene\"} param[2]\n*if (param_count > 2)\n    *set {\"savesys_slot_${slot}_label\"} param[3]\n*return\n\n\n*comment @function [slot: int]\n*label load\n*params slot\n*set savesys_load_used choice_time_stamp\n*gosub init\n*comment BEGIN REPEAT LOOP\n*comment @loop repeat\n*temp repeat_times savesys_var_length\n*comment ci == current_iteration\n*temp ci 1\n*label savesys_repeat_load\n*if (ci \u003c= repeat_times)\n    *set { savesys_var[ci] } { \"savesys_\" & (savesys_var[ci] & \"_${slot}\") }\n    *set ci +1\n    *goto savesys_repeat_load\n*comment END REPEAT LOOP\n*return\n\n\n*comment @function [slot: int]\n*label clear\n*params\n*if (param_count = 0)\n    *bug savesys.clear requires at least 1 parameter, 0 given.\n*comment BEGIN WHILE\n*comment @loop while\n*label savesys_while_clear\n*if (param_count > 0)\n    *set {\"savesys_slot_${param[param_count]}\"} 0\n    *set param_count (param_count -1)\n    *goto savesys_while_clear\n*comment END WHILE\n*return\n\n\n*comment @function\n*label clear_all\n*gosub clear 1\n*return\n\n\n===========================================================\n\n\n*comment @function\n*label init\n*temp savesys_var_length 95\n*temp savesys_var_1 \"Long_pass\"\n*temp savesys_var_2 \"Short_pass\"\n*temp savesys_var_3 \"Medium_pass\"\n*temp savesys_var_4 \"Speed\"\n*temp savesys_var_5 \"Awareness\"\n*temp savesys_var_6 \"Composure\"\n*temp savesys_var_7 \"Super\"\n*temp savesys_var_8 \"Leadership\"\n*temp savesys_var_9 \"Professionalism\"\n*temp savesys_var_10 \"Fame\"\n*temp savesys_var_11 \"Optimism\"\n*temp savesys_var_12 \"Openness\"\n*temp savesys_var_13 \"Confidence\"\n*temp savesys_var_14 \"SO\"\n*temp savesys_var_15 \"Family\"\n*temp savesys_var_16 \"Fans\"\n*temp savesys_var_17 \"Media\"\n*temp savesys_var_18 \"Coach\"\n*temp savesys_var_19 \"Team\"\n*temp savesys_var_20 \"wins\"\n*temp savesys_var_21 \"loses\"\n*temp savesys_var_22 \"draws\"\n*temp savesys_var_23 \"first_name\"\n*temp savesys_var_24 \"last_name\"\n*temp savesys_var_25 \"jersey_number\"\n*temp savesys_var_26 \"team_name\"\n*temp savesys_var_27 \"opponent\"\n*temp savesys_var_28 \"SO_name\"\n*temp savesys_var_29 \"SO_gender\"\n*temp savesys_var_30 \"Painkiller_Addiction\"\n*temp savesys_var_31 \"Sponsor\
