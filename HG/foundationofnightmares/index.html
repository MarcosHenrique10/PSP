 to make in Lorden's regard.\" Her lips twitch in a small smile, and she finishes, \"If all of this works out, a medal, reward, and grand celebration in your honor are surely in order. I can assure you of that, at the very least.\"\n\t\n\t\tYou grin back with a glint in your eye, telling her, \"That's certainly a start, my friend.\"\n\t\t\n\t\tThe woman nods curtly and then carries on her way.\n\t\n\t#Giving her a reproachful look, you reply, \"Surely, Lorden would be better off with someone else as mayor. You'd be a poor replacement for Eldon. After all, being a captain of the guard and the leader of a rather large city are two very different things.\"\n\t\t*set gertrude %-5 \n\t\t*set compassionate %-5 \n\t\tThe woman laughs bitterly. Raising an eyebrow, she retorts, \"Yes, because a demon ${hunter} would know so much about the finer details of either vocation. They're more in common than you seem to realize, and someone of my profession might do especially well in troubled times such as these.\" She shakes her head and continues, \"Eldon was wonderful in periods of lasting peace, but things are different now.\"\n\t\t\n\t\tYou're about to reply but she cuts you off quickly, saying, \"Either way, we won't know for sure until the election has actually happened. Until then, perhaps it would be best for you to keep your negative speculations to yourself.\"\n\t\t\n\t\tYou smirk in response and comment, \"Oh, my. You aren't exactly open to opposing views, are you? I can already tell you'll make an absolutely wonderful politician!\"\n\t\t\n\t\tThe captain glares at you and stalks off in a hurry, likely before she blurts out anything she'll regret later.\n*if (jail_falcon = false) \n\tJust before the healers, guards, and bandits get too far away, though, Falcon turns around and calls out, \"${name}, come over here!\"\n\t\n\t*page_break \n\t\n\tYou shoot Gertrude a questioning glance. She doesn't look happy about it, but doesn't do anything to oppose the interaction, either. Even with your body aching and after laying in bed for the past few days, you find that you're able to make your way over to her steadily enough. Wiping the sweat from your brow, you say, \"What is it Falcon?\"\n\t \n\tShe grins, saying, \"I'm just glad to be free to get my revenge on Mendax! What made you decide to convince Gertrude to let me go, aside from the obvious? Was it really just for the advantage, or is there something more?\"\n\t*fake_choice \n\t\t#You shake your head, and reply, \"No, there is nothing more. My decision was purely tactical. Either way, both of us have a better chance of meeting our goals, now, so I hope you're grateful.\"\n\t\t\t*set cunning %+5 \n\t\t\t*set falcon %-5 \n\t\t\tThe bandit leader does look a little disappointed, but she manages to hide it rather well. She gives you a practiced smile and says, \"Yes, I am absolutely in your debt, demon ${hunter}. The reason behind your decision isn't as important. I am free, and that is what matters.\"\n\t\t\t\n\t\t\tYou nod wisely, responding, \"I'm glad you've taken it so well. I will be seeing you sooner than I expect, then, I'm sure.\"\n\t\t\t\n\t\t\tFalcon nods as well, giving you a wave in farewell as she goes after the others.\n\t\t\n\t\t#\"Of course,\" you say in earnest. \"You were threatened and used by this demon, and now you want revenge. Who am I to take that away from you? If we can bring him down together, that's even better.\"\n\t\t\t*set resolve %+5 \n\t\t\t*set falcon %+5 \n\t\t\tThe archer grins and replies, \"I like your thinking, demon ${hunter}! Maybe you and I will get along a lot better than I had thought.\" She clasps your wrist in her hand and you clasp it back, an amused look on your face. \"For revenge and the banishment of this demon, then!\" she says loudly. \"Until then, ${name}.\"\n\t\t\t\n\t\t\tWith that, she hurries off, a playful smirk on her face.\n\t\t\n\t\t#You put a hand on her shoulder and lean in, kissing her warmly on the cheek. Giving her a sly grin, you reply, \"Does that answer your question?\"\n\t\t\t*set falcon %+10 \n\t\t\t*set charisma %+5 \n\t\t\t*set falcon_flirt true \n\t\t\tFalcon's eyes widen for a moment but then she breaks into a grin. \"It answers it very well. I never thought I'd be attracted to a demon ${hunter}, but here we are!\" \n\t\t\t\n\t\t\tWith a wink and a wet kiss on your lips, she hurries off, a swagger to her step. Although some of the bandits didn't notice, the ones who did either tease her or simply seem disgruntled. You're also aware that Vidar and Ceylar were watching as well. Ceylar just looks confused and maybe even a little hurt, while Vidar says, \"You're going down a very risky road, demon ${hunter}.\"\n\t\t\t\n\t\t\tHe says this with a grin, but you can tell there's more than a glimmer of sincerity to his words.\n\t\n*if jail_falcon \n\tAs the healers, the sentries, and the bandits walk farther into the distance and toward the general infirmary, you can spot Falcon hanging her head and trudging along. She appears to have lost all of her usual fire, and instead seems resigned to her fate.\n\t\n*page_break \nBy now, you, Vidar, Ceylar, and ${boggart} are the only ones remaining outside the building. The dirt is scattered and it has imprints of bodies and boots, with splattered blood and Falcon's shattered bow marring the surface. Vidar seems to be massaging a bruise on his shoulder, and he looks disheveled and dirty, but otherwise not seriously harmed. Ceylar has a small cut on his wrist, but nothing more.\n\nYour apprentice, on the other hand, has finally exited the infirmary through the window in your room. He is shaking his head tiredly as he observes the scene around him. The magician sighs, and says, \"Well, things could have ended up much worse. Amazing work out there, Vi—\" but he is suddenly interrupted by the sound of boots scuffing against the dirty ground.\n\nYou glance over to see Illil the outlaw leader leaping toward you, a wicked dagger clutched tightly in his bony hands. He shouts, \"No one makes a fool out of me!\"\n\nHe must have sneaked over here during all the commotion! The boggart cries, \"Look out!\" and you stumble away, but the criminal is too fast and you are too weakened to escape him. \n\n*page_break\n\nOut of the corner of your vision, you can see Ceylar racing forward, but he is several feet away and won't be able to reach you in time. You're sure that Illil's blade is going to pierce your stomach and end your life. He's so close that you can see the light shine off his greasy hair and the self-satisfied glint in his eyes. The sunlight reflects off his blade as he plunges it forward, when Vidar suddenly dives in between you, shouting, \"No!\"\n\nIllil gasps in surprise and tries to change directions, but he merely stumbles forward—right into Vidar's blade. The longsword enters his stomach with a sickening squelch, and the outlaw screams in pain, dropping to his knees as blood pours from his torso and dribbles from his gaping mouth. \n\nThe warrior pulls his sword out gingerly, a horrified look on his face, but otherwise seems too shocked to do anything. ${boggart} cries out, \"Do something! He's dying!\" but Ceylar can only look to you for what happens next.\n\n*page_break \n\nBy now, the outlaw has fallen onto his back, his legs sticking out in awkward angles. He gasps for air, spittle and droplets of blood flying from his lips. Sweat beads on his forehead and drips down his greasy face as he gasps for air.\n\nHis eyes dance around wildly, and he croaks in a weak voice, \"Save me, please! I'm sorry, I shouldn't have done this.\" After a hacking cough, the light in his eyes starts to weaken and he slumps back, whispering frantically, \"I'm dying…I'm dying…\"\n\nVidar just drops his sword with a clatter, muttering wildly, \"I didn't mean to—it just happened all so fast….\"\n*fake_choice \n\t#You decide to finish this criminal off. After all he's done, killing him is nothing more than what he deserves.\n\t\t*set compassionate %-10 \n\t\tRolling your eyes, you say to the warrior, \"You aren't just going to leave him hanging, are you? Finish what you started!\"\n\t\t\n\t\tVidar just stares back at you, wide eyed. You shake your head, saying, \"If you won't do what needs to be done, I'll have to do it myself.\"\n\t\t\n\t\tCeylar says, \"${name}, wait—\" but you have already stepped closer to Illil.\n\t\t\n\t\tPicking up his own blade, you crouch over his body and plunge it into his injury, whispering cuttingly into his ear, \"Do not beg me for your life when you wouldn't even spare me my own!\"\n\t\t\n\t\tIllil cries out once, then lets out one last death rattle, his fingers going slack. You cast the dagger away and then stand, looking with disdain at the lifeless corpse. Ceylar edges forward nervously, muttering, \"You know, maybe we should alert a medic and get his body out of the open road. He looks terrible.\"\n\t\n\t#With such a terrible wound that likely punctured multiple organs, you know it's too late to save Illil. The best you can do now is to try to ease his passing.\n\t\t*set charisma %+5 \n\t\t*set cunning %+5 \n\t\tQuickly kneeling down by your fallen enemy, you grasp his hand in yours, giving him a reassuring look. His hand trembles in yours, and his eyes dart back and forth searchingly as if waiting for you to make everything better. Squeezing his hand gently but firmly, you decide to tell a little white lie. \"Don't worry, Illil. A medic saw what happened and he should be here in just a few moments.\"\n\t\t\n\t\tHis eyes widen and his mouth twitches into a pained, manic grin. \"Really?\" he says desperately. \"I'm not going to die? Please, you can't let me die!\"\n\t\t\n\t\tNodding quickly, you reply in your most soothing tone, \"Yes, that's right. The healer will arrive any moment now. They're going to patch you up and you'll be better before you know it.\"\n\t\t\n\t\tThe criminal cracks a bloody grin and starts to giggle in a dazed euphoria, but his voice slowly begins to get quieter as his life fades away. Only a few seconds later, he gives a quiet sigh and slumps backward, dead. You shake your head and stand. \n\t\t\n\t\tThe whole situation is a sad one for sure, but at least you can be satisfied that you helped his death be a better one. Ceylar edges forward, muttering, \"You know, maybe we should alert a medic and get his body out of the open road. He looks terrible.\"\n\t\n\t#You have to save him. He doesn't deserve to die like this! Maybe you can stop him from bleeding out before a healer can arrive.\n\t\t*set compassionate %+10 \n\t\tCrouching beside the dying man, you quickly use his knife to slice off a section of the bottom of your robe. You turn and shout to no one in particular, \"Hurry, go find a healer!\"\n\t\t\n\t\tCeylar looks at you sadly and replies, \"${name}, there's nothing we can do at this point. His wounds are too terrible, and trying to keep him alive might just put him through even more pain.\"\n\t\t\n\t\tYou shake your head and respond, \"We have to do something!\"\n\t\t\n\t\tFortunately, ${boggart} agrees with you. \"I'll go!\" he squeaks nervously, flapping off in the direction of the larger infirmary. \n\t\t\n\t\tWith a sigh of relief, you turn back to Illil. He is whimpering pitifully as blood gushes from his wounds, his eyes staring blankly into the sky. Gritting your teeth, you move closer, talking to him in a soothing voice as you start to bind his wound and stop him from bleeding out. \"Shh,\" you whisper. \"I'm going to help you as much as I can, and a healer will be here any minute now.\"\n\t\t\n\t\tThe outlaw suddenly starts, saying, \"Yes, please don't let me die!\"\n\t\t\n\t\t*page_break \n\t\t\n\t\tBy now, you have managed to tie the rag around his waist and stem some of the blood flow, but this also seems to agitate his wound further, and he winces and grunts in pain. You motion for the warrior to help you, telling him, \"Vidar, prop his head up!\"\n\t\t\n\t\tVidar seems dazed and unfocused, but after a moment he complies, dropping to his knees and holding the criminal's head in his hands. Unfortunately, your efforts don't seem to be enough. The outlaw grits his teeth that are now slick and crimson with blood, and starts to twitch violently. \n\t\t\n\t\tThen, his body falls still and he gives a haunting death rattle as his life slips away. Vidar just stares at Illil's pale face in disbelief, and Ceylar says sadly, \"You did everything you could, ${name}.\"\n\t\t\n\t\tJust then, your apprentice returns, a medic wearing the standard white tunic close behind him. The young man says, \"Oh no!\" as he comes closer, seeing the outlaw's limp body on the ground.\n\t\t\n\t\t\"He's dead…I killed him….\" Vidar chokes.\n\t\t\n\t\tHis mouth turning down, the healer says, \"Here, I can go get a stretcher to carry him away. We don't want him laying here for too long. It's a very sore sight and people could catch disease.\"\n\t\t\nVidar suddenly interjects, saying, \"No, I'll go and cremate him myself. This is something I have to do. My honor requires it of me. I'll be at the crematorium.\"\n\n*page_break \n\nWith that, he promptly picks up Illil's body and starts to walk away toward a stone building with red lights emanating from it, his expression forlorn. Ceylar just looks wiped out from everything that's happened. He says quietly, \"I need to go clear my head and think about some things.\" Motioning to a watchtower off in the distance, he explains, \"I'll be over there if anyone needs me.\"\n\nHaving said that, the magician begins to make his way over to the tower. The boggart, on the other hand, says, \"It looks like everyone is either busy or in need of some time to themselves, so I'm just going to go back to our room and maybe keep Melody some company. He usually comes around this time, after all.\"\n\nIt seems, after realizing that the little bird was a pet of sorts of Lorelle's, ${boggart} was able to suppress the instinct to prey on a smaller animal. Your apprentice flaps into the air and back into Lorelle's infirmary, leaving you alone in the middle of the road. \n\nYou sigh, walking tiredly back into the building as well. You search around for a bit before locating a decent walking stick. You'll need it if you're going to go walking around by yourself. When you exit the smaller infirmary again, nothing but a gentle, cool breeze greets you as the day begins to get darker.\n*label check \n\n*if check > 0\n\tWhat would you like to do now?\n\n*hide_reuse \n*choice \n\t#Go to the general infirmary to check on Lorelle.\n\t\t*set check +1 \n\t\t*if ((vidar_first = false) and (ceylar_first = false))\n\t\t\t*set lorelle_first true \n\t\tYou steadily make your way over to the general infirmary. Although you've never actually seen it for yourself, you still have a good idea of where it's located, and the obvious signs of foot traffic from the bandits and guards otherwise make it easy to find. Along this route are many houses on either side of the path. \n\t\t\n\t\tAlthough the structures all look fairly different, they all have thatched roofs and small sizes in common. Unlike Lorden or even Rhys Falls, however, Quader doesn't have bustling citizenry. There are a few stragglers wandering the streets or hurrying off with carts almost overflowing with vegetables or fruits, but overall this village seems far less busy and populated. \n\t\t\n\t\tThe civilians look a little rougher and more tired, too, but not in a dangerous or sketchy way, either. A few of them shout greetings of, \"Hello, there!\" and, \"Welcome to Quader, stranger!\" but the majority of them mind their own business.\n\t\t\n\t\t*page_break \n\t\t\n\t\tBefore long, though, you're nearing what you can safely assume is the main medical house. It is a decently sized wooden building with a banner hanging from the roof. The banner is white with a bright red heart in the middle, the global sign of a healer. Very few signs are known to have actual writing on them since the general populace isn't educated well enough to read. Not entirely sure what to expect, you make your way up the wooden porch and into the building. Inside are several different booths with cots that are sectioned off using curtains. \n\t\t\n\t\tThe smell of blood, sweat, sanguine potions, and even magic permeates the air. Meanwhile, healers dash about carrying an assortment of water basins, bandages, and vials. Since you aren't sure where Lorelle is, you motion to a passing medic, asking, \"Do you have any idea where Lorelle is? She's one of the top healers.\"\n\t\t\n\t\tThe flustered, middle aged woman with a red complexion and a slightly balding head of hair purses her lips and responds, \"Of course I know who Lorelle is! She's busy right now, so you'll have to come back at another time when there hasn't just been a bandit attack.\"\n\t\t\n\t\t*page_break \n\t\t\n\t\tAnnoyed, you're about to reply when Lorelle rounds the corner, her face determined and her hands holding a pile of herbs. When she notices you standing there, she says, \"Oh, ${name}! I figured you'd come around here. I'm really busy right now, but things seem to be quieting down and the other medics are very capable, so I might be able to finish up shortly. If you want, just meet me at my own infirmary.\"\n\t\t\n\t\tWith that, she rushes off before you have time to say anything. You sigh and head off, deciding that lingering there would only put you in the way of things. The walk back is peaceful: the breeze is gentle and cool, and the sun is shining dimly. It isn't long before you return to the infirmary. The walk was short but by now, your body is beginning to ache\n\t\t*if lorelle_first = false \n\t\t\tterribly. All this walking around between places is very tiring\n\t\t.\n\t\t\n\t\tWhen you step into your room, you see your apprentice playing with Melody. The boggart is tossing pumpkin seeds in various places across the room, and the avian creature is chasing them down and gobbling them up. Melody seems very joyful about all the extra snacks, and ${boggart} is giggling happily as he munches on the seeds as well. \n\t\t*fake_choice \n\t\t\t#You have always found that bird annoying. You grunt, \"Hey, stop wasting all that food! You're just teaching him to take advantage of you.\"\n\t\t\t\t*set lorelle %-5 \n\t\t\t\t*set relationship %-5 \n\t\t\t\t*set altruism %+5 \n\t\t\t\tYour apprentice turns around and frowns, saying irritably, \"Why don't you just mind your own business?\" He pauses and then adds, \n\t\t\t\t*if relationship \u003c 49 \n\t\t\t\t\t\"Idiot.\"\n\t\t\t\t*if relationship > 50 \n\t\t\t\t\t\"I don't know why you care, anyways.\"\n\t\t\t\t\t\n\t\t\t\tMelody, on the other hand, seems to quickly grow impatient when ${boggart} stops tossing him the pumpkin seeds. He chirps loudly a couple times before fluttering off. Just then, Lorelle enters the room. \n\t\t\t\t\n\t\t\t\tYou turn around and see her frowning slightly. She says, \"I just happened to walk in a moment ago. Forgive me for watching without announcing myself, but I didn't want to interrupt your little conversation.\"\n\t\t\t\t\n\t\t\t\t*page_break \n\n\t\t\t\tThe healer sighs and adds, \"Just so you know, I don't mind Melody being fed a few more pumpkin seeds. Those two bonding is a wonderful thing to see, and I think that little bird has already got me wrapped around his toe anyways.\"\n\t\t\t\t\n\t\t\t\tYou shrug and respond, \"Yes, well, it's less about Melody's appetite and more to do with the fact that I don't think it's a good idea for my apprentice to be getting into bad habits.\"\n\t\t\t\t\n\t\t\t\tThe boggart just rolls his eyes, and Lorelle says simply, \"I see.\"\n\t\t\t\n\t\t\t#You laugh and say kindly, \"Looks like you've found a new friend, ${boggart}! Lorelle would certainly be proud.\"\n\t\t\t\t*set lorelle %+5 \n\t\t\t\t*set relationship %+5 \n\t\t\t\t*set charisma %+5 \n\t\t\t\tThe boggart turns around and \n\t\t\t\t*if relationship > 50 \n\t\t\t\t\tsmiles, saying, \"Yeah, I think so too! It's nice to have a friend who appreciates the simple things.\"\n\t\t\t\t*if relationship \u003c 51 \n\t\t\t\t\tfrowns, replying with a humph, \"Yeah, well, it's kind of necessary when you won't even think about being my friend.\"\n\t\t\t\t\t\n\t\t\t\tMelody hops up and down and cheeps insistently, as if unsure of why the boggart has stopped feeding him. ${boggart} gives the bird one last seed, a smile on his face. The animal gobbles it down happily and then flutters off. Your apprentice giggles and says, \"He's probably going to sleep after all that food!\"\n\t\t\t\t\n\t\t\t\tJust then, Lorelle gives a lilting laugh from behind you and says, \"You three are so sweet. And you're right, ${name}, I certainly am proud of our little boggart here.\" She steps through the doorway, saying, \"Forgive me for not announcing myself, but I didn't want to interrupt your conversation, and I'm glad I didn't!\"\n\t\t\t\n\t\t\t#Clearing your throat to make your presence known, you say, \"Hey, just remember to save some of those for me. I'm starving and I could use a snack right about now. Besides, you're overfeeding him.\"\n\t\t\t\t*set altruism %-5 \n\t\t\t\t*set lorelle %-5 \n\t\t\t\t*if relationship > 49 \n\t\t\t\t\t${boggart} just shrugs and says, \"Sure, okay.\"\n\t\t\t\t\t\n\t\t\t\t\tHe stretches out his hands, holding out the bag of pumpkin seeds. You walk over and accept it, taking a handful and munching on them. \n\t\t\t\t*if relationship \u003c 50 \n\t\t\t\t\tThe boggart recoils and hugs the bag of pumpkin seeds to his chest, replying, \"No way! Who said these are yours, fatty?\"\n\t\t\t\t\t\n\t\t\t\t\tYou frown at him and walk forward purposefully, holding out your hand and responding, \"There's no need to be greedy, boggart. You and that bird have already had enough, and now it's my turn.\"\n\t\t\t\t\t\n\t\t\t\t\tYour apprentice looks uncertain, but after a moment he grudgingly hands the bag over. You take it quickly, pinching out some of the seeds and popping them into your mouth.\n\t\t\t\tAs you savor the distinct, salty flavor, Melody chirps angrily and glares at you before fluttering off.\n\t\t\t\t\n\t\t\t\tJust then, Lorelle enters the room. You turn around and see her pursing her lips and frowning in disapproval. She says, \"I know they taste good, ${name}, but I don't think it would hurt you to wait a while and let them have some fun.\"\n\t\t\t\t\n\t\t\"Anyways,\" she says, \"I came down here to get some extra supplies that they don't have there, but I'm not really in a hurry because the severely wounded are being taken care of, and the other healers seem to have the rest under control.\" She begins to sift through one of the cabinets but turns to you and adds, \"Is there a reason you tried to see me at the general infirmary earlier?\"\n\t\t*fake_choice \n\t\t\t#You reply, \"I just wanted to let you know how good of a job you've been doing. Those patients and myself were all lucky to be under your care.\"\n\t\t\t\t*set altruism %+5 \n\t\t\t\t*set lorelle %+5 \n\t\t\t\t*if lorelle > 50 \n\t\t\t\t\tShe smiles, saying, \"That's very nice of you to say, ${name}. I'm happy to do it, and I do certainly hope that I'm doing as well as you say.\"\n\t\t\t\t\t\n\t\t\t\t\t${boggart} pipes up, \"Yeah, Lorelle! I've been sleeping like a baby ever since I got here.\"\n\t\t\t\t\t\n\t\t\t\t\tShe laughs and replies, \"I'm very glad to hear it, little one.\"\n\t\t\t\t*if lorelle \u003c 51 \n\t\t\t\t\tThe healer pauses, as if not exactly sure if you're trying to mess with her or not. After a moment, she finally says, \"Well, thank you. I appreciate it. I am just doing what I feel is right, though. If anyone is in need of healing, I'm honor bound to treat them.\"\n\t\t\t\t\t\n\t\t\t\t\tThe boggart smiles at her wistfully, saying, \"You're so nice!\"\n\t\t\t\n\t\t\t#You glance at your apprentice and decide it's best to talk with her in private if you're going to tell her of your affections. You smile and gently take the healer's hand, leading her into the hallway.\n\t\t\t\t*set lorelle %+10 \n\t\t\t\tLorelle seems very surprised. \n\t\t\t\t*if lorelle > 59\n\t\t\t\t\tEven so, she happily accepts your hand, blushing deeply and giving you a shy smile as she follows you out of the room. \n\t\t\t\t\t*if relationship > 50 \n\t\t\t\t\t\t${boggart} whistles loudly and then cackles to himself, inciting the healer to turn an even darker shade of red.\n\t\t\t\t\t*if relationship \u003c 51 \n\t\t\t\t\t\tYour apprentice just rolls his eyes pointedly and grunts loudly.\n\t\t\t\t\tWhen you get to the narrow hallway and shut the door behind you, Lorelle says hopefully, \"What is it, ${name}?\"\n\t\t\t\t\t\n\t\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t\t*label c \n\t\t\t\t\t\tYou give her your most charming smile and say, \"Darling, something about you makes my heart skip. You are beautiful, kind, and compassionate, and I want to see those qualities in you every day.\"\n\t\t\t\t\t\t*goto cc \n\t\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t\tYou give her a small smile and say politely, \"Lorelle, every minute we spend together brings us a little bit closer, and I would like to continue that and explore my feelings for you even more.\"\n\t\t\t\t\t\t*goto cc \n\t\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t\tThinking carefully about how exactly you are going to tell her, you smile and say, \"You are excellent at whatever you put your mind to, and it fascinates me. I want to see that for myself every day, and help you along the paths that you have chosen.\"\n\t\t\t\t\t\t*goto cc \n\t\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t\tLooking her right in the eyes, you hold her gaze and say confidently, \"Lorelle, I feel compelled to tell you that even being around you is invigorating. You are a wonderful person and incredibly strong, in your own ways.\"\n\t\t\t\t\t\t*goto cc \n\t\t\t\t\t*else \n\t\t\t\t\t\t*goto c \n\t\t\t\t\t*label cc \n\t\t\t\t\t\t\n\t\t\t\t\tThe healer blushes even harder and gives you a nervous smile, replying, \"Oh, my! I had no idea. Well, maybe it was rather obvious if you think about it—not that you're too forward, or anything because you're not. But if you were, that'd be fine, too—I mean, there's no problem with that. But this is wonderful news! You're quite\n\t\t\t\t\t*if male \n\t\t\t\t\t\tdashing \n\t\t\t\t\t*if female \n\t\t\t\t\t\tbeautiful \n\t\t\t\t\tyourself, and you have so many good qualities—\"\n\t\t\t\t\t\n\t\t\t\t\tYou laugh and silence her with a kiss. Lorelle looks surprised for a moment, but then she just gives you a sheepish smile and says, \"Oh, right. I tend to babble a little bit when I get too nervous.\"\n\t\t\t\t\t\n\t\t\t\t\tYou grin at her and respond, \"So I've noticed! Well, I take it that you feel the same way about me?\"\n\t\t\t\t\t\n\t\t\t\t\t\"Oh, yes!\" she says happily. She grabs your hand and squeezes it tightly before saying, \"Still, I must be going. I have to take some potions back to the larger infirmary, but we shall definitely talk about this later.\"\n\t\t\t\t\t\n\t\t\t\t\tWith that, she disappears into the room. A few moments later, she exits the room again, holding a few potions and beakers. She shoots you one last excited grin before exiting the building and leaving you alone. Even so, you feel less alone than you have in a very long time.\n\t\t\t\t*if lorelle \u003c 60\n\t\t\t\t\tShe goes rigid at your touch and it almost seems like she's going to rebuff your advances, but she just follows you, a confused look on her face. ${boggart}, meanwhile, simply rolls his eyes. When you get to the narrow hallway and shut the door behind you, the healer takes her hand away and gives you a quizzical look, saying, \"What is it?\" \n\t\t\t\t\t\n\t\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t\t*label v \n\t\t\t\t\t\tYou eye her, trying to find any clues about how she might react. So far, it doesn't seem very good. Even so, you go ahead and give her a winning smile and reply, \"Lorelle, I feel a fiery connection between us. Surely, we can push aside our minor disagreements?\"\n\t\t\t\t\t\t*goto vv \n\t\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t\t*goto thinking \n\t\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t\t*label thinking \n\t\t\t\t\t\tThinking hard about your choice of words, you say hesitantly, \"You and I both know that we do not see eye to eye on everything. Even so, I feel you must know that I am attracted to you nevertheless.\"\n\t\t\t\t\t\t*goto vv \n\t\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t\tYou straighten your back and say boldly, \"Lorelle, I can't hold my tongue any longer. I want you to know that, despite our differences, something about you makes you irresistible to me.\"\n\t\t\t\t\t\t*goto vv \n\t\t\t\t\t*else \n\t\t\t\t\t\t*goto v \n\t\t\t\t\t*label vv \n\t\t\t\t\t\t\n\t\t\t\t\t*set lorelle %-5\n\t\t\t\t\t*page_break \n\t\t\t\t\tLorelle's eyes widen and she just blinks a few times, as if you're speaking some bizarre foreign language. She starts to rub her arm nervously before responding, \n\t\t\t\t\t*if lorelle > 49  \n\t\t\t\t\t\t\"${name}, I'm flattered, but I'm sorry to say that I don't feel the same way. I do enjoy your company, but not like that.\" She gives you an apologetic look and then hurries toward the door, adding, \"Anyways, I'd better get back to the other infirmary.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tWith that, she disappears into the room. A few moments later, she exits the room again, holding a few potions and beakers. She gives you one last glance and waves goodbye with a sad smile before rounding the corner and leaving you there alone.\n\t\t\t\t\t*if lorelle \u003c 50 \n\t\t\t\t\t\t\"I don't know if you're just trying to upset me, but I don't feel the same way about you. Maybe this would have worked well if things had played out differently, but your attitude toward others and myself has made me resentful of you.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I don't think I can consider you a friend, let alone something more than that, until you have apologized and changed.\" You frown and open your mouth to reply, but she shakes her head and says, \"I'm sorry, I have work to do.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tWith that, she disappears into the room. A few moments later, she exits the room again, holding a few potions and beakers. She purposefully ignores you as she passes, rounding the corner and leaving you there alone.\n\t\t\t\n\t\t\t#You fold your arms and say cuttingly, \"I thought you should know that I think it's ridiculous for you to be helping those bandits. They deserved what they got and contribute nothing to society. I would have let them deal with their own injuries.\"\n\t\t\t\t*set compassionate %-5 \n\t\t\t\t*set lorelle %-10 \n\t\t\t\tFor the first time since being around Lorelle, she finally seems to let her anger show. She gives you a withering glare and says, \"Excuse me? What you just suggested goes against everything I believe as a healer! If someone is hurt, regardless of who they are, it would go against my conscience to let them go untreated.\" \n\t\t\t\t\n\t\t\t\tShe works her jaw and then says cuttingly, \"Unlike you, I could never let anyone suffer. Even if they deserve to go to a dungeon afterwards like those bandits, they should be shown basic dignities and compassion.\"\n\t\t\t\t\n\t\t\t\t*page_break \n\t\t\t\t\n\t\t\t\tYou arch an eyebrow and retort in annoyance, \"Ah, yes, because dignity and compassion are the trademark of all bandits. I'm sure they were keeping that in mind when they tried to murder me and committed crimes in the past. Give them a taste of their own medicine or they'll never learn!\"\n\t\t\t\t\n\t\t\t\tThe healer shakes her head and responds, \"Again, there are many differences here. I am not a bandit—I am a healer, and I act like one.\"\n\t\t\t\t\n\t\t\t\tYou're about to respond when ${boggart} suddenly speaks up. \n\t\t\t\t*if relationship > 64 \n\t\t\t\t\tHe says, \"Sorry to say it, ${name}, but I agree with Lorelle, even if I don't particularly like those bandits.\"\n\t\t\t\t\t*goto agree\n\t\t\t\t*if relationship > 50\n\t\t\t\t\tYour apprentice comments, \"You should probably listen to Lorelle. She's right, you know.\"\n\t\t\t\t*if relationship \u003c 49 \n\t\t\t\t\tThe boggart interjects and says to you, \"Like always, you seem to be wrong. She knows what she's talking about.\"\n\t\t\t\t*label agree \n\t\t\t\t\n\t\t\t\tYou frown and shrug, responding, \"I can see you won't listen to reason, then. Sometimes, pragmatics and revenge are more important than compassion to those who don't deserve it.\"\n\t\t\t\t\n\t\t\t\tLorelle just huffs in frustration and grabs a pile of potions from the cabinet, rushing out of the room before you have time to continue. ${boggart} \n\t\t\t\t*if relationship \u003c 51 \n\t\t\t\t\thisses, \"Way to go, ${name}! Maybe keep your stupid opinions to yourself next time.\"\n\t\t\t\t*if relationship > 50 \n\t\t\t\t\tsays sarcastically, \"You're so sensitive ${name}.\"\n\t\t\t\t\t\n\t\t*page_break \n\t\t\n\t\t*if check = 3\n\t\t\t*label sleep \n\t\t\tAfter all that you've done today, the sun has finally begun to dip under the horizon. You're exhausted already, and the growing shadows only make the sensation more prominent. \n\t\t\t*if away \n\t\t\t\tNot wanting it to get too late before you return to your bed, you hurry through the streets toward Lorelle's infirmary. \n\t\t\t\t\n\t\t\t\tAlong the way, ravens call ominously in the night and you can see people closing the doors and shutters of their homes. Before long, you make it back to the building and head into your room.\n\t\t\tYou crawl into your bed, pulling the covers over yourself and letting out a contented sigh. With Illil and all of his outlaws out of the picture, there are no imminent threats against you so you can finally relax, at least somewhat.\n\t\t\t\n\t\t\tYou assume that Ceylar, Vidar, and Lorelle will return shortly, but until then you should be safe enough from any unlikely threats, considering that your apprentice is here.\n\t\t\t*if relationship \u003c 50 \n\t\t\t\tHe may be practically intolerable, but at least he's not entirely useless. As you drift off to sleep, he pointedly ignores you aside from curling up at the bottom of the bed.\n\t\t\t*if relationship > 64 \n\t\t\t\tIt's wonderful to have him by your side, especially now in these trying times. As you start to fall asleep, you tell him, \"Goodnight, little one.\"\n\t\t\t\t\n\t\t\t\t\"Goodnight, ${name}!\" he responds, curling up warmly by your feet. \n\t\t\t\t*goto gnight \n\t\t\t*if relationship > 49 \n\t\t\t\tIt's very reassuring, really. \"Goodnight,\" you murmur to him sleepily as your eyelids begin to droop.\n\t\t\t\t\n\t\t\t\t\"Night!\" he replies as he gets comfortable at the bottom of your bed.\n\t\t\t*label gnight \n\t\t\t*finish Continue \t\n\t\t*goto check \n\t\t\n\t#Follow Vidar to the crematorium.\n\t\t*set check +1 \n\t\t*if ((lorelle_first = false) and (ceylar_first = false))\n\t\t\t*set vidar_first true \n\t\tAs you begin to walk in the general direction of where Vidar headed, \n\t\t*if vidar_first\n\t\t\tyou see his stature suddenly change. Whereas before he was practically stumbling about at a slow pace, he has now seemed to regain some of his usual vigor and determination. He straightens out his posture and walks more pointedly toward the crematorium. \n\t\t*if (vidar_first = false)\n\t\t\tyou estimate that Vidar may already be done with the cremation ritual, or somewhere in the middle of it. Either way, you should be able to catch up to him there before he leaves. Cremation is not something that people tend to rush, and Vidar seemed adamant about doing the whole process properly. \n\t\tAlong the way, you see mostly storage houses, but little else. \n\t\t\n\t\tApparently, most people don't feel comfortable having their own homes so close to a place of death, no matter how sacred some consider it to be. After a few minutes of walking, you are finally nearing the large stone building. Over here, the walkways are more established, with stone being the predominant surface instead of dirt. The front of the building is a rather nondescript one, but the structure exudes importance nonetheless.\n\t\t\n\t\t*page_break \n\t\t\n\t\tIndeed, the few people leaving or entering the building seem solemn and respectfully quiet. You step past the bare foyer to the inside of the crematorium. It is essentially a large open room with stone pillars and large rectangle fireplaces spaced throughout. There are also decent sized pieces of pottery lining the walls upon jutting shelves. \n\t\t\n\t\tThere are a few workers in simple grey robes, helping people to keep safe through the cremation process and otherwise handing out jars for anyone who would like to keep a part of their beloved deceased. Vidar is nowhere to be seen. After a couple minutes of looking around, you decide to simply ask one of the robed individuals if they've seen him here.\n\t\t\n\t\tYou walk up to one of them, a balding old man with pale skin, and ask, \"Have you seen a tall, brown skinned man carrying another man? He should have just came here not too long ago. You may know him as Vidar, a member of a local adventuring party.\"\n\t\t\n\t\tPursing his lips and furrowing his brow, the man seems to think about it for a moment. After a bit, he finally replies, \"Oh, yes, how could I have missed him? He requested to have a secluded room. He should still be back there.\"\n\t\t\n\t\tYou nod,\n\t\t*if charisma > 64 \n\t\t\tsaying, \"Thank you very much,\"\n\t\t*if charisma \u003c 65 \n\t\t\tbrushing past the man \n\t\tas you head over to the room that he indicated.\n\t\t\n\t\t*page_break \n\t\t\n\t\tEven before entering the room, you can tell that it's stifling hot. Grey smoke mixed in with various perfumes to mask the odor of burning flesh emanates from within, and the fire inside sends wicked shadows dancing across the floor. You enter cautiously and see that Vidar is on his knees by the cremation chamber. He is staring into the flames, his hands laying limply by his sides and his expression stony.\n\t\t\n\t\tWhen you move closer, he finally notices you. The warrior turns around just enough to see who it is behind him. When he recognizes you through the smoke, he cracks a mirthless grin and mutters, \"Death is a funny thing, isn't it? I've defeated dozens of villains like Illil, and many of them were even worse than he was.\" \n\t\t\n\t\tHe turns back to the fire that is devouring the outlaw's body, and continues, \"It always gave me satisfaction to know that I was avenging the victims of those horrible people, and that I was making them pay for their deeds in some small way by injuring them.\" \n\t\t\n\t\tHe furrows his brow, his lips turning down as he finishes, \"Still, it's all so much different than killing someone. This was my first time, and it wasn't even my intention. I just needed to stop him from killing [i]you[/i]. But it's so permanent, and the desperation in his eyes and his pleas for us to save him made me realize even more that I could never take it back.\"\n\t\t*fake_choice \n\t\t\t#You sneer at him and say bitterly, \"You style yourself as a warrior, but you cower at mere aspects of war! Illil was a pathetic waste who was trying to murder me, and you killed him because of it. Instead of moping around, you should be glad that your goal was accomplished and he is no longer a thorn in any of our sides.\"\n\t\t\t\t*set compassionate %-5 \n\t\t\t\t*set vidar %-10\n\t\t\t\tFor a moment, Vidar just stays there, not replying at all. He balls his fists and begins to shake, then leaps to his feet, swiveling around to meet you. All traces of sorrow are gone from his face. Instead, his features are twisted with anger, the smoke blowing from Illil's corpse only seeming to add to the impression. \n\t\t\t\t\n\t\t\t\tHe cuts his hand through the air in front of you, practically roaring, \"Get out before I do something I'll regret! If you weren't in the state you're in, you can be certain I'd have wiped that smug smile off your face by now.\" His eyes dancing with flame, the warrior continues, \"Now leave!\"\n\t\t\t\t\n\t\t\t\t*if vidar > 49 \n\t\t\t\t\tSurprised at how enraged he is getting, you quickly step away. When you pause, the warrior jabs a finger at the doorway and demands, \"Go!\" and you just scoff, quickly getting out of there before things get out of hand.\n\t\t\t\t*if vidar \u003c 50 \n\t\t\t\t\tKnowing that it would be unwise to agitate him any further within such close range, you just raise an eyebrow and duck quickly out of the door. Before you leave him, however, you whisper just loudly enough for him to hear, \"Bravado is still just bravado, [i]warrior[/i].\"\n\t\t\t\n\t\t\t#Knowing that no words could comfort him well enough, you drop to your knees so you're sitting behind him. You then wrap your arms around his chest and rest your head upon his broad shoulders.\n\t\t\t\t*set vidar %+10 \n\t\t\t\t*set compassionate %+5 \n\t\t\t\tVidar tenses for a moment,\n\t\t\t\t*if vidar > 54 \n\t\t\t\t\tbut then suddenly relaxes. His breath seems to steady, and his chest is no longer heaving in what would soon have become sobs. He places a large hand on yours, whispering huskily, \"Thank you, demon ${hunter}. It helps a lot to know that you can still feel affection toward me even after what I've done.\"\n\t\t\t\t\t\n\t\t\t\t\tYou kiss him gently on the cheek and respond, \"Of course I can, Vidar. You saved me in the only way you could have, and it means more than anything to me. That's the second time you've rescued me from certain death, and at the hands of the same villain, too. You're an amazing person and you should be proud of what you've done.\"\n\t\t\t\t\t\n\t\t\t\t\tThe warrior gently breaks out of your grip and stands up, offering you his hand. You take it and rise, smiling. He gives you a sad smile in return and then sighs, looking down at Illil's burning body inside of the cremation chamber. \n\t\t\t\t\t\n\t\t\t\t\t*page_break \n\t\t\t\t\t\n\t\t\t\t\tMotioning toward it, he says, \"You've given me the strength to continue with this.\" He coughs for a moment because of the smoke, then continues, \"I'm going to stay here for a while longer to complete this ceremony, but I will certainly find you later.\"\n\t\t\t\t\t\n\t\t\t\t\tYou nod understandingly, replying, \"Okay, Vidar. If this is something you need to do, then I will leave you to it.\" You touch his hand lightly and say, \"Until then,\" and then depart.\n\t\t\t\t*if vidar \u003c 55 \n\t\t\t\t\tthen suddenly shrugs out of your grip completely. He stands up and moves several feet away, his hands shaking lightly. With emotion tugging at his voice, his words only become huskier. He says, \"Showing so much of my emotions like this was a mistake. I don't want you taking pity on me when I'm probably just overreacting, anyways.\"\n\t\t\t\t\t\n\t\t\t\t\tHe glances at the fire one last time and grimaces, then hurries past you through the doorway. You try to call out after him, saying, \"Vidar, wait—\" but he is already gone.\n\t\t\t\t\t\n\t\t\t\t\tYou sigh in frustration and hurry out after him, not having any other reason to stay inside a room with the burning corpse of an outlaw.\n\t\t\t\n\t\t\t#You grip his shoulder consolingly, telling him, \"Everything happened so quickly that I would have died if it wasn't for you. You saved my life, and I can never forget that. Although Illil's death is regrettable, he knew what he was doing and should have been fully prepared for the consequences.\"\n\t\t\t\t*set vidar %+5 \n\t\t\t\t*set resolve %+5 \n\t\t\t\tVidar just works his fingers absent-mindedly, seeming to think about it for a moment. Finally, he replies, \"Maybe you're right, demon ${hunter}. That was his second time trying to murder you, and his greed would have been the death of him one way or another.\"\n\t\t\t\t\n\t\t\t\tYou nod, responding, \"Exactly. You are a noble warrior to have only killed when it was absolutely necessary, and this area will be better now that this bandit leader is gone.\"\n\t\t\t\t\n\t\t\t\tThe warrior takes a deep breath and climbs to his feet, staring somberly into the blazing fire. After a moment, he finally speaks. \n\t\t\t\t*if vidar > 54 \n\t\t\t\t\tHis voice seeming a little lighter than before, he says, \"You've helped me see this whole situation in a better light, demon ${hunter}, and I thank you very much for it.\" After a pause, he finishes, \"Still, I'm honor bound to complete this ceremony. If you don't mind, I'd like to be alone a while longer.\"\n\t\t\t\t\t\n\t\t\t\t\tYou respond, \"I understand, Vidar. Hopefully this will give you the inner peace you're looking for.\"\n\t\t\t\t*if vidar \u003c 55 \n\t\t\t\t\t\"I appreciate you putting things into perspective for me, demon ${hunter}. Now, if you'll excuse me, I have to finish this.\"\n\t\t\t\t\t\n\t\t\t\t\tKnowing a goodbye when you see one, you reply, \"Until later, then.\"\n\n\t\tWith that, you exit the sweltering and dimly lit crematorium to the farewells of a couple of the robed workers inside. \n\t\t*if check = 3 \n\t\t\t*set away true \n\t\t\t*goto sleep \n\t\t*goto check \n\t\n\t#You head over to the watchtower to see what Ceylar is doing.\n\t\t*set check +1 \n\t\t*if ((lorelle_first = false) and (vidar_first = false))\n\t\t\t*set ceylar_first true \n\t\t*if ceylar_first = true \n\t\t\tBy now, Ceylar is just a faint silhouette ahead of you, his robe billowing in the wind as he gets closer and closer to the watchtower. You follow him, though your pace is much slower even with the walking stick. \n\t\t*if (ceylar_first = false)\n\t\t\tBy now, you imagine Ceylar would have reached the tower several minutes ago at the very least. You go in the same direction as you saw him heading, but your pace is also considerably slower even with the aid of your sturdy walking stick.\n\t\tYou pass a few modest homes with thatched straw roofs and spindly wooden fences, but this close to the outside of the village, not much is around. \n\t\t\n\t\tA few minutes more of walking along the dusty path leads you to your destination. The building itself is made out of stark grey rectangles of rock and mortar. Although it is chipping and worn in certain places, it looks sturdy enough and you can tell it's been here for quite some time. You enter through the prominent doorway and ascend the simple stone staircase that leads up to the top of the tower. \n\t\t\n\t\t*page_break \n\t\t\n\t\tThe place is damp and rather cold, but also isolated and peaceful in an eerie way. Your sides have begun to ache from the significant climb, but you finally make it, finding yourself at the top level surrounded by ramparts. The first thing you notice is the magnificent scene. Stars twinkle brightly in the sky, and the height affords you a perfect view of the surrounding forests and rolling hills outside of Qauder. \n\t\t\n\t\tCertainly, you can understand why the magician would venture here to clear his head. That is when you see him. Ceylar is leaning out against the edge of the tower and looking into the distance. You move a little closer and he notices you, turning around with a sad look on his face. He says, \"Oh, hello, ${name}. I figured you'd find me up here.\" \n\t\t\n\t\tHe sighs and grips the wall tightly with his fingers, saying, \"I just can't help but feel that I'm responsible for that guard's death.\" He shakes his head and adds, \"If I had acted sooner with my magic, he wouldn't have been killed by Falcon's bandit.\"\n\t\t*fake_choice\n\t\t\t#You give him a consoling, sad smile and reply, \"It isn't easy, dealing with something like this, but I think that if you weren't there, things would have turned out much worse. You did everything you could.\"\n\t\t\t\t*set ceylar %+5 \n\t\t\t\tThe magician nods but doesn't look completely convinced. He responds, \"Maybe you're right, but even so, I can't help but thinking that I could have done something more, or acted faster, or even just used my magic in the beginning of the fight instead.\" He shakes his head and finishes tiredly, \"It's all so much to think about, and it's eating me alive.\"\n\t\t\t\t\n\t\t\t\tYou give him a knowing look and say, \"I understand, Ceylar. Believe me, I've thought about exactly the same things several times before, but all it does is break you down. In reality, you should be proud of what you did today. You tried your hardest to do what you thought was right, and that's something you can hold on to, despite how things may have turned out in the end.\"\n\t\t\t\t\n\t\t\t\tHe looks out into the open sky, his lips pursed in concentration and thought. After a moment,\n\t\t\t\t*if ceylar \u003c 51 \n\t\t\t\t\the just shakes his head, unsure. \"Thanks for trying to comfort me, ${name},\" he says, \"but I don't want you to have to tell me something you might not even believe just to try to make me feel better.\" He sighs and continues, \"Either way, I think I need some more time by myself. I appreciate you dropping by, though.\"\n\t\t\t\t\t\n\t\t\t\t\tYou shrug and say, \"Sure, Ceylar. I'll see you later, then.\"\n\t\t\t\t*if ceylar > 50 \n\t\t\t\t\the breaks into a small smile and says, \"Thank you so much, ${name}. That's exactly what I needed to hear.\" He pats you on the shoulder fondly but says, \"Still, though, I think I'd like to have a few more minutes alone. It's nothing against you—I just have to clear my head or I'll never be able to focus.\"\n\t\t\t\t\t\n\t\t\t\t\tYou nod understandingly and respond, \"Absolutely, Ceylar. I hope things go well for you.\"\n\t\t\t\t\t\n\t\t\t\tWith that, you turn away and head toward the exit.\n\t\t\t\n\t\t\t#You set your walking stick aside and pull him into an embrace, telling him, \"I'm sorry, Ceylar. I know it's hard, but I'm here for you.\"\n\t\t\t\t*set ceylar %+10 \n\t\t\t\t*set compassionate %+5 \n\t\t\t\tThe magician seems surprised for a moment,\n\t\t\t\t*if ceylar \u003c 60\n\t\t\t\t\tand maybe even a little confused. His body briefly goes rigid, but he finally relents, accepting the embrace. After a few more moments of this, he gently breaks away, saying awkwardly, \"Err, thanks, ${name}.\"\n\t\t\t\t\t\n\t\t\t\t\tHe steps back a couple of feet and says, \"Although I do appreciate you trying to comfort me, sometimes I do really need to be alone.\"\n\t\t\t\t\t\n\t\t\t\t\tYou nod and respond, \"Okay, Ceylar. I understand.\"\n\t\t\t\t\t\n\t\t\t\t\tWith that, you make your way toward the exit. \n\t\t\t\t*if ceylar > 59\n\t\t\t\t\tbut after a moment he starts to relax in your arms. He buries his head into your shoulder and grips you tightly. He is shaking slightly, which makes his mane of hair tickle your nose. \n\t\t\t\t\t\n\t\t\t\t\tYou have to suppress the automatic urge to laugh, and instead rub your cheek gently against his head. He looks at you with a small smile, and says, \"You're wonderful, ${name}. I really appreciate this.\"\n\t\t\t\t\t\n\t\t\t\t\tYou smile back warmly and reply, \"Of course, Ceylar. You're an amazing person and I just want to make you feel better. You don't deserve to feel guilty about any of this.\"\n\t\t\t\t\t\n\t\t\t\t\tThe magician nods thoughtfully and responds, \"Yeah, maybe you're right.\" \n\t\t\t\t\t\n\t\t\t\t\tAfter holding the embrace for a few seconds longer, he finally breaks away. When you say, \"Are you okay?\" he nods rapidly, straightening out his robes as if looking for something to do.\n\t\t\t\t\t\n\t\t\t\t\tHe says, \"Not entirely, but you've done wonders here, ${name}. As much as I wish that nRemember earlier how we told you that the first three chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n\t*subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2017-12-26 $3.99 $2.99 purchased\n*abort", "romances": "*temp dream 0 \n*temp gretchin_dream false \n*temp gretta_dream false \n*temp games 0 \n*temp rematch 0 \n*temp talk 0\n*temp boggart_bed false \n*temp boggart_gone false \n*temp story 0 \n*temp read 0 \n*temp activity 0\n\n*page_break \n\n[b]Chapter Five of Seven[/b]\n\nTonight, your rest is surprisingly peaceful, and you find yourself drifting in and out of various dreams. Most of them are actually quite positive, and others are even blissful.\n*label dreams \n*hide_reuse \n*choice \n\t#You fantasize about being alone with Vidar.\n\t\t*set vidar %+5 \n\t\t*set dream +1 \n\t\tVidar is unlike almost everyone you've seen, with a dark brown skin tone and eyes darker than a moonless night. Not only that, but his voice is exceptionally deep, so much so that it conveys a sense of power and control. His body is extraordinarily fit, with bulging muscles toned to perfection. To put it all together, his stance conveys a surety that is contagious and sexy at the same time.\n\t\t\n\t\tIn your dream, you find out the setting is, oddly enough, simply a large pool of smooth mud. Despite this, however, it doesn't look particularly dirty. Far from it, actually. It's a nice light brown color and it's bubbling gently with faint tendrils of steam emanating from it. Inside the mud hole is Vidar who is down on his knees. He's completely naked but also covered in mud. You're naked, too, you suddenly notice. \n\t\t\n\t\tAlthough this obscures the finer details of the man in front of you, it's still a wonderful sight that instantly gets your blood pumping. The hot mud coating his body makes his skin look smooth and his pectorals and biceps seem even more massive. He gives you that chipped tooth grin and winks, waving you over and saying, \"Come and join me, ${name}.\"\n\t\t\n\t\t*page_break \n\t\t\n\t\tYour spine suddenly tingles at the mention of your name. Maybe you didn't notice until he actually called you by your real name, but he always seemed to refer to you as \"demon ${hunter}\" before. Perhaps this is just a dream mechanic, but it makes the experience more intimate already. You laugh and quickly slide your way in next to him. The mud only goes up a few inches, but it's enough.\n\t\t\n\t\tWith a mischievous grin, the warrior suddenly grabs you and pulls you on top of him, getting mud all over you. You land flat, his naked body pressing against you as he gives a hearty laugh and tries to wrestle with you. Although he's stronger than you are, the mud makes it so that neither of you can get a good hold of the other.\n\t\t\n\t\tThe result is that the next few moments are spent with the two of you slipping and sliding on top of each other, your warm bodies touching at every movement. You feel your face flushing as you get more and more excited, and Vidar begins to moan in pleasure. Just then, however, the dream starts to close, as if knowing full well that the climax isn't far away.\n\t\t*goto dreams \n\t\t\n\t#You imagine being somewhere with just Lorelle where no one is watching.\n\t\t*set lorelle %+5 \n\t\t*set dream +1 \n\t\tLorelle is one of the kindest and most polite people you know, but she also seems to be receptive to flirting, which only makes her more intriguing. She has gorgeous pale skin, with dark hair in a modest style. Her innocence actually makes her very attractive, and her slim figure looks good even under a simple tunic.\n\t\t\n\t\tInside your unconscious, you are laying in a bed of dandelions sprouting in a vast meadow. The air is filled with the pleasant smell of dozens of different types of flowers, and a morning dew upon the grass cools your back. Songbirds are singing their winding tunes from atop large, healthy trees, and the sun is shining through a set of perfect white clouds. The whole experience is serene, and you feel nothing but contentment.\n\t\t\n\t\t*page_break \n\t\t\n\t\tAs you lay and look into the baby blue expanse above you, Lorelle's smiling face suddenly appears above yours. A dandelion is tucked in behind her ear, and she is wearing a surprisingly thin dress that only comes down to her knees. It reveals shapely legs, and it is patterned like a rainbow. The healer leans down and whispers, \"Good morning, my \n\t\t*if female \n\t\t\tlovely lady,\"\n\t\t*if male \n\t\t\thandsome boy,\"\n\t\tand presses her lips to yours.\n\t\t\n\t\tShe tastes faintly of strawberries, and her lips are luscious and full. After a moment, she takes things further by introducing her tongue to the equation, and before long she has climbed on top of you, her hands rubbing slowly and gently up and down your body. She presses herself tightly against you, and although she is rather thin, her skin is very smooth and her body is soft and toned.\n\t\t\n\t\tAfter a moment she starts to rub her body against yours, and you both begin to moan in pleasure. Your face flushes red as you get more excited, and you see that it's the same for Lorelle. Shortly after this, though, the dream fades away into something else.\n\t\t*goto dreams \n\t\t\n\t#You've wanted to show your affections for Ceylar for days now, and this desire manifests itself in your subconscious.\n\t\t*set ceylar %+5 \n\t\t*set dream +1 \n\t\tNot only does Ceylar have perfect hair that is soft and shiny, but he has wonderfully toned muscles, which is something you've been fortunate enough to see for yourself. Of course, it should come as no surprise that he also takes very good care of the rest of his body. He is almost always clean, and his teeth are sparkly white.\n\n\t\tFor whatever reason, your unconscious has decided to take you to an empty stage meant for plays and other entertainment purposes. Dreams don't always make very much sense at first, and this seems to be the case here, too. Either way, you hardly notice your surroundings, as the magician is just a few feet away and clad only in a pair of red tights.\n\n\t\tHis lion's mane of hair is slicked back over his shoulders, and his chest is heaving and glistening with sweat. He must have been doing some intense acting or exercise, but your thoughts aren't on that right now as you notice the sizable bulge below his waist. Ceylar gives you his customary winning smile and begins to circle around you very closely, breathing heavily on your neck and blowing into your ears.\n\t\t\n\t\t*page_break \n\t\t\n\t\tYour spine tingles as goosebumps begin to appear all across your arms and legs, and the hair stands up on the back of your neck. You shiver in delight and press into him as he wraps his arms around you and starts to kiss your neck. Then suddenly, he begins to sing. In the dream, the words are incomprehensible, but the energy coming from them is more than enough. \n\t\t\n\t\tThey are full of passion and desire, and they make your entire body tingle and flush with heat. From there, Ceylar dances around you like no one you had ever seen before, caressing every inch of your body and kissing you with warm, soft lips. Your bodies end up pressing and rubbing against one another, and you eventually fall to the floor, the magician on top of you. \n\t\t\n\t\tYou hadn't realized it until now because of all the excitement, but somehow he had managed to undress you gradually until you are almost completely naked. He gives you a sly smile, and then the night really begins. Unfortunately, your mind inevitably wanders to something else.\n\t\t*goto dreams \n\t\n\t#It was difficult to show it in any way before, but you find Falcon incredibly attractive. You are drawn to her, and this appears in one of your dreams.\n\t\t*set falcon %+5 \n\t\t*set dream +1 \n\t\tEver since you saw Falcon back in the outskirts of Lorden, you were instantly attracted to her. Maybe it was because of her shapely body, or because of the wild but somehow tamed beauty of her hair, or even just her playful surety. Whatever it was that drew you to her initially, you now find her almost irresistible. She has a fire blazing within her, and piercing verdant eyes that match her every quality perfectly.\n\n\t\tIn the dream world, you find yourself in some kind of arboreal city high in the jungle, where sunlight filters brightly through the green leaves and various animals call out in a cacophony of strange noises. The larger branches of the massive trees act as pathways of sorts between what could only be described as very natural looking tree houses, and you soon find that you can glide effortlessly across their surfaces.\n\n\t\tIn front of you stands Falcon, staring at you with a sly grin. She is a beautiful sight, with her hair drawn up about her in wild patterns. The only thing that's covering her is an assortment of large leaves tethered together using vines, and this style of clothing does well to show off tan flashes of skin and complement the many curves of her body.\n\t\t\n\t\t*page_break \n\t\t\n\t\tThe woman steps even closer and grasps your hand tightly in hers. Immediately you can smell the natural musk of her sweat, though mixed with some natural perfumes. The odor is intoxicating. The bandit leader leans in and nibbles on your earlobe, whispering just loud enough for you to hear, \"I think you'll find that I'm full of surprises.\"\n\t\t\n\t\tWith that, she suddenly shoves you off of the tree branch. You pitch backward with a strangled cry, only to be caught by a net of vines. Falcon laughs, her eyes flashing, and then she jumps down after you. She starts to pin you down and you find yourself wrestling back. Her skin is slick with perspiration, and you see soon enough that her leafy clothing rips away under the friction of your bodies rubbing together.\n\t\t\n\t\tAfter that sh grin and leaps onto you, wrapping her legs around your waist and pressing her lips hard against yours. You can feel her delicate curves and toned muscles pressing against you through her soaked shift, and her mouth tastes pleasantly of cinnamon, as if she had been eating some kind of pastry not too long ago.\n\t\t\n\t\tThe water makes both of your bodies slippery against one another, and you soon find yourself grabbing and caressing each other all over. Before long, the triplet begins to bite and lick your neck. You start to moan in pleasure, but then the dream slowly slips away, as if your mind suddenly became pre-occupied with something else. \n\t\t*goto dreams \n\t\n\t#Your dreams drift into ones about Gretchin, where you could explore one another and become much closer than before.\n\t\t*set gretchin %+5 \n\t\t*set dream +1 \n\t\t*set gretchin_dream true \n\t\tGretchin \n\t\t*goto triplets \n\t\t*label gretchin \n\t\t\n\t\tAlthough Bertrand had succeeded in cutting your evening with Gretchin short at the actual Lorden lake, your dream has other ideas. This time, the kind triplet tells her sisters, \"Hey, I'll catch up to you two in a minute. I'm gonna cuddle with ${boggart} for a little while longer.\"\n\t\t\n\t\tGarnet just raises an eyebrow, but Gretta giggles and responds, \"All right then, weirdo.\"\n\t\t\n\t\tYour little apprentice purrs happily as Gretchin starts to scratch his favorite spot under his chin, but when she gives him a meaningful look and nudges her head toward her departing triplets, he says, \"Okay, fine!\" and flies off after them.\n\t\t\n\t\t*page_break \n\t\t\n\t\tWhen they are finally out of earshot, she grins and edges a little closer to you, wrapping her fingers around yours so they're intertwined. You smile back and gaze at her beautiful face. Her eyes are large and doe-like, and her cheeks are already flushed with excitement. Suddenly, she licks her lips and leans even closer, pressing them against yours.\n\t\t\n\t\tShe tastes faintly of bananas, and her lips are smooth and soft, and even a little bit cold from splashing around in the lake. The water has also made her clothing cling to her slim frame, showing off her perky breasts and the small, rounded curves of her hips and legs. Although she seems shy, her kiss slowly starts to get more passionate, and you find your hands roaming to the different curves of her body.\n\t\t\n\t\tBefore too long, though, you are disappointed to find out that the dream is starting to drift away. No matter how hard you cling to it, the pleasant experience slips from your grasp as though it were covered in ice. \n\t\t*goto dreams \n\t\t\n\t#You dream of getting your revenge on Mendax. It would be brutal, perhaps, but nothing less than what he deserves.\n\t\t*set compassionate %-5 \n\t\t*set dream +1 \n\t\tYou have already suffered a defeat by Mendax's hands once in the real world, and that vile demon saw fit to torment you with hallucinations several times in your sleep since then. For someone that finds pleasure in the pain of others and had probably enjoyed torturing underlings for hundreds or even thousands of years back in the Netherworld, getting a taste of his own medicine would only be fitting.\n\t\t\n\t\tYour anger, resentment, and hatred for the Master all coalesce into one nightmare, except this time, you aren't the victim. All around you, the sky broils with dark, ugly clouds, and thunder booms above you like battling giants thousands of feet in the air. Mendax lays before you, showing none of his usual arrogance or power. \n\t\t\n\t\tJust like before, his body is incredibly thin. This time, however, the definition in his muscles is gone, revealing only jutting bones under taught, sickly skin. His long, gangly, and spidery arms are broken at odd angles, and what used to be verdant flames upon his head are now just pitiful tendrils of acid green smoke. Despite all of this, the demon has managed to maintain at least some semblance of his former dignity. \n\t\t\n\t\t*page_break \n\t\t\n\t\tHe stares at you, his eyes betraying no fear, and says in his gravely voice, \"Do you really think this threatens me, demon ${hunter}? Would my sad state lead you to believe that I am truly defeated? No…I am immortal, and I have seen much worse than this in a lifetime that eclipses yours a hundred fold! So kill me if you wish, but know that I fear nothing, let alone death.\"\n\t\t\n\t\tYou laugh and spit directly into his eye. Mendax flinches but otherwise doesn't react. How unsatisfying. Your eyes going dark, you reply cuttingly, \"Death would be a mercy for you, something that you couldn't even hope to deserve. I have a much better plan for you. You will be banished and demoted in rank, and then you will truly know what misery is!\"\n\t\t\n\t\tWith that, you lift your hand and the Master demon explodes into fiery embers. Suddenly, a fragment of your world begins to bend as a tear appears, showing the abyss that is the Netherworld. Mendax screams as his obliterated body is sucked back into the infernal dimension, then everything goes black.\n\t\t*goto dreams \n\t\t\n\t#Your mind transports you to sometime in the future, when everything is better and things are peaceful.\n\t\t*set compassionate %+5 \n\t\t*set dream +1 \n\t\tYou find yourself somewhere in the sky, where you can see everything at once. The height doesn't seem to bother you, and indeed, the whole experience is a pleasant one. The clouds are a perfect, wispy white, and there is just a gentle breeze as the sunshine warms your back. Meanwhile, things are prosperous and joyous. Although there was no mention of it, you can tell that Mendax has been banished back to the Netherworld.\n\t\t\n\t\tIn his absence, Rhys Falls was allowed to repair itself. Its citizens returned to the village and rebuilt it with the aid of Lorden and their wonderful new mayor, Gertrude. The triplets and their father were able to rebuild their own farm as well, and funerals were held in memory of everyone who died by Mendax's hands. Not only that, but you and your apprentice were heralded as heroes.\n\n\t\tYour victory over the demon allowed the two of you to live lives of leisure and wealth, and to accomplish a great many things that you had only dreamt of before. Without the Master demon prowling over the land, this small region was able to go on without constant fear, and this is something you can look forward to in the future.\n\t\t*goto dreams \n\t\t\n\t*selectable_if (dream > 0) #Suddenly, something sinister pulls you out of your dreaming and back into reality—or something like it.\n\t\t*goto dread \n\t\t\n*label dread \n\nAlthough your previous dreams had been something that you actually enjoyed, all of that quickly changes. You suddenly feel naked and lost, and the now familiar presence of Mendax encroaches upon your unconscious. Perhaps he is feeling particularly cruel tonight, or maybe it's the fact that you are getting ever closer to journeying to Melithar's Mountain, but the demon is taking the offensive more than he ever has before.\n\n\"You are a worthless, pathetic, meaningless speck!\" he practically screams. Your surroundings are shrouded in darkness, but you can see his fiery crimson eyes narrowed in hatred and anger. \n\nIn the dim illumination that his glowing eyes provide, you can see his pointed teeth gnashing at every word. \"Why don't you just resign yourself to your fate? Your puny brain can't even begin to imagine what will happen to your mind when I finally take it for my own. You're just prolonging your own torment, weak little human,\" he spits.\n\nThe demon must be regaining control over his powers, because you feel a deep pit of anxiety growing in your stomach and slithering its way through your mind as if just waiting for the perfect time to show itself. Either way, you do manage to muster some strength of your own in order to make a reply.\n*fake_choice\n\t#Actually, you decide to completely ignore him. You don't want him to have the satisfaction of knowing he can harass you any time he wants and get some kind of reaction for his efforts.\n\t\t*set stealth %+5 \n\t\tInstead of acknowledging this abuse, you simply pretend as though this is just another unwelcome nightmare, one that you happen to know is real while still unconscious. You make no response to the demon and choose to try to wake yourself up before he has time to harass you any further. You strain and push at the boundaries of the nightmare, but it feels impenetrable, as though the Master's powers are keeping you grounded here.\n\t\t\n\t\tMendax just laughs cruelly and gloats, \"Try as you might, demon ${hunter}, but there is nothing you can do to escape this. Just accept it! Like your grisly fate, it is unavoidable.\" \n\t\t\n\t\tYou notice that he put particular sarcastic emphasis on the words \"demon ${hunter}\".\n\t\t\n\t\t*page_break \n\n\t\tSince that didn't work, you try a new approach. You simply steel yourself and quietly observe your surroundings, trying anything just to keep your mind off the demon as he continues in the background, \"First, I'm going to strip all of your most precious memories away. Then, I'm going to amplify all of the memories you would rather forget, so that nothing fills that minuscule brain of yours but misery!\"\n\t\t\n\t\tIt's difficult, but somehow you manage anyway. Unfortunately, there isn't much to look at, aside from his gnashing, white predatory teeth shown by the dim, sinister light his insane eyes give off. All around you is shadow, though there are certain moments when you could almost swear that you caught a glimpse of a slithering tentacle, or heard the faint cry of a wounded animal. \n\t\t\n\t\tEven though you are trying as hard as you can to keep your mind occupied and off of the nightmare at hand, you are suddenly wrenched from your own thoughts. \"Are you even listening to me?!\" Mendax screams. His eyes seem to grow larger, a fiery rage reflecting in them. \"Demons a dozen times your age and twice your caliber cower before me; I will not allow some filthy human brat…\"\n\t\t\n\t\tThe fact that you spent most of this hallucination trying to ignore him \n\t#You're tired of being on the bad end of this verbal and magical abuse. If this exchange is really happening telepathically, you shouldn't have too much trouble sending back brutal attacks of your own through raw emotions and grisly images.\n\t\t*set resolve %+5 \n\t\t*set compassionate %-5 \n\t\tAlthough the demon seems angry at the prospect of Melithar interfering in this whole sordid game, it's nothing compared to the anger you feel inside. Your home village was destroyed just days ago, and from there it's only gotten worse. There has been a bloodbath from Rhys Falls to Quader, and you were caught in the middle, being dealt wounds both to your body and to your sanity.\n\t\t\n\t\tBecause of this, it isn't difficult in the slightest for you to channel your emotions of unbridled rage into something you can use against the Master, if only in these bizarre nightmares. Without even acknowledging his insults and threats, you scream with all your might as you hurtle blasts of emotion and thoughts of what you would do to him like waves of pure force.\n\t\t\n\t\t*page_break \n\t\t\n\t\t\"Just DIE!\" one screams as it crashes toward him. \"Go back to your torment!\" another cries as it rushes from your mind and toward the demon's glistening teeth and glowing eyes. Then, you muster all the strength you have left and project an image of Mendax being crushed by some unseen force until he lays in a bloody pulp on a random dirty, cracked floor.\n\t\t\n\t\tUnfortunately, your efforts aren't enough. Mendax is a master at his powers, and he has likely been practicing them and exercising them on others for hundreds or even thousands of years, whereas this technique is entirely new to you. \"You think you can use my own powers against me?!\" he roars. \n\t\t\n\t\tYou fighting back against him \n\t#He's just trying to dampen your morale and frighten you as much as he can because he knows your victory isn't far away. You remind yourself of this and show him that your courage won't be broken.\n\t\t*set charisma %+5 \n\t\t*set resolve %+5 \n\t\tSteeling yourself, you say with as much boldness as you can manage, \"Your attacks only make it even more obvious how afraid you are of me succeeding, demon.\"\n\t\t\n\t\tThe Master laughs cruelly, though you suppose there never is any mirth behind his laughter. When his cackles subside, he responds condescendingly, \"Inferior beings always do seem to cling to foolish ideals like hope. That doesn't change anything for you, though, worm! The only thing hope will do for you is make your demise even worse when it finally comes to you.\"\n\t\t \n\t\tYou shake your head, though it's hard to argue with such a menacing demon. As ever, it feels like you are fighting strictly on his terms. You reply with all the bravado you can muster, \"Hope sustains me, demon, though I'm not surprised you aren't aware of that, as hopeless and depraved as you are.\"\n\t\t\n\t\tAt this, Mendax bares his pointed teeth and narrows his sinister eyes. Your defiance \nseems to have pushed him over the edge, because for the first time since this telepathic connection was created back in Belluo's and Callidus's cave, the Master seems to somehow break the boundaries keeping you apart. You feel like a dam is collapsing somewhere in the depths of your mind, then one sensation dominates everything else.\n*page_break Terror\n\nYou surge up in your bed as some unseen force exerts its control over you. You are covered with cold sweat and your body is entangled in your sheets, only making you feel trapped and claustrophobic on top of everything else. Your heart is beating so fast that it almost feels like it could break out of your chest at any second, and you can feel needles poking at every inch of your body as you start to hyperventilate. \n\nSuddenly, the whole world falls away as a terror like you've never felt before overtakes you, stabbing shards of ice into your chest and sending your stomach through a vortex. You hear a strangled, high-pitched cry and are dimly aware of the sound of something shattering as a pain rips through your hand. And just like that, it's over. \n\nOnly once you've calmed down enough to focus do you notice the cut on your hand and the broken pottery on the infirmary floor. ${boggart} is crouched on the bottom of the bed, his wings twitching nervously and his eyes wide in surprise. \n*if relationship \u003c 50 \n\tHis mouth turns down and he says in annoyance, \"What's wrong with you?\"\n*if relationship > 59 \n\tHis expression full of worry, your apprentice asks cautiously, \"Are you okay, ${name}? Is that nasty demon bothering you?\"\n*if ((relationship > 49) and (relationship \u003c 60))\n\tLooking almost frightened, the boggart says, \"What happened? Are you hurt?\"\n*fake_choice \n\t#Being in pain and tormented by Mendax only makes the boggart even more annoying than usual. Gritting your teeth, you say, \"Instead of asking stupid questions, why don't you make yourself useful and help me?\"\n\t\t*set relationship %-5 \n\t\t*set compassionate %-5 \n\t\t*if relationship > 49 \n\t\t\t\"Hey!\" he protests. \"I know you're freaked out, but that's no reason to start turning against me.\" He frowns and says, \"What do you want, anyways?\"\n\t\t*if relationship \u003c 50 \n\t\t\tYour apprentice simply scowls and responds, \"Oh, yeah? Help yourself! You can't boss me around anymore, big baby.\"\n\t\n\t#You shake your head and reply, \"I'm okay, really. It was just another nightmare.\" You don't want him to worry unnecessarily, and you've been through worse anyways.\n\t\t*set resolve %+5 \n\t\t*set altruism %+5 \n\t\t*if relationship > 49 \n\t\t\tWith a sad look he replies, \"Yeah, I thought so.\" After a moment, he gives you a small smile, saying, \"You're tough, though. You can handle it.\"\n\t\t*if relationship \u003c 50 \n\t\t\tNodding slowly, the boggart says, \"Oh, okay. That was some nightmare.\"\n\t\n\t#Placing a hand over the newly made cut, you give him what you hope is a reassuring smile and respond, \"It's just Mendax trying to get under my skin again. It was another one of those horrible nightmares, but I should be fine.\" You want to be honest and straightforward with him as much as possible.\n\t\t*set relationship %+5 \n\t\t*set charisma %+5 \n\t\t*if relationship > 49 \n\t\t\tNodding sadly, the boggart responds, \"Oh, yeah. I thought it would be something like that. I'm sorry he keeps terrorizing you. It's because he knows we're about to beat him!\" He flutters a little closer to you, adding, \"Can I get you something for that cut or anything?\"\n\t\t*if relationship \u003c 50 \n\t\t\tAfter a moment, your apprentice's expression softens. He finally shrugs, then says, \"Oh, well, okay. That explains things.\" He pauses for a second before adding, \"Sorry I snapped at you.\"\n\t\t\t\nJust then, you hear voices and footsteps coming from the hallway. A moment later, Vidar yanks the door open and rushes in, saying, \"I heard a scream! Are you okay?\" as Lorelle and Ceylar hurry in after him.\n\nWhen you tell the others about the very vivid nightmare and the feeling of intense panic brought upon by Mendax, Vidar looks worried, but somewhat relieved. He says, \"Curse that demon. Still, at least there weren't any more intruders,\" and starts to scratch at his beard, looking pensive. \n\nLorelle, meanwhile, steps forward and says\n*if lorelle > 54 \n\tkindly, \"Here, let me have a look at that cut. It doesn't look bad, but I wouldn't want any patient of mine to be bleeding all over the place.\"\n*if lorelle \u003c 55 \n\tprofessionally, \"I'll bind that up for you.\"\n\t\n*page_break \n\t\nAs the healer starts to clean your injury and prepare a bandage for it, Ceylar busies himself with cleaning up the broken pottery. He whistles awkwardly to himself as he
