various wizards who wove their powerful magic over the tomes, keeping them updated on all information known about each demon. \n\t\t*goto glossary\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n\n  Unlock the rest of the game.\n\n  *purchase adfree $3.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.\n\n", "death": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nYou have died.\n\n*goto_scene ending", "demons": "*temp ask 0 \n*temp task 0\n*temp romanced 0\n*temp fight_gretchin false \n\n*page_break \n[b]Chapter Seven of Seven[/b]\n\nYou stand there, struggling to gather your words, but the old wizard just says, \"I'm sure you have plenty of questions, so I'm going to answer some of them for you. But I'm also quite sure that you know just as well as I do that we must be quick! Mendax isn't far behind, and he has summoned more demons to help him.\"\n*label ask \n\n*if ((ask = 1) or (ask = 2)) \n\tWhat would you like to ask him, now?\n*hide_reuse \n*choice \n\t#\"What just happened?!\" you ask.\n\t\t*set ask +1 \n\t\tMelithar the Eccentric shifts his staff in his hands, telling you, \"This entire attack was nothing more than a powerful illusion. The real demon is inside Callidus, far outside of Quader, but he is one of the most powerful telepaths I have encountered yet, maybe the most powerful aside from myself or Iyus the Selfless. That is why he wasn't able to physically touch you, but he did use a powerful 'fear' spell to debilitate your group nonetheless, trying to stall you.\"\n\t\t\n\t\tHe sighs and continues, \"I arrived and broke his spell and severed the connection between Mendax's mind and your own.\" He points a long finger at you and says, \"He will no longer be able to torment you through nightmares and illusions, at least from afar; I've made sure of that!\"\n\t\t*if ask = 3 \n\t\t\t*goto done \n\t\t*fake_choice \n\t\t\t#You nod thoughtfully, saying, \"Well, thank you. I should have known. He wasn't in Callidus's body, and he got here so soon. Clearly something must have been awry.\"\n\t\t\t\t*set cunning %+5 \n\t\t\t\t*set melithar %+5 \n\t\t\t\tThe old man nods and says, \"Yes, indeed, but don't feel too badly about it. Such an encounter is enough to leave anyone too adrenalized to figure everything out right away. Mendax is a master of illusions, trickery, and spells that affect your mind and he will use them every chance he gets.\"\n\t\t\t\t\n\t\t\t\tYou sigh and respond, \"Yes, I've experienced all of that firsthand.\"\n\t\t\t\t\n\t\t\t#You step forward and shake his hand gratefully, saying, \"Thank you so much. You have no idea how relieved I am to finally have that demon out of my head.\"\n\t\t\t\t*set altruism %+5 \n\t\t\t\t*set melithar %+5 \n\t\t\t\tThe wizard smiles and shakes your hand back, his grip surprisingly firm and strong. \"Well of course, ${name}! I can't have him intruding on your thoughts all the time, can I? As strong a telepath as he is, I'm much stronger, despite how much younger I am than him, and he needed to learn that.\" He wrinkles his bushy eyebrows and says, \"Strange, isn't it? I'm a hundred years old and I'm the younger of the two, ha!\"\n\t\t\t\t\n\t\t\t\tWizards must age very well, because the eccentric man doesn't look older than sixty. Interesting.\n\t\t\t\t\n\t\t\t#Impatient, you frown and reply, \"Well, you're going to destroy the demon anyway, aren't you? Why haven't you just finished him off already?\"\n\t\t\t\t*set resolve %+5 \n\t\t\t\t*set altruism %-5 \n\t\t\t\t*set melithar %-5 \n\t\t\t\tThe wizard purses his lips and says, \"All in good time, ${name}. I've been extremely busy and haven't had the chance to banish the demon myself, but I assure you, he won't be staying in Lume much longer. I can understand your impatience but you have to learn to trust a little. Nothing I do is without good reason.\"\n\t\t\t\t\n\t\t\t\tYou shrug and grunt, \"All right, but I'm still not convinced.\"\n\t\t*goto ask \n\t\n\t#\"Why haven't you helped me before?\"\n\t\t*set ask +1 \n\t\tThe wizard nods understandingly and responds, \"Valid question, of course, ${name}, but a lengthy one to answer. Suffice it to say, I have equally as important matters to attend to all the way over in the kingdom of Githrad, on the other side of our planet. I won't get into detail, but an army of lesser demons is planning on making an entry into our world within a matter of days, and I intend to help stop them, as well as the threat of Mendax, who is one of the most powerful demons to have ever entered Lume.\"\n\t\t\n\t\tMelithar smiles knowingly at you and continues, \"And, unbeknownst to you, my demon ${hunter}, I have been preparing for your arrival for quite a while! Time is limited and I am very busy myself, but I will say that I have been working on an immensely powerful spell that will allow you to train with me and greatly increase your strength and abilities! Exciting, I know, but you will have to hear more about that later.\"\n\t\t*fake_choice \n\t\t\t#You don't like the idea of plans being made around you without your knowing, let alone by the likes of this crazy old man, but you would be a fool to turn down the opportunity to become much more powerful, if what he says is actually true, at least.\n\t\t\t\t*set resolve %+5 \n\t\t\t\t*set melithar %-5 \n\t\t\t\t*set altruism %-5 \n\t\t\t\tThe idea of being trained by a wizard is an intriguing one indeed. You know that the chance for something so great is extremely rare, and you plan to take advantage of it, crackpot wizard or not. Who knows how powerful you could become?\n\t\t\t\n\t\t\t#You nod and say, \"I understand. I look forward to training with you.\"\n\t\t\t\t*set melithar %+5 \n\t\t\t\t*set cunning %+5 \n\t\t\t\t\"Excellent!\" he responds. \"I'm so excited to have a new pupil. Well, pupils, to be more exact, but we'll get to that later. I haven't had students in…\" He scrunches one eye shut and counts on his fingers, \"A couple weeks, at least!\"\n\t\t\t\t\n\t\t\t\tYou blink. All right, then.\n\t\t\t\n\t\t\t#Amazing. The wizard is trying to contend with Mendax and an army of demons thousands of miles away; you knew there must have been a good reason. You must express your gratitude.\n\t\t\t\t*set melithar %+5 \n\t\t\t\t*set altruism %+5 \n\t\t\t\tYou give him a small bow, saying, \"Thank you, wizard, for everything. I had known you were a great steward of Lume, but not to this extent.\"\n\t\t\t\t\n\t\t\t\tMelithar smiles, pleased, and says, \"Well, thank you, ${name}! Someone has to do it, and that someone is me, after all, since Iyus the Selfless just sits up in his tower all day.\" He pauses and looks around before whispering, \"Don't tell him I said that, by the way.\"\n\t\t\t\n\t\t*if ask = 3 \n\t\t\t*goto done \n\t\t*goto ask \n\t\n\t#\"How do you know about all of this, and how do you know my name?\"\n\t\t*set ask +1 \n\t\tMelithar laughs so hard that his pointy hat almost falls off his head. He grabs it and readjusts it, saying like it was the most obvious answer in the world, \"Well that question has the most obvious answer in the world: I'm a wizard, of course!\"\n\t\t*fake_choice \n\t\t\t#You smile and say, \"Ah, I should have known. Don't tell me you've been snooping on me.\"\n\t\t\t\t*set charisma %+5 \n\t\t\t\t*set melithar %+5 \n\t\t\t\tMelithar's piercing azure eyes widen and he says, \"Oh, heavens, no! I would never do such a thing. Not snooping…simply divining. With divination, you know.\"\n\t\t\t\t\n\t\t\t\tCase closed, then.\n\t\t\t\n\t\t\t#You roll your eyes, grumbling to yourself, \"Oh, you're [i]that[/i] kind of wizard. Of all the different types of wizards there could possibly be, of course I'm stuck with the annoying one.\"\n\t\t\t\t*set resolve %+5 \n\t\t\t\t*set melithar %-5 \n\t\t\t\tThe old man squints his eyes at you and says, \"What was that? You were mumbling.\"\n\t\t\t\t\n\t\t\t\tYou raise an eyebrow and say, \"I said, 'Of course I'd have to be stuck with the anno—'\"\n\t\t\t\t\n\t\t\t\tMelithar interrupts you as he starts to dig in his ear with a long finger. \"It must have been the earwax,\" he says.\n\t\t\t\t\n\t\t\t\tYup. \n\t\t\t\n\t\t\t#You shrug and reply simply, \"Fair enough.\"\n\t\t\t\t*set stealth %+5 \n\t\t\t\t*set melithar %+5 \n\t\t\t\tYou suppose there is some logic to it, and besides, it doesn't seem like you'll be getting any more of a detailed answer than that.\n\t\t*if ask = 3 \n\t\t\t*goto done \n\t\t*goto ask \n\t\t\n*label done \n*page_break \n\nVidar steps forward and gives the wizard a deep bow, saying in a husky tone, \"Melithar the Eccentric, I must thank you personally for coming to our aid. This is the second time you've saved me, and I will never forget it.\"\n\nThe old wizard gives the warrior a genuine smile and responds, \"Your thanks is much appreciated, Vidar, but now I must be going! I have matters to attend to of my own, and you all must move quickly, lest Mendax or his other demons catch up to you. I will answer any other questions you have later, but for now, you must make haste!\"\n\nWith that, the Eccentric Wizard shimmers and suddenly disappears. He must have appeared in illusion form. Your apprentice grins and says, \"I like this guy already!\"\n\nCeylar, perhaps still shaken up from the fight, says, \"I do, too, ${boggart}, but he's right. Let's get moving!\"\n\nLorelle nods, still looking somewhat frightened as well, so your group continues on its way, considerably faster than before. Fortunately, the remainder of the next few hours are rather uneventful. The road is clear and you manage to make the next several miles without crossing anyone but some skittish wildlife. The clouds above, however, have been steadily growing darker, and just as you reach the base of Melithar's Mountain, the sky suddenly begins to pour down rain in sheets.\n\n*page_break \n\nShouting over the deluge, Vidar says, \"Hurry, let's put our tents up! We'll never be able to make the hike up the mountain in this weather.\"\n\nYour clothes are already getting soaked under the sudden downpour, but you all manage to erect your tents quickly, and each of you disappears into your own shelter. The tents themselves are grey, rather small, and simple, but they should do well enough to guard you against the elements. You quickly crawl inside, your apprentice following close behind you as he grumbles about the cold. You wipe the water out of your eyes and lay down, catching your breath. \n\nEven with your strength coming back with miraculous speed, the journey here has still been very tiring, and you wonder if you would have time for a short nap. On the other hand, there are other ways of keeping yourself occupied as you wait for the rain to stop.\n*label romance \n*if task = 1 \n\n\tWhat would you like to do now?\n*hide_reuse \n*choice \n\t*selectable_if ((vidar > 69) and (romanced = 0)) #You decide to enter Vidar's tent and find out if he wants to be with you as bad as you want to be with him. You want to start a serious relationship with the warrior.\n\t\t*set vidar %+20 \n\t\t*set task +1 \n\t\t*achieve vidar \n\t\t*set romanced +1 lle seems to appreciate the slower pace. It gives her time to navigate the protruding roots and concealed rocks safely, and despite her slender frame carrying all that luggage, she manages to keep up with all of you.\n\t\t\n\t\t*if relationship_l \n\t\t\t\"Thanks again, ${name},\" she says sweetly, giving you a kiss on the cheek.\n\t\n\t#Perhaps Ceylar and ${boggart} are right. You should all just continue at the same pace you've been going.\n\t\t*set charisma %+5 \n\t\t*set ceylar %+5 \n\t\t*set relationship %+5 \n\t\t*set vidar %-5 \n\t\t*set lorelle %-5 \n\t\t\"Well,\" you say, \"I see no reason to not just continue going at our normal pace. The thunderstorm is sure to have slowed Mendax down at least to some degree, and we have a large enough lead that I feel comfortable enough not pushing ourselves to get there too quickly.\"\n\t\t\n\t\t\"Excellent choice, ${name},\" Ceylar says.\n\t\t\n\t\t\"Hooray!\" ${boggart} says happily, swishing his tail.\n\t\t\n\t\tVidar shrugs, and replies, \"Well, I disagree, but as long as we aren't moving too slowly, I suppose I can't complain that much.\"\n\t\t\n\t\tThe healer looks somewhat disappointed but smiles and says, \"Okay, ${name}, that sounds like a fine plan.\"\n\t\t\n\t\tWith that, you and your group continue your journey. The torrent of rain has made the steep trail slippery and extremely muddy, but you all persist nevertheless. Lorelle has a little trouble navigating her way around the protruding roots and slippery patches of mud as you make your way up the trail, but for the most part is able to keep up. Vidar looks a bit impatient, but manages to content himself with keeping just a little ahead of the rest of you.\n\t\t\n\t\tCeylar and your apprentice seem perfectly happy with the pace that you're making, and the magician finds time to whistle cheerful tunes to himself while the boggart makes playful loops in the air as he flies.\n\t\t\n*page_break \n\nSuddenly, the feeling in the air around you changes. Everything seems to go quiet, and a sense of unease creeps over you. You start to look around warily, and ${boggart} sniffs the air loudly, saying, \"Uh, does anyone else smell that? It smells disgusting. Like dark mag—\"\n\nThree figures appear in front of you out of thin air, a tremor of magic swirling the leaves as their feet hit the ground. One of them leaps forward, catlike, and lashes out at you with her foot. You manage to dodge, but she swings a fist through the air in an impossibly fast combination, catching you directly in the chest and sending you flying. \n\nYou crash to the muddy ground, the air punched from your lungs, but you scramble quickly to your feet, throwing the luggage off your back and bringing your staff to bear even as you struggle to breathe. Lorelle and your apprentice scream, and Vidar and Ceylar draw their weapons, backing up slowly as the three figures advance. Your jaw drops just as Ceylar shouts, \"Gretta? Garnet?? Gretchin?!\"\n*page_break \n \nAs impossible as it seems, there it is, in plain view. The triplets from Lorden, who days ago had just seemed like regular farmers, are now standing before you with vicious, predatory grins on their identical faces. You have been a demon ${hunter} long enough to know that these three are possessed, but perhaps they wanted to make an impression, for now it would even be obvious to a layperson. Their eyes are a deep pitch black, and elongated, sharp nails protrude from their fingertips. \n\n*page_break \n\nYour stomach drops. This must have been what Mendax and Melithar were talking about. They can only be the lesser demons that the Master summoned here to slow you down, or worse. Much, much worse. You have no time to utilize your demon bestiary to figure out these demons' strengths or names. All there is time to do is fight back. His voice husky with anger and emotion, Vidar says, \"Lorelle, get behind me, and take this dagger!\"\n\nLorelle looks more frightened than you have ever seen her, but she accepts the blade from Vidar, her hands trembling. Your apprentice and Ceylar move closer to one another, too, their expressions scared but determined alike. It is obvious, then, that you will be splitting into three groups to fight these demons. Ceylar and ${boggart} will take one; Vidar and Lorelle will take another; and you will battle the last on your own.\n\nGretta steps forward and laughs a loud, bellowing laugh, her voice as deep and monstrous as an abyss. \"Surprised, are you? Look at the stupid expressions on your faces! I'm simply shivering to rip them off!\"\n\nGretchin giggles in a disgusting, high-pitched, sanguine tone. \"A pleasant surprise, indeed! They rally into teams as if they have a plan but do not yet realize that they will die all alone, one and all!\"\n\nGarnet looks at you all with a horrible, expressionless face and says in a monotone, ragged whisper, \"I have been waiting for this for a century! The chance to gouge out human eyes and taste their delicious marrow.\"\n\nWith that, the trio surges forward at the speed of lightning, their hands outstretched and magical energy forming around them as they ready their spells. With only a split second to react, who do you fight?!\n*choice \n\t#Garnet!\t \n\t\tAs the rest of your group engages the other demons, you turn your attention to Garnet, who is already upon you. She lashes her claws out at your throat but you skilfully dodge, smashing your staff across them with a grunt. She howls in pain as the nails shatter off, leaving bloody stumps on the tips of her fingers. With rage in her eyes, the demon lunges forward and kicks you in the knee. It locks with blinding pain and you collapse to your other knee, jabbing at her with your staff. \n\t\t\n\t\tThe demon smiles sadistically and parries your blow, grabbing you by the neck and slamming you to the ground. She begins to squeeze at your throat, making you gag and choke. The veins bulge from your forehead and your vision begins to cloud as Garnet presses down on your windpipe, but you lurch forward, smashing your head into her nose and following up with a swift kick to her stomach that sends her rolling off of you. You stagger to your feet, gasping for breath as blood drips down your neck. \n\t\t\n\t\tYou raise your staff to attack but the demon gives a high-pitched scream and juts out her hands. A black vortex suddenly shoots out toward you, howling like the voices of tortured souls. It sucks you in like a ragdoll and the demon spins around and around, laughing maniacally before releasing you. You fly through the air before tumbling across the dirt hard. \n\t\t\n\t\tYour staff flies in the opposite direction and you scramble to your feet, dazed and hurting all over. Even with your years of experience, your lack of weapons and poor health make such an already formidable opponent even harder to beat. As she readies another spell, you try one last thing to attempt to turn the tides of this battle.\n\t\t*fake_choice \n\t\t\t#You leap forward as quick and fluid as lightning, grabbing a handful of tiny rocks from the ground and casting them at her eyes.\n\t\t\t\t*set stealth %+5 \n\t\t\t\tThe demon clutches her hands to her eyes, screaming in pain, and you take your chance. With all the strength you can muster, you kick her straight in the chest, sending her skidding through the mud. As Garnet screams in anger and scrambles to her feet, you dash toward her, raising your dagger. Just as you are upon her, though, she summons a vortex with practiced speed, sucking in nearby debris and casting it back out at you.\n\t\t\t\t\n\t\t\t\tThe rocks and stones hit you with immense speed, cutting and bruising almost your entire body. You stagger back, crying out in pain, and Garnet laughs cruelly. She sneaks forward and hooks her foot around your ankle, causing you to crash to the ground. You strike out at her but she dodges easily and leaps on top of you, grabbing your face and smashing it into the mud. She holds it there for what seems like forever as you struggle, giggling insanely as she digs her knees into your back. \n\t\t\t\t\n\t\t\t\tYour lungs feel like they are going to burst, and finally you just have to lay limp, as all the energy has deserted your body. Garnet continues to hold your face under the mud, and you truly believe that you are going to die here, but she finally relents, getting off your body slowly. You rake in a ragged breath, choking on mud and laying there, defeated.\n\t\t\t\t\n\t\t\t#You decide to throw your dagger at her from a distance.\n\t\t\t\t*set cunning %-5 \n\t\t\t\tPinching the tip of the blade between your fingers, you cast it expertly through the air. It hurtles toward the demon, but she simply gives an evil, knowing smile and summons another vortex with practiced speed, sucking the dagger in and shooting it right back out at you! You dive to the side, but not fast enough. The blade tears into your shoulder and you cringe with pain as you crash to the ground, blood flowing from the wound.\n\t\t\t\t\n\t\t\t\tGarnet lunges for you, her black eyes wide with excitement. You grit your teeth and kick her but she blocks with her arm, and it only seems to slow her down slightly. She gives you a savage grin and digs into your cut with her sharp nails, blinding you with pain. You cry out and try to roll away, but the demon grabs you by the hair and smashes your face into the ground, ending all further resistance.\n\t\t\t\t\n\t\t\t#You lunge forward and strike out with dizzying combinations from your staff, hoping to simply overpower her.\n\t\t\t\t*set resolve %+5 \n\t\t\t\tGarnet seems surprised at your sudden ferocity, and grunts with pain as your weapon cracks down upon her chest, head, and legs in quick succession. She stumbles back, growling in anger, but suddenly summons the vortex again, pulling you forward with lightning speed. You cry out as she grasps your staff in her hands and shoves it back into your face. \n\t\t\t\t\n\t\t\t\tThe staff smashes against your forehead and you crumple to the ground, an intense pain shooting through you. You attempt to roll away, but the demon gives an evil laugh and stomps down on your ankle, twisting her heel into your bone until you scream out and lay there, immobile.\n\t\t\t\t\n\t\t*page_break \n\t\tThe demon leans down and whispers in your ear, her voice hollow and chilling. \"You are so weak, and now your eyes will feast upon horrors you had never even dreamed of!\"\n\t\t\n\t\tShe grips your ankle hard in her hand and drags you unceremoniously across the mud before dropping you and hoisting you up to your knees by your robe. She clutches the back of your neck with a cold hand and forces you to watch as the other demons defeat your companions. Vidar roars in anger and lunges at Gretta, swinging his sword through the air. She dodges deftly and strikes out at his chest several times. The warrior grunts in pain and stumbles away, blood seeping from underneath his shirt.\n\t\t\n\t\tGretta gives a monstrous, throaty laugh but he just grits his teeth and lunges at her again, slashing his sword through the air. This time, his blade connects with her leg, and it cuts deeply into her, spilling blood out onto the ground. The demon howls in pain and Vidar raises the hilt of his weapon to knock her unconscious, but she suddenly waves her hands, summoning a dark magic, and he inexplicably slips on the ground, his sword flying from his grasp.\n\t\t\n\t\tHe waves his hands through the air, struggling to maintain his balance, but finds it impossible. The warrior crashes to his knees and Gretta takes her chance, moving in from behind him and putting him into a headlock. The warrior struggles against her, but slips every time he tries to brace against her, and in seconds her arm is wrapped tightly around his neck. She squeezes hard, and he screams out in pain as his skin tears from her very touch. Eventually her grip becomes too much, and he loses consciousness, slumping limply to the ground.\n\t\t\n\t\tLorelle races toward the demon, the dagger held out uncertainly in her hand, but the demon just laughs cruelly and slugs the healer in the face. Lorelle pitches back, her eyes fluttering, and crashes to the ground, motionless and bleeding as her knife drops to the ground, useless.\n\t\t*goto defeat \n\t\n\t#Gretchin!\n\t\t*set fight_gretchin true  \n\t\tAs the rest of your group engages the other demons, you turn your attention to Gretchin who is already upon you. She spins through the air and aims a kick at your temple, but you dodge just in time, managing to skirt underneath her and rake her body with your staff. The demon cries out in pain and tumbles across the earth but leaps up in an instant, fury showing across her pitch black eyes. She lunges forward with a flurry of strikes so fast that they are a blur, and although you manage to block most of them, one of the punches catches you in the jaw.\n\t\t\n\t\tYou cringe in pain as you bite down onto your tongue hard. Blood rushes into your mouth but you spit it out, swiping your staff out in a quick combination, smashing it into Gretchin's shoulder and knee. She stumbles back, grunting in pain, but gives an insane squeal and leaps high into the air, her sharp claws outstretched. You raise your staff to counterattack, but a headache so fierce that it blinds you suddenly pierces your temple. \n\t\t\n\t\tYou cry out and stagger back as your vision goes white. A pain like a drill penetrating your skull makes you collapse to your knees, and the demon takes her chance, slamming you onto the ground and savagely beating your face with her fists. You feel your lip split and your nose crunch, but even worse is the unbelievable pain pounding in your head. You manage to grasp at a single moment of clarity amidst the beating, though, and lash out, ramming your staff into Gretchin's throat. \n\t\t\n\t\tThe demon's eyes bulge out as she chokes and crumples off of you, giving you a chance to escape. You scramble away, your mind reeling. Once you turn around, you see that she is readying herself for another spell. Even with your years of experience, your lack of weapons and poor health make such an already formidable opponent even harder to beat. As the demon prepares to strike again, you try one last thing to attempt to turn the tides in this battle.\n\t\t*choice \n\t\t\t#You lunge forward and strike out with dizzying combinations from your staff, hoping to simply overpower her.\n\t\t\t\tFor a moment, driven by your will to win this fight and the adrenaline coursing through your veins, you are much faster than the demon. She is unable to keep up with your blows, and simply blocks and staggers back as your staff strikes against her torso, legs, and arms. She lashes out with her sharp, long nails but you dodge deftly and smash your weapon into her knee. \n\t\t\t\t\n\t\t\t\tGretchin squeals in pain and crumples to her other knee. You lunge forward but she shrieks in anger and slams into you, pushing you back and knocking the staff from your grasp.\n\t\t\t\t*goto sick\n\t\t\t\n\t\t\t#You decide to throw your dagger at her from a distance.\n\t\t\t\tYou pinch the end of your blade between your fingers and throw it expertly through the air. The demon growls and launches herself to the side, but not fast enough. The blade slashes into her ribs, pouring blood down her shirt. Gretchin squeals in pain and turns her eyes on you, hatred showing even beneath her black gaze. You dash toward her, determined to keep your initiative going, but she meets you full on, slashing her long sharp nails through the air and slicing them across your forearm. \n\t\t\t\t\n\t\t\t\tYou grit your teeth from the searing pain but press on, punching her several times in the stomach. Gretchin grunts and stumbles away, clutching her torso. This gives you time to retrieve your blade, and you do so, quickly turning on your enemy.\n\t\t\t\t*goto sick\n\t\t\t\n\t\t\t#You leap forward as quick and fluid as lightning, grabbing a handful of tiny rocks from the ground and casting them at her eyes.\n\t\t\t\t*set stealth %+5 \n\t\t\t\tThe demon shrieks and clutches her hands to her eyes, giving you the perfect chance to attack. You grab onto her shoulder and hook your foot around her ankle, shoving her as hard as possible through the air. Gretchin squeals and flails her arms through the air before crashing into the ground and skidding across the mud.  \n\t\t\t\t*label sick \n\t\t\t\tYou raise your dagger and rush toward her, ready to end the fight, but a wave of extreme nausea suddenly overtakes you.\n\t\t\t\t\n\t\t\t\tYou stumble as you become dizzy, and a sickness worse than you've ever felt lights your stomach on fire. You collapse to the ground, dropping your dagger, and promptly vomit violently into the mud. You wretch as the vile stuff pours from your mouth, and you think you can even see a tinge of blood within the liquid. You wipe your mouth with your hand and attempt to stagger to your feet, but Gretchin leaps forward and smashes her knee into your nose. \n\t\t\t\t\n\t\t\t\tYour neck twists violently to the side and you cry out as you collapse to the dirt, blinded with pain. You try to roll away, but she begins to savagely kick you with her boots until you lay still, groaning.\n\t\t\t\t\n\t\t*page_break \n\t\tGretchin hovers over you and giggles sweetly, saying, \"You are so weak and frail it's delicious! Now, let's go witness the others' demise!\"\n\t\t\n\t\tShe roughly grabs you by the robe and drags you alongside her before shoving you onto the ground. The demon then grabs you by the hair and forces you to watch as your companions are defeated.\n\t\t*goto defeat \n\t\n\t#Gretta!\n\t\tAs the rest of your group engages the other demons, you turn your attention to Gretta, who is already upon you. She barrels forward like a bull, slamming into your chest before you even have time to react. You block the brunt of her assault with your staff, but you are still sent reeling. You crash onto the dirt, your leg bruising badly, but jump up and strike out with your staff just in time, hitting the demon across the temple. Gretta stumbles away, stunned, and you take your chance!\n\t\t\n\t\tLeaping forward, you kick the back of her knee, forcing her to the ground before raining down blows with your staff. One catches her on the arm, and the other on her chest, but she suddenly gives a thunderous roar of rage and lashes out, splintering your staff in two. You stagger back and fumble for your knife, but she is too quick. She darts forward and punches you across the jaw. Gretta is incredibly strong, and her fist feels like sandpaper. \n\t\t\n\t\tThe blow resonates through your bones and tears the skin off your face, blinding you with pain and splattering blood across your robe. You cry out and kick her in the stomach, forcing her back a few feet and giving yourself a chance to regain your composure. You draw your dagger as you stand there, gasping for breath. \n\t\t\n\t\tEven with your years of experience, your lack of weapons and poor health make such an already formidable opponent even harder to beat. As she waves her hands through the air, readying some spell, you try one last thing to attempt to turn the tides in this battle.\n\t\t*fake_choice \n\t\t\t#You decide to throw your dagger at her from a distance. This demon does seem to be a short-ranged fighter, after all.\n\t\t\t\t*set cunning %+5 \n\t\t\t\tYou expertly hold the end of your blade with your fingertips and hurtle your dagger at Gretta. It spins over and over through the air at a dizzying speed, and although the demon dives out of the way, your blade slashes her across the ribs, spilling blood down her torso and eliciting a husky, demonic scream from her lips. Clutching at her side, she pounds her way toward you, her fist raised and her knuckles white.\n\t\t\t\t\n\t\t\t\tYou move to dodge her attack, but suddenly you find it impossible to keep your balance. You begin to slip and slide as if on ice, and end up crashing to the ground on your kneecap, a brutal shock traveling up your leg from the impact. You cry out in pain and try to twist away, but merely lurch into her attack on the slippery ground. Her fist collides with your face and you are blinded from pain as skin tears and bones crack. You slump to the ground with a thud, unable to even move from the pain. You stir feebly and glance up at your attacker, but she simply stares down at you, cracking her knuckles with a fiendish look in her black eyes.\n\t\t\t\n\t\t\t#You quickly retrieve your shattered staff and use the two broken halves as batons.\n\t\t\t\t*set resolve %+5 \n\t\t\t\tAs the demon readies her spell, you dash over to your broken staff and retrieve the two sides, spinning them in your hands. The demon lunges forth with a monstrous roar but you are ready, and you expertly wield the weapons, striking out in practiced combinations with blinding speed. Gretta grunts in pain as the wooden staffs collide with her stomach, shoulders, and legs, but she presses through and swings a fist through the air.\n\t\t\t\t\n\t\t\t\tYou try to dodge, but suddenly you can't find purchase on the ground. You slip as though on ice, and careen forward directly into Gretta's strike. Her knuckles slam into your temple and an unimaginable pain splits your mind in two as you crash helplessly to the ground, skidding and sliding as you go. You fight through the pain and blindly try to stand, but fall over and over again, as the ground is impossibly slippery, as if through some dark magic. The demon gives a sadistic, husky laugh and slams her foot into your back, pinning you to the ground.\n\t\t\t\n\t\t\t#You leap forward as quick and fluid as lightning, grabbing a handful of tiny rocks from the ground and casting them at her eyes.\n\t\t\t\t*set stealth %+5 \n\t\t\t\tThe demon shrieks in pain and slaps her hands to her eyes, which gives you just enough time to attack. You dart toward her, kicking her hard in the abdomen and following it up by shoving her with all your might. Gretta flies through the air, skidding across the ground before resting in a pile of mud. You run to finish her off, your blade drawn, but she leaps to her feet, her black eyes narrowed with anger.\n\t\t\t\t\n\t\t\t\tJust as you are upon her, your feet suddenly slip on the ground as though it were made of ice. With a strangled cry, you pitch forward, unable to gain any purchase on the ground as she weaves her dark magic. With a satisfied smirk, she swings her arm through the air, catching you in the throat and slamming you hard into the ground. Your eyes bulge and you choke loudly but find it impossible to catch your breath. You attempt to roll away, but Gretta easily stomps onto your back, pinning you where you lay.\n\t\t\t\t\n\t\tLaughing her terrible, throaty laugh, the demon says in her impossibly deep, otherworldly voice, \"You are pathetic, and now you shall pay the price!\"\n\t\t\n\t\t*page_break \n\t\t\n\t\tShe grabs you by your hair and drags you painfully alongside her, holding your head so you are forced to watch as the other triplets defeat your companions. \n\t\t*label garnet \n\t\tVidar charges at Garnet, swinging his sword through the air, but she ducks deftly, striking at his torso with a series of incredibly swift punches. He grunts in pain but barrels through, smashing the hilt into her face. The demon screams in pain and collapses to the dirt, clutching at her broken nose.\n\t\t\n\t\tThe warrior rushes toward her, his weapon raised, but she suddenly somersaults away and then leaps to her feet, preparing a spell. Before he can reach her, she summons a black vortex that howls like the sounds of tortured souls. Vidar yells out in fright and tries to escape, but it sucks him in, and she begins to spin him around and around before finally letting him go. He sails through the air before colliding with a tree with a sickening thud. Unconscious, he slumps to the ground in a heap.\n\t\t\n\t\tWith a desperate cry, Lorelle charges at the demon, wielding her own dagger uncertainly, but Garnet simply gives a cruel grin and slaps the blade away. The healer stumbles back, and before she can escape, the demon pounces, wrapping her hands around Lorelle's throat. Lorelle chokes and splutters helplessly, her face turning a violent shade of red and the veins bulging from her forehead. The demon bares her teeth and squeezes harder, and finally her victim collapses to the ground, barely even stirring.\n\t\t\n\t\t*label defeat \n\t\t*page_break \n\t\t\n\t\t*if fight_gretchin \n\t\t\tMeanwhile, Ceylar immediately conjures a bolt of lightning and casts it at Gretta. Surprisingly, the demon is too slow, and the bolt hits her full on. She soars through the air, illuminated in an azure energy, before crumpling to the ground with a thud, smoke wafting from her body. With a determined expression, the magician rushes forward, drawing his blade. He raises it to finish the demon off, but she suddenly rolls away with a demonic, impossibly deep laugh. \n\t\t\t\n\t\t\tCeylar startles and slashes his blade at her but she deftly dodges the attack and lunges at him, pounding him in the face. He stumbles back, blood flying in the air as each strike connects, her fists somehow tearing the skin from his face. With a strangled cry, he collapses, bleeding and unconscious. Despite the display of brutality and strength, Gretta seems greatly weakened from Ceylar's blast, and she slumps against a tree, breathing heavily. \n\t\t\t\n\t\t\tYour apprentice sneaks up on her from behind and starts to viciously sting her with his scorpion tail. She wails in rage, her voice otherworldly and monstrous. The demon swipes her hands out at him, but he manages to barely evade her attacks, flying just out of range. \"Come on!\" she screams in her impossibly deep voice. \"Face me or I'll snap your wings!\"\n\t\t\t\n\t\t\tThe boggart gives an enraged scream and dives toward her, sinking his sharp incisors into her arm. She grits her teeth in pain, but even from here you can spot her smiling savagely. With a growl, she bashes him over the head with her fist, the impact leaving a terrible scrape across his forehead. Your apprentice grunts and floats back, stunned and barely able to keep in the air. \n\t\t\t*goto mountain \n\t\t\n\t\tMeanwhile, Ceylar immediately conjures a bolt of lightning and casts it at Gretchin. The witch shrieks in fright and dives out of the way, but the bolt glances her side, sending her spiraling in a smoldering heap to the ground. Your apprentice wastes no time in attacking her, and flies as fast as he can toward the demon. As she clambers to her feet, the boggart stings her several times with his tail, but this only seems to enrage her. \n\t\t\n\t\tGretchin gives a high-pitched scream and kicks him straight in the chest, sending him colliding into a tree. He falls to the ground with a thud, limp. Ceylar gives a cry of anger and dashes forward, his dagger outstretched, but she stretches out her hands and suddenly the magician groans in pain and stumbles before crashing to his knees. His face has turned a horrid shade of green, and without further warning he vomits violently onto the ground. \n\t\t\n\t\tHis face is now an ashen shade of grey, and he shivers as he tries to stand, but the demon just gives a sadistic laugh and lunges forward, punching him savagely in the face several times and finally making him fall to the ground, bleeding and defeated. By now, ${boggart} has woken up, and he soars sneakily through the air. Gretchin doesn't notice before it's too late, and he sinks his sharp teeth into her shoulder. She cries out in pain but bashes him on the head with her fist.\n\t\t\n\t\t*page_break \n\t\t\n\t\tYour apprentice grunts and floats back, stunned and barely able to keep in the air. With a hideous squeal, the demon grabs him around the throat. ${boggart} screams and fights back with all his might, but she just squeezes his neck harder, causing him to splutter and choke. Suddenly, Gretta shoves you hard to the ground and walks swiftly over to Gretchin. \"Wait!\" she demands in her monstrous tone. The other demon narrows her eyes at her, but Gretta just holds out her hands and says, \"Give him to me!\"\n\t\t\t\n\t\tGretchin sneers but complies, handing your apprentice over and walking back toward you. You struggle to stand but she shoves you back on the ground, her eyes angry and dangerous.\n\t\t*label mountain \n\t\t\n\t\tYour apprentice struggles weakly but Gretta grabs him roughly by the wings and marches over to the side of the mountain. \"${name}! ${name}!\" he cries desperately. \n\t\t\n\t\tWhen she reaches the edge, she turns to you with a vile smirk and promptly throws him through the air as if it was the most natural thing she had ever done. His body hits the edge with a sickening crunch before pitching off the side of the mountain.\n\t\t*fake_choice \n\t\t\t#\"${boggart}! ${boggart}!\" you wail, tears streaming down your face.\n\t\t\t\t*set compassionate %+5 \n\t\t\t\t*set altruism %+5 \n\t\t\t\t*set relationship %+10 \n\t\t\t\tYou feel as if the entire world is collapsing in around you. Your stomach twists in knots, and your eyes burn as tears cut paths across your dirty face. \"${boggart}!\" you scream again, but Gretchin just laughs and slaps you across the head.\n\t\t\t\t\n\t\t\t\tYou curl up on yourself, sobbing and shaking as the demon giggles sadistically behind you.\n\t\t\t\t\n\t\t\t#\"No!!\" you scream, fighting back against your captor and struggling to try to save him.\n\t\t\t\t*set resolve %+5 \n\t\t\t\t*set compassionate %+5 \n\t\t\t\t*set relationship %+10\n\t\t\t\tGretchin just laughs in sadistic glee, holding you back as you pull against her, trying desperately to get to your apprentice, even though you know it's too late. \"Let me go!\" you scream, furious, but she's too strong, and you're too weak from the battle. Your voice thick with emotion, you scream, \"I'll kill you!\"\n\t\t\t\t\n\t\t\t\tGretta laughs her monstrous, deep laugh, and mocks, \"Do it, then!\"\n\t\t\t\t\n\t\t\t#You stand there, your eyes widened and your jaw agape. You never really liked the boggart, but that doesn't mean you wanted this!\n\t\t\t\t*set relationship %-5 \n\t\t\t\t*set altruism %+5 \n\t\t\t\tAll you can feel is disbelief. Even if you and your apprentice never quite got along very well, it feels unbelievable that he could just be gone so suddenly, without warning. Your brow creases in shock and you feel a lurch in your stomach, as if you had missed the final step on a staircase. Gretchin just laughs from behind you, her voice sanguine and high pitched.\n\t\t\t\n\t\t\t#You never cared about that boggart. You take your chance to fight back while the demon is gloating.\n\t\t\t\t*set compassionate %-5 \n\t\t\t\t*set altruism %-5 \n\t\t\t\t*set relationship %-20\n\t\t\t\tYou grit your teeth and smash your elbow into Gretchin's nose while she isn't expecting it. She staggers back with a howl of pain, giving you an opportunity to escape. With a roar of fury, you lunge toward Gretta, but Garnet suddenly appears out of nowhere, punching you savagely across the face. You grunt in pain and stagger back, and before you can do anything, Gretchin comes up from behind and puts you into a stranglehold, forcing you back down on your knees.\n\t\t\t\t\n\"Murderers!\" roars Vidar as he struggles weakly to his knees.\n\nCeylar just stares in horror and disbelief at the edge of the mountain where your apprentice fell, and Lorelle simply sobs where she lays, trembling as if in a terrible cold. Gretta gives a savage grin, and says, \"Let's round them up!\"\n\nYou fight against the demon behind you, but she just giggles as if having the time of her life and grips you even harder, forcing you to your knees. Meanwhile, Garnet and Gretta walk over to the defeated adventurers, grabbing them one by one. The warrior gives a cry of anger and swings his fist through the air but Garnet dodges easily and punches him in the sternum, causing him to choke and crumple to the ground. She grabs him by his long dreads and drags him to the center of the trail. \n\n*page_break \n\nGarnet has Ceylar and Lorelle by their collars, and she drags them roughly, but neither of them put up much resistance, too defeated and shocked to fight back. The demon throws them to the ground so that they're lined up and then Gretta speaks, her deep voice dangerously low. \"Now, I think you know what's coming next! We are going to kill these fools in front of your very eyes, but it's not going to be that easy. You have to choose which one of them we will keep alive. Now, make your choice!\"\n\nCeylar's jaw drops, his face paling instantly. Vidar seethes and trembles in anger, gritting his teeth and glaring daggers at the demons who hold him down. Lorelle simply cries, saying, \"Please.\"\n\nGarnet rolls her eyes and says, \"Shut up!\" as she slaps the healer across the face.\n\nGretchin laughs ecstatically from behind you and whispers in your ear, \"Choose, demon ${hunter}, choose! Which ones will die, and which one will live?!\"\n*choice  \n\t*selectable_if (gretta > 59) #You try to reason with Gretta. Maybe the connection you share will help you get through to the real human trapped inside of her.\n\t\t*set gretta %+10 \n\t\tYou turn to Gretta, looking her directly in the eyes. The demon frowns, her black eyes cruel and bitter, but even that cannot change that her face is still Gretta's. \"Gretta, listen to me,\" you implore. \"This demon is controlling your body, but they cannot take alway your real identity. Deep down inside, I know you're still there, fighting them, because I know you don't want to do any of this. \n\t\t\n\t\t\"You are still that strong, confident girl I met in Lorden, who was better than any of us at playing chicken, and always wanted to stand up to her father.\" Reaching out to her, you say, \"Please, come back.\"\n\t\t*goto vessel \n\t\n\t*selectable_if (gretchin > 59) #You try to reason with Gretchin. Maybe the connection you share will help you get through to the real human trapped inside of her.\n\t\t*set gretchin %+10 \n\t\tYou turn to Gretchin, looking directly in her eyes. The demon sneers, her black eyes conveying a cruel glee, but even that cannot change the fact that her face is still Gretchin's. \"Gretchin, listen to me,\" you implore. \"This demon is controlling your body, but they cannot control who you really are. Despite everything that has happened, I know you're still in there, somewhere, and I know that someone as kind as you would never want to do any of this.\n\t\t\n\t\t\"You are still that sweet, compassionate girl I met in Lorden, who was never afraid to show her emotions and always loved to cuddle ${boggart}.\" You choke up at your apprentice's name, but continue. \"Please, come back.\"\n\t\t*goto vessel \n\t\n\t*selectable_if (garnet > 59) #You try to reason with Garnet. Maybe the connection you share will help you get through to the real human trapped inside of her.\n\t\t*set garnet %+10 \n\t\tYou turn to Garnet, looking directly in her eyes. The demon stares back, her eyes like bottomless voids, but even that cannot change the fact that her face is still Garnet's. \"Garnet, listen to me,\" you implore. \"This demon is controlling your body, but they can never control your mind! They have possessed you, but I know someone who is as intelligent and confident as you would never want anything like this.\n\t\t\n\t\t\"You are still that cunning and independent girl I met in Lorden, and no one can take that away from you, no matter how strong.\" You reach out to her, saying, \"Please, come back.\"\n\t\t*goto vessel \n\t\n\t#You attempt to appeal to all of the triplets. Surely the demons don't have [i]complete[/i] control of them.\n\t\t*set gretchin %+5 \n\t\t*set garnet %+5 \n\t\t*set gretta %+5 \n\t\t\"Gretta, Garnet, Gretchin,\" you implore. \"I know you're still in there, and you have to fight back! These demons have invaded your minds, but you are still your own master and you can beat them. These demons fear your compassion, strength, and intelligence, and you can use it against them. I know you don't want to do any of this, and you can make it all stop.\"\n\t\t*label vessel \n\t\t\n\t\tThe triplets just stand there for a few moments, silent, but suddenly start to howl in laughter. Gretta's deep, monstrous guffaw seems to rumble the earth beneath your feet, and Garnet's laugh sounds strange and unnatural, as if she had never truly laughed before. Gretchin just giggles maniacally, doubling over and drooling, her eyes wild, as she laughs in your face. \"Fool!\" shouts Gretta. \"You of all people should know that we are the masters of these stupid, simple girls, now, and there's nothing anyone can do about it! They're gone, nothing but vessels now.\"\n\t\t*goto now \n\t\n\t#You don't care about the triplets, and trying to get to them would be futile in any case. You threaten the demons and show them you won't be playing their games.\n\t\t*set resolve %+5 \n\t\t*set garnet %-5 \n\t\t*set gretta %-5 \n\t\t*set gretchin %-5 \n\t\t*set compassionate %-5 \n\t\tYou sneer at the demons, saying with as much contempt as you can muster, \"I refuse to dance on strings like a puppet. You had better revel in your power now, because when I get the chance, all of you will be going back to the Netherworld in pieces!\" \n\t\t\n\t\tYou spit at their feet, glaring daggers at the demons as they stare back at you, their already black eyes darkening in anger. Garnet marches up to you, her voice dangerous but low. Taking your chin in her hand, she stares into your eyes, her own full of hatred, and spits, \"You would do well to follow our demands, or we'll kill you too! We have been tormentors and soul crushers for longer than you can imagine, and we will not be trifled with!\"\n\t\t\n\t\tShe begins to squeeze your chin until you can feel the inside of your mouth tear against your teeth, and you shake your head away, saying furiously, \"Fine!\"\n\t\t\n\t\tEven if they will likely kill you anyways, you may as well try to stay alive as long as possible to try to figure out a way out of this. The demon glares at you one last time before stomping back over to the three adventurers, who all look horrified at what's about to come next.\n\t\t*goto now \n\t\t\n*label now \n*page_break \nGarnet glares at you, her eyes narrowing cruelly, and screams, \"Stop stalling, and choose! Which one will live, and which ones will we kill in front of you?\"\n\nGretta gives you a savage grin and hoists up a massive rock with a grunt. \"Choose now, or I'll crush all of their heads, and Gretchin will snap your neck!\"\n\nGretchin giggles sadistically and wraps her hands around your neck, flexing her dirty fingers excitedly. With only seconds to make your choice, who do you tell them to keep alive?\n*choice\n\t#Vidar!\n\t\t*set ceylar %-20 \n\t\t*set lorelle %-20 \n\t\t*set vidar %+10 \n\t\t\"Vidar!\" you yell.\n\t\t\n\t\tThe warrior's eyes widen at the sound of his name, and his jaw drops. Ceylar looks as though he has been punched in the stomach, and Lorelle starts to sob, tears pouring down her now puffy and red eyes. \n\t\t\n\t\t\"Very well, then,\" Gretta says, her eyes dancing with excitement. \n\t\t\n\t\tShe releases the rock, which crashes to the ground with a splatter of mud. With a devilish smile, the demon reaches down and grabs Ceylar and Lorelle by their collars, dragging them closer and closer to the edge of the mountain. \"No! No!\" Vidar screams, lunging toward the demon, but Garnet laughs and puts him into a stranglehold, pulling him back. He struggles with all his might, but she simply tightens her grip and he relents, angry tears filling his eyes as he screams, \"Ceylar, Lorelle!\"\n\t\t*goto tumble \n\t\n\t#Ceylar!\n\t\t*set vidar %-20 \n\t\t*set lorelle %-20 \n\t\t*set ceylar %+10 \n\t\t\"Ceylar!\" you yell.\n\t\t\n\t\tThe magician gasps, his eyes going wide as he desperately swivels his head back and forth between Lorelle and Vidar. The healer starts to sob, tears pouring down her now puffy and red eyes, and the warrior grits his teeth, trembling as angry tears flow down his face.\n\t\t\n\t\t\"Very well, then,\" Gretta says, her eyes dancing with excitement.\n\t\t\n\t\tShe releases the rock, which crashes to the ground with a splatter of mud. With a devilish smile, the demon reaches down and grabs Lorelle, who whimpers pitifully as she is hoisted up by her collar. The demon then grabs for Vidar, but he roars, \"Get off me!\" and scrambles desperately away.\n\t\t\n\t\tGretta gives a deep laugh and lunges toward him like a cat, grabbing him roughly by the throat. He chokes and splutters as he resists, but her demonic strength quickly overpowers him in his weakened state. As suddenly as that, the demon begins to drag the two closer and closer to the edge of the mountain. \n\t\t\n\t\t\"Wait, no!\" Ceylar pleads, running toward them, but Garnet snickers and juts out her foot, tripping him into the mud.\n\t\t\n\t\tHe cries out in anger and frustration, struggling to get up, but Garnet stomps onto his back, holding him down. \"Vidar, Lorelle!\" he cries, his voice choked with tears.\n\t\t*goto tumble \n\t\n\t#Lorelle!\n\t\t*set lorelle %+10 \n\t\t*set vidar %- 20 \n\t\t*set ceylar %-20 \n\t\t\"Lorelle!\" you yell.\n\t\t\n\t\tThe healer gasps and slaps her hand to her mouth, trembling uncontrollably as tears stream down her cheeks. Ceylar looks as though he has been punched in the gut, and he simply slumps forward, seeming hopeless. The warrior grits his teeth, trembling as angry tears flow down his face.\n\t\t\n\t\t\"Very well, then,\" Gretta says, her eyes dancing with excitement.\n\t\t\n\t\tShe releases the rock, which crashes to the ground with a splatter of mud. With a devilish smile, the demon reaches down and grabs Ceylar roughly by the collar. He puts up little resistance, too shocked and defeated to fight back. The demon then grabs for Vidar, but he roars, \"Get off me!\" and scrambles desperately away.\n\t\t\n\t\tGretta gives a deep laugh and lunges toward him like a cat, grabbing him roughly by the throat. He chokes and splutters as he resists, but her demonic strength quickly overpowers him in his weakened state. As suddenly as that, the demon begins to drag the two closer and closer to the edge of the mountain. \n\t\t\n\t\t\"Wait, stop!\" screams Lorelle, her voice desperate and high pitched. \"Leave them alone!\" She tries to run to them, but Garnet merely laughs and slaps her across the face again, sending her crumpling to her knees, stunned. \"Vidar, Ceylar,\" she sobs quietly, reaching out to them with a trembling hand.\n\t\t*goto tumble \n\t\t\n*label tumble\n*page_break \n\t\t\nGretta, who by now has dragged her victims to the edge, turns back to you, grinning savagely with her eyes wide in euphoria. \"This is the life you have chosen, demon ${hunter}!\" she yells, her voice deeper and more primal than ever. \"A life of misery and death! And now, you must reap the consequences!\" \n\nWith that, she gives a grunt and shoves them with all her might, their cries piercing the air as they tumble off the side of the mountain and out of sight.\n\n[i]To be continued in Transitions of Power - Volume Four of Demons Among Men[/i]\nMake sure to save your game below! You'll need your saved game to continue where you left off in the next episode.\n*save_game save_foundationofnightmares\n\nWe hope you've enjoyed playing [i]Foundation of Nightmares.[/i]\n\n*feedback\n\nThanks for playing!\n\n*ending", "falcon_vs_gertrude": "*temp save_illil false \n*temp check 0 \n*temp lorelle_first false \n*temp vidar_first false \n*temp ceylar_first false \n*temp away false \n\n*page_break\n\n[b] Chapter Four of Seven[/b]\n\nYou awaken the next afternoon to a commotion going on outside. You sit up, bleary eyed, trying to make sense of things, only to see Vidar hurtle out of the room, shouting, \"It's those bandits!\" \n\nHe is wearing his armor and carrying his longsword, and indeed, it seems like he'll need it for whatever is out there. Even from here, you can make out the clashing of metal and shouts of pain ringing across the streets. ${boggart} jumps to his feet, his antennas sticking straight up and his scorpion tail poised at the ready. \"Hey, that's Gertrude!\" he cries, hopping onto the window sill and staring outside intently.\n\nCaptain Gertrude? She must have tracked the bandits here to regain her stolen ring and put them back into the dungeon! You shamble to your feet as quickly as you can, trying hard to untangle yourself from the sheets. You cast them aside, then make your way out of the infirmary. The building is made out of simple wooden material but it is tidy aside from the occasional patches of dirt on the floor.\n\n*page_break \n\nThis is your first time exploring the rest of the building, but you soon find your way to the exit. You step out onto the creaking steps, gripping the handrail tightly. Before you is a giant mess of cursing, shouting, and violence as several guards from Lorden battle the bandits under Falcon's command. The guards seem skilled in melee, and one of them is even a magician, but they are outnumbered by the outlaws who fight viciously. \n\nCuriously, most of the Qauder guards—who you notice are both few and wielding cruder weapons—are standing at the sidelines, either too nervous to add to the fighting or already defeated. Fortunately, Vidar and Ceylar have joined the fray, lending their support in whatever ways they can. Currently, Ceylar is dancing around the outskirts of the battle, slashing and jabbing with his dagger. Vidar, on the other hand, has chosen to put himself in the midst of things.\n\nHe is admirably taking on the massive halberdier and swordsman at the same time. Meanwhile, Captain Gertrude is facing off with Falcon, a determined scowl on her face and an elegant, shiny sword in her hands. Falcon is wearing an arrogant smirk as if trying to egg her opponent on, and she holds her loaded bow at the ready, prepared to use it even in this short-ranged battle.\n\nYour apprentice just watches from the windows, apparently not confident enough to enter such a complicated fight, and Lorelle stands off to the side, wringing her hands in worry. Unfortunately, there is nothing you can do to sway the tides of either side. The most you can do presently is watch from a safe distance. Your relationship with Falcon is certainly complicated, making it almost uncertain who you are really rooting for.\n*comment this is where I would like the demo to end! (after they make their choice here)\n*fake_choice  \n\t#You don't care who wins this senseless battle. You just want the fighting to stop so no one gets killed!\n\t\t*gosub trial_end\n\t\t*set compassionate %+5 \n\t\t*set altruism %+5 \n\t\t*set lorelle %+5 \n\t\tLives were already lost in the initial dungeon break, and now more people are surely going to die. You wish there was a way to convince everyone to stop attacking one another, but that seems unlikely. Even so, you feel it is your duty to try. \"Everyone, stop! Don't you see how pointless this is? Just surrender before any more people are killed.\"\n\t\t\n\t\tAt first, you think your words haven't been heard over the turmoil, but Gertrude glances at you and shakes her head, yelling back, \"We've already offered that to them, but brigands and murderers cannot be reasoned with, ${name}!\"\n\t\n\t#Whatever happens, you just want Falcon to survive this. Even though you aren't exactly in a positive relationship with her allies, you've grown very fond of her, perhaps more than you can explain.\n\t\t*gosub trial_end\n\t\t*set falcon %+5 \n\t\t*set gertrude %-5 \n\t\tThe archer has a certain sort of cunning charm to her, and her body is more than alluring to you. Not only that, but she has chosen to travel all this way to help you bring down Mendax. Suddenly, one of the sentries closes in behind her, raising his weapon to blindside the bandit. Cupping your hands to your mouth, you cry, \"Falcon, watch out!\"\n\t\t\n\t\tSwiftly turning around, the archer ducks the man's attack, delivering a swift kick to his groin and sending him toppling to the dirt. She flashes you a smile, saying, \"Thanks!\" and quickly backs farther away from Gertrude. \n\t\t\n\t\tThe captain, however, seemed too stunned to take advantage of Falcon's brief opening. Instead, she just gives you an incredulous look followed by a withering glare. \"What do you think you're doing, ${hunter}?!\" she demands.\n\t\n\t#Gertrude is a noble woman just trying to do her job and bring justice to Lorden. Not only that, but she was attacked and stolen from. It's obvious that she deserves retribution and should get to put these outlaws away.\n\t\t*gosub trial_end\n\t\t*set gertrude %+5 \n\t\t*set resolve %+5 \n\t\t*set falcon %-5 \n\t\tThe guard captain helped you as much as she could when Mendax was threatening the city, and now she's back to make sure these outlaws who had attempted to take your life are penalized. Out of nowhere, a piker lunges at her, his weapon raised to attack her from behind. Leaning forward, you yell, \"Gertrude, behind you!\"\n\t\t\n\t\tHer eyes flickering to the side, the captain swivels around with almost unnatural speed, deflecting the criminal's spear and ramming the hilt of her blade into his nose. The man stumbles back as blood gushes from his nostrils. Falcon says, \"Ha!\" and tries to take advantage of this by lunging forward with a slash of her dagger, but Gertrude deftly leaps out of the way, nodding to you in thanks. \n\t\t\n\t#Honestly, you couldn't care about the outcome if you tried. The Lorden guards are all fools for coming here and the outlaws deserve nothing but a swift execution!\n\t\t*gosub trial_end\n\t\t*set compassionate %-5 \n\t\tYou just stare at the battle, bemused. One of the sentries cries out in pain and collapses, his leg bleeding from a well-placed slash of a halberdier's blade. Somewhere off to the side, one of Falcon's bandits trips over a Lorden guard's ankle, sprawling to the dirt with his weapon flying out of his hand. \n\t\t\n\t\tLorelle gasps, but your reaction to the fight is much different. You just shake your head, muttering derisively, \"They're like a pack of unskilled children fighting enemies that aren't even their own.\"\n\t\t\nSuddenly, the massive axemen gives a throaty roar, lunging forward and burying his weapon into a younger sentry's chest. The victim gives a strangled cry and collapses to the dirt, blood spurting from his chest and the lights going out of his eyes. \"No!\" Ceylar cries, dashing forward and shooting a bolt of lightning from his fingertips.\n\n*page_break \n\nThe outlaw twists away, but not quickly enough. The energy slams into his chest, sending him tumbling across the dirt, crackling with a blue and violet light. This new development in the fight only seems to spur everyone on. All at once, the battle intensifies, angered cries piercing the air as each side tries hard to sway the tides. Falcon looses an arrow at Gertrude, who drops to the ground, lifting her arm to protect herself.\n\nThe arrow grazes her side, tearing at the light armor cuff and drawing blood. The captain grits her teeth and lunges to her feet, a fierce light dancing in her eyes. The archer just laughs and readies another arrow, but the captain dashes forward before she has time to fire the weapon. Gertrude's sword suddenly glows a brilliant azure, and she cleaves it through the air, shattering the bandit's bow and blasting her back with a powerful shock wave.\n\nFalcon skids across the dirt, splinters and fragments of her bow raining down upon her. She tries to scramble to her feet, but Gertrude swiftly steps forward, pinning her to the ground with a foot on her chest and putting her sword to the archer's throat. Breathing hard, Gertrude commands, \"Put your weapons down now, or she dies!\" \n\n*page_break \n\nThe fighting had already stopped as everyone turned to watch the leaders, but a few of the bandits lift their weapons as if to go to the archer's aid. Gertrude just narrows her eyes and presses her blade forward, nicking Falcon's skin and sending a trickle of blood down her neck. With grumbles and insults, the criminals throw their weapons to the ground. \n\nThe sentries that are still able after the smoke has cleared cheer and quickly move in, handcuffing their opponents and forcing them to their knees. Lorelle gives a relieved sigh, running off to the infirmary, presumably to get healing supplies. Vidar raises his sword into the air, giving a spirited victory cry, but Ceylar just looks dejected. He stares at the fallen sentry, a haunted look on his face. \n\nGertrude, on the other hand, sheathes her magical sword and hoists Falcon to her feet. She then puts the handcuffs tight around the outlaw's wrist. A satisfied look on her face, she says, \"I've finally caught you for myself, Falcon, and now you can enjoy the remainder of your life behind bars!\"\n\n*page_break \n\nThe archer grimaces and turns to you, yelling, \"${name}, what about our bargain?! Tell this old hag to let us go!\"\n\nAs Lorelle returns with bandages and various healing appliances, other healers begin to tend to the wounded. She leans down and says, \"Don't worry, it will be fine,\" to a sentry who is clutching his leg and whimpering on the ground.\n\nThe other healers of Qauder, though undoubtedly not as skilled at the trade as Lorelle, look after the outlaws and guards in equal measure while a few helpful villagers who had been watching the battle in horror from the sidelines try to disperse the supplies. Gertrude raises an eyebrow, saying to you, \"What bargain? Make it quick, because I've got a town to tend to. I've decided to run for mayor in Eldon's stead, and these things take time and preparation.\" \n\nWell, that was unexpected. You'll have to get to the finer details surrounding that later.\n*choice \n\t#You shake your head, saying to Falcon, \"There never actually was a bargain. The law dictates that you must go back to the dungeon, now, and there's nothing that I can do about it.\"\n\t\t*set gertrude %+10\n\t\t*set falcon %-10 \n\t\t*set jail_falcon true \n\t\tThe archer narrows her eyes and hisses coldly, \"You're a fool! You think you're noble, but you're just dooming us all because you're too afraid to stray away from some misplaced code!\"\n\t\t\n\t\tThe other bandits begin to grumble loudly and spit in your general direction, but the guard captain quickly drowns them out with an angry shout. She says more level-headedly, \"You've made a wise choice, here, demon ${hunter}. You can't trust people like these criminals, and to ignore the law for anything but truly exceptional circumstances is to incite disorder.\"\n\t\t*goto jail_falcon\n\t\t\n\t#You arch an eyebrow, responding coldly, \"Oh, you mean the bargain that you asked for but I never accepted? You're too weak to make a difference in this fight and even more arrogant than I thought to believe that you could make amends for what you've done to me. I hope you rot in that jail for good this time!\"\n\t\t*set falcon %-20 \n\t\t*set gertrude %+5 \n\t\t*set jail_falcon true \n\t\tThe archer struggles in Gertrude's grip, trying to lunge at you, but the captain just yanks her back. The outlaw gives you a look of pure hatred, shouting, \"And you're nothing but a selfish failure! Maybe I should have killed you when I had the chance and gone to a wizard myself to have this demon banished. Then I would get all the credit and I'd be long gone from here!\"\n\t\t\n\t\tThe other brigands howl with laughter and jeer at you, but Gertrude quickly drowns them out with an angry shout. She narrows her eyes at the woman in her grip, saying, \"Then I'm very glad this turned out like it did. Perhaps we still have a chance of beating the demon, and you'll be in a dungeon where you belong!\"\n\t\t*goto jail_falcon \n\t\n\t*selectable_if (charisma > 69) #You really could use Falcon's help, when you think about it. Giving the captain your most charming smile, you say, \"Gertrude, Falcon may not have worded her request very convincingly, but I can explain to you why it's best for everyone if you let her go.\"\n\t\t*set charisma %+5 \n\t\t*set falcon %+10 \n\t\t*set gertrude %-5 \n\t\tGertrude looks unimpressed thus far. She says with an eyebrow raised, \"Go right ahead.\"\n\t\t\n\t\tYou step forward and say calmly, \"Gertrude, from what I've seen of you so far, and judging by how people seem to think of you, I'd say you have a reputation of being a competent but fair guard captain who is also careful to observe the law. Fortunately for you, this gives you a good chance of winning the election and becoming the new mayor of Lorden.\"\n\t\t\n\t\tThe captain just nods, listening politely. She seems pleased at your analysis, but she says, \"Surely, you aren't just going for a bit of flattery. Convince me, ${name}, or stop wasting my time.\"\n\t\t\n\t\tNodding quickly, you hasten to add, \"So don't you think it would be a good idea to keep the citizens satisfied and happy with you? If you captured Falcon, it might make them feel a little safer and perhaps better for a time, but then what? If I fail, the demon will still be rampant, and no one will be safe. Don't you want to do whatever it takes to keep these citizens from harm?\"\n\t\t*label convince \n\t\t\n\t\t*page_break\n\t\tGertrude furrows her brow, seemingly in deep thought.\n\t\t*if ((gertrude_mad) and (charisma > 74))\n\t\t\t*goto freed \n\t\t*if ((gertrude_mad) and (altruism > 74))\n\t\t\t*goto freed\n\t\t*if ((gertrude_mad) and (cunning > 74))\n\t\t\t*goto freed \n\t\t*if ((gertrude_mad) and (charisma \u003c 75))\n\t\t\t*goto unconvinced \n\t\t*if ((gertrude_mad) and (altruism \u003c 75))\n\t\t\t*goto unconvinced \n\t\t*if ((gertrude_mad) and (cunning \u003c 75))\n\t\t\t*label unconvinced \n\t\t\tAfter a moment, she finally says, \"Unfortunately, I don't think I can trust either of you. Maggie told me about your little theft at the Sleeping Badger. Normally this wouldn't be that big of a problem as it was a minor offense, but I don't feel comfortable putting the two of you together, especially if it means ignoring both of your very recent crimes.\"\n\t\t\t*set jail_falcon true \n\t\t\t*goto jail_falcon \n\t\t*if not(gertrude_mad)\n\t\t\tA couple moments later, she finally replies, \"You make a good argument, demon ${hunter}. Perhaps against my better judgment, I've decided to allow Falcon to go free, at least for now. If it will help you in your journey to defeat this demon, then so be it.\"\n\t\t\t*goto falcon_free \n\t\t*label freed\n\t\tA few seconds pass before she responds, \"${name}, Maggie told me about the way you just walked out of the Sleeping Badger without paying your bill.\"\n\t\t\t\n\t\tYou shuffle awkwardly and cough, replying, \"Oh, right. That was just a little misunderstanding.\"\n\t\t\t\n\t\tThe guard captain gives you a disbelieving look and replies, \"Regardless, it doesn't exactly improve my assessment of you, and this archer is the last person I would trust.\" She pauses, then adds, \"Still, you make a good argument, and I'm willing to pardon both of your crimes for the time being for something I've realized is more important.\"\n\t\t*goto falcon_free \n\t\t\n\t*selectable_if (altruism > 69) #Shaking your head, you reply, \"Gertrude, Falcon is right, no matter how crazy it must seem to you. You have to put aside personal matters and maybe even bend the law in this situation. Without their help, I might not be able to complete my mission, and that would be devastating for all of us.\"\n\t\t*set altruism %+5 \n\t\t*set gertrude %+5 \n\t\t*set falcon %+10\n\t\tThe captain just blinks in surprise. You say, \"I know that your relationship with Falcon has always had some animosity, and the theft of your ring and the dungeon break can only have made that worse. I also know that the law and justice are important to you. However, I'm asking you to let all of that go, even if it's just until this crisis has been resolved.\"\n\t\t\n\t\tThe captain furrows her brow, saying, \"That's not so easily done. From my position, anyone would do the same thing as I'm doing now.\"\n\t\t\n\t\tYou nod knowingly and respond, \"Perhaps, but that is because they aren't thinking of the bigger picture. You have to put your own emotions aside and judge things from a different perspective. Letting Falcon go could ultimately give me a better chance of succeeding in banishing Mendax, and that is something that affects us all.\"\n\t\t*goto convince \n\t\n\t*selectable_if (cunning > 69) #The aid of Falcon and her bandits might mean the difference between a narrow victory and a crushing defeat. Thinking hard, you say carefully, \"Captain Gertrude, we must consider all of the ramifications of our choices here. The one before you is to decide whether or not immediate revenge and a minor gain is more important than indefinite justice but the the safety of us all.\"\n\t\t*set falcon %+10 \n\t\t*set gertrude %-5 \n\t\t*set cunning %+5 \n\t\tArching an eyebrow, the captain replies in irritation, \"What do you mean?\"\n\t\t\n\t\tYou step forward and put out your hands in a placating manner, responding, \"On one hand, you are in a position to take Falcon back to jail. Not only would this satisfy you because of the recent and or distant crimes she has committed against you, but as you said, it would improve your chances of becoming the new mayor. However, the implications of this decision simply aren't worth it.\"\n\t\t\n\t\tWhen she gives you a questioning look, you continue, \"In this battle against the demon, we need every advantage we can get. If we were to simply abandon the aid of Falcon and these bandits at arguably the most inopportune time, Mendax could be allowed to prevail. Then it wouldn't matter that you had jailed Falcon or become the mayor of Lorden, because he would raze the city to the ground.\"\n\t\t*goto convince \n\t\n\t#You have to figure out some way to convince Gertrude to let Falcon go. \"Captain Gertrude, please consider this. She can help me!\"\n\t\t*set gertrude %-5 \n\t\t*set falcon %+5 \n\t\t*set jail_falcon true \n\t\tThe captain shakes her head and says with an air of finality, \"${name}, you couldn't trust this criminal nearly as far as you could throw an ogre. Not only that, but you have to consider how this whole dungeon break is going to affect the citizens' morale.\" A lump seems to catch in her throat, but with some difficulty, she continues, \"It is already at an all-time low with the death of Mayor Eldon.\"\n\t\t\n\t\tGlaring at the archer, Gertrude continues, \"Catching the outlaws who played a part in his death is the best way to restore their confidence, and letting these brigands go could be disastrous.\" The woman looks at you, adding proudly, \"This victory will be great for my image, which is important if I want to keep the city prosperous and peaceful and away from a terrible decline.\"\n\t\t\n\t\tThe bandits grumble and a couple of them even spit in Captain Gertrude's general direction, but she easily stops that by placing a hand on her magical sword. Falcon sighs, saying, \"Thanks for trying, ${name}, but you can't expect to sway power-freaks and upcoming political puppets from their petty revenge and ridiculous ideals.\"\n\t\t*goto jail_falcon \n\t\t\n*label jail_falcon \n\n*page_break \nFalcon just glowers at the dirt, her mouth twisted into a bitter grimace. Frowning at her, Gertrude suddenly says, \"Now, I think I'll be taking back what belongs to me.\" \n\nWith that, she quickly slips the magical ring off of the archer's finger and puts it onto her own. The captain sighs as if this takes a burden off of her shoulders, but the bandit grits her teeth, working her jaw. The sentries seem happy that they can take their enemies back to the Lorden dungeon, especially with one of their comrades having fallen in the fight. The ones that are able roughly hoist the brigands to their feet, preparing to take them away.\n*goto infirmary\n\t\t\n*label falcon_free \n*set falcon %+5 \n*achieve bandit\n\nFalcon seems surprised that the captain actually agreed to let her go. Some of the sentries from Lorden don't look too happy about it, especially since one of their comrades was killed in the fight. Even so, Gertrude reluctantly takes the handcuffs off of the archer and clips them to the rear of her belt. Grinning devilishly, Falcon motions to the magical ring on her finger and says, \"I guess you ought to let me borrow this a little longer, hmm?\"\n\n\"It wasn't borrowed. You stole it from me!\" Gertrude growls back.\n\nThe bandit leader shrugs and responds, \"I suppose it's all a matter of perspective. Either way, you may as well go all the way if you really want us to succeed.\"\n\nThe captain narrows her eyes at her enemy, but finally relents, deigning to let Falcon keep it for the time being. She doesn't look happy about it, but she commands, \"Release her bandits as well.\" \n\nThere are grumbles all around from the guards and a few of them mutter under their breaths, but there's nothing they can do. One by one, they let the brigands out of their restraints and each person returns to their group. \n*label infirmary \n\n*page_break \nBy now, Lorelle and the healers have made sure that no one is in critical condition. Still, the healer says, \"Now that this has been settled, you had all better follow me to the general infirmary.\"\n\nYou guess that the one you had been resting in was more of Lorelle's personal infirmary, because the other healers begin to walk in the opposite direction, the guards \n*if (jail_falcon = false) \n\tand bandits shuffling uneasily behind them. \n*if jail_falcon\n\tmarching the bandits off with purpose.\nTwo of the healers carry away the dead guard in a stretcher, but he appears to be the only casualty. Vidar grits his teeth as he wrestles himself out of his armor.\n\nCeylar is wringing his hat with a pained look on his face. Gertrude pats him on the shoulder and tells him, \"I know it's rough, but you did a good job and this fight could have turned out worse if you weren't here.\"\n\nHe just smiles sadly, nodding and gazing off into space. The captain then takes up the rear, her hand on her magical sword's hilt as if preparing for any eruption of tempers between the two opposing sides. She glances back, catching your eye and saying, \n*if gertrude > 50 \n\t\"I wish you luck on the remainder of your journey, ${name}.\"\n*if gertrude \u003c 51 \n\t\"Good luck, demon ${hunter}. You'll need it.\"\n*fake_choice\n\t#You smile back tiredly. \"Congratulations on running for mayor, Gertrude. I'm sure you'll win the election, and you deserve the position.\"\n\t\t*set gertrude %+10 \n\t\tThe captain smiles back graciously. She replies, \"Thank you for your vote of confidence, ${name}. It means a lot, coming from a demon ${hunter}. I'll certainly try my best, but I'm running against stiff competition: Eldon's younger cousin, in fact. He already has years of political experience under his belt, so I have my work cut out for me. \n\t\t\n\t\t\"Either way, it should be over in the next couple of weeks.\" She sighs, adding, \"Hopefully, things will be better and all of this demon nonsense will be over by then.\"\n\t\t\n\t\tWith that, she bids you farewell and hurries—at a decidedly dignified pace, you notice—after the others.\n\t\n\t#You tell her, \"If you ever do win that election, remember to keep me in mind. I could definitely use a connection with an official of Lorden.\"\n\t\t*set gertrude %+5 \n\t\t*set altruism %-5 \n\t\tThe mayor elect smiles thinly, responding, \"There is much more to politics and running a big city than handing out favors, demon ${hunter}. Still, I certainly won't forget about the accomplishments you have made and likely will continue
