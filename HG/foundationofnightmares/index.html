\t\t\t\"No surprise there,\" you laugh.\n\t\t\t*goto nn \n\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\tRaising an eyebrow, you respond, \"Oh, really? Interesting.\"\n\t\t\t*goto nn \n\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\tYou nod wisely, replying, \"Sounds natural, for his hobbies.\"\n\t\t\t*goto nn \n\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\tYou snort, just chuckling in response.\n\t\t\t*goto nn \n\t\t*else \n\t\t\t*goto n \n\t\t*label nn \n\t\t\t\n\t\t*line_break \n\t\t\"As for Lorelle,\" he finishes, \"She really likes to read books when she can get her hands on one. They're rare, especially in this village, but she loves fables.\" Shrugging, he adds, \"And that's all, really.\"\n\t\t\n\t\tYou smile, saying, \"Well, that's definitely good to know. I feel like I know them better already.\"\n\t\t\n\t\tAlthough you could probably get into the finer details about the group of adventurers, that seems like something better to do with each of them as individuals. So, perhaps it's best to carry on to a different topic.\n\t\t*goto story \n\t\t\n\t*selectable_if (story = 2) #You're finished talking to Vidar. \n\t\t*set story +1 \n\t\t*goto story \n\t\t\n*label therapy\n*page_break \n\nSuddenly, seemingly out of nowhere, your back convulses. You scream and arch your back as the muscles on the lower half spasm violently, causing you to shake and writhe in unnatural positions. The muscles feel like they're being ripped apart, and you're blinded by pain. You cry out again, but you are dimly aware of Vidar rushing forward and reaching out to you. You strain to keep yourself under control as he puts his hand onto your lower back.\n\nFor a few seconds, Vidar's touch only intensifies the pain, but then he suddenly works his fingers gently but firmly into the knot in your muscles. Just like that, the spasms lessen until they become tolerable. You still have to grit your teeth to keep yourself from crying out, and sweat pours down your forehead, but the crisis seems to be over, at least for the time being. \n\n*page_break \n\nStanding over you, the warrior begins to knead your muscles gently but purposefully. His face an image of concentration, he murmurs, \"Lorelle warned me that this might happen. Although the potions and other medicines she gave you did wonders for your recovery, you were far too injured for your body to be able to handle it without phantom pains and complications. \n\n\"It seems like your muscles are inflamed and torn, but I should be able to help with that. I've been injured badly before, as well, and I needed to have this done to me every now and then. It got so common that I decided to learn how to handle it for myself.\"\n\nYou gasp for breath, trying to work out a reply.\n*fake_choice \n\t#\"Just try to speed this up as much as possible,\" you say impatiently. You don't really feel comfortable with him touching you so much.\n\t\t*set stealth %+5 \n\t\t*set vidar %-5\n\t\t*set charisma %-5 \n\t\tNodding gravely, the warrior continues to massage your muscles, though you notice he does so at a faster pace than before. It stings badly at times, but overall you can feel the inflammation and pain begin to subside. Deciding that you've had enough, you turn your neck and give him a meaningful look. \n\t\t\n\t\tNodding, he steps away, looking almost embarrassed and annoyed at the same time. \"Well,\" he says bluntly, \"You should be fine for now.\"\n\t\n\t#\"Thank you so much. Just let me know how I can cooperate or make this easier,\" you reply helpfully. You do [i]not[/i] want anything like that happening again.\n\t\t*set vidar %+5 \n\t\t*set cunning %+5 \n\t\tThe warrior says, \"I appreciate that. The difference between a cooperative and uncooperative patient can mean a lot.\" As he continues to massage your muscles, he stops for a brief moment, adding, \"Now that you mention it, putting a pillow under your stomach might put less tension on the muscles.\"\n\t\t\n\t\tNodding, you manage to lift your stomach off of the bed as he quickly slips a soft pillow underneath it. The movement burns for a few seconds, but you feel an immediate improvement after you've laid back onto the cushion. From there, Vidar resumes the physical therapy. \n\t\t\n\t\tWith the added comfort and his expertise, the pain and inflammation seem to quickly seep from your muscles until only a dull, lingering ache remains. Stepping back, Vidar says proudly, \"Well that should hold you over until Lorelle can work her usual magic.\"\n\t\n\t#\"Oh, yes please. Take as long as you need to. You're making me feel better already,\" you respond sweetly. If you're going to get physical therapy, especially from Vidar, you plan on enjoying it.\n\t\t*set vidar %+10 \n\t\t*set charisma %+5 \n\t\tFlashing a smile, the warrior says, \"I'm glad to hear that, ${hunter}.\"\n\t\t\n\t\tHe continues to knead his fingers into your aching muscles, and you can tell that he's giving you a little extra care, now. Sighing, you bury your face into the pillow. As the inflammation and pain seem to seep away from your muscles, you can't help thinking about how powerful his fingers are. At the same time, though, he moves them with such precision and gentleness. It's fascinating, and a perfect combination.\n\t\t\n\t\tAs your muscles loosen up more, you're able to appreciate just how good the massage is. Not only is it helping your body heal, but it feels amazing at the same time. Before long, agony is replaced with a slightly painful sort of pleasure, and you find yourself groaning softly into the pillow. \n\t\t\n\t\tWhen you sneak a peek at Vidar from under the cushion, you catch him blushing with a nervous smile on his face. Stepping away after a few more seconds of massaging your lower back, Vidar says, \"Well, you certainly seemed to enjoy that more than I would have expected. That should be enough to keep that from happening again, at least until Lorelle can tend to you.\"\n\t\t\n*page_break \n\t\t\nJust then, you hear voices coming from outside of the infirmary. Startled, Vidar quickly grabs his longsword and rushes to the window, looking out to see what the commotion is. After a moment, though, he relaxes. Shaking his head, he admits, \"I'm acting paranoid with all these outlaws running around. It's just ${boggart} and the others.\"\n\nSetting his weapon against the wall again, he goes to open the door for them. Ceylar enters first, an exhausted look on his face. Lorelle, with your apprentice on her shoulder, enters the room next, and she looks just as tired as the magician. The boggart, however, looks more worn out than either of them. His wings are hanging limply by his side, and he pants loudly.\n\nVidar eyes them all questioningly, saying, \"What happened?\" but they just set themselves down around the room, taking a moment to catch their breaths and drink some water. \n\nNone of them look particularly wounded, but they do have patches of mud on their clothes, and stickers and twigs are sticking out of Lorelle's and Ceylar's hair.\n*fake_choice \n\t#Raising your eyebrows and giving them a bemused look, you say, \"Let me guess, the mission was a huge success.\"\n\t\t*set charisma %+5 \n\t\t*set altruism %-5 \n\t\t*set ceylar %+5 \n\t\t*set lorelle %-5 \n\t\t*set relationship %-5\n\t\tCeylar lets out a barking laugh despite himself, but he falls silent when the healer gives him a disapproving look. \n\t\t*if relationship > 55 \n\t\t\t${boggart} just rolls his eyes and shakes his head, but you notice he's unable to suppress a grin, as well.\n\t\t*if relationship \u003c 56 \n\t\t\tGiving you a withering look, your apprentice replies, \"Coming from you, that's just comical.\"\n\t\t\t\n\t\t\tYou return the look, but he just distracts himself by taking another large drink from a child-sized cup beside him.\n\t\n\t#Searching them with your eyes full of worry, you ask, \"What happened? Are you all okay?\"\n\t\t*set compassionate %+5 \n\t\t*set relationship %+5 \n\t\t*set lorelle %+5 \n\t\t*set ceylar %+5 \n\t\tCeylar gives you a small, reassuring smile, and responds, \"Never been better.\"\n\t\t\n\t\tLorelle adds, \"I'm not cut out for that sort of endless exercise, but thankfully, none of us suffered anything worth fussing over.\"\n\t\t\n\t\tThe boggart just nods, \n\t\t*if relationship > 49 \n\t\t\tgiving you a little smile of his own.\n\t\t*if relationship \u003c 50 \n\t\t\totherwise ignoring you.\n\t\n\t#You don't question them, instead opting to let them speak first. They look exhausted, and surely it's best to let them get themselves together before discussing what happened.\n\t\t*set altruism %+5 \n\t\t*set stealth %+5 \n\t\t*set relationship %+5 \n\t\t*set ceylar %+5 \n\t\t*set lorelle %+5 \n\t\tWhen you just watch the three of them wind down after going out on that mission, Lorelle gives you a thankful look. Ceylar decides to take the moment of silence to fan himself with his wizard hat, and ${boggart} turns his attention to his aching wings, massaging them tiredly.\n\t\t\n*line_break \t\t\nOnce everyone has regained their breath, the magician tosses his hat onto a bed, saying, \"Unfortunately, we weren't able to catch Illil. I knew he was clever, but not to this extent.\" He chuckles wryly, continuing, \"He must have figured out that ${boggart} was tracking the scent coming from his magical ring, because he abandoned it. He didn't just ditch it, though; somehow he attached the thing to a rabbit's leg!\"\n\nSlapping the palm of his hand onto his forehead, he carries on, \"I have no idea how he could have done that, but he did. Needless to say, we were stuck chasing a rabbit around the woods all day. It was a fool's errand, but we didn't realize it until it was too late. So now, we have no clue where he's hiding and no way to find out.\"\n\n*page_break \n\nFrowning, ${boggart} says irritably, \"We weren't even able to take the ring for ourselves.\"\n\nSlamming his fist onto the table, Vidar says angrily, \"Curse that greasy coward!\"\n\nSighing quietly, Lorelle says, \"We'll catch him eventually, everyone.\" She stands, moving wearily over to your bedside and giving you a closer look. After a moment, she breaks into a smile, commenting, \"You're looking much better today, ${name}. How are you feeling? I hope nothing went wrong while all of us were gone.\"\n\nYour fingers going to your lower back absent-mindedly, you reply, \"Unfortunately, I had some bad back spasms earlier.\"\n*fake_choice \n\t#Shaking your head, you grin sheepishly and add, \"I feel like an old person already.\"\n\t\t*set charisma %+5 \n\t\tCeylar grins, commenting, \"You're not quite there yet, ${name}.\"\n\t\t\n\t\t*if relationship > 49 \n\t\t\tYour apprentice giggles, saying, \"I thought you were one already, ${name}!\"\n\t\t*if relationship \u003c 50 \n\t\t\tThe boggart rolls his eyes, muttering, \"That would make sense, wouldn't it?\"\n\t\t\t\n\t\tVidar shrugs, rumbling, \"Such is the life of an adventurer. Either you feel younger and better than you ever have, or you're aching like you'd slept on a rock all night.\"\n\t\t\n\t\tThe healer laughs quietly, saying to you, \"Not if I have anything to do with it.\"\n\t\n\t#Clearing your throat, you feel compelled to add, \"It was nothing I couldn't handle, of course.\"\n\t\t*set resolve %+5 \n\t\tVidar \n\t\t*if vidar > 50\n\t\t\tchuckles good naturedly and says, \n\t\t*if vidar \u003c 51 \n\t\t\traises a bushy eyebrow and grumbles,\n\t\t\"Not without my help, at least.\"\n\t\t\n\t\tCeylar comments\n\t\t*if ceylar > 50 \n\t\t\tamicably,\n\t\t*if ceylar \u003c 51 \n\t\t\tsarcastically,\n\t\t\"What else could we expect from the greatest demon ${hunter} around?\"\n\t\t\n\t\tLorelle just nods and says, \"You are a tenacious one, especially from a healer's standpoint.\"\n\t\t\n\t\t${boggart} \n\t\t*if relationship > 49 \n\t\t\tgrins, saying, \"That's my master!\"\n\t\t*if relationship \u003c 50 \n\t\t\tsimply scoffs, not deigning to comment.\n\t\n\t#Furrowing your brow, you say almost to yourself, \"I'll have to take measures to prevent that in the future.\"\n\t\t*set cunning %+5 \n\t\tLorelle nods wisely, saying, \"That sounds like a good idea. I could teach you a thing or two about it, if you'd like.\"\n\t\t\n\t\tThe warrior speaks up, adding, \"Me as well, demon ${hunter}. I'm no healer, but as you saw, I'm not bad at certain physical therapies.\"\n\t\t\n\t#You frown, saying darkly, \"My enemies will suffer far more than a wounded back as payment for this. You can be sure of that.\"\n\t\t*set compassionate %-5 \n\t\t*set vidar %+5 \n\t\tThe healer looks at you disapprovingly, saying, \"Well, first things first, we have to make sure you're well enough to leave the sickbed. After that, maybe we can discuss the whole 'necessity of revenge' thing.\"\n\t\t\n\t\tVidar shrugs and says matter-of-factly, \"Maybe he's not all wrong, Lorelle. These demons and outlaws need to be taken care of, and that leaves a little room for personal retribution.\"\n\t\t\n\t\tFrowning, ${boggart} says, \"Yeah, and anyone who tries to make me into a slave will be sorry for it!\"\n\t\t\n\t\tShaking his head with some humor to his tone, Ceylar says, \"Excellent influence on our little boggart friend, here, ${name} and Vidar.\"\n\t\t\nBrushing the hair from her face and sighing tiredly, Lorelle says, \"That whole failed venture aside, though, we all should probably get to sleep. I know most of us are exhausted, and ${name} should be ready to make the journey tomorrow afternoon, or maybe the day afterwards at the latest.\" Turning to you, she adds, \"${name}, I've got some heat packs that should make your back feel better.\"\n\n*page_break \n\nWith that, she gets up and starts to rummage in one of the cabinets. The magician pulls his hair back into a long ponytail and says, \"Normally I'd make us all a big meal after running around so much, but I think I'm just gonna head to bed. I'm too tired to even think.\" He winks at no one in particular, adding, \"I hope you all like monster sounds because my stomach's probably going to be grumbling all night.\"\n\nSnatching his hat up from the bed beside him, he exits the infirmary, giving you all a nod goodnight. Your apprentice, on the other hand, snags a piece of bread sitting by the cauldron and curls up by your feet, quietly nibbling on the food. Vidar just lays down on one of the beds and starts to relax. By now, Lorelle has managed to locate the heat packs. She takes them from the cabinet, along with a metal rack.\n\nIn the other room, you can hear Ceylar whistling up a happy tune. Lorelle smiles wistfully and begins to prepare the packs. She kneels down beside the cauldron, and soon afterwards has a flame going. Then, she positions the rack over the cauldron and sets the packs on top. After just a couple minutes, she takes them and makes her way over to you. She holds them out and explains, \"I'm going to put these under your back. The heat will help relax and soothe your muscles.\"\n\n*if lorelle > 50\n\tSmiling appreciatively,\n*if lorelle \u003c 51\n\tNodding plainly,\nyou accept the pouches. It takes a little effort to arch your back enough to put them under it, but once you finally do, you can feel the difference immediately. In fact, they are very lulling; they feel like a warm blanket over you. Your eyes begin to droop, and then you fall asleep.\n\n*page_break \n\nYour slumber is a peaceful one. You only wake up once during the night, and it is deep and listless aside from that. Just when you think you will be free from more of Mendax's nightmares, though, his grating, sinister voice appears inside your head. \"Do you think that I've forgotten you, that you are rid of me, demon ${hunter}? You are not, nor will you ever be! \n\n\"Even as you try to futilely heal your body, I rally forces against you.\" He laughs mockingly, then adds, \"If you thought things were hopeless before, you're in for a sickening surprise. Rest now, failure of Rhys Falls, because your future is full of unstoppable death!\"\n\nEven though you can tell you're sleeping, you know this imagining is of Mendax's doing. Just like before, you're able to communicate with him through your own mind, at least when he has invaded it. But this time, the hallucination is less potent and therefore far less threatening—and your waxing strength is giving you courage.\n*fake_choice \n\t#\"Rally forces against me?\" you ask incredulously. \"Melithar the Eccentric must really frighten you if you must gather backup in order to face him.\"\n\t\t*set resolve %+5 \n\t\tThe Master laughs, a cruel and mirthless sound. \"Fear and sensibility are two very different things, demon ${hunter}. I am simply ensuring my success, and the demise of the only one who could hope to stop me!\"\n\t\t\n\t\tThis statement puts a pause to your reasoning. No matter your bravado, extra demons on Mendax's side can only mean more trouble for you and all of your companions, and especially your mission.\n\t\n\t#Unimpressed, you say cuttingly, \"Truly, you must be incapable of doing anything substantial if you must content yourself with making idle threats.\"\n\t\t*set stealth %+5 \n\t\tThe demon just grins savagely, as if thinking of a terrible secret that only he knows about. You can't actually see him, but you can [i]feel[/i] the grin nevertheless. \"To the contrary, you simple-minded fool! I am preparing for your possession, just as a chess master would arrange his pieces for the final strike. Indeed, your demise is now even closer, despite your lack of gory nightmares.\"\n\t\t\n\t\tYou frown, troubled. Although he speaks vaguely, this much seems almost certain: Mendax is now in control of Callidus's body and free to move around as he wishes. \n\t\n\t#Enraged, you scream back, \"The only death and destruction I foresee is yours, devil!\"\n\t\t*set compassionate %-5 \n\t\tMendax just cackles in delight, countering, \"You know as well as I do that you can't kill me, pathetic human! Even if you could, I would retake your mind for my own. As for that senile old man, Melithar, I have my own solution for him. Indeed, there is nothing you can do to stop this coming storm, so your words are nothing but empty promises and false hopes.\"\n\t\t\n\t\tYou grit your teeth, feeling your blood boil inside your veins. You have never felt this helpless, and to be the captive of fortune guided by someone as powerful as this is perhaps one of the most infuriating trials of your life. \nWith this haunting thought clinging to your mind, you drift off into a dreamless sleep again, a black cloud hanging over the room.\n*finish Continue"}};
