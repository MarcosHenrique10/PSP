nously behind you.\n\t\t\t\t\n\t*selectable_if ((charisma > 64) and (relationship > 59)) #He's just upset. Nothing you say will placate him right now, so you open your arms for a hug.\n\t\t*set charisma %+5 \n\t\t*set compassionate %+5 \n\t\t*set altruism %+5 \n\t\tThe boggart resists at first, but after a moment, he grips you tightly, nuzzling his head into your shoulder. Sniffing after a moment of silence, he admits, \"I didn't really mean it, ${name}. I'm just afraid.\"\n\t\t\t\t\t\t\t\t\n\t\tNodding, you say quietly, \"I know, my friend. You'll feel better after we've had a chance to sleep and eat. I promise I will do the best I can to get us out of this situation.\"\n\t\t\t\t\t\t\t\t\n\t\tSuddenly, a patch of thickets rustles behind you. Alert, you set ${boggart} to the side, leaping unsteadily to your feet.\nYou swivel around, your heart racing, trying to find the source of the noise. All at once, several scruffy looking men burst out of a dense patch of foliage. They quickly surround you both. You completely missed them, between the noise in your head and ${boggart}'s outburst, and your own exhausted state.\n\t\t\t\t\t\t\t\t\nThis isn't good. \n*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t*label m \n\tMaybe you can bargain with them. Surely, that's why they're here.\n\t*goto mm \n*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\tPerhaps if you can take them by surprise and run fast enough, you'll get away. Ugh, running again….\n\t*goto mm \n*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\tIt shouldn't be too difficult to make up some story and convince them to leave you alone.\n\t*goto mm \n*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\tDespite the poor odds, you might be able to frighten these lowlifes away.\n\t*goto mm \n*else \n\t*goto m\n*label mm \t\nA weaselly looking man in tattered, black robes raises his eyebrows, looking down at you. His comrades eye you greedily, muttering to one another.\n\nThe man in black has greasy, untidy hair and his grey eyes constantly dart around the clearing. Resting one hand on a dagger in his belt, he raises the other and signs for quiet. The sunlight glints off a surprisingly ornate ring on his finger. It's encrusted with a vibrant emerald, and it has dark patterns written on the band.\n\nHis cold grey eyes flashing, he murmurs in a silky voice, \"What have we here? A vagrant snooping around my territory.\" Eyeing your apprentice with a hint of disgust, he wrinkles his lip, adding, \"And ${dhis} pet…thing.\"\n\n*image illil.jpg \n\n*page_break \n\n${boggart} frowns, but doesn't protest. Perhaps he realizes how bad your situation is. Or maybe he's just too exhausted. As the other thugs chuckle cruelly, the leader continues, \"I am Illil, and I run the area outside of Quader. Anyone wishing to enter that village needs my permission. Of course, my permission is only granted on payment of a small, token fee.\"\n\nHe smirks, like he had just delivered some hilarious punchline. The rest of the band draw their weapons, mostly primitive clubs and rusty chains. Even old, poorly fashioned weapons will still be effective, though, especially outnumbered and as weak as you are just now. And the demon, in the background, is still muttering in your head, \"Boil, beat, flay, grind, burn…\"\n\nGiving you a surprisingly pearly smile, the leader brushes his lanky hair from his dirty face. \"So what say you, traveler? Turn out your pockets and we'll let you through.\"\n*choice\n\t#There's no way around it, and you don't want to anger these people. It's not like you have much left in your pockets, anyway.\n\t\t*set resolve %-5 \n\t\t*set cunning %+5 \n\t\tSighing, you respond\n\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t*label am \n\t\t\tamicably, \"I hope things can end well for both of us, Illil.\"\n\t\t\t*goto amm \n\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\tcoldly, \"Fine.\"\n\t\t\t*goto amm \n\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\tresignedly, \"I suppose there is nothing else for me to do.\"\n\t\t\t*goto amm \n\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\tbrusquely, \"Just keep your word.\"\n\t\t\t*goto amm \n\t\t*else \n\t\t\t*goto am \n\t\t*label amm \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\tGrinning, he announces grandly, \"A wise choice, my friend.\"\n\t\t*goto now\n\t\t\t\t\n\t*selectable_if (cunning > 64) #Even in your battered and filthy state, it might be possible to persuade them that you're a person of title and not to be trifled with.\n\t\t*set cunning %+5 \n\t\t*set health -1\n\t\tStanding up straight, you say, \"My good man, I am a bit embarrassed to admit it, but I am actually a noble from Lorden. I am traveling to visit my family in Quader. I am in this pitiful state because my caravan was attacked by bandits some way back. Surely, it wouldn't be a wise decision to rob someone of my stature? You don't want your own heads to roll, as theirs will, do you?\"\n\t\t*goto grin\n\t\t\t\t\n\t*selectable_if (charisma > 64) #Maybe they'll let you go if you promise them treasure in the future.\n\t\t*set health -1 \n\t\t*set charisma %+5 \n\t\tYou clear your throat and straighten your shoulders. \"Illil, I have a proposition for you. Surely you must notice that I'm not exactly in my…er, finest attire. Right now, I'm running on hard times, but I can assure you that I've got a rather large shipment of coin coming into Quader. That's actually why I was heading there. If you just give me a few days, I can pay your dues.\"\n\t\t*label grin\n\t\t\t\t\t\t\t\t\n\t\tThe grin dropping from his face, Illil snaps his fingers, his face twisted with anger. \"Wrong answer. You think you're going to trick me? Not likely!\"\n\t\t\t\t\t\t\t\t\n\t\tLunging forward, a gangling thug with half a beard slams his club into your stomach. He isn't very strong, and the weapon has seen better days, but right now you're almost helpless. Crying out, you double over, collapsing to your knees and clutching your stomach, grimacing in pain. \n\t\t\n\t\t${boggart} is\n\t\t*if relationship > 49\n\t\t\tabout to bite the attacker,\n\t\t*if relationship \u003c 50\n\t\t\tinching away, looking to escape,\n\t\tbut Illil points a stern finger at him. \"Stay where you are, imp!\" He steps close to you and stares into your eyes. \"Maybe you'll think differently about trying to lie to me again…if you get a next time. Now, hoist\n\t\t*if female\n\t\t\ther\n\t\t*if male\n\t\t\thim\n\t\tup so we can see what there is to see.\"\n\t\t\t\t\t\t\t\t\n\t\tGrabbing you roughly, a couple of the criminals drag you to your feet.\n\t\t*goto now\n\t\t\t\t\n\t*selectable_if (stealth > 64) #This is idiotic, and you're going to take the first opportunity to escape.\n\t\t*set health -1\n\t\t*set stealth %+5 \n\t\tYou nod slowly, swaying a little. \"Of course. Just give me a moment.\"\n\t\t\t\t\t\t\t\t\n\t\tYou slowly rummage in your pockets, looking around for any holes in the outlaws' \"formation.\" Seeing a space between two thugs, you suddenly dash forward. Taking them by surprise, you just manage to slip past them. Looking around, you\n\t\t*if relationship > 49\n\t\t\tyell, \"${boggart}, run!\"\n\t\t*if relationship \u003c 50\n\t\t\tsee ${boggart} making to sneak away while he has the opportunity.\n\t\t\t\t\t\t\t\t\n\t\tSnarling, Illil commands ${boggart}, \"Stay there, imp!\" After a brief pause, he adds, \"Stop\n\t\t*if female\n\t\t\ther,\n\t\t*if male\n\t\t\thim,\n\t\tyou idiots!\"\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\tBefore you can even get out of the clearing, a rusty chain wraps around your ankles and you trip, grinding your face into the dirt. You spit out blood as a couple of the outlaws grab you, hoisting you roughly to your feet.\n\t\t\t\t\t\t\t\t\n\t\tThe criminals drag you back toward Illil. He hisses, \"If you know what's good for you, you won't do that next time…if you get a next time.\" \n\t\t\n\t\tYou glare defiantly in response.\n\t\t*goto now\n\t\t\t\t\n\t*selectable_if ((resolve > 64) and (compassionate \u003c 50)) #These outlaws don't exactly look like professionals. Maybe you can intimidate them.\n\t\t*set health -1\n\t\t*set resolve %+5 \n\t\tFlexing your fingers, you glare at the bandit and bare your teeth. \"Run away now if you value your head on your shoulders, little man. I've torn lesser beings to pieces in a heartbeat. The only reason I haven't destroyed all of you already is because you're a pathetic waste of my time. So move. Now!\"\n\t\t\t\t\t\t\t\t\n\t\t${boggart} nods emphatically, hissing loudly and flaring his wings for emphasis. Several of the thugs fidget nervously, one of them even inching away from the boggart. Illil just scoffs at you. \"Oy! Someone teach this fool a lesson ${dhe} won't forget!\"\n\t\t\t\t\t\t\t\t\n\t\tExchanging wide-eyed glances with the other thugs, one of them, a pot-bellied middle aged man, says, \"But, boss…what if that vagrant is serious?\"\n\t\t\t\t\t\t\t\t\n\t\tIllil spits at the bandits, then turns toward you. He raises his arm, slapping you hard across the face. It stings, and the force of the blow sends you a step back. ${boggart} is\n\t\t*if relationship > 49\n\t\t\tabout to bite the attacker,\n\t\t*if relationship \u003c 50\n\t\t\tmoving away, ready to escape,\n\t\tbut Illil points a stern finger at the boggart. \"Stay where you are, imp!\"\n\t\t\t\t\t\t\t\t\n\t\tYou glare at the leader, but you can't move. The demon is still tormenting you verbally, saying, \"Die, rot, crumble, disappear…\" and you are totally exhausted. Your body threatens to shut down any second.\n\n\t\tLaughing cruelly, he says, \"That's what I thought.\" The other thugs start to chuckle, albeit a little nervously, and they close in around you.\n\t\t*goto now\n\t\t\n*label now\n*page_break \nRunning his dirty hand across a thin cheek covered in stubble, Illil says grimly, \"Now, to business.\"\n\nHe raises his right hand in front of you and holds perfectly still. Suddenly, the ring he wears starts to glow, bathing you in a verdant light that winds around your body. Nothing happens for a moment. Then you feel a tingling sensation, and the few belongings you still have take on a yellow light. \n\nYour teleportation rune,\n*if lions\n\tRing of Lions,\n*if smart\n\tRing of Owls,\n*if persuasion\n\tRing of Dragonflies,\n*if shadows\n\tRing of Spiders,\n*if mythril\n\tmythril armor,\nblood charm, and demon bestiary all light up like a beacon, even beneath your clothes. His eyes shining, Illil says, \"This is unbelievable! This vagrant is practically holding a fortune! Hold ${dhim} down while I search ${dhim}!\"\n\nFive of the criminals push forward, shoving you to the ground. They pin your arms and legs, and your weak struggles are completely ineffective. Smiling greedily, Illil steps forward and grabs a fistful of your robe. He tears it roughly and searches you, pulling out your Demon Book, rune, and everything else of value.\n*if mythril\n\tThen the thugs force you into a sitting position and Illil strips you of your mythril armor. They shove you back onto the ground and then step away. Their leader stands beside them, his hands full of your possessions.\n\t\n*page_break \n\nHis jaw slackens and he stares at you in disbelief. \"My, my, this is my lucky day! You do have a fortune…. Well, I do, now, actually,\" he laughs.\n\nHanding over your items to one of his gang members, he begins to leaf through your Demon Book of Names. Frowning, he mutters, \"I can't understand a word of this. What is this ugly language, trollish?\" He snaps it shut and then takes a closer look at the cover, embossed with the symbol of the demon hunters. Gripping the book so tightly that his knuckles turn white, he shakes in fury.\n\nHe tosses the bestiary to the ground. \"A demon ${hunter}! That changes everything, now, doesn't it? How about this? I'm upping your toll. To pass through, you're going to have to surrender your little imp to us…as a slave!\"\n\nYour apprentice shrieks and tries to fly away but one of the outlaws grabs him, holding him tightly with both hands. The boggart struggles feebly, but the man is several times his size. ${boggart} looks up at you, eyes terrified and pleading. These bandits already stole your equipment, the tools that let you function as a hunter. Now, they have your apprentice too.\n*if relationship \u003c 50\n\tThat's as much his own fault, though, for not taking to the air the moment he had the chance.\n*choice\n\t#You catch ${boggart}'s eye and say, in a carefully monotone voice, \"I guess I have no other choice.\"\n\t\t*set stealth %+5 \n\t\t*set compassionate %+5\n\t\t\"Wonderful!\" Illil answers, laughing shrilly. \"Bag the imp, boys.\"\n\t\t\t\t\t\t\t\t\n\t\t${boggart} doesn't even struggle. He tries to look brave but whimpers quietly, tears streaming down his cheeks. Before you can say anything else to him, the criminals quickly stuff him into a sack, and tie it shut.\n\t\t*goto look\n\t\t\t\t\t\t\t\t\n\t*selectable_if (relationship > 49) #You can't abandon your apprentice. You're just going to have to fight.\n\t\t*set resolve %+5\n\t\t*set relationship %+5\n\t\t*set compassionate %+5\n\t\t*set altruism %+5  \n\t\t*set health -1\n\t\tShaking your head, you say firmly, \"I will never let them take you while I'm still around, ${boggart}.\"\n\t\t\t\t\t\t\t\t\n\t\tBefore he can react, you punch one of the outlaws in the jaw, snatching his weapon from his hands as he staggers back. Another one of the criminals darts forward, but you crack him over the head with your club. He collapses, screaming. Illil shouts over the din, \"Kill this fool!\" \n\t\t*goto roar\n\n\t#You shrug your shoulders, saying, \"Fine, take him. He's more trouble than he's worth, you'll see.\"\n\t\t*set compassionate %-5\n\t\t*set altruism %-5\n\t\t*set relationship %-10\n\t\tIllil laughs shrilly. \"Wonderful! Bag the imp, boys.\"\n\t\t\t\t\t\t\t\t\n\t\tShrieking in fury and despair, ${boggart} bites down onto his captor's hand, viciously scratching at him with his claws and teeth. As your apprentice lashes out with his scorpion tail, the bandit shrieks and releases him, stumbling away. The man staggers, clutching at the swollen spot where the boggart poisoned him.\n\n\t\t${boggart} flaps his wings desperately, but one of the men catches his ankle. Two others are on him in moments, and one quickly wraps his arm in thick cloth and grabs ${boggart}'s tail. The fight is short-lived. The bandits stuff him into a sack and tie it shut, then bang it against the ground to stop his struggling. After that, there's no more movement, but you can hear the sound of weeping from inside. \n\t\t*label look\n\t\t\n\t\tThe outlaw leader looks at you and just laughs. \"Now, boys, kill this idiot!\"\n\t\t*label roar\n\t\t\t\t\t\t\t\t\n\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t*label h \n\t\t\tHoping for the best,\n\t\t\t*goto hh \n\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\tNarrowing your eyes,\n\t\t\t*goto hh \n\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\tKnowing defeat is inevitable,\n\t\t\t*goto hh \n\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\tRoaring in anger,\n\t\t\t*goto hh \n\t\t*else \n\t\t\t*goto h \n\t\t*label hh \n\t\tyou lunge for him. \n\t\t\n\t\t*page_break \n\t\tThree of the men jump you, and a club smashes into your knee, crushing the kneecap. You collapse, propping yourself up with your good leg, but another criminal approaches from behind you. He brings a chain down hard on your back, knocking you down into the dust.\n\t\t\n\t\tYou try to get up, but your body refuses to cooperate. You can only lay there in helpless agony as the thugs continue to beat you, jeering and yelling insults. You can hear ${boggart} screaming desperately from inside the bag, tossed carelessly aside. More than once you hear the unmistakable break of a bone, and sticky blood coats your tattered robes. \n\t\t\n\t\tSquinting through your swelling eyes, you are certain that death has finally come. One last thought crosses your mind.\n\t\t*choice\n\t\t\t*selectable_if (relationship > 49) #Your time may be up, but ${boggart} doesn't deserve this kind of fate.\n\t\t\t\t*set relationship %+5\n\t\t\t\t*set compassionate %+5\n\t\t\t\tHe has always been a loyal companion, and you might have perished long ago if not for him. Now, he'll face slavery or worse. He will never grow up to know a proper adulthood, and there's nothing you can do to save him. Mustering your last ounce of strength, you mutter through swollen lips, \"${boggart}….\"\n\t\t\t\t*goto but\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t#You have failed. The demon Mendax will be free to wreak chaos and destruction as he pleases.\n\t\t\t\t*set altruism %+5\n\t\t\t\t*set resolve %+5\n\t\t\t\tYou did everything you could, but you have lost the battle. Melithar the wizard, the only one who might be able to defeat the demon, was so close. You were so close. It doesn't matter now, though, because he won't know until it's too late. As the bandits' blows rain down, you mumble, disoriented, \"Wait, you don't know what you're doing….\"\n\t\t\t\t*goto but\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t#You can't believe this is happening! You don't want to die!\n\t\t\t\t*set resolve %-5 \n\t\t\t\t*set charisma %+5 \n\t\t\t\tThis is so pathetic. You've faced and defeated so many enemies and now you're going to die. The vampire didn't kill you; the crazy assassin witches didn't kill you. It wasn't even the goblin. No, you'll die by the hands of some half-witted, half-baked little bandit tribe. As the world goes black, you mutter, \"No….\"\n\t\t\t\t*label but\n\n\t\t\t\tYour protests fall on deaf ears, of course. You feel the strength leaving your body, when suddenly a bolt of lightning hurtles into one of the thugs. He tumbles away, smoke wafting from his body. The bandits yell furiously and rush away from you, looking around for the source of the attack. Through swollen eyes, you look up just in time to see three people cresting the hill.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\tThe scene is blurry, but you can just make them out as they race down the hill. There is a dark-skinned, bearded man holding a sword, and another man with long orange hair in blue robes. Behind them is a slim female with dark hair and a white tunic.  \n\t\t\t\t\n\t\t\t\tYour vision is grey, and lights flash in front of your eyes. Through the haze, you hear Illil growl, \"It's those blasted high-and-mighty mercenaries again. Take 'em down, boys!\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\tThen, everything fades to black.\n\t\t\t\t\n*page_break Confusion….\n\n\"Do you fear me, demon ${hunter}?\" a booming, gravely voice echoes across the empty, shadowed expanse where you levitate, beaten and battered as you had been just moments before.\n*fake_choice\n\t#\"Not in the slightest,\" you cry out with as much conviction as you can muster.\n\t\t*set resolve %+5\n\t\tMendax laughs, the sound rebounding off invisible walls. \"Ha, then you're even more deceived than I thought. I will show you true fear!\"\n\t\t\t\t\n\t#\"To not fear you would be foolish,\" you say stoically.\n\t\t*set cunning %+5\n\t\tThe Master chuckles mirthlessly. \"Sensible, for a witless human. Still, you do not fear me enough. No, not yet.\"\n\t\t\t\t\n\t#\"That doesn't matter, demon. You'll be gone from this world soon enough,\" you say matter of factly.\n\t\t*set compassionate %+5\n\t\tHe laughs, a shrill, joyless, and mocking sound. \"Oh, little human?! And who will send me away, that pompous old wizard? I will suck your soul dry before you ever reach him. He'll make a fine dessert, though, now that I think of it! But I'm getting ahead of myself…where was I? Ah, yes. Fear!\"\n\t\t\t\t\t\t\t\t\nIn an instant, your surroundings change. You're drowning in a lake of blood and gore that pushes at you, squirming and squelching. You gag, only to be pulled down into the depths of the crimson liquid. A warm, nauseous sensation hits you. Gristle, ligaments, and tattered flesh slither across every inch of your body. You open your mouth involuntarily, only to have it flooded with wriggling muscles and tissues.\n\nBlinded by the rotting liquid, you thrash helplessly in the mire. Finally surfacing, you choke on the metallic taste of the sea of blood. A current pushes you to shore, and you crawl to your knees, panting. Suddenly, a dull crimson light illuminates the cavern. You are surrounded by a circle of stakes, enveloped in the smell of death.\n\nImpaled on these stakes are rotting, severed heads. The first you see is ${boggart}'s, his eyes bulging in a dead stare. Mayor Eldon's head is beside it, and then a sea of them—Gretchin, Gretta, Garnet, Hildred, Gertrude, and others that you hardly recognize. Finally, you see your own mangled head, staring blankly back at you.\n*page_break \n\nYou sit upright in your bed, screaming, only to have a crippling, ripping pain shoot through your body. Slumping back down, you cough and gasp for breath, mucus building up in your throat. A woman's pale face appears above you, worry creasing her forehead. It looks a little like the woman who appeared when the bandits were attacking, though you're so disorientated that you can hardly tell…. \"Here,\" she says, gently pressing a small glass to your lips. \"It will help you sleep.\"\n\nThe contents smell like muddy water and bitter herbs, but you drink it half-consciously. A moment later, you sink into a peaceful, dreamless sleep. You wake up, eternities later. Peeling your eyes open, you blink away the grittiness in the dim sunlight, wondering where you are. Your head is pounding, but you manage to look around the room.\n\nIt's very clean, and the walls are painted a soothing white. There are shelves full of herbal remedies and bottles of tinctures. On your bedside table sits a bowl of pumpkin seeds and a loaf of bread, and a basin of fresh water. When you try to sit up, you realize for the first time that bandages and sheets are restricting your movement. You try to remember what happened, and then, suddenly, everything comes rushing back.\n*fake_choice\n\t#Panicking, you yell, \"${boggart}!\"\n\t\t*set relationship %+5\n\t\t*set compassionate %+5\n\t\t*set lorelle %+5\n\t\t*set yell true  \n\t\t*if relationship > 49\n\t\t\tHopping over from a table somewhere behind the bed, he lands on the foot-board and beams at you. \"I'm so glad you're awake, ${name}!\"\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\tYou smile, then wince. That stings. \"And I'm glad you're okay, too. I didn't know if I'd see you again.\"\n\t\t*if relationship \u003c 50\n\t\t\tPeaking over from a table over to your side, he says plainly, \"Here. I'm glad you didn't croak.\" \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\tFrowning, you try to turn your neck toward him, but it's too painful, and your bandages are pulling at your tender skin. \"You're your usual charming self, I see,\" you mutter.\n\t\t\t\t\n\t#You lean back and breathe deeply, taking in your surroundings.\n\t\t*set stealth %+5\n\t\tThe herbalist, or whoever tidies up around here, must work hard. The room is immaculate. Although the furniture and the room itself are made of simple materials, everything is so clean that it practically shines. The herbs and tinctures are in orderly rows, neatly labeled in a delicate hand.\n\t\t\t\t\t\t\t\t\n\t\tBest of all, the sunlight spilling through the curtains gives you a comfortable warmth. Songbirds are even singing. If you're to finally have a rest, this is definitely the place for it.\n\t\t\t\t\n\t#No matter how you feel, you need to leave at once. Finding Melithar and stopping that demon is your only priority.\n\t\t*set resolve %+5\n\t\tSitting up painfully, you gasp as the bandages pull at your skin. Your body protests even simple movements, and you notice that blood has started to seep under one of the bandages. Apparently you've just opened one of your more serious wounds…that's not good. Gritting your teeth, you prop yourself against the bedpost.\n\t\t\t\t\t\t\t\t\n\t\tYou look out the window and see a garden full of sunshine, but no clues as to where you are. Quader was the nearest village to where you were attacked. On the other hand, you never know where you may have ended up, especially with your excellent luck. You sense that if you try to walk, you'll open up more than just one wound. You grit your teeth, determined to figure out a way around your situation.\n\t\t\t\t\t\t\t\t\nJust then, the herbalist enters the room with a stack of bandages in her arms. \n*image lorelle.jpg \nSeeing you, she says, \"Oh! I hadn't realized you were awake, ${name}. I'm glad to see you're doing better.\"\n\n*page_break \n\n${boggart} told her your name, you suppose.\n*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t*label s \n\tSmiling back, you say, \"Thank you. That's very kind.\"\n\t*goto ss \n*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\tNodding, you reply simply, \"Thank you.\"\n\t*goto ss \n*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\tNodding, you comment, \"Thanks to your expertise, I'm sure.\"\n\t*goto ss \n*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\tShifting to a more comfortable position on the bed, you say, \"Yes, thank you.\"\n\t*goto ss \n*else \n\t*goto ss \n*label ss \n\n*if not(yell)\n\tHearing your voices, ${boggart} flutters over from the other part of the room, landing on\n\t*if relationship > 49\n\t\tthe bed just beside your pillow. He nuzzles his head against you, careful not to press too hard. Although it hurts a little bit, you return the gesture, glad for his company.\n\t*if relationship \u003c 50 \n\t\tthe foot-board of the bed. Glancing you over, he says quietly, \"${name}. Glad you didn't croak.\"\n\t\t\nLeaning forward, the healer strokes ${boggart}'s antennas, saying, \"${boggart}'s been quite the helper around here. Not with the healing of course, but he's certainly a good chef, and that was a lot of help since I was working almost all day. He's a charmer, too!\"   \n\n*page_break          \n\nThe boggart giggles, running his antennas across her hand. The woman pauses, setting the pile of bandages onto the table beside you and smoothing over the wrinkles on her tunic. She is about average height, slim but very healthy looking. Her black hair is braided into simple ponytails, and her blue eyes flash thoughtfully, contrasting with her pale, smooth complexion.\n\nMost likely, she spends the majority of her time here in the infirmary. The way she holds herself seems honest but somewhat reserved. She wears no makeup, and appears to be somewhere in her twenties. She looks at you thoughtfully, and then exclaims, \"Oh, but you don't even know my name! I'm Lorelle, and as you see here, I am a healer.\" \n*fake_choice\n\t#There's something about this healer that you find very attractive, and you smile warmly at her.\n\t\t*set lorelle %+10\n\t\t*if warlock\n\t\t\t*set warlock false\n\t\t\t*set bi true\n\t\tShe smiles back but blushes a little, quickly changing the subject.\n\t\t\t\t\t\t\t\t\n\t#She seems nice, and her medical equipment is extremely intriguing.\n\t\t*set cunning %+5\n\t\t*set lorelle %+5\n\t\tYou eye the various pouches and vials attached to her belt and tunic. \"Would you tell me more about the herbs you carry with you? I find the healing arts fascinating.\"\n\t\t\t\t\t\t\t\t\n\t\tShe replies, \"Absolutely! It's always nice to find someone who's curious about the finer details of the profession.\" Perching on the edge of your bed, she explains, \"Most of the things I carry are herbal remedies, minor potions, and healing ointment, as well as bandages and wraps for sprains, things like that.\"\n\t\t\t\t\t\t\t\t\n\t\tHer eyes darken. \"You needed much more than that, but we were able to bring you here before you…well, let's just say I'm glad Ceylar was able to carry you here quickly enough, with the aid of his magics.\"\n\t\t\t\t\t\t\t\t\n\t#\"Pleasure,\" you grunt.\n\t\t*set lorelle %-5\n\t\tYou don't know much about her, but she seems to be a very skilled healer.\n\t\t\n\t#\"Hello,\" you say plainly. You don't particularly feel like socializing at a time like this.\n\t\t*set lorelle %-5 \n\t\t*set stealth %+5 \n\t\tShe nods at you in reply.\n\nLorelle bends over the bed. \"${name}, I need to change some of these bandages now. It might be uncomfortable, or even a little painful, but I'll do my best to be as gentle as I can.\" \n\nShe sets a few bandages on the table beside your bed. \"I'm sure you have a lot of questions for me, so why don't you ask them while I'm working? Your apprentice has told me a little about the two of you, and the misfortune that led up to this point, but we can get to that later. I admit, this whole demon business had me scared half to death, but from what I've been told, we have at least some time.\"\n\n*if altruism > 64\n\t*set lorelle %+5\n*if altruism \u003c 50\n\t*set lorelle %-5\n*if compassionate > 64\n\t*set lorelle %+5\n*if compassionate \u003c 50\n\t*set lorelle %-5\n*if charisma > 64\n\t*set lorelle %+5\n*if cunning > 64\n\t*set lorelle %+5\n*if cunning \u003c 65 \n\t*set lorelle %-5\n*if relationship > 64\n\t*set lorelle %+5   \n*if relationship \u003c 50 \n\t*set lorelle %-5\nShe's very polite, of course, but you suspect that she\n*if lorelle \u003c 49\n\tdoesn't really like you much, for some reason.\n*if lorelle > 54 \n\tlikes you very much already.\n\t*goto lorelle\nisn't certain quite what to think about you.\n*label lorelle\nShe's right, as well. You do have questions for her. She begins to gently pull at the bandage on your chest, and you wince and then decide it's time for something that will distract you from the pain. \n*label ask\n*hide_reuse \n*choice\n\t#\"Where am I?\"\n\t\t\t\n\t\tShe finishes examining your bandage, then moves to the foot of the bed. Gently undoing the bandage around your ankle, which looks very swollen and purple, the healer applies a pungent ointment before replacing the old bandage with a new one. \n\t\t\n\t\tAs she ties it gently but securely to your skin, she replies, \"We're in the village of Quader. It's not quite a seat of commerce, but the citizens are pleasant enough. It's near Melithar's Mountain, if a landmark would be helpful.\"\n\t\t\t\t\t\t\t\t\n\t\tThat's fantastic news. Despite everything that happened, you have somehow ended up just a day's travel from the mountain, and from Melithar himself. Even though you suspect it will be a few days before you can travel again, you should be able to reach Melithar before Mendax catches up to you, or possibly even send a messenger right away. \n\t\t\n\t\tEither way, the name Quader is certainly familiar. After all, it's where you first encountered Venefira and Hestia some years ago.\n\t\t*choice\n\t\t\t#\"Ah, yes, Quader,\" you say. \"I ran across two witch assassins here many years ago, and I had the fortune of battling them just a few days earlier. Such heart-warming memories!\"\n\t\t\t\t*set charisma %+5\n\t\t\t\t*set lorelle %+5\n\t\t\t\tLorelle laughs, a quiet but sincere and merry sound. \"Well, demon ${hunter}, I promise you'll find nothing but pleasant memories here.\" You return her smile, and she walks over to the table to grab another bandage, giving you time for another question.\n\t\t\t\t*goto ask\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t#\"Some time ago, when I had just become a demon ${hunter}, I had the misfortune of stumbling across two mercenaries from Quadar, and just days ago I met them again. Strange, isn't it, that fortune would bring me here again as I face an enemy worse than I had ever dreamed?\"\n\t\t\t\t*set stealth %+5\n\t\t\t\t*set lorelle %+5\n\t\t\t\tLorelle looks up from her work, studying you carefully. \"It is curious, demon ${hunter}. You're thoughtful, and I like that. Maybe in the future, we could talk more about these things, fortune, and destiny.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\tYou nod, saying, \"Yes, I would like that.\" Finishing up the bandage on your ankle, she walks over to the table to grab another one. You think of something else to ask as she approaches with the second bandage.\n\t\t\t\t*goto ask\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t#Shaking your head, you mutter bitterly, \"This isn't a place I had hoped to revisit. Two witches who tried to murder me during my journey also met me here at the beginning of my career. Back then, this village was nothing more than a network for criminals.\"\n\t\t\t\t*set resolve %+5\n\t\t\t\t*set lorelle %-5\n\t\t\t\tLorelle looks down at the bandage in her hands. \"I'm sorry to hear that. It may give you some consolation to hear that, in recent years, Ceylar and Vidar, with some help from me, have managed to start a change here in Quader. Those two are the magician and warrior who helped you earlier, by the way.\n\t\t\t\t\n\t\t\t\t\"There are still some outlaws, as you unfortunately saw for yourself, but things have improved. I hope you'll have the chance to see some of the improvements, too.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\tBy now, the healer has finished wrapping the bandage around your ankle. She rises and moves toward the table to grab another one. There is a brief silence, and you have the chance to ask another question.\n\t\t\t\t*goto ask\n\t\t\t\t\n\t#\"What happened when you rescued me, exactly?\"\n\t\t\n\t\tTaking a moment to gather her thoughts, Lorelle loosens one of the ties on your leg, adjusting the splint slightly. Then, she replaces the old bandage, covering it with a new one and tying it back firmly but gently. Apparently, one of the breaks you heard before was your leg. It throbs, but the pain is dull rather than intense. \n\t\t\t\n\t\tWhatever salve is on that part of your shin must be a very effective pain suppressant. Finally, the healer replies, \"Well, you were injured so horribly that I was afraid of what might happen to you. But Vidar, the warrior, chased off the bandits—they didn't much like the sight of his sword—and Ceylar, the magician, and I were able to bring you and ${boggart} here safely.\"\n\t\t\n\t\t*page_break \n\n\t\t\"I set to work right away. It took a lot of time, herbs, and magic, but we managed to help you pull through.\" She pauses, taking a deep breath. \"As for the outlaws, Vidar defeated most of them, but a few escaped. Unfortunately, Illil was one of them. The ones he captured have been imprisoned, and he and Ceylar plan to track down the others as soon as possible.\n\t\t\t\t\t\t\t\t\n\t\t\"Illil also abandoned a sack full of magical items, and ${boggart} confirmed they belong to you. We have them waiting in the chest for whenever you're ready,\" she explains, pointing to an old, chipped trunk in the corner of the room.\n\t\t*choice\n\t\t\t#You sigh, feeling relieved. \"Good,\" you reply, \"I was worried my belongings had all been taken.\"\n\t\t\t\t*set altruism %-5 \n\t\t\t\t*set lorelle %-5 \n\t\t\t\tThe healer nods and says, \"Well, you don't have to worry about that. They're all safe and sound.\"\n\t\t\t\t\n\t\t\t\tYou raise your eyebrows and reply, \"Some of my things are extremely valuable, and others shouldn't be floating around where they could fall into the hands of the wrong people.\"\n\t\t\t\t\n\t\t\t\tShe nods understandingly and finishes tying the splint back into place, and you have a moment to ask her something else.\t\n\t\t\t\t*goto ask \n\t\t\t\n\t\t\t#You say sincerely, \"I can't thank you enough for everything you've done for me. Without you and the others, I would have died back there.\"\n\t\t\t\t*set lorelle %+5\n\t\t\t\t*set charisma %+5\n\t\t\t\tShe smiles down at you, her blue eyes sparkling. \"What kind of healer would I be if I didn't heal a wounded \n\t\t\t\t*if male \n\t\t\t\t\tman?\n\t\t\t\t*if female \n\t\t\t\t\twoman?\n\t\t\t\tIt's only what any good person would have done. And, you're welcome. I'm glad I could help you. Besides, going on what I've been told, you're on a rather important mission.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t*label y \n\t\t\t\t\tYou can't help chuckling at that. \"'Rather important' is the understatement of the century.\"\n\t\t\t\t\t*goto yy \n\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t*goto nod\n\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t*label nod\n\t\t\t\t\tYou nod in agreement. Indeed, without her care, the fight against the demon might well have become completely impossible to win.\n\t\t\t\t\t*goto yy \n\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\tYou nod grimly. She's quite right, after all.\n\t\t\t\t\t*goto yy \n\t\t\t\t*else \n\t\t\t\t\t*goto y \n\t\t\t\t*label yy \n\t\t\t\tShe finishes tying the splint back into place, and you have a moment to ask her something else.\t\n\t\t\t\t*goto ask\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t#\"I'm just glad that you were able to rescue my companion,\" you say, your voice heavy with emotion.\n\t\t\t\t*set compassionate %+5\n\t\t\t\t*set altruism %+5\n\t\t\t\t*set relationship %+5\n\t\t\t\t*if relationship \u003c 55\n\t\t\t\t\t*set lorelle %+5\n\t\t\t\t\tLorelle and ${boggart} exchange glances. The healer wrinkles her eyebrows in confusion, whereas your apprentice just arches an eyebrow and looks dubious. After a moment of silence as the boggart eyes you suspiciously, Lorelle says hesitantly, \"Well, I suppose near-death experiences can put things into perspective.\"\n\t\t\t\t*if relationship > 54\n\t\t\t\t\t*set lorelle %+10\n\t\t\t\t\t${boggart} brightens up, wiggling in happiness. He almost jumps onto your shoulder but Lorelle looks at him sternly and he stops. He blinks at your bandages, looking almost embarrassed, and instead he opts to brush his antennas across your face in a sign of affection. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\tShe says, \"Anyways, it's good to see how close you two are to each other. I love that, you know. Kindness to others is a mark of good character, in my opinion.\" She finishes binding the splint back into place, and you have the opportunity to ask another question.\n\t\t\t\t*goto ask\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t#You sigh, frowning. \"It's a shame that Illil managed to get away, but I suppose it couldn't be helped.\"\n\t\t\t\t*set lorelle %-5\n\t\t\t\t*set altruism %-5\n\t\t\t\t*set resolve %+5\n\t\t\t\tShe looks away, brushing a few stray hairs off of her forehead. Her voice is quiet as she responds, \"Well, given all that happened, I think things were handled very well. But Vidar has promised me that he will track down that thug, so you needn't worry. The most important thing is that we were able to save you and your companion.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\tYou nod slowly, saying, \"Yes, and I thank you for that. I only hope I get my chance for revenge.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\tLorelle's forehead crinkles a little bit, but she only throws the old dressing into the small fire. There's a moment of silence, inviting another small discussion.\n\t\t\t\t*goto ask\n\t\t\t\t\n\t#\"What happened to ${boggart} during that fight?\"  \n\t\tThe healer glances at your apprentice, saying, \"Would you like to tell\n\t\t*if female\n\t\t\ther?\"\n\t\t*if male\n\t\t\thim?\"\n\t\t\t\t\t\t\t\t\n\t\tShaking his head, he replies, \"Nah. I was unconscious for most of the time, anyway.\"\n\t\t\t\t\t\t\t\t\n\t\tNodding, Lorelle turns to you, dipping a towel in one of the basins of water. She drops a strong-smelling tincture onto the damp towel and presses it to your forehead. \"Well, after Vidar and Ceylar rescued you from the bandits, I did a little bit of basic healing to keep you alive until we got to the infirmary. Then, Ceylar took over and began to carry you here to Quader. \n\t\t\n\t\t\"At that point, we didn't even know that ${boggart} was there. Fortunately, he had the foresight to start shrieking, and we quickly searched the glade and found him in that awful sack.\" Glancing at him with a sad smile, she continues, \"I took him in my arms and carried him with us, and soon after, we were home. To my surprise, he wasn't injured very badly.\"\n\t\t\n\t\t*page_break \n\t\t\n\t\t\"He was mainly just exhausted, starving, and a little dazed from being shaken around by those bandits. Your case was more dire. Ceylar doesn't have much experience in things like this, but he got ${boggart} settled and then helped me with you. And ${boggart}, after nearly a day of sleep and four meals' worth of food in one sitting, decided he was feeling much better.\"\n\n\t\t${boggart}'s ears perk up, and he interjects, \"${name}, there was PIE!\"\n\t\t\t\t\t\t\t\t\n\t\tLorelle looks down, masking a grin. \"Since then, he's been very helpful here in the infirmary, as I said earlier. He and Ceylar worked together to make meals for you and I, and fetched different supplies for me.\" She turns toward the little boggart. \"Anyways, I'm glad you're here with us, my new friend. You've been excellent company, and a great help.\"\n\t\t\t\t\t\t\t\t\n\t\tHe gives her a toothy grin, replying, \"If you repay me with more of those strawberry pies, we're even!\"\n\t\t\t\t\t\t\t\t\n\t\tLaughing, Lorelle takes the damp towel away from your forehead, wrings it out over a basin, and then dips it back into the warm water. She adds another few drops of some other kind of herb, one with a deep, woody scent. Leaning over, she presses the cloth carefully against your forehead and looks at you expectantly.\n\t\t*fake_choice\n\t\t\t#You grumble, \"I suppose anything is better than slaving for that monster, Illil.\"\n\t\t\t\t*set compassionate %-5\n\t\t\t\t*set relationship %-5\n\t\t\t\t*set lorelle %-5\n\t\t\t\tLorelle purses her lips, exchanging glances with ${boggart}. Hesitantly, she says, \"Yes, that wouldn't do…but what's most important is that he's here with all of us.\" Your apprentice nods decidedly, fluttering his wings in irritation.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t*selectable_if (relationship > 49) #You meet your apprentice's eyes and tell him, \"I'm glad you're safe, ${boggart}. You've stayed with me for so long, it wouldn't feel right if you weren't by my side now.\"\n\t\t\t\t*set lorelle %+5\n\t\t\t\t*set relationship %+5\n\t\t\t\t*set compassionate %+5  \n\t\t\t\t\"You too!\" ${boggart} squeaks, gently nibbling on your finger. Lorelle smiles gently at you both.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t#You nod, responding simply, \"It's good to hear that my apprentice has been helpful to you.\"\n\t\t\t\t*set relationship %+5\n\t\t\t\t*set altruism %+5\n\t\t\t\tThe healer arches her eyebrow but says nothing. ${boggart}\n\t\t\t\t*if relationship > 49\n\t\t\t\t\twiggles his tail. \"Of course I was helpful, you hulking dummy!\" He grins, his little antennae waving.\n\t\t\t\t*if relationship \u003c 50\n\t\t\t\t\tjust snorts. \"Not like you ever let me lie around,\" he retorts, turning his back to you for a moment.\n\t\tLorelle leaves the warm towel on your forehead for a moment, and tends to an injury on your neck. The moment of silence prompts another question.\n\t\t*goto ask\n\t\t\t\t\n\t#\"How long was I unconscious?\"\n\t\tPlucking a dark glass jar from a cabinet, Lorelle tells you, \"You slept for nearly three days. You seemed uncomfortable much of the time, but I think the rest was good for you. Even with all of the tinctures and herbs I gave you, your body was running on practically nothing.\" \n\t\t\n\t\tShe unscrews the jar as she speaks, drawing out several purple leaves. \"Now that you're rested, the treatments should start working a lot faster.\"\n\t\t*fake_choice\n\t\t\t#\"Three days?\" you gasp. \"I have a demon after me who wants to consume my soul, and then go destroy the world for a lark! I don't have time to just lie around!\"\n\t\t\t\t*set resolve %+5\n\t\t\t\t*set lorelle %-5\n\t\t\t\tSighing, Lorelle says, \"I hoped you wouldn't take it this way. I don't like it either, but injuries take time to heal. Demon or not, I can't do anything to make these medicines work any faster. I do promise to work as hard as I can to heal you as quickly as possible, though.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\tIt's maddening to sit here when so much is at stake, but at the moment, movement doesn't seem like an option.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t#Considering how extensive your injuries were, three days seems very moderate.\n\t\t\t\t*set lorelle %+5\n\t\t\t\t*set cunning %+5 \n\t\t\t\t\"It's almost unbelievable that you've pulled me back from the brink of death,\" you tell her. \"And now you're telling me that my recovery is going remarkably well? For that, I thank you again.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\tLorelle looks pleased. \"I'm glad that you think so. You're in excellent physical shape, and that has helped your recovery greatly. Your healing might take a little time, but I promise to have you ready to travel again as soon as possible.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\tYou nod. Here's to hoping things go more smoothly while you're here. Not that you have a reputation for smooth sailing, exactly. \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t#\"How much longer will it be until I'm fit enough to travel?\" you ask, almost afraid to hear the answer.\n\t\t\t\t*set stealth %+5\n\t\t\t\tShe tilts her head to one side thoughtfully. \"Well, it all depends on how quickly you heal, and if anything comes up during your stay here. At best, you'll only need to be here a few more days, though. You seem to heal very quickly, too.\"\n\t\t\t\t\n\t\t\t\tGrinning a little, she adds, \"Is that some demon ${hunter} secret, or just the gift of a good constitution and healthy living?\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t*label w \n\t\t\t\t\tYou wink and reply, \"It wouldn't be a secret if I told you, now would it?\"\n\t\t\t\t\t*goto ww \n\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\tYou give a small smile, responding, \"Maybe a little bit of both.\"\n\t\t\t\t\t*goto ww \n\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\tYou say good spiritedly, \"Hey, you're the expert.\"\n\t\t\t\t\t*goto ww \n\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\tStraightening out a little, you say confidently, \"Oh, I can assure you it's of my own doing.\"\n\t\t\t\t\t*goto ww \n\t\t\t\t*else \n\t\t\t\t\t*goto w \n\t\t\t\t*label ww \n\n\t\tPutting the purple leaves in a mortar, she grinds them into a fine powder and then drops them into a warm pot of oil that's sitting over the little fire. Before long, the spicy incense of the plant fills the room, clearing your sinuses and lessening the pounding in your skull. With your mind focused, you feel up for another question.\n\t\t*goto ask\n\t\t\t\t\n\t#\"Can you tell me a little more about yourself, and the two others?\"\n\t\t\"Absolutely!\" Lorelle deftly unwinds one of the bandages on your left arm.\n\t\t\t\t\t\t\t\t\n\t\t\"Vidar, Ceylar, and I have known each other for almost all our lives. We've all lived in this village since birth, and for years we've been trying to help out in this community as best we can. To be honest, it's mainly Vidar and Ceylar who go looking for the sticky situations. I do often go with them, though, just in case anyone needs my help. \n\t\t\n\t\t\"Mostly they focus on capturing outlaws and keeping the streets safe, but they've also dealt with a few goblins and trolls.\" She stares at the wall, and her voice drops. She continues softly, \"Ceylar is a really positive person, the morale-booster of the group. He's a decent cook, but where he really shines is singing and poem-writing. I hope you have the pleasure of hearing his verses sometime.\"\n\t\t\n\t\t*page_break \n\t\t\n\t\t\"He's very versatile, and his poems can be quite hilarious—or emotional, or dark—or anything you want them to be! Not to mention—er…\" She shakes her head, coughing. \"Anyways, he's a magician, and skilled in long distance attacks with his lightning, as you saw. He's not bad with a dagger, either, but mostly Vidar takes care of the combat.\"\n\t\t\t\t\t\t\t\t\n\t\t${boggart} sits down next to Lorelle on the table and crosses his legs, listening closely. Giving him a smile, Lorelle scratches his head and continues, \"As you saw before, Vidar is extremely talented with his sword, and very strong. Although, it might surprise you that he doesn't like to kill anyone. I'm glad for that, actually. As you may have guessed, I'm a pacifist. Perhaps it's not the most sensible of dispositions around here, but it's who I am.\n\t\t\t\t\t\t\t\t\n\t\t\"Anyways…Vidar is very honorable, and he always likes a good tale. So much so that he often embellishes his own to tell to others.\" She laughs, shaking her head. \"He has a temper, but don't be fooled if you ever have the time to have a good conversation with him. In the end, he really isn't as tough as he'd like everyone to think.\"\n\t\t\n\t\t*page_break \n\t\t\t\t\t\t\t\t\n\t\tTaking one of the last bandages from the table, she begins to wrap it around your arm, continuing, \"As for myself, well, I'd say I have simple tastes. Healing keeps me busy, and I believe it's a noble work. In my spare time, though, I enjoy feeding the songbirds by the forest and the ducklings and fish in the pond.\"\n\t\t\t\t\t\t\t\t\n\t\t${boggart} grins widely and bobs up and down beside her. Looking down at him, she says peacefully, \"Yes, I enjoy the company of animals perhaps the most, because they never seem to have any ulterior motives. Well, besides maybe trying to sneak the food out of my hand,\" she laughs again.\n\t\t\t\t\t\t\t\t\n\t\t${boggart} giggles, flicking his tail absent-mindedly and looking at her with a toothy smile.\n\t\t*fake_choice\n\t\t\t#You're particularly interested in Vidar. Honor and epic storytelling sound like the perfect combination.\n\t\t\t\t*set resolve %+5\n\t\t\t\t*set vidar %+5\n\t\t\t\t\"Vidar sounds like a man of many adventures,\" you observe. \"Perhaps someday, I could accompany him on one of them, once this is all over.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\"I think that's a good idea.\" The healer tightens the bandage gently and tucks the end into place. \"I'm sure there's a lot you could learn from each other, and together you would make a formidable team. Besides, you'd have Ceylar, ${boggart}, and myself for backup.\" She smiles at the boggart, and he grins back.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t#Magic and poetry? You can't wait to meet Ceylar, especially if his temperament really is as soothing as the healer says.\n\t\t\t\t*set charisma %+5\n\t\t\t\t*set ceylar %+5\n\t\t\t\t\"Ceylar's poems and songs must be a good diversion at times like these,\" you say, a vision of Rhys Falls in flames passing before your eyes unbidden.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\"Oh, yes, I agree. He's wonderful to be around, and he always knows just what to say. He's a very empathetic man. Who knows, maybe you could even compose some poetry together? I was never any good at that sort of thing, but I do enjoy listening to a good song or story.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t#Lorelle seems to be a very lovely, sincere person. Already, you can tell she cares greatly about the well-being and happiness of others.\n\t\t\t\t*set compassionate %+5\n\t\t\t\t*set lorelle %+10\n\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t*label e \n\t\t\t\t\tSmiling at her, you say, \"You speak so well of them. I have to say, I admire your kindness and dedication to helping others. Perhaps, when everything is over, we could spend more time together.\" \n\t\t\t\t\t\n\t\t\t\t\tThe healer grins back and responds, \"Oh, my. Well, we'll have to see how everything plays out, but that certainly sounds nice.\"\n\t\t\t\t\t*goto ee \n\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t*goto herbs \n\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t*label herbs \n\t\t\t\t\tGiving her a small smile, you're careful to hint vaguely, \"You know, if you wouldn't mind studying some herbology with me at a later date, that would be very welcome.\"\n\t\t\t\t\t\n\t\t\t\t\tThe healer responds excitedly, \"That does sound like fun!\"\n\t\t\t\t\t*goto ee \n\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\tYou say brusquely, \"You're a good person, Lorelle. I admire that.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\tShe smiles and replies, \"Why thank you, ${name}.\"\n\t\t\t\t\t*goto ee \n\t\t\t\t*else \n\t\t\t\t\t*goto e \n\t\t\t\t*label ee \n\n\t\t\t#These three all seem very intriguing, and you hope for an opportunity to get to know them a little more.\n\t\t\t\t*set ceylar %+5\n\t\t\t\t*set lorelle %+5\n\t\t\t\t*set ceylar %+5\n\t\t\t\tPushing yourself up a little bit, you comment, \"You three sound like quite the team. Perhaps after this whole demon matter has been resolved, all of us could go on an adventure of our own? There is never a shortage of journeys to make, and I would like to make one with you and your companions.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\tThe healer's lip twitches, but then she smiles at you. \"Perhaps one a little less perilous than the one you've found for yourself this time.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t#Well, some of that information might be useful. What's most important is that you accomplish what you set out to do, and maybe they could be a means to fulfilling that end. Lorelle already has been, in fact.\n\t\t\t\t*set altruism %-5\n\t\t\t\t*set resolve %+5\n\t\t\t\tYou nod, pretending to think about what the healer has said. Internally, however, you're thinking about the demon, and the days ahead of you. Glancing at you curiously, Lorelle asks, \"Is something wrong?\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\tWaving it away, you say, \"Oh, no, I was just thinking.\"\n\t\t\t\t\n\t\t\t#You're sure they're all fine people, but you have more important things to worry about, like Mendax, than making new friendships.\n\t\t\t\t*set lorelle %-5 \n\t\t\t\t*set stealth %+5 \n\t\t\t\tYou nod and simply reply with a distant look, \"Interesting.\"\n\t\t\t\t\n\t\t\t\tThe healer nods slowly herself and looks around awkwardly.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\tLorelle finishes binding your arm, neatly tucking away the end of the bandage. The moment of silence invites another small discussion.\n\t\t*goto ask\n\t\t\t\t\t\t\t\t\n\t#You have nothing more to ask.\n\t\tShe looks at you thoughtfully. \"Unfortunately, you broke three ribs and your sternum is badly bruised. I have a potion that speeds knitting bones, though, so they will heal much more quickly than would be possible otherwise.\"\n\t\t\t\t\t\t\t\t\n\t\tShe explains, \"If you can sit up, I'm going to have to take the poultices from your chest and midsection, and rub this potion in above the broken bones. I would have applied it earlier, but I had to add some more ingredients to the potion before it was ready. It's a bit smelly, I'm afraid.\"\n\t\t*choice\n\t\t\t#\"Yes, of course that's fine,\" you say, excited. You shift so you can sit up straighter in the bed.\n\t\t\t\t*set lorelle %+10\n\t\t\t\t*set charisma %+5\n\t\t\t\t*set eager true\n\t\t\t\t\"Very good,\" she says professionally, folding back the long sleeves of her tunic.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t*goto prop\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t#You shrug lightly, saying, \"If it will make me heal quicker, I can't complain.\"\n\t\t\t\t*set lorelle %+5\n\t\t\t\t*set cunning %+5\n\t\t\t\tShe nods, folding back the long sleeves of her tunic. \"Oh, good. This should go smoothly, then.\"\n\t\t\t\t*goto prop\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t#Pursing your lips, you say, \"Is it really necessary?\"\n\t\t\t\t*set lorelle %-5\n\t\t\t\t*set resolve %+5\n\t\t\t\t*set not true\n\t\t\t\t\"I'm sorry, ${name},\" she says sincerely. \"Without this, it would normally take weeks for your ribs to heal properly, and I don't think you have enough time for that. Best to just sit and bear it, if you want to heal in any kind of a timely fashion.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\tSighing, you grumble, \"Fine, just make it quick.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\tNodding silently, the healer begins, her face set and professional.\n\t\t\t\t*label prop\n\t\t\t\tAfter you've propped yourself up into a proper sitting position, which, you admit, is harder than it sounds, Lorelle carefully unbinds your chest and tosses the stained cloths into the fire. She rubs in the smelly green cream, and ${boggart} makes an exaggerated disgusted face.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t*if eager \n\t\t\t\t\tThe cream numbs where it touches, but you can still feel the softness and warmth of her fingers as they brush up against your skin.\n\t\t\t\tA few moments later, she finishes, putting the jar of cream away and sighing. \"I need more bandages, I think. Excuse me for just a moment, and try to stay still,\" she tells you, putting the empty jar into a basin to be washed later.\n\n*page_break \nShe leaves the room, and immediately the potion starts itching terribly. You wonder exactly how bad of an idea it would be to scratch when a little bird suddenly flies in, perching on the windowsill and looking at you curiously. ${boggart} perks up, a predatory glint in his purple eyes. He doesn't make any moves to attack the bird, though. \n\nThe bird has striking green plumage ending in yellow tail feathers, with a little crest of feathers on his head that hang loosely over his back. The bird begins to tweet a complex melody, hopping up and down and looking at you expectantly.\n*fake_choice\n\t#You shoo the bird away tiredly.\n\t\t*set compassionate %-5\n\t\t*set lorelle %-5\n\t\tThe bird ignores you and hops onto one of the tables, a safe distance from the boggart. You turn away, but the bird just tilts his head to the side, giving you a look that could almost be disbelief.\n\t\t\t\t\t\t\t\t\n\t\tWhen Lorelle returns, she sees the bird and tells you, \"Oh, you don't have to worry about Melody. He comes here every day.\"\n\t\t\t\t\t\t\t\t\n\t\tArching your eyebrows, you ask, \"You named it, then?\"\n\t\t\t\t\t\t\t\t\n\t\tNodding fervently, she replies, \"Of course! He's got quite the personality, though I can't say I'm surprised, since fechinnes are remarkably social. It's in their nature.\" Folding her arms across her chest, she continues, \"Every evening, he comes over to visit me, and I like to feed him those pumpkin seeds on the table. He's very friendly, and his songs are so beautiful.\"\n\t\t\t\t\t\t\t\t\n\t\tGetting up, she walks over to Melody, taking a seed and holding it out in her hand. Tweeting happily, the fechinne hops onto her wrist, plucking the food from her palm. Giving you one last distasteful look, the bird leaps out of the window, flying away with his snack. Sighing, Lorelle murmurs, \"It looks like something upset him…I wonder what? Well, I'm sure he'll be back tomorrow.\"\n\t\t\t\t\n\t#You feed the exotic bird some pumpkin seeds.\n\t\t*set lorelle %+10\n\t\t*set cunning %+5\n\t\t*set charisma %+5\n\t\tTaking a couple of pumpkin seeds from the bowl, you hold them out to the little songbird. He hops forward, inspecting the food. Chirping excitedly, he quickly gobbles them down and then gently nips your hand, asking for more.\n\t\t\t\t\t\t\t\t\n\t\tYou're about to take more from the bowl, when Lorelle returns with an armful of fresh bandages. Seeing the bird perched in your palm, she clasps her hands together, saying, \"Oh how wonderful! I was wondering when that little fechinne was going to visit.\"\n\t\t\t\t\t\t\t\t\n\t\tShe comes over and perches on the chair beside your bed. \"Every evening, Melody comes over to visit me, and I like to feed him these pumpkin seeds. He deserves them; he's such a beautiful singer.\" Reaching out a finger to him, she gently pets his head, saying, \"I love to see people who do well with animals. They're such a treasure.\"\n\t\t\t\t\t\t\t\t\n\t\tHaving eaten his fill, Melody flutters his way over to the windowsill.\n\t\t*goto then\n\t\t\t\t\n\t#You try to coax the bird over with some breadcrumbs.\n\t\t*set lorelle %+5\n\t\t*set charisma %+5\n\t\tYou pinch a small piece of bread from the loaf at your bedside and toss it gently on the table beside you. The little songbird hops forward to investigate, but after pecking at the crumbs he hops away again. The bird stares at you, chirping insistently.\n\n\t\tLorelle returns just then with an armful of fresh bandages. Seeing your unsuccessful attempt to feed the bird, she laughs warmly. \"That's very kind of you, ${name}, but fechinnes prefer seeds. Bread is bad for their digestion.\"\n\t\t\t\t\t\t\t\t\n\t\tLorelle perches on the chair next to you. \"Every evening, Melody comes over to visit me, and I like to feed him these pumpkin seeds. I especially enjoy his company because of his beautiful songs. Here,\" she says, taking a few seeds and handing them to you. \"Try feeding these to him. They're his favorite.\"\n\t\t\n\t\t*page_break \n\t\t\t\t\t\t\t\t\n\t\tSmiling, you offer the seeds to Melody. He hesitates for a while, and you hold perfectly still. Finally, he chirps and hops quickly onto your wrist, snatching the seed before fluttering onto the windowsill. He sets the seed down and pecks at it happily.\n\t\t*label then\n\t\tThen the bird cocks his head and looks at you and the healer. He sings a short, cheerful tune. Lorelle smiles happily. \"Isn't he wonderful?\"\n\t\t\t\t\t\t\t\t\n\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t*label c \n\t\t\t\"He's certainly very handsome,\" you respond.\n\t\t\t*goto cc \n\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t*goto yes\n\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\tNodding, you reply, \"He is, indeed. I've read that fechinnes can remember snippets of melodies that they overhear. Did you teach him this one?\"\n\n\t\t\t\"No, actually, Ceylar was writing a new tune and to our surprise, after a few days of hearing it, Melody started singing along. Ceylar actually named the tune in honor of our little friend.\" She laughs. \"I suspect Melody might have written the end of the tune for him.\"\n\t\t\t*goto cc \n\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t*label yes\n\t\t\tNodding, you say, \"Yes, he is.\"\n\t\t\t*goto cc \n\t\t*else \n\t\t\t*goto c \n\t\t*label cc \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\tGiving one last peep, the fechinne ruffles his feathers at ${boggart}, who had inched too close for the bird's liking, and flies away.\n\t\t\t\n\n*page_break \t  \nLorelle stands up. \"Let's get these bandages on before you get too chilled,\" she says, quickly setting to work. It only takes a moment. \"Well,\" the healer says, \"I suppose it's time I gave you your last potion. This one took quite a lot of preparing, but it's very powerful and you should feel like a new person by tomorrow evening. You'll still have to rest for a couple more days, perhaps, but the worst of your injuries will be well on their way to healing.\"\n\nPopping the cork, she takes a small tankard from a cabinet and pours an amber liquid into it. Swirling it around with a metal stirring rod, she hands it to you. \"Now, it's very strong and it will probably make you sleepy—almost certainly, since you've been through so much lately.\"\n*fake_choice\n\t#In that case, what are you waiting for?\n\t\t*set altruism %-5\n\t\t*set lorelle %-5\n\t\tNodding quickly, you practically snatch the tankard from her hands, guzzling it down. The healer looks a little offended, but what can you say? You've had enough of this exhausting, painful, and awkward day. Taking the empty tankard, she says, \"Well, good night, then.\"\n\t\t\n\t#All this talking has worn you out, so you're more than happy to finally fall asleep again.\n\t\t*set lorelle %-5 \n\t\t*set stealth %+5 \n\t\t\"Great,\" you say a little hurriedly.\n\t\t\n\t\tYou take the potion and drink it quickly. It's a little thick, but it tastes surprisingly pleasant, like maple syrup but a little less sweet. Lorelle nods and takes the cup back when you're finished drinking.\n\t\t\t\t\n\t#Before you take the medicine, you want to thank Lorelle just once more.\n\t\t*set lorelle %+5\n\t\t*set charisma %+5\n\t\tYou wrap your hands around the tankard. \"I know I've said it before, Lorelle, but I cannot thank you enough for everything you've done. Your healing abilities have worked wonders, and you've been so kind.\"\n\t\t\t\t\t\t\t\t\n\t\tShe replies, \"You are very welcome, demon ${hunter}. It's my pleasure to do anything I can to make you well again.\" She watches as you drink the sweet, amber liquid. It tastes a little bit like syrup from a maple tree. She nods her approval, saying, \"Well, I'll be seeing you tomorrow. Goodnight, ${name}.\"\n\t\t\t\t\n\t#Lorelle is delightful, and you kiss her hand in a gesture of appreciation.\n\t\t*set lorelle %+10\n\t\t*set charisma %+5\n\t\tWhen she reaches out to give you the tankard, you accept it, offering her a grateful smile in return. The healer pauses a moment, waiting for you to drink the potion. You do so, quickly, then set the cup down on the table beside you, taking her palm in yours. You plant a delicate kiss on the back of her hand. \"Thank you, my lady, for everything.\"\n\n\t\tBlushing, she gives you a shy smile. \"You're too kind, ${name}. It's been my pleasure, and I…I'm so glad we managed to get there in time.\" Nervously brushing a few stray strands of hair from her forehead, she continues, \"Well, I should probably get going. I don't want to keep my patient up, after all. I look forward to seeing you in the morning, demon ${hunter}.\"\n\t\t\nShe stands up, smoothing her bright white tunic down. \"Vidar, Ceylar, and I will be in the other rooms down the hall if you need us.\" Turning to ${boggart}, she gives him a little kiss on the top of his head. \"And goodnight to you, little one.\"\n\nYour apprentice purrs loudly, bumping his head against hers. She smiles, scratching him under the chin before leaving the room and shutting the door quietly behind her. You're already starting to feel very drowsy. The last thing you see before drifting asleep is ${boggart} curling up by your feet.\n*if relationship \u003c 50\n\tYou'd shoo him away, but there's really nothing you can do about it, as exhausted as you are.\n*finish Continue", "travel": "\n*temp help 0  \n*temp self false \n*temp bath false \n*temp polite false \n\n*page_break\n\n[b]Chapter Six of Seven[/b]\n\nYou awake the next morning to the sound of people bustling through the infirmary. You squint a little as light shines through the parted curtains and you sit up, taking a moment to look around. Lorelle is currently rummaging through some cabinets with a backpack in hand, and Ceylar is working in the small kitchen, laying out an array of food. Your apprentice stretches and yawns widely, blinking groggily. \n\nLorelle notices you're awake and \n*if lorelle > 65 \n\tgives you a warm smile. \"Good morning, ${name}!\"\n*if lorelle \u003c 50 \n\tnods at you briefly.\n\t*goto morning \n*if lorelle > 49 \n\twaves, saying, \"Morning.\"\n*label morning \nSetting her backpack on the table beside her, she says, \"Today's the day, ${name}. If you're feeling up to it, I think it's time that we go to Melithar's Mountain. We probably should have left sooner, considering the urgency of our situation, but I thought you should be as well as possible before we left. I'm gathering medical supplies just in case, Ceylar is preparing some food, and Vidar is making sure all of our equipment and weapons are ready.\"\n\t\nRaising your eyebrows, you quickly get out of bed. You begin to stretch and move around a bit, and to your surprise, you almost feel like new again. All of these potions and medicines, not to mention the bed rest, have done miracles for your body, and now you will indeed finally be able to travel once more. Now that you're up, what would you like to do? You could simply help the others to speed up the process, or take some time for yourself.\n*label help \n\n*hide_reuse \n*choice \n\t#You volunteer to help Lorelle with the medicine.\n\t\t*set lorelle %+5 \n\t\t*set help +1 \n\t\t*set altruism %+5 \n\t\tYou make your way over to the healer, who is currently busying herself with the medicine in the cabinet. She notices you and \n\t\t*if lorelle > 64 \n\t\t\tsmiles, saying, \"Hey, ${name}. It's always nice to see you.\n\t\t*if lorelle \u003c 50 \n\t\t\tsays plainly, \"Hello.\n\t\t*if ((lorelle > 49) and (lorelle \u003c 65))\n\t\t\tsays, \"Hey there, ${name}.\n\t\tDid you need anything?\"\n\t\t\n\t\tYou nod and reply, \"I wanted to see if I could help you sort the medical supplies before we leave.\"\n\t\t\n\t\t\"As a matter of fact,\" she responds, \"I do think there's something you could help me with.\" Lorelle sets the backpack down again on the table and looks around for a moment before grabbing a piece of paper and a spare pen. She begins to scrawl something down on the note, and before long she holds it out to you with a smile, saying, \"Do you think you could look for all the items on this list in the cabinet and make sure I have everything I'll need for the trip? I wanted to go prepare one last potion before we leave to Melithar's Mountain.\"\n\t\t\n\t\t\"Of course,\" you say, taking the list and inspecting it.\n\t\t\n\t\tThe healer grabs a few ingredients of her own and heads over to the other side of the room, presumably to finish with whatever potion she was making. In the meantime, you take a look at the list. It looks like she wants to take several bandages, a couple splints, various kinds of medicinal herbs, and a few different vials of healing potions on the journey. It might seem excessive, but there will be five of you going, and you never know what might happen. \n\t\t\n\t\tYou're quite adept at reading and have some passing knowledge in the medical field, so you have no problem identifying the different medical supplies in the cabinet from their labels and descriptions listed on the note. Before long, you have gathered all of the items and laid them out on a table. Shortly afterwards, Lorelle returns with a freshly brewed potion, the liquid glowing a gentle pink in its vial. \n\t\t*if lorelle > 64 \n\t\t\t\"Thanks so much, ${name},\" she says, touching your arm lightly.\n\t\t*if lorelle \u003c 50 \n\t\t\t\"I appreciate you helping me,\" she says.\n\t\t*if ((lorelle > 49) and (lorelle \u003c 65))\n\t\t\t\"Excellent job,\" she says.\n\t\tGrabbing her backpack again, the healer begins to put the bandages inside, adding, \"I can take it from here.\"\n\t\t*if help = 2 \n\t\t\t*goto done \n\t\t\t\n\t\tWith that finished, you think about what to do next. \n\t\t*goto help \n\t\n\t#Perhaps you should go assist Vidar in getting all the equipment ready.\n\t\t*set vidar %+5 \n\t\t*set altruism %+5 \n\t\t*set help +1 \n\t\tYou look around the infirmary for Vidar for a couple minutes, but can't find him anywhere. The sound of clanging metal draws you outside, though, and before long you locate him behind the building, where he sits upon a stool, working at a whetstone. There is another whetstone beside him, as well. Sparks fly from his blade as he sharpens it, and you can see several other weapons laying flat on a tarp beside him, including a shield and multiple daggers.\n\t\t\n\t\tWhen you approach, the warrior stops sharpening his sword and glances over at you.\n\t\t*if vidar > 64 \n\t\t\tHe gives you a broad smile beneath his beard and says, \"I was hoping you would come find me, demon ${hunter}. \n\t\t*if vidar \u003c 50 \n\t\t\tHe simply arches an eyebrow and says, \"Oh, hello.\n\t\t*if ((vidar > 49) and (vidar \u003c 65))\n\t\t\tHe gives you a friendly look and says, \"Good morning!\n\t\tWhat can I help you with?\"\n\t\t\n\t\t\"I wanted to see if you needed any help preparing before we leave to Melithar's Mountain,\" you reply.\n\t\t\n\t\tNodding, the man says, \"Help is always welcome. If you want, you can sharpen those daggers for me. One of them is Ceylar's, and the other is for Lorelle. She's a pacifist, but I always insist on bringing an extra one for her just in case. I have one there for you as well, of course.\"\n\t\t\n\t\t\"That seems sensible,\" you respond, taking a seat beside him on a stump. \n\t\t\n\t\t*page_break \n\t\tYou take the larger dagger in your hand and apply it to the whetstone, pumping the pedal with your feet. You have sharpened blades a thousand times, so it doesn't take long for you to make sure the daggers are razor sharp. Vidar quickly finishes with his own sword and the multiple daggers that he always carries, as well. With a satisfied look, he says, \"Excellent. Now, if you'll just help me get these all sheathed, then we'll be finished.\"\n\t\t\n\t\tThe two of you set to sheathing all of the blades, \n\t\t*if vidar > 69\n\t\t\tyour arms touching every once in a while and a pleasant air between the two of you.\n\t\t*if vidar \u003c 50 \n\t\t\ta pointed silence between the two of you as you work.\n\t\t*if ((vidar > 49) and (vidar \u003c 70))\n\t\t\tchatting idly as you finish working.\n\t\tOnce you're done, he gathers all of the weapons in his tarp and hoists it up, saying, \"Thanks, ${name}. I'll just go and bring these inside for whenever the others are ready.\"\n\t\t\n\t\t*if help = 2 \n\t\t\t*goto done \n\t\tHe begins to head inside, and you do the same, deciding on what you'd like to do next.\n\t\t*goto help \n\t\n\t#You decide to help Ceylar prepare and pack the food for the journey.\n\t\t*set ceylar %+5 \n\t\t*set help +1 \n\t\t*set altruism %+5  \n\t\tWalking over to him, you say, \"Hey, Ceylar, I can help you finish that.\"\n\t\t\n\t\t*if ceylar > 64 \n\t\t\t\"I was hoping you would offer,\" he replies with a smile, gently squeezing your hand.\n\t\t*if ceylar \u003c 50 \n\t\t\tThe magician looks a little surprised, but shrugs, replying, \"Okay, thanks.\"\n\t\t*if ((ceylar > 49) and (ceylar \u003c 65))\n\t\t\t\"That would be great,\" he says kindly.\n\t\tHe motions to the table where he is preparing the food, continuing, \"So far I've got some bread, dried fruit, and even a little bit of chocolate for all of us. It's not much, but our journey to Melithar's Mountain will be a short one, and we're almost out of groceries as it is. Would you like to cut up the fruits and bread while I go and fill up some water canteens for the five of us?\"\n\t\t\n\t\tYou nod, and he smiles before heading out of the room. ${boggart} appears next to you, saying, \"Oh, that looks delicious, doesn't it? Some chocolate sounds really good right about now,\" with a not so innocent look.\n\t\t*fake_choice \n\t\t\t#You simply roll your eyes, and respond, \"Nice try, but no.\"\n\t\t\t\t*set resolve %+5 \n\t\t\t\tYour apprentice gives a disappointed little hurumph and says,\n\t\t\t\t*if relationship > 59 \n\t\t\t\t\t\"Pleeease? Don't I deserve it?\"\n\t\t\t\t\t\n\t\t\t\t\tYou chuckle and reply, \"Of course you do, little one. I'll give you some later, okay?\"\n\t\t\t\t*if relationship \u003c 50 \n\t\t\t\t\t\"Well then maybe I'll just steal some of yours later!\"\n\t\t\t\t\t\n\t\t\t\t\tYou frown at him and say, \"I highly doubt that. And next time, don't give away your stupid plans.\"\n\t\t\t\t*if ((relationship > 49) and (relationship \u003c 59))\n\t\t\t\t\t\"Aw man, you're way too much of a stickler!\"\n\t\t\t\t\t\n\t\t\t\t\tYou grin and say, \"And you're too much of a troublemaker.\"\n\t\t\t\t\t\n\t\t\t#With a smile, you ruffle his antennas and say, \"I see what you're trying to do, but it's not going to work. I promise you can have some later, okay?\"\n\t\t\t\t*set relationship %+5 \n\t\t\t\t*set charisma %+5 \n\t\t\t\tThe little boggart sighs, but says, \"All right, all right. I was just going to have a little.\"\n\t\t\t\t\n\t\t\t\tHe gazes at the chocolate chunks with hungry eyes, but after a moment, hops down onto the floor and goes elsewhere.\n\t\t\t\n\t\t\t#Looking around to make sure that Ceylar or Lorelle doesn't see, you break a small bit of chocolate off into two pieces, taking one for yourself and handing the other to your apprentice with a sly wink.\n\t\t\t\t*set relationship %+5 \n\t\t\t\t*set altruism %-5 \n\t\t\t\t*set stealth %+5 \n\t\t\t\tYour apprentice's jaw drops and his eyes go wide as if he can't believe what he's seeing. \"I haven't had chocolate since forever!\" he whispers excitedly as he takes the treat eagerly and pops it in his mouth. He closes his eyes and gives a satisfied \"mmm\" with a smile on his face as he chews.\n\t\t\t\t*if relationship \u003c 50 \n\t\t\t\t\t\"You do have a heart after all!\" he exclaims, though he makes sure to keep his voice down.\n\t\t\t\t*if relationship > 69\n\t\t\t\t\t\"This is why you're my favorite person ever,\" he says, giving you a chocolaty grin.\n\t\t\t\t*if ((relationship > 49) and (relationship \u003c 70))\n\t\t\t\t\t\"As soon as we get rich, I'll buy you a lifetime supply of chocolate!\" he says happily.\n\t\t\t\t\n\t\t\t\tYou can't help but grin as you pop the chocolate into your mouth. Your tastebuds explode at the sweet, chocolaty flavor, and you chew it slowly in order to savor it. Chocolate is a rare delicacy, especially in smaller villages like Rhys Falls and Qauder, and you intend to appreciate it as much as you can.\n\t\t\t\t\n\t\tWith that aside, you turn your attention to the food. All of the fruit and loafs of bread are splayed out on a battered wooden cutting board, with an old kitchen knife on the side. You get to work slicing the fruit and cutting the loafs into fifths, then putting them all in piles. Not long after, Ceylar returns, his arms full with several canteens of water. Looking at your progress, he says, \"Thanks, ${name}. I can go ahead and finish bagging them up for our trip.\"\n\t\t*if help = 2 \n\t\t\t*goto done\n\t\t\t\n\t\tWhat would you like to do now?\n\t\t*goto help \n\t\n\t#Actually, after all these days of being bedridden, all you really want is a bath before you go, even if it is just for a few minutes.\n\t\t*set charisma %+5 \n\t\t*set health +1 \n\t\t*set help +1 \n\t\t*set bath true \n\t\t*if help = 2 \n\t\t\t*goto done \n\t\t\"Well,\" you say, \"I really feel like taking a bath to freshen up and loosen all these knots in my muscles. Do you have one here?\"\n\t\t\n\t\tThe healer \n\t\t*if lorelle \u003c 55 \n\t\t\tnods and says, \"Sure, it's in the hallway to your right.\"\n\t\t*if lorelle > 54 \n\t\t\tsmiles and says, \"Of course. It's in the hallway to your right. Have fun.\"\n\t\t\n\t\tWith a thanks, you leave and head toward the washroom. The washroom is a bare but clean affair, with tiled floors and a thin metal bath sitting in the center. Nearby, there is a massive bucket of water with a pair of tubes connecting it to the bath. There are handles on the bath, too, one red and the other blue
