<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Foundation of Nightmares — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>

      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "foundationofnightmares", "title": "Foundation of Nightmares", "scenes": {"author3": "*page_break\n[b]Author's note:[/b]     \nThank you for your support, and congratulations on finishing Foundation of Nightmares - Volume Three of Demons Among Men! If you enjoyed reading and playing this as much as I enjoyed creating it, please consider leaving a review in the application store and sharing it with friends. The more downloads I get, especially in the first week after the release, the better equipped I'll be to write the sequels and improve the current installments. \n\nIf you didn't care for Foundation of Nightmares, or if you've found any bugs, typos, or continuity errors —-or if you simply have a suggestion—- I'd love to hear from you. I'm open to all sorts of feedback. You can contact me at my Facebook page or email me using the links provided below.\n*label check\n*choice\n\t#Check out Mabelin and the Demon Trials, the conventional novel version of Trial of the Demon Hunter and Captive of Fortune.\n\t\tMabelin and the Demon Trials is an e-book that is available on over a dozen platforms, including Apple and Barnes & Noble. To get your copy, simply search for the title on your favorite digital book distributor, or follow  \n\t\t*link https://www.smashwords.com/books/view/539102 this link.\n\n\t\tMabelin is a demon huntress, a fighter of evil, and a natural enemy of demons. In a twisted display of irony, a demon appears and destroys her village. Determined to avenge her shattered home, the huntress embarks on a perilous journey alongside her boggart apprentice, Beckham.\n\n\t\tAlong the way, she faces many enemies, including a vampire, a goblin, witches, bandits, a necromancer, an ogre, and a troll. During her journey, she finds herself in the city of Lorden, where she is able to regain her strength, forge new alliances, and even consider the prospect of romance. However, her Netherworldian foe is always looming.\n\t\t*goto check \n\n\t#Check out my Facebook page.\n\t\tFor news, exclusive content, sneak peeks of the sequels, and more, visit my Facebook page,\n\t\t*link https://www.facebook.com/samuelharrisonyoung Samuel Harrison Young.\n\t\t*goto check\n\n\t#Finish the gamebook.\n\t\t*ending", "ceylar": "*page_break \n\n[b]Chapter Two of Seven[/b]\n\nYou wake up abruptly, the flickering flame of a torch illuminating the room and sending shadows dancing across the walls. Blinking hard, you pull yourself into a sitting position, but a pounding ache sends you slumping back against the bedpost. Once your eyes adjust, you see Falcon and two of the bandits from Lorden standing in front of you, smirking at your surprised expression. \n\n*image falcon.jpg \n\nThe archer laughs, not even bothering to keep quiet. \"Fancy meeting you here, demon ${hunter}. I never thought I'd see you like this!\"\n\nSomething about this whole situation is bizarre. How did the bandits know you were in Quader, and how are they even here to begin with? Lastly, why is Falcon being so brazen about this? Regardless, this doesn't look good.\n*if bargain\n\tEven though you made a bargain before, you're not sure how binding that is, especially since you're in such a vulnerable state. \n\t*if falcon > 49 \n\t\tDespite the fact that you and Falcon weren't actually on bad terms, you wouldn't put it past those other bandits to take revenge.\n\t*if falcon \u003c 50 \n\t\tNot to mention the fact that Falcon isn't exactly fond of you….\n*if not(bargain) \n\t*if falcon > 49 \n\t\tDespite the fact that you and Falcon weren't actually on bad terms, you wouldn't put it past those other bandits to take revenge.\n\t*if falcon \u003c 50 \n\t\tAnd it really doesn't help that Falcon probably hates you at this point.\n\t\t\n*line_break \nLooking down at your feet, you see that ${boggart} is awake now, being very careful to remain hidden. Fortunately, he blends into your covers, and the dim, haphazard torch light hasn't revealed him yet.\n*choice \n\t#Try to cover ${boggart} with your blanket before the bandits realize he's here.\n\t\t*set stealth %+5 \n\t\t*set altruism %+5\n\t\t*set compassionate %+5 \n\t\t*set relationship %+5\n\t\tKeeping your eyes trained on the criminals standing at the edge of your bed, you slowly move your legs over, pulling the blanket over your apprentice. Unfortunately, your movements are still too jerky and uncoordinated, and Falcon notices. Smirking, she says, \"Aw, that's sweet. But you don't have to worry about him, demon ${hunter}. Trust me, if I wanted to harm either of you, I would have!\"\n\t\t*goto bandd\n\t\t\n\t#Raise the alarm!\n\t\t*set resolve %+5 \n\t\tCupping your hands around your mouth, you yell, \"Vidar, Ceylar, Lorelle, bandits have sneaked into my room!\"\n\t\t\n\t\tYou wait for a moment, but nothing happens. The only sounds that can be heard are the chuckles of the bandits, who just continue to look amused. Shaking her head with a little laugh, Falcon says, \"It won't work, demon ${hunter}. How foolish do you think I am?\"\n\t\t\n\t\tShe glances down at ${boggart} who still lays there, motionless, but she doesn't seem to care.\n\t\t*goto bandd\n\n\t*selectable_if (charisma > 64) #Maybe you should try to ease the tension until help arrives. Flashing a smile, you say, \"Ah, Falcon. You're even more beautiful than the last time we met!\" \n\t\t*set charisma %+5\n\t\t*set falcon %+10 \n\t\tThe bandit leader laughs heartily. Again, she's being far too loud for her own safety, but you suppose you can't really complain. Winking and giving you a mischievous smile, she replies, \"There's no need for flattery here, demon ${hunter}. If I wanted to kill you, I would have done so before you even woke up.\"\n\t\t\n\t\tShe glances down at ${boggart} who still lays there, motionless, but she doesn't seem to care.\n\t\t*goto bandd \n*label bandd\nThe bandit passes the torch over to her fellow outlaw, one of the burly halberdiers, who you notice is even more rugged and battle-scarred than before. Courtesy of you, no doubt. \n\nLifting up her finger to the light, she reveals a gleaming, greyish ring with a mineral encrusted on the top, black and white patterns running along the inside like lightning. \"This,\" she explains, \"is why I'm not worried about your new friends finding us. This ring has a useful bit of magic that allows me to muffle the sounds of myself and anyone near me. \n\n\"The best thing about it is I can choose who can still hear me. Hence, our conversation.\" The outlaw grins, the light dancing across her verdant eyes. \"I probably should have thanked Gertrude for this wonderful gift but she was a little tied up at the moment.\"\n\n*if compassionate \u003c 50 \n\tYou smirk. Now that's your kind of humor. Apparently the swordsman finds it funny, too, because he chuckles loudly.\n*if compassionate > 49 \n\tThe swordsman standing beside her chuckles deeply, but you don't think it's funny at all.\n\t\n*page_break \n\n\"Anyways,\" she continues, \"I'm sure you're dying to hear about how we got here in the first place. Well, you're in luck because I'd love to enlighten you. Unfortunately, we haven't got much time so let's just say that our dungeon break involved some predictable guard shifts, a weak point in the cell, and some very helpful chaos created by our lovely friend, Mendax.\"\n\nYou bristle at the mention of the Master's name, and you can feel your apprentice's tail twitching angrily, but Falcon doesn't pay it any mind. Regardless, you can only imagine how big an uproar occurred in Lorden when the citizens saw you fleeing for your life, clothed only in a tattered robe. Certainly, they would have assumed, and rightly so, that Mayor Eldon had died.\n\n*page_break \n\nA look of sadness suddenly crosses Falcon's face, and she brings you out of your thoughts, saying, \"The breakout would have been perfect if not for the death of Ahadiz. At the very least, his passing was noble. He died holding off three guards, and it gave us enough time to escape.\"\n\nAhadiz sounds like the name of a warrior from the West, so you can only assume that she's referring to the criminal that wielded a spear and had a mask covering his face. Shaking her head, Falcon says, \"But I digress.\" She raises her arms, as if showcasing something brilliant. \"Impressive, is it not?\"\n*fake_choice \n\t#\"It is, indeed,\" you say. \"I can't deny you've done well for yourself. It's what I would have done.\"\n\t\t*set altruism %-5\n\t\t*set falcon %+5 \n\t\tFalcon laughs again. Perhaps breaking out of prisons and stealing from Gertrude and then tying her up puts the bandit leader in a happy mood. \"Then we are not so different, you and I,\" she says, eyeing you with a smile tugging at the corner of her lips. \"I look forward to seeing how our paths cross in different circumstances, oh mighty demon ${hunter}.\"\n\t\t\n\t#Nodding quickly, you murmur, \"Uh-huh.\" You keep glancing at the door, hoping Vidar will just burst in any second. Regardless of Falcon's intentions, you don't feel comfortable being so vulnerable with those two bandits standing there.\n\t\t*set stealth %+5 \n\t\tFalcon chuckles when she notices what you're doing. \"Trust me, they aren't coming. Short of an angry Belluo romping in here, no one will hear us. But you needn't worry. I think you'll like my proposition, actually.\"\n\t\t\n\t#Rolling your eyes, you say bluntly, \"Surely, you didn't come here just to brag. Are you going to tell me why you're here, or just keep wasting my time?\"\n\t\t*set falcon %-5 \n\t\t*set resolve %+5 \n\t\tScowling, she replies, \"Touchy, touchy. Maybe you don't appreciate my prowess, but perhaps you would do well to control your tongue as helpless as you are!\"\n\t\t\n\t\tOne of the bandits seems to take this as a cue. He begins to draw the saber from his belt, but Falcon stops him with a hand on the handle of his weapon. \"No, that won't be necessary. We still have business with ${dhim} after all.\"\n\t\t\n\t\tThe outlaw grumbles, sheathing his sword reluctantly.\nSuddenly, the torch in the halberdier's hand dims, nearly guttering out. Stepping closer, the bandit leader says urgently, \"We're almost out of time. I came here because I wanted to \n*if bargain \n\trekindle our\n*if not(bargain)\n\tstart a \nbargain with you. Things have changed for both of us since our last encounter, and my comrades and I have had a change of heart. Before, we were scared and cowed into working for that demon, but now we want revenge!\"\n\nHer eyes taking on a fierce look in the flickering light, Falcon says, \"I don't know what happened to put you here, but I know this isn't the end. I know you've got a plan to defeat this freak and we want to help you. \n*if bargain \n\tYou asked for us to aid you in the future? Well, the time is now.\nRegardless of how strong Mendax is, he won't be able to defeat all twelve…er, eleven of us together.\"\n\n*page_break \n\n\"So, what say you, great and powerful hunter of demons?\"\n\nShe says this last bit with a hint of amusement, but it's obvious she's otherwise sincere. Even though you're planning on petitioning to Melithar the Eccentric for him to defeat Mendax, perhaps it wouldn't be a bad idea to have these warriors on your side. \n\nThen again, that could put you in a bad position with Gertrude, and she's certain to be tracking these outlaws down even as you speak. If the breakout wasn't enough, the archer stole a valuable magical ring from the captain; she's unlikely to be pleased about that. Not to mention that you aren't sure if they could actually make a difference against an enemy as powerful as Mendax.\n*fake_choice \n\t#Pausing for a moment, you reply, \"Against my better judgment, I accept.\"\n\t\t*set falcon %+5 \n\t\tFalcon smiles, saying, \"I knew you would see it my way. You won't regret it, demon ${hunter}. Together, you and I will defeat this monster. I promise you that!\"\n\t\t\n\t#Winking, you respond, \"If it means I get to see you more often, I accept.\"\n\t\t*set charisma %+5 \n\t\t*set falcon %+10 \n\t\tFalcon raises her eyebrows. \"I'm sure you will, demon ${hunter}. And I hope to see you in bed more often,\" she replies, returning a devilish wink.\n\t\t\n\t\tThe halberdier rolls his eyes and the swordsman groans loudly, but she ignores them, giving you one last meaningful look. \n\t\t\n\t#Shaking your head, you say bluntly, \"I can't accept this agreement. You are outlaws, and working together would be against my code.\"\n\t\t*set compassionate %+5 \n\t\t*set falcon %-5 \n\t\tFalcon glares at you, setting her jaw and clenching her fists. \"Have it your way then! You'll regret this, but perhaps you won't realize it until your noble code gets you killed!\"\n\t\n\t#Shaking your head, you say regretfully, \"I can't accept this agreement. It would put you in too much danger. This is a battle for the true powers of Lume, and it is far beyond any of us.\"\n\t\t*set altruism %+5 \n\t\t*set falcon %+5 \n\t\tTilting her head to the side, Falcon gives you a curious smile, responding, \"Are you worried about my safety, demon ${hunter}?\" She laughs, looking very amused indeed. \"That's adorable, but I think I can handle myself. Even if we are only to play a small part in the scheme of this battle, so be it! Just think about it. An alliance between you and I can do you no harm. I hope you will have changed your mind before we meet again.\"\n\t\t\n\t#Sighing, you reply hesitantly, \"I need more time to think about this. Everything is uncertain, and I can't just make a decision like this so quickly.\"\n\t\t*set stealth %+5 \n\t\tFalcon seems disappointed, but after a moment she replies, \"Very well, then. I will return within the next few days, and by then I hope you will have made your decision. Until then, think it over, will you? Remember, you have nothing to lose!\"\n\t\t\nWith that, she stealthily exits through the window, the bandits following her. The swordsman seems to resist an urge to attack you. Instead, he contents himself with a steely glare before jumping out of the window and leaving you and ${boggart} alone yet again. With Falcon and her company gone, you can finally alert the others of what happened. \n\nEven if they weren't outright hostile toward you, this whole experience was still a testament to how insecure you are here. What if one of the other bandits, or Illil for that matter, sneaks back in here looking for revenge? Pushing yourself into a sitting position, you say, \"${boggart}, go get the others!\"\n\n*page_break \n\nLeaping up, ${boggart} soars across the room, opening the door quickly and rushing down the hall. For a moment, all is silent, but then you hear muffled voices, and a few seconds later, Ceylar rushes in with Lorelle, Vidar, and ${boggart} coming in after him. It's dark for a moment, but then Lorelle lights a candle, lifting it up to get a better view. The first thing that you notice is that the magician is shirtless. \n\nPerhaps he's not as built as Vidar, but his muscles are certainly toned. Even in the dim, flickering light, his fiery hair seems to accent his verdant eyes. They aren't piercing like Falcon's, but gentle and cool. His skin is in stark contrast to Lorelle's. Side by side, they almost look like a ghost and a lion. \n\n*image ceylar.jpg\n\nStepping closer, his eyes full of worry, he says, \"Is everything okay?\"\n\n*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\"You mean besides my being bedridden?\" you laugh nervously.\n\t*goto lin \n*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\tNodding, you say simply, \"Yes, I'm fine.\"\n\t*goto lin\n*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\tNodding, you say, \"Yes. They didn't actually attack me.\"\n\t*goto lin\n*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\tPutting on a tough expression, you say, \"Of course!\"\n\t*goto lin \n*label lin\n\t\n*line_break \nCeylar must notice you looking at him, because he suddenly looks down at his bare torso, saying, \"Oh, right. Sorry, this is how I sleep. I hope you don't mind.\"\n*fake_choice \n\t#Grinning, you say, \"No, I don't mind at all.\"\n\t\t*set ceylar %+10 \n\t\tSmiling back, he replies, \"Ah, wonderful. I like you already!\"\n\t\t\n\t#Shrugging, you respond, \"It's a pretty stuffy night, so I can't really blame you.\"\n\t\t*set ceylar %+5 \n\t\t*set cunning %+5 \n\t\t\"Ah, I do like sensibility,\" he says, winking at you.\n\t\t\n\t#You shrug and say, \"I don't care. We have bigger things to worry about.\"\n\t\t*set resolve %+5 \n\t\t*set ceylar %-5 \n\t\tThe magician folds his arms self-consciously over his chest and nods, saying, \"That is true. Fair enough.\"\n\t\t\n\t#Raising your eyebrows, you reply bluntly, \"I do, actually.\"\n\t\t*set ceylar %-5 \n\t\t*set stealth %+5 \n\t\tLooking taken aback, he says, \"Oh! Well, I guess I could cover up with this, er, backless infirmary shirt….\" he says, grabbing one from a tray.\n\t\t\n\t\tLorelle laughs but stops herself when the candle holder starts to shake, almost making the small flame gutter out.\n\t\t\nThe magician gazes at you for a long moment, seeming to take you in.\n*if charisma > 64 \n\t*set ceylar %+10 \n*if charisma > 59 \n\t*set ceylar %+5 \n*if charisma \u003c 55 \n\t*set ceylar %-5 \n*if cunning > 64 \n\t*set ceylar %+5 \n*if resolve > 64 \n\t*set ceylar %+5 \n*if resolve > 55 \n\t*set ceylar %-5 \n*if stealth > 64 \n\t*set ceylar %+5 \n*if stealth \u003c 59 \n\t*set ceylar %-5\n*if altruism > 64 \n\t*set ceylar %+5 \n*if altruism \u003c 50\n\t*set ceylar %-5 \n*if compassionate > 64 \n\t*set ceylar %+5 \n*if compassionate \u003c 50\n\t*set ceylar %-5 \nCeylar's expression is surprisingly easy to read, and judging from the face he's making, you suspect that\n*if ceylar > 54 \n\the likes you very much already.\n\t*goto ceylar \n*if ceylar \u003c 50 \n\the doesn't particularly like you very much, so far.\n\t*goto ceylar\nhe isn't exactly sure what to think of you yet.\n*label ceylar \nRolling his eyes, Vidar brushes past the magician. Fixing his intense gaze on you, he says in a baritone voice, \"Do you know in which direction they were headed? I can go track them down before they get too far away.\"\n\nThe warrior has a slight accent, making his words blunter, with particular emphasis on the vowels. Lorelle and Ceylar exchange uncertain glances, and ${boggart}'s eyes widen, his tail swishing nervously. You shake your head, saying, \"I'm not sure that's a good idea.\"\n*fake_choice \n\t#\"I think it would be safer to go tomorrow when there's sunlight and when you've had a chance to regain your strength,\" you conclude.\n\t\t*set cunning %+5 \n\t\tStroking his beard, the warrior responds, \"You do make a solid point. I suppose you're right. After all, I'm still tired from searching for those other thugs and their cowardly leader, Illil.\"\n\t\t\n\t#\"Besides,\" you say, giving him a little smile, \"I'd rather you stay here to protect me.\" \n\t\t*set vidar %+10\n\t\tThe warrior grins through his beard, giving a short, rumbling laugh. Raising a bushy eyebrow, he says, \"I can do that.\"\n\t\t\n\t#\"Falcon has a magical ring that allows her to remain silent to anyone she chooses,\" you explain. \"They'd be able to sneak attack you.\"\n\t\t*set stealth %+5 \n\t\tRaising his bushy eyebrows, he rumbles, \"Ah, that changes things. During the day that may not be as much of a problem, but as dark as it is right now, they would be almost impossible to face. Maybe it is best to wait.\"\n\t\n\t#\"After all,\" you continue, \"you'd be greatly outnumbered and they're nothing like Illil and those thugs. These men are hardened and trained mercenaries and bodyguards.\"\n\t\t*set resolve %+5 \n\t\tTugging at his beard, the warrior replies, \"Well, it all depends on how many of them there are. I should be able to take at least four of them.\"\n\t\t\n\t\t\"There are nine of them, and one of them is a rather skilled archer,\" you counter.\n\t\t\n\t\tWhistling, he says, \"Impressive. I may need Ceylar and ${boggart} for that. Not to mention those pesky thugs and Illil are still running around….\"\n\t\t\n\t\t\nClearing her throat, Lorelle says, \"Vidar, I was thinking Ceylar could stay here and guard ${name}. If you're going to go looking for them tomorrow, perhaps it's best that ${boggart} and I accompany you.\"\n\nVidar crosses his arms over his chest, murmuring, \"Yes, that seems sensible.\"\n\nNow that you think about it, the bandits aren't as much of a threat as Illil and his group of criminals are. Even with some animosity between you and a few of the mercenaries, Falcon is there to keep them in line. Above all, you're certain their hatred for Mendax is far greater than their dislike for you.\n\nOn the other hand, those outlaws that put you in this infirmary are probably still out to get you. After all, Illil won't likely give up easily after he saw the \"fortune\" you were carrying. With this in mind, you speak up, saying, \"Actually, I believe it's best to focus on Illil and his gang.\"\n\n*page_break \n\n\"After all,\" you continue, \"the bandits didn't seem to want to harm me. They could have killed me if they wanted to, but it seemed like they just wanted to talk. Illil, however, will probably take any chance he can to get revenge, and take back his 'toll.' He wanted to steal all my belongings and take my apprentice away as a slave.\"\n\nAt this, ${boggart} hisses loudly, but Lorelle scoops him up and starts petting his head, saying, \"It's okay, little one. They can't take you, now.\"\n\n\"So,\" Ceylar, says lightly, \"I suppose that means I'm staying in here tonight, ${name}.\"\n\nLorelle nods, setting ${boggart} back on your bed. \"In the meantime,\" she says, \"we should all try to get some sleep.\"\n\nYawning, Vidar says, \"I suppose we all need at least some rest, eventually. I'll see you tomorrow, demon ${hunter}.\" He smiles, and you notice that although his teeth are relatively clean, one of them is chipped, likely from a battle gone wrong.\n\nLorelle gives you a smile of her own before heading out after him. Stretching out on a bed at the other end of the room, the magician comments, \"Well, I look forward to spending some time with you tomorrow, ${name}. You should be safe with me here, and we can find something to do to pass the time while you're healing.\"\n*fake_choice \n\t#Excellent. Ceylar is handsome and charming, so you're eager to spend as much time with him as possible.\n\t\t*set ceylar %+10\n\t\t\"Absolutely,\" you say, smiling. \"Goodnight, Ceylar.\"\n\t\n\t#That sounds like a good idea. After all, there's nothing else to do.\n\t\t*set ceylar %+5 \n\t\tNodding, you say, \"Yes, that seems best. Goodnight.\"\n\t\t\n\t#You can think of better ways you would like to pass the time, but you suppose in your situation, you can't be too picky.\n\t\t*set ceylar %-5 \n\t\t*set altruism %-5 \n\t\tYou shrug and say, \"Sure, I guess.\"\n\t\n\t#You don't want to get too attached to any of these people. You can't get distracted from your true mission. As soon as they've served their purpose, you're leaving.\n\t\t*set ceylar %-5\n\t\t*set altruism %-5 \n\t\tPeering over at him through the corners of your eyes, you pretend to have fallen asleep. He glances at you, just shrugging his shoulders and turning over in his bed.\n\t\t\nAt your feet, ${boggart} is already sound asleep, snoring quietly.\n*if relationship > 49 \n\tYou smile. Although he twitches every so often, you don't mind because it's just a reminder that he's still by your side, after everything that's happened.\n*if relationship \u003c 50 \n\tHow annoying. You'd kick him off your bed, but obviously that's not possible right now, what with your legs still feeling like rocks.\n\t\n*line_break\nA moment later, you finally drift into sleep. Your slumber is heavy and dreamless. Although you awake a couple of times in the night—the potion giving you a peculiar sensation of vertigo—fortunately, for whatever reason, Mendax chooses not to torment you with any more nightmares this night. \n\n*page_break \n\nThe next day, you're awoken by the smell of something cooking and the quiet clang of pots and skillets. The potion seems to have done wonders, because you feel much better already. Miraculously, your bones are no longer broken, and all of your lacerations and torn muscles have repaired themselves. Only a lingering ache and a feeling of exhaustion remain, and your bandages and splints are gone.\n\nLorelle must have come by in the morning while you were still sleeping to take them off. Looking up, you squint through the dazzling sun that shines between the parted curtains. Judging by the position of the sun, it must already be sometime in the late afternoon. \n\nLooking around, you see that Ceylar is preparing a meal over a small cook-fire. Looking over at you, he says, \"I know you must be starving after only eating a few bowls of broth in the last three days, so I've made you something to eat.\" Spooning you a bowl from the cauldron, he douses the fire and hands the bowl to you, setting a tankard of water on your nightstand. Sitting on the side of your bed, he says, \"Careful, it's still hot.\"\n\n*page_break \n\nLooking at the contents of your dish, you see that you've been served a simple meal of cooked wild rice with mushrooms. Running his hand through his lion's mane, he murmurs with a little apologetic grin, \"I would have made you something more, er, substantial, but we never received this month's food supply from Bertrand.\"\n\nBlowing on your rice, you frown, saying, \"Bertrand?\"\n\nNodding, the magician says, \"Yes, he's a farmer living down in Lorden. Perhaps he's not the nicest of fellows, but he provides most of our food.\" Reading your expression, he adds, \"Do you know him?\"\n*fake_choice \n\t#Grinning darkly, you reply, \"Know him? I fought him!\"\n\t\t*set ceylar %+5 \n\t\t*set compassionate %-5 \n\t\tChuckling lightly, he says, \"Somehow, I'm not surprised. What, was he possessed by a demon? That would explain his horrible attitude!\"\n\t\t\n\t\tAmused, you respond, \"No, but you're right, he may as well have been. I taught him a lesson after he blamed me for the demon burning down his barn.\"\n\t\t\n\t\tCeylar rolls his eyes good-naturedly, saying, \"He always has to have someone to blame.\"\n\t\t\n\t#Nodding, you respond, \"I had the misfortune of trying to save his burning barn.\"\n\t\t*set charisma %+5 \n\t\t*set ceylar %+5 \n\t\tRolling his eyes with a grin, Ceylar says, \"That sounds exactly like him. You can never do anything right in his mind!\"\n\t\n\t#Furrowing your brow, you say, \"I would rather not talk about it. He's unpleasant enough to be around, so I don't want any reminders.\"\n\t\t*set stealth %+5 \n\t\t*set charisma %-5 \n\t\t*set ceylar %-5 \n\t\tNodding slowly, the magician says, \"I can understand that.\"\n\t\t\n\t\tAfter a moment, you add, \"Though I will tell you that his barn was burned down not five days ago.\"\n\t\t\nHis eyes widening, he says, \"Wait…his barn burned down? That would explain why he couldn't come in with the latest food shipment! Was anyone hurt?\"\n\nShaking your head, you say, \"No, there wasn't anyone there during the attack. The whole building collapsed, though.\"\n\nSighing sadly, he runs his hand across the back of his neck, murmuring, \"Well, that's a slight comfort. But if you knew Bertrand, you must have known his daughters, right?\"\n\n*page_break \n\nOver in the corner, you hear the loud slopping sound of noisy chewing. Turning around, you see that your apprentice has begun to raid the cauldron, stuffing the remainder of the rice into his mouth. He gives Ceylar a guilty look, saying through a mouthful of food, \"Sorry! I was really hungry. I mean, starving!\"\n\nThe magician winks, \"Don't worry about it! We've all had some already, at least. Just make sure you clean it all out so I don't have to.\" Grinning mischievously, your companion dives into the cauldron, giggling happily. Shaking his head with a smile, Ceylar turns back to you, saying, \"So, where were we?\"\n\nClearing your throat, you say, \"Yes, I did meet the triplets for a short time, actually.\"\n\n\"Lovely girls!\" he remarks. \"What did you think of them?\"\n*fake_choice \n\t*selectable_if (romance_gretta) #Smiling fondly, you say, \"They're wonderful people, especially Gretta. She and I have somewhat of a relationship going, actually.\"\n\t\t*set ceylar %+5 \n\t\t*set gretta %+5 \n\t\tCeylar almost looks disappointed for the briefest of seconds, but he quickly recovers. \"Ah, that's wonderful! Those years of farming have done her body well. Perhaps one day, she'll become an adventurer like one of us.\"\n\t\t\n\t\tNodding, you say, \"Yes, I wouldn't mind that at all.\"\n\t\n\t*selectable_if (romance_garnet) #Grinning happily, you reply, \"They're very pleasant, especially Garnet. She and I have promised to see one another more often, after everything has settled down.\"\n\t\t*set ceylar %+5 \n\t\t*set garnet %+5 \n\t\tCeylar almost looks disappointed for the briefest of seconds, but he quickly recovers. \"I'm glad to hear it! She's got an excellent mind, which I'm sure you can appreciate.\"\n\t\t\n\t\tNodding, you say, \"Absolutely. It's one of the qualities that attracted me to her.\"\n\t\n\t*selectable_if (romance_gretchin) #Beaming, you respond cheerfully, \"I enjoyed their company, particularly Gretchin's. It seems she and I have begun a romance of sorts.\"\n\t\t*set gretchin %+5\n\t\t*set ceylar %+5 \n\t\tCeylar almost looks disappointed for the briefest of seconds, but he quickly recovers. \"I'm sure you'll both be very happy. She really is a kind person, with compassion beyond most others.\"\n\t\t\n\t\tYou say, \"You're right. That's probably what drew me to her.\"\n\t\n\t#\"They're good people, and very unlike their father. It's sad about what happened to their property,\" you say, shaking your head.\n\t\t*set ceylar %+5 \n\t\t*set gretchin %+5 \n\t\t*set garnet %+5\n\t\t*set gretta %+5\n\t\tCeylar nods quickly, saying, \"Oh, I agree. You wouldn't even know that they're related! And it's certainly a tragedy about their barn, but I know they'll be able to figure something out. They're all unique and talented young women, no matter what their father says.\"\n\t\t\n\t\t\"I can't deny that,\" you respond.\n\t\n\t#Shrugging, you reply noncommittally, \"I didn't think anything of them one way or another. They're just farmers like any other.\"\n\t\t*set ceylar %-5 \n\t\t*set gretta %-5 \n\t\t*set garnet %-5 \n\t\t*set gretchin %-5 \n\t\t*set compassionate %-5 \n\t\tCeylar doesn't look upset, but he does seem to disagree. Pursing his lips, he comments, \"Well, perhaps you haven't had enough time to get to know them well enough. Although they may just be the daughters of a bitter farmer, they're surprisingly complex and it seems like they long for something more. \n\t\t\n\t\t\"Garnet has always impressed me with her intelligence, Gretchin's love for animals almost rivals Lorelle's, and Gretta really is a talented athlete.\" You must not look convinced, because he mumbles, \"Well, I suppose everyone doesn't have to get along with everyone else.\"\n\t\nBy now, your rice and mushrooms have cooled enough for you to eat. Taking a spoonful, you savor the warmth of the meal. As you swallow your first bite, you can't deny that it's surprisingly filling, though not exactly flavorful. You can taste a couple different spices, but it's rather bland, all things considered.\n\n*page_break \n\nSuddenly, you hear a great crash on the other side of the infirmary. Looking over, neither of you are surprised to see the cauldron rolling across the floor. Peaking his head out, ${boggart} stares, wide eyed, at Ceylar. The magician sighs, but it's obvious he isn't upset. Standing, he begins to walk toward the little boggart, saying, \"Oh, ${boggart}. What was our agreement earlier?\"\n\nHis tail twitching sporadically, your apprentice dives out of the cauldron, zipping back and forth around the room before finally hiding underneath a pile of blankets on one of the unused beds. Clearly, sleeping for almost an entire day gave him a lot of pent up energy. \n\nWaving the cauldron away as it finally skitters to a stop, Ceylar chuckles, \"Crazy boggart. So, anyways, what do you think of the rice? I know it's not the greatest meal ever, but it's the best I could make with what I had.\"\n*fake_choice \n\t#Picking at the contents of your bowl, you shrug, mumbling, \"It's better than nothing.\"\n\t\t*set altruism %-5 \n\t\t*set ceylar %-5 \n\t\tLooking hurt, he replies, \"Well, hopefully we can find someone else for our groceries in the meantime. I wouldn't want you to not have enough to regain your strength.\"\n\t\t\n\t\tYou nod, silent. After a few moments, the silence deepens, broken only by the occasional skittering of ${boggart}'s claws across the floor.\n\t\t\n\t#You reply honestly, \"It's okay. Thanks.\"\n\t\t*set stealth %+5 \n\t\t*set charisma %-5 \n\t\t*set ceylar %-5 \n\t\tThe magician grins sheepishly and rubs the back of his head. \"Yeah, that's about what I expected. You'll have to take my word for it that I'm a better cook than this, when I actually have the ingredients.\"\n\t\t\n\t\t\"Of course,\" you reply.\n\t\t\n\t#\"I like it!\" you reply. \"It's filling, and it was very kind of you to make it for me, even though I know supplies must be scarce.\"\n\t\t*set ceylar %+5 \n\t\t*set altruism %+5 \n\t\tGiving you an animated bow and tipping his wizard hat, he says playfully, \"But of course, my dear ${name}. Only the best for the guests!\"\n\t\t\n\t\tYou laugh, doing a mock\n\t\t*if male \n\t\t\tbow of your own.\n\t\t*if female \n\t\t\tcurtsy of your own using your blanket.\n\t\t\n\t#\"It's delicious,\" you say, licking your lips and adding emphasis on the word \"delicious.\"\n\t\t*set charisma %+5 \n\t\t*set ceylar %+10 \n\t\tRaising his eyebrows, Ceylar tips his wizard hat and winks, replying, \"Well, there's more where that came from, \n\t\t*if male \n\t\t\thandsome.\"\n\t\t*if female \n\t\t\tdarling.\"\n\t\t\t\n\t\t\"Excellent,\" you respond, returning the wink.\n\t\t\nJust then, someone knocks on the door. When Ceylar says, \"Come in!\" Lorelle opens the door and enters, Vidar coming in after her.\n\nThe warrior is wearing his full battle gear, the two-handed sword strapped around his waist. It's obvious they're ready to go and find the remaining outlaws under Illil's command. Even Lorelle has the pouches attached to her tunic, much like when you first met. Giving you a little smile, the healer says, \"How are you all doing? We were just getting ready to leave, so we came by to pick up ${boggart}.\"\n\n*page_break \n\nPoking his head out from under a dresser, your apprentice soars over to Lorelle, landing lightly on her shoulder and saying, \"Ready!\"\n\nShe giggles, rubbing him under the chin. Stepping forward, Vidar scratches his beard absentmindedly, saying, \"I'm glad to see you're doing better, demon ${hunter}. I hope Ceylar hasn't been too obnoxious.\"\n\nAt this, the swordsman gives him a sideways glance, raising his eyebrow, as the magician responds in mock defense, \"But ${name} hasn't even heard any of my songs or poems yet!\"\n\nVidar shrugs, replying, \"Fair point.\"\n\nTurning to you, Lorelle gives you a meaningful look, saying, \"So, ${name}, would you like to say anything to ${boggart} before we go? We could be gone until later tonight and anything could happen.\"\n*fake_choice \n\t#Frowning, you say, \"What is there to say? He's faced far stronger enemies than this before, and it's not as if I'm going anywhere.\"\n\t\t*set altruism %-5 \n\t\t*set relationship %-5 \n\t\t*set lorelle %-5 \n\t\t*set compassionate %-5 \n\t\tLorelle frowns, perhaps her first true frown you've seen since meeting her. Ceylar anxiously looks back and forth between all of you. Apparently, he doesn't want any tempers to erupt. Vidar just grunts, raising his bushy eyebrows and waiting to see what happens. \n\t\t*if relationship > 49 \n\t\t\tShaking his head, ${boggart} says, \"Something must have happened to you when Illil attacked you, because you've changed.\"\n\t\t*if relationship \u003c 50 \n\t\t\tGlaring at you, he hisses, \"I should have expected as much. Let's just go, Lorelle.\"\n\t\n\t#Grinning darkly, you say, \"Make sure to leave a scar on Illil as a present from me!\"\n\t\t*set resolve %+5 \n\t\t*set relationship %+5 \n\t\t*set vidar %+5 \n\t\tLorelle rolls her eyes good-naturedly, but you can tell even she's not opposed to it. Ceylar chuckles, \"Now that's something he won't forget.\" \n\t\t\n\t\tVidar laughs gruffly, saying, \"And for good measure, I'll leave a scar of my own!\"\n\t\t\n\t\tYour apprentice flashes his fangs, his eyes shining. \"Oh, don't worry. I'd planned on it!\"\n\t\n\t#Looking him in the eyes, you say, \"Just be careful, ${boggart}.\"\n\t\t*set ceylar %+5 \n\t\t*set relationship %+5  \n\t\t*set lorelle %+5 \n\t\t*set compassionate %+5 \n\t\t*if relationship \u003c 50 \n\t\t\tYour apprentice just looks at you suspiciously, as if deciding on whether you're serious or not. Why does he always do that? After a moment, he just nods, giving you a neutral sort of expression.\n\t\t*if relationship > 49 \n\t\t\tGiving you a cheeky salute, your apprentice replies, \"As always, ${name}!\"\n\t\t\t\nWith that, the three adventurers exit the infirmary, out to capture the outlaws. Sighing, Ceylar goes to pick up the cauldron, setting it by the fire pit. Taking an old dusty broom from a cupboard, he sweeps the scattered ashes back into the ring of stones before pulling up a chair beside you. \n\nHe says, \"So, I was thinking I could show you some of my poems. Lorelle told me a little bit about your adventures, so I think I should be able to make something up for you. I'd ask you to elaborate on them, but I bet you're tired of re-telling the same old story over and over again.\"\n\n*page_break \n\nYou nod. There's no denying that. Rubbing his hands together, the magician says, \"Let's see what you think of this. I call it Gardener of the Forest.\"\n\nSuddenly becoming very still, he closes his eyes, resting his hands upon his knees. Taking a deep breath, he begins in an airy, deep tone that almost reminds you of winds drifting through an underground tunnel. \n\n[i]Wise and noble as the oldest of trees[/i]\n\n[i]Master of the forest, the gardener of tranquility[/i]\n\n[i]When fire licked at the treetops and the deepest of roots[/i]\n\n[i]He planted himself and never surrendered[/i]\n\n[i]Not when the inferno took him[/i]\n\n[i]Not when the axes severed his branches[/i]\n\n[i]Not when flames burned him to ashes in sacrifice[/i]\n\n[i]And now the one I cannot forget is—[/i]\n\nCeylar pauses for a moment. You almost think the song has ended, but he starts to inhale and exhale deeply, increasing the pace in what can only be an epic climax, but he surprises you with a prolonged, wavering falsetto:\n[i]you….[/i]\n\nOpening his eyes, he says, \"I knew Eldon somewhat from my dealings in Lorden. He was a good man, and he will be missed.\"\n*fake_choice \n\t#You're unimpressed. The lyrics of this song don't actually reflect your own feelings at all. \n\t\t*set compassionate %-5 \n\t\t*set ceylar %-5 \n\t\tYour lips twitching, you reply, \"Yes, I'm sure he will be.\" When silence falls over the room, you continue, \"You've got some level of talent both lyrically and vocally, but I personally don't see what happened to the late mayor the same as you do. He was simply an unfortunate man caught up in a demon's design, nothing more, nothing less. We would have all liked for things to turn out differently, but look what happened.\"\n\t\t\n\t\tYou motion to the bed you're lying in, grinning mirthlessly. Ceylar looks a little surprised, but he quickly regains his composure. Nodding, he says, \"Well, I'm sorry you feel that way. Perhaps you'll enjoy my next song better, though. It's a little bit more of your style, I hope.\"\n\n\t#You nod slowly, trying to figure out how to put it. \"Well, it was all right, but a little overdramatic.\"\n\t\t*set ceylar %-5 \n\t\t*set charisma %-5 \n\t\t*set stealth %+5 \n\t\tThe magician blushes, and replies, \"Damnit, I was hoping it wouldn't end up seeming like that. Ah, well, I guess I do sometimes overdo it.\"\n\t\t\n\t\tYou shrug and respond, \"Well, that's a risk any artist runs when addressing something like that.\"\n\t\t\n\t\tHe nods and says, \"That's true. Well, maybe you'll like this one a little better.\"\n\t\n\t#Ceylar is a wonderful poet, and this is an honorable way to remember the late mayor. \n\t\t*set ceylar %+5 \n\t\t*set resolve %+5 \n\t\tYour eyes wide, you say, \"Bravo, my friend. Your poetry is impressive and I can't think of a better way to honor Eldon. He would be proud, were he here to listen to it. Perhaps when the time comes, you could even write the markings on his gravestone.\"\n\t\t\n\t\tGiving you a sincere bow, the magician says, \"Why thank you, my\n\t\t*if male \n\t\t\tgood sir! \n\t\t*if female \n\t\t\tlady!\n\t\tHow very gracious of you. I'll have to talk to the Lorden officials about that. Well if you liked this song, I'm certain you'll like the next one I've prepared!\"\n\t\n\t#Tears threaten to build in your eyes. That was beautiful, and it only made the poor mayor's passing seem even more visceral.\n\t\t*set ceylar %+10\n\t\t*set compassionate %+5 \n\t\t*set altruism %+5 \n\t\tSniffing, you feel a lump building in your throat. A tear races down your cheek, and you run your hand across your face, wiping it away. His eyes going wide with concern, the magician takes a seat beside you, placing his hand gently on your shoulder. \n\t\t\n\t\tIn a consoling voice, he says, \"I know it's hard, but we must keep fighting. There was nothing any of us could have done to stop it, but at least Eldon died an honorable death, trying to protect his city.\"\n\t\t\n\t\tYou nod, wiping your eyes again.\n\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\"You're very kind,\" you say warmly.\n\t\t\t\n\t\t\tSmiling, he says, \"And so are you, ${name}. I believe a little kindness can go a long way, especially with someone who's in a sickbed.\"\n\t\t\t*goto sic \n\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\"I'm not usually like this,\" you say hesitantly.\n\t\t\t*goto this \n\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\"I know that I probably couldn't have saved him, but I can't help wondering. What if I did something differently?\"\n\t\t\t\n\t\t\tLooking you in the eyes, Ceylar responds, \"It doesn't do to dwell on the past, my friend. You did as much as you could, and that's all any of us can ask of one another. We're going to make things right, and that's what matters.\"\n\t\t\t*goto sic \n\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\"I'm not usually like this,\" you say firmly, straightening up.\n\t\t\t*label this \n\t\t\t\n\t\t\tShaking his head, Ceylar says kindly, \"It's okay to let your emotions out every once in a while. It keeps you sane, and it's nothing to be ashamed of.\"\n\t\t\t*goto sic \n\t\t*label sic \n\t\t\n\t\tTaking off his hat and setting at your bedside, he says, \"Well, I'm glad you enjoyed my song, but hopefully this next one I've prepared for you will cheer you up.\" \n\nHe smiles, saying, \"This one is rather silly, so I won't hold it against you if you laugh at me. I call it The Mendax Rag! Oh wait…I forgot my lute. Excuse me for a moment.\"\n\n*page_break \n\nLooking a little embarrassed, he leaves the room, turning left down the hallway. A few moments later, he returns, holding the battered lute. Pulling up a chair beside your bed, he sits down, fiddling with the strings. After he's tuned them correctly, he gives you one last grin before strumming up a dizzying and upbeat tune on his instrument. His voice playful and jumpy, he begins to sing.\n\n[i]Don't expect him to give you a reason for being evil[/i]\n\n[i]'Cause he's just that way; he's so medieval![/i]\n\n[i]Don't expect to understand anything that comes from his brain[/i]\n\n[i]'Cause he's crazy, he's a lunatic; he's so insane![/i]\n\n[i]He just wants to eat those souls to replace his own[/i]\n\n[i]'Cause it was battered and broken and now it's gone![/i]\n\n[i]You might think he's a little pathetic, a little sad[/i]\n\n[i]Well you'd be right, and that, my\n*if male \n\t[i]good sir,[/i]\n*if female\n\t[i]lady,[/i]\n[i]is the Mendax Rag![/i]\n\n*line_break \nHe finishes, propping the lute up against your nightstand. \"So,\" he says, smiling sheepishly, \"what do you think?\"\n*fake_choice \n\t#Laughing merrily, you say, \"That was excellent! I'll have to remember to taunt Mendax with that as soon as he's finally defeated.\"\n\t\t*set ceylar %+10 \n\t\t*set charisma %+5 \n\t\tCeylar replies, \"Wonderful! I'm glad you enjoyed it, and that sounds like an amazing idea. I can provide the lute!\" He chuckles, brushing the hair from his face. Giving you another grin, he continues, \"You know, I do really hope I'm there for the end. I want to finish what was started, and repay that demon for everything he's done to you and all the others.\"\n\t\t\n\t\tYou\n\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\tnod quickly, saying warmly, \n\t\t\t*goto warm \n\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\tnod slowly, saying quietly,\n\t\t\t*goto warm \n\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\tnod sagely, saying thoughtfully,\n\t\t\t*goto warm \n\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\tnod, saying firmly, \n\t\t\t*goto warm \n\t\t*label warm \n\t\t\"Thank you, Ceylar.\"\n\t\t\n\t\tOnly time will tell if that will actually be possible, or if you will feel the same way about this. Taking a sip of water from a tankard of his own, he says, \"Well, since you enjoyed this song, I'm certain you'll like the next one even more.\"\n\t\t\t\n\t#You say, \"It was perhaps too silly for my tastes, but you're a very good lute player.\"\n\t\t*set cunning %+5 \n\t\t*set ceylar %+5 \n\t\tCeylar chuckles and shrugs, saying, \"Told you it was goofy! But I'm glad that you liked my lute playing. I've been practicing for years, but as you can tell, my instrument has seen better days.\"\n\t\t\n\t\tHe motions toward the lute, which is indeed second hand. The strings seem worn and the wood is chipping. \"Still,\" you comment, \"you managed to make it sound very good. I admire your creativity!\"\n\t\t\n\t\tHe says, \"That's very kind of you. I like to think of myself as an all around entertainer, so it's always good to hear that some of my other skills are appreciated.\" Taking a sip of water from a tankard of his own, he says, \"Well, I didn't have enough time to compose any music for this next song, but I think you'll like the direction of the lyrics a lot more.\"\n\t\n\t#Rolling your eyes, you reply, \"I don't think something as serious as this should be taken so lightly.\"\n\t\t*set ceylar %-5 \n\t\t*set resolve %+5 \n\t\tCeylar looks a little hurt, but quickly hides it. Shrugging, he says, \"I did warn you. I'm sorry if I made you uncomfortable, though. That wasn't my intention, and I didn't mean to make this whole thing seem less than it really is. I just think that sometimes, the best way of coping is turning your situation around and making something good of it, even if it's just something little like this. That, and Mendax deserves our scorn. But if it will make you happy, I won't repeat any of that.\"\n\t\t\n\t\tRaising your eyebrows, you reply, \"Oh, that demon certainly has all my scorn. I just don't think it does anyone any justice to have it all reduced to some childish ditty.\"\n\t\t\n\t\tThe magician swallows hard. Looking away, he murmurs, \"I apologize. Hopefully this next song will speak to you on a deeper level. The lyrics go in a far different direction and I think it's about something you can agree with.\"\n\t\t\n*page_break \nStanding up, he begins to pace, his arms hanging at his side. Taking a deep breath, he says, \"I call this The End of a Terror.\" His voice firm and powerful, he begins.\n\n[i]A demon appeared in our world, eager for blood[/i]\n\n[i]Chaotic and cunning, he ravaged the land[/i]\n\n[i]But a hunter of demons set chase[/i]\n\n[i]Defying odds and defeating everyone in ${dhis} way[/i]\n\n[i]And when this devil and the ${hunter} finally collided[/i]\n\n[i]A pure destructive force, the demon prevailed[/i]\n\n[i]But the ${hunter} survived, and continues to fight[/i]\n\n[i]And when ${dhe} returns, it will be the end of a terror[/i]\n\n*page_break \nTaking a deep breath, he walks over to the open window, leaning on the windowsill and looking outside, seemingly deep in thought. Glancing over at you, he gives you a curious smile, saying, \"I believe you can do it, ${name}. If anyone can, it's you, and all of us are willing to help you bring this demon down, whatever it takes.\"\n\nYou suppose now is as good of a time as any to tell the magician of your plans for how to defeat Mendax. After all, there's no way you'd be able to face him again, even with this group of adventurers by your side. Indeed, that may actually worsen your chances. Melithar the Eccentric is the only one who can stop the demon. Turning around, Ceylar gives you a searching look, waiting for your response.\n\nSighing, you explain, \"I would surely fail, were I to battle Mendax again. The only one who would be capable of solving this is a wizard, which is why I'm going to petition Melithar the Eccentric to banish the demon.\"\n\nYou pause for a moment, thinking about what to say next.\n*fake_choice \n\t#\"I want you to go with me, Ceylar. I would feel much better with you at my side,\" you say, looking into his eyes.\n\t\t*set ceylar %+10  \n\t\t*set charisma %+5 \n\t\tGiving you a dazzling smile, he responds, \"It would be my pleasure. I will go wherever you go, my\n\t\t*if male \n\t\t\tgentleman.\"\n\t\t*if female \n\t\t\tlady.\"\n\t\t\n\t#\"I would like for you and the others to accompany me. You saved me, so now you're a part of this, and I only think it's fair that you see it through to the end, like you wanted.\"\n\t\t*set ceylar %+5 \n\t\t*set vidar %+5 \n\t\t*set lorelle %+5 \n\t\tThe magician replies, \"I'm glad you agree! I would be delighted to go with you. I'll be sure to tell the others as soon as they return.\"\n\t\t\n\t#\"I would appreciate it if you and the others would escort me to Melithar's Mountain. I'm still weakened and without my usual weapons, it might be dangerous for me to go alone.\"\n\t\t*set ceylar %+5 \n\t\t*set lorelle %+5 \n\t\t*set vidar %+5 \n\t\t*set altruism %-5 \n\t\tNodding, Ceylar responds, \"Yes, that seems sensible. Together, I'm sure we'd all make a formidable group, so we shouldn't have a problem unless Mendax actually catches up with us.\"\n\t\n\t#\"I'd prefer that you stay out of this, but I suppose it would be safer for me if you and the others came along. I'm still weakened and without my usual weapons, it might be dangerous for me to go alone.\"\n\t\t*set ceylar %-5 \n\t\t*set lorelle %-5 \n\t\t*set vidar %-5 \n\t\t*set altruism %-5 \n\t\tCeylar nods, \"Well, I can't fully understand, but I would be honored to go with you. If I can play even a small part in defeating Mendax, I will be satisfied. He is a threat to the whole region, and that includes Quader.\"\n\t\t\nPicking up his hat, he puts it on, brushing his hair over his shoulders. Looking outside, where the light has begun to fade, he says, \"Anyways, I think this is a very solid plan. I knew you would think of something.\" He pauses for a moment before continuing, \"Well, now that this matter is settled, I think it's time I made you another meal. Unfortunately, it won't be anything much, but it's all we have at the moment, thanks to that demon.\"\n\n*page_break \n\t\nOver the next several minutes, the magician sets about the kitchen half of the infirmary, preparing the soup in the cauldron, which he had to clean out very well after your apprentice had been in it. It's somewhat like the insubstantial broth you'd apparently been fed the previous three days, but he does manage to find a few different things to add to it. Soon afterwards, he's prepared a bowl for each of you, as well as Lorelle, ${boggart}, and Vidar, who are expected to return shortly. \n\nCeylar hands you your bowl. As you blow on the contents to cool it down, he thinks aloud, \"I wonder how everything went. As you saw before, Vidar can easily handle simple outlaws, but you never know with Illil. He may not look it, but he's quite clever. He's managed to evade us for all this time, which has to count for something.\"\n\nSuddenly, ${boggart} soars in the room, saying, \"I smell food! I'm starving!\"\n\nLaughing in surprise, Ceylar points to a table in the center of the other half of the room, saying, \"Your bowl is over there, ${boggart}.\"\n\nLanding lightly on the table, your apprentice replies hurriedly, \"Thanks!\" before digging in and lapping at the soup.\n\n*page_break \n\nCeylar shoots you an amused grin. ${boggart} does seem even more excitable than usual. Coming in after him, Lorelle and Vidar enter the room. Vidar has a small cut across his cheek, and he seems very upset about something. When the magician waves at him in greeting, he just grumbles in reply and heads over to the table, immediately setting to work on his soup. \n\nWhen you and Ceylar give Lorelle a questioning look, she sighs, leaning against a counter. Looking tired, she explains, \"We managed to capture the remaining three outlaws under Illil, but Illil himself escaped again. Not to mention he gave Vidar that little cut. It was nothing to him, really, but he seemed to take it as an insult. I offered to take care of it, but he insisted that he didn't need me to.\"\n\nAlready finished with his soup, Vidar looks to be in a slightly better mood now. Brushing the dreads from his eyes, he interjects in his baritone voice, \"It's useless to try to catch him. Not only is he abnormally quick, but that ring that he uses allows him to sense what he wants to know. Every time I get close to him, he knows! That's how he was able to ambush us, or he never would have 'injured' me. Regardless, I don't think I'll be able to get him.\"\n\nGiving Ceylar a meaningful look, he says, \"Ceylar, why don't you try going after him tomorrow? Your attacks are long-ranged so you should be able to stay far enough away that he can't detect you with that ring of his. Then you can just zap him with your lightning. ${boggart} can sniff him out and lead you to him, like today.\" The warrior pauses for a moment, then adds, \"I can stay here and watch after ${name} while you're gone.\"\n\nNodding, Lorelle looks at you, saying, \"That seems like a good idea. Speaking of which, how are you feeling?\" \n*fake_choice \n\t#You give her a subtle wink, saying, \"Really well, now that you're here.\"\n\t\t*set lorelle %+10 \n\t\t*set charisma %+5 \n\t\tThe healer blushes, saying, \"You're too kind, ${name}. By tomorrow you should feel even better. I expect you'll be able to walk around on your own by then.\"\n\t\t\n\t\tCeylar takes one look at her now rosy cheeks and laughs, and Vidar rolls his eyes and grumbles, but can't help himself from grinning.\n\n\t#\"Much better, thanks to you and Ceylar,\" you reply, smiling.\n\t\t*set compassionate %+5 \n\t\t*set lorelle %+5 \n\t\tThe healer looks pleased, saying, \"Oh, wonderful. I had hoped so. You should be feeling well enough to move around tomorrow.\"\n\t\t\n\t\tThe magician nods, doing another one of his exaggerated bows and adding, \"It's my pleasure, ${name}.\"\n\t\n\t#Shrugging, you reply, \"Better than yesterday.\"\n\t\t*set altruism %-5 \n\t\t*set lorelle %-5 \n\t\tThe healer looks away, replying, \"Well, you should be feeling much better tomorrow. By then, I expect you'll be able to move around by yourself.\"\n\t\t\n\t\tCeylar starts whistling, pretending to be fascinated with a scalpel sitting with some of the other medical equipment.\nFinished with his soup, ${boggart} squeaks, \"I'm done eating! I'm going to go to sleep so I'll have plenty of energy before we leave tomorrow.\" \n\nHopping on Lorelle's shoulder, he promptly kisses her on the cheek before jumping onto the bottom of your bed and curling up, already falling asleep. She giggles, saying, \"Aww, he's just the sweetest little boggart. He does have a point, though. We should all get some sleep so we're ready to capture Illil in the coming hours.\"\n\nNodding, Ceylar says, \"I agree, Lorelle.\" Turning to you, he adds, \n*if ceylar > 49 \n\t\"Goodnight, ${name}. Sleep well!\" \n\t\n\tHe gives you a little grin and wave before exiting\n*if ceylar \u003c 50 \n\t\"Night, ${name}.\"\n\t\n\tWith that, he exits \nthe room. Lorelle follows him, saying,\n*if lorelle \u003c 50 \n\t\"I'll see you tomorrow.\"\n*if lorelle > 49 \n\t\"Sweet dreams, ${name}. I'll be seeing you soon.\"\n*finish Continue  ", "choicescript_description": "After disaster strikes, you are left debilitated in the village of Quader. There, under the care of a warrior, magician, and healer, you manage to slowly recuperate. Meanwhile, yet another new enemy lurks in the shadows, and old acquaintances from Lorden make their own appearances.\n\nAs Mendax the demon puts continuous pressure on you mentally, you and your apprentice must find the strength to continue in order to petition to Melithar the Eccentric. You fear the ancient wizard is the only one powerful enough to defeat this Netherworldian foe.\n\n[i]Foundation of Nightmares[/i] is a 100,000 word interactive fantasy novel by Samwise Harry Young, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n• Play as male or female; gay, bi, or straight[n/]\n• Romance several characters or none at all![n/]\n• Enjoy an adventure full of magic, friendship, and evil villains[n/]\n• Several illustrations to enhance your experience[n/]\n• Battle bandits and demons\n", "choicescript_stats": "BASIC INFORMATION:\n*stat_chart\n\ttext name Name\n*line_break \nATTRIBUTES:\n*stat_chart\n\topposed_pair Compassionate\n\t\tScornful\n\topposed_pair Altruism\n\t\tAvarice\n\tpercent cunning Cunning\n\tpercent charisma Charisma\n\tpercent stealth Stealthiness \n\tpercent resolve Resolve\n*line_break \nRELATIONSHIPS:\n*stat_chart \n\tpercent relationship Relationship With ${boggart}\n\tpercent illucio Relationship With ${Illusia}\n\tpercent falcon Relationship With Falcon\n\tpercent callidus Relationship With Callidus \n\tpercent gertrude Relationship With Gertrude\n\tpercent garnet Relationship With Garnet \n\tpercent gretta Relationship With Gretta \n\tpercent gretchin Relationship With Gretchin \n\tpercent lorelle Relationship With Lorelle\n\tpercent vidar Relationship With Vidar\n\tpercent ceylar Relationship With Ceylar\n\tpercent melithar Relationship With Melithar\n*line_break \nHEALTH, INVENTORY, AND OTHER INFORMATION:\n*stat_chart \n\ttext health Vitality\n\t\n\n\ttext mana Apprentice's Mana\n\t\n\n\ttext gold Gilded Pieces\n\t\nApprentice's Transformation:\n*if transformations_toad\n\tPoisonous Toad - requires 1 mana.\n\t*goto inventory \n*if transformations_viper\n\tElectric Viper - requires 2 mana.\n\t*goto inventory \n*if transformations_eagle\n\tEagle - requires 3 mana.\n\t*goto inventory \n?\n\t\n*line_break \n*label inventory\nInventory: \n*if darts=6 \n\t6 poisonous darts,\n*if darts=5\n\t5 poisonous darts,\n*if darts=4\n\t4 poisonous darts,\n*if darts=3\n\t3 poisonous darts,\n*if darts=2\n\t2 poisonous darts,\n*if darts=1\n\t1 poisonous dart,\n*if chain \n\tsilver chain,\n*if iron=8\n\tiron shavings 8/8,\n*if iron=7\n\tiron shavings 7/8,\n*if iron=6\n\tiron shavings 6/8,\n*if iron=5\n\tiron shavings 5/8,\n*if iron=4\n\tiron shavings 4/8,\n*if iron=3\n\tiron shavings 3/8,\n*if iron=2\n\tiron shavings 2/8,\n*if iron=1\n\tiron shavings 1/8,\n*if salt\n\tsalt,\n*if knife\n\tknife,\n*if food\n\tfood and water,\n*if rune\n\tteleportation rune,\n*if candles\n\tcandles,\n*if flint\n\tflint and metal,\n*if shield \n\trazor shield,\n*if marble \n\tmarble grenades,\n*if mythril \n\tmythril armor,\n*if ointment=2\n\ta full jar of healing ointment,\n*if ointment=1\n\thalf a jar of healing ointment,\n*if daggers \n\tVenefira's daggers,\n*if charm \n\t${Illusia}'s blood charm,\n*if poison\n\tVenefira's vials of poison,\n*if gauntlets \n\tstudded steel gauntlets,\n*if wind \n\tWind Scythe potion,\n*if flame \n\tFlame Devil potion,\n*if vines \n\tConstricting Vines potion,\n*if ice\n\tGnawing Frost potion,\n*if earth \n\tEarth Abyss potion,\n*if destruction=1\n\tdestruction grenade,\n*if concussion=2\n\t2 concussion grenades,\n*if concussion=1\n\t1 concussion grenade, \n*if tear=3\n\t3 tear gas grenades,\n*if tear=2\n\t2 tear gas grenades,\n*if tear=1\n\t1 tear gas grenade, \n*if amulet\n\ta peculiar amulet,\n*if staff\n\tchemically infused staff,\n*if handcuffs\n\thandcuffs,\n*if smart\n\tthe Ring of Owls,\n*if lions\n\tthe Ring of Lions,\n*if persuasion\n\tthe Ring of Dragonflies,\n*if shadows\n\tthe Ring of Spiders,\n*if fancy_pack\n\ta fancy backpack,\n*if book\n\tDemon Book of Names.\n\nGLOSSARY: \n*label glossary\n*choice\n\t#Demons\n\t\tDemons are the primary inhabitants of the Netherworld, an alternate world directly connected to yours. They vary greatly in appearance, but are generally humanoid and range from the size of a human baby to that of a massive grizzly bear. Demonic society is based around individuals' power levels. The weakest demons are essentially slaves, whereas the most powerful are militant tyrants. The hierarchy of demons is as follows:\n\n\t\tPeon - capable of killing one average human.\n\n\t\tVermin - capable of killing five average humans.\n\n\t\tCretin - capable of killing ten average humans. \n\n\t\tMaster - capable of killing twenty average humans.\n\n\t\tSovereign - capable of killing fifty average humans.  \n\n\t\tThere are approximately one million demons, with each increasing rank exponentially less populated. Sovereigns live in a demonic paradise, extorting, torturing, and enslaving whomever they desire. There is, however, a possible reprieve for lesser demons. All the inhabitants of the Netherworld are able to escape through a portal and into your world, Lume. This is how magical creatures originated. Every portal is guarded by celestial beings whose powers vary in direct accordance to the strength of the demon(s) attempting to escape. \n\n\t\tPeons' guards are relatively easy to overcome, whereas Sovereigns' guards are nearly impossible to defeat. A Sovereign has never been able to enter Lume, though they hardly mind, having their own perfect dystopia in the Netherworld. Like magical creatures, all magical and powered abilities are derived from powerful demons. Non-demonic beings are often ranked in the same hierarchy of power.\n\t\t*goto glossary\n\n\t#Supernatural Abilities\n\t\tMagic - Magic is the ability to harness supernatural discharge from the Netherworld. Wizards are the only individuals who can directly wield this power.\n\n\t\tPowers - Powers are supernatural abilities purchased from high-ranking demons. Alternately, they can be obtained through absorption of supernatural discharge from the Netherworld. Individuals with powered abilities fall into one of four categories: sorcerer/sorceress, witch/warlock, vampire, or magician. Finally, every demon possesses powered abilities.\n\t\t*goto glossary\n\n\t#Notable Magic and Power Wielders\n\t\tSorcerers - A sorcerer performs demonic rituals in order to siphon abilities from high-ranking demons. These rituals can involve any manner of horrendous acts. Sorcerers have been known to supply demons with valuable information, summon them into Lume, and even offer their own bodies for the demon's sexual pleasure.\n\n\t\tWitches and Warlocks - Witches and warlocks sacrifice the innocent to high-ranking demons in exchange for power. This is especially heinous because it is believed that the victims are used as slaves or food in the Netherworld. Witches and warlocks are paralyzed by the touch of silver.\n\n\t\tVampires - A vampire has sacrificed his soul—and thus his ability to feel compassion, empathy, or love—to a high-ranking demon. In exchange, he receives biological immortality, heightened senses, and a unique magical ability. He must, however, sustain this pseudo-life by consuming the blood of the living. Vampires also have ethereal wings, which allow them to glide. They are particularly susceptible to salt, compelled to count each grain before pursuing other endeavors. \n\n\t\tThese undead creatures also posses extreme agility, climbing like spiders, as well as increased intellect, strength, and speed. They have numerous healing abilities, including immunity to poisons. Though already extremely powerful themselves, their magic has also been known to affect their homes, instilling them with magical traits that increase over time.  \n\n\t\tWizards - Wizards use their vast intelligence to unlock the restrictive barriers that keep magic from humanity. They harness the Netherworld's discharge, then use the dynamic forces to accomplish almost anything imaginable.\n\n\t\tMagicians - Aside from directly obtaining magical abilities, there is one other way to acquire them. Magical discharge from the Netherworld can be naturally absorbed into people's inner workings—during their infancy, when they are most susceptible to evolution—granting those persons access to magic. However, estimates suggest these powers are limited to about one in 100 people and are rather weak and cannot grow, unless guided by a particularly powerful wizard. \n\n\t\tBoggarts - Boggarts originated from the Netherworld. Long ago, when the first boggarts escaped from the demonic dimension, they assimilated easily into Lume. Their mana levels correspond with their sizes, which range from a small kitten to a large dog.\n\t\t\n\t\tBoggarts can transform into another creature of similar or lesser size for a short period of time. Additionally, they are able to scent out dark magic wielders, and they possess swift regenerative abilities. It should also be mentioned that boggarts are generally sociable, if not verbose, and feel best when they are included. \n\t\t*goto glossary\n\n\t#Special Weapons\n\t\tIron - Iron burns like an acid when used against universally evil creatures: demons, witches/warlocks, sorcerers/sorceresses, and vampires. When used against other criminals or magical creatures, the effects are often minimal and unpredictable.\n\n\t\tSalt - Salt mesmerizes vampires, who are compelled to count each grain. A lesser vampire is entranced for a few moments. This weapon can only be used once per encounter, as the creatures soon shake off the salt's influence.\n\n\t\tSilver - Silver instantly paralyzes witches and warlocks wherever it touches.\n\n\t\tDemon Book of Names - A Demon Book of Names is impervious to all but the strongest forms of destruction, due to runic magical protections. It contains the necessary information to banish a demon. With the knowledge of a demonic entity's true name, you can order them to return to the Netherworld after a physical defeat. Demons can be banished indirectly if they are deprived of a vessel for an extended period. However, banishing them through named incantations ensures a swift and definitive success. \n\t\t\n\t\tThese magical bestiaries were created by
