r the third time, you say, \"I call a draw by repetition.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\tShaking his head with a sigh and a smile on his face, he says, \"It's been a very long time since someone held me to a draw like that. It's not exactly the most exciting game I've ever had, but then again, you avoided the loss, at least.\" He pauses, then adds \n\t\t\t\t\t*if games = 2 \n\t\t\t\t\t\twith a chuckle, \"Well, I think I've had enough of playing against a brick wall. \n\t\t\t\t\t\t*label done_playing \n\t\t\t\t\t\tI had fun, though, and these games seem to have distracted you well enough!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if talk = 2 \n\t\t\t\t\t\t\t*goto sleep\n\t\t\t\t\t\t*goto talk_vidar \n\t\t\t\t\twith an arched eyebrow, \"Would you like to try again?\"\n\t\t\t\t\t*goto rematch \n\t\t\t\t\t\t\t\n\t\t\t\t#Unfortunately, you don't have very much experience with chess, or board game tactics and strategy in general, for that matter. You suppose you'll just have to follow through with it, seeing how it ends up going.\n\t\t\t\t\tAlthough you aren't an avid chess player, you have watched a few people play some games of their own, so you are familiar with some basic strategies and tactics. You begin with e4, the most popular move, but Vidar surprises you by gambitting a pawn on his first move! You accept it, but he just continues on unconcerned, developing his pieces to attack your extra pawn. You defend it with another pawn move, but before long the warrior has managed to gain a lead in development and stronger control of the center.\n\t\t\t\t\t\t\t\n\t\t\t\t\tWhile you struggle to catch up, Vidar angles all of his pieces toward your uncastled king, whereas you have been neglecting the development of your own pieces. Before long, he unleashes a blistering attack against your monarch which ends up in a very nice checkmate.\n\t\t\t\t\t\n\t\t\t\t\t*page_break \n\t\t\t\t\t\t\t\n\t\t\t\t\tGrinning beneath his sizable beard, he claps you in a friendly way on the shoulder and says, \"Usually, it's not a good idea to be greedy and hold onto a pawn like that if it means you can't develop enough pieces in time. It did give you somewhat of an advantage with that material, but you have to know how to use it correctly. At least your king died with a full stomach. Good game!\"\n\t\t\t\t\t\t\t\n\t\t\t\t\tLetting out a sigh, but giving him a small smile nonetheless, you reply\n\t\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\t\t*label j \n\t\t\t\t\t\tjokingly, \"But…I didn't want my pawn to be just a pawn.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\tVidar closes his eyes and slaps his forehead, and you just laugh. What other reaction can you really hope for with puns?\n\t\t\t\t\t\t*goto jj \n\t\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\t\tthoughtfully, \"Yes, that was very sneaky of you. Maybe I'll play that gambit line next time.\"\n\t\t\t\t\t\t*goto jj \n\t\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\t\tsincerely, \"I'll certainly keep that in mind for future games.\"\n\t\t\t\t\t\t*goto jj \n\t\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\t\twith a grunt, \"Yeah, I figured, but I'm not one to give up material so lightly, especially if I'm up.\"\n\t\t\t\t\t\t*goto jj \n\t\t\t\t\t*else \n\t\t\t\t\t\t*goto j \n\t\t\t\t\t*label jj \n\t\t\t\t\tYou scratch the back of your head and continue, \"Well, needless to say, I think I've had enough chess for the night.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\tThe warrior nods understandingly and begins to put the pieces away, saying, \"Fair enough.\"\n\t\t\t\t\t*if talk = 2\n\t\t\t\t\t\t*goto sleep \n\t\t\t\t\t*goto talk_vidar \n\t\n\t\t#Scooting over on your bed, you pat the spot beside you and give him a hopeful grin, responding, \"How about you come and keep me company? I'm exhausted, but I want you to stay here with me, perhaps even for the rest of the night.\"\n\t\t\t*set vidar %+15\n\t\t\t*set charisma %+5 \n\t\t\t*set talk +1 \n\t\t\tVidar gives you a wolfish grin through his bushy beard, responding, \"I'm liking that idea already. Maybe we'll both feel better.\"\n\t\t\t\n\t\t\tThe warrior begins to come closer to your bedside, when he notices ${boggart} curled up on the bottom of the bed, peering up at him with one sleepy eye. Vidar looks thoughtful, then glances at you expectantly, saying, \"Hmph. I wouldn't want to disrupt our little boggart friend.\"\n\t\t\t*fake_choice \n\t\t\t\t#You shrug and say, \"Who cares? This is my bed anyways. He can find another one of his own.\"\n\t\t\t\t\t*set altruism %-5 \n\t\t\t\t\t*set relationship %-5 \n\t\t\t\t\t*set vidar %+5 \n\t\t\t\t\t*set boggart_gone true \n\t\t\t\t\tThe boggart hisses angrily, but is apparently too tired to put up very much of a fight. After making a rude hand gesture at you and muttering something under his breath, he flutters off to the other side of the small infirmary, alighting onto a pillow and quickly curling up again. Vidar raises an eyebrow, but then just shrugs and comments, \"Well, whatever works, I guess.\"\n\t\t\t\t\t\n\t\t\t\t\tHe doesn't seem too fond of your method of kicking your apprentice out of the bed. On the other hand, though, he does seem happy to be alone with you, at least to some extent. \n\t\t\t\t\n\t\t\t\t#Biting your lip, you think about it for a moment. Your face pensive, you say, \"Well, he was here first, after all, but I don't want you to leave either. Maybe he can just stay where he is? He won't bother us, I'm sure.\"\n\t\t\t\t\t*set relationship %+5 \n\t\t\t\t\t*set vidar %-5 \n\t\t\t\t\t*set altruism %+5 \n\t\t\t\t\t*set boggart_bed true  \n\t\t\t\t\tYour apprentice smiles from the bottom of the bed, looking grateful that he doesn't have to be interrupted. \n\t\t\t\t\t*if relationship > 64 \n\t\t\t\t\t\t\"Yay!\" he squeaks sleepily.\n\t\t\t\t\t*if relationship \u003c 50 \n\t\t\t\t\t\t\"Finally you're being sensible,\" he mumbles, though you notice he isn't as cutting about it as he normally would have been.\n\t\t\t\t\t*if ((relationship > 49) and (relationship \u003c 65))\n\t\t\t\t\t\tHe simply says, \"Thanks.\" Even so, he does look somewhat annoyed that he'll be sharing the bed with so many people.\n\t\t\t\t\t\t\n\t\t\t\t\tThe warrior just shrugs, looking a little disappointed. He responds, \"Whatever you think is best.\" He adds in a rumble, \"I'm not sure how much room we'll have to really get comfortable, though.\"\n\t\t\t\t\n\t\t\t\t#Not wanting things to be awkward for Vidar, you grin slyly and nudge your apprentice, telling him, \"Hey, ${boggart}, if you let him borrow your spot for a while I'll make it up to you later. Perhaps with some extra boggart treats?\"\n\t\t\t\t\t*set cunning %+5 \n\t\t\t\t\t*set relationship %+5\n\t\t\t\t\t*set boggart_gone true \n\t\t\t\t\t*set vidar %+5 \n\t\t\t\t\tYour apprentice doesn't look happy about it at first. After thinking it over for a moment, \n\t\t\t\t\t*if relationship > 64\n\t\t\t\t\t\tthough, he finally relents. He cracks a toothy smile and squeaks groggily, \"Sure, anything for those delicious Impish Delights!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYawning, he flutters off the bed over to the other side of the room, landing on a fluffy pillow and quickly snuggling into it. \n\t\t\t\t\t*if relationship \u003c 50 \n\t\t\t\t\t\the just narrows his eyes and responds suspiciously, \"How can I be certain that you'll keep your end of the promise?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYour smile quickly drops and you give him a deadpan look. \"You aren't really helping your chances any by being so stubborn,\" you grunt.\n\t\t\t\t\t\t\n\t\t\t\t\t\tRolling his eyes, your apprentice finally says, \"Fine, fine,\" and flutters off, muttering under his breath and cuddling up to a fluffy pillow on another bed. \n\t\t\t\t\t*if ((relationship > 49) and (relationship \u003c 65))\n\t\t\t\t\t\tthe boggart simply shrugs and says, \"Sure, why not? I do miss those scrumptious morsels.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tWith that, he flaps his wings briefly and lands onto another infirmary bed, quickly assuming a sleeping position. \n\t\t\t\t\t\t\n\t\t\t\t\tThe warrior lets out a husky laugh before remembering to keep quiet. \"You're developing quite a method there, demon ${hunter},\" he comments.\n\t\t\t\t\t\n\t\t\tWith that settled, Vidar climbs into your bed, quickly getting under the covers and pressing his body against yours. With the warrior so close, you notice his distinct, musky smell, but you find the pheromones strangely intoxicating. \t\n\t\t\t*choice \n\t\t\t\t#You grin slyly and give him a sloppy kiss on his cheek and then wrap your arms and legs around his body, snuggling your head against his muscular chest. \n\t\t\t\t\t*set vidar %+10 \n\t\t\t\t\t*set resolve %+5 \n\t\t\t\t\tVidar gives a soft, throaty, \"Mmm\" and wraps his arms around you in turn, holding you softly but firmly at the same time. \n\t\t\t\t\t\n\t\t\t\t\tYou can feel your heartbeat quickening and your face begin to turn red, and his breathing starts to get heavier, the faint wind tickling your ear. You start to move your hands around his back and arms, relishing the toned muscles, and he kisses your forehead with his plump lips, kneading his calloused fingers into you hair.\n\t\t\t\t\t\n\t\t\t\t\tThe stress practically seeps from your body, and here in his arms, you feel better than you have in a very long time. Nibbling on his earlobe for a moment, you whisper just loud enough for him to hear, \"We should do this more often.\"\n\t\t\t\t\t\n\t\t\t\t\t*page_break \n\t\t\t\t\t\n\t\t\t\t\tEven with Vidar's head nested above yours, you can almost feel him smile. His voice even huskier than usual, he responds, \"I was hoping you would say that.\"\n\t\t\t\t\t*label cuddled2\n\t\t\t\t\t\n\t\t\t\t\tYou don't know how long you lay there, cuddled against Vidar. His alluring scent and comfortable warmth envelope you, and you feel safer and more content than you can remember ever feeling. His rhythmic breathing almost lulls you to sleep, and it would, if not for \n\t\t\t\t\t*if talk = 1\n\t\t\t\t\t\ta nagging restlessness caused by your dreams. Despite how much you wish you could just fall asleep together, it seems that won't be possible, at least not for another while.\n\t\t\t\t\t\t\n\t\t\t\t\t\tStirring slightly, you smile at him and kiss his cheek, then say, \"Sorry, Vidar, but I can't get to sleep. Can we do something else?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe warrior blinks sleepily but nods his head, causing his dreadlocks to bounce up and down comically. \"Absolutely,\" he rumbles. \"As long as it's with you.\"\n\t\t\t\t\t\t*goto talk_vidar \n\t\t\t\t\t*if boggart_gone \n\t\t\t\t\t\tyour apprentice's loud snoring from across the room.\n\t\t\t\t\t*if boggart_bed \n\t\t\t\t\t\t${boggart}'s twitching and jerking at the foot of the bed.\n\t\t\t\t\tEven so, you eventually manage to drift off to sleep, wondering if this brave warrior can really improve your life after everything that has happened.\n\t\t\t\t\t*goto morning \n\t\t\t\t\n\t\t\t\t#You squeeze his arm gently but then roll over and press your head into his chest. You're content just to have his presence and feel his warmth beside you. \n\t\t\t\t\t*set stealth %+5 \n\t\t\t\t\t*set vidar %+5 \n\t\t\t\t\tVidar scoots a little bit closer and kisses your forehead affectionately, wrapping his muscular arms around you loosely. You nuzzle your head closer into his toned chest, taking a deep breath and reveling in his scent. You can see him smile out of the corners of his eyes, and he rumbles softly, \"This is wonderful.\" After a brief pause, he adds, \"You're wonderful.\"\n\t\t\t\t\t\n\t\t\t\t\tBeaming up at him, you respond, \"Thanks for spending time with me and being here for me.\" You rest your head back down on his chest, and after a few moments you feel yourself getting sleepy.\n\t\t\t\t\t*goto cuddled2 \n\t\t\t\t\t\n\t\t\t\t#Moving closer to him, you grab him around the waist and pull him tightly against you. Then, you press your lips to his, kissing him deeply. You want to push things a little further. You're tired of waiting, and this is finally your chance.\n\t\t\t\t\t*set resolve %+5 \n\t\t\t\t\t*set altruism %-5 \n\t\t\t\t\t*set vidar %-5 \n\t\t\t\t\tThe warrior seems somewhat surprised at how brazen you're being, but pleasantly so. He grips your waist tightly and kisses you back. You can feel his heart beating hard against your own chest, and his breath is warm against your face. Feeling yourself flush with excitement, you push your hands against his chest and roll over on top of him, giving him a wolfish grin.\n\t\t\t\t\t\n\t\t\t\t\tVidar looks up at you with his startling dark eyes, his expression a mix of confusion and desire. When you begin to move your hands down his body, he grabs them softly and whispers, \"Wait, what about ${boggart}? I don't think this is the right time for this.\"\n\t\t\t\t\t\n\t\t\t\t\t*page_break \n\t\t\t\t\t\n\t\t\t\t\tYou glance over\n\t\t\t\t\t*if boggart_bed \n\t\t\t\t\t\tat the boggart only a few beds away, spread out like a starfish on a fluffy pillow. He hasn't woken up yet, and he seems to be sleeping soundly, but you never know when he'll suddenly wake.\n\t\t\t\t\t*if boggart_gone \n\t\t\t\t\t\tand look at your apprentice just a couple feet below you. He hasn't woken up yet, but he has started to stir slightly and mumble in his sleep.\n\t\t\t\t\tEven so, you just give Vidar a mischievous grin and respond by whispering in his ear, \"Trust me, he won't even notice.\"\n\t\t\t\t\t\n\t\t\t\t\tYou start to rub his thighs again but he moves out from underneath you, frowning now. Almost seeming to forget about the boggart in the room, he rumbles a little too loudly, \"Well, I don't feel comfortable doing this with ${boggart} here. I would love to another time, but it just feels disrespectful and risky right now.\"\n\t\t\t\t\t\n\t\t\t\t\tSighing, you reply, \"Okay, I apologize. Keep your voice down. I guess I got a little carried away.\"\n\t\t\t\t\t\n\t\t\t\t\tHis expression softening, the warrior says, \n\t\t\t\t\t*if talk = 1 \n\t\t\t\t\t\t\"Well, don't worry about it, okay? Let's just do something else.\"\n\t\t\t\t\t\t*goto talk_vidar \n\t\t\t\t\t\"Let's just forget about it.\" He gives you a small chipped-tooth grin and continues, \"Still, I wouldn't mind keeping your bed warm for a few more hours.\"\n\t\t\t\t\t\t\n\t\t\t\t\tYou smile a little and cuddle up against him, your heart still racing faster than normal. As the exhaustion starts to settle in again, you rest your head against his chest as it rises and falls gently with his breath. \n\t\t\t\t\t\t\n\t\t\t\t\tDespite how this attempt went poorly, you wonder if things could go further later on. That would take a mountain of stress off your back, and you can't imagine a better person to do it with than Vidar.\n\t\t\t\t\t*goto morning \n\t\t\n\t\t#Thinking about what happened earlier today, you suspect Vidar might need some comforting himself, or at least an emotional release. You give him a small smile and reply, \"I would really appreciate it if we could talk for a while, just to clear my mind and distract me from all of this.\" \n\t\t\t*set altruism %+5 \n\t\t\t*set vidar %+5 \n\t\t\t*set charisma %+5 \n\t\t\t*set talk +1 \n\t\t\tThe warrior nods understandingly and pulls up a wooden stool, sitting by the side of your bed. Your apprentice mutters, \"Shh! You're louder than ${name} when he snores and sleepwalks,\" and rolls over. Even so, he quickly falls back asleep, judging by his heavy breathing and the lack of further complaints.\n\t\t\t\n\t\t\tVidar raises an eyebrow and glances at you, amused. \"Sleep walking?\" he asks, grinning.\n\t\t\t\n\t\t\tRolling your eyes \n\t\t\t*if relationship > 49 \n\t\t\t\tgood spiritedly, \n\t\t\t*if relationship \u003c 50 \n\t\t\t\tin annoyance,\n\t\t\tyou explain, \"It happened one time and he can never forget it.\"\n\t\t\t\n\t\t\tVidar chuckles and says quietly, \"I'll keep that in mind. So, what do you want to talk about?\"\n\n\t\t\tYou tell him, \"Actually, I'm a little worried about you, too. I know what happened with Illil has been hard on you. Do you want to talk about it some more?\"\n\t\t\t\n\t\t\t*page_break \n\t\t\t\n\t\t\tThe warrior seems to think about it for a few moments, looking away and letting out a sigh. He finally glances back at you, a tired and sad smile playing across his lips, and says, \"I think I would like that.\" He pauses, then adds, \"I usually try to act a lot tougher than I really am, but sometimes it's good to get this burden off my chest every once in a while.\"\n\t\t\t\t\t\n\t\t\tRubbing his arms nervously, he sits down on the edge of your bed while you nod, listening intently. Vidar continues, \"I guess I'm going to have to get past it somehow eventually, but for now it's nice to know that I have someone who I can talk to about it and who understands what I'm going through.\"\n\t\t\t\t\t\n\t\t\tYou pat him on the shoulder and respond, \"Absolutely, Vidar. I'm here for you.\"\n\t\t\t\t\t\n\t\t\tHe gives you another small smile, then looks away again and rumbles, \"Anyways, I do think the way I handled his cremation will help me cope with the whole situation.\" He frowns, saying, \"Most people would've probably just left him to rot in the streets, but I have more honor than that. I resented him, and even hated him, but even he deserved to go properly.\"\n\t\t\t\t\t\n\t\t\tYou nod and reply, \"Yes, you certainly treated him with a lot of dignity and respect, and I admire you for that.\"\n\t\t\t\n\t\t\t*page_break \n\t\t\t\t\t\n\t\t\tThe warrior waves your compliment away, but you can tell this conversation has brightened his mood considerably, and it seems to have lifted a weight off his shoulders. He says, \"Well, I don't want to keep rambling on forever, but I really appreciate you hearing me out. Thanks again, demon ${hunter}.\"\n\t\t\t\t\t\n\t\t\tYawning deeply, you manage to get out a tired, \"Any time, my friend.\"\n\t\t\t*if talk = 2\n\t\t\t\t*label sleep\n\t\t\t\t\n\t\t\t\tBy now, the night is getting even later, and the exhaustion from before has started to creep its way back. Stifling another yawn, you tell him, \"Well, thanks for keeping me company Vidar. I think I'm going to go ahead and try to get some sleep.\"\n\t\t\t\t\n\t\t\t\tVidar nods sleepily, giving you a tired grin and saying, \"Okay, demon ${hunter}. I think we'll both sleep better, now.\" With that, he rises with a quiet, \"Goodnight,\" and exits the room.\n\t\t\t\t\n\t\t\t\tSighing in contentment, you roll over and rest your head on the pillow, quickly falling into a deep, untroubled sleep.\n\t\t\t\t*goto morning \n\t\t\t\n\t\t\tRaising an eyebrow, he says, \"Do you want to go to sleep now?\"\n\t\t\t\n\t\t\tYou shake your head and reply, \"No, let's do something else for a little while longer. My mind is exhausted, but my body won't let me go to sleep just yet.\"\n\t\t\t\n\t\t\tNodding, the warrior asks, \"That sounds fine to me. What would you like to do, then?\" and looks at you expectantly.\n\t\t\t*goto talk_vidar  \n\t\t\t\t\n\t\t*if (talk = 0) #Keeping your tone of voice kind, you say softly, \"As much as I appreciate the offer, I really would just like to get some sleep. I'm exhausted, and these nightmares have been making me restless lately.\"\n\t\t\t*set vidar %+5  \n\t\t\tVidar just nods for a moment, seeming to think it over. A few seconds later, he finally replies, \"Okay, I can understand that. I hope you manage to get some good sleep for tomorrow, then.\" He gives you a small grin from beneath his bushy beard and adds, \"You're definitely going to need it.\"\n\t\t\t\n\t\t\tWith that, he gives you a wave and steps quietly out of the room, leaving you alone once again. \n\t\t\t*label early\n\t\t\tYou sigh quietly and curl up into your blankets again, wishing the restlessness to go away. Eventually it does, although it doesn't help that \n\t\t\t*if relationship > 64 \n\t\t\t\t${boggart} seems to be giggling in his sleep.\n\t\t\t*if relationship \u003c 50 \n\t\t\t\tthe boggart is being annoying as always, shuffling and muttering in his sleep.\n\t\t\t*if ((relationship > 49) and (relationship \u003c 65))\n\t\t\t\tyour apprentice is such a loud sleeper.\n\t\t\tA few minutes later, though, you drift off to sleep, thinking about how the journey will finally resume tomorrow.\n\t\t\t*goto morning \n\t\t\n\t\t*if (talk = 0) #You shake your head and say curtly, \"Actually, it looks like you all have got everything covered well enough. I panicked for a few moments, but I don't need you here anymore. I'd prefer if you left.\"\n\t\t\t*set vidar %-5 \n\t\t\t*set resolve %+5 \n\t\t\tFor a moment, Vidar just stands there, working his jaw and furrowing his bushy brow. After a moment, though, he finally just sighs and shrugs, responding brusquely, \"Whatever. You're welcome, by the way.\"\n\t\t\t\n\t\t\tHunching his shoulders forward, the warrior hurries out of the room, eager to put some distance between the two of you. He shuts the door behind him, and although he does so quietly, it also has an air of finality to it. \n\t\t\t\n\t\t\tYou roll your eyes, grumbling under your breath, \n\t\t\t*label covers \n\t\t\tand quickly get comfortable under the covers again. Before long, you have fallen asleep, too exhausted to pay much mind to the mental attack Mendax had started just a few minutes ago.\n\t\t\t*goto morning \n\t\t\t\n*label morning \n*page_break \n ", "save_captiveoffortune": "*goto_scene startup begin", "save_demonhunter": "This saved game was created at the end of Volume One, [i]Trial of the Demon Hunter[/i].\nIt must be restored to Volume Two, [i]Captive of Fortune[/i].\n*ending", "save_foundationofnightmares": "This saved game was created at the end of Volume Three, [i]Foundation of Nightmares[/i].\nYou can't restore it until Volume Four is ready.\n*ending", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Allister\"\n*set gender \"Male\"\n*set relationship 65 \n*set cunning 60 \n*set charisma 65 \n*set resolve 69 \n*set compassionate 49 \n*set altruism 48 \n*set health 10 \n*set mana 3 \n*set gold 0 \n*set melithar 50 \n*set lorelle 60 \n*set ceylar 59 \n*set vidar 55 \n*set falcon 60 \n*set boggart \"Valentine\"\n*set inventory \"Demon Book of Names, teleportation rune\"\n\nThe rest of the band draw their weapons, mostly primitive clubs and rusty chains. Even old, poorly fashioned weapons will still be effective, though, especially outnumbered and as weak as you are just now. And the demon, in the background, is still muttering in your head, \"Boil, beat, flay, grind, burn…\"\n\nGiving you a surprisingly pearly smile, the leader brushes his lanky hair from his dirty face. \"So what say you, traveler? Turn out your pockets and we'll let you through.\"\n*fake_choice \n\t#There's no way around it, and you don't want to anger these people. It's not like you have much left in your pockets, anyway.\n\t#Even in your battered and filthy state, it might be possible to persuade them that you're a person of title and not to be trifled with.\n\t#Maybe they'll let you go if you promise them treasure in the future.\n\t#This is idiotic, and you're going to take the first opportunity to escape.\n\t#These outlaws don't exactly look like professionals. Maybe you can intimidate them.\n\n*script changeBackgroundColor(\"black\")\n\n*set name \"Alice\"\n*set gender \"Female\"\n*set relationship 60 \n*set cunning 70 \n*set charisma 64 \n*set resolve 61 \n*set compassionate 45 \n*set altruism 44 \n*set health 15 \n*set mana 3 \n*set gold 0 \n*set melithar 50 \n*set lorelle 45 \n*set ceylar 61\n*set vidar 56\n*set falcon 65 \n*set boggart \"Harlow\"\n*set inventory \"Demon Book of Names, teleportation rune\"\n\t\nThe archer laughs, not even bothering to keep quiet. \"Fancy meeting you here, demon ${hunter}. I never thought I'd see you like this!\"\n\nLooking down at your feet, you see that ${boggart} is awake now, being very careful to remain hidden. Fortunately, he blends into your covers, and the dim, haphazard torch light hasn't revealed him yet.\n*fake_choice \n\t#Try to cover ${boggart} with your blanket before the bandits realize he's here.\n\t#Raise the alarm!\n\t#Maybe you should try to ease the tension until help arrives. Flashing a smile, you say, \"Ah, Falcon. You're even more beautiful than the last time we met!\" \n\t\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Ralto\"\n*set gender \"Male\"\n*set relationship 45 \n*set cunning 60 \n*set charisma 60\n*set resolve 70\n*set compassionate 45 \n*set altruism 44 \n*set health 15 \n*set mana 3 \n*set gold 0 \n*set melithar 50 \n*set lorelle 45 \n*set ceylar 55\n*set vidar 65\n*set falcon 70 \n*set boggart \"Kidas\"\n*set inventory \"Demon Book of Names, teleportation rune\"\n\t\nYou could be walking for hours at a time, and despite your waxing strength, the amount of materials you're carrying will eventually become burdensome. How do you distract yourself and pass the time?\n*fake_choice \n\t#You decide to have a conversation with ${boggart}. It's been a while since the two of you have just talked, and it would be nice to see how he's doing.\n\t#You move a little bit closer to Lorelle while you walk, catching her eye and giving her a smile. You'd like to spend some time with her and maybe flirt a little, too.\n\t#You make your way over to Vidar, bumping his shoulder playfully and grinning. It would be nice to get some more one on one time with him.\n\t#You go over to Ceylar and ruffle his hair flirtatiously with a playful smirk. You're really starting to like the magician and would enjoy more of his company.\n\t#You decide to mind your own business, choosing not to engage any of them in conversation, and instead find something else to do. You'd rather stick with your own thoughts; you're really only traveling with them for practical reasons, not to socialize. \n\t\n*set name \"Rose\"\n*set gender \"Female\"\n*set relationship 70 \n*set cunning 65 \n*set charisma 66\n*set resolve 49\n*set compassionate 55 \n*set altruism 60 \n*set health 15 \n*set mana 3 \n*set gold 0 \n*set melithar 50 \n*set lorelle 65 \n*set ceylar 55\n*set vidar 51\n*set falcon 49 \n*set boggart \"Jupiter\"\n*set inventory \"Demon Book of Names, teleportation rune\"\n\nVidar continues, \"Rumors say that the werewolf had taken up residence in the kingdom of Githrad. It would seem I scared him all the way to the other half of the world! At the end of that fight, though, I was left to take the woman back to the village. Even though my armor was destroyed and I had almost lost my life, I had saved someone else's life, avenged a murder, and stopped a string of very costly burglaries.\"\n*fake_choice \n\t#Giving him a playful frown, you say, \"Hey, why didn't you offer to wrestle me in the mud?!\"\n\t#Smirking, you reply, \"So what you're really trying to say is…you got your butt kicked by some mangy mutt?\"\n\t#Scratching your head, you say, \"Well, to me it seems like you mainly got lucky. Still a success, though, I suppose.\"\n\t#\"Wow, that's incredible!\" you say. \"Defeating a werewolf is no small feat, and you did it without causing any casualties, as well.\"\n\n*if choice_is_ios_app\n\t*finish", "startup": "*title Foundation of Nightmares\n*author Samwise Harry Young \n\n*scene_list\n\tstartup\n\tceylar\n\tvidar \n\tfalcon_vs_gertrude\n\t$ romances\n\t$ travel\n\t$ demons \n\t$ author3 \n\n*create dragonflies false\n*create relationship_l false \n*create relationship_c false \n*create relationship_v false \n*create vidar_live false \n*create ceylar_live false \n*create lorelle_live false \n*create cuddled_ceylar false \n*create cuddled_vidar false \n*create cuddled_lorelle false \n*create jail_falcon false\n*create falcon_flirt false\n*create code false \n*crea Win the affections of a certain magician.\n\tYou and Ceylar are now in a relationship together.\n\n*achievement vidar visible 10 The Hunter and the Warrior\n\tEnamor a mighty fighter.\n\tYou and Vidar are now in a relationship together. \n\t\t\t \n*temp yell false\n*temp sell false\n*temp ask 0  \n*temp eager false\n*temp not false\n*temp evil_story false\n*temp cunning_story false\n*temp stealth_story false\n*temp charisma_story false\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tAfter disaster strikes, you are left debilitated in the village of Quader. There, under the care of a warrior, magician, and healer, you manage to slowly recuperate. Meanwhile, yet another new enemy lurks in the shadows, and old acquaintances from Lorden make their own appearances.\n\n\tAs Mendax the demon puts continuous pressure on you mentally, you and your apprentice must find the strength to continue in order to petition to Melithar the Eccentric. You fear the ancient wizard is the only one powerful enough to defeat this Netherworldian foe.\n\n\t[i]Foundation of Nightmares[/i] is a 100,000 word interactive fantasy novel by Samwise Harry Young, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n\t• Play as male or female; gay, bi, or straight[n/]\n\t• Romance several characters or none at all![n/]\n\t• Enjoy an adventure full of magic, friendship, and evil villains[n/]\n\t• Several illustrations to enhance your experience[n/]\n\t• Battle bandits and demons\n\n\t*if choice_prerelease\n\t\t[i]You can play the first three chapters of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n\t\t*choice\n\t\t\t#Sign up to be notified when the game is available.\n\t\t\t\t*subscribe {\"now\": true}\n\t\t\t\t*restart\n\t\t\t#Play the first three chapters now for free.\n\t\t\t\t*goto purchased\n\n\t[i]You can play the first three chapters of the game for free. Purchase the rest of the game below.[/i]\n\t*if choice_is_advertising_supported\n\t\t[i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n\t*purchase_discount adfree 2017-12-26 $3.99 $2.99 purchased\n\t*if choice_is_advertising_supported\n\t\t*page_break_advertisement\n\t*if not(choice_is_advertising_supported)\n\t\t*page_break Play Now for Free\n\n\n*label purchased\n\nWelcome to Foundation of Nightmares - Volume Three of Demons Among Men!\n\nThis is the third title in a series that began with\n*link https://www.choiceofgames.com/user-contributed/trial-of-the-demon-hunter/redirect.php?src=foundationofnightmares Trial of the Demon Hunter\nand was continued with \n*link https://www.choiceofgames.com/user-contributed/captive-of-fortune/redirect.php?src=foundationofnightmares Captive of Fortune.\n*goto choice \n\t*label choice \n\t*choice\n\t\t#Load a saved game from Captive of Fortune.\n\t\t\t*restore_game cancel=purchased\n\t\t\t*goto purchased\n\t\t#Start a new game.\n\t\t\t*set warlock true \n\t\t\t*set illusia \"Illucio\"\n\t\t\t*set health 10\n\t\t\t*set iron 0 \n\t\t\t*set chain false \n\t\t\t*set flint false \n\t\t\t*set food false \n\t\t\t*set knife false \n\t\t\t*set chain false \n\t\t\t*set staff false \n\t\t\t*set ointment 0\n\t\t\t[i]Previously in Captive of Fortune[/i]\n\t\t\t\t\t\t\t\t\n\t\t\tAfter defeating the ancient vampire, Lord Sarrivan, you found yourself lying in the ruins of his fallen castle. Though the demon you pursued had escaped, you and your apprentice survived. When you came to yourself, you were relieved to see the shape-shifting boggart lying safely beside you. \n\t\t\t*fake_choice\n\t\t\t\t#Your apprentice is named Beckham.\n\t\t\t\t\t*set boggart \"Beckham\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#Actually, his name is Valentine.\n\t\t\t\t\t*set boggart \"Valentine\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#The little imp was referred to as Kidas.\n\t\t\t\t\t*set boggart \"Kidas\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#He is named something else.\n\t\t\t\t\tWhat is his name?\n\t\t\t\t\t*input_text boggart\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\tUnfortunately, the demon's escape was all too predictable. He is unusually powerful and has proven himself elusive so far. It's not as though your vocation is ever exactly easy, besides.\n\t\t\t*fake_choice\n\t\t\t\t#You are a demon hunter.\n\t\t\t\t\t*set male true\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#You are, in fact, a demon huntress.\n\t\t\t\t\t*set female true\n\t\t\t\t\t*set hunter \"huntress\"\n\t\t\t\t\t*set dhe \"she\"\n\t\t\t\t\t*set dhis \"her\"\n\t\t\t\t\t*set dhim \"her\"\n\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\tYour name is quite well known in demon-hunting circles, and throughout the area, for that matter. \n\t\t\t*if female\n\t\t\t\t*fake_choice\n\t\t\t\t\t#Rose.\n\t\t\t\t\t\t*set name \"Rose\"\n\n\t\t\t\t\t#Mabelin.\n\t\t\t\t\t\t*set name \"Mabelin\"\n\n\t\t\t\t\t#Luna.\n\t\t\t\t\t\t*set name \"Luna\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t#Mariah Grace.\n\t\t\t\t\t\t*set name \"Mariah Grace\"\n\n\t\t\t\t\t#You are named something else.\n\t\t\t\t\t\tWhat is your name?\n\t\t\t\t\t\t*input_text name\n\t\t\t*if male\n\t\t\t\t*fake_choice\n\t\t\t\t\t#Ralto.\n\t\t\t\t\t\t*set name \"Ralto\"\n\n\t\t\t\t\t#Denzel.\n\t\t\t\t\t\t*set name \"Denzel\"  \n\n\t\t\t\t\t#Allister.\n\t\t\t\t\t\t*set name \"Allister\"\n\n\t\t\t\t\t#You are named something else.\n\t\t\t\t\t\tWhat is your name?\n\t\t\t\t\t\t*input_text name\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\tThe demon was out of range of your blood charm now. With no other leads, you decided to travel to the city of Lorden in order to recuperate. You would track him from there. Your apprentice, as always, accompanied you.\n\t\t\t*fake_choice\n\t\t\t\t#You and ${boggart} get along very well. You consider him your greatest friend.\n\t\t\t\t\t*set relationship %+10  \n\t\t\t\t\t*set charisma %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#You find the little imp incredibly annoying, and you hardly ever meet eye to eye. As far as assistants go, though, he's useful enough, you suppose.\n\t\t\t\t\t*set resolve %+10 \n\t\t\t\t\t*set relationship %-10  \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#You can't deny that your apprentice is good at his job, but you generally try to keep your relationship professional.\n\t\t\t\t\t*set stealth %+10  \n\t\t\t\t\t*set relationship %+5 \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\tEither way, you would need all the help you could get to combat this fierce demon. ${boggart} also has a few unique tricks, such as his transformations.\n\t\t\t*fake_choice \n\t\t\t\t#He can change into a swift eagle, able to spy or attack. (Takes 3 mana per transformation.)      \n\t\t\t\t\t*set transformations_eagle true\n\t\t\t\t\t*set cunning %+5 \n\n\t\t\t\t#${boggart} morphs into an electric viper, sneaky with a powerful jolt. (Takes 2 mana per transformation.)\n\t\t\t\t\t*set transformations_viper true\n\t\t\t\t\t*set resolve %+5 \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#He becomes a poisonous toad, easy to hide, and his venom coats your darts. (Takes 1 mana per transformation.)\n\t\t\t\t\t*set transformations_toad true\n\t\t\t\t\t*set charisma %+5 \n\t\t\t\t\t\t\t\t\n\t\t\tOn the way to Lorden, your path was blocked by several bandits and a pale necromancer. They were likely enlisted by the demon. Being attacked by witch assassins, a vampire, and a whole team of bandits is way too much of a coincidence in such a short time frame, even for you.\n\n\t\t\tTheir leader, the sorcerer, carried the same nasty, demonic curse on his forehead as the assassins. The curse instantly destroys anyone who kills the bearer.\n\t\t\t*fake_choice\n\t\t\t\t#His subordinates didn't have the luxury of a convenient curse, so you went with your usual plan and decided to take out the bandits permanently.\n\t\t\t\t\t*set compassionate %-10\n\t\t\t\t\t*set resolve %+10\n\t\t\t\t\t*set health -2\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#Curse or not, you prefer negotiation and you tried to strike a bargain with the bandits.\n\t\t\t\t\t*set cunning %+10\n\t\t\t\t\t*set altruism %-5\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#You only wanted to keep people safe, so you did your best to take down the bandits and get them secured in the nearest dungeon.\n\t\t\t\t\t*set compassionate %+10\n\t\t\t\t\t*set altruism %+5\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\tIndividually, the bandits wouldn't have posed much of a challenge. With nine hardened warriors and an archer, though, you and ${boggart} had to be very careful.\n\t\t\t*fake_choice\n\t\t\t\t#You battled them from a distance, staying covered and taking advantage of your long-range training and your skills, like always.\n\t\t\t\t\t*set stealth %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#You engaged them directly and fiercely. Your methods were quick and effective.\n\t\t\t\t\t*set resolve %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#You used your surroundings to your advantage, taking them by surprise with your creative and unconventional methods.\n\t\t\t\t\t*set charisma %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#You analyzed the bandits thoroughly, targeting their weaknesses and weaving a clever strategy.\n\t\t\t\t\t*set cunning %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\tYou and ${boggart} eventually managed to defeat the nine warriors, a couple of whom you recognized as petty criminals and swords for hire. You took down the archer, too, but she didn't really seem to fit in with the rest of the group.\n\t\t\t*fake_choice\n\t\t\t\t#In fact, something about her was positively magnetic.\n\t\t\t\t\t*set falcon %+5\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#That didn't really matter to you, though. Really, she was no different than the others in the gang, in your eyes.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\tThe necromancer fled, hoping to lose you inside the city of Lorden. You pursued him, ${boggart} staying behind to attend to the bandits and your bounties. Before long, you managed to track him down. Callidus tried to flee into the sewers, of all places, but with his mana depleted and his magical staff broken, he couldn't put up much of a fight.\n\t\t\t*fake_choice\n\t\t\t\t#You took his necromantic crystal, planning to sell it on the black market later.\n\t\t\t\t\t*set altruism %-10\n\t\t\t\t\t*set sell true\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#Actually, you wanted to keep the crystal as yet another, if darker, weapon to aid you in battle.\n\t\t\t\t\t*set compassionate %-10\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#You destroyed the crystal. People no doubt died when it was formed, and no good can come of such an evil thing.\n\t\t\t\t\t*set compassionate %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\tAfter Callidus and his bandits were secured, Captain Gertrude of the city guard met with you to settle your bounty.\n\t\t\t*fake_choice\n\t\t\t\t#As usual, you demanded the highest bounty you could get.\n\t\t\t\t\t*set charisma %+5\n\t\t\t\t\t*set altruism %-10\n\t\t\t\t\t*set gertrude %-10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#You opted to take just a token fee, to cover your expenses. After all, you weren't in this business for the money.\n\t\t\t\t\t*set altruism %+10\n\t\t\t\t\t*set gertrude %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#You were satisfied with the bounty that the captain suggested.\n\t\t\t\t\t*set gertrude %+5\n\t\t\t\t\t*set stealth %+10 \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\tGertrude gave you a form and sent you on to Lorden's mayor, Eldon, to collect the bounty. Before that, she suggested freshening up in the Lorden River. You took her advice, and met ${boggart} on the way. He cheerfully passed along the few coins he had liberated from the fallen bandits.\n\t\t\t\t\t\t\t\t\n\t\t\tWhen you arrived at the river, you began to wash yourself and all of your belongings, freeing them of the grime and blood from your previous battles and travels. Afterwards, you found that you had enough time before your appointment with Mayor Eldon to relax and perhaps get to know a few of the locals.\n\t\t\t\t\t\t\t\t\n\t\t\tYou encountered three farm girls, identical triplets, splashing in the river. After chatting with them, you gathered that Gretchin was kind and loved animals. Gretta was more spirited and athletic, and Garnet was quieter and thoughtful, even a little morose. ${boggart} enjoyed himself quite a bit and found himself taking a particular liking to Gretchin.\n\t\t\t*fake_choice\n\t\t\t\t#You also enjoyed Gretchin's company the most. She's very charming and personable.\n\t\t\t\t\t*set gretchin %+20\n\t\t\t\t\t*set charisma %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#You found yourself wanting to know more about Garnet. She may have been a bit standoffish compared to her sisters, but she was definitely intriguing.\n\t\t\t\t\t*set garnet %+20\n\t\t\t\t\t*set cunning %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#You were especially drawn to Gretta, and her outgoing, spirited personality.\n\t\t\t\t\t*set gretta %+20\n\t\t\t\t\t*set resolve %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#Although you weren't particularly attracted to any one of them, you thought they would make good friends and you hoped to spend more time with them some day.\n\t\t\t\t\t*set garnet %+10\n\t\t\t\t\t*set gretta %+10\n\t\t\t\t\t*set gretchin %+10\n\t\t\t\t\t*set resolve %+5\n\t\t\t\t\t*set cunning %+5\n\t\t\t\t\t*set charisma %+5\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#You found none of these farm girls very interesting. Instead of spending time with them, you opted to use your time more wisely and meditate.\n\t\t\t\t\t*set cunning %+10 \n\t\t\t\t\t*set health +1\n\t\t\t\t\t*set stealth %+5 \n\t\t\t\t\t*set garnet %-5\n\t\t\t\t\t*set gretta %-5\n\t\t\t\t\t*set gretchin %-5\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\tThen you came across their father, Bertrand, a middle-aged man who seemed honest and hard-working enough. Apparently his favorite activities were trying to humiliate or otherwise harass the other citizens of Lorden. Although most of his pranks were harmless, you got the feeling he didn't care for his own daughters very much. The feeling appeared to be mutual on the triplets' end.\n\t\t\t*fake_choice\n\t\t\t\t#You found Bertrand's type of humor matches yours quite well.\n\t\t\t\t\t*set compassionate %-5\n\t\t\t\t\t*set altruism %-5 \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#You found his humor distasteful, so you quickly excused yourself and left quietly.\n\t\t\t\t\t*set stealth %+5\n\t\t\t\t\t*set altruism %+5\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#You didn't approve of his apathy toward his own children or his poor treatment of his neighbors. As usual, you didn't hesitate to voice your feelings.\n\t\t\t\t\t*set compassionate %+5\n\t\t\t\t\t*set charisma %+5\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\tWhile all this was going on, ${boggart} amused himself by splashing around in the water and chasing rainbow-colored fish.\n\t\t\t*fake_choice\n\t\t\t\t#Annoyed, you scolded him for splashing you and making a bunch of distracting noises.\n\t\t\t\t\t*set relationship %-10\n\t\t\t\t\t*set resolve %+5\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#You managed to ignore the commotion and just relax.\n\t\t\t\t\t*set stealth %+10\n\t\t\t\t\t*set altruism %+5\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#${boggart} looked like he was having a lot of fun, so you decided to join in.\n\t\t\t\t\t*set relationship %+10\n\t\t\t\t\t*set charisma %+5\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\tYou eventually dried off and made your way to the mayor's office, which was well-furnished, large, and fancy. Eldon, a middle-aged man with greying hair and a slightly plump body, seemed intelligent and very passionate about the city. He read Gertrude's note and was pleased to hear that you managed to stop Callidus and his bandits, who had been plaguing Lorden for some time. \n\t\t\t\n\t\t\tHe paid out your bounty, with his thanks. Then, you told him the bad news. Callidus had mentioned something about the demon planning to attack Lorden. If this was true, it would put thousands of people in mortal danger.\n\t\t\t*choice\n\t\t\t\t#You advised Eldon that he should evacuate the entire city, to prevent fatalities and kidnappings.\n\t\t\t\t\t*set charisma %+5\n\t\t\t\t\t*set altruism %+5\n\t\t\t\t\t*set cunning %-5\n\t\t\t\t\tMayor Eldon thought otherwise. He was worried about creating a panic, and not willing to leave their city so easily. After giving you a thorough scolding, he decided that barricading the city was the wisest decision.\n\t\t\t\t\t*goto speech\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#You suggested that Lorden should be barricaded, with the guards put on a vigilant watch rotation set around the perimeter.\n\t\t\t\t\t*set resolve %+10\n\t\t\t\t\t*set charisma %+5\n\t\t\t\t\t*set guards true\n\t\t\t\t\tEldon agreed that your suggestion was the best approach. After commending you on your bravery and boldness, he immediately set to work on protecting Lorden.  \n\t\t\t\t\t*label speech\n\t\t\t\t\tYou all headed to the town square. The citizens were summoned, and Mayor Lorden gave a brief speech. He explained the threat against Lorden, but encouraged the citizens and reassured them that you and the guards were there to defend the town.\n\t\t\t\t\t*goto tavern\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#You told the mayor that you should keep the demon's threat quiet, in hopes of beating him at his own game of cat-and-mouse.\n\t\t\t\t\t*set stealth %+10\n\t\t\t\t\tHe fully agreed. Secrecy would prevent a panic amongst the townspeople, and might actually give you a better chance of finding and defeating the demon.\n\t\t\t\t\t*goto tavern\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t*label tavern\n\t\t\t\t\t\t\t\t\n\t\t\tThen there was nothing left to do but wait. The day was slowly turning to dusk, and you headed to the nearby inn, the Sleeping Badger, to purchase food, and quarters for the night.\n\t\t\t\t\t\t\t\t\n\t\t\tWhile you were there, you were served by a kindly waitress named Maggie. Her dark skin suggested she was from the far away kingdom of Githrad.\n\t\t\t*if guards\n\t\t\t\tWhile you were eating your supper, a shop owner by the name of Bartlemayes was even kind enough to come and thank you personally for your aid in defending Lorden. He also gave you a magical ring that enhanced your bravery. Free of charge, of course!\n\t\t\t\t*set resolve %+ 15 \n\t\t\t\t*set lions true\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\tYou retired to your room and began your nightly routine, a brief session of exercises followed by intent but calming meditation. Then, you cracked open your demon bestiary, determined to re-familiarize yourself with Netherworld lore. By the time you finished, it was getting very late. ${boggart} was definitely sleepy, but mid-yawn, he begged for a story before you went to bed.\n\t\t\t*fake_choice\n\t\t\t\t#You accepted, and wove a tale where he played the hero, a famous demon hunter.\n\t\t\t\t\t*set charisma %+5\n\t\t\t\t\t*set relationship %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#You refused, too tired to stay up a moment more.\n\t\t\t\t\t*set resolve %+5\n\t\t\t\t\t*set relationship %-10\n\t\t\t\t\t*set health +1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\tYour rest that night was interrupted by a sudden change of scenery. You found yourself kneeling on the floor of a dark cavern inside an Infernal temple. Your body and belongings were tattered, and torn. You sensed that it was only a dream, but it felt more like a potent hallucination than just a simple nightmare.\n\t\t\t\t\t\t\t\t\n\t\t\tFrom the darkness surrounding you, the demon hissed terrible threats, pushing at your mind and trying to frighten you. Even though you knew it was just a vision, you still felt an overwhelming terror eating at you. You woke, shuddering, and tossed and turned until you eventually sank back into slumber.\n\t\t\t*if sell\n\t\t\t\t\t\t\t\t\n\t\t\t\tWell, nearly anyway. Before you were properly asleep, you remembered the necromantic crystal that you took from Callidus below the sewers of Lorden. You set out with the black market in mind, determined to make a profit. You soon found an old, crooked man who seemed unsavory enough, and he gave you a fine price for the magical stone. Happy with the extra gilded pieces, you returned to your chamber and finally fell asleep.\n\n\t\t\tThe next morning, you paid Maggie for the food and lodging and then set out for Lorden's market district. There had been no signs of the demon yet, so you spent some time at the shops. The local blacksmith sharpened your blades, readying them for the battles ahead. \n\t\t\t\n\t\t\tYou explored a strange shop that sold curiosities and magical items. The magical ring you bought there enhanced your persuasive abilities. \n\t\t\t*set dragonflies true\n\t\t\t*set charisma %+15  \n\t\t\t*if transformations_toad\n\t\t\t\n\t\t\t\tThere was still no sign of the demon, and shopping was a conveniently inconspicuous activity for a demon ${hunter} and ${dhis} boggart apprentice. You went into an alchemy shop next, called Cocktail Concoctions. The face-cleansing potion you made from some ingredients you had on hand sold for a few extra coins.\n\n\t\t\tFinally, you encountered a magical beast store called The Dancing Unicorn. It displayed items for all sorts of magical creatures, from trolls to pixies and from fairies to gryphons. ${boggart} seemed especially excited about this store, and practically begged you to let him have a good look inside.\n\t\t\t*fake_choice\n\t\t\t\t#You cheerfully complied and bought him a hat, some delicious boggart treats, and even a new backpack to sleep in during travels.\n\t\t\t\t\t*set altruism %+10\n\t\t\t\t\t*set relationship %+10\n\n\t\t\t\t#You generally preferred to be thrifty with your savings, but you were nice enough to buy him a little hat.\n\t\t\t\t\t*set altruism %+5\n\t\t\t\t\t*set relationship %+5\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#You didn't have time for silly hats.\n\t\t\t\t\t*set compassionate %-5\n\t\t\t\t\t*set altruism %-5\n\t\t\t\t\t*set relationship %-5\n\t\t\t\t\t*set resolve %+5 \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\tIt was nearly noon when Captain Gertrude came to find you. She explained that she wanted your input on the bandits' punishment, and mentioned that they had also been practically begging to see you in person. You accompanied her to the town's dungeon. It was curiously well-built and practically spotless, much like most of the rest of Lorden. \n\t\t\n\t\t\tShe escorted you inside, where the bandits were all lumped in one cell with the female archer in the cell beside them. Callidus was imprisoned farther down the hall. His sentence was plain, after all the trouble he had caused in Lorden. He would be locked away in Dosgodar, the magical dungeon presided over by the great wizard, Iyus the Selfless.\n\t\t\t\t\t\t\t\t\n\t\t\tAs soon as the bandits saw you, most of them began to plead with you for mercy. The archer, Falcon, even gave you a story about how they only attacked you because the demon threatened to kill their families. Then it was up to you to suggest a sentence you felt was reasonable.\n\t\t\t*fake_choice\n\t\t\t\t#You suggested to Gertrude that they should be given a penalty of just three years in dungeon, followed by a single year of parole.\n\t\t\t\t\t*set callidus %+10\n\t\t\t\t\t*set falcon %+10\n\t\t\t\t\t*set compassionate %+10\n\t\t\t\t\t*set gertrude %-5  \n\t\t\t\t\t*set parole true\n\t\t\t\t\tGertrude, though she felt like you were being a little too lax, promised to take your word into account.\n\t\t\t\t\t\t\t\t\n\t\t\t\t#You recommended five years in dungeon, followed by three years on parole.\n\t\t\t\t\t*set gertrude %+10\n\t\t\t\t\t*set falcon %+5\n\t\t\t\t\t*set compassionate %+5\n\t\t\t\t\t*set cunning %+5\n\t\t\t\t\t*set callidus %+5\n\t\t\t\t\t*set parole true\n\t\t\t\t\tGertrude agreed, although the bandits seemed discontent.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#You insisted that the criminals be executed, convinced the lot were murderous scum.\n\t\t\t\t\t*set gertrude %-5\n\t\t\t\t\t*set falcon %-10\n\t\t\t\t\t*set callidus %-15\n\t\t\t\t\t*set compassionate %-5\n\t\t\t\t\t*set resolve %+5\n\t\t\t\t\tGertrude didn't approve, but promised to pass along your recommendations.\n\n\t\t\tAs you headed back out toward the streets of Lorden, Callidus called out to you. He bragged about how your roles, captive and prisoner, would soon be reversed.  He seemed confident that he would escape and strangle you to death. He was very specific about that. Then he was arrogant enough, chains and all, to make a comment about how you were a\n\t\t\t*if female\n\t\t\t\tbuxom wench.\n\t\t\t*if male\n\t\t\t\thandsome stallion.\n\t\t\t*fake_choice\n\t\t\t\t#That necromancer was absolutely revolting, and you told him as much.\n\t\t\t\t\t*set callidus %-5\n\t\t\t\t\t*set resolve %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#You shot back that it was a pity, you might have found him attractive if it wasn't for his sadistic tendencies, terrible personality, and ghastly haircut.\n\t\t\t\t\t*set charisma %+10\n\t\t\t\t\t*set callidus %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t#You yelled over to Gertrude, asking what the policy was on beating saucy inmates to a bloody pulp.\n\t\t\t\t\t*set compassionate %-5\n\t\t\t\t\t*set charisma %+5\n\t\t\t\t\t*set callidus %+5\n\t\t\t\t\t*set gertrude %+5\n\t\t\t\t\tGertrude laughed, but quickly recovered, telling you that you should know better. Oddly enough, Callidus seemed rather pleased with the idea as well.\n\t\t\tYou left the dungeon, thanking Captain Gertrude for her time, and headed down the town's well-kept lanes. Then, in a moment, you spotted a fire raging that sent smoke high into the sky.\n\nTaking as many guards as possible, you rushed to the scene and found a barn up in flames. The fire was blazing so brightly, and it appeared so suddenly, that it could only have been the work of the demon. You watched for him as you put out the flames, but he never appeared.\n\t\t\t\t\t\t\t\t\nFour others did, however. As the remnants of their barn slowly turned into ash, Bertrand and his three daughters raced across the field. While Bertrand looked livid, Gretta and Gretchin were despondent. Garnet just stared into the distance, seemingly in shock.\n*fake_choice\n\t#You reassured the family that you would bring down the demon, even gently wiping away Gretchin's tears. The two of you had begun a romance of sorts.\n\t\t*set romance_gretchin true\n\t\t*set gretchin %+15 \n\t\t*set gretta %+5\n\t\t*set garnet %+5\n\t\t*set charisma %+5\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t#Gretta took your hand as you vowed to banish the monster back to the Netherworld. The two of you had begun a romance of sorts.\n\t\t*set gretta %+15\n\t\t*set garnet %+5\n\t\t*set gretchin %+5\n\t\t*set romance_gretta true\n\t\t*set resolve %+5\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t#Even after your reassurances, Garnet still hadn't moved so you gently put an arm around her. The two of you had begun a romance of sorts.\n\t\t*set cunning %+5\n\t\t*set gretta %+5\n\t\t*set gretchin %+5\n\t\t*set garnet %+15\n\t\t*set romance_garnet true\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t#You took time to calm them, comforting your three new friends and promising to stop the demon.\n\t\t*set compassionate %+5\n\t\t*set gretchin %+7\n\t\t*set garnet %+7\n\t\t*set gretta %+7\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t#You didn't have time to deal with them, and you told them as much.\n\t\t*set gretta %-15\n\t\t*set gretchin %-10\n\t\t*set garnet %-5\n\t\t*set compassionate %-5\n\t\t*set resolve %+10\nSuddenly, the girls' father snapped. Taking a dagger from his belt, he lunged forward, screaming about how this was all your fault for not capturing the demon.\n*fake_choice\n\t#He was obviously in shock, so you quickly disarmed him and helped him calm himself.\n\t\t*set compassionate %+5\n\t\t*set cunning %+5\n\t\t*set gretta %+10\n\t\t*set garnet %-5\n\t\t*set gretchin %+5\n\t\tThe nearby sentries escorted him away as the triplets ran over to you to apologize.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t#The man definitely needed a lesson, so you quickly disarmed him and knocked him to the ground with your staff.\n\t\t*set garnet %+5\n\t\t*set gretchin %-10\n\t\t*set gretta %-5\n\t\tThe farmer folded up into a ball almost immediately, howling in pain. Guards came running over, lifting Bertrand to his feet and escorting him away.\n\t\t\n\t#Clearly, Bertrand was just distraught about what had happened. You held your ground, trying to reason with him.\n\t\t*set charisma %+10\n\t\t*set cunning %-5\n\t\t*set gretta %+5 \n\t\t*set garnet %-5\n\t\t*set gretchin %+10\n\t\t*set health -1 \n\t\tBertrand wouldn't stop, and you fended off multiple blows but were nicked on the arm. The guards quickly intervened, forcibly escorting him away, and then his daughters came over to apologize. \nAs the barn fire subsided, you bade the triplets farewell. You needed to go hunt a demon.\n\t\t\t\t\t\t\t\t\n*if romance_gretchin\n\tBefore Gretchin left, however, you took a moment to speak with her privately. She told you that she would love to see you more often after everything blew over.\n*if romance_gretta\n\tGretta ran up to you as you were leaving, and took your hand. She told you she'd be cheering for you, and that she was eager to see you after the demon was defeated.\n*if romance_garnet\n\tGarnet caught your eye as you said your farewells, and you weren't surprised when she returned to you to say a more personal goodbye.\n\t\t\t\t\t\t\t\t\t\t\t\t\nThe demon still hadn't shown himself, so you walked through the town, sorting your thoughts. You were jerked back into the moment when a young guard approached, shouting that Callidus escaped, and Mayor Eldon had disappeared.\n\n*fake_choice\n\t#You decided to investigate the necromancer's escape. The demon and Callidus were your real enemies, and you needed to stop them right away.\n\t\t*set resolve %+5\n\t\t*set cunning %+5\n\t\tThe guards hurried back toward the mayor's office, some of them fanning out to search the city on the way. You went back to the prison where a junior guard escorted you into the hall where the bandits were still imprisoned. Two guards' bodies were lying on the floor, their throats torn out. Only Callidus was missing, and the nervous sentries and medics couldn't tell you anything useful. \n\t\t\n\t\tIndeed, when you looked around, you saw absolutely no clues as to how the demon had broken Callidus out of jail. Before you left, you asked Falcon and the bandits what they had seen when Callidus escaped.\n\t\t*if (parole = false)\n\t\t\tUnfortunately, Falcon was still angry about the penalty you had chosen for her and the other bandits. She practically spit in your face, outright refusing to help you in any way.\n\t\t*if parole  \n\t\t\tFalcon, thankful that you gave her and the others a relatively minor sentence, was willing to tell you what she saw. The demon had appeared out of thin air. He killed both guards and freed Callidus, then just disappeared.\n\t\tUnfortunately, you were unable to find any information that could help you locate the demon.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t#You decided to focus on finding Mayor Eldon as quickly as possible. The guards could handle the necromancer's escape.\n\t\t*set gertrude %+5\n\t\t*set compassionate %+5\n\t\t*set altruism %+5\n\t\tSeveral guards hurried toward the dungeon as you ran to Major Eldon's office. A few guards were stationed out front, but everything seemed calm. There were no signs of a struggle or any destruction, like there had been with the barn.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\tOn investigation, you found two dead sentries who had been stationed near the mayor's office. All of the doors and windows to the outside had been locked at the time, and there were no signs of a struggle, just the two bodies with their throats torn out. And Mayor Eldon was gone.\n\nThe guards had as little luck as you, and no one could find a trace of the necromancer or the mayor. The guards patrolled the city, and you and ${boggart} went looking for information from the townspeople, starting at the tavern where you had slept last night.\n\t\t\t\t\t\t\t\t\nThe Sleeping Badger was practically empty. Only a few, sad looking stragglers milled about. The news of Eldon's kidnapping had spread quickly. After asking around, you decided both Maggie, the waitress, and a very drunk man in the corner both probably knew something they didn't want to share.\n*fake_choice\n\t#You tried to convince Maggie to tell you what she knew.\n\t\t*set maggie +3 \n\t\t*set charisma %+10\n\t\t*set cunning %+5\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t#You bought the man in the corner another drink, trying to coax information out of him.\n\t\t*set charisma %+10\n\t\t*set stealth %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t#Force is always good for a quick answer, so you turned your attention to the drunken man.\n\t\t*set stealth %+5 \n\t\t*set resolve %+10 \n\t\t*set compassionate %-10\n\t\t\t\t\t\t\t\t\nIt was a strange tale when you finally got your information. The demon could speak inside a person's mind. For some unknown reason, he made contact and said he had taken the mayor to an ogre's cave. The demon announced that if people pursued him, they would die. Eldon, too, was already destined for a grisly demise. \n\nFinally, the demon threatened death if this vision were spoken aloud. The last threat, at least, was hollow. Even though it sounded just like a trap, you really had no choice. You sent Maggie to run and tell Captain Gertrude about what happened. Meanwhile, you had a demon to catch, and you knew exactly where to find him. There were plenty of old tales about an ogre who lived in a cave a little way from Lorden.\n\t\t\t\t\t\t\t\t\nWith ${boggart} at your side, you swiftly headed toward the cavern. You soon arrived at a massive field of boulders, shrouded in eerie, magical mist that painted vague shapes in the darkening light. Fortunately, ${boggart} found another, smaller entrance to the caverns that let you work around the enchanted field.\n\t\t\t\t\t\t\t\t\nThe tunnel had traps, of course, but you eventually made your way to a huge cave. The walls were streaked with colorful minerals. Suddenly, a muscular troll dressed in ornate robes that were far too small for him stepped out of the shadows.\n\nHopping forward, the childish creature introduced himself as Imbecile and started rambling about how his friend \"Callidy\" said that he was supposed to give the next person to enter the caverns a riddle. Basically, if you answered the riddle correctly, the troll would let you pass. If not, he would attack you. Seemed reasonable….\n*fake_choice\n\t#Actually, it seemed like a total waste of time. You demanded to know the riddle. The mayor's life was on the line.\n\t\t*set troll \"Imbecile\"\n\t\t*set cunning %+5\n\t\t*set resolve %+5\n\n\t#You raised your staff, threatening the troll if he didn't get out of your way. The thing was clearly an idiot.\n\t\t*set troll \"Imbecile\"\n\t\t*set compassionate %-10\n\t\t*set resolve %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t#The troll seemed more simple than cruel, rather like a child. You couldn't bring yourself to call him \"Imbecile,\" so you settled on \"Prince Charming\" and then asked him the riddle.\n\t\t*set compassionate %+10\n\t\t*set charisma %+5\n\t\t*set troll \"Prince Charming\"\n\t\t*set resolve %-5 \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\nYou solved the riddle easily enough, but then the troll said, sadly, that he was supposed to attack you anyway. He was hefty but not fast, and it was a quick victory on your part. At that point, the troll just curled up on the ground and wept like a child. ${boggart} suggested that you just incapacitate him, so you could move safely onwards.\n*fake_choice\n\t#Dead trolls couldn't come back and eat foolish demon hunters.\n\t\t*set resolve %+10\n\t\t*set stealth %+5\n\t\t*set altruism %-10\n\t\t*set compassionate %-10\n\t\t*set relationship %-10\n\t\t*set leave true\n\t\tNot wanting to take any chances, you drove your blade into ${troll}'s neck, killing him instantly. ${boggart}, in an uncharacteristic show of rage, was so furious that he flew out of the cave and vanished. You were left to confront the demon on your own.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t#${troll} was no warrior, and killing him just seemed unnecessary. Knocking him out and chaining his hands and feet would be enough.\n\t\t*set compassionate %+10\n\t\t*set cunning %+5\n\t\t*set altruism %+10\n\t\t*set relationship %+5\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\nYou exited the cave, and found yourself in a dirty field, staring at an ogre who stared straight back at you with intelligent eyes. Of course, he had the same Infernal curse upon his wide forehead as the witches and necromancer had borne. \n\nWhen he spoke, his baritone voice practically shook the ground below you. The ogre, who identified himself as Belluo, seemed surprised that a \"puny human\" made it this far. He demanded to hear your story, and said if it was impressive enough, he would allow you to go where you pleased in his caverns.  \n*choice\n\t#You knew enough to realize that Belluo was probably just stalling. Lunging forward, you cracked your staff across his head, taking him by surprise.\n\t\t*set stealth %+5\n\t\t*set resolve %+5\n\t\t*goto battle\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t#You put on your best mysterious expression, telling him a story of stealth and craft.\n\t\t*set stealth %+10\n\t\t*set stealth_story true\n\t\t*goto story\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t#You set into a complex, overly detailed account of your story, hoping boredom would make the ogre hurry things along.\n\t\t*set cunning %+10\n\t\t*set cunning_story true\n\t\t*goto story\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t#This was ridiculous, but on the other hand, how often did you get to share how many dead bodies you had left in your wake?\n\t\t*set compassionate %-10\n\t\t*set evil_story true\n\t\t*goto story\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t#You gave him a dazzling smile, telling him a charming story of compassion and personality.\n\t\t*set charisma %+5\n\t\t*set compassionate %+5\n\t\t*set charisma_story true\n\t\t*label story\n\t\tThe ogre found your little tale\n\t\t*if charisma_story\n\t\t\tamusingly heart-rending.\n\t\t*if evil_story\n\t\t\tsomewhat shocking.\n\t\t*if cunning_story\n\t\t\tendlessly dull.\n\t\t*if stealth_story\n\t\t\tvery entertaining.\n\t\tWith a smile, though, the ogre then informed you that he had been lying about letting you past him anyway. No surprise there. He did offer to give you the first blow, at least. You dashed forward, slashing your blade across Belluo's cheek.\n\t\t*label battle\n\t\t\n\t\tThe ogre roared in annoyance, swinging his club toward your head. You ducked, leaping away, and with that, the battle begun. It was a hard-fought battle. Belluo was perhaps the strongest opponent you had faced yet.\n\t\t*if leave\n\t\t\tJust when things began to look hopeless, ${boggart} returned in the nick of time and flapped desperately around the ogre's head, trying to provide a distraction.\n\t\t*if not(leave)\n\t\t\t${boggart} tried to aid you by flying around and helping distract the ogre, even though he couldn't attack the colossus directly.\n\t\t\t\t\t\t\t\t\n\t\tYou finally managed, if just barely, to defeat the creature. Eyeing the death-curse on his forehead, you quickly bound him with your silver chain and handcuffs.\n\t\t*page_break\n\t\t\t\t\t\t\t\t\n\t\tYou wandered forward blindly into the cave behind the ogre, and finally came upon a large cavern walled with dark, wooden panels. In the center of the floor, Mayor Eldon's body was laying on the ground in a pool of his own blood. His severed head was sitting a few feet away.\n\t\t\n\t\tThe necromancer, Callidus, was in the center of the room scribbling Infernal symbols onto the floor. You leaped forward, knocking him aside as you hurried to smear the magical circle and stop the spell. You were too late, though, and the demon materialized out of a small, granite box lying on the floor.\n\n\t\tHe was powerful, powerful enough to burn through nearly all of your defenses in just moments. You had just one weapon left to use. With your demon bestiary, you were able to discover this monster's true name, Mendax. A hastily-cast banishing command didn't take completely, since you had not physically defeated him, but it did stall him enough to give you time to escape….\n\n*page_break The Present Moment\n*label begin\n*temp yell false\n*temp sell false\n*temp ask 0  \n*temp eager false\n*temp not false\n*temp evil_story false\n*temp cunning_story false\n*temp stealth_story false\n*temp charisma_story false\n\n*page_break Chapter One Of Seven\n\n[b]\"You cannot escape from me, demon ${hunter}! I WILL have you as my vessel, and there is nothing you can do to stop me. And after you are my slave, I will personally kill every single wretched soul in Rhys Falls, Lorden, and perhaps all of Lume, if my hunger has grown! But I will reserve an especially torturous demise for your little boggart slave, and for anyone else who matters to you. You think you have escaped me, human? This battle has only just begun!\"[/b]\n\nThe terrible threats, alongside images of vast destruction, have been projected into your mind by Mendax for the last several hours. You sprint madly through the wilderness, your apprentice flapping his wings and gasping desperately above you. Though your muscles began to burn long ago, and hot daggers tear at your lungs with every breath, you continue as though your life depends on it. Indeed, it does.\n\nYour stomach aches with hunger, and your throat hurts from lack of water. You never stop. Blisters formed on the bottoms of your battered feet only minutes after your defeat. ${boggart} complained of his wings hurting many hours ago, but your only thoughts are of putting as much distance between you and the demon as possible.\n\nBut even in total defeat, with victory now utterly impossible, there is still a glimmer of hope. Although Mendax is tormenting you telepathically after creating a link between you when you were inside the cave, any further action on his part will have to wait. The banishing spell weakened him, and then he'll have to possess the necromancer, and acclimation between them should take a few days at least.\n\n*page_break \n\nUntil then, you are somewhat safe from this monster's attacks. No one can predict what might happen when he finally gains control of the sorcerer's body, though, and the constant telepathic abuse isn't helping you either. In fact, it's taking a massive toll on you mentally. Still, one thing is certain: Mendax is far beyond you, and someone else will need to defeat him. \n\nThe only person who is available or even powerful enough to attempt it is the great wizard, Melithar the Eccentric. Originally Iyus the Selfless came to mind, but that hope was quickly dashed against the rocks. As the sentry at Dosgodar said before, he cannot be spared from his duties in the magical containment dungeon just now, or you might have even more of a problem on your hands, considering he provides the runes that contain hundreds of extremely dangerous criminals in his tower.\n\nMelithar, though he hails from a distant land, will sometimes stay in a mountain not too far from here. The locals call it Melithar's Mountain these days, and it is only a few more miles away gauging by how far you must have run. It's just past the village of Quader, and Melithar comes every now and again to watch over this hemisphere of Lume. If you could only reach him before Mendax catches up to you, then you might have a chance. You all might.\n\nSuddenly, your knees buckle, sending you skidding across the dirt. Groaning feebly, for a moment you can only lie there. Your body is pounding with aches, hunger, thirst, and exhaustion. Eventually, you push yourself into a sitting position, panting for breath.\n*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t*label it \n\tIt looks like you finally have an excuse to rest for a few minutes.\n\t*goto itt \n*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t*goto continue\n*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t*label continue\n\tYour body is trying to tell you that you can't continue without a break.\n\t*goto itt \n*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\tNo matter how much you hate to admit it, you must give yourself a second to rest.\n\t*goto itt \n*else \n\t*goto it \n*label itt \n\t\t\t\t\nAs ${boggart} almost crash-lands beside you, slumping to the dirt, you wearily pull out an apple that you had picked from a tree earlier. You hope it will be enough to keep you at least partially hydrated, since you haven't heard any sources of water in a long time. You glance over at your impish apprentice, who stands only a couple feet tall. His purple eyes are wet with tears of pain, and he gently massages his wings and scorpion tail as he tries to catch his breath.\n\n*image boggart.jpg\n*fake_choice\n\t#You gobble down the apple in seconds, too starved to worry about anything else.\n\t\t*set relationship %-10\n\t\t*set compassionate %-5\n\t\t*set altruism %-5\n\t\t*set health +1 \n\t\tThe last of the juice is already dripping down your chin before your apprentice even has a chance to object. Struggling to his knees, he screeches, \"Hey! What about mine!\" His stomach growling loudly, he wails, \"Now I'm gonna starve to death, you freak!\"\n\t\t\t\t\t\t\t\t\n\t\t*if relationship > 54\n\t\t\tLooking down at your bleeding feet, you reply, \"I apologize, ${boggart}…I don't know what came over me. I can't…I can't think straight right now.\" The voice of the demon in your mind hasn't let up, either.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\tHe just curls his arms around his little knees, his antennas drooping over his head sadly.\n\t\t*if relationship \u003c 55\n\t\t\tThe pain, lack of sleep, and mocking voice of the demon all pull at you. Suddenly, you feel defensive. \"Hey, if you haven't noticed, I'm about ten times your size, not to mention that I'm the one who's done most of the work around here. If you want something to eat, go find it yourself.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\tHe looks like he's going to shoot back an angry retort, but then he just sighs and slumps back to the ground. Curling his arms around his little knees, he hangs his head, his antennas going limp.\n\t\t\t\t\t\t\t\t\n\t#You grab a sharp rock and pry out a piece of apple for your apprentice.\n\t\t*set compassionate %+5\n\t\t*set altruism %+5\n\t\t*set relationship %+5 \n\t\tYou hand ${boggart} his portion and you both begin to munch the sweet, refreshing fruit. Looking grateful, ${boggart} eats his voraciously, smacking his lips. After only a few seconds, both of you have eaten your measly little meal and you sit beside each other in awkward silence.\n\t\t\t\t\t\t\t\t\n\t\tAlthough the fruit has certainly done its part to keep starvation away, it doesn't do very much to make you feel better. His stomach growling, ${boggart} says tiredly, \"Do you have any more?\"\n\t\t\t\t\t\t\t\t\n\t\tShaking your head\n\t\t*if relationship > 59\n\t\t\tsadly, you respond, \"I'm sorry. That's all there was.\"\n\t\t*if relationship \u003c 60\n\t\t\timpatiently, you reply, \"If I had any, don't you think we'd be eating it?\"\n\t\t\t\t\t\t\t\t\n\t#You give the entire fruit to ${boggart}. He looks even more tired and hungry than you are, if that's possible.\n\t\t*set compassionate %+5\n\t\t*set altruism %+10 \n\t\t*set relationship %+5 \n\t\t*set cunning %-5\n\t\t*set health -1\n\t\tYou hand over the apple, and your apprentice's eyes glow happily. He snatches the apple up, voraciously biting into it, smacking his lips and spraying juice everywhere. Seconds later, he has devoured the whole thing. Giving a contented burp, he murmurs, \"Thanks.\" \n\t\t\n\t\tYou nod, giving him a little smile, but you can already feel the ache in the back of your throat building into a relentless, pounding reminder of your thirst. Your stomach seems to be twisting itself into shapes you didn't know existed. Then it dawns on him that you aren't eating. He demands, \"Where's yours?!\" \n\t\t\n\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t*label u \n\t\t\tYou give him an exhausted smile and reply, \"I gave it to you, ${boggart}.\"\n\t\t\t*goto uu \n\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\tYou shrug and respond quietly, \"There was only one.\"\n\t\t\t*goto uu \n\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\tYou sigh and answer, \"I was only able to bring one with us.\"\n\t\t\t*goto uu \n\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\tYou swallow and reply, \"There aren't any more apples, but that's a sacrifice I was willing to make.\"\n\t\t\t*goto uu \n\t\t*else \n\t\t\t*goto u \n\t\t*label uu \n\t\t\t\t\n\t\t${boggart} says, \"Okay…\" uncertainly and curls up beside you, pulling his knees up to his chest. \n\t\t\n\t\tHe wraps his little arms around them, staring at the ground. After a moment of silence, his antennas perk up, a frown crossing his weary and dirty face.\n\t\t\t\t\t\t\t\t\nSuddenly, he begins to cry. His body trembling, he weeps loudly, salty tears pouring down his cheeks as he chokes, \"I've lost everything. We've been running forever, and I'm tired, and I'm hungry, and everything hurts. We're being chased by a wicked monster, and there's no way we can survive. It's hopeless.\" He looks up at you, sniffing loudly with his violet eyes swimming in angry tears. \"And it's all because of you.\"\n*fake_choice\n\t*selectable_if (relationship \u003c 55) #You snap, \"If you haven't noticed, we're both in the same situation. I don't plan to just sit here sobbing my eyes out, though.\"\n\t\t*set relationship %-5\n\t\t*set compassionate %-5\n\t\t*set charisma %-5\n\t\t*set resolve %+5 \n\t\tHe struggles to his feet, wobbling slightly, but his voice lacks none of the power that his body does. Flaring his wings, he points an accusing finger at you, shrieking, \"Just shut up for once! What am I even doing here with you?! I hate you! I don't ever want to see you again! \n\t\t\n\t\t\"You treat me terribly all the time, and my life is ruined all because of you! I have no reason to be here and put myself in danger that you obviously can't handle!\"\n\t\t\t\t\t\t\t\t\n\t\tJumping to your feet, you feel a surge of adrenaline, despite your muscles protesting against moving at all. Your eyes on fire, you bare your teeth, saying, \"How can you say that, you useless sprite? I took you in, I trained you—\"\n\t\t\t\t\t\t\t\t\n\t\tYou're about to continue, but a branch snaps ominously behind you.\n\t\t\t\t\n\t#Your eyes widening, you say, \"Me? Why me?\"\n\t\t*set cunning %+5 \n\t\tWiping his eyes, he says, \"Because everything Mendax did was to get at you, and you didn't stop him.\"\n\t\t\t\t\t\t\t\t\n\t\t\"${boggart},\" you say slowly, \"I did the best I could. I wanted to stop him. I don't know what else I could have done, what any of us could have done.\"\n\t\t\t\t\t\t\t\t\n\t\tStruggling to his feet, he twitches his tail in annoyance. \"Either way, we've got a sadistic freak following us, and I'm getting tired of sticking around and putting myself in danger for no reason. It's you he's after, not me.\"\n\t\t\t\t\t\t\t\t\n\t\tYour jaw drops. He can't really be saying this. Pursing your lips, you're about to respond when a branch snaps omi
