, and you twist the red one, grinning as steaming water pours out of one of the tubes and into the bath, the handles glowing gently. Ah, the wonders of magic!\n\t\t\n\t\tYou glance over and see that there is already a fresh towel hanging over a rack on the wall, so you undress quickly and slip into the filling tub, gasping slightly at the hot water. You adjust the knobs so that the temperature is perfect, then simply sit back and relax. You can't even remember the last time you had a nice hot bath, and you can practically feel the stress seep from your bones as the steam wafts around you.\n\t\t\n\t\tA couple minutes later, the water runs out, but you decide to rinse your hair and let your fingers start to prune up before finally getting out. You dry yourself with the towel, redress, and go see what else there is to do. \n\t\t*goto help \n\t\n\t#Despite the fact that it's a good idea for them to come along to the mountain because it would be safer, you're getting sick of being around them constantly. You decide to go and meditate alone while you can.  \n\t\t*set stealth %+5 \n\t\t*set cunning %+5  \n\t\t*set help +1  \n\t\t\"All right. I'm going to go meditate before we leave,\" you say, trying to keep the grumpiness out of your tone. \n\t\t\n\t\tLooking up from the counter, Ceylar says, \"There aren't many places to go around here that will be quiet enough, but you could try my room, if you'd like. It's the third one on the left.\" \n\t\t\n\t\tYou nod your thanks and exit the room, glad to finally get some alone time, even if it will only be for a few minutes. You go into the third door on the left, to find a small and somewhat bare room, but a tidy one nevertheless. There is a large mirror hanging on the wall, with a battered dresser beside it. The bed in the corner of the room is covered in blue sheets, and there is a small window that looks out onto the village square. \n\t\t\n\t\tYou shut the door behind you, and although this doesn't muffle the sounds from the others completely, it will be good enough. You sit down in the center of Ceylar's room in the lotus position, clearing your mind and allowing all of your thoughts to drift away as you concentrate solely on your slow, rhythmic breathing. The last several days have been stressful and chaotic to say the least, so to finally have an opportunity to meditate is a rare treasure. \n\t\t\n\t\tYou are only able to meditate for a few minutes longer, as you know that you will have to leave soon, but by the end of it, you feel reinvigorated; the cobwebs have been shaken from your mind, and you feel calmer than before. With that finished, you exit the magician's room, looking around as you decide on what to do next. \n\t\t*if help = 2 \n\t\t\t*goto done \n\t\t*goto help \n\n*label done \n*page_break \n\nBy now, it seems that everyone is done preparing for the short journey. Ceylar has finished packing up all of the food, Lorelle has done similar with the medical supplies, ${boggart} waits with his tail twitching impatiently, and Vidar walks into the room, placing the tarp down on the largest table and spreading it out to lay the weapons bare. He takes his shield and straps it onto his back, and then puts his sword's sheathe onto his belt, buckling it across his chest and around his waist.\n\nWith that, he turns to the rest of you, an excited look on his face. \"All right, everyone,\" he rumbles. \"I've got all of your weapons ready, and now I think we can begin our trek to the mountain.\" He hands Ceylar his dagger, who accepts it graciously and puts it on his belt. \n\nThe warrior holds a smaller dagger out to Lorelle, but she simply crosses her arms and shakes her head, saying, \"Keep it for yourself, Vidar. You know I won't use a weapon.\"\n\nHe shrugs, but doesn't look surprised. You can only assume this has happened on several occasions. He finally turns to you, saying, \"And for you, demon ${hunter}, I've made a new staff, which is solid and swift. I figured you'd like something you're used to.\" Handing over the blade he had offered to the healer, he adds, \"And I suppose you may as well take this, too.\" After a moment, he adds, \"Oh, I almost forgot.\" He walks over to the battered chest at the foot of one of the beds, and pulls out a backpack. \"Here are your things,\" he says.\n\n*page_break \n\n*if vidar > 64 \n\t\"Thanks, my friend,\" you say with a smile, \n*if vidar \u003c 50 \n\tYou nod to him,\n*if ((vidar > 49) and (vidar \u003c 65)) \n\t\"Thank you,\" you reply,\nstrapping the dagger to your belt and taking the staff, shifting the familiar weight in your hands. You take a look inside the bag and find that all of your remaining items are there: your teleportation rune, demon bestiary, and everything else.\n*if smart\n\tYou pluck out the Ring of Owls, slipping it back onto your finger and instantly feeling a surge of clarity wash over you.\n*if lions\n\tYou pluck out the Ring of Lions, slipping it back onto your finger and instantly feeling a surge of courage wash over you.\n*if persuasion\n\tYou pluck out the Ring of Dragonflies, slipping it back onto your finger and instantly feeling a surge of charisma wash over you.\n*if shadows\n\tYou pluck out the Ring of Spiders, slipping it back onto your finger and instantly feeling a surge of craft and cleverness wash over you.\n\nThe magician rubs his hands together and says, \"All right, let the journey begin!\"\n\n\"Finally!\" your apprentice says excitedly, soaring over to land on your shoulder.\n\n*fake_choice \n\t#You give him a warm smile, telling him, \"It's good to have you back on your favorite spot, little one.\"\n\t\t*set relationship %+5 \n\t\tYour apprentice wiggles with happiness and squeaks, \"It's just like old times!\"\n\n\t#You give him an annoyed look and wordlessly raise your eyebrows at him. The boggart rolls his eyes and sighs gruffly, saying, \"Fine, whatever,\" and hops over onto Lorelle's shoulder instead. \n\t\t*set relationship %-5 \n\t\tConsidering how you've been in bed for the majority of the past few days and you've got a journey ahead of you, the last thing you want is that obnoxious boggart weighing you down, even if he isn't all that heavy. \n\t\t\n\t\tThe healer gives him a grin and tickles the underside of his chin, and he giggles, seeming to brighten up a bit. \n\t\n\t#You give him a nod and a smile, saying, \"Welcome back, my friend.\"\n\t\t*set relationship %+5 \n\t\t\"It's good to be back!\" he pipes up, shifting to get comfortable.\n\t\n\"Oh, just a moment,\" Vidar says. He walks out of the room and heads down the hallway. A few moments later, he returns, his arms full of four long, large cylindric bags. Grunting a little under the weight, he says, \"Here, let's each take one of these. They're tents, just in case.\"\n\n\"Good idea,\" Lorelle says, quickly grabbing one and putting it over her back using the straps. \n\nThe magician nods, grabbing his as well, and comments, \"Ah, yes, I did notice that clouds were starting to form overhead earlier. I love the rain, but only when I'm inside, sleeping.\"\n\nYou take your tent from the warrior as well, happy to see that it's actually fairly light, even in your current condition. Unburdened by all the other tents, Vidar hoists his over his shoulder and says, \"All right, let's go!\"\n\n*page_break \nWith that, the five of you head outside, Vidar saying, \"I've been to Melithar's Mountain a couple of times. Never to meet the wizard myself, but I know where we're going, at least. If you all follow me, we should be there within a day at most.\"\n\n\"Good,\" you say. \"At this point, Mendax is likely only a day behind us, so we should hurry.\"\n\nAs you and your group follow Vidar at a quick pace, you gaze out into the distance, looking at the solitary peak that is your destination. It is a massive, brown landmark, though by mountains' standards, it's rather small. You suppose that's good all the same, since the climb up to the top won't be too arduous. Aside from the darkening clouds in the distance, the weather seems fine for now, with a cool breeze and some light sunshine. \n\nYour apprentice leaps into the air and flaps lazily above your group, giving a toothy grin and saying, \"Freedom at last! It's great to finally be moving again.\"\n\nYou could be walking for hours at a time, and despite your waxing strength, the amount of materials you're carrying will eventually become burdensome. How do you distract yourself and pass the time?\n*choice \n\t#You decide to have a conversation with ${boggart}. It's been a while since the two of you have just talked, and it would be nice to see how he's doing.\n\t\t*set relationship %+5\n\t\t\"Hey, ${boggart},\" you say, \"why don't you come over here so we can talk for a bit?\"\n\t\t\n\t\tThe boggart \n\t\t*if relationship > 69 \n\t\t\tsmiles and says, \"Okay, ${name}!\" eagerly flapping over and \n\t\t*if relationship \u003c 50 \n\t\t\traises an eyebrow and gives you a suspicious look, but flies over anyway,\n\t\t*if ((relationship > 49) and (relationship \u003c 70))\n\t\t\tlooks over at you and says, \"Sure!\" as he angles toward you,\n\t\tlanding on your shoulder. He gives you an expectant look, waiting for what you have to say next.\n\t\t*choice \n\t\t\t*selectable_if (relationship \u003c 55) #You decide to apologize for how you've been treating him lately. At the end of the day, he is a good companion and apprentice, despite your differences.\n\t\t\t\t*set compassionate %+5 \n\t\t\t\t*set altruism %+5 \n\t\t\t\t*set relationship %+5 \n\t\t\t\tYou sigh, thinking about what to say, exactly.\n\t\t\t\t\n\t\t\t\t\"What is it, ${name}?\" he asks.\n\t\t\t\t\n\t\t\t\tStraightening out, you respond, \"${boggart}, I just wanted to let you know that I'm sorry for how I've been cold to you. We may not agree on everything, but lately I've come to realize that you are in fact a good companion, and a good apprentice, and I'd like to make an effort to stop arguing with you and fighting with you.\"\n\t\t\t\t\n\t\t\t\tThe little imp's large purple eyes widen and he says, \"I never thought I'd hear that from you! You're not playing a prank on me, are you?\"\n\t\t\t\t\n\t\t\t\tYou narrow your eyes playfully, saying, \"Hey, don't push it.\"\n\t\t\t\t\n\t\t\t\tHe giggles and says, \"I know, I know, I'm just joking. Well, thanks, ${name}. Maybe I'll make an effort to stop calling you an idiot, too.\"\n\t\t\t\t*goto mendax \n\t\t\t\n\t\t\t#Just for fun, you decide to ask him what other kind of animal he would like to be able to transform into, if he had the chance.\n\t\t\t\t*set cunning %+5 \n\t\t\t\t*set relationship %+5 \n\t\t\t\tYou smile at your apprentice and say, \"So, out of curiosity, what kind of animal would you choose to transform into instead of \n\t\t\t\t*if toad \n\t\t\t\t\ta poisonous toad \n\t\t\t\t*if eagle \n\t\t\t\t\tan eagle \n\t\t\t\t*if viper \n\t\t\t\t\tan electric viper \n\t\t\t\tif you could? Anything at all!\"\n\t\t\t\t\n\t\t\t\tHis eyes widening, he says, \"Wait, why? Are you going to train me some more? Am I going to upgrade my transformation?!\"\n\t\t\t\t\n\t\t\t\tYou laugh and reply, \"No, no, this is just for fun.\"\n\t\t\t\t\n\t\t\t\tYour apprentice looks a little disappointed, but the topic has definitely broached his interest. \"Hmm,\" he muses. \"There are so many different cool transformations, but I think I would want to be a phantom! They're so mysterious and creepy. Or wait, maybe a basilisk. They're so strange and cunning! Oh, actually, I changed my mind. I think I'd wanna be a sphinx; they're so powerful and handsome!\"\n\t\t\t\t\n\t\t\t\tYou laugh and say, \"You've got quite the imagination, ${boggart}. Well I'll certainly keep that in mind for later.\"\n\t\t\t\t*goto mendax \n\t\t\t\n\t\t\t#Acknowledging that the both of you have had a chaotic and tumultuous time lately, you ask him, \"How have you been holding up, ${boggart}? Are you okay?\"\n\t\t\t\t*set compassionate %+5 \n\t\t\t\t*set relationship %+10 \n\t\t\t\t*if relationship \u003c 50 \n\t\t\t\t\tYour apprentice looks at you oddly, but just shrugs\n\t\t\t\t*if relationship > 69 \n\t\t\t\t\tThe little boggart gives you an appreciative smile \n\t\t\t\t*if ((relationship \u003c 70) and (relationship > 49))\n\t\t\t\t\t${boggart} gives you a sad smile \n\t\t\t\tand replies, \"Well, to be honest, not very well. Ever since Mendax came around, my whole life has been a disaster.\" He grins a little and adds, \"Though there have been good times, too. Gretchin and Lorelle made me happy, and Melody, too. Good company makes everything more bearable.\" \n\t\t\t\t*if relationship \u003c 50 \n\t\t\t\t\tRolling his eyes, he says, \"And I guess you can be okay sometimes, too, when you're not being mean.\"\n\t\t\t\t*if relationship > 69 \n\t\t\t\t\tHe hugs your neck, and says, \"And of course you make everything better, too, even if you did get us into this mess. I love you ${name}.\"\n\t\t\t\t\t \n\t\t\t\t\tScratching him under the chin, you say with some affection, \"I love you, too, little one.\"\n\t\t\t\t*if ((relationship \u003c 70) and (relationship > 49))\n\t\t\t\t\tHe gives you a friendly poke and says, \"Plus, you're all right, too.\"\n\t\t\t\tHe pauses and adds, \"Thanks for talking about this with me, ${name}.\"\n\t\t\t\t*goto mendax \n\t\n\t*selectable_if (lorelle > 65) #You move a little bit closer to Lorelle while you walk, catching her eye and giving her a smile. You'd like to spend some time with her and maybe flirt a little, too.\n\t\t*set lorelle %+10 \n\t\tThe healer matches your gaze, her beautiful azure eyes glinting in the sunlight. She gives you an affectionate rub on the arm and says, \"Hey, ${name}. What are you thinking?\"\n\t\t*choice \n\t\t\t#You smile at her and reply, \"I just like talking to you. I'm curious, what is your favorite thing about me?\"\n\t\t\t\t*set cunning %+5 \n\t\t\t\t*set lorelle %+5 \n\t\t\t\tThe healer looks a little surprised but quickly composes herself. She gives you a shy smile of her own and replies, \"Well, I like quite a lot of things about you, ${name}. You're \n\t\t\t\t*if male \n\t\t\t\t\tdashing\n\t\t\t\t*if female \n\t\t\t\t\tgorgeous\n\t\t\t\tand \n\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\tcharming,\n\t\t\t\t\t*goto char \n\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\tmysterious,\n\t\t\t\t\t*goto char \n\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\tintelligent,\n\t\t\t\t\t*goto char \n\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\tbrave,\n\t\t\t\t\t*goto char \n\t\t\t\t*label char \n\t\t\t\tbut most of all I like that you're \n\t\t\t\t*if compassionate > 64 \n\t\t\t\t\tso compassionate toward others.\n\t\t\t\t\t*goto like \n\t\t\t\t*if altruism > 64 \n\t\t\t\t\tso selfless. You're always thinking about others.\n\t\t\t\t\t*goto like \n\t\t\t\t*if relationship > 64 \n\t\t\t\t\tso kind to our little boggart friend. He deserves it and it shows the good in you.\n\t\t\t\t\t*goto like \n\t\t\t\tso wonderful to me. No one else has ever treated me the way you do.\n\t\t\t\t*label like \n\t\t\t\t\n\t\t\t\tUnable to keep yourself from grinning, you say, \"And you, my lady, always find a way to give the perfect answer.\"\n\t\t\t\t*goto mendax \n\t\t\t\t\n\t\t\t#Winking at her, you lean in and whisper in the healer's ear, \"I was wanting to know a little bit more about those potions you carry. Would you like to meet me in my tent later and tell me about them?\"\n\t\t\t\t*set stealth %+5 \n\t\t\t\t*set charisma %+5 \n\t\t\t\t*set lorelle %+5 \n\t\t\t\tThe healer shivers at your words and gives you a certain look, a mischievous glint in her blue eyes. \"Oh, you're interested in knowing more about my potions, are you? I think I can show you a thing or two.\"\n\t\t\t\t\n\t\t\t\tHer defined cheekbones are flushed red, and she looks a little shy, but excited and confident as well. \"It's a date, then!\" you reply.\n\t\t\t\t*goto mendax \n\t\t\t\n\t\t\t#Knowing that these things make her happy, you wrap your fingers around hers, and point to the nearest bird perched upon a tree as you walk. \"I enjoy watching wildlife as well, you know,\" you say. \"We can observe them everywhere we go!\"\n\t\t\t\t*set lorelle %+5 \n\t\t\t\t*set resolve %+5 \n\t\t\t\t*set lorelle %+7\n\t\t\t\tRelaxing at your touch, Lorelle leans into you with a smile, saying, \"I hadn't even thought about that, but I suppose you're right!\" She points out a large, fluffy, and intimidating looking owl staring down at you in annoyance from its perch. \"Look, just over there. That's a granite feathered owl.\"\n\t\t\t\t\n\t\t\t\tYou grin and ask, \"Do they always look so grumpy?\"\n\t\t\t\t\n\t\t\t\t\"Only when loud adventurers wake them up from their naps,\" she says cheekily.\n\t\t\t\t\n\t\t\t\tShe wraps her arm around your waist as the two of you continue to walk, pointing out other wildlife as you go and just enjoying one another's company.\n\t\t\t\t*goto mendax \n\t\n\t*selectable_if (vidar > 65) #You make your way over to Vidar, bumping his shoulder playfully and grinning. It would be nice to get some more one on one time with him.\n\t\t*set vidar %+10\n\t\tThe warrior arches a bushy eyebrow, grinning from behind his beard. He gives you a friendly push back, and you stumble for a couple steps, laughing as you regain your balance. \n\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\"You like it rough, do you?\" you say, winking at him.\n\t\t\t*goto s \n\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\tYou try to play it off, though, using your agility to catch your balance quickly. He watches you, amused.\n\t\t\t*goto s\n\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\"Ah, now I see how it is,\" you chuckle. \"I'll be ready next time.\"\n\t\t\t*goto s \n\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\"Don't make me fight you. I'll win, you know!\" you tell him playfully.\n\t\t\t*goto s \n\t\t*label s \n\t\t\t\n\t\tThe warrior moves a bit closer to you, his toned arm brushing up against you as you continue to walk. \"What's on your mind, demon ${hunter}?\" he asks.\n\t\t*choice \n\t\t\t#Giving him a mischievous grin, you say, \"I wanna tell you something.\" He leans in, intrigued, and you whisper hotly in his ear, \"I want to meet you in your tent later, okay?\"\n\t\t\t\t*set vidar %+7\n\t\t\t\t*set stealth %+5 \n\t\t\t\t*set charisma %+5 \n\t\t\t\tThe warrior shivers, and to your delight, you notice that goosebumps visibly crop up on his neck. He gives you a sideways grin and brushes his dreads out of his eyes. He tries to act nonchalant, but you can tell he's nervous. \"That sounds fine to me,\" he says. With a wink he rumbles, \"You aren't going to tell me why, are you?\"\n\t\t\t\t\n\t\t\t\t\"Of course not!\" you say. \"You'll have to find out for yourself.\"\n\t\t\t\t\n\t\t\t\tVidar cracks his knuckles and looks around dramatically, saying, \"Hmm, I think it's about time to tent up. I wonder where a good spot would be?\"\n\t\t\t\t\n\t\t\t\tYou let out a laugh as he chuckles to himself.\n\t\t\t\t*goto mendax \n\t\t\t\n\t\t\t#\"My shoulders are really sore.\" Giving him a meaningful look, you add, \"I wish there was someone to give me a massage.\"\n\t\t\t\t*set resolve %+5 \n\t\t\t\t*set vidar %+5\n\t\t\t\tThe warrior chuckles and says, \"I can do something about that. You owe me, though!\" \n\t\t\t\t\n\t\t\t\tHe lessens his pace a little bit, so he's directly behind you, and slips the tent off your shoulders and onto his. The others give you two a few odd glances but he pays them no mind as he starts to work his strong, calloused fingers into the knots in your muscles gently but firmly, just like before.\n\t\t\t\t\n\t\t\t\tYou sigh with pleasure as the stress practically floats away from your muscles. He continues on for a couple more minutes, massaging his fingers deeply into your shoulders. You glance up at him a couple times, and he smiles back at you, his dark eyes glinting in amusement. You lean back so you're pressing against him as you walk, but the warrior finally stops. He kisses you on the cheek, though, his mustache tickling your skin, and says, \"We can do more of that later, okay?\"\n\t\t\t\t\n\t\t\t\tStretching a bit, you take your tent back and say, \"Sounds perfect, Vidar. I feel so much better now.\"\n\t\t\t\t*goto mendax \n\t\t\t\n\t\t\t#You smile at him and say, \"I just wanted to talk. I love hearing your voice. Tell me something.\"\n\t\t\t\t*set cunning %+5 \n\t\t\t\t*set vidar %+5 \n\t\t\t\tHe says, \"I never get tired of hearing that. Well, like what?\"\n\t\t\t\t\n\t\t\t\tYou shrug and say, \"Anything.\" Vidar strokes his beard, thinking about it for a minute, so you roll your eyes playfully and say, \"For starters, what do you like best about me?\"\n\t\t\t\t\n\t\t\t\tSeemingly taken off guard, he pauses for a moment but then says with confidence, \"Well, a lot of things, of course.\n\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\tYou're witty, charming, and fun to talk to.\n\t\t\t\t\t*goto d \n\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\tYou're mysterious and fascinating.\n\t\t\t\t\t*goto d \n\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\tYou're incredibly smart and clever.\n\t\t\t\t\t*goto d \n\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\tYou're bullheaded like me, and you've got so much spirit.\n\t\t\t\t\t*goto d\n\t\t\t\t*label d \n\t\t\t\tPlus, it doesn't hurt that you're\n\t\t\t\t*if male \n\t\t\t\t\thandsome\n\t\t\t\t*if female \n\t\t\t\t\tbeautiful\n\t\t\t\teither,\" he says, running his eyes up and down your body.\n\t\t\t\t\n\t\t\t\tYou smile, saying, \"Well, that's good to know. I like you quite a bit myself.\"\n\t\t\t\t*goto mendax \n\t\t\t\t\n\t\n\t*selectable_if (ceylar > 65) #You go over to Ceylar and ruffle his hair flirtatiously with a playful smirk. You're really starting to like the magician and would enjoy more of his company.\n\t\t*set ceylar %+10 \n\t\tHe walks closer to you as your group continues its way toward Melithar's Mountain, and brushes up against you, saying, \"So, what are you thinking about?\"\n\t\t*choice \n\t\t\t#You grab him by the front of his wizard robe and yank him toward you, whispering deviously, \"Hey, you can meet me in my tent later and show me some magic, right?\"\n\t\t\t\t*set ceylar %+7 \n\t\t\t\t*set stealth %+5 \n\t\t\t\t*set charisma %+5 \n\t\t\t\tThe magician gives you a dazzling grin and replies with a wink, \"Oh, yes. I can show you all sorts of magic.\" You're pleased to see that his freckled cheeks are flushed with red, and he has an excited glint in his cool, verdant eyes. He twirls some azure lightning deftly between his fingers for emphasis.\n\t\t\t\t\n\t\t\t\tYou wink back and reply, \"Good, that's what I wanted to hear.\"\n\t\t\t\t*goto mendax \n\t\t\t\n\t\t\t#\"I just like talking to you, Ceylar. Tell me, what's your favorite thing about me?\"\n\t\t\t\t*set cunning %+5 \n\t\t\t\t*set ceylar %+5 \n\t\t\t\tHe strokes his chin and gives you a puzzled look, saying, \"Wow, that's a tough question. I'd have to find something I liked about you first.\" You glare at him, unamused, but he laughs and says, \"Just joking, just joking. I like so much about you. You're incredibly \n\t\t\t\t*if female \n\t\t\t\t\tpretty \n\t\t\t\t*if male \n\t\t\t\t\thandsome \n\t\t\t\tand besides, you're probably the \n\t\t\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t\t\tmost charming\n\t\t\t\t\t*goto to \n\t\t\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\t\tmost interesting \n\t\t\t\t\t*goto to \n\t\t\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\t\tsmartest \n\t\t\t\t\t*goto to \n\t\t\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\t\ttoughest \n\t\t\t\t\t*goto to \n\t\t\t\t*label to \n\t\t\t\tperson I know.\"\n\t\t\t\t\n\t\t\t\tYou smile at him and reply with a wink, \"And you're the sweetest, funniest person I know. Well, at least you think you are.\"\n\t\t\t\t*goto mendax \n\t\t\t\t\n\t\t\t#You wrap your arm around him and pull him closer as you walk, saying, \"Do you think they'll be telling stories about us all when this whole journey is finished?\"\n\t\t\t\t*set ceylar %+5 \n\t\t\t\t*set resolve %+5 \n\t\t\t\tThe magician grins and wraps his arm around you in turn, placing a hand on your waist. He smiles at you and replies, \"Oh, all across the land! There will be feasts held in our honor, people dancing on tables, and flower petals thrown on us everywhere we go!\" You raise an eyebrow at him which only spurs him on further. \"People will sing songs about us, and everyone will know our names. We'll be rich! What will you do with your magnificent wealth?\"\n\t\t\t\t\n\t\t\t\tYou roll your eyes and laugh, replying, \"I think you might be exaggerating a little, Ceylar. Let's wait until this is all over and then we'll see.\"\n\t\t\t\t\n\t\t\t\tThe magician shrugs and smiles at you, saying, \"Well, as long as I'm with you, it doesn't matter to me.\"\n\t\t\t\t*goto mendax \n\t\n\t#You decide to strike up a conversation with the whole group. It would be a way to pass the time, and a good way to interact with everyone.\n\t\t*set ceylar %+5 \n\t\t*set relationship %+5 \n\t\t*set lorelle %+5 \n\t\t*set vidar %+5 \n\t\tYour group continues on its path, but a silence currently hangs over you all as Vidar trudges on, leading the way. Your apprentice fidgets restlessly and Ceylar starts to absentmindedly whistle. They all seem a bit nervous about the journey ahead. What would you like to talk to them about?\n\t\t*choice \n\t\t\t#In the event that some unexpected attack does happen, it's always good to be prepared. You'd like to talk strategy with them.\n\t\t\t\t*set resolve %+5 \n\t\t\t\t\"Hey, everyone,\" you say. When you have caught your group's attention, you continue, \"I realize that we should all have a head start on Mendax, but there is still the very real possibility that he is following us not too far behind. We'll get to Melithar's Mountain soon, but if something does happen before then, I think we should all be ready. In case of an attack, what will all of you do?\"\n\t\t\t\t\n\t\t\t\tVidar scratches his beard for a moment and responds in his baritone voice, \"Well, it's usually good to play to whatever your strengths are. I, for one, think I would charge the demon, using my sword and strength to give someone else an opening while he dealt with me.\"\n\t\t\t\t\n\t\t\t\tThe magician speaks up, adding, \"I'm not very useful in melee like Vidar is, but I could provide long-range attacks with my lightning.\"\n\t\t\t\t\n\t\t\t\tYour apprentice gives a toothy grin and says, \"I could distract him! I can fly around pretty fast when I want to, and I always have my tail's stinger as well.\"\n\t\t\t\t\n\t\t\t\tThe healer shrugs and says, \"I have no experience in fighting, but I could always lay back and provide some rapid healing whenever someone needs it.\"\n\t\t\t\t\n\t\t\t\tYou nod, satisfied, and respond, \"Excellent ideas, everyone. My experience and expertise coupled with all of your help should give us a better chance in case something does happen, as long as we work together.\"\n\t\t\t\t*goto mendax \n\t\t\t\n\t\t\t#You decide that you'd like to try to boost their morale somehow and reassure everyone that things will work out.\n\t\t\t\t*set charisma %+5 \n\t\t\t\t\"You know,\" you say, \"Now that we're finally on our way to Melithar's Mountain, I'm feeling much better about this.\"\n\t\t\t\t\n\t\t\t\t\"Really?\" the healer says. \"I'm optimistic myself, but it's hard not to imagine the demon popping out at us any moment.\"\n\t\t\t\t\n\t\t\t\tYou shake your head and reply, \"Of course not! He's so scared of Melithar that he wouldn't come within miles of his mountain. In fact, he was in my nightmares the other night, begging me not to go there!\"\n\t\t\t\t\n\t\t\t\tYour apprentice giggles, and says, \"Yeah right, ${name}.\"\n\t\t\t\t\n\t\t\t\tCeylar can't help but grin himself. He adds, \"Of course he did. Demons are cowards, no matter how powerful they might be!\"\n\t\t\t\t\n\t\t\t\tVidar rolls his eyes but says good naturedly, \"Well, if you're all so sure that this demon is terrified of Melithar, we had better get to the mountain as soon as possible, hadn't we? Let's quicken our pace a bit.\" \n\t\t\t\t*goto mendax \n\t\t\t\n\t#Although you don't mind everyone's company, you would still like some time for yourself every once in a while. You decide to excuse yourself politely and find something to do by yourself to occupy your time as you travel. \n\t\t*set polite true \n\t\t*goto self \n\t\n\t#You decide to mind your own business, choosing not to engage any of them in conversation, and instead find something else to do. You'd rather stick with your own thoughts; you're really only traveling with them for practical reasons, not to socialize. \n\t\t*set vidar %-5 \n\t\t*set relationship %-5 \n\t\t*set ceylar %-5 \n\t\t*set lorelle %-5 \n\t\t*label self \n\t\t*set stealth %+5\n\t\tAs your group continues to make its way toward Melithar's Mountain, you drop back a little bit so you're trailing the others by a few feet. Lorelle and Ceylar glance back curiously, \n\t\t*if polite \n\t\t\tand you tell them, \"Don't mind me. I'm just going to keep to myself for a little while.\"\n\t\t\t\n\t\t\tNodding, Lorelle says, \"Okay, ${name}.\"\n\t\t\t\n\t\t\tYou think about how to keep yourself busy.\n\t\t\t*goto continue \n\t\tbut you ignore them as you decide on how you would like to pass the time. \n\t\t*label continue \n\t\tThere aren't many options, but a few do cross your mind. \n\t\t*choice \n\t\t\t#It has been some time since you've read up on your demon bestiary in any appreciable amount. Perhaps you should peruse its pages in order to stay sharp. \n\t\t\t\t*set cunning %+5 \n\t\t\t\tSwinging your backpack off your shoulders, you open it and fish around for your Demon Book of Names. You retrieve it from your bag, admiring the ancient tome. Its appearance is nothing special; the cover is a dull, even brown, with \"DH\" engraved in the center, but aside from that, it is unassuming. You know very well, however, that it is likely one of the most powerful and important books in Lume, and practically impossible to damage. \n\t\t\t\t\n\t\t\t\tYou crack open the bestiary, flipping through the pages as you walk. With a frown, you mutter Mendax's name, causing the book to glow dimly and flip to the page where the Master demon's name is inscribed. The same as before, the biography on Mendax is, quite surprisingly, almost bare. The only things the page lists are his name, title, and the realm of the Netherworld that he presided over, called Zyleth. Curious, you utter the name of this realm, and the Demon Book of Names flips its pages until it arrives at a short description of the place, written in the ancient tongue of the wizards of Lume.\n\t\t\t\t\n\t\t\t\t[i]Although little is known of the Zyleth Realm, presided over by the cruel overlord, Mendax the Master, certain is this: This pit in the Netherworld is said to have some of the strongest celestial beings guarding its gates, preventing demons and other Infernal creatures from leaving this dimension. Such precautions are typically taken only by necessity, such as when large amounts of demons attempt to make regular escapes from the Netherworld.[/i] \n\t\t\t\t\n\t\t\t\t[i]This, as well as multiple records of demons escaping en masse from the portals, leads us to believe that escape from the Netherworld into Lume is rare, and yet somehow much more common in Zyleth, as if orchestrated for large plans unknown. Beware.[/i]\n\t\t\t\t\n\t\t\t\tYou feel an icy dread nipping at your stomach. So perhaps what Mendax said about rallying forces against you is true, after all. You will have to be more wary than ever.\n\t\t\t\t*goto mendax \n\t\t\t\n\t\t\t#You practice moving silently as you travel, determined to maintain your stealthiness. Your extensive wounds and the days spent laying in bed may have stunted your sneaking abilities, but not your will.\n\t\t\t\t*set stealth %+5 \n\t\t\t\tYour movements are still refined, but noticeably less so than before. You aren't as quick as you were only a week ago, and every now and again you notice yourself shuffling or making much more noise than you usually would have. It won't fix the problem completely, but practice is the best way to become sharper at remaining undetected. You close your eyes and take a deep breath, gathering all your focus, and then open them again. \n\t\t\t\t\n\t\t\t\tAs you walk, you do so in a more deliberate manner, avoiding fallen leaves and twigs, and keeping your center balanced and your footsteps rhythmic. In practice, this makes it more difficult for anyone you could be sneaking after to notice you, as there is no inconsistency in your pace, or footsteps that are louder than others. As you and your group continue to travel along the road, you keep practicing, and before long you feel like you have gotten back into the rhythm of things, more confident about your abilities again.\n\t\t\t\t*goto mendax \n\t\t\t\n\t\t\t#There is still a possibility of having another confrontation with Mendax, so you need to regain your former strength as quickly as possible. You decide to carry something heavy on your travels in order to help build up your muscles during the journey.\n\t\t\t\t*set stealth %-5 \n\t\t\t\t*set resolve %+5 \n\t\t\t\t*set health +1 \n\t\t\t\tYou look around for something suitable to carry, and quickly spot a large rock near the edge of the road. You make your way over to the rock and take it into your hands, lifting up with your knees and prying it out of the earth. Normally, in your peak physical condition, this feat would be simple. Now, however, it takes considerable effort, and it leaves you grunting and panting as you heft the rock up a little higher, hugging it against your chest as you struggle to catch up with the others. \n\t\t\t\t\n\t\t\t\tCeylar looks over at you, puzzled, and says, \"Are you all right?\"\n\t\t\t\t\n\t\t\t\t\"Fine,\" you grunt, sweat already starting to trickle down your brow.\n\t\t\t\t\n\t\t\t\tVidar glances back, giving you an approving look and saying, \"Let ${dhim} concentrate, Ceylar.\"\n\t\t\t\t\n\t\t\t\tThe magician shrugs and leaves you to it. You and your group continue to walk toward Melithar's Mountain, and although your own progress is slower and more labored, you feel the familiar sensation of burning muscles, a good sign that they'll be thanking you in the days to come. You aren't able to carry the rock for long, and after several minutes you end up having to release it with an exhausted grunt, but as you catch your breath and take a refreshing sip of water, you do feel like you have accomplished something, however small.\n\t\t\t\t*goto mendax \n\t\t\n*label mendax \t\t\n*page_break \n\nSuddenly, without warning, Mendax appears in front of you in an explosion of sickly green mist, his tall, sinuous body towering over you as his crimson eyes stare hungrily into yours and a cruel laugh slithers from his mouth. \n\n*image mendax.jpg\n\n${boggart} shrieks in fright and instinctively flies away, while Lorelle just freezes in place, a look of terror in her eyes. Vidar draws his sword and Ceylar readies his hands for a bolt of magic, but they both back away in fear. You ready your own staff, gripping it so tightly that your knuckles turn white, but you can only stare at him in disbelief. \"How is this possible?!\" you yell, furious.\n\nThe demon simply ignores you, saying in a mocking tone, \"Leaving so soon? But I'm so close to catching you! Why don't you stay a while?\"\n\n*page_break \n\nVidar roars in anger and charges forward, though you can see his hands trembling in terror. The Master's smile only widens and he just lazily lifts a long, spidery hand. The warrior cries out and stumbles to his knees, the sword clattering, useless, from his hands. He collapses on all fours, panting heavily as sweat pours down his brow and tears leak from his eyes. Ceylar jumps forward and releases a bolt of lightning from his hands, but Mendax dodges it easily and turns his attention to the magician, an amused glint shining in his deranged eyes. \n\nCeylar draws his dagger but the demon just gives another callous laugh and suddenly the magician lets out a high-pitched scream, falling flat on his back and scrambling desperately away, groaning in dread. Your apprentice is nowhere to be found, and Lorelle has fallen to her knees, hugging herself and whimpering helplessly as she shakes as though freezing from some unseen cold. The demon turns to you, and a fear so visceral it appears before you like a wave of icy mist emanating from his hands washes over you. \n\nYou feel it begin to paralyze you, its frigid tendrils creeping up your body and clutching at your heart, threatening to consume it and shatter it completely. An involuntary moan of dread creeps from your mouth, and your hands start to tremble uncontrollably. The Master sneers and begins to stroll slowly toward you, savoring his complete and utter power over you. As he approaches, though, you manage to muster one final bit of resistance. Your long dealings with the dark have allowed you some small amount of immunity, and you will never go down without a fight!\n*fake_choice \n\t#You try to use your demon bestiary; it is the only edge you've ever had against him!\n\t\t*set cunning %+5 \n\t\tDigging in your backpack, you retrieve your Demon Book of Names, quickly muttering the Master's name and causing the tome to flip to the page revealing the information about the demon. He simply laughs and mocks, \"Do you really think that old book will save you again?! Nothing can stand between me and your delicious soul!\"\n\t\t\n\t\tHe raises his slender hand toward you and you suddenly feel the fear intensify, blanketing you in a frigid aura. Your heart races at an unbelievable pace and your hands start to shake so fast that you can barely read the words on the pages, but you gather all the clarity you can and yell in the ancient language, \"Your infernal presence cannot remain in this realm! Begone demon, back to the pit!\"\n\t\t\n\t\tYou wait for a moment, but nothing happens. The demon simply stands there, untouched. It feels like you have been punched in the stomach as Mendax cackles and moves closer to you, jutting his hand out toward your chest. A powerful magic crashes over you, and you feel as though your very soul is being rended from your chest as you collapse to the dirt, drool spilling from your mouth and your demon bestiary skittering, useless, to the ground.\n\t\n\t*selectable_if (resolve > 69) #You muster every bit of willpower you can to try to resist his spell and attack him.\n\t\t*set resolve %+5 \n\t\tYou feel the Master's spell slowly start to overpower you, but in one last bid of defiance, you steel your mind and steady your nerves, rising slowly to your feet and trying your best to ignore the waves of panic coursing through you. His crimson eyes widen in surprise as you ready your weapon and charge forward, though every movement is labored. With a ragged battle cry, you swing your staff through the air, aiming for his throat, but he narrows his cruel eyes and dodges easily, circling you quickly as you struggle to ward off his magic.\n\t\t\n\t\tAnger pumping through your veins, you strike at him again, but Mendax quickly ducks, mocking and goading you as he continues to evade your attacks. \"Impressive, demon ${hunter}, but it will never be enough!\"\n\t\t\n\t\tHe raises his slender hand again and you feel some unseen force strike you in the chest. You stagger back, all hope dissipating from your mind as your staff flies from your grasp and you collapse onto the ground, panting in exhaustion.\n\t\n\t#You try to trick him, planning to feign defeat and then strike out with your dagger at the last moment. \n\t\t*set stealth %+5 \n\t\tGroaning, you collapse on all fours, shaking uncontrollably and muttering in horror. Mendax cries, \"Yes, yes! Your terror is like a feast to me, a delicacy to my tongue!\"\n\t\t\n\t\tHe swoops forward and whispers in your ear like a snake as an icy magic crashes over you, enveloping your body and making you feel as though you are falling into an endless pit. \"You will never be able to defeat me, demon ${hunter}! You are too weak, too fragile to hope to stand against me!\"\n\t\t\n\t\tGritting your teeth, you suddenly grab your dagger and slash at his throat as quickly as you can, but the demon simply leaps back, evading your blade and laughing mockingly. You stagger to your feet, holding the blade out defensively in front of you, but he just stretches both of his hands out at you and you suddenly feel paralyzed, a sharp rush of adrenaline almost beating your heart out of your chest as you tumble over into the dirt, your knife skittering uselessly away.\n\t\t\n*page_break \nMendax hovers over you, his eyes dancing in flame, and stretches his hands out toward your prone body, tightening them as if around your neck. You feel the power leaving your body as darkness starts to creep across the edges of your vision. The dull throb of your heartbeat fills your ears, and the blackness begins to surround you. The last thing you see is his callous, predatory smile, when suddenly his body is torn apart into a thousand pieces, exploding outward like shrapnel from a grenade. \n\nThe spell the Master had cast over you instantly disappears, and you rake in a gasping breath, as though a great burden had been lifted from your lungs. You stagger to your feet, still feeling weak and dizzy, amazed to see a wizard clothed in rainbow-colored robes standing before you, his hand outstretched as the remainder of the demon's body dissipates into nothingness, as if it had never been there at all. \n\nThe man has long, grey hair trailing down to his waist, and his skin is vibrant and tanned, as if through constant travels in the sunlight. His multicolored robes travel all the way down to his bony ankles, and his feet are clothed in simple, white sandals. The staff he carries is a simple one with a white shaft supporting a sky blue orb. He has a long, crooked nose between piercing blue eyes, and atop his head is a large, pointy hat, colored vibrantly like the rainbow, just like his robes. \n\nCeylar, Vidar, Lorelle, and ${boggart} all gather around you, panting and in awe. Your apprentice's jaw has dropped. The old man gives you a wide smile and says, \"Hello, there. It's nice to finally meet you, ${name}. I'm Melithar!\"\n*finish ", "vidar": "*temp story 0\n*temp bad_story true \n*page_break \n\n[b]Chapter Three of Seven[/b]\n\nStretching, Vidar says, \"I'll be right back, ${name}. I'm going to change out of my armor.\"\n\nGoing out of the door, he leaves you alone for a few moments. Sighing, you take a minute to think about how much longer you have until you can finally journey to Melithar's Mountain. Today, most of your injuries became bearable, and you were no longer in critical condition. By Lorelle's estimations, you'll be able to move around tomorrow, which probably means you'll be fit enough to travel the day after. \n\nEven with a several day delay between when Mendax possessed Callidus and when he can fully take control of his body, that doesn't leave you very much time. Although the demon is unlikely to travel at such a drastic pace as you did, it will still only take him about two days to catch up to you once he starts moving. Considering reaching Melithar could take almost a full day of tirelessly walking, this will certainly be close, and it leaves little room for error. \n\n*page_break \n\nThen again, when has this ever been easy? A moment later, Vidar returns, shutting the door quietly behind him and setting his longsword against the wall beside his bed. \n\n*image vidar.jpg \n\nEven in the dim moonlight shining through the window, and in his simple grey tunic, you can appreciate more of his details now. He is very muscular indeed. His skin is also of a much darker color than the majority of the humans around Lorden, Quader, and Rhys Falls. Perhaps his parents were from across the lands, maybe even from the far away kingdom of Githrad. \n\nHis eyes are a very dark brown, almost black, and he has several noticeable battle scars, though nothing disfiguring. He wears his hair in dreads of various sizes and lengths, certainly an unusual but intriguing style, and his thick black beard goes down to the middle of his chest.\n*fake_choice \n\t#You find him extremely attractive. He has a toughness and confidence about him that's almost intoxicating.\n\t\t*set vidar %+10 \n\t\tIf you are going to have someone protect you against a sneaky outlaw, Vidar is certainly the one to do it. Not to mention that he's just nice to look at. Perhaps he notices you staring at him, because he says, \"Don't worry, I'll be fine without my armor. It makes me faster.\"\n\t\t\n\t\tThe statement seems innocent enough, but you do hear some playfulness behind his words. Grinning, you say, \"Oh, I believe you. I'll have to see for myself.\"\n\t\n\t#From the little that you've seen of him so far, you admire his courage, prowess in battle, and honor. \"Thank you for everything you've done,\" you say gratefully.\n\t\t*set vidar %+5 \n\t\t*set resolve %+5 \n\t\tThe warrior waves it away, but you can tell he appreciates the compliment. \"Don't mention it, demon ${hunter}. I would do it again if it came to it. Besides, Illil and those thugs deserve everything coming to them.\"\n\t\t\n\t\tYou nod, replying, \"Oh, I agree. They were lucky that I was so wounded during the attack.\"\n\t\n\t#You haven't had the opportunity to interact with him very much, but you can't say that's a problem for you. So far, he seems ill-tempered and loud.\n\t\t*set vidar %-5 \n\t\t*set resolve %-5 \n\t\t*set charisma %+5 \n\t\tNodding at him, you say stiffly, \"Goodnight.\"\n\t\t\n\t\tThe warrior says simply, \"Night.\"\n\t\t\nHopping into his bed on the opposite side of the room, he lays on his back and fold his arms under his head, giving a contented sigh. Glancing over at you, he says, \"I'm going to try to get some sleep to regain my energy, but you don't have to worry about anyone keeping watch. I'm a light sleeper, so any noise will wake me up. \n\n\"Anyways,\" he rumbles on, \"Lorelle told me you might be able to walk around tomorrow. In the meantime, though, I might be able to entertain you with some of my stories.\"\n*fake_choice \n\t#His deep voice is surprisingly soothing, and his faint accent is almost addicting. You could listen to him talk all day.\n\t\t*set vidar %+10 \n\t\t\"That sounds excellent!\" you say, smiling. \"I look forward to it.\"\n\t\t\n\t\tThe warrior grins and closes his eyes, his expression peaceful and happy.\n\t\n\t#That does sound entertaining, and it might help you keep your mind off the lingering aches and pains in your body.\n\t\t*set vidar %+5 \n\t\t*set cunning %+5 \n\t\tNodding, you say, \"I like that idea. It might help distract me from being in bed all day.\"\n\t\t\n\t\tThe warrior murmurs an, \"Mhm!\" and closes his eyes, relaxing.\n\t\n\t#You've had enough laying around, regardless of anyone's attempts to keep you occupied. You plan on just trying to speed this process up, perhaps with some minor workouts to get your body back into shape.\n\t\t*set resolve %+5 \n\t\t*set vidar %-5 \n\t\tTrying to hide your distaste, you say, \"I'm getting bored of all this. I'm going to try some minor exercises to help my body repair itself quicker.\"\n\t\t\n\t\tTo your surprise, Vidar doesn't seem too upset. Instead, he says, \"That does sound like a good idea, actually. I was going to suggest it depending on how you were feeling tomorrow.\"\n\t\t\n*if resolve > 64 \n\t*set vidar %+10 \n*if resolve \u003c 65 \n\t*set vidar %-5 \n*if cunning > 64 \n\t*set vidar %+5 \n*if cunning \u003c 60 \n\t*set vidar %-5 \n*if charisma > 64 \n\t*set vidar %+5 \n*if charisma \u003c 60 \n\t*set vidar %-5 \n*if stealth > 64 \n\t*set vidar %-5 \n*if compassionate > 64 \n\t*set vidar %+5 \n*if compassionate \u003c 55 \n\t*set vidar %-5 \n*if altruism > 64 \n\t*set vidar %+5 \n*if altruism \u003c 50 \n\t*set vidar %-5 \nEven though you're exhausted, you notice the warrior glancing at you curiously. Although his expressions can be hard to read sometimes, and he isn't saying anything, you can tell from his posture and body language that he\n*if vidar > 54 \n\tseems to be very comfortable around you already.\n\t*goto vidar \n*if vidar \u003c 50 \n\tdoesn't seem to relate to you very well, at least so far.\n*if vidar > 49 \n\tisn't entirely sure what to make of you.\n*label vidar \n\nWith that, you quickly fall asleep, the lingering effects of Lorelle's potion feeling like a warm, heavy blanket over your body. At the bottom of your bed, ${boggart} twitches every so often. He swishes his tail rhythmically, his snore \n*if relationship > 54\n\tproviding a soothing, white noise.\n*if relationship \u003c 55\n\tan annoying disturbance.\n*page_break \n\t\nThe next morning, you awaken to the quiet clinking and clanking of metal. It takes a moment for you to gather your senses, but you can tell that you've healed substantially even since yesterday. Your headache has practically disappeared, and your body doesn't seem to be aching nearly as much. Sitting up, you see that Vidar is cleaning his armor using a rag wetted with a substance that is sitting in a bowl on one of the tables. \n\nNoticing that you're awake, he rumbles, \"Morning.\" Motioning to the empty space at the bottom of your bed, he adds, \"Lorelle, Ceylar, and ${boggart} left hours ago, since they wanted to catch Illil early in the day.\" Tugging at his beard as he often seems to do, he says, \"In the meantime, I'm just looking after my equipment. It's all custom; I built it all myself.\"\n\nNow that you are able to get a closer look at his armor and weapons, you see that the armor is a shiny steel with light swirls of iron patterning its surface. Just from this, you can only assume that the warrior is a very experienced blacksmith, indeed. After all, steel is expensive, hard to come by, and even harder to properly fabricate. Glancing at his longsword, you see that it is made out of similar materials, with an extra long hand-guard for more effective blocking.\n*fake_choice \n\t#Nodding, you say, \"Impressive. I'm a bit of a crafter myself, actually. I created the staff that I used and even put chemicals into it.\"\n\t\t*set resolve %+5 \n\t\t*set vidar %+5 \n\t\tVidar says, \"I'm glad you like it, and it's nice to see that we have something in common. Chemicals, you say? That likely gave your enemies a nasty surprise.\"\n\t\t\n\t\tYou grin, saying, \"Oh, that's an understatement.\"\n\t\n\t#Straightening out, you comment in interest, \"How clever. You've mixed iron into your sword. Is that to ward away sorcerers and the like?\"\n\t\t*set vidar %+5 \n\t\t*set cunning %+5 \n\t\tVidar says appreciatively, \"Of course a demon ${hunter} wouldn't miss that. You're right, and it makes this sword far more effective. Not to mention that those scum are scared to even get near me in combat.\"\n\t\t\n\t\tYou nod, saying, \"That's a very wise tactic, something I could definitely use in my own vocation. Do you face agents of the dark very often?\"\n\t\t\n\t\tVidar shakes his head, replying gratefully, \"Oh, no, and I'm thankful for that. I might be able to best a witch in battle, but it would be too dangerous to do all the time. Plus, there aren't many around here. Ceylar is pretty much the only magic user I know, aside from Melithar, and I barely know the great wizard on a personal level.\"\n\t\n\t#Smiling, you say, \"Well, it's good to hear that you take pride in your weapons. A rusty sword isn't nearly as effective and your opponents are more likely to laugh at you than take you seriously if they catch you using filthy, worn down equipment.\"\n\t\t*set vidar %+5 \n\t\t*set charisma %+5 \n\t\tHe gives a rumbling laugh, saying, \"I can't imagine that would be good for my image, but I would definitely take advantage of it if they were foolish enough to laugh at me in the middle of a battle.\"\n\t\t\n\t\tYou shrug and say in amusement, \"Perhaps I can laugh along with them to make it more convincing and give you an extra advantage.\"\n\t\t\n\t#Shrugging, you comment, \"That armor might protect you well, but it looks cumbersome. You're more susceptible against a fast opponent. Now that I think of it, that may be the reason you haven't been able to catch Illil.\"\n\t\t*set vidar %-5 \n\t\t*set stealth %+5 \n\t\t*set charisma %-5 \n\t\tThe warrior frowns, and for a moment, you can see a flash go across his dark eyes. Tugging at his beard even more than usual, he says gruffly, \"I told you all before, it's because he has that magical ring. I'm actually a very good tracker to have found him in the first place.\"\n\t\t\n\t\tA second later, he seems to remember that you're sitting in an infirmary bed, gravely wounded after having your village destroyed. His expression softens up a little, and he says, \"But, maybe there's some wisdom to what you said. I still prefer my heftier pieces of armor, but perhaps for select missions, I could leave them behind.\"\n\t\t\n\t\tNodding, you say, \"Well, I'm glad you're willing to take my advice.\"\n\t\t\nBy now, Vidar has finished cleaning his armor and weapons. He sets them against the wall, leaving them to glisten and dry in the sunlight. Turning to you, he says conversationally, \"So, I'm sure you're almost as hungry as I am.\" \n\n*page_break \n\nStanding, he grabs a pair of bowls from the counter, handing one to you and explaining, \"Ceylar made this before he left, but Lorelle told me to let it cool and give you some time before your next meal, otherwise you might get sick because of all the potions you've had.\"\n\n*if vidar \u003c 50 \n\tYou nod, accepting the bowl without a word.\n*if vidar > 49 \n\tAccepting the bowl, you smile, saying, \"Thank you.\"\n\t\nGlancing at your breakfast, you see that it's a bowl of potato soup, with a few other ingredients floating around in there for flavor, you suppose. Taking a bite with your spoon, you see that it's barely lukewarm at this point, and not much less bland than the rice from yesterday. This doesn't seem to deter Vidar, though, who has already started to wolf his down. It definitely seems like he has a voracious appetite, one to rival even your\n*if relationship \u003c 50 \n\tannoying \n*if relationship > 54 \n\twonderful\napprentice's. \n\nWhile the two of you continue to eat, Vidar glances up at you and says, \"So, what do you think about some storytelling? I'm no bard, but I like to think that my tales can rival Ceylar's songs as far as entertainment goes any day.\" Cracking his knuckles loudly, he says, \"Most of my stories are based off of things I've actually experienced, which just so happens to be a lot. What kind of story would you prefer?\"\n*label story \n*if story > 2 \n\t*goto therapy \n*hide_reuse \n*choice \n\t#You'd actually prefer to do something with a real purpose, like loosening all your achy muscles and joints.\n\t\t*set vidar %+5 \n\t\t*set resolve %+5 \n\t\t*set story +1 \n\t\t*set health +1 \n\t\tShaking your head, you reply, \"I think I've had enough of all this. I'd rather focus on trying out some exercises. I might as well be productive, even if I can't go anywhere just yet.\"\n\t\t\n\t\tThe warrior frowns a little bit, but says, \"Ah, yes. I had gathered that from yesterday. Well, that shouldn't be a problem at all. I actually would have recommended it if you hadn't suggested it first.\" He rises, saying, \"It's definitely a good idea to keep your body active, even if you aren't able to move around too much. Luckily for you, I've got the perfect thing just for this.\" Brushing the stray dreadlocks away from his face, he says, \"I'll be back in a moment,\" heading out of the door and turning left down the hallway. \n\t\t\n\t\tPresumably, whatever he's going to fetch is in his personal room. You wait for a few moments before he returns, carrying a peculiar looking contraption that almost resembles a large metal letter \"V.\" Raising an eyebrow, you ask, \"What is that, exactly?\"\n\t\t\n\t\t*page_break \n\t\t\n\t\tStopping at the edge of your bed and holding it out so you can see it better, Vidar explains, \"This is what I use to keep my upper body exercised if I'm ever bedridden, which does happen every now and again.\" \n\t\t\n\t\tGripping the two opposing ends, he pushes them inward, the powerful muscles in his arms flexing as he puts the metal bars together to form a straight line. When he relaxes the pressure on the small contraption, they ease outward again to their original shape. The warrior hands you the workout device, saying, \"Here, why don't you try?\"\n\t\t\n\t\tTaking it in your hands, you begin to push the V together and then let it relax, repeating the exercise for a few more minutes until your muscles are burning and sweat has started to trickle down your forehead. Although you weren't able to do the exercise as quickly and effortlessly as Vidar was, he still looks at you in approval. Regardless, you can't help but think that he would be stronger than you even in your fittest state.\n\t\t\n\t\t*page_break \n\t\t\n\t\tHe comments, \"Considering that you're still recovering, that was pretty impressive. Your muscles will definitely hate you for it tomorrow but thank you for it later in the week.\" Taking the simple machine from the bed, he says, \"That's probably enough for today.\"\n\t\t\n\t\tConsidering how tired it has made you already, you respond, \n\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t*label d \n\t\t\t\"Don't tell me you're getting bored of watching me pump this over and over.\"\n\t\t\t\n\t\t\tHe grins, replying, \"You caught me.\"\n\t\t\t*goto dd \n\t\t*elseif (((stealth > charisma) and (stealth > cunning)) and ((stealth > resolve)))\n\t\t\t\"Agreed.\"\n\t\t\t*goto dd \n\t\t*elseif (((cunning > stealth) and (cunning > resolve)) and ((cunning > charisma)))\n\t\t\t\"That's probably wise.\"\n\t\t\t*goto dd \n\t\t*elseif (((resolve > stealth) and (resolve > cunning)) and ((resolve > charisma)))\n\t\t\t\"I could probably do it for at least a few more minutes, but we can stop if you insist.\"\n\t\t\t*goto dd \n\t\t*else \n\t\t\t*goto d \n\t\t*label dd \n\t\t\t\n\t\tWith the exercises taken care of, you find yourself with just more time to kill. \n\t\t*goto story \n\t\t\n\t*selectable_if (bad_story) #Pushing yourself up to a better position in the bed, you say, \"I know you're a great warrior and adventurer now, but I'd like to find out how it all started.\" \n\t\t*set bad_story false \n\t\t*set story +1 \n\t\t*set vidar %+5\n\t\t*set charisma %+5 \n\t\tSuddenly, Vidar's face goes dark and he seems to have trouble finding where to focus his eyes. Your own eyes widening, you ask, \"Did I offend you somehow?\"\n\t\t\n\t\tShaking his head slowly, the warrior replies, \"Oh, not at all. It's just…the story behind me becoming who I am today is not one I like to tell lightly. Barely anyone has heard it, and it's not something I like to think about.\"\n\t\t\n\t\t\"Oh!\" you say. \"If it makes you uncomfortable, you don't have to tell me. Maybe another time, when we've got to know one another better.\"\n\t\t\n\t\tSuddenly seeming to steel himself, he responds, \"No, I may as well tell you since you've asked. It can actually lift a burden off my chest if I get it out every now and then. Besides, the story also features someone who may very well be the solution to our current demon problem.\"\n\t\t*goto bad_story \n\t\n\t*selectable_if (bad_story) #Right now, you want to hear something dark and gritty, where the warrior actually loses. Sometimes it makes you feel better if you know that others have gone through terrible things like you have.\n\t\t*set compassionate %-5 \n\t\t*set vidar %-5 \n\t\t*set story +1 \n\t\t*set bad_story false \n\t\tGiving him a predatory grin, you reply, \"Tell me about your greatest failure. Not everyone can win all the time, and your losses make you seem more visceral to me. And before you say that we haven't got to know one another well enough, this is the way to do it, and we may as well get right onto it if we're stuck here together.\"\n\t\t\n\t\tVidar straightens out, looking more than a little surprised. His bushy eyebrows shoot up into his forehead before scrunching together, a look of confusion and irritation on his dark face. \"Are you serious? That's ridiculous,\" he rumbles, pushing aside his bowl, which he has already finished.\n\t\t\n\t\tShrugging, you reply noncommittally, \"You asked if I wanted to hear a story, right? This is my answer.\"\n\t\t\n\t\tHe seems to have an internal battle for a few moments, before finally relenting. \"Fine,\" he says, averting his gaze. \"But just know that this is something that very few people know, and it's not something I like to talk about a lot. But I suppose if you insist, it won't kill me to give you the story.\" \n\t\t*label bad_story \n\t\t*page_break \n\t\t\n\t\tThe warrior gives a deep sigh, brushing his dreads over his shoulders and fixing you with a haunted but determined gaze. \"There's a good reason why I became an adventurer, demon ${hunter}, and it's not just because it ran in the family or something, like with a lot of adventurers.\" Furrowing his brow again, he practically spits, \"Because it didn't. Far from it, actually.\" \n\t\t\n\t\tClenching his fists until his knuckles start to go white, he says, \"As Lorelle may have told you, Qauder didn't used to be anywhere near as peaceful as it is now, though I can't say it's anything resembling perfect.\" His voice getting husky, he continues, \"Anyways, my parents used to be crime lords of sorts, and needless to say, they wanted me involved as much as possible.\n\t\t\n\t\t\"They wanted me to fulfill their legacy and keep the business going.\" Shaking his head, he says, \"I was reluctant to help them with any of their schemes, but it was the only thing keeping me out of the gutters, in more ways than one. Not only were they supporting me by giving me food and a roof over my head, but they threatened to abandon me completely if I didn't help them.\"\n\t\t\n\t\t*page_break \n\t\t\n\t\t\"Eventually, though, it became too much for me. At the height of their power, they were practically controlling Quader from the underground. The officials and guards were either too corrupt or too frightened to stand against them at that point, which only made them even more brazen. Because of this, they decided to kidnap kids and sell them to demons for powers.\n\t\t\n\t\t\"They already had the kind of power that money could buy, but that wasn't enough.\" With a grimace, he adds, \"They ended up capturing several children, and they had me stationed to guard them while they went through with the preparations.\"\n\t\t\n\t\tVidar gets a saddened and bitter look in his eyes, and says in a husky tone, \"My parents made me do a lot of things that I'm not proud of, but there was no way that I was going to stand for that, so I tried to sabotage the whole operation.\"\n\t\t*fake_choice \n\t\t\t#\"Noble, but stupid,\" you grunt. \"I would have just tried to escape while I still could.\"\n\t\t\t\t*set altruism %-5 \n\t\t\t\t*set compassionate %-5 \n\t\t\t\t*set vidar %-5 \n\t\t\t\tHis mouth turning into a hard line, Vidar practically spits, \"That's where you and I are different, ${hunter}. There's no point of being here if you have to sacrifice your principles and morals just to survive. There's a difference between staying alive and living.\"\n\t\t\t\t\n\t\t\t\tArching an eyebrow, you reply, \"Well, it seems you survived the whole venture, anyways, so perhaps you're right to a degree.\"\n\t\t\t\t\n\t\t\t#Nodding, you say, \"That's exactly what I would have done. I couldn't have just stood around while they sacrificed innocents.\"\n\t\t\t\t*set vidar %+5 \n\t\t\t\t*set compassionate %+5 \n\t\t\t\tThe warrior gives you a cheerless smile, responding, \"It's sad that these things are necessary, isn't it?\"\n\t\t\t\t\n\t\t\t\tNodding, you say, \"And it doesn't seem to be changing, either. But that's why we've got to try even harder.\"\n\t\t\t\t\n\t\t\t#Gritting your teeth, you say loudly, \"Good, and hopefully you took a few of those pieces of scum down along the way!\"\n\t\t\t\t*set resolve %+5 \n\t\t\t\t*set vidar %+5 \n\t\t\t\tThe corner of his lips twitching into a smile, he replies, \"Though I admire your spirit, no such thing happened. I was barely a teenager back then, and besides, I avoid killing at all costs.\" After a pause, he adds, \"Though that certainly doesn't mean I'm above teaching anyone a lesson.\"\n\t\t\t\t\n\t\t\t\tYou nod knowingly, commenting, \"Yes, so I've gathered.\"\n\t\t\t\t\n\t\tClearing his throat, the warrior continues his story. \"My parents locked all of the children away in a dirty basement, and they had me keeping an eye on them and making sure they stayed alive until the ritual began. When the thugs came down to collect them, though, I hid and then attacked them from behind, trying to knock them out and steal their keys to let the captives go.\"\n\t\t\n\t\tHis eyes going dark, he says, \"I managed to injure a couple of them, but they soon overpowered me. Being the cruel criminals that they were, they beat me savagely. They probably would have killed me if I wasn't the son of their boss. When they told my parents about what happened, though, my mother told me that I was a pathetic failure and decided to sacrifice me to the demons so that I would finally be of use.\"\n\t\t\n\t\t*page_break \n\t\t\n\t\tGripping his chair until his knuckles turn white, he goes on, \"They began the ritual right there in the basement, gagging and binding the children and myself despite their crying. I tried to act tough, but I was scared senseless. They had a magician perform the ritual, and soon a demon appeared, ugly and terrifying, and looking at the children like they were a feast.\"\n\t\t\n\t\t\"The terrible sacrifice was almost complete, but the demon suddenly retreated back into the Netherworld, screaming in fright. In in instant, Melithar the Eccentric appeared in the middle of the criminals and my parents. They foolishly tried to attack him, but with a wave of his finger, he put them all into a deep sleep, making ropes magically bind them for good measure.\"\n\t\t\n\t\t*page_break \n\t\t\n\t\t\"Afterwards, he took great care to heal our wounds and instill a new hope in all of us. He even delivered everyone back to their parents, and locked all of the criminals in a jail cell, but he couldn't stay long. Even so, he had saved several children from a terrible fate and crumpled the crime lords' rule over Quader in one fell swoop.\" \n\t\t\n\t\tVidar smiles for the first time since he began the story. He finishes, \"Ever since then, I've had a deep respect for the old wizard, and I decided to become an adventurer, trying my best to make this village better in any way I can.\"\n\t\t*fake_choice \n\t\t\t#Touching his arm lightly, you say consolingly, \"I'm sorry about all of that, Vidar. That's terrible, but at least you've made something good out of it. I'm proud of you.\"\n\t\t\t\t*set vidar %+10 \n\t\t\t\t*set altruism %+5 \n\t\t\t\tHe relaxes visibly at your touch, his eyes softening. \"Thank you, demon ${hunter}. People like you seem to make it all easier to handle.\"\n\t\t\t\n\t\t\t#You give the warrior a sad smile, telling him, \"Well, you've done a very good job of it. The way you saved my life and handled all of those outlaws is more than proof enough of that.\"\n\t\t\t\t*set vidar %+5 \n\t\t\t\t*set charisma %+5 \n\t\t\t\tVidar brightens up, responding, \"That's very kind of you, ${hunter}. I certainly hope so.\"\n\t\t\t\t\n\t\t\t#You nod and reply, \"Interesting story. It seems fortunate that Melithar was there to save the day.\"\n\t\t\t\t*set vidar %-5 \n\t\t\t\t*set cunning %+5 \n\t\t\t\t*set charisma %-5 \n\t\t\t\tThe warrior rolls his eyes but says, \"Yes, you're right, I suppose. I'm sure he does that a lot.\"\n\t\t\t\n\t\t\t#You blink hard, replying wryly, \"Well, that certainly fit my criteria for your biggest failure. Very enlightening, indeed.\"\n\t\t\t\t*set vidar -5 \n\t\t\t\t*set compassionate %-5 \n\t\t\t\tHis dark eyes going even darker, Vidar says, \"Well, at least it did someone some good. I hope you're satisfied, ${hunter}.\"\n\t\t\n\t\tWith his story finished, you decide it's best to turn to something else. \n\t\t*goto story \n\t\n\t#You've been itching to hear about all of his adventures of heroism and honor.\n\t\t*set vidar %+10 \n\t\t*set resolve %+5 \n\t\t*set story +1 \n\t\tCracking his knuckles together, the warrior says simply, \"I never get tired of telling this one.\" Standing up, he begins to pace back and forth around the bed, adopting a serious tone and moving his hands for emphasis as he speaks. \"About a year ago, a werewolf named Jonaug started shamelessly burglarizing the local residents.\"\n\t\t\n\t\tHe shakes his head, saying, \"He wasn't exactly evil, but he had no respect for others' belongings, and he thought himself to be above humans and other species. His crimes were mostly non-violent until he happened to steal from the wrong person. The man was a farmer, but he didn't like to be mistreated by anyone. He foolishly tried to attack the werewolf with a pitchfork.\"\n\t\t\n\t\t*page_break\n\t\t\n\t\t\"Unsurprisingly, Jonaug easily killed him, running away with his valuables.\" Clenching a fist, Vidar carries on, \"With none of the guards willing to go after such a powerful magical beast, I chose to do so myself. Unfortunately, Ceylar was unable to come along with me because of a bad injury, and Lorelle wouldn't have been of help on this mission, so I had to go alone. \n\t\t\n\t\t\"Even so, I pressed on, determined to see justice dealt to the werewolf. I took with me my best armor and weapons, and some earplugs to protect myself from Jonaug's magical howl.\" Pointing to his ear, he says, \"You probably already know this, but a werewolf's howl can cause someone to become dizzy and disorientated.\"\n\t\t\n\t\tYou were in fact already aware of this, as magical lore is covered extensively in the training of demon \n\t\t*if male \n\t\t\thunters.\n\t\t*if female \n\t\t\thuntresses.\n\t\t*fake_choice \n\t\t\t#Rolling your eyes, you reply, \"I'm a demon ${hunter}; of course I know that! Thanks for stating the obvious, though.\"\n\t\t\t\t*set vidar %-5 \n\t\t\t\t*set compassionate %-5\n\t\t\t\tVidar frowns, saying, \"Congratulations.\"\n\t\t\t\t\n\t\t\t\tYou bark a mirthless laugh, replying, \"Are you going to show me your rudimentary grasp of sarcasm or tell me this story of yours?\"\n\t\t\t\t\n\t\t\t\tGlowering at you, he grumbles, \"If you insist, your highness.\"\n\t\t\t\n\t\t\t#Nodding, you say, \"That's a very wise thing to do when facing a werewolf.\"\n\t\t\t\t*set vidar %+5 \n\t\t\t\t*set cunning %+5 \n\t\t\t\tVidar nods back appreciatively. Raising his bushy eyebrows, he says dramatically, \"Indeed, it could be the difference between victory and defeat. Or, more specifically, life and death!\"\n\t\t\t\t\n\t\t\t\tYou chuckle, saying, \"Who would have thought earplugs could be so important?\"\n\t\t\t\n\t\t\t#\"Not just dashing and heroic, but smart too,\" you say with a wink.\n\t\t\t\t*set vidar %+10 \n\t\t\t\t*set charisma %+5 \n\t\t\t\tRaising an eyebrow and winking back, he responds, \"You may be my best audience yet, demon ${hunter}.\"\n\t\t\t\t\n\t\t\t\tYou laugh, saying, \"I certainly hope so.\"\n\t\t\t\t\n\t\tHe continues, \"Unfortunately for me, Jonaug must have figured out that he had made an unforgivable mistake in killing the old farmer. As leverage, he decided to kidnap the late man's wife. The guards were unable to help me find the woman and her kidnapper, but as you know, I'm a very good tracker. It took me a few hours, but I finally tracked Jonaug to the top of a cliff on the side of Melithar's Mountain.\"\n\n\t\tAdopting a more eerie tone, Vidar says, \"However, the werewolf was a natural apex predator and he was more than ready for me. As I started to ascend the cliff, it began to rain, which only made the task harder. Jonaug must have sniffed me out from a long way away, because as soon as I got close to the top, he began to throw massive rocks at me.\"\n\t\t\n\t\tThe warrior's dark brown eyes widen, and he raises his voice in excitement. \"I would have usually been able to dodge most of the rocks, but the downpour was making the ground a muddy mess and my armor was weighing me down. The werewolf was incredibly strong and ferocious, and he hurtled the stones at me one after another, shattering my shield and denting my armor.\"\n\t\t\n\t\t*page_break \n\t\t\n\t\t\"By the time he had worn himself out, I was battered and bruised, and I had to take off my armor in fear that the insides of it would puncture me. Even so, I finally managed to reach the top of the cliff with my longsword undamaged. Just as I went to confront the werewolf, though, he snatched up the captured housewife who was tied up and had been hidden behind a boulder.\n\t\t\n\t\t\"To stop me from reacting in time, he began to howl. Even with my earplugs in, his magical voice still disorientated me enough to make me slow and fuzzy. Lifting her into the air, he hurtled her at me.\" Shaking his head, he says, \"Jonaug was cunning and ruthless, all right. I was forced to drop my sword in order to catch her, and the beast was so strong that the force of her body knocked me off my feet.\n\t\t\n\t\t\"The impact sent me sliding down the muddy hill with the woman on top of me. By the time I finally skidded to a stop and got her off of me, the werewolf was bounding forward.\" Acting it out now with dramatic motions, the warrior says, \"With a fierce growl, he slashed his claws across my chest, ripping me open and sending me tumbling away toward a small outcropping on the cliff.\" \n\t\t\n\t\t*page_break \n\t\t\n\t\t\"I was nearly blinded with pain and aching all over, but I staggered to my feet as Jonaug lunged at me, his jaws wide open to render the throat from my neck. With nowhere to go, I was forced to face the villain head-on. I drew my dagger and slashed it through the air. Whether by luck or great skill, I managed to chop two of the werewolf's fingers off. He roared in pain and reeled back, clutching the bleeding stumps. \n\t\t\n\t\t\"Too wounded to carry on the battle, Jonaug fled and was never seen in Quader again.\" Vidar continues, \"Rumors say that the werewolf had taken up residence in the kingdom of Githrad. It would seem I scared him all the way to the other half of the world! At the end of that fight, though, I was left to take the woman back to the village. Even though my armor was destroyed and I had almost lost my life, I had saved someone else's life, avenged a murder, and stopped a string of very costly burglaries.\"\n\t\t*fake_choice \n\t\t\t#Smirking, you reply, \"So what you're really trying to say is…you got your ass kicked by some mangy mutt?\"\n\t\t\t\t*set compassionate %-5 \n\t\t\t\t*set vidar %-5 \n\t\t\t\tUndeterred, he just shrugs and responds, \"Sure, if you want to think about it that way. Still, I think it's more accurate to refer to werewolves as ferocious and cunning ancient monsters that originated from the depths of another dimension that houses incredibly powerful beings that just so happen to want to devour our souls.\" He grins, finishing, \"Yeah, I can play at that game, too.\" \n\t\t\t\t\n\t\t\t\tYou shrug your shoulders back, saying, \"We can wrestle around with semantics all day, but what actually happened stays the same.\"\n\t\t\t\t\n\t\t\t\tArching an eyebrow, he counters, \"Yes, and I still believe that fighting off a werewolf is something to be proud of.\"\n\t\t\t\t\n\t\t\t#Scratching your head, you say, \"Well, to me it seems like you mainly got lucky. Still a success, though, I suppose.\"\n\t\t\t\t*set stealth %+5 \n\t\t\t\t*set vidar %-5 \n\t\t\t\tThe warrior shrugs and replies, \"Sure, you're probably right, but in any case, a lone man fighting against a powerful werewolf with just his strength and weapons seems like quite a feat to me.\"\n\t\t\t\t\t\n\t\t\t\t\"I could have done it,\" you say matter-of-factly. \n\t\t\t\t\t\n\t\t\t\tHe rolls his eyes and says, \"Yes, well, we can't all live up to a demon ${hunter}, now can we?\"\n\t\t\t\n\t\t\t#\"Wow, that's incredible!\" you say. \"Defeating a werewolf is no small feat, and you did it without causing any casualties, as well.\"\n\t\t\t\t*set resolve %+5 \n\t\t\t\t*set vidar %+5 \n\t\t\t\tVidar grins, replying, \"A perfect result, I'd say! It took some time for me to recover from my wounds, but I didn't regret it in the slightest.\" He pauses, then adds, \"Someone told me that I should have pursued Jonaug to finish him off, but I disagree. Even if I had been able to do so, I would prefer to think that maybe he'll reconsider his actions after this.\"\n\t\t\t\t\n\t\t\t\tYou nod thoughtfully, responding, \"At the very least, the loss of two of his fingers will make him more wary about committing crimes in the future.\"\n\t\t\t\n\t\t\t#Giving him a playful frown, you say, \"Hey, why didn't you offer to wrestle me in the mud?!\"\n\t\t\t\t*set resolve %+5 \n\t\t\t\t*set charisma %+5 \n\t\t\t\t*set vidar %+10 \n\t\t\t\tVidar tilts back his head and gives a great, rumbling laugh. \"Never have I had anyone envy the werewolf when I told this story,\" he says between chuckles. After he has calmed down, he eyes you fondly, telling you, \"When you get better, though, I'll definitely take you up on that offer.\"\n\t\t\t\t\n\t\t\t\tYou give him a wolfish (pun intended) smile and respond, \"I was hoping you would say that.\"\n\t\t\t\t\n\t\tWith the warrior's tale finished, you're given an opportunity to move onto something else.\n\t\t*goto story \n\t\t\n\t#Actually, you would really like to know more about your new companions. The things they do every day could help you put more perspective on them and the little details really are important, you've found. \n\t\t*set charisma %+5 \n\t\t*set ceylar %+5 \n\t\t*set vidar %+5 \n\t\t*set lorelle %+5 \n\t\t*set story +1 \n\t\t\"Tell me more about yourself and the others,\" you say lightly. \"What are your average days like?\"\n\t\t\n\t\t\"Well,\" he begins, \"I'm sure you're already aware that Lorelle really enjoys her healing work and spending time with the local animals; Ceylar likes to spend his time cooking, writing poems, and making music; and when I'm not bashing criminals, I like to tell stories.\"\n\t\t\n\t\tFiddling with a particularly long dreadlock, he says, \"However, you might be surprised to know that I also love a good game of chess. Strategy and battle tactics are what that game is centered around, which is what I love about it. Ceylar, on the other hand, enjoys acting, when he has the time for it.\" Chuckling, the warrior says, \"Believe it or not, he has more makeup and a bigger wardrobe than most women of nobility.\"\n\t\t\n\t\t*if (((charisma >= stealth) and (charisma >= cunning)) and ((charisma >= resolve)))\n\t\t\t*label n \n
