 takes a broom from a cupboard and begins to sweep up the mess. After Lorelle has finished binding the small cut on your hand and after Ceylar has finished sweeping up the last few shards of clay, \n*if ((lorelle >= vidar) and (lorelle >= ceylar))\n\tshe makes eye contact with you and says, \"If you would like, I could always keep you company until you've managed to settle down.\"\n\t\n\tThe magician and warrior exchange glances, taking this as their cue to leave. Ceylar\n\t*if ceylar \u003c 50 \n\t\traises an eyebrow and sends a not so furtive eye roll Vidar's way. Then, he just shrugs and says, \"Have fun, then,\" and leaves.\n\t*if ceylar > 59 \n\t\tconspicuously jabs Vidar in the ribs and winks at you, saying, \"Excellent plan, you two. I'll get out of your way,\" before leaving the room with an amused smile on his face.\n\t*if ((ceylar \u003c 60) and (ceylar > 49))\n\t\tgives Vidar a knowing grin and turns to you before commenting, \"Okay, sure,\" and leaving the room.\n\t\t\n\tVidar\n\t*if vidar \u003c 50 \n\t\traises a bushy eyebrow and snorts before exiting the infirmary.\n\t*if vidar > 59 \n\t\tgrins at the two of you beneath his bushy beard and gives a low chuckle before saying, \"As you wish,\" and following his friend down the hallway.\n\t*if ((vidar \u003c 60) and (vidar > 49))\n\t\tsays simply, \"Well, I suppose I'll be going, then,\" as he turns and heads toward his own room.\n\t\t\n\tWith that, you're left alone with Lorelle. By now, ${boggart} has begun to go back to sleep, getting comfortable by your feet. It doesn't take long for him to drift into slumber once again, and before long you hear his heavy breathing and feel the light twitching of his tail. The healer smiles kindly at you, waiting for your reply.\n\t*label talk_lorelle \n\t*hide_reuse \n\t*choice \n\t\t*if (talk = 0) #Keeping your tone of voice kind, you say softly, \"As much as I appreciate the offer, I really would just like to get some sleep. I'm exhausted, and these nightmares have been making me restless lately.\"\n\t\t\t*set lorelle %+5 \n\t\t\tThe healer gives you an understanding nod and says, \"All right, ${name}. Well, I hope you feel better in the morning. I'll be in the other room if you need me.\"\n\t\t\t\n\t\t\tShe gives you a smile and heads out of the room, shutting the door gingerly behind her.\n\t\t\t*goto early \n\t\t\n\t\t*if (talk = 0) #You shake your head and say curtly, \"Actually, it looks like you all have got everything covered well enough. I panicked for a few moments, but I don't need you here anymore. I'd prefer if you left.\"\n\t\t\t*set lorelle %-5 \n\t\t\t*set resolve %+5 \n\t\t\tLorelle frowns and purses her lips, replying, \"I suppose I shouldn't have asked.\"\n\t\t\t\n\t\t\tLooking a little hurt, she promptly exits the room, though she remembers to shut the door quietly behind her. You sigh and quickly get comfortable under the covers again. Before long, you have fallen asleep, too exhausted to pay much mind to the mental attack Mendax had started just a few minutes ago.\n\t\t\t*goto morning\n\t\n\t\t#Thinking about what happened after the big battle between Captain Gertrude and Falcon, you ask curiously, \"So, did everything go okay at the infirmary? It must be hard, dealing with so much death and injury on a regular basis.\"\n\t\t\t*set lorelle %+5 \n\t\t\t*set talk +1 \n\t\t\tLooking down at her feet, the healer shrugs, replying hesitantly, \"It can be a very difficult job to do sometimes. It's not healthy for your mind if you're in the infirmary for too long at a time, so every once in a while I find myself having to take breaks, usually by going off alone to read my books or taking a walk out to the pond to feed the ducklings.\"\n\t\t\t\n\t\t\tShe looks up, her gaze stronger this time, and continues, \"Still, it's necessary work, and I would feel terrible if I didn't do my part. I'm one of the best healers here in Qauder, so to not apply my skills to helping others would be horribly apathetic.\" After a moment, she gives a little smile and adds, \"Plus, seeing people get better and experiencing their gratitude makes it all worth it.\"\n\t\t\t\n\t\t\t*page_break \n\t\t\t\n\t\t\tNodding, you pat her hand consolingly and reply, \"Well I'm glad to hear that you have ways of dealing with the emotional side of it. It's noble work, and I myself wouldn't be here if it wasn't for you.\"\n\t\t\t\n\t\t\tShe beams at you and blushes before quickly changing the subject. \"Well, anyways, things at the main infirmary went fairly well, aside from the very regrettable death of one of the younger Lorden guards. We managed to pull everyone else through, including Falcon's bandits. Many of them have some pretty nasty injuries, but they should be back to normal within the next couple days at most.\"\n\t\t\t*fake_choice \n\t\t\t\t#You nod again and respond, \"Well, that's great to hear. I'm sure everyone appreciates all the hard work you've been doing. You're incredibly important around here and it wouldn't be the same without you.\"\n\t\t\t\t\t*set lorelle %+5 \n\t\t\t\t\t*set altruism %+5 \n\t\t\t\t\tBy now, she is blushing even harder, and looks quite embarrassed. \"Thank you, ${name}, but I'm just doing what I feel is best.\" She looks around, probably for something to change the subject. Lorelle \n\t\t\t\t\t\n\t\t\t\t#Shrugging, you reply, \"Well, I still don't think those bandits should have been treated so well after everything they did. I would have patched them up quickly and then locked them away if it were my decision.\"\n\t\t\t\t\t*set lorelle %-5 \n\t\t\t\t\t*set compassionate %-5 \n\t\t\t\t\tThe healer furrows her brow and says, \"Yes, I haven't forgotten your position about this, but thankfully, you aren't the healer and I am. Now, unless you have something good to say about the matter, I suggest we move on.\" \n\t\t\t\t\t\n\t\t\t\t\tBefore you can retort, she waves her hand as if dismissing the little argument and\n\t\t\t\t\n\t\t\t\t#You give her a small smile and say, \"I think it's very impressive how well you have handled all these injuries and patients, regardless of how serious the conditions may be. Surely, the healers of Quader would benefit from being taught a thing or two from someone as skilled as you.\"\n\t\t\t\t\t*set cunning %+5\n\t\t\t\t\t*set lorelle %+5 \n\t\t\t\t\tLorelle looks flustered, but not in a bad way. She waves your compliment away, but you can tell from the smile in her eyes that she appreciates your words. She says, \"That's very kind of you, ${name}. I just try my best. I do intend to eventually mentor some of the other medics, actually, and that's a very good idea.\" \n\t\t\t\t\t\n\t\t\t\t\tAs if wanting to avoid more flattery, she \n\t\t\t*if talk = 2 \n\t\t\t\t*label yawns \n\t\t\t\tsuddenly yawns and says, \"Well, I'm exhausted, and I imagine you are as well. I suppose I'd better get off to bed.\" Standing, she gives you a parting wave and adds, \"Goodnight! Get some rest,\" as she exits the room.\n\t\t\t\t\n\t\t\t\tExhausted yourself, you settle into your bed, falling asleep almost as soon as the covers are over you.\n\t\t\t\t*goto morning \n\t\t\tasks quickly, \"What would you like to do now?\" \n\t\t\t*goto talk_lorelle \n\t\n\t\t*selectable_if (lorelle > 64) #Moving over and making room for one more person on your bed, you tell her, \"I was hoping you would want to join me for tonight. We can share this bed together.\"\n\t\t\t*set talk +1 \n\t\t\t*set charisma %+5 \n\t\t\t*set lorelle %+15 \n\t\t\tLorelle raises a sharp eyebrow and gives you a quizzical sort of smile, saying, \"Oh really?\" After a moment, she winks and adds, \"Usually I make it a rule not to get too close to my patients, but for you I can make an exception.\"\n\t\t\t\n\t\t\tShe starts toward your bed, only to notice the boggart sleeping soundly by your feet. Biting her lip, she looks up at you and says hesitantly, \"Or maybe not. I hadn't realized that a second spot was already taken.\"\n\t\t\t*fake_choice \n\t\t\t\t#You shrug and say, \"Who cares? This is my bed anyways. He can find another one of his own.\"\n\t\t\t\t\t*set altruism %-5 \n\t\t\t\t\t*set relationship %-5 \n\t\t\t\t\t*set lorelle %-5  \n\t\t\t\t\t*set boggart_gone true \n\t\t\t\t\tThe boggart hisses angrily, but is apparently too tired to put up very much of a fight. After making a rude hand gesture at you and muttering something under his breath, he flutters off to the other side of the small infirmary, alighting onto a pillow and quickly curling up again. \n\t\t\t\t\t\n\t\t\t\t\tThe healer purses her lips and says, \"Was that really all that necessary? Perhaps we could have found another bed. I hate to be rude, you know.\"\n\t\t\t\t\t\n\t\t\t\t\tYou wave it away and respond, \"Hey, it worked, right? You really can't complain too much.\"\n\t\t\t\t\t\n\t\t\t\t\tShe just sighs and says, \"Well, maybe you can make it up to him later.\" Although Lorelle doesn't seem too pleased about how you handled the situation, she doesn't hold it over you for very long, and instead changes her expression to a softer one and continues, \"Still, I certainly wouldn't mind keeping you company.\"\n\t\t\t\t\n\t\t\t\t#Biting your lip, you think about it for a moment. Your face pensive, you say, \"Well, he was here first, after all, but I don't want you to leave either. Maybe he can just stay where he is? He won't bother us, I'm sure.\"\n\t\t\t\t\t*set relationship %+5 \n\t\t\t\t\t*set lorelle %+10 \n\t\t\t\t\t*set altruism %+5 \n\t\t\t\t\t*set boggart_bed true  \n\t\t\t\t\tYour apprentice smiles from the bottom of the bed, looking grateful that he doesn't have to be interrupted. \n\t\t\t\t\t*if relationship > 64 \n\t\t\t\t\t\t\"Yay!\" he squeaks sleepily.\n\t\t\t\t\t*if relationship \u003c 50 \n\t\t\t\t\t\t\"Finally you're being sensible,\" he mumbles, though you notice he isn't as cutting about it as he normally would have been.\n\t\t\t\t\t*if ((relationship > 49) and (relationship \u003c 65))\n\t\t\t\t\t\tHe simply says, \"Thanks.\" Even so, he does look somewhat annoyed that he'll be sharing the bed with so many people.\n\t\t\t\t\t\t\n\t\t\t\t\tThe healer gives you a kindly smile and comments, \"Good decision. Let the sleepy boggart rest.\"\n\t\t\t\t\n\t\t\t\t#Not wanting things to be awkward for Lorelle, you grin slyly and nudge your apprentice, telling him, \"Hey, ${boggart}, if you let her borrow your spot for a while I'll make it up to you later. Perhaps with some extra boggart treats?\"\n\t\t\t\t\t*set cunning %+5 \n\t\t\t\t\t*set relationship %+5\n\t\t\t\t\t*set boggart_gone true \n\t\t\t\t\t*set lorelle %+5 \n\t\t\t\t\tYour apprentice doesn't look happy about it at first. After thinking it over for a moment, \n\t\t\t\t\t*if relationship > 64\n\t\t\t\t\t\tthough, he finally relents. He cracks a toothy smile and squeaks groggily, \"Sure, anything for those delicious Impish Delights!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYawning, he flutters off the bed over to the other side of the room, landing on a fluffy pillow and quickly snuggling into it. \n\t\t\t\t\t*if relationship \u003c 50 \n\t\t\t\t\t\the just narrows his eyes and responds suspiciously, \"How can I be certain that you'll keep your end of the promise?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYour smile quickly drops and you give him a deadpan look. \"You aren't really helping your chances any by being so stubborn,\" you grunt.\n\t\t\t\t\t\t\n\t\t\t\t\t\tRolling his eyes, your apprentice finally says, \"Fine, fine,\" and flutters off, muttering under his breath and cuddling up to a fluffy pillow on another bed. \n\t\t\t\t\t*if ((relationship > 49) and (relationship \u003c 65))\n\t\t\t\t\t\tthe boggart simply shrugs and says, \"Sure, why not? I do miss those scrumptious morsels.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tWith that, he flaps his wings briefly and lands onto another infirmary bed, quickly assuming a sleeping position.\n\n\t\t\t\t\tLorelle rolls her eyes but grins nonetheless. Shooting him a furtive glance, she says to you quietly, \"Normally I wouldn't approve of you bribing him, but I think he deserves some nice treats, anyways.\"\n\t\t\t\t\t\n\t\t\tWith that settled, she climbs into your bed, quickly getting under the covers and pressing her body against yours. With the healer so close, you notice her distinct, clean smell. Underneath her natural body odor is a faint aroma of freshly laundered linen and the same incense that she has been using during your healing.\n\t\t\t*choice \n\t\t\t\t#You grin slyly and give her a sloppy kiss on her cheek and then wrap your arms and legs around her body, snuggling your head against her lean shoulder. \n\t\t\t\t\t*set lorelle %+10 \n\t\t\t\t\t*set resolve %+5 \n\t\t\t\t\tOut of the corner of your vision, you can see Lorelle grinning shyly. \"You know,\" she says quietly, \"I haven't had a lot of relationships but I can already tell you're going to be wonderful.\"\n\t\t\t\t\t\n\t\t\t\t\tYou kiss her nose affectionately and whisper back, \"You've already been wonderful, which is why I like you so much.\" She giggles and you grin, shivering lightly as she runs her slender fingers gently against the curves of your jaw. You can feel your heartbeat growing faster, and the room suddenly feels significantly warmer.\n\t\t\t\t\t\n\t\t\t\t\tYou start to move your hands slowly and gently across her smooth back and the subtle curves of her hips. She squeezes your hand affectionately and gives you a delicate kiss on your lips, looking warmly into your eyes.\n\t\t\t\t\t\n\t\t\t\t\t*page_break \n\t\t\t\t\t\n\t\t\t\t\tThe stress practically seeps from your body, and here in her arms, you feel better than you have in a very long time. Nibbling on her earlobe for a moment, you whisper just loud enough for her to hear, \"You know, it seems like you've healed me in more than just one way. You are invaluable.\"\n\t\t\t\t\t\n\t\t\t\t\tLorelle blushes brightly and gives another one of her shy smiles, responding, \"And just like I've made you better, I think you've made me better, too.\"\n\t\t\t\t\t*label cuddled\n\t\t\t\t\t\n\t\t\t\t\tYou don't know how long you lay there, cuddled against the healer. Her comforting scent and warmth envelope you, and you feel safer and more content than you can remember ever feeling. Her rhythmic breathing almost lulls you to sleep, and it would, if not for \n\t\t\t\t\t*if talk = 1\n\t\t\t\t\t\ta nagging restlessness caused by your dreams. Despite how much you wish you could just fall asleep together, it seems that won't be possible, at least not for another while.\n\t\t\t\t\t\t\n\t\t\t\t\t\tStirring slightly, you smile at her and kiss her cheek, then say, \"Sorry, Lorelle, but I can't get to sleep. Can we do something else?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe healer blinks sleepily but nods her head, replying, \"Of course, ${name}. There's no one better to have a long night with than you.\"\n\t\t\t\t\t\t*goto talk_lorelle  \n\t\t\t\t\t*if boggart_gone \n\t\t\t\t\t\tyour apprentice's loud snoring from across the room.\n\t\t\t\t\t*if boggart_bed \n\t\t\t\t\t\t${boggart}'s twitching and jerking at the foot of the bed.\n\t\t\t\t\tEven so, you eventually manage to drift off to sleep, wondering if this caring medic can really improve your life after everything that has happened.\n\t\t\t\t\t*goto morning \n\t\t\t\t\n\t\t\t\t#You squeeze her arm gently but then roll over and press your head into her shoulder. You're content just to have her presence and feel her warmth beside you. \n\t\t\t\t\t*set stealth %+5 \n\t\t\t\t\t*set lorelle %+5 \n\t\t\t\t\tLorelle moves a little closer and kisses the top of your head affectionately, intertwining her slender fingers with yours. You push your head closer into her shoulder, breathing deeply and appreciating the cleanliness of her scent. She smells like fresh laundry mixed with the incense used in her healing. She sighs in contentment and comments, \"I love being around you, ${name}.\" \n\t\t\t\t\t\n\t\t\t\t\tSmiling, you reply, \"I'm glad you came to check on me,\" as you absent-mindedly run your fingers through her smooth hair. She squeezes your hand and plants another kiss on your forehead, the faint breath from her nostrils tickling your forehead pleasantly.\n\t\t\t\t\t\n\t\t\t\t\tYou rest your head down on her tight stomach, and after a few moments you feel yourself getting even more comfortable, the steady rise and fall of her torso lulling you to sleep.\n\t\t\t\t\t*goto cuddled \n\t\t\t\t\t\n\t\t\t\t#Moving closer to her, you grab her around the waist and pull her tightly against you. Then, you press your lips to hers, kissing her deeply. You want to push things a little further. You're tired of waiting, and this is finally your chance.\n\t\t\t\t\t*set resolve %+5 \n\t\t\t\t\t*set altruism %-5 \n\t\t\t\t\t*set lorelle %-5 \n\t\t\t\t\tThe healer seems completely taken aback, her eyes wide underneath her furrowed brow. Instead of kissing you back, she places her arms firmly against your shoulders and pushes you away, wiping her mouth with her sleeve and saying, \"${name}, this really isn't the time for this. Your apprentice is right there!\"\n\t\t\t\t\t\n\t\t\t\t\tYou glance over\n\t\t\t\t\t*if boggart_bed \n\t\t\t\t\t\tat the boggart only a few beds away, spread out like a starfish on a fluffy pillow. He hasn't woken up yet, and he seems to be sleeping soundly, but you never know when he'll suddenly wake.\n\t\t\t\t\t*if boggart_gone \n\t\t\t\t\t\tand look at your apprentice just a couple feet below you. He hasn't woken up yet, but he has started to stir slightly and mumble in his sleep.\n\t\t\t\t\tEven so, you just give her a mischievous grin and respond by whispering in her ear, \"Trust me, he won't even notice. He's a deep sleeper.\"\n\t\t\t\t\t\n\t\t\t\t\t*page_break \n\t\t\t\t\t\n\t\t\t\t\tShe shakes her head and says seriously, \"Actually, I don't feel comfortable with this at all. This is going a bit too fast for me, and I don't want to rush into anything I'm unsure of.\" She pauses, then adds, \"Besides, I'm not familiar with this whole relationship thing, and I just need time to wrap my head around it.\"\n\t\t\t\t\t\n\t\t\t\t\tTrying to hide your disappointment, you say, \"Oh, well, okay…I can understand that. Sorry if I made you uncomfortable. You probably want to go, now, don't you?\"\n\t\t\t\t\t\n\t\t\t\t\t*if talk = 1 \n\t\t\t\t\t\tLorelle looks uncertain for a moment but then shakes her head again, this time saying, \"No, but let's do something else, okay?\"\n\t\t\t\t\t\t*goto talk_lorelle  \n\t\t\t\t\t*if talk = 2 \n\t\t\t\t\t\tLorelle looks uncertain for a moment but then shakes her head again, this time saying, \"No, but let's just keep things slow, okay?\" She lays back down on the bed, giving a tired sigh, and you nod your head, laying down beside her. \n\t\t\t\t\t\t\n\t\t\t\t\t\tAfter a moment, she puts her arm across your stomach, showing you that things between the two of you will still be okay. Somewhat reassured, you soon drift off to sleep, wondering if this caring healer can change things around for you, despite all the terrible things that have happened.\n\t\t\t\t\t*goto morning\n\t\t\n\t\t#Motioning to a few books on a shelf in the corner that you had noticed earlier, you suggest, \"Maybe we can read some of your books together. It's been a while since I've read a good book, and it would help pass the time.\"\n\t\t\t*set lorelle %+5 \n\t\t\t*set talk +1 \n\t\t\tSmiling, Lorelle's eyes light up and she says, \"That sounds like a wonderful idea. I really enjoy reading, but I haven't even had the time to glance their way these past few days.\"\n\t\t\t\n\t\t\tThe healer walks over to the battered shelf and strokes her slender fingers across the worn spines of the books, humming pleasantly to herself. After a moment, she extracts three of the books from the shelf, bringing them over to your bed and plopping them down beside you. They all vary in size and color.\n\t\t\t\n\t\t\tThe one thing in common between them, however, is that they look very used, with some pages folded over and a few makeshift bookmarks sticking out. She selects the largest book with a verdant color similar to a forest's, saying, \"I really like this one. It's called An Incomplete Volume of Lume's Wildlife.\"\n\t\t\t\n\t\t\t*page_break \n\t\t\t\n\t\t\tFlipping the book open to a page showing a picture of a fairy, she explains, \"It's very extensive, and it gives the reader a great look at many of the non-human animals in Lume. It's especially interesting for someone like me who doesn't get to travel very often to see many of these creatures.\"\n\t\t\t\n\t\t\tLorelle sets the book down and grabs the second largest manuscript. The cover is white, but you notice that it's missing one of the corners, as though it was ripped off somehow. Running her hands over the book, she says, \"Herbal Medicines for Beginners was actually very helpful in making me a better healer. The information inside here is quite basic, but it can certainly help a novice become more familiar with herbal remedies.\"\n\t\t\t\n\t\t\tThe healer sets the medical book down by the others and picks up the last one. It's considerably smaller than the previous two, but looks to be in somewhat better condition. It is a granite grey in color and has a more formal looking font than the others, at least judging from the title written on the cover. \n\t\t\t\n\t\t\tShe turns it over absent-mindedly in her hands and says, \"Believe it or not, this little book was passed down to me from one of the wealthier merchants living in Quader. He must have kept the book in excellent care, because there isn't a blemish on it.\" She flips open a page at random and continues, \"It does have quite a peculiar subject matter, but it has a great message. \n\t\t\t\n\t\t\t\"It's called The Charitable Unfortunate and if it's not too obvious from the title, it encourages even those of us with lesser means in life to help others in need and gives many examples and anecdotes in that regard.\" Lorelle puts the book down and gives you a small smile, saying, \"So, which one catches your interest?\"\n\t\t\t*label read \n\t\t\t*hide_reuse \n\t\t\t*choice  \n\t\t\t\t#A Complete Volume of Lume's Wildlife sounds very interesting, and it never hurts to know a little more about the other inhabitants around you and in other regions of the world.\n\t\t\t\t\t*set resolve %+5 \n\t\t\t\t\t*set charisma %+5 \n\t\t\t\t\t*set read +1 \n\t\t\t\t\t\"Let's read about Lume's wildlife,\" you say. \"I've encountered a lot of them through my travels but certainly haven't had a chance to meet them all.\"\n\t\t\t\t\t\n\t\t\t\t\tGrinning, she replies, \"Oh, excellent. This isn't my favorite book for nothing.\" Flipping the book open, she stops at a page that has a vivid illustration of a werewolf. She runs her hand across the page, telling you, \"They're very fearsome beasts, but noble and quite intelligent.\"\n\t\t\t\t\t\n\t\t\t\t\tThe drawing shows a very large cross between a human and a wolf. He stands on his back legs about eight feet tall, with bushy fur as black as a winter's night and menacing claws and fangs that glint in the ethereal moonlight. His face has the vague impression of a regular human's, but the piercing, predatory eyes betray his wilder side.\n\t\t\t\t\t\n\t\t\t\t\t*page_break \n\t\t\t\t\t\n\t\t\t\t\tYou and the healer skim over the passages for a few minutes, with her pointing out her favorite parts and the sections that she thinks are the most important. Werewolves are thought to have made their home in the distant kingdom of Githrad after escaping from the Netherworld, and live in relative peace with the other inhabitants of the area, despite the stigma surrounding them.\n\t\t\t\t\t\n\t\t\t\t\tAfter the two of you have read a little bit more about them, Lorelle turns to a different page, back to the fairy that she showed you when she first introduced the book. Another illustration covers the page directly after this one, and it shows what looks like a miniature human with insect wings, except her skin is a lavender purple. \n\t\t\t\t\t\n\t\t\t\t\tA faint glow surrounds the little creature, and she has a mischievous grin on her striking and pretty face. Lorelle says excitedly, \"I would love to meet a fairy one day. They're supposed to be great fun, although playing pranks on others is one of their favorite activities.\"\n\t\t\t\t\t\n\t\t\t\t\t*page_break \n\t\t\t\t\t\n\t\t\t\t\tShe purses her lips and furrows her brow, adding, \"But, they've also been known to be quite selfish at times. Unless you can give them something in return, you shouldn't expect their help, even if it's for something very important.\"\n\t\t\t\t\t\n\t\t\t\t\tBoth of you spend a few more moments reading over the paragraphs in silence, a contented smile on the healer's face. The book says that fairies have the natural ability of flight and illumination, but some of them also have abilities unique to the individual, depending on the person's lineage and a variety of other factors. \n\t\t\t\t\t\n\t\t\t\t\tAfter you and Lorelle have finished reading about fairies, you move onto the other Lumean creatures. You learn a considerable amount given the relatively short time you spend reading about all sorts of species, like water nymphs and even the powerful and cunning sphinxes. The book is very interesting, and the healer is great company. \n\t\t\t\t\t\n\t\t\t\t\t*if talk = 2 \n\t\t\t\t\t\tShe\n\t\t\t\t\t\t*goto yawns \n\t\t\t\t\t\n\t\t\t\t\tNow that you have finished reading a good amount of An Incomplete Volume of Lume's Wildlife, the healer looks at you and asks, \"So, \n\t\t\t\t\t*if read = 2 \n\t\t\t\t\t\twhat would you like to do next?\"\n\t\t\t\t\t\t*goto talk_lorelle\n\t\t\t\t\twhich book would you like to read next?\"\n\t\t\t\t\t*goto read \n\t\t\t\t\n\t\t\t\t#Herbal Medicines for Beginners sounds like it could provide you with some useful pointers that would be good to know in your profession.\n\t\t\t\t\t*set cunning %+5 \n\t\t\t\t\t*set compassionate %+5 \n\t\t\t\t\t*set read +1 \n\t\t\t\t\t\"I'd like to read about herbal remedies. The knowledge seems invaluable, especially in my line of work. I know a small amount of it, of course, but it never hurts to be better acquainted with it if the need arises.\"\n\t\t\t\t\t\n\t\t\t\t\tLorelle nods and says, \"Excellent choice. This book took me quite a long way in my journey toward becoming a full fledged healer.\" She flips opens the book to one of the middle pages, saying, \"It's usually better to start from the beginning, or at least read the introduction first, but I figured we could just touch on some of the important points since we don't have as much time as we'd like.\"\n\t\t\t\t\t\n\t\t\t\t\tYou nod silently. That does sound reasonable, after all. Mendax surely isn't going to wait around while you learn about new ways of treating yourself from the wounds he's likely going to inflict upon you in the future…. Anyways, perhaps you're getting ahead of yourself. You lean in closer and observe the illustration as she quietly reads aloud from the book.\n\t\t\t\t\t\n\t\t\t\t\t*page_break \n\t\t\t\t\t\n\t\t\t\t\tThis particular plant, she explains, is a dark purple reed covered with bristly orange leaves that is commonly found in or around swampy areas. Although they're somewhat difficult to uproot, the juices found within them can reduce inflammation and wounds derived from heat, like fire. \"I had to give quite a bit of the Royal Reed's juices to someone who had an accident with some boiling water once,\" the healer comments.\n\t\t\t\t\t\n\t\t\t\t\tStroking your chin, you reply, \"Come to think of it, I actually may have seen a few of those around Lord Sarrivan the vampire's castle just a few days ago. I didn't have time to make use of them then, but that's certainly something to keep in mind for later.\"\n\t\t\t\t\t\n\t\t\t\t\tShe smiles and nods rapidly, responding, \"That's the spirit. Medicinal flora can be found practically everywhere as long as you know what you're looking for.\"\n\t\t\t\t\t\n\t\t\t\t\tFor the next thirty minutes or so, the two of you take turns quietly reading out of the book and observing the detailed images of the plants as you go. You learn the basics of several different kinds of plants that can be used for various medicinal purposes, like troll's root and the demon's nectar, and Lorelle is likely one of the best people to be doing it with. \n\n\t\t\t\t\t*if talk = 2 \n\t\t\t\t\t\tShe\n\t\t\t\t\t\t*goto yawns \n\t\t\t\t\t\n\t\t\t\t\tNow that you have finished reading a good amount of Herbal Medicines for Beginners, the healer looks at you and asks, \"Would you like to \n\t\t\t\t\t*if read = 2 \n\t\t\t\t\t\tdo something else now?\"\n\t\t\t\t\t\t*goto talk_lorelle\n\t\t\t\t\tread another one?\"\n\t\t\t\t\t*goto read \n\t\t\t\t\n\t\t\t\t#The Charitable Unfortunate seems to be written about noble endeavors and it would certainly be worthwhile to at least skim through its pages to see what's inside.\n\t\t\t\t\t*set stealth %+5 \n\t\t\t\t\t*set altruism %+5 \n\t\t\t\t\t*set read +1 \n\t\t\t\t\t\"I think we should take a look at The Charitable Unfortunate,\" you suggest. \"It sounds like the content has something everyone can take a few ideas from.\"\n\t\t\t\t\t\n\t\t\t\t\tGiving you a kind smile, the healer replies, \"I agree wholeheartedly. Let's get right into it, then.\" As she flips through the pages, supposedly looking for a certain section of the book, you notice that it doesn't contain any illustrations like the other books, but this also makes the pages more packed with the words written in a delicate hand.\n\t\t\t\t\t\n\t\t\t\t\tOnce she has found the spot she was looking for, Lorelle scoots a little bit closer to you and shows you the pages so that you can read along. She looks at you and comments, \"This is one of my favorite stories here. It's very inspiring.\"\n\t\t\t\t\t\n\t\t\t\t\t*page_break \n\t\t\t\t\t\n\t\t\t\t\tYour interested piqued, you pay close attention as she begins to read aloud softly, so as not to wake your apprentice. This little story in particular tells an account of a beggar on the street and a poor farmer. When going to the market to sell his crops, the farmer often noticed the beggar. \n\t\t\t\t\t\n\t\t\t\t\tAlthough he didn't have much money himself, out of the kindness of his heart, he would give the beggar as much as he could so that the homeless man wouldn't starve. Unfortunately, many people in the small town looked down upon the beggar, and ridiculed the farmer for giving away his money and associating with someone so low in the social hierarchy. \n\t\t\t\t\t\n\t\t\t\t\tDespite this, he would help the homeless man as often as he could in whatever ways he could. One day, the beggar disappeared. The farmer feared the worst, but soon afterwards, the beggar returned with a big bag full of riches, apparently having journeyed deep into a dark cave belonging to a band of goblin bandits and finding the mass of riches hidden within.\n\t\t\t\t\t\n\t\t\t\t\tIn appreciation for all the help that the farmer had given him over the years, the beggar-turned-rich-man gave him enough money to alleviate all of his worries and make his family more than comfortable. From then on, they were very great friends and continued their charitable deeds toward the less fortunate. Lorelle sighs and closes the book with a little snap. \n\t\t\t\t\t\n\t\t\t\t\t*page_break \n\t\t\t\t\t\n\t\t\t\t\tShe turns to you with a smile and says, \"Wonderful story, isn't it? Although this happened a few decades ago in an area outside of Quader, the farmer ended up growing his farm enough that he was able to hire several people. Believe it or not, the beggar ended up becoming the advisor to the mayor, thanks to his first-hand experience with being in the dredges of society, which the mayor was looking to fix.\"\n\t\t\t\t\t\n\t\t\t\t\tYou give her a sincere smile, saying, \"That's a beautiful story. I guess the morale is that being kind to others, even when it comes at your own expense, is not only good for your conscience, but it can turn around and help you in the future.\"\n\n\t\t\t\t\t*if talk = 2 \n\t\t\t\t\t\tShe\n\t\t\t\t\t\t*goto yawns \n\t\t\t\t\t\n\t\t\t\t\tAfter you have perused a few of the other stories, the healer decides it's time to move on\n\t\t\t\t\t*if read = 2 \n\t\t\t\t\t\t, asking, \"What would you like to do now?\"\n\t\t\t\t\t\t*goto talk_lorelle\n\t\t\t\t\t. Holding up the two remaining books, she says, \"So, which one sounds better to you?\"\n\t\t\t\t\t*goto read\n\t\n*if ((ceylar > vidar) and (ceylar > lorelle))\n\tthe magician glances at you and smiles, suggesting, \"I could stay here with you, if you want.\"\n\t\n\tThe healer and warrior exchange glances, apparently taking this as their cue to leave. Vidar\n\t*if vidar \u003c 50 \n\t\tshrugs and grumbles, \"Better you than me,\" and leaves without another word.\n\t*if vidar > 59 \n\t\talmost looks jealous, but just grins, saying, \"It seems like your charms did end up working, Ceylar. I'm impressed!\" He chuckles and then sees himself out.\n\t*if ((vidar \u003c 60) and (vidar > 49))\n\t\ttugs at his bushy beard, commenting, \"Seems reasonable. Goodnight, demon ${hunter}.\"\n\t\t\n\t*if lorelle \u003c 50 \n\t\tLorelle nods and says curtly, \"Yes, I must agree. Goodnight.\" With that, she follows Vidar out of the infirmary.\n\t*if lorelle > 59 \n\t\tFor a moment, Lorelle almost looks jealous. Whether this jealousy is directed at you or Ceylar, it's hard to tell. Either way, she finally gives the two of you a smile and says, \"Well, sometimes good company is the best medicine,\" and makes her way out of the room and down the hallway. \n\t*if ((lorelle \u003c 60) and (lorelle > 49))\t\n\t\tFor a moment, Lorelle looks like she might even be jealous. You can't imagine she'd be jealous of Ceylar, but you suppose it's possible that she could be jealous of you as well. Regardless, she regains her composure and says, \"Well, goodnight you two,\" and exits the room. \n\t\t\n\tWith that, you're left alone with Ceylar. By now, ${boggart} has begun to go back to sleep, getting comfortable by your feet. It doesn't take long for him to drift into slumber once again, and before long you hear his heavy breathing and feel the light twitching of his tail. The magician smiles at you, awaiting your response.\n\t*label talk_ceylar \n\t*hide_reuse \n\t*choice \n\t\t*if (talk = 0) #Keeping your tone of voice kind, you say softly, \"As much as I appreciate the offer, I really would just like to get some sleep. I'm exhausted, and these nightmares have been making me restless lately.\"\n\t\t\t*set ceylar %+5 \n\t\t\tNodding his head, the magician says simply, \"Okay, ${name}, I understand. Just let me know if you need anything, okay?\"\n\t\t\t\n\t\t\t\"Thanks, Ceylar,\" you reply tiredly.\n\t\t\t\n\t\t\tHe gives you a small smile and a departing wave before walking quietly out of the room. \n\t\t\t*goto early \n\t\t\n\t\t*if (talk = 0) #You shake your head and say curtly, \"Actually, it looks like you all have got everything covered well enough. I panicked for a few moments, but I don't need you here anymore. I'd prefer if you left.\"\n\t\t\t*set ceylar %-5 \n\t\t\t*set resolve %+5 \n\t\t\tThe magician raises his eyebrows and purses his lips, saying, \"Oookay, then.\"\n\n\t\t\tHe pivots smoothly on his heel and promptly exits the room, shutting the door quietly behind him. You sigh and quickly get comfortable under the covers again. Before long, you have fallen asleep, too exhausted to pay much mind to the mental attack Mendax had started just a few minutes ago.\n\t\t\t*goto morning\n\t\t\t\n\t\t*selectable_if (ceylar > 64) #Grinning, you pull your blankets away and motion for him to come over, saying, \"I was hoping you'd like to join me tonight. It would make me feel much better.\"\n\t\t\t*set ceylar %+15 \n\t\t\t*set talk +1 \n\t\t\t*set charisma %+5 \n\t\t\tCeylar's perfectly groomed eyebrows shoot up into his forehead, and his usual disarming grin appears across his face. \"Wanting to get nice and cozy, are we? Excellent!\" he says cheerily, making his way over to your bed. \n\t\t\t\n\t\t\tWhen he starts to climb in, however, he notices that your apprentice is still sleeping not so quietly there at the bottom. The magician's brow furrows, and he says, \"Err, what about ${boggart}?\"\n\t\t\t*fake_choice \n\t\t\t\t#You shrug and say, \"Who cares? This is my bed anyways. He can find another one of his own.\"\n\t\t\t\t\t*set altruism %-5 \n\t\t\t\t\t*set relationship %-5 \n\t\t\t\t\t*set ceylar %-5 \n\t\t\t\t\t*set boggart_gone true \n\t\t\t\t\tThe boggart hisses angrily, but is apparently too tired to put up very much of a fight. After making a rude hand gesture at you and muttering something under his breath, he flutters off to the other side of the small infirmary, alighting onto a pillow and quickly curling up again. \n\t\t\t\t\t\n\t\t\t\t\tThe magician raises an eyebrow, saying, \"That doesn't seem necessary, ${name}. I don't want him kicked out of his spot on my account.\"\n\t\t\t\t\t\n\t\t\t\t\tYou wave it away and respond, \"Hey, it worked, right? You really can't complain too much.\"\n\t\t\t\t\t\n\t\t\t\t\tHe rolls his eyes and says dryly, \"Because we all know the ends justify the means.\" Even so, you can see an excited twinkle in his cool verdant eyes. Although he seems to have taken you being rude to the boggart negatively, he can't argue with the result.\n\t\t\t\t\n\t\t\t\t#Biting your lip, you think about it for a moment. Your face pensive, you say, \"Well, he was here first, after all, but I don't want you to leave either. Maybe he can just stay where he is? He won't bother us, I'm sure.\"\n\t\t\t\t\t*set relationship %+5 \n\t\t\t\t\t*set ceylar %+5 \n\t\t\t\t\t*set altruism %+5 \n\t\t\t\t\t*set boggart_bed true  \n\t\t\t\t\tYour apprentice smiles from the bottom of the bed, looking grateful that he doesn't have to be interrupted. \n\t\t\t\t\t*if relationship > 64 \n\t\t\t\t\t\t\"Yay!\" he squeaks sleepily.\n\t\t\t\t\t*if relationship \u003c 50 \n\t\t\t\t\t\t\"Finally you're being sensible,\" he mumbles, though you notice he isn't as cutting about it as he normally would have been.\n\t\t\t\t\t*if ((relationship > 49) and (relationship \u003c 65))\n\t\t\t\t\t\tHe simply says, \"Thanks.\" Even so, he does look somewhat annoyed that he'll be sharing the bed with so many people.\n\t\t\t\t\t\t\n\t\t\t\t\tThe magician just shrugs, looking a little disappointed. He responds diplomatically, \"Sure, why not compromise?\" He grins, showing his perfect teeth, and continues, \"I've never really slept in a bed with anyone but a fellow human, though.\" He points to his freckled nose and explains simply, \"Allergies.\"\n\t\t\t\t\n\t\t\t\t#Not wanting things to be awkward for Ceylar, you grin slyly and nudge your apprentice, telling him, \"Hey, ${boggart}, if you let him borrow your spot for a while I'll make it up to you later. Perhaps with some extra boggart treats?\"\n\t\t\t\t\t*set cunning %+5 \n\t\t\t\t\t*set relationship %+5\n\t\t\t\t\t*set boggart_gone true \n\t\t\t\t\t*set ceylar %+10 \n\t\t\t\t\tYour apprentice doesn't look happy about it at first. After thinking it over for a moment, \n\t\t\t\t\t*if relationship > 64\n\t\t\t\t\t\tthough, he finally relents. He cracks a toothy smile and squeaks groggily, \"Sure, anything for those delicious Impish Delights!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYawning, he flutters off the bed over to the other side of the room, landing on a fluffy pillow and quickly snuggling into it. \n\t\t\t\t\t*if relationship \u003c 50 \n\t\t\t\t\t\the just narrows his eyes and responds suspiciously, \"How can I be certain that you'll keep your end of the promise?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYour smile quickly drops and you give him a deadpan look. \"You aren't really helping your chances any by being so stubborn,\" you grunt.\n\t\t\t\t\t\t\n\t\t\t\t\t\tRolling his eyes, your apprentice finally says, \"Fine, fine,\" and flutters off, muttering under his breath and cuddling up to a fluffy pillow on another bed. \n\t\t\t\t\t*if ((relationship > 49) and (relationship \u003c 65))\n\t\t\t\t\t\tthe boggart simply shrugs and says, \"Sure, why not? I do miss those scrumptious morsels.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tWith that, he flaps his wings briefly and lands onto another infirmary bed, quickly assuming a sleeping position.\n\t\t\t\t\tCeylar chuckles and comments, \"Don't let him get in the habit of getting treats for doing what you want, or that's the only way you'll ever get him to do it. Trust me, I know from experience!\" \n\t\t\t\t\t\n\t\t\tWith that settled, he climbs into your bed, quickly getting under the covers and pressing his body against yours. With the magician so close, you notice his distinct, clean smell. Underneath his natural musk is a faint odor of fresh oranges that accents his overall scent very well indeed.\n\t\t\t*choice \n\t\t\t\t#You grin slyly and give him a sloppy kiss on his cheek and then wrap your arms and legs around his body, snuggling your head against his lean but defined chest. \n\t\t\t\t\t*set ceylar %+10 \n\t\t\t\t\t*set resolve %+5 \n\t\t\t\t\tYou can see Ceylar smiling widely through the corner of your vision, and he murmurs, \"What did I do to deserve this?\" as he plays with your hair fondly.\n\t\t\t\t\t\n\t\t\t\t\tYou kiss him on the lips and whisper back, \"Somehow you seem to do just fine without even trying.\" He chuckles softly and traces the curves of your body lightly with his fingertips. By now, your heart is pounding in your chest, and you can feel your cheeks getting hotter and growing a shade darker.\n\t\t\t\t\t\n\t\t\t\t\tYou start to move your hands around his smooth back and arms, relishing the toned muscles. He kisses your nose, rubbing his fine hands across your back and kneading his fingers into your lower back and shoulders.\n\t\t\t\t\t\n\t\t\t\t\t*page_break \n\t\t\t\t\t\n\t\t\t\t\tThe stress practically seeps from your body, and here in his arms, you feel better than you have in a very long time. Nibbling on his earlobe for a moment, you whisper just loud enough for him to hear, \"How did I end up here with someone so amazing?\"\n\t\t\t\t\t\n\t\t\t\t\tHe rests his head by yours and gazes deeply into your eyes, saying tenderly, \"You're so intriguing and fun to be around that I just had to get to know you better, and I only hoped this would happen.\"\n\t\t\t\t\t*label cuddled3\n\t\t\t\t\t\n\t\t\t\t\tYou don't know how long you lay there, cuddled against Ceylar. His alluring scent and comfortable warmth envelope you, and you feel safer and more content than you can remember ever feeling. His rhythmic breathing almost lulls you to sleep, and it would, if not for \n\t\t\t\t\t*if talk = 1\n\t\t\t\t\t\ta nagging restlessness caused by your dreams. Despite how much you wish you could just fall asleep together, it seems that won't be possible, at least not for another while.\n\t\t\t\t\t\t\n\t\t\t\t\t\tStirring slightly, you smile at him and kiss his cheek, then say, \"Sorry, Ceylar, but I can't get to sleep. Can we do something else?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tHe blinks groggily but gives you a warm smile, saying, \"Do you even have to ask? I would stay up with you forever if it wouldn't kill me. I need my beauty sleep eventually, but for now that can wait!\"\n\t\t\t\t\t\t*goto talk_ceylar  \n\t\t\t\t\t*if boggart_gone \n\t\t\t\t\t\tyour apprentice's loud snoring from across the room.\n\t\t\t\t\t*if boggart_bed \n\t\t\t\t\t\t${boggart}'s twitching and jerking at the foot of the bed.\n\t\t\t\t\tEven so, you eventually manage to drift off to sleep, wondering if this charming entertainer can really improve your life after everything that has happened.\n\t\t\t\t\t*goto morning \n\t\t\t\t\n\t\t\t\t#You squeeze his arm gently but then roll over and press your head into his chest. You're content just to have his presence and feel his warmth beside you. \n\t\t\t\t\t*set stealth %+5 \n\t\t\t\t\t*set ceylar %+5 \n\t\t\t\t\tThe magician inches closer to you and rests his chin gently on your head, stroking your back absent-mindedly. You push your face closer into his chest, breathing deeply and appreciating his scent. A smile tugs at the corner of your lips, and you look up at him, saying, \"Oranges, really?\"\n\t\t\t\t\t\n\t\t\t\t\tHe chuckles quietly and shrugs, responding, \"Sometimes I like to freshen up by putting some citrus in my bath.\" He pauses, then winks at you and adds, \"Plus, I've been using a little more lately to impress a certain someone.\"\n\t\t\t\t\t\n\t\t\t\t\tBeaming up at him, you respond, \"I'm flattered.\" You rest your head back down on his chest, and after a few moments you feel yourself getting even more comfortable.\n\t\t\t\t\t*goto cuddled3 \n\t\t\t\t\t\n\t\t\t\t#Moving closer to him, you grab him around the waist and pull him tightly against you. Then, you press your lips to his, kissing him deeply. You want to push things a little further. You're tired of waiting, and this is finally your chance.\n\t\t\t\t\t*set resolve %+5 \n\t\t\t\t\t*set altruism %-5 \n\t\t\t\t\t*set ceylar %+15 \n\t\t\t\t\tThe magician seems taken aback for a few moments, but he soon loosens up, grabbing you back and expertly dancing his tongue across yours. You can feel your body getting hotter, and a soft moan escapes from your mouth as you push your hands against his chest and roll over on top of him, giving him a wolfish grin.\n\t\t\t\t\t\n\t\t\t\t\tCeylar looks up at you with his warm verdant eyes, his expression a mix of hesitance and desire. Though mostly desire, you notice. When you begin to move your hands down his body, he grabs them softly and whispers, \"Wait, what about our little boggart friend? Surely he might find this a little awkward if he woke up.\"\n\t\t\t\t\t\n\t\t\t\t\tYou glance over\n\t\t\t\t\t*if boggart_bed \n\t\t\t\t\t\tat the boggart only a few beds away, spread out like a starfish on a fluffy pillow. He hasn't woken up yet, and he seems to be sleeping soundly, but you never know when he'll suddenly wake.\n\t\t\t\t\t*if boggart_gone \n\t\t\t\t\t\tand look at your apprentice just a couple feet below you. He hasn't woken up yet, but he has started to stir slightly and mumble in his sleep.\n\t\t\t\t\tEven so, you just give Ceylar a mischievous grin and respond by whispering in his ear, \"Trust me, he won't even notice. Come on, you know you want to.\"\n\t\t\t\t\t\n\t\t\t\t\t*page_break \n\t\t\t\t\t\n\t\t\t\t\tYou start to rub his thighs again, and although he looks nervous, he doesn't take any action to stop you. Once you begin to move closer to his private area though, he stops you with some reluctance. His face is as flushed as you imagine yours is, and he has a lustful grin. \n\t\t\t\t\t\n\t\t\t\t\tDespite that, though, he motions to your apprentice and whispers, \"As much as I hate to stop us here, maybe we should wait for another time that's better for this.\"\n\t\t\t\t\t\n\t\t\t\t\tYou give him a disappointed look, pouting and pushing out your lower lip, but say, \"Have it your way, then, Mister Responsible.\"\n\t\t\t\t\t\n\t\t\t\t\t*if talk = 1 \n\t\t\t\t\t\tHe rolls his eyes playfully and replies, \"Let's do something else before I lose my willpower.\"\n\t\t\t\t\t\t*goto talk_ceylar \n\t\t\t\t\t*if talk = 2 \n\t\t\t\t\t\tPutting his hands up in mock defense, he says, \"Hey, I never said that I don't want to be in bed with you. Come here.\" You smile and cuddle up against him, your heart still racing faster than normal. \n\t\t\t\t\t\t\n\t\t\t\t\t\tAs the exhaustion begins to settle in again, you rest your head against his chest as it rises and falls gently with his breath, and slowly start to fall asleep. Despite how this attempt went poorly, you wonder if things could go further later on. That would take a mountain of stress off your back, and you can't imagine a better person to do it with than Ceylar.\n\t\t\t\t\t*goto morning \n\t\t\n\t\t#Thinking that he might still have a burden on his shoulders from when that sentry died during the battle between the guards of Lorden and Falcon's bandits, you tell him, \"You know, if you need to get anything off your chest, just tell me. I'm here, and I know what you're going through.\" \n\t\t\t*set talk +1 \n\t\t\t*set ceylar %+5 \n\t\t\tThe magician drops his gaze, his eyes downcast and his expression one of sadness. He sighs and says, \"Thanks, ${name}. It hasn't changed much from earlier, although I guess a few hours is far too little time for a sap like me to get over something like that.\" He grins and says self-deprecatingly, \"After all, I can barely handle my favorite robe being ruined.\"\n\t\t\t\n\t\t\tYou chuckle but push him on the shoulder lightly, replying, \"Hey, you're tougher than you give yourself credit for. Don't go beating yourself up, either. Your heart is in the right place.\"\n\t\t\t\n\t\t\tHe nods and responds, \"Thank you, ${name}.\" He looks up, meeting your gaze, and asks, \"How do you get through something like that? The death of another is always hard to cope with, but it's even worse when you could have prevented it.\" He furrows his brow, and amends, \"Well, when you tell yourself that you could have prevented it, in any case.\"\n\t\t\t*fake_choice \n\t\t\t\t#\"I try to do as much good as possible elsewhere, so that I feel like, in some way, I'm making up for my mistakes,\" you tell him softly.\n\t\t\t\t\t*set compassionate %+5 \n\t\t\t\t\t*set altruism %+5 \n\t\t\t\t\tThe magician gives you a kind, sincere smile. \"That's amazing, ${name}. Very noble. Perhaps I'll try that as well.\"\n\t\t\t\t\n\t\t\t\t#You give a humorless chuckle and tell him, \"I've often found that these things don't just go away; they can only be ignored. The best way for me to do that is to distract myself. Comforts, food, delicacies—that's how I get by.\"\n\t\t\t\t\t*set altruism %-5 \n\t\t\t\t\tThe magician nods, chewing on the inside of his cheek as he thinks it over for a moment. A few seconds later, he finally replies, \"I can see the appeal to that. I wouldn't mind that approach myself, I suppose, but it's different when you don't have the opportunity to gain things like that. I'm not exactly the richest guy in town.\"\n\t\t\t\t\t\n\t\t\t\t#You shrug and say matter of factly, \"Cracking skulls is often the only way I can get my anger out well enough or distract myself from the demons that haunt me.\" You feel compelled to add, \"Figurative demons, in this particular case.\"\n\t\t\t\t\t*set compassionate %-5 \n\t\t\t\t\tHe rolls his eyes and laughs, saying, \"Yeah, now you sound like Vidar all over again. Just don't be too close to one another when you're both angry.\"\n\t\t\t\t\t\n\t\t\t\t#You give him a small grin and reply, \"For me, one of the best things I can do is make others laugh and smile. Maybe it doesn't fix the problem, but it certainly helps me forget, at least for the time being.\"\n\t\t\t\t\t*set charisma %+5\n\t\t\t\t\tCeylar cracks a wide, toothy grin, showing off his sparkling teeth and dimples. \"Hey, that sounds like me! I guess that method isn't so bad.\" He winks and adds, \"Thanks for reassuring me. For a moment there, I thought I didn't have it all figured out.\"\n\t\t\t\t\t\n\t\t\t\t#Meeting his gaze, you respond firmly, \"We're all faced with something that seems too difficult to handle at some point in our lives, but the best way for me to cope is to face it head-on. You have to be stronger than the problems you're confronted with.\"\n\t\t\t\t\t*set resolve %+5 \n\t\t\t\t\tCeylar nods, his expression serious and his verdant eyes still intent on yours. He responds, \"I've never been the particularly strong type, but I could certainly give your method a try. I usually dance around my issues but maybe I could attempt a more solid approach and see if it works better for me.\"\n\t\t\t\t\t\n\t\t\t\t#The corner of your lip twitches and you say quietly, \"I'll admit that sometimes these problems seem so massive and terrible that I just want to run away and pretend they aren't there. When that doesn't work, I simply meditate and remind myself that we can't change the past, but it can change us, if we let it.\"\n\t\t\t\t\t*set stealth %+5 \n\t\t\t\t\t\"Whoa,\" he says, his eyes going wide. \"You're getting all philosophical on me there, ${name}.\" When you raise an eyebrow, he raises his hands in turn, palms up, and adds, \"That's very wise, though. I'll definitely try that in the future.\"\n\t\t\t\t\t\n\t\t\t\t#Pensive, you reply, \"Realistically, if we blamed ourselves for every bad thing that happened that we wished we could fix, we would tear ourselves apart from the inside.\" \n\t\t\t\t\t*set cunning %+5 \n\t\t\t\t\t\"It's not healthy, and we have to realize that we aren't all powerful and that most things are out of our control. All we can do is try to do what we feel is best,\" you conclude.\n\t\t\t\t\t\n\t\t\t\t\tNodding thoughtfully, the magician replies, \"Yeah, that's very true. I thought about it that way before, but I guess it doesn't make the guilt go away for me.\" He grins and rolls his eyes at no one in particular, continuing, \"Logic and emotion rarely go together, after all, am I right?\"\n\t\t\t\n\t\t\n\t\t\tHe adds, \"Thanks for the advice, though.\n\t\t\t*if talk = 1 \n\t\t\t\tWhat would you like to do now?\"\n\t\t\t\t*goto talk_ceylar \n\t\t\t*if talk = 2 \n\t\t\t\tBut hey, you look tired, and I don't want to keep you up too long.\"\n\t\t\t\n\t\t\t\tJust as he says that, you begin to yawn uncontrollably. Chuckling tiredly, you reply, \"Yes, maybe you're right. Well, goodnight Ceylar. I really appreciate you coming in here and keeping me company.\"\n\t\t\t\n\t\t\t\tGiving you his usual charming smile, the magician pats you on the shoulder and replies, \"Absolutely, ${name}. I'd do it any day of the week.\" With that, he stands and exits the room, shutting the door behind him quietly. \n\t\t\t*goto morning \n\t\t\n\t\t#Having heard a little about Ceylar's work as a bard, you say, \"Maybe you could entertain me for a little while. Tell me about the different jobs you've done here and there.\"\n\t\t\t*set talk +1 \n\t\t\t*set ceylar %+5 \n\t\t\tCeylar grins, replying with a wink, \"Oh, absolutely. I'm always willing to embarrass myself with tales of my exploits.\" Rubbing his hands together, he seems to think for a moment before saying, \"Let's see. I've had gigs in places all over Quader and even in a few villages in the surrounding area, and they've all been different. I wonder which one you'd like to hear.\"\n\t\t\t\n\t\t\tYou shrug and respond, \"What are the ones that come to your mind?\"\n\t\t\t\n\t\t\tThe magician strokes his perfectly clean-shaven chin and says, \"There are a few that come to mind. There was this one where I had the entire crowd, however small, in tears during a play about a tragedy where I was the main actor.\" He chuckles, then adds, \"There was also this time where I challenged this belligerent drunk at a tavern to a flyting duel.\"\n\t\t\t\n\t\t\t*page_break \n\t\t\t\n\t\t\tAt your raised eyebrow and puzzled look, he laughs and explains, \"It's basically a competition where we make insulting poems about one another, with the winner being decided upon by the cheers of whoever is watching.\" \n\t\t\t\n\t\t\tHe takes a sip of water sitting by your bedside and continues, \"The last one that I'm thinking of is where I was simply walking home from a tavern where I had been singing and I was accosted by several thugs and had to convince them that I was a mighty wizard to get them to leave me alone.\" He smiles and finishes, \"So, which one would you like to hear?\"\n\t\t\t*label story \n\t\t\t*hide_reuse \n\t\t\t*choice \n\t\t\t\t#A tale of fending off several thugs with just the power of his words and maybe a few magic tricks is definitely too good to pass up. Plus, it's also a tactic that could be useful to you in the future.\n\t\t\t\t\t*set resolve %+5  \n\t\t\t\t\t*set story +1 \n\t\t\t\t\t\"I'd like to hear about how you managed to get away from those highwaymen,\" you say, grinning.\n\t\t\t\t\t\n\t\t\t\t\tThe magician rubs his hands together again excitedly and muses, \"Ooo, that's a good one.\" Scooting himself in a bit closer, he lowers his voice to an ominous whisper and carries on, \"One night I was walking home after a particularly rowdy performance at a local bar. This was a few years back, so the area was significantly more dangerous than it is now.\"\n\t\t\t\t\t\n\t\t\t\t\tA glint sparkling in his cool green eyes, Ceylar continues, \"Suddenly, several men and even a couple mean looking women jumped out of nowhere, surrounding me and brandishing crude weapons. I recognized at least one of them from the tavern, and I suppose they thought I was easy prey because they had seen me singing. What good is a bard in a fight, right?\"\n\t\t\t\t\t\n\t\t\t\t\tWith a mischievous smile, he says, \"The tallest woman, holding a large wooden club, demanded that I give them my valuables or be beaten to death. Now, I didn't have a lot in the way of money or possessions, but there was no way I was going to stand for that. Instead, I decided to bluff them with a little help from my powers and infectious charm.\" He winks at that last part.\n\t\t\t\t\t\n\t\t\t\t\t*page_break \n\t\t\t\t\t\n\t\t\t\t\t\"Anyways,\" he adds, \"I puffed out my chest and demanded that they leave, telling them that I was a new-found wizard on my way to Melithar's Mountain to train with him and hone my magic. The tone of my voice and my unwavering bravado had already convinced a couple of them, but their leader wasn't having any of it.\"\n\n\t\t\t\t\tShaking his head in amusement, the magician says, \"The woman charged me, furious at my attempt to make a fool of her, but I mustered enough of my mana to levitate her club for just a second, moving it enough for it to conk her on the head. She yelped and staggered forward into my outstretched foot, skidding across the dirt.\n\t\t\t\t\t\n\t\t\t\t\t\"The others charged at me, but I used the last of my mana to shoot a lightning bolt from my hand, much like the one I used against Illil's bandits. This time, though, I spread it out and made the thunderclap and light much more impressive.\"\n\t\t\t\t\t\n\t\t\t\t\t*page_break \n\t\t\t\t\t\n\t\t\t\t\t\"Although the bolt itself wasn't enough to leave more than a sting on each of them, the massive boom and dazzling purple and blue lights were apparently enough to scare them away.\" He grins and finishes, \"After that, they didn't show their faces around Quader, and they definitely didn't cause any more trouble.\"\n\t\t\t\t\t\n\t\t\t\t\tChuckling, you clap him on the shoulder and say, \"It looks like improvisation and a magician's powers are better than brute strength any day.\"\n\t\t\t\t\t*label enjoyed \n\t\t\t\t\t\n\t\t\t\t\tHe grins and replies, \"I'm glad you enjoyed it!\n\t\t\t\t\t*if story = 2 \n\t\t\t\t\t\t*if talk = 1 \n\t\t\t\t\t\t\tWould you like to do something else now?\"\n\t\t\t\t\t\t\t*goto talk_ceylar \n\t\t\t\t\t\t*if talk = 2 \n\t\t\t\t\t\t\tIt's one of my favorite stories to tell.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou're about to respond, when you feel the irresistible urge to yawn. You try to stifle it, but the magician still notices. He suggests, \"I'm pretty tired, and I can only imagine how exhausted you must be. I suppose we should turn in for the night. Goodnight, ${name}!\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tWith a little wave, he grabs his wizard hat from the bedside and exits the room quietly, careful not to wake a stirring ${boggart}. You get back under your covers, and it is all you can do to readjust your pillow beneath your head before you fall asleep.\n\t\t\t\t\t\t\t*goto morning \n\t\t\t\t\tWould you like to hear another one?\"\n\t\t\t\t\t*goto story \n\t\t\t\t\t\n\t\t\t\t#The tragic play sounds the most intriguing to you. Any story and actor who can make an audience cry must be incredible.\n\t\t\t\t\t*set story +1  \n\t\t\t\t\t*set compassionate %+5 \n\t\t\t\t\t\"I want to see for myself how tear-jerking this story really is,\" you say kindly. \"You may be able to get some tavern goers to weep at your play, but I'm someone else entirely.\"\n\t\t\t\t\t\n\t\t\t\t\t\"We shall see!\" he replies confidently. \"It was a gig like any other, except better paying and more crowded, not to mention that the audience was almost solely composed of nobles and rich people. Suffice it to say I had to be extra impressive with my performance. The play was called The Pale Crescent Moon, and with my income and reputation depending on it, I made it a point to put all I could into the role.\"\n\t\t\t\t\t\n\t\t\t\t\tHe suddenly adopts a more serious, gloomy tone and expression, and lowers his voice to a whisper for effect. \"Once there was a kindly but poor farmer. He lived on the outskirts of a small village that was dangerously close to a local coven of witches and warlocks. Since the town guard was well meaning but very small and generally ineffectual against powerful villains like these, it was up to the villagers to protect themselves for the most part.\"\n\t\t\t\t\t\n\t\t\t\t\t*page_break \n\t\t\t\t\t\n\t\t\t\t\t\"Because of this, many of them had guard dogs. Although this wasn't the best solution, it was still better than nothing. One day, the farmer happened upon a stray puppy wandering around in the woods. The animal was sickly and starving, so the farmer took him in to care for him. The man had a son named Jed—who I acted!—and together they cared for the dog.\"\n\t\t\t\t\t\n\t\t\t\t\tThe magician raises his fingers and lets out a momentary purple glow for effect and continues, \"It wasn't long, however, until they realized that the dog was actually a werewolf who must have been abandoned by his parents. Scared and angry at this realization, the father kicked the young werewolf out of their home.\" Shaking his head, he added, \"The old man even went as far as to throw rocks at the pup to chase him away whenever he tried to return to their home, despite Jed begging his father not to and trying to comfort the poor werewolf cub.\"\n\t\t\t\t\t\n\t\t\t\t\t\"One day, though, the older farmer was kidnapped by the coven of witches, forced to be the subject of cruel activities for their entertainment. Stuff like dodging flaming apples and being chased by hungry dogs! Jed—again, acted by yours truly—went after the witches to try to save his father, but he was no match. They defeated him, and just as the two farmers thought for sure that they were going to die, the werewolf appeared out of nowhere and attacked the witches!\"\n\t\t\t\t\t\n\t\t\t\t\t*page_break \n\n\t\t\t\t\tHis eyes widening for effect, Ceylar continues, \"Little as he was, the werewolf fought like his life depended on it, and he saved both the father and his son. Although he gave them time to escape, he ended up dying a brutal death against the band of savage witches.\n\t\t\t\t\t\n\t\t\t\t\t\"By the end,\" he finishes, \"almost everyone was wiping their eyes, and several people were quite audibly sobbing. They were so impressed with my role as the lead actor and the play itself that we were all given a standing ovation, and a few people even requested an encore, which is understandably rare when dealing with plays, especially lengthy ones like this.\"\n\t\t\t\t\t\n\t\t\t\t\tRaising your eyebrows, you say, \"Wow, that's impressive.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t*goto enjoyed\n\t\t\t\t\t\n\t\t\t\t#That flyting duel sounds hysterical, not to mention it could certainly boost your spirits. You also want to see a prime example of this emerging type of spoken poetry. \n\t\t\t\t\t*set charisma %+5 \n\t\t\t\t\t*set story +1 \n\t\t\t\t\t\"Let's hear about that silver tongue of yours,\" you reply with a grin.\n\t\t\t\t\t\n\t\t\t\t\tCeylar winks and responds, \"I thought you might choose that one!\" Cracking his knuckles, he continues, \"Well, it all started out at The Drunken Troll tavern, where myself and a few others were entertaining the customers in a variety of ways—singing, acting, storytelling, and even some burlesque dancing from some of the ladies. The entire time, though, this man kept booing us and yelling about how terrible we were.\"\n\t\t\t\t\t\n\t\t\t\t\tRolling his eyes good-naturedly, the magician says, \"The others were willing to ignore him for the most part, mainly because they didn't want to look bad in front of the people who would be paying them for their night's work.\" He chuckles and adds, \"It also didn't help that the guy was a three hundred pound brute and was completely wasted like five ales ago.\"\n\t\t\t\t\t\n\t\t\t\t\tPuffing out his chest, he continues, \"When it came to my final act, though, the man started insulting me for my use of makeup and saying I had a terrible voice. Naturally, I wasn't going to take that sitting down, so I challenged him to a flyting battle in front of the entire crowd. He didn't look too keen on it at first, but eventually the crowd and his ego pressured him into it.\"\n\t\t\t\t\t\n\t\t\t\t\t*page_break \n\t\t\t\t\t\n\t\t\t\t\t\"He demanded to go first, of course, but his performance wasn't anything special. He basically just mumbled and slurred out some poorly rhymed lines about how I was weak and my voice sounded like a little girl's.\" His voice growing a little louder and more excited, Ceylar says, \"I got him back good, though. I remember my entire verse like it was yesterday. It went like this:\"\n\t\t\t\t\t\n\t\t\t\t\t[i] Your breath is rank and your rhymes are horrid [/i]\n\t\t\t\t\t*line_break \n\t\t\t\t\t[i] Worst of all, you look like old porridge [/i]\n\t\t\t\t\t*line_break \n\t\t\t\t\t[i] You drink so much your mind is shrinking [/i]\n\t\t\t\t\t*line_break \n\t\t\t\t\t[i] I'd hope you'd get sober but that's just wishful thinking [/i]\n\t\t\t\t\t*line_break \n\t\t\t\t\t[i] And the look on your face is steadily sinking [/i]\n\t\t\t\t\t*line_break \n\t\t\t\t\t[i] Now that you realize this magician will leave you electrified [/i]\n\t\t\t\t\t*line_break \n\t\t\t\t\t[i] But even that's not enough to change that you're dead inside [/i]\n\t\t\t\t\t*line_break \n\t\t\t\t\t[i] Despite your girth, you can still try to hide [/i]\n\t\t\t\t\t*line_break \n\t\t\t\t\t[i] But you simply can't escape the flames that my words provide [/i]\n\t\t\t\t\t*line_break \n\t\t\t\t\t[i] Your greatest passion is sitting around insulting others [/i]\n\t\t\t\t\t*line_break \n\t\t\t\t\t[i] But maybe that's just to hide that your wife is your mother [/i]\n\t\t\t\t\t\n\t\t\t\t\tHe laughs heartily, finishing, \"The man's jaw practically dropped to the floor and the whole crowd was howling. He was so embarrassed that he just ran out of the room without even paying for any of his drinks. And it doesn't hurt that my performance got me the most tips I've ever had, either!\"\n\t\t\t\t\t\n\t\t\t\t\tLetting out one of the biggest laughs that you have had in a very long time, you respond in amusement, \"That's excellent. Way to teach him a lesson and give yourself a little extra spending money as well.\"\n\t\t\t\t\t*goto enjoyed  \n\t\n*if ((vidar > lorelle) and (vidar > ceylar))\n\tVidar looks at you and rumbles, \"Perhaps it would be best if I kept watch over you for a little while.\"\n\t\n\tThe healer and magician exchange glances, as if taking this as their cue to leave. Ceylar\n\t*if ceylar \u003c 50 \n\t\tshoots a not-so-stealthy incredulous glance Lorelle's way before shrugging his shoulders and heading toward the exit. \"Be my guest,\" he replies.\n\t*if ceylar > 59 \n\t\twinks overtly at the healer and switches off from drawing hearts in the air and pointing at you and Vidar. She laughs but shoos him away with a wave of her hands. Still smiling in amusement, he scurries off, saying, \"Goodnight then, lovebirds.\"\n\t*if ((ceylar \u003c 60) and (ceylar > 49))\n\t\traises an eyebrow and exchanges glances with Lorelle. He gives you a little smile before replying, \"Yeah, no problem at all,\" and making his way out of the room.\n\t\t\n\tAfter he has left, Lorelle\n\t*if lorelle \u003c 50 \n\t\tlooks at you plainly and adds, \"I had better go, too, then.\"\n\t*if lorelle > 59 \n\t\tgrins knowingly at you, saying, \"Well, do have a good time, then. I hope you feel better.\"\n\t*if ((lorelle \u003c 60) and (lorelle > 49))\n\t\tgives you a small but knowing smile and says, \"Maybe he's right. Goodnight, ${name}.\"\n\t\t\n\tWith that, she follows him out into the hallway. At that point, you're left alone with Vidar. Meanwhile, your apprentice has started to curl up into a ball on the bottom of your bed, already falling back asleep. Or, at least you assume so from his heavy breathing and intermittent twitching. The warrior looks at you expectantly, awaiting your response.\n\t*label talk_vidar \n\t\n\t*if talk = 1 \n\t\tWhat would you like to do now?\n\t*hide_reuse \n\t*choice \n\t\t#After a bit of consideration, you say, \"I have an idea. Do you have a chess board somewhere around here?\"\n\t\t\t*set vidar %+5 \n\t\t\t*set cunning %+5 \n\t\t\t*set resolve %+5 \n\t\t\t*set talk +1 \n\t\t\tVidar grins, saying, \"Ah, in the mood for a little king hunting are we?\" He rises and adds, \"I've always found chess to be a pleasing distraction, so I think that's a good idea. I'll be right back.\"\n\t\t\t\t\t\n\t\t\tHe leaves the room for a few moments, then returns with a battered wooden box. He takes his position back on the stool beside your bed and gently sets the box on the bed so as not to wake the boggart up. \n\t\t\t\t\t\n\t\t\tNow that you can get a closer look at it, you can see that the box is actually painted crudely to resemble the sixty four squares of a chess board. The warrior opens the box and empties the chess pieces onto your bed and then begins to set them up, commenting, \"This is an old set and it isn't the fanciest, but I think it's the players that matter, not the materials.\"\n\t\t\t\t\t\n\t\t\tHaving finished setting up the chipped and vague but suitable wooden pieces, he turns the board so that you'll be playing the white side. Raising a bushy eyebrow, he says in a friendly way, \"So then, let's see what you've got.\"\n\t\t\t*label games \n\t\t\t*choice \n\t\t\t\t*selectable_if (charisma > 65) #You decide to try to play decent but quirky, provocative moves to throw him off his game and make him uncomfortable. It also wouldn't hurt to employ a little mind-play.\n\t\t\t\t\t*set charisma %+5 \n\t\t\t\t\t*set games +1 \n\t\t\t\t\tTo begin the game, you make some playable but offbeat and odd moves. Vidar seems a little confused, but plays on in a principled manner nonetheless. However, to add to the effect, you blitz out your moves instantly. \n\t\t\t\t\t\n\t\t\t\t\tThis can be intimidating, and although there is no way of really controlling how much time each person takes on their turn, it is considered rude and unsporting to spend too long thinking, so Vidar seems to be compelled to move quickly as well. Giving him a charming smile, you finally say, \"May the best player win,\" and move a flank pawn forward.\n\t\t\t\t\t\n\t\t\t\t\t*page_break \n\t\t\t\t\t\t\t\n\t\t\t\t\tThe warrior arches his eyebrow at the uncommon move, but simply replies by seizing control of the center with a central pawn, as expected. Continuing in the same vein, you push forward your g pawn, preparing to develop both of your bishops along the longest diagonals. Vidar is consistent, moving his d pawn two squares forward and gaining a strong grip on the center.\n\t\t\t\t\t\t\t\n\t\t\t\t\tHowever, you move so quickly that it leaves him rattled and you eventually catch him in a blunder, taking one of his bishops for a wing pawn, without which the center is easier to break down. From there, you are able to launch a decisive attack on his king with your king-side pawns and your more numerous minor pieces. \n\t\t\t\t\t\t\t\n\t\t\t\t\tSeeing that some well-timed sacrifices on your end would spell disaster for him, Vidar ends up resigning. Giving you a smile as he rolls his dark eyes and shakes his head, he comments with a chuckle, \"Wow, I've never seen anyone play like that. You may have developed a new style, there, but to be honest you probably just swindled me.\" He claps his hands together and continues,\n\t\t\t\t\t*if games = 2 \n\t\t\t\t\t\t\"Still, I think that's a good stopping point.\"\n\t\t\t\t\t\t*if talk = 2\n\t\t\t\t\t\t\t*goto morning \n\t\t\t\t\t\t*goto talk_vidar \n\t\t\t\t\t\"Let's see if you can beat me again, crazy \n\t\t\t\t\t*if male \n\t\t\t\t\t\tman.\n\t\t\t\t\t*if female \n\t\t\t\t\t\tlady.\n\t\t\t\t\tWould you like a rematch?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t*label rematch \n\t\t\t\t\t\n\t\t\t\t\t*if charisma > 65 \n\t\t\t\t\t\t*set rematch +1 \n\t\t\t\t\t*if resolve > 65 \n\t\t\t\t\t\t*set rematch +1 \n\t\t\t\t\t*if cunning > 65 \n\t\t\t\t\t\t*set rematch +1 \n\t\t\t\t\t*if stealth > 65 \n\t\t\t\t\t\t*set rematch +1 \n\t\t\t\t\t\t\t\n\t\t\t\t\t*choice \n\t\t\t\t\t\t*selectable_if (rematch > 1) #You are more than capable of playing well in various styles, whether it's tactical or positional, aggressive or prophylactic. You accept his challenge.\n\t\t\t\t\t\t\t*goto games \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t#You were able to beat Vidar in that first game, but you're getting tired and don't have enough energy to play another good game. You politely decline.\n\t\t\t\t\t\t\t*if talk = 2 \n\t\t\t\t\t\t\t\t*goto morning \n\t\t\t\t\t\t\t*goto talk_vidar \n\t\t\t\t\t\t\n\t\t\t\t*selectable_if (resolve > 65) #You decide to test his mettle the exciting way, steering the game toward an open position that is full of potential tactics, gambits, and sacrifices.\n\t\t\t\t\t*set resolve %+5 \n\t\t\t\t\t*set games +1 \n\t\t\t\t\tGiving the warrior a toothy grin of your own, you quickly seize control of the center with a central pawn. Nodding knowingly, he responds by attacking it with his c pawn, trying to undermine your control. \n\t\t\t\t\t\t\t\n\t\t\t\t\tYou aren't willing to accept the offer since you know he would soon benefit if you captured away from the center. Instead, you push forward, gaining space and putting a cramping effect on his pieces. The rest of the game hurries on in a flurry of sharp tactics and dangerous positions for both of you, making it quite the battle. \n\t\t\t\t\t\t\t\n\t\t\t\t\tAfter a lengthy string of exchanges involving the minor pieces around Vidar's king's fortress of pawns and a timely sacrifice of your rook, you have managed to gain the upper hand by damaging his structure and leaving his king highly exposed. From there, you are able to convert this advantage into a decisive endgame.\n\t\t\t\t\t\t\t\n\t\t\t\t\tWhile your opponent struggles to get his remaining pieces coordinated, you pin one of his weak pawns to his king and then pile your pieces onto that square before finally capturing it, gaining a material advantage and forcing his king into the corner. Seeing that defeat is inevitable, he simply resigns. \n\t\t\t\t\t\t\t\n\t\t\t\t\tHe scratches at his beard and shakes his head, giving a deep chuckle. \"I'm impressed,\" he rumbles. \"I should have known you'd be a tactical player. \n\t\t\t\t\t*if games = 2 \n\t\t\t\t\t\tThat being said, I'm not a glutton for being defeated at my own game.\n\t\t\t\t\t\t*goto done_playing \n\t\t\t\t\tWould you like to have a rematch?\"\n\t\t\t\t\t*goto rematch\n\t\t\t\t\t\t\n\t\t\t\t*selectable_if (cunning > 65) #You recall all of the general principles of the game, making sure to try to play the most accurate and solid moves while avoiding getting into too stormy of waters. \n\t\t\t\t\t*set cunning %+5 \n\t\t\t\t\t*set games +1 \n\t\t\t\t\tYou'll just focus on castling, getting your bishops to long diagonals, and moving your rooks to promising files, you decide. To begin the game, you simply develop your pieces. Giving you a knowing smile, the warrior develops his pieces quickly as well, but aggressively, pinning your knight to your king.\n\t\t\t\t\t\t\t\n\t\t\t\t\tInstead of giving the usual knee-jerk reaction, you just calmly work your way out of the pin, positioning your bishop in between your knight and queen. From there, the game is essentially a tug of war between wills: yours and Vidar's. The warrior tries to provoke you by entering his pieces into your position and threatening sacrifices.\n\t\t\t\t\t\t\t\n\t\t\t\t\tInstead of panicking and getting too trigger-happy with your pawns, though, you simply give his pieces a kick with a timely pawn push, or defend against his threats with developing moves so as not to waste any tempi. Eventually, he seems to grow tired of the lack of action, and goes in for a piece sacrifice around your king.\n\t\t\t\t\t\n\t\t\t\t\t*page_break \n\t\t\t\t\t\t\t\n\t\t\t\t\tHe gives up his bishop for two pawns around your king, which makes it slightly vulnerable and damages your structure. However, with your extra piece you are able to defend, and you were prepared for this, coordinating your pieces well and defending against any checkmate threats. In the end, Vidar isn't able to make anything of his sacrifice. \n\t\t\t\t\t\n\t\t\t\t\tFrom there, you're able to logically exchange pieces, transitioning well into the endgame and finally converting your small material advantage into a win.\n\t\t\t\t\t\t\t\n\t\t\t\t\tYour opponent fights until the end, but you manage to promote a pawn into a queen, quickly delivering checkmate soon afterwards. Sucking the air through his teeth, Vidar scratches his head and says, \"Wow, you really kept your head on after that sacrifice. Good job. \n\t\t\t\t\t*if games = 2 \n\t\t\t\t\t\tStill, I don't think I'd like to take any more punishment from a chess machine.\" He grins and continues, \"\n\t\t\t\t\t\t*goto done_playing \n\t\t\t\t\tWould you be interested in playing again?\" He grins and adds, \"I need to regain my honor.\"\n\t\t\t\t\t*goto rematch \n\t\t\t\t\t\t\n\t\t\t\t*selectable_if (stealth > 65) #You try to keep the position as closed as possible to avoid crazy tactics, and concentrate on the safety of your king above everything else by making prophylactic moves whenever you can.\n\t\t\t\t\t*set stealth %+5 \n\t\t\t\t\t*set games +1 \n\t\t\t\t\tKnowing that this opening almost always leads to closed games if played correctly, you first play d4. Perhaps unsurprisingly, Vidar goes in for an aggressive response, developing a knight instead of putting his own pawns in the center to contest yours. It looks like he'll be focusing on letting you build your center only to take it down later on.\n\t\t\t\t\t\t\t\n\t\t\t\t\tTaking his invitation, you push your other center pawn, building an impressive center and controlling many important squares. The warrior moves his b pawn one square forward, likely to fianchetto his bishop, staying consistent with your earlier prediction.\n\t\t\t\t\t\t\t\n\t\t\t\t\tMeanwhile, you finally get on with development, getting your minor pieces on the king-side out as soon as possible so you can castle and avoid the hassle. The rest of the game continues in largely the same manner. Your opponent tries to create tension in the center and hopes to open up the position, but you work hard to shut it down, fixing your pawns and his together to make them static.\n\t\t\t\t\t\n\t\t\t\t\t*page_break \n\t\t\t\t\t\t\t\n\t\t\t\t\tHe furrows his eyebrows and grunts in frustration, and you just allow yourself a small smile. It's working! After that, Vidar finally manages to sink his knight into a strong post in your position, but by that time you have tucked your king away into a nice pawn fortress and even expended a tempi on your h pawn to give yourself a flight square to avoid back rank checkmates.\n\t\t\t\t\t\t\t\n\t\t\t\t\tAt this point, Vidar is unable to make any progress without sacrificing a piece in some way or other to open up the position and get some activity for his pieces. Because of this, he simply opts for trying to exchange his bad light squared bishop for your good one. \n\t\t\t\t\t\t\t\n\t\t\t\t\tOf course, you're unwilling to make this exchange, so you avoid it by moving your bishop back and forth as he does the same. The warrior is insistent, but afte
