<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Divine Ascension — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "divineascension", "title": "Divine Ascension", "scenes": {"chapter1": "*label game_start\n\n*image creation_myth.jpg\n\nIn the beginning, there was nothing but darkness.\n\n\nAfter millennia of silence in the endless [b]Nether[/b], something spontaneously appeared: the [b]Originator[/b], a mysterious entity with the power of creation.\n\n*page_break\n\nEventually, it created the six [b]Minor Deities[/b]:\n\n\n[b]Fiel[/b], the Patient.\n\n\n[b]Memmon[/b], the Insatiable.\n\n\n[b]Subicim[/b], the Mighty.\n\n\n[b]Davalon[/b], the Cautious.\n\n\n[b]Asiel[/b], the Compassionate.\n\n\n[b]Quanom[/b], the Dominator.\n\n\nAnd the seventh one... was you.\n\n*page_break\n\nAs your existence began, you vaguely understood the events until now.\n\n\nSome of the Originator's memories had been shared with you. There was a purpose that you had been created for: to occupy a part of the new world created by the Originator, and recreating it in your own image.\n\n\n[i]You seem to already understand your purpose. Next, choose your name.[/i]\n\n\nThe Originator's thoughts resonated within you. It was as if you were surrounded by a limitless power that extended all around you, seeing straight through you from every direction.\n\n*page_break\n\nWhat would your chosen name be...?\n\n*input_text name\n\n*page_break\n\n[i]Good. ${name}... you will soon, along with your predecessors, rule over this world in my stead. I will never intervene directly. However, I will always observe you from afar. Do not disappoint me.[/i]\n\n\nA tremendous pressure immediately surrounded you. Was there any force that could even begin to oppose this being? Certainly not you, not now. The divinity that already existed within you was not nearly enough to resist the Originator.\n\n\nThere was likely no choice but to obey now, and yet...\n\n\nDivinity: [b]${divinity}[/b]\n\n*choice\n\t#Gladly accept your task\n\t\t*set attitude \"submissive\"\n\t\t*set quanom +1\n\t\t*set asiel -1\n\t\t[b]Quanom noticed you from afar.[/b]\n\t\t\n\t\t\n\t\t[i]I will be observing your results... with some expectations. Your eagerness pleases me.[/i]\n\t\t\n\t\t\n\t\tThe Originator's incomprehensible power caught you in its grasp without any resistance. Soon after, it threw you away with great force.\n\t\t*goto after_originator_choice\n\t#Stay silent\n\t\t[i]Now go... and fulfill your purpose. I will look forward to your progress.[/i]\n\t\t\n\t\t\n\t\tThe Originator's incomprehensible power caught you in its grasp. Soon after, it threw you away with great force.\n\t\t*goto after_originator_choice\n\t#Push back against the pressure\n\t\t*set attitude \"defiant\"\n\t\t*set asiel +1\n\t\t*set quanom -1\n\t\t*set divinity -5\n\t\t[b]Asiel noticed you from afar.[/b]\n\t\t\n\t\t\n\t\t[b]You lost a small fraction of your divinity.[/b]\n\t\t\n\t\t\n\t\t[i]A new way to amuse me... but it is futile. You can try again once you have matured.[/i]\n\t\t\n\t\t\n\t\tYou attempted to break free, but the Originator's incomprehensible power soon caught you in its grasp. Soon after, it threw you away with great force.\n\t\t*goto after_originator_choice\n\n*label after_originator_choice\n\n*page_break\n\n*image map.jpg\n\nAs the power of the Originator pushed you relentlessly, your astral form crashed through the world barrier, and then immediately into one of the shielded Domains within.\n\n\nA vast wilderness was suddenly visible below you: this Domain appeared to be a land full of forests and rivers. In addition, a small group of sapient beings inhabited the land. They didn't seem to possess any individual power or societal structures to speak of, living mere primitive lives of scarcity.\n\n*page_break\n\nIn order to grow as a deity, you would have to become the object of their faith. By collecting faith, your divinity could grow to limitless new heights. You could instinctively feel the hidden potential that only a sapient being's sincere faith was capable of.\n\n\nHowever, there weren't many among them who displayed the potential to be communicated with. Only one of them seemed capable of enduring contact with you at this point.\n\n\nThe easiest way to convey your will would be through a vague dream or vision. A compromise solution would be to send a message directly to their thoughts. Lastly, it would be possible to temporarily control their body and communicate with these mortal beings directly. Each method had slight advantages and disadvantages.\n\n\nDivinity: [b]${divinity}[/b]\n\n*choice\n\t#Show a vision within a dream\n\t\t*set intimate -5\n\t\t\n\t\tIt would not be difficult to convey some of your intentions by showing a divine vision.\n\t\t\n\t\t\n\t\tThe problem with this approach was simply if they would understand your meaning completely while dreaming. Nevertheless, this would be easy to accomplish without any real burden for either side.\n\t\t\n\t\t\n\t\tWhat message should you focus on for the contents of the vision?\n\t\t\n\t\t*choice\n\t\t\t#Show a bright future after following your will\n\t\t\t\t*set loved +10\n\t\t\t\t*set faith +10\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tFocusing your powers, you transferred a tiny piece of your divinity toward the chosen candidate. It was only a very minor fraction of your existence, yet it should be enough for them to clearly realize that it was not a simple dream.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tIn what felt like only an instant, the candidate had already received your vision. They seemed to be brimming with joy at the thought of seeing such a bright path ahead of them. Not only that, but having the direct support of an all-powerful deity was apparently quite appealing. Accompanying such thoughts, your first follower also gained a slight divine aura that would impress those nearby.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t[b]Your religion has been founded![/b]\n\t\t\t\t\n\t\t\t\t*goto after_first_contact_choice\n\t\t\t#Show a nightmare after opposing your will\n\t\t\t\t*set loved -10\n\t\t\t\t*set faith +10\n\t\t\t\t\n\t\t\t\tFocusing your powers, you transferred a tiny piece of your divinity toward the chosen candidate. It was only a very minor fraction of your existence, yet it should be enough for them to clearly realize that it was not a simple dream.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tIn what felt like only an instant, the candidate had already received your vision. They seemed to be in fear of your existence and the many ways you could punish them if necessary. Despite the feeling of terror, having the direct support of an all-powerful deity was apparently quite appealing. Accompanying such thoughts, your first follower also gained a slight divine aura that would impress those nearby.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t[b]Your religion has been founded![/b]\n\t\t\t\t\n\t\t\t\t*goto after_first_contact_choice\n\t#Send a direct message to the mind\n\t\t*set intimate -2\n\t\t\n\t\tThis was a communication method that didn't burden your own powers, although it placed a rather heavy burden on the candidate's mind.\n\t\t\n\t\t\n\t\tEven so, it was a good way to conserve your own strength while avoiding confusion about the contents of the message. This sapient being should certainly be able to handle this level of stress.\n\t\t\n\t\t\n\t\tWhat sort of message should you send?\n\t\t\n\t\t*choice\n\t\t\t#Promise to guide them to prosperity\n\t\t\t\t*set loved +10\n\t\t\t\t*set faith +11\n\t\t\t\t\n\t\t\t\tYou sent a message full of words about a wonderful future ahead for them if they followed you faithfully. This message was transmitted directly to the candidate's mind without any problems. The slight divine aura that accompanied your message would surely guarantee that it was impactful enough.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tAt first, they seemed confused, but quickly began to appear joyful or even enlightened. You could already feel their faith in you growing, along with the positive effect on your own divine existence.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t[b]Your religion has been founded![/b]\n\t\t\t\t\n\t\t\t\t*goto after_first_contact_choice\n\t\t\t#Promise a hellish fate for ever opposing your will\n\t\t\t\t*set loved -10\n\t\t\t\t*set faith +11\n\t\t\t\t\n\t\t\t\tYou sent a message full of words about a nightmarish future ahead for them if they disobeyed your will. This message was transmitted directly to the candidate's mind without any problems. The slight divine aura that accompanied your message would surely guarantee that it was impactful enough.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tAt first, they seemed confused, but quickly began to appear fearfully obedient. You could already feel their faith in you growing, along with the positive effect on your own divine existence.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t[b]Your religion has been founded![/b]\n\t\t\t\t\n\t\t\t\t*goto after_first_contact_choice\n\t#Temporarily possess the body (-5 Divinity)\n\t\t*set divinity -5\n\t\t*set intimate +5\n\t\t\n\t\tThe most reliable way to establish contact with this species would be to communicate with them directly as a group.\n\t\t\n\t\t\n\t\tThat was only achievable by possessing the body of the individual you had in mind as a candidate. That way, you could use their words to convey your will as accurately as possible.\n\t\t\n\t\t\n\t\tAfter reaching them with your words, what kind of impression should you aim to have?\n\t\t\n\t\t*choice\n\t\t\t#Show them the benefits of having faith in you\n\t\t\t\t*set loved +10\n\t\t\t\t*set faith +12\n\t\t\t\t\n\t\t\t\tYou immediately sent a part of your divinity toward the candidate. It only took a moment for control of their body to be taken over by your will, and a modest divine aura immediately surrounded them.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tThis body was... apparently it had two legs, two hands and a surprisingly high level of intelligence. Had the Originator designed these creatures with intelligence as the primary focus? Nevertheless, they were now a part of your Domain, and thus it was your responsibility to guide them into having the proper faith.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tAs more and more of them gathered around you, you showed off your powers by channeling your divinity through your chosen candidate. Your raw power was easily able to create miracles such as healing severe injuries. At the same time, you made sure to inform them about how frequent prayer would bring them powerful blessings in return, and that their souls would be taken great care of by you for eternity. There was no need to lie, as all of that was indeed true. They certainly wouldn't soon forget your words.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t[b]Your religion has been founded![/b]\n\t\t\t\t\n\t\t\t\t*goto after_first_contact_choice\n\t\t\t#Show them the consequences of your wrath\n\t\t\t\t*set loved -10\n\t\t\t\t*set faith +12\n\t\t\t\t\n\t\t\t\tYou immediately sent a part of your divinity toward the candidate. It only took a moment for control of their body to be taken over by your will, and a modest divine aura immediately surrounded them.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tThis body was... apparently it had two legs, two hands and a surprisingly high level of intelligence. Had the Originator designed these creatures with intelligence as the primary focus? Nevertheless, they were now a part of your Domain, and thus it was your responsibility to guide them into having the proper faith.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tAs more and more of them gathered around you, you showed off your powers by channeling divinity through your chosen candidate. Your raw power was easily able create miracles such as cutting down a nearby forest. At the same time, you made sure to inform them about how neglecting frequent prayer would bring them misfortune in the future, and that their souls would suffer for their lack of faith for eternity. There was no need to lie, as all of that was indeed true. They certainly wouldn't soon forget your words.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t[b]Your religion has been founded![/b]\n\t\t\t\t\n\t\t\t\t*goto after_first_contact_choice\n\t\t\n*label after_first_contact_choice\n\n*page_break\n\nThe urgent mission of contacting the only sapient species within your Domain was now complete. Since their faith in you would directly increase your own divinity, and you could use that divinity to grow their population and prosperity in return, it was certainly a mutually beneficial relationship. There weren't many ways, if any, in which your interests could contradict each other.\n\n\nWhile they were preoccupied after your sudden appearance, you could focus on handling other matters. As an example, their environment could be adjusted to better fit your vision for the future. \n\n\nCurrently this Domain was neither warm nor cold — not ideal for agriculture, but not difficult to survive in either. Warmer weather could aid them in developing agriculture and population growth, leading to more faith and gratitude eventually. Colder weather, on the other hand, could help with their technological breakthroughs and innovations by making it harder to survive without them. Changing their environment should leave them in awe of your might either way.\n\n\nDivinity: [b]${divinity}[/b]\n\n*choice\n\t#Warmer (-5 Divinity)\n\t\t*set climate \"warmer\"\n\t\t*set divinity -5\n\t\t*set faith +8\n\t\t*set loved +5\n\t\t*set observing -5\n\t\t\n\t\tIt was a simple task to change the weather conditions of your Domain. It only required sacrificing a small portion of your divinity, and it would likely be worth it in the end by increasing their feelings of awe and gratitude. In any case, the change would not be too drastic in order not to harshly disrupt the lives of your believers.\n\t\t\n\t\t\n\t\tIt did not demand much divinity, but it would certainly take some time. As you focused your divine powers on the Domain's environment, it slowly began to change. Soon the change accelerated and eventually became impossible to ignore. It had already become an environment where they could grow food with considerably less difficulty.\n\t\t\n\t\t*page_break\n\t\t\n\t\tOnly then did you begin to observe the inhabitants of your Domain more closely again. They were now more numerous, and instead of living in rudimentary huts, they had started creating somewhat more complicated buildings and villages. Perhaps encouraged by the warmer weather, they had also cleared a large amount of new farmland. It was certainly a good sign for the continued increase in people capable of creating more divinity for you.\n\t\t\n\t\t\n\t\tAs you approached the one whom you had contacted before, it was even clearer that many things had changed while you were gone. The former candidate's residence now appeared to be some sort of a temple. Not only that, but that person had become tremendously stronger in their divinity and mental aptitude. It might not be a problem to freely have a direct discussion now... Just as you thought so, your minds were naturally connected to each other.\n\t\t\n\t\t\n\t\t\"I, as Your Oracle, am now finally able to greet You properly. I have nothing but gratitude for Your benevolence in blessing us with great harvests for so many cycles. Allow me to devote my life to serve You!\"\n\t\t\n\t\t*goto after_environment_choice\n\t#Colder (-5 Divinity)\n\t\t*set climate \"colder\"\n\t\t*set divinity -5\n\t\t*set faith +8\n\t\t*set loved -5\n\t\t*set observing -5\n\t\t\n\t\tIt was a simple task to change the weather conditions of your Domain. It only required sacrificing a small portion of your divinity, and it would likely be worth it in the end by increasing their feelings of awe for your power. In any case, the change would not be too drastic in order not to harshly disrupt the lives of your believers... They needed to remain healthy to continue believing in you.\n\t\t\n\t\t\n\t\tIt did not demand much divinity, but it would certainly take some time. As you focused your divine powers on the Domain's environment, it slowly began to change. Soon the change accelerated and eventually became impossible to ignore. It had already become an environment where they required innovative solutions to grow their food and expand.\n\t\t\n\t\t*page_break\n\t\t\n\t\tOnly then did you begin to observe the inhabitants of your Domain more closely again. They were now somewhat more numerous, and perhaps encouraged by the colder weather, they had started creating more complicated buildings and villages. It was certainly a good sign for their continued growth and progress as a species.\n\t\t\n\t\t\n\t\tAs you approached the one whom you had contacted before, it was even clearer that many things had changed while you were gone. The former candidate's residence now appeared to be some sort of a temple. Not only that, but that person had become tremendously stronger in their divinity and mental aptitude. It might not be a problem to freely have a direct discussion now... Just as you thought so, your minds were naturally connected to each other.\n\t\t\n\t\t\n\t\t\"I, as Your Oracle, am now finally able to greet You properly. Allow me to devote my life to serve You!\"\n\t\t\n\t\t*goto after_environment_choice\n\t#No change\n\t\t*set climate \"neutral\"\n\t\t*set observing +5\n\t\t*set faith +5\n\t\t\n\t\tThere was no need for you to spend your divinity on such spectacles. Regardless, they would surely understand the importance of your existence in this Domain. \n\t\t\n\t\t\n\t\tAfter leaving them alone for a while longer, you returned to observe the inhabitants of your Domain more closely again. They were now somewhat more numerous, and instead of living in rudimentary huts, they had started creating more complicated buildings and villages.\n\t\t\n\t\t\n\t\tAs you approached the one whom you had contacted before, it was even clearer that many things had changed while you were gone. The former candidate's residence now appeared to be some sort of a temple. Not only that, but that person had become tremendously stronger in their divinity and mental aptitude. It might not be a problem to freely have a direct discussion now... Just as you thought so, your minds were naturally connected to each other.\n\t\t\n\t\t\n\t\t\"I, as Your Oracle, am now finally able to greet You properly. Allow me to devote my life to serve You!\"\n\t\t\n\t\t*goto after_environment_choice\n\n*label after_environment_choice\n\n*page_break\n\n*set divinity +faith\n\n[b]Faith increased your divinity...[/b]\n\n\nThis Oracle of yours had aged noticeably during your absence. Even so, your religion had been firmly established with a reliable stream of faith now feeding your divinity. There was truthfully nothing to complain about, and this result was even worthy of praise.\n\n*if (loved > 50)\n\t\"When You promised to bless our people, even I could not have predicted so many positive consequences. Through our faith in You, we have been united; our efforts to feed more people have borne fruit; and I have successfully become the divine messenger who leads us to stay true to Your guidance.\"\n\n*if (loved \u003c 50)\n\t\"When You warned our people about the consequences of living sinfully and without faith, I was prepared for us to be punished. But I had misunderstood Your meaning. Through our fear of Your judgment, we have been united; our efforts to increase our levels of faith and purity of soul have borne fruit; and I have successfully become the divine messenger who leads us to stay true to Your guidance.\"\n\n\nIt was surely the case that your divine aura radiating from the Oracle would make it simpler to unite the whole species for a greater purpose: serving your will.\n\n*if (intimate > 50)\n\t\"The only issue that worries me is an ominous vision of the future that I have witnessed several times so far: a future where evil, shadowy creatures invade our realm and desecrate Your holy lands. It may be an unfounded fear, but I still beg of You to bless us with more power to withstand any threats we may face while defending Your territory. It would be even better if You could do so while once again appearing through my body!\"\n\n*if (intimate \u003c 50)\n\t\"The only issue that worries me is an ominous vision of the future that I have witnessed several times so far: a future where evil, shadowy creatures invade our realm and desecrate Your holy lands. It may be an unfounded fear, but I still beg of You to bless us with more power to withstand any threats we may face while defending Your territory.\"\n\n*page_break\n\nAn invasion by shadowy creatures? Could it be...? There were indeed such unholy beings scattered around the Nether, and nowhere was absolutely safe. Eventually they might even find a way to enter your Domain.\n\n\nIn that case, it would perhaps be necessary to grant your followers some power to defend the Domain even without your intervention. A force of capable and loyal fighters, blessed by your divinity, might be able to guarantee the safety of your valuable believers.\n\n\nDivinity: [b]${divinity}[/b]\n\n*choice\n\t#Command your Oracle\n\t\t*set intimate -3\n\t\t\n\t\t[i]There is a solution... If I bless some of your people with divinity, they will become unparallelled warriors capable of vanquishing any evil. Such a force would guarantee your safety in my absence. They require a strong faith, body and mind in order to become qualified.[/i]\n\t\t\n\t\t\n\t\tThe Oracle appeared shocked, yet immensely delighted upon hearing your proposal.\n\t\t\n\t\t\n\t\t\"We will forever be in Your debt! I will immediately summon possible candidates for that role from among our people.\"\n\t\t\n\t\t\n\t\tAt this point, the amount of divinity at your disposal was still rather limited. How much of it should you consume for this effort?\n\t\t\n\t\t\n\t\tDivinity: [b]${divinity}[/b]\n\t\t\n\t\t*choice\n\t\t\t#Minimum amount (-10 Divinity)\n\t\t\t\t*set divinity -10\n\t\t\t\t*set templars +150\n\t\t\t\t*set faith +10\n\t\t\t\t\n\t\t\t\tIt did not take long for hundreds of believers to gather around the Oracle. Some among them would become the foundation of peace for this Domain. However, this was not the time to waste your divinity frivolously, and so it would not be sensible to invest a huge amount of it. It should be enough to grant a modest amount of divinity for their protection.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou could sense that one of them was especially promising, much like when you had felt the desire to contact your Oracle before. This could be the first and best candidate for your bestowal of power. Assuming so, you immediately gifted a large part of your divinity.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tThe candidate to lead your holy warriors began radiating divinity to the extent that only your Oracle could possibly match. Unlike the Oracle, however, this power was specialized for battle. No opponent besides a deity could retain their calm while facing it.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tThe remaining divinity was shared equally with a number of other highly qualified candidates, creating a truly elite fighting force. Some remnants of divinity were also left to fill the air of the Oracle's temple. This way, in the event of similar worthy candidates appearing later on, they could also attain some divinity of their own.\n\t\t\t\t\n\t\t\t\t*goto after_appointment_style_choice_commanded\n\t\t\t#Moderate amount (-25 Divinity)\n\t\t\t\t*set divinity -25\n\t\t\t\t*set templars +300\n\t\t\t\t*set faith +11\n\t\t\t\t\n\t\t\t\tIt did not take long for hundreds of believers to gather around the Oracle. Some among them would become the foundation of peace for this Domain. That being the case, it would be justifiable to invest a decent amount of your divinity for their protection.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou could sense that one of them was especially promising, much like when you had felt the desire to contact your Oracle before. This could be the first and best candidate for your bestowal of power. Assuming so, you immediately gifted a large part of your divinity.\n\t\t\t\t\n\t\t\t\t*page_break ppearing later on, they could also gain some divinity of their own.\n\t\t\t\t\n\t\t\t\t*goto after_appointment_style_choice_commanded\n\t#Possess your Oracle (-5 Divinity)\n\t\t*set divinity -5\n\t\t*set intimate +3\n\t\t*set faith +2\n\t\t\n\t\tYou immediately took control of the Oracle's body. An awe-inspiring divine aura soon started radiating in every direction around you.\n\t\t\n\t\t\n\t\t\"I have appeared before you once more. I command you to gather all the individuals who are strong in faith, body and mind. I will grant some of you unprecedented power, so that you may protect yourself even without my direct intervention.\"\n\t\t\n\t\t\n\t\tA panic quickly surrounded you, with more and more people starting to gather. There were many candidates who were strong in one category, but not the others. However, what you needed was the combination of all three. Fortunately, there were also many among them who matched your requirements.\n\t\t\n\t\t\n\t\tAt this point, the amount of divinity at your disposal was still rather limited. How much of it should you consume for this effort?\n\t\t\n\t\t\n\t\tDivinity: [b]${divinity}[/b]\n\t\t\n\t\t*choice\n\t\t\t#Minimum amount (-10 Divinity)\n\t\t\t\t*set divinity -10\n\t\t\t\t*set templars +150\n\t\t\t\t*set faith +10\n\t\t\t\t\n\t\t\t\tIt did not take long for hundreds of believers to gather around you. Some among them would become the foundation of peace for this Domain. However, this was not the time to waste your divinity frivolously, and so it would not be sensible to invest a huge amount of it. It should be enough to grant a modest amount of divinity for their protection.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou could sense that one of them was especially promising, much like when you had felt the desire to contact your Oracle before. This could be the first and best candidate for your bestowal of power. Assuming so, you immediately gifted a large part of your divinity.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tThe candidate to lead your holy warriors began radiating divinity to the extent that only your Oracle could possibly match. Unlike the Oracle, however, this power was specialized for battle. No opponent besides a deity could retain their calm while facing it.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tThe remaining divinity was shared equally with a number of other highly qualified candidates, creating a truly elite fighting force. Some remnants of divinity were also left to fill the air of the Oracle's temple. This way, in the event of similar worthy candidates appearing later on, they could also attain some divinity of their own.\n\t\t\t\t\n\t\t\t\t*goto after_appointment_style_choice_possessed\n\t\t\t#Moderate amount (-25 Divinity)\n\t\t\t\t*set divinity -25\n\t\t\t\t*set templars +300\n\t\t\t\t*set faith +11\n\t\t\t\t\n\t\t\t\tIt did not take long for hundreds of believers to gather around you. Some among them would become the foundation of peace for this Domain. That being the case, it would be justifiable to invest a decent amount of your divinity for their protection.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou could sense that one of them was especially promising, much like when you had felt the desire to contact your Oracle before. This could be the first and best candidate for your bestowal of power. Assuming so, you immediately gifted a large part of your divinity.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tThe candidate to lead your holy warriors began radiating divinity to the extent that only your Oracle could possibly match. Unlike the Oracle, however, this power was specialized for battle. No opponent besides a deity could retain their calm while facing it.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tThe remaining divinity was shared equally with a number of other highly qualified candidates, creating a truly elite fighting force. Some remnants of divinity were also left to fill the air of the Oracle's temple. This way, in the event of similar worthy candidates appearing later on, they could also attain some divinity of their own.\n\t\t\t\t\n\t\t\t\t*goto after_appointment_style_choice_possessed\n\t\t\t#High amount (-50 Divinity)\n\t\t\t\t*set divinity -50\n\t\t\t\t*set templars +500\n\t\t\t\t*set faith +12\n\t\t\t\t\n\t\t\t\tIt did not take long for hundreds of believers to gather around you. Some among them would become the foundation of peace for this Domain. That being the case, it would be justifiable to invest a large part of your divinity for their protection.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYou could sense that one of them was especially promising, much like when you had felt the desire to contact your Oracle before. This could be the first and best candidate for your bestowal of power. Assuming so, you immediately gifted a large part of your divinity.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tThe candidate to lead your holy warriors began radiating divinity to the extent that only your Oracle could possibly match. Unlike the Oracle, however, this power was specialized for battle. No opponent besides a deity could retain their calm while facing it.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tThe remaining divinity was shared equally with a number of other highly qualified candidates, creating a truly elite fighting force. Some remnants of divinity were also left to fill the air of the Oracle's temple. This way, in the event of similar worthy candidates appearing later on, they could also attain some divinity of their own.\n\t\t\t\t\n\t\t\t\t*goto after_appointment_style_choice_possessed\n\n*label after_appointment_style_choice_commanded\n\n*page_break\n\nWhile hundreds of people were still occupying the temple, the Oracle spoke to you in a loud yet reverent tone of voice.\n\n\n\"I must ask for Your guidance on a topic of heavy debate among us. Two opposing factions have slowly emerged from within our religious community, each with their own ideals: one in favor of an order led strictly by our priests and Your will, and another in favor of separating our religion from government. It is a question of how much control over our society do You wish to have. Surely Your judgment would finally resolve this conflict!\"\n\n\nA conflict of beliefs... of ideologies. There was no way to tell for certain which decision would lead to better results. Your Oracle's trusted priests should be most loyal to you, but could they adapt flexibly to new circumstances? On the other hand, could those with less faith reliably maintain their true purpose of creating divinity for you?\n\n*choice\n\t#Side with the priest faction\n\t\t*set government_type \"theocracy\"\n\t\t*set observing -10\n\t\t*set faith +5\n\t\t\n\t\tIt would clearly not be in your interest to undermine those who were most committed to spreading your faith. As such, you should naturally side with the priests.\n\t\t\n\t\t\n\t\t[i]I command you to grant the priests a special authority to fully decide on all religious matters, and to have veto power over all other decisions as well. The hierarchy must be with you at the top, followed by the priests, and everyone else below them. These newly created fighting forces will enforce that system in addition to defeating external threats.[/i]\n\t\t\n\t\t\n\t\t\"I have heard Your will, and it shall be done. From now on, nobody will challenge the ultimate authority of Your priests!\"\n\t\t\n\t\t\n\t\tThe people around your Oracle began cheering upon hearing your decision. It was only natural, as most of them were your priests or holy warriors. Now their roles as the executive rulers of the whole Domain were guaranteed.\n\t\t\n\t\t*goto after_conflict_decision_choice\n\t#Side with the anti-priest faction\n\t\t*set government_type \"secular\"\n\t\t*set observing +10\n\t\t\n\t\tIt was a shame, but it could be counterproductive to focus full power into the hands of your most faithful followers. They should have enough influence either way, thanks to your overwhelming might, but if they ever made bad decisions, it could prove useful to have another group capable of challenging their ideas.\n\t\t\n\t\t\n\t\t[i]I command you to give ultimate authority to the state. All priests must maintain their freedom to spread faith in me, but their role will not extend to rule over any non-religious issues. These newly created fighting forces will enforce that system in addition to defeating external threats.[/i]\n\t\t\n\t\t\n\t\t\"I have heard Your will, and it shall be done. From now on, our religion will work to support our society, and never to rule over it!\"\n\t\t\n\t\t\n\t\tThe people around your Oracle were confused for a moment, but then started cheering for your decision regardless. The priests might have been conflicted about losing some of their authority, but naturally they would not challenge your will, from which they gained all of their purpose and status.\n\t\t\n\t\t*goto after_conflict_decision_choice\n\n*label after_appointment_style_choice_possessed\n\n*page_break\n\nWhile hundreds of people were still occupying the temple, one of the priests next to you spoke to your mortal avatar hesitantly.\n\n\n\"I must ask for Your guidance on an issue of great concern lately. Some of our people have began challenging the authority of Your priests to make decisions for us. Could You clearly condemn this kind of disrespectful behavior, or is it Your will for our faith in You to lose its primary influence over our people?\"\n\n\nA conflict of beliefs... of ideologies. There was no way to tell for certain which decision would lead to better results. Your Oracle's trusted priests should be most loyal to you, but could they adapt flexibly to new circumstances? On the other hand, could those with less faith reliably maintain their true purpose of creating divinity for you?\n\n*choice\n\t#Side with the priest faction\n\t\t*set government_type \"theocracy\"\n\t\t*set observing -10\n\t\t*set faith +5\n\t\t\n\t\tIt would not be in your interest to undermine those who were most committed to spreading your faith. As such, you should naturally side with the priests.\n\t\t\n\t\t\n\t\t\"I command you to grant the priests a special authority to fully decide on all religious matters, and to have veto power over all other decisions as well. The hierarchy must be with my Oracle at the top, followed by the priests, and everyone else below them. These newly created fighting forces will enforce that system in addition to defeating external threats.\"\n\t\t\n\t\t\n\t\tThe people around you began cheering upon hearing your decision. It was only natural, as most of them were your priests or holy warriors. Now their roles as the executive rulers of the whole Domain were guaranteed.\n\t\t\n\t\t*goto after_conflict_decision_choice\n\t#Side with the anti-priest faction\n\t\t*set government_type \"secular\"\n\t\t*set observing +10\n\t\t\n\t\tIt was a shame, but it could be counterproductive to focus full power into the hands of your most faithful followers. They should have enough influence either way, thanks to your overwhelming might, but if they ever made bad decisions, it could prove useful to have another group capable of challenging their ideas.\n\t\t\n\t\t\n\t\t\"I command you to give ultimate authority to the state. All priests must maintain their freedom to spread faith in me, but their role will not extend to rule over any non-religious issues. These newly created fighting forces will enforce that system in addition to defeating external threats.\"\n\t\t\n\t\t\n\t\tThe people around you were confused for a moment, but then started cheering for your decision regardless. The priests might have been conflicted about losing some of their authority, but naturally they would not challenge your will, from which they gained all of their purpose and status.\n\t\t\n\t\t*goto after_conflict_decision_choice\n\n*label after_conflict_decision_choice\n\n*page_break\n\nAfter dealing with the urgent issues of your believers, you finally left the mortal plane, and instead began examining the barrier surrounding your Domain. \n\n\nIt took a long time, but eventually you were able to break through the barrier in order to explore the world around you.\n\n*label observation_phase_start\n\n*page_break\n\n*image map.jpg\n\n\nThis world consisted of a single large continent. In the middle of it was a vast mountaineous area surrounded by seven Domains, including yours.\n\n\nEach Domain presumably belonged to one of the Minor Deities, although it was impossible to observe them directly. However, it should be possible to spy on them with some effort.\n\n\nThe Divine Mountains were an even more secretive place. This area did not belong to any of the Minor Deities, so what was its purpose?\n\n\nThe Nether was a mysterious area around your world, and even the Originator did not seem to have a lot of information about it. The only certainty about it was the existence of hostile entities that loathed the divinity radiating from your world.\n\n\nNow that you had finally been able to leave your Domain, should you observe the other areas of the world even more closely?\n\n\n[b]These divinity costs will never be repeated after being consumed for the first time.[/b]\n\n\nDivinity: [b]${divinity}[/b]\n\n*choice\n\t#Fiel's Domain (-1 Divinity)\n\t\t*if (fiel_observed = false)\n\t\t\t*set fiel_observed true\n\t\t\t*set divinity -1\n\t\t\n\t\tFiel's Domain was immediately next to you, so it was of especially great interest. There was great potential for either positive or negative events to occur for your Domain depending on Fiel's future actions.\n\t\t\n\t\t\n\t\tAfter a few attempts, you were able to take a look inside the barrier.\n\t\t\n\t\t\n\t\tThe Domain appeared to be in a state of great agricultural development. Many of the forests were already cleared for farmland and the population was booming, with many new towns and villages being built. There were also several great temples around the Domain. The level of technology or military didn't seem too advanced.\n\t\t\n\t\t\n\t\tAll in all, Fiel seemed to be focused on increasing food production, population size and religious activity.\n\t\t\n\t\t*goto observation_phase_start\n\t#Subicim's Domain (-1 Divinity)\n\t\t*if (subicim_observed = false)\n\t\t\t*set subicim_observed true\n\t\t\t*set divinity -1\n\t\t\t\n\t\tSubicim's Domain was immediately next to you, so it was of especially great interest. There was great potential for either positive or negative events to occur for your Domain depending on Subicim's future actions.\n\t\t\n\t\t\n\t\tAfter a few attempts, you were able to take a look inside the barrier.\n\t\t\n\t\t\n\t\tThe Domain appeared to be in a state of great technological development. Many of the forests were already cleared and the population was growing, with many new towns and villages being built. There was an especially high amount of warriors in the population. The level of agriculture or religious activity didn't seem too advanced.\n\t\t\n\t\t\n\t\tAll in all, Subicim seemed to be focused on increasing the levels of technology and military power.\n\t\t\n\t\t*goto observation_phase_start\n\t#Memmon's Domain (-1 Divinity)\n\t\t*if (memmon_observed = false)\n\t\t\t*set memmon_observed true\n\t\t\t*set divinity -1\n\t\t\t\n\t\tMemmon's Domain was not close to yours, but it was still most likely important for your Domain's future.\n\t\t\n\t\t\n\t\tAfter a few attempts, you were able to take a look inside the barrier.\n\t\t\n\t\t\n\t\tThe Domain appeared to be in an odd state: there weren't many temples or villages to be seen, and instead a large variety of mines and majestic monuments had been built around its territory. Memmon's followers seemed to be living in a surprising amount of poverty and malnutrition.\n\t\t\n\t\t\n\t\tIt was difficult to judge what exactly Memmon was planning to accomplish. With low levels of population growth and religious activity, Memmon's divinity would increase very slowly.\n\t\t\n\t\t*goto observation_phase_start\n\t#Davalon's Domain (-1 Divinity)\n\t\t*if (davalon_observed = false)\n\t\t\t*set davalon_observed true\n\t\t\t*set divinity -1\n\t\t\t\n\t\tDavalon's Domain was not close to yours, but it was still most likely important for your Domain's future.\n\t\t\n\t\t\n\t\tAfter a few attempts, you were able to take a look inside the barrier.\n\t\t\n\t\t\n\t\tThis Domain didn't seem to have anything special about it. It was as if Davalon had intentionally created a very mediocre, or even weak, religion. Especially the warriors defending the Domain were clearly very weak and few in number.\n\t\t\n\t\t\n\t\tIt was difficult to judge what exactly Davalon was planning to accomplish. Could it be as simple as to avoid using any divinity?\n\t\t\n\t\t*goto observation_phase_start\n\t#Quanom's Domain (-1 Divinity)\n\t\t*if (quanom_observed = false)\n\t\t\t*set quanom_observed true\n\t\t\t*set divinity -1\n\t\t\t\n\t\tQuanom's Domain was far away, but it was still likely important for your Domain's future.\n\t\t\n\t\t\n\t\tAfter a few attempts, you were able to take a look inside the barrier.\n\t\t\n\t\t\n\t\tQuanom seemed to be heavily focused on increasing religious activity. The Domain was full of great temples and religious events, while all other types of progress were delayed.\n\t\t\n\t\t\n\t\tThe amount of divinity harvested from this Domain was sure to be formidable.\n\t\t\n\t\t*goto observation_phase_start\n\t#Asiel's Domain (-1 Divinity)\n\t\t*if (asiel_observed = false)\n\t\t\t*set asiel_observed true\n\t\t\t*set divinity -1\n\t\t\t\n\t\tAsiel's Domain was far away, but it was still likely important for your Domain's future.\n\t\t\n\t\t\n\t\tAfter a few attempts, you were able to take a look inside the barrier.\n\t\t\n\t\t\n\t\tAsiel seemed to be focused on increasing the welfare of their believers. Rather than increasing the amount of population or religiosity, the focus appeared to be on having a smaller amount of more developed and well-fed villages. At the same time, there were also a decent amount of temples and religious activities.\n\t\t\n\t\t\n\t\tAsiel's goals were unclear. Was it merely compassion or generosity, or was there something else behind it?\n\t\t\n\t\t*goto observation_phase_start\n\t#Divine Mountains (-5 Divinity)\n\t\t*if (divine_mountains_observed = false)\n\t\t\t*set divine_mountains_observed true\n\t\t\t*set divinity -5\n\t\t\t\n\t\tIn the middle of the continent were the Divine Mountains: a large territory full of massive mountains. It was practically an impassable area for mortals, not only physically, but also due to a special barrier surrounding it.\n\t\t\n\t\t\n\t\tIt took a long time to peek inside, but eventually you succeeded.\n\t\t\n\t\t\n\t\tIt was apparently mostly filled with simple mountains. In the heart of the mountains was an elevated platform; almost like an artificial field high in the sky. It was surrounded by seven small barriers for some unknown purpose.\n\t\t\n\t\t\n\t\tAbove it was a weird structure that radiated divinity and floated freely in the air. It didn't appear to be in active use, although it still almost felt like you were being observed by it as well.\n\t\t\n\t\t\n\t\tLooking inside the barrier had, truthfully, created more new questions than it had given answers.\n\t\t\n\t\t*goto observation_phase_start\n\t*selectable_if (divinity >= 100) #Nether (-100 Divinity)\n\t\t*if (nether_observed = false)\n\t\t\t*set nether_observed true\n\t\t\t*set divinity -100\n\t\t\n\t\t*check_achievements\n\t\t*if not(choice_achieved_omniscient)\n\t\t\t*achieve omniscient\n\t\t\t\n\t\tIt was enormously exhausting to see outside the massive barrier surrounding this world, but after a very long time, you were able to pierce through it.\n\t\t\n\t\t\n\t\tOnce your vision reached the Nether that was all around your world, your first impression was... darkness. Eternal, endless emptiness. There was practically nothing to be seen around you.\n\t\t\n\t\t\n\t\tEventually you were able to detect something quickly approaching you. It was something massive from deep within the endless Nether. It was not comparable to the Originator, but you could feel that it was obviously stronger than your current form.\n\t\t\n\t\t\n\t\t[i]Join Us... If you feel frustrated by your current limitations... Then We can offer you far more power...[/i]\n\t\t\n\t\t\n\t\tThe unknown voice was somehow disturbing, but it didn't feel overly hostile. Even so, there was ultimately no choice but to flee. Or was there a possibility to gain something by making contact with it? Regardless, you could surely not defeat it in your current state, so it would be wiser to depart quickly to protect your existence.\n\t\t\n\t\t*choice\n\t\t\t#Leave\n\t\t\t\t\n\t\t\t\tIt was unnecessary to challenge such a mighty opponent while possessing so little divinity, even though in the future it could well be possible to face this unknown entity.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tWith your decision made, you immediately closed the breach in the world barrier and left the Nether completely.\n\t\t\t\t\n\t\t\t\t*goto observation_phase_start\n\t\t\t#Stay (warning: this is your last chance to escape the Nether!)\n\t\t\t\t\n\t\t\t\t*set corrupted \"yes\"\n\t\t\t\t\n\t\t\t\tThe mysterious being soon reached the world barrier.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tIt was a massive entity with countless dark tendrils around it. Something of this scale was clearly not an easy opponent for you even without being exhausted, let alone right now. Had it truly been the right choice to stay here?\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tBefore you could hesitate any further, the dark creature swiftly moved to block your escape. It was already too late! The way back to your world had been completely shrouded in darkness.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t[i]It would be simple to eat you now... But We will not do so... Instead... You will guide Us... As Our second hidden supporter against the Great One...[/i]\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tAs the bottomless darkness surrounded you, you could feel several other similar [i]things[/i] approaching you from the Nether. It was as if you had entered another dimension with no similarities to your existence until now.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tTheir tendrils soon caught you and inserted something small, but unmistakably powerful. It was quickly hidden deep inside you.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tThen, as suddenly as it had all started, you were pushed back inside the world barrier. [i]They[/i] had thrown you away just like the Originator had first sent you there. Was it supposed to look like you had barely escaped them after a fight?\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tNevertheless, you had certainly not escaped their reach. Even now, something dark was attached to the core of your existence. It would likely be impossible to remove it without erasing yourself completely. For now, it might be better not to think about it too much, since it was still mostly contained by your divinity.\n\t\t\t\t\n\t\t\t\t*goto observation_phase_start\n\t#Return to your Domain \n\t\t*goto after_observation_phase\n\n*label after_observation_phase\n\n*if (templars = 150)\n\t*set templars -20\n\n*if (templars = 300)\n\t*set templars -10\n\n*if (templars = 500)\n\t*set templars -5\n\n*page_break\n\nAfter being absent from your Domain for a long time, you eventually began making your way back.\n\n\nOn the way there, you noticed something peculiar. A tiny soul of someone familiar to you was floating next to the barrier. In fact, there were thousands of similar souls gathering from within your Domain. They were all your dead believers, wandering in the afterlife.\n\n*page_break\n\nYour Oracle was the soul that you noticed first, since it was considerably more divine than any of the others. It was like a shining beacon among the mass of souls.\n\n\n[i]My Lord... I am honored to witness Your true form. At the moment of my death, I was very saddened that I could no longer serve You. Now I have finally seen You after my death, so I have no regrets. Yet, is it possible that I could continue serving You in some capacity?[/i]\n\n*page_break\n\nThis request was something that required further consideration. After all, your choice regarding their fate after death could impact a vast amount of souls loyal to you.\n\n\nEven though these tiny souls were born naturally due to the divinity radiating from the Divine Mountains, what happened after their physical body had died was not so obvious. Without faith, they would simply disappear into the Nether eventually. On the other hand, those with strong faith could find their way to you for a final judgment. And now it was time to deliver that judgment, although the fact that they had reached you already made it clear that they were worthy of being saved.\n\n\nAs a general rule, a positive fate for them could be only one of three options: they could be reincarnated without their original memories, accompany you as a divine host of souls reinforcing your divinity, or protect the Domain as guardian spirits. None of the options was obviously better than the others, and it was unfortunately impossible to make the decision on a case-by-case basis. In order not to waste your divinity, it was necessary to choose one of the three options as a general rule.\n\n\nWhich fate would you prefer to implement for your believers?\n\n*choice\n\t#Reincarnation (+Faith)\n\t\t*set after_death_system \"reincarnation\"\n\t\t*set faith +5\n\t\t\n\t\t[i]You shall be reborn without your memories, in an eternal cycle to follow my will. Those who believe in me shall never fall to the darkness of the Nether.[/i]\n\t\t\n\t\t\n\t\t*if (corrupted = \"yes\")\n\t\t\tYou had perhaps lied to your Oracle for the first time. Unfortunately, you could no longer make that promise with complete confidence.\n\t\t\n\t\t\n\t\t[i]Understood. My Lord, we will return to life and serve You once again through our faith... forever![/i]\n\t\t\n\t\t\n\t\tThe souls before you consumed some of their divinity in order to be reborn in their new bodies. From now on, they would naturally react that way to approaching your presence. With each cycle, their faith and aptitude for divinity could only grow further.\n\t\t\n\t\t\n\t\tTheir eternal cycle of reincarnation had only just began.\n\t\t\n\t\t*goto after_death_choice\n\t#Divine Host (+Divinity)\n\t\t*set after_death_system \"divine host\"\n\t\t*set faith +1\n\t\t*set divinity +50\n\t\t\n\t\t[i]You shall join me in the divine realm, serving by my side eternally. Those who believe in me shall never fall to the darkness of the Nether.[/i]\n\t\t\n\t\t\n\t\t*if (corrupted = \"yes\")\n\t\t\tYou had perhaps lied to your Oracle for the first time. Unfortunately, you could no longer make that promise with complete confidence.\n\t\t\n\t\t\n\t\t[i]Understood. My Lord, we will follow You faithfully... forever![/i]\n\t\t\n\t\t\n\t\tThe souls before you started sending some of their divinity toward you. From now on, they would naturally react that way to approaching your presence. As they followed you to the divine realm for the millennia to come, their presence would boost your divinity more and more.\n\t\t\n\t\t\n\t\tTheir path of divinity had only just began.\n\t\t\n\t\t*goto after_death_choice\n\t#Guardian Spirits (+Templars)\n\t\t*set after_death_system \"guardian spirits\"\n\t\t*set faith +1\n\t\t*set templars +100\n\t\t\n\t\t[i]You shall return to your Domain, defending it from any external threats as spiritual beings. Those who believe in me shall never fall to the darkness of the Nether.[/i]\n\t\t\n\t\t\n\t\t*if (corrupted = \"yes\")\n\t\t\tYou had perhaps lied to your Oracle for the first time. Unfortunately, you could no longer make that promise with complete confidence.\n\t\t\n\t\t\n\t\t[i]Understood. My Lord, we will return to our lands and protect them in Your place... forever![/i]\n\t\t\n\t\t\n\t\tThe souls before you consumed some of their divinity so that they could return. From now on, they would naturally react that way to approaching your presence. They would immediately head back and focus on protecting your religion from anyone who tried to harm it.\n\t\t\n\t\t\n\t\tThey had a difficult responsibility ahead of them, but it would be one with great meaning.\n\t\t\n\t\t*goto after_death_choice\n\n*label after_death_choice\n\n*page_break\n\n*set divinity +(faith*2)\n\n[b]Faith increased your divinity...[/b]\n\n\nYour Domain inside the barrier was still mostly the same as when you had left, but there had been some changes as well.\n\n\n*if (climate = \"warmer\")\n\tMore of the Domain's forests had been cleared to claim a large area of farmland. There were now many more villages, temples and even larger towns all around the Domain. Even though there was still plenty of land left to claim, it looked like the Domain was slowly being filled by your believers. It was a certainty that your divinity would grow ever more powerful at this rate.\n\n*if (climate = \"colder\")\n\tThere were now more temples and even large towns towns around the Domain. Even though there was still plenty of room left to grow, it looked like the lands belonging to you were slowly being filled by your believers. It was a certainty that your divinity would grow ever more powerful at this rate.\n\n*if (climate = \"neutral\")\n\tThere were now more villages and even larger towns around the Domain. Even though there was still plenty of room left to grow, it looked like the lands belonging to you were very slowly being filled by your believers. It was a certainty that your divinity would grow ever more powerful at this rate.\n\n\nEven so, your Oracle had died while you were gone. It was crucial to find a new candidate sooner rather than later, or the collective faith in you might begin to waver. But it was not extremely urgent by any means — clearly your divinity was still constantly growing. It might be best to observe the state of your Domain first.\n\n*page_break\n\nThere didn't seem to be any major problems on the surface. Regardless, there could be many potential issues that were difficult to notice by only listening to an Oracle or priests loyal to you.\n\n\nThe simple method to judge the state of your Domain would be to observe it from the sky. Even without consuming any divinity, it would be possible to detect anything clearly out of place. However, you would be limited to searching for any obviously visible or large-scale anomalies with this method.\n\n\nThe more exhausting method would be to possess a regular person within your Domain. They required a minimum level of faith or aptitude for it to succeed, not to mention the divinity consumption, but it could potentially be the most useful method to figure out the details about your Domain's affairs. It should ultimately be close to the experiences of the vast majority of your believers rather than only the top elites.\n\n\nYou should be able to detect major issues by using either method of surprise investigation, at the very least...\n\n\nDivinity: [b]${divinity}[/b]\n\n*temp shadow_info_found \"no\"\n*temp investigation_choice\n\n*choice\n\t#Search your Domain from the sky for anomalies\n\t\t*set investigation_choice \"sky\"\n\t\t*set templars +50\n\t\t*set intimate -6\n\t\t*set observing +3\n\t\t*set loved -1\n\t\t*goto sky_view\n\t#Possess one of your regular believers (-10 Divinity)\n\t\t*set investigation_choice \"regular\"\n\t\t*set intimate +6\n\t\t*set observing -1\n\t\t*set divinity -10\n\t\t*goto commoner_view\n\t\n*label sky_view\n\nThere was no need to exhaust your divinity for this task. It should be enough to simply look for anything unexpected, specifically anything visible from the sky.\n\n\nThe whole Domain was already visible to you, so now it was only a matter of focusing on a special area of interest. There were several good locations to check out, especially the area close to your Domain's barrier that radiated both divinity and darkness.\n\n*label sky_investigation_choice\n\n*page_break\n\nWhere should you focus now?\n\n*choice\n\t#The largest temple in the Domain\n\t\t\n\t\tAn exceptionally large temple had been built where you contacted your first Oracle. It was roughly at the center of your Domain, overlooking it as the tallest building of all.\n\t\t\n\t\t*if (intimate >= 50)\n\t\t\tNext to it was a similarly huge statue made in your honor. As your true form was something that mortals couldn't easily comprehend, it looked much like the first Oracle in a ceremonial robe, surrounded by a radiating divine aura that undoubtedly indicated your presence.\n\t\t\n\t\t*if (intimate \u003c 50)\n\t\t\tNext to it was a similarly huge statue made in your honor. As your true form was something that mortals couldn't easily comprehend, it looked much like an extremely abstract structure floating in the sky. It was likely based on the vague impression that the first Oracle had received of your presence.\n\t\t\n\t\tHowever, nothing seemed especially out of place. This location was most likely well guarded at all times.\n\t\t\n\t\t*goto sky_investigation_choice\n\t#Mix of divinity and darkness near the barrier (!)\n\t\t*set shadow_info_found \"yes\"\n\t\t\n\t\tNext to the barrier surrounding your Domain were signs of a harsh battle. Even the surrounding trees had been smashed to pieces. It couldn't have been all that long ago, looking at the damage remaining in the environment.\n\t\t\n\t\t\n\t\tThe most curious part about the aura radiating from the scene was that it contained both divinity and darkness. It must have been a fight between your holy warriors and a creature from the Nether. In fact, a corpse that looked like a twisted, incomprehensible monster was still left there.\n\t\t\n\t\t\n\t\tQuite a distance away from this scene of carnage were three dark creatures similar to the one that was already destroyed. They were hiding near the Domain's border, guarding what appeared to be a tiny crack in the barrier.\n\t\t\n\t\t\n\t\tThis was something that clearly needed to be dealt with. However, it would be too exhausting to destroy them directly with your powers, since they now existed fully in the mortal realm. It should be possible to utilize the group of warriors you had already blessed before.\n\t\t\n\t\t*goto sky_investigation_choice\n\t#The administrative center of the Domain\n\t\t\n\t\tLocated close to the largest temple of your religion was an area filled with countless tall buildings. This was obviously the richest and most developed area within your Domain.\n\t\t\n\t\t\n\t\t*if (government_type = \"theocracy\")\n\t\t\tIt seemed to be mainly occupied by your priests and holy warriors. Apparently the elites of your Domain consisted almost exclusively of people related to religious matters.\n\t\t\n\t\t*if (government_type = \"secular\")\n\t\t\tIt seemed to be mainly occupied by bureaucrats and merchants. There were also some of your priests and holy warriors in the area, but their role in the elite circles of your Domain appeared to be quite limited.\n\t\t\n\t\t*if (loved >= 50)\n\t\t\tThe perimeter was lightly guarded, with even regular believers of yours visiting freely. The atmosphere was rather open and welcoming.\n\t\t\n\t\t*if (loved \u003c 50)\n\t\t\tThe perimeter was tightly guarded, with nobody but the most elite members of society allowed in. The atmosphere was rather imposing and even secretive.\n\t\t\n\t\t\n\t\tThere wasn't much that you needed to achieve at this location, for the time being, yet it was useful to witness the circumstances of your most elite followers.\n\t\t\n\t\t*goto sky_investigation_choice\n\t*selectable_if (shadow_info_found = \"yes\") #Continue\n\t\t\n\t\tThere didn't seem to be anything crucial left to observe.\n\t\t\n\t\t\n\t\tConcluding so, you swiftly moved to search for a new Oracle candidate.\n\t\t\n\t\t*goto investigation_end\n\n*label commoner_view\n\nIt was somewhat exhausting to possess someone who had no strong aptitude or faith, but even so, the cost was not too severe for you. After making the decision to possess one of your regular believers, you released a fraction of your divinity without a specific target.\n\n\nThe target to be possessed would be decided by luck. However, since the vast majority of your believers were simple villagers and farmers, your target should be one as well. You had even increased the odds of this result by aiming away from the largest population centers.\n\n\nIt only took a moment for your divinity to find its host.\n\n*page_break\n\nThe body you found yourself in was... weak. It seemed to belong to a particularly young and small representative of their species: a slightly malnourished body of someone living in relatively poor conditions.\n\n\nThat didn't matter, though. Your goal was to possess a powerless body in the first place. It was enough that there was at least some aptitude for receiving your divinity.\n\n\nEven though it was hosting your powerful divinity, others couldn't sense any of it radiating from you. Your divine aura was carefully concealed on purpose. After making sure of this, you were finally able to look around you.\n\n*page_break\n\n\"What are you spacing out for, boy? Our Lord has blessed us with especially good weather today, but we should hurry back to the village before it gets any darker. There have been rumors about strange monsters lurking in the darkness again recently.\"\n\n\nFortunately, the one who appeared to be your guardian by your side didn't seem particularly suspicious of you. You were even able to understand their speech perfectly. Still... monsters?\n\n*page_break\n\nThere were many questions that you wanted to ask, and this felt like a good opportunity to ask them. You were alone with someone much older and more knowledgeable than yourself, supposedly, so it would not be odd to ask about topics that someone older should already know about.\n\n*label villager_investigation_focus\n\n*page_break\n\nYou were especially curious about...\n\n*choice\n\t#the previously mentioned village\n\t\t\n\t\t*if (climate = \"warmer\")\n\t\t\t\"Living out here is great. We've never really had to go hungry or cold. It's not as comfortable as living in the big towns, that's for sure, but I wouldn't give up this freedom for anything else.\"\n\t\t\n\t\t*if (climate = \"colder\")\n\t\t\t\"There have been hardships, but we've managed to overcome all of them together. Lately there haven't even been any major shortages of food in our village. I'd say we're surviving quite well.\"\n\t\t\n\t\t*if (climate = \"neutral\")\n\t\t\t\"Living out here isn't too bad. At least we've never really had to starve. It's not as comfortable as living in the big towns, that's for sure, but I wouldn't give up this freedom for anything else.\"\n\t\t\n\t\t\n\t\tIt didn't look like the situation here was that bad, all in all.\n\t\t\n\t\t*goto villager_investigation_focus\n\t#the strange monsters (!)\n\t\t*set shadow_info_found \"yes\"\n\t\t\n\t\t\"Those rumors? Apparently there was an invasion by some evil monsters earlier in the cycle. I heard the Templar Order took casualties, but so did the monsters. It has been peaceful for a while now, though, but you never know what the future brings.\"\n\t\t\n\t\t\n\t\tThat was certainly concerning news... It was almost certain now that creatures from the Nether had started getting through the world barrier.\n\t\t\n\t\t\n\t\t\"Well, you shouldn't worry too much about it. Those Templars can probably handle it. Even if they behave arrogantly, they can at least fight well.\"\n\t\t\n\t\t*goto villager_investigation_focus\n\t#the state of faith and religion in the area\n\t\t\n\t\tYour companion seemed surprised by your question. However, it didn't appear to require much thinking to answer.\n\t\t\n\t\t*if (loved >= 50)\n\t\t\t\"${name} is to thank for everything we have now. Even my parents were still living much more brutal and unforgiving lives, until our Lord appeared and blessed us in so many ways. After that, our lives have been improving every cycle. Not to mention the feeling of safety in knowing we'll be cared for even after death! I really can't thank Them enough.\"\n\t\t\n\t\t*if (loved \u003c 50)\n\t\t\t\"${name} has guided us well. Even my parents were still living much more brutal and unforgiving lives, until our Lord appeared and showed us the correct path. And thanks to that, our lives have been improving every cycle. Not to mention the feeling of relief in knowing we won't have to suffer after death! I can only pray for Them to continue blessing us.\"\n\t\t\n\t\t\n\t\tIt was good to see that even in a remote area like this, there was plenty of faith in you.\n\t\t\n\t\t\n\t\t\"Of course, our religious leaders still have their issues. Even right now... our village is in a crisis thanks to them. But I know that as long as we have our faith, we will be fine in the end. That has always been the case so far, no matter the circumstances.\"\n\t\t\n\t\t\n\t\tThis crisis mentioned just now might require further investigation.\n\t\t\n\t\t*goto villager_investigation_focus\n\t*selectable_if (shadow_info_found = \"yes\") #Continue\n\t\t\n\t\tYour journey away from the village was approaching its end. After talking for a while, you could already see it in front of you.\n\t\t\n\t\t*goto after_villager_questions\n\n*label after_villager_questions\n\n*page_break\n\nThis village was by no means large or developed. In fact, it was more like a collection of small farms and houses rather than a proper village.\n\n\nYour older companion had been carrying a dead animal of some kind. Seeing that, some of the others seemed quite delighted. Fresh food was unlikely to be received poorly in such an environment.\n\n\nTaking a closer look at these sapient creatures, who had generously gathered a large amount of divinity for you so far, they were rather fascinating. Not only did they have high intelligence, but they were also adept at using all sorts of tools. It was probably thanks to their body structure, which consisted of two legs and two hands with dexterous fingers. They were also tall, and combined with their two eyes, they could quickly gather information about their surroundings. Even without your intervention, they might have eventually organized and developed a society like this on their own. \n\n\nHowever, the Originator had likely created them, along with this world, for the purpose of serving the Minor Deities. If so, they might not have been ultimately capable of developing like this without religious authority.\n\n*page_break\n\nNow that you were back at the village, it meant returning to a normal routine.\n\n\nYou spent some time getting used to that simple life. It was interesting to experience such mundane tasks as carrying water and plowing fields. It was not something that you would ever do in the divine realm. It was rather tough on your temporary body, but that was easier to endure knowing this lifestyle would only be necessary for a short period of time.\n\n\nThe main reason you were here was not to experience mortal life, though. It was instead to search for anything abnormal about your Domain that could not be easily detected in your regular form. There were already some results, and likely more would be possible to figure out if you simply lived as one of your believers for a while.\n\n\nFortunately, there was no need to wait long for something to happen.\n\n*page_break\n\nSome days later they arrived to your village: the Templars. They were exactly the group of holy warriors that you had created many cycles ago. They had apparently continued to expand, and now they even had the resources to send many of their members to a remote area like this.\n\n\nThey had traveled on foot, but despite the heavy armor, they didn't seem particularly tired. It was all thanks to your divinity that they could walk long distances swiftly and without getting exhausted. Nobody within this Domain could challenge them in either speed or power.\n\n\nObserving the
