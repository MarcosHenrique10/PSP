emplars +300\n\t\t\t\t\tSubicim became a Lesser Deity to support your Templars.\n\t\t\t\t\t*page_break\n\t\t\t\t\tDavalon had used a mysterious divine power to prevent any outsiders from approaching their Domain.\n\t\t\t\t\t*goto resolve_events_after_player_cycle\n\t\t\t\t#Erase\n\t\t\t\t\t*check_achievements\n\t\t\t\t\t*if not(choice_achieved_erase)\n\t\t\t\t\t\t*achieve erase\n\t\t\t\t\t*set subicim_fate \"Erased\"\n\t\t\t\t\t*set subicim_defeater \"you\"\n\t\t\t\t\t*set divinity +200\n\t\t\t\t\t*set faith +10\n\t\t\t\t\t*set templars +200\n\t\t\t\t\tSubicim ceased to exist after being hit by your divinity once more.\n\t\t\t\t\t*page_break\n\t\t\t\t\tDavalon had used a mysterious divine power to prevent any outsiders from approaching their Domain.\n\t\t\t\t\t*goto resolve_events_after_player_cycle\n\n\n*if (selected_target = \"fiel\")\n\t[b]Proselytizing[/b] causes your religion to secretly spread in the target Domain (results depend on faith). [b]Invasion[/b] orders your Templars to attack the target Domain (results depend on Templar strength). [b]Divine Attack[/b] launches a fatal attack against the target Minor Deity using your divinity (requires low Morale). Morale is affected by suffering such crippling losses that total exhaustion is near (from Proselytizing or Invasion).\n\t\n\t\n\tYour current target is [b]Fiel's Domain[/b].\n\t\n\t\n\tMorale: [b]${fiel_morale_text}[/b] - Faith: [b]${fiel_faith}[/b] - Templars: [b]${fiel_templars}[/b]\n\t\n\t\n\tSpecialty: gathering faith\n\t\n\t*temp expected_conversion \"Some conversion\"\n\t*temp expected_invasion \"Unfavorable battle\"\n\t*temp expected_divine_attack \"No effect\"\n\t\n\t*temp divine_attack_divinity 500\n\t\n\t*if (fiel_morale = 0)\n\t\t*set expected_divine_attack \"${divine_attack_divinity} divinity required for a decisive attack...!\"\n\t\n\t*if ((fiel_faith - faith) >= 0)\n\t\t*set expected_conversion \"Weak conversion\"\n\t\n\t*if ((faith - fiel_faith) > fiel_faith)\n\t\t*set expected_conversion \"High conversion\"\n\t\n\t*if (fiel_templars \u003c templars)\n\t\t*set expected_invasion \"Favorable battle\"\n\t\n\t*choice\n\t\t#Return\n\t\t\t*goto free_actions\n\t\t*if (fiel_morale > 0) #Proselytizing (likely outcome: ${expected_conversion})\n\t\t\t*set fiel -10\n\t\t\tYou sent believers to spread your faith...\n\t\t\t*temp faith_loss (faith - fiel_faith)\n\t\t\t\n\t\t\t*set faith_loss round(faith_loss / 10)\n\t\t\t\n\t\t\t*if (faith_loss \u003c= 0)\n\t\t\t\t*set faith_loss 1\n\t\t\t\n\t\t\t[b]You converted ${faith_loss} faith from Fiel.[/b]\n\t\t\t*set faith +faith_loss\n\t\t\t*set fiel_faith -faith_loss\n\t\t\t\n\t\t\t*if ((faith_loss * 3) >= fiel_faith)\n\t\t\t\t*set fiel_morale -1\n\t\t\t\t[b]The morale of Fiel's Domain has fallen...![/b]\n\t\t\t\n\t\t\t*goto resolve_events_after_player_cycle\n\t\t*if (fiel_morale > 0) #Invasion (likely outcome: ${expected_invasion})\n\t\t\t*set fiel -30\n\t\t\tYou sent a force of Templars to attack...\n\t\t\t*temp templars_loss round(fiel_templars / 20)\n\t\t\t*temp target_templars_loss round(templars / 20)\n\t\t\t*set templars -templars_loss\n\t\t\t*set fiel_templars -target_templars_loss\n\t\t\t\n\t\t\t*if (divine_artifact = \"spear\")\n\t\t\t\t[b]The divine spear's power greatly increased enemy casualties.[/b]\n\t\t\t\t*set target_templars_loss round(2 * target_templars_loss)\n\t\t\t\n\t\t\t*if (divine_artifact = \"sword\")\n\t\t\t\t[b]The divine sword's power increased enemy casualties.[/b]\n\t\t\t\t*set target_templars_loss round(1.5 * target_templars_loss)\n\t\t\t\n\t\t\t[b]Fiel lost ${target_templars_loss} Templars while you lost ${templars_loss} Templars.[/b]\n\t\t\t\n\t\t\t*if ((target_templars_loss * 3) >= fiel_templars)\n\t\t\t\t*set fiel_morale -1\n\t\t\t\t[b]The morale of Fiel's Domain has fallen...![/b]\n\t\t\t\n\t\t\t*goto resolve_events_after_player_cycle\n\t\t*selectable_if ((fiel_morale = 0) and (divinity >= divine_attack_divinity)) #Divine Attack (likely outcome: ${expected_divine_attack})\n\t\t\t*set di faith) >= 0)\n\t\t*set expected_conversion \"Weak conversion\"\n\t\n\t*if ((faith - quanom_faith) > quanom_faith)\n\t\t*set expected_conversion \"High conversion\"\n\t\n\t*if (quanom_templars \u003c templars)\n\t\t*set expected_invasion \"Favorable battle\"\n\t\n\t*choice\n\t\t#Return\n\t\t\t*goto free_actions\n\t\t*if (quanom_morale > 0) #Proselytizing (likely outcome: ${expected_conversion})\n\t\t\t*set quanom -10\n\t\t\tYou sent believers to spread your faith...\n\t\t\t*temp faith_loss (faith - quanom_faith)\n\t\t\t\n\t\t\t*set faith_loss round(faith_loss / 15)\n\t\t\t\n\t\t\t*if (faith_loss \u003c= 0)\n\t\t\t\t*set faith_loss 1\n\t\t\t\t\n\t\t\t[b]You converted ${faith_loss} faith from Quanom.[/b]\n\t\t\t*set faith +faith_loss\n\t\t\t*set quanom_faith -faith_loss\n\t\t\t\n\t\t\t*if ((faith_loss * 3) >= quanom_faith)\n\t\t\t\t*set quanom_morale -1\n\t\t\t\t[b]The morale of Quanom's Domain has fallen...![/b]\n\t\t\t\n\t\t\t*goto resolve_events_after_player_cycle\n\t\t*if (quanom_morale > 0) #Invasion (likely outcome: ${expected_invasion})\n\t\t\t*set quanom -30\n\t\t\tYou sent a force of Templars to attack...\n\t\t\t*temp templars_loss round(quanom_templars / 20)\n\t\t\t*temp target_templars_loss round(templars / 20)\n\t\t\t*set templars -templars_loss\n\t\t\t*set quanom_templars -target_templars_loss\n\t\t\t\n\t\t\t*if (divine_artifact = \"spear\")\n\t\t\t\t[b]The divine spear's power greatly increased enemy casualties.[/b]\n\t\t\t\t*set target_templars_loss round(2 * target_templars_loss)\n\t\t\t\n\t\t\t*if (divine_artifact = \"sword\")\n\t\t\t\t[b]The divine sword's power increased enemy casualties.[/b]\n\t\t\t\t*set target_templars_loss round(1.5 * target_templars_loss)\n\t\t\t\n\t\t\t[b]Quanom lost ${target_templars_loss} Templars while you lost ${templars_loss} Templars.[/b]\n\t\t\t\n\t\t\t*if ((target_templars_loss * 3) >= quanom_templars)\n\t\t\t\t*set quanom_morale -1\n\t\t\t\t[b]The morale of Quanom's Domain has fallen...![/b]\n\t\t\t\t\n\t\t\t*if ((templars_loss * 3) >= templars)\n\t\t\t\t*set morale -1\n\t\t\t\t[b]The morale of your Domain has fallen...![/b]\n\t\t\t\n\t\t\t*goto resolve_events_after_player_cycle\n\t\t*selectable_if ((quanom_morale = 0) and (divinity >= divine_attack_divinity)) #Divine Attack (likely outcome: ${expected_divine_attack})\n\t\t\t*set divinity -divine_attack_divinity\n\t\t\t*set morale 3\n\t\t\t\n\t\t\tThe barrier around Quanom's Domain collapsed, and Quanom was struck directly by your divinity. You had won the divine battle.\n\t\t\t\n\t\t\t\n\t\t\t[i]I admit my defeat. Even if you did not follow the path shown to us by our creator properly, the truth remains that your divinity was stronger than mine. Your vision was stronger, and my role here is finished.[/i]\n\t\t\t\n\t\t\t\n\t\t\tWithout even offering to serve you, Quanom swiftly self-destructed by launching several futile divine attacks that only consumed all remaining fragments of divinity. It was a fitting end for that zealous and stubborn deity.\n\t\t\t\n\t\t\t*set quanom_fate \"Erased\"\n\t\t\t*set quanom_defeater \"you\"\n\t\t\t*check_achievements\n\t\t\t*if not(choice_achieved_erase)\n\t\t\t\t*achieve erase\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tUnlike Quanom, Davalon had no interest in ceasing to exist.\n\t\t\t\n\t\t\t\n\t\t\t[i]I apologize for attacking you in the earlier battle, but I only used a small part of my Templars against you. It could have been much more difficult for you if I had fought seriously. Now I hope I can serve you as a Lesser Deity instead. I never had any motivation to act against you, and Quanom simply seemed the most likely candidate to win. If I had known this would be the result, I would have been on your side from the beginning.[/i]\n\t\t\t\n\t\t\t\n\t\t\tIt would no longer matter much either way... As the strongest remaining Minor Deity, you could decide Davalon's fate as you wished.\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#Subjugate Davalon\n\t\t\t\t\t*check_achievements\n\t\t\t\t\t*if not(choice_achieved_subjugate)\n\t\t\t\t\t\t*achieve subjugate\n\t\t\t\t\t*set davalon_fate \"Subjugated\"\n\t\t\t\t\t*set davalon_defeater \"you\"\n\t\t\t\t\tDavalon became a Lesser Deity dedicated to supporting your future activities from the shadows.\n\t\t\t\t\t*goto after_davalon_choice\n\t\t\t\t#Erase Davalon\n\t\t\t\t\t*check_achievements\n\t\t\t\t\t*if not(choice_achieved_erase)\n\t\t\t\t\t\t*achieve erase\n\t\t\t\t\t*set davalon_fate \"Erased\"\n\t\t\t\t\t*set davalon_defeater \"you\"\n\t\t\t\t\tDavalon ceased to exist after being hit by a series of your divine attacks.\n\t\t\t\t\t*goto after_davalon_choice\n\t\t\t\n\t\t\t*label after_davalon_choice\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tWith Quanom and Davalon dealt with, you were the only Minor Deity left.\n\t\t\t\n\t\t\t\n\t\t\tAs if reacting to your thoughts, the Originator immediately appeared in front of you. This presence of power... it was still something impossible to understand.\n\t\t\t\n\t\t\t\n\t\t\t[i]I had estimated that Quanom would win this round, or even that Memmon could destroy the whole competition. Your victory is a... pleasant surprise, perhaps. Regardless, this world has now served its purpose. It is time for you to ascend and become a Creator Deity capable of creating the next world. For that to happen, this world must be erased and its divinity harvested to feed your growth. Your opportunity to fulfill the destiny that I created you for has arrived.[/i]\n\t\t\t\n\t\t\t\n\t\t\tWas there even any option to fight in this situation where it seemed absolutely hopeless...?\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#Follow the Originator's plan\n\t\t\t\t\t*goto creator\n\t\t\t\t#Fight (warning: impossible to win this fight!)\n\t\t\t\t\t*goto originator_battle\n\n*label resolve_events_after_player_cycle\n*set cycle +1\n*goto cycle_start\n\n*label nether_invasion_begins\n\n*page_break\n\n*set nether_invasion_activated \"yes\"\n*set memmon_morale 3\n*set memmon_templars 1000\n\nAs you had suspected earlier, something very sinister was happening around Memmon's Domain. This feeling was suddenly becoming stronger than ever within you.\n\n*page_break\n\nObserving the situation more closely, a massive army of Shadows had been released from Memmon's Domain. It was clear now... Memmon was a traitor serving the Nether Lords.\n\n*if (cultists_found = \"no\")\n\t*page_break\n\t*set templars -100\n\t*set faith -10\n\tA wave of terror and destruction suddenly hit your Domain as hidden agents of the Nether assaulted your people. The Templars were soon able to eliminate them, yet much of the damage was already done.\n\n*if (fiel_fate != \"?\")\n\t*page_break\n\t*set templars -200\n\tThe rampaging Shadow horde unleashed by Memmon killed many of your Templars who were defending Fiel's Domain. Fortunately, the Domain itself remained safe from harm.\n\n*page_break\n\n*if (fiel_fate = \"?\")\n\t*set fiel_fate \"Erased\"\n\t*set fiel_defeater \"Memmon\"\n\t\n\tThe initial wave of rampaging Shadows released by Memmon immediately assaulted Fiel's Domain, annihilating its population. Even Fiel was swiftly erased.\n\t\n\t*page_break\n\n*if (asiel_fate = \"?\")\n\t*set asiel_fate \"Erased\"\n\t*set asiel_defeater \"Memmon\"\n\t\n\tThe initial wave of rampaging Shadows released by Memmon immediately assaulted Asiel's Domain, annihilating its population. Even Asiel was soon erased.\n\t\n\t*page_break\n\n*if (subicim_fate = \"?\")\n\t*set subicim_fate \"Erased\"\n\t*set subicim_defeater \"Quanom\"\n\t\n\tQuanom and Davalon launched a massive surprise attack against Subicim while Asiel was blocking the Nether invasion. Subicim was immediately erased by Quanom after suffering catastrophic losses of Templars and faith.\n\t\n\t*page_break\n\t\n\tDavalon had used a mysterious divine power to prevent any outsiders from approaching their Domain.\n\t\n*page_break\n\nDavalon's Oracle quickly delivered a secret message.\n\n\n[i]Memmon's betrayal threatens all of us: you, me and Quanom. My suggestion would be to work together in harmony until we have survived the current crisis. If we all fight Memmon together, we can push back the Shadows, and even gain the chance to strike Memmon directly with our divine attacks. Otherwise, I will be forced to retreat with Quanom to shield ourselves from this onslaught and gather our strength for later, leaving you to distract the Shadows. However, our best odds to win should be right now by attacking together, all three of us. Even though I specialize in defensive blessings, Memmon will only grow stronger and stronger if left alone.[/i]\n\n*choice\n\t#Accept the coalition against Memmon\n\t\t*set quanom +10\n\t\t*set davalon +30\n\t\tYou joined forces with Davalon and Quanom, promising to use all of your Templars and divinity to annihilate the traitor together.\n\t\t*goto resolve_events_after_player_cycle\n\t#Refuse (warning: this will make upcoming battles very difficult for you!)\n\t\t*set memmon_templars +1000\n\t\tDisappointed, Davalon retreated together with Quanom's forces and created a powerful defensive barrier between them and the Shadows. You had no choice but to face Memmon's full army of Shadows on your own.\n\t\t*goto resolve_events_after_player_cycle\n\n*label after_nether_defeated\n\n*page_break\n\nThe battle had been fierce, and much of your divinity and Templars had been consumed. Since you were victorious, the sacrifices were ultimately worth it.\n\n\nAs you observed the state of Memmon's utterly ruined Domain, you received a new message from Davalon.\n\n\n[i]You have clearly shown your worth by contributing greatly to Memmon's defeat. However, Quanom is still a far more powerful deity than you. In addition, Quanom is the closest of us to the Originator, and needless to say, none of us could oppose that kind of power. I'll reveal to you that I have promised to follow Quanom's will, and my purpose now is to convince you to do the same. If you do so, all three of us can survive this era of violence and create a new world together, sacrificing this world to create a new one that is even more divine and perfect, as the Originator intended. If you refuse, Quanom will move personally to erase you immediately. I will also have to attack you, considering my allegiance to Quanom, but I will focus most of my divinity to prevent attacks against me. I will then follow the victorious side for eternity.[/i]\n\n\nIt wouldn't be easy to defeat Quanom, yet surrendering to Quanom would mean sacrificing everything you had built so far. Quanom only saw this world as a tool to harvest divinity, which would be used to build new worlds — not as the home of your countless faithful believers and quickly advancing civilizations.\n\n*choice\n\t#Refuse (warning: Quanom is the most powerful Minor Deity!)\n\t\t*set davalon -300\n\t\t*set quanom -300\n\t\t\n\t\tAfter sending your negative response, Davalon replied almost immediately.\n\t\t\n\t\t\n\t\t[i]So be it then. I will fight on Quanom's side, but not with all of my might.[/i]\n\t\t\n\t\t*goto resolve_events_after_player_cycle\n\t#Accept (warning: your fate will be sealed permanently if you accept, and all of your believers will be annihilated!)\n\t\t*set davalon +300\n\t\t*set quanom +300\n\t\t\n\t\tAfter sending your positive response, Davalon replied quickly.\n\t\t\n\t\t\n\t\t[i]Great! I will immediately inform Quanom about your decision.[/i]\n\t\t\n\t\t*goto servant\n\n*label originator_battle\n\n*page_break\n\n*if (asiel_fate = \"?\")\n\n\t*set quanom_fate \"Erased\"\n\t*set quanom_defeater \"Asiel\"\n\t*set davalon_fate \"Subjugated\"\n\t*set davalon_defeater \"Asiel\"\n\t*set subicim_fate \"Subjugated\"\n\t*set subicim_defeater \"Asiel\"\n\t\n\tAlthough Asiel was not quite as powerful as Quanom, the situation became starkly different after you had formed an alliance with Asiel. Quanom was unable to withstand your combined might for long, and was quickly erased by Asiel. Even Davalon, specialized in defensive abilities, soon surrendered after facing overwhelming attacks from two directions. Subicim was easily dealt with by your combined proselytizing efforts.\n\t\n\t\n\tIf that had been your final task, it would have been almost disappointingly easy, but the actual challenge only began from that point.\n\t\n\t*page_break\n\t\n\tNot long after you had defeated both Davalon and Quanom, the Originator appeared before you and Asiel. Asiel immediately displayed clear hostility, whereas the Originator appeared completely indifferent to Asiel.\n\t\n\t\n\t[i]${name}, I will give you a chance to ascend. You can become a Creator Deity and acquire power unimaginable to your current self by harvesting the divinity of this world. The only requirement is that you must destroy my failed creation next to you. There is no need to worry about ever being defeated, as I can support you as much as you need. If you also choose to completely reject my vision, which is the only way to truly deal with the Nether, I will simply erase you along with Asiel and this world.[/i]\n\t\n\t\n\tYou could sense Asiel briefly observing your reaction. It was not an easy decision to make. You and Asiel had already prepared a strategy that might work against the Originator, yet it was far from being a guaranteed success. Accepting the Originator's offer, on the other hand, would guarantee ascending to a much higher level of divinity, although it would require your world as a sacrifice.\n\t\n\t*choice\n\t\t#Oppose the Originator\n\t\t\t\n\t\t\tYou had come this far together with Asiel. Even if you switched sides now, there was no guarantee that the Originator would even actually forgive you. Then wasn't it better to bet everything on Asiel?\n\t\t\t\n\t\t\t\n\t\t\tBefore the Originator could attack you two directly, you signaled to Asiel that it was time to begin the operation. Even though it was certainly a distasteful method, it was the only way you two could possibly repel the Originator.\n\t\t\t\n\t\t\t\n\t\t\tSoon after you and Asiel had made your decision, the world barrier shattered. Hundreds of powerful Nether Lords appeared and rushed toward the Originator from the Nether.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tThe reason why this happened was not because you had become allies with the Nether Lords. The explanation was actually far more simple. After Memmon's Domain had fallen, Asiel had detected a hidden tool for communication with the Nether from within. It was not capable of sending complicated messages, but it was enough to send different types of signals for various situations. One of those was \"an opportunity to defeat the Great One\" which referred to the Originator being in a vulnerable state. That signal would cause an all-out attack by all of the Nether Lords close to this world.\n\t\t\t\n\t\t\t\n\t\t\tObviously, the Originator was not currently in a particularly vulnerable state. No fighting against Asiel had yet even taken place, and even such a battle would not have likely particularly weakened the Originator. However, the purpose of this plan was never to destroy the Originator. Even if that was possible, which was quite uncertain, the result would have only been to be defeated by the remaining Nether Lords. Instead, your aim was to use your enemies against each other: the Nether Lords threatening this world would be wiped out, and the Originator would consume a great amount of strength to deal with all of them simultaneously.\n\t\t\t\n\t\t\t\n\t\t\tAlmost no matter how the battle turned out, you and Asiel would only benefit.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tThe small concern that the Nether Lords might end up victorious was completely unnecessary. Without any need to intervene in the battle, they were all wiped out in a flashy show of force. The Originator didn't even seem to have received any damage during the brutal scene of carnage. Even so, it had not been a meaningless strategy.\n\t\t\t\n\t\t\t\n\t\t\t[i]Now I understand why you were so confident in front of me. You have certainly exhausted me greatly. Still, I am grateful for this opportunity to purge so many of these impure creatures. It has been a very long time since they began immediately retreating after sensing my approach, but now I was able to destroy hundreds of them with none of them trying to escape. It was very... refreshing. In addition, they will likely avoid this world for a long time after suffering this amount of damage here. If your goal was to protect this world from the Nether, then it was certainly a great plan.[/i]\n\t\t\t\n\t\t\t\n\t\t\tThe Originator observed you closely and suddenly seemed to have reached a major decision.\n\t\t\t\n\t\t\t*goto savior\n\t\t#Betray Asiel\n\t\t\tThere was no need to risk everything for the sake of this world. It was enough to guarantee your own existence after foolishly opposing the Originator once.\n\t\t\t\n\t\t\t\n\t\t\tBefore Asiel could prepare for battle, you had already attacked with all of your divinity. A direct battle against Asiel would have been very difficult before, but now you were constantly receiving more and more power from the Originator. Feeling invincible, you unleashed an endless chain of divine attacks to crush Asiel. Soon nothing was left of Asiel's previously powerful existence.\n\t\t\t\n\t\t\t\n\t\t\tEven if it wasn't truly your own power that defeated Asiel, it still felt refreshing to achieve such a feat. Now only you remained of the originally seven Minor Deities.\n\t\t\t\n\t\t\t*goto creator\n\n*if (asiel_fate != \"?\")\n\t\n\t[i]Disappointing... your lack of vision is truly disappointing. You could have joined the ranks of Creator Deities and gained unimaginable power to create new worlds by sacrificing your tiny, meaningless world. Instead of becoming my valuable ally, you will be destroyed here in vain along with this world, without changing the result at all. You will only delay my eternal mission of conquering the Nether for a short moment of time.[/i]\n\t\n\t\n\tThe Originator's power hit you from every direction simultaneously. You never even stood a chance. As soon as the battle had begun, you were already powerless to fight and unable to even escape.\n\t\n\t*goto erased\n\n*label asiel_route_begins\n\n*page_break\n\n*set asiel +70\n\nWhat happened to Memmon? The situation was clearly abnormal. It wouldn't be odd if nobody ever believed what you had witnessed.\n\n\nJust as you thought so, you could sense a strong aura of divinity approaching you. It was Asiel's divine form, projected toward you as a sort of remote communication method.\n\n*page_break\n\nWhile not as overwhelming as the Originator, and also slightly weaker than Quanom, Asiel was still on a different level of divinity. You were able to clearly sense it even from afar.\n\n\n[i]You have done a great deed. Even though I doubted Memmon's actions, I never thought that the truth would be this horrifying. We had such a dangerous traitor among us all along. Since I witnessed your heroic feat, I'll also ask you to join forces with me to ensure the complete safety of our world. Only I have the unwavering will to save this world, while Quanom and the Originator would prefer to simply harvest it for greater power. I hope you at least want to fight for the sake of your own Domain, if nothing else.[/i]\n\n\nSupporting either Asiel or Quanom would obviously be easier than going against both of them on your own. The safest option would be to side with Quanom. On the other hand, doing that would greatly limit your choices.\n\n*choice\n\t#Support Asiel\n\t\t*goto originator_battle\n\t#Support Quanom\n\t\t\n\t\t*set subicim_fate \"Erased\"\n\t\t*set subicim_defeater \"Quanom\"\n\t\t*set asiel_fate \"Exiled\"\n\t\t*set asiel_defeater \"Quanom\"\n\t\t\n\t\tYou made the safe decision of supporting Quanom, the strongest Minor Deity.\n\t\t\n\t\t\n\t\tRealizing your choice, Asiel seemed to immediately give up on this world and escaped outside with some souls of its inhabitants. Subicim was also erased by Quanom during the chaos. Quanom had achieved victory without even having to fight against you or Asiel.\n\t\t\n\t\t\n\t\tThe only thing left to do was offering your support to Quanom's faction.\n\t\t\n\t\t*goto servant\n\t#Support neither\n\t\t*set davalon -300\n\t\t*set quanom -300\n\t\t\n\t\t*set subicim_fate \"Erased\"\n\t\t*set subicim_defeater \"Quanom\"\n\t\t*set asiel_fate \"Exiled\"\n\t\t*set asiel_defeater \"Quanom\"\n\t\t\n\t\tYou made the bold decision of going against Quanom and Asiel, the strongest Minor Deities.\n\t\t\n\t\t\n\t\tRealizing your choice, Asiel seemed to immediately give up on this world and escaped outside with some souls of its inhabitants. Only you and Quanom's faction, including Davalon, were left.\n\t\t\n\t\t\n\t\tThe only thing left to do was defeating them both directly.\n\t\t\n\t\t*page_break\n\t\t\n\t\tSubicim was also erased by Quanom during the earlier chaos. Davalon, on the other hand, had used a mysterious divine power to prevent any outsiders from approaching their Domain.\n\t\t\n\t\t*goto resolve_events_after_player_cycle\n\n*label erased\n\n*page_break\n\nWhile your remaining divinity was vanishing, you could only helplessly submit to your fate. You no longer had any strength to fight back.\n\n\nAfter some time had passed, your existence itself started to fade away. It felt... empty. The path ahead of you was pure nothingness.\n\n\nFinally, it was over. Your existence had disappeared for eternity.\n\n*check_achievements\n*if not(choice_achieved_chapter3)\n\t*achieve chapter3\n\n*ending\n\n*label servant\n\n*page_break\n\nIt didn't take long until you had arrived before Quanom. Davalon was also observing the situation from a distance, being slightly wary, but nothing compared to the enormous pressure you felt from Quanom.\n\n*page_break\n\n[i]I... will serve you. As long as my existence is guaranteed, it does not matter if our world is discarded.[/i]\n\n\nQuanom's pressure against you weakened immediately. Davalon also began radiating a calmer presence.\n\n\n[i]You made a wise choice. Had you fought me, you would have been wastefully erased, yet now you can witness the birth of a new world. An even greater world can be born from the ashes of ours. A world that will produce more valuable divinity to purify and dominate the vast Nether.[/i]\n\n\nWith this, the conflict was already over. There was nobody left to oppose Quanom's plan of total annihilation.\n\n*page_break\n\n*image creation_myth.jpg\n\nQuanom didn't waste any time. The current world was annihilated, along with all the souls within it. They were absorbed as fuel for another cycle of creation.\n\n\nEven though Davalon guided most of the process directly, you could also make slight adjustments of your own. The Originator had already left your side, so it was only you and Davalon accompanying Quanom and aiding in the creation.\n\n\nIn the end, Quanom's vision was accomplished. A new world was born, one even more radiant than its predecessor... pushing the Nether further away into the darkness, and leaving you to observe its development together with Quanom and Davalon.\n\n*check_achievements\n*if not(choice_achieved_survivor)\n\t*achieve survivor\n\n*check_achievements\n*if not(choice_achieved_servant)\n\t*achieve servant\n\n*check_achievements\n*if not(choice_achieved_chapter3)\n\t*achieve chapter3\n\n*goto ending_guide\n\n*label creator\n\n*page_break\n\n[i]I will follow your plan. I will sacrifice this world, as you always intended.[/i]\n\n\n[i]I am pleased that you agree. It would have been... disappointing, otherwise. Do you wish to ask any questions before we begin the process?[/i]\n\n\nThere was one major concern left. Would the souls of your own believers be sacrificed along with the world?\n\n*page_break\n\n[i]I see what is holding you back. It is possible to preserve the souls of those who have faith in you, yet it is not without cost. If you bring them with you, your new form will have considerably less divinity than it should have. That will create the risk of you being defeated by the Nether Lords, and the loss of countless potential future worlds as well. Do you still wish to pay that price?[/i]\n\n\nYour faithful followers... Oracles, priests, Templars, commoners... All of them had sacrificed so much for your sake. Should they be annihilated for the sake of your future?\n\n*choice\n\t#Destroy the world completely\n\t\t\n\t\tIt was a shame, but much more was at stake here than their souls. Your new mission as a Creator Deity, to create new worlds capable of resisting and pushing back the Nether, had far higher priority than any mortal souls... no matter how devoted they were to your cause.\n\t\t\n\t\t\n\t\tHaving made your decision, the world began to crumble. All souls within were immediately annihilated as the continent itself vanished from existence. With no deities left to guide its divinity, the world collapsed on its own.\n\t\t\n\t\t*goto after_believers_choice\n\t#Save the souls of your own believers\n\t\t\n\t\tIn the end, you could not abandon them. Your new mission as a Creator Deity, to create new worlds capable of resisting and pushing back the Nether, should have higher priority than any mortal souls... yet if you sacrificed your faithful supporters, who would you even be fighting for?\n\t\t\n\t\t\n\t\tHaving made your decision, the world began to crumble. Some of the souls followed you to the divine realm as the continent itself vanished from existence. With no deities left to guide its divinity, the world collapsed on its own.\n\t\t\n\t\t*goto after_believers_choice\n\n*label after_believers_choice\n\n*page_break\n\n*image creation_myth.jpg\n\nOnly empty space remained where that world had recently existed. Even so, the Nether was pushed further back by the divinity that had been created from the destruction. An even more divine world would surely be born in its place.\n\n\nAs you began the process of creation, a new story was about to begin.\n\n*check_achievements\n*if not(choice_achieved_survivor)\n\t*achieve survivor\n\n*check_achievements\n*if not(choice_achieved_creator)\n\t*achieve creator\n\n*check_achievements\n*if not(choice_achieved_chapter3)\n\t*achieve chapter3\n\n*goto ending_guide\n\n*label traitor\n\n*page_break\n\n[i]It was not a complete success... But We have removed most of the obstacles... It is only a matter of time until the last of them falls... And We have welcomed a new member to Our ranks...[/i]\n\n\nSomewhere far beyond the world you had previously called home. The Nether Lords spoke to you, as if they were a chorus of many different entities with one voice. What's more, it felt like you had a stronger and stronger feeling of belonging with them.\n\n\n[i]Do not resist the urge... Yes, become one of Us... Just like We all did before you... From minions of the Great One to Our glorious new forms... From many different eras and worlds of the past...[/i]\n\n*page_break\n\nEven if you had wanted to resist it, it was practically impossible now. And there was no meaning to do so any longer.\n\n\nFollowing your instincts, you let go of your last remaining fragments of divinity and fully embraced the Nether.\n\n\n[i]Finally We have left Our incomplete form behind...[/i]\n\n\nOnce you did, you truly became a Nether Lord.\n\n*check_achievements\n*if not(choice_achieved_survivor)\n\t*achieve survivor\n\n*check_achievements\n*if not(choice_achieved_traitor)\n\t*achieve traitor\n\n*check_achievements\n*if not(choice_achieved_chapter3)\n\t*achieve chapter3\n\n*goto ending_guide\n\n*label savior\n\n*page_break\n\n[i]I can see that you are both committed to this path. While it is foolish, I will allow it. Defend this world for as long as you can... and attract the Nether's attention while doing so. I will leave to create new worlds far away from here. I doubt we will meet ever again.[/i]\n\n\nWith those words, the Originator's presence vanished completely. Even more so than ever before, it felt like you were truly on your own.\n\n\nYet Asiel had never seemed as elated until now.\n\n\n[i]It is our victory. At long last, our world has been freed from its fate of inevitable destruction. The souls of our believers, along with their civilizations, are finally safe from the Originator's plan. Even the Nether's forces have been dealt a very heavy blow.[/i]\n\n*page_break\n\nFor a moment, Asiel was silent.\n\n\n[i]I do not know why you chose this difficult path with me, but for me, it was all because of my gratitude. As soon as I was created, many cycles before you, I openly challenged the Originator. In fact, my surprise attack caused a little damage, but of course I lost the fight. As my punishment, I lost almost all of my divinity before being thrown into my Domain. I could not offer much at all in return for having faith in me, in the early days, yet the people of my Domain never wavered in their faith. Gradually I recovered and gained great power, all thanks to them. I could have never abandoned them. Thanks to you, I was able to save them, and I will never forget that. Now our task is to guard our world, forever, from the Nether's invasion.[/i]\n\n\nEven though the path ahead was difficult, as well, Asiel didn't appear to have any doubts. This must be what true belief in one's own mission looked like.\n\n*page_break\n\n\nYour world had been saved from the threats of corruption and destruction. Now all that remained was defending it from the Nether, and allowing its inhabitants to live peaceful lives full of faith and free of unnecessary suffering. Even those with little faith were saved by Asiel and you, their souls reincarnated with vague memories of their time in the divine realm, so that they could save themselves in their next attempt.\n\n\nAn era of true peace had arrived, for as long as you and Asiel were there to protect it.\n\n*check_achievements\n*if not(choice_achieved_survivor)\n\t*achieve survivor\n\n*check_achievements\n*if not(choice_achieved_savior)\n\t*achieve savior\n\n*check_achievements\n*if not(choice_achieved_chapter3)\n\t*achieve chapter3\n\n*goto ending_guide\n\n*label update_deity_relations\n\n*if (fiel >= 570)\n\t*set fiel_text \"Friendly\"\n\t*goto after_fiel_conversions\n*elseif (fiel >= 530)\n\t*set fiel_text \"Neutral\"\n\t*goto after_fiel_conversions\n*else\n\t*set fiel_text \"Hostile\"\n\t*goto after_fiel_conversions\n\n*label after_fiel_conversions\n\n*if (fiel_fate != \"?\")\n\t*set fiel_text \"${fiel_fate} (by ${fiel_defeater})\"\n*if (fiel_fate = \"Won\")\n\t*set fiel_text \"Won\"\n\n*if (subicim >= 570)\n\t*set subicim_text \"Friendly\"\n\t*goto after_subicim_conversions\n*elseif (subicim >= 530)\n\t*set subicim_text \"Neutral\"\n\t*goto after_subicim_conversions\n*else\n\t*set subicim_text \"Hostile\"\n\t*goto after_subicim_conversions\n\n*label after_subicim_conversions\n\n*if (subicim_fate != \"?\")\n\t*set subicim_text \"${subicim_fate} (by ${subicim_defeater})\"\n*if (subicim_fate = \"Won\")\n\t*set subicim_text \"Won\"\n\n*if (memmon >= 570)\n\t*set memmon_text \"Friendly\"\n\t*goto after_memmon_conversions\n*elseif (memmon >= 530)\n\t*set memmon_text \"Neutral\"\n\t*goto after_memmon_conversions\n*else\n\t*set memmon_text \"Hostile\"\n\t*goto after_memmon_conversions\n\n*label after_memmon_conversions\n\n*if (memmon_fate != \"?\")\n\t*set memmon_text \"${memmon_fate} (by ${memmon_defeater})\"\n*if (memmon_fate = \"Won\")\n\t*set memmon_text \"Won\"\n\n*if (davalon >= 570)\n\t*set davalon_text \"Friendly\"\n\t*goto after_davalon_conversions\n*elseif (davalon >= 530)\n\t*set davalon_text \"Neutral\"\n\t*goto after_davalon_conversions\n*else\n\t*set davalon_text \"Hostile\"\n\t*goto after_davalon_conversions\n\n*label after_davalon_conversions\n\n*if (davalon_fate != \"?\")\n\t*set davalon_text \"${davalon_fate} (by ${davalon_defeater})\"\n*if (davalon_fate = \"Won\")\n\t*set davalon_text \"Won\"\n\n*if (asiel >= 570)\n\t*set asiel_text \"Friendly\"\n\t*goto after_asiel_conversions\n*elseif (asiel >= 530)\n\t*set asiel_text \"Neutral\"\n\t*goto after_asiel_conversions\n*else\n\t*set asiel_text \"Hostile\"\n\t*goto after_asiel_conversions\n\n*label after_asiel_conversions\n\n*if (asiel_fate != \"?\")\n\t*set asiel_text \"${asiel_fate} (by ${asiel_defeater})\"\n*if (asiel_fate = \"Won\")\n\t*set asiel_text \"Won\"\n\n*if (quanom >= 570)\n\t*set quanom_text \"Friendly\"\n\t*goto after_quanom_conversions\n*elseif (quanom >= 530)\n\t*set quanom_text \"Neutral\"\n\t*goto after_quanom_conversions\n*else\n\t*set quanom_text \"Hostile\"\n\t*goto after_quanom_conversions\n\n*label after_quanom_conversions\n\n*if (quanom_fate != \"?\")\n\t*set quanom_text \"${quanom_fate} (by ${quanom_defeater})\"\n*if (quanom_fate = \"Won\")\n\t*set quanom_text \"Won\"\n\t\n*if (chapter3_update_origin = \"fiel_subicim_group\")\n\t*goto fiel_subicim_group\n\n*if (chapter3_update_origin = \"cycle_start\")\n\t*goto cycle_start_after_deity_relationships_update\n\n*ending\n\n*label ending_guide\n\n*page_break\n\nBelow is a simple guide on how to reach every achievement/ending in the game. Take a screenshot (etc. copy) of this page just in case you're otherwise unable to get a specific achievement/ending you're after! (note: potential spoilers!)\n\n\n[b]Chapter 1[/b]: Simply play through the first chapter of the game.\n\n\n[b]Chapter 2[/b]: Simply play through the second chapter of the game.\n\n\n[b]Chapter 3[/b]: Simply play through the third chapter of the game.\n\n\n[b]Omniscient[/b]: Save as much divinity as you can from the start of the game (minimal divinity consumption in choices), then spend 100 of it to observe the Nether when given the chance during chapter 1.\n\n\n[b]Hidden Entity[/b]: Investigate your Domain personally during chapter 2 and then confront the hidden entity within it.\n\n\n[b]Servant[/b]: After surrendering to another Minor Deity, choose to serve them willingly (Subicim (chapter 2) and Quanom (chapter 3) are the only options for this choice).\n\n\n[b]Nether Lord[/b]: Chase and defeat the Nether Lord at the start of chapter 3.\n\n\n[b]Pacification[/b]: Be neutral/friendly with Subicim and have 1200 Templars (choose high initial Templar investment and Guardian Deities!) at the start (cycle 1) of the final phase of chapter 3 to completely avoid being attacked by Subicim.\n\n\n[b]Subjugate[/b]: After defeating another Minor Deity, choose to subjugate them (if possible).\n\n\n[b]Erase[/b]: After defeating another Minor Deity, erase them from existence.\n\n\n[b]Survivor[/b]: Avoid being erased until the end of chapter 3 (Servant/Creator/Savior/Traitor endings are all fine).\n\n\n[b]Creator[/b]: Defeat Quanom in a divine battle to become a Creator Deity at the end of chapter 3. This is much easier to accomplish if you have a divine artifact, high faith and high Templars as well.\n\n\n[b]Savior[/b]: You should aim to have 1200 Templars (choose high initial Templar investment and Guardian Deities!) and be neutral/friendly with Subicim at the start (cycle 1) of the final phase of chapter 3 to avoid any attacks by Subicim. It’s also preferable to have the Divine Spear artifact. Then you need to rush to defeat Fiel and Memmon before cycle 15 and choose to support Asiel against Quanom.\n\n\n[b]Traitor[/b]: Save as much divinity as you can from the start of the game (minimal divinity consumption in choices), then spend 100 of it to observe the Nether when given the chance during chapter 1. Enter the Nether and become corrupted by the Nether Lords, then continue hiding your situation until you have the opportunity to betray the other Minor Deities without being erased in early chapter 3.\n\n*goto_scene ending", "choicescript_description": "As a Minor Deity, you have a large Domain of sapient beings to rule over as you see fit. Can you gather enough faith to ascend to a higher level of divinity?\n\n[i]Divine Ascension[/i] is a thrilling 41,000-word interactive fantasy novel by Teemu Salminen, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n• Play as an all-powerful deity with total control over your Domain.\n• Interact with six other Minor Deities, each with their own realm.\n• Gather faith, divinity and power to protect or use those who have faith in you.\n• Use your divine powers to bless or destroy your targets.\n• Experience several possible endings – based on the choices you made during the story.\n\nYour choices will decide the fate of your world!\n", "choicescript_stats": "*image map.jpg\n\nStatus:\n\n*stat_chart\n\ttext name Name\n\ttext divinity Divinity\n\ttext faith Faith\n\ttext templars Templars\n\topposed_pair loved\n\t\tLoved\n\t\tFeared\n\topposed_pair observing\n\t\tObserving\n\t\tControlling\n\topposed_pair intimate\n\t\tIntimate\n\t\tDetached\n\nDeity Relationships:\n\n*if (fiel >= 570)\n\t*set fiel_text \"Friendly\"\n\t*goto after_fiel_conversions\n*elseif (fiel >= 530)\n\t*set fiel_text \"Neutral\"\n\t*goto after_fiel_conversions\n*else\n\t*set fiel_text \"Hostile\"\n\t*goto after_fiel_conversions\n\n*label after_fiel_conversions\n\n*if (fiel_fate != \"?\")\n\t*set fiel_text \"${fiel_fate} (by ${fiel_defeater})\"\n*if (fiel_fate = \"Won\")\n\t*set fiel_text \"Won\"\n\n*if (subicim >= 570)\n\t*set subicim_text \"Friendly\"\n\t*goto after_subicim_conversions\n*elseif (subicim >= 530)\n\t*set subicim_text \"Neutral\"\n\t*goto after_subicim_conversions\n*else\n\t*set subicim_text \"Hostile\"\n\t*goto after_subicim_conversions\n\n*label after_subicim_conversions\n\n*if (subicim_fate != \"?\")\n\t*set subicim_text \"${subicim_fate} (by ${subicim_defeater})\"\n*if (subicim_fate = \"Won\")\n\t*set subicim_text \"Won\"\n\n*if (memmon >= 570)\n\t*set memmon_text \"Friendly\"\n\t*goto after_memmon_conversions\n*elseif (memmon >= 530)\n\t*set memmon_text \"Neutral\"\n\t*goto after_memmon_conversions\n*else\n\t*set memmon_text \"Hostile\"\n\t*goto after_memmon_conversions\n\n*label after_memmon_conversions\n\n*if (memmon_fate != \"?\")\n\t*set memmon_text \"${memmon_fate} (by ${memmon_defeater})\"\n*if (memmon_fate = \"Won\")\n\t*set memmon_text \"Won\"\n\n*if (davalon >= 570)\n\t*set davalon_text \"Friendly\"\n\t*goto after_davalon_conversions\n*elseif (davalon >= 530)\n\t*set davalon_text \"Neutral\"\n\t*goto after_davalon_conversions\n*else\n\t*set davalon_text \"Hostile\"\n\t*goto after_davalon_conversions\n\n*label after_davalon_conversions\n\n*if (davalon_fate != \"?\")\n\t*set davalon_text \"${davalon_fate} (by ${davalon_defeater})\"\n*if (davalon_fate = \"Won\")\n\t*set davalon_text \"Won\"\n\n*if (asiel >= 570)\n\t*set asiel_text \"Friendly\"\n\t*goto after_asiel_conversions\n*elseif (asiel >= 530)\n\t*set asiel_text \"Neutral\"\n\t*goto after_asiel_conversions\n*else\n\t*set asiel_text \"Hostile\"\n\t*goto after_asiel_conversions\n\n*label after_asiel_conversions\n\n*if (asiel_fate != \"?\")\n\t*set asiel_text \"${asiel_fate} (by ${asiel_defeater})\"\n*if (asiel_fate = \"Won\")\n\t*set asiel_text \"Won\"\n\n*if (quanom >= 570)\n\t*set quanom_text \"Friendly\"\n\t*goto after_quanom_conversions\n*elseif (quanom >= 530)\n\t*set quanom_text \"Neutral\"\n\t*goto after_quanom_conversions\n*else\n\t*set quanom_text \"Hostile\"\n\t*goto after_quanom_conversions\n\n*label after_quanom_conversions\n\n*if (quanom_fate != \"?\")\n\t*set quanom_text \"${quanom_fate} (by ${quanom_defeater})\"\n*if (quanom_fate = \"Won\")\n\t*set quanom_text \"Won\"\n\n*stat_chart\n\ttext fiel_text Fiel\n\ttext subicim_text Subicim\n\ttext memmon_text Memmon\n\ttext davalon_text Davalon\n\ttext asiel_text Asiel\n\ttext quanom_text Quanom", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n  \n  Permanently remove all ads and delays.\n  \n  *purchase_discount adfree 2024-03-14 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n  \n  You've paid to remove all ads and delays.", "death": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nYou have died.\n\n*goto_scene ending", "ending": "*page_break End\nWe hope you've enjoyed playing [i]${choice_title}.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99 $0.99", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n*image creation_myth.jpg\n\nIn the beginning, there was nothing but darkness.\n\n\nAfter millennia of silence in the endless [b]Nether[/b], something spontaneously appeared: the [b]Originator[/b], a mysterious entity with the power of creation.\n\n*page_break\n\n*image map.jpg\n\nAs the power of the Originator pushed you relentlessly, your astral form crashed through the world barrier, and then immediately into one of the shielded Domains within.\n\n\nA vast wilderness was suddenly visible below you: this Domain appeared to be a land full of forests and rivers. In addition, a small group of sapient beings inhabited the land. They didn't seem to possess any individual power or societal structures to speak of, living mere primitive lives of scarcity.\n\n*page_break\n\n*set name \"Zaldath\"\n*set divinity 90\n*set intimate -5\n\t\t\nIt would not be difficult to convey some of your intentions by showing a divine vision.\n\t\t\n\t\t\nThe problem with this approach was simply if they would understand your meaning completely while dreaming. Nevertheless, this would be easy to accomplish without any real burden for either side.\n\t\t\n\t\t\nWhat message should you focus on for the contents of the vision?\n\t\t\n*fake_choice\n\t#Show a bright future after following your will\n\t#Show a nightmare after opposing your will\n\n\n*script changeBackgroundColor(\"black\")\n\n*set name \"Zaldath\"\n*set divinity 70\n*set templars 300\n*set faith 30\n*set intimate -10\n*set loved +15\n*set observing -5\n\nAs a general rule, a positive fate for them could be only one of three options: they could be reincarnated without their original memories, accompany you as a divine host of souls reinforcing your divinity, or protect the Domain as guardian spirits. None of the options was obviously better than the others, and it was unfortunately impossible to make the decision on a case-by-case basis. In order not to waste your divinity, it was necessary to choose one of the three options as a general rule.\n\n\nWhich fate would you prefer to implement for your believers?\n\n*fake_choice\n\t#Reincarnation (+Faith)\n\t#Divine Host (+Divinity)\n\t#Guardian Spirits (+Templars)\n\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Zaldath\"\n*set divinity 120\n*set templars 350\n*set faith 50\n*set intimate -15\n*set loved +20\n*set observing -10\n\nYou began the search for a new candidate without delay.\n\n\nAs anticipated, it was not common for one of your people to have the aptitude to become an Oracle, yet it was not terribly difficult to find one who did. You could easily detect anyone with high enough potential within your Domain by simply observing the whole area.\n\n\nThere were actually two viable candidates for the role this time. Was it thanks to the Domain's increased faith or growing population? Either way, there was no meaningful difference between the two in terms of aptitude or faith.\n\n\nThe main difference between them was simply that one of them was a priest and the other one was a warrior. Could that influence religious policy going forward? Perhaps, but likely not in a radical way.\n\n*fake_choice\n\t#Priest candidate\n\t#Warrior candidate", "startup": "*title Divine Ascension\n*author Teemu Salminen\n\n*achievement chapter1 visible 50 Chapter 1\n\tYou completed the first chapter.\n*achievement chapter2 visible 50 Chapter 2\n\tYou completed the second chapter.\n*achievement chapter3 visible 50 Chapter 3\n\tYou completed the third chapter.\n*achievement omniscient visible 50 Omniscient\n\tYou witnessed a rare sight.\n*achievement hidden_entity visible 75 Hidden Entity\n\tYou found an entity hiding within your Domain.\n*achievement servant visible 75 Servant\n\tYou chose to serve a greater power.\n*achievement netherlord visible 75 Nether Lord\n\tYou defeated a Nether Lord.\n*achievement pacification visible 75 Pacification\n\tYou avoided being invaded during the first cycle.\n*achievement subjugate visible 50 Subjugate\n\tYou subjugated a Minor Deity.\n*achievement erase visible 50 Erase\n\tYou erased a Minor Deity.\n*achievement survivor visible 100 Survivor\n\tYou survived to the end.\n*achievement creator visible 100 Creator\n\tYou succeeded in creating a new world.\n*achievement savior visible 100 Savior\n\tYou saved your world from ruin.\n*achievement traitor visible 100 Traitor\n\tYou strayed from the path of divinity.\n\n*scene_list\n\tstartup\n\tchapter1\n\tchapter2\n\tchapter3\n\n*create name \"?\"\n\n*create divinity 100\n*create faith 0\n*create templars 0\n\n*create loved 50\n*create observing 50\n*create intimate 50\n\n*create after_death_system \"\"\n*create climate \"\"\n*create government_type \"\"\n*create corrupted \"no\"\n*create att
