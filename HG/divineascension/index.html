. As the celebration continued, you could feel the faith in you slowly but surely growing. It was a worthwhile idea from your Oracle to celebrate your return like this.\n\n*if (intimate \u003c 50)\n\tYou observed the events all around your Domain from the sky. They were more extravagant in larger cities, whereas smaller villages and towns only had modest gatherings in your honor. Either way, as the celebration continued, you could feel the faith in you steadily growing. It was a worthwhile idea from your Oracle to celebrate your return like this.\n\n*if (corrupted = \"yes\")\n\t*goto after_fiel_scene\n\nAfter a while, the actions of your Templar Commander's elite forces grabbed your attention instead. They had not participated in the celebrations at all, and had instead stayed behind in the main temple... as if silently awaiting your return.\n\n*page_break\n\nAs your aura of divinity reached the Templars who were waiting for you, they all knelt deeply to show their loyalty. Even though they could not communicate with you like an Oracle, their divinity was great enough to sense your presence.\n\n\nThe Templar Commander immediately explained the situation.\n\n\n\"I knew You would answer our prayers! I am asking You without going through the Oracle since my request may be too... selfish. As we face increasing threats from outside of our holy sanctuary, I am always reminded of my lack of strength. May I ask You to grant me a blessed artifact that can crush our enemies? It would greatly increase our peace of mind, for all of us fighting as Your holy warriors. If my request is too arrogant, I hope You can forget I ever asked.\"\n\n\nIt was true that something unexpected might threaten your Domain in the future. However, it would also consume some of your precious divinity to give them such a gift.\n\n\nAnother issue was choosing the type of divine artifact to create. A sword should be useful in most situations, whereas a shield could work better for defending your Domain and a spear would be more useful for attacking.\n\n\nDivinity: [b]${divinity}[/b]\n\n*choice\n\t#Ignore the request\n\t\t\n\t\tYou did not have the luxury to waste your divinity on such a trivial task.\n\t\t\n\t\t\n\t\tWhile they were silently waiting for your decision, your divinity slowly disappeared from the temple until it was completely gone.\n\t\t\n\t\t*goto after_artifact_choice\n\t*selectable_if (divinity >= 50) #Create a divine sword (-50 Divinity)\n\t\t*set divine_artifact \"sword\"\n\t\t*set templars +100\n\t\t*set faith +1\n\t\t*set divinity -50\n\t\t\n\t\tA sword would be the most generally useful artifact.\n\t\t\n\t\t\n\t\tWith your decision made, you swiftly collected a large amount of divinity and concentrated it into a single object: a one-handed sword that radiated raw divine power.\n\t\t\n\t\t\n\t\tThe Templars were awestruck when they saw it floating in front of them. As soon as you had finished its creation, you left the temple and moved to where your Oracle was already waiting for you.\n\t\t\n\t\t*goto after_artifact_choice\n\t*selectable_if (divinity >= 50) #Create a divine shield (-50 Divinity)\n\t\t*set divine_artifact \"shield\"\n\t\t*set templars +100\n\t\t*set faith +1\n\t\t*set divinity -50\n\t\t\n\t\tA shield would be the artifact with the highest defensive power.\n\t\t\n\t\t\n\t\tWith your decision made, you swiftly collected a large amount of divinity and concentrated it into a single object: a great shield that radiated raw divine power.\n\t\t\n\t\t\n\t\tThe Templars were awestruck when they saw it floating in front of them. As soon as you had finished its creation, you left the temple and moved to where your Oracle was already waiting for you.\n\t\t\n\t\t*goto after_artifact_choice\n\t*selectable_if (divinity >= 50) #Create a divine spear (-50 Divinity)\n\t\t*set divine_artifact \"spear\"\n\t\t*set templars +100\n\t\t*set faith +1\n\t\t*set divinity -50\n\t\t\n\t\tA spear would be the artifact with the highest offensive power.\n\t\t\n\t\t\n\t\tWith your decision made, you swiftly collected a large amount of divinity and concentrated it into a single object: a great spear that radiated raw divine power.\n\t\t\n\t\t\n\t\tThe Templars were awestruck when they saw it floating in front of them. As soon as you had finished its creation, you left the temple and moved to where your Oracle was already waiting for you.\n\t\t\n\t\t*goto after_artifact_choice\n\n*label after_artifact_choice\n\n*page_break\n\nIt did not take long to reach the location of your current Oracle from the temple. As you felt being prayed to, it was only proper to at least listen to the request.\n\n*if (loved >= 50)\n\t*if (other_deities_stance = \"deities\")\n\t\t\"My Lord...! There is something that I must tell You no matter what. It may only be unfounded paranoia, but we have recently noticed some unusual activities among our people. After hearing from You about the world outside of our sanctuary, I thought it might be related to some of those outsiders who have entered our lands...! I hope you can instruct me on how to deal with them.\"\n\t*if (other_deities_stance = \"superstition\")\n\t\t\"My Lord...! There is something that I must tell You no matter what. It may only be unfounded paranoia, but we have recently noticed some unusual activities among our people. After hearing from You about the world outside of our sanctuary, I thought it might be related to those outsiders who have infiltrated our lands...! I hope you can instruct me on how to deal with them.\"\n\t*if (other_deities_stance = \"blasphemy\")\n\t\t\"My Lord...! There is something that I must tell You no matter what. It may only be unfounded paranoia, but we have recently noticed some unusual activities among our people. After hearing from You about the world outside of our sanctuary, I thought it might be related to those blasphemers who have infiltrated our lands...! I hope you can instruct me on how to deal with them.\"\n\n*if (loved \u003c 50)\n\t*if (other_deities_stance = \"deities\")\n\t\t\"My Lord... Forgive my insolence, but there is something that I must tell You no matter what. It may only be unfounded paranoia, but we have recently noticed some unusual activities among our people. After hearing from You about the world outside of our sanctuary, I thought it might be related to some of those outsiders who have entered our lands... I hope you can instruct me on how to deal with them.\"\n\t*if (other_deities_stance = \"superstition\")\n\t\t\"My Lord... Forgive my insolence, but there is something that I must tell You no matter what. It may only be unfounded paranoia, but we have recently noticed some unusual activities among our people. After hearing from You about the world outside of our sanctuary, I thought it might be related to those outsiders who have infiltrated our lands... I hope you can instruct me on how to deal with them.\"\n\t*if (other_deities_stance = \"blasphemy\")\n\t\t\"My Lord... Forgive my insolence, but there is something that I must tell You no matter what. It may only be unfounded paranoia, but we have recently noticed some unusual activities among our people. After hearing from You about the world outside of our sanctuary, I thought it might be related to those blasphemers who have infiltrated our lands... I hope you can instruct me on how to deal with them.\"\n\n\nSince it was not easy for you to detect any infiltrators with divine souls, it was plausible that some Minor Deities had already sent their followers here secretly. If so, that was a grave humiliation for your authority over the Domain...\n\n\nThere was a limit to arrogance that they had crossed.\n\n*choice\n\t#Order a crackdown on outsiders within your Domain\n\t\t*goto passive_crackdown\n\t*selectable_if (divinity >= 10) #Investigate the situation directly (-10 Divinity)\n\t\t*set divinity -10\n\t\t*goto direct_investigation\n\n*label passive_crackdown\n\n*page_break\n\nThere was no need to exhaust yourself by searching for them. When you created the Templars, it was exactly for moments like these.\n\n\n*if (other_deities_stance = \"deities\")\n\n\t[i]It is a grave sin to enter our realm without my permission. I want you to capture all of them alive and bring them to me for judgment. Even if they do not have faith in me, they must follow my rules.[/i]\n\t\n\t\n\tAfter hearing your command, the Oracle announced a divine mission to the public: it was now their first priority to find these outsiders, with any information leading to their capture being highly rewarded. Not only your Templars, but the regular citizens were mobilized as well.\n\t\n*if (other_deities_stance = \"superstition\")\n\t\n\t[i]It is a grave sin to enter our realm without my permission. I want you to capture all of them alive and bring them to me for judgment. Even if they are heathens, they must follow my rules.[/i]\n\t\n\t\n\tAfter hearing your command, the Oracle announced a divine mission to the public: it was now their first priority to find these pagans, with any information leading to their capture being highly rewarded. Not only your Templars, but the regular citizens were mobilized as well.\n\t\n*if (other_deities_stance = \"blasphemy\")\n\t\n\t[i]It is a grave sin to enter our realm without my permission. I want you to capture all of them alive and bring them to me for judgment. No matter their warped beliefs, they must follow my rules.[/i]\n\t\n\t\n\tAfter hearing your command, the Oracle announced a divine mission to the public: it was now their first priority to find these blasphemers, with any information leading to their capture being highly rewarded. Not only your Templars, but the regular citizens were mobilized as well.\n\t\n\n\nThe whole Domain was in a state of frenzy, upheaval and suspicion. With less and less room to hide, the infiltrators were quickly backed into a corner.\n\n\nYou merely had to observe their inevitable surrender from the sky of your Domain.\n\n*goto judgment_scene\n\n*label direct_investigation\n\n*page_break\n\nDespite the inhabitants of this world being more difficult to detect than creatures from the Nether, it was far from impossible for you. With some focused effort, you could easily find them.\n\n\nThere was no need to waste time. Your divinity began radiating to every corner of the land, illuminating all of it with your presence. Multiple beings with alien divinities quickly became visible to you around the Domain.\n\n\nOne of them was an oddly powerful being; something on a completely different level from the minions of Minor Deities. It was like an infinite well of power. Would it be wise to confront it now...?\n\n*choice\n\t#Ignore it\n\t\t\n\t\tThere was no need to risk an unnecessary conflict yet. After you had become more powerful, it would be possible to face such unfathomably strong hidden entities.\n\t\t\n\t\t*goto after_originator_choice\n\t#Confront it\n\t\t\n\t\tEven if this entity was stronger than you, it was still trespassing on your territory. If you weren't able to protect the Domain, who possibly could?\n\t\t\n\t\t\n\t\tDetermined to even risk annihilation, you approached the mysterious being. As you got closer, it was starting to feel more and more... familiar.\n\t\t\n\t\t*page_break\n\t\t\n\t\t*check_achievements\n\t\t*if not(choice_achieved_hidden_entity)\n\t\t\t*achieve hidden_entity\n\t\t\n\t\t*set divinity +25\n\t\t\n\t\tSoon there was no longer any doubt. It was, in fact, the Originator. Despite the weak outer appearance of a mortal, you could still sense some of the overwhelming divinity leaking out to the surroundings.\n\t\t\n\t\t\n\t\t[i]You found me faster than I expected, ${name}. Be proud of your achievement. As a reward, I have granted you some additional divinity. Use it wisely to survive in the many trials ahead of you.[/i]\n\t\t\n\t\t\n\t\tWithout further explanation, the Originator instantly vanished, leaving no trace of ever visiting your Domain.\n\t\t\n\t\t\n\t\tIt was a mystery why such a visit had occurred in the first place. Regardless, you couldn't exactly complain about it, and you had even received some compensation. It might be better to forget about it for now.\n\t\t\n\t\t*goto after_originator_choice\n\n*label after_originator_choice\n\n*page_break\n\nYou immediately revealed the results of your investigation to the Oracle, and the Templars went to search for everyone with alien divinities within your Domain. Thanks to your detailed information, it was a simple task.\n\n*label judgment_scene\n\n*page_break\n\nIn the end, various intruders had been successfully captured and brought to the temple as prisoners. All that remained was to decide their fates.\n\n\n*if (other_deities_stance = \"deities\")\n\n\t\"These are all the outsiders we have found. One group claims to be priests of Quanom and another group says they are priests of Asiel. The third group appears to merchants from the lands of Memmon and the last group claims they are merchants serving Davalon. I await your guidance on how to treat them.\"\n\t\n*if (other_deities_stance = \"superstition\")\n\t\n\t\"These are all the infiltrators we have found. One group claims to be followers of Quanom and another group says they are followers of Asiel. The third group appears to merchants from the lands of Memmon and the last group claims they are merchants serving Davalon. I await your guidance on how to handle them.\"\n\t\n\t\n*if (other_deities_stance = \"blasphemy\")\n\t\n\t\"These are all the blasphemers we have found. One group claims to be servants of Quanom and another group says they are servants of Asiel. The third group appears to merchants from the lands of Memmon and the last group claims they are merchants serving Davalon. I await your guidance on how to punish them.\"\n\t\n\nThe Oracle clearly described the four groups of intruders to you. First of all, it was necessary to question the motives of each group.\n\n*temp interrogated_groups 0\n*temp quanom_intruders_interrogated \"no\"\n*temp asiel_intruders_interrogated \"no\"\n*temp memmon_intruders_interrogated \"no\"\n*temp davalon_intruders_interrogated \"no\"\n\n*label interrogation_start\n\n*page_break\n\n*if (interrogated_groups = 0)\n\n\tWhich group should you interrogate first?\n\n*if (interrogated_groups = 1)\n\n\tWhich group should you interrogate next?\n\n*if (interrogated_groups = 2)\n\n\tWhich group should you interrogate now?\n\n*if (interrogated_groups = 3)\n\n\tOnly one group of intruders remained...\n\n*set interrogated_groups +1\n\n*choice\n\t*if (quanom_intruders_interrogated = \"no\") #Followers of Quanom\n\t\t*set quanom_intruders_interrogated \"yes\"\n\t\t*goto quanom_priests\n\t*if (asiel_intruders_interrogated = \"no\") #Followers of Asiel\n\t\t*set asiel_intruders_interrogated \"yes\"\n\t\t*goto asiel_priests\n\t*if (memmon_intruders_interrogated = \"no\") #Followers of Memmon\n\t\t*set memmon_intruders_interrogated \"yes\"\n\t\t*goto memmon_slavers\n\t*if (davalon_intruders_interrogated = \"no\") #Followers of Davalon\n\t\t*set davalon_intruders_interrogated \"yes\"\n\t\t*goto davalon_spies\n\n*label quanom_priests\n\nThe intruders from Quanom's Domain were quickly brought before you and the Oracle, and they immediately began giving explanations for their actions.\n\n\n\"We apologize for entering this realm without permission... but it was not out of malice. We are simple servants of our Lord, who guided us to spread Their divine message to every corner of the world. We only ask that you allow us to continue doing so without major restrictions.\"\n\n\nDespite their request for lenient treatment, they weren't being entirely sincere. They radiated such strong divinity that they had to be high-ranking priests or even Templars instead of regular believers.\n\n\nThe Oracle was respectfully awaiting your orders...\n\n*choice\n\t*selectable_if (other_deities_stance = \"blasphemy\") #Sentence them to death\n\t\t*set quanom -20\n\t\t*set faith +5\n\t\t\n\t\t[i]They deserve to die for their sins. I command you to execute these blasphemers without delay.[/i]\n\t\t\n\t\t\n\t\tThe Oracle did not hesitate to carry out your order. After hearing about the judgment, the nearby Templars immediately took them away.\n\t\t\n\t\t\n\t\t[b]Your relations with Quanom will deteriorate greatly while faith in you will increase.[/b]\n\t\t\n\t\t*goto after_quanom_interrogation\n\t#Imprison them\n\t\t*set quanom -10\n\t\t*set faith +3\n\t\t\n\t\t[i]They deserve to be punished for their actions. I command you to apprehend them for the time being.[/i]\n\t\t\n\t\t\n\t\tThe Oracle did not hesitate to carry out your order. After hearing about the judgment, the nearby Templars immediately took them away.\n\t\t\n\t\t\n\t\t[b]Your relations with Quanom will deteriorate while faith in you will increase.[/b]\n\t\t\n\t\t*goto after_quanom_interrogation\n\t#Expel them\n\t\t*set quanom -5\n\t\t*set faith +2\n\t\t\n\t\t[i]They do not need to be punished, yet they must not remain within my Domain. I command you to expel them from our lands.[/i]\n\t\t\n\t\t\n\t\tThe Oracle did not hesitate to carry out your order. After hearing about the judgment, the nearby Templars immediately took them away.\n\t\t\n\t\t\n\t\t[b]Your relations with Quanom will deteriorate slightly while faith in you will increase.[/b]\n\t\t\n\t\t*goto after_quanom_interrogation\n\t#Ignore them\n\t\t*set quanom +5\n\t\t*set faith -2\n\t\t\n\t\t[i]They do not need to be punished, yet they must not be acknowledged either. I command you to suppress any rumors about them while they may remain here, as long as they refrain from gathering attention.[/i]\n\t\t\n\t\t\n\t\tThe Oracle did not hesitate to carry out your order. After hearing about the judgment, the nearby Templars immediately took them away.\n\t\t\n\t\t\n\t\t[b]Your relations with Quanom will improve slightly while faith in you will decrease.[/b]\n\t\t\n\t\t*goto after_quanom_interrogation\n\t*selectable_if (other_deities_stance = \"deities\") #Welcome them\n\t\t*set quanom +10\n\t\t*set faith -3\n\t\t\n\t\t[i]Instead of being punished, Quanom's followers must be welcomed to our realm. I command you to spread news about their arrival in a positive light.[/i]\n\t\t\n\t\t\n\t\tThe Oracle did not hesitate to carry out your order. After hearing about the judgment, the nearby Templars respectfully guided them away.\n\t\t\n\t\t\n\t\t[b]Your relations with Quanom will improve while faith in you will decrease.[/b]\n\t\t\n\t\t*goto after_quanom_interrogation\n\n*label after_quanom_interrogation\n\n*if (interrogated_groups = 4)\n\t*goto after_judged\n\n*goto interrogation_start\n\n*label asiel_priests\n\nThe intruders from Asiel's Domain were quickly brought before you and the Oracle, and they immediately began giving explanations for their actions.\n\n\n“It was our mistake not to openly announce our arrival. Yet as our Lord’s high priests, we wanted to first witness the state of your lands with our own eyes. Only by doing so could we see the reality of your religion’s true values. Now we simply ask to observe it for a while longer.”\n\n\nThey were being surprisingly honest. The strong divinity surrounding them proved without doubt that they were high-ranking servants of Asiel.\n\n\nThe Oracle was respectfully awaiting your orders...\n\n*choice\n\t*selectable_if (other_deities_stance = \"blasphemy\") #Sentence them to death\n\t\t*set asiel -20\n\t\t*set faith +5\n\t\t\n\t\t[i]They deserve to die for their sins. I command you to execute these blasphemers without delay.[/i]\n\t\t\n\t\t\n\t\tThe Oracle did not hesitate to carry out your order. After hearing about the judgment, the nearby Templars immediately took them away.\n\t\t\n\t\t\n\t\t[b]Your relations with Asiel will deteriorate greatly while faith in you will increase.[/b]\n\t\t\n\t\t*goto after_quanom_interrogation\n\t#Imprison them\n\t\t*set asiel -10\n\t\t*set faith +3\n\t\t\n\t\t[i]They deserve to be punished for their actions. I command you to apprehend them for the time being.[/i]\n\t\t\n\t\t\n\t\tThe Oracle did not hesitate to carry out your order. After hearing about the judgment, the nearby Templars immediately took them away.\n\t\t\n\t\t\n\t\t[b]Your relations with Asiel will deteriorate while faith in you will increase.[/b]\n\t\t\n\t\t*goto after_asiel_interrogation\n\t#Expel them\n\t\t*set asiel -5\n\t\t*set faith +2\n\t\t\n\t\t[i]They do not need to be punished, yet they must not remain within my Domain. I command you to expel them from our lands.[/i]\n\t\t\n\t\t\n\t\tThe Oracle did not hesitate to carry out your order. After hearing about the judgment, the nearby Templars immediately took them away.\n\t\t\n\t\t\n\t\t[b]Your relations with Asiel will deteriorate slightly while faith in you will increase.[/b]\n\t\t\n\t\t*goto after_asiel_interrogation\n\t#Ignore them\n\t\t*set asiel +5\n\t\t*set faith -2\n\t\t\n\t\t[i]They do not need to be punished, yet they must not be acknowledged either. I command you to suppress any rumors about them while they may remain here, as long as they refrain from gathering attention.[/i]\n\t\t\n\t\t\n\t\tThe Oracle did not hesitate to carry out your order. After hearing about the judgment, the nearby Templars immediately took them away.\n\t\t\n\t\t\n\t\t[b]Your relations with Asiel will improve slightly while faith in you will decrease.[/b]\n\t\t\n\t\t*goto after_asiel_interrogation\n\t*selectable_if (other_deities_stance = \"deities\") #Welcome them\n\t\t*set asiel +10\n\t\t*set faith -3\n\t\t\n\t\t[i]Instead of being punished, Asiel's followers must be welcomed to our realm. I command you to spread news about their arrival in a positive light.[/i]\n\t\t\n\t\t\n\t\tThe Oracle did not hesitate to carry out your order. After hearing about the judgment, the nearby Templars respectfully guided them away.\n\t\t\n\t\t\n\t\t[b]Your relations with Asiel will improve while faith in you will decrease.[/b]\n\t\t\n\t\t*goto after_asiel_interrogation\n\n*label after_asiel_interrogation\n\n*if (interrogated_groups = 4)\n\t*goto after_judged\n\n*goto interrogation_start\n\n*label memmon_slavers\n\nThe intruders from Memmon's Domain were quickly brought before you and the Oracle. Pressured by your divinity and the Templars surrounding them, they immediately attempted to explain their deeds.\n\n\n\"We ask for Your forgiveness! It was not our intention to act secretly for long, but we wanted to scout the area before openly announcing our presence. If You spare us from punishment, we will immediately leave these lands, as if we had never even come here.\"\n\n\nDespite their plea for merciful treatment, they weren't being entirely sincere. Instead of regular merchants, it might be more appropriate to describe them as slavers based on their equipment.\n\n\nThe Oracle was respectfully awaiting your orders...\n\n*choice\n\t*selectable_if (other_deities_stance = \"blasphemy\") #Sentence them to death\n\t\t*set memmon -20\n\t\t*set faith +5\n\t\t\n\t\t[i]They deserve to die for their sins. I command you to execute these blasphemers without delay.[/i]\n\t\t\n\t\t\n\t\tThe Oracle did not hesitate to carry out your order. After hearing about the judgment, the nearby Templars immediately took them away.\n\t\t\n\t\t\n\t\t[b]Your relations with Memmon will deteriorate greatly while faith in you will increase.[/b]\n\t\t\n\t\t*goto after_memmon_interrogation\n\t#Imprison them\n\t\t*set memmon -10\n\t\t*set faith +3\n\t\t\n\t\t[i]They deserve to be punished for their actions. I command you to apprehend them for the time being.[/i]\n\t\t\n\t\t\n\t\tThe Oracle did not hesitate to carry out your order. After hearing about the judgment, the nearby Templars immediately took them away.\n\t\t\n\t\t\n\t\t[b]Your relations with Memmon will deteriorate while faith in you will increase.[/b]\n\t\t\n\t\t*goto after_quanom_interrogation\n\t#Expel them\n\t\t*set memmon -5\n\t\t*set faith +2\n\t\t\n\t\t[i]They do not need to be punished, yet they must not remain within my Domain. I command you to expel them from our lands.[/i]\n\t\t\n\t\t\n\t\tThe Oracle did not hesitate to carry out your order. After hearing about the judgment, the nearby Templars immediately took them away.\n\t\t\n\t\t\n\t\t[b]Your relations with Memmon will deteriorate slightly while faith in you will increase.[/b]\n\t\t\n\t\t*goto after_memmon_interrogation\n\t#Ignore them\n\t\t*set memmon +5\n\t\t*set faith -2\n\t\t\n\t\t[i]They do not need to be punished, yet they must not be acknowledged either. I command you to suppress any rumors about them while they may remain here, as long as they refrain from gathering attention.[/i]\n\t\t\n\t\t\n\t\tThe Oracle did not hesitate to carry out your order. After hearing about the judgment, the nearby Templars immediately took them away.\n\t\t\n\t\t\n\t\t[b]Your relations with Memmon will improve slightly while faith in you will decrease.[/b]\n\t\t\n\t\t*goto after_memmon_interrogation\n\t*selectable_if (other_deities_stance = \"deities\") #Welcome them\n\t\t*set memmon +10\n\t\t*set faith -3\n\t\t\n\t\t[i]Instead of being punished, Memmon's merchants must be welcomed to our realm. I command you to spread news about their arrival in a positive light.[/i]\n\t\t\n\t\t\n\t\tThe Oracle did not hesitate to carry out your order. After hearing about the judgment, the nearby Templars respectfully guided them away.\n\t\t\n\t\t\n\t\t[b]Your relations with Memmon will improve while faith in you will decrease.[/b]\n\t\t\n\t\t*goto after_memmon_interrogation\n\n*label after_memmon_interrogation\n\n*if (interrogated_groups = 4)\n\t*goto after_judged\n\n*goto interrogation_start\n\n*label davalon_spies\n\nThe intruders from Davalon's Domain were quickly brought before you and the Oracle. Pressured by your divinity and the Templars surrounding them, they immediately attempted to explain their deeds.\n\n\n\"We greatly regret not openly approaching You, the rightful owner of this Domain, any sooner. We were sent by our Lord, Davalon, to explore these lands and to establish friendly connections between our religions if possible.\"\n\n\nDespite their reasonable justification, they weren't being completely honest. Instead of diplomats, it might be more appropriate to describe them as spies based on their secretive activities and communication tools.\n\n\nThe Oracle was respectfully awaiting your orders...\n\n*choice\n\t*selectable_if (other_deities_stance = \"blasphemy\") #Sentence them to death\n\t\t*set davalon -20\n\t\t*set faith +5\n\t\t\n\t\t[i]They deserve to die for spying on us. I command you to execute these blasphemers without delay.[/i]\n\t\t\n\t\t\n\t\tThe Oracle did not hesitate to carry out your order. After hearing about the judgment, the nearby Templars immediately took them away.\n\t\t\n\t\t\n\t\t[b]Your relations with Davalon will deteriorate greatly while faith in you will increase.[/b]\n\t\t\n\t\t*goto after_davalon_interrogation\n\t#Imprison them\n\t\t*set davalon -10\n\t\t*set faith +3\n\t\t\n\t\t[i]They deserve to be punished for their espionage. I command you to apprehend them for the time being.[/i]\n\t\t\n\t\t\n\t\tThe Oracle did not hesitate to carry out your order. After hearing about the judgment, the nearby Templars immediately took them away.\n\t\t\n\t\t\n\t\t[b]Your relations with Davalon will deteriorate while faith in you will increase.[/b]\n\t\t\n\t\t*goto after_davalon_interrogation\n\t#Expel them\n\t\t*set davalon -5\n\t\t*set faith +2\n\t\t\n\t\t[i]They do not need to be punished, yet they must not remain within my Domain. I command you to expel them from our lands.[/i]\n\t\t\n\t\t\n\t\tThe Oracle did not hesitate to carry out your order. After hearing about the judgment, the nearby Templars immediately took them away.\n\t\t\n\t\t\n\t\t[b]Your relations with Davalon will deteriorate slightly while faith in you will increase.[/b]\n\t\t\n\t\t*goto after_davalon_interrogation\n\t#Ignore them\n\t\t*set davalon +5\n\t\t*set faith -2\n\t\t\n\t\t[i]They do not need to be punished, yet they must not be acknowledged either. I command you to suppress any rumors about them while they may remain here, as long as they refrain from gathering attention.[/i]\n\t\t\n\t\t\n\t\tThe Oracle did not hesitate to carry out your order. After hearing about the judgment, the nearby Templars immediately took them away.\n\t\t\n\t\t\n\t\t[b]Your relations with Davalon will improve slightly while faith in you will decrease.[/b]\n\t\t\n\t\t*goto after_davalon_interrogation\n\t*selectable_if (other_deities_stance = \"deities\") #Welcome them\n\t\t*set davalon +10\n\t\t*set faith -3\n\t\t\n\t\t[i]Instead of being punished, Davalon's diplomats are to be welcomed to our realm. I command you to spread news about their arrival in a positive light.[/i]\n\t\t\n\t\t\n\t\tThe Oracle did not hesitate to carry out your order. After hearing about the judgment, the nearby Templars respectfully guided them away.\n\t\t\n\t\t\n\t\t[b]Your relations with Davalon will improve while faith in you will decrease.[/b]\n\t\t\n\t\t*goto after_davalon_interrogation\n\n*label after_davalon_interrogation\n\n*if (interrogated_groups = 4)\n\t*goto after_judged\n\n*goto interrogation_start\n\n*label after_judged\n\n*page_break\n\nYour presence slowly vanished from the temple after handling the intruders.\n\n\nDespite finally being able to spend time in your own Domain, it was impossible to spend all of it with your believers. Certain tasks took you away from them for a while.\n\n\nHowever, it would not be long until your attention was pulled back to mortal affairs.\n\n*page_break\n\nYour Oracle was once again in front of you, accompanied by various leaders of your Domain who were kneeling reverently. This scene was created in response to their urgent prayers requesting your presence.\n\n\nThe new issue that required your direct attention was indeed quite serious.\n\n\n*if (other_deities_stance = \"deities\")\n\n\t\"This is nothing like the previous case of intruders! Rather than dozens of people arriving secretly, there are now thousands of them trying to openly enter our realm. They claim to have faith in Fiel, another deity from a distant land, and want permission to move freely through our lands. Most of them say they want to continue moving further for missionary work, while some of them want to settle here. How should we deal with these people?\"\n\t\n*if (other_deities_stance = \"superstition\")\n\t\n\t\"This is nothing like the previous case of intruders! Rather than dozens of people arriving secretly, there are now thousands of them trying to openly enter our realm. They claim to have faith in Fiel, a pagan deity from afar, and want permission to move freely through our lands. Most of them say they want to continue moving further for missionary work, while some of them want to settle here. How should we deal with these people?\"\n\t\n\t\n*if (other_deities_stance = \"blasphemy\")\n\t\n\t\"This is nothing like the previous case of sinners! Rather than dozens of people arriving secretly, there are now thousands of them trying to openly enter our realm. They claim to have faith in a false deity, Fiel, and want permission to move through our lands. Most of them say they want to continue moving further for missionary work, while some of them want to settle here. How should we deal with these... people?\"\n\t\n\nThe Oracle's urgent tone clearly conveyed how shocking the whole situation was. Not only was this a problem for your Domain, but allowing Fiel's followers free movement would cause issues for Subicim's Domain as well. How could Fiel have done such a move without any warning?\n\n*choice\n\t#Allow free movement, no settlers can stay\n\t\t*set subicim -15\n\t\t*set fiel +5\n\t\t\n\t\tAlthough with some reluctance, you could accept their demand of being able to travel through your Domain. Accepting their settlers was a completely different matter.\n\t\t\n\t\t\n\t\tAfter confirming your judgment, your Templars allowed the temporary visitors to enter your Domain. They immediately began moving through the Domain. On the other hand, the settlers were blocked and had to give up on all of their plans.\n\t\t\n\t\t\n\t\t[b]You improved your relations with Fiel and worsened your relations with Subicim.[/b]\n\t\t\n\t\t*goto after_fiel_scene\n\t*selectable_if (other_deities_stance = \"deities\") #Allow settlers to stay, no free movement past your Domain\n\t\t*set faith -5\n\t\t*set fiel +5\n\t\t\n\t\tAlthough with some reluctance, you could accept their demand of being able to live within your Domain. Accepting their free movement through your lands to disturb Subicim's Domain was a completely different matter.\n\t\t\n\t\t\n\t\tAfter confirming your judgment, your Templars allowed the settlers to enter your Domain. They immediately began a process of migration to your Domain. On the other hand, the missionaries aiming to travel to other Domains were blocked and had to give up on all of their plans.\n\t\t\n\t\t\n\t\t[b]You improved your relations with Fiel and weakened your own religion.[/b]\n\t\t\n\t\t*goto after_fiel_scene\n\t*selectable_if (other_deities_stance = \"deities\") #Allow both\n\t\t*set faith -5\n\t\t*set subicim -20\n\t\t*set fiel +20\n\t\t\n\t\tAlthough with some reluctance, you could accept their demands.\n\t\t\n\t\t\n\t\tAfter confirming your judgment, your Templars allowed all of those missionaries and settlers to approach your Domain. They immediately began a large migration to and movement through your Domain.\n\t\t\n\t\t\n\t\t[b]You improved your relations with Fiel, worsened your relations with Subicim and weakened your own religion.[/b]\n\t\t\n\t\t*goto after_fiel_scene\n\t#Block both\n\t\t*set fiel -25\n\t\t\n\t\tNeither of their demands were acceptable.\n\t\t\n\t\t\n\t\tAfter confirming your judgment, your Templars swiftly blocked all of those missionaries and settlers from approaching your Domain. They gave up surprisingly easily and simply went back to Fiel's Domain.\n\t\t\n\t\t\n\t\t[b]You worsened your relations with Fiel.[/b]\n\t\t\n\t\t*goto after_fiel_scene\n\t*selectable_if (helped_fiel = \"yes\") #Appeal to Fiel directly to solve the issue\n\t\t\n\t\tEven a dispassionate type such as Fiel would have to listen to your request, after having been saved by you during the earlier Nether invasion.\n\t\t\n\t\t\n\t\tAs you had hoped, after Fiel heard your reminder through their Oracle, the whole problem vanished as if it had never happened in the first place. At least Fiel seemed to have a minimum level of honor not to cause you more trouble right after receiving such a large favor.\n\t\t\n\t\t*goto after_fiel_scene\n\n*label after_fiel_scene\n\n*page_break\n\n*if (corrupted = \"yes\")\n\t\n\tEven though faith in you was steadily increasing, it was becoming impossible to ignore the Nether corruption growing inside of you.\n\t\n\t\n\tIt was no longer merely an issue for the distant future. Even at this very moment, the corruption was quickly worsening. Only a hollow shell of powerful divinity remained to hide your utterly corrupted core from outsiders.\n\t\n\t\n\tThere did not seem to be any method left to reverse the corruption...\n\n*if (corrupted = \"no\")\n\t\n\tWith the issue of Fiel's followers handled, your Domain had become peaceful once more... for now.\n\t\n\t\n\tThe main purpose of your religion, which was to increase your divinity through sincere faith, was also going well. Religiosity and population growth of your Domain had both increased drastically since the early days of your religion.\n\t\n\t\n\tAt this rate, there would be no problems challenging the forces of the Nether... or even other deities, if necessary.\n\n*page_break\n\nRising to the sky above your Domain, you could see that this land had become filled with your believers and their divinity, shining like a beacon of light within a sea of darkness.\n\n\n*if (corrupted = \"yes\")\n\tUnfortunately, the Nether corruption had spread inside you, and you could no longer resist it. There might soon be a time when you would have to turn against the believers who had supported you so far.\n\n*if (corrupted = \"no\")\n\tWithout a doubt, your Domain had made great progress during the many cycles it had been under your protection. However, the threats facing it would only grow in the cycles ahead. Although you had prepared, it was impossible to know if it would be enough.\n\n\n*page_break\n\nAs you looked at the vast Domain below you, you could suddenly sense the Originator convening a second Divine Council. It was time to leave your believers on their own again.\n\n\nEven though it was inevitable, it was still somewhat sad. Regardless, there was little choice but to attend this gathering. It would be suicidal to oppose the Originator's will on your own.\n\n\nThe command seemed even more urgent than last time. There was hardly any time to make more preparations than you had already done.\n\n\n... And so, you left for the Divine Mountains immediately. The only one to know the true reason would be your Oracle.\n\n*check_achievements\n*if not(choice_achieved_chapter2)\n\t*achieve chapter2\n\n*finish", "chapter3": "*advertisement 1200\n*if (chapter3_update_origin != \"\")\n\t*goto update_deity_relations\n\n*image templar.jpg\n\n*set divinity +(faith*5)\n*set faith +10\n*set templars +100\n\n[b]Faith increased your divinity...[/b]\n\n\nThe tensions around your Domain were clearly growing. As the barriers weakened, the Shadows became more active, and the other Domains also increased their own activities. This Divine Council could be crucial for your future.\n\n\nThe Divine Mountains were now ahead of you, with the other Minor Deities next to you. Fiel, Subicim, Memmon, Davalon, Asiel and Quanom. All of them had also gathered here to wait for the Originator's arrival.\n\n*page_break\n\n[i]You now have permission to enter your barriers.[/i]\n\n\nAll six of you entered the Divine Mountains and headed for your personal barriers in the central area. There was no way to know for certain how this event would unfold, but it was clear that the Originator intended for those barriers to be used again.\n\n\nAfter being sealed within your own barrier, you could still hear the Originator's thoughts, although the rest of the outside world was completely silenced.\n\n*page_break\n\n[i]The next trial ahead of you will be much more difficult. This time you are faced not with an invasion by mere Shadows, but three Nether Lords. These are not opponents that you can usually defeat alone. Because of that, you will be defending the world barrier in three groups. ${name}, Fiel and Subicim... Davalon and Quanom... Asiel and Memmon. Each of these groups will assault one of the Nether Lords to prevent the world barrier from being breached. I will observe your performances closely.[/i]\n\n\nAs soon as the Originator had finished the announcement, new barriers were formed around the three newly assembled groups. Your personal barrier vanished as you were left alone with Fiel and Subicim.\n\n*set chapter3_update_origin \"fiel_subicim_group\"\n\n*goto update_deity_relations\n\n*label fiel_subicim_group\n\n*page_break\n\nSimply observing the atmosphere, Subicim and Fiel appeared to be hostile to each other. There was another problem as well...\n\n\n*if (subicim_text = \"Friendly\")\n\t[i]This fool, Fiel, is useless to us. I hope you, ${name}, can support me well.[/i]\n\n\n*if (subicim_text = \"Neutral\")\n\t[i]This fool, Fiel, is useless to us. I hope you, ${name}, can be of some use.[/i]\n\n\n*if (subicim_text = \"Hostile\")\n\t[i]This fool, Fiel, is useless to us. I hope you, ${name}, are not a complete hindrance.[/i]\n\n\n*if (fiel_text = \"Friendly\")\n\t[i]What an ignorant entity you are. It is futile to communicate with you. Fortunately, the other one has managed to gather sufficient faith.[/i]\n\n\n*if (fiel_text = \"Neutral\")\n\t[i]What an ignorant entity you are. It is futile to communicate with you. Fortunately, the rest of us have gathered enough faith to succeed.[/i]\n\n\n*if (fiel_text = \"Hostile\")\n\t[i]What an ignorant entity you are. It is futile to communicate with you. Fortunately, I have gathered enough faith to compensate for both of you.[/i]\n\n\n... They were even about to drag you into their conflict.\n\n*choice\n\t#Avoid taking a stance\n\t\t\n\t\tIt was better not to intervene carelessly. As long as their hostility was directed at each other, it would not cause you any harm.\n\t\t\n\t\t*goto after_subicim_fiel_choice\n\t#Side with Fiel\n\t\t*set subicim -5\n\t\t*set fiel +5\n\t\t\n\t\t[i]Fiel has the highest divinity among us. This fact alone means that even if we have a useless member, it is certainly not Fiel.[/i]\n\t\t\n\t\t\n\t\tSubicim radiated blatant hostility while Fiel appeared subtly pleased by your intervention.\n\t\t\n\t\t*goto after_subicim_fiel_choice\n\t#Side with Subicim\n\t\t*set subicim +5\n\t\t*set fiel -5\n\t\t\n\t\t[i]Faith alone is useless if not backed by power. Subicim is correct to be critical of Fiel's Domain, which cannot even defend itself from the Shadows properly.[/i]\n\t\t\n\t\t\n\t\tFiel radiated passive hostility while Subicim appeared pleased by your intervention.\n\t\t\n\t\t*goto after_subicim_fiel_choice\n\n*label after_subicim_fiel_choice\n\n*temp trial_approach \"\"\n\n*page_break\n\nSuddenly, all three of you could sense the approaching Nether Lords. They were majestic presences incomparable to the Shadows, swiftly getting closer to the world barrier from three different directions.\n\n\nThe one assigned to your group had almost reached it by now.\n\n*choice\n\t#Take the lead\n\t\t*set trial_approach \"lead\"\n\t\t\n\t\tBefore the other two had time to react, you were already moving toward the Nether Lord assigned to your group. You should be able to strike it first thanks to your speed advantage.\n\t\t\n\t\t*goto after_trial_approach_choice\n\t#Advance together\n\t\t*set trial_approach \"together\"\n\t\t\n\t\tYou delayed your movements slightly in order to stay with the other two. It might be too dangerous to face it alone even briefly, after all.\n\t\t\n\t\t*goto after_trial_approach_choice\n\t#Remain cautious\n\t\t*set trial_approach \"cautious\"\n\t\t\n\t\tYou delayed your movements in order to stay behind the other two as they approached the Nether Lord. It might be too dangerous to face it as the vanguard, after all.\n\t\t\n\t\t*goto after_trial_approach_choice\n\t\t\n*label after_trial_approach_choice\n\n*page_break\n\n*if (corrupted = \"yes\")\n\t\n\t[i]The time has come, my eternal ally. Now that they are distracted, we must strike them in the back. I will give you a signal soon, so follow my lead to ambush them![/i]\n\t\n\t\n\tMemmon's traitorous thoughts suddenly reached you as you were on your way to fight the Nether Lord. The corruption spreading deeply within you reacted, as if also eager to cause this world's downfall.\n\t\n\t\n\tDue to your hesitation, your speed slowed down temporarily, allowing the other two to get significantly ahead of you. \n\t\n\t*page_break\n\t\n\tFiel and Subicim observed your state briefly, yet they didn't notice anything odd. How could they? Even Quanom, the strictest enemy of the Nether Lords, hadn't noticed anything so far.\n\t\n\t\n\tThe time window to make your choice was rapidly closing. Now was the best opportunity to betray your fellow Minor Deities, and it was also the last chance to confess your true state... before entering a path of no return.\n\t\n\t*choice\n\t\t#Fully betray the deities\n\t\t\t\n\t\t\tIt was too late to turn back at this point. If you faced doom either way, it would be better to grab the only chance of survival left for you.\n\t\t\t\n\t\t\t\n\t\t\tAfter confirming your choice to side with the Nether Lords, you continued to follow behind Fiel and Subicim. This position gave you the best opportunity to ambush them later.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tAs soon as the Nether Lord attempted to break through the world barrier, you were already waiting for it with Fiel and Subicim. Both of them were in front of you, prepared to block its approach.\n\t\t\t\n\t\t\t\n\t\t\tThey were not expecting a betrayal at all. That much was clear from their behavior. However...\n\t\t\t\n\t\t\t\n\t\t\t[i]now is your last chance! Destroy them, remove these obstacles for our new masters![i]\n\t\t\t\n\t\t\t\n\t\t\t... that was their fatal mistake.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tBoth Fiel and Subicim were caught completely off guard by your surprise attack. As your warped divinity struck them, the Nether Lord began to attack them as well.\n\t\t\t\n\t\t\t\n\t\t\tThe Nether Lord was soon able to capture Subicim, while Fiel swiftly escaped the scene of betrayal. The battle ended much sooner than anticipated.\n\t\t\t\n\t\t\t\n\t\t\t[i]Two of them have now been taken by Us... Two were already Ours before... But three obstacles remain... Go and aid Our first supporter... Immediately...[/i]\n\t\t\t\n\t\t\t\n\t\t\tIt seemed that the ambush had succeeded, but the fight was still far from over.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tWhat followed was a tough battle against Quanom, Fiel and Davalon. They were all surprisingly strong in a direct battle, although Quanom was by far the strongest among them.\n\t\t\t\n\t\t\t\n\t\t\tUltimately, they were able to defend the world... temporarily. Although Fiel had fallen, Quanom successfully pushed all three Nether Lords back into the Nether.\n\t\t\t\n\t\t\t\n\t\t\tThere was no choice but to escape to the Nether, for both you and Memmon. As Quanom's attention turned back to you two, there was only a limited time window to leave safely.\n\t\t\t\n\t\t\t\n\t\t\tFortunately, Memmon was closer to Quanom than you were. It should be possible for you to escape alone, at least.\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#Sacrifice Memmon\n\t\t\t\t\t\n\t\t\t\t\tThere was no need to hesitate. You left Memmon behind and immediately aimed for the world barrier.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\tWhile Memmon observed you, shocked, you were barely able to escape. Behind you, Quanom's overwhelming divinity rapidly approached Memmon.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\tHowever, you could not afford to look back.\n\t\t\t\t\t\n\t\t\t\t\t*goto traitor\n\t\t\t\t#Help Memmon to escape\n\t\t\t\t\t\n\t\t\t\t\tEven though you were a traitor, it did not mean you would betray Memmon as well. It was necessary to help your new ally in order to gain favor from the Nether Lords.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\tThinking so, you approached Quanom and attacked. It should not be possible for Quanom to destroy either of you if you simply retreated while launching attacks together.\n\t\t\t\t\t\n\t\t\t\t\t*page_break\n\t\t\t\t\t\n\t\t\t\t\tUnfortunately, that was not what happened. As soon as you approached Quanom, Memmon immediately began to move toward the world barrier. Once you noticed what had happened, it was already too late.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\tWhile Memmon successfully escaped, you were forced to face Quanom alone. It was impossible to win.\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t[i]A despicable traitor like you should not continue to desecrate our world. Even if you truly deserve worse, I will end your miserable existence right now.[/i]\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\tQuanom's overwhelming divinity soon surrounded you and removed any hope of resistance or escape.\n\t\t\t\t\t\n\t\t\t\t\t*goto erased\n\t\t\t\t\t\n\t\t#Confess the truth to Quanom\n\t\t\t\n\t\t\tConsidering the state you were in now, it would be better to let Fiel and Subicim fight the Nether Lord without you. The best way for you to help them would be to simply... disappear.\n\t\t\t\n\t\t\t\n\t\t\tBefore they noticed anything, you had already left their side.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\t[i]I understand. Your betrayal is difficult to forgive, but since you have shown remorse, I will at least grant you a merciful end, which is a far better fate than to be corrupted by the Nether.[/i]\n\t\t\t\n\t\t\t\n\t\t\tQuanom's powerful divinity in front of you was something that would be impossible for you to defeat, even if you wanted to change your mind now. After you had confessed the truth, Quanom had immediately surrounded you with a cage of pure divinity.\n\t\t\t\n\t\t\t\n\t\t\tAs the outer layer of your form began to disappear, it revealed the twisted corruption inside. It was, in truth, a relief for Quanom's divinity to wash away your sins.\n\t\t\t\n\t\t\t*goto erased\n\t\n\n*if (corrupted = \"no\")\n\t\n\tAll three of you swiftly reached the world barrier.\n\t\n\t\n\tThe Nether Lord had already partially broken through, and hundreds of Shadows were pouring through the cracks. It was truly a nightmarish scene.\n\t\n\t*page_break\n\t\n\t*if (trial_approach = \"lead\")\n\t\n\t\t*set divinity -30\n\t\t\n\t\t[b]You consumed a moderate amount of your divinity.[/b]\n\t\t\n\t\t\n\t\tSince you were ahead of the other two, you were able to attack first. A burst of your divinity quickly hit the approaching Nether Lord.\n\t\n\t*if (trial_approach = \"together\")\n\t\t\n\t\t*set divinity -10\n\t\t\n\t\t[b]You consumed a small amount of your divinity.[/b]\n\t\t\n\t\t\n\t\tSince you were together with the other two, you had no choice but to cooperate with them. Your divine attacks hit the approaching Nether Lord simultaneously.\n\t\n\t*if (trial_approach = \"cautious\")\n\t\t\n\t\tSince you were behind the other two, you could only observe as they began the battle without you. Their divine attacks hit the approaching Nether Lord as soon as they were in range.\n\t\n\t*page_break\n\t\n\tAfter already suffering significant damage from the initial attack, the Nether Lord shifted its attention to your group. Instead of continuing to break through the world barrier, it began to use its tendrils to launch projectiles of dark energy. Countless unholy shards from the Nether were aimed at all of you.\n\t\n\t\n\tFortunately, only a small amount reached their targets. As most of them missed, the rest were deflected by the divinities surrounding your forms.\n\t\n\t*page_break\t\n\t\n\tA battle of attrition began after the initial wave of attacks. Both groups launched a series of attacks in an attempt exhaust the other side.\n\t\n\t\n\tIt was an even match at first, with neither side gaining a clear advantage. However, Subicim became more and more exhausted as the fight continued. The result was uncertain until the very end.\n\t\n\t\n\tFinally, the Nether Lord chose to retreat. Leaving behind its army of Shadows, it left the crack in the world barrier and disappeared toward the endless Nether.\n\t\n\t\n\tThis could be a rare opportunity to defeat an already weakened Nether Lord...\n\t\n\t\n\tDivinity: [b]${divinity}[/b]\n\t\n\t*choice\n\t\t#Focus on defending the world barrier\n\t\t\t\n\t\t\tIt was not worth the risk to enter the Nether now. It might even be a trap.\n\t\t\t\n\t\t\t\n\t\t\tHaving made your choice, you focused on destroying the remaining Shadows and guarding the crack in the world barrier. It didn't take long until the battle was completely over.\n\t\t\t\n\t\t\t*goto last_trial_end\n\t\t*selectable_if (divinity >= 100) #Chase the Nether Lord (-100 Divinity)\n\t\t\n\t\t\t*set divinity -100\n\t\t\t\n\t\t\t*check_achievements\n\t\t\t*if not(choice_achieved_netherlord)\n\t\t\t\t*achieve netherlord\n\t\t\t\n\t\t\tLeaving the other two deities behind, you immediately chased after the escaping Nether Lord. Greatly weakened, it was unable to defend against your continuous divine attacks, and ultimately it was destroyed by them, leaving behind only a mass of dark energy.\n\t\t\t\n\t\t\t\n\t\t\tSome of it vanished to the Nether, but a part of it was held in place by the aftereffects of your attacks.\n\t\t\t\n\t\t\t*if (trial_approach = \"lead\")\n\t\t\t\t\n\t\t\t\t*set divinity +250\n\t\n\t\t\t\t[b]You absorbed some of the remains of the defeated Nether Lord, gaining a large amount of divinity for yourself.[/b]\n\t\n\t\t\t*if (trial_approach = \"together\")\n\t\t\n\t\t\t\t*set divinity +200\n\t\n\t\t\t\t[b]You absorbed some of the remains of the defeated Nether Lord, gaining a moderate amount of divinity for yourself.[/b]\n\t\n\t\t\t*if (trial_approach = \"cautious\")\n\t\t\t\t\n\t\t\t\t*set divinity +150\n\t\n\t\t\t\t[b]You absorbed some of the remains of the defeated Nether Lord, gaining some divinity for yourself.[/b]\n\t\t\t\n\t\t\t*goto last_trial_end\n\n*label last_trial_end\n\n*page_break\n\nAfter your victory, the Originator's voice suddenly echoed in your mind.\n\n\n[i]The last trial is now over. There will be no more Divine Councils, and the Divine Mountains will be closed off permanently. Soon your Domains will also have their barriers further weakened. At the same time, the world barrier will be strengthened for now. This will be your best opportunity to consolidate power... Be sure to achieve your goals for this world while you still can, as the era of chaos will only intensify in the future.[/i]\n\n\nThe same message was undoubtedly sent to every Minor Deity. It seemed more urgent than ever before to prepare for possible conflicts approaching your Domain. Even if you didn't have to confront any of the Minor Deities directly, the Nether would likely not stay idle for long either. Regardless, the age of peaceful development was about to be over, and the future of the world would be decided by your actions.\n\n*page_break\n\nSince there was no need to defend the world barrier, for the time being, you quickly moved back to your Domain. It had already been left alone for quite some time from a mortal's perspective.\n\n\nWhat you saw after approaching it was a swarm of tiny souls flying toward you. \n\n*page_break\n\n*if (after_death_system = \"reincarnation\")\n\t*set faith +10\n\t\n\t[b]Faith increased...[/b]\n\t\n\t\n\tAfter getting closer to you, they swiftly returned to your Domain. Their cycle of reincarnation would continue forever.\n\n*if (after_death_system = \"divine host\")\n\t*set faith +5\n\t*set divinity +200\n\t\n\t[b]Divinity increased...[/b]\n\t\n\t\n\tAfter getting closer to you, they stayed with you as divine spirits. They would continue to support your divinity forever.\n\n*if (after_death_system = \"guardian spirits\")\n\t*set faith +5\n\t*set templars +150\n\t\n\t[b]Power of Templars increased...[/b]\n\t\n\t\n\tAfter getting closer to you, they swiftly returned to your Domain. They would continue to defend your Domain forever.\n\n*page_break\n\nThere was one, however, that approached you alone after the others. It was by far the most divine soul among them.\n\n\n*if (after_death_system = \"reincarnation\")\n\t\n\tIt was none other than your first Oracle, further strengthened by many reincarnations and clearly still possessing memories of the past.\n\n*if (after_death_system = \"divine host\")\n\t\n\tIt was none other than your first Oracle, who had supported you in the divine realm for a long time.\n\n*if (after_death_system = \"guardian spirits\")\n\t\n\tIt was none other than your first Oracle, back from a lengthy period of protecting your Domain as a spirit.\n\n\n[i]My Lord, I have returned to serve You directly once more. Now that my divinity and wisdom have grown over time, I can be of much more use to You. Allow me to guide Your people through this crisis that is approaching them... as Your true Oracle.[/i]\n\n*page_break\n\nThere was no comparable soul to this anywhere else within your Domain. In truth, this was already no longer a mortal soul, but closer to a Lesser Deity. It would become a major asset for the difficult cycles ahead.\n\n\nWithout further delay, your first Oracle also became your third Oracle. Instead of being born into a regular mortal body, the soul was transferred into an immortal form made of divinium. That way, it would be possible for your Oracle to represent you without pause for as long as needed. Before you returned to the Domain, your new Oracle would have time to take care of all the trivial issues for your sake.\n\n*page_break\n\nSoon after handling the souls of your mortal followers, you entered the barrier of your own Domain, which was already noticeably weakened. It would not be difficult at all for one of the other Minor Deities to enter your Domain at this rate.\n\n\nMany, many cycles had already passed during your recent absence. It did not feel like such a long time from your perspective, yet your faithful believers had gone through several generations. None who were currently alive had even known a time when you were still active.\n\n\nYou immediately entered your main temple, where the new Oracle was already waiting for you.\n\n*page_break\n\nThis time, your Oracle was not accompanied by anyone else to meet you... excluding the dozens of Templars who were standing guard outside the temple.\n\n\n*if (loved >= 50)\n\t*if (government_type = \"theocracy\")\n\t\t\"I have come to inform You, our Lord, of the events during Your absence. The most important one was the appearance of a fake Oracle which happened dozens of cycles ago. Of course, the Templars never fell for the ruse, but many others were fooled. After the truth was revealed, we exiled the liar and forgave those who were tricked, as an expression of Your mercifulness. The Templars have greatly expanded their influence since those days, gradually replacing the old priest-led order. Once I returned as a true Oracle in my new divine form, I became the supreme leader of our religion. I had no objections, since I could convey Your will more easily that way. In addition, several unholy incursions have been repelled, and many dark cultists and spies from other lands have been captured as well.\"\n\t*if (government_type = \"secular\")\n\t\t\"I have come to inform You, our Lord, of the events during Your absence. The most important one was the appearance of a fake Oracle which happened dozens of cycles ago. Of course, the Templars never fell for the ruse, but many others were fooled. After the truth was revealed, we exiled the liar and forgave those who were tricked, as an expression of Your mercifulness. The Templars have greatly expanded their influence since those days, gradually replacing the old secular order. Once I returned as a true Oracle in my new divine form, I became the supreme leader of our religion. I had no objections, since I could convey Your will more easily that way. In addition, several unholy incursions have been repelled, and many dark cultists and spies from other lands have been captured as well.\"\n\t\t\n*if (loved \u003c 50)\n\t*if (government_type = \"theocracy\")\n\t\t\"I have come to inform You, our Lord, of the events during Your absence. The most important one was the appearance of a fake Oracle which happened dozens of cycles ago. Of course, the Templars never fell for the ruse, but many others were fooled. After the truth was revealed, we executed the liar and punished those who were tricked. The Templars have greatly expanded their influence since those days, gradually replacing the old priest-led order. Once I returned as a true Oracle in my new divine form, I became the supreme leader of our religion. I had no objections, since I could convey Your will more easily that way. In addition, several unholy incursions have been repelled, and many dark cultists and spies from other lands have been captured as well.\"\n\t*if (government_type = \"secular\")\n\t\t\"I have come to inform You, our Lord, of the events during Your absence. The most important one was the appearance of a fake Oracle which happened dozens of cycles ago. Of course, the Templars never fell for the ruse, but many others were fooled. After the truth was revealed, we executed the liar and punished those who were tricked. The Templars have greatly expanded their influence since those days, gradually replacing the old secular order. Once I returned as a true Oracle in my new divine form, I became the supreme leader of our religion. I had no objections, since I could convey Your will more easily that way. In addition, several unholy incursions have been repelled, and many dark cultists and spies from other lands have been captured as well.\"\n\n\nMuch had occurred while you were gone. Fortunately, there were no major long-term obstacles for your religion's development, and the Templars had served you well.\n\n*page_break\n\n*if (other_deities_stance = \"deities\")\n\t\n\t\"Tensions between us and the outsider religions have slowly grown over time. It would not be an exaggeration to say that a major conflict might soon be upon us. Perhaps there is still some room for peace, however limited in shape it may be. Of course, were You to command us, we would not hesitate to fight any of them.\"\n\t\n\t\n\tIt would be difficult to change your stance on the other Minor Deities at this point. Your Domain had already become used to treating them like true deities, so unless you continued that approach, faith in you might be shaken.\n\t\n*if (other_deities_stance = \"superstition\")\n\t\n\t\"Tensions between us and the outsider pagans have slowly grown over time. It would not be an exaggeration to say that a major conflict might soon be upon us. Of course, were You to command us, we would not hesitate to fight any of them.\"\n\t\n\t\n\tIt would be difficult to change your stance on the other Minor Deities at this point. Your Domain had already become used to treating their followers as pagans, so unless you continued that approach, faith in you might be shaken.\n\t\n*if (other_deities_stance = \"blasphemy\")\n\t\n\t\"Tensions between us and the outsider blasphemers have slowly grown over time. It would not be an exaggeration to say that a major conflict might soon be upon us. Of course, were You to command us, we would not hesitate to fight any of them.\"\n\t\n\t\n\tIt would be difficult to change your stance on the other Minor Deities at this point. Your Domain had already become used to treating their followers as blasphemers, so unless you continued that approach, faith in you might be shaken.\n\n*page_break\n\n*image map.jpg\n\nWith the Domain barriers becoming weaker than ever, and the world barrier being strengthened for now, the Originator had launched a great power struggle over the whole continent. You could only hope for the best — while preparing for the inevitable turmoil to come.\n\n*page_break\n\n[b]The turn-based final phase of the story will now begin. Various paths to reach an ending are possible, with very different win conditions and story elements for all of them.[/b]\n\n\n[b]There is no strictly right or wrong answer to most choices. However, being erased from existence can be considered \"losing\" the game.[/b]\n\n*label cycle_start\n\n*set chapter3_update_origin \"cycle_start\"\n\n*goto update_deity_relations\n\n*label cycle_start_after_deity_relationships_update\n\n*page_break\n\n*if (cycle = 1)\n\t*comment \n\t*if ((subicim_text = \"Hostile\") and (templars \u003c 1200))\n\t\t*set subicim -75\n\t\t\n\t\tA secret message from Subicim was delivered to you by your Oracle.\n\t\t\n\t\t\n\t\t[i]Your Domain is currently too weak to survive the approaching turmoil, and your behavior has also been too detestable. I declare now that your Domain will soon belong to me. If you wish to struggle, now is your last chance to prepare.[/i]\n\t\t\n\t\t*goto after_subicim_start_letter\n\t*elseif (subicim_text = \"Hostile\")\n\t\t*set subicim -75\n\t\t\n\t\tA secret message from Subicim was delivered to you by your Oracle.\n\t\t\n\t\t\n\t\t[i]Your behavior so far has been too detestable. I declare now that your Domain will soon belong to me. If you wish to struggle, now is your last chance to prepare.[/i]\n\t\t\n\t\t*goto after_subicim_start_letter\n\t*elseif (templars \u003c 1200)\n\t\t*set subicim -75\n\t\t\n\t\tA secret message from Subicim was delivered to you by your Oracle.\n\t\t\n\t\t\n\t\t[i]Your Domain is currently too weak to survive the approaching turmoil. I declare now that it will soon belong to me. If you wish to struggle, now is your last chance to prepare.[/i]\n\t\t\n\t\t*goto after_subicim_start_letter\n\t*else\n\t\t*set subicim +30\n\t\t\n\t\t*check_achievements\n\t\t*if not(choice_achieved_pacification)\n\t\t\t*achieve pacification\n\t\t\n\t\tA secret message from Subicim was delivered to you by your Oracle.\n\t\t\n\t\t\n\t\t[i]Your Domain is currently barely strong enough to survive the approaching turmoil. In addition, your behavior has been decent enough to earn my approval. I wish that you will crush the cowardly Fiel with all your might, while I focus on destroying Davalon.[/i]\n\t\t\n\t\t*goto after_subicim_start_letter\n\t\n\t*label after_subicim_start_letter\n\t\n\t*page_break\n\t\n\t*if (fiel_text = \"Hostile\")\n\t\t*set fiel -10\n\t\t\n\t\tA secret message from Fiel was delivered to you by your Oracle.\n\t\t\n\t\t\n\t\t[i]In order to prevent your existence from ultimately being erased, avoid interfering with my future activities within your Domain. That is all you need to do to avoid my wrath.[/i]\n\t\t\n\t\t*goto after_fiel_start_letter\n\t*elseif (fiel_text = \"Neutral\")\n\t\t\n\t\tA secret message from Fiel was delivered to you by your Oracle.\n\t\t\n\t\t\n\t\t[i]There will be no actions from my servants against your Domain. For now. If you can defeat Subicim's forces, that will be a great service to the world.[/i]\n\t\t\n\t\t*goto after_fiel_start_letter\n\t*elseif (fiel_text = \"Friendly\")\n\t\t*set fiel +10\n\t\t\n\t\tA secret message from Fiel was delivered to you by your Oracle.\n\t\t\n\t\t\n\t\t[i]There will be no actions from my servants against your Domain. If you can defeat Subicim's forces, that will be a great service to the world.[/i]\n\t\t\n\t\t*goto after_fiel_start_letter\n\t\n*label after_fiel_start_letter\n\n*if (cycle = 3)\n\t\n\tThere were worrying signs of dark cultists, dangerous agents of the Nether, acting within your Domain.\n\t\n\t*choice\n\t\t#Ignore them (???)\n\t\t\t*goto after_cycle3event\n\t\t#Order your Templars to search for them (-1 Cycle)\n\t\t\t*set cultists_found \"yes\"\n\t\t\tIt required some time and effort, but your Templars eventually caught and executed all of them.\n\t\t\t*goto resolve_events_after_player_cycle\n\t\t*selectable_if (divinity >= 50) #Search for them personally (-50 Divinity)\n\t\t\t*set cultists_found \"yes\"\n\t\t\t*set divinity -50\n\t\t\tYou quickly found all of them by spreading your divinity around the Domain, and they were soon executed by your Templars.\n\t\t\t*goto after_cycle3event\n\n*label after_cycle3event\n\n*if (cycle = 5)\n\t\n\tA secret message from Quanom was delivered to you by your Oracle.\n\t\n\t\n\t[i]You must support me in my holy war against Asiel. This will also be my final test to determine your true allegiance. A group of my missionaries will soon come to your Domain, and if you haven't strayed from the divine path, you will allow them free passage to your Domain.[/i]\n\t\n\t*choice\n\t\t#Accept the request\n\t\t\t*set quanom +20\n\t\t\t*set faith -10\n\t\t\t*set quanom_faith +10\n\t\t\tYou commanded your Oracle to treat Quanom's followers as valued guests.\n\t\t\t*goto after_cycle5event\n\t\t#Deny it\n\t\t\t*set quanom -20\n\t\t\tYou commanded your Oracle to treat Quanom's followers as trespassers.\n\t\t\t*goto after_cycle5event\n\n*label after_cycle5event\t\t\t\n\n*if ((cycle = 10) and (nether_invasion_activated = \"no\"))\n\t*if (memmon_fate = \"?\")\n\t\tSomething very ominous appeared to be happening beyond Fiel's Domain. Was it Memmon's doing...?\n\t\t\n\t\t\n\t\tYou could sense that there wasn't much time left until something irreversible happened.\n\t\n\n*if (cycle = 15)\n\t*if ((memmon_fate = \"?\") and (nether_invasion_activated = \"no\"))\n\t\t*goto nether_invasion_begins\n\n*if (cycle = 25)\n\t*if (memmon_fate = \"?\")\n\t\t*set memmon_templars +500\n\t\tMemmon's army of Shadows grows even stronger...!\n\n*if (cycle = 500)\n\t*ending\n\t\n*page_break\n\n*if (cycle >= 2)\n\t\n\t*if ((subicim_fate = \"?\") and (subicim_text = \"Hostile\"))\n\t\tSubicim sent a force of Templars to attack your Domain...\n\t\t*temp templars_loss round(subicim_templars / 20)\n\t\t*temp target_templars_loss round(templars / 20)\n\t\t*if (templars_loss > 50)\n\t\t\t*set templars_loss 50\n\t\t\n\t\t*if (divine_artifact = \"shield\")\n\t\t\t[b]The divine shield's power prevented many of your casualties.[/b]\n\t\t\t*set templars_loss round(0.5 * templars_loss)\n\t\t\n\t\t*if (divine_artifact = \"sword\")\n\t\t\t[b]The divine sword's power prevented some of your casualties.[/b]\n\t\t\t*set templars_loss round(0.75 * templars_loss)\n\t\t\t\n\t\t*set templars -templars_loss\n\t\t*set subicim_templars -target_templars_loss\n\t\t\n\t\t[b]You lost ${templars_loss} Templars while Subicim lost ${target_templars_loss} Templars.[/b]\n\t\t\n\t\t*page_break\n\t\n\t*if ((fiel_fate = \"?\") and (fiel_text = \"Hostile\"))\n\t\tFiel sent people to your Domain to secretly spread their faith...\n\t\t*temp faith_loss (fiel_faith - faith)\n\t\t*if (faith_loss > 30)\n\t\t\t*set faith_loss 30\n\t\t\n\t\t*set faith_loss round(faith_loss / 10)\n\t\t\n\t\t*if (faith_loss \u003c= 0)\n\t\t\t*set faith_loss 1\n\t\t\n\t\t[b]You lost ${faith_loss} faith to Fiel.[/b]\n\t\t*set faith -faith_loss\n\t\t*set fiel_faith +faith_loss\n\t\t\n\t\t*page_break\n\n\t*if ((memmon_fate = \"?\") and (nether_invasion_activated = \"yes\"))\n\t\tShadows summoned by Memmon rampaged against your believers...\n\t\t*temp templars_loss round(memmon_templars / 10)\n\t\t*set templars -templars_loss\n\t\t\n\t\t*if (divine_artifact = \"shield\")\n\t\t\t[b]The divine shield's power prevented many of your casualties.[/b]\n\t\t\t*set templars_loss round(0.5 * templars_loss)\n\t\t\n\t\t*if (divine_artifact = \"sword\")\n\t\t\t[b]The divine sword's power prevented some of your casualties.[/b]\n\t\t\t*set templars_loss round(0.75 * templars_loss)\n\t\t\n\t\t[b]You lost ${templars_loss} Templars to the onslaught of Shadows.[/b]\n\t\t\n\t\t*if ((templars_loss * 3) >= templars)\n\t\t\t*set morale -1\n\t\t\t[b]The morale of your Domain has fallen...![/b]\n\t\t\n\t\t*if (morale \u003c 0)\n\t\t\t*page_break\n\t\t\t\n\t\t\tYou had lost the fight against Memmon's Nether army.\n\t\t\t\n\t\t\t\n\t\t\tAs your Domain barrier lost its remaining power, Memmon launched a direct attack against you without any hesitation. Receiving that attack destroyed most of your divinity.\n\t\t\t*goto erased\n\t\t\n\t\t*page_break\n\t\n\t*if ((subicim_fate != \"?\") and (davalon_text = \"Hostile\"))\n\t\tDavalon sent a small force of Templars to attack your Domain...\n\t\t*temp templars_loss round(davalon_templars / 50)\n\t\t*temp davalon_templars_loss round(templars / 50)\n\t\t\n\t\t*if (divine_artifact = \"shield\")\n\t\t\t[b]The divine shield's power prevented many of your casualties.[/b]\n\t\t\t*set templars_loss round(0.5 * templars_loss)\n\t\t\n\t\t*if (divine_artifact = \"sword\")\n\t\t\t[b]The divine sword's power prevented some of your casualties.[/b]\n\t\t\t*set templars_loss round(0.75 * templars_loss)\n\t\t\t\n\t\t*set templars -templars_loss\n\t\t*set davalon_templars -davalon_templars_loss\n\t\t\n\t\t[b]You lost ${templars_loss} Templars while Davalon lost ${davalon_templars_loss} Templars.[/b]\n\t\n\t*page_break\n\t\n\t*if ((quanom_fate = \"?\") and (memmon_fate != \"?\"))\n\t\tQuanom sent people to your Domain to secretly spread their faith...\n\t\t*temp faith_loss (quanom_faith - faith)\n\t\t\n\t\t*set faith_loss round(faith_loss / 10)\n\t\t\n\t\t*if (faith_loss \u003c= 0)\n\t\t\t*set faith_loss 1\n\t\t\n\t\t[b]You lost ${faith_loss} faith to Quanom.[/b]\n\t\t*set faith -faith_loss\n\t\t*set fiel_faith +faith_loss\n\t\t\n\t\t*if ((faith_loss * 3) >= faith)\n\t\t\t*set morale -1\n\t\t\t[b]The morale of your Domain has fallen...![/b]\n\t\t\n\t\t*if (morale \u003c 0)\n\t\t\t*page_break\n\t\t\t\n\t\t\tYou had lost the fight against Quanom and Davalon.\n\t\t\t\n\t\t\t\n\t\t\tAs your Domain barrier lost its remaining power, Quanom launched a massive divine attack against you without any hesitation. Receiving that attack destroyed most of your divinity.\n\t\t\t*goto erased\n\t\t\n\t\t*page_break\n\n*label free_actions\n\n*if (morale = 0)\n\t*set morale_text \"Collapsed\"\n*if (morale = 1)\n\t*set morale_text \"Weak\"\n*if (morale = 2)\n\t*set morale_text \"Stable\"\n*if (morale = 3)\n\t*set morale_text \"Strong\"\n\n*if (fiel_morale = 0)\n\t*set fiel_morale_text \"Collapsed\"\n*if (fiel_morale = 1)\n\t*set fiel_morale_text \"Weak\"\n*if (fiel_morale = 2)\n\t*set fiel_morale_text \"Stable\"\n*if (fiel_morale = 3)\n\t*set fiel_morale_text \"Strong\"\n\n*if (subicim_morale = 0)\n\t*set subicim_morale_text \"Collapsed\"\n*if (subicim_morale = 1)\n\t*set subicim_morale_text \"Weak\"\n*if (subicim_morale = 2)\n\t*set subicim_morale_text \"Stable\"\n*if (subicim_morale = 3)\n\t*set subicim_morale_text \"Strong\"\n\n*if (davalon_morale = 0)\n\t*set davalon_morale_text \"Collapsed\"\n*if (davalon_morale = 1)\n\t*set davalon_morale_text \"Weak\"\n*if (davalon_morale = 2)\n\t*set davalon_morale_text \"Stable\"\n*if (davalon_morale = 3)\n\t*set davalon_morale_text \"Strong\"\n\n*if (memmon_morale = 0)\n\t*set memmon_morale_text \"Collapsed\"\n*if (memmon_morale = 1)\n\t*set memmon_morale_text \"Weak\"\n*if (memmon_morale = 2)\n\t*set memmon_morale_text \"Stable\"\n*if (memmon_morale = 3)\n\t*set memmon_morale_text \"Strong\"\n\t\n*if (asiel_morale = 0)\n\t*set asiel_morale_text \"Collapsed\"\n*if (asiel_morale = 1)\n\t*set asiel_morale_text \"Weak\"\n*if (asiel_morale = 2)\n\t*set asiel_morale_text \"Stable\"\n*if (asiel_morale = 3)\n\t*set asiel_morale_text \"Strong\"\n\n*if (quanom_morale = 0)\n\t*set quanom_morale_text \"Collapsed\"\n*if (quanom_morale = 1)\n\t*set quanom_morale_text \"Weak\"\n*if (quanom_morale = 2)\n\t*set quanom_morale_text \"Stable\"\n*if (quanom_morale = 3)\n\t*set quanom_morale_text \"Strong\"\n\n*set divinity +faith\n*set faith +2\n*set templars +25\n\n*set subicim_faith +1\n*set subicim_templars +50\n\n*set fiel_faith +4\n*set fiel_templars +10\n\n*set memmon_faith +1\n*set memmon_templars +10\n\n*set davalon_faith +2\n*set davalon_templars +10\n\n*set asiel_faith +4\n*set asiel_templars +20\n\n*set quanom_faith +5\n*set quanom_templars +10\n\n*temp selected_target \"?\"\n\n*page_break\n\nCycle: [b]${cycle}[/b]\n\n\n[b]Faith[/b] creates [b]divinity[/b] for you at the start of every cycle. [b]Divinity[/b] can be used for various purposes such as divine attacks. [b]Templars[/b] can defend your Domain or attack hostile Domains. [b]Morale[/b] describes your Domain's current ability to resist divine attacks.\n\n\nFaith: [b]${faith}[/b]\n\n\nDivinity: [b]${divinity}[/b]\n\n\nTemplars: [b]${templars}[/b]\n\n\nMorale: [b]${morale_text}[/b]\n\n*choice\n\t#Train Priests (+5 Faith)\n\t\t*set faith +5\n\t\t*goto resolve_events_after_player_cycle\n\t#Train Templars (+100 Templars)\n\t\t*set templars +100\n\t\t*goto resolve_events_after_player_cycle\n\t*if ((cycle >= 2) and (subicim_fate = \"?\")) #Target: Subicim (Morale: [b]${subicim_morale_text}[/b])\n\t\t*set selected_target \"subicim\"\n\t\t*goto resolve_offensive_operation\n\t*if ((cycle >= 2) and (fiel_fate = \"?\")) #Target: Fiel (Morale: [b]${fiel_morale_text}[/b])\n\t\t*set selected_target \"fiel\"\n\t\t*goto resolve_offensive_operation\n\t*if ((memmon_fate = \"?\") and (fiel_fate != \"?\")) #Target: Memmon (Morale: [b]${memmon_morale_text}[/b])\n\t\t*set selected_target \"memmon\"\n\t\t*goto resolve_offensive_operation\n\t*if ((quanom_fate = \"?\") and (memmon_fate != \"?\")) #Target: Quanom (Morale: [b]${quanom_morale_text}[/b])\n\t\t*set selected_target \"quanom\"\n\t\t*goto resolve_offensive_operation\n\n*label resolve_offensive_operation\n\n*if (selected_target = \"subicim\")\n\t\n\t[b]Proselytizing[/b] causes your religion to secretly spread in the target Domain (results depend on faith). [b]Invasion[/b] orders your Templars to attack the target Domain (results depend on Templar strength). [b]Divine Attack[/b] launches a fatal attack against the target Minor Deity using your divinity (requires low Morale). Morale is affected by suffering such crippling losses that total exhaustion is near (from Proselytizing or Invasion).\n\t\n\t\n\tYour current target is [b]Subicim's Domain[/b].\n\t\n\t\n\tMorale: [b]${subicim_morale_text}[/b] - Faith: [b]${subicim_faith}[/b] - Templars: [b]${subicim_templars}[/b]\n\t\n\t\n\tSpecialty: Templar battles\n\t\n\t*temp expected_conversion \"Some conversion\"\n\t*temp expected_invasion \"Unfavorable battle\"\n\t*temp expected_divine_attack \"No effect\"\n\t\n\t*temp divine_attack_divinity 500\n\t\n\t*if (subicim_morale = 0)\n\t\t*set expected_divine_attack \"${divine_attack_divinity} divinity required for a decisive attack...!\"\n\t\n\t*if ((subicim_faith - faith) >= 0)\n\t\t*set expected_conversion \"Weak conversion\"\n\t\n\t*if ((faith - subicim_faith) > subicim_faith)\n\t\t*set expected_conversion \"High conversion\"\n\t\n\t*if (subicim_templars \u003c templars)\n\t\t*set expected_invasion \"Favorable battle\"\n\t\n\t*choice\n\t\t#Return\n\t\t\t*goto free_actions\n\t\t*if (subicim_morale > 0) #Proselytizing (likely outcome: ${expected_conversion})\n\t\t\t*set subicim -10\n\t\t\tYou sent believers to spread your faith...\n\t\t\t*temp faith_loss (faith - subicim_faith)\n\t\t\t\n\t\t\t*set faith_loss round(faith_loss / 10)\n\t\t\t\n\t\t\t*if (faith_loss \u003c= 0)\n\t\t\t\t*set faith_loss 1\n\n\t\t\t[b]You converted ${faith_loss} faith from Subicim.[/b]\n\t\t\t*set faith +faith_loss\n\t\t\t*set subicim_faith -faith_loss\n\t\t\t\n\t\t\t*if ((faith_loss * 3) >= subicim_faith)\n\t\t\t\t*set subicim_morale -1\n\t\t\t\t[b]The morale of Subicim's Domain has fallen...![/b]\n\t\t\t\n\t\t\t*goto resolve_events_after_player_cycle\n\t\t*if (subicim_morale > 0) #Invasion (likely outcome: ${expected_invasion})\n\t\t\t*set subicim -30\n\t\t\tYou sent a force of Templars to attack...\n\t\t\t*temp templars_loss round(subicim_templars / 20)\n\t\t\t*temp target_templars_loss round(templars / 20)\n\t\t\t*set templars -templars_loss\n\t\t\t*set subicim_templars -target_templars_loss\n\t\t\t\n\t\t\t*if (divine_artifact = \"spear\")\n\t\t\t\t[b]The divine spear's power greatly increased enemy casualties.[/b]\n\t\t\t\t*set target_templars_loss round(2 * target_templars_loss)\n\t\t\t\n\t\t\t*if (divine_artifact = \"sword\")\n\t\t\t\t[b]The divine sword's power increased enemy casualties.[/b]\n\t\t\t\t*set target_templars_loss round(1.5 * target_templars_loss)\n\t\t\t\n\t\t\t[b]Subicim lost ${target_templars_loss} Templars while you lost ${templars_loss} Templars.[/b]\n\t\t\t\n\t\t\t*if ((target_templars_loss * 3) >= subicim_templars)\n\t\t\t\t*set subicim_morale -1\n\t\t\t\t[b]The morale of Subicim's Domain has fallen...![/b]\n\t\t\t\n\t\t\t*goto resolve_events_after_player_cycle\n\t\t*selectable_if ((subicim_morale = 0) and (divinity >= divine_attack_divinity)) #Divine Attack (likely outcome: ${expected_divine_attack})\n\t\t\t*set divinity -divine_attack_divinity\n\t\t\t*set morale 3\n\t\t\t\n\t\t\tThe barrier around Subicim's Domain collapsed, and Subicim was struck directly by your divinity. You had won the divine battle.\n\t\t\t\n\t\t\t\n\t\t\t[i]I thought you were a weakling, but now I see how misguided my thoughts have been. I won't complain no matter what my fate is. If I can help you in your conquest, I will be more than satisfied.[/i]\n\t\t\t\n\t\t\t\n\t\t\tEither option would give you control over Subicim's Domain and an upgrade to your divinity. Subjugating Subicim would increase the power of your Templars slightly while erasing Subicim would increase the faith of your believers slightly.\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#Subjugate\n\t\t\t\t\t*check_achievements\n\t\t\t\t\t*if not(choice_achieved_subjugate)\n\t\t\t\t\t\t*achieve subjugate\n\t\t\t\t\t*set subicim_fate \"Subjugated\"\n\t\t\t\t\t*set subicim_defeater \"you\"\n\t\t\t\t\t*set divinity +200\n\t\t\t\t\t*set faith +5\n\t\t\t\t\t*set t
