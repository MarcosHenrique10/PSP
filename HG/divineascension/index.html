ir visually impressive arrival, you could only try to guess their purpose in coming here. It had to be related to the village's crisis that you had vaguely heard about.\n\n*page_break\n\nOne of the village's elder residents, apparently a distant relative of your possessed body, stepped forward quite bravely.\n\n\n\"Are you here about that again? We will never abandon our homes, even if you say that it's in the name of ${name}. We at least need a reason, or better yet, Their will conveyed in a way that we can accept. We have worked so many cycles to create our own place here... you can't just take it away like it's nothing.\"\n\n\nOne of them immediately approached the complaining villager. There were no violent gestures at all, yet the mere impression of swift movement in heavy armor was rather imposing on its own.\n\n\n\"You've already had several opportunities to leave this village until now. The reason... is not something you need to know. In the end, we are only executing our Lord's will. I believe you have been offered sufficient compensation as well. This is our last warning, and if you still remain stubborn, we won't hesitate to use force.\"\n\n*page_break\n\nIt appeared that the conflict was about the villagers being forcibly removed from their homes in the near future. It was difficult to judge if it was a reasonable command or not, since the motivations were entirely unknown. The only clue was that it was supposedly based on something that you had ordered previously. What could the reason possibly be?\n\n\nNow that you were in fact present at the scene, you could simply order the truth to be revealed. Exposing your hidden identity would mean the end of your current investigation plan, though, and cause quite a commotion in the area. On the other hand, a miracle like that occurring could gather more faith for you, as well.\n\n\nDivinity: [b]${divinity}[/b]\n\n*choice\n\t#Remain hidden without intervention\n\t\t*set templars +50\n\t\t*set observing +1\n\t\t*set intimate -1\n\t\t*set loved -1\n\t\t\n\t\tYou should let your holy warriors accomplish their mission and worry about their reasons later. It would be easy to find out why they were sent here by simply asking your new Oracle soon enough. If it was not justified, you could always compensate them for their suffering. As long they remained alive, it would never be too late for regret.\n\t\t\n\t\t\n\t\tSome of the villagers were especially stubborn and refused to obey even after being threatened with force. Of course, the outcome was already clear before the conflict escalated to that point: the Templars immediately took away the rebellious villagers without any effective resistance. They would apparently be arrested until the mission was completed, whereas the nature of their mission remained unknown.\n\t\t\n\t\t\n\t\tAll of you were taken to temporary shelters in the nearest town. If nothing else, at least you were all given a large amount of gold as compensation for the loss of your homes. It didn't seem like returning there would ever be an option. All in all, your community was now shattered and headed to drifting further apart, but none of you would starve in the foreseeable future.\n\t\t\n\t\t*goto commoner_view_end\n\t#Show your divinity to reveal the reason for their actions (-1 Divinity)\n\t\t*set divinity -1\n\t\t*set faith +1\n\t\t*set intimate +1\n\t\t*set observing -1\n\t\t\n\t\tAfter making your decision, it was a simple matter to prove your true identity. All it required was to stop hiding your divinity from the surroundings, and as soon as you did so, everyone around you turned to looked at you in awe.\n\t\t\n\t\t\n\t\t\"I have been possessing this body for some time now. As your highest authority, Templars, I order you to explain the reasoning for your recent actions. After you have given your explanation, I will decide if it is in fact justified.\"\n\t\t\n\t\t\n\t\tThe shocked Templars in front of you immediately kneeled and bowed their heads respectfully. You were the highest entity in their whole religion, after all, so it was entirely natural that they would give priority to your words.\n\t\t\n\t\t\n\t\tOne of them soon looked at you again, eyes full of deep reverence, and started explaining the situation.\n\t\t\n\t\t\n\t\t\"This is all because of the threat of those unholy monsters from beyond our realm. We managed to destroy one of them, but we also suffered some losses, and several of them escaped our grasp. After that happened, we've been searching for new ways to expand our strength as a fighting force. The best way we thought of was to improve our weapons and armor with a metal known as divinium: it has amazing properties such as increasing the effectiveness of our divine powers. Unfortunately, only three sources of it have been found, and they are all severely limited in quantity. One of the divinium ore deposits is almost exactly under this village, and there is no choice but to raze the village in order to access it. This is necessary in order to protect the Domain in Your place, as You ordered, but we will obey Your decision whatever it is.\"\n\t\t\n\t\t\n\t\tSo that was the truth. Knowing that, it would damage the strength of your Domain's defenses to protect the village. However, expanding the power of your warriors was not possible only by doing this, and you could also bless them more in the future instead. Faith and divinity would likely end up being more crucial than their physical equipment. Even so, it should be safer to increase their power by any means possible...\n\t\t\n\t\t*choice\n\t\t\t#Let the village be destroyed (+Templars)\n\t\t\t\t*set templars +50\n\t\t\t\t*set loved -1\n\t\t\t\t\n\t\t\t\tYou should let the Templars proceed with their mission for the benefit of the whole Domain. After all, what did one small village matter compared to increasing the safety of your many believers?\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\"You may continue your mission as planned. Even though I'm powerful, I cannot be everywhere at once, so it is important for you to be able to defend yourself against any unexpected threats. As compensation, the villagers must be treated as being especially blessed by me. They should never have to suffer hunger or homelessness.\"\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tNobody complained after your decision. All of the villagers were taken to temporary shelters in the nearest town, and they were given an unbelievably large amount of gold as compensation for the loss of their homes. They could never return to their previous homes, but at least they wouldn't have to starve, and they seemed to accept it quite a bit better since you were the one to directly make the decision.\n\t\t\t\t\n\t\t\t\t*goto commoner_view_end\n\t\t\t#Intervene to save the village\n\t\t\t\t*set loved +1\n\t\t\t\t*set observing -1\n\t\t\t\t\n\t\t\t\tThe logical choice in this case was not to intervene, but as their religious object of faith, it would be better not to confess the limits of your abilities. Your believers might feel safer knowing that you would protect them even without making such a personal sacrifice.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\"I understand your reason for doing this, but it is not necessary. I have been absent from this realm for some cycles, but now my absence is over, and I will handle this problem personally. I will also bless you, my loyal warriors, with even more power in the future. You may have felt insufficient, and justifiably sought more power at the expense of my dear believers, but even without going to such lengths, I will ensure that you will remain safe.\"\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tThe expressions of both the Templars and the villagers brightened immediately. Yes, even at the cost of some of your divinity, it was worth it. Your flock should not need to suffer due to your lack of ability.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tYour mission to observe this small village had accidentally resulted in saving it from destruction.\n\t\t\t\t\n\t\t\t\t*goto commoner_view_end\n\n*label commoner_view_end\n\n*page_break\n\nThere didn't seem to be anything meaningful left to observe, after witnessing the regular lifestyle of your believers and even obtaining some pieces of interesting information.\n\n\nConcluding so, you swiftly stopped your possession in order to search for a new Oracle candidate. Your former host was left profoundly changed by the mystical experience.\n\n*label investigation_end\n\n*page_break\n\nYou began the search for a new candidate without delay.\n\n\nAs anticipated, it was not common for one of your people to have the aptitude to become an Oracle, yet it was not terribly difficult to find one who did. You could easily detect anyone with high enough potential within your Domain by simply observing the whole area.\n\n\nThere were actually two viable candidates for the role this time. Was it thanks to the Domain's increased faith or growing population? Either way, there was no meaningful difference between the two in terms of aptitude or faith.\n\n\nThe main difference between them was simply that one of them was a priest and the other one was a warrior. Could that influence religious policy going forward? Perhaps, but likely not in a radical way.\n\n*choice\n\t#Priest candidate\n\t\t*set faith +2\n\t\t\n\t\tThe safer pick for increasing your divinity would be the priest candidate. There should be no problems with religious activities with an experienced priest as your Oracle.\n\t\t\n\t\t\n\t\tYou immediately sent a divine message along with a minor blessing to prove their new role in your religion. The message also included an order to gather the Domain's leaders to listen to your words at the main temple of your religion. \n\t\t\n\t\t\n\t\tIt was time to handle the issue of this invasion from the Nether.\n\t\t\n\t\t*goto after_oracle_pick\n\t#Warrior candidate\n\t\t*set templars +50\n\t\t\n\t\tThe safer pick for protecting your Domain would be the warrior candidate. There should be no problems with expanding the power of the Templars with an experienced warrior as your Oracle.\n\t\t\n\t\t\n\t\tYou immediately sent a divine message along with a minor blessing to prove their new role in your religion. The message also included an order to gather the Domain's leaders to listen to your words at the main temple of your religion. \n\t\t\n\t\t\n\t\tIt was time to handle the issue of this invasion from the Nether.\n\n*label after_oracle_pick\n\n*page_break\n\nA new Oracle had suddenly appeared, which meant that both chaos and celebratory mood were spreading within the Domain. For now, it was mainly felt among the elites of your religion. They were trying to swiftly obey your order of summoning the Domain's leaders, as well as welcoming the new Oracle to interpret your will.\n\n\nYou had already entered the grand temple of your religion in advance. It should not take long for your audience to arrive.\n\n\n*if (government_type = \"theocracy\")\n\tAs expected, the temple was soon full of important people from your Domain. The new Oracle and the Templar Commander were obviously present, along with many high-ranking priests and Templars. They all immediately kneeled deeply as they felt your divine presence.\n\n*if (government_type = \"secular\")\n\tAs expected, the temple was soon full of important people from your Domain. The new Oracle and the Templar Commander were obviously present, along with many powerful bureaucrats and merchants who managed your Domain. They all immediately kneeled deeply as they felt your divine presence.\n\n*page_break\n\nYour Oracle, despite being new at the role, was still a former high-ranking member of your religion. They were already wearing a ceremonial robe hiding their identity, focusing everyone's attention purely on their public role and divine mission. Compared to the old life they had lived until now, this new role was far more meaningful.\n\n\nThe rest of them remained kneeling in submissive postures while the Oracle turned to look at you directly.\n\n\n*if (loved >= 50)\n\t\"We have gathered as You commanded. Despite this unholy invasion against us, we are filled with hope after Your return to guide us. Lead us to deal with them as You see fit!\"\n\n*if (loved \u003c 50)\n\t\"We have gathered as You commanded. Despite this unholy invasion against us, we are filled with confidence after Your return to vanquish the evil for good. Lead us to deal with them as You see fit!\"\n\n\nThe new Oracle seemed motivated enough. Dealing with the invaders shouldn't be too difficult with or without your direct intervention, yet...\n\n*page_break\n\nBefore you had time to respond, the commander of your holy warriors interjected.\n\n\n*if (intimate >= 50)\n\t\"I hope I am not disrespectful by asking You for this, but could You possess my body to destroy those monsters? It would boost the morale of our Order tenfold for You to directly lead us to victory!\"\n\n*if (intimate \u003c 50)\n\t\"I hope I am not disrespectful by asking You for this, but could You give us more divinity for the duration of this mission? It would boost the morale of our Order tenfold to have Your blessing!\"\n\n\nThe Oracle glared at the Templar Commander briefly for the interruption, but quickly continued looking at you respectfully. After all, it was slightly disrespectful to interrupt the Oracle, but in front of you, they were ultimately all equal.\n\n\n*if (corrupted = \"no\")\n\tIt was satisfactory to see their faith in you manifested so directly and even competitively. However, the main issue at the moment was removing those creatures of the Nether from your Domain permanently. There were several methods to do so, each with their own advantages and disadvantages. Only you could decide the path forward.\n\n*if (corrupted = \"yes\")\n\tIt was disturbing to know that you were in a similar situation as those monsters from the Nether, as you had also been tainted by its evil. Regardless, your Domain required immediate aid now. The fundamental problem within you could be dealt with later.\n\n\nDivinity: [b]${divinity}[/b]\n\n*choice\n\t#Only provide information about the locations and states of your enemies\n\t\t*set intimate -5\n\t\t\n\t\tIt was a simple task for you to find the invaders. As long as they were within your Domain, it wasn't very difficult to locate abnormal creatures like these. The contrast between dark beings born in the Nether and the divine environment of this Domain couldn't be larger.\n\t\t\n\t\t\n\t\tCurrently there were three of them left. One of the original four was already vanquished, whereas the remaining three were still hiding near a small crack in the barrier. They were apparently guarding it and waiting for reinforcements from the Nether. \n\t\t\n\t\t*page_break\n\t\t\n\t\tThat was something that could not be allowed to happen. \n\t\t\n\t\t\n\t\tSince the Templar Order should be enough to deal with them, and delaying the operation any longer would be disadvantageous, you decided to simply inform them about the situation of the enemies. This information was likely enough to enable crushing them for good.\n\t\t\n\t\t\n\t\tIt only took a moment until a large force of your Templars had been gathered, and they immediately headed straight for the location you had revealed.\n\t\t\n\t\t*page_break\n\t\t\n\t\tAfter carefully surrounding those evil creatures from every direction, your warriors began a merciless series of attacks against them. With no way to retreat and being attacked without rest, their fate was sealed. After a heated battle, their bodies were left lifeless on the ground. Without these internal saboteurs to maintain it, the crack in the barrier also began to close naturally. The mission was over.\n\t\t\n\t\t*set templars -50\n\t\t*set faith +2\n\t\t\n\t\t[b]All enemies infiltrating your Domain were defeated.[/b]\n\t\t\n\t\t\n\t\t[b]Templars suffered tolerable casualties during the fight.[/b]\n\t\t\n\t\t\n\t\t[b]This victory increased faith among your believers.[/b]\n\t\t\n\t\t*goto after_shadows_defeated\n\t*selectable_if (divinity >= 25) #Bless the Templars with temporary extra powers (-25 Divinity)\n\t\t*set divinity -25\n\t\t*set intimate -1\n\t\t\n\t\tAs a gesture of generosity, you exhausted some of your divinity to bless all the Templars nearby with a temporary boost to their power. They were clearly in awe after witnessing the sudden explosion of divine aura around them. It was undeniable proof that they were currently much stronger than ever before.\n\t\t\n\t\t\n\t\tIn addition to that, it was a simple task for you to find the invaders. As long as they were within your Domain, it wasn't very difficult to locate abnormal creatures like these. The contrast between dark beings born in the Nether and the divine environment of this Domain couldn't be larger.\n\t\t\n\t\t\n\t\tCurrently there were three of them left. One of the original four was already vanquished, whereas the remaining three were still hiding near a small crack in the barrier. They were apparently guarding it and waiting for reinforcements from the Nether.\n\t\t\n\t\t*page_break\n\t\t\n\t\tThat was something that could not be allowed to happen.\n\t\t\n\t\t\n\t\tSince the Templar Order should be enough to deal with them, and delaying the operation any longer would be disadvantageous, you decided to simply inform them about the situation of the enemies. This information was likely enough to enable crushing them for good.\n\t\t\n\t\t\n\t\tIt only took a moment until a large force of your Templars had been gathered, and they immediately headed straight for the location you had revealed.\n\t\t\n\t\t*page_break\n\t\t\n\t\tAfter carefully surrounding those evil creatures from every direction, your warriors began a merciless series of attacks against them. With no way to retreat and continuously receiving powerful blows from all sides, their fate was sealed. After a heated battle, their bodies were left lifeless on the ground. Without these internal saboteurs to maintain it, the crack in the barrier also began to close naturally. The mission was over.\n\t\t\n\t\t*set templars -10\n\t\t*set faith +3\n\t\t\n\t\t[b]All enemies infiltrating your Domain were defeated.[/b]\n\t\t\n\t\t\n\t\t[b]Templars suffered minor casualties during the fight.[/b]\n\t\t\n\t\t\n\t\t[b]This victory increased faith among your believers.[/b]\n\t\t\n\t\t*goto after_shadows_defeated\n\t*selectable_if (divinity >= 50) #Possess the Templar Commander to deal with the threat personally (-50 Divinity)\n\t\t*set divinity -50\n\t\t*set intimate +5\n\t\t\n\t\tAs a gesture of generosity, you exhausted some of your divinity to possess the body of the Templar Commander. The surrounding people were clearly in awe after witnessing the sudden explosion of divine aura around you. It was undeniable proof that you were controlling the body.\n\t\t\n\t\t\n\t\tBefore doing so, you had already found the invaders. As long as they were within your Domain, it wasn't very difficult to locate abnormal creatures like these. The contrast between dark beings born in the Nether and the divine environment of this Domain couldn't be larger.\n\t\t\n\t\t\n\t\tCurrently there were three of them left. One of the original four was already vanquished, whereas the remaining three were still hiding near a small crack in the barrier. They were apparently guarding it and waiting for reinforcements from the Nether. \n\t\t\n\t\t*page_break\n\t\t\n\t\tThat was something that could not be allowed to happen. \n\t\t\n\t\t\n\t\tSince the Templar Order should be enough to deal with them, especially with you directly leading them, it was now time to act. They would not be able to avoid being crushed.\n\t\t\n\t\t\n\t\tIt only took a moment until a large force of your Templars had been gathered, and you immediately headed for the location of your enemies. Your current body would be enough to deal with them alone, yet it was better to prevent any chance of them escaping the attack.\n\t\t\n\t\t*page_break\n\t\t\n\t\tAfter carefully surrounding those evil creatures, your warriors began an aggressive approach from every direction to limit their movements. At the same time, you directly attacked them with your hammer filled with overwhelming divinity. After a heated battle, mostly fought by you and supported by the rest of the Templars, their bodies were left lifeless on the ground. Without these internal saboteurs to maintain it, the crack in the barrier also began to close naturally. The mission was over.\n\t\t\n\t\t*set faith +5\n\t\t\n\t\t[b]All enemies infiltrating your Domain were defeated.[/b]\n\t\t\n\t\t\n\t\t[b]Templars suffered no casualties during the fight.[/b]\n\t\t\n\t\t\n\t\t[b]This victory increased faith among your believers.[/b]\n\t\t\n\t\t*goto after_shadows_defeated\n\n*label after_shadows_defeated\n\n*page_break\n\nAfter destroying the most immediate threat to your believers, you had time to consider the situation from a larger perspective. What exactly were those creatures? How did they get all the way to your Domain, through both the world barrier and your Domain's own barrier?\n\n\nAs you observed the recent battlefield from the sky, a memory fragment resurfaced within you. It was information from the Originator, transferred over to you during your creation.\n\n\nThese creatures had a specific name: [b]Shadows[/b]. They were former faithless souls, tortured and corrupted in the Nether, until they finally gained a monstrous physical form meant only for destruction. Their masters in the Nether unleashed them to find openings in the world barrier to invade the mortal realm. One of them wasn't a great threat alone, but their endless numbers could make them very dangerous in the right conditions. This was a long-term threat that should not be taken lightly.\n\n*page_break\n\nAs you were going through these memories about the Nether, you suddenly felt the Originator's power touching your mind. A message was being transmitted directly to you from afar.\n\n\n[i]Immediately arrive to the Divine Mountains for the first Divine Council among deities. Participation is mandatory, and absentees will be erased.[/i]\n\n\nThe Originator's overwhelming divinity pushed you down, similar to how you were forcefully thrown to this world after being created. It was like a show of force pointing out the futility of resistance.\n\n*page_break\n\nDespite only recently returning to your Domain, you didn't appear fated to watch over it directly for long periods of time. There was truly no avoiding it this time.\n\n\nIt was difficult to say if you would need your divinity while you were gone. Regardless, it might be worth it to spend some of it ensuring the safety of the believers in your absence. Not only was their physical safety important, but it might be worthwhile to even bless the soil to improve their food security.\n\n\nShould you give additional blessings to your believers before leaving them again...?\n\n\nDivinity: [b]${divinity}[/b]\n\n*choice\n\t#No\n\t\tOther than informing your Oracle about having another period of absence from the Domain, there was no time or divinity to waste on doing something unnecessary. They would surely survive on their own without your presence for some time, since the Templars existed for that very purpose.\n\t\t*goto ending_scene\n\t*selectable_if (divinity >= 30) #Bless the Templars (-30 Divinity)\n\t\t*set divinity -30\n\t\t*set templars +200\n\t\tIn addition to informing your Oracle about having another period of absence from the Domain, you spent some time and divinity to grant additional blessings to the Templars defending it. Now they would surely survive through the time without your presence.\n\t\t*goto ending_scene\n\t*selectable_if (divinity >= 60) #Bless the Templars and the Domain's soil (-60 Divinity)\n\t\t*set divinity -60\n\t\t*set faith +5\n\t\t*set templars +200\n\t\tIn addition to informing your Oracle about having another period of absence from the Domain, you spent some time and divinity to grant additional blessings to the Templars defending it. After that, you even used your powers to increase the fertility of the Domain's soil. Now they would surely survive through the time without your presence.\n\t\t*goto ending_scene\n\n*label ending_scene\n\n*page_break\n\nIt was impossible to delay your departure any longer.\n\n\nAs the Originator was the one responsible for summoning you, you could not ignore the invitation to this Divine Council. You were, after all, still a lesser deity compared to that unfathomable entity.\n\n\nWith your destination decided, you broke through your Domain's barrier and soared into the sky.\n\n*page_break\n\nIt was immediately obvious that the other Minor Deities had left their Domains at the same time. The skies were full of divine energy radiating from multiple directions, and you could even \"see\" several of them on their way to your shared destination.\n\n\n*if (corrupted = \"yes\")\n\tIt would remain to be seen if any of them could detect the dark energy hidden within you. For now, you could only hope for the best.\n\n*if (corrupted = \"no\")\n\tThey were the six other beings most similar to your form, power and goals. Despite never directly communicating with any of them so far, you could feel a kind of inseparable connection with them.\n\n*page_break\n\nIt took some time until all seven of you had gathered around the Divine Mountains. None had dared to break through the barrier without permission yet. All of you at least seemed to share similar feelings of awe and dread for the host of this gathering.\n\n\n[i]You must now enter the barrier to attend.[/i]\n\n\nThe Originator's powerful message was transmitted directly to your mind. Undoubtedly, the same applied to the other Minor Deities as well.\n\n\nThe Divine Council was about to begin.\n\n*check_achievements\n*if not(choice_achieved_chapter1)\n\t*achieve chapter1\n\n*finish\n", "chapter2": "*advertisement 1200\n*image divine_mountains.jpg\n\n*set divinity +(faith*3)\n*set faith +5\n*set templars +55\n\n[b]Faith increased your divinity...[/b]\n\n\nAfter passing through the barrier, you could see countless mountains ahead of you. There wasn't anything special about the Divine Mountains at first glance.\n\n\nYou knew for certain that it was not the case, though. The Originator would not have summoned you here without a meaningful reason.\n\n\nThe six other Minor Deities were already approaching the center of the mountains. Whatever you were meant to find, it would undoubtedly be in that direction.\n\n\nDespite none of the deities having physical forms, it could be said that they were a majestic \"sight\" in their own way. Their ethereal forms were like works of abstract art flying through the sky. Without any true physical appearance, all that was left was a vague visual impression of collections of shards floating around a shrouded \"heart\". Instead of identifying them visually, it was much easier to simply appraise their divinities. That was something impossible to be misjudged or faked.\n\n*page_break\n\nAfter all seven of you had reached the center of the mountains, what appeared before you was a strange artificial platform floating in the sky. Above it was a powerful divine artifact that radiated divinity in every direction. Its purpose was unknown, but its pure power was overwhelming in itself.\n\n\nThe platform had exactly seven small barriers surrounding it. Even though they were small, they seemed to be even stronger than the barrier surrounding the Divine Mountains. It should be safe to assume that they were intended for the seven visitors.\n\n*page_break\n\n[i]Now that you are here, enter your personal barriers and introduce yourselves properly.[/i]\n\n\nThe Originator's words were clearly conveyed to you. All seven of you immediately entered one of the barriers, and as soon as you had finished, you could feel a strong connection with the other Minor Deities. The barrier felt like it both isolated and connected you simultaneously.\n\n\nIt was almost like a separate virtual world only for you and your \"family\".\n\n*page_break\n\n*image map.jpg\n\nAfter being securely connected, the Minor Deities didn't waste time in introducing themselves.\n\n\n[i]I thank You for Your invitation to this holy site. The name granted to me by You is [b]Quanom[/b], and I will guide my subjects properly to harvest their faith, all for Your glory.[/i]\n\n\n[i]The name I chose for my followers to witness is [b]Asiel[/b]. I wish to see cooperation when it comes to protecting our flock from the Nether.[/i]\n\n\n[i]You can call me [b]Davalon[/b]. I will always be open to any offers of trade and cooperation, no matter how big or small.[/i]\n\n\n[i]I am... [b]Memmon[/b].[/i]\n\n\n[i]You may call me [b]Fiel[/b].[/i]\n\n\n[i]The name I chose for myself is [b]Subicim[/b]. As the one with the strongest Domain, it is inevitable that these monsters won't be able to survive against me. If you have trouble surviving, I am willing to offer my protection in exchange for loyalty.[/i]\n\n\nAs the youngest Minor Deity, your turn came last. What kind of first impression would be for the best...?\n\n*choice\n\t#Praise the Originator\n\t\t*set quanom +3\n\t\t*set asiel -3\n\t\t*set memmon -3\n\t\t\n\t\t[i]My name is ${name}, and I am grateful to You for summoning us. It is our honor to be here, to see Your absolute power once more.[/i]\n\t\t\n\t\t\n\t\t[b]Quanom liked your introduction.[/b]\n\t\t\n\t\t*goto after_council_introduction\n\t#Show your appreciation for your believers\n\t\t*set asiel +3\n\t\t*set quanom -3\n\t\t*set memmon -3\n\t\t\n\t\t\n\t\t[i]My name is ${name}, and I am most grateful to those having faith in me. I hope we can protect the people of this world with all our might.[/i]\n\t\t\n\t\t\n\t\t[b]Asiel liked your introduction.[/b]\n\t\t\n\t\t*goto after_council_introduction\n\t#Be polite and neutral\n\t\t*set davalon +3\n\t\t*set subicim -3\n\t\t\n\t\t\n\t\t[i]My name is ${name}, and I am open to any kind of cooperation depending on the details.[/i]\n\t\t\n\t\t\n\t\t[b]Davalon liked your introduction.[/b]\n\t\t\n\t\t*goto after_council_introduction\n\t#Be confident and imposing\n\t\t*set subicim +3\n\t\t*set davalon -3\n\t\t\n\t\t[i]My name is ${name}, and I will become a dominant force in the world eventually. Cooperation is possible, as long as you are a loyal partner and share my values.[/i]\n\t\t\n\t\t\n\t\t[b]Subicim liked your introduction.[/b]\n\t\t\n\t\t*goto after_council_introduction\n\n*label after_council_introduction\n\n*page_break\n\nAfter all of you had been introduced, the Originator resumed explaining the situation.\n\n\n[i]You have properly faced each other at last. Yet, the main reason I brought you here was not for that purpose, but to reveal two major events approaching your world. No matter what happens to it, I will not intervene directly... But I will warn you about any major events or rule changes. How you react to them is your own responsibility. Cooperation, competition, isolation... Any solution is allowed. You can only reach as much of your goals as your abilities allow. I hope at least some of you can meet my expectations.[/i]\n\n\nNone interrupted even though there was a pause in the explanation.\n\n*page_break\n\n[i]As I mentioned before, two major events are quickly approaching you. The more important one is that the barriers in this world will now start to weaken over time. Even though you've been able to live in peaceful isolation until now, soon enough, that will be in the past. Can you protect those who have faith in you from the Nether Lords? Will you help, sabotage or ignore each other? I am looking forward to your performance, faced with these new trials. Of course, I have the power to solve everything on my own, but doing so would be meaningless. The reason for this world existing is for you to prove your worth, in the first place.[/i]\n\n\nThe increased tension could be easily sensed among your \"siblings\". It was obvious that the Originator was intentionally testing all of you, by leaving your Domains more open to external dangers. It almost felt like playing a game with this world's inhabitants as pawns. However, your only option would be to adjust to the new reality.\n\n\n[i]The second topic is related to the barriers, as well. As soon as their strength fell even a little, I could sense the Nether Lords sending their minions to attack. They must think that this is an opportunity to strike, that I am in a weakened state. The fools. No matter how many sacrificial pawns they send, it won't matter. Still, this is an opportunity to give you a special trial. After the Divine Council is over, all of you will be given a portion of the world barrier to defend from their assault. Depending on your performance, you may receive a special reward. Of course, it is a reward in itself if your Domain remains safe from their rampage.[/i]\n\n\nSuddenly, the Originator's unfathomable presence began to disappear. Was the Divine Council already over?\n\n*page_break\n\n*image map.jpg\n\n[i]Next, I will grant you a rare moment of privacy. You can have a brief private discussion with each other, once for every pair, without anyone being able detect or record it. This, too, is a part of your trials. Will you learn new information or gain new allies? Or will you lose influence instead? Think carefully about how to proceed... An opportunity like this won't come often, at least until the later stages. This is your chance to turn the tides in your favor.[/i]\n\n\nAfter leaving those words, the Originator's presence vanished completely. However, it should be safe to assume that this place was still a target for observation.\n\n\nAll seven Minor Deities remained inside their barriers. As you began to wonder how this event would continue, it felt like you were being connected directly to another barrier. Who was it... Subicim. The militaristic Minor Deity with no apparent shame or humility.\n\n*page_break\n\n*if ((templars \u003c 500) and (corrupted = \"no\"))\n\t\n\t*set subicim -3\n\t\n\t[i]${name}, you are weak. Truly, shamefully weak. I have seen the state of your Domain, and it will inevitably fall to the Nether — or any other threat. Yet, of my neighbors, you are still better than that coward, Davalon. So that I can focus on that side, I am willing to offer you a chance to save yourself. Surrender without a fight, before I have to waste time subjugating you, and I will promise to treat you and your Domain well — the same as my direct servants.[/i]\n\t\n\t\n\tSubjugation... Collecting your memory fragments, it apparently meant taking control of a Domain from another Minor Deity, as opposed to erasing them, which would mean robbing them of all their divinity and even their existence. In a way, it could be seen as the more merciful option after victory against a deity.\n\t\n\t\n\tAlthough your Domain had not been very focused on growing its military strength, you were still not in any way fated for certain defeat. It might be too hasty to trust Subicim's prediction when it clearly served Subicim's own interests to subjugate you without a fight. By surrendering to another deity, you would also be betraying the faith that had been put in you by your believers until now.\n\t\n\t*choice\n\t\t#Refuse\n\t\t\t[i]I won't be subjugated without a fight, but I don't necessarily want to fight you either. I hope we can avoid intervening in each other's affairs as much as possible.[/i]\n\t\t\t\n\t\t\t\n\t\t\t[i]Hmm. I will observe how your Domain develops from now on. If it pleases me, cooperation may not be impossible later.[/i]\n\t\t\t\n\t\t\t\n\t\t\tThe connection to Subicim was abruptly closed. It was difficult to judge from such a short discussion, but Subicim was certainly not an advocate for peace.\n\t\t\t\n\t\t\t*goto after_subicim\n\t\t\t\n\t\t#Accept (warning: your fate will be sealed permanently!)\n\t\t\t\n\t\t\tWas this truly the right choice...?\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#Refuse\n\t\t\t\t\t[i]I won't be subjugated without a fight, but I don't necessarily want to fight you either. I hope we can avoid intervening in each other's affairs as much as possible.[/i]\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t[i]Hmm. I will observe how your Domain develops from now on. If it pleases me, cooperation may not be impossible later.[/i]\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\tThe connection to Subicim was abruptly closed. It was difficult to judge from such a short discussion, but Subicim was certainly not an advocate for peace.\n\t\t\t\t\t\n\t\t\t\t\t*goto after_subicim\n\t\t\t\t\t\n\t\t\t\t#Accept (warning: this is the last choice you can ever make if you accept here!)\n\t\t\t\t\t*goto subicim_surrender_ending\n\n*else\n\n\t*set subicim +3\n\t\n\t*label subicim_start\n\t\n\t*page_break\n\t\n\t*if (corrupted = \"no\")\n\t\t[i]${name}, I have seen the state of your Domain, and it may barely be good enough to survive the tough times ahead. Also, of my neighbors, you are far better than that coward, Davalon. So that I can focus on that side, I can consider offering you a non-aggression pact. When the barriers have weakened enough, you should move to subjugate Fiel, the weak fool, as well as Memmon, the cruel tyrant. Even more importantly, you must increase your Domain's military power to prove your worth in the future. If you wish to take the easier path, I will also accept your immediate surrender and subjugation by me. In that case, I can promise to treat you and your Domain well — the same as my direct servants.[/i]\n\t\n\t*if (corrupted = \"yes\")\n\t\t[i]${name}, of my neighbors, you are at least better than that coward, Davalon. So that I can focus on that side, I am willing to offer you a non-aggression pact. When the barriers have weakened enough, you should move to subjugate Fiel, the weak fool, as well as Memmon, the cruel tyrant. It is for their own good, and even of their servants, to be removed from power. Otherwise, they would only cause suffering and destruction for their Domains in the future. I will move to subjugate Davalon and Quanom, the coward and the fanatic. After no incompetent Minor Deities are left in power, we can face eath other to decide the path forward. I hope you will go along with my plan, for your own sake, but also for the sake of this world.[/i]\n\t\n\t\n\tSubjugation... Collecting your memory fragments, it apparently meant taking control of a Domain from another Minor Deity, as opposed to erasing them, which would mean robbing them of all their divinity and even their existence. In a way, it could be seen as the more merciful option after victory against a deity.\n\t\n\t\n\t*if (corrupted = \"yes\")\n\t\tIt was fortunate that Subicim seemed unable to detect the mark of the Nether hidden within your existence. In that case, it was quite likely that none of the others could detect it either. However, it would be impossible to place yourself under Subicim's control while also being secretly corrupted by the Nether, or you would simply be immediately erased as a traitor.\n\t\n\t\n\tThere was probably no urgent need to make a decision here and now. After all, you still hadn't even communicated with any of the other Minor Deities, and the barriers would apparently weaken over time rather than all at once. This was not something that would require any immediate action. It might even be better to wait before agreeing to anything.\n\t\n\t*choice\n\t\t#Tentatively agree to conquer Fiel's Domain\n\t\t\t*set subicim +1\n\t\t\t\n\t\t\t[i]Your plan sounds worthy of heavy consideration. After I have thought it over, I will show you my resolve through my actions.[/i]\n\t\t\t\n\t\t\t\n\t\t\t[i]Hmm. I will observe how your Domain develops from now on. I hope your final decision won't disappoint me.[/i]\n\t\t\t\n\t\t\t\n\t\t\tThe connection to Subicim was abruptly closed. It was difficult to judge from such a short discussion, but Subicim was certainly not an advocate for peace.\n\t\t\t\n\t\t\t*goto after_subicim\n\t\t#Promise to think about it\n\t\t\t*set subicim -1\n\t\t\t\n\t\t\t[i]Your plan sounds worth thinking about. After I have thought it over, I will let you know my choice through my actions.[/i]\n\t\t\t\n\t\t\t\n\t\t\t[i]Hmm. I will observe how your Domain develops from now on. I hope your decision won't disappoint me.[/i]\n\t\t\t\n\t\t\t\n\t\t\tThe connection to Subicim was abruptly closed. It was difficult to judge from such a short discussion, but Subicim was certainly not an advocate for peace.\n\t\t\t\n\t\t\t*goto after_subicim\n\t\t*if (corrupted = \"no\") #Surrender to Subicim (warning: your fate will be sealed permanently!)\n\t\t\t\n\t\t\tWas this truly the right choice...?\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#Don't surrender after all\n\t\t\t\t\t*goto subicim_start\n\t\t\t\t#Surrender (warning: this is the last choice you can ever make if you accept here!)\n\t\t\t\t\t*goto subicim_surrender_ending\n\n*label subicim_surrender_ending\n\n*check_achievements\n*if not(choice_achieved_servant)\n\t*achieve servant\n\n[i]I accept your offer. My Domain, along with my believers and myself, will serve you from now on.[/i]\n\n\n[i]You won't regret your decision. I will make sure to protect your Domain and your existence from any dangers approaching us. As long as I exist, you will never be harmed.[/i]\n\n*page_break\n\nAfter surrendering to Subicim, you had practically lost your ability to make decisions independently. For all intents and purposes, you were now simply Subicim's servant, although the most powerful of them. At first this was the case only unofficially, but soon you were truly subjugated by Subicim along with your believers, becoming a Lesser Deity.\n\n\nFortunately, Subicim didn't lie. You and your former Domain were in fact treated well and protected from several grave threats, even at the cost of Subicim's own forces. You also eventually subjugated Fiel together. On the other hand, Davalon proved to be a surprisingly tough opponent and managed to resist.\n\n\n*page_break\n\nEverything changed suddenly when one of the Minor Deities betrayed all of you. A path was opened for endless waves of the Nether's forces to invade your Domains. Ignored by the Originator, the only choice was to continue fighting without rest. One by one, new Domains fell to the enemy. Due to the earlier hostilities between Subicim and Davalon, it was difficult to cooperate even against a common enemy.\n\n\nIn the end, only you had survived among those fighting the relentless invasion from the Nether. Even Subicim had sacrificed their existence to protect you, as promised many cycles ago. Still, it was all hopeless. You could not defeat the enemy alone when it was impossible even with many allies by your side.\n\n\nAfter being completely exhausted of your remaining divinity, faith and Templars, your fate was sealed. The traitor erased your existence, without even bothering to convert it into divinity. Looking at the horrifying form the traitor had gained, perhaps it was in fact better to be erased here...\n\n\nFinally, it was over. Your existence had disappeared for eternity.\n\n*ending\n\n*label after_subicim\n\n*page_break\n\nAfter your brief introduction to Subicim, there was a period of silence. Were all of them still engaged in discussions?\n\n\nYour next connection eventually arrived: Fiel. Like Subicim, this deity controlled a Domain next to you. This presence didn't feel hostile or aggressive either. If anything, it was the opposite.\n\n\n*page_break\n\n[i]Greetings. It is pleasant to meet you for the first time.[/i]\n\t\t\n\t\t\nIt was difficult to describe the atmosphere surrounding Fiel. It gave the impression that nothing that might happen here would really matter.\n\n\n[i]I do have one request for you. I am planning to slowly send my missionaries and settlers around the whole continent. If you allow free passage to my followers through your Domain, we can be good allies. That is all.[/i]\n\t\n\t\nFiel's request was not as trivial as it seemed at first. Ignoring the fact that your own believers could be influenced by an alien religion, letting them move freely toward Subicim might strain your diplomatic relationship with your other neighbor. It was worth remembering that Subicim's Domain was likely far stronger than Fiel's.\n\n\nRegardless, you should still have time to change your stance later. Making a decision here would not necessarily be your final choice.\n\t\n*choice\n\t#Agree to it\n\t\t*set fiel +2\n\t\t\n\t\t[i]That should be fine. I do not have any plans to hinder your activities.[/i]\n\t\t\n\t\t\n\t\tYou could almost feel a brief flash of joy radiating from the other side of the connection.\n\t\t\n\t\t\n\t\t[i]That is great news. I will let you know if I have anything else for you to know.[/i]\n\t\t\n\t\t\n\t\tFiel seemed to be preparing to end the conversation. However, remembering Subicim's words that Fiel's Domain was relatively weak, perhaps there could be a need for help in case of emergencies. In exchange, you could ask for free access to the Domain for your own missionaries and traders. Wouldn't that be a mutually beneficial deal...?\n\t\t\n\t\t*choice\n\t\t\t#End the connection\n\t\t\t\t\n\t\t\t\tAs expected, the connection closed soon after you had finished talking.\n\t\t\t\t\n\t\t\t\t*goto after_fiel\n\t\t\t#Offer emergency aid in exchange for free movement of your own missionaries and traders\n\t\t\t\t*set fiel -3\n\t\t\t\t\n\t\t\t\tAfter making the offer, Fiel didn't react quite as you had expected.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tInstead of showing gratitude or interest, what you felt radiating toward you was simply... hostility.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t[i]I have no interest in ever allowing foreign armies within my Domain. Even less will I allow foreign missionaries. I will be pleased if you do not ask such a question ever again.[/i]\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tWas there truly no chance of receiving similar treatment for your own believers that had been demanded from you earlier? It hardly seemed fair if that was the case.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tThe connection closed abruptly, just like it had with Subicim.\n\t\t\t\t\n\t\t\t\t*goto after_fiel\n\t\t\t\t\n\t#Avoid answering for now\n\t\t*set fiel -1\n\t\t\n\t\t[i]I'm not completely sure yet, but I will let you know once I have made my decision.[/i]\n\t\t\n\t\t\n\t\tYou could only feel indifference, or perhaps even slight annoyance, coming from the other side of the connection.\n\t\t\n\t\t\n\t\t[i]That is fine. I will be eagerly waiting for confirmation once you are ready.[/i]\n\t\t\n\t\t\n\t\tFiel seemed to be preparing to end the conversation. However, remembering Subicim's words that Fiel's Domain was relatively weak, perhaps there could be a need for help in case of emergencies. In exchange, you could ask for free access to the Domain for your own missionaries and traders. Wouldn't that be a mutually beneficial deal...?\n\t\t\n\t\t*choice\n\t\t\t#End the connection\n\t\t\t\t\n\t\t\t\tAs expected, the connection closed soon after you had finished talking.\n\t\t\t\t\n\t\t\t\t*goto after_fiel\n\t\t\t#Offer emergency aid in exchange for free movement of your own missionaries and traders\n\t\t\t\t*set fiel -3\n\t\t\t\t\n\t\t\t\tAfter making the offer, Fiel didn't react quite as you had expected.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tInstead of showing gratitude or interest, what you felt radiating toward you was simply... hostility.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t[i]I have no interest in ever allowing foreign armies within my Domain. Even less will I allow foreign missionaries. I will be pleased if you do not ask such a question ever again.[/i]\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tWas there truly no chance of receiving similar treatment for your own believers that had been demanded from you earlier? It hardly seemed fair if that was the case.\n\t\t\t\t\n\t\t\t\t\n\t\t\t\tThe connection closed abruptly, just like it had with Subicim.\n\t\t\t\t\n\t\t\t\t*goto after_fiel\n\n*label after_fiel\n\n*page_break\n\nAfter dealing with your immediate neighbors, someone from farther away appeared in front of you next: Memmon, Fiel's other neighbor.\n\n\n*if (corrupted = \"no\")\n\t[i]We shouldn't waste any time. I will always welcome gifts of divinium ore or healthy laborers for my Domain, but otherwise, there is no need for a discussion. Do you have a gift for me?[/i]\n\t\n\t\n\tSimilar to Fiel, Memmon didn't seem highly interested in the conversation. The main difference was the blatant greed that Memmon was showing. It would be terribly expensive to give away either your weapon materials or your believers.\n\t\n\t\n\tThere weren't any immediate benefits from giving a bribe, but perhaps in the future Memmon would be more friendly toward you due to such a sacrifice. Was such a friendship even worth the cost, though...?\n\t\n\t*choice\n\t\t#Ignore Memmon's request\n\t\t\t*set memmon -5\n\t\t\t\n\t\t\tMemmon didn't seem to care that much about your refusal. After hearing your answer, the conversation ended immediately.\n\t\t\t\n\t\t\t*goto after_memmon\n\t\t*if (templars >= 50) #Offer some divinium (-Templars)\n\t\t\t*set memmon +5\n\t\t\t*set templars -50\n\t\t\t*set memmon_templars +50\n\t\t\t\n\t\t\tMemmon didn't seem to care that much although you agreed to send a gift. After receiving your promise, the connection was closed.\n\t\t\t\n\t\t\t*goto after_memmon\n\t\t#Offer some of your believers (-Faith)\n\t\t\t*set memmon +10\n\t\t\t*set faith -10\n\t\t\t\n\t\t\tMemmon didn't seem to care that much although you agreed to send a gift. After receiving your promise, the connection was closed.\n\t\t\t\n\t\t\t*goto after_memmon\n\n*if (corrupted = \"yes\")\n\n\t*set memmon +35\n\t\n\t*label memmon_choices\n\t\n\t*page_break\n\t\n\t[i]You... ${name}, was it? I see. You have also fallen from the path of divinity. We are the same, you and me, so I'll welcome you as an ally on our new path. If you need to know anything, simply ask me here. Neither of us can betray the Nether Lords anymore, so we do not need to keep secrets from each other.[/i]\n\t\n\t\n\tUnlike the other Minor Deities, Memmon had immediately noticed your state of being corrupted in the Nether. You could also notice the darkness spreading inside Memmon, which was clearly much more advanced than your own corruption. Would you also be like that in the future...? There didn't seem to be much time left to make your decision about how to act from now on.\n\t\n\t\n\tFortunately, you had a potential ally in a similar situation right in front of you. This was the best possible opportunity to gain more information from someone with more experience and knowledge.\n\t\n\t*choice\n\t\t#Why are you gathering divinium and workers?\n\t\t\t\n\t\t\t[i]The reason is simply to weaken the world barrier. The Originator seems to have planned for it to weaken over time, regardless, but I have worked tirelessly to weaken it even further. My method to achieve that is to cause my slaves to resent this world... While using them to build monuments that gather energy from the Nether. If the material is divinium, the holy metal that gathers divinity, the corruption from that contradiction is even greater.[/i]\n\t\t\t\n\t\t\t*goto memmon_choices\n\t\t#How to avoid your corruption being detected?\n\t\t\t\n\t\t\t[i]You do not need to worry that much about being found out. The other Minor Deities are unable to see it, and the Originator can see it, but is unwilling to act. According to the rules guiding the Originator's actions, this betrayal is still not anything to complain about. Our only threat might be the other Minor Deities, but it is fortunate that they have far too little divinity to detect the truth, unless you let them know about it directly.[/i]\n\t\t\t\n\t\t\t*goto memmon_choices\n\t\t#What are the Nether Lords and what are they planning?\n\t\t\t\n\t\t\t[i]Long before the Originator appeared, the Nether was ruled by countless entities known as the Nether Lords. They are powerful beings with endless desire for corruption, destruction and chaos. The one thing they desire most right now is to corrupt this world that is full of divinity and order. In order to achieve that, they are willing to give great powers and rewards to us, their collaborators. Even though the Originator has overwhelming combat power, the Nether is much larger than you can imagine. Victory will inevitably belong to the Nether Lords.[/i]\n\t\t\t\n\t\t\t*goto memmon_choices\n\t\t#End the connection\n\t\t\t\n\t\t\t[i]My final message to you is that the invasion facing us soon will only be a minor test from the Nether Lords. It is not a serious attack yet, so you do not need to worry about how to deal with it. The hidden goal of the invasion is to especially weaken Fiel's Domain, which will make it even easier to destroy that fool in the future. If possible, guide even more of the Shadows toward Fiel instead of your own Domain.[/i]\n\t\t\t\n\t\t\t\n\t\t\tWithout anything left to ask, the connection was closed soon enough by both of you to avoid any unnecessary suspicion.\n\t\t\t\n\t\t\t*goto after_memmon\n\n*label after_memmon\n\n*page_break\n\nYou had to wait for a while to meet your new partner for dialogue. \n\n\nAs expected, based on the position of your Domain, it was Davalon's turn next. This Minor Deity had not given you a strong impression of any kind yet, but surface-level impressions could be very deceiving. It was better to be careful until you had witnessed the truth for yourself.\n\n*page_break\n\nThe best way to describe Davalon's atmosphere might be \"neutral\": focused, yet without any noticeable emotions.\n\n\n[i]${name}, it is my pleasure to finally meet you. As a token of appreciation, I have prepared a small gift for you. Please take it before we move on to other issues.[/i]\n\n\nDavalon showed a projection containing large amounts of gold, divinium and food products. Receiving these would certainly have benefits for your Domain. However, was there any specific reason to give you such a generous gift...? It was difficult to imagine any harm in it, though.\n\n*choice\n\t#Accept (+Templars, +Faith)\n\t\t*set davalon +3\n\t\t*set faith +3\n\t\t*set templars +50\n\t\t\n\t\t[i]A wise choice. I can see that cooperation with you is likely.[/i]\n\t\t\n\t\t*goto after_gift\n\t#Refuse\n\t\t*set davalon -3\n\t\t\n\t\t[i]Well, it does not matter. It was only a formality in any case.[/i]\n\t\t\n\t\t*goto after_gift\n\n*label after_gift\n\n*page_break\n\nAfter taking the initiative by offering you a gift, Davalon seemed to ponder for a moment. It was only a short moment, though.\n\n\n[i]There isn't much need for us to have negotiations right now. I hope we can slowly get to know each other better, and once our relations are good enough, it will be the right time to discuss heavier topics. For now, it's enough to convey my good will toward you.[/i]\n\n\nAlmost immediately, Davalon continued.\n\n\n[i]This is simply a warning for your own benefit. The truth is that having Subicim as our neighbor seems to be... difficult, to say the least. I won't ask you to fight Subicim for me, but even the smallest actions to distract and contain Subicim's ambitions would be helpful for me, and I would certainly reward you for it. I will leave it as something for you to consider in the future. There is no need to give an answer now. Until we meet again...[/i]\n\n\nAlong with those words, Davalon's presence began to fade away. It seemed that this discussion was not fated to continue.\n\n*label after_davalon\n\n*page_break\n\nOnly Asiel and Quanom remained. It was time to gather whatever information you could about their future plans. As you were wondering which of them would appear next, you could sense Asiel being connected to you.\n\n*page_break\n\nAs Asiel appeared before you, the divinity radiating toward you was surprisingly powerful.\n\n*if (attitude = \"submissive\")\n\t[i]I witnessed the moments after your creation. I was disappointed to see how easily you bowed down to the Originator's power, but we'll see if your spirit is still as weak.[/i]\n\n*if (attitude = \"neutral\")\n\t[i]I witnessed the moments after your creation. I was surprised to see your lack of reaction to the Originator's show of power, but it is at least better than bowing down to it.[/i]\n\n*if (attitude = \"defiant\")\n\t[i]I witnessed the moments after your creation. I was glad to see that you didn't bow down to the Originator's power, but we'll see if your spirit is still as strong now.[/i]\n\n\nDid Asiel have something against the Originator?\n\n*page_break\n\nHowever, it would be unwise to anger either Asiel or the Originator, at least without having a truly good reason for it. Both of them were powerful deities, although the Originator was certainly far stronger.\n\n\n[i]I have some questions for you. Be warned that I can see through lies, and if I detect any, your fate will be sealed.[/i]\n\n\nThe pressure radiating from Asiel increased greatly.\n\n\n[i]What do you think about your mortal followers?[/i]\n\n*choice\n\t#Valuable allies\n\t\t*set asiel +5\n\t\t*goto after_first_asiel\n\t#Necessary tools\n\t\t*set asiel -5\n\t\t*goto after_first_asiel\n\n*label after_first_asiel\n\n*page_break\n\n[i]Very well. Then, what is your stance on Memmon?[/i]\n\n*choice\n\t#A potential ally\n\t\t*set asiel -3\n\t\t*goto after_second_asiel\n\t#A potential threat\n\t\t*set asiel +3\n\t\t*goto after_second_asiel\n\n*label after_second_asiel\n\n*page_break\n\n[i]And how do you see the Originator now, after hearing about the changing rules for this... game?[/i]\n\n*choice\n\t#Positively\n\t\t*set asiel -5\n\t\t*goto after_third_asiel\n\t#Negatively\n\t\t*set asiel +5\n\t\t*goto after_third_asiel\n\n*label after_third_asiel\n\n*page_break\n\n*if (asiel \u003c 560)\n\t\n\t*set asiel -3\n\t\n\t[i]It seems that our goals are not aligned, so let us go our separate ways for now. I wish you luck on your own path.[/i]\n\t\n\t\n\tAsiel's presence soon disappeared completely.\n\n*if (asiel >= 560)\n\t\n\t*set asiel +15\n\t\n\t[i]I see. I am convinced that we can work together to save the people of this world. For now, it's enough to know that we have many shared values and objectives. Your actions over time will show if you are truly committed to this path. Simply keep in mind that most Minor Deities do not care even if their believers will suffer eternal torment, as long as they can gain more power.[/i]\n\t\n\t\n\tAsiel's presence slowly began to disappear.\n\t\n\t\n\t[i]One final warning from me. Quanom and Memmon are the greatest threats to the survival of this world. I am also afraid that Davalon may be working together with Quanom. If you truly care about our believers and want to save them together with me, it pains me to say so, but the best option for you would be to subjugate Fiel as soon as possible. I have ascertained that Fiel is not interested in the fate of the people, but merely in gaining more power from them. Besides, Fiel is not investing in their protection, disqualifying that Domain as a safe haven for them. It would be better for you to take over Fiel's Domain when you can instead of having a conflict against Subicim, who also intends to attack Davalon, a supporter of Quanom.[/i]\n\t\n\t\n\tSoon Asiel was gone as well, and a massively powerful entity was quickly approaching you.\n\n*label after_asiel\n\n*page_break\n\nRight after Asiel had left, Quanom's presence approached you. You could feel the strongest divinity so far, almost crushing you beneath it, yet you somehow managed to stay calm.\n\n\n*if (attitude = \"submissive\")\n\tThe powerful divine presence in front of you vaguely glanced at you. If anything, you could merely feel a slight sense of approval.\n\n*if (attitude = \"neutral\")\n\tThe powerful divine presence in front of you vaguely glanced at you.\n\n*if (attitude = \"defiant\")\n\tThe powerful divine presence in front of you vaguely glanced at you. If anything, you could merely feel a slight sense of disappointment.\n\n\n[i]I only have one question for you. Are you loyal to the Originator's vision for this world? In other words, is endless struggle against the fear of death, only soothed by complete faith in a deity, the correct way of life for its inhabitants? Is a cycle of competition between deities for faith the proper way to grow our power against the Nether? I shall hear your answer now.[/i]\n\n\nThe immense pressure radiating toward you made you feel like you might need to make a meaningful choice. Perhaps it could even decide your fate. If Quanom and the Originator, the two strongest deities, were following the same vision, would it make any sense to go against their will now...?\n\n*choice\n\t#Loyal\n\t\t*set quanom +5\n\t\t\n\t\tYou could only submit to the pressure and promise your support to Quanom's faction.\n\t\t\n\t\t\n\t\t[i]Very well. I will remember your promise. When the time for widespread chaos and destruction inevitably arrives, I trust you will continue to stay on the right path. Otherwise, you will have to suffer eternally in the Nether. As your first goal, you should simply aim to cause some trouble for Subicim's Domain. There is no need to worry about anything else for now.[/i]\n\t\t\n\t\t\n\t\tThe powerful divinity surrounding you quickly vanished, as if Quanom had only come to ask you that single question.\n\t\t\n\t\t*goto after_quanom\n\t#Not loyal\n\t\t*set quanom -5\n\t\t\n\t\tDespite the immense pressure directed against you, you couldn't bring yourself to support Quanom's faction.\n\t\t\n\t\t\n\t\t[i]Very well. I will remember your reluctance. When the time comes for your judgment, you may yet receive another chance. I hope you will be willing to repent at that time.[/i]\n\t\t\n\t\t\n\t\tThe powerful divinity surrounding you quickly vanished, as if Quanom had only come to ask you that single question.\n\t\t\n\t\t*goto after_quanom\n\n*label after_quanom\n\n*page_break\n\nWith Quanom gone, you were alone once again. The other Minor Deities were still somewhere around you, although the surrounding barriers blocked all access to them.\n\n\nThat isolation did not last for very long. Soon after your private discussions had concluded, the pressure caused by the Originator returned from the sky.\n\n\nEven compared to Quanom and Asiel, the Originator was still far more terrifying. It felt like nothing could directly challenge this overwhelming power.\n\n*page_break\n\n[i]The time for privacy is over. From now on, you will need to display your abilities in an actual fight against the Nether. Even if your divinity is still limited, it should be enough to deal with this threat. If not, it only means that the fate of your Domain was to be ruined here. Now, go and protect your believers from annihilation.[/i]\n\n\nThe Originator vanished immediately after saying that. Instead, you could suddenly sense the world barrier being sieged by countless small creatures... Shadows. The same pawns of destruction that had assaulted your Domain earlier.\n\n\nIt was time to fight for the fate of your world.\n\n*if (corrupted = \"yes\")\n\t\n\t*page_break\n\t\n\tBefore you had time to leave the Divine Mountains, you sensed something observing you directly from afar. It could be none other than the Originator.\n\t\n\t\n\t[i]I see you have acquired a new source of power. Do you wish to tell me about it?[/i]\n\t\n\t\n\tYour secret was likely exposed... Should you confess everything?\n\t\n\t*choice\n\t\t#Leave\n\t\t\t\n\t\t\tWithout directly answering the question, you swiftly escaped outside the barrier. The Originator didn't seem interested in chasing after you.\n\t\t\t\n\t\t\t*goto invasion_start\n\t\t\t\n\t\t#Confess your state of Nether corruption\n\t\t\t\n\t\t\tSince the Originator had already detected the darkness within you, there wasn't much to lose.\n\t\t\t\n\t\t\t\n\t\t\t[i]You are correct. I have been corrupted by the Nether Lords, and there seems to be no escaping from this path.[/i]\n\t\t\t\n\t\t\t\n\t\t\tThe moment of truth was here. What would your fate be?\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\t[i]There is no way to save you now, except by erasing your divinity. However, your existence would vanish as well. That is not what I wish to see. Instead, return to your Domain and continue deceiving the other Minor Deities. Even if you are no longer qualified for divine ascension, that does not mean you are useless. Your purpose has simply shifted to become a hidden opponent for the remaining candidates.[/i]\n\t\t\t\n\t\t\t\n\t\t\tThe Originator's words felt like a final verdict given to a criminal. If you wanted to continue existing, there was truly no straying from the path of darkness.\n\t\t\t\n\t\t\t*goto invasion_start\n\n*label invasion_start\n\n*page_break\n\nThe Divine Mountains were quickly behind you.\n\n\nWhen you reached the area between your Domain and the world barrier, the other Minor Deities had arrived at their positions as well.\n\n*page_break\n\nYou could easily detect where the Shadows were gathering outside the world barrier. At the moment, an especially large amount of them seemed to be aiming for Fiel, although all of the other Domains were equally threatened.\n\n\nIt would be far easier to deal with them now than after they had gained their physical forms by infiltrating your Domain. However, there were several ways to approach this defensive battle.\n\n\n*if (corrupted = \"yes\")\n\tSince your corruption seemed irreversible, it did not truly matter how you repelled them, as long as you didn't appear too suspicious by doing nothing at all.\n\n*choice\n\t#Strengthen your Domain's barrier (-10 Divinity)\n\t\t*set divinity -10\n\t\t*set templars -50\n\t\t\n\t\tA simple method to repel the Shadows would be to increase the power of your Domain's barrier. The more exhausted they were after getting through it, the easier it would be for your Templars to finish them off.\n\t\t\n\t\t\n\t\tYou immediately began the process of boosting the divinity of your barrier. As more and more Shadows entered through the world barrier, which was weakened by their relentless siege, many of them aimed directly for your Domain. The fate of your Domain would depend on the results of this moment of peril...\n\t\t\n\t\t*page_break\n\t\t\n\t\t... It was a success.\n\t\t\n\t\t\n\t\tNo matter their numbers, they were not especially powerful entities. Weakened by your Domain's barrier, the ones that made it through were all quickly destroyed by your Templars.\n\t\t\n\t\t\n\t\tMost importantly, even though your Templars had suffered some losses, they were not crippled as an organization. They could still maintain order and defend the Domain without major difficulties.\n\t\t\n\t\t*goto after_fighting_style_choice\n\t*selectable_if (divinity >= 20) #Weaken the Shadows by radiating divinity (-20 Divinity)\n\t\t*set divinity -20\n\t\t*set templars -25\n\t\t\n\t\tAn effective method to block this invasion would be to spread divinity to weaken the Shadows. The more exhausted they were after reaching your Domain's barrier, the easier it would be for your Templars to finish them off.\n\t\t\n\t\t\n\t\tYou immediately began the process of radiating raw divinity toward the invaders. As more and more of them entered through the world barrier, which was weakened by their relentless siege, they were directly hit by your divine aura. Even so, many of them aimed for your Domain. The fate of your Domain would depend on the results of this moment of peril...\n\t\t\n\t\t*page_break\n\t\t\n\t\t... It was a success.\n\t\t\n\t\t\n\t\tNo matter their numbers, they were not especially powerful entities. Greatly weakened by your divinity, the ones that made it through the Domain barrier were all quickly destroyed by your Templars.\n\t\t\n\t\t\n\t\tMost importantly, even though your Templars had suffered minor losses, they were far from crippled as an organization. They could still maintain order and defend the Domain without any difficulties.\n\t\t\n\t\t*goto after_fighting_style_choice\n\t*selectable_if (divinity >= 30) #Annihilate them with bursts of divinity (-30 Divinity)\n\t\t*set divinity -30\n\t\t\n\t\tA foolproof method to repel the Shadows would be to annihilate them directly with your divine powers. If you had already crushed their forces, it would be easy for your Templars to finish them off.\n\t\t\n\t\t\n\t\tYou immediately began the process of bombarding the invaders with divinity. As more and more Shadows entered through the world barrier, which was weakened by their relentless siege, they were struck by fatal bursts of your power. Even so, some of them aimed for your Domain. The fate of your Domain would depend on the results of this moment of peril...\n\t\t\n\t\t*page_break\n\t\t\n\t\t... It was a great success.\n\t\t\n\t\t\n\t\tNo matter their numbers, they were not especially powerful entities. Weakened by your previous attack, the ones that made it through the Domain barrier were all quickly destroyed by your Templars.\n\t\t\n\t\t\n\t\tMost importantly, your Templars had not suffered any losses. They could still easily maintain order and defend the Domain from its enemies.\n\t\t\n\t\t*goto after_fighting_style_choice\n\n\n*label after_fighting_style_choice\n\n*page_break\n\nFortunately, the numbers invading your Domain were far from endless. As soon as the Shadows had suffered some losses, they quickly retreated.\n\n\nAlthough the invasion of your Domain had been blocked, Fiel was still in a more dangerous situation. Many of the Shadows attacking Fiel's Domain had been destroyed, yet many of them were close to getting through the barrier.\n\n\nWas it worth it to provide aid? If you were fated to compete in the future, it might even be harmful for you to intervene now...\n\n\nDivinity: [b]${divinity}[/b]\n\n*choice\n\t#Ignore it\n\t\t*set helped_fiel \"no\"\n\t\t*set fiel -5\n\t\t*set fiel_faith -20\n\t\t*set fiel_templars -50\n\t\t\n\t\tYou chose to ignore the Shadows assaulting Fiel's Domain.\n\t\t\n\t\t\n\t\t*if (divinity >= 50)\n\t\t\tIt was your responsibility to focus on protecting your own Domain, and not on helping others. Your believers were far more valuable than any other mortals. Besides, there was no guarantee that Fiel wouldn't act against you in the future.\n\t\t\n\t\t\n\t\t*if (divinity \u003c 50)\n\t\t\tIn any case, you did not have sufficient divinity to offer any help. You could only focus on protecting your own Domain.\n\t\t\n\t\t\n\t\t[b]Fiel will remember your lack of support in this moment of crisis.[/b]\n\t\t\n\t\t*goto after_battle_over\n\t*selectable_if (divinity >= 50) #Help Fiel (-50 Divinity)\n\t\t*set helped_fiel \"yes\"\n\t\t*set divinity -50\n\t\t*set fiel +10\n\t\t\n\t\tYou chose to help Fiel despite the costs and risks involved. After all, you were all on the same side against the Nether's forces... at least tentatively.\n\t\t\n\t\t\n\t\tIt was a simple task to hinder those Shadows from assaulting Fiel's Domain. You did not even need to move far away from your Domain — it was enough to radiate some of your divinity in their direction. Even with their surprisingly large numbers, receiving a sudden attack from the flank immediately collapsed their formation.\n\t\t\n\t\t\n\t\tAttacked from two directions by powerful deities and having to move through two divine barriers, they were severely weakened and easily defeated by Fiel's Templars.\n\t\t\n\t\t\n\t\tThe damage caused to Fiel's Domain was significantly reduced due to your intervention.\n\t\t\n\t\t\n\t\t[b]Fiel will remember your generous support in this moment of crisis.[/b]\n\t\t\n\t\t*goto after_battle_over\n\n*label after_battle_over\n\n*page_break\n\nThe battle was soon over for good. In the end, your Domain had not suffered much damage.\n\n\nObserving the Domain again from a distance, you noticed a large amount of souls were floating toward you. It was a new batch of recently dead believers.\n\n*page_break\n\n*if (after_death_system = \"reincarnation\")\n\t*set faith +5\n\t\n\t[b]Faith increased...[/b]\n\t\n\t\n\tAfter getting closer to you, they swiftly returned to your Domain. Their cycle of reincarnation was about to begin.\n\n*if (after_death_system = \"divine host\")\n\t*set faith +1\n\t*set divinity +100\n\t\n\t[b]Divinity increased...[/b]\n\t\n\t\n\tAfter getting closer to you, they stayed with you as divine spirits. They would continue to support your divinity from now on.\n\n*if (after_death_system = \"guardian spirits\")\n\t*set faith +1\n\t*set templars +100\n\t\n\t[b]Power of Templars increased...[/b]\n\t\n\t\n\tAfter getting closer to you, they swiftly returned to your Domain. They would stay to defend your Domain from now on.\n\n*page_break\n\nYour Domain had experienced many cycles during your absence. It didn't feel like a long time had passed for you, yet time flowed differently for mortals.\n\n\nEven so, your second Oracle was still actively serving in that role... and it felt like you were being requested now.\n\n*page_break\n\nWithout wasting any time, your presence soon filled the grand temple of your religion.\n\n*if (government_type = \"theocracy\")\n\t\n\tAs if expecting your arrival, your Oracle and Templar Commander were already waiting for you. They were surrounded by many high-ranking priests and Templars.\n\t\n\t\n\tLooking at the top elites of your Domain, they seemed to consist more and more heavily of religious figures. Still, that was not necessarily a bad thing, as it simply meant that faith in you was growing stronger.\n\n*if (government_type = \"secular\")\n\t\n\tAs if expecting your arrival, your Oracle and Templar Commander were already waiting for you. They were surrounded by many important people from your Domain, including major bureaucrats and merchants.\n\t\n\t\n\tLooking at the top elites of your Domain, they seemed to consist more and more heavily of non-religious figures. Still, that was not necessarily a bad thing, as it simply meant that your Domain was growing stronger even without needing your direct guidance.\n\t\n*page_break\n\nYour Oracle and Templar Commander greeted you as respectfully as before, kneeling in front of your powerful divinity.\n\n\n\"We welcome Your return in response to our calls. No matter Your commands, we will immediately carry them out.\"\n\n\n\"As I am Your sword and shield, I will not hesitate to execute Your will.\"\n\n\nThere was nothing to complain about in their ceremonious attitude. They did not seem to have forgotten about their positions as your direct servants.\n\n\nYour Oracle had not changed while you were gone, but your Templar Commander was no longer the same person. That battle-focused divine power was easier to inherit without your direct intervention. After all, your Domain always needed a strong defender, even if they happened to temporarily lack a religious leader.\n\n*page_break\n\nYou listened quietly to their descriptions of the various events that had occurred during your lengthy absence.\n\n\nThere had been many minor Shadow raids over the cycles, yet they had been swiftly defeated. However, their increasing activity was a sign that the barrier was already weakening, and it wouldn't be long before your believers would make direct contact with other religions.\n\n\nIt was a matter of great importance to you how the other six Minor Deities would be treated by your believers. Until now, it was possible to ignore them, but now that the Domain barriers were unraveling, it was necessary to make a choice before inevitably being influenced by them. Any lost believers would be a direct blow to your divinity, although it could also cause problems if your believers were too hostile against other religions.\n\n*choice\n\t#Recognize them as deities\n\t\t*set other_deities_stance \"deities\"\n\t\t*set faith -5\n\t\t*set fiel +5\n\t\t*set subicim +5\n\t\t*set davalon +5\n\t\t*set asiel +5\n\t\t*set quanom +5\n\t\t\n\t\t[i]You will soon be ready to face the world outside of this safe haven that was created specifically for you. Not only are there unholy spawns of evil outside, but other deities similar to me and people just like you as well. Although I will always be your primary protector, we may need to work together with other religions in the future. It won't be long now until you can see it for yourselves.[/i]\n\t\t\n\t\t\n\t\tThe elites gathered in front of you all appeared shocked after hearing your declaration from the Oracle. However, none of them questioned your words.\n\t\t\n\t\t\n\t\t[b]Your deity relations will improve while your religion will weaken due to your stance.[/b]\n\t\t\n\t\t*goto after_other_deities_stance_choice\n\t#Treat them as foolish superstition\n\t\t*set other_deities_stance \"superstition\"\n\t\t\n\t\t[i]You will soon be ready to face the world outside of this safe haven that was created specifically for you. Not only are there unholy spawns of evil outside, but other people just like you as well. Even though they may have misguided beliefs and superstitions, they will also inevitably become my believers in the future. It won't be long now until you can see it for yourselves.[/i]\n\t\t\n\t\t\n\t\tThe elites gathered in front of you all appeared shocked after hearing your declaration from the Oracle. However, none of them questioned your words.\n\t\t\n\t\t\n\t\t[b]There will be no major effects to your deity relations or religion due to your stance.[/b]\n\t\t\n\t\t*goto after_other_deities_stance_choice\n\t#Treat their followers as blasphemers\n\t\t*set other_deities_stance \"blasphemy\"\n\t\t*set faith +5\n\t\t*set fiel -5\n\t\t*set subicim -5\n\t\t*set davalon -5\n\t\t*set asiel -5\n\t\t*set quanom -5\n\t\t\n\t\t[i]You will soon be ready to face the world outside of this safe haven that was created specifically for you. Not only are there unholy spawns of evil outside, but other people just like you as well. Some of them may have faith in false deities, thus causing harm to us all, but that sin will be corrected by our determined efforts. It won't be long now until you can see it for yourselves.[/i]\n\t\t\n\t\t\n\t\tThe elites gathered in front of you all appeared shocked after hearing your declaration from the Oracle. However, none of them questioned your words.\n\t\t\n\t\t\n\t\t[b]Your deity relations will worsen while faith in you will increase due to your stance.[/b]\n\t\t\n\t\t*goto after_other_deities_stance_choice\n\n*label after_other_deities_stance_choice\n\n*page_break\n\nAfter warning the leaders of your Domain about the future weakening of the barrier, you returned to view your Domain from the sky. They were starting a celebration in honor of your arrival, with your current Oracle announcing the whole event to a huge audience of your followers.\n\n*if (loved >= 50)\n\t\n\t\"Rejoice! Our Lord, ${name}, has returned to bless us with Their holy presence. A golden age of prosperity has arrived for us, so now is the time to celebrate and show our gratitude!\"\n\t\n\t\n\tThe Oracle's speech was followed by deafening cheers and jubilation.\n\n*if (loved \u003c 50)\n\t\n\t\"Hear me! Our Lord, ${name}, has returned to our lands at last. The time of judgment has arrived for us, so now is the time to celebrate and prove our faith!\"\n\t\n\t\n\tThe Oracle's speech was followed by zealous cheers from the surroundings.\n\n*page_break\n\n*set faith +3\n\nThe news about your arrival had quickly reached all of your Domain, and festivities began in every major population center almost immediately. Such a disruption might bother the lives of some of your believers, but in any case, your divinity would surely be strengthened. That was ultimately the path to your Domain's survival as well.\n\n\n*if (intimate >= 50)\n\tYou observed the event closely through the eyes of your regular believers. The main attractions seemed to be the opportunities to eat special foods that were reserved for such occasions, as well as being able to spend quality time with like-minded people
