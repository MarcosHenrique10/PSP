<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Nightmare Maze — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "nightmaremaze", "title": "The Nightmare Maze", "scenes": {"choicescript_description": "Lose yourself in the depths of a tormented psyche and try to find the logic to the night terrors in this haunting text-based multiple-choice game.\n\n[i]The Nightmare Maze[/i] is a 5,000-word interactive novel by Alex Livingston. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.", "choicescript_stats": "Statistics\n\n*stat_chart\n  percent lucidity\n  percent insight\n  percent fear\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n  \n  Remove in-game advertisements.\n  \n  *purchase adfree $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n", "death": "A scream tears your throat.  You shake desperately, but cannot wake yourself.  \n*line_break\n*line_break\n\"Wake up!  Wake up, darling!\"\n*line_break\n*line_break\nYour spouse wakes you.  Sad, red-rimmed eyes meet yours, and you are reminded that your mad dreams are destroying the person you love most.  Will you ever be free of these recurring nightmares? If only you could understand your dreams -- maybe then you could defeat them. \n\nYour fear stat reached 100%.  If you can keep the terrors from overtaking you, more of the story will be revealed.\n\nThe damp night air clings to your skin, and you soon fall into sleep once again.\n*page_break\n*reset\n*goto_scene dream1\n\n\n\n", "dream1": "The air smells of old dirt.  You look around and find yourself seated at a table in a small room.  Aged paint flecked off the walls years ago.  The window has no glass -- you remember selling the panes.  A bare fireplace has been cobbled into a corner.  A woman stands at a counter and stirs a squat black pot.  \n\nYou realize you are dreaming.  \n\n*choice\n #You decide to wait and see where this goes.\n  *goto pt2 \n\n #You start screaming, trying to wake up.\n  *set fear +10\n  Your mouth opens, but no sound comes out. \n\n  Your fear increases.\n  \n  *goto womanangry\n\n #A dream!  You try to fly out the window.\n  *set lucidity +10\n  Knowing that this is all in your mind, you will yourself to fly.  You only manage to hover a little.  Maybe with more practice.\n\n  Your lucidity increases. \n  \n  *goto womanangry\n\n*label womanangry\nThe woman turns to you, wiping her filthy hands on her perfect white apron.  A thin ribbon of a tongue emerges from between her lips and she hisses angrily.  What do you do?\n\n*choice\n #Run for your life.\n  *set fear +10\n  *set lucidity -5\n  *set insight -5\n  It would appear there is no escape.  Your body is frozen in place.  \n\n  Your fear increases, and you lose lucidity and insight.\n  \n  *goto pt2 \n\n #Throw a fork at her.\n  *set lucidity +5\n  *set insight -5\n  The fork misses, but it seems to calm the woman down a little. \n\n  Your lucidity increases, but you lose some insight.\n  \n  *goto pt2 \n\n #Go to the fireplace.\n  *set lucidity +5\n  *set insight +10\n  You gain insight and lucidity.  \n\n  A pile of ashes which must have taken years to accumulate is all there is in this fireplace.  Wood, tinder, and other implements of making a fire sit in a rough pail. \n  *choice\n   #Will a fire into being.\n    *set lucidity +10\n    Your lucidity increases.\n\n    Try as you might, nothing appears but a tiny spark.  You turn your head and the woman is now directly behind you, hissing at you madly.   \n\n    \"Ssssit!\"\n\n    You do as she asks, and she returns to normal.\n    *goto pt2\n   #Light a fire.\n    *set lucidity -5\n    Your lucidity decreases slightly.\n\n    In a few moments, a small fire burns in the fireplace.  \n\n    The woman stops hissing at you.  \"Not too much,\" she chides with a now-human tongue.  \"Sit.\"\n\n    You take a seat at the table.\n    *goto pt2\n\n\n\n*label pt2\nThe woman walks over to you and spoons a ladleful of gray dirt onto the table in front of you.  Your stomach aches with hunger.\n\n\"You'll have to go,\" she whispers.\n\nWithout asking, you know what the woman means.  \"I'll send half of the seashells,\" you reply.\n*if insight >= 60\n\n You remember something from your waking life.  As a child, you thought sand-dollars were actual currency.  Seashells always remind you of when you thought they were money.\n\n *goto pt2.1\n*else\n *goto pt2.1\n\n*label pt2.1\nYou rise and kiss the woman on the cheek.  The salty taste on your lips from her tears does not fade as you walk through the door, down a gangplank, and on to a busy dock.\n*finish", "dream1pt2": "You have arrived in New York City, and within a few minutes of walking the dung-filled streets you have seen more people than lived in your old hometown.  The hunger has yet to subside, and you know you must find work.\n*line_break\n*line_break\nA man in a military uniform smiles at you with a mouth full of swords.  \"Hello, Ginger,\" he says.\n\n*choice\n #Tell him to get away from you.\n  *set fear +5\n  *set lucidity -5\n  Your fear increases, and you lose lucidity.\n\n  The man simply smiles wider.  You notice a patch in the shape of an eagle on his shoulder, and it makes you nervous.\n  *goto eaten\n #Ask him what he wants.\n  *goto eaten\n\n #Punch him.\n  *set fear -5\n  *set lucidity +5\n  Your fear decreases, and you gain some lucidity.\n\n  Your knuckles are cut open, but the man is knocked back for a moment.\n  *goto eaten\n\n*label eaten\n\n\"I want you,\" the soldier growls, his sword-teeth clashing against each other with the sound of ancient battle.  His mouth opens as wide as a man's can go, and then wider.  He ingests you with a single gulp.\n\nYour fear increases.\n\nThe gate of the soldier's throat opens out to a blasted field.  Brown grass crinkles beneath your feet.  You look down and see that your feet are webbed like a duck's.\n*set fear +10\n\nYou are one of thousands of duck-footed men in military uniforms running through the field.  An overcast sky hangs low, turning the sun's light a putrid yellow.  As you run along with the crowd, your goal becomes evident: the entire mass of men is headed straight for a cliff wall which rises a hundred feet above you.\n\nAt the top of the cliff rest massive iron falcons who spit bullets rapid-fire into the crowd.\n*choice\n #Fire your weapon.\n  *set lucidity +5  \n  *set fear -5\n  You take aim at one of the falcons, but your weapon will not fire.\n\n  You gain lucidity and decrease your fear.\n  *goto endbattle \n\n #Stop running.\n  The crush of angry flesh pushes you along.\n  *goto endbattle \n  \n #Fly away. \n  *if lucidity>=75\n   *set lucidity +5\n   *set fear -5\n   You have gain lucidity and decrease your fear.\n\n   You fly above the rushing crowd, but the ebony falcons turn their heads to fire at you.  As hot iron riddles your flesh, you are surprised the bullets don't hurt.  Nonetheless, the added weight forces you back to the ground.\n   *goto endbattle\n  *else\n   *set lucidity +5  \n   *set fear -5\n   You gain lucidity and decrease your fear.\n\n   You manage to jump twenty feet into the air, but gravity pulls you back down into the violent crush. \n   *goto endbattle \n\n\n*label endbattle\n\nAs the rushing army reaches the sheer face of the cliff, they are mown down by the metal falcons like dry wheat before the scythe.  Bodies pile upon each other, and wave after wave of web-footed men try to climb the corpses of their fellows to reach the top of the cliff.  You are trampled beneath them, and become a part of the stinking mountain of the dead.\n*line_break\n*line_break\n\n\n\n*finish\n", "dream1pt3": "You lay in the pile for a while, glad to be out of the fray.  Before long, you become liquid and seep through the cracks.  \n*line_break\n*line_break\nYou pool, congeal, and reawaken, lying on the ground naked in a new-moon-dark forest.  There are men nearby, men with evil intent.  Insects crawl over you, but you dare not move.  \n*line_break\n*line_break \nThe men get closer; it is evident they are looking for you.  You stand slowly, hoping to avoid being noticed.  You see a tall bonfire blazing off to your right.  A group of what look like doves can be seen just downhill.\n\n\n*choice\n #Head for the doves.\n  As you make your way down the hill, sticks and thorns scrape your shins.  The closer you get to the \"doves\", the more evident it becomes that you are looking at something very different: men dressed all in white, wearing peaked hats and masks.  They stop their strange discussions and face you.  \n\n  \"Don't!\" you cry.\n\n  The men in white take flight and soar towards you with a chilling screech.\n\n  Your fear increases dramatically.\n  *set fear +15\n  *if fear = 100\n    *goto_scene death\n  *else \n    *goto pt2\n\n\n #Head towards the fire.\n  *set insight +10\n  You gain insight.\n\n  A little light is sure to help the situation.  The fire's warmth eases your mind, and you prepare to face the searching men.  A gaggle of them walk into the light, dressed all in white and wearing peaked hats and masks. \n\n  \"Papist,\" they wheeze.  \n\n  The men reach towards you, talons where their hands should be.  \n  *choice\n   #Run away.\n    The men in white take flight and soar towards you with a chilling screech.\n    *set fear +15\n\n    Your fear increases dramatically.\n    *if fear >= 100\n     *goto_scene death\n    *else \n     *goto pt2\n   #Fight them.\n    *set lucidity +15\n\n    How bold.  Your lucidity increases dramatically.\n    *if lucidity >= 100\n     You have reached 100 Lucidity.  You have mastered the art of lucid dreaming.\n\n     You turn your fists into stone and knock the men back into the forest, robes fluttering.  Dozens of them now pour from the trees. taking flight and soaring towards you with a chilling screech.  There are too many.\n     *goto pt2\n    *else \n     Your weak punches do not stop the men. Dozens of them now pour from the trees, taking flight and soaring towards you with a chilling screech.\n     *goto pt2\n \n*label pt2\n\nKnife-sharp talons tear your flesh, and you are on your back again.  The men huddle around you, drool pouring from beneath their masks.\n\n\"You are not real,\" one whispers.  \"We will eat your mind.\"\n\nAt the signal of a mighty crowing, the feast begins.\n\n\n*finish\n", "dream1ptend": "You wake with a start.  The moon has not moved in the sky -- you must have been asleep for only a few minutes.  The soft purr of your wife's sleep continues uninterrupted; there's a blessing, at least.  A feline stretch of the back is the only indication that you were heard at all.\n\n*finish", "dream2pt1": "Sleep returns in the merest moment.  You are not returned to dark forest of the men in white, thankfully.  Instead, you are in a forest made of glass and concrete.  Buildings rise above you far higher than is possible in the real world.  Dozens of stories.  Something akin to a locomotive engine passes you at an unthinkable speed, chrome gleaming in what little sunlight reaches between the massive structures.\n\nYou walk around the angular city in the comforting non-consecutive manner of dreams.  An old Italian man sells fish from a wooden cart, carefully eyeing the police.  You pass a store selling boxes on which talking pictures are displayed.  The boxes are showing a handsome man, and you know he is the President of the United States.  You also know he is a Catholic, which surprises you.  On the boxes, a black vulture lands on his shoulder and stabs into his head with its beak.\n\nSomething small and sharp hits the back of your head.  You turn to see where it came from: two pigeons in sweaters and short pants grin cruelly at you.  A flick of a wing hurls another rock at your head.\n\n\n*if lucidity >= 95\n *choice\n  #Stop the rock with your mind.\n   *if lucidity >= 100\n    The pebble hangs in mid-air for a moment before falling to the ground.\n\n    *goto pt2    \n   *else\n    *set lucidity +5\n    *set fear -5\n    The pebble hangs in mid-air for a moment before falling to the ground.\n\n    Your fear decreases and you have gain lucidity.\n    *if lucidity >=100\n\n     You have reached 100 Lucidity.  You have mastered the art of lucid dreaming.    \n   *goto pt2\n  #Duck.\n   The pebble misses.\n   *goto pt2\n  #Stay still.\n   *set fear -10\n   Your fear decreases.\n\n   The pebble strikes your forehead, stinging like a hornet.\n   *goto pt2\n*else \n *choice \n  #Duck.\n   The pebble misses.\n   *goto pt2\n  #Stay still.\n   The pebble strikes your forehead, stinging like a hornet.\n   *goto pt2\n\n*label pt2\n\nThe taller pigeon wiggles his iridescent neck in a motion you assume to be anger.  \"Where ya goin', jew-boy?\" he sneers.  His friend takes to the air, swooping towards you with talons aimed at your eyes.  \n\nYour fear increases.\n*set fear +15\n*if fear >= 100\n *goto_scene death\n*else \n\n You scream, and the ground gives way.  As you plummet through the blackness, slabs of concrete whirl around you.  The pigeons do not follow, instead shouting obscenities down into the pit.\n\n *finish\n", "dream2pt2": "\nYou land softly in the bottom of a very tight room with impossibly high walls.  Looking up, you see there is no ceiling.  A bird flies across the visible sky, giving you a shiver.\n\nThe room widens a bit as you look around, changing into a drab office in the corners of your eyes.  Three men in suits sit behind a large bare desk, a cold green-shaded light being the only decoration.  One is wearing a suit of blue wool, another a white tuxedo, and the third a deep red velvet robe.  Monocles twinkle in the dim, undersea twilight of the lamp.  The men are smiling at you.\n\n\"Please sit\", the tall one says.\n\nWithout any passage of time, you find yourself sitting in a wooden chair.  The men just keep smiling at you.  \"What is it you want?\" the fat one asks.\n*choice\n #I want my life.\n  \"We shall see,\" the pale one replies.\n  *goto pt2\n #I want to wake up.\n  All three men lick their lips, pull handkerchiefs out of their breast pockets, and wipe their noses.\n  *goto pt2\n #I don't want anything.\n  \"Well, we do,\" the pale one replies.\n\n\n\n*label pt2\n\nThe tall man bends down and pulls a large sack from under his seat and drops it on the desk in front of you.  It is tied at the top with a bit of twine, and a letter \"S\" is painted on the side.  \n\n\"Open it.\"\n\nAs you reach forward to pull the twine, you hear a cat meowing from the inky dark behind you.  The sound is quickly drowned out by the tinkling of seashells pouring out of the sack onto to the desk, your lap, the floor.\n\n\"We will allow you this,\" the tall one explains, \"but you must entertain us.\"\n\n\"Or protect us,\" the pale one adds.\n\n\"But never be us,\" whispers the fat one.\n\n*choice\n #Take a seashell.\n  \"Alright,\" you say as you pick up one of the sand-dollars.  \"I'll do it.\"\n\n  \"I told you,\" says the fat one.  \"I told you that is all they care about.\"\n\n  All three men lean forward in their seats, letting their monocles drop.  From the sucking holes where their eyes should be, tiny buzzing creatures shoot out and attack you, working their ways into your hair, your clothes, your ears, your fingernails.\n\n  *set fear +15\n  *set insight -5\n  You lose insight and increase your fear.\n  *if fear >= 100\n   *goto_scene death\n  *else \n   *goto badend\n #Turn around.\n   *set lucidity +5\n   *set insight +5 \n   You gain insight and lucidity. \n\n   *if lucidity = 100\n    You have reached 100 Lucidity.  You have mastered the art of lucid dreaming\n\n   *if lucidity > 100    \n    *set lucidity 100\n  Behind you is a darkness which the putrid green light does not penetrate.  A pair of small fires is all that can be seen.  A cat's mew comes forth again.\n\n  You rise and walk towards the little lights, sand-dollars crunching beneath your feet.  The darkness envelops you, an oddly tactile sensation.  \n\n  After what feels like a few miles, the little lights stop and the rest of a cat becomes visible.  \"You're safe with me,\" she purrs.  \"They will never love you, matter not what you do.\"\n\n  \"Why?\" you ask.  It seems like the sensible thing to do.\n\n  \"They're birds,\" she says.  \"Do you know who I am?\"\n\n  *if insight >= 75\n   \"Yes,\" you say.  \"You're my wife.\"\n\n   The cat yawns and makes a satisfied face as she curls up on the floor.  \"If you love me,\" she sighs, \"don't turn around.\"\n\n   You hear a rush of wings and talons behind you and wake up abruptly.  \n   *finish\n  *else \n   \"No,\" you reply.\n\n   \"Pity.\"   \n\n   You hear a rush of wings and talons behind you and wake up abruptly.  \n\n\n\n*finish\n\n*label badend\nThe little creatures creep all over and through you, sucking the liquids from your body until you are a husk.  The men put you in a box and close the lid, grinning all the while.  As the last lock clicks shut, you wake up.\n\n\n*finish\n", "dream3pt1": "You managed to wake up without disturbing your poor wife for once.  The purr of her breathing sounds as restful as you have heard in months.  You really must figure this out, you realize.  Before you drive the poor girl to madness.\n\nThe nightmares make so much sense as they are going on.  The strange creatures and places feel absolutely mundane in dreamland, but upon waking what ever logic lies behind them is lost.  If only you could decode your nightmares, make the meanings clear to yourself....\n\n*if insight >= 75\n The cat.  The cat reminds you of your wife, a silent companion.\n *line_break\n Seashells.  You remember the sand-dollars on the beach near your family's summer home -- the currency of the Atlanteans, you imagined.  Money.\n *line_break\n Fire.  Never destructive.  Memories of warm hearths.  Safety.\n *line_break\n Birds.  What is it about birds?  Why is it they torment you so?  A half-memory twists in your mind. A day at the farm.  You couldn't see your father.\n\n The image melts before you can grasp it, mercury in your mind's fingers.  Just too tired....\n\n\n\n*finish", "dream3pt2": "\nThe curtains fill with the night breeze, reeking with the sticky debauchery of the city.  Without a thought you drift out into the black and descend on to the street.  In the place of cobblestones, your bare feet find cold white tile, and a spiritless light buzzes where the moon should be.  You walk down the hall towards the nothing it leads to.\n\nShades and spirits wend their way past and around you, bone-thin men in long white sheets.  One is limping along with the help of a staff on wheels.  In the place of a shepherd's crook, a clear bag hangs, a thin tube connecting to the man somewhere under his sheet.  It makes a quiet slurping sound as it pulls the soul from him.\n\nA door pulls you in, and you see a ghost lying in a bed.  Mildewed flowers clump along the walls, once bright as flame. The jauncided shade turns its empty eyes towards you.\n\n*choice\n #Say \"Hello.\"\n  \"Hello,\" you say.  The ghost does not respond.\n  *goto pt2  \n #Make the flowers grow.\n  *set insight +5\n  You gain insight.\n\n  *if lucidity = 100\n   The flowers burst with life, warm reds and yellows filling the room.\n   *goto pt2  \n  *else \n   *set lucidity +5\n   You gain lucidity. \n   *if lucidity > 100    \n    *set lucidity 100\n   *if lucidity = 100\n    You have reached 100 Lucidity.  You have mastered the art of lucid dreaming\n\n    The flowers burst with life, warm reds and yellows filling the room.  The ghost smiles.\n    *goto pt2\n   *else \n    Nothing happens.\n    *goto pt2\n #Cry out.\n  *set fear +15\n  *if fear >= 100\n   *goto_scene death\n  *else \n   You shout in fear, but the ghost does nothing.\n\n   Your fear increases.\n   *goto pt2\n \n\n*label pt2\n\nThe ghost's lips wriggle, but no sound escapes from between them.  You feel a deep love for man on the bed, something more akin to a sweetheart or wife than a friend, and to see him struggle causes a dead weight behind your sternum.\n\nA gaggle of physicians wrestles into the room, clucking and clawing in long white coats.\n*choice\n #Shove them away with your mind.\n  *if lucidity >= 100\n   The doctors are hit with some kind of shockwave.  They fly backwards, destroying the walls, the ceiling, the whole hospital.  As the building -- indeed, the whole world -- crumbles, you wonder if you will ever learn what causes these strange dreams. \n\n   You fall through oceans of never-ending black.\n   *goto_scene death\n  *else\n   The doctors cock their heads.  \"He will die,\" one croaks. \"He deserves it.\"\n   *goto pt3\n #Ask them what is happening.\n  \"What is wrong with him?\"\n\n  One of the doctors sneers.  \"We don't care,\" he croaks.\n\n  \"He will die,\" responds another. \"He deserves it.\"\n  *goto pt3\n\n*label pt3\n*choice\n #Argue with them.\n  You bristle at the statement.  \"How can that be?\" you scream.  \"No one deserves to die.\"\n  *goto pt4\n #Cry.\n  \"How can that be?\" you wail.  \"No one deserves to die.\"\n  *goto pt4\n\n*label pt4\nThe doctors being in move in unison, dancing a circle around you and beating a terrifying tattoo with their arms.  \"He deserves to die,\" they chant.  \"You deserve to die.\"\n*if insight >= 80\n\n A memory comes to you, a time from your childhood.  Your father took you to a farm.  He had some business there, and as the men stayed inside you were sent to play in the yard.  The neighbor's geese nipping at your ankles.  Blood.\n *goto pt5\n*else \n *goto pt5\n*label pt5\n\nYou grow to an immense size, but the doctors grow fatter and taller.  Their noses extend into orange beaks.  Before long, their dancing changes and they are taking bites out of you on every third beat.\n*if insight >= 80\n *set insight +20\n *line_break\n You gain insight. \n *line_break\n *choice\n  #Stomp them.\n   *if lucidity = 100\n    You start treading on the doctor-birds, but they are too quick.  Before long, they have eaten your feet and shins.  \"Don't drink the blood,\" they chant.  \"It is poison.\"\n    *goto_scene death\n   *else\n    Your feet do not respond.  Before long, they have eaten your feet and shins.  \"Don't drink the blood,\" they chant.  \"It is poison.\"\n    *goto_scene death\n  #Call to your father.\n   \"Daddy!\"\n\n   Your father appears wearing a fine suit, his brow furrowed with concern.  He kicks the doctor-birds away and swats at them with his bone-handled cane.\n\n   Of course!  Your fear of birds -- it stems from this childhood event.  The time the geese attacked you, nipping at your legs and honking their coarse speech.\n   *finish\n*else\n\n*finish", "screenshots": "NIGHTMARE screenshots!\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n*page_break\n\nThe man simply smiles wider. You notice a patch in the shape of an eagle on his shoulder, and it makes you nervous.\n\n\"I want you,\" the soldier growls, his sword-teeth clashing against each other with the sound of ancient battle.  His mouth opens as wide as a man's can go, and then wider.  He ingests you with a single gulp.\n\nYour fear increases.\n\nThe gate of the soldier's throat opens out to a blasted field.  Brown grass crinkles beneath your feet.  You look down and see that your feet are webbed like a duck's.\n\nYou are one of thousands of duck-footed men in military uniforms running through the field.  An overcast sky hangs low, turning the sun's light a putrid yellow.  As you run along with the crowd, your goal becomes evident: the entire mass of men is headed straight for a cliff wall which rises a hundred feet above you.\n\nAt the top of the cliff rest massive iron falcons who spit bullets rapid-fire into the crowd.\n\n*set lucidity 40\n*set insight 45\n*set fear 95\n*fake_choice\n\t#Fire your weapon.\n\t#Stop running.\n\t#Fly away.\n\n*script changeBackgroundColor(\"black\")\nSleep returns in the merest moment. You are not returned to dark forest of the men in white, thankfully. Instead, you are in a forest made of glass and concrete. Buildings rise above you far higher than is possible in the real world. Dozens of stories. Something akin to a locomotive engine passes you at an unthinkable speed, chrome gleaming in what little sunlight reaches between the massive structures.\n\nYou walk around the angular city in the comforting non-consecutive manner of dreams. An old Italian man sells fish from a wooden cart, carefully eyeing the police. You pass a store selling boxes on which talking pictures are displayed. The boxes are showing a handsome man, and you know he is the President of the United States. You also know he is a Catholic, which surprises you. On the boxes, a black vulture lands on his shoulder and stabs into his head with its beak.\n\nSomething small and sharp hits the back of your head. You turn to see where it came from: two pigeons in sweaters and short pants grin cruelly at you. A flick of a wing hurls another rock at your head.\n\n*set lucidity 100\n*set insight 70\n*set fear 50\n*fake_choice\n\t#Stop the rock with your mind.\n\t#Duck.\n\t#Stay still.\n\n\n*script changeBackgroundColor(\"sepia\")\nYou land softly in the bottom of a very tight room with impossibly high walls. Looking up, you see there is no ceiling. A bird flies across the visible sky, giving you a shiver.\n\nThe room widens a bit as you look around, changing into a drab office in the corners of your eyes. Three men in suits sit behind a large bare desk, a cold green-shaded light being the only decoration. One is wearing a suit of blue wool, another a white tuxedo, and the third a deep red velvet robe. Monocles twinkle in the dim, undersea twilight of the lamp. The men are smiling at you.\n\n\"Please sit\", the tall one says.\n\nWithout any passage of time, you find yourself sitting in a wooden chair. The men just keep smiling at you. \"What is it you want?\" the fat one asks.\n\n*set lucidity 55\n*set insight 50\n*set fear 85\n*fake_choice\n\t#I want my life.\n\t#I want to wake up.\n\t#I don't want anything.\n\nAll three men lick their lips, pull handkerchiefs out of their breast pockets, and wipe their noses.\n\nThe tall man bends down and pulls a large sack from under his seat and drops it on the desk in front of you. It is tied at the top with a bit of twine, and a letter \"S\" is painted on the side.\n\n\"Open it.\"\n\nAs you reach forward to pull the twine, you hear a cat meowing from the inky dark behind you. The sound is quickly drowned out by the tinkling of seashells pouring out of the sack onto to the desk, your lap, the floor.\n\n\"We will allow you this,\" the tall one explains, \"but you must entertain us.\"\n\n\"Or protect us,\" the pale one adds.\n\n\"But never be us,\" whispers the fat one.\n\n*set lucidity 70\n*set insight 65\n*set fear 75\n*fake_choice\n\t#Take a seashell.\n\t#Turn around.\n\nThe ghost's lips wriggle, but no sound escapes from between them. You feel a deep love for man on the bed, something more akin to a sweetheart or wife than a friend, and to see him struggle causes a dead weight behind your sternum.\n\nA gaggle of physicians wrestles into the room, clucking and clawing in long white coats.\n\n*set lucidity 75\n*set insight 70\n*set fear 65\n*fake_choice\n\t#Shove them away with your mind.\n\t#Ask them what is happening.", "startup": "*title The Nightmare Maze\n*author Alex Livingston\n\n*scene_list\n  startup\n  dream1\n  dream1pt2\n  dream1pt3\n  dream1ptend\n  dream2pt1\n  dream2pt2\n  dream3pt1\n  dream3pt2\n  theend\n\n\n\n*create lucidity 50\n*create insight 50\n*create fear 50\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and (not(choice_purchased_adfree) and not(choice_is_web))\n  This game is supported by advertisements, but you can buy the unlimited version\n  to turn off ads forever.\n\n  *purchase adfree $4.99 purchased\n  *page_break_advertisement\n\n*label purchased\n\nSickly white moonlight floods the Boston night, and from your bedroom window you can see the damp rooftops shine, a static sea of silver and black.  The monotonous bells of your downstairs clock inform you it is 2 AM on the morning of June 17th, 1854, and your skin starts to crawl as you realize there is little chance you will be able to stay awake much longer.   \n\nA bird flits past your window, and your heart jumps.  \"Someday,\" you tell yourself, \"I will get fully over this irrational terror of birds.\"  For now, though, the sudden appearance of a silly childhood fear has changed your perceptions.  Every quiet creak becomes a murderer in the house, every shadow a dark ghost.  \n\n\n-- Welcome to The Nightmare Maze.  Will you be able to reach 100% Insight and solve the mystery of this poor fellow's dreams? -- \n\nThe purring pile of blankets next to you is your wife. Heart a-jitter, do you give it a nudge?\n\n*choice\n  #Wake your spouse.\n   *set fear +10\n   Your level of fear increases.\n   *line_break\n   A small push is all it takes.  \n   \"Are your alright?\" your spouse asks.  \"Another bad dream?\"\n   You shrug.  With a thin frown and a yawn, your spouse goes back to sleep.  No surprise there -- the poor dear barely sleeps at all, what with your constant nightmares.  Every night, your screams echo down the alleyways of your neighborhood.\n   *goto pt2\n  #Let your spouse sleep.\n   Good idea.  Let the poor dear got some rest for once.  After all, you're the reason for the sleepless nights.  The nightmares end with a scream loud enough to wake the neighborhood, let alone someone in your bed.  \n   *goto pt2\n\n*label pt2\n\nThe purring resumes, and you are once again alone.\n\nThe nightmares have plagued you your entire life, but recently their effect on your waking days has increased several-fold.  You have become ill from the lack of sleep, wan and yellowed.  Your marriage manages to survive somehow, but you have started to wonder how long that will last.\n\nA quick inhalation and a bob of your head.  You almost dozed off there.  Returned to the nightmare land.  You try to calm yourself the way you always have, by imagining fire.  The blissful memories of childhood all involve a bright, happy flame.  The oven in your grandmother's kitchen.  The fading hearth in your childhood home where you played by the dim light as your father smoked his nightly pipe.  Campfires with friends, telling secrets and swapping knowledge in voices quieter than the sound of crackling pine.  You'll just close your eyes for a brief moment.  Just a long blink to ease the dryness.\n\n\n\n*finish\n\n", "theend": "*if insight \u003c100\n A scream tears your throat.  You shake desperately, but cannot wake yourself.  \n\n \"Wake up!  Wake up, darling!\"\n\n Your wife wakes you.  Sad, red-rimmed eyes meet yours, and you realize your mad dreams are destroying the person you love most.  If only you could understand your dreams -- maybe then you could defeat them.\n\n The dreamworld is a strange and foreign place.  You did not reach 100 insight -- were you to do so, more of the story would be revealed.\n\n The damp night air clings to your skin, and you soon fall into sleep once again.\n *delay_ending 1200 $4.99\n\n*else\n You wake.  Just wake.  No screams, no shaking.  For once the night terrors have let you be.  \n\n You rise and go to the window.  A murder of crows gossips on the roof next door.  You smile.  They no longer hold any fear for you.\n\n But the dreams... there was more to them than the birds.  Just this one night you found yourself in the roles of a homosexual, a Jew, and an Irishman.  All people who live outside the white walls of Christian society.  Why?  \n\n You look over to your wife as she sleeps in silence and hope that the nightmares truly are gone for good.\n\n *page_break End\n We hope you've enjoyed playing [i]The Nightmare Maze.[/i]\n\n *feedback\n\n Choice of Games releases new games like this one on a regular basis.\n *subscribe\n *page_break\n\n Thank you for playing The Nightmare Maze, part of the Waking Cassandra series.  If you are interested in related content, please go to\n *link http://wakingcassandra.weebly.com\n\n *delay_ending 1200 $4.99"}};
</script>
<script>
/* ChoiceScript runtime — vanilla-JS port of the Python engine in cs/.
 *
 * Faithful reimplementation of parser + expr + interpolate + engine. The
 * engine is I/O-agnostic: it talks to an `io` object exposing text(), choose(),
 * page_break(), input_text(), input_number(), achievement(), stat_chart().
 *
 * Exposed as a global `CS` object (no modules, no build step).
 */
(function (root) {
  "use strict";

  // ---- errors ----------------------------------------------------------- //

  class CSError extends Error {
    constructor(message, scene, line) {
      super(formatLoc(scene, line) + message);
      this.raw_message = message;
      this.scene = scene === undefined ? null : scene;
      this.line = line === undefined ? null : line;
      this.name = "CSError";
    }
  }
  function formatLoc(scene, line) {
    if (scene == null && line == null) return "";
    return (scene == null ? "?" : scene) + " line " + (line == null ? "?" : line) + ": ";
  }
  class ExprError extends CSError { constructor(m, s, l) { super(m, s, l); this.name = "ExprError"; } }
  class GameOver extends Error { constructor(label) { super(label || ""); this.label = label || ""; this.name = "GameOver"; } }
  class QuitGame extends Error { constructor() { super("quit"); this.name = "QuitGame"; } }
  class LoadGame extends Error { constructor(state) { super("load game"); this.state = state; this.name = "LoadGame"; } }
  class RestartGame extends Error { constructor() { super("restart"); this.name = "RestartGame"; } }

  // ---- parser ----------------------------------------------------------- //

  const COMMAND_RE = /^\s*\*(\w+)\b[ \t]?([\s\S]*)$/;
  const INDENT_RE = /^([ \t]*)/;

  class Line {
    constructor(num, indent, command, arg, text) {
      this.num = num;
      this.indent = indent;
      this.command = command; // null for plain text
      this.arg = arg;
      this.text = text;
    }
    get is_blank() {
      return this.command == null && this.text.trim() === "";
    }
  }

  function getIndent(raw) {
    const m = INDENT_RE.exec(raw);
    const ws = m ? m[1] : "";
    if (ws.indexOf("\t") !== -1 && ws.indexOf(" ") !== -1) {
      throw new CSError("mixed tabs and spaces in indentation");
    }
    return ws.length;
  }

  function parseScene(text) {
    const lines = [];
    const rawLines = text.split("\n");
    for (let i = 0; i < rawLines.length; i++) {
      let raw = rawLines[i].replace(/\r$/, "");
      const num = i + 1;
      if (raw.trim() === "") {
        lines.push(new Line(num, 0, null, "", ""));
        continue;
      }
      const indent = getIndent(raw);
      const m = COMMAND_RE.exec(raw);
      if (m) {
        lines.push(new Line(num, indent, m[1], m[2], raw.trim()));
      } else {
        lines.push(new Line(num, indent, null, "", raw.trim()));
      }
    }
    return lines;
  }

  // ---- value coercion --------------------------------------------------- //

  function isNum(v) { return typeof v === "number"; }
  function isBool(v) { return typeof v === "boolean"; }
  function isStr(v) { return typeof v === "string"; }

  function toNum(value) {
    if (isBool(value)) throw new ExprError("Expected number, got boolean: " + value);
    if (isNum(value)) return value;
    const s = String(value).trim();
    if (/^-?\d+$/.test(s)) return parseInt(s, 10);
    // Match Python float(): the whole string must be a valid float literal.
    if (/^[+-]?(\d+\.?\d*|\.\d+)([eE][+-]?\d+)?$/.test(s)) {
      const f = Number(s);
      if (!isNaN(f)) return f;
    }
    throw new ExprError('Expected number, but got string: "' + value + '"');
  }

  function toBool(value) {
    if (isBool(value)) return value;
    if (isNum(value)) throw new ExprError("Expected boolean, got number: " + value);
    const s = String(value).trim().toLowerCase();
    if (s === "true") return true;
    if (s === "false") return false;
    throw new ExprError('Expected boolean, but got string: "' + value + '"');
  }

  function csStr(value) {
    if (isBool(value)) return value ? "true" : "false";
    if (isNum(value)) {
      // integers render without a decimal point
      if (Number.isInteger(value)) return String(value);
      return String(value);
    }
    return String(value);
  }

  // ---- expression tokenizer --------------------------------------------- //

  const TOKEN_SPECS = [
    ["OPEN_PARENTHESIS", /^\(/],
    ["CLOSE_PARENTHESIS", /^\)/],
    ["OPEN_CURLY", /^\{/],
    ["CLOSE_CURLY", /^\}/],
    ["OPEN_SQUARE", /^\[/],
    ["CLOSE_SQUARE", /^\]/],
    ["FUNCTION", /^(not|round|timestamp|log|length|auto)\s*\(/],
    ["NUMBER", /^\d+(\.\d+)?\b/],
    ["CURLY_QUOTE", /^[“”]/],
    ["WHITESPACE", /^\s+/],
    ["NAMED_OPERATOR", /^(and|or|modulo)\b/],
    ["VAR", /^\w+/],
    ["FAIRMATH", /^%[+\-]/],
    ["OPERATOR", /^[+\-*/&%^#]/],
    ["INEQUALITY", /^[!<>]=?/],
    ["EQUALITY", /^=/],
    ["COMMA", /^,/],
  ];
  const FUNC_NAME_RE = /^\w+/;

  class Token {
    constructor(name, value, pos, func) {
      this.name = name;
      this.value = value;
      this.pos = pos;
      this.func = func || null;
    }
  }

  function tokenize(expr) {
    let s = expr;
    let pos = 0;
    const tokens = [];
    while (s) {
      // String literal with backslash escapes.
      if (s[0] === '"') {
        let i = 1;
        let found = false;
        while (i < s.length) {
          const c = s[i];
          if (c === "\\") { i += 1; }
          else if (c === '"') { found = true; break; }
          i += 1;
        }
        if (!found) throw new ExprError("Invalid string, open quote with no close quote: " + s);
        const matched = s.slice(0, i + 1);
        pos += matched.length;
        tokens.push(new Token("STRING", matched, pos));
        s = s.slice(matched.length);
        continue;
      }
      let matched = null;
      for (const [name, rx] of TOKEN_SPECS) {
        const m = rx.exec(s);
        if (m && m[0]) { matched = [name, m[0]]; break; }
      }
      if (matched === null) throw new ExprError("Invalid expression, could not tokenize at: " + s);
      const [name, value] = matched;
      pos += value.length;
      s = s.slice(value.length);
      if (name === "CURLY_QUOTE") throw new ExprError("Invalid use of curly smart quote: " + value);
      if (name === "WHITESPACE") continue;
      let func = null;
      if (name === "FUNCTION") func = FUNC_NAME_RE.exec(value)[0];
      tokens.push(new Token(name, value, pos, func));
    }
    return tokens;
  }

  // ---- operators -------------------------------------------------------- //

  function fairAdd(v1, v2) {
    v1 = toNum(v1); v2 = toNum(v2);
    if (!(v1 >= 0 && v1 <= 100)) throw new ExprError("Can't fairAdd to non-percentile value: " + v1);
    if (v2 > 0) {
      const mult = (100 - v1) / 100.0;
      const value = Math.floor(v1 + v2 * mult);
      return value > 99 ? 99 : value;
    }
    const mult = v1 / 100.0;
    const value = Math.ceil(v1 - (-v2) * mult);
    return value < 1 ? 1 : value;
  }
  function fairSub(v1, v2) { return fairAdd(v1, -toNum(v2)); }

  function equals(v1, v2) {
    if (isBool(v1) || isBool(v2)) {
      return v1 === v2 || String(v1).toLowerCase() === String(v2).toLowerCase();
    }
    return v1 === v2 || String(v1) === String(v2);
  }
  function divide(a, b) {
    b = toNum(b);
    if (b === 0) throw new ExprError("can't divide by zero");
    return toNum(a) / b;
  }
  function concat(a, b) { return csStr(a) + csStr(b); }
  function numBin(fn) { return (a, b) => fn(toNum(a), toNum(b)); }
  // The `#` operator: 1-based character index into a string (e.g. name#1
  // returns the first character). Mirrors Scene.operators['#'] in scene.js.
  function charAt(v1, v2) {
    const s = csStr(v1);
    const i = toNum(v2);
    if (i !== Math.floor(i)) throw new ExprError("There is no character at position " + i + "; the position must be a whole number.");
    if (i < 1) throw new ExprError("There is no character at position " + i + "; the position must be greater than or equal to 1.");
    if (i > s.length) throw new ExprError('There is no character at position ' + i + '. "' + s + '" is only ' + s.length + " characters long.");
    return s.charAt(i - 1);
  }

  const OPERATORS = {
    "+": numBin((a, b) => a + b),
    "-": numBin((a, b) => a - b),
    "*": numBin((a, b) => a * b),
    "/": (a, b) => divide(a, b),
    "^": numBin((a, b) => Math.pow(a, b)),
    "modulo": numBin((a, b) => ((a % b) + b) % b),
    "&": (a, b) => concat(a, b),
    "#": charAt,
    "%+": fairAdd,
    "%-": fairSub,
    "=": equals,
    "!=": (a, b) => !equals(a, b),
    "<": numBin((a, b) => a < b),
    ">": numBin((a, b) => a > b),
    "<=": numBin((a, b) => a <= b),
    ">=": numBin((a, b) => a >= b),
    "and": (a, b) => toBool(a) && toBool(b),
    "or": (a, b) => toBool(a) || toBool(b),
  };

  // ---- evaluator -------------------------------------------------------- //

  class Evaluator {
    constructor(resolver) { this.resolver = resolver; }

    evalString(expr) { return this.evalTokens(tokenize(expr)); }
    evalTokens(tokens) { return this._evalExpr(tokens.slice(), null); }

    evalValueToken(stack) { return this._evalValueToken(stack.shift(), stack); }

    evaluateReference(stack, toLower) {
      if (toLower === undefined) toLower = true;
      const norm = (name) => toLower ? String(name).toLowerCase() : name;
      const findClosing = (kind, offset) => {
        let opens = 0;
        const openName = "OPEN_" + kind, closeName = "CLOSE_" + kind;
        for (let i = offset || 0; i < stack.length; i++) {
          if (stack[i].name === openName) opens += 1;
          else if (stack[i].name === closeName) {
            if (opens) opens -= 1; else return i;
          }
        }
        return -1;
      };
      if (!stack.length) throw new ExprError("Invalid expression, expected a name");
      const head = stack[0];
      if (head.name === "OPEN_CURLY") {
        stack.shift();
        const closing = findClosing("CURLY", 0);
        if (closing === -1) throw new ExprError("Invalid expression, no closing curly bracket");
        const name = this.evalTokens(stack.slice(0, closing));
        stack.splice(0, closing + 1);
        return norm(name);
      }
      if (head.name === "NUMBER") { stack.shift(); return head.value; }
      if (head.name !== "VAR") {
        throw new ExprError("Invalid expression; expected name, found " + head.name + " at char " + head.pos);
      }
      let name = String(head.value);
      stack.shift();
      while (stack.length && stack[0].name === "OPEN_SQUARE") {
        const closing = findClosing("SQUARE", 1);
        if (closing === -1) throw new ExprError("Invalid expression, no closing array bracket");
        const index = this.evalTokens(stack.slice(1, closing));
        name += "_" + csStr(index);
        stack.splice(0, closing + 1);
      }
      return norm(name);
    }

    _evalExpr(stack, parenthetical) {
      if (!stack.length) throw new ExprError("no expression specified");
      let value1 = this._evalValueToken(stack.shift(), stack);
      if (!stack.length) {
        if (parenthetical) throw new ExprError("Invalid expression, expected " + parenthetical);
        return value1;
      }
      let token = stack.shift();
      if (parenthetical && parenthetical === token.name) return value1;
      const op = OPERATORS[token.value];
      if (op === undefined) {
        throw new ExprError("Invalid expression at char " + token.pos +
          ", expected OPERATOR, was: " + token.name + " [" + token.value + "]");
      }
      if (!stack.length) throw new ExprError("Invalid expression, expected something after a " + token.value);
      const value2 = this._evalValueToken(stack.shift(), stack);
      const result = op(value1, value2);
      if (parenthetical) {
        if (stack.length) {
          token = stack.shift();
          if (parenthetical === token.name) return result;
          throw new ExprError("Invalid expression at char " + token.pos + ", expected " +
            parenthetical + ", was: " + token.name + " [" + token.value + "]");
        }
        throw new ExprError("Invalid expression, expected " + parenthetical);
      } else if (stack.length) {
        token = stack.shift();
        throw new ExprError("Invalid expression at char " + token.pos +
          ", expected no more tokens, was: " + token.name + " [" + token.value + "]");
      }
      return result;
    }

    _evalValueToken(token, stack) {
      const name = token.name;
      if (name === "OPEN_PARENTHESIS") return this._evalExpr(stack, "CLOSE_PARENTHESIS");
      if (name === "OPEN_CURLY") {
        const value = this._evalExpr(stack, "CLOSE_CURLY");
        return this.resolver.get_var(value);
      }
      if (name === "FUNCTION") {
        const value = this._evalExpr(stack, "CLOSE_PARENTHESIS");
        return this._callFunc(token.func, value);
      }
      if (name === "NUMBER") {
        return /^\d+$/.test(token.value) ? parseInt(token.value, 10) : parseFloat(token.value);
      }
      if (name === "STRING") {
        let inner = token.value.slice(1, -1);
        inner = inner.replace(/\\(.)/g, "$1");
        return this.resolver.replace_variables(inner);
      }
      if (name === "VAR") {
        let variable = String(token.value);
        while (stack.length && stack[0].name === "OPEN_SQUARE") {
          stack.shift();
          const idx = this._evalExpr(stack, "CLOSE_SQUARE");
          variable += "_" + csStr(idx);
        }
        return this.resolver.get_var(variable);
      }
      throw new ExprError("Invalid expression at char " + token.pos +
        ", expected NUMBER, STRING, VAR or PARENTHETICAL, was: " + name + " [" + token.value + "]");
    }

    _callFunc(func, value) {
      if (func === "not") return !toBool(value);
      if (func === "round") return Math.floor(toNum(value) + 0.5);
      if (func === "length") return csStr(value).length;
      if (func === "log") return Math.log10(toNum(value));
      if (func === "timestamp") return parseTimestamp(csStr(value));
      if (func === "auto") throw new ExprError("auto() must come after a < or > symbol");
      throw new ExprError("Unknown function " + func);
    }
  }

  function parseTimestamp(value) {
    const t = Date.parse(value.trim());
    if (isNaN(t)) throw new ExprError("timestamp() could not parse date: " + value);
    return Math.floor(t / 1000);
  }

  // ---- interpolation ---------------------------------------------------- //

  const REPLACER = /[$@](!?!?)\{/g;

  function replaceVariables(line, evaluator) {
    line = String(line);
    const output = [];
    let index = 0;
    while (true) {
      REPLACER.lastIndex = index;
      const m = REPLACER.exec(line);
      if (!m) { output.push(line.slice(index)); break; }
      output.push(line.slice(index, m.index));
      const sigil = line[m.index];
      const capitalize = m[1];
      const exprStart = m.index + m[0].length;
      let curlies = 0, closing = -1, i = exprStart;
      while (i < line.length) {
        const c = line[i];
        if (c === "{") curlies += 1;
        else if (c === "}") { if (curlies) curlies -= 1; else { closing = i; break; } }
        i += 1;
      }
      if (closing === -1) throw new CSError("invalid " + line.slice(m.index, exprStart) + " variable substitution");
      const body = line.slice(exprStart, closing);
      let value = sigil === "$" ? evaluator.evalString(body) : evalMultireplace(body, evaluator);
      value = csStr(value);
      if (capitalize === "!") value = value.slice(0, 1).toUpperCase() + value.slice(1);
      else if (capitalize === "!!") value = value.toUpperCase();
      output.push(value);
      index = closing + 1;
    }
    return output.join("");
  }

  function evalMultireplace(body, evaluator) {
    let expr, options;
    if (/^\s*\(/.test(body)) {
      let parens = 0, closingParen = -1;
      for (let i = 1; i < body.length; i++) {
        const c = body[i];
        if (c === "(") parens += 1;
        else if (c === ")") { if (parens) parens -= 1; else { closingParen = i; break; } }
      }
      if (closingParen === -1) throw new CSError("invalid @{} multireplace; missing closing parenthesis");
      if (closingParen + 1 >= body.length || body[closingParen + 1] !== " ")
        throw new CSError("invalid @{} multireplace; there should be a space after )");
      expr = body.slice(1, closingParen);
      options = body.slice(closingParen + 2).split("|");
    } else {
      if (!/^\S+ /.test(body))
        throw new CSError("invalid @{} multireplace; there should be a space after the first word");
      const spaceIndex = body.indexOf(" ");
      expr = body.slice(0, spaceIndex);
      options = body.slice(spaceIndex + 1).split("|");
    }
    if (options.length < 2) throw new CSError("invalid @{} multireplace; need at least one pipe |");
    let value = evaluator.evalString(expr);
    if (isBool(value) || (isStr(value) && (value.toLowerCase() === "true" || value.toLowerCase() === "false"))) {
      value = toBool(value) ? 1 : 2;
    }
    value = Math.trunc(toNum(value));
    if (value < 1) throw new CSError("invalid @{} multireplace; '" + expr + "' = " + value + " is not positive");
    if (value > options.length)
      throw new CSError("invalid @{} multireplace; '" + expr + "' = " + value +
        " but there are only " + options.length + " options");
    return replaceVariables(options[value - 1], evaluator);
  }

  const MARKUP_RE = /\[\/?(i|b|lie|key|val|stat|suspiciously|optimistically)\]/g;
  // Mirror the game's replaceBbCode for the tags that carry layout meaning:
  // [n/] is a hard line break and [c/] is a "continue, no space" marker that
  // renders as nothing. The remaining styling tags are simply dropped. The
  // resulting "\n" survives paragraph joining (which only collapses spaces and
  // tabs) and shows as a line break wherever text is rendered pre-wrap.
  function stripMarkup(text) {
    return String(text)
      .replace(/\[n\/\]/g, "\n")
      .replace(/\[c\/\]/g, "")
      .replace(MARKUP_RE, "");
  }

  root.CS = { CSError, ExprError, GameOver, QuitGame, LoadGame, RestartGame,
    Line, parseScene, getIndent, toNum, toBool, csStr, Token, tokenize, OPERATORS,
    Evaluator, replaceVariables, stripMarkup };

  // ---- state serialization ---------------------------------------------- //
  // Mirrors the Python _to_jsonable/_from_jsonable. JS also has Map values
  // (_choice_ends/_choice_used with integer keys) which JSON can't hold, so a
  // Map is encoded as {__map__: [[k, v], ...]} and restored to a Map on load.

  function toJsonable(obj) {
    if (obj instanceof Map) {
      return { __map__: Array.from(obj.entries()).map(([k, v]) => [k, toJsonable(v)]) };
    }
    if (Array.isArray(obj)) return obj.map(toJsonable);
    if (obj && typeof obj === "object") {
      const out = {};
      for (const k of Object.keys(obj)) out[k] = toJsonable(obj[k]);
      return out;
    }
    return obj;
  }

  function fromJsonable(obj) {
    if (Array.isArray(obj)) return obj.map(fromJsonable);
    if (obj && typeof obj === "object") {
      const keys = Object.keys(obj);
      if (keys.length === 1 && keys[0] === "__map__") {
        const m = new Map();
        for (const [k, v] of obj.__map__) m.set(keyFrom(k), fromJsonable(v));
        return m;
      }
      const out = {};
      for (const k of keys) out[k] = fromJsonable(obj[k]);
      return out;
    }
    return obj;
  }

  function keyFrom(k) {
    if (typeof k === "string" && /^-?\d+$/.test(k)) return parseInt(k, 10);
    return k;
  }

  // Plain deep copy for already-jsonable data (checkpoints/state). Must NOT
  // use fromJsonable, which would turn serialized {__map__} into live Maps and
  // corrupt the jsonable form.
  function deepCopy(obj) { return JSON.parse(JSON.stringify(obj)); }

  // ---- engine ----------------------------------------------------------- //

  function truthy(value) { return toBool(value); }

  const INITIAL_COMMANDS = new Set([
    "create", "create_array", "scene_list", "title", "author", "comment",
    "achievement", "product", "ifid",
  ]);

  const NOOP_COMMANDS = new Set([
    "page_break_advertisement", "finish_advertisement", "advertisement",
    "check_purchase", "restore_purchases", "purchase", "looplimit",
    "purchase_discount", "print_discount", "check_registration", "login",
    "subscribe", "share_this_game", "more_games", "feedback",
    "check_achievements",
    "sound", "youtube", "link",
    "link_button", "track_event", "timer", "ifid", "product",
    "show_password", "author", "delay_break",
    "end_trial", "script", "achievement",
  ]);

  const ENV_VARS = {
    choice_subscribe_allowed: () => true,
    choice_register_allowed: () => false,
    choice_registered: () => false,
    choice_is_web: () => false,
    choice_is_steam: () => false,
    choice_is_steam_deck: () => false,
    choice_is_ios_app: () => false,
    choice_is_ipad_app: () => false,
    choice_is_android_app: () => false,
    choice_is_omnibus_app: () => false,
    choice_is_amazon_app: () => false,
    choice_is_advertising_supported: () => false,
    choice_is_trial: () => false,
    choice_prerelease: () => false,
    choice_kindle: () => false,
    choice_randomtest: () => false,
    choice_quicktest: () => false,
    choice_nightmode: () => false,
    choice_purchase_supported: () => false,
    choice_purchased_adfree: () => true,
    choice_purchased_everything: () => true,
    choice_restore_purchases_allowed: () => false,
    choice_save_allowed: () => true,
    choice_release_date: () => "release day",
  };

  class Scene {
    constructor(name, lines) {
      this.name = name;
      this.lines = lines;
      this.labels = {};
      this._indexLabels();
    }
    _indexLabels() {
      for (let i = 0; i < this.lines.length; i++) {
        const ln = this.lines[i];
        if (ln.command && ln.command.toLowerCase() === "label") {
          const label = ln.arg.trim().toLowerCase();
          if (/\s/.test(label)) {
            throw new CSError("label '" + label + "' is not allowed to contain spaces", this.name, ln.num);
          }
          if (label in this.labels) {
            throw new CSError("label '" + label + "' already defined on line " +
              this.lines[this.labels[label]].num, this.name, ln.num);
          }
          this.labels[label] = i;
        }
      }
    }
  }

  class Engine {
    constructor(io, sceneLoader) {
      // sceneLoader(name) -> array of Line (parsed). Replaces filesystem access.
      this.io = io;
      this._loader = sceneLoader;
      io.engine = this;
      this.stats = {};
      this.temps = this._freshTemps();
      this.scene_list = [];
      this.scene_cache = {};
      this.evaluator = new Evaluator(this);

      this.scene = null;
      this.line_num = 0;
      this.indent = 0;
      this.finished = false;
      this.initial_commands = true;

      this._para = [];
      this.achievements = {};
      this.unlocked = new Set();
      this.checkpoints = {};
      this._resume = null;
      this._pending_scene = null;
      this._in_stats = false;
      this._rng = Math.random;  // overridable for deterministic tests
    }

    _freshTemps() {
      return {
        choice_reuse: "allow",
        param: [],
        _choice_ends: new Map(),
        _choice_used: new Map(),
        _choice_substack: [],
        _fake_choice_depth: 0,
      };
    }

    // ---- resolver interface ---- //

    get_var(variable) {
      variable = String(variable).toLowerCase();
      if (variable && /^-?\d+$/.test(variable)) return parseInt(variable, 10);
      if (variable === "true") return true;
      if (variable === "false") return false;
      const env = ENV_VARS[variable];
      if (env !== undefined) return env(this);
      if (variable === "choice_linenum") return this.line_num;
      if (variable === "choice_scene") return this.scene ? this.scene.name : "";
      if (variable.startsWith("choice_saved_checkpoint")) return !!this.stats[variable];
      if (variable.startsWith("choice_achieved_"))
        return this.unlocked.has(variable.slice("choice_achieved_".length));
      if (variable.startsWith("choice_purchased_")) return true;
      if (variable === "choice_user_restored" && !(variable in this.temps)) return false;
      if (variable === "choice_just_restored_checkpoint" && !(variable in this.temps)) return false;
      let value;
      if (variable in this.temps) value = this.temps[variable];
      else if (variable in this.stats) value = this.stats[variable];
      else {
        if (variable === "implicit_control_flow") return false;
        throw new CSError("Non-existent variable '" + variable + "'",
          this.scene ? this.scene.name : null, this._curNum());
      }
      if (value === null || value === undefined) {
        throw new CSError("Variable '" + variable + "' exists but has no value",
          this.scene ? this.scene.name : null, this._curNum());
      }
      return value;
    }

    replace_variables(text) { return replaceVariables(text, this.evaluator); }

    set_var(variable, value) {
      variable = String(variable).toLowerCase();
      if (variable in this.temps) this.temps[variable] = value;
      else if (variable in this.stats) this.stats[variable] = value;
      else throw new CSError("Non-existent variable '" + variable + "'",
        this.scene ? this.scene.name : null, this._curNum());
    }

    _validateVariable(variable) {
      if (!variable || !/^[a-zA-Z]/.test(variable))
        throw this._err("Invalid variable name, must start with a letter: " + variable);
      if (!/^\w+$/.test(variable))
        throw this._err("Invalid variable name: '" + variable + "'");
      if (/^(and|or|true|false|scene|scenename)$/i.test(variable))
        throw this._err("Invalid variable name, '" + variable + "' is a reserved word");
      if (variable.startsWith("choice_"))
        throw this._err("variables may not start with 'choice_'");
    }

    _curNum() {
      if (this.scene && this.line_num >= 0 && this.line_num < this.scene.lines.length)
        return this.scene.lines[this.line_num].num;
      return null;
    }
    _err(msg) { return new CSError(msg, this.scene ? this.scene.name : null, this._curNum()); }
    _safeGet(name) { try { return this.get_var(name); } catch (e) { if (e instanceof CSError) return null; throw e; } }

    // ---- scene loading + run ---- //

    load_scene(name) {
      name = name.toLowerCase();
      if (!(name in this.scene_cache)) {
        const lines = this._loader(name);
        this.scene_cache[name] = new Scene(name, lines);
      }
      return this.scene_cache[name];
    }

    run(startScene) {
      this._enterScene(this.load_scene(startScene || "startup"));
      this._runUntilEnd();
    }

    resumeFromState(state) {
      this._applyState(state);
      this._runUntilEnd();
    }

    // Run choicescript_stats against the *already-applied* engine state, as a
    // single scene. Unlike showStats() this does NOT snapshot/restore — it's
    // meant for a throwaway engine whose state was set via _applyState. Because
    // stats screens are often interactive (*choice menus of stat categories),
    // the io is free to throw StopReplay at a prompt; that propagates to the
    // caller, which records the answer and re-runs from the top. Mirrors the
    // single-scene model of engine.py show_stats (labels/goto within the scene
    // work; goto_scene out of stats is not followed, by ChoiceScript convention).
    runStatsScene() {
      this.scene = this.load_scene("choicescript_stats");
      this.line_num = 0;
      this.indent = 0;
      this.finished = false;
      this.temps = this._freshTemps();
      this._para = [];
      this._pending_scene = null;
      this._resume = null;
      this._in_stats = true;
      this._runStatsLoop();
      this._in_stats = false;
    }

    // Drive the stats overlay to completion. Unlike a single _printLoop() call,
    // this follows *gosub_scene transitions (e.g. magics' appearance text calls
    // out to utils) and the *return that comes back, so the whole stats scene
    // renders. Unlike _mainLoop it never advances into the next scene in the
    // scene list: when the stats scene finishes with no pending transition,
    // we're done.
    _runStatsLoop() {
      try {
        while (true) {
          this._printLoop();
          if (this._pending_scene !== null) {
            const nxt = this._pending_scene;
            this._pending_scene = null;
            this._enterScene(nxt);
            continue;
          }
          break;
        }
      } catch (e) {
        if (!(e instanceof GameOver)) throw e;
      }
      this._flushParagraph();
    }

    // Run choicescript_stats as a read-only overlay against current state, then
    // restore everything (the stats scene may *set globals as harmless
    // normalizations, so we snapshot stats too). Mirrors engine.py show_stats.
    // The caller must have made "choicescript_stats" loadable; if the loader
    // can't find it, the CSError propagates.
    showStats() {
      const saved = {
        scene: this.scene, line_num: this.line_num, indent: this.indent,
        finished: this.finished, temps: this.temps, _para: this._para,
        _pending_scene: this._pending_scene, _resume: this._resume,
        initial_commands: this.initial_commands, stats: Object.assign({}, this.stats),
      };
      try {
        this.scene = this.load_scene("choicescript_stats");
        this.line_num = 0;
        this.indent = 0;
        this.finished = false;
        this.temps = this._freshTemps();
        this._para = [];
        this._pending_scene = null;
        this._resume = null;
        this._in_stats = true;
        this._runStatsLoop();
      } finally {
        this._in_stats = false;
        this.scene = saved.scene;
        this.line_num = saved.line_num;
        this.indent = saved.indent;
        this.finished = saved.finished;
        this.temps = saved.temps;
        this._para = saved._para;
        this._pending_scene = saved._pending_scene;
        this._resume = saved._resume;
        this.initial_commands = saved.initial_commands;
        this.stats = saved.stats;
      }
    }

    _runUntilEnd() {
      while (true) {
        try {
          this._mainLoop();
          return;
        } catch (e) {
          if (e instanceof RestartGame) {
            this._resetAll();
            this._enterScene(this.load_scene("startup"));
            continue;
          }
          if (e instanceof LoadGame) { this._applyState(e.state); continue; }
          if (e instanceof QuitGame) {
            try { this.autosave(); } catch (_) { /* never mask quit */ }
            throw e;
          }
          throw e;
        }
      }
    }

    _mainLoop() {
      try {
        while (true) {
          this._printLoop();
          if (this._pending_scene !== null) {
            const nxt = this._pending_scene;
            this._pending_scene = null;
            this._enterScene(nxt);
            continue;
          }
          const nxt = this._nextSceneName(this.scene.name);
          if (!nxt) break;
          this.temps = this._freshTemps();
          this._enterScene(this.load_scene(nxt));
        }
      } catch (e) {
        if (e instanceof GameOver) { this._flushParagraph(); return; }
        throw e;
      }
    }

    _enterScene(scene) {
      this.scene = scene;
      this.finished = false;
      this._pending_scene = null;
      const resume = this._resume;
      if (resume !== null && resume[0] === scene.name) {
        const [, lineNum, indent] = resume;
        this.line_num = lineNum != null ? lineNum : 0;
        this.indent = indent != null ? indent : scene.lines[this.line_num].indent;
      } else {
        this.line_num = 0;
        this.indent = 0;
      }
      this._resume = null;
      if (scene.name !== "startup") this.initial_commands = false;
    }

    _nextSceneName(current) {
      const i = this.scene_list.indexOf(current);
      if (i === -1) return null;
      if (i + 1 < this.scene_list.length) return this.scene_list[i + 1];
      return null;
    }

    // ---- save / load state ---- //

    _baseState() {
      return {
        version: 1,
        scene: this.scene ? this.scene.name : null,
        line_num: this.line_num,
        indent: this.indent,
        initial_commands: this.initial_commands,
        scene_list: this.scene_list.slice(),
        stats: toJsonable(this.stats),
        temps: toJsonable(this.temps),
        unlocked: Array.from(this.unlocked).sort(),
      };
    }

    captureState() {
      const state = this._baseState();
      if (Object.keys(this.checkpoints).length) state.checkpoints = deepCopy(this.checkpoints);
      return state;
    }

    _applyState(state) {
      this.scene_list = (state.scene_list || []).slice();
      this.stats = fromJsonable(state.stats);
      this.temps = fromJsonable(state.temps);
      this.unlocked = new Set(state.unlocked || []);
      this.checkpoints = deepCopy(state.checkpoints || {});
      this.initial_commands = state.initial_commands === undefined ? false : state.initial_commands;
      this._pending_scene = null;
      this._resume = null;
      this._para = [];
      this.finished = false;
      this.scene = state.scene ? this.load_scene(state.scene) : null;
      this.line_num = state.line_num || 0;
      this.indent = state.indent || 0;
    }

    _resetAll() {
      this.stats = {};
      this.temps = this._freshTemps();
      this.scene_list = [];
      this.unlocked = new Set();
      this.checkpoints = {};
      this.initial_commands = true;
      this._pending_scene = null;
      this._resume = null;
      this._para = [];
      this.finished = false;
      this.scene = null;
      this.line_num = 0;
      this.indent = 0;
    }

    autosave() {
      if (this.scene === null) return;
      if (this.io.on_autosave) this.io.on_autosave(this.captureState());
    }

    requestRestart() { throw new RestartGame(); }

    // ---- main interpreter loop (mirrors Scene.prototype.printLoop) ---- //

    _printLoop() {
      const lines = this.scene.lines;
      this.finished = false;
      while (!this.finished && this.line_num < lines.length) {
        const line = lines[this.line_num];
        if (line.is_blank) { this._flushParagraph(); this.line_num += 1; continue; }

        const indent = line.indent;
        if (indent > this.indent) {
          if (line.command && line.command.toLowerCase() === "comment") { this.line_num += 1; continue; }
          throw this._err("increasing indent not allowed, expected " + this.indent + " was " + indent);
        }

        const end = this.temps._choice_ends.get(this.line_num);
        if (end !== undefined &&
            (truthy(this._safeGet("implicit_control_flow")) || this.temps._fake_choice_depth > 0)) {
          this.line_num = end + 1;
          if (this.temps._fake_choice_depth > 0) this.temps._fake_choice_depth -= 1;
          continue;
        }

        this.indent = indent;

        if (line.command == null && line.text.startsWith("#")) {
          throw this._err("It is illegal to fall out of a *choice statement; " +
            "you must *goto or *finish before the end of the indented block.");
        }

        if (line.command == null) {
          this.initial_commands = false;
          this._printText(line.text);
        } else {
          this._runCommand(line);
        }
        this.line_num += 1;
      }
      this._flushParagraph();
      if (!this.finished) this.finished = true;
    }

    _runCommand(line) {
      const cmd = line.command.toLowerCase();
      const data = line.arg.trim();
      if (INITIAL_COMMANDS.has(cmd)) {
        if (this.scene.name !== "startup" || !this.initial_commands) {
          if (cmd !== "comment")
            throw this._err("Invalid " + cmd + " instruction, only allowed at top of startup.txt");
        }
      } else {
        this.initial_commands = false;
      }
      const handler = DISPATCH[cmd];
      if (handler === undefined) {
        if (NOOP_COMMANDS.has(cmd)) return;
        throw this._err("Non-existent command '" + cmd + "'");
      }
      handler.call(this, data, line);
    }

    _printText(text) { this._para.push(stripMarkup(this.replace_variables(text))); }

    _flushParagraph() {
      if (this._para.length) {
        let joined = this._para.filter((p) => p !== "").join(" ");
        joined = joined.replace(/[ \t]+/g, " ").replace(/ *\n */g, "\n").trim();
        if (joined) this.io.text(joined);
      }
      this._para = [];
    }
  }

  // ---- command handlers (mirror engine._cmd_*) ---- //
  const E = Engine.prototype;

  E._evalLiteral = function (expr, line) {
    if (expr === "") throw this._err("no value specified: " + line.text);
    return this.evaluator.evalString(expr);
  };

  E._cmd_create = function (data, line) {
    const m = /^(\w*)([\s\S]*)$/.exec(data);
    let variable = m[1];
    this._validateVariable(variable);
    variable = variable.toLowerCase();
    this.stats[variable] = this._evalLiteral(m[2].trim(), line);
    return false;
  };

  E._cmd_temp = function (data, line) {
    const m = /^(\w*)([\s\S]*)$/.exec(data);
    let variable = m[1];
    this._validateVariable(variable);
    variable = variable.toLowerCase();
