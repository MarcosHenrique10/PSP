<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Arthur: A Retelling — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "arthurretelling", "title": "Arthur: A Retelling", "scenes": {"chapter2": "*text_image Lady_Vignette.png none\n\nBefore you know it, you're basking in the rays of a summer sun, which has now deigned to make an appearance, apparently. The wild grass grows in tufts across the forest\nclearing, except for an area in the middle where the grass has been worn to dirt by the hooves of many thoroughly baffled horses, and surrounded by wooden bleachers and stands.\nYes, it's Forest Sauvage's own prestigious jousting grounds, complete with colorful tents and a small gift shop. If only you had a penny for every time you've been here to\naid Kay before his matches (if two men riding towards each other with impaling sticks like crazy can be called that), and subsequently...\n\n...wait, what did you usually do at Kay's matches?\n\n*choice\n  #Watch the proceedings, if only for the amusement of watching people fall off their horses.\n    *set honor %+15\n    *set individuality %-15\n    Well, not every time, but you've go to admit it was fun to watch people fall flat on their faces now and then. I guess it didn't hurt to support Kay a little, either,\n    even if you weren't doing what you really wanted to do.\n    *goto training\n  #Sneak out into the woods and explore on my own.\n    *set individuality %+15\n    *set honor %-15\n    Sitting around and watching such an idiotic sport is definitely not my style, and it never has been. Whenever I could slip away unnoticed, I'd go into the woods\n    and make small discoveries and find wondrous things that I would cherish as my own small secrets.\n    *goto training\n  #Blend into the crowd and pick a few pockets.\n    What? A little money on the side never hurt anyone, and you never took much; you just wanted to get something yourself instead of having Sir Ector make you feel like\n    you owed him everything you had.\n    *set honor %-20\n    *set darkness %+10\n    *goto training\n\n*label training\n\n\"Yes, suitable. Quite suitable,\" you catch Merlin muttering under his breath.\n\n\"Um, what?\"\n\nHe gives you one of his signature searing gazes. He really should trademark those or something.\n\n\"This is no time for vague questions,\" he continues, and he somehow manages to smirk with only his eyes, \"For now we will begin your training.\"\n\nWhat??? You didn't sign up for this!! In fact, you distinctly recall never signing up for anything remotely [i]resembling[/i] training! What the hell is he even going\nto train you [i]in?[/i]\n\n\"We'll start with a basic test of your skill. I want you to go to the jousting grounds and bring me back the helmet of a valiant knight!\"\n\n...\n*line_break\n*line_break\n*line_break\nAre you freaking kidding me right now?\n*page_break\nOkay, so here you are. Sidling around the grounds like a weirdo on the whim of a senile old man.\n\nYou've come so far, haven't you?\n\nWhatever, might as well just get this over with already. But how are you going to find a helmet lying around when there aren't even any knights here?\n\n*choice\n  #Root around the lost and found, there might be an old helmet in there somewhere.\n    Sure, that makes a small degree of sense.\n\n    rummagerummagesiftrummage\n\n    Nope. Zilch. Worth a shot, I guess.\n    *choice\n      #Search under the bleachers\n        Well, I suppose it's worth a look?\n\n        (...some minutes pass...)\n\n        Unfortunately, a sore neck is the only fruit of your pains, unless you count some old foodstuffs that really defy description.\n  \n        \"Uh... excuse me?\"\n\n        Ohhhh no. This is bad, you can't get spotted doing something suspicious like this! You gotta-- gotta--\n        *choice\n          #HIDE!!\n            *goto bleachers\n          #CONCEAL MYSELF!!!\n            *goto bleachers\n          #SEEK REFUGE FROM DISCOVERYYYY\n            *goto bleachers\n      #Search the tent\n        *goto tent\n  #Search under the bleachers. I mean, you never know...\n    Well, I suppose it's worth a look?\n    \n    Some minutes pass...\n    \n    Unfortunately, a sore neck is the only fruit of your pains, unless you count some old foodstuffs that really defy description.\n\n    \"Uh... excuse me?\"\n\n    Ohhhh no. This is bad, you can't get spotted doing something suspicious like this! You gotta-- gotta--\n    *choice\n      #HIDE!!\n        *goto bleachers\n      #CONCEAL MYSELF!!!\n        *goto bleachers\n      #SEEK REFUGE FROM DISCOVERYYYY\n        *goto bleachers\n  #Look into the tent where the knights prep for their matches. Maybe someone left some armor behind?\n    *label tent\n    Smart thinking! Hopefully, there's no one around there either. Time to put your sneaking skills to the test, just in case!\n    \n    Evade!\n\n    Sneak!\n \n    Roll!!\n\n    So far, so good. Now all that's left is to--\n  \n    \"Uh... excuse me?\"\n\n    Ohhhh no. This is bad, you can't get spotted doing something suspicious like this! You gotta-- gotta--\n\n    The empty space below the bleachers nearby catches your eye!\n    *choice\n      #HIDE!!\n        *goto bleachers\n      #CONCEAL MYSELF!!!\n        *goto bleachers\n      #SEEK REFUGE FROM DISCOVERYYYY\n        *goto bleachers\n\n*label bleachers\n\nYou attempt to scramble under the bleachers as fast as you can, but result only in smacking your head rather painfully against the boards. \n\n...what the hell does the universe have against your head?!\n\n\"Um, are you trying to hide? Because I can still see you.\"\n\nGoddamn this stupid, stupid plan. Might as well just face the consequences and stop embarrassing yourself.\n\nYou turn to see who spotted you in your wrongdoing, and are rather surprised to see a rather fragile-looking boy who must be just around your age, with pale blond, curly hair, \nclear blue eyes, and pale skin. He walks to you from the tent, but seems to be having a hard time meeting your gaze. Shy, you're guessing.\n\n\"...hi,\" he waves at you tentatively. \"Uh, did you lose something? You kinda looked like you were looking for something.\"\n*label Bedwyr\n*choice\n  #\"Er, yes, you could say that!\"\n    *label looking\n    \"Oh!\" He seems to light up a little bit. \"Do you mind if I help you look for it? I'm good at finding things, you see.\"\n\n    You must've seemed like you were about to say no, because his expression began to grow more demure by the millisecond. Who the hell could argue with a tactic like that?!\n    \n    \"Yeah, that'd be great. Thanks...\"\n\n    The words come out all on their own, it seems, but at least they seem to have made him happy. He allows himself a shy little smile, then gets straight to searching the\n    underside of the bleachers with a zestful sparkle in his eye. Great.\n\n    \"It'd go faster if I knew what I was looking for, though. Do you mind just--\"\n\n    \"About that...\"\n\n    Forget it. You're not about to watch him dig through junk just to tell him it wasn't there after all. Better to just tell him the truth.\n\n    \"I didn't really--\"\n\n    Now he's squinting at your face. Why is he doing that?\n\n    He's not stopping. This is really incredibly distracting.\n\n    \"Um, what are you doing?\"\n\n    \"I feel like I've seen you before... somewhere...\" he continues to survey your facial features with precision, making you feel strangely uncomfortable. Suddenly, he\n    lets up with a cry:\n    \n    \"I've got it! It's Arthur, isn't it? You're sir Kay's squire! I [i]remember[/i] you now.\"\n\n    [i]Sir[/i] Kay?\n\n    \"...yeah, that's me. I don't think I've seen you before, though...?\"\n\n    \"Oh, I keep to myself mostly. I'm Sir Quinn's squire, Bedwyr, and pleased to make your acquaintance.\"\n\n    He tenses up a little bit, as if he's nervous about speaking for this long with a stranger; it doesn't seem like he does this very often.\n    *choice\n      #Reassure him\n        *set kindness %+20\n        *set Bedwyr +20\n        \"It's nice meeting a fellow squire,\" you remark somewhat awkwardly, but kindly. \"I don't really know many people my own age, so...\"\n\n        You trail off. Why does saying that make your stomach sink a little bit?\n\n        \"Really?\" Bedwyr's stunned reply interrupts your train of thought. \"You always seemed so sure of yourself, I thought you must be really popular... Not that\n        that's a bad thing, of course... I don't have many acquaintances either.\"\n\n        His expression darkens; for someone who seemed straightforward at first, he's actually turning out to be pretty hard to read.\n\n        \"Well, at least now we know each other, don't we?\" you offer tentatively. Bedwyr looks up at you curiously from the corner of his eye.\n\n        \"Yes. Yes, I suppose we do...\"\n\n        He hazards a smile: a long, bewitching smile.\n\n        \"So... you wouldn't mind telling me what you're really doing here, would you?\"\n\n        You sigh; there's no choice now, you suppose. You spill the beans in their entirety.\n\n        \"Well... Sir Quinn [i]does[/i] keep some of his armor in the tent sometimes...\"\n\n        He looks at you as if assessing just how badly you want this helmet.\n\n        \"But you'd have to promise to give it back, all right?\"\n        \n        You nod effusively, and he motions for you to follow him back to the tent. Fortunately, Bedwyr manages to find an old helmet stashed in an old trunk, and\n        entrusts it to your care.\n        *page_break\n        *goto accomplished\n      #Ignore him\n        *set kindness %-10\n        You detach yourself from the conversation, and Bedwyr's eyes flit back and forth from the ground to you.\n\n        \"Well... goodbye, then...\"\n        *page_break\n        *goto failed\n  #\"No, no, I was just... um...\"\n    You stutter hopelessly, trying to make up some kind of excuse that could plausibly justify your current behavior.\n\n    \"Um, you kind of look like you're looking for something..?\"\n    *choice\n      #\"Er, yes, you could say that!\"\n        *goto looking\n      #\"Actually, I'm looking for a knight's helmet. Seen any around?\"\n        *goto helmet\n  #\"Actually, I'm looking for a knight's helmet. Seen any around?\"\n    *label helmet\n    *set honor %+15\n    The direct approach, I see. Let's hope it works.\n    \n    \"Well, there aren't any knights around right now...\" He scratches his head thoughtfully.\n\n    Your shoulders sloop. Guess that's that then...\n\n    He seems to notice your disappointment, however, and continues:\n\n    \"...but, y'know, I might be able to find something if I look. I'm Bedwyr, by the way... wait, aren't you Sir Kay's squire?\"\n\n    \"Arthur,\" you reply. Being known simply as \"Kay's squire\" doesn't exactly sit well with you.\n\n    \"Right,\" Bedwyr nods. \"I'm Sir Quinn's squire. It's really nice to meet you, Arthur.\"\n\n    His shy dignity is evident in the slight smile he demonstrates now; his pleasure at meeting you seems completely genuine.\n\n    \"By the way, what did you want a helmet for? Did you lose one?\"\n\n    \"Actually... I just really need to borrow one?\" You wince a bit at your somewhat pathetic tone of voice.\n\n    *line_break\n    \"...Well... Sir Quinn [i]does[/i] keep some of his armor in the tent sometimes...\"\n\n    He looks at you as if assessing just how badly you want this helmet.\n\n    \"But you'd have to promise to give it back, all right?\"\n\n    You nod effusively, and he motions for you to follow him back to the tent. Fortunately, Bedwyr manages to find an old helmet stashed in an old trunk, and\n    entrusts it to your care.\n    *set Bedwyr +15\n    *page_break\n    *goto accomplished\n\n*label accomplished\nYou return to Merlin at a quick jog, holding the rather hefty helmet in your hands. You find him sitting on a bench, smoking a pipe and attempting to blow smoke rings\nunsuccessfully. Noticing your return, he gives up his pursuit and examines you closely.\n\n\"Hmmm.\"\n\nHe takes the helmet from you and examines it closely, spinning it in his hand. It seemed a lot heavier when you were carrying it...\n\n\"I notice a little rust on this helmet...?\" he remarks, giving you an inquisitive sidelong glance.\n\n\"Uh... well...\"\n\n[i]Don't tell me that after all that trouble he's not even going to accept it![/i]\n\nThough, you consider, that would be a really Merlin thing to do...\n*line_break\n*line_break\n\n\"But, I suppose it's good enough.\"\n\nWith a disdainful huff, he places the helmet on the now-vacant bench. Morrighan jumps onto your shoulder out of nowhere, startling the hell out of you (though you try\nto hide it; you've got your image to consider, you know.)\n\n\"You've got promise, kid! Kar kar kar!\"\n\n\"Quite,\" Merlin joins in absentmindedly, apparently focused on some distant point of interest outside of your scope of view. \"Though... I believe you had some help, did\nyou not?\"\n\nYou blink innocently.\n\n\"No need to hide it, ${dimin},\" he says in a scholarly tone. \"I see all, and thus know all.\"\n\n\"But never on Wednesdays, kar kar!\"\n\nMerlin glares at Morrighan, who refrains from his peculiar croaky guffawing.\n\n\"Hmph. Well, in any case, I am proud of you, Arthur, for completing this task, and for your tactful handling of the situation. One never knows where they will find future\nallies... or friends.\"\n\nHe nods, seemingly quite pleased with himself for no apparent reason.\n\n\"Yes, quite a fitting end for our first lesson. Now let us--\"\n\nWithout warning, Bedwyr pokes his head out from behind the tent.\n\n\"Oh, hi, Arthur. I was just looking--\"\n\nHe notices Merlin and Morrighan, who are absolutely frozen in shock. Morrighan darts behind the bench, attempting to conceal himself, rather ineffectually.\n\n\"Oh! Hello. Are you with--\"\n\n[i]\"IDEINWORCHFLALWS!\"[/i]\n\nWith that strange cry (Welsh, you're guessing), the figure of Merlin spirals and twists, contorting into weird shapes before turning into a winged porcelain teapot and flying away with surprising\nspeed... for a teapot. \n\nMorrighan subsequently limps away, presumably trying to disguise his identity with an uncanny impression of a one-legged pirate captain. Bedwyr just blinks, his face blank.\n*line_break\n*line_break\n\n\"...what was that all about?\"\n\n\"Oh, you know how it is,\" you reply nonchalantly. \"Wizards.\"\n*set honor %+30\n*line_break\n*\n*line_break\n*\n*line_break\n*\n*line_break\n*\n*line_break\n*\n*line_break\n*\n*page_break\n*text_image Battle_Vignette.png\n*goto nextlesson\n\n*label failed\n\nHow disappointing.\n\n*label nextlesson\n\nA couple of days later (and some verbal maneuvering to explain why you smelled like rotten oranges and pretzels to Sir Ector), you find yourself back in Merlin's tower,\nready for your next lesson...\n\nGuess you're a masochist or something.\n\nHowever, Merlin himself is nowhere to be seen. What a surprise. Even Morrighan barely seems to acknowledge your presence.\n\n\"Sorry, kid. He's gonna be a little late today,\" Morrighan informs you, not looking up from the papers he's signing with one foot. \"Something about 'magic business' or whatever.\nAs if he ever tells me anything...\" he trails off mumbling.\n*line_break\n*line_break\n...It's probably just as well, after what that old man put you through last time. You just hope he's not pissed at you for the teapot thing.\n*line_break\n*line_break\n\"Oh, he did leave you something, though,\" Morrighan recalls suddenly, and begins to rummage through the intimidating stacks of papers. Finally, he pulls out a small scrap\nof parchment and begins to read it aloud:\n\n\"A-hem. 'Dear Arthur, I am currently busy preparing our next lesson, but in the meanwhile, remember this: today may be a fateful day for you, as the stars are well aligned,\nbut if you want to achieve your full potential, you will not give in to temptation or involve yourself with distractions! You are not an ordinary person, and thus must\nfocus on the destiny that awaits you above all else. Signed, Merlin.'\"\n\n...\n\n\"Well, there you have it, kid,\" Morrighan continues, putting away the note, \"Don't get distracted or anything. Merlin's orders.\"\n\n\n...what does that even mean? Don't go playing any cards without him?\n\nUm, I think we [i]both[/i] know he totally cheats at Double Fanucci.\n*line_break\n*line_break\n\nAnyway, guess you'll have to find some way to fill the time now...\n*temp grounds_been \"false\"\n*set town_been \"false\"\n*choice\n  #Go to the nearby town\n    *goto town\n  #Go to the castle moat\n    *goto moat\n  #Go to the jousting grounds\n    *label grounds\n    Away you go!\n    *line_break\n    *\n    *line_break\n    *\n    *line_break\n    *\n    *line_break\n    *\n    *line_break\n    *\n    *line_break\n    *\n    *line_break\n    *set grounds_been \"true\"\n    Well, it looks pretty much the same as yesterday: grass, tents, bleachers, the whole works. \n\n    *if (Bedwyr > 14)\n      You're just about to leave when Bedwyr spots you from afar.\n\n      \"Arthur?\"\n\n      He smiles, and bounds towards you with remarkable agility.\n\n      \"What are you doing back here? Is Sir Kay going to participate in today's match?\"\n      *set Bedwyr +10\n      *choice\n        #\"Today's match?\"\n          \"Oh, yes--you didn't hear of it? There's rumors a famous lady might be coming to see it! Sir Quinn will be participating, so I was hoping I'd might catch a glimpse of her...\"\n        \n          He looks distant, as if he were walking in a dream...\n        \n          How do you feel about this news?\n          *choice\n            #I'm interested to see this lady! From Bedwyr's account, I take it that she must be quite beautiful.\n              \"She does sound remarkable,\" you reply.\n\n              \"Oh, I've heard she is. I know one must take the tales people tell with a grain of salt, but the descriptions of her legendary beauty were quite vivid. I'd\n              always hoped that being a squire would give me the opportunity to meet interesting people.\"\n              *goto match_visit\n            #I'm a little jealous... why does Bedwyr care so much about this lady, anyway?\n              You must look a little sullen, so Bedwyr promptly snaps out of his dreamlike trance:\n          \n              \"Oh, sorry, Arthur, I didn't mean to be rude. It's just that I'd always hoped that being a squire would give me the opportunity to meet interesting people, you know.\"\n\n              You feel a twinge of relief.\n              *line_break\n\n              ...wait, why do you feel relieved? Why should you care about this so much?\n              *choice\n                #I'm hoping to be good friends with Bedwyr, so it just annoyed me a little bit to see him so invested in this lady instead.\n                  ...Yeah, that must be it.\n                  *goto match_visit\n                #...could it be that I have... feelings for him?\n                  Your heart feels like it's stopped... just for just a moment. You [i]do[/i] feel [i]something[/i]...\n                  *line_break\n\n                  ...really? You're falling in love [i]now[/i]?\n                  *line_break\n\n                  Well... that might not be such a bad thing, I suppose... You smile to yourself just a little bit. \n                  *line_break\n\n                  Your heart is beating quite quickly now.\n                  *set Bedwyr_love \"true\"\n                  *if (Guinevere_love = true)\n                    Thoughts of Guinevere slip out of your mind-- surely, what you feel for Bedwyr is closer to your heart.\n                    *set partner \"\"\n                    *goto match_visit\n                  *else\n                    *goto match_visit\n                #This lady sounds pretty sweet, I'm glad I don't have to compete with Bedwyr for her affections!\n                  Definitely. She [i]does[/i] sound pretty sweet.\n                  *goto match_visit\n            #I'm utterly disinterested in the whole affair.\n              You don't really care about any of this, so you just kind of let Bedwyr float in his own little world for a while before he snaps out of his trance.\n              *goto match_visit\n        #\"I just... came to see you.\"\n          \"...oh. I see.\"\n\n          His cheeks flush a little bit. Um, maybe that was a little forward?\n\n          Maybe you should clarify your intentions so he doesn't get the wrong impression...\n          *choice\n            #\"I mean, I just wanted to see if you wanted to hang out or something, but if you don't want to...\"\n              \"No!\"\n            \n              He seems momentarily stunned by his own sudden action. He clears his throat, slightly red from embarrassment.\n\n              \"I mean... no, I'd love to hang out. I just can't right now because of the match, but I promise I will as soon as I can!\"\n\n              Well, that excited him a little more than perhaps you'd expected.\n              *set Bedwyr +20\n              *set individuality %+20\n              *goto match_visit\n            #Kiss him. That should clarify things pretty well.\n              *set partner \"Bedwyr\"\n              *set Bedwyr_love \"true\"\n              *set Bedwyr +50\n              *set individuality %+35\n              Without thinking, you grab him by the collar and embrace him in a kiss. His look of utter shock is really something to see.\n\n              You let go, and you both just stand there, stunned, for a few long moments.\n\n              \"Uh... I didn't... that is...\" you begin to stutter, but the words seem to get lodged in your throat. He hesitates for a moment, then\n              suddenly takes your face in his hands and kisses you gently. You're a little taken aback, but you let go and return the kiss.\n\n              Both of you stand there, together, for a few all-too-brief moments before Bedwyr steps away.\n\n              Your heart is racing pretty darn fast, and thoughts are darting around so quickly in your head it's making you dizzy. But you feel\n              strangely happy in a way you've never really felt before...\n\n              \"So, er... you're, um...\"\n\n              Bedwyr gesticulates vaguely towards you, his face a deep shade of crimson now. You think you know what that means.\n\n              *if (gender = \"male\")\n\n                \"...gay,\" you answer, completing his sentence.\n\n                \"Yeah, just... making sure.\" He stares intently at the ground, but before long, a wide smile begins to creep across his face.\n                *page_break\n                *goto romantic_visit\n              *elseif (gender = \"female\")\n\n                \"...a girl,\" you answer, completing his sentence.\n\n                \"Yeah, just... making sure.\" He stares intently at the ground, but before long, a wide smile begins to creep across his face.\n                *page_break\n                *goto romantic_visit\n              *elseif (gender = \"nonbinary\")\n\n                \"...uh,\" you consider, trying to think about how to explain your gender to him.\n\n                \"It's... complicated,\" you conclude finally. He nods.\n\n                \"Yeah, just... making sure.\" He stares intently at the ground, but before long, a wide smile begins to creep across his face.\n                *page_break\n                *goto romantic_visit\n              *goto romantic_visit\n            #\"I've just been meaning to thank you for your help the other day. So... thanks.\"\n              *set honor %+15\n              \"...I see. No need for thanks, really-- Sir Quinn didn't even notice a thing.\" He smiles kindly.\n              *goto match_visit\n        #\"Oh, I don't know. I don't talk to him much.\"\n          \"Really? ...But I guess that's not really surprising, he did seem somewhat... brusque.\"\n        \n          At least you can both agree on [i]that.[/i]\n          *goto match_visit\n    *else\n    \n      There isn't really anything more to do here, so you turn to leave. You think you spot Bedwyr out of the corner of your eye, but he doesn't acknowledge you, so you\n      just continue on your way.\n      *if (town_been = \"false\")\n        *choice\n          #Go to the nearby town\n            *goto town\n          #Go to the castle moat\n            *goto moat\n      *else\n        *choice\n          #Go to the castle moat\n            *goto moat\n\n*label match_visit\n\n\"Oh, you know what? If you're not busy later, you could come by and see the match; you might even see this mysterious lady yourself!\"\n*choice\n  #Agree, but only to see the lady\n    *set honor %-10\n    *set match_visit \"true\"\n    \"Sure, I can swing by.\"\n\n    \"Oh, great! I guess I'll see you soon, then.\"\n\n    You nod goodbye, and soon enough, you're on your way again...\n\n    ...but where to?\n    *if (town_been = \"false\")\n      *choice\n        #Go to the nearby town\n          *goto town\n        #Go to the castle moat\n          *goto moat\n    *else\n      *choice\n        #Go to the castle moat\n          *goto moat\n  #Agree, to spend more time with Bedwyr\n    *set individuality %+15\n    *set kindness %+10\n    *set Bedwyr +10\n    *set match_visit \"true\"\n    \"Sure, it sounds like fun!\"\n\n    \"Great! So, I guess I'll see you later.\"\n\n    \"I'll be there.\"\n\n    You wave goodbye, and soon enough, you're on your way again...\n\n    ...but where to?\n    *if (town_been = \"false\")\n      *choice\n        #Go to the nearby town\n          *goto town\n        #Go to the castle moat\n          *goto moat\n    *else\n      *choice\n        #Go to the castle moat\n          *goto moat\n  #Decline\n    *set Bedwyr -15\n    *set kindness %-10\n    *set match_visit \"false\"\n    \"Sorry, I might be busy later...\"\n\n    You can tell that Bedwyr is a little disappointed, but he does his best to hide it.\n\n    \"That's fine, you don't have to explain. Well, maybe some other time then.\"\n\n    He waves you goodbye, and you nod in return. You're on your way again...\n\n    ...but where to?\n    *if (town_been = \"false\")\n      *choice\n        #Go to the nearby town\n          *goto town\n        #Go to the castle moat\n          *goto moat\n    *else\n      *choice\n        #Go to the castle moat\n          *goto moat\n\n*label romantic_visit\n*set match_visit \"true\"\n\nBedwyr sits down on the grass, taking a moment to process what just happened. You sit next to him. Your hand brushes his, and he takes yours with a blush.\n\n\"So... I guess we're...\"\n\n\"Yeah, I guess we are.\" You smile, unable to hold it in.\n\nGod, since when have you been so sappy?\n\nHe smiles back, and it makes your heart flutter.\n\n...since now, I guess.\n\n\"Listen... I kind of have squire stuff now, but the match is later, so--\"\n\n\"I'll come!\"\n\nThe words just kind of spill out of your mouth, and you're just as taken aback by their suddenness as Bedwyr. You're just glad that Merlin wasn't here to see that.\n\n(Wait, why the fuck did that old man just pop into your head [i]now of all fucking times??)[/i]\n  \n\"Wow, uh... I'll see you there--I mean, um, here.\"\n\nHe beams, just a little awkwardly. Oh god, does he [i]have[/i] to be like that? Well, you just can't help it, so you lean over and kiss him again...\n*line_break\n*line_break\n  \n*text_image Dogwood_small.png\n*line_break\n*line_break\n\nYou stay with Bedwyr a little longer, just sitting quietly together, but before long, he has to go back to his duties. He's as sorry to leave as you are, but you're\ncomforted by the knowledge that you'll see each other again in a little while.\n\nSo, where to now, you old romantic, you?\n*if (town_been = \"false\")\n  *choice\n    #Go to the nearby town\n      *goto town\n    #Go to the castle moat\n      *goto moat\n    #...shut up...\n      *page_break\n      Heh heh. You've got it bad, buddy.\n      *choice\n        #Go to nearby town\n          *goto town\n        #Go to castle moat\n          *goto moat\n*else\n  *choice\n    #Go to the castle moat\n      *goto moat\n    #...shut up...\n      *page_break\n      Heh heh. You've got it bad, buddy.\n      *choice\n        #Go to castle moat\n          *goto moat\n*label town\n*page_break\nAway you go!\n*line_break\n*\n*line_break\n*\n*line_break\n*\n*line_break\n*\n*line_break\n*\n*line_break\n*\n*line_break\n*set town_been \"true\"\nAll in all, it's a pretty picturesque town: wheelbarrows, horses, rustic houses... wheelbarrows.\n\nYeah, it's boring as hell.\n\nBut still, you do get to meet new people, and there is certainly more to do than back at the castle (and certainly livelier).\n\nIn fact, street barkers seem to crowd every inch of this street, advertising wares of all kinds, from novelty yodeling shields to ripe exotic fruit.\n\nActually, you are pretty hungry...\n*line_break\n\nWhich stall would you like to visit?\n*choice\n  #The fishmongers stall\n    Yeah, those fish do look pretty fresh...\n\n    The old fishmonger looks at you with a suspicious eye-- I guess your age and your worn clothes do make you a prime candidate for a thievin' urchin.\n\n    \"If yer want a fish, sonny, I'll be needin' some coin in return!\"\n\n    ...Right. You fish (heh heh) in your pockets for some money, but... yeah, nope. You're dry.\n\n    The fishmonger snarls at you, revealing some just really nasty teeth.\n\n    \"No coin, no fish!\"\n\n    Your stomach grumbles loudly. It doesn't seem to agree with this policy.\n\n    \"Here is your coin,\" comes a confident, feminine voice. You look to your left and see a cloaked woman sliding some coins towards the fishmonger.\n\n    \"One of... these fish for the young lad,\" the woman demands, clearly uncertain as to the precise nature of the strange fish, and the next thing you know, the grumbling\n    fishmonger is handing you one!\n\n    \"Bloody urchins...\"\n\n    You can hear him continue to mutter darkly as you turn away to thank your benefactor. Instead, she pulls you away from the crowd and to an alley between two buildings.\n\n    \"Uh, miss, I don't really know y--\"\n\n    You stop dead in your tracks as the woman (who must really be at most 17) removes her hood, revealing a face of stunning beauty, with fine cheekbones, a finely pointed jawline, rosy red lips, and flowing\n    dark brown hair, not to mention a pair of dark eyes glittering with sharpness and virtue.\n\n    You are only vaguely aware that your mouth is just hanging open right now. She does you the favor of shutting it for you and practically pushes you against the wall of one\n    of the houses as some armored guards march by determinedly. She's really close right now...\n    \n    *label close\n    *line_break\n\n    How do you feel at the moment?\n    *choice\n      #Exhilarated... I've never been so close to a woman before, and my heart is beating like crazy!\n        It's true, you've never seen much of women, spending most of your time in the castle or at the jousting grounds, so being here with such a beautiful maiden is\n        really causing some chemical havoc in your body.\n\n        Suddenly, she lets go, and finding that you've lost the strength to stand due to this sudden inflow of strange chemical mixtures, you simply crumple into a heap on\n        the ground. She somehow does not seem to notice this, however.\n\n        \"Looks like they're gone,\" she proclaims with satisfaction. \"We're in the clear.\"\n\n        Finally, she takes note of your sorry state, which is understably puzzling.\n\n        \"Come now, sir, this is no time to rest-- we must celebrate my freedom!\"\n\n        ...is she just dense or what?\n\n        Well, her wish is your command, as you discover from the fact that you are now fully capable of rising to your feet. What the hell is going on with you?\n\n        \"That's more like it!\" She nods approvingly. \"Oh, but I forget myself; for one so handsome as yourself, sir, I must introduce myself: I am the Lady Guinevere,\n        come to this idyllic hamlet with my wealthy father to witness a great jousting tournament for the history books!\" She grimaces, as if unpleased with her words.\n        \"No, you see, that isn't quite right... well, yes, I am Guinevere, and my father is really tremendously wealthy, but I have little interest in jousting or idyllic\n        hamlets... in fact, I yearn for the freedom that I have now attained! Well, for a few hours, at least.\" She shrugs.\n\n        ...that's some introduction. I guess it's your turn.\n\n        \"Ah, hello. I am Arthur, squire to--\"\n\n        \"A squire?!\" she cries, cutting you off. \"Oh, what luck smiles upon me this day! I have long wanted to meet a squire, but my father forbade it and instructed me\n        that knights were invariably far more interesting. Not from my experience, let me tell you; in fact, most of the knights I've met have been downright [i]boors--[/i]\"\n\n        \"Er, if I may?\"\n\n        \"Oh, yes, please do.\"\n\n        \"If you are a lady, then why hide from those guards?\"\n\n        \"Why, simple-- I did not want them to find me, for they would surely drag me back to the monotonous world of politics and manners. It is far more exciting to be free\n        to explore on my own! Tell me, for as a native, you must know this land well: where should I go now that I am free at last?\"\n\n        *choice\n          #The forest.\n            *goto forest\n          #The castle.\n            *goto castle\n          #The jousting grounds.\n            \"Perhaps... the jousting grounds? They are a local landmark.\"\n\n            \"Oh, [i]no.[/i] I don't mean to be rude, of course, but I have a feeling I'll be getting a comprehensive tour of the jousting grounds soon enough.\"\n            *choice\n              #The forest.\n                *goto forest\n              #The castle.\n                *goto castle\n      #I can't really say I feel anything besides total shock at being swept up like this...\n        That's understandable-- her exceptional beauty doesn't mean that you have like her [i]that[/i] way. This uncouth treatment you're currently suffering, though, is\n        something else entirely...\n\n        \"Now, er, see here, young lady--\"\n\n        Paying absolutely zero heed to your words, she suddenly lets go, and you fall face first onto the floor due to the unexpectedness of the move. Well played, you must admit.\n\n        \"Looks like they're gone,\" she proclaims with satisfaction. \"We're in the clear.\"\n\n        Finally, she takes note of your sorry state.\n\n        \"Come now, sir, this is no time to rest-- we must celebrate my freedom!\"\n       \n        ...is she just dense or what?\n\n        Anyway, you rise to your feet; thankfully, the only thing that seems to have been bruised is your pride.\n\n        \"That's more like it!\" She nods approvingly. \"Oh, but I forget myself; for one so handsome as yourself, sir, I must introduce myself: I am the Lady Guinevere,\n        come to this idyllic hamlet with my wealthy father to witness a great jousting tournament for the history books!\" She grimaces, as if unpleased with her words.\n        \"No, you see, that isn't quite right... well, yes, I am Guinevere, and my father is really tremendously wealthy, but I have little interest in jousting or idyllic\n        hamlets... in fact, I yearn for the freedom that I have now attained! Well, for a few hours, at least.\" She shrugs.\n\n        ...that's some introduction. I guess it's your turn.\n\n        \"Ah, hello. I am Arthur, squire to--\"\n\n        \"A squire?!\" she cries, cutting you off. \"Oh, what luck smiles upon me this day! I have long wanted to meet a squire, but my father forbade it and instructed me\n        that knights were invariably far more interesting. Not from my experience, let me tell you; in fact, most of the knights I've met have been downright [i]boors--[/i]\"\n\n        \"Er, if I may?\"\n\n        \"Oh, yes, please do.\"\n\n        \"If you are a lady, then why hide from those guards?\"\n\n        \"Why, simple-- I did not want them to find me, for they would surely drag me back to the monotonous world of politics and manners. It is far more exciting to be free\n        to explore on my own! Tell me, for as a native, you must know this land well: where should I go now that I am free at last?\"\n\n        *choice\n          #The forest.\n            *goto forest\n          #The castle.\n            *goto castle\n          #The jousting grounds.\n            \"Perhaps... the jousting grounds? They are a local landmark.\"\n\n            \"Oh, [i]no.[/i] I don't mean to be rude, of course, but I have a feeling I'll be getting a comprehensive tour of the jousting grounds soon enough.\"\n            *choice\n              #The forest.\n                *goto forest\n              #The castle.\n                *goto castle\n\n      *selectable_if (Bedwyr_love = \"true\") #I... I can't feel anything for her, I'm already in love with someone else...\n        Whether you would feel something for her or not, you feel as if you've promised all of those feelings to Bedwyr already-- and you wouldn't give those up for anything.\n\n        \"I'm sorry to disappoint you, miss, but--\"\n\n        Completely failing to notice that you were speaking, she suddenly lets go, and you fall face first onto the floor due to the unexpectedness of the move. You must admit that you didn't\n        see that one coming.\n\n        \"Looks like they're gone,\" she proclaims with satisfaction. \"We're in the clear.\"\n\n        Finally, she takes note of your sorry state.\n\n        \"Come now, sir, this is no time to rest-- we must celebrate my freedom!\"\n       \n        ...is she just dense or what?\n\n        Anyway, you rise to your feet; thankfully, the only thing that seems to have been bruised is your pride.\n\n        \"That's more like it!\" She nods approvingly. \"Oh, but I forget myself; for one so handsome as yourself, sir, I must introduce myself: I am the Lady Guinevere,\n        come to this idyllic hamlet with my wealthy father to witness a great jousting tournament for the history books!\" She grimaces, as if displeased with her words.\n        \"No, you see, that isn't quite right... well, yes, I am Guinevere, and my father is really tremendously wealthy, but I have little interest in jousting or idyllic\n        hamlets... in fact, I yearn for the freedom that I have now attained! Well, for a few hours, at least.\" She shrugs.\n\n        ...that's some introduction. I guess it's your turn.\n\n        \"Ah, hello. I am Arthur, squire to--\"\n\n        \"A squire?!\" she cries, cutting you off. \"Oh, what luck smiles upon me this day! I have long wanted to meet a squire, but my father forbade it and instructed me\n        that knights were invariably far more interesting. Not from my experience, let me tell you; in fact, most of the knights I've met have been downright [i]boors--[/i]\"\n\n        \"Er, if I may?\"\n\n        \"Oh, yes, please do.\"\n\n        \"If you are a lady, then why hide from those guards?\"\n\n        \"Why, simple-- I did not want them to find me, for they would surely drag me back to the monotonous world of politics and manners. It is far more exciting to be free\n        to explore on my own! Tell me, for as a native, you must know this land well: where should I go now that I am free at last?\"\n\n        *choice\n          #The forest.\n            *goto forest\n          #The castle.\n            *goto castle\n          #The jousting grounds.\n            \"Perhaps... the jousting grounds? They are a local landmark.\"\n\n            \"Oh, [i]no.[/i] I don't mean to be rude, of course, but I have a feeling I'll be getting a comprehensive tour of the jousting grounds soon enough.\"\n            *choice\n              #The forest.\n                *goto forest\n              #The castle.\n                *goto castle\n\n  #The fresh bread stall\n    Yeah, that bread does look fresh out of the oven...\n\n    The hefty baker looks at you with a suspicious eye-- I guess your age and your worn clothes do make you a prime candidate for a thievin' urchin.\n\n    \"Sonny, I wouldn't be lookin' at mah bread so closely if I were yeh, unless yeh have some coin in yehr pocket!\"\n\n    ...Right. You fish in your pockets for some money, but... yeah, nope. You're dry.\n\n    The baker frowns at you and turns away with disdain.\n\n    \"I dunnae bake bread for free, y'know! It's coin or yeh'll get nuthin' from me!\"\n\n    Your stomach grumbles loudly. It doesn't seem to agree with this policy.\n\n    \"Here is your coin,\" comes a confident, feminine voice. You look to your left and see a cloaked woman sliding some coins towards the baker.\n\n    \"One of these loaves for the young lad,\" the woman demands, and the next thing you know, the baker is handing you one!\n\n    You turn to thank your benefactor, but instead, she pulls you away from the crowd and to an alley between two buildings.\n\n    \"Uh, miss, I don't really know y--\"\n\n    You stop dead in your tracks as the woman (who must really be at most 17) removes her hood, revealing a face of stunning beauty, with fine cheekbones, a finely pointed jawline, rosy red lips, and flowing\n    dark brown hair, and a pair of dark eyes glittering with sharpness and virtue.\n\n    You are only vaguely aware that your mouth is just hanging open right now. She does you the favor of shutting it for you and practically pushes you against the wall of one\n    of the houses as some armored guards march by determinedly. She's really close right now...\n    *goto close\n\n  #The weird fruit stall\n    Yeah, that fruit does look pretty ripe...\n\n    The scrawny vendor looks at you with a suspicious eye-- I guess your age and your worn clothes do make you a prime candidate for a thievin' urchin.\n\n    \"Why don't you gawk at somethin' else, sonny? My wares are strictly for payin' customers, they are!\"\n\n    ...Right. You fish in your pockets for some money, but... yeah, nope. You're dry.\n\n    The vendor seems to be actually considering spitting on you.\n\n    \"I knew it-- just another tramp lookin' for charity! Well, ye'll get none from me!\"\n\n    Your stomach grumbles loudly. It doesn't seem to appreciate the vendor's attitude.\n\n    \"Here is your coin,\" comes a confident, feminine voice. You look to your left and see a cloaked woman sliding some coins towards the vendor.\n\n    \"One of these... fruit for the young lad,\" the woman demands, clearly uncertain as to the precise nature of the strange fruit (or perhaps simply as to the plural appropriate to the context),\n    and the next thing you know, the grumbling vendor is handing you one!\n\n    \"Bloody tramps...\"\n\n    You can hear him continue to mutter darkly as you turn away to thank your benefactor. Instead, she pulls you away from the crowd and to an alley between two buildings.\n\n    \"Uh, miss, I don't really know y--\"\n\n    You stop dead in your tracks as the woman (who must really be at most 17) removes her hood, revealing a face of stunning beauty, with fine cheekbones, a finely pointed jawline, rosy red lips, and flowing\n    dark brown hair, and a pair of dark eyes glittering with sharpness and virtue.\n\n    You are only vaguely aware that your mouth is just hanging open right now. She does you the favor of shutting it for you and practically pushes you against the wall of one\n    of the houses as some armored guards march by determinedly. She's really close right now...\n    *goto close\n\n*label moat\n*page_break\n*if (grounds_been = false) and (town_been = false)\n  *set honor +20\n  *set individuality -20\nAway you go!\n*line_break\n*\n*line_break\n*\n*line_break\n*\n*line_break\n*\n*line_break\n*\n*line_break\n*\n*line_break\nActually, that wasn't that long of a trip at all, but whatever. You've seen the moat a thousand times, of course, and have often wondered why it's not filled with voracious\ncrocodiles as you'd expect (and then you have to remind yourself that crocodiles are not native to Europe). I mean, what the hell is the point of it otherwise, unless you're banking on\ninvaders being unable to swim a few paces?\n\nA loud splashing noise startles you out of your meandering, causing you to examine the murky waters more closely. Um, what was--\n\n\"[i]There[/i] you are.\"\n*line_break\n*line_break\n\nNo, you [i]don't[/i] actually fall into the moat as a result of this sudden proclamation from behind. You're not [i]that[/i] clumsy. You thankfully hold your ground and\nbegin to turn--100% certain of the identity of the only bastard that pulls stunts like that-- though your action is unfortunately halted by a hearty push from said bastard\nstraight into the drink.\n*line_break\n*line_break\n\n[i]Bastard.[/i]\n*line_break\n*line_break\n\n\"What the [i]fu--[/i]\" you begin to say, before Merlin (duh, who else would it be?) splashes some really gross water in your face. Yech.\n\n\"Silence, child,\" he commands. \"I do not approve of profanity, certainly not for such a minor occurrence.\"\n\n\"You call this [i]minor?[/i] This water probably has a billion viral bacteria in it!\"\n\n\"I also disapprove of anachronistic terminology,\" he replies, disapprovingly.\n\n\"I don't give a rat's [i]ass,[/i] Merlin. What the hell possessed you to just push me in here?!\"\n\n\"I needed to learn whether or not you were capable of swimming.\"\n\n\"You could've [i]asked![/i]\"\n\n\"This was the faster method.\"\n\n\"What if I didn't know how to swim? What if I'd [i]drowned,[/i] then what?!\"\n\nMerlin stops to consider the possibility for a moment, obviously for the first time. \n\nJesus freakin' Christ.\n\n\"Interesting point. I suppose that would've been rather unfortunate.\"\n\n\"[i]Unfort--[/i]\"\n\n\"In any case, I have now determined that you [i]can[/i] swim, rendering further discussion along this line meaningless. So, it is now time to begin our true business\nfor today.\"\n\nYou don't really wanna give him the satisfaction after all that, but what the hell, you're curious.\n\n\"...what-business-are-you-referring-to,-o-great-and-powerful-merlin?\"\n\nHe ignores your sarcastic delivery and explains simply:\n*line_break\n*line_break\n\n\"Why, your second lesson, of course.\"\n*line_break\n*line_break\n*line_break\n[i]Ca-caw![/i]\n\n*finish\n\n*label castle\n\"Um, I live at the Castle Sauvage, so maybe you could--\"\n\n\"Oh, perfect! A strange castle sounds [i]exciting,\"[/i] she says, grinning. \"All right, lead the way, Arthur!\"\n\n\"...what?\"\n\n\"You live there, don't you? Come on, let's get going before more guards show up!\"\n\nFor a lady, she's pretty damn pushy. It doesn't look like you have much of a choice, though, so you begin to make your way back to the castle with Guinevere close behind,\nwho is clearly enjoying acting like a fugitive.\n*line_break\n*\n*line_break\n*\n*line_break\n*\n*line_break\n*\n*line_break\n*\n*line_break\n*\n*line_break\nWell, guess you're back here again. You've gotten pretty used to the towering spires and all that, but Guinevere looks on in wonder with fresh eyes.\n\n\"It's amazing,\" she says finally. \"Really amazing...\"\n\nYou can't help but crack a smile seeing her like this-- I guess there's a different side to her apart from the eighty-miles-per-hour-roller-coaster Guinevere.\n\nThough, you may have spoken too soon, judging by the fact that she has now begun to attempt to climb the vines on the castle walls.\n\n\"These are really rather sturdy,\" she notes to herself with satisfaction. \"I should be able to reach that window up there in no time!\"\n\nWhat the fuck is wrong with this woman?\n\n\"Guinevere, what are you [i]doing?\"[/i]\n\nShe blinks, and halts her ascent momentarily to look down at you.\n\n\"Isn't it obvious? I'm climbing up to the window.\"\n\n\"But [i]why?\"[/i]\n\n\"Why not?\"\n\nSeriously, what the [i]fuck.[/i]\n\n[i]Crack![/i]\n\nOh, no. That can't be good.\n\n\"Uh, Guinevere--\"\n\n\"Just a moment, Arthur, I do have to concentrate--\"\n\n[i]Craaack![/i]\n\n[i]\"Guinevere!\"[/i]\n\nShe only looks somewhat bewildered as the vines she's hanging on to snap and she begins to fall to earth at a rather alarming speed. Oh, [i]hell--[/i]\n\n-----\n\nThe grass feels rather cold against your cheek as you lie spread-eagled on the ground (again...). Another minor detail is that Guinevere just so happens to be\non top of you, crushing the life out of you.\n\n\"That was rather gallant of you, Arthur, cushioning my landing like that! I didn't fall very far, anyway, but it was still very nice.\"\n\nShe tries to get up, but catches her foot on something and instead rolls to your side.\n\n\"Ah, oops.\" She blinks, unfazed, and turns to look at you. Her eyes really do gleam in such a strange way...\n\n\"So, is there anything else to climb around here?\" she asks, grinning mischievously. She might know just how much trouble she really is.\n\n*choice\n  #Get up and excuse yourself\n    You get to your feet and dust yourself off.\n\n    \"Uh, sorry, Guinevere,\" you say, not looking her in the eye. \"I have to go now. Someone's waiting for me.\"\n\n    She gets up too, and looks you straight in the eye. It makes you tremble just a little bit.\n\n    \"I understand,\" she says. \"I've dragged you this far anyway. Please forgive me.\"\n\n    \"N-no, no need to apologize,\" you stutter. \"I wouldn't have come if I hadn't wanted to.\"\n\n    She nods, satisfied with your response.\n\n    \"Well, perhaps, I'll see you at the match later.\" She smiles brilliantly.\n\n    \"Yes, perhaps...\"\n\n    You excuse yourself with a bow and go on your way once more.\n\n    *line_break\n    Where to now?\n    *if (grounds_been = \"false\")\n      *choice\n        #Go to the jousting grounds\n          *goto grounds\n        #Go to the castle moat\n          *goto moat\n    *else\n      *choice\n        #Go to the castle moat\n          *goto moat\n  #Kiss her\n    *if (partner = \"Bedwyr\")\n      *goto outrage\n    *else\n      *goto notengaged\n  #Answer honestly\n    \"Well... there are a few trees close by that are pretty good...\"\n\n    She smiles widely.\n\n    \"That's more like it!\"\n\n    You lead her to some of the more notable tree-climbing spots, and you laugh together as you take turns falling rather spectacularly. It must be the most fun you've had\n    in a while-- but then, Guinevere is really fun to be with...\n    *line_break\n\n    ...wait, what do you mean by that?\n    *choice\n      #She's just a lot of fun. What did you [i]think[/i] I meant?\n        Okay, sorry, sorry.\n\n        Some time has passed now, so you say your farewells somewhat reluctantly and head back to the road...\n\n        *if (grounds_been = \"false\")\n          *choice\n            #Go to the jousting grounds\n              *goto grounds\n            #Go to the castle moat\n              *goto moat\n        *else\n          *choice\n            #Go to the castle moat\n              *goto moat   \n      *selectable_if (Bedwyr_love = \"false\") #I think... I might be in love with her...\n        ...really? You're falling in love [i]now[/i]?\n        *line_break\n\n        Well... that might not be such a bad thing, I suppose...\n        *line_break\n        *line_break\n\n        ...Your heart is beating quite quickly now.\n        *set Guinevere_love \"true\"\n        *set partner \"\"\n\n        After exchanging farewells, you're off again with a heavy heart-- though, maybe you'll get to see her at the match later.\n        *line_break\n\n        *if (grounds_been = \"false\")\n          *choice\n            #Go to the jousting grounds\n              *goto grounds\n            #Go to the castle moat\n              *goto moat\n        *else\n          *choice\n            #Go to the castle moat\n              *goto moat   \n\n*label outrage\n\nWait, what are you doing?? What happened to Bedwyr???\n*choice\n  #I've changed my mind... I love Guinevere.\n    *set honor %-20\n    *set kindness %-20\n    *set darkness %+20\n    *set partner \"Guinevere\"\n    *set Bedwyr_love \"false\"\n    *set Guinevere_love \"true\"\n    *label embrace\n    Without a second thought, you touch a hand gently to her soft cheek, then embrace her in a long kiss. She's a little surprised by your advances, but she shuts her eyes\n    and returns the kiss, holding your arm with her hand. After some moments, you both release and just lie there, looking at each other. A wide smile grows on her face.\n\n    \"I thought you'd keep me waiting,\" she says happily.\n\n    *if (gender = \"female\")\n      \"Um, you do know that I'm a girl, right?\"\n\n      \"Yeah. I know.\"\n\n      You smile back. She takes you aback a little by kissing you again rather suddenly, but you just let go and shut your eyes...\n      *line_break\n\n      *text_image Rose_small.png\n      *line_break\n\n      After exchanging hesitant farewells, you're off again with a heavy, but quickened heart-- maybe you'll get to see her at the match later.\n      *line_break\n\n      Where to now?\n      *if (grounds_been = \"false\")\n        *choice\n          #Go to the jousting grounds\n            *goto grounds\n          #Go to the castle moat\n            *goto moat\n      *else\n        *choice\n          #Go to the castle moat\n            *goto moat     \n    *elseif (gender = \"nonbinary\")\n      \"Um, you do know that I'm not a guy... or a girl, right?\"\n\n      \"Yeah. I know.\"\n\n      You smile back. She takes you aback a little by kissing you again rather suddenly, but you just let go and shut your eyes...\n      *line_break\n\n      *text_image Rose_small.png\n      *line_break\n\n      After exchanging hesitant farewells, you're off again with a heavy, but quickened heart-- maybe you'll get to see her at the match later.\n      *line_break\n\n      Where to now?\n      *if (grounds_been = \"false\")\n        *choice\n          #Go to the jousting grounds\n            *goto grounds\n          #Go to the castle moat\n            *goto moat\n      *else\n        *choice\n          #Go to the castle moat\n            *goto moat \n    *else\n      You smile back. She takes you aback a little by kissing you again rather suddenly, but you just let go and shut your eyes...\n      *line_break\n\n      *text_image Rose_small.png\n      *line_break\n\n      After exchanging hesitant farewells, you're off again with a heavy, but quickened heart-- maybe you'll get to see her at the match later.\n      *line_break\n\n      Where to now?\n      *if (grounds_been = \"false\")\n        *choice\n          #Go to the jousting grounds\n            *goto grounds\n          #Go to the castle moat\n            *goto moat\n      *else\n        *choice\n          #Go to the castle moat\n            *goto moat    \n  #Oh no, you're right-- I should rein in this impulse...\n    *set honor %+15\n    You bite your lip, suppressing your earlier impulse. You're not sure if Guinevere noticed anything, but she does look a little disappointed...\n        \n    You get to your feet and dust yourself off.\n\n    \"Uh, sorry, Guinevere,\" you say, not looking her in the eye. \"I have to go now. Someone's waiting for me.\"\n\n    She gets up too, and looks you straight in the eye. It makes you tremble just a little bit.\n\n    \"I understand,\" she says. \"I've dragged you this far anyway. Please forgive me.\"\n\n    \"N-no, no need to apologize,\" you stutter. \"I wouldn't have come if I hadn't wanted to.\"\n\n    She nods, satisfied with your response.\n\n    \"Well, perhaps I'll see you at the match later.\" She smiles brilliantly.\n\n    \"Yes, perhaps...\"\n\n    You excuse yourself with a bow and go on your way once more.\n\n    *line_break\n    Where to now?\n    *if (grounds_been = \"false\")\n      *choice\n        #Go to the jousting grounds\n          *goto grounds\n        #Go to the castle moat\n          *goto moat\n    *else\n      *choice\n        #Go to the castle moat\n          *goto moat\n\n*label notengaged\n*set partner \"Guinevere\"\n*set Bedwyr_love \"false\"\n*set Guinevere_love \"true\"\n*set individuality %+30\n*goto embrace\n\n*label forest\n\"What about Forest Sauvage? The woods here are quite beautiful...\"\n\nGuinevere smiles.\n\n\"What a wonderful idea! A romp in a magical forest...\"\n\nShe's lost in thought for a moment, presumably picturing the romping experience.\n\n\"Yes, most agreeable,\" she concludes. \"Let us away!\"\n\nShe grabs you by the arm, and before you can protest, she's pulling you away at breakneck speed in entirely the wrong direction.\n*line_break\n*\n*line_break\n*\n*line_break\n*\n*line_break\n*\n*line_break\n*\n*line_break\n*\n*line_break\nSome backtracking later, you find yourself standing in Forest Sauvage, Guinevere at your side. It's hardly what you would picture for a picturesque wood, with cheery\nbirches and friendly forest animals-- rather more like one of those forests people tend to enter and never be seen again (except by cryptic woodsmen with imprecise directions).\nStill, it's charming in its own way; the enclosing canopy seals the forest in near-darkness, and the trees entertwine inseparably, lending the forest a somewhat magical\nand mysterious air-- one half-expects to hear faery-song at any moment. \n\nThough it probably just looks creepy to most people. You turn to see Guinevere's reaction, expecting\ndisappointment at the lack of musical woodland creatures, but instead you see nothing but awe on her face-- awe and joy.\n\n\"...it's beautiful...\" she finally says breathlessly, and smiles such a pure smile that you almost let your jaw drop again (halted by the fact that you'd prefer that Guinevere didn't come to\nsee you as a human codfish).\n\nWithout warning, she takes off at a sprint through the woods--like, a [i]sprint[/i] sprint-- disappearing into the long shadows of the forest.\n*line_break\n*line_break\n\nUh, the fuck?\n*line_break\n*line_break\n\nHer melodic laughter echoes throughout the forest, seeming to come from no particular point whatsoever, so you're left searching blindly. Wowwwww, great job, Arthur, just\nmanaged to misplace the daughter of some really important and/or rich lord or whatever.\n\nAgain with zero warning, she pokes her head out of the bushes right next to you. With a rather unflattering shriek, you then succeed in making the situation even worse\nby tripping over your own feet and falling flat on your face.\n*line_break\n*line_break\n*line_break\n\nFor some reason, the only thoughts that come to you at this admittedly not esteem-heightening moment involve questioning what you ever did to God to deserve this, along\nwith some rather fruity language.\n\nThe next thing you know, you're being quite unwillingly pulled to a sitting position, eyes firmly shut. You hear a soft chuckle, followed by a soft touch on your eyelids...\n\n\"You can open them, you know. I'm not going to laugh at you,\" whispers Guinevere's voice, almost unrecognizable in its gentleness. You blink open your eyes...\n\n...and it's almost as if you're looking at a completely different person: her beauty seems heightened somehow, and her deep dark eyes gleaming like lanterns in the blackness.\n\nShe smiles.\n\nShe [i]really[/i] smiles.\n\n*choice\n  #Get up and excuse yourself\n    You get to your feet and dust yourself off.\n\n    \"Uh, sorry, Guinevere,\" you say, not looking her in the eye. \"I have to go now. Someone's waiting for me.\"\n\n    She gets up too, and looks you straight in the eye. It makes you tremble just a little bit.\n\n    \"I understand,\" she says. \"I've dragged you this far anyway. Please forgive me.\"\n\n    \"N-no, no need to apologize,\" you stutter. \"I wouldn't have come if I hadn't wanted to.\"\n\n    She nods, satisfied with your response.\n\n    \"Well, perhaps, I'll see you at the match later.\" She smiles brilliantly.\n\n    \"Yes, perhaps...\"\n\n    You excuse yourself with a bow and go on your way once more.\n\n    *line_break\n    Where to now?\n    *if (grounds_been = \"false\")\n      *choice\n        #Go to the jousting grounds\n          *goto grounds\n        #Go to the castle moat\n          *goto moat\n    *else\n      *choice\n        #Go to the castle moat\n          *goto moat\n  #Kiss her\n    *if (partner = \"Bedwyr\")\n      *goto outrage\n    *else\n      *goto notengaged\n  #Offer to show her through the forest\n    \"...I know my way through this place pretty well... uh, I mean, would you like for me to--\"\n\n    Arm grab. Breakneck speed. Totally random choice of direction. Yup, it's always like this with her, isn't it?\n\n    And yet, you can't really help but crack a smile...\n\n    ***\n\n    After some exemplary romping and more than a few pratfalls through the undergrowth, you know it's time to for you to part ways-- but this must've been the most fun you've had\n    in a while-- but then, Guinevere is really fun to be with...\n    *line_break\n\n    ...wait, what do you mean by that?\n    *choice\n      #She's just a lot of fun. What did you [i]think[/i] I meant?\n        Okay, sorry, sorry.\n\n        You say your farewells somewhat reluctantly and head back to the road...\n\n        *if (grounds_been = \"false\")\n          *choice\n            #Go to the jousting grounds\n              *goto grounds\n            #Go to the castle moat\n              *goto moat\n        *else\n          *choice\n            #Go to the castle moat\n              *goto moat   \n      *selectable_if (Bedwyr_love = \"false\") #I think... I might be in love with her...\n        ...really? You're falling in love [i]now[/i]?\n        *line_break\n\n        Well... that might not be such a bad thing, I suppose...\n        *line_break\n        *line_break\n\n        ...Your heart is beating quite quickly now.\n        *set Guinevere_love \"true\"\n\n        After exchanging farewells, you're off again with a heavy heart-- though, maybe you'll get to see her at the match later.\n        *line_break\n\n        *if (grounds_been = \"false\")\n          *choice\n            #Go to the jousting grounds\n              *goto grounds\n            #Go to the castle moat\n              *goto moat\n        *else\n          *choice\n            #Go to the castle moat\n              *goto moat   \n\n", "chapter3": "*advertisement 600\n*text_image Pond.jpg none\n*line_break\n*line_break\n\nSOME LEAGUES FROM THE CASTLE SAUVAGE...\n\nAn entourage of riders makes its way down a long dirt road at a leisurely pace, laden with noble banners. The sky above hints at rain.\n\n\"We're getting closer to the village,\" says the young man at the head of the group. \"Hide those banners before anyone sees them.\"\n\nThe bearers obediently furl the banners and put them away, golden lions peeking out of the folds.\n\n\"Master Rience, I must urge you to reconsider-- it is hardly befitting for one of your status to make such a casual appearance, especially at a comparatively [i]minor[/i]\nsporting event such as this.\"\n\nThe young man turns to his advisor, a wicked grin upon his delicate face.\n\n\"Well, [i]Henry,[/i] spectating is hardly my aim... now, is it?\"\n*line_break\n*\n*line_break\n*\n*line_break\n*\n*line_break\n*\n*line_break\n*\n*line_break\n*\n*line_break\n\nYou give your clothes a tentative sniff.\n\nYou regret doing so.\n*line_break\n\nThe moat is behind you now, so that's something. What's not something is that Merlin is obviously about to launch into another of his long discourses...\n\n\"Now, this lesson will be greatly different from the previous one, and may contain some inherent peril in its execution. Which I am not liable for, I may add.\"\n\nYour expression is the picture of disinterest.\n\n\"After great consideration, I decided that it is now most crucial to sharpen your sense of perspective as well as your problem-solving skills. This is a very important\nstage for you, critical to the foundation of your character. So, I will now turn you into a fish.\"\n*line_break\n*line_break\n...time-out.\n\nWhat?\n\n\"What?\" you ask incredulously.\n\n\"Prepare yoursel--\"\n\n\"Hang on a minute!\"\n\nMerlin seems irritated by this delay. \"What is it, ${dimin}?\"\n\n\"No!\"\n\n\"Eh?\"\n\n\"I don't want to be a fish!\"\n\n\"Don't be absurd. It'll only take a few hours, at the most.\"\n\n*if (match_visit = true)\n  \"[i]Hours?[/i] But I promised to go to the jousting match this afternoon!\"\n\n  \"Well, one should not make promises they cannot keep.\"\n  \n  *if (Bedwyr_love = true) or (Guinevere_love = true)\n    You feel a bitter twinge in your heart.\n    *goto animals\n  *else\n    You sigh deeply. There go those plans, I guess...\n    *goto animals\n*else\n  \"[i]Hours?[/i]\"\n\n  Merlin does not grace your undignified reaction with a response.\n  *goto animals\n\n*label animals\n\n\"Well, I suppose I can at least give you a choice.\"\n\n[i]Please don't be talking about the kind of fish...[/i]\n\n\"Which animal would you prefer to be?\"\n*temp animalchoice\n*choice\n  #A raven.\n    *set animalchoice \"raven\"\n    *goto raventime\n  #A lion.\n    *set animalchoice \"lion\"\n    *goto liontime\n  #...fish, I guess.\n    *set animalchoice \"fish\"\n    *goto fishtime\n\n*label raventime\n*set darkness %+15\n\n\"[i]HRAEFNFORMUS![/i]\"\n*page_break\nYou blink.\n\nBut you're not blinking your own eyes.\n*line_break\n*line_break\n\nYou don't have your mouth.\n\nYou don't have your hands.\n\nYou don't have your legs.\n\nEverything is different now.\n\nInstead of just skin, you have glossy blackness. Your legs are thin and sharp.\n\nYour wings...\n\n\"Hello, little bird,\" says a deep, enchanting female voice. You cock your head to see.\n\nA noble face, long and well-formed. A pointed nose and chestnut eyes. Dark eyebrows, and the deepest shade of brown is her wild, long hair. Her eyes-- they must be so ancient,\nand yet her face is so young...\n\nA very pale hand reaches forward and gently strokes your feathers. Her lips are together, not smiling, but there is something much deeper than a smile in her eyes alone.\n\n\"I have been waiting for you,\" she says soothingly. \"For a very long time.\"\n*choice\n  #\"...who are you?\"\n    She bows her head slightly, her eyes looking at you from below.\n\n    \"My name is Morgan,\" she says, \"And I know you, Arthur.\"\n\n    She brushes your throat ever so slightly with her passing hand.\n\n    \"Some call me an enchantress, a witch wicked and wild. But I think you know only ignorants think in such simple terms.\"\n\n    She shuts her eyes for a soft moment, and awakens again.\n\n    \"Tell me something, Arthur: what do you think of destiny?\"\n    *choice\n      #\"Well, everyone has one, and Merlin tells me mine is a very important one, so there is my path.\"\n        \"Hmm. You seem to put a lot of faith in Merlin's word-- and yet, has he ever actually told you what your destiny [i]is?[/i]\n\n        You stutter, trying to think of an answer. Come to think of it, he's never [i]exactly[/i] said...\n\n        \"As I thought; he does not trust you even with knowledge of yourself.\"\n\n        *if (glitch = \"true\")\n          She leans in closer.\n\n          \"And you [i]know[/i] that something's not right... don't you, Arthur?\"\n\n          You tremble. You remember something you thought you'd forgotten: a voice, a face... a command. The girl's face is grim.\n\n          \"You've only been given the illusion of choice; pushed into a 'destiny' you never asked for. He doesn't want you to be yourself, Arthur-- he's already\n          decided who you are.\"\n          *goto faychoice\n\n        *else\n          She looks deeply into y
