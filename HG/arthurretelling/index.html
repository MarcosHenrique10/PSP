the banquet to begin.\"\n\n  \"Ah, yes. Of course. I'll be... right there.\"\n\n  Another day, another event... does it never end?\n\n  \"Hey.\"\n\n  You feel a soft grip on your hand, and recognize your wife's hand: Guinevere.\n\n  \"It's all good.\"\n\n  You look back at her, and see her smile encouragingly. You soften.\n\n  \"Ready for this?\"\n\n  \"I was [i]born[/i] ready. How about you?\"\n\n  You sigh. Not so much.\n\n  \"Oh, come on. We'll have some alone time afterwards, I promise.\"\n\n  You smile. Maybe this day won't be so bad after all...\n\n  *goto_scene ending\n*else\n  *goto alone\n\n*label leave\nYou look around, and feel the grass under your hands. Grass? Wait. You take a closer look, and recognize the looming shape before you: the castle! You're back at the moat!\n\n\"Hello, Arthur.\"\n\nYou turn, and see... Merlin?\n\n\"What's going on?\"\n\n\"Simple. You've made your decision, and now the consequences will unfold.\"\n\nHe offers you his hand. You look up at him, and you could almost swear you see a smile unfold beneath the many layers of his beard.\n\n\"I'm proud of you for making this choice, Arthur. Of course, it is what should be expected of you.\"\n\nYou take his hand, and he raises you up.\n\n\"It's finally time for your destiny to begin.\"\n*page_break\nMANY YEARS IN THE FUTURE...\n*line_break\n*line_break\n\"My lord?\"\n\nThe high, vaulted ceiling rises high above your head, suspended by a series of impressive pillars surrounding you. It's quite a sight to see...\n\n\"Ahem.\"\n\nSurprised, you look down again to find the voice, and find a man in formal clothes looking back at you.\n\n\"Your majesty, it is time for the banquet to begin.\"\n\n\"Ah, yes. Of course. I'll be... right there.\"\n\nThe man walks away, and you sigh. Is this all it's come to? Banquets and festivities? What happened to the questing beasts and the ladies in the lake, to the [i]adventure?[/i]\n\n\"Hey.\"\n\nYou feel a soft grip on your hand, and recognize your wife's hand: Guinevere.\n\n\"It's all right.\"\n\nYou look back at her, and see her smile encouragingly. She is the one who gives you strength, but the distance in her eyes seems to you to be growing...\n\n\"Milady.\"\n\n...who? You turn and see a younger, blond knight facing you. You notice he has blue eyes.\n\n\"Ser Lancelot, your majesty. I came to speak to the Lady Guinevere, if you would allow it.\"\n\nYou nod, cautiously. What could he want with her?\n\nYou try to tell her goodbye, but she's gone before you can speak, walking off with him. Hmm.\n\nI suppose it is past time for the festivities to begin...\n*goto_scene ending\n\n*label cauldron\nNng. What...\n\n\"Rise.\"\n\nWhat?\n\n\"Rise, my son!\"\n\nNot this shit again...\n\nYou manage to push yourself off the damp ground and steady yourself on your feet. What you see is truly disheartening-- a cold, black world without a sun. Dark, crumbling\nbuildings spiral toward the sky, menacingly shadowing the undercity below.\n\n\"Come, come! I have been waiting for you.\"\n\nYou look for the source of the voice, and find a translucent specter of a man standing behind a great, dark cauldron. A golden crown shimmers upon his head.\n\n\"Who... are you?\"\n\n\"I am your father, child, and king of these lands. Or at least... I was.\"\n\nSomething about his face reminds you of someone... could it be...?\n\n\"King Uther?\"\n\nHe doesn't look much like his portraits, but part of you is sure.\n\n\"Indeed. I'm surprised you recognized me.\"\n\n\"What are you doing here? And since when are you my father?\"\n\n\"One, this is where I've always been and two, since forever. But never mind any of that, I'm here to help you with something far more important.\"\n\n\"What do you mean?\"\n\n\"I mean this cauldron. It may not look like much, but it means more than you could imagine.\"\n\nHe looks up at you with a serious gaze.\n\n\"You've made a dark choice, Arthur. Whether you continue on that path is entirely up to you.\"\n\nYou hesitate. You know what he's saying is right, but you're not quite sure what to feel.\n\n\"Now, observe this cauldron. Within it is a magic potion, freshly brewed. You have a choice-- drink from the mysterious contents and face your destiny, or forgo the risk\nand be free to live your life. Which shall you choose.\"\n\nYou take a deep breath. Something tells you that this is the most important choice you've made so far.\n*choice\n  #Drink the potion\n    You look at the potion, then at the king. You've made your choice.\n\n    You take the ladle and bring the potion to your lips, carefully. You sip from it and immediately you begin to feel lightheaded, not quite there. Eyes roll up. You feel\n    the ground rushing toward you as darkness engulfs you...\n\n    You open your eyes. It's bright.\n    *page_break\n    *goto leave\n  #Don't drink it\n    You look at the potion, then at the king. You've made your choice.\n\n    \"I won't drink it.\"\n    \n    \"Very well, then.\"\n\n    He draws his sword.\n\n    \"Time to face the consequences.\"\n\n    \"Wait--\"\n\n    Too late. He raises it and lowers it, followed by a searing flash of pain.\n\n    You open your eyes. It's bright.\n    *page_break\n    *goto stay\n  #Knock over the cauldron\n    You look at the potion, then at the king. You've made your choice.\n\n   Without warning, you attack the cauldron, pushing it with all your strength. The King stumbles backwards.\n\n   \"What--\"\n\n   Then it's done. The poison spills and disappears into the ground. And just the two of you are left there, looking at one another. His gaze is dark.\n  \n   \"Very well, then.\"\n\n   He draws his sword.\n\n   \"Time to face the consequences.\"\n\n   \"Wait--\"\n\n   Too late. He raises it and lowers it, followed by a searing flash of pain.\n\n   You open your eyes. It's dark.\n   *goto end\n*label alone\n\n\"Hello, Arthur.\"\n\nYou turn, and see... Merlin?\n\n\"What's going on?\"\n\n\"Simple. You've made your decision, and now the consequences will unfold.\"\n\nHe offers you his hand. You look up at him, and you see his stern gaze look back at you.\n\n\"I can't say that this is what I wanted for you, Arthur. But if it's your will, then so be it.\"\n\nYou stand up, without his help.\n\n\"It's time for your destiny to begin.\"\n*page_break\nMANY YEARS IN THE FUTURE...\n*line_break\n*line_break\n\"And... go!\"\n\nA flag falls, and two horses begin to rush toward each other at full speed. Lances reach out, and there's a breath...\n\nIn a split second, it's all over. The lance crashes dramatically against the body of the loser, who tumbles violently to the ground, while the victor rides on, unharmed.\n\n\"That was quite the match.\"\n\nThere he is, his fragile frame standing tall against the midday sun: Bedwyr.\n\n\"I try my best.\"\n\n\"But of course,\" he replies seriously. \"I'd expect nothing less.\"\n\n\"Your turn next.\"\n\nHe half-smiles.\n\n\"You know... I'm not one to introspect too much, but we [i]have[/i] come a long way. Not just in terms of victories, but, you know... as friends?\"\n\nYour turn to smile.\n \n\"Come on, saddle up. This thing's not over yet.\"\n\nBedwyr groans.\n\n\"I hope it doesn't come to another face-off between us. I [i]hate[/i] it when that happens.\"\n\n\"If it does, I'll be sure to knock you off your horse gently.\"\n\n\"Ha-ha.\"\n\nYou mount your horses, and ride together. It's going to be a long day...\n*goto_scene ending\n\n*label end\nYou look around, and feel the grass under your hands. Grass? Wait. You take a closer look, and recognize the looming shape before you: the castle! You're back at the moat!\n\n\"Hello, Arthur.\"\n\nYou turn, and see... Morgan?\n\n\"What's going on?\"\n\nShe takes a seat beside you.\n\n\"I don't really know. It's a strange situation.\"\n\nShe smiles.\n\n\"But wherever we go from here... I'm glad we're together.\"\n\nHer smile is cold somehow, and an involuntary shiver crawls up your spine. The beginning of an era...\n*page_break\nMANY YEARS IN THE FUTURE...\n*line_break\n*line_break\nThe sight that meets your eyes is beyond description: a dystopia, truly a wasteland of sand and darkness. No, not darkness... a [i]black sun[/i].\n\n\"Enjoying the view?\"\n\nThe darkness radiates off her, an almost-tangible haze hanging from her fingertips.\n\n\"As always.\"\n\n\"You should. It's what we built together, you and I-- something to be treasured.\"\n\n\"I know.\"\n\nYou bow your head slightly; sometimes, you wonder if this is what you really wanted. But most of the time, those voices silence themselves and you're left with the cold\nemptiness you've grown comfortable with.\n\n\"Ready, ${sibling}?\"\n\n\"Of course.\"\n\nOf [i]course[/i]... you're ready.\n*goto_scene ending\n", "choicescript_description": "This epic reimagining of Arthurian legend takes you from humble life as an English squire with an attitude problem to a mythical dreamscape of possibilities, meeting many familiar (and not-so-familiar) faces along the way. \n\n[i]Arthur: A Retelling[/i] is a 30,000-word medieval adventure that allows you to play as as Arthur themself (the gender is up to you) as you discover your own path to greatness and decide what you want to be. Embark on a quest of self-discovery with thrilling action and plenty of romance along the way-- pick from straight, gay, or even more options.\n\nYoung Arthur is an unremarkable page apprenticed to Sir Kay in the Early Middle Ages in England. Their world gets turned upside down by the arrival of the eccentric magician Merlin, who takes the youth under his wing and sets them on a path to greatness. But there are other figures seeking to influence this child of prophecy…\n\nFrom the loyal Bedivere to the lovely Guinevere to the enigmatic Rience, Arthur’s interactions with this expansive cast determine their ultimate destiny. Will they rule Britain as prophesied? Abandon morality entirely? Or take another option, entirely unforeseen? Only you can decide. Along the way, you can:\n\n• Transform into an assortment of creatures\n• Undergo rigorous magical trials\n• Romance classic characters from myth\n• Discover unexpected kung fu skills\n• Find your destiny as the one and only Arthur!\n\nWhat are you waiting for? Camelot beckons…\n", "choicescript_stats": "Here are your stats, good squire:\n\n*stat_chart\n  percent individuality\n  percent darkness\n  percent honor\n  percent kindness\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n  \n  Remove all advertisements and delays.\n  \n  *purchase_discount adfree 2023-03-09 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n  \n  You've paid to remove all ads and delays.\n", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Arthur: A Retelling.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 600 $4.99 $0.99\n", "screenshots": "*set name \"Arthur\"\n*set gender \"male\"\n*set individuality 35\n*set darkness 25\n*set honor 15\n*set kindness 5\n*set him \"him\"\n*set his \"his\"\n*set he \"he\"\n*set dimin \"boy\"\n*set maxin \"man\"\n*set age 16\n*set sibling \"brother\"\nIn a puff of blue smoke and blinding flashes of silvery light, the entire kitchen is obscured from view and you begin to cough profusely. As your eyes water and shut \nin the weird environment, a few moments pass and the mist begins to thankfully dissipate. In its wake is left a single figure, a tall and wizened one with a long, \nwhite beard and a great pointed hat resting on its head. As your surroundings contine you to clear, you begin to recognize the man who stands before you as none other \nthan…\n\n“...Merlin?” you enquire, still coughing slightly from the effects of his over-the-top entrance. He doesn’t look quite like his pictures, but still, who else would \nwear a hat like that in public?\n\n“Yes, Arthur, it is I,” he booms in reply, his voice reverberating through the kitchen in gravelly tones. “The time has finally come for you to learn of your true \ndestiny! Now, ask of me any question that you wish, and I will bestow the answer upon you.”\n*fake_choice\n  #“...what are you doing in the kitchen?”\n  #“Am I destined to be the greatest knight in all England as I have previously assumed?”\n  #“Are you sure you’ve got the right Arthur?”\n\nThe grass feels rather cold against your cheek as you lie spread-eagled on the ground (again...). Another minor detail is that Guinevere just so happens to be\non top of you, crushing the life out of you.\n\n\"That was rather gallant of you, Arthur, cushioning my landing like that! I didn't fall very far, anyway, but it was still very nice.\"\n\nShe tries to get up, but catches her foot on something and instead rolls to your side.\n\n\"Ah, oops.\" She blinks, unfazed, and turns to look at you. Her eyes really do gleam in such a strange way...\n\n\"So, is there anything else to climb around here?\" she asks, grinning mischievously. She might know just how much trouble she really is.\n\n*fake_choice\n  #Get up and excuse yourself\n  #Kiss her\n  #Answer honestly\n\n\"So if I can't pull out the sword in time...\"\n\n\"...you shall surely drown.\" The lady of the lake's gaze is cold, no hint of compassion in her eyes.\n\nYou swallow, hard. All is clear now.\n\n\"But, of course, you need not claim the sword at all. You have a whole life to be lived, unencumbered by the heavy responsibilities that the sword represents. It's your choice, after all.\"\n\nYou blink, and you feel like this might be the most important choice you've made so far.\n*fake_choice\n  #Dive for the sword\n  #Stay above water", "startup": "*title Arthur: A Retelling\n*author Isabel Azeredo\n\n*scene_list\n  startup\n  Chapter2\n  Chapter3\n  Chapter4\n  ending\n\n*create name \"Arthur\"\n*create gender \"unknown\"\n*create individuality 35\n*create darkness 25\n*create honor 15\n*create kindness 5\n*create him \"\"\n*create his \"\"\n*create he \"\"\n*create dimin \"\"\n*create maxin \"\"\n*create age 16\n*create sibling \"\"\n*create mark \"\"\n*create Bedwyr 0\n*create Bedwyr_love \"false\"\n*create partner \"\"\n*create match_visit \"\"\n*create Guinevere_love \"false\"\n*create glitch \"false\"\n*create Rience_love \"false\"\n*create feelings_Rience \"false\"\n*create allegiance \"\"\n*create town_been \"false\"\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  This epic reimagining of Arthurian legend takes you from humble life as an English squire with an attitude problem to a mythical dreamscape of possibilities, meeting many familiar (and not-so-familiar) faces along the way. \n\n  [i]Arthur: A Retelling[/i] is a 30,000-word medieval adventure that allows you to play as as Arthur themself (the gender is up to you) as you discover your own path to greatness and decide what you want to be. Embark on a quest of self-discovery with thrilling action and plenty of romance along the way-- pick from straight, gay, or even more options.\n\n  Young Arthur is an unremarkable page apprenticed to Sir Kay in the Early Middle Ages in England. Their world gets turned upside down by the arrival of the eccentric magician Merlin, who takes the youth under his wing and sets them on a path to greatness. But there are other figures seeking to influence this child of prophecy…\n\n  From the loyal Bedivere to the lovely Guinevere to the enigmatic Rience, Arthur’s interactions with this expansive cast determine their ultimate destiny. Will they rule Britain as prophesied? Abandon morality entirely? Or take another option, entirely unforeseen? Only you can decide. Along the way, you can:\n\n  • Transform into an assortment of creatures\n  • Undergo rigorous magical trials\n  • Romance classic characters from myth\n  • Discover unexpected kung fu skills\n  • Find your destiny as the one and only Arthur!\n\n  What are you waiting for? Camelot beckons…\n\n\n  *if choice_is_advertising_supported\n    [i]Arthur: A Retelling[/i] is supported by advertisements, but you can buy the unlimited version\n    to turn off ads forever.\n    \n    *purchase_discount adfree 2023-03-09 $4.99 $2.99 purchased\n    *page_break_advertisement\n    *goto purchased\n  *else\n    [i]You can play through the game once for free, or purchase unlimited replays below.[/i]\n\n    *purchase_discount adfree 2023-03-09 $4.99 $2.99 purchased\n    *page_break_advertisement\n\n*label purchased\n\n*image Arthur_Vignette_1.png none\n\nIt’s a sunny day in England.\n\nYeah, I’m just kidding. It’s raining like hell, like always, but that’s one of the good things about living in a castle, isn’t it? \n\nOf course, this is more like the broom cupboard of said castle, but sheltered is sheltered. \n\nYou know, it just gives you that urge to really take in your surroundings, which you would personally describe as being…\n*choice\n  #dingy\n    *label dingy\n    ...yes, that’s a good word for it. There’s the layers of dust, the mysterious stains on the walls, and even some rusted old bits of armor just to round it all out. \n    But no broom. You frown. And it seemed like such a promising broom cupboard…\n   *goto idleness\n  #squalid\n    *goto dingy\n  #cramped\n    *goto dingy\n\n*label idleness\n\n*choice\n  #Gaze out the window (that one I vibrantly described in a path you foolishly did not take)\n    You turn your gaze to the road passing the front of the castle, and the people running for cover from the downpour. You chuckle to yourself. Screw those peasants.\n    *page_break\n    *goto book\n  #Read a book in silent contemplation\n    *label book\n    You concentrate on the book you hold in your hands, boldly entitled “The Thrilling and Historically Accurate Tale of Merlin and King Uther Pendragon!” \n    (It even seems to have received a thumbs-up review from the king, though only a begrudging expression from Merlin). However, after careful examination, \n    you come to the conclusion that it is, in fact, a heap of stinking garbage. Magic? Wizards? Lost heirs? I mean, how gullible is this target audience? \n    Sure, you expect some bang for your buck, but to market this stuff as historical is just bordering on fraud.\n    *choice\n      #Well, maybe magic isn’t so far-fetched-- you hear Sir Ector talking about it like it’s normal all the time, after all. It might be prudent to give this book another chance.\n        Yeah, maybe you should--\n\n        Actually, no. What a dumb thought. Who even cares.\n        *set kindness %+10\n        *goto kay\n      #Damn right! I should just stomp on this book and tear it to pieces like the filth it is!\n        Hell yeah! I mean, maybe that’s going a bit far, but you could at least mercilessly bend the binding a little bit. Ahh, the satisfaction of a misdeed well done.\n        *set darkness %+10\n        *goto kay\n      #Like I was even paying attention in the first place, I’d much rather daydream about being a tyrannical overlord holding these lands in my dark grip.\n        It turns out you can be strangely intense sometimes.\n        *set darkness %+15\n        *goto kay\n\n*label kay\n\nSuddenly, an irritated rapping comes at the door.\n\n“Arthur! I know you’re in there, open the door!”\n\nWell, what can you do in the face of such eloquent persuasion. You swing open the door nonchalantly and assess the unwelcome interloper: \nas always, it’s none other than the soon-to-be sir Kay, also known as your (adopted) older brother. Just as uptight as always.\n\n“You lazy urchin! Not only do you consistently shirk your duties as my squire, now you avoid your chores by hiding in broom cupboards?! \nOn your feet at once, you spineless worm!”\n\nYou blink, unfazed. His insults never seem to be particularly creative or witty; in fact, you could whip up some pretty colourful ones right about now, \nbut it seems pointless to expend that kind of energy on such a meaningless argument-- you both know you’re just going to end up downstairs doing your chores, anyway.\n\n“Whatever,” you reply, and walk coolly past him. As you walk down the stark hallway, Kay shouts some indistinct disparagement, \nprobably aimed at your devil-may-care attitude, but you just don’t seem to be able to help tuning him out.\n*page_break\nYou’ve spent enough time in the castle to know your way around its labyrinthine passages, but you will probably never fully understand how it could take ten \nminutes to get from the kitchen to the dining room (well, unreasonably long hallways would be the answer, but, y’know, why?). You begin to consider how this \nmight begin to account for Kay’s perpetual ill humour when you finally stumble into the main dining room, where Sir Ector himself is seated. A very serious man, \nas you well know, who plans his son’s future meticulously and expects to rise further in ranks of honor and repute through his well-laid plans. Currently, though, \nhe seems to be playing with some wooden figurines on a vaguely inked map and muttering gravely to himself.\n\n*choice\n  #Clear your throat politely to announce your presence\n    “Ah-hem”, you cough. No reaction. You try again, but Sir Ector still fails to notice your presence, leaving you with no choice but to proceed to the natural \n    next step of your stratagem: leaving discreetly and later feigning ignorance towards any missed duties. You only take one step backwards, however, before your \n    noble patron deigns to speak at last:\n\n    “Arthur, if you think you’re going to march off before you’ve done an ounce of work, you are sorely mistaken.”\n\n    Damn it. Well, you should’ve known it was too good to be true. You spin back around to face him with a dazzling smile plastered on your face. Sir Ector elects to \n    ignore your natural charm and continues, still not looking up.\n\n    “It has become increasingly clear to me, Arthur, that you don’t seem very grateful in the least to \n    me and Kay for giving you a roof over your head and an honourable occupation to boot. Tell me, do you have some kind of issue with my hospitality? Or perhaps the \n    tasks that are assigned to you?”\n    *set honor %+15\n    *choice\n      #Protest the chores\n        “I’m just saying, y’know, Kay never has to clean dishes or shovel manure. It just seems kind of unfair, if you ask me.”\n        \n        “Well then, it’s a good thing I didn’t ask you,” he retorts scornfully. “As a knight-in-training, you can hardly expect Kay to partake in such menial tasks-- \n        not to mention that he is my only heir, and will one day inherit all my properties! You, on the other hand, have no such noble ties, and are more than fit to \n        work for your right to stay here. You should be grateful I don’t make you sleep outside.”\n        \n        You attempt to roll your eyes in the precise way that rebelliously expresses your indifferent attitude while also evading Sir Ector’s poorly-tuned sarcasm \n        radar. Due to your high sarcastic ability, you succeed!\n\n        Oh, hang on. You don’t have stats yet, do you? Or any of that kind of thing. Guess I just kind of forgot about that whole bit, so let’s just do it now!\n\n        What is your gender?\n        *set individuality %+10\n        *goto goptions\n\n      #Take issue with his hospitality\n        “It’s not that I have an issue with your hospitality,” you answer, “I just don’t know if it really counts as hospitality to make me sleep in a crate with a \n        bunch of disease-ridden rats and feed me once every other day.”\n\n        “Nonsense! Why, you ungrateful child,” he bellows, “I should have you banished from this house simply for such unseemly whining. You’re luckier than most, and \n        I expect your deference and lifelong gratitude for my generosity!”\n\n        You sigh. There’s really just no getting through to him-- not that it really matters, seeing as they’re actually pretty hygienic rats and you just nick all \n        your meals straight from the kitchen anyway, though it would probably be nice to receive a higher standard of treatment.\n\n        \"To the kitchen with you, and be sure to give those dishes a good cleaning!\" Sir Ector seems satisfied with his handling of the situation, and what can you do \n        but obey?\n\n        \n        ...that was a rhetorical question. You'd really prefer to go on sleeping with a roof over your head, if at all possible.\n\n        Unintrusive side note: mind just informing me of your gender before you go about your daily life and all?\n        *set individuality %+10\n        *goto goptions\n      #Give a noncommittal answer\n        “Whatever, I guess,” you reply with a masterful shrug. Sir Ector sighs exasperatedly.\n        \n        “Never a straight answer with you.” He shakes his head dismissively. “Just get on with your chores and leave me to my jousting strategies. I hear there’s \n        work aplenty concerning the dishes at the moment.”\n        \n        You just run with the whole noncommittal thing and trot indifferently off in the direction of the kitchen, which naturally only irritates Sir Ector all the \n        more. Not that it makes much of a difference, as it only takes him a moment to return to his intent examination of the wooden dolls.\n\n        Hang on, I know you’re on your way to the kitchen and all that, but I think we should just straighten out the whole thing about your gender right now, just to \n        avoid confusion later on. So, are you…\n        *set darkness %+10\n        *goto goptions\n  #Startle him with a loud proclamation\n    \"HELLO!\"\n\n    Your surprisingly loud cry reverberates through the dining hall, apparently striking Sir Ector himself with some direct hits on the noggin, judging from his\n    thoroughly startled expression. His wild-eyed gaze, frenzied in its search for the author of this disturbance, quickly settles on you.\n\n    You've seen friendlier looks from coiled vipers.\n    *set individuality %+10\n    *choice\n      #Run for it.\n        You immediately turn and dash for the exit, but a well-aimed wooden figurine on the old coconut is all it takes to foil your daring escape. Before you know it,\n        you've been drop-kicked straight into the kitchen.\n\n        Ow.\n\n        Pardon me, but just verifying something here before you get on with your business: what's your gender, if you don't terribly mind?\n        *set honor %-5\n        *goto goptions\n      #Blame someone else.\n        You happen to notice a maid just passing by out of the corner of your eye, and proceed to point an accusatory finger at her.\n        \"Um, it was her?\" You wince at the audible question mark at the end there, but maybe it stuck?\n      \n        With a frightened \"Eep!\", the maid has made herself scarce. Er...\n\n        The next thing you know is the sensation of being drop-kicked a considerable distance straight into the kitchen (with admirable accuracy).\n\n        Ow.\n\n        Pardon me, but just verifying something here before you get on with your business: what's your gender, if you don't terribly mind?\n        *set honor %-10\n        *goto goptions\n      #Face the music.\n        Well, there's no point in hiding-- the only right thing to do would be to take responsibility for your own indiscretion. You look Sir Ector square in the eye,\n        who even seems to present a slight spark of admiration for your honorable reaction before promptly drop-kicking you straight into the kitchen.\n\n        Ow.\n\n        Pardon me, but just verifying something here before you get on with your business: what's your gender, if you don't terribly mind?\n        *set honor %+15\n        *goto goptions\n      #Hide!!\n        In a final act of desperation, you slide on the stone floor and roll underneath the table! Mission acc--\n\n        Wait, no. Sir Ector takes you by the scruff of your shirt and hurls you like a hammer throw champion straight into the kitchen.\n\n\n        Ouchers.\n\n        Pardon me, but just verifying something here before you get on with your business: what's your gender, if you don't terribly mind?\n        *set honor %-10\n        *goto goptions\n  #Do a flying kick on the table, disrupting his planning\n    “HI-YAH!!” The hair-raising cry cuts through the air as you leap into a graceful kick, striking the table dead-on and sending Sir Ector’s playthings flying. \n    You do an unnecessary double backflip and return to a normal standing pose as if nothing had happened. Sir Ector seems to have noticed, however, and faces you, \n    red-faced and fuming.\n\n    “Arthur, you ignorant weasel! How many times do I have to tell you, kung fu is strictly forbidden in this home!”\n\n    Please. Like those rules even apply to you. However, to avoid unnecessary confrontation, you rein in your destructive instincts… for now. Sir Ector exhales in \n    profound irritation.\n\n    “When are you going to learn to act appropriately for your station? You may be no more than a squire, but might I point out that that is a good deal above a \n    layabout peasant and calls for at least [i]some[/i] degree of etiquette! I should not be surprised to see such carelessness with the martial arts from a mere commoner, \n    but as my only heir’s squire, I demand you learn discipline, Arthur, and learn it you [i]will!”[/i]\n\n    “Fear not, sir,” you reply with no small measure of confidence, “You can trust me to supervise the development of my discipline in future with great strictness.”\n\n    “Oh no. Oh no no no. I have little faith in you to polish a fork, much less to take charge of your own education in proper composure! Head to the kitchen \n    post-haste, child, and I want to see all the crockery gleaming before nightfall lest you wish to sleep in the mud this night!”\n\n    With that, the sullen old man returns to his dubious strategizing, all the while keeping one eye on you as you stride, unfazed, away and towards the kitchen.\n\n    Hang on, I know you’re on your way to your duties and all that, but I think we should just straighten out the whole thing about your gender right now, just to avoid \n    confusion later on. So, are you…\n    *goto goptions\n\n*label goptions\n*choice\n  #Female\n    *set gender \"female\"\n    Yes, that’s the truth, isn’t it? Born female, but dressed and treated as a boy your whole life. Why? You’ve never really questioned it, but it might \n    have something to do with the fact that your excessive attitude would likely doom you in the necessary pursuit of a husband. Yes, whoever gave birth to \n    you probably thought your issue might even prove advantageous in the world of men! Of course, she was dead wrong, but it was a nice thought on her part, \n    you suppose.\n\n    In any case, you have a boy’s name, a boy’s clothes, and just about everyone except Sir Ector seems to be under the impression that you are indeed a boy. \n    It should probably be fairly obvious to Kay at this point, but then again, he’s never really been the brightest bulb in the box.\n    *set him \"her\"\n    *set his \"her\"\n    *set he \"she\"\n    *set dimin \"girl\"\n    *set maxin \"woman\"\n    *goto fake\n  #Male\n    *set gender \"male\"\n    Well, of course you’re a guy, you’re called Arthur, for gosh’s sakes! That wouldn’t be a very good name for a girl, not to mention the implausibility of a \n    girl serving as a squire in these prejudiced times! Sheesh, that’s some silly question, all right.  \n    *set him \"him\"\n    *set his \"his\"\n    *set he \"he\"\n    *set dimin \"boy\"\n    *set maxin \"man\"     \n    *goto fake   \n  #Other\n    *set gender \"nonbinary\"\n    Your gender naturally reflects your mysterious appeal, and is thus too indeterminate for any of your medieval peers to truly comprehend-- you’re pretty \n    sure that they gave up trying quite a while ago (after all, it’s been some time since you last spotted Kay’s fellow apprentice-knight friends squinting at \n    you from afar and trying to puzzle out whether you appeared more of a boy or a girl. “Neither” was apparently too confusing an answer for them.).\n    *set him \"them\"\n    *set his \"their\"\n    *set he \"they\"\n    *set dimin \"child\"\n    *set maxin \"adult\"\n    *goto fake\n\n*label fake\n\nOh, yeah, you don’t really need to tell me your stats or anything. I just needed the gender info, so there you go. Oh, unless you wanted to be called something other \nthan Arthur from now on?\n*choice\n  #Arthur's good enough for me.\n    Yes, I rather thought so too.\n    *page_break\n    *goto kitchen\n  #Are you kidding? I can think of so many cooler names than that.\n    Is that so? Show me how it's done then, hotshot.\n    *input_text name\n \n    Your name is ${name}, is that right?\n\n    Good choice! Unless you typed in something silly, in which case, shame on you for not taking this seriously. Well, it doesn’t matter anyway, ‘cause everybody’s been \n    calling you Arthur so far so it’d just be weird to change it now.\n    *set name \"$!{name}\"\n    *set individuality %+25\n    *set honor %-10\n    *page_break\n    *goto kitchen\n\n*label kitchen\nSo here you are, in that grand old castle kitchen where you will supposedly find purpose. Or at least a whole load of dirty dishes. As it turns out, only the latter is \napparently correct, though you never know what awaits you during your exciting dish-washing journey!\n\nIt’s a pretty intimidating tower of plates, you’ve got to admit, and each one filthier than the last. However, you don’t intend to relent to the crockery’s boastful \nthreats, but rather to triumph over it, all the while showing as little enthusiasm for the task as you possibly can.\n\nWhat would be the best way to approach this hefty challenge, do you reckon?\n*choice\n  #Go plate by plate. Patience and endurance is the way to attain victory.\n    A sensible attitude, to be sure. You reach for the very first plate with a confident gleam in your eye when, all of a sudden…\n    *set honor %+15\n    *goto merlin\n  #Find a clever way to get it all done quickly, even if the plates don’t come out as clean as they should be.\n    Great, that way you’ll have it all done in no time; I doubt Ector and Kay will notice anyway. You just begin to look for an effective scrub lying about when, \n    all of a sudden…\n    *set honor %-15\n    *goto merlin\n  #Smash them all, and damn Sir Ector for saddling you with such tedious tasks!\n    A valid sentiment, you’d say, given the circumstances, though it might be going a little too far to assume that Ector and Kay wouldn’t notice if all their \n    crockery had been smashed to smithereens. Perhaps just a few would escape their notice, or at least avoid any extreme reaction on their part…\n\n    You just begin to reach for the first plate with a mischievous grin when, all of a sudden…\n    *set darkness %+15\n    *goto merlin\n\n*label merlin\n\nIn a puff of blue smoke and blinding flashes of silvery light, the entire kitchen is obscured from view and you begin to cough profusely. As your eyes water and shut \nin the weird environment, a few moments pass and the mist begins to thankfully dissipate. In its wake is left a single figure, a tall and wizened one with a long, \nwhite beard and a great pointed hat resting on its head. As your surroundings contine you to clear, you begin to recognize the man who stands before you as none other \nthan…\n\n“...Merlin?” you enquire, still coughing slightly from the effects of his over-the-top entrance. He doesn’t look quite like his pictures, but still, who else would \nwear a hat like that in public?\n\n“Yes, Arthur, it is I,” he booms in reply, his voice reverberating through the kitchen in gravelly tones. “The time has finally come for you to learn of your true \ndestiny! Now, ask of me any question that you wish, and I will bestow the answer upon you.”\n*choice\n  #“...what are you doing in the kitchen?”\n    *goto sup\n  #“Am I destined to be the greatest knight in all England as I have previously assumed?”\n    *goto sup\n  #“Are you sure you’ve got the right Arthur?”\n    *goto sup\n\n*label sup\nYou attempt to form the question, but it seems to die in your throat, leaving your mind totally blank. Knowing that Merlin is expecting you to say something, you ask \nthe only question that you can conceive of in the moment:\n\n“‘Sup?”\n\nTechnically, a question, though perhaps rhetorical in many instances. In any case, it does not seem to meet Merlin’s expectations as an awkward silence does ensue for \nsome moments. Finally, he speaks once more:\n\n“I have been keeping my eye on you for quite a while now, young Arthur,” he begins somewhat gravely, “And I have been displeased more often than not to observe your \nprogress as you approach ${maxin}hood. You may have a very important and unique destiny, but you will never attain it if you continue the way that you \nare.”\n\n“Uh, what do you mean… exactly?” It baffles you completely how he could think you’re not prepared for a grand destiny.\n\n“To put it simply,” replies Merlin, “you have an attitude problem. A serious one.”\n\n“As in--”\n\n“You suffer from a deplorable excess of sardonic wit and generally fail to comport yourself in every suitable way.” \n\nYou blink. He sighs.\n\n“You’re a sodding git, all right? And if you wish to fulfill your destiny, that is a problem that must be addressed, and promptly-- the time approaches when you must \nprove yourself and unravel the mystery of your past, young Arthur! So heed my words, and take care with your conscience, lest you fall into darkness and never return. \n\nAnd of my parting words, take special note:\n*line_break\nLet selfless thoughts in your mind be rote\n*line_break\nLet no man move you from your task\n*line_break\nSo that you may discover and remove your mask!”\n\nPuff of smoke. Fwoosh. And… he’s still there.\n\n“Hmmm. That is… not supposed to happen.”\n\n*label awkward\n*choice\n  #Laugh in his face. What a second-rate wizard.\n\n    You can’t hold it in, so you burst into muted laughter. Merlin doesn’t seem to share your sense of humor, however, and shoots you a look that might be best \n    described as a mix of venom and fiery rage.\n\n    If looks could kill...\n\n\n    (They cannot, in fact, kill, but that darn magic staff of his sure can do some damage, as you learn when Merlin forcefully conks you over the head with it.)\n    *set honor %-20\n    *set darkness %+20\n    *page_break\n    *goto tower\n\n  #Offer to help him get back to... wherever he came from.\n\n    You step forward and mumble an indistinct offer to help. Slight as it was, you can’t help but be startled by the gesture-- you didn’t think yourself capable of an \n    off-the-cuff, selfless action like that. But then again, you are known for your unpredictability.\n\n    Merlin looks at you for a second, his expression unreadable, then nods with a slight grunt of approval. He does, however, follow this gesture by swiftly thwacking \n    you over the head with his magic staff.\n\n\n    KER-[i]THWACKO![/i]\n    *set kindness %+20\n    *set darkness %-20\n    *page_break\n    *goto tower\n  #Take the opportunity to pelt him with all of the questions that just occurred to you to ask.\n\n    “Why is your hat so pointy? How do you know my name? What cut of the royalties did you get from that book? How did you get in here? Why did you get in here? \n    UHIierrkffraSTORK”\n\n    That last part, by the way, was the sound of you getting whacked on the head with a magic staff.\n\n    “And that’s the power of magic, kids,” Merlin mutters under his breath with a hint of pride.\n    *set honor %-10\n    *page_break\n    *goto tower\n\n  #RUSH HIMMM\n\n    GRAAAAAAARRRRRR--\n\n    shquawkerino!\n\n    \n    Yes, that [i]was[/i] the sound of you getting bonged over the head with a magic staff! Top marks!\n    *set honor %-20\n    *set darkness %+20\n    *page_break\n    *goto tower\n\n*label tower\n*text_image Merlin_Vignette.png none\n\nBlergh.\n\n\nYou blink groggily, your vision slowly focusing to reveal your surroundings:\n*line_break\n\nWood.\n*line_break\nYep, you're definitely lying on a wooden floor. And there is definitely a bit of drool on it, too.\n\nYou finally snap into consciousness and sit straight up--which you then immediately regret due to the pulsing pain in the back of your head. Owowowow. As you clutch\nthe affected area, wincing, you manage to get some idea of the rest of your surroundings:\n\nIt appears that you're in a relatively small, but still extremely cluttered space, with all kinds of bizarre knicknacks adorning the surfaces that are presumably hidden\nsomewhere beneath them, and even more artifacts (if that's the right word for this weird-ass junk) poke out from a number of overstuffed bookshelves. You briefly reflect \n(or rather, your olfactory senses do) on how you really did not know the true meaning of \"musty\" until this moment.\n\n\"Don't you know that it's rude to crinkle your nose like that, ${dimin}?!\"\n\nYou turn to try and find the origin of the croaking voice, but you only see a large raven standing on the desk in the room's centre, which seems to be eyeing you in \njust a really judgy way.\n\n\"Yes?!?! I'm right here, you know!!\" shrieks the raven, making no attempt to conceal its irritation.\n\nYou almost fall flat on your back. Did it just... talk?\n\n\"Yes, I did!\"\n\nCan it read your thoughts?!\n\n\"Yes, I can! I don't know why all you adventurers or whatnot seem to think in the second person, either! Very strange!!\"\n\nWhat in the [i]actual--[/i]\n\n\"That's enough, Morrighan. Return to your work at once.\"\n\nYou turn in surprise again (even though you know that twice in a row is [i]pushing[/i] it), to find none other than Merlin standing before you! The events immediately\npreceding this come back to you, providing ample explanation for the pain that you are currently experiencing.\n\n\"You old basta--\"\n\nHush.\n\n\n\nThe command seems to echo through your very thoughts, compelling you into silence. You just sit there in amazement-- could this really be magic?\n\n*choice\n  #Of course not! There's no such thing!\n    There's probably a rational way to explain all of this...isn't there?\n    *set honor %-10\n    *goto age\n  #I mean, apparently talking ravens are a thing, so...\n    Who even knows anymore...?\n    *goto age\n  #It doesn't seem like there's any way to doubt it anymore.\n    ...it seems foolish to feign ignorance in the face of such undeniable proof.\n    *set honor %+15\n    *goto age\n\n*label age\n\n\"There. Now, we have much to discuss, young one,\" Merlin continues solemnly. \"Or rather, [i]I[/i] do. It seems that by some enchantment I did not predict, I have been\nmagically trapped within the confines of this castle for... an indefinite amount of time. Hence, my makeshift office in this old tower.\" He sighs disappointedly. His\ngaze fixed on the ground, he waves his hand carelessly, and it's as if you can feel a terrible weight being removed from your chest-- you wheeze and gasp for breath,\nand you know that the enchantment (if that's what it was, anyway) has been lifted.\n\n\"How old are you now, Arthur?\"\n\nSuddenly, he's looking at you, and his gaze is far too grave for your liking.\n\n*choice\n  #I'm 16 now.\n    *set age 16\n    \"Hmmm,\" he murmurs. \"Yes, as I thought, old enough...\"\n    *goto exposition\n  #...just turned 17.\n    *set age 17\n    \"Hmm,\" he murmurs. \"Perhaps I came somewhat late...\"\n    *goto exposition\n  #I'm 15, as far as I know. Maybe older.\n    *set age 15\n    \"Hmm,\" he murmurs. \"Young, but still... no choice...\"\n    *goto exposition\n\n*label exposition\n\n\"Now, Arthur,\" says Merlin, regarding you rather intensely. Old fire burns in his ancient eyes. \"Let me tell you a tale, the story of a youth...\"\n\n*page_break\n*text_image Castle_Vignette.png none\n*\n*line_break\n*\n*line_break\n*\n*line_break\n*\n*line_break\n*\n*line_break\n*\n*line_break\nOne reaaaaaaally long story later...\n\n\n\"...And that's how I found the holy grail! 'Course, I lost it in a game of cribbage afterwards, but that's not the point, kar kar kar.\"\n\nMerlin is long asleep by this point, and it feels like Morrighan has been going on for days. At least it beats listening to some dusty old man story. \n\nHe didn't even get past the bit about Uther Pendragon, [i]and[/i] you're pretty sure he was quoting verbatim from that book from earlier.\n\nWell, I guess it's your cue...\n\n...but a black orb, half-covered by a tarp in an obscure corner, catches your eye... could it be whispering to you, even?\n\n*choice\n  #Make your exit before Merlin wakes up.\n    *set honor %-10\n    Hell no, that orb is [i]shady[/i]; it'd be wiser to beat a quick retreat ASAP. You dash over to the wooden door, but one quick tug tells you it's locked tight--\n    I mean, what did you expect from a wizard's lair? You keep trying, though, thinking you can perhaps force your way out, until a cold, clammy hand grabs your shoulder...\n\n    AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA\n    *line_break\n    *line_break\n    *line_break\n    *line_break\n    When you come to, you're in much the same position you were when you arrived, except considerably more embarrassed as you quickly realize that Merlin, now standing over you\n    with no small measure of disdain in his expression, was the one who ambushed you from behind, which caused in your unseemly and somewhat extreme reaction. He sighs\n    heavily, and you fully expect him to lecture on the virtue of courage or whatever, but to your surprise, he simply offers you his hand.\n\n    \"Come, Arthur,\" he instructs you gruffly. \"It's time I taught you what you need to know.\"\n    *goto proposition\n  #Take the orb discreetly.\n    *set darkness %+20\n    Well, what's the worst that could happen? You approach the orb--you could swear it begins to whisper louder the closer you get--until you're crouched down beside it,\n    fingers outstretched... it's calling to you...\n\n    \"No!\"\n\n    Merlin pulls you away mere instants before you could touch the murky glass and stares at you with a look of pure fury. You can't stop yourself from trembling a little.\n    \n    \"Do not. Touch. This. [i]Ever[/i]. Do you understand me?\"\n\n    You nod weakly, and he responds by half-dragging you back to the center of the room. You promptly plop down on the floor, admittedly a little shaken-- to your surprise,\n    though, Merlin turns to you and offers you a hand. His fury seems somewhat subdued from what you can tell.\n\n    \"Come, Arthur,\" he instructs you gruffly. \"It's time I taught you what you need to know.\"\n    *label proposition\n    *choice\n      #Take his hand.\n        *set kindness %+10\n        *set honor %+15\n        *set individuality %-20\n        You hesitate for a moment, but you allow him to help you to your feet. He seems pleased; or at least as pleased as he seems to be capable of being, which comes\n        across as more of a scornful tolerance. Still, though, good mood.\n\n        \"Come, then. No time to waste.\"\n\n\n        *finish\n      #Stand up without his help, but still accept his offer.\n        *set individuality %+20\n        Your pride gets the better of you, and you brush away his hand, choosing to stand on your own two feet. He seems slightly taken aback by your action, but waits\n        (somewhat) patiently for your answer.\n        \n        \"...I suppose that sounds all right.\"\n\n        He nods, though clearly a little peeved that you insisted on putting things on your own terms. However, it almost seems for a moment that you can make out a smile\n        underneath his beard...\n\n\n        *finish\n      #Stand up and storm out-- you don't need some kooky old man teaching you anything!\n        You're not interested in anything he could tell you, and you certainly don't need his help achieving anything!\n\n        You turn away from him and move to leave. But no sooner than you take one step forwards, something strikes you like a bolt of white fire-- an old voice, an old face,\n        a deep place.\n\n        [b]%dO NOt LeAvE hERe% (fOLLoW = DEstInY)[/b]\n\n        Your mind reels. Falling. Crashing. Black.\n\n        Everything crushes, and turns, burns and stitches back again...\n        *set glitch \"true\"\n        *page_break\n        *goto proposition\n  #Put Merlin's hand in a bucket of warm water (hehehe)\n    *set honor %-15\n    How... mature. Fortunately, a bucket of that exact description just so happens to be tucked next to the desk, and it doesn't take much to drag it over to Merlin,\n    grinning all the way. You cautiously pull his wrist over to the bucket, careful not to rouse him, and his fingers just touch the water...\n\n    \n    Well, the events that followed were rather frenzied and difficult to follow, but I'll do my best to provide a suitable description. As soon as Merlin made contact\n    with the water, he jumped out of his armchair as if someone had stabbed him with a hundred [i]very[/i] pointy needles, which then caused Morrighan to go completely berserk and screech\n    like crazy while attempting to pull out your hair with his talons, which in turn caused the agitation of various unusual magical artifacts which began to whizz at breakneck\n    speed around the room, nearly taking your head off more than once, which in turn caused Merlin to shout some ancient battle cry in a forgotten tongue, followed by various\n    ominous incantations of varying effect on you, Morrighan, and your surroundings (not to go too much into details, but let's just say that you know now what it feels like\n    to be composed entirely of homicidal soap bubbles) before Merlin seemed content that the threat had been quelled by turning you into a short-tailed albatross (though he made sure to\n    turn you back to normal once you managed to wake him from his dreams of victory over a bubbly nemesis.)\n\n    So the short version is that Merlin is really not terribly pleased with you at the moment, but is also too embarrassed to bring up the subject any further, so you're\n    basically off the hook! Though you do seem to have forgotten how to walk for the moment, but that's probably not permanent.\n\n    You resist the urge to preen your feathers and try to discreetly crawl out of Merlin's line of sight--\n\n    \"Wait a moment.\"\n\n    Damn, and you were so close...\n\n    To your surprise, however, Merlin turns to you and offers you his hand.\n\n    \"Come, Arthur,\" he instructs you gruffly. \"It's time I taught you what you need to know.\"\n    *goto proposition\n"}};
