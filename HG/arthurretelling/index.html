our eyes.\n\n          *if (individuality > 49)\n            \"It seems you have not truly tested the boundaries of Merlin's restrictions yet... but you have at least tried to make your own way within them.\"\n\n            Her lips move a little, in what could almost be mistaken for a smile.\n            *goto faychoice\n          *else\n            \"It seems you have not truly tested the boundaries of Merlin's restrictions yet... and you seem to have fallen more or less into line with his plans for you.\"\n\n            Her face is one of deep concern.\n            *goto faychoice\n      #\"...I'm not sure. Merlin speaks of it with certainty, but I don't know if I believe him.\"\n        \"Of course you should have doubts-- the old man hardly ever tells you anything at all.\"\n\n        *if (glitch = \"true\")\n          She leans in closer.\n\n          \"And you [i]know[/i] that something's not right... don't you, Arthur?\"\n\n          You tremble. You remember something you thought you'd forgotten: a voice, a face... a command. The girl's face is grim.\n\n          \"You've only been given the illusion of choice; pushed into a 'destiny' you never asked for. He doesn't want you to be yourself, Arthur-- he's already\n          decided who you are.\"\n          *goto faychoice\n\n        *else\n          She looks deeply into your eyes.\n\n          *if (individuality > 49)\n            \"It seems you have not truly tested the boundaries of Merlin's restrictions yet... but you have at least tried to make your own way within them.\"\n\n            Her lips move a little, in what could almost be mistaken for a smile.\n            *goto faychoice\n          *else\n            \"It seems you have not truly tested the boundaries of Merlin's restrictions yet... and you seem to have falled more or less into line with his plans for you.\"\n\n            Her face is one of deep concern.\n            *goto faychoice\n      #\"I don't believe in it for one second. It's just a stupid tool used to control people's lives.\"\n        \"Good,\" she replies. \"I'm glad that doddering old fool hasn't tricked you like he has others. You can see the truth, can't you, even in the face of deception...\"\n\n        *if (glitch = \"true\")\n          She leans in closer.\n\n          \"And you [i]know[/i] that something's not right... don't you, Arthur?\"\n\n          You tremble. You remember something you thought you'd forgotten: a voice, a face... a command. The girl's face is grim.\n\n          \"You've only been given the illusion of choice; pushed into a 'destiny' you never asked for. He doesn't want you to be yourself, Arthur-- he's already\n          decided who you are.\"\n          *goto faychoice\n\n        *else\n          She looks deeply into your eyes.\n\n          *if (individuality > 49)\n            \"It seems you have not truly tested the boundaries of Merlin's restrictions yet... but you have at least tried to make your own way within them.\"\n\n            Her lips move a little, in what could almost be mistaken for a smile.\n            *goto faychoice\n          *else\n            \"It seems you have not truly tested the boundaries of Merlin's restrictions yet... and you seem to have fallen more or less into line with his plans for you.\"\n\n            Her face is one of deep concern.\n            *goto faychoice\n  #\"But I was just... at the castle?\"\n    \"The power of an enchantment,\" she replies with the tone of one who knows too much to even remember. \"You will return to your castle soon. But for now, you are here.\n    In my home.\"\n\n    She looks at you out of the corner of her eye, her face unreadable.\n\n    \"It might've been your home as well, if not for the fools of the past. Old, ignorant fools.\"\n\n    She shuts her eyes for a soft moment, and awakens again.\n\n    \"Tell me something, Arthur: what do you think of destiny?\"\n\n    *choice\n      #\"Well, everyone has one, and Merlin tells me mine is a  is grim.\n\n          \"You've only been given the illusion of choice; pushed into a 'destiny' you never asked for. He doesn't want you to be yourself, Arthur-- he's already\n          decided who you are.\"\n          *goto faychoice\n\n        *else\n          She looks deeply into your eyes.\n\n          *if (individuality > 49)\n            \"It seems you have not truly tested the boundaries of Merlin's restrictions yet... but you have at least tried to make your own way within them.\"\n\n            Her lips move a little, in what could almost be mistaken for a smile.\n            *goto faychoice\n          *else\n            \"It seems you have not truly tested the boundaries of Merlin's restrictions yet... and you seem to have fallen more or less into line with his plans for you.\"\n\n            Her face is one of deep concern.\n            *goto faychoice\n      #\"I don't believe in it for one second. It's just a stupid tool used to control people's lives.\"\n        \"Good,\" she replies. \"I'm glad that doddering old fool hasn't tricked you like he has others. You can see the truth, can't you, even in the face of deception...\"\n\n        *if (glitch = \"true\")\n          She leans in closer.\n\n          \"And you [i]know[/i] that something's not right... don't you, Arthur?\"\n\n          You tremble. You remember something you thought you'd forgotten: a voice, a face... a command. The girl's face is grim.\n\n          \"You've only been given the illusion of choice; pushed into a 'destiny' you never asked for. He doesn't want you to be yourself, Arthur-- he's already\n          decided who you are.\"\n          *goto faychoice\n\n        *else\n          She looks deeply into your eyes.\n\n          *if (individuality > 49)\n            \"It seems you have not truly tested the boundaries of Merlin's restrictions yet... but you have at least tried to make your own way within them.\"\n\n            Her lips move a little, in what could almost be mistaken for a smile.\n            *goto faychoice\n          *else\n            \"It seems you have not truly tested the boundaries of Merlin's restrictions yet... and you seem to have fallen more or less into line with his plans for you.\"\n\n            Her face is one of deep concern.\n            *goto faychoice\n    \n  #\"Am I trapped in this form?!\"\n    \"Oh, fear not, Arthur. It is merely a spell, and spells are but a single thread against the cloth. It will undo itself before long.\"\n\n    \"How do you know my name?\"\n\n    \"How could I not?\"\n\n    She regards you deeply. You notice that she is attired all in black and her nails, too, are painted black.\n\n    \"I know you, though you may not know me. I fear you do not even know yourself. Tell me, Arthur: what do you think of destiny?\"\n\n\n    *choice\n      #\"Well, everyone has one, and Merlin tells me mine is a very important one, so there is my path.\"\n        \"Hmm. You seem to put a lot of faith in Merlin's word-- and yet, has he ever actually told you what your destiny [i]is?[/i]\n\n        You stutter, trying to think of an answer. Come to think of it, he's never [i]exactly[/i] said...\n\n        \"As I thought; he does not trust you even with knowledge of yourself.\"\n\n        *if (glitch = \"true\")\n          She leans in closer.\n\n          \"And you [i]know[/i] that something's not right... don't you, Arthur?\"\n\n          You tremble. You remember something you thought you'd forgotten: a voice, a face... a command. The girl's face is grim.\n\n          \"You've only been given the illusion of choice; pushed into a 'destiny' you never asked for. He doesn't want you to be yourself, Arthur-- he's already\n          decided who you are.\"\n          *goto faychoice\n\n        *else\n          She looks deeply into your eyes.\n\n          *if (individuality > 49)\n            \"It seems you have not truly tested the boundaries of Merlin's restrictions yet... but you have at least tried to make your own way within them.\"\n\n            Her lips move a little, in what could almost be mistaken for a smile.\n            *goto faychoice\n          *else\n            \"It seems you have not truly tested the boundaries of Merlin's restrictions yet... and you seem to have fallen more or less into line with his plans for you.\"\n\n            Her face is one of deep concern.\n            *goto faychoice\n      #\"...I'm not sure. Merlin speaks of it with certainty, but I don't know if I believe him.\"\n        \"Of course you should have doubts-- the old man hardly ever tells you anything at all.\"\n\n        *if (glitch = \"true\")\n          She leans in closer.\n\n          \"And you [i]know[/i] that something's not right... don't you, Arthur?\"\n\n          You tremble. You remember something you thought you'd forgotten: a voice, a face... a command. The girl's face is grim.\n\n          \"You've only been given the illusion of choice; pushed into a 'destiny' you never asked for. He doesn't want you to be yourself, Arthur-- he's already\n          decided who you are.\"\n          *goto faychoice\n\n        *else\n          She looks deeply into your eyes.\n\n          *if (individuality > 49)\n            \"It seems you have not truly tested the boundaries of Merlin's restrictions yet... but you have at least tried to make your own way within them.\"\n\n            Her lips move a little, in what could almost be mistaken for a smile.\n            *goto faychoice\n          *else\n            \"It seems you have not truly tested the boundaries of Merlin's restrictions yet... and you seem to have fallen more or less into line with his plans for you.\"\n\n            Her face is one of deep concern.\n            *goto faychoice\n      #\"I don't believe in it for one second. It's just a stupid tool used to control people's lives.\"\n        \"Good,\" she replies. \"I'm glad that doddering old fool hasn't tricked you like he has others. You can see the truth, can't you, even in the face of deception...\"\n\n        *if (glitch = \"true\")\n          She leans in closer.\n\n          \"And you [i]know[/i] that something's not right... don't you, Arthur?\"\n\n          You tremble. You remember something you thought you'd forgotten: a voice, a face... a command. The girl's face is grim.\n\n          \"You've only been given the illusion of choice; pushed into a 'destiny' you never asked for. He doesn't want you to be yourself, Arthur-- he's already\n          decided who you are.\"\n          *goto faychoice\n\n        *else\n          She looks deeply into your eyes.\n\n          *if (individuality > 49)\n            \"It seems you have not truly tested the boundaries of Merlin's restrictions yet... but you have at least tried to make your own way within them.\"\n\n            Her lips move a little, in what could almost be mistaken for a smile.\n            *goto faychoice\n          *else\n            \"It seems you have not truly tested the boundaries of Merlin's restrictions yet... and you seem to have fallen more or less into line with his plans for you.\"\n\n            Her face is one of deep concern.\n            *goto faychoice\n\n*label faychoice\n\nWhere do you stand on this?\n*choice\n #...she's right. Merlin hasn't been honest with me, and I feel like he's even trying to manipulate me.\n    *set individuality %+10\n    *set darkness %+30\n    *set honor %-40\n    *set kindness %-20\n    *set allegiance \"dark\"\n    *goto voice\n #I don't know... I don't think Merlin is doing anything wrong, but I do feel that I don't want to follow the path he's set out for me.\n    *set individuality %+25\n    *set darkness %-15\n    *set kindness %+30\n    *set honor %-30\n    Doubts flickers in your eyes, but you know what the right path is-- you could never forget. You're just sorry Merlin can't see that you're not who he thinks you are.\n    *goto voice\n #Is she insane? Merlin is only trying to help me achieve my full potential, and that's exactly what I want.\n    *set individuality %-40\n    *set darkness %-30\n    *set kindness %-15\n    *set honor %+40\n\n*label liontime\n*set individuality %+15\n\n\"[i]LEOFORMUS![/i]\"\n*page_break\nYou blink.\n\nBut you're not blinking your own eyes.\n*line_break\n*line_break\n\nYou don't have your mouth.\n\nYou don't have your hands.\n\nYou don't have your legs.\n\nEverything is different now.\n\nYour skin is covered in short, bristly fur. Your jaws are strong now, yourself fearsome. Powerful.\n\n\"Well, if it isn't Arthur himself.\"\n\nYou turn with a snap, feeling the power in your neck, your bones. Standing there in the long, dry grass is a young man, perhaps 18 or 19. His brown hair tosses in the breeze,\nand his green eyes glint strangely in the harsh sunlight. His face is handsome, delicate like his frame. Tall and confident, he addresses you directly:\n\n\"Bold choice. Lions are born kings after all-- something we two perhaps have in common.\"\n\nHe smiles charmingly--but behind it you can feel something wilder, darker.\n\n*choice\n  #\"Who are you?\"\n    \"Call me Rience,\" he answers smoothly. \"More casual that way. Being who I am, most people aren't so liberal in addressing me.\"\n\n    \"What do you mean?\"\n\n    \"Oh, you know,\" he continues nonchalantly, fiddling with a stalk. \"Being a prince is like that. Stuffy. Though I suppose you [i]don't[/i] know... well, not yet, anyway. Time's a funny thing.\"\n\n    He turns his gaze back on you with a wry smile. The way he looks at you, it feels like he's cutting you to the bone.\n\n    \"But enough about me. You're a far more interesting character. Never staying still, never the same...\"\n\n    He steps closer, and closer still.\n\n    \"I wonder who you really are...?\"\n\n    His smile widens wickedly.\n\n    He is close now, only three steps away, and you begin to feel yourself change-- no longer a lion, but not quite human either-- something different altogether, somehow [i]spectral[/i].\n    He takes a step forwards and looks at you with a searing gaze. He's very close now, and you think he may be coming even closer...\n\n    *choice\n      #Allow him to approach\n        *set darkness %+30\n        *set individuality %+20\n        You make no motion to stop him as he comes face-to-face with you. He stops for a moment, just looking at you. He brings a delicate hand to your face, and leans in\n        closer... his lips come to yours, and you just release it all and return his kiss. You shiver ever so slightly despite the palpable heat, and Rience smiles a dizzying, wild\n        smile, gently touching your hair.\n        *line_break\n        *line_break\n\n        *text_image lilies_small.png\n        *line_break\n        *line_break\n        \n        You've never really felt quite like this before-- it feels maybe like what you imagine being bewitched feels like. Perhaps Rience is a witch, but you know real feelings from\n        from false-- and this is as real as it's ever been for you.\n\n        He takes a small step backwards, tracing the line of your face with his hand as he pulls it away. There's something in his eyes now, something warm, and you know you can't be alone in\n        these feelings. Or perhaps that's just what you think you see-- he's certainly a challenging read. Still, there is definitely something new in his gaze now.\n\n        Looking at him, you feel your heart quicken, and you step towards him--\n\n        \"[i]...Arthur![/i]\"\n\n        A distant voice cries from behind, and you suddenly feel a sharp tug on your collar; someone's pulling you backwards, further and faster, this place vanishing from your sight--Rience vanishing\n        like a shadow--\n        *line_break\n        *line_break\n\n        In the blink of an eye, you find yourself lying, soaking wet, on a prickly patch of grass. You see your hands and gasp-- your skin is so pale, as if all the blood\n        had been drained out of you. You feel weak, weaker than you've ever felt... you groan softly.\n\n        \"I don't know what happened,\" comes Merlin's voice, more uncertain than you've ever heard it. He stands over you, talking to Morrighan on his shoulder.\n\n        \"It should have been a simple transmutation spell, but it was almost as if someone [i]else[/i] wrested control of it from me, and Arthur slipped elsewhere...\"\n\n        \"Do ya know who it was?\"\n\n        \"I didn't recognize the magical signature, but it was dark-- that much I know. Which only makes it even more troubling.\"\n\n        You groan louder. They could at least include you in this whole discussion.\n\n        \"Hmm? Oh, you're awake,\" Merlin says, eyeing you seriously. He takes a moment to compose himself.\n\n        \"Arthur, I want you to know that whatever you saw in the place in which you were, do not let it bind you in a spell. It was only by a narrow window of time that I\n        managed to intervene and prevent you from involving yourself further, but I want you to forget whatever you saw there, understand?\"\n\n        His face is stern, and his tone emits a sense of urgency.\n\n        And yet, you do feel something in your heart,like a binding vine entertwined...\n        *set Bedwyr_love \"false\"\n        *set Guinevere_love \"false\"\n        *set Rience_love \"true\"\n        *set partner \"Rience\"\n        *goto afterallthat\n      #Turn away\n        You turn your face away, avoiding his gaze. Rience stops his approach. Instead, he gently takes your wrist with one hand and your hand with the other, lifting it\n        to his lips. He kisses your hand softly, and looks at you from a low angle...\n\n        How do you feel?\n        *choice\n          #...I feel strange... why is my heart quickened?\n            *set Bedwyr_love \"false\"\n            *set Guinevere_love \"false\"\n            *set Rience_love \"true\"\n            *set partner \"\"\n            Your heart sways in a strange way, and you feel a strong, warm feeling rising within you. His eyes flash a bright emerald.\n\n            \"[i]...Arthur![/i]\"\n\n            A distant voice cries from behind, and you suddenly feel a sharp tug on your collar; someone's pulling you backwards, further and faster, this place vanishing from your sight--Rience vanishing\n            like a shadow--\n            *line_break\n            *line_break\n\n            In the blink of an eye, you find yourself lying, soaking wet, on a prickly patch of grass. You see your hands and gasp-- your skin is so pale, as if all the blood\n            had been drained out of you. You feel weak, weaker than you've ever felt... you groan softly.\n\n            \"I don't know what happened,\" comes Merlin's voice, more uncertain than you've ever heard it. He stands over you, talking to Morrighan on his shoulder.\n\n            \"It should have been a simple transmutation spell, but it was almost as if someone [i]else[/i] wrested control of it from me, and Arthur slipped elsewhere...\"\n\n            \"Do ya know who it was?\"\n\n            \"I didn't recognize the magical signature, but it was dark-- that much I know. Which only makes it even more troubling.\"\n\n            You groan louder. They could at least include you in this whole discussion.\n\n            \"Hmm? Oh, you're awake,\" Merlin says, eyeing you seriously. He takes a moment to compose himself.\n\n            \"Arthur, I want you to know that whatever you saw in the place in which you were, do not let it bind you in a spell. It was only by a narrow window of time that I\n            managed to intervene and prevent you from involving yourself further, but I want you to forget whatever you saw there, understand?\"\n\n            His face is stern, and his tone emits a sense of urgency.\n\n            And yet, you do feel something in your heart,like a binding vine entertwined...\n\n            *goto afterallthat\n          #I feel nothing; his charm is wasted on me.\n            Despite his bewitching manner, you feel nothing whatsoever-- Rience seems to sense this and lets go of your hand, taking a step back.\n\n            *if (Bedwyr_love = \"true\") or (Guinevere_love = \"true\")\n              \"Well, I can tell that someone already has a claim on your heart. How unfortunate for me.\"\n\n              He grins.\n\n              \"Though... I suppose we will have to see about that.\"\n\n              *if (Bedwyr_love = \"true\")\n                *set mark \"Bedwyr\"\n                *goto voice\n              *elseif (Guinevere_love = \"true\")\n                *set mark \"Guinevere\"\n                *goto voice\n              *elseif (Bedwyr_love = \"false\") and (Guinevere_love = \"false\")\n                *goto voice\n              *else\n                *goto voice\n            *else\n              \"Hmm. Your heart is roaming still, it seems.\"\n\n              He smiles softly.\n\n              \"You are a strong one... very interesting, indeed. I hope we will meet again soon, my dear Arthur.\"\n\n              He takes a low, gracious bow, and turns to leave. Though, he does give you a final cursory glance...\n              *set feelings_Rience \"true\"\n              *goto voice\n  #\"But I was just at the castle... what is this place?\"\n    \"You were there, now you're here,\" he explains not very patiently. \"Of course, you're not [i]really[/i] here, because it's really just your mind, but--\"\n\n    He stops himself, and laughs. It sounds like a dark ripple through the air.\n\n    \"Well, it really doesn't matter. Here you are, and here I am. Together.\"\n\n    He smiles. Part of you doesn't like the way he smiles, but the other part...\n\n    \"You know, I've waited a long time for a moment like this. But after all, maybe just to see you like this...\"\n\n    He steps closer, and closer still.\n\n    \"...I wonder who you really are...?\"\n\n    His smile widens wickedly.\n\n    He is close now, ight be, what's going on right [i]now[/i] is, well, on another level!\"\n\n    \"...what do you mean?\" His manner is beginning to disturb you.\n\n    \"I mean, you don't know who I am. You don't know... anything, not even yourself. It's just... perfect. Almost like an entirely different person...\"\n\n    He steps closer, and closer still.\n\n    \"I wonder who you really are...?\"\n\n    His smile widens wickedly.\n\n    He is close now, only three steps away, and you begin to feel yourself change-- no longer a lion, but not quite human either-- something different altogether, somehow [i]spectral[/i].\n    He takes a step forwards and looks at you with a searing gaze. He's very close now, and you think he may be coming even closer...\n\n    *choice\n      #Allow him to approach\n        *set darkness %+30\n        *set individuality %+20\n        You make no motion to stop him as he comes face-to-face with you. He stops for a moment, just looking at you. He brings a delicate hand to your face, and leans in\n        closer... his lips come to yours, and you just release it all and return his kiss. You shiver ever so slightly despite the palpable heat, and Rience smiles a dizzying, wild\n        smile, gently touching your hair.\n        *line_break\n        *line_break\n\n        *text_image lilies_small.png\n        *line_break\n        *line_break\n        \n        You've never really felt quite like this before-- it feels maybe like what you imagine being bewitched feels like. Perhaps Rience is a witch, but you know real feelings from\n        from false-- and this is as real as it's ever been for you.\n\n        He takes a small step backwards, tracing the line of your face with his hand as he pulls it away. There's something in his eyes now, something warm, and you know you can't be alone in\n        these feelings. Or perhaps that's just what you think you see-- he's certainly a challenging read. Still, there is definitely something new in his gaze now.\n\n u backwards, further and faster, this place twisting out of sight, vanishing\nlike a shadow--\n*line_break\n*line_break\n\nIn the blink of an eye, you find yourself lying, soaking wet, on a prickly patch of grass. You see your hands and gasp-- your skin is so pale, as if all the blood\nhad been drained out of you. You feel weak, weaker than you've ever felt... you groan softly.\n\n\"I don't know what happened,\" comes Merlin's voice, more uncertain than you've ever heard it. He stands over you, talking to Morrighan on his shoulder.\n\n\"It should have been a simple transmutation spell, but it was almost as if someone [i]else[/i] wrested control of it from me, and Arthur slipped elsewhere...\"\n\n\"Do ya know who it was?\"\n\n\"I didn't recognize the magical signature, but it was dark-- that much I know. Which only makes it even more troubling.\"\n\nYou groan louder. They could at least include you in this whole discussion.\n\n\"Hmm? Oh, you're awake,\" Merlin says, eyeing you seriously. He takes a moment to compose himself.\n\n\"Arthur, I want you to know that whatever you saw in the place in which you were, do not let it bind you in a spell. It was only by a narrow window of time that I\nmanaged to intervene at all, but I want you to forget whatever you saw there, understand?\"\n\nHis face is stern, and his tone emits a sense of urgency.\n\nWhat a strange dream to have...\n*goto afterallthat\n*label fishtime\n\n\"[i]PESCATOFORMUS![/i]\"\n*line_break\n*line_break\n*line_break\n*line_break\n\no my goshhh\n\n*fake_choice\n  #flip\n  #flop\n  #flippety-flop\n\nbrrlllbbbrrbbbllllll\n\n\"Hmm. It might have been better to do it in water, but at least it seems to have worked out well.\"\n\nHe picks you up by the tail (you have a tail now!) as you flop about madly. What kind of demented education [i]is[/i] this? Wait, wait, don't drop--\n\naaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa\n\n[i]Plop.[/i]\n*page_break\n\n...huh...?\n\nYour vision is clouded over blue, and long strands of green sway gently in the... water. What? Your skin is scaly and silver, gracefully skimming through the\nblue. Mossy, stone walls surround you, curving in an arc, and as your eyes track downwards to the sandy bottom, you notice something odd-- what seems to be a\nminiature, yet grandiose castle below you. Behind you, you also see, is a dark, cavernous hole that sends shivers up your thin spine.\n\n*choice\n  #Swim towards the castle\n    You angle your fins towards the depths and push effortlessly through the water. It seemed like a short distance from above, but it seems all of a sudden as if\n    you've started on a long journey. Then the water turns to sky, the sand turns to grass and the castle grows closer until you realize you're approaching a real,\n    majestic castle beneath a bright sun. You can no longer stop yourself as the stone walls grow nearer and nearer-- then, a hall. ...did you go through the wall?\n\n    \"A toast for Ser Galahad!\"\n\n    A surge of voices rise up in a hearty hurrah. For the first time, you notice a large, round table with many knights seated around it, one of which is beaming\n    widely and sitting in an ornate chair.\n\n    At the other end of the table, a ${maxin} sits with flowing robes and a golden crown atop ${his} head. Beside ${him}, a stunningly beautiful woman, also crowned\n    and the perfect image of royalty. And yet, when you look closer, you notice a deep unhappiness in her dark eyes. Almost, she turns her gaze downwards with a half-formed\n    sigh, until they instead lightly trace their way to something else entirely: a man, sitting at the far edge from her, with sapphire-blue eyes and bright, blond hair. He\n    smiles at her, just once, and you tell that something in her eyes has changed...\n\n    *choice\n      #Approach blond knight\n\n        Your feet touch the ground, and you realize then that you are yourself again. No-- not yourself-- human, but... someone [i]else[/i]. A slender female figure looks\n        back at you from a dark mirror, long blonde hair streaming down her--or your-- sparse robes. The picture is intensely beautiful, but you cannot help but feel that something wicked lurks inside...\n        \n\n        Your head spins, but when has it stopped since the beginning? You gather yourself up and walk across the richly tiled floor to the handsome blond knight...\n\n        ...but the closer you get, the more you realize that you're no longer in a castle at all. Instead, vaulting stone walls twist strangely around you, intertwined with\n        dark vines and pungent, black flowers. An altar stands at the head, framed by purple-and-night-colored stained glass windows, depicting writhing, wicked figures-- a\n        chapel, you realize, but... wrong, [i]twisted.[/i]\n\n        You look down at your hands--pale and skeletal--and you're horrified to find that they're covered in warm, dripping blood. One hand grips an ivory-hilted dagger, wickedly sharp. It drops to the \n        ground with a clatter. Your head reels, and you turn just enough to see an arched doorway, and beautiful, white [i]light[/i]. On the other side, swaying green against a\n        stormy sky-- and a man, staring at you in horror. You see his blond hair catching in the breeze, his armor glinting silver-scaled in a still moment, but then you step forwards, then you run, and it's all over.\n        He's gone, and he saw.\n\n        And you're trapped here.\n        *line_break\n        *line_break\n\n        The darkness feels warm as your eyes roll over into the back of your head, and there's just no wAY to go-go--\n        *line_break\n\n        *goto voice\n      #Approach queen\n        \n        Your feet touch the ground, and you realize then that you are yourself again. You gather yourself up and walk across the richly tiled floor to the handsome blond knight...\n\n        ...but the closer you get, the more you realize that you're no longer in a castle at all. Instead, cool grass creeps at your feet, and a stormy sky encircles the world above, reflected in\n        a still lake. At its edge is a bench and a willow tree, with two people beneath. You step closer and you see that it is the queen and the blond knight, close together...\n\n\n        You can barely bring yourself to look when you hear the steps.\n\n        A ${maxin}, and in ${his} hand, a sword. $!{he} sees them, and then ${he} knows everything. \n\n        You hear the discreet sound of breaking, echoing like a drum in your ears.\n\n        *line_break\n        *line_break\n\n        The darkness feels warm as your eyes roll over into the back of your head, and there's just no wAY to go-go--\n        *line_break\n\n        *goto voice\n      #Approach Galahad\n\n        Your feet touch the ground, and you realize then that you are yourself again. You gather yourself up and walk across the richly tiled floor to the knight they call\n        Galahad...\n\n        ...but the closer you get, the more you realize that you're no longer in a castle at all. Instead, you're in a solemn clearing, blanketed in a star-pointed sky, with\n        a great image projected into the air: a humble Grail. You exhale, feeling reverence and yet not knowing why. Just then, footfalls: a figure. Ser Galahad. Seeing the projection,\n        he gasps aloud and falls to his knees. Trembling, turning his eyes to the ground, he finally sees: the Grail itself, held in his hands. As he raises it to the heavens, you feel\n        a release in your heart, a deep, deep sigh...\n\n        All is well in the kingdom of England.\n\n        *line_break\n        *line_break\n\n        The darkness feels warm as your eyes roll over into the back of your head, and there's just no wAY to go-go--\n        *line_break\n\n        *goto voice\n  #Enter the hole\n    You swim warily into the hole, and immediately feel yourself being engulfed in total, cold blackness. Without meaning to, you hold still your breath, feeling the darkness expand and expand--\n    \n    Apples.\n\n    Ripe, red apples, sitting on the branches of a hundred-- no, more-- apple trees, reaching the sky and filling the earth. A fresh land, a drowsy place.\n\n    Softly comes in the dark figure: a dark-haired woman, very pale, very solemn. Her dark eyes scan the water as her small boat reaches the shore. She is carrying something.\n\n    As you look closer, you see her walk and walk, moving in strange time, until finally stopping at the top of a great hill. Looking out over the horizon, she sets down a man--is he-- no; merely sleeping.\n    But the glint in her eyes tells he will awaken...\n\n    *line_break\n    *line_break\n\n    The darkness feels warm as your eyes roll over into the back of your head, and there's just no wAY to go-go--\n    *line_break\n\n    *goto voice\n\n*label afterallthat\n*page_break\nYou find yourself in the forest, a part you don't recognize. Even though you thought you knew it all...\n\n*if (animalchoice = \"fish\")\n  ...uh, what the [i]fuck[/i] was that? Where the [i]fuck[/i] is the lightheartedness in this goddamn story?!\n\n  *label awoken\n  Well, whatever. To hell with it, you think as you toss aside the cake of carbolic soap that just materialized in your pocket [i](footnote 17)[/i].\n\n  Seriously, what is going [i]on?[/i]\n\n  Whatever it is, it's probably Merlin's fault, is the thought that's going through your head when Morrighan lands at your side. For the first time, you notice a downtrodden little\n  hut a little ways from you-- its chimney is smoking. You feel oddly certain that Merlin is there, but didn't he say that he couldn't venture far from the castle or\n  or something...?\n\n  \"Heya,\" says the old crow (no, not Merlin). \"Rough stuff, huh? Yeah... but don't worry about it, kid. Merlin knows what he's doing, so you can bet your feathers that something\n  unexpected like that isn't going to happen again. Uh-huh, you betcha.\"\n\n  ...something about that makes your heart sink a little. Why do you feel so... tight inside?\n\n  You clutch at your chest, half-unconsciously, and Morrighan seems to take notice.\n\n  \"Oh, sorry, kid. I guess it was rude to point out that you don't have any feathers; I know humans are sensitive about--\"\n\n  \"No, Morrighan,\" you blurt out, the words just spilling out of your throat. \"Just... what did you mean by 'nothing unexpected'?\"\n\n  He looks puzzled at the question.\n\n  \"Well, uh, it's like I said, Merlin's got it all planned out. He knows about destiny and all that, so he even wrote it all down in this big boo--\"\n\n  He covers his beak (with his wing, obviously). Classic \"spilled too much\" face.\n\n  \"Uh, that is-- I mean--\"\n\n  Your heart is beating way too fast. What the hell. What the [i]hell.[/i] Your breathing comes quick, in, in, but not out, coming shallow and ragged like what you see [b]twisting\n  crack l i n g   s n a p   a t   t h e   h i n g  e   s[/b]\n\n  [i]kid you all rig crackle bluesberries[/i]\n\n  I guess this is what panic feels like, is the only thought that seems to remain unfragmented in your mind. You feel like you could pull yourself together, if only to get away--\n  get [i]someplace[/i] else...\n\n  And then you remember...\n  *choice\n    *selectable_if (match_visit = \"true\") #...the match! Maybe it's still going on!\n      *goto finalmatch\n    *selectable_if (Rience_love = \"true\") #...the dark-haired man. Somehow, I know where I can find him.\n      *goto finalmatch\n    *selectable_if (allegiance = \"dark\") #...the pale woman. I'm sure she can help me now.\n      *goto finalmatch\n    #...nothing... I have nowhere to turn, so I keep running.\n      *goto finalmatch\n\n*if (animalchoice = \"lion\")\n  ...uh, what the [i]fuck[/i] was that? What was [i]with[/i] that guy?\n\n  *goto awoken\n\n*if (animalchoice = \"raven\")\n  ...uh, what the [i]fuck[/i] was that? Where the [i]fuck[/i] is the lightheartedness in this goddamn story?!\n  *goto awoken\n\n*label finalmatch\n*page_break\nYou break into a sprint, numb to the air whistling past your ears-- it's almost as if something else is in control, a strange, prickly feeling that feels like it's stabbing your lungs.\nYou can hardly think straight, but your feet seem to know the way somehow, so you just let your mind cloud over and the forest streak past...\n\nYou slump over, grateful for the feel of the cool grass on your skin. You don't know how far you ran or quite where you are, but you do know that the death grip-tension in\nyour bones is finally beginning to fade. You breathe a sigh of relief, and only then do you realize where you are: behind the bleachers at the jousting grounds, now full\nof an audience clearly waiting in expectation of a match.\n\n\"And now, ladies and gentlemen, please welcome Sir--\"\n\n\nBefore the sonorous announcer can complete his sentence, however, your wandering gaze happens to fall upon some familiar figures: A beautiful lady, looking rather unengaged\nin the rich people booth, a young, serious-looking gentleman sitting not too far from her, and a fragile-looking squire.\n\nOh [i]no.[/i]\n*finish\n", "chapter4": "*advertisement 600\n*text_image arthur_vignette2.jpg none\n*if (town_been = \"true\")\n  *goto Gknown\n*else\n  *goto Gunknown\n\n*label Gknown\nThe torchlight washes over the grounds, burning red... [i]burning[/i] red...\n\nYou shake your head. No. What's going [i]on?[/i] Why does everything feel so... so...\n\nCLANG! You jump up and hit your head against the wooden ceiling--or rather, floor-- of the bleachers. Nn. It sounds as if someone's finally been knocked off a horse--\n\nNo. What? That's not right. You don't hear cheering, you hear--\n\nScreaming.\n\nYou push yourself out from beneath the bleachers, and dash out onto the grass-- but too late. You only just catch the last of the crowd fleeing the grounds,\nall fear-stricken, until only the four of you remain.\n\nYou, Bedwyr, Guinevere, and... a young man who seems strangely familiar, like a character from a dream. All just... standing there in front of it. A pitch-black tear in\nthe world, gaping in the middle of the grounds for all to see. What the hell...?\n\n\"Behold,\" cries a deep female voice. \"It is here at last!\"\n\nThat's when you see her-- stepping out from [i]behind[/i] the hole, [i]her[/i]. Beautiful, but everything dark and wild, no smile on her lips. And something about her reminds you of\nyour own reflection.\n\n\"No more magic. No more lies. Time for the endgame, and truth to rise!\"\n\nThe blackness swirls and grows, seeming almost like a living thing, a monster. Guinevere is rooted in place, pale with terror, and Bedwyr just stares, not moving. The\nfamiliar man looks confused, even, as if something within him is torn as well...\n\nYou don't know what to do. No choices. No paths to choose, just... nothing. Your heart trembles, and you wonder if this is all you can be.\n\nBefore you have time to think any more, a deep shadow streams into the dirt circle, forming into the shape of a gangly, ancient man with a particularly pointed hat. \n\n\"Morgan!\" booms Merlin in a commanding, frightening voice you could never have imagined coming from his mouth. \"Cease this at once!\"\n\nShe doesn't reply, but in a dazzling shower of black sparks, a chain forms, black and a hint of gold, pulling at Merlin's being. He has his own magics, and it even\nseems for a moment as if he is triumphing, but you know that even he cannot fight whatever it is that Morgan has summoned. Now, there he is, bound in blackness and lying\nempty on the ground. Now, Morgan looks at you.\n\n*choice\n  #I... must join her. It is my true destiny.\n    *set darkness %+40\n    You steel yourself and quiet your mind; this is how it's meant to be, you tell yourself. Closing your eyes, you step towards her and the darkness. You feel her shivering\n    embrace. This isn't easy for her either.\n\n    \"Welcome back, ${sibling},\" you hear her whisper into your ear. You shiver yourself a little bit.\n\n    \"Arthur, what are you doing?!\"\n\n    You hear him running up, running into the dark barrier. His blue eyes try to meet yours, but you draw them away.\n\n    \"This no longer concerns you... Bedwyr, isn't it?\"\n\n    Morgan flicks a finger and suddenly, a dark smoky tendril thrusts Bedwyr away. He hits the ground hard.\n\n    \"...no... I won't... let you...\"\n\n    With a groan and evident pain, he manages to push himself back onto his feet once more. His gaze is direct, unwavering.\n\n    \"...I won't let you do this.\"\n\n    \"Enough of this. This puny boy stands in our way too long. Let me finish him, ${sibling}-- unless you would rather do it yourself...?\"\n\n    She looks at you. You return her gaze, barely.\n\n    *choice\n      #Finish Bedwyr\n        You steel your heart and turn to the fallen Bedwyr.\n\n        He looks at you. You don't flinch.\n\n        \"I'm sorry,\" you catch yourself whispering. He doesn't acknowledge you.\n\n        Deep breath.\n\n        You raise your finger...\n\n        ...and release.\n        *goto merlinfight\n      #Spare him\n        You turn your eyes to Bedwyr, who lies on the ground, helpless. Something in your heart twinges.\n\n        \"...no... I--I can't.\"\n\n        You turn away, and Morgan sneers.\n\n        \"Still soft, I see. Fine, then, leave it to me.\"\n\n        She raises her finger...\n\n        [i]Nothing to be done now.[/i]\n\n        ...and releases.\n        *goto merlinfight\n  #No! This-- this can't be happening. I want to turn it all back, I have to!\n    No. No. This isn't how it's supposed to be. You shut your eyes, [i]tightly[/i], and push. You push against everything, with everything you have cascading and plunging\n    and tearing from your fingertips, your eyes, and when you shout you shout against all of it and it bends and it falls and it's all calls and noise, so much [i]noise[/i],\n    rushing in your ears and blood swirling and twirling and hurling and oh goodness what's that blue thing doing here and isn't it just? but it's not so, not so at [i]all,[/i] so you keep clawing\n    until it's so torn it falls away down and down and--\n\n    Warm light. Feels cold.\n    *page_break\n    The match has yet to begin. Good, you made it in time. You make your way inconspicuously through the crowd, keeping an eye out for... huh. That's odd; you feel like there's something\n    missing, but you can't quite put your finger--\n\n    \"Arthur?\"\n\n    Clear blue eyes blink at you.\n\n    Bedwyr smiles.\n\n    \"Oh, wow, I thought you weren't coming.\"\n\n    That's strange. Who's he talking to?\n\n    A horn sounds suddenly, sharply, cutting through your senses. Automatically, you put your hands to your ears, but it's only an instinct. After all--\n\n    \"It's not a real sound.\"\n\n    You turn. That wasn't Bedwyr's voice-- instead, you see a handsome, dark-haired young man with mysterious eyes. He gently takes ahold of your wrist and lowers your hand\n    from your ear, causing the other hand to follow suit.\n\n    \"It's a pleasure to meet you, Arthur. My name is Rience.\"\n\n    He smiles a twisted smile.\n\n    *choice\n      #\"Who?\"\n        \"A prince of a land not so far from here. My destiny is to become king, and in that way we are alike.\"\n\n        \"You must be mistaken; I am nothing but a humble squire, certainly no [i]prince[/i].\"\n\n        \"Well, that doesn't matter. All will be revealed, as they say.\" He smiles again, and you can't seem to tell whether his smile is warm or cold. \"All that matters\n        is that we're both here now, at the turning point.\"\n\n        \"...turning point?\"\n\n        His eyes twinkle mischievously at your lack of understanding, and his lips, it seems, can scarce wait to ask:\n\n        \"Won't you fetch me a sword, my [i]dear[/i] Arthur?\"\n        *page_break\n        *goto sword\n      #\"Do you know what's happening?\"\n        \"Oh, it's not so complex. Just some slipshod alterations to reality, courtesy of the squire that would be king. Or something like that. It's all pretty much falling\n        apart, though, which isn't actually my fault.\"\n\n        \"I didn't say it was.\"\n\n        \"Well, people tend to blame me for things. And they're usually right anyway. Never mind all that, though-- as two people destined for greatness, there are far grander\n        things to discuss.\"\n\n        \"Greatness? I think you may be confusing me for another Arthur.\"\n\n        \"Oh, you really think that, don't you. You really shouldn't sell yourself short like that, you know.\"\n\n        \"I'm beginning to think your riddles don't mean anything.\"\n\n        \"Ha ha! Taking a stance, I see, and about time. But no, they mean more than you could imagine, and that's what I'm here to discuss.\"\n\n        \"And what is that?\"\n\n        \"Just your future. In essence, this turning point we happen to be standing on at the moment.\"\n\n        \"...turning point?\"\n\n        His eyes twinkle mischievously at your lack of understanding, and his lips, it seems, can scarce wait to ask:\n\n        \"Won't you fetch me a sword, my [i]dear[/i] Arthur?\"\n        *page_break\n        *goto sword\n      #\"What do you want with me?\"\n        \"So [i]defensive[/i]. Haven't you considered that I might be here to help you?\"\n\n        \"Should I? From where I'm standing, it certainly doesn't seem like it.\"\n\n        \"Drawing conclusions, aren't we? My, my. Aren't you even a little interested in what I have to say.\"\n\n        You study his expression. Is he... toying with you?\n\n        \"All right, then I take it you're not concerned about this turning point at all.\"\n\n        What is [i]that[/i] supposed to mean?\n\n        \"...turning point?\"\n\n        His eyes twinkle mischievously at your lack of understanding, and his lips, it seems, can scarce wait to ask:\n\n        \"Won't you fetch me a sword, my [i]dear[/i] Arthur?\"\n        *page_break\n        *goto sword\n  #This is a time for action. I can resolve this on my own, without a doubt.\n    You take a deep breath and meet Morgan's gaze. You're not backing down this easily. Gathering all your strength, you clench up your fists and--\n\n    [b]iT's NO uSe aRThUr I hAvE ALrEAdY woN[/b]\n\n    You try to shake it off-- it's as if her voice is inside your [i]head[/i] now. Your surroundings have grown dark so that only you and Morgan are now visible, everything\n    else encased in shadow. All right. This is it. You exhale, and concentrate-- [i]concentrate[/i]--\n\n    [b]GASP[/b]\n\n    You're not sure if it was you or her this time, but you open your eyes and see... everything. Everything perfectly frozen and still, like a picture. You blink, and feel\n    movement-- strange now. You reach out, but everything's...\n\n    Everything's...\n\n    [b]CRACK[/b]\n\n    Morgan's hand reaches back, clawed and angry, breaking the ice, [i]breaking[/i] it--\n\n    [b]DID YOU REALLY THINK YOU COULD DEFEAT ME[/b]\n\n    --the darkness pouring through--\n\n    [b]SOOOO EASILY[/b]\n\n    --so close, so--\n\n    \"[i]Gentle[/i]men!\"\n\n    You look up, and there he is. The dark-haired young man with the mysterious eyes, familiar somehow...\n\n    \"Surely, there must be a more civilized way of settling your differences?\"\n\n    [b]RIENCE what are you DOING THIS WAS NOT PART OF THE AGREEMENT[/b]\n\n    \"Never mind that, dear. I'm not here for you.\"\n\n    In one smooth motion, he leaps down from the bleachers and lands perfectly on the cool grass.\n    *goto Riencearrival\n\n*label Gunknown\nThe torchlight washes over the grounds, burning red... [i]burning[/i] red...\n\nYou shake your head. No. What's going [i]on?[/i] Why does everything feel so... so...\n\nCLANG! You jump up and hit your head against the wooden ceiling--or rather, floor-- of the bleachers. Nn. It sounds as if someone's finally been knocked off a horse--\n\nNo. What? That's not right. You don't hear cheering, you hear--\n\nScreaming.\n\nYou push yourself out from beneath the bleachers, and dash out onto the grass-- but too late. You only just catch the last of the crowd fleeing the grounds,\nall fear-stricken, until only the four of you remain.\n\nYou, Bedwyr, a noble-looking young woman, and... a young man who seems strangely familiar, like a character from a dream. All just... standing there in front of it. A pitch-black tear in\nthe world, gaping in the middle of the grounds for all to see. What the hell...?\n\n\"Behold,\" cries a deep female voice. \"It is here at last!\"\n\nThat's when you see her-- stepping out from [i]behind[/i] the hole, [i]her[/i]. Beautiful, but everything dark and wild, no smile on her lips. And something about her reminds you of\nyour own reflection.\n\n\"No more magic. No more lies. Time for the endgame, and truth to rise!\"\n\nThe blackness swirls and grows, seeming almost like a living thing, a monster. The young woman is rooted in place, pale with terror, and Bedwyr just stares, not moving. The\nfamiliar man looks confused, even, as if something within him is torn as well...\n\nYou don't know what to do. No choices. No paths to choose, just... nothing. Your heart trembles, and you wonder if this is all you can be.\n\nBefore you have time to think any more, a deep shadow streams into the dirt circle, forming into the shape of a gangly, ancient man with a particularly pointed hat. \n\n\"Morgan!\" booms Merlin in a commanding, frightening voice you could never have imagined coming from his mouth. \"Cease this at once!\"\n\nShe doesn't reply, but in a dazzling shower of black sparks, a chain forms, black and a hint of gold, pulling at Merlin's being. He has his own magics, and it even\nseems for a moment as if he is triumphing, but you know that even he cannot fight whatever it is that Morgan has summoned. Now, there he is, bound in blackness and lying\nempty on the ground. Now, Morgan looks at you.\n\n*choice\n  #I... must join her. It is my true destiny.\n    *set darkness %+40\n    You steel yourself and quiet your mind; this is how it's meant to be, you tell yourself. Closing your eyes, you step towards her and the darkness. You feel her shivering\n    embrace. This isn't easy for her either.\n\n    \"Welcome back, ${sibling},\" you hear her whisper into your ear. You shiver yourself a little bit.\n\n    \"Arthur, what are you doing?!\"\n\n    You hear him running up, running into the dark barrier. His blue eyes try to meet yours, but you draw them away.\n\n    \"This no longer concerns you... Bedwyr, isn't it?\"\n\n    Morgan flicks a finger and suddenly, a dark smoky tendril thrusts Bedwyr away. He hits the ground hard.\n\n    \"...no... I won't... let you...\"\n\n    With a groan and evident pain, he manages to push himself back onto his feet once more. His gaze is direct, unwavering.\n\n    \"...I won't let you do this.\"\n\n    \"Enough of this. This puny boy stands in our way too long. Let me finish him, ${sibling}-- unless you would rather do it yourself...?\"\n\n    She looks at you. You return her gaze, barely.\n\n    *choice\n      #Finish Bedwyr\n        You steel your heart and turn to the fallen Bedwyr.\n\n        He looks at you. You don't flinch.\n\n        \"I'm sorry,\" you catch yourself whispering. He doesn't acknowledge you.\n\n        Deep breath.\n\n        You raise your finger...\n\n        ...and release.\n        *goto merlinfight\n      #Spare him\n        You turn your eyes to Bedwyr, who lies on the ground, helpless. Something in your heart twinges.\n\n        \"...no... I--I can't.\"\n\n        You turn away, and Morgan sneers.\n\n        \"Still soft, I see. Fine, then, leave it to me.\"\n\n        She raises her finger...\n\n        [i]Nothing to be done now.[/i]\n\n        ...and releases.\n        *goto merlinfight\n  #No! This-- this can't be happening. I want to turn it all back, I have to!\n    No. No. This isn't how it's supposed to be. You shut your eyes, [i]tightly[/i], and push. You push against everything, with everything you have cascading and plunging\n    and tearing from your fingertips, your eyes, and when you shout you shout against all of it and it bends and it falls and it's all calls and noise, so much [i]noise[/i],\n    rushing in your ears and blood swirling and twirling and hurling and oh goodness what's that blue thing doing here and isn't it just? but it's not so, not so at [i]all,[/i] so you keep clawing\n    until it's so torn it falls away down and down and--\n\n    Warm light. Feels cold.\n    *page_break\n    The match has yet to begin. Good, you made it in time. You make your way inconspicuously through the crowd, keeping an eye out for... huh. That's odd; you feel like there's something\n    missing, but you can't quite put your finger--\n\n    \"Arthur?\"\n\n    Clear blue eyes blink at you.\n\n    Bedwyr smiles.\n\n    \"Oh, wow, I thought you weren't coming.\"\n\n    That's strange. Who's he talking to?\n\n    A horn sounds suddenly, sharply, cutting through your senses. Automatically, you put your hands to your ears, but it's only an instinct. After all--\n\n    \"It's not a real sound.\"\n\n    You turn. That wasn't Bedwyr's voice-- instead, you see a handsome, dark-haired young man with mysterious eyes. He gently takes ahold of your wrist and lowers your hand\n    from your ear, causing the other hand to follow suit.\n\n    \"It's a pleasure to meet you, Arthur. My name is Rience.\"\n\n    He smiles a twisted smile.\n\n    *choice\n      #\"Who?\"\n        \"A prince of a land not so far from here. My destiny is to become king, and in that way we are alike.\"\n\n        \"You must be mistaken; I am nothing but a humble squire, certainly no [i]prince[/i].\"\n\n        \"Well, that doesn't matter. All will be revealed, as they say.\" He smiles again, and you can't seem to tell whether his smile is warm or cold. \"All that matters\n        is that we're both here now, at the turning point.\"\n\n        \"...turning point?\"\n\n        His eyes twinkle mischievously at your lack of understanding, and his lips, it seems, can scarce wait to ask:\n\n        \"Won't you fetch me a sword, my [i]dear[/i] Arthur?\"\n        *page_break\n        *goto sword\n      #\"Do you know what's happening?\"\n        \"Oh, it's not so complex. Just some slipshod alterations to reality, courtesy of the squire that would be king. Or something like that. It's all pretty much falling\n        apart, though, which isn't actually my fault.\"\n\n        \"I didn't say it was.\"\n\n        \"Well, people tend to blame me for things. And they're usually right anyway. Never mind all that, though-- as two people destined for greatness, there are far grander\n        things to discuss.\"\n\n        \"Greatness? I think you may be confusing me for another Arthur.\"\n\n        \"Oh, you really think that, don't you. You really shouldn't sell yourself short like that, you know.\"\n\n        \"I'm beginning to think your riddles don't mean anything.\"\n\n        \"Ha ha! Taking a stance, I see, and about time. But no, they mean more than you could imagine, and that's what I'm here to discuss.\"\n\n        \"And what is that?\"\n\n        \"Just your future. In essence, this turning point we happen to be standing on at the moment.\"\n\n        \"...turning point?\"\n\n        His eyes twinkle mischievously at your lack of understanding, and his lips, it seems, can scarce wait to ask:\n\n        \"Won't you fetch me a sword, my [i]dear[/i] Arthur?\"\n        *page_break\n        *goto sword\n      #\"What do you want with me?\"\n        \"So [i]defensive[/i]. Haven't you considered that I might be here to help you?\"\n\n        \"Should I? From where I'm standing, it certainly doesn't seem like it.\"\n\n        \"Drawing conclusions, aren't we? My, my. Aren't you even a little interested in what I have to say.\"\n\n        You study his expression. Is he... toying with you?\n\n        \"All right, then I take it you're not concerned about this turning point at all.\"\n\n        What is [i]that[/i] supposed to mean?\n\n        \"...turning point?\"\n\n        His eyes twinkle mischievously at your lack of understanding, and his lips, it seems, can scarce wait to ask:\n\n        \"Won't you fetch me a sword, my [i]dear[/i] Arthur?\"\n        *page_break\n        *goto sword\n  #This is a time for action. I can resolve this on my own, without a doubt.\n    You take a deep breath and meet Morgan's gaze. You're not backing down this easily. Gathering all your strength, you clench up your fists and--\n\n    [b]iT's NO uSe aRThUr I hAvE ALrEAdY woN[/b]\n\n    You try to shake it off-- it's as if her voice is inside your [i]head[/i] now. Your surroundings have grown dark so that only you and Morgan are now visible, everything\n    else encased in shadow. All right. This is it. You exhale, and concentrate-- [i]concentrate[/i]--\n\n    [b]GASP[/b]\n\n    You're not sure if it was you or her this time, but you open your eyes and see... everything. Everything perfectly frozen and still, like a picture. You blink, and feel\n    movement-- strange now. You reach out, but everything's...\n\n    Everything's...\n\n    [b]CRACK[/b]\n\n    Morgan's hand reaches back, clawed and angry, breaking the ice, [i]breaking[/i] it--\n\n    [b]DID YOU REALLY THINK YOU COULD DEFEAT ME[/b]\n\n    --the darkness pouring through--\n\n    [b]SOOOO EASILY[/b]\n\n    --so close, so--\n\n    \"[i]Ladies[/i].\"\n\n    You look up, and there he is. The dark-haired young man with the mysterious eyes, familiar somehow...\n\n    \"Surely, there must be a more civilized way of settling your differences?\"\n\n    [b]RIENCE what are you DOING THIS WAS NOT PART OF THE AGREEMENT[/b]\n\n    \"Never mind that, dear. I'm not here for you.\"\n\n    In one smooth motion, he leaps down from the bleachers and lands perfectly on the cool grass.\n    *goto Riencearrival\n\n*label Riencearrival\n*if (mark = \"\")\n  \"Hello... Arthur.\"\n\n  *if (Rience_love = \"true\")\n    He smiles brightly as he walks towards you, and doesn't pause as he takes your face in his hands and kisses you... deeply. You remember now.\n\n    He parts from you finally, and you see everything in his emerald eyes.\n\n    \"...R-ri...\"\n\n    \"Rience is the name, if you might remember.\" He smiles.\n\n    \"But how...?\"\n\n    \"Simple, dear. I'm not really here. But then again...\"\n\n    He traces your face gently with his finger.\n\n    \"...neither are you.\"\n\n    You hear soft footfalls in the dark. It sounds as if...\n\n    \"What the hell is this?\"\n\n    You turn, and see Morgan-- her face terribly pale, her eyes tired as a winter's night. Her voice cracks as she speaks.\n\n    \"This wasn't what we discussed!\"\n\n    \"What makes you think my plan is still the same as yours?\" Rience replies. \"Maybe my priorities have... shifted.\"\n\n    \"Don't fuck with me. You've seen what I can do.\"\n\n    \"Duly impressed. I [i]have,[/i] however seen better.\"\n\n    Morgan half-scoffs, half-snarls.\n\n    \"Are you challenging me?\"\n\n    \"Can't I just wish for us to be left alone?\"\n\n    \"[i]Us?[/i] What have you been doing with Arthur, exactly?\"\n\n    \"That, I believe, is none of your business.\"\n\n    \"Just... get out of my way.\"\n\n    She tries to push past him, but he's having none of it. They lock eyes.\n\n    \"You sure you want to go there?\" Her voice is not light.\n\n    \"Oh, that decision has already been made.\"\n\n    In a flash, so fast that your eyes can barely follow, Morgan draws a wicked dagger. Expert moves, blocks, strikes, a struggle. He grabs her wrist midair, and the blade \n    twitches.\n\n    \"[i]Do[/i] be careful.\"\n\n    She chuckles, and reaches back.\n\n    You don't have time to scream a warning.\n\n    Before you know it, another dagger is in her hand and in... Rience. He grasps the hilt, gasping. But then... a smile.\n\n    \"Oh, you really don't know what you're messing with... do you?\"\n\n    \"Still the same arrogance. Don't you ever learn?\"\n\n    \"Heh.\" A little blood drips down his lips.\n\n    \"You're the one who hasn't been paying attention.\" He looks at you.\n\n    \"...Rience...\"\n\n    \"Hush, now.\" Coughing. More blood. \"Not the time.\"\n\n    Morgan's eyes swim with confusion. You can see her wondering what advantage he could possibly have. Until...\n\n    \"NO!\"\n\n    Too late. Rience has already grabbed you by the collar and brought you so close.\n\n    \"Tell the old coot hello from me, won't you?\"\n\n    A kiss. Beautiful-- you want it to last, but the blossom, the blinding flash of light is already fading.\n\n    Fading... like you.\n\n    Cue your scream.\n    *page_break\n    *goto crown\n  *else\n    He smiles brightly as he walks towards you, and stops to gaze directly into your eyes.\n    \n    \"...R-ri...\"\n\n    \"Rience is the name, if you might remember.\" He smiles.\n\n    \"But how...?\"\n\n    \"Simple, dear. I'm not really here. But then again...\"\n\n    He traces your face gently with his finger.\n\n    \"...neither are you.\"\n\n    You hear soft footfalls in the dark. It sounds as if...\n\n    \"What the hell is this?\"\n\n    You turn, and see Morgan-- her face terribly pale, her eyes tired as a winter's night. Her voice cracks as she speaks.\n\n    \"This wasn't what we discussed!\"\n\n    \"What makes you think my plan is still the same as yours?\" Rience replies. \"Maybe my priorities have... shifted.\"\n\n    \"Don't fuck with me. You've seen what I can do.\"\n\n    \"Duly impressed. I [i]have,[/i] however seen better.\"\n\n    Morgan half-scoffs, half-snarls.\n\n    \"Just... get out of my way.\"\n\n    She tries to push past him, but he's having none of it. They lock eyes.\n\n    \"You sure you want to go there?\" Her voice is not light.\n\n    \"Oh, that decision has already been made.\"\n\n    In a flash, so fast that your eyes can barely follow, Morgan draws a wicked dagger. Expert moves, blocks, strikes, a struggle. He grabs her wrist midair, and the blade \n    twitches.\n\n    \"[i]Do[/i] be careful.\"\n\n    She chuckles, and reaches back.\n\n    You don't have time to scream a warning.\n\n    Before you know it, another dagger is in her hand and in... Rience. He grasps the hilt, gasping. But then... a smile.\n\n    \"Oh, you really don't know what you're messing with... do you?\"\n\n    \"Still the same arrogance. Don't you ever learn?\"\n\n    \"Heh.\" A little blood drips down his lips.\n\n    \"You're the one who hasn't been paying attention.\" He looks at you.\n\n    \"...Rience...\"\n\n    \"Hush, now.\" Coughing. More blood. \"Not the time.\"\n\n    Morgan's eyes swim with confusion. You can see her wondering what advantage he could possibly have. Until...\n\n    \"NO!\"\n\n    Too late. Rience has already grabbed you by the collar and brought you so close.\n\n    \"Tell the old coot hello from me, won't you?\"\n\n    A soft kiss, on the forehead-- you almost want it to last, but the blossom, the blinding flash of light is already fading.\n\n    Fading... like you.\n\n    Cue your scream.\n    *page_break\n    *goto crown\n*elseif (mark = \"Bedwyr\")\n    \"Why, hello, Arthur. Remember me? Name's Rience.\"\n\n    A lift of his hand, and Bedwyr is floating in midair suspended there. Rience doesn't turn to look.\n\n    \"Though I might have already mentioned that.\"\n\n    \"What are you [i]doing?[/i]\"\n\n    \"Oh, nothing much. Except, even cold-hearted little me can see that you're something special, Arthur. Something... new. Now, I don't know what you've heard about me,\n    but I've been described as a... how did he put it? Ah, yes... 'jealous bitch'. Rather accurate, I'm afraid. So you can see how accounts around here may not exactly be\n    all squared up.\"\n\n    \"You're crazy.\"\n\n    \"Another popular designation. All true, really. Except for 'tacky', that one was just hurtful.\"\n\n    \"Let Bedwyr go!\"\n\n    \"Uh... no. It's much too soon for [i]that[/i], dear.\"\n\n    He must have been knocked out, because Bedwyr only now begins to wake up and notice that he's in midair.\"\n\n    \"Um, Arthur??\"\n\n    \"Just... hang on, Bedwyr!\"\n\n    \"To what?\"\n\n    \"Enough chatter, insignificant person. The grown-ups are talking.\"\n\n    \"Who's [i]he?[/i]\"\n\n    \"Uh... long story.\" You can't think of a better reply.\n\n    \"What's going on?\"\n\n    \"Basically, I rejected him and he now hates you.\"\n\n    \"Oh, not [i]hate.[/i] Loathe is so much more colorful, don't you think?\"\n\n    \"So, it's a jealous ex kind of situation?\"\n\n    \"Kind of?\"\n\n    \"Well, then--\"\n\n    Suddenly, a dark tendril appears and wraps itself around Bedwyr's mouth.\n\n    \"You [i]did[/i] hear me when I said no chatter, correct? I do have to speak with Arthur.\"\n\n    \"What do you want with me?\"\n\n    \"Oh, nothing much. Just everything.\"\n\n    His laugh sends a chill through your bones.\n\n    \"Tell me, heartbreaker, have you ever considered your future?\"\n\n    He steps towards you. You move to step away, but he raises his hand, tightening his fist and simultaneously, the tendril binding Bedwyr. His groan is muffled.\n\n    \"Ah-ah-ah. Remember?\"\n\n    You stay in place. He's not playing games.\n\n    \"Good. Now, Arthur...\"\n\n    He takes your hand. Just then, you notice that his eyes are red: he's been... crying?\n\n    \"...don't you think you'd look good with a [i]crown?[/i]\"\n    *page_break\n    *goto crown\n*elseif (mark =\"Guinevere\")\n    \"Why, hello, Arthur. Remember me? Name's Rience.\"\n\n    A lift of his hand, and Guinevere is floating in midair suspended there. Rience doesn't turn to look.\n\n    \"Though I might have already mentioned that.\"\n\n    \"What are you [i]doing?[/i]\"\n\n    \"Oh, nothing much. Except, even cold-hearted little me can see that you're something special, Arthur. Something... new. Now, I don't know what you've heard about me,\n    but I've been described as a... how did he put it? Ah, yes... 'jealous bitch'. Rather accurate, I'm afraid. So you can see how accounts around here may not exactly be\n    all squared up.\"\n\n    \"You're crazy.\"\n\n    \"Another popular designation. All true, really. Except for 'tacky', that one was just hurtful.\"\n\n    \"Let Guinevere go!\"\n\n    \"Uh... no. It's much too soon for [i]that[/i], dear.\"\n\n    She must have been knocked out, because Guinevere only now begins to wake up and notice that she's in midair.\"\n\n    \"...Arthur? Why am I floating?\"\n\n    \"...It's kind of hard to explain.\"\n\n    \"Your better half heartlessly rejected me and so now I harbor a tiny bit of ill will towards you. Do try to keep up?\"\n\n    \"He's your ex?\"\n\n    \"Kind of?\"\n\n    \"Well, tell him--\"\n\n    Suddenly, a dark tendril appears and wraps itself around Guinevere's mouth.\n\n    \"Enough chatter-- I do have to speak with Arthur.\"\n\n    \"What do you want with me?\"\n\n    \"Oh, nothing much. Just everything.\"\n\n    His laugh sends a chill through your bones.\n\n    \"Tell me, heartbreaker, have you ever considered your future?\"\n\n    He steps towards you. You move to step away, but he raises his hand, tightening his fist and simultaneously, the tendril binding Bedwyr. His groan is muffled.\n\n    \"Ah-ah-ah. Remember?\"\n\n    You stay in place. He's not playing games.\n\n    \"Good. Now, Arthur...\"\n\n    He takes your hand. Just then, you notice that his eyes are red: he's been... crying?\n\n    \"...don't you think you'd look good with a [i]crown?[/i]\"\n    *page_break\n    *goto crown\n\n*label sword\nNng. What...\n\n\"Rise.\"\n\nWhat?\n\n\"[i]Rise[/i], son of Uther.\"\n\nNot this again...\n\nYou push off the very wet ground and manage to steady yourself onto your feet. Gently, you feel the touch of cold steel on your shoulder. You look, and a sword rests\nthere.\n\n\"Slowly, now.\"\n\nYou look at the source of the voice and find a woman standing before you, despite the deepness of the voice. Her form is subtle and graceful, ephemeral in a way; her face,\nbeautiful and yet somehow ancient with her eyes glazed over blue. In fact, blue seems to bleed from her whole self like a light discreetly leaking, tainting her skin and her\ndress and her long, long hair.\n\n\"Who are you?\"\n\n\"My name is Nimue, but that is not important. What is important is who [i]you[/i] are, son of Uther.\"\n\n\"Why do you keep calling me that?\"\n\n\"Was that not your father's name, King Uther? If that is a revelation to you, please do not take too much time to process it. There are things to be done.\"\n\n\"Stop it.\"\n\n\"What--\"\n\nYou grip the sword suddenly, tightly, without fear. You push it back, away from your shoulder and you hear the clatter as it falls to the ground. Red drips down from\nyour hand.\n\n\"I am sick and [i]tired[/i] of everyone telling me what to do and when to do it. You mock me so easily, but I'm more than what I seem and I don't care if you believe\nme or not. I have been through plenty and I-- I don't know what's going on anymore, hardly ever, but I'm not to just shut up and surrender, do you understand?\"\n\nYou stop to draw breath, staring straight at the woman. Her soft glow continues to pulse in gentle waves, and at first she doesn't say a word. Then, slowly but surely,\nshe smiles.\n\n\"You are truly worthy, Arthur,\" she says softly. \"At first I feared you may be... [i]changed[/i], but I can see you still have the same fire within you as ever. Different...\nand yet, the same.\"\n\n\"What are you talking about?\"\n\n\"It's not important. What is crucial is that we make certain of this determination, of your worth-- or rather, your path.\"\n\nYou take a deep breath. You're beginning to understand, a little.\n\n\"So I have to make a choice?\"\n\n\"Indeed. Quite an important choice. I will make it clear to you, as soon as you turn around.\"\n\n\"Why? What's behind me?\"\n\n\"Turn and see.\"\n\nYou push back the feeling of unease as you slowly turn...\n\n...and find yourself sitting, in a boat in the middle of a lake. Startled, you look around and that's when you see her, floating on the edge of the water, just [i]standing[/i]\nthere.\n\n\"Arthur. It's time.\"\n\nAs she says the words, she claps and a sudden vision fills your mind. A sword in the stone, underwater, waiting.\n\n\"What... what does it mean?\"\n\n\"What you saw is directly beneath you. I put it before you that the sword is yours and all that comes with it is yours, should you claim it. Be warned, however, that the lake\nis very deep and the stone unwilling to surrender its treasure to the unworthy.\"\n\n\"So if I can't pull out the sword in time...\"\n\n\"...you shall surely drown.\"\n\nYou swallow, hard. All is clear now.\n\n\"But, of course, you need not claim the sword at all. You have a whole life to be lived, unencumbered by the heavy responsibilities that the sword represents. It's your choice, after all.\"\n\nYou blink, and you feel like this might be the most important choice you've made so far.\n*choice\n  #Dive for the sword\n    You look down, then up again. You've made your choice.\n\n    Without warning, you dive deep into the depths of the lake's waters, allowing yourself to sink deeper and deeper. Your breath holds tight in your throat as you catch\n    sight of a stone, then a glimmering sword within it. You're growing lightheaded, so you grab the hilt and pull...\n\n    Pull...\n\n    It won't give, but you're feeling sooo...\n\n    Your grip weakens as it all fades to black.\n\n    ...\n\n    You open your eyes. It's dark.\n    *page_break\n    *goto leave\n  #Stay above water\n    You look down, then up again. You've made your choice.\n\n    \"I'm staying here.\"\n\n    \"Very well, then.\"\n\n    She draws her sword.\n\n    \"Time to face the consequences.\"\n\n    \"Wait--\"\n\n    Too late. She raises it and lowers it, followed by a searing flash of pain.\n\n    You open your eyes. It's bright.\n    *page_break\n    *goto stay\n\n*label merlinfight\nDeafening silence. Nothing.\n\nDid it happen? Is he...\n\nYou look up, but you don't see Bedwyr. Not anymore. Instead you see...\n\n...Merlin?\n\nIndeed, there he stands, grasping the incorporeal tendril with all his might, his every muscle straining against the effort.\n\n\"So this is the path you've chosen, Arthur. Very well, let it be so. But be warned... now you may count MERLIN among your enemies!\"\n\nWith a powerful cry that breaks your guard, he thrusts the tendril back at you, shattering the barrier and knocking you over.\n\n\"Time to face your destiny, Arthur...\"\n\nHe steps over your fallen self...\n\n\"...face it NOW.\"\n\n...his hand suddenly grasps at your face, [i]burning[/i] it.\n\nCue your scream.\n*page_break\n*goto cauldron\n\n*label crown\nNng. What...\n\n\"Get up.\"\n\nWhat?\n\n\"Come on, I don't have all day.\"\n\nNot this again...\n\nYou manage to push off the very dry ground and steady yourself on your feet. The sight that meets your eyes is beyond description: a dystopia, truly a wasteland of sand\nand darkness. No, not darkness... a [i]black sun[/i].\n\n\"Finished inspecting yet?\"\n\nYou look around for the source of the voice and find a wizened old man sitting at a small table with two chairs. One is empty.\n\n\"Have a seat, Arthur.\"\n\nYou look at the man. He is small and seems to be quite ancient, but quite ill as well. He coughs loudly.\n\n\"Well?\"\n\nYou sigh, and take the seat. You find a glittering golden crown sitting before you-- how did you not notice that before?\n\n\"Yes, the crown is the object. But you can't just take it, you know. You must [i]earn[/i] it.\"\n\n\"Forget the crown. What's going on? Where am I?\"\n\n\"Never mind any of that. This is my home, but it's not yours. Not yet, anyway. I'm giving you a chance to be something more than I was. The last thing the kingdom needs\nis another fisher king...\"\n\n\"And the crown?\"\n\n\"The crown is everything. It's your chance. And it's up to you to get it.\"\n\nYour eyes ask the question first.\n\n\"What do I have to do?\"\n\n\"Ask a question. It really is that simple. But it must be the [i]right[/i] question.\"\n\n\"What are my options?\"\n\n\"You must ask about someone. Choose wisely who is to be the subject of your question.\"\n\nYou take a deep breath. Something tells you that this is the most important choice you've made so far.\n*choice\n  #Ask about the king\n    You look at the crown, then at the old man. You've made your decision.\n\n    \"Who is the king?\"\n\n    A swirling vortex surges from the jeweled crown and engulfs you, shrouding everything else from view.\n\n    You open your eyes. It's bright.\n    *page_break\n    *goto leave\n  #Ask about yourself\n    You look at the crown, then at the old man. You've made your decision.\n\n    \"Who am I?\"\n\n    A swirling vortex surges from the jeweled crown and engulfs you, shrouding everything else from view.\n\n    You open your eyes. It's bright.\n    *page_break\n    *goto stay\n\n*label stay\nYou look around, and feel the grass under your hands. Grass? Wait. You take a closer look, and recognize the looming shape before you: the castle! You're back at the moat!\n\n*if (Rience_love = \"true\")\n  \"We meet again.\"\n\n  You turn, and see... Rience?\n\n  \"What's going on?\"\n\n  He takes a seat beside you. \"You tell me. It's your dream.\"\n\n  \"This is all just a dream?\"\n\n  \"Maybe. Or maybe it just follows some of the same rules.\" He smiles. \"I've missed you, you know.\"\n\n  You blush, just a little. \"So have I,\" you whisper.\n\n  \"Well then, what are we waiting for?\"\n\n  He gently lifts a hand to your face and embraces your lips with his. You return the feeling. After what seems like forever and no time at all, you part.\n\n  \"Why don't we just stay like this... ${name}?\"\n\n  \"Agreed... Rience.\"\n\n  The next kiss was not the last. Not by a long shot.\n  *page_break\n  MANY YEARS IN THE FUTURE...\n  *line_break\n  *line_break\n  \"Are you ready to go?\"\n\n  \"Do I have to?\"\n\n  The young boy looks up pleadingly. His blue eyes flash between his dark hair.\n\n  \"Yes, son. Your education is vital if you wish to be king someday.\"\n\n  \"Is all arranged?\"\n\n  A man steps out of the shadows: Rience. He's in his forties now, but it hardly shows. His emerald eyes still sparkle in the dim light as he approaches his son.\n\n  \"Excited to spend time with grandfather Merlin?\"\n\n  \"More like to learn all his secrets!\"\n\n  You and Rience chuckle.\n\n  \"Well, be careful with those spells, and remember to be respectful of your elders.\"\n\n  \"But not too respectful, right, Dad?\"\n\n  He looks at Rience, who chuckles nervously.\n\n  \"Don't look at me. You're much more of a good boy than I ever was.\"\n\n  \"Well, Dad's got king business to attend to, and I've got some things to [i]discuss[/i] with him.\"\n\n  \"I like the sound of that.\"\n\n  You look straight at each other, and the boy mock-retches in disgust.\n\n  \"You guys are [i]so[/i] embarrassing.\"\n\n  You hand him his bag. \"Let's go, then.\"\n\n  \"Ok, bye!\"\n\n  He begins to dash off towards the unknown.\n\n  \"Hey!\"\n\n  He looks back at you for a brief moment.\n\n  \"Take care...\"\n\n  ...and he's off again.\n\n  \"...Mordred.\"\n  *goto_scene ending\n*elseif (Bedwyr_love = \"true\")\n  \"Hi, Arthur.\n\n  You turn, and see... Bedwyr?\n\n  \"What's going on?\"\n\n  He shrugs, and takes a seat beside you. \"I know as much as you do.\"\n\n  He takes your hand gently, and smiles shyly. \"It's been a while.\"\n\n  \"I know.\"\n\n  He leans his head on your shoulder. You both smile, softly.\n\n  \"Why don't we just stay like this... ${name}?\"\n\n  \"Agreed... Bedwyr.\"\n  *page_break\n  MANY YEARS IN THE FUTURE...\n  *line_break\n  *line_break\n  \"And... go!\"\n\n  A flag falls, and two horses begin to rush toward each other at full speed. Lances reach out, and there's a breath...\n\n  In a split second, it's all over. The lance crashes dramatically against the body of the loser, who tumbles violently to the ground, while the victor rides on, unharmed.\n\n  \"That was quite the match.\"\n\n  There he is, his fragile frame standing tall against the midday sun: Bedwyr.\n\n  \"I try my best.\"\n\n  \"But of course,\" he replies playfully. \"I'd expect nothing less.\"\n\n  You both hug each other tightly, then release.\n\n  \"Your turn next.\"\n\n  He smiles.\n\n  \"You know... I'm not one to introspect too much, but we [i]have[/i] come a long way. Not just in terms of victories, but, you know... together.\"\n\n  Your turn to smile.\n \n  \"Come on, saddle up. This thing's not over yet.\"\n\n  Bedwyr mock groans.\n\n  \"I hope it doesn't come to another face-off between us. I [i]hate[/i] it when that happens.\"\n\n  \"If it does, I'll be sure to knock you off your horse gently.\"\n\n  \"You mean I will!\"\n\n  You mount your horses, and ride together. It's going to be a long day...\n  *goto_scene ending\n*elseif (Guinevere_love = \"true\")\n  \"Hey, Arthur.\"\n\n  You turn, and see... Guinevere?\n\n  \"What's going on?\"\n\n  She shrugs, and takes a seat beside you. \"Can't say I know.\"\n\n  She strokes your hair gently, and smiles boldly. \"Took you a while, huh?\"\n\n  \"I know.\"\n\n  He leans his head on your shoulder. You both smile, softly.\n\n  \"Why don't we just stay like this... ${name}?\"\n\n  \"Agreed... Guinevere.\"\n  *page_break\n  MANY YEARS IN THE FUTURE...\n  *line_break\n  *line_break\n  \"Ahem.\"\n  \n  The high, vaulted ceiling rises high above your head, suspended by a series of impressive pillars surrounding you. It's quite a sight to see...\n\n  \"Excuse me.\"\n\n  Surprised, you look down again to find the voice, and find a man in formal clothes looking back at you.\n\n  \"...It is time for
