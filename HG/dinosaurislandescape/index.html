lectable_if (Athletics \u003c=4) #Athletics\n          *set Athletics +1\n          *goto after_swim\n        *selectable_if (Tool_Usage \u003c=4) #Tool_Usage\n          *set Tool_Usage +1\n          *goto after_swim\n        *selectable_if (First_Aid \u003c=4) #First_Aid\n          *set First_Aid +1\n          *goto after_swim\n        *selectable_if (Stealth \u003c=4) #Stealth\n          *set Stealth +1\n          *goto after_swim\n        *selectable_if (Survival \u003c=4) #Survival\n          *set Survival +1\n          *goto after_swim\n    *else\n      You can't stat up again. But at least you enjoyed your swim.\n      *goto swim\n\n*label after_swim\n\n*achieve swimmer\n*set Lake_Repeat \"True\"\n*goto swim", "2_w": "*if (west = \"done\")\n  *goto west_done\n*elseif (west = \"Unexplored\")\n  *goto west_unexplored\n*else\n  *goto west_explored\n\n*label west_unexplored\n\nYou and ${partner_name} reach the western portion of the island. You're aware from hearsay before that there's apparently quicksand in this area, but don't know quite where. You do however very quickly pick up on the fact that there is some sand that has a slightly different colouration than the rest, and figure best to avoid it.\n${partner_name} however doesn't pick up on it, and walks right into it. Before you can get ${them} to stop, ${partner_name} begins to sink and are ankle-deep before they even notice that there's a problem.\n\n*goto quicksand\n\n\n*label west_explored\n\nYou and ${partner_name} reach the western portion of the island. You remember the quicksand being a major threat here, and are quickly able to identify where it is. However, ${partner_name} isn't so lucky, as they walk directly towards the middle of the beach, and get caught in it. They're ankle-deep before they discover that there's a problem.\n\n*goto quicksand\n\n*label west_done\n\nYou and ${partner_name}, now both aware of the quicksand are able to avoid it entirely.\n\n*goto beach\n\n*label quicksand\n\nThink fast! ${partner_name} is sinking into the quicksand. What do you do?\n\n*choice\n  #Throw my grappling hook to save ${them}.\n    You throw it, and they grab it like its something they've practised over one thousand times over. After pulling ${them} out, ${partner_name} thanks you for your help.\n    *set partner %+10\n    *goto Spinosaurus   \n  *selectable_if (Survival > 3) #Use my knowledge of Quicksand to think of something.\n    You know enough about quicksand to know that is ${partner_name} were to ly on their back, they would be fine. \"You can lie on your back! It'll stop you from sinking!\" You yell to ${them}. They attempt to do so and are quickly able to do it. ${partner_name} then gets up and out, thanking you for teaching ${them} to be more independent.\n    *set partner %+15\n    *goto Spinosaurus\n\n\n*label Spinosaurus\n\nAfter the get out, you hear a loud roar and turn to your left to see that a large Spinosaurus, about 50 feet long has now appeared. You and ${partner_name} look at it, wondering what to do.\n*choice\n  #Run behind the quicksand, hoping it sinks.\n    You grab ${partner_name} and run behind the quicksand right before the Spinosaurus charges at you two. You see the awkward run of a creature that's not used to being on land. You begin to run further just in case your plan A doesn't work.  As the creature crosses the quicksand, you look back to see it begin to sink down and flail its arms around. After a couple of minutes, you reach a safe distance, and the Spino has pulled itself out, but lost sight of you, and goes into the ocean. You two slowly re-approach after the Spino is a safe distance away.\n    \"Risky, wasn't it?\" ${partner_name} asks.\n    \"Yeah,\" you respond, not wanting to get too into it right now.\n    *set partner %-5\n    *goto beach\n  #Use my grappling hook to try and trip it.\n    You order ${partner_name} to stay back, and charge at the Spino, grappling hook in hand. It turns to you, standing there as if ready to face you. It begins to reach for you as you get close but then you throw your grappling hook as precisely as you can. The hook winds it way around the creature's back leg,  and continues its momentum to the side, curving around the front one, and then completing the circle around its legs by having the hook land right on the rope. Perfect! \n    Now, with the grappling hook completely around the creature's feet, you pull, tightening it. The Spinosaurus takes a step forward, and trips. You take out your axe, taking shots at both its eyes, blinding it, before unhooking the grappling hook and using it to free ${partner_name} from the quicksand. They are now almost waist-deep, so it takes a while, but you're able to successfully do it.\n    \"That was awesome!\" ${partner_name} yells at you.\n    *set partner %+15\n    *goto beach\n  *selectable_if (ammo > 0) #Shoot the Spinosaurus with your rifle, using ammo.\n    You have plenty of time to line up a shot, but get nervous as the creature approaches. You think you're doing a good job of hiding your internal panic, but have no way of knowing for sure. Either way, you line up your shot and pull the trigger, hitting the creature directly in the neck, taking it out in a single shot.\n    \"That was pretty sexy, you little badass,\" ${partner_name} says after you pull ${them} out. \"Now, time to figure out how to get out of here.\"\n    *set partner %+10\n    *set ammo -1\n    *goto beach\n\n*label beach\n\n*set west \"done\"\n\n*label direction\n\nYou see that there's an office right by the dock that you could travel into. Or you could go back to the center of the island.\n\n*choice \n  #Yes, there could be something useful.\n    You approach the office.\n    *goto office\n  #No, I would like to return to the center of the island.\n    You return to the center of the island\n    *goto_scene 2_center\n\n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto direction\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Cave_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Cave_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Cave_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Cave_Heal\n          *else\n            *set Health + 5\n            *goto Cave_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto direction\n  *selectable_if (map = \"new\") #Look at the map.\n    You look at the map. You can see the north is no longer restricted, but still has several dangerous dinosaurs and little to no apparent reward. The North East has a castle, while the East has a lighthouse, a greenhouse and a shed. The South East is labelled as the industrial area and has a factory, a lab and a storage area. The South as a church, a swamp and a town featuring houses, a bar, a general store, an arena and a town hall. The South West is packed with nature, as it contains a river and waterfall headed into a lake, hills and mountains, while the West has a beach which also acts as a dock for ships. The North West has a shed in the middle of grasslands.\n    *goto direction\n\n*label Cave_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Cave_Heal_2\n\n*label Cave_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto direction\n\n*label office\n\n*if (secret_key = \"missing\")\n  You and ${partner_name} enter the office, and see that now there's light shining through the windows. You look around several cupboards and find nothing. However, when you're about to give up you hear ${partner_name} say \"I found something!\" You look to see ${them} holding a key with a question mark on it. You don't know what it could possibly open, but you decide to pocket it anyway just in case you happen to find the door it opens. You then leave the office.\n  *set secret_key \"found\"\n  *goto direction\n*else\n  You enter the office again and see that there's still nothing here other than the key that you found earlier. You leave once again to the beach.\n  *goto direction\n\n\n\n", "2_center": "*if (partner_found = \"false\")\n  *goto find_partner\n*else\n  *goto found_partner\n\n*label find_partner\nYou go towards the center of the island, remembering that the path branched out in all eight directions, making it a great place to look for clues when it comes to finding ${partner_name}. You remember the north used to be almost completely blocked off, but remember that according to the reports since, its no longer a place of no return. The northeast has a castle and the east has a lighthouse, greenhouse and a shed. The south-east is industrialized and the south a residence. The southwest is filled with natural hills, mountains, a lake and a waterfall. The west a beach and northwest has a shed, plane crash and grassland. Which way do you go?\n\n*image woods.jpg\n\n*fake_choice\n  #North\n  #North East\n  #East\n  #South East\n  #South\n  #South West\n  #West\n  #North West\n\nYou head off in your chosen direction only to hear a strange-sounding roar, and you feel something jump on you from behind. You easily throw the attacker off by grabbing their arms, and you take out your rifle and spin around to see your attacker on the ground, and before you even take the time to see ${their} identity, you point your rifle at ${them}.\n\n*line_break\n\n\"${name}!\" They scream. \"It's me!\"\n\nYou see that it's ${partner_name}. You withdraw your rifle. What do you say?\n*choice\n  #Don't do that next time! You know how spooked I get here!\n    ${partner_name} is laughing uncontrollably. \"Oh, ${name}, you're such a killjoy. Seriously, whenever I go do anything fun, you have to ruin it!\"\n    \"This is completely different!\" You say back while helping ${them} up as ${their} laughter is now reduced to a chuckle. \"This isn't like a night out that's more expensive than we thought, or getting lost in an unfamiliar city, there are creatures around here that want to eat us!\"\n    ${partner_name} shushes you by placing ${their} index finger over your mouth when you're done speaking before beginning to talk in a calm but demeaning voice. \"If you're so responsible, then get us out of here, hun.\" ${partner_name} playfully moves ${their} finger up so it taps the tip of your nose before pulling it back, still with a smile on ${their} face.\n    *set partner %-10\n    *goto helicopter_destruction\n  #${partner_name}! Thank god!\n    ${partner_name} is laughing uncontrollably. \"Oh, ${name}, you're so predictable, but that's one of the things I love so much about you.\" You want to respond, but don't know what to say, and ${partner_name}'s laughter calms down before continuing. \"I knew you'd come for me as quickly as you could,\" they continue as they begin to step up. \"You always do everything you can for me. My hero.\" They place ${their} arms around you and kiss you on the lips. You hug and return ${their} kiss, enjoying yourself for the first time in the last couple days before once again gaining awareness of the world around you. \"Now, complete your rescue and carry me away,\" ${partner_name} says while rubbing your shoulders.\n    *set partner %+20\n    *goto helicopter_destruction\n  #I've been worried sick over you!\n    ${partner_name} is laughing uncontrollably. \"Oh, ${name}, of course, you were, youre always so paranoid.\"\n    \"Paranoid!? Paranoid!???!\" You respond, almost insulted that you were called that in a life or death situation.\n    \"Don't you know that thing is dangerous?\" they respond, pushing you rifle away while getting up.\n    \"Well, so is everything else here,\" you snort back defensively, referring to all the dinosaurs in the area.\n    \"I guess you're prepared to bring us back to safety?\" they ask, placing ${their} hand on your face as they smile. \"Come on my little dangerous love, bring us back to safety.\"\n    *set partner %+10\n    *goto helicopter_destruction\n  #What were you thinking coming over here?!\n    ${partner_name} is laughing uncontrollably. \"Oh, ${name}, now you're wondering what I'm thinking,\" they say as they stop laughing and get up.\n    \"Wha...,\" you respond before being interrupted by a now standing ${partner_name}\n    \"But when I come home from work you couldn't care less.\" Knowing that this is a trap, you don't respond. \"No response, huh? Didn't think so. Why don't you start making up for it by getting us out of here, okay?\"\n    You feel terrible being talked to like this by the ordinarily light-hearted ${partner_name}, but figure that survival is of utmost importance now.\n    *set partner %-20\n    *goto helicopter_destruction\n  #Oh my god, I'm so sorry! I didn't know it was you!\n    ${partner_name} is laughing uncontrollably. \"Oh, ${name}, don't worry about it. I just wanted to see your reaction.\" You're stunned you knew that ${partner_name} was light-hearted, but had never pictured they'd be so full of optimism in a life or death situation. But then again, they were the one to knowingly venture onto an island full of dinosaurs, so in hindsight, you shouldn't be surprised. They continue talking. \"Besides, I'm glad that you're willing to come all the way out here to save me. Now go on and finish the job.\"\n    *set partner %+5\n    *goto helicopter_destruction \n   \n*label helicopter_destruction\n*set partner_found \"true\"\n\nCongrats on finding ${partner_name}. You have earned a stat up.\n\n*choice\n  *selectable_if (Athletics \u003c=4) #Athletics\n    *set Athletics +1\n    *goto explosion\n  *selectable_if (Tool_Usage \u003c=4) #Tool_Usage\n    *set Tool_Usage +1\n    *goto explosion\n  *selectable_if (First_Aid \u003c=4) #First_Aid\n    *set First_Aid +1\n    *goto explosion\n  *selectable_if (Stealth \u003c=4) #Stealth\n    *set Stealth +1\n    *goto explosion\n  *selectable_if (Survival \u003c=4) #Survival\n    *set Survival +1\n    *goto explosion\n\n*label explosion\n\nSuddenly, you hear an explosion from the ${landing} where you landed the helicopter. \n\n\"What was that?\" asks ${partner_name}. \n\n\"That's my helicopter!\" you reply before bolting off in the direction you came from, with ${partner_name} following you closely.\n\n*if (landing = \"castle\")\n  *goto castle_destruction\n\n*if (landing = \"beach\")\n  *goto beach_destruction\n\n*if (landing = \"city\")\n  *goto city_destruction\n\n*label castle_destruction\n\nYou get back the general area of the castle only to look up to the roof and notice a group of three pterosaurs, each of which is about 6 feet long, pecking at your chopper. You can see that they've damaged the entire thing. The engine is exposed and clearly damaged, the gas tank is leaking, the propellers have been ripped off, and the whole thing is bent out of its natural shape. ${partner_name} tries to run up and is now directly in front of you.\n\n\"Damn it!\" you yell, loud enough for one of the pterosaurs clearly hear you. It begins to fly at you and ${partner_name}, with the talons on its feet opening up. You only have a few seconds to respond and it's flying directly at ${partner_name}. what do you do?\n*choice\n  #Push ${partner_name} out of the way to protect ${them}, and fight the pterosaur myself.\n    You push ${partner_name} out of the way as they scream in terror, and the pterosaur glides by ${them}, missing ${them}.\n    *if (athletics > 3)\n      It misses ${partner_name} and follows through to your location, and you hit it with your axe, taking it out with a single blow, killing it as it screams out. The other two pterosaurs fly away, scared of you. \n      ${partner_name} gets up and gives you a huge kiss on the lips. \"Thank you so much for protecting me first!\"\n      *set partner %+25\n      *goto castle_return\n    *elseif (athletics > 2)\n      It misses ${partner_name} and follows through to your location, and you hit it with your axe, taking it out with a couple of blows, and you only get hit by a single peck. The other two pterosaurs fly away, scared of you. \n      ${partner_name} gets up and gives you a huge kiss on the lips. \"Thank you so much for protecting me first!\"\n      *set partner %+25\n      *set Health -1\n      *goto castle_return\n    *else\n      It misses ${partner_name} and follows through to your location, and you hit it with your axe, taking it out with a few blows, but it does get in a few hits against you. The other two pterosaurs fly away, scared of you. \n      ${partner_name} gets up and gives you a huge kiss on the lips. \"Thank you so much for protecting me first!\"\n      *set partner %+25\n      *set Health -2\n      *goto castle_return\n  #Use ${partner_name} as bait and blindside the pterosaur.\n    You pull out your axe as you wait for the pterosaur to pick up ${partner_name}. As it struggles to pick ${them} up, you take a single swing at the pterosaur with your weapon and take it out in a single blow. The other two pterosaurs fly away from you scared, but you get an earful from ${partner_name}.\n    \"What the hell? Are you willing to get me killed to save yourself?!\" they exclaim. They wind up as if about to hit you, but restrain themselves.\n    \"Of course not!\" you exclaim defensively. \"I knew I had enough skill with this thing to take out that monster!\" you swing your axe in the direction of the pterosaur for emphasis. \n    \"Great, so I'm the bait. Guess that's why you saved me,\" ${partner_name} replies with some sarcastic snark.\n    \"Right, I came all this way just to push you into that thing. You know, for fun,\" you reply with an equal amount of sarcasm. \n    ${partner_name} calms down slightly but is still clearly agitated. \"Sorry, I'm just in shock.\" They hug you, but you can tell that ${their} trust in you has fallen quite a lot.\n    *set partner %-15\n    *goto castle_return\n  #Grab ${partner_name} and hide in nearby bushes.\n    You grab ${partner_name} and dive into the bushes, only microseconds before the pterosaur grabs the two of you. It lands a few feet away from the bush you two hid in.\n    *if (stealth > 3)\n      You bust out your axe, and wait for the pterosaur to come closer to the bush you and ${partner_name} are hiding in. As it gets into range, you see it hasn't found you, and you hit it once in the head, smashing it easily. The other two pterosaurs fly away instantly. ${partner_name} runs out instantly to give you a big hug. \"Thanks for saving me, to,\" they say as they kiss you on the cheek.\n      *set partner %+20\n      *goto castle_return\n    *elseif (stealth > 2)\n      You bust out your axe, and wait for the pterosaur to come closer to the bush you and ${partner_name} are hiding in. As it gets into range, it seems to find you, and you and it make attacks at the same time. It bites you, and you swing your axe at its now exposed head, killing it in one shot. The other two pterosaurs fly away instantly. ${partner_name} runs out instantly to give you a big hug. \"Thanks for saving me, to,\" they say as they kiss you on the cheek.\n      *set partner %+20\n      *set health -1\n      *goto castle_return\n    *else\n      You bust out your axe, and wait for the pterosaur to come closer to the bush you and ${partner_name} are hiding in. It closes the distance quickly, and you realise you hadn't hidden as well as you thought. As it jumps at the two of you, it bites you in the arm you were holding the axe in, causing you to drop the axe. It bites you a couple more times, until ${partner_name} hits it in the back of the head, killing it. \"Wow,\" you say. \"Thanks for saving me.\"\n      \"I could only do it because you saved me first,\" they say, kissing you on the cheek before giving you back your weapon.\n      *set partner %+20\n      *set health -2\n      *goto castle_return\n  #Hide in the nearby bushes and expose ${partner_name} so I get a clear shot at the pterosaurs.\n    You jump into the bushes just as the pterosaur grabs onto %{partner_name}. They scream in terror and struggle, flailing around ${their} arms and legs, barely managing to stay on the ground. You bust out your axe, and knock the pterosaur in the head, killing it in a single blow. The other two pterosaurs fly away instantly.\n    \"You used me as bait!!!\" ${partner_name} exclaims at you angrily.\n    \"I was hoping it would chase after me,\" you reply regardless of whether or not it's true. \n    \"No, you weren't,\" they reply, not believing you. This argument continues, but after a couple of minutes of this, the two of you start to notice the danger of your current situation. You can tell by ${partner_name}'s tone that they're still mad, but they don't let it interfere with your survival.\n    *set partner %-15\n    *goto castle_return\n  *selectable_if (ammo > 0) #Shoot the pterosaur with your rifle, using 1 ammo.\n    In a swift motion, you grab your rifle and pull the trigger, hitting the pterosaur a single moment before it would have grabbed ${partner_name}. The creature's momentum carries it beyond the two of you, and ${partner_name} looks back toward you, as you continue to hold the rifle. The two other pterosaurs fly away, as you put the rifle away and embrace ${partner_name}. \"So you are good with that thing,\" they say in an almost suggestive tone before returning your embrace.\n    *set partner %+10\n    *set ammo -1\n    *goto castle_return\n\n*label castle_return\n\n*if (health \u003c 1)\n  However, moments later you fall from your injuries. \"${name}!!\" ${partner_name} exclaims. \"Are you okay?!\" You shake your head and try to muster out a 'no,' but are unable to do so, or get up. It starts to go black, you die in ${partner_name}'s arms, as they attempt to perform last second CPR on you, which doesn't work.\n  *goto_scene death \n\nLeft needing a second to breathe, you and ${partner_name} look at the helicopter, which is still lying on the roof. Despite the fact that the pterosaurs have stopped attacking it and have left, it's damaged beyond repair, leading to your reaction \"Damn, Bruce is going to kill me when I tell him the work chopper is destroyed!\" You then look to ${partner_name} and say \"but we'll cross that bridge when we get to it. At least we can still get off, using whatever method you used to get yourself here.\"\n\n*label partner_breakdown\n\nTheir face turns red and a tear drips down ${their} eye as they sheepishly respond \"uh, actually...\" and then they audibly gulp before continuing. \"The boat that I built to get here was destroyed after it crashed into the island. I was hoping we'd get off with whatever you used to come here. But, I can see that isn't an option. I'm so sorry.\" They are looking down at the ground in shame now, and by the time they finished what they said, ${their} voice had become so weak and quiet and ${their} head is buried in ${their} hands. \"And my phone was eaten by one of the larger dinosaurs,\" they say, now on the verge of crying. How do you respond?\n\n*choice\n  #Can the boat be fixed?\n    \"No,\" they say. \"It's broken into a million little pieces. Unless we build a new boat, we're going to be stuck here forever.\" What do you say?\n    *choice\n      #Wait, you've gotten good enough at construction to build entire boats by yourself?\n        ${partner_name} raises ${their} head from ${their} hands, wiping away tears, with a slight smile. \"Well, it was more of a raft with an engine, but yeah, I can do it.\"\n        \"That's great!\" you respond as ${their} face lights up. Then you get an idea, and after a couple of seconds of deliberating you say it out loud, \"Can you maybe do it again?\" \n        The slight smile has now turned into a full smile as they nod. \"Yeah, I just need the right parts. A body, steering device, engine, a rudder and some gas.\"\n        \"This sounds like the kind of stuff that could be found on the island. Come on, your turn to save me,\" you respond. ${partner_name} gets up now more enthusiastic about getting off the island. You're not sure if this stuff is on the island, but it's great that ${partner_name} is now helping you.\n        *set partner %+25\n        *goto castle_start\n      #Great, just great! (sarcasm)\n        \"Listen, I know I messed up, but you don't have to shove it in my face, okay!? I feel bad enough that I'm stuck here, but the fact that I'm stuck here with YOU is making things worse!\" This response by ${partner_name} doesn't sit well with you, but you realise you are acting like a bad partner.\n        \"I'm sorry,\" you begin. \"I'm just...frusturated. It's not your fault, just...let...I'm sure there's some way off. Let's go find one.\"\n        \"Okay,\" they respond softly. You see that your apology stopped ${them} from breaking down further, but it's clear that damage was done.\n        *set partner %-15\n        *goto castle_start\n  #Do you know any other way to get off the island?\n    \"No,\" they say. \"That was the only way I had.\"\n    \"Well...\" you start, straining to think of the right thing to say. \"The other time I was here, I had to look for my own way off, using parts I found, and I made it. I'm sure that if we work together, we can do that twice as fast.\" You're aware that's not how it works, but you're looking for anything that could get ${partner_name} going.\n    \"Well, I don't think that's how that works,\" they say. You're worried that your idea didn't work, but then they finish with, \"but I guess its worth a chance to find something. Let's get going.\" They get going, almost taking a leadership role. You think to yourself about how it must have worked and then follow ${their} lead.\n    *set partner %+10\n    *goto castle_start\n  #Its okay, I found a way off before. I'm sure together we can think of something.\n    ${partner_name} hugs you enthusiastically. \"You're right,\" they say. \"Maybe we can find a way.\" They walk away, and you follow. \n    *set partner %+10\n    *goto castle_start\n  #YOU DID WHAT!?!?\n    ${partner_name} begins to cry. \"Listen, you probably don't think I can do anything right at this point. You can think that all you want, but I'm going to get off this island, okay?! Now, if you don't think I'm good enough to be with, you can walk right off in the other direction.\" They get up and walk away, and you follow, knowing you should have been a little softer on ${them}.\n    *set partner %-10\n    *goto castle_start\n  #What dinosaur ate the phone?\n    ${partner_name} responds weakly and begins to describe the creature.\n    *if (Survival = 1)\n      You don't know enough about dinosaurs and nature to determine which one they are describing.\n    *if (Survival = 2)\n      Your limited knowledge of dinosaurs and nature means you're able to determine they're talking about one of the predators.\n    *if (Survival = 3)\n      You know enough about dinosaurs and nature to recognize they're referring to a large theropod.\n    *if (Survival = 4)\n      You know enough about dinosaurs and nature to recognize they're referring to a large theropod, but its not T-Rex.\n    *if (Survival = 5)\n      You know enough about dinosaurs and nature to recognize they're referring to a large theropod known as Allosaurus.\n    \"Come on\", you say. \"Maybe we can find it, though. I bet I can take it out with this thing,\" you continue as you point to your rifle.\n    \"Really?\" they respond unenthused, but they get up and start leading you somewhere, meaning that you at least gave ${them} some hope.\n    *set Allo \"true\"\n    *set partner %+10\n    *goto castle_start\n\n\n*label castle_start\n\n*if (landing = \"castle\")\n  *set North_East \"done\"\n  *goto castle_final\n\n*if (landing = \"beach\")\n  *set West \"done\"\n  *goto beach_final\n\n*if (landing = \"city\")\n  *set South \"done\"\n  *goto city_final\n\n*label castle_final\n\n${partner_name} leads you towards the castle. \"Okay, smarty-pants. Where are we going?\"\n*choice\n  #The center of the island\n    *goto found_partner\n  #The inside of the castle\n    *goto_scene 2_NE \n\n*label beach_final\n\n${partner_name} leads you towards the now empty beach. \"Okay, you badass. Where are we going?\"\n*choice\n  #The center of the island\n    *goto found_partner\n  #We explore the beach\n    *goto_scene 2_W\n\n*label city_final\n\n${partner_name} leads you towards the store. \"Okay, teammate. Where are we going?\"\n*choice\n  #The center of the island\n    *goto found_partner\n  #The rest of the city\n    *goto_scene 2_S\n\n*label beach_destruction\n*set quicksand \"done\"\nYou return to the beach, running around the quicksand only to see that your helicopter is now being destroyed by a carnivore that's almost 50 feet long with a massive sail on its back which you recognize as Spinosaurus. Despite your shock, you don't scream. ${partner_name} screams, and you turn to ${them}, seeing the Spinosaurus wasn't the only thing that caused ${them} to scream: ${partner_name} is also trapped in the quicksand and are already shin deep. However, you hear a roar coming from the spinosaurus, as it begins to charge at you, having heard ${partner_name}'s scream. Having to choose between saving ${partner_name} and dodging the spinosaurus, what do you do?\n*choice\n  #Throw my grappling hook at ${partner_name} to pull ${them} out of the quicksand.\n    You throw your grappling hook at ${them} and they grab it almost instantly. You maintain your composure in pulling ${them} out, despite the charging dinosaur. When you've finished pulling ${partner_name} out, the two of you run back towards the forest in an attempt to lose the Spinosaurus. You look back to notice its poor running form slowing it down, and soon after reaching the forest, it gives up and goes back to the beach, leaving you and ${partner_name} alone.\n    \"That was close,\" ${partner_name} says to you while panting. \"Thanks for saving me first.\"\n    \"You're welcome,\" you say as the two of you embrace quickly before getting on to the real meat of the issue.\n    *set partner %+20\n    *goto beach_return\n  #Run behind the quicksand, hoping the spinosaurus gets stuck in it.\n    You run around the quicksand so that is now in between you and the Spinosaurus, who doesn't seem to notice it. It charges, and gets stuck quickly, and flails around, taking swipes at ${partner_name} with its arms, but the distance between the two of them is just a foot or two too much. However, ${partner_name} is still falling into the quicksand and is now knee-deep, screaming even more frantically due to there being a giant carnivorous lizard mere feet away from being able to eat ${them}. You scream ${their} name to get ${their} attention and throw your grappling hook at ${them}. They catch it perfectly as if this had been something practised a thousand times. You slowly pull ${them} out, take a while as they're now in deep enough for you to take a while to do this. They begin to calm down as you raise ${them} out slowly, and after a minute you've completely pulled ${them} out.\n    \"Thanks,\" they say, now more calm than before. \"But did you really have to let that thing get so close to me?\" You look back to see the Spinosaurus now a few feet into the quicksand and slowly sinking. Its awkward attempts to move on land, especially while stuck serve a much-needed form of comedy, causing you both to chuckle for a second.\n    \"I wasn't thinking straight,\" you respond with a tone still light-hearted enough to come off the previous chuckle, but serious enough that ${partner_name} knows you're being serious. \"Now come on,\" let's get out of here. You two stay in the woods for several minutes, noticing the Spinosaurus eventually free itself before heading back into the ocean.\n    *set partner %+10\n    *goto beach_return\n  #Run away, saving yourself\n    You book it in the other direction. You hear ${partner_name} call out \"{name}!\" but choose not to respond. You see the Spinosaurus start to chase you, but gives up surprisingly quickly after less than a minute of chasing you. It returns to the water, and you sigh in relief until once again hearing ${partner_name} scream, and you run over to save ${them}. When you finally make it back to the beach, you see that ${partner_name} is now waist-deep in quicksand, so you throw the grappling hook over to ${them} and they grab it in a way that makes it look practised. You pull ${them} out, with it taking over a minute due to how deep they are. \n    After they're out, they seem quite upset with you. \"Really? Running? Leaving me there? I could have gotten eaten!\"\n    \"I know, I...\" you bow your head, knowing that there's really nothing you can say to counter-act this. You've dug yourself a hole, now how are you going to get out of it?\n    *set partner %-30\n    *goto beach_return\n  *selectable_if (ammo > 0) #Shoot the Spinosaurus with your rifle, using ammo.\n    You have plenty of time to line up a shot, but get nervous as the creature approaches. You think you're doing a good job of hiding your internal panic, but have no way of knowing for sure. Either way, you line up your shot and pull the trigger, hitting the creature directly in the neck, taking it out in a single shot. You then quickly turn to face ${partner_name} and throw a grappling hook in ${their} direction. Now up to ${their} knees in quicksand, ${partner_name} grabs the hook in a way that looks practised. You pull ${them} out quickly.\n    \"That was pretty sexy, you little badass,\" they say after you pull ${them} out. \"Now, time to figure out how to get out of here.\n    *set partner %+10\n    *set ammo -1\n    *goto beach_return\n  #Run towards the Spinosaurus. You have a crazy-sounding idea that just might work.\n    You pull out your grappling hook and charge towards the Spinosaurus. It turns to you, standing there as if ready to face you. It begins to reach for you as you get close but then you throw your grappling hook as precisely as you can. The hook winds it way around the creature's back leg,  and continues its momentum to the side, curving around the front one, and then completing the circle around its legs by having the hook land right on the rope. Perfect! \n    Now, with the grappling hook completely around the creature's feet, you pull, tightening it. The Spinosaurus takes a step forward, and trips. You take out your axe, taking shots at both its eyes, blinding it, before unhooking the grappling hook and using it to free ${partner_name} from the quicksand. They are now almost waist-deep, so it takes a while, but you're able to successfully do it.\n    With the Spinosaurus lying there, unable to see, you and {partner_name} are now free from danger. \"How did you do that?!\" they ask excitedly.\n    \"I don't know,\" you try to respond, but are interrupted by ${them} jumping into your open arms, smothering you with kisses. After about a minute of this, they get off you and begin to wander back to the beach.\n    *set partner %+20\n    *goto beach_return\n    \n\n*label beach_return\n\nLeft needing a second to breathe, you and ${partner_name} look at the helicopter, which is still lying on the shore. Despite the fact that the Spinosaurus is no longer ripping it apart, it's damaged beyond repair, leading to your reaction \"Damn, Bruce is going to kill me when I tell him the work chopper is destroyed!\" You then look to ${partner_name} and say \"but we'll cross that bridge when we get to it. At least we can still get off using whatever you used to get here.\"\n\n*goto partner_breakdown\n\n*label city_destruction\n \nYou return to the city, running to the store on which you landed. You look up to see your helicopter being destroyed by three deinonychuses, creatures that look like raptors but are larger, over 10 feet long. At first, you're unsure of how they go there, but then see a forth one climbing the store, using the curved claws on its feet to hold itself in place. As it continues to climb up, you see it turn to you and ${partner_name}. It makes a low growl and then charges at the two of you after a few seconds. The other deinonychuses seem as if they're still destroying the helicopter. What do you do?\n*choice\n  #Take out my axe and fight it one-on-one.\n    *if (athletics > 3)\n      As the dinosaur continues to run at you, you pull your axe out, ready to swing. The dino leaps at you head first, and as its mid-air, you take a massive swing and bash its skull in with a single blow, as your axe makes a loud \"thud\" sound on impact. The dinosaur falls to the ground, with a massive gash in its head, clearly dead from the impact you created. The others, still near the helicopter, look back to you, turning ${their} heads, and then begin to jump off the roof away from your direction. \n      ${partner_name} calmly pats you on the back. \"Good job,\" they say. \"Is that the kind of thing you did last time here?\"\n      \"Yup,\" you say, hiding the fact that you had never taken out anything that big.\n      *set partner %+15\n      *goto city_return\n    *elseif (athletics > 2)        \n      As the dinosaur continues to run at you, you pull your axe out, ready to swing. The dino leaps at you head first, and as its mid-air, you swing at it knocking it on the head. Its momentum carries it forward as despite it being clearly wounded, it bites your weaker arm. You then swing, holding the axe exclusively in your dominant hand, bashing it in the same place you landed the first blow. This clearly finishes it off and you attend to your arm. It's bleeding, but not nearly as bad as you thought it would be. Your initial swing must have weakened the creature's bite somehow.\n      \"Are you okay?\" ${partner_name} aks.\n      \"I think so,\" you respond, after putting your axe back and holding your wound.\n      *set partner %+15\n      *set Health -2\n      *goto city_return\n    *else\n      As the dinosaur continues to run at you, you pull your axe out, ready to swing. The dino leaps at you head first, and as its mid-air, you swing at. The attack only glances it, as it bites you in your weaker arm. You swing at it, now holding you axe only in your dominant arm, and repeatedly hit it. ${partner_name} jump out, holding a stick they found and joins in hitting the beast in a desperate attempt to damage it. Together, you two eventually finish it off. You look to see blood coming out of where you were bitten. It's bad, but not nearly as bad as it could have been.\n      \"Are you okay?\" ${partner_name} aks.\n      \"I think so,\" you respond, after putting your axe back and holding your wound.\n      *set partner %+15\n      *set Health -4\n      *goto city_return\n  #Run away with ${partner_name}.\n    You turn and run, with ${partner_name} following you closely. The creature stays in hot pursuit of you two, and it begins to close in on you. After about a minute of chasing, it jumps on you, and you scream out in terror. It opens its mouth, ready to bite you, and ${partner_name} turns around, sees what's going on, and kicks the creature in the jaw, knocking it back and off of you. You then grab your axe, and in a quick motion, jam it directly into the animal's neck. You aren't able to cut its head off but are able to kill it.\n    \"Thanks,\" you say to ${partner_name}. \"Thanks for coming back for me.\"\n    \"No need to thank me. You came here to save me,\" they respond. You smile acknowledging the truth in what they said and begin to head back to the helicopter, which is now left alone.\n    *set partner %+15\n    *set Health -3\n    *goto city_return\n  #Jump into a nearby bush with ${partner_name}.\n    You jump into a bush with ${partner_name} following you. The deinonychus continues to run at your new location, and you're pretty sure it saw you. You take out your axe, while ${partner_name} grabs a large stick. When the deinonychus jumps into the bushes to attack you two, ${partner_name} attacks hit it in the torso simultaneously. It's knocked back, and you follow up with a blow to the head, smashing it down and killing it. ${partner_name} then comes out of the bushes and hits the dinosaur a few times to ensure its dead, before giving you a high five. You see that the other dinosaurs are retreating from the helicopter.\n    \"We got it,\" ${partner_name} says excited about having helped you take out a dinosaur.\n    *set partner %+10\n    *goto city_return\n  *selectable_if (ammo > 0) #Shoot it with my rifle, using ammo.\n    You take a moment to line up your shot and when you pull the trigger, the bullet goes directly into the creature's skull, killing it instantly. You place the rifle back on your back confidently. The loud 'bang' of the shot alerts the other deinonychuses, who glance over and immediately retreat. ${partner_name} gives you a big hug and thanks you for making the situation safe.\n    *set partner %+5\n    *set ammo -1\n    *goto city_return\n\n*label city_return\n\nLeft needing a second to breathe, you and ${partner_name} look at the helicopter, which is still lying on the roof of the store. Despite the fact that it's no longer being ripped apart and the dinosaurs are gone, it's damaged beyond repair. You react \"Damn, Bruce is going to kill me when I tell him the work chopper is destroyed!\" You then look to ${partner_name} and say \"but we'll cross that bridge when we get to it. At least we can still get off, however, you got here.\"\n\n*goto partner_breakdown\n\n*label found_partner\n\nYou and ${partner_name} return to the center of the island. The two of you look around, deciding where to go.\n\n*choice\n  #North\n    *goto_scene 2_N\n  #North East\n    *goto_scene 2_NE\n  #East\n    *goto_scene 2_E\n  #South East\n    *goto_scene 2_SE\n  #South\n    *goto_scene 2_S\n  #South West\n    *goto_scene 2_SW\n  #West\n    *goto_scene 2_W\n  #North West\n    *goto_scene 2_NW\n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto found_partner\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Cave_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Cave_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Cave_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Cave_Heal\n          *else\n            *set Health + 5\n            *goto Cave_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto found_partner\n  *selectable_if (map = \"new\") #Look at the map.\n    You look at the map. You can see the north is no longer restricted, but still has several dangerous dinosaurs and little to no apparent reward. The North East has a castle, while the East has a lighthouse, a greenhouse and a shed. The South East is labelled as the industrial area and has a factory, a lab and a storage area. The South as a church, a swamp and a town featuring houses, a bar, a general store, an arena and a town hall. The South West is packed with nature, as it contains a river and waterfall headed into a lake, hills and mountains, while the West has a beach which also acts as a dock for ships. The North West has a shed in the middle of grasslands.\n    *goto found_partner\n\n*label Cave_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Cave_Heal_2\n\n*label Cave_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto found_partner", "2_trip": "*temp drinks 0\n\n*temp passout 0\n\nPart 2\n\nThat's right. Do you remember your loving partner ${partner_name}? Two years after your adventure you get a message on your phone from ${them}.\n\n\"Hello ${name}, honey. You remember that exciting time you had on this island filled with dinosaurs?\"\n\nYou wouldn't really call it 'exciting', and you hardly remember it. I'm kidding, you obviously remember it, you saw plenty of dinosaurs and almost died. As you think to yourself, the message continues.\n\n\"Well, I decided that it would be an experience for us to share. I figured out which one it is, despite your efforts to stop me, and I'm on my way there now. Meet you when you find me. Love you.\" They make kissy sounds and then hang up. You frantically attempt to call ${partner_name} to talk ${them} out of it, but they don't pick up.\n\nYou have no time for games, and this time, you're going in prepared. You don't want to go in at all, but there's no other way to save ${partner_name}. You grab a rifle with 6 ammo, a large axe, two medkits, a grappling hook, a new map of the island, a pair of binoculars, a flashlight, all the keys that you found the first time, and enough food to last both of you for a week.\n\n*set medkits 2\n*set Return \"Yes\"\n*set map \"new\"\n*image helicopter.jpg\nYou head out to the island on your helicopter to rescue ${partner_name}. How do you feel about returning to the island?\n*choice\n  #I'm furious. I told ${them} not to go.\n    Of course, you are. Dinosaurs are very dangerous.\n    *set partner %-10\n    *goto landing\n  #Awesome. It's something new to try together. \n    Not what most people would think, but sure.\n    *set partner %+10\n    *goto landing\n\n*label landing\n\nSo its time to land the chopper. You remember three parts of the island that would be viable places to land. You rule out your original landing spot, as its far from where ${partner_name} would be. Which do you use?\n*choice\n  #The roof of the castle. It'll be safe, and I can use my grappling hook to get down.\n    *set landing \"castle\"\n    *goto castle_roof_landing\n  #The beach on the west. It's isolated and safe as long as I avoid the quicksand.\n    *set landing \"beach\"\n    *goto  beach_landing\n  #The city in the south. \n    *set landing \"city\"\n    *goto city_landing\n\n*label castle_roof_landing\n\nYou land on the roof of the castle and look around to see what's happened since your last trip here. This part of the island doesn't seem very different, as you can still hear the loud roars of dinosaurs in the distance. However, you're high up enough to be safe from them, at least for now. You grab all your supplies from the helicopter, holding your rifle extra tight. \n\n*label roof\n\nHow do you proceed?\n*choice\n  #Take a few minutes to look around and become familiar with my surroundings while I'm still safe.\n    You grab your binoculars and look in all directions. The forest is too obscured by the trees for you to see into it, but you see no immediate threats to your safety.\n    *goto roof\n  #Yell for ${partner_name} and see if they come running for me.\n    After yelling a few times, you hear no response. You decide to stop given the danger of drawing attention to yourself.\n    *goto roof\n  #No time to lose. I use the grappling hook to go down to search for ${partner_name}\n    You go down to the bottom via your grappling hook in a move that would look completely badass had anybody seen it.\n    *goto castle_bottom\n\n*label castle_bottom\n\n*if (North_East = \"Unexplored\")\n  *goto castle_unexplored\n*else\n  *goto castle_explored\n\n*label castle_unexplored\n\nYou finally see the castle that you have only ever seen from a distance, which has given you nightmares, for the most part, wondering what could be in there. You quickly recognize due to the windows that it's 3 stories tall. You also remember that the team who went to the island after you came back took some kind of treasure inside. You kick yourself for missing it, but also know that there's no way you could have predicted this outcome. You're curious about what's in there, maybe ${partner_name} is inside. However, there's also the chance that they're somewhere outside, and would need rescuing.\n\n*choice\n  #I go inside.\n    *goto castle_door\n  #I go to the center of the island.\n    *goto_scene 2_center\n\n*label castle_explored\n\nFrom the bottom, the castle looks the same as it did before implying that the dinosaurs either aren't strong enough to damage it or just don't care about it. You also know that the treasure is gone, but that's not your current objective, finding ${partner_name} is. Are they in the castle? Or elsewhere on the island?\n\n*label castle_door\n\n*if (North_East = \"Unlocked\")\n  *goto first_floor\n\nThe castle is locked. Why? People went into the castle, and then LOCKED it? Or, maybe ${partner_name} is inside and locked it. But with what key? What is going on?\n\n*choice\n  *selectable_if (shed_key = \"found\") #Try the key labeled \"NW shed\". Maybe that's what unlocks it.\n    You are unable to unlock the castle. Maybe another key will do the trick.    \n    *goto castle_door\n  *selectable_if (shed_key_2 = \"found\") #Try the key labeled \"E shed\". Maybe that's what unlocks it.\n    You are unable to unlock the castle. Maybe another key will do the trick.\n    *goto castle_door\n  *selectable_if (castle_key = \"found\") #Try the key labeled \"Cast\". Maybe that's what unlocks it.\n    You can unlock the castle. As you walk inside, you notice that there are five doors within the castle. You can't tell if any of them are unlocked.\n    *set North_East \"Unlocked\"\n    *goto first_floor\n  *selectable_if (lighthouse_key = \"found\") #Try the key labeled \"Light\". Maybe that's what unlocks it.\n    You are unable to unlock the castle.  Maybe another key will do the trick.\n    *goto castle_door\n  *selectable_if (Second_floor_key = \"found\") #Try the key labeled \"2\". Maybe that's what unlocks it.\n    You are unable to unlock the castle. Maybe another key will do the trick.\n    *goto castle_door\n  *selectable_if (Third_floor_key = \"found\") #Try the key labeled \"3\". Maybe that's what unlocks it.\n    You are unable to unlock the castle. Maybe another key will do the trick.\n    *goto castle_door\n  *selectable_if (Green_house_key = \"found\") #Try the key labelled \"green\". Maybe that's what unlocks it.\n    You are unable to unlock the castle. Maybe another key will do the trick.\n    *goto castle_door\n  *selectable_if (church_key = \"found\") #Try the key labelled \"ch\". Maybe that's what unlocks it.\n    You are unable to unlock the castle. Maybe another key will do the trick.   \n    *goto castle_door\n  *selectable_if (secret_key = \"found\") #Try the key labelled \"?\". Maybe that's what unlocks it.\n    You are unable to unlock the door. Maybe another key will do the trick.   \n    *goto castle_door\n  #Go to the center of the island.\n    You return to the center of the island.\n    *goto_scene 2_center\n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto castle_door\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Cave_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Cave_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Cave_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Cave_Heal\n          *else\n            *set Health + 5\n            *goto Cave_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto castle_door\n\n*label Cave_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Cave_Heal_2\n\n*label Cave_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto castle_door\n\n*label first_floor\n\n\nYou walk in and see five doors. Which one do you open?\n\n*choice\n  #The first room.\n    You see that there's nothing in the first room except for what appears to be a bedroom with nobody in it. You begin to fantasize about if ${partner_name} were here. Would you two do anything?\n    *goto first_floor\n  #The second room.\n    Ahhh, yes the room that the treasure was in. You notice that there is nothing of note left, sadly. The basic copper coins aren't even worth getting and carrying, let alone having any real value to you.\n    *goto first_floor\n  #The third room.\n    You see a bathroom. You can go if you want.\n    *goto first_floor\n  #The fourth room.\n    Nothing is in this room, sadly.\n    *goto first_floor\n  #The fifth room. \n    *label fifth_room\n    *if second_floor = \"locked\"\n      The door appears to be locked.\n      *choice\n        *selectable_if (shed_key = \"found\") #Try the key labeled \"NW shed\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto fifth_room\n        *selectable_if (shed_key_2 = \"found\") #Try the key labeled \"E shed\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.\n          *goto fifth_room\n        *selectable_if (castle_key = \"found\") #Try the key labeled \"Cast\". Maybe that's what unlocks it.\n          You can unlock the door. Maybe another key will do the trick.\n          *goto fifth_room\n        *selectable_if (lighthouse_key = \"found\") #Try the key labeled \"Light\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.\n          *goto fifth_room\n        *selectable_if (Second_floor_key = \"found\") #Try the key labeled \"2\". Maybe that's what unlocks it.\n          You can unlock the door. You head up the staircase.\n          *set second_floor \"unlocked\"\n          *goto second_floor\n        *selectable_if (Third_floor_key = \"found\") #Try the key labeled \"3\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.\n          *goto fifth_room\n        *selectable_if (Green_house_key = \"found\") #Try the key labelled \"green\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.\n          *goto fifth_room\n        *selectable_if (church_key = \"found\") #Try the key labelled \"ch\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.   \n          *goto fifth_room\n        *selectable_if (secret_key = \"found\") #Try the key labelled \"?\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.   \n          *goto fifth_room\n        #Go back to the first floor\n          You return to the first floor\n          *goto first_floor\n        #Go back to the center of the island.\n          You return to the center of the island.\n          *goto_scene 2_center\n    *else\n      You head up the staircase.\n      *set second_floor \"unlocked\"\n      *goto second_floor\n  #The middle of the island\n    You return to the center of the island\n    *goto_scene 2_center\n\n\n*label second_floor\n\nYou arrive on the second floor, and as you do so, you see that there are 4 doors. As you look at the four doors, which one do you open?\n\n*choice\n  #The first door\n    You look around for a while, and despite the size of the room, you find absolutely nothing.\n    *goto second_floor\n  #The second door\n      The door appears to be locked.\n      *choice\n        *selectable_if (shed_key = \"found\") #Try the key labeled \"NW shed\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto second_floor\n        *selectable_if (shed_key_2 = \"found\") #Try the key labeled \"E shed\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto second_floor\n        *selectable_if (castle_key = \"found\") #Try the key labeled \"Cast\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto second_floor\n        *selectable_if (lighthouse_key = \"found\") #Try the key labeled \"Light\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto second_floor\n        *selectable_if (Second_floor_key = \"found\") #Try the key labeled \"2\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto second_floor\n        *selectable_if (Third_floor_key = \"found\") #Try the key labeled \"3\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto second_floor\n        *selectable_if (Green_house_key = \"found\") #Try the key labelled \"green\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto second_floor\n        *selectable_if (church_key = \"found\") #Try the key labelled \"ch\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.   \n          *goto second_floor\n        *selectable_if (secret_key = \"found\") #Try the key labelled \"?\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.   \n          *goto second_floor\n        #Go back to the first floor\n          You return to the first floor\n          *goto first_floor\n        #Go back to the center of the island.\n          You return to the center of the island.\n          *goto_scene 2_center\n  #The third door\n    The third room contains nothing at all. Nothing at all. Nothing at all.\n    *goto second_floor\n  #The fourth door\n    *if third_floor = \"Unexplored\"\n      The door appears to be locked.\n      *choice\n        *selectable_if (shed_key = \"found\") #Try the key labeled \"NW shed\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto second_floor\n        *selectable_if (shed_key_2 = \"found\") #Try the key labeled \"E shed\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto second_floor\n        *selectable_if (castle_key = \"found\") #Try the key labeled \"Cast\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto second_floor\n        *selectable_if (lighthouse_key = \"found\") #Try the key labeled \"Light\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto second_floor\n        *selectable_if (Second_floor_key = \"found\") #Try the key labeled \"2\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto second_floor\n        *selectable_if (Third_floor_key = \"found\") #Try the key labeled \"3\". Maybe that's what unlocks it.\n          You are able to unlock the door. You head up another stairway. \n          *set third_floor \"unlocked\"   \n          *goto second_floor\n        *selectable_if (Green_house_key = \"found\") #Try the key labelled \"green\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto second_floor\n        *selectable_if (church_key = \"found\") #Try the key labelled \"ch\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.   \n          *goto second_floor\n        *selectable_if (secret_key = \"found\") #Try the key labelled \"?\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.   \n          *goto second_floor\n        #Go back to the first floor\n          You return to the first floor\n          *goto first_floor\n        #Go back to the center of the island.\n          You return to the center of the island.\n          *goto_scene 2_center\n    *else\n      You head up another stairway.\n      *goto floor_3 \n  #Return to the first floor.\n    You return to the first floor.\n    *goto first_floor\n\n*label floor_3\n\nYou arrive on the third floor only to see three doors.\n\nWhich door do you open?\n\n*choice \n  #The first door\n    The door appears to be locked.\n    *choice\n      *selectable_if (shed_key = \"found\") #Try the key labeled \"NW shed\". Maybe that's what unlocks it.\n        You are unable to unlock the door. Maybe another key will do the trick.    \n        *goto floor_3\n      *selectable_if (shed_key_2 = \"found\") #Try the key labeled \"E shed\". Maybe that's what unlocks it.\n        You are unable to unlock the door. Maybe another key will do the trick.    \n        *goto floor_3\n      *selectable_if (castle_key = \"found\") #Try the key labeled \"Cast\". Maybe that's what unlocks it.\n        You are unable to unlock the door. Maybe another key will do the trick.    \n        *goto floor_3\n      *selectable_if (lighthouse_key = \"found\") #Try the key labeled \"Light\". Maybe that's what unlocks it.\n        You are unable to unlock the door. Maybe another key will do the trick.    \n        *goto floor_3\n      *selectable_if (Second_floor_key = \"found\") #Try the key labeled \"2\". Maybe that's what unlocks it.\n        You are unable to unlock the door. Maybe another key will do the trick.    \n        *goto floor_3\n      *selectable_if (Third_floor_key = \"found\") #Try the key labeled \"3\". Maybe that's what unlocks it.\n        You are unable to unlock the door. Maybe another key will do the trick.   \n        *goto floor_3\n      *selectable_if (Green_house_key = \"found\") #Try the key labelled \"green\". Maybe that's what unlocks it.\n        You are unable to unlock the door. Maybe another key will do the trick.   \n        *goto floor_3\n      *selectable_if (church_key = \"found\") #Try the key labelled \"ch\". Maybe that's what unlocks it.\n        You are unable to unlock the door. Maybe another key will do the trick.   \n        *goto floor_3\n      *selectable_if (secret_key = \"found\") #Try the key labelled \"?\". Maybe that's what unlocks it.\n        *if (barrel = \"missing\")\n          You find the barrel of what appears to be a flare gun. You decide to pocket it, knowing that it could be used to repair the whole thing.\n          *set barrel \"found\"  \n          *if (trigger = \"missing\")\n            You still need to find the trigger\n            *goto flare\n          *else\n            You've also found the trigger\n            *goto flare\n          *label flare\n          *if (flare = \"missing\")\n            You still need to find the flares\n            *goto floor_3\n          *else\n            You're also found the flares\n            *goto floor_3\n        *else\n          Nothing left in here.\n          *goto floor_3\n      #Go back to the second floor\n        You return to the second floor\n        *goto second_floor\n  #The second door\n    *if (shed_key_2 = \"missing\")\n      You find a key labelled \"E shed\". You decide to grab and pocket it.\n      *set shed_key_2 \"found\" \n      *goto floor_3\n    *else\n      You find nothing else in this room.\n      *goto floor_3\n  #The third door\n    *if (church_key = \"missing\")\n      You find a key labelled \"Ch\". You decide to grab it and pocket it.\n      *set church_key \"found\"\n      *goto floor_3\n    *else\n      You find nothing else in this room. \n      *goto floor_3\n  #Back to the second floor\n    You return to the second floor\n    *goto second_floor\n\n*label beach_landing\n\nAs you land the helicopter on the beach, you take great care to avoid the area with the quicksand. You recognize the slightly darker colouration of the quicksand that would have swallowed your helicopter whole. You land on the dock normally reserved for ships, and step out of the chopper, ready to look for ${partner_name}. You can either look in the office nearby or go to the center of the island.\n\n*label beach_direction\n*choice\n  #Go to the center of the island\n    You go to the center of the island.\n    *goto_scene 2_center\n  #Go inside the office\n    You head inside the office.\n    *goto inside_office\n\n*label inside_office\n*if (secret_key = \"missing\")\n  *goto find_keys\n*else\n  *goto empty_office\n\n*label find_keys\n\nYou look inside the office for any hints that could help you, knowing that little 'hints' were often hidden in several areas. You look at the desk and see there is a key marked with a \"?\". You have no idea what this key could even be for, but knowing your last visit to the island was dominated by finding and using these strange keys, you decide to pocket it.\n*set secret_key \"found\"\n*goto beach_direction\n\n*label empty_office\nYou return to the office where you found the key with a \"?\" symbol on it, and look around again, thinking that perhaps you've missed something. However, after a few minutes of searching drawers and desks, you don't find anything of note. You shrug and think that maybe you've stripped this office of anything and everything useful.\n*goto beach_direction\n\n*label city_landing\n\nYou land on the roof of the store, finding it to be flatter than either the arena, townhall, the bar, or any of the houses. You look around to find that although you can't see anything useful right away, there are a few places you can look for stuff that can help you. \n*label city_branch\nWhere do you go?\n*choice\n  #I go to the center of the island\n    You head to the center of the island.\n    *goto_scene 2_center\n  #I go to the store\n    You head to the store.\n    *goto store\n  #I go to the arena\n    You go to the arena.\n    *goto arena\n  #I go to the bar\n    You go to the bar.\n    *goto bar\n\n*label store\n*if (batteries = \"found\")\n  *goto batteries_found\n*else\n  *goto find_batteries\n\n*label find_batteries\n\nYou look around the store, and after several minutes of finding nothing but expired food, useless supplies and home entertainment that you don't have the time for, you stumble upon what appears to be spare batteries for a phone. It's not much, but it's still the only thing in the entire store that comes even close to being useful, so you decide to take it on the off chance that you ever need it. It would fit the type of phone that ${partner_name} uses, so its possible that this could be needed to escape the island.\n*set batteries \"found\"\n*goto city_branch\n\n*label batteries_found\n\nYou look around the store, noting that you've found the batteries already. After a few minutes of searching, you come to realize that there's really nothing else worth your while in here, so you give up and decide to spend your time on more constructive activities.\n*goto city_branch\n\n*label arena  \n\n*if (flare = \"found\")\n  *goto flare_found\n*else\n  *goto find_flare\n\n*label find_flare\n\nYou look around the arena, and it's about as littered with junk as you'd expect to see it a couple of hours after a large game. Actually, it's worse because all the discarded food and beverages have been out for years. However, one thing useful that you do find it what appears to be ammo for a flare gun. If you could find one, this would be a great way to signal for help. You have no interest in staying on the island for very long, and a flare gun would be a great way to get off if needed.\n*set flare \"found\"\n*goto city_branch\n\n*label flare_found\n\nYou look around the arena again, but find nothing of use. Long ago discarded food and beverage aren't exactly the most useful thing in the world, and would only weigh you down in your current situation.\n*goto city_branch\n\n*label bar\n\n*if (bar = \"Unexplored\")\n  *goto bar_unexplored\n*else\n  *goto bar_explored\n\n*label bar_unexplored\n\nYou head to the bar. You see that the sign say H_mmo_d's, with an \"a\" and an \"n\" lying on the ground, with the rest of the letters appearing slightly damaged, and about to fall off. There's nothing much for you to really see on the inside, either.\n*goto inside_bar\n\n*label bar_explored\n\nYou return to the bar. You notice that the \"a\" and \"n\" in the sign that says \"Hammond's\" have fallen to the ground, but other than that, nothing has really changed.\n*goto inside_bar\n\n\n*label inside_bar\n\nThe bar looks empty.\n\n*label wakeup\n\nDo you have a drink?\n*choice\n  #Yes\n    *goto drink\n  #No\n    *goto city_branch\n\n*label drink\n\nYou have a drink.\n\n*rand passout 1 6\n\n*if passout = 6\n  You can't handle your drink. You pass out and wake back up in the bar unharmed about an hour later.\n  *set drinks 0\n  *goto wakeup\n*else\n  You have a drink.\n  *set drinks +1\n  *if (drinks = 5)\n    *if (drink = \"missing\")\n      You successfully drank 5 in a row. Take a stat up.\n      *set drink \"found\"\n      *choice\n        *selectable_if (Athletics \u003c=4) #Athletics\n          *set Athletics +1\n          *goto wakeup\n        *selectable_if (Tool_Usage \u003c=4) #Tool_Usage\n          *set Tool_Usage +1\n          *goto wakeup\n        *selectable_if (First_Aid \u003c=4) #First_Aid\n          *set First_Aid +1\n          *goto wakeup\n        *selectable_if (Stealth \u003c=4) #Stealth\n          *set Stealth +1\n          *goto wakeup\n        *selectable_if (Survival \u003c=4) #Survival\n          *set Survival +1\n          *goto wakeup\n    *else\n      You've already gotten your drinking stat up. Sorry, you can't get more.\n      *goto wakeup\n  You have had ${drinks} drinks in a row. You can go for more if you want.\n  *goto wakeup", "3_e": "*if (casualties > 100)\n  *goto_scene casualties\n*if (military_time \u003c 1)\n  *goto_scene military \n\nCasualties: ${casualties} /100\n*line_break\nTime until the military arrives: ${military_time} minutes\n*line_break\n\n*if (e_city = \"unexplored\")\n  *goto unexplored\n*else\n  *goto explored\n\n*label unexplored\nYou and ${stranger_name} arrive in the eastern part of the city, to see the door to a shed. You see a pterosaur flying in the sky.\n*set e_city \"explored\" \n*goto shed\n\n*label explored\nYou and ${stranger_name} return to the eastern part of the city.\n*goto shed\n\n*label shed\n*page_break\n*if (casualties > 100)\n  *goto_scene casualties\n*if (military_time \u003c 1)\n  *goto_scene military \n\nCasualties: ${casualties} /100\n*line_break\nTime until the military arrives: ${military_time} minutes\n*line_break\nWhat do you do?\n*choice\n  *selectable_if (e_pterosaur = \"alive\") #Shoot the pterosaur\n    *if (ammo = \"0\") \n      You attempt to shoot the pterosaur, but don't have any ammo.\n      *goto shed\n    *else\n      You ta ce\n  *selectable_if (pterosaur_1 = \"alive\") #Shoot the first pterosaur\n    *if (ammo = \"0\") \n      You attempt to shoot the pterosaur, but don't have any ammo.\n      *goto twin\n    *else\n      You take a shot at the pterosaur. You shoot right through its head and it falls right out of the sky.\n      *set pterosaurs -1\n      *set pterosaur_1 \"dead\"\n      ${pterosaurs} pterosaurs remain.\n      *set ammo -1\n      *if (pterosaurs = \"0\")\n        *goto_scene deadsky\n      *goto twin\n  *selectable_if (pterosaur_2 = \"alive\") #Shoot the second pterosaur\n    *if (ammo = \"0\") \n      You attempt to shoot the pterosaur, but don't have any ammo.\n      *goto twin\n    *else\n      You take a shot at the pterosaur. You shoot right through its head and it falls right out of the sky.\n      *set pterosaurs -1\n      *set pterosaur_2 \"dead\"\n      ${pterosaurs} pterosaurs remain.\n      *set ammo -1\n      *if (pterosaurs = \"0\")\n        *goto_scene deadsky\n      *goto twin\n  #Return to the crossroads\n    *set military_time -1\n    *if (pterosaurs > 10)\n      *set casualties +3\n      *goto crossroads\n    *elseif (pterosaurs > 5)\n      *set casualties +2\n      *goto crossroads\n    *else\n      *set casualties +1\n      *goto crossroads\n\n\n", "3_w": "*if (casualties > 100)\n  *goto_scene casualties\n*if (military_time \u003c 1)\n  *goto_scene military \n\nCasualties: ${casualties} /100\n*line_break\nTime until the military arrives: ${military_time} minutes\n*line_break\n*if (w_city = \"unexplored\")\n  *goto unexplored\n*else\n  *goto explored\n\n*label unexplored\n\nYou and ${stranger_name} look around the western part of the city. You see a pterosaur flying around. Suddenly you find a green key that you decide to pocket.\n*set f3key \"found\"\n*set w_city \"explored\"\n*goto choice\n\n*label explored\n\nYou and ${stranger_name} return to where the green key was found.\n*goto choice\n\n*label choice\nWhat do you do?\n*choice\n  *selectable_if (w_pterosaur = \"alive\") #Shoot the pterosaur\n    *if (ammo = \"0\") \n      You attempt to shoot the pterosaur, but don't have any ammo.\n      *goto choice\n    *else\n      You take a shot at the pterosaur. You shoot right through its head and it falls right out of the sky.\n      *set pterosaurs -1\n      *set w_pterosaur \"dead\"\n      ${pterosaurs} pterosaurs remain.\n      *set ammo -1\n      *if (pterosaurs = \"0\")\n        *goto_scene deadsky\n      *goto choice\n  #Return to the center of the city.\n    *set military_time -1\n    *if (pterosaurs > 10)\n      *set casualties +3\n      *goto_scene 3_center\n    *elseif (pterosaurs > 5)\n      *set casualties +2\n      *goto_scene 3_center\n    *else\n      *set casualties +1\n      *goto_scene 3_center\n", "3_center": "*label start_adventure\n*if (casualties > 100)\n  *goto_scene casualties\n*if (military_time \u003c 1)\n  *goto_scene military \nYou and ${stranger_name} return to the center of the city.\n*line_break\nCasualties: ${casualties} /100\n*line_break\nTime until the military arrives: ${military_time} minutes\n*line_break\n\n*choice\n  *selectable_if (c_pterosaur = \"alive\") #Shoot the pterosaur\n    *if (ammo = \"0\") \n      You attempt to shoot the pterosaur, but don't have any ammo.\n      *goto start_adventure\n    *else\n      You take a shot at the pterosaur. You shoot right through its head and it falls right out of the sky.\n      *set pterosaurs -1\n      *set c_pterosaur \"dead\"\n      ${pterosaurs} pterosaurs remain.\n      *if (pterosaurs = \"0\")\n        *goto_scene deadsky\n      *set ammo -1\n      *goto start_adventure\n  #Go North\n    *set military_time -1\n    *if (pterosaurs > 10)\n      *set casualties +3\n      *goto_scene 3_N\n    *elseif (pterosaurs > 5)\n      *set casualties +2\n      *goto_scene 3_N\n    *else\n      *set casualties +1\n      *goto_scene 3_N\n  #Go Northeast\n    *set military_time -1\n    *if (pterosaurs > 10)\n      *set casualties +3\n      *goto_scene 3_NE\n    *elseif (pterosaurs > 5)\n      *set casualties +2\n      *goto_scene 3_NE\n    *else\n      *set casualties +1\n      *goto_scene 3_NE\n  #Go East\n    *set military_time -1\n    *if (pterosaurs > 10)\n      *set casualties +3\n      *goto_scene 3_E\n    *elseif (pterosaurs > 5)\n      *set casualties +2\n      *goto_scene 3_E\n    *else\n      *set casualties +1\n      *goto_scene 3_E\n  #Go Southeast\n    *set military_time -1\n    *if (pterosaurs > 10)\n      *set casualties +3\n      *goto_scene 3_SE\n    *elseif (pterosaurs > 5)\n      *set casualties +2\n      *goto_scene 3_SE\n    *else\n      *set casualties +1\n      *goto_scene 3_SE\n  #Go South\n    *set military_time -1\n    *if (pterosaurs > 10)\n      *set casualties +3\n      *goto_scene 3_S\n    *elseif (pterosaurs > 5)\n      *set casualties +2\n      *goto_scene 3_S\n    *else\n      *set casualties +1\n      *goto_scene 3_S\n  #Go Southwest\n    *set military_time -1\n    *if (pterosaurs > 10)\n      *set casualties +3\n      *goto_scene 3_SW\n    *elseif (pterosaurs > 5)\n      *set casualties +2\n      *goto_scene 3_SW\n    *else\n      *set casualties +1\n      *goto_scene 3_SW\n  #Go West\n    *set military_time -1\n    *if (pterosaurs > 10)\n      *set casualties +3\n      *goto_scene 3_W\n    *elseif (pterosaurs > 5)\n      *set casualties +2\n      *goto_scene 3_W\n    *else\n      *set casualties +1\n      *goto_scene 3_W\n  #Go Northwest\n    *set military_time -1\n    *if (pterosaurs > 10)\n      *set casualties +3\n      *goto_scene 3_NW\n    *elseif (pterosaurs > 5)\n      *set casualties +2\n      *goto_scene 3_NW\n    *else\n      *set casualties +1\n      *goto_scene 3_NW", "bridge": "*if (After_Bridge = \"Unexplored\")\n\n  As you take your final step off of the bridge and onto the other side of the island, you can feel something falling beneath. You turn around to see the log fall back to the ground, and making it impossible for you to get back without constructing another similar bridge. How do you feel about this?\n\n  *fake_choice\n    #Scared. I don't know if I can do this.\n      Yeah, it can be scary knowing how close you came to falling to your death.\n    #Awesome, I bet most people wouldn't have been able to make it at all.\n      I'll bet. Looks like you're a bit of a daredevil.\n    #At least I made it.\n      True, let's look at the positives here.\n\n  *page_break\n\n  As you keep going, you now notice to your right a group of large lizard-like creatures on all fours and about 10 metres long, grazing on grass. Each of them has a crest on the top of their heads and appears to have a bill similar to that of a duck. You recognize this as a much larger dinosaur as it's a type of hadrosaur. While you recognize these as obvious herbivores, you're aware that most creatures like this are extremely territorial. In addition to that, they're much bigger than you, and there's plenty of them and only one of you.  \n\n  *image Hadrosaur.jpg\n\n  You come to realize that this place is almost certainly covered in dinosaurs, and given the fact that there was a small predator back there, there are almost certainly larger ones closer to the centre of the island. As it sinks in, what type of emotion goes through your mind?\n\n\n\n  *fake_choice\n    #Awe and wonder. It's extremely fascinating that somehow several groups of dinosaurs are still alive.\n      Yeah, it's a fantastic thing that you can research and lay claim to...if you survive.\n    #Excitement. Dinosaurs are so cool. I can't believe I'm the only one who knows about this right now.\n      Yeah, dinosaurs are pretty awesome. Just make sure you don't end up on one of their dinner plates.\n    #Terror. A powerful enough creature or group of creatures could easily kill me on this journey.\n      Understandable. You don't know what other kinds of dinosaur are out there.\n\n  However, you don't have much of a choice but to keep walking. There's no way for you to escape gi
