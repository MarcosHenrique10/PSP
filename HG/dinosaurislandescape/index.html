ven just the equipment on the helicopter, and you're out of gas. You know that on the remote chance that you find the right type of gas, you can escape. If you can somehow fix the radio, or call for help in some other way, you can be rescued. Because of this, you have to look for some way to repair the radio, even in the chance of finding something is remote. As you continue walking along the beaten path, you come to what seems to be two caves directly beside each other. One to your left, and one to your right. You look back and forth, deciding which path to go down.\n  *set After_Bridge \"explored\"\n  *goto caves\n\n*else\n  You return to the outside, in front of the two caves.\n  *goto caves\n\n*label caves\n\nAs you look at the pair of caves, what do you do? You need to pass this particular area and get further but aren't sure which way is safer.\n*choice\n  #Go down the cave on the right.\n    You walk down the cave on the right.\n    *goto_scene Right_Cave\n  #Go down the cave on the left.\n    You walk down the cave on the left.\n    *goto_scene Left_Cave\n  *selectable_if (Office_Flashlight = \"Taken\") #Use the flashlight to look into both caves.\n    The cave on the right appears to have nothing in it and goes straight for the first little bit. You see no immediate danger, indicating that the beginning of it is probably safe. The cave on the left turns further left almost right away, giving you very little insight as to what's inside.\n    *goto caves\n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto caves\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Cave_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Cave_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Cave_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Cave_Heal\n          *else\n            *set Health + 5\n            *goto Cave_Heal\n        #No\n          You choose not to heal, instead saving you a medkit.\n          *goto caves\n\n*label Cave_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Cave_Heal_2\n\n*label Cave_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto caves", "east": "*if (East = \"Unexplored\")\n  *goto unexplored\n*else\n  *goto explored\n\n*label unexplored\n\nYou head to the east, unsure of what's to come. You notice that the forest continues to be extremely dense as you continue down the beaten path, similar to what you might see on a hiking trip. You see several small rodents, but no dinosaurs. Until you hear something munching on leaves. You turn around to see a large reptile that first appears to be a quadruped, but occasionally becomes bipedal as it stands up in order to reach leaves that are on the higher branches. You estimate it as being about 30 feet long when standing on all fours, and you also notice that it seems to have a claw sticking out of the sides of its hand. You quickly identify it as an Iguanodon, which you also know was the first dinosaur that had its bones discovered. No matter how long you stay on this island, these creatures will always both scare and amaze you. You feel that although it's probably not going to attack you, you should still be very careful, as its probably extremely territorial. You quietly move on, deciding not to disturb this creature while it eats.\n\nYou, however, look at the path in front of you, only to see a large variety of flowers and other ancient plants taking up a large portion of the path. You attempt to go around them, only to notice that in either direction, there are large rocks stopping you from going around. You could potentially climb up the side of the rocks, but that looks like it could be really dangerous. So you look around quickly at the flowers.\n\n*page_break\n\n*if (Survival > 2)\n  Your knowledge of nature is enough that you are able to recognize which plants are harmless, and which are not. You are able to go around the flowers without being harmed.\n  *goto crossroads\n*else\n  Your knowledge of nature is not enough to recognize which plants are harmless. It occurs to you that you could climb the rocks, but you could fall into the flowers, taking both fall damage and possible damage from the flowers. \n  *goto flowers\n\n*label flowers\n\nHow do you get around the flowers?\n\n*choice\n  #I go right through. It'll hurt, but at least I won't take fall damage in addition to everything else.\n    You take some damage from the flowers, but at least you learn which ones are safe to touch.\n    *set Health -3\n    *goto crossroads\n  #Climb the wall. I'm athletic enough to make it.\n    *if Athletics > 3\n      You successfully climb around the flowers.\n      *goto crossroads\n    *else\n      You fall into the flowers, taking fall damage, and being harmed extra by being on the ground near harmful flowers. At least you know which ones are painful now,\n      *set Health -5\n      *goto crossroads\n\n*label explored\n\nYou walk back by the iguanodon, which is still munching away at its lunch, and the flowers. Knowing how to get by them safely, you take no damage from them...this time.\n\n*label crossroads\n\n*set East \"explored\"\n\n*if Health \u003c 1\n\n  Before you escape, however, you notice that the last of the plants has hurt you enough to cause you to fall over, incapacitated. You are unable to get back up and are struggling to breathe, only taking in the spores that the plants around you are unleashing. You die a horrible, painful death, realizing that these plants are asphyxiating you.\n  *goto_scene death\n\nYou reach a crossroads and notice that there are three paths you can take. You can go to the lighthouse, which is outside of the forest. You can go to the greenhouse, which is also outside of the forest but does have other plants inside it. You can also go to a shed, which is still in the forest or go back to the center of the island.\n\n*choice\n  #I go to the lighthouse. There might be something useful in there, and I might be able to call for help.\n    *goto lighthouse\n  #I go to the greenhouse. There might be something useful in there.\n    *goto greenhouse\n  #I go to the damaged shed. There might be something useful in there.\n    *goto shed\n  #I go back to the middle of the island. There's nothing left here for me.\n    *goto_scene center  \n\n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto crossroads\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Branch_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Branch_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Branch_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Branch_Heal\n          *else\n            *set Health + 5\n            *goto Branch_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto crossroads\n\n  *selectable_if (map = \"found\") #Look at the map.\n    You look at the map. You can see the north is restricted, presumably due to danger, but also presumably contains a motorboat which you could use to escape the island. The North East has a castle, while the East has a lighthouse, a greenhouse and a shed. The South East is labelled as the industrial area and has a factory, a lab and a storage area. The South as a church, a swamp and a town featuring houses, a bar, a general store, an arena and a town hall. The South West is packed with nature, as it contains a river and waterfall headed into a lake, hills and mountains, while the West has a beach which also acts as a dock for ships. The North West has a shed in the middle of grasslands.\n    *goto crossroads\n\n*label Branch_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Branch_Heal_2\n\n*label Branch_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto crossroads\n\n\n\n\n*label lighthouse\n\n*image lighthouse.jpg\n\n*if (lighthouse = \"Unexplored\")\n  *goto lighthouse_unexplored\n*elseif (lighthouse = \"explored\")\n  *goto lighthouse_explored\n*else\n  You return to the lighthouse. As you enter, you close the door behind you.\n  *goto inside_lighthouse\n\n*label lighthouse_unexplored\n\nAs you exit the forest, you approach the lighthouse slowly. Its a bright, white lighthouse. You see that the light itself is turned off, and the door is closed. It appears to be a small lighthouse, coming in at only about 60 feet high, which is shorter than you would normally think one to be. You begin to wonder how none of this has appeared on any map that you've seen. Confused, you continue up to the lighthouse, only to reach the front door.\n\n*set lighthouse \"explored\"\n\n*goto locked\n\n*label lighthouse_explored\n\nYou return to the lighthouse.\n\n*goto locked\n\n*label locked\n\nYou see that the lighthouse door is locked. You wonder if there's a way you can unlock it.\n\n*choice\n  *disable_reuse  *selectable_if (shed_key = \"found\") #Try the key labeled \"NW shed\". Maybe that's what unlocks it.\n    You are unable to unlock the lighthouse. Maybe another key will do the trick.    \n    *goto locked\n  *disable_reuse  *selectable_if (shed_key_2 = \"found\") #Try the key labeled \"E shed\". Maybe that's what unlocks it.\n    You are unable to unlock the lighthouse. Maybe another key will do the trick.\n    *goto locked\n  *disable_reuse  *selectable_if (castle_key = \"found\") #Try the key labeled \"Cast\". Maybe that's what unlocks it.\n    You are unable to unlock the lighthouse. Maybe another key will do the trick.\n    *goto locked\n  *selectable_if (lighthouse_key = \"found\") #Try the key labeled \"Light\". Maybe that's what unlocks it.\n    You successfully unlock the lighthouse. You open the door slowly, just on the off chance that somehow a dinosaur or other creature is inside. Luckily, there is none, and you walk in, closing the door behind you so that you're not followed. You look around you and mostly see what appear to be a lobby area. Other than that, all you can see there is a staircase going directly up.\n    *set lighthouse \"unlocked\"\n    *goto inside_lighthouse\n  *disable_reuse  *selectable_if (Second_floor_key = \"found\") #Try the key labeled \"2\". Maybe that's what unlocks it.\n    You are unable to unlock the lighthouse. Maybe another key will do the trick.\n    *goto locked\n  *disable_reuse  *selectable_if (Third_floor_key = \"found\") #Try the key labeled \"3\". Maybe that's what unlocks it.\n    You are unable to unlock the lighthouse. Maybe another key will do the trick.\n    *goto locked\n  *disable_reuse  *selectable_if (Green_house_key = \"found\") #Try the key labelled \"green\". Maybe that's what unlocks it.\n    You are unable to unlock the lighthouse. Maybe another key will do the trick.\n    *goto locked\n  *disable_reuse  *selectable_if (church_key = \"found\") #Try the key labelled \"ch\". Maybe that's what unlocks it.\n    You are unable to unlock the lighthouse. Maybe another key will do the trick.   \n    *goto locked\n  *disable_reuse  *selectable_if (secret_key = \"found\") #Try the key labelled \"?\". Maybe that's what unlocks it.\n    You are unable to unlock the lighthouse. Maybe another key will do the trick.   \n    *goto locked\n  #Go back to where I was before.\n    You return to the crossroads.\n    *goto crossroads\n  #I go back to the middle of the island. There's nothing left here for me.\n    *goto_scene center  \n\n\n*label inside_lighthouse\n\n*choice\n  #I look around the lobby.\n    *if (katana = \"missing\")\n      You look around the lobby, only to find that the lighthouse keeper seems to have a large collection of medieval-themed items around. The only thing of value that you can find is a katana. After taking a second to recognize that it's real, you smile to yourself, knowing how useful this could be.\n      *set katana \"found\"\n      *goto inside_lighthouse\n    *else\n      You notice that there's nothing else useful besides the katana.\n      *goto inside_lighthouse\n  #I go up the stairs.\n    *if (castle_key = \"missing\")\n      You head up the stairs to see that there's simply an office. After checking the drawers, you can only find a key labelled \"Cast\". You're not sure what it means, but decide to keep it in case it unlocks something useful.\n      *set castle_key \"found\"\n      *goto inside_lighthouse\n    *else\n      You go back to the office upstairs and see that there's nothing useful.\n      *goto inside_lighthouse\n  #I return to the crossroads\n    You go back to the crossroads\n    *goto crossroads\n\n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto inside_lighthouse\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Light_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Light_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Light_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Light_Heal\n          *else\n            *set Health + 5\n            *goto Light_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto inside_lighthouse\n\n  *selectable_if (map = \"found\") #Look at the map.\n    You look at the map. You can see the north is restricted, presumably due to danger, but also presumably contains a motorboat which you could use to escape the island. The North East has a castle, while the East has a lighthouse, a greenhouse and a shed. The South East is labelled as the industrial area and has a factory, a lab and a storage area. The South as a church, a swamp and a town featuring houses, a bar, a general store, an arena and a town hall. The South West is packed with nature, as it contains a river and waterfall headed into a lake, hills and mountains, while the West has a beach which also acts as a dock for ships. The North West has a shed in the middle of grasslands.\n    *goto inside_lighthouse\n\n*label Light_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Light_Heal_2\n\n*label Light_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto inside_lighthouse\n\n*label greenhouse\n\n*image greenhouse.jpg\n\n*if (greenhouse = \"Unexplored\") \n  *goto greenhouse_1\n*elseif (greenhouse = \"locked\")\n  *goto greenhouse_2\n*else \n  *goto inside_greenhouse\n\n*label greenhouse_1\n\nAs you approach the greenhouse, you notice that there's actually a very good chance of the plants in there still being alive. You think it through and seeing that most of the cycles are probably automated, and the majority of the light is provided by the sun. As long as the power supply hasn't been turned off, there could very easily be an entire ecosystem growing inside of the greenhouse.\n\nWhen you reach it, you see that you are indeed correct and that the greenhouse does, in fact, have quite the functional ecosystem inside of it. Not only have the plants inside been growing, but they have in fact been flourishing. It appears as if there hasn't been a creature in there the whole time, meaning that there has been nothing to eat the plants. You don't know how long its been, you can see that unchecked growth for that amount of time can do wonders for plants, as they are covering the entire greenhouse, covering the wall so much that you actually have a hard time seeing in there. You look around for any holes possibly made by creatures looking to get in, but don't find any. Perhaps they prefered the forest. You attempt to bust through with your axe, but are unable to, noticing that the greenhouse isn't in fact made of traditional glass. You do however eventually find a door.\n\n*set greenhouse \"locked\"\n\n*goto greenhouse_door\n\n*label greenhouse_2\n\nYou return to the greenhouse, hoping this time you can unlock the door.\n\n*label greenhouse_door\n\n*choice\n  *disable_reuse  *selectable_if (shed_key = \"found\") #Try the key labeled \"NW shed\". Maybe that's what unlocks it.\n    You are unable to unlock the greenhouse. Maybe another key will do the trick.    \n    *goto greenhouse_door\n  *disable_reuse  *selectable_if (shed_key_2 = \"found\") #Try the key labeled \"E shed\". Maybe that's what unlocks it.\n    You are unable to unlock the greenhouse. Maybe another key will do the trick.\n    *goto greenhouse_door\n  *disable_reuse  *selectable_if (castle_key = \"found\") #Try the key labeled \"Cast\". Maybe that's what unlocks it.\n    You are unable to unlock the greenhouse. Maybe another key will do the trick.\n    *goto greenhouse_door\n  *disable_reuse  *selectable_if (lighthouse_key = \"found\") #Try the key labeled \"Light\". Maybe that's what unlocks it.\n    You are unable to unlock the greenhouse. Maybe another key will do the trick.\n    *goto greenhouse_door\n  *disable_reuse  *selectable_if (Second_floor_key = \"found\") #Try the key labeled \"2\". Maybe that's what unlocks it.    \n    You are unable to unlock the greenhouse. Maybe another key will do the trick.\n    *goto greenhouse_door\n  *disable_reuse   *selectable_if (Third_floor_key = \"found\") #Try the key labeled \"3\". Maybe that's what unlocks it.\n    You are unable to unlock the greenhouse. Maybe another key will do the trick.\n    *goto greenhouse_door\n  *selectable_if (Green_house_key = \"found\") #Try the key labelled \"green\". Maybe that's what unlocks it.\n    You are able to unlock the greenhouse with this key. You shrug given the word on the key, this combination seems to make sense to you.\n    *set greenhouse \"open\"\n    *goto inside_greenhouse\n  *disable_reuse  *selectable_if (church_key = \"found\") #Try the key labelled \"ch\". Maybe that's what unlocks it.\n    You are unable to unlock the greenhouse. Maybe another key will do the trick.   \n    *goto greenhouse_door\n  #Go back to where I was before.\n    You return to the crossroads.\n    *goto crossroads\n  #I go back to the middle of the island. There's nothing left here for me.\n    *goto_scene center \n  #I go to the lighthouse. There might be something useful in there, and I might be able to call for help.\n    *goto lighthouse \n\n\n\n*label inside_greenhouse\n\n*image inside_greenhouse.jpg\n\n*if (radio_transmitter = \"missing\")\n  *goto inside_greenhouse_1\n*else\n  *goto inside_greenhouse_2\n\n*label inside_greenhouse_1\n\nAs you look around the greenhouse, you see that you actually have a hard time getting around due to all the overgrown vegetation. You do, however, get through it using your axe. After cutting away several pieces of vegetation, you notice that there is a bench. After making your way to said bench, you see that there are several pieces of broken equipment. After some deduction, you notice that the parts can come together to form a radio transmitter. Someone, with the right technical ability, and tools, could put them back together. Also, you see that the radio is the same type of radio that would be used in the helicopter. Noting just how useful this could be, you put all the pieces into your pocket, and continue on your way, wondering if somewhere on this island you could possibly find the tools to repair it.\n\n*if Survival > 3\n  You are familiar enough with the vegetation to avoid any that might be harmful to you.\n  *goto transmitter_found\n*else\n  You are not familiar enough with the vegetation to avoid the harmful species and are hurt.\n  *set health -2\n  *if health \u003c 1\n    The damage you receive is enough to finish off your already frail body. You are killed, and your body is never found by people, as it 'returns to nature' in the greenhouse. \n    *goto_scene death\n\n*label transmitter_found\n\n*set radio_transmitter \"found\"\n\nYou then return to the crossroads.\n\n*goto crossroads\n\n*label inside_greenhouse_2\n\nYou look around, but find nothing else of note within the greenhouse. You do, however, chop up some nice plants, with which you are not overly familiar. You then return to the crossroads\n\n*goto crossroads\n\n*label shed\n\n*if (shed_2 = \"Unexplored\")\n  *goto shed_2_unexplored\n*elseif (shed_2 = \"Explored\")\n  *goto shed_2_explored\n*else \n  *goto inside_shed_2\n\n*label shed_2_unexplored\n\nAs you approach the shed, you can see that this one is rather large. You estimate it as being about 15 feet long, 10 feet wide and 9 feet high. Its also located around a whole bunch of rocks and only about 20 or so feet away from the ocean. You can hear the waves splash loudly against the shore, creating a loud roaring sound that no longer intimidates you, as you are now aware of the roaring of several dinosaurs. When you reach the shed, you attempt to open the door but find that it is locked, and also that the wall and the doors are too reinforced for you to be able to make it through\n\n*set shed_2 \"Explored\"\n\n*goto shed_2_door\n\n*label shed_2_explored\n\nYou go back to the shed, wondering if you can unlock it this time.\n\n*label shed_2_door\n\n*choice\n  #I go back to the middle of the island. There's nothing left here for me.\n    *goto_scene center  \n  *disable_reuse  *selectable_if (shed_key = \"found\") #Try the key labeled \"NW shed\". Maybe that's what unlocks it.\n    You are unable to unlock the shed. Maybe another key will do the trick.    \n    *goto shed_2_door\n  *selectable_if (shed_key_2 = \"found\") #Try the key labeled \"E shed\". Maybe that's what unlocks it.\n    You are able to unlock the shed. You figure that \"E\" must have stood for East.\n    *set shed_2 \"unlocked\"\n    *goto inside_shed_2\n  *disable_reuse  *selectable_if (castle_key = \"found\") #Try the key labeled \"Cast\". Maybe that's what unlocks it.\n    You are unable to unlock the shed. Maybe another key will do the trick.\n    *goto shed_2_door\n  *disable_reuse  *selectable_if (lighthouse_key = \"found\") #Try the key labeled \"Light\". Maybe that's what unlocks it.\n    You are unable to unlock the shed. Maybe another key will do the trick.\n    *goto shed_2_door\n  *disable_reuse  *selectable_if (Second_floor_key = \"found\") #Try the key labeled \"2\". Maybe that's what unlocks it.    \n    You are unable to unlock the shed. Maybe another key will do the trick.\n    *goto shed_2_door\n  *disable_reuse  *selectable_if (Third_floor_key = \"found\") #Try the key labeled \"3\". Maybe that's what unlocks it.\n    You are unable to unlock the shed. Maybe another key will do the trick.\n    *goto shed_2_door\n  *disable_reuse  *selectable_if (Green_house_key = \"found\") #Try the key labelled \"green\". Maybe that's what unlocks it.\n    You are unable to unlock the shed. Maybe another key will do the trick.    \n    *goto shed_2_door\n  *disable_reuse  *selectable_if (church_key = \"found\") #Try the key labelled \"ch\". Maybe that's what unlocks it.\n    You are unable to unlock the shed. Maybe another key will do the trick.   \n    *goto shed_2_door\n  *disable_reuse  *selectable_if (secret_key = \"found\") #Try the key labelled \"?\". Maybe that's what unlocks it.\n    You are unable to unlock the shed. Maybe another key will do the trick.   \n    *goto shed_2_door\n  #Go back to where I was before.\n    You return to the crossroads.\n    *goto crossroads\n\n\n\n*label inside_shed_2\n\n*if Health \u003c 1\n  The pain hoever, sears more than you thought it would, and the damage you recieved was enough to slowly bleed you out. You die a few painful minutes later.\n  *goto_scene death\n\nYou look inside the shed and see that there are a few shelves that could, in fact, hold some useful stuff on them.\n\n*choice\n  #Check out the first shelf\n    You see a few parts on what could have been an old radio. However, you determine that they are complete F.U.B.A.R. so you won't be able to do anything with them.\n    *goto inside_shed_2\n  #Check out the second shelf\n    There is nothing useful on this shelf. Even after a second scan and feeling around you don't find anything.\n    *goto inside_shed_2\n  #Check out the third shelf\n    You find a crowbar. You're not sure if you can find any particular use for such an item. but figure its best to take it anyway.\n    *set crowbar \"found\"\n    *goto inside_shed_2\n  #Check out the fourth shelf\n    You find a part of what appears to be an SoS radio. It's not the whole thing, but if you're able to find the rest and repair it, you could, in theory, put it all together and use it to signal for a ship to help you.\n    *set SoS_radio_B \"found\"\n    *goto inside_shed_2\n  #Check out the fifth shelf\n    You get bitten by a small rodent of some kind. Ouch!\n    *set health -1\n    *if health \u003c 0\n      You're not sure if this bite was venomous, or if you're just super frail from the start, but what little damage the bite dealt was enough to finish you off.\n      *goto_scene death\n    *goto inside_shed_2\n  #Return to the crossroads\n    You return to the crossroads.\n    *goto crossroads\n\n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto inside_shed_2\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Shed_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Shed_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Shed_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Shed_Heal\n          *else\n            *set Health + 5\n            *goto Shed_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto inside_shed_2\n\n  *selectable_if (map = \"found\") #Look at the map.\n    You look at the map. You can see the north is restricted, presumably due to danger, but also presumably contains a motorboat which you could use to escape the island. The North East has a castle, while the East has a lighthouse, a greenhouse and a shed. The South East is labelled as the industrial area and has a factory, a lab and a storage area. The South as a church, a swamp and a town featuring houses, a bar, a general store, an arena and a town hall. The South West is packed with nature, as it contains a river and waterfall headed into a lake, hills and mountains, while the West has a beach which also acts as a dock for ships. The North West has a shed in the middle of grasslands.\n    *goto inside_shed_2\n\n*label Shed_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Shed_Heal_2\n\n*label Shed_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto inside_shed_2", "east_open": "*if (East_First_Island = \"Unexplored\")\n  As you walk through the forest, you see that the trees are indeed getting younger and thinner. You would be able to see that you'd be able to cut down one of these trees relatively easily. As you keep walking, however, you hear something moving from bush to bush, about twenty feet to your left. You take a peek and can't believe your eyes.\n  *page_break\n  You see what appears to be a lizard-like predator on its hind legs, and it's tall enough that its head comes up to your waist while being about nine feet or so long. It's looking away from you and appears to have stopped while eating what appears to be a dead creature. The creature being eaten appears to be a juvenile about 5 feet long, also having many lizard-like features, with upward plates on its back and spikes on its tail. You've heard of a creature like that before, called stegosaurus. \"That's impossible,\" you think to yourself. \"That thing is supposed to be extinct, for millions of years.\" Your mind is totally blown, as you sit there, minutes going by without you even noticing, you wonder to yourself if this was the reason the island was restricted. \"How?\" You wonder to yourself. \"How is this possible?\" \n\n  You're not quite sure what species the lizard-like predator is but have determined it's clearly a small predator, and also some kind of dinosaur. Knowing that your life is most likely in danger, you finally realize how long you're been sitting there for, watching these two prehistoric creatures. Being alert to the fact that the small predator is a threat to you, and likely in a pack, you wonder how to get by it and to the trees that you need.\n\n  *goto coelo_1\n\n*else\n  *if (coelophysis = \"alive\") \n    *goto coelo_2\n  *else\n    *goto trees\n\n*label coelo_2\n\nHow do you get by the dinosaur eating the baby stegosaurus?\n\n*label coelo_1\n\n*choice\n  #Just keep moving. It either doesn't see me or doesn't care.\n    *goto run_away_coelo\n  #Attack it. I can get rid of it permanently, and initiating the fight will give me the advantage. \n    *goto fight_coelo\n\n*label fight_coelo\n\nHow do you choose to fight it?\n*choice\n  #Rush in right away. Hesitation can get me killed.\n    *if Athletics > 1\n      You grab your axe and run at it. It seems shocked, unable to defend itself from you. You finish it off with a single blow from your axe.\n      *set coelophysis \"dead\"\n      *goto trees_1\n    *else\n      You grab you axe and run at it. Seems you weren't fast enough, though, as it bites you before you're able to land a hit. You quickly throw it off of you, setting yourself up to be able to 1-shot it.\n      *set Health -2\n      *set coelophysis \"dead\"\n      *goto trees_1\n  #Sneak up to it. I need stealth on my side to truly get it.\n    *if Stealth > 1\n      You quietly move up to it, with its back still turned to you. You're sneaky enough for it to not notice you, at least until you swipe at it with your axe, blindside it and killing it with a single blow.\n      *set coelophysis \"dead\"\n      *goto trees_1\n    *else\n      You attempt to move up to it quietly, but you must not be stealthy enough, because it hears you. Turning to you, its attacks, and lands a couple of hits before you're able to knock it to the ground dead with your axe.\n      *set Health -2\n      *set coelophysis \"dead\"\n      *goto trees_1\n\n*label run_away_coelo\n\nHow do you choose to getaway?\n*choice\n  #Quickly. Its too small to catch me.\n    *if athletics > 1\n      You successfully get away from it. You're not sure if it was even chasing you, but you're too scared to look back.\n      *goto trees_1\n    *else\n      You feel it scratch you after you keep running, but you're able to speed up in time to get away from any further damage.\n      *set Health -1\n      *goto trees_1\n  #Quietly. It can't catch me if it doesn't notice me.\n    *if stealth > 1 \n      You sneak away a few more yards and noticing that it still doesn't know you're there, you calmly go back to walking normally.\n      *goto trees_1\n    *else\n      You feel as if you've alerted the dino to your presence. It pops out and attacks you. However, you're able to knock it back to where it was before it does any serious damage.\n      *set Health -1\n      *goto trees_1\n\n*label trees_1\n*set East_First_Island \"explored\"\n\nAfter you get away from the tiny terror that nearly traumatized you, you begin to wonder why you were even there in the first place. \"Oh right,\" you remind yourself \"the trees.\" You feel kind of silly having forgotten something so simple. How do you think about this?\n\n*fake_choice\n  #I feel dumb. I had one job.\n    Understandable. Focus on the task at hand.\n  # It's forgivable. It's not every day I get into a life or death encounter with a dinosaur.\n    Yeah. I guess you're right.\n\n*page_break\n\n*label trees\n\nYou make it to the trees. Do you chop one down with your axe?\n\n*choice\n  #Yes. That's why I'm here.\n    *if logs > 0\n      You already have one. You, however, go to the work of grabbing another and then head back to where you would build the bridge.\n      *goto_scene Mid_Open\n    *else\n      You quickly chop down one and now have a log you can use to build a bridge. You head back to where you will build the bridge, now with a log.\n      *set logs +1\n      *goto_scene Mid_Open\n  #No. I changed my mind.\n    Suit yourself. You go back to where you will build the bridge.\n    *goto_scene Mid_Open", "left_cave": "*if (Left_Cave = \"Unexplored\")\n  You head into the right cave, wondering what could be in there. As you head in, you see that it quickly gets quite dark.\n  *if (Office_Flashlight = \"Taken\")\n    Do you turn on your flashlight?\n    *choice\n      #Yes. It'll help me see.\n        *goto Use_Light\n      #No. It could alert other creatures that I'm here.\n        *goto No_Light\n  *else\n    *goto No_Light\n\n*else\n  You confidently enter the cave, returning to the wall.\n  *goto wall\n\n*label Use_Light\nYou see that the cave turns left almost right away. You turn to follow it and quickly see that you appear to be boxed it, surrounded by walls on all sides. However, as you look up, you also see that one of the walls only goes up to about 10 feet, while the rest go up 20 feet, with the lower wall forming a ledge at the top. You try to jump up and reach the ledge but are unable to.\nWhat do you do?\n*goto wall\n\n*label No_Light\nYou can't see anything.\n\n\n*label wall\n*set Left_Cave \"Explored\"\n*choice\n  *selectable_if (Ladder = \"Taken\") #Use the ladder to climb up to the top.\n    *goto top\n  #Exit the cave.\n    *goto_scene Bridge\n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto wall\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Wall_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Wall_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Wall_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Wall_Heal\n          *else\n            *set Health + 5\n            *goto Wall_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto wall\n\n*label Wall_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Wall_Heal_2\n\n*label Wall_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto wall\n\n*label top\n\n*if (Plank = \"missing\")\n  You successfully climb to the top and see that the ledge is only a few square feet, and won't lead to the end of the cave. However, you notice a plank that you decide to take with you before leaving the cave.\n\n  *set Plank \"Taken\"\n  *goto_scene Bridge\n*else\n  You climb back up to the top, but see the same empty spot where the plank once was.\n\n  *goto_scene Bridge\n\n", "mid_open": "*if logs > 0\n  You have a log to help make the bridge. You lay it down where you need it.\n  *set Logs -1\n  *set Bridge +1\n  *goto rock\n*else\n  You do not have the log in order to make the bridge.\n  *goto rock\n\n*label rock\n\n*if rocks > 0\n  You have a rock that you can use to build the bridge.\n  *goto build\n*else\n  You do not have a rock you can use to build the bridge.\n  *goto build\n\n*label build\n\nYou need at least 1 log to build the bridge.\n\n*if (Bridge > 0)\n  You have enough. Your hands are now empty so you can go and get more.\n  *goto divide\n*else\n  You don't have enough. You only have ${Bridge}.\n  *goto divide\n\n*label divide\n\nWhich way do you go?\n\n*choice\n  #East. I need those trees.\n    *goto_scene East_Open\n  #West. I want to check out that dock. \n    *goto_scene West_Open\n  *selectable_if (Bridge > 0) #Build the bridge.\n    *if rocks = 0\n      You can't build a bridge here since there's nothing to hold the log in place.\n      *goto divide\n    *else \n      You can successfully build a very simple bridge, using the two sides of the rock to hold the bridge in place.\n      *set logs 0\n      *set bridge 1\n      *goto cross_bridge\n\n*label cross_bridge\n\nYou cross the bridge successfully.\n\n*achieve tutorial\n\n*finish\n", "north": "As you approach the northern part of the island, you take a deep breathe as you begin to climb up a small hill. After you reach the top, you notice that you have reached the side of a cliff, and that going over it will mean you'd be stuck there. The cliffside is only about 15 feet high, but it's vertical, meaning that you won't be able to climb back up to where you are now. Are you sure you want to do north?\n\n*choice\n  #Yes, I want to escape this way.\n    *goto sure\n  #No. I'm not.\n    You return to the crossroads, unsure of what was ahead of you.\n    *goto_scene center\n\n*label sure\n\nAre you sure? This portion does lead to a way off the island, but to get there you need very high stats, and this path will have very few opportunities to gain more stat ups. Also, failing ANY test results in instant death, so your game could end without warning. Are you sure you want to proceed?\n\n*choice\n  #I'm 100% sure.\n    *goto stat_up\n  #On second thought, can I go back?\n    Yes. You return to the center of the island, unsure of what was ahead of you.\n    *goto_scene center\n\n*label stat_up\n\nYou jump down, and a feeling of discomfort hits your stomach. You feel it wrench because as confident as you are in your abilities, you know for a fact that there's no going back now. You feel as if you will need some luck in addition to your high amount of skill.\n\nOkay, so fortune does favour the bold, and by making this decision, you most certainly are very bold. Here, have a stat up as a reward for your bravery. You'll be getting more as you go, although in very small numbers. You're going to need it, given what you'll be facing.\n\n*choice\n  *selectable_if (Athletics \u003c=4) #Athletics\n    *set Athletics +1\n    *goto step_1\n  *selectable_if (Tool_Usage \u003c=4) #Tool_Usage\n    *set Tool_Usage +1\n    *goto step_1\n  *selectable_if (First_Aid \u003c=4) #First_Aid\n    *set First_Aid +1\n    *goto step_1\n  *selectable_if (Stealth \u003c=4) #Stealth\n    *set Stealth +1\n    *goto step_1\n  *selectable_if (Survival \u003c=4) #Survival\n    *set Survival +1\n    *goto step_1\n\n*label step_1\n\n*set North \"explored\"\n\n*choice\n  *selectable_if (Medkits > 0) #Heal myself using a medkit. Please note this is your last chance to heal up.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto step_1\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Branch_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Branch_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Branch_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Branch_Heal\n          *else\n            *set Health + 5\n            *goto Branch_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto step_1\n\n  *selectable_if (map = \"found\") #Look at the map.\n    You look at the map. You can see the north is restricted, presumably due to danger, but also presumably contains a motorboat which you could use to escape the island. The North East has a castle, while the East has a lighthouse, a greenhouse and a shed. The South East is labelled as the industrial area and has a factory, a lab and a storage area. The South as a church, a swamp and a town featuring houses, a bar, a general store, an arena and a town hall. The South West is packed with nature, as it contains a river and waterfall headed into a lake, hills and mountains, while the West has a beach which also acts as a dock for ships. The North West has a shed in the middle of grasslands.\n    *goto step_1\n\n  #I don't heal.\n    Suit yourself\n    *goto no_more_heal\n\n*label Branch_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Branch_Heal_2\n\n*label Branch_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto step_1\n\n\n\n*label no_more_heal\n\nYou jump down to the bottom of the cliffside, knowing that now you've committed to journeying towards the end of this trail, no matter where it goes. You're thinking that this is likely the most dangerous part of the island, and you quickly notice that there is a dead sauropod in front of you. It didn't die of old age, though. You see that its neck has been ripped several times and that its body has several huge scars all over it.\n\n*if (Survival > 2)\n  You can tell that these scars were made by a large number of Allosaurus, a large predator which was very similar to a small T-Rex several million years before it had appeared. You look around for any signs of an allosaurus, but don't see any.\n  *goto step_2\n*else\n  You have no idea what made these claw marks. You think it's some sort of predator but aren't sure.\n  *goto step_2\n\n*label step_2\n\n\nYou enter a partially lit cave. As you step in, you walk through slowly, startled every few seconds by any sound that you can hear, despite the fact that every single one of them seems to be either water dripping, or small rodents hiding from you. After a few minutes, you start to get acclimated to your situation: surprisingly safe despite the fact that it appears to be very scary. \"This doesn't seem nearly so bad,\" you say to yourself, quietly of course on the off chance that there's actually something in here that could hurt you. Eventually, you emerge from the cave and are about to step out, but first, decide to look at what's in front of you. Immediately, you're glad that you took the time to do so.\n\nYou see a mostly open field in front of you, surrounded by mountains, but ending in another open cave. You look around and at first see that there doesn't appear to be any threat to your safety until you hear something above you. You look up to see Pterosaurs, large ones. You wonder if these ones do eat meat, and after looking more closely, you see that some of them appear to be carrying things in their mouths. You decide to play it safe and assume that they are carnivorous, but you also know that you need to get to the other side, as you need to go through that cave to get to whatever's at the end of this trail...and hopefully your ticket off of the island.\n\nAfter thinking for a few seconds, you are able to think of a few things that you could use to get away from this threat. What do you go with?\n\n*choice\n  #Sprint across the open plains as fast as I can in order to get to the other cave before I get scooped up.\n    *if Athletics > 3\n      You wait a few seconds until you see that they're all relatively high up, and then you bolt out of your cave quickly and looking up, you see that some of the Pterosaurs notice you. You continue to run across the field, knowing that ducking under cover now won't do anything. You see one in particular start to fly down to your location. You focus your attention back on your destination, as you approach it. You hear the cry of the Pterosaur approaching you, as you quickly approach the cave, your heart beating as you get closer, and you hear the creature's screams get louder. You run into the cave, and turn around, only to see the Pterosaur is so large it's unable to enter the cave, as its mouth is opening and closing only a few feet away from you. Good thing you are athletic enough to make it there.\n      *goto step_3\n    *else\n      You wait a few seconds until you see that they're all relatively high up, and then you bolt out of your cave quickly and looking up, you see that some of the Pterosaurs notice you. You continue to run across the field, knowing that ducking under cover now won't do anything. You see one in particular start to fly down to your location. You focus your attention back on your destination, as you approach it. You hear the cry of the Pterosaur approaching you, as you quickly approach the cave, your heart beating as you get closer, and hear the creature's screams get louder. Seconds before you reach the cave, the pterosaur picks you up and flies away with you. You are eaten alive.\n      *goto_scene death\n  #Use cover to avoid being seen in the first place.\n    *if Stealth > 3\n      You wait a few seconds until you see that they're all relatively high up, and then you go to the nearest cover, a bush that's only a few yards away from the first cave. You then wait a few more seconds for a clearing and go under a rock, once again a few yards away. You consistently look up, and when you see that there's no immediate threat, you move to the next cover. Eventually, you make it to the other side and slip into the second cave without provoking an attack.\n      *goto step_3\n    *else\n      You wait a few seconds until you see that they're all relatively high up, and then you go to the nearest cover, a bush that's only a few yards away from the first cave. You then wait a few more seconds for a clearing and go under a rock, once again a few yards away. You consistently look up, and when you see that there's no immediate threat, you move to the next cover. Eventually, one of the pterosaurs dives down in your direction. Seeing that you can't make it to the second cave-in time, you decide to go into cover and attempt to stay hidden. It doesn't work, as the pterosaur is able to grab you with its mouth to find you. It then picks you up and carries you away to eat you alive.\n      *goto_scene death\n\n*label step_3\n\nAs you go further into the second cave, you catch your breath after having gotten away from the pterosaurs so narrowly. After doing so, you look behind you in slight disbelief. That was one of the toughest situations you've had to face, and now you realize just how difficult this is going to be. Breathing heavily, you decide to go through this cave, which is very similar to the one that you went through before. You feel a sense of relief when you reach the end, seeing that on the end of the cave, there's an open field with a bunch of sauropods, large herbivores with long necks. However, you notice that they seem very on edge, and are likely territorial. You do need to get by them. They won't see you as lunch, but might somehow be afraid of you.\n\n*choice\n  #I sneak by. They can't see me from their height.\n    *if Stealth > 3\n      You sneak behind a tree a few yards away, looking around to see that none of the large creatures has noticed you. You repeat this process, slowly making your way to the outside of the area, with none of the sauropods ever noticing you. When you reach the other side, you noticed this was likely easier than what came before, but it was still pretty difficult. Anything else that comes in the future will likely be much worse.\n      *goto step_4\n    *else\n      You sneak behind a tree a few yards away, looking around to see that none of the large creatures has noticed you. You repeat this process, slowly making your way to the outside of the area, but on your way there, one of the sauropods freaks out, and whips you with his tail. You're killed in a single blow.\n      *goto_scene death\n  #I approach them, using my knowledge of their species to get through in ways that show I'm not a threat.\n    *if Survival > 3\n      Go directly through their territory showing that you're not a threat. The large creatures aren't threatened by you, as you appear small and are conceding to them, showing so by putting your hands up as if surrendering. You're surprised that it seems easy, but then again, you also know that they could have killed you with a single blow.\n      *goto step_4\n    *else\n      Go directly through their territory, trying to show that you're not a threat. However, you make the mistake of looking too big, and one of the large dinosaurs defeats you with a single swing of its tail.\n      *goto_scene death\n\n*label step_4\n\nAfter passing by the large dinosaurs, you begin to look at them, not as the gracious herbivores you originally saw them as, but instead now as large territorial beasts that could have easily gotten you killed. You have no idea what else is to come, but you continue going along the only pathway available, knowing full well that straying from it will likely mean falling off of an edge at some point. As you keep moving ahead, you hear something that sounds like a creature yelping. You cautiously move forward. You notice that creature that was making it, and at first, you laugh at how small they are, only about 3 feet tall at the most. Until you see their numbers and shape, specifically the talon on their feet.\n\n\"Oh my god,\" you whisper to yourself. \"Velociraptors. Why is this a thing? Why now?\" You then catch your own thoughts. \"They likely almost heard that,\" you think to yourself, knowing how good a raptor's senses are. You know you have to get around them and have a 0% chance of taking the pack in a straight fight, and these things aren't known for splitting up. You move left to get somewhat far away to the side, but reach a cliffside and can't get further. You have to get by the raptors to get to whatever hope for salvation is at the end of this path. How do you plan to get by them?\n\n*choice\n  #Quickly. If I can get far away from them, they won't be able to catch me, no matter how fast they are.\n    *if Athletics > 4\n      You wait for the raptors to not be looking and then you book it. After a few seconds, you stop looking back or sideways, not wanting to slow down. You're not even aware if they can see you. After being partway through the sprint, you hear another yelp, which you can tell is from the same location as before. However, you begin to hear more yelps, now from closer. You have a brief thought that the first in the series of yelps was one noticing you and pointing out your location, but don't have the time to think about it now. Realizing you're in trouble with them chasing you, you book it even harder. You start to ware, slowing down, unsure of a raptor's stamina. You continuously hear the raptors yelps getting louder and closer, but are too scared to look back until they're so loud that you can tell they're practically on your tail. After about a minute, the yelps are now getting quieter. You glance around after 15 seconds of unceasingly quiet yelps and no longer see the raptors. Despite the fact that you think you're safe, you continue for a few more seconds, and then slow down to a brisk walk.\n      *goto step_5\n    *else\n      You wait for the raptors to not be looking and then you book it. After a few seconds, you stop looking back or sideways, not wanting to slow down. You're not even aware if they can see you. After being partway through the sprint, you hear another yelp, which you can tell is from the same location as before. However, you begin to hear more yelps, now from closer. You have a brief thought that the first in the series of yelps was one noticing you and pointing out your location, but don't have the time to think about it now. Realizing you're in trouble with them chasing you, you book it even harder. You start to ware, slowing down, unsure of a raptor's stamina. You continuously hear the raptors yelps getting louder and closer, but are too scared to look back until they're so loud that you can tell they're practically on your tail. Then what you were dreading happens, as one jumps on your back and sinks its claws into you, causing you to fall forward. You reach for your axe, and grab it as a second raptor bites your arm. As some come in they also jump on you and you are eaten alive.\n      *goto_scene death\n  #Quietly. They can't chase me if they don't know that I'm even here.\n    *if Stealth > 4\n      You crouch down and as quietly as possible slowly slink towards the other side of the raptors. After a minute or so, you've moved a handful of feet, and the raptors appear to be remaining stationary. You're not sure if they're coordinating an attack on something else, guarding a nest, just resting, waiting to ambush larger game that they've tracked or something else entirely, but you know for a fact that its not worth the risk of going to investigate. As you keep your distance, you continue to look back at the raptors, who are continuing to remain stationary. After about an hour of this, you've moved a fair distance and notice that one of them has left, but in a different direction. You then hear a cry out in pain as the rest of them follow it. You now get up while they're distracted and move out of the general area, convinced that you're safe. Which you are...for now.\n      *goto step_5\n    *else\n      You crouch down and as quietly as possible slowly slink towards the other side of the raptors. After a minute or so, you've moved a handful of feet, and the raptors appear to be remaining stationary. You're not sure if they're coordinating an attack on something else, guarding a nest, just resting, waiting to ambush larger game that they've tracked or something else entirely, but you know for a fact that it's not worth the risk of going to investigate. As you keep your distance, you accidentally slip, and fall in an almost comedic matter, and hit the ground with a loud thud. You quickly realize that this is no laughing manner, as you hear the raptors approaching. You scramble in a desperate attempt to get away, but given how fast they are and their proximity to you, you are completely unable to do so. One jumps on you after you take only a few steps, and you realize that these are your final moments.\n      *goto_scene death\n\n*label step_5\n      \nYou finally get by the raptors, and with some sweat of your brow, you turn around and notice that there's probably going to be stuff that's just as bad, if not worse than that on its way. You hear an extremely loud roar in front of you and pause for a few seconds. You step back, only to realize that you need to move forward due to not being able to get back to the center part of the island. When you do move forward, however, you do so slowly, afraid of what it might be. You see a large bipedal therapod, about 30 feet long. You jump to the conclusion that it might be a t-rex, but then dismiss it as being too small, and recognize it as more likely being an Allosaurus. You're somewhat relieved at the fact that this isn't a T-Rex, but are also scared at the fact that you still have to outrun this thing. How do you attempt to get by it?\n\n*choice\n  #Run when its not looking\n    *if Athletics > 4\n      You wait for a moment when the creature isn't looking in order to get a head start. When the moment arrives, you burst out, running as fast as you can, not looking back. After some moments, you can hear a very loud roar, as well as hard and heavy footsteps, getting closer to you. You recognize that it's chasing you and that you have to get somewhere safe. In the forest coming up, you notice a corpse of a sauropod, which would distract the allosaurus. After all, why would it continue chasing a (comparatively) tiny human when there's much larger food readily available? You notice, as you quickly get closer, that the corpse is somewhat eaten, but still has plenty of meat on it. You can hear the allosaurus get closer and closer to you, and as you finally get over the sauropod corpse, you keep running until you hear the footsteps close behind you stop right where the corpse is. You don't risk stopping to turn around and instead keep running, but no longer hear footsteps. After you run out of breath, you turn around to see you are no longer being chased and can see in the distance the predator gorging itself in its find.\n      *goto step_6\n    *else\n      You wait for a moment when the creature isn't looking in order to get a head start. When the moment arrives, you burst out, running as fast as you can, not looking back. After some moments, you can hear a very loud roar, as well as hard and heavy footsteps, getting closer to you. You recognize that it's chasing you and that you have to get somewhere safe. In the forest coming up, you notice a corpse of a sauropod, which would distract the allosaurus. After all, why would it continue chasing a (comparatively) tiny human when there's much larger food readily available? You notice, as you quickly get closer, that the corpse is somewhat eaten, but still has plenty of meat on it. You can hear the allosaurus get closer and closer to you, and as you're about to reach the corpse, you feel yourself being picked up by the jaw of the creature, carried into the air. You scream for a few seconds before being wolfed down, as you were unable to escape.\n      *goto_scene death    \n  #Sneak by\n    *if Stealth > 4\n      You wait for a moment when the creature isn't looking in order to get a head start. After seeing it being distracted for a while, you slowly begin to move while you're hidden. You briefly make noise moving through bushes, and the allosaurus looks in your general direction. You keep still, and it looks away, indicating that it didn't see you. After several minutes of you moving extremely slowly and quietly, it moves in another direction. You keep the slow pace for a minute or two until the dinosaur leaves sight, and then you book it, using this as an opportunity to get out of its territory while it can't see you.\n      *goto step_6\n    *else\n      You wait for a moment when the creature isn't looking in order to get a head start. After seeing it being distracted for a while, you slowly begin to move while you're hidden. You briefly make a noise moving through bushes, and the allosaurus looks in your general direction. You keep still, and it looks at you and begins to charge. Knowing that your weapons won't be any use against it and that there's no way you can outrun it, you make a desperate attempt to hide but are unable to do so and it devours you whole.\n      *goto_scene death \n\n*label step_6\n\nAs you look back behind you at where the creature was, you think to yourself that now you're in real trouble. \"There's probably more?!\" you think to yourself. Dear God, what could possibly come after something like that!? You do however feel slightly stronger now. Which skill set do you feel has improved while you're here? Keep in mind, this is the final chance you get to increase your skills, so choose carefully.\n\n\n*choice\n  *selectable_if (Athletics \u003c=4) #Athletics\n    *set Athletics +1\n    *goto step_7\n  *selectable_if (Tool_Usage \u003c=4) #Tool_Usage\n    *set Tool_Usage +1\n    *goto step_7\n  *selectable_if (First_Aid \u003c=4) #First_Aid\n    *set First_Aid +1\n    *goto step_7\n  *selectable_if (Stealth \u003c=4) #Stealth\n    *set Stealth +1\n    *goto step_7\n  *selectable_if (Survival \u003c=4) #Survival\n    *set Survival +1\n    *goto step_7\n\n*label step_7\n\nAfter walking for several minutes, you cling to hope that you might see the end of the island, and possibly a way off. However, despite the path getting slightly thinner, and the waves getting louder, you don't see an end to the island. Instead, as you now look in front of you and see a bunch of plants. At first, you don't think of them as being at all harmful, but then you recognize these ones as being ancient and rely on your survival skills to tell which ones are safe, and which ones aren't. \n\n*page_break\n\n*if Survival = 1\n  Your non-existent survival skill means you can't tell the difference at all and are killed relatively quickly and fall over, dying a painful death in a field of toxic flowers. You gasp for breath in your final moments, unable to get up after landing face-first in a bunch of flowers.\n  *goto_scene death\n*elseif Survival = 2\n  Your low survival skill means that you take heavy damage from the experience, as you avoid the ones that kill you upon being touched but are still very hurt.\n  *set Health -19\n  *goto step_8\n*elseif Survival = 3\n  Your medium survival skill means that you're able to avoid the most damaging plants but are still hurt by some of the lesser-known ones.\n  *set Health -12\n  *goto step_8\n*elseif Survival = 4\n  Your high survival skill means that you're mostly able to recognize the damaging plants but are still harmed by a few of them.\n  *set Health -6\n  *goto step_8\n*else\n  Your top-notch survival skill means you completely avoid any of the poisonous plants and take no damage at all.\n  *goto step_8\n\n*label step_8\n\n*if health \u003c 1\n  The damage that you take from walking through the dangerous plants is, however, enough to finish you off. You are killed as the plants suffocate you to death, taking you down. You struggle to breathe for the last few seconds of your life.\n  *goto_scene death\n*else\n  You are able to survive your wade through the toxic plants, as you come out the other side still walking and able to force your way to the other side. You fell hurt but relieved at the fact that you at least survived.\n  *goto step_9\n\n\n*label step_9\n\nYou've been through a lot, and still have no end in sight. \"Will this keep going on forever?\" you ask yourself. \"Is there an end to this? Please say that there's an end to this,\" you say to yourself, fully aware of how there's nobody around you at the moment. You hear another loud roar ahead of you, similar to the one that the allosaurus made before. You look out and originally don't see anything, but that stops when you decide to look in the water instead of limiting yourself to what's on the land. You see a crocodile-like creature even larger than the allosaurus with what appears to be a large fin sticking out of its back. You can tell right away that it's a Spinosaurus, the largest land (or in its case partially land-based) predator of all time. You can see that far ahead of you there is a reinforced wall, with a hole in it large enough for you to get through. You wonder how to bypass this dinosaur and a few ideas come to mind.\n\n*choice\n  #Bolt by while it can't see you.\n    *if Athletics > 4\n      You wait for its back to be turned (or rather, its sail to be moving away from you) and run as fast as you can, without holding back. You can't tell if it's even following you, but don't think its worth it to look back. After about a minute, as you're tired but still able to run, you hear far behind you a creature getting out of the water, roaring, followed by giant footsteps. Knowing what's happening, you keep that in mind and don't slow down. As you get close to the wall, you can hear the large creature catching up to you, until its nearly on your tail. As it gets near striking distance, you're able to run right through the hole in the wall, as you keep running afterwards. Good thing you did, as the creature's snout, reaches a few feet into the hole. It backs out and relief comes over you for a second, but you soon hear a SLAM! On the other side, and you can tell that the dinosaur is hitting the wall in an attempt to break it down. It fails and seems to give up after three attempts. You decide to keep moving, not intent on waiting to see if it finds a way.\n      *goto step_10\n    *else\n      You wait for its back to be turned (or rather, its sail to be moving away from you) and run as fast as you can, without holding back. You can't tell if it's even following you, but don't think its worth it to look back. After about a minute, as you're tired but still able to run, you hear far behind you a creature getting out of the water, roaring, followed by giant footsteps. Knowing what's happening, you keep that in mind and don't slow down. As you get close to the wall, you can hear the large creature catching up to you, until its nearly on your tail. As you approach the wall, you are swept up by your feet, unable to outrun the giant predator. It has a nice snack, as you are unable to leave the island.\n      *goto_scene death\n  #Sneak by so it'll never detect me.\n    *if Stealth > 4\n      You duck behind some cover and slowly move over the course of a few hours. It doesn't matter to you if the cover is a bush, a rock or a small tree, you move only when you can see the creature swimming away from you, and even then only a foot or two at a time in order to get to the next cover. Even when the creature comes on land after over an hour, you continue to move as quietly as possible, hoping that it doesn't smell you. Apparently, it can't, as you are consistently able to find cover wherever you can without catching its attention. After you finally move until you're within only a couple hundred meters of the hole in the wall, and make the charge. The creature either can't see you, doesn't care, or just knows you'll be able to scramble to safety in time, as it doesn't bother to chase you, despite the fact that after a couple of glances back, you can see that it has looked in your direction.\n      *goto step_10\n    *else\n      You duck behind some cover and slowly move over the course of a few hours. It doesn't matter to you if the cover is a bush, a rock or a small tree, you move only when you can see the creature swimming away from you, and even then only a foot or two at a time in order to get to the next cover. Even when the creature comes on land after over an hour, you continue to move as quietly as possible, hoping that it doesn't smell you. Apparently, it can't, as you are consistently able to find cover wherever you can without catching its attention. However, soon afterwards you let your stealth go by accidentally make a sound that it can hear as you move. In a desperate attempt to get away, you make a mad dash for the wall but are unable to reach it before being gobbled up by the spinosaurus.\n      *goto_scene death\n  *selectable_if (Survival > 4) #Use my knowledge of the creature to get by.\n    You recognize that the spinosaurus isn't that great at detecting food outside of the water, so you begin to sneak by, staying as quiet as possible. After about a half-hour of this, you've moved far enough and see that the creature isn't detecting you at the moment, so you choose to run directly for the exit. Your head start gives you the advantage you need, as you're just barely able to outrun the creature, making it into the hole in the wall just before its snout reaches you. It backs out and relief comes over you for a second, but you soon hear a SLAM! On the other side, and you can tell that the dinosaur is hitting the wall in an attempt to break it down. It fails and seems to give up after three attempts. You decide to keep moving, not intent on waiting to see if it finds a way.\n    *goto step_10\n\n*label step_10\n\n\nYou look back at the wall, knowing how close you have come to death...again. This story is getting old. Now you come up to a small hill and begin to climb it. After a few minutes of you taking your time due to being pretty tired, you look ahead and notice that off in the distance, over a kilometre away there's the end of the island, and something small and floating there. You can hardly see it, but even from this distance, you can tell what it is: its a motorboat. You breathe a sigh of relief, not just because you see a way off, but its a way off you're familiar with. You've used one of these before, and you pump your fist in the air and are able to breathe out a \"yes!\" in excitement. \n\nYou're tempted to sprint there, but then remember that you can't make it that far and that you'll wear yourself out if anything else comes along, which, based on your experience so far, is almost certain to happen. \n\nYou see this as an opportunity to scan for other threats and you see two. One of which is at the bottom of the hill right now: a group of five raptors. However, these ones are not identical to the ones you got away from earlier, they're much bigger, about seven feet long. In addition, they seem even more bird-like, even covered in what appear to be feathers. After a second or two you recognize them as being Utahraptors, much larger, faster and more dangerous than the velociraptors from before. That, however, is trumped by the threat just near the boat. It's so close to it, that if you didn't know better, you'd think this second threat was guarding the boat. It's exactly the creature you feared most: the fearsome t-rex. This one stands at over 40 feet long, and it's faster and stronger than both the similarly sized Spinosaurus and Allosaurus from before.\n\nYou take a deep breath, afraid of what's coming up, but knowing that you must somehow get by these two threats, and then you're home free if the motorboat has gas in it. The thought of it not having gas terrifies you, as you get scared of the possibility of getting all the way there for nothing. However, first thing's first, you have to get by the Utahraptors. Somehow they haven't noticed you, and you do have a couple of options that could determine the best way to get by them. You approach the bottom of the hill remaining out of sight.\n\n*choice\n  #Run as fast as I can. I believe I still have something left in the tank.\n    *if Athletics > 4\n      After making it to the bottom of the hill near the Utahraptors, you sprint out as quickly as you can, this time you're having a hard time maintaining your speed right away due to the large amount of fatigue you're suffering. You know that with your heavy breathing you're noting going to last very long, and soon you can hear deep and loud raptor yelps, which are slowly approaching you. Not sure if you can outrun them, you keep pushing yourself, knowing that it's your only chance. As you start to feel a pain in your chest, you become worried that you're going to slow down, and you eventually do so, as you can now hear the raptor yelps coming even closer. Right before they get within striking distance of you, and you mentally prepare yourself you hear the t-rex in front you let out a massive \"ROAR,\" as if it was claiming its territory. Suddenly, the raptors yelping stops for a few second, and you can hear some shuffling, with the raptors' yelps now getting further away from you at outstanding speed, due to the fact that you and they are now running in opposite directions. You duck behind cover when they're gone, relieved that that T-Rex not only indirectly saved you but also didn't even notice you. You take a deep breath and wonder how you're going to get by it.\n      *goto step_12\n    *else\n      After making it to the bottom of the hill near the Utahraptors, you sprint out as quickly as you can, this time you're having a hard time maintaining your speed right away due to a large amount of fatigue you're suffering. You know that with your heavy breathing you're noting going to last very long, and soon you can hear deep and loud raptor yelps, which are slowly approaching you. Not sure if you can outrun them, you keep pushing yourself, knowing that it's your only chance. As you start to feel a pain in your chest, you become worried that you're going to slow down, and you eventually do so, as you can now hear the raptor yelps coming even closer. You're hoping for some kind of miracle, but it doesn't come. The raptors jump on you from behind and begin to bite. After a few painful seconds, you're put out of your misery with a bite to the neck.\n      *goto_scene death\n  #Sneak by. These things don't see me now, so if I attempt to sneak, they certainly wouldn't see me.\n    *if Stealth > 4\n      After making it to the bottom of the hill near the Utahraptors, you find cover as quickly as you can. After doing so, you decide to wait it out, as they begin to look around for food. Its really testing your patience to ensure that all of them aren't looking for a few seconds, but you're able to wait for such a moment and move to the next area of cover. You keep this up for well over an hour, moving from bushes, to behind rocks, to behind groups of trees to lying down beside small inclines in the ground. After a while, you almost step on a large branch which would have made a sound loud enough to give away your position, but in the end, are able to avoid it. After over an hour of this, you see the raptors sprint off in the opposite direction of you, and you use this an opportunity to run off when they are finally out of sight. After a minute of sprinting, you stop and turn your attention to the T-Rex\n      *goto step_12\n    *else\n      After making it to the bottom of the hill near the Utahraptors, you find cover as quickly as you can. After doing so, you decide to wait it out, as they begin to look around for food. Its really testing your patience to ensure that all of them aren't looking for a few seconds, but you're able to wait for such a moment and move to the next area of cover. You keep this up for well over an hour, moving from bushes, to behind rocks, to behind groups of trees to lying down beside small inclines in the ground. After a while, you accidentally step on a large branch, and it makes a large sound loud enough to give away your position to the raptors and causing you to trip and fall. You attempt to get up and book it, but the raptors are on top of you before you're able to speed away. You are killed on the spot.\n      *goto_scene death\n\n*label step_12\n\nYou look up in amazement and up somewhat close, the T-Rex looks even bigger than you ever expected. \"Oh no,\" you say to yourself, now panting, sweating and barely able to stand. The T-Rex isn't looking at you and presumably can't see you. You see on the other side of the large beast is the boat, which you can now see is floating and tied down. You notice cover nearby you and also think of a few things that could help you out.\n\n*label trex\n\nHow do you get by the T-rex?\n\n*choice\n  #I sprint as fast as I can right by it.\n    *goto run\n  #I hide behind cover.\n    *goto hide\n  #I don't move. It can't see me if I don't move.\n    *goto still\n\n*label run\n\n*if Athletics > 4\n  You begin running as fast as you can, and at first, the T-rex doesn't see you.\n  *if Stealth > 3\n    You're able to remain quiet until you're almost at the boat. After you accidentally kick a rock while running, you hear a loud roar followed by footsteps. You panic is the T-Rex closes in on you, faster than you ever imagined. You don't give up your pace even for a second, as you get within 10 yards of the boat and suddenly the thudding of steps is much closer to you than you thought. Not wanting to give up, you keep scrambling towards the boat, like an NFL player trying to outrun a much faster defender at the goal line, you're now five yards away from the boat and can practically feel the T-Rex behind you. Now four yards away, three, two, one and you're on. You start the boat and can hear the motor running as it backs away from the shore. The T-Rex reaches out for you with its large head just barely missing you. Unable to chase you in the water, the T-Rex retreats back to land. \n\n    You get just far away enough from the island to ensure that the dinosaur can't reach you, and turn off the boat to check the gas, and you have just barely enough to make it to where you were going to originally land the helicopter. You dig up a map and a compass from inside some drawers on the boat and speed away, knowing that now you have the story of a lifetime to tell everyone. If only there was some way to make anybody believe you.\n    *achieve boat\n    *goto_scene Transition\n  *else\n    You, however, make too much noise running. You're not sure if it's your heavy breathing or loud stomps, but either way, the T-Rex quickly sees you, and you hear a roar followed by footsteps. Despite running as fast as you can, when you're only about fifteen yards away from the boat, you're grabbed the T-Rex's large jaw and are chewed by, dying a quick death.\n    *goto_scene death\n*else\n  You're too slow to outrun a T-Rex. While using just your speed, the T-Rex notices you far too early. Had you been faster, you might have been able to get away, but now you're just plain too slow to create enough distance before it catches up to you. You're killed as the T-Rex uses its massive jaw to scoop you up.\n  *goto_scene death\n\n*label hide\n\n*if Stealth > 4\n  You're able to move from behind several pieces of cover without been seen, hear or smelled (and best of all, you avoid being tasted) by the T-rex for the first little while as you slowly get closer to the boat. You consistently look back at the best every few seconds, making sure that it doesn't begin to chase you. As you do so, you slow down significantly. You move around a rock that you likely would have kicked had you simply made a mad dash towards the boat. However, very soon afterwards, the T-Rex sniffs the air and begins to turn its head towards you, followed immediately by a charge.\n  *if Athletics > 3\n    You begin to sprint towards the boat, quickly reaching 10 yards or so from the boat with the T-Rex having gotten significantly closer to you. It's approaching faster than you thought. Knowing how critical it is to keep going at full speed you keep your top speed up, aware of how quickly the T-Rex is catching you. You jump onto the boat, landing on it and activating it. You move the boat just before the T-Rex makes an attempt to bite it, causing it to barely miss. Afterwards, it takes another attempt to bite into the boat, now further away, but is unable to reach it. Incapable of swimming, it retreats back to land. \n\n    You get just far away enough from the island to ensure that the dinosaur can't reach you, and turn off the boat to check the gas, and you have just barely enough to make it to where you were going to originally land the helicopter. You dig up a map and a compass from inside some drawers on the boat and
