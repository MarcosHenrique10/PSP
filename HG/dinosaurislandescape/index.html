<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dinosaur Island Escape — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "dinosaurislandescape", "title": "Dinosaur Island Escape", "scenes": {"2_e": "*if (East = \"Unexplored\")\n  *goto east_unexplored\n*elseif (East = \"explored\")\n  *goto east_explored\n*else \n  *goto east_done\n\n*label east_unexplored\n\nYou head towards the east of the island, with ${partner_name} behind you.  You notice that the forest continues to be extremely dense as you continue down the beaten path.\n\n*goto encounter\n\n*label east_explored\n\nYou head back towards the east of the island, this time with ${partner_name} behind you. It's just as thickly forested as before.\n\n*label encounter\n\n\"It's like a hike,\" ${partner_name} says in a joking manner.\n\nYou decide to play along \"I don't know any hikes where the animals along the path try to eat you, though.\"\n\n\"Well, remember the time we ran into the homeless guy on the Wint Falls hiking trail. Seemed like he wanted to eat us,\" ${partner_name} replied while snickering.\n\nYou chuckle at the memory and remark \"That's probably the closest we came to death before coming to this island. Might want to stay away from nature for a while.\"\n\n${partner_name} laughs and gives you a playful tap on the shoulder immediately before you hear something makes a squealing sound. The two of you both turn away from the path and into the forest to see a bear sized bipedal lizard looking around, presumably for food. You're about the length of a football field away from it, and it hasn't yet noticed you.\n\n\"Dilophosaurus,\" ${partner_name} says in a very flat tone.\n\n\"Yup,\" you reply, as you attempt to think of a way to get around it.\n\n*choice\n  #Attempt to outrun it.\n    *if (athletics > 3)\n      You bolt out, with ${partner_name} able to keep pace with you. You look back to see that the dinosaur has clearly noticed you, but isn't giving chase at all. \"Wow,\" You stop after about a minute as ${partner_name}, while panting says \"wow, it didn't even think to try and attack us. We must've gone pretty fast. The two of you high five, before making your way further East.\n      *set partner %+10\n      *goto crossroads\n    *if (athletics > 2)\n      You run out as fast as you can, with ${partner_name} easily able to keep up with you, and even ahead of you for a while. You can hear the Dilophosaurus catching up to you before ${partner_name} turns around and kicks it in the jaw, causing it to run away in an instant retreat. \"Turns out, you need me just as much as I need you there, you 'hero.'\" Their mocking tone in the word 'hero' makes you feel dismissed, but you're glad that ${partner_name} came back to help you before you got attacked.\n      *set partner %+5\n      *goto crossroads\n    *else\n      You run out as fast as you can, with ${partner_name} running out ahead. You can hear the Dilophosaurus catching up to you and it jumps on you. Quickly, ${partner_name} runs back and kicks it after it bites you once. This knocks it back, and it begins to retreat.\n      \"Thanks,\" you say as you get back up. ${partner_name} only chuckles back at you and shakes ${their} head, as if ashamed by you.\n      *set partner %-5\n      *set health -4\n      *goto crossroads\n  #Attempt to sneak by.\n    *if (stealth > 2)\n      You and ${partner_name} successfully sneak by the dinosaur without it noticing either of you.\n      *set partner %+10\n      *goto crossroads\n    *else\n      You and ${partner_name} attempt to sneak by the dinosaur, but it quickly takes notice of you and darts directly in your direction. You grab your axe and swing, but miss it, as it jumps on you. ${partner_name} kicks it in the jaw as it's distracted by biting you, causing it to fall off of you. You now take a swing at its body which is on the ground and kill it. \n      \"You really do need me here, don't you,\" ${partner_name} says in a tone that makes it seem like they're moreso prideful in themselves than upset with you. You simply look at ${them} and smile, unsure of what else to say.\n      *set partner %-5\n      *set health -5\n      *goto crossroads\n  *selectable_if (ammo > 0) #Shoot the dilophasaur with your rifle, using 1 ammo.\n    You line up your shot, and pull the trigger. You hit it directly in the neck, killing it cleanly and painlessly. ${partner_name} wipes ${their} forehead as if in relief, and pats you on the back.\n    *set ammo -1\n    *set partner %+10\n    *goto crossroads\n\n*label east_done\n\nYou return to the eastern portion of the island.\n\n*label crossroads\n\n\n*if health \u003c 1\n  However only second later you collapse from your wounds, unable to continue. ${partner_name} desperately attempts to save you, but to no avail. You see it all go black as you leave this world, and won't know the fate of ${partner_name}.\n  *goto_scene death\n\nYou find yourself at a crossroads. You see that there's a lighthouse, a greenhouse and a shed.\n*choice\n  #I go to the lighthouse\n    *goto lighthouse\n  #I go to the greenhouse\n    *goto greenhouse\n  #I go to the shed\n    *goto shed\n  #I go back to the middle of the island.\n    *goto_scene 2_center  \n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto crossroads\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Cave_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Cave_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Cave_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Cave_Heal\n          *else\n            *set Health + 5\n            *goto Cave_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto crossroads\n  *selectable_if (map = \"new\") #Look at the map.\n    You look at the map. You can see the north is no longer restricted, but still has several dangerous dinosaurs and little to no apparent reward. The North East has a castle, while the East has a lighthouse, a greenhouse and a shed. The South East is labelled as the industrial area and has a factory, a lab and a storage area. The South as a church, a swamp and a town featuring houses, a bar, a general store, an arena and a town hall. The South West is packed with nature, as it contains a river and waterfall headed into a lake, hills and mountains, while the West has a beach which also acts as a dock for ships. The North West has a shed in the middle of grasslands.\n    *goto crossroads\n\n*label Cave_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Cave_Heal_2\n\n*label Cave_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto crossroads\n\n*label lighthouse\n\n*if (lighthouse = \"Unexplored\")\n  *goto lighthouse_unexplored\n*elseif (lighthouse = \"explored\")\n  *goto lighthouse_explored\n*elseif (lighthouse = \"unlocked\")\n  *goto lighthouse_unlocked\n*else\n  *goto lighthouse_done\n\n*label lighthouse_unexplored\n\nYou and ${partner_name} go up to the lighthouse. It's a bright, white lighthouse that seems more grey-ish due to how weathered it is. You see that the light itself is turned off, and the door is closed. It appears to be a small lighthouse, coming in at only about 60 feet high, which is shorter than you would normally think one to be. You begin to wonder how none of this has appeared on any map that you've seen. Confused, you continue up to the lighthouse, only to reach the front door.\n\n*set lighthouse \"explored\"\n\n*goto lighthouse_door\n\n*label lighthouse_explored\n\nYou and ${partner_name} go up to the lighthouse, which is a bit more greyed out now, due to how weathered it likely is.\n\n*goto lighthouse_door\n\n*label lighthouse_door\n\n\nYou see that the lighthouse door is locked. You wonder if there's a way you can unlock it.\n\n*choice\n  *disable_reuse  *selectable_if (shed_key = \"found\") #Try the key labeled \"NW shed\". Maybe that's what unlocks it.\n    You are unable to unlock the lighthouse. Maybe another key will do the trick.    \n    *goto lighthouse_door\n  *disable_reuse  *selectable_if (shed_key_2 = \"found\") #Try the key labeled \"E shed\". Maybe that's what unlocks it.\n    You are unable to unlock the lighthouse. Maybe another key will do the trick.\n    *goto lighthouse_door\n  *disable_reuse  *selectable_if (castle_key = \"found\") #Try the key labeled \"Cast\". Maybe that's what unlocks it.\n    You are unable to unlock the lighthouse. Maybe another key will do the trick.\n    *goto lighthouse_door\n  *selectable_if (lighthouse_key = \"found\") #Try the key labeled \"Light\". Maybe that's what unlocks it.\n    You successfully unlock the lighthouse. You open the door slowly, just on the off chance that somehow a dinosaur or other creature is inside. Luckily, there is none, and you walk in, closing the door behind you so that you're not followed. You look around you and mostly see what appears to be a lobby area. Other than that, all you can see there is a staircase going directly up.\n    *set lighthouse \"unlocked\"\n    *goto inside_lighthouse\n  *disable_reuse  *selectable_if (Second_floor_key = \"found\") #Try the key labeled \"2\". Maybe that's what unlocks it.\n    You are unable to unlock the lighthouse. Maybe another key will do the trick.\n    *goto lighthouse_door\n  *disable_reuse  *selectable_if (Third_floor_key = \"found\") #Try the key labeled \"3\". Maybe that's what unlocks it.\n    You are unable to unlock the lighthouse. Maybe another key will do the trick.\n    *goto lighthouse_door\n  *disable_reuse  *selectable_if (Green_house_key = \"found\") #Try the key labelled \"green\". Maybe that's what unlocks it.\n    You are unable to unlock the lighthouse. Maybe another key will do the trick.\n    *goto lighthouse_door\n  *disable_reuse  *selectable_if (church_key = \"found\") #Try the key labelled \"ch\". Maybe that's what unlocks it.\n    You are unable to unlock the lighthouse. Maybe another key will do the trick.   \n    *goto lighthouse_door\n  *disable_reuse  *selectable_if (secret_key = \"found\") #Try the key labelled \"?\". Maybe that's what unlocks it.\n    You are unable to unlock the lighthouse. Maybe another key will do the trick.   \n    *goto lighthouse_door\n  #Go back to where I was before.\n    You return to the crossroads.\n    *goto crossroads\n\n*label lighthouse_unlocked\n\nYou and ${partner_name} walk up to the lighthouse and walk in.\n\n*goto inside_lighthouse\n\n*label lighthouse_done\n\nYou and ${partner_name} return to the lighthouse.\n\n*goto inside_lighthouse\n\n*label inside_lighthouse\n\n*set lighthouse \"done\"\n\n*choice\n  #I look around the lobby\n    *if (LH_Meds = \"missing\")\n      You look around and find something with a first aid symbol on it. You show it to ${partner_name} who gets excited and says it something that can enhance how quickly plants grow. You ask ${them} how, but are unable to understand ${their} answer.\n      *set LH_Meds \"found\"\n      *goto inside_lighthouse\n    *else\n      Find nothing. The medical supplies that assist with plant growth were the only thing here that seemed useful.\n      *goto inside_lighthouse\n  #I go upstairs\n    *if (castle_key = \"missing\")\n      You head up the stairs to see that there's simply an office. After checking the drawers, you can only find a key labelled \"Cast\". You're not sure what it means, but decide to keep it in case it unlocks something useful.\n      *set castle_key \"found\"\n      *goto inside_lighthouse\n    *else\n      You go back to the office upstairs and see that there's nothing useful.\n      *goto inside_lighthouse\n  #I return to the crossroads\n    You return to the crossroads\n    *goto crossroads\n\n*label greenhouse\n\nYou go over to the greenhouse to discover that it's now been completely overgrown. Sometime in the last 2 years, the plants grew so much that they burst through and shattered the glass, leaving nothing but a place for several dinos to feed. As a result, you return to the crossroads\n\n*goto crossroads\n\n\n*label shed\n\n*if (shed_2 = \"Unexplored\")\n  *goto shed_2_unexplored\n*elseif (shed_2 = \"Explored\")\n  *goto shed_2_explored\n*elseif (shed_2= \"unlocked\") \n  *goto inside_shed_2\n*else\n  *goto shed_2_done\n\n*label shed_2_unexplored\n\nAs you and ${partner_name} approach the shed, you can see that this one is rather large. You estimate it as being about 15 feet long, 10 feet wide and 9 feet high. Its also located around a whole bunch of rocks and only about 20 or so feet away from the ocean. The two of you look at each other, curious to if there's anything worthwhile in there.\n\n*set shed_2 \"Explored\"\n\n*goto shed_2_door\n\n*label shed_2_explored\n\nYou and ${partner_name} go back to the shed, wondering if you can unlock it this time.\n\n*goto shed_2_door\n\n*label shed_2_door\n\n*choice\n  *disable_reuse  *selectable_if (shed_key = \"found\") #Try the key labeled \"NW shed\". Maybe that's what unlocks it.\n    You are unable to unlock the shed. Maybe another key will do the trick.    \n    *goto shed_2_door\n  *selectable_if (shed_key_2 = \"found\") #Try the key labeled \"E shed\". Maybe that's what unlocks it.\n    You are able to unlock the shed. You figure that \"E\" must have stood for East.\n    *set shed_2 \"unlocked\"\n    *goto inside_shed_2\n  *disable_reuse  *selectable_if (castle_key = \"found\") #Try the key labeled \"Cast\". Maybe that's what unlocks it.\n    You are unable to unlock the shed. Maybe another key will do the trick.\n    *goto shed_2_door\n  *disable_reuse  *selectable_if (lighthouse_key = \"found\") #Try the key labeled \"Light\". Maybe that's what unlocks it.\n    You are unable to unlock the shed. Maybe another key will do the trick.\n    *goto shed_2_door\n  *disable_reuse  *selectable_if (Second_floor_key = \"found\") #Try the key labeled \"2\". Maybe that's what unlocks it.    \n    You are unable to unlock the shed. Maybe another key will do the trick.\n    *goto shed_2_door\n  *disable_reuse  *selectable_if (Third_floor_key = \"found\") #Try the key labeled \"3\". Maybe that's what unlocks it.\n    You are unable to unlock the shed. Maybe another key will do the trick.\n    *goto shed_2_door\n  *disable_reuse  *selectable_if (Green_house_key = \"found\") #Try the key labelled \"green\". Maybe that's what unlocks it.\n    You are unable to unlock the shed. Maybe another key will do the trick.    \n    *goto shed_2_door\n  *disable_reuse  *selectable_if (church_key = \"found\") #Try the key labelled \"ch\". Maybe that's what unlocks it.\n    You are unable to unlock the shed. Maybe another key will do the trick.   \n    *goto shed_2_door\n  *disable_reuse  *selectable_if (secret_key = \"found\") #Try the key labelled \"?\". Maybe that's what unlocks it.\n    You are unable to unlock the shed. Maybe another key will do the trick.   \n    *goto shed_2_door\n  #Go back to where I was before.\n    You return to the crossroads.\n    *goto crossroads\n  #I go back to the middle of the island. There's nothing left here for me.\n    *goto_scene 2_center  \n\n*label inside_shed_2\n\nYou and ${partner_name} look inside the shed to see that there is a motor on the ground. ${partner_name} then excitedly bursts out \"This is for the type of boat that I can build.\" You grab the motor, hoping that ${partner_name} can use it to hep you. The two of you then go back to the crossroads.\n\n*set motor \"found\"\n*set shed_2 \"done\"\n*goto crossroads\n\n*label shed_2_done\n\nYou two look around the shed to see that there's nothing left to pick up. You see shelves have fallen to the ground, but they don't have anything useful on them. You return to the crossroads\n\n*goto crossroads\n\n\n\n", "2_n": "*if (North = \"Unexplored\")\n  *goto north_unexplored\n*elseif (North = \"explored\")\n  *goto north_explored\n*else \n  *goto north_done\n\n*label north_unexplored\n\n${partner_name} turns to you \"You didn't come here before, did you?\"\n\n\"No I didn't you're right,\" you say in response. \"I thought it was too dangerous.\"\n\n\"Then why are you coming here now?\" ${partner_name} asks. \"Why are you coming here with me!?!?\" Their tone isn't one of their usual playfulness, but of anger.\n\n\"It's no longer restricted,\" you respond. \"Also, it used to be if you come to this part of the island you can't go back. That's not true anymore, since some of the people who came here cleared that part out.\"\n\n\"Oh,\" they respond in a tone you find familiar. It's the one they use when they felt like they had you cornered in an argument, but then you make a point that convinces ${them} otherwise. They then perk up. \"It might be here,\" you hear ${them} say, placing some stress on the 'it' part.\"\n\nYou can tell they're trying to get you to ask what they mean by 'it'. Do you ask?\n*choice\n  #Yes, it might be useful information.\n    \"What might be here?\" you ask inquisitively. \n    *set partner %+15\n    *goto reveal\n  #Yes, but I make it clear I'm only doing it to make ${them} shut up.\n    \"What might be here?\" you ask with a breadth of annoyance in your voice.\n    *set partner %+5\n    *goto reveal\n  #No, they're trying to force an argument. I pretend I don't know what they're asking for.\n    *set partner %-5\n    *goto no_reveal\n\n*label reveal\n\n\"The dinosaur that ate my phone,\" ${partner_name} responds. You feel a fix of emotions. Which for you is the most powerful?\n\n*fake_choice\n  #Excitement. I could get the phone back.\n    You feel a rush of adrenaline through your veins at the chance to get off the island.\n  #Fear. This could be dangerous. They said the dinosaur was one of the big ones.\n    You're scared that something this size could kill you.\n  #Nervous. I don't know what else is here.\n    You're on edge, on the lookout for anything that could kill you.\n  #Curiosity. I might find more out.\n    You will find out more of what's here. It might not be what you expect, though.\n  #I can't tell which of these is the strongest.\n    Understandable. There's a lot to take in here.\n  #Primal terror. ${partner_name} could get killed.\n    You're scared  of losing ${partner_name}. You're reminded that that's the reason you canme here in the first place.\n\nRegardless of how you feel, you stop to speak with ${partner_name}. What do you say to ${them}?\n\n*choice\n  #That's a good idea.\n    \"Thanks,\" says ${partner_name} happily but quietly.\n    *set partner %+15\n    *goto troodon\n  #Okay, make sure you point it out to me.\n    \"Okay,\" says ${partner_name}.\n    *set partner %+10\n    *set Allo \"true\"\n    *goto troodon\n  #Are you sure that's safe? Didn't you say it was one of the bigger ones?\n    \"Well, I lived, didn't I?\" ${partner_name} says back, as if insulted that you thought they would die.\n    *set partner %-5\n    *goto troodon\n  #Probably not. I think it's ruined now.\n    \"There you are, blaming me again,\" ${partner_name} says in a rather annoyed tone.\n    *set partner %-10\n    *goto troodon\n\n*label no_reveal\n\n${partner_name} falls silent and you two walk for a few minutes without conversation. There's a scowl clearly visible on ${their} face.\n\n*goto troodon\n\n*label north_explored\n\n\"So this is where you got off last time, right?\" asks ${partner_name}. \n\nYou nod to confirm as you say \"Yes, this is where I found the boat.\"\n\n\"Then why are you coming back here? If you took the boat when you left, then it's gone. Why would you come back here if there's nothing?\" You can tell that ${their} tone has little patience in it at the moment, so you give a direct answer.\n\n\"There might still be something here,\" you respond quickly, with just a touch of anger.\n\n${partner_name} sighs and follows you, but doesn't see to want to take direction from you at the moment. What do you do?\n\n*choice\n  #Apologize for my tone.\n    \"I'm sorry for yelling,\" you say in a much softer voice. \"It's just, I don't know everything that was done here, and don't want to miss something simply because I didn't look in a spot. I'll try not to do it again.\"\n    \"Its okay,\" they say back. The scowl is now gone from ${their} face, and you're a little bit calmer in ${their} presence.\n    *set partner %+10\n    *goto troodon\n  #Ignore ${their} bad mood.\n    They keep a scowl on ${their} face, and you're not sure whether or not you should have said something to calm ${them} down.\n    *set partner %-5\n    *goto troodon\n\n\n*label north_done\n\nYou and ${partner_name} return to the northern part of the island. \n\n*goto troodon\n\n*label troodon\n\n*if (troodon = \"alive\")\n  *goto troodon_encounter\n*else\n  *goto archaeopteryx\n\n*label troodon_encounter\n\nAfter you and ${partner_name} walk for a few minutes, you hear something in the bushes, and out pops an eight-foot long feathered dinosaur, which turns to look at you. \"Troodon,\" says ${partner_name} \"largest brain-to-body ratio of any dinosaur.\"\n\nBefore you can confirm that ${partner_name} is correct, it begins to charge at you. Its too late to sneak by this one, and have to face it in some way. What do you do?\n\n*choice\n  #Fight it directly. It's small, I can handle it easily.\n    *if (athletics > 2)\n      As it charges at you, you take out your axe and smash it easily. The dinosaur is knocked back several feet and collapses on the ground, dead in a single shot. You stand there, victorious with ${partner_name} giving you a hug from behind.\n      \"Nice,\" ${partner_name} says. \"Its brains are no match for your brawns,\" ${partner_name} continues, letting ${their} grip go a little bit.\n      *set partner %+10\n      *goto archaeopteryx\n    *else\n      As it charges at you, you take out your axe and although you land a hit, you do very little actual damage. It jumps on you, and ${partner_name} grabs it, throwing it off of you. The creature looks back at you and leaves as quick as it can.\n      \"Still need me, don't ya?\" ${partner_name} replies cheekily.\n      *set health -2\n      *set partner %-5\n      *goto archaeopteryx \n  *selectable_if (ammo > 0) #Shoot it with your rifle, using 1 ammo.\n    You line up your shot and take it down easily. It's as dead as you thought all dinosaurs were before you ever got to this island.\n    \"Nice shot!\" exclaims ${partner_name}\n    *set partner %+5\n    *set ammo -1\n    *goto archaeopteryx \n\n\n*label archaeopteryx \n\n*if (archaeopteryx  = \"alive\")\n  *goto archaeopteryx_encounter\n*else\n  *goto Utah_Raptor\n\n*label archaeopteryx_encounter\n\n*set troodon \"dead\"\n\nYou and ${partner_name} walk forward to see a bird-like creature in front of you. You immediately recognize it as archaeopteryx, a small feathered creature that blurred the line between bird and dinosaur. \"Okay,\" you say to yourself. \"This should be easy to handle.\" \n\n${partner_name} then chimes in, as if you were talking to ${them} \"It's so small, barely the size of the robins that come to our birdhouse.\" \n\n\"Yeah, but everything we've seen on this island seems capable of killing us. I don't know if this is any different.\"\n\n*choice\n  #Casually walk by it. There's no way this is a threat.\n    You're able to walk by it without causing an attack.\n    *set partner %+10\n    *goto Utah_Raptor\n  #Fight it. I can easily take this thing out.\n    You run at the creature, and it appears to be terrified. It gets up and flies away as quick as it can.\n    *goto Utah_Raptor\n  #Sneak by. \n    You successfully sneak by the creature.\n    *goto Utah_Raptor\n  *selectable_if (ammo > 0) #Shoot it with your rifle, using 1 ammo.\n    You line up your shot and nail the creature. The overkill is obvious.\n    \"I don't think you had to do that,\" says ${partner_name}. It wasn't a threat.\n    *set partner %-5\n    *set ammo -1\n    *goto Utah_Raptor\n  #Return to the center of the island.\n    You return to the center of the island.\n    *goto_scene 2_center \n\n*label Utah_Raptor\n*set archaeopteryx \"dead\"\n\n*if (Utah_Raptor  = \"alive\")\n  *goto Utah_Raptor_encounter\n*else\n  *goto heal\n\n*label Utah_Raptor_encounter\n\nYou walk around with ${partner_name} following you, and you stop when you hear some whelping in the distance. You look towards the sounds to see a small pack of raptors several football fields away, and partially off to the side of where you intend to go. These raptors are relatively large, however, coming in at about 12 feet long each. You originally think they're velociraptors, but then know that velociraptors are smaller than that. Then it comes to mind: Utah Raptor. This type of creature is even worse, its bigger, faster and stronger. You could take a velociraptor in a straight fight 1 on 1 without taking much damage, but these are different. Even one is a threat to kill one of you, and a fight against two of them would cause brutal damage at best, and possibly kill both of you at worst.\n\n${partner_name} opens ${their} mouth as if ready to scream, but quickly covers ${their} mouth with ${their} hand before letting out a sound. You're happy that after a few encounters with deadly creatures that they've become much more aware of their fear possibly giving away their position, and let out an extremely quiet sigh of relief. ${partner_name} holds ${their} finger up to ${their} lips as if making a \"ssshhhh\" gesture, only to follow it up with a playful wink. You smile in response, having needed the relief of a light-hearted joke, regardless of how brief and predictable it was. After that, you look ahead to the group of raptors, wondering what you could possibly do to get by them. A few ideas come to mind, but you're not sure what to do.\n\n*choice\n  #Sneak by them. If they can't see us, they won't chase us, and I don't want to fight these things.\n    *if (stealth > 3)\n      You and ${partner_name} attempt to sneak by. You move very slowly and quietly in an attempt to not attract any attention. After half an hour of crawling around in long grass and hiding behind trees and rocks, you notice that the raptors have left. You and ${partner_name} slowly turn around a full 360 degrees before crawling out and returning to a normal pace of walking, relieved that you're no longer being followed.\n      *set partner %+10\n      *goto heal\n    *else\n      You and ${partner_name} attempt to sneak by. You move very slowly and quietly in an attempt to not attract any attention. After a few minutes of crawling around in the long grass, you accidentally make some noise as you slip, and one of the raptors notices you and charges. The others stay back, as if unconvinced that there was anything there. The one in pursuit of you jumps at ${partner_name} who attempts to fight it off. What do you do to save ${partner_name}?\n      *choice\n        #Fight the raptor.\n          *if (athletics > 3)\n            You're able to fight the raptor off relatively easily, as it goes running off on its own in a seemingly arbitrary direction. You look quickly to the others to see them chasing their packmate while leaving you and ${partner_name} alone.\n            \"Well, you kind redeemed yourself for your mistake in alerting them. Thanks, I guess,\" says ${partner_name}\n            \"You alright?\" you respond.\n            \"Mostly,\" they answer.\n            Not sure how to respond, you let the conversation peter out, and accept that ${partner_name} is okay.\n            *goto heal\n          *else\n            You attempt to fight off the creature, but it takes a long while. After about 10 seconds of carnage (that felt like 10 minutes), it retreats, taking its packmates with it, leaving you and a bleeding ${partner_name}.\n            \"Are you okay?\" you ask ${them}.\n            \"What are you doing? You alerted it, and couldn't even fight it off!?\"\n            \"I'm sorry,\" you say apologetically, as they continue further north. You want to do more to ease ${their} pain but aren't sure about whether or not you'd only make things worse. You reluctantly follow ${them}, wanting to make up for your mistake.\n            *set partner %-10\n            *goto heal\n        *selectable_if (ammo > 0) #Shoot it with my rifle. \n          The second that the creature pounces on ${partner_name} you fire, hitting the attacker in the head at point-blank range causing an instant kill.\n          \"Thanks,\" ${partner_name} responds, before continuing down the path. You follow, surprised by ${their} enthusiasm.\n          *set ammo -1\n          *goto heal\n  #Run by them as fast as I can. They're far away now, so it'll force them to close the distance.\n    *if (athletics > 3)\n      You and ${partner_name} wait for a moment where none of the raptors are looking and then both of you make a run for it. You can hear the raptors yelping, presumably to tell each other where you are. You can hear their cries getting louder as they begin to chase you. Just as they're on your tail, you're more scared than you've ever been. However, after a few seconds, you hear the cries getting quieter again. These things were built for speed, not endurance, and as a result, your attempt to outlast them is successful. You continue running for as long as you can just in case they continue chasing you.\n      \"I thought they had us,\" says ${partner_name} while panting after the two of you finally stop.\n      \"I know,\" you respond, panting just as heavily.\n      The two of you share a passionate embrace, with both your heartbeats as high as they've ever been.\n      *set partner %+10\n      *goto heal\n    *else\n      You and ${partner_name} wait for a moment where none of the raptors are looking and then both of you make a run for it. You can hear the raptors yelping, presumably to tell each other where you are. You can hear their cries getting louder as they begin to chase you. Just as they're on your tail, you're more scared than you've ever been. While on your tail, one of them jumps on you, landing on your back and forcing you to land on your belly and causing you to yell in pain. ${partner_name}, who is only a foot or so ahead of you, turns around and roundhouse kicks the dinosaur in the face, knocking it back. The creature stumbles back, allowing you to get up and grab your axe. A second raptor attempts to attack you, but now that you have your axe, you smash the creature in the neck, knocking it back. Both raptors now retreat, with the others turning around as well.\n      \"We make a pretty good team,\" says ${partner_name}, giving you a high five.\n      \"Yeah, we do,\" you say. \"I'm fine by the way.\"\n      *set partner %+10\n      *set health -4\n      *goto heal \n  *selectable_if (ammo > 0) #Shoot one of them with my rifle. It should scare the rest away.\n    You line up a shot, aiming directly for the largest of the raptors. Knowing that you have the time, and a difficult shot due to the distance, you take a few minutes to ensure that your aim is just right. ${partner_name} waits patiently, seeming to understand your situation. When you finally do pull the trigger, you look intently at your target, which does fall as you intended. The other raptors all run off away from you as if they know what you're capable of.\n    *set ammo -1\n    *goto heal\n  #Return to the center of the island. I'm not ready for this and could use a chance to regroup.\n    You return to the center of the island to handle this later.\n    *goto_scene 2_center \n\n*label heal\n\n*if (health \u003c 1)\n  You, however, are not fine. You collapse on the ground, as ${partner_name} panics. You attempt to get up using all your might, but your might has faded, as you don't even have the strength to lift yourself up anymore. You pass away, with ${partner_name} at your side.\n  *goto_scene death\n\n*set Utah_Raptor \"dead\"\nYou and ${partner_name} reach the next stage of the island and finally have a moment to yourselves. ${partner_name} suggests that you two stop for a moment to take advantage of the quiet moment so you can both rest. You look around to double-check that there's no threat, and once you see that there's nothing near the two of you, you agree to take a few minutes to rest up. After catching your breath for a couple of minutes, you have a few options.\n\n*choice\n  *selectable_if (Medkits > 0) #Heal ${partner_name} using a medkit.\n    *set partner %+10\n    \"Thanks,\" says ${partner_name}, thankful that you healed ${their} wounds.\n    *set Medkits -1\n    *goto heal\n  #Continue on.\n    You and ${partner_name} continue further down the island.\n    *goto trex\n  #Go back to the middle of the island.\n    *goto_scene 2_center\n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto heal\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Cave_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Cave_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Cave_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Cave_Heal\n          *else\n            *set Health + 5\n            *goto Cave_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto heal\n  *selectable_if (map = \"new\") #Look at the map.\n    You look at the map. You can see the north is no longer restricted, but still has several dangerous dinosaurs and little to no apparent reward. The North East has a castle, while the East has a lighthouse, a greenhouse and a shed. The South East is labelled as the industrial area and has a factory, a lab and a storage area. The South as a church, a swamp and a town featuring houses, a bar, a general store, an arena and a town hall. The South West is packed with nature, as it contains a river and waterfall headed into a lake, hills and mountains, while the West has a beach which also acts as a dock for ships. The North West has a shed in the middle of grasslands.\n    *goto heal\n\n*label Cave_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Cave_Heal_2\n\n*label Cave_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto heal\n  *selectable_if (Medkits > 0) #Heal ${partner_name} using a medkit.\n    *set partner %+10\n    \"Thanks,\" says ${partner_name}, thankful that you healed ${their} wounds.\n    *set Medkits -1\n    *goto heal\n  \n*label trex\n\n*if (trex = \"dead\")\n  *goto allosaurus\n*elseif (trex = \"seen\")\n  *goto trex_seen\n*else\n  *goto trex_encounter \n\n*label trex_encounter\n\n*set trex \"seen\"\n\nAfter hearing the loud roar of a distant animal, you stop for a second. You look off into the distance and see a huge theropod, over 40 feet long, feeding on the corpse of another dinosaur. You instantly recognize it as a t-rex, the most famous and most feared dinosaur of all. You get on the ground, tempted to go back to where you were. But then again, you have the feeling that there's something on the other side of it. You look over at ${partner_name} for comfort, and see ${them} completely frozen in fear. You decide to hide in the bushes, still, several football fields away from what is most likely the most terrifying thing on the island, with ${partner_name} following you. \"Are we continuing, or staying back here?\" asks ${partner_name}. That's a good question, and after thinking about it for a second, you say that...\n\n*goto trex_choice\n\n*label trex_seen\n\nYou return to where you were when you first saw the trex. It's still there, still eating. You and ${partner_name} look at each other wondering what to do.\n\n*label trex_choice\n\n*choice\n  #We should go back. Even if there's something nearby, its not worth the risk.\n    You return to the center of the island, hoping that there's some alternative to what you're facing.    \n    *goto_scene 2_center\n  #We carry on. Clearly, there's some way to make it by that thing, and we can find something we need to make it off the island.\n    You choose to face the t-rex...somehow.\n    *goto fight_trex\n\n*label fight_trex\n\nYou decide that you have to face your very rational fear of trexes, and ${partner_name} follows you reluctantly. You now have some time to decide about what you could possibly do to get by it.\n\n*choice\n  #Attempt to sneak by. It's currently eating something, and that means its distracted. This is our best chance.\n    *if (stealth > 4)\n      You and ${partner_name} attempt to sneak behind the t-rex while it's distracted. It's hard to find the right balance between being careful enough not to alert it and being fast enough to get by it, but the two of you start off slow, occasionally gaining speed when the t-rex seems like its most distracted. After what feels like an hour, but probably more like 5-10 minutes, the two of you are successfully able to get by it, but choose to remain silent. You look back, seeing just how close it is and continue to move slowly. \n      It seems finished its meal and sniffs the air. You prepare to run away, but after a few seconds, the t-rex begins to walk in the opposite direction of you and ${partner_name}. It either hadn't smelled you or had smelled much bigger food. Either way, you're just glad it's over.\n      *set partner %+10\n      *set trex \"dead\"\n      *goto allosaurus\n    *else\n      You and ${partner_name} attempt to sneak behind the t-rex while it's distracted. It's hard to find the right balance between being careful enough not to alert it, and being fast enough to get by it, and the two of you seem to have found the right balance, but it turns out you were wrong. You begin running quite early, and the t-rex hears you. You and ${partner_name} are pursued. The two of you splt up, and the t-rex decides to chase you, and eats you up with a single bite. You die seconds after being inside its mouth, and will never know the fate of ${partner_name}\n      *goto_scene death      \n  *selectable_if (ammo > 0) #Shoot it with your rifle, using 1 ammo. I think that'll bring it down.\n    You grab your rifle, unsure of if its powerful enough to bring down a t-rex, but think it's worth a shot. You aim and fire, shooting it in the neck. You create a massive hole in its neck, and the creature writhes in pain, flailing around its tiny arms in an obviously failed attempt to cover up its wound. After seconds of loud roars and large movements, it falls to the ground. You wait a few minutes for it to try and get up, and it has stopped moving entirely. You look to ${partner_name} to see a relieved look on ${their} face. ${partner_name} kisses you right on the lips.\n    *set partner %+10\n    *set trex \"dead\"\n    *set ammo -1\n    *goto allosaurus\n  #Attempt to run by. It's worth a shot, and I can't do anything else.\n    You make an attempt to run right by the monster, but it can hear you almost instantly. It turns to face you directly when you're near it, giving you no time to react in a way that would save your life. You and ${partner_name} are both eaten up quite quickly. \n    *goto_scene death\n  #Wait, nevermind. I don't like these options. Can I go back?\n    Yeah, there are other ways off the island. You can return to the middle\n    *goto_scene 2_center\n\n*label allosaurus\n\n*if (allosaurus = \"alive\")\n  *goto find_allo\n*elseif (allosaurus = \"seen\")\n  *goto found_allo\n*else\n  *goto dead_allo\n\n*label find_allo\n\nAs you and ${partner_name} continue forward towards the end of the island, and can now see the end of it. You see no building, no boat, no tools, nothing that can take you off the island. However, you can see another large dinosaur that's almost as big as t-rex there. This one is close to 35 feet long. You look towards ${partner_name} and see ${their} face contort somewhat as if they're attempting to remember something about this particular dinosaur. You think for a second about everything they've said since you rescued them, and look back and forth between ${partner_name} and the dinosaur, trying to put the puzzle together.\n\n*set allosaurus \"seen\"\n\n*if (Allo = \"true\")\n  You then recognize this as an allosaurus. \"Is this the one that ate your phone?\" you ask ${partner_name}.\n  \"Yes!\" they exclaim. \"Is there any way to get it?\"\n  You're not sure, but it excites you, knowing that you at least have a chance to get it back. \n  *goto face_allo\n*else\n  You recognize this as an allosaurus but aren't sure why ${partner_name} is making faces.\n  *goto face_allo\n\n*label found_allo\n\nYou and ${partner_name} see the allosaurus again.\n\n*label face_allo\n\nYou look at the allosaurus and wonder what to do.\n\n*choice\n  #Go back to the center of the island. If there's nothing here, I'm going to leave.\n    You return to the center of the island.\n    *goto_scene 2_center\n  *selectable_if (ammo > 0) #Shoot it with your rifle, using 1 ammo. I think that'll bring it down.\n    You line up your shot and blast the creature in the neck with your rifle. It falls to the ground, but more importantly, you see something fall from its now open neck. \"My phone!\" yells ${partner_name} who sees it fall. After running after it, ${Partner_name} finds it right beside the dinosaur.\n    \"Careful!\" you yell towards ${partner_name}, who's dangerously close to the dinosaur lying on the ground. Despite its lack of movement, you're scared that it might still be alive. After looking at ${their} phone for a second, they walk away from the dino. The creature is probably dead, but you're both being careful just in case. \n    After attempting to look through ${their} phone for a second, ${partner_name} says \"Its battery is dead, but otherwise fine. If we can replace the battery, we'll be fine.\"\n    With mixed emotions, you head back the center of the island.\n    *set allosaurus \"dead\"\n    *set phone \"found\"\n    *goto_scene 2_center\n\n*label dead_allo\n\nYou reach the dead allosaurus. Nothing to be found here. You return to the center of the island.\n\n*goto_scene 2_center\n    \n", "2_ne": "*if (North_East = \"Unexplored\")\n  *goto unexplored\n*elseif (North_East = \"explored\")\n  *goto explored\n*else\n  *goto done\n\n*label unexplored\n\nYou decide to go with ${partner_name} to the northeast, and towards the castle. You look at it and see that the castle is 3 stories tall. It's still pretty fresh, and if you didn't know any better, you'd think that there was still somebody living there due to the lack of damage, rust or other signs of deteriorating on the building. In fact, with the exception of a couple of windows being smashed, it looks like it could have had its construction finished just yesterday. ${partner_name} begins to smile at you as they say \"I wonder what's in there?\" they say in a genuinely excited voice. What do you say in response?\n\n*choice\n  #\"Me, to.\"\n    \"This is so exciting!\" they say. Before you can respond, a rustling sound comes from the bushes and ${partner_name} stops. \"Did you hear that?\" they ask in an alert but assertive manner.\n    *set partner %+15\n    *goto attack\n  #\"Probably something that can help us get off here.\"\n    \"I hope so,\" they respond, excitedly. Immediately afterwards, a rustling sound comes from the bushes and ${partner_name} stops. \"Did you hear that?\" they ask in an alert but assertive manner.\n    *set partner %+20\n    *goto attack\n  #\"Probably nothing. It's unlikely that I can get off here by finding random crap twice.\"\n    \"Come on, let's show a little bit of optimism alright?\" It seems as though they were wishing to continue, but suddenly they get interrupted by a rustling sound from the bushes. \"Did you hear that?\" they ask in an alert but assertive manner.\n    *set partner %-5\n    *goto attack\n  #\"Shut up, I'm trying to concentrate.\"\n    \"Don't be so rude,\" they pipe back in a slightly hissy voice. You're thinking about what to say when you catch a rustling sound coming from the bushes and ${partner_name} stops. \"Did you hear that?\" they ask in an alert but assertive manner.\n    *set partner %-10\n    *goto attack\n  #I say nothing\n    After a delay of a couple of seconds, ${partner_name} responds with a plain and simple \"Did you hear me?\" As you nod to confirm, a rustling sound comes from the bushes and ${partner_name} stops. \"Did you hear that?\" they ask in an alert but assertive manner.\n    *goto attack\n  \n\n*label explored\n\nYou decide to go with ${partner_name} to the northeast, and towards the castle. The castle seems to be almost completely unchanged since you were on the island a couple of years ago. You begin to think of the events of a couple years back, with mixed emotions. You remember that some horrifying stuff happened, but are happy for everything you found in the castle, and its role in helping you escape. ${partner_name} begins to smile at you as they say \"I wonder what's in there?\" they say in a genuinely excited voice, as they move towards the castle.\n\n*choice\n  #\"Well, the treasure's gone.\"\n    \"I know,\" they respond. \"Just curious if there's...\" they're cut off by a rustling sound comes from the bushes and ${partner_name} stops. \"Did you hear that?\" they ask in an alert but assertive manner.\n    *set partner %+10\n    *goto attack\n  #\"Probably whatever the people here between my last visit and now left behind.\"\n    \"Okay...\" they seem disappointed by your underwhelming and serious answer. However, after a few seconds of silence, a rustling sound comes from the bushes and ${partner_name} stops. \"Did you hear that?\" they ask in an alert but assertive manner.\n    *set partner %-5\n    *goto attack\n  #\"Probably something that can help us get off here.\"\n    \"I hope so,\" they respond, excitedly. Immediately afterwards, a rustling sound comes from the bushes and ${partner_name} stops. \"Did you hear that?\" they ask in an alert but assertive manner.\n    *set partner %+15\n    *goto attack\n  #\"Probably nothing. It's unlikely that I can get off here by finding random crap twice.\"\n    \"Come on, let's show a little bit of optimism alright?\" It seems as though they were wishing to continue, but suddenly they get interrupted by a rustling sound from the bushes. \"Did you hear that?\" they ask in an alert but assertive manner.\n    *set partner %-5\n    *goto attack\n  #\"Shut up, I'm trying to concentrate.\"\n    \"Don't be so rude,\" they pipe back in a slightly hissy voice. You're thinking about what to say when you catch a rustling sound coming from the bushes and ${partner_name} stops. \"Did you hear that?\" they ask in an alert but assertive manner.\n    *set partner %-10\n    *goto attack\n  #I say nothing\n    After a delay of a couple of seconds, ${partner_name} responds with a plain and simple \"Did you hear me?\" As you nod to confirm, a rustling sound comes from the bushes and ${partner_name} stops. \"Did you hear that?\" they ask in an alert but assertive manner.\n    *goto attack\n\n\n*label done\n\nYou and ${partner_name} return to the northeast and as you approach the castle, notice the pterosaur corpse rotting on the ground near you. No matter how many of these things you take out, you'll always feel some shred of guilt, but you can't let it have an impact on you as the two of you do have to survive this island.\n\n*goto castle_door\n\n*label attack\n\n*page_break\n\nYou both look toward the bush to see something move out of the bush, upward into the tree. \"Pterosaur,\" ${partner_name} says in a mostly emotionless tone.\n\n\"I know,\" you reply calmly, as your eyes dart up to the tree the creature moved to. After scanning for a minute and failing to see the creature, you see it burst out at you. At about 6 feet long, it looks like it could potentially scoop up either of you if it caught you by surprise. Since you both see it coming, you see that you should be able to survive this. Its fly directly towards you and you have to react fast.\n\n*choice\n  #Take out my axe to smash the pterosaur\n    *if (athletics > 3)\n      You pull out your axe, holding it with both hands. As the pterosaur flies at you, you smash it in the head, bashing its skull in, causing said skull to deform. The creature's corpse lies on the ground, motionless. You smash it a couple of times, relatively sure its dead, but don't want to take any chances.\n      \"Good job,\" ${partner_name} excited compliments, giving you a kiss on the cheek.\n      *set partner %+10\n      *goto castle_door\n    *if (athletics > 2)\n      You pull out your axe, holding it with both hands. As the pterosaur flies at you, you smash it in the head, clearly dealing damage to it. Despite the fact that you've clearly hit it as hard as you can, it remains aggressive and bites you in the side of your torso. You hit it a couple times, causing it to be knocked off of your side. Then ${partner_name} comes out of nowhere, tackling the creature to the ground, giving you the opportunity to hit its neck, chopping its head off.\n      \"Thanks for the help,\" you say to ${partner_name}.\n      \"You're welcome,\" they reply, looking at your now dead attacker before continuing towards to castle. \n      *set partner %+10\n      *set Health -2\n      *goto castle_door\n    *else\n      You pull out your axe, holding it with both hands. As the pterosaur flies at you, you smash it in the head but aren't able to deal much damage to it. It bites you in the side of the torso and is able to continue to bite you. You start feeling a rush of pain, causing you to drop your axe. As that moment, ${partner_name} tackles the creature to the ground. You now have enough time to pick up your axe and hit the creature in the head several times, finally killing it.\n      \"Thanks for the help,\" you say to ${partner_name}.\n      \"You're welcome,\" they reply, looking at your now dead attacker before continuing towards to castle. \n      *set partner %+10\n      *set Health -3\n      *goto castle_door\n  #Hide in the nearby shrubs\n    You jump into the nearby shrubs, and the creature switches its focus to ${partner_name}. It flies directly at ${them} and bites ${their} stomach. ${partner_name} attempts to grab a nearby stick, and puts it vertically in the creature's mouth, holding it open. ${partner_name} escapes, getting out of there before a second bite is taken. At that point, you burst out of the bushes, smashing the creature in the head, knocking it out. You then step on its neck and bash it in the head more, finishing it off.\n    \"Coward,\" ${partner_name} says to you, clearly referring to you avoiding the pterosaur's initial attack. You want to fight ${them} on this, but don't want to escalate the situation while in danger.\n    *set partner %-5\n    *goto castle_door\n  *selectable_if (ammo > 0) #Shoot the pterosaur with your rifle, using 1 ammo.\n    In a swift motion, you grab your rifle and pull the trigger, hitting the pterosaur a single moment before it would have grabbed ${partner_name}. The creature's momentum carries it beyond the two of you, and ${partner_name} looks back toward you, as you continue to hold the rifle. You put the rifle away and embrace ${partner_name}. \"So you are good with that thing,\" they say in an almost suggestive tone before returning your embrace.\n    *set partner %+10\n    *set ammo -1\n    *goto castle_door\n\n*label castle_door\n\n\n*if (North_East = \"Unlocked\")\n  *goto first_floor\n\nYou and ${partner_name} reach the door of the castle, but you're unable to open the door. \n\"Looks like our plans have been foiled by a locked door,\" ${partner_name} jokes.\n\"Relax I have keys,\" you snark back in a mostly upbeat tone, playing along with ${their} joke. \n\n*choice\n  *disable_reuse  *selectable_if (shed_key = \"found\") #Try the key labeled \"NW shed\". Maybe that's what unlocks it.\n    You are unable to unlock the castle. Maybe another key will do the trick.    \n    *goto castle_door\n  *disable_reuse  *selectable_if (shed_key_2 = \"found\") #Try the key labeled \"E shed\". Maybe that's what unlocks it.\n    You are unable to unlock the castle. Maybe another key will do the trick.\n    *goto castle_door\n  *selectable_if (castle_key = \"found\") #Try the key labeled \"Cast\". Maybe that's what unlocks it.\n    You can unlock the castle. As you walk inside, you notice that there are five doors within the castle. You can't tell if any of them are unlocked.\n    *set North_East \"Unlocked\"\n    *goto first_floor\n  *disable_reuse  *selectable_if (lighthouse_key = \"found\") #Try the key labeled \"Light\". Maybe that's what unlocks it.\n    You are unable to unlock the castle.  Maybe another key will do the trick.\n    *goto castle_door\n  *disable_reuse  *selectable_if (Second_floor_key = \"found\") #Try the key labeled \"2\". Maybe that's what unlocks it.\n    You are unable to unlock the castle. Maybe another key will do the trick.\n    *goto castle_door\n  *disable_reuse  *selectable_if (Third_floor_key = \"found\") #Try the key labeled \"3\". Maybe that's what unlocks it.\n    You are unable to unlock the castle. Maybe another key will do the trick.\n    *goto castle_door\n  *disable_reuse  *selectable_if (Green_house_key = \"found\") #Try the key labelled \"green\". Maybe that's what unlocks it.\n    You are unable to unlock the castle. Maybe another key will do the trick.\n    *goto castle_door\n  *disable_reuse  *selectable_if (church_key = \"found\") #Try the key labelled \"ch\". Maybe that's what unlocks it.\n    You are unable to unlock the castle. Maybe another key will do the trick.   \n    *goto castle_door\n  *disable_reuse  *selectable_if (secret_key = \"found\") #Try the key labelled \"?\". Maybe that's what unlocks it.\n    You are unable to unlock the door. Maybe another key will do the trick.   \n    *goto castle_door\n  #Go to the center of the island.\n    You return to the center of the island.\n    *goto_scene 2_center\n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto castle_door\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Cave_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Cave_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Cave_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Cave_Heal\n          *else\n            *set Health + 5\n            *goto Cave_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto castle_door\n\n*label Cave_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Cave_Heal_2\n\n*label Cave_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto castle_door\n\n*label first_floor\n\n*if (castle = \"Unexplored\")\n  You and ${partner_name} enter the castle, closing the door behind you. You see a smile come over ${partner_name}'s face, as you remember ${their} love for medieval culture. \n  *goto door_1\n*elseif (castle = \"Explored\")\n  \"This is exciting,\" they say enthusiastically.\n  \"Remember, we're here cause it'll help us get off the island,\" you respond in a calm but firm voice.\n  \"Okay, spoilsport,\" they say back in a surprisingly light-hearted tone, as they look to the five doors that are facing the two of you.\n  *set castle \"Explored\"    \n  *goto door_1\n*else\n  \"Back here again,\" ${partner_name} states in a half-serious, half snarky voice.\n  \"Yup,\" you reply, not really knowing what else to say, as you look at the five doors in front of you.\n  *goto door_1\n\n\n*label door_1\n*set castle \"Done\"\n\n*choice\n  #The first room.\n    You open the door to see a bedroom. A thought occurs to you as you look over to see ${partner_name}.\n    *if (partner > 70)\n      They're looking at you with a very sly look while winking at you. How do you respond?\n      *choice\n        #I nod and join ${them}.\n          They lead you into the room and you enjoy some time together.\n          *achieve hot\n          *goto first_floor\n        #I shake my head\n          They bow ${their} head in disappointment and say \"Alright, I guess we do have to get off the island.\"\n          *goto first_floor\n    *else\n      They look at you, shaking ${their} head, as if to say, \"Not in the mood\". Disappointed, you back out of the room.\n      *goto first_floor\n  #The second room.\n    \"This is the room that had the treasure,\" you say to ${partner_name}\n    \"I know,\" they say back. \"Looks like they've stripped the place of anything useful, though.\"\n    You look around to see that sadly, this is the case. There's nothing left here that has any real value.\n    *goto first_floor\n  #The third room.\n    You see a bathroom. You can go if you want.\n    *goto first_floor\n  #The fourth room.\n    You sadly see a nondescript room that appears completely empty. ${partner_name} begins to look disappointed in the lack of stuff that seems to be found here.\n    *goto first_floor\n  #The fifth room. \n    *label fifth_room\n    *if second_floor = \"locked\"\n      The door appears to be locked.\n      *choice\n        *disable_reuse  *selectable_if (shed_key = \"found\") #Try the key labeled \"NW shed\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto fifth_room\n        *disable_reuse  *selectable_if (shed_key_2 = \"found\") #Try the key labeled \"E shed\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.\n          *goto fifth_room\n        *disable_reuse  *selectable_if (castle_key = \"found\") #Try the key labeled \"Cast\". Maybe that's what unlocks it.\n          You can unlock the door. Maybe another key will do the trick.\n          *goto fifth_room\n        *disable_reuse  *selectable_if (lighthouse_key = \"found\") #Try the key labeled \"Light\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.\n          *goto fifth_room\n        *selectable_if (Second_floor_key = \"found\") #Try the key labeled \"2\". Maybe that's what unlocks it.\n          You can unlock the door. You head up the staircase.\n          *set second_floor \"unlocked\"\n          *goto second_floor\n        *disable_reuse  *selectable_if (Third_floor_key = \"found\") #Try the key labeled \"3\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.\n          *goto fifth_room\n        *disable_reuse  *selectable_if (Green_house_key = \"found\") #Try the key labelled \"green\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.\n          *goto fifth_room\n        *disable_reuse  *selectable_if (church_key = \"found\") #Try the key labelled \"ch\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.   \n          *goto fifth_room\n        *disable_reuse  *selectable_if (secret_key = \"found\") #Try the key labelled \"?\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.   \n          *goto fifth_room\n        #Go back to the first floor\n          You return to the first floor\n          *goto first_floor\n        #Go back to the center of the island.\n          You return to the center of the island.\n          *goto_scene 2_center\n    *else\n      You head up the staircase.\n      *set second_floor \"unlocked\"\n      *goto second_floor\n  #The middle of the island\n    You return to the center of the island\n    *goto_scene 2_center\n\n*label second_floor\n\n*if (second_floor = \"done\")\n  You and ${partner_name} return to the second floor to see the four doors again.\n  *goto door_2\n*else\n  You and ${partner_name} reach the second floor to see the fours doors there. Their eyes widen with excitement, seeing there's more to explore.\n  *set second_floor \"done\"\n  *goto door_2\n\n*label door_2\n\n\nAs you and ${partner_name} you look at the four doors, which one do you open?\n\n*choice\n  #The first door\n    You look around for a while, and despite the size of the room, you find absolutely nothing.\n    *goto second_floor\n  #The second door\n      The door appears to be locked.\n      *choice\n        *disable_reuse  *selectable_if (shed_key = \"found\") #Try the key labeled \"NW shed\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto second_floor\n   You return to the first floor\n          *goto second_floor\n        #Go back to the center of the island.\n          You return to the center of the island.\n          *goto_scene 2_center\n  #The third door\n    The third room contains nothing at all. Nothing at all. Nothing at all.\n    *goto second_floor\n  #The fourth door\n    *if third_floor = \"Unexplored\"\n      The door appears to be locked.\n      *choice\n        *disable_reuse  *selectable_if (shed_key = \"found\") #Try the key labeled \"NW shed\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto second_floor\n        *disable_reuse  *selectable_if (shed_key_2 = \"found\") #Try the key labeled \"E shed\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto second_floor\n        *disable_reuse  *selectable_if (castle_key = \"found\") #Try the key labeled \"Cast\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto second_floor\n        *disable_reuse  *selectable_if (lighthouse_key = \"found\") #Try the key labeled \"Light\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto second_floor\n        *disable_reuse  *selectable_if (Second_floor_key = \"found\") #Try the key labeled \"2\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto second_floor\n        *selectable_if (Third_floor_key = \"found\") #Try the key labeled \"3\". Maybe that's what unlocks it.\n          You are able to unlock the door. You head up another stairway. \n          *set third_floor \"unlocked\"   \n          *goto floor_3\n        *disable_reuse  *selectable_if (Green_house_key = \"found\") #Try the key labelled \"green\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto second_floor\n        *disable_reuse  *selectable_if (church_key = \"found\") #Try the key labelled \"ch\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.   \n          *goto second_floor\n        *disable_reuse  *selectable_if (secret_key = \"found\") #Try the key labelled \"?\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.   \n          *goto second_floor\n        #Go back to the first floor\n          You return to the first floor\n          *goto first_floor\n        #Go back to the center of the island.\n          You return to the center of the island.\n          *goto_scene 2_center\n    *else\n      You head up another stairway.\n      *goto floor_3 \n  #Return to the first floor.\n    You return to the first floor.\n    *goto first_floor\n\n*label floor_3\n\n*if (third_floor = \"done\")\n  You and ${partner_name} are back to the top and see the three doors.\n  *goto door_3\n*else \n  You and ${partner_name} reach the top of the castle. \"Well, this looks like it. A fun break while it lasted,\" they say.\n  *set third_floor \"done\"\n  *goto door_3\n\n\n*label door_3\n\nWhich door do you open?\n\n*choice \n  #The first door\n    The door appears to be locked.\n    *choice\n      *disable_reuse  *selectable_if (shed_key = \"found\") #Try the key labeled \"NW shed\". Maybe that's what unlocks it.\n        You are unable to unlock the door. Maybe another key will do the trick.    \n        *goto door_3\n      *disable_reuse  *selectable_if (shed_key_2 = \"found\") #Try the key labeled \"E shed\". Maybe that's what unlocks it.\n        You are unable to unlock the door. Maybe another key will do the trick.    \n        *goto door_3\n      *disable_reuse  *selectable_if (castle_key = \"found\") #Try the key labeled \"Cast\". Maybe that's what unlocks it.\n        You are unable to unlock the door. Maybe another key will do the trick.    \n        *goto door_3\n      *disable_reuse  *selectable_if (lighthouse_key = \"found\") #Try the key labeled \"Light\". Maybe that's what unlocks it.\n        You are unable to unlock the door. Maybe another key will do the trick.    \n        *goto door_3\n      *disable_reuse  *selectable_if (Second_floor_key = \"found\") #Try the key labeled \"2\". Maybe that's what unlocks it.\n        You are unable to unlock the door. Maybe another key will do the trick.    \n        *goto door_3\n      *disable_reuse  *selectable_if (Third_floor_key = \"found\") #Try the key labeled \"3\". Maybe that's what unlocks it.\n        You are unable to unlock the door. Maybe another key will do the trick.   \n        *goto door_3\n      *disable_reuse  *selectable_if (Green_house_key = \"found\") #Try the key labelled \"green\". Maybe that's what unlocks it.\n        You are unable to unlock the door. Maybe another key will do the trick.   \n        *goto door_3\n      *disable_reuse  *selectable_if (church_key = \"found\") #Try the key labelled \"ch\". Maybe that's what unlocks it.\n        You are unable to unlock the door. Maybe another key will do the trick.   \n        *goto door_3\n      *selectable_if (secret_key = \"found\") #Try the key labelled \"?\". Maybe that's what unlocks it.\n        *if (barrel = \"missing\")\n          You find what appears to be a barrel for a flare gun.\n          *if (flare = \"found\")\n            You also have the flare.\n          *if (flare = \"missing\")\n            You don't have any flares, though.\n          *if (trigger = \"found\")\n            You also have the trigger.\n          *if (trigger = \"missing\")\n            You're missing the trigger\n          *set barrel \"found\"\n          *goto door_3\n        *else\n          Since you removed the flare gun barrel, there's nothing l
