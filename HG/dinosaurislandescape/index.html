er_Part_B = \"found\")\n  Receiver (Residential Half)\n  *line_break\n*if (receiver = \"fixed\")\n  Fixed Receiver\n  *line_break\n\n\n*if (Return = \"Yes\")\n  [b]Flare Gun Parts[/b]\n  *line_break\n  *if (barrel = \"found\")\n    Barrel\n    *line_break\n  *if (flare = \"found\")\n    Flare\n    *line_break\n  *if (trigger = \"found\")\n    Trigger\n    *line_break\n  [b]Boat Parts[/b]\n  *line_break\n  *if (boatgas = \"found\")\n    Gas\n    *line_break\n  *if (motor = \"found\")\n    Motor\n    *line_break\n  *if (steeringwheel = \"found\")\n    Steeering Wheel\n    *line_break\n  *if (rudder = \"found\")\n    Rudder\n    *line_break\n  [b]Phone Parts[/b]\n  *line_break\n  *if (phone = \"found\")\n    Phone\n    *line_break\n  *if (batteries = \"found\")\n    Batteries\n    *line_break\n  [b]Gardening Requirements[/b]\n  *line_break\n  *if (LH_Meds = \"found\")\n    Plant Growth Enhancers\n    *line_break\n  *if (Plane_Meds = \"found\")\n    Sustainable Medicine\n    *line_break \n  *if (corn = \"found\")\n    Corn Seed\n    *line_break\n  *if (apple = \"found\")\n    Apple Seed\n    *line_break\n*if (part_3 = \"true\")\n  Part 3\n  *line_break\n  Casualties: ${casualties}/100\n  *line_break\n  Time until the military arrives: ${military_time} minutes\n  *line_break\n  Remaining pterosaurs: ${pterosaurs}\n  *line_break\n  *if (ammokey = \"found\")\n    Black key\n    *line_break\n  *if (f1key = \"found\")\n    Blue key\n    *line_break\n  *if (f3key = \"found\")\n    Green key\n    *line_break\n  *if (f2key = \"found\")\n    Red key\n    *line_break\n  *if (f4key = \"found\")\n    Yellow key\n    *line_break\n  *if (ammo2 = \"found\")\n    White key\n    *line_break\n\n  *stat_chart\n    percent stranger ${stranger_name}\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Chapters 4 through 12[/b]\n  \n  Unlock the rest of the game, including the thrilling conclusion!\n  \n  *purchase_discount adfree 2021-07-22 $3.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n  \n  You've paid to unlock the rest of the game, including the thrilling conclusion.\n", "deadsky": "You shoot the final pterosaur out of the sky with your rifle. As it falls to the ground, you hear a loud cheer, as ${stranger_name} grabs you giving you a big hug. A crowd gathers around you, and people begin to chant your name. \"${name}, ${name}, ${name}, ${name}!\"  You look and see that ${stranger_they} looks like ${stranger_they} want to kiss you. Do you let them?\n\n*choice\n  #Yes, I passionately kiss back! Glorious victory!\n    As you enjoy an amazing kiss with such an attractive stranger, only to see ${friend_name} and ${partner_name} in the crowd.\n    *if (status = \"married\")\n      ${partner_name} shouts your name in anger. \"${name}!!!! What the hell are you doing?\"\n      \"I was just...humouring...\" you struggle to respond.\n      \"Right, I saw the look in your eyes,\" ${they} respond.\n      Not wanting to be in the middle of a heated argument, ${friend_name} offers to drive the four of you away to meet with the leaders of the upcoming military force.\n      *set partner %-20\n      *set stranger %+15\n      *goto_scene the_end\n    *elseif (status = \"dating\")\n      ${partner_name} shouts your name in anger. \"${name}!!!! What the hell are you doing?\"\n      \"I was just...humouring...\" you struggle to respond.\n      \"Right, I saw the look in your eyes,\" ${they} respond.\n      Not wanting to be in the middle of a heated argument, ${friend_name} offers to drive the four of you away to meet with the leaders of the upcoming military force.\n      *set partner %-20\n      *set stranger %+15\n      *goto_scene the_end\n    *elseif (status = \"friends\")\n      ${partner_name} walks in a appears to have a mix of emotions on ${their} face. You see a mix of happiness and jealousy. ${partner_name} doesn't say anything, but when ${friend_name} offers to drive you all towards the military leadership, few words are spoken.\n      *set partner %-5\n      *set stranger %+15\n      *goto_scene the_end\n    *else\n      ${partner_name} ignores you but has a strange look of jealousy on their face, typical of someone who sees their ex with someone else. ${friend_name} breaks the awkwardness by offering to drive everyone to the military leadership.\n      *set stranger %+15\n      *goto_scene the_end\n  #Yes, but only let them do it in a way that looks platonic, such as a peck on the cheek or forehead. No lip to lip.\n    As ${partner_name} approaches you, you wonder what ${their} reaction will be. However, there doesn't seem to be a reaction on ${their} part. ${friend_name} breaks the awkwardness by offering to drive everyone to the military leadership.\n    *set stranger %+10\n    *goto_scene the_end\n  #No, I'd rather be faithful to ${partner_name}, so I gently back away when ${stranger_name} tries.\n    ${stranger_name} seems to let it go and doesn't pressure you further. ${friend_name} and ${partner_name} join in the hug, and in fact, you enjoy the ride on the way to meet with the incoming military.\n    *set stranger %+5\n    *set partner %+5\n    *goto_scene the_end\n  #No. I don't want this and actively push ${stranger_name} away.\n    You gently push ${stranger_name} away as ${partner_name} and ${friend_name} walk in. ${friend_name} offers to drive all four of you over to military headquarters to talk with the leaders about what will happen next.\n    *set stranger %-5\n    *set partner %+10\n    *goto_scene the_end", "death": "You have died. Don't let this be your ultimate fate, though. Please feel free to play again, and unlock an ending where you live.\n\n*set death \"true\"\n*page_break\n\n*goto_scene ending", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Dinosaur Island Escape.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending", "military": "You hear a sound around you, and turn to see a massive tank behind you. It shoots down the nearest pterosaur, and you hear a crowd of civilians cheering. You turn around to see a bunch of armed men all in military uniform, three of whom approach you. \n\nThe tallest of them, who is also the one in the middle shows you a badge and introduces himself. \"I am General Russell,\" he says. \"You are ${name}, correct?\"\n\n\"Correct,\" you say as you show him your ID without him even having to ask. \n\n\"You are a very brave ${refer}, thank you for your help. My associates here, lieutenants Johnson and O'Neal will take you to our leadership team where you will be compensated for your bravery in saving so many people.\" You and ${stranger_name} go with the two lieutenants and are taken to a military base.\n\n*goto_scene the_end", "screenshots": "*set name \"Bob\"\n*set gender \"male\"\n*set Athletics 4\n*set Tool_Usage 2\n*set First_Aid 1\n*set Stealth 2\n*set Survival 3\n\nYou look up in amazement and up somewhat close, the T-Rex looks even bigger than you ever expected. \"Oh no,\" you say to yourself, now panting, sweating and barely able to stand. The T-Rex isn't looking at you and presumably can't see you. You see on the other side of the large beast is the boat, which you can now see is floating and tied down. You notice cover near by you, and also think of a few things that could help you out.\n\nHow do you get by the T-rex?\n\n*fake_choice\n  #I sprint as fast as I can right by it.\n  #I hide behind cover.\n  #I don't move. It can't see me if I don't move.\n\n\n\n\n*set name \"Taylor\"\n*set gender \"non-binary\"\n*set Athletics 3\n*set Tool_Usage 2\n*set First_Aid 2\n*set Stealth 4\n*set Survival 3\n*script changeBackgroundColor(\"black\")\n\nYou start to appraoch the doc and after you take a few steps forward, you attempt to step forward with your left foot, you notice you are unable to lift it. Then, you attempt to step forward with your right foot, and can't move that either. This causes you to look down and you can no longer see your feet, as they appear to be burried. After a few more second of struggling, you can see that your ankles are now starting to sink in as well.\n\n\"Oh no!\" you think to yourself. \"Quicksand!\" You panic for a breif moment before you attempt to think of a way out. A few ideas come to your mind as you begin to feel yourself sinking. What do you do to try and escape without sinking further?\n\n*fake_choice\n  #Scream and panic. Maybe someone will hear me.\n  #Struggle my way out. Sheer force can do it.\n  #Stay still. I can't panic.\n  #Lie down to spread my weight around.\n  #Use my knowledge of Quicksand to think of something.\n\n\n\n\n\n*set name \"Jennifer\"\n*set gender \"female\"\n*set Athletics 2\n*set Tool_Usage 2\n*set First_Aid 5\n*set Stealth 4\n*set Survival 2\n*script changeBackgroundColor(\"sepia\")\n\nYou're so excited that you actually yell the name out loud, causing the creature to turn around towards you, see you and start running head first at you. Its much faster than you, so running isn't an option. What do you choose to do?\n\n*fake_choice\n  #Attempt to dodge at the last second. Hopefully, its momentum will cause it to miss me.\n  #Hide. It can't hit me if it doesn't see me.\n  #Hit it with my axe. That could knock it out.\n  #Decapitate it with my katana. Its the most badass thing I can ever do.\n  #Absorb the blow. I can't avoid the damage, but I might be able to minimize it.\n\n\n\n*set name \"Lisa\"\n*set gender \"female\"\n*set Athletics 3\n*set Tool_Usage 3\n*set First_Aid 2\n*set Stealth 4\n*set Survival 3\n\nYou continue down the path, walking towards to south eastern portion of the island. On your way there, you hear a low growling from far away. You look in the direction that the growling came from and look to see an elephant sized dinosaur with three horns coming from its head and a frill on its neck. You immediately recognize this beast as the famous triceratops, a highly territorial herbivore that was even capable of fighting the powerful Tyranasaurus Rex and winning. You don't like your odds, as you know for a fact that it would defeat you in a straight fight. \"How am I ever going to get by something like that?\", you ask yourself in a very concerned whisper. After taking a few deep breathes, you think about what you can do to get by it, and a few ideas come to mind.\n\n*fake_choice\n  #Run away. If it sees me retreating, it won't bother to attack.\n  #Sneak by. It can't attack me if it doesn't see me.\n  #Go out of its territory and go the long way.\n  #Use the katana to fight in once it charges.\n\n\nset name \"Vinny\"\nset gender \"male\"\n*set Athletics 2\n*set Tool_Usage 2\n*set First_Aid 3\n*set Stealth 5\n*set Survival 3\n\nAs you go to the south, you look to your right, and look at the lake nearby. In the general area of the lake, you can see that there's a large crocodile about 40 feet long. \"Damn, that's big,\" you whisper quietly to yourself as you spot it. You're not kidding yourself, this thing is over three times the size of any crocodile currently alive...that you knew of, before today. You know that these animals used to be bigger, and think whatever made these dinosaurs, or let them survive this long, is also what impacted this crocodile in the same way.\n\nYou wonder how you're going to get by this one. You think for a second, and you're not sure how to get there. You know you axe by itself won't hurt it enough to quickly fight it off, so that's only ever a back-up option. You think for a few seconds, and a few ideas come to mind.\n\n*fake_choice\n  #Sneak by.\n  #Run. If I can stay far enough away, it won't bother using its energy to chase me.\n  #Use my knowledge of crocodile to figure out what it can and can't see, and move accordingly.\n  #Fight it with my katana.\n\n*ending", "startup": "*title na \"Unexplored\"\n*create church \"Unexplored\"\n*create South_East \"Unexplored\"\n*create lab \"Unexplored\"\n*create factory \"Unexplored\"\n*create storage \"Unexplored\"\n*create west \"Unexplored\"\n*create quicksand \"Unexplored\"\n*create castle \"Unexplored\"\n*create North \"Unexplored\"\n\n\n*comment dinosaurs\n*create coelophysis \"alive\"\n*create Compsognathus \"alive\"\n*create troodon \"alive\"\n*create archaeopteryx \"alive\"\n*create Utah_Raptor \"alive\"\n*create trex \"alive\"\n*create allosaurus \"alive\"\n\n*if choice_is_omnibus_app\n  *comment skip description\n\n  *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n    [i]Dinosaur Island Escape (DIE)[/i] is a 84,000 word interactive puzzle based-open world novel written by Chris Viola, where you attempt to escape the deadliest place on Earth. Its entirely text based, and powered by the vast, unstoppable power of your imagination.\n\n    Explore an uncharted island filled with prehistoric predators that see you as nothing more than a free meal. Solve mysteries, uncover secrets, and explore this open world in a unique way. The sandbox style of the game, combined with the chance to build your own statline and dozens of different items to find and invent gives you the chance to have a new experience every time you play. \n\n    • Play as a male, female or non-binary; gay, straight, lesbian or bi.[n/]\n    • Find multiple ways off the island, allowing for a different adventure each play through.[n/]\n    • Be the center of a love triangle while your current partner and an attractive stranger fight over you.[n/]\n    • Fight dinosaurs with a katana, run from them with your blazing speed, fight them in hand to hand combat, shoot them with a rifle or sneak by them with unmatched stealth.[n/]\n    • Explore an abandoned city, a vast castle, a mountain range, and a vast beach. Survive jumping off a waterfall, sinking in quicksand and a facing a giant crocodile.[n/]\n    • Save civilians in a race against the clock to stop pterosaurs from destroying your home town.[n/]\n\n    Will you die a violent death, survive by the skin of your teeth, or uncover lost secrets and bring them back for the world to see?\n\n    *if choice_prerelease and not(choice_is_ios_app)\n        [i]You can play the first few chapters of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n        *choice\n            #Sign up to be notified when the game is available.\n                *subscribe {\"now\": true}\n                *restart\n            #Play the first few chapters now for free.\n                *goto purchased\n\n    [i]You can play the first few chapters of the game for free. Purchase the rest of the game below.[/i]\n    *if choice_is_advertising_supported\n        [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n    *purchase_discount adfree 2021-07-22 $3.99 $2.99 purchased\n    *if choice_is_advertising_supported\n      *page_break_advertisement\n    *if not(choice_is_advertising_supported)\n      *page_break Play Now for Free\n\n\n*label purchased\n\n\n\"Oh, no!\" you say out loud, \"I knew I shouldn't have listened to Bruce.\" As you fly your helicopter, you see that you're out of fuel. \"You'll be fine,\" you\nstate in a mocking voice, imitating Bruce. \"Fuel's cheaper on the other side.\" He was referring to the other side of the ocean when you got to Asia, but right now,\nyou're in danger of going to a version of 'the other side' that wouldn't give you any access to more fuel.\n\nYou look out over the ocean and notice an island. Knowing that you're not near Hawaii, you wonder what island this could possibly be, but don't have time to think\nabout it now. You have no other place to land other than the water, giving you no choice but to attempt to land on the mysterious island. \n\nAs you steer there and let your momentum carry you forward in order to make it to the island, you prepare to get out. Still piloting, you just barely make it to the island, landing in the tops of the first few trees, softening your landing. The chopper falls a few feet at a time, with branches stopping it every few seconds. Each time, said branches break after a few seconds of supporting the helicopter, causing another fall of a few feet. The helicopter finally crashes onto the ground, and as it does so, you're thrown out, hitting the ground, rolling out on your back.\n\nAfter cursing Bruce, and getting up you look around at your surroundings. You're still right by the edge of an island you're not familiar with. You vaguely remember hearing about a forbidden island in this area, however. You also remember that Bruce was the guy who told you to go this way because it was a 'short cut'. Great, he miscalculated and got you into trouble. Again. So let's look at your situation. \n\n*page_break\n\n*label custom\n\n*page_break\nAnd you are a...\n*choice\n  #Man\n    *set gender \"Male\"\n    *set refer \"man\"\n    *set friend_they \"he\"\n    *set friend_them \"him\"\n    *set friend_their \"his\"\n    *goto insert_name\n  #Woman  \n    *set gender \"Female\"\n    *set refer \"woman\"\n    *set friend_they \"she\"\n    *set friend_them \"her\"\n    *set friend_their \"her\"\n    *goto insert_name\n  #Non-binary\n    *set gender \"Non-binary\"\n    *set refer \"person\"\n    *goto insert_name\n\n*label insert_name\n\nYour name is\n*if (gender = \"Male\")\n  *goto male_names\n*elseif (gender = \"Female\")\n  *goto female_names\n*else\n  *goto non_binary_names\n\n*label male_names\n*choice\n  #Liam\n    *set name \"Liam\"\n    *goto pick_partner\n  #Noah\n    *set name \"Noah\"\n    *goto pick_partner\n  #William\n    *set name \"William\"\n    *goto pick_partner\n  #James\n    *set name \"James\"\n    *goto pick_partner\n  #Oliver\n    *set name \"Oliver\"\n    *goto pick_partner\n  #Benjamin\n    *set name \"Benjamin\"\n    *goto Carter\n    *set friend_name \"Carter\"\n    *goto hobby\n  #Owen\n    *set friend_name \"Owen\"\n    *goto hobby\n  #Wyatt\n    *set friend_name \"Wyatt\"\n    *goto hobby\n  #John\n    *set friend_name \"John\"\n    *goto hobby\n  #I want to choose my own name.\n    *input_text friend_name\n    *goto hobby\n\n*label female_friend\n*choice\n  #Victoria\n    *set friend_name \"Victoria\"\n    *goto hobby\n  #Madison\n    *set friend_name \"Madison\"\n    *goto hobby\n  #Luna\n    *set friend_name \"Luna\"\n    *goto hobby\n  #Grace\n    *set friend_name \"Grace\"\n    *goto hobby\n  #Chloe\n    *set friend_name \"Chloe\"\n    *goto hobby\n  #Penelope\n    *set friend_name \"Penelope\"\n    *goto hobby\n  #Lyla\n    *set friend_name \"Lyla\"\n    *goto hobby\n  #I want to choose my own name.\n    *input_text friend_name\n    *goto hobby\n\n\n*label nonbinary_friend\n*choice\n  #Jack\n    *set friend_name \"Jack\"\n    *goto hobby\n  #Luke\n    *set friend_name \"Luke\"\n    *goto hobby\n  #Jayden\n    *set friend_name \"Jayden\"\n    *goto hobby\n  #Riley\n    *set friend_name \"Riley\"\n    *goto hobby\n  #Zoey\n    *set friend_name \"Zoey\"\n    *goto hobby\n  #Nora\n    *set friend_name \"Nora\"\n    *goto hobby\n  #Quinn\n    *set friend_name \"Quinn\"\n    *goto hobby\n  #I want to choose my own name.\n    *input_text friend_name\n    *goto hobby\n\n\n\n*label hobby\nIn your spare time, you enjoy doing what?\n\n*choice\n  #Working out\n    You enjoy the thrill of a workout and as a result, are more athletic than most.\n    *set Athletics +1\n    *goto stat_line\n  #Tinkering with electronics\n    You're a bit of a gearhead, and as a result, are good with tools.\n    *set Tool_Usage +1\n    *goto stat_line\n  #Practicing first aid\n    Your medical knowledge makes you better at diagnosing and treating injuries.\n    *set First_Aid +1\n    *goto stat_line\n  #Studying military strategy\n    You enjoy studying how the military works, and as a result, better understand how to hide from danger.\n    *set Stealth +1\n    *goto stat_line\n  #Studying nature and going for walks.\n    You know more about animals and plants than most people due to all your time in nature.\n    *set Survival +1\n    *goto stat_line\n  #Spending time with ${partner_name}.\n    The time you spend with ${partner_name} makes you closer to them.\n    *set partner %+10\n\n\n*label stat_line\n\nNext, let's look at your stat line. You have five additional stats to add to your stat line to start. You'll have the opportunity to add more later, so don't feel any pressure to create a perfect stat line right away. Remember, you start with 1 in everything, and have a max of 5 per stat. Where do you put your first extra point?\n\n*choice\n  #Athletics\n    *set Athletics +1\n    *goto stats2\n  #Tool_Usage\n    *set Tool_Usage +1\n    *goto stats2\n  #First_Aid\n    *set First_Aid +1\n    *goto stats2\n  #Stealth\n    *set Stealth +1\n    *goto stats2\n  #Survival\n    *set Survival +1\n    *goto stats2\n\n*label stats2\n  \nWhere do you put your second stat?\n\n*choice\n  #Athletics\n    *set Athletics +1\n    *goto stats3\n  #Tool_Usage\n    *set Tool_Usage +1\n    *goto stats3\n  #First_Aid\n    *set First_Aid +1\n    *goto stats3\n  #Stealth\n    *set Stealth +1\n    *goto stats3\n  #Survival\n    *set Survival +1\n    *goto stats3\n\n*label stats3\n\nWhere do you put your third stat?\n\n*choice\n  #Athletics\n    *set Athletics +1\n    *goto stats4\n  #Tool_Usage\n    *set Tool_Usage +1\n    *goto stats4\n  #First_Aid\n    *set First_Aid +1\n    *goto stats4\n  #Stealth\n    *set Stealth +1\n    *goto stats4\n  #Survival\n    *set Survival +1\n    *goto stats4\n\n*label stats4\n\nWhere do you put your fourth stat?\n\n*choice\n  *selectable_if (Athletics \u003c=4) #Athletics\n    *set Athletics +1\n    *goto stats5\n  *selectable_if (Tool_Usage \u003c=4) #Tool_Usage\n    *set Tool_Usage +1\n    *goto stats5\n  *selectable_if (First_Aid \u003c=4) #First_Aid\n    *set First_Aid +1\n    *goto stats5\n  *selectable_if (Stealth \u003c=4) #Stealth\n    *set Stealth +1\n    *goto stats5\n  *selectable_if (Survival \u003c=4) #Survival\n    *set Survival +1\n    *goto stats5\n\n*label stats5\n\nYour final stat?\n\n*choice\n  *selectable_if (Athletics \u003c=4) #Athletics\n    *set Athletics +1\n    *goto walk\n  *selectable_if (Tool_Usage \u003c=4) #Tool_Usage\n    *set Tool_Usage +1\n    *goto walk\n  *selectable_if (First_Aid \u003c=4) #First_Aid\n    *set First_Aid +1\n    *goto walk\n  *selectable_if (Stealth \u003c=4) #Stealth\n    *set Stealth +1\n    *goto walk\n  *selectable_if (Survival \u003c=4) #Survival\n    *set Survival +1\n    *goto walk\n\n*label walk\n\nOkay, after you look around the crash, you notice that the helicopter is actually not very damaged. You'll have to get more fuel if you ever want to take off, but other than that,  you don't have to worry about not making the rest of the flight across the ocean. The only permanent damage is, of course, to the radio, making it impossible for you to call for help unless you repair it. You have no idea how you're going to do so, or how to explain that you're in a restricted area. However, you know you have to begin somewhere, so you decide to look inside the chopper for stuff that you need. You notice that the helicopter has an axe and a medkit. Seeing the use for both, you decide it's best to take them.\n\n*set Medkits +1\n*set Ax \"Found\"\n\n*page_break\n\nYou leave the crash site, walking away from the helicopter, hoping that no harm will come to it and that you will be able to use it later. You think to yourself that so far there are two ways of getting off this island: you can find either gasoline or parts to repair a radio. Normally this would be easy, but you're not in the middle of a city, you're on an island that's seen as off-limits to everyone. You panic at first, thinking that there's no way either of those solutions could possibly exist on an island with no people. You start walking anyway. Then you think that this island may be restricted due to some secret military work possibly happening here and that you might be able to negotiate your way out of this situation. If they're from your country, they wouldn't let one of their own citizens die. If they're not, they wouldn't kill you, because that risks starting an international incident. As you continue, you recognize the sun has moved slightly left in the past hour, indicating that right is east and left is west, meaning you must be going north. You suddenly stop, seeing that there is a cliff directly in front of you. \n\nYou look around and see that the cliff does indeed fall extremely far, but is only a few feet across. If you could somehow build a bridge across, you could get to the other side. You look left and right, seeing no natural or man made bridge available, but plenty of trees. However, your small axe has no chance of cutting down these large trees. Also, you know that you'd need something to hold the logs in place to stop the bridge from collapsing. What do you do?\n\n*choice\n  #Go East. Maybe they'll be something there.\n    *goto go_East\n  #Go West. Maybe they'll be something there.\n    *goto go_West\n  #Climb a nearby tree to get a better view.\n    *if Athletics >= 2\n      You are athletic enough to be able to climb a relatively simple nearby tree. You look East and see what appear to be younger, thinner looking trees, some of which appear to be a perfect size: small enough to be cut down, but large enough that a few of them could support your weight. You look west and see that there's a beach, with what appears to be a docking point, which strikes you as odd since you thought this place to be restricted. You also look north and see that the other side of the cliff has a much larger area, and even contains buildings. They're too far away to get a good view, but you are indeed excited to look around that part of the island, once you build the bridge to get there.\n      *goto East_West_Open\n    *else\n      You are not athletic enough to climb the tree and must guess which way to go.\n      *goto East_West_Open\n\n*label East_West_Open\n\nWhich way do you go?\n\n*choice\n  #East. \n    *goto go_East\n  #West. \n    *goto_scene West_Open\n\n*label go_East\n\n*goto_scene East_Open\n\n*label go_West\n*goto_scene West_Open\n", "the_end": "*if Athletics > 4\n  *achieve athlete\n\n*if Tool_Usage > 4\n  *achieve tool\n\n*if First_Aid > 4\n  *achieve aid\n\n*if Stealth > 4\n  *achieve stealth\n\n*if Survival > 4\n  *achieve survival\n\n*achieve champion\n\nWithin an hour you, ${partner_name}, ${friend_name} and ${stranger_name} all reach the military leaders. The four of you will be included in the parade of those who saved the city, as well as given millions of dollars. \n\nAfter a while, you get the chance to choose if you want to be with ${stranger_name} or ${partner_name}.\n*choice\n  #I choose ${partner_name}.\n    *goto partner\n  #I choose ${stranger_name}.\n    *goto stranger\n  #I choose to be single.\n    *goto single\n\n\n*label partner\n\nYou get one last-second chance to impress ${partner_name}. What stat do you use?\n*choice\n  #Athletics\n    *if (Athletics = 5)\n      *set partner +5\n      *goto partner_final\n    *elseif (Athletics = 4)\n      *set partner +4\n      *goto partner_final\n    *elseif (Athletics = 3)\n      *set partner +3\n      *goto partner_final\n    *elseif (Athletics = 2)\n      *set partner +2\n      *goto partner_final\n    *else\n      *set partner +1\n      *goto partner_final\n  #Stealth\n    *if (Stealth = 5)\n      *set partner +5\n      *goto partner_final\n    *elseif (Stealth = 4)\n      *set partner +4\n      *goto partner_final\n    *elseif (Stealth = 3)\n      *set partner +3\n      *goto partner_final\n    *elseif (Stealth = 2)\n      *set partner +2\n      *goto partner_final\n    *else\n      *set partner +1\n      *goto partner_final\n  #First-Aid\n    *if (First_Aid = 5)\n      *set partner +5\n      *goto partner_final\n    *elseif (First_Aid = 4)\n      *set partner +4\n      *goto partner_final\n    *elseif (First_Aid = 3)\n      *set partner +3\n      *goto partner_final\n    *elseif (First_Aid = 2)\n      *set partner +2\n      *goto partner_final\n    *else\n      *set partner +1\n      *goto partner_final\n  #Tool Usage\n    *if (Tool_Usage = 5)\n      *set partner +5\n      *goto partner_final\n    *elseif (Tool_Usage = 4)\n      *set partner +4\n      *goto partner_final\n    *elseif (Tool_Usage = 3)\n      *set partner +3\n      *goto partner_final\n    *elseif (Tool_Usage = 2)\n      *set partner +2\n      *goto partner_final\n    *else\n      *set partner +1\n      *goto partner_final\n  #Survival\n    *if (Survival = 5)\n      *set partner +5\n      *goto partner_final\n    *elseif (Survival = 4)\n      *set partner +4\n      *goto partner_final\n    *elseif (Survival = 3)\n      *set partner +3\n      *goto partner_final\n    *elseif (Survival = 2)\n      *set partner +2\n      *goto partner_final\n    *else\n      *set partner +1\n      *goto partner_final\n\n*label partner_final\n\n*if (status = \"married\")\n  \"I love you,\" you say to ${partner_name}.\n  *if (partner > 79)\n    \"I love you, too. Thank you for remaining faithful to me!\" ${partner_name} replies. The two of you go off hand in hand together. You two return home, having forever kept the world safe from dinosaur attacks. ${friend_name} stays in close contact with the two of you. \"You've done the world a great service,\" says ${partner_name}, kissing you on the forehead.  \n    *goto over\n  *else\n    \"Then what the hell were you doing with ${stranger_name}?\" ${partner_name} asks, taking off ${their} ring and throwing it in your face. As you watch them stomp off, ${friend_name} grabs your shoulder and shakes their head. \"You'll find someone else, just be more careful next time.\" You don't know this yet, but some of the most attractive people in the world start throwing themselves at you after you've survived so much. It's an open world for you, you just have to take it by the horns.\n    *goto over\n\n*elseif (status = \"dating\")\n  \"I love you,\" you say to ${partner_name}.\n  *if (partner > 80)\n    \"I love you this much!\" exclaims ${partner_name}. You're caught off guard when they don't throw their arms around you. Instead, you see ${partner_name} go down on ${their} knees with a small box. You put on the ring and the two of you kiss passionately. ${friend_name} smiles, as you three walk-off happy and begin planning the wedding.\n    *goto over\n  *elseif (partner > 70)\n    \"I love you too!\" The two of you kiss passionately, spending several minutes alone. You look around, to notice that nobody else is nearby. That's the moment you realise that you've found someone with such mutual love, the world seems to fade away.\n    *goto over\n  *else\n    \"Then what the hell were you doing with ${stranger_name}?\" ${partner_name} asks, turning around and leaving. As you watch them stomp off, ${friend_name} grabs your shoulder and shakes their head. \"You'll find someone else, just be more careful next time.\" You don't know this yet, but some of the most attractive people in the world start throwing themselves at you after you've survived so much. It's an open world for you, you just have to take it by the horns.\n    *goto over\n    \n*elseif (status = \"friends\")\n  \"Do you want to get back together?\"\n  *if (partner > 70)\n    \"Yes!\" says ${partner_name}, throwing ${their} arms around you. Somewhat surprised, you stand there as ${they} didn't seem too excited to see you at first, but you're not going to question it. You see ${friend_name} smile while they see you two together again. The three of you go off into the sunset, looking forward to the life you'll spend together. \n    *goto over\n  *else\n    \"No, sorry,\" ${they} say, before walking away without saying much. You recognize this as what they would do in an attempt to avoid saying something that would further hurt you. As you watch them walk off, ${friend_name} grabs your shoulder and shakes their head. \"You'll find someone else, just be more careful next time.\" You don't know this yet, but some of the most attractive people in the world start throwing themselves at you after you've survived so much. It's an open world for you, you just have to take it by the horns.\n    *goto over\n\n*else\n\n  *if (partner > 70)\n    After thinking about it for a second, ${partner_name} says \"Yes!\", throwing ${their} arms around you. Somewhat surprised, you stand there as it was a long shot, but you're not going to question it. You see ${friend_name} smile while they see you two together again. The three of you go off into the sunset, looking forward to the life you'll spend together. \n    *goto over\n  *else\n    \"Hell no!,\" ${they} say, explain before walking away without saying anything else. You feel like a desperate fool for asking, and as you watch them walk off, ${friend_name} grabs your shoulder and shakes their head. \"You'll find someone else, just be more careful next time.\" You don't know this yet, but some of the most attractive people in the world start throwing themselves at you after you've survived so much. It's an open world for you, you just have to take it by the horns.\n    *goto over\n\n*label stranger\n\nYou get one last-second chance to impress ${partner_name}. What stat do you use?\n*choice\n  #Athletics\n    *if (Athletics = 5)\n      *set stranger +5\n      *goto stranger_final\n    *elseif (Athletics = 4)\n      *set stranger +4\n      *goto stranger_final\n    *elseif (Athletics = 3)\n      *set stranger +3\n      *goto stranger_final\n    *elseif (Athletics = 2)\n      *set stranger +2\n      *goto stranger_final\n    *else\n      *set stranger +1\n      *goto stranger_final\n  #Stealth\n    *if (Stealth = 5)\n      *set stranger +5\n      *goto stranger_final\n    *elseif (Stealth = 4)\n      *set stranger +4\n      *goto stranger_final\n    *elseif (Stealth = 3)\n      *set stranger +3\n      *goto stranger_final\n    *elseif (Stealth = 2)\n      *set stranger +2\n      *goto stranger_final\n    *else\n      *set stranger +1\n      *goto stranger_final\n  #First-Aid\n    *if (First_Aid = 5)\n      *set stranger +5\n      *goto stranger_final\n    *elseif (First_Aid = 4)\n      *set stranger +4\n      *goto stranger_final\n    *elseif (First_Aid = 3)\n      *set stranger +3\n      *goto stranger_final\n    *elseif (First_Aid = 2)\n      *set stranger +2\n      *goto stranger_final\n    *else\n      *set stranger +1\n      *goto stranger_final\n  #Tool Usage\n    *if (Tool_Usage = 5)\n      *set stranger +5\n      *goto stranger_final\n    *elseif (Tool_Usage = 4)\n      *set stranger +4\n      *goto stranger_final\n    *elseif (Tool_Usage = 3)\n      *set stranger +3\n      *goto stranger_final\n    *elseif (Tool_Usage = 2)\n      *set stranger +2\n      *goto stranger_final\n    *else\n      *set stranger +1\n      *goto stranger_final\n  #Survival\n    *if (Survival = 5)\n      *set stranger +5\n      *goto stranger_final\n    *elseif (Survival = 4)\n      *set stranger +4\n      *goto stranger_final\n    *elseif (Survival = 3)\n      *set stranger +3\n      *goto stranger_final\n    *elseif (Survival = 2)\n      *set stranger +2\n      *goto stranger_final\n    *else\n      *set stranger +1\n      *goto stranger_final\n\n*label stranger_final\n\n*if (status = \"married\")\n  *if (stranger > 79)\n    You go up to ${stranger_name} and give ${stranger_them} a huge kiss on the lips, which they return. However, ${partner_name} throws ${their} ring at the two of you. \"I give you everything you'd ever want and THIS is how you repay me!?\"\n    After ${they} and ${friend_name} leave, you and ${stranger_name} head off together, waiting to start your dream life.\n    *goto over\n  *else\n    You go up to ${stranger_name} and try to give ${stranger_them} a huge kiss on the lips, but they reject it. ${partner_name} then throws ${their} ring at you. \"Slut!\" they yell. \"You're not getting a second chance with me!\" You're hurt at first and feel alone, but things will get better. You don't know this yet, but some of the most attractive people in the world start throwing themselves at you after you've survived so much. It's an open world for you, you just have to take it by the horns.\n    *goto over\n\n*if (status = \"dating\")\n  *if (stranger > 79)\n    You go up to ${stranger_name} and give ${stranger_them} a huge kiss on the lips, which they return. However, ${partner_name} throws a fit, which in fairness is not unjustified. \"I give you everything you'd ever want and THIS is how you repay me!?\"\n    After ${they} and ${friend_name} leave, you and ${stranger_name} head off together, waiting to start your dream life.\n    *goto over\n  *else\n    You go up to ${stranger_name} and try to give ${stranger_them} a huge kiss on the lips, but they reject it. ${partner_name} then throws a fit, which in fairness is not unjustified. \"Slut!\" they yell. \"You're not getting a second chance with me!\" You're hurt at first and feel alone, but things will get better. You don't know this yet, but some of the most attractive people in the world start throwing themselves at you after you've survived so much. It's an open world for you, you just have to take it by the horns.\n    *goto over\n\n*if (status = \"friends\")\n  *if (stranger > 79)\n    You go up to ${stranger_name} and give ${stranger_them} a huge kiss on the lips, which they return. You can see that ${partner_name} shows a weird mix of emotions on ${their} face, before walking up to the two of you. As you end the kiss, ${partner_name} says \"I'm glad you've moved on,\" before being driven home by ${friend_name}. You and ${stranger_name} wind up together and look to start life as one.\n    *goto over\n  *else\n    You go up to ${stranger_name} and try to give ${stranger_them} a huge kiss on the lips, but they reject it. ${partner_name} and ${friend_name} both come up to you and apologize, saying you'll eventually find someone, and they're right. You don't know this yet, but some of the most attractive people in the world start throwing themselves at you after you've survived so much. It's an open world for you, you just have to take it by the horns.\n    *goto over\n\n*else\n  *if (stranger > 79)\n    You go up to ${stranger_name} and give ${stranger_them} a huge kiss on the lips, which they return. ${friend_name} congratulates you as ${partner_name} awkwardly walks away. You and ${stranger_name} look to set up a life together and prepare to build what you really want.\n    *goto over\n    You go up to ${stranger_name} and try to give ${stranger_them} a huge kiss on the lips, but they reject it. ${partner_name} and ${friend_name} both come up to you and apologize, saying you'll eventually find someone, and they're right. You don't know this yet, but some of the most attractive people in the world start throwing themselves at you after you've survived so much. It's an open world for you, you just have to take it by the horns.\n    *goto over\n\n\n*label single\n\nYou are going to be your own ${refer} for now, leaving both ${stranger_name} and ${partner_name} wanting you. You don't know this yet, but some of the most attractive people in the world start throwing themselves at you after you've survived so much. It's an open world for you, you just have to take it by the horns.\n*goto over\n\n\n*label over\n\nYou follow the news over the next few weeks. Several stories pop on the news, but the most interesting one is after only a couple of days:\n\n\"This is Alice Bryant, reporting on tonight's top story. The island that was originally known as \"Dinosaur Island\" has been stripped for useful materials in the past few days, and is now being bombed. While we do thank the military for their involvement in the process, we have mostly to thank ${name} for finding the island and escaping it twice. The world can now live safely thanks to the actions of this brave ${refer}.\"\n\nA smile reaches your face as you turn off the TV, knowing that you've made a difference and stopped what could have been the biggest disaster in human history.\n*goto_scene ending", "win_2": "You and ${partner_name} look away from the island in relief. You pump your fist victoriously. Then, you turn to ${partner_name} who say \"${name}, I have something to tell you.\"\n\n\"Okay,\" you say, not knowing what to expect.\n\n*page_break\n\n*if (partner > 79)\n  *goto proposal\n*elseif (partner > 69)\n  *goto stay\n*elseif (partner > 59)\n  *goto friends\n*else\n  *goto break\n\n*label proposal\n\nYou see them go down on one knee and open up a small case. \"Our time in this place has shown me you're exactly the kind of ${refer} that I've always dreamed of spending my life with! Will you marry me?\"\n*choice\n  #Yes! I love you so much!\n    ${partner_name} throws ${their} arms around you in a dramatic way and the two of you kiss. You never look back at the island and instead look forward to your new life with ${partner_name}.\n    *goto marraige\n  #I don't think we're ready for that yet.\n    \"Yet,\" they pause before saying \"you mean that...?\"\n    \"Give it some time,\" you say with a smile. \"Don't sell that ring back just yet.\"\n    *goto couple\n  #I think its best we go back to being friends.\n    You see ${partner_name} tear up and stammer while holding back more emotion.\n    \"I just don't think we'll be safe together after you did this. I'm sorry,\" you say in an attempt to calm them down. Needless to say, its an awkward ride home.\n    *goto just_friends\n  #No. I'm breaking up with you.\n    ${partner_name} throws the ring in your face and screams \"You have no idea what you just missed out on!\"\n    \"You dragged me back here when I said I was never coming back!\" You respond. Needless to say, its an awkward ride home.\n    *goto breakup\n\n*label stay\n\n\"I love you so much!\" ${partner_name} yells, throwing ${their} arms around you.\n*choice\n  #I love you too!\n    You two throw your arms around each other and passionately kiss.\n    *goto couple \n  #I think its best we go back to being friends.\n    You see ${partner_name} tear up and stammer while holding back more emotion.\n    \"I just don't think we'll be safe together after you did this. I'm sorry,\" you say in an attempt to calm them down. Needless to say, its an awkward ride home.\n    *goto just_friends\n  #I'm breaking up with you.\n    ${partner_name} yells loudly at you, saying \"You have no idea what you just missed out on!\"\n    \"You dragged me back here when I said I was never coming back!\" You respond. Needless to say, its an awkward ride home.\n    *goto breakup\n\n*label friends\n\n\"I think it's best we just go back to being friends. This didn't work the way I was hoping it would.\n*choice\n  #I accept this.\n    It's awkward, but you two both come to accept this.\n    *goto just_friends\n  #No, it's a full relationship or nothing.\n    ${partner_name} yells loudly at you, saying \"You have no idea what you just missed out on!\"\n    \"You dragged me back here when I said I was never coming back!\" You respond. Needless to say, its an awkward ride home.\n    *goto breakup\n\n*label break\n\n\"I'm breaking up with you,\" they say. \"I've learned you're not the kind of ${refer} I'm looking for.\" It's an awkward ride home.\n*goto breakup\n\n*label marraige\n*set status \"married\"\n*set closeness 4\n*goto_scene challenger\n\n*label couple\n*goto_scene challenger\n\n*label just_friends\n*set status \"friends\"\n*set closeness 2\n*goto_scene challenger\n\n*label breakup\n*set status \"exes\"\n*set closeness 1\n*goto_scene challenger"}};
</script>
<script>
/* ChoiceScript runtime — vanilla-JS port of the Python engine in cs/.
 *
 * Faithful reimplementation of parser + expr + interpolate + engine. The
 * engine is I/O-agnostic: it talks to an `io` object exposing text(), choose(),
 * page_break(), input_text(), input_number(), achievement(), stat_chart().
 *
 * Exposed as a global `CS` object (no modules, no build step).
 */
(function (root) {
  "use strict";

  // ---- errors ----------------------------------------------------------- //

  class CSError extends Error {
    constructor(message, scene, line) {
      super(formatLoc(scene, line) + message);
      this.raw_message = message;
      this.scene = scene === undefined ? null : scene;
      this.line = line === undefined ? null : line;
      this.name = "CSError";
    }
  }
  function formatLoc(scene, line) {
    if (scene == null && line == null) return "";
    return (scene == null ? "?" : scene) + " line " + (line == null ? "?" : line) + ": ";
  }
  class ExprError extends CSError { constructor(m, s, l) { super(m, s, l); this.name = "ExprError"; } }
  class GameOver extends Error { constructor(label) { super(label || ""); this.label = label || ""; this.name = "GameOver"; } }
  class QuitGame extends Error { constructor() { super("quit"); this.name = "QuitGame"; } }
  class LoadGame extends Error { constructor(state) { super("load game"); this.state = state; this.name = "LoadGame"; } }
  class RestartGame extends Error { constructor() { super("restart"); this.name = "RestartGame"; } }

  // ---- parser ----------------------------------------------------------- //

  const COMMAND_RE = /^\s*\*(\w+)\b[ \t]?([\s\S]*)$/;
  const INDENT_RE = /^([ \t]*)/;

  class Line {
    constructor(num, indent, command, arg, text) {
      this.num = num;
      this.indent = indent;
      this.command = command; // null for plain text
      this.arg = arg;
      this.text = text;
    }
    get is_blank() {
      return this.command == null && this.text.trim() === "";
    }
  }

  function getIndent(raw) {
    const m = INDENT_RE.exec(raw);
    const ws = m ? m[1] : "";
    if (ws.indexOf("\t") !== -1 && ws.indexOf(" ") !== -1) {
      throw new CSError("mixed tabs and spaces in indentation");
    }
    return ws.length;
  }

  function parseScene(text) {
    const lines = [];
    const rawLines = text.split("\n");
    for (let i = 0; i < rawLines.length; i++) {
      let raw = rawLines[i].replace(/\r$/, "");
      const num = i + 1;
      if (raw.trim() === "") {
        lines.push(new Line(num, 0, null, "", ""));
        continue;
      }
      const indent = getIndent(raw);
      const m = COMMAND_RE.exec(raw);
      if (m) {
        lines.push(new Line(num, indent, m[1], m[2], raw.trim()));
      } else {
        lines.push(new Line(num, indent, null, "", raw.trim()));
      }
    }
    return lines;
  }

  // ---- value coercion --------------------------------------------------- //

  function isNum(v) { return typeof v === "number"; }
  function isBool(v) { return typeof v === "boolean"; }
  function isStr(v) { return typeof v === "string"; }

  function toNum(value) {
    if (isBool(value)) throw new ExprError("Expected number, got boolean: " + value);
    if (isNum(value)) return value;
    const s = String(value).trim();
    if (/^-?\d+$/.test(s)) return parseInt(s, 10);
    // Match Python float(): the whole string must be a valid float literal.
    if (/^[+-]?(\d+\.?\d*|\.\d+)([eE][+-]?\d+)?$/.test(s)) {
      const f = Number(s);
      if (!isNaN(f)) return f;
    }
    throw new ExprError('Expected number, but got string: "' + value + '"');
  }

  function toBool(value) {
    if (isBool(value)) return value;
    if (isNum(value)) throw new ExprError("Expected boolean, got number: " + value);
    const s = String(value).trim().toLowerCase();
    if (s === "true") return true;
    if (s === "false") return false;
    throw new ExprError('Expected boolean, but got string: "' + value + '"');
  }

  function csStr(value) {
    if (isBool(value)) return value ? "true" : "false";
    if (isNum(value)) {
      // integers render without a decimal point
      if (Number.isInteger(value)) return String(value);
      return String(value);
    }
    return String(value);
  }

  // ---- expression tokenizer --------------------------------------------- //

  const TOKEN_SPECS = [
    ["OPEN_PARENTHESIS", /^\(/],
    ["CLOSE_PARENTHESIS", /^\)/],
    ["OPEN_CURLY", /^\{/],
    ["CLOSE_CURLY", /^\}/],
    ["OPEN_SQUARE", /^\[/],
    ["CLOSE_SQUARE", /^\]/],
    ["FUNCTION", /^(not|round|timestamp|log|length|auto)\s*\(/],
    ["NUMBER", /^\d+(\.\d+)?\b/],
    ["CURLY_QUOTE", /^[“”]/],
    ["WHITESPACE", /^\s+/],
    ["NAMED_OPERATOR", /^(and|or|modulo)\b/],
    ["VAR", /^\w+/],
    ["FAIRMATH", /^%[+\-]/],
    ["OPERATOR", /^[+\-*/&%^#]/],
    ["INEQUALITY", /^[!<>]=?/],
    ["EQUALITY", /^=/],
    ["COMMA", /^,/],
  ];
  const FUNC_NAME_RE = /^\w+/;

  class Token {
    constructor(name, value, pos, func) {
      this.name = name;
      this.value = value;
      this.pos = pos;
      this.func = func || null;
    }
  }

  function tokenize(expr) {
    let s = expr;
    let pos = 0;
    const tokens = [];
    while (s) {
      // String literal with backslash escapes.
      if (s[0] === '"') {
        let i = 1;
        let found = false;
        while (i < s.length) {
          const c = s[i];
          if (c === "\\") { i += 1; }
          else if (c === '"') { found = true; break; }
          i += 1;
        }
        if (!found) throw new ExprError("Invalid string, open quote with no close quote: " + s);
        const matched = s.slice(0, i + 1);
        pos += matched.length;
        tokens.push(new Token("STRING", matched, pos));
        s = s.slice(matched.length);
        continue;
      }
      let matched = null;
      for (const [name, rx] of TOKEN_SPECS) {
        const m = rx.exec(s);
        if (m && m[0]) { matched = [name, m[0]]; break; }
      }
      if (matched === null) throw new ExprError("Invalid expression, could not tokenize at: " + s);
      const [name, value] = matched;
      pos += value.length;
      s = s.slice(value.length);
      if (name === "CURLY_QUOTE") throw new ExprError("Invalid use of curly smart quote: " + value);
      if (name === "WHITESPACE") continue;
      let func = null;
      if (name === "FUNCTION") func = FUNC_NAME_RE.exec(value)[0];
      tokens.push(new Token(name, value, pos, func));
    }
    return tokens;
  }

  // ---- operators -------------------------------------------------------- //

  function fairAdd(v1, v2) {
    v1 = toNum(v1); v2 = toNum(v2);
    if (!(v1 >= 0 && v1 <= 100)) throw new ExprError("Can't fairAdd to non-percentile value: " + v1);
    if (v2 > 0) {
      const mult = (100 - v1) / 100.0;
      const value = Math.floor(v1 + v2 * mult);
      return value > 99 ? 99 : value;
    }
    const mult = v1 / 100.0;
    const value = Math.ceil(v1 - (-v2) * mult);
    return value < 1 ? 1 : value;
  }
  function fairSub(v1, v2) { return fairAdd(v1, -toNum(v2)); }

  function equals(v1, v2) {
    if (isBool(v1) || isBool(v2)) {
      return v1 === v2 || String(v1).toLowerCase() === String(v2).toLowerCase();
    }
    return v1 === v2 || String(v1) === String(v2);
  }
  function divide(a, b) {
    b = toNum(b);
    if (b === 0) throw new ExprError("can't divide by zero");
    return toNum(a) / b;
  }
  function concat(a, b) { return csStr(a) + csStr(b); }
  function numBin(fn) { return (a, b) => fn(toNum(a), toNum(b)); }
  // The `#` operator: 1-based character index into a string (e.g. name#1
  // returns the first character). Mirrors Scene.operators['#'] in scene.js.
  function charAt(v1, v2) {
    const s = csStr(v1);
    const i = toNum(v2);
    if (i !== Math.floor(i)) throw new ExprError("There is no character at position " + i + "; the position must be a whole number.");
    if (i < 1) throw new ExprError("There is no character at position " + i + "; the position must be greater than or equal to 1.");
    if (i > s.length) throw new ExprError('There is no character at position ' + i + '. "' + s + '" is only ' + s.length + " characters long.");
    return s.charAt(i - 1);
  }

  const OPERATORS = {
    "+": numBin((a, b) => a + b),
    "-": numBin((a, b) => a - b),
    "*": numBin((a, b) => a * b),
    "/": (a, b) => divide(a, b),
    "^": numBin((a, b) => Math.pow(a, b)),
    "modulo": numBin((a, b) => ((a % b) + b) % b),
    "&": (a, b) => concat(a, b),
    "#": charAt,
    "%+": fairAdd,
    "%-": fairSub,
    "=": equals,
    "!=": (a, b) => !equals(a, b),
    "<": numBin((a, b) => a < b),
    ">": numBin((a, b) => a > b),
    "<=": numBin((a, b) => a <= b),
    ">=": numBin((a, b) => a >= b),
    "and": (a, b) => toBool(a) && toBool(b),
    "or": (a, b) => toBool(a) || toBool(b),
  };

  // ---- evaluator -------------------------------------------------------- //

  class Evaluator {
    constructor(resolver) { this.resolver = resolver; }

    evalString(expr) { return this.evalTokens(tokenize(expr)); }
    evalTokens(tokens) { return this._evalExpr(tokens.slice(), null); }

    evalValueToken(stack) { return this._evalValueToken(stack.shift(), stack); }

    evaluateReference(stack, toLower) {
      if (toLower === undefined) toLower = true;
      const norm = (name) => toLower ? String(name).toLowerCase() : name;
      const findClosing = (kind, offset) => {
        let opens = 0;
        const openName = "OPEN_" + kind, closeName = "CLOSE_" + kind;
        for (let i = offset || 0; i < stack.length; i++) {
          if (stack[i].name === openName) opens += 1;
          else if (stack[i].name === closeName) {
            if (opens) opens -= 1; else return i;
          }
        }
        return -1;
      };
      if (!stack.length) throw new ExprError("Invalid expression, expected a name");
      const head = stack[0];
      if (head.name === "OPEN_CURLY") {
        stack.shift();
        const closing = findClosing("CURLY", 0);
        if (closing === -1) throw new ExprError("Invalid expression, no closing curly bracket");
        const name = this.evalTokens(stack.slice(0, closing));
        stack.splice(0, closing + 1);
        return norm(name);
      }
      if (head.name === "NUMBER") { stack.shift(); return head.value; }
      if (head.name !== "VAR") {
        throw new ExprError("Invalid expression; expected name, found " + head.name + " at char " + head.pos);
      }
      let name = String(head.value);
      stack.shift();
      while (stack.length && stack[0].name === "OPEN_SQUARE") {
        const closing = findClosing("SQUARE", 1);
        if (closing === -1) throw new ExprError("Invalid expression, no closing array bracket");
        const index = this.evalTokens(stack.slice(1, closing));
        name += "_" + csStr(index);
        stack.splice(0, closing + 1);
      }
      return norm(name);
    }

    _evalExpr(stack, parenthetical) {
      if (!stack.length) throw new ExprError("no expression specified");
      let value1 = this._evalValueToken(stack.shift(), stack);
      if (!stack.length) {
        if (parenthetical) throw new ExprError("Invalid expression, expected " + parenthetical);
        return value1;
      }
      let token = stack.shift();
      if (parenthetical && parenthetical === token.name) return value1;
      const op = OPERATORS[token.value];
      if (op === undefined) {
        throw new ExprError("Invalid expression at char " + token.pos +
          ", expected OPERATOR, was: " + token.name + " [" + token.value + "]");
      }
      if (!stack.length) throw new ExprError("Invalid expression, expected something after a " + token.value);
      const value2 = this._evalValueToken(stack.shift(), stack);
      const result = op(value1, value2);
      if (parenthetical) {
        if (stack.length) {
          token = stack.shift();
          if (parenthetical === token.name) return result;
          throw new ExprError("Invalid expression at char " + token.pos + ", expected " +
            parenthetical + ", was: " + token.name + " [" + token.value + "]");
        }
        throw new ExprError("Invalid expression, expected " + parenthetical);
      } else if (stack.length) {
        token = stack.shift();
        throw new ExprError("Invalid expression at char " + token.pos +
          ", expected no more tokens, was: " + token.name + " [" + token.value + "]");
      }
      return result;
    }

    _evalValueToken(token, stack) {
      const name = token.name;
      if (name === "OPEN_PARENTHESIS") return this._evalExpr(stack, "CLOSE_PARENTHESIS");
      if (name === "OPEN_CURLY") {
        const value = this._evalExpr(stack, "CLOSE_CURLY");
        return this.resolver.get_var(value);
      }
      if (name === "FUNCTION") {
        const value = this._evalExpr(stack, "CLOSE_PARENTHESIS");
        return this._callFunc(token.func, value);
      }
      if (name === "NUMBER") {
        return /^\d+$/.test(token.value) ? parseInt(token.value, 10) : parseFloat(token.value);
      }
      if (name === "STRING") {
        let inner = token.value.slice(1, -1);
        inner = inner.replace(/\\(.)/g, "$1");
        return this.resolver.replace_variables(inner);
      }
      if (name === "VAR") {
        let variable = String(token.value);
        while (stack.length && stack[0].name === "OPEN_SQUARE") {
          stack.shift();
          const idx = this._evalExpr(stack, "CLOSE_SQUARE");
          variable += "_" + csStr(idx);
        }
        return this.resolver.get_var(variable);
      }
      throw new ExprError("Invalid expression at char " + token.pos +
        ", expected NUMBER, STRING, VAR or PARENTHETICAL, was: " + name + " [" + token.value + "]");
    }

    _callFunc(func, value) {
      if (func === "not") return !toBool(value);
      if (func === "round") return Math.floor(toNum(value) + 0.5);
      if (func === "length") return csStr(value).length;
      if (func === "log") return Math.log10(toNum(value));
      if (func === "timestamp") return parseTimestamp(csStr(value));
      if (func === "auto") throw new ExprError("auto() must come after a < or > symbol");
      throw new ExprError("Unknown function " + func);
    }
  }

  function parseTimestamp(value) {
    const t = Date.parse(value.trim());
    if (isNaN(t)) throw new ExprError("timestamp() could not parse date: " + value);
    return Math.floor(t / 1000);
  }

  // ---- interpolation ---------------------------------------------------- //

  const REPLACER = /[$@](!?!?)\{/g;

  function replaceVariables(line, evaluator) {
    line = String(line);
    const output = [];
    let index = 0;
    while (true) {
      REPLACER.lastIndex = index;
      const m = REPLACER.exec(line);
      if (!m) { output.push(line.slice(index)); break; }
      output.push(line.slice(index, m.index));
      const sigil = line[m.index];
      const capitalize = m[1];
      const exprStart = m.index + m[0].length;
      let curlies = 0, closing = -1, i = exprStart;
      while (i < line.length) {
        const c = line[i];
        if (c === "{") curlies += 1;
        else if (c === "}") { if (curlies) curlies -= 1; else { closing = i; break; } }
        i += 1;
      }
      if (closing === -1) throw new CSError("invalid " + line.slice(m.index, exprStart) + " variable substitution");
      const body = line.slice(exprStart, closing);
      let value = sigil === "$" ? evaluator.evalString(body) : evalMultireplace(body, evaluator);
      value = csStr(value);
      if (capitalize === "!") value = value.slice(0, 1).toUpperCase() + value.slice(1);
      else if (capitalize === "!!") value = value.toUpperCase();
      output.push(value);
      index = closing + 1;
    }
    return output.join("");
  }

  function evalMultireplace(body, evaluator) {
    let expr, options;
    if (/^\s*\(/.test(body)) {
      let parens = 0, closingParen = -1;
      for (let i = 1; i < body.length; i++) {
        const c = body[i];
        if (c === "(") parens += 1;
        else if (c === ")") { if (parens) parens -= 1; else { closingParen = i; break; } }
      }
      if (closingParen === -1) throw new CSError("invalid @{} multireplace; missing closing parenthesis");
      if (closingParen + 1 >= body.length || body[closingParen + 1] !== " ")
        throw new CSError("invalid @{} multireplace; there should be a space after )");
      expr = body.slice(1, closingParen);
      options = body.slice(closingParen + 2).split("|");
    } else {
      if (!/^\S+ /.test(body))
        throw new CSError("invalid @{} multireplace; there should be a space after the first word");
      const spaceIndex = body.indexOf(" ");
      expr = body.slice(0, spaceIndex);
      options = body.slice(spaceIndex + 1).split("|");
    }
    if (options.length < 2) throw new CSError("invalid @{} multireplace; need at least one pipe |");
    let value = evaluator.evalString(expr);
    if (isBool(value) || (isStr(value) && (value.toLowerCase() === "true" || value.toLowerCase() === "false"))) {
      value = toBool(value) ? 1 : 2;
    }
    value = Math.trunc(toNum(value));
    if (value < 1) throw new CSError("invalid @{} multireplace; '" + expr + "' = " + value + " is not positive");
    if (value > options.length)
      throw new CSError("invalid @{} multireplace; '" + expr + "' = " + value +
        " but there are only " + options.length + " options");
    return replaceVariables(options[value - 1], evaluator);
  }

  const MARKUP_RE = /\[\/?(i|b|lie|key|val|stat|suspiciously|optimistically)\]/g;
  // Mirror the game's replaceBbCode for the tags that carry layout meaning:
  // [n/] is a hard line break and [c/] is a "continue, no space" marker that
  // renders as nothing. The remaining styling tags are simply dropped. The
  // resulting "\n" survives paragraph joining (which only collapses spaces and
  // tabs) and shows as a line break wherever text is rendered pre-wrap.
  function stripMarkup(text) {
    return String(text)
      .replace(/\[n\/\]/g, "\n")
      .replace(/\[c\/\]/g, "")
      .replace(MARKUP_RE, "");
  }

  root.CS = { CSError, ExprError, GameOver, QuitGame, LoadGame, RestartGame,
    Line, parseScene, getIndent, toNum, toBool, csStr, Token, tokenize, OPERATORS,
    Evaluator, replaceVariables, stripMarkup };

  // ---- state serialization ---------------------------------------------- //
  // Mirrors the Python _to_jsonable/_from_jsonable. JS also has Map values
  // (_choice_ends/_choice_used with integer keys) which JSON can't hold, so a
  // Map is encoded as {__map__: [[k, v], ...]} and restored to a Map on load.

  function toJsonable(obj) {
    if (obj instanceof Map) {
      return { __map__: Array.from(obj.entries()).map(([k, v]) => [k, toJsonable(v)]) };
    }
    if (Array.isArray(obj)) return obj.map(toJsonable);
    if (obj && typeof obj === "object") {
      const out = {};
      for (const k of Object.keys(obj)) out[k] = toJsonable(obj[k]);
      return out;
    }
    return obj;
  }

  function fromJsonable(obj) {
    if (Array.isArray(obj)) return obj.map(fromJsonable);
    if (obj && typeof obj === "object") {
      const keys = Object.keys(obj);
      if (keys.length === 1 && keys[0] === "__map__") {
        const m = new Map();
        for (const [k, v] of obj.__map__) m.set(keyFrom(k), fromJsonable(v));
        return m;
      }
      const out = {};
      for (const k of keys) out[k] = fromJsonable(obj[k]);
      return out;
    }
    return obj;
  }

  function keyFrom(k) {
    if (typeof k === "string" && /^-?\d+$/.test(k)) return parseInt(k, 10);
    return k;
  }

  // Plain deep copy for already-jsonable data (checkpoints/state). Must NOT
  // use fromJsonable, which would turn serialized {__map__} into live Maps and
  // corrupt the jsonable form.
  function deepCopy(obj) { return JSON.parse(JSON.stringify(obj)); }

  // ---- engine ----------------------------------------------------------- //

  function truthy(value) { return toBool(value); }

  const INITIAL_COMMANDS = new Set([
    "create", "create_array", "scene_list", "title", "author", "comment",
    "achievement", "product", "ifid",
  ]);

  const NOOP_COMMANDS = new Set([
    "page_break_advertisement", "finish_advertisement", "advertisement",
    "check_purchase", "restore_purchases", "purchase", "looplimit",
    "purchase_discount", "print_discount", "check_registration", "login",
    "subscribe", "share_this_game", "more_games", "feedback",
    "check_achievements",
    "sound", "youtube", "link",
    "link_button", "track_event", "timer", "ifid", "product",
    "show_password", "author", "delay_break",
    "end_trial", "script", "achievement",
  ]);

  const ENV_VARS = {
    choice_subscribe_allowed: () => true,
    choice_register_allowed: () => false,
    choice_registered: () => false,
    choice_is_web: () => false,
    choice_is_steam: () => false,
    choice_is_steam_deck: () => false,
    choice_is_ios_app: () => false,
    choice_is_ipad_app: () => false,
    choice_is_android_app: () => false,
    choice_is_omnibus_app: () => false,
    choice_is_amazon_app: () => false,
    choice_is_advertising_supported: () => false,
    choice_is_trial: () => false,
    choice_prerelease: () => false,
    choice_kindle: () => false,
    choice_randomtest: () => false,
    choice_quicktest: () => false,
    choice_nightmode: () => false,
    choice_purchase_supported: () => false,
    choice_purchased_adfree: () => true,
    choice_purchased_everything: () => true,
    choice_restore_purchases_allowed: () => false,
    choice_save_allowed: () => true,
    choice_release_date: () => "release day",
  };

  class Scene {
    constructor(name, lines) {
      this.name = name;
      this.lines = lines;
      this.labels = {};
      this._indexLabels();
    }
    _indexLabels() {
      for (let i = 0; i < this.lines.length; i++) {
        const ln = this.lines[i];
        if (ln.command && ln.command.toLowerCase() === "label") {
          const label = ln.arg.trim().toLowerCase();
          if (/\s/.test(label)) {
            throw new CSError("label '" + label + "' is not allowed to contain spaces", this.name, ln.num);
          }
          if (label in this.labels) {
            throw new CSError("label '" + label + "' already defined on line " +
              this.lines[this.labels[label]].num, this.name, ln.num);
          }
          this.labels[label] = i;
        }
      }
    }
  }

  class Engine {
    constructor(io, sceneLoader) {
      // sceneLoader(name) -> array of Line (parsed). Replaces filesystem access.
      this.io = io;
      this._loader = sceneLoader;
      io.engine = this;
      this.stats = {};
      this.temps = this._freshTemps();
      this.scene_list = [];
      this.scene_cache = {};
      this.evaluator = new Evaluator(this);

      this.scene = null;
      this.line_num = 0;
      this.indent = 0;
      this.finished = false;
      this.initial_commands = true;

      this._para = [];
      this.achievements = {};
      this.unlocked = new Set();
      this.checkpoints = {};
      this._resume = null;
      this._pending_scene = null;
      this._in_stats = false;
      this._rng = Math.random;  // overridable for deterministic tests
    }

    _freshTemps() {
      return {
        choice_reuse: "allow",
        param: [],
        _choice_ends: new Map(),
        _choice_used: new Map(),
        _choice_substack: [],
        _fake_choice_depth: 0,
      };
    }

    // ---- resolver interface ---- //

    get_var(variable) {
      variable = String(variable).toLowerCase();
      if (variable && /^-?\d+$/.test(variable)) return parseInt(variable, 10);
      if (variable === "true") return true;
      if (variable === "false") return false;
      const env = ENV_VARS[variable];
      if (env !== undefined) return env(this);
      if (variable === "choice_linenum") return this.line_num;
      if (variable === "choice_scene") return this.scene ? this.scene.name : "";
      if (variable.startsWith("choice_saved_checkpoint")) return !!this.stats[variable];
      if (variable.startsWith("choice_achieved_"))
        return this.unlocked.has(variable.slice("choice_achieved_".length));
      if (variable.startsWith("choice_purchased_")) return true;
      if (variable === "choice_user_restored" && !(variable in this.temps)) return false;
      if (variable === "choice_just_restored_checkpoint" && !(variable in this.temps)) return false;
      let value;
      if (variable in this.temps) value = this.temps[variable];
      else if (variable in this.stats) value = this.stats[variable];
      else {
        if (variable === "implicit_control_flow") return false;
        throw new CSError("Non-existent variable '" + variable + "'",
          this.scene ? this.scene.name : null, this._curNum());
      }
      if (value === null || value === undefined) {
        throw new CSError("Variable '" + variable + "' exists but has no value",
          this.scene ? this.scene.name : null, this._curNum());
      }
      return value;
    }

    replace_variables(text) { return replaceVariables(text, this.evaluator); }

    set_var(variable, value) {
      variable = String(variable).toLowerCase();
      if (variable in this.temps) this.temps[variable] = value;
      else if (variable in this.stats) this.stats[variable] = value;
      else throw new CSError("Non-existent variable '" + variable + "'",
        this.scene ? this.scene.name : null, this._curNum());
    }

    _validateVariable(variable) {
      if (!variable || !/^[a-zA-Z]/.test(variable))
        throw this._err("Invalid variable name, must start with a letter: " + variable);
      if (!/^\w+$/.test(variable))
        throw this._err("Invalid variable name: '" + variable + "'");
      if (/^(and|or|true|false|scene|scenename)$/i.test(variable))
        throw this._err("Invalid variable name, '" + variable + "' is a reserved word");
      if (variable.startsWith("choice_"))
        throw this._err("variables may not start with 'choice_'");
    }

    _curNum() {
      if (this.scene && this.line_num >= 0 && this.line_num < this.scene.lines.length)
        return this.scene.lines[this.line_num].num;
      return null;
    }
    _err(msg) { return new CSError(msg, this.scene ? this.scene.name : null, this._curNum()); }
    _safeGet(name) { try { return this.get_var(name); } catch (e) { if (e instanceof CSError) return null; throw e; } }

    // ---- scene loading + run ---- //

    load_scene(name) {
      name = name.toLowerCase();
      if (!(name in this.scene_cache)) {
        const lines = this._loader(name);
        this.scene_cache[name] = new Scene(name, lines);
      }
      return this.scene_cache[name];
    }

    run(startScene) {
      this._enterScene(this.load_scene(startScene || "startup"));
      this._runUntilEnd();
    }

    resumeFromState(state) {
      this._applyState(state);
      this._runUntilEnd();
    }

    // Run choicescript_stats against the *already-applied* engine state, as a
    // single scene. Unlike showStats() this does NOT snapshot/restore — it's
    // meant for a throwaway engine whose state was set via _applyState. Because
    // stats screens are often interactive (*choice menus of stat categories),
    // the io is free to throw StopReplay at a prompt; that propagates to the
    // caller, which records the answer and re-runs from the top. Mirrors the
    // single-scene model of engine.py show_stats (labels/goto within the scene
    // work; goto_scene out of stats is not followed, by ChoiceScript convention).
    runStatsScene() {
      this.scene = this.load_scene("choicescript_stats");
      this.line_num = 0;
      this.indent = 0;
      this.finished = false;
      this.temps = this._freshTemps();
      this._para = [];
      this._pending_scene = null;
      this._resume = null;
      this._in_stats = true;
      this._runStatsLoop();
      this._in_stats = false;
    }

    // Drive the stats overlay to completion. Unlike a single _printLoop() call,
    // this follows *gosub_scene transitions (e.g. magics' appearance text calls
    // out to utils) and the *return that comes back, so the whole stats scene
    // renders. Unlike _mainLoop it never advances into the next scene in the
    // scene list: when the stats scene finishes with no pending transition,
    // we're done.
    _runStatsLoop() {
      try {
        while (true) {
          this._printLoop();
          if (this._pending_scene !== null) {
            const nxt = this._pending_scene;
            this._pending_scene = null;
            this._enterScene(nxt);
            continue;
          }
          break;
        }
      } catch (e) {
        if (!(e instanceof GameOver)) throw e;
      }
      this._flushParagraph();
    }

    // Run choicescript_stats as a read-only overlay against current state, then
    // restore everything (the stats scene may *set globals as harmless
    // normalizations, so we snapshot stats too). Mirrors engine.py show_stats.
    // The caller must have made "choicescript_stats" loadable; if the loader
    // can't find it, the CSError propagates.
    showStats() {
      const saved = {
        scene: this.scene, line_num: this.line_num, indent: this.indent,
        finished: this.finished, temps: this.temps, _para: this._para,
        _pending_scene: this._pending_scene, _resume: this._resume,
        initial_commands: this.initial_commands, stats: Object.assign({}, this.stats),
      };
      try {
        this.scene = this.load_scene("choicescript_stats");
        this.line_num = 0;
        this.indent = 0;
        this.finished = false;
        this.temps = this._freshTemps();
        this._para = [];
        this._pending_scene = null;
        this._resume = null;
        this._in_stats = true;
        this._runStatsLoop();
      } finally {
        this._in_stats = false;
        this.scene = saved.scene;
        this.line_num = saved.line_num;
        this.indent = saved.indent;
        this.finished = saved.finished;
        this.temps = saved.temps;
        this._para = saved._para;
        this._pending_scene = saved._pending_scene;
        this._resume = saved._resume;
        this.initial_commands = saved.initial_commands;
        this.stats = saved.stats;
      }
    }

    _runUntilEnd() {
      while (true) {
        try {
          this._mainLoop();
          return;
        } catch (e) {
          if (e instanceof RestartGame) {
            this._resetAll();
            this._enterScene(this.load_scene("startup"));
            continue;
          }
          if (e instanceof LoadGame) { this._applyState(e.state); continue; }
          if (e instanceof QuitGame) {
            try { this.autosave(); } catch (_) { /* never mask quit */ }
            throw e;
          }
          throw e;
        }
      }
    }

    _mainLoop() {
      try {
        while (true) {
          this._printLoop();
          if (this._pending_scene !== null) {
            const nxt = this._pending_scene;
            this._pending_scene = null;
            this._enterScene(nxt);
            continue;
          }
          const nxt = this._nextSceneName(this.scene.name);
          if (!nxt) break;
          this.temps = this._freshTemps();
          this._enterScene(this.load_scene(nxt));
        }
      } catch (e) {
        if (e instanceof GameOver) { this._flushParagraph(); return; }
        throw e;
      }
    }

    _enterScene(scene) {
      this.scene = scene;
      this.finished = false;
      this._pending_scene = null;
      const resume = this._resume;
      if (resume !== null && resume[0] === scene.name) {
        const [, lineNum, indent] = resume;
        this.line_num = lineNum != null ? lineNum : 0;
        this.indent = indent != null ? indent : scene.lines[this.line_num].indent;
      } else {
        this.line_num = 0;
        this.indent = 0;
      }
      this._resume = null;
      if (scene.name !== "startup") this.initial_commands = false;
    }

    _nextSceneName(current) {
      const i = this.scene_list.indexOf(current);
      if (i === -1) return null;
      if (i + 1 < this.scene_list.length) return this.scene_list[i + 1];
      return null;
    }

    // ---- save / load state ---- //

    _baseState() {
      return {
        version: 1,
        scene: this.scene ? this.scene.name : null,
        line_num: this.line_num,
        indent: this.indent,
        initial_commands: this.initial_commands,
        scene_list: this.scene_list.slice(),
        stats: toJsonable(this.stats),
        temps: toJsonable(this.temps),
        unlocked: Array.from(this.unlocked).sort(),
      };
    }

    captureState() {
      const state = this._baseState();
      if (Object.keys(this.checkpoints).length) state.checkpoints = deepCopy(this.checkpoints);
      return state;
    }

    _applyState(state) {
      this.scene_list = (state.scene_list || []).slice();
      this.stats = fromJsonable(state.stats);
      this.temps = fromJsonable(state.temps);
      this.unlocked = new Set(state.unlocked || []);
      this.checkpoints = deepCopy(state.checkpoints || {});
      this.initial_commands = state.initial_commands === undefined ? false : state.initial_commands;
      this._pending_scene = null;
      this._resume = null;
      this._para = [];
      this.finished = false;
      this.scene = state.scene ? this.load_scene(state.scene) : null;
      this.line_num = state.line_num || 0;
      this.indent = state.indent || 0;
    }

    _resetAll() {
      this.stats = {};
      this.temps = this._freshTemps();
      this.scene_list = [];
      this.unlocked = new Set();
      this.checkpoints = {};
      this.initial_commands = true;
      this._pending_scene = null;
      this._resume = null;
      this._para = [];
      this.finished = false;
      this.scene = null;
      this.line_num = 0;
      this.indent = 0;
    }

    autosave() {
      if (this.scene === null) return;
      if (this.io.on_autosave) this.io.on_autosave(this.captureState());
    }

    requestRestart() { throw new RestartGame(); }

    // ---- main interpreter loop (mirrors Scene.prototype.printLoop) ---- //

    _printLoop() {
      const lines = this.scene.lines;
      this.finished = false;
      while (!this.finished && this.line_num < lines.length) {
        const line = lines[this.line_num];
        if (line.is_blank) { this._flushParagraph(); this.line_num += 1; continue; }

        const indent = line.indent;
        if (indent > this.indent) {
          if (line.command && line.command.toLowerCase() === "comment") { this.line_num += 1; continue; }
          throw this._err("increasing indent not allowed, expected " + this.indent + " was " + indent);
        }

        const end = this.temps._choice_ends.get(this.line_num);
        if (end !== undefined &&
            (truthy(this._safeGet("implicit_control_flow")) || this.temps._fake_choice_depth > 0)) {
          this.line_num = end + 1;
          if (this.temps._fake_choice_depth > 0) this.temps._fake_choice_depth -= 1;
          continue;
        }

        this.indent = indent;

        if (line.command == null && line.text.startsWith("#")) {
          throw this._err("It is illegal to fall out of a *choice statement; " +
            "you must *goto or *finish before the end of the indented block.");
        }

        if (line.command == null) {
          this.initial_commands = false;
          this._printText(line.text);
        } else {
          this._runCommand(line);
        }
        this.line_num += 1;
      }
      this._flushParagraph();
      if (!this.finished) this.finished = true;
    }

    _runCommand(line) {
      const cmd = line.command.toLowerCase();
      const data = line.arg.trim();
      if (INITIAL_COMMANDS.has(cmd)) {
        if (this.scene.name !== "startup" || !this.initial_commands) {
          if (cmd !== "comment")
            throw this._err("Invalid " + cmd + " instruction, only allowed at top of startup.txt");
        }
      } else {
        this.initial_commands = false;
      }
