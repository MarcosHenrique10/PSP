 speed away, knowing that now you have the story of a lifetime to tell everyone. If only there was some way to make anybody believe you.\n    *achieve boat\n    *goto_scene Transition\n\n  *else\n    You sprint in the direction of the boat, knowing that the T-Rex will quickly catch up to you. Going as fast as you can, you reach the point where you're only a few yards away from the boat, maybe 2-3 steps away. However, you are scooped up by the T-Rex and have a bird's eye view for a few seconds before being eaten by the fearsome beast.\n    *goto_scene death\n\n*else\n  You attempt to hide behind a piece of terrain, but are too loud and almost right away alert the T-Rex to your position. Knowing that you can't get away or fight it off, you look for a place to hide, but don't have nearly enough time to find us before you're eaten by the greatest land predator in the history of the planet.\n  *goto_scene death\n*label still\n\nYou stay perfectly still for about a minute, thinking that you'd be invisible to a T-Rex. Sadly, this is not the case, as this theory about its vision has been debunked several times since you last heard it. After it sees you, it charges. Since you've had no head start, and the T-Rex is now blocking your way to the boat, you attempt to run backwards from where you came, hoping for a place to hide. You find a small tunnel in the ground, and turn in its direction. However, this is too little too late, as you are eaten by the fearsome predator before being able to reach the ditch.\n\n*goto_scene death", "north_east": "*if (North_East = \"Unexplored\")\n  *goto unexplored\n*elseif (North_East = \"explored\")\n  *goto explored\n*else\n  *goto first_floor\n\n*label unexplored\n\nYou head to the North East, and you see that the path leads to a large, three-story high castle. It may be slightly obscured by all the trees in the way, but the look of the building is completely unmistakable. You're both awestruck and confused as to why there would be a castle here, but don't bother to think too much about it, as knowing the answer likely won't do much. As you continue down the path, you see that there is a dinosaur standing on its hind legs. It appears to be a herbivore, as you can't see any sharp teeth. However, you do see a large, thick dome on its head. You struggle to recall its name.\n\nPach...no that's not it.\n\nPaycef...no, you don't think so.\n\npyshalph...doesn't sound right.\n\nPachycephalosaurus! That's it. You're so excited that you actually yell the name out loud, causing the creature to turn around towards you, see you and start running headfirst at you. It's much faster than you, so running away isn't an option. What do you choose to do?\n\n*choice\n  #Attempt to dodge at the last second. Hopefully, its momentum will cause it to miss me.\n    *if Athletics > 2\n      You're fast enough to dodge the rampaging beast. It speeds directly past you and you can no longer see it. You quickly escape before it can return to your current location.\n      *set North_East \"explored\"\n      *goto unexplored_2\n    *else \n      You are not fast enough to dodge it, as it hits you directly, hurting you a lot. After its casts you aside, its momentum carries it past you and you're able to get up and get away before it returns.\n      *set Health -4\n      *set North_East \"explored\"\n      *goto unexplored_2\n  #Hide. It can't hit me if it doesn't see me.\n    *if Stealth > 2\n      You're able to find a hiding place as it charges. It stops, confused and looks around for you. After letting out a few intimidating roars, it leaves, probably thinking it scared you away. I mean, that wouldn't be wrong, but at least you didn't get hurt. You come out of your hiding place when it's out of sight and continue on your way to the castle. \n      *set North_East \"explored\"\n      *goto unexplored_2\n    *else\n      You're not as good at hiding as you thought, and it's able to find you, still going full speed. After it casts you aside, its momentum carries it past you and you're able to get up and get away before it returns.\n      *set Health -4\n      *set North_East \"explored\"\n      *goto unexplored_2\n  #Hit it with my axe. That could knock it out.\n    You wind up for a swing, hitting the creature on the top of its head. Normally, that would have done a lot, but this one has a lot of bone there, and your axe does nothing, and you get run over. After its casts you aside, its momentum carries it past you and you're able to get up and get away before it returns.\n    *set Health -4\n    *set North_East \"explored\"\n    *goto unexplored_2\n  *selectable_if (katana = \"found\") #Decapitate it with my katana. Its the most badass thing I can ever do.\n    You step aside and at the last second, swing directly at the creature's neck, taking its head off. How do you feel about this?\n    *fake_choice\n      #Awesome, that was so cool!\n        Yeah, I can imagine.\n      #Terrible, I just killed something. \n        Understandable, killing a creature is never emotionally easy.\n    *set North_East \"explored\"\n    *goto unexplored_2\n  #Absorb the blow. I can't avoid the damage, but I might be able to minimize it.\n    You prep yourself for taking a heavy blow and the creature rams into you. After it casts you aside, its momentum carries it past you and you're able to get up and get away before it returns.\n    *set Health -2\n    *set North_East \"explored\"\n    *goto unexplored_2\n\n*label unexplored_2\n\n*if health \u003c 1\n  The damage from the charge is enough to finish you off, however, delayed it may have been. After stumbling around for a bit, you finally drop unconscious, knowing deep down you will never return.\n  *goto_scene death\n\nYou reach the door of the castle only to determine that it is locked.\n\n*goto door\n\n*label explored\n\nYou return to the castle door.\n\n*goto door\n\n*label door\n\n*image castle.jpg\n\n*choice\n  *disable_reuse  *selectable_if (shed_key = \"found\") #Try the key labeled \"NW shed\". Maybe that's what unlocks it.\n    You are unable to unlock the castle. Maybe another key will do the trick.    \n    *goto door\n  *disable_reuse  *selectable_if (shed_key_2 = \"found\") #Try the key labeled \"E shed\". Maybe that's what unlocks it.\n    You are unable to unlock the castle. Maybe another key will do the trick.\n    *goto door\n  *selectable_if (castle_key = \"found\") #Try the key labeled \"Cast\". Maybe that's what unlocks it.\n    You can unlock the castle. As you walk inside, you notice that there are five doors within the castle. You can't tell if any of them are unlocked.\n    *set North_East \"Unlocked\"\n    *goto first_floor\n  *disable_reuse  *selectable_if (lighthouse_key = \"found\") #Try the key labeled \"Light\". Maybe that's what unlocks it.\n    You are unable to unlock the castle.  Maybe another key will do the trick.\n    *goto door\n  *disable_reuse  *selectable_if (Second_floor_key = \"found\") #Try the key labeled \"2\". Maybe that's what unlocks it.\n    You are unable to unlock the castle. Maybe another key will do the trick.\n    *goto door\n  *disable_reuse  *selectable_if (Third_floor_key = \"found\") #Try the key labeled \"3\". Maybe that's what unlocks it.\n    You are unable to unlock the castle. Maybe another key will do the trick.\n    *goto door\n  *disable_reuse  *selectable_if (Green_house_key = \"found\") #Try the key labelled \"green\". Maybe that's what unlocks it.\n    You are unable to unlock the castle. Maybe another key will do the trick.\n    *goto door\n  *disable_reuse  *selectable_if (church_key = \"found\") #Try the key labelled \"ch\". Maybe that's what unlocks it.\n    You are unable to unlock the castle. Maybe another key will do the trick.   \n    *goto door\n  *disable_reuse  *selectable_if (secret_key = \"found\") #Try the key labelled \"?\". Maybe that's what unlocks it.\n    You are unable to unlock the door. Maybe another key will do the trick.   \n    *goto door\n  #Go back to where I was before.\n    You return to the center of the island.\n    *goto_scene center\n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto door\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Cave_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Cave_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Cave_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Cave_Heal\n          *else\n            *set Health + 5\n            *goto Cave_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto door\n\n  *selectable_if (map = \"found\") #Look at the map.\n    You look at the map. You can see the north is restricted, presumably due to danger, but also presumably contains a motorboat which you could use to escape the island. The North East has a castle, while the East has a lighthouse, a greenhouse and a shed. The South East is labelled as the industrial area and has a factory, a lab and a storage area. The South as a church, a swamp and a town featuring houses, a bar, a general store, an arena and a town hall. The South West is packed with nature, as it contains a river and waterfall headed into a lake, hills and mountains, while the West has a beach which also acts as a dock for ships. The North West has a shed in the middle of grasslands.\n    *goto door\n\n*label Cave_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Cave_Heal_2\n\n*label Cave_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto door\n\n\n*label first_floor\n\nViewing the castle's rooms, you wonder where to go. You shout \"hello!\" loudly on the off chance that there's someone inside, but after about a minute of waiting, you see and hear nobody. You wonder why it's locked.\n\n\n*choice\n  #The first room.\n    You see that there's nothing in the first room except for what appears to be a bedroom with nobody in it. You look around and see nothing of use.\n    *goto first_floor\n  #The second room.\n    *if (money = \"missing\")\n      You're rich! You are completely stunned, surrounded by a large pile of treasure. Gold coins, statues and more. You realize you can't fit nearly all of it anywhere, so you stuff what you can into your bag. Hopefully, you can live long enough to spend some of it.\n      *achieve treasure\n      *set money \"found\"\n      *goto first_floor\n    *else\n      You see the treasure once again. You can't fit it all in your pockets, but you hope you can spend what you have (and maybe return for the rest).\n      *goto first_floor\n  #The third room.\n    You see a bathroom. You can go if you want.\n    *goto first_floor\n  #The fourth room.\n    *if (antennae = \"missing\")\n      You find an antenna that looks like it could belong to the type of radio the helicopter uses. You pocket it on the off chance that it comes in handy.\n      *set antennae \"found\"\n      *goto first_floor\n    *else\n      Nothing left since you took the antennae\n      *goto first_floor\n  #The fifth room. \n    *label fifth_room\n    *if second_floor = \"locked\"\n      The door appears to be locked.\n      *choice\n        *disable_reuse  *selectable_if (shed_key = \"found\") #Try the key labeled \"NW shed\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto fifth_room\n        *disable_reuse  *selectable_if (shed_key_2 = \"found\") #Try the key labeled \"E shed\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.\n          *goto fifth_room\n        *disable_reuse  *selectable_if (castle_key = \"found\") #Try the key labeled \"Cast\". Maybe that's what unlocks it.\n          You can unlock the door. Maybe another key will do the trick.\n          *goto fifth_room\n        *disable_reuse  *selectable_if (lighthouse_key = \"found\") #Try the key labeled \"Light\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.\n          *goto fifth_room\n        *selectable_if (Second_floor_key = \"found\") #Try the key labeled \"2\". Maybe that's what unlocks it.\n          You can unlock the door. You head up the staircase.\n          *set second_floor \"unlocked\"\n          *goto second_floor\n        *disable_reuse  *selectable_if (Third_floor_key = \"found\") #Try the key labeled \"3\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.\n          *goto fifth_room\n        *disable_reuse  *selectable_if (Green_house_key = \"found\") #Try the key labelled \"green\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.\n          *goto fifth_room\n        *selectable_if (church_key = \"found\") #Try the key labelled \"ch\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.   \n          *goto fifth_room\n        *selectable_if (secret_key = \"found\") #Try the key labelled \"?\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.   \n          *goto fifth_room\n        #Go back to the first floor\n          You return to the first floor\n          *goto first_floor\n        #Go back to the center of the island.\n          You return to the center of the island.\n          *goto_scene center\n    *else\n      You head up the staircase.\n      *set second_floor \"unlocked\"\n      *goto second_floor\n  #The middle of the island\n    You return to the center of the island\n    *goto_scene center\n*label second_floor\n\n*if (second_floor = \"Unexplored\")\n  *goto floor_2_unexplored\n*else\n  *goto floor_2_explored\n\n*label floor_2_unexplored\n\nAs you go up the stairs, you begin to think more and more that your train of thought from earlier was correct: nobody is around. You can't see or hear anyone or anything, other than your footsteps. As you get to the top, you notice that there are another four rooms. As you glance around, you can see that there's no indication as to which door leads where\n\n*set second_floor \"explored\"\n\n*goto floor_2\n\n*label floor_2_explored\n\nYou return to the second floor.\n\n*goto floor_2\n\n*label floor_2\n\n\nAs you look at the four doors, which one do you open?\n\n*choice\n  #The first door\n    You look around for a while, and despite the size of the room, you find absolutely nothing.\n    *goto floor_2\n  #The second door\n      The door appears to be locked.\n      *choice\n        *disable_reuse  *selectable_if (shed_key = \"found\") #Try the key labeled \"NW shed\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto floor_2\n        *disable_reuse  *selectable_if (shed_key_2 = \"found\") #Try the key labeled \"E shed\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto floor_2\n        *disable_reuse  *selectable_if (castle_key = \"found\") #Try the key labeled \"Cast\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto floor_2\n        *disable_reuse  *selectable_if (lighthouse_key = \"found\") #Try the key labeled \"Light\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto floor_2\n        *disable_reuse  *selectable_if (Second_floor_key = \"found\") #Try the key labeled \"2\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto floor_2\n        *disable_reuse  *selectable_if (Third_floor_key = \"found\") #Try the key labeled \"3\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto floor_2\n        *disable_reuse  *selectable_if (Green_house_key = \"found\") #Try the key labelled \"green\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto floor_2\n        *disable_reuse  *selectable_if (church_key = \"found\") #Try the key labelled \"ch\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.   \n          *goto floor_2\n        *disable_reuse  *selectable_if (secret_key = \"found\") #Try the key labelled \"?\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.   \n          *goto floor_2\n        #Go back to the first floor\n          You return to the first floor\n          *goto first_floor\n        #Go back to the center of the island.\n          You return to the center of the island.\n          *goto_scene center\n  #The third door\n    The third room contains nothing at all. Nothing at all. Nothing at all.\n    *goto floor_2\n  #The fourth door\n    *if third_floor = \"Unexplored\"\n      The door appears to be locked.\n      *choice\n        *disable_reuse  *selectable_if (shed_key = \"found\") #Try the key labeled \"NW shed\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto floor_2\n        *disable_reuse  *selectable_if (shed_key_2 = \"found\") #Try the key labeled \"E shed\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto floor_2\n        *disable_reuse  *selectable_if (castle_key = \"found\") #Try the key labeled \"Cast\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto floor_2\n        *disable_reuse  *selectable_if (lighthouse_key = \"found\") #Try the key labeled \"Light\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto floor_2\n        *disable_reuse  *selectable_if (Second_floor_key = \"found\") #Try the key labeled \"2\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto floor_2\n        *selectable_if (Third_floor_key = \"found\") #Try the key labeled \"3\". Maybe that's what unlocks it.\n          You are able to unlock the door. You head up the stairway it leads to. \n          *set third_floor \"unlocked\"   \n          *goto floor_3\n        *disable_reuse  *selectable_if (Green_house_key = \"found\") #Try the key labelled \"green\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.    \n          *goto floor_2\n        *disable_reuse  *selectable_if (church_key = \"found\") #Try the key labelled \"ch\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.   \n          *goto floor_2\n        *disable_reuse  *selectable_if (secret_key = \"found\") #Try the key labelled \"?\". Maybe that's what unlocks it.\n          You are unable to unlock the door. Maybe another key will do the trick.   \n          *goto floor_2\n        #Go back to the first floor\n          You return to the first floor\n          *goto first_floor\n        #Go back to the center of the island.\n          You return to the center of the island.\n          *goto_scene center\n    *else\n      You head up another stairway.\n      *goto floor_3 \n  #Return to the first floor.\n    You return to the first floor.\n    *goto first_floor\n\n\n*label floor_3\n\n*if (third_floor = \"Unexplored\")\n  *goto floor_3_unexplored\n*else\n  *goto floor_3_explored\n\n*label floor_3_unexplored\n\nAs you go up the winding staircase to the third floor, it finally sinks in that there's almost certainly nobody in this building. Once you finally reach the top, you notice more doors again, three this time. You chuckle to yourself: the number if doors went five, four, three. \n\n*set third_floor \"explored\"\n\n*goto door_3\n\n*label floor_3_explored\n\nYou return to the third floor.\n\n*label door_3\n\nWhich door do you open?\n\n*choice \n  #The first door\n    The door appears to be locked.\n    *choice\n      *disable_reuse  *selectable_if (shed_key = \"found\") #Try the key labeled \"NW shed\". Maybe that's what unlocks it.\n        You are unable to unlock the door. Maybe another key will do the trick.    \n        *goto door_3\n      *disable_reuse  *selectable_if (shed_key_2 = \"found\") #Try the key labeled \"E shed\". Maybe that's what unlocks it.\n        You are unable to unlock the door. Maybe another key will do the trick.    \n        *goto door_3\n      *disable_reuse  *selectable_if (castle_key = \"found\") #Try the key labeled \"Cast\". Maybe that's what unlocks it.\n        You are unable to unlock the door. Maybe another key will do the trick.    \n        *goto door_3\n      *disable_reuse  *selectable_if (lighthouse_key = \"found\") #Try the key labeled \"Light\". Maybe that's what unlocks it.\n        You are unable to unlock the door. Maybe another key will do the trick.    \n        *goto door_3\n      *disable_reuse  *selectable_if (Second_floor_key = \"found\") #Try the key labeled \"2\". Maybe that's what unlocks it.\n        You are unable to unlock the door. Maybe another key will do the trick.    \n        *goto door_3\n      *disable_reuse  *selectable_if (Third_floor_key = \"found\") #Try the key labeled \"3\". Maybe that's what unlocks it.\n        You are unable to unlock the door. Maybe another key will do the trick.   \n        *goto door_3\n      *disable_reuse  *selectable_if (Green_house_key = \"found\") #Try the key labelled \"green\". Maybe that's what unlocks it.\n        You are unable to unlock the door. Maybe another key will do the trick.   \n        *goto door_3\n      *disable_reuse  *selectable_if (church_key = \"found\") #Try the key labelled \"ch\". Maybe that's what unlocks it.\n        You are unable to unlock the door. Maybe another key will do the trick.   \n        *goto door_3\n      *disable_reuse  *selectable_if (secret_key = \"found\") #Try the key labelled \"?\". Maybe that's what unlocks it.\n        You are unable to unlock the door. Maybe another key will do the trick.   \n        *goto door_3\n      #Go back to the second floor\n        You return to the second floor\n        *goto floor_2\n  #The second door\n    *if (shed_key_2 = \"missing\")\n      You find a key labelled \"E shed\". You decide to grab and pocket it.\n      *set shed_key_2 \"found\" \n      *goto door_3\n    *else\n      You find nothing else in this room.\n      *goto door_3\n  #The third door\n    *if (church_key = \"missing\")\n      You find a key labelled \"Ch\". You decide to grab it and pocket it.\n      *set church_key \"found\"\n      *goto door_3\n    *else\n      You find nothing else in this room.\n      *goto door_3\n  #Back to the second floor\n    You return to the second floor\n    *goto floor_2", "north_west": "*if (North_West = \"Unexplored\")\n  *goto unexplored\n*else\n  *goto explored\n\n*label unexplored\n\nYou head towards the northwest and quickly see a decreasing amount of trees until you reach a grassland. Walking right by some smaller sauropods. You think these are ones that are not fully grown, you see that they have no interest in you, at least as long as you don't bother them. A good thing too, because even though these things aren't fully grown, they still probably weight more than an elephant, meaning that if they were hostile, you wouldn't live for very long. Near the end of your journey, you see that there is a small group of 5 tiny dinosaurs, each of which is about a foot tall, but they are bipedal and carnivorous. Individually, you know you could take any of them one-on-one very easily, but you're not sure how well they can coordinate their attacks, or if there's any additional ones hiding.\n\n*image Compsognathus.jpg\n\nYou're not quite sure how to, or if you even should take them on. They don't seem to see you, and you could, in theory, sneak around them. However, since there's more than 1 of them, they're more likely to detect you. You could also take them on but charging them directly, but possibly get very hurt, or maybe even killed. You glance around and see that there's nothing else of note that could interfere with any fight. What do you do?\n\n*choice\n  #Sneak by\n    *goto sneak\n  #Charge\n    *goto fight\n\n*label sneak\n\n*if Stealth > 2\n  You successfully sneak by the small dinosaurs.\n  *goto grassland\n*else\n  You are unable to sneak by the dinosaurs and get attacked. One begins the fight by biting you in the back before you're able to turn around fully.\n  *set Health -1\n  *goto fight\n\n*label fight\n\n*if Athletics > 2\n  You pull out your axe and successfully fight them off.\n  *set Compsognathus \"dead\"\n  *goto grassland\n*elseif Athletics = 2\n  You pull out your axe, and after taking a couple of hits, you successfully fight them off.\n  *set Compsognathus \"dead\"\n  *set Health -2\n  *goto grassland\n*else\n  You pull out your axe, and after a long fight, manage to fight them off. You are bleeding, however, after taking several bites.\n  *set Compsognathus \"dead\"\n  *set Health -3\n  *goto grassland\n\n*label explored\n\nYou return to the grasslands.\n\n*if (Compsognathus = \"alive\")\n  You find the five small carnivores, still there as if waiting for your return.\n  *goto fight\n*else \n  *goto grassland\n\n*label grassland\n\n*if Health \u003c= 0\n  However, the total damage you have taken is too much. As the final one makes its last attack before you finish it, it causes a permanent injury to you. Mere moments after winning, you drop dead.\n  *goto_scene death\n\n*if (NW_shed = \"Unexplored\") \n\n  As you get out of the woods, you note the irony of how the figurative and literal uses of being out of the woods to mean the same thing. You let out a quiet \"huh\" at your realization before continuing with what you had set out here to do. Looking around, you see that there are two main places you can go to. One of them appears to be a shed that is about 7 feet high, and 10 feet in both length and width. There could be something useful in there, but you're not sure. The shed is clearly closed, so you can't see what's in it.\n  *goto inspect_plane\n\n*else\n  You get back out of the woods, only to look around and see that the shed where you got the C key is still there and open. \n  *goto inspect_plane\n\n*label inspect_plane\n\n*if (Plane = \"Unexplored\")\n\n  In the other direction, you can see a crashed plane, with smoke coming from it. By its size, you can tell its a private plane without enough room for more than about a dozen or so passengers. There doesn't appear to be a fire, so the smoke must have been caused by the sheer impact of it hitting the ground. You wonder if there's anything useful there.\n  *goto crossroads\n\n*else\n  In the other direction, you can see the plane that you looked through earlier.\n  *goto crossroads\n\n*label crossroads\n\n*set North_West \"explored\"\n\n*choice\n  #I go to the shed to see if there's anything useful in there\n    *goto shed\n  #I go to the plane to see if I can salvage anything\n    *goto plane\n  #I go back to the centre of the island. There's nothing for me here now.\n    You go back to the middle of the island to see if there's somewhere else you can go that will be at all helpful.\n    *goto_scene center\n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto crossroads\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Branch_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Branch_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Branch_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Branch_Heal\n          *else\n            *set Health + 5\n            *goto Branch_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto crossroads\n\n  *selectable_if (map = \"found\") #Look at the map.\n    You look at the map. You can see the north is restricted, presumably due to danger, but also presumably contains a motorboat which you could use to escape the island. The North East has a castle, while the East has a lighthouse, a greenhouse and a shed. The South East is labelled as the industrial area and has a factory, a lab and a storage area. The South as a church, a swamp and a town featuring houses, a bar, a general store, an arena and a town hall. The South West is packed with nature, as it contains a river and waterfall headed into a lake, hills and mountains, while the West has a beach which also acts as a dock for ships. The North West has a shed in the middle of grasslands.\n    *goto crossroads\n\n*label Branch_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Branch_Heal_2\n\n*label Branch_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto crossroads\n\n\n\n*label shed\n\n*if (NW_shed = \"Unexplored\")\n  *goto locked\n*else\n  *goto unlocked\n\n*label locked\n\nAs you approach the shed you notice that it is locked. You look around and luckily see that there is nothing around that could possibly attack you, so you can try to unlock it in one of a few ways. You attempt to hit it as hard as you can with your shoulder. Not only does your attempt do nothing to the door, but it also hurts your shoulder to have done that. You swing at it with your ax, only to hear the familiar 'clang' of metal hitting metal. Looks like you're going to need a key to do this.\n\n*choice\n  *selectable_if (shed_key = \"found\") #Try the key labeled \"NW shed\". Maybe that's what unlocks it.\n    You successfully unlock the shed. As you look inside, you see that there are no tools to originally be seen, but there is a pair of shelves that could indeed have something on them.\n    *set NW_shed \"explored\"\n    *goto unlocked\n  *disable_reuse  *selectable_if (shed_key_2 = \"found\") #Try the key labeled \"E shed\". Maybe that's what unlocks it.\n    You are unable to unlock the shed. Maybe another key will do the trick.\n    *goto locked\n  *disable_reuse  *selectable_if (castle_key = \"found\") #Try the key labeled \"Cast\". Maybe that's what unlocks it.\n    You are unable to unlock the shed. Maybe another key will do the trick.\n    *goto locked\n  *disable_reuse  *selectable_if (lighthouse_key = \"found\") #Try the key labeled \"Light\". Maybe that's what unlocks it.\n    You are unable to unlock the shed. Maybe another key will do the trick.\n    *goto locked\n  *disable_reuse  *selectable_if (Second_floor_key = \"found\") #Try the key labeled \"2\". Maybe that's what unlocks it.\n    You are unable to unlock the shed. Maybe another key will do the trick.\n    *goto locked\n  *disable_reuse  *selectable_if (Third_floor_key = \"found\") #Try the key labeled \"3\". Maybe that's what unlocks it.\n    You are unable to unlock the shed. Maybe another key will do the trick.\n    *goto locked\n  *disable_reuse  *selectable_if (Green_house_key = \"found\") #Try the key labelled \"green\". Maybe that's what unlocks it.\n    You are unable to unlock the shed. Maybe another key will do the trick.\n    *goto locked\n  *disable_reuse  *selectable_if (church_key = \"found\") #Try the key labelled \"ch\". Maybe that's what unlocks it.\n    You are unable to unlock the shed. Maybe another key will do the trick.   \n    *goto locked\n  *disable_reuse  *selectable_if (secret_key = \"found\") #Try the key labelled \"?\". Maybe that's what unlocks it.\n    You are unable to unlock the door. Maybe another key will do the trick.   \n    *goto locked\n  #Go back to where I was before.\n    You return to the crossroads.\n    *goto crossroads\n\n*label unlocked\n\nYou look at the two shelves within the shed and wonder if there's anything on them.\n\n*choice\n  #I check out the one on the left. Maybe something there can help me.\n    You see that there's nothing on the shelf.\n    *goto unlocked\n  #I check out the one on the right. Maybe something there can help me.\n    *goto right_shelf\n  #I leave the shed. There's nothing useful in here so I need to go back elsewhere.\n    You go back to the crossroads.\n    *goto crossroads\n\n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto unlocked\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Shed_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Shed_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Shed_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Shed_Heal\n          *else\n            *set Health + 5\n            *goto Shed_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto unlocked\n\n  *selectable_if (map = \"found\") #Look at the map.\n    You look at the map. You can see the north is restricted, presumably due to danger, but also presumably contains a motorboat which you could use to escape the island. The North East has a castle, while the East has a lighthouse, a greenhouse and a shed. The South East is labelled as the industrial area and has a factory, a lab and a storage area. The South as a church, a swamp and a town featuring houses, a bar, a general store, an arena and a town hall. The South West is packed with nature, as it contains a river and waterfall headed into a lake, hills and mountains, while the West has a beach which also acts as a dock for ships. The North West has a shed in the middle of grasslands.\n    *goto unlocked\n\n*label Shed_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Shed_Heal_2\n\n*label Shed_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto unlocked\n\n\n*label right_shelf\n\n*if (lighthouse_key = \"missing\") \n  You find a key labelled \"Light\". Of course, the important thing that you get from using the key is another key.\n  *set lighthouse_key \"found\"\n  *goto unlocked\n*else\n  You find nothing else of value on the shelf. Looks like the key labelled \"light\" was the only thing there.\n  *goto unlocked\n\n\n*label plane\n\n*if (Plane = \"Unexplored\")\n  *goto inspect\n*else\n  *goto inspected\n\n*label inspect\n\nYou hesitate slightly as you approach the plane. \"I have a bad feeling about this,\" you say to yourself, feeling like there might be something in the plane. Luckily for you, it appears as if the smoke has caused all the nearby dinosaurs to flee because you don't hear or see any of them near the crash. As you approach, you notice the lack of danger, and gradually begin to pick up the pace, eventually getting yourself back up to regular walking speed. You look at the damage, only to see that the front of the plane has been bent, and is now pushed together like an accordion. After looking inside the plane, you see that the only person on board, the pilot, has been crushed by said bending and pushing. The sight isn't a pleasant one to see, but what you see that inside, the back of the plane seems otherwise undamaged, so maybe there's something in there. \n\n*image plane_crash.jpg\n\nYou see that there's a small crack in the front of the plane, probably caused when the crash happened. After digging through your bag, you remember that you still have your axe, and can probably break in using that. You take a few swings at it the edges of the hole and are able to tear through the plane easier than you thought you would. The sounds seem to scare away some squirrels, creatures which feel slightly jarring to see on an island full of giant lizards. After a few minutes, you're able to create a human-sized hole that's large enough for you to walk through.\n\n*page_break\n\nAfter getting into the plane, you have to duck ever so slightly in order to fit yourself entirely into the plane when you're still near the front. You briefly look over at the pilot and notice he is holding his chest. You conclude that he must have died of a heart attack while still flying the plane and then crashed onto the island.\n\n*fake_choice\n  #At least he didn't experience the plane crash.\n    You feel relieved that he didn't experience the pain of the crash before moving on with your mission.\n  #Poor guy. A heart attack is an even worse way to die.\n    You feel back for the pilot, having died so suddenly without warning. Afterwards, you push through to finish your business here.\n  #I don't want to think about it either way.\n    You push through the shock, but remind yourself not to think about it too much. You have an island to get off of.\n\nAfter letting the feeling pass, you continue on to the back of the plane. When you reach it, you wonder how to get by the door, and once again bring out your axe. You take a few big swings are once again are able to bust through the door. You see a key and a medkit.\n\n*goto Plane_back\n\n*label inspected\n\nYou return to the back of the plane.\n\n*label Plane_back \n\n*set Plane \"Explored\"\n\n*choice\n  *selectable_if (Green_house_key = \"missing\") #Grab the key\n    You grab the key. It has the word \"green\" written on it.\n    *set Green_house_key \"found\"\n    *goto Plane_back\n  *selectable_if (Plane_Medkit = \"missing\") #Grab the medkit.\n    You grab the medkit,\n    *set Plane_Medkit \"found\"\n    *set Medkits +1\n    *goto Plane_back\n  #Leave.\n    You return to the crossroads.\n    *goto crossroads\n\n\n\n\n\n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto Plane_back\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Plane_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Plane_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Plane_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Plane_Heal\n          *else\n            *set Health + 5\n            *goto Plane_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto Plane_back\n\n  *selectable_if (map = \"found\") #Look at the map.\n    You look at the map. You can see the north is restricted, presumably due to danger, but also presumably contains a motorboat which you could use to escape the island. The North East has a castle, while the East has a lighthouse, a greenhouse and a shed. The South East is labelled as the industrial area and has a factory, a lab and a storage area. The South as a church, a swamp and a town featuring houses, a bar, a general store, an arena and a town hall. The South West is packed with nature, as it contains a river and waterfall headed into a lake, hills and mountains, while the West has a beach which also acts as a dock for ships. The North West has a shed in the middle of grasslands.\n    *goto Plane_back\n\n*label Plane_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Plane_Heal_2\n\n*label Plane_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto Plane_back\n    \n    ", "right_cave": "*if (Right_Cave = \"Unexplored\")\n\n  You head into the right cave, wondering what could be in there. As you head in, you see that it quickly gets quite dark.\n  *if (Office_Flashlight = \"Taken\")\n    Do you turn on your flashlight?\n    *choice\n      #Yes. It'll help me see.\n        *goto Use_Light\n      #No. It could alert other creatures that I'm here.\n        *goto No_Light\n  *else\n    *goto No_Light\n\n\n\n*else\n  You enter the cave and confidently return to the open ditch.\n  *goto ladder\n\n*label Use_Light\n\nYou turn on your flashlight and see in front of you that there's very little of anything except for open cave. No creatures, no turns, no large rocks, no stalagmites or stalactites. Nothing. You think this whole route is going to be super-easy until you come across a large, open ditch that you estimate to be about 15 feet across. \"Great,\" you think to yourself. \"Not again.\" You look around and see no kind of bridge or anything else that you can walk across to reach the other side.  However, you see that beside you, there is a small ladder. It's not tall enough for you to be able to use it to cross, but it might be handy.\n\n*goto ladder\n*label No_Light\n\nYou slowly go further into the cave, unaware of what may or not be in there. Feeling your way along the rest of the path, you are barely able to see more than a few feet in front of you. You hear silence. How do you feel about this?\n*fake_choice\n  #Comforted. At least there's nothing to attack me.\n    You feel better thinking there's nothing around you.\n  #Its too quiet. That's a red flag.\n    You feel scared, thinking there must be a very good reason nothing is around you.\nAs you continue into the cave, you, still able to see slightly ahead of you, notice that there's a large ditch in front of you. You conclude however it's too far for you to jump, as you are unable to see the other side. \"Not again,\" you think to yourself, kicking the ground below you. As you do so, you notice your foot hit something. You look down and notice a small ladder. It's not nearly long enough for you to use to cross the gap but it might be useful.\n*goto ladder\n\n*label ladder\n*set Right_Cave \"Explored\"      \n*choice\n  *selectable_if (Ladder = \"missing\") #Take the ladder\n    You take the ladder.\n    *set Ladder \"Taken\"\n    *goto ladder \n  *selectable_if (Plank = \"Taken\") #Place the plank over the ditch\n    You walk across the ditch.\n    *goto Cave_end      \n  #Go back to the outside of the cave.\n    *goto_scene Bridge\n\n*label Cave_end\n\nYou get over the ditch, and this time the plank doesn't break after you cross it, giving you a bit of a relief. You wonder to yourself if the entire adventure is going to be like this, just solving little 'puzzles' like this. \n\n*fake_choice\n  #I hope so. That means there's a way out.\n    You decide to look at it optimistically, seeing some hope.\n  #I hope not. That makes it feel like a fictional piece of work.\n    Not sure if this counts a 4th wall joke, but your insight is a little bit more on the nose than you're likely to think.\n\nAs you continue to walk along for several uneventful hours, you see that the cave starts to curve up, at about a 15-20 degree angle. You also see that it's suddenly a little bit brighter, and you realize that this might be the end of the tunnel. As you get there, you notice that you are right, and you, in fact, are getting very close to the end of the cave. The sunlight makes you feel both welcome and scared at the same time. Which of these takes priority over the other?\n\n*fake_choice\n  #Welcome. I want to see what's outside there. Hopefully, it can help me in getting off this island. Plus, I miss the sunlight already.\n    You think about your friends and family back home, and the idea of seeing them again excites you a lot.\n  #Scared. At least there weren't any predators inside the cave.\n    At least you were safe in the cave.\n\nFinally, you reach the end of the cave. You have made enough progress in the game to increase any stat by one. If you look around, you'll see more opportunities like this. What stat do you choose to upgrade now?\n\n*choice\n  *selectable_if (Athletics \u003c=4) #Athletics\n    *set Athletics +1\n    *goto map\n  *selectable_if (Tool_Usage \u003c=4) #Tool_Usage\n    *set Tool_Usage +1\n    *goto map\n  *selectable_if (First_Aid \u003c=4) #First_Aid\n    *set First_Aid +1\n    *goto map\n  *selectable_if (Stealth \u003c=4) #Stealth\n    *set Stealth +1\n    *goto map\n  *selectable_if (Survival \u003c=4) #Survival\n    *set Survival +1\n    *goto map\n\n*label map\n\nAs you reach the end and walk out, and have a quick look around. You see that the slight incline has put on on the top of a hill, allowing you to see a few miles in each direction, there are also 8 paths, one going almost exactly in each of the eight main directions, north, south, east, west, northeast, northwest, southeast and southwest. \n\nYou look to the north and see several extremely dangerous pieces of terrain. The northeast appears to have the largest building on the whole mountain, one that appears to be a place fit for a king. Directly to your east, you see what appears to be a house made out of glass and a lighthouse. Down the southeast, you see an industrial-looking building that appears to be abandoned, or at least closed as it's not emitting any smoke. The south looks like it has several small structures and a slightly larger one all within a swamp. The Southwest seems to be the only direction with land more elevated than your current location, with water falling from the top of it. The west appears to have a beach and dock very similar to the one you saw early on in your adventure. Lastly, the northwest appears to be a grassland with some smoke coming from it.\n\nWhere do you go?\n\n*choice\n  #North. The most dangerous places have the greatest rewards.\n    *set end_choice \"N\"\n    *goto final\n  #North East. That large building has to have something useful.\n    *set end_choice \"NE\"\n    *goto final\n  #East. Two structures should have something, and I might be able to navigate somewhat using the lighthouse.\n    *set end_choice \"E\"\n    *goto final\n  #South East. There should be something useful in the industrial building.\n    *set end_choice \"SE\"\n    *goto final\n  #South. So many buildings means I'm most likely to find someone.\n    *set end_choice \"S\"\n    *goto final\n  #South West. Higher elevation might be useful.\n    *set end_choice \"SW\"\n    *goto final\n  #West. I might be able to see help from a beach.\n    *set end_choice \"W\"\n    *goto final\n  #North West. Time to investigate the smoke. \n    *set end_choice \"NW\"\n    *goto final\n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto map\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto map_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto map_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto map_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto map_Heal\n          *else\n            *set Health + 5\n            *goto map_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto map\n\n*label map_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto map_Heal_2\n\n*label map_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto map\n\n\n\n*label final\n\nAfter your choice, you're not quite sure if you made the right one. You have a feeling that whatever 'puzzles' await you, if there are any, will be significantly more complex than the child's play you've seen so far, and the possibility of dinosaurs certainly won't make it any easier. You hope to one day get back home to see you ${partner_name}, ${friend_name} and your family again.\n\n*gosub trial_end\n\n*if (end_choice = \"N\")\n  *goto_scene North\n*elseif (end_choice = \"NE\")\n  *goto_scene North_East\n*elseif (end_choice = \"E\")\n  *goto_scene East\n*elseif (end_choice = \"SE\")\n  *goto_scene South_East\n*elseif (end_choice = \"S\")\n  *goto_scene South\n*elseif (end_choice = \"SW\")\n  *goto_scene South_West\n*elseif (end_choice = \"W\")\n  *goto_scene West\n*elseif (end_choice = \"NW\")\n  *goto_scene North_West    \n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n  *label purchased\n  *return\nRemember earlier how we told you that the first few chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n  *subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2021-07-22 $3.99 $2.99 purchased\n*abort\n", "south": "*temp drinks 0\n\n*temp passout 0\n\n*if (South = \"Unexplored\")\n  *goto unexplored\n*else \n  *goto return\n\n*label unexplored\n\nAs you go to the south, you look to your right and look at the lake nearby. In the general area of the lake, you can see that there's a large crocodile about 40 feet long. \"Damn, that's big,\" you whisper quietly to yourself as you spot it. You're not kidding yourself, this thing is over three times the size of any crocodile currently alive...that you knew of, before today. You know that these animals used to be bigger, and think whatever made these dinosaurs or let them survive this long, is also what impacted this crocodile in the same way.\n\n*image Croc.jpg\n\nYou wonder how you're going to get by this one. You think for a second, and you're not sure how to get there. You know you axe by itself won't hurt it enough to quickly fight it off, so that's only ever a back-up option. You think for a few seconds, and a few ideas come to mind.\n\n*choice\n  #Sneak by.\n    *if stealth > 2\n      You are sufficiently quiet and stay out of sight, allowing you to successfully sneak by the croc.\n      *goto paths\n    *else\n      You can't stay quiet enough, and the croc attacks you. You are able to pull out your axe, and after hitting the croc in the eye several times, it finally lets go, but not after its bitten you heavily.\n      *set Health -5\n      *goto paths\n  #Run. If I can stay far enough away, it won't bother using its energy to chase me.\n    *if athletics > 2\n      You are able to run quickly enough for the croc to be unresponsive when it sees you. You wipe the sweat off your brow and count yourself lucky that you were able to make it.\n      *goto paths\n    *else\n      You are too slow, and the croc attacks you. You are able to pull out your axe, and after hitting the croc in the eye several times, it finally lets go, but not after its bitten you heavily.\n      *set Health -5\n      *goto paths\n  #Use my knowledge of crocodile to figure out what it can and can't see, and move accordingly.\n    *if Survival > 2\n      You know enough about crocodile sight to know how far away to the side you should walk in order to remain out of the croc's sight. You eventually reach a place where you know the croc won't see you, and you continue on your way.\n      *goto paths\n    *else\n      You are unable to properly plan a path, and the croc attacks you. You are able to pull out your axe, and after hitting the croc in the eye several times, it finally lets go, but not after its bitten you heavily.\n      *set Health -5\n      *goto paths\n  *selectable_if (katana = \"found\") #Fight it with my katana.\n    The croc charges at you, and you successfully sidestep it. As it turns to chase you, you swipe it with your katana, killing it on the spot.\n    *goto paths\n\n*label return\n\nYou return to the south, but this time, no crocodile.\n\n*goto crossroads\n\n*label paths\n\n*set South \"Explored\"\n\nYou can see that you have reached a crossroads. One path leads to a swamp, and you're not sure if it has more crocodiles or not. Another path leads to a church, and the third leads to a large residential looking area. It looks abandoned, but you might still find something there, as if people left in a hurry, they might have left some useful stuff behind. You're not sure where to go, but have to make a decision now.\n\n*goto crossroads\n\n*label crossroads\n\n*if Health \u003c 1\n  You seem to have succumbed to an infection after being bitten. With no hospital nearby, you will be unable to save yourself. You use whatever medical supplies you currently have in a last-ditch effort to save yourself, but it's too little too late. The world goes black, and you are unable to stop the infection from immobilizing and killing you.\n  *goto_scene death\n\n*choice\n  #I go to the swamp\n    *goto swamp\n  #I go to the church\n    *goto church\n  #I go to the residential area\n    *goto residence\n  #I go back to the center of the island.\n    *goto_scene center \n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto crossroads\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Cave_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Cave_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Cave_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Cave_Heal\n          *else\n            *set Health + 5\n            *goto Cave_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto crossroads\n\n  *selectable_if (map = \"found\") #Look at the map.\n    You look at the map. You can see the north is restricted, presumably due to danger, but also presumably contains a motorboat which you could use to escape the island. The North East has a castle, while the East has a lighthouse, a greenhouse and a shed. The South East is labelled as the industrial area and has a factory, a lab and a storage area. The South as a church, a swamp and a town featuring houses, a bar, a general store, an arena and a town hall. The South West is packed with nature, as it contains a river and waterfall headed into a lake, hills and mountains, while the West has a beach which also acts as a dock for ships. The North West has a shed in the middle of grasslands.\n    *goto crossroads\n\n*label Cave_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Cave_Heal_2\n\n*label Cave_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto crossroads\n\n\n\n*label swamp\n\n*image swamp.jpg\n\n*if (swamp = \"Unexplored\")\n  *goto swamp_unexplored\n*else \n  *goto swamp_explored\n\n*label swamp_unexplored\n\nYou approach the swamp, cautious of the possibility of more crocodiles and other potential predators. When you reach the shore, you look to the other side, and notice an island, and wonder how to get there. You look for a way around the swamp. Looking in both directions, you see that it stretches way out both to your right and your left. There's no way around the swamp in either direction, so it looks like if you want to get to the island, you have to wade through the swamp without knowing what's there.\n\n*choice\n  #I enter the swamp\n    *goto wade\n  #I got back\n    You return to the crossroads.\n    *goto crossroads\n\n*label wade\n\nAs you begin to wade into the water against your better judgement, you do your best to keep an eye out for anything that could attack you. When the water reaches your ankles, you are startled by a sudden sound and quickly turn around to find...\n\n*page_break\n\n...a frog croaking. You breathe a sigh of relief, knowing that such an animal is much less of a threat than an oversized crocodile, but you find yourself that it could still be deadly. You don't know if it's poisonous, but decide its best not to find out the hard way, even if it means not finding out at all. You hear more croaking of frogs, as well as toads. You can also see several insects, some of which are familiar, some are giant versions of ones you recognize, others are completely new. As you begin to wade deeper into the water, beyond just your ankles, slowly reaching your knees and then proceeding further until it stops getting deeper when it nears your waist. You think maybe its time to go back when you see something on the other side.\n\n\nAs you get to the shore, you notice the swamp getting more and more shallow as you get closer to the island. You finally reach the other side and explore the island. After a while, you find a small shed. You are able to open the door easily, and after walking in you can see that there's a piece of paper on the shelf. You grab it and notice its a map, which you decide to hold on to. After glancing at it, you notice that it has some detail, but not as much as you were hoping for. It's still better than nothing, however.\n\n*set map \"found\"\n*set swamp \"explored\"\n*achieve explorer\n\n*label map_found\n\n*choice\n  #Look at the map\n    You look at the map. You can see the north is restricted, presumably due to danger, but also presumably contains a motorboat which you could use to escape the island. The North East has a castle, while the East has a lighthouse, a greenhouse and a shed. The South East is labelled as the industrial area and has a factory, a lab and a storage area. The South as a church, a swamp and a town featuring houses, a bar, a general store, an arena and a town hall. The South West is packed with nature, as it contains a river and waterfall headed into a lake, hills and mountains, while the West has a beach which also acts as a dock for ships. The North West has a shed in the middle of grasslands.\n    *goto map_found\n  #Go back to the crossroads\n    You return to the crossroads.\n    *goto crossroads\n\n*label swamp_explored\n\nYou return to the swamp. Despite exploring both the swamp itself as well as the shed, you find nothing else of use. After about an hour of looking around and finding nothing of note, you return to the crossroads.\n\n*goto crossroads\n\n*label church\n\n*if (church = \"Unexplored\")\n  *goto church_unexplored\n*else\n  *goto church_explored\n\n*label church_unexplored\n\nAs you approach the church, you note that for some odd reason, it does not have any windows. You find this odd, especially as churches tend to have those weirdly coloured and tinted windows, but now you are even more curious over what may be in there. You can only tell its a church due to the cross, bell and other religious symbols there that you find in standard churches. The church looks to be two stories high, and be in the area of 100 feet by 100 feet, at least at first glance. As you reach the front of the church, you attempt to open the door, only to find out that it is locked.\n\n*set church \"explored\"\n\n*label locked_church\n\n*choice\n  #I go to the residential area of the south.\n    *goto residence\n  *disable_reuse  *selectable_if (shed_key = \"found\") #Try the key labeled \"NW shed\". Maybe that's what unlocks it.\n    You are unable to unlock the church. Maybe another key will do the trick.    \n    *goto locked_church\n  *disable_reuse  *selectable_if (shed_key_2 = \"found\") #Try the key labeled \"E shed\". Maybe that's what unlocks it.\n    You are unable to unlock the church. Maybe another key will do the trick.    \n    *goto locked_church\n  *disable_reuse  *selectable_if (castle_key = \"found\") #Try the key labeled \"Cast\". Maybe that's what unlocks it.\n    You are unable to unlock the church. Maybe another key will do the trick.    \n    *goto locked_church\n  *disable_reuse  *selectable_if (lighthouse_key = \"found\") #Try the key labeled \"Light\". Maybe that's what unlocks it.\n    You are unable to unlock the church. Maybe another key will do the trick.    \n    *goto locked_church\n  *disable_reuse  *selectable_if (Second_floor_key = \"found\") #Try the key labeled \"2\". Maybe that's what unlocks it.\n    You are unable to unlock the church. Maybe another key will do the trick.    \n    *goto locked_church\n  *disable_reuse  *selectable_if (Third_floor_key = \"found\") #Try the key labeled \"3\". Maybe that's what unlocks it.\n    You are unable to unlock the church. Maybe another key will do the trick.    \n    *goto locked_church\n  *disable_reuse  *selectable_if (Green_house_key = \"found\") #Try the key labelled \"green\". Maybe that's what unlocks it.\n    You are unable to unlock the church. Maybe another key will do the trick.    \n    *goto locked_church\n  *selectable_if (church_key = \"found\") #Try the key labelled \"ch\". Maybe that's what unlocks it.\n    You are able to unlock the church. You carefully head inside, cautious in case anything else is already in there.\n    *set church \"unlocked\"\n    *goto inside_church\n  #Go back to where I was before.\n    You return to the crossroads.\n    *goto crossroads\n  #I go back to the middle of the island.\n    *goto_scene center  \n  #I go to the swamp\n    *goto swamp\n\n\n*label church_explored\n\nYou return to the church.\n\n*if (church = \"unlocked\")\n  *goto inside_church\n*else\n   *goto locked_church\n\n*label inside_church\n\nYou look inside the church and find a gas can. Excitedly, you run up to it, hoping for the stars to align. Crossing your fingers, and panting \"please, please, please,\" to yourself. After you shake the gas can you can tell that, yes the gas can is indeed full. \n\n*page_break\n\nYou grab the gas can and bring it to the helicopter. As you run back to the helicopter to be able to use it, you envision all the stories you'll have to tell everyone. You crashed on an island full of dinosaurs,\n*if (notes = \"found\")\n  you uncovered a conspiracy about the military unleashing said dinosaurs upon civilian populations,\n\n*if (money = \"found\")\n  you found a treasure hidden in an ancient castle,\n\nand you got out of it alive. You speed by everything, gas can in hand, looking out for dinosaurs, praying that none will interrupt you at this point when you're so close to success. You then reach the cave that brought you to the center of the island, blitzing through it, and as you reach the end. It's soon after you exit it that you come upon a realization: the bridge you made right after landing had collapsed! \n\nYou swear under your breath several times before finally reaching that area of the island, now finally out of breath, but seemingly safe. You look around for trees and rocks: they helped you build the bridge last time, why can't they work for you now? A brief look around causes you to calm down, as you notice several trees and rocks. You calm down and take a few deep breathes as you construct another bridge, keeping an eye out for more potential dinosaurs. After several minutes of none coming, you eventually finish the bridge and move across it carefully, knowing that rushing could get you killed. \n\n*page_break\n\nYou get to the other side and fill up the gas tank. Seeing no need to return the can to an empty church, you drop it right beside the chopper when you're done and start it up. After getting in, you check the fuel gauge and notice you have enough inside it to make it to your destination. You head over there without hesitation. People are going to wonder why you're late, but boy do you ever have a good excuse.\n\n*achieve chopper\n\n*goto_scene Transition\n\n*label residence\n\n*if (residence = \"Unexplored\")\n  *goto residence_unexplored\n*else\n  *goto residence_explored\n\n*label residence_unexplored\n\nYou follow the path up to the residential area, and soon after you exit the forested part of the area, you enter the town. It's a very small town, only having 7 houses. You see that there are 3 houses, each of which is 2 stories tall. You also see a very large town hall, an arena that looks like it could hold any outdoor or indoor sport, a general store and a bar. How do you feel about looking around this town?\n\n*set residence \"explored\"\n\n*fake_choice\n  #Extremely uncomfortable. I'm basically breaking into people's homes.\n  #Who cares? This place is clearly mine now.\n  #Somewhat uncomfortable, but this is a survival situation.\n\n*goto enter_residence\n\n*label residence_explored\n\nYou return to the residential area along the path exiting the forest.\n\n*goto enter_residence\n\n*label enter_residence\n\nWhich building do you enter?\n\n*choice\n  #The first house\n    You head over to the first house\n    *goto house_1\n  #The second house\n    You head over to the second house\n    *goto house_2\n  #The third house\n    You head over to the third house\n    *goto house_3\n  #Town hall\n    You head over to the town hall\n    *goto town_hall\n  #The arena\n    You head over to the arena\n    *goto arena\n  #The bar\n    You head over to the bar\n    *goto bar\n  #The store\n    You head over to the store\n    *goto store\n  #Go back to where I was before.\n    You return to the crossroads.\n    *goto crossroads\n\n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto enter_residence\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Res_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Res_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Res_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Res_Heal\n          *else\n            *set Health + 5\n            *goto Res_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto enter_residence\n\n  *selectable_if (map = \"found\") #Look at the map.\n    You look at the map. You can see the north is restricted, presumably due to danger, but also presumably contains a motorboat which you could use to escape the island. The North East has a castle, while the East has a lighthouse, a greenhouse and a shed. The South East is labelled as the industrial area and has a factory, a lab and a storage area. The South as a church, a swamp and a town featuring houses, a bar, a general store, an arena and a town hall. The South West is packed with nature, as it contains a river and waterfall headed into a lake, hills and mountains, while the West has a beach which also acts as a dock for ships. The North West has a shed in the middle of grasslands.\n    *goto enter_residence\n\n*label Res_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Res_Heal_2\n\n*label Res_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto enter_residence\n\n  \n*label house_1\n\n*if house_1 = \"Unexplored\"\n  *goto house_1_unexplored\n*else\n  *goto house_1_explored\n\n*label house_1_unexplored\n\nYou approach the first house, and it looks relatively non-descript or at least has very few notable features. First, you knock on the off chance that there's somebody there, but even after you wait a couple of minutes, nobody answers. You attempt to open the door, and are surprised at the fact that it's completely unlocked. You walk in after about 15 minutes of looking around, you see that there's a key labelled \"3\" that doesn't unlock anything in the house.\n\n*set house_1 \"explored\"\n\n*set Third_floor_key \"found\"\n\n*goto enter_residence\n\n*label house_1_explored\n\nYou search the first house again and find nothing new.\n\n*goto enter_residence\n\n*label house_2\n\n*image house.jpg\n\n*if house_2 = \"Unexplored\"\n  *goto house_2_unexplored\n*else\n  *goto house_2_explored\n\n*label house_2_unexplored\n\nYou approach and enter the second house. This house seems to be the biggest and most beautiful of the group, being the cleanest with some clear renovations and lots of decorations on the front lawn. You knock but quickly determine that there's nobody there and end up entering on your own accord after a few minutes, still somewhat surprised that it's unlocked. After looking inside, you are able to find a medkit. It would make sense that a doctor would live here, given how fancy the house is, but why wouldn't there be anything else here?\n\n*set Medkits +1\n\n*set house_2 \"explored\"\n\n*goto enter_residence\n\n*label house_2_explored\n\nYou search the second house again and find nothing else of note. Looks like the medkit was the only thing in there that you could use.\n\n*goto enter_residence\n\n*label house_3\n\n*if house_3 = \"Unexplored\"\n  *goto house_3_unexplored\n*else\n  *goto house_3_explored\n\n*label house_3_unexplored\n\nYou approach and enter the third house. You look around to see that this house seems to have some fancy tech, although most of it appears highly rusted and perhaps broken. You look around and see that there is half of a radio receiver. \"Oh my god\", you repeat to yourself over and over again, as you notice that this receiver if it were fully put together, would be the type the helicopter uses. You figure that if your ability to use technology and other tools is high enough, you may be able to put together a full radio...if you find the other pieces. \n\n*set Receiver_Part_B \"found\"\n\n*set house_3 \"explored\"\n\n*if Receiver_Part_A = \"missing\"\n\n  Unsure of where the other pieces are, or even if they're on the island, you pocket the equipment, hoping for a scenario where it could be instrumental to your way off the island. You return to the outside of the house.\n \n  *goto enter_residence\n\n*else\n\n  You recognize this as being the other half of the radio you found in the mountains area. If you find the right tools, and the right skills with technology, you can put this radio back together and call for help. \n\n  *goto enter_residence\n\n*label house_3_explored\n\nYou search the third house again and find nothing else of note. Looks like the receiver part was the only thing in there that you could use.\n\n*goto enter_residence\n\n\n*label town_hall\n\n*if (town_hall = \"Unexplored\")\n  *goto town_hall_unexplored\n*else\n  *goto town_hall_explored\n\n*label town_hall_unexplored\n\nYou enter town hall, which strangely has both a clock and a sundial, both of which show different times. You look at the clock and see it unloving, even the second hand. You see the name of the town as Ju_as_i_ C__y, which causes you to snicker at the similarity to a movie franchise you recognize. You enter town hall, only to see that it seems to have been completely stripped of anything that could be of use. After frantically looking through as many things as you possibly can, all you find is an antenna. At first, you don't recognize what it can be used for until you see the model number. At that point, you recognize it as one that could be used to send an SOS signal and communicate with nearby ships. Excitedly, you know that you'll need other parts to put it back together, but you do pocket it, noting its possible use in having you rescued.\n\n*set Antennae_2 \"found\"\n\n*set town_hall \"explored\"\n\n*goto enter_residence\n\n\n*label town_hall_explored\n\nYou look around townhall and notice that there's nothing new of note. Looks like the antennae to the ship's radio was the only thing there.\n\n*goto enter_residence\n\n*label bar\n\n*if (bar = \"Unexplored\")\n  *goto bar_unexplored\n*else\n  *goto bar_explored\n\n*label bar_unexplored\n\nYou enter that bar, heavily damaged as it is, seeing a large sign on it saying \"Hammond's\". After you look inside, you see that there's not much to be seen. You look around for something useful, only to see that there's nothing. However, you flip the alcohol tap, thinking it's just going to be for laughs, only to notice that there's still some alcohol left on tap. \n\n*set bar \"explored\"\n\n*choice \n  #I drink some alcohol\n    *goto drink\n  #I leave\n    *goto enter_residence\n\n*label bar_explored\n\nYou return to Hammond's bar.\n\n*label wakeup\n\n*choice \n  #I drink some alcohol\n    *goto drink\n  #I leave\n    *goto enter_residence\n\n*label drink\n\nYou have a drink.\n\n*rand passout 1 6\n\n*if passout = 6\n  You can't handle your drink. You pass out and wake back up in the bar unharmed about an hour later.\n  *set drinks 0\n  *goto wakeup\n*else\n  You have a drink.\n  *set drinks +1\n  *if (drinks = 5)\n    *if (drink = \"missing\")\n      You successfully drank 5 in a row. Take a stat up.\n      *set drink \"found\"\n      *choice\n        *selectable_if (Athletics \u003c=4) #Athletics\n          *set Athletics +1\n          *goto wakeup\n        *selectable_if (Tool_Usage \u003c=4) #Tool_Usage\n          *set Tool_Usage +1\n          *goto wakeup\n        *selectable_if (First_Aid \u003c=4) #First_Aid\n          *set First_Aid +1\n          *goto wakeup\n        *selectable_if (Stealth \u003c=4) #Stealth\n          *set Stealth +1\n          *goto wakeup\n        *selectable_if (Survival \u003c=4) #Survival\n          *set Survival +1\n          *goto wakeup\n    *else\n      You've already gotten your drinking stat up. Sorry, you can't get more.\n      *goto wakeup\n  You have had ${drinks} drinks in a row. You can go for more if you want.\n  *goto wakeup\n\n*label store\n\n*if (store = \"Unexplored\")\n  *goto store_unexplored\n*else\n  *goto store_explored\n\n*label store_unexplored\n\nYou open the store and look around. You find food that expired years ago, and several pieces of old technology that doesn't work anymore. You gain increasing frustrated with each piece of technology that you try, with mild disappointment turning into \"what the hell?!\" after each attempt. Finally, however, you do find one piece of technology that you think works. You turn on part of a machine that could create SoS signals and communicate with ships. You'll need the rest of the radio, as well as the antennae for it to work, but you could, in theory, put it all together to call a nearby ship. You excitedly pocket the piece of the device, hoping that you can make use of it at some point.\n\nYou continue to look through the rest of the store, but find nothing, which brings your morale down somewhat, but you still see the experience as a positive.\n\n*set SoS_radio_A \"found\"\n\n*set store \"explored\"\n\n*goto enter_residence\n\n*label store_explored\n\nYou find nothing else of value in the store\n\n*goto enter_residence\n\n*label arena\n\n*if (arena = \"Unexplored\")\n  *goto arena_unexplored\n*else\n  *goto arena_explored\n\n*label arena_unexplored\n\nAs you approach the arena, you notice that it seems to be smaller than you originally thought, having very little audience. As you enter, you look around to see maybe 1000 seats. You scurry around for hours, looking for something, noticing that the concessions food is long expired, nobody is around. There is also nothing left behind, other than sports memorabilia, which would be worth pennies if you took home, so you emphatically decide not to take it. However, a key stands out to you. You see, on the ground beside a single chair, a key labelled \"2\".\n\n*set Second_floor_key \"found\"\n\n*set arena \"explored\"\n\n*goto residence\n\n*label arena_explored\n\nYou find nothing else of value in the arena, despite hours of searching.\n\n*goto enter_residence\n\n\n  \n  \n\n\n\n\n\n\n\n", "south_east": "*if (south_east = \"Unexplored\")\n  *goto south_east_unexplored\n*else\n  *goto south_east_explored\n\n*label south_east_unexplored\n\n*image Triceratops.jpg\n\nYou continue down the path, walking towards to southeastern portion of the island. On your way there, you hear a low growling from far away. You look in the direction that the growling came from and look to see an elephant-sized dinosaur with three horns coming from its head and a frill on its neck. You immediately recognize this beast as the famous Triceratops, a highly territorial herbivore that was even capable of fighting the powerful Tyrannosaurus Rex and winning. You don't like your odds, as you know for a fact that it would defeat you in a straight fight. \"How am I ever going to get by something like that?\", you ask yourself in a very concerned whisper. After taking a few deep breathes, you think about what you can do to get by it, and a few ideas come to mind.\n\n*choice\n  #Run away. If it sees me retreating, it won't bother to attack.\n    *if Athletics > 2\n      You successfully get away from the charging beast, as despite being faster than you, it gives up quickly. You think you must have gotten out of its territory.\n      *goto crossroads\n    *else\n      You are unable to run fast enough to get away, as it charges at you and hits you hard. You are sent flying after it hits you, and you are thrown into the air. You brace yourself for a follow-up attack, only to notice that it's leaving you alone, and going back to it food.\n      *set health -4\n      *goto crossroads\n  #Sneak by. It can't attack me if it doesn't see me.\n    *if Stealth > 2\n      You quietly sneak by the creature, as it either doesn't notice you or doesn't care to chase after you. \n      *goto crossroads\n    *else\n      You are unable to sneak by, as it notices you and begins to chase you. Had you had a running start you may have been able to get away, but without one, it catches you and hits you hard. You are sent flying after it hits you, and you are thrown into the air. You brace yourself for a follow-up attack, only to notice that it's leaving you alone, and going back to its food.\n      *set health -4\n      *goto
