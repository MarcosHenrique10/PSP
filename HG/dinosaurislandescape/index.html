eft here that's useful\n          *goto door_3\n      #Go back to the second floor\n        You return to the second floor\n        *goto second_floor\n  #The second door\n    *if (shed_key_2 = \"missing\")\n      You find a key labelled \"E shed\". You decide to grab and pocket it.\n      *set shed_key_2 \"found\" \n      *goto door_3\n    *else\n      You find nothing else in this room.\n      *goto door_3\n  #The third door\n    *if (church_key = \"missing\")\n      You find a key labelled \"Ch\". You decide to grab it and pocket it.\n      *set church_key \"found\"\n      *goto door_3\n    *else\n      You find nothing else in this room.\n      *goto door_3\n  #Back to the second floor\n    You return to the second floor\n    *goto second_floor\n\n", "2_nw": "*if (North_West = \"Unexplored\")\n  *goto unexplored\n*elseif (North_West =\"explored\")\n  *goto explored\n*else\n  *goto done\n\n*label unexplored\n\nYou and ${partner_name} walk through the forest only to recognize it's getting less dense. Not only are the trees less numerous, and they're also smaller and thinner, despite being the same species as far as you can tell. You think you hear something and ${partner_name} stops. \"Did you hear that?\" they ask.\n\n\"I think so,\" you say in response. You both look in the direction of the sound only to notice a bipedal carnivore about 18 feet long. \n\n\"Herrerasaurus,\" ${partner_name} says correctly. You nod in agreement, knowing that they are right. It seems to have not seen you, so you look around for ideas on what you can do.\n\n*goto herrer\n\n*label explored\n\nAs you and ${partner_name} go northwest, you look around to see that its still more lightly forested in this place. After you hear something, ${partner_name} points out an 18-foot long bipedal predator. \"Herrerasaurus,\" they say before following up with \"What's your plan?\"\n\n*label herrer\n\n*choice\n  #Attempt to sneak by.\n    *if (stealth > 2)\n      You and ${partner_name} crouch down and keep quiet and out of sight of the predator. As you move along over several minutes, neither of you makes any remotely loud sound, and you're able to successfully get by despite the time that it took for you to do so. When you're getting farther away from it, it runs off in the other direction, and ${partner_name} gives you a kiss on the cheek. \"Good job, hun,\" they say congratulating you on your extremely simple plan.\n      *set partner %+10\n      *goto crossroads\n    *else\n      You and ${partner_name} attempt to stay out of sight by keeping low and to the ground, but you slip up and land flat on your ass. The slight 'thud' that you makes as you land doesn't seem very loud, but apparently, this dinosaur has sharp hearing and turns to face your direction. You're able to pull out your axe, but before you're able to do anything with it the Herrerasaurus jumps on you, sinking the claws of its feet into you. ${partner_name} shoulders the creature before it's able to bite you, but you're still in pain. Despite this, you're able to get up and finish off the dinosaur with a blow from your axe.\n      \"Still need my help?\" ${partner_name} says to you with some snark. You once again nod and smile, hoping they won't hold this against you.\n      *set partner %-5\n      *set health -4\n      *goto crossroads\n  #Attempt to outrun it.\n    *if (athletics > 2)\n      You grab ${partner_name} and bolt right by the creature. They shake loose of your hold and begin running as well to keep up with you. The dinosaur attempts to catch you but isn't quite able to do so given that it's not as fast as most of the other predators on this island. You two getaway relatively easily compared to what you were expecting. ${partner_name} then pats you on the back, telling you how clever you are for knowing it was slower than the rest. Awkwardly, you didn't know but play along anyway.\n      *set partner %+10\n      *goto crossroads\n    *else\n      You grab ${partner_name} and bolt right by the creature. They shake loose of your hold and begin running as well to keep up with you. The dinosaur attempts to catch you and begins closing in. ${partner_name} then turns around to face it, punching it clean in the jaw, and following up that move with a kick to its now exposed stomach. The creature, now knocked back, jumps over ${them} and onto you. After struggling on the ground, you take out your axe, only to clock it on the head, forcing it to finally retreat.\n      ${partner_name} helps you up, shaking ${their} head the whole time with a \"tsk, tsk, tsk.\"\n      *set partner %-5\n      *set health -5  \n      *goto crossroads   \n  #Attack it.\n    *if (athletics > 3)\n      You motion towards the creature, and then you and ${partner_name} begin moving closer to the creature. You pull out your axe and they pick up a rather large rock. It sees the two of you and begins to charge. As it does so, you swing at it with your axe, knocking it to the ground. Before it gets back up, ${partner_name} throws the rock at its head, killing it instantly. You two high 5 and embrace with ${partner_name} then chanting \"Yes! That was awesome!\"\n      *set partner %+15\n      *goto crossroads\n    *else\n      You motion towards the creature, and then you and ${partner_name} begin moving closer to the creature. You pull out your axe and they pick up a rather large rock. It sees the two of you and begins to charge. As it does so, you swing at it with your axe and miss. It then bites your face and brings you to the ground, jumping on top of you. ${partner_name} throws the rock at it, distracting it for long enough for you to regain awareness of your situation. Still holding your axe, you take a large swing, and this time you're able to hit it in the jaw. You appear to have dislocated it, and given the attack that just happened, you feel no sympathy for the creature. It retreats, not knowing what to do, and ${partner_name} tends to you.\n      \"You okay?\" they ask. You wipe the blood away and nod, unsure of if what you implied is at all true.\n      *set partner %-5\n      *set health -7\n      *goto crossroads\n  *selectable_if (ammo > 0) #Shoot it, using 1 ammo. \n    You line up your shot, taking aim directly at the creature. \"Won't even see it coming,\" you whisper to yourself right before pulling the trigger. You do so, and in less than the time it takes to blink, the herrerasaurus is lying dead on the ground with a hole through its head. ${partner_name} looks at you seemingly surprised but also relieved that you two don't have to face yet another creature that would have you for breakfast.\n    *set ammo -1\n    *goto crossroads\n\n*label done\n\nYou and ${partner_name} walk back to the northwestern portion of the island.\n\n*label crossroads\n\n*set North_West \"done\"\n\nYou reach the crossroads. You see a crashed plane and a shed. What do you do?\n*choice\n  #Check out the plane crash\n    *goto crash\n  #Check out the shed\n    *goto shed\n  #Return to the center of the island\n    You return to the center of the island.\n    *goto_scene 2_center\n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto crossroads\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Cave_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Cave_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Cave_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Cave_Heal\n          *else\n            *set Health + 5\n            *goto Cave_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto crossroads\n  *selectable_if (map = \"new\") #Look at the map.\n    You look at the map. You can see the north is no longer restricted, but still has several dangerous dinosaurs and little to no apparent reward. The North East has a castle, while the East has a lighthouse, a greenhouse and a shed. The South East is labelled as the industrial area and has a factory, a lab and a storage area. The South as a church, a swamp and a town featuring houses, a bar, a general store, an arena and a town hall. The South West is packed with nature, as it contains a river and waterfall headed into a lake, hills and mountains, while the West has a beach which also acts as a dock for ships. The North West has a shed in the middle of grasslands.\n    *goto crossroads\n\n*label Cave_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Cave_Heal_2\n\n*label Cave_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto crossroads\n\n*label crash\n*if (Plane = \"Unexplored\")\n  *goto plane_unexplored\n*elseif (Plane = \"Explored\")\n  *goto plane_explored\n*else\n  *goto plane_done\n\n*label plane_unexplored\n\nYou approach a plane that's falling apart and appears to be melting and rusted. Nothing is near it, not even any dinosaurs. \"Are you sure this is a good idea?\" ${partner_name} asks you.\n\n\"I'm not sure of anything right now,\" you respond in a partially confident, partially joking manner. You strain in an attempt to open the door, and once you are successfully the two of you move inside.\n\n*goto inside_plane\n\n*label plane_explored\n\nYou and ${partner_name} go up to the plane, which is now starting to melt. \"Wow, now it's melting,\" you say to yourself.\n\n${partner_name} overhears you and responds \"Great,\" in a very sarcastic manner. You strain in an attempt to open the door, and once you are successfully the two of you move inside.\n\n*goto inside_plane\n\n*label plane_done\n\nYou and ${partner_name} look inside the plane again and find nothing. You return to the crossroads.\n\n*goto crossroads\n\n*label inside_plane\n\nAs you and ${partner_name} go inside the plane and look around. You see that there's a bunch of medical supplies. It much larger than a medkit and will last both you and ${partner_name} several months, healing multiple minor injuries along the way if needed. You also find the trigger to what appears to be a flare gun.\n\n*set trigger \"found\" \n\n*if (barrel = \"found\")\n  You also have the barrel.\n*if (barrel = \"missing\")\n  You don't have the barrel, though.\n*if (flare = \"found\")\n  You also have the flare.\n*if (flare = \"missing\")\n  You're missing the flare.\n\nThe two of you return to the crossroads, excited for the chance to get off the island.\n\n*set Plane_Meds \"found\" \n*set Plane \"done\"\n*goto crossroads\n\n\n*label shed\n*if (NW_shed = \"Unexplored\")\n  *goto locked\n*else\n  *goto unlocked\n\n*label locked\n\nAs you and ${partner_name} approach the shed you notice that it is locked. You look around and luckily see that there is nothing around that could possibly attack you, so you can try to unlock it in one of a few ways. You attempt to hit it as hard as you can with your shoulder. Not only does your attempt do nothing to the door, but it also hurts your shoulder to have done that. You swing at it with your axe, only to hear the familiar 'clang' of metal hitting metal. Looks like you're going to need a key to do this.\n\n*choice\n  *selectable_if (shed_key = \"found\") #Try the key labeled \"NW shed\". Maybe that's what unlocks it.\n    You successfully unlock the shed. As you look inside, you see that there are no tools to originally be seen, but there is a pair of shelves that could indeed have something on them.\n    *set NW_shed \"explored\"\n    *goto unlocked\n  *disable_reuse  *selectable_if (shed_key_2 = \"found\") #Try the key labeled \"E shed\". Maybe that's what unlocks it.\n    You are unable to unlock the shed. Maybe another key will do the trick.\n    *goto locked\n  *disable_reuse  *selectable_if (castle_key = \"found\") #Try the key labeled \"Cast\". Maybe that's what unlocks it.\n    You are unable to unlock the shed. Maybe another key will do the trick.\n    *goto locked\n  *disable_reuse  *selectable_if (lighthouse_key = \"found\") #Try the key labeled \"Light\". Maybe that's what unlocks it.\n    You are unable to unlock the shed. Maybe another key will do the trick.\n    *goto locked\n  *disable_reuse  *selectable_if (Second_floor_key = \"found\") #Try the key labeled \"2\". Maybe that's what unlocks it.\n    You are unable to unlock the shed. Maybe another key will do the trick.\n    *goto locked\n  *disable_reuse  *selectable_if (Third_floor_key = \"found\") #Try the key labeled \"3\". Maybe that's what unlocks it.\n    You are unable to unlock the shed. Maybe another key will do the trick.\n    *goto locked\n  *disable_reuse  *selectable_if (Green_house_key = \"found\") #Try the key labelled \"green\". Maybe that's what unlocks it.\n    You are unable to unlock the shed. Maybe another key will do the trick.\n    *goto locked\n  *disable_reuse  *selectable_if (church_key = \"found\") #Try the key labelled \"ch\". Maybe that's what unlocks it.\n    You are unable to unlock the shed. Maybe another key will do the trick.   \n    *goto locked\n  *disable_reuse  *selectable_if (secret_key = \"found\") #Try the key labelled \"?\". Maybe that's what unlocks it.\n    You are unable to unlock the door. Maybe another key will do the trick.   \n    *goto locked\n  #Go back to where I was before.\n    You return to the crossroads.\n    *goto crossroads\n\n*label unlocked\n\nYou and ${partner_name} look at the two shelves within the shed and wonder if there's anything on them.\n\n*choice\n  #I check out the one on the left. Maybe something there can help me.\n    *goto left_shelf\n  #I check out the one on the right. Maybe something there can help me.\n    *goto right_shelf\n  #I leave the shed. There's nothing useful in here so I need to go back elsewhere.\n    You go back to the crossroads.\n    *goto crossroads\n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto unlocked\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Shed_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Shed_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Shed_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Shed_Heal\n          *else\n            *set Health + 5\n            *goto Shed_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto unlocked\n\n  *selectable_if (map = \"new\") #Look at the map.\n    You look at the map. You can see the north is no longer restricted, but still has several dangerous dinosaurs and little to no apparent reward. The North East has a castle, while the East has a lighthouse, a greenhouse and a shed. The South East is labelled as the industrial area and has a factory, a lab and a storage area. The South as a church, a swamp and a town featuring houses, a bar, a general store, an arena and a town hall. The South West is packed with nature, as it contains a river and waterfall headed into a lake, hills and mountains, while the West has a beach which also acts as a dock for ships. The North West has a shed in the middle of grasslands.\n    *goto unlocked\n\n*label Shed_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Shed_Heal_2\n\n*label Shed_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto unlocked\n\n*label right_shelf\n\n*if (lighthouse_key = \"missing\") \n  You find a key labelled \"Light\". Of course, the important thing that you get from using the key is another key.\n  *set lighthouse_key \"found\"\n  *goto unlocked\n*else\n  You find nothing else of value on the shelf. Looks like the key labelled \"light\" was the only thing there.\n  *goto unlocked\n\n*label left_shelf\n\n*if (steeringwheel = \"missing\")\n  *goto find_wheel\n*else\n  *goto found_wheel\n\n*label find_wheel\n\nYou find a steering wheel. \"I can use this to build a boat!\" exclaims ${partner_name}. You're cheered up by this, and decide to carry it with you.\n\n*set steeringwheel \"found\"\n*goto unlocked\n\n*label found_wheel\n\nNothing left\n*goto unlocked", "2_s": "*temp drinks 0\n\n*temp passout 0\n\n*if (south = \"done\")\n  *goto south_done\n*elseif (south = \"Unexplored\")\n  *goto south_unexplored\n*else\n  *goto south_explored\n\n*label south_unexplored\n\nYou and ${partner} go to the south to explore. You see that you're approaching a city, and are unsure of how you never looked around here on your first trip to the island. As you begin to approach the city you see your way is being blocked by deinonychuses, creatures that look like raptors but are bigger. None of them see you, though, so you might be able to get by if you're really careful.\n\n*goto raptors\n\n*label south_explored\n\nYou and ${partner_name} go to the south of the island. \"Here again,\" you mutter to yourself, hoping that ${partner_name} doesn't hear you.\n\n\"Again?\" they say. \"You mean you've been here before?\"\n\n\"Yup,\" you say.\n\n\"An entire city on an island full of dinosaurs? How is it still intact?\" they ask.\n\n\"I don't know,\" you respond. \"I know that people did live here, but how the dinosaurs didn't destroy the city is beyond me.\"\n\nAs you begin to approach the city you see your way is being blocked by deinonychuses, creatures that look like raptors but are bigger. None of them see you, though, so you might be able to get by if you're really careful.\n\n*label raptors\n\n*choice\n  #Sneak by.\n    *if (stealth > 3)\n      \"Let's sneak by them,\" you whisper to ${partner_name} quietly. They nod in agreement. The two of you cleverly conceal yourselves just far enough away from the dinosaurs that neither of you gets noticed.\n      *set partner %+10\n      *goto crossroads\n    *elseif (stealth > 2)\n      \"Let's sneak by them,\" you whisper to ${partner_name} quietly. They nod in agreement. The two of you are able to conceal yourselves far away enough from the dinosaurs that neither of you gets seen, despite making a few more sounds than you initally would have liked. This might not work against creatures actively looking for you. ${partner_name} looks bothered by the fact that you almost gave away ${their} location.\n      *set partner %-5\n      *goto crossroads\n    *else\n       \"Let's sneak by them,\" you whisper to ${partner_name} quietly. They nod in agreement. The two of you make a noise that startles them, however, and one of them charges at you. You take out your axe and whack it a few times, as ${partner_name} bravely tackles it to the ground. Although it does bite you a few times, you're able to defeat it with your axe.\n      *set health -3\n      *set partner %-5\n      *goto crossroads\n  #Run by.\n    \"I think we can make it if we run,\" you say. ${partner_name} seems to hesitate before agreeing.\n    *if (athletics > 3)\n      The two of you sprint as fast as you can, and the dinosaurs begin to follow you, also charging quickly. Despite not looking back, you can hear them get closer and closer to you, to the point where they're almost breathing down your neck. Somehow, however, you're able to stay ahead of them, as they break off their chase, presumably due to them getting tired.\n      \"Never have us do something like that again,\" ${partner_name} says. \"We almost got killed!\"\n      *set partner %-5\n      *goto crossroads\n    *else\n      The two of you sprint as fast as you can, and the dinosaurs begin to follow you, also charging quickly. Despite not looking back, you can hear them get closer and closer to you, to the point where they're almost breathing down your neck. Eventually, one of them jumps on you, and you let out a scream. ${partner_name} hears you, turns back for you, grabs your axe, and smashes the dinosaur on the jaw, sending it flying back. It seems intimidated and retreats.\n      \"Thanks,\" you say in appreciation.\n      \"You're welcome,\" they say in a playful tone, handing you back your axe.\n      *set health -5\n      *set partner %+10\n      *goto crossroads\n  *selectable_if (ammo > 0) #Shoot the charging one with your rifle, using 1 ammo.\n    Without saying a word you take out your rifle, line up a shot, and shoot one of them on the head. In a panic, the other two run away.\n    \"Wow,\" ${partner_name} responds. \"Nice shot!\"\n    *set ammo -1\n    *goto crossroads\n\n\n*label south_done\n\nYou and ${partner_name} return to the southern point of the island.\n\n*label crossroads  \n\n*set south \"done\"\n\n*if (health \u003c 1)\n  You, however, are not able to keep your footing and fall over afterwards. ${partner_name} tries desperately to save you with some of ${their} medical skills, but it's all for nothing.\n  *goto_scene death\n\n*choice\n  #I go to the swamp\n    *goto swamp\n  #I go to the church\n    *goto church\n  #I go to the residential area\n    *goto residence\n  #I go back to the center of the island.\n    *goto_scene 2_center\n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto crossroads\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Cave_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Cave_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Cave_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Cave_Heal\n          *else\n            *set Health + 5\n            *goto Cave_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto crossroads\n\n  *selectable_if (map = \"new\") #Look at the map.\n    You look at the map. You can see the north is no longer restricted, but still has several dangerous dinosaurs and little to no apparent reward. The North East has a castle, while the East has a lighthouse, a greenhouse and a shed. The South East is labelled as the industrial area and has a factory, a lab and a storage area. The South as a church, a swamp and a town featuring houses, a bar, a general store, an arena and a town hall. The South West is packed with nature, as it contains a river and waterfall headed into a lake, hills and mountains, while the West has a beach which also acts as a dock for ships. The North West has a shed in the middle of grasslands.\n    *goto crossroads\n*label Cave_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Cave_Heal_2\n\n*label Cave_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto crossroads\n\n*label swamp\n\n\n*if (swamp = \"Unexplored\")\n  *goto swamp_unexplored\n*elseif (swamp = \"explored\") \n  *goto swamp_explored\n*else\n  *goto swamp_done\n\n*label swamp_unexplored\n\nYou wade into the swamp, with ${partner_name} following you. \"Did you really go through this place on your own?\" ${partner_name} asks you, plugging ${their} nose.\n\n\"No I never came here,\" you answer, engaging them in conversation. \n\n\"Didn't think so,\" they respond. Before you can reply, they continue \"Doesn't seem like the kind of smell you'd willingly wade into.\" You're reminded of how at home, they would often end up being the one having to handle your dog Sam's droppings due to your unwillingness to do so. \n\n\"Yeah...\" you reply, trying to avoid another argument about dog droppings. \"I'm only here now because there could be something that might help us trying to survive.\"\n\n\"No kidding,\" they say in a slightly nasally sound. \"Let's hope there's something here that makes it worth it.\"\n\nNot much more dialogue between you two occurs before you reach the other side of the swamp.\n\nWhen you reach there the two of you find nothing. \"I'll race you back,\" ${partner_name} says to you.\n\n\"You're on,\" you reply.\n\n*achieve race\n\n*set swamp \"done\"\n\n*goto crossroads\n\n*label swamp_explored\n\nYou wade into the swamp, with ${partner_name} following you. \"Did you really go through this place on your own?\" ${partner_name} asks you, plugging ${their} nose.\n\n\"Yeah,\" you respond trying to forget the smell.\n\n\"Really even after you couldn't even handle Sam's droppings?\" they ask.\n\n\"Cleaning up after a dog is a lot different than a survival situation,\" you say, thinking that you're correcting them.\n\nYou see them make a grunt that you've heard about a hundred times right now. You've determined this grunt to mean that they WANT to call you out on something, but won't right now due to the situation.\n\nAfter you two reach the other side, you look around for several minutes and find nothing. \"I'll race you back,\" ${partner_name} says to you.\n\n\"You're on,\" you reply.\n\n*achieve race\n\n*set swamp \"done\"\n\n*goto crossroads\n\n*label swamp_done\n\nYou go to the swamp, once again finding nothing\n\n*goto crossroads\n\n*label church\n\nYou approach the church.\n\n*if (church = \"locked\")\n  The door is locked. ${partner_name} looks at you curiously as you decide on a key.\n  *goto church_door\n*else  \n  *goto inside_church\n\n*label church_door\nYou try to unlock the church.\n\n*choice\n  *disable_reuse  *selectable_if (shed_key = \"found\") #Try the key labeled \"NW shed\". Maybe that's what unlocks it.\n    You are unable to unlock the church. Maybe another key will do the trick.    \n    *goto church_door\n  *disable_reuse  *selectable_if (shed_key_2 = \"found\") #Try the key labeled \"E shed\". Maybe that's what unlocks it.\n    You are unable to unlock the church. Maybe another key will do the trick.\n    *goto church_door\n  *disable_reuse  *selectable_if (castle_key = \"found\") #Try the key labeled \"Cast\". Maybe that's what unlocks it.\n    You are unable to unlock the church. Maybe another key will do the trick.\n    *goto church_door\n  *disable_reuse  *selectable_if (lighthouse_key = \"found\") #Try the key labeled \"Light\". Maybe that's what unlocks it.\n    You are unable to unlock the church. Maybe another key will do the trick.\n    *goto church_door\n  *disable_reuse  *selectable_if (Second_floor_key = \"found\") #Try the key labeled \"2\". Maybe that's what unlocks it.\n    You are unable to unlock the church. Maybe another key will do the trick.\n    *goto church_door\n  *disable_reuse  *selectable_if (Third_floor_key = \"found\") #Try the key labeled \"3\". Maybe that's what unlocks it.\n    You are unable to unlock the church. Maybe another key will do the trick.\n    *goto church_door\n  *disable_reuse  *selectable_if (Green_house_key = \"found\") #Try the key labelled \"green\". Maybe that's what unlocks it.\n    You are unable to unlock the church. Maybe another key will do the trick.\n    *goto church_door\n  *selectable_if (church_key = \"found\") #Try the key labelled \"ch\". Maybe that's what unlocks it.\n    You are able to unlock the church. Maybe you walk inside. \n    *set church \"unlocked\"\n    *goto  inside_church\n  *disable_reuse  *selectable_if (secret_key = \"found\") #Try the key labelled \"?\". Maybe that's what unlocks it.\n    You are unable to unlock the church. Maybe another key will do the trick.\n    *goto church_door\n  #Go to where I was before.\n    You return to the crossroads\n    *goto crossroads\n  #Go to the center of the island.\n    You return to the center of the island.\n    *goto_scene 2_center\n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto church_door\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Church_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Church_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Church_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Church_Heal\n          *else\n            *set Health + 5\n            *goto Church_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto church_door\n\n*label Church_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Church_Heal_2\n\n*label Church_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto church_door\n\n*label inside_church\n\n*if (church = \"done\")\n  *goto church_done\n*else\n  *goto church_not_done\n\n*label church_not_done\n\n*set church \"done\"\n\nYou and ${partner_name} look inside the church. You don't find anything, but ${partner_name} feels around the edges and finds a secret door. Do you go inside?\n*choice\n  #Yes, it could be useful.\n    *goto secret_door\n  #No, it could be scary.\n    You choose to instead leave the church, having found nothing.\n    *goto crossroads\n\n*label church_done\n\nYou head inside the church, and once again see the secret door. Do you enter?\n*choice\n  #Yes, it could be useful.\n    *goto secret_door\n  #No, it could be scary.\n    You choose to instead leave the church, having found nothing.\n    *goto crossroads\n\n*label secret_door\n\n*if (boatgas = \"found\")\n  *goto empty_door\n*else\n  *goto find_gas\n\n*label find_gas \n\nYou and ${partner_name} go into the hallway that the secret door leads to. As you travel in, you see several cobwebs and a whole bunch of dust that implies that this place hasn't been used or cleaned in several years. \"Can you smell that?\" ${partner_name} asks you.\n\nAs you're about to say 'no' a strong smell hits your nose. \"Yes,\" you then respond putting your hands over your face as you wrench in your reaction. You walk further down the hallway, only to find a gas can that's been there for who knows how long. \n\n\"Wait a minute,\" ${partner_name} says. They unscrew the top and, against your better judgement, take a small sniff of the gas before smiling. \"This is the type of gas that the boats I can build uses. We should take this.\"\n\nYou have no idea how they recognize it so quickly, but you're happy that you've found something useful.\n\n*set boatgas \"found\"\n\n*goto inside_church\n\n*label empty_door\n\nYou and ${partner_name} return to where you found the gas for the boat, but find nothing new.\n\n*goto inside_church\n\n*label residence\n\n*if (residence = \"Unexplored\")\n  *goto residence_unexplored\n*elseif(residence = \"explored\") \n  *goto residence_explored\n*else\n  *goto residence_done\n\n*label residence_unexplored\n\nYou head into the residential area with ${partner_name} following, and are surprised to see how well this area of the island is intact after a few years of being abandoned in a place loaded with dinosaurs\n\n*goto rescrossroads\n\n*label residence_explored\n\nYou head into the residential area with ${partner_name} following. You look around to see that the houses, arena, store and bar are all in relatively good shape.\n\n*goto rescrossroads\n\n*label residence_done\n\nYou and ${partner_name} return to the residence area.\n\n*goto rescrossroads\n\n*label rescrossroads\n\nYou are looking around and see six structures nearby. Where do you go?\n*choice\n  #House 1\n    You head over to the first house.\n    *goto house_1\n  #House 2\n    You head over to the second house.\n    *goto house_2\n  #House 3\n    You head over to the third house.\n    *goto house_3\n  #The arena\n    You head over to the arena.\n    *goto arena\n  #The bar\n    You head over to the bar.\n    *goto bar\n  #The store\n    You head over to the store.\n    *goto store\n  #Back to the crossroads\n    You head over to the crossroads.\n    *goto crossroads\n  #The center of the island\n    You head over to the center of the island.\n    *goto_scene 2_center\n\n*label house_1\n*if (corn = \"missing\")\n  *goto find_corn\n*else\n  *goto found_corn\n\n*label find_corn\n\nYou and ${partner_name} go inside the first house. You can tell that ${partner_name} is uncomfortable going through somebody's place, but they do eventually go through with it. On the ground, you find a bunch of corn seed. ${partner_name} walks up to you and seems excited. \"If we find a place with enough space, we can plant this and have a recurring food source!\" they excitedly say. You're not enthusiastic about spending lots of time on the island, but doing so sounds better than being dead, so you smile and give ${partner_name} a hug, and kiss ${them} on the back of ${their} head. \"Good idea,\" you say to them.\n*set corn \"found\"\n*goto rescrossroads\n\n*label found_corn\n\nYou and ${partner_name} return to the first house, where you found the corn. There's nothing else here, and you find that out the hard way.\n\n*goto rescrossroads\n\n*label house_2\n\n*if (house_2 = \"done\")\n  *goto garden\n*else\n  *goto find_garden\n\n*label find_garden\n\nYou and ${partner_name} look around the second house and at first, you find nothing. However, ${partner_name} looks into the back yard from a window and calls your name out. You come running and they show you a garden that could be used to plant something. There's enough space for one crop and one type of tree.\n\n*set house_2 \"done\"\n\n*goto garden\n\n*label garden\n\nYou look around the garden to see how it is.\n*choice\n  *selectable_if (corn = \"found\") #Plant the corn.\n    You plant the corn.\n    *set corn_planted \"true\"\n    *if (apple_planted = \"true\")\n      *set garden \"done\"\n    *goto garden\n  *selectable_if (apple = \"found\") #Plant the apple tree.\n    You plant the apple tree.\n    *set apple_planted \"true\"\n    *if (corn_planted = \"true\")\n      *set garden \"done\"\n    *goto garden\n  *selectable_if (garden = \"done\") #Tend to the garden.\n    *if (Survival > 2)\n      You have enough survival skill to handle tending to a garden.\n      *goto gardening\n    *else\n      You don't have enough survival skill to handle tending to a garden.\n      *goto garden\n  #Go back to the city\n    You return to the city\n    *goto rescrossroads\n\n*label gardening\n\n*if (LH_Meds = \"found\")\n  You have the medical materials to enhanced plant growth.\n  *goto gardening_2\n*else\n  You don't have the medical materials to enhance plant growth. You need those to grow the garden quickly\n  *goto garden\n\n*label gardening_2\n\n*if (Plane_Meds = \"found\")\n  You have the medical materials to last you and ${partner_name} for several months.\n  *goto gardening_3\n*else\n  You don't have enough medical materials to last you and ${partner_name} for very long. You must get more.\n  *goto garden\n\n*label gardening_3\n\n*if (First_Aid > 2)\n  You also have the medical skills needed to use them,\n  *goto gardening_4\n*else\n  However, you don't have the medical skills needed to use them.\n  *goto garden\n\n*label gardening_4\n\n*if (Medkits > 0)\n  and the medkit needed to take full advantage of them.\n  *goto gardening_5\n*else\n  but not the medkit needed to take full advantage of them. You need to find one.\n  *goto garden\n\n*label gardening_5\n\n*if (partner > 74)\n  You look over at ${partner_name} and ask if they want to stay here and hold out for a rescue. They say \"of course!\" and give you a big kiss.\n  *goto garden_win\n*else\n  You look over at ${partner_name} and ask if they want to stay here and hold out for a rescue. They say \"not with the way you've been treating me!\" Looks like you need to do something to improve your standing with them.\n  *goto garden\n\n*label garden_win\nYou and ${partner_name} are able to build a sustainable house. The medical equipment that you found is able to both enhance the growth of the plants, as well as heal any injuries either of you sustain for the next few months. Although the two of you don't particularly thrive, you're able to live off your self-made land and keep your distance from the dinosaurs enough to never be in any real danger. After three months pass, a plane lands on the island with the next team of people sent to investigate the island. You and ${partner_name} are able to hitch a ride back to society.\n*achieve naturalist\n*goto_scene win_2\n\n*label house_3\n*if (apple = \"missing\")\n  *goto find_apple\n*else\n  *goto found_apple\n\n*label find_apple\n\nYou and ${partner_name} go inside the third house. You can tell that ${partner_name} is uncomfortable going through somebody's place, but they do eventually go through with it, and after a couple of minutes, screams for you. \"If we find a place with enough space, we can plant this and have a recurring food source!\" they excitedly say, holding some apple seeds. You're not enthusiastic about spending lots of time on the island, but doing so sounds better than being dead, so you smile and give ${partner_name} a hug, and kiss ${them} on the back of ${their} head. \"Good idea,\" you say to them.\n*set apple \"found\"\n*goto rescrossroads\n\n*label found_apple\n\nYou and ${partner_name} return to the third house, where you found the apple seeds. There's nothing else here, and you find that out the hard way.\n\n*goto rescrossroads\n  \n    \n*label arena\n\n*if (flare = \"found\")\n  *goto flare_found\n*else\n  *goto find_flare\n\n*label find_flare\n\nYou and ${partner_name} look around the arena, and it's about as littered with junk as you'd expect to see it a couple of hours after a large game. Actually, it's worse because all the discarded food and beverages have been out for years. However, one thing useful that you do find it what appears to be ammo for a flare gun. If you could find one, this would be a great way to signal for help. You have no interest in staying on the island for very long, and a flare gun would be a great way to get off if needed.\n*set flare \"found\"\n*if (barrel = \"found\")\n  You also have the barrel.\n*if (barrel = \"missing\")\n  You don't have the barrel, though.\n*if (trigger = \"found\")\n  You also have the trigger.\n*if (trigger = \"missing\")\n  You're missing the trigger\n*goto rescrossroads\n\n*label flare_found\n\nYou and ${partner_name} look around the arena again, but find nothing of use. Long ago discarded food and beverage aren't exactly the most useful thing in the world, and would only weigh you down in your current situation.\n*goto rescrossroads\n\n\n*label bar\n\n*if (bar = \"Unexplored\")\n  *goto bar_unexplored\n*elseif (bar = \"explored\")\n  *goto bar_explored\n*else\n  *goto bar_done\n\n*label bar_unexplored\n\nYou head to the bar. You see that the sign say H_mmo_d's, with an \"a\" and an \"n\" lying on the ground, with the rest of the letters appearing slightly damaged, and about to fall off. There's nothing much for you to really see on the inside, either.\n\nYou see that ${partner_name} is rather quiet, and you remember they weren't one to drink often and that a survival situation probably won't help that very much.\n*set bar \"done\"\n*goto inside_bar\n\n*label bar_explored\n\nYou return to the bar. You notice that the \"a\" and \"n\" in the sign that says \"Hammond's\" have fallen to the ground, but other than that, nothing has really changed.\n\nYou see that ${partner_name} is rather quiet, and you remember they weren't one to drink often and that a survival situation probably won't help that very much.\n*set bar \"done\"\n*goto inside_bar\n\n*label bar_done\n\nYou and ${partner_name} return to the bar, with ${partner_name} remaining quiet.\n\n*goto inside_bar\n\n*label inside_bar\n\nThe bar looks empty.\n\n*label wakeup\n\n*image Drink.jpg\n\nD0 you have a drink?\n*choice\n  #Yes\n    *goto drink\n  #No\n    *goto rescrossroads\n\n*label drink\n\nYou have a drink. ${partner_name} looks annoyed at you.\n\n*rand passout 1 6\n\n*if passout = 6\n  You can't handle your drink. You pass out and wake back up in the bar unharmed about an hour later.\n  *set drinks 0\n  *goto wakeup\n*else\n  You have a drink.\n  *set drinks +1\n  *if (drinks = 5)\n    *if (drink = \"missing\")\n      You successfully drank 5 in a row. Take a stat up.\n      *set drink \"found\"\n      *choice\n        *selectable_if (Athletics \u003c=4) #Athletics\n          *set Athletics +1\n          *goto wakeup\n        *selectable_if (Tool_Usage \u003c=4) #Tool_Usage\n          *set Tool_Usage +1\n          *goto wakeup\n        *selectable_if (First_Aid \u003c=4) #First_Aid\n          *set First_Aid +1\n          *goto wakeup\n        *selectable_if (Stealth \u003c=4) #Stealth\n          *set Stealth +1\n          *goto wakeup\n        *selectable_if (Survival \u003c=4) #Survival\n          *set Survival +1\n          *goto wakeup\n    *else\n      You've already gotten your drinking stat up. Sorry, you can't get more.\n      *goto wakeup\n  You have had ${drinks} drinks in a row. You can go for more if you want.\n  *goto wakeup\n\n*label store\n\n*if (batteries = \"found\")\n  *goto batteries_found\n*else\n  *goto find_batteries\n\n*label find_batteries\n\nYou and ${partner_name} look around the store, and after several minutes of finding nothing but expired food, useless supplies and home entertainment that you don't have the time for, ${partner_name} stumbles upon what appears to be spare batteries for the kind of phone that they lost earlier. If you could somehow find the phone itself, you could call for help.\n*set batteries \"found\"\n*goto rescrossroads\n\n*label batteries_found\n\nYou and ${partner_name} look around the store, noting that you've found the batteries already. After a few minutes of searching, you come to realize that there's really nothing else worth your while in here, so you give up and decide to spend your time on more constructive activities.\n*goto rescrossroads", "2_se": "*if (south_east = \"Unexplored\")\n  *goto south_east_unexplored\n*elseif (south_east = \"explored\")\n  *goto south_east_explored\n*else\n  *goto south_east_done\n\n*label south_east_unexplored\n\n\"So, where are we going? What's over here?\" asks ${partner_name}.\n\n\"I don't know,\" you reply \"I've never been to this part of the island before.\"\n\n\"Oh,\" ${partner_name} replies after hesitating slightly. \"That's odd, I thought you had explored the whole thing.\"\n\n\"Nah,\" you say before changing to half-joking when you say \"Only most of it.\"\n\n${partner_name} smirks and you can hear a slight snicker from ${them} before your attention changes to a new sound.\n\n*goto encounter\n\n*label south_east_explored\n\n\"So, where are we going? What's over here?\" asks ${partner_name}.\n\n\"A lab, a factory and a storage facility,\" you answer getting straight to the point.\n\n\"Interested, sounds like the kind of place that contains the materials we might need,\" ${partner_name} responds in a slightly excited tone.\n\nYou smile briefly at ${their} optimism, but then your attention quickly turns to a new sound.\n\n*goto encounter\n\n*label south_east_done\n\nYou and ${partner_name} return to the southeastern portion of the island.\n\n*goto crossroads\n\n*label encounter\n\nYou look at the direction of the noise only to see a large biped, almost 30 feet long with a curved claw on one of its fingers that stands out from the rest. You struggle to think of its name and then ${partner_name} chimes in to whisper in your ear \"Baryonyx.\"\n\nYou, recognizing that unique claw of being that dinosaur's signature body part nod your head in agreement. As usual, it hasn't seen you yet, and you wonder how you can get by it. You remember that this thing can be terrifying in a straight fight, but not much of a runner, which is a relief due to its distance. You suspect that this means its not as much of a threat as most other creatures on the island, so this one should be easier than most of your other attempts. If it does catch you though, it'll do a lot more damage than something like a raptor.\n*choice\n  #Run by as fast as you can in order to get away from it.\n    *if (Athletics > 2)\n      You and ${partner_name} run as fast as you can in order to escape it. As you look back while you continue to run, you see that the Baryonyx is awkwardly running after you two. It sways back and forth like a drunk attempting to run straight. After covering some distance, the creature despite slowly catching up to you trips over its own feet in a way that looks almost embarrassing. You expect ${partner_name} to slow down, but you can just see ${them} running faster. The two of you get away quite easily from the dinosaur that's clearly out of its element.\n      *set partner %+10\n      *goto crossroads\n    *else\n      You and ${partner_name} run as fast as you can in order to escape it. As you look back while you continue to run, and despite its awkward, almost drunken running posture, it's catching up to you. It swings at you with its large claw hitting you and leaving a bit of a scar. You see that ${partner_name} turns around grabs your axe, swinging directly at the finger that has the large claw. They hit it, cutting off part of the finger and the claw. The creature roars in pain only to retreat away. \n      \"It doesn't look so bad,\" ${partner_name} says looking at the scar it left on your back. \"There's no blood coming out of there.\"\n      \"Thanks,\" you say as you struggle to stay up after such a large hit.\n      *set partner %+10\n      *set health -6\n      *goto crossroads\n  #Sneak by. It can't catch us if it can't see us.\n    *if (Stealth > 2)\n      You and ${partner_name} slowly sneak by, using trees, rocks and everything you can find as cover as you silently pass right by the creature. After a few minutes, it starts to run and you're ready to burst out of your hiding spot in an attempt to get away. ${partner_name} however grabs your shoulder and shakes ${their} head. After a confused few seconds, the Baryonyx runs directly by you as if it didn't even see you. You give ${partner_name} a pat on the back as you smile and wait a few minutes before walking away.\n      *set partner %+10\n      *goto crossroads\n    *else\n      You and ${partner_name} slowly sneak by, using trees, rocks and everything you can find as cover as you silently pass right by the creature. After a few minutes, it starts to run and you're ready to burst out of your hiding spot in an attempt to get away. Before ${partner_name} is able to stop you, you reveal your position and the creature is able to jump over you and attacks. It bites you in the arm to keep you down and runs its claw through you before ${partner_name} is able to hit it in the head several times, distracting it. You grab your axe, hitting the dinosaur in the neck, killing it. \n      \"It never saw us until you jumped out,\" said ${partner_name} to you before you're able to get up.\n      You wordlessly head towards the crossroads, not wanting to get involved in one of THOSE conversations.\n      *set partner %-10\n      *set health -6\n      *goto crossroads  \n  *selectable_if (ammo > 0) #Shoot it with the rifle.\n    You line up your shot, shooting it in the throat. It's not an instant kill as the creature struggles a little bit before falling over, but it does eventually go down and stay down. ${partner_name} seems to flinch and makes a quick remark about how this kill wasn't exactly merciful, but still acknowledges it as being something that was needed for the two of you to survive.\n    *set partner %+10\n    *set ammo -1\n    *goto crossroads    \n\n*label crossroads\n\n*if (health \u003c 0)\n  Only moments after getting up, you stumble to the ground. You attempt to scream but are unable to, and now your breathing is interrupted. You recognize that you most likely have some kind of infection, and your mouth foams up as you pass out, never to wake up again. ${partner_name} was at your side.\n\nYou reach the southeastern crossroads. Where do you go?\n\n*choice\n  #I go to the lab\n    *goto lab\n  #I go to the factory\n    *goto factory\n  #I go to the storage facility\n    *goto storage\n  #I go back to the center\n    *goto_scene 2_center\n\n*label lab\n\n*if (lab = \"Unexplored\")\n  *goto lab_unexplored\n*elseif (lab = \"explored\") \n  *goto lab_explored\n*else\n  *goto lab_done\n\n*label lab_unexplored\n\n\nAs you and ${partner_name} head towards the lab, you notice that it still seems almost completely untouched. It has grey, steel walls no windows and a relatively nondescript door. \n\n\"That's odd,\" you hear ${partner_name} say. \"The door is wide open.\" You look to see that it is indeed wide open as if someone was begging for a total stranger to walk right in. You don't know what to even expect anymore, but recognize that you have to just go along with it at this point. You enter the building and make your way to the main laboratory. Having gone through the hallway, you two see that the only three rooms are a washroom, a room with plenty of tables and chairs most likely used for lunch and for meetings. You reach the main room and after looking around, you notice a bench that has some tools on it. You look at it and see that the tools here could be used to build yourself a flare gun, provided you have all of the pieces.\n\n*goto bench\n\n*label lab_explored\n\nAs you and ${partner_name} head towards the lab, you notice that it seems completely unchanged from when you were here on your own. \n\n\"That's odd,\" you hear ${partner_name} say. \"The door is wide open.\" You look to see that it is indeed wide open as if someone was begging for a total stranger to walk right in. You guess that you must've left it open when you left the lab last time, but don't beat yourself up too much. You at least survived. You show ${partner_name} the laboratory. They want to check out the other rooms in the building, but quickly give up when they see nobody's there.\n\n*goto bench\n\n*label lab_done\n\nYou and ${partner_name} return to the lab.\n\n*goto bench\n\n*label bench\n\n*set lab \"done\"\n\n*if (flare_gun = \"built\")\n  You have already built the flaregun. No need to stay here. You return to the crossroads\n  *goto crossroads\n\n*if (flare = \"found\")\n  You have found the flare. That's one of the pieces that you need.\n  *goto barrel\n*else\n  You need to find the flare. You return to the crossroads to look for more.\n  *goto crossroads\n\n*label barrel\n\n*if (barrel = \"found\")\n  You have also found the barrel. That's another one of the pieces that you need.\n  *goto trigger\n*else\n  You need to find the barrel. You return to the crossroads to look for more.\n  *goto crossroads\n\n*label trigger\n\n\n*if (trigger = \"found\")\n  You have also found the trigger. You have all three pieces.\n  *goto build_gun\n*else\n  You need to find the trigger. You return to the crossroads to look for more.\n  *goto crossroads\n\n*label build_gun\n\n*if (Tool_Usage > 4)\n  You are able to build the flare gun. \"Good job,\" says ${partner_name}, kissing you on the cheek before finishing \"Now, we seem to have limited use of it, so don't waste it,\" you nod waiting for ${them} to continue. \"We should probably fire it from the highest elevation and when we see a plane coming.\" You go back to the crossroads to look for a place to fire it from.\n  *set flare_gun \"built\"\n  *goto crossroads\n*else\n  You don't have the technical skills needed to build the flare gun. You return to the crossroads to look for more.\n  *goto crossroads\n\n*label factory\n\n*image factory.jpg\n\n*if (factory = \"Unexplored\")\n  *goto factory_unexplored\n*elseif (factory = \"explored\")\n  *goto factory_explored\n*else\n  *goto factory_done\n\n*label factory_unexplored\n\n\nAs you and ${partner_name} approach the factory, you can see that it's a run down and heavily damaged building with two smokestacks beside it. Neither smoke stack has any smoke coming out of it, which doesn't surprise you given how abandoned this island appears to be.\n\n\"Small factory,\" jokes ${partner_name}. \"Doesn't look like the guys who built this have anything to compensate for.\" You pause momentarily at how that joke seems out of character for ${partner_name} before being knocked out of your temporary stupor by ${them} pushing against your shoulder. \"Come on, lighten up. I can make jokes like that, to. I'm not that innocent.\"\n\nThe two of you are able to walk into the factory given that the door is wide open.\n\n*goto phone_repair\n\n*label factory_explored\n\nAs you and ${partner_name} approach the factory, only for you to see its completely unchanged from when you were here previously.\n\n\"Small factory,\" jokes ${partner_name}. \"Doesn't look like the guys who built this have anything to compensate for.\" You pause momentarily at how that joke seems out of character for ${partner_name} before being knocked out of your temporary stupor by ${them} pushing against your shoulder. \"Come on, lighten up. I can make jokes like that, to. I'm not that innocent.\" \n\nYou wonder if the door is still unlocked, and it is. The two of you walk in.\n\n*goto phone_repair\n\n*label factory_done\n\nYou and ${partner_name} return to the factory.\n\n*goto phone_repair\n\n*label phone_repair\n\n*set factory \"done\"\n\nYou look around the factory to see that there are the materials here you need to be able to repair a phone, assuming you have both the phone and the battery.\n\n*if (batteries = \"found\")\n  You have the batteries.\n  *goto phone\n*else\n  You need batteries. You go back to the crossroads to look for more.\n  *goto crossroads\n\n*label phone\n\n*if (phone = \"found\")\n  You also have the phone.\n  *goto build_phone\n*else\n  You need a phone if you want to repair it. You go back to the crossroads to look for more.\n  *goto crossroads\n\n*label build_phone\n\nYou're able to build the phone. \"Good thing you came here to get me,\" ${partner_name} says. \"Now, who will you call?\"\n\nYou're tempted to make a joke answer but decide to give a serious answer. You make the call to your local government to come to pick you up. After several hours of waiting, you two are picked up and asked several questions. After giving the correct answers, you both jump on and are given a ride back to safety.\n*achieve phone\n*goto_scene win_2\n\n*label storage\n\n\n*if (storage = \"Unexplored\")\n  *goto storage_unexplored\n*elseif (storage = \"explored\")\n  *goto storage_explored\n*else\n  *goto storage_done\n\n*label storage_unexplored\n\nAs you and ${partner_name} approach the storage facility, you notice something mildly surprising about it.\n\n\"Looks like this thing opens like a garage,\" ${partner_name} says about the storage facility, noting how you would pull the door up. After and ${partner_name} work together to lift it, you can't believe your eyes. You see the body of a boat, the type that ${partner_name} can build. There are a few parts missing, but they should be able to put it together if you find them.\n\n*goto inside_storage\n\n*label storage_explored\n\nYou return to the storage facility, and it looks like it hasn't even been touched since you were here the first time.\n\n\"Looks like this thing opens like a garage,\" ${partner_name} says about the storage facility, noting how you would pull the door up. After and ${partner_name} work together to lift it, you can't believe your eyes. You see the body of a boat, the type that ${partner_name} can build. There are a few parts missing, but they should be able to put it together if you find them.\n\n*goto inside_storage\n\n*label storage_done\n\nYou and ${partner_name} return to the storage area.\n\n*goto inside_storage\n\n*label inside_storage\n\n*set storage \"done\"\n\nYou look at the boat and see that it's missing a steering wheel, a rudder and a motor. Its also out of gas.\n\n*if (steeringwheel = \"found\")\n  You have the steering wheel for ${partner_name} to attach.\n  *goto rudder\n*else\n  You don't have a steering wheel for ${partner_name} to attach. You two return to the crossroads to look for it.\n  *goto crossroads\n\n*label rudder\n\n\n*if (rudder = \"found\")\n  You have the rudder for ${partner_name} to attach.\n  *goto motor\n*else\n  You don't have a rudder for ${partner_name} to attach. You two return to the crossroads to look for it.\n  *goto crossroads\n\n*label motor\n\n*if (motor = \"found\")\n  You have the motor for ${partner_name} to attach.\n  *goto gas\n*else\n  You don't have a motor for ${partner_name} to attach. You two return to the crossroads to look for it.\n  *goto crossroads\n\n*label gas\n\n*if (boatgas = \"found\")\n  You have the gas can to refill the boat.\n  *goto boat_escape\n*else\n  You don't have any gas. You two return to the crossroads to look for it.\n  *goto crossroads\n\n*label boat_escape\n\nAs ${partner_name} puts together the needed pieces to the boat, you assist in any way you can, including filling the boat up with gas. After less than an hour, the two of you are ready to go and head out off of the island and back towards civilization. You look back at the island and yell \"You can't handle this! You can't handle us!\" in celebration. You hear the roar of a creature that thought it had found food, but by the time it reaches the shore, you've covered so much distance it's barely even visible. You see the creature that's about 30 feet long appear. \"Albertosaurus,\" ${partner_name} says before continuing. \"How we going to get out of this one?\"\nYou two laugh as you speed away quickly, the island slowly leaving sight. \n\n*achieve boat_2 \n*goto_scene win_2\n\n\n\n", "2_sw": "*if (South_West = \"Unexplored\")\n  *goto unexplored\n*elseif (South_West = \"explored\")\n  *goto return\n*else\n  *goto South_West_Done\n\n*label unexplored\n\nAs you travel towards the part of the island with the highest elevation, you can hear the familiar sound of a waterfall crashing down. \"Under less stressful circumstances this would be beautiful,\" says ${partner_name} as ${their} voice is barely audible over the sound of water. You were thinking more along the lines of jumping the waterfall. Seems crazy, but time has shown its far from the scariest thing on this island.\n\n*goto encounter\n\n*label return\n\nYou return to the SouthWest. It's pretty much unchanged from your last trip to the island.\" Under less stressful circumstances this would be beautiful,\" says ${partner_name} as ${their} voice is barely audible over the sound of water. You nod approvingly, knowing you had similar thoughts on your first sight.\n\n*goto encounter\n\n*label encounter\n\nYou and ${partner_name} continue walking upwards on the trail only to notice a Stegosaurus grazing on grass, apparently not having seen either of you. You look around to see that there's no real way around except for going off the path and into the deep woods, which ${partner_name} doesn't want to risk. You look around for options and a few come to mind.\n\n*choice\n  #Book it around the beast as fast as I can.\n    *if (Athletics > 2)\n      You and ${partner_name} run as fast as you can around the stegosaurus and are able to avoid its tail swinging at the two of you. It chooses not to chase you, and you turn back to see it has resumed munching on its lunch. You and ${partner_name} hug quickly before continuing to head further down the path.\n      *set partner %+10\n      *goto crossroads\n    *else\n      You and ${partner_name} try to run around the stegosaurus, and as you do so, you're not fast enough to get by completely. Once you get by it, its tail swings at you, knocking you forward. You get where you wanted, just slightly damaged. The stego doesn't make a follow-up attack, as it resumes eating.\n      \"Are you okay?\" ${partner_name} asks you.\n      \"Yeah,\" you reply as you get up with some slight blood.\n      *set partner %+10\n      *set health -3\n      *goto crossroads\n  #Sneak by so it doesn't see us.\n    *if (Stealth > 3)\n      You and ${partner_name} attempt to sneak by, moving only slightly into the forest. After several slow-moving minutes, you're both able to get by the dinosaur without being noticed, either by the stegosaurus or other dinosaurs. You look back and sigh in relief.\n      *set partner %+10\n      *goto crossroads\n    *else\n      You and ${partner_name} attempt to sneak by, moving only slightly into the forest. After a few minutes, you make a sound after nearly falling, and the stegosaurus sees you and charges. It turns to its side and whips you with its tail, sending you several yards away. You land near where you want to end up anyway, just with a few spots bleeding.\n      \"Are you okay?\" ${partner_name} asks you.\n      \"Yeah,\" you reply as you get up with some slight blood.\n      *set partner %+10\n      *set health -3\n      *goto crossroads\n  #Walk around it. It'll know we're not threats.\n    You and ${partner_name} try to walk by normally, but the stegosaurus sees you and charges. It turns to its side and whips you with its tail, sending you several yards away. You land near where you want to end up anyway, just with a few spots bleeding.\n    \"Really? Nothing? That's your idea?\" ${partner_name} asks you.\n    \"Yeah,\" you reply as you get up with some slight blood. \"Didn't know what I was thinking,\" you finish\n    *set partner %-5\n    *set health -3\n    *goto crossroads\n  *selectable_if (ammo > 0) #Shoot it, using 1 ammo. \n    You line up your shot and fire at its tiny head, killing it in a single shot. It falls to the ground, making a slight shake. After losing your balance briefly, you and ${partner_name} regain your footing.\n    *set partner %+5\n    *set ammo -1\n    *goto crossroads\n\n*label South_West_Done\n\nYou and ${partner_name} return to the SouthWest portion of the island.\n*goto crossroads\n\n*label crossroads\n\n*if (Health \u003c 1)\n  You then fall down in pain, unable to get up. Your world goes black, and the last thing that you hear is ${partner_name} calling your name in desperation.\n  *goto_scene death\n\nYou see that as you reach a certain point, the path branches into three different directions, in addition to the path that leads back to the center of the island you originally came from. You can either go to the mountains which would give you a higher vantage point, the hills, which leads to the top of the waterfall, or the bottom where the lake that the waterfall pours into is.\nWhere do you go?\n\n*choice\n  #The Mountains\n    *goto Mountains\n  #The Hills\n    *goto Hills\n  #The Lakes\n    *goto lake\n  #Back to the Center\n    *goto_scene 2_center\n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto crossroads\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Cave_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Cave_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Cave_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Cave_Heal\n          *else\n            *set Health + 5\n            *goto Cave_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto crossroads\n  *selectable_if (map = \"new\") #Look at the map.\n    You look at the map. You can see the north is no longer restricted, but still has several dangerous dinosaurs and little to no apparent reward. The North East has a castle, while the East has a lighthouse, a greenhouse and a shed. The South East is labelled as the industrial area and has a factory, a lab and a storage area. The South as a church, a swamp and a town featuring houses, a bar, a general store, an arena and a town hall. The South West is packed with nature, as it contains a river and waterfall headed into a lake, hills and mountains, while the West has a beach which also acts as a dock for ships. The North West has a shed in the middle of grasslands.\n    *goto crossroads\n\n*label Cave_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Cave_Heal_2\n\n*label Cave_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto crossroads\n\n*label Mountains\n\n*if (Mountains = \"Unexplored\")\n  *goto Mountains_Unexplored\n*elseif (Mountains = \"Explored\")\n  *goto Mountains_Explored\n*else\n  *goto Mountains_Done\n\n*label Mountains_Unexplored\n\n\nYou go to the top of the mountains, with ${partner_name} following you. \n\n\"You're struggling more than usual. These new to you?\" they ask\n\n\"Yes,\" you respond.\n\n\"Seems like this view could have helped you navigate.\"\n\nYou look around before responding. \"Yup,\"\n\nThe two of you continue the conversation until you reach the top of the mountain.\n\n*goto Mountains_Top\n\n*label Mountains_Explored\n\nYou return to the top of the mountains, with ${partner_name} following you.\n\n\"You seem like you've done this climb before,\" ${partner_name} chimes in.\n\n\"You're right. It's quite the view,\" you say.\n\n\"Can't wait,\" they respond.\n\nThe two of you continue the conversation until you reach the top of the mountain.\n\n*goto Mountains_Top\n\n*label Mountains_Done\n\nYou and ${partner_name} return to the top of the mountain.\n\n*goto Mountains_Top\n\n*label Mountains_Top\n\nAfter you reach an area close to the top, you can see that a large pile of rocks is now stopping you from going further. Its still the highest point you can reach, and you can still see the entire island to some extent.\n\n*choice\n  #View the North-East part of the island\n    You look at the North East and see that there is a castle in the area, and it appears to be three stories tall. You are unable to tell what's in there, but it could have something, or someone, who could help you.\n    *goto Mountains_Top\n  #View the North part of the island\n    You see that the North is now more accessible, and no longer a point of no return. Still, even from this far, you can still tell its where the largest dinosaurs are mostly contained to.\n    *goto Mountains_Top\n  #View the North West part of the island\n    You can see a small shed and an airplane that appears to have crashed several years ago.\n    *goto Mountains_Top\n  #View the East part of the island\n    You can see a lighthouse, a small structure, and what used to be a greenhouse before the plants overtook it.\n    *goto Mountains_Top\n  #View the South East part of the island\n    You can see three large buildings. Two of them seem industrial, one of which has a smokestack. The third is relatively non-descript.\n    *goto Mountains_Top\n  #Go back down to the bottom\n    You go back down to the bottom and return to the crossroads without incident.\n    *goto crossroads\n  *selectable_if (flare_gun = \"built\") #Fire the flare gun.\n    \"There's a plane!\" ${partner_name} points out after a minute or so of looking.\n    \"Here goes nothing,\" you say as you take out your flare gun.\n    *goto fire_flare\n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto Mountains_Top\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Mountain_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Mountain_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Mountain_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Mountain_Heal\n          *else\n            *set Health + 5\n            *goto Mountain_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto Mountains_Top\n  *selectable_if (map = \"new\") #Look at the map.\n    You look at the map. You can see the north is no longer restricted, but still has several dangerous dinosaurs and little to no apparent reward. The North East has a castle, while the East has a lighthouse, a greenhouse and a shed. The South East is labelled as the industrial area and has a factory, a lab and a storage area. The South as a church, a swamp and a town featuring houses, a bar, a general store, an arena and a town hall. The South West is packed with nature, as it contains a river and waterfall headed into a lake, hills and mountains, while the West has a beach which also acts as a dock for ships. The North West has a shed in the middle of grasslands.\n    *goto Mountains_Top\n\n*label Mountain_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Mountain_Heal_2\n\n*label Mountain_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto Mountains_Top\n\n*label fire_flare\n\n*choice\n  #I offer to let ${partner_name} fire the flare gun.\n    *goto partner_fire\n  #I fire it myself.\n    *goto player_fire\n\n*label partner_fire\n\n\"Awesome, thanks!\" ${partner_name} exclaims as you hand ${them} the flare. \n\n\"You found the plane,\" you say. You see ${them} smile while shooting the flare.\n\n*set partner %+5\n\n*goto after_fire\n\n*label player_fire\n\nYou shoot the flare into the sky, with ${partner_name} watching.\n\n*goto after_fire\n\n*label after_fire\n\nYou two fire the flare up into the sky, and as it explodes, you hear ${partner_name} say \"thank god it worked.\" It hadn't occurred to you that it wouldn't, but understand ${their} worry. You see the plane turn towards the flare going off, and you two scream, wave your arms and take turns firing the flare again and again.\n\n*image Plane.jpg\n\nThe plane stops within a few meters you but doesn't land. Suddenly, one of the doors opens and a woman standing inside yells for both of you to get in. Neither of you asks any questions and instead jump in. You are immediately surrounded by several security guards, airline officers and other staff on board the plane who would be responsible for dealing with threats. \"Hands up!\" one of them says and you both do so right away.\n\n*page_break\n\nYou and ${partner_name} are asked several questions about who you are, where you both provide ID, and about what you're doing on the island. You two now on the plane, are asked several questions before they leave the island with you. After what felt like over an hour, but you know deep down was only a few minutes, the plane leaves with you and ${partner_name} on board. You look back at the island only to say \"I win again!\"\n*achieve flare\n*goto_scene win_2\n\n*label hills\n\n*if (Waterfall = \"Unexplored\")\n  *goto Waterfall_Unexplored\n*else\n  *goto Waterfall_Explored\n\n*label Waterfall_Unexplored\n\nYou start to climb up the hill, but ${partner_name} doesn't want to. \"You're going to jump you lunatic,\" is the explanation they give you when prompted, and they don't back down from this. The path twirls around, almost in a spiral, but the detail takes a while to register because you're too busy thinking of what ${partner_name} said to you. You're so lost in thought that you don't realize how long its been until you reach the top. You eventually reach it, still full of energy, but mentally exhausted due to your conversation with ${partner_name}. \n\n*set Waterfall \"Explored\"\n\n*goto Waterfall_top\n\n*label Waterfall_Explored\n\nYou go back to the top of the hill but ${partner_name} elects to stay behind due to fear of you jumping. You can still clearly see that western and southern portions of the island.\n\n*goto Waterfall_top\n\n*label Waterfall_top\n\n\n\n*choice\n  #I jump off the top of the waterfall\n    *goto jump\n  #I go back down\n    You go back down to the bottom and return to the crossroads.\n    *goto crossroads\n\n*label jump\n\n*if (Waterfall = \"Done\")\n  *goto jumped\n\n*else\n  *goto first_jump\n\n*label first_jump\n\nYou think you must be crazy, wanting to jump off the waterfall. You, however, remember that its best to take a 'pencil dive' position and dive into the water. Yay, time to stat up. You then swim back to the shore, at the side of the lake.\n\n*set Waterfall \"Done\"\n*choice\n  *selectable_if (Athletics \u003c=4) #Athletics\n    *set Athletics +1\n    *goto lake\n  *selectable_if (Tool_Usage \u003c=4) #Tool_Usage\n    *set Tool_Usage +1\n    *goto lake\n  *selectable_if (First_Aid \u003c=4) #First_Aid\n    *set First_Aid +1\n    *goto lake\n  *selectable_if (Stealth \u003c=4) #Stealth\n    *set Stealth +1\n    *goto lake\n  *selectable_if (Survival \u003c=4) #Survival\n    *set Survival +1\n    *goto lake\n\n*label jumped\n\nYou once again jump off the waterfall, taking the pencil dive approach again. You don't stat up again, but still are able to swim to the side of the lake without any damage. You then swim to the side of the lake\n\n*goto lake\n\n*label lake\n\nYou goto the lake, with ${partner_name} following you.\n\n*if (Lake = \"Unexplored\")\n  *goto Lake_Unexplored\n*elseif (Lake = \"Explored\")\n  *goto Lake_Explored\n*else\n  *goto Lake_Done\n\n*label Lake_Unexplored\n\nYou and ${partner_name} go towards to lake. \"Going for a swim?\" they ask playfully.\n\n\"Probably.\" Depends what's in there. You two approach the crystal clear lake, which you estimate at being about 10 feet deep. You think you see something.\n\n*goto lakeside\n\n*label Lake_Explored\n\nYou and ${partner_name} go towards to lake. \"Going for a swim?\" they ask playfully.\n\n\"Probably.\" Depends what's in there. You two approach the lake only to notice that it's just as clear as it was on your previous trip here.\n\n*goto lakeside\n\n*label Lake_Done\n\nYou and ${partner_name} return to the lake.\n\n*goto lakeside\n\n*label lakeside\n\n*set Lake \"done\"\n\nYou look into the lake.\n\n*if (shed_key = \"missing\")\n  You see a key on the bottom of the lake.\n  *goto rudder\n*else\n  You've already gotten the key. \n  *goto rudder \n\n*label rudder\n*if (rudder = \"missing\") \n  You also see a rudder floating in the middle of the lake. ${partner_name} says they can use it to help build a boat that can get the two of you off the island.\n  *goto swim\n*else\n  You've already got the rudder.\n  *goto swim\n\n*label swim\nWhat do you do?\n*choice\n  *selectable_if (shed_key = \"missing\") #Go get the key.\n    *goto fetch_key\n  *selectable_if (rudder = \"missing\") #Go get the rudder.\n    *goto fetch_rudder\n  #Go swimming with ${partner_name}.\n    *goto random_swim\n  #Return to the crossroads\n    *goto crossroads\n\n*label fetch_key\n\nYou swim out to the center of the lake, with ${partner_name} remaining back on the shore, ready to jump in just in case you're attacked. You remember that all sorts of other creatures could attack you. Not only are things like alligators and sharks potential threats, but so are creatures like plesiosaurus that also existed when dinosaurs ruled the earth. \n\nYou do, however, get to the middle of the lake without incident. As you reach the area above the key, you realize that although the random fish you see fish aren't a threat, there are several different kinds of algae, and you hope that you can get the keys without hurting yourself. Not sure if you trust yourself, or if you just feel you need the keys, you continue on with your quest as you dive down.\n\n*if Athletics > 1\n  You are a good enough swimmer to get within reach of the key. You see its surrounded by algae, and when you and grab it.\n  *goto fetch_key_2\n*else\n  You are not able to reach the bottom. You return to the surface, noting that you need to be more athletic to reach the bottom. You go back to shore, disappointed in yourself. You wonder if there's any way to increase your athletic ability enough to be able to get the key later.\n  *goto lakeside\n  \n\n*label fetch_key_2\n\nAs you reach out for the key \n\n*if Survival > 1\n  your knowledge of nature and survival is enough that you recognize which algae is safe to touch and take the key without touching any of the harmful species.\n  *goto fetch_key_3\n*else\n  your knowledge of nature and survival is not enough to recognize which algae is safe to touch, and although you are able to take the key, you are stung. A sharp pain courses through your arm.\n  *set health -3\n  *goto fetch_key_3\n\n*label fetch_key_3\n\n*if Health \u003c 1\n  You feel as if this amount of pain shouldn't have been enough to kill you, however with all the previous damage you've been dealt, this is simply the straw that broke the camel's back so to say. Your view goes black for at the bottom of the lake, and that last thing you hear is ${partner_name} jumping in a vain attempt to save you.\n  *goto_scene death\n\n\nAfter grabbing the key, you begin to swim back up. After a few seconds, you pop back up to the surface, taking a deep breathe of fresh air once you finally reach it. You keep the hand around the key clenched in a tight fist, not wanting to risk dropping it. You return to shore, with a brand new key in hand. You finally open up your hand and notice that there's something written on the key. You read the inscription for it as see that it says \"NW Shed\". \n\nYou begin to wonder what \"NW\" stands for. Is it someone's initials? Does the shed belong to someone with the initials NW? North West? Is NW a company abbreviation?  You're not sure, and neither is ${partner_name} but you pocket the key anyway, satisfied with having gotten something. \n\n*set shed_key \"found\"\n\n\n*goto lakeside\n\n*label fetch_rudder\nYou begin to swim out to get the rudder, knowing that you could be attacked from any direction at any moment. However, your trip to the center of the lake is surprisingly uninterrupted by anything, as you grab the rudder in order to bring it back to shore.\n\n*set rudder \"found\"\n\n*goto lakeside\n\n*label random_swim\n\nYou have already collected the key. Do you choose to go for a swim? Remember, there could be dangerous creatures in this water.\n\n*choice\n  #Yes\n    You successfully swim in the lake before returning to your quest to get off the island.\n    *if Lake_Repeat = \"False\"\n      You notice that it made you stronger. Pick a stat to increase by 1.\n      *choice\n        *se
