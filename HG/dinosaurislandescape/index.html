 crossroads\n  *selectable_if (Survival > 2) #Go out of its territory and go the long way.\n    You are able to determine where its territory ends and are able to stay out of it. Sure, it took you a few extra minutes to go around, but you avoid having to confront such a beast.\n    *goto crossroads\n  *selectable_if (katana = \"found\") #Use the katana to fight in once it charges.\n    It begins to charge, and you swing with perfect timing, but the animal's frill protects it. Before you have any chance to respond, you are flipped into the air and sent flying. You brace yourself for a follow-up attack, only to notice that it's leaving you alone, and going back to it food.\n    *set health -4\n    *goto crossroads \n\n*label south_east_explored\n\nYou return and see no signs of the triceratops. You assume it left, which is a relief for you because having to face that thing is not high on your list of things you want to do.\n\n*goto crossroads\n\n*label crossroads\n\n*if health \u003c 1\n  You, however, are unable to continue. It took a while for the damage to fully sink in, but somewhere along the lines, all of you broken bones become too much, as you fall to the ground, unable to get back up. You pass away on the island, wondering if anything could have saved you.\n\n  *goto_scene death\n\n*set south_east \"explored\"\n\nYou reach the crossroads and see a few paths which you can take.\n\n*choice\n  #I go to the lab\n    *goto lab\n  #I go to the factory\n    *goto factory\n  #I go to the storage facility\n    *goto storage\n  #I go back the center\n    *goto_scene center\n  \n\n*label lab\n\n*if (lab = \"Unexplored\")\n  *goto lab_unexplored\n*else\n  *goto lab_explored\n\n*label lab_unexplored\n\nAs you head to the lab, you notice that it's relatively close to what you would expect. It has grey, steel walls no windows and a relatively nondescript door. However, the security of this place is much less than you expect...the door is wide open. You don't know what to even expect anymore, but recognize that you have to just go along with it at this point. You enter the building and make your way to the main laboratory. Having gone through the hallway, you notice that there is nothing else except for a bathroom and what appears to be a break room, neither of which has anything useful inside. You reach the main room and after looking around, you notice a bench that has some tools on it. You look at them to see that they could be used to repair the parts of an SoS radio to contact ships.\n\n*set lab \"explored\"\n\n*goto bench\n\n*label lab_explored\n\nYou return to the lab, hoping that now you can repair the radio.\n\n*label bench\n\n*if (antennae_2 = \"found\")\n  The antennae that you found at townhall can work.\n  *if (SoS_radio_A = \"found\")\n    The radio part you found at town hall makes up part of the radio.\n    *if (Sos_radio_B = \"found\")\n      The radio part you found in the shed makes up the rest. You have all the pieces.\n      *goto repair\n    *else\n      However, you don't have the rest of it. You need to find it before building the radio.\n      *goto no_repair\n  *else\n    You don't have all the parts for the radio.\n    *goto no_repair\n    \n    \n*else\n  You do not have an antennae piece that can work to put it together\n  *goto no_repair\n\n*label repair\n\n*if (Tool_Usage > 3)\n  You have the technical skills to repair the radio.\n  *goto radio_repaired\n*else\n  You don't have the technical skills to repair the radio. You return to the crossroads, hoping to somehow boost your tool usage skill.\n  *goto crossroads\n\n*label radio_repaired\n\nYou grab the radio and turn it on. Recognizing the sound of it starting, your heart jumps for a second before you take a second to adjust the frequency and call into it.\n\n\"Hello, hello?\" you say into the radio. You pause for a few seconds, letting anyone on the other side respond. \"Is anyone there?\" you ask into it. You breathe heavily and hear no response. You panic, and begin adjusting the frequency, each time speaking the same words into the radio every time. You begin hyperventilating between attempts, becoming more and more anxious after each failure and after the seventh attempt, you hear a response.\n\n*page_break\n\n\"I copy, please identify yourself,\" a voice on the other end says.\n\nYou grab your chest and take a deep breath before responding, having this being quite possibly the biggest relief of your life.\n\n\"Hello, this is ${name}. I'm trapped on an island near your location and am requesting a rescue!!!!\" You notice your voice is raised and you're talking quickly, and your tone is certainly showing a high level of panic. Understandable, but you're not sure how you come across to others.\n\n\"Attention ${name}, this is the cargo liner The Fantastical Fin Whale. Please state which island you require rescue from.\"\n\nYou correctly state the longitude and latitude of the island, having remembered them from the helicopter's navigational tools.\n\n\"I copy ${name}. We would be able to pick you up from the dock on the western portion of the island, with an ETA of 15 minutes. Please confirm that you can reach this area.\"\n\n\"Affirmative,\" you sequel excitedly, \"I can be there within a few minutes.\" You pause briefly before saying \"Thank you so much.\"\n\n\"${name}, please state the name of any and all others with you,\" the person on the other end of the radio states.\n\n\"Nobody else, it's just me,\" you state.\n\nAfter a brief pause, you hear a response \"Okay, ${name}. I expect you will have your hands up, be unarmed and show full cooperation, is that clear?\"\n\n\"Yes, of course,\" you say, desperate to affirm that you are no threat.\n\n\"Thank you. And please understand, you will have a half-hour after our arrival to board, otherwise, we will leave without, is that clear?\"\n\n\"Yes,\" you state, as you are already running towards the western side of the island.\n\n*page_break\n\n*goto ship_escape\n\n*label ship_escape\n\n*if (west = \"Unexplored\")\n  *goto west_unexplored\n*else\n  *goto west_explored\n\n*label west_unexplored\n\nYou charge west, excited at the chance to finally get rescued. You see the dock there, and make a B-line towards it, paying no attention to your surroundings. The adrenaline is pumping in your body, and you're running faster than you ever thought possible. As you quickly charge toward the scene, you notice that you're suddenly unable to lift either of you legs. Literally stuck in place, you figure out what's wrong: you're stuck in quicksand.\n\n\"Not now!\" You say to yourself. \"Damn it, not now! What the hell?!\" You begin to panic as you begin to feel yourself slowly sink. You can see a ship approaching in the distance. \n\n*temp sink 0\n\n*label quicksand\n\n*if sink = 5\n  You can't get out of the quicksand fast enough, and end up drowning.\n  *goto_scene death\n*elseif sink = 4\n  You are now up to your neck in quicksand. Hurry up and think of something!\n  *goto quicksand_2\n*elseif sink = 3\n  You are now up to your torso in quicksand. Hurry up and think of something!\n  *goto quicksand_2\n*elseif sink = 2\n  You are now up to your waist in quicksand. Hurry up and think of something!\n  *goto quicksand_2\n*elseif sink = 1\n  You are now up to your knees in quicksand. Hurry up and think of something!\n  *goto quicksand_2\n*else\n  You are now up to your ankles in quicksand. Hurry up and think of something!\n  *goto quicksand_2\n\n\n*label quicksand_2\n\n\nWhat do you do to try and escape without sinking further?\n\n*choice\n  #Scream and panic. Maybe someone will hear me.\n    You scream, yell and wave your arms. Nobody comes to help you and you sink deeper into the quicksand.\n    *set sink +1\n    *goto quicksand\n  #Struggle my way out. Sheer force can do it.\n    You attempt to fight your way out of the quicksand, but it does no good, and you realize you're sinking deeper into the quicksand.\n    *set sink +1\n    *goto quicksand\n  #Stay still. I can't panic.\n    You stay still. You are no longer sinking deeper, but are still stuck.\n    *goto quicksand\n  #Lie down to spread my weight around.\n    Despite being partially underground, you're able to spread yourself out enough to prevent sinking. You slowly pull yourself out of the quicksand, and within minutes are safe.\n    *set sink 0\n    *goto safe\n  *selectable_if (Survival > 2) #Use my knowledge of Quicksand to think of something.\n    You remind yourself its best to lie down while in quicksand to spread your weight around. Despite being partially underground, you're able to spread yourself out enough to prevent sinking. You slowly pull yourself out of the quicksand, and within minutes are safe.\n    *set sink 0\n    *goto safe\n\n*label safe\n\nNow out of the quicksand, you pant heavily and look back near you as you see the ship setting up to dock.\n\n*goto ship_safe\n\n*label west_explored\n\nAs you sprint towards the dock, you remember the quicksand and run around it. \"Wow,\" you think to yourself, \"how much would it have sucked to get stuck in that now?\"\n\n*goto ship_safe\n\n*label ship_safe\n\n*page_break\n\nYou run-up to the ship, and look up to see the name \"Fantastical Fin Whale\" written on it. \"Hello, are you ${name}?\" You hear someone from the deck yell as they see you.\n\n\"Yes, that's me!\" you say quickly and loudly between loud breaths as you pant and hold your chest with one hand while holding your other in the air. The ship then lowers a bridge towards you for you to walk on. You do so and are stopped. \n\n\"Hands up\", one of the crew says. You flinch at first, but then remember you were warned about this, and then you raise your hands slowly. Several crew members check your pockets and pat you down, taking out everything they find. \"No weapons, nothing suspicious,\" one of the crew members says to another after a few minutes of a pat-down. \n\n\"Take ${name} to the main area of the ship. They will accommodate us on our trip and be dropped off at the first port.\"\n\nAfter several hours, you reach the ship's destination. The laughing and eye-rolling of the crew let you know that they don't make your story very seriously. But hey, at least you're the first person to escape that island alive.\n\n*achieve sos\n\n*goto_scene Transition\n\n*label no_repair\n\nYou return to the crossroads\n\n*goto crossroads\n\n*label factory\n\n*image factory.jpg\n\n*if (factory = \"Unexplored\")\n  *goto factory_unexplored\n*else\n  *goto factory_explored\n\n*label factory_unexplored\n\nAs you approach the factory, you can see that its a run down and heavily damaged building with two smokestacks beside it. Neither smoke stack has any smoke coming out of it, which doesn't surprise you given how abandoned this island appears to be. You continue to walk down the path towards the building, to see that its relatively small, only about 50 feet long by twenty feet high, and likely only a single story tall. You walk up to the front door, only to see that it is indeed already not only unlocked but completely open.\n\nYou walk in very slowly, looking around to see if there's anything that could just out at you. You turn a corner and come face to face with what appears to be a large lizard which opens its mouth and...\n\n*page_break\n\n...as you dodge it, you see it has a spring coming out the back of it, as a sign that says \"Alan, I gotcha again. -Ian\". You catch your breath, cursing Ian's name for what must have been an office prank from one scientist to another. As you slowly back away from the jump-scare producing joke, you turn around and enter the main room of the factory, which you believe to be where most of the stuff is manufactured.\n\n*set factory \"explored\"\n\n*goto factory_repair\n\n*label factory_explored\n\nYou go back to the factory, and once again are upset by the jump-scare office prank, which although no longer active, still disappoints you.\n\n*label factory_repair\n\nYou look at what tools are here and notice that you have the parts needed to repair a radio receiver, as well as to attach a working transmitter and receiver. The type of radio that you can repair is compatible with the type on the helicopter, meaning that if you successfully repair it, you will be able to call for help.\n\n*if (receiver = \"fixed\")\n  *goto full_radio\n*else\n  *goto fix_receiver\n\n*label fix_receiver\n\n*if (Receiver_Part_A = \"found\")\n  The part of the receiver you found in the mountains is compatible, \n  *if (Receiver_Part_B = \"found\")\n    as is the one you found in the house. You have all the parts needed.\n    *goto Fix_receiver_B\n  *else\n    but you don't have the rest. You return to the crossroads, hoping to find the rest of the radio.\n    *goto crossroads    \n\n*if (Receiver_Part_B = \"found\")\n  The part of the receiver you found in the house is compatible, but you don't have the rest. You return to the crossroads, hoping to find the rest of the radio.\n  *goto crossroads\n\nYou don't have any of the parts required, though. You return to the crossroads, hoping that somewhere on this island\n*goto crossroads\n\n*label Fix_receiver_B\n\n*if (Tool_Usage > 3)\n  You have the technical skills to repair the receiver.\n  *set receiver \"fixed\"\n  *goto full_radio\n*else\n  You don't have the technical skills to fix the radio. Maybe there's a way you can increase yours.\n  *goto crossroads\n\n*label full_radio\n\n*if (antennae = \"found\")\n  You have the antennae to the radio.\n  *if (radio_transmitter = \"missing\")\n    You do not have a transmitter though. You go back to the crossroads, wondering if there's one on the island\n    *goto crossroads\n  *elseif (radio_transmitter = \"found\")\n    You have the transmitter, but it's still broken. You don't have the tools here to repair it, but maybe somewhere else on the island, you can.\n    *goto crossroads\n  *else\n    You have the transmitter, and it is repaired.\n    *goto full_radio_2\n\n*else\n  You do not have the antennae to the radio.\n  *if (radio_transmitter = \"missing\")\n    You do not have transmitter either. You go back to the crossroads, wondering if there's one on the island\n    *goto crossroads\n  *elseif (radio_transmitter = \"found\")\n    You have the transmitter, but it's still broken. You don't have the tools here to repair it, but maybe somewhere else on the island, you can.\n    *goto crossroads\n  *else\n    You have the transmitter, and it is repaired. If you get the antennae, you can fix the whole thing. You return to the crossroads to look for it.\n    *goto crossroads\n\n*label full_radio_2\n\n*if (Tool_Usage > 4)\n  You have the technical skills to repair the radio in its entirety.\n  *goto radio_ending\n*else\n  You don't have the technical skills to repair the radio in its entirety. Looks like its tougher than just fixing the receiver. You return to the crossroads, hoping you can increase your skills somehow.\n  *goto crossroads\n\n\n\n\n*label storage\n\n*if (storage = \"Unexplored\")\n  *goto storage_unexplored\n*else\n  *goto storage_explored\n\n*label storage_unexplored\n\nYou find the storage area, which upon closer inspection, you quickly discern is just a large garage, similar to many of the storage facilities that you remember back from home. \"Home\", you think to yourself, berating a sigh of longing, wishing right now that you could be there, where you can see your family, ${friend_name} and ${partner_name} again. You daydream for a handful of seconds before snapping yourself back to reality, thankful that you weren't attacked during your brief distraction. You notice that like a garage, the door opens by pulling it up, so you do so, having briefly forgotten the loud noise it makes. After hearing this, you look around quickly, both inside the garage and behind you to see if you're being attacked. You see and hear no dangerous animals coming, so you continue with looking into the garage to see if there's anything worthwhile inside.\n\nAfter looking inside for a while, you notice a workbench that has tools that would be able to repair a radio transmitter, the same type of radio transmitter that could be hooked up to the helicopter.\n\n*goto inside_storage\n\n*label storage_explored\n\nYou return to the storage facility, opening up the door a lot more slowly and quietly this time.\n\n*goto inside_storage\n\n*label inside_storage\n\nYou go to the workbench.\n\n*if (radio_transmitter = \"found\")\n  *goto repair_transmitter\n*elseif (radio_transmitter = \"fixed\")\n  You have already fixed the transmitter\n  *goto crossroads\n*else\n  You, however, don't have such a transmitter. You return to the crossroads, wondering if you can find one somewhere.\n  *goto crossroads\n\n*label repair_transmitter\n\n*if Tool_Usage > 3\n  You have the technical skills to repair the transmitter. You then return to the crossroads to see if you can build the rest of the radio.\n  *set radio_transmitter \"fixed\"\n  *goto crossroads\n*else\n  You don't have enough tech skills to repair the transmitter. You return to the crossroads, thinking that maybe you can somehow increase your tech skills on the island.\n  *goto crossroads\n\n*label radio_ending\n\nYou have fully repaired the radio. As you run back to the helicopter to be able to use it, you envision all the stories you'll have to tell everyone. You crashed on an island full of dinosaurs,\n*if (notes = \"found\")\n  you uncovered a conspiracy about the military unleashing said dinosaurs upon civilian populations,\n\n*if (money = \"found\")\n  you found a treasure hidden in an ancient castle,\n\nand you got out of it alive. You speed by everything, radio in hand, looking out for dinosaurs, praying that none will interrupt you at this point when you're so close to success. You then reach the cave that brought you to the center of the island, blitzing through it, and as you reach the end. It's soon after you exit it that you come upon a realization: the bridge you made right after landing has collapsed! \n\nYou swear under your breath several times before finally reaching that area of the island, now finally out of breath, but seemingly safe. You look around for trees and rocks: they helped you build the bridge last time, why can't they work for you now? A brief look around causes you to calm down, as you notice several trees and rocks. You calm down and take a few deep breathes as you construct another bridge, keeping an eye out for more potential dinosaurs. After several minutes of none coming, you eventually finish the bridge and move across it carefully, knowing that rushing could get you killed. \n\n*page_break\n\nYou get to the other side and install the radio within a few minutes before making the call. You set it to the correct frequency and stat \"Hello, air command do you read?\" into it before almost immediately hearing a response.\n\n\"Yes, we read you. Who are you and what is your message?\" they respond in a calm and professional voice.\n\n\"I am ${name} and I am stranded after a crash,\" you start, before giving your current location.\n\nAfter you give a long-winded explanation they respond \"Yes, we read you ${name}, sending a response team now.\" Within a few hours, another helicopter lands nearby, and you show your ID before being allowed on. As they take you to your original destination, you talk at length about your adventures on the island, to the disbelief and amusement of those on board.\n\n*achieve radio\n\n*goto_scene Transition", "south_west": "*if (South_West = \"Unexplored\")\n  *goto unexplored\n*else \n  *goto return\n\n*label unexplored\n\nAs you travel towards higher ground, you can hear the waterfall crashing down. It seems beautiful, reminding you of the beauty of many of the waterfalls you've seen before. As you look at the natural formation, you can see that it is in fact, a beautiful sight, if a relatively small one, reaching only about 25 feet high. You could, at least in theory, safely jump down if you landed properly. How do you feel about possibly jumping down off of a waterfall?\n\n*image Water_fall.jpg\n\n*fake_choice\n  #Sounds awesome. I'm probably going to die here anyway, might as well do something thrilling.\n    You're excited about the opportunity to do something exciting. Its the second most exciting thing on the island, after all the dinosaurs.\n  #Sounds scary. No way I'm doing that.\n    You don't like the thought of jumping, regardless of how exciting it looks.\n  #Sounds like an emergency exit. Only using that to get away from something.\n    You could use it to get away from a dinosaur, but hopefully, you never have to do that.\n\nYou continue walking along the path, keeping a lookout for anything that could possibly be around you, as if a creature is even attempting to be quiet, you wouldn't be able to see it, due to all the noise of the waterfall. You're sure to stay vigilant, being aware that there could be an attack from any angle at any time. Not just from dinosaurs either, as you're not sure if there are other creatures around, ones associated with being from the present day. Lions, bears and other animals could be waiting to attack you.\n\nYou suddenly hear something loud, similar to the sound of munching, which you think could be another carnivore similar to the one you noticed only minutes after your crash. Maybe this one is even bigger. You look in every direction, and after a brief moment of panic, you see that to your relief, you are not in danger. The creature that made the noise is an armoured quadruped with a clubbed tail munching on a fern. You're pretty certain its an ankylosaurus, a herbivore that likely wouldn't be interested in you. It also doesn't seem to have noticed you, so you should be able to get by it relatively easily. What do you do?\n\n*choice\n  #Sneak by. I won't see me as food, but it doesn't know what I am and might see me as a threat.\n    *if Stealth > 1\n      You successfully sneak by. You're not sure if the animal saw you, but if it did, it didn't care.\n      *goto branch\n    *else\n      It sees you acting suspicious, and charges. It hits you with its club tail, sending you a few feet away. You look for it to attack again. but it seems to have stopped, going quickly back to its food. \n    *set Health -2\n    *goto branch\n  #Run. It won't chase me if it has food in front of it.\n    *if Athletics > 1\n      You run away. It gives chase but after a short while, gives up and leaves you alone.\n      *goto branch\n    *else\n      It sees you trying to get away, and charges. It catches you, hits you with its club tail, sending you a few feet away. You look for it to attack again. but it seems to have stopped, going quickly back to its food. \n    *set Health -2\n    *goto branch\n  #Keep walking. It's not interested in me, and if I start acting funny, it might get suspicious.\n    You calmly walk by it. It notices you but seems to you you minding your own business, and continues eating.\n    *goto branch\n\n*label return\n\nYou return to the path to the south, walking by the ankylosaurus, having learned to leave it to its own devices and not interact with it. This time it barely even glances at you before returning to its meal.\n\n*goto branch\n\n*label branch\n\n*set South_West \"explored\"\n\n*if Health \u003c 1\n  You are unable to get up and notice the damage done to you is too much. You're not able to make it any further.\n  *goto_scene death\n\nYou see that as you reach a certain point, the path branches into three different directions, in addition to the path that leads back to the center of the island you originally came from. You can either go to the mountains which would give you a higher vantage point, the hills, which leads to the top of the waterfall, or the bottom where the lake that the waterfall pours into is.\n\n*choice\n  #The Mountains\n    *goto Mountains\n  #The Hills\n    *goto Hills\n  #The Lakes\n    *goto lake\n  #Back to the Center\n    *goto_scene center\n\n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto branch\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Branch_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Branch_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Branch_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Branch_Heal\n          *else\n            *set Health + 5\n            *goto Branch_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto branch\n\n  *selectable_if (map = \"found\") #Look at the map.\n    You look at the map. You can see the north is restricted, presumably due to danger, but also presumably contains a motorboat which you could use to escape the island. The North East has a castle, while the East has a lighthouse, a greenhouse and a shed. The South East is labelled as the industrial area and has a factory, a lab and a storage area. The South as a church, a swamp and a town featuring houses, a bar, a general store, an arena and a town hall. The South West is packed with nature, as it contains a river and waterfall headed into a lake, hills and mountains, while the West has a beach which also acts as a dock for ships. The North West has a shed in the middle of grasslands.\n    *goto branch\n\n*label Branch_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Branch_Heal_2\n\n*label Branch_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto branch\n\n\n\n*label Mountains\n\n*if (Mountains = \"Unexplored\")\n  *goto Mountains_Unexplored\n*else\n  *goto Mountains_Explored\n\n*label Mountains_Unexplored\n\nYou take over an hour to hike up to the top of a small mountain. Along the way, you see several small pterosaurs. You're sure that they are adults, and luckily, aren't large enough to do anything to you if they were to attack. You conclude that you're relatively safe, but you decide to keep an eye out regardless. After getting to the top, you see that there's a lot you can do to look around yourself and see if there's anything around that can actually help you.\n\nYou get a closer look at the pterosaurs and see that they indeed would not be a threat to you, and as soon as you get close to any of them, they start to fly away from you, clearly nervous around you. \n\n*image Pterosaur.jpg\n\n*set Mountains \"Explored\"\n\n*goto Mountains_Top\n\n*label Mountains_Explored\n\nYou return to the top of the small mountain without incident from the pterosaurs. It still takes a while, and that is of concern to you, but you notice there's nothing that can be done about it.\n\n*label Mountains_Top\n\nAt the top of the mountain, you can see the entire island, beyond the southern and western portions. What do you do?\n\n*choice\n  #View the North-East part of the island\n    You look at the North East and see that there is a castle in the area, and it appears to be three stories tall. You are unable to tell what's in there, but it could have something, or someone, that could help you.\n    *goto Mountains_Top\n  #View the North part of the island\n    You see several dangerous pieces of terrain, and even from this far, you can see dinosaurs that appear tiny, but knowing how far they are, you can tell that they are huge. You can tell that many sauropods have been killed, speaking towards what could be in there.\n    *goto Mountains_Top\n  #View the North West part of the island\n    You see an open grassland, and since there are no trees, you have a clear view of what is creating the smoke. It's an airplane that has crashed, but there's no fire. You can see that there is also a small shed there.\n    *goto Mountains_Top\n  #View the East part of the island\n    You can see a lighthouse, a small structure, and a greenhouse filled with plants.\n    *goto Mountains_Top\n  #View the South East part of the island\n    You can see three large buildings. Two of them seem industrial, one of which has a smokestack. The third is relatively non-descript.\n    *goto Mountains_Top\n  #Continue further into the mountains\n    *goto Deep_Mountains\n  #Go back down to the bottom\n    You go back down to the bottom and return to the crossroads without incident.\n    *goto branch\n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto Mountains_Top\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Mountain_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Mountain_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Mountain_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Mountain_Heal\n          *else\n            *set Health + 5\n            *goto Mountain_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto Mountains_Top\n  *selectable_if (map = \"found\") #Look at the map.\n    You look at the map. You can see the north is restricted, presumably due to danger, but also presumably contains a motorboat which you could use to escape the island. The North East has a castle, while the East has a lighthouse, a greenhouse and a shed. The South East is labelled as the industrial area and has a factory, a lab and a storage area. The South as a church, a swamp and a town featuring houses, a bar, a general store, an arena and a town hall. The South West is packed with nature, as it contains a river and waterfall headed into a lake, hills and mountains, while the West has a beach which also acts as a dock for ships. The North West has a shed in the middle of grasslands.\n    *goto Mountains_Top\n\n*label Mountain_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Mountain_Heal_2\n\n*label Mountain_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto Mountains_Top\n\n*label Deep_Mountains\n\n*if (Receiver_Part_A = \"missing\")\n  *goto Find_Receiver\n*else\n  *goto Found_Receiver\n\n*label Find_Receiver\n\nYou go further into the mountains and find something that you recognize as being half of a radio receiver. You carefully inspect it, and, to your surprise, its for a type of radio that would be compatible with the helicopter. You have a hard time calming down before eventually getting over yourself. You do your best to catch your breath, and eventually, your heart rate and blood pressure return back to normal levels. You figure that if your ability to use technology and other tools is high enough, you may be able to put together a full radio...if you find the other pieces.\n\n*set Receiver_Part_A \"found\" \n\n*if (Receiver_Part_B = \"missing\")\n\n  Unsure of where the other pieces are, or even if they're on the island, you pocket the equipment, hoping for a scenario where it could be instrumental to your way off the island.\n\n  You look around and simply see more pterosaurs, a dead end, and the ocean around you. You go back to the top of the mountains, as there is nothing else useful here. \n\n  *goto Mountains_Top\n\n*else\n\n  You recognize this as being the other half of the radio you found in the residence area. If you find the right tools, and the right skills with technology, you can put this radio back together and call for help.\n\n  You look around and simply see more pterosaurs, a dead end, and the ocean around you. You go back to the top of the mountains, as there is nothing else useful here. \n\n  *goto Mountains_Top\n\n*label Found_Receiver\n\nYou come back to where you found part of the radio receiver. After a look around again, you see that there is still nothing else of use here, so you return to the top of the mountains.\n\n*goto Mountains_Top\n\n*label Hills\n\n*if (Waterfall = \"Unexplored\")\n  *goto Waterfall_Unexplored\n*else\n  *goto Waterfall_Explored\n\n*label Waterfall_Unexplored\n\nYou begin to head up the hill that features the top of the waterfall. The path twirls around, almost in a spiral, as you begin to wonder whether or not it's a natural formation of the land, or somehow man-made. The trip didn't seem like much when you first looked at it, but then you remembered that you were looking at it from the perspective of someone who was used to safe hikes in public woods, not someone who has to look out for being attacked by dinosaurs from every angle. You get to the top, still full of energy, but mentally exhausted and after what feels like forever. You feel lucky that nothing of note happened while you were going up, but you can't see much further than you could beforehand. You can, however, see the southern portion and western portion a lot better than before. You also could jump off the waterfall and into the lake.\n\n*set Waterfall \"Explored\"\n\n*goto Waterfall_top\n\n*label Waterfall_Explored\n\nYou go back to the top of the hill. You can still clearly see that western and southern portions of the island.\n\n*goto Waterfall_top\n\n*label Waterfall_top\n\n\n\n*choice\n  #I look at the Southern portion of the island\n    You look to the south and see that there are a bunch of house-sized buildings surrounding what appears to be a temple or some other place of worship. You also notice that there appears to be a swamp right near it. You're not sure if people still live there, and can't see any visible vehicles, and not even any roads, just the same dirt path that can be seen everywhere else on the island. \n    *goto Waterfall_top\n  #I look at the Western portion of the island\n    You can now see the beach area a lot more closely. You can also see that some of the sand looks slightly different than the rest, but you're not exactly sure how. You can also see a large dock, that looks like a perfect place for a ship to stop and either drop off or pick up commodities or people. \n    *goto Waterfall_top \n  #I jump off the top of the waterfall\n    *goto jump\n  #I go back down\n    You go back down to the bottom and return to the crossroads.\n    *goto branch\n\n*label jump\n\n*if (Waterfall = \"Done\")\n  *goto jumped\n\n*else\n  *goto first_jump\n\n*label first_jump\n\nYou think you must be crazy, wanting to jump off the waterfall. You, however, remember that its best to take a 'pencil dive' position and dive into the water. Yay, time to stat up. You then swim back to the shore, at the side of the lake.\n\n*set Waterfall \"Done\"\n*choice\n  *selectable_if (Athletics \u003c=4) #Athletics\n    *set Athletics +1\n    *goto lake\n  *selectable_if (Tool_Usage \u003c=4) #Tool_Usage\n    *set Tool_Usage +1\n    *goto lake\n  *selectable_if (First_Aid \u003c=4) #First_Aid\n    *set First_Aid +1\n    *goto lake\n  *selectable_if (Stealth \u003c=4) #Stealth\n    *set Stealth +1\n    *goto lake\n  *selectable_if (Survival \u003c=4) #Survival\n    *set Survival +1\n    *goto lake\n\n*label jumped\n\nYou once again jump off the waterfall, taking the pencil dive approach again. You don't stat up again, but still are able to swim to the side of the lake without any damage.\n\n*goto lake\n\n*label lake\n\n*if (Lake = \"Unexplored\")\n\n  *goto Lake_Unexplored\n\n*else \n\n  *goto Lake_Explored\n\n*label Lake_Unexplored\n\nYou reach a beautiful, crystal clear lake. As you look around, you can see that there's a stegosaurus eating there. It clearly sees you but doesn't seem concerned, as it continues to simply drink from the lake. You wonder if this stegosaurus had any relation to the dead baby the other dinosaur was eating earlier, but have no way of knowing. You see nothing else in or near the water, other than a few species of fish that look rather ordinary. However, something that you can see is a sparkle at the bottom of the lake. It appears to be about 10 feet or so deep, and very small. \n\nAfter looking at it for a few seconds, you notice that it is, in fact, something that could be very helpful to you. It's not just some shiny rock or something useless like that...its a key. You don't know what its for, but its almost certainly for one of the buildings on this island. Reaching that key could unlock something very useful to you, as you are convinced that inside (where people were, or could still possibly be) could be very useful in helping you find something that will get you off of this island. You also notice that there's some algae within the water, especially near the key. You see several species but are unable to tell which ones are potentially harmful, and which ones are harmless. However, you quickly have to go about your order of business in getting that key...if you are a good enough swimmer to reach it.\n\n*set Lake \"explored\"\n\n*goto wade_1\n\n*label Lake_Explored\n\nYou return to the lake you note that there is no longer a stegosaurus there, and own it up to the creature having simply moved on with its day.\n\n*if (shed_key = \"missing\")\n  *goto wade_1\n\n*else\n  *goto wade_2\n\n*label wade_1\n\n*choice\n  #I go after the key. I might need it.\n    *goto swim\n  #I wait. I might be able to come back later.\n    You return to where the path branched off, thinking it might be best to return another time.\n    *goto branch\n\n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto wade_1\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Wade_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Wade_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Wade_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Wade_Heal\n          *else\n            *set Health + 5\n            *goto Wade_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto wade_1\n\n*label Wade_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Wade_Heal_2\n\n*label Wade_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto wade_1\n\n\n\n\n\n\n\n\n\n\n*label wade_2\nYou have already collected the key. Do you choose to go for a swim? Remember, there could be dangerous creatures in this water.\n\n*choice\n  #Yes\n    You successfully swim in the lake before returning to your quest to get off the island.\n    *if Lake_Repeat = \"False\"\n      You notice that it made you stronger. Pick a stat to increase by 1.\n      *choice\n        *selectable_if (Athletics \u003c=4) #Athletics\n          *set Athletics +1\n          *goto after_swim\n        *selectable_if (Tool_Usage \u003c=4) #Tool_Usage\n          *set Tool_Usage +1\n          *goto after_swim\n        *selectable_if (First_Aid \u003c=4) #First_Aid\n          *set First_Aid +1\n          *goto after_swim\n        *selectable_if (Stealth \u003c=4) #Stealth\n          *set Stealth +1\n          *goto after_swim\n        *selectable_if (Survival \u003c=4) #Survival\n          *set Survival +1\n          *goto after_swim\n    *else\n      You can't stat up again. But at least you enjoyed your swim.\n      *goto branch\n\n*label after_swim\n\n*achieve swimmer\n*set Lake_Repeat \"True\"\n*goto branch\n\n*label swim\n\nYou swim out to the center of the lake. Fish pass you by, unresponsive to your presence. You feel as if something should be attacking you now, but are afraid to ask. You keep an eye out for anything that could be dangerous: alligators, crocodiles and sharks are all creatures that you know were around during the time of the dinosaurs but have also survived until now. You know that, regardless of how many times you go in this lake, and return to it, you will feel a threat of being attacked randomly by some sort of creature that can kill you within seconds. You feel something grab your leg. Worried it might be a threat, you turn around and...\n\n*page_break\n\nnotice that its just seaweed. Harmless, meaningless, mundane seaweed that won't hurt you. You catch your breath, and are relieved that nobody saw you. You feel a bit more awake now, most likely from the adrenaline rush you got after you felt like you were being attacked. You continue swimming towards the centre of the lake where the key is. Thoughts of how important it is to see ${partner_name} as well as your friends and family again, you are reminded of how precious and fragile your life is. You are constantly on guard for an actual attack.\n\n*page_break\n\nYou do, however, get to the middle of the lake without incident. As you reach the area above the key, you realize that although the fish aren't a threat, there are several different kinds of algae, and you hope that you can get the keys without hurting yourself. Not sure if you trust yourself, or if you just feel you need the keys, you continue on with your quest as you dive down.\n\n*if Athletics > 1\n  You are a good enough swimmer to get within reach of the key. You see its surrounded by algae, and when you and grab it.\n  *goto swim_2\n*else\n  You are not able to reach the bottom. You return to the surface, noting that you need to be more athletic to reach the bottom. You go back to shore, disappointed in yourself. You wonder if there's any way to increase your athletic ability enough to be able to get the key later.\n  *goto wade_1\n  \n\n*label swim_2\n\nAs you reach out for the key \n\n*if Survival > 1\n  your knowledge of nature and survival is enough that you recognize which algae is safe to touch and take the key without touching any of the harmful species.\n  *goto swim_3\n*else\n  your knowledge of nature and survival is not enough to recognize which algae is safe to touch, and although you are able to take the key, you are stung. A sharp pain courses through your arm.\n  *set health -3\n  *goto swim_3\n\n*label swim_3\n\n*if Health \u003c 1\n  You feel as if this amount of pain shouldn't have been enough to kill you, however with all the previous damage you've been dealt, this is simply the straw that broke the camel's back so to say. Your view goes black for you at the bottom of the lake, as you die, key in hand. Your last thoughts are of your family, who you will never see again, and who will never know of your terrible fate.\n  *goto_scene death\n\n\nAfter grabbing the key, you begin to swim back up. After a few seconds, you pop back up to the surface, taking a deep breathe of fresh air once you finally reach it. You keep the hand around the key clenched in a tight fist, not wanting to risk dropping it. You return to shore, with very a brand new key in hand. You finally open up your hand and notice that there's something written on the key. You read the inscription for it as see that it says \"NW Shed\". \n\nYou begin to wonder what \"NW\" stands for. Is it someone's initials? Does the shed belong to someone with the initials NW? North West? Is NW a company abbreviation? Does it unlock a certain door in one of the buildings on the island? You're not sure, but you pocket the key anyway and leave the lake, satisfied with having gotten something. You return to where the path branched off, hoping to find something else that can help you get off this island. It occurs to you to experiment with what the key can do, and you're not sure if you should seek out sheds, or just keep going along.\n\n*set shed_key \"found\"\n\n*goto branch", "transition": "\n*label start\n\n\n\nCongrats! You made it off of an island filled with dinosaurs and will return to a normal life...with some added PTSD and plenty of people not believing you. At least at first.\n\n*if (money = \"found\")\n  You also present information on the treasure found within the castle. You get to keep everything that you found, and when the government sends an expedition to recover the rest of it, you are given 10% of the profit they get from selling it to rich buyers. Congratulations, you ended up rich after all. The millions that you now have are enough for you to retire...if you want.\n  *goto evidence\n*else\n  You were unable to find the treasure. Play again to attempt to find it. \n  *goto evidence \n\n*label evidence\n\n*if (notes = \"found\")\n  You show evidence of the conspiracy to unleash dinosaurs upon civilian populations. International fallout ensues, and it becomes the biggest story in decades. Several countries get involved, political careers end and approval ratings of several politicians swing heavily. The dinosaur treaty ensures that animals will never be used in this way, and would be seen as a violation of both human and animal rights, and as an international war crime. \n  *goto final\n*else\n  You were unable to uncover the conspiracy on the island. Play again to attempt to uncover the unthinkable evil that lurked here.\n  *goto final\n\n*label final\n\nKeep in mind, there are four different ways to get off the island, with the one you found being only one, so feel free to play again in order to unlock the rest. \n\n*label finish\n\nAfter you complete part II, that is!!!\n\n*goto_scene 2_trip", "west": "*image beach.jpg\n\n*if (west = \"Unexplored\")\n  *goto west_unexplored\n*else\n  *goto west_explored\n\n*label west_unexplored\n\nYou approach the western portion of the island and notice that the trees end, quickly leading to a beach with a dock. You recognize that the dock is something ships might use to stop here, and you might be able to get the attention of one, on the off chance that one of them does so. You could just be able to get within sight of one of them. You start to approach the dock and after you take a few steps forward, you attempt to step forward with your left foot, you notice you are unable to lift it. Then, you attempt to step forward with your right foot, and can't move that either. This causes you to look down and you can no longer see your feet, as they appear to be buried. After a few more seconds of struggling, you can see that your ankles are now starting to sink in as well.\n\n\"Oh no!\" you think to yourself. \"Quicksand!\" You panic for a brief moment before you attempt to think of a way out. A few ideas come to your mind as you begin to feel yourself sinking.\n\n*temp sink 0\n\n*label quicksand\n\n*if sink = 5\n  You can't get out of the quicksand fast enough, and end up drowning.\n  *goto_scene death\n*elseif sink = 4\n  You are now up to your neck in quicksand. Hurry up and think of something!\n  *goto quicksand_2\n*elseif sink = 3\n  You are now up to your torso in quicksand. Hurry up and think of something!\n  *goto quicksand_2\n*elseif sink = 2\n  You are now up to your waist in quicksand. Hurry up and think of something!\n  *goto quicksand_2\n*elseif sink = 1\n  You are now up to your knees in quicksand. Hurry up and think of something!\n  *goto quicksand_2\n*else\n  You are now up to your ankles in quicksand. Hurry up and think of something!\n  *goto quicksand_2\n\n\n*label quicksand_2\n\n\nWhat do you do to try and escape without sinking further?\n\n*choice\n  #Scream and panic. Maybe someone will hear me.\n    You scream, yell and wave your arms. Nobody comes to help you and you sink deeper into the quicksand.\n    *set sink +1\n    *goto quicksand\n  #Struggle my way out. Sheer force can do it.\n    You attempt to fight your way out of the quicksand, but it does no good, and you realize you're sinking deeper into the quicksand.\n    *set sink +1\n    *goto quicksand\n  #Stay still. I can't panic.\n    You stay still. You are no longer sinking deeper, but are still stuck.\n    *goto quicksand\n  #Lie down to spread my weight around.\n    Despite being partially underground, you're able to spread yourself out enough to prevent sinking. You slowly pull yourself out of the quicksand, and within minutes are safe.\n    *set sink 0\n    *goto stat_up\n  *selectable_if (Survival > 2) #Use my knowledge of Quicksand to think of something.\n    You remind yourself its best to lie down while in quicksand to spread your weight around. Despite being partially underground, you're able to spread yourself out enough to prevent sinking. You slowly pull yourself out of the quicksand, and within minutes are safe.\n    *set sink 0\n    *goto stat_up\n\n*label stat_up\n\n*if (quicksand = \"Unexplored\")\n  You have earned a stat up for surviving the quicksand.\n  *set quicksand \"explored\"\n\n  *choice\n    *selectable_if (Athletics \u003c=4) #Athletics\n      *set Athletics +1\n      *goto beach\n    *selectable_if (Tool_Usage \u003c=4) #Tool_Usage\n      *set Tool_Usage +1\n      *goto beach\n    *selectable_if (First_Aid \u003c=4) #First_Aid\n      *set First_Aid +1\n      *goto beach\n    *selectable_if (Stealth \u003c=4) #Stealth\n      *set Stealth +1\n      *goto beach\n    *selectable_if (Survival \u003c=4) #Survival\n      *set Survival +1\n      *goto beach\n*else\n  goto beach\n\n*label west_explored\n\nYou return to the dock, and now know to avoid the quicksand.\n\n*goto beach\n\n*label beach\n\n*set west \"explored\"\n\nAs you leave the quicksand behind you, you begin to approach the dock and notice that there is indeed enough room for a ship to dock here. \"Yes!\" you say to yourself, \"This could work,\" however, you look out onto the horizon, and see that there's no ship in sight. You dip your hand into the water to find it to be freezing cold, and not something you'd want to swim in for long distances. Besides, even if the water around this island is completely normal, there are almost certainly all sorts of sharks around here, that would like nothing more than a free meal.  \n\nYou look around the entire area for more and notice that there is a small office-like area, similar to the one by the dock near where you first landed. Do you explore it?\n\n*label direction\n\n*choice \n  #Yes, there could be something useful.\n    You approach the office.\n    *goto office\n  #No, I would like to return to the center of the island.\n    You return to the center of the island\n    *goto_scene center\n\n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto direction\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Cave_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Cave_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Cave_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Cave_Heal\n          *else\n            *set Health + 5\n            *goto Cave_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto direction\n\n\n  *selectable_if (map = \"found\") #Look at the map.\n    You look at the map. You can see the north is restricted, presumably due to danger, but also presumably contains a motorboat which you could use to escape the island. The North East has a castle, while the East has a lighthouse, a greenhouse and a shed. The South East is labelled as the industrial area and has a factory, a lab and a storage area. The South as a church, a swamp and a town featuring houses, a bar, a general store, an arena and a town hall. The South West is packed with nature, as it contains a river and waterfall headed into a lake, hills and mountains, while the West has a beach which also acts as a dock for ships. The North West has a shed in the middle of grasslands.\n    *goto direction\n\n*label office\n\nYou head inside the office and look around.\n\n*if (Office_Flashlight = \"Taken\")\n  *goto flashlight\n*else\n  *goto no_flashlight\n\n*label flashlight\n\nDo you turn on your flashlight?\n\n*choice\n  #Yes\n    *goto look_around\n  #No\n    *goto no_flashlight\n\n*label look_around\n\nYou turn on the flashlight to see a paper written on the desk. You pick it up and read it. It's dated 2 years ago, and has \"classified\" written on it. It reads as follows\n\n\"Please do not judge us. We were only doing our job, at least at first, but then, things got worse than we ever thought possible. We had however hoped that all aircraft passing by would be safe.\"\n\nYou stop reading upon seeing that. \"Safe,\" you mutter to yourself \"Yeah, its two years later and you guys are still continuing to fail,\" You're not sure if you're really blaming the apparent researchers as a scapegoat, or just need the humour more than you realized, but you find your own joke several times funnier than it actually is, and even laugh out loud to it. You then continue reading.\n\n*page_break\n\n\"However, the dream our superiors was what we refer to as a nightmare. That's why we couldn't go through with it. We all agreed to give our lives to see it fail, and both John and Ellie have already done so, with the rest of us soon to follow. Conventional wisdom would state that this island has been taken over by the most powerful group of invasive species of all time. However, these invasive species could have done much more damage to their intended target: our enemies. \n\nI regret that we were unable to send a transmission over a long distance, but any punishment we would have faced for doing so would have been worse than death. We had but one mission, create the ultimate predator and have it multiply. We did so but intentionally pushed it farther than our superiors wanted. This mission, which was originally publicly stated as a military operation to liberate an island was never anything of the sort. Well, it was military. \n\nWe bred T-Rexes by acclimating them to their natural environment, to create an ultimate creature to attack our enemies. We knew that smaller creatures would easily be captured by our superiors, so we decided to give our own lives on this island, cloning, transporting and maintaining these creatures, so that they could devour our superiors. That way, when our superiors saw our work in the island's most dangerous part, the north, they would have to live with the same hell that they planned on giving to those who they deemed worthy of death. Not the enemies we fight on the battlefield, but the common folk in their nations' cities. We have deemed destroying entire countries unethical, and have thus shown those in charge how we felt first hand. Now, with our superiors dead, and no way out, we await our inevitable, identical fate.\"\n\nYou choke on your own anger and shock. Its like every bad movie twist at once. The military was planning on unleashing giant T-Rexes against civilians of opposing countries. You continue reading, only to find several scientific charts you don't understand, as well as a list of all high ranking military leaders responsible for this outrage. You bag the notes and head back to the center of the island.\n\n*set notes \"found\"\n*achieve conspiracy\n\n*goto_scene center\n\n*label no_flashlight\n\nYou look around, but with no windows, it's too dark to find anything. You return to the center of the island.\n\n*goto_scene center\n\n*label Cave_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Cave_Heal_2\n\n*label Cave_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto direction", "west_open": "*if (West_First_Island = \"Unexplored\")\n  As you walk through the trees, you can see the forest getting thinner and thinner. The trees themselves are still just as large, but there's less of them. You can eventually see the end of the forest, leading to a beach. It's a strange sight, but given what's happened today, you're willing to just let this go. When you finally reach the beach, you look around and notice a few things. Firstly, there is what appears to be a dock for ships to port at. However, it looks abandoned. It looks like you're not going to just be able to wait for a rescue and jump on board, but you can explore the general area to see if there's anything of use. You could also explore the office that's there. As you'd expect, the light is off, and you're sure that nobody else would be in there. There's a strange-looking rock that's very low in the middle, but it raises up on both sides. You wonder how you can get it back to where you want to build the bridge, as it would be very useful in providing something to keep the bridge in place. \n  *goto explore\n\n*else\n  You return to the beach, wondering if there's anything else for you to look into.\n  *goto explore\n\n*label explore\n\n*set West_First_Island \"explored\"\n\n*choice\n  *selectable_if (Rock = \"Untaken\") #I go get the rock. I need to make that bridge ASAP.\n    *goto move_rock\n  #I check out the dock. There could be something useful there.\n    *goto doc\n  #I check out the office. I might be able to call for help.\n    *goto office\n  #I return to the middle of the island, where I need to build the bridge.\n    You return to where you are going to build the bridge.\n    *goto_scene Mid_Open\n\n*label move_rock\n\n\n\n*if Athletics > 1\n  You are strong enough to move the rock on your own.\n  *set Rocks +1\n  *set Rock \"Taken\"\n  *goto explore\n*else\n  You are not strong enough to move the rock. Maybe you can find something that will help you move it.\n  *goto need_wedge\n\n*label need_wedge\n\nDo you have anything you can use to move it?\n*choice\n  *selectable_if (Wedge = \"Found\") #Move it using the wedge\n    You successfully are able to move the rock.\n    *set Rocks +1\n    *set Rock \"Taken\"\n    *goto explore\n  #No, I need to find something else.\n    You look around for something else\n    *goto explore\n  \n\n*label doc\n\n*if (doc = \"Unexplored\")\n\n  You approach the dock, looking for stuff you can use.\n  *set doc \"explored\"\n  *goto doc_choice\n\n*else\n\n  You return to the dock.\n  *goto doc_choice\n\n*label doc_choice\n\nWhat do you do while at the dock?\n*choice\n  *selectable_if (Wedge = \"missing\") #Pick up the wedge\n    You pick up a wedge that could be used to assist in moving a heavy object\n    *set Wedge \"Found\"\n    *goto doc\n  *disable_reuse #Look out at the ocean.\n    You look out, seeing no other island within your view. You also see no plane or ships or anything else that you would be able to signal out of. You truly are alone.\n    *goto doc\n  #Go back to the beach.\n    You return to the beach.\n    *goto explore\n\n\n*label office\n\n*if (office = \"Unexplored\")\n  As you approach the office, you knock, on the off chance that someone's there. However, it's not until afterwards that you notice the door is slightly open, as when you knock, the door goes slightly inside the office. When there's no response, you enter rather quickly, confident that there's nobody there. \"What a strange place,\" you say to yourself. \"I wonder what happened.\" You then look to see nobody in the office, with some notes scattered, a medkit and a flashlight.\n  *set Office \"explored\"\n  *goto inside_office\n\n*else\n  You return to the office.\n  *goto inside_office\n\n*label inside_office\n\nWhat do you do while inside the office?\n*choice\n  *selectable_if (Office_Medkit = \"missing\") #Pick up the medkit\n    You grab the medkit, noting its possible future use.\n    *set Office_Medkit \"Taken\"\n    *set Medkits +1\n    *goto inside_office\n  *selectable_if (Office_Flashlight = \"missing\") #Pick up the flashlight\n    You grab the flashlight, noting its possible future use.\n    *set Office_Flashlight \"Taken\"\n    *goto inside_office\n  *disable_reuse #Read the notes\n    You see that notes were taken almost daily until about 2 years ago. You also note that the final entry noted the island as being severely unsafe.\n    *goto inside_office\n  #Return to the beach\n    You return to the beach.\n    *goto explore", "casualties": "The city has reached over 100 casualties from the pterosaurs. You are the 101st. a pterosaur scoops you up, and you are killed.\n*goto_scene death", "center": "*label direction\n\nYou return to the center of the island.\n\nYou can see the north is the most dangerous place to go, but it may have something useful there.\n\nThe North East has a large building.\n\nThe East has three places you can go to.\n\nThe South East looks industrialized.\n\nThe South looks residential.\n\nThe South West is natural and elevated.\n\nThe West is a beach.\n\nThe North West has smoke coming from it. \n\n*choice\n  #North. The most dangerous places have the greatest rewards. Maybe you'll find a way off the island by just looking here.\n    *goto_scene North\n  #North East. That large building has to have something useful.\n    *goto_scene North_East\n  #East. Two structures should have something, and I might be able to navigate somewhat using the lighthouse.\n    *goto_scene East\n  #South East. There should be something useful in the industrial building.\n    *goto_scene South_East\n  #South. So many buildings means I'm most likely to find someone.\n    *goto_scene South\n  #South West. Higher elevation might be useful.\n    *goto_scene South_West\n  #West. I might be able to see help from a beach.\n    *goto_scene West\n  #North West. Time to investigate the smoke. \n    *goto_scene North_West\n  *selectable_if (Medkits > 0) #Heal myself using a medkit.\n    *if health = 25\n      You may have medkits, but are at full health. No need to heal.\n      *goto direction\n    *else\n      You currently have ${Health} health out of a maximum of 25. Healing will use up a medkit and due to your first aid skill, you can heal yourself for up to       ${First_Aid} health, as long as it doesn't take you above the maximum. Do you heal?\n      *choice\n        #Yes\n          *if First_Aid = 1\n            *set Health + 1\n            *goto Cave_Heal\n          *elseif First_Aid = 2\n            *set Health + 2\n            *goto Cave_Heal\n          *elseif First_Aid = 3\n            *set Health + 3\n            *goto Cave_Heal\n          *elseif First_Aid = 4\n            *set Health + 4\n            *goto Cave_Heal\n          *else\n            *set Health + 5\n            *goto Cave_Heal\n        #No\n          You choose not to heal, instead saving your medkit.\n          *goto direction\n\n\n  *selectable_if (map = \"found\") #Look at the map.\n    You look at the map. You can see the north is restricted, presumably due to danger, but also presumably contains a motorboat which you could use to escape the island. The North East has a castle, while the East has a lighthouse, a greenhouse and a shed. The South East is labelled as the industrial area and has a factory, a lab and a storage area. The South as a church, a swamp and a town featuring houses, a bar, a general store, an arena and a town hall. The South West is packed with nature, as it contains a river and waterfall headed into a lake, hills and mountains, while the West has a beach which also acts as a dock for ships. The North West has a shed in the middle of grasslands.\n    *goto direction\n\n*label Cave_Heal\n*set Medkits -1\n*if Health > 25\n  *set Health 25\n  *goto Cave_Heal_2\n\n*label Cave_Heal_2\n\nYou are now healed up to ${Health} health out of your maximum of 25.\n\n*goto direction", "challenger": "Part 3: Pterosaur Terror\n*set part_3 \"true\"\nOne day, a year after you escaped the island for the second time you're at work when ${friend_name}, ${partner_name} and an extremely attractive stranger barge in suddenly. What gender is the stranger?\n*choice\n  #Man\n    *set stranger_gender \"Male\"\n    *set stranger_they \"he\"\n    *set stranger_them \"him\"\n    *set stranger_their \"his\"\n    *set stranger_name \"Jaxon\"\n    *goto part_1\n  #Woman\n    *set stranger_gender \"Female\"\n    *set stranger_they \"she\"\n    *set stranger_them \"her\"\n    *set stranger_their \"her\"\n    *set stranger_name \"Lisa\"\n    *goto part_1\n  #Non-binary\n    *set stranger_gender \"non-binary\"\n    *set stranger_name \"Drew\"\n    *goto part_1\n\n*label part_1\n\n*if (status = \"married\")\n  \"Honey, its an emergency!\" ${partner_name} says. Despite the fact that since your marriage ${partner_name} has been acting excited about every little thing, somehow you know that this situation is much more urgent than anything they've brought to your attention before.\n  *goto plot\n*elseif (status = \"dating\")\n  \"Honey, its an emergency!\" ${partner_name} says. You know that ${partner_name} can get agitated easily, but you feel this isn't a little thing.\n  *goto plot\n\n*elseif (status = \"friends\")\n  \"${name}, its an emergency!\" ${partner_name} says. You've barely talked with them in the time since getting off the island, you trust that this is correct.\n  *goto plot\n\n*else\n  \"${name}, you know I wouldn't be here if it wasn't an emergency!\" ${partner_name} says. You know this to be true, as you haven't spoken since the breakup.\n  *goto plot\n\n*label plot\n\nYou're waiting for an explanation, and ${friend_name} finally speaks up. \"Pterosaurs have escaped the island.\"\n\n\"Okay,\" you say out loud. You knew this would happen eventually, those things can fly. However, they're several miles away from civilization. There's no way they'll make it to civilization.\n\n\"They've made it to civilization,\" ${friend_name} finishes, as if on cue. \"In fact, they're in this very city. The four of us are the ones tasked with taking them out.\"\n\n\"Holy crap,\" you say to yourself quietly, although you were still loud enough for the other three to hear you.\n\n\"I hunted down your closest contacts, and these two came up,\" says the attractive stranger. \n\n\"My name is ${stranger_name}. I have been very interested in following your story [i]very[/i] closely,\" ${stranger_they} lick ${stranger_their} lips when speaking, followed by a wink. How do you respond?\n*choice\n  *selectable_if (status = \"married\") #\"I'm married.\"\n    \"What I meant to say was I was following how you escaped from the dinosaurs. Right now, your city needs your help.\"\n    *set partner %+15\n    *set stranger %-10\n    *goto explain\n  *selectable_if (status = \"dating\") #\"I'm seeing someone.\"\n    \"What I meant to say was I was following how you escaped from the dinosaurs. Right now, your city needs your help.\"\n    *set partner %+15\n    *set stranger %-10\n    *goto explain\n  #\"Could you please take a step back, your tone is making me uncomfortable.\"\n    \"What I meant to say was I was following how you escaped from the dinosaurs. Right now, your city needs your help.\"\n    *set partner %+10\n    *set stranger %-5\n    *goto explain\n  #I say nothing and wait to see where they're going with this.\n    After a brief silence, ${stranger_name} continues to say \"Right now, the city needs your help. You're the one with the most relevant experience to the current situation.\"\n    *set partner %+5\n    *goto explain\n  #I hesitate before saying \"Ummm...Okay...\"\n    Without missing a beat, ${stranger_name} continues to say \"Right now, the city needs your help. You're the one with the most relevant experience to the current situation.\"\n    *set partner %+8\n    *set stranger %-2\n    *goto explain\n  #I say \"I'm interested in your story, too,\" before smiling back.\n    \"If you'd like it to be part of your reward, I can tell you after you've dealt with the problem,\" ${stranger_name} says maintaining ${stranger_their} flirty persona.\n    *set partner %-5\n    *set stranger %+15\n    *goto explain\n\n*label explain\n\n*if (stranger_gender = \"Male\")\n  He continues by saying,\n  *goto explain_2\n*elseif (stranger_gender = \"Female\")\n  She continues by saying,\n  *goto explain_2\n*else\n  They continue by saying,\n  *goto explain_2\n\n*label explain_2\n\"Listen, they're tearing apart the city. Now as I am in charge,\" ${stranger_name} says while pulling out a badge, \"You're coming with me. ${partner_name} and ${friend_name} are going on their own to help escort out civilians.\n*choice\n  *selectable_if (closeness > 2) #I look at ${partner_name} and say \"I love you.\"\n    \"I love you, too,\" ${partner_name} says, hugging you as you see ${them} looking over at ${stranger_name} with a threatening glare.\n    *set partner %+15\n    *set stranger %-5\n    *goto leave\n  #I say I'm looking forward to it.\n    You see ${partner_name} shoot a jealous glare in your direction before you leave.\n    *set partner %-5\n    *set stranger %+15\n    *goto leave    \n  #I nod in agreement and say \"Time to save some lives.\"\n    Everyone nods quickly before going off into their respective pairs.\n    *set partner %+5\n    *set stranger %+5\n    *goto leave   \n\n*label leave\n\nYou follow ${stranger_name} into ${stranger_their} car, as ${partner_name} and ${friend_name} head off separately. After you get into the car, ${stranger_name} begins to explain the situation to you. \"Okay, so here's what's going on. I've already explained this to ${partner_name} and ${friend_name}. The pterosaurs are sweeping people up and eating them. Anything over 100 casualties is unacceptable. The military will be here in an hour, and if they arrive, they will be able to overtake the creatures very easily. We're just here to hold them off. With a dozen pterosaurs, it won't be easy. You have a gun with two ammo, and apparently, there's more somewhere nearby. We could kill them all, or at least hold them off long enough for the military to intervene. Intelligence has discovered some kind of device on all of them, but we have no idea how it got there, or what it's for, but it might be the reason they're here. We don't know if there's a way to shut them down. Do you understand?\"\n*set ammo 2\n*label exposition\n\n*choice\n  *selectable_if (int = \"true\") #What do you mean by intelligence?\n    Listen, this is all the information I was given, okay? We have multiple reports, including eyewitness accounts\n    *set int \"false\"\n    *goto exposition\n  *selectable_if (gun = \"true\") #Can I shoot them down?\n    Yes. If you find more ammo, you should be able to shoot down more. I don't know if can shoot them all down, but any that you shoot down buys time and reduces casualties.\n    *set gun \"false\"\n    *goto exposition\n  *selectable_if (device = \"true\") #Do you know anything about these devices?\n    They're presumably electric and attached to the creatures heads. I've never seen anything like them before. I don't know anything else.\n    *set device \"false\"\n    *goto exposition\n  *selectable_if (hour = \"true\") #Tell me more about the time limit?\n    We have an hour, and each time we travel to a new location, it takes us a minute. We have to either fix the problem or keep casualties under 100 for the hour until the military gets here.\n    *set hour \"false\"\n    *goto exposition\n  #I understand everything. Thanks.\n    *goto next\n\n*label next\n\n*image pterodactyl.jpg\n\nYou get out of the car in the center of the city and look around. You look around for the dozen pterosaurs but can only see one flying directly above you. ${stranger_name} seems to detect your thoughts and says \"there's only one per area. The other eleven are all spread around here in different parts of the city.\" You have eight parts of the city you can go to, and you're on the clock now. \n\nYou look closely at the pterosaur, and can now see one of the devices that ${stranger_name} mentioned to you earlier on the creature's head. \"Is that the kind of device that you were talking about?\" you ask.\n\n\"Yes it is you little genius,\" replies ${stranger_name}, replying with ${stranger_their} seemingly usual tone that blurs the tone between friendly and flirtatious. \"I still don't know what they do, but its possible someone may be controlling them somehow.\" You don't know where that thought comes from, but you don't have the time to argue over little things. If something comes up, you'll pay attention to it. Otherwise, its about protecting people from the pterosaurs that are attacking the city.\n\n\n*label start_adventure\n\n*choice\n  *selectable_if (c_pterosaur = \"alive\") #Shoot the pterosaur\n    *if (ammo = \"0\") \n      You attempt to shoot the pterosaur, but don't have any ammo.\n      *goto start_adventure\n    *else\n      You take a shot at the pterosaur. You shoot right through its head and it falls right out of the sky.\n      *set pterosaurs -1\n      *set c_pterosaur \"dead\"\n      ${pterosaurs} pterosaurs remain.\n      *set ammo -1\n      *goto start_adventure\n  #Go North\n    *set military_time -1\n    *if (pterosaurs > 10)\n      *set casualties +3\n      *goto_scene 3_N\n    *elseif (pterosaurs > 5)\n      *set casualties +2\n      *goto_scene 3_N\n    *else\n      *set casualties +1\n      *goto_scene 3_N\n  #Go Northeast\n    *set military_time -1\n    *if (pterosaurs > 10)\n      *set casualties +3\n      *goto_scene 3_NE\n    *elseif (pterosaurs > 5)\n      *set casualties +2\n      *goto_scene 3_NE\n    *else\n      *set casualties +1\n      *goto_scene 3_NE\n  #Go East\n    *set military_time -1\n    *if (pterosaurs > 10)\n      *set casualties +3\n      *goto_scene 3_E\n    *elseif (pterosaurs > 5)\n      *set casualties +2\n      *goto_scene 3_E\n    *else\n      *set casualties +1\n      *goto_scene 3_E\n  #Go Southeast\n    *set military_time -1\n    *if (pterosaurs > 10)\n      *set casualties +3\n      *goto_scene 3_SE\n    *elseif (pterosaurs > 5)\n      *set casualties +2\n      *goto_scene 3_SE\n    *else\n      *set casualties +1\n      *goto_scene 3_SE\n  #Go South\n    *set military_time -1\n    *if (pterosaurs > 10)\n      *set casualties +3\n      *goto_scene 3_S\n    *elseif (pterosaurs > 5)\n      *set casualties +2\n      *goto_scene 3_S\n    *else\n      *set casualties +1\n      *goto_scene 3_S\n  #Go Southwest\n    *set military_time -1\n    *if (pterosaurs > 10)\n      *set casualties +3\n      *goto_scene 3_SW\n    *elseif (pterosaurs > 5)\n      *set casualties +2\n      *goto_scene 3_SW\n    *else\n      *set casualties +1\n      *goto_scene 3_SW\n  #Go West\n    *set military_time -1\n    *if (pterosaurs > 10)\n      *set casualties +3\n      *goto_scene 3_W\n    *elseif (pterosaurs > 5)\n      *set casualties +2\n      *goto_scene 3_W\n    *else\n      *set casualties +1\n      *goto_scene 3_W\n  #Go Northwest\n    *set military_time -1\n    *if (pterosaurs > 10)\n      *set casualties +3\n      *goto_scene 3_NW\n    *elseif (pterosaurs > 5)\n      *set casualties +2\n      *goto_scene 3_NW\n    *else\n      *set casualties +1\n      *goto_scene 3_NW", "choicescript_description": "[i]Dinosaur Island Escape (DIE)[/i] is a 84,000 word interactive puzzle based-open world novel written by Chris Viola, where you attempt to escape the deadliest place on Earth. Its entirely text based, and powered by the vast, unstoppable power of your imagination.\n\nExplore an uncharted island filled with prehistoric predators that see you as nothing more than a free meal. Solve mysteries, uncover secrets, and explore this open world in a unique way. The sandbox style of the game, combined with the chance to build your own statline and dozens of different items to find and invent gives you the chance to have a new experience every time you play. \n\n• Play as a male, female or non-binary; gay, straight, lesbian or bi.[n/]\n• Find multiple ways off the island, allowing for a different adventure each play through.[n/]\n• Be the center of a love triangle while your current partner and an attractive stranger fight over you.[n/]\n• Fight dinosaurs with a katana, run from them with your blazing speed, fight them in hand to hand combat, shoot them with a rifle or sneak by them with unmatched stealth.[n/]\n• Explore an abandoned city, a vast castle, a mountain range, and a vast beach. Survive jumping off a waterfall, sinking in quicksand and a facing a giant crocodile.[n/]\n• Save civilians in a race against the clock to stop pterosaurs from destroying your home town.[n/]\n\nWill you die a violent death, survive by the skin of your teeth, or uncover lost secrets and bring them back for the world to see?\n\n", "choicescript_stats": "Here are your stats. Keep track of everything here, and remember to plan out your character's build to optimize him or her to your play style.\n\nBasic information about your character can be seen here. These have no effect on the game's mechanics, but they do help you customize your character.\n*line_break\nYour name: ${name}\n*line_break\nYour gender: ${gender}\n*line_break\nPartner's name: ${partner_name}\n*line_break\n$
