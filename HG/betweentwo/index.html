to stop him.\n\nSebel: But he's far more powerful than Red and his cultists.\n\n${name}: We need to try; let's ask the other houses for help.\n\nYou go back to the village from earlier and manage to send letters to the other houses, and after a few days, a company of soldiers arrives to escort you to the palace.\n\nA second messenger arrives, informing you that King Phillip calls you to the capital, so you hitch a ride with each messenger.\n\nYou enter the castle into the main hall. Phillip asks if you know anything about the black dragon. Since you've been involved in the civil war to an extent and that word went around about your gathering of the artefacts, it's little surprise that the King wants your side of this new threat.\n\nKing Phillip: If you know anything about this beast, then speak.\n\nYou tell the King almost everything (leaving out that you are a half-breed), and his face goes pale. Once you're done, he consults his advisors.\n \nI've made my decision, and this dragon and its master threaten us all. You have the crown's support, and I'll arrange for troops right away. You thank the king, bow, and leave.\n\nIt's time to fight; the dragon is here, the crown sends soliders to help you.\n*choice\n #Fight without additional support.\n  *goto Brave\n\n *selectable_if (House_Lanslet = \"Ally\") #Fight with other houses except Joceus\n  *goto Final\n\n *selectable_if (House_Joceus = \"Ally\") #Fight with other houses except Lanslet\n  *goto Final\n\n*label Brave\n\nYou and Sebel try your best, with the soliders the crown sent you think you will win the day but sadly it was not the case, you are defeated.\n\n*goto death\n*label death\nYou have died.\n*goto wreck\n\n*label Final\n\nWith your allies by your side, the dragon flies low, burning all it sees. Fern stands still, watching happily (you think) as soliders charge at him.\n\n${name}: No, don't!!!!\n\nBut its too late. Fern simply raises his arm with his hand balled up into a fist before opening it, causing a huge wind to be released, knocking the soldiers back. The dragon lands and breathes its pueple fire, burning several soldiers and civilians before taking flight again.\n\n${name}: We need to bring it down, but how!?\n\nSuddenly, you hear a familiar voice.\n\nDelwyn: A drop of your blood will enable you to fight the dragon.\n\nYou look around and see soliders trying to shoot the dragon while others are trying to protect the people. You prick your finger and allow a drop to touch the pendant around your neck; its glow covers you completely and transforms you.\n\nSebel looks back to check on you and drops her daggers in shock.\n\n${name}: Um Sebel I think you've shrunk.\n\nYou look at what was your hand, and it's now a claw. You feel your wings and flap them.\n\nSebel: You're a dragon, ${name}.\n\nShes right you don't know for how long but its not just your body thats changed its your mind too you feel like you've been a dragon your whole life you take flight easily catching up to Ferns dragon and engage it in combat.\n\nFern: What!!!!\n\nYou and Ferns dragons fly around the battlefield, breathing fire at one another. Before you fly close enough and bite its tail, it roars. Pain turns around and tries to bite you, but you dodge and go for the neck. You start to lose the knowledge of a dragon, realising the spell is wearing off. You drag the dragon down, causing it to crash to the earth. Dust clouds make it impossible for anyone to see as they cover their eyes and cough.\n\nFern: No!!!\n\nAs the dust settles, you are back to normal but naked. Sebel chucks some amour your way, and you quickly put it one. The dragon tries to lift its head but can't; it breathes once more before slowly disintegrating until nothing remains. You don't notice Fern angerily walking towards you.\n\nFern: I'll kill you for that!!!\n\nFern lifts you in one hand, ready to end you; the pendant glows, causing a small jolt between your neck and his hand. He lets go.\n\nOthers, including Sebel, rush to help you defeat him, but they are knocked back by the same wind; some are killed while others are in great pain. Sebel lifts her head.\n\nSebel: Remember his weakness!!!\n\nYou do. Finding an iron sword near a fallen soldier, you pick it up. Just as Fern recovers from the setback earlier, he tries to grab you again, only to be met with iron in his intestines (or where they would be).\n\nTaking the sword out Fern falls to his knees and drops the ground.\n\n*choice\n #Burn Ferns Body.\n  *goto Pyre\n\n #Bury Ferns Body.\n  *goto Burial\n\n*label Pyre\n\nDespite his evil intentions, he did train you and was a worthy warrior, so you gather all the wood you can find and burn his body on a pyre.\n\nA few days after Ferns defeats the kingdom, it slowly recovers. You destory the pendant with a mix of fire and lighting, and everyone is happy just to be alive.\n\nYears later, Fern's old tower fades into memory. Rorick and Mary get married and live happily (oh, and Tim is there too). House Joceus and Lanslet do suffer politically for their part in the civil war, but maybe relationships can be repaired in time. Henry, despite his limits, still proves to be a good lord to his people.\n\nSebel spends her days helping others in need wherever she goes, and as for ${name}, who knows, maybe they are off on another adventure.\n\n*goto ending\n\n*label Burial\n\nDespite his evil intentions, he did train you and was a worthy warrior, so you dig a sizeable hole and drop his body in before filling it back up.\n\nA few days after Ferns defeats the kingdom, it slowly recovers. You destory the pendant with a mix of fire and lighting, and everyone is happy just to be alive.\n\nYears later, Fern's old tower fades into memory. Rorick and Mary get married and live happily (oh, and Tim is there too). House Joceus and Lanslet do suffer politically for their part in the civil war, but maybe relationships can be repaired in time. Henry, despite his limits, still proves to be a good lord to his people.\n\nSebel spends her days helping others in need wherever she goes, and as for ${name}, who knows, maybe they are off on another adventure.\n\n*goto ending\n\n*label Evil \n\nYou ponder Fern's words.\n\n${name}: You're right, Father, we can do this.\n\nYou walk over and stand next to Fern. Sebel is in shock.\n\nSebel: You can't be serious!!!\n\nYou look at Sebel with a smile on your face.\n\n${name}: Aren't you sick of war? of injustice? where a peasent is ruled by a king based on circumstances of birth? we really can end all of that and create a new world.\n\nSebel: But this isn't the way to change things please don't do this.\n\n${name}: If you won't join us then you're against us.\n\nSebel prepares herself to fight.\n\nYou simply smile at her; your iris glows orange, and she is blown back. The force is so strong that she is launched through the wall and flies out of the tower, landing on the ground, her body motionless.\n\nFern: It is time; our dragon will burn and destroy all in his path.\n\nBut everything has a weakness.\n\nFern: True, but he can only be bested by another dragon, and I haven't seen one for years.\n\nWithin days, the sky darkens and fire rains down. The dragon burns all it sees, and with Fern by your side, after a few months, you eliminate your enemies and rule Acai as supreme lord.\n\n*label ending\n*goto_scene ending\n\n\n\n\n\n", "chapter_three": "Fern appears out of the woods, startling you.\n\nFern: Your magical powers have awoken.\n\nYou stand up and face Fern.\n\n${name}: I have questions for you that I would like a straight answer to, please.\n\nFern: Of course, ask away.\n\nYou point at the fire.\n\n${name}: What the hell was that? Did you do that?\n\nFern: The simple answer is magic, and no, I did not; you did.\n\nYou stare at the fire, then back at Fern in shock.\n\n${name}: No, thats not possible.\n\nFern: But it is ${name} you're half Sihde after all, so you and your kind do possess some of our abilities.\n\nRegaining your composure, you ask another question.\n\n${name}: Why did you give me away?\n\nYou can't tell how Fern is feeling because his helmet is covering his face.\n\nFern: It was not my choice; it is the law that half-breeds cannot live among the Sidhe.\n\n${name}: Then, how can we control our magic?\n\nFern: Notice I said ''live amoung'' The law says nothing about training our youth so they can safely use their magic; however, we must be careful.\n\n${name}: Yeah, not everyone is accepting of an acient race of faires.\n\nFern: They can be ignored until the time to flee comes; however, I speak of the hooded people.\n\nHearing the word hooded brings you back to that night when you were attacked by them and they tried to capture the beast.\n\n${name}: Who are they? I thought I was going to die.\n\nFern: You know now that the sholf is there to protect you, not harm you. They tied you to that tree to lure it out and dispose of it, but they underestimated the strength of the creatures.\nThey were after you, unaware of the beast, but plans change, I suppose.\n\n${name}: After me? So we will need to avoid them, but that still does not explain who they are.\n\nFern replies in a seemingly emotionless tone.\n\nFern: Religious fanatics? crazy cult members? Who they are is of little importance; to begin your training, travel to the dead lands and find a Sidhe artefact. This is what it looks like.\n\nHe hands you a parcel with a drawing of the artefact that looks like a ball but is described as being made of gold and crystal, which are perfectly split on each half.\n\n${name}: The dead lands? Are you serious? It's called that for a reason; it's nothing but swamps, dead trees and plants, and tar pits.\n\nFern: True, but it is vital that you retrieve it. Take these.\n\nHe hands you two small silver crystals.\n\nFern: Once you find the artefact, step on it, and you will be transported to my tower to continue your training; it's located in House Kov territory.\n\nYou nod in response.\n\n${name}: I only need one, though.\n\nFern shakes his head and says,No.\n\nFern: I have a feeling you'll have help.\n\nYou hear rustling nearby, then two hands on your shoulders.\n\nSebel: Boo\n\nYou jump away while Sebel laughs; you are surprised and happy to see her. You rush to hug her, and she hugs you back.\n\n${name}: What are you doing here? I thought you had left.\n\nSebel: The boat was attacked by pirates. I swam to shore; thankfully, we weren't that far from it, and that's when I ran into Fern here, who told me everything.\n\nYou turn to face Fern.\n\n${name}: Everything?\n\nFern: She already knew you were a half-breed, so it seemed appropriate.\n\nSebel: To the dead lands, then?\n\nYou turn back to Sebel.\n\n${name}: To the dead lands.\n\nFern: Good luck.\n\nBefore you begin your journey, you look back at the tower, which is tall and surrounded by a small, clear crystal wall.\n\nYou travel on foot for days, using up the last of your food and water. What's worse is that you're still a long way away from the dead lands, so you decide to stop in a green, lush field split in half by a dirt path to think about what to do next.\n\nSebel: The dead lands are still several days walk away; we'll be exhausted by the time we get there.\n\nMaybe we will get lucky and find a horse or two.\n\nSebel: Well, we can't afford one, and stealing it would also cost us more coin than we have.\n\nYou see a young woman walking down the dirt path. You and Sebel walk over to her to ask if any stables are nearby, but sadly, she says no but offers to take you both back to her house for a meal and a place to stay for the night. With the sunset, it's a good idea, so you accept.\n\nHer cottage isn't big, but it feels cosy. The living room is tiny, with only two chairs facing a fireplace. She tells you to sit and rest, which you both do, as it would be rude to refuse.\n\nThe young woman comes back with ale and lentil soup, which you both gladly accept. You notice she has a weird tatoo of a cat fighting a bird, but then everything goes black as you both pass out.\n\nWoman: Wake up.\n\nYou awaken tied to the chair, but instead of rope, it seems like the arm rests have grown extra large and are holding you down with their newly acquired hands. Sebel is in the same position but still unconcerned.\n\n${name}: This is magic; I can feel it, but I thought...\n\nThe woman cuts you off.\n\nYoung Woman: It is rare for humans to be born with magic, but it is possible. I have studied for years, hoping to capture the half-breed.\n\n${name}: Why do you want me? My parents died because of your cult.\n\nWoman: They were in the way; we desire only the magical realm of the Sidhe, and you will lead us to it or suffer.\n\nYour blood boils at the complete disregard of your parents sacrifice. The fire behind the woman begins to grow and spark before exploding in violent fury, burning her instantly.\n\nWith the woman dead, the enchantment breaks, and the chair's arms return to being normal again. Sebel wakes up shortly after and is shocked and confused.\n\nSebel: Where is the woman, and why is it so hot in here?\n\n${name}: Fern was right; my magic is unstable.\n\nYou explain the fire engulfing the woman after you get angry.\n\nSebe: Damn, that's wild.\n\nYou both exit the cottage to a scene of horror. Pools of blood and bodies grace your eyes, and you manage to catch a glimpse of the wolf before it vanishes into the woods.\n\nSebel: Oh my gosh, that sholf of yours is a mighty beast.\n\n${name}: Ummmm, yep.\n\nYou notice the robes they wore; these were cult members who were coming to capture you. You decide it's best to move on, and luckily, after only a couple hours of walking, you find a stable. You ask the horse master how much the cheapest horse is, but his answer is still beyond your reach.\n\nHowever, you strike a deal with him. By helping him around the stable for a week, he'll give you the horse, so after a long week of gruelling work, he thanks you for your efforts and gives you the horse along with a saddle and briddle.\n\nWith the horse, you get to the dead lands a lot faster than you would by walking, but once you see the dead lands, you understand why they're named that way, as nothing seems alive, not even the trees, which are black and leafless. To make things worse, the horse refuses to go further, so you have no choice but to continue on foot.\n\nYou and Sebel walk through a muddy swamp and try carefully to avoid large throne bushes before you stop her.\n\nSebel: What is it? a wild animal?\n\nYou get the feeling that no animal would make the dead land their home.\n\n${name}: No, it's... I sense something magical.\n\nSebel: Hopefully it's what Fern wants; this place gives me the creeps.\n\nYou keep walking forward, and you feel as though you're going the right way. As the feeling of magic gets stronger with each step, within an hour of walking and avoiding tar pits, you see the artefact tangled within the thorns surrounding a tree.\n\nSebel: Finally.\n\nSebel runs to untangle it, but just as she's about to reach out, one of the thorn branches comes alive and wraps around her, making it almost impossible for her to move. She struggles, but it's in vain.\n\n*choice\n #Rush in to help her with your sword.\n  *set Combat + 5\n  *goto Sword\n *selectable_if (Archery >= 30) #Fire an arrow\n  *set Archery + 5\n  *goto Arch\n #Use Magic\n  *set Magic + 5 \n  *goto Magic\n\n*label Sword\n\nYou draw your sword and run towards the tree holding Sebel with its wavy thorn branches. Slashing and hacking at it only seems to anger the tree. With another branch, it swats you away, and you land on the ground with a heavy thud sword still in your hand.\n\nSebel bites a tiny chunck out of the branch; it loosens its grip on Sebel enough for her to grab one of her daggers and continuously stab the branch.\n*goto Fight\n\n*label Arch\n\nYou grip your bow and fire an arrow at the tree; it strikes the centre, the branches react, and Sebel is set free.\n*goto Fight\n\n*label Magic\n\nEven though you haven't been properly trained, you feel you need to try, so you concentrate on the tree. You feel a headache coming and sweat pouring down your face, but despite your efforts, only a tiny flame appears but is quickly snubbed out.\n*goto Fight\n\n*label Fight\n\nSebel avoids two on the branches and runs up the third that tries to strike her. She jumps off the branch and strikes the tree with her dagger. Using this distraction, you manage to grab the artefact, and once you have it in your hands, the tree returns to being a normal tree.\n\nSebel pulls her dagger out and jumps down from the tree. She then runs to you and marvels at the artefact. She looks a little roughed up, with several tiny cuts along her arms, and her armour has a few holes, one of which nearly exposes her cleavage.\n\nIt must have put an enchantment on that tree to defend itself.\n\nSebel: Wow, if that's true, it must have incredible power.\n\n${name}: Yes, it must do.\n\nYou notice the hole nearly exposing her chest and stare at it. Sebel snaps her fingers and points to her face.\n\nSebel: Oi, eyes up here.\n\nYou apologise and hand Sebel one of the tiny crystals, and you both step on it. In an instant, you are back at Fern's tower.\n\nFern: I can sense you have the artefact.\n\nYou hear his voice from behind you. You both truncate around and hand Fern the artefact.\n\nHe walks past you to a small gold pillar with a flat top, which he places on it.\n\n${name}: That artefact almost got us killed.\n\nSebel: Yeah, just look at the holes in my armour; you think it was into me or something.\n\n${name}: You're more concerned about your wounds than your wounds?\n\nSebel: It's a minor annoyance, and unlike these cuts, my amour won't heal itself.\n\nFern was very pleased you succeeded, perhaps too pleased, as if he had something in mind, but you brush those thoughts aside.\n\nFern: This was a test, and you passed. Now we can begin your training.\n\nTime seems to pass differently in the tower; what feels like years has only been months, and after nearly 10 months of training, which included reading books on magic and Sidhe history and law, you feel a lot more confident in your abilities.\nFern also gives you some light-plated amour for your torso.\n\n*set Magic +30\n\nOne day, you and Fern are in the tower's courtyard, with Fern behind you. At the other end of the courtyard are four straw dummies. Sebel is sitting on top of the wall, watching intently.\n\nFern: You've studied hard and done well thus far, but now comes a challenge: one dummy you can take out, but today I want you to take out all four at once.\n\nYou look at Fern and give him a nod before facing the dummies. Like back at the cottage, you struggle to keep your focus on the dummies. Once again, sweat pours down your face, but you see one of the dummies erupt into flames that engulf the rest.\n\nFern: Very good.\n\nYou sit on the floor, panting heavily.\n\n${name}: That was hard.\n\nFern: It will get easier with time, and with time, you'll be able to do more than just conjure fire.\n\nSebel claps loudly. You look at her and smile.\n\nSebel: I'm so proud of you, ${name}. Keep it up.\n\nFern stares at her, then back at you.\n\nFern: You like her that much; it is clear.\n\n${name}: You're mistaken.\n\nFern: Hmmm, perhaps I am, but is it not important to find out?\n\nYou turn to face your head towards Fern.\n\nFern: I suggest taking advantage of the opportunity before your next mission.\n\n${name}: Next mission?\n\nFern: I'll explain in the mourning.\n\nWith that statement, Fern enters the tower.\n\nYou consider Fern's words even though they were confusing and look up to Sebel, who is now climbing down the wall.\n\n*fake_choice\n #Talk to Sebel\n  *if (Sebel >= 50)\n   *goto Talk\n  *else\n   *goto Rejected\n #Walk back into the tower.\n   *goto Next\n\n*label Rejected\nSebel has climbed down and is now walking towards you. You stopped her.\n\n${name}: Hey Sebel, I wanted to ask you something.\n\nSebel: Oh, what's up?\n\nSuddenly, you struggle to find the words to speak. and when you do, it doesn't come out the way you want.\n\n${name}: I...That is to say, um.\n\nSebel: Whatever it is, you can tell me.\n\n${name}: I was wondering if you wanted to do something sometime.\n\nSebel: Oh, um, don't get me wrong. I do like you, but not that way.\n\nSebel walks past you, leaving you embarrassed.\n\n*goto Next\n\n*label Talk\n\nSebel has climbed down and is now walking towards you. You stopped her.\n\n${name}: Hey Sebel, I wanted to ask you something.\n\nSebel: Oh, what's up?\n\nSuddenly, you struggle to find the words to speak. and when you do, it doesn't come out the way you want.\n\n${name}: I...That is to say, um.\n\nSebel: Whatever it is, you can tell me.\n\n${name}: Right, yes... I mean, of course, I was wondering if you wanted to do something sometime.\n\nSebel tries not to smile. She then places her hand on your shoulder.\n\nSebel: I would love to.\n\nSebel walks past you back into the tower, and you can't help but smile.\n*goto Next\n\n*label Next\n\nIn the mourning, Fern explains that there are more artefacts to find and bring to him.\n\nSebel: So where to next, oh wise and old fairy?\n\nFern: Please take this seriously.\n\n${name}: Where to next?\n\nFern: You must go to the tomb of the grandfather of the king; the area is now controlled by House Lanslet.\n\n*image Acai.jpg\n\nFern is using the artifact you recovered earlier, and the power of the tower projects a rough map of the current state of the country.\n\n${name}: That's not good; this war is getting out of hand.\n\nFern: The war is of no importance.\n\nSebel looks at Fern with disgust and speaks up.\n\nSebel: How can you say that?! innocent people are dying and are having their lives ruined.\n\nFern turns to face Sebel with the same emotionless tone.\n\nFern: It is not your concern.\n\nSebel once again is digusted and now angry, but you manage to hold her back.\n\n${name}: This can wait, and if we come across anyone who needs help, we will do what we can.\n\nSebel: Yeah, that sounds good.\n\nFern directs you both to a stone circle in the centre of the room, with the nine pillars surrounding it and the previous artefact still on one of them.\n\nYou both step into the circle and are transported just outside Kov lands, directly into caputred Joceus territory.\n\nSebel: Okay, so where do we even look?\n\n${name}: Ummmm, thats a good question.\n\nYou walk for several hours before stopping at a small village now controlled by Jocues soliders. The villiages don't seem to care as long as their lives are not too disturbed.\n\n${name}: Ugh I'm exhausted.\n\nSebel: You and me both, but we have no money.\n\nA small child overhears your conversation and tells you that you should go to the inn, as the innkeeper is a kind and generous old man. You thank the child and head to the inn.\n\nEntering the inn draws some attention from the locals, but they quickly return to their activities. You find and talk to the innkeeper about a meal and a room for the night.\n\nInnkeeper: You both look hungry and tired; I'll tell you what both the room and meal are on me.\n\nYou both thank the innkeeper; it seems the child was right about him being generous. You dig into the food and find your room, but it seems like the innkeeper thought you were a couple as there is only one bed.\n\n*choice\n #Sleep on the floor.\n  *set Sebel - 5\n  *goto Floor\n #Ask if Sebel would like to join you.\n  *set Sebel + 5\n  *goto Bed2\n\n*label Bed2\nShe joins you in the bed.\n\n*choice\n *selectable_if (Sebel >= 60) #Propose Sebel for some fun.\n  *set Sebel + 10\n  *goto Fun\n     \n #Talk to her.\n  *set Sebel + 5\n  *goto Sleep\n\n*label Floor\n\nYou offer to sleep on the floor. Sebel looks at you with disappointment but agrees to take the bed.\n\n*choice\n *selectable_if (Sebel >= 60) #Propose Sebel for some fun.\n  *set Sebel + 10\n  *goto Fun\n     \n #Talk to her.\n  *set Sebel + 5\n  *goto Sleep\n\n*label Fun\n \n${name}: Hey Sebel, Are you awake?\n\nSebel lies on her back, her eyes staring up at the ceiling.\n\nSebel: Yeah, I am; I have too much energy.\n\nYou sit up and look in her direction.\n\n${name}: Well, you know we can help each other with that.\n\nGetting the hint Sebel teases you.\n\nSebel: Oh, really? Hmm, I wonder what your ideas are.\n\n${name}: Let me show you.\n\nMoving towards her, you gently move her legs apart and push her towards you. She giggles in response. Your lips meet, and you make out with her while you rub your hands all over each other.\n\nMeanwhile, downstairs, two men robbed men with hoods covering their faces. Ask the innkeeper where the women are clearly referring to Sebel and yourself.\n\nInnkeeper: I'm sorry, gentleman, but it wouldn't be right.\n\nThey draw swords from their clocks and demand to know.\n\nBack in your room, Sebel is now on top of you, about to remove her leather shirt, but you both hear shouting downstairs and the clash of swords heading downstairs to see several locals fall to the clocked men. Guards rush in, and after a struggle, they manage to defeat and arrest them. You realise it's not safe here, so you pack your things, thank the innkeeper, and leave.\n\n*goto Leave\n\n*label Sleep\n\n${name}: Hey Sebel, Are you awake?\n\nSebel lies on her back, her eyes staring up at the ceiling.\n\nSebel: Yeah, I am; I have too much energy.\n\nYou sit up and look in her direction.\n\n${name}: Wanna chat then? be a way to pass the time.\n\nSebel: Sure, why not?\n\nMeanwhile, downstairs, two men robbed men with hoods covering their faces. Ask the innkeeper where the women are clearly referring to Sebel and yourself.\n\nInnkeeper: I'm sorry, gentleman, but it wouldn't be right.\n\nThey draw swords from their clocks and demand to know.\n\nBack upstairs, you and Sebel are laughing while in mid-conversation.\n\nSebel: So then he runs away, bare-assed and all.\n\nYou both hear shouting downstairs and the clash of swords heading downstairs to see several locals fall to the clocked men. Guards rush in, and after a struggle, they manage to defeat and arrest them. You realise it's not safe here, so you pack your things, thank the innkeeper, and leave.\n\n*goto Leave\n\n*label Leave", "chapter_two": "Morning comes with the sun, and your brother Glenty kicks you awake.\n\nBrother, come one sleepy head; we're going.\n\nYou rise from your blanket and roll it up.\n\n${name}: Where are we going?\n\nBrother: I don't know, but we can't stay here; it's too dangerous with that thing lurking around.\n\nYour mind goes back to last night—the glowing yellow eyes, the razor-sharp teeth, and, of course, being tied to a tree with certain death being inevitable.\n\n${name}: Yes, of course; do you know anything about it? It was like a large wolf, but at the same time, it was like an entirely different creature.\n\nYour brother shakes his head no but states he thinks he knows who can help. He mentions they live in the woodland and mentions a tower made of crystal, which sounds silly to you.\n\nWith no horse, you've got no choice but to walk, and the nearest settlement is a few days away. Bandits spot and surround you, drawing their swords.\n\nBandit: Give us all your money or else.\n\n*choice\n #Give them all your money.\n  *set Combat + 5\n  *set Archery +5\n  *goto Give\n #Refuse\n  *set Combat + 5\n  *goto Refuse\n\n*label Give \n\nYou hand over all the coins you and your brother have; he looks at you but doesn't say anything.\n\nBandit: Smart, but this isn't enough for us not to shed blood.\n\nThe bandits rush you; you and your brother draw your swords and prepare for the fight.\n\nEverything is happening all at once; it's hard to keep track. The clash of swords and the sounds of grunts and groans are almost deafening, but even so, you manage to shoot an arrow or two that strikes its target.\nBy the end, all but a handful of bandits are running away while the rest lie dead at your feet. You have a few cuts, but nothing serious. However, your brother looks in a bad way, his face turning pale while clutching his side.\n\n${name}: You're wounded.\n\nHe looks at you with a painful look.\n\nBrother: Thanks for the obvious.\n\nYou carry on walking while having your brother's arm across your shoulder. Blood trickles down his side, and he's turning pale, but he is still alive.\n\nA company of smugglers who have waggons of cargo notice you and your brother. You think to yourself, \"Just great.\" As you think, they attack you and finish you both off, but to your surprise, they offer to help you both.\n\nYou travel with the smugglers; they make camp just on the border of Lord Joceus.\n\nYour brother is taken to a small tent to have his wounds treated, and as you sit by the fire, a young woman sits next to you. She is wearing brown leather armour with shoulder pads made of bear fur. Her long, flowing black hair is surprisingly well groomed and clean, despite her being a smuggler.\n\nHer most noticeable feature, however, is the eye patch on her right eye. She notices you looking.\n\nSebel: My name is Sebel, and I lost this eye many years ago.\n\n${name}: How though?\n\nShe turns to you, stating she does not want to talk about it, so you drop it.\n\nSebel: Why do you have different-coloured eyes?\n\nUnfortunately, I have no answers for you; I am still trying to find it out myself.\n\nSebel nods and drops the issue.\n\nShe begins sharpening her daggers. You state your concern about fire, but she ignores you.\n\nThe night passes quickly and your brother walks slowly out of the tent with bandages around his side, but the peace does not last long as armed men come out of the trees in every direction, and it turns into a full-on battle. You fight to defend your brother but are knocked out by a strong punch.\n\nLate morning turns to early afternoon. You awake to see bodies lying lifeless on both sides; the cargo and waggons were seemily burned from fire. You looked around for anyone still alive but found no one. You dripped over the lifeless and bloody body of your brother.\n\nEmotion overweighs you; tears pour down your face as you hold your brother in your arms and hug his body. You lose yourself in the moment, not noticing the soft hand on your shoulder.\n\nSebel: I'm sorry, ${name}.\n\nWhile still holding your brother tight, you explain.\n\n${name}: My parents are gone; he was all I had left, and now I'm all alone.\n\nSebel manages to find a shovel that's slightly damaged, but it'll do the job.\n\nYou wrap your brother in one of the tents, and you and Sebel, as gently as possible, place him in the makeshift grave and cover it with the same dirt used to dig it. You find a plank of wood on the ground and stick it in the ground as deep as you can. Sebel helps by hammering it deeper with the shovel, but it breaks once done.\n\nYou say your final goodbyes and walk away sobbing, with Sebel trying her best to comfort you.\n\nAs you are walking away from the scene, you hear a groan of pain. It's one of the men who attacked the camp. He begs you for help, explaining that he has a family and they will starve without the money he sends.\n\n*choice\n #Kill Him\n  *set Evil +10\n  *set Good -10\n  *goto Next\n #Treat his wounds\n  *set Good +10\n  *set Evil -10\n  *goto Next\n\n*label Refuse\n\nYou tell the bandits they won't get a single coin. He looks at you but doesn't say anything.\n\nBandit: That is such a shame, boys. Let's make them hand their coins over.\n\nThe bandits rush you; you and your brother draw your swords and prepare for the fight.\n\nEverything is happening all at once; it's hard to keep track. The clash of swords and the sounds of grunts and groans are almost deafening, but even so, you manage to shoot an arrow, but it misses.\nBy the end, all but a handful of bandits are running away while the rest lie dead at your feet. You have a few cuts, but nothing serious. However, your brother looks in a bad way, his face turning pale while clutching his side.\n\n${name}: You're wounded.\n\nHe looks at you with a painful look.\n\nBrother: Thanks for the obvious.\n\nYou carry on walking while having your brother's arm across your shoulder. Blood trickles down his side, and he's turning pale, but he is still alive.\n\nA company of smugglers who have waggons of cargo notice you and your brother. You think to yourself, \"Just great.\" As you think, they attack you and finish you both off, but to your surprise, they offer to help you both.\n\nYou travel with the smugglers; they make camp just on the border of Lord Joceus.\n\nYour brother is taken to a small tent to have his wounds treated, and as you sit by the fire, a young woman sits next to you. She is wearing brown leather armour with shoulder pads made of bear fur. Her long, flowing black hair is surprisingly well groomed and clean, despite her being a smuggler.\n\nHer most noticeable feature, however, is the eye patch on her right eye. She notices you looking.\n\nSebel: My name is Sebel, and I lost this eye many years ago.\n\n${name}: How though?\n\nShe turns to you, stating she does not want to talk about it, so you drop it.\n\nSebel: Why do you have different-coloured eyes?\n\nUnfortunately, I have no answers for you; I am still trying to find it out myself.\n\nSebel nods and drops the issue.\n\nShe begins sharpening her daggers. You state your concern about fire, but she ignores you.\n\nThe night passes quickly and your brother walks slowly out of the tent with bandages around his side, but the peace does not last long as armed men come out of the trees in every direction, and it turns into a full-on battle. You fight to defend your brother but are knocked out by a strong punch.\n\nLate morning turns to early afternoon. You awake to see bodies lying lifeless on both sides; the cargo and waggons were seemily burned from fire. You looked around for anyone still alive but found no one. You dripped over the lifeless and bloody body of your brother.\n\nEmotion overweighs you; tears pour down your face as you hold your brother in your arms and hug his body. You lose yourself in the moment, not noticing the soft hand on your shoulder.\n\nSebel: I'm sorry, ${name}.\n\nWhile still holding your brother tight, you explain.\n\n${name}: My parents are gone; he was all I had left, and now I'm all alone.\n\nSebel manages to find a shovel that's slightly damaged, but it'll do the job.\n\nYou wrap your brother in one of the tents, and you and Sebel, as gently as possible, place him in the makeshift grave and cover it with the same dirt used to dig it. You find a plank of wood on the ground and stick it in the ground as deep as you can. Sebel helps by hammering it deeper with the shovel, but it breaks once done.\n\nYou say your final goodbyes and walk away sobbing, with Sebel trying her best to comfort you.\n\nAs you are walking away from the scene, you hear a groan of pain. It's one of the men who attacked the camp. He begs you for help, explaining that he has a family and they will starve without the money he sends.\n\n*choice\n #Kill Him\n  *set Evil +10\n  *set Good -10\n  *goto Next\n #Treat his wounds\n  *set Good +10\n  *set Evil -10\n  *goto Next\n\n*label Next\nIt takes hours to find the nearest settlement, but you finally find a place to rest. You purchase a room at the inn with the rest of your money, lock the door, and lie on the bed trying to sleep, but every time you close your eyes, your mind goes back to your brother lying lifeless, his grave, and the solider attack.\n\nRising from the bed, panting heavily and sweating a little, you place your head in your hands and curse your life. Just then, you hear ''can't sleep'' which makes you jump, but Sebel is leaning on the chest drawers, arms folded.\n\n${name}: But I locked that door; how did you get in?\n\nSebel: I'm good at lockpicking.\n\nYou rise out of bed, slightly irritated.\n\n${name}: What do you want!?\n\nSebel tosses a creast of House Joceus towards you; it hits your chest before dropping to the floor. You pick it up and examine it.\n\n${name}: This is of House Joceus; how did you get this?\n\nSebel: Those kids in armour wore it, and I thought it might be worth something—that is, until I realised what it was.\n\nCan I ask why you and the other smugglers decided to help me and my brother?\n\nSebel turns away from you.\n\nSebel: A rare moment of kindness that cost me everything, but then again, you also lost everything.\n\nYou lower your head, fighting back the tears.\n\nSebel turns back to you and asks if you want her to leave.\n\n*choice\n #No, please stay.\n  *goto Stay\n\n #If you don't mind\n  *goto Leave\n\n\n*label Stay\n*Set Sebel +5\nYou compose yourself and wipe away the tears.\n\n${name}: No, please stay here with me.\n\nSebel shyly smiles.\n\nSebel: Sure.\n\nSurprisingly The bed has just enough room for two people. As long as you move all the way to the wall, which luckily the bed is placed against, you talk for a little while and end up falling asleep.\n\n*goto Info\n\n*label Leave\nWiping away the tears, you kindly ask her to leave.\n\nSebel: No worries.\n\n*goto Info\n\n*label info\n \nLeaving the settlement and walking for a few hours down the road, you reach the border between the two houses, a simple stream that Sebel giggles at.\n\nYou cross the stream and set camp in the woods as the sun sets.\n\nSebel has set up her tent, but she notices you struggling; every time you try to pitch the tent, it falls.\n\nSebel: Would you like some help?\n\n${name}: Yes, please; I have no idea what I'm doing.\n\nSebel helps you set up your tent and shows you how to do it yourself in the future.\n\nNight falls, and you're both relaxing by the fire. After a while of silence, Sebel breaks it.\n\nSebel: So, where are we going? We can't just wonder around for the rest of our lives.\n\nYou recall your brother mentioning he knew someone who might help regarding the creature that attacked you.\n\n${name}: I need to tell you something.\n\nYou tell Sebel of what your brother said, of the night your parents died, of the beast you encountered, and of the masked men who sought to capture it.\n\nSebel listens intently and appears shocked at your description of the creature.\n\nSebel: That sounds impossible, but I have heard of stories of magical beasts, stories of gold humanoid beings with towers made of clear crystal, and that they sometimes fell in love with humans or elves and had children.\n\nShe loses herself in thought but quickly comes back to reality.\n\nSebel: But it's all stories and fantasy.\n\nShe gets up, wishes you goodnight, and heads to her tent.\n\nYou stare straight at the fire and hear a growl behind you. Getting up and turning around, you see it once again, but why is it here? Is it following you?\n\nDrawing your sword, you point it at the creature and demand that it stop following you.\n\nThe creature lunges towards you and stops, leaving a sizeable gap. Your body tenses up, but then you hear a soothing voice coming from the woodland around you.\n\n*if Daughter = \"true\" \n \"Daughter, be not afraid.\"\n\n*if Son = \"true\" \n \"Son, be not afraid.\"\n\nYou drop your sword in shock and fear, managing to blurt out who's there.\n\nAt that moment, a humanoid figure wearing what appears to be gold armour steps out of the woodland and introduces himself as Fern.\n\nFern: My child, be not afraid; this sholf won't hurt you; in fact, it will do the opposite; its purpose is to protect you.\n\nYou pick your sword up, asking what in the world a sholf is. Fern doesn't help much because he just points to the beast next to him and states, \"This is.\"\n\nAnnoyed by the answer, you demand to know who Fern is.\n\nFern: I can understand your confusion, but please let me explain. Your eyes are different colours, correct?\n\n${name}: Yes, but I don't see what that has to do with...\n\nYou stop yourself and remember what Sebel told you before she retired for the evening.\n\n${name}: Wait, you called me your child, so does that mean that I'm a...\n\nFern completes your sentence for you.\n\nFern: Half Sihde yes\n\nYou shake your head in disbelief.\n\n${name}: So I'm half-sihde, meaning what exactly? And what about my parents and brother?\n\nFern: Biologically, they were not your parents; you were adopted, but I know they loved you all the same.\n\n*if Elf = \"true\"\n *goto pointy_ears\n\n*if Human = \"true\"\n *goto flat_ears\n\n*label pointy_ears\nBeing an elf may have been tough in a human life, but soon that will be the least of your concerns.\n\n${name}: Hang on a minute. How do I know what you say is true? \n\nFern: Your scepticism is not unfounded; give me your hand.\n\nFern holds out his hand, which looks human but is gold in colour, and his nails are longer and sharper.\n\nYou hesitate for a moment, then take his hand in yours. As soon as flashes of vision fill your mind, you, as a baby in the woods, are given to your foster family by Fern, who has visions of the sholf watching over you as you grow up.\n\nLetting go of his hand and breathing heavily, you manage to exclaim, ''Oh my gosh''\n\nFern: Your brother spoke of someone who could help; he was talking about me, and now you know the truth.\n\nRegancing your composure, you look at Fern with shock and disbelief.\n\n${name}: They knew? mother? father? and my brother? they all knew?\n\nFern: Of course they did; did you already forget the vision I showed you? but I can understand your shock.\n\nSebel then shouts from her tent, asking who you are talking to. You turn to answer her, then turn back to face Fern, only to realise that he's gone along with the sholf.\n\n\n*label flat_ears\nBeing human has hopefully made things easier for you.\n\n${name}: Hang on a minute. How do I know what you say is true? \n\nFern: Your scepticism is not unfounded; give me your hand.\n\nFern holds out his hand, which looks human but is gold in colour, and his nails are longer and sharper.\n\nYou hesitate for a moment, then take his hand in yours. As soon as flashes of vision fill your mind, you, as a baby in the woods, are given to your foster family by Fern, who has visions of the sholf watching over you as you grow up.\n\nLetting go of his hand and breathing heavily, you manage to exclaim, ''Oh my gosh''\n\nFern: Your brother spoke of someone who could help; he was talking about me, and now you know the truth.\n\nRegancing your composure, you look at Fern with shock and disbelief.\n\n${name}: They knew? mother? father? and my brother? they all knew?\n\nFern: Of course they did; did you already forget the vision I showed you? but I can understand your shock.\n\nSebel then shouts from her tent, asking who you are talking to. You turn to answer her, then turn back to face Fern, only to realise that he's gone along with the sholf.\n\n${name}: That's a neat trick.\n\nSebel walks up to you, visibly drowsy from being woken up; her hair is a mess.\n\nSebel: What in the hell are you doing? Talking to yourself?\n\n${name}: Sorry, I did not mean to wake you.\n\nSebel: Make damn sure it does not happen again.\n\nThe sun has barely risen before you are woken up by Sebel's yelling and cursing. You exit your tent, strech, and yawn before Sebel informs you that your rations were eaten by wild animals, so you'll need to go hunting for your breakfast.\n\nSebel grabs her bow and arrows before asking you if you know how to use a bow.\n\n*choice\n *selectable_if (Archery >= 30) #Yes, I do.\n  *goto Hunt\n #No, I don't\n  *goto Hunt\n #I do, but I'm not very good.\n  *goto Hunt\n\n*Label Hunt\nYou both venture further into the forest, hoping for a successful hunt, but despite finding rabbits, deer, and even a boar or two, the hunts fail every time.\n\nSebel kicks a tree in frustration and curses.\n\n${name}: We're just having a bad day.\n\nSebel turns to face you with anger in her eyes.\n\nSebel: Bad day? This is hunting; there are no bad days; there are no good days; there is success and failure, but you wouldn't know that being the pathetic novice you are.\n\n${name}: Woah, I'm just trying to stay positive.\n\nSebel relaxes before speaking.\n\nSebel: Ugh, I'm sorry. I'm just really hungry, and we've been hunting for a few hours and failed every time.\n\n${name}: We just need to keep trying; maybe this time we'll be lucky.\n\nWhether it was luck or coincidence, if you manage to take down a deer, you return to camp to skin and cook the meat.\n\nThroughout the day, the deer provides enough meat for lunch and dinner (now thats lucky) before long night falls, and you and Sebel are relaxing by the campfire.\n\nSebel: Once again, I would like to apologise for my words earlier.\n\n*choice\n #It's okay, I understand.\n  *goto Understand\n #Don't do it again.\n  *goto Hurt\n\n*label Understand\n\n${name}: It's okay, I get it. You were hungry; we both were.\n\nSebel gives you a shy smile.\n*set Sebel +5\n*set Good +5\n*set Evil -5\n*goto Adventure\n\n*label Hurt\n\n${name}: It's okay, but don't let it happen again.\n\nSebel looks slightly upset.\n*set Sebel -10\n*set Evil + 5\n*set Good -5\n*goto Adventure\n\n*label Adventure\nYou and Sebel pack up the camp the next day, crossing the border into House Jocues territory. It isn't long before you stumble across a partly burned-down and deserted villiage. The reality of war hits you hard. The farms that once surrounded the villiage have also been burned down, leaving nothing but ash and rubble.\n\nWalking through the villiage fills you with sorrow as you see corpses of men, women, and even children. No one was spared.\n\nSebel: It makes you sick, doesn't it?\n\nYou nod in response.\n\nTravelling for four more days, you get to know Sebel better and grow closer, plus minor skirmishes with bandits and patrols from the house's men bring you to a town famous for its fish. You head to the nearest port.\n*set Sebel +20\n*set Combat +20\n*set Agility +20\n*set Archery +10\n\nSebel turns to you.\n\nSebel: It's been nice getting to know you, ${name}, it really has, but...\n\n${name}: But what?\n\nSebel: But nothing is keeping me here now; I lost my friends, and with this war, it's not safe. Come with me, and we can travel elsewhere, somewhere safe, not Albion. I hear there are these monsters from ancient times invading, but somewhere else.\n\nYou try to hide your sadness while looking away from her.\n\n${name}: I can't leave; not yet, I have something to do.\n\nSebel: What's keeping you here?\n\nYou meet her gaze, and you tell her everything, meeting Fern, the Sholf, and being half-sidhe.\n\nSebel listens to every word.\n\nSo you see, I can't leave; I need to find Fern and get answers.\n\nSebel: Well, I hope you find them.\n\nYou embrace each other for one last goodbye, or so you think. The hug lingers for a little too long, then you both let go.\n\n*choice\n #Kiss Her\n  *goto Kiss\n #Say Goodbye\n  *goto Bye\n\n*label Kiss\n*set Sebel +5\nYour lips meet hers; she tenses up at first but soon relaxes and wraps her arms around your neck. You both stop as the captain of the boat yells out that it's now or never.\n\nSebel lets you go, says goodby, and gets on the boat.\n\nEmotions consume you like raging flood waters—a mix of sadness, regret, and anxiety—but you turn around and start walking back the way you came.\n\nYou manage to find a clearing in the woods, you unpack your tent and set it up, and you thank Sebel for teaching you out loud.\n\nOnce the fire is lit, you start cooking some left-over meat from yesterday. You feel the shadow of the wolf watching you, but every time you look around, you can't see it.\n\nYou find yourself staring into the fire; you don't take your eyes off it, and while focusing on the flame, you see it grow bigger and bigger. Soon,  it roars with fury, leaving you stunned and confused. You fall backwards in fear, and the fire dies down back to how it was.\n\n${name}: What in the world was that?\n\n\n*set Magic +5\n\n*label bye\n\nSebel wraps her arms around your neck, and you both stop as the captain of the boat yells out that it's now or never.\n\nSebel lets you go, says goodbye, and gets on the boat.\n\nEmotions consume you like raging flood waters—a mix of sadness, regret, and anxiety—but you turn around and start walking back the way you came.\n\nYou manage to find a clearing in the woods, you unpack your tent and set it up, and you thank Sebel for teaching you out loud.\n\nOnce the fire is lit, you start cooking some left-over meat from yesterday. You feel the shadow of the wolf watching you, but every time you look around, you can't see it.\n\nYou find yourself staring into the fire; you don't take your eyes off it, and while focusing on the flame, you see it grow bigger and bigger. Soon,  it roars with fury, leaving you stunned and confused. You fall backwards in fear, and the fire dies down back to how it was.\n\n${name}: What in the world was that?\n\n\n*set Magic +5", "choicescript_description": "Join forces with a rogue smuggler to uncover the truth of a mysterious cult and foil their plans—but who can you trust in a time of uncertainty and darkness?\n\n[i]Between Two Worlds[/i] is a 40,000-word interactive novel by Liam Parker, author of [i]The Formorian War[/i]. Set in the fictional kingdom of Acai, it's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\nYou have always felt different. The time to discover the truth arrives when the civil war reaches you and your family. Teaming up with a young woman with one eye, you will embark on a grand and tough journey. Sure, it sounds dangerous—and it is—but what choice do you have?\n\nMeanwhile, a dangerous cult works in the background to unravel not just your home but possibly the world. They need to be stopped, yet you soon discover that they pale in comparison to the true evil of the realm. \n\n• Play as male or female, human or elf.\n• Learn about your past and shape your future.\n• Meet otherworldly beings like a ghost and tiny creatures. \n• Uncover the truth about your enemies and stop them before it's too late.\n• Travel the country and abroad on a mission (or several) to further your knowledge and understanding of your enemies and their intentions.\n• Will you be the hero or the villain of the realm?\n\nIn these dark and uncertain times, every day is a struggle. Join forces with your enemies and deal with other hostiles to save the kingdom.", "choicescript_stats": "This is a stats screen!\n*stat_chart\n   \n   text Name\n   text Race\n   text Gender\n   percent Good\n   percent Evil\n   percent Health\n   percent Combat\n   percent Archery\n   percent Agility\n   percent Magic\n   percent Sebel\n   text Royal_Family\n   text House_Joceus\n   text House_Lanslet\n\n\n\n\nHouse Joceus:\n\n*image House_Joceus.jpg\n\n\n\nHouse Lanslet:\n\n*image House_Lanslet.jpg\n\nRoyal Family:\n\n*image Crown.jpg\n\nAcai:\n\n*image Acai.jpg\n\nCharcters:\n\nSebel: A young woman raised by smugglers with a soft heart, has an eye patch over her right eye.\n\nFern: A seelie warrior who desires to return home.\n\nRed: Cult leader.\n\nKing and Queen: The rulers of Acai, both in their late 60s.\n\nJohn Joceus: The heir to house Joceus.\n\nHenry Lanslet: The only surving male heir to house Lanslet.\n\nMary Lanslet: Younger sibling to Henry .\n\nPrince Phillip: The crowned prince of the relm in his late 30s\n\nPrince Rodrick: The middle child and is only one with magic, in his mid 30s\n\nPrince Charles: The youngest child but a fine warrior in his late 20s\n\nTim: A tiny magical creature that serves Rodrick.\n\n\n\n\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n  \n  Turn off all ads and delays.\n  \n  *purchase_discount adfree 2024-11-14 $2.99 $1.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n  \n  You've paid to turn off all ads and delays.\n", "ending": "*page_break End\nWe hope you've enjoyed playing [i]${choice_title}.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $2.99 $0.99", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Jack\"\n*set race \"Jackson\"\n*set gender \"Male\"\n*set good 50\n*set evil 50 \n*set Health 80\n*set Combat 50\n*set archery 20\n*set agility 20 \n*set magic 20\n*set sebel 20\n*set royal_family 30 \n*set house_joceus 30\n*set house_lanslet 10\n\nYou and Sebel walk through a muddy swamp and try carefully to avoid large throne bushes before you stop her.\n\nSebel: What is it? a wild animal?\n\nYou get the feeling that no animal would make the dead land their home.\n\nJack: No, it's... I sense something magical.\n\nSebel: Hopefully it's what Fern wants; this place gives me the creeps.\n\nYou keep walking forward, and you feel as though you're going the right way. As the feeling of magic gets stronger with each step, within an hour of walking and avoiding tar pits, you see the artefact tangled within the thorns surrounding a tree.\n\nSebel: Finally.\n\nSebel runs to untangle it, but just as she's about to reach out, one of the thorn branches comes alive and wraps around her, making it almost impossible for her to move. She struggles, but it's in vain.\n\n*fake_choice\n  #Rush in to help her with your sword.\n  #Use Magic\n\n\n*script changeBackgroundColor(\"black\")\n\n*set name \"Jackie\"\n*set race \"Jaminson\"\n*set gender \"Female\"\n*set good 50\n*set evil 50 \n*set Health 80\n*set Combat 50\n*set archery 20\n*set agility 20 \n*set magic 20\n*set sebel 20\n*set royal_family 30 \n*set house_joceus 30\n*set house_lanslet 10\n\nMorning comes with the sun, and your brother Glenty kicks you awake.\n\nBrother, come one sleepy head; we're going.\n\nYou rise from your blanket and roll it up.\n\nJackie: Where are we going?\n\nBrother: I don't know, but we can't stay here; it's too dangerous with that thing lurking around.\n\nYour mind goes back to last night—the glowing yellow eyes, the razor-sharp teeth, and, of course, being tied to a tree with certain death being inevitable.\n\nJackie: Yes, of course; do you know anything about it? It was like a large wolf, but at the same time, it was like an entirely different creature.\n\nYour brother shakes his head no but states he thinks he knows who can help. He mentions they live in the woodland and mentions a tower made of crystal, which sounds silly to you.\n\nWith no horse, you've got no choice but to walk, and the nearest settlement is a few days away. Bandits spot and surround you, drawing their swords.\n\nBandit: Give us all your money or else.\n\n*fake_choice\n  #Give them all your money.\n  #Refuse\n\n*script changeBackgroundColor(\"sepia\")        \n        \n*set name \"Phillip\"\n*set race \"Philson\"\n*set gender \"Male\"\n*set good 50\n*set evil 50 \n*set Health 80\n*set Combat 50\n*set archery 20\n*set agility 20 \n*set magic 20\n*set sebel 20\n*set royal_family 30 \n*set house_joceus 30\n*set house_lanslet 10\n\nUsing the oppurunity you both run down a hallway only for cultists to follow you, you manage to lose them by hiding in a random room but thankfully it is where your weapons are.\n\nGrabbing your weapons and other gear like your amour, tent and bedrolls, as you leave the room you see the sholf running towards you having several noticible wounds with an artifact in its mouth.\n\n*fake_choice\n  #Book \n  #Ring\n  #Dagger\n    \n\n\nAs you are walking away from the scene, you hear a groan of pain. It's one of the men who attacked the camp. He begs you for help, explaining that he has a family and they will starve without the money he sends.\n\n*fake_choice\n  #Kill Him\n  #Treat his wounds\n", "startup": "
