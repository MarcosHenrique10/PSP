<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Between Two Worlds — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "betweentwo", "title": "Between Two Worlds", "scenes": {"chapter_five": "You awake in a dungeon shackled to the wall, you struggle againist them more so out of instinct then anything because you know you won't break free.\n\n${name}: Hey where am I? where is Fern and Sebel? Hey I know you can hear me!!!\n\nThe cell door opens and a man steps, his amour resembles that of a knight but you suspect he isn't one, a big give away is the helmet which looks like a face mask with a frown.\n\nGuard: Can you shut the hell up!!! I don't know where your girlfriend or that fairy are and I don't care.\n\nHe leaves the room slams and locks the door behind him.\n\nOver the next several days the door opens so someone can feed you like a caged animal but you have lost all feeling in your arms and hands so it wouldn't matter if you were free but you still don't know why you are being kept alive.\n\nNight falls and you hear a blood chilling howl that echoes throughout the dungeon then your cell door shatters as the sholf tears into it and releases you by carefully bitting through the chains, you thank the sholf and you follow it to Sebel who is just down the corridor and the sholf does the same for her.\n\nSebel: I can't feel my arms.\n\nThe sholf breaths on both yours and sebels arms, almost instantly your arms and hands are healed even the brusies from the chains are gone.\n\nSebel: Wow that pet of yours is full of surprises.\n\nYou hear shouting so its best to leave, following the sholf you find yourselves in the room where the artifacts are they are surrounded by the hooded cultists with one of the them being in a red cloak, the sholf growls.\n\nRed: I am called red and I commend you for making it this far.\n\n${name}: What have you done with Fern?\n\nRed seems puzzled but then he smiles.\n\nRed: He's alive, it is him we need after all.\n\nSebel: What are you talking about?\n\nRed: Turns out it isn't just the artifacts we need, theres an ancient spell needed to open the gateway to Tír na nÓg only known by the Sidhe and with all that magic under our control the world will no longer know war or suffering.\n\nSebel: Through force, thats not peace thats control.\n\nRed snorts.\n\nRed: You were always arguementative.\n\nSebel looks confused at the statement.\n\n${name}: What about the civil war?\n\nRed: Ahhh yes the start of it all, well you see we were working with the Sidhe beforehand but they thought we were unworthy of the knowledge of the artifacts so they gave them to the houses so we worked behind the scenes to influence to houses which lead to war.\n\nYou and Sebel are shocked at the realization, the cult has been behind it all, the civil war the cult at the very least played a part in creating.\n\n${name}: The Sidhe are powerful you won't stand a chance and can you not see the hypocricisy, starting a war to end all wars?\n\nRed laughs, calls you an ignorant child and claims to know the Sidhe weakness but before you can ask what that is Red unleashed lighting from his fingers aimed at you but the sholf jumps in front taking the hit.\n\nUsing the oppurunity you both run down a hallway only for cultists to follow you, you manage to lose them by hiding in a random room but thankfully it is where your weapons are.\n\nGrabbing your weapons and other gear like your amour, tent and bedrolls, as you leave the room you see the sholf running towards you having several noticible wounds with an artifact in its mouth.\n\n*choice\n  #Book\n    *set book \"true\"\n    *set ring \"false\"\n    *set dagger \"false\"\n    *goto book\n  #Ring\n    *set book \"false\"\n    *set ring \"true\"\n    *set dagger \"false\"\n    *goto ring\n  #Dagger\n    *set book \"false\"\n    *set ring \"false\"\n    *set dagger \"true\"\n    *goto dagger\n\n*label book\nYou take the book and notice cultists behind the sholf, it turns around and growls you and Sebel run the opposite way towards a flight of stairs but before heading up them you turn to see the cultists desperately trying to reach you but the sholf is keeping them at bay even though it's injured.\nSebel drags you up the stairs which leads you back to the artifact room but on the opposite end from where you went, thankfully Red and the others are no where to be seen, you head towards the exit and leave.\n\n*goto Lost\n\n*label ring\nYou take the ring and notice cultists behind the sholf, it turns around and growls you and Sebel run the opposite way towards a flight of stairs but before heading up them you turn to see the cultists desperately trying to reach you but the sholf is keeping them at bay even though it's injured.\nSebel drags you up the stairs which leads you back to the artifact room but on the opposite end from where you went, thankfully Red and the others are no where to be seen, you head towards the exit and leave.\n \n*goto Lost\n\n*label dagger\n\nYou take the dagger and notice cultists behind the sholf, it turns around and growls you and Sebel run the opposite way towards a flight of stairs but before heading up them you turn to see the cultists desperately trying to reach you but the sholf is keeping them at bay even though it's injured.\nSebel drags you up the stairs which leads you back to the artifact room but on the opposite end from where you went, thankfully Red and the others are no where to be seen, you head towards the exit and leave.\n\n*goto Lost\n*label Lost\nYou run as far away as possible until you reach a fair distance from the tower, you fear for Fern and the sholf, you rest for a few hours before moving on and camp just out of view of the tower.\n\nSebel: Does Red know me? seems like he does.\n\n${name}: I'm sure we will find out soon enough.\n\nAfter keeping watch until sunset you are confident no cultist members followed you or at least they don't know where you are so you have time.\n\n*choice\n    *selectable_if (ring = true ) #put on the ring\n     *set Agility + 10\n     *goto ring2\n\n    *selectable_if (book = true ) #read the book\n     *set Magic + 10\n     *goto book2\n     \n   \n    *selectable_if (dagger = true ) #use the dagger\n     *set Combat + 10\n     *goto dagger2\n     \n    #go to bed\n     *goto Sleep2\n\n*label ring2\n\nYou put the ring on your finger and feel a tingle as you do you feel as though your reflexs have improved.\n\n*goto Find\n\n*label book2\n\nYou open the book and at first like Mary you can't read it either as it seems to be written in a language you have never seen before but little by little the words translate into english so you can read them.\n\n*goto Find\n\n*label dagger2\n\nThe dagger does not have a scabbard so you get an extra one from your bag, it fits the blade perfectly you then unsheath it and cut your intials in the tree, you feel more courageous and knowledgeable in combat.\n\n*goto Find\n\n*label Sleep2\n\nYou decide not to do anything and get some sleep.\n*goto Find\n\n*label Find\nIn the mourning as you walk a cart travels along the road with a man and woman at the front, you manage to stop it and explain that you are lost and needs supplies, the couple agree to take you to the next town which they are going to and say you can hop in the back which you do.\n\nAs the cart trails down the road your mind begins to wonder \"is Fern okay??\" \"will the sholf be alright?\" \"Who is this Red?\" you turn to Sebel who is just staring upwards.\n\nThe cart stops at the town of Marai with Kov's land you thank the couple and they wish you luck, shouting is heard and a group of people are heading to the outskirts, its too inviting so you both follow.\n\nYou are able to follow the group which leads you towards a man bound to a stake ready to be burn't they shout things like \"burn murderer\" and \"may your evil die with you\" the man is clearly afraid claiming his innocence so you approach the crowd and ask who seems to be the leader of the mob at the front.\n\nMob Leader: Who are you stranger?\n\n${name}: Who is this man and what crime did he commit to deserve such a fate?\n\nMob Leader: This man is a murderer, he killed three woman over a few weeks.\n\nThe crowds roars.\n\nOnce again the man claims he is innocent.\n\nMan: Please sir let me explain.\n\nYou turn to the man.\n\n${name}: Go on.\n\nMan: It's true that I was a suspect in the case but I had a trial and was proven innocent the ballif even said so.\n\nThe crowd gets angry at his statement shouting liar at him.\n\nMob Leader: Stand aside stranger and let justice be done.\n\n*choice\n  #Let him go\n    *set Good +10\n    *set Evil -10\n    *goto Free\n  #Do as you will \n    *set Good -10\n    *set Evil +10\n    *goto Burn\n\n*label Burn\n\nMob Leader: I'm glad to see that justice will not be denied this day.\n\nSebel tries to protest but you stop her.\n\nThe man shouts at you as you both walk away and leave him to his fate.\n\n*goto Cult\n\n*label Free\n\nMob Leader: What!!! no way he's an evil man and must be punished.\n\nSebel: Even though he was declared innocent.\n\nMob Leader: It was a rigged trial no doubt.\n\nYou unsheath your sword and point it at the leader.\n\n${name}: I said let him go.\n\nReluctantly he does as you ask and you safely escort the man back to town.\n\nMan: I must leave or they will do this again, thank you so much.\n\n*goto Cult\n\n*label Cult \n\nYou and Sebel stop off at the tavern and order some food, while you wait you take the oppurtunity to talk.\n\n${name}: Hey are you okay?\n\nSebel: I don't know to be honest, how does Red know me? is he someone from my past?\n\n${name}: It's possible, we need to know more.\n\nSebel stands up and asks the inn keeper if she knows about these robbed people.\n\nKeeper: Hmmm no but I have noticed several people with these strange tatoo's.\n\nSebel: Do they look like a cat fighting a bird?\n\nKeeper: Now that you mention it yes, ha ha weird right..\n\nSebel chuckles.\n\nSebel: Very much so, well thank you so much for your help.\n\nKeeper: You're welcome\n\nSebel returns to her seat and your food arrives shortly after.\n\nMeanwhile on the outskirts of the town, two clocked cultists arrive with Red in between them.\n\nRed: Are you sure this is where they went?\n\nCultist: Yes sire, our spies confirmed it.\n\nRed: Excellent, soon the half breed will be out of our hair and we can begin.\n\nCultist two: Forgive me for asking but what about the one eyed woman?\n\nRed: We may have use for her, she may be willing to join us.\n\nCultist two: And if she doesn't?\n\nRed hesitates for a little while before answering.\n\nRed: Then she dies with the half breed.\n\nBack at the inn many are having a jolly time laughing, telling jokes playing dice but even surrounded by all this you can't escape your thoughts wondering if Fern is okay, how to defeat the cult and even if it's possible.\n\nSebel: Hey lets have some fun while we are here, with the artifact we have they can't complete their plan.\n\nYou agree with her and wonder what to do?\n\n*choice\n  #Drinking contest\n    *goto attack\n  #Play dice\n    *goto attack\n\n*label attack\n\nAfter less then an hour Red and his two cultist enter the inn.\n\nInnkeeper: A fine afternoon, how may I assist you?\n\nYou see them, inform Sebel and you both duck under the table.\n\nRed: Good afternoon, tell me have you seen two indivials one of whom was an eyepatch, blackhair and the other has two different coloured eyes?\n\nInnkeeper: Why yes sir I have.\n\nHe looks over to the table where you were to find it empty.\n\nInnkeeper: Oh...I'm sorry gentlemen they were there a minute ago.\n\nRed: Never mind we will find them.\n\nRed orders the two cultists to search the inn and it quickly disturbs the other customers.\n\nInnkeeper: Excuse me gentlemen but can you please stop distrubting the customers or I'll be forced to call the guards.\n\nRed turns to the innkeeper, rage evident on his face but he calms down and orders his men to leave with him.\n\nYou creek the backroom door open a bit to see that they are gone, the Innkeeper storms over and demands to know who you both are and why they were looking for you.\n\nAfter explaining yourselves leaving several important details out he demands you leave and not return, out of options you leave.\n\nYou decide to move on and luck would have it the same couple offer to take you to their next location.\n\nBandits attack when you are halfway, you manage to survive but some supplies were stolen, unfortantly you are told they can't risk taking you any further when strange seal is found on the bandits bodies which you know is the cults doing.\n\nYou make it past the border into house forset lands and are greeted by a skirish by Lanslet and Royal forces.\nTry as you might you can't avoid them on foot so you need to decide who to help.\n\n*choice\n  #Fight with House Lanslet\n    *goto lord\n  #Fight with royal forces\n    *goto king\n\n*label lord\n\nDrawing your weapons you jump into the fray, swords, shields, spears clash the shouting of men all around you is almost deafining, when the battle is over you see Henry talking to an older man who you assume is his father.\n\nLord Lanslet: We must keep pushing to the Jocues encampment.\n\nAlfred: To what end we should march on their castle.\n\nLord Lanslet: It's too risky.\n\nThey notice you and glare, you walk away as you do you overhear soliders talking about how the king managed to get away.\n\nHenry calls out to you to find the king and kill him, he'll pay you both.\n\nYou look back for only a moment before facing away from him.\n*goto Camp\n\n*label king \n\nDrawing your weapons you jump into the fray, swords, shields, spears clash the shouting of men all around you is almost deafining, when the battle is over you see an elderly man surrounded by guards addressing him regally, its the king he notices you and nods in approval, as you leave you see Henry and who you assume to be his father fleeing on horseback with a few men.\n\nAs you are walking away the king approaches you with a guard.\n\nKing: Thank you for your assistance.\n\nSebel: It was no problem, we were heading that way anyway.\n\nThe king chuckles.\n\nKing: Then I was fortunate indeed.\n\nA messenger runs up to the king and gives him a message as the king reads it his face turns to a frown.\n\n${name}: Forigve me my lord but is everything okay?\n\nKing: It's nothing, just my son Rodrick is unlikely to return and sending a reply begging him isn't going to work.\n\n${name}: Oh thats unfortuante.\n\nThe king thinks for a moment then speaks.\n\nKing: If I arrange for a ship and crew, would you two be willing to go and see why he won't return? perhaps youl'll return with an army who knows.\n\nYou and Sebel look at each other before looking at the king once more.\n\nSebel: We'll need to be paid for our troubles.\n\nA guard looks angry.\n\nGuard: How dare you demand payment...the king has ordered you to...\n\nThe king raises his hand slighty and the guard stops talking\n\nKing: I will make sure you are paid.\n\n${name}: Why is Rodrick abroad anyway?\n\nGuard: Prince Rodrick you mean.\n\n${name}: Of course.\n\nKing: My boy is very interested in history and he learnt about the fairies of old and the orders of the old days, he left for forgein lands two years ago.\n\nSebel whispers to you that maybe Rodrick can help with the cult.\n\n${name}: We will try and find Rodrick.\n\nThe king is delighted.\n\nKing: Excellent I will instruct a company of men to take you to the nearest port it's in forset lands.\n\nThe company takes you there and give you horses so you can keep up but not before the king gives you a pouch of coin just in case you need it, the journey is thankfully uneventful you make it on board a ship with a crew the captain of which explains that he will take you to where Rodrick was last seen and back home.\n\n*goto Daregean\n\n*label Camp\n\nA few hours pass before you stumble on the camp of the king, its quite defensivable, arrows are pointed at you.\n\nArcher: Tell me why I shouldn' ine the scandal.\n\n${name}: Look we were tasked with finding you which we have so we need you to return with us.\n\nTim hands Rodrick a leather bound book, he opens it.\n\nRodrick: Believe me I want to but I must find this.\n \nHe shows you page which depicts some kind of church with the cults symbol on it.\n\n${name}: The cult has been around for a while, Red didn't start it.\n\nSebel: If we help you find it will you come with us then?\n\nRodrick: Of course I have narrowed the location down to two possible locations not far from here, one is up a cliff overlooking the forest beyond and the second appears to be in a swamp of some kind, I will get you a map to either and we will meet back at the tree.\n\n${name}: Why haven't you gone to each yourself?\n\nRodrick: These lands are dangerous with a manner of all sorts of dangers and unlike my brothers I am no fighter.\n\nSebel: But you have magic, can't you use that on these dangers?\n\nRodrick: Offensive spells aren't my thing.\n\nAfter discussing the details with Rodrick you must now choose where to go.\n\n*choice\n  #The Cliff\n\n    *goto Cliff\n  #Swamp\n   \n    *goto Swamp\n\n*label Cliff\n\nYou leave the tree and as Rodrick said your sword returns.\n\nYou follow the maps directions, through the forest up rough terrian you make it to the cliff and a runned down old church with the cult symbol painted on the door, the building is surrounded by vines which shows how old it is.\n\nSebel: Well we found it so want to go inside?\n\n${name}: Sure why not.\n\nSebel: Good, I was going to go inside anyway.\n\nYou both enter and its nothing you didn't expect, rows of church pews with an alter and at the end of the church everything has fallen into disrepair clearly this church hasn't been maintained in years, you walk around wondering how this was allowed to happen but then under the alter just out of sight by the public you notice a lever you decide to pull it\n\nThe lone book shelf left of the alter sounds like its unloc goes between them the sensation sends a jolt throughout your body you tilt your head up as you moan.\n\nWhile you experience something new Rodrick is still at the bar catching up with the innkeeper.\n\nInnkeeper: So you're going back home then? I'll miss you man but not that little beast you hang out with.\n\nTim is busy himself lifting and drinking an entire tank of ale spilling most of it all over the bar and floor.\n\nRodrick: I to will miss you my friend.\n\n''Hey get off my ale''\n\nRodrick turns around to see Tim trying to take another customers ale.\n\nRodrick: I'll sort him out.\n\nHe gets off his stool and walks towards Tim and the customer.\n\nBack at the bathhouse, a bathmaid walks in on you two momentarily but smiles and quickly leaves.\n\nYou are now between Sebels legs she stops you and gets down to your level she kisses you softly while rubbing her hands on your chest you do the same.\n\n*goto Journey\n\n*label No\n\n${name}: I would just like to relax no offense.\n\nSebel: None taken.\n\n*goto Journey\n\n*label play\n\nSebel: Stay there I'll come to you.\n\nSebel gets out of her tub and gently gets into yours, she directs you to sit on the wide top of the tub which you do she takes you in her mouth the sensation sends a jolt throughout your body you tilt your head up as you moan.\n\nMeanwhile at the inn Rodrick is still at the bar catching up with the innkeeper.\n\nInnkeeper: So you're going back home then? I'll miss you man but not that little beast you hang out with.\n\nTim is busy himself lifting and drinking an entire tank of ale spilling most of it all over the bar and floor.\n\nRodrick: I too will miss you my friend.\n\n''Hey get off my ale''\n\nRodrick turns around to see Tim trying to take another customers ale.\n\nRodrick: I'll sort him out.\n\nHe gets off his stool and walks towards Tim and the customer.\n\nBack at the bathhouse, a bathmaid walks in on you two momentarily but smiles and quickly leaves.\n\nSebel is bent over the tub your hands on her hips thrusting makes her rear bounce you both moan with pleasure.\n\n*goto Journey\n*label Journey \n\n\n\n\n\n\n\n", "chapter_four": "*advertisement 300\n\nYou spend the rest of the night on the outskirts of the village, wondering if any more cultists would show up, but thankfully they don't.\n\nSebel: Damn cult I was enjoying myself.\n\n${name}: So was I.\n\nYou find the tomb within a week, but the cultists are already there, but it doesn't matter. The walls surrounding the artefact, which looks like a small stone tablet, open up, and stone arms appear out of nowhere. They grab the cultists and pull them in before the walls close again.\n\nWitnessing this scene makes you both hesitate to approach. Sebel nudges you in the arm.\n\nSebel: It's your turn.\n\nYou cautiously make your way to the artefact, picking it up and placing it in your bag. You wait for the walls to open, but they don't, so you both exit the tomb, not wanting to wait and see.\n\nSebel: So I get attacked by a tree, but the tomb doesn't even try with you; guess who's the lucky one.\n\nYou both laugh before breaking the crystals to return to the tower.\n\nOnce you hand Fern the second artefact, you inform him of the cultist prescene in the tomb.\n\nFern: I am not surprised; they seek to discover our secrets.\n\n${name}: I have a question: how do you know where to find the artefacts?\n\nSebel: And if that's the case, why not get them yourself? Also, why do you want them?\n\nFern: You really think they would just let me walk into human cities and towns? It is much easier for you both to get them, as it helps us all.\n\nSebel: I guess that makes sense.\n\nFern: As for how I know, these artefact locations have been known to me since before you were born.\n\n${name}: That's not exactly an answer.\n\nFern: Well, it will do for now.\n\nYou leave the tower confused, but you feel like Fern is up to something.\n\nFinding the next four artefacts was a challenge going from one house territory to another, but all the house lords and ladies just handed them over due to fear that they would be attacked. Once you receive the fourth one, you find out why they all fear this.\n\nThe lord of the house, Kov, is an old man with short white hair and a beard.\n\nLord Kov: This war started when the Sidhe handed each of us an artefact roughly 20 years ago.\n\nSebel: So the houses and the royals have been fighting all this time since me and ${name} were children?\n\nLord Kov: On and off, yes, but my house remains loyal to the crown. Only Lanslet and Joceus fight against each other and the crown, but my army is tiny, and I can't help the crown with men as I need them all here in case of an attack.\n\n${name}: That's understandable. So the remaining three are with the warring factions?\n\nLord Kov: I would assume yes.\n\nYou thank the Lord and use the crystals again.\n\nLord Kov: Good luck, young heroes.\n\n*goto Where\n\n*label Joceus\n*set Joceus \"true\"\nLucky for you and Sebel, you are transported just outside the castle of Joceus, surrounded by a wood palisade. The guards surround you and bring you before the heir to the house.\n\nThe main hall of the castle is awe-striking, with marble pillars at each corner and portaits of the previous lords and ladies, with the rule dates from start to finish underneath, and the ceiling is a large chandelier with light candles.\n\nJohn: Good afternoon, travelers. My name is John, and guards leave us.\n\nThe guards bow and leave the room, closing the door behind them.\n\n${name}: Good day, my lord.\n\nSebel: Sir\n\nYou both bow as you say the words.\n\nJohn: May I ask why you just all of a sudden appeared outside my castle? Have our enemies somehow got another mage? I'm certain we killed their last one four years ago.\n\n${name}: I assure you, sir, we're not working for the enemy; we are here on an important mission for my father.\n\nJohn thinks for a moment.\n\nJohn: I see; regardless, it still does not explain your being outside my castle.\n\nSebel: It would if what we seek is within, would it not?\n\nJohn narrows his eyes at Sebel.\n\nJohn: Perhaps, depending on what or who it is.\n\nSebel: It's a what?\n\nYou explain your journey to John and the artefacts that need to be found and returned, leaving out details of who you really are.\n\nSebel: This could mean an end to the conflict.\n\nJohn: All I will tell you is that it's buried directly under the castle. I won't stop you, as it seems to be able to do that itself.\n\n${name}: Magic is clearly at work here.\n\nJohn: Indeed.\n\nJohn leads you to the dungeons, then takes you down a narrow staircase to an old but strong wooden door. He takes a lit torch and hands it to you.\n\n${name}: Thank you, my lord.\n\nJohn: Save your thanks; I must prepare my army to meet my father to siege Lanslet Castle. Good luck.\n\nWith that, he leaves.\n\nYou open the door and close it behind you; instantly, you both feel a state of dread while a cold wind blows lightly towards you.\n\nSebel: Okay, so how do we do this?\n\n*choice\n #Summon fire\n  *set Magic +5\n  *goto Cave\n #Scout ahead\n  *set Agility +5\n  *goto Scout\n\n*label Cave\nYou hand Sebel the tourch and manage to conjure a flame in your partly open hand.\n\nSebel: Does it feel weird?\n\n${name}: It used to, but now it feels natural.\n\nSebel: Fern's training is paying off then.\n\nYou follow the one and only path you can take and see it—a solid gold dagger that radiates a blue aura.\n\nSebel: There it is; grab it and let's go.\n\n*choice\n #Go for it\n     *if (Agility >= 50)\n      *goto Grab\n     *else\n      *goto Trap\n #Use magic to get the dagger.\n   *set Magic +5\n   *goto Mag\n\n\n*label Scout\nYou have no idea if something nasty is waiting for you. Carefully and slowly, you walk forward, being careful not to make too much noise. Once your confidence is clear, you return to Sebel.\n\nYou follow the one and only path you can take and see it—a solid gold dagger that radiates a blue aura.\n\nSebel: There it is; grab it and let's go.\n\n*choice\n #Go for it\n     *if (Agility >= 50)\n      *goto Grab\n     *else\n      *goto Trap\n #Use magic to get the dagger.\n     *set Magic +5\n     *goto Mag\n\n*label Grab\n\nYou walk cautiously towards the dagger, and so far nothing happens until a large axe comes swinging towards you, but thanks to your quick reflexes, you drop to the ground in time as it swings over you.\n\nSebel: Are you okay?\n\n${name}: Yeah, I'm fine.\n\nYou get up slowly and grab the dagger; the axe comes back, and once again you drop to the floor quick enough to make it back to Sebel.\n\n*goto break\n\n*label Trap\n*set Health -40\nWalking slowly towards the dagger, you keep an eye out for traps, and there is one. A large axe comes swinging towards you, but unfortunately, despite your best efforts, you're too slow and are slashed lightly across the back. You stumble to the floor in pain.\n\nSebel: ${name}!!!\n\n${name}: Stay where you are.\n\nYou crawl towards the dagger and grab it. As you stagger towards Sebel, the axe comes back. This time the pain comes in handy, and you fall to one knee, which is just enough space to avoid it. Sebel runs up to you, lifts your arm over her shoulder, and drags you out.\n*goto out\n\n*label out\nBack in the main hall, you are told John has already left by his wife; however, she states you're allowed to stay for a while should you need it.\n*if (Health \u003c 100)\n *set Health +40\n *goto Heal\n  \n\n*label Heal\nYour wounds get treated, requiring a few stitches that could have been worse.\n*goto break\n\n*label Mag\nTraining under Fern comes in handy. You lift up your hand and use magic to lift the dagger and bring it towards you. It's a struggle at first, but soon it feels natural. An axe comes swinging but bounces off the dagger. You take the dagger when it's close enough, and you both leave.\n*goto break\n \n\n*label Lanslet\n*set Lanslet \"true\"\nYou land on a hill overlooking Laslet Castle. You can see it's a small castle made of stone surrounded by a wood palisade. You notice an armed horseman approaching you, and they take you to the castle.\n\nA young woman welcomes you just inside the gate, explaining that she knows who you are (to an extent) and invites you into the castle. The wind blows her long blonde hair, and you enter her private study, which is full of books and parchments.\n\nMary: Good day, travelers. I am Mary Lanslet.\n\nYou both bow and introduce yourselves.\n\nMary: I have heard that two people fitting your descriptions are travelling the land and visiting the houses. I don't know why, but I do know it has been peaceful, which is ideal.\n\nSebel: So you don't support the war?\n\nMary: Of course not. I have lost three of my four brothers to this war, and for what? ...for this.\n\nMary takes an emerald green book from a stack, being very careful not to make the stack fall over.\n\n${name}: It's beautiful.\n\nSebel: So the war began because of these magic items?\n\nMary puts the book down on her desk.\n\nMary: More or less, my house and Joceus house have always been ambitious, but these artefacts have definitely played a part.\n\nYou explain to Mary that you need the book for a friend, but Sebel ''corrects'' you.\n\nSebel: Sure, if by friend you mean a Sidhe fairy.\n\nMary is taken aback.\n\nMary: But that's not possible.\n\nSebel: Oh, sweetie, you have no idea; I thought the same.\n\nMary: Well, in that case, take it; I have no use for it; I can't even read it.\n\nYou thank her and are about to leave when you notice an opened letter.\n\n${name}: What's this?\n\nMary walks over to you.\n\nMary: Oh, that's one of the letters my love sent me a while back.\n\nSebel: You don't say...may I read it?\n\nMary: Oh, um, I guess.\n\n\"My dearest\nMy heart yearns for you ever since that kiss we shared, and I wish nothing more than to hold you in my arms.\nAnd yes, you can borrow that book. I have recently finished it, and it's quite a read.\"\n\nWith all my love, R.\"\n\nSebel: That's sweet; who's R?\n\nMary: I promised not to reveal his identity.\n\n${name}: Fair enough, and thank you again.\n*goto Where\n\n\n*label Royal\n*set Crown \"true\"\nYou both land on a wheat farm, but you can see the royal castle in the distance. It takes an hour or so to get to the gate, at which point you notice how grand the castle looks, with large stone walls and a tower at each corner you can see. You also see a balista on the towers.\n\nThe large wooden gates open, and once inside, you see a variety of people with their own shops, a marketplace, armoury, and even a jailhouse. You approach the castle and ask to speak to the Queen.\n\nGuard One: For what reason?\n\nWe are on a mission, and we think we know how to end the civil war.\n\nThe guards look at each other, then back to you and Sebel.\n\nGuard Two: I'll inform her majesty; stay here.\n\nThe guard leaves and is gone for quite a while before he returns to tell you the Queen will see you in her quarters, and as he guides you to her room, he insists you keep your weapons sheathed. To be respectful, you enter the Queen's quarters. The Queen has her back towards you, looking out a window with her hands behind her back.\n\nQueen: I hear that you've visited other houses, and I've been told that you can possibly end the civil war.\n\nThe queen turns around, and despite her grey short hair and several wringles, she is still a beautiful woman.\n\nQueen: So please explain yourselves.\n\nYou both bow.\n\nYour Majesty, the other houses had artefacts belonging to the Sidhe, and we were tasked with returning them.\n\nQueen: I see. Will you use these artefacts?\n\nSebel: No, milady, we would never endanger the realm.\n\nThe queeen smiles\n\nQueen: That is good. Let me be clear: this war has destroyed our country and ranied my people's lives. I want a peaceful resolution to it, and if handing over the artefact helps, I will do so, but it won't be easy.\n\nSebel: How so?\n\nQueen: It's not even here in the castle; my husband took it and hid it in a wolf den not far from here before he left with two of our sons and most of the army.\n\nThe queen gives you directions to the den; you thank her and make your way there. She wishes you luck.\n\nYou notice that Sebel looks very nervous about facing wolves, even though she has faced worse. When you are near the den, you both decide to take a break.\n\nSebel: I like the queen; it seems like she really cares about the people. What do you think?\n\n*choice\n #She's a good person.\n  *set Good +10\n  *set Evil -10\n  *goto Wolf\n #She's weak\n  *set Evil +10\n  *set Good -10\n  *goto Wolf\n\n*label Wolf\n\nSebel just nods before she crouches and slowly walks towards the den, where three wolves can be seen.\n\nYou catch up to Sebel, and she asks how to proceed.\n\n\n*choice\n  #Take point\n     *set Agility +10\n     *if (Agility >= 50)\n       *goto Avoid\n     *else\n       *goto Mauled\n #Ask Sebel to take point.\n     *set Sebel -20\n     *set Archery +10\n     *goto Seb\n\n*label Avoid\n\nYou try your best to avoid being seen, but the wolves smell you. One lunges at you, but you dodge the beast. The others try their luck, and thankfully, you avoid them too. With their claws hitting your amour, you rush into the den and find a dead, half-eaten deer with a small blue ring next to it. You sense its power, so you grab it and run out. Sebel distracts the wolves by shooting at them with arrows. You tell her to run, and she does. You catch up with her and show her the ring.\n*goto Where\n\n*label Mauled\nDespite your efforts to avoid the wolves, you are too slow. Sebel tries to help, but she freezes in place. But it doesn't matter; the wolves tear you apart.\n*goto death\n\n*label death\nYou have died.\n*finish\n\n*label Seb\n\nSebel seems scared of your suggestion.\n\nSebel: No way, nope, not going to happen.\n\n${name}: I get you are scared of wolves, but you are more nimble than me, so you would have a better chance at avoiding the wolves.\n\nSebel sighs and agrees reluctantly.\n\nOne lunges at her, but she dodges the beast, then the others try their luck, but they also fail. She rushes into the den while you distract the wolves by firing an arrow at them. Sebel rushes out of the den, the wolves flee, and she shows you a ring. You sense its power and are certain it's what Fern wants.\n*goto Where\n\n*label break\n\nUnfortunately, winter has finally set in with the snow. It's clear you can't travel until spring, so you have time to kill or use it effectively.\n\n*choice\n #Train with Sebel\n  *set Sebel +5\n  *set Combat +10\n  *set Archery +10\n  *goto Where\n #Pratice Magic\n  *set Magic +10\n  *goto Where\n      \n\n*label Where\n\nWhere to?\n\n*disable_reuse\n*choice\n #House Joceus\n  *goto Joceus\n     \n #House Lanslet\n  *goto Lanslet\n\n #Royal\n  *goto Royal\n\n *selectable_if (((Joceus = \"true\") and (Lanslet = \"true\")) and (Crown = \"true\")) #Move on\n  *goto War\n \n*label War\n\nAfter what seems like weeks of travelling, you stop at an inn seemingly in the middle of nowhere, but you get some food and a good rest, so it's not all bad, but it's not long before you have to travel again and once again make a stop at another villiage, which now flies the Lanslet flag where, as before, the crown flag flew.\n\nYou and Sebel check out the local stands before heading to the tavern. You sit at one of the tables, and a barmaid takes your order.\n\nSebel: So we have the remaining artifacts for Fern but it sucks we couldn't just teleport from one to another, it's hot and just takes way too long.\n\n${name}: I know, but summer is almost here, which means the summer festival.\n\nSebel: Wait, is that still a thing?\n\nA customer overhears your conversation.\n\nCustomer: The summer festival? Of course, it's the only thing that helps us forget about this war.\n\nYou hear shouting and screaming outside but before you can investigate, soliders walk in and start killing innocent people and smashing things, you and Sebel try your best to save as many as you can before you make your escape, the scene that greets you is truly horrific, bodies lie in the streets, buildings are on fire while people run and scream before being struck down the Joceus flag flies high in the distance.\n\nSebel: We need to help as many as we can.\n\n${name}: and die in the process.\n\nSebel: We can use the crystals to get away.\n\n*choice\n #We have to try.\n  *set Good +5\n  *set Evil -5\n  *set Sebel +10\n  *goto Save\n     \n #They are on their own.\n  *set Evil +5\n  *set Good -5\n  *set Sebel -20\n  *goto Escape\n\n*label Save\n\n${name}: We have to try; it's the right thing to do.\n\nSebel nods in agreement and rushes for a solider so a family with young children can escape.\n\nYou engage in combat with one soldier after another, defeating them while people flee behind you, but more men keep coming, and you are both overwealmed and captured. As you are being dragged away in chains, you look back to see the villiage burning to the ground. A solider tugs on the chains around your hands and tells you to keep pace.\n\nYou arrive just a few miles away at one of the Jocelius army encampments and are taken to the largest tent in the camp.\n\nSoldier: Sire, these two killed your men and need to be punished.\n\nSebel: Your men were slaughtering innocent people and burning down their homes.\n\nThe tent is wide, with a wooden desk and chair in the centre. The young man sitting in the chair is John Joceus.\n\nJohn: I see, so you just get bloody thristy and kill my men for doing what needs to be done.\n\n${name}: What needs to be done? You call that what needs to be done, do you?\n\nSebel: I call it unnecessary.\n\nJohn: War demands much from us all; put them in separate tents and confiscate everything from them.\n\nThe guards drag you both away and do as commanded; once they find the artefacts and crystals on you, they return to John's tent, where he questions Sebel and then you.\n\nJohn: So this mission of yours was to gather other artefacts and give them to our enemies? I never should have trusted you.\n\n${name}: My lord, you are mistaken; we didn't.\n\nJohn cuts you off.\n\nJohn: I don't want to hear excuses; my house will rule this land as we deserve, and thanks to you, things will be much easier.\n\nJohn and the guards leave after another tells him of an imminent attack. You feel a wave of emotions, mostly frustration and anger, but you can still make this right; you just need to get out of these chains.\n\n*choice\n #Sneak on a guard\n   *if (Agility >60)\n    *goto Success\n   *else\n    *goto Fail\n\n *selectable_if (Magic >= 70) #Use magic to get free.\n  *goto Choice\n\n*label Escape \n\n${name}: Are you kidding me? They are on their own.\n\nSebel: What is wrong with you?! To hell with you, I'll help these people myself.\n\nSebel rushes a soldier to help a family escape while you run the opposite way. People ask you for help, and you ignore them, or worse, shove them into oncoming soldiers.\n\nYou make it out alive, not sure if Sebel did or not, until you see her being dragged away in chains. As you turn back around, a horseman tells you to follow him to the Lanslet camp. You get on the back of his saddle and make your way to the camp.\n\nThe camp is quite big, with soldiers getting ready for an assult. You also notice machines of war like catapults and ballistas. A tall man with shoulder-length blonde hair and a short beard greets you when you get off the horse. He introduces himself as Henry.\n\nHenry: You are safe now, friend. Did you see where the enemy went?\n\nYou tell Henry that they went in the opposite direction, so he orders everyone to move out.\n\nCatapults launch into the Joceus camp, and you take advantage of the chaos to look for Sebel.\n\nYou find her still chained in a small tent; she doesn't look at you.\n\n*choice\n #Grab the key\n  *if (Agility >60)\n   *goto Success\n  *else\n   *goto Fail\n\n *selectable_if (Magic >= 70) #Use magic to get her free.\n  *goto Choice\n \n*label Success\n\nYou notice the guard just outside your tent. Every time your chains rattle (which is a fair bit), you stop. However, you get the key and unlock your hands. The guard turns around, but he can't arrest you again as Lanslet is attacking. You free Sebel and rush to John's tent, where you luckily find your weapons, the artefacts, and the crystals before being attacked by the guard that was meant to guard you.\n\nSebel takes him down with ease before exiting the tent. You follow her, but John bumps into you, causing you to drop the crystals, and they shatter.\n\nIt's clear you'll have to fight your way out, so who's it going to be?\n\n*goto Choice\n\n*label Fail\n\nYou try your best, but the guard hears you, turns around, and punches you. Lanslet is attacking, so he leaves, but not before dropping the key. You free yourself and Sebel, then rush to John's tent and luckily find your weapons, the artefacts, and the crystals before being attacked by the guard that was meant to guard you.\nSebel takes him down with ease before exiting the tent. You follow her, but John bumps into you, causing you to drop the crystals, and they shatter.\n*goto Choice\n\n*label Choice\nIt's clear you'll have to fight your way out, so who's it going to be?\n\n*choice\n #Fight with House Joceus\n  *goto Joceus2\n     \n #Fight with House Lanslet\n  *goto Lanslet2\n\n*label Joceus2\n\nYou start to fight with the Joceus house, but Sebel chooses to defend her aganist everyone. Those men notice and ignore you. It's clear Lanslet has the advantage with numbers and equipment. You see John get on a horse, and before he leaves, he tells you this doesn't make up for what you did, so clearly he still thinks you are working for Lanslet.\n\nLanslet men see to the wounded while Henry walks towards you with his sword still in hand, drenched in blood.\n\nHenry: If my sister Mary didn't vouch for you in her letter, I would cut you down where you stand, get out of my sight, and pray I never see you again.\n\nHe's clearly angry at you killing his men, but you do as he says, making sure you still have the artefacts, but without the crystals, you'll have to walk or get a ride.\n\nOnce you are a fair distance away from Henry, you ask Sebel if she's okay, and she says that she is, but you think she's trying to hide how she really feels.\n\n${name}: Come on, what's up?\n\nSebel: It's all this death; it's so unnecessary and horrible.\n\nOnce you enter the woodlands to get to the tower, a wolf appears out of the bushes. Sebel freezes, but the wolf seems to be curious rather than aggressive, so it leaves.\n\n${name}: Sebel It's okay; it's gone.\n\nSebel relaxes, and you both continue walking until sunset, then set up camp. The woodland surrounds you, so the fire is the only light source you have. Sebel is sitting near the fire with her knees close to her chest and her arms wrapped around them.\n\n${name}: Hey, I noticed you freeze when the wolf came out, and before winter, when we had to go to the wolf den, a wolf was the reason you lost your eye, wasn't it?\n\nSebel touches her eye patch before looking at you.\n\nSebel: Yes, a wolf did this to me when I was a teenager. I was out picking berries when this wolf came out of the bushes. I think it was an old and injured wolf who saw me as easy prey. If it wasn't for my father, I wouldn't be here. I'll spare you the graphic details.\n\n${name}: Oh wow, thats awful. I'm so sorry.\n\nSebel: Don't be; my life went to hell after that, so it doesn't matter.\n\n${name}: What do you mean?\n\nSebel looks at the fire, and anger is effident on her face.\n\nSebel: Joceus, they torched my villiage, and my family had to flee, and then we ran into the smugglers you met long ago. I was sold to them and grew up around them.\n\nYou are stunned and struggle to find the words. Sebel notices and waves them off.\n\nSebel: It's cool; they taught me how to hunt, pick locks, and fight, so it's better than dying on the road somewhere; sadly, I haven't seen my parents since.\n\n${name}: Wow, I've known you for a while now, and you never said anything.\n\nSebel: Yeah, well, I have now.\n\nThen why did you show John respect when we were at his castle?\n\nSebel: It is obvious I didn't want to die for being disrespectful.\n\nYou reach a mill by midday the next day and ask the miller about the nearest town; he directs you, and thankfully you make it before nightfall, but you both choose to camp on the outskirts.\n\n*goto festival\n\n*label Lanslet2\n\nYou and Sebel start to fight with house Lanslet; those men notice and ignore you, and it's clear Lanslet has the advantage with numbers and equipment. You see John get on a horse, and before he leaves, he tells you this isn't over.\n\nLanslet men see to the wounded while Henry walks towards you with his sword still in hand, drenched in blood.\n\nHenry: Thanks for the assistance; my sister Mary said you were good people.\n\nYou make sure you still have the artefacts after the battle, but without the crystals, you'll have to walk or get a ride.\n\nOnce you are a fair distance away from Alfred, you ask Sebel if she's okay, and she says that she is, but you think she's trying to hide how she really feels.\n\n${name}: Come on, what's up?\n\nSebel: It's all this death; it's so unnecessary and horrible.\n\nOnce you enter the woodlands to get to the tower, a wolf appears out of the bushes. Sebel freezes, but the wolf seems to be curious rather than aggressive, so it leaves.\n\n${name}: Sebel It's okay; it's gone.\n\nSebel relaxes, and you both continue walking until sunset, then set up camp. The woodland surrounds you, so the fire is the only light source you have. Sebel is sitting near the fire with her knees close to her chest and her arms wrapped around them.\n\n${name}: Hey, I noticed you freeze when the wolf came out, and before winter, when we had to go to the wolf den, a wolf was the reason you lost your eye, wasn't it?\n\nSebel touches her eye patch before looking at you.\n\nSebel: Yes, a wolf did this to me when I was a teenager. I was out picking berries when this wolf came out of the bushes. I think it was an old and injured wolf who saw me as easy prey. If it wasn't for my father, I wouldn't be here. I'll spare you the graphic details.\n\n${name}: Oh wow, thats awful. I'm so sorry.\n\nSebel: Don't be; my life went to hell after that, so it doesn't matter.\n\n${name}: What do you mean?\n\nSebel looks at the fire, and anger is evident on her face.\n\nSebel: Joceus, they torched my villiage, and my family had to flee, and then we ran into the smugglers you met long ago. I was sold to them and grew up around them.\n\nYou are stunned and struggle to find the words. Sebel notices and waves them off.\n\nSebel: It's cool; they taught me how to hunt, pick locks, and fight, so it's better than dying on the road somewhere; sadly, I haven't seen my parents since.\n\n${name}: Wow, I've known you for a while now, and you never said anything.\n\nSebel: Yeah, well, I have now.\n\nThen why did you show John respect when we were at his castle?\n\nSebel: It is obvious I didn't want to die for being disrespectful.\n\nYou reach a mill by midday the next day and ask the miller about the nearest town; he directs you, and thankfully you make it before nightfall, but you both choose to camp on the outskirts.\n\n*goto festival\n\n*label festival\n\nYou reach a town called Wellebee, and once again you see a Joceus flag instead of the crowns. The town is quite large compared to any village you have seen or been to, and the summer festival is in full swing.\n\nThere is food, jewellery, cloth, and many more stalls abounding with people dancing on their own, with friends, and in couples to music being played by lute and flute players. Flowers are strung up from building to building, including the ballifs office, and the smell is quite enticing.\nYou might as well enjoy yourselves, so what will you do?\n\n*choice\n #Try the stalls.\n  *goto stalls\n #Dance\n  *goto dance\n #Watch\n  *goto watch\n\n*label stalls\n\nSebel makes her way towards a jewellery stall and looks around. The merchant notices her eye patch.\n\nMerchant: Do you need assistance, ma'am?\n\nSebel looks up from the jewellery.\n\nSebel: No, thank you. I'm very used to looking with only one eye.\n\nA voice then calls out Sebel from the next stall over.\n\nTownsman: I'm surprised you can see anything.\n\nHis wife then joins in.\n\nTownswoman: Clearly, you can barely dress yourself, poor dear.\n\nSebel ignores them and walks back to you.\n\nSebel: Enjoying the scenery?\n\n${name}: I'm just deciding what to do first.\n\nYou notice a stall full of a wide range of weapons—axes, swords, daggers, bows, and arrows of different quality—run by the local blacksmith, so you walk over and examine a sword that catches your attention.\n\nBlacksmith: Ah, I see you have a keen eye, friend. That is the same blade I used back in the old days.\n\n${name}: So you were a warrior?\n\nBlacksmith: Indeed, I was, but now I am a humble blacksmith after discovering I enjoyed making weapons a lot more than using them.\n\nYou notice Sebel is by the stall next to you looking at different fruits and is even allowed to try samples. The blacksmith notices you looking.\n\nBlacksmith: Ahhhh, perhaps buying for the lady?\n\nYou both chuckle at the suggestion.\n\n*goto Prince\n\n*label Dance\n\nYou notice the circle of people dancing their hearts out, laughing as they do, so you go and join in with them.\n\n*choice\n #Dance with other people.\n  *goto Prince\n *selectable_if (Sebel >= 70) #Ask Sebel to dance\n  *set Sebel +5\n  *goto Prince\n #Dance Alone\n  *goto Prince\n\n*label watch\n\n${name}: I'm not feeling very festive today.\n\nSebel: Well, you might as well start because it goes on for a full seven days.\n\nSebel walks towards a stall while you stand there, being awkward. \n\nSome ask if you are okay or if you would like to dance; you answer yes and no, respectively, and they leave you to your thoughts.\n\n*goto Prince\n\n*label Prince\n\nTrumpet sounds are heard in the distance, and armoured horses and soldiers march into the town. You see people gather together, some cheering, others bowing to none other, and then the crowned prince of the kingdom dismounts his horse and greets the eople. His long brown hair is tied back, and his long beard clearly needs a trim.\n\n${name}: What's the prince doing here?\n\nSebel: Maybe a moral boost to the people? or stopping for a rest?\n\n${name}: With a lance of knights or more?\n\nSebel shrugs.\n\nYou notice the prince visit stalls and chat with the merchants before seeing you and approaching.\n\nPhillip: Good day, friends. I am Phillip, the eldest. Have you had much trouble lately?\n\nSebel: Who hasn't your highness, but can I ask what you're doing here?\n\nPhillip: Resupply and a shave, plus I love the festival.\n\n${name}: I doubt two lances of knights are needed.\n\nPhillip: Consequences of being royalty I'm afraid, but the bulk of mine and my brother's forces are camped on the outskirts.\n\nYou remember the queen mentioning she had three sons?\n\n${name}: Whos the youngest out of curiosity, your highness?\n\nPhillip: Well, my brother Charles is in the camp; however, my other brother Rodrick is abroad. I hope to restore order before his return.\n\nBefore you can ask where he went, a knight approaches the prince and whispers something to him. He bids you both farewell, and you do the same.\n\nSebel: I think it's time we return to Fern.\n\nYou agree and leave the town, passing Phillip as you go.\n\nFinally, after what seems like forever, you finally make it back to the tower. Your legs ache, and you feel mentally exhausted.\n\nFern greets you at the entrance, and you tell him about your journey.\n\nFern: Yes, I was wondering why it was taking you so long to return, but I'm glad to see you are alright.\n\nYou hand Fern the artefacts, but he senses something is wrong.\n\n${name}: What's the matter?\n\nFern: I sense a darkness approaching.\n\nMany hooded cultists surround all three of you. They throw these small metal balls that burst and release a noxious gas. Your vision blurs, then goes dark.\n*goto Dungeon\n*label Dungeon", "chapter_one": "Your race is \n*choice\n #Human\n  *set race \"Human\"\n  *set Human \"true\"\n  *set Elf \"false\"\n  Your race is ${race}.\n  *goto gender\n #Elf\n  *set race \"Elf\"\n  *set Elf \"true\"\n  *set Human \"false\"\n  Your race is ${race}.\n  *goto gender\n\n*label gender\n*choice\n #Male\n  *set gender \"Male\"\n  *set mal \"true\"\n  *set fel \"false\"\n  *goto name\n #Female\n  *set gender \"Female\"\n  *set fel \"true\"\n  *set mal \"false\"\n  *goto name\n\n*label name\nWhat is your name?\n*input_text name\n\n*label Acai  \nIn the land of Acai sits a small village. House Lanslet's land, where you grew up, is a peaceful but boring existence. However, a civil war between two houses of the rem and the crown raged, which caused chaos, so for years your life has been mostly uneffected until now.\n\nYour father used to be a solider, but thanks to a leg injury, he was forced to retire. Now he is a blacksmith. Your older brother is his apprentice, but that doesn't mean your life is all sitting around and doing nothing. Your father requests you go and fetch some wood, so you gather your gear and set off.\n\n*goto Gather\n\n*label Gather\nYou gather the wood requested by your father, but think to yourself that there must be more life than this, and just as you think, a wolf springs out of the bushes, knocking you off your feet and causing you to drop the wood.\n\n*choice\n #Attack with your sword.\n  *set Combat +5\n  You managed to wound the wolf, and it ran away.\n  *goto home\n #Fire an arrow\n  *set Archery +5\n  You managed to wound the wolf, and it ran away.\n  *goto home\n #Run\n  *set Agility +5\n  Forget the wood; your life is more important.\n  *goto home\n\n*label home\nReturning home, you tell your family of the wolf, and everyone is relieved to hear that you're okay. That night, your brother comes into your room and invites you to the local tavern.\n\n${name}: I have no money.\n\nBrother: Well, you're in luck because I do, so let's go.\n\nYou make your way to the tavern, grab a couple of drinks, and sit down.\n\nOnce you're both settled, your brother breaks the silence.\n\nBrother: So what do you plan to do with your life?\n\nThe question catches you off guard for a moment, and after collecting your thoughts, you answer. \n\n*choice\n #I want to see the world.\n  *goto Night\n #Maybe become a mercenary.\n  *set Combat +5\n  *set Archery +5\n  *goto Night \n #Maybe I'll live in the woods.\n  *goto Night\n\n*label Night\nBrother: This is serious, ${name}. You're quite carefree, and there is nothing wrong with that, but we're not getting any younger, so please don't spend your life only to regret it later.\n\n${name}: I won't.\n\nThe tavern is full of people drinking, playing dice, and singing, but that still doesn't stop people from staring at you due to one of your eyes being a gold colour while the other is brown. You've no idea why this is, and no one else does either, but you're loved by your family regardless.\nThe night passes with ale and laughter.\n*goto Civil\n\n*label Civil\nIn the morning, you and everyone else are awoken, and your village is greeted by armed men from House Lanslet, who rules the village you live in and surrounding land. A middle-aged man gets off his horse, unscrolls a parchment, and reads it aloud for all to hear.\n\n\"To all of age within this village, you are required by his lordship to enlist in his army and take up the sword, bow, or provide aid within the camp, and you must do so as of this moment.\"\n\nEveryone starts shouting and clearly is not happy about this, shouting things like go to hell and we didn't want this war. While this is going on, you're about to open the door, but your brother cups your mouth with his hand and drags you to the ground.\n\nConfused as to why he's doing this, you try to take his hand away, but he whispers in your ear to be quiet.\n\nSoon the soliders start dragging people away, going from home to home and entering without permission; soon they reach your house.\n\nYour mother quickly tells you both to get in the cellar, and you do so before she answers the door.\n\nYour father explains that because of a leg injury he suffered while in service to the crown, he can't fight anymore, and this is verified by a few men in the party, so they leave your home and the village. \n\nAfter the soldiers leave and everything calms down, your parents tell you and your brother to pack up as they plan to leave to avoid the conflict.\n\n*goto Road\n\n*label Road\n\nYou and your family have packed all you can. Borrowing a cart and horse from one of your neighbours, you set off to find a new home far from the harsh reality of war. Walking for several hours brings you all to the point of exhaustion, so you find a secluded place within the forest and make camp for the night.\nAfter eating and your parents falling asleep, you and your older brother sit by the dying fire until your brother turns his head towards the woodland, looking confused.\n\n${name}: What is it?\n\nbrother: I'm not sure; I thought I saw something—or someone.\n\n${name}: Should we wake mother and father?\n\nYour brother turns back to you and shakes his head side to side, indicating no. As he does, you both hear a low growl. You both spin around and draw your weapons, but what you see chills your blood, causing you both to drop your weapons in shock and fear.\n\nIn the pitch-black darkness, you see a pair of yellow eyes looking at you both. It feels like its eyes are peircing your soul, and then just as they arrived, they quickly vanished.\n\nYou and your brother both look at each other with a look of terror.\n\n${name}: What the hell was that?!\n\nBrother: I don't know, but it wasn't good.\n\nYou don't remember when you feel asleep, but when you awake, your blood turns cold as you see masked people in robes standing over you. You are so full of fear that you can't even speak.\n\nNext thing you know, you're punched and knocked out, and when you awake, you're tied to a tree.\n\nDizzy and confused Your vision is blurry, but when you see it, you scream in terror. The yellow eyes are back, and they are coming closer to you. Try as you might, you can't get free.\n\nThe eyes come into the light, which reveals a large wolf-like creature, but its fur colour looks like gold. With a mouth full of razor-sharp teeth, it growls at you, ready to attack, but it never gets the chance as a spear pierces its side, causing the beast to cry out in pain.\n\nThe same robbed figures appear out of the shawdows and surround the beast; however, the creature tears into the robbed men like tissue, causing those still alive to run in fear. While this is going on, a strange figure appears behind you and unties you. He tells you to run, which you do.\n\nOnce you are safe, you stop the man, and to your surprise and delight, it's your older brother, but this joy is short-lived as he explains that your parents gave their lives so he could escape the robbed figures.\n*goto Seperate \n*label Seperate\n\n\n\n\n\n\n\n \n \n", "chapter_six": "*advertisement 300\n\nYou board a merchant ship bound for Acai. The captain is an old man who looks to be in his early to mid-sixties.\nIt's just after midday, the sea is calm, and the crew sings as they row Rodrick and Tim and by the captain's wheel, taking in the beauty of the ocean, while Sebel is sitting on some tied-together barrels, sharpening one of her daggers, but the peace does not last long (because, of course, it doesn't) as something rises from the sea.\n\nCaptain: We got company, lads.\n\nA large serpent-like creature rises from the ocean; its prescene alone sends a few of the crew into panic. The captain shouts for them to row faster, but try as they might, the serpent easily catches up and slams into the ship, knocking both cargo and crew off. It bares its razor-sharp teeth while its piercing yellow eyes glare at the feast before it.\n\n*choice\n #Cast lighting \n  *set Magic +5\n  *goto Lighting \n     \n\n #Fire an arrow at its head.\n  *set Archery +5\n  *goto Arrow\n\n*label Lighting\n\nHalf-Sidhe and Ferns training is usually useful, but here there is no such luck; the serpent is visibly hurt, but other than that, it doesn't appear to have done much.\n\nSebel: We're doomed.\n\nTim: No, Master will help.\n\nRodrick then cups his hands together and slowly opens them. A small ball of light appears as his Iris turns orange. The ball of light morphs into a small crab, which Rodrick drops into the ocean, where it grows, becomes more realistic, and starts moving.\n\nThis has the desired effect when the serpent notices the illusion and swims away, at which point the crab disappears and Rodrick sits on the ground, sweat dripping from his face and panting heavily.\n\nYou lower yourself and place your hand on his shoulder.\n\n${name}: Thank you.\n\nRodrick exclaims, You are welcome, in between breaths.\n\nCaptain: Well, thanks, lad; now, boys, let's set sail.\n\nThe crew shouts in unison.\n\n*goto wreck\n\n*label Arrow\n\nThe arrow bounces off the scaly head of the beast.\n\nSebel: We're doomed.\n\nTim: No master will help.\n\nRodrick then cups his hands together and slowly opens them. A small ball of light appears as his Iris turns orange. The ball of light morphs into a small crab, which Rodrick drops into the ocean, where it grows, becomes more realistic, and starts moving.\n\nThis has the desired effect when the serpent notices the illusion and swims away, at which point the crab disappears and Rodrick sits on the ground, sweat dripping from his face and panting heavily.\n\nYou lower yourself and place your hand on his shoulder.\n\n${name}: Thank you.\n\nRodrick exclaims, You are welcome, in between breaths.\n\nCaptain: Well, thanks, lad; now, boys, let's set sail.\n\nThe crew shouts in unison.\n\n*goto wreck\n\n*label wreck\n\nThe damage to the ship is more severe than previously thought; the ship starts to sink, which of course is not good, but thankfully the captain directs it to an island called Potess, which he claims to have a thriving community known for shipbuilding and repair.\n\nRodrick: That is oddly specific.\n\nCaptain: It was a colony of a country at one point; I forgot which one.\n\n${name}: What happened?\n\nCaptain: They gained their independence and did sea trade, but used to build ships in the old days.\n\n${name}: How do you know that?\n\nCaptain: The people there saved my life many years ago.\n\nYou arrive at the island and depart the ship with the captain and a handful of his crew.\n\nCaptain: Sorry about this. Why don't you look around? We're going to be here a while.\n\nThe sea trade seems to have done wonders for the island people; it's similar to the city; you just left with similar businesses, all be it with way more sand and more primative looking.\n\nSebel: Ship building, really? This place is a dump.\n\nLocal: Hey, we might not have your fancy city living, but we get by just fine.\n\nSebel: Sorry.\n\nLocal: Apologies accepted, and as for shipbuilding, young lady, we have some of the finest materials for shipbuilding.\n\n${name}: Such as?\n\nLocal: Ummmm, wood?\n\nSebel: Yeah, we have wood.\n\nLocal: It's a special wood.\n\n${name}: And what makes it special?\n\nLocal: Ughhhh\n\nThe local runs away from you.\n\nSebel: Well, that was weird.\n\nYou get knocked over by a couple of guards, and as you get up, you follow them.\n\nIn the middle of the market, two young men are fighting.\n\nLocal one: You thieving low life.\n\nThe local one punches the second, and he falls to the ground. A small crowd has gathered as he gets up.\n\nThe guards separate the two and start to ask questions; apparently, the second local stole something from the first.\n\n*choice\n #Try to Intervene \n  *set Good +5\n  *set Evil -5\n  *goto Intervene\n     \n\n #Steal from the crowd\n  *set Evil +5\n  *set Good -5\n  *goto steal\n\n\n #Watch and observe.\n  *goto home\n\n*label Intervene \n\n${name}: Hey, come on, this doesn't help anyone.\n\nLocal one: Look, buddy. I appreciate what you're trying to do, but please mind your own business.\n\nSebel: At least your intentions were good.\n\n*goto home\n\n*label steal\n\nMany people are distracted, which provides an opportunity for profit. You carefully take a coin or two out of several people's pouches before leaving the scene. Sebel noticed but said nothing.\n\n*goto home\n\n*label home\n\nAfter the interesting distraction, you return to the ship, which has been repaired and is ready to depart.\n\nA week or two passes before you finally make it back home. You thank the captain before leaving the ship, which has docked at one of the many ports within Lanlet's land.\n\nRodrick: It feels good to be back home.\n\nSebel: I'm just happy to be back on dry land.\n\nTim gets off Rodrick's shoulder and starts sniffing.\n\n${name}: Umm, what is he doing?\n\nTim then hisses.\n\nTim: The enemy is approaching.\n\nRodrick: Don't worry, he always says that when unfamiliar with sounds and smells.\n\nBut on this occasion, Tim may be right and have several Lanslet soliders arrive on horseback.\n\nRodrick: Perhaps I spoke too soon.\n\nRodrick tries to hide his face as the men get closer, but it seems they are just passing through or maybe on patrol, so you manage to slip by them without notice.\n\nYou follow the road, passing through villages, preferring to camp in the woodland. Well, Rodrick prefers it, so after setting up your tents, a fire seems like a good opportunity to ask some questions, so you sit across the fire from him.\n\n${name}: So why the woods when there are perfectly good inns to get a room at?\n\nRodrick: It's easier this way and safer for Tim's sake.\n\nOkay, yeah, that makes sense, but don't you want your family to know you are back home?\n\nRodrick: Not yet. If I'm found by our enemies, be it the traitor houses or the cult, I'm a dead man.\n\nRodrick takes out a book and quills.\n\n${name}: Writing something?\n\nRodrick: Drawing.\n\n${name}: You're full of surprises.\n\nRodrick looks up to you and smiles before returning to his task.\n\n${name}: Well, I'll leave you with it.\n\nYou rise from the log to see Sebel and Tim chatting, so you walk over to them. It's evident they are in the middle of a conversation.\n\nSebel: Oh, that's interesting.\n\nTim: I can also go invincible for a short period of time, but it gives me terrible headaches.\n\n${name}: Hey guys, sorry to interrupt.\n\nSebel: It's no problem; Tim was just telling me about what he can do.\n\n${name}: That sounds interesting; do you mind if I ask about Rodrick?\n\nTim: What would you like to know about Master?\n\n${name}: What does he draw? He seemed reluctant to say anything.\n\nTim is drawing Lady Lanslet again.\n\nSebel looks surprised.\n\nSebel: So R stands for Rodrick.\n\nWe should ask if he wants to see her before going to find the king.\n\nTim: I agree; the master would be happy to see Lady Lanslet.\n\nYou all walk over to where Rodrick is sitting, and Tim hops on his shoulder.\n\nTim: Another masterpiece, sir.\n\nRodrick chuckles.\n\nRodrick: It's okay, but Mary is the true artist.\n\nYou and Sebel sit across from him.\n\nSebel: So, Rodrick We know about you and Mary to a certain extent, and we all thought it would be nice to go see her.\n\nRodrick looks up from his drawing.\n\nRodrick: Is she well?\n\nSebel: She's fine, and Sebel read a letter you sent her once.\n\nRodrick: I see.\n\nRodrick tries to hide a smile but fails.\n\nRodrick: I would like that very much.\n\nAfter having breakfast the next morning, you pack up and find the nearest road, eventually finding a travelling merchant.\n\nMerchant: Well-met travellers, can I interest you
