in something special?\n\n${name}: No thanks, we are on our way to.\n\nHe cuts you off before bringing out a small silver box.\n\nMerchant: This small, unamusing box is actually a magical marvel used by the ancient rulers of this kingdom.\n\nHe gets the feeling he's trying to scam you.\n\nIf that's the case, why do you have it if it's not somewhere safe like the royal vault?\n\nMerchant: Ah, a fine question. This came into my possession when I found it in some ruins north of here.\n\nRodrick: I sense no magic that's fake.\n\nThe merchant keeps his composure.\n\nMerchant: Nonsense, my friends. This box is of fine quality and can do things that many consider impossible.\n\nTim jumps onto the box, the merchant drops it out of shock, and Tim starts smelling it.\n\nTim: Master is right, no magic.\n\nThe merchant is now clearly nervous.\n\nMerchant: Okay, fine, it's just a box; I'm trying to make a living here.\n\n${name}: By scamming people?\n\nMerchant: All merchants do it in some way or another.\n\nSebel: Right, well, do you know the way to Lanslet Castle?\n\nThe merchant gives you directions, which you start to follow until you see a young blonde-haired woman in a beautiful green dress by a lake, accompanied by two guards with their horses grazing near by.\n\nRodrick: That's her; it looks like we don't need to go all the way to the castle.\n\nYou all walk towards her, but the guards stop you.\n\nMary: Rodrick? Is that you?\n\nThe guards look nervous as the realisation dawns on them.\n\nMary: Guards, let them pass.\n\nGuard one: Are you certain, my lady? Rodricks is an enemy.\n\nMary: Rodrick isn't part of the war, nor are his companions, whom I also know; now let them pass.\n\nThe guards allow you past Rodrick and Mary, who embrace each other, but unfortunately for Tim, he gets caught between Mary's arm and Rodrick's shoulder.\n\nTim: Mistress, you are crushing me.\n\nThey let go of each other. Tim is gasping for air.\n\nMary: Oh, my, I am so sorry.\n\nTim: The mistress needs to be more aware of Tim.\n\nMary: I am so sorry, Tim.\n\nTim: Apologies accepted, Mistress.\n\nRodrick and Mary talk for what feels like an eternity.\n\nGuard: My lady, we must head back soon; your mother will worry.\n\nMary clearly looks disappointed.\n\nMary: Rodrick Please come with me; it's so lonely back home. My mother always liked you.\n\nRodrick hesitates, taking Mary's hands in his before responding. \n\nRodrick: My love I would love nothing more, but I must find my brothers and father first.\n\nMary: I understand; promise me you'll be careful.\n\nRodrick pulls Mary in and kisses her.\n\nTim: I don't understand why humans need to lock mouths.\n\nRodrick pulls away.\n\nRodrick: I promise.\n\nTim: Don't worry, Mistress. I'll keep him safe.\n\nMary smiles.\n\nMary: I'm sure you will, Tim.\n\nEveryone parts ways.\n\n${name}: That went well.\n\nOnce again, a waggon appears down the road, and you all hitch a ride until you see an army camp with the royal colours.\n\nRodrick: Hold on a moment, please.\n\nThe waggon stops.\n\nMan: Is everything alright there?\n\nRodrick: My brothers could be at that encampment; we will get off here. Thank you so much.\n\nMan: Not a problem; always happy to help.\n\nThe waggon leaves as you all get off and start to head towards the camp.\n\nThe camp from the outside is guarded and surrounded by a wooden palisade with sharp tops. The guards approach you, but once they see Rodrick, they take a knee.\n\nGuards: My prince.\n\nRodrick looks embarrassed. Tim speaks up.\n\nTim: Do they serve you too, Master?\n\nRodrick: In a manner of speaking yes.\n\nOne of the guards looks up, notices Tim, and steps back in shock, drawing his sword.\n\nGuard: What the hell is that thing!? \n\nTim snaps his fingers, and the guard's sword is transformed into a rose.\n\nGuard: What the? Where is my sword?\n\nTim: Oh my, I am flattered.\n\nGuard: Stop playing games.\n\nRodrick: Your sword will return to you.\n\nEveryone walks into the camp, and as they do, the rose turns back into a sword. The guard drops it in surprise, and the second guard laughs.\n\nThe camp is indeed large, with tents as far as the eye can see. In the training circle, you also notice several workers making catapults and battering rams.\n\nRodrick enters the biggest tent, which you follow soon after.\n\nBefore the king embraces his son, Tim moves his shoulders.\n\nKing: Rodrick There is much to discuss, and I'm so happy to see you.\n\nRodrick: As my father, you remember ${name} and Sebel.\n\nHe gestures to you.\n\nKing: Ah, yes, I remember. Thank you so much for finding my boy.\n\nYou both bow.\n\n${name}: It was an honour, your majesty.\n\nKing: The honour is mine.\n\nHe hugged his son once more before pulling away.\n\nRodrick: Father, what's going on? Where are Phillip and Charles?\n\nKing: They are sieging Jocues Castle; they failed to take Lanslet Castle, so now is the perfect time to strike.\n\nRodrick: Are you sure you have enough men?\n\nKing: I received reinforcements from the capital, but if this fails, we will need the loyal houses to join us.\n*set Royal_Family \"Ally\"\n\nRodrick: Oh.\n\nKing: I thought you would be happy that we will be able to knock out one of the traitors if we succeed.\n\nRodrick regains his composure.\n\nRodrick: Yes, of course I should go and prepare.\n\nHe bows to his father and leaves; you follow.\n\nRodrick leaves the camp. You figure something is wrong, so you follow him out of the camp. Sebel decided to stay and check out the camp.\n\n${name}: Hey, where are you going?\n\nRodrick: Mary is heading back there. I have to warn her before Father shows up with his army. She's a good person and innocent of the war crimes her family has committed, and there are innocent people within that castle I have to try.\n\n${name}: I understand.\n\nRodrick thanks you for returning him home and offers his hand. You lock your arm in his. Rodrick nods to you, and you nod back before letting.\n\nTim: Don't worry, master, we will find the mistress.\n\nYou stand there watching Rodrick leave before Sebel catches up with you.\n\nSebel: Where is he going?\n\n${name}: He's following his heart.\n\nThe king is disappointed that Rodrick has left, but he says you can stay in the camp tonight. You have time before the sun sets, so how will you spend it?\n\n*choice\n #Archery.\n  *set Archery +5\n  *goto Bow\n     \n\n #Sword.\n  *set Combat +5\n  *goto Fight\n\n\n #Nothing I'm going to bed.\n  *goto Tired\n\n*label Bow\nYou train with the archers until the sun sets.\n*goto Battle\n*label Fight\nYou train with the soliders until the sun sets.\n*goto Battle\n*label Tired\nYou decide not to do any training and just get some sleep.\n*goto Battle\n\n*label Battle\nSince you chose to fight with them, the crown looks on you more favourably.\nThe army breaks camp and marches towards the castle. It takes a few days, but finally it can be seen on the horizan, so the army moves closer and makes camp. Yet again, you get your armour mended while there.\n\nThe following morning, they assemble and get into formation. Lanslet's remaining forces are clearly going to be within the castle, as the rest are fighting across the river.\n\nSolider: Sir, a rider approaches.\n\nAs the rider gets closer, you can see it's Rodrick.\n\nRodrick: Father I must implore you to stop.\n\nKing: Why when we are on the verge of victory?\n\nRodrick: There are innocent people in that castle, and within the walls, they also have an honoured guest.\n\nKing: My men know not to harm the people, only the enemy.\n\nYou are on the front lines with Sebel and overhear.\n\n${name}: Sorry to interrupt, but what guest?\n\nRodrick: Someone called Red.\n\nYou and Sebel look at each other in shock.\n\nRodrick: What about Mary?\n\nKing: What about her? She's just as guilty as the rest.\n\nRodrick's face starts to turn red.\n\nRodrick: No, she is not. Her father and brothers fight in the field, and her mother provides reinforcements and supplies, but Mary has had nothing to do with this war. She wants peace, please. I'm begging you.\n\nKing: I'm sorry, son, but Lanslet is a traitor and must pay for their crimes. I intend to give them a trail should any members survive.\n\nRodrick is enraged, but he rides back to the castle.\n\nA messenger tries to get through the formed army.\n\nMessanger: My king, I have troubling news. Henry is aware of your outcome and is marching here now.\n\nThe king's brow furrows in anger.\n\nKing: What!!! When was this!?\n\nMessanger: A few days ago.\n\nKing: Why wasn't I told sooner?\n\nMessanger: I couldn't find you; I've been going all over the place.\n\nKing: Damn it!!!\n\nSoldier: My lord, the last report we received regarding Henry was that he was close to his castle; we must strike now.\n\nThe king orders the attack, and the soldier charges in.\n\nInside the castle:\n\nRodrick and Tim are helping Mary pack lightly when a guard barges in.\n\nGuard: My lady, the king's army has started its assault; we must leave now.\n\nMary: How long can we hold them off?\n\nGuard: Not long, I'm afraid.\n\nRodrick: Go; I'll protect her.\n\nGuard: No offence, but you don't appear to be the fighting type.\n\nRodrick: Things are more than they appear.\n\nTim: Master and I can protect Mistress.\n\nThe guard spends an extra second or two staring at Tim before he comes back to his senses and leaves.\n\nThe sounds of men shouting and the catapults are deafened momentarily by the gate breaking.\n\n\"They've broken through the gate.\"\n\nMary is getting increasingly worried and scared.\n\nMary: Theres a secret passage in my parents bedroom; it will lead us outside to a tunnel system that will take us outside the walls.\n\nShe grabs her finished bag in preparation.\n\nBack on the battlefield:\n\nThe gates have been breached, troops keep pouring in, and the remaining Lanslet troops rush to meet them all around you. People scream and flee in terror. Sebel appears to be handling herself well enough.\n\nThe elven archers are getting overwhelmed while the catapult tears apart the palisade.\n\nA fully armoured man rushes you with a mace.\n\n*choice\n  #Block and Parry\n     *set Combat +5\n     *if (Combat >= 60)\n       *goto Block\n     *else\n       *goto Slow\n #Use Magic.\n     *set Magic +5\n     *if (Magic >= 50)\n       *goto Mag1\n     *else \n       *goto Dang\n\n*label Block\nYou raise your sword, which blocks his mace. Taking the opportunity, you knee him in his stomach, which makes the man falter. You slash at his head, and he falls to the ground dead.\n*goto Rescue\n\n*label Slow\nYou are too slow, so his mace hits you in the chest, making you stumble backwards, but he drops to the ground when an arrow pierces him.\n*goto Rescue\n\n*label Mag1\nYou feel more confident in your magical abilities than you do with the sword. You raise your hand towards the man, and he is launched off his feet, crashing into another solider.\n*goto Rescue\n\n*label Dang\nYou raise your hand. It's too much effort. By the time you realise it, the man cuts your hand, and you yell in pain before an arrow takes him down.\n*goto Rescue\n\n\n*label Rescue\n*set Health \"100\"\nYou use magic to heal some of your wounds.\n\nAll hope seems lost for Lanslet Castle as the Kingsmen approach the castle and start breaching, but as they start cheering, it's overshadowed by a loud horn, the sound of hooves, and what sounds like hundreds of feet charging in the castle's direction.\nYou look back and see more Lanslet troops rushing to meet the king's men.\n\nSebel finds you she has a few cuts, but she is still okay.\n\nSebel: Let's get in there and get some answers.\n\nYou follow her into the castle.\n\nBlood decorates the walls and bodies the floor. You have no idea where to search, but maybe you don't have to. As you hear a woman scream from up the stairs, you follow the sound and burst into the room where you heard it. You are greeted by Rodrick wrestling with an enemy soldier while Tim stands in front of Mary, who is huddled up in the corner.\n\nSebel throws a dagger in the soldier's direction; it strikes true, ending his life. Rodrick rushes to Mary's side.\n\n${name}: Are you guys okay?\n\nRodrick: We'll be fine.\n\nMary: Please find my mother.\n\nSebel: We will try. Where did you see her last?\n\nMary thinks for a moment.\n\nMary: Let me think... She was with her friend Red in the great hall; it has adjourning doors, so you can't miss it.\n\nYou rush downstairs and find the great hall, which is easily spotted as it has the largest doors in the castle. You open one to find Mary's mother being tortured, but Red isn't touching her; she is surrounded by a blood red aura. While Red stands there with his arm stretched and his hood covering his face, the great hall is similar to house Joceus but with windows at the bottom as well as higher up the wall with a couple of doors that would lead to hallways.\n\nSebel: Leave her alone!!!\n\nRed looks at Sebel relaxing; his arm releases Mary's mother, and she faints.\n\nRed: It's about time.\n\nYou point your sword at him.\n\n${name}: How did you find us? Why are you here?\n\nRed paces back and forth while staring at you menacingly.\n\nRed: Did you ever stop and think about how we were able to find you? How did we know roughly where you were after your escape?\n\n${name}: What are you saying?\n\nRed: I allowed that Sholf to take an artefact from you to track you.\n\nSebel: What!!!\n\n${name}: But how?\n\nRed: It's quite difficult and requires blood, but I was able to enchant each of the artefacts for a while just in case you escaped and grabbed one, and as you can see, I was almost right.\n\nSebel: Blood magic is forbidden.\n\nRed: Irrelevant.\n\n${name}: So you took some of my blood and tracked us, but that still doesn't explain why you allowed us to do what we did.\n\nRed shakes his head back and forth.\n\nRed: So powerful, yet none of that power is mental. You are a threat to my plan, and I can't have you roaming around and causing trouble to perhaps one day mount a rescue.\n\nYou slowly walk a few feet towards Red, then stop.\n\n${name}: Fern better be alive.\n\nRed: He's fine and more reasonable than you.\n\nSebel rushes over to Mary's mother and checks her pulse; there isn't one.\n\nSebel: She's dead.\n\nRed: Damn I owe Shadow two silvers.\n\nRed smirks.\n\nSebel: You monster.\n\nSebel draws her remaining dagger and tries to attack Red.\n\n${name}: Sebel, no, don't!!!\n\nYou try and rush to Sebel to stop her, but Red binds you in place while pushing Sebel back so hard that she slams into the wall. You want to move, but you can't; it's like you're literally frozen in place without the ice.\n\n${name}: Sebel!!!\n\nRed: She was just knocked out.\n\nYou are still able to move your eyes and speak, so you look at Red.\n\n${name}: Let me guess blood magic?\n\nRed: With you, yes.\n\nYou notice a small pendant around Red's neck. You can see it has a small amount of red liquid in it, which is most likely your blood.\n\n\"Is anyone here?\"\n\nYou turn your head in reaction to the noise.\n\nRed: Well, luck is on your side, but it won't last forever.\n\nRed turns around and starts to walk out of the room through another door.\n\nYou run over to Sebel, and she starts to stir. Henry and several soldiers enter the room to see his mother's lifeless body. He runs over and holds her in his arms, weeping.\n\nA week passes and much has happened: the king fell in battle, his body is being retuned to the capital, Lady Lanslet has been buried, and repair efforts are underway. Henry is looking out a bottom window of the great hall. The doors open. Henry turns around to see Mary, followed by Rodrick with Tim on his shoulder, yourself, and Sebel. Henry and Mary embrace.\n\nMary: This doesn't seem real.\n\nHenry: I know.\n\nMary lets go and looks up at her brother.\n\nMary: So what is to be done now?\n\nHenry: My father also fell in battle, so the castle falls to me.\n\nHe turns his attention to Rodrick.\n\nHenry: House Lanslet formally surrenders, I'll send a letter to the capital.\n\nRodrick: That would be best.\n\nSebel: But what of House Joceus?\n\nHenry: My spies final report was of their downfall; John has been captured, Charles is in charge, and Phillip is to be coronated.\n\nRodrick: You are aware you'll be held for trial as well as John I'll put in a word for you.\n\nHenry: I am not deserving of such.\n\nRodrick: Nonsense. I see a good man who was led astray and is worthy of a chance at redemption.\n\nHenry nods and thanks Rodrick.\n\nYou all head to the capital, and Henry is arrested and awaiting trial. You look around to see people looking fearful and relieved. You notice Red among the crowd. You turn to tell Sebel.\n\n${name}: He's here.\n\nSebel: Where?\n\nYou turn back, and he's gone.\n\nBut he was just there, I swear.\n\nMary starts crying, and Tim jumps on her shoulder, conjures a flower, and tries to hand it to her.\n\nTim: For the mistress.\n\nMary stops crying for a moment, sees the rose, and takes it.\n\nMary: Awww, thank you, time. Thats so sweet.\n\nRodrick: I have competition, I see.\n\nEveryone laughs Tim looks around, confused.\n\nTim: I don't get it.\n\nMary: Don't worry, sweetie. I'll tell you later.\n\nWith the civil war over, the relm can heal, so you have some free time before finally trying to defeat Red and his cult. As long as they are around, it's very dangerous to even attempt to free Fern.\n*choice\n #Go and see John and Henry.\n  *goto Jail\n     \n\n #Relax\n  *goto Relax\n\n\n*label Jail\n\nYou head to the guardhouse within the city; even the look of it makes you feel dread. It's one of the largest buildings made of stone, laid out with barred windows across it. You enter through the front door to be greeted by a guardsman.\n\nGuardsman: What brings you here?\n\n${name}: Can I speak to John Jocues and Henry Lanslet, please?\n\nGuardsman: I'm sorry, but they are traitors to this kingdom and can't have visitors.\n\nYou turn around when you hear a voice behind you.\n\nPrince Charles: Let our guests see them.\n\nCharles walks to you, stopping just behind you. The guardsman bows and has you follow him to the cells.\n\nThe jail cells are numerous, with at least eight on each side, and as expected, they are dirty and dark, with only sunlight or torches giving light.\n\nGuardsman: It's the third on the right for John and the fourth for Henry.\n\nHeading to John's cell, you see another criminal who is sleeping, and then you see him. The once proud and strong John Joceus has been reduced to a shell of his former self; he now wears prison rags, and his once well-kept and groomed hair is now getting long, tangled, and dirty. John doesn't look at you at first; he is huddled in the corner, furthest away from the bars.\n\n${name}: I wanted to check up on you.\n\nJohn just stares at the floor.\n\nJohn: Thanks, I appreciate it.\n\n${name}: Maybe I can talk to the new king on your behalf?\n\nJohn rises, approaches, and grabs the cells.\n\nJohn: What good will that do!? Don't you get it? I have ruined everything with my father and mother gone, no siblings left, and now everything is gone.\n\nJohn lets go of the bars.\n\nJohn: My land will be absorbed, and my house's only legacy will be a failed coup. Please leave me.\n\nFeeling like you shouldn't have come here, you leave John to his thoughts.\n\nYou move next door to Henry's cell; hes just recently been arrested, so the only noticeable difference is that now hes wearing prison \n\n${name}: I wanted to check up on you.\n\nHenry is leaning against the wall opposite John's cell.\n\nHenry: At least he spoke to you.\n\n${name}: How are you doing?\n\nHenry turns to look at you but still keeps his arms folded.\n \nHenry: As one can expect when being branded a traitor and is about to hang, I messed up real bad.\n\n${name}: Blame the Sidhe they were the ones who gave their artifacts away.\n\nHenry: You can't blame your actions on someone else, mother was a fool to trust the cult.\n\nYou stare briefly at Henry.\n\n${name}: You know about the cult? Mary didn't say anything.\n\nHenry: Because she doesn't know.\n\nHenry stops leaning on the wall and walks towards the bars.\n\nHenry: My mother was a spy working for them under threat of annihilation the cult wanted to know of the artifact locations but luckily you go there before they did.\n\n${name}: Red killed your mother, he appears to hate loose ends.\n\nHenry: And he will tie them eventually if the cult isn't stopped I thought they were just a bunch of wackos but clearly I was wrong.\n\nYou hear John chuckle to himself.\n\n${name}: Something you like to add?\n\nJohn: Its just that I wonder what would of been had I chosen differently.\n\nHenry: What are you talking about?\n\nJohn: Just that it was war or do the will of the cult and I let my ambitions get in the way.\n\nHe chuckles to himself again you walk to his cell.\n\n${name}: You're with the cult?\n\nJohn reveals his tattoo on his shoulder.\n\nJohn: Yeah I was until they abandoned me, you know I was promised the throne regardless of what path I took and that they would help my house but look where it has lead to me.\n\n${name}: I'm sorry to hear that.\n\nJohn: Save it bud.\n\nHenry: Whats their plan then? no need to stay loyal now is there?\n\nJohn: No there is not.\n\n${name}: Please.\n\nJohn: They need the artifacts and some spell or something to open a gateway to the Sidhe homeworld and take it over then get back to our world and rule here.\n\n${name}: Talk about ambitious.\n\nJohn: My father would bend over backwards.\n\n${name}: Did you hear anything at all before marching on the capital.\n\nJohn: Only that they are looking for a half breed which if I had to guess was you.\n\nYou nod.\n\nJohn: I thought so.\n\nA guard enters the hallway.\n\nGuard: Times up.\n\nYou leave.\n\n*goto Relax\n\n*label Relax\n\nYou spend the next two days unwinding in the guest room provided by Rodrick in the palace it feels deserved after all the horror you've experienced, you hear a knock on the door so you rise from your bed.\n\nA guard is on the other side informing you that Phillip is being crowned this afternoon he provides you with the fanciest looking clothes you've ever seen.\n\nYou dress for the event and meet with Rodrick, Mary and Sebel in the grand hall two gold thrones are at the end with candle stands at either side, the hall is full of nobles, lower lords and ladies and servants both human and elf.\n\nSebel: Well this is gonna drag on.\n\n${name}: Yep.\n\nSebel is wearing a red dress with a long wide-cut skirt and tight-fitting sleeves.\n\n${name}: You look uncomfortable.\n\nSebel: I feel it.\n\nThe ceremony feels like it goes on for hours (which it probably did) after swears of fealty and the oath is taken Phillip is offical crowned king, a slim young woman plants a kiss on his cheek which he smiles at Rodrick leans over and whispers.\n\nRodrick: Phillips wife.\n\nYou whisper back.\n\n${name}: Thanks for clearing that up.\n\nWith Phillip now on the throne, the relationship can start to have some stability, and the trials of John and Henry are in preparation.\n\n*choice\n #Go see Henry\n  *set House_Lanslet \"Ally\"\n  *goto Henry\n\n #Go see John\n  *set House_Joceus \"Ally\"\n  *goto John\n\n*label Henry\n\nYou go to see Henry before his trial; physically, he looks worse than before but seems content as he sits on his bed.\n\nHenry: Come to say goodbye.\n\n${name}: There must be something I can do; you're a valuable ally in taking down the cult.\n\nHenry: I will accept my punishment.\n\n${name}: I thought Rodrick was going to put a word in for you.\n\nHenry: During my trial, yes.\n\nYou notice John's cell is empty.\n\nHenry: Oh, John is on trial right now.\n\nA guard approaches and tells you the time is up.\n*choice\n *disable_reuse *selectable_if (House_Lanslet = \"Enemy\") #Go See Henry\n  *set House_Lanslet \"Ally\"\n  *goto Henry2\n\n *disable_reuse *selectable_if (House_Joceus = \"Enemy\") #Go and See John\n  *set House_Joceus \"Ally\"\n  *goto John2\n\n #Yes\n  *goto Punishment\n\n*label John\n\nYou go to see John before his trial. Physically, he looks worse than before, but there is a smile on his face. This time, he stands at the centre of his cell, arms behind his back.\n\nJohn: Come to say goodbye?\n\n${name}: There must be something I can do; you're a valuable ally in taking down the cult.\n\nJohn shakes his head back and forth, still smiling.\n\nJohn: You won't need me.\n\n${name}: Why are you smiling? Do you want to die?\n\nJohn: I've made peace with it. I can face the maker, knowing my house will live on.\n\n${name}: What do you mean?\n\nJohn: My wife has been granted ownership by Prince Charles; Phillip wasn't king then, so it was Charles decision.\n\n${name}: So, like Mary, she wasn't involved in the war?\n\nJohn: No, I kept her from it.\n\nYou notice Henry's cell is empty.\n\nJohn: Oh, Henry is on trial right now.\n\nA guard approaches and tells you the time is up.\n\nJohn: ${name} I was allowed one last letter to my wife. I mentioned you and that you're an ally to my house, so if you need it in the future, Joceus will support you.\n\n${name}: Thank you, John; may the maker guide your path.\n\nJohn smiles as you leave.\n\nAre you sure you want to leave just yet?\n*choice\n *disable_reuse *selectable_if (House_Lanslet = \"Enemy\") #Go See Henry\n   *set House_Lanslet \"Ally\"\n  *goto Henry2\n\n *disable_reuse *selectable_if (House_Joceus = \"Enemy\") #Go and See John\n  *set House_Joceus \"Ally\"\n  *goto John2\n\n #Yes\n  *goto Punishment\n\n*label Henry2\nAfter a while, the guard mentions that Henry asked Mary about House Lanslet and its allies; what that has to do with your message, you don't know.\n*goto Punishment\n\n*label John2\n\nAfter a while, the guard mentions that John has asked his wife to honour one request, but he won't say what.\n*goto Punishment\n\n*label Punishment\n\nThe following day, you awake to loud shouting. You look out the window to see a large crowd gathered in the centre of the city. Quick to dress, you run outside.\n\nOnce you are among the crowd, you notice a large wooden platform with a noose in the centre. Henry and John are standing there with their arms tied behind their backs, and a guard standing next to them on the other end is a priest who is about to read a scroll.\n\n\"John Joceus and Henry Lanslet, you stand accused of the hate crime of treason after a fair trial, and in accordance with the law, it is decreed that John is to be hung by the neck and Henry is to have his legs broken and dragged around the city.\"\n\nThe crowd roars and throws rotten vegetables at the pair.\n\nRodrick stands next to you; you didn't even notice.\n\n${name}: I noticed Henry gets to live; your doing, I imagine.\n\nRodrick: The best option, really.\n\nYou've already heard the verdicts, but you can't bear to watch, so you leave the city and walk towards the woods to clear your mind. Once there, it's like the lively and noisy city, but a distant memory of being in nature really brings you a sense of calm until you see him between two trees.\n\nRed: Good morning.\n\nYou reach for your sword, but you remember the pendant he has.\n\nRed: I have no intention of hurting you today; I am just going to let you enjoy this peace while you can.\n\nYou maintain the distance between you too.\n\n${name}: Thats surprising of you.\n\nRed: Also to deliver a message for Sebel.\n\n${name}: Who is she to you; you seem to know her?\n\nRed: Indeed, I do deliver this message to her.\n\nHe throws a scroll at you, and as you go to pick it up, you notice it has the cult symbol on it. You look up, and Red is gone.\n\n${name}: I hate that.\n\nYou spend another hour in the woods, making sure not to go too far in, before heading back. Some whisper of how they think Henry got away too easily, but most are just happy the war is over. You enter the palace to find Henry and are told by a servant he's in his cell, so back to the jailhouse you go.\n\n*goto Broken\n\n*label Broken\n\nYou find the cell door open, and someone is walking out. It's Henry, but you see that he now uses a cane, but he is struggling to use it.\n\n${name}: But how?\n\nRodrick and Mary follow Henry, and Mary tries her best to support her brother.\n\nRodrick: Slow down; this will take time to get used to.\n\n${name}: Rodrick?\n\nEveryone notices you.\n\nHenry: Ah, ${name}, it's good to see you.\n\n${name}: And you, but whats going on?\n\nRodrick: Long story short, I was able to heal his legs, but one of them hasn't healed properly, so now he has to use a cane to walk.\n\n${name}: Oh my, I'm so sorry.\n\nHenry looks to Mary, who smiles, and then turns back to you.\n\nHenry: Trust me, it's better than being dead. I heard John's body is to be buried at his estate.\n\nRodrick: Because Phillip holds me in high regard, Henry is allowed to return home.\n\n${name}: Really? thats awesome.\n\nMary: Plus, the people of our land would probably riot despite the war; they still love Henry.\n\nHenry: I assume you came here to see how I was, well...\n\nHe looks at his cane for a moment.\n\nHenry: Despite everything, I'll be okay.\n\n${name}: That's good. By the way, has anyone seen Sebel?\n\nMary: Yeah, she came here before you, then went to the tavern.\n\nWith that, you thank Mary and leave for the tavern, which, unlike the city only a few hours ago, is quiet and a bit dark as the sun is barely able to pierce through the windows. You find Sebel at a table drinking, so you walk over to her table.\n\nSebel: I couldn't stand by and watch what they did to Henry; seeing John hang was enough for me.\n\n${name}: His legs were healed, and he's allowed to return home.\n\nSebel looks up at you and smiles.\n\nSebel: That's good. Rodrick must have a tongue of gold. Mary's a lucky gal.\n\n${name}: Gross... anyway, I was told by Red to.\n\nShe cuts you off.\n\nSebel: You met with Red!!!\n\n${name}: He found me; he has this pendant that allows him to find me wherever I am, and he asked me to give you this.\n\nYou hand the scroll to Sebel, who takes it and reads it.\n\nSebel: He wants to meet me outside the city by the lake tonight. Why?\n\n${name}: I don't know, but it can't be good.\n\nSebel: When we first met him, he mentioned that I was always argumentative.\n\n${name}: Are you going then?\n\nSebel: You might as well; will you come with me?\n\n${name}: Sure.\n\nBefore you go that night, you consider some options.\n\n*choice\n #Try and learn more about the cult.\n  *goto Cult\n\n #Pratice the sword.\n  *set Combat +5\n  *goto Pra\n\n*label Cult\n\nYou go to the palace in Liabury and try to find any book on cults; you learn about previous ones but nothing else.\n*goto Tonight\n\n*label Pra\n\nYou spend some time practicing on a dummy, getting familiar with the stances and techniques.\n*goto Tonight\n\n*label Tonight\n\nYou meet Sebel just outside the city gates before sunset, and you hear the patter of feet looking around to see no one.\n\nTim: Master asked that I go with him.\n\nYou both look down.\n\nTim: The craned man still needs support.\n\nSebel: Sure, you can come.\n\nSebel gets down to Tim's level and offers her hand, and Tim climbs up and rests on her shoulder, so with your little friend, you head to the meeting place.\n\nThe moon is full, the lake reflects the light, and Red stands at the edge of the lake, awaiting Sebel. When he sees you with her, he smiles.\n\nRed: I knew you couldn't resist joining her.\n\nSebel: For the record, I asked ${name} to join me.\n\nRed: It makes no difference.\n\n${name}: Why did you want to meet Sebel?\n\nRed: Sebel Remember the night your family was taken from you—the flames, the screaming Joceus flag standing proud among the flames?\n\nSebel steps back, looking confused.\n\nSebel: How do you know that? explain.\n\nRed: Because I was there, I saw it all fleeing the horrors of that day, only to run into smugglers.\n\nSebel steps back even further when she realises who Red is. She shakes her head.\n\nSebel: No, that's not possible.\n\nRed lowers his hood, and you can finally put a face on your enemy's short black hair and beard with a claw-like scar across his right cheek.\n\nSebel: Father!? It is you, but why are you doing this? Why did you sell me my mother?\n\nYou stand there in shock, unable to form words.\n\nRed: Your mother is gone. We ran into Joceus soldiers, and she fell. I sold you to give you a better chance at life. It appears I made the right call.\n\nSebel puts her hands on her head. It's clear that all this information is a struggle to process. You move her, hug her, and she accepts your embrace.\n\n${name}: It's going to be okay.\n\nTim appears on your shoulder in a cloud of smoke.\n\nRed: You claim to care about ${name}, but I sense the darkness in you.\n\n${name}: This isn't about me.\n\nSebel regains her composure and thanks you.\n\n${name}: To her previous question, why are you doing this? And spare us the cult plans, please.\n\nRed: Vey well, Joceus House destroyed my life that day. Something in me snapped, and I joined the cult because this world is corrupt and full of evil people, and I intend to root them out and deal with them.\n\nSebel: Red, you're not right.\n\nRed: Sebel I am your father!!!\n\nSebel: No!!!\n\nHer loud reaction made you jump.\n\nSebel: My father died that day. I don't know you.\n\nRed: It pains me to hear that, but it's not too late to join us, and together we can achieve great things.\n\nSebel looks at you and behind her before turning back to her father.\n\nSebel: No\n\nRed narrows his eyes.\n\nRed: It seems I was wrong about you; very well, you'll die with everyone else.\n\nRed raises his hand towards you, and you feel like you're turning to stone, but physically, you look normal. Red smiles Tim then snatches the pendant.\n\nRed: What the!?\n\nYou suddenly feel like a huge weight has been lifted from you. You breathe a heavy sigh. Tim has the pendant and smashes it.\n\nRed: Why you little...\n\nRed screams in pain as a dagger pierces his shoulder. He pulls it out, only to be magically pushed into the lake, where the dagger drops to the ground.\n\nSebel: Good work, Tim.\n\nYou walk over to the dagger and hand it back to Sebel. The water bubbles more and more until Red rises from the lake with a pair of bat wings. Tim rushes back to your side as you all stand there in shock.\n\n${name}: What is actually Fuu?\n\nRed: Did you really think a body of water would defeat me?\n\nHe starts to fly to land.\n*choice\n *selectable_if (Archery >= 70) #Shoot\n  *set Archery + 5\n  *goto Arch2\n\n *selectable_if (Magic >= 80) #Dispel Red Wings\n  *goto Dis\n\n #Ask Tim for help.\n  *goto Tim\n\n*label Arch2\n\nYou pull back an arrow, aim, and fire at Red, but he dodges it. You try again with increased speed and accuracy, but he's too fast. But Tim manages to use magic to disintegrate the wings, and he lands on the ground.\n*goto Res\n\n*label Dis\n\nYou concentrate hard on the wings, and slowly they start to disintegrate. He lands with a heavy thud on the ground. He slowly gets up and is even more angry.\n*goto Res\n\n*label Tim\n\nTim puts his index fingers to his temple and stares at the wings; they start to disintegrate. He lands with a heavy thud on the ground. He slowly gets up and is even more angry.\n*goto Res\n\n*label Res\n\nRed: Fighting back is pointless.\n\n${name}: I beg to differ.\n\nYou unsheathe your sword and charge at Red, ready to end this, but you are knocked off your feet by a wall of fire. Sebel runs to you.\n\nSebel: Are you okay?\n\n${name}: Yeah, I'm okay.\n\nYou rise to your feet as the flames die down, but you notice Red is gone.\n\n${name}: Makers blood!!!!\n\nSebel: Let's go back and sleep on it; we'll work something out, and maybe we can get the others involved?\n\n${name}: Henry knows about the cult, and Rodrick's magic would come in handy.\n\nYou all make it back to the city without trouble and get some much-needed sleep.\n\n*goto Red\n\n*label Red\n\nYou meet with your companions in the tavern in the stock room. You are sure you won't be disturbed there; you are only waiting for Rodrick.\n\nHenry: Of course the sorcerer is the one we are waiting for, like I'm crippled now and I got here on time.\n\nMary: You forget he's also a prince, and he's next in line to the throne.\n\nHenry looks at his sister.\n\nHenry: A throne he doesn't even want.\n\nThe stockroom door opens.\n\nRodrick: That would be correct.\n\nTim jumps off Rodrick and walks towards the ale barrels.\n\nRodrick: Don't you dare.\n\nTim: Apologise, master.\n\n${name}: So why were you late?\n\nRodrick: My brothers wanted to know about my adventures, and I did.\n\nSebel: Fair enough, now let's get to why we were all here.\n\n${name}: Yes, we need to figure out how to beat the cult; we can't just find and kill each member, and Red is too powerful.\n\nMary: Henry has filled me in, and this red guy appears to be very dangerous. There has to be some way to defeat him.\n\nRodrick: There may be a way.\n\nEveryone faces Rodrick while Tim climbs back onto his shoulder.\n\nRodrick: Before I set off for Daregean, I stumbled on some old castle ruins from ancient times. I sensed some powerful magic there, so I decided to investigate.\n\nMary: Did you find anything?\n\nRodrick: Yes, it was a pendant, but it was guarded by a magical barrier.\n\n${name}: Thats not good.\n\nRodrick: Oh, and Wyvern's at least two, if I'm correct.\n\nHenry: That just makes things even harder.\n\n${name}: We have to try; do you remember where it was?\n\nRodrick: No, sorry, I was just passing through, to be fair, but I do remember that it was within the dead lands.\n\nHenry and Rodrick ask around the Tavern, Sebel and Mary around the marketplace, and while you head to the Royal Liabury, with the help of a scolar, you are able to find the section and possibly the book you need.\n\n*choice\n #Read about the old days.\n  *goto old\n\n #Read about the olden times.\n  *goto olden\n\n*label old\n\nYou take Acai the old days from the shelf, find a desk, and sit down to read. Thankfully, your parents thought it was very important that you were your brother. After reading for an hour, you learn quite a lot of interesting things, including about the kings of old, but nothing about a castle that once was in the dead lands.\n\n*goto olden\n\n*label olden\n\nTaking Acai olden times from the shelf, you give it a good long read, you finish the book as the sun starts to set, and you learn of where specifically the castle was built. According to the text, a mage conjourned it from magic and the cretures of the dead lands, but back then the land wasn't dead or called that. You write the location down and head back to the others.\n\nBack in the stockroom in the tavern, you inform everyone of what you found out, and they do the same.\n\nMary: Okay, so some people said the dead land wasn't always like that.\n\nSebel: And that an old castle has been seen there; shame we never came across it.\n\n${name}: I know right, that would have been a huge help.\n\nRodrick: Since you and Sebel have been there before, plus ${name}, you know where it is, so you'll go.\n\n${name}: Makes sense.\n\nTim: Master, perhaps we should go with them; think of all the learning to be done.\n\nRodrick ponders Tim's suggestion.\n\nRodrick: An excellent idea.\n\n*goto Road\n\n*label Road\n\nBack to the deadlands you go, but it's a long road ahead. After days of travel, you make camp.\n\n*choice\n #Discuss magic with Rodrick.\n  *set Magic +5\n  *goto talk\n\n #Chat with Sebel.\n  *goto chat\n\n*label talk \n\nYou chat with Rodrick about what magical abilities you both prefer to use, and he teaches you a spell.\n*goto Fork\n\n*label chat\n\nYou chat with Sebel about the civil war and what kind of king you think Phillip will be.\n*goto Fork\n\n*label Fork\n\nYou keep walking down a dirt path, passing by soliders, merchants, and random people on their own journeys, until you reach a fork in the road. You have two ways to go; both roads stretch beyond the horizon, so you don't know where either leads.\n\n*choice\n #Left.\n  *goto left\n\n #Right.\n  *goto right\n\n*label left\nYou all agree to head left. You keep walking down the road, and unfortunately, you get ambused by bandits.\n\n${name}: Not again.\n\nYou all make short work of them and keep going unaware that something far worse is waiting for you. The maker must be watching you as you manage to hitch a ride to the nearest town and, after a restful night, continue onward, making to the edges of the deadlands after days and days of walking and camping.\n\n*goto Lands\n\n*label right\n\nYou all find it is best to go right, so you do, which eventually leads into the woods, which means you get lost as you go deeper and deeper, hoping to find another road, plus retracing your steps didn't help at all. The maker must be watching you as you managed to find your way out of the woods and hitch a ride to the nearest town, and after a restful night, you continued onward, making to the edges of the deadlands after days and days of walking and camping.\n\n*goto Lands\n\n*label Lands\n*set deal \"false\"\n\nYou have finally reached the dead lands; it feels much more evil than before, perhaps due to your magic getting stronger. Tim appears uneasy.\n\nTim: We must leave; there is evil here.\n\nRodrick: I can sense deep magic further in; we have to press on.\n\nTim: But master...\n\nRodrick: No, but Tim, we have to go; otherwise, Red wins.\n\nAs you keep walking, the sense of powerful magic gets stronger, and Tim grows more uneasy as he jumps from shoulder to shoulder.\n\nTim: We must leave this not safe.\n\n${name}: Tim We haven't seen anything; maybe it's just nerves.\n\nTim: This is not nerves.\n\nAs you keep walking, you come across a cave that literally calls to you. It tells you to come and explore. You try to resist, but it's no use. You continue to walk towards the cave entrance.\n\nSebel: ${name}, what are you doing? You're going the wrong way.\n\nTim jumps on your shoulder just in time as you enter the cave, and as Sebel and Rodrick run towards it, a magical forcefield appears and blocks their way.\n\nRodrick: What foul magic is this!?\n\nAs soon as you hear those words, you snap out of the trance.\n\n${name}: What the?\n\nTim: See, Tim was right about foul magic.\n\nYou turn around to see the forcefield.\n\n${name}: Oh, this isn't good.\n\nRodirck: We can't get to either of you; try and find another way out.\n\nTim: Yes, master.\n\nYour scally friend runs down your arm and lands on the ground, sniffing the air. He points deeper into the cave.\n\nTim: This way.\n\nYou follow Tim deeper into the cave; it's a straight line until you nearly fall down a large hole that descends deeper into the abyss.\n\n${name}: Oh my gosh!!!\n\nYou regain your balance and move back a little; Tim, however, walks up to the edge and looks down.\n\nTim: That's far down.\n\n${name}: I bet but can't see anything; I've been using my hands this whole time.\n\nTim looks back at you and claims he can help you with that.\n\n${name}: I would really appreciate that; what do I have to do if anything?\n\nTim: It's simple: I can temporarily improve your eyes so you can see in the dark.\n\nThe pitch-black darkness gives you no choice but to trust Tim.\n\n${name}: Yeah, that sounds great. What do I have to do?\n\nTim: Let me spit in one of your eyes.\n\nYou blink a few times, trying to process what you just heard.\n\n${name}: I'm sorry, what?\n\nTim: I spit in an eye, and you see better.\n\n${name}: Thats disgusting.\n\nTim: It's the only way.\n\nI was again left with no choice.\n\n${name}: Fine, but make it quick.\n\nTim crawls up your arm, and you can feel yourself getting more tense as he gets closer to your face. Then,  the disgusting smell of the lubrication of your eye makes you close it instantly, but when you reopen it, there is no change, and you hear Tim's laughter.\n\n${name}: Why you little...\n\nTim: It was comedic.\n\n${name}: No is not the time for jokes, Tim!!!\n\nTim is taken aback and apologises.\n\nTim: For real ${name}, I can help.\n\n${name}: You know what... I'm desperate to trust you one more time.\n\nTim places his hand on your temple, closes his eyes, and chants words in a language you don't understand, but as he chants, you can feel a change in your sight. You start seeing shapes, then things become brighter, and finally you can see clearly.\n\n${name}: Wow, this is amazing. Thank you so much.\n\nTm: Master servants are welcome.\n\nYou turn to Tim.\n\n${name}: Servant?\n\nTim: Do not worry; let us continue.\n\nNow that you can see clearly, you see another way into the cave, so you go down the path, which is decorated with bones, which makes you a little nervous.\n\nTim: Dark magic is afoot.\n\nAs you reach the end of the path, you can only turn left. As you do, the air gets colder and colder until you can see your own breath. Then you see what Tim has been so afraid of: a ghost-like figure with red glowing eyes and a black aura surrounding it. Tim hisses at the being, her long black hair and femine figure do nothing to put you at ease, but then again, nothing would.\n\nGonosoth: You may call me Gonosoth.\n\nHer voice chills you to the bone; you can't bring yourself to speak.\n\nGonosoth: I know what you seek, but you cannot find it without my aid.\n\nYou manage to snap yourself out of this fear you feel.\n\n${name}: How will you help us?\n\nGonosoth: You came to me, so you need me to help you.\n\nTim hisses and tells you to ignore her.\n\n${name}: You're the reason we're trapped here, aren't you?\n\nGonosoth: That is such a horrible word; I only desired to speak to you.\n\nTim: Do not listen. Do not listen.\n\nGonosoth: All I ask is that you give me some of your memories, and I will help you leave.\n\n*choice\n #Accept the terms.\n  *set Magic -10\n  *set Combat -10\n  *set Archery -10\n  *goto Terms\n\n #Refuse the terms.\n  *goto Nope\n\n*label Terms\n*set deal \"true\"\nYou hesitate for a while before answering Gonosoth.\n\n${name}: I accept.\n\nGonosoth smiles wide, ear to ear, while Tim looks very concerned and jumps down to the ground. Gonosoth stretches out her hand, and a blue mist moves closer and closer to you. The mist enters your nose and ears. At first, you feel nothing, but then you drop to the ground, holding your head in the dirt. It feels like tiny needles in your brain.\n\nGonosoth: It will only last a while longer.\n\nThe pain stops. When you try and think back, you can't remember certain things involving your weapons, like taking distance into account when aiming an arrow or the stance of your opponent when in combat, and to add insult to injury, some of the spells you used to know are gone from your memory.\n\n${name}: That was... unbearable.\n\nYou look up to see that Gonosoth is gone; the entrance to the cave is now open, and the light makes you cover your eyes.\n\nTim: We are free, but you will pay for your silly mistake.\n\nConfused at the statement, you start to follow Tim out of the cave.\n\nBut I already did, didn't I?\n\nTim: Those creatures always have a hidden agenda; be cautious.\n\n*goto Carry\n\n*label Nope\n\n${name}: I think we can find our own way out, thanks.\n\nGonosoth looks angrily at you before screeching at you so loudly that you cover your ears and close your eyes tight. When the screeching stops, you open your eyes, and Gonosoth is gone.\n\nTim: Uncomfortable, but well done.\n\n${name}: Is it gone for good?\n\nTim: It may return.\n\nEven though the threat is gone for now, you still need to find a way out of the cave. The way you went (which was left) led to a dead end, so you go back the way you came. However, it's no better as now you're back at the still-blocked entrance.\n\n${name}: Great, we're trapped forever.\n\nTim: Me, no, I think so.\n\nTim climbs on the rocks and starts digging.\n\n${name}: Hey Tim How come you can speak clear English one minute but break it the next?\n\nTim: Language is difficult sometimes.\n\nYou are not sure if that makes sense as you ponder whether or not the spell Tim casts starts to wear off.\n\n${name}: Ugh Tim I can't see you.\n\nTim: You whine too much, almost free.\n\nRodrick: Tim, ${name}, is that you guys?\n\nTim: It's us, Master.\n\nRodrick: Tim, get back; you too, ${name}.\n\nYou both do as he asks; the rocks are pushed forward until they collapse, and the entrance shines with light, causing you to shield your eyes.\n\nTim: We are free.\n\n*goto Carry\n\n*label Carry\n\nYou breathe in the fresh air, happy to be out of that cave.\n\nRodrick: What happened in there?\n\n*choice\n #We met some kind of spirit, but I rejected its offer.\n\n  *goto Nodeal\n\n *selectable_if (deal = \"true\") #I made a deal in there.\n  *goto deal\n \n*label Nodeal\n\nRodrick breathes a sigh of relief, while Sebel looks confused.\n\nRodrick: Oh, that's good.\n\nSebel: Why would that be a bad thing?\n\nRodrick: It would depend on what's being offered, but let's just say it's never good or worth it. What was the offer out of curiosity?\n\nYou explain that it wanted some of your memories, and Rodrick explains that it wouldn't stop there.\n\nSebel: What do you mean? It would get what it wanted and leave, right?\n\n${name}: I thought so too.\n\nRodrick: No, by accepting the deal, you have given permission for it to make more and more until there's nothing left, so then it'll drain other things like your sanity or brain function, things like that.\n\n${name}: It's a good thing I didn't accept it then.\n\nRodrick: Yes, very much so.\n\nNow that your ordeal is over, you continue on to the old castle.\n\n*goto On\n\n*label deal\n\nRodrick looks at you with wide eyes.\n\nRodrick: You did what?!!\n\n${name}: Relax, what's done is done; we got out, didn't we?\n\nRodrick covers his face in frustration, then runs his hands through his hair.\n\nRodrick: You idiot, do you have any idea what you've just done?\n\nSebel: Woah, woah, calm down; please explain.\n\nRodrick: You first, ${name}.\n\nYou explain that it wanted some of your memories, and Rodrick explains that it won't stop there.\n\nSebel: What do you mean? It would get what it wanted and leave, right?\n\n${name}: I thought so too.\n\nRodrick: No, by accepting the deal, you have given permission for it to make more and more until there's nothing left, so then it'll drain other things like your sanity or brain function, things like that.\n\nShocked by the realisation, you start to panic.\n\n${name}: Oh my gosh, I didn't know there must be something I can do.\n\nYou grab Rodrick by his shoulders and beg him for help. Rodrick takes your hands away.\n\nRodrick: Calm down; there is a way to get out of the deal.\n\n${name}: How?\n\nRodrick: These creatures are bound by the deals they make; since you gave your memories in exchange for getting out, technically, that deal has been fulfilled, so you'll need to make a new one.\n\nYou step back.\n\n${name}: What!!\n\nRodrick: You need to set the terms; make it something it can't resist or find hard to do.\n\n${name}: How will that help?\n\nTim: They are bound by the terms that are set.\n\n*goto Back\n\n*label Back\n\nYou all enter the cave and walk a few paces in; soon, none of you can see a thing, but the air turns cold again.\n\nRodrick: It's here; I can sense it.\n\n${name}: Me too. Gonosoth, I need to talk to you.\n\nA deep blue mist appears from the ground, which forms into the figure known as Gonosoth. Sebel screams.\n\nGonosoth: Ah, you've brought more for me to play with.\n\nLike last time, you struggled to find the words to speak, but Rodrick nudged you.\n\nRodrick: You can do this; remember what we talked about.\n\n${name}: You like making deals. I've got one for you.\n\nGonosoth: How delightful! Please share.\n\n${name}: In a game, I have a dice and we each roll the highest number.\n\nGonosoth: What are the terms?\n\nIf I win, you leave me and my friends alone and never interfere with our lives in any way, and if you win, I will give you my magical abilities.\n\nSebel whispers to you.\n\nSebel: What are you doing?\n\nRodrick then whispers to Sebel.\n\nRodrick: What was suggested?\n\nGonosoth: Very interesting... I sense power within you.\n\nYou take a single die out of your pocket.\n\n${name}: Do we have a deal?\n\nGonosoth: We do.\n\nThe game may be simple; the risk is high and the odds of winning are low, but if you do manage to win, you'll be set free from Gonosoth's influence, so you roll the dice, hoping for a high number; it lands on three.\n\nGonosoth: My victory is certain.\n\nRodrick: You can't use magic to cheat; the rules of the deal forbid it.\n\nGonosoth: DO NOT SPEAK TO ME OF THE RULES; I know them well.\n\nGonosoth waves her hand as the dice rolls bounce off the wall and land on a two.\n\n${name}: Three beats two; I win.\n\nGonosoth screams so loudly and with such force that you're all blown out of the cave.\n\nGetting up, Rodrick tells you it's done and that you should continue with the quest.\n\n*label On\n\nAfter walking through the swamp, avoiding tar pits, and tolerating foul smells, you finally see the old castle surrounded by thorns and tar pits. As you get closer, be careful to avoid the thorns. The castle has vegetation on the walls; it covers the windows; and it is growing in and through the cracks in the stone.\n\nSebel: Wow, this is old.\n\nTim: Magic is within, but also danger.\n\nRodrick: We'll be careful, then.\n\nAs you enter the old castle courtyard, you sense the magical energies of the barrier. You look up.\n\n${name}: Of course it's on the top floor.\n\nA roar sends shivers down your spine. The beast comes out from around the castle, followed by another beast. Large scales cover their bodies, wings, and sharp teeth. They walk on two legs.\n\nSebel: Dragons!!!\n\nRodrick: It's the wyverns I mentioned.\n\nThe wyverns roar and flap their wings in a threatening manner.\n\n${name}: Rodrick You and Tim head for the caslte entrance myself, and Sebel will try and hold them off.\n\nSebel unsheathes her daggers, and you do the same with your sword as Rodrick runs towards the entrance with Tim on his shoulder.\n\nOne of the wyverns heads for Rodrick, and the other attacks Sebel. Who do you help?\n\n*choice\n #Help Sebel\n      *if (Combat >= 70)\n       *goto Help\n      *else\n       *set Health - 10\n       *goto Failed\n      \n #Help Rodrick\n      *if (Magic >= 80)\n       *goto Help1\n      *else\n       *set Health - 5\n       *goto Failed1\n\n*label Help\n\nYou rush towards Sebel, distracting the wyvern, who nearly bites your hand so that Sebel can climb onto the beast and continuously stab its back. The wyvern roars and desperately tries to launch Sebel off. When it finally does, she lands on her back and knocks her head on the ground. She lifts her head slightly and rubs it.\n\nSebel: Ow\n\n${name}: Are you okay?\n\nYou help her onto her feet.\n\nSebel: Yeah, I'll be fine.\n\nYou see Rodrick using a magical shield of sorts to block the wyverns attacks until it notices you and Sebel. Seeing the prospect of an easier meal, it joins the other wyvern. Rodrick then runs into the castle.\nBoth you and Sebel are being backed into the wall (literally) by the drakes who continue to approach.\n\nSebel: If I'm going down, I'm going down fighting. What about you?\n\n${name}: Hell yeah, I am.\n\nYou double-team one of the wyverns before moving onto the next. This strategy is dangerous, but it seems to work as the wyverns are noticeably wounded, so they both flee, giving you both the chance to follow Rodrick and Tim.\n*goto Top\n\n*label Failed\nYou rush to Sebel only to be knocked aside by the wyvern. Sebel uses the distraction to climb onto the beast and continuously stab its back. The drake roars and desperately tries to launch Sebel off. When it finally does, she lands on her back and knocks her head on the ground. She lifts her head slightly and rubs it.\n\nSebel: Ow\n\n${name}: Are you okay?\n\nYou help her onto her feet.\n\nSebel: Yeah, I'll be fine.\n\nYou see Rodrick using a magical shield of sorts to block the wyverns attacks until it notices you and Sebel. Seeing the prospect of an easier meal, it joins the other dragon. Rodrick then runs into the castle.\nBoth you and Sebel are being backed into the wall (literally) by the wyverns who continue to approach.\n\nSebel: If I'm going down, I'm going down fighting. What about you?\n\n${name}: Hell yeah, I am.\n\nYou double-team one of the wyverns before moving onto the next. This strategy is dangerous, but it seems to work as the drakes are noticeably wounded, so they both flee, giving you both the chance to follow Rodrick and Tim.\n*goto Top\n\n\n*label Failed1\nRodrick tries to hold the wyverns back with a magic shield of sorts. He notices you and tells you to stop. The wyvern turns around and starts attacking you. You raise your hand, and an ice ball starts to appear but then disappears. The wyvern goes for a bite, but you pull back just in time.\nBoth you and Sebel are being backed into the wall (literally) by the wyverns who continue to approach.\n\nSebel: If I'm going down, I'm going down fighting. What about you?\n\n${name}: Hell yeah, I am.\n\nYou enchant yours and Sebel's weapons to burn a bright and hot flame without affecting the weapons themselves.\n\nSebel: Oh my gosh, this is so cool.\n\nWith your fiery weapon in hand, you swipe, and the wyverns bite back. You deflect and counter until you see an opening in the wyverns soft underbelly, which you and Sebel take advantage of. The wyverns both roar in pain and flee. The enchantment wears off as they run, giving you boththe opportunity to follow Rodrick and Tim.\n\n*goto Top\n\n*label Help1\n\nYou rush towards Rodrick, who yells at you to stop. The wyvern turns around and starts to attack you, giving Rodrick the chance to enter the castle. Both you and Sebel are being backed into the wall (literally) by the drakes who continue to approach.\n\nSebel: If I'm going down, I'm going down fighting. What about you?\n\n${name}: Hell yeah, I am.\n\nYou enchant yours and Sebel's weapons to burn a bright and hot flame without affecting the weapons themselves.\n\nSebel: Oh my gosh, this is so cool.\n\nWith your fiery weapon in hand, you swipe, and the drakes swipe back. You deflect and counter until you see an opening in the drakes soft underbelly, which you and Sebel take advantage of. The drakes both roar in pain and flee, and the enchantment wears off as they run, giving you boththe opportunity to follow Rodrick and Tim.\n\n*goto Top\n\n*label Top\nThe castle isn't as big as you thought it would be; the doors on both sides of the hallway are covered in cobwebs, and at the end is a spiral staircase. You hear Rodrick complain about how many stairs there are, so you follow him up.\n\nYou make it up the first flight of stairs and see more doors with cobwebs; some of them still have spiders on them. You wonder what's behind the doors, but you move past them and continue up the stairs. You head up two more flights of stairs with the same number of doors before going up another, finally reaching the top. You and Sebel collapse to the ground, breathing heavily.\n\nSebel: Never...again.\n\n${name}: Yeah... Agreed.\n\nYou look up to see Rodrick and Tim observing the pendant, surrounded by the barrier. The room has stone columns from one end to the other on both sides, with a wooden door on either side of the room. The pendant is in the centre, and two large glass windows are behind you.\n\n${name}: Right, well, dispel it and let go.\n\nRodrick: I can't; I've tried.\n\nYou throw your hands up in the air in frustration.\n\n${name}: Great, what are we supposed to do now!?\n\nSebel: There might be some clues on how to get rid of the barrier.\n\nRodrick turns his head around.\n\nRodrick: Not the worst idea I've heard to try that; myself and Tim will look downstairs. Sebel, check the door on the right and the ${name} door on the left.\n\nWith your assignments, you enter the door on the left, waving away old cobwebs. The room is small, with an alchemy table against the wall. Several cracked and dirty vials cover it. You look to your left to see large broken glass branches peeking through the holes.\n\n${name}: It must have been where the mage made potions.\n\nYou notice a small book on the alchemy table and open it. Most of the words have worn out, but the diagrams are still readable.\n\n${name}: Wow, he really knew what he was doing.\n\nYou feel a prescene behind you. Turning around, you see nothing, so you run back around and continue looking through the book.\n\nVoice: You are too kind.\n\nYou drop the book in fright and draw your sword. You turn and slash, and the blade goes right through a ghost!!!\n\n${name}: Get away, foul creature.\n\nDelwyn: Hello to you too! My name is Delwyn, which means pretty and blessed.\n\nThe ghostly figure doesn't appear hostile; she has beautiful long hair and is wearing a long dress. Due to her being a ghost, you could only guess her colour; her pointy ears are bigger than you would have thought for an elf.\nYou put your sword away, and Delwyn smiles.\n\nDelwyn: I congratulate you and your friends for making it this far. I knew one day my pendant would be claimed.\n\nThe thing is, we don't even know what it does; we've come a long way, and the fate of the relationship is at stake.\n\nDelwyn: Then please tell your story.\n\nYou tell Delwyn everything about the cult Red and how dangerous and powerful he is.\n\nDelwyn: I made this pendant long ago, and while it stays here, I am bound to this plain.\n\n${name}: Thats awful.\n\nDelwyn: It can get lonely, but enough of my sorrow. When you wear my pendant, you can drain others of their power for a short time.\n\nYou're astounded by the power the pendant has.\n\nThen how do I break through the barrier?\n\nDelwyn: It can only be broken by killing the wyverns; they are bound to the barrier; once they have fallen, so will the barrier, and I can finally rest.\n\n${name}: Wait, so you use forbidden magic to erect this barrier and keep those wyverns alive?\n\nDelwyn: It wasn't forbidden in my time.\n\nYou nod in response, thank her, and leave the room where everyone else is waiting.\n\nSebel: Well, we found nothing useful, did you?\n\nYou tell everyone what you experienced.\n\nRodrick: Incredible.\n\nSebel: Yeah, yeah, ghost bound by pendant and blah blah, but how are we going to kill the wyverns? I don't want to go back downstairs only to come all the way back up.\n\nBut you won't have to, as the wyverns crash through the windows and their mouths drip with venom.\n\n*choice\n #Attack as a team.\n  *goto Team\n\n #Act on your own.\n  *set Health - 20\n  *goto Act\n\n*label Act\n\nYou grab a loose stone and throw it; this is quite effective at making the wyverns mad; they attack, and you blindly swing your sword, making it difficult for the others.\n\nSebel: Stop swinging that thing like a drunk.\n\nA wyvern cuts your hand with its claws. You drop your sword and clutch your hand in pain.\n\nSebel: Not to say you didn't deserve that.\n\nRodrick cups his hands together. An orange glow is visible through his closed hands. As he opens them, the orange light glows brighter. He throws it at the wyvern closet to him, and it's forced to the ground, unable to get back up despite its attempts.\n\nSebel twirls her daggers and narrowly avoids a wyvern's bite. Its neck is extended, and she stabs it with both daggers. It twitches and roars before collapsing to the ground, dying.\n\nThe other wyvern gets up after Rodrick's spell wears off, takes flight, and tries to flee.\n\n*choice\n #Throw your sword.\n  *goto Miss\n\n #Take it down with an arrow.\n  *goto Wing\n\n*label Team\nYou and Sebel double-team one of the wyverns, distracting and striking as one.\nRodrick cups his hands together. An orange glow is visible through his closed hands. As he opens them, the orange light glows brighter. He throws it at the wyvern closet to him, and it's forced to the ground, unable to get back up despite its attempts.\n\nSebel twirls her daggers and narrowly avoids a wyvern's bite. Its neck is extended, and she stabs it with both daggers. It twitches and roars before collapsing to the ground, dying.\nThe other wyvern gets up after Rodrick's spell wears off, takes flight, and tries to flee.\n\n*choice\n #Throw your sword.\n  *goto Miss\n\n #Take it down with an arrow.\n  *goto Wing\n\n*label Miss\n\nYou throw your sword as hard as you can, but it bounces off the wall. The wyvern looks like it's about to get away until the orange aura appears again and forces it to the ground. Its head is angled in a way it shouldn't be, and the wyvern isn't breathing.\n\nRodrick: Oh, it looks like my spell was still in effect.\n\n${name}: Thats lucky.\n\nThe second Wyvern succumbs to its wounds and breathes its last. Delwyn appears between the two bodies.\n\nDelwyn: You have done well. Take the pendant, but please promise me one thing.\n\n${name}: Whats that?\n\nDelwyn: When it has served its purpose, please destroy it, for in the wrong hands it can be quite dangerous.\n\nRodrick: We will.\n\nDelwyn smiles and waves her hand. You all turn around, and the barrier fades away. Turn back to thank Delwyn, but she's gone. You hear her voice one last time: \"Thank you.\"\n\nYou walk towards the pendant, and holding it in your hands fills you with hope.\n\nSebel: So this is helping us defeat Red?\n\n${name}: If what Delwyn said was true, then yes, it will.\n\nRodrick asks if anyone needs healing.\n\n*choice\n #No thanks\n  *goto NoThanks\n\n *selectable_if (Health \u003c100) #Yes Please \n  *goto Heal2\n\n*label Wing\n\nYou take out your bow and fire. The arrow hits the wyvern in one of its wings, and it crashes to the ground. Its head is angled in a way it shouldn't be, and the wyvern isn't breathing.\n\nRodrick: Good shot.\n\n${name}: Thanks.\n\nThe second Wyvern succumbs to its wounds and breathes its last. Delwyn appears between the two bodies.\n\nDelwyn: You have done well. Take the pendant, but please promise me one thing.\n\n${name}: Whats that?\n\nDelwyn: When it has served its purpose, please destroy it, for in the wrong hands it can be quite dangerous.\n\nRodrick: We will.\n\nDelwyn smiles and waves her hand. You all turn around, and the barrier fades away. Turn back to thank Delwyn, but she's gone. You hear her voice one last time: \"Thank you.\"\n\nYou walk towards the pendant, and holding it in your hands fills you with hope.\n\nSebel: So this is helping us defeat Red?\n\n${name}: If what Delwyn said was true, then yes, it will.\n\nRodrick asks if anyone needs healing.\n\n*choice\n #No thanks\n  *goto NoThanks\n\n *selectable_if (Health \u003c100) #Yes Please \n  *goto Heal2\n\n*label Heal2\n*set Health (100)\nRodrick heals yours and Sebel's wounds with Tim's help.\n*goto forest\n\n*label NoThanks\n\n${name}: I got lucky; I'm okay.\n\nSebel: You have a few cuts, and you don't look great, but it's your funeral.\n\nRodrick heals Sebel's wounds.\n*goto forest\n\n*label forest\n\nWith the pendant in your pocket, you all walk away from the ruins. The sun is setting and only Tim can see in the darkness. You make camp near the ruins, hopeful to avoid the horrors of the deadlands, and thankfully, you do. You continue to make your way to the tower to confront Red.\n\nRodrick: Myself and Tim will be returning to the capital at a shorter distance.\n\nSebel: Is it possible to fly or something? We'll have to travel to the other side of the country!!!\n\nRodrick: I found these downstairs.\n\nRodrick pulls out the same small crystals that Fern used to give you.\n\nSebel: Oh, thank whatever gods may be there.\n\nRodrick: Oh, so you've seen these before.\n\nYou nod.\n\n${name}: Yeah, when we were gathering the artefacts before.\n\nTim: These take you somewhere.\n\nSebel: But where? I don't want to use them only to end up back in the deadlands.\n\n${name}: Maybe there's a way to find out?\n\nRodrick shakes his head from side to side.\n\nRodrick: Sadly, there isn't, and you may just have to hope.\n\nYou and Sebel each take one.\n\nSebel: Ugh, fine, but I swear, if we end up back there, I'll kill you.\n\nYou each step on them, and a thick white smoke starts to engulf you.\n\nRodrick: Remember, these crystals haven't been used in hundreds of years, so they could be volatile.\n\nSebel: You could have told us that before we...\n\nBefore Sebel could finish her sentence, you're both gone as the smoke begins to disappear.\n\nTim: Shall we continue our journey?\n\nRodrick: Lets.\n\nRodrick continues to walk when Tim speaks up.\n\nTim: Where did they go?\n\nRodrick: No idea, but I'm sure they will be fine.\n\nUnfortunately for you, he's wrong.\n\nSebel: I'm going to kill him!!!\n\nYou find yourself surrounded by really big scorpions with your backs against a tree.\n\n${name}: Why do we always get the dangerous creatures?!\n\n*choice\n #Burn them\n      *if (Magic >= 80)\n       *goto burn\n      *else\n       *set Health - 30\n       *goto poison\n      \n #Climb a tree\n  *goto stuck\n\n*label poison\n\nYou stretch out your hand and try to cast a stream of fire, but before you can finish the spell, a scorpion strikes your hand with his stinger. The pain is intense; it feels like your hand is on fire. As the veins pop out, your hand starts to pulsate and turn purple.\n\nSebel: We're going to die if something isn't done soon.\n\nSebel is right, so you use the spell to conjure a wall of fire between you two, and the scorpions back away, giving you both time to climb the tree before the flames get lower and die.\n\nThe scorpions surround the tree and desperately try to reach you.\n\nSebel: Got any more ideas?\n\n${name}: Trying to think of one.\n\nDespite your best efforts, you can't think of a single thing that would help, nor can Sebel, so you have no choice but to wait it out. It takes hours and hours before the scorpions get bored and give up. Once they are out of sight, that's when you finally climb down.\n\nSebel: We need to get out of here.\n\nAnd find out where we are.\n\nYou look at your hand; it's still pulsating, but now you can't feel it.\n\nIt's evident from the lush green of these woods that you're not in the deadlands, but you could be anywhere, so you head in the opposite direction to the scorpions. You walk for days and days, finally seeing a small town on the horizon, which you manage to reach just after midday. The scorpions poison has now spread to your arm, which has become numb, your vision blurs, and you collapse.\n\nSebel kneels and puts her hand on your head.\n\nSebel: Just hold on; we're almost there.\n\nSebel stops a local and asks where you can get help.\n\nLocal: Oh my, you both look awful. You're in the town of Isvald, friend. I would suggest you go to the local temple; they will take care of you.\n\nSebel thanks him and asks where it is. The local tells you, and you head there.\n\nThe priests clean you up, cure you of the poison, clean your clothes too, and give you a warm meal before sending you on your way.\n*set Health (100)\nSebel: I feel like a new woman.\n\n${name}: This has been great but still doesn't explain in what land we are.\n\nAs amoured soldiers walk through the town, you notice the crest on their shields to be of House Kov.\n\n${name}: Well, the crystals weren't that far off; they could have been worse.\n\nSebel: I would rather deal with a dragon than a bunch of scorpions.\n\nSo you're in Kov's territory, which is where Ferns Tower is located. You spend another day in the town before making plans to reach the tower to confront Red. The problem is, it's not on any map or road sign.\n\n*choice\n #Ask at the temple.\n  *goto temple\n\n #Ask the locals\n  *goto local\n\n*label burn\nYou strech out your hand, and a stream of fire engulfs one of the scorpions. It screech in pain before dying.\n\nSebel: You can't defeat them all.\n\nSebel is right, so you use the spell to conjure a wall of fire between you two, and the scorpions back away, giving you both time to climb the tree before the flames get lower and die.\n\nThe scorpions surround the tree and desperately try to reach you.\n\nSebel: Got any more ideas?\n\n${name}: Trying to think of one.\n\nDespite your best efforts, you can't think of a single thing that would help, nor can Sebel, so you have no choice but to wait it out. It takes hours and hours before the scorpions get bored and give up. Once they are out of sight, that's when you finally climb down.\n\nSebel: We need to get out of here.\n\nAnd find out where we are.\n\nIt's evident from the lush green of these woods that you're not in the deadlands, but you could be anywhere, so you head in the opposite direction to the scorpions. You walk for days and days, finally seeing a small town on the horizon, which you manage to reach just after midday.\n\nSebel: I knew I should have left when I had the chance.\n\n${name}: You tried that, remember?\n\nYou stop a local and ask where you are.\n\nLocal: Oh my, you both look awful; you're in the town of Isvald, friend.\n\n${name}: Thank you.\n\nLocal: I would suggest you go to the local temple; they will take care of you.\n\nYou thank him once again, ask where it is, and the local tells you, and you head there.\n\nThe priests clean you up and your clothes too, and they give you a warm meal before sending you on your way.\n*if (Health \u003c100)\n *set Health (100)\nSebel: I feel like a new woman.\n\n${name}: This has been great but still doesn't explain in what land we are.\n\nAs amoured soldiers walk through the town, you notice the crest on their shields to be of House Kov.\n\n${name}: Well, the crystals weren't that far off; they could have been worse.\n\nSebel: I would rather deal with a dragon than a bunch of scorpions.\n\nSo you're in Kov's territory, which is where Ferns Tower is located. You spend wn before making plans to reach the tower to confront Red. The problem is, it's not on any map or road sign.\n\n*choice\n #Ask at the temple.\n  *goto temple\n\n #Ask the locals\n  *goto local\n\n*label local\n\nSebel goes to the temple to ask while you ask several locals about anything regarding a tower made of crystal, but most think you're making it up until you pass by an old begger.\n\nOld begger: Tower of crystal, huh? You seek the fairy.\n\nYou walk over to him and kneel in front of him.\n\n${name}: How do you know?\n\nOld begger: I've seen it there in the woods.\n\nHe points to the woodland outside of the town. I followed him and saw a tall tower like the one you're looking for.\n\n${name}: Where? in what direction?\n\nThe old begger reaches into his pocket and hands you a small piece of parchment.\n\nOld begger: Its all on here. I wanted to know people, but many now see the Sidhe as nothing more than stories, but you and I know the truth.\n\n${name}: That we do; thank you, sir.\n\nOld begger: Do you have any change to spare?\n\n*choice\n #Of course\n  *set Evil -5\n  *set Good +5\n  *goto change\n\n #I do, but not for you.\n  *set Good -5\n  *set Evil +5\n  *goto Nochange\n\n*label temple\n\nWhile Sebel offers to ask the locals, you go back to the temple to ask. You enter the temple and find the nearest priest.\n\nPreist: Ah, it's you; I trust you are well.\n\n${name}: Thank you. I am fine now.\n\nPreist: That is good to hear. What can I do for you? \n\n${name}: Do you know of a tower made of crystal near here? or around the area?\n\nThe preist thinks for a moment.\n\nPreist: I have heard rumours, but that's all they could be.\n\n${name}: Haven't you tried to investigate those rumours?\n\nPreist: I see no reason to potentially risk life and limb on a whim; an old begger came here once and spoke of such a thing, but he was clearly seeing things.\n\n${name}: Perhaps...thank you.\n\nPreist: You're welcome, and I'm sorry I can't be of more help.\n\nYou nod and ern: I underestimated Red and his cultists, but they saved me time and effort.\n\nHe looks at Red's body and smiles.\n\n${name}: But why? Just because I'm your child doesn't mean you should destroy your people. That's a bit of an overreaction, don't you think?\n\nFern laughs.\n\nFern: You fool, they didn't banish me for having a half breed; they banished me because I already tried once to destroy them and would have won if it wasn't for your mother.\n\n${name}: What does she have to do with it!?\n\nFern: Let's just say she distracted me from my true destiny.\n\nSebel: I think you overestimated your chances—you against your entire race, come on.\n\nFern: Perhaps I did even with my secret weapon; you see, this portal doesn't lead to Tír na nÓg at all but somewhere else entirely.\n\nSebel: You tricked the cultists?\n\nFern: For all their power, they didn't even know the difference between the portal to home and to different realms, such as the chaos realm where he was sealed.\n\n${name}: Who?\n\nYou hear a beastly roar from the gateway. You both raise your weapons, ready to defend yourselves, but Fern just laughs.\n\nHe then faces the portal.\n\nFern: You are free now after so many years; now we can finish what you and I started.\n\nA claw reaches out of the gateway, followed by the creature's head.\n\n${name}: What the hell is that!?\n\nSebel: Nothing good.\n\nThe beast towers over you; its wide, scaly wings send chills down your spine. Black scales cover its body, and yellow eyes and a mouth so large it could swallow you in one.\n\nFern turns to you.\n\nFern: It's not too late, you know?\n\n${name}: What do you mean?\n\nFern: I mean, you can join us. Think about it: no more lords and kings ruling over the populace in a world where everyone is treated fairly and equally regardless of who they are. You can rule alongside me.\n\nSebel: That's crazy; you'll never create a world like that!!!\n\nFern: Because what's fair to me isn't the same, but with you, my child, at my
