g them, with a little bit of help from your badass-looking new trident.\n                Brandishing your trident you and your warriors raise from the waves, surrounding the ship. You can tell the land-walkers are getting nervous, and this is only the beginning.\n                At a barely perceptible nod of your head the spell-casters begin the process of summoning a thunder strike from the cloudless sky and slowly raise your trident.\n                \n                As awesome as it might look, that is not the reason of its status as a legendary weapon. Before it was awarded to warrior prince Ariel it was imbued with magic, allowing the wielder to redirect lightning at will.\n                Of course for that to work you first need lightning, and that's exactly what the spell-casters are working on right now.\n                *page_break\n                Fixing your eyes on the largest of the vessel's three masts you wait for the bolt of lightning, willing it towards your target.\n                As it is hit the mast snaps in two, catching fire as fast as a dry twig. That ought to motivate the land-walkers to do as you say.\n                *goto demands\n            #Strike a deal with the land-walkers, promising to let them go free if they hand over their captives.\n                You reckon the pillar of ice keeping them stuck in place should be plenty to get the land-walkers' attention, so you don't really need to do anything more than that.\n                \n                Swimming up to the surface you get the spell-casters to illuminate the water behind you so you stand out, and address the land-walkers.\n                \n                \"Return our brothers and sisters to us, and we'll let you leave unharmed.\"\n                \n                Despite the effort it takes them to stop the ice from crushing their vessel you hear the land-walkers sneer at your words, and with a loud bang something small soars past your cheek, landing in the water with a soft splash.\n                They should have accepted what you offered them when they had the chance.\n                *page_break\n                With an angry glare at the land-walker who fired the shot you sink beneath the waves. Despite your somewhat peaceful intentions it seems you have no choice but to obliterate them after all.\n                \n                The spell-casters already know what you want them to do before you even voice it, and they ram a massive spear made from ice through the center of the vessel at which it breaks in two. Then they melt the pillar of ice keeping the pieces in place and the two halves sink almost immediately.\n                Some of the land-walkers are sucked down along with it helplessly flail with their limbs for a short few moments, and then go limp forever. They can't last for long outside of their waterless domain.\n                \n                Much to your relief sinking the vessel also freed the captured merfolk, and though they are a bit in a daze at least their bodies aren't all that severely damaged.\n                *goto catchupwithnereid\n            #Free your captured brethren using force.\n                *goto useforce\n\n*label merfolkreturned\n\nIt's a heated argument, and two opposing factions seem to form, one much larger than the other. Being severely outnumbered the smaller faction doesn't stand a chance, and before long their most vocal member, already mortally injured in the fray, is flung into the waves below, sinking into the raging seas within seconds.\n*page_break\nNot knowing which side won you and the warriors at your side tense up, not sure which of the two scenarios to expect. Thankfully it quickly becomes apparent that the decision made was in your favor, as your fellow merfolk are flung into the waters in a rather haphazard manner.\nYour spell-casters rush out to find them and treat them if necessary, and shortly thereafter you get a message that though they are not in a great state all of them will live, though they are pretty shaken.\n*label catchupwithnereid\n*achieve freenereid\n\nAs the spell-casters are packing up after having done everything for the injured they were capable of with the limited means at their disposal Nereïd swims up to you, a shaky smile on her face.\n\n*if (nereidangry)\n    \"Well, at least you didn't mess up when it counted...\"\n    \n    You roll your eyes at Nereïd's casual remark, knowing that she doesn't mean any harm by it. \"Of course I didn't. I had to make sure those land-walkers didn't steal away my BFF after all.\"\n    \n    Nereïd grimaces and wraps her arms around you.\n    \n    \"[i]I was so scared.[/i]\"\n    \n    Not knowing what else to do you gently pat her head and softly rock her side to side for however long it might be necessary.\n    *page_break\n    *goto fightnereid\n\"Well, that sure was something. I knew you were coming to save us sooner or later, but it was still a bit frightening.\"\n\nYou smile at your best friend and put a comforting hand on her shoulder. \"Hey, I've never let you down before, remember?\"\n\nNereïd nods slightly and stretches out her arms to you for a big hug. She undoubtedly needs a bit of comforting right now.\n*page_break\n*label fightnereid\nAs you and Nereïd swim side to side on your way back home you finally get to know what the land-walkers were trying to achieve by abducting your fellow merfolk.\nAccording to her the land-walkers were discussing a place called Port Irwin, a name that's without a doubt connected to Uncle Irwin in some way, and what kind of prizes they could fetch for them on the black market.\nIt sounded like a particular woman in red might be willing to make them a proper offer.\n*if (stories_completed > 2)\n    She sounds familiar, somehow, but you can't really pinpoint from where. This book seems to be making your memories all hazy.\n\nThe image of your fellow merfolk being sold like fish on a market makes you shudder. Who knows what beings as cruel as the land-walkers would have done to fragile little Nereïd and your other captured brethren.\n\nWhile you are discussing various possible scenarios your eye is caught by an odd black box that comes drifting down from the surface. That doesn't look like it belongs here...\nWith a shock you realize that it's a modern photo camera. What is an object like that doing in an era where humans still travel across the ocean in wooden ships?\n\nThe strange object catches Nereïd's attention as well, and she plucks it from the water. Then she turns it around to show it to you, and you notice that the otherwise black apparatus's got a wide red rim around the edge.\nWhat use would there be to that?\n*page_break\nAll of a sudden Nereïd shrieks and moves her arm as if attempting to throw away the camera, but it's somehow stuck to her hand.\nYou move over to help her, but a strong current pushes you away, leaving you watching helplessly as scales of a sickly green color spread across her skin starting at the hand holding the camera.\nStaring at her monstrously warped features you call out her name and move forward in an attempt to either calm her or get close enough to grab a hold of the camera.\n\nThough the monstrosity hesitates for a short moment, during which you catch a glimpse of the person she used to be, it still lashes out, forcing you to dive out of the way in order not to be sheared in half by its razor sharp claws.\n\nAlright. The direct approach clearly isn't going to cut it. You'll need a better plan.\n*choice\n    #Render the monster harmless using hypnotic interpretative dance.\n        If Nereïd was somewhat conscious right now she'd have scolded you for coming up with something that ridiculous in the first place.\n        Then again it's not a possibility your average monster would take into account, so who knows. It might actually work...\n        \n        *if soul > 69\n            Giving it your best shot you pour your heart and soul into your performance, lithely avoiding the monster's strikes.\n            Making sure light filtering down from above strikes the colorful scales of your tail at exactly the right angle you slowly swing it from side to side like a pendulum, and the monster slowly becomes mesmerized by the sight.\n            It's movements grow more and more sluggish, and even yawns a few times. Just a bit more...\n            \n            The monster blinks a few times, and then its eyes finally fall shut as it sinks into the soft sandy seabed. You cautiously move closer, carefully prying the photo camera from Nereïd's claws, and sigh in relief as the scales vanish and she takes on her original shape and color.\n            *goto good_end\n        You try to give this plan of yours your best shot, but as soon as the monster mover forward your concentration falters and you stop just long enough for the monster to run you through with its massive claws.\n        The water turns green with your blood, and you feel your consciousness fading.\n        *goto bad_end\n    #Figure out the monster's main weakness and exploit it.\n        *if mind > 69\n            Now that you think about it, you've seen monsters like this before. Not in the flesh of course, but in one of the many books you've read. One of the old folk-tales speaks about a twisted monster with scales in a sickly green color.\n            Though it's described as possessing destructive strength it's also said to be fairly slow. You might as well put that part of the legend to the test.\n            \n            You turn around and swim away from the monster as if trying to flee, and though it gives chase immediately it can't keep up.\n            Seems like your book smarts are useful for something after all.\n            \n            You quickly swim over to a nearby pillar of rock and hide behind it, not to have the monster lose sight of you, but to get a jump on it.\n            Swimming closer to the surface you take position behind a ledge high up the pillar and wait. Any moment now...\n            *page_break\n            The monster clears the pillar and looks around in confusion, unable to determine where you went. Knowing that this'll most likely be the best chance you'll get you dive straight down, using gravity to your advantage.\n            The monster swings its claws at you, but you gracefully steer around them and smack straight into its back with your shoulder, knocking the monster to the sea floor.\n            At this point getting a hold of the camera is child's play, and you rip it from Nereïd's deformed hand, sighing in relief as the scales vanish and she takes on her original shape and color.\n            *goto good_end\n        This might've been a good idea if you had actually known what to look for. Now you just stare at the monster like an idiot as it approaches.\n        There must be something you could come up with, right?\n        \n        Because you are so deep in thought you only try to get out of the monster's way when it's already too close.\n        It's massive claws sink into your side, and the water turns green with your blood as your consciousness slips away.\n        *goto bad_end\n    #Try to trap the monster between two pieces of rock.\n        Those sharp claws'd make short work of you, so you'd better keep some distance.\n        Luckily there's a rocky mountain range nearby where you'd undoubtedly be able to find something to incapacitate the monster without having to get too close.\n        \n        Swimming through the narrow cracks that run crisscross through most of the mountain a thought occurs to you. Maybe you could wedge a big rock between the monster and the rock walls, pinning it in place.\n        It'd probably only hold for a short while, but if that camera is the cause of all this that should be plenty.\n        \n        Navigating through the narrow passages, the monster still hot on your heels, you keep your eyes peeled for a suitable location, and put your plan into motion at the earliest possible occasion.\n        *if body > 69\n            Using your shoulders you push a large shard of rock forward, trapping the monster between the two pieces of rock. It screeches in defiance, but you ignore it, using a smaller shard of rock to keep its claws safely out of your way.\n            Then you pry the camera from Nereïd's hand, and sigh in relief as the scales vanish and she takes on her original shape and color.\n            *goto good_end\n        You put your shoulders against a large shard of rock, but no matter how much you push it doesn't budge. Then the monster is suddenly right in front of you, and you are skewered by its large claws.\n        The water turns green with your blood, and you feel your consciousness fading.\n        *goto bad_end\n\t\t\n*label good_end\n*set dofd true\n*set stories_completed +1\n\nThen the world turns white, like a blank page, and you find yourself standing in the bookshop, holding a piece of paper that looks like it was torn out of a book. It has a picture of a black photo camera on it.\n*page_break\n*goto_scene bookshop_scenes\n\t\n*label bad_end\n\nThen the world turns white, like a blank page, and you find yourself lying on the bookshop floor in the real world.\n*goto_scene bookshop_scene_fail", "bookshop_scene_fail": "*set health 50\n\n*set mind_name \"Mind\"\n*set soul_name \"Soul\"\n*set body_name \"Body\"\n*set health_name \"Health\"\n\nYou're dazed but you can feel yourself recovering rapidly. You may need to return to that book at some point and finish the story successfully. Or perhaps it will all be all right. Maybe you already have what you need from there.\n*gosub_scene trial_end\nTaking a steadying breath, you select a book and place it on the reading stand.\n*check_purchase adfree\n*fake_choice\n\t*if (mansion = false)\n\t\t#[i]The mansion of D'Anjou[/i], by Adrao\n\t\t\t*set genre \"adrao2\"\n\t*if (dandd = false)\n\t\t#[i]Dragons and Devices[/i], by Cecilia Rosewood\n\t\t\t*set genre \"cecilia_rosewood\"\n\t*if (queen = false) \n\t\t*selectable_if (choice_purchased_adfree) #[i]The Queen's Child[/i], by Felicity Banks\n\t\t\t*set genre \"felicity\"\n\t*if (cop = false) \n\t\t*selectable_if (choice_purchased_adfree) #[i]New Heaven Cop[/i], by Adrao\n\t\t\t*set genre \"adrao\"\n\t*if (dofd = false) \n\t\t*selectable_if (choice_purchased_adfree) #[i]The Danger of the Deep[/i], by Cecilia Rosewood\n\t\t\t*set genre \"atlantis\"\n\t*if (daze = false) \n\t\t*selectable_if (choice_purchased_adfree) #[i]College Daze[/i], by Felicity Banks\n\t\t\t*set genre \"felicity2\"\n\t*if (sash = false) \n\t\t*selectable_if (choice_purchased_adfree) #[i]The Case of the Loathed Lord[/i], by Sashira\n\t\t\t*set genre \"sashira\"\n\t*if (stories_completed > 5) \n\t\t*selectable_if (choice_purchased_adfree) #No. One book isn't enough. You take all the books and pile them precariously onto the book stand before tipping it over so they all open at once.\n\t\t\t*set genre \"patchwork\"\n\nAs you open the book the world turns white, the color of a blank page. You close your eyes against the brightness, and when they open again you are in another place.\n\n*if genre = \"adrao2\"\n\t*goto_scene adrao_second_story\n*if genre = \"cecilia_rosewood\"\n\t*goto_scene cecilia_rosewood_tale\n*if genre = \"felicity\"\n\t*goto_scene felicity_tale\n*if genre = \"felicity2\"\n\t*goto_scene addicted_tale\n*if genre = \"adrao\"\n\t*goto_scene adrao_tale\n*if genre = \"atlantis\"\n\t*goto_scene atlantis\n*if genre = \"sashira\"\n\t*goto_scene sashira_tale\n*if genre = \"patchwork\"\n\t*goto_scene patchwork_tale", "bookshop_scenes": "*set health 50\n\n*set mind_name \"Mind\"\n*set soul_name \"Soul\"\n*set body_name \"Body\"\n*set health_name \"Health\"\n\n*if stories_completed = 0\n\tThe books in the glass cases form an eclectic collection of various genres, themes and writing styles.\n\tOn first glance they don't seem to have any connecting factor between them, but there must be one, right?\n\t\n\tWhy else would uncle Irwin have put them aside like this?\n\t\n\tThe glass cases are easily removed, leaving you with a collection of books to choose from.\n\t*goto pick_a_book\n*elseif stories_completed = 1\n\t*goto one\n*elseif stories_completed = 2\n\t*goto two\n*elseif stories_completed = 3\n\t*goto three\n*elseif stories_completed = 4\n\t*goto four\n*elseif stories_completed = 5\n\t*goto five\n*elseif stories_completed > 5\n\t*goto more\n\n*label pick_a_book\n*gosub_scene trial_end\nYou select a book and place it on the reading stand.\n*check_purchase adfree\n*fake_choice\n\t*if (mansion = false)\n\t\t#[i]The Mansion of D'Anjou[/i], by Adrao\n\t\t\t*set genre \"adrao2\"\n\t*if (dandd = false)\n\t\t#[i]Dragons and Devices[/i], by Cecilia Rosewood\n\t\t\t*set genre \"cecilia_rosewood\"\n\t*if (queen = false) \n\t\t*selectable_if (choice_purchased_adfree) #[i]The Queen's Child[/i], by Felicity Banks\n\t\t\t*set genre \"felicity\"\n\t*if (cop = false) \n\t\t*selectable_if (choice_purchased_adfree) #[i]New Heaven Cop[/i], by Adrao\n\t\t\t*set genre \"adrao\"\n\t*if (dofd = false) \n\t\t*selectable_if (choice_purchased_adfree) #[i]The Danger of the Deep[/i], by Cecilia Rosewood\n\t\t\t*set genre \"atlantis\"\n\t*if (daze = false) \n\t\t*selectable_if (choice_purchased_adfree) #[i]College Daze[/i], by Felicity Banks\n\t\t\t*set genre \"felicity2\"\n\t*if (sash = false) \n\t\t*selectable_if (choice_purchased_adfree) #[i]The Case of the Loathed Lord[/i], by Sashira\n\t\t\t*set genre \"sashira\"\n \n*comment Do we want to make ourselves the in-world authors of each book - eg SweetScarlet's tale would be described as \"\"Romantic Title\" by Sweet Scarlet\"?\n*comment I was thinking of using hide_reuse for the above list, but then the player couldn't retry a scene in order to get the macguffin. Without hide_reuse, they can get the macguffin multiple times, and gain super stats. But if someone wants to play each scene five times, why not? Aunt Iris could have used a photocopier to make dozens of each macguffin and kept them somewhere safe within each world for her convenience, so it doesn't break the story.\n \nAs you open the book the world turns white, the color of a blank page. You close your eyes against the brightness, and when they open again you are in another place.\n\n*if genre = \"sashira\"\n\t*goto_scene sashira_tale\n*if genre = \"adrao2\"\n\t*goto_scene adrao_second_story\n*if genre = \"cecilia_rosewood\"\n\t*goto_scene cecilia_rosewood_tale\n*if genre = \"felicity\"\n\t*goto_scene felicity_tale\n*if genre = \"felicity2\"\n\t*goto_scene addicted_tale\n*if genre = \"adrao\"\n\t*goto_scene adrao_tale\n*if genre = \"atlantis\"\n\t*goto_scene atlantis\n\n*label one\nThe radio crackles, and you grab it. You just found yourself wandering through a work of fiction. Something is going on, and you desperately hope Uncle Irwin's voice will reassure you that you haven't gone insane.\n\n\"$!{name}!\" he says.\n\n\"Uncle Irwin!\" you say aloud, forgetting for a moment that he can't hear you.\n\n\"My radio has a light that turns on when you're close enough to make contact,\" he says. \"Knowing you, if you opened one of the books, you're probably questioning your mental state about now. Don't worry. Your Aunt Iris and I never did figure out how it works, but it does. Or it did, until she died last year. Honestly I couldn't bear to travel without her until now... and then all this happened. Ouch!\"\n*page_break\nYou clutch the radio tighter as you hear him panting for breath. \"Your aunt left dozens of macguffins hidden in each book, so she could travel in and out at her convenience. A macguffin is a plot device - you have to get it because you have to get it. All Iris' macguffins are objects. They're easy to spot, because they don't belong. If you want to get out, you need to go through the story and get the macguffin. She always hid them at the ending. Not a fan of unfinished plotlines, your aunt, but she left a doozy of a plot complication for me and I don't think I'm the right kind of-- Let go of me! I'm not--\"\n\n\"Uncle Irwin!\" you shout helplessly.\n\nThere's no reply. \n\nFeeling like you should hurry, you turn to the books, putting the radio in your pocket. Uncle Irwin is trapped inside those books somewhere. Somehow. \n*goto pick_a_book \n*label two\nIt's odd that the macguffins turn into paper in the real world, but the radio stays in your pocket inside the books. There's something about it that is both real and fictional, and that element makes it work. \n\nLooking at the last book you traveled through, you feel certain that its cover is brighter, its pages crisper. It's as if the book is young again. You flip through the pages, wondering idly if you'll suddenly appear in the text. Instead you find huge passages crossed out in red pen, and whole pages torn from the spine. One chapter has vanished entirely. Shaken, you put down the book and find exactly the same heartless destruction inside the other book you traveled through - but no others. And the cover is definitely more appealing than when you first touched it. Something about your adventures into fiction is both healing and destroying the books.\n\nAt least you've got one more macguffin now. Maybe they can help you reach Uncle Irwin. You wrap the radio in the pieces of paper and attempt to contact him.\n\n\"Hello? I just heard a beep. How did you do that?\"\n\nYou push the speaker button, and hold your breath.\n\n\"Hah! You did something, didn't you? Beep twice for 'Yes'.\"\n\nYou beep twice, and hear Uncle Irwin's belly-shaking laugh. \"Well done! Now tell me, are you all right?\"\n\nYou beep twice. \n\n\"Do you think you can figure out how to find me?\"\n\nWincing, but reminding yourself that he surely can't tell if you're lying, you beep twice.\n\n\"Hmm,\" he says. \"Why do I get the feeling you're trying to make me feel better?\" He sighs audibly. \"I'm in the Colosseum right now - it's only half built so it's not busy yet.\"\n\n[i]Could be an alternative history[/i], you think, reaching eagerly for a book with a temple on the cover.\n\n\"Uh oh,\" Uncle Irwin continues. \"My shoe just started ringing.\"\n\n[i]Ah! A spy book.[/i]\n\n\"Oh, fudge,\" he says. \"I just spotted my ex-girlfriend. This is all about to turn pear-shaped.\"\n\n[i]Um... what ex-girlfriend? He never mentioned an ex.[/i]\n\n\"Argh! Marie Curie! And she's got a ray gun! And she's riding a dragon! I've got to run!\"\n\nMore frantic and more confused than ever, you grab another book. Maybe with more macguffins, the radio will work better. If Uncle Irwin survives that long.\n*goto pick_a_book\n*label three\n\"Uncle Irwin?\" you say into the radio. \"Can you hear me?\"\n\n\"$!{name}?\" he says. \"Is it really you? But how?\"\n\n\"You're all right!\" you say. \"Are you?\"\n\n\"I'm fine,\" he says - and it's your turn to spot a lie from a thousand paces. \n\n\"How do I get to you?\" you ask.\n\n\"You're doing it,\" he says with false cheer. \"I just met someone - Queen Victoria, as a matter of fact - who mentioned you.\"\n\n\"She... really? What did she say?\"\n\n\"Well... she sent assassins after you. But it's progress.\"\n\n\"But how? Why? I haven't even been to Britain!\"\n\n\"The lady in red did it. Iris used to keep her in check, and you're clearly threatening her somehow.\"\n\n\"You don't know how?\" you ask.\n\n\"I'm sorry, no,\" he says, then breaks off to speak quickly in French.\n\n\"Where are you?\"\n\n\"Er... the French Revolution.\"\n\n\"Don't tell me you're about to get guillotined.\"\n\nHe laughs weakly. \"Okay, I won't.\"\n\n\"Uncle Irwin!\"\n\n\"Not to worry,\" he says. \"It's 3:00 pm and the sky just turned black. I imagine I'm about to find myself in outer space. Or in a cthulhu. Or in a really overdone metaphor.\"\n\n\"What?! That's not helpful! And why --\"\n\n\"I'll be fine,\" he said. \"Just - hurry.\"\n\nYou grab another book, and hope it gets you one step closer.\n*goto pick_a_book\n\n*label four\nWith another macguffin added, the radio is crystal clear. Uncle Irwin really is fine - and it's high time he explained some things.\n\n\"You've probably guessed by now,\" he says guiltily. \"But I'm not real. That is, I wasn't born real.\"\n\nThere is a gentle susurration of static as you try to figure out what to say - or think. \n\n\"Iris met me a long time ago, and she brought me into your world. We were so in love!\"\n\n\"Yes,\" you say gently. \"You always were a special couple. I miss her too.\"\n*fake_choice\n\t#Your aunt was a very special person.\n\t#Which is a complete lie, of course, but you're trying to stay on your uncle's good side.\n\t#Not that you particularly care, but you have to be respectful of the dead, right?\n\n*if (mc_in_relationship)\n\t\"Now that we're on that topic anyway, there's someone you might want to talk to,\" says Uncle Irwin, and you can hear a smile in his voice that doesn't match any of the dangers of emotions you're both still going through. \"Does the name $!{npc_name} ring a bell?\"\n\t\n\tYour breath huffs out of you.\n\t*comment You have a convo with $!{npc_name}, and they encourage you before passing you back to Uncle Irwin.\n\t\n\t*if ((npc_name = \"Lorenzo\") or (npc_name = \"Gianna\"))\n\t\t\"Uhm, hi? ${name}, is that you?\"\n\t\t\n\t\tA familiar voice sounds from the speaker of your radio, and your heart makes a little leap. That's ${npc_name}'s voice. It really is.\n\t\t\n\t\t\"Hello? ${name}? Are you there?\"\n\t\t\n\t\tYou snap out of your astonishment, and hold the sender part of the radio closer to your mouth. \"Ah yes, it's me, ${name}. What happened over on that side? How did you ever run into uncle Irwin?\"\n\t\t\n\t\t${npc_name} sighs, and you hear some rustling sounds. \"Well, It's crazy, really. One day everything was perfectly ordinary, just like how it was when you were here, and then everything just started to fall apart. Not in the sea of lava, mind you, things just started to appear and reappear at random, not all of them things that actually belong to my world.\n\t\tI kinda freaked out when my half put-together version of your radio thing vanished, even though it never worked. According to your uncle Irwin I'd need some components from your world as well. But anyway, only a few seconds later I somehow ended up right next to the thing on top of a hill with a view of some sort of castle with a village surrounding it.\n\t\tThat's where I met your uncle Irwin, and he knew a thing or two about what is going on around here, and how you two are really the only ones who can do something to fix it, so I decided to stick around. We're somewhere else now, and you won't believe some of the things I've seen. It gets pretty crazy out here.\"\n\t\t\n\t\tAfter that gush of words ${npc_name} is silent for a bit, probably trying to figure out what to say next. Then you hear a sigh, which brings up a mental image of ${npc_name}'s 'trying to focus on something' face pops up in your head.\n\t\tIf you ever get the chance you'll have to try to see if you can get this little radio to transmit images between worlds as well. You'd really like to be able to see ${npc_name} right now.\n\t\t\n\t\tThe radio crackles a bit as ${npc_name} speaks again. \"Sorry. I got a bit carried away there. Anyway, I wanted to tell you that whatever it is that you're up against, you'll be able to take care of it.\n\t\tI know you can. And if things get tough, please remember that I love you.\"\n\t\t\n\t\tYou can't help but to blush at ${npc_name}'s encouraging words, and more importantly at the \"I love you\", though you're not going to mention that out loud since uncle Irwin is undoubtedly eavesdropping on the conversation.\n\t\tInstead you mumble an \"I love you too\", and then ${npc_name} hands the radio back to uncle Irwin.\n\t\t*page_break\n\t\tYou hear some rustling on the other side of the line, and then uncle Irwin's voice sounds through the radio again.\n\t\t\"It's a nice kid, that ${npc_name} of yours. Kudos for choosing that one.\"\n\t\t\n\t\tYou hear a nervous cough in the background, and uncle Irwin rasps his throat.\n\t\t*goto continue_story\n\t*elseif ((npc_name=\"Vivian\") or ((npc_name=\"Cecil\") or (npc_name=\"Wexley\")))\n\t\t*if npc_name = \"Vivian\"\n\t\t\tA voice the opposite of your uncle's carries across the radio, one like silver bells. \"$!{name}, darling? Is that really you?\"\n\t\t\t\n\t\t\t\"Vivian,\" you say, almost laughing for joy. \"How are we talking right now? Are you with Uncle Irwin? How did he find you?\"\n\t\t\t\n\t\t\t\"Hush,\" Vivian scolds you. \"Didn't I teach you about questions? There will be time for all of that later.\" Despite the crackling of the radio, you can hear the affection in her tone.\n\t\t\t\n\t\t\t\"So, what would you like to talk about, Lady Vivian?\" you ask, smiling.\n\t\t\t\n\t\t\tShe laughs. \"You can drop the title, $!{name}. I told you, I'm only a lady through my late husband, and then only in England. And I don't think I'm in England any more.\"\n\t\t\t\n\t\t\tYou tell her, \"You are going to love books. The ones that were written after 1900, I mean. And movies, and modern fashion...\" You trail off. \"It's just great to talk to you again.\"\n\t\t\t\n\t\t\t\"Agreed, darling. I have to go now. When next we meet, we'll talk about all the embarassing things your uncle has shared with me,\" Vivian teases.\n\t\t\t\n\t\t\t\"Fantastic,\" you tell her, and pause. \"Wait - what things?\"\n\t\t\t\n\t\t\t\"Later!\" she laughs, and is gone. A nervous cough signals that you are once again speaking to Uncle Irwin.\n\t\t*if npc_name = \"Cecil\"\n\t\t\t\"Hello? Is this device real?\" asks a familiar, confused voice.\n\t\t\t\n\t\t\t\"Cecil!\" you shout in delight. \"It's you!\"\n\t\t\t\n\t\t\t\"It's me! And it's you!\" he agrees cheerfully. \"So much has happened since I saw you, $!{name}... but we can talk about that when we're together again.\" He pauses. \"The world is so much bigger than I thought, $!{name}. It's all very beautiful and I wish I had you with me.\" His voice is as honest as you've ever heard it.\n\t\t\t\n\t\t\t\"Soon,\" you say, only half-hearing yourself. \"If you're talking to me now, almost anything is possible, right?\"\n\t\t\t\n\t\t\tCecil pauses ominously. \"Does that mean I could, in theory, get you to wear a full-length velvet frock coat?\"\n\t\t\t\n\t\t\t\"...We'll have to talk about that later, Cecil.\"\n\t\t\t\n\t\t\t\"I must be going, anyway. Your wonderful uncle is eyeing this speaking apparatus. Goodbye, treasured one,\" he says, and is gone. A nervous cough signals that you are once again speaking to Uncle Irwin.\n\t\t*if npc_name = \"Wexley\"\n\t\t\tThere's a long pause while you wonder whether the radio is still receiving. Then a low, husky voice transmits across the wires. \"$!{name}? Are you there?\"\n\t\t\t\n\t\t\t\"Yes, it's me!\" you answer. \"Wexley, why are you with my Uncle Irwin?\"\n\t\t\t\n\t\t\tHe chuckles throatily. \"We've been watching each other's backs. How've you been? Had to kill any monsters?\"\n\t\t\t\n\t\t\tYou think back to your experiences in the other stories. \"Wexley... you have no idea.\" You close your eyes for a moment. \"I just wish I had you with me.\"\n\t\t\t\n\t\t\t\"Soon, maybe,\" he says. \"We're working on a way.\"\n\t\t\t\n\t\t\t\"Really?\" you ask. \"Is it going well? How are you going to -\"\n\t\t\t\n\t\t\t\"You fight your fight,\" he says firmly. \"We'll do what we can. It will all work out. I can feel it.\" You can almost feel his touch across the sound waves, supporting you.\n\t\t\t\n\t\t\t\"Until later then,\" you reply, trying to sound cheerful.\n\t\t\t\n\t\t\tWexley returns, a hint of a smile in his voice, \"It's better than goodbye.\" Then, he's gone, replaced by a nervous cough that signals the return of Incle Irwin.\n\t\t*goto continue_story\n\t*elseif (adrao_tale_relationship = 1)\n\t\t\"Now that we're on that topic anyway, there's someone you might want to talk to,\" says Uncle Irwin, and you can hear a smile in his voice that doesn't match any of the dangers of emotions you're both still going through. \"Does the name ${navigator_name} ring a bell?\"\n\t\t\n\t\tYour breath huffs out of you.\n\t\t\n\t\t\"${navigator_salute1}, is that you?\"\n\t\t\n\t\tA familiar voice sounds from the speaker of your radio, and your heart makes a little leap. That's ${navigator_name}'s voice. It really is.\n\t\t\n\t\t\"${navigator_salute1}. Are you there?\"\n\t\t\n\t\tYou snap out of your astonishment, and hold the sender part of the radio closer to your mouth. \"Ah yes, it's me, ${name}. What happened over at that side? How did you ever run into uncle Irwin?\"\n\t\t\n\t\t${navigator_name} sighs, and you hear some rustling sounds. \"Well, It's crazy, really. One day everything was perfectly ordinary, just like how it was when you were here, and then everything just started to fall apart. \n\t\tThings just started to appear and reappear at random, not all of them things that actually belong to my world.\n\t\tSomehow I ended up right next to the thing on top of a hill with a view of some sort of castle with a village surrounding it.\n\t\tThat's where I met your uncle Irwin, and he knew a thing or two about what is going on around here, \n\t\tand how you two are really the only ones who can do something to fix it, so I decided to stick around. We're somewhere else now, and you won't believe some of the things I've seen. It gets pretty crazy out here.\"\n\t\t\n\t\tAfter that gush of words ${navigator_name} is silent for a bit, probably trying to figure out what to say next. \n\t\tIf you ever get the chance you'll have to try to see if you can get this little radio to transmit images between worlds as well. You'd really like to be able to see ${npc_name} right now.\n\t\t\n\t\tThe radio crackles a bit as ${navigator_name} speaks again. \"Sorry. I got a bit carried away there. Anyway, I wanted to tell you that whatever it is that you're up against, you'll be able to take care of it.\n\t\tI know you can. And if things get tough, please remember that I love you.\"\n\t\t\n\t\tYou can't help but to blush at ${navigator_name}'s encouraging words, and more importantly at the \"I love you\", though you're not going to mention that out loud since uncle Irwin is undoubtedly eavesdropping on the conversation.\n\t\tInstead you mumble an \"I love you too\", and then ${navigator_name} hands the radio back to uncle Irwin.\n\t\t*page_break\n\t\tYou hear some rustling on the other side of the line, and then uncle Irwin's voice sounds through the radio again.\n\t\t\"It's a nice kid, that ${navigator_name} of yours. Kudos for choosing that one.\"\n\t\t\n\t\tYou hear a nervous cough in the background, and uncle Irwin rasps his throat.\t\t\n\t\t*goto continue_story\n*label continue_story\n\n\"Anyway, here's hoping we can sort this out,\" your uncle says. \n\n\"Where are you right now?\" you ask.\n\n\"The Wombat and the Queen,\" he says happily. \"Where Iris and I first met.\"\n\n\"Of course.\"\n\n\"Oh,\" he says. \"I'm afraid some aliens just attacked. Somehow I think it's me they're after, so I'd better get going, and draw them away. This isn't a good place for them.\"\n\n\"I'm going to find you! We'll fix this!\"\n\n\"Of course you will,\" he says gently. \"Huh. I did not expect to see Lincoln again. Well, I'd better go before that ancient forest gets too thick to run through.\"\n\n\"I'm grabbing another book right now!\"\n\n\"Good,\" he says, \"because mff erg.\"\n\nAll you can hear is hissing before the sound cuts out altogether. Without a moment to lose, you grab another book.\n*goto pick_a_book\n*label five\n\"$!{name}!\" shouts Uncle Irwin. \"Help! Please come quickly! I can't keep going - it's too quick! She's going to kill me! The lady in red is going to kill me!\"\n*goto pick_a_book_plus\n*label more\nAll those macguffins, and still you can't find Uncle Irwin! All your journeys are making you stronger, but if you don't save Uncle Irwin it's all for nothing.\n*label pick_a_book_plus\nYou select a book and place it on the reading stand.\n*fake_choice\n\t#No. One book isn't enough. You take all the books and pile them precariously onto the book stand before tipping it over so they all open at once.\n\t\t*set genre \"patchwork\"\n\t*if (dandd = false)\n\t\t#[i]The Mansion of D'Anjou[/i], by Adrao\n\t\t\t*set genre \"adrao2\"\n\t*if (dandd = false)\n\t\t#[i]Dragons and Devices[/i], by Cecilia Rosewood\n\t\t\t*set genre \"cecilia_rosewood\"\n\t*if (queen = false)\n\t\t#[i]The Queen's Child[/i], by Felicity Banks\n\t\t\t*set genre \"felicity\"\n\t*if (cop = false)\n\t\t#[i]New Heaven Cop[/i], by Adrao\n\t\t\t*set genre \"adrao\"\n\t*if (dofd = false)\n\t\t#[i]The Danger of the Deep[/i], by Cecilia Rosewood\n\t\t\t*set genre \"atlantis\"\n\t*if (daze = false)\n\t\t#[i]College Daze[/i], by Felicity Banks\n\t\t\t*set genre \"felicity2\"\n\t*if (sash = false)\n\t\t#[i]The Case of the Loathed Lord[/i], by Sashira\n\t\t\t*set genre \"sashira\"\n\nAs you open the book the world turns white, the color of a blank page. You close your eyes against the brightness, and when they open again you are in another place.\n\n*if genre = \"adrao2\"\n\t*goto_scene adrao_second_story\n*if genre = \"cecilia_rosewood\"\n\t*goto_scene cecilia_rosewood_tale\n*if genre = \"felicity\"\n\t*goto_scene felicity_tale\n*if genre = \"felicity2\"\n\t*goto_scene addicted_tale\n*if genre = \"patchwork\"\n\t*goto_scene patchwork_tale\n*if genre = \"adrao\"\n\t*goto_scene adrao_tale\n*if genre = \"atlantis\"\n\t*goto_scene atlantis\n*if genre = \"sashira\"\n\t*goto_scene sashira_tale", "cecilia_rosewood_tale": "*set body_name \"Strength\"\n*set mind_name \"Intelligence\"\n*set soul_name \"Wit\"\n\n*if (stories_completed \u003c 1)\n    You blink against the light. It's wrong. Even at the brightest day of year uncle Irwin's library room wouldn't be this bright. Not to mention that the color is off. It's too red, like sunset. And where's the ceiling?\n    \n    You look up and flinch away as you look straight into the sun, or rather, [i]a[/i] sun. It's smaller than the one you're familiar with, and a deep crimson, like it's a different star altogether. Just where are you?\n*if (stories_completed >= 1)\n    You blink against the light. It's wrong somehow. The color is off. It's too red, like sunset, yet you can see the sun almost straight overhead.\n\nYour first instinct is to look away from the burning ball of gases, but for some reason the light doesn't hurt your eyes.\nYou squint your eyes and look again, only now discovering the thin sheet of transparent material that acts as something akin to sunglasses in front of your eyes.\nThat's odd. You weren't wearing anything like that before.\n\nAs you move your hand to touch the visor you notice you're wearing gloves as well. Huh.\n*if (stories_completed \u003c 1)\n    When did that happen? Were you somehow drawn into the book you placed on the reading stand, or something?\n*if (stories_completed >= 1)\n    Did your clothing change to something more genre appropriate or something?\n*page_break\nAs you're wondering about this strange turn of events you hear a soft giggle, and someone pokes you with a stick. Still slightly disoriented you sit up and look around for the culprit.\nThe little girl pokes you again, and you grab the stick in annoyance. \"What was that for?\"\n\nShe grins, her bright white teeth standing out against her ash-covered skin, and completely ignores your question.\n*if he =\"she\"\n    \"Ey lady,\n*if he =\"he\"\n    \"Ey mister,\n*if he =\"they\"\n    \"Ey ya,\ndid ya fall outa tha sky or sumfing? Ya alive and all tha?\"\n\nYou grumble something that probably shouldn't be heard and get up, using a wrecked piece of wall as support. Of course you're alive. How else does she expect you to be able to move?\nThe little girl continues to stare at you with an annoying curiosity, and you ignore her, brushing the worst of the ash off of your new (or at least, new to you) clothes.\nThat grimy stuff is pretty much everywhere.\n\nYou are startled by a distant sound and the little girl darts off. Is that a good or a bad thing?\nEither way you don't have much time, because the now recognizable sound of footsteps is steadily drawing closer.\nYou don't really know what's going on, but you have to do something, right?\n*choice\n    #Hide behind the wrecked piece of wall.\n        *set mind %+10\n        Acting on instinct you hop over the wall and try to blend in with the surroundings. At least your new clothes don't stand out.\n        The ash grey coverall with metallic grey patches is almost the exact same color as pretty much everything around here.\n        You just hope your helmet isn't painted in some contrasting color.\n        \n        As you sit there you hear the familiar giggle of the girl close by, and the sound of footsteps stops.\n        You tense up and try not to make a sound.\n        \n        \"That's odd. I'm sure there was some stranger at this place only a few minutes ago,\" a female voice says. \"Do ya know where ${he} went, Maria?\"\n        You hear the little girl apparently called Maria giggle, but you can't hear her reaction. Maybe she shook her head or something.\n        The woman seems annoyed at her response. \"Didn't I tell ya ta keep an eye on ${him}? Why did ya have to walk off like tha?\"\n        The little girl giggles again, and the woman, probably her mother, sighs. \"We have ta find the poor soul, don't we, Cap'n?\"\n        \n        You freeze in place. You'd already figured out there was a third person from the footsteps, but that that person is a captain of some sort makes it feel a bit more frightening.\n        It sounds too much like a military rank.\n        \n        It is silent on the other side of the wall for a long time, and you can't help but to take a peek.\n        Turns out that was a bad idea. Once again frozen in place you can't help but to stare at the armored person staring straight at you.\n        \"You might as well step out in the open, ya know.\"\n        *page_break\n        Having been discovered you straighten up and walk out in the open, throwing some uneasy glances at the two-and-a-half people in front of you.\n        *goto guardintroduction\n    #Wait and see what happens.\n        *set soul %+10\n        The little girl didn't look frightened when she darted off, so you might as well trust that assessment.\n        Crossing your arms in front of your chest you turn in the direction of the sound and wait.\n        \n        After a while the little girl skips back into view, closely followed by a woman and a person clad in armor that somehow manages to look ancient and hypermodern at the same time.\n        The woman nudges the armor-clad person with her elbow. \"Look Cap'n, there ${he} is.\"\n        *page_break\n        *goto guardintroduction\n    #Prepare to fight.\n        *set body %+10\n        Not knowing what's going on makes you feel uneasy, so you rip a piece of stainless steel wall plating off of the wrecked wall.\n        As you tense to fight you grab it so that you can use the sharp point as a weapon, all the while wishing you had an actual weapon to defend yourself with.\n        \n        After a while the little girl skips back into view, closely followed by a woman and a person clad in an armor that somehow manages to look ancient and hypermodern at the same time.\n        You're outnumbered two to one, with a little girl as innocent bystander, so this isn't exactly an ideal situation.\n        \n        You eye the people now frozen in place a few paces in front of you, gaze lingering on the woman who draws the little girl close to her body in a protective gesture.\n        Those two are obviously not a threat, and the armor-clad person doesn't make any threatening moves either, so you decide to take a gamble and drop the sharp piece of metal.\n        The tension in the air dissolves almost immediately.\n        \n        The woman looks up at the armor-clad person with an uncertain look on her face. \"Whaddaya think, Cap'n. Is it safe ta move closer?\"\n        The armor-clad person nods. \"Sure. All things considered ${he} seems like a reasonable fella.\"\n        *page_break\n        *goto guardintroduction\n\n*label guardintroduction\n*temp npc \"\"\n*temp npc_he \"\"\n*temp npc_his \"\"\n*temp npc_him \"\"\nYou can't help but notice the two-handed sword and plasma gun attached to the Captain's belt. It's clear who you've got the most to fear from.\n\nSeeming completely at ease the captain gestures at the other two. \"Might as well introduce ourselves, right?\"\n\nStill ill at ease you nod, and the captain points at the girl. \"This little troublemaker's called Maria. If there's trouble brewing on the island she'll be the first to find out.\"\n\nWith a hand gesture the captain moves on to the woman. \"As you might've figured out already this woman is Maria's mother. Her name is Carmen. She lives in one of the repair shops at the dock with her husband Pete, Maria, and their two other brats.\"\n\nYou see Carmen frown at the captain's choice of words for that last bit, but since she doesn't comment on it that title must've been given to her two other children for a reason.\n\nAfter your assessment of that situation you turn your attention back to the captain. \"And who or what are you?\"\n\nThe captain grimaces at your blunt words, but doesn't make any threatening moves. \"I'm the local captain of the guard. You may call me\n*choice\n    #Gianna.\"\n        *set npc \"Gianna\"\n        *set npc_he \"she\"\n        *set npc_his \"her\"\n        *set npc_him \"her\"\n        *goto guardintroductiondone\n    #Lorenzo.\"\n        *set npc \"Lorenzo\"\n        *set npc_he \"he\"\n        *set npc_his \"his\"\n        *set npc_him \"him\"\n        *goto guardintroductiondone\n\n*label guardintroductiondone\nYou politely nod your head in acknowledgement, not yet trusting the strangers enough to shake hands.\n\nAs the awkward silence drags on ${npc} scratches behind ${npc_his} ear. \"This is nice and all, but I'm afraid I don't have time to hang around here much longer. Though we don't get visitors around here too often I'm afraid I've got more important things to do at the moment.\"\n\nYou tense up at ${npc_his} words. Whatever that important thing is, chances are that it's connected to this book's main storyline.\nStill feeling a bit nervous around the captain it takes you a while to gather enough courage to ask about it, but by that time ${npc_he}'s already walked off.\nYou rush after ${npc_him}, the other two staring at you with curiosity and a bit of suspicion. \"Hey, wait up,\" you call out to ${npc_him}. \"I need to ask you something.\"\n\nThe captain doesn't stop to wait for you, but ${npc_he} does slow down enough for you to catch up, eyeing you with curiosity and a bit of amusement.\n\"So, what kind of question do you have that's important enough to approach an unknown and armed guard captain for?\"\n\nYou roll your eyes. \"Well, you did introduce yourself before, so you're not all that unknown...\" \nYour words trail off, and you see ${npc_him} raise an eyebrow. Flustered, you avoid ${npc_his} gaze. \"Anyway, could you tell me a bit more about that important thing you were talking about before.\nIt might have to do with the reason I'm here to begin with.\"\n\n${npc}'s expression changes from curiosity to suspicion. \"And what might that be exactly?\"\n\nYou shrug. \"I wish I knew. The only thing I do know is that something big is going on around here, and that I need to help to do something about it.\"\n*page_break\nFor a while you follow ${npc} in silence, wondering if you screwed up somehow. Then ${npc_he} stops and points at a large, metal-clad tower, the shape vaguely reminding you of the cooling tower of a nuclear power plant.\n\"Do you see that tower over there? That's where this island's main engine is kept.\"\nYou nod in acknowledgement, and then frown.\n*fake_choice\n    #What would an island need an engine for?\n        The question must've been visible on your face, because ${npc} throws you an incredulous look. \"You really aren't from around here, are ya?\"\n        You shrug. \"Obviously. Which is why I don't have a clue what an island would need an engine for.\"\n        ${npc} lets out an exasperated sigh. \"To keep the island afloat, of course.\"\n        \n        You frown. \"On what?\"\n        \n        \"On the air! Or would you rather be down below, floating in lava?\"\n        \n        ${npc} looks like ${npc_he} could snap at any moment now, so you keep your mouth shut. It was probably a rhetorical question anyway. But still, lava? That doesn't sound like a good thing. It explains the massive amount of ash though.\n        *page_break\n        After a while ${npc} has calmed down to the point where you dare to approach ${npc_him} again. \"So... What's wrong with the main engine that is more urgent than keeping an eye on the suspicious person that suddenly showed up at the island only a few minutes ago?\"\n        \n        ${npc} groans in exasperation, and for a moment you're afraid ${npc_he}'s going to hit you. Then ${npc_he} sighs, and you relax.\n    #How old would that tower even be?\n        The tower looks well-maintained, but doesn't look like it was built recently.\n        In fact, it looks more like it's at least as old as the ruins you saw earlier.\n        \n        The question must've been visible on your face, because ${npc} throws you a surprised look. \"You really aren't from around here, are ya?\"\n        \n        You shrug. \"Obviously. Which is why I don't know anything about the history of this place.\"\n        \n        ${npc} nods. \"Well, most of the larger buildings on the island are pretty old. From before of the last great war even, which ended some two-hundred years ago.\n        The tower was built during that war in order to protect the engine that keeps the island afloat in the air, high above the ocean of lava below.\"\n        \n        Lava? Well, that explains the amounts of ash scattered all over the place at least.\n        *page_break\n        *label curiosity\n        After a short while your curiosity gets the better of you again.\n        \n        \"So... What's wrong with the main engine that is more urgent than keeping an eye on the suspicious person that suddenly showed up at the island only a few minutes ago?\"\n        \n        ${npc} sighs, looking slightly tense all of a sudden.\n    #Did all the buildings on the island once look like that?\n        The futuristic style of the tower forms a stark contrast with the ruins surrounding you, but you can't help but wonder if they'd originally been built in the same style.\n        It looks like the same materials were used in their construction, at least.\n        \n        ${npc} notices your interest, and leads you to a larger chunk of material still standing upright despite the destruction surrounding it.\n        \n        \"This island used to be an important port city, back in the day. Most of the buildings around here used to contain the offices of important businesses who traded goods across the globe.\n        Prosperity didn't last, however, as tensions between the two largest alliances eventually turned into a full-blown war. Because this island was located smack dab in the middle of the battlefield it has been bombarded countless of times by both factions.\n        Lots of buildings got destroyed in the process, but because of the limited amount of resources and manpower available only the tower built to protect the island's main engine was ever properly restored.\n        If that would have been destroyed our ancestors would all've plummeted into the ocean of lava below, after all.\n        The buildings around here must originally have been built in the same architectonic style though. You can still see traces of that in the larger chunks of rubble that remain.\"\n        \n        You frown. There's an ocean of lava somewhere beneath this island? That's odd. It does explain the ash though.\n        *page_break\n        *goto curiosity\n\n\"In short, we're out of fuel, and it doesn't look like we'll be able to get our hands on some that easily. It's been months since the last supply caravan passed by, and even they were running low.\"\n\nYou nod in understanding. \"So you're going to crash and burn unless someone steps in and saves the day?\"\n${npc} grimaces. \"Basically.\"\n\n\"And you're the person supposed to do that?\"\n\n\"Yeah.\"\n\nIt is silent for a while, and you wonder if you asked too much again. Then ${npc} stretches ${npc_his} arms and groans.\n\"Oh, alright. You can tag along. Just don't get in my way, alright?\"\n\nYou grin and follow right behind ${npc_him} as ${npc_he} walks off. Now you're getting somewhere.\n*page_break\nAfter a short walk you find yourself at some sort of dilapidated market. It must've been a bright and lively affair at some point, but with all the ash the only places where you can actually see the bright colors of the covers of the stalls are on the undersides.\nIt's also uncharacteristically quiet for this time of day. Unless you just happened to walk in during lunch time there are way too few people here.\nYou contemplate asking ${npc} about the situation, but decide against it. $!{npc_he}'s already got plenty of things to worry about without you being nosy.\n\nWhile you make an honest effort to follow ${npc} to wherever it is ${npc_he}'s heading to, you are distracted by the sight of a heap of fabric piled up in a particularly dusty corner of the plaza.\nYou move in to investigate, and ${npc} follows behind you. As you run your hands along it you notice that the fabric's got an oddly familiar texture. It feels like the stuff they use to make hot air balloons back in the real world.\nHow did that stuff get here?\n\nJust as you ask yourself that ${npc} puts a hand on your shoulder, and you flinch. At this ${npc_he} quickly withdraws ${npc_his} hand and looks at you apologetically before getting to what ${npc_he} wanted to say. \"One of the last trade caravans dumped that stuff here. It belonged to some crazy scientist type person that traveled along with them, but since he couldn't figure out what to do with it his traveling companions got annoyed and forced him to get rid of it.\nWe don't really know what to do with it either, so it was just left here. If you want some of the stuff you can just take it. It's of no value to us.\"\n\nThat offers some possibilities. A hot air balloon could come in handy considering that you are stuck on a floating island. You'd need to find a basket though, and a source of heat.\n*page_break\nAfter a while ${npc} gets tired of watching you stare at the pile of fabric and walks off, so you reluctantly follow ${npc_him}. As interesting as that stuff might be it is of no use if you don't know where to go.\n\nAs you get further away from the marketplace the buildings surrounding you begin looking more and more like the ruins at the place you woke up at. This must've been a bustling city at some point, but right now there's not much left of its former glory.\nYou absentmindedly wonder if that's got something to do with the fuel running out as well.\n\nYour mind is pulled back to the here and now as ${npc} abruptly comes to a stop and you bump into ${npc_him}.\nJust as you want to ask why ${npc_he} stopped all of a sudden you spot the dragon. She is an absolutely gorgeous creature, roughly the size of a decent sized house and covered with scales the color of rusty copper.\n\nWhile you're gawking at her ${npc} steps forwards and addresses her in some language, which is unintelligible to you.\nThe dragon nods in understanding and slowly walks past ${npc_him} until she is close enough for you to touch her, her head lowered to the point where her eyes are on eye level.\n*fake_choice\n    #Your focus is mainly drawn to her razor sharp arm length teeth.\n        The dragon's teeth are kinda difficult to ignore when they're this close. She's a dragon, of course, so it makes sense for her to have teeth like that, but still.\n        It would probably be very easy for her to bite you in half.\n        *page_break\n        After standing there for a while, as motionless as a statue and almost too scared to breath, the dragon says something in her unintelligible language, clearly expecting a response.\n        Not having a clue what to do you throw ${npc} a panicked look. Thankfully ${npc_he} reacts quickly and moves to stand between you and the dragon.\n        After a few words from ${npc_his} side the dragon moves back, and you take a shaky breath.\n        \n        As you try to regain your bearings you see ${npc} chuckling from the corner of your eye, and you get the urge to slap ${npc_him}.\n        You suppress the impulse though, and ${npc_he} turns to you, the amusement still visible in ${npc_his} eyes.\n    #You find yourself staring back at her breathtaking silver-gold eyes.\n        The dragon seems amused by your interest and winks at you. Alright. That's pretty weird. She must've been here for a pretty long time to be able to mimic human gestures like that.\n        \n        You try to move closer to get a better look at the dragon's eyes, which is not something she seems to appreciate. She pulls back her head with a soft grumble, the glow of fire visible behind her teeth, and you back off raising your hands.\n        ${npc} moves in between the two of you, acting as some sort of buffer. $!{npc_he} says something to the dragon, and she closes her mouth, her eyes still fixed on you.\n        ${npc} then turns to you.\n    #Her rusted copper colored scales are even more beautiful from up close.\n        The dragon follows your every move with interest, amused by your fascination for her scales. She recoils when you reach out to touch them though, growling softly.\n        You must've gotten a bit closer than she's comfortable with.\n        \n        \"Sorry about that. I've just never seen such beautiful scales before.\"\n        \n        The dragon tilts her massive head as if trying to understand what you're saying, but failing. She must not speak the same language as ${npc} then.\n        \n        You try to move closer again and she growls more threatening than before, this time with the glow of fire behind her massive razor sharp teeth.\n        This startles you, causing you to raise your arms in defense, and ${npc} steps in between the two of you to defuse the situation.\n        $!{npc_he} says something to the dragon, causing her to relax her stance, before turning back to you.\n\n\"Judging by your reaction I assume you haven't met a dragon before?\"\n\nYou grimace. \"The only places they exist in my world are books and fairy tales, so yeah, I haven't.\"\n\n${npc} raises an eyebrow, and you realize you slipped up. \"Your world? You mean you're not just a stranger to this place, but are actually from an entirely different world altogether?\"\n\nYou shrug. \"It sounds crazy, I know.\"\n*page_break\nWhile you'd half expected ${npc} to transport you straight to the local madhouse ${npc_he} simply frowns. Maybe your previous behavior and lack of general knowledge about pretty much everything have at least made ${npc_him} consider the possibility.\n\"So... you're not from this world, and the only places in your world where dragons exist are books... Does that mean that this whole world, me included, are just some scribbles in some book existing in your world?\"\n\nWow. $!{npc_he} sure doesn't beat around the bush. Feeling slightly embarrassed you grin sheepishly. \"Yeah, sorry about dropping that one on you.\"\n\n${npc} simply shrugs. \"Oh, don't worry about that. I'm not gonna go through some existential crisis because of it.\" $!{npc_he} pauses, and then grins.\n\"And besides, maybe you're just some character in some book too. I mean, traveling through books isn't all that normal either.\"\n\nYou grimace at that. \"Yeah, now that you mention it... That does sound just about right.\"\n*page_break\nAfter a long conversation under the watchful eye of the dragon, who you still haven't properly introduced yourself to, despite ${npc}'s instructions on how to use the universal translator unit that is apparently built into your helmet, the conversation suddenly turns to the subject of magic.\nYou've asked ${npc} about the nature of the fuel that's used in the island's main engine, and it turns out to be rather complicated.\n\n\"Oh, the fuel we use for that is crystallized magic. It's what the engine was built to run on, and we really don't want to experiment with other fuels on that scale since that might end up with us plummeting to a fiery death.\"\n\nYou blink in surprise. \"Wait, you've got magic here?\"\n\n${npc} rolls ${npc_his} eyes and casually summons up a ball of fire just above the palm of ${npc_his} left hand. \"As you can see. In this day and age the air is simply brimming with it. In the old days you had to have matter on hand to be able to perform elemental magic, but now the magic density in the air is so great you can just summon your element of choice out of thin air, so to speak.\"\n\nA wide grin appears on your face, and your hands tingle with excitement. \"That's so frikkin' cool. Do you think I could do that too?\"\n\n${npc} shrugs. \"I don't see why not, aside maybe from that book hopping thing. Just stretch out your hand and visualize a ball consisting of some sort of element floating above it.\"\n\nYou excitedly stretch out your dominant hand with your palm facing the sky, close your eyes and take a deep breath.\nWhat element should you try to summon up?\n\n*temp element \"\"\n\n*choice\n    #Fire.\n        *set element \"fire\"\n        You try to focus on the element of fire, but you're not sure how to do that. In the end you settle on the mental image of a burning candle. That's some sort of fire, right?\n        But even as you focus on that image you don't get the feeling that anything happens, so you take a peek at your hand, only to open your eyes all the way as you see what's happening over there.\n        While it's nowhere near as large or clearly defined as ${npc}'s fireball there is a small flame floating just above your palm.\n        You stare at it in awe until ${npc} extinguishes it with one small gesture.\n        *goto enoughofmagic\n    #Air.\n        *set element \"wind\"\n        You try to focus on the element of air, but you're not sure how to do that. In the end you settle on the mental image of a moving fan. That's some way to manipulate air, right?\n        But even as you focus on that image you don't get the feeling that anything happens, so you take a peek at your hand, only to open your eyes all the way as you see what's happening over there.\n        While it doesn't look anything like ${npc}'s fireball there is a miniature tornado floating just above your palm.\n        You stare at it in awe until ${npc} swipes it away with one small gesture.\n        *goto enoughofmagic\n    #Water.\n        *set element \"water\"\n        You try to focus on the element of water, but you're not sure how to do that. In the end you settle on the mental image of an open faucet. That's some sort of water, right?\n        But even as you focus on that image you don't get the feeling that anything happens, so you take a peek at your hand, only to open your eyes all the way as you see what's happening over there.\n        While it doesn't look anything like ${npc}'s fireball there is a small puddle of water floating just above your palm.\n        You stare at it in awe until ${npc} swipes it away with one small gesture.\n        *goto enoughofmagic\n    #Earth.\n        *set element \"earth\"\n        You try to focus on the element of earth, but you're not sure how to do that. In the end you settle on the mental image of a mountain. That's some sort of earth, right?\n        But even as you focus on that image you don't get the feeling that anything happens, so you take a peek at your hand, only to open your eyes all the way as you see what's happening over there.\n        While it doesn't look anything like ${npc}'s fireball there is a small chunk of rock and dirt floating just above your palm.\n        You stare at it in awe until ${npc} swipes it away with one small gesture.\n        *goto enoughofmagic\n\n*label enoughofmagic\n\n\"I get that this whole magic thing is very interesting to you, but I'd say it's about time to get going. If we stay here for much longer we'll never be able to get off of the burning wastes before nightfall, and that's the worst time of day to be stuck there.\"\n\nYou sigh at that, but get up from the ground anyway. It looks like it's time to get back to business.\n*page_break\nOne quick look at the sky reveals that the sun is already about to set, so you frown and turn to ${npc}.\n\"Exactly how long is it supposed to take to get to those burning wastes anyway?\"\n\n${npc} shrugs. \"Oh, about fourteen hours, so if we leave now we'll get there nice and early.\"\n\nYou frown. \"But won't flying for fourteen hours straight put some serious strain on the dragon? I can imagine she wouldn't like that much.\"\n\n${npc} sighs. \"Yes, it will, and we try to avoid that whenever we can, but since the shuttle we used to use for short to middle long distances runs on the same stuff as the island's main engine that isn't a valid option anymore, and we don't have any other alternatives.\"\n\nYou absentmindedly nod your head. \"Yeah, that makes sense, but don't you have more low-tech means of transportation around here? Things that don't require fuel, like hot-air balloons or hang-gliders?\nSince there is elemental magic in this world you should be able to fly those just using some of that.\"\n\nNow it's ${npc}'s turn to look puzzled. \"Hang-gliders? Hot-air balloons? I've never heard of those things before. Are those used in your world or something?\"\n\nYou roll your eyes in exasperation. These people are so much more technologically advanced than the ones back home, yet they fail to make use of some of the most basic principles of physics?\nWhat a strange world this is.\n*temp balloon false\n*page_break\nYou give ${npc} a short explanation of how these low-tech flying machines work, and to your relief ${npc_he} seems to pick up on those to ${npc_him} foreign principles rather quickly.\n\"Huh. So that's how those things work. It'd never occurred to me that it was possible to fly by such simple means, to be honest.\"\n\nYou shrug at that. \"Well, your people do seem to be making a habit out of making things unnecessarily complicated.\"\n\n${npc} grimaces. \"Yeah, yeah. I get it. We're a bunch of flawed imaginary human beings and all that sort of stuff. So there is an alternative way to get to the burning wastes after all.\nCongratulations!\"\n\nYou roll your eyes at ${npc_his} heavy sarcasm and patiently wait for ${npc_him} to get over it and get back to business. Thankfully you don't have to wait for long, as ${npc_he} takes a deep breath and gets back on track.\n\"So now we've got two possible ways to get to the burning wastes, by dragon or by hot-air balloon. The whole hang-glider thing just doesn't seem suitable for those kind of distances.\nWe can still only use one of those things though. I honestly kinda like the whole hot-air balloon idea, but it's your pick. After all you're the only one who knows how to make that last thing work.\"\n\nYou roll your eyes. Sure, just let the confused other worlder make all the tough decisions. $!{npc}'s supposed to be the hero in this whole story, for goodness sake. Can't ${npc_he} grow some backbone or something?\n\nDespite your chagrined mumbling you decide to go along with it anyway. It looks like that's the only way you'll be able to make some progress, after all.\nNow, how do you want to get to the burning wastes?\n*choice\n    #Travel by dragon.\n        *set genre_savvy %+10\n        You don't exactly get the chance to travel by dragon every day, so you might as well make use of the opportunity.\n        *page_break\n        While ${npc} is saddling (it's not really a saddle, more like a wheel-less carriage of sorts, coach-box and all) the dragon you walk over to her head to make your acquaintance.\n        While you fiddle around with the buttons for your universal translator unit she eyes you with curiosity, something that honestly makes you feel a bit ill at ease.\n        \n        After a while you think you've got all the settings right, and you ask the dragon if she can understand what you're saying.\n        She blinks twice, and then replies in what sounds to you like perfect English. \"Well of course, young one. You've got a bit of an odd accent though.\"\n        \n        For some reason the voice your translator unit picked for her reminds you of an elderly lady inviting you over for tea and biscuits, and you stifle a chuckle. It doesn't suit something as large and intimidating as her at all.\n        \n        After you've gotten past the urge to laugh you introduce yourself, and the lady dragon introduces herself in turn. She's called Electra, and has been living here alongside humans ever since the islands rose to the sky.\n        Driven by curiosity you ask her the question that's been bothering you ever since she introduced herself.\n        *fake_choice\n            #\"Do you remember how the situation with the islands came to be?\"\n                Electra shakes her massive head.\n                \n                \"I'm afraid not, little thing. There was a lot of smoke and there were tremors and lava spouts, but that's all I can remember. I was too busy trying to survive to really pay attention to the details.\"\n                \n                You nod in confirmation. You understand the situation, but it's a pity nonetheless. Maybe if you knew how it happened you might be able to do something to fix this whole situation. Well, probably not, but you can dream, right?\n            #\"So, does that mean you've known ${npc} for a long time?\"\n                Electra chuckles at your obvious curiosity.\n                \n                \"Only for ${npc_his} whole life. And that of ${npc_his} parents, grandparents, great-grandparents, great-great-grandparents and great-great-great-grandparents before ${npc_him}.\n                Us dragons tend to be a bit more long-lived than the average human.\n                \n                You nod. Of course she has. She might be fictional, but she's still a dragon after all.\n        *page_break\n        After about half an hour of idle chatter (with a dragon, no less) ${npc} is done saddling Electra, and you are ready to move out.\n        Even though Electra is lying directly on the ground you still have to scale a rickety rope ladder to get to the carriage-like saddle.\n        After the rope ladder you have to climb a few fixed steps and you're inside the carriage, where you take a seat on the forward facing bench.\n        You don't know how motion sickness inducing travelling by dragon is, but you'd rather take as little risk as possible.\n        \n        While you were struggling with the rope ladder ${npc} somehow (by the use of magic, no doubt) managed to get up on Electra's back before you and is now discussing directions with her from the coach-box.\n        After a while Electra nods at something, and ${npc} turns around, a huge grin on ${npc_his} face. \"Hold on tight, alright?\"\n        \n        Sensing what is about to happen you take a hold of some brackets that seem to have been mounted on the wall and bench for that exact purpose and brace yourself.\n        Then Electra runs forwards, makes mble as you turn your back to ${npc_him} and try to make yourself comfortable.\n                Even like this the bench is too small to stretch out completely, so you turn to your side and pull up your knees.\n                You're out in seconds.\n            #Suppress your chagrin and thank ${npc_him}.\n                You take a deep breath and thank ${npc}. $!{npc_he} looks a bit sheepish in response. \"You're welcome. And sorry that I didn't think of that before. You must've been pretty uncomfortable.\"\n                \n                This time you're the one who shrugs. \"Hey, I've got a somewhat proper place to sleep now, so it's fine.\"\n                \n                ${npc} smiles apologetically. \"I'm glad to hear that, and good night.\"\n                \n                You echo the words and try to get comfortable. Even like this the bench is too small to stretch out completely, so you turn to your side and pull up your knees.\n                You're out in seconds.\n            #There's no point in arguing. Just try to sleep.\n                Not feeling like arguing with ${npc} at the moment you ignore ${npc_him} completely, expand your own bench, roll yourself in your blanket and burry your head in the pillow.\n                Even like this the bench is too small to stretch out completely, so you turn to your side and pull up your knees.\n                You're out in seconds.\n        *page_break\n        You wake up the next morning nestled up against a low metal railing at the open end of your bench-bed. That wasn't there before.\n        As you groggily sit up you notice a dull pain in your shoulder. It's not muscle ache, it feels more like you fell or something, which judging by the appearance of the mysterious railing might just be the case.\n        \n        Seeing that ${npc} has apparently already woken up and gone outside you take your time to make yourself presentable before heading outside yourself.\n        You really miss your ous fiery creatures, sulfur mutants and malicious mining robots. You like the place already... \"So what do we do if we run into one of those things?\"\n        ${npc} shrugs. \"We'll try to avoid them if possible, but if it comes to a fight, well... A plasma gun would work on most of the sulfur mutants and mining robots, but for the lava golems I'd need to rely on my sword and some magic. They are tricky things, and even if you manage to defeat them they don't really die, they just disperse for a while.\"\n        You frown. \"Well, that sounds like a bit of a problem. I haven't got either a sword or a plasma gun, and my one attempt at magic wasn't all that impressive either.\n        *if element = \"fire\"\n            And besides, I doubt fire magic'd be all that effective against those things.\"\n            \n            ${npc} shakes ${npc_his} head at this statement, though you can't imagine why.\n            \"That's where you're wrong. Fire is actually one of the most useful elements against those things. Sure, fireballs won't cause any damage, but you [i]can[/i] use fire magic to divert their attacks and extinguish their flames, or at least cool them down by quite a bit.\n            You see, fire manipulation works both ways. You can create fire, and you can extinguish it, though you'd probably need a bit more practice before being able to effectively use that skill in combat.\"\n            \n            Oddly enough that makes sense, so you nod. \"Do reckon we've got enough time left to train my magic to the point it'll actually be of use?\"\n            \n            ${npc} grins. \"Most definitely.\"\n            *page_break\n            *goto burningwastesdragon\n        *if element = \"water\"\n            And besides, even though water is probably a good pick against those things only a few drops won't nearly be enough to take one down.\"\n            \n            ${npc} shrugs. \"Sure, at this point your magic is kinda useless. We've still got tw
