rst towards the stone floor. \n\t\t\t\t\n\t\t\t\tQuiet—King Rajnin—dives to the floor and catches her in his good arm, wrapping himself protectively around her as the contraction eases. \"I'm sorry,\" he says in that unmistakable voice. \"I'm sorry, I'm sorry, I'm sorry.\"\n\t\t\t\t\n\t\t\t\t\"My love,\" she says, \"My love!\" She places his hand on her stomach and smiles, as her tears echo his. \"You're going to be a father—Ouch!\"\n\t\t\t\t\n\t\t\t\tAnother contraction hits, and she clings to her beloved husband as he uses all his skill to ease her pain.\n\t\t\t\t*set stumpreveal 1\n\t\t\t\t*goto ouchy\n\t\t\t*else\n\t\t\t\t*label ouchy\n\t\t\t\n\t\t\t\t\"Is this normal?\" Quiet asks you. \"Have you attended a birth before?\"\n\t\t\t\t\n\t\t\t\tScenes from reality TV flash through you mind. \"I've... seen births.\"\n\t\t\t\t\n\t\t\t\t\"Is it meant to hurt so much?\" the queen asks.\n\t\t\t\t\n\t\t\t\tYour heart goes out to them both, and you make the mistake of moving to look at what's happening. The baby is coming out. The queen is screaming. There's blood. \n\t\t\t\t\n\t\t\t\tAs your vision turns black, you realize this probably wasn't the best place for you to be. \n\t\t\t\t*if mind\u003c54\n\t\t\t\t\tYou just don't have the medical experience to cope with an emergency.\n\t\t\t\t\t*goto doh\n\t\t\t\t*else\n\t\t\t\t\tYou really don't know this woman well enough to be any use at such a time.\n\t\t\t\t\t*label doh\t\t\n\t\t\t\t\n\t\t\t\t\tYou feel yourself falling.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*if stumpreveal = 1\n\t\t\t\t\t\t*achieve figuredhimout\n\t\t\t\t\t\t*goto wakey\n\t\t\t\t\t*else\n\t\t\t\t\t*label wakey\n\t\t\t\t\t\"$!{name}? Can you hear me? $!{name}?\"\n\t\t\t\t\t\n\t\t\t\t\tYou open your eyes to a concerned-looking Blanche. \"Do you have any idea how long it took to find you?\" she says.\n\t\t\t\t\t\n\t\t\t\t\t\"Um... no. I was unconscious.\"\n\t\t\t\t\t\n\t\t\t\t\tShe sighs heavily. \"Well, while you were taking a nap the queen delivered a baby and the island ran off the entire fleet of invaders. No thanks to you.\"\n\t\t\t\t\t\n\t\t\t\t\t\"We won?\" you say.\n\t\t\t\t\t\n\t\t\t\t\t\"Yep.\"\n\t\t\t\t\t\n\t\t\t\t\t\"Cool.\"\n\t\t\t\t\t*goto wombat\n\t#I run into the tower with Seena and Blanche, looking for a weakness in the Nakal's attack.\n\t\t*if ((mind>50) and (body>50))\n\t\t\t*set companionbond %+10\n\t\t\tIt's too far for arrows, but not too far for sight. You watch, holding your breath, as the people of Ibu fight for their homes. \n\t\t\t\n\t\t\t\"Seena,\" you say, with a flash of inspiration. \"Have the Nakals been eating your crops while they've kept you penned in?\"\n\t\t\t\n\t\t\t\"No,\" she says distractedly. \"We gathered all our harvests by stealth in the nights following the first attack.\"\n\t\t\t\n\t\t\t\"By now, they'll have scurvy,\" you say. \"They'll be exhausted. Change the streets so they have to run uphill as much as possible. They'll wear out before your people do.\"\n\t\t\t\n\t\t\t\"All right,\" she says doubtfully, and scrawls a note to drop to her quickensmith assistants waiting for instructions below.\n\t\t\t\n\t\t\tYou watch as the town rearranges itself before your eyes. People ebb and flow like churning water, fighting in a landscape that keeps shifting around them. Seena sinks to her knees with exhaustion, but the battle below still wriggles and reforms at the touch of her mind. Slowly, slowly, the tide turns. It becomes clear that Ibu's people will be victorious. \n\t\t\t\n\t\t\tSome invaders simply turn and flee, knowing they no longer have a hope of winning. Others fight on, determined to rule. But the townspeople overwhelm them with shouts of mingled joy and fury. Within an hour, the battle is done, and the black ships leave Ibu Island's shores.\n\t\t\t*page_break\n\t\t\t*achieve madeadifference\n\t\t\tYou're still watching them depart when Quiet escorts his queen onto the high balcony with her newborn daughter and heir. Queen Enia holds her child high so her people can see their perfect future in her unmarred form. \n\t\t\t*if fakebaby = 1\n\t\t\t\tNo-one seems to mind that the princess has suddenly sprouted a full head of hair.\n\t\t\t\t*goto oopsy\n\t\t\t*else\n\t\t\t*label oopsy\n\t\t\tQuiet is weeping for joy.\n\t\t\t*if ((stumpbond > 65) or (soul>65))\n\t\t\t\n\t\t\t\t\"You're him,\" you blurt out in shock. \"You're the first king—aren't you? Your injuries are magical. They changed how you look, and when you woke and heard your wife was remarried you kept silent so she wouldn't know!\"\n\t\t\t\t\t\t\n\t\t\t\tHe hangs his head, and speaks for the first time in a voice as rich as dark chocolate. \"It's true.\"\n\t\t\t\t\t\t\n\t\t\t\t\"Rajnin!\" gasps the queen, recognizing his voice. She grabs wildly at him, embracing him until the baby protests.\n\t\t\t\t\t\t\n\t\t\t\t\"I'm sorry,\" Quiet—King Rajnin—says in that unmistakable voice. \"I'm sorry, I'm sorry, I'm sorry.\"\n\t\t\t\t\t\t\n\t\t\t\t\"My love,\" she says, \"My love!\" She kisses him in full view of the crowd below. \"Would you like to hold your daughter?\"\n\t\t\t\t\t\t\n\t\t\t\tHe clings to the queen and princess, wetting their dark hair with his tears.\n\t\t\t\t*set stumpreveal 1\n\t\t\t\t*page_break\n\t\t\t\t*achieve figuredhimout\n\t\t\t\t*goto wombat\n\t\t\t*else\n\t\t\t\t*goto wombat\n\t\t*elseif ((soul>50) and (mind>50))\n\t\t\t*set companionbond %+10\n\t\t\tIt's too far for arrows, but not too far for sight. You watch, holding your breath, as the people of Ibu fight for their homes. \n\t\t\t\n\t\t\t\"Seena,\" you say. \"The Nakals are missing their own land, and they're body in a town they don't know. Change the streets so they keep getting separated from one another, and can't find their way. They'll lose their sense of purpose, and give up sooner.\"\n\t\t\t\n\t\t\t\"All right,\" she says doubtfully.\n\t\t\t\n\t\t\tYou watch as the town rearranges itself below you. People ebb and flow like churning water, body in a landscape that keeps shifting around them. as a quickensmith.\n\t\t\t\n\t\t\t\"$!{name}? Can you hear me? $!{name}?\"\n\t\t\t\t\n\t\t\tYou open your eyes to a concerned-looking Blanche. \"Do you have any idea how long it took to wake you?\"\n\t\t\t\t\t\n\t\t\t\"Um... no. I was unconscious.\"\n\t\t\t\t\t\n\t\t\tShe sighs heavily. \"Well, while you were taking a nap the queen delivered a baby and the island ran off the entire fleet of invaders,\" she says. \"No thanks to you.\"\n\t\t\t\t\t\n\t\t\t\"We won?\" you say.\n\t\t\t\t\t\n\t\t\t\"Yep.\"\n\t\t\t\t\t\n\t\t\t\"Cool.\"\n\t\t\t*goto wombat\n\t#I grab a sword and fight. As main character, I should be a prodigy.\n\t\t*if ((body>50) and (genre_savvy > 50))\n\t\t\tYou find your way to the rest of Queen Enia's troops with only one minor wrong turn, but are not in the least encouraged by the tense silence all around you. One man is obsessively drawing and re-drawing his sword to check it won't get stuck, and the constant scraping is getting on your nerves. Strange to think that a week ago you were in a classroom looking at a diagram of a person. Now you're going to do your best to stick a sword in a real one. \n\t\t\t\n\t\t\tBefore you can change your mind, a horde of black-clad soldiers bursts into the square. They see your group and stop to close ranks before running to meet you. One of them is looking right at you, and you draw your sword and steady your stance to meet him. You watch his eyes, not his blade, so his feint doesn't fool you. Instead you take advantage of his vulnerable moment to swipe at his exposed wrist, drawing first blood and breaking his rhythm. You kick him in the chest, knocking him backwards, and as he falls you follow through, drawing your sword across his throat. His blood sprays you and you turn to the next man, and the next, until the square is clear.\n\t\t\t\n\t\t\t\"Are you hurt?\" a townswoman shouts at you, and you realize you were standing still despite the clamor of other skirmishes all around.\n\t\t\t\n\t\t\t\"No,\" you shout back.\n\t\t\t\n\t\t\t\"To the castle!\" she says, brandishing a butcher's knife. You follow her, fighting for your life every step of the way. Your jeans are spattered with blood, and you suspect some of it might be yours. \n\t\t\t*page_break\n\t\t\tYou find yourself running more than fighting, which doesn't make sense until you catch a glimpse of the tallest tower and see Queen Enia lifting a newborn baby high in the air for all to see. \n\t\t\t*if fakebaby = 1\n\t\t\t\tNo-one seems to care that the princess has suddenly sprouted a full head of hair.\n\t\t\t\t*goto oopsy4\n\t\t\t*else\n\t\t\t*label oopsy4\n\t\t\t\n\t\t\tThe sight of a legitimate heir to the throne has taken all the heart out of the invaders, and only the foolish remain. Traveling in pairs, you and the rest of Ibu's troops scour the town, killing any enemies that fight and capturing the rest. The battle is won.\n\t\t\t*set companionbond %+10\n\t\t\t*set kingbond %+20\n\t\t\t*page_break\n\t\t\t*if body>75\n\t\t\t\t*achieve warhero\n\t\t\t\t*goto warhero\n\t\t\t*else\n\t\t\t\t*label warhero\n\t\t\t\t*achieve madeadifference\n\t\t\t\t*goto wombat\n\t\t*else\n\t\t\tYou find your way to the rest of Queen Enia's troops with only one minor wrong turn, but are not in the least encouraged by the tense silence all around you. One man is obsessively drawing and re-drawing his sword to check it won't get stuck, and the constant scraping is getting on your nerves. Strange to think that a week ago you were in a classroom looking at a diagram of a person. Now you're going to do your best to stick a sword in a real one. \n\t\t\t\n\t\t\tBefore you can turn and run, a horde of black-clad soldiers bursts into the square. They see your group and stop to close ranks before running to meet you. One of them is looking right at you, and you draw your sword and prepare to fight. He feints left and you block a blow that never comes. There's too much to take in. Before you can make a decision, he bashes you on the head with his sword's heavy hilt, and you are knocked out.\n\t\t\t\t\t\n\t\t\t\"$!{name}? Can you hear me? $!{name}?\"\n\t\t\t\t\n\t\t\tYou open your eyes to a concerned-looking Blanche. \"Do you have any idea how long it took to find you?\"\n\t\t\t\t\t\n\t\t\t\"Um... no. I was unconscious.\"\n\t\t\t\t\t\n\t\t\tShe sighs heavily. \"Well, while you were taking a nap the queen delivered a baby and the island ran off the entire fleet of invaders,\" she says. \"No thanks to you.\"\n\t\t\t\t\t\n\t\t\t\"We won?\" you say.\n\t\t\t\t\t\n\t\t\t\"Yep.\"\n\t\t\t\t\t\n\t\t\t\"Cool.\"\n\t\t\t*goto wombat\n\t#I inspire the queen's people with a speech. That always works in battles.\n\t\t*if ((soul >60) and (genre_savvy > 50))\n\t\t\t*set queenbond %+10\n\t\t\tThe queen gives you permission to speak to her people. She is already having contractions. You feel like you're in a movie, and suddenly realize none of this crowd has seen a movie. And they definitely won't have any battle speeches memorized... unlike you. Do you...\n\t\t\t*choice\n\t\t\t\t#Adjust Aragorn's final battle speech from \"Lord of the Rings\"?\n\t\t\t\t\t*set companionbond %+10\n\t\t\t\t\t\"Daughters and sons of Ibu,\" you call out, and see faces turning upwards to listen. \"My companions. I see in your eyes the same fear that would take the heart of me! A day may come when the courage of Ibu fails. When we forsake our friends and break all bonds of fellowship... but it is not this day! An hour of swords and shattered shields when your castle comes crashing down! But it is not this day! This day we fight! By all that you hold dear in this good world, I bid you, stand, citizens of Ibu!\"\n\t\t\t\t\t\n\t\t\t\t\tThey cheer furiously, and you hope you haven't just inspired them to throw away their lives. \n\t\t\t\t\t\n\t\t\t\t\tIt's too far for arrows, but not too far for sight. You watch, holding your breath, as the people of Ibu fight for their homes. Slowly, slowly, the tide turns. It becomes clear that Ibu's people will be v n\nQueen Enia asks you to stay and work with her in rebuilding her island kingdom.\n*label b\nYou say you'll need a day to decide.\n\nThe following morning, you and Blanche set out alone to find the wombat hole that brought you to Ibu. \n\nMoments later you walk right into a patch of mud—very possibly the only patch of mud on the entire hillside. Your annoyance switches to exuberance as you remember the clouds looming before you fell into Ibu. At that moment, your phone beeps with multiple messages.\n\nFeeling more disturbed by the anachronism than all that's happened so far, you pull out your phone and notice it has reception. Walking slowly sideways, you see the lower end of the wombat hole. \"How's your wrist?\" you ask Blanche.\n\n\"Better,\" she says. \"Oh look! A wombat!\"\n\nShe's right. A wombat is just emerging from its burrow. It examines you both suspiciously for a moment before wandering off downhill.\n\n\"Do they have wombats here?\" says Blanche.\n\n\"Somehow, I doubt it. He's come through from Australia.\"\n\nShe sighs happily. \"I've always wanted to see a wombat.\"\n\nYou stop at the entrance to the hole. \"Are we really going back?\" you say. \"Or should we take those jobs they offered us? We don't even know if it's possible to return. Or it might be possible today, but never again. Or maybe the portal stays open permanently, and we can go back and forth as we please.\"\n\nBlanche shivers at the branching possibilities. You remember a poster on your old classroom wall saying, \"Your future begins now!\" It's more true in this moment than it's ever been.\n\n\"Well?\" says Blanche. \"What are you going to do?\"\n*choice\n\t#Stay here in Ibu.\n\t\t*if companionbond >70\n\t\t\tBlanche smiles. \"Me too.\"\n\t\t\t\n\t\t\tYou have a very peculiar phone conversation with your mother, but in the end you manage to convince her that you're telling the truth. Before your phones completely die, you and Blanche update your facebook statuses to say you'll be out ad_end\n*set body %-20\nBlanche fires the gun. She doesn't miss. You scream in pain as your body tries to rip itself apart.\n\nThen the world turns white, like a blank page. You find yourself lying on the bookshop floor in the real world, gasping in shock. The floor is dry—no blood. You pat yourself on the head and torso, unable to believe there's no enormous holes in your body. At last you accept that you're alive—albeit oddly sore all over—and you sob in relief before slowly recovering your wits.\n*goto_scene bookshop_scene_fail", "final_tale": "You and Uncle Irwin collapse in an exhausted heap on the bookshop floor.\n\n\"You're all right?\" he asks you, patting your arms as if searching for injuries.\n\n\"I'm fine. What about you? Did she get you?\"\n\n\"Yes,\" says a woman's voice. \"She did.\"\n\nYou turn in horror and see her for the first time: the woman in red. Her dress is scarlet, her hair is black, and the pen she holds in her hand drips a red liquid that looks like blood.\n\n\"Don't worry, $!{name},\" she says to you sweetly. \"This is your world, and you belong here. Irwin, however, has been a stone in my shoe for far too many years. It's time to rewrite history.\" She walks towards him, grinning. \n\nHe backs up, and quickly runs into a bookshelf. There's nowhere to hide.\n\nA treacherous voice in yours head whispers that you should let the woman remove Uncle Irwin out of existence. He's not real... is he?\n\nBut you care desperately what happens to him. If that doesn't make someone real, you don't know what does.\n*if genre_savvy \u003c30\n\tSuddenly your knowledge of tropes tells you exactly who she is, and why she hates Uncle Irwin so much. She's an editor. All she wants is to make stories make sense, with good structure and characters and genre consistency. That's why she's always taking over important characters and attacking you....because you don't belong. But in her efforts to \"fix\" all the inconsistencies in the books, she's begun taking away the heart of the stories themselves, which is why they're falling apart and creating the patchwork world. No story can live without its heart. The Editor has gotten so defensive in her role as rule-keeper that she's lost the joy of creation.\n\t*goto fight\n*elseif genre_savvy >70\n\tSuddenly your understanding of genre tells you exactly who she is, and why she hates Uncle Irwin so much. She's an editor. All she wants is to make stories make sense, with good structure and characters and genre consistency. That's why she's always taking over important characters and attacking you....because you don't belong. But in her efforts to \"fix\" all the inconsistencies in the books, she's begun taking away the heart of the stories themselves, which is why they're falling apart and creating the patchwork world. No story can live without its heart. The Editor has gotten so defensive in her role as rule-keeper that she's lost the joy of creation.\t\n\t*goto fight\n*else\n\tSuddenly you know exactly who she is, and why she hates Uncle Irwin so much. She's an editor. All she wants is to make stories make sense, with good structure and characters and genre consistency. That's why she's always taking over important characters and attacking you....because you don't belong. But in her efforts to \"fix\" all the inconsistencies in the books, she's begun taking away the heart of the stories themselves, which is why they're falling apart and creating the patchwork world. \n\t*goto fight\n\n*label fight\nYou have to stop her, or Uncle Irwin will be red-penned out of existence.\n*temp errorcode 0\n*label fightchoice\n*choice\n\t*disable_reuse #Grab the red pen from her and write her out of existence instead.\n\t\tIf she can just red-pen a fictional character out of existence, then why wouldn't you be able to do the same? If she's been giving your aunt and uncle a hard time from even before they were dating there's no way she's real herself either.\n\t\tShe looks way too young for that.\n\t\t\n\t\t*if body >80\n\t\t\tYou make a grab for the pen and manage to pry it from her hands before turning to the scattered pages of the patchwork tale scattered around on the reading stand and crossing out all mentions of her.\n\t\t\tThe editor screams out in agony for one last time, and then simply vanishes into thin air, leaving only a ragged scrap of blank paper behind.\n\t\t\tThen all books suddenly pick themselves off the floor, and with the sound of a gale force wind the loose pages of the patchwork tale are sucked back into their respective books.\n\t\t\tYou hope that solves it.\n\t\t\t\n\t\t\tAfter the wind has died down and the books have fallen to the floor again you open them to find that all damage and red marks have vanished, leaving them in pristine condition.\n\t\t\t*goto end\n\t\t*else\n\t\t\t*set errorcode +1\n\t\t\tYou make a grab for the pen, but the editor manages to push you away before you manage to get a good grip on it.\n\t\t\t\n\t\t\t\"You insolent little brat! Maybe I should erase you from existence anyway.\"\n\t\t\t\n\t\t\tJust to be on the save side you scuttle backwards and go over your options again. Trying to overpower her obviously didn't work, so what should you do now?\n\t\t\t*goto fightchoice\n\t*disable_reuse #Trick her into a book.\n\t\tWith nothing else at your disposal you grab a random book from a shelf and hold it in front of you like a shield.\n\t\tThen your eye is caught by the colorful rabbits decorating the front cover.\n\t\t\n\t\tA children's book about rabbits? That's pretty different than the stuff you travelled to using the reading stand. You can't imagine your aunt actually visiting one of those, let alone leaving a macguffin there. Maybe you could use that to your advantage.\n\t\t\n\t\t*if mind >80\n\t\t\t\"Hey lady. In all your wisdom it seems you forget to edit this book, so come and get it.\"\n\t\t\t\n\t\t\tYou run away with the book under your arm, making sure she can't see the cover, but don't get very far. Before you can even get to the door the editor appears right in front of you in a puff of red smoke and grabs the book.\n\t\t\tShe wrestles it from your arms with ease, places it on the reading stand and is sucked in before you've even got the time to blink.\n\t\t\tYou cautiously approach the book from the side, flip it shut and place it below the bust of a famous writer which was gathering dust in a corner.\n\t\t\t\n\t\t\tShe won't get out of that one any time soon.\n\t\t\t*goto end\n\t\t*else\n\t\t\t*set errorcode +1\n\t\t\tYou wave the book around to catch the editor's attention, but she shoves it aside with a sneer.\n\t\t\t\n\t\t\t\"Oh, come on. Did you really believe I'd fall for a cheap trick like that?\"\n\t\t\t\n\t\t\tYou grimace and recoil from her anger until your back is pressed against one of the bookcases.\n\t\t\tSeems like you need a new plan.\n\t\t\t*goto fightchoice\n\t*disable_reuse #Remind her of why she loves stories in the first place.\n\t\t*if soul >80\n\t\t\t\"Wait!\" you say. \"Listen!\"\n\t\t\t\n\t\t\tShe pauses with red pen raised.\n\t\t\t\n\t\t\t\"I groaned and stretched as I climbed out of my car. It was a long trip, and I didn't want to stop to rest. Uncle Irwin's message was cryptic enough that I was anxious to get here quickly...\"\n\t\t\t\n\t\t\tYou see the editor hesitate, her face slightly turned towards you.\n\t\t\t\n\t\t\t\"He was nowhere to be found though, and you'd better believe I looked everywhere I could think of. I eventually ended up in uncle Irwin's workroom, and there a crackle of static caught my attention.\n\t\t\tIt was a small radio, mostly held together with tape. Then uncle Irwin called my name, and I realized he was using the thing to try and communicate with me.\n\t\t\t*page_break\n\t\t\tUncle Irwin explained me how to use the reading stand to travel through the books, and there I went. My search took me through many stories, some even more unbelievable than others, but while there were signs that uncle Irwin had visited those worlds at some point in time I couldn't find him there.\n\t\t\t\n\t\t\tThe editor now turns towards you completely, her pen still raised.\n\t\t\t\n\t\t\t\"So, what kind of adventures did you experience in there?\"\n\t\t\t\n\t\t\tWith a lot of enthusiasm you tell her everything about the dangers you had to face while on the road, but also what wonderful people and animals you met, and what kind of breathtaking places you visited.\n\t\t\tShe has a soft smile on her face as you describe yourself and Uncle Irwin collapsed in an exhausted but triumphant heap on the bookshop floor.\n\t\t\t\n\t\t\tYou gently lower her pen, and pass her a book to read.\n\t\t\tShe accepts it and flips it open with a smile on her face.\n\t\t\t*goto end\n\t\t*else\n\t\t\t*set errorcode +1\n\t\t\t\"Wait!\" you say, but she only pauses to sneer at your pathetic delaying technique.\n\t\t\tYou still need to stop her though.\n\t\t\t*goto fightchoice\n\t*if (errorcode > 2) #Whatever you do, you're just not able to beat the editor.\n\t\t\tThe woman in red swings her pen around like it's a sword, a wide grin on her face. Uncle Irwin sputters a bit as a cross of red ink forms on his clothes and skin, and then he's just... gone.\n\t\t\tJust like that. Not a trace to be found.\n\t\t\t\n\t\t\tYou turn to the editor, and find out she's standing right in front of you.\n\t\t\t\n\t\t\t\"Now let's see if you're erasable, sweetie.\"\n\t\t\t\n\t\t\tThe last thing you feel is a piece of eraser brushing your cheek.\n\t\t\t*achieve youlost\n*label end\n*page_break\nWith the woman in red neutralized Uncle Irwin grins, and before you know it you're pulled into a tight hug. Well, that's the uncle Irwin you remember, alright.\n\nHe then holds you at arm's length, smiling broadly.\n\n\"You did it! You actually did it! I'm so proud of you, $!{name}.\"\n\nYou grin.\n\n\"Yeah. I guess I did.\"\n\nSaving your uncle by travelling through books. Not exactly what you expected to do when you first got here.\n*if mc_in_relationship\n\t*if ((npc_name = \"Lorenzo\") or (npc_name = \"Gianna\"))\n\t\t*page_break\n\t\tAs uncle Irwin is about to walk off to get you some tea his copy of [i]Dragons and Devices[/i], in your mind better known as ${npc_name}'s book, suddenly falls off the reading stand.\n\t\tYou're about to pick it up and put it back into its glass case when it opens up, its pages flipping over by their own devise. Then there's a flash of bright light which temporarily blinds you, and the sound of something slamming into a bookcase.\n\t\tSome books fall to the ground, and you hear a soft curse in a voice you'd recognize anywhere. [i]It's ${npc_name}'s.[/i]\n\t\t\n\t\tYou rub your eyes to get rid of the after effects of the bright flash, and true enough, there\n\t\t*if (npc_name = \"Lorenzo\")\n\t\t\the\n\t\t*if (npc_name = \"Gianna\")\n\t\t\tshe\n\t\tis, awkwardly rubbing\n\t\t*if (npc_name = \"Lorenzo\")\n\t\t\this\n\t\t*if (npc_name = \"Gianna\")\n\t\t\ther\n\t\tnose.\n\t\t\n\t\t\"Well, that didn't go exactly as planned.\"\n\t\t\n\t\tYou approach ${npc_name} with a huge smile on your face.\n\t\t\n\t\t\"Who cares about the details. You're here, that's what counts. Oh, and welcome to my world, by the way.\"\n\t\t\n\t\tYou help ${npc_name} to\n\t\t*if (npc_name = \"Lorenzo\")\n\t\t\this\n\t\t*if (npc_name = \"Gianna\")\n\t\t\ther\n\t\tfeet, and uncle Irwin walks off.\n\t\t\n\t\t\"I'll get some tea for you youngsters. Don't do anything crazy while I'm gone, alright?\"\n\t\t\n\t\tYou and ${npc_name} lock eyes and burst out into laughter. Yeah right. Like that's going to happen.\n\t\t*goto ending\n\n\t*elseif (adrao_tale_relationship = 1)\n\t\t*page_break\n\t\tAs uncle Irwin is about to walk off to get you some tea his copy of [i]New Heaven Cop[/i], in your mind better known as ${navigator_name}'s book, suddenly falls off the reading stand.\n\t\tYou're about to pick it up and put it back into its glass case when it opens up, its pages flipping over by their own devise.\n        \n\t\tThen there's a flash of bright light which temporarily blinds you, and the sound of something slamming into a bookcase.\n\t\tSome books fall to the ground, and you hear ${navigator_name}'s voice underneath them. \"${navigator_salute1}, that was ${navigator_swear1} crazy!\"\n        \n\t\tYou rub your eyes to get rid of the after effects of the bright flash, and true enough, there ${navigator_he} is. \n\t\tYou approach ${navigator_him} with a huge smile on your face, taking some of the books that have falling on top of ${navigator_him}.\n\t\t\n\t\t\"Yes, I guess travelling this way is not quite the same as using the SAPEV, right? Oh, and welcome to my world, by the way.\"\n\t\tYou help ${navigator_him} to his feet, and uncle Irwin walks off.\n\t\t\n\t\t\"I'll get some tea for you youngsters. Don't do anything crazy while I'm gone, alright?\"\n\t\t\n\t\tYou and ${navigator_name} lock eyes and burst out into laughter. Yeah right. Like that's going to happen.\n\t\t*goto ending\n\t*elseif ((npc_name=\"Vivian\") or ((npc_name=\"Cecil\") or (npc_name=\"Wexley\")))\n\t\t*page_break\n\t\tAs uncle Irwin is about to walk off to get you some tea his copy of [i]The Case of the Loathed Lord[/i], in your mind better known as ${npc_name}'s book, suddenly falls off the reading stand.\n\t\tYou're about to pick it up and put it back into its glass case when it opens up, its pages flipping over as if ruffled by an unseen hand. Then there's a flash of bright light which temporarily blinds you, and you're knocked breathless as someone comes hurling into your arms. You recognize the \n\t\t*if npc_name = \"Wexley\"\n\t\t\tthe firm, tapering body in your arms, the harsh voice swearing in bewilderment close to your ear. It's Wexley... your Wexley.\n\t\t\t\n\t\t\tThe moment his eyes focus on you, Wexley crushes you to him in a tight hug, then kisses your eyes, your ears, your fingertips, your collarbones - a frenzied catalogue of what you still possess. You aren't sure whether to laugh or cry, so you settle for grabbing his hands and whirling around in an impromptu dance of happiness.\n\t\t\t\n\t\t\t\"Yes,\" you say between rough kisses, \"we're here. We're together.\"\n\t\t\t\n\t\t\t\"And I won't go back,\" Wexley says fiercely. \"I want to be here with you.\"\n\t\t*if npc_name = \"Vivian\"\n\t\t\tlithe, curvy body in your arms, the timbre of her voice as she gasps in shock, the scent of her perfume. It could be none other than Vivian. She recognizes you the moment after.\n\t\t\t\n\t\t\tShe kisses you fiercely, again and again. \"Look at me,\" she begs. \"Look at my eyes.\" You look at her, and for the first time her eyes are grey - pretty, static, a shade just above ordinary. \"You can know me, now,\" Vivian says, almost shyly, and slips her hand in yours.\n\t\t\t\n\t\t\t\"Now that you're free, we can do all kinds of things,\" you agree, and she giggles at the subtext. But you press on. \"We can go to the beach.\" You touch her pale cheek, a face that has only known parlors and ballrooms on white pages. \"We can go to museums, and parks, and I don't know... grocery stores.\" You think Vivian might take to things like nightclubs and fancy coffee; your mind is whirling with modern experiments you'd like to try. You'll have time now, and that's what's making you smile.\n\t\t*if npc_name = \"Cecil\"\n\t\t\tslim, toned body in your arms, the voice panting in shock at his unexpected appearance.\n\t\t\t\n\t\t\t\"Cecil,\" you say to him, \"calm down. You're here now.\"\n\t\t\t\n\t\t\t\"$!{name}!\" he cries gratefully, and hugs you tightly. \"I missed you. I adore you. I'm really here?\"\n\t\t\t\n\t\t\t\"Yes,\" you assure him, petting his hair. \"And you don't ever have to leave again.\" You kiss him deeply, and the two of you lock in an embrace that feels eternal.\n\t\t\t\n\t\t\"Ahem,\" Uncle Irwin interjects, reminding you both that he's there. \"I'll make some tea for both of you, to celebrate you finding someone like my dear Iris!\" He winks at you. \"It should take me awhile to brew that tea, you know, but don't get into any otherworldly adventures while I'm gone, alright?\"\n\t\t\n\t\tYou and ${npc_name} lock eyes and burst into laughter. Your Uncle Irwin is hardly one to talk about inappropriate conduct in the fictional multiverse... but without everything you've done today, you wouldn't have saved him, met ${npc_name} and stopped the Editor. And that's good enough for now.\n\t\t*goto ending\n\t*else\n\t\t*goto ending\n\n*label ending\n*page_break End\nWe hope you've enjoyed playing [i]Lost in the Pages.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "patchwork_tale": "It feels like you're bodily flung through a myriad of colors before hitting a piece of rock. Hard.\n\n*if (dandd)\n\tYour head spins for a moment, and as you scramble to your feet you realize that this place feels familiar somehow.\n\tIt's the sweltering heat, most of all, and the sooth.\n*if (dandd = false)\n\tThe first thing you notice is the uncomfortable heat. Were you launched straight into hell, or something?\nLooking past the rocky outcrop you'd been launched into you see an ocean of lave stretching out as far as the eye can see. There seems to be something wrong with it.\nThe ocean isn't placid,\n*if (dandd)\n\tlike you remember,\nbut surges wildly, lapping against the same rock you're standing on. And that's not even the worst that's going on here.\n\nAs you watch entire floating islands come crashing down, creating huge waves in the lava. You quickly hide behind the rock outcrop in the hopes it'll shield you from the worst of the lava splatters and look up to see if there's something overhead waiting to come down, but that part of the sky is clear, at least.\n*if ((mc_in_relationship) and ((npc_name = \"Lorenzo\") or (npc_name = \"Gianna\")))\n\t\n\tWith a start you realize that what's going on here might be happening on ${npc_name}'s location as well, and you scan the sky and lava for traces of the familiar city ruins.\n\tThere's no trace of it to be found, but you still feel uneasy.\n\t\n\tYou reach for your radio, in the hopes that its signal will somehow be picked up by ${npc_name}'s self-made contraption, but you only get static.\n\t\n\tDarn it.\n*page_break\nThere's an angry whirring sound somewhere behind your back, and you barely manage to jump out of the way before a huge drill embeds itself in the piece of rock you were standing next to.\nPieces of rock are flung in all directions, and you yelp in pain as a piece hits your arm.\n\nThe hulking mining robot, the thing where the drill is attached to, responds to the sound and turns its head towards you, its red eyes glowing maliciously.\nYou gulp and try to move out of the way as quietly as possible, but change your plans as the robot lurches for you again, a lot quicker than you'd imagined something of its size could be.\n\n[i]Run![/i]\n\nYou run as fast as you can, dodging pieces of rock and mining lasers left and right, but the thing is still gaining you.\nThen your eye is caught by an odd strike of grey-brown fur and stop short. Is that a wombat?\n\nA strike of the robot's shovel-arm almost decapitates you, and you fling yourself into the wombat's burrow without thinking.\nAs your hands grasp on empty air you realize that it's deeper than you thought, just before you lose balance and tumble down head-first.\n\nOh shit.\n*set health %-10\n*page_break\nDespite falling head-first you somehow land on your behind and find yourself in an unfamiliar city. Medieval from the looks of it. It's a pretty large change from being chased by blood-thirsty robots while you're surrounded by lava.\n\nYou look around for the wombat, but it's nowhere to be found. Oh well. Must be a book thing. You dust yourself off and look around, wondering what you should do next.\n*fake_choice\n\t#Look around for Uncle Irwin.\n\t\t*set genre_savvy %+20\n\t\t\"Uncle Irwin! Uncle Irwin!\"\n\t\t\n\t\tWalking around aimlessly you settle on calling out your uncle's name over and over again. Maybe one of the locals will recognize it.\n\t#Look for the wombat.\n\t\t*set genre_savvy %-20\n\t\tThe little critter is what brought you here in the first place, so it might know some answers. Maybe. It's a fictional world, so everything goes, right?\n\nYou eventually end up at a small plaza next to the city wall where a large crowd is gathered. They don't look happy, and with good reason.\nHuge cracks meander across the wall, and from time to time a chunk breaks off and falls down to the onlookers.\n\nSome people with a Q branded on their hands stand in front of it, their hands pressed against the stone as if they're trying to keep the wall together by sheer force of will.\nThey're assisted by a small army of people with Fs branded on their hands while people with an H take care of the injured.\nFrom the looks of it they're fighting a losing battle.\n\nAll of a sudden one of the cracks makes its way from the wall to the ground below, causing you to lose your footing.\nIt hurts, naturally, but that's your least concern as the ground crumbles away below you.\n*set health %-10\n*page_break\nYou regain consciousness in a lot of metal surfaces and futuristic-looking stuff. Something has also happened to your body, but you doubt even your enhanced strength and agility will protect you from the guns that are trained on you.\n\n\"Blasted genetic freak show. Did ya think ya could just go an' slaughter us folk without us stoppin' ya? Well, think again.\"\n\nThe angry non-up raises her gun, and you flinch.\n\n\"Easy there, madam. I'm just a passer-by.\"\n\nThe woman obviously isn't convinced, and you make a run for it in an attempt not to be turned into a sieve.\nA lucky shot manages to clip your leg, and you stumble head-first into a tree.\n*set health %-10\n\n*if (adrao_tale_relationship = 1)\n\tYou start to see stars floating about you, as the crowd starts to encircle you. From behind them you hear ${navigator_name}'s shouting. \"Let me pass or I swear I will ${navigator_swear1} kill you all!\"\n\tObviously ${navigator_he} is coming to your rescue, though the hit you took to the head is too strong, and you suddenly lose consciousness. \n\n*page_break\nIn your dazed state you hear Uncle Irwin call your name, and you blindly head in the direction of the sound.\n\nEventually your hands tough something with a consistency close to pudding and your eyes fly open. As your vision returns you realize you ran into a disgusting glob-thing easily the size of a house.\nYou flinch, and at that moment become aware that the jello-like substance on your hands has begun to sizzle.\n\nThat can't be good.\n*set health %-10\n*fake_choice\n\t#Wash it off in a nearby pond.\n\t\tThe goo is hurting your hands, so you rush to a nearby pond to wash it off. Thankfully the stuff comes off easily, but your hands look pretty red already.\n\t\tIt must've been acidic, or something.\n\t\t\n\t\tAs you're bent over the edge of the pond a strange sloshing sound catches your ear, and you look up. Wait a second... where did that whirlpool come from all of a sudden?\n\t\tYou try to back away from the pond, but slip, falling in instead.\n\t#Ignore the sizzling and examine the glob more closely.\n\t\tThe [i]thing[/i], by lack of a better word, is a sickly green-blue color and seems to grow in size as you watch.\n\t\tIt slowly but steadily moves in your direction, wrapping itself around eucalyptus trees and devouring them, with koalas and all, in the process.\n\t\tPoor buggers. At least the kangaroos and wallabies scattered around the place are quick enough to escape.\n\t\t\n\t\tThe glob makes a menacing gurgling sound and you instinctively back away a few paces. Which, in hindsight, was a pretty bad idea.\n\t\tOne of your feet hits empty air, causing you to lose balance and topple over backwards\n\t\t\n\t\tOh shit.\n*page_break\nWith a start you find yourself upside down and submerged in water. You flail your legs, or at least, that's what you intended to do, but find that they've been replaced by a tail like that of a dolphin.\nIt slowly dawns on you that in this world you might be supposed to be surrounded water, so you take a hesitant breath. The water tastes a bit salty on your tongue, but that's about it.\n\nNow that the initial shock has worn off you finally pay attention to your surroundings. There's clearly something wrong with it. Judging by the coral-covered rock spires the sea used to be a lot deeper here, and with what you see in front of you there's no need to wonder about where it went either.\nOnly a short distance ahead a huge twister is sucking the water straight into the sky. Or at least, it would have if there was a sky to begin with. Instead what's overhead looks a lot more ominous.\nInstead of the sky you'd expect there's just white for as far as you can see, as if what was supposed to be there has been completely erased.\n\nDespite your horror you peel your eyes away from the white void and look around. You need to find uncle Irwin, and quickly.\n*page_break\nSwimming away from the twister as fast as possible you do whatever you can think of to find him.\n\n\"Uncle Irwin! Where are you?\"\n\nYour words echo off the rocks and reefs that surround you, but this far there's no response. You yell again.\n\"Uncle Irwin?\"\n\nNothing again. Or at least, not what you'd been hoping for.\nOne moment there's nothing but small colorful fishes surrounding you, the next they're all gone, and you have to throw yourself to the side not to be eaten whole.\nAs it is the shark's teeth still graze your arm, but you barely notice with the adrenalin pumping through your veins.\n*set health %-10\n\nIn a desperate attempt to get away you slam your tail into the head of the beast, and it swims off in a daze.\n\n\"Uncle Irwin! Can you hear me?\"\n\nThen you once again hear the soft sound of uncle Irwin's voice in the distance.\n\n\"${name}. Help!\"\n\nYou turn to the sound, propelling yourself through the water as fast as possible. You need to get closer, but can tell that your strength is fading fast.\n*page_break\nBefore you can get far a strong current smacks you against a piece of rock. Oddly enough you actually fall down, as if someone turned off the buoyancy of the water, and you shake your head in a daze.\nThen the sound of a steam-whistle shatters the silence, and all other regular sounds flood back in after the relative silence of the ocean you came from.\n\nYou shakily get back to your feet, finding that you've got feet again, and look around. Where did you end up this time?\n\nThe first thing you notice is a carriage rolling straight at you, and you barely manage to dodge it by jumping to the side.\nThe coachman cusses at you as he races past, the carriage drenching your trench coat in the process. And here you'd been expecting this world to be something less wet than the last...\n\n\"$!{name}!\" \n\nYou turn, and Uncle Irwin is right there, alive and terrified, but mostly alive. He runs towards you, and vanishes. You run towards the spot, only finding a blank piece of paper at the place you saw him last.\nDarn it. Missed him again.\n*set health %-10\n*page_break\nYou curse loudly and, spooked by the noise you made, a swarm of bats flies up from the nearby ruins of a house, temporarily blinding you.\nThis is becoming a bit of a habit, isn't it?\n\nYou're not in the least surprised to suddenly find yourself trench coat-less and in a completely different place.\nA cemetery. Oh joy.\n\nLooking around you see that this 'world' is basically just the cemetery surrounded by an endless expanse of white. You doubt it's supposed to be that way though.\nIt looks more like the rest of the world was simply erased.\n\nPart of the ground behind you crumbles into nothingness, and you step forward. Creepy cemetery it is then.\n*page_break\nPushing through the gates you look around for Uncle Irwin or an exit that doesn't lead into nothingness, but find nothing this far.\nSuddenly one of the gravestones to your left moves, allowing a pale but beautiful figure to rise from their grave. Oh great. Vampires.\nAs if your day couldn't get any worse.\n\nAs you stand fixed in place more gravestones begin to move, and you realize you have to do [i]something[/i].\n*fake_choice\n\t#Run.\n\t\tThere are too many vampires for you to handle, so you go for the sane thing to do.\n\t\tYou run.\n\t\t\n\t\tHands grab at you from all sides, with their long nails scraping your legs, but you manage to reach the cemetery's small chapel nonetheless.\n\t\tIt's just a small thing, with its far wall already eaten away by the white, but it's still a better option than the vamps.\n\t\t\n\t\tJust when you think all hope is lost you see Uncle Irwin, floating in the whiteness on a book-shaped piece of stone.\n\t#Pluck a wooden cross of one of the graves and fight.\n\t\tYou snap off the bottom of the cross to make a sharp point and hold it out in front of you like a sword. The nearest vampire chuckles.\n\t\t\n\t\t\"Oh, come on. Do you honestly plan to fight all of us with that tooth-pick of yours?\"\n\t\t\n\t\tYou roll your eyes. As much as they might be taunting you it didn't escape your notice that they're all keeping a safe distance now.\n\t\t\n\t\tWith a loud yell you rush forwards, plowing through the mass of vampires. You sustain some minor injuries, but since most of them part in front of you it's not that bad.\n\t\tThere's a small chapel up ahead, on the border with the whiteness, and you sprint inside in search of a better weapon. You look up and see Uncle Irwin standing on a book shaped piece of rock floating in the white expanse.\n\n*set health %-10\n\"Grab my hand!\" he yells. \n\nYou reach across a terrifying abyss, and just manage to grab him before the ground beneath you crumbles away.\n\nThen the world turns white once more.\n*page_break\n*goto_scene final_tale", "sashira_tale": "*if not (mc_in_relationship)\n   *set looking_for_love true\n*set body_name \"Fisticuffs\"\n*set mind_name \"Deduction\"\n*set soul_name \"Intuition\"\n*set health_name \"Credibility\"\n*temp honorific \"none\"\n*temp last_interviewed \"none\"\n*temp last_searched \"none\"\n*temp last_question \"none\"\n*temp grounds_checked false\n*temp quarters_checked false\n*temp guest_checked false\n*temp study_checked false\n*temp questionings 0\n*temp lily_interviewed false\n*temp vivian_interviewed false\n*temp cecil_interviewed false\n*temp wexley_interviewed false\n*temp colonel_interviewed false\n*temp elizabeth_interviewed false\n*temp cecil_questions_asked 0\n*temp vivian_questions_asked 0\n*temp wexley_questions_asked 0\n*temp call_knowledge false\n*temp invitation_knowledge 0\n*temp disguise_knowledge false\n*temp devil_wexley false\n*temp hates_godfather false\n*temp cad_with_women false\n*temp lily_sister false\n*temp mistress_knowledge false\n*temp confirm_times false\n*temp secretary false\n*temp patron_of_arts false\n*temp right_guess 0\n*temp suspect \"none\"\n*temp die \"none\"\n*temp manor_gossip false\n*temp asked false\n*if he=\"he\"\n   *set honorific \"Sir\"\n*if he=\"she\"\n   *set honorific \"Miss\"\n*if he=\"they\"\n   *set honorific \"Inspector\"\n*if not (sash_started)\n   *goto intro\n*if (sash_started)\n   You find yourself sitting at a metal table painted white, staring at a few items on top of it - butter dish. Sugar pot. Ceramic vase of wildflowers... Wait a minute. You've seen this before, haven't you? You're in the cafe of the delicious-smelling pies and enormous breakfasts. But somehow, none of the people happily chatting around you seem to notice that they're seeing you for the second time.\n\n   A waitress is walking towards you. What was her name? Some kind of flower? You can almost remember it, but you're forgetting things too... like pages turning backwards, getting blanker with each moment.\n   *goto waitress\n*label intro\nWhen your vision clears, you find yourself sitting at a metal table painted white, staring at a few items on top of it - butter dish. Sugar pot. Ceramic vase of wildflowers. People around you chat happily while enjoying breakfast, lunch, and an impressive assortment of cakes and pies. You're in a country cafe or restaurant, sometime in the late morning to early afternoon.\n\n*if stories_completed\u003c1\n   What's going on here?? Where are you, what's happening, why are you wearing different clothes, and do you have the money to pay for whatever you ordered? In no particular order. \n   *gosub mindset\n*if ((stories_completed>=1) and (stories_completed\u003c=3))\n   *gosub mindset\n\n   It's disorienting, but another clue to the way these fictional worlds work: they change not only your clothes, possessions and how people see you, but give you background knowledge related to whoever you're supposed to be.\n*if (stories_completed>3)\n   *gosub mindset\n\n   By now, though, you're getting used to the changes that come with each new genre. You sense that they're there to help you.\n*goto waitress\n*label mindset\n*if mind\u003c40\n   It's unnerving. You're not used to being this observant; something about being in this book is making you insightful. \n*if mind\u003c=75\n   You've made these connections impressively fast, and your eyes are picking out details you might have missed before. \n*if mind>75\n   Your usually discerning mind is making connections quicker than ever; these observations took only a few seconds. It's almost frightening. \n*return\n*label waitress\n*set sash_started true\n\n\"Inspector!\" a voice calls out in a lilting British accent. You look up to see a waitress hurrying towards you, holding an empty tray. No, not empty - a folded piece of paper rests on it. \"There's been an urgent message for you.\" Hm, so you're some kind of investigator? \n*if genre_savvy>=50\n   Knowing your genres, and judging by the idyllic English country setting, you're betting on private detective.\n*if genre_savvy\u003c50\n   Despite your general lack of interest in genres, you're thinking \"private detective\" is a safe bet.\n\nShe offers you the note. You take it, and read a single cryptic line:\n\"Come at once to 1811 Edgeworth Lane\"\n\nThe waitress smiles at you sympathetically. \"Should I cancel your breakfast order?\" She has a pretty smile; it completes the picturesque look of her on the sunny patio in her neatly ironed uniform, her cloud of blond curls held back by a ribbon that brings out the blue of her eyes.\n\n\"Violet!\" calls someone from the kitchen - presumably, her boss. \"Stop chatting with customers when you've got other tables!\"\n\nYou...\n*choice\n   #Go immediately to the address in the note.\n      \"Thank you for passing on the message,\" you say. \"And yes, please cancel my order.\" Whatever you've been summoned about, it's surely more important than breakfast.\n      *goto murderhouse\n   #Interrogate the waitress about the caller before leaving.\n      Whatever the reason you've been summoned, it might be useful to know who called. \"Did the person who called for me leave their name?\" you ask.\n\n      \"A boy passed on the message,\" the waitress replies helpfully. \"The lad sounded scared, though - said the man who gave him the penny told him to hurry and find you, because it was an emergency. I wrote it down so I wouldn't get anything wrong.\"\n      \n      It's too bad she doesn't know the identity of the man who sent for you, but you thank her anyway before setting off for the address she gave you.\n      *set call_knowledge true\n      *set genre_savvy %+10\n      *goto murderhouse\n   #Eat breakfast before you investigate. The food here smells great!\n      Even heroic detectives need to eat, right? With everything that's been going on, you could use some time to relax and have a good meal.\n\n      \"Actually - Violet, wasn't it? - bring it out whenever it's ready,\" you tell her. \"I'll head over there after I've eaten.\"\n\n      \"But...\" she sputters. \"The boy who dropped off the message said it sounded awfully serious, Inspector! What if someone's died?\"\n\n      \"Then they'll be equally dead later, won't they?\" you point out. She gives a deep, melodramatic sigh, but heads back to the kitchen to check on the food. Soon enough she returns bearing a tray of overflowing plates. Sausages, savory pastries, roast potatoes, a bubbling shepherd's pie, and a surprisingly good but unidentifiable dish made from carrots and cauliflower. A surprisingly delicate lemon cake ends the meal.\n\n      Luckily, when you check the pocket of your tailored trenchcoat, you find enough money to pay for your meal. You're far too weighed down (and apparently well-known?) to do a dine-and-dash.\n      *set genre_savvy %-10\n      *set health -10\n      *goto murderhouse\n*label murderhouse\n*page_break Set off for the address\nIt's a short walk to 1811 Edgeworth Lane, and the locals you ask are happy to point you there. As well as directions, they pass on bits of gossip.\n\n\"Headed to Sir Reginald's manor? Have business with his Lordship, then?\" a woman laden down with shopping baskets asks. \"Don't envy you, he's a miserable old sod. They say even his friends can't stand him.\"\n\nAn old man with a stately bearing asks, \"Don't I recognize you from the papers? What's a famous detective like you doing in our corner of the countryside? Eh, I guess the old goat has his ways of persuading people to come, he often has interesting people over.\"\n\nA younger man confides, \"Me, I'd kill to go to a party at his manor. Always orders in the best grub, invites the best-looking ladies, tons of champagne bottles at the curb the next day. People speak bad of Sir Reginald, but y'can't say he don't know a good time!\"\n\nOne woman in a red blouse and full skirts only follows you distrustfully with her eyes, her face sharp and foreboding.\n\nAny question about whether you're headed to an investigation or a raucous, champagne-fueled \"tea\" is answered when you come within sight of the manor gates. Two grim-faced policemen stand guard, keeping anyone from entering or leaving the property. It's an impressive structure, with tall fences surrounding the well-groomed lawns and flower beds.\n*choice\n   #\"I was told to come immediately. Tell me everything that's happened.\"\n      The officers exchange a confused look. \"Told? By who?\" asks the taller of the two. \"I didn't call no one. And by the by, who the hell are you?\"\n\n      \"Shh, don't you recognize ${him}?\" hisses his colleague, elbowing him in the ribs. \"That's that famous detective from the city, Inspector $!{name}!\" He turns back to you and says, \"I don't know who got hold of you or how, ${honorific}, but it's like a miracle you're here. We've got a dead body in the garden and we're at our wits' end figuring out who killed him.\"\n\n      He produces a big bunch of keys and unlocks the gate, then holds it open for you. \"Please, let me show you to the scene of the crime. Any assistance you can give us, we'd be very grateful.\"\n      *set genre_savvy %+10\n      *goto in_the_garden\n   #\"It's all right, officers. I'll get to the bottom of this.\"\n      The shorter of the two officers looks relieved, while the other is obviously unimpressed. \"Good for you,\" he sneers. \"And who the hell are you?\"\n\n      His colleague jabs him in the ribs with his elbow and says, \"Forgive him, ${honorific}, he's not much of a reader. Me, I follow every one of your cases in the papers.\"\n\n      He produces a big bunch of keys and unlocks the gate, then holds it open. \"I don't know who called for you, but we're at our wits' end trying to figure this one out, Inspector. It's like a miracle, you showing up when you have. Come on through, I'll show you to the crime scene.\"\n      *goto in_the_garden\n   #\"Hello, boys - did I miss the party?\"\n      The two officers exchange an incredulous look. \"Sir Reginald has been murdered,\" one of them ventures. \"His body's still lying where it was found in the garden.\"\n\n      \"Oh, then I'm in time for the fun after all,\" you say with a grin. You always did like murder mysteries.\n\n      The taller of the two officers scowls at you, his face turning purple. \"Why you - a man is dead!\" His colleague catches him by the elbow and shakes him.\n\n      \"Hush! Don't you recognize ${him} from ${his} picture? That's Inspector $!{name}, from the city. Of course a genius like that thinks different from the likes of you or I.\"\n\n      He leads the other officer out of the way, and produces a big bunch of keys to unlock the gate. \"Let me show you to the body, ${honorific}. We're grateful you're here... I suppose someone from the station must've called you? It's like a miracle you showed up when you have, we've got no idea what to make of this.\"\n      *set health %-10\n      *set genre_savvy %-10\n      *goto in_the_garden\n*label in_the_garden\n*page_break To the scene of the crime\nThe body of an old man is sprawled in the garden, face down. What remains of his face, to be exact: a large boulder has caved in his skull, and still lies half on top of him from the neck up. He wears a checked, light-colored suit with a silk robe and slippers: a man of means having a leisurely morning before he was struck down.\n\n\"This gentleman is the late Sir Reginald Malweather. We've just arrived ourselves - we heard the shouts when his guests discovered the body, about fifteen minutes ago,\" explains the officer. \"We sent a runner to the station, and took up guard on the gate to prevent anyone from leaving. At that point the body was still barely warm, so it seems he died earlier this morning. That also fits the timeline his guests and neighbors have given us - he was alive and well as of last night, but was missing from his own tea this afternoon until someone thought to look out here.\"\n\nHe sighs, deflating. \"It's a mess, really. Everyone was on the property at the same time. The only one alone with him was his maid, before the guests showed up, but there's no way she could lift a bloody huge stone like that. This whole thing's just bizarre, ${honorific}. The late Lord had his enemies, but why kill him now? Why like this?\"\n\nBrightening a bit, the officer continues, \"The bit of good news is that the suspects are limited. There's no way onto the manor grounds except through the front gate, which is in clear sight of the neighbors. Except for a couple of deliveries, each person on property less than ten minutes apiece, the only people who were here today are gathered in the parlor. Sir Reginald kept a modest household, so only his live-in maid was here this morning, as well as the five guests he invited today.\"\n\nHe pauses, then suggests, \"I could show you the way to the parlor, if you'd like? Or you could look around first.\"\n*choice\n   #\"I want to talk to the suspects.\"\n      *goto talk_to_guests\n   #\"I want to look around before I talk to anyone.\"\n      *goto search_places\n*label talk_to_guests\n*set last_searched \"none\"\n*if ((questionings>=0) and (questionings\u003c2))\n   The five guests that Sir Reginald invited are sitting around the parlor, their expressions ranging from boredom to agitation. One maid darts back and forth refilling teacups before retreating back to the kitchen.\n*if ((questionings>2) and (questionings\u003c=5))\n   The guests are beginning to acknowledge your presence. You feel more confident about questioning them.\n*if ((questionings>5) and (questionings\u003c=7))\n   The five people gathered have started to recognize you, and you them. They have gone back to chatting quietly amongst themselves; this can only help your investigation.\n*if (questionings>7)\n   The guests are beginning to look a little bored, but it can't be helped. Your investigation will end when it ends.\n\nWho would you like to talk to?\n*goto talk_to_choice\n*label talk_to_guests2\nWho would you like to talk to next?\n*label talk_to_choice\n*set questionings +1\n*choice\n   *if not (vivian_interviewed)\n      #The flashy redhead decked out in beaded peach silk, eyeing you through a cloud of cigarette smoke.\n         *goto talk_to_vivian\n   *if ((vivian_interviewed) and (vivian_questions_asked\u003c=3))\n      *selectable_if (last_interviewed!=\"Vivian\") #You have more questions for Vivian, the woman who seems entertained by Sir Reginald's death.\n         *goto talk_to_vivian\n   *if ((vivian_interviewed) and (vivian_questions_asked>3))\n      *selectable_if (last_interviewed!=\"Vivian\") #You want to talk to Vivian again, who's been so forthcoming with everyone's secrets but her own.\n         *goto talk_to_vivian\n   *if not (wexley_interviewed)\n      #The scarred, unshaven man with strong arms and hard eyes, who sits cleaning his nails with a large knife.\n         *goto talk_to_wexley\n   *if ((wexley_interviewed) and (wexley_questions_asked\u003c=3))\n      *selectable_if (last_interviewed!=\"Wexley\") #You have more questions for Wexley, the professional killer who was the dead man's closest friend.\n         *goto talk_to_wexley\n   *if ((wexley_interviewed) and (wexley_questions_asked>3))\n      *selectable_if (last_interviewed!=\"Wexley\") #You want to talk to Wexley again, the man of few words who has nevertheless spared some for you.\n         *goto talk_to_wexley\n   *if not (colonel_interviewed)\n      #The solidly built man with the impressive mustache, who has an air of dignity despite the sweat rolling down his face.\n         *goto talk_to_colonel\n   *if (colonel_interviewed)\n      *selectable_if (last_interviewed!=\"Colonel\") #You have more questions for Colonel Amberley, the military man who was always at odds with the deceased.\n         *goto talk_to_colonel\n   *if not (elizabeth_interviewed)\n      #The well-dressed young lady who sits, stone-faced, with her hands folded in her lap as if at church.\n         *goto talk_to_elizabeth\n   *if (elizabeth_interviewed)\n      *selectable_if (last_interviewed!=\"Elizabeth\") #You have more questions for Elizabeth, Sir Reginald's ladylike but icily reserved goddaughter.\n         *goto talk_to_elizabeth\n   *if not (cecil_interviewed)\n      #The pale young man in the dashing suit who dabs at his forehead with a handkerchief, looking ready to faint.\n         *goto talk_to_cecil\n   *if ((cecil_interviewed) and (cecil_questions_asked\u003c3))\n      *selectable_if (last_interviewed!=\"Cecil\") #You have more questions for Cecil, the fragile clothes-horse who came here to court... someone.\n         *goto talk_to_cecil\n   *if ((cecil_interviewed) and (cecil_questions_asked>=3))\n      *selectable_if (last_interviewed!=\"Cecil\") #You want to talk to Cecil again, the surprisingly sensitive social climber who unexpectedly found himself here.\n         *goto talk_to_cecil\n   *if not (lily_interviewed)\n      #The maid who's doing her best to be invisible as she makes her rounds from the kitchen.\n         *goto talk_to_lily\n   *if (lily_interviewed)\n      *selectable_if (last_interviewed!=\"Lily\") #You want to talk to Lily again, the servant girl who can't seem to stop shaking.\n         *goto talk_to_lily\n   #You'd like to confirm some facts with the policemen at the gate.\n      *goto police\n   #You'd like to look around the manor instead.\n      *goto search_places\n   #You're done investigating and are ready to solve this mystery.\n      *goto moving_on\n*label talk_to_vivian\n*set last_interviewed \"Vivian\"\n*if ((vivian_interviewed) and (questionings\u003c=3))\n   Lady Vivian curves her lips in a smile as you come close, lowering her eyelashes. \"Hello again, Inspector. Something you need?\"\n   *goto ask_vivian\n*if ((vivian_interviewed) and (questionings>3))\n   Vivian laughs softly as you approach. \"Making excuses to talk to me again, darling?\"\n   *goto ask_vivian\n*if not (vivian_interviewed)\n   *set vivian_interviewed true\n   The woman's lips are painted the tropical magenta of poisonous plants, but the wood of her carved cigarette holder is too dark to show its stains. \"Reggie never let us smoke in the parlor,\" she says with relish. \"It's about time I was able to light up in here, though I wish that mousy little maid would let us drink. What's wrong with breaking out the champagne? It's not like we're waiting for him any more. She must think it inappropriate to toast so blatantly to his demise.\" She takes a long sip of her tea, tapping the cigarette into her saucer with a theatrical flourish. \n*if (elizabeth_interviewed)\n   Elizabeth \n*if not (elizabeth_interviewed)\n   The neatly-dressed young woman on the settee across from her \nwinces at this insult to the china, not bothering to hide her disapproval.\n\n\"My name is $!{name},\" you say. \"You may have heard of me?\" [i]Somehow. By the laws of this setting.[/i] The woman nods at this.\n\n\"And this lovely lady is Lady Vivian,\" \n*if not (cecil_interviewed)\n   the young man seated near her \n*if (cecil_interviewed)\n   Cecil \neagerly supplies. \"A frequent guest of Sir Reginald's.\" His face falls. \"Er, she was. Will have been?\"\n\n\"Oh, ${honorific},\" Vivian sighs. \"I'm a lady by marriage, bless my late husband. Not, I assure you, by reputation.\" The wink that follows her remark leaves no room for misinterpretation.\n*label ask_vivian\n\nYou ask Vivian...\n*goto ask_vivian_choice\n*label ask_vivian2\n\nNext, you ask Vivian...\n*label ask_vivian_choice\n*choice\n   *disable_reuse #About her location since she arrived at the manor.\n      *set vivian_questions_asked +1\n      \"My invitation said to come at eleven,\" she reports, studying her nails. \"I got here at eleven twenty, or thereabouts - it doesn't do to be on time to these things. I was here in the parlor with everyone, waiting on Reggie and wondering how he was rude enough to miss his own party, except when I went in the lounge to smoke. I thought Reggie would scold me if I lit up here, you know.\" She looks at you, waiting for your understanding, and you nod.\n\n      \"So,\" she concludes, \"that's how I passed a miserable forty minutes until the Colonel suggested getting some air. That's whem we found Reggie's body in the garden and had a bit of excitement before being cooped up once again, and... then you showed up, ${honorific}.\" She smiles at you, batting her eyelashes. \"And so things are once again getting interesting.\"\n      *set invitation_knowledge +1\n      *goto ask_vivian2\n   *disable_reuse #What she knows about the other people at the manor.\n      *set manor_gossip true\n      *set vivian_questions_asked +1\n      \"Ooh, good question,\" she murmurs, beckoning you closer and lowering her voice conspiratorially. \"Gossip is my favorite thing to do at these parties, don't you agree?\" She nods subtly towards \n      *if not (cecil_interviewed)\n         the young man who stares at her with longing eyes. \n      *if (cecil_interviewed)\n         Cecil, who stares at her with longing eyes. \n      \"Him? Bit of a social climber. He was flattered to get an invitation to this gathering - if you can believe it! He was looking forward to spending time with His Lordship, and not for the free champagne!\" You nod in encouragement. \"That barrel-chested warhorse over there? He hated the guts of Reggie, but he's the kind of military man who's not happy unless he's fighting. I think he liked hating him, if you know what I mean?\" Again, you nod.\n\n      She tilts her head slightly to the side, regarding the two other women in the room. \"That young miss who looks like a schoolmarm is a distant ward from out of town. Someone Reginald gave money, then brought here to watch her squirm. Then there's his maid - she's reliable, she's worked here for years without a word of complaint on either side, which is near a miracle. That's all I can say about her, which makes her thoroughly boring.\"\n\n      \"And that last fellow?\" you encourage, flicking your eyes towards the man she hasn't mentioned.\n\n      \"Oh,\" she says, shivering a bit on the word. \"That's Wexley. HE'S interesting.\" You wonder what it takes to fit Lady Vivian's standards of \"interesting\", but she does not elaborate.\n      *goto ask_vivian2\n   *disable_reuse #Why she doesn't seem upset about Sir Reginald's death.\n      *set vivian_questions_asked +1\n      \"Oh, I'm secretly devastated,\" she sighs, tossing her red curls. Then winks and smiles, re-crossing her legs in a cascade of peach silk and glass beads. \"Actually, I come to his parties because ever since my husband passed away, I get terribly bored. This murder is the most interesting thing that's happened in ages. I hope you solve it, though... no one likes a mystery without an ending.\"\n      *goto ask_vivian2\n   *if vivian_questions_asked=3\n      *disable_reuse #Whether she'll agree to talk to you in private. You have some more intimate questions.\n         \"Vivian,\" you ask, \"would you mind talking to me away from the others? I'd like to ask -\"\n\n         \"Say no more,\" she purrs, pressing a finger to your lips. \"Lead the way, detective.\"\n\n         *goto vivian_room\n   #Nothing else, you're done asking her questions.\n      *goto talk_to_guests2\n*label talk_to_wexley\n*set last_interviewed \"Wexley\"\n*if ((wexley_interviewed) and (questionings\u003c=3))\n   You return to Wexley. While he does not move or acknowledge you, he subtly watches your approach.\n   *goto ask_wexley\n*if ((wexley_interviewed) and (questionings>3))\n   As you walk back towards Wexley, he shows a hint of interest at your presence. It's more than you got before.\n   *goto ask_wexley\n*if not (wexley_interviewed)\n   *set wexley_interviewed true\n   \"Hello,\" you greet the man. \"I'm Inspector $!{name}.\"\n   \n   \"Wexley,\" he supplies, his dark eyes weighing you. His black hair and the matching stubble on his face are both worn slightly long, reminding you a little of a pirate.\n   \n   You ask, eyeing the knife he's still holding, \"What's your line of work, Mr. Wexley?\"\n   \n   \"Not Mister. Just Wexley. Hunter.\" A man of few words, clearly, but at least he has a good reason for having a blade that size? You watch as he replaces it into a sheath in his calf-length boot, finished with his task.\n\n   His clothes are much simpler than the others, a coat and breeches of faded tan leather over a light blue shirt open at the throat. The cream-colored scarf knotted there only partly covers the scar that traces down his cheek and across his jaw before trailing down his neck.\n*label ask_wexley\n\nYou ask Wexley...\n*goto wexley_questions\n*label ask_wexley2\n\nNext, you ask Wexley...\n*label wexley_questions\n*choice\n   *disable_reuse #About his location since he arrived at the manor.\n      *set wexley_questions_asked +1\n      \"Been sitting right here. Brought my own whiskey. Don't like tea,\" he explains. He holds up a sturdy-looking steel flask as evidence.\n\n      \"What time did you arrive?\"\n\n      \"Eleven. Card said to come then. Reginald wasn't here. I waited.\" You give him a moment, but that seems to be the end of the explanation.\n      *set invitation_knowledge +1\n      *goto ask_wexley2\n   *disable_reuse #What he knows about the other people at the manor.\n      *set wexley_questions_asked +1\n      \"Might've seen Vivian, she's been around before,\" he admits. \"Knew Reginald, of course. Maid's been the same for years.\" He shrugs. \"Not my business to keep track of them.\"\n      *goto ask_wexley2\n   *disable_reuse #How close he was to Sir Reginald.\n      *set wexley_questions_asked +1\n      \"We knew each other far back,\" Wexley says. \"Were friends... went hunting.\" He sighs, and for a moment his face looks tired. \"He had some beautiful guns. Who's going to make sure they stay polished now?\" \n      *goto ask_wexley2\n   *if (manor_gossip)\n      *disable_reuse #Whether he's aware that Lady Vivian thinks he's \"interesting\".\n         *set wexley_questions_asked +1\n         He gives a surprised bark that you identify as a laugh. \"Well. Does she. Some women [i]do[/i] like a killer.\"\n\n         \"And that's what you are?\" you ask, surprised to hear someone admit it so easily.\n\n         \"Aye. Military, mercenary, big game. Done it all.\" He pauses and looks at you. \"Didn't kill this one. Wouldn't be surprised if she thinks I did, though.\" He looks thoughtful. \"Wonder if it's worth the trouble... eh, never mind. Whiskey?\"\n\n         You decline his flask, seeing as how you're on the job (and are unsure where on his person he's been keeping it.)\n         *goto ask_wexley2\n   *if (devil_wexley)\n      *disable_reuse #Why Colonel Amberley seems convinced he's a devil in the flesh.\n         *set wexley_questions_asked +1\n         Wexley seems utterly uninterested in the question. \"Maybe I am,\" is all he says. \"Got no reason to be an angel. I've done some things.\"\n         *goto ask_wexley2\n   *if (cad_with_women)\n      *disable_reuse #Whether his late friend Sir Reginald was inappropriate with women.\n         *set wexley_questions_asked +1\n         Wexley's lip curls in a sneer, and he shakes his head. \"He wasn't nice to 'em. Never listened to me about it.\" He takes a pull from his flask. \"I told him, no need for head games.\"\n\n         \"What women are we talking about?\" you ask cautiously. You're wondering now about his maid or his goddaughter...\n\n         \"Mistresses,\" he clarifies. \"Only met one or two, that by accident. Didn't keep 'em long. Didn't like me to meet 'em, knew I wouldn't approve.\"\n\n         Carefully, you press one step further, \"Why would he think that?\"\n\n         He pauses, then speaks slowly. \"He never forced a woman. But he didn't play fair.\" He shakes his head, frowning. \"Can't explain it better than that.\" Realizing you've gotten more information from him than you expected, you nod and press no further on the matter.\n         *set mistress_knowledge true\n         *goto ask_wexley2\n   *if wexley_questions_asked>=4\n      *disable_reuse #Whether he'll talk to you privately. You'd like to understand him better.\n         *goto wexley_room \n   #Nothing else, you're done asking him questions.\n      *goto talk_to_guests2\n*label wexley_room\n\"Wexley, may we speak in private?\" you ask.\n\n\"Why?\" he asks, furrowing his eyebrows.\n\n\"I'd rather tell you away from the others,\" you reply, shifting your gaze away. \"If you don't mind.\"\n\nWexley narrows his eyes but gives a brief nod of assent. You summon your courage and head to the study, trusting he will follow. Once he does, you close the door behind you with a heavy thud. The French door to the garden remains, but it will be harder for anyone to interrupt you or eavesdrop from the parlor. You feel Wexley studying you, analyzing this latest move.\n\n\"Let me explain why we're here,\" you suggest. You pause, trying to figure out how to word it in a way that won't offend him.\n\nHe replies in a low voice, \"I know why. Just say it.\" He takes a step towards you; you take an instinctive half-step back, and feel the wall behind you. No more room to retreat, but you know what you want to say.\n*choice\n   #You search his face. \"Did you kill him?\"\n      He pulls away from you, his face twisting in something like disgust - grief, you realize after a startled second.\n      \n      \"No. Damn it, no.\" He walks over to one of the leather-clad sofas, slumping down on it with his hands folded and head down. \"...Want to be alone. Go.\"\n      \n      There's no point in staying here further. You head back to the parlor, wondering if you've broken the formerly emotionless man. But no - only a few minutes later he's back, as taciturn as ever and acting as if nothing happened. You suppose it's the best you could hope for after  accusing him of murdering his friend.\n      \n      *goto talk_to_guests2\n   *selectable_if (looking_for_love) #You look into his eyes. \"I like you, Wexley.\"\n      *set looking_for_love false\n      *set npc_name \"Wexley\"\n      Wexley rests his palm against the wall, leaning in towards you. Your chests lightly touch, and he brings his other hand up to cup your face. He studies your expression, his thumb stroking your chin with surprising delicacy.\n\n      \"You do,\" he confirms, not without some surprise. The ball of his thumb presses into your lower lip, and then he's kissing you. \n      *goto wexley_kiss\n   #You glare. \"Back away from me, now.\"\n      He raises both hands as if surrendering, and steps away. \"Yes, ${honorific}.\" He keeps space between you as he moves to the door and exits.\n\n      Everything from his measured, toneless speech to the cautious way he leaves the door open speaks of both anti-aggression and mockery. You wonder how often, as a mercenary, he employed this technique in tense moments (such as, apparently, conversations.)\n\n      By the time you return to the parlor, he's already sitting in his former chair, ignoring you as if nothing happened. You suppose it's as much respect as you're going to get from him.\n\n      *goto talk_to_guests2\n*label wexley_kiss\n\nIt's a solid response that deserves a follow-up of its own.\n*choice\n   #You return the kiss, then go. You want to leave him wanting more.\n      You sink into the kiss, letting your arms close around him. Everything your fingertips touch is hard muscle, but you can feel the yearning in his deep breaths. Then you let him go, and you feel the transformation as he becomes the old, controlled Wexley. A long, slow exhale, muscles relaxing as he releases you, and the former calm returns.\n\n      \"Until later,\" you murmur. You hurry back to the parlor, quickly checking your clothes on the way. It takes Wexley a minute to catch up, which gives you an inward smirk.\n\n      *goto talk_to_guests2\n   *if he=\"he\"\n      #\"You seem very comfortable doing this with another man.\"\n         \"I WAS in the military,\" he says, as if this explains it. You're about to second-guess the logic, then spot the quirk at the corner of his mouth. Wait, are you starting to get his sense of humor? He has one?\n\n         \"Did you have many soldiers in your past, then?\" you instead ask flirtatiously.\n\n         He frowns. \"Not a lot. Soldiers die. I moved around...\" He looks down. \"It's been a long time. Since anyone offered, or I cared.\" He looks back at you. \"Anything else you want to know?\"\n         \n         ...Oh. You touch his face, meaning to offer comfort. Your fingers trace the scar there.\n         *goto wexley_scar\n   *if he=\"she\"\n      #\"Do you always move this fast when women say they like you?\"\n         He gives a rusty laugh, stepping back. \"Wouldn't know. Doesn't happen often.\" He runs his fingers through his dark hair, as if keeping his hands busy.\n\n         \"Really?\" Your eyebrows raise in surprise, he arches one exaggeratedly, and you can't help but smile. \"It's just, you're a good-looking man who's had a lot of experiences. \n         *if (manor_gossip)\n            Even Vivian is interested in you. \n         I'm curious why you don't have any women in your life.\"\n         \n         \"Tigers on safari,\" he says with a sigh.\n         \n         \"Huh?\"\n         \n         \"Women like seeing tigers,\" he explains. \"Like to look at 'em, think stories about 'em are exciting. Maybe even take a trophy. But when it comes down to it... you don't want a tiger in your house, do you?\" He unconsciously touches the scar on his face.\n         *goto wexley_scar\n   *if he=\"they\"\n      #\"That answers my question about whether not being female is a problem...\"\n         He quirks his lips in a half-smile. \"Always thought life's too short for rules. I've broken enough to mind what people think. And - I like you.\"\n\n         \"And what rules might you mean?\" you tease, while thinking over the last bit.\n\n         He smirks. \"Should know better than to ask. Laws, society's, commandments.\" He thinks for a second. \"More than six, I think?\"\n\n         \"Despite all that, you seem pretty decent,\" you say, hoping to encourage him to say more. \"Do you have your own moral code?\"\n\n         \"Not really - I'm not that decent. If something's important, someone has to get their hands dirty. That's me.\" He laughs shortly. \"Enough, you'll have me talking about my past next. You've had enough horror for one day.\" He unconsciously touches the scar on his jaw.\n         *goto wexley_scar\n   #\"You don't have to be so gentle with me, Wexley.\"\n      He paces forward until your back is flat against the wall, and growls in your ear, \"You mean, you don't want me to be?\"\n\n      He finds your hands and draws them over your head. \"Do you think I'm a brute?\" He kisses your neck firmly, tests your earlobe with his teeth. The stubble is growing in since the last time he shaved, rasping your skin when he moves close. \"The kind of man who'd tear your clothes off with people in the next room?\"\n\n      Wexley attacks your lips with his own, and your tongues meet in a brief promise. Then he releases you and steps away. \"...Maybe. But Reggie's dead. You have work to do.\" Does he sound a little accusing? Mad at himself, perhaps? That's a mystery for another day.\n\n      \"You're right,\" you say instead, and smile at him. \"I'm going to figure this out, so - until later?\" You run your hand down his cheek, your fingertips catching in the groove in his stubble that marks his scar. When he doesn't flinch, you complete the gesture.\n      *goto wexley_scar\n*label wexley_scar\n\nYou've already been gone for suspiciously long. While you're tempted to ask about the scar, now probably isn't the time. You straighten your clothes and try to mimic Wexley's admirable act of nonchalance as the two of y
