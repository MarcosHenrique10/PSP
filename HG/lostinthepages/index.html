   \"I haven't seen my sister in ages,\" Lily insists, but she looks away from you. You think you're on to something - close to the last remaining truth.\n\n   \"She helped you, didn't she?\" you say. \"Violet. She was the unknown woman. She made the delivery, helped you move the body, and took away your bloody aprons afterwards.\"\n\n   Lily nods miserably. \"You're clever'er than me, for sure - You got me, all right? Now take me in, ${honorific}. I'll face my judgment. Just please, leave my sister out of it. She had no idea what I was plotting, and couldn't have stopped me.\"\n   *goto lily_choice\n*if (((lily_sister) and (mistress_knowledge)) and (patron_of_arts))\n   *set mind %+5\n   Was it because he supported the theater in order to force your sister into something?\"\n   \n   \"He -\" she spits viciously, then falls silent, as if her words are choking her. \"Never mind.\"\n\n   \"Tell me why he's dead,\" you encourage.\n\n   \"She never told me to kill him!\" Lily cries wretchedly. \"It wasn't her plan, it wasn't her fault, ${honorific}! Please believe that.\" Her face twists in disgust. \"'Oh, Lily,'\" she mimics. \"'He's given so much to the theater. Without him, the whole troupe would fail. It's not like I like it, but what can I do, Lily? If I insult him, he might take back his patronage.'\"\n\n   She looks at you, her face a grimace of rage. \"He'd given the endowment to the theater. She got nothing from his life or death since that point, nothing but the vague threat he might take it back. Do you see? How no one can be forced, but everyone can be obligated? How my sister could do nothing, but I who had not suffered enough to warrant a murder on my own behalf might find a way to do something? She did not benefit. She'd have stopped me if she'd known what I was plotting, to be sure. But she'll never suffer him again.\"\n   *goto lily_choice\n*if not (lily_sister)\n   Did he do something to you?\"\n\n   She sneers at you, and spits - a literal gob that narrowly misses your feet. \"I'm just a terrible criminal, ${honorific}, i'int I? There's no understanding people like me.\" Her face closes up, and you understand at least that you won't get any more explanation out of her.\n   *goto post_good_end\n*label lily_choice\n*choice\n   #\"Very well. Thank you for your confession... please come along quietly.\"\n      Lily takes you at your word, nodding silently and following you. You ceremoniously walk her to the two policemen at the gate, where she raises her wrists and joins them together in the age-old gesture of a prisoner surrendering to the coppers.\n      *goto post_good_end\n   #\"You can't fool me. You're a cold-blooded murderer and you need to pay for it.\"\n      Lily shrugs indifferently. \"You caught me. They're going to hang me. What use is it to complain?\" You bring her to the gate and the two waiting policemen, wary in case she tries anything. But she only holds her wrists up, joined together in the age-old gesture of a prisoner surrendering.\n      *goto post_good_end\n   *if (lily_sister)\n      #\"Wait. I don't just need to arrest you, your sister is guilty as an accomplice.\"\n         She sneers at you. \"Don't you get it? Her part in the plan was this - I ordered pastries the day of the party.\"\n\n         \"And then she brought them, expecting to be the other half of a murder plan,\" you argue.\n\n         \"She never. She expected a tip, and saw a body. She was shocked, and while she was weak and confused, I bullied her into it,\" Lily spits. \"I told her no one would believe it wasn't her idea, that she'd have to help me, quickly, if we were both to get away with it. If you blame her for this, you're a fool.\"\n\n         Under the vitriol is genuine worry - however Lily's sister first got involved in this plan, Lily still doesn't want her to get in trouble for it.\n         *goto sister_choice\n   *if (lily_sister)\n      #\"Lily, I see what's happening here. Your sister used you. She's the mastermind.\"\n         She laughs incredulously. \"Of course! She didn't even want to help, I had to trick her with a delivery to make her come here today, but of course Violet is the one pulling the strings. She's the pretty one, isn't she? The one who's social, and vivacious, and has a life outside this house? Why, I was content to be shut in here and suffer, so I must be a tool of hers.\"\n\n         She twists her face in disgust. \"You understand nothing of me, or of my sister. She may be charming, but she's weak, and she needs me. I'm the strong one. That's why I was able to endure that bastard for so long.\"\n\n         \"Until your sister needed you to get rid of him?\"\n\n         \"She didn't realize it, but yes, she did!\" Lily insists. \"He was poisoning her! He was poison, he needed poisoning!\" Looking at the hate and disgust twisting her face, you feel no doubt whatsoever that she is telling the truth about having killed her late employer.\n         *goto sister_choice\n   #\"Look, I couldn't care less. Let's get you to the police so I can get out of here.\"\n      She nods appreciatively, as if agreeing to get this over with, and comes along quietly as you take her to the front gate where the police are waiting. There she offers her wrists in an almost perfunctory way: [i]Take me, coppers[/i].\n      *goto post_good_end\n*label sister_choice\n*fake_choice\n   #\"Nice try, Lily, but you're not the actress in the family. She was the mastermind all along.\"\n      \"You idiot,\" she snarls, brows drawn above a malevolent glare. \"Do you think I'm too plain to be a murderess, too quiet? It's Violet's beauty that's made her weak all these years, a butterfly in a net. I'm the one who does the hard things that need doing, and I spit on anyone who can't tell a decorative flower from something good and solid, that digs the weeds from this poisonous world!\" Her language degeneraates from there, but she's running out of profanities by the time you've updated your report and marched her out to the gate to face the waiting justice of the officers there.\n   #\"You're lying about how involved she was with the plan, and I can prove it.\"\n      \"You weave a good story,\" you say. \"But I know she showed up planning to help you.\"\n\n      She sneers, spitting on the ground at her feet. \"Prove it.\"\n\n      \"She showed up with her hair tied in rags, stooped over and dressed to hide her figure,\" you point out. \"Does she usually go on deliveries in disguise? Was she concerned that she would be recognized as your sister, or that her pastries would be mistaken for the murder weapon? Not that they were, of course... you took care of that at breakfast.\"\n\n      She winces, and you know you have her. You add a note to your conclusions about Lily's sister being an active accomplice in the plan, if not more, and walk her to the gate where the two officers are waiting. The rest, you'll leave to the courts.\n      *achieve thewholetruth\n   #\"Look, I know she knew more than you say. But since you planned this I'll let her go.\"\n      \"Lily,\" you say with a sigh, \"she showed up in disguise. Hair tied up with rags, loose dress to disguise her figure, hunched over to look older. She knew on her way to the manor that she didn't want to be recognized going there. So she knew more than you're saying.\"\n\n      Lily winces and looks away from you. You continue forcefully, \"But I really don't care about that. I do believe that killing Sir Reginald was your idea, and that stopping you was beyond her power. So let's put the final chapter to this sad story, and turn you in. I don't think your sister needs to be part of this.\"\n\n      \"Thank you,\" Lily whispers. She is downcast but calm as she follows you to the gate, where the officers of the law await.\n   #\"You're right. She's as much a victim in this as anyone else.\"\n      Lily fidgets, feeling your judgmental eyes on her, but finally has no choice but to look down at her feet as she shuffles them. \"It's as you say. I never should have got her involved, and you've undone my great mistake. Thank you for your mercy, ${honorific}.\" She says no more as you lead her to the officers waiting at the front gate, and judgment.\n*label post_good_end\n\n\"What's this, then?\" asks the taller policeman, looking astonished. \"Is this young lady really our murderer?\"\n*fake_choice\n   #\"Don't underestimate her. She's a calculating, cold-blooded killer.\"\n      \"She's half your size, if that,\" you agree. \"She's young and doesn't look very frightening. But she smiled at a man this morning while serving him breakfast, watched him die, then spent the rest of the afternoon trying to cover it up and walk free. Do you want to let your guard down around a person like that?\"\n\n      He might not have much sense, but the big man does have a survival instinct. He looks unsettled, and casts a nervous glance to his colleague, who smoothly moves in with handcuffs. After clicking them into place, he takes a firm grip on Lily's elbow. \"Come along, Miss. We'll want to question you thoroughly at the station.\" He marches her off, watching her like a hawk.\n\n      Yes, they're taking her seriously. Your work here is done.\n   #\"This murder was caused by not taking women seriously. You could learn something.\"\n      The shorter officer holds up a patient hand. \"Begging your pardon, ${honorific} - I shall see that the murderer is treated with the proper caution and care, and from what you say, she has quite the story to tell. But I think your expectations of my fellow officer are a bit unrealistic, ${honorific}. He's not known for his learning.\"\n\n      \"Solid, I am,\" the man in question says proudly. \"I forgot myself how to read so words can't get in me head. They'd mix it up otherwise.\" You, the shorter officer and Lily, despite the vast differences between you, share a look of complete sympathy. Then the moment passes, the shorter officer moves to handcuff Lily, and he takes a firm but professional grip on her elbow. \"All right, Miss. Let's get along to the station. I suspect we have a lot of talking and paperwork ahead of us.\"\n\n      You watch him escort her down the road, careful neither to let her escape nor to dig his fingers into her flesh, and you know... your work here is done.\n   #\"Nooo, she's just holding her hands up for the handcuffs because it's her hobby.\"\n      He stares at you like a moose trying to do math. \"Yes,\" you clarify. \"She is the murderer. She murdered the dead man. To death. Please cuff her, officer, and take her to the jail for murderers.\"\n\n      He still shakes his head in bewilderment but moves to follow your command, handcuffing her. \"Thank you again for all of your help,\" his quicker-witted colleague supplies, and takes Lily by the elbow to escort her. His grip looks firm; with at least one steady hand on duty, you have no doubt she'll make it to the station. Your job here is done.\n   #\"When you have eliminated the impossible...\"\n      \"...what remains, however improbable, must be the truth,\" you finish.\n\n      \"Cor, that's smart,\" the shorter policemen says reverently. \"Someone should write that down in a book somewhere.\"\n\n      \"That would be a great idea,\" you agree, and wish them well. You watch as they escort Lily to the station, cuffed and with an officer at each elbow. Your job here is done.\n      *set genre_savvy %+5\n   #\"Forget it. It's Chinatown.\"\n      The officers exchange a baffled look. \"It's not,\" the shorter policeman ventures. \"We're in England. This is Edgeworth Lane in Asbury Downs.\"\n      \n      \"Forget it,\" you repeat mysteriously, and add a Jedi-style hand wave for good measure.\n      \n      \"Yes, ${honorific},\" they affirm, nodding agreeably. The shorter policeman steps forward to handcuff Lily, then takes her elbow with a firm but professional grip. \"Come along, Miss. We'll have questions for you at the station.\" He turns back to you. \"Thank you again for your help, ${honorific}. And for all of your advice... even if some of it is a little odd.\"\n      \n      You feel a warm fuzzy feeling as they walk away, escorting the murderer you caught. Your work here is truly done.\n      *set genre_savvy %-5\n*set stories_completed +1\n*if ((npc_name=\"Vivian\") or ((npc_name=\"Cecil\") or (npc_name=\"Wexley\")))\n   *gosub romance_conclusion\n\nThe world turns white, like a blank page, and you find yourself standing in the bookshop, holding a piece of paper that looks like it was torn out of a book. It has a picture of a magnifying glass, its rim engraved with an intricate pattern that comes together in intriguing ways.\n*set sash true\n*set mind %+10\n*goto_scene bookshop_scenes\n*label romance_conclusion\n\nOr no, wait - there's one last loose end to tie up. ${npc_name}, a character who became more than that to you during the course of this story.\n*choice\n   #You want to show ${npc_name} that you care.\n      *set mc_in_relationship true\n      *achieve loveinstrangeplaces\n      *if npc_name = \"Wexley\"\n         Wexley looks calm as you walk towards him, but by now you know better than to misinterpret that. You stand silently and look at him, letting him have the first word; with someone like him, you know it will be important.\n\n         \"You solved it,\" he says finally.\n\n         \"Yes.\"\n\n         \"Reggie... he wasn't a good man. But it's good to know the truth,\" Wexley continues.\n\n         \"Yeah.\"\n\n         He touches your cheek and sighs. \"I'll work it out, ${name}. I'll talk to the police and tell them what I know about Lily. It's the least I can do after knowing you.\"\n\n         You smile at him. \"You talk like you're never going to see me again. Don't write me off so soon.\"\n\n         \"Then we'll call it goodbye for now,\" he says, with a slight smile. \"Go give 'em hell, $!{name}.\"\n         *return\n      *if npc_name = \"Vivian\"\n         As you walk back towards Vivian, she smiles and holds out her hand for a kiss. You indulge her, and she laughingly twirls in a following dance step.\n\n         \"You've been lovely, dear,\" she says, glancing back over her shoulder. \"Go and do more wonderful things.\"\n\n         \"Vivian,\" you say softly. \"You know my name - call me that. And this doesn't have to be goodbye.\"\n\n         She turns back and grips your hands, staring into your eyes. Her own are grey, violet, green, black, blue - a kaleidoscope of colors that some author didn't bother to define. \"Fine. Your name is $!{name}. You aren't really a detective. And now that you're done with that, you should get away, and never come back.\"\n\n         You grab her by the shoulders. \"Vivian... I'm not leaving you.\" She collapses into your arms, body shuddering against yours. Only then are you aware of the other guests of the story, soberly watching you interact. They know better, though, than to interfere.\n\n         \"I'll find a way to take you out of here,\" you promise, and kiss her. She kisses you back sweetly, and then pushes you away.\n\n         \"Go, darling,\" she says. \"${name}. You have monsters to fight and mysteries to solve. I'll be here, believing in you, ready to join you when you figure it out.\" Her smile is the last thing you see as you fade back through the pages.\n         *return\n      *if npc_name = \"Cecil\"\n         Cecil gives you one of his bright, trademark smiles as you walk towards him, but his usual puppy-dog aura seems subdued. \"Something wrong, Cecil?\" you ask.\n\n         \"Well... it's been a pleasure getting to know you, $!{name},\" Cecil says. \"It's just that, now that your time here is over - I will miss you.\" You notice the quaver in his voice, and your arms go around him on instinct. Out of the corner of your eye, you spy Vivian smirking approvingly.\n\n         \"We'll see each other again, Cecil,\" you say to him softly. \"I'll do everything I can to make that happen.\" And there, in front of a parlor full of mixed Victorian aristocrats, you kiss the sensitive, silly, foppish young man you adore.\n\n         You move on then, ready for another story. Though your eyes are mostly for Cecil, before you disappear you see a salute from Colonel Amberley, a stiffly misty-eyed gesture to send you on your way.\n         *return\n      *return\n   #You move on. Whatever you had wasn't real.\n      *set looking_for_love true\n      You were under the influence of literature; you and ${npc_name} got swept up in the scene. It's not like you have a lot in common, so it's better for both of you to forget about it. Your mind is calm as you prepare to step back through the pages.\n      *return", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Clarissa\"\n*set genre_savvy 70\n*set mind 80\n*set body 50\n*set soul 55\n*set health 50\n\nHis words on your voicemail were hurried, but you couldn't tell whether it was from excitement or agitation. \"Are you free to come out for a few days?\" he asked. \"I could use some help from my favorite relative. In fact -\" But there the message cut off.\n\nHe hadn't answered your calls since then. Knowing Uncle Irwin, it was likely he had absent-mindedly dropped his phone into a cup of tea or something.\n*fake_choice\n\t#At least, that sounds exactly like the kind of stupid thing your goofy uncle would do.\n\t#Still, you can't help but to worry about him.\n\t#Not that you really care about him. You just want his stuff when he kicks the bucket.\n\n*script changeBackgroundColor(\"black\")\n\n*set body_name \"Fisticuffs\"\n*set mind_name \"Deduction\"\n*set soul_name \"Intuition\"\n*set health_name \"Credibility\"\n*set name \"Angel\"\n*set mind 88\n*set body 55\n*set soul 66\n*set health 85\n*label moving_on\nYou feel like you've investigated all of the available clues, and interviewed anyone with something relevant to share.\n\nIt's time to make a decision: how are you going to solve this case?\n*fake_choice\n\t#You're going to use your powers of deduction to bring together everything you've learned.\n\t#You're going to use your intuition to try to sense who's been lying to you, and why.\n\t#You're going to lay a trap for the culprit, put yourself in danger, and hope they implicate themselves.\n\n*script changeBackgroundColor(\"sepia\")\n\n*set mind 73\n*set soul 33\n*set body 57\n*set name \"Kendra\"\n*set mind_name \"Quick Thinking\"\n*set soul_name \"People Skills\"\n*set body_name \"Fitness\"\n\nA tall woman dressed in brown leather stands with her sword drawn next to a seated pregnant woman in her twenties. On her other side, a one-armed man glares ferociously at you and Blanche.\n\n\"Welcome to Ibu,\" the pregnant woman says, and you notice a silver crown resting in her braided black hair. \"I am Queen Enia, and this is my island. There are invaders from Nakal pursuing you. Are you with them, or with me?\"\n*fake_choice\n\t#\"If we help you, will you help us return home?\"\n\t#\"Neither. We're not from here, and we're definitely not with them.\"\n\t#\"What would you do if we said we were with them?\"\n\t#\"Your Majesty, we'll serve you as well as we can.\"\n\t#I agree to anything, as long as Blanche and I aren't separated.\n\n*set name \"Isobel\"\n*set genre_savvy 90\n*set mind 80\n*set body 50\n*set soul 55\n*set health 50\n\nFor a while you follow Lorenzo in silence, wondering if you screwed up somehow. Then he stops and points at a large, metal-clad tower, the shape vaguely reminding you of the cooling tower of a nuclear power plant.\n\"Do you see that tower over there? That's where this island's main engine is kept.\"\nYou nod in acknowledgement, and then frown.\n*fake_choice\n\t#What would an island need an engine for?\n\t#How old would that tower even be?\n\t#Did all the buildings on the island once look like that?\n\n*if choice_is_ios_app\n\t*finish\n\n*set name \"John\"\n*set genre_savvy 50\n*set mind 65\n*set body 55\n*set soul 34\n*set health 80\n\n\nAs you continue walking eventually you arrive at a solid wooden door, \nand judging from the faint light seeping out from under it there must be some light source at the other side. Slowly you push the door open \nto reveal a rather large room with an impressive stone vault over it. One large torch on one of the walls provides enough illumination for you to see clearly, \nthough the flickering light gives the place a rather macabre look.  \nIn the centre of the room, sitting on top of stone pedestals, are two wooden coffins.\n\nA sudden shiver runs through your spine as you see this. There is one other exit to the room, through a wooden door opposite the one through which you have entered. \n\n*fake_choice\n\t#Take the wooden torch hanging on the wall     \n\t#Quickly walk across the room and exit through the other room\n\t#Open one of the coffins to see what is inside\n ", "startup": "*title Lost in the Pages\n*author Felicity Banks, Adrao, Cecilia Rosewood, and Sashira\n\n*scene_list\n\tstartup\n\tbookshop_scenes\n\tbookshop_scene_fail\n\ttrial_end\n\tcecilia_rosewood_tale\n\t$ atlantis\n\t$ felicity_tale\n\t$ adrao_tale\n\tadrao_second_story\n\t$ addicted_tale\n\t$ sashira_tale\n\t$ patchwork_tale\n\t$ final_tale\n\t\n*create name \"\"\n*create genre \"\"\n*create dream_job \"\"\n*create genre_savvy 50\n*create body 50\n*create mind 50\n*create soul 50\n*create health 50\n*create body_name \"Body\"\n*create mind_name \"Mind\"\n*create soul_name \"Soul\"\n*create health_name \"Health\"\n*create stories_completed 0\n*create he \"\"\n*create his \"\"\n*create him \"\"\n*create looking_for_love false\n*create mc_in_relationship false\n*create npc_name \"\"\n\n*create dandd false\n*create mansion false\n*create queen false\n*create cop false\n*create dofd false\n*create daze false\n*create sash false\n*create sash_started false\n*create adrao_started false\n*create adrao2_started false\n*create cecilia_started false\n*create atlantis_started false\n*create felicity_started false\n*create addicted_started false\n\n*create adrao_tale_relationship 0\n*create navigator_name \"Migs\"\n*create navigator_his \"his\"\n*create navigator_him \"him\"\n*create navigator_he \"he\"\n*create navigator_salute1 \"Hi\"\n*create navigator_swear1 \"bloody\"\n\n*create limit_trial_playthrougs 0\n\n*achievement warhero visible 20 War Hero\n\tCan you risk your life to help someone else?\n\tYour courage and fighting skill is famous.\n\n*achievement madeadifference visible 20 Made A Difference\n\tCan you turn the tide of the coming battle?\n\tYou have changed the battle outcome for the better.\n\n*achievement figuredhimout visible 20 Figured It Out\n\tCan you discover the kingdom's best-kept secret?\n\tYou have discovered Quiet's true identity as the deep-voiced King Rajnin.\n\n*achievement fastfish visible 20 Fast Fish\n\tAre you the fastest merperson in the seven seas?\n\tYou won the dolphin race.\n\n*achievement freenereid visible 20 Free Nereid\n\tCan you free your \"best friend\"?\n\tYou freed Nereid from the land-walkers.\n\n*achievement loveinstrangeplaces visible 40 Love In Strange Places\n\tThat's an odd place to find love.\n\tYou started a relationship with a character from a book.\n\n*achievement doitagain visible 20 Do It Again\n\tEver wanted to fly by dragon?\n\tYou flew on Electra's back.\n\n*achievement oldschool visible 20 Old School\n\tNot everything has to be complicated.\n\tYou flew by hot-air balloon.\n\n*achievement golemsurvivor visible 20 Golem Survivor\n\tNot everything in these lands is docile.\n\tYou survived an encounter with a lava golem.\n\n*achievement killed_minion visible 30 Vampire Killer\n\tBeware the dangers in the crypt. \n\tYou killed a vampire. \n\n*achievement escaped_minion visible 20 Vampire Survivor\n\tWhen confronted with evil you cannot defeat, flee! \n\tYou survived an encounter with a minor vampire. \n\t\t\n*achievement killed_master visible 40 Killed Vampire Lord\n\tNot everybody is what they seem. \n\tYou rid these lands of a vampire lord.\n\n*achievement survive_ambush visible 20 Survived ambush\n\tRoads are dangerous. \n\tYou survived an ambush on your SAPEV.    \n\n*achievement got_information visible 30 Detective\n\tInformation is difficult to obtain. \n\tYou got information on the whereabouts of Alexandros Doll.    \n\n*achievement zero_alert visible 40 Peaceful Law Enforcer\n\tLocals can be dangerous if provoked.\n\tYou managed to get Alexandros Doll without enraging the locals.       \n\t\t\n*achievement elementary visible 30 Elementary\n\tFollow the correct sequence of logic to solve the case.\n\tYou used your deduction to correctly solve the mystery.\n\n*achievement thewholetruth visible 30 The Whole Truth\n\tYou found the killer, but is there more to the story?\n\tYou figured out the role of Lily's sister in the murder.\n\n*achievement justatrope visible 10 It's Just A Trope\n\tIt's a classic, not a clue.\n\tYou guessed that the ice was related to the murder. (It isn't.)\n\n*achievement whodunnit visible 10 Murderer\n\tYou figured out the identity of the murderer.\n\tNow you know who she is, all you need to do is survive.\n\n*achievement youlost visible 50 Doing The Impossible\n\tYou did something that was supposed to be impossible.\n\tYou lost. That's an achievement of its own.\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tTravel through different books in a quest to find your uncle! You will travel through a number of stories, seek to understand why they are falling apart, and trying to solve the mystery of your uncle's bookshop.\n\n\t[i]Lost in the Pages[/i] is a 125,000 word interactive novel by a collection of authors, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n\tThere are over a half a dozen stories to choose from, from fantasy and science fiction, to horror or mystery. Can you rescue your uncle and restore order to the stories, or will you be consumed by the menace hanging over him?\n\n\t• Play as male, female, or non-binary, with any orientation.[n/]\n\t• Travel the seas as a mermaid, ride a dragon, explore futuristic worlds or become a detective. The choice is yours![n/]\n\t• Stick to tropes, or break them![n/]\n\t• Save not one world, but many!\n\n\t*if choice_prerelease\n\t\t[i]You can play the first two chapters of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n\t\t*choice\n\t\t\t#Sign up to be notified when the game is available.\n\t\t\t\t*subscribe {\"now\": true}\n\t\t\t\t*restart\n\t\t\t#Play the first two chapters now for free.\n\t\t\t\t*goto purchased\n\n\t[i]You can play the first two chapters of the game for free. Purchase the rest of the game below.[/i]\n\t*if choice_is_advertising_supported\n\t\t[i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n\t*purchase_discount adfree 2017-09-14 $4.99 $2.99 purchased\n\t*if choice_is_advertising_supported\n\t\t*page_break_advertisement\n\t*if not(choice_is_advertising_supported)\n\t\t*page_break Play Now for Free\n\n\n*label purchased\n\n*page_break\nYou groan and stretch as you climb out of your car. It was a long trip, and you didn't want to stop to rest. Uncle Irwin's message was cryptic enough that you were anxious to get here quickly, even though you had to take time off from your job as a cashier.\n\nIt's hardly a dream job, but it pays the bills. If you had the choice you'd do something different with your life. You've always wanted to be...\n*choice\n\t#a teacher in a local college's science department.\n\t\tScience has always been something that held your interest, and by explaining it to others your own knowledge would be able to grow as well.\n\t\tYou even know in which field you'd prefer to teach.\n\t\t*set mind +20\n\t\t*choice\n\t\t\t#You would like to teach theoretical physics.\n\t\t\t\t*set genre_savvy +10\n\t\t\t\t*set dream_job \"Professor of theoretical physics\"\n\t\t\t\t*goto latemessage\n\t\t\t#You would like to teach applied sciences.\n\t\t\t\t*set genre_savvy -10\n\t\t\t\t*set dream_job \"Professor of applied sciences\"\n\t\t\t\t*goto latemessage\n\t#a professional bookworm.\n\t\tBooks have their own special kind of charm, and you wouldn't want anything more than to be surrounded by them for most of the day.\n\t\tOne job in specific is firmly on your mind.\n\t\t*set mind +20\n\t\t*choice\n\t\t\t#You would like to be an editor.\n\t\t\t\t*set genre_savvy +10\n\t\t\t\t*set dream_job \"Editor\"\n\t\t\t\t*goto latemessage\n\t\t\t#You would like to be a librarian.\n\t\t\t\t*set genre_savvy -10\n\t\t\t\t*set dream_job \"Librarian\"\n\t\t\t\t*goto latemessage\n\t#a professional sports player.\n\t\tThere's nothing more exciting than to play sports, and there's one thing in specific you'd like to be.\n\t\t*set body +20\n\t\t*choice\n\t\t\t#You would like to be a reasonably successful soccer player on one of the local  teams.\n\t\t\t\t*set genre_savvy +10\n\t\t\t\t*set dream_job \"Soccer player\"\n\t\t\t\t*goto latemessage\n\t\t\t#You would like to play curling for one of the local teams.\n\t\t\t\t*set genre_savvy -10\n\t\t\t\t*set dream_job \"Curling player\"\n\t\t\t\t*goto latemessage\n\t#a fitness model.\n\t\tExcersising is great, and if you can make your job out of looking good in pictures that's even better.\n\t\tYou even know what part of you the photographers would have to highlight.\n\t\t*set body +20\n\t\t*choice\n\t\t\t#Your muscles would be the star of the show.\n\t\t\t\t*set genre_savvy +10\n\t\t\t\t*set dream_job \"Fitness model\"\n\t\t\t\t*goto latemessage\n\t\t\t#You would be supposed to look fit and healthy for the pictures.\n\t\t\t\t*set genre_savvy -10\n\t\t\t\t*set dream_job \"Fitness model\"\n\t\t\t\t*goto latemessage\n\t#an artist.\n\t\tWhat's better than to make a living from your creativity? If you had the chance you'd blow people away with your art.\n\t\t*set soul +20\n\t\t*choice\n\t\t\t#You would create moving sculptures out of unusuals materials for various local government buildings.\n\t\t\t\t*set genre_savvy +10\n\t\t\t\t*set dream_job \"Alternative sculptor\"\n\t\t\t\t*goto latemessage\n\t\t\t#You'd like to be in charge of the graphic design in a local game development company.\n\t\t\t\t*set genre_savvy -10\n\t\t\t\t*set dream_job \"Graphic design\"\n\t\t\t\t*goto latemessage\n\t#a musician.\n\t\tYou'd want to move people with the music you make. The details are still a bit fuzzy at this point, but you'd like to be part of something bigger than yourself.\n\t\t*set soul +20\n\t\t*choice\n\t\t\t#You would like to be a musician in a large orchestra.\n\t\t\t\t*set genre_savvy +10\n\t\t\t\t*set dream_job \"Orchestra musician\"\n\t\t\t\t*goto latemessage\n\t\t\t#You would like to play in a local band.\n\t\t\t\t*set genre_savvy -10\n\t\t\t\t*set dream_job \"Band member\"\n\t\t\t\t*goto latemessage\n*label latemessage\nHis words on your voicemail were hurried, but you couldn't tell whether it was from excitement or agitation. \"Are you free to come out for a few days?\" he asked. \"I could use some help from my favorite relative. In fact -\" But there the message cut off.\n\nHe hasn't answered your calls since then. Knowing Uncle Irwin, it was likely he had absent-mindedly dropped his phone into a cup of tea or something.\n*fake_choice\n\t#It sounds exactly like the kind of thing your goofy uncle would do.\n\t#It might be nothing, but you can't help but worry about him.\n\t#Not that you really care about him. You just want his stuff when he kicks the bucket.\nHe has lived alone in a set of rooms behind his book store ever since aunt Iris passed away, so if something happened to him you might be the first to know. You were drumming your fingertips on the wheel for the last ten miles up the winding mountain road.\n\nThe sun is just starting to set, but you aren't surprised to see the \"Closed\" sign in the front window of his store. He specializes in rare books and first editions, so most of his business is on the internet or by appointment. You make your way around to the back door that leads to his living quarters, and see a familiar sign written in whimsical calligraphy hanging from the door handle: \"Come on in!\"\n\nYou sigh and smile at the same time. You've tried to convince Uncle Irwin that he shouldn't leave his door unlocked, even if he's expecting company, but he's always honestly baffled. \"Who would try to rob me when I'm always home?\" he insists. It's almost true; besides an occasional errand, he rarely goes out.\n\nWhen you let yourself in, you see signs of life - dishes in the sink that seem recent, a half-full pot of cold tea on the kitchen table - but no sign of your uncle himself. \"Uncle Irwin?\" you call out. \n\nYou hear nothing. The fear starts creeping back that something is seriously wrong here. You can't help but feel that if he had simply stepped out, he would have left a note. Did a robber let themselves in, like you were always warning him? Did he have a heart attack? The tea could have been sitting here for days, since the time he was cut off mid-message.\n\nYou hurry upstairs to the workroom where he restores old and valuable books, hoping to see him lost in thought while staring at a page through a magnifying lens. There's no sign of him here either, but you see some new additions since the last time you visited the workroom. A low table has been installed, with about half a dozen glass cases holding individual books lined up on top. A heavy wooden reading stand, ornately carved, is prominently placed. You're surprised to see it; Uncle Irwin never collected antiques before, other than books.\n\nA crackle of static catches your attention. You look over at his shelves of tools, and find a pocket radio that's been taped back together after some kind of hasty alteration. You reach for the knobs to see if you can tune it, but before you reach it, your uncle calls your name.\n*fake_choice\n\t#\"Isobel!\"\n\t\t*set name \"Isobel\"\n\t\t*set he \"she\"\n\t\t*set his \"her\"\n\t\t*set him \"her\"\n\t#\"Daniel!\"\n\t\t*set name \"Daniel\"\n\t\t*set he \"he\"\n\t\t*set his \"his\"\n\t\t*set him \"him\"\n\t#\"Caroline!\"\n\t\t*set name \"Caroline\"\n\t\t*set he \"she\"\n\t\t*set his \"her\"\n\t\t*set him \"her\"\n\t#\"Jack!\"\n\t\t*set name \"Jack\"\n\t\t*set he \"he\"\n\t\t*set his \"his\"\n\t\t*set him \"him\"\n\t#\"Alexander!\"\n\t\t*set name \"Alex\"\n\t\t*set he \"he\"\n\t\t*set his \"his\"\n\t\t*set him \"him\"\n\t#\"My favorite niece (Some other name and female)!\"\n\t\t*input_text name\n\t\t*set he \"she\"\n\t\t*set his \"her\"\n\t\t*set him \"her\"\n\t#\"My favorite nephew (Some other name and male)!\"\n\t\t*input_text name\n\t\t*set he \"he\"\n\t\t*set his \"his\"\n\t\t*set him \"him\"\n\t#\"My favorite relative (Some other name and non-binary)!\"\n\t\t*input_text name\n\t\t*set he \"they\"\n\t\t*set his \"their\"\n\t\t*set him \"them\"\n\"$!{name}, is that you?\" he asks.\n\nYou find a small microphone cobbled into the rest of the radio's workings and try speaking into it. \"Yes, it's me. Where are you?\"\n\nIt doesn't seem like he can hear you. \"Listen, we don't have much time, so I'm going to have to hope that the radio is working on your end,\" he says urgently. \"I'm in trouble, and I can't get out of it alone. The stories... they're falling apart.\" He pauses. \"Listen carefully. The reading stand is how you travel. Put a book on the stand, open it, and it will do the rest.\" \n\nHe hesitates for a moment. \"It's going to be dangerous,\" he continues. \"But this is important. It's much bigger than just me. Good luck, and be careful.\" Then the radio falls silent, not responding no matter what buttons you push or dials you turn.\n\n\"The stories are falling apart?\" you wonder out loud. \"What does that mean?\" Hoping it helps his message make more sense, you pocket the radio, then look over the books in the glass cases.\n*finish\n", "trial_end": "*if (limit_trial_playthrougs >= 3) or ((mansion) and (dandd))\n  *goto trial_end\n*else\n  *set limit_trial_playthrougs + 1\n  *return\n  \n\n*label trial_end\n*page_break\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n  *label purchased\n  *return\nRemember earlier how we told you that the first two chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n  *subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2017-09-14 $4.99 $2.99 purchased\n*abort"}};
