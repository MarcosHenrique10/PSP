 I am sure they have more broken bones than I do. If only I could remember how many of their bones I actually broke...\"\n        *set body %+10\n        *if (navigator_personality = \"aggressive\")\n           *set navigator_relationship %+20\n           ${navigator_name} smiles. \"Yes, I read the files. It seems half of them are in custody, the ones that survived... Anyway, let's get out of here\" \n           *goto exit_hospital\n        *else\n           *set navigator_relationship %-5\n           ${navigator_name} laughs as you say this. \"${navigator_salute2}, whatever you say! Let's get out of here...\" \n           *goto exit_hospital\n\n\t\t   \n*comment =========================================================================================================================================================================================================================\n\n*label exit_hospital\t\t   \n\t\t   \nYou follow ${navigator_name} as ${navigator_he} leads the way through a maze of hospital corridors populated by a myriad of small robots and humans performing various tasks you mostly fail to understand. \nYou marvel at the level of sophistication of this society, with ${navigator_name} eventually stopping in front of a coffee machine. \nIt is actually good to know that such things still exist, and that they operate in pretty much the way you have come to expect. \n${navigator_name} seems to somehow pay by pushing ${navigator_his} wrist against a flashing part of the machine, and you follow ${navigator_his} example.\n\t\t   \nAfter a while, ${navigator_name} puts down ${navigator_his} cup of coffee, straightens ${navigator_his} ${navigator_hair} hair and looks at you. \"${navigator_salute1}, are you going to tell me about this new mission?\"\nYou look back at ${navigator_him}, and think that it might be better to just tell ${navigator_him} everything you know, \nso that you might get some more information. \"According to the message I just got we have to go to Shibuwata city and find a guy called Alexandros Doll. Possibly some sort of drug-dealer?\"\n \n${navigator_name} grins as you say this. \"Ah, ${navigator_swear1} non-ups. Everything wrong in this city is always due to those stinking excuses of human beings. Never heard of that guy though... \nAnyway, better get back to the SAPEV and get moving!\"\n\n*label choice_hospital\n\n*choice\n\n   *hide_reuse #\"Excuse me if this is a silly question, but what you mean by non-ups?\"\n\n     ${navigator_name} looks at you with a rather worried expression, \"Well, it seems that blow to the head really did some damage... Non-ups, non-upgraded humans, people outside the walls\"\n     The look on your face must indicate to ${navigator_him} that you are still confused, and ${navigator_his} eyes widen as ${navigator_he} continues. \"You know, the ones without bio-engineered upgrades?\n     Without genetic enhancements?\"\n\n     At this point you think you start to get the picture, so you decide to nod as if you understand, making ${navigator_name} relax a bit. \"Good. You had me worried for a moment!\"\t \n\n     *goto choice_hospital\t \n   \n   *hide_reuse #\"The SAPEV, sure. Could you remind me what that means?\"\n\n    ${navigator_name} smiles and says; \"You sound like a new recruit. SAPEV stands for Standard All-Purpose Enforcing Vehicle. You know, as in the standard vehicle of the Agency!\" \n    You nod and take a last sip of your coffee. Seconds later a small humanoid robot extends his arm, which you guess means that it will dispose of the empty cup. \n    Your eyes follow the robot as it indeed takes it to what looks like a bin, which is only a few meters away, though you could clearly have taken it there yourself. Perhaps technological advancement makes people lazier?\n\n    *goto choice_hospital\n   \n   #\"Let's go!\"\n     \n     With that, you continue along the corridor you were in, guessing that it must be the way out of the hospital. As you reach the exit, you feel a sharp pain in your eyes, possibly due to the intensity of the sun. \n     Is it stronger in this futuristic story? Maybe this is one of those futures when climate change has disrupted things on Earth. \n     Or could this be a consequence of spending too much time inside the hospital? ${navigator_name} notices how you cover your face with your hands and takes a step back from the door, \n     after which ${navigator_he} puts ${navigator_his} hand on your shoulder. \n     \"${navigator_expression_feeling_ok}\" \n\t \n     You lift a hand indicating that you are ok, yet ${navigator_name} continues; \n     \"Look, we can get you back inside for a strength booster jab, though that would take some time... Otherwise I was hoping to go back to HQ and get some extra cash for this trip. \n     You know, non-ups only like the metallic type.\"\n\n     *choice\n\n        #\"Well, I guess I could do with that strength booster jab, actually\"\n         *set body %+10\n         *if (navigator_personality = \"aggressive\")\n           *set navigator_relationship %+20\n           ${navigator_name} tightens ${navigator_his} grip on your shoulder, \"Indeed, can never get enough of those!\"\n\n           *label injection\t\t   \n\t\t   \n           With that, ${navigator_he} pulls you back into the hospital and approaches one of the doctors, explaining the situation. \n           The doctor nods empathetically, and signals to a robotic assistant, who minutes later brings a syringe filled with a silvery liquid. He asks you to sit down, and carefully pushes the needle into a vein in your arm. \n           You start to feel a tingling sensation rushing through your body, though also a slight dizziness, and have to sit down and rest. \n\t\t   \n           A few minutes later you feel fully invigorated, much stronger than before, and decide it is time to continue to wherever this story decides to take you.\n           You stand up and tell ${navigator_name} that you are ready to go, and you both walk out of the hospital.  \n\t\t   \n           *goto sapev\n\n         *else\n           *set navigator_relationship %-10\n           ${navigator_name} lets go of your shoulder, \"${navigator_salute1}, if you say you need it, we will get you one...\" \n\t\t      \n           *goto injection\t\t\n\t \n        #\"Just give me a few minutes. I need to just sit and reflect on all this. You know, \"losing my memories\" has disoriented me a bit...\"\n         *set soul %+5\n         *set mind %+5\n         *if (navigator_personality = \"aggressive\")\n           *set navigator_relationship %-10\n           ${navigator_name} tightens ${navigator_his} grip on your shoulder, \"Indeed, you have been through a lot, with the beating those ${navigator_swear2_plural} ${navigator_insult1_plural} gave you yesterday!\"\n\n           *label rest\t   \n\n           You proceed to sit down on a white stone bench outside the hospital, taking some moments to contemplate the strange surroundings. \n           Robots and humans walk about, each looking as if they are responding to some pre-determined purpose in their actions, along carefully manicured gardens and streets. \n           The place inspires a certain feeling of peace, yet somehow you also feel as if something intrinsic to the human spirit has been lost, yet you wonder what exactly. \n           With such thoughts, you finally decide that you are ready to continue to see where the story will take you, so you stand up and signal to ${navigator_name} that you are ready to go.   \n\t\t   \n           *goto sapev\n\n         *else\n           *set navigator_relationship %+20\n           ${navigator_name} lets go of your shoulder, \"${navigator_salute1}, I realize how disturbing it must be to lose one's memories, so please take a moment to meditate and try to get yourself together...\"\t\t      \n           *goto rest\t \n\t \n        #\"Yes, we could probably use some money, right? Never hurts to have more of that!\"\n         *set soul %-5\t\t   \n         *set navigator_relationship %+10\n         ${navigator_name} turns towards a nearby building and starts walking, \"Indeed, in these kind of missions you always end up bribing some non-ups...\"\n         You are slightly surprised by those words, but follow ${navigator_him} into the building, where there is a rather large office staffed with people in some rather strange grey uniform. \n\n         After some minutes explaining the situation, you pressing your wrist against a series of crystal holographic hand-held devices, and much discussion, a robot brings a small yet heavy pouch. \n         In a rather dull monotone metallic voice it explains: \"300 silver dollars. Certified only for use on official CSA business\"\n         \n         *set money +300\n\n         [i](You now have ${money} silver dollars) [/i]\n         \n         With that, you exit the building, feeling that you are ready to continue to wherever this story will take you, and follow ${navigator_name} along the streets. \n  \n         *goto sapev\t\t \n        \t\t \n*comment =========================================================================================================================================================================================================================\n\n*label sapev\t\t   \n\t\t   \nAfter walking for a few minutes you reached a parked vehicle. You are immediately impressed by its sleek design, with its gleaming silvery body shining under the afternoon sun. \n${navigator_name} touches its smooth surface in admiration. \"I always liked your SAPEV. Do you mind if I drive it today? You know, given that you are not feeling too well...\"\n\nSeeing that you have no idea how to drive this thing, you cannot help but feel relieved at the suggestion. \nAs you approach it emits a faint glow, somehow recognizing your presence, allowing ${navigator_name} to jump into the driver seat, while you take place at the seat on the opposite side. \n${navigator_name} turns right onto a tree-lined avenue, moment at which you realize that the SAPEV must be some sort of advanced hovercraft-type machine, judging by similar wheel-less vehicles that you see hovering around.\n\nAround half an hour later you arrive at a gate in what is the most imposing white concrete wall you have seen in your life, easily over 30 metres high, extending in both directions to encircle the city. \nThe guards at its entrance salute and wave you on, and without further exchange you drive out of the city.  \n\n${navigator_name} looks at you from the driver's seat, one of ${navigator_his} arms resting on the side door while ${navigator_he} plays with ${navigator_his} ${navigator_hair} hair. \n\"${navigator_salute2}, the way I see it we have 2 options to get to Shibuwata; route A-11 is the quickest, though it will take us through the ruins of Old Garston...\nI heard that  ${navigator_swear1} non-ups bandits ambushed some CSA agents there a few days ago, so that might not be the best idea.  \nAlternatively we could take the old B-37 route, which is longer, though some people claim it is far more scenic...\"  \n\n*choice\n\n   #\"Well, who is scared of a little danger? Surely we can cope with any of those non-ups, right?\"\n         *if (navigator_personality = \"aggressive\")\n           *set navigator_relationship %+10\n           ${navigator_name} smiles when you say this, \"${navigator_salute1}, you clearly live up to expectations!\"\t\t   \n           *goto Garston\n         *else\n           *set navigator_relationship %-10\n           ${navigator_name} shrugs ${navigator_his} shoulders, visibly displeased. \"Whatever you say, you are the one in charge...\"\n           *goto Garston\t\t   \n\n   #\"Our mission is important. Better stay away from trouble and take the B-37\"\n         *if (navigator_personality = \"aggressive\")\n           *set navigator_relationship %-10\n           ${navigator_name} shrugs ${navigator_his} shoulders, visibly displeased, \"Can't believe you are afraid of a few ${navigator_swear1} non-ups... But you are in charge!\"\n           *goto B37\n\t\t   \n         *else\n           *set navigator_relationship %+10\n           ${navigator_name} smiles, visibly pleased,\"${navigator_salute1}, you clearly have your priorities right!\"\n           *goto B37\t\t   \n\t\t\t  \n*comment =========================================================================================================================================================================================================================\n\n*label B37\t\t\t  \n\nWith that, ${navigator_name} steps on the gas pedal to bring your SAPEV up to cruising speed, its air cushion creating a massive cloud of dust behind you, as you proceed along a desolate landscape devoid of any vegetation. \nWhile admiring the view you let your mind reflect on the nature of this world. Could this be one of those futuristic dystopian post-apocalyptic stories, with the world divided into \"advanced\" and \"barbaric\" humans?\n\nYou drive for a couple of hours as the sun sets, changing the colors to beautiful shades of red and yellow, while from time to time you try to obtain some more information from ${navigator_name}. \nIt seems that you are part of the Citizen Supervision Agency (CSA), some sort of police/military body in charge of the protection of the city of New Heaven. \nIts agents all belong to families that have been genetically engineered to produce the ultimate soldiers and policemen, though there is clearly still much variety amongst its members, judging by the profiles you saw earlier. \n\t\t\t  \nLong ago non-ups were thrown away from such cities to the outside world, the Badlands, and massive walls were built to prevent undesirables from entering. \nAll exchanges and commerce between New Heaven and other non-ups settlements take place at Irwin plaza, apparently built in honor of father Irwin, \na mysterious stranger that has attempted to improve the relationship between the chaotic and barbaric societies of the Badlands and the order of settlements like New Heaven.\n\nFather Irwin... Again this seems like too much of a coincidence, though ${navigator_name} seems to know little else about him, and suggests that you ask other officers once you get back to New Heaven.\n\n \n*page_break\t\t\t  \n\n*goto Shibuwata_entrance\n\t\t\t  \n\n*comment =========================================================================================================================================================================================================================\n\n\t\t\t  \n*label Garston\t   \n\t\t\t  \nWith that, ${navigator_name} steps on the gas pedal to bring your SAPEV up to cruising speed, its air cushion creating a massive cloud of dust behind you, as you proceed along a deserted landscape devoid of any vegetation. \nWhile sitting on the passenger seat, you reflect on the nature of this world. Could this be one of these futuristic dystopian post-apocalyptic stories, with humanity divided into have and have-nots?\n\n${navigator_name} drives along the road for about an hour, the late afternoon sun starting to cast long shadows along the ruins of the occasional house you find on your way. \nWhile you observe such desolate landscape, you try to obtain some more pieces of information from ${navigator_name}. \nIt seems that you are part of the Citizen Supervision Agency (CSA), some sort of police/military in charge of the protection of the city of New Heaven. \nIts agents all belong to families that have been genetically engineered to produce the ultimate soldiers and policemen, though clearly still there is much variety amongst its members, judging by the profiles you saw earlier. \n\t\t\t  \nLong ago non-ups were thrown away from such cities to the outside world, the Badlands, and massive walls were built to prevent undesirables from entering. \nAll exchanges and commerce between New Heaven and other non-ups settlements take place at Irwin plaza, apparently built in honor of father Irwin, \na mysterious stranger that has attempted to improve the relationship between the chaotic and barbaric societies of the Badlands and the order of settlements like New Heaven.\n\nFather Irwin... Again this seems like too much of a coincidence, though ${navigator_name} seems to know little else about him, and suggests that you ask other officers once you get back to New Heaven.\n\n*page_break\t\n\nEventually, you arrive at the remains of Garston. Basically it is a collection of ruined houses that have seen much fighting. \nYou stop before the entrance of the town, giving you a chance to see the road as it meanders through a collection of half-demolished buildings and other rubble, where it is clear that anybody could easily set up an ambush.  \n\n*choice\n\n  #Tell ${navigator_name} to step on gas pedal and rush through the town as quickly as possible\n   \n\n    ${navigator_name} accelerates SAPEV to what feels like 200 kph or more, sending you back on the seat as the machine races amongst the deserted streets. \n    Half way through it you hear some machine gun fire, but at the speed you are travelling you make a difficult target, and only a couple of bullets bounce off the armour of your vehicle.\n \n    *goto exit_town\n\n  #Proceed at a normal speed down the main street, looking out for anybody who could be waiting to ambush you \n\n    *goto proceed_village\n\n  #Proceed slowly down the main street, keeping an eye open for any potential ambush\n\n    *label proceed_village  \n  \n    When you are barely a couple of hundred meters into the town a burst of machine-gun fire rings out from one of the buildings in front of you. \n    Bullets hit the ground around the SAPEV, making also a number of holes in its sleek body, while ${navigator_name} shouts: \"Ah, there are the ${navigator_swear2_plural} ${navigator_insult1_plural}!\"\n\n    Suddenly, you feel an itchy feeling on your thigh, and when you look down you see it bleeding. One of the bullets must have gone through the armour of the SAPEV and hit you. \n    While it does not look serious, you are intrigued by the fact that you feel little pain. Maybe this story somehow has altered your body in a way that you feel less pain?\n\n    *set health %-10\t\n\t\n    The road ahead of you is still clear, yet whoever is attacking you might have a plan to somehow prevent you from escaping.  \n    *if navigator_world >60\n        ${navigator_name} shouts loudly in your ear, pointing out the road ahead. \"Damn!, ${navigator_swear2_plural} ${navigator_insult1_plural}, they probably wanna cage us in!\"\n\n        *goto return_fire_choice\n\n    *else\n\n    *label return_fire_choice\n\n    *choice\n\t\t\n      #\"Get us out of here as quickly as possible!\" \n\n        ${navigator_name} accelerates SAPEV to what feels like 200 kph or more, sending you back on the seat as the machine creates a massive cloud of dust behind it.\n        As you speed down the main street, bullets bouncing off your armour, you see a large old truck starting to move out to block the street, but you are way too fast by that point and zoom past it before it has time to hardly even move.\n          \n        *goto exit_town\n\n\n      #${navigator_name}, does this thing have any weapons???\" \n\n          ${navigator_name} looks at you, with an expression in between anger and surprise. \"${navigator_salute1}, they are on your side, start firing!\" \n          With that, ${navigator_he} pulls something that looks like a video game controller from the side of your seat and thrusts it into your hands.\n          Clumsily, you start playing with it, and suddenly a pair of laser guns appear on the sides of the SAPEV, which start to randomly fire around. \n\t\t  \n          As you are trying to get to grips with the controls, in front of you a large old truck appears from one of the side streets. \n          Clearly they intend to cage you in, as the truck has been reinforced with very heavy metal plates on the side facing you, making it almost impossible to stop it before it can block the entire street. \n          To either side of the street a number of old cars have been piled, meaning that once the truck is in place it will be unlikely that you will manage to get through.\n\n          *choice\n\n             #Try to hit the wheels of the truck so that it stops moving\n\n               *if mind >60\n\n                  You somehow manage to understand how the controls work, and direct the lasers to hit the wheels of the truck, blowing both of them out and allowing you enough time to pass in front of it. \n\n                  *set mind %+10\t\t\t\t  \n                  *goto exit_town\n\n               *else \n\n                  You seem to be completely confused by how the controls work, and the lasers continue to randomly point at buildings around them. \n                  As the truck reaches the middle of the street, you realize that you are probably caged in. \n\t\t\t\t  \n                  *goto caged\n  \n               \n\n             #\"Get us out of here as quickly as possible!\" \n\n                 *if navigator_car >60\n                \n                    The SAPEV advances like a rocket along the main street, narrowly passing in front of the truck and then continuing along the street that leads out of the town. \n\n                    *goto exit_town\n\n                 *else  \n\n                    The SAPEV accelerates along the street, but the truck is faster than you and closes the gap in the street well before you manage to reach there. \n\n                    *label caged\n\n                    Machine-gun fire continues to pour on top of the SAPEV, which luckily must be heavily armoured or you would be fried by now. \n                    A bullet hits you in the shoulder, sending blood pouring over your arm, yet somehow you only feel the tickle of the blood as it crawls down. \n                    Clearly frustrated, ${navigator_name} gets hold of the weapon controls, and after pushing several buttons, a zooming noise can be heard.\n\t\t\t\t\t\n                    The SAPEV drops to the floor, as all energy appears to be re-directed towards the lasers, which fire one condensed blast at the building behind the truck, creating a space for the SAPEV to escape. \n                    ${navigator_name} regains control of the wheel and re-powers the SAPEV's propulsion, quickly manoeuvring behind the track and away from the ambush. \n\n                    *set navigator_relationship %-20\t\t\t\t\t\n                    *set health %-20\n                    *goto exit_town\t\t\t\t\t\n\n\t\t\t\t\t\n\t\t\t\t\t\n\n*label exit_town\n\t\t\n*achieve survive_ambush\n        \nThe SAPEV continues along the main street without further incident. Nevertheless, as you watch the village shrinking into the distance, you breathe a sense of relief that the danger is over.\n*if (navigator_personality = \"aggressive\")\n           ${navigator_name} smiles and says, \"${navigator_salute1}, that was tons of fun, right?\"\n           *page_break\t\t   \n           *goto Shibuwata_entrance\n\t\t   \n*else\n           ${navigator_name} puts a hand over his face, while he shakes his head, \"That was clearly a ${navigator_swear2} bad idea!\"\n           *page_break\t\t   \n           *goto Shibuwata_entrance\n\t\t\t  \n\t\t\t  \n*comment =========================================================================================================================================================================================================================\n\n\t\t\t  \n*label Shibuwata_entrance\n\nYou continue along the road for a few more kilometres, with rusting signposts indicating exits to what ${navigator_name} tells you were cities that existed before the Resource Scarcity War, \nnow ruins barely inhabited by non-ups that live on whatever meagre products the land offers them. \nThe road in this stretch is in a particularly poor state, with the abundance of potholes showing that nobody bothers to maintain it regularly, though this does not hinder the progress of the SAPEV in any way. \nEventually, you reach the exit that will take you to Shibuwata city, and take the exit ramp onto a smaller road that leads you to its entrance. \n\nAs you approach the city you reach a makeshift roadblock, guarded by members of some sort of militia, dressed in camouflage-style military fatigues. \nThey signal for you to stop, with the commanding officer spitting in the ground in front of SAPEV as he approaches. \"What brings two CSA officers here?\"\n\nYou are unsure how exactly he knows you are CSA officers, though you suspect the SAPEV might be a distinct vehicle. \nYou look at ${navigator_name}, but ${navigator_he} makes a clear signal that it is up to you how to answer. \n\n*choice\n\n   #\"We are here on official CSA business, none of your concern\"\n\n      *label CSA_business   \n   \n      *set alert_level +1\n\t  \n      The eyes of the officer narrow as you say this, and you feel some sort of resentment in his eyes. You are not exactly sure what power the CSA holds over this city, but the officer is clearly unhappy about it. \n\n      *goto enter_shibawata\t  \n\t  \n   *if (mind >60) #\"Just routinely patrolling the area\", while you hand him 50 silver dollars \n      *set soul %-5\n      *set money -50   \n\t  \n      The eyes of the officer light up as he sees the money, \"Yes, of course, please feel free to room about. Let us know if you need any help!\"\n\n      [i] (You have ${money} silver dollars left) [/i]\n      \n      *goto enter_shibawata   \n   \n   *if (soul \u003c60) #\"You know, even CSA officers need some types of entertainment that we cannot find in New Heaven...\"\n\n     *set mind %+10  \n \n     The officer offers you a strange smile, adding, \"Yes, of course, I understand... Some of your colleagues were also here last week, maybe at “Belfair” you can find what you are looking for, \n     tonight they have a special event.\" You look at ${navigator_name} as he says this, who shrugs ${navigator_his} shoulders, with ${navigator_his} ${navigator_eyes} eyes returning the confused look in your own face. \n     Some CSA members came here? Did they use the same excuse as you, or...?\n\t \n     *goto enter_shibawata\t\n\t  \n   #\"We are here looking for somebody that is of interest to the CSA\"\n      *set alert_level +1\n      The officer stares at ${navigator_name}, then turns again to look at you as he leans closer to the window of the SAPEV.\n      \"I see...Of course we are always happy to help the CSA. Maybe I could help you if you give me some indication of who it is you are looking for?\"\n\n      *choice  \n          #\"That is for us to know, and none of your business. Your lot cannot really be trusted with such information\"\n              *set alert_level +1\n              The officer shakes his head, visibly annoyed. \"You people... One day, sometime, you will pay for your arrogance!\"\n              *goto enter_shibawata\t\n\t\t\t  \n          #\"Sorry, but that information is classified\"\n              The officer shakes his head, visibly annoyed, and mocks you. \"CSA business, always classified. You'd be better off trusting us sometimes!\"\n              *goto enter_shibawata\t\t\t\t  \n\t\t  \n          #Tell him the truth, that you are looking for Alexandros Doll\n              *set alert_level +1\t\t  \n              The officer shakes his head, though the expression in his face expresses a strange mixture of disdain and mockery. \n              \"Never heard of him, though I'm sure such great officers as yourselves will have no trouble finding him.\" This leaves you wondering whether he really doesn't know or just doesn't want to help you.\n              *goto enter_shibawata\t\n\t\t\t  \n          #Lie to him and tell him you are looking for Jonathan Smith, a petty criminal in the area\n               The officer shakes his head, expressing a mixture of surprise and mockery. \"Sorry, never heard of him... And I know anybody of importance in this city. Good luck hunting him!\"\n               *set alert_level -1\n               *goto enter_shibawata\t\t\t   \n\t\t\t   \n*label enter_shibawata\n\nWith that he signals the militiamen at the barricade to allow you through into Shibuwata. The town is a collection of concrete buildings built at the turn of the 21st century, dilapidated and poorly maintained. \nRubbish accumulates at the corners of streets, and it is clear nobody really collects it, with the grit and potholed streets further signalling poor levels of maintenance and decay. \n\n\n\n*if navigator_world > 80\n\n   While you slowly navigate around the streets, ${navigator_name} addressed you. \n   \"${navigator_salute1}, I actually know these streets like the back of my hand and have many contacts 'round here. \n   A petty drug dealer called \"Speedy\", an art-dealer that goes by the name of Crystal and Ray \"Scarface\", a weapon trader\"\n\n   Then, ${navigator_he} stops for a few seconds to add, \"However, Speedy is not really to be trusted, he's more likely to ${navigator_swear1} back-stab us than offer any help...\n   I heard that they found Crystal in a sewer last week with a few bullets in her skull. I reckon somebody got annoyed with her selling us information, ${navigator_swear2} non-ups. \n   ${navigator_salute1}, I think our only real lead would be \"Scarface\", Nobody messes with the guy, and he always gives good info if the pay is good...\"\n\n   *choice\n      #\"Still, I think maybe we should go and talk to \"Speedy\"\n         *set navigator_relationship %-20\n         ${navigator_name} looks at you, ${navigator_his} ${navigator_eyes} piercing yours with an intensity you had not seen yet,\n         \"Didn't you hear what I ${navigator_swear1} just said?! The guy is useless!\" You shrug your shoulders, and ${navigator_he} falls back on the driver chair,\n         before adding “${navigator_salute2}, sometimes you can be more ${navigator_swear2} stupid than I thought!\" \n        \n         *goto Speedy\n\n      #\"Still, I think maybe we should go and see if Crystal is really dead\"\n         *set navigator_relationship %-20\n         ${navigator_name} looks at you , ${navigator_his} ${navigator_eyes} piercing yours with an intensity you had not seen yet,\n         \"Didn't you hear what I ${navigator_swear1} just said?! She is dead!\" You shrug your shoulders, and ${navigator_he} falls back on the driver chair,\n         before adding “${navigator_salute2}, it's clear that you are more ${navigator_swear2} idiotic than I thought!\"  \n        \n         *goto Crystal\n\n      #\"Yes, probably the best thing would be to go and see Scarface\"\n         *set navigator_relationship %+10\n         *goto Scarface\n\t\t \n*elseif navigator_world > 60\n\n   \"${navigator_salute1}, I know these streets quite well and have some contacts round here. \n   A petty drug dealer called \"Speedy\", an art-dealer that goes by the name of Crystal and Ray \"Scarface\", a weapon trader\"\n   \n   Then, ${navigator_he} stops for a few seconds to add, \"However, I heard that they found Crystal in a sewer last week with a few bullets in her skull... \n   Probably somebody got annoyed at her selling us information, ${navigator_swear2} bastards. \n   So, that leaves either Speedy or Scarface... Up to you really, though “Scarface” does seem to give good info, if the pay is good!\"\n\n   *choice\n      #\"Well, I suppose we could start with Speedy\"\n         ${navigator_name} looks at you and shrugs ${navigator_his} shoulders, \"I suppose he is the cheaper choice!\"  \n        \n         *goto Speedy\n\n      #\"Still, I think maybe we should go and see if Crystal is really dead\"\n         *set navigator_relationship %-10\n         ${navigator_name} looks at you, twisting ${navigator_his} mouth in a strange sign of surprise and hurt feelings at you ignoring ${navigator_his} advice, \n         while ${navigator_he} shakes ${navigator_his} head in disbelief. Nevertheless, she mutters something along the lines that you are in charge, and starts to navigate around the chaotic streets of the town. \n        \n         *goto Crystal\n\n      #\"Yes, probably the best thing would be to go and see Scarface\"\n         *set navigator_relationship %+10\n         *goto Scarface        \n\n*elseif navigator_world > 40\n\n   \"${navigator_salute1}, I have been round here a couple of times, and I have met only a few of the contacts that the CSA has around here. \n   Essentially they include a petty drug dealer called \"Speedy\", an art-dealer that goes by the name of Crystal and Ray \"Scarface”, a weapon trader of some sorts\"\n\n   Then, ${navigator_he} stops for a few seconds to add; \"I heard that Crystal and Scarface tend to have good information, I wish I would have had more time to talk to somebody at HQ before coming here!\"\n\n\n   *choice\n      #\"Well, I suppose we could start with Speedy\"      \n         *goto Speedy\n\n      #\"Well, maybe Crystal knows something?\"        \n         *goto Crystal\n\n      #\"I'm not sure a weapon trader is the best place to start, but we could give it a shot...\"\n         *goto Scarface \t\t \n\n*else\n\n   \"${navigator_salute1}, to be honest I hardly know anything about this town, and I have met only a few of the contacts that the CSA has around here. \n   the ones I know are a petty drug dealer called “Speedy”, an art-dealer that goes by the name of Crystal and Ray \"Scarface\", a weapon trader of some sorts\"\n\n   Then, ${navigator_he} stops for a few seconds to add; \"I'd say probably we should start with Crystal or Speedy, I doubt Scarface would really have any good information...\"\n\n  \n   *choice\n      #\"Well, I suppose we could start with Speedy\"      \n         *goto Speedy\n\n      #\"Well, maybe Crystal knows something?\"        \n         *goto Crystal\n\n      #\"I'm not sure a weapon trader is the best place to start, but we could give it a shot...\"\n         *goto Scarface \n\n\n*comment =========================================================================================================================================================================================================================\n\t  \n*label Speedy\n\n*set Speedy 1\n*set alert_level +1\n\n${navigator_name} slowly drives to what ${navigator_he} says is the Uramachi district, a rather gritty part of town where \"Speedy\" can usually be found selling inferior quality drugs to the poorer members of the community. \nThe piles of rubbish grow bigger, and you can see some individuals walking about with blank stares in their eyes, clearly taken to another world by some hallucinogenic drug.\nFinally, you find the figure of \"Speedy\" in one of the corners and proceed to park the SAPEV in front of him, scattering rubbish around in all directions.\n\n\"Speedy\" greets you with an absent look, his eyes not quite fixing on you as he says \"Ah, ${navigator_name}, nicee to seee you again\". \nHis smile reveals a collection of blackened teeth and a revolting bad breath, which makes you want to vomit. \n\n*if alert_level >0\n   \n   You proceed to ask him whether he knows Alexandros Doll, which makes him smile even more intensely. \n   “Yees, of coursee, onee of my beest clieents, hee is upstairs in my room now”. \n   As he says this he points to a nearby semi-ruined building, where one light can be seen in a 2nd floor apartment, while he extends the other hand to invite you to give him some money.\n   *choice\n   \n     *if (money > 10) #Give him 10 silver dollars\n       *set money -10\n       \"Speedy\" grins as you give him this. \"Thank you, always so nicee to talk to CSA...\" After that, he disappears into a little dark alley.\n       \n       [i] (You have ${money} silver dollars left) [/i]\n       \n       *goto Speedy_trap\n\t   \n     *if (money >30) #Give him 30 silver dollars\n       *set money -30\n       \n       \"Speedy\" grins as you give him this. \"Thank you, always so nicee to talk to you, takee caree, takee lots of caree!\", and disappears into a little dark alley.\n       You wonder what he meant by the creepy tone that he used in his last sentence, but what can you expect from a junky drug dealer?\n       \n       [i] (You have ${money} silver dollars left) [/i] \n       \n       *goto Speedy_trap\n\t   \n     *if (money >50) #Give him 50 silver dollars\n       *set money -50\n       \"Speedy\" grins as you give him this. \"Thank you, always so nicee to talk to you, takee caree, takee lots of caree, \n       maybee you want to comee back for that guy anotheer day insteed?\", and disappears into a little corner alley, \n       though you notice that before he does that he seems to point at some bandwagons parked nearby.\n       You wonder what he meant by the creepy tone that he used in his last sentence, and if he was trying to tell you something else? \n       \n       [i] (You have ${money} silver dollars left) [/i] \n       \n       *goto Speedy_trap\n\t   \n     #\"That information is hardly worth any money, get out of our way, junkie!\"\n       \"Speedy\" grins as you give him this. \"Thank you, always so nicee to talk to CSA...\" After saying this he runs and disappears into a little dark alley.\n       *goto Speedy_trap\n\t   \n     *if (soul >70) #\"I get the feeling by the way you are talking that you could be leading us into a trap?\"\n       His eyes widen as you say this, suddenly looking very frightened. \"Who, mee? No, not mee...\" As he says this he starts to run away, disappearing into a little back alley.\n       *goto Speedy_trap  \n\t   \n*else\n\n   You proceed to ask him whether he knows Alexandros Doll, which wipes the smile of his face, \n   \"Eeh, no, no ideea, I must go now...\" You are not convinced by his answer, especially by the way he quickly turns away from your car and starts to walk away. \n   *choice\n   \n    #Run after him, grab him and threaten him with your gun\n      *set Speedy_gives_Belfair_info 1\n      You get out of the car and run after him, which is not difficult given that he seems half-drugged. \n      As you put a gun to his throat, you feel even more his stench, which is mixed now with the smell of urine. \n      \"Ok, ok, I don't know him, but someebody told mee hee will bee at the \"Belfair\" club tonight\"\n\t  \n      He seems genuinely frightened and you doubt he knows much more, so you let him go, while you wonder what to do next as he disappears into a small back alley.\n      *goto Speedy_sucess_choice\t  \n\n    *if (money > 10) #Run after him, grab him, and offer him 10 silver dollars if he gives you some information\n       *set money -10\n       *set Speedy_gives_Belfair_info 1\n       You get out of the car and run after him, which is not difficult given that he seems half-drugged. \n       You grab him by the arm and turn him around, showing him the silver dollars. The look in his eyes changes immediately. \n       \"Ok, ok, I don't know him, but someebody told mee hee will bee at the \"Belfair\" club tonight\"\n\t   \n       It seems that he genuinely doesn't know much else so you let him go, wondering what to do next as he disappears into a small back alley.\n       \n       [i] (You have ${money} silver dollars left) [/i]        \n       \n       *goto Speedy_sucess_choice\n\t   \n    *if (money >30) #Run after him, grab him, and offer him 30 silver dollars if he gives you some information\n       *set money -30\n       *set Speedy_gives_Belfair_info 1\t   \n       You get out of the car and run after him, which is not difficult given that he seems half-drugged. \n       You grab him by the arm and turn him around, showing him the silver dollars. The look in his eyes changes immediately, \n       \"Ok, ok, I don't know him, but someebody told mee hee will bee at the \"Belfair\" club tonight. But, bee careeful, thee placee will bee heeavily guarded...\"\n\t   \n       It seems that he genuinely doesn't know much else so you let him go, wondering what to do next as he disappears into a small back alley.\n       \n       [i] (You have ${money} silver dollars left) [/i]        \n       \n       *goto Speedy_sucess_choice\n\t   \n    *if (money >50) #Run after him, grab him, and offer him 50 silver dollars if he gives you some information\n       *set Speedy_gives_Belfair_info 1\n       *set money -50\n       You get out of the car and run after him, which is not difficult given that he seems half-drugged. \n       You grab him by the arm and turn him around, showing him the silver dollars. The look in his eyes changes immediately, \n       \"Ok, ok, I don't know him, but someebody told mee hee will bee at the \"Belfair\" club tonight. But, bee careeful, thee placee will bee heeavily guarded.\n       Hee has many frieends in the militia, and is a poweerful figuree around heere...\"\n\t   \n       It seems that he genuinely doesn't know much else so you let him go, wondering what to do next as he disappears into a small back alley.\n       \n       [i] (You have ${money} silver dollars left) [/i]        \n       \n       *label Speedy_sucess_choice\n       *goto getting_tickets\n\n    #Let him go\n       Speedy quickly disappears into a back alley, leaving you pondering what to do next.\n       *label Speedy_what_to_do_next\n       *if (navigator_world > 60)\n           ${navigator_name} turns towards you and says, \"${navigator_salute2}, I told you, we really should just go and see Scarface, he is our best bet!\"\n           *choice\n\t\t   \n              *if (Crystal =0) #\"Still, I think maybe we should go and see if Crystal is really dead\"\n                 *set navigator_relationship %-10\n                 ${navigator_name} looks at you in disbelief, \"${navigator_expression_surprise}, seriously? This is a complete waste of ${navigator_swear2} time!\"     \n                 *goto Crystal\n\n              #\"Ok, probably the best thing would be to go and see Scarface\"\n                 *set navigator_relationship %+10\n                 *goto Scarface            \n\n       *else\t\t\t\t \n           ${navigator_name} turns towards you and says, \"Well, that didn't go too well... I suppose we could try elsewhere?\"\n           *choice\t   \n              *if (Crystal =0) #\"Ok, let's go and see Crystal\"     \n                 *goto Crystal\n\n              #\"Ok, let's go and see Scarface\"\n                 *goto Scarface\n\t   \n\t   \n*label Speedy_trap\n\nYou turn to look at the building, all lights off except for one in the 2nd floor, the apartment that \"Speedy\" pointed out as being his. \n*if (navigator_world >40)\n    ${navigator_name} shakes ${navigator_his} head, \"${navigator_expression_bad_feeling} I think we really shouldn't go up there!\"\n    *goto speedy_trap_choice\n*else\n    Something in this entire situation feels slightly odd, but you cannot quite place what. \n    *label speedy_trap_choice\n    *choice\t\n         *if (Crystal =0) #\"Something is wrong here, let's leave this place and try to see if we can find Crystal instead\"     \n              *goto Crystal\n\n         #\"Something is wrong here, let's leave this place and try to see if Scarface has any information instead\" \n                 *goto Scarface      \n\n         #Take out your laser gun out and walk up the stairs to arrest Alexandros Doll\n           You slowly walk up the creaking stairs, the stench of the rotting building almost overwhelming your senses, till you reach the door of the apartment.\n           ${navigator_name} is right next to you, gun also in hand. With one hand ${navigator_he} points at the door, and gestures to you about what you should do now. \t\t   \n           Everything seems quiet on the other side, making you wonder if there is actually somebody there. \n       \n           *label speedy_door_choice\n           *choice\n              *hide_reuse #Knock on the door and say that it is \"Speedy\"\n                  You knock on the door and attempt to emulate the accent of \"Speedy\", yet there is no answer on the other side. \n                  If Alexandros Doll really is here he could be drugged, or he might have realized that you are not \"Speedy\", given how poorly you can imitate the drug-dealer's strange accent\n                  *goto speedy_door_choice\t\t\t\t  \n\n              *hide_reuse #Knock on the door and say that it is the CSA, looking for Alexandros Doll\n                  You knock on the door, shouting loudly that you are from the CSA, looking for Alexandros Doll, yet there is no answer from the other side. \n                  ${navigator_name} looks at you. \"${navigator_salute1}, you really think he is just going to come out and walk into our arms??\"\n                  *goto speedy_door_choice\n\n              #Slowly open the door and enter the apartment\n                  You open the door slowly and walk into the apartment, as you look around for any signs of life. \n                  *goto Speedy_fight\t\t\t\t  \n\n              #Kick the door open and storm into the apartment\n                  You kick the door open and storm into the apartment, looking for anybody on the other side.  \n                  *label Speedy_fight\n                  Suddenly, from behind the furniture in the room 8 thugs, dressed in black leather outfits, start firing at you with guns and rifles. \n                  ${navigator_name} flips a table over and takes cover behind it, while you hide behind a shelf and start to return fire. \n                  Clearly your previous education hasn't quite prepared you for this, but after all this is a story, so what is the worst that can happen?\n                  *set combined_fight (body+ navigator_shooting)\n                  *if (combined_fight > 150)\n                     *set body %+10\n                     *set navigator_relationship %+20\n\t\t\t\t\t \n                     However, the fight proves to be very short lived, ${navigator_name} is clearly a great shooter, blasting 4 of the thugs in rapid succession. \n                     It seems that somehow the enhanced reflexes this story has given you also make you a deadly fighting machine. \n                     You hit one of the thugs in the head with your first shot, \n                     and when a second comes towards you with a knife you punch him so hard that he recoils and falls out of the window.\n                     *goto end_speedy_fight\t\t\t\t\t \n\n                  *elseif (combined_fight > 120)\n                     *set body %+10\n                     *set navigator_relationship %+10\n\t\t\t\t\t \n                     However, the fight proves to be rather short lived, ${navigator_name} is clearly a great shooter, blasting 3 of the thugs in rapid succession.\n                     It seems that somehow the enhanced reflexes this story has given you have made you an impressive fighting machine. \n                     You hit one of the thugs in the chest with your first shot, though a second though manages to shoot you in the leg, \n                     before ${navigator_name} can knock him out. The last thug approaches you with a knife, though \n                     you punch him so hard that he recoils and falls out of the window.\n\t\t\t\t\t \n                     ${navigator_name} takes a look at your wound. \"${navigator_salute2}, just a scratch really!\"\n                     Seconds later, ${navigator_he} takes out some sort of plastic from a backpack, which ${navigator_he} applies to the wound, automatically stopping the bleeding. \n                     Probably the wound is not really all that bad, yet you cannot but marvel at the technology behind it. \n\t\t\t\t\t\n                     *set health %-10\n                     *goto end_speedy_fight\n\n                  *elseif (combined_fight > 90)\n                     *set body %+10\n\t\t\t\t\t \n                     However, despite the superiority in numbers of your opponents you manage to prevail. \n                     ${navigator_name} has clearly done this before, blasting 3 of the thugs after a succession of shots.\n                     It seems that somehow the enhanced reflexes this story has given you have made you a rather competent fighter. \n                     You hit one of the thugs in the chest with your first shot, though a second though manages to shoot you in the shoulder, \n                     before ${navigator_name} can knock him out with a couple of shots. The last thug approaches you with a knife, though \n                     ${navigator_name} approaches him from behind and sends him flying across the room with a powerful punch.\n\t\t\t\t\t \n                     ${navigator_name} takes a look at your wound. \"${navigator_salute2}, this is ${navigator_swear2} not good, though this will patch you up for a while\".\n                     Immediately after, ${navigator_he} takes out some sort of plastic from ${navigator_his} backpack and applies to the wound, automatically stopping the bleeding. \n                     Nevertheless, you still feel the pain, meaning that it is probably not superficial. \n\t\t\t\t\t \n                     *set health %-30\n                     *goto end_speedy_fight\n\n                  *else\n                     *set body %+10\n                     *set navigator_relationship %-20\n\t\t\t\t\t \n                     However, despite the superiority in numbers of your opponents you manage to prevail. \n                     ${navigator_name} has clearly done this before, blasting 3 of the thugs after a succession of rapid shots.\n                     It seems that somehow the enhanced reflexes this story has given you have also made you a competent fighter. \n                     You hit one of the thugs in the chest with your first shot, though a second though manages to shoot you in the abdomen before ${navigator_name} can knock him out. \t\t\t\t\t \n                     The last thug approaches you with a knife, though ${navigator_name} approaches him from behind and knocks him out with a powerful punch.\n                     \n                     ${navigator_name} takes a look at your wound. \"${navigator_salute2}, this is ${navigator_swear2} not good, I can patch you up for a bit but you will need medical attention when you get back...\"\n                     As ${navigator_he} is saying this ${navigator_he} takes out some sort of plastic from a backpack, which ${navigator_he} then applies to the wound to stop the bleeding. \n                     However, the wound is still very painful, meaning that it must be deep.   \t\t\t\t\t \n                     *set health %-50\n                     *label end_speedy_fight\n\n                     After this you look around the apartment, but there is little of interest. \n                     Whoever was behind this obviously did not leave any further indication of why they want you dead, \n                     and ${navigator_name} reckons that from past experience the thugs have just been hired for this job, making it unlikely that they even know the identity of the person that hired them. \n                     Hence, you conclude that it is probably better to take your investigation elsewhere. \n                     *goto Speedy_what_to_do_next\t\t\t\t\t \n                     \t\t\t\t\t \n                    \n\n\t\t\t\t\t \n\t\t\t\t \n*comment =========================================================================================================================================================================================================================\n\t  \n*label Crystal\n\n*set Crystal 1\n*set alert_level +1\n\nAs ${navigator_he} drives, ${navigator_name} informs you that Crystal's apartment is in the Kabuki district, somehow the richer part of the city. \nThe streets in it are lined up with a variety of fancy shops selling merchandise, and you notice that the area, while not as beautiful as what you saw of New Heaven, looks noticeably cleaner than other parts of Shibuwata. \nAfter driving for a few minutes ${navigator_name} stops the SAPEV in front of the entrance of a building, somehow nicer that many others around it. \n\nJust next to the entrance there are a couple of vehicles parked, one of which appears to have bullet holes on one of its sides. \nThis is not altogether too strange, as you have seen many vehicles in the city also showing signs of violence. \nNevertheless, you are somehow more concerned about a couple of rather big skinhead men in leather jackets and sunglasses that are leaning against the cars, and turn towards the SAPEV as you park.\n\n*choice\n\n   #Ignore the men, get out of the SAPEV and walk up the stairs to Crystal’s apartment\n      *goto Crystal_trap\n   \n   #Get out of your car and approach the men to ask them what they are doing here, and if they know Crystal\n\n        The men appear slightly nervous as you approach, but you guess that something in your attire or vehicle makes it clear that you are a CSA agent, which means they should fear you?\n        Nevertheless, there is something in their answers that increases your state of alertness, \n        \"Crystal? Yes, of course, she has an apartment in the 3rd floor, go ahead, we're just waiting for some of our friends, who are having a drink in a nearby bar...\"\n        *if (soul >70)\n          From their answer and the look in their eyes it is evident that they are lying, and you feel that this could somehow be a trap. \n          *goto men_choice\n        *elseif (navigator_world >40)\n          ${navigator_name} shakes ${navigator_his} face, and whispers in your ear; \"${navigator_expression_bad_feeling}, I think we really shouldn't go up there, this feels like a trap!\"\n          *goto men_choice\n        *else\n           *label men_choice\n           *choice\n              *if (Speedy =0) #Decide that it is better not trying to contact Crystal, return to the SAPEV and go and meet \"Speedy\" instead\n                 You decide that there is something really strange in this situation, and return to the SAPEV without losing sight of the men. \n                 They appear somewhat confused, with one of them simply spitting on the floor as you drive away, while you tell ${navigator_name} that you better head off and see \"Speedy\".  \n                 *goto Speedy\n              #Decide that it is better not trying to contact Crystal, return to the SAPEV and go and meet Scarface instead\n                 You decide that there is something really strange in this situation, and return to the SAPEV without losing sight of the men. \n                 They appear somewhat confused, with one of them simply spitting on the floor as you drive away, while you tell ${navigator_name} that you better head off and see Scarface.  \n                 *goto Scarface\t\t\t\t \n              #Thank them for the information, and walk up the stairs to Crystal's apartment. \n                *label Crystal_trap\n\n                You slowly walk up the elegant stairs, which are decorated with a number of paintings representing Greek Mythology. There is a faint sense of incense floating in the air,\n                which you kind of like. \n                ${navigator_name} is right next to you, and takes out ${navigator_his} gun, which seems like a good precaution so you follow ${navigator_his} example. \n                As you arrive at the door of the apartment, ${navigator_he} asks: \"${navigator_salute1}, what now?\"\t   \n  \n                *label Crystal_door_choice\n                *choice\n                        *hide_reuse #Knock on the door and say that you are from the CSA, looking for Crystal\n                           You knock on the door, stating your name and that you are from the CSA. However, there is no answer from the other side. \n                           *if (navigator_world >60)\n                               ${navigator_name} makes an exasperated sound, \"${navigator_salute2}, I told you, she is long dead, do you really expect somebody to answer? \n                               I would be surprised if whoever killed her hasn't even ${navigator_swear2} set up a trap in there, I mean, after all if they hate the CSA so much...\"\n                               *goto Crystal_door_choice\n                           *else\n                               *goto Crystal_door_choice\t\t\t\t  \t\t\t\t\t \n\t\t\t\t\t\t \n                        #Kick the door open and walk into the apartment\n                           You kick the door open and walk into the apartment. It is a rather spacious place, with a number of massive sofas and various bookshelves close to the entrance. \n                           At the end you can see a kitchen, and also a number of doors that must lead into other rooms. \n                           *goto Crystal_fight\t\t\t\t\t\t   \n\n                        *if (Speedy =0) #Decide that it is better not trying to contact Crystal, return to the SAPEV and go and meet \"Speedy\" instead\n                           You decide that there is something really strange in this situation, walk down the stairs and return to the SAPEV, while glancing again at the skinhead men next to the cars.\n                           They appear somewhat confused, with one of them simply spitting on the floor as you drive away, while you tell ${navigator_name} that you better head off and see \"Speedy\"  \n                           *goto Speedy\n                        #Decide that it is better not trying to contact Crystal, return to the SAPEV and go and meet Scarface instead\n                           You decide that there is something really strange in this situation, walk down the stairs and return to the SAPEV, while glancing again at the skinhead men next to the cars. \n                           They appear somewhat confused, with one of them simply spitting on the floor as you drive away, while you tell ${navigator_name} that you better head off and see Scarface.  \n                           *goto Scarface\t\n\t\t\t\t\t\t   \n\t\t\t\t\t\t   \n*label Crystal_fight\nSuddenly, the doors open and 4 men dressed in similar leather outfits to the ones in the entrance come out, shotguns in hand, and start firing at you.  \n${navigator_name} takes cover behind one of the bookshelves, while you duck behind a sofa.  \nYou are surprised by how good this story has made your reflexes, though you still wonder what would be the consequences of a bullet hitting your head. \n*set combined_fight (body+ navigator_shooting)\n*if (combined_fight > 150)\n                     *set body %+10\n                     *set navigator_relationship %+20\n\t\t\t\t\t \n                     ${navigator_name} is clearly a great shooter, dealing three fatal shots to the first skinheads to appear. \n                     It seems that somehow the story appears to have also made you a great shooter, as your first shot hits one of the thugs in the head. \n                     A few moments later, the thugs from downstairs appear through the door and charge in, machetes in hand. You block one of them with one hand, while shooting a second thug in the chest. \n                     A final kick to the head sends the other one flying against a shelf, which collapses on top of him. \n                     You turn around, but ${navigator_name} long dispatched all ${navigator_his} opponents, and is smiling at you. \"${navigator_salute1}, you surely live up to your reputation!\"\n\n                     *goto end_crystal_fight\t\t\t\t\t \n\n*elseif (combined_fight > 120)\n                     *set body %+10\n                     *set navigator_relationship %+10\n\t\t\t\t\t \n                     ${navigator_name} is clearly a great shooter, dealing three fatal shots to the first skinheads to appear. \n                     It seems that somehow the story appears to have also made you a good shooter, as your first shot hits one of the thugs in the head. \n                     A few moments later, the thugs from downstairs appear through the door and charge in, machetes in hand. \n                     One of them strikes you with the machete in the leg, while you manage to shoot a second thug in the chest. \n                     A final kick to the head sends the one that struck you flying against a shelf, which collapses on top of him. \n                     You turn around, but ${navigator_name} long dispatched all ${navigator_his} opponents, and is smiling at you. \"${navigator_salute1}, what took you so long?\"\n\t\t\t\t\t \n                     ${navigator_name} proceeds to take a look at your wound. \"${navigator_salute2}, just a scratch really!\" \n                     Immediately after saying this ${navigator_he} takes out some sort of plastic from a backpack, which ${navigator_he} applies to your leg to stop the bleeding.  \n                     Given how little pain you feel it probably means it is really just a scratch, though clearly your bones must be harder than normal as otherwise that blow could have cut your leg off.  \n\t\t\t\t\t\n                     *set health %-10\n                     *goto end_crystal_fight\n\n*elseif (combined_fight > 90)\n                     *set body %+10\n\n                     ${navigator_name} is clearly a very decent shooter, dealing two fatal shots to the first skinheads to appear. \n                     It seems that somehow the story appears to have made you a decent shooter, as your first shot also hits one of the thugs in the chest, sending him flying back against the kitchen. \n                     A few moments later, the thugs from downstairs appear through the door and charge in, machetes in hand. \n                     One of them strikes you with the machete in the leg, while you manage to shoot a second thug in the chest. \n                     A final kick to the head sends the one that struck you flying against a shelf, which collapses on top of him. \n                     You turn around, as you see ${navigator_name} punching the last thug in a series of blows that sends him against one of the walls, before turning to look at you. \n                     \"${navigator_salute1}, I am getting too old for this...\"\n\t\t\t\t\t \n                     ${navigator_name} proceeds to take a look at your wound. \"${navigator_salute2}, that is a deep wound, luckily it didn't break the bone...\"\n                     Immediately after saying this ${navigator_he} takes out some sort of plastic from a backpack, which ${navigator_he} applies to your leg to stop the bleeding.  \n                     Given the pain it's probably a bad wound, though clearly your bones must be harder than normal as otherwise that blow could have chopped your leg off. \n\t\t\t\t\t \n                     *set health %-30\n                     *goto end_crystal_fight\n\n*else\n                     *set body %+10\n                     *set navigator_relationship %-20\n\t\t\t\t\t \n                     ${navigator_name} is clearly a very decent shooter, dealing two fatal shots to the first skinheads to appear. \n                     It seems that somehow the story appears to have made you a decent shooter, as your first shot also hits one of the thugs in the chest, sending him flying back against the kitchen. \n                     A few moments later, the thugs from downstairs appear through the door and charge in, machetes in hand. \n                     One of them strikes your leg with the machete, while you shoot a second thug in the chest. \n                     A final kick to the head sends the one that struck you flying against a shelf, which collapses on top of him. \n                     You turn around, as you see ${navigator_name} punching the last thug in a series of blows that sends him against one of the walls, before turning to look at you. \n                     \"${navigator_salute1}, I am getting too old for this...\"\n\t\t\t\t\t \n                     ${navigator_name} proceeds to take a look at your wound. \"${navigator_salute2}, that is a deep wound, it almost cut the bone entirely\". \n                     Immediately after saying this ${navigator_he} takes out some sort of plastic from a backpack, which ${navigator_he} wraps around the entire leg to keep stop the bleeding and keep the bone in place.  \n                     Given the pain it's probably very serious, though clearly your bones must be harder than normal as otherwise that blow could have completely cut your leg off. \n\t  \t\t\t\t\t \n                     *set health %-50\n                     *label end_crystal_fight\n\n                     After this you take a look around the apartment, but obviously there is no sign of Crystal around here. \n                     You wonder why they set this trap, and whether it was intended for you or any other CSA member, but it is clear that you will not find any answers around here.\n                     *choice\t\t\t\t\t \n                        *if (Speedy =0) #Return to the SAPEV and go and see if you can find something from \"Speedy\"\n                           You walk down the stairs and climb into the SAPEV, with massive amounts of adrenalin still pumping through your veins. \n                           Clearly ${navigator_name} is feeling the same way, given the force with which ${navigator_he} slams the door of the SAPEV, \n                           while you tell ${navigator_him} that you have decided you should go and see \"Speedy\" next. \n\n\t\t\t\t\t\t   \n                           *goto Speedy\n\n                        #Return to the SAPEV and go and see if you can find something from Scarface\n                           You walk down the stairs and climb into the SAPEV, with massive amounts of adrenalin still pumping through your veins. \n                           Clearly ${navigator_name} is feeling the same way, given the force with which ${navigator_he} slams the door of the SAPEV, \n                           while you tell ${navigator_him} that you have decided you should go and see \"Scarface\" next. \n\t\t\t\t\t\t   \n                           *goto Scarface\t\t\t \n                     \t\t\t\t\t \n\n\n\n\n*comment =========================================================================================================================================================================================================================\n\t  \n*label Scarface\n\n${navigator_name} explains to you that Scarface is one of the most famous weapon traders in the city, \npossessing a large shop at one of the  main commercial avenues. Also well known as a deadly shooter few dare face him, \nboth because of his own expertise and the brutal reputation of some of his associates and employees. \nThis explains why he is still alive despite selling information to the CSA throughout the years.  \n\nAs ${navigator_name} parks the SAPEV in front of the neat pavement near Scarface's shop, \none of the two guards at the front salutes you with a small inclination of her head, allowing you to go in. \nScarface, a rather slim and short individual with a scar running across his left cheek, is inspecting some sort of sniper rifle, and quickly turns to look at you. \n\"Ah, I guess my monthly CSA salary has just walked in... What can I do for you this time ${navigator_name}?\"\n\n${navigator_name} looks at Scarface, and gets straight to the point. \"We are looking for somebody called Alexandros Doll. Do you know where he will be tonight?\"\nScarface eyes widen slightly, and he answers, \"Of course I do... But it will cost you 100 silver dollars.\"\n\n*label scarface_choice\n\n*choice\n\n     *hide_reuse *if (money >= 10) #\"We do not have that much money, will 10 silver dollars do?\"\n\n       Scarface looks at you while he shakes his head. \"Sorry, no money no info, mate! You are the CSA, surely they gave you a bit of money before you came here?\"\n       *goto scarface_choice\n\t   \n     *if (money >=50) #\"We do not have that much money, will 50 silver dollars do?\"\n       *label scarface_money_50\n       *set money -50\n       Scarface grins as you say this, visibly displeased, \"I can't believe the bloody CSA has become so stingy these days... \n       But I guess that half the town knows where Alex will be tonight, so I am not really telling you much.\n       I guess you are onto that new drug they are making, what do they call it? \n       \"Pride\"... I think that's what they call it... He is a dangerous man, though tonight I know he is renting a VIP booth at the special event in the “Belfair” nightclub... \n       I guess you want to take him in, but I doubt he is gonna go easily... Fireworks tonight then... Always goooood for business!\"\n\n       [i] (You have ${money} silver dollars left) [/i] \n\t   \n       *goto scarface_exit\n\t   \n     *if (money >=100) #Pay him 100 silver dollars\n       *label scarface_money_100\n       *set money -100\n       Scarface smiles as you hand him the money. \"Always a pleasure doing business with the CSA, love how money is no issue for you guys! \n       But I guess that half the town knows that Alex will be tonight, so I am not really telling you much.\n       I guess you are onto that new drug they are making, what do they call it? \n       \"Pride\"... I think that's what it was... He is a dangerous man, though tonight I know he is renting a VIP booth at the special event in the “Belfair” nightclub...\t   \n       Be careful though. I heard they are expecting company, so it might turn into a bit of a party if you intend to arrest him, if you know what I mean...\"\n\n       [i] (You have ${money} silver dollars left) [/i] \n\t   \n       *goto scarface_exit\n\n     #\"Sorry, we do not have enough money... Is there any other way we can pay you?\"\n       Scarface looks at you while he shakes his head, \"Sorry, no money no info, mate! But... Somebody recently has been after some CSA blood...\n       If you let me take some of your blood I will give you the info you want\". As he says this he produces a rather large syringe, and smiles. \n       *choice\n         *if (money >=50) #\"We do not have 100 silver dollars, but will 50 do?\"\n            *Goto scarface_money_50\t \n\n         *if (money >=100) #\"Actually, I just remembered my boss gave me 100 dollars before leaving, how could I have forgotten?\"\n            *Goto scarface_money_100\t\t\t\t\n\n         #\"Sure, what is a little blood anyway?\"\n            *set health %-20\n            *set soul %-5\n            Scarface continues to smile as he thrusts the syringe into your arm, draining a considerable amount of blood, making you feel somewhat dizzy. \n            \"Always a pleasure doing business with the CSA, I am sure my client is going to love this, there are rumours that CSA blood has great regenerative powers!\n            But, I guess that half the town knows that Alex will be tonight, so I am not really telling you much!\n            I guess you are onto that new drug they are making, what do they call it? \n            \"Pride\"... I think that's how youngsters call it... He is a dangerous man, though tonight I know he is renting a VIP booth at the special event in the “Belfair” nightclub...\t   \n            I'd be careful if I were you. I heard they are expecting company, so it might turn into a bit of a party if you intend to arrest him, if you know what I mean...\"\n\t\t\t\n            *goto scarface_exit\t\t\t\n\n\t\t\t\n*label scarface_exit\n\n*achieve got_information\n\nYou thank Scarface for the information and walk back towards the SAPEV. \n*goto getting_tickets\n\n\n\n\n\n*comment =========================================================================================================================================================================================================================\n\n*label getting_tickets\nAt this point, ${navigator_name} turns to you and says; “So that is settled.  \nBut, how are we ${navigator_swear2} going to get tickets to get inside the nightclub?”\n\n*label ticket_choices\n\n*choice\n\n   *if (money>=50) #\"Don't worry, I am sure the silver dollars we have are enough to bribe our way into the place\"\n\n      *set soul %-5\n      ${navigator_name} nods in approval, after all, with the money you have it shouldn't be too difficult to bribe the guards at the door, \n      and as long as you manage to somehow disguise your true intentions the element of surprise might not be completely lost.\n      *goto rest_scene\t  \n\n\n   *hide_reuse #\"Do you know any ticket resellers in this area?\" \n      *if (navigator_world >50)  \n          ${navigator_name} looks at you, slightly surprised. \"${navigator_salute2}, how come I didn't think about that?\n          Come on, get into the SAPEV, it's not far from here\". \n\n          You drive a few blocks till you arrive at a small liquor store, and once again park the SAPEV. \n          The owner of the shop, Jane, is a rather tall and good looking middle-aged woman, who recognises ${navigator_name} as ${navigator_he} walks through the door.\n          \"Ah, ${navigator_name}, how is it that you always turn up when I am having a bad day?!\"\n\n          You smile at her, and calmly tell her that you are looking for tickets to tonight's event at the “Belfair” nightclub. \n          This seems to improve her mood somewhat, as she pulls out two tickets. \n          \"Yep, of course, one of the events of the month, by what they say. Of course I have the tickets, but they will cost you 50 silver dollars, non-negotiable\"\n \n          *choice \n             *if (money >=50) #\"Sure, here you go\"\n                 *set money -50\n                 You pull out the dollars and stamp them on the table, as Jane smiles and hands out the tickets. \n                 \"Always a pleasure doing business with the CSA... Come back any time!\"\n                 \n                 [i] (You have ${money} silver dollars left) [/i] \n                 \n                 *set tickets 1\n                 *goto rest_scene\n\t\t\t\t\n             *if (money >=30) #\"Sounds like a bit too much money, how about 30 dollars?\"\n                 *set money -30\n                 Jane looks at you slightly annoyed, \"What, this again? Come on, these are not cheap, and my margins are very small!\n                 But, ok, I will give you a discount, 30 dollars, but only cos I really like ${navigator_name}!”\n                  \n                 ${navigator_name} smiles as she says this, and you wonder what kind of dealings they have had in the past, \n                 but anyway you are glad that you actually managed to get the tickets. \n                 \n                 [i] (You have ${money} silver dollars left) [/i]                  \n\t\t\t\t  \n                 *set tickets 1\n                 *goto rest_scene\t\t\t\t \n\n             #Pull your gun out and tell her to hand over the tickets\n                   *set soul %-10\n                   *set navigator_relationship %-20\n                   *set health %-20\n                   Jane and ${navigator_name} both look surprised as you do this. Jane shouts at you: \"What is this? You cannot be serious!\"\n                   However, she looks straight into your eye and quickly realizes that you are not kidding, handing over the tickets while she makes an annoyed grunt. \n                   You smile, tap her on the face, and thank her for the tickets. \n                   However, as you do this she suddenly thrusts a knife towards your chest. She was not quickly enough to hit any organs but she draws some blood, \n                   despite the superior reflexes that this story seems to have given you. \n\n                   Visibly surprised that she missed, Jane quickly turns around and escapes through a door to a back room, \n                   which a resort mechanism closes immediately after she passes. \n                   It is clear that this is a reinforced door, built precisely to allow her to escape situations such as these, \n                   so you would probably waste your time trying to open it, and anyway you have the tickets so you decide it is time to leave the shop.\n\n                   *set tickets 1\n                   *goto rest_scene\t\t\t\t   \n\n\n             #Pull out your gun, shoot her and get the tickets\n\n                 It seems this might be the only real way to get the tickets given the present circumstances, so you bring out your gun, and shoot Jane in the head. \n                 She collapses to the floor, with the look of surprise and fear still showing in her face. You take the tickets from her still trembling hand, \n                 and leave the shop to return to the SAPEV, to the shock also of ${navigator_name}, who shouts at you: \n                 \"${navigator_expression_surprise}, what the ${navigator_swear1} hell was that?? Are you some sort of psychopath?? Maybe that is what I will call you from now, psycho!\"\n                 *set navigator_salute1 \"Psycho\"\n                 *set navigator_salute2 \"Bloody psycho\"\t\t\t\t \n                 *set soul %-50\n                 *set navigator_relationship %-50\n                 *goto rest_scene\t\t\t\t\t \n\n\n      *else  \n          ${navigator_name} looks at you, slightly surprised, \"${navigator_salute2}, I am not really the biggest expert on this area, so not really... Any other ideas?\"\n          *goto ticket_choices\t\t  \n\n   #\"We might have to \"source\" them from somebody in the street...\" \n\n       ${navigator_name} looks at you for a few seconds, puzzled by the meaning of your words, \n       till ${navigator_he} realizes that you mean that you will forcefully just steal them from somebody.  \n       Without saying anything else you proceed to walk around the streets until you find a couple of youths who correspond to the profile of raver that could be expected for some sort of big club event. \n       They already look a bit high, and it is clear that this story has made you into somebody that can easily overpower them, even with a hand tied round your back. \n       *choice \n          *if (money>=10) #Pull out your gun, threaten them into giving you the tickets, and partially compensate them giving them 10 silver dollars \n             *set money -10\n             *set soul %-5\n             *set navigator_relationship %-10\n             *set tickets 1\n             The two youths are visibly shocked, and a smell of urine arrives at your nostrils as they hurriedly hand over the tickets. \n             You then throw them the silver coins, which they catch and run away into one of the back alleys. \n             Satisfied that you got the tickets, you start to walk back to the SAPEV, amazed at how simple that was.\n\n             [i] (You have ${money} silver dollars left) [/i]              \n           \n             *goto rest_scene\t\t\t \n\n          #Pull out your gun and threaten them into given you the tickets\n            *set tickets 1\n            *set navigator_relationship %-20\n            The two youths are visibly shocked, and a smell of urine arrives at your nostrils as they hurriedly hand over the tickets to you. \n            You wave your hand at them, telling them to disappear, which they promptly do by running away into one of the back alleys. \n            Satisfied that you got the tickets, you start to walk back to the SAPEV, amazed at how simple that was.  \n            *goto rest_scene\n\t\t\t\n          #Pull out your gun, shoot t
