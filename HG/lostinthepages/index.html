However, you note that many of them have suffered severe damage. \nAngelica somehow notices that you are intrigued by this, and casually just mentions, \"The earthquake of 2013 damaged most of the churches, \nthey were very old and were never designed against earthquakes.\" She doesn't add anything else, and continues to focus on her e-mails. \n\nThe weather darkens, and before long a thick tropical rain starts to pound the car, reducing visibility considerably. It could be your impression, \nbut it also would seem that the area has fewer houses. By the time you arrive at your destination it's almost dark, \nand you get rather wet from just getting out of the car and into a rather luxurious colonial style mansion. \n\nAngelica also enters the mansion after you. \"Follow me, I'll show you to your chamber. ${employer_Mr} ${employer_surname} will meet you at 8pm.\"\nYou realize the mansion is a rather large place as Angelica guides you along a corridor to your room, which is rather vast and decorated in a style of an era long past.\n*if relationship_secretary >50\n   Angelica smiles and tells you that she will be back in a couple of hours to take you to dinner, and politely closes the door behind you as she leaves you to unpack.\n   *goto unpack\n\n*else   \n   You are startled as she then closes the door behind as she leaves you to unpack. \n   *goto unpack\n   \n*label unpack\n\n*choice\n\n   #Check if she has locked the door \n      You open the door, and see the back of Angelica as she walks down the corridor through which you arrived. Slightly relieved that she hadn't locked you in,\n      you proceed to settle into your room. \n      *set mind %+5\n      *goto settle_room\t  \n   \n   #Settle into your room\n      *goto settle_room\n\n\n*label settle_room\nYou proceed to unpack some items from your hand luggage and then check the bed, which is rather comfortable. Without realizing you doze off, tired by all the travelling. \n\nA knock on the door awakens you a couple of hours later. As you open it you see Angelica outside, \nher elegant bright dinner dress and intense red lipstick somehow throwing you slightly off balance. \n*if relationship_secretary >65\n  She gives you a big smile. \"Did you get some rest? You look a bit better than when we arrived. Anyway, please follow me, \n  ${employer_Mr} ${employer_surname} is waiting for us.\" \n  *goto dining_room\n\n*elseif relationship_secretary >50\n  \"Did you get some rest? You look a bit better than when we arrived. Anyway, please follow me, \n  ${employer_Mr} ${employer_surname} is waiting for us.\" \n  *goto dining_room  \n*else \n  Without much ceremony she turns around while just telling you to follow her. \n  *goto dining_room\n\n*label dining_room  \nShe then guides you through a series of corridors until you reach a large dining room, with a large meal set out for you on one side of the table. \n\n*if employe_gender = \"male\"\n   On the other side of the table sits an elderly man, wearing an elegant dark dinner suit. Despite his age he radiates a certain feeling of strength and power, \n   and his voice leaves no doubt that he is used to giving orders and people obeying him. He smiles at you, and asks you to please sit down and get some food. \n*if employe_gender = \"female\"   \n    On the other side of the table sits an elderly woman, wearing an elegant dark dinner dress. Despite her age she radiates a certain feeling of strength and power, \n    and her voice leaves no doubt that she is used to giving orders and being obeyed. She smiles at you, and asks you to please sit down and get some food. \n\"I will eat later, somehow I prefer to have late dinners.\" Angelica sits also across the table, slowly eating from the plate in front of her, \nthough she seems to enjoy the delicious red wine more than the food. \n\nYou start to eat some of the food, while ${employer_Mr} ${employer_surname} explains the reason why ${employer_he} has asked somebody from your company to come here. \n\"I tire of this place, and would like to move to a new country, and as you know I have asked your company to find me a place in Fiji... something like this place, \nold and elegant, with solid walls. If possible from the early colonial period, with a good wine cellar where I could store my collection of fine red liquids.\"\nA smile comes to ${employer_his} face as ${employer_he} looks at the cup of wine in Angelica's hand. \n\n*choice\n\n   #\"Fiji? Well, yes, of course, though it might be difficult to find something of those characteristics there\"\n       ${employer_Mr} ${employer_surname} smiles at you, before replying. \"Well, yes, of course. \n       Especially after the typhoon, I heard many of the old mansions suffered much damage. But, I'm prepared to pay well to have one of them repaired quickly\"          \n       *goto continue_explanation\n\t   \n   #\"Fiji? Any special reason for that country?\"   \n       ${employer_Mr} ${employer_surname} smiles at you, before replying. \"Well, maybe you know that the country was recently hit by a major typhoon?\"          \n       *goto continue_explanation   \n \n*label continue_explanation\n\nAngelica puts down her glass of wine before adding, \"${employer_Mr} ${employer_surname} is engaged in many activities, \nand likes to live in places that have been recently affected by disasters... In a sense, ${employer_he} feels more closely connected to the people then.\"\n\n${employer_Mr} ${employer_surname} smiles again. \"Indeed. Such moments can make mortals become closer to their human nature, \nhaving to concentrate on survival and forget other complications in life.\" \n\nAt this point you  notice two large portraits behind ${employer_Mr} ${employer_surname}, \nrepresenting a young man and a woman dressed in 18th century attire. Noticing your interest in the paintings ${employer_Mr} ${employer_surname} explains, \n\"The paintings are two... ancestors of mine: the Duke and Duchess of Nancy.\"\n\n*if employe_gender = \"male\"\n   You can indeed see a resemblance between the Duke and ${employer_Mr} ${employer_surname}, as both seem to share features. \n*if employe_gender = \"female\"\n   You can indeed see a resemblance between the Duchess and ${employer_Mr} ${employer_surname}, as both seem to share features.\nThe resemblance is actually almost scary, as if ${employer_Mr} ${employer_surname} was just an older version of the painting behind you. A shiver runs down your spine, \nand you start to wonder what type of story you could have found yourself in. \n\n*choice\n\n   #\"So, what happened to your ancestors, actually?\"\n      *label ancestors\n      ${employer_Mr} ${employer_surname} turns back to look at the portraits. \"Well, they used to travel a lot, like myself. Somehow, \n      they were different than other people around them, and this made people nervous. Peasants are prone to superstitions, \n      and their priests were quick to blame any problems in the community on outsiders.\" For a few seconds, ${employer_Mr} ${employer_surname} appears rather pensive, \n      lost in ${employer_his} thoughts. \"They burnt one of them, though the other managed to escape. Padre Irwin, \n      that was the name of the priest that turned the peasants on them... It was actually not far from here. \n      They were both French, engaged in trade with the Spanish colonial authorities. That is one of the reasons I have been here for a while, \n      wanted to see the place where it all happened...\"\n\t  \n      Padre Irwin, you jump at the mention of his name, which clearly cannot be a coincidence. How could he be related to this story, \n      and why did he attempt to get the Dukes of Nancy burnt?\n\t  \n      *set soul %+5\n      *goto end_conversation\n\t  \n   #\"They were French?\"\n       *goto ancestors\n\t   \n   #Nod your head thoughtfully, but don't ask any questions\n       *goto end_conversation\n   \n   \n*label end_conversation\n\n${employer_Mr} ${employer_surname} then turns to look at you, ${employer_his} light green eyes piercing to the bottom of your soul. \"Are you ok, ${name}? \nYou seem to have gone a bit pale, you are not hungry? Maybe a bit tired after the long trip?\"\n\n*choice\n\n   #\"Yes, sorry, I think the flight and then ferry ride here have exhausted me. I think I better retire to my room\"\n       ${employer_Mr} ${employer_surname} nods. \"Of course, you have come from very far, \n       *goto finish_dinner \n   \n   #\"I'm ok, thanks. I was just impressed by the ability of the painter. Your resemblance to your ancestor is striking\"\n       ${employer_Mr} ${employer_surname} smiles. \"You are very observant... a rare quality in this age where most people have short attention spans. \n       In my time people had more time to contemplate. This digital age has made people addicted to superficially dealing with large quantities of information, \n       rather than paying attention to detail. \n       But yes, it would almost seem like we are the same person, right? I am rather fond of the painting. But, you have come from far, \t   \n       *goto finish_dinner \n\n*label finish_dinner\nand must be so tired. Maybe it would be better for you to rest. There is much work for you to do tomorrow, \nand I have asked Angelica to prepare you a computer in my library so that you can contact your company and find my new home in Fiji.\" \n\n*if relationship_secretary >50\n\n   At this point Angelica smiles at you and stands up, indicating that the conversation must be over. You get up and follow her back to your room, \n   where she turns and tells you, \"I'm sorry, but ${employer_Mr} ${employer_surname} wants all visitors locked in their room, \n   somehow ${employer_he} doesn't like the idea of guests walking around the house and looking into ${employer_his} stuff. I hope this is ok?\"\n   This seems a bit odd, but you guess you have no option but to obey. \n   *choice\n      #\"I don't really like this, but I believe you. If you say it's ok then all is good\"\n         *set relationship_secretary %+20\n         Angelica smiles as you say this. \"You are such a lovely person. Thank you, I was worried this would upset you. Good night and sleep well.\" With that, \n         she closes the door and you hear a small click as she turns the key on the other side. \n         *goto room_choices\n      #\"Well, I guess its ok, I've worked for all sorts of strange clients before\"\n         Angelica smiles as you say this. \"Thank you for understanding, you know how old people can be a bit strange. Anyway, good night and sleep well.\" With that, \n         she closes the door and you hear a small click as she turns the key on the other side. \n         *goto room_choices\n      #\"I really can't believe both of you are treating me like this!\"\n         *set relationship_secretary %-20\n         Angelica looks shocked as you say this. \"Well, know how old people can be a bit strange, not really my fault.\" With that, \n         she closes the door and you hear a small click as she turns the key on the other side. \n         *goto room_choices         \n         \n*else\n\n   At this point Angelica stands up, indicating that the conversation is over. You get up and follow her back to your room, which she once again closes behind you. \n   You hear a small click, and when you try the handle you realize that she must have locked you in from the other side, somehow trapping you inside the room. \n   *goto room_choices  \n\n*label room_choices\n\n*choice\n\n    *hide_reuse #Check to see if you could get out of the room through the window\n      You check the window, but it has also been locked, and the key to open it doesn't seem to be anywhere around. \n      You suppose you could try to smash it open with something, but such a level of violence would seem excessive considering that nothing has really happened to warrant it yet.\n      Feeling slightly frustrated, you pace around the room for a while, trying to think of something to do.       \n      *goto room_choices\n\t  \n    #Do some push-ups and pull-ups to take your mind off the fact that you are trapped\n      Nothing better than doing some exercise to take your mind of this problem. You start to exercise until you feel tired enough not to care any more about being locked.\n      After all, this is a story, what is the worst that could happen to you? However, your sleep is plagued with nightmares, \n      and you wake up the next morning feeling troubled by them. \n      *set body %+10\n      *goto morning_mansion  \t  \n\t  \n    *if (have_holy_book = 1) #Take out your copy of the ${holy_book} and start reading a bit from it, maybe there is evil round here and holy words can show you the way forward\n      Reading the ${holy_book} somehow manages to calm you. You start to feel with more clarity a sense of purpose, and you vow to get to the end of what is happening around here, \n      and get rid of any evil that exists inside this mansion. With those thoughts you settle into a peaceful sleep, and wake up the next morning feeling much better.  \n      *set soul %+10\n      *goto morning_mansion\n\n    #Try to get some sleep anyway\n      After all, this is a story, what is the worst that could happen to you? It takes a while, but you finally manage to fall asleep. \n      However, your sleep is plagued with nightmares, and you wake up the next morning feeling rather troubled.\n      *goto morning_mansion\t  \n\t  \n\t\n*label morning_mansion\n     \nA few minutes after you finish getting dressed somebody knocks on the door, and behind it you hear the distinctive voice of Angelica. \"Breakfast is ready, if you would please follow me.\"\nYou quickly finish getting ready and step out of the room, where Angelica awaits you. She is dressed in casual clothes, blue jeans and a black top. \nYou follow her to a more informal dining room, where there are two rather big breakfast plates set out. \n*if relationship_secretary >70\n  Angelica signals for you to sit in front of one of them and smiles at you. \"Hope you slept well. I really like this old mansion, though somehow I never sleep well when I come here. \n  I always seem to have many nightmares, though I guess it might be because it's not my own bed. But, please, go ahead, you must be hungry.\" \n  With that she starts to eat, while looking at you, visibly happy. \n \n  *goto conversation_breakfast\n\n*elseif relationship_secretary >50\n  Angelica signals for you to sit in front of one of them and smiles at you. \"Hope you slept well. I really like this old mansion, though somehow I never sleep well when I come here. \n  I always seem to have many nightmares, though I guess it might be because it's not my own bed.\" \n  With that she starts to eat, while trying to read a newspaper at the same time. \n\n  *goto conversation_breakfast\n  \n*else \n  Angelica signals for you to sit in front of one of them and sits on the opposite side. She quickly starts to eat, while reading the newspaper. \n  *goto conversation_breakfast\n\n \n \n\n*label conversation_breakfast\n\n*choice\n\n   *hide_reuse #Ask her where ${employer_Mr} ${employer_surname} is, and whether ${employer_he} will be joining you for breakfast\n      Angelica looks at you, and answers casually. \"${employer_Mr} ${employer_surname} is an evening person, \n      awake all night reading and doing ${employer_his} stuff, you never see ${employer_him} during the day. \n      I used to find it a bit strange at first, but, you know, everybody is different.\" \n      *goto conversation_breakfast\n\t  \n   *hide_reuse #Tell her that there is something really strange in this mansion, something evil, and that she should get out of here as soon as possible\n      Angelica laughs out loudly as you say this. \"You are crazy! I think you foreigners get spooked out easily. Sure this is an old mansion, \n      but not all old mansions are haunted. This is not a movie, but real life!\" At this point you sigh. \n      How could you explain to her that this is not actually real life, but a story? And in stories, something always seems to be wrong with old mansions...\n      *set relationship_secretary %-5\n      \n      *goto move_library\n\n   *hide_reuse #Ask her how long she has been employed by ${employer_Mr} ${employer_surname}, and the nature of her job\n      \"A little over a year. The person before me suddenly disappeared without saying anything, apparently. \n      ${employer_Mr} ${employer_surname} is actually a bit strange, with having no mirrors around, but old people can be eccentric. Essentially, \n      I take care of running the mansion and other things that ${employer_Mr} ${employer_surname} doesn't like dealing with. In fact, I take care of all interactions with the local society.\"\n      *goto conversation_breakfast\n\n   *hide_reuse #Try to convince her that none of this is real, and that you are from a different world\n      Angelica laughs out loudly as you say this. \"You are crazy! But, as long as you can do your job I don't really care.\"\n      *set relationship_secretary %-10\n      *goto move_library\n   \n   *hide_reuse #Finish your breakfast and tell Angelica that it would be better to get on with finding ${employer_Mr} ${employer_surname} a new home\n      *goto move_library\n\n*label move_library\n\nAngelica stands up, and tells you to follow her to the library, where she has a laptop that is connected to the internet. \n\"As you will have noticed, there is no electricity in the house, another of ${employer_Mr} ${employer_surname} oddities, \n${employer_he} likes to live as if ${employer_he} were in the 19th century or something like that. \nHowever, I've got a charged laptop that you can use to communicate with your company.\"\n\nThe library is a rather impressive room, completely covered in very old books, and its smell clearly reminds you of uncle Irwin's shop. \nOn one of the tables there is a small laptop, with two seats. Angelica sits behind you, observing everything that you do, \nwhich leaves you no choice but to write to your company and arrange to acquire a property for ${employer_Mr} ${employer_surname} in Fiji. \nIt's dark outside by the time everything is ready, and you print out the property deed on a small portable printer that Angelica has also brought, \namazed by how quickly a property can be bought if the buyer has the right amount of money. \n\"This is it, all it needs is ${employer_Mr} ${employer_surname}'s signature, and then I can send it back to my company.\"\n\n*if relationship_secretary >70\n\n  Angelica takes the document from you. \"Thanks. I'll take care of that tomorrow. But, you must be tired, \n  I'll take you back to your room so you can relax a bit before dinner. ${employer_Mr} ${employer_surname} has told me to lock you in again, \n  but I'm sure you can understand. Anyway, I will see you soon again during dinner!\" Her eyes shine as she says this, \n  and it's clear to you that she visibly enjoys your presence, which relaxes you somewhat. \n  \n  *goto electricity_out\n\n*elseif relationship_secretary >50\n\n  Angelica takes the document from you. \"Thanks. I'll take care of that tomorrow. But, you must be tired, \n  I'll take you back to your room so you can relax a bit before dinner. ${employer_Mr} ${employer_surname} has told me to lock you in again, \n  but I'm sure you can understand.\"\n  \n  *goto electricity_out\n  \n*else\n  \n  Angelica takes the document from you. \"Thanks. I'll take care of that tomorrow. But, you must be tired, \n  I'll take you back to your room so you can relax a bit before dinner.\"\n  *goto electricity_out\n  \n*label electricity_out\n  \nOnce again as she closes the door you hear a click that indicates you have once more been locked in, which is making you feel increasingly nervous. \nNow that the deed is done, it's possible that ${employer_Mr} ${employer_surname} has no further need for you. \nYou pack some of your stuff inside a small backpack that was inside your luggage, and quickly decide what to do next. \n\n*choice\n\n   *selectable_if (rope =1) #Throw a chair against the window to break the glass, tie your rope to some furniture and use it to descend to the ground outside\n     The window shatters into pieces that fall all over the place, allowing the fierce wind and rain outside to enter the room. You hadn't noticed how the weather had worsened once more,\n     though the tropical rain is not nearly as cold as you would have expected it to be.\n     After tying the rope around several pieces of furniture, you proceed to climb down the outside of the building until you reach the ground without trouble. \t \n     *goto outside_mansion_choices\n\t \n   #Throw a chair against the window to break the glass, and try to climb down the side of the building until you reach the bottom of the house\n     The window shatters into pieces that fall all over the place, allowing the fierce wind and rain outside to enter the room. You hadn't noticed how bad once more the weather had become, \n     though the tropical rain is not nearly as cold as you would have expected it to be.\n     You step outside the window, and start to slowly climb down the side of the building.\n\t \n     *if body > 65\n        Despite the rain making the surfaces rather slippery, you manage to slowly climb down the edge of the mansion until you reach the ground. \n        *goto outside_mansion_choices\t        \n     *else\t \n        However, the rain has made the surfaces rather slippery, and you you lose your grip and fall to the ground below, \n        landing on your foot and then falling to your side. Moaning in pain you get up, nothing broken but your foot hurts as you walk, \n        probably a small sprain. It won't kill you, but will slow you down considerably. \n\t \n        *set health %-20\n        *goto outside_mansion_choices\t\t \n\t \n \n*label outside_mansion_choices\t \n\nThe main door of the mansion is closed, and there is little you can see inside, as there are only a couple of small candles on chandeliers illuminating the interior. \nYou can also make out the silhouette of the black Bentley in which you arrived, parked in front of the main entrance. \nFrom your memory it's quite far to the nearest village, and you are probably going to need it if you really want to escape the mansion. \n*choice\n      #Check to see if the keys to the Bentley are inside, and use it to escape the mansion\n         *set soul %-5\n         The door of the car isn't locked, but the keys are neither in the ignition nor anywhere else you can see, \n         so you are probably going to have to find them inside the mansion if you are to escape. \n         \n         Resigned, you turn towards the main entrance of the mansion. \n         *goto enter_mansion\n\t\t \n      #Enter the mansion through the main entrance. After all, if this is a horror story it's your duty to get rid of whatever evil is around\t \n        *label enter_mansion\n        *set soul %+5\n        You can hardly make out any of the shapes of the furniture, \n        as the two candles set out in chandeliers hanging on from the ceiling of the entrance hardly emit any light at all. \n        It's probably going to be difficult for you to navigate your way around the mansion, given the amount of furniture and how large it is. \n\n        *choice\n             #Take out your smart phone and use the torch app to illuminate your way\n               Modern technology is indeed great, and your smart phone allows you to quickly have a look at the entrance hall.\n               There is the main staircase leading to the second floor, and a small corridor that leads to the kitchen area, \n               with a smaller set of stairs leading to the cellar below.\t\t\t   \n               However, the battery was almost exhausted and seconds later it finally dies, leaving you again almost in complete darkness.\t\t\t \n               *set source_light 0  \n               *goto scream \n               \n            *selectable_if (torch =1) #Take out your small torch to illuminate your way\n               It was clearly a good idea to buy it, as it provides you just enough light to be able to see where you are going.\n               There is the main staircase leading to the second floor, and a small corridor that leads to the kitchen area, \n               with a smaller set of stairs leading to the cellar below. \n               *set name_source_light \"torch\"\t\t\t   \n               *set source_light 1\n               *goto scream\n  \n            *selectable_if (candle =1) #Take out your candle and light it up to illuminate your way\n               It was clearly a good idea to buy it, as it provides you just enough light to be able to see where you are going.\n               There is the main staircase leading to the second floor, and a small corridor that leads to the kitchen area, \n               with a smaller set of stairs leading to the cellar below.\t\t\t   \n               *set source_light 1\n               *set name_source_light \"candle\"\n               *goto scream \n  \n\n\n*label scream\n\nSuddenly you hear a very loud scream, a cry of pure terror, which would appear to come from somewhere in the cellar. \nYou cannot be fully sure, but something in the pitch would lead you to think that it could have come from Angelica. \n\n*choice\n\n   #Go to the kitchen to see if you can find anything that could serve as a weapon\n      You run towards the kitchen, a rather large area where no candles have been lit.\n      *if source_light >0\n         Fortunately, the ${name_source_light} emits enough light for you to be able to look around. \n         On top of one of the tables you see a chopping board with a large knife on top of it. \n         There is also a large rolling pin you could use as an improvised mace. \n         Finally, there is a mop, you could detach the rod from it and quickly turn it into a spear using the chopping knife.\n         \n         *choice\n            #Take the knife as a weapon\n               *set weapon \"knife\"\n               *set have_weapon 1\n               You take the knife, which feels rather heavy in your hands. Obviously used for chopping, and quite sharp by the looks of it.\n               Satisfied, you quickly turn around to the stairs that go down to the cellar.\n \t\t\t   \n               *goto go_downstairs\n            #Take the rolling pin as a weapon\n               *set weapon \"rolling pin\"\n               *set have_weapon 1\n               You take the rolling pin, which is rather heavy, and could be used to smash somebody's head if necessary. \n               Satisfied, you quickly turn around to the stairs that go down to the cellar.\n \t\t\t   \n               *goto go_downstairs\n            #Take the mopping rod and quickly make it into a spear\n               *set weapon \"wooden spear\"\n               *set have_weapon 1\n               You take the rod from the mop, put it on top of the chopping board, and with two strong hits with the chopping knife you have an improvised wooden spear. \n               Satisfied, you quickly turn around to the stairs that go down to the cellar.\n \t\t\t   \n               *goto go_downstairs\n\n      *else\n         You stumble around the kitchen for a few moments, until eventually you find what seems like a knife, which was set out on one of the surfaces. \n         Happy at your luck at finding something in the darkness you turn around and head to the stairs that go down to the cellar.\n         \n         *set weapon \"knife\"\n         *set have_weapon 1\n         *goto go_downstairs\n\t\t \n   #Quickly go down the stairs to the cellar     \n         *label go_downstairs\n         The stairs creak as you descend into the basement of the house. Progressively less of the light from the chandeliers upstairs reaches this area, \n         increasing your sense of uneasiness. Eventually the stairs lead you into a small room, from which a small stone corridor descends deeper into the ground. \n         You can hear the sound of dripping water echo through the corridor ahead, though otherwise there is an eerie silence around the area. \n         \n         The room is largely empty, aside from what appear to be a wooden chest and a wardrobe. \n         \n         *choice\n           #Look to see if you can find anything of interest in the wooden chest and wardrobe\n              *if source_light >0\n                You open the chest and wardrobe, using the ${name_source_light} to see if you can find anything of interest. \n                The chest contains old letters and other pieces of paper written in a language you cannot understand. \n                The wardrobe is likewise filled with very old clothing, some of it almost falling apart. \n                However, on the bottom of the wardrobe you find a leather wallet that contains 3000 pesos. You quickly pocket these, \n                and turn to face the stone corridor.\n                *fake_choice\n                   #Take the 3000 pesos. You don't like stealing, but you might just need them\n                      *set soul %-5\n                      *set money +3000\n                      You are not quite sure whether this would be classed as stealing, but you guess that it might be better to take them, just in case. \n                   #Great, they are yours now!\n                      *set soul %-10\n                      You quickly put the pesos away, not believing your luck. \n                      *set money +3000\n                   #I leave the money where it is, as I feel taking it would be like stealing\n                      *set soul %+10\n                      Clearly, stealing is a bad thing, and you are not sure who do these belong to. \n                You then turn towards the entrance of the corridor, and arming yourself with courage you step in. \n                *page_break                \n                \n                *goto stone_corridor                \n              *else\n                You open the chest and wardrobe to see if you can find anything of interest. \n                The chest contains lots of pieces of paper, but the faint light that arrives in the area does not allow you to properly understand what they are. \n                The wardrobe is filled with old clothing, some of it almost falling apart, though you find little of interest. \n                Disappointed, you turn to face the stone corridor.\n                *goto stone_corridor                   \n\n           #Enter the stone corridor\n               *label stone_corridor           \n\n               As you walk along the corridor drops of water from the ceiling fall on your head, making you feel very miserable and damp. \n               Every now and then you feel something brushing against your feet, which, judging from the faint shrieks you hear, could be rats.\n               \n               *if source_light >0\n                 The ${name_source_light} provides you enough light to make the illuminate the way, \n                 and eventually you are able to spot some of the rats, trying to kick them out of the way as you make progress. \n                 After a few hundred meters you arrive at an intersection. The muddy floor of the stone corridor shows that both have been travelled,\n                 *if mind >60\n                    though the footsteps on the one to the right are more recent. You guess that whatever screams you have heard are more likely to come from this corridor.\n                    *goto choose_corridor                    \n                 *else\n                    though you cannot really guess which one the screams must have come from. \n                    *label choose_corridor          \n                    *choice\n                       #Take the left hand side corridor\n                          *goto left_corridor\n                       #Take the right hand side corridor\n                          *goto right_corridor\n                   \n               *else\n                 Eventually, you are in complete darkness, stumbling on the sides of the corridor as you continue forward. \n                 After what you feel is like an eternity you see a very faint light coming from the end of the corridor.\n                 *goto left_corridor                 \n                            \n*label left_corridor       \nAs you continue walking eventually you arrive at a solid wooden door, \nand judging from the faint light seeping out from under it there must be some light source at the other side. Slowly you push the door open \nto reveal a rather large room with an impressive stone vault over it. One large torch on one of the walls provides enough illumination for you to see clearly, \nthough the flickering light gives the place a rather macabre look.  \nIn the centre of the room, sitting on top of stone pedestals, are two wooden coffins.\n\nA sudden shiver runs through your spine as you see this. There is one other exit to the room, through a wooden door opposite the one through which you have entered. \n\n*label crypt_choice\n\n*choice\n\n  *hide_reuse #Take the wooden torch hanging on the wall\n      You take the torch with one hand and swing it around, feeling its weight and how to best handle it without burning yourself or your clothes. \n      Then, you turn to look back at the coffins and the rest of room, while you decide what to do next. \n      *set source_light  1\n      *set flame_torch 1\n      *set name_source_light \"torch\"\n      *goto crypt_choice      \n\n  #Quickly walk across the room and exit through the other room\n     Feeling a strong sense of uneasiness you quickly walk across the room and exit through the other door, \n     breathing a sigh of relief when you finally open the door. Behind it there is another stone corridor, looking very similar to the one you came through. \n     However, looking at the coffins you think that maybe your fears were actually unfounded, and something in them could help you figure out what is going on around here. \n     *choice\n        #Leave the coffins alone, close the door behind you and walk on\n           *goto right_corridor\n           \n        #Open one of the coffins to see what is inside\n            *goto open_coffin\n           \n  #Open one of the coffins to see what is inside\n     *set discovered_minions 1\n     *label open_coffin\n     *if employer_he = \"he\" \n \n          You push to one side the cover of the coffin and when you look inside you find the figure of a pale beautiful woman with long dark hair, \n          dressed in a revealing red dinner dress. She looks dead, but suddenly opens her eyes and sits up, smiling at you.          \n          *goto vampire_talk\n          \n     *else \n          You push to one side the cover of the coffin and when you look inside you find the figure of a pale handsome man with a well-trimmed beard and short hair, \n          dressed in an elegant tuxedo. He looks long dead, but suddenly opens his eyes and incorporates himself, smiling at you.        \n          *label vampire_talk\n          A mixture of fear and adrenalin rushes through you as you see ${minion_his} sharp canine teeth. \"Now, what do we have here? \n          Nobody told me that we were having any guests for dinner...\"\n          \n          With a quick jump ${minion_he} gets out of the coffin, and starts walking towards you, \n          while you see how ${minion_his} nails start to get longer and the redness in ${minion_his} eyes increases. You have little doubt that you are facing a vampire,\n          and you doubt ${minion_he} wants to be your friend.\n          *label choice_minion_fight\n          *if vampire_hits >1\n          \n              Tired and hurt after so much punishment you are not quick enough to dodge ${minion_him} as ${minion_he} approaches you with lightning speed, \n              before you have time to react. \n              With one hand ${minion_he} grabs both of your arms above your body, while ${minion_his} sharp teeth descend into your neck. You feel a sharp pain, \n              followed by a pleasant feeling, akin to the tender kiss of a lover.\n              \n              *set health %-50              \n              *goto bad_end              \n          *else          \n           *fake_choice\n             *if (have_weapon >0) #Attack ${minion_him} with your ${weapon}    \n                 *if weapon = \"knife\"\n                    You launch forward and stab ${minion_him} with the knife, which gets caught in ${minion_his} abdomen, \n                    though it does not appear to have any effect. Still smiling, like a cat playing with a mouse, \n                    ${minion_he} slaps you with the back of ${minion_his} hand, which sends you flying back through the air several metres until you hit a wall. \n                    Badly bruised you curse your stupidity, as you can never remember any stories of people fighting vampires with knives.  \n                    *set have_weapon 0                    \n                    *set health %-30\n                    *set vampire_hits +1\n                    *goto choice_minion_fight\n                    \n                 *if weapon = \"rolling pin\"\n                    You launch forward and hit ${minion_him} in the head with the rolling pin, \n                    though it does not appear to have any effect. Still smiling, like a cat playing with a mouse, \n                    ${minion_he} slaps you with the back of ${minion_his} hand, which sends you flying back through the air several metres until you hit a wall. \n                    Badly bruised you curse your stupidity, as you can never remember any stories of people fighting vampires with rolling pins.  \n                    *set have_weapon 0                    \n                    *set health %-30\n                    *set vampire_hits +1\n                    *goto choice_minion_fight\n                    \n                 *if weapon = \"wooden spear\"\n                    You launch forward and strike ${minion_him} with the wooden spear, aiming for ${minion_his} heart. The smile on ${minion_his} face quickly vanishes, \n                    and is replaced by a look of agony. Trying to defend itself, the vampire strikes the spear in desperation and breaks it into two pieces, \n                    while foam starts to spurt from ${minion_his} mouth. \n                    Seconds later ${minion_his} skin starts to turn grey, and shortly after ${minion_he} disintegrates into a pile of dust. \n                    Your spear is now broken, but you suppose you still have a good stake that can be used to kill any other vampires.\n\n                    With that thought in your head you turn to the other coffin, and push aside the other cover to reveal another vampire, \n                    who opens ${minion_his} eyes and stares at you. Before ${minion_he} has time to react, you thrust the stake into ${minion_his} heart,\n                    turning ${minion_him} into dust as well. You recover the stake, which you feel might yet come in handy, \n                    and turn to the door. At the other side there is another corridor, similar to the one you just came through, \n                    and you guess you have little choice but to see where it takes you. \n                    \n                    *achieve killed_minion\n                    *set killed_minions 1\n                    \n                    *set weapon \"stake\"\n                    *set body %+10\n                    *set soul %+5                    \n                    *goto right_corridor\n                    \n             *if (have_holy_book >0) #Take out your copy of the ${holy_book} and use it to keep ${minion_him} at bay\n                *if soul >60 \n                   The smile on the vampire's face vanishes, and stops advancing towards you. \"That book will not protect you from me forever, you know?\"\n                   Perhaps ${minion_he} is correct, but at the moment it allows you to keep ${minion_him} at bay long enough to reach the door and leave the room, \n                   hoping that ${minion_he} will not follow you for the time being until you figure out what to do next. \n                   The door leads you into another corridor, and you run as fast as you can to put as much distance between you and ${minion_him}.\n                   *achieve escaped_minion\n                   *set escaped_minions 1\n                   *goto right_corridor                   \n                *else \n                    Still smiling, the vampire kicks you on the stomach, sending you flying back through the air several metres until you hit a wall.\n                    \"You know, a ${holy_book} can only really be a weapon for somebody that has a strong soul, and yours is weak. Too bad for you, \n                    though I do like meals that put up a fight...\"                    \n                    Badly bruised you curse your stupidity, and try to figure out what to do next. \n                    *set have_weapon 0                    \n                    *set health %-30\n                    *set vampire_hits +1\n                    *goto choice_minion_fight                \n             \n             *if (rosary >0) #Take out your rosary and use it to keep ${minion_him} at bay\n                *if soul >60 \n                   The smile on the vampire's face vanishes, and stops advancing towards you. \"That stupid talisman will not protect you from me forever, you know?\" \n                   Perhaps ${minion_he} is correct, but at the moment it allows you to keep ${minion_him} at bay long enough _surname} eyes turn bright red, as ${employer_his} finger nails start to grown in size, and features become less human. \"You seriously think you are a match for me, \n           puny human? But, I like blood with much adrenalin in it, such a delicious after-taste!\"\n           *goto final_battle_fight\n           \n         #\"Wait, I'm sure we can figure something out here. I'm actually not from here, and to be honest this is all just in a story in a book\"\n           ${employer_Mr} ${employer_surname} looks amused by what you are saying, though seconds later ${employer_his} eyes turn bright red, as ${employer_his} finger nails start to grow in size, \n           and ${employer_his} features become less human. \"Ah, shame, you are a talker, and there was me thinking you would put up a bit of a fight...\"\n           *goto final_battle_fight           \n           \n  \n*label final_battle_fight\nWith that, ${employer_Mr} ${employer_surname} starts advancing towards you, clearly indicating that you are not going to get out of this without a fight.  \n\n*label final_battle_choice\n \n*if vampire_hits >1\n          \n    Tired and hurt after so much punishment you are not quick enough to dodge ${employer_Mr} ${employer_surname} as ${employer_he} approaches you with lightning speed, \n    before you have time to react. \n    With one hand ${employer_he} grabs both of your arms above your body, while ${employer_his} sharp teeth descend into your neck. You feel a sharp pain, \n    followed by a pleasant feeling, akin to the tender kiss of a lover.\n              \n    *set health %-50              \n    *goto bad_end              \n\n*else          \n*fake_choice\n\n             *if (final_battle_pause =1) #Go and see if there is anything in the wooden chest you could use                  \n                Without losing sight of ${employer_Mr} ${employer_surname} you dash towards the chest and open it, revealing Angelica's personal affairs, consisting of a smart phon ith your torch                    \n                    You start to thrust the torch in front of you in quick motion, to dissuade the vampire from approaching any closer. Clearly, \n                    this presents a problem for ${employer_him}, as ${employer_his} eyes narrow slightly, visibly annoyed. \n                    *if body >70 \n                        Suddenly you spring forward and thrust the torch into ${employer_his} clothes, which catch fire surprisingly quickly. \n                        Screaming, ${employer_he} starts to tumble around the room, \n                        until eventually ${employer_he} collapses in the floor and stops moving, disintegrating into a pile of black dust.\n                        *goto win_final_fight                       \n                    *else\n                        Suddenly you spring forward and thrust the torch at ${employer_him}, though ${employer_he} quickly steps to one side and punches you on the face, \n                        sending you several metres back in the air, while ${employer_he} kicks the torch to the other side of the room. \n                        *set source_light 0\n                        *set flame_torch 0\n                        *goto final_battle_choice\n\n             *if (garlic_chips > 0) #Take out the packet of garlic chips and throw some at ${employer_him}\n\n                   The smile on ${employer_Mr} ${employer_surname} vanishes, and stops advancing towards you, \n                   with the twist in ${employer_his} nose indicating ${employer_his} disgust at the odour. \"That putrid smell, aggghhhh!!\"\n                   This has given you a few extra moments to think, and you notice that there is half-broken wooden chair in one side of the room, and a small wooden chest on the other side. \n                   You quickly realise that it would probably only take a small kick to break one of the legs of the chair, \n                   which give you a small wooden stake with which you could attack ${employer_Mr} ${employer_surname}. However, maybe the chest could have in it something that you could use against ${employer_him}.\n  \n                   *set final_battle_pause 1\n                   *set mind %+10                   \n                   *goto final_battle_choice  \n\n             #Turn your back and run away                   \n                You turn around and prepare to flee, but with lightning speed ${employer_he} catches up with you, \n                grabbing with one hand grabs both of your hands above your body, while ${employer_his} sharp teeth descend into your neck. You feel a sharp pain, \n                followed by a pleasant feeling, akin to the tender kiss of a lover. \n                *goto bad_end \n \n  \n*label win_final_fight \n  \n*achieve killed_master  \n  \nExhausted, you collapse on the floor for a few seconds to catch your breath. A couple of minutes later you hear a sound coming from Angelica on top of the pedestal.\nSuddenly, she opens her eyes and slowly turns around, looking very weak. \n\n\"${name}, what happened? ${employer_Mr} ${employer_surname} brought me here, and then... ${employer_his} face turned into something else, \nsharp teeth and evil red eyes. I cannot remember anything after, but my entire body hurts as if a car had driven over me!\"  \n\nYou look at her for any signs that she might have turned into a vampire. She looks very pale, \nbut you are not sure whether ${employer_Mr} ${employer_surname} somehow didn't have the time to kill her, \nor she has turned into a vampire but somehow still doesn't know what has happened. \nIn any case, it's probably better to deal with that later, as you have more pressing things to think about. \n\n*choice\n\n   #\"Yes, I am afraid that ${employer_Mr} ${employer_surname} was a vampire, but I put an end to that. We better get out of here and burn the entire place down\"\n\n     *goto leave_and_torch\n   \n   #\"Yes, you should take more care of who you work for next time. Let's burn this place down and get out of here\"   \n      *label leave_and_torch\n      *set relationship_secretary %+10      \n      Angelica nods. \"Thanks, I guessed you saved me, so I owe you my life.\" \n      She picks up her affairs and you both quickly head back to the main body of the building, torch in hand. \n      \n      *if escaped_minions >0\n         Knowing that the other vampires could find you proceed to set fire to any flammables that you find on your way, \n         and by the time you reach the main door most of the building is in flames. \n         *goto drive_car         \n\n      *else\n         Worried that ${employer_Mr} ${employer_surname} could have other allies you proceed to set fire to any flammables that you find on your way, \n         and by the time you reach the main door most of the building is in flames. \n         *goto drive_car       \n\n*label drive_car\n\nAngelica gets in the driver seat of the Bentley, takes the keys out from her purse and turns the ignition, giving you just enough time to get into the passenger seat. \nMinutes later you are far away, speeding along the road while the heavy rain pounds the surface of the car, as you ponder what to do with Angelica. \nShe looks visibly frightened and very weak, \nso maybe she has not really turned. Having said that, if she has turned it might not be long before she needs food, \nand you would appear to be the only source available in the area. \n\n*choice\n\n   #\"Angelica, are you feeling ok?\"\n      She looks at you, her pale face and frightened eyes visibly showing signs of stress. \"Not really. My employer was a vampire and just tried to kill me, \n      it hasn't really been my best day!\" Looking ahead you can vaguely see through the rain that there is a sharp turn, and shout to her. \"Watch out for the curve!\"\n      \n      *goto car_skids\n      \n   #\"Angelica, maybe it would be better to stop the car, we need to talk\"\n\n      She looks at you, her pale face and frightened eyes visibly showing signs of stress. \"Stop?! are you crazy? \n      I'm not stopping until we are really far from that bloody place!!\" \n      Looking ahead you can vaguely see in the rain that there is a sharp turn, and shout to her. \"Watch out for the curve!\"\n\n      *label car_skids\n      \n      Angelica turns to look at the road and turns the wheel to one side, \n      but its too late and the car skids on the wet surface and flies off the road into the dense vegetation. Fortunately you do not hit any trees, \n      and after a few dozen metres you finally grind to a halt. At this point she bursts into tears, \n      the emotions of the day completely overcoming her.   \n      \n      She then starts to scream and punches the steering wheel, the tears and violence highlighting the intense stress she is under. \n      She turns to look at you, \n      but her face has changed. Her features have become sharper, her eyes now have a red shade to them, \n      and you notice she is looking at your neck. Suddenly she screams, opens the door of the car and jumps outside into the pouring rain. \n      *goto outside_car\n\n*label outside_car\nNot knowing what to do you also step outside and within a couple of seconds you are completely drenched. The lights of the car illuminate a harrowing scene, \nwith Angelica kneeling in the muddy ground, looking at you with her blood stained eyes and long teeth and nails. \"What has happened to me?\"\n\n*choice\n\n   #\"You're a vampire now. I'm afraid I'm going to have to kill you...\"\n      Angelica looks scared as you say this, clearly not knowing what is happening to her. \n      You doubt it will be very difficult to overcome her in her present weak state, \n      and pick up what looks like a sharp piece of wood that was broken off a tree by the car, as you approach her.\n      *set relationship_secretary %-30\n      *goto finish      \n      \n   #\"I'm afraid that you might be a vampire now, but these days you might not have to kill people to live\"\n      Angelica looks scared as you say this, clearly not knowing what is happening to her, and collapses to the ground sobbing.       \n      *goto finish\n   \n*label finish\n\n*if (stories_completed \u003c 1)\n\n   Seconds later, Angelica turns around and starts digging around in the vegetation until she finds something, and turns towards you with some sort of strange massive laser rifle. \n   You are quite surprised when she fires a laser ray at the car, cutting it in half. Her eyes look completely white, \n   and it would seem that something or somebody has taken control of her. She starts to operate something on the laser rifle, \n   and you realize she could be preparing to fire again. \n   *goto choice_fight_angelie\n\n*else\n\n   Seconds later, Angelica turns around and starts digging around in the vegetation until she finds something, and turns towards you with some sort of strange massive laser rifle. \n   You are quite surprised when she fires a laser ray at the car, cutting it in half, making you wonder if this is one of those macguffins that makes characters go crazy. \n\n   Her eyes look completely white, and it's clear that the macguffin has somehow taken control of her. She starts to operate something on the laser rifle, \n   and you realize she could be preparing to fire again. \n   *goto choice_fight_angelie   \n   \n*label choice_fight_angelie\n    \n*choice\n\n          #Run towards her and wrestle the laser rifle away from her\n            *if body >= 70\n              You run towards her and grab the rifle away before she has the chance to react. In her weakened state she is not really much of a challenge for you, \n              and without much effort you snatch the rifle and push her back against the ground. \n              \n              *goto good_end\n\t\t\t  \n            *else\n              You run towards her and grab the rifle away before she has the chance to react. However, \n              you realize that now that she has turned into a vampire she is actually quite strong, and with one push of her hand she sends you flying back against a bush.  \n              Seconds later she aims at you and pushes the trigger again. \n               \n              *goto bad_end\n\n          #Run and hide away along the vegetation, and then jump on her when she least expects it and grab the laser rifle\n             *if mind >= 60\n                You jump into the thick vegetation and run for a few seconds until you find a large tree behind which you can hide. \n                Angelica follows you, though the thick rain makes it difficult for her to see where you have gone, and walks pass you without noticing that you are beside her. \n                You use this opportunity to grab the laser rifle away from her, before she has any time to react. \n\n                *goto good_end\n             *else\n                You jump into the thick dense vegetation and run for a few seconds until you find a large tree behind which you can hide. \n                Angelica follows you, though it's clear that your trick did not work on her, and her next shot pierces through the tree trunk, leaving a large hole in your torso. \n                You gasp in shock and fall on the ground clutching your chest.  \n\n                *goto bad_end\n\n          *if (have_holy_book >0) #Take out your copy of the ${holy_book} and walk towards her \n              *if soul >55\n                Angelica steps back at the sight of the ${holy_book} and lowers her laser gun, which gives you enough time to snatch it away from her.               \n                *goto good_end             \n              *else\n                However, this does not seem to produce any effect on her... maybe your soul or convictions aren't strong enough? As you wonder why nothing happens, Angelica fires another shot at you, \n                which pieces through your torso and sends you flying back against a tree.\n                *goto bad_end\n\n          *if (rosary >0) #Take out your rosary and walk towards her \n              *if soul >55\n                Angelica steps back at the sight of the rosary and lowers her laser gun, which gives you enough time to snatch it away from her.               \n                *goto good_end             \n              *else\n                However, this does not seem to produce any effect on her... maybe your soul or convictions aren't strong enough? As you wonder why nothing happens, Angelica fires another shot at you, \n                which pieces through your torso and sends you flying back against a tree.\n                *goto bad_end                \n\n\n\n*label good_end\n*set mansion true\n*set stories_completed +1\n*set mind %+10\n\nThen the world turns white, like a blank page, and you find yourself standing in the bookshop, holding a piece of paper that looks like it was torn out of a book, with a picture of a laser rifle on it.\n*goto_scene bookshop_scenes\n\n*label bad_end\nThen the world turns white, like a blank page, and you find yourself sitting  on the bookshop floor in the real world, still shaking from what happened, but otherwise alive and well.\n*goto_scene bookshop_scene_fail\n\n\n", "adrao_tale": "\n\n*set body_name \"Reflexes\"\n*set mind_name \"Wit\"\n*set soul_name \"Charisma\"\n\n*temp navigator_voice \"deep\"\t\t   \n*temp navigator_age_20s \"30s\"\t\t   \n*temp navigator_male \"male\"\t\t   \n*temp navigator_constitution \"stocky\"\n*temp navigator_hair \"short dark\" \n*temp navigator_eyes \"brown\"\n*temp navigator_shirt \"bright orange\"\n*temp navigator_trousers \"dark brown\"\n\n\n*temp navigator_salute2 \"Well, boss\"\n\n*temp navigator_swear2 \"flippin'\"\n*temp navigator_swear2_plural \"bloody\"\n*temp navigator_insult1 \"bastard\"\n*temp navigator_insult1_plural \"bastards\"\n*temp navitator_word_seems \"looks\"\n*temp navigator_expression_surprise \"Bloody hell\"\n*temp navigator_expression_combat_round1 \"Seems like they don't wanna give up on us... \"\n*temp navigator_expression_combat_round2 \"Seems like this is really lasting too long, we need to shake them off!!\"\n*temp navigator_expression_feeling_ok \"Are you feeling ok?\"\n*temp navigator_expression_bad_feeling \"I have a bad feeling about this...\"\n\n*temp navigator_personality \"serious\"\n\n*temp navigator_relationship 50\n*temp navigator_world 90\n*temp navigator_car 90\n*temp navigator_shooting 50\n\n*temp Speedy 0\n*temp Speedy_gives_Belfair_info 0\n*temp Crystal 0\n\n*temp money 100\n*temp alert_level 0\n*temp combined_fight 0\n*temp tickets 0\n*temp temprelationship false\n\n*if not (adrao_started)\n   *goto intro\n*if (adrao_started)\n\n   You open your eyes very slowly, against a very intense light. Somehow you're starting to get used to this initial feeling of disorientation. \n   This time the colors feels very white, and you find yourself once again in the familiar setting of a hospital, with a myriad of electronic devices attached to your body. \n   At least, you feel it is familiar, as your memories of the place are just outside your reach. \n\n   A woman, wearing surgical white doctor overalls, approaches the table on which you are lying, and turns the light away from your face \"Feeling better, Lieutenant ${name}?\"\n   You raise an eyebrow, and look at the doctor. There is a strong feeling of deja vu around all this, yet she doesn't act as if she's talked to your ever before. \n   \"Lieutenant ${name}?\"\n\n   She smiles at you and pats you on the shoulder. \"Must be the strong blow you took to the head yesterday. Don't worry, your memories will come back soon.\"\n   Somehow this doesn't sound correct, and you wonder whether it isn't the book that has also reset your memories, as you have the vague feeling you have read this story before. \n\n   *goto continue_story\n\n\n\n*label intro\n\n*if (stories_completed \u003c 1)\n    You open your eyes very slowly, against a very intense light. \n    It's wrong. Even at the brightest day of year uncle Irwin's library room wouldn't be this bright. \n    Something feels wrong about the colors, too white, everything too sterile.     \n    Could this be a hospital?\n    *goto start_story\n    \n*elseif (stories_completed \u003c 3)\n    You open your eyes very slowly, against a very intense light. Somehow the feeling is slightly similar to the first time you opened the book, \n    yet this time the colors feel too white, and everything feels too sterile.      \n    Could this be a hospital?\n    *goto start_story\n    \n*else \n    You open your eyes very slowly, against a very intense light. Somehow you're starting to get used to this initial feeling of disorientation. \n    This time the colours feels very white, sterile.      \n    Could this be a hospital?\n    *goto start_story\n    \n*label start_story\n* set adrao_started true\n\nA woman, wearing surgical white doctor overalls, approaches the table on which you are lying, and turns the light away from your face \"Feeling better, Lieutenant ${name}?\"\nYou stand up from what looks like some sort of operating table and look around at a myriad of holographic screens. They seem to be displaying information about some human body, \njudging from the electrodes and other wireless measuring devices attached to your skin. \n\nYou raise an eyebrow, and look at the doctor. \"Lieutenant ${name}?\" Your voice trembles as you repeat the rank, which sounds unfamiliar in your ears, even though the doctor acts like it belongs to you. \nShe smiles at you and pats you on the shoulder. \"Must be the strong blow you took to the head yesterday. Don't worry, your memories will come back soon.\"\n\n*if (stories_completed \u003c 1)\n    You look at her bewildered. What actually just happened? Were you somehow drawn into the book you placed on the reading stand, or something? \n    But, if so what actually has happened? Did you somehow jump into it half-way? And how is it possible that they know you? \n    \n    Seconds later the nurse turns around and exits the room, leaving you in a state of utter confusion as to what to do next. \n    *goto continue_story\n*if (stories_completed >= 1)\n    With that, she turns around and exits the room, leaving you confused as to what kind of story you have found yourself in. \n    Did you somehow jump into it half-way? Otherwise, how is it possible that they know you?\n    *goto continue_story\n    \n    \n*label continue_story    \n*page_break\n\nYou start detaching the measuring devices and notice that you seem to be wearing some sort of green hospital clothes. However, somehow you feel different, your vision is sharper, much more focused. \nYou can see very small details in objects, and your hearing also appears much more tuned than normal. \n*if (stories_completed \u003c 1)\n    Could it be possible that the book even has the power to alter your own body?\n*if (stories_completed >= 1)\n    What has this story done to your body?\n\nNot knowing what to do next, you look around and see some clothes in a corner of the room, which would appear to be your size. Could they actually belong to you in this story? \nThey look rather odd, having been designed with a sense of fashion that must be attuned to this story. \nYou decide to put them on, and, just as you finished doing so, a red flashing light appears on your wrist. \n\n*choice \n\n   #Shake your hand, to see if the light stops\n       You attempt to shake your hand to see if your wrist stops flashing, but as you do so a holographic image projects from the palm of your hand, showing a middle-age man in some sort of uniform. \n       There must be some sort of device implanted in it, making you wonder what other alterations this story has made to your body. \t   \n\n       *goto holographic_message\n\t   \n   #Touch your wrist, to see what is happening \n\n       Puzzled, you touch your wrist, and as you do so a holographic image projects from the palm of your hand, showing a middle-age man in some sort of uniform.\n       There must be some sort of device implanted in it, making you wonder what other alterations this story has made to your body.\t   \n\n       *label holographic_message\t   \n\t   \n       \"Ah, ${name}, there you are, I see that you appear to have recovered from yesterday’s little fiasco...\n       Anyway, following an \"interrogation\" of that scum-bag you apprehended, we have a new lead on the case of that new drug that is floating about...\n       Apparently, there is a man that calls himself Alexandros Doll in that dirt-hole the non-ups call Shibuwata city. I suggest you try to find him and see if we can settle this matter once and for all!”\n\n       You tense up as the man in uniform says this, as it would appear that whoever this Alexandros Doll is, he could be connected to this book's main storyline.\n       This holographic projection could somehow be your superior, though you still rather confused by what is actually going on.        \n\t   \n*choice\n\n   #\"Yes, of course, Sir, consider it done...\"\n   \n     The holographic figure smiles. \"I knew I could count on you, ${name}, though, listen, you are going to need a new partner...\n     Johnson is still in surgery. They're building him some new legs. He got off worse than you. \n     There are a few agents available you can choose from, so I'll be sending you their profiles now. They're all around the hospital so you can get moving asap!\"\n\n     *goto choose_partner\t \n   \n   \n   #\"Um... Sir, I am having some trouble with my memory. The doctor said I got a blow to the head yesterday?\"\n   \n     The holographic figure smiles. \"Yes, you took quite a beating. Well, either that or some bloody loose medical nanobots are still working on your brain... But, never mind. Listen, you are going to need a new partner.\n     Johnson is still being operated on. They are building him some new legs, he got off worse than you. \n     There are a few agents available you can choose from, so I'll be sending you their profiles now. They're all in the vecinity of the hospital so you can get moving ASAP!\"\n\t \n     *goto choose_partner\n\n   #\"Errrr... Well, actually, I think I might not actually belong around here, like, I'm from a different world\"\n   \n     The holographic figure looks surprised. \"Ok, the doctor did say you took a big blow to the head. Well, either that or those medical nanobots are still working on your brain... Anyway, don't you worry, you will feel better soon.\"\n     Clearly, it doesn't look as if he is  going to believe you, so it seems you might have to play along until you realize what is actually going on. \t \n\n     The holographic figure continues, obviously unaccustomed to receiving strange answers. \"Anyway, listen, you are going to need a new partner.\n     Johnson is still being operated on. They are building him some new legs, he got off worse than you. \n     There are a few agents available you can choose from, so I'll be sending you their profiles now. They're all around the hospital so you can get moving asap!\"\n\t \n     *goto choose_partner\t \n         \n\n\t\t   \n\t \n*comment =========================================================================================================================================================================================================================\n\t \n\t \n*label choose_partner\t \n\nWith that, the holographic image changes to a display of several portraits of men and women in uniform, with a variety of information displayed next to them. A flashing message appears above them reading \"Select partner\"\n\t \n \n\n*choice\n\n    #Tiziana Andrews, a thin officer known to be one of the best drivers around and a decent shooter. She appears to be a rather social character, who is often the heart of the party, yet who seems to think about that more than about solving cases \n\t\n           *set navigator_name \"Tiziana\"\n           *set navigator_his \"her\"\n           *set navigator_him \"her\"\n           *set navigator_he \"she\"\n\n           *set navigator_voice \"high\"\t\t   \n           *set navigator_age_20s \"40s\"\t\t   \n           *set navigator_male \"female\"\t\t   \n           *set navigator_constitution \"thin\"\n           *set navigator_hair \"short brown\" \n           *set navigator_eyes \"green\"\n           *set navigator_shirt \"leather jacket\"\n           *set navigator_trousers \"leather trousers\"\n\t\n           *set navigator_salute1 \"Oi\"\n           *set navigator_salute2 \"Hey\"\n           *set navigator_swear1 \"flippin'\"\n           *set navigator_swear2 \"flippin'\"\n           *set navigator_swear2_plural \"unbearable\"\n           *set navigator_insult1 \"idiot\"\n           *set navigator_insult1_plural \"idiots\"\n           *set navitator_word_seems \"seems\"\n           *set navigator_expression_surprise \"For Heaven's sake!\"\n           *set navigator_expression_combat_round1 \"Those idiots don't know when they are out of their league!\"\n           *set navigator_expression_combat_round2 \"Ok, it's time that we really finish these idiots off!\"\n           *set navigator_expression_feeling_ok \"Are you feeling ok?\"\n           *set navigator_expression_bad_feeling \"Something tells me something is not right around here... \"\n\t\t   \n           *set navigator_personality \"playful\"\n           *set navigator_relationship 50\n           *set navigator_world 25\n           *set navigator_car 90\n           *set navigator_shooting 70 \n\n           *goto description_navigator\n\n \n    #Rebecca McLellan, an aggressive and tall officer, known as one of the best shooters in the area. She is also well versed in field operations, though apparently a pretty poor driver\n\t\n           *set navigator_name \"Rebecca\"\n           *set navigator_his \"her\"\n           *set navigator_him \"her\"\n           *set navigator_he \"she\"\n\n           *set navigator_voice \"harsh\"\t\t   \n           *set navigator_age_20s \"30s\"\t\t   \n           *set navigator_male \"female\"\t\t   \n           *set navigator_constitution \"tall\"\n           *set navigator_hair \"long blonde\" \n           *set navigator_eyes \"blue\"\n           *set navigator_shirt \"black leather jacket\"\n           *set navigator_trousers \"green trousers\"\n\t\n           *set navigator_salute1 \"Boss\"\n           *set navigator_salute2 \"Mmmmm, boss\"\n           *set navigator_swear1 \"bloody\"\n           *set navigator_swear2 \"bloody\"\n           *set navigator_swear2_plural \"bloody\"\n           *set navigator_insult1 \"son of a bitch\"\n           *set navigator_insult1_plural \"bastards\"\n           *set navitator_word_seems \"looks\"\n           *set navigator_expression_surprise \"Bloody Hell!\"\n           *set navigator_expression_combat_round1 \"Those bastards don't want to leave us alone!\"\n           *set navigator_expression_combat_round2 \"Do something! They are getting closer!\"\n           *set navigator_expression_feeling_ok \"For Hell's sake, you feeling ok?\"\n           *set navigator_expression_bad_feeling \"Hell's dogs, I have a bad feeling about this...\"\t\t   \n\t\t   \n           *set navigator_personality \"aggressive\"\n           *set navigator_relationship 50\n           *set navigator_world 65\n           *set navigator_car 25\n           *set navigator_shooting 90\n\n           *goto description_navigator\n\n \n \n   #John Loftus, a rather intelligent and serious with many years of experience and a wide knowledge of field operations, though a pretty poor driver and mediocre shooter\n\t\n           *set navigator_name \"John\"\n           *set navigator_his \"his\"\n           *set navigator_him \"him\"\n           *set navigator_he \"he\"\n\n           *set navigator_voice \"monotonous\"\t\t   \n           *set navigator_age_20s \"50s\"\t\t   \n           *set navigator_male \"male\"\t\t   \n           *set navigator_constitution \"thin\"\n           *set navigator_hair \"brown\" \n           *set navigator_eyes \"brown\"\n           *set navigator_shirt \"blue shirt\"\n           *set navigator_trousers \"navy blue trousers\"\n\n           *if he = \"he\"\t\t   \n              *set navigator_salute1 \"Sir\"\n              *set navigator_salute2 \"Well, Sir\"\n              *goto continue_John\n           *elseif he = \"she\"\n              *set navigator_salute1 \"Ma'am\"\n              *set navigator_salute2 \"Well, Ma'am\"\n              *goto continue_John\n           *else\t   \n              *set navigator_salute1 \"Boss\"\n              *set navigator_salute2 \"Well, boss\"\n              *goto continue_John\t\t   \n           *label continue_John\t\t   \n           *set navigator_swear1 \"bloody\"\n           *set navigator_swear2 \"bloody\"\n           *set navigator_swear2_plural \"damn\"\n           *set navigator_insult1 \"person\"\n           *set navigator_insult1_plural \"people\"\n           *set navitator_word_seems \"seems\"\n           *set navigator_expression_surprise \"Now, that is something you don't see often!\"\n           *set navigator_expression_combat_round1 \"Well, it seems these people really do not like us at all...\"\n           *set navigator_expression_combat_round2 \"It would seem these people have grown rather fond of us!\"\n           *set navigator_expression_feeling_ok \"Seems like we are not doing so well?\"\n           *set navigator_expression_bad_feeling \"Now, all this seems rather odd, something doesn't quite fit around here... \"\n\t\t   \n           *set navigator_personality \"serious\"\n           *set navigator_relationship 50\n           *set navigator_world 90\n           *set navigator_car 40\n           *set navigator_shooting 50\n\n           *goto description_navigator\n\n \n   #Ricardo Gutierrez, a rather aggressive stocky man who appears to be a decent shooter, though he has limited knowledge of the area as he was transferred from another city. His main hobby appears to be car racing.\n\t\n           *set navigator_name \"Ricardo\"\n           *set navigator_his \"his\"\n           *set navigator_him \"him\"\n           *set navigator_he \"he\"\n\n           *set navigator_voice \"deep\"\t\t   \n           *set navigator_age_20s \"30s\"\t\t   \n           *set navigator_male \"male\"\t\t   \n           *set navigator_constitution \"stocky\"\n           *set navigator_hair \"short dark\" \n           *set navigator_eyes \"brown\"\n           *set navigator_shirt \"bright orange shirt\"\n           *set navigator_trousers \"dark brown trousers\"\n\n           *if he = \"he\"\t\t   \n              *set navigator_salute1 \"Boss\"\n              *set navigator_salute2 \"Bueno, jefe\"\n              *goto continue_Ricardo\n           *elseif he = \"she\"\n              *set navigator_salute1 \"Boss\"\n              *set navigator_salute2 \"Bueno, jefa\"\n              *goto continue_Ricardo\n           *else\t   \n              *set navigator_salute1 \"Boss\"\n              *set navigator_salute2 \"Bueno, jefe\"\n              *goto continue_Ricardo\t\n           *label continue_Ricardo\n           *set navigator_swear1 \"bloody\"\n           *set navigator_swear2 \"bloody\"\n           *set navigator_swear2_plural \"bloody\"\n           *set navigator_insult1 \"cabron\"\n           *set navigator_insult1_plural \"cabrones\"\n           *set navitator_word_seems \"looks\"\n           *set navigator_expression_surprise \"Que mierda!\"\n           *set navigator_expression_combat_round1 \"Parece que quieren jodernos de verdad!\"\n           *set navigator_expression_combat_round2 \"Malditos cabrones, no se van!\"\n           *set navigator_expression_feeling_ok \"Todo bien? Feeling ok?\"\n           *set navigator_expression_bad_feeling \"Algo aqui huele mal, something feels wrong around here...\"\n\t\t\t\t\t  \n           *set navigator_personality \"aggressive\"\n           *set navigator_relationship 50\n           *set navigator_world 25\n           *set navigator_car 90\n           *set navigator_shooting 65\n\n           *label description_navigator\n\t\t   \n           You select the image of ${navigator_name}, which flashes and then dissipates. Seconds later, your wrist starts to flash again, though you now have an idea how to answer it. \n           The holographic image of ${navigator_name} addresses you. \"Nice to be able to work with you! ${navigator_salute1}, heard you got a bit of a hit to the head, \n           those ${navigator_swear2_plural} ${navigator_insult1_plural}! Just give me a few minutes and I'll be there!\"\n\n           With little else to do, you spend the next few minutes examining the rest of the objects that came along with the clothes: a rather impressive and stylish laser gun, and a backpack filled with a multitude of objects. \n           Most of them seem rather odd to you, though you are relieved to find your radio. There is also a small stack of what looks like silver coins, with a dollar sign inscribed in one side. \n           They feel rather nice, if a little bit worn, and you count 100 of them in total. You then turn to look at the screens, at which point the door of the room opens. \n\t\t   \n           Through it walks a ${navigator_constitution} ${navigator_male}. Turning to face you, you quickly notice that ${navigator_he} is a rather impressive person, \n           with intense ${navigator_eyes} eyes and ${navigator_hair} hair. The style of ${navigator_his} clothes is rather different than yours, as ${navigator_he} is wearing a ${navigator_shirt} and ${navigator_trousers}.  \n           As ${navigator_he} speaks to you, you notice how ${navigator_personality} and ${navigator_voice} ${navigator_his} voice sounds. \n           \"${navigator_expression_surprise} For somebody that took quite a beating you actually don't look that bad at all! Those doctors really can work miracles!\"\n\n           *goto choice_personality\n\n\t\t   \n*comment =========================================================================================================================================================================================================================\n\n\n*label choice_personality\t\t   \n\t\t   \t\t   \n*choice\n    #\"Well, you know, they battered my body, but my brain is still as good as ever... Though they do say I've lost a few memories. Maybe you can guide me for a while until I recover them?\"\n        *set mind %+10\n        *if (navigator_personality = \"serious\")\n           *set navigator_relationship %+20\n           ${navigator_name} looks you straight in the eyes. \"Sure. You have always been known as one of the sharpest minds 'round here! Anyway, let's get out of this place!\"\n           *goto exit_hospital\n        *else\n           *set navigator_relationship %-5\n           ${navigator_name} looks you straight in the eyes. \"${navigator_salute2}, whatever you say! Let's get out of here...\" \n           *goto exit_hospital\t\t\n       \t\t\t\n    #\"Well, they can break your mind, your body, but they will never break your spirit! It does seem that the only thing not working properly is my brain, so maybe you could guide me while I recover my memory?\"\n        *set soul %+10\n        *if (navigator_personality = \"playful\")\n           *set navigator_relationship %+20\n           ${navigator_name} looks at you while ${navigator_he} smiles. \"Indeed it is still you, they say you are one of those true forces of nature, the soul of the department! Anyway, let's get out of here...\"\n           *goto exit_hospital\n        *else\n           *set navigator_relationship %-5\n           ${navigator_name} laughs as you say this. \"${navigator_salute2}, whatever you say! Let's get out of here...\" \n           *goto exit_hospital\n\t\t\t\t\n    #\"Well,
