ee a black-clad woman running at you, but before you fully register two other people in black cresting the hill behind her she throws you to the ground. The savagery of her attack leaves you too shocked to speak. Seconds later, Blanche sprawls full-length beside you, and someone else kicks you in the side.\n\nYou suppress a stab of hysteria and focus on what's directly in front of you. The person who kicked you takes your hand and twists it behind your back. \n\n\"Stay still now,\" he says, with sadistic satisfaction. He presses his palm against yours and for a moment you feel nothing. Then the burning starts and you scream in pain, helplessly wrenching your own arm as you reflexively jerk away.\n\nYou clasp your burned hand in your whole one, and see a blistered 'X' marking your palm. They brand Blanche too. She glares, but doesn't so much as whimper. Nothing ever scares her.\n\n\"First warning,\" says the woman in black, \"which is more than you people deserve. If you're slow to obey an order from me, you'll die.\" She pauses to spit in the direction of the castle. \"But don't worry, we know feelsmiths who'll make you an obedient and loyal fighter for us before it gets dark. If you're lucky, they'll even make you like it. Either way, you'll never see inside the walls of your pathetic little town again. I do believe I'll call you Henran.\"\n\n\"My name is $!{name}.\"\n\n\"Don't worry. That'll be the first thing you forget.\"\n\nYou and Blanche exchange glances. She might be fictional, but you don't want her hurt. And what if you forget Uncle Irwin?\n\nHolding her wrist, Blanche flicks her eyes at the wombat burrow and shakes her head to indicate that she can't climb it fast enough to escape that way. You can't get home without getting rid of the soldiers first.\n*choice\n\t#I manipulate them into releasing us.\n\t\t*set soul %-10\n\t\t\"Did you think it was coincidence that you caught us?\" you say with all the confidence you can muster. \"We were hired to wander this hillside so you could capture us. The sun's almost down—where have you been all day? Sleeping? Drinking? And not a single question about where we come from? Look at us! We're clearly dressed as foreigners, which would be incredibly useful to you, and you were about to mess with our minds and waste all of that. I'll be making a full report on your incompetence, but in the meantime I suggest you do a proper search of this hillside and start preparing an elaborate apology for scarring my hand like the bumbling fool that you are.\"\n\t\t\n\t\tThe woman in black \n\t\t*goto hilly\n\t#I tell them I’m not from this world. \n\t\t*set mind %+10\n\t\t“We’re not even from this world! Just let us go and we'll get out of your way at once.”\n\t\t\n\t\tThe woman in black \n\t\t*goto hilly\n\t#I try flattery in order to get away.\n\t\t*set mind %+10\n\t\t\"I'm so terribly sorry to have caused trouble for you by my own stupidity. We were sent out to look for... herbs... and we went too far. I didn't mean to be disobedient, and it won't happen again.\"\n\t\t\n\t\tThe woman in black\n\t\t*goto hilly\n\t#I fight them.\n\t\t*set body %+10\n\t\tYou twist sideways and kick out the knees of the closest two people, pulling Blanche with you to face the woman in red.\n\t\t\n\t\tShe \n*label hilly\nlowers her sword in response to the sudden change in your demeanor, and the soldiers follow her lead. When her grip on the hilt tightens you know your moment of grace is over. You grab Blanche's uninjured wrist and run downhill towards the town below. Since your attackers hate the town, it's your best chance of safety. \n\nSlipping and sliding on the long grass, your muscles are screaming when you chance a look over your shoulder and see the soldiers coming to a halt. Looking ahead, you see townspeople with bows and arrows perched on top of the town wall. The woman in red doesn't dare come closer. Taking a deep breath, you raise your hands and keep walking. No-one shoots you, but no-one lowers their bow either.\n\nThe gatekeeper checks your palms, and you realize the black-clad soldiers effectively branded you with a free pass into the town. At the touch of his hand, the pain eases. When you gasp at the magic, he grins and says, \"Why yes I am a healsmith. You're welcome.\" He waves an all-clear to the archers. \"I see you've met our new friends. If you've any Nakal-dyed clothing, don't wear it. Black isn't a popular color in town these days.\"\n\n\"Thank you so much,\" says Blanche.\n\nThe gatekeeper smiles, letting you in through a heavily-reinforced side door. \"Oh, and by the way? If our new friends have enlisted you as spies, you should know that I'll hunt you down and kill you myself—slowly. Have a nice day.\"\n\n\"Yes sir,\" you say in unison.\n*page_break\n\nBeyond the spiked portcullis there's a thriving marketplace selling everything from fish to flowers to wooden toothbrushes and... more fish. Although each stall is crowded with wares, every single one has an empty shelf nailed to one side where goods are traded via a curious ritual. The buyer places their item on the shelf and steps back. Then the seller takes it, and lays their item in its place. When the seller moves away again, the buyer takes their purchase. It's as if they're terrified they might accidentally touch one another. \n\nA stallholder freezes partway through taking her payment when she takes in your modern appearance, but after a long pause she finishes the sale and continues her pitch: \"Fishy fishy!\" she yells, at a volume that could strip paint. \"Freshest fishy-fish for the fine foreigners!\"\n\nHer attention draws others to look at you, and children point and giggle at your jeans. You begin to feel uncomfortable with all the attention, so you duck into quieter and quieter streets. Soon you're traveling along a street with a blank stone wall on one side and a row of joined cottages on the other. The blank wall creaks loudly right beside you, and opens to reveal a man carrying a bundle of rags. You smile winningly as he stares in shock at you, keeping him enthralled long enough for Blanche to slip the toe of her shoe into the crack of the door. \n\nFinally the man shakes himself, offers you a shy smile, and walks away. You and Blanche go inside the hidden door, stepping instantly into a long narrow tunnel. It's rectangular in shape, with deep grooves all along the walls and ceiling—as if the stone was clay scooped out by hand. The only light is a faint radiance ahead, and sometimes the outline of a door to your left or right. Not knowing where any of the maze leads, you continue straight ahead. It's too big to be anything but a part of the castle.\n\nYou hear footsteps coming towards you!\n*label footsteps\n*choice\n\t#Call out a casual greeting as if you belong there.\n\t\t*set soul %+10\n\t\t\"Nice weather this evening, isn't it?\" you say loudly.\n\t\t\n\t\t\"Sure is. Is that you, Sayn?\"\n\t\t*choice\n\t\t\t#\"Sure is.\"\n\t\t\t\t*set mind %+10\n\t\t\t\t\"How's your mam doing?\"\n\t\t\t\t\n\t\t\t\t\"Same as ever, thanks.\"\n\t\t\t\t\n\t\t\t\t\"Good, good.\" \n\t\t\t\t\n\t\t\t\tThe footsteps grow louder, and you see the bobbing light of a candle. Blanche grips your elbow and pulls you gently through a door into a surprisingly well-furnished room. She closes the door and leans against it, breathing hard. You scan the room before slumping in relief. There's no-one there.\n\t\t\t\t\n\t\t\t\t\"Um... $!{name}?\"\n\t\t\t\t\n\t\t\t\t\"What is it?\"\n\t\t\t\t\n\t\t\t\t\"Our tunnel door is gone.\"\n\t\t\t\t\n\t\t\t\tYou turn in shock and realize it's perfectly true. It's not just that the secret door has sealed perfectly closed behind you. There isn't the slightest crack in the wallpaper. It's as if it was never there.\n\t\t\t\t\t\t\n\t\t\t\t\"Um,\" you say, hoping you haven't lost your mind. \"I guess we'll go another way then.\"\n\t\t\t\t\t\t\n\t\t\t\t\"It's magic,\" Blanche breathes. \"Like that guy branding us with his bare hands, and then the gatekeeper making the burn feel better.\"\n\t\t\t\t\t\t\n\t\t\t\tTogether you go to the door leading deeper into the castle. You listen for voices before softly opening it.\n\t\t\t\t*goto carpet\n\t\t\t#\"No, it's $!{name}. I'm new here.\"\n\t\t\t\t*set mind %+10\n\t\t\t\t*set ladybond %+10\n\t\t\t\t\"Congratulations on the job then. It's not a good time right now, but Her Majesty treats us well all the same.\"\n\t\t\t\t\n\t\t\t\t\"What do you do?\"\n\t\t\t\t\n\t\t\t\tShe laughs. \"Run messages, mainly. I've a good memory and I don't mind being on my feet. You?\"\n\t\t\t\t\n\t\t\t\t\"Oh... this and that.\"\n\t\t\t\t\n\t\t\t\tThe footsteps grow louder, and you see the bobbing light of a candle. Blanche grips your elbow and pulls you gently through a door into a surprisingly well-furnished room. She closes the door and leans against it, breathing hard. You scan the room before slumping in relief. There's no-one there.\n\t\t\t\t\n\t\t\t\t\"Um... $!{name}?\"\n\t\t\t\t\n\t\t\t\t\"What is it?\"\n\t\t\t\t\n\t\t\t\t\"Our tunnel door is gone.\"\n\t\t\t\t\n\t\t\t\tYou turn in shock and realize it's perfectly true. It's not just that the secret door has sealed perfectly closed behind you. There isn't the slightest crack in the wallpaper. It's as if it was never there.\n\t\t\t\t\t\t\n\t\t\t\t\"Um,\" you say, hoping you haven't lost your mind. \"I guess we'll go another way then.\"\n\t\t\t\t\t\t\n\t\t\t\t\"It's magic,\" Blanche breathes. \"Like that guy branding us with his bare hands, and then the gatekeeper making the burn feel better.\"\n\t\t\t\t\t\t\n\t\t\t\tTogether you go to the door leading deeper into the castle. You listen for voices before softly opening it.\n\t\t\t\t*goto carpet\n\t\t\t#\"No, it's Henran. I don't think we've met, but you have a sweet voice.\"\n\t\t\t\t*set mind %+10\n\t\t\t\t*set soul %+10\n\t\t\t\t\"Not that I recall,\" she says cheerfully. \"But I'll know your voice next time.\"\n\t\t\t\t\n\t\t\t\t\"Pleased to meet you...?\"\n\t\t\t\t\n\t\t\t\t\"Seena.\"\n\t\t\t\t\n\t\t\t\tThe footsteps grow louder, and you see the bobbing light of a candle. Blanche grips your elbow and pulls you gently through a door into a surprisingly well-furnished room. She closes the door and leans against it, breathing hard. You scan the room before slumping in relief. There's no-one there.\n\t\t\t\t\n\t\t\t\t\"Um... $!{name}?\"\n\t\t\t\t\n\t\t\t\t\"What is it?\"\n\t\t\t\t\n\t\t\t\t\"Our tunnel door is gone.\"\n\t\t\t\t\n\t\t\t\tYou turn in shock and realize it's perfectly true. It's not just that the secret door has sealed perfectly closed behind you. There isn't the slightest crack in the wallpaper. It's as if it was never there.\n\t\t\t\t\t\t\n\t\t\t\t\"Um,\" you say, hoping you haven't lost your mind. \"I guess we'll go another way then.\"\n\t\t\t\t\t\t\n\t\t\t\t\"It's magic,\" Blanche breathes. \"Like that guy branding us with his bare hands, and then the gatekeeper making the burn feel better.\"\n\t\t\t\t\t\t\n\t\t\t\tTogether you go to the door leading deeper into the castle. You listen for voices before softly opening it.\n\t\t\t\t*goto carpet\n\t\t\n\t#Duck into the closest door and look for a makeshift weapon. \n\t\t*set body %+10\n\t\tYou grab Blanche's elbow and pull her gently through a door into a surprisingly well-furnished room. She closes the door and leans against it, breathing hard. You scan the room before slumping in relief. There's no-one there.\n\t\t\t\t\n\t\t\"Um... $!{name}?\" \n\t\t\t\t\n\t\t\"What is it?\" you say.\n\t\t\t\t\n\t\t\"Our tunnel door is gone.\"\n\t\t\t\t\n\t\tYou turn in shock and realize it's perfectly true. It's not just that the secret door has sealed perfectly closed behind you. There isn't the slightest crack in the wallpaper. It's as if it was never there.\n\t\t\t\t\n\t\t\"Um,\" you say, hoping you haven't lost your mind. \"I guess we'll go another way then.\"\n\t\t\t\t\n\t\t\"It's magic,\" Blanche breathes. \"Like that guy branding us with his bare hands, and then the gatekeeper making the burn feel better.\"\n\t\t\t\t\n\t\tTogether you go to the door leading deeper into the castle. You listen for voices before softly opening it.\n\t\t*goto carpet\n\t#Walk back the other way, and look for a door that doesn't have light or noise filtering through it.\n\t\t*set mind %+10\n\t\tYou tiptoe back where you came from, trying to breathe quietly in the echoing space. After just a few steps you collide with the wall, swallowing a yelp of pain. Without a word, you and Blanche spread out your hands, looking for the tunnel you just walked down.\n\t\t\t\n\t\tIt's gone. A stone wall has appeared from thin air to block your path. You hear Blanche's breath hitch as she realizes the same thing.\n\t\t\t\n\t\tThe footsteps grow louder, and when you look back you see the bobbing light of a candle. Blanche grips your elbow and pulls you gently through a door into a surprisingly well-furnished room. She closes the door and leans against it, letting her breath out slowly. You scan the room before slumping in relief. There's no-one there.\n\t\t\t\t\n\t\t\"Um... $!{name}?\"\n\t\t\t\t\n\t\t\"What is it?\"\n\t\t\t\t\n\t\t\"Our tunnel door is gone.\"\n\t\t\t\t\n\t\tYou turn in shock and realize it's perfectly true. It's not just that the secret door has sealed perfectly closed behind you. There isn't the slightest crack in the wallpaper. It's as if it was never there.\n\t\t\t\t\n\t\t\"Um,\" you say, hoping you haven't lost your mind. \"I guess we'll go another way then.\"\n\t\t\t\t\n\t\t\"It's magic,\" Blanche breathes. \"Like that guy branding us with his bare hands, and then the gatekeeper making the burn feel better.\"\n\t\t\t\t\n\t\tTogether you go to the door leading deeper into the castle. You listen for voices before softly opening it.\n*label carpet\n\n*goto fight\n\n*label x_rescuer\n\nYou give her your phone to use for light. She crawls a little way into the tunnel and calls out, \"I can see it!\"\n\n\"Any sign of the wombat?\"\n\n\"Nope,\" she says, then curses. \"I just knocked the phone farther in. One sec... it's right there!\"\n\nShe wriggles inwards, and you move sideways to keep her feet in view. You hear a startled yelp, and watch helplessly as your best friend slides out of sight between one second and the next. \n\nIt's disorienting, being best friends with Blanche. You know she's fictional, but she feels so familiar.\n\n\"Blanche!\" you yell. There's no reply. The burrow collapsed and took her, along with both phones. So much for phoning for help. What do you do?\n*choice\n\t#Carefully examine your surroundings and the hole, looking for a safe way to help Blanche without putting yourself in danger.\n\t\t*set mind %+10\n\t\tYou use the discarded selfie stick to test the ground around the burrow before putting weight on it. Your backpack swings sideways awkwardly, and you fall on your face. Spitting dirt, you push yourself up, only to feel the dry dirt give way under you.\n\t\t*goto fall\n\t#Kneel beside the hole and yell, listening for a reply. Blanche might be disoriented.\n\t\t*set soul %+10\n\t\tYou hear a faint cry. It's impossible to make out any words. Clearly, she can't get back up without help. You tighten the straps of your backpack, glad you packed a first aid kit. With a sigh, you get down on hands and knees and head into the darkness.\n\t\t*goto fall\n\t#Immediately crawl into the hole after her. If she's badly injured, any delay could be fatal.\n\t\tGlad you packed a first aid kit, you head into the darkness.\n\t\t*set mind %+10\n\t\t*set body %+10\n*label fall\n\nYou lose all control as the burrow collapses, sending you flying downwards and bashing your head and hands against the hard sides. It's impossible to tell which way is up until you find yourself sprawled helplessly in a patch of grass and dirt. When you open your eyes, deciding nothing's broken, the first thing you see is Blanche's shoes. Oddly, she's not facing you.\n\n\"Hey,\" you croak.\n\n\"Get up,\" says an unfamiliar voice. It's female, and harsh, and the accent is like nothing you've heard before. \n\nYou look up and see a woman dressed all in black, with a sword pointed at Blanche's throat. Blanche's hands are raised and she doesn't move, but you hear her slowly let out her breath in a sigh that makes your stomach twist in fear.\n\n\"Get up,\" the woman says again, and someone else kicks you in the side.\n\nYou stand with your hands raised, wondering why there are people with swords threatening tourists. Glancing around carefully, you see an enormous castle surrounded by medieval-style houses not far away. You want to laugh, but one look at the sword-wielding woman stops you. This might look like a medieval cosplay that spread too far into reality, but her eyes tell you a different story. \n\nIt's only then that you notice the sun is setting. Either you passed out when you fell down the wombat hole, or this whole place is... not the same part of the world you inhabited ten minutes earlier. Or perhaps it's not your world at all. You can't see any Caucasians in the town, which is unusual in Australia. The faces of the three people with swords don't look like Aboriginal Australians either.\n\nYou suppress a stab of hysteria and focus on what's directly in front of you. The person who kicked you takes your hand from behind, twisting it behind your back. \n\n\"Stay still now,\" he says, with sadistic satisfaction. He presses his palm against yours and for a moment you feel nothing. Then the burning starts and you scream in pain, helplessly wrenching your own arm as you reflexively jerk away.\n\nYou clasp your burned hand in your whole one, and see a blistered 'X' marking your palm. They brand Blanche too. She glares, but doesn't so much as whimper. Nothing ever scares her.\n\n\"First warning,\" says the woman, \"which is more than you townsfolk scum deserve. If you're slow to obey an order from me, you'll die.\" She pauses to spit in the direction of the castle. \"If her so-called \"Majesty\" sent you out here, you're obviously of no real use. But don't worry, we have feelsmiths who'll make you an obedient and loyal fighter for us before it gets dark. If you're lucky, they'll even make you like it. I think I'll call you Henran.\"\n\n\"My name is $!{name}.\"\n\n\"Don't worry. That'll be the first thing you forget.\"\n\nYou and Blanche exchange glances. Holding her wrist, she flicks her eyes at the wombat burrow and shakes her head to indicate that she can't crawl fast enough to escape that way. You can't get home without getting rid of the soldiers first. You wonder uneasily if the woman in black has the power to make you forget Uncle Irwin while you're in this world.\n*choice\n\t#I bluff my way out of the situation with insults.\n\t\t*set soul %+10\n\t\t\"Did you think it was coincidence that you caught us?\" you say with all the confidence you can muster. \"We were hired to wander this hillside so you could capture us. The sun's almost down, so where have you been all day? Sleeping? Drinking? And not a single question about where we come from? Look at us! We're clearly foreign, and potentially useful, and you were about to mess with our minds and waste all of that. I'll be making a full report on your incompetence, but in the meantime I suggest you do a proper search of this hillside and start preparing an elaborate apology for scarring my hand like the bumbling fool that you are.\"\n\t\t\n\t\tThe woman in black \n\t\t*goto hillyb\n\t#I tell them I'm not from this world. \n\t\t*set genre_savvy %-10\n\t\t\"Just let us go back through our hole and we'll be out of your way.\"\n\t\t\n\t\tThe woman in black\n\t\t*goto hillyb\n\t#I try flattery in order to get away.\n\t\t*set soul %+10\n\t\t\"I'm so terribly sorry to have caused trouble for you by my own stupidity. We were sent out to look for... herbs... and we went too far. We'll go right back.\"\n\t\t\n\t\tThe woman in black \n\t\t*goto hillyb\n\t#I fight them.\n\t\t*set body %+10\n\t\tYou twist sideways and kick out the knees of the closest two people, pulling Blanche with you to face the woman in black.\n\t\t\n\t\tShe \n*label hillyb\nlowers her sword in response to the sudden change in your demeanor, and the soldiers follow her lead. When her grip on the hilt tightens you know your moment of grace is over. You grab Blanche's uninjured wrist and run downhill towards the town below. Since the woman in red hates the town, it's your best chance of safety. \n\nSlipping and sliding on the long grass, your muscles are screaming when you chance a look over your shoulder and see the soldiers coming to a halt. Looking ahead, you see townspeople with bows and arrows perched on top of the town wall. The woman in red doesn't dare come closer. Taking a deep breath, you raise your hands and keep walking. No-one shoots you, but no-one lowers their bow.\n\nThe gatekeeper checks your palm, and you realize the black-clad soldiers effectively branded you with a free pass into the town. At the touch of his hand, the pain eases. When you gasp in surprise, he says, \"Yes, I'm a healsmith. You're welcome.\" He waves an all-clear to the archers. \"I see you've met our new friends. If you've any Nakal-dyed clothing, don't wear it. Black isn't a popular color in town these days.\"\n\n\"Thank you so much,\" says Blanche.\n\nThe gatekeeper smiles, letting you in through a heavily-reinforced side door. \"Oh, and by the way? If our new friends have enlisted you as spies, you should know that I'll hunt you down and kill you myself—slowly. Have a nice day.\"\n\n\"Yes sir,\" you say in unison.\n*page_break\n\nBeyond the spiked portcullis there's a thriving marketplace selling everything from fish to flowers to wooden toothbrushes and... more fish. Although each stall is crowded with wares, every single one has an empty shelf nailed to one side where goods are traded via a curious ritual. The buyer places their item on the shelf and steps back. Then the seller takes it, and lays their item in its place. When the seller moves away again, the buyer takes their purchase. It's as if they're terrified they might accidentally touch one another. \n\nA stallholder freezes partway through taking her payment when she takes in your modern appearance, but after a long pause she finishes the sale and continues her pitch: \"Fishy fishy!\" she yells, at a volume that could strip paint. \"Freshest fishy-fish for the fine foreigners!\"\n\nHer attention draws others to look at you, and children to point and giggle. You begin to feel uncomfortable with all the attention, so you duck into quieter and quieter streets. Soon you're travelling along a street with a blank stone wall on one side and a row of joined cottages on the other. The blank wall creaks loudly right beside you, and opens to reveal a man carrying a bundle of rags. You smile winningly as he stares in shock at you, keeping him enthralled long enough for Blanche to slip the toe of her shoe into the crack of the door. \n\nFinally the man shakes himself, offers you a shy smile, and walks away. You and Blanche go inside the hidden door, stepping instantly into a long narrow tunnel. It's rectangular in shape, with deep grooves all along the walls and ceiling. The only light is a faint radiance ahead, and sometimes the outline of a door to your left or right. Not knowing where any of the maze leads, you continue straight ahead. \n\nYou hear footsteps coming towards you!\n*choice\n\t#Call out a casual greeting as if you belong there.\n\t\t*set soul %+10\n\t\t\"Nice weather this evening, isn't it?\" you say loudly.\n\t\t\n\t\t\"Sure is. Is that you, Sayn?\"\n\t\t*choice\n\t\t\t#\"Sure is.\"\n\t\t\t\t*set mind %+10\n\t\t\t\t\"How's your mam doing?\"\n\t\t\t\t\n\t\t\t\t\"Same as ever, thanks.\"\n\t\t\t\t\n\t\t\t\t\"Good, good.\" \n\t\t\t\t\n\t\t\t\tThe footsteps grow louder, and you see the bobbing light of a candle. Blanche grips your elbow and pulls you gently through a door into a surprisingly well-furnished room. She closes the door and leans against it, breathing hard. You scan the room before slumping in relief. There's no-one there.\n\t\t\t\t\n\t\t\t\t\"Um... $!{name}?\"\n\t\t\t\t\n\t\t\t\t\"What is it?\"\n\t\t\t\t\n\t\t\t\t\"Our tunnel door is gone.\"\n\t\t\t\t\n\t\t\t\tYou turn in shock and realize it's perfectly true. It's not just that the secret door has sealed perfectly closed behind you. There isn't the slightest crack in the wallpaper. It's as if it was never there.\n\t\t\t\t\t\t\n\t\t\t\t\"Um,\" you say, hoping you haven't lost your mind. \"I guess we'll go another way then.\"\n\t\t\t\t\t\t\n\t\t\t\t\"It's magic,\" Blanche breathes. \"Like that guy branding us with his bare hands, and then the gatekeeper making the burn feel better.\"\n\t\t\t\t\t\t\n\t\t\t\tTogether you go to the door leading deeper into the castle. You listen for voices before softly opening it.\n\t\t\t\t*goto carpet\n\t\t\t#\"No, it's $!{name}. I'm new here.\"\n\t\t\t\t*set mind %+10\n\t\t\t\t*set ladybond %+10\n\t\t\t\t\"Congratulations on the job then. It's not a good time right now, but Her Majesty treats us well all the same.\"\n\t\t\t\t\n\t\t\t\t\"What do you do?\"\n\t\t\t\t\n\t\t\t\tShe laughs. \"Anything and everything, including running messages. I've a good memory and I don't mind being on my feet. You?\"\n\t\t\t\t\n\t\t\t\t\"Oh... this and that.\"\n\t\t\t\t\n\t\t\t\tThe footsteps grow louder, and you can see the bobbing light of a candle. Blanche grips your elbow and pulls you gently through a door into a surprisingly well-furnished room. She closes the door and leans against it, breathing hard. You scan the room before slumping in relief. There's no-one there.\n\t\t\t\t\n\t\t\t\t\"Um... $!{name}?\"\n\t\t\t\t\n\t\t\t\t\"What is it?\"\n\t\t\t\t\n\t\t\t\t\"Our tunnel door is gone.\"\n\t\t\t\t\n\t\t\t\tYou turn in shock and realize it's perfectly true. It's not just that the secret door has sealed perfectly closed behind you. There isn't the slightest crack in the wallpaper. It's as if it was never there.\n\t\t\t\t\t\t\n\t\t\t\t\"Um,\" you say, hoping you haven't lost your mind. \"I guess we'll go another way then.\"\n\t\t\t\t\t\t\n\t\t\t\t\"It's magic,\" Blanche breathes. \"Like that guy branding us with his bare hands, and then the gatekeeper making the burn feel better.\"\n\t\t\t\t\t\t\n\t\t\t\tTogether you go to the door leading deeper into the castle. You listen for voices before softly opening it.\n\t\t\t\t*goto carpet\n\t\t\t#\"No, it's Henran. I don't think we've met.\"\n\t\t\t\t*set soul %+10\n\t\t\t\t\"Not that I recall,\" she says cheerfully. \"But I'll know your voice next time.\"\n\t\t\t\t\n\t\t\t\t\"Pleased to meet you...?\"\n\t\t\t\t\n\t\t\t\t\"Seena.\"\n\t\t\t\t\n\t\t\t\tThe footsteps grow louder, and you can see the bobbing light of a candle. Blanche grips your elbow and pulls you gently through a door into a surprisingly well-furnished room. She closes the door and leans against it, breathing hard. You scan the room before slumping in relief. There's no-one there.\n\t\t\t\t\n\t\t\t\t\"Um... $!{name}?\"\n\t\t\t\t\n\t\t\t\t\"What is it?\"\n\t\t\t\t\n\t\t\t\t\"Our tunnel door is gone.\"\n\t\t\t\t\n\t\t\t\tYou turn in shock and realize it's perfectly true. It's not just that the secret door has sealed perfectly closed behind you. There isn't the slightest crack in the wallpaper. It's as if it was never there.\n\t\t\t\t\t\t\n\t\t\t\t\"Um,\" you say, hoping you haven't lost your mind. \"I guess we'll go another way then.\"\n\t\t\t\t\t\t\n\t\t\t\t\"It's magic,\" Blanche breathes. \"Like that guy branding us with his bare hands, and then the gatekeeper making the burn feel better.\"\n\t\t\t\t\t\t\n\t\t\t\tTogether you go to the door leading deeper into the castle. You listen for voices before softly opening it.\n\t\t\t\t*goto carpet\n\t\t\n\t#Duck into the closest door. \n\t\t*set body %+10\n\t\tYou grab Blanche's elbow and pull her gently through a door into a surprisingly well-furnished room. She closes the door and leans against it, breathing hard. You scan the room before slumping in relief. There's no-one there.\n\t\t\t\t\n\t\t\"Um... $!{name}?\" \n\t\t\t\t\n\t\t\"What is it?\" you say.\n\t\t\t\t\n\t\t\"Our tunnel door is gone.\"\n\t\t\t\t\n\t\tYou turn in shock and realize it's perfectly true. It's not just that the secret door has sealed perfectly closed behind you. There isn't the slightest crack in the wallpaper. It's as if it was never there.\n\t\t\t\t\n\t\t\"Um,\" you say, hoping you haven't lost your mind. \"I guess we'll go another way then.\"\n\t\t\t\t\n\t\t\"It's magic,\" Blanche breathes. \"Like that guy branding us with his bare hands, and then the gatekeeper making the burn feel better.\"\n\t\t\t\t\n\t\tTogether you go to the door leading deeper into the castle. You listen for voices before softly opening it.\n\t\t*goto carpet\n\t#Walk back the other way, and look for a door that doesn't have light or noise filtering through it.\n\t\t*set mind %+10\n\t\tYou tiptoe back where you came from, trying to breathe quietly in the echoing space. After just a few steps you collide with the wall, swallowing a yelp of pain. Without a word, you and Blanche spread out your hands, looking for the tunnel you just walked down.\n\t\t\t\n\t\tIt's gone. A stone wall has appeared from thin air to block your path. You hear Blanche's breath hitch as she realizes the same thing.\n\t\t\t\n\t\tThe footsteps grow louder, and when you look back you see the bobbing light of a candle. Blanche grips your elbow and pulls you gently through the closest door into a surprisingly well-furnished room. She closes the door and leans against it, letting her breath out slowly. You scan the room before slumping in relief. There's no-one there.\n\t\t\t\t\n\t\t\"Um... $!{name}?\"\n\t\t\t\t\n\t\t\"What is it?\"\n\t\t\t\t\n\t\t\"Our tunnel door is gone.\"\n\t\t\t\t\n\t\tYou turn in shock and realize it's perfectly true. It's not just that the secret door has sealed perfectly closed behind you. There isn't the slightest crack in the wallpaper. It's as if it was never there.\n\t\t\t\t\n\t\t\"Um,\" you say, hoping you haven't lost your mind. \"I guess we'll go another way then.\"\n\t\t\t\t\n\t\t\"It's magic,\" Blanche breathes. \"Like that guy branding us with his bare hands, and then the gatekeeper making the burn feel better.\"\n\t\t\t\t\n\t\tTogether you go to the door leading deeper into the castle. You listen for voices before softly opening it.\n\n*label fight\n\nYou find a carpeted hallway with seemingly endless rows of doors on each side. One end has a shuttered window hanging open, so you hurry in that direction, hoping to spot a way out. Before you reach it, stones grow across the window, covering it completely. The pair of you stop and stare, cast into darkness.\n\n\"Why does everything keep changing?\" says Blanche.\" How are we meant to know what to do?\"\n\n\"Story of my life,\" you mutter, and say aloud, \"Let's head upwards. At least we might be able to get an idea of the geography here.\"\n\n\"Here?\" she says softly. \"So you know we're not in Australia any more?\"\n\nYou nod, afraid to speak and have your voice break.\n\nThere are two staircases on either side of the wall where the window used to be. Taking a deep breath, you head upwards.\n\n*page_break Act Two\nBefore long, your legs ache and your breath rasps in your throat. As you run up a third stone staircase past another magically closed-in window, you feel certain you're being herded upwards. You also know you're not the only ones, as you catch glimpses of a second trio of black-clad soldiers on your heels. So much for safety in the town. This might not be your world, but no-one likes being constantly chased by vicious soldiers!\n\nAt least it seems to be a single group on your heels, rather than the entire Nakal force. Or the woman in black. \n\nYou wish the gatekeeper was around. He's the closest thing to an ally you have. You just hope that the town doesn't fall to the invaders… and with them, the lady in black.\n\nWhatever sense of direction you had is thoroughly tangled. You can't even tell if the walls are shifting position or not any more. They all look exactly the same. But just as you wonder if the castle's height is endless, you spot a winding stair that clearly leads into an isolated tower. Hoping against hope that this might finally throw the soldiers off your trail, you and Blanche head upwards, stepping lightly and trying to soften the sound of your ragged breath.\n\n\"We've got them now,\" says a man's gravelly voice behind you. \"They're trapped, and so is her so-called \"Majesty\". Check your weapons and catch your breath.\"\n\nYour vision lurches with exhaustion, confusion, and fear. There's only one path left open to you, so you run upwards again, putting off the inevitable capture as long as possible. As you pass narrow slits in the wall, you catch your first glimpses of the world below. You are on a tropical island barely large enough to support the town, surrounded by a fleet of black-sailed ships. The Nakal soldiers certainly do like the color black. You can't help being impressed by their seafaring ability in such a low-tech place. There's a flash of red among the black, and you shiver.\n\nAt the very top of the tower there is a narrow wooden door. You try the handle, expecting it to be locked. It bursts open and you stumble into a carpeted room where the stone walls are draped with red velvet hangings. Large gaps in the stone give 360-degree views. \n\nA tall woman dressed in brown leather stands with her sword drawn next to a seated pregnant woman in her twenties. On her other side, a one-armed man glares ferociously at you and Blanche.\n\n\"Welcome to Ibu,\" the pregnant woman says, and for the first time you notice a silver crown resting in her braided black hair. \"I am Queen Enia, and this is my island. There are invaders from Nakal pursuing you. Are you with them, or with me?\"\n*label friendfoe\n*choice\n\t#\"If we help you, will you help us return home?\"\n\t\t*set stumpbond %+10\n\t\t\"If I can,\" she says.\n\t\t*goto dowhat\n\t*disable_reuse #\"Neither. We're not from here, and we're definitely not with them.\"\n\t\t*set genre_savvy %-10\n\t\t\"I'm afraid you need to make a choice,\" she says, \"and quickly.\"\n\t\t*goto friendfoe\n\t*disable_reuse #\"I'm curious. What would you do if we said we were with them?\"\n\t\t*set body %-10\n\t\t\"My healsmith would kill you, and then kill them.\" The one-armed man inclines his head, but doesn't move. \"His name is Quiet.\"\n\t\t*goto friendfoe\n\t#\"Your Majesty, we'll serve you as well as we can.\"\n\t\t*set genre_savvy %+10\n\t\t*set queenbond %+10\n\t\t\"Thank you,\" she says, \"but I'm afraid I'll have to confirm your sincerity. Do I have your permission to do so, or would you rather be kept in isolation until the island is won?\"\n\t\t*choice\n\t\t\t#I agree to anything, as long as Blanche and I aren't forcibly separated.\n\t\t\t\t*set companionbond %+20\n\t\t\t\t\"Very well,\" says the queen, and steps forwards with her hand outstretched for you to kiss. You bow awkwardly and kiss her, startling back at her indrawn breath. She clutches her hand and stares at you for a long moment. You realize you've already been tested—somehow—and wonder if you passed. \n\t\t\t\t\n\t\t\t\t\"Well,\" she says, \"you're certainly not from Nakal, and there's no betrayal in your heart. I'm not sure what you are, but I suspect something as peculiar as you could be very useful indeed.\" \n\t\t\t\t*goto dowhat\n\t\t\t#I definitely trust her more than the Nakals. If I was under siege, I'd need some kind of proof to trust strangers too.\n\t\t\t\t*set queenbond %+10\n\t\t\t\t*set soul %+10\n\t\t\t\t\"Very well,\" says the queen, and steps forwards with her hand outstretched for you to kiss. You bow awkwardly and kiss her, startling back at her indrawn breath. She clutches her hand and stares at you for a long moment. You realize you've already been tested—somehow—and wonder if you passed. \n\t\t\t\t\n\t\t\t\t\"Well,\" she says, \"you're certainly not from Nakal, and there's no betrayal in your heart. I'm not sure what you are, but I suspect something as peculiar as you could be very useful indeed.\" \n\t\t\t\t*goto dowhat\n\t\t\t#Sincerity? Uh-oh. That's really not my thing. I look pleadingly at Blanche. \n\t\t\t\t*set soul %+10\n\t\t\t\t\"Whatever you're going to do,\" says Blanche, \"do it to me.\"\n\t\t\t\t\n\t\t\t\t\"Very well,\" says the queen, and steps forwards with her hand outstretched for her to kiss. Blanche bows awkwardly and kisses her, somehow provoking a sharply indrawn breath. Queen Enia clutches her hand and stares at Blanche for a long moment. You realize she's already been tested—somehow—and wonder if she passed. \n\t\t\t\t\n\t\t\t\t\"Well,\" says the queen, \"you're certainly not from Nakal, and there's no betrayal in your heart. I'm not sure what you are, but I suspect something as peculiar as you could be very useful indeed.\" \n\t\t\t\t\n\t\t\t\tBlanche looks dazed but unhurt. What just happened? \n\t\t\t\t*goto dowhat\n*label dowhat\n\n\"How long until the soldiers in black reach us?\" you ask.\n\n\"Not long,\" says the queen, \"but long enough for us to prepare to meet them. All three of us have different magics. It was Seena's quickensmith magic that spotted you in our servants' corridor, and after meeting you there to check you were unarmed she guided you to this tower.\"\n\nSeena curtsies, making it look natural in trousers. Looking at the two women, you can see they're a similar age. Perhaps they played together as children. It's clear they hold the balance of power between them with mutual respect. Queen Enia makes the decisions, but Seena carries them out. If she had chosen to kill you instead of herding you here, Queen Enia would never have given you a second thought.\n\nThe scarred man lifts his good arm and waves a greeting. \n\t\t\n\"Quiet hasn't spoken a word since he awoke from a coma three months ago,\" Queen Enia explains, \"but he and Seena are my most loyal companions. Quiet nearly died defending the king in the first battle, when the Nakals invaded our home. The healsmith who tried to kill Quiet was powerful, so his remaining wounds are permanent.\"\n\t\t\n\"Where is the king now?\" you ask.\n\t\t\n\"The first king died in that battle, along with all of his personal guard and far too many of my people,\" says the queen, looking away and saying the words as if reading them off a page. \"The current king is on his way to this tower, but cannot reach us without fighting his way through that group of assassins. We need to save ourselves. What can you do?\"\n*choice\n\t#\"Please explain your magic to me. I need to know more to be able to help you.\"\n\t\t*set mind %+20\n\t\t\"I am a feelsmith, and Quiet is a healsmith. If we physically touch you, we can examine or alter your emotions or your physical body respectively. As a quickensmith, Seena can alter physical objects.\"\n\t\t\n\t\t\"Like the castle,\" you say. \n\t\t\n\t\tSeena smiles.\n\t\t\n\t\t\"Then can you trap the invaders on the stairs?\" you ask her.\n\t\t\n\t\tShe glances at Queen Enia, who nods permission for her to answer. \"I could, except one of them is a quickensmith too. All I've done is give us a few more minutes.\"\n\t\t\n\t\t\"Is everyone on Ibu magical?\"\n\t\t\n\t\t\"Many, but not all,\" says the queen.\n\t\t\n\t\t\"So it's all about who can touch who,\" you say, thinking aloud. \"Sounds like we'll be most useful as a distraction so you can get behind them.\"\n\t\t\n\t\tQueen Enia raises an eyebrow, apparently impressed. \"If you are magically altered or otherwise harmed, Quiet and I will do our best to restore you.\"\n\t\t\n\t\t\"Okay,\" you say. \"Blanche and I should stand in full view, so the soldiers focus on us. Seena, can you create a cavern in the wall to fit Her Majesty, so she's protected from everyone except quickensmiths, but can still reach out and touch them if you back them into that space?\"\n\t\t\n\t\tSeena gives you a tight nod and draws the pregnant queen to the outer wall of the tower, narrowing two of the glassless windows in order to make a stone column wide enough for a very pregnant person. You tear your eyes away from the magical display and see Quiet positioning himself to be behind the door when it opens. From there, most of his body is protected, but he can reach around the door with his hand and hopefully perform a magical attack. Seena shifts the single chair and crouches behind it with her sword at the ready.\n\t\t\n\t\tShe says quietly, \"They're coming. Three, two, one—\"\n\t\t\n\t\tThe door bursts open, and three black-clad Nakals pour through, halting in a tight group and drawing their swords. Their leader grins at you, and you wish you'd thought to ask for a weapon.\n\t\t\n\t\t\"Wait!\" you say, raising your hands.\n\t\t\n\t\t\"I see you've already been branded,\" he says. \"So what else is there to wait for?\"\n\t\t\n\t\tQuiet's good hand reaches out and just touches his wrist, and he screams in pain, collapsing to the ground.\n\t\t\n\t\t\"That,\" you say, with a certain sense of satisfaction. \n\t\t\n\t\tThe others split up. One engages Quiet, who moves backwards with surprising coordinaton, dodging around furniture and dancing just out of reach of the blade. The last, a woman, heads straight for you, but before she reaches you Seena swipes her sword at the soldier's legs. She yells in pain and fury, ignoring you to focus on the greater threat. Seena quickly backs her against the wall where Queen Enia is hiding. As you watch, Queen Enia reaches out from the stone and slaps her whole palm on the invader's uncovered neck. The invader falls to her knees at once, swearing allegiance. It's far creepier than Quiet's more straightforward magic.\n\t\t\n\t\tSeena drops her sword at once and presses both hands on the ground. The floor bulges suddenly under the feet of the last attacker, tripping him over. Quiet grabs the man's foot and the invader is unconscious before you have time to blink. For a moment you think he's dead, and then you hear a gentle snore.\n\t\t\n\t\tThe four of you stand, breathing hard, until you can't help letting out a nervous laugh.\n\t\t\n\t\tA voice comes from inside the wall. \"Seena? Can I come out now?\"\n\t\t\n\t\tSeena touches the floor, and the wall opens up.\n\t\t\n\t\t*goto leave\n\t#\"I can fight—a little. What weapons are they likely to have?\"\n\t\t*set body %+20\n\t\t\"Swords,\" says Queen Enia. \"And magic.\"\n\t\t\n\t\t\"How do I fight magic? I've never fought either before, but I least I've seen swords.\"\n\t\t\n\t\t\"You'll have to tell me why you don't know about magic,\" says the queen. \"But fighting it is simple. Don't let their skin touch your skin, and no magic can harm you directly. Quickensmiths like Seena can alter physical objects, including stone, so the room may alter around you. Stay away from the walls.\"\n\t\t\n\t\t\"They're here,\" says Seena quietly. \"Three, two, one—\"\n\t\t\n\t\tThe door bursts open, and three black-clad Nakals pour through, halting in a tight group and drawing their swords. Their leader grins at you, and you wish you'd thought to ask for a weapon. \n\t\t\n\t\tQuiet and Seena close ranks and advance as the queen stands to her feet, producing a sword of her own. The leader picks Seena as the greatest threat, and engages with her. Quiet charges forward like a bull, knocking over the second and grappling with him on the floor as each tries to find an unprotected part of skin on the other. The third soldier, a woman, makes for you and Blanche, and you go to meet her, hoping to at least keep her from harming anyone else. Your burned hand aches, but you put aside the pain and keep your eyes on the soldier's face rather than focusing on her weapon. \n\t\t\n\t\tShe steps forward confidently, and moves sideways to slash at you. You sling your backback down one arm as a shield, absorbing the blow and distracting her with the unfamiliar object. In that split second, you kick her hard just below the knee, and her leg folds under her. Grabbing her dominant hand, you keep the sword at bay and headbutt her in the nose, breaking it with a satisfactory crunch. She drops her sword, and you push her onto her back, pinning her arm beneath her before you look up to see Queen Enia kneeling to press her palm to the woman's forehead. At once the woman begins to weep, babbling apologies and loyalty to the queen. At the queen's nod, you release the soldier and step back.\n\t\t\n\t\t\"Physical touch,\" the queen says grimly. \"It's all I need to alter them. I'm a feelsmith and Quiet is a healsmith.\"\n\t\t\n\t\tQuiet looks up from the body of his soldier, who is snoring softly, and stands to his feet with the manner of a man who has done his job well. It seems a healsmith can put an opponent to sleep instantly. \n\t\t\n\t\tThe leader of the invaders is lying in a pool of his own blood, quite clearly dead by Seena's sword. You look away.\n\t\t*goto leave\n\t#\"Let me try to convince them to back off.\"\n\t\t*set soul %+20\n\t\tDo you plan to verbally scare them away, or convince them this is not the time to fight?\n\t\t*choice\n\t\t\t#Verbally scare them away.\n\t\t\t\tStraightening your shoulders, you walk out the door and close it behind you, then sit on the stairs so you look as relaxed as possible. In moments, the soldiers arrive.\n\t\t\t\t\n\t\t\t\t\"Welcome to my trap, numbskulls,\" you say. \"Would you rather admit you've been herded right where I want you, or shall I kill you now? I'd just kill you, now that you can't get away, but it's a hassle to clean blood off these stairs when they're so high up.\"\n\t\t\t\t*if soul >40\n\t\t\t\t\n\t\t\t\t\tThe soldiers stop in confusion, then sheath their swords and walk away. It takes all your strength and acting skills to continue looking casual until they're out of sight.\n\t\t\t\t\t\n\t\t\t\t\tThe queen herself opens the door. \"That was impressive! I'm a feelsmith, so I can alter people's emotions with physical touch. You changed their minds with nothing but words!\"\n\t\t\t\t\t\n\t\t\t\t\t\"How did you know it was safe to come out?\" I ask.\n\t\t\t\t\t\n\t\t\t\t\t\"Seena's a quickensmith,\" says the queen. \"She can sense physical objects, and change their shape. Humans are visible to her, but can't be be altered. That's where healsmiths come in.\"\n\t\t\t\t\t*goto welldone\n\t\t\t\t*else\n\t\t\t\t\n\t\t\t\t\tThe soldiers pause, then continue up the steps. You flee inside.\n\t\t\t\t\t\n\t\t\t\t\tQuiet and Seena close ranks and advance as the queen stands to her feet, producing a sword of her own. The leader picks Seena as the greatest threat, and engages with her. Quiet charges forward like a bull, knocking over the second and grappling with him on the floor as each man tries to find an unprotected part of skin on the other. The third soldier, a woman, makes for you and Blanche, and you cower together behind the single chair. She laughs at you both and goes to join her leader in the fight with Seena. \n\t\t\n\t\t\t\t\tQueen Enia steps around the whirlwind of Seena's fight and presses her palm to the woman's forehead. At once the woman begins to weep, babbling apologies and loyalty to the queen. Seena dispatches her man as he dodges the queen's magical hand.\n\t\t\n\t\t\t\t\t\"Physical touch,\" the queen says grimly, not taking her eyes off her enemy. \"It's all I need to alter them. I'm a feelsmith and Quiet is a healsmith.\"\n\t\t\t\n\t\t\t\t\tQuiet looks up from the body of his soldier, who is snoring softly, and stands to his feet with the manner of a man who has done his job well. It seems a healsmith can put an opponent to sleep with a touch.\n\t\t\t\t\t\n\t\t\t\t\tThe leader of the invaders is lying in a pool of his own blood, quite clearly dead by Seena's sword. You look away.\n\t\t\t\t\t*goto leave\n\t\t\t#Convince them this is not the time to fight.\n\t\t\t\tStraightening your shoulders, you walk out the door and close it behind you, then sit on the stairs so you look as relaxed as possible. In moments, the soldiers arrive.\n\t\t\t\n\t\t\t\t\"Welcome to the tower,\" you say. \"There are seven of us, and only three of you. I choose to offer you mercy, if you get out now.\"\n\t\t\t\t*if soul > 40\n\t\t\t\t\n\t\t\t\t\tThe soldiers sheath their swords and walk away. It takes all your strength to continue looking casual until they're out of sight.\n\t\t\t\t\t\n\t\t\t\t\tThe queen herself opens the door. \"That was impressive! I'm a feelsmith, so I can alter people's emotions with a touch. You changed their minds with nothing but words!\"\n\t\t\t\t\t\n\t\t\t\t\t\"How did you know it was safe to come out?\" I ask.\n\t\t\t\t\t\n\t\t\t\t\t\"Seena's a quickensmith,\" says the queen. \"She can sense physical objects, and change their shape. Humans are visible to her, but can't be be altered. That's where healsmiths come in.\"\n\t\t\t\t\t*goto welldone\n\t\t\t\t*else\n\t\t\t\t\n\t\t\t\t\tThe soldiers pause, then continue up the steps. You flee inside.\n\t\t\t\t\t\n\t\t\t\t\tQuiet and Seena close ranks and advance as the queen stands to her feet, producing a sword of her own. The leader picks Seena as the greatest threat, and engages with her. Quiet charges forward like a bull, knocking over the second and grappling with him on the floor as each man tries to find an unprotected part of skin on the other. The third soldier makes for you and Blanche, and you cower together behind the single chair. She laughs at you and goes to join her leader in the fight with Seena. \n\t\t\n\t\t\t\t\tQueen Enia steps around the whirlwind of Seena's fight and presses her palm to the woman's forehead. At once the woman begins to weep, babbling apologies and loyalty to the queen. Seena dispatches her man as he dodges the queen's magical hand.\n\t\t\n\t\t\t\t\t\"Physical touch,\" the queen says grimly, not taking her eyes off her enemy. \"It's all I need to alter them. I'm a feelsmith and Quiet is a healsmith.\"\n\t\t\t\n\t\t\t\t\tQuiet looks up from the body of his soldier, who is snoring softly, and stands to his feet with the manner of a man who has done his job well. It seems a healsmith can put an opponent to sleep instantly. That's handy. \n\t\t\t\t\t\n\t\t\t\t\tThe leader of the invaders is lying in a pool of his own blood, quite clearly dead by Seena's sword. You look away.\n*label leave\n*label welldone\n\n\"Your Majesty, Your Majesty,\" babbles the converted woman. \"Your enemies attack at dawn in three days!\"\n\nQueen Enia thanks her, and orders her to be quiet. It's useful information, but terrible news. Quiet raises his hand as if to lay it on the queen's arm, but he remembers his place and lowers it.\n\nYou meet Blanche's eyes, feeling steadier when you see the optimism in her face. \n\n\"Thank you for not attacking us on sight,\" you say to the queen, \"but we want to return to our home. I think there's a passageway of sorts on the hillside, but the Nakal soldiers kept us from attempting to go that way.\"\n\n\"You can shelter here until the hillside is free of them,\" says the queen. \"Sending them away from Ibu Island is my dearest wish, so I hope you'll continue to assist us until it's safe for you to venture out again.\"\n\n\"May I ask a favor?\" you say.\n\nThe queen raises her eyebrows, amused. \"You may ask.\"\n\n\"I'm looking for someone,\" you say. \"Another foreigner, a man named Irwin. Has anyone seen him?\"\n\nThe queen looks at Seena, who brightens at once. \"Yes! He's right here in the palace.\" She closes her eyes for a moment, then gasps and opens them again. \"He's gone!\"\n\n\"Gone where?\" you ask, with a bad feeling in the pit of your stomach.\n\n\"Just… gone!\" she says. \"He's nowhere in the palace, and I know he wouldn't have left willingly. But there's no body, so he must be alive.\"\n\nYou're about to ask for privacy to explain yourself to Blanche when a bearded man bursts into the room with his sword raised to attack!\n*choice\n\t#I leap forwards, hoping to knock him over.\n\t\t*set body %+10\n\t\tThe pair of you tumble in a heap as the queen shouts, \"Stop it! Both of you!\"\n\t\t\n\t\tRather awkwardly, you and the bearded man separate, and look to the queen for an explanation.\n\t\t\n\t\t\"King Ferd,\" she says, by way of introduction. \"My husband of six months, originally from Jauh Island. These strangers are $!{name} and Blanche, my newest allies.\"\n\t\t\n\t\t\"Ah,\" says the king. \"Your first instinct was to protect my wife, even though you are unarmed. For that, you have my respect.\"\n\t\t*set kingbond %+20\n\t\t*goto onward\n\t#I rush to the queen, knowing her unborn child is the most vulnerable person in the room.\n\t\t*set mind %+10\n\t\tYou dive half over the queen, shielding her stomach with your body. \n\t\t\n\t\t\"Stop!\" she yells. \n\t\t\n\t\tRather awkwardly, you stand to your feet and look to the queen for an explanation.\n\t\t\n\t\t\"King Ferd,\" she says, by way of introduction. \"My husband of six months, originally from Jauh Island. These strangers are $!{name} and Blanche, my newest allies.\" She turns back to you. \"Your first instinct was to protect my child, even though you are unarmed. For that, you have my gratitude.\"\n\t\t\n\t\tYou thank her, distracted by the fact that the baby kicked you as you touched her. No fetus under six months old kicks like that. The baby belongs to her previous husband—which suggests her recent marriage to a foreigner was necessary for her political survival.\n\t\t*set queenbond %+20\n\t\t*goto onward\n\t#I look at his face. His emotions will show me how to react.\n\t\t*set soul %+20\n\t\tThe man isn't attacking the queen—he looks terrified. Since you and Blanche are unarmed, he must have assumed you were a magical threat to the queen. You raise one hand in surrender and pull Blanche with you as you step away from the queen.\n\t\t\n\t\tHe stops in his tracks, looking at the queen for an explanation. \n\t\t\n\t\t\"King Ferd,\" she says, by way of introduction. \"My husband of six months, originally from Jauh Island. These strangers are $!{name} and Blanche, my newest allies.\"\n\t\t\n\t\tQuiet gives you a lopsided smile, and you realize you've gained the respect of the most mysterious member of your new group of companions. Behind his self-imposed silence there is a sharp mind.\n\t\t*set stumpbond %+20\n*label onward\n\nThe king and queen don't look at each other like a newly-married couple. King Ferd behaves towards his wife like a gifted but inexperienced employee towards his boss. She clearly appreciates his military skill, but the dispassionate self-sacrifice that drove her to hastily remarry has also given her a coldness that is unlikely to fade.\n\nOver the following hours, you learn a great deal about the world of Rahana and the Island of Ibu, and the queen gives you permission to wander the streets of her town with Seena, confident that her people will not harm you, and that you will choose to help her of your own free will. She seems very trusting—but then, she is a feelsmith. Perhaps it's perfectly obvious you're the type who would want to be helpful to someone who has given you shelter, especially after you technically broke into her house.\n\nYou're surprised to find how much you enjoy the candle-lit night life of street food and salacious gossip. Queen Enia's people show her a fierce loyalty; mirroring the love she shows for them. Your accent, bearing, clothing and appearance are all so different to the Nakal that no-one treats you with suspicion. When Seena explains the quickensmith-made sewage system Blanche turns to you and says, \"We could seriously stay here, if we wanted. It's a tropical island where people speak English and have magical toilets. What's not to like?\"\n\nUnsure of the implications, you choose to put off the decision. Also you've been branded, almost brainwashed, and nearly killed since you arrived. But she does have a point. Even under siege and still evidently mourning their previous king, the people of Ibu Island are friendly and inclined to burst into song. You hope there's more to them than being nice, or the island is doomed.\n\n\"Let's try and stay alive,\" you say.\n\n\"Sounds good.\"\n\nHow do you spend your time preparing for the impending battle?\n*choice\n\t#Learning everything I can about swordplay, so I can fight alongside the king.\n\t\t*if soul>50\n\t\t\t\"You seem trustworthy,\" says King Ferd when you offer to act as one of his troops. \"I'll get you a sword at once, and the best training I can muster.\"\n\t\t\t*set body %+20\n\t\t\t*set kingbond %+20\n\t\t\t*goto stats\n\t\t*else\n\t\t\tKing Ferd isn't impressed by your supposed charm. He reluctantly gives you a sword and delegates you to someone else.\n\t\t\t*set body %+10\n\t\t\t*goto stats\n\t#Learning everything I can about this world, so I can figure out how to help Her Majesty politically.\n\t\t*set mind %+10\n\t\t*set soul %+10\n\t\t*set queenbond %+20\n\t\t*goto stats\n\t#Learning everything I can about healsmithing, so I can combine forces with Quiet.\n\t\t*set mind %+20\n\t\t*set stumpbond %+20\n\t\t*goto stats\n\t#Shadowing Seena. She's an amazing fighter, a powerful quickensmith, and a maid rolled into one. Her skills will help both Blanche and I.\n\t\t*set ladybond %+20\n\t\t*set body %+20\n\t\t*set soul %+20\n\t\t*set companionbond %+20\n*label stats\n\n*page_break Act Three\n\nYou wake up with an idea, and go looking for Seena to see what she thinks. Before you find her, you look out a window and see Quiet sitting in a sunny courtyard surrounded by people. When you finally find your way down, only one family is still talking to him. He heals a baby's cough and listens to the child's father talk about his son's uneven hair, and the coming battle, and the smell of wet season on its way.\n\nAs you hang back, not wanting to interrupt, Quiet looks up at you and smiles, creasing his scars into odd patterns. For a moment, you'd forgotten that he doesn't speak. It seems he doesn't need to. When the last of Quiet's visitors says goodbye, he comes to you. His face is heavily marked from the battle that cost him his king, his arm, and his speech—but his expression invites confidence. \n\nThe queen isn't the type to keep someone close out of pity. You would have guessed he was useful for his proven loyalty and magical healing, but perhaps it was his warmth and kindness that she needed most. Despite knowing him less than a day, you feel certain that even with his broken body he'd risk himself for her a second time without hesitation.\n\nTogether you walk to a more private alcove (which may or may not have existed the previous day). \n\n\"The queen's child is important to this battle, isn't it?\" you ask, remembering why you came.\n\nHe nods. \n\n\"Would it be better if the child was already born?\"\n\nHe hesitates, and nods again.\n*choice\n\t#\"She should borrow a baby and say it's hers. I'll tell her what to say.\"\n\t\t*set genre_savvy %-10\n\t\t*if soul>50\n\t\t\t*set mind %+20\n\t\t\t*set fakebaby 1\n\t\t\tQuiet grins at you, and a few hours later the royal couple stands on a custom-magicked balcony in front of an enormous crowd. The queen heaps praise on you and Quiet for saving the life of her premature baby, holding the fake princess high. It was tricky to find just the right baby, but the one you picked is as pink and placid as anyone could hope for. \n\t\t\t\n\t\t\tYou can see the whole island lapping it up until two things ruin it for everyone: the archers on the town walls call out that the invading army is at the gate—and the queen's waters break.\n\t\t\t*set kingbond %+10\n\t\t\t*set queenbond %+10\n\t\t\t*if ((mind>50) and (body>50))\n\t\t\t\t*goto battle\n\t\t\t*else\n\t\t\t\t*goto battle\n\t\t*else\n\t\t\tQuiet grins at you, and a few hours later the royal couple stands on a custom-magicked balcony in front of an enormous crowd. The queen heaps praise on you and Quiet for saving the life of her premature baby, holding the fake princess high.  It was tricky to find just the right baby, and she pees all over the queen at exactly the wrong moment. \n\t\t\t\n\t\t\tThe people aren't buying it. You're trying desperately to think of a new plan when two things happen simultaneously: the archers on the town walls call out that the invading army is at the gate—and the queen's waters break.\n\t\t\t*goto battle\n\t#\"If you and I work together, we can figure out if it's possible to induce the baby safely.\"\n\t\t*if ((mind >40) and (stumpbond>60))\n\t\t\tQuiet hesitates, then nods and leads you to the queen's quarters where she and Blanche are discussing strategy for the coming battle. Evidently the queen has already noticed Blanche's love for complicated puzzles. She agrees to your plan, and dismisses a gaggle of lesser servants so only you, Blanche, and Quiet remain.\n\t\t\t\n\t\t\t\"The king, Quiet and I are the only people who know that this baby is over eight months old, the child of my first husband,\" she says. \"I have publicly announced that she is a girl, and the throne is therefore assured—but not everyone believes it. And not everyone has accepted my second marriage as genuine, so there is some doubt about my likelihood of conceiving the next ruler of Ibu. Hence the invasion by our black-clad visitors. They'd never have dared to attack if they'd known I was with child, but once they were here they didn't want to back down while there was still some doubt about the royal line.\"\n\t\t\t\n\t\t\t\"It has to be a girl?\" Blanche asks.\n\t\t\t\n\t\t\t\"Certainly. Only a woman can truly know a child is her own, and legitimate. I wouldn't have minded having a son, except nature dictates their rule can never be secure.\"\n\t\t\t\n\t\t\t\"Over eight months might be all right,\" you say. \"Quiet, can you tell if her lungs are mature? That's the most life-threatening condition at this stage.\"\n\t\t\t\n\t\t\tThe queen holds Quiet's hand. He pauses in silence for some moments, and then nods.\n\t\t\t\n\t\t\t\"You're sure?\" the queen asks. \"My daughter is more than the savior of our island. She's all I have left of my first and only love.\"\n\t\t\t\n\t\t\tQuiet's calm eyes suddenly fill with tears, and he turns away to gain control of himself. He double-checks that the baby is over thirty-eight weeks old.\n\t\t\t\n\t\t\t\"All right,\" says the queen. \"Let's do this.\"\n\t\t\t\n\t\t\tYour stomach lurches as you realized you've just decided to deliver a baby—and it's not even a natural or technically full-term delivery. \n\t\t\t\n\t\t\tBlanche draws you aside. \"This is the right choice,\" she says. \"And you and Quiet are the right people to help.\"\n\t\t\t\n\t\t\tGathering yourself, you start preparing for the birth: boiling water, sending for clean towels, and offering Queen Enia two meager pain relief tablets to ease her labor a little.\n\t\t\t\n\t\t\tMoments after Queen Enia finally manages to swallow the pills, she asks you, \"Do these make my water break?\"\n\t\t\t\n\t\t\t\"Why would you—oh!\" you say. \"It seems we don't need to artificially induce you after all.\"\n\t\t\t\n\t\t\tAt that moment, you hear the archers on the walls sounding the alarm. The final battle for Ibu Island has begun.\n\t\t\t*goto battle\n\t\t*else\n\t\t\tQuiet hesitates, then nods and leads you to the queen's quarters where she and Blanche are discussing strategy for the coming battle. Evidently the queen has already noticed Blanche's love for complicated puzzles. She agrees to your plan, and dismisses a gaggle of lesser servants so only you, Blanche, and Quiet remain.\n\t\t\t\n\t\t\t\"The king, Quiet and I are the only people who know that this baby is over eight months old, the child of my first husband,\" she says. \"I have publicly announced that she is a girl, and the throne is therefore assured—but not everyone believes it. And not everyone has accepted my second marriage as genuine, so there is some doubt about my likelihood of conceiving the next ruler of Ibu. Hence the invasion of our black-clad visitors. They'd never have dared to attack if they'd known I was with child, but once they were here they didn't want to back down while there was still some doubt about the royal line.\"\t\n\t\t\t\n\t\t\t\"It has to be a girl?\" Blanche asks.\n\t\t\t\n\t\t\t\"Certainly. Only a woman can truly know a child is her own, and legitimate. I wouldn't have minded having a son, except nature dictates their rule can never be secure.\"\n\t\t\t\n\t\t\t\"Over eight months might be all right,\" you say. \"Quiet, can you tell how far along she is?\"\n\t\t\t\n\t\t\tThe queen holds Quiet's hand. He pauses in silence for some moments, and then shrugs his shoulders.\n\t\t\t\n\t\t\t\"You're not sure, I take it,\" the queen says. \"My daughter is more than the savior of our island. She's all I have left of my first and only love.\"\n\t\t\t\n\t\t\tQuiet's calm eyes suddenly fill with tears, and he turns away to gain control of himself. Blanche fills the awkward silence with an impromptu lecture on the latest Brangelina adoption.\n\t\t\t\n\t\t\t\"It was a good idea,\" says the queen to you. \"But I won't risk—oh! My water just broke.\"\n\t\t\t\n\t\t\t\"Oh!\" you say. \"Um, good. Congratulations?\"\n\t\t\t\n\t\t\tAt that moment, you hear the archers on the walls sounding the alarm. The final battle for Ibu Island has begun.\n\t\t\t*goto battle\n\t#\"I might be able to frighten off the invaders if I use resources from my own world to trick them.\"\n\t\t*set genre_savvy %-10\n\t\t*if (soul>40)\n\t\t\tHe nods thoughtfully, pointing at your clothing. \n\t\t\t\n\t\t\t\"Everyone already knows we're from somewhere extremely unusual,\" you agree, \"so we may as well take advantage.\"\n\t\t\t\n\t\t\tTogether you find Blanche and do a thorough inventory of all your belongings. You have clothes, a first aid kit, a few snacks, some unopened soft drink, two empty water bottles, a selfie stick, and your phones.\n\t\t\t\n\t\t\t\"Music,\" you say thoughtfully, looking at the phones. \"Seena can set up some good acoustics inside a very small stone room, and our playlists are shared, so we can have it coming from two directions at once. Do we have something classic and frightening? William Tell Overture, or something?\n\t\t\t\n\t\t\tShe shakes her head. \"We just did a clean out. Miley Cyrus is gone too, I'm afraid.\"\n\t\t\t\n\t\t\t\"Don't try and pretend I was the one who downloaded her.\"\n\t\t\t\n\t\t\tShe shrugs a confession. \"Everyone needs a dark secret. Too bad you already know all of mine.\"\n\t\t\t\n\t\t\tYou scroll through your list, and finally something catches your eye. \n\t\t\t*fake_choice\n\t\t\t\t#\"Queen! Of course! [i]We Will Rock You[/i].\"\n\t\t\t\t\t*set music \"pounding of Queen's rock anthem bursts out\"\n\t\t\t\t#\"Hey look! We've still got [i]In the Hall of the Mountain King[/i] by Edvard Grieg.\"\n\t\t\t\t\t*set music \"first notes of [i]In the Hall of the Mountain King[/i] wash over the crowd\"\n\t\t\t\t#\"Aha! [i]Dulcissima[/i] by Corvus Corax. Perfect.\"\n\t\t\t\t\t*set music \"first notes of [i]Dulcissima[/i] wash over the crowd\"\n\t\t\t\t\t\t\t\n\t\t\t\"Do you really think it'll work?\" Blanche asks.\n\t\t\t\t\t\t\t\t\n\t\t\t\"Fear is an emotion,\" you assure her, \"not a rational process. Music is the most powerful tool we have. This will work—but I need more.\" You spot a pack of mint Mentos in the pile of snacks, and grin. \n\t\t\t\t\t\t\t\t\n\t\t\tAfter speaking with the queen and sending emissaries to bring two of the invaders' men into the specially-designed room for peaceful negotiations, you are ready for your show.\n\t\t\t\t\t\t\t\n\t\t\t\"I am $!{name}, from another world!\" you cry out, making the most of the custom-made acoustics. \"A world with powers you cannot imagine! If you dare to fight, I can and will destroy you. With these white stones I control the waves!\"\n\t\t\t\t\t\t\t\t\n\t\t\tHoping desperately that your diet Coke isn't completely flat, you drop a handful of white Mentos into the mouth of the bottle and watch as it explodes in froth. The  invaders' representatives tremble, but manage to remain standing.\n\t\t\t\t\t\t\t\t\n\t\t\t\"Leave Ibu alone, or see your ships sink. Unlike your magic, mine requires no physical touch. This is your final warning!\"\n\t\t\t\t\t\t\t\t\n\t\t\tWith that, you signal for the music, and the ${music}, apparently from the stone walls. Seena did a good job turning the room into a set of giant megaphones, and the noise is more than you would have expected from a couple of phones. In this world, it's enough. \n\t\t\t\t\t\t\t\t\n\t\t\tThe invaders give up looking tough and fall to their knees. \"Forgive us, Your Majesty!\" they wail. \"Our army is already approaching. We didn't know about your otherworldly magic. Have mercy on us!\"\n\t\t\t\t\t\t\t\t\n\t\t\t\"Run,\" she says. \"Stop your people before they enter my town.\"\n\t\t\t\t\t\t\t\t\n\t\t\tThey turn to flee, but it's too late. The archers on the walls are already sounding the alarm. Ibu's crucial battle has begun. \n\t\t\t\n\t\t\tStanding beside the queen, you see her slump the second the Nakals are out of sight.\n\t\t\t\t\t\t\t\t\n\t\t\tShe lets out an exasperated sigh. \"I'm afraid my water just broke.\"\n\t\t\t*goto battle\n\t\t*else\n\t\t\tHe nods thoughtfully, pointing at your clothing. \n\t\t\t\n\t\t\t\"Everyone already knows we're from somewhere extremely unusual,\" you agree. \"May as well take advantage.\"\n\t\t\t\n\t\t\tTogether you find Blanche and do a thorough inventory of all your belongings. You have clothes, a first aid kit, a few snacks, some unopened soft drink, two empty water bottles, a selfie stick, and your phones.\n\t\t\t\n\t\t\t\"Music,\" you say thoughtfully, looking at the phones. \"Seena can set up some good acoustics in a tiny room, and our playlists are shared, so we can have it coming from two directions at once. Do we have something classic and frightening? William Tell, or [i]In the Hall of the Mountain King[/i]?\"\n\t\t\t\n\t\t\tShe shakes her head. \"We just did a clean out. Miley Cyrus is gone too, I'm afraid.\"\n\t\t\t\n\t\t\t\"Don't try and pretend I was the one who downloaded her.\"\n\t\t\t\n\t\t\tShe shrugs confession. \"Everyone needs a dark secret. Too bad you already know all of mine.\"\n\t\t\t\n\t\t\tYou scroll through your list, and finally something catches your eye. \n\t\t\t*fake_choice\n\t\t\t\t#\"Queen! Of course! [i]We Will Rock You[/i].\"\n\t\t\t\t\t*set music \"pounding of Queen's rock anthem bursts out\"\n\t\t\t\t#\"Hey look! We've still got [i]In the Hall of the Mountain King[/i] by Edvard Grieg.\"\n\t\t\t\t\t*set music \"first notes of [i]In the Hall of the Mountain King[/i] wash over the crowd\"\n\t\t\t\t#\"Aha! [i]Dulcissima[/i] by Corvus Corax. Perfect.\"\n\t\t\t\t\t*set music \"first notes of [i]Dulcissima[/i] wash over the crowd\"\n\t\t\t\t\t\t\t\n\t\t\t\"Do you really think it'll work?\" Blanche asks.\n\t\t\t\t\t\t\t\t\n\t\t\t\"Fear is an emotion,\" you assure her, \"not a rational process. Music is the most powerful tool we have.\"\n\t\t\t\t\t\t\t\t\n\t\t\tAfter speaking with the queen and sending emissaries to bring two of the invaders' men into the specially-designed room for peaceful negotiations, you are ready for your show.\n\t\t\t\t\t\t\t\n\t\t\t\"I am $!{name}, from another world!\" you cry out, making the most of the custom-made acoustics. \"A world with powers you cannot imagine! If you dare to fight, I can and will destroy you. Unlike your magic, mine requires no physical touch. This is your final warning!\"\n\t\t\t\t\t\t\t\t\n\t\t\tWith that, you signal for the music, and the ${music}, apparently from the stone walls. Seena did a good job turning the room into a set of giant megaphones, and the noise is pretty good considering all you've got is two phones and a working knowledge of acoustics. \n\t\t\t\t\t\t\t\t\n\t\t\tThe invaders tremble, but remain standing. \"It's too late,\" one chokes out. \"Our army is already on its way. We were sent as a distraction.\"\n\t\t\t\t\t\t\t\t\n\t\t\tSeveral of Queen Enia's personal guard run into the room and drag them away, but it's too late. The archers on the walls are already sounding the alarm. Ibu's crucial battle has begun. \n\t\t\t\n\t\t\tStanding beside the queen, you see her slump the second the Nakals are out of sight.\n\t\t\t\t\t\t\t\t\n\t\t\tShe lets out an exasperated sigh. \"I'm afraid my water just broke.\"\n*label battle\n\nWhat do you do? \n*choice\n\t#I assist the queen with her labor. \n\t\t*if (mind >53) \n\t\t\t*set companionbond %+10\n\t\t\tYou and Quiet take the queen to Quiet's rooms, and her contractions are already only minutes apart. The walls close around you, making you jump. Ibu's castle labyrinth just became a cage. Queen Enia shows you the colored stones that can be pressed on to signal to Seena that you need to be released. \"Seena and Blanche are keeping watch over the battle from the tower. If the castle is likely to be overrun, this block will move inwards to warn us—ow! Ouch! Oh, that really hurt!\"\n\t\t\t\n\t\t\tHalf-supporting her, you help her to the birthing stool prepared ready for her under a knotted rope she can use to help her squat. \n\t\t\t\n\t\t\t\"Should the king be here?\" you ask, feeling like you're the last person who should be present at such an intimate time.\n\t\t\t\t\t\t\n\t\t\tThe queen pauses, breathing hard, as another contraction rolls through her. \"No,\" she says, and adds under her breath, \"not this one.\"\n\t\t\t\n\t\t\tQuiet is standing behind her, with his hands on her back, and he's shaking like a leaf.\n\t\t\t*if ((soul>65) or (stumpbond > 65))\n\t\t\t\t*set stumpreveal 1\n\t\t\t\n\t\t\t\t\"You're him,\" you blurt out in shock. \"You're the first king—aren't you? Your injuries are magical. They changed how you look, and when you woke and heard your wife was remarried you kept silent so she wouldn't know!\"\n\t\t\t\t\n\t\t\t\tHe hangs his head, and speaks for the first time in a voice as rich as dark chocolate. \"It's true.\"\n\t\t\t\t\n\t\t\t\t\"Rajnin!\" gasps the queen, and screams with another contraction. She grabs wildly at him, trying to reach her first husband with a body that is otherwise occupied. The rope above her swings chaotically, and she loses her balance and falls face-first towards the stone floor. \n\t\t\t\t\n\t\t\t\tQuiet—King Rajnin—dives to the floor and catches her in his good arm, wrapping himself protectively around her as the contraction eases. \"I'm sorry,\" he says in that unmistakable voice. \"I'm sorry, I'm sorry, I'm sorry.\"\n\t\t\t\t\n\t\t\t\t\"My love,\" she says, \"My love!\" She places his hand on her stomach and smiles, as her tears echo his. \"You're going to be a father—Ouch!\"\n\t\t\t\t\n\t\t\t\tAnother contraction hits, and she clings to her beloved husband as he uses all his skill to ease her pain.\n\t\t\t\t*goto ouch\n\t\t\t*else\n\t\t\t\t*label ouch\n\t\t\t\n\t\t\t\t\"Is this normal?\" the queen asks you. \"Have you attended a birth before?\"\n\t\t\t\t\n\t\t\t\tScenes from reality TV flash through you mind. \"I've... seen births.\"\n\t\t\t\t\n\t\t\t\t\"Is it meant to hurt so much?\" she says.\n\t\t\t\t\n\t\t\t\tQuiet has bitten his lip so hard it's bleeding.\n\t\t\t\t\n\t\t\t\tYour heart goes out to them both. \"Is the baby's head down, and facing the queen's back?\"\n\t\t\t\t\n\t\t\t\tHe nods.\n\t\t\t\t\n\t\t\t\t\"How is the queen's blood pressure?\"\n\t\t\t\t\n\t\t\t\tHe looks at you blankly.\n\t\t\t\t\n\t\t\t\t\"Ah, never mind. Yes, everything is going perfectly.\"\n\t\t\t\t\n\t\t\t\t\"What do I do,\" the queen says through clenched teeth, \"when I feel like pushing?\"\n\t\t\t\t*page_break\n\t\t\t\t\"Push,\" you say with a smile you hope doesn't look as much like a terrified grimace as you think. \"As the contractions come, use them to push the baby out. Quiet, you can maybe help—but it needs to take time, or Queen Enia's body will be hurt. Erm... more hurt than it has to be.\"\n\t\t\t\t\n\t\t\t\tHe steadies her, and she delivers her baby into his arms. The newborn princess is perfect—goopy, red-faced, and perfect, with chocolate skin and masses of black hair.\n\t\t\t\t\n\t\t\t\tWith an effort, you remember the battle outside and go to press your hands on the colored brick. The wall promptly opens up, and you come face to face with a half-dozen of Queen Enia's personal guard.\n\t\t\t\t\n\t\t\t\t\"We need a litter for the queen. Her daughter is born\n\t\t\t\t*if stumpreveal = 1\n\t\t\t\t\t, and her husband returned to life\n\t\t\t\t\t*goto life\n\t\t\t\t*else\n\t\t\t\t\t*label life\n\t\t\t\t\tat last. Ibu's people need to know what they're fighting for.\"\n\t\t\t\t\t\n\t\t\t\t\tThe closest guard repeats you word for word and rushes off. Meanwhile, Quiet fusses over the queen, while she in turn fusses over the princess.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*if stumpreveal = 1\n\t\t\t\t\t\t*achieve figuredhimout\n\t\t\t\t\t\t*goto minutes\n\t\t\t\t\t*else\n\t\t\t\t\t*label minutes\n\t\t\t\t\tIn minutes, you find yourself high above the town, where Seena creates a convenient balcony and the queen lifts her naked daughter high over her island. It's too far for arrows, but not too far for sight. Slowly, more and more people see the princess. \n\t\t\t\t\t*if fakebaby = 1\n\t\t\t\t\t\tNo-one seems to mind that the baby has suddenly grown a glorious mop of black hair.\n\t\t\t\t\t\t*goto mehbaby\n\t\t\t\t\t*else\n\t\t\t\t\t*label mehbaby\n\t\t\t\t\t\n\t\t\t\t\tSome of the invaders simply turn and flee, knowing they no longer have a hope of a legitimate claim over Ibu. Others fight on, determined to rule. But the townspeople overwhelm them with shouts of mingled joy and fury. Within an hour, the battle is done, and the black ships leave Ibu Island's shores.\n\t\t\t\t\t\n\t\t\t\t\t\"We did it!\" you say, but no-one answers. The queen and her daughter are fast asleep. \n\t\t\t\t\t*achieve madeadifference\n\t\t\t\t\t*if stumpreveal = 1\n\t\t\t\t\t\tKing Rajnin lies sprawled at her feet, draped over her legs protectively even as he snores. His arm reaches upwards, where his daughter's hand is wrapped around his finger.\n\t\t\t\t\t\t*goto qb\n\t\t\t\t\t*else\n\t\t\t\t\t\t*label qb\n\t\t\t\t\t\t*set queenbond %+20\n\t\t\t\t\t\t*goto wombat\n\t\t*else\n\t\t\tYou and Quiet take the queen to Quiet's rooms, and her contractions are already only minutes apart. The walls close around you, making you jump. Ibu's castle labyrinth just became a cage. Queen Enia shows you the colored stones that can be pressed on to signal to Seena that you need to be released. \"Seena and Blanche are keeping watch over the battle from the tower. If the castle is likely to be overrun, this block will move inwards to warn us—ow! Ouch! Oh, that really hurt!\"\n\t\t\t\n\t\t\tHalf-supporting her, you help her to the birthing stool prepared ready for her under a knotted rope she can use to help her squat. \n\t\t\t\n\t\t\t\"Should the king be here?\" you ask, feeling like you're the last person who should be present at such an intimate time.\n\t\t\t\n\t\t\tThe queen pauses, breathing hard, as another contraction rolls through her. \"No,\" she says, and adds under her breath, \"not this one.\"\n\t\t\t\t\t\n\t\t\tQuiet is standing behind her, with his hands on her back, and he's shaking like a leaf.\n\t\t\t*if ((soul > 65) or (stumpbond > 65))\n\t\t\t\n\t\t\t\t\"You're him,\" you blurt out in shock. \"You're the first king—aren't you? Your injuries are magical. They changed how you look, and when you woke and heard your wife was remarried you kept silent so she wouldn't know!\"\n\t\t\t\t\n\t\t\t\tHe hangs his head, and speaks for the first time in a voice as rich as dark chocolate. \"It's true.\"\n\t\t\t\t\n\t\t\t\t\"Rajnin!\" gasps the queen, recognizing his voice, and screams. She grabs wildly at him, trying to reach her first husband with a body that is otherwise occupied. The rope above her swings chaotically, and she loses her balance and falls face-fi
