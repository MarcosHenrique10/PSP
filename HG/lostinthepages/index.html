<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lost in the Pages — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "lostinthepages", "title": "Lost in the Pages", "scenes": {"addicted_tale": "*set body_name \"Strength\"\n*set mind_name \"Intelligence\"\n*set soul_name \"Social Instincts\"\n\n*set health -20\n\n*temp aha 0\n\nYou open your eyes to a grubby college dorm.\n*if (stories_completed > 1)\n\tWho knew being inside a book would stink so much? Stepping into the shoes of a fictional character is surprisingly gross.\n\t\n*if (stories_completed \u003c 2)\n\tThere are a bunch strong scents you don't think you ever smelled before tickling your nostrils.\nIt's difficult to decide which smell is the most potent. Is it the fridge, overflowing with mysterious goop from the last three roommates (and how is it possible that you suddenly know all their names)? Is it the lingering scent of peanut butter that chased away one of those roommates before he went into anaphylactic shock for the third time in a week (even though everyone checked there were no peanuts anywhere)? Is it the stale sweat and mold that you can only assume is typical for university dorms, since the character you inhabit has never known anything else? Is it the creepy fish tank that appeared yesterday with a slithering, crawling, staring mass of axolotls inside? Is it the blow flies in dead and dying rows along every windowsill? Is it the kangaroo poo that never stops piling up outside the living room window—the unique fourth wall, since every other dorm is attached to identical cells on left and right, while yours has the so-called privilege of bushland views?\n*fake_choice\n\t#Kangaroo poo? Is this Australia? Don’t they have all the worst spiders and snakes?\n\t\tIs this suddenly going to turn into a survival story? I can’t imagine that would be pleasant.\n\t\t*set genre_savvy %+10\n\t#It’s a pretty nice window for a dorm, actually. May as well enjoy it while I’m here.\n\t\tToo bad I can’t help watching a blow fly slowly dying on the windowsill.\n\t\t*set genre_savvy %-10\n\t#Is this humor? That means I don’t die. . . right? Unless it’s a black comedy.\n\t\tI can’t imagine it would be pleasant to be a character in a black comedy.\n\t\t*set genre_savvy %+10\n\nSpeaking of unpleasant, it’s the fridge that stinks the most. Definitely the fridge. Fei Fei (aka the room-mate before Hassan-of-the-peanut-horrors, and you could swear you and Fei Fei never had peanuts) was studying some kind of chemical/biological mishmash, and she liked putting recycled jars marked \"DO NOT EAT\" and \"EVEN IF YOU ARE DYING SERIOUSLY DON'T EVEN TOUCH THIS\" on her shelf.\n\nMum was right. You’re not an adult. For a moment your mind rebels, pointing out that you absolutely are an adult, with a job and an uncle who calls on you for help—but then you sink fully into character, and utterly believe the doubts running through your head.\n\nBefore you fully forget why you’re here, you see a note stuck to the fridge:\n\n“Hello $!{name}. I’m all right—for now. Hope to see you soon! Uncle Irwin.”\n\t\nYou grab it with a shaking hand, realizing with a single touch that the note has been there for days or weeks. It’s covered in old, dry stains. But at least you’re on the right track!\n\nBut who are you this time?\n\n*page_break Well. . .\n\nYou don't clean, you don't garden, you don't report broken locks to the people that fix things, and for the last week you’ve been too scared to even open the fridge. The seal is broken, so someone needs to deal with it stat. Someone who’s not you.\n\nYou really should get a new fridge. That would be easier than trying to face it. You sigh. Maybe you’ll deal with it tomorrow.\n\nFei Fei was cool. You liked her, even if she insisted on putting a chair under the doorknob each night and keeping the windows closed. What with Mom's frequent and \"spontaneous\" visits, you were practically grateful. For one thing, she was often hanging around in the dorm before you finished class, so you didn't get random amphibians appearing while you were off at a lecture. Until now.\n*fake_choice\n\t#What’s Mom up to now anyway? Isn’t it time for her bi-weekly guilt trip?\n\t\tYou tell yourself not to think about Mom. That never ends well. You try to focus on something—anything—else.\n\n\t\t*set soul %+10\n\t#Night’s falling. Better get out of here before some disgusting plot kicks off.\n\t\tToo late.\n\t\t*set genre_savvy %-10\n\t#Do some yoga. Maybe it’ll help you ignore the smell.\n\t\tYou stretch a little, but it’s no use. Your dorm is truly revolting.\n\t\t*set body %+10\n\nOut of the corner of your eye you see a different kind of nauseating squirm in the fish tank and force yourself to look at the creepy water lizard things again. Tiny purple-red worms have escaped from their little container and now cover the gravel all along the bottom of the tank. The axolotls gobble at their live food, leaving bloody strings dangling from their mouths like spaghetti. \n\nYou stumble backwards, retching, and pull out your phone ready to beg the nearest administrator for a different roommate to whoever owns those beasts. One of the amphibians climbs up on a rock to catch a small knot of stray wrigglers, splaying its front feet to press the worms into the ground before devouring them and looking for more.\n\n*page_break Knock, knock.\n\n\"Hello?\" says a heavily-accented voice from your unlocked dorm room door. She sounds a lot like Hassan, so she must be Indonesian too.\n\nShe tries the knob, and of course the door opens. You find yourself face to face with a tiny girl who looks just as lost as you feel. Her long black hair is caught in the straps of her mock-Adidas backpack and she lets out a terrified squeak when she sees you.\n\n\"Hello,\" she says again. \"Are you $!{name}?\"\n\n\"Yes. Are you my latest roommate?\"\n\n\"Room...Mate,\" she says. “Yes. My name is Yanti.\"\n\n\"Hello Yanti,\" you say, trying to figure out a way to leave her alone without being rude. \"Uh... good. To meet you.\"\n\n\"Yes?\" she says, obviously panicked by the prospect of making awkward small talk in her second language. You can’t help suspecting that she’s exaggerating her accent in order to avoid being social.\n*fake_choice\n\t#”What are you studying?”\n\t#”Can you cook?”\n\t#”Felicitations on your recent language acquisition.”\n\nAt that moment the power cuts out with an audible bang. In the silence immediately following your plunge into darkness, you hear the scritch, scratch, scritch of your non-human neighbors. The ones that live in the roof.\n\n\"What is...\" whispers Yanti, and her voice chokes off completely.\n\n\"It's fine!\" you say with desperate cheer. \"It's just...\"\n\n[i]Auuuuuaeeeeeoooooogh!!! Hisssssssssss![/i]\n\n\"Possums!\" you say. The unearthly howling is perfectly natural. Birds and bees and suchlike. \"An animal! Like a... like a cat.\"\n\n\"A cat?\" comes Yanti's disembodied voice, sounding suspicious now instead of afraid.\n\n\"Small,\" you say. \"Yes.\"\n\nBefore making anything worse, you. . .\n*choice\n\t#Light some candles. College dorms are always having power outages. Especially fictional ones.\n\t\t*set genre_savvy %+10\n\t\tYanti gives you a tiny smile in the flickering light. You shudder as the axolotls move behind her. Sometime when it’s not so awkward, you’ll have to beg her to keep them in her room.\n\t\t*goto hey\n\t#Turn on your phone light. It’s bright and steady and will hopefully dispel the ominous mood before the plot gets nasty.\n\t\t*set genre_savvy %-10\n\t\tYanti gives you a tiny smile as you shine the beam to light the path to her room. You shudder as the axolotls move behind her. Sometime when it’s not so awkward, you’ll have to beg her to keep them in her room.\n\t\t*goto hey\n\t#Excuse yourself, and go to bed. No need to give yourself an asthma attack.\n\t\t*set health +10\n\t\tYou pick your way through the room by the dull moonlight, and go straight to bed. Your stomach rumbles, but you ignore it and close your eyes against the darkness. No point wasting your phone battery, and it’ll be an early morning. Stupid classes.\n*label hey\n\n[i]Crash![/i] \n\nThe window!\n\n\"Yanti!\" you say loudly, wondering if she’s been hit by the glass. \"Are you all right? Can you hear me?”\n\nYour enormous fourth-wall window is absolutely shattered, and a dead kangaroo is sprawled on your carpet. This is too much! Kangaroos started off charming, then they became a nuisance, and now one of them has attempted to bounce right into your living room to—what?—feed the axolotls another pack of blood worms?\n\nYou look back at the fish tank and for a moment you feel relieved that it’s now shattered on the ground, and completely empty. The kangaroo knocked it right off the table. Your carpet is ruined, but it’s worth it. Then you realize the axolotls are free, and you don't know where they are.\n*choice\n\t#Are they on you???\n\t\tWhat’s that on your leg!? You scream and shake your leg, but of course there was nothing there. You imagined it. You consider changing into jeans for some measure of protection, but at that point you just want to run away.\n\t\t*goto pooka\n\t#Where’s Yanti???\n\t\tYou call her name again, and hear the crunch, crunch as she walks silently across the room. She’s heading for the fridge! \n\n\t\t“Nooo!”\n\n\t\tToo late.\n\t\t*goto pooka\n\t#Is the kangaroo really dead???\n\t\tYou grit your teeth and take a closer look at the dead creature. It’s bleeding in a dozen places, including a deep slash across its neck.\n\t\t\n\t\tThe cut on its neck is different to the rest. Deeper. Longer. It almost looks like it wasn’t made by the broken window at all.\n*label pooka\n\nWhen your stomach cramps again, you realize Yanti has opened the fridge to try and find... something useful. Right there on the top shelf one of Fei Fei's jars has popped its lid and the \"EVEN IF YOU ARE DYING SERIOUSLY DON'T EVEN TOUCH THIS\" label is half obscured by something like creamed broccoli that’s been crossed with some blue-green algae. But that isn't the worst part. The worst part is what was once some kind of curry. It sits in an uncovered bowl in the exact middle of the top shelf, and is full to the brim with what looks at first like large grains of white rice.\n\nMaggots. Hundreds of them. In your fridge.\n*fake_choice\n\t#Scream.\n\t#”Yanti! Shut the door!”\n\t#Don’t take your eyes off them.\n\nThey writhe like a pit of snakes, and drop like spilled milk over the sides of the bowl. Yanti closes the door carefully and steps away. Her face is curiously blank, as if she’s simply given up on life after too much horror in the space of ten minutes.\n\n\"I know... those things,\" she says, pointing at the fridge. \"I know blackouts,”—pointing at the useless bulb in our ceiling. \"But do kangaroos usually...\" she turns to the shattered window, where a breeze is already carrying pollen inside to set off your asthma, \"do that?\"\n\n\"Oh!\" you say. \"Nope, this is the first time. Don't worry if you ever see eyes looking at you through the glass. It's just kangaroos. We really should get some curtains.”\n\n\"It is... what?\" she says.\n\nAfter imitating a kangaroo peering into a window for Yanti's benefit, you remember the axolotls and all the fun of looking like an idiot fades away. Outside, the eerie screaming begins again. This time it isn't possums. You try desperately to tell yourself someone’s just being silly. Everyone told you moving out of home would be too hard for you, but you hadn't expected to be attacked by insane kangaroos, haunted by possums—and whatever the new screaming is—and without power or a usable fridge. You duck out of the way of a drift of white tree-fluff, and \n*choice\n\t#Call Fei Fei to ask about her experiments.\n\t\tYou phone your ex-roommate and explain that you need to empty and clean the fridge, but you aren't sure what to do with her experiments.\n\t\t\n\t\t\"I'll be right there,\" she says. \"I can explain everything. Just tell me one thing - do you have a new roommate?\"\n\t\t\n\t\t\"Yes,\" you say, and hear her gasp.\n\t\t\n\t\t\"Who?\"\n\t\t\n\t\t\"Yanti,\" you say. \"She's a bit concerned about our suicidal wildlife, but I'm sure she'll be--\"\n\t\t\n\t\t\"Fine,\" says Fei Fei, no longer listening. \"Don't touch anything until I get there.\"\n\t\t\n\t\tWhen Yanti comes out from putting her bag in her room, the fridge door opens all by itself and the broccoli sludge slides down the side of the fridge, leaving a silver trail, and then humps away towards the door like an enormous caterpillar.\n\t\t\n\t\t\"What is...?\" said Yanti faintly.\n\t\t\n\t\t\"I don't know,\" you say, shaken. \n\t\t\n\t\tYou walk after it carefully as it slides out the door and across the green grass towards the trees.\n\t\t\n\t\tSeveral pellets of kangaroo poo stick to it as it moves closer to the leaf litter at the bushland's edge. You almost cry when you realize it could be dangerous and you clearly need to stop it getting loose. For once in your life, you have to act like a grown up. Trying not to think about what you’re doing, you run and grab the sludge with both hands.\n\t\t\n\t\tIt burns your skin as if you’ve touched a hot stove, and you drop it reflexively. It scuttles away as if it’s suddenly grown legs. Perhaps it has.\n\t\t*set mind %+10\n\t\t*goto beep\n\t#Decide to turn the fridge into a raised flower garden beside the door. \n\t\tRotten food is close enough to compost if you pile enough dirt on top. Yanti puts her backpack in her room and helps you carry the fridge out and tip it onto its back. The pair of you work in panting silence to fill the entire horrid body of the fridge with dirt, starting with the maggot-filled bowl.\n\t\t\n\t\tYou were starting to feel like congratulating yourself for a job cheaply and dodgily done, when the dirt in the middle of your new garden bulges upwards and the broccoli sludge emerges like the world's fastest plant. It shakes itself free of loose dirt and slides down the side of the fridge, leaving a silver trail. Then it humps away towards the bushland like an enormous caterpillar.\n\t\t\n\t\t\"What is...?\" says Yanti faintly.\n\t\t\n\t\t\"I don't know,\" you say, shaken. \n\t\t\n\t\tSeveral pellets of kangaroo poo stick to it as it moves closer to the leaf litter at the bushland's edge. You almost cry when you realize it could be dangerous and it’s up to you to stop it getting loose. For once in your life, you have to act like a grown up. Trying not to think about what you’re doing, you run and grab the sludge with both hands.\n\t\t\n\t\tIt burns your skin as if you’ve touched a hot stove, and you drop it reflexively. It scuttles away as if it has suddenly grown legs. Perhaps it has.\n\t\t*set body %+10\n\t\t*goto beep\n\t#Gather people outside for a spontaneous barbecue party. It’ll be a nice safe way to help people chill out.\n\t\t*set soul %+10\n\t\t“Okay,” you say. \"I have condiments in my room. Someone's bound to have a pile of meat they need to eat now that the power's off. Let's go find those people and have a barbecue.\"\n\t\t\n\t\t\"Barbecue,\" says Yanti, with perfect pronunciation. \"Yum! Outside good.\"\n\t\t\n\t\tBut when she comes out from putting her bag in her room, the fridge door opens all by itself and the broccoli sludge slides down the side of the fridge, leaving a silver trail, and then humps away towards the door like an enormous caterpillar.\n\t\t\n\t\t\"What is...?\" says Yanti faintly.\n\t\t\n\t\t\"I don't know,\" you say, shaken. \n\t\t\n\t\tYou walk after it carefully as it slides out the door and across the green grass towards the trees.\n\t\t\n\t\tSeveral pellets of kangaroo poo stick to it as it moves closer to the leaf litter at the bushland's edge. You almost cry when you realize it could be dangerous and it’s up to you to stop it getting loose. For once in your life, you have to act like a grown up. Trying not to think about what you’re doing, you run and grab the sludge with both hands.\n\t\t\n\t\tIt burns your skin as if you’ve touched a hot stove, and you drop it reflexively. It scuttles away as if it’s suddenly grown legs. Perhaps it has.\n*label beep\n\nA lot of people are standing around outside chatting, since it’s a warm night. Several are cheerfully discussing your broken window, and of course you’re the only witness to the escape of the sludge monster. \n*fake_choice\n\t#”Help! Somebody!”\n\t\t*set soul %+10\n\t#”Have any of you met someone called Irwin?”\n\t\t*set mind %+10\n\t#”Yanti, what are we going to do?”\n\t\t*set mind %+10\n\nIt’s no use! Yanti is shaking with terror and everyone else is distracted by a faculty member in a red dress handing out free beer.\n\nThe entire student body is about to get roaring drunk. No one is going to listen to you, and no one is going to help you.\n\nThe woman in red looks right at you and gives you a vicious smile.\n*fake_choice\n\t#She’s not from this world either!\n\t#Why is she making everything harder?\n\t#The hatred is mutual.\n\nYou try to get closer to her, but by the time you reach the beer the lady in red has vanished. Maybe in the next book you’ll be able to deal with her. This book has its own problems.\n\nYou spot a girl you know from your Tuesday morning tutorial and decide she’s your best chance of help tracking down Fei Fei’s sludge creature.\n\n\"Carol!\" you call, and she comes over at once and introduces herself to Yanti. \"We have a couple of issues,\" you say quickly, and explain everything. \"I'll see if I can catch the sludge thing. The window will get fixed by somebody I'm sure, but there are six axolotls running loose in there and I'm sure”—you’re unable to suppress a shudder—“Yanti wants them back.\"\n\n\"Fish phobia, huh?\" says Carol sympathetically.\n\n\"No, not fish. Fish stay where you put them.\"\n\n\"I'll find them for you, don't worry.\" She heads inside, and you attempt to mime \"axolotl\" to Yanti, settling at last on \"your fish\".\n\nShe shakes her head emphatically. \"My fish? No. Your fish.\"\n\nYou swear in delighted relief. \"They must have been brought to the wrong room!\"\n*choice\n\t#Call Mom. It’s weird going through misery without her watching and judging me.\n\t\tMom’s phone is busy. Fine.\n\t\t*goto hiccup\n\t#Tell Carol the axolotls are in the wrong room.\n\t\tYou open the door to see Carol crooning baby talk to two axolotls she’s cradling in her hands. Ew! You back away and let her have her fun.\n\t\t*goto hiccup\n\t#Tell Yanti the axolotls aren’t yours either.\n\t\t“Oh!” she says. “That’s good!”\n*label hiccup\n\nNow all you have to do is find an escaped sludge-thing in the dark, in woodland, in Australia. With pollen flying all through the air like snow.\n*set health -10\n\nFei Fei catches up to you as you gaze into the pollen-laden trees wishing you could simply assume the creature was imaginary.\n\n\"One of your experiments has escaped,\" you tell her, curious about her reaction. \n\nShe flicks back her straight hair and bites her lip. \"Which way did it go? We need to get it back.\"\n\nYanti raises her eyebrows.\n\n\"You're not very surprised,\" you say drily.\n\n\"We'll talk details later,\" she says airily. \"First we need to find it. It's only partially trained so far. And I'll need time with you later to apologize properly—for everything. How do you want to do this?\"\n*choice\n\t#”I’ll go after it so you can stand guard here. I'll keep my phone on so we can maintain contact.”\n\t\t*set genre_savvy %+10\n\t\tYou pull your T-shirt over your nose and mouth in the desperate hope that it’ll protect you from the worst of the tree spores, and head into the dark. The light of your phone bounces and dances off the trees, making every shadow wriggle like the maggots you left behind. Soon, you can't hear anyone except Fei Fei's tinny voice through your phone.\n\t\t\n\t\tAnd then your phone battery runs out, and you are completely alone.\n\t\t*goto heya\n\t#”Let's get a group of people together. There's safety in numbers—assuming it doesn't burn anyone else.”\n\t\t*set genre_savvy %-10\n\t\tYou pull your T-shirt over your nose and mouth in the desperate hope that it’ll protect you from the worst of the springtime hazards, and head into the dark. The light of your phones bounce and dance off the trees, making every shadow wriggle like the maggots you left behind. You space yourselves out a little better so you’re covering a large area, but Fei Fei is still somewhat vague about exactly what you’re looking for.\n\t\t\n\t\tWhen you ask her why she didn't take it with her when she moved out, she doesn't answer. In fact, she doesn’t answer anyone. She’s vanished!\n\n\t\tThe group splits up to find her, and then splits up again when someone twists an ankle. Soon only you and Yanti are left, and then you turn a corner on a false path, and wait for her to catch up—but she never does.\n\t\t\n\t\tAnd then your phone battery runs out, and you are completely alone.\n\t\t*goto heya\n\t#”You're the scientist. You tell me.”\n\t\t\"I should go find it,” she says. \"I know how it thinks. But I'll call you so you can hear everything I'm doing.\"\n\t\t\n\t\t\"All right,\" you say, pleased to stay near civilisation.\n\t\t\n\t\tLess than ten minutes later, she says, \"It's here! I've got it. Can you meet me so we can catch it together?\"\n\t\t\n\t\tYou pull your T-shirt over your nose and mouth in the hope that it’ll protect you from the worst of the asthma-inducing spores, and head into the dark, following her directions as well as you can. The light of your phone bounces and dances off the trees, making every shadow wriggle like the maggots you left behind. Soon, you can't hear anyone except Fei Fei's tinny voice through your phone.\n\t\t\n\t\tAnd then your battery runs out, and you are completely alone.\n\t\t*set mind %+10\n*label heya\n*fake_choice\n\t#Scream.\n\t#Cry.\n\t#Try to retrace your steps.\nIt’s no use. You’re utterly lost, and utterly alone.\n\nYou sit down and do your best to steady your ragged breathing, but the darkness is rustling all around and you’re getting more terrified all the time. Still holding your phone like a talisman, you stand and peer into the dark. Then you heard it: a different noise. Running water. You’ve never been into the bushland before, but other students have told you there’s a stream just inside that runs all the way down to the highway far below. That stream will lead you home if you just follow it uphill. \n\nSomehow, you no longer care about finding the sludge. Frankly, you hope it’s long gone. Maybe one of Australia’s plethora of venomous snakes or spiders has already killed it.\n\n*page_break\nYou hurry through the trees, ignoring the scratches and bruises as branches catch on your shorts and whip across your bare legs. Should have changed into jeans when you had the chance. Pale bark peels off the eucalyptus trees like skin sloughing off a chemical burn.\n\nYou walk faster, trying not to sob and give yourself a full-blown asthma attack.\n\nLoose rocks crumble under your feet and you land hard on your side. Something trickles down your arm and you desperately hope it’s just blood. The water is louder now. As soon as you stand up you see it, and feel glad you fell sideways instead of forwards. There’s a sheer cliff on the near side of the stream, with a crumbling edge that could have tipped you over and likely broken your neck on the rocks below. You peer over to check the direction of the water, and that’s when you see her.\n\n*page_break\n\nEven though her body is swollen and crawling with bugs, the  girl half-submerged in the water is familiar. You saw her in a picture on Fei Fei's computer before Fei Fei moved out.\n\nIt’s Charlotte. The girl who had your room before you.\n\nFor a moment, you think it was an accident. Then you remember how she simply disappeared from all her classes one day, and never told anyone she was moving home. People did the same thing all the time... but they took their stuff with them. Who took Charlotte's things?\n\nSomeone killed  and your vision begins to flash with false lights. \n\t\t\t\n\t\t\tBut then you see a real light coming through the trees—Carol, with a torch.\n\t\t\t*goto carol\n\t#Fei Fei was always weird about Charlotte. Now you understand why, and you know what to do.\n\t\t*if soul > 54\n\t\t\t*set mind %+10\n\t\t\tYour unerring instincts tell you that Fei Fei’s not guilty—she’s afraid. She already suspected who the murderer was. The instant you realize the truth, you see a torch bobbing through the trees. When Carol emerges with it you need all your small store of courage to pretend to be happy to see her.\n\n\t\t\tShe’s not looking for the sludge monster, but looking for Charlotte’s dead body!\n\t\t\t*set aha 1\n\t\t\t*goto carol\n\t\t*else\n\t\t\tFei Fei is the killer! You have to get away and tell someone your suspicion. It has to be Fei Fei. . . right?\n\t\t\t\n\t\t\tAt that moment you see a torch bobbing through the trees, and when Carol emerges with it you nearly weep with relief.\n\t\t\t*set mind %-10\n*label carol\n\n\"Huh,\" says Carol. \"Look at you, out here all alone.\"\n\n\"Looking for a monster,\" you say, and realize your words sound like an accusation when her eyes flash with fear.\n\nOh.\n\nNot good.\n\n*page_break Really really not good.\n*if (aha = 1)\n\t*achieve whodunnit\n*if (aha != 1)\n\t*goto oho\n*label oho\n\"I'm a bit lost,\" she says, not even trying to sound convincing. \"I thought I might use the stream to get back. Do you know where it is?\"\n\n\"Nope,\" you say, trying to look like you haven't just seen maggots crawling out of Charlotte's eye sockets. \"What stream?\"\n\nShe walks closer, and your chest tightens. You feel yourself getting lightheaded, and decide you’d rather die of an asthma attack than get murdered. Even if it really amounts to the same thing.\n\nLooking at her face, you change your mind. She'd better murder you properly. No-one will believe that yet another roommate has simply vanished off the face of the earth. Mom certainly hen Fei Fei, and wait. The dog sits and grins at you, and you dearly wish you could pat him without compromising your ability to breathe.\n*fake_choice\n\t#Pat it anyway.\n\t\t*set health %-10\n\t#”Who’s a good dog?”\n\t#Discreetly move farther away.\n\t\t*set health %+10\nFei Fei finds you first, close on the heels of her sludge monster.\n\n\"Good boy!\" she croons at it, and holds open a hessian bag. It obediently flops inside. \n\n\"Okay,\" you say, \"so I'm pretty sure Carol murdered Charlotte, poisoned Hassan somehow, and might have thrown a kangaroo through my window today. And maybe cut the power? And screamed like a banshee, which still wasn't quite as scary as normal possums?\"\n\nFei Fei nods. “Yes, she did all of that.”\n\n\"Leaving aside the issue of you suspecting her of killing everyone who lived in the Southern dorm --\"\n\n\"Everyone thought you'd move home really soon,\" she cut in. \"You weren't a threat, so you were safe from Carol while I gathered evidence. I created my... monster. . . to protect you, until I had the evidence to stop Carol from murdering more people.\"\n\nMom's face brightens while you resist the urge to slap them both. You say. . .\n*fake_choice\n\t#”I’m not moving back home!”\n\t#”I hate that death trap of a dorm.”\n\t#”I hate both of you.”\n\nFei Fei winces sympathetically.\n\nYou say, ”But what I really want to know is what that... thing... in your bag is.\"\n\nShe looks at her bag as if she’s seen it for the first time. \"A triumph of experimental biology! It's semi-sentient and I made it! I'm going to win the Nobel Prize with this baby.\"\n\nYou’re about to ask exactly why her thesis monster had to grow in [i]your[/i] fridge when Carol appears behind her. And this time she has a knife raised to attack!\n*choice\n\t#Scream a warning: this is definitely a horror story, and the only way to convey that horror is with a scream.\n\t\t*if (genre_savvy + soul) > 109\n\t\t\tFei Fei throws herself flat on the ground, and rolls to the side as Carol tries to stab her. Mom lets go of Gerald's leash and he stands guard over all three of you, keeping Carol at bay until the police arrive. \n\t\t\t\n\t\t\t*goto alive\n\t\t*else\n\t\t\tFei Fei flinches away from you, right into Carol's arms. You overestimated how well she knew you! Carol draws her knife across Fei Fei's neck, spraying blood onto the dry leaves. \n\t\t\t\n\t\t\t\"Who's next?\" she says, but she’s looking right at you. \n\t\t\t\n\t\t\tMum stands helpless, with her mouth open, as Carol comes at you with her knife. You’re not Mum’s little baby any more, and she can't protect you.\n\t\t\t\n\t\t\tCarol stabs you again and again, while Gerald barks and barks, still restrained by the leash in Mom's frozen hand.\n\t\t\t*goto dead\n\t#Yell at Gerald to attack: Dogs rarely die in fiction, and his attack will take Carol by surprise.\n\t\t*if (genre_savvy + mind) > 109\n\t\t\tAs you yell at Gerald, you knock the end of the leash out of Mom's frozen hand. The puppy springs for Carol, knocking her to the ground. Fei Fei grabs the knife from Carol, standing back and holding it out in front of her like a medieval knight's broadsword. The three of you surround Carol and keep her there until the police arrive.\n\t\t\t\n\t\t\t*goto alive\n\t\t*else\n\t\t\tGerald bounds towards Carol and Fei Fei, but the end of his leash is stuck in Mom's frozen hand. You should have thought of that!\n\n\t\t\tCarol hesitates for a fraction of a second, and Fei Fei twists and grapples with her. It’s not enough, and Carol stabs her over and over until she stops moving.\n\t\t\t\n\t\t\tYou grab Mom's hand, and you both run until you can't run any more. When you hear sirens, you walk towards them. The police dogs give Gerald a single quelling look and then bound into the trees. Within half an hour, they’ve found Carol—and two dead bodies.\n\t\t\t\n\t\t\tYou’re safe, but you can't stop crying.\n\t\t\t\n\t\t\t\"Why don't you come home with me?\" Mum croons, certain you won't fight her.\n\t\t\t*page_break\n\t\t\tYou scrub your face with your hands. \"No. Not now, not ever. This is my home now.\"\n\t\t\t*goto alive\n\t#Run right past Carol towards the dorms: You’re fitter than she is.\n\t\t*if (genre_savvy + body) > 109\n\t\t\tYou gather what breath you have and sprint right past Carol. She swipes at you with the knife and you feel the wind of it on your arm as Fei Fei twists to grab it off her. \n\t\t\t\n\t\t\tCarol chases you all along the stream, but when you emerge from the trees the police are waiting.\n\t\t\t*goto alive\n\t\t*else\n\t\t\tYou gather what breath you have and sprint right past Carol. She swipes at you with the knife and you feel the wind of it on your arm as Fei Fei twists to grab it off her. \n\t\t\t\n\t\t\tCarol shrugs off Fei Fei's attack and chases you, pounding the dead leaves underfoot. Your body betrays you, and you have to stop, gasping for air.\n\t\t\t\n\t\t\t\"I knew you'd be easy,” says Carol. \"You should have just moved home.\"\n\t\t\t\n\t\t\tShe pushes you deeper into the leaf litter and slits your throat.\n\t\t\t*goto dead\n\t#Attack Carol: No-one ever thinks to attack the killer directly, and she’ll be surprised at how strong you are.\n\t\t*if (genre_savvy \u003c 46) and (body > 50)\n\t\t\tYou run straight at Carol and knock her over. Fei Fei grabs her knife and the two of you guard her until the police come. Mum is talking to herself, as she usually does when she’s not coping.\n\t\t\t*goto alive\n\t\t*else\n\t\t\tYou run straight at Carol but you can't move fast enough and she simply twists and lets you impale yourself on her blade. Fei Fei screams as you kneel gasping on the ground, but then Carol slices her throat and she doesn't make another sound. You and Fei Fei die side by side.\n\t\t\t*goto dead\n\t#Throw the sludge at Carol: It’s an out-of-the-box solution that no-one else would think of.\n\t\t*if (genre_savvy \u003c 46) and (mind > 50)\n\t\t\tYou grab the bag from Fei Fei and when Carol lunges for you, you open it and throw it right at her. It breaks open and sticks to her arm as if it’s glued in place. Carol screams and drops her knife, but the sludge doesn't let go. She’s still screaming when the police arrive to arrest her.\n\t\t\t*goto alive\n\t\t*else\n\t\t\tYou grab the bag from Fei Fei and throw it right at Carol. It bounces off her face and falls to the ground, still in its bag. You should have thought to open it! Fei Fei runs, dragging Mum and Gerald with her. \n\t\t\t\n\t\t\tCarol puts the knife at your throat and walks you to the edge of the gorge. \"Jump,\" she says.\n\t\t\t\n\t\t\t\"No. We already called the police. It's over, Carol.\"\n\t\t\t\n\t\t\t\"You ruined everything!\" she screams, and pushes you over the edge. \n\t\t\t\n\t\t\tYou fall on the rocks head-first, and feel your skull shatter.\n\t\t\t*goto dead\n\t#Talk to Carol. There’s obviously something wrong with her psyche. Perhaps you can understand her well enough to use it.\n\t\t*if (genre_savvy \u003c 46) and (soul > 50)\n\t\t\t\"Carol no!\" you shout.\n\t\t\t\n\t\t\tFei Fei jumps at the noise and quickly moves away as Carol stares at you in shock. \n\t\t\t\n\t\t\t\"Excuse me?\" she says. \"Do you think you can just tell me not to kill you? Really?\"\n\t\t\t\n\t\t\t\"Not just me,\" you say. \"We called the police. You can see the record on Mom's phone if you like—but you're about to be arrested.”\n\t\t\t\n\t\t\tHer face falls. \"Will you tell them I was good?\" she says. \"If I sit down and give you the knife?\"\n\t\t\t\n\t\t\t\"Put it on the ground,\" you say, \"And sit over there.\"\n\t\t\t\n\t\t\tTen minutes later, the police arrive.\n\t\t\t\n\t\t\t*goto alive\n\t\t*else\n\t\t\t\"No don't!\" you yell, but Carol slices open Fei Fei's neck right in front of you and Mom. You didn’t understand Carol at all, even after so many revelations of her evil.\n\t\t\t\n\t\t\tMom is frozen to the spot; completely helpless. You shake her, hard. \"Mom! Run!\"\n\t\t\t\n\t\t\tShe blinks and obeys, vanishing into the darkness with Gerald. You’re too breathless to follow for more than a few steps.\n\t\t\t\n\t\t\tCarol puts the knife at your throat and walks you to the edge of the gorge. \"Jump,\" she says.\n\t\t\t\n\t\t\t\"No. We already called the police. It's over, Carol.\"\n\t\t\t\n\t\t\t\"You ruined everything!\" she screams, and pushes you over the edge. \n\t\t\t\n\t\t\tYou fall on the rocks head-first, and dies instantly.\n\t\t\t*goto dead\n\t\t\t\n*label alive\nSince the knife belongs to Carol, and Charlotte's body is right there in the stream, it’s a fairly quick trip to the station for you, and a much longer trip for Carol. It turns out she won't get a big window after all.\n\nBy the time you return to the campus the dead kangaroo is gone, the window is boarded over, and the door even has a lock. You try the knob and swear when it doesn't turn. Yanti opens it for you, and passes you a shiny new key with a smile.\n\n\"Thank you,\" you say, and, \"[i]Thank you[/i]!\" when you see a brand new and empty fridge.\n\nAll that remains is figuring out how to explain everything to her. You decide to draw a diagram of the steam, and open your desk drawer for paper. An axolotl crouches on your legal pad, but it just doesn’t scare you any more.\n\n\"Hello there, cutie,\" you say, gathering it up gently and slipping it into a water-filled casserole dish where its friends are recovering from their ordeal. \"You can stay if you like. I gather you're one last gift from Carol.\"\n\nWhen Yanti is up to date, she has just one question. \"You'll move home now?\"\n*page_break Will you?\nYou glance out the broken window into the asthma-inducing bushland beyond. \"This is my home. I'm staying.\"\n\n\"I am happy to hear that,\" she says, and picks up a red lazer pistol from the bench. \"I tried to tidy up, but I simply haven't the faintest idea where this contraption might belong.\"\n\n\"Uh... what?\" you say, automatically backing away and wondering what this last piece of sabotage could mean. And why has she suddenly lost her accent? In fact, she sounds British.\n\n\"Not yours?\" she says. \"Come to think of it, I rather like it. Sleek, retro, magnificent.\" She levels the gun at you. \"Let's see what you look like without all those extraneous organs.\"\n\nYou skid sideways as she shoots. The gun spews forth circular rays of blue light, burning through your bedroom wall. That wasn't something Carol could have made! As you realise that, everything falls into place and you know it doesn’t belong in this book at all.\n\n\"This isn't you!\" you say desperately. \"It's that pistol controlling you! Please believe me, it doesn't belong here. It's from another world entirely. I need to take it back!\"\n\nShe smiles as if someone else is controlling her face. \"And yet it fits my hand so well.\"\n*choice\n\t#Leap through the hole in the wall to shelter behind her nice solid dresser, searching for something to throw at her arm so she drops the pistol.\n\t\t*if body > 70\n\t\t\tYou dive through the jagged hole and twist to get behind the dresser.\n\t\t\t\n\t\t\t\"Coward!\" Yanti shouts. \"Imbecile! Yellow-belly!\"\n\t\t\t\n\t\t\tAs you grope for a makeshift weapon, your hand closes around an apple. Perfect. You wait for another blast of blue laser circles, then step out and throw the apple as hard as you can at her wrist.\n\t\t\t\n\t\t\tShe yelps in pain and drops the gun. \n\t\t\t\n\t\t\tYou jump for the pistol, ignoring the pain as you hit the floor and knock the gun away with the tips of your fingers. Scrabbling to get purchase on the damp carpet, you just barely manage to get a grip on the weapon from another world.\n\t\t\t\n\t\t\tYanti stands staring at you, shaking her head in confusion as the dorm room fades before your eyes.\n\t\t\t*set daze true\n\t\t\t*set stories_completed +1\n\t\t\t*goto_scene bookshop_scenes\n\t\t*else\n\t\t\tYou dive for the hole in the wall, but your foot catches on the table leg and instead of escaping you’re stuck fast. Coordination is not your forte!\n\t\t\t\n\t\t\tBehind you, Yanti laughs. You hear the hum as the pistol re-charges—and fires.\n\t\t\t*goto dead\n\t#If you understand Fei Fei as well as you think you do, she’ll be nearby. You scream for her help.\n\t\t*if soul > 70\n\t\t\t\"Fei Fei!\" You scream. \"Sludge thing! Help me!\"\n\t\t\t\n\t\t\t\"Coming!\" she shouts from outside, and promptly runs face-first into your door. \n\t\t\t\n\t\t\tYanti turns to face the door. The pistol hums as it recharges, not quite drowning out the [i]gloop[/i] as Fei Fei's disgusting sludge savior drops through a gap in the window. \n\t\t\t\n\t\t\tYou and the sludge converge on Yanti, and you reach out for the pistol as the sludge leaps onto her bare ankle. She screams and her shot goes wide, blowing a circular hole in your ceiling and giving you a clear view of two extremely startled possums. Before she can recharge for the next shot, you grab the pistol, and the dorm room fades before your eyes.\n\t\t\t*set daze true\n\t\t\t*set stories_completed +1\n\t\t\t*goto_scene bookshop_scenes\n\t\t*else\n\t\t\t\"Fei Fei!\" you scream. \"Help me!\"\n\t\t\t\n\t\t\t\"Coming!\" she shouts from outside, and promptly runs face-first into your door. \n\t\t\t\n\t\t\tYanti turns to face the door. The pistol hums as it recharges. You don’t really have a choice: you dive in front of the door and stare right at her.\n\n\t\t\tShe shoots you.\n\t\t\t*goto dead\n\t#Hassan taught you a few Indonesian words. Maybe they can get through to the real Yanti before you get yourself killed.\n\t\t*if mind > 70\n\t\t\t\"Mukamu kucing!\" you yell at her.\n\t\t\t\n\t\t\tShe stops dead and lowers the pistol. \"My face... is a cat?\"\n\t\t\t\n\t\t\tYou step forward and grab the gun. The dorm room fades before your eyes.\n\t\t\t*set daze true\n\t\t\t*set stories_completed +1\n\t\t\t*goto_scene bookshop_scenes\n\t\t*else\n\t\t\t\"Mukaka bing!\" you yell at her, realizing as you say it that it’s pure gibberish. You’ve forgotten everything, and Yanti is unimpressed.\n\t\t\tShe shoots you.\n\t\t\t*goto dead\n\n*label dead\n*set health 0\n\nThe pain is excruciating, and then everything fades before your eyes.\n\n*goto_scene bookshop_scene_fail", "adrao_second_story": "\n\n*set body_name \"Strength\"\n*set mind_name \"Intelligence\"\n*set soul_name \"Wit\"\n\n*temp Mr \"Mr.\"\n*temp money 0\n*temp hat 0\n*temp garlic_chips 0\n*temp candle 0\n*temp rope 0\n*temp hat 0\n*temp plate 0\n*temp bible 0\n*temp Quaran 0\n*temp Buddha 0\n*temp holy_book \"\"\n*temp have_holy_book 0\n*temp rosary 0\n*temp guide_book 0 \n*temp terminal_shops 0\n*temp terminal_read_book 0\n*temp bracelet 0\n*temp snorkelling_goggles 0\n*temp sunblock 0\n*temp mosquito_repellent 0\n*temp torch 0 \n*temp flame_torch 0\n*temp wallet \"\"\n\n\n\n*temp source_light  0\n*temp name_source_light \"\"\n*temp weapon \"\"\n*temp have_weapon 0\n*temp vampire_hits 0\n*temp final_battle_pause 0\n*temp discovered_minions 0\n*temp killed_minions 0\n*temp escaped_minions 0 \n*temp kiss 0\n\n*temp employer_name \"None\"\n*temp employer_surname \"None\"\n*temp employe_gender \"male\"\n*temp employer_Mr \"Mr\"\n*temp employer_his \"his\"\n*temp employer_him \"him\"\n*temp employer_he \"he\"\n\n*temp minion_he \"he\"\n*temp minion_his \"his\"\n*temp minion_him \"him\"\n\n*temp relationship_secretary 50\n\n*if he = \"he\"\n  *set Mr  \"Mr.\"\n  *set wallet \"wallet\"\n  \n  *set employer_name \"Jacques\"\n  *set employer_surname \"D'Anjou\"\n  *set employe_gender \"male\"\n  *set employer_Mr \"Mr.\"\n  *set employer_his \"his\"\n  *set employer_him \"him\"\n  *set employer_he \"he\"\n  \n  *set minion_he \"she\"\n  *set minion_his \"her\"\n  *set minion_him \"her\"\n  \n  *goto start\n\n*elseif he= \"they\"  \n  *set Mr \"\"\n  *set wallet \"purse\"\n\n  *set employer_name \"Emilie\"\n  *set employer_surname \"D'Anjou\"\n  *set employe_gender \"female\"\n  *set employer_Mr \"Ms.\"\n  *set employer_his \"her\"\n  *set employer_him \"her\"\n  *set employer_he \"she\"\n  \n  *set minion_he \"he\"\n  *set minion_his \"his\"\n  *set minion_him \"him\"  \n  \n  *goto start \n  \n*else\n  *set Mr \"Ms.\"\n  *set wallet \"purse\"\n\n  *set employer_name \"Emilie\"\n  *set employer_surname \"D'Anjou\"\n  *set employe_gender \"female\"\n  *set employer_Mr \"Ms.\"\n  *set employer_his \"her\"\n  *set employer_him \"her\"\n  *set employer_he \"she\"\n  \n  *set minion_he \"he\"\n  *set minion_his \"his\"\n  *set minion_him \"him\"  \n  \n  *goto start  \n  \n*label start  \n  \n*if not (adrao2_started)\n   *goto intro\n*if (adrao2_started)\n    You open your eyes slowly, and take a few seconds to accustom yourself to your new surroundings. The loud noise of the engines, \n    plastic walls, seats and filtered air leave little doubt that you are back in the familiar surroundings of the plane. At least, you feel they are familiar. \n    You've been here before, also travelling business class, but the memories are fading away quickly. Almost as if pages were turning backwards, getting blanker with each moment. \n    \n    Maybe reopening a book also partially resets your memories of the story. As you think about this, a wealth of information on real estate property comes flooding into your brain.\n    It seems you are a real estate agent for the super-rich, and are on your way to the Philippines at the request of one of your company's top clients, \n    who would like to acquire a new property in Fiji.    \n \n    *goto start_story\n  \n  \n*label intro  \n\n*if (stories_completed \u003c 1)\n\n    You open your eyes very slowly, feeling everything is very wrong. There is a very loud engine noise that completely surrounds you, \n    and you're sitting on a passenger seat in a plane. This can't be right, how did you get here? Could the book have somehow transported you somewhere else?\n    It seems that you are travelling business class, and even your clothes have changed, completely in tune with the seat in which you are sitting.\n\n    Then suddenly a new wealth of memories and knowledge about real estate property come flooding into your brain. \n    Does the book really have the power to alter your brain and give you new skills? This is somehow fascinating, \n    and apparently you are a real estate agent for the super-rich, on your way to the Philippines at the request of one of your company's top clients, \n    who would like to acquire a new property in Fiji.    \n    *goto start_story\n    \n    \n*else \n    You open your eyes slowly, and take a few seconds to accustom yourself to your new surroundings. The loud noise of the engines, \n    plastic walls, seats and filtered air leave little doubt that you are in a plane, and from its appearance it would seem that it is a 21st century one.\n    The biggest surprise comes in that you are travelling business class, really quite a treat. It would seem that you are somebody rather wealthy or important in this story, \n    judging by the clothes you are wearing. \n    \n    Then, you start to focus about trying to understand what you are doing in this plane, and you are able to access a wealth of memories and knowledge about real estate property. \n    It seems you are a real estate agent for the super-rich, and are on your way to the Philippines at the request of one of your company's top clients, \n    who would like to acquire a new property in Fiji. \n    *goto start_story \n\n*label start_story\n\n*set adrao2_started true\n\nWithin a few minutes the captain announces that you will be landing in Cebu shortly, apparently 10 minutes before your scheduled arrival time, just before midnight. \nAfter the plane lands you quickly head to customs. The immigrations officer looks at you with a rather dull expression, while checking your passport. \n\"${Mr} ${name}, you look like you are here for business? How long will you be staying?\"\n\n*choice\n\n   #\"As short as possible, I have quite a lot of other business to attend to at home\"\n      *goto exit_airport\n\n   #\"Probably just for a few days, I might take a little holiday at the end if time allows\"\n      *goto exit_airport\n\n\n*label exit_airport\n\nThe immigration officer unceremoniously returns the passport to you, without uttering anything else. Well, clearly immigration officers are not always the friendliest bunch. \n\nAs you are only travelling with hand luggage you manage to quickly exit the airport. The warm tropical air hits you as you leave the air-conditioned interior, \nand you automatically start to perspire, given how inappropriate your clothes are for this environment. Hopefully your hand-luggage will contain something more appropriate, \nonce you are able to change.   \n\nWhile you are thinking about this amongst the mass of people in the reception area you spot somebody who looks like a driver, holding a piece of paper with your name on it. \nYou approach him, and he explains that he was contracted by your company to take you to your hotel tonight, \nand then tomorrow to the ferry terminal where you are to catch a ferry to the nearby island of Bohol. \nHe then guides you to a rather nice car, and after about an hour's drive you reach your hotel. \n\n*page_break\n\nThe driver bids you good-night, after telling you that he will pick you up tomorrow afternoon at 1pm to drive you to the ferry terminal.\nThis should apparently give you more than enough time to catch the 3pm ferry. \n  \nYou then proceed to check in and settle in your spacious room, happy with the level of comfort it provides. \nThe bathroom is fabulous, and after a long shower you feel very relaxed, though somehow not sleepy at all. \nThis is odd given the time, but then again in this story you would appear to be somewhat jet-lagged. After a while you start to feel a bit bored, \nand think of something to do until you finally feel you are ready to sleep. \n\n*label room_choice\n\n*choice\n\n   *hide_reuse #See if there is anything of interest in the room\n     You look around the room, but it's just a typical hotel room. Aside from a TV the only thing of interest you find are copies of the Bible, \n     Quran and the Teachings of Buddha in the drawer next to the bed. You could take one of these with you, \n     and read a bit of it until you fall asleep, or do something else.\n\n     *choice\n        #Leave the books, and do something else instead\n           You doubt there is much these books can help you with in this story, so you close the drawer and think of something else you can do until you feel tired. \n           *goto room_choice\n\n        #Take the copy of the Quran with you, and read a bit of it until you fall asleep. \n           *set holy_book \"Quran\"\n           *goto read_holy_book\t\t   \n\n        #Take the copy of the Teachings of Buddha with you, and read a bit of it until you fall asleep. \n           *set holy_book \"Teachings of Buddha\"\n           *goto read_holy_book\t\n\t\t   \n        #Take the copy of the Bible with you, and read a bit of it until you fall asleep. \n           *set holy_book \"Bible\"\n\t\t   \n           *label read_holy_book\n           Somehow there might be a reason for this book to be there, so you decide that maybe reading some sacred words could help you later. \n           Eventually, after a couple of hours of reading random parts of it, sleep overcomes you.\n           *set bible 1\t\t   \n           *set holy_book 1\t\t   \n           *set soul %+15\n           *goto next_morning\t\t   \n\n   #Switch on the TV, to try to see if there is something interesting happening in the news\n     *set mind %+10\n     Good old TV, always one of the best ways to pass some time. You start flicking through the channels, and settle on a CNN documentary about the Philippines. Oddly, \n     it's the 3rd year anniversary since the 2013 Bohol Earthquake, which rattled the island you are supposed to be visiting tomorrow. \n     The documentary narrates the consequences of the event, how small islands offshore of the main island subsided and are now flooded during high tides,\n     the many houses and businesses that were destroyed, including most of the beautiful churches in the north of the island. Many died during the event, \n     and others afterwards as a consequence of a variety of other secondary effects.\n\n     The documentary then goes on to talk about the reconstruction process, and how the island has slowly recovered its normality. \n     A new ferry terminal has been built in Tubingon, where you will hopefully be landing tomorrow, coastal areas have been protected, and some of the churches have been rebuilt. \n     At this point you start to finally feel tired, turn off the TV and get some sleep. \n     \n     *goto next_morning\n   \n   #Go to the hotel's swimming pool, and do some laps to tire yourself\n     *set body %+10\n     Nothing better than a bit of energetic swimming to make anybody feel tired. Luckily your hand-luggage included a swimming suit, \n     and you proceed to the roof of the hotel. The moist tropical air feels exotic, and you feel completely invigorated once you dive into the pool. \n     The swimming relaxes and soothes your mind, and after a while you start to feel that you could now sleep. \n     Getting out of the pool you take a few moments to look at the amazing view of the lights of central Cebu, before heading down to your room to sleep. \n\t \n     *goto next_morning\n\n   #Go for a walk around the streets, trying to absorb the place and the people \n     *set soul %+10\n     It's always nice to walk around and explore when you arrive at any new place. Fortunately your hand-luggage had some clothes more appropriate for this weather, \n     making the hot tropical air outside of the hotel bearable. As you wander around the streets close to the hotel you soak in the atmosphere, \n     with a multitude of bars and restaurants and the mix of foreigners and locals creating a somewhat chaotic cosmopolitan environment. \n     However, after an hour or so you finally start to feel tired and return to your room to get some sleep. \n     \n     *goto next_morning\n   \n*label next_morning\n\nYou wake up rather late, around 10am, and that is only because you set up your alarm to try to take advantage of the hotel's breakfast. \nAfter that you still have some time left, and spotting an ATM in the lobby of the hotel you realize that it would be better for you to take out some cash. \nThe machine will only allow you to take out 10,000 pesos, though you are unsure about whether this is much money or not. \nIn any case, there is a small shop in the hotel, so you browse thorough it in case there is anything of interest. \nThe shops seems to mostly offer souvenirs for tourists, some books and odd pieces of beach and sports gear. \n\n*set money 10000\n\n*label shop_choices\n\n*choice\n\n   *selectable_if ((money >1499) and (hat =0)) #Buy a hat for 1500 pesos\n      A hat is always something useful in a tropical climate, as heatstrokes can be very dangerous, and you rather like how this one looks on you. \n      *set money -1500\t  \n      This leaves you with ${money} pesos to spend, though it might be wise not to spend all in case you need some later. \t  \n      *set hat 1\n      *goto shop_choices\t\n\t  \n   *selectable_if ((money >299) and (candle =0)) #Buy a scented candle for 300 pesos\n      Candles always make nice little souvenirs, though you are not exactly sure who you would eventually give it to. \n      The woman at the shop even gives you some matches to light it. \n      *set money -300\t  \n      This  leaves you with ${money} pesos to spend.\t  \n      *set candle 1\n      *goto shop_choices\n\n   *selectable_if ((money >1999) and (plate =0)) #Buy a beautiful metallic plate for 2000 pesos\n      A rather nice plate, with an engraving showing some sort of historical image of Cebu. \n      *set money -2000\t  \n      In your ${wallet} there are ${money} pesos to spend.\tMaybe wise to not spend all of them now?\n      *set plate 1\n      *goto shop_choices\t  \n\n   *selectable_if ((money >1999) and (rope =0)) #Buy a climbing rope for 2000 pesos\n      You doubt you will have the opportunity to go climbing, but who knows where this story will take you. \n      *set money -2000\t  \n      You check your ${wallet}, and you now have only ${money} pesos to spend.\t  \n      *set rope 1\n      *goto shop_choices\t\t  \n\n   *selectable_if ((money >1999) and (guide_book =0)) #Buy a guide book of the Philippines for 2000 pesos\n      Guide books always make nice reads, and it probably wouldn't hurt to get to know a bit more about the place. \n      *set money -2000  \n      In your ${wallet} there is only ${money} pesos to spend.\t  \n      *set guide_book 1\n      *goto shop_choices\n\n   *selectable_if ((money >3999) and (snorkelling_goggles=0)) #Buy snorkelling goggles for 4000 pesos\n      Well, you are in a tropical country, and you might get the chance to go to the beach and see some of the submarine life. \n      *set money -4000  \n      You check your ${wallet}, you have ${money} pesos to spend.\t  \n      *set snorkelling_goggles 1\n      *goto shop_choices\n\n   *selectable_if ((money >149) and (mosquito_repellent=0)) #Buy some mosquito repellent for 150 pesos\n      You have already seen some in the hotel lobby, you doubt there is any serious tropical diseases round here, but you haven't really read enough so maybe better to be safe?\n      *set money -150 \n      You check your ${wallet}, you have ${money} pesos to spend.\t  \n      *set mosquito_repellent 1\n      *goto shop_choices\n\n   *selectable_if ((money >499) and (sunblock =0)) #Buy some sunblock for 500 pesos\n      If you spend some time outside in the sun you are likely to get burnt, unless you have some of it with you. \n      *set money -500\n      You check your ${wallet}, you have ${money} pesos to spend, though it might be wise to keep some for later. \t  \n      *temp sunblock 1\n      *goto shop_choices\n\n   *selectable_if ((money >2000) and (torch =0)) #Buy a small pocket torch for 2000 pesos\n      You could use the app on your smart phone, but in case you run out of battery.   \n      *set money -2000  \n      You check your ${wallet}, you now have ${money} pesos left to spend.\t  \n      *set torch 1\n      *goto shop_choices\t  \n\t  \n\t  \n   #Return to your room to pack, and go to the lobby to wait for your driver to arrive\t  \n      Satisfied that you have everything you need you return to your room and pack, descending to the lobby at noon. Your driver is already waiting for you, \n      and you once again get into the car. This time you are surprised by the amount of traffic on the roads. Cars of all types, tricycles, jeepnees, motorbikes, bicycles, \n      it's all part of one gigantic colourful traffic jam that sometimes makes you wonder whether it wouldn't have been quicker just to walk. \n\n      Finally you make it to the ferry terminal area, which is situated in a rather dilapidated part of town, though the terminal itself is rather clean and air-conditioned. \n      Your driver hands you your tickets and tells you that the ferry leaves at 3pm, and that somebody will be waiting for you at Tubingon Ferry Terminal. \n      After thanking him for everything you enter the ferry terminal, where you have a bit of time to kill before boarding. \n\n\t  \n\t  \n      *label terminal_choices\t  \n\t  \n      *choice\n\n        *if (terminal_shops =0) #Look through the small shops in the area. \n          The shops in the ferry terminal area are rather small, aside from some snacks there is very little that gathers your attention. \n\n          *label terminal_shop_choices\n\t\t  \n          *choice\n\n            *selectable_if ((money >99) and (garlic_chips =0)) #Buy some garlic chips for 100 pesos\n               They look rather nice, and you might get hungry during the trip. \n               *set money -100\t  \n               This leaves you with ${money} pesos to spend, though it might be wise not to spend all in case you need some later. \t  \n               *temp garlic_chips 1\n               *goto terminal_shop_choices\t\t\n\n            *selectable_if ((money >1999) and (bible =0)) #Buy a bible for 2000 pesos\n               This seems to be a rather pious country, considering the amount of religious objects on display in these little shops. Maybe it would make a good bedtime reading? \n               *set holy_book \"Bible\"\n               *set have_holy_book 1\t\t\t   \n               *set money -2000\t  \n               This leaves you with ${money} pesos to spend.\t  \n               *temp bible1\n               *goto terminal_shop_choices\n\t\t\t   \n            *selectable_if ((money >499) and (bracelet =0)) #Buy a small wooden bracelet for 500 pesos\n               One of those wooden bracelet ornaments, so popular in many tourist areas, yet you like the way it looks on you. \n               *set money -500\t  \n               This leaves you with ${money} pesos to spend.\t  \n               *temp bracelet 1\n               *goto terminal_shop_choices\t\t\t   \n\n            *selectable_if ((money >499) and (rosary =0)) #Buy a small wooden cross for 500 pesos\n               This seems to be a rather pious country, considering the amount of religious objects on displays on these little shops. \n               Some of the crosses look rather nice, so you decide to buy one as a souvenir. \n               *set money -500  \n               This leaves you with ${money} pesos to spend.\t  \n               *temp rosary 1\n               *goto terminal_shop_choices\n\t\t\t   \n            *selectable_if ((money >1500) and (guide_book =0)) #Buy a guide book of the Philippines for 1500 pesos\n               Guide books always make nice reads, and it probably wouldn't hurt to get to know a bit more about the place. \n               *set money -1500  \n               You check your wallet, you have ${money} pesos to spend.\t  \n               *temp guide_book 1\n               *goto terminal_shop_choices\n\t\t\t   \n            #Stop browsing through the shops and go and sit down while you wait for the ferry\n               The shops in the area really don't offer that much, \n               so you eventually tire of looking through them and go and sit down in one of the plastic seats in front of your ferry's departure area. \n               *goto board_ferry\n\n        #Wait for the ferry while looking at the people around you\n               Watching people is clearly one of the greatest pleasures in life, offering you a great insight into another country's soul. \n               There is a huge variety of people in the terminal, and you notice a marked contrast between the fashion older generations and the youngsters.\n               Many of them appear to be on short trips, though a number of people seem to be transporting rather large cardboard boxes and a multitude of other possessions.\t\t\t   \n               *set soul %+10\t\t\t   \n               *goto board_ferry\n\t\t\t   \n        *selectable_if (guide_book =1) #See what your guide book says about Bohol\n               You open your guidebook around the start of the section on Bohol. Apparently, it's one of the most beautiful islands in the Philippines, \n               famous for a number of sites that include the rather strange geological formation known as the Chocolate Hills and the beautiful sandy beaches of Panglao.\n               People in the islands are devoutly Catholic and speak the Vizayas language, though luckily it seems most people also have a good command of English.\n\n               The northern part of the island, around the town of Tubingon, where you'll be getting off the ferry, was ravaged by a powerful earthquake in 2013. \n               It seems many houses and some of the old Spanish colonial churches were destroyed, \n               with reconstruction being delayed due to much international aid being diverted towards the islands of Leyte and Samar, \n               which were razed when super-typhoon Haiyan struck a few months later. \n\t\t\n               *set mind %+10\n               *page_break               \n               *goto board_ferry\n\t\t\t   \n*label board_ferry\n\nSuddenly, you see many of the people around you get up and start to exit one of the doors of the terminal, \nwhile you hear an announcement in English to proceed to board the ferry. You follow the rest of the passengers to a rather small sealed craft, \nand the crew shows you the way to the business class seats. \n\nThe ferry appears to be some sort of speed boat, as the trip to Bohol takes just over one hour. \nAs you disembark in Tubingon you feel like you have somehow arrived in a different country. \nThe rather lush vegetation of the mountains of Bohol contrast heavily with the skyscrapers and apartment blocks of Cebu. \nThe chaotic mix of cars is replaced by a multitude of trycicles, basically motorbikes with a side-car for passengers, which appear to be the main means of transportation in the area.\nThe heat is quite intense at this hour of the day, which combined with the multitude of people disembarking starts to stress you a bit.  \n\nSuddenly, a small tanned young woman elegantly dressed approaches you, seemingly completely at home in the chaos that surrounds you. \nShe is rather pale compared to many of the older people in the area, \nand you start to guess that it probably isn't fashionable for young people to spend much time under the sun. Her short black hair is tied back in a ponytail, \nwith her fierce black eyes giving you a feeling that she must have a formidable character. \n \n*if soul >70\n  However, you notice that a number of people are rather surprised by her presence and make great efforts to go a wide distance around her, \n  while doing the sign of the cross as they do so.   \nShe examines you from top to bottom, before calmly asking, \"${Mr} ${name}?\"\n\n*choice\n\n   #\"Yes, that would be me. Thank you so much for taking the time to come to meet me\"\n     The woman smiles as you say this, and welcomes you to Bohol.\n     *set relationship_secretary %+20     \n     *goto woman_intro\n\n   #\"Yes, that is me\"\n     The woman nods as you say this, and welcomes you to Bohol.    \n     *goto woman_intro\n\t \n   #\"Yes, yes... Why did you make me wait in the sun for so long??\"\n      *set soul %-5\n      *set relationship_secretary %-20    \n      The woman's eyes narrow a bit as you say this, and offers what appears like an insincere apology for not spotting you earlier amongst the passengers. \n      *goto woman_intro\n\t  \n*label woman_intro\nShe then proceeds to introduce herself as Angelica, the household manager for your employer, ${employer_Mr} ${employer_surname}. \n\"Thank you so much for coming, ${employer_Mr} ${employer_surname} was worried that you wouldn't be able to make it. Now, if you would follow me, our driver is waiting.\"\nYou follow her to a big black Bentley car which is parked some distance away, and which seems completely at odds with all the small tricycles around it. \n\n*if soul >60\n  There seems to be a lot less people in the area around the car, as if its mere presence imposed some respect in those around it. \n  It feels somehow like as if it did not belong in the entire chaos and warm tropical sun around it. \nAngelica jumps with you into the back passenger seats, which do not allow you a proper view of the driver, \nwho appears to be an elderly man with very pale skin and long white hair.\n\nThe roads of Bohol leave much to be desired. In stretches the tarmac is rather good, but most of the numerous bridges appear to be under repair, \nforcing the driver to slow down and carefully drive across some sort of temporary structure. Angelica is completely silent, occasionally\nglancing out of the window while writing some messages on her smart phone.  \n\n\n*choice\n\n   #Ask Angelica why the roads are so bad\n      *set mind %+5\n      Angelica doesn't bother to take her eyes off her phone as she replies. \"Still repairing after the earthquake. Things in Bohol always take a bit of time.\"\n      It's clear she is not interested in talking to you, so you sit back and continue to contemplate the scenery. \n      *goto continue_road      \n\t  \n   #Ask Angelica if it isn't possible to go quicker, or take a different road\n      Angelica doesn't bother to take her eyes off her phone as she replies. \"No.\"\n      It's clear she isn't interested in talking to you, so you sit back and continue to contemplate the scenery.\n      *set relationship_secretary %-10      \n      *goto continue_road \n\n   #Tell Angelica how this island is really beautiful\n      Angelica looks at you and smiles. \"Yes, many people say how this is one of the most beautiful islands in the country, \n      I'm glad that you can appreciate its beauty! I'm sorry that I cannot talk to you so much though, \n      I'm trying to take care of a number of urgent tasks given to me by ${employer_Mr} ${employer_surname}.\"\n      You smile back and tell her not to worry, as you know how busy things can be in such circumstances, and then sit back and continue to contemplate the scenery.  \n      *set relationship_secretary %+20      \n      *goto continue_road       \n      \n   #Let Angelica write her messages in peace, while you continue to look at the scenery\n      It's clear that Angelica doesn't want to talk to you, so you let her write her messages while you continue to contemplate the scenery.\n      *set relationship_secretary %+5      \n      *goto continue_road \t  \n\t  \n*label continue_road\n\nThe lush vegetation at each side of the road is only briefly interrupted by the occasional group of houses, \nthough every now and then you encounter a rather massive church, most of which look rather old.
