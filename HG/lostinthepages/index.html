ted you, and the fact that you barely slept last night because of all the commotion surrounding building the balloon doesn't really help either.\nYou quickly eat a few of the sandwiches ${npc} brought along, go to the toilet (thank goodness this shuttle's got one) and stretch out on one of the longer benches.\nYou're out in seconds.\n*page_break\nThe next morning you wake up late, which isn't all that surprising given how exhausted you were. What does bug you is the knowledge that it also means that either ${npc} more or less pulled an all-nighter or that the balloon is now way off course and about to crash into the lava.\nOne glance out of the window reveals that it's not the latter.\n\nYou quickly throw on your clothes and rush to the roof of the shuttle, where you find a surprisingly well rested ${npc} drinking something that looks like tea while sitting on top of an unrolled sleeping bag.\nWhen did ${npc_he} manage to smuggle that on board?\n\n${npc} spots you and motions you to come closer and sit down. You hesitantly do so, making sure to keep as much distance as the length of the sleeping bag allows, and ${npc} pours you a drink as well before handing you a few sandwiches.\n\nThis is the moment you're supposed to say something, isn't it?\n*fake_choice\n    #\"So... how was your night?\"\n        It seems like ${npc} got some sleep at least, but it must've been difficult to combine that with tending to the balloon.\n        \n        $!{npc_he} shrugs. \"It was alright. The roof is a bit uncomfortable even with the sleeping bag and it's a bit annoying to have to wake up once every two hours to check and correct the balloon's course and altitude, but I'm pretty used to that sort of thing already.\n        It's pretty much what my nights look like whenever an emergency occurs, with me being the captain of the guard and all. There's always someone who needs to ask for advice at the strangest of moments.\"\n        \n        Oh, right. Guard duty. Should have thought of that.\n    #\"These sandwiches are good. Did you make them yourself?\"\n        ${npc} shrugs. \"Of course I did. I mean, I could've asked Carmen to make them, but she way already way too busy sowing the balloon.\"\n        \n        You nod. \"Well, like I said, they taste pretty good.\"\n        \n    #\"How is this drink called, and what's in it exactly?\"\n        ${npc} shrugs. \"What? It's just tea. You must've got something similar back where you're from as well, right?\"\n        \n        You nod. \"Well yeah, we have, but it tastes differently. This tastes more like coffee.\"\n        \n        ${npc} raises an eyebrow. \"Coffee? Really? Well, that's interesting.\"\n        \n        ${npc_he} looks away, deep in thought, while you turn your attention back to your breakfast.\nYou take a bite of your sandwich and look out over the seemingly endless ocean of lava. Everything else aside you've got quite the view from up here.\n*page_break\nAfter finishing breakfast and doing the dishes ${npc} tells you it'll still be a few hours before you reach the burning wastes, so you spend the remaining time with magic practice.\nThen the massive mostly submerged mountain range appears on the horizon and you prepare for the landing. That's always one of the most tricky parts of travelling by balloon, and the rough terrain up ahead doesn't really help with that either.\nStill, mostly thanks to ${npc}'s magic, you manage to somehow steer around the sharp rocks and lava spouts and land on a relatively even part of a valley wedged in between two decent sized mountains, which made for a much better landing than you'd expected.\n\nAfter you've properly secured the balloon and have been armed with ${npc}'s spare plasma gun it's time to go. ${npc} first hands you a large wrought-iron basket though, and you throw ${npc_him} an annoyed glare. The basket isn't nearly as heavy as it looks, but that doesn't really make you like the situation any better.\n*goto burningwastes\n\n*label burningwastesdragon\nArmed with ${npc}'s spare plasma gun and able to use much more advanced magic than two hours prior (though even your best attempts don't come close to what ${npc} can conjure up) you carefully make your way down the rickety rope ladder towards the uneven and in some places smoldering rock below.\nIt's obvious why this place is called the burning wastes. As you stare at a smoldering pool of lava only a short distance away from where Electra landed ${npc} hands you a large wrought-iron basket, and you send ${npc_him} an annoyed glare. The basket isn't nearly as heavy as you'd expected, but that doesn't make your annoyance any less.\n*label burningwastes\n\"So I'm the pack mule for today.\"\n\n${npc} shrugs at your accusation. \"Hey, if you'd rather be in charge of the fighting and navigating just say so, and I'll trade jobs with you in the blink of an eye.\"\n\nYou roll your eyes at the unmistakable sarcasm in ${npc_his} voice. $!{npc_he} knows that'd be a stupid thing to do just as well as you do.\nBesides your lack of skill with local weaponry and magic it's the first time you've ever been in this world, so you haven't got a clue where to go.\n\nIgnoring the annoyed glares you send ${npc_his} way, ${npc} takes off and you have no choice but to follow. You wouldn't want to get killed by the local wildlife because of your own stubbornness.\nWhile you're following after ${npc_him} your gaze drifts off to one particular aspect of the terrain that stands out more than anything else.\n*fake_choice\n    #While the mountains stand tall all their peaks seem to have been chopped off.\n        It looks a bit strange considering all their other edges are still sharp. Like it's not something that occurred naturally.\n    #There are bits and pieces of half-molten metal sticking out of the ground at regular intervals.\n        It looks eerie. A bit like the half-buried carcass of a giant metal whale or something.\n    #Some shiny lights blink at you from somewhere higher up the mountains.\n        Those lights are too high up to be lava, that's for sure, but you can't really figure out what else they could be.\n        You'll probably have to ask ${npc} later on.\n\nThe terrain in front of you is barren and inhospitable, the ground riddled with deep cracks and coarse lava stone which is glowing a bit wherever the lava managed to force its way to the surface.\nYou really have to focus on where you put your feet to avoid stepping into it.\n\nWhile you are having trouble putting one foot in front of the other on the rough terrain ${npc} has already darted across the lava field with almost inhuman agility and is waiting for you at the foot of a much more stable looking and, more importantly, lava-free hill.\nYou grit your teeth and focus at the ground in front of you, trying to move as fast as you can without putting yourself in danger. Unlike with ${npc}, your magic can't save you if you screw up.\n\nThe ground beneath your feet begins to rise sooner than you expected, and you look up. Huh. That wasn't all that difficult after all. Then you squint your eyes and look at your surroundings more closely. Wait a second... Was the hill this close to Electra's landing spot before?\nYou send ${npc} a suspicious look, but ${npc_he} looks back with a perfectly innocent expression. Too innocent... Still, you'd have noticed if ${npc_he} moved an entire hill, right?\n*comment Wrong, but whatever.\n*page_break\nYou spend about the next one-and-a-half hour clambering along jagged mountain ridges before you arrive at a small plateau about halfway up the side of the largest mountain yet. Just when you're about to ask ${npc} why ${npc_he} stopped all of a sudden the sun breaks through the smog and the light bounces off of the many crystals partially embedded in the rock.\nIt's a beautiful sight, although the bright light hurts your eyes a bit after all the grime of the past hour-and-something.\n\nRealizing that these crystals are what you came here for you put the basket down and begin to dig out the crystals closest to you. Of course ${npc} gathers double the amount in the same time, but then again ${npc_he}'s cheating. Unlike ${npc_him} you don't have magic to waste on stuff like that.\n\nYou work tirelessly for about an hour or so and the basket is close to being filled to the brim when a dark shadow is cast on your part of the plateau. You are about to look up when a glob of lava drips down right next to you and burns a hole in the ground. Oh crap.\n\nWell aware that you don't stand a chance against a lava golem on your own you freeze in place, your eyes frantically searching for ${npc}. You spot ${npc_him} on the other side of the plateau, still completely unaware of the danger you're in.\nAfraid that any sound you'd make would result in you being crushed you opt for a more silent approach instead. Focusing on ${npc}'s surroundings you\n*if element = \"fire\"\n    make the lava surrounding ${npc_him} spread a bright glow.\n    *goto golemfight\n*if element = \"water\"\n    form a small cloud above ${npc_him} and make it fall to the ground in the form of rain.\n    *goto golemfight\n*if element = \"wind\"\n    pull on the air surrounding ${npc_him}, creating a gush of wind.\n    *goto golemfight\n*else\n    slowly lift up the ground beneath ${npc_his} feet.\n    *goto golemfight\n\n*label golemfight\nThis catches ${npc_his} attention and ${npc_he} looks up in search of you. Your gazes meet, and you see ${npc} swear under ${npc_his} breath and gesture at you to keep still.\n\nAs if you'd dare to move in this situation.\n*page_break\nStill frozen in place you watch as ${npc} gathers a large amount of magic and channels it into a rock spire protruding from the mountain. Then, with a simple flick of ${npc_his} wrist, ${npc_he} breaks it off in its entirety and hurls it at the lava golem.\nYou hear an ear splitting howl and, now that it's distracted, sneak a quick glance at the lava golem. It's a lot larger than you'd expected, about the size of a small skyscraper, and you watch in disgust as the rock spire that pierced its eye slowly but surely melts to a red goo.\nIt looks like ${npc} wasn't exaggerating when ${npc_he} said that these things are dangerous.\n\nMuch quicker than you'd like the piece of rock has dissolved completely and the golem begins to turn back to face you. It is temporarily distracted by another piece of rock that is flung at it, but you know that won't keep it distracted for long.\nYou need to do something.\n*choice\n    #Shoot it with your plasma gun.\n        In a frenzy you unholster your plasma gun and fire at the giant monstrosity of lava and partially molten rock, but the bolt of superheated matter is absorbed into its body without causing any damage.\n        The lava golem snorts at your pathetic attempt to hurt it and lashes out with one of its fiery arms.\n        The movement goes too fast for you to even try to dodge it and the blow flings you through the air and into a chunk of solid rock.\n        You feel the force of the impact break some of your ribs, and you fall to the ground gasping for air.\n        *set health -40\n        \n        As the red haze in front of your eyes clears you see that the lava golem has moved away from you, from the looks of it because of a successful distraction from ${npc}'s side.\n        You really hope ${npc_he} can handle the thing on ${npc_his} own, because you doubt you could even get yourself off the ground right now.\n        \n        Soon the lava golem has left the area you can see without having to move more than your head and the only indication you have that it and ${npc} are still fighting it out is the sound of it.\n        Then, after what feels like an eternity, the sound of battle subside and you just have to hope that ${npc} ended up as the victor. If not... Well, you'd rather not think about that.\n        *page_break\n        After a short while ${npc} enters your field of vision again, looking triumphant albeit a bit singed around the edges. Part of ${npc_his} hair is burnt, you think ${npc_he}'s missing an eyebrow and there is a large hole burned through the side of ${npc_his} coverall.\n        The skin visible through it doesn't show any burns though, so you guess that the damage ${npc_he} sustained while fighting the lava golem wasn't as bad as it looked on first glance.\n        \n        While it is a relief the injuries ${npc_he} might have sustained are a secondary concern to you right now. Seeing that ${npc_he}'s still on ${npc_his} feet is already a dead giveaway that you're in a lot worse shape.\n        Your busted ribs make breathing very difficult and you dare not move in case your spine got damaged, even though it doesn't hurt nearly as much.\n        \n        Seeing the state you're in ${npc} rushes to your side and gently starts prodding your side to take inventory of your injuries. After a torturous few minutes ${npc_he} seems content with ${npc_his} findings and spreads ${npc_his} hands out above the most badly damaged spot, not quite touching your skin.\n        A glow forms around them, soon spreading to envelop ${npc}'s entire body. You're not quite sure what's going on, or how ${npc_he} does it, but both the pressure on and pain in your chest slowly subsides to the point where it feels like you have a bad bruise rather than crushed ribs. It still hurts a bit, but at least you can breathe freely and move around again.\n        You cautiously sit up and examine your side. It really doesn't feel like your ribs are broken anymore.\n        *set health +30\n        \n        You shoot ${npc} a confused look, and ${npc_he} shrugs. \"What? Is it that surprising that I know some basic healing magic?\"\n        You return ${npc_his} shrug with one of your own. \"Well, you do seem like more of a fighter than a healer.\"\n        ${npc} rolls ${npc_his} eyes. \"Well, it was one of my lesser subjects during magic training. After all my magic affinity is more towards the fire side of the spectrum, and healing magic is usually categorized as a subgroup of water magic. I can still do the basic stuff though, be it with some limitations.\"\n        \n        You frown. \"So... Now we're discussing the elemental spectrum of magic while there is some very dangerous lava golem putting itself back together not too far away from here?\"\n        ${npc} grins sheepishly at your rather bluntly stated observation. \"Now that you mention it... We'd better go grab the magic crystals and get out of here ASAP.\"\n        \n        *if (balloon)\n            You do just that, and after an hour or so you're back at where you left the balloon, and you get ready to leave.\n            *page_break\n            *goto whattodowithnpctwo\n        You do just that, and after an hour or so you meet up with Electra, who was waiting for you exactly where you left her.\n        *page_break\n        *goto whattodowithnpc\n    #Just run.\n        Whatever. Your own safety is your first priority.\n        \n        With that in mind you turn around and run off into the direction you think you came from, hoping that ${npc} can keep the thing distracted long enough for you to make your escape.\n        *page_break\n        *if (balloon)\n            Eventually you manage to make it back to the balloon, in all honesty feeling quite terrible about abandoning ${npc} like that now that you're not in direct danger anymore.\n            Maybe you should've stayed...\n            *page_break\n            After a tense hour you can see ${npc} approaching in the distance, looking triumphant albeit a bit singed around the edges. Part of ${npc_his} hair is burnt, you think ${npc_he}'s missing an eyebrow and there is a large hole burned through the side of ${npc_his} coverall.\n            The skin visible through it doesn't show any burns though, so you guess that whatever caused it was not as bad as it looked on first glance.\n            \n            Even though ${npc} doesn't look angry you don't want to face ${npc_him} right now, so you quickly slip into the shuttle and hide in the small kitchen.\n            Of course the shuttle isn't all that big, so it doesn't take long for ${npc_him} to find you. Oddly enough ${npc_he} doesn't yell at you, but seems to want to reassure you instead.\n            \n            \"It's fine, all right? I would've done the same thing if I were in your position. You don't have to feel guilty about it.\"\n            *page_break\n            You grimace at ${npc}'s words and turn away in an attempt to ignore ${npc_him}, barely able to suppress the urge to childishly plug your ears with your fingers.\n            ${npc} doesn't budge though, and sends you a stern look. \"I'm serious, you know. My main concern was for you to get back to your world in one piece, so when you got yourself to safety it actually helped me a lot.\"\n            \n            Despite yourself ${npc_his} obvious concern warms your heart, though it is unnecessary. \"I never told you the details of the whole traveling through books thing, right?\"\n            \n            It's pretty obvious that ${npc} doesn't really get where you're going with this, and ${npc_he} shakes ${npc_his} head. \"Well, I'm not quite sure about the details, but I doubt I'd die in the real world if I got myself killed inside a book.\n            I can't imagine it being a pleasant experience though.\"\n            \n            ${npc} frowns and stares off into the distance, ${npc_his} voice barely audible. \"You'd still die in my world though.\" \n            \n            You frown. Is that what would happen? You hadn't really considered that side of the story... Would every visit to a book create an alternate in-book reality or something?\n            You think about the possibility for a while, but you can't really wrap your mind around it. That question is a bit too far into the realm of metaphysics.\n            Since you're not getting anywhere like this you address a more practical issue. \"Anyway, it's getting late, isn't it? Shouldn't we get going right about now?\"\n            \n            This matter-of-fact remark drags ${npc} back from whatever sad memory it was ${npc_he} was remembering, and ${npc_he} finally gets moving again.\n            \"You're right. I should go get this thing afloat again.\"\n            And with those words ${npc_he}'s off to the roof, leaving you to ponder the absurdity of the whole situation.\n            *page_break\n            *goto whattodowithnpctwo\n        Eventually you manage to make it back to Electra, and feeling a bit ashamed of your actions now that you're in safety you tell her what happened. She listens intently, nodding every once in a while. You eventually get to the point where you ran away and flinch, afraid that she'll lash out at you or something.\n        Contrary to your expectations she doesn't and simply stares at you for a while before speaking her thoughts.\n        \n        \"That wasn't nice of you, little one. Abandoning ${npc} like that.\"\n        \n        The harsh tone in her voice makes you feel even worse than before, and you wish you could blend in with the background. Then her expression softens, and you sheepishly look up at her.\n        \n        \"Still, it was probably one of the best things you could do. With you out of harm's way ${npc} wouldn't have to hold back anymore, which would give ${npc_him} a much better chance against the lava golem than ${npc_he} would've had if you'd stuck around.\"\n        \n        You blink slowly. Well, that's one way of looking at it. Still, why would ${npc} have bothered to bring you along in the first place if you'd only make ${npc_his} job that more difficult...\n        You just can't figure ${npc_him} out.\n        *page_break\n        After a short hour you can see ${npc} approaching in the distance, looking triumphant albeit a bit singed around the edges. Part of ${npc_his} hair is burnt, you think ${npc_he}'s missing an eyebrow and there is a large hole burned through the side of ${npc_his} coverall.\n        The skin visible through it doesn't show any burns though, so you guess that whatever caused it was not as bad as it looked on first glance.\n        \n        Even though ${npc} doesn't look angry you don't want to face ${npc_him} right now, so you scale the rickety rope ladder up to the coach on Electra's back as quickly as you can, hoping to find some place to hide in there.\n        You forgot to take into account ${npc}'s magic though, so by the time you finally get up there ${npc_he}'s already waiting for you, strangely enough looking like ${npc_he} wants to reassure you.\n        \n        \"It's fine, all right? I would've done the same thing if I were in your position. You don't have to feel guilty about it.\"\n        *page_break\n        You roll your eyes and try to make your way past ${npc_him}. Is ${npc_he} really trying to spare your feelings even in such a situation?\n        ${npc} continues to block your path though, and sends you a stern look. \"I'm serious, you know. My main concern was for you to get back to your world in one piece, so when you got yourself to safety it actually helped me a lot.\"\n        \n        Despite yourself ${npc_his} obvious concern warms your heart, though it is unnecessary. \"I never told you the details of the whole traveling through books thing, right?\"\n        \n        It's pretty obvious that ${npc} doesn't really get where you're going with this, and ${npc_he} shakes ${npc_his} head. \"Well, I'm not quite sure about the details, but I doubt I'd die in the real world if I got myself killed inside a book.\n        I can't imagine it being a pleasant experience though.\"\n        \n        ${npc} frowns and stares off into the distance, ${npc_his} voice barely audible. \"You'd still die in my world though.\" \n        \n landgo\n        *if element = \"wind\"\n            Using your air magic you slash at one of the golem's legs in an attempt to make it loose its footing. \n            For a moment the golem staggers, but then its eyes flare up and you are barely able to divert the worst of the glob of lava it hurled at you.\n            Some of it manages to get through your defenses though, and you scream in agony as the lava burns through your coverall.\n            *goto healandgo\n        *else\n            Using your earth magic you reach out to one of the golem's legs and try to yank one of the larger chunks of half-molten rock out of it in an attempt to make it lose its footing.\n            For a moment the golem staggers, but then its eyes flare up and you are barely able to block the worst of the glob of lava it hurled at you.\n            Some of it manages to get through your defenses though, and you scream in agony as the lava burns through your coverall.\n            *goto healandgo\n        *label healandgo\n        \n        You stagger back in pain as the flaming monstrosity raises one of its red-hot fists to finish you off, but a giant slab of ice slams into the back of its head before it can put its plan into action.\n        With a loud howl it turns to ${npc}, and you are forgotten for the moment. Trying to ignore the pain you drag yourself behind a rock outcropping and try to cool the fire burning your flesh as well as your limited magical powers allow.\n        *set health -30\n        *page_break\n        After what feels like an eternity the sounds of battle die down and you tense up in case ${npc} wasn't the one that won. As a triumphant looking albeit a bit singed ${npc} sticks ${npc_his} head around the corner of your hiding place it becomes apparent that your fears weren't justified, and you sigh in relief.\n        Of course this small movement makes your clothes scrape over your burns and you grit your teeth in pain. You really got yourself a bit messed up this time around.\n        \n        ${npc} looks at you in concern. \"That looks quite bad, to be honest. Do you mind if I try to do something about it?\"\n        After some hesitation you nod your head in agreement (which might not have been the best way to convey the message, since it hurts). Whatever ${npc_he}'d want to do about your injuries can't really make them worse.\n        \n        ${npc} quickly takes inventory of your various burns and then spreads ${npc_his} hands out above the most badly damaged areas, not quite touching the skin. \n        A soft glow forms around them, soon spreading to envelop ${npc}'s entire body. You're not sure what is going on exactly, but you can see your burns heal at a ridiculous speed.\n        After a short while some faint scars are the only visible proof that they'd been there at all.\n        \n        You shoot ${npc} a confused look, and ${npc_he} shrugs. \"What? Is it that surprising that I know some basic healing magic?\"\n        You return ${npc_his} shrug with one of your own. \"Well, you do seem like more of a fighter than a healer.\"\n        ${npc} rolls ${npc_his} eyes. \"Well, it was one of my lesser subjects during magic training. After all my magic affinity is more towards the fire side of the spectrum, and healing magic is usually categorized as a subgroup of water magic. I can still do the basic stuff though, be it with some limitations.\"\n        \n        You frown. \"So... Now we're discussing the elemental spectrum of magic while there is some very dangerous lava golem putting itself back together not too far away from here?\"\n        ${npc} grins sheepishly at your rather bluntly stated observation. \"Now that you mention it... We'd better go grab the magic crystals and get out of here ASAP.\"\n        \n        *set health +20\n        *if (balloon)\n            You do just that, and after an hour or so you're back at where you left the balloon, and you get ready to leave.\n            *page_break\n            *goto whattodowithnpctwo\n        You do just that, and after an hour or so you meet up with Electra, who was waiting for you exactly where you left her.\n        *page_break\n        *goto whattodowithnpc\n    #Get the crystallized magic to safety first.\n        You need to get the basket with the magic crystals to safety first. If those are destroyed this whole trip would've been in vain. After all isn't the whole purpose of this dangerous trip to gather the fuel the island so desperately needs to stay afloat?\n        \n        While the lava golem is distracted by ${npc}'s attacks you grab the basket that stands on the ground within arm's reach and drag it towards a rocky outcropping. Now that it's almost full it is a lot heavier than before, and by the time you get close enough to the rock to hide it your hands, arms and back hurt.\n        Lava golem aside, how does ${npc} intend to even get that back to where it's needed? The answer is probably magic, but still...\n        \n        With some effort you squeeze the whole basket into a crack in the rock and peek around the corner to see how ${npc} is doing. $!{npc_he} seems to be holding his own for now, so maybe you should just let ${npc_him} handle this on ${npc_his} own.\n        *choice\n            #Yeah, that's probably a good idea. You wouldn't want to get in ${npc_his} way.\n                With that in mind you stay hidden behind the rock and peek out to take a look at the fight every once in a while. ${npc} takes a few hits from time to time, but it is obvious that the lava golem is no match for ${npc_him} in the long run.\n                \n                After what feels like an eternity the lava golem finally acknowledges that it has met its match and its heavily damaged body disintegrates into a fiery pile of lava and half molten rock. It seems the battle is over for now.\n                Still a fair distance away you see ${npc} do something to treat ${npc_his} injuries after which ${npc_he} turns around and starts walking in your direction.\n                As ${npc_he} gets to your hiding place ${npc_he} crouches down next to you, looking triumphant albeit a bit singed around the edges.\n                \"That went better than expected, didn't it?\"\n                \n                You roll your eyes at that, since ${npc_his} cheerfulness does not quite match the severity of the situation of the past fifteen minutes.\n                \"Let me put it this way. If you consider this to be a nice day-trip I guess I'll have to stick to the island next time around.\"\n                \n                ${npc} looks shocked by your words, and you roll your eyes again. \"Never heard of sarcasm?\"\n                At your words ${npc} visibly relaxes. \"You'd better teach me some of the more flashy magic though. It doesn't feel right to just sit here and watch you do all the work.\"\n                \n                A wide grin spreads across ${npc}'s face, and ${npc_he} nods. \"Sure. If that helps put you at ease...\"\n                You playfully poke ${npc_him} in the ribs and drag the basket with crystallized magic from its hiding place.\n                \"I'm afraid you'll have to carry the basket though. This thing is darn heavy.\"\n                \n                *if (balloon)\n                    ${npc} nods, and together you leisurely stroll back to the balloon's landing place.\n                    *page_break\n                    *goto whattodowithnpctwo\n                ${npc} nods, and together you leisurely stroll back to Electra's landing place.\n                *page_break\n                *goto whattodowithnpc\n            #It doesn't feel right to just sit here. The least you can do is to distract the fiery monstrosity somehow.\n                You cautiously move away from where you left the basket, take cover behind a rock and let your magic flow to your fingertips.\n                It's about time you put your (be it very limited) training into action. You focus on the lava golem's back and\n                *if element = \"fire\"\n                    draw heat away from the glowing rocks, a small amount at a time. It doesn't do much damage, but that was not the purpose anyway.\n                    *goto donewithdistractions\n                *if element = \"water\"\n                    fling some droplets of water at it at strategical places. The water doesn't cause much damage, but that was not the purpose anyway.\n                    *goto donewithdistractions\n                *if element = \"wind\"\n                    use gusts of wind to carve shallow grooves into it. The wind doesn't cause much damage, but that was not the purpose anyway.\n                    *goto donewithdistractions\n                *else\n                    pluck some of the smaller half-molten rocks out of it. This doesn't cause a lot of damage, but that wasn't the purpose of this whole thing anyway.\n                    *goto donewithdistractions\n                \n                *label donewithdistractions\n                \n                Irked by your pin-prick attacks the lava golem swivels its head around, but its attention is drawn away by yet another one of ${npc}'s attacks before it can locate you.\n                Happy to see that your still pretty weak magic can actually make a difference you continue to attack it, trying to keep an eye on what ${npc} is doing to make sure you distract it at the right moments.\n                This tactic proves to be very effective and before long the lava golem falls to its knees, roaring in agony.\n                You didn't expect what happened next though.\n                \n                The lava golem's roar intensifies, and you cover your ears with your hands. For a moment the lava golem seems to boil, and then it explodes, launching lava in all directions.\n                You try to use your magic to shield yourself, but with your hands still at your ears you can't take on a defensive posture quickly enough. As a result you are pelted with lava, which was thankfully broken down into small drops by the rock you were hiding behind.\n                The small droplets manage to burn their way through your gloves and coverall, leaving small round burn marks, but not causing too much damage. If you'd have to compare it to something you'd say it felt like being stung by a wasp.\n                Painful, but not unbearable.\n                *set health -10\n                *page_break\n                As you're trying to figure out a way to cool your burns ${npc} peeks around the corner of the rock, looking triumphant but, much like yourself, a bit singed around the edges.\n                $!{npc_he} crouches down next to you and turns ${npc_his} attention to your mild burns, using some water ${npc_he} conjured up to cool them, and grins at you. \"That were some great distractions you pulled off back there. It really helped to keep that thing off my back.\"\n                \n                You blush slightly at ${npc_his} praise and stare at your burns, which are slowly starting to take on a less red shade. \"It's nice I could be of use somehow, but it's kinda obvious I've still got a lot to learn.\"\n                \n                ${npc} gives you a wink and slowly traces the patterns of the burns on your skin, ${npc_his} hands glowing ever so slightly. \"Well, sure, but considering that you've only had a few hours of training it is quite impressive no matter how you look at it.\"\n                You frown. \"With this level of magic I don't see myself taking on a lava golem on my own any time soon though, and it looked like you would've been able to handle it even without my interference.\"\n                \n                ${npc} shrugs. \"It wasn't all that impressive. We just got lucky that the only lava golem that crossed our paths this far was a fairly weak one.\"\n                At this casual remark your eyes fly open, and it almost feels like they're about to pop from their sockets. \"[i]This lava golem was a weak one?[/i]\"\n                \n                ${npc} rolls ${npc_his} eyes, not fazed by your outcry of obvious disbelief. \"For as far as lava golems go, yes, this was a pretty weak one. I've seen those the size of mountains, and in that case your only option is to run away as fast as your legs will carry you and pray that it will ignore you.\n                Those are pretty frightening, even to someone of my abilities.\" $!{npc_he} pauses for a while as you struggle to digest this information. \"Now that I mention it, we should probably not linger around here for much longer.\n                While those things don't technically have parents the stronger ones do tend to look out for the fledglings, and you really don't want to run into one of those.\"\n                *set health +10\n                \n                You nod, still a bit stunned by the mental image of an even larger lava golem, and ${npc} helps you to your feet.\n                *if (balloon)\n                    \"Could you please point me where you left the crystallized magic? I'd like to head back to the balloon as soon as possible.\"\n                    *page_break\n                    *goto whattodowithnpctwo\n                \"Could you please point me where you left the crystallized magic? I'd like to head back to Electra as soon as possible.\"\n                *page_break\n                *goto whattodowithnpc\n\n*label whattodowithnpctwo\n*achieve golemsurvivor\n*temp temprelationship  false\nYour mission to retrieve enough crystallized magic to keep the island afloat didn't go off without a hitch, and now you and ${npc} are sitting opposite each other on the roof of the shuttle, the tension in the air palpable.\nNot really knowing what to do with the situation you sigh, and sheepishly pull a hand through your hair.\n*goto relationshipwithnpc\n\n*label whattodowithnpc\n*achieve golemsurvivor\n*temp temprelationship  false\nYour mission to retrieve enough crystallized magic to keep the island afloat didn't go off without a hitch, and now you and ${npc} are sitting opposite each other on the coach's comfortable benches, the tension in the air palpable.\nNot really knowing what to do with the situation you sigh, lean back into the pillows and stare at the ceiling.\n*label relationshipwithnpc\n\"So we've somehow managed to get our hands on some crystalized magic. What happens next?\"\n\n${npc} shrugs. \"The expected, I guess. We rush back to the island to get these crystals to the main engine and then all is safe again. Well, for the next fifty years or so. The stuff'll run out again sooner or later, but that's of a later concern.\nFor the moment we'll be able to kick back and relax, someone'll get the brilliant idea to throw a party in our honor and then... Well, I guess we'll need to figure out a way to get you back home again. Not that I mind you being here. I just figured you might have people waiting for you in your own world.\"\n\nSomething about ${npc_his} tone makes you feel like the last bit was less of a polite inquiry about any relatives you might have and more like a barely concealed question about if you're currently in a relationship, and you're not immediately sure how to respond.\nStill, since ${npc_he} keeps staring at you with what undoubtedly is ${npc_his} best attempt at puppy eyes you guess you'll have to.\n\n*choice\n    #\"I'm not dating anyone right now, and I'm not planning to ever change that.\"\n        While that was probably not the most diplomatic way to phrase it, it sure got the message across. For a short moment ${npc}'s face clouds over, but then a sheepish grin gets the upper hand.\n        \"Oh, all right. I guess I must've misinterpreted the signs again.\"\n        \n        It is silent for a while before ${npc} regains ${npc_his} bearings. \"So, the dating thing is obviously a no-go, but can we be friends at least? You know, keep in touch? Maybe pen-pals even?\"\n        You roll your eyes at ${npc}'s obvious reluctance to just abandon the idea altogether.\n        *choice\n            #\"No. You'd only get the wrong idea.\"\n                This is not the first time something similar has happened to you, and you are well aware that some people only see that initial rejection as a challenge. As nice a person ${npc} might be, you just can't risk it.\n                \n                ${npc} is silent for a few minutes, and then solemnly nods. \"Understood. I won't ask about it again.\"\n                And like that, that path has been blocked off permanently.\n                *page_break\n                *goto justnotinterested\n            #\"Oh all right. Just make sure to remember that friendship is something purely platonic. Got it?\"\n                Judging from the wide grin spreading on ${npc}'s face you might only have made things unnecessarily complicated, but you don't want to hurt ${npc_his} feelings too much.\n                And besides, you're bound to be going back to your own world soon anyway, so keeping some distance between the two of you shouldn't be too difficult.\n                \n                *goto keepintouch\n                \n    *if (mc_in_relationship) #\"In case you wanted to ask if I am in a relationship with someone, yes, I am.\"\n        ${npc} looks at you with a sheepish expression that makes you suspect that your hunch was correct, even though ${npc_he} tries to make it look like it wasn't.\n        \"Oh, OK. Good for you.\"\n        \n        *goto justnotinterested\n    #\"I'm not in a relationship with anyone, but I'm not interested in you in that way either.\"\n        For a moment the disappointment is clearly visible on ${npc}'s face, but then ${npc_he} regains ${npc_his} composure.\n        \"That's too bad. You are a really interesting\n        *if he = \"he\"\n            guy\n        *if he = \"she\"\n            woman\n        *if he = \"they\"\n            person\n        , and I like you a lot, but I guess the feeling isn't mutual.\"\n        \n        $!{npc_his} late confession makes you feel a bit ill at ease, but you've already made your choice. That doesn't mean you can't try to make things easier for ${npc_him}.\n        *choice\n            #Suggest that you could try to be friends instead.\n                \"If you're not too upset about the whole thing that just happen we could try to be friends or something. You know, keep in touch. Maybe we could write letters or something...\"\n                \n                ${npc} is silent for a long time, and you begin to feel like it'd have been better if you hadn't breached the subject.\n                Then ${npc_he} rolls ${npc_his} eyes and looks up. \"Oh well. Why in the world not? It's not like I've got anything to lose.\"\n                You roll your eyes at ${npc_his} reasoning, but don't comment. If ${npc_he}'s still hoping you could get together somehow that's ${npc_his} problem, not yours.\n                *page_break\n                *goto keepintouch\n            #Keep your mouth shut. You've made your decision already.\n                Whatever. You're not going to make ${npc_his} words affect your decision.\n                \n                *goto justnotinterested\n    #\"In case you wanted to ask if I'm dating someone, no, I'm not. And yes, I would like to do something about that.\"\n        You must not have expressed yourself all that clearly, because ${npc} stares at you with a hopeful but unsure expression.\n        \"Is that a general 'I'd like to date someone', or are you specifically referring to me?\"\n        \n        You roll your eyes at ${npc_his} question, because to you it is something completely obvious.\n        *choice\n            #\"I mean you, of course.\"\n                As cliché as it might be you have to admit that you've got something of a crush on this book's attractive young hero. (Even though you've only known each other for less than forty-eight book hours and that ${npc_he} can be quite annoying at times.)\n                \n                ${npc} blushes a bright red and timidly grabs one of your hands. \"So, ehm, does that mean we're a couple now?\"\n                You roll your eyes at ${npc_his} uncertainty and nod. \"I'd say we've known each other for too little time to call it something that sounds that official, but something like that.\"\n                \n                ${npc}'s blush intensifies, and ${npc_he} grins from ear to ear. \"That's awesome. I've never\n                *if he = \"he\"\n                    had a boyfriend\n                *if he = \"she\"\n                    had a girlfriend\n                *if he = \"they\"\n                    been in a relationship\n                before.\"\n                \n                For a while you stare at ${npc}, completely taken off guard by ${npc_his} sudden revelation, a blush creeping up to your cheeks.\n                Well, at least that explains ${npc_his} sudden cluelessness.\n                *achieve loveinstrangeplaces\n                *set temprelationship true\n                *page_break\n                *goto keepintouch\n            #\"I'm talking about the general case, of course.\"\n                While ${npc} is a nice enough person, it's not like you would consider dating ${npc_him}.\n                You've only known each other for less than forty-eight hours, and ${npc_he}'s a fictional character to boot.\n                Even if you did have feelings for ${npc_him} you couldn't see that end well.\n                \n                As you are thinking about the situation the clearly dejected ${npc} gets up from ${npc_his} seat and stalks off to the carriage door.\n                *choice\n                    #\"We could be friends though.\"\n                        ${npc} stops dead in ${npc_his} tracks and slowly turns around, a hopeful glimmer in ${npc_his} eyes.\n                        \"Really?\"\n                        \n                        You nod slowly and gesture at the bench opposite of you.\n                        \"Really. Now please sit down and act like the little misunderstanding of just now didn't happen.\"\n                        \n                        ${npc} nods and slowly walks back over to the bench. \"It's worth giving it a shot, I guess.\"\n                        *page_break\n                        *goto keepintouch\n                    #Ignore ${npc_him} from now on.\n                        It's probably for the better to keep your distance. You wouldn't want to give ${npc_him} false hope.\n                        *page_break\n                        *goto savedtheworldparty\n\n*label keepintouch\nAfter a slightly awkward silence ${npc} shakes ${npc_his} head and focuses on a different but equally relevant topic.\n\"So, after we somehow manage to get you back to your own world, is there any way to keep in touch? Or will that just be the end of it?\"\n\nYou shrug and take the improvised radio out of your pocket. \"I'm not completely sure, but if there is a way it'll probably be through this radio.\nIt somehow exists in both the real world and the fictional ones,\n*if (stories_completed \u003c 2)\n    and my uncle, who seems to be trapped in a book somewhere, was able to contact me with it, though my reply doesn't seem to reach him.\n    I guess it might just not be strong enough for that yet.\"\n    *goto radioscan\n*if (stories_completed = 2)\n    and my uncle, who seems to be trapped in a book somewhere, was able to contact me with it, and by amplifying its signal with the macguffins I'd collected I was able to get a signal through.\n    It are apparently only beeps right now, but it is an improvement over not being able to reach him at all.\"\n    *goto radioscan\n*if (stories_completed = 3)\n    and my uncle, who seems to be trapped in a book somewhere, was able to contact me with it, and by amplifying its signal with the macguffins I'd collected I was able to get a signal through before.\n    It were only beeps though, and the last time I was in the real world I only received static. I just hope that it was the radio acting up, not that there's something wrong on my uncle's end.\"\n    *goto radioscan\n*else\n    and my uncle, who seems to be trapped in a book somewhere, was able to contact me with it, and by amplifying its signal with the macguffins I'd collected I was able to get a signal through before.\n    We were even able to directly speak to one another.\"\n    *goto radioscan\n\n*label radioscan\n\n${npc} nods in understanding and stretches out ${npc_his} hand. \"In that case, could I borrow it for a bit? I might be able to figure out how to make something that can connect to it once I understand how it works.\"\nYou hand ${npc_him} the radio with a slight reluctance. \"Just don't break it, alright?\"\n\n${npc} nods slightly and proceeds to pry the small radio apart while you watch from a distance. You sure can't make sense of it, but then again you're not exactly an expert in interdimensional electronics.\n*page_break\nAfter a while ${npc} puts the radio back together and hands it back to you. \"Thanks for letting me borrow it for a bit. I should have plenty to go on now.\"\n\nYou carefully put the radio back in your pocket and frown. \"Really? It didn't look like you were making notes or anything.\"\n${npc} rolls ${npc_his} eyes and taps the side of ${npc_his} helmet. \"I've made plenty of pictures, and the schematics of that thing are somewhere in my helmet's visual memory as well. It's quite a simple device, so reverse-engineering it wasn't too difficult.\"\n\nYou sigh and shake your head in disbelief. That's right. You forgot about the advanced technology that is used around here.\n*page_break\n*goto savedtheworldparty\n\n*label justnotinterested\nFor a while ${npc_he} just stares off in the distance, and you wait patiently for ${npc_him} to recover from your, no doubt very disappointing, news and come up with another question.\n$!{npc_he} doesn't fail to deliver.\n\n\"So, do you have any idea how to get back to your world?\"\nYou shrug.\n\n\"In all honesty I'd hoped to find some way just by sticking close to this story's main character, which would be you, but I haven't seen anything that seems out of place here yet.\"\n\n${npc} frowns. \"So you have to find something that is out of place here in order to get back to your world?\"\nYou shrug. \"I guess so, though with the way books tend to go I might still be surprised on that.\"\n*page_break\n*goto savedtheworldparty\n\n*label savedtheworldparty\nAfter a long and not especially memorable night and a somewhat awkward breakfast the floating island comes back into view and you prepare for landing. It looks a lot different than you remember, though you can't imagine having somehow overlooked the large, shining metal flaps, protruding from the island like giant flower petals, when you last saw the place less than forty-eight hours ago.\nYou turn to ${npc}.\n*fake_choice\n    #\"Have those things always been there?\"\n        ${npc} shrugs. \"Well, in theory they have. They just weren't visible. The people back on the island must have dropped the cloaking mechanism to conserve fuel or something.\"\n    #\"What are those metal flaps for?\"\n        ${npc} shrugs. \"Oh, those are left over from the last great war. They are part of the island's defense mechanism. They're usually hidden by a cloaking mechanism, but it seems that has been dropped. I guess they must be trying to conserve energy or something.\"\n    #\"Why does the island look like a giant flower all of a sudden?\"\n        ${npc} chuckles and raises an eyebrow. \"Well, I guess it does look that way from a certain angle. Those things aren't there to look pretty though. They're part of the island's defense mechanism. A leftover from the last great war. They must've dropped the cloaking mechanism to conserve fuel or something.\"\n\n*if (balloon)\n    You make the balloon lose altitude and steer it towards the large open area you took off from, with a bit of help of ${npc}'s magic. Since it's close to where the shuttles are stored you guess it must be some sort of runway, though it's a bit short for one.\n    After a few tense moments the shuttle touches the ground and you and ${npc} jump down to drag it to some place out of the way and secure it to the ground.\n    After that's done ${npc} climbs back into the shuttle to grab the basket with crystallized magic, and then you're off to meet up with the welcoming committee.\n    *page_break\n    *goto welcomebackyousavedtheworld\nElectra circles around the island a few times to lose altitude and then sets course for an empty strip of land surrounded by partially demolished buildings.\nAs she reaches the start of this improvised runway and stretches out her wings to their full length to act as breaking parachutes you can see why, and brace yourself for impact.\nHer claws touch the ground and anchor themselves into the ground while her wings dig themselves into the steel-reinforced concrete on her flanks, and you are flung towards the front bench by the sudden deceleration.\nIt feels an awful lot like a car-crash, and for a split second you wonder why this thing isn't equipped with seat-belts.\n\nThen you are slammed into the front bench, which probably would've hurt if the cushions hadn't been there to absorb the impact.\nNow you just feel jostled and slightly disoriented for a few seconds. Then ${npc}, who obviously knew how to brace ${npc_him}self for impact is at your side and helping you to your feet with an annoying amount of amusement visible in ${npc_his} eyes.\nYou throw a half-assed punch in ${npc_his} direction, which ${npc_he} sidesteps with a wink, after which ${npc_he} grabs the basket with crystallized magic out of one of the lower cupboard and makes ${npc_his} escape.\nGrumbling in annoyance you head for the door as well and make your way down the rope ladder. You'll get ${npc_him} for that.\n*page_break\n*label welcomebackyousavedtheworld\nYour welcome is a short but exuberant one. Maria and her parents are at the front of the gathered crowd, accompanied by two boys you assume to be the 'brats' ${npc} mentioned before.\nThe little troublemaker sticks out her tongue at you and you roll your eyes. At least she didn't change a bit in the last two days.\n\nAfter shaking a few hands ${npc} pushes past the crowd, and you follow close behind. Whatever this world's macguffin might be, it should be close now.\nThe story is obviously nearing its conclusion. Or could there be a sequel? That'd make things even more complicated.\n\nWhile you're deep in thought about whether or not you'd be automatically transported to any sequel this story might have and if that'd mean there isn't a macguffin in this particular story at all you follow ${npc} into a low tower at the center of the island, which vaguely reminds you of a cooling tower for a nuclear power plant.\nInside are a lot of large screens filled with blinking lights and what you think might be large amount of text, but since you can't read it you can't know for sure.\nThere are also some people in lab-coats walking around, various levels of worry showing on their faces.\n\n${npc} rasps ${npc_his} throat, and all people in the room turn to look at ${npc_him}, obviously startled by the noise. Then a wide smile breaks through on the face of one of them. The woman rushes forwards and takes ${npc} in a tight hug.\n\"You are a life-saver. Thank you so much!\" Then she takes the basket and rushes off to a large spherical device hovering in the center of the room and pushes one of the shards of crystallized magic into it.\nThe device glows for a second, and then starts humming audibly. Since nobody panics you guess that must be a good thing.\n*fake_choice\n    *selectable_if (temprelationship) #You're more pre-occupied by why that woman hugged ${npc} though, and why ${npc_he} let her.\n        You're probably reading too much into it, and besides, you and ${npc} have only known each other for about forty-eight hours or so, but the way that woman greeted ${npc_him} left you feeling anxious.\n        You draw ${npc_his} attention by gently tugging ${npc_his} sleeve, and ${npc_he} turns around with a surprised and slightly worried look on ${npc_his} face.\n        \n        \"Is something the matter, ${name}?\"\n        \n        You frown, and inconspicuously point at the back of the woman instead. That seems to trigger a spark of recognition.\n        \n        \"Oh, right. The greeting.\"\n        \n        ${npc} looks a bit sheepish, and gently ruffles your hair.\n        \n        \"She's my aunt, actually. My mom was the oldest of the bunch. She's the youngest. They were born about twenty years apart, so my aunt is closer to my age than those of my parents. It can get a bit weird from time to time, but she's a really nice person.\"\n        \n        You sigh and squeeze ${npc}'s hand. Looks like you got all worked up over nothing.\n        *page_break\n    #You wonder what job that woman of just now has around here.\n        She seems to be a pretty important person, going by how she took charge of the situation. You don't really know how things are organized here though, so maybe it was just a coincidence.\n    #You wonder how ${npc} knows this woman.\n        On an island this size it's pretty obvious that they've met before, but in what way? Going by the warm welcome you doubt they're just vague acquaintances, but then what?\n        Are they relatives? Childhood friends? Or are they dating or something.\n        *if (temprelationship)\n            You should probably ask ${npc} about it sometime soon.\nYou watch for a while as the staff tending to the device run around the building while pushing buttons, but since you can't make sense of it that grows boring pretty quickly.\nYou turn to ${npc} and sigh. \"Is there a reason for us to stay here, or can I bail out now?\"\n\n${npc} shrugs. \"To be honest I dread stepping out of that door right now, but it's not like the crowd is going to disperse if we loiter for ten more minutes or something.\"\n\nRight. The mass of people you just had to get past to even get there, and the party ${npc} predicted they'd throw in your honor. You forgot about that for a second.\n*page_break\nAs soon as you and ${npc} leave the building you are herded to a large open space on the island which the crowd has somehow managed to transform in something akin to an open-air ballroom in the short time you spent in the engine building.\nThere are lights and garlands everywhere, music is playing in the background and there are tables filled with food lining the walls of the surrounding buildings. As soon as the onlookers pot the two of you a loud cheer breaks out and you are tugged to the center of the dancefloor and are forced to give a speech.\nLuckily ${npc} was better prepared for this than you were, but you still feel very uncomfortable under the stares of all these people.\n\nAfter a torturous half hour you are finally free to go and you retreat to a shadowy corner somewhere on the fringes of the plaza.\n*if (temprelationship)\n    There you stand and watch the suspicious looking food on the table closest to you, and hope that the food in the other books'll be a bit more similar to what you're used to.\n    Sure, the sandwiches you had before tasted fine, but at least those looked edible. You can't really say the same about this stuff. All those bright, wriggly things don't look particularly appetizing.\n    \n    About half an hour passes before ${npc} finally manages to free ${npc_him}self from the crowd and make ${npc_his} way over to your side.\n    You're glad ${npc_he} did, because the clinginess of the woman you first met at the engine room was getting close to the point where you'd feel you'd have to do something about it.\n    It was clear the feeling wasn't mutual, though, and ${npc}'s attempts to keep ${npc_his} distance from her did make you feel like ${npc_he} was being serious about the whole relationship thing.\n    *page_break\n    You're not sure what to do with the situation, so for a while you just stand there side by side, staring awkwardly off into space.\n    Then ${npc} seems to man up (for as far as that's the appropriate word to use) and ${npc_he} turns to you, ${npc_his} blush visible even in the shimmery light.\n    \"So, ehm... Would you like to dance with me?\"\n    \n    You blink a few times, looking from ${npc_him} to the dance floor and back again. Judging from the couples dancing right now the locals'd be all right with pretty much any pairing you could come up with, so that's not an issue, but the dancing itself...\n    That seems a bit above your level. Especially since you don't know enough about local dance moves to even be able to pretend that you know what you're doing.\n    \n    You look at ${npc} in hesitation and ${npc_he} gently puts an arm around your shoulder and ruffles your hair. \"Don't worry. I won't run off if you stand on my toes.\"\n    You roll your eyes at ${npc_him} and look back to the dance floor. \"That was not exactly my first concern, but thank you for reminding me. Now let's get over there before I change my mind.\"\n    \n    The triumphant look in ${npc}'s eyes while ${npc_he} leads you to the dance floor almost makes you feel like it's worth the embarrassment that's sure to come.\n    \n    Almost.\n    *page_break\n    *goto finallymacguffin\n*else\n    In the distance you can see ${npc} navigating through the hustle and bustle with ease, obviously having the time of ${npc_his} life.\n    The woman from the engine building shows up some time later and heads straight for her target. Still, you don't think ${npc} is nearly as much into her as she is into ${npc_him}.\n    Sure, their conversation looks quite animated, but you can't help but to notice that ${npc} deliberately keeps a bit of distance from her.\n    You're not sure you pity her.\n    *page_break\n    *goto finallymacguffin\n\n*label finallymacguffin\nThe party lasts until well in the night and as people finally begin to head home you make your way out as well, following ${npc}'s lead.\nYou absentmindedly wonder where ${npc_he}'s planning to take you, but you're too tired to really worry about it. To ${npc_his} house maybe?\nThat could get awkward.\n\nYou don't ever get to find out though, because ${npc} suddenly stops in ${npc_his} tracks and points at an item dangling from a piece of rebar sticking out of yet another ruined building.\n\"What's that?\"\n\nYou squint your eyes and move closer while ${npc} points a flashlight at the item. It looks out of place somehow.\n\"It looks like a top hat. What is a top hat doing in a world like this?\"\n\nAs you wonder about what a top hat is doing in such a place ${npc} picks it up and twirls it around a few times. For some reason the hat's red lining makes you feel ill at ease and you instinctively take a few steps back.\n${npc} doesn't seem to notice your presence anymore, and suddenly puts the hat on ${npc_his} head. You still try to warn ${npc_him} about your premonition, ${npc_he} doesn't react to your words at all.\nAs ${npc_he} looks at you again ${npc_his} eyes are vacant, and you know you were too late.\n*if (stories_completed \u003c 1)\n    The hat has somehow taken control of ${npc_him}.\n*if (stories_completed >= 1)\n    The macguffin has somehow taken control of ${npc_him}.\n\nAll of a sudden ${npc} lashes out at you with ${npc_his} two-hander sword and you barely manage to dodge the now brightly burning blade.\nThis is bad.\n\nYou make a run for it, trying to at least put some distance between you and ${npc}, but ${npc_he}'s way too fast for that.\nMumbling some obscenities but feeling very determined you turn around to face ${npc_him} and brace yourself.\nYou've got to get that hat away from ${npc_him}, and it looks like you've only got one shot at it.\nYou'd better make it count.\n*choice\n    #Use some magic to distract ${npc} and make a grab for the top hat.\n        *if mind >= 70\n            *if element = \"fire\"\n                You throw a handful of embers at ${npc}, and ${npc_he} instinctively raises ${npc_his} arm to shield ${npc_his} face.\n                You'd counted on that though, and the embers explode with a blinding light upon contact.\n                \n                While ${npc}'s looking around disorientedly and blinking to try and get ${npc_his} eyes back into focus it is all too easy for you to sneak around ${npc_him} and grab the rim of the top hat.\n                *goto good_end\n            *if element = \"water\"\n                You throw a handful of water at ${npc}, and ${npc_he} instinctively raises ${npc_his} arm to shield ${npc_his} face.\n                You'd counted on that though, and the water freezes over and explodes into a thousand shards upon contact.\n                \n                While ${npc}'s looking around disorientedly and blinking to try and get the tiny pieces of ice out of ${npc_his} eyes it is all too easy for you to sneak around ${npc_him} and grab the rim of the top hat.\n                *goto good_end\n            *if element = \"wind\"\n                You throw a small whirlwind at ${npc}, and ${npc_he} instinctively raises ${npc_his} arm to shield ${npc_his} face.\n                You'd counted on that though, and the whirlwind deftly evades the obstacle before falling apart into sharp gushes of wind, which make tiny cuts into ${npc}'s eyes and exposed skin.\n                \n                While ${npc}'s squinting ${npc_his} eyes shut in pain it is all too easy for you to sneak around ${npc_him} and grab the rim of the top hat.\n                *goto good_end\n            *else\n                You throw a handful of pebbles at ${npc}, and ${npc_he} instinctively raises ${npc_his} arm to shield ${npc_his} face.\n                You'd counted on that though, and the pebbles disintegrate into a fine sand.\n                \n                While ${npc}'s looking around disorientedly and blinking to try and get the tiny grains of sand out of ${npc_his} eyes it is all too easy for you to sneak around ${npc_him} and grab the rim of the top hat.\n                *goto good_end\n        *else\n            *if element = \"fire\"\n                You throw a handful of embers at ${npc}, and ${npc_he} instinctively raises ${npc_his} arm to shield ${npc_his} face.\n                You try to make use of this distraction to try and grab the rim of the top hat, but ${npc} recovers from your distraction too quickly and you are burned to a crisp.\n                *goto bad_end\n            *if element = \"water\"\n                You throw a handful of water at ${npc}, and ${npc_he} instinctively raises ${npc_his} arm to shield ${npc_his} face.\n                You try to make use of this distraction to try and grab the rim of the top hat, but ${npc} recovers from your distraction too quickly and you are burned to a crisp.\n                *goto bad_end\n            *if element = \"wind\"\n                You throw a small whirlwind at ${npc}, and ${npc_he} instinctively raises ${npc_his} arm to shield ${npc_his} face.\n                You try to make use of this distraction to try and grab the rim of the top hat, but ${npc} recovers from your distraction too quickly and you are burned to a crisp.\n                *goto bad_end\n            *else\n                You throw a handful of pebbles at ${npc}, and ${npc_he} instinctively raises ${npc_his} arm to shield ${npc_his} face.\n                You try to make use of this distraction to try and grab the rim of the top hat, but ${npc} recovers from your distraction too quickly and you are burned to a crisp.\n                *goto bad_end\n    #Run over to ${npc} and make a grab for the top hat.\n        *if soul >= 70\n            You rush forward and somehow manage to duck below the slash that was aimed for your neck and latch yourself on to ${npc}'s back.\n            Annoyed ${npc_he} tries to shrug you off, but you hold on, knowing that if you'd fall that'd be the end of it.\n            $!{npc_he}'s got other ways to make you let go though.\n            \n            As you try to grab the top hat ${npc}'s coverall catches on fire, but you push through and your severely burned hand finally touches the hat's rim.\n            *goto good_end\n        *else\n            You rush forward, but the slash of the burning blade aimed at your neck was too fast for you to dodge and your head is lobbed off.\n            *goto bad_end\n    #Try to overpower ${npc} and make a grab for the top hat.\n        *if body >= 70\n            You run for ${npc}, catch the flaming sword that is swung at you by the hilt and drive your shoulder into ${npc}'s mid-section.\n            The force of the impact forces the breath out of ${npc_him}, and you both fall over, but that doesn't matter.\n            In fact, it only makes it that much easier for you to reach over and grab the rim of the top hat that is mysteriously still stuck to ${npc}'s head.\n            *goto good_end\n        *else\n            You run for ${npc}, trying to catch the flaming sword that is swung at you at the hilt, but the force behind the swing is too much for you to stop and the sword slips through your hands, cutting through your torso as a heated metal wire through a block of Styrofoam.\n            *goto bad_end\n\n*label good_end\n*set stories_completed +1\n*set dandd true\n*set mind %+10\n*if (temprelationship)\n    *set mc_in_relationship true\n    *if npc = \"Lorenzo\"\n        *set npc_name \"Lorenzo\"\n    *if npc = \"Gianna\"\n        *set npc_name \"Gianna\"\nThen the world turns white, like a blank page, and you find yourself standing in the bookshop, holding a piece of paper that looks like it was torn out of a book. It has a picture of the top hat on it.\n*goto_scene bookshop_scenes\n\n*label bad_end\nThen the world turns white, like a blank page, and you find yourself lying on the bookshop floor in the real world, still in shock, but alive and in one piece.\n*goto_scene bookshop_scene_fail", "choicescript_description": "Travel through different books in a quest to find your uncle! You will travel through a number of stories, seek to understand why they are falling apart, and trying to solve the mystery of your uncle's bookshop.\n\n[i]Lost in the Pages[/i] is a 125,000 word interactive novel by a collection of authors, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\nThere are over a half a dozen stories to choose from, from fantasy and science fiction, to horror or mystery. Can you rescue your uncle and restore order to the stories, or will you be consumed by the menace hanging over him?\n\n• Play as male, female, or non-binary, with any orientation.[n/]\n• Travel the seas as a mermaid, ride a dragon, explore futuristic worlds or become a detective. The choice is yours![n/]\n• Stick to tropes, or break them![n/]\n• Save not one world, but many!\n", "choicescript_stats": "\nName: $!{name}\nDream Job: $!{dream_job}\n*line_break\n*stat_chart\n\topposed_pair genre_savvy\n\t\tGenre Savvy\n\t\tTrope Breaker\n\n\n*stat_chart\n\tpercent mind $!{mind_name}\n\tpercent body $!{body_name}\n\tpercent soul $!{soul_name}\n\tpercent health $!{health_name}\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n\n  Unlock the rest of the game.\n\n  *purchase adfree $4.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.\n\n", "death": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nYou have died.\n\n*goto_scene ending", "felicity_tale": "*temp music \"\"\n*temp stumpreveal 0\n*temp fakebaby 0\n*temp companionbond 70\n*temp queenbond 50\n*temp kingbond 50\n*temp stumpbond 50\n*temp ladybond 50\n\n*set mind_name \"Quick Thinking\"\n*set soul_name \"People Skills\"\n*set body_name \"Fitness\"\n\n*page_break Act One\nYou find yourself bushwalking on a bluff overlooking the Australian Gold Coast. The beach looks glorious and you wish the book had let you have a swim before putting you straight into hiking gear. At least the smell of all the gum trees is nice, and the woman beside you looks like fun. She’s sweating furiously, grinning, and covered in dirt. Your mind instantly supplies you with her name: Blanche.\n\nSo far this book is a little on the hippy side, but it’s not unpleasant.\n*if (stories_completed > 1)\n\tIt could be a great place for Uncle Irwin to hide out safely until you find him.\n\nOminous clouds are piling up, however, and you set a faster pace to try and outrun the coming storm. You almost trip over a wombat burrow.\n\nThe burrow is wide enough to fit a grown man, at least at the entrance. \n\nBlanche's face brightens suddenly. \"I told you it'd be useful!\" \n\nShe dumps her pack on the ground and unzips it, pulling out a selfie stick and brandishing it triumphantly. \"We can try and get a photo of the wombat with this—lowering my phone into the hole.\" she taps on her screen, turning the flash on. \"What do you reckon?\"\n*choice\n\t#\"Um. . . I'm not sure that's safe.\"\n\t\t*set mind %+10\n\t\t\"Who wants to be safe?\" she says, and gets down on her stomach in order to reach as far as possible into the burrow with her phone.\n\t\t*goto reckon\n\t#\"You're crazy… and I like it!\"\n\t\t*set soul %+10\n\t\t*set companionbond %+10\n\t\tShe squeezes your arm in thanks and gets down on her stomach in order to reach as far as possible into the burrow with her phone.\n\t\t*goto reckon\n\t#\"Do you really want to risk damaging your phone for a smudged pic of a wombat's butt?\"\n\t\t*set mind %+10\n\t\t\"At least a wombat's butt is better looking than your face,\" she shoots back cheerfully, and gets down on her stomach in order to reach as far as possible into the burrow with her phone.\n\n*label reckon\n\"Uh oh,\" she says.\n\n\"What?\"\n\nShe pulls the selfie stick all the way out and swears. \"The clamp broke! My phone's fallen off.\"\n\nWhat do you say?\n*choice\n\t#\"Don't worry, I'll go get it.\"\n\t\t*set soul %+10\n\t\t*set companionbond %+10\n\t\t*goto x_prisoner\n\t#\"I'll put mine on \"Torch\" so I can take a look for you.\"\n\t\t*set body %+10\n\t\t*goto x_prisoner\n\t#Pull a face to make her laugh.\n\t\t*set soul %+10\n\t\tShe rolls her eyes and smiles.\n\t\t\n\t\t*goto x_rescuer\n\n*label x_prisoner\n\n\"Oh, thank you!\" she says, looking mournfully at the broken clamp. \"What a piece of junk.\"\n\nYou turn on your phone's torch and shine it into the hole. The light is bright enough that you can make out a second branch beyond the first intersection. So much for actually seeing a wombat—which is probably for the best, since you're invading its home now. \n\nBlanche's phone looks all right. It's just lying on the rounded dirt of the floor, with a broken piece of plastic next to it that must have come from the selfie stick. \n\n\"I can see it,\" you say. \"Just give me a second.\"\n\nIt's an awkward squeeze, but you climb into the burrow, keeping your head low so you don't bash it on the roof. You stretch out your fingers and just touch the phone's plastic case. You sigh loudly, but it's really not that much farther. So you wriggle onwards, ignoring the complaints of your tired legs. Your hand closes around Blanche's phone at last, and you put both phones in your jeans pocket so you can crawl backwards up the slope.\n\nThen the world falls apart around you. The dry dirt crumbles under your hands, and you yelp and grab for something—anything—to hold on to, but there's nothing solid any more. In seconds you tumble out of the burrow. Coughing and blinking dust and grit from your eyes, you sit up, finding yourself on a grassy hillside overlooking a small town. You're scraped and bruised but otherwise unharmed. \n\nThe town looks odd—for one thing, you didn't see any towns that size on your hike—but you ignore it to yell back up the scarred hillside.\n\n\"Blanche! Can you hear me? I fell out the other side!\"\n\nShe doesn't respond. What do you do?\n*choice\n\t#Climb back through—quickly.\n\t\t*set body %+10\n\t\tYou bite your lip, hating the idea of going back into the narrow darkness. The burrow is a maze—all the more so since you've now shattered it. \n\t\t\n\t\tToo bad. It has to be done. You check the phones are secure in your pocket and get down on hands and knees to climb back through the ruined burrow. Once you're inside it's easy enough to tell which is the right direction, since it's no longer a narrow rounded tunnel but a distinctly human-sized passageway, with a few side tunnels here and there that you glance into just in case there really is a wombat around. You test each hand- and foot-hold before letting them take your weight. \n\t\t\n\t\tSoon you can see a glimpse of gray sky ahead, and you know your ordeal is nearly over. Then the light is blocked out, and your stomach sinks as you realize Blanche is coming after you.\n\t\t\n\t\t\"Stop!\" you yell. \"No! I'm right here!\"\n\t\t\n\t\tBut it's no use. You scramble faster, hoping to get to solid ground before the burrow collapses in some new and even more annoying fashion. Blanche curses as the ground slithers away under her hands and she tumbles right at you, grabbing wildly at the walls. You both fly out onto the grass.\n\t\t*label hello\n\t\t\n\t\tWhat do you say to her?\n\t\t*choice\n\t\t\t#\"Are you all right?\"\n\t\t\t\t*set mind %+10\n\t\t\t\t*set companionbond %+10\n\t\t\t\t*goto churt\n\t\t\t#Something to make her laugh.\n\t\t\t\t\"Oh, very heroic!\"\n\t\t\t\t*set soul %+10\n\t\t\t\t*goto churt\n\t\t\t#\"Thanks for coming after me.\"\n\t\t\t\t*set companionbond %+10\n\t\t\t\t*goto churt\n\t\t\t\n\t#Look around, and try to get your bearings.\n\t\t*set mind %+10\n\t\t*goto trees\n\t#Try yelling again—into the burrow this time.\n\t\t*set companionbond %+10\n\t\tThis time you hear a faint response.\n\n\t\t\"Stay there!\" you yell. \"I'm coming right back!\"\n\n\t\tYou bite your lip, hating the idea of going back into the narrow darkness. The burrow is a maze—all the more so since you've now shattered it.  \n*label trees\n\nYou were among trees when you fell, and now you're so turned around that the entire hillside is bare. You realize how strange that is, and take a proper look at your surroundings for the first time.\n\nThere are no trees. At all. And there's an enormous stone castle in the coastal town below you—surrounded by a series of stone walls with what looks suspiciously like mud-brick houses gathered inside. Google never mentioned there was a full-sized replica of a medieval town not far from the beach.\n\nAs you stare at it, you notice that the majority of the people walking around are wearing trousers—yet you can't see anyone in jeans. There don't seem to be any Caucasians, but they don't look like Australian Aboriginals either. It's unclear whether they're meant to be in medieval costume or not. There aren't any power lines, so the medieval look can't be coincidence. Perhaps it's some kind of cult.\n\nOr your pleasant Australian tale has turned into something quite different.\n\nAs you're looking, you hear a sharp cry and Blanche tumbles out of the burrow beside you.\n\n*goto hello\n\n*label churt\nShe doesn't reply. Her eyes widen as she takes in your surroundings.\n\nThe sun is setting, and you wonder if you've been unconscious—it was barely lunchtime when you fell.\n\n\"What is this place?\" she says.\n*choice\n\t#\"You're hurt—let me take a look.\"\n\t\t*set mind %+10\n\t\tHer wrist is swollen and hurts when you move it. It's sprained but otherwise fine. Getting your first aid kit out of your backpack, you wrap her wrist in an elastic bandage and advise her not to use it. Since she probably can't climb back through the tunnel, the pair of you will have to find your way around the hill to get your bearings.\n\t\t*goto hill\n\t#\"Let's explore.\"\n\t\t*set body %+10\n\t\t*label hill\n\t\tWith every step, you notice more that doesn't add up. The sun is definitely setting, the grass is a weird species with a purplish hue, and the coastline is far too rounded—as if you're on an island.\n\t\t*goto narnia\n\t#\"I have no idea. What time is it?\"\n\t\t*set mind %+10\n\t\tShe glances at her watch. \"One o'clock. Lunch time. Why is the sun setting?\"\n*label narnia\n\n\"Something's seriously messed up since we fell into that wombat hole,\" you say. \"It's like we stepped into Narnia or something.\"\n\nBlanche looks at you like you’re crazy, but of course she doesn’t know she’s in a fictional world where anything could happen.\n\nYou're so focused on the enormous castle dominating the town below that your attackers take you completely by surprise. Out of the corner of your eye, you s
