ou walk back to the parlor.\n\n*goto talk_to_guests2\n*label vivian_room\nYou take Vivian to the lounge, closing the door behind you to make it harder for the others to interrupt or eavesdrop. She giggles conspiratorially.\n\n\"So. We shall have to be quick, if we're to get you back to your investigation before we raise too much scandal. But don't worry, darling,\" she says, tossing her hair. \"I have no objections to forgoing a courtship. And I'm a woman of the world - \n*if he=\"he\"\n   I've had my share of liasons with handsome men... though never a detective.\" \n*if he=\"she\"\n   I've seen my share of French postcards... this wouldn't even be my first Sapphic dalliance.\" \n*if he=\"they\"\n   my lovers don't need to fit into boxes to fit in my bed. Or in this case, on that sofa over there.\" \nShe crosses to the nearest of the leather-clad couches and seats herself, patting the cushion beside her. \"Join me.\"\n\nYou respond...\n*choice\n   #\"I'm only here to ask about the murder.\"\n      \"That again,\" Vivian says, pouting. \"I didn't kill Reggie - I don't have the proper wardrobe to be a murderess. I haven't a clue who did. If that's all you wanted to chat about, I think I shall go.\"\n\n      She flounces past you back to the parlor in a cloud of perfume, her eyebrows furrowed in studied annoyance. You go back as well, not having much other choice.\n\n      *goto talk_to_guests2\n   #\"Are you seriously thinking about that NOW?\"\n      \"Maybe I am,\" Vivian answers, smiling at you. \"Maybe I'm trying to distract you from my true motives. Maybe I'm hiding the real, deep pain I feel for the loss of poor Reggie... or I'm lonely... or bored. Aren't you the detective?\"\n      *goto vivian_choice\n   *selectable_if (looking_for_love) #By sitting close to her on the couch.\n      *set looking_for_love false\n      *set npc_name \"Vivian\"\n      *goto vivian_lounge\n*label vivian_choice\n*fake_choice\n   #\"I think there are things you do care about.\"\n      \"There has to be more to life than parties,\" you say gently. \"What about your husband?\"\n\n      \"I enjoyed him tremendously,\" Vivian says, with a smile that could break glass. \"And Reggie - I didn't dislike him. He was entertaining. But really, why spend time missing anyone? It won't bring them back. Life is too short to dwell on sadness. And if you don't agree, I'd rather not spend my time convincing you.\"\n   #\"I wish you'd stop playing games with me.\"\n      \"Oh, ${honorific},\" Vivian sighs, \"if you don't understand games, you have no hope of understanding society. Reggie was the most childishly devoted to them of any of us. Try to remember that when figuring out who killed him, yes?\" \n   #\"There's something very wrong with you.\"\n      \"It's like you don't care that he's dead,\" you say. \"You've been happy to flirt with me, \n      *if (manor_gossip)\n         and gossip, \n      and joke around. What you haven't done is explain why this doesn't bother you.\" You try to figure out how to phrase your next sentence in the terminology of the era. \"It makes me wonder whether there's something missing in your soul.\"\n\n      Vivian holds your gaze, her smile alluring but her eyes mocking. \"Ah, but what I lack in charity I make up in other virtues. It's a pity you aren't the type to appreciate them.\"\n\nShe stands, smoothing down her skirts, and flounces past you in a clatter of beads. Since she has decided this conversation is over, there is little else you can do but follow her back to the parlor.\n\n*goto talk_to_guests2\n*label vivian_lounge\nVivian sits smiling beside you, her leg pressed against yours, waiting for you to speak.\n\nYou say,\n*choice\n   #\"I like you, Vivian. But let's talk.\"\n      \"Do we have to?\" she sighs. \"Don't you understand that we don't have long together?\"\n\n      \"Oh? What do you mean?\" you ask.\n\n      \"We're all playing roles, Inspector,\" she says with a cynical smile. \"Yours here won't last long... don't you sense that? You're here to fulfill your part, and then you'll be gone. None of us are real to each other - we exist to play out certain stories, that's all. All we can hope to do is grasp a little pleasure in the spaces between endings.\"\n      *goto in_that_case\n   #\"Maybe I have time for a kiss.\"\n      \"Ah, you do have more important things to do here, don't you?\" she sighs. But, obligingly, she slides an arm around your neck and pulls you in. Her lips are soft and full, her hair brushes your neck enchantingly. She smells like passionflower and opium and Egyptian amber, not all of which you could've sworn you knew the scent of before being in this setting.\n\n      Vivian looks deep into your eyes as she pulls away from the kiss, and you notice something about hers: they are several colors. Violet, grey-blue, lively green, sapphire. It's hypnotic and also a little disconcerting, which is probably why you didn't focus on that aspect of them before. Her eyes are pretty, they complement her pale skin and red hair, but they are no determinate shade. You suppose the original text must not have specified.\n\n      \"Until later, then,\" you say to her. You smile at her, hoping it covers any surprise over this latest mystery she's given you to think about. She takes your hand prettily, as if escorting you to a dance, and walks with you as far as the door before dropping it.\n\n      You both try to act casual as you walk back in. It seems like the wrong time for public displays of affection.\n      \n      *goto talk_to_guests2\n   #\"You're beautiful, Vivian. I want you.\"\n      You capture her mouth with yours. Her fingers tangle in your hair, trail down your back, artfully encompassing her desire. Everything is perfect, and then...\n\n      You're fading to black with every motion. You're struggling to move through sand, you're not in control of yourself. This grasp for her body will be your last, you fight even for that. You keep doing what you would do, ever slowing, the moment being pressed and taken until it is nothing but a cut in time. A page turning.\n\n      Damn this story.\n\n      You fade back up in Vivian's arms, her half-dressed and smiling down at you. \"Do you see, darling, why I grow so bored of these parties and their rules? Lovers are not the roles we were assigned, you see, but we may take what we can seize. Thank you for the fun we had regardless.\" She leans down and kisses you chastely on the forehead, then stands and adjusts her clothes to cover herself before heading back to the parlor.\n\n      You check your own clothes and follow her, feeling that you have learned something about this setting - however unbearable.\n\n      *goto talk_to_guests2\n*label in_that_case\n\nYour automatic reply is...\n*fake_choice\n   #\"Vivian... how do you know that?\"\n      \"If you're cynical, you start seeing through things,\" she replies. \"There were other insights... talks with my husband's friend Irwin helped. He was a clever man, though he hasn't been around in awhile. That was a different chapter in my life.\"\n\n      Vivian gives you a curious look. \"But why do you ask? Why shouldn't I recognize the same things that you do? I might not be a detective, but that doesn't make me less perceptive.\" Or less of a person, because she's not real? There are layers to this conversation.\n\n      For now, you have a murder to solve; you can shelve the existential questions. \"Lady Vivian, you are a very interesting woman,\" you say, and leave it at that.\n\n      You take her hand and walk with her as far as the lounge door before dropping it. Her hand is warm and feels real. You share one last intimate smile, then rejoin the other guests in the parlor.\n\n      *goto talk_to_guests2\n   #\"We don't have to end when this story does.\"\n      \"We could see each other after the case ends,\" you suggest. Knowing even more about her condition than she's guessed, your mind runs wild. Why couldn't you stop back to this book again? Or take her sightseeing in other stories? Would that even work?\n\n      \"You want to sweep me up for a romance?\" she asks, giggling. \"Well... that could be novel. I haven't been a love interest before.\"\n\n      \"Let's solve this murder first,\" you say, \"and we'll see what we can do about a holiday.\" You kiss her lightly, and her smile is brilliant as you walk back towards the parlor. She drops your hand before you reach the other guests - even she has some sense of discretion, it seems - but doesn't lose the spring from her step.\n\n      *goto talk_to_guests2\n   #\"In that case, let's create our own climax.\"\n      \"We could try,\" she agrees, smiling mischievously, and folds you in her arms. You kiss deeply as you reach to undress each other.\n\n      Then, time has passed. You feel satisfied, and somehow... langorous? But what exactly happened?\n\n      The realization sinks in that you've experienced your first fade-to-black moment. Damn the format of this story.\n\n      \"I warned you about the way this works,\" Vivian sighs. \"These moments never last long enough.\" She fixes her clothes, and extends a hand to help you up. \"'Til next time, darling. We could always hope for an ending together someday, eh?\"\n\n      You check your own appearance and follow her. However much you might want to stay here with her, the book has spoken; now is the time for solving a murder.\n\n      *goto talk_to_guests2\n*label cecil_room\nYou walk with Cecil to the lounge and close the door behind you. While there's still an exit via the French doors to the garden, this will make it harder for others to eavesdrop or interrupt you. Cecil looks flustered by this, but waits for you to speak.\n\nYou say to him,\n*choice\n   #\"I need to talk to you about this murder.\"\n      \"What more can I tell you?\" Cecil cries, wringing his hands. \"I know no one here, except a few by reputation! I was pleased to be invited here, but by God, I should have known that only ill luck was ever meant for me!\"\n\n      He winces, reaching into his pocket to clutch his handkerchief in his fist. \"Forgive me, ${honorific}. I did not mean to swear and carry on. If you will excuse me.\" He hurries out past you, leaving the door open behind him.\n\n      There seems to be no way to continue the conversation, so you follow him back to the parlor. \n      *goto talk_to_guests2\n   #\"I'd like to ask you about yourself.\"\n      *goto cecil_personal\n   *selectable_if (looking_for_love) #\"I think you're very attractive, Cecil.\"\n      *set looking_for_love false\n      *set npc_name \"Cecil\"\n      *goto cecil_is_hot\n*label cecil_personal\n\"I suppose you can,\" he says uncertainly. \"What is it you'd like to know?\"\n\n\"Honestly, Cecil,\" you observe, \"you seem like you're more clever than you're letting on. Wearing pretty clothes and flirting isn't the whole story, is it? What's your real ambition in life?\"\n\n\"I have nothing so grand as a plan,\" Cecil says, half-smiling. \"Just this: a poet needs an audience, ${honorific}. He needs patrons, people of sophistication and influence... having money is no small thing, either. If pretty clothes achieve some recognition from the titled, a peacock I'll be.\" He sweeps a grand bow, hat in hand so its gaudy feathers brush across the carpet.\n\nWith a wink, he adds, \"And if my fine feathers attract a mate here and there? Well, that's no sacrifice. I do require something to write about.\" He gestures back towards the parlor. \"Shall we go, though? If we remain much longer, the others may think you a victim of my charm. I wouldn't wish to cause scandal.\"\n\nHowever unlikely the idea of you whispering sweet nothings to Cecil, you head back to the parlor. You think you've gotten a better understanding of him anyway, so you might as well end the conversation.\n\n*goto talk_to_guests2\n*label cecil_is_hot\n\"I...\" he blushes deeply. \"It's always flattering to receive a compliment, my dear Inspector. If it's not too forward, might I inquire how you intended it? Is it merely a pleasantry upon my choice of jacket, or...?\"\n*choice\n   #\"I was talking about you, but it IS a nice jacket.\"\n      He beams happily. \"Thank you! My secret is to attend to my own tailoring. My mother taught me to sew, and since I started working with the theater I've picked up some tricks from the costumers.\" He brushes affectionately at the velvet on his sleeve.\n\n      He catches himself then, and says, \"But perhaps this isn't the time to be discussing fashion. You do have a job to do.\"\n\n      \"You have a point,\" you agree. \"But we could talk more later? About... all kinds of subjects.\"\n\n      \"I look forward to that conversation,\" Cecil says, and catches your hand to lightly press a kiss on the back of it. Hm, so he didn't miss the blatant flirting; you were worried about him for a minute.\n\n      You walk with Cecil back to the parlor with the other guests. You're tempted to reach for his hand, but decide that a murder scene is not the place for public displays of affection.\n\n      *goto talk_to_guests2\n   *if he=\"he\"\n      #\"Is it a problem if a man compliments more than your clothes?\"\n         \"No!\" Cecil protests automatically, then blushes harder. \"Er, that is to say... I haven't met many gentleman as bold, but I admire the European fashion of... of confidence, which isn't to say that you aren't attractive otherwise -\"\n\n         You rescue him from his stammering by kissing him firmly. \n         *goto cecil_kissed\n   *if he=\"she\"\n      #\"What's wrong, Cecil? Do you not like it when women flirt back?\"\n         \"No!\" Cecil protests automatically, then blushes harder. \"Er, that is to say... you're more forward than I'm used to, which doesn't mean that I don't... don't prefer it. Seeing as how you are extremely attractive -\"\n\n         You rescue him from his stammering by kissing him firmly. \n         *goto cecil_kissed\n   *if he=\"they\"\n      #\"Is it a problem to get a compliment that isn't from a woman?\"\n         \"No!\" Cecil protests automatically, then blushes harder. \"Er, that is to say... not if the compliment is from someone, um, attractive, which you very much are... not that I've had much experience with, er, not women -\"\n\n         You rescue him from his stammering by kissing him firmly. \n         *goto cecil_kissed\n   #\"I think you'd look better without the jacket. Or anything else.\"\n      You grab Cecil by his velvet lapels and pull him close. He looks into your eyes, his own wide and dreamy. You slowly unbutton the jacket and slide it off of his shoulders, tossing it on the nearest sofa. Only then do you kiss him, one hand on his chest while the other touches his face. He sighs and melts against you.\n\n      Your lips part much later, both of you breathing heavier. \"Well,\" Cecil observes, \"if this is what happens when I take off my jacket, I don't dare speculate what would happen if I removed my vest.\"\n\n      \"I do have a murder to solve,\" you admit. \"Should we try that experiment later?\"\n\n      \"It's a date, my dear.\" Cecil leans in to give you a last kiss goodbye, which somehow turns into another makeout session on top of his coat.\n\n      As soon as you've torn yourselves away from each other and readjusted the necessary hair and clothing, you walk together back to the parlor. Though you keep space between you, you feel like the magnetism between you and Cecil is visible.\n\n      *goto talk_to_guests2\n*label cecil_kissed\n\"Cecil, you're adorable,\" you inform him. \"I have a murder to solve, or I'd kiss you for longer.\"\n\nCecil beams happily. \"Well! Better hurry and solve it.\" He leans in for a last kiss, then takes your hand to walk you back to the parlor. You move away from each other when you get to the door of the lounge, feeling there's something inappropriate about turning a murder scene into a romantic occasion. You notice he keeps stealing looks at you, though, and his goofy smile remains.\n\n*goto talk_to_guests2\n*label talk_to_colonel\n*set last_interviewed \"Colonel\"\n*if (colonel_interviewed)\n   The Colonel gives you a curt nod as you walk up, but secretly seems pleased that you are once again seeking his expertise.\n   *goto ask_amberley\n*if not (colonel_interviewed)\n   *set colonel_interviewed true\n   Before you can ask the large man anything, he bursts out talking. \"Finally, will you take my statement so I may be out of here? It's simply ridiculous that someone like me could have anything to do with this dreadful business!\"\n   \n   \"Someone like you?\" you prompt.\n   \n   \"I am Colonel Amberley!\" he sputters. \"My distinguished military career is known to all! My life revolves around discipline, ${honorific}, honor and discipline!\" You look down at his clenched fists, the fingers the size of sausages, then at his burly arms; as well as the other habits he's maintained, the Colonel has kept up his exercise regime. While he clearly likes his food, his heavy frame is a powerful one.\n\n   \"I am also quite well-known, Colonel,\" you soothe him. \"I am, in fact, Inspector $!{name} from The City.\" He perks up considerably at this.\n*label ask_amberley\n\nYou ask the Colonel...\n*goto amberley_questions\n*label ask_amberley2\n\nNext, you ask the Colonel...\n*label amberley_questions\n*choice\n   *disable_reuse #About his location since he arrived at the manor.\n      \"Er, I...\" The Colonel fidgets, as if about to admit to something terribly shameful. \"I was late, you see. I only arrived at eleven fifteen, just before Lady Vivian - I was practically the last here.\"\n\n      \"You were fifteen minutes late?\" you ask.\n\n      \"No, half an hour. My invitation asked me to come at ten forty-five, because Sir Reginald had something to discuss with me. But my damn - pardon my language - my blasted carriage axle broke, so by the time I obtained a hire-cab I was cursed late.\" He grimaces, shaking a fist. \"If only I'd been on time, we could have had it out before some fiend murdered him!\"\n      \n      \"And since you got to the manor?\" you ask. \"Where have you been?\"\n\n      \"Miss Lily, the maid, showed me through to the parlor. She gave me a fine cup of tea, made apologies on behalf of her absent Master - one of her usual duties, unfortunately, the man has no sense of time. Though I suppose his reason for being late to tea this time was unavoidable.\"\n\n      He paused, thinking. \"Let's see, I stayed in here until some twenty minutes ago, which would have been about noon. That was when I suggested we adjourn to the garden, as it provided an alternative to a smoke-filled lounge for the young lady, while providing Lady Vivian a means to indulge her vice more sociably.\" He shook his head sadly. \"Little did I know that something far worse than any fog of tobacco awaited the maiden's delicate senses.\"\n      *set invitation_knowledge +1\n      *goto ask_amberley2\n   *disable_reuse #What he knows about the other people at the manor.\n      \"The lady in the peach silk is Lady Vivian, who enlivens many a gathering around this humble village,\" the Colonel waxes lyrically. \"Too clever by half and possessed of a wicked tongue, but you can't say she isn't charming. The other lady is Miss Elizabeth, whom I have only just met; she came from out of town to pay respects to her godfather, but hadn't the chance. The maid, Lily, is a dear girl, hard-working and modest. I can't say I know the young man very well; his name is Cedric or Christopher or some such. And then there is Wexley... the dearest friend Sir Reginald had, and a blacker devil you'll never meet.\"\n      *set devil_wexley true\n      *goto ask_amberley2\n   *disable_reuse #Who here is strong enough to lift the rock in the garden.\n      \"Colonel Amberley, you're a strong man,\" you observe. His already sizeable chest swells with pride. \"Besides you, who here might be able to lift that giant stone that caved in Sir Reginald's head?\"\n\n      Your flattery serves the intended purpose, and as well as not contradicting your assumption that he could, he starts assessing the physiques of the other suspects. \"Hmm. While the ladies seem quite fit, none has the upper body strength to lift anything so massive. Especially not high enough to hit a man on the head.\" He points to the younger man who's dressed like a dandy. \"I doubt young what's-his-name has the build for it either. No, I think only myself or that devil Wexley could manage it, unless some sort of trick were used. Pulleys, or some such.\" You nod wisely, but have trouble picturing Sir Reginald standing still under a dangling rock on a rope.\n      *set devil_wexley true\n      *goto ask_amberley2\n   *if ((devil_wexley) and (wexley_interviewed))\n      *disable_reuse #Why he calls Wexley a devil.\n         *goto the_devil_is_he\n   *if ((devil_wexley) and not (wexley_interviewed))\n      *disable_reuse #Why he called Wexley (the man with the scarred jaw and the large knife) a devil.\n        *goto the_devil_is_he\n   *if (manor_gossip)\n      *disable_reuse #What he has to say about Lady Vivian's allegation that he hated Sir Reginald.\n         \"Of course, I couldn't stand the man!\" Colonel Amberley agrees stridently. \"He was a scoundrel, a scofflaw, a cad with women!\"\n\n         \"So, you hated him,\" you say encouragingly. \"Did he deserve to die for all of his wrongdoing?\"\n\n         \"Undoubtedly!\" the Colonel exclaims, then catches himself. \"Not that murder is acceptable, of course. The rule of law is what elevates us as a species - only God and the gallows may decide when to end a man. But he was a dreadful fellow. When he invited me here, it was to spite me, to weaken my resolve as a man of principle - I came to show him I would not be swayed, that I would gladly challenge him on his own ground.\" He looks almost wistful. \"We shall never argue again... but the young women that cross his path are that much safer from his lechery.\"\n         *set cad_with_women true\n         *goto ask_amberley2\n   #Nothing else, you're done asking him questions.\n      *goto talk_to_guests2\n*label the_devil_is_he\nThe Colonel looks as if he'd be ready to spit, if it weren't so uncouth. \"He's the worst sort. He enlisted in the military for some time, but he thinks nothing of the tradition and moral fortitude of the corps. He saw it merely as some sort of trial run at killing, a way to learn his trade before selling murder to the highest bidder. He is a black-hearted man, which is why it surprises me not in the least that he and Sir Reginald were friends of a sort. But what does friendship mean, to a fellow such as that? He'd just as soon stab a man over a game of cards.\"\n*goto ask_amberley2\n*label talk_to_elizabeth\n*set last_interviewed \"Elizabeth\"\n*if (elizabeth_interviewed)\n   Elizabeth gives you a polite nod as you head back over to talk to her, resigned to doing her duty.\n   *goto ask_elizabeth\n*if not (elizabeth_interviewed)\n   *set elizabeth_interviewed true\n   You head over to talk to the young lady who sits on an ivory settee with her knees primly crossed. She wears a well-tailored suit of dove grey wool with an ivory blouse, both modest and flattering, and her brown hair is swept into a tidy bun.\n\n   \"Hello, Miss,\" you greet her. \"I'm Inspector $!{name}, and I'm here to solve this murder. Who are you?\"\n   \n   \"I'm Elizabeth, Sir Reginald's goddaughter,\" she answers. \"This whole thing is simply awful. I've only just arrived in town, and then this horror took place before I could even speak with him. Please, if I can do anything to help, let me know.\" Your eyes travel from her face, a calm porcelain mask, to her tightly laced fingertips. It's hard to tell whether she has something to hide, or is in shock.\n*label ask_elizabeth\n\nYou ask Elizabeth...\n*goto elizabeth_questions\n*label ask_elizabeth2\n\nNext, you ask Elizabeth...\n*label elizabeth_questions\n*choice\n   *disable_reuse #About her location since she arrived at the manor.\n      \"I arrived a bit late,\" she recites, as if giving a lesson at school. \"My train was delayed, so although my invitation was for eleven, I only arrived at the manor around eleven ten. I've been in the parlor since then.\"\n      *set invitation_knowledge +1\n      *goto ask_elizabeth2\n   *disable_reuse #What she knows about the other people at the manor.\n      \"Nothing, I'm afraid,\" she sighs. \"I've never met anyone here. Frankly, I'd rather not get to know them. I just want to go home.\"\n      *goto ask_elizabeth2\n   *disable_reuse #Why she traveled here to visit her godfather.\n      \"Oh, I only came because it's end of term. Since he's paying for my university, I promised to come visit him then. I haven't been to this village before.\"\n\n      \"Have you not spent much time with your godfather?\" you ask.\n\n      Her face twists almost imperceptibly before going back to her former calmness. \"No. I have not. The occasional tea at a cafe or theater outing, but I've seen him rarely. This is the first time he's invited me to a party.\" She doesn't seem inclined to elaborate on why she avoided her godfather, so you make a mental note of it and move on.\n      *set hates_godfather true\n      *goto ask_elizabeth2\n   *if ((mistress_knowledge) and (hates_godfather))\n      *disable_reuse #Whether her godfather ever attempted to make her his mistress.\n         She gasps, going paler than before, and her white-gloved hands fly to her cheeks. \"No! I - of course I'd never agree to that!\"\n\n         \"Miss Elizabeth,\" you say gently, \"it's not a question of whether you'd agree, but whether he asked. You said yourself that you'd only met with him in public places, and rarely. Did he make you uncomfortable?\"\n\n         She breathes deeply, visibly calming herself. \"Inspector... you are quite discerning. He made me uncomfortable me in my skin, it's true. But not as you imagine.\"\n\n         \"Sir Reginald did business with my father. Yes, he likes a pretty young lady to his tea, and yes, it makes me wretched that I'm beholden to come when he calls. But he dares not do more than summon me once every year or two, and look at me fully clothed, and compliment my growth as a woman with a lecherous wink. He is a slimy, despicable man, Inspector, but he dares not lay a hand on me!\" You do not point out that in her passionate speech, she has briefly confused her tenses; while he may be dead, the specter of her godfather is still present to her.\n\n         She continues quietly, \"I know of his more perverse nature, as people do talk, masking lurid speculation as warning. But he saves those urges for the beautiful women of the lower classes, those who have not my same protections. Should Sir Reginald have been foolish enough to try his lusts upon me, my father would see him punished... with far more tact and discretion than by a large rock falling on him in a garden.\"\n         *goto ask_elizabeth2\n   #Nothing else, you're done asking her questions.\n      *goto talk_to_guests2\n*label talk_to_cecil\n*set last_interviewed \"Cecil\"\n*if (cecil_interviewed)\n   Cecil looks thrilled as you head back his way, your attention apparently having flattered him into forgetting that he's a suspect in a murder investigation.\n   *goto ask_cecil\n*if not (cecil_interviewed)\n   *set cecil_interviewed true\n   \"Greetings,  \n   *if he=\"he\"\n      fine gentleman. \n   *if he=\"she\"\n      lovely lady. \n   *if he=\"they\"\n      dashing Inspector. \n   My name is Cecil Beauchamp, and I am charmed to make your acquaintance.\" He stands and gives a bow so deep that the sleeve of his green velvet coat brushes the carpet. \"I have read closely of your endeavors, ${honorific} $!{name}, and those of your patron Lord Irwin before you. Though of course, he was before my time.\"\n\n   You study his appearance: light brown curls carelessly tousled in a way that probably took him ages in front of a mirror, his shirt and vest in complementing shades of cream and brown, his slender waist corseted, tall boots worn over tight trousers. A matching green velvet hat bedecked with feathers sits on the table nearby. He is the picture of a dandy, almost ridiculously decorative.\n\n   \"Nice to meet you,\" you reply. \"I have a few questions about the murder, if you don't mind?\"\n*label ask_cecil\n\nYou ask Cecil...\n*goto cecil_questions\n*label ask_cecil2\n\nNext, you ask Cecil...\n*label cecil_questions\n*choice\n   *disable_reuse #About his location since he arrived at the manor.\n      *set cecil_questions_asked +1\n      \"I was shown to the parlor when I first arrived, at eleven o' five of the clock,\" he says. He hesitates and glances towards the man with the scarred jaw before continuing in a lower tone, \"However, I... thought to examine Sir Reginald's bookshelves, so as not to disturb Mr. Wexley, and adjourned to the lounge for ten or fifteen minutes. Once there were more guests, I rejoined the company and have been here since enjoying convivial conversation.\" You read between the lines and interpret that he's frightened of \n      *if (wexley_interviewed)\n         Wexley \n      *if not (wexley_interviewed)\n         the mercenary-looking character \n      (who in all fairness looks like he could snap him in half.)\n\n      \"It was such a lovely afternoon,\" Cecil says sorrowfully. \"The sparkling wit, the lovely and accomplished ladies, the fresh bakery cakes and ice cream with our tea. Everything like a dream. And then, we had to find him dead in the garden.\" He may not have known Sir Reginald well, but his mourning for a dream of ice cream seems profound.\n      *goto ask_cecil2\n   *disable_reuse #What he knows about the other people at the manor.\n      *set cecil_questions_asked +1\n      \"I have been graced with the opportunity to meet Lady Vivian and Miss Elizabeth,\" he says with a tone of reverence. \"Indeed, I was hoping to meet someone of Lady Vivian's caliber at this gathering - her attendance is much sought at high society parties. But Miss Elizabeth, a more reserved beauty, has her own charms. She is of the studious and intellectual variety. I do believe that both of them fancy me, and I am devastated as to which to pursue.\" He gives a dashing smile to each of the ladies seated in the room; \n      *if not (vivian_interviewed)\n         the older woman \n      *if vivian_interviewed\n         Lady Vivian \n      looks amused, and \n      *if not (elizabeth_interviewed)\n         the younger lady \n      *if elizabeth_interviewed\n         Elizabeth \n      pretends not to see him.\n\n      \"And the gentlemen?\" you ask.\n\n      He looks blank. \"Well, they're not very friendly, are they? I hardly think they're being flirtatious, ${honorific}.\" As apt as Cecil's assessment of his chances seem to be on this particular front, you try to steer him towards a more useful topic.\n\n      \"What about the maid?\" you ask. \"Have you spoken with her?\"\n\n      His eyes light up. \"Lily, you mean? Would you believe that she has a famous sister? Well, famous only in the right circles, of course, her star is still rising, but what an actress! Oh, the poems I could write in praise of her words like jewels, her hair like the most precious metal -\"\n\n      \"That's all I need, thank you,\" you say, before he can move on to the rest of his treasure chest of metaphors.\n      *set lily_sister true\n      *goto ask_cecil2\n   *disable_reuse #Whether he flirts with everyone he meets.\n      *set cecil_questions_asked +1\n      He gasps, more affronted by this accusation than he's been bothered by anything else so far, including the murder. \"Heavens forfend! I have a discerning eye, and focus my attention only on the worthiest subjects. Can I help that Sir Reginald had a similar taste for beauty, and summoned two such lovely ladies to the same occasion to torment my eye? And then you arrive, Inspector, with such an impressive reputation. Must I apologize for being distracted by such company?\"\n      \n      Is he as hopelessly romantic as he claims, you wonder, or an equal-opportunity flatterer? Is he looking for companionship, social status, lovers? More to the point, does it have anything to do with Sir Reginald's murder?\n      *goto ask_cecil2\n   *if (manor_gossip)\n      *disable_reuse #Why people might think he's a social climber.\n         *set cecil_questions_asked +1\n         *if he=\"he\"\n            \"Good Sir!\" \n         *if he=\"she\"\n            \"Noble Madam!\" \n         *if he=\"they\"\n            \"Good Inspector!\" \n         he says indignantly. \"While it is true my means are few, my intention is not to establish myself via others, like an ivy sinking its roots into stone. I wished only to learn from Sir Reginald, a scion of a noble house, how best to conduct myself in the circles I now find myself in.\"\n\n         He leans close and confides to you, \"I am recently arrived in society. You see, while I am not of the aristocracy, I am a poet of some note. The romantic and the intellectual are the upper class of the modern age, and it is as thus I establish myself. It is understandable that not everyone interprets my ambitions correctly.\"\n         *goto ask_cecil2\n   *if cecil_questions_asked=4\n      *disable_reuse #Whether he'd speak with you in private. You'd like him to open up more.\n         \"Cecil,\" you ask, \"could you come with me for a moment? I'd like to talk to you away from everyone else.\"\n\n         \"Oh, do you?\" Cecil says, looking pleased. \"If I can help you in your inquiries at all, $!{name}, of course I shall do my best.\" He blushes. \"Do forgive me... Inspector $!{name}, I meant to say.\"\n\n         \"Just come along,\" you suggest.\n\n         *goto cecil_room\n   #Nothing else, you're done asking him questions.\n      *goto talk_to_guests2\n*label talk_to_lily\n*set last_interviewed \"Lily\"\n*if (lily_interviewed)\n   You return to talk to Lily. She manages a weak smile, but still has trouble looking you in the eye.\n   *goto ask_lily\n*if not (lily_interviewed)\n   *set lily_interviewed true\n   You catch up to the maid, who is scrubbing dishes in the kitchen. She is a thin-faced, bony young woman with cornflower blue eyes and frizzy dishwater-blond hair, her posture hunched in on itself to take up less space in the world. Her plain blue dress is dusted with powdered sugar and flour, adding to her generally frazzled air. When she notices you, she ducks her head meekly, lowers her gaze, and goes back to her cleaning.\n   \n   \"Would you like some tea, ${honorific}?\" she asks. \"I served the ice cream already and thought it wrong to open the champagne, but there are cakes left.\"\n   \n   \"Not now,\" you say. \"I'm $!{name}... what's your name?\"\n   \n   She looks startled, and looks you in the eye for the first time. \"Oh! Lily, ${honorific}. Maid and head servant here these last three years. Have you need of anything, ${honorific}, you have but to ask me.\"\n*label ask_lily\n\nYou ask Lily...\n*goto lily_questions\n*label ask_lily2\n\nNext, you ask Lily...\n*label lily_questions\n*choice\n   *disable_reuse #About her location in the manor today, and Sir Reginald's.\n      \"I gave Sir Reginald breakfast in his study about ten o'clock, ${honorific},\" she says. \"He liked to sleep in of a weekend. He asked that I leave him to his writing, so I closed the doors and busied myself about the preparations for tea. I do not know when he may have gone from there to the garden, as I did not see him again - not alive.\"\n\n      \"Where were you throughout the morning?\" you ask.\n\n      \"Here and there, ${honorific},\" she replies. \"Accepting deliveries, cooking, serving, escorting people through, some light cleaning. I was always within earshot of the doorbell, so I would not miss anything having to do with the party.\"\n      *goto ask_lily2\n   *disable_reuse #What she knows about the guests at the manor.\n      \"It's not my place to speak of the guests,\" Lily says evasively. \"I only serve them tea.\"\n\n      \"Some of them have been coming here for years, haven't they?\" you ask.\n\n      \"Yes.\"\n\n      \"And you know nothing about them?\" you persist.\n\n      \"No. I apologize that I have nothing to tell you, ${honorific}.\" She glances up, and you catch a glimpse of steel in her eyes before she goes back to her deferential posture.\n      *goto ask_lily2\n   *disable_reuse #Whether she can confirm the times that everyone arrived at the manor.\n      \"Not on the grounds, ${honorific},\" she says, shaking her head. \"There's a lock for the gate, but it's open during the day. I know when everyone came to the door of the manor house itself, but who's to say someone didn't spend some time in the garden before ringing the bell?\"\n      \n      *if not (confirm_times)\n         An interesting point; you might want to check in with the policemen at the gate and see whether they know when the guests actually arrived.\n      *if (confirm_times)\n         You've already confirmed with the policemen at the gate that all of the guests arrived when they said they did, or it would be an intriguing theory.\n      *goto ask_lily2\n   *disable_reuse #About the deliveries made to the manor this morning.\n      \"Only two, ${honorific},\" she says. \"One of pastries, cakes and suchlike, around 10:30 - the woman who delivered them brought her basket into the kitchen, but was only there five or ten minutes. The other a block of ice, around 10:45 - the little lad who delivers it pulled his wagon around to the back door and I carried it to the kitchen from there.\"\n      *goto ask_lily2\n   *disable_reuse #About the other servants of the manor.\n      \"So, you called yourself the 'head servant',\" you repeat to Lily. She nods silently. \"What does that mean? Are there other people who work here?\"\n\n      \"I'm the only one what lives here,\" she explains. \"The others come and go on a schedule - a couple of other maids, a gardener and his lads, others for special occasions. The others were off grounds today and weren't due back til tomorrow. Sir likes his privacy when he's hosting.\" Lily winces. \"Liked, I mean.\"\n      *goto ask_lily2\n   *if (secretary)\n      *disable_reuse #If she knows whether Sir Reginald wrote the invitations for today himself.\n         \"No, ${honorific},\" she says, shaking her head. \"He hadn't the hand for fancy work, so he dictated such to me and I would write them. I made out the invitations for today as I had many other letters for him before.\"\n\n         \"So... you're good at reading and writing, then?\" you ask.\n\n         \"Yes, ${honorific},\" Lily says, with the ghost of a smile. \"I've been practicing more since I hired on here. I could always find some ink and a bit of paper, and Sir encouraged it. I was working on a bit of calligraphy...\" She shakes her head. \"I apologize, I didn't mean to go on. I hope I've answered your question.\"\n         *goto ask_lily2\n   *if (lily_sister)\n      *disable_reuse #Whether she's close to her sister.\n         \"I haven't seen her in a while, ${honorific},\" Lily says, and closes her mouth into a tight line.\n\n         It seems like a sore subject... maybe an important one. But you're not going to learn about it from her.\n         *goto ask_lily2\n   *if ((mistress_knowledge) or (cad_with_women))\n      *disable_reuse #Whether Sir Reginald was ever inappropriate with her.\n         She looks oddly at you. \"Me, ${honorific}? I'm not much to look at, and common besides. I'm nothing special, nothing that would make his Lordship want anything from me.\" An oddly worded answer, but it sounded sincere: her duties to her late master didn't extend past her stated housework.\n         *goto ask_lily2\n   #Nothing else, you're done asking her questions.\n      *goto talk_to_guests2\n*label police\n*set last_interviewed \"none\"\nYou ask the officers...\n*goto police_questions\n*label police2\nNext, you ask the officers...\n*label police_questions\n*choice\n   *disable_reuse #Whether they can confirm when each of the guests arrived on the manor grounds.\n      *set confirm_times true\n      \"Yes, Inspector,\" one of the officers tells you. \"We've spoken to each of the guests, and the time each said they arrived - and which the maid repeats - is within a minute or two of when the neighbors saw them pass through the gates.\"\n\n      The timeline is fairly straightforward, then. Each guest arrived when they said, went more or less straight from the gate to the front door of the manor, and was shown by the maid from there to the parlor.\n      *goto police2\n   *disable_reuse #Whether it's possible that someone was on the property who wasn't seen.\n      \"No, ${honorific}, I can't see how that could be,\" the shorter officer says, after some careful thought. \"Everyone who entered the property today is either still here or was seen to leave again. I took a thorough look around the house and grounds myself, and would swear that no one is hidden.\"\n\n      He continues, \"The two people delivering packages were here less than ten minutes each, closer to five... it seems impossible they would have time to kill a man, especially in so strenuous and strange a fashion. So you can focus your inquiries on the six inside, ${honorific}. We haven't been able to find a single one who combines a motive with the means to lift the rock and the opportunity to use it, but perhaps you'll have more luck.\"\n\n      You thank him for clarifying the details. So, the people gathered in the parlor really are the only ones who were on the property for any substantial length of time today.\n      *goto police2\n   *disable_reuse #What they can tell you about the deliveries to the manor.\n      \"Two, Inspector,\" one officer informs you, checking his notes. \"One from the cafe around ten-thirty - an old woman with a stooped back and her hair done up in rags, carrying a basket - then a grubby lad with an ice wagon around ten forty-five. Both went to the house with their deliveries, but didn't stay long.\"\n      *set disguise_knowledge true\n      *goto police2\n   #Nothing else, you're done asking them questions.\n      *goto talk_to_guests2\n*label search_places\n*if ((not (grounds_checked) and not (study_checked)) and (not (guest_checked) and not (quarters_checked)))\n   You take a quick look through the manor and see that some areas, like the guest bedrooms, are tidy but empty; there would be no use searching them for clues. \nOf the places that have seen some use, where would you like to search?\n*goto search_choices\n*label search_places2\nWhere else would you like to search?\n*label search_choices\n*set last_interviewed \"none\"\n*choice\n   *selectable_if (last_searched!=\"garden\") #The manor grounds (including the garden and body.)\n      The garden where Sir Reginald's body was found is tucked behind the manor house, not visible from the road. It makes sense that he wasn't discovered until the guests came to this specific area. You note that there are multiple french doors leading outside - it is possible to enter the garden directly from the kitchen, study, lounge, or parlor, as well as various hallways. This combination of access and privacy means that any number of people could have snuck out to the garden, as long as they were careful passing any windows.\n\n      It seems you won't have the benefit of forensics or an autopsy, so you'll have to do your best to observe the body and draw your own conclusions. Its most notable feature is the gigantic stone that has caved in the back of the skull. You take hold of it for yourself and give it an experimental heave; it barely budges. If someone picked this up alone, they must have been massively strong.\n\n      You look more closely at the stone. It doesn't take long to determine its origin: a nearby flower bed has a roughly circular depression where it used to rest, and is lined with smaller stones of the same kind. Blood has deeply stained the rock and the ground around Sir Reginald's head; there are no drag marks or stray blood trails surrounding the body. There are splashes and droplets of blood as far as the middle of his back, testifying to the force with which the stone came down. It was dropped from some height or smashed into him with strength. You look around - he's far from any roofs or trees, so it doesn't look like the stone fell from anywhere.\n\n      You can find no other marks on his body suggesting injury or illness. His hands are clenched, however, and when you turn his head, what remains of his lower face bears a grimace of agony. Looking closer, you notice food stuck in his bared teeth - bits of scrambled eggs and muffin crumbs. Gross, but it seems to confirm he was alive as of breakfast.\n      *set last_searched \"garden\"\n      *set grounds_checked true\n      *goto search_places2\n   *selectable_if (last_searched!=\"bedroom\") #Sir Reginald's private rooms (the bedroom and study.)\n      Sir Reginald's bedroom is accessible via the study, and is pristine; it doesn't look as if he entered it since his bed was made this morning. You decide it probably isn't relevant to the events of today.\n\n      The study is more promising. While it's been carefully cleaned and polished - every inch of wood is shining and smells like lemons - it looks like the place Sir Reginald spent most of his time. There's a comfy chair that was clearly a favorite, and a tea table for breakfasting (now empty.)\n\n      You turn your attention to the desk. You find a package of blotting paper with faint impressions of past messages, including the invitations for today's party. Interesting - the invitations are written in an elegant hand that matches some of his other correspondence, while notes to himself are in totally different handwriting.\n\n      You also find a leather-bound notebook with columns of figures, returns on his investments vs. various expenditures. As well as ordering liquor and exotic goods in bulk, it looks like he was a patron of the arts; lately, he's been donating substantial sums to a local theater.\n\n      Finally, there's a letter that's of interest to you, but probably has nothing to do with the murder: a well-creased, often-read note from one Dr. Irwin. Your uncle (who else could it be?) formally ended his friendship with Sir Reginald, citing mysterious offenses involving liquor, cards, fish, and \"behavior unbecoming of an English gentleman.\" You read it over twice, then tuck it back where you found it.\n      *set secretary true\n      *set patron_of_arts true\n      *set study_checked true\n      *set last_searched \"bedroom\"\n      *goto search_places2\n   *selectable_if (last_searched!=\"parlor\") #The areas for guests (the dining room, lounge and parlor.)\n      The dining room features a long table that could seat ten. Being meant for formal dinners, it was unused today; you check it for anything unusual and move on.\n\n      The parlor, where the guests are gathered, is a cozy room decked out in crushed velvet and thick carpets, with small polished wooden tables to hold tea cups and trinkets. The lounge is a place of brass and polished wood, decorated with animal skins and elaborately carved ash trays. The smells of smoke and exotic incense hang heavy in the room.\n\n      You double-check the carpets, the cracks between floorboards, the position of the furniture. There are no signs anywhere of blood or a struggle.\n      *set last_searched \"parlor\"\n      *set guest_checked true\n      *goto search_places2\n   *selectable_if (last_searched!=\"servants\") #The other areas of the house (the kitchen and servants' quarters.)\n      A line of pans left out to dry and a shining ice cream maker show the immense amount of preparation that went into this morning. Several bottles of champagne sit in melting buckets of ice, looking lonely and untouched next to the last remaining plates of little cakes and pastries.\n\n      The servants' quarters is a small, long room connected to the kitchen. A simple straw mattress and a small chest mark the sleeping area of Sir Reginald's single member of staff, while the rest of the room has been repurposed as storage. You see nothing in the crates and bags that seems all that interesting.\n\n      A book from the the study sits on top of one of the boxes, a piece of string tucked between the pages; you check it, and find that it's Othello. The page marked doesn't seem to be significant. Sometimes a book is just a clue that someone likes to read.\n      *set last_searched \"servants\"\n      *set quarters_checked true\n      *goto search_places2\n   #You'd like to interview people instead.\n      *set last_searched \"none\"\n      *goto talk_to_guests\n   #You're done investigating and are ready to solve this mystery.\n      *goto moving_on\n*label moving_on\nYou feel like you've investigated all of the available clues, and interviewed anyone with something relevant to share.\n\nIt's time to make a decision: how are you going to solve this case?\n*choice\n   #You're going to use your powers of deduction to bring together everything you've learned.\n      *goto mind_answer\n   #You're going to use your intuition to try to sense who's been lying to you, and why.\n      *goto spirit_answer\n   #You're going to lay a trap for the culprit, put yourself in danger, and hope they implicate themselves.\n      *goto body_answer\n*label mind_answer\nYou think back to the body of Sir Reginald and what it can tell you. What can you be certain about?\n*fake_choice\n   #The scene of the crime: he was killed in the garden.\n      The blood from the rock sank in only around his head. There are no bloody trails or drag marks surrounding the body. You deduce that Sir Reginald was killed in the garden, and his body left there.\n   #The cause of death: he died from a blow to the head with a giant rock.\n      The damage to his head would kill anybody. Seeing as how there are no other marks on the body, it's obvious that the rock was the cause of death.\n   #The time of death: he died sometime between last night and this afternoon.\n      You can't be sure that he died in the garden, only that he probably wasn't bleeding before he arrived there, and wasn't transported in some way that would leave drag marks or wheel marks. Likewise, you can't be sure that his obvious wound is what killed him. All that you can be reasonably sure of is that he died somewhere between when he was last seen walking around, and when he was discovered in the garden. \n      *set right_guess +5\n\nNext, you analyze the facts of the crime. Is there anything that strikes you as strange about how it was carried out?\n*fake_choice\n   #You wonder why the rock was used.\n      It doesn't make any sense. Even in a crime of passion, where someone grabs the nearest weapon, would they really think to use an ornamental boulder? It would be difficult to surprise someone while carrying something that heavy and bulky, and even someone strong would find it hard to lift it high enough to strike someone on the head. You've seen no evidence of any mechanical contraptions to help lift it, but even if there were, why use that and not a more conventional weapon?\n      *set right_guess +10\n   #You wonder what the ice had to do with it.\n      A delivery of ice was made to a house within hours of a murder. Was it part of some trap or mechanical scheme? Used to obscure the time of death, perhaps? Let's see, if he were killed shortly before the body was found and cooled down with ice, it might seem like earlier in the morning... but no, that can't be it. Without forensics, in this era, the police have only hazarded a guess at \"sometime this morning.\" So, a trap or a weapon made of ice? It happens all the time in detective stories.\n      *set genre_savvy %+5\n      *achieve justatrope\n   #You wonder why no one has a solid motive.\n      Sure, various people have said that Sir Reginald was hard to get along with, argumentative, that he had vices. But what could have been worth killing him over? You've found no insurance papers, no crimes being covered up, no evidence of any grudges stronger than a disagreement. He can't have been killed for being irritating, can he?\n      *set right_guess +5\n\nYou think harder about what you know. You've analyzed the evidence at the scene. But is there anything that ought to be there, and isn't?\n*fake_choice\n   #Shouldn't Sir Reginald be carrying more money and jewelry on him?\n      Sir Reginald doesn't have a wallet, rings, or anything else valuable on him. Was he really not carrying anything expensive when he died, or could the motive for his death have been theft? Maybe you should suspect the people who need money the most.\n   #Where are the bloody clothes of whoever bashed his head in?\n      The blood from Sir Reginald's head splashed as far as the middle of his back, staining his jacket. Yet none of the suspects have any blood on their clothes, and you didn't see anything else suspicious - no clothes so dark they wouldn't show stains, no damp laundry, no hidden bloody coveralls or burned tablecloths. If the murderer used something to keep blood from getting on themselves, or wore different clothes, why haven't you found any sign of it?\n      *set right_guess +10\n   #Nothing's missing. The crime scene is too perfect to be real.\n      You haven't seen many crime scenes, admittedly, but this one seems too neat without giving you any useful clues. Where are the overlapping footprints? The signs of a struggle? The witnesses? There's enough evidence to make it clear a murder has taken place, but not enough to solve it. Who could have the knowledge and access to stage this so well?\n      *set right_guess +5\n\nWith everything you've deduced so far, do you have any idea who here is responsible for Sir Reginald's death?\n*fake_choice\n   #Yes, you think it's Lady Vivian, the socialite.\n      *set suspect \"Vivian\"\n   #Yes, you think it's Wexley, the practiced killer.\n      *set suspect \"Wexley\"\n   #Yes, you think it's Colonel Amberley, the dead man's rival.\n      *set suspect \"Colonel\"\n   #Yes, you think it's Elizabeth, the goddaughter.\n      *set suspect \"Elizabeth\"\n   #Yes, you think it's Cecil, the social climber.\n      *set suspect \"Cecil\"\n   #Yes, you think it's Lily, the maid.\n      *set suspect \"Lily\"\n      *set right_guess +10\n   #No, you haven't figured it out yet.\n*if (right_guess>=30)\n   You feel like things are really coming together. With a little more thought, you're confident you'll be able to figure out the entire mystery.\n*if ((right_guess\u003c30) and (right_guess>=15))\n   Your ideas are coming together, though you're not sure about some of your conclusions. Maybe if you think about this a bit more, you can bring them all together.\n*if (right_guess\u003c15)\n   You're still feeling confused about how and why this murder took place, but you're not ready to give up yet. Maybe if you think a bit more it'll become clearer.\n*if ((mind)+(right_guess))>=80\n   *goto mind_good_end\n*else\n   *goto mind_bad_end\n*label spirit_answer\nYou think back on everyone you've interviewed, feeling your way through the tangled web of stories and secrets to find who might be trying to hide something relevant to the case.\n\nLady Vivian reads like an open book, and however shady she seems, in your gut you're inclined to trust her. With all of the insight she gave you over the course of the investigation, she either has nothing to hide in regards to the murder, or is a masterful liar as well as a stone-cold killer.\n\nWexley does not exaggerate, and his reputation is deserved; he is comfortable with killing. In a way, it's the strongest argument in his favor. If he had a reason to turn on his friend, surely he would have a more efficient and less obvious way to do it than the set-up you saw in the garden. You also feel that he was genuinely close to Sir Reginald, in his own way... it would take a lot to make him turn against him.\n\nColonel Amberley has a temper, and is a proud man. He was by all accounts an enemy of Sir Reginald, and admitted his contempt for him. You think he'd be capable of murder under the right circumstances, but were these them? Was he finally disgusted enough by his rival to bash his head in? He doesn't seem suited to anything more coldly plotted, unless that's a masterful front. Somehow, though, you think he's exactly the straightforward type he seems.\n\nMiss Elizabeth harbored a deep hatred for her late godfather, that much is clear. But she seems to find the whole situation unsettling and distasteful, maybe too much to be involved in it in the first place. Or is she putting on her demeanor as a front? The primary sense you get from her is that she wishes she were anywhere but here... she's miserable. If she plotted a murder, would she be so listless to see it succeed? If it were spur-of-the-moment, how in the world would she lift that rock?\n\nFinally, there's Lily, the maid. She strikes you as a woman devoted to duty, who wouldn't easily betray her responsibilities. A quiet strength of character burns there. But there's also something off about her demeanor; she acts calm and subservient, but her hands shake, her shoulders are tight. She is upset - no, subtly traumatized. What's wrong with her? What has she seen? Or is it only that she's the outsider here, and is afraid of being blamed?\n\nYou think about everything you've seen today, and why someone would kill Sir Reginald. What feels like the primary motive for this crime?\n*fake_choice\n   #Money. He was rich and privileged, and someone was trying to take him for everything he's worth.\n      Sir Reginald had a lot of money, and that's always been one of the primary motives for killing people. Whatever the other distractions in this case, someone was after his wealth, and they got rid of him to get it.\n   #Retribution. He committed some criminal act, and someone else carried out vigilante justice.\n      People say that Sir Reginald was unpleasant, but you sense that they're avoiding talking about something much worse. He killed or destroyed somebody and never paid for it, and now someone took their vengeance.\n      *set right_guess +5\n   #Sex. He was involved in something lurid and inappropriate, and someone else wanted it to stop.\n      People have been giving you hints that he was crossing the line in terms of this era's rules about how to treat women - not exactly breaking laws, but doing something distasteful. It's easy to imagine that this built up to something unbearable, something that someone felt obligated to end.\n      *set right_guess +10\n\nNext, you think about the crime scene. In your gut, something feels wrong; like it was set up to trick you. But what's the lie it's telling?\n*fake_choice\n   #The lack of drag marks: he was really killed off property. Someone outside your pool of suspects murdered him elsewhere to throw you off.\n      A closed room is always solved by not actually being a closed room, right? In this case, the gates of the manor and the fences are limiting the pool of suspects to people seen entering the property around when he was killed. Someone snuck onto the estate or murdered him from off-property, making the gates and fences irrelevant.\n   #The heavy rock: althought it might make you think a physically strong person killed him, a weaker killer found a way to lift the rock or stage the scene.\n      The rock just feels wrong. Even if someone was full of rage and strong, why would they grab a decorative boulder when a smaller rock would work as a weapon? Either it's meant to mislead you about their strength or was necessary for another reason. The real question was how and why someone did it. You've seen no signs of any trap or mechanical contrivance - he was far enough from any trees, roofs or fences that any device like that would practically have to be wheeled in.\n\n      So did two people move and drop the rock, and if so, who was helping each other? Or did someone with the requisite strength kill him another way, and have a reason to patiently move and drop the stone afterwards?\n      *set right_guess +10\n   #The brutality of the scene: it's meant to look impulsive when the killer is really a cold, calculating criminal familiar with murder.\n      It's meant to look like a disorganized, impulsive crime scene by some kind of overpowered brute. Obviously it can't be - there's not enough evidence, and the scene is too barbaric and random to be a real crime of passion. You feel like you're dealing with a seasoned killer who has experience staging murder scenes and trying to confuse investigators.\n      *set right_guess +5\n\nFinally, you have a vague feeling that there was a moral reason underlying the crime. But what kind of ideal was the murderer following?\n*fake_choice\n   #Family is everything.\n      There are relationships underlying everything in this case. Elizabath and her godfather.\n      *if (lily_sister)\n         Lily and her actress sister. \n      Wexley and his best friend, the deceased. Colonel Amberley keeping up his family pride, and Sir Reginald tarnishing his own.\n      *set right_guess +10\n   #Lies are inexcusable.\n      There's so much deception in this case, and someone wanted it to end. The secrets and the lies were supposed to end when his body hit the grounf.\n   #Betrayal must be punished.\n      A loyalty was ignored, a faith betrayed. Some long-suffering trust was shocked into breaking. That could be the only reason to kill him now - despite his disappointing nature, some people did rely on him. His best friend, his maid, the people his money supports, his guests and rivals to some extent.\n      *set right_guess +5 \n\nYou access your intuition. Who do you think is hiding something relevant to Sir Reginald's murder?\n*fake_choice\n   #Lady Vivian is too smooth; she's been leading you down the wrong path the entire time.\n      You feel uneasy about your conclusion, but on the other hand - she does seem like an amazing liar. Maybe that's why you're questioning your instincts.\n      *set suspect \"Vivian\"\n   #Wexley killed in a bizarre way to disguise his competence, then gave you only obscure hints.\n      You feel in your gut that Wexley is a killer. If you're looking for a murderer and you have one on site, that's your obvious answer.\n      *set suspect \"Wexley\"\n   #Colonel Amberley isn't as silly and impetuous as he'd have you believe, and his too-obvious motives are a bluff.\n      He's a distinguished military man, and he didn't gain his honors by being careless or stupid. He's the obvious choice for someone trying to lie to you.\n      *set suspect \"Colonel\"\n   #Elizabeth isn't as demure as she seems, and has been plotting to kill her wealthy godfather for a long time.\n      She strikes you as being upset by the situation but not too upset, demure without being too cold... her demeanor is too perfect to be real.\n      *set suspect \"Elizabeth\"\n   #Lily is using her meek demeanor to hide a resolve made of steel, and to conceal the secret of why a murder had to happen.\n      Lily has a lot of practice acting like the perfect servant, and the fact that she was at all shaken means she knows more than she's saying. Underneath those layers of stress and resolve, you sense something harder - a will that could commit murder, given the right reasons.\n      *set suspect \"Lily\"\n      *set right_guess +5\n   #You have no clue, but maybe your subconscious will take you the rest of the way.\n\nYou take a deep breath and try to feel in your gut how you've done so far. \n*if (right_guess>=30)\n   Everything aligns; you feel like you're close to an answer. If only you can finish bringing it all together.\n*if ((right_guess\u003c30) and (right_guess>=15))\n   You aren't sure about some of the conclusions you've drawn, but you think you're getting closer to the truth.\n*if (right_guess\u003c15)\n   Honestly, you don't think you've figured things out very well. But maybe your innate powers of intuition can put together the pieces you're missing.\n\n*if ((soul)+(right_guess))>=80\n   *goto soul_good_end\n*else\n   *goto soul_bad_end\n*label body_answer\nIt sounds risky, but you don't know that you're up to the challenge of detecting. The far more straightforward method is to bait the culprit, then lay in wait. \n*if genre_savvy>=50\n   You think you remember Sherlock Holmes doing this a time or two, so it's a genre-acceptable option.\n*if genre_savvy\u003c50\n   Setting yourself up to be alone with a murderer may not seem like the wisest option, but if it gets you out of having to make your case the old-fashioned way, results are what count.\n\n\"I've found documents in Sir Reginald's study that tell me beyond a doubt who the murderer is,\" you announce to the people assembled in the parlor. \"I understand your reasons, and there's no need to involve the police. Come talk to me, and I won't have to tell them what I know.\" You pause dramatically. \"I'm going to sit in the garden. The rest of you must all sit in different rooms and draw the curtains, so the guilty party has a chance to meet me without being seen. There's no need for anyone else to know your identity... not if you cooperate.\" There is some muttering at that, but the guests exchange a glance and allow you to continue.\n\nYou gesture to the clock on the mantle. \"The murderer has ten minutes to come and confess, and talk to me about why they did what they did. After that, I'll have to take the evidence I have on me to the law.\"\n\nYou can only hope that the murderer is gullible enough to believe your ruse and show themselves in the back garden in an attempt to gain your evidence. To help bolster their courage, you sit with your back firmly towards the closest French door that leads to the garden, a hall door near the study.\n\nDo you have a sense of who you're waiting for?\n*fake_choice\n   #Someone with an alarming amount of brute strength: someone who could lift a boulder alone.\n      That would be Wexley or Colonel Amberley, unless one of the others is hiding a surprising amount of strength for their frame.\n   #Someone without physical strength, who attacks with poison, stealth, and subterfuge.\n      That would be Cecil, Lady Vivian, Elizabeth, or maybe Lily, just from physical type. None of them stand out as murderous, but that had to have been how Sir Reginald died.\n      *set right_guess +10\n   #Someone with special powers, whose physical strength doesn't matter compared to their magical abilities.\n      Some of the people gathered here have struck you as just... strange. After everything you've seen today, would it be any wonder if people are using fantastical powers to get away with murder?\n\nYou slow your breathing and try to picture exactly the person who's coming to meet you. Your best guess is that...\n*fake_choice\n   #It's a man...\n      *goto male_suspects\n   #It's a woman...\n      *goto female_supects\n   #You have no clue.\n*label female_supects\nAnd the most likely culprit is...\n*fake_choice\n   #Lady Vivian\n      *set suspect \"Vivian\"\n   #Elizabeth\n      *set suspect \"Elizabeth\"\n   #Lily\n      *set suspect \"Lily\"\n      *set right_guess +10\n*goto fisticuffs\n*label male_suspects\nAnd the most likely culprit is...\n*fake_choice\n   #Wexley\n      *set suspect \"Wexley\"\n   #Cecil\n      *set suspect \"Cecil\"\n   #Colonel Amberley\n      *set suspect \"Colonel\"\n*goto fisticuffs\n*label fisticuffs\nYou wait in the garden, heartbeat pounding in your ears as you wait for the murderer to make themselves known. You wonder if you should have found yourself a weapon before making your way out here. But you should be able to handle one person, shouldn't you? You hope you're right that the culprit doesn't have any accomplices in the manor to call on, or the odds could get worse.\n\nHave any of your guesses about the killer been right? \n*if right_guess=20\n   You feel like they have, but there's no way to know for sure until they show up. If they do.\n*if ((right_guess\u003c20) and (right_guess>=10))\n   You might be, you might not be. There's no way to know until they show up, if they do.\n*if right_guess\u003c10\n   ...Probably not. But hopefully you'll still be able to get the jump on them.\n\n*if ((body)+(right_guess))>=70\n   *goto body_good_end\n*else\n   *goto body_bad_end\n*label body_bad_end\nYou're tense, jumping at any minor sound, as you wait for someone to come - if you're right, ${suspect}. But you force yourself to remain seated, pretending to ignore the house as you look over your fake evidence (a few borrowed pages of household expenses.) If you seem too alert, your suspect will never have the courage to strike.\n\nYou feel a burning sense of pressure between two ribs, then a deeper tearing sensation sinks in. You realize you've been stabbed, by someone who came from behind you so quietly you had no clue they were approaching.\n\nShock starts to wrap your mind in greyish cobwebs. \"Sorry,\" whispers a voice, too indistinct to make out. And then... you start to fade. \n*set die \"body\"\n*goto bad_end\n*label mind_bad_end\nYou alternately sit and pace in Sir Reginald's study as you continue to theorize.\n\n[i]Think[/i], you command yourself, [i]put it all together[/i]. You have a rock that no one could lift, at least no one who was there, and no other device to pick it up... a closed room the size of an estate, where you may or may not have missed a trick... suspects you know next to nothing about, motives everywhere and nowhere, and why are you here in the first place? Did anyone even call you?\n\nYou let out a frustrated yelp and throw the nearest thing, a glass paperweight. It bounces off the carpet with a dull thud, but fails to break. Like this case.\n\nWho did you even suspect? ${suspect}? \n*if suspect=\"Lily\"\n   All the evidence seemed to add up. You almost had her. If only you'd been a little smarter, guessed a little better... but she slipped past you. Is it possible to turn the pages and back and try over again?\n*if suspect=\"Colonel\"\n   He would be a fantastic culprit, except that he showed up late to the party. Even if he somehow killed Sir Reginald before he came onto the property today, how would he have managed to stage the scene with the rock? It seems impossible that he could have killed Sir Reginald while everyone else was waiting in the parlor... yes, there's no away around it. He doesn't add up.\n*if suspect=\"Wexley\"\n   The murder is so bizarre, any way it stacks up, it rules him out. He knows how to kill, effortlessly and without a trace. There's no way he'd set up this many obstacles just to rule himself out.\n*if suspect=\"Elizabeth\"\n   She showed up late. She isn't a local. She didn't have enough contact with the deceased to build up enough resentment. Any way you look at it, she was too much of an outsider to have a solid basis to carry this out.\n*if suspect=\"Vivian\"\n   She has no motive that anyone has pointed out, is too weak to lift the rock without help, and has been an open book throughout your investigation. Setting aside whether a murderer would go out of their way to appear so shady, where's any evidence at all linking her to the crime?\n*if suspect=\"Cecil\"\n   Everything about him suggests that he's a weak man. Physically, mentally, in terms of deception. He's a newcomer to this town, this group, and he doesn't know his way around the manor. If he were some kind of mastermind, almost everyone you've talked to would have to have been lying. That's just not plausible.\n\nWhat it comes down to is that your powers of deduction were lacking. You can't solve this world's mystery. \n*set die \"mind\"\n*goto bad_end\n*label soul_bad_end\nYou sit in the garden at the wrought iron bench nearest to the dead man, gazing at the scene. Any minute it's going to come together. Any minute now...\n\n...It doesn't. \n*set die \"soul\"\n*goto bad_end\n*label bad_end\n*if die = \"soul\"\n   You trusted your plucky gut instinct to pull you through, and it didn't. \"Trying instinct on a logic puzzle\" doesn't have the same catchy ring as \"bringing a knife to a gun fight\", but either way, you failed.\n\nThe world turns white, like a blank page. You find yourself lying on the bookshop floor in the real world, grasping at nothing. \n*if die = \"body\"\n   With a choked half-scream you reach for your torso, but find no wound there. Your heart rate slows to normal as your body realizes that you were never stabbed. Your clothes are the same as they ever were in the real world, except a little dustier from rolling on the floor.\n*goto_scene bookshop_scene_fail\n*label body_good_end\nYou wait in the garden, your back to the nearest doors that lead there. It's a long shot that the killer will be confident enough to try to strike, but if they feel pressured enough by your supposed evidence, maybe your not-so-subtle trap will work. You study your fake blackmail material, a few borrowed sheets of household expenses.\n\nA gentle squeak of hinges announces the arrival of someone. You give the person a couple of seconds to approach, then whirl around to confront them. It's Lily, and she's close.\n\n\"I'm so sorry,\" she says apologetically, and lunges at you with a kitchen knife. You grab her skinny arm and turn her away from you as you pin it behind her, then manage to twist her wrist far enough to make her drop the blade. It falls dully to the grass of the garden.\n\nShe's surprisingly strong for her size, but you're stronger. Although she bares her teeth and keeps struggling, as you find and seize her other wrist, you can see in her face that she knows she's lost. Eventually her attempts to kick you trail off, and she bows her head.\n*goto good_end\n*label mind_good_end\n*if (right_guess=35)\n   *achieve elementary\nYes - you can see the sequence of events clearly now, means and motive and opportunity all coming together in your mind.\n\nIt had to have been Lily, the maid. Sir Reginald was alive as of breakfast, judging by the food in his teeth. His body was found in the garden, but there was no evidence that he was killed in the garden or by the rock. He was killed before anyone else showed up, by the only person on the scene, likely by poison when he ate the breakfast she made. Someone else then helped her move the body, drop the rock, and hide any bloody clothes.\n\nBut who helped her? The only people there early enough to lend a hand staging the scene were the delivery people. A child with a wagon... and a woman with a covered basket. Someone who could help carry a rock, and take away a bloody apron. An apron, an article of clothing Lily wasn't wearing earlier, even though she was working in the kitchen. And who was the woman that delivered the pastries for the party this morning?\n\nYou know a place nearby with excellent baked goods. The cafe where you were first given the message to come here, to find a crime scene full of clues for a detective to assemble and come to the wrong conclusion. A waitress was integral to this plot, a woman with bluish eyes, blondish hair, and the first name of a flower - like Lily. \n*if (lily_sister)\n\n   And who else could it be but her sister, the actress? That also explains why she seemed to be an older woman - the posture and loose clothing disguised her figure, while the rags tying up her hair covered her most distinctive feature from a distance. All of this was carefully planned.\n   *set mind %+5\n*if not (lily_sister)\n   These observations tell you that she is related to Lily, and so was probably recruited through their family ties. As for the differences in appearance, a disguise is the easiest explanation.\n\nAs for the motive, you aren't a mind reader, but you might have some idea. \n*if not (lily_sister)\n   You haven't found the exact trigger, but it seems that Lily put up with a lot from Sir Reginald for a long time. He finally crossed some line that even she couldn't tolerate, and she felt compelled to end him. \n*if ((lily_sister) and (patron_of_arts))\n   Lily's sister is an actress, and Sir Reginald just donated to a theater. It happened recently, and so it could be the trigger for why this happened now. \n*if (((lily_sister) and not (patron_of_arts)) and (cad_with_women))\n   Lily's sister is beautiful, and Sir Reginald is known to take liberties with beautiful women. Whatever was going on, he crossed a line in the eyes of his long-suffering maid. \n*if (((lily_sister) and not (patron_of_arts)) and not (cad_with_women))\n   Lily's world was a small one, her manor and her master and her duties. That, apparently, she could tolerate. If something changed recently, it probably had to do with the only other thing you've found that she might care about, her sister. \nHowever, you suppose you won't know for sure unless she tells you.\n*goto good_end\n*label soul_good_end\nYou sense it all coming together. You walk up to the one person who can explain the rest, the person you know - without any solid evidence, but beyond a shadow of a doubt - to be behind this morning's events.\n\n\"Lily, I know it was you,\" you say gently. She freezes in place, then turns to face you, head rotating in slow motion as her eyes come to meet yours.\n\n\"I don't know what you mean, ${honorific},\" she says flatly, and you're all the more convinced that you got it right.\n\n\"You killed Sir Reginald,\" you accuse outright. \"He trusted you, because you did what you were told without complaining; you'd done it for years. That's why he didn't see it coming when you finally had enough.\"\n\n\"And how am I meant to have killed him?\" she cries desperately. \"I'm weak, I'm not capable of murder, and I'm alone in this world with no one to help me!\" As she says each of these things you watch her eyes, and you know: each is a blatant lie, and a central clue to this murder.\n\nShe is a strong woman. She is a killer. And someone close to her helped her. \n*if (lily_sister)\n   You even have a strong feeling as to who - her sister, the actress. \nYou suspect it's the waitress from the cafe this morning, the woman with the bluish eyes, blondish hair and the name like a flower... which, now that you think about it, all relate back to Lily. And might there be a family resemblance around the cheekbones?\n\nWith an accomplice to help, it's not a mystery how Sir Reginald made it to the garden without any drag marks, or how a heavy rock was dropped on his head. The rock must have come after death, which you feel was probably accomplished via breakfast. After all, Lily cooked all of his meals, and the dead man died with food still in his teeth. In fact, only one thing remains not fully explained.\n*goto good_end\n*label good_end\n\n\"Why did you do it, Lily?\" you ask. \"I have most of the story, but I don't understand why you put up with him for so long, and then killed him now. \n*if ((lily_sister) and not (mistress_knowledge))\n   Did it have something to do with your sister?\"\n\n   \"I haven't seen her in ages,\" Lily insists stubbornly. \"You can't prove it had anything to do with her.\" Her gaze is both fierce and desperate, and you somehow know - yes, it has everything to do with her sister. But you won't get any more truth out of her... you can only content yourself with having found your killer, and fulfilled the demands of the book.\n   *goto post_good_end\n*if (((lily_sister) and (mistress_knowledge)) and not (patron_of_arts))\n   Was it because he tried something inappropriate with your sister?\"\n   \n
