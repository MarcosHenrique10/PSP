hem and take the tickets\n            *set tickets 1\n            *set navigator_relationship %-50\n            The two youths are visibly shocked as you pull out your gun and shoot them, before they have the chance to utter a single word. \n            A smell of urine arrives at your nostrils as you take the tickets from their still trembling hands. \n            Satisfied that you got the tickets, you start to walk back to the SAPEV, \n            amazed at how simple that was, and wondering why ${navigator_name} has such a look of shock in ${navigator_his} eyes. \n            \"${navigator_expression_surprise}, what the ${navigator_swear1} hell was that?? Are you some sort of psychopath?? Maybe that is what I will call you from now, crazy psycho!\"\n            *set navigator_salute1 \"Crazy psycho\"\n            *set navigator_salute2 \"Crazy psycho\"\n            *goto rest_scene\n\t\t\t\n*comment =========================================================================================================================================================================================================================\n\n*label rest_scene\n\nAs you return to the SAPEV ${navigator_name} gets into the driver's seat and tells you, \n\"${navigator_salute2}, we should go and prepare somewhere. We have a few hours before the event starts and we probably don't want to arrive before this Alexandros character.\" \n\nThe look on your face tells ${navigator_him} that you are a bit confused, so ${navigator_he} continues. \n\"We are about to start a [i] Forceful Unauthorised Collect or Kill [/i] procedure, leading to the capture of Alexandros or his death, if he tries to resist too strongly. \nAt the back of the SAPEV we have all the kit for these jobs, including extra firepower, body armour and nanotechnology infusions to make us a bit quicker and stronger.  \nThe procedure to take these infusions is rather laborious, and can result in some temporary drowsiness and fatigue while they fully kick-in, \nand standard CSA procedures indicate that it would be better to rent a secure room or facility to administer them and prepare. Given our current funds, we could\":\n\n*choice\n\n   #\"Go to the poorest area in the city, Uramachi, and find a small unoccupied apartment\"\n\n     *set navigator_relationship %-10   \n   \n     As you drive to Uramachi, ${navigator_name} explains that finding an unoccupied apartment in the Uramachi district is rather easy, \n     given the high mortality rate in the area and because the only non-ups who want to live here are those who cannot afford anything else. \n     Most apartment blocks are ancient 21st century structures that have not been maintained for decades, and the stench of decay and rot permeates the buildings, which have no utilities or other amenities. \n     You head to one typical building in the area, and walk up to the upper floor apartments. \n\t \n     ${navigator_name} leads the way, illuminating the way with light that emanates from the palms of ${navigator_his} hands, and explains:\n     \"Really? You don't remember these? They are nanotechnology torches. You also have them!\"\n     Eventually ${navigator_he} stops at an apartment without a door, and after you enter ${navigator_he} shoves some rotting wardrobe over the doorway to give you some warning if anybody attempts to enter. \n\n     The Forceful Unauthorised Collect or Kill suitcases from the back of the SAPEV contain a couple of small lamps that illuminate the room, \n     allowing you to set up a bewildering array of flasks and equipment that ${navigator_name} says you will need for the mission, \n     while ${navigator_he} says: \"${navigator_salute2}, sorry, this place is a real ${navigator_swear2} shithole, but if you would have brought some more money we could have afforded something nicer\"\n\n     *page_break\n\n     *goto resting_preparations\t \n\n   *selectable_if (money >=30) #\"Alternatively, we could find a decent hotel around the Kabuki area\"\n         *set money -30\n\n         ${navigator_name} tells you that finding a decent hotel in the Kabuki district is arguably easy, though many of them are rather unhygienic environments that ${navigator_he} has come to despise. \n         Nevertheless, a couple of them have rather nice rooms where you can even take a shower and relax before heading to the nightclub.\n         *if (navigator_personality = \"playful\")\n            *if (navigator_relationship >50)\t\t \n               As you stop the SAPEV in front of one of them, ${navigator_name} winks at you. \"${navigator_salute2}, here we are, the nicest for this budget,\n               I have even brought a few dates here!\" You are slightly surprised by the last comment, though ${navigator_he} seems rather happy, \n               quickly combing ${navigator_his} ${navigator_hair} hair before exiting the SAPEV.\n\n               *goto medium_hotel_preparations\t\t\t   \n            *else\t\t \n               As you stop the SAPEV in front of one of them, ${navigator_name} snarls at you, \n               \"${navigator_salute2}, here we are, this place will do. I have to say, I am disappointed with your poor choices throughout this entire mission. \n               At this rate I think you are about to get us both ${navigator_swear1} killed!\"\n               You are slightly surprised by the tone of ${navigator_his} voice, and by how ${navigator_he} slams the door as ${navigator_he} exits the vehicle. \n\n               *goto medium_hotel_preparations\t\n         *else \n            *if (navigator_relationship >60)\t\t \n               As you stop the SAPEV in front of one of them, ${navigator_name} smiles at you. \"${navigator_salute2}, here we are, I have stayed here a few times, the nicest for this budget. \n               Actually, I have to say that I am quite enjoying this mission so far, you are a great partner and I like the way you have been handling things, despite your memory problems!\"\n               You are slightly surprised by the last comment, though ${navigator_salute2} seems rather happy, quickly combining ${navigator_his} ${navigator_hair} hair before exiting the SAPEV.\n\n               *goto medium_hotel_preparations\t\t\t   \n            *else\n\t\t\t\n               As you stop the SAPEV in front of one of them, ${navigator_name} snarls at you, \n               \"${navigator_salute2}, here we are, this place will do. I have to say, I am disappointed with your poor choices throughout this entire mission. \n               At this rate I think you are about to get us both killed! I will surely be filing a report on you as we return to New Heaven!\"\n               You are slightly surprised by the tone of ${navigator_his} voice, and by how ${navigator_he} slams the door as ${navigator_he} exits the vehicle. \n               \n               *label medium_hotel_preparations\n\n               You enter the hotel, which is a rather clean and well-kept establishment. The receptionist, a young woman in neat overalls, hands you the keys to one room after you pay her. \n               The room is a rather nice, with rather minimalist decoration and a king-size bed where you place the suitcases from the back of the SAPEV, \n               which contain a bewildering array of flasks and equipment that ${navigator_name} says you will need for tonight's operation.\n\n               [i] (You have ${money} silver dollars left) [/i] \n\n               *page_break \n               \n               *goto resting_preparations\t \n\n   *selectable_if (money >=100) #\"Or, we could go to the most expensive hotel in town, in Shinmachi\"\n         *set money -100\n         *set navigator_relationship %+20\n\n         ${navigator_name} tells you that the Royal Hotel is the most elegant in the city, has a policy of not asking questions from its clients, \n         and has security guards that will ensure you can relax while preparing.\n\n         *if (navigator_personality = \"playful\")\n            *if (navigator_relationship >50)\t\n\n               As you stop the SAPEV in the parking area, ${navigator_name} smiles and says: \n               \"${navigator_salute2}, clearly you like to live the high life, never been to this place, not sure if it is quite like things in New Heaven, \n               but wish somebody would have brought me here before!\" You are slightly surprised by ${navigator_his} last comment, though ${navigator_he} seems rather happy, \n               quickly combining ${navigator_his} ${navigator_hair} hair before exiting the SAPEV.\n \n               *goto expensive_hotel_preparations\t\n\t         \t\t   \n            *else\t\t \n               *goto expensive_annoyed\n         *else \n            *if (navigator_relationship >60)\t\t \n               As you stop the SAPEV in the parking area, ${navigator_name} smiles and says: \n               \"${navigator_salute2}, clearly you like to live the high life, never been to this place, not sure if it is quite like things in New Heaven, \n               but nice to be able to relax before what is likely to be a big ${navigator_swear1} shoot-out! \t\t\t   \n               Actually, I have to say that I am quite enjoying this mission so far, you are a great partner and I like the way you have been handling things, despite your memory problems!\"\n               You are slightly surprised by the last comment, though ${navigator_salute2} seems rather happy, combining ${navigator_his}${navigator_hair} hair before exiting the SAPEV.\n\n               *goto expensive_hotel_preparations\t\t\t   \n\n            *else\n               *label expensive_annoyed\t\t\t\n               As you stop the SAPEV in front of the hotel, ${navigator_name} addresses you in a rather acrimonious tone: \n               \"${navigator_salute2}, here we are, best ${navigator_swear2} hotel in town. I have to say, despite this I am ${navigator_swear1} disappointed with your poor choices throughout this entire mission. \n               At this rate I think you are about to get us both ${navigator_swear1} killed!\"\n               You are slightly surprised by the tone of ${navigator_his} voice, and by how ${navigator_he} slams the door as he exits the vehicle. \n\t             \n               *label expensive_hotel_preparations\n               You enter the hotel, which is lavishly decorated, and proceed to hand the receptionist the cash for the room. ${navigator_name} refuses the offer for anybody to carry your suitcases,\n               which you carry yourselves to your room, a beautifully decorated suite with a king-size bed, where you place the equipment and start to prepare for tonight’s operation. \n               \n               [i] (You have ${money} silver dollars left) [/i] \n               \n               *page_break\n               \n               *goto resting_preparations\n\t\t\t   \n\n*label resting_preparations\n     \n${navigator_name} starts to mix the contents of various flasks until two syringes are ready, before turning to you. \"In case you don't remember, \nthese are nanobots that will make you stronger, improve your reflexes and speed up tissue regeneration. \nWe will pay for the effects in a few days' time, as they really take a toll on your body, but I guess that for such operations they really are necessary. \nUnfortunately they also take a while to kick in, and might make you dizzy and weaker till then\". With that, ${navigator_he} injects one of the syringes into ${navigator_his} arm and the other into yours.  \n\nWithin a few seconds you start feeling a tingling sensation as the nanotechnology microbots start to operate on your body. \nYou feel slightly dizzy and sit down on the floor, and see how a few seconds later ${navigator_name} also collapses, laying down next to you with ${navigator_his} back on the floor. \nYou both pass out for a few minutes, as it seems that the events of the entire day have clearly placed some strain on you. \n\n*page_break\n\nWhen you wake up you realize that you must have collapsed on top of ${navigator_name} when you lost consciousness, with your head leaning on top of ${navigator_his} ${navigator_shirt}. \nAs you try to push yourself aside you stumble and come quite close to ${navigator_his} face, as ${navigator_he} regains consciousness. \n\n*set health %+20\n\n*if (navigator_relationship \u003c50)\n\n   ${navigator_name} pushes you away, visibly annoyed by the contact.  \n   *goto awkward_silence\n   \n*else\n\n   For a few seconds you look at each other, ${navigator_his} ${navigator_eyes} eyes holding your gaze, before ${navigator_he} gently pushes you aside, before adding: \n   \"Sorry, it's just that, I am not sure if its mutual, but today I felt there is some sort of connection between us. Have you also felt it?\"   \n\n   *choice\n              \n    *selectable_if (mc_in_relationship) #\"Sorry, I think you are a great person, though I am already in a relationship with somebody...\"\n       ${navigator_name} looks down as you say this, ${navigator_his} ${navigator_eyes} eyes clouding slightly, before ${navigator_he} quietly adding: \n       \"Ah, shame, I really liked you actually, it's strange as everybody in CSA thinks that you are actually single, I suppose there are many things about you I just don't know\".\n       *label awkward_silence\n\t   \n       There is a bit of an awkward silence, after which you tell ${navigator_him} that you really need a shower. \n       Afterwards, you both efficiently start to prepare for the [i] Forceful Unauthorised Collect or Kill [/i] situation.\n   \n       By then the drugs have fully kicked in, and with the help of ${navigator_name} you equip and start to understand what is happening to you. \n       You can already feel how your muscles have considerably expanded and that you are in a hyper-active state of alertness and activity. \n       The nanotechnology microbots are monitoring your key organs and heart, altering the distribution of blood and sending it to where it is most needed. \n       You proceed to put on additional graphene-based body armour under your clothes, which under normal circumstances would hinder your movement, yet your increased strength and reflexes more than compensate for this. \n       Finally, you pick up some additional weapons, exchange a glance with ${navigator_name} and return to the SAPEV.  \n       *goto Belfair\n\t   \n    #\"Sorry, you are a lovely person, but I am just not that interest in you...\"\n       *set navigator_relationship %-20\t   \n       ${navigator_name} looks down as you say this, ${navigator_his} ${navigator_eyes} eyes clouding slightly, before ${navigator_he} he quietly adds, \"Ah, sorry... I think I must have misread the signs...\"\n       *goto awkward_silence\n\t\n    #\"Actually, I have felt something, I think that I really like you\"\n       *set navigator_relationship %+30\n       ${navigator_name} ${navigator_eyes} eyes brighten as you say this, \n       \"Yes, I thought I could feel it, you are so unique, I feel you are completely different to everybody else around here\". \n       Bizarrely as it may seem, it is clear that you are attracted by ${navigator_name}, even though you have only known ${navigator_him} for about 14 book hours, \n       and despite (or because of?) his rather ${navigator_personality} personality. \n\n       ${navigator_name} comes a little closer, with sparkles in ${navigator_his} eyes, and grabs one of your hands. \"Well, does that mean we're a couple now?\" \n       You roll your eyes at ${navigator_his} rather abrupt questions, and nod. \n       \"I'd say we've known each other for too little time to call it something that sounds that official, but something like that\".\n\t   \n       *set temprelationship true\n       *set mc_in_relationship true \n       *set adrao_tale_relationship 1\n       *achieve loveinstrangeplaces\n       \n       ${navigator_name} blushes, and smiles from ear to ear. \"That's absolutely great, though I suppose we should take it slowly, and of course we still have a mission to finish tonight\". \n       *if (navigator_personality = \"playful\")\n            After a few seconds thought, ${navigator_name} adds, \"Would you mind if I called you sweetie from now on?\"\n            *fake_choice\n               #\"Sorry, but let's still keep things professional, ok?\"\n                  *set navigator_relationship %-5\n                  ${navigator_name} seems a little sadder for a second, but soon recovers. \"Sure, of course, after all, we are still at work...\"\n                  *goto relationship_radio\n\t\t\t\t  \n               #\"Sure, that would be nice\"\n                  *set navigator_relationship %+10\n                  ${navigator_name} seems even happier by this, before adding: \"But, we still have a mission to finish tonight!\"\n                  *set navigator_salute1 \"Sweetie\"\n                  *set navigator_salute2 \"Sweetie\"\n                  *goto relationship_radio\n\t\t\t\t  \n               #\"How about just, love?\"\n                  *set navigator_relationship %+5\n                  ${navigator_name} seems happy by this, before adding: \"But, we still have a mission to finish tonight!\"\n                  *set navigator_salute1 \"Love\"\n                  *set navigator_salute2 \"Love\"\n                  *goto relationship_radio\n\n               #\"How about you just call me by my name?\"\n                  *set navigator_relationship %+5\n                  ${navigator_name} seems happy by this, before adding: \"But, we still have a mission to finish tonight!\"\n                  *set navigator_salute1 \"${name}\"\n                  *set navigator_salute2 \"${name}\"\n\n                  *goto relationship_radio\n\t\t\t\t  \n       *else\n            After a few seconds thought, ${navigator_name} adds, \"Would you mind if I called you by your first name from now on?\"\n            *fake_choice\n               #\"Sorry, but let's still keep things professional, ok?\"\n                  *set navigator_relationship %-5\n                  ${navigator_name} seems a little sadder for a second, but soon recovers. \"Sure, of course, after all, we are still at work...\"\n                  *goto relationship_radio\n\t\n               #\"Sure, sounds good!\"\n                  *set navigator_relationship %+5\n                  ${navigator_name} seems happy by this, before adding: \"But, we still have a mission to finish tonight!\"\n                  *set navigator_salute1 \"${name}\"\n                  *set navigator_salute2 \"${name}\"\t\t\t\t  \n\t\t\t\t  \n                  *label relationship_radio\n                  \n                  You suddenly realize that there is a chance something might happen and that you might be propelled out of this story, so you take out the radio and show it to ${navigator_name}. \n                  \"I hope that you know what this is? Listen, I don't think you would understand or believe me, but if I was to ever suddenly disappear, you must build one of these to get back in touch with me\". \n\t\t\t\t  \n                  ${navigator_name} seems puzzled by what you say, but takes out some sort of device that starts scanning the radio. \n                  \"${navigator_salute1}, not sure I really understand, but fine, I have just created a digital scan of this ancient radio device, and can quickly ask somebody at the CSA to put one of them together\".\n                  You nod to ${navigator_him}. \"Thanks, it is very important... Anyway, you will eventually understand, somehow I'm not from round here...\"\n\n                  ${navigator_name} smiles at you, and says: \"${navigator_salute2}, time to start preparing for the \"Forceful Unauthorised Collect or Kill operation! We can talk more once we get back to New Heaven\". \n                  You can already feel how your muscles have considerably expanded and that you are in a hyper-active state of alertness and activity, and ${navigator_name} helps you to equip and understand what is happening.  \n                  Essentially, the nanotechnology microbots have started monitoring your key organs and heart, altering the distribution of blood and sending it to where it is most needed. \n                  This means that you hardly feel the hindrance of the additional graphene-based body armour under your clothes, or the weight of the extra weapons that you carry. \n                  When you are finished you exchange a smile with ${navigator_name} and return to the SAPEV.  \n                  *goto Belfair\n   \n*comment =========================================================================================================================================================================================================================\n\n*label Belfair\n\n${navigator_name} drives around the streets, mostly empty at this time, till the edge of town. There, flashing neon lights advertise the Belfair club, with hundreds of vehicles of all types parked around its entrance. \nYou leave the SAPEV at a prudent distance away from the main entrance, and leisurely walk to the door, where 4 rather large bouncers dressed in cheap black suits are checking if customers have tickets. \n\n*choice\n\n   *if (tickets >0) #Hand them your tickets\n      The bouncers nod to you as you hand the tickets and let you through.\n      *goto enter_nightclub\n   \n   *if (money >50) #Give the bouncer a small purse with 50 silver dollars, so that he lets you pass\n      *set soul %-5\n      *set money -50\n      The bouncers nod to you as you hand them the small purse, quickly checking the contents and letting you through into the nightclub.\n      \n      [i] (You have ${money} silver dollars left) [/i]             \n      \n      *page_break\n      \n      *goto enter_nightclub\n   \n   #Move closer to the lead bouncer, and whisper in his ear that you are CSA officers, and that it would be better for him to let you through\n      The bouncer's eyes widen slightly, as he twists his mouth to show his displeasure at your presence, though he lets you in with a hand gesture. \n      However, as you walk in you cannot but help notice one of the other bouncers whispering something into a small hand-held radio. \n\t  \n     *set alert_level +1  \n     *goto enter_nightclub \n\n   #Move closer to the lead bouncer, put a gun to his belly, and tell him that it would be better for him to let you through\n      The bouncer's eyes widen slightly, as he looks down at the gun against his gut. Looking at you straight into the eye, he signals with his hand that you can go in. \n      However, as you walk in you cannot but help notice one of the other bouncers whispering something into a small hand-held radio. \n\t  \n     *set alert_level +1  \n     *goto enter_nightclub \n\n\t \n*label enter_nightclub\nThe inside of the club is one of the loudest places you have ever been to. Massive speakers blast a strange music you have never heard, somehow a mixture of electronic and heavy metal. \nScantily clad men and women of all ages dance to the pulsating rhythm, with flashing lights allowing you only to perceive colours in a range of monochrome. \nYou walk into the main area, and ${navigator_name} points out some stairs with a board saying \"To VIP area\", which appears to overlook the main dance floor. \nThis VIP area appears to be protected by some glass windows, behind which you can see some clients sitting comfortably in chairs while drinking. \n\nYou nod to ${navigator_name} and walk up the stairs till you reach a little lobby area with a couple of doors that lead into the VIP room. \n*if (alert_level \u003c1)\n   *achieve zero_alert\n   A couple of guards stand in front of the door, though they sternly tell you that this is a VIP area that you are not authorised to enter. \n   *choice\n      #Knock the guards out with a couple of punches\n         *set body %+5\n         Clearly these two are no match for the almost super-human strength that the nanobot jab gave you, and you send them flying against the wall with two well placed punches, allowing you to pass into the VIP room.\n\t\t \n         *goto enter_VIP_room\n\t\t \n      #Shoot the guards\n         *set soul %-5\t  \n         As they see you take your the weapon the guards reach for theirs, but they are no match for the speed that the nanobot jab gave you, \n         and you fire at them several times before they manage to even reach their guns, and walk into the VIP room.\n\t\t \n         *goto enter_VIP_room\t\t \n\t\t \n      #Tell them you are a CSA agent and that they'd better get out of your way\n            *set soul %+5\n            As you come closer to the guards they step back, visibly intimidated by you threatening presence. \n            \"Errr, sorry, sir, we didn't know... Rrrr my apologies, of course you can pass... You know, CSA is always welcome...\"\n            Humiliated, they both stand aside and allow you into the VIP room.\n\t\t\t\n            *goto enter_VIP_room\t\n\t\t \n      *if (money >=50) #Give the guards 50 silver dollars so that he lets you through\n         *set soul %-5\n         *set money -50\t\n         You hand one of the guards 50 silver dollars and he signals that you can go through, while he shares half of the coins with the other guard.\n         \n         [i] (You have ${money} silver dollars left) [/i] \n         \n         *page_break\n         \n         *goto enter_VIP_room\t\t\t   \n \n*elseif (alert_level =1)\t\t \n   Six guards stand in front of the door, with their leader telling you sternly this is a VIP area that you are not authorised to enter. \n\n   *label VIP_alert_1_choices   \n   *choice\t \n\t\t \n      *hide_reuse #Tell them you are a CSA agent and that they better get out of your way\n         You look at the guards straight into the face, attempting to intimidate them and make them understand that they are about to make a bit mistake it they stand in your way.  \t\t \n         *if (soul >60)\n            *set soul %+10\n            As you come closer to the leader of the guards, he starts to step back, visibly impressed by you threatening presence, \n            \"Errr, sorry, sir, we didn't know... You have my sincere apologies, of course you can pass. We are always happy to welcome the CSA\"\n            The other guards, seeing their leader flinch, also stand aside and allow you into the VIP room.\n\t\t\t\n            *goto enter_VIP_room\t \t\t\t\n\n         *else \n            You come closer to the leader of the guards, attempting to intimidate him, but he stands his ground, visibly unimpressed by you. \"Nobody comes into the VIP room without an invitation, not even the CSA\". \n            The other guards tense as they hear their leader utter these words, preparing for a fight. \n\t\t\t\n            *goto VIP_alert_1_choices\t\t\t\n\n\n      *if (money >=50) #Give the leader of the guards 50 silver dollars to let you pass \n         *set soul %-5\n         *set money -50\t\t \n         You hand the guard 50 silver dollars, and he signals that you can go through as he distributes some of the coins to the other guards and quickly places the rest in one of his back pockets.\n\t\t\n         [i] (You have ${money} silver dollars left) [/i] \n        \n         *page_break\n         \n         *goto enter_VIP_room\n\n      #Take out your gun and start firing at the guards\n\t\t \n         *set combined_fight (body+ navigator_shooting)\n         *if (combined_fight > 150)\n                     *set body %+10\n                     *set navigator_relationship %+20\n\n                     Despite their greater numbers the fight proves to be very short lived, as the extra strength and speed given to both of you by the nanobots hardly gives the guards a chance to react. \n                     Your first two shots hit two of the guards in the chest, and you knock out a third with a powerful blow to the head, \n                     while you see how ${navigator_name} also quickly dispatches the others, before turning to you. \"${navigator_salute1}, this is way too easy!\"\n\n                     *goto enter_VIP_room\t\t\t\t\t \n\n         *elseif (combined_fight > 120)\n                     *set body %+10\n                     *set navigator_relationship %+10\n\t\t\t\t\t \n                     Despite their greater numbers the fight proves to be very short lived, as the extra strength and speed given to both of you by the nanobots hardly gives the guards a chance to react. \n                     Your first two shots hit two of the guards in the chest, though a third one manages to stab you in the chest, \n                     However, the graphene armour that you are using blocks most of the damage, and you then proceed to knock him out with a powerful blow to the head. \n                     From the corner of your eye you see how ${navigator_name} also quickly dispatches the others, before turning to you. \"${navigator_salute1}, I was expecting a bit more of a fight!\"  \n\t\t\t\t\t\n                     *set health %-5\n                     *goto enter_VIP_room\n\n         *elseif (combined_fight > 90)\n                     *set body %+10\n\t\t\t\t\t \n                     Despite their greater numbers the fight proves to be very short lived, as the extra strength and speed given to both of you by the nanobots hardly gives the guards a chance to react. \n                     Your first two shots hit two of the guards in the chest, though a third one manages to stab you in the chest. \n                     Luckily, the graphene armour you are using blocks most of the damage, and you through him down the stairs with a powerful push.  \n                     From the corner of your eye you see how ${navigator_name} also quickly dispatches the others, before turning to you. \"${navigator_salute1}, this is why I like taking those nanobot jabs!\"   \n\t\t\t\t\t\n                     *set health %-10\n                     *goto enter_VIP_room\n\n         *else\n                     *set body %+10\t\t\t\t\t \n                     Despite their greater numbers the fight proves to be very short lived, as the extra strength and speed given to both of you by the nanobots hardly gives the guards a chance to react. \n                     Your first two shots hit two of the guards in the chest, though a third one manages to stab you in the chest.  \n                     Luckily the graphene armour you are using blocks most of the damage, , and you through him down the stairs with a powerful push. \n                     From the corner of your eye you see how ${navigator_name} also quickly dispatches the others, before turning to you. \"${navigator_salute1}, this is why I like taking those nanobot jabs!\"  \n\t\t\t\t\t\n                     *set health %-15\n                     *goto enter_VIP_room\t\t \n\t\t \n*elseif (alert_level >1)\t\t \n   Ten guards stand in front of the door, with their leader telling you sternly this is a VIP area that you are not authorised to enter. \n\n   *label VIP_alert_2_choices   \n   *choice\t \n\t\t \n      *hide_reuse #Tell them you are a CSA agent and that they'd better get out of your way\n         You look at the guards straight into the face, attempting to intimidate them and realize that they are probably about to make a bit mistake it they stand in your way.  \t\t \n         *if (soul >80)\n            *set soul %+20\n            As you come closer to the leader of the guards he starts to step back, visibly impressed by you threatening presence. \n            \"Errr, sorry, sir, we didn't know... My apologies, of course you can pass... You know, CSA is always welcome...\"\n            The other guards, seeing their leader flinch, also stand aside and allow you into the VIP room.\n\t\t\t\n            *goto enter_VIP_room\t \t\t\t\n\n         *else \n            As you come closer the leader of the guards tenses and stands his ground, visibly unimpressed by you but prepared for a fight. \"Nobody comes into the VIP room without an invitation, not even the CSA\"\n            The other guards also tense as they hear their leader utter these words, preparing probably for a fight that they seem to be itching for.  \n\t\t\t\n            *goto VIP_alert_2_choices\t\t\t\n\n\n      *if (money >=100) #Give the leader of the guards 100 silver dollars to let you go pass \n         *set soul %-5\n         *set money -100\t\t \n         You hand the guard 100 silver dollars and he signals that you can go through, as he distributes some of the coins to the other guards and quickly pockets the rest himself.\n\t\t \n         [i] (You have ${money} silver dollars left) [/i]          \n         \n         *page_break\n         \n         *goto enter_VIP_room\n\n      #Take out your gun and start firing at the guards\n\t\t \n         *set combined_fight (body+ navigator_shooting)\n         *if (combined_fight > 170)\n                     *set body %+10\n                     *set navigator_relationship %+20\n\n                     Despite their greater numbers, the fight proves to be very short lived, as the extra strength and speed given to both of you by the nanobots hardly gives the guards a chance to react. \n                     Your first two shots hit two of the guards in the chest, while a couple of back-kicks sends two others rolling down the stair.  \n                     From the corner of your eye you see ${navigator_name} also quickly dispatches the others, before turning to you. \"${navigator_salute1}, this is way too easy!\"\n\n                     *goto enter_VIP_room\t\t\t\t\t \n\n         *elseif (combined_fight > 140)\n                     *set body %+10\n                     *set navigator_relationship %+10\n\t\t\t\t\t \n                     Despite their greater numbers, the fight proves to be very short lived, as the extra strength and speed given to both of you by the nanobots hardly gives the guards a chance to react. \n                     Your first two shots hit two of the guards in the chest, though a third one manages to stab you in the chest, though the graphene armour blocks most of the damage, \n                     before you finally knock him out with a powerful blow to the head. \n                     As you do this, you feel a sharp pain in your shoulder, as a fourth guard stabs your arm from behind using a knife. \n                     You reverse kick him into the wall, before turning to check on ${navigator_name}, who has just finished dispatching the other guards. \"${navigator_salute1}, I was expecting a bit more of a fight!\"  \n\t\t\t\t\t\n                     *set health %-20\n                     *goto enter_VIP_room\n\n         *elseif (combined_fight > 110)\n                     *set body %+10\n\t\t\t\t\t \n                     Despite their greater numbers, the fight proves to be very short lived, as the extra strength and speed given to both of you by the nanobots hardly gives the guards a chance to react. \n                     Your first two shots hit two of the guards in the chest, though a third one manages to stab you in the chest. However, the graphene armour stops most of the damage, \n                     and you send him rolling down the stairs with a couple of powerful blows. \n                     As you do this you suddenly feel a sharp pain in your shoulder, as a fourth guard stabs your arm from behind using a knife. \n                     You reverse kick him into the wall, before turning to check on ${navigator_name}, who has just finished dispatching the other guards. \"${navigator_salute1}, I was expecting a bit more of a fight!\"  \n\t\t\t\t\t\n                     *set health %-30\n                     *goto enter_VIP_room\n\n         *else\n                     *set body %+10\t\t\t\t\t \n                     Despite their greater numbers, the fight proves to be very short lived, as the extra strength and speed given to both of you by the nanobots hardly gives the guards a chance to react. \n                     Your first two shots hit two of the guards in the chest, though a third one manages to stab you in the chest, though the graphene armour stops most of the damage, \n                     before you knock him out with a powerful blow to the head. \n                     As you do this, you feel a sharp pain in your shoulder, as a fourth guard stabs your arm from behind using a knife, making you yell out in pain as blood pours down your body.  \n                     You reverse kick him into the wall, before turning to check on ${navigator_name}, who has just finished dispatching the other guards. \"${navigator_salute1}, this is why I like taking those nanobot jabs!\"  \n\t\t\t\t\t\n                     *set health %-40\n                     *goto enter_VIP_room\t\t \n\n\n*label enter_VIP_room\n\nThe VIP room is rather smoky and dark, with a number of semi-private booths hosting little groups of people around tables with an abundance of drinks on them. \nSmartly dressed waiters navigate in between the booths, and the heavy windows somewhat shield the area from the music downstairs. \n\n${navigator_name} automatically points out a guy sitting at one of the tables, surrounded by a number of women. \nHe is rather broad, with a strange moustache and a receding hairline, and a couple of men in suits next to him advance towards you as they see ${navigator_name} pointing at him. \n\n*choice\n   #\"Alexandros Doll, we are from the CSA. You are under arrest!\"\n       *goto arrest_Alexandros\n\n   #\"Alexandros Doll, you are coming with us!\"\n       *label arrest_Alexandros\n       As you say this, the men in suits attempt to bring out their guns, but you are way too quick and strong for them. With a mere two kicks you send them flying towards opposite ends of the room.\n       ${navigator_name} grabs Alexandros by the neck and drags him all the way back to the SAPEV, with nobody in the nightclub brave enough to interfere with you. \n\n       After a few hours' drive you are back in New Heaven, and proceed to what ${navigator_name} tells you is the central building of the CSA. You walk through the main door, proud of your prisoner, \n       and head to the main reception counter, sitting Alexandros in one of the chairs there. \n\t   \n       There is a woman in uniform behind the counter, who looks at the prisoner before asking: \"So, who's this scum-bag?\"\n       You are about to reply but at that very moment you notice that ${navigator_name}'s attention is fixed on an object on one side of the counter, which looks like a samurai sword. \n       \n       *if (stories_completed \u003c 1)\n       \n          Wondering what it is doing in a story like this, you tap ${navigator_name} on the shoulder, yet ${navigator_he} advances and picks the samurai sword. \n          As ${navigator_he} does this ${navigator_his} eyes become vacant, as if something or somebody had taken control of ${navigator_him}. \n          Immediately after ${navigator_he} strikes you with it, making you thankful that you took that nanobot jab. Otherwise it would be highly unlikely that you would stand a chance against ${navigator_him}.\n       \t   \n          *goto choice_fight_samurai\n\n       *else \n\n          Wondering what it is doing in a story like this, you suddenly realize that it could be another of those macguffins that makes characters go crazy. \n          You try to warn ${navigator_name} to stay away, but it's too late. \n\n          As ${navigator_name} wields the samurai sword, ${navigator_his} eyes become vacant, and you realize that the macguffin has somehow taken control of ${navigator_him}. \n          Immediately after ${navigator_he} strikes you with it, making you thankful that you took that nanobot jab. Otherwise it would be highly unlikely that you would stand a chance against ${navigator_him}.\n          \n          *goto choice_fight_samurai       \n\t   \n       *label choice_fight_samurai\n       \n       *choice\n          #Intelligently use the furniture in the area to make ${navigator_him} trip, and gain control of the sword while ${navigator_he} is off balance\n             *if mind >= 70\n                Since there is a lot of furniture in the area you manage to throw things around in a way that ${navigator_name} has to maneuver around them. \n                Finally, you manage to put ${navigator_him} in a situation that allows you to push ${navigator_his} arm away and pry the sword from ${navigator_his} hands. \n                *goto good_end\n             *else\n                Since there is a lot of furniture in the area you manage to throw things around in a way that ${navigator_name} has to maneuver around them.  \n                Finally, you think you manage to place ${navigator_him} in an unbalanced situation. However, as you approach ${navigator_he} quickly regains ${navigator_his} balance and thrushes the sword into your neck. \n                *goto bad_end\n\n          #Look at the uniformed woman behind the counter, and try to signal to her that she must distract ${navigator_name} so that you can disarm ${navigator_him}\n            *if soul >= 70\n              Your eyes meet those of the woman, who appears to understand what you need from her, and she starts throwing some random office objects at ${navigator_name}. \n              This makes ${navigator_him} turn around, moment at which you hit ${navigator_his} hand hard enough so that ${navigator_he} drops the samurai sword and you can pick it from the floor. \n              *goto good_end\n\t\t\t  \n            *else\n              Your eyes meet those of the woman behind the counter, but she appears too scared to be able to help you. You start to tell her to throw something at ${navigator_him}, \n              but at this point ${navigator_name} launches forward and thrusts the samurai sword into your stomach. \n              *goto bad_end\n\t\t\t  \n          #Grab one of the chairs and use it to overpower ${navigator_name}\n            *if body >= 70\n              You grab one of the chairs and thrust it onto the head of ${navigator_name}, breaking in several pieces and stunning ${navigator_him}. \n              While ${navigator_he} is in this state it is easy for you to wrestle the samurai sword away from ${navigator_him}. \n              *goto good_end\n\t\t\t  \n            *else\n              You grab one of the chairs and thrust it towards ${navigator_name}, though ${navigator_he} manages to dodge it, and with one launch forward thrusts the samurai sword into your stomach. \n              *goto bad_end\n\n*label good_end\n*set cop true\n*set stories_completed +1\n*set mind %+10\n*if (temprelationship)\n    *set mc_in_relationship true\n    *set npc_name navigator_name\n \nThen the world turns white, like a blank page, and you find yourself standing in the bookshop, holding a piece of paper that looks like it was torn out of a book, with a picture of a samurai sword on it.\n*goto_scene bookshop_scenes\n\n*label bad_end\nThen the world turns white, like a blank page, and you find yourself sitting  on the bookshop floor in the real world, still shaking from what happened, but otherwise alive and well.\n*goto_scene bookshop_scene_fail\n\n\n", "atlantis": "*set body_name \"Strength\"\n*set mind_name \"Intelligence\"\n*set soul_name \"Creativity\"\n\n*temp treasure \"\"\n*temp nereidangry false\n\n*if (stories_completed \u003c 1)\n    Startled by the strangeness of your new surroundings you gasp, only realizing you're submerged in water when it's already too late. In a wave of panic your hands grasp for your throat, but the water doesn't burn like it's supposed to.\n    In fact, your body reacts indifferently to the influx, doing exactly what it's been doing since you were born.\n    \n    Or at least, since this body was born. There's a strange division between your mind and body, with the memories of your \"real\" body forming a strong contrast with your current one.\n    Just where are you? Did you get sucked into a book or something?\n*if (stories_completed >= 1)\n    Despite all you've seen before the strangeness of your new surroundings still manages to startle you, and you gasp, only realizing you're submerged in water when it's already too late. In a wave of panic your hands grasp for your throat, but the water doesn't burn like it's supposed to.\n    In fact, your body reacts indifferently to the influx, doing exactly what it's been doing since you were born.\n    \n    Or at least, since this body was born. There's a strange division between your mind and body, with the memories of your \"real\" body forming a strong contrast with your current one.\n    Maybe it has something to do with the writing style of the book you're in, or something.\n\nAs you're left wondering you examine your new body. You're pretty sure you've never had gills before, and the fins and fish tails are definitely new to you, but you somehow manage to hover in place on instinct, despite the strong current.\nAt least that won't be giving you any trouble.\n\nAs you look around in this strange new world a blonde mermaid darts past you, and you recognize her as your childhood friend Nereïd. Well, not your childhood friend. Your childhood friend in this world. The whole situation's a bit confusing at the moment.\n\n\"Come on, ${name}.\" she yells. \"The other team is gaining on us.\"\n*page_break\nYou snap out of your haze, suddenly remembering that you're in the middle of a dolphin race, and an important one at that. In addition to the usual bragging rights there is an actual prize on the line this time around.\nIn celebration of the annual Tuna migration your father, King Triton, will contribute two items from the royal treasury as prizes, one for each member of the winning team. Nereïd is hell-bent on winning the pearlen necklace that once belonged to one of your ancestors, which makes her almost frighteningly competitive, and you've got your eye on one of the possible prizes as well.\n*fake_choice\n    #There is one particular tome your great-grandfather acquired from a traveler passing through your territory that you've got a more than average interest in.\n        From what you've heard this tome depicts the fantastical creatures that roam the waterless world above. It is one of the few of its kind in existence, and you really want to get your hands on it to broaden your horizons.\n        Who knows what it could teach you?\n        *set mind %+10\n        *set treasure \"tome\"\n        *page_break\n    #One of the tridents of Ariel, the legendary warrior prince, which are usually carefully locked away in a safe in a remote corner of the treasury, is almost within your grasp.\n        This relative of yours rose to fame through his heroic battle against the creatures inhabiting the dry world above. Sure, he was fatally injured in the final confrontation, but that doesn't make his exploits as a warrior any less impressive.\n        If only you were as strong as him...\n        *set body %+10\n        *set treasure \"trident\"\n        *page_break\n    #Some insignificant-looking jars of a rare luminescent paint are up for grabs, and you just can't resist that kind of lure.\n        Rumor has it that all the great masters in painting your country has ever had all began their rise to fame after having acquired some of this paint.\n        You sure hope it's true. Becoming a legendary artist just happens to be a long-cherished dream of yours.\n        *set soul %+10\n        *set treasure \"paint\"\n        *page_break\nOf course fantasizing about your coveted prize isn't going to win you the race, so you kick into gear. There's still a lot more difficult terrain to navigate, and your competitors are hot on your tails.\n\nCatching sight of the other team you make a sharp turn and quickly swim after Nereïd. You'd better not get separated. That could have devastating consequences this late into the race.\n\nBeing the faster swimmer of the two you catch up with Nereïd shortly. She rolls her eyes with some annoyance.\n\n\"Hey ${name}, what got into you back there? You seemed distracted or something...\"\n\nNot knowing how to properly explain your strange behavior you shrug. It's not like she would believe you even if you did explain. You doubt she could comprehend the idea that your mind somehow traveled over here from another realm.\nThen again you doubt you would've believed it either if someone dumped that kind of mind-boggling revelation on you.\n*page_break\nAll of a sudden Nereïd comes to a stop, and you almost bump into her. The ground must've shifted in this area only recently, because the ravine that'd usually be the quickest route between the start and finish of the race has been filled with rubble.\nHaving had no time to erode away by the current caused by the changing tides the jagged edges are still as sharp as knives. Swimming over the rubble is not an option either. This whole area is notorious for the merfolk eating sharks patrolling the shallower waters.\nIt looks like you'll have to go around the mountain range instead.\n\nNereïd looks at you with a panicked look in her eyes, and you sigh. She's never been good at dealing with unexpected setbacks.\n\n\"The way is blocked. What do we do now?\"\n\nThe answer to that seems pretty obvious to you, even though Nereïd seems pretty clueless about it.\n\n\"Well, how I see it there's only one thing we could do. We'll have to make our way through the tangled reef. It's not going to be easy, but we should be able to do it.\nAnd, since we have to go through there anyway, we might as well make use of the opportunity to get further ahead of the other team. The terrain around there is perfect for that.\n*choice\n    #We should take the most direct route to the other side, forcing our way through the reef if we have to.\"\n        *if body > 50\n            Nereïd frowns, looking a bit concerned about your concerned approach.\n            \n            \"Are you sure? Even if you're simply going in a straight line for the other side you'll be doing a lot of damage.\"\n            \n            You shrug, not in the least bothered by that. \"It'll all grow back within a month or so. There are no specifically fragile species of coral living in this particular area.\"\n            And with that you set off to carve yourself a way through the reef.\n            *page_break\n            Moving forwards at a reasonable speed you break your way through the reef, Nereïd following in the wake of the destruction. It's not as bad as you'd feared.\n            The reefs are a lot less dense than you expected, and the coral and porous stones blocking your way break off easily.\n            Because of this the trip out of the reef takes very little time, which is a good thing considering this whole thing is part of a competition.\n            *goto farahead\n        Nereïd frowns, not looking too sure about your plan.\n        \n        \"Are you sure that'll work? I mean, rocks and coral aren't exactly the most fragile materials.\"\n        \n        Feeling slightly irked by Nereïd's doubts you stalk off into the reef without a word. You'll see who's right about this soon enough.\n        *set nereidangry true\n        *page_break\n        About ten minutes and a lot of cuts and bruises later you reluctantly accept that Nereïd was right this time around.\n        The coral and underlying rocks are a lot more solid than their rather fragile appearance betrays, and you've cut your hands on their jagged edges more than once.\n        Desperate not to fail completely and not to make Nereïd any angrier on you than she already is you push on, and before long the plains behind the reef come into view. There won't be a whole lot left of your earlier lead though.\n        *page_break\n        *goto hotonyourheels\n    #We should try to set a trap for the other team to slow them down.\"\n        *if mind > 50\n            Nereïd is quiet for a while, a focused expression on her face, and then nods.\n            \n            \"Alright. That sounds like it could work.\"\n            \n            Glad that Nereïd has given her go-ahead for the plan you head into the reef, her in tow.\n            Now you just have to find the right place and materials to put your plan into action.\n            *page_break\n            With the abundance of sea-weed growing around this area the material you need for the ropes are quickly gathered.\n            You and Nereïd then braid the strands of sea-weed and coat them in a sticky substance produced by certain types of sponges.\n            Then all you need to do is to hang your net just around the corner of a narrow passageway between two large chunks of stone and you're done.\n            Now let's hope that your competitors don't decide to take some different route.\n            *page_break\n            *goto farahead\n        Nereïd frowns. \"With what? It's not like we've brought materials with us, and you're not exactly the best at improvising.\"\n        \n        You sigh and swim off into the reef. \"We'll find something. And by the way, how difficult could it be?\"\n        *page_break\n        After a short swim you notice an abundant patch of sea-weed and swim over to get it, thinking that you could use it for your trap.\n        As it turns out it's perfect for trapping people. You in particular.\n        \n        You struggle against the strong plant-stuff wrapped around you, but only manage to get free when Nereïd swims over to help you.\n        By that time several minutes have passed, and there's no time for you to set up any kind of trap anymore.\n        In fact, you might not even have enough time left to get out of the reef before your competitors do.\n        \n        Nereïd, who holds you accountable for this whole mess, sends you and angry glare and swims off at top speed, with you following not far behind.\n        Perhaps you can still win this race.\n        *set nereidangry true\n        *page_break\n        *goto hotonyourheels\n    #We should try to distract them other team with the brightly colored fish that call the reefs their home.\"\n        As soon as the words leave your mouth Nereïds expression changes to one of disbelief.\n        \n        *if soul > 50\n            \"That's crazy! Well, the 'that's something only you could've come up with' kind of crazy. Not the 'that is utter madness' kind.\n            Well, maybe a little bit, but if someone could make a plan like that work it'd be you. Ya know, with your whole weirdly creative way of looking at things...\"\n            \n            You grin at Nereïd, happy with the 'sort of' compliment, and she rolls her eyes.\n            \n            \"Don't let it go to your head, alright?\"\n            \n            Still, despite the doubts Nereïd expressed she follows you into the reef without protest. It's probably that she doesn't have any better ideas herself, but it's something, right?\n            *page_break\n            *goto fishies\n        \"Have you gone mad? A plan like that'll never work!\"\n        \n        You shrug at Nereïds harsh words. You'll never know if you don't try, right?\n        *set nereidangry true\n        *page_break\n        As much as Nereïd doubts your plan, she still follows you into the reef without protest. She must not have any better ideas of her own.\n        \n        While you're weaving through the reef, gracefully avoiding the sharp points some of the corals are armed with, you try to lure the shy little fishes out of their hiding places, but none of your attempts are successful.\n        Feeling just as frustrated about the failure the plan turned out to be as you are Nereïd throws you an angry glance and swims off with all her might. Your failed attempt has lost you some time, but perhaps you can still emerge from the reefs ahead of your opponents.\n        *page_break\n        *label hotonyourheels\n        Unfortunately for you your fumbling around while you were in the reef has allowed the opposing team to catch up with you, and emerge from the reef only moments after you do.\n        Gritting your teeth you kick into gear, dragging Nereïd, who is the slower of the two of you, along.\n        \n        In part because of this strategy you manage to cross the finish line just ahead of the other team, but it is clear Nereïd is pissed at you regardless.\n        To her it must feel like you let her down when it mattered most.\n        \n        Because of this animosity Nereïd doesn't speak a word to you either during the award ceremony, or the party that followed, even though she did get her prize.\n        You got your prize, the ${treasure}, too, but considering that your best friend is now mad at you it offers little consolation.\n        *page_break\n        *goto landwalkers\n\n*label fishies\nWhile you weave through the reef, gracefully avoiding the sharp points some of the corals are armed with, you lure the shy little fishes out of their hiding places by leaving a trail of bubbles.\nMany of these bubbles get stuck in the reef, and the mesmerized fishes gather around them, forming a flowing mass of bright colors. You allow yourself one quick glimpse behind you, and then tear your eyes away from the spectacle.\nYou've got a race to win, after all.\n\n*label farahead\n*achieve fastfish\nSince you managed to properly execute your (slightly risky) plan you emerge from the reef way ahead of the opposing team. There's no time to celebrate though, since no race is ever won before crossing the finish line.\nThere's actually an ancient tale about a merman who did just that, and lost the race because of it, but this is not exactly the best of times to bring that up.\nNereïd wouldn't be happy about the distraction.\n\nFocused solely on your goal you and Nereïd speed forward over the slightly sloping terrain, and soon you cross the finish line way ahead of the opposing team.\nThe crowd which had gathered on the finish line cheer, and Nereïd is completely over the moon. You're grinning like an idiot as well, but are trying to somewhat keep your composure.\nYour father, King Triton, is watching you after all.\n*page_break\nBefore long Finn and Jaina, the swimmers of the opposing team, make it to the finish line as well, and King Triton initiates the award ceremony.\nKing Triton awards Nereïd the pearlen necklace she was aiming for, and you are given the ${treasure} you set your sights on. A cheer goes up from the crowd, and you can see several barrels of fish-brew being lifted out of a dolphin-cart.\nThat'll be some party.\n\nNot much later Nereïd swims over to you, a broad grin on her face. \"That was awesome, ${name}. I can't believe we actually pulled that off.\"\n\nA band starts playing in the background, and Nereïd stretches out a hand to you. \"Let's go dance to celebrate.\"\n\n*fake_choice\n    #Smile at Nereïd and take her hand.\n        You take Nereïd's hand and swim off to the dancefloor together. There's some upbeat music playing, and Nereïd pulls you along in a complicated dance.\n        Your body actually seems to know what it's supposed to do, so instead of making a fool out of yourself you and Nereïd are actually some of the better dancers of the bunch.\n        \n        Nereïd leads, and you follow effortlessly, twirling in a display of colorful fins. It's pretty nice. Maybe you should do this more often.\n        \n        You dance to more melodies than you can count, but eventually the fun has to end. You're ushered off stage to make space for a stand-up comedian, and you and Nereïd move to an a bit less busy area in sight of the stage.\n        *page_break\n    #Follow Nereïd, but don't take her hand.\n        You swim after Nereïd to the dance floor, but don't take her hand. It feels like a bit too much for now.\n        \n        When you get to the dance floor the band's playing some upbeat music, and Nereïd twirls around enthusiastically. You follow suit, and soon you're part of a colorful group of dancers.\n        With so many people in such a tight space you naturally bump into someone from time to time, but that's all just part of the fun.\n        \n        After a while the band stops playing and you're ushered off the stage to make place for some stand-up comedy.\n        Since you lost sight of Nereïd in the crowd you decide to swim away from the stage for a bit, and that's when it happens.\n        *page_break\n    #Tell her you'd prefer to watch from the sideline instead.\n        You're not much of a dancer, neither in this world or your original one, so you turn down Nereïd's offer. She seems a bit disappointed, but understanding enough.\n        \n        \"Alright. I'll see you later then.\"\n        \n        You nod, and watch the dancefloor as Nereïd finds someone else to dance with. She swirls around with flair, and seems to enjoy herself immensely.\n        After a few dances the floor is cleared for some stand-up comedy, and Nereïd swims back your way.\n        *page_break\n*label landwalkers\nAll of a sudden a large shadow is cast on the party, and you all look up in distress.\n*if treasure = \"tome\"\n    Because of your studies you know exactly what the object casting the shadow is. It's one of the huge vessels the land-walkers use to swim across the water.\nLetting your gaze pass over the fearful faces of your fellow merfolk, you pick up the word [i]land-walkers[/i] in their distressed mumblings many times.\nWith the party now forgotten people dart for cover, and stare up at the surface in anxious anticipation. In the long history of your kind nothing good ever came from the appearance of land-walkers.\n\nAs if in confirmation of the old tales huge nets are cast out from the ginormous vessel, and you and your distraught brethren dart away in an attempt to escape their clutches.\nYou manage to get out of the way in time, dragging along one of the younger children as you go, but not all are so lucky. As your eyes sweep through the crowd you quickly realize that one very distinct face is missing. Nereïd is not here.\n\nYou turn to the nets in horror, and watch helplessly as Nereïd, whose new necklace got snagged into the netting, gets dragged up to the surface and out of your reach, along with half a dozen of other merfolk.\n*page_break\nLess than an hour later the last of the scattered merfolk arrives at the great hall, where your entire community has gathered.\nFear is in everyone's eyes and heart as the events of the day are discussed in hushed voices.\nSure, this is not the first time the land-walkers have come and taken some of your kind, but this is the first time it has happened in such great numbers.\n\nAs tension rises so does the volume of the conversations across the room, and before long people are yelling at each other rather than talking, with you staying in the background, your eyes darting back and forth through the room.\nWhat happened to Nereïd has left its marks, and you're feeling more insecure than you've ever been before. Deadly sea creatures you know how to deal with, but these land-dwellers... Well, they're something completely different.\nSomething alien even.\n\nFor a split second the intensity of your feelings separates your mind from your body and you faintly realize that this isn't actually happening to you, that it's only a story, but then you're dragged back in.\nThere's no escaping this new reality.\n*page_break\nJust before the discussions completely falls into chaos your father, King Triton, slams the back of his imposing trident on the white-marble floor, and everything goes silent.\nHe gets up from his throne with visible difficulty, and you are once again reminded just how old he actually is. The fire in his eyes is still burning brightly though, and his voice is as imposing as always.\n\n[i]\"My subjects...\"[/i]\n\nEven those who were too lost in their own grief to notice him hitting his trident to the floor before now look up at the King, and you can't help but to be in awe.\nThis level of authority is not something you gain just by being born in the right family.\n\n[i]\"As you are all aware disaster struck our small community mere hours ago. While we were out celebrating the land walkers came, and took seven of our brethren from our midst.[/i] [b]We will not stand for this![/b]\n[i]Before this day turns to night we will have them back in our midst, by whatever means necessary!\"[/i]\n\nLoud cheering goes up from the crowd, but you are merely standing there, wondering how your father ever thinks to achieve that.\n\n*fake_choice\n    #Either way you don't feel too confident about this approach.\n        After all, when did violence ever solve anything?\n    #You will make those land-walkers pay.\n        At the thought of Nereïd and your fellow merfolk being at the mercy of those brutes your blood boils.\n        You won't allow them to get away with this.\n    #You will make sure to get Nereïd and everyone else back safely.\n        However you might feel about those land-walkers they're not your main priority.\n        It's much more important to make sure that everyone gets back in one piece.\n\nAs the crowd's fear turns to bloodlust you meet your father's gaze, and your stomach drops. He can't be expecting you to...\nEven before you manage to wrap your head around this ominous suspicion King Triton speaks up and confirms it.\n\n[i]\"My[/i]\n*if he = \"she\"\n    [i]daughter, Princess[/i]\n*if he = \"he\"\n    [i]son, Prince[/i]\n*if he = \"they\"\n    [i]child,[/i]\n[i]${name}, will take charge of this operation in my stead. Make sure to treat ${him} with respect, and follow ${his} orders. We can't afford to be divided in this time of need.\"\n*fake_choice\n    #Finally. You've been waiting for this for years.\n        As the next in line there's been a lot of pressure on you for years, but despite that you always stood in your father's shadow.\n        Now you'll finally get the chance to prove yourself based on your own abilities.\n    #If your father thinks you're ready for this, you probably are.\n        While your father's age has been showing during these last few years his mind is still as sharp as ever.\n        He wouldn't choose you for this important position unless he was convinced you could handle it.\n    #You don't feel ready for this, but you'll have to try.\n        All eyes are focused on you, and you try to appear calm and confident, though you feel anything but. These people are counting on you, and your father really isn't in a state in which he could take the lead.\n        And besides, you've got a bone to pick with the land-walkers. They made a big mistake by abducting your people, Nereïd in particular.\n\nLess than an hour later your troops are gathered on the outskirts of the city, counting about fifty souls. Half of them are the courts elite spell-casters, while the other half consists of warriors of every kind imaginable, ranging from members of the royal guard to hunters who usually aren't too fond of rules and regulations of any kind.\nIf anything, this recent threat managed to unite your people in ways you hadn't thought possible a mere day ago.\n\nYou yourself are\n*if (treasure = \"trident\")\n    clad in full war-gear, brandishing your newly acquired trident. This thing'd better be as good as legend has it.\n*if (treasure = \"tome\")\n    clad in your battle-robes, which are a lot easier to move in than the traditional war-gear, brandishing the tome containing most part of the collective knowledge your people have of the land-walkers.\n*if (treasure = \"paint\")\n    clad in your battle-robes, which are a lot easier to move in than the traditional war-gear, brandishing the luminescent paint you were rewarded with after the dolphin-race. You don't have a clue what to use it for yet, but you'll figure that out when the time comes.\n\nThanks to the scouts King Triton sent out ahead of your own forces you know exactly where to go, and since the land-walkers are faced with unfavorable air currents up on the surface it doesn't take long for you to catch up.\nSadly that alone won't win you the battle, and if you don't manage to stop them in their tracks the land-walkers will soon reach the shores of their domain. Stopping a vessel of that size will take some effort though.\n*choice\n    #Order the spell-casters to whip up a massive storm.\n        *set genre_savvy %+10\n        The spell-casters are quick to follow your orders, and within minutes the land-walkers' vessel is caught in a raging storm with gale-force winds, thunder and an occasional whirlpool.\n        It is apparent that the land-walkers are struggling just to keep their vessel together, since you can hear it creaking all the way down here.\n        \n        You could of course just wait for their vessel to break into pieces, but that might be dangerous to the captured merfolk, if they are even still alive.\n        You'd rather act quickly and be done with it.\n        *choice\n            *if (treasure = \"paint\") #Intimidate the land-walkers into releasing their captives with a bit of help of your special paint.\n                The look of the luminescent paint against the backdrop of the raging storm grants you and your warriors an almost ethereal appearance, and the land-walkers, or at least the few of them still standing upright, quake in their boots.\n                *label demands\n                Amplified by a simple magical enhancement your voice sounds over the waves, calmly stating your demands.\n                \n                \"Land-walkers. Return our kin to us right this instance, or prepare to perish.\"\n                \n                Your words have clearly made an impact on the land-walkers, as they start arguing amongst themselves almost instantly.\n                *goto merfolkreturned\n            *if (treasure = \"tome\") #Scare the land-walkers into releasing their captives making use of one of their many ocean-related legends.\n                *label giantoctopus\n                According to your newly acquired tome the land-walkers are absolutely terrified of large sea creatures, and you just happen to know where to find one.\n                You quickly discus your idea with your troops, and though the warriors in particular don't seem too happy about it they reluctantly agree. Now you just need to think of a way to lure out your intended target.\n                \n                Knowing just how easily he gets agitated you swim up to the cave where your target likes to spend the daylight hours in and use a torch and mirror to focus the light on his sensitive eyes.\n                The now seriously angry giant octopus, 'cause that's what he is, lashes out at you, but you easily evade the grasping tentacles.\n                Blinded by rage the giant octopus follows you, even as you rise to the surface, popping up right next to the land-walkers' vessel.\n                Their screams distract the octopus, causing him to redirect his anger to them as he wraps his ginormous tentacles around the vessel's hull.\n                You doubt the octopus'd be able to sink it, but the land-walkers should be too terrified to realize that.\n                *page_break\n                Amplified by a simple magical enhancement your voice sounds over the waves, calmly stating your demands.\n                \n                \"Land-walkers. Return our kin to us right this instance, or prepare to perish.\"\n                \n                Your words have clearly made an impact on the land-walkers, as they temporarily forget about the giant octopus and start arguing amongst themselves.\n                It's a heated argument, and two opposing factions seem to form, one much larger than the other. Being severely outnumbered the smaller faction doesn't stand a chance, and before long their most vocal member is flung over board and snatched out of the air by the octopus, who then quickly retreats to the bottom of the ocean with his rare treat.\n                At least someone got something out of this whole situation.\n                *page_break\n                Despite having been rid of the giant octopus for now the land-walkers are still shaking in their boots, and quickly throw your fellow merfolk overboard, where the spell-casters intercept them and treat their injuries if necessary.\n                They turn out to be in a better shape than you'd expected, though they are pretty shaken.\n                *goto catchupwithnereid\n            *if (treasure = \"trident\") #Intimidate the land-walkers into releasing their captives by, well, intimidating them, with a little bit of help from your badass-looking new trident.\n                Brandishing your trident you and your warriors raise from the waves, surrounding the ship. You can tell the land-walkers are getting nervous, and this is only the beginning.\n                Watching the lightning flash all around you, you slowly raise your trident.\n                \n                As awesome as it might look, that is not the reason of its status as a legendary weapon. Before it was awarded to warrior prince Ariel it was imbued with magic, allowing the wielder to redirect lightning at will.\n                In a storm like this there is no shortage of that.\n                *page_break\n                Fixing your eyes on the largest of the vessel's three masts you wait for the next bolt of lightning, willing it towards your target.\n                As it is hit the mast snaps in two, catching fire despite the torrential downpour. That ought to motivate the land-walkers to do as you say.\n                *goto demands\n            #Strike a deal with the land-walkers, promising to let them go free if they hand over their captives.\n                You reckon the storm itself should be plenty to get the land-walkers' attention, so you don't really need to do anything more than that.\n                \n                Swimming up to the surface you get the spell-casters to illuminate the water behind you so you stand out, and address the land-walkers.\n                \n                \"Return our brothers and sisters to us, and we'll let you leave unharmed.\"\n                \n                Despite the effort it takes them to keep their vessel together you hear the land-walkers sneer at your words, and with a loud bang something small soars past your cheek, landing in the water with a soft splash.\n                They should have accepted what you offered them when they had the chance.\n                *page_break\n                With an angry glare at the land-walker who fired the shot you sink beneath the waves. Despite your somewhat peaceful intentions it seems you have no choice but to obliterate them after all.\n                \n                The spell-casters already know what you want them to do before you even voice it, and they whip up a few massive waves that crash down on the land-walkers' vessel until it has to admit its defeat, breaks in two and sinks.\n                Some of the land-walkers who are sucked down along with it helplessly flail with their limbs for a short few moments, and then go limp forever. They can't last for long outside of their waterless domain.\n                \n                Much to your relief sinking the vessel also freed the captured merfolk, and though they are a bit in a daze at least their bodies aren't all that severely damaged.\n                *goto catchupwithnereid\n            #Free your captured brethren using force.\n                *label useforce\n                Your patience with the land-walkers is long gone, and you decide to go in and free your fellow merfolk straight away.\n                At a gesture of your hand the spell-casters take positions, and you and the warriors ready your weapons. You have to make it quick, or else Nereïd and the others will be in danger.\n                \n                Propelled from the depths by a massive wave you and your troops splash down on the deck, skewering every land-walker in sight. Nereïd and the others aren't here. They must be deeper inside the vessel.\n                Surrounded by a blob of water held together by your spell-casters you break through a wooden hatch and slither into the belly of the beast. Now, where could they be?\n                \n                A few land-walkers try to stop you while you make your way down, but they're no match for you in these close quarters. The only thing you need to do to get rid of them is to drag them into your bubble of water and keep them there until they stop moving, after all.\n                *page_break\n                Dropping yet another newly deceased land-walker on the floor you break through a large wooden door somewhere near the heart of the vessel, the farthest away from water you've ever been. If you had to keep your people captive somewhere it'd be here.\n                Throwing open the door the first thing you notice are the battered and bruised bodies of your fellow merfolk, sprawled out in shallow tubs of water.\n                You rush over to them and check their pulses. They're still alive...\n                \n                As you hoist a barely responsive Nereïd from her shallow cell of sorts some of the other warriors come flooding in and help the other merfolk into the relative safety of the bubbles of water surrounding you.\n                Now that you've got what you came from you can go.\n                \n                Leaving the now lifeless vessel to float upon the waters, all land-walkers on board killed in the fray, you return to the depths you came from and turn your attention to your newly-freed brethren.\n                Though they are not in great shape the spell-casters assure you that they'll live.\n                *goto catchupwithnereid\n    #Order the spell-casters to summon up the northern wind and freeze the vessel in place.\n        *set genre_savvy %-10\n        The spell-casters are quick to follow your orders, as unusual as they might be, and within minutes the bottom of the land-walkers' vessel is trapped in a column of ice reaching down all the way to the ocean floor.\n        It isn't going anywhere now.\n        \n        The ice's got another effect as well, as you can clearly hear, even from down here. The pressure of the ice on the vessel's hull makes it creak loudly, and the land-walkers gasp in terror.\n        They wouldn't last long out here without their vessel.\n        \n        You could of course just wait for their vessel to break into pieces, but that might be dangerous to the captured merfolk, if they are even still alive.\n        You'd rather act quickly and be done with it.\n        *choice\n            *if (treasure = \"paint\") #Intimidate the land-walkers into releasing their captives with a bit of help of your special paint.\n                The look of the luminescent paint combined with the shards of ice the spell-casters summoned up behind you for an additional intimidating visual effect grant you and your warriors an almost ethereal appearance, and the land-walkers, or at least the few of them still standing upright, quake in their boots.\n                *goto demands\n            *if (treasure = \"tome\") #Scare the land-walkers into releasing their captives by re-enacting one of their ocean-related myths.\n                *goto giantoctopus\n            *if (treasure = \"trident\") #Intimidate the land-walkers into releasing their captives by, well, intimidatin
