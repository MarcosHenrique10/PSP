y to read; ${Grandma} wakes up so late that ${yan_he} nearly misses breakfast every day. This means that ${Grandma} goes to sleep late, too, which made it a little awkward yesterday when you came back after midnight from hunting down a demon. \n\nYou're going to have to work hard to make sure that your roommates don't find out about your demon-hunting. The Wang family needs to operate in secret - that's what your relatives have told you ever since you were old enough to know about your family's mission. Your relatives are the only people with whom you can be fully open.\n\nHow do you feel about that? Do you wish you could tell your roommates that you're a demon hunter?\n\n*choice\n\t#Yes. Having secrets from my friends makes me feel that there's something separating us.\n\t\t*set interdependence %+10\n\t\tYou like to feel that you have strong connections to your friends, and keeping a secret as big as this one means that you'll never be able to fully connect. Still, you have your obligation to your family, and that has to take precedence. You need to follow all of your family's traditions: the safety and harmony of the entire world depend on it.\n\t\t*page_break\n\t\t*goto chemistry\n\t#No. I'm worried that if I told them, they might think that I was bragging.\n\t\t*set modest %+10\n\t\tYou're right to feel that way. Being a demon hunter is a very special thing, and your roommates could never possibly live up to it. It's just as well that your family tradition forbids you from talking about it. You need to follow all of your family's traditions: the safety and harmony of the entire world depend on it.\n\t\t*page_break\n\t\t*goto chemistry\n\t#No. My duty to my family is more important than anything else, and I need to follow our traditions. \n\t\t*set filial %+10\n\t\tYou're right! You need to follow all of your family's traditions: the safety and harmony of the entire world depend on it.\n\t\t*page_break\n\t\t*goto chemistry\n\n*label chemistry\nYour chemistry courses are pretty difficult, especially the lab, but there are a few things that make you look forward to lab days. First, both ${Grandma} and Little One are in the class with you. Second, Firecracker is the TA - although of course you call her Wang Mei in front of other people. And, most importantly, Shen Yi is in that class.\n\nShen Yi is easily the cutest ${yi_gender} you've ever met, and one of the smartest, too. The few times you've talked to ${yi_him} - only about what you're working on in the lab, of course! - you've gotten along really well.\n\nWhat is it that you like best about Shen Yi? Besides the fact that ${yi_he} is cute and fun to talk to, of course.\n\n*choice\n\t#Shen Yi and I are from very similar backgrounds: ${yi_his} hometown is near mine, and our fathers have the same occupation. It makes me feel like we have a lot in common.\n\t\t*set filial %+10\n\t\t*set holistic %+10\n\t\t*goto club\n\t#Shen Yi has ambitious career plans. I really admire that, and I know that my family would appreciate it too.\n\t\t*set filial %+15\n\t\t*set classrank %-10\n\t\t*goto club\n\t#Shen Yi has a good reputation: everyone seems to like ${yi_him}.\n\t\t*set interdependence %+10\n\t\t*set harmony %+10\n\t\t*goto club\n\n*label club\n\n${Grandma} is in the photography club with Shen Yi's roommate, and after a few weeks of roundabout conversation, ${yan_he} has become pretty sure that Shen Yi would like to spend more time with you, too. You've started looking forward to every general chemistry lab, hoping that you'll have a chance to talk to Shen Yi, and maybe even figure out a way to talk to ${yi_him} outside of class, too.\n\n*page_break\n\nThat's what's running through your mind as you go off to your daily practice session. Sometimes you work on meditation with Eldest Uncle; sometimes Second Aunt teaches you the history of the Wang family. Today  you're working on combat with Firecracker. \n\nThe combat room is in the basement of the chemistry building in a room that only family members have the key to. Firecracker is already there when you arrive, and she's got the eager grin that she always gets when she's fighting, or thinking about fighting. \"Good to see you, ${Nickname},\" she says, and tosses you a wooden sword. \"Catch!\" \n\nWhen you're actually fighting demons you're bare-handed, of course, but the discipline and motions of swordfighting are good training for your muscles and reflexes. \n\n*page_break\n\nFirecracker leads you through her usual tough workout: she's a good fighter, and a demanding teacher. Most days you can keep up, but today you're struggling - Firecracker's sword keeps sneaking in around your defenses to hit you.\n\n*label bigpicture\n\"You're focusing too much on what's right in front of you,\" says Firecracker. \"You need to remember to look at the big picture.\"\n\n\"You sound like Eldest Uncle,\" you point out.\n\nFirecracker ducks her head, but she's smiling, too - clearly she's taken that as a compliment. \"Well, he taught me everything I know,\" she replies. \"And there's a reason he always says things like that, right? Why does he always say that we need to look at the big picture?\"\n\n*choice\n\t#\"Because our lives depend on it. We're almost never fighting only one demon at a time. If we don't look at the bigger picture of the battlefield, we might get hit from behind.\"\n\t\t*set interdependence %-10\n\t\t*set holistic %-20\n\t\t*set cousinmood \"unhappy\"\n\t\t\"Not exactly,\" Firecracker says, frowning a little. \"It's true that we're often fighting more than one demon, but we're also always fighting together, so we can watch each other's backs. It sounds like you need to work harder at remembering that, too.\"\n\n\t\tYou look down, ashamed.\n\n\t\t\"The reason he says it,\" Firecracker continues, \"is that there's always more to a situation than we can see at any one time. We need to consider all of the angles.\"\n\n\t\t*goto onemorething\n\t#\"Because that's the way we need to look at the world. We always have to think about the wider context of any situation that we're in.\"\n\t\t*set holistic %+20\n\t\t*set interdependence +10\n\t\t*set cousinmood \"happy\"\n\t\tFirecracker grins. \"I guess you have been listening to him after all. Yes, that's right. There's always more to a situation than we can see at any one time. We need to consider all of the angles.\"\n\n\t\t\"No person is all good or all evil,\" you recite, remembering what Eldest Uncle has told you countless times. \"It all depends on the situation.\"\n\n\t\t\"Exactly,\" says Firecracker. She steps back, finally dropping out of her fighting stance. \"All right - we're done for today. We need to get to lab.\"\n\t\t*goto onemorething\n\n*label onemorething\n\nYou start to gather up your belongings, tired from the exercise but satisfied with the work you've done.\n\n\"One more thing,\" Firecracker adds. \"Since we've been talking about focus, \n*if cousinmood = \"happy\"\n\tyou've seemed a bit distracted in lab lately. I can tell that you like Shen Yi,\" she adds with a little grin, \"but you're letting your attention wander.\" \n\t*goto response\n\n*else\n\tI have to say: you'd better keep yourself focused on the lab today instead of staring at that ${yi_gender} the way you always do. What do you think you're doing?\"\n\t*goto response\n\n*label response\n\nWhat do you say in response?\n\n*choice\n\t#\"Yes, I guess I have been watching Shen Yi. I really like ${yi_him}!\"\n\t\t*set indirect %-20\n\t\t*set harmony %-20\n\t\tFirecracker rolls her eyes. \"Yes, that's obvious. And that's the problem - that it's obvious! Your behavior in this class reflects on me, too.\"\n\t\t*goto understand\n\t#\"Don't worry; I'm not trying to copy from ${yi_his} paper.\"\n\t\t*set interdependence %-10\n\t\t*set indirect %+10\n\t\t*set classrank %-10\n\t\tFirecracker sniffs. \"It isn't about copying; it's about respect for our family! Your behavior in this class reflects on me, too.\"\n\t\t*goto understand\n\t#\"I'm sorry. I won't let myself get distracted.\"\n\t\t*set filial %+10\n\t\t*set harmony %+10\n\t\tFirecracker gives you a hard look. \"That's right. You'd better not. Your behavior in this class reflects on me, too.\"\n\t\t*goto understand\n\n*label understand\n\n*set apprenticeship +10\n\"I understand,\" you say.\n\n\"Good,\" says Firecracker firmly. \"You're responsible for the reputation of the entire Wang family. We all are. If you do something that makes you look bad, it makes us all look bad.\"\n\nTogether, you climb the stairs and make your way over to the other wing of the chemistry building, where the lab rooms are. While Firecracker starts to set up her books at the TA's table at the front of the room, you take your seat and wait. \n\nA few minutes later, Shen Yi and ${yi_his} roommates come in. Unfortunately, ${yi_he} doesn't sit next to you. But at least ${yi_he}'s at the next table so that you can watch ${yi_him}, and maybe even talk to him a little while you're doing the lab.\n\n${Grandma} and Little One arrive soon after, and sit down next to you. ${Grandma} shoots a significant look over at Shen Yi, and gives you a knowing grin. Little One ducks ${hua_his} head sheepishly, but ${hua_he}'s smiling too.\n\nYou watch the light shining on Shen Yi...\n*page_break\n\nOh, wait, ${Grandma}'s talking.\n\n\"...the second reaction shouldn't be too hard to figure out, right?\" ${yan_he} asks. \"Little One, do you think I've got this right?\" Then ${Grandma} realizes that you've missed the first part of what ${yan_he} was saying, and ${yan_his} grin gets even more knowing.\n\n${Grandma} leans forward, speaking in a voice so low that only you and Little One can hear. \"So. You like Shen Yi. Shen Yi likes you - ${yi_his} roommate said so, and ${yi_he}'s been watching you since the beginning of class. What are you going to do about it?\"\n\nThat's a very good question. You want to do something, but you can't just ask Shen Yi directly. Not in class, not with Firecracker staring down at you from the TA's table - and especially not after Firecracker just told you that you had to behave respectably in class, or the whole family would look bad.\n\nWhat do you say to ${Grandma}?\n\n*choice\n\t#\"Could you ask some questions for me? Maybe you could ask his roommates whether they've got plans for tomorrow evening?\"\n\t\t*set indirect %+20\n\t\t*set interdependence %+20\n\t\t${Grandma}'s grin curls up even higher with anticipation. \"All right. Let's go sit near them and start a conversation. We [i]have[/i] to move over near them - there's better light over by the window, after all,\" ${yan_he} adds in mock innocence.\n\n\t\tYou're pretty sure that Shen Yi perks up when you approach.\n\n\t\t\"Hi, Sun Yan,\" one of the roommates says to ${Grandma}. \"Hi, Wang Su.\" \n\n\t\t\"Hi,\" Shen Yi adds, a little more shyly.\n\n\t\t\"You know,\" ${Grandma} begins, \"there's a new movie at the campus cinema.\"\n\n\t\t\"That's right!\" you agree, trying to sound casual even though your heart is pounding. \"I'd really like to see it.\"\n\n\t\t${Grandma} picks up ${yan_his} part of the conversation without missing a beat. \"We'll all be done with this lab report by tomorrow,\" ${yan_he} says casually, then turns to Shen Yi and the other ${yi_gender}s at the table. \"Would you like to join us?\"\n\n\t\tShen Yi's roommate glances at ${yi_him} and then back at you and ${Grandma}. \"Sure,\" ${yi_he} says. \"That sounds good.\"\n\n\t\tShen Yi nods. \"I'd really like it if we could all go,\" ${yi_he} says, looking at you.\n\n\t\tYou smile back. \"Let's all meet after dinner, then, and we can walk over together.\"\n\t\t*goto movies\n\n\t#\"I'll go sit near Shen Yi and ${yi_his} roommates, start talking to them, and drop some hints about all of us doing something together tomorrow evening.\"\n\t\t*set indirect %+10\n\t\t*set interdependence %-10\n\n\t\t\"Good luck,\" Little One whispers, as you gather up your belongings.\n\n\t\tThe ${yi_gender}s greet you with smiles as you sit down next to them, and you hope that you're not just imagining that Shen Yi's smile is the biggest.\n\n\t\tYou all work for a few minutes, trading casual small talk about the lab, until finally you see your opening. \"So, my roommates noticed that there's a new movie playing at the campus cinema,\" you say, trying to sound casual even though your heart is pounding. \"Have any of you seen it yet?\" You hope that Shen Yi understands that you're asking if ${yi_he} and ${yi_his} roommates want to go with you.\n\n\t\tYou're both relieved and happy when Shen Yi answers. \"No, we haven't seen it,\" ${yi_he} says, \"but we'd really like to.\"\n\n\t\t\"We'll all be done with the lab report by tomorrow evening,\" you continue. \n\n\t\tShen Yi nods. \"So will we. We should be free to go to the movies then.\"\n\t\t*goto movies\n\n\t#\"I'll ask Shen Yi for help with the lab report. Then we can spend time together, and maybe we'll get a chance to talk about other things.\"\n\t\t*set indirect %+20\n\t\t*set interdependence %-10\n\t\t*set classrank %-15\n\t\tLittle One nods. \"That sounds safe,\" ${hua_he} says. \"And you'll be able to spend more time working, too!\" Thinking about academics always makes Little One happy.\n\n\t\t${Grandma} nods too. \"That's always a good way to spend time with someone.\" $!{yan_he} flashes you another grin. \"Good luck!\"\n\n\t\tYou gather your books and your courage and head over to the table by the window. \"Hi, Shen Yi,\" you begin.\n\t\t*page_break\n\n\t\tShen Yi looks up with a smile. \"Oh, hi, Wang Su.\" $!{Yi_he} looks briefly away - is ${yi_he} nervous too? - and then back up to you. \"How is the lab report going?\"\n\n\t\t\"Actually,\" you say, heart pounding, \"I was wondering if you could help me with it. There are a few things that I'm not certain about.\" \n\n\t\tYou're both relieved and happy when Shen Yi says, \"Oh, of course! I'd be happy to. Tonight after dinner, let's meet in the library.\"\n\n\t\tYou're pretty sure you're smiling much more than a chemistry lab report deserves. \"That's perfect! Thank you!\"\n\n\t\tShen Yi is grinning too. \"You're welcome! Thank you! Um. I mean. I'll see you tonight.\"\n\n\t\tYou meet up at the library, just as you've planned, and you actually do get a lot of work done on the lab report. But you also get to spend a whole evening with Shen Yi, and it's great.\n\t\t*goto_scene 5-domestictranquility-old\n\n*label movies\n\nThe next evening after dinner, you and your roommates and Shen Yi and ${yi_his} roommates all go to the movies together. \n\nThis is how people get to know each other at your school: only when a relationship is getting very serious are there actual one-on-one dates, and nobody wants to take too much time away from their studying. But a group outing to the movies gives everyone time to talk to each other - and if two of the group happen to be more interested in each other than the rest, well, they can manage to sit next to each other.\n\nWhich is what you and Shen Yi do, and you have a very very nice evening.\n\n*goto_scene 5-domestictranquility-old\n", "4-makingadate": "*temp cousinmood \"default\"\n*temp likeshenyi true\n*temp opp_gender\n*temp opp_he\n*temp die_roll\n*if yan_gender = \"girl\"\n\t*set opp_gender \"boy\"\n\t*set opp_he \"he\"\n\t*goto scenestart\n*else\n\t*set opp_gender \"girl\"\n\t*set opp_he \"she\"\n\t*goto scenestart\n\n\n*label scenestart\n[b]Chapter 4: Work and Play[/b]\n\nBy the middle of October, you feel as if you're really getting the hang of university, and growing closer to your roommates, too. \n\n${Grandma} has a great sense of humor, and ${yan_he}'s so social that it's always easy to talk to ${yan_him} - you feel as if you've known ${yan_him} for years instead of weeks. It turns out that ${yan_he} is studying to be a doctor, which means that ${yan_he}'s in the same general chemistry class as you and Little One, so you all get to spend a lot of time together.\n\nLittle One is shyer, of course, especially in large groups, but ${hua_he} is truly kind, and surprisingly funny once you've drawn ${hua_him} out of ${hua_his} shell. And, as you'd suspected, ${hua_he} is enormously intelligent, too.\n\n*page_break\n\nBut as close as you're becoming to your roommates, you still have to hold some things back from them. The Wang family needs to operate in secret - that's what your relatives have told you ever since you were old enough to know about your family's mission. Your relatives are the only people with whom you can be fully open. But you can't lie, because lying upsets your inner balance. \"Lies belong to demons,\" Eldest Uncle always says. \"We cannot become like them. Tact, politeness, helping each other save face - that can all be done without telling lies.\"\n\nSo when you come back late from patrol with Firecracker and Cousin Lin, or when you wake up early to do your meditation exercises, you have to find some way to explain without lying. How do you deal with it?\n\n*choice\n\t#I just lie. It makes me less balanced, but it's the easiest way to keep my secrets.\n\t\t*set balance %-15\n\t\t*set rel_hua %+10\n\t\t*set rel_yan %+10\n\t\tThe more you lie, the easier it gets.\n\n\t\t\"I was at the library,\" you tell ${Grandma}. \"You didn't see me? That's odd, because I saw you.\"\n\n\t\t\"I'm sorry that I couldn't join you for dinner,\" you tell Little One. \"I was working on a problem set and I lost track of time.\"\n\n\t\tYour roommates accept everything you say, and after a few weeks, they've gotten used to the idea that wherever they go, you've always just missed them. \n\n\t\tOne night when you come home, your roommates are actually still awake, and ${Grandma} gasps. \"It's the ghost!\" ${yan_he} cries, pointing melodramatically at you. \"The ghost has appeared!\"\n\n\t\tLittle One laughs, and from then on, both of your roommates call you Ghost. \n\n\t\tEldest Uncle was right about the lies: every time you lie, it gets harder to concentrate on your meditation exercises. Still, it feels good to have a nickname, and even better to know that you've kept your secrets and your friendships safe. \n\t\t*set roommatenick \"Ghost\"\n\t\t*achieve nickname\n\t\t*goto partytime\n\t#I can't bring myself to lie. I'll tell as much of the truth as I can and maintain my balance, even if it means risking exposure.\n\t\t*set balance %+15\n\t\t\"I have family obligations,\" you say. \"They really count on me to help them.\" Every word of it is true, but the phrasing makes your roommates look at you oddly.\n\n\t\tFinally, Little One speaks. \"Of course.\" $!{hua_his} eyes have grown wide and impressed behind ${hua_his} glasses. \"You should obey your uncle.\"\n\n\t\t\"Right. Dean Wang.\" There's something a little sarcastic about the way ${Grandma} says Eldest Uncle's title, but it isn't actually disrespectful enough to be offensive. It's brief, too - it vanishes almost at once into one of ${Grandma}'s bright grins as ${yan_he} suggests, \"That must make you the Assistant Dean, since you're helping him all the time.\"\n\n\t\tThe nickname sticks: from then on, your roommates call you Assistant Dean. It feels good to have a nickname, and it gives you a sense of inner calm and balance to know that you've told as much of the truth as you safely can. Your meditation exercises that evening go much more smoothly than they have in days.\n\n\t\tBut when you're not focusing on the balance of the universe, you can't help feeling a little uneasy. Did you tell your roommates too much?\n\n\t\t*set roommatenick \"Assistant Dean\"\n\t\t*achieve nickname\n\t\t*set secretcounter +1\n\t\t*goto partytime\n\t#I tell them that I'm working on a project for Eldest Uncle. It's not exactly true, but it's close.\n\t\t*set filial %+15\n\t\tThe mention of Dean Wang's name makes both of your roommates fall silent immediately. \"Of course,\" Little One says, ${hua_his} eyes wide and impressed behind ${hua_his} glasses. \"You should obey your uncle.\"\n\n\t\t\"Of course. Dean Wang.\" There's something a little sarcastic about the way ${Grandma} says Eldest Uncle's title, but it isn't actually disrespectful enough to be offensive. It's brief, too - it vanishes almost at once into one of ${Grandma}'s bright grins as ${yan_he} suggests, \"That must make you the Assistant Dean, since you're helping him all the time.\"\n\n\t\tThe nickname sticks: from then on, your roommates call you Assistant Dean. It feels good to have a nickname, and even better to know that you've kept your secrets and your friendships safe.\n\t\t*set roommatenick \"Assistant Dean\"\n\t\t*achieve nickname\n\t\t*goto partytime\n\t#I deflect the questions by saying something indirect.\n\t\t*set indirect %+15\n\t\t\"You're home late again!\" Little One whispers anxiously as you walk in the door after midnight for the second night in a row. \"Are you all right?\"\n\n\t\t\"This week's problem set for Professor Chen's class is really hard,\" you sigh.\n\n\t\tLittle One interprets that just as you'd hoped ${hua_he} would: ${hua_he} thinks that you were saying that you've been out working on the problem set. \"Maybe we can work together on it tomorrow,\" ${hua_he} suggests - an indirect offer of help to match your indirect implication that you're struggling.\n\n\t\tYou don't have any family duties tomorrow night, so you nod. \"All right.\"\n\n\t\t\"You've spent a lot of time working on that problem set!\" ${Grandma} remarks, with genuine admiration in ${yan_his} voice. \"You weren't born in the Year of the Ox, were you? You've got an ox's persistence.\"\n\n\t\tFrom then on, your roommates call you Ox, because they think you're hardworking and persistent. It feels good to have a nickname, and even better to know that you've kept your secrets and your friendships safe.\n\t\t*achieve nickname\n\t\t*set roommatenick \"Ox\"\n\t\t*goto partytime\n\n*label partytime\n*page_break\nOne night about two weeks later, you're studying in your room with Little One, wrestling your way through another one of Professor Chen's infamously difficult problem sets. Even Little One is having trouble this time, and you're growing more bored and frustrated with every passing minute. You know that you need to finish it before class tomorrow, but you really wish you could be doing something else.\n\nJust when you feel like you can't take it any more, the door opens with a burst of laughter. ${Grandma} and three other people spill into the room, all laughing and chattering. You recognize one of the ${opp_gender}s as someone who's been hanging around ${Grandma} a lot - you think that ${opp_he} likes ${Grandma}, but is too shy to ask ${yan_him} for a date.\n\nSpeaking of which, do you feel about dating ${opp_gender}s?\n\n*choice\n\t#I like ${opp_gender}s a lot, and I'd date one if I got the chance.\n\t\t*if yan_gender = \"boy\"\n\t\t\t*set yi_gender \"girl\"\n\t\t\t*set yi_he \"she\"\n\t\t\t*set yi_him \"her\"\n\t\t\t*set yi_his \"her\"\n\t\t\t*goto partytime2\n\t\t*else\n\t\t\t*set yi_gender \"boy\"\n\t\t\t*set yi_he \"he\"\n\t\t\t*set yi_him \"him\"\n\t\t\t*set yi_his \"his\"\n\t\t\t*goto partytime2\n\t#I'd only want to date a ${yan_gender}.\n\t\t*if yan_gender = \"boy\"\n\t\t\t*set yi_gender \"boy\"\n\t\t\t*set yi_he \"he\"\n\t\t\t*set yi_him \"him\"\n\t\t\t*set yi_his \"his\"\n\t\t\t*goto partytime2\n\t\t*else\n\t\t\t*set yi_gender \"girl\"\n\t\t\t*set yi_he \"she\"\n\t\t\t*set yi_him \"her\"\n\t\t\t*set yi_his \"her\"\n\t\t\t*goto partytime2\n\n\t#I like both ${yan_gender}s and ${opp_gender}s.\n\t\t*label randomgender\n\t\t*rand die_roll 1 2\n\t\t*if die_roll = 1\n\t\t\t*set yi_gender \"girl\"\n\t\t\t*set yi_he \"she\"\n\t\t\t*set yi_him \"her\"\n\t\t\t*set yi_his \"her\"\n\t\t\t*goto partytime2\n\t\t*else\n\t\t\t*set yi_gender \"boy\"\n\t\t\t*set yi_he \"he\"\n\t\t\t*set yi_him \"him\"\n\t\t\t*set yi_his \"his\"\n\t\t\t*goto partytime2\n\t#I'm not really interested in dating anyone.\n\t\t*set likeshenyi false\n\t\t*goto randomgender\n\n\n*label partytime2\n\"Little One!\" ${Grandma} calls. \"${Roommatenick}! Meet my friends from my advanced biology class! We've brought dumplings from that new shop on Qinshang Road.\"\n\nFood! Friends! Perfect!\n\n…except for Little One whispering anxiously, \"We really need to finish the problem set!\"\n\n$!{Hua_he}'s right. So what will you do?\n\nYou and Little One could go to the library to work, but that might offend ${Grandma} since you'd be walking out on ${yan_his} party. Or, you could stay in the room and try to study while the party's going on. Or, you could tell ${Grandma} to go somewhere else - you and Little One were here first, after all - but that's certain to make ${yan_him} upset. Or, you could just join the party, and try to finish the problem set another time.\n\n*choice\n\t#Forget the problem set. I'll party!\n\t\t*set classrank %+10\n\t\t*set rel_yan %+10\n\t\t\"Dumplings? Great!\" You get up from your chair, holding it out to offer the seat to one of your guests. \n\n\t\tOne of the other ${yan_gender}s takes the seat with a smile. \"Thanks. You were right, Sun Yan - your roommates are nice.\"\n\n\t\t${Grandma} grins back. \"I told you that Wang Su was a good friend,\" ${yan_he} declares.\n\n\t\tBehind you, you can hear Little One mumbling about chemistry and Professor Chen, but you're already feeling the weight lifting from your shoulders. You spend a very happy evening eating dumplings, listening to music, and meeting ${Grandma}'s new friends. Having a roommate who's as social as ${Grandma} means that there's always something fun going on. \n\n\t\tOn the other hand, you never finish the problem set, and the next day, you have to deal with Professor Chen's glare and Eldest Uncle's reprimands. But you had a great time with your new friends.\n\t\t*goto chemistry\n\n\t#I'll tell ${Grandma} to take ${yan_his} friends somewhere else. \n\t\t*set indirect %-10\n\t\t*set classrank %-10\n\t\t*set rel_yan %-20\n\t\t*set rel_hua %+20\n\t\t\"Excuse me,\" you say, standing up from your desk. \"We were working. We've got a problem set due tomorrow, and we need to finish. You can take your party somewhere else.\"\n\n\t\tThere is dead silence. ${Grandma} and ${yan_his} friends stare at you, completely shocked at your bluntness. Finally, ${Grandma} says. \"Oh. All right. I guess we'll go, then.\" They turn and leave, and ${Grandma} slams the door shut behind them.\n\n\t\t\"That was very brave,\" Little One whispers, deeply impressed.\n\n\t\t${Grandma} isn't as impressed, of course. For the next few days, ${yan_he} glares at you, and makes snide remarks about how terrible it is that [i]some people[/i] are rude to other people's friends. \n\n\t\tBut with the room all to yourself, you and Little One manage to help each other through the problem set. You both get a decent grade on it, and Little One looks up to you even more than ${hua_he} did before.\n\t\t*goto chemistry\n\t#I won't say anything, and I'll try to study while the party's going on.\n\t\t*set classrank %+10\n\t\t*set indirect %+10\n\t\t*set rel_yan %+10\n\t\tYou're tempted to just give up and spend the rest of the night being social, but you know that you have to finish this problem set. So you just smile at ${Grandma}'s friends, say a polite \"Nice to meet you,\" and keep on working.\n\n\t\tOr, at least, you try to.\n\n\t\tThe smell of dumplings makes you hungry; the sound of happy conversation makes it hard to concentrate. Even when you put on headphones and try to listen to music, peals of laughter break through.\n\n\t\tIt's very late by the time ${Grandma}'s friends go home, and even later when you manage to finish the problem set. You know it isn't your best work, and the grade you get confirms it.\n\t\t*goto talklater\n\t#I'll take Little One to the library so that we can work there.\n\t\t*set rel_yan %-10\n\t\t*set rel_hua %+10\n\t\t*set classrank %-15\n\t\tYou and Little One exchange glances. You both know that you'll never get any work done with all of these people in your room.\n\n\t\t\"It's nice to meet you,\" you say, giving ${Grandma}'s friends a polite smile. \"But we were just on our way to the library. Enjoy the dumplings.\" \n\n\t\t${Grandma} looks a little hurt at your quick exit, but it doesn't last for long - ${yan_he}'s got friends and food to distract ${yan_him}. Meanwhile, you and Little One escape to the quiet of the library, where you find several other people from Professor Chen's class already there. Together, you all help each other through the problem set, and you all do well on it.\n\t\t*goto talklater\n\n*label talklater\n*page_break\nNow that it's all over, do you want to say anything to ${Grandma} about what happened?\n\n*choice\n\t#Yes. Little One was upset, and I want ${Grandma} to understand that we need to maintain harmony within our room.\n\t\t*if interdependence > 55\n\t\t\t*label talksuccess\n\t\t\t*set rel_yan %+10\n\t\t\t${Grandma} listens patiently, and you can see that you're getting through. \"I didn't realize you cared so much about that, ${roommatenick},\" ${yan_he} says seriously. \"I'm sorry.\"\n\n\t\t\tThe air feels a little clearer in your room after that. You've definitely gotten your friendship with ${Grandma} back on a more secure footing.\n\t\t\t*goto chemistry\n\t\t*else\n\t\t\t*label talkfailure\n\t\t\t*set rel_yan %-10\n\t\t\t${Grandma} listens patiently, but you can see the skeptical look in ${yan_his} eyes. It's matched by the skeptical tone in ${yan_his} voice when ${yan_he} says, \"I didn't realize you cared so much about that, ${Roommatenick}.\" It's pretty clear that ${Grandma} still doesn't think you care much about it - apparently, you haven't cared enough about it in the past for ${yan_him} to believe you. At least you tried.\n\t\t\t*goto chemistry\n\t#Yes. ${Grandma} was inconsiderate, and I want ${yan_him} to understand that ${yan_he} needs to be more tactful.\n\t\t*if indirect > 60\n\t\t\t*goto talksuccess\n\t\t*else\n\t\t\t*goto talkfailure\n\t#No, I don't think ${yan_he} did anything wrong.\n\t\t*set rel_yan %+10\n\t\t*set rel_hua %-10\n\t\t*set interdependence %-10\n\t\tRelations are a little tense in your room after that. ${Grandma} acts just as friendly towards you as ever, maybe even more so now that ${yan_he} knows that you're not upset that ${yan_he} brought a party home without checking first, but Little One unhappily avoids you both for a few days. Eventually everything settles down, though.\n\t\t*goto chemistry\n\n*label chemistry\n*page_break One Week Later\n\nYou're on your way to chemistry lab, feeling much better about things. As much as you dread Professor Chen's notoriously demanding problem sets, that's how much you look forward to Professor Li's lab. It isn't because it's easy. None of your chemistry classes are easy! It's mostly because a lot of your friends are in that class - including ${Grandma} and Little One - and because Firecracker is the TA. (You call her Wang Mei in front of other people, of course.)\n\nOne of those other friends, Shen Yi, wasn't in lab last week, which was surprising. $!{yi_he} is very conscientious: ${yi_he} never misses a class or a study session, and always gets ${yi_his} problem sets and lab reports done so early that ${yi_he} always has time to help other people with theirs. But ${yi_he}'s back now, and gives you a cheerful smile and a wave as soon as ${yi_he} spots you. \"Wang Su!\" ${yi_he} calls. \"How are you?\"\n\nWhat do you say in return?\n\n*choice\n\t#\"Are you all right?\" It's a little more direct than Shen Yi likes to be, but I'm worried about ${yi_him}.\n\t\t*set interdependence %+10\n\t\t*set indirect %-10\n\t\t*set rel_shen %+10\n\t\tShen Yi looks a little surprised at both your directness and your concern. \"I'm fine,\" ${yi_he} says with a smile. \"Thank you for noticing that I wasn't there. I was back home visiting my grandmother. She's been sick, and she really wanted to see me.\"\n\t\t*goto shengrandmatalk\n\t#\"It's really good to see you.\" It's honest. I like Shen Yi and I'm glad that ${yi_he}'s back.\n\t\t*set rel_shen %+15\n\t\t*set interdependence %+10\n\t\tShen Yi smiles, happily surprised at your enthusiastic greeting. \"Thank you. It's good to see you too. I missed everyone in the lab group last week, but I had to go home to visit my grandmother. She's been sick, and she really wanted to see me.\"\n\t\t*goto shengrandmatalk\n\t#\"Where were you last week?\" It's much more blunt than Shen Yi likes to be, but I don't want to waste time.\n\t\t*set indirect %-20\n\t\t*set rel_shen %-10\n\t\tShen Yi draws back a little, surprised at your bluntness. \"I was visiting my grandmother,\" ${yi_he} says a little defensively. \"She's been sick, and she really wanted to see me.\"\n\t\t*goto shengrandmatalk\n\t#\"I'm fine. Last week's lab was really interesting.\" It's an indirect way of asking Shen Yi where ${yi_he} was.\n\t\t*set indirect %+10\n\t\t*set rel_shen %+15\n\t\t\"I'm sorry I missed it,\" Shen Yi replies, just as you'd hoped. \"But I was back home, visiting my grandmother. She's been sick, and she really wanted to see me.\"\n\t\t*goto shengrandmatalk\n\n*label shengrandmatalk\n\n\"You took a week off to go visit your grandmother?\" you repeat, as you and Shen Yi walk together towards the lab. \"That's…\n\n*fake_choice\n\t#…very filial, and I admire that.\"\n\t\t*set filial %+10\n\t\tShen Yi gives you a bright smile. \"Thank you. It means a lot to hear you say that. I owe Grandmother a lot.\n\t#…risky. Aren't you worried about your grades?\"\n\t\t*set classrank %-15\n\t\tShen Yi winces at the directness of your challenge, and looks away. \"Well,\" ${yi_he} says thoughtfully, \"I owe it to my family to get good grades, but I also owe it to them to give them my time. Especially Grandmother.\n\t#…exactly what I'd do if my aunt or uncle got sick.\"\n\t\t*set filial %+10\n\t\tThere's a hint of admiration in Shen Yi's smile as ${yi_he} nods. \"I knew you'd understand. I owe Grandmother a lot.\nI hope she'll be proud of what I'm doing here. She'll never say it in front of other people, but I hope she thinks it, at least. My family wants me to be a chemical engineer, so I have to work harder at chemistry than anything else. It's probably the same for you, right?\" ${yi_he} adds with a sympathetic smile. \"I mean, with Dean Wang being your uncle?\" \n\nHow do you answer?\n\n*choice\n\t#\"Actually, I wanted to study sociology, but my uncle made me major in chemistry instead.\"\n\t\t*set filial %-10\n\t\t*set indirect %-20\n\t\tShen Yi blinks at your directness, a surprised frown crinkling ${yi_his} forehead. \"Well,\" ${yi_he} says slowly. \"It's...good that you're honoring your family, then.\" $!{yi_he} looks a little uncomfortable, though, and you worry that ${yi_he} thinks you were being disrespectful towards Eldest Uncle.\n\n\t\tYou glance away, trying to find some way to salvage this. \"Yes, I am honoring my family,\" you flounder. \"Like I said, I wanted to make my uncle happy.\" That isn't exactly what you said a minute ago, but maybe it will work. \n\n\t\tTo your relief, Shen Yi's frown eases. \"Right. Well, I'm sure he's proud of you. So what are you going to do after you graduate?\"\n\t\t*goto after\n\n\t#\"Yes, you're right - it's really important to my family for me to study chemistry.\"\n\t\t*set filial %+20\n\t\tShen Yi smiles. \"I thought so. So what are you going to do after you graduate?\"\n\t\t*goto after\n\n\t#\"Chemistry is really useful. It's important for much more than engineering.\"\n\t\t*set indirect %+20\n\t\t*set balance %+20\n\t\tShen Yi nods, smiling ${yi_his} agreement. \"Absolutely! So what are you going to do with it, if you're not going to be an engineer?\"\n\n\t\t*label after\n\t\tUm.\n\n\t\tYou absolutely positively cannot say 'I'm going to make potions so that we can catch demons more effectively.'\n\n\t\tRight?\n\n\t\t*choice\n\t\t\t#Right. I'll have to be vague, even if it makes me look unmotivated. \"Research, probably.\"\n\t\t\t\tIt's true, even if it's not the whole truth. \n\n\t\t\t\tShen Yi looks a little confused at your vague response, though - and a little disappointed, too, you think, although ${yi_he}'s too polite to say anything directly. Apparently $!{yi_he} was hoping that you were a bit more motivated. You are, of course! Just not about things that you can tell Shen Yi.\n\n\t\t\t\tHow can you save face? \"I'll need to talk to my uncle and my parents before I make any decisions.\"\n\n\t\t\t\tThankfully, Shen Yi smiles again, and says \"I understand.\"\n\n\t\t\t\t*page_break\n\t\t\t\t*goto class\n\t\t\t#Right. I'll have to bend the truth, even if lying endangers my balance. \"I want to be a professor like my uncle.\"\n\t\t\t\t*set balance %-10\n\t\t\t\t*set rel_shen %+10\n\t\t\t\tShen Yi is devoted to ${yi_his} family - ${yi_he} will definitely be willing to believe that you're equally devoted to yours, and it won't occur to ${yi_him} that you're lying.\n\n\t\t\t\tAnd sure enough, it works. Shen Yi nods, looking impressed. \"I'm sure he'll be proud of you if you do.\"\n\t\t\t\t*goto class\n\t\t\t#Right. But I can say something close to the truth, even if it endangers the family's secrecy. \"My family's doing some really unusual research. I'd like to do that, too.\"\n\t\t\t\t*set balance %+10\n\t\t\t\t*set secretcounter +1\n\t\t\t\t\"Unusual research?\" Shen Yi gives you a curious look. \"What do you mean?\"\n\n\t\t\t\t\"Um.\" Hastily, you backpedal into something more vague. \"You know. Really advanced compounds.\"\n\n\t\t\t\t\"Right,\" Shen Yi says, but ${yi_he} doesn't look convinced. $!{Yi_he} doesn't ask any more questions, but you're pretty sure ${yi_he} suspects that you're hiding something.\n\t\t\t\t*goto class\t\n\n*label class\n\nThat's when you arrive at the door to your lab, and have to say goodbye. Shen Yi gives you another smile as ${yi_he} heads off to ${yi_his} station and you head off to yours.\n\nWas it just your imagination, or was Shen Yi [i]really[/i] happy to see you, and really interested in what you had to say?\n\nNot that anyone really has time to date at university - everyone is too busy with classes. But that doesn't mean that people don't notice each other, or try to spend a little extra time with each other. So, what do you think about Shen Yi?\n\n*choice\n\t#I think ${yi_he}'s nice, but I just want to be friends.\n\t\t*set rel_shen %+10\n\t\t*set likeshenyi false\n\t\t*set classrank %-5\n\t\t$!{yi_he} is nice, isn't ${yi_he}? You've seen that ${yi_he}'s a good friend to ${yi_his} roommate Zhu Yang, so you think ${yi_he} would be a good friend to others too.\n\n\t\tYou look forward to Professor Li's chemistry labs even more now that you have the chance to become better friends with Shen Yi and Zhu Yang.\n\t\t*goto practice\n\t#I'd really like to get to know ${yi_him} better. I think ${yi_he}'s great.\n\t\t*set likeshenyi true\n\t\t*set rel_shen %+20\n\t\t$!{yi_he} is, isn't ${yi_he}? $!{yi_he}'s smart, a good friend to ${yi_his} roommate Zhu Yang, and obviously devoted to ${yi_his} family. You really hope that you made an equally good impression on ${yi_him}.\n\n\t\t*goto club2\n\t#I don't want to spend much time with ${yi_him} at all.\n\t\t*set likeshenyi false\n\t\t*set rel_shen %-20\n\t\t*set classrank %-10\n\t\tOh well. Some people just aren't meant to be anything more than friends. Or meant to be friends, either. You just hope that Shen Yi feels the same way - otherwise, it could get awkward.\n\t\t*goto club2\n\n*label club2\n*if (likeshenyi)\n\tFortunately, ${Grandma} is in the photography club with Shen Yi's roommate Zhu Yang. After a few roundabout conversations, ${Grandma} has gotten enough indications from Zhu Yang that Shen Yi would like to spend more time with you, too. You've started looking forward to every one of Professor Li's chemistry labs even more.\n\t*goto practice\n*else\n\t*goto practice\n\n*label practice\n*page_break One Week Later\nEvery day, you have some kind of practice session. Sometimes you work on meditation with Eldest Uncle; sometimes Second Aunt teaches you the history of the Wang family. Today you're working on combat with Firecracker. \n\n*if firstbest = \"weapons\"\n\tThis is one of your favorite parts of your training. You look forward to it every week.\n\t*goto combatroom\n\n*else\n\tYou always struggle with this part of your training, but you can't get out of it.\n\t*goto combatroom\n\n*label combatroom\n\nThe combat room is in the basement of the chemistry building in a room that only family members have the key to. Firecracker is already there when you arrive, and she's got the eager grin that she always gets when she's fighting, or thinking about fighting. \"Good to see you, ${Nickname},\" she says, and tosses you a wooden sword. \"Catch!\" \n\nYou catch.\n\nAnd then Firecracker lunges towards you, and your training begins.\n\nFirecracker leads you through her usual tough workout: she's a good fighter and a demanding teacher. \n\nHow hard are you working today?\n\n*choice\n\t#I'm working hard because I want to improve my weapons skill.\n\t\t*set weapons %+25\n\t\t*set cousinmood \"happy\"\n\t\tYour focus is sharp and your energy is high. Every bit of your being is channeled into your concentration on your sword. Every time Firecracker brings her sword down, yours is there to meet it in a clean precise block. Once or twice you even get through her defenses - something that you've almost never done before. \n\n\t\tBy the end of the session, you're both breathless and sweaty and grinning. You've had a great practice, and you know you've learned a lot.\n\n\t\t\"Good job,\" Firecracker says. \"Eldest Uncle is going to be very proud of how much progress you're making. I'll see you in class.\"\n\t\t*goto onemorething\n\n\t#I'm just going through the motions. I'm much more interested in magic.\n\t\t*set magic %+25\n\t\t*set cousinmood \"unhappy\"\n\t\tThis isn't your strength, and you know it. So why bother? Your mind is running through the meditation exercises that Eldest Uncle gave you yesterday, and not at all on the lesson that Firecracker is giving you today. Your sword is always a little late, your form always a little sloppy. \n\n\t\tBy the end of it, Firecracker's namesake temper is clearly starting to spark up. \"That's enough, ${Nickname}!\" she finally snaps. She drops her sword and steps back, glaring at you angrily. \"I know you don't like sword training much, but it doesn't matter what you like. This is part of your duty, and you should take it seriously! Hasn't anything Eldest Uncle says gotten through to you?\" She shakes her head. \"Just go. We're done.\"\n\t\t*goto onemorething\n\n\t#I really wish I were somewhere else. I'm not trying at all.\n\t\t*set weapons %-20\n\t\t*set cousinmood \"unhappy\"\n\t\tYour sword is always a little late, your form always a little sloppy. By the end of it, Firecracker's namesake temper is clearly starting to spark up. \"That's enough, ${Nickname}!\" she finally snaps. She drops her sword and steps back, glaring at you angrily. \"I know you don't like sword training much, but it doesn't matter what you like. This is part of your duty, and you should take it seriously! Hasn't anything Eldest Uncle says gotten through to you?\" She shakes her head. \"Just go. We're done.\"\n\t\t*goto onemorething\n\n\t*if (firstbest = \"magic\") #Weapons aren't my best skill, but I owe it to my family to work hard in my lessons.\n\t\t*set magic %+15\n\t\t*set filial %+15\n\t\t*set weapons %+5\n\t\t*set interdependence %+15\n\t\t*set cousinmood \"happy\"\n\n\t\tEverything you learn here, you'll use to support your family in their sacred duty, and you take that seriously.\n\n\t\tEven if your sword is always a little late, your form a little less than perfect, you're clearly trying. When Firecracker gets inside your guard or shows you a maneuver that you can't follow, you ask, \"Can we do that again?\" And she does do it again, and you work and work until you get it right - or at least, until you get better.\n\n\t\tIt's difficult and exhausting. You're never going to be as good with a sword as you are with magic. But at the end of the session, you're satisfied that you've made the best effort that you possibly can. \n\n\t\t\"Good job,\" Firecracker says. \"Eldest Uncle is going to be very proud of how hard you're working. I'll see you in class.\"\n\t\t*goto onemorething\n\n\t*if (firstbest = \"weapons\") #Weapons are my best skill, and I also owe it to my family to work hard in my lessons.\n\t\t*set weapons %+15\n\t\t*set filial %+15\n\t\t*set interdependence %+15\n\t\t*set cousinmood \"happy\"\n\t\tYou sail through your sword training with your usual dedication and focus, made even sharper by the knowledge that everything you learn here, you'll use to support your family in their sacred duty. Even though your sword talent means that probably could have learned everything instinctively, you make sure that Firecracker thoroughly explains how each move will work when you're using it in the field with the rest of your family. It goes a little more slowly, but you're positive that you understand everything fully.\n\n\t\t\"Good job,\" Firecracker says. \"Eldest Uncle is going to be very proud of how much progress you're making. I'll see you in class.\"\n\t\t*goto onemorething\n\n*label onemorething\n\n*if (likeshenyi)\n\n\tAs you're heading out of the room, Firecracker adds, \"One more thing. \n\t*if cousinmood = \"happy\"\n\t\tYou've seemed a bit distracted in lab lately. I can tell that you like Shen Yi,\" she adds with a little grin, \"but you're letting your attention wander.\" \n\t\t*goto response\n\t*else\n\t\tI have to say: you'd better keep yourself focused on the lab today instead of staring at that ${yi_gender} Shen Yi the way you always do. What do you think you're doing?\"\n\t\t*goto response\n*else\n\t*goto together\n\n*label response\nWhat do you say in response?\n\n*choice\n\t*if (likeshenyi) #\"Yes, I guess I have been watching Shen Yi. I really like ${yi_him}!\"\n\t\t*set indirect %-20\n\t\tFirecracker rolls her eyes. \"Yes, that's obvious. And that's the problem - that it's obvious! Your behavior in this class reflects on me, too.\"\n\t\t*goto understand\n\t#\"Don't worry; I'm not trying to copy from ${yi_his} paper.\"\n\t\t*set interdependence %-10\n\t\t*set indirect %+10\n\t\tFirecracker sniffs. \"It isn't about copying; it's about respect for our family! Your behavior in this class reflects on me, too.\"\n\t\t*goto understand\n\t#\"I'm sorry. I won't let myself get distracted.\"\n\t\t*set filial %+10\n\t\tFirecracker gives you a hard look. \"That's right. You'd better not. Your behavior in this class reflects on me, too.\"\n\t\t*goto understand\n\t*if (likeshenyi = false) #\"Don't worry; we're just friends.\"\n\t\t*set classrank %-10\n\t\tFirecracker nods. \"All right. Just make sure that your friendship doesn't get in the way of class.\"\n\t\t*goto understand\n\n*label understand\n\n\"I understand,\" you say.\n\n\"Good,\" says Firecracker firmly. \"You're responsible for the reputation of the entire Wang family. We all are. If you do something that makes you look bad, it makes us all look bad.\"\n\n*label together\n\nTogether, you climb the stairs and make your way over to the other wing of the chemistry building, where the lab rooms are. While Firecracker starts to set up her books at the TA's table at the front of the room, you take your seat and wait. \n\n*page_break\n\nA few minutes later, Shen Yi and ${yi_his} roommate Zhu Yang come in, and ${Grandma} and Little One soon after that. ${Grandma} shoots a significant look over at Shen Yi, and gives you a knowing grin. \n\n*if (likeshenyi)\n\t*if rel_yan \u003c 50\n\t\tIt's almost a peace offering, as if ${Grandma} were trying to find something to make you happy after all of the tension that's been between you in the last few weeks.\n\t\t*goto littleoneduck\n\t*else\n\t\tIt's another sign of how well ${Grandma} knows you - ${yan_he} can tell that you're thinking about Shen Yi.\n\t\t*goto littleoneduck\n*else\n\t*if rel_yan \u003c 50\n\t\t$!{yan_he}'s teasing you [i]again[/i]. How many times do you have to tell ${yan_him} that you're not interested in Shen Yi?\n\t\t*goto littleoneduck\n\t*else\n\t\t$!{yan_he}'s just teasing you - ${yan_he} knows that you don't like Shen Yi as anything more than a friend. At least, you hope ${Grandma} knows you well enough to know that!\n\t\t*goto littleoneduck\n\n*label littleoneduck\n\nLittle One ducks ${hua_his} head sheepishly, but ${hua_he}'s smiling too. You smile back at your roommates, and then go back \n*if (likeshenyi)\n\tto watching Shen Yi.\n\n\tLook at ${yi_him}, working so hard on ${yi_his} lab report! $!{Yi_he}'s so smart! And look at the way the sunlight hits ${yi_his} face...\n\n\tOh, wait, ${Grandma}'s talking.\n\n\t\"…the second reaction shouldn't be too hard to figure out, right?\" ${yan_he} asks. \"Little One, do you think I've got this right?\" Then ${Grandma} realizes that you've missed the first part of what ${yan_he} was saying, and ${yan_his} grin gets even more knowing.\n\t*goto leanforward\n*else\n\tto work.\n\t*finish\n\n*label leanforward\n*page_break\n${Grandma} leans forward, speaking in a voice so low that only you and Little One can hear. \"So. You like Shen Yi. Shen Yi likes you - ${yi_his} roommate Zhu Yang said so, and ${yi_he}'s been watching you since the beginning of class. What are you going to do about it?\"\n\nThat's a very good question. \n\nBut an even better question is, do you want to do anything about it?\n\n*choice\n\t#Yes. I really like Shen Yi!\n\t\t*goto askingchoice\n\t#I'm not sure how I feel about Shen Yi, but I'd like the chance to get to know ${yi_him} better.\n\t\t*goto askingchoice\n\t#No. I don't want to do anything, and I have a good reason for that.\n\t\tWhat's the reason?\n\n\t\t*choice\n\t\t\t#I need to focus on school, and I'll tell ${Grandma} that.\n\t\t\t\t*set classrank %-20\n\t\t\t\t*set filial %+10\n\t\t\t\t*label workfocus\n\t\t\t\t${Grandma} rolls ${yan_his} eyes. \"If you say so.\"\n\n\t\t\t\t\"No, I mean it!\" you persist. \"I have a lot of work to do, and I can't afford to get distracted.\" You have enough work as a chemistry major that ${Grandma} is almost convinced even if ${yan_he} doesn't know about the other work that you have as a member of the Wang family.\n\n\t\t\t\t\"It's good that you want to focus on your studies,\" Little One offers, shyly supportive.\n\n\t\t\t\t\"Fine,\" ${Grandma} sighs. \"And anyway, I suppose you couldn't do anything here in class, since your cousin is the TA.\"\n\n\t\t\t\tAt the end of class, Shen Yi waves goodbye to you as you're all walking out, and you wave back, but then you go straight home to work. You're confident that you made the right decision, and Eldest Uncle nods approvingly when you tell him about it.\n\n\t\t\t\tYou might not have a date, but you definitely have the approval of your relatives and a lot more time to work.\n\t\t\t\t*finish\n\t\t\t#Firecracker told me not to.\n\t\t\t\t*set filial %+20\n\t\t\t\t*goto workfocus\n\n\t\t\t#I'm worried that if Shen Yi gets close to me, ${yi_he} might get hurt.\n\t\t\t\t*set interdependence %-10\n\t\t\t\t*set balance %+10\n\t\t\t\t*set rel_shen %+10\n\t\t\t\tYou live a dangerous life, but at least you have the training to deal with the demons you face every night. Shen Yi doesn't, and you like ${yi_him} too much to put ${yi_him} in danger. Even if Shen Yi never knows about your family's true mission, a demon might attack ${yi_him} to try to get to you.\n\n\t\t\t\tBut you can't tell ${Grandma} that that's the reason you're not trying to go out with Shen Yi. At least, you can't say it directly...\n\n\t\t\t\t*choice\n\t\t\t\t\t#\"I need to focus on school.\"\n\t\t\t\t\t\t*goto workfocus\n\t\t\t\t\t#\"I'm just not interested.\"\n\t\t\t\t\t\t*goto notinterested\n\t\t\t\t\t#\"I have too many other obligations.\" It's not discreet, but it's the truth.\n\t\t\t\t\t\t*set secretcounter +1\n\t\t\t\t\t\t*set balance %+10\n\t\t\t\t\t\t\"Other obligations?\" ${Grandma} looks at you more closely. \"What do you mean? You're not in any clubs.\"\n\n\t\t\t\t\t\t\"I'm just really busy,\" is all that you'll say.\n\n\t\t\t\t\t\t\"What do you mean?\" ${Grandma} says again.\n\t\t\t\t\t\t*goto ignore\n\n\t\t\t\t\t#I'll just ignore ${Grandma}.\n\t\t\t\t\t\t*set rel_yan %-10\n\t\t\t\t\t\t*label ignore\n\t\t\t\t\t\tYou put your head down and start working on your problem set, pretending that you didn't hear ${Grandma}.\n\n\t\t\t\t\t\t\"Well?\" ${Grandma} persists.\n\n\t\t\t\t\t\tYou ignore ${yan_him}.\n\n\t\t\t\t\t\t\"${Roommatenick}!\" ${yan_he} whispers more urgently. \"Come on!\"\n\n\t\t\t\t\t\tLittle One shakes ${hua_his} head at ${Grandma}. \"$!{Self_he}'s working!\"\n\n\t\t\t\t\t\t${Grandma} sighs in exasperation, but gives up. You've annoyed your roommate a little, but you've also gotten ${yan_him} to stop asking you about Shen Yi.\n\t\t\t\t\t\t*finish\n\n\t\t\t#I like Shen Yi as a friend, but that's all.\n\t\t\t\t*set rel_yan %+10\n\t\t\t\t*set rel_hua %+10\n\t\t\t\t*set rel_shen %+10\n\t\t\t\tYou shake your head. \"I'm not going to do anything. I'm not interested.\"\n\t\t\t\t*label notinterested\n\n\t\t\t\t\"Really?\" ${Grandma} asks skeptically.\n\n\t\t\t\t\"Really,\" you confirm.\n\n\t\t\t\t${Grandma} shrugs. \"Oh well. It's your choice.\"\n\n\t\t\t\tThat night, you and your roommates go to a movie at the campus cinema, and it's a little awkward when you see Shen Yi there with ${yi_his} roommates too. But you shrug and turn away. You and ${Grandma} and Little One have a wonderful time, and you're glad that you've gotten the chance to spend more time with your roommates.\n\t\t\t\t*finish\n\n*label askingchoice\nYou want to do something, but you can't just ask Shen Yi directly. Not in class, not with Firecracker staring down at you from the TA's table - and especially not after Firecracker just told you that you had to behave respectably in class, or the whole family would look bad.\n\nWhat do you say to ${Grandma}?\n\n*choice\n\t#\"Could you ask some questions for me? You know ${yi_his} roommate Zhu Yang - you could ask whether they've got plans for tomorrow evening.\"\n\t\t*set indirect %+20\n\t\t*set interdependence %+20\n\t\t${Grandma}'s grin curls up even higher with anticipation. \"All right. Let's go sit near them and start a conversation. We [i]have[/i] to move over near them - there's better light over by the window, after all,\" ${yan_he} adds in mock innocence.\n\n\t\tYou're pretty sure that Shen Yi perks up when you approach - but that might just be wishful thinking.\n\n\t\t\"Hi, Sun Yan,\" Zhu Yang says to ${Grandma}. \"Hi, Wang Su.\" \n\n\t\t\"Hi,\" Shen Yi adds, a little more shyly.\n\n\t\t\"You know,\" ${Grandma} begins, \"there's a new movie at the campus cinema.\"\n\n\t\t\"That's right!\" you agree, trying to sound casual even though your heart is pounding. \"I'd really like to see it.\"\n\n\t\t*page_break\n\n\t\t${Grandma} picks up ${yan_his} part of the conversation without missing a beat. \"We'll all be done with this lab report by tomorrow,\" ${yan_he} says casually, then turns to Shen Yi and the other ${yi_gender}s at the table. \"Would you like to join us?\"\n\n\t\tZhu Yang glances at Shen Yi and then back at you and ${Grandma}. \"Sure,\" Zhu Yang says. \"That sounds good.\"\n\n\t\tShen Yi nods. \"I'd really like it if we could all go,\" ${yi_he} says, looking at you.\n\n\t\tYou smile back. \"Let's all meet after dinner, then, and we can walk over together.\"\n\t\t*goto movies\n\n\t#\"I'll go sit near Shen Yi and ${yi_his} roommates, start talking to them, and drop some hints about all of us doing something together tomorrow evening.\"\n\t\t*set indirect %+10\n\t\t*set interdependence %-10\n\n\t\t\"Good luck,\" Little One whispers, as you gather up your belongings.\n\n\t\tThe ${yi_gender}s greet you with smiles as you sit down next to them, and you hope that you're not just imagining that Shen Yi's smile is the biggest.\n\n\t\t*page_break\n\n\t\tYou all work for a few minutes, trading casual small talk about the lab, until finally you see your opening. \"So, my roommates noticed that there's a new movie playing at the campus cinema,\" you say, trying to sound casual even though your heart is pounding. \"Have any of you seen it yet?\" You hope they understand that you're asking them to see it with you - and especially that Shen Yi understands that you want ${yi_him} to see it with you.\n\n\t\t*page_break\n\n\t\tYou're both relieved and happy when Shen Yi answers. \"No, we haven't seen it,\" ${yi_he} says, \"but we'd really like to.\"\n\n\t\t\"We'll all be done with the lab report by tomorrow evening,\" you continue. \n\n\t\tShen Yi nods. \"So will we. We should be free to go to the movies then.\"\n\t\t*goto movies\n\n\t#\"I'll ask Shen Yi for help with the lab report. Then we can spend time together, and maybe we'll get a chance to talk about other things.\"\n\t\t*set indirect %+20\n\t\t*set classrank %-10\n\t\t*set rel_shen %+20\n\t\t*set shenyidate true\n\t\tLittle One nods. \"That sounds safe,\" ${hua_he} says. \"And you'll be able to spend more time working, too!\" Thinking about academics always makes Little One happy.\n\n\t\t${Grandma} nods too. \"That's always a good way to spend time with someone.\" $!{yan_he} flashes you another grin. \"Good luck!\"\n\n\t\t*page_break\n\t\t*achieve datenight\n\n\t\tYou gather your books and your courage and head over to the table by the window. \"Hi, Shen Yi,\" you begin.\n\n\t\tShen Yi looks up with a smile. \"Oh, hi, Wang Su.\" $!{Yi_he} looks briefly away - is ${yi_he} nervous too? - and then back up to you. \"How is the lab report going?\"\n\n\t\t\"Actually,\" you say, heart pounding, \"I was wondering if you could help me with it. There are a few things that I'm not certain about.\" \n\n\t\tYou're both relieved and happy when Shen Yi says, \"Oh, of course! I'd be happy to. Tonight after dinner, let's meet in the library.\" You're pretty sure you're smiling much more than a chemistry lab report deserves. \"That's perfect! Thank you!\"\n\n\t\tShen Yi is grinning too. \"You're welcome! Thank you! Um. I mean. I'll see you tonight.\"\n\n\t\tYou meet up at the library, just as you've planned, and you actually do get a lot of work done on the lab report. But you also get to spend a whole evening with Shen Yi, and it's great.\n\t\t*finish\n\n*label movies\n*set shenyidate true\n*achieve datenight\n*set rel_shen %+20\n\nThe next evening after dinner, you and your roommates and Shen Yi and ${yi_his} roommates all go to the movies together. \n\nThis is how people get to know each other at your school: only when a relationship is getting very serious are there actual one-on-one dates, and nobody wants to take too much time away from their studying. But a group outing to the movies gives everyone time to talk to each other - and if two of the group happen to be more interested in each other than the rest, well, they can manage to sit next to each other.\n\nWhich is what you and Shen Yi do, and you have a very very nice evening.\n\n*finish\n", "5-domestictranquility-old": "*page_break\n[b]Chapter 5: At Home[/b]\n\nFor the last month, you've been studying with Shen Yi about once a week, and occasionally going to movies or out to dinner in a group with all of your roommates. You're really glad that you're getting to know ${yi_him} better, and you're even happier that your roommates seem to like ${yi_him} too. Even Firecracker approves, and she's notoriously hard to please.\n\nMost of the time when you're studying with Shen Yi, you're both actually studying. Your chemistry classes take an immense amount of work, and you'd never dream of slacking off on your studies: you owe it to your family to succeed. That's true of every student, of course, but even more so for you because your family is going to be depending on your potion-making skills. (Firecracker is helping you write up a second lab notebook, where you keep track of the more specialized aspects of chemistry that you're learning.) \n\n*page_break\n\n*label grandmother\nThat's why your family is already on your mind when Shen Yi mentions, on your way home from the library, that ${yi_he} is going home for a week to visit ${yi_his} grandmother. \"I hope she'll be proud of what I'm doing here. She'll never say it in front of other people, but I hope she thinks it, at least.\"\n\n\"I'm sure she will,\" you tell ${yi_him} encouragingly. \"Your grades are very good.\"\n\n\"My family expects me to do well,\" Shen Yi says simply. \"They want me to be a chemical engineer, so I have to work harder at chemistry than anything else. It's probably the same for you, right?\" ${yi_he} adds with a sympathetic smile. \"Dean Wang is your uncle, isn't he?\" \n\nYou nod, and can't help feeling proud when Shen Yi looks impressed.\n\nHow do you answer?\n\n*choice\n\t#\"Actually, I wanted to study sociology, but my uncle made me major in chemistry instead.\"\n\t\t*set filial %-20\n\t\t*set hierarchy %-20\n\t\tShen Yi blinks at your directness, a surprised frown crinkling ${yi_his} forehead. \"Well,\" ${yi_he} says uncomfortably. \"It's…good that you're honoring your family, then.\"\n\n\t\tYou think ${yi_he} might have found your statement disrespectful. You glance away, trying to find some way to salvage this. \"Yes, I am honoring my family,\" you flounder. \"Like I said, I wanted to make my uncle happy.\" That isn't exactly what you said a minute ago, but maybe it will make Shen Yi think more highly of you.\n\n\t\tTo your relief, Shen Yi's frown eases. \"Right. Well, I'm sure he's proud of you.\"\n\n\t\tThe rest of the walk home is less awkward, but you're still feeling unhappy about the way that conversation went. You hope that when Shen Yi returns from ${yi_his} visit home, things are better between you.\n\n\t\t*page_break\n\t\t*goto unhappy\n\n\t#\"Yes, you're right - it's really important to my family for me to study chemistry.\"\n\t\t*set filial %+20\n\t\t*set modest %+20\n\t\tShen Yi smiles. \"I thought so. So what are you going to do after you graduate?\"\n\t\t*goto after\n\n\t#\"Chemistry is really useful. It's important for much more than engineering.\"\n\t\t*set indirect %+20\n\t\t*set holistic %+20\n\t\tShen Yi nods, smiling ${yi_his} agreement. \"Absolutely! So what are you going to do with it, if you're not going to be an engineer?\"\n\n\t\t*label after\n\t\tYou can't tell him the truth! You absolutely positively cannot say 'I'm going to make potions so that we can catch demons more effectively.'\n\n\t\tInstead, you say \"Research, probably.\" It's true, even if it's not the whole truth. \"I'll need to talk to my uncle and my parents before I make any decisions.\"\n\n\t\tShen Yi smiles again, and says, \"I understand.\"\n\n\t\tYou spend the rest of the walk home in comfortable conversation, and you realize that you're really going to miss talking to Shen Yi for the week that ${yi_he}'s away.\n\t\t*page_break\n\t\t*goto unhappy\n\n*label unhappy\n\nThere's another reason that you were reluctant to go home, besides just wanting to spend more time with Shen Yi: the atmosphere in your room has been pretty uncomfortable lately.\n\nThe main problem is that Little One seems very unhappy. $!{hua_he}'s talking even less than usual, ${hua_he} hardly ever smiles, and sometimes ${hua_he} even eats dinner by ${hua_him}self instead of with you and ${Grandma}. You're worried about Little One, of course, but you and ${Grandma} can sense how unhappy Little One is, and it's starting to drag you down too.\n\nHow do you want to go about finding out what's wrong with Little One?\n\n*choice\n\t#I'll watch Little One to see if there's any pattern to ${hua_his} unhappiness.\n\t\t*set indirect %+15\n\t\t*set facesaving %+15\n\t\t*set harmony %+10\n\t\t*set holistic %+20\n\t\tYou decide to study in your room instead of going to the library, and you keep a careful eye on Little One all evening. \n\n\t\tAs far as you can tell, it seems like an average evening. Everyone studies hard - maybe Little One studies a bit harder than Grandma, but that's what usually happens. The only thing that's even a little unusual is that when Grandma asks Little One a question, Little One doesn't say a word; ${hua_he} just shakes ${hua_his} head. That's quiet and withdrawn even for Little One. \n\n\t\tFinally, ${Grandma} closes ${yan_his} book and says, \"Well, I'm going out.\" $!{yan_he} picks up Little One's jacket from the hook on the wall, ${yan_his} longer arms stretching out the shoulders as ${yan_he} slips it on. \"Little One, this new jacket of yours is great,\" ${Grandma} adds. \"Thanks!\"\n\n\t\tLittle One doesn't say a word - ${hua_he} just shrinks down even further into ${hua_his} book and keeps studying.\n\t\t*goto littleonetalk\n\n\t#I'll ask some questions - very carefully, of course, so I won't embarrass ${hua_him}.\n\t\t*set indirect %+10\n\t\t*set facesaving %+15\n\t\t*set harmony %+10\n\t\tThat evening, when the three of you are taking a study break, you lean over to talk to Little One. \"A lot of people are really stressed this week,\" you offer. \"I was talking to Shen Yi, and ${yi_he} said that ${yi_he} has three exams in the next two days.\"\n\n\t\t${Grandma} gives you a knowing grin when you mention Shen Yi, but it's Little One's reaction you're watching. If Little One is worried about classes, this gives ${hua_him} an opening to talk about that.\n\n\t\t*page_break\n\n\t\t\"I'm sorry that Shen Yi is upset,\" Little One says quietly, ${hua_his} eyes fixed on ${hua_his} book. \"But I don't think that everyone's classes are as busy this week as ${yi_his} are.\" That means that whatever is upsetting Little One, it isn't schoolwork.\n\n\t\t\"That's so true,\" ${Grandma} agrees, picking up Little One's jacket from the hook on the wall. \"I'm not going to let myself get too stressed - I'm going out.\" $!{yan_his} longer arms stretch out the shoulders of the jacket as ${yan_he} slips it on. \"Little One, this new jacket of yours is great,\" ${Grandma} adds. \"Thanks!\" \n\n\t\tLittle One doesn't say a word - ${hua_he} just shrinks down even further into ${hua_his} book and keeps studying.\n\t\t*goto littleonetalk\n\n\t#I'll ask ${hua_him} directly. I'll never get a straight answer if I don't.\n\t\t*set indirect %-15\n\t\t*set facesaving %-15\n\t\t*set harmony %-15\n\t\tThat evening, when the three of you are taking a study break, you lean over to talk to Little One.\"Are you all right?\" you ask. \"You've been really quiet lately. What's bothering you?\"\n\n\t\tLittle One's eyes widen in shock, and ${hua_he} draws back. \"What?\" ${hua_he} gasps. \"No! Nothing. I'm fine.\"\n\n\t\t${Grandma} doesn't say anything; ${yan_he} just turns away. It looks like both of your roommates felt that your directness was rude.\n\n\t\t${Grandma} is the one who finally breaks the awkward silence. \"Well, I'm going out,\" ${yan_he} says, picking up Little One's jacket from the hook on the wall. $!{yan_his} longer arms stretch out the shoulders of the jacket as ${yan_he} slips it on. \"Little One, this new jacket of yours is great,\" ${Grandma} adds. \"Thanks!\" \n\n\t\tLittle One doesn't say a word - ${hua_he} just shrinks down even further into ${hua_his} book and keeps studying.\n\t\t*goto littleonetalk\n\n*label littleonetalk\n\nAs soon as the door closes behind ${Grandma}, Little One visibly relaxes, and gives you an apologetic little smile. \"Sorry.\" From that reaction, you're pretty sure that Little One is upset with ${Grandma}.\n\nIt's a relief to know that Little One isn't angry at you, but you can't let this tension between your other two roommates continue. You'll have to figure out what's wrong and find some way to fix it.\n\nYou already know that you can't say anything directly, because that would be rude. What kind of indirect questions can you ask to find out what's bothering Little One?\n\n*choice\n\t#I'll talk about how hard it is to share a room.\n\t\t*set indirect %+10\n\t\t*set harmony %+20\n\t\tYou turn back to your book, saying casually, \"It's easier with only two people in such a small space, isn't it? I've never had to share a room with even one person before - have you?\"\n\n\t\t*page_break\n\n\t\tLittle One shakes ${hua_his} head, eyes still down. \"How easy it is to share a room depends on which people you're sharing it with,\" ${hua_he} says quietly. \"Some people are very careless. It's worst when they're careless about other people's belongings.\" That must mean that ${hua_he} is upset that Grandma is taking ${hua_his} things without asking.\n\t\t*goto later\n\n\t#I'll talk about how hard it is to work with different kinds of people.\n\t\t*set indirect %+15\n\t\t*set harmony %+15\n\t\tYou turn back to your book, saying casually, \"I was just thinking about how many new people I've met since I came to university.\" Little One nods, ${hua_his} eyes flickering up at you curiously for a second. \"It's hard to get to know new people, isn't it? Especially ones who do things in a different way than you do.\"\n\n\t\tLittle One's mouth tightens. \"Most people are nice,\" ${hua_he} says quietly. \"But some are very careless. It's worst when they're careless about other people's belongings.\" That must mean that ${hua_he} is upset that Grandma is taking ${hua_his} things without asking.\n\t\t*goto later\n\n\t#I'll talk about classes. That's always a safe topic.\n\t\t*set indirect %+20\n\t\t*set classrank %-10\n\t\t\"It's good that you're keeping up with your classes,\" you begin. \"It must be such a relief not to have to worry about that, when there are so many other things to worry about.\"\n\n\t\tLittle One nods. \"It's true,\" ${hua_he} agrees. \"There are many things to worry about.\" You think ${hua_he} might be uncurling a little from that little ball of anxiety, but you're not sure. \n\n\t\t\"But classes are secure and reliable,\" you venture. \"When you're working on your own, you can be more sure that you'll achieve what you've set out to do.\"\n\n\t\t\"Well,\" Little One hesitates, \"except when you are working in a group. Sometimes people can be very careless. It's worst when they're careless about other people's belongings.\" \n\n\t\tLittle One really isn't talking about classes. But then again, neither were you.\n\n\t\tYou're pretty sure that Little One is upset that Grandma is taking ${hua_his} things without asking.\n\t\t*goto later\n\n*label later\n*page_break\nAn hour later, ${Grandma} returns, balancing an armful of library books and a cup of tea as ${yan_he} backs through the door. The instant that ${Grandma} appears, Little One tenses up - and then tenses even more as ${Grandma} kicks off Little One's new shoes, sending them sailing across the room to land in a scuffed pile in the corner.\n\nThe tension in the room is even worse than it was before. You really have to do something.\n\nYou clear your throat. \"Look. There's something I'd like to say.\" Both Little One and ${Grandma} look over at you, and for once their expressions match: they're both surprised and expectant.\n\nAll right. Where do you start?\n\n*choice\n\t#I'll talk about ${Grandma}'s actions first.\n\t\t*set indirect %-10\n\t\t*set harmony %-10\n\t\t\"Things have been a bit tense around here lately,\" you begin. \"And, ${Grandma}, I think there's a lot that you could do to help make that better.\" ${Grandma} stares at you, so astonished that ${yan_he} nearly drops ${yan_his} tea. \"You know how protective Little One is of ${hua_his} belongings. We should all be respectful of that.\"\n\n\t\tFor another moment, ${Grandma} just stares, but then nods. \"All right,\" ${yan_he} says slowly. \"I'm sorry.\"\n\n\t\t\"But, Little One,\" you continue, \"you could make things better, too.\" Little One blinks up at you behind ${hua_his} glasses, almost as surprised as ${Grandma} and a lot more hurt. \"When things happen that upset us, we all need to be better about communicating our feelings.\"\n\n\t\t\"Oh,\" Little One says quietly. \"I suppose you're right.\"\n\t\t*goto sitback\n\n\t#I'll talk about Little One's actions first.\n\t\t*set indirect %-10\n\t\t*set harmony %-10\n\t\t\"Things have been a bit tense around here lately,\" you begin. \"And, Little One, I think there's a lot that you could do to help make that better.\" Little One draws back, openly astonished and more than a little hurt, but you push ahead. \"When things happen that upset us, we all need to be better about communicating our feelings.\"\n\n\t\tIt takes a moment for Little One to work up the courage to speak, and when ${hua_he} finally does, it is in a very small voice. \"I'm sorry,\" ${hua_he} says.\n\n\t\t\"And, ${Grandma},\" you continue, \"you could make things better, too.\" ${Grandma}'s head whips around in surprise. \"You know how protective Little One is of ${hua_his} belongings. We should all be respectful of that.\"\n\n\t\t\"Oh,\" ${Grandma} says, ${yan_his} voice unusually quiet. \"I suppose you're right.\"\n\t\t*goto sitback\n\n\t#I'll talk about something general first.\n\t\t*set indirect %+10\n\t\t*set harmony %+10\n\t\t\"This has been a great year so far. I really love being roommates with both of you,\" you begin. You're greeted with matching surprised smiles from both Little One and ${Grandma} - it's probably the first time they've agreed on anything in the last two weeks. \"But lately it's been hard, because I can tell that everyone's been unhappy.\" \n\n\t\tBoth roommates are nodding now, and you push ahead, saying, \"I think I know how to fix it, but we all need to make some changes. It's hard to share a room, so we need to be respectful of each other's belongings. Right, ${Grandma}?\" You shoot a pointed look over at Little One's shoes.\n\n\t\t${Grandma} blinks. \"Oh. Yes. We do need to respect each other's belongings,\" ${yan_he} agrees, looking at Little One's shoes.\n\n\t\t\"And we also need to be better at speaking up when something's bothering us,\" you continue. This time, your pointed look is straight at Little One. \n\n\t\t\"Oh,\" Little One says, in an even smaller voice than usual. \"I guess we do.\"\n\t\t*goto sitback\n\n*label sitback\n*page_break\n\nYou sit back on your bed, satisfied that you've relieved some of the tension in your room. You've finished all your work, too, so the only thing left on your to-do list for the day is to practice your meditation. This is an important part of your training: when you get more advanced, the concentration techniques that you learn in your meditation sessions will help you detect demons.\n\nIt's also the only part of your demon-hunting training that you'd even remotely consider trying in front of anyone else: to the outside world, it just looks like you're closing your eyes. ${Grandma} noticed once, and ${yan_he} teased you for falling asleep, but that's it.\n\n*page_break\n\nYou close your eyes and concentrate. Your breathing slows, and you can feel yourself relaxing, just the way that Eldest Uncle always says that you should. The rest of your thoughts fade away, and all that you can hear is the inner stillness of your mind, and the chant that you say silently to yourself. \"Together we find strength. Together we find balance. Together we find harmony.\"\n*set apprenticeship +5\n\n*page_break\n\nWhen you open your eyes, you can see sparks all around you. Every living thing has a spark within it - through the window you can see the lights from the trees and grass, and even a person walking by. When you're looking at the world like this, you can see that everything in the universe shares something in common. You can only see these sparks for a few seconds at a time, but you treasure every moment that you have them.\n\nIt's beautiful. \n\nJust out of the corner of your eye, you see another spark. Bright, harsh, green, different from the others. A demon!\n\nYour heart leaps -  \n\n*page_break\n\n- but when you whip your head a
