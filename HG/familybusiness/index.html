ance and encourage demons to seek the right path. Even now, in your darkest hour, you remember that duty, and you're determined to hold to it. You know that Eldest Uncle would be proud of you for that. \n\n\t\tYou hope you'll get the chance to tell him.\n\t\t*goto caughtup\n\n*label caughtup\n\nFinally you reach a storeroom, piled high with kitchen supplies. No doors, no windows: you've got the demon trapped.\n\nIt slithers into a corner, hissing and spitting sparks.\n\nWhat do you do?\n\n*fake_choice\n\t#I'll strike at the same time as Firecracker and Second Aunt.\n\t\tIf you act together, you'll always be stronger. Eldest Uncle taught you that.\n\n\t\tThree fists strike the demon in perfect unison. You feel the force of your blow sink into the creature's scaly side, and the demon shrieks in pain. \n\n\t#I'll throw a potion to weaken the demon.\n\t\tYou've learned from Tian's example - you always have a potion or two in your pocket these days. You pull one out and fling it at the demon.\n\n\t\tGlass shatters against the creature's scaly side, and it rears back. That gives Firecracker and Second Aunt the opening they need - their fists slam into the demon's side in perfect unison, and it shrieks in pain.\n\n\t#I'll find a weapon.\n\t\tAnything can be a weapon if you try hard enough. Firecracker's taught you that.\n\n\t\tYou grab a huge heavy pot and fling it at the demon's head. It ducks away, hissing in anger. That gives Firecracker and Second Aunt the opening they need - their fists slam into the demon's side in perfect unison, and it shrieks in pain.\n\nBut before you can strike again, the demon lunges away, giving its last burst of energy to flight. It spits a flurry of sparks on the wall, and the cinderblocks crumble away under the demon's corrupting breath. Firecracker springs forward - but the demon is faster, and it flees away into the night.\n\nFirecracker lets out a string of furious curses, dashing tears away from her eyes. Even Second Aunt doesn't reprimand her for her language. \n\n*page_break\nYou all stumble back to where you've left Eldest Uncle. He's still lying on the floor, eyes closed and breathing ragged, but at least the bleeding seems to have stopped. \n\nTian pulls himself to his feet and looks at you with haunted, frightened eyes. \"I'm going to get him home,\" he says quietly. \"He needs to rest.\" Another cousin steps forward, and together, he and Tian carefully carry Eldest Uncle out into the night.\n\nYou and Firecracker walk home in silence, and hug each other for a long time when you finally part ways.\n\nSomewhere out there, there are two demons on the loose. One of them nearly killed your uncle.\n\n*page_break\n\nWaking up the next morning is painful. You feel sore from running and fighting; emotionally battered from seeing your uncle hurt. You can't bear to move. So you lie in bed, eyes half closed, watching your roommates as they start to stir.\n\n${Grandma} slides warily out of bed, glancing in your direction as ${yan_he} straightens up. \n\n*page_break\n\nFor some reason that you can't quite put your finger on, you hold still, eyes open such a tiny bit that anyone looking at you would think that you're still asleep.\n\nBut your eyes aren't really closed.\n\n*page_break\n\nYou see ${Grandma} slide give a quick rap on the edge of Little One's bunk, bringing Little One up and out and fumbling for ${hua_his} glasses. Little One shoots a wary look in your direction, and then looks over at ${Grandma}, questioningly. ${Grandma} answers with a silent shake of ${yan_his} head, and Little One lets out a silent breath of relief.\n\nOnly then does Little One pad over to the mirror and bare ${hua_his} teeth to examine them. $!{hua_he} frowns at what ${hua_he} sees, and pokes unhappily at what looks like a chip out of one of ${hua_his} front teeth.\n\nMeanwhile, ${Grandma} is getting dressed, and as ${yan_he} reaches up to pull ${yan_his} shirt over ${yan_his} head, you can see a huge bruise forming on ${yan_his} side.\n\n*page_break\n\nThose injuries weren't there yesterday. \n\nAnd you know who had those exact same injuries: the demons that you fought. The ones that got away. The ones who hurt Eldest Uncle.\n\nWatch out for Little One, he said as he lay on the floor bleeding.\n\nThe demons are…your roommates?\n\n*goto_scene 9-toldyouso-old", "8-bigfight": "*temp yanhurt false\n*temp huahurt false\n\n[b]Chapter 8: Conflict[/b]\n\nDinner is terrible tonight. The texture of the rice is all wrong, and some of the vegetables are nearly rotten. It's not just you, either: all over the dining hall, you can see people piling up rejected vegetables on the edges of their plates, poking unhappily at them with their chopsticks. Something's gone very wrong.\n\n${Grandma} is the only one who doesn't seem to be dragged down by the bad moods and unpleasant dinner; ${yan_he}'s just as cheerful as always. \"I'm glad that my group is all done with our project,\" ${yan_he} says as the three of you walk back towards your dorm. Well, that would put ${yan_him} in a good mood: there's another big group project due for the chemistry class that you're all in. Your group - the one that you're in with Shen Yi and Little One - should be able to finish yours off tonight, as long as you all focus and work hard.\n\n*page_break\nBy the time you all get back to your room, Little One's dropped back and is walking a few paces behind you and ${Grandma}. \"Are you all right?\" ${Grandma} asks Little One as you all walk into the room.\n\nLittle One nods, but you're not convinced: ${hua_he} looks deeply tired, and a little shaky. \n\n*label out\n\"Do you want to go out tonight?\" ${Grandma} glances at you, too, but ${yan_he}'s mostly talking to Little One, and looks directly at ${hua_him} when saying, \"You'll feel better if you go out.\" Of course going out is the first thing that ${Grandma} would think of to make anyone feel better!\n\nLittle One looks down, ${hua_his} face twisting with uncomfortable anxiety. You know that ${hua_he} hates to say no to ${Grandma}, but ${hua_he} can't go out tonight, because you've got that meeting for your big chemistry project. What do you say?\n\n*choice\n\t#\"Thank you for the invitation. Maybe after our chemistry group meeting.\" It's not saying no directly, but ${Grandma} will still understand.\n\t\t*set indirect %+20\n\t\t${Grandma} nods, but the roll of ${yan_his} eyes isn't quite as good-natured as it usually is. \"If you say so. Think about it, all right?\"\n\n\t\tLittle One nods, and starts to gather up ${hua_his} books, not meeting ${Grandma}'s eyes except for the briefest of glances on the way out the door.\n\n\t\tWell, that sort of worked.\n\t\t*goto meeting\n\n\t#\"I'm sorry - I planned our chemistry group meeting for tonight.\" It will help Little One save face if I'm the one claiming responsibility for the schedule.\n\t\t*set indirect %+10\n\t\t*set interdependence %+10\n\t\t*set rel_hua %+10\n\t\t${Grandma} nods, but the roll of ${yan_his} eyes isn't quite as good-natured as it usually is. \"If you say so. Think about it, all right?\"\n\n\t\tLittle One nods, and starts to gather up ${hua_his} books, not meeting ${Grandma}'s eyes except for the briefest of glances on the way out the door.\n\n\t\tGood - that seems to have worked.\n\t\t*goto meeting\n\n\t#I don't say anything. Little One needs to stand up for ${hua_him}self, even if it means a little embarrassment now and then.\n\t\t*set rel_hua %-10\n\t\t*set interdependence %-20\n\t\tThere's silence.\n\n\t\tAnd more silence.\n\n\t\t*page_break\n\n\t\tIt's pretty awkward.\n\n\t\t*page_break\n\n\t\tFinally Little One just shakes ${hua_his} head. \"Thank you,\" ${hua_he} mumbles. \"Maybe later?\"\n\n\t\t${Grandma} nods, but the roll of ${yan_his} eyes isn't quite as good-natured as it usually is. \"If you say so. Think about it, all right?\"\n\n\t\tLittle One nods, and starts to gather up ${hua_his} books, not meeting ${Grandma}'s eyes except for the briefest of glances on the way out the door.\n\t\t*goto meeting\n\n*label meeting\n*page_break\n\nYou all gather in your study room, lay out your books, and get to work.\n\nLittle One is even quieter than usual, and excuses ${hua_him}self after a few minutes - ${hua_he} looks pretty ill, and you're starting to get worried.\n\nYou all carry on as best you can, but just as you're all regaining your momentum, there's a knock on the study room door and everyone looks up towards the sound. \n\nIt's Firecracker, beckoning to you. \"Excuse me,\" you say to your friends in surprise, and go out into the hall to talk to your cousin.\n\n*page_break\n\n\"You need to come right now,\" Firecracker says, as soon as the door closes behind you. \"We've spotted demons in the main dining hall. We think they were there last night, too.\" Well, that would explain why dinner was so terrible, if there were demons spoiling the food!\n\nYou need to go fight, but what about the project?\n\nYou can't think of a good way to deal with this. If you stay at the meeting, you'll let down your family. If you go fight the demons, you'll risk your grade in the class, abandon your responsibility as team leader, and let down your team - not to mention letting down your roommate and a ${yi_gender} whom you really really want to spend more time with. \n\nWhat can you do?\n\n*choice\n\t#I'll go with Firecracker. Little One and Shen Yi will understand that family has to come first.\n\t\t*set filial %+20\n\t\t*set classrank %+5\n\t\t*set interdependence %-10\n\t\t*set balance %+20\n\t\tYou nod quickly to Firecracker. \"Just a second.\" Maintaining the balance of the universe is much more important than any chemistry class.\n\n\t\tYou duck back into the study room to start gathering up your things. \"I'm sorry,\" you say, hastily shoving books back into your bag. \"I've got a family emergency that I have to deal with. I'll be back as soon as possible. Tell Little One that I'm sorry, too?\" you add to Shen Yi.\n\t\t*label leavinglate \n\n\t\tShen Yi nods. $!{yi_he} looks confused, and a little hurt, but says, \"All right. I trust you that you wouldn't leave if it weren't important.\"\n\n\t\tIt's still your responsibility to make sure that the meeting will be well-run when you're not there. Who do you leave in charge?\n\n\t\t*choice\n\t\t\t#Little One: ${hua_he} will be back soon, and ${hua_he}'s very smart.\n\t\t\t\t*set classrank %+2\n\t\t\t\t*comment should be some effect, but I don't want to screw the player for something they have no way of knowing\n\t\t\t\tYou feel a little odd about appointing a substitute who isn't here right now, but if Little One does return, you know that ${hua_he} will know exactly what to do. You hand off your notes and hurry after Firecracker.\n\t\t\t\t\n\t\t\t\t*if (waited)\n\t\t\t\t\t*goto later\n\n\t\t\t\t*else\n\t\t\t\t\t*goto hurry\n\t\t\t#Shen Yi: ${yi_he} is a good leader.\n\t\t\t\t*set classrank %-2\n\t\t\t\tYou know Shen Yi well enough to know that ${yi_he} is a good leader as well as being intelligent. You hand off your notes and hurry after Firecracker.\n\n\t\t\t\t*if (waited)\n\t\t\t\t\t*goto later\n\n\t\t\t\t*else\n\t\t\t\t\t*goto hurry\n\n\t\t\t#I won't designate anyone. I don't want to take the time to deal with it.\n\t\t\t\t*set classrank %+10\n\t\t\t\tYou toss your notes on the table, hoping that someone will pick them up. Your classmates look even more confused than before, but you don't have time to worry about that - you just hurry after Firecracker.\n\n\t\t\t\t*if (waited)\n\t\t\t\t\t*goto later\n\n\t\t\t\t*else\n\t\t\t\t\t*goto hurry\n\n\t#I'll stay at the meeting. Firecracker is the TA; she'll understand how much I need to work on this project.\n\t\t*set waited true\n\t\t*set filial %-20\n\t\t*set classrank %-20\n\t\t*set interdependence %+20\n\t\t*set balance %-20\n\t\t\"I can't leave!\" you protest. \"We're working on the final project for your class - you know how important that is.\"\n\n\t\tFirecracker rolls her eyes, but she can't really argue with your logic. \"All right. We can do it on our own this time. If you change your mind, we'll be at the dining hall.\"\n\n\t\t\"Is everything all right?\" Shen Yi asks as you return to the table.\n\n\t\tYou nod. \"Oh, yes, it's fine. Just family things.\"\n\n\t\t*page_break\n\t\tYou meant it when you said that everything was fine, but the longer you sit in the meeting, the less certain you are that it's true. Everyone's feeling a bit off tonight, anyway: Little One never comes back, and the others can't seem to focus on their work. \n\n\t\tYour mind keeps wandering back to the fight that you know is going on near the dining hall. What if you really are needed? Isn't the balance of the universe more important than your chemistry class?\n\n\t\tFinally, you sigh. \"Look. I'm sorry. I think I need to go deal with my family after all.\"\n\n\t\t*goto leavinglate\n\n\t#I'll stay at the meeting for a little while and then meet up with Firecracker afterwards. Maybe I can make everyone happy.\n\t\t*set waited true\n\t\t*set filial %+10\n\t\t*set interdependence %+20\n\t\t*set balance %+10\n\t\tYou nod to Firecracker. \"I'll be there in half an hour. I just need to do a few things first at this meeting. I don't want to slack off in your class, after all!\"\n\n\t\tShe sighs. \"I guess I can't argue with that. But hurry, if you can.\"\n\n\t\tYou wrap up your work as quickly as you can - which isn't that quickly, since your mind is elsewhere and Little One still hasn't come back. Finally, you feel that the project is in good enough shape that you can go meet your relatives.\n\n\t\t*goto later\n\n*label hurry\nYou hurry after Firecracker, easily falling into step beside her. \"You sounded worried,\" you comment quietly.\n\n\"I'm not,\" she replies at once, lifting her chin defiantly. \"It's just…when Tian called me, he sounded worried. That's all.\" Which means that she's worried, but doesn't want to say so.\n\nYou nod, accepting your cousin's word, and walk on in silence.\n\nThe whole family is at the dining hall when you get there, all with determined expressions and serious eyes. You join hands for a brief moment, gathering strength from the familiar circle, and then head inside where you know that the demons will be.\n*page_break\n*goto encounter\n\n*label later\nYou run as quickly as you can towards the dining hall, hoping that you're not too late. You burst through the front door, and head towards the sound of battle, where you know that the demons will be.\n*goto encounter\n\n\n*label encounter\nThis time, there are two of them.\n\nOne big, one small; both snakelike with eyes of green fire. And both…familiar. Have you seen these demons somewhere before? No, how could you? You've never let a demon get away: you've either destroyed them or sent them off to seek enlightenment.\n\nYou chase down the corridor, desperately trying to keep in formation. Firecracker and Eldest Uncle are in front; you, Tian, and Second Aunt are close behind.\n\nTwo demons, five people to fight them. Those are good odds… \n\n…right?\n*page_break\n\nBut your odds would be better if you separated them. How are you going to do that?\n\n*choice\n\t#I'll use magic to drive the smaller demon back.\n\t\tYou focus your mind and your force of will, then strike out at the little demon with the flat of your hand - not to hit it, but to summon a barrier that will push it away from you.\n\n\t\t*if magic > 60\n\t\t\t*set finalsuccess +1\n\t\t\t*set huahurt true\n\t\t\tThe little demon slams hard into your invisible wall, hissing in anger and pain. Over and over, it lunges forward, trying to get back to its partner, but it just hits the wall again. \n\t\t\t*goto encounter2 \n\t\t*else\n\t\t\tBut it doesn't work. You can feel your magic fizzling out the minute your hand stops moving, and the little demon lunges forward again as if nothing had happened at all.\n\t\t\t*goto encounter2\n\t#I'll coordinate my actions with Firecracker. Together, we'll get between the two demons.\n\t\t\"Firecracker!\" you shout. \"With me!\"\n\n\t\t*if interdependence > 60\n\t\t\t*set finalsuccess +1\n\t\t\t*set huahurt true\n\t\t\tThat's all you need to say. You and Firecracker are so tuned to each other that you can work in perfect unison without even thinking about it. She dodges left; you dodge right; together you herd the little demon back away from its partner. Firecracker even manages to get off a few good kicks, and the little demon hisses in pain.\n\t\t\t*goto encounter2\n\t\t*else\n\t\t\tShe charges forward, ready to act. But the two of you don't work in unison: she's too fast for you, and your rhythm doesn't match hers. While you and Firecracker flail raggedly down the hall, the little demon hisses once more and lunges between you, charging on towards Tian.\n\t\t\t*goto encounter2\n\t#I'll hit the smaller demon as hard as I can. That will take it out of the fight.\n\t\tYou'd be happier if you had a weapon, but when all you have are your fists and feet, that's what you'll use to attack. You charge forward to pummel the smaller demon with all your might.\n\n\t\t*if weapons > 60\n\t\t\t*set finalsuccess +1\n\t\t\t*set huahurt true\n\t\t\tYour weapons practice has strengthened your body as well as your skill. Your fists slam into the little demon's scaly hide, and it hisses in furious pain, turning away from its partner as it writhes.\n\t\t\t*goto encounter2\n\t\t*else\n\t\t\tBut it's not enough. Your fists glance off the little demon's scaly side, and it hisses and lunges past you as if you hadn't touched it at all. Maybe if you had a sword - or just a bit more strength - you'd be able to hurt it. But you don't, and you can't.\n\t\t\t*goto encounter2\n\n*label encounter2\n\nTian's fist strikes sharply out towards the little demon's face, breaking off one of its fangs. The demon shrieks and rears back - and then withdraws farther still. It dives out of the open window and flees into the night.\n\nYou whirl around just in time to see the larger demon lunge towards Eldest Uncle. Its fangs slash across his chest like scissors going through paper. \n\n*page_break\n\nYou can't tell who's screaming. \n\nMaybe it's you; maybe it's Firecracker shrieking with fury as she charges towards the demon; maybe it's Eldest Uncle crying out in pain; maybe it's the demon roaring in triumph. \n\nMaybe it's all of that and more.\n\n*page_break\n\nYou collapse next to your uncle, tearing off your jacket to try to stanch the blood that's gushing from his side. What did Cousin Tian tell you in those first aid lessons? Put pressure on the wound, right?\n\nAt least Eldest Uncle is breathing. At least there's that.\n*page_break\n\n\"${Nickname}?\" Eldest Uncle's voice is faint, thready, racked with pain. But the fact that he's speaking at all gives you hope. \"Go. Go catch it.\"\n\nYou shake your head, a sob breaking out of you. \"I can't leave you!\" \n*if (waited)\n\tGuilt stabs through you as sharply as the demon's fangs. What if you'd gotten there sooner? Could you have prevented this?\n\t*comment endif\n\n\"You must,\" he persists. \"Don't let it get away. Remember your duty. And be careful.\" He stops, draws a ragged breath, and pushes himself to add, \"Little one. Careful of the little one.\"\n\n\"Lin's got the other demon,\" you reassure him. \n\nEldest Uncle shakes his head, struggling to speak more - but just then, Tian rushes up. \"${Nickname}!\" Tian cries. \"Go after the big demon. The small one is gone.\"\n\n\"See?\" you tell Eldest Uncle. He's still shaking his head, but can't speak anymore.\n\nTian is fumbling in his pockets - you know that he always carries potions that can counteract the poison carried on demons' fangs, but you've never seen him use them before. \"Go, ${Nickname},\" Tian says more urgently. \"I'll take care of him now.\" \n\nLeaving Eldest Uncle feels like another stab from the demon's fangs, but you know that Tian is right.\n\n*page_break\n\nYou run through the corridors behind the dining hall, your footsteps echoing off of the blank cinderblock walls and tile floors. Far ahead of you, you can hear Firecracker and Second Aunt shouting, and you veer around a corner to speed towards them.\n\nFinally you reach a storeroom, piled high with kitchen supplies. No doors, no windows: you've got the demon trapped.\n\nIt slithers into a corner, hissing and spitting sparks.\n\nWhat do you do?\n\n*choice\n\t#I'll strike at the same time as Firecracker and Second Aunt.\n\t\tIf you act together, you'll always be stronger. Eldest Uncle taught you that.\n\n\t\t*if interdependence > 60\n\t\t\t*set finalsuccess +1\n\t\t\t*set yanhurt true\n\t\t\tAnd you've listened, and practiced, and it's paid off. \n\n\t\t\tThree fists strike the demon in perfect unison. You feel the force of your blow sink into the creature's scaly side, and the demon shrieks in pain. You've definitely hurt it.\n\t\t\t*goto gotaway\n\t\t*else\n\t\t\tBut you didn't always listen to him, and now you're paying the price.\n\n\t\t\tYour fist flies out to strike against the demon, but lands too late - you're just not good enough at working in unison with your relatives. The demon rears back and hisses, in pain but still defiant, and barely slowed down at all.\n\t\t\t*goto gotaway\n\n\t#I'll use a potion to weaken the demon.\n\t\tYou've learned from Tian's example - you always have a potion or two in your pocket these days. You pull one out and fling it at the demon.\n\n\t\t*if ((extrapotions) or (classrank \u003c 30))\n\t\t\t*set finalsuccess +1\n\t\t\t*set yanhurt true\n\t\t\tGlass shatters against the creature's scaly side, and it rears back, shrieking in shock and pain. All of that extra work you've put in studying potions has paid off!\n\n\t\t\tThat gives Firecracker and Second Aunt the opening they need - their fists slam into the demon's side in perfect unison. You never realized that your aunt could fight with such strength. The demon lets out another furious hiss, and you know that you've definitely hurt it.\n\t\t\t*goto gotaway\n\n\t\t*else\n\t\t\tGlass shatters against the creature's scaly side, but the demon barely seems to notice at all. You haven't spent much time studying potions, and now you're regretting it.\n\n\t\t\tFirecracker and Second Aunt pummel the demon with their fists, and it writhes, in pain but still defiant.\n\t\t\t*goto gotaway\n\n\t#I'll find a weapon.\n\t\tAnything can be a weapon if you try hard enough. Firecracker's taught you that.\n\n\t\tYou grab a huge heavy pot and fling it at the demon's head. \n\n\t\t*if weapons > 60\n\t\t\t*set finalsuccess +1\n\t\t\t*set yanhurt true\n\t\t\tIt smashes into the demon with a thunderous clang, and the creature ducks away, hissing in anger. \n\n\t\t\tThat gives Firecracker and Second Aunt the opening they need - their fists slam into the demon's side in perfect unison. You never realized that your aunt could fight with such strength. The demon lets out another furious hiss, and you know that you've definitely hurt it.\n\t\t\t*goto gotaway\n\t\t*else\n\t\t\tBut there's not enough force behind your throw - the pot glances off the demon's thick scaly hide, and the creature barely seems to notice at all.\n\n\t\t\tFirecracker and Second Aunt pummel the demon with their fists, and it writhes, in pain but still defiant.\n\t\t\t*goto gotaway\n\n*label gotaway\n*page_break\nBefore you can strike again, the demon lunges away, giving its last burst of energy to flight. It spits a flurry of sparks on the wall, and the cinderblocks crumble away under the demon's corrupting breath. Firecracker springs forward - but the demon is faster, and it flees away into the night.\n\nFirecracker lets out a string of furious curses, dashing tears away from her eyes. For once, Second Aunt doesn't reprimand her for her language.\n\n*page_break\nYou stumble back to where you've left Eldest Uncle. He's still lying on the floor, eyes closed and breathing ragged, but at least the bleeding seems to have stopped. \n\nTian pulls himself to his feet and looks at you with haunted, frightened eyes. \"I'm going to get him home,\" he says quietly. \"He needs to rest.\" \n\nSecond Aunt nods. \"I'll be there soon.\" Her voice is faint, and her gaze doesn't leave her brother. For the first time that you can remember, she actually looks old. \"Firecracker, can you - \"\n\nFirecracker nods quickly, already stepping forward to help Tian. They try their best to lift Eldest Uncle carefully, but he still lets out a low groan as they carry him out into the night. \n\n\"${Nickname},\" Second Aunt says, \"I'll walk you home. I don't want you out there on your own.\"\n\n*fake_choice\n\t#\"Don't worry. I can take care of myself.\"\n\t\tSecond Aunt nods. \"Of course you can.\" But she stays by your side all the way back to your dorm, no matter how hard you protest.\n\t#\"Thank you. I'm glad you'll be there.\"\n\t\tHer lips twitch in a small sad smile, and she stays close by your side all the way back to your dorm.\n\t#\"I'm sorry that I didn't do more. I'm ashamed of my failure.\"\n\t\t\"You tried,\" she says simply. \"We all did. Next time, we will try harder.\" She stays close by your side all the way back to your dorm.\n\t#\"We'll get them!\"\n\t\t\"We will,\" Second Aunt agrees quietly. \"Together, we will.\" She stays close by your side all the way back to your dorm.\n\n*page_break\n\nWaking up the next morning is painful. You feel sore from running and fighting; emotionally battered from seeing your uncle hurt and knowing that the demons that hurt him are still out there. You can't bear to move. So you lie in bed, eyes half closed, watching your roommates as they start to stir.\n\n${Grandma} slides warily out of bed.\n*if (yanhurt)\n\t$!{yan_he} moves stiffly, wincing a little as ${yan_he} straightens up and glances in your direction.\n\t*goto somereason\n*else\n\t$!{yan_he} moves furtively, glancing in your direction as ${yan_he} straightens up. \n\t*goto somereason\n*label somereason\n\nFor some reason that you can't quite put your finger on, you hold still, eyes open such a tiny bit that anyone looking at you would think that you're still asleep.\n\n*page_break\n\nYou see ${Grandma} give a quick rap on the edge of Little One's bunk.\n*if (huahurt)\n\tLittle One groans as ${hua_he} rolls over, as if in pain,\n\t*goto hua2\n*else\n\tLittle One rolls over\n\t*goto hua2\n*label hua2\nand reaches for ${hua_his} glasses. Little One shoots a wary look in your direction, and then looks over at ${Grandma}, questioningly. ${Grandma} answers with a silent shake of ${yan_his} head, and Little One lets out a silent breath of relief.\n\nOnly then does Little One pad over to the mirror and bare ${hua_his} teeth to examine them. $!{hua_he} frowns at what ${hua_he} sees, and pokes unhappily at what looks like a chip out of one of ${hua_his} front teeth.\n\nMeanwhile, ${Grandma} is getting dressed, and as ${yan_he} reaches up to pull ${yan_his} shirt over ${yan_his} head, you can see a huge bruise forming on ${yan_his} side.\n\n*page_break\n\nThose injuries weren't there yesterday. \n\nAnd you know who had those exact same injuries: the demons that you fought. The ones that got away. The ones who hurt Eldest Uncle.\n\nWatch out for Little One, he said as he lay on the floor bleeding.\n\nThe demons are…your roommates?\n\n*finish", "9-toldyouso-old": "*temp told\n*set told false\n*temp class\n\n*page_break\n[b]Chapter 9: I Told You So[/b]\n\nYour roommates might be demons.\n\nYour roommates might be demons.\n\nWhat's the first thought that goes through your mind?\n\n*fake_choice\n\t#How could they lie to me? I feel so betrayed.\n\t#How could I not have seen it? I feel so stupid.\n\t#I was right! I knew that I saw demon-sparks around ${Grandma}.\n\t#That means that ${Grandma} hurt Eldest Uncle. $!{yan_he}'ll never get away with this!\n\t#Little One is a demon too? How?\n\nYou pull the covers over your head and hide. You can't stop running through the last few months in your mind, replaying every interaction you've had with your roommates. \n\nWhen ${Grandma} bossed Little One around, was ${yan_he} really asserting authority over ${hua_him} as another demon? When Little One seemed ill and withdrawn, was ${hua_he} really just in need of some time as ${hua_his} demon form? When ${Grandma} went out to party, was ${yan_he} really out causing chaos?\n\nWhat are you going to do?\n\n*page_break\n\nLater that morning, the six of you meet in Eldest Uncle's office. \n\nSix. Only six. There should be seven. \n\nNobody can bring themselves to look at the empty chair where Eldest Uncle should be sitting. \n\nJust as fighting in your family group feels like you're all part of a single body moving in unison, having a person missing from the family gathering feels like you're missing an arm or leg. It feels wrong. Empty. Painful.\n\nIt's even more painful for you, because of what you suspect about the demons you fought last night. What other explanation could there be for your roommates' injuries and Little One's absence from the meeting? \n\nBoth your actual family and the surrogate family that you've found among your roommates have been broken up.\n\n*page_break\n\nSecond Aunt clears her throat, drawing everyone's attention towards her. \"We need to discuss what to do next.\" She speaks stiffly, uncomfortable in the role of leader. \"But first - Tian, do you have news?\"\n\nAll eyes instantly go towards Cousin Tian, who's been taking care of Eldest Uncle. \"He's going to be all right,\" Tian says, bringing audible sighs of relief from everyone else. \"He was badly injured and needs to rest, but he will heal.\"\n\nOnly once that has been gotten out of the way does Second Aunt go on to say what everyone is thinking: \"We need to find the demons that did this.\"\n\nYou agree. And you know where to find them. Or, at least, you hope that you do. So what do you tell Second Aunt regarding that?\n\n*choice\n\t#\"May I look? I have some ideas about where we can find them.\"\n\t\t*set indirect %-20\n\t\t*set hierarchy %-20\n\t\t*set filial %-20\n\t\tSecond Aunt frowns a little at your directness, but she's so worried about Eldest Uncle that she can't even muster proper disapproval.\n\n\t\tThere's some sympathy in Second Aunt's eyes, too, as she turns to look at you. \"I understand that you're eager, but don't get ahead of yourself. We'll all look for them together.\"\n\n\t\t*goto tellingdemons\n\n\t#I don't say anything, but I meet Second Aunt's eyes and hope that she'll understand that I want her to call on me.\n\t\t*set indirect %+20\n\t\t*set hierarchy %+20\n\t\t*set filial %+20\n\t\tSecond Aunt glances around the circle and sees your steady gaze. \"Yes, ${Nickname}? You want to help? That's admirable, but you canot do this alone.\"\n\n\t\t\"I do...\" you begin.\n\n\t\t*goto tellingdemons\n\n\n\t*if (waited) #\"Please let me look for them. I can't fully make up for the fact that I was late arriving last night, but please, let me try.\"\n\t\t*set filial %+10\n\t\t*set hierarchy %+10\n\n\t\tSecond Aunt nods. \"I understand that you want to make up for last night.\" Her voice is almost gentle. \"But you cannot do this alone.\"\n\t\t*goto tellingdemons\n\n*label tellingdemons\n\nBut it's more than just wanting to help: you know more about the demons than your relatives do. The question is, do you want to tell them that?\n\nDo you tell your family that your roommates might be the demons from last night?\n\n*choice\n\t#Yes. I owe it to my family.\n\t\t*set told true\n\t\t*set filial %+20\n\t\t*set holistic %+20\n\t\tYou take a deep breath and explain: \"I know about the demons and where to find them because...I think they're my roommates.\"\n\n\t\t*if tolddemon = \"uncle\"\n\t\t\tEveryone gasps in astonishment - except for Second Aunt. \"So it was both of them,\" she declares, \"and not just that one.\"\n\n\t\t\tNow it's your turn for astonishment. \"You knew?\" you ask.\n\n\t\t\t\"Oh yes,\" Second Aunt says. \"Your uncle told me that you suspected. We were watching them closely.\"\n\t\t\t*goto aftertelling\n\n\t\t*elseif tolddemon = \"firecracker\"\n\t\t\t\"So you were right!\" Firecracker bursts out.\n\n\t\t\tEveryone stares.\n\n\t\t\t\"${Nickname} told me,\" she explains. \"$!{hua_he} thought that one of ${hua_his} roommates might be - the one ${Nickname} calls ${Grandma}. So I told ${hua_him} to burn incense and see what happened.\"\n\n\t\t\t\"Well, they did both leave,\" you have to admit. \"But I thought that's because the incense smelled bad.\"\n\n\t\t\t\"So they were demons after all!\" Firecracker finishes. \"Both of them.\"\n\t\t\t*goto aftertelling\n\n\t\t*else\n\t\t\tEveryone gasps in astonishment, and all eyes turn towards you. \"Why didn't you say anything before?\" Second Aunt cries.\n\n\t\t\tYou squirm uncomfortably under everyone's gaze. \"I couldn't be certain,\" you mumble. \"I thought that maybe one of them was, but what if they weren't? I didn't want to go accusing innocent people of being demons!\"\n\n\t\t\t*goto aftertelling\n\t#No. I need to protect my friends. \n\t\t*set filial %-20\n\t\t*set holistic %-20\n\t\t*if (waited)\n\t\t\t\"I want to help,\" is all that you say. \"I feel responsible because I delayed, and I want to do something to make up for it.\"\n\t\t\t*goto didnttell\n\t\t*else\n\t\t\t\"I want to help,\" is all that you say.\n\t\t\t*goto didnttell\n\n*label didnttell\n\nSecond Aunt looks at you a little more closely, and you're pretty sure that she suspects that something more is going on. But then she breaks away from your gaze, and looks back around the circle. \"We must all do what we can to find these demons. Go research, study, see what you can find out. We will meet back here after dinner. to make a new plan.\"\n*goto leavingmeeting\n\n*label aftertelling\n\n\"Nobody is to blame Wang Su for not saying anything before now,\" Second Aunt decides - and you know that she is serious because she's using your formal name. \"It would have been terrible to accuse innocent people of being demons. But now that we know the truth, we will use that information to help find and defeat them. Everyone, go research, study, see what you can find out. We will meet back here after dinner to make a new plan.\"\n\n*label leavingmeeting\n\nYou file out of the office along with your relatives. You know that you have sociology class in ten minutes, but as much as you adore sociology, you can't imagine actually sitting in a classroom right now. You can't go back to your room, either. What if your roommates are there? You can't possibly be in the same room with them!\n\nWhat do you do?\n\n*choice\n\t#I'll go to class because I want to avoid my other troubles.\n\t\t*set class true\n\t\t*set classrank -3\n\t\t*set holistic %-15\n\t\t*set filial -10\n\t\tYou feel a bit guilty as the thought comes to you, and try to push it out of your mind. What about Eldest Uncle? You should be trying to help him, not avoid thinking about him.\n\n\t\t*label inclass\n\t\tYou sit in class, listening to the professor talk about last night's reading and trying your hardest to keep yourself focused on it. \n\n\t\tEveryone is socialized to act in a certain way, she says - as you read last night - based on the principles of the society that they grew up in. \n\n\t\tAnd that's when you get the idea.\n\t\t*goto idea\n\n\t#I'll go to class because I owe it to my family to get good grades, no matter what.\n\t\t*set class true\n\t\t*set filial %+15\n\t\t*set classrank -5\n\t\t*set holistic %+15\n\t\tYou owe it to your parents, and to Eldest Uncle. You couldn't bear to disappoint them now, when there's so much other trouble afflicting your family.\n\n\t\t*goto inclass\n\n\t#I'll go to class because I'm worried that I'll get in trouble if I don't.\n\t\t*set class true\n\t\t*set hierarchy %+10\n\t\t*set classrank -3\n\t\tIt's true. You're sure that someone will find out. Maybe the TA will notice, or even the professor herself! Or maybe word will get around to Eldest Uncle when he's better, and then you'll definitely regret skipping class. \n\n\t\t*goto inclass\n\t#I won't go to class because I wouldn't be able to concentrate. I'll just take a walk.\n\t\t*set classrank +5\n\t\t*set class false\n\t\tEven though you're not in sociology class, your mind can't help but wander back to the ideas that today's lecture would be about.\n\n\t\tEveryone is socialized to act in a certain way, you read last night, based on the principles of the society that they grew up in. \n\n\t\tAnd that's when you get the idea.\n\t\t*goto idea\n\n*label idea\n\nIt's a perfect idea! Even though demons are creatures of chaos, they do have some internal logic to their behavior: they're socialized to act in a certain way. All you have to do is to take advantage of those internal rules by doing something that makes them feel that they have to act according to the way that they've been socialized.\n\nFortunately, you know these two demons better than anyone else on campus.\n\n*if (class)\n\tThe instant that class ends, you run to find Second Aunt.\n\t*goto secondaunt\n*else\n\tYou spin around, and run to find Second Aunt.\n\t*goto secondaunt\n\n*label secondaunt\n*page_break\n\nYou run into her office, fairly bursting with excitement. \"Second Aunt! I have an idea for how to find the demons.\" \n\nStill breathless, you explain what you've figured out: it's more than just finding something that the demons would like and using that as bait; it's figuring out what they would feel socially obligated to do.\n\n*label learnthat\nSecond Aunt looks impressed. \"Where did you learn that?\"\n\nThe answer is, in your sociology class - the one that she didn't want you to take because it was too impractical. But you need to find a way to say that without making it sound like you're being disrespectful or saying 'I told you so.'\n\nEven if you did sort of tell her so.\n\nSo what do you tell Second Aunt about where you learned about those sociological principles?\n\n*choice\n\t#I'll say something indirect. \"I've been very lucky in the education that I've received here.\"\n\t\t*set indirect %+20\n\t\t*set holistic %+20\n\t\tSecond Aunt smiles - the first time you've seen her smile since Eldest Uncle was hurt. \"I'm glad that you recognize that. You're certainly putting it to good use. Thank you, ${Nickname}. Now, go get some rest, and we'll all meet up back at the office after dinner.\"\n\t\t*goto afterdinner\n\t#I'll say something modest. \"Oh, I don't remember. I've just been working hard.\"\n\t\t*set modest %+20\n\t\t*set facesaving %+20\n\t\tSecond Aunt smiles - the first time you've seen her smile since Eldest Uncle was hurt. \"It certainly sounds as if you have been, if you're coming up with ideas like that. Thank you, ${Nickname}. Now, go get some rest, and we'll all meet up back at the office after dinner.\"\n\t\t*goto afterdinner\n\t#I'll say something that focuses on her. \"I just know that you'll do something helpful with the information.\"\n\t\t*set filial %+20\n\t\t*set hierarchy %+20\n\t\tSecond Aunt smiles - the first time you've seen her smile since Eldest Uncle was hurt. \"I think I can. Thank you, ${Nickname}. Now, go get some rest, and we'll all meet up back at the office after dinner.\"\n\t\t*goto afterdinner\n\n*label afterdinner\n\nYou're actually feeling hopeful as you head outside again. \n\nFor the next few hours, you alternate between trying to do your chemistry homework and sketching out plans for how to catch the demons. After dinner, you all gather again in Eldest Uncle's office.\n\n\"I have had an idea,\" Second Aunt begins. She's sitting straighter than she was this morning, and she has her usual determined look in her eyes. \"We will lure the demons by playing off of their sense of social obligation. Even though demons are creatures of chaos, they do have some internal logic to their behavior: they're socialized to act in a certain way. We will take advantage of those internal rules and trap them by doing something that makes them feel that they have to act according to the way that they've been socialized.\"\n\n*page_break\nAs Second Aunt recites the plan - your plan! - you see hope dawning in your relatives' eyes. Firecracker has a fierce, eager grin by the end, and even Tian looks like he's taken heart from what he's heard. \n\nYour family has a plan, and they have hope. Yes, Second Aunt presented the idea as if it was hers, but you'd never dream of contradicting her. \n\nWhy was it important to let Second Aunt take credit for the idea?\n*input_text journal9\n\n\n*page_break\n\nNow all that's left is to put the plan into action.\n*goto_scene 10-revelations-old", "9-toldyouso": "*temp told false\n*temp class false\n\n[b]Chapter 9: Moments of Truth[/b]\n\nYour roommates might be demons.\n\nYou'd suspected it before, when you saw the demon-sparks, but you never really let yourself think that it was true.\n\nYou can't stop running through the last few months in your mind, replaying every interaction you've had with your roommates. \n\nWhen ${Grandma} bossed Little One around, was ${yan_he} really asserting authority over ${hua_him} as another demon? When Little One seemed ill and withdrawn, was ${hua_he} really just in need of some time as ${hua_his} demon form? When ${Grandma} went out to party, was ${yan_he} really out causing chaos?\n\nWhat are you going to do?\n\n*page_break\n\nLater that morning, the six of you meet in Eldest Uncle's office. \n\nSix. Only six. There should be seven. \n\nNobody can bring themselves to look at the empty chair where Eldest Uncle should be sitting. \n\nJust as fighting in your family group feels like you're all part of a single body moving in unison, having a person missing from the family gathering feels like you're missing an arm or leg. It feels wrong. Empty. Painful.\n\nIt's even more painful for you, because of what you suspect about the demons you fought last night. What other explanation could there be for your roommates' injuries and Little One's absence from the meeting? \n\nBoth your actual family and the surrogate family that you've found among your roommates have been broken up.\n\nWhat else are you feeling right now?\n\n*choice\n\t#Anger. I know that giving in to my anger diminishes my balance, but I'm furious.\n\t\t*set balance %-10\n\t\t*set weapons %+10\n\t\tYou could barely focus on your meditation exercises this morning: there was no room for anything in your mind besides anger. Your roommates tricked and betrayed you! They nearly killed your uncle! How could you feel anything but fury right now?\n\t\t*goto meeting2\n\t#Sorrow. I'm heartbroken about losing my friends.\n\t\t*set interdependence %+10\n\t\t*set rel_yan %+10\n\t\t*set rel_hua %+10\n\t\tYou keep thinking about the happy times you had with your roommates. Late-night study sessions, jokes that only the three of you understand, the nickname ${roommatenick} that only they call you. You remember Lin and Tian's stories about their university roommates: the strong friendship, the constant support that they still have even years after graduation. \n\n\t\tYou'll never have that. It's all gone.\n\t\t*goto meeting2\n\t*if (waited = false) #Guilt. I should have done something about my roommates earlier.\n\t\t*set balance %+10\n\t\tYou thought you'd done enough, but you didn't.\n\t\t*if (tolddemon = \"nobody\")\n\t\t\tYou shouldn't have kept your suspicions about your roommates to yourself.\n\t\t*if (tolddemon = \"uncle\")\n\t\t\tYou thought that listening to Eldest Uncle was the right decision, but maybe you should have pushed harder to get him to take action.\n\t\t*if (tolddemon = \"firecracker\")\n\t\t\tYou thought that Firecracker would give you good advice, but maybe you should have gone to Eldest Uncle instead.\n\t\tYou keep trying to tell yourself that you did everything you could, but you keep feeling that you didn't.\n\t\t*goto meeting2\n\t*if (waited) #Guilt. I shouldn't have waited so long before joining the fight.\n\t\  \"and not just that one.\"\n\n\t\t\tNow it's your turn for astonishment. \"You knew?\" you ask.\n\n\t\t\t\"Oh yes,\" Second Aunt says. \"Your uncle told me that you suspected. We were watching them closely.\"\n\t\t\t*goto aftertelling\n\n\t\t*elseif tolddemon = \"firecracker\"\n\t\t\t\"So you were right!\" Firecracker bursts out.\n\n\t\t\tEveryone stares.\n\n\t\t\t\"${Nickname} told me,\" she explains. \"$!{hua_he} thought that one of ${hua_his} roommates might be - the one ${Nickname} calls ${Grandma}. So I told ${hua_him} to burn incense and see what happened.\"\n\n\t\t\t\"Well, they did both leave,\" you have to admit. \"But I thought that's because the incense smelled bad.\"\n\n\t\t\t\"So they were demons after all!\" Firecracker finishes. \"Both of them.\"\n\t\t\t*goto aftertelling\n\n\t\t*else\n\t\t\tEveryone gasps in astonishment, and all eyes turn towards you. \"Why didn't you say anything before?\" Second Aunt cries.\n\n\t\t\t*fake_choice\n\t\t\t\t#\"Because I wasn't sure. I didn't want to accuse innocent people of being demons.\"\n\t\t\t\t\t*set indirect %+10\n\t\t\t\t\tSecond Aunt doesn't look entirely happy, but at least she looks like she understands.\n\t\t\t\t#\"They were my friends. I didn't want to believe that they could be demons.\"\n\t\t\t\t\t*set rel_yan %+10\n\t\t\t\t\t*set rel_hua %+10\n\t\t\t\t\tSecond Aunt shakes her head. \"You're a good friend.\" She doesn't look entirely happy, but at least she looks like she understands.\n\t\t\t\t#\"I wanted to handle it on my own.\"\n\t\t\t\t\t*set interdependence %-10\n\t\t\t\t\tSecond Aunt frowns. \"It isn't your place to decide what to do about demons. Not yet. But what has happened is punishment enough.\"\n\t\t\t*goto aftertelling\n\t#No. I need to protect my friends. \n\t\t*set filial %-20\n\t\t*set balance %-20\n\t\t*set rel_yan %+25\n\t\t*set rel_hua %+25\n\t\t*if (waited)\n\t\t\t\"I want to help,\" is all that you say. \"I feel responsible because I delayed, and I want to do something to make up for it.\"\n\t\t\t*goto didnttell\n\t\t*else\n\t\t\t\"I want to help,\" is all that you say.\n\t\t\t*goto didnttell\n\n*label didnttell\n\nSecond Aunt looks at you a little more closely, and you're pretty sure that she suspects that something more is going on. But then she breaks away from your gaze, and looks back around the circle. \"We must all do what we can to find these demons. Go research, study, see what you can find out. We will meet back here after dinner. to make a new plan.\"\n*goto leavingmeeting\n\n*label aftertelling\n\n\"Nobody is to blame Wang Su for not saying anything before now,\" Second Aunt decides - and you know that she is serious because she's using your formal name. \"It would have been terrible to accuse innocent people of being demons. But now that we know the truth, we will use that information to help find and defeat them. Everyone, go research, study, see what you can find out. We will meet back here after dinner to make a new plan.\"\n\n*label leavingmeeting\n*page_break\nYou file out of the office along with your relatives, and head outside. The sun feels too bright. Everything feels out of place and wrong.\n\n\"Wang Su?\" a voice calls out, breaking your reverie. It's Shen Yi! $!{yi_he} and Zhu Yang are there in front of you, both looking worried.\n\n*if (shenyidate)\n\tShen Yi's expression is especially anxious, and as ${yi_he} meets your eyes, ${yi_he} offers a sympathetic little smile.\n\t*goto leavingmeeting2\n*elseif (shenyimad)\n\tYou haven't had the best relationship with Shen Yi lately, but despite all that ${yi_he} looks sincerely worried.\n\t*goto leavingmeeting2\n*else\n\t*goto leavingmeeting2\n\n*label leavingmeeting2\n\n\"We heard a rumor that your uncle was taken to the hospital last night,\" Zhu Yang says. \"Is he all right? What happened?\"\n\nYou cannot tell your friends that your uncle was hurt by demons. You especially cannot tell your friends that your uncle was hurt by the demons who are your roommates!\n\nWhat do you say instead?\n\n*fake_choice\n\t#\"There was an accident.\"\n\t\t\"Oh, I'm sorry,\" Shen Yi replies. \"I hope that he has a swift recovery.\n\t#\"I wish I could tell you,\"\n\t\tShen Yi nods immediately: ${yi_he} is a private person ${yi_him}self, so ${yi_he} understands about privacy. \"Well, I hope that he has a swift recovery. \n\t#\"My family is very private.\"\n\t\tShen Yi nods immediately: ${yi_he} is a private person ${yi_him}self, so ${yi_he} understands about privacy. \"Well, I hope that he has a swift recovery. \n\t#I can't stand keeping secrets anymore. \"He was attacked by demons.\"\n\t\t*set secretcounter +1\n\t\t*set shenyiknows true\n\t\tShen Yi and Zhu Yang stare.\n\n\t\tAnd stare.\n\n\t\tAnd stare.\n\n\t\t\"I know you're an honest person,\" Shen Yi finally says. $!{yi_he}'s struggling through the words, and looking hard at you, as if that would let ${yi_him} literally see the truth. \"So you wouldn't say anything that isn't true…\"\n\n\t\t\"Actually,\" Zhu Yang puts in, remarkably calmly, \"I've heard a lot of rumors about demons around campus. It explains a lot, you know?\"\n\n\t\tShen Yi turns to stare at ${yi_his} roommate instead of you. \"Really?\"\n\n\t\tZhu Yang nods. \"Yes. I'm sorry that they hurt your uncle. That's terrible.\"\n\n\t\tShen Yi nods, trying to catch up with ${yi_his} roommate's calm acceptance. \"Yes, it is. Um.\nDo you want to study together later?\" ${yi_he} offers. \"Having a steady routine makes a lot of people feel better.\"\n\nAnd that's when you get the idea.\n\nEven though demons are creatures of chaos, they do have some internal logic to their behavior. If you could break one of their internal rules, they'd feel that they had to come set it right. Eldest Uncle may know demons better than anyone else on campus, but you know [i]these[/i] demons better than anyone else. You'll know exactly what will draw them in.\n\n\"Thank you!\" you stammer to Shen Yi. \"But I should get back to my family.\"\n\nYou rush straight back to Eldest Uncle's office, where you know Second Aunt will still be, and tell her your ideas.\n\n*page_break\n\nLater that night, the family gathers again, and Second Aunt sets out what you all must do. The plan - [i]your[/i] plan! - brings hope into your relatives' eyes. Firecracker has a fierce, eager grin by the end, and even Tian looks like he's taken heart from what he's heard. \n\nYour family has a plan, and they have hope. \n\nNow all that's left is to put the plan into action.\n*finish", "choicescript_description": "For generations, your family has kept China safe from chaos demons. Now you must uphold that duty while you're at university--just don't tell your roommates!\n\n\"First Year Demons\" is an interactive fantasy novel by Rebecca Slitt, author of \"Psy High.\" Your choices control the story.  It's two games in one: a 30,000-word educational game, and a 43,000-word version of the same story that's just for fun. Both games are entirely text-based--without graphics or sound effects--and fueled by the vast, unstoppable power of your imagination.\n\nAs the youngest member of a family with a secret and ancient duty to keep China safe from demons, you must balance your relatives' traditional values and expectations with the challenges of your first year at college and your secret study of potions, sword, and spells.\n\nBetween dorm­room parties and chemistry study sessions, you'll experience battle and betrayal. You'll learn just how important it is to stay close to your family--your life may depend on it! You'll see how China is changing: maybe it's better to offer your ancestors a smartphone than to slay a demon in their memory. And above all, you must not let your friends know why you really sneak out of your dorm so late at night! Demons are all around you, and you never know what might be hiding behind a friendly face.\n\n• Battle chaos demons[n/]\n• Play as male or female, gay, straight or bi[n/]\n• ­Hit the books, or go out and party![n/]\n• ­Stay close to your family ­ or turn against them and be cast out[n/]\n• Specialize in swords, magic, or potions\n", "choicescript_stats": "\nName: Wang Su\n*line_break\nYour relatives call you: ${Nickname}\n*line_break\nYour roommates call you: ${Roommatenick}\n\n*if secondgame = false\n *stat_chart\n  percent balance Balance\n  percent facesaving Face-Saving\n  percent filial Filial\n  percent hierarchy Hierarchy\n  percent holistic Holistic\n  percent indirect Indirect\n  percent interdependence Interdependent\n  percent modest Modest\n\n *line_break\n *stat_chart\n  percent apprenticeship Apprenticeship\n This number represents how advanced you are in your apprenticeship as a demon hunter. The higher the number, the better.\n\n*if secondgame\n *stat_chart\n  percent balance Wisdom and Balance\n  percent magic Magic\n  percent weapons Weapons\n\n *stat_chart\n  opposed_pair Filial\n   Rebellious\n  opposed_pair Indirect\n   Rude\n  opposed_pair interdependence\n   Interdependent\n   Solitary\n\n*line_break\n*stat_chart\n  percent classrank Class Rank\nThis number represents your rank within your university class. The lower the number, the better: you want to be in the top 5%.\n\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n\n  Unlock the rest of the game.\n\n  *purchase adfree $3.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.\n\n", "screenshots": "*comment First Year Demons Screenshots\n\n\n*comment ------SCREENSHOT 1 - ch 4 label scenestart\nscreenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set balance 55\n*set filial 60\n*set indirect 45\n*set interdependence 65\n*set weapons 70\n*set magic 50\n*set classrank 25\n*set apprenticeship 20\n*set nickname \"Flea\"\n*set roommatenick \"Ox\"\n\nThe Wang family needs to operate in secret - that's what your relatives have told you ever since you were old enough to know about your family's mission. Your relatives are the only people with whom you can be fully open. But you can't lie, because lying upsets your inner balance. \"Lies belong to demons,\" Eldest Uncle always says. \"We cannot become like them.\"\n\nSo when you come back late from patrol with Firecracker and Cousin Lin, or when you wake up early to do your meditation exercises, you have to find some way to explain without lying. How do you deal with it?\n\n*fake_choice\n\t#I just lie. It makes me less balanced, but it's the easiest way to keep my secrets.\n\t#I can't bring myself to lie. I'll tell as much of the truth as I can and maintain my balance, even if it means risking exposure.\n\t#I tell them that I'm working on a project for Eldest Uncle. It's not exactly true, but it's close.\n\t#I deflect the questions by saying something indirect.\n\n\n*comment -----SCREENSHOT 2 - ch 8 label encounter\n*script changeBackgroundColor(\"black\")\n\n*set balance 45\n*set filial 70\n*set indirect 40\n*set interdependence 70\n*set weapons 70\n*set magic 45\n*set classrank 55\n*set apprenticeship 80\n*set nickname \"Bunny\"\n*set roommatenick \"Ghost\"\n\nTwo demons, five people to fight them. Those are good odds - but your odds would be better if you separated them. How are you going to do that?\n\n*fake_choice\n\t#I'll use magic to drive the smaller demon back.\n\t#I'll coordinate my actions with Firecracker. Together, we'll get between the two demons.\n\t#I'll hit the smaller demon as hard as I can. That will take it out of the fight.\n\n*comment --------SCREENSHOT 3 - ch 4 label after\n*script changeBackgroundColor(\"sepia\")\n\n*set balance 75\n*set filial 60\n*set indirect 60\n*set interdependence 50\n*set weapons 30\n*set magic 75\n*set classrank 20\n*set apprenticeship 50\n*set nickname \"Flea\"\n*set roommatenick \"Assistant Dean\"\n\n\"Chemistry is really useful,\" you say. \"It's important for much more than engineering.\"\n\nShen Yi nods, smiling in agreement. \"Absolutely! So what are you going to do with it, if you're not going to be an engineer?\"\n\nUm.\n\nYou absolutely positively cannot say 'I'm going to make potions so that we can catch demons more effectively.'\n\nRight?\n\n*fake_choice\n\t#Right. I'll have to be vague, even if it makes me look unmotivated. \"Research, probably.\"\n\t#Right. I'll have to bend the truth, even if lying endangers my balance. \"I want to be a professor like my uncle.\"\n\t#Right. But I can say something close to the truth, even if it endangers the family's secrecy. \"My family's doing some really unusual research. I'd like to do that, too.\"\n\n\n\n*comment ----SCREENSHOT 4 - ch 5 label littleonetalk\n\n*set balance 50\n*set filial 45\n*set indirect 65\n*set interdependence 65\n*set weapons 40\n*set magic 65\n*set classrank 40\n*set apprenticeship 60\n*set nickname \"Bunny\"\n*set roommatenick \"Ghost\"\n\nIt's a relief to know that Xu Hua isn't angry at you, but you can't let this tension between your other two roommates continue. You'll have to figure out what's wrong and find some way to fix it.\n\nYou already know that you can't say anything directly, because that would be rude. What kind of indirect questions can you ask to find out what's bothering Xu Hua?\n\n*fake_choice\n\t#I'll talk about how hard it is to share a room.\n\t#I'll talk about how hard it is to work with different kinds of people.\n\t#I'll talk about classes. That's always a safe topic.\n\n\n*comment ----SCREENSHOT 5 - ch 7 line 25 and following\n\n*set balance 45\n*set filial 65\n*set indirect 35\n*set interdependence 45\n*set weapons 75\n*set magic 40\n*set classrank 60\n*set apprenticeship 65\n*set nickname \"Flea\"\n*set roommatenick \"Ghost\"\n\nThe trees rustle sharply, and you and your cousin both stop short - but then the rustle dies away, and there is only a trail of withered grass and shriveled leaves left behind to mark where a demon was, and has now fled.\n\n*fake_choice\n\t#\"I hope all of our patrols are this peaceful.\"\n\t#\"I hope we'll get a good fight sometime.\"\n\t#\"It's too quiet. This can't be right.\"\n\n\n\n\n\n\n\n\n\n", "startup": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n*title First Year Demons\n*author Rebecca Slitt\n*scene_list\n\t1-opening\n\t2-classchoice\n\t$ 3-roommates\n\t$ 4-makingadate\n\t$ 5-domestictranquility\n\t$ 6-remembering\n\t$ 7-profmistake\n\t$ 8-bigfight\n\t$ 9-toldyouso\n\t$ 10-revelations\n\t$ 11-endgame\n\t1-opening-old\n\t2-classchoice-old\n\t$ 3-roommates-old\n\t$ 4-makingadate-old\n\t$ 5-domestictranquility-old\n\t$ 6-remembering-old\n\t$ 7-profmistake-old\n\t$ 8-bigfight-old\n\t$ 9-toldyouso-old\n\t$ 10-revelations-old\n\t$ 11-endgame-old\n\n\n\n*create balance 50\n*create filial 50\n*create indirect 50\n*create interdependence 50\n*create weapons 50\n*create magic 50\n*create classrank 50\n\n*create modest 50\n*create harmony 50\n*create holistic 50\n*create hierarchy 50\n*create facesaving 50\n*create apprenticeship 0\n\n*create rel_yan 50\n*create rel_hua 50\n*create rel_shen 50\n\n*create niece \"niece\"\n*create self_he \"she\"\n*create yan_gender \"girl\"\n*create yan_he \"she\"\n*create yan_him \"her\"\n*create yan_his \"her\"\n*create hua_gender \"girl\"\n*create hua_he \"she\"\n*create hua_him \"her\"\n*create hua_his \"her\"\n*create yi_gender \"boy\"\n*create yi_he \"he\"\n*create yi_him \"him\"\n*create yi_his \"his\"\n*create nickname \"Nickname\"\n*create roommatenick \"Roommate Nickname\"\n*create grandma \"Grandma\"\n*create slaydemon false\n*create tolddemon \"nobody\"\n*create waited false\n\n*create firstbest \"blank\"\n*create shenyidate false\n*create shenyimad false\n*create triedtoslay false\n*create extrapotions false\n*create finalsuccess 0\n*create disgraced false\n*create castout false\n*create yansurrender false\n*create huasurrender false\n*create bothsurrender false\n*create bothdead false\n*create leaving false\n*create bigfail false\n*create surrendered \"blank\"\n*create notsurrendered \"blank\"\n\n*create shenyiknows false\n*create secretcounter 0\n\n*create journal1 \"blank\"\n*create journal2 \"blank\"\n*create journal3 \"blank\"\n*create journal4 \"blank\"\n*create journal5 \"blank\"\n*create journal6 \"blank\"\n*create journal7 \"blank\"\n*create journal8 \"blank\"\n*create journal9 \"blank\"\n*create journal10 \"blank\"\n*create journal11 \"blank\"\n\n*create secondgame false\n\n*achievement learninglessons visible 10 Learning Lessons\n\tSucceed in both your lessons.\n\tYou succeeded in both your lessons.\n\n*achievement ironchef visible 25 Iron Chef\n\tCook in your dorm room.\n\tYou cooked in your dorm room. Not wise, but fun.\n\n*achievement nickname visible 10 New Nickname\n\tGet a new nickname\n\tYour roommates gave you a new nickname.\n\n*achievement datenight visible 20 Date Night\n\tGo out on a date.\n\tYou went out on a date.\n\n*achievement mediation visible 25 Mediation\n\tMediate between your roommates\n\tMediated between your roommates\n\n*achievement sweetsuccess visible 20 Sweet Success\n\tGood grades, and cookies too!\n\tGood grades, and cookies too!\n\n*achievement moderntimes visible 10 Modern Times\n\tOnly the most modern offering for your ancestor\n\tGave your ancestor a modern offering\n\n*achievement ancient visible 10 Ancient Tradition\n\tHonor your ancestor in the most traditional way\n\tGave your ancestor a traditional offering\n\n*achievement victory visible 100 Victory!\n\tWin a complete victory over the demons\n\tWon a complete victory over the demons\n\n*achievement halfway visible 50 Partial Victory\n\tWin a partial victory over the demons\n\tWon a partial victory over the demons\n\n*achievement defeated visible 10 Death and Defeat\n\tA terrible loss\n\tA terrible loss: both your roommates died.\n\n*achievement castout visible 20 Cast Out!\n\tGet cast out of your family.\n\tYou have been cast out of your family\n\n*achievement disgraced visible 20 Disgraced!\n\tBe a disgrace to your family\n\tYou were a disgrace to your family.\n\n*achievement filial visible 15 Honoring the Family\n\tBe exceptionally filial\n\tYou are exceptionally filial.\n\n*achievement secrecy visible 15 Perfect Secrecy\n\tKeep your family's secrets\n\tYou consistently kept your family's secrets.\n\n*achievement teacher visible 20 Those Who Can, Teach\n\tLearn enough to teach others\n\tYou can now teach others.\n\n\n*comment --------OPENING SCREEN--------\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tFor generations, your family has kept China safe from chaos demons. Now you must uphold that duty while you're at university--just don't tell your roommates!\n\n\t\"First Year Demons\" is an interactive fantasy novel by Rebecca Slitt, author of \"Psy High.\" Your choices control the story.  It's two games in one: a 30,000-word educational game, and a 43,000-word version of the same story that's just for fun. Both games are entirely text-based--without graphics or sound effects--and fueled by the vast, unstoppable power of your imagination.\n\n\tAs the youngest member of a family with a secret and ancient duty to keep China safe from demons, you must balance your relatives' traditional values and expectations with the challenges of your first year at college and your secret study of potions, sword, and spells.\n\n\tBetween dorm­room parties and chemistry study sessions, you'll experience battle and betrayal. You'll learn just how important it is to stay close to your family--your life may depend on it! You'll see how China is changing: maybe it's better to offer your ancestors a smartphone than to slay a demon in their memory. And above all, you must not let your friends know why you really sneak out of your dorm so late at night! Demons are all around you, and you never know what might be hiding behind a friendly face.\n\n\t• Battle chaos demons[n/]\n\t• Play as male or female, gay, straight or bi[n/]\n\t• ­Hit the books, or go out and party![n/]\n\t• ­Stay close to your family ­ or turn against them and be cast out[n/]\n\t• Specialize in swords, magic, or potions\n\n\t[i]You can play the first two chapters of the game for free. Purchase the rest of the game below.[/i]\n\t*if choice_is_advertising_supported\n\t\t[i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\t*comment endif\n\n\t*purchase_discount adfree 2016-01-01 $3.99 $2.99 purchased\n\t*if choice_is_advertising_supported\n\t\t*page_break_advertisement\n\t*if not(choice_is_advertising_supported)\n\t\t*page_break Play Now for Free\n\n\n*label purchased\n\nWelcome to First Year Demons!\n\nThis game was originally written as part of a pilot project to explore the ways that interactive fiction can be used to learn about cultures from an first-person perspective. \n\nThere are two versions of the story. The original version is intended as a teaching and learning tool. The adapted version contains some of the same cultural information as the original, but is primarily for entertainment. \n\nYou can play either or both, in any order. Whichever one you choose to play first, you'll get the option to play the other when you finish.\n\nFor more information on the project and how the original version was adapted, \n*link https://www.choiceofgames.com/?p=3021&preview=true check out our blog.\n\n*choice\n\t#Take me to the original educational version of the story.\n\t\t*goto_scene 1-opening-old\n\t#Take me to the adapted version of the story.\n\t\t*goto_scene 1-opening\n\n", "variables": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n*set leadership 10\n*set strength 10\n\nWhat do you prefer?\n*choice\n  #Leadership\n    *set leadership +10\n    *goto action\n  #Strength\n    *set strength +10\n\n*label action\nWhat will you do today?\n*choice\n  #Run for class president\n    *if leadership > 15\n      You win the election.\n      *finish\n    You lose the election.\n    *finish\n  #Lift weights\n    *if strength > 15\n      You lift the weights.\n      *finish\n    You drop the weights and hurt yourself badly.  You never recover.\n    \n    *goto_scene death\n"}};
