rns towards you. \"You [i]must[/i] ask their intentions! You must never strike first. Have you learned nothing?\" Your family's disapproving glares bore into you, and you shrink back in shame.\n\t\t\t*goto stepup\n\n\t\t#I give it a choice: does it seek enlightenment?\n\t\t\t*set balance %+20\n\t\t\t\"Do you seek enlightenment?\" you shout, as sparks fly around you.\n\n\t\t\tThe demon's only response is a hissing snap. You're pretty sure that means no.\n\n\t\t\tEvery Wang's hand strikes the demon at once. It lets out a single cry of fury, then collapses onto the ground.\n\n\t\t\t\"Well done, ${Nickname},\" Eldest Uncle says, breathless but warmly approving. \"You are learning well.\"\n\n\t\t\t*label stepup\n\t\t\t*achieve ancient\n\t\t\tSecond Aunt steps up to the demon's corpse and intones, \"Great-Grandmother, please accept this deed as our offering to you. The Wang family has done this together, honoring your memory with our actions.\" \n\t\t\t*if (both)\n\t\t\t\tThe first part of your offering is complete; now it's time for the second part.\n\t\t\t\t*page_break\n\t\t\t\t*goto iphone\n\t\t\t*else\n\t\t\t\t*goto speaking\n\t*label gotaway\n\t*set triedtoslay true\n\tYour relatives fling themselves towards the demon, swords flying and magic crackling, but it's no use. The demon slithers away in a spray of angry sparks.\n\n\tNobody says anything for a very long time.\n\n\tFirecracker glares at you. Cousin Tian is too polite and restrained to do that, but from the way he's very carefully not looking at you, you're pretty sure that he blames you for this too.\n\n\t\"We all know the importance of acting in balance with the universe,\" Eldest Uncle intones. \"If we do not do that, then we risk failure in our most critical battles.\" He glances over towards you only at the very end, but you know that he's talking directly to you.\n\n\t\"And how will we honor Great-Grandmother now?\" Second Aunt snaps. \"Will we have to tell her about our shameful failure?\" You were the one who failed, but your whole family bears the shame.\n\n\t*if (both)\n\t\t\"We still have other ways to honor her,\" Eldest Uncle reminds her.\n\t\t*page_break Two Hours Later\n\t\t*goto iphone\n\t*else\n\t\tFirecracker clears her throat. \"Well. I heard about something that you might be interested in…\"\n\n\t\tMaybe Second Aunt wasn't willing to think about paper offerings before, but she might now.\n\t\t*page_break Two Hours Later\n\t\t*goto iphone\n\n*else\n\t*label iphone\n\t*achieve moderntimes\n\tYou gather at Great-Grandmother's memorial stone, all seven of you forming a half-circle around it. Fragrant incense smoke floats around you, and candles send a gentle flickering light over your relatives' faces.\n\n\tFirecracker steps up, her hands full of red paper cutouts. She's got the paper smartphone that she wanted to give, but also a set of headphones to go with it, a car, and some bottles. \"Great-Grandmother would like some potions, too,\" she explains, as she hands the bottle-shaped pieces of paper to Second Aunt. Second Aunt's smile is still slightly grudging, but she glances over at Eldest Uncle, then back to Firecracker, and nods.\n\n\tEldest Uncle steps forward and touches a match to the red paper cutouts. Flames leap up, brightening the night and sending another plume of smoke up to join the incense clouds. \"Great-Grandmother, please accept our offerings to you,\" he says. \"The Wang family has done this together. We want you to be well provided for in the spirit world, and we honor your memory with our gifts.\"\n\t*goto speaking2\n\n*label speaking\n*page_break\n\nYou gather at Great-Grandmother's memorial stone, all seven of you forming a half-circle around it. Fragrant incense smoke floats around you, and candles send a gentle flickering light over your relatives' faces. \"Great-Grandmother, please accept our offerings to you,\" Eldest Uncle intones. \"The Wang family has done this together. We want you to be well provided for in the spirit world, and we honor your memory with our gifts.\"\n\n*label speaking2\nNow it's time for the final part of the ritual. Each member of the family speaks for a few minutes to Great-Grandmother, telling her about the most important events of the last year.\n\nWhat do you say, when it's your turn to speak to her?\n\n*choice\n\t#I tell her about everything I'm learning in my classes, because that's what I spend the most time thinking about.\n\t\t*set classrank %-15\n\t\tYour schoolwork is as much a part of your family's sacred duty as your sword training and meditation practice. Not only are you learning about potions in your chemistry classes, but you owe it to your parents and senior relatives to do well in your studies.  \n\n\t\tYou hope that Great-Grandmother will be happy to hear you say that - and even more, you hope that you'll be able to fulfill the promises you've made to your relatives.\n\n\t\t*if (triedtoslay)\n\t\t\tYour failure tonight has reminded you of just how hard those duties and promises are. You hope that the next time, you won't fail.\n\t\t\t*finish\n\t\t*else\n\t\t\t*finish\n\t#I tell her about how I'm trying to learn about the balance of the universe.\n\t\t*set balance %+15\n\t\tYou've learned a lot since coming to university, but one of the most important things you've learned is how to keep your thoughts and actions aligned with the cosmic balance that Eldest Uncle taught you about. You hope that Great-Grandmother will be happy to hear you say that - and even more, you hope that you'll be able to fulfill the promises you've made to your relatives.\n\n\t\t*if (triedtoslay)\n\t\t\tYour failure tonight has reminded you of just how hard those duties and promises are. You hope that the next time, you won't fail.\n\t\t\t*finish\n\t\t*else\n\t\t\t*finish\n\t#I tell her about the whole family's achievements: the most important things are what we do together.\n\t\t*set interdependence %+15\n\t\tYou've learned a lot since coming to university, but one of the most important things you've learned is that the whole family needs to work together to carry out your duty. You hope that Great-Grandmother will be happy to hear you say that - and even more, you hope that you'll be able to fulfill the promises you've made to your relatives.\n\n\t\t*if (triedtoslay)\n\t\t\tYour failure tonight has reminded you of just how hard those duties and promises are. You hope that the next time, you won't fail.\n\t\t\t*finish\n\t\t*else\n\t\t\t*finish\n\t#I tell her about Eldest Uncle's achievements, because he's the senior member of the family.\n\t\t*set filial %+15\n\t\tYour respect for your uncle fills every word. Filial piety is one of your most important obligations: it guides you when you're working together with your family; it reminds you that your actions don't just reflect on you, but on your relatives as well.\n\n\t\tYou hope that Great-Grandmother will be happy to hear you say that - and even more, you hope that you'll be able to fulfill the promises you've made to your relatives.\n\n\t\t*if (triedtoslay)\n\t\t\tYour failure tonight has reminded you of just how hard those duties and promises are. You hope that the next time, you won't fail.\n\t\t\t*finish\n\t\t*else\n\t\t\t*finish\n", "7-profmistake-old": "*page_break\n[b]Chapter 7: The Professor's Mistake[/b]\n\nIt's been surprisingly quiet around town for the last few weeks. Even though you and Firecracker go on patrol every night, there are hardly any demons to be seen. \n\n*if (slaydemon)\n\tYou suspect that word has gotten around about the demon you killed by the pond, and all the others are lying low. \n\t*comment endif\n\nIt doesn't mean that you can be any less diligent about your training, but at least you can get caught up on your schoolwork. For once, you've actually worked ahead in Professor Chen's chemistry class, which is good, because you've got a big group project to do, and you want to do well on it for a lot of reasons. \n\nFirst, you owe it to your family to do well in school. Second, you owe it to Firecracker specifically - she's the TA for this class, and if you do poorly it will reflect on her. Third, you owe it to the rest of the group, because you've been appointed team leader. And fourth, Shen Yi and Little One are also on the team. It's great to work with people who are as smart as they are, and with whom you can work as well as you do. They deserve your support, and you hope that they'll give you theirs in return.\n\n*label leader\nSo what did you say to Professor Chen when he appointed you the leader of your group?\n\n*choice\n\t#\"I don't deserve this.\"\n\t\t*set modest %+20\n\t\t*set hierarchy %+20\n\t\tProfessor Chen never really smiles, but his mouth quirked up a little in response to your modest words. \"Do your job, and help the team,\" the professor said, and you went on your way.\n\t\t*goto meeting\n\n\t#\"Thank you. I hope I can show you that I'm a good student.\"\n\t\t*set modest %-20\n\t\t*set interdependence %-20\n\t\tProfessor Chen never really smiles, but his serious expression shifted even further towards disapproval at your words. \"You're not the only one on the team,\" the professor said, and you went on your way.\n\t\t*goto meeting\n\n\t#\"I hope that our team does well.\"\n\t\t*set modest %+10\n\t\t*set interdependence %+20\n\t\tProfessor Chen never really smiles, but his mouth quirked up a little in response to your expression of support for your team. \"Do your job, and help the team,\" the professor said, and you went on your way.\n\t\t*goto meeting\n\n*label meeting\nSo you read up before your meeting with the group and sketched out your plan for what you'll need to do. You'll need to talk to the rest of the group before dividing up the actual work, but you have an outline of what steps you'll need to take, and which formulas you'll need. You make an extra note of the formula on Page 115, because you know you'll need to use it a lot.\n\nFortunately, everyone else has had the same idea: the rest of the group comes in with their own lists and plans, and you all settle right down to divide up the work.\n\n\"All right,\" says Shen Yi. \"So we use this formula on Page 110, like Professor Chen said in class - \"\n\n\"Wait, what?\" You blurt it out before you realize that you're doing it. It's horribly rude to interrupt, but you're so surprised that the words just fly out.\n\nWhen you dare to look up again, the rest of the group is staring at you. What do you say?\n\n*fake_choice\n\t#\"Shouldn't we be using the formula on Page 115 instead?\"\n\t#\"Are you sure that's what Professor Chen said?\"\n\t#\"Sorry, could you say that again?\"\n\n\"Professor Chen said that we should use the one on Page 110,\" Shen Yi repeats.\n\n\"But...wouldn't the one on Page 115 work better?\" you offer.\n\nYou glance over at Little One, who's looking even more uncomfortable than ${hua_he} usually does in a crowd. \"You're right,\" Little One says, only looking at you and not at the rest of the group. \"It should be 115.\"\n\n\"If we use the formula on Page 110, then the whole solution will come out wrong,\" you explain.\n\nShen Yi is already sketching out equations and punching numbers into ${yi_his} calculator. $!{yi_he}'s halfway through the first equation when ${yi_he} stops short just as you did. \"Oh. Yes, it is coming out wrong,\" ${yi_he} says slowly. \"So…Professor Chen made a mistake. We have to say something to him.\"\n*page_break\n\n*label canttell\n\"We can't tell Professor Chen that he made a mistake!\" Little One says, eyes wide and worried. \"Not directly. We can't make him look bad. Can't we just tell the other students?\"\n\n\"There are over 100 other students in the class,\" Shen Yi counters. \"We can't get in touch with them all, and we can't be certain that the rest of the groups will figure it out on their own. If they try to do their projects with the wrong formula, they'll all get terrible grades.\"\n\nLittle One looks up at you trustingly and says, \"You're the leader. What should we do?\"\n\nWhat do you think? How can you help Professor Chen save face and still make sure that your fellow students don't try to work with the wrong formula?\n\n*label canttell2\n\n*choice\n\t#\"Let's try to get in touch with the other students. We don't have to talk to Professor Chen at all.\"\n\t\t*set interdependence %-10\n\t\t*set indirect %+15\n\t\t*set facesaving %+20\n\t\t*set modest %+15\n\t\t*set classrank +5\n\t\tThe rest of the meeting is spent tracking down the email addresses of the other students. The time you spend finding everyone's contact information is time that you aren't able to spend on the project. You're sure that you've missed something, but you don't have time to fix it. Even worse, you're not entirely certain that you've managed to get in touch with the other students. Still, you've done the best you can.\n\n\t\t*page_break\n\t\tA week later, Professor Chen hands back the assignments with an even deeper version of his usual frown. \"This project was not your best,\" he says flatly. \"You must pay more attention to detail. Some of you used the wrong formula.\"\n\n\t\tSure enough, a few people used the formula from Page 110, and came up with the wrong answer because of it. Professor Chen didn't realize that the mistake was his rather than theirs, and just gave them a lower grade.  \n\n\t\tYou wish that you could have done more to help. It's true that you didn't have to do anything that would risk embarrassing Professor Chen, but you still feel guilty about your fellow students' grades.\n\t\t*goto_scene 8-bigfight-old\n\n\n\t#\"I'll ask Professor Chen some questions that will help him figure out that he made a mistake.\"\n\t\t*set indirect %+10\n\t\t*set modest %+10\n\t\t*set facesaving %+20\n\t\t*set classrank -10\n\t\tIt takes a lot of courage to actually go talk to Professor Chen. Not only is he an intimidating person in his own right - tall, broad, and with a permanent frown - but hardly anyone ever talks to the professor one-on-one outside of class.\n\n\t\tBut you have a responsibility to your team, and to the rest of the class, so you do it.\n\n\t\tPlus, you've slain demons! Compared to that, talking to a scary professor is nothing, right?\n\n\t\t*page_break\n\n\t\t\"Professor Chen?\" you say, hovering nervously by his door. \"I had some questions about the assignment.\"\n\n\t\t\"Mm?\" Professor Chen says absently from his desk. He doesn't invite you in.\n\n\t\tYou take a deep breath and start talking. \"For the second part of our group project, we're supposed to use the formula on Page 115, right? Isn't that what you said in class? I missed writing it down in my notes, so I'm not sure.\" You bow your head, doing your best to look ashamed at admitting a mistake.\n\n\t\tProfessor Chen's frown deepens, tinged with exasperation at being asked such a small question by a student. \"Let me look,\" he says. To your relief, he pulls out the textbook and assignment first, rather than his lecture notes. \"Page 115. Yes, that looks right,\" he says after a moment. Then he consults his lecture notes, and his frown shifts again. \"Oh,\" he says, eyes widening in realization. \"Oh. I see.\" For the first time, he looks up at you directly. \"I'll see you in class,\" he says. It's a dismissal, but he doesn't actually seem angry.\n\t\t*page_break\n\n\t\tThe next day in class, Professor Chen reviews the instructions for the assignment, and puts just a little extra emphasis in his voice when he refers to Page 115. \n\n\t\tAll around the lecture hall you see pencils scribbling in this new information.\n\n\t\tYour group gets the highest grade in the class on your project, and even if the other students' performance doesn't match yours, at least they had the right formula to work with. You feel that you did the right thing.\n\t\t*goto_scene 8-bigfight-old\n\n\t#\"My cousin is the TA. I'll see if she can talk to Professor Chen.\"\n\t\t*set hierarchy %+20\n\t\t*set facesaving %+25\n\t\t*set interdependence %+20\n\t\t*set indirect %+15\n\t\t*set classrank -10\n\t\t\"Firecracker?\" you call, hurrying to catch up with your cousin after class.\n\n\t\t\"What is it, ${Nickname}?\"\n\n\t\t\"I just wanted to check something about the group project assignment,\" you explain. \"For the second part, we're supposed to use the formula on Page 115, right?\"\n\n\t\tFirecracker's eyes crinkle with thought. \"Didn't Professor Chen say Page 110 in class?\" \n\n\t\tYou're impressed that she remembers it off the top of her head like that. \"I'm…not sure,\" you hedge, hoping that Firecracker will understand that the hesitation in your voice doesn't mean that you don't remember what he said. \"Could you please check with the professor to make sure that Page 115 is the right one?\"\n\n\t\t\"All right,\" Firecracker concedes. \"There's a TA meeting this afternoon. I'll ask him then.\"\n\t\t*page_break\n\n\t\tThe next day in class, Professor Chen reviews the instructions for the assignment, and puts just a little extra emphasis in his voice when he refers to Page 115. He gives a significant glance over at Firecracker when he says it, too. \n\n\t\tAll around the lecture hall you see pencils scribbling in this new information.\n\n\t\tYour group gets the highest grade in the class on your project, and even if the other students' performance doesn't match yours, at least they had the right formula to work with. You feel that you did the right thing.\n\t\t*goto_scene 8-bigfight-old\n\n\t*hide_reuse #\"Let the other students figure it out for themselves. We'll just use the right formula and not worry about them.\"\n\t\t*set interdependence %-25\n\t\t*set holistic %-20\n\t\t*set modest %-20\n\t\tFive sets of shocked, disapproving eyes turn on you. \n\n\t\tLittle One shakes ${hua_his} head mutely, and it's Shen Yi who speaks up. \"We can't just let them do it wrong!\" ${yi_he} says. \"We have to help them somehow. Seriously, what should we do?\"\n\t\t*goto canttell2 \n", "7-profmistake": "\n*temp lyinglow false\n*temp projectstatus \"blank\"\n\n[b]Chapter 7: Mistakes[/b]\n\nTwo weeks later, it's your turn to patrol around campus with Firecracker again.\n\n*if (slaydemon)\n\tEver since you killed the demon in Great-Grandmother's memory, the demons have been\n\t*if rel_yan > 55\n\t\tacting very strange when you confront them. \n\n\t\t*label resentful\n\t\tInstead of begging to be allowed to find enlightenment, or shouting in defiant hostility, they're almost…resentful?\n\n\t\t\"Why have you turned on us?\" one of them shouted as you backed her into a corner. \"What happened?\"\n\n\t\tYou're not really sure what she meant by that. Hasn't the Wang family always hunted demons? What do they think has changed?\n\t\t*goto exposition\n\t*else\n\t\t*set lyinglow true\n\t\tunusually quiet - nobody has had a single fight. \"They must know that we're serious about keeping this place safe from demons,\" Firecracker says with a fierce grin.\n\n\t\tThe trees rustle sharply, and you both stop short - but then the rustle dies away, and there is only a trail of withered grass and shriveled leaves left behind to mark where a demon was, and has now fled.\n\n\t\t*fake_choice\n\t\t\t#\"I hope all of our patrols are this peaceful.\"\n\t\t\t\tFirecracker grins. \"I never thought I'd agree with that, but I do. This is [i]easy[/i].\"\n\t\t\t#\"I hope we'll get a good fight sometime.\"\n\t\t\t\tFirecracker grins. \"I miss fighting, too,\" she agrees. \"But we can always spar in the practice room.\"\n\t\t\t#\"It's too quiet. This can't be right.\"\n\t\t\t\tFirecracker grins. \"Don't argue! If we've scared them away, that means we've done our job well.\"\n\t\t*goto exposition\n\n*elseif (triedtoslay)\n\tEver since you tried to slay the demon in Great-Grandmother's memory, these nightly patrols have been not just part of your practice, but absolutely essential: failing to slay that demon has meant that every other demon in the area has become more active.\n\t*if rel_yan > 55\n\t\tBut they've also been acting very strange when you confront them.\n\t\t*goto resentful\n\n\t*else\n\t\tTonight, that means hearing the sound of taunting laughter wherever you go. Firecracker charges towards the sound every time - but every time, the demons are gone before she or you can get there, leaving only a trail of withered leaves and shriveled grass to show where they've been. \n\t\t*goto hostiletalk\n*else\n\tEver since you decided not to slay a demon in Great-Grandmother's memory,\n\t*if rel_yan > 55\n\t\t*set lyinglow true\n\t\tthe campus has been quiet.\n\n\t\t\"They must think we're going soft,\" Firecracker grumbles. \"They're not even trying anymore.\"\n\n\t\t*fake_choice\n\t\t\t#\"Weren't you the one who didn't want to kill a demon?\"\n\t\t\t\tFirecracker rolls her eyes, but admits, \"Fair point. Still, maybe we should have taken the chance when we had it.\"\n\t\t\t#\"We'll just have to work harder to show them that we're not.\"\n\t\t\t\tFirecracker gives you a fierce grin. \"That's the idea.\"\n\t\t\t#\"Maybe they're too afraid of us to show their faces.\"\n\t\t\t\t\"Maybe,\" Firecracker agrees, but she doesn't sound entirely convinced.\n\t\t*goto exposition\n\n\t*else\n\t\tyour family's nightly patrols have been busy. \n\t\t*label hostiletalk\n\n\t\t\"They must think we're going soft,\" Firecracker fumes as the two of you slog back to your dorms after an exhausting, battle-filled night. \"Cousin Lin says that the demons have never been this active.\"\n\n\t\t*fake_choice\n\t\t\t#\"Weren't you the one who didn't want to kill a demon?\"\n\t\t\t\tFirecracker rolls her eyes, but admits, \"Fair point. Still, maybe we should have taken the chance when we had it.\"\n\t\t\t#\"We'll just have to work harder to show them that we're as strong as ever.\"\n\t\t\t\tFirecracker gives you a fierce grin. \"That's the idea.\"\n\t\t\t#\"Do you think there's something bigger going on?\"\n\t\t\t\tFirecracker frowns. \"Do you mean, is this part of a bigger demon war?\" She shakes her head. \"I don't know. But we have to be watchful.\"\n\t\t*goto exposition\n\n*label exposition\n*page_break\nWith all of the strangeness of your nightly patrols, it's almost a relief to be able to count on Professor Li's chemistry lab being just as it always is: enormously difficult and time-consuming. \n\n*if lyinglow\n\tSince things are quiet, you've been able to work ahead a little bit, but you can't let yourself get complacent about that any more than you can about the demons,\n\t*goto exposition2\n*else\n\tIt's been even harder to keep up with the work, but you can't let yourself fall behind,\n\t*goto exposition2\n*label exposition2\nespecially because you've got a big group project coming up. You want to do well on that, for a lot of reasons. \n\nFirst, you owe it to your family to do well in school. Second, you owe it to Firecracker specifically - she's the TA for this class, and if you do poorly it will reflect on her. Third, you owe it to the rest of the group, because you've been appointed team leader. And fourth, Shen Yi and Little One are also on the team. It's great to work with people who are as smart as they are, and with whom you can work as well as you do. They deserve your support, and you hope that they'll give you theirs in return.\n\n*page_break\nSo you read up before your meeting with the group and sketched out your plan for what you'll need to do. You'll need to talk to the rest of the group before dividing up the actual work, but you have an outline of what steps you'll need to take, and which formulas you'll need. You make an extra note of the formula on Page 115, because you know you'll need to use it a lot.\n\nFortunately, everyone else has had the same idea: the rest of the group comes in with their own lists and plans, and you all settle right down to divide up the work.\n\n\"All right,\" says Shen Yi. \"So we use this formula on Page 110, like Professor Li said in class - \"\n\n\"Wait, what?\" You blurt it out before you realize that you're doing it. It's horribly rude to interrupt, but you're so surprised that the words just fly out.\n\nWhen you dare to look up again, the rest of the group is staring at you. What do you say?\n\n*fake_choice\n\t#\"Shouldn't we be using the formula on Page 115 instead?\"\n\t#\"Are you sure that's what Professor Li said?\"\n\t#\"Sorry, could you say that again?\"\n\n\"Professor Li said that we should use the one on Page 110,\" Shen Yi repeats.\n\n\"But…wouldn't the one on Page 115 work better?\" you offer.\n\nYou glance over at Little One, who's looking even more uncomfortable than ${hua_he} usually does in a crowd. \"You're right,\" Little One says, only looking at you and not at the rest of the group. \"It should be 115.\"\n\n\"If we use the formula on Page 110, then the whole solution will come out wrong,\" you explain.\n\nShen Yi is already sketching out equations and punching numbers into ${yi_his} calculator. $!{yi_he}'s halfway through the first equation when ${yi_he} stops short just as you did. \"Oh. Yes, it is coming out wrong,\" ${yi_he} says slowly. \"So…Professor Li made a mistake. We have to say something to him.\"\n*page_break\n\n\"We can't tell Professor Li that he made a mistake!\" Little One says, eyes wide and worried. \"Not directly. We can't make him look bad. Can't we just tell the other students?\"\n\n\"There are over 100 other students in the class,\" Shen Yi counters. \"We can't get in touch with them all, and we can't be certain that the rest of the groups will figure it out on their own. If they try to do their projects with the wrong formula, they'll all get terrible grades.\"\n\nLittle One looks up at you trustingly and says, \"You're the leader. What should we do?\"\n\nWhat do you think? How can you help Professor Li save face and still make sure that your fellow students don't try to work with the wrong formula?\n\n*choice\n\t#\"Let's try to get in touch with the other students. We don't have to talk to Professor Li at all.\"\n\t\tThe rest of the meeting is spent tracking down the email addresses of the other students. \n\t\t*if interdependence > 55\n\t\t\tYou never realized before how many of your classmates you've gotten to know in the last few months! You manage to contact almost all of them, and the ones you don't know, Shen Yi does. You feel confident that you've done the right thing in helping out your fellow students, and you've got plenty of time left over to do a good job on your own project.\n\n\t\t\t*page_break\n\t\t\t*set classrank %-15\n\t\t\tA week later, Professor Li hands back the assignments, and to your surprise, he's almost smiling! \"Good job. You have all made progress in working independently.\" Does that mean that he knows he made a mistake and the students figured out the right formula on your own? You're not sure, and you can't possibly ask. But at least you can have the satisfaction of knowing that your own grade was near the top of the class, and that you helped your fellow students do well too.\n\t\t\t*finish\n\n\t\t*else\n\t\t\tYou never realized before how few of your classmates you actually know. You only manage to get twenty or so names. Even worse, the time you spend finding everyone's contact information is time that you aren't able to spend on the project. You're sure it isn't as good as it would have been if you'd spent more time on it. \n\n\t\t\t*page_break\n\t\t\t*set classrank %+5\n\t\t\tA week later, Professor Li hands back the assignments with an even deeper version of his usual frown. \"This project was not your best,\" he says flatly. \"You must pay more attention to detail. Some of you used the wrong formula.\"\n\n\t\t\tSure enough, a few people used the formula from Page 110, and came up with the wrong answer because of it. Professor Li didn't realize that the mistake was his rather than theirs, and just gave them a lower grade.  \n\n\t\t\tYou wish that you could have done more to help. It's true that you didn't have to do anything that would risk embarrassing Professor Li, but you still feel guilty about your fellow students' grades.\n\t\t\t*finish\n\n\n\t#\"I'll ask Professor Li some questions that will help him figure out that he made a mistake.\"\n\t\tIt takes a lot of courage to actually go talk to Professor Li. Not only is he an intimidating person in his own right - tall, broad, and with a permanent frown - but hardly anyone ever talks to the professor one-on-one outside of class.\n\n\t\tBut you have a responsibility to your team, and to the rest of the class, so you do it.\n\n\t\tPlus, you've slain demons! Compared to that, talking to a scary professor is nothing, right?\n\n\t\t*page_break\n\n\t\t\"Professor Li?\" you say, hovering nervously by his door. \"I had some questions about the assignment.\"\n\n\t\t\"Mm?\" Professor Li says absently from his desk. He doesn't invite you in.\n\n\t\tYou take a deep breath and start talking. \"For the second part of our group project, we're supposed to use the formula on Page 115, right? Isn't that what you said in class? I missed writing it down in my notes, so I'm not sure.\" You bow your head, doing your best to look ashamed at admitting a mistake.\n\n\t\t*if indirect > 60\n\t\t\tProfessor Li's frown deepens, tinged with exasperation at being asked such a small question by a student. \"Let me look,\" he says. To your relief, he pulls out the textbook and assignment first, rather than his lecture notes. \"Page 115. Yes, that looks right,\" he says after a moment. Then he consults his lecture notes, and his frown shifts again. \"Oh,\" he says, eyes widening in realization. \"Oh. I see.\" For the first time, he looks up at you directly. \"I'll see you in class,\" he says. It's a dismissal, but he doesn't actually seem angry.\n\t\t\t*page_break\n\t\t\t*set classrank %-15\n\t\t\t*set projectstatus \"success\"\n\n\t\t\tThe next day in class, Professor Li reviews the instructions for the assignment, and puts just a little extra emphasis in his voice when he refers to Page 115. \n\n\t\t\tAll around the lecture hall you see pencils scribbling in this new information.\n\n\t\t\tYour group gets the highest grade in the class on your project, and even if the other students' performance doesn't match yours, at least they had the right formula to work with. You feel that you did the right thing.\n\t\t\t*goto aftertalk\n\t\t*else\n\t\t\tProfessor Li's frown deepens. \"You should work harder on your own. Don't expect me to do the work for you.\" He looks at you a little closer, and - although you didn't think it was possible - he frowns even more. \"You're Wang Su, aren't you? Dean Wang's ${niece}?\" \n\n\t\t\tUh-oh. That's all you need, for Eldest Uncle to be angry at you for something that you didn't even mean to do! \"Yes, Professor,\" you say - and then add quickly, \"Thank you, Professor. Goodbye.\"\n\n\t\t\tApparently he didn't understand what you were really trying to ask. You thought you were being indirect, but instead you just lost your meaning entirely.\n\t\t\t*page_break\n\t\t\t*goto messagefailure\n\n\t#\"My cousin is the TA for Professor Li's class. I'll see if she can talk to Professor Li.\"\n\t\t\"Firecracker?\" you call, hurrying to catch up with your cousin after class.\n\n\t\t\"What is it, ${Nickname}?\"\n\n\t\t\"I just wanted to check something about the group project assignment,\" you explain. \"For the second part, we're supposed to use the formula on Page 115, right?\"\n\n\t\tFirecracker's eyes crinkle with thought. \"Didn't Professor Li say Page 110 in class?\" \n\n\t\tYou're impressed that she remembers it off the top of her head like that. \"I'm…not sure,\" you hedge, hoping that Firecracker will understand that the hesitation in your voice doesn't mean that you don't remember what he said. \"Could you please check with the professor to make sure that Page 115 is the right one?\"\n\n\t\t*if filial > 55\n\t\t\t*set projectstatus \"success\"\n\t\t\t\"All right,\" Firecracker concedes. \"There's a TA meeting this afternoon. I'll ask him then.\"\n\t\t\t*page_break\n\n\t\t\tThe next day in class, Professor Li reviews the instructions for the assignment, and puts just a little extra emphasis in his voice when he refers to Page 115. He gives a significant glance over at Firecracker when he says it, too. \n\n\t\t\tAll around the lecture hall you see pencils scribbling in this new information.\n\n\t\t\tYour group gets the highest grade in the class on your project, and even if the other students' performance doesn't match yours, at least they had the right formula to work with. You feel that you did the right thing.\n\t\t\t*set classrank %-15\n\t\t\t*goto aftertalk\n\t\t*else\n\t\t\tFirecracker frowns. \"Are you trying to get special treatment? We agreed that you'd do the work just like every other student in the class.\" \n\n\t\t\tAnd that's all that she has to say on the subject. Maybe if you were more respectful to your family all the time, and not just when you needed help, you'd have had more success. \n\n\t\t\t*page_break\n\t\t\t*label messagefailure\n\t\t\t*set projectstatus \"fail\"\n\n\t\t\tYou all try your best on the project, but it's hard not knowing if you have the right formula to work with. You end up having to do some of the work twice: once with the formula on Page 110 and once with the formula on Page 115. It means that the rest of the project isn't as good as you hoped it would be.\n\n\t\t\tAt least you're not alone. About half the class went ahead with the wrong formula, and most of the others did double the work the way your team did. Everyone ends up unhappy and overworked. Better luck next time!\n\t\t\t*set classrank %+5\n\t\t\t*goto aftertalk\n\n\t#\"Let the other students figure it out for themselves. We'll just use the right formula and not worry about them.\"\n\t\t*set rel_shen %-20\n\t\t*set classrank %-20\n\t\t*set projectstatus \"apathy\"\n\t\tFive sets of shocked, disapproving eyes turn on you. \n\n\t\tLittle One shakes ${hua_his} head mutely, and it's Shen Yi who speaks up. \"We can't just let them do it wrong!\" ${yi_he} says. \"We have to help them somehow.\"\n\n\t\tYou shrug. \"Why? We have the right information. If they don't realize that there's a mistake, then it's their own fault.\"\n\n\t\tShen Yi's shock settles into disappointment as ${yi_he} listens. \"You really don't care about the rest of the class?\" ${yi_he} asks. \"I didn't think you were like that.\"\n\n\t\tWell, you are like that. Shen Yi may not be happy, but since you were one of only a few people with the right formula, you end up getting one of the best grades in the class. Was it worth it? Maybe.\n\t\t*goto aftertalk\n\n*label aftertalk\n*page_break\n\n*if shenyidate\n\t*if (projectstatus = \"apathy\") \n\t\tIn the next week's lab meeting, Shen Yi hardly meets your eyes. $!{Yi_he}'s usually reticent and indirect, but this is more than that; ${yi_he}'s just not talking to you at all. Is ${yi_he} still angry about what happened with the professor's mistake last week?\n\n\t\tAs the meeting breaks up and everyone filters out into the hallway, you finally manage to talk to Shen Yi. What do you say?\n\n\t\t*choice\n\t\t\t#\"What's wrong?\" It's blunt, but I want to know.\n\t\t\t\t*set rel_shen %-10\n\t\t\t\tShen Yi winces at your directness: you had a feeling that ${yi_he} might. \"It's too bad that our lab group isn't giving much help to the rest of the class,\" ${yi_he} says quietly. Meaning, yes, ${yi_he} is unhappy that you didn't want to help the others.\n\t\t\t\t*goto shenbreak\n\t\t\t#\"It's been a hard week, hasn't it?\" Something indirect would make Shen Yi feel more comfortable.\n\t\t\t\t*set rel_shen %+5\n\t\t\t\t\"It has,\" Shen Yi replies quietly. \"It's too bad that our lab group isn't giving much help to the rest of the class,\" ${yi_he} says quietly. Meaning, yes, ${yi_he} is unhappy that you didn't want to help the others.\n\t\t\t\t*goto shenbreak\n\t\t\t#\"I'm sorry about what happened last week. I feel ashamed.\" It's true.\n\t\t\t\t*set rel_shen %+10\n\t\t\t\tFor a long moment, Shen Yi is quiet, and finally says, \"Thank you. I guess sometimes we learn from experience.\"\n\t\t\t\t*goto shenbreak\n\t\t\t#\"I'm sorry about what happened last week. I feel ashamed.\" It's not true, but it will make Shen Yi feel better.\n\t\t\t\t*set rel_shen %-10\n\t\t\t\tFor a long moment, Shen Yi is quiet, and you think that ${yi_he} might even have believed you. But in the end, ${yi_he} shakes ${yi_his} head. \"I think that was what you really wanted to do.\"\n\t\t\t\t*goto shenbreak\n\t\t*label shenbreak\n\t\tShen Yi looks down at ${yi_his} feet for a moment, then says,\n\t\t*if rel_shen \u003c 50\n\t\t\t*set shenyimad true\n\t\t\t*set shenyidate false\n\t\t\t\"You aren't who I thought you were, Wang Su.\" ${yi_his} voice is very quiet, and ${yi_he} has to stop for a moment before ${yi_he} can continue. \"I'm sorry. I don't think it's a good idea for us to study together outside of class. Or to go to the movies tomorrow.\"\n\n\t\t\tShen Yi is…breaking up with you?\n\n\t\t\tThere's nothing you can do: you just nod, and go away. Alone.\n\t\t\t*finish\n\t\t*else\n\t\t\t\"Sometimes, people make mistakes. But then they move on from them, and do things better the next time.\" $!{yi_he} looks up at you hopefully. \"Right?\"\n\n\t\t\tYou nod, relieved that Shen Yi seems to have forgiven you. \"Right,\" you agree. \n\n\t\t\tShen Yi smiles, and everything gets a little better.\n\t\t\t*finish\n\n\t*elseif (projectstatus = \"fail\")\n\t\tWhen you get back to your room, you find a box of your favorite cookies waiting for you, with a note from Shen Yi. [i]I'm sorry that you couldn't help as many people as you wanted to, but thank you for trying.[/i]\n\n\t\t$!{yi_he} is as indirect as always when ${yi_he} sees you in lab the next day: ${yi_he} doesn't ask you about the cookies. But ${yi_he} gives you an extra smile, and you smile back as you say, \"Sometimes even when you don't succeed, you get something sweet anyway.\"\n\n\t\tYou may not have succeeded on the project, but you've got Shen Yi on your side, and that's definitely sweet.\n\t\t*finish\n\n\t*else\n\t\t*achieve sweetsuccess\n\t\tWhen you get back to your room, you find a box of your favorite cookies waiting for you, with a note from Shen Yi. [i]Success is sweet.[/i]\n\n\t\t$!{yi_he} is as indirect as always when ${yi_he} sees you in lab the next day: ${yi_he} doesn't ask you about the cookies. But ${yi_he} gives you an extra smile, and you smile back as you say, \"Yes, it is.\"\n\n\t\tIt's sweet having Shen Yi on your side, too - it makes the fact that you helped your classmates feel even better.\n\t\t*finish\n*else\n\t*if (projectstatus = \"apathy\")\n\t\t*set shenyimad true\n\t\tIn the next week's lab meeting, Shen Yi hardly meets your eyes. $!{Yi_he}'s usually reticent and indirect, but today, ${yi_he}'s just not talking to you at all. It looks like your unwillingness to help your classmates has cost you a friend.\n\t\t*finish\n\n\t*elseif (projectstatus = \"fail\")\n\t\tWhen you get back to your room, you find a box of your favorite cookies waiting for you, with a note from Shen Yi. [i]I'm sorry that you couldn't help as many people as you wanted to, but thank you for trying.[/i]\n\n\t\t$!{yi_he} is as indirect as always when ${yi_he} sees you in lab the next day: ${yi_he} doesn't ask directly about the cookies. But ${yi_he} gives you an extra smile, and you smile back as you say, \"Sometimes even when you don't succeed, you get something sweet anyway.\"\n\n\t\tYou may not have succeeded on the project, but you've got a good friend in Shen Yi.\n\t\t*finish\n\n\t*else\n\t\t*achieve sweetsuccess\n\t\tWhen you arrive at the next week's lab meeting, you see that there's a box of your favorite cookies on the table for everyone to share. \"I thought we deserved a reward after working so hard last week,\" Shen Yi explains, and grins at you. \n\n\t\tSuccess is sweet, and so are the cookies. And it's good to l regaining your momentum, there's a knock on the study room door and everyone looks up towards the sound. \n\nIt's Firecracker, beckoning to you. \"Excuse me,\" you say to your friends in surprise, and go out into the hall to talk to your cousin.\n\n*page_break\n\n\"You need to come right now,\" Firecracker says, as soon as the door closes behind you. \"We've spotted demons in the main dining hall. We think they were there last night, too.\" Well, that would explain why dinner was so terrible, if there were demons spoiling the food!\n\nYou need to go fight, but what about the project?\n\nYou can't think of a good way to deal with this. If you stay at the meeting, you'll let down your family. If you go fight the demons, you'll risk your grade in the class, abandon your responsibility as team leader, and let down your team - not to mention letting down your roommate and a ${yi_gender} whom you really really want to spend more time with. \n\nWhat can you do?\n\n*choice\n\t#I'll go with Firecracker. Little One and Shen Yi will understand that family has to come first.\n\t\t*set filial %+20\n\t\t*set classrank +1\n\t\t*set harmony %-10\n\t\t*set interdependence %-10\n\t\t*set holistic %+20\n\t\tYou nod quickly to Firecracker. \"Just a second.\" Maintaining the balance of the universe is much more important than any chemistry class.\n\n\t\tYou duck back into the study room to start gathering up your things. \"I'm sorry,\" you say, hastily shoving books back into your bag. \"I've got a family emergency that I have to deal with. I'll be back as soon as possible. Tell Little One that I'm sorry, too?\" you add to Shen Yi. \n\n\t\tShen Yi nods. $!{yi_he} looks confused, and a little hurt, but says, \"All right. I trust you that you wouldn't leave if it weren't important.\"\n\t\t*label incharge\n\n\t\tIt's still your responsibility to make sure that the meeting will be well-run when you're not there. Who do you leave in charge?\n\n\t\t*choice\n\t\t\t#Little One: ${hua_he} will ugh the front door, and head towards the sound of battle, where you know that the demons will be.\n\n*label encounter\nThis time, there are two of them.\n\nOne big, one small; both snakelike with eyes of green fire. And both…familiar. Have you seen these demons somewhere before? No, how could you? You've never let a demon get away: you've either destroyed them or sent them off to seek enlightenment.\n\nYou chase down the corridor, desperately trying to keep in formation. Firecracker and Eldest Uncle are in front, and you're close behind.\n\nOut of the corner of your eye, you see Cousin Tian sidestep into an open office, feinting to draw the smaller demon away. The trick works: the demon dodges after him. Tian's fist strikes sharply out towards the little demon's face, breaking off one of its fangs. The demon shrieks and rears back in pain - and then withdraws farther still. It dives out of the open window and flees into the night.\n\nYou whirl around just in time to see the larger demon lunge towards Eldest Uncle. Its fangs slash across his chest like scissors going through paper. \n\n*page_break\n\nYou can't tell who's screaming. \n\nMaybe it's you; maybe it's Firecracker shrieking with fury as she charges towards the demon; maybe it's Eldest Uncle crying out in pain; maybe it's the demon roaring in triumph. \n\nMaybe it's all of that and more.\n\n*page_break\n\n*label crumple\nAs Eldest Uncle crumples to the ground, Firecracker chases down the demon, with Cousin Tian close behind. What do you do?\n\n*choice\n\t#I stay with Eldest Uncle. He needs help!\n\t\t*set filial %+20\n\t\t*set hierarchy %+20\n\t\tYou collapse next to your uncle, tearing off your jacket to try to stanch the blood that's gushing from his side. What did Cousin Tian tell you in those first aid lessons? Put pressure on the wound, right?\n\n\t\tAt least Eldest Uncle is breathing. At least there's that.\n\t\t*page_break\n\n\t\t\"${Nickname}?\" Eldest Uncle's voice is faint, thready, racked with pain. But the fact that he's speaking at all gives you hope. \"Go. Go catch it.\"\n\n\t\tYou shake your head, a sob breaking out of you. \"I can't leave you!\" \n\n\t\t*if (waited)\n\t\t\tGuilt stabs through you as sharply as the demon's fangs. What if you'd gotten there sooner? Could you have prevented this?\n\t\t\t*comment endif\n\n\t\t\"You must,\" he persists. \"Don't let it get away. Remember your duty. And be careful.\" He stops, draws a ragged breath, and pushes himself to add, \"Little one. Careful of the little one.\"\n\n\t\t\"Tian's got the other demon,\" you reassure him. \n\n\t\tEldest Uncle shakes his head, struggling to speak more - but just then, Tian rushes up. \"${Nickname}!\" Tian cries. \"Go after the big demon. The small one is gone.\"\n\n\t\t\"See?\" you tell Eldest Uncle. He's still shaking his head, but can't speak anymore.\n\n\t\tTian is fumbling in his pockets - you know that he always carries potions that can counteract the poison carried on demons' fangs, but you've never seen him use them before. \"Go, ${Nickname},\" Tian says more urgently. \"I'll take care of him now.\"\n\n\t\t*goto catchuplater\n\n\t#I chase the demon too. The more people fighting it, the better.\n\t\t*set interdependence %+20\n\t\t*label charge\n\t\tYou charge after Firecracker and Second Aunt, your heart pounding even faster than your feet. \n\n\t\t*if (waited)\n\t\t\tGuilt stabs through you as sharply as the demon's fangs. What if you'd gotten there sooner? Could you have prevented this?\n\t\t\t*comment endif\n\n\t\tWhat do you want to do when you catch up to the demon?\n\n\t\t*choice\n\t\t\t#Kill it! It hurt Eldest Uncle - it doesn't deserve mercy.\n\t\t\t\t*set holistic %-20\n\t\t\t\tSomewhere in the back of your mind you can hear Eldest Uncle's voice: \"No creature is all bad or all good.\" You fear that he might not approve of your thoughts right now - no, you [i]know[/i] that he wouldn't approve of your thoughts right now.\n\n\t\t\t\tBut you don't have any room in
